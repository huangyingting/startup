company:
  name: Colossal Biosciences
  website: https://colossal.com
chapter:
  number: 7
  title: Risks
  summary: Colossal Biosciences faces a high-severity regulatory risk profile with no established precedent for commercial
    de-extinction animal approval globally. FDA IGA premarket consultation is required for gene-edited animals; ViaGen pet
    cloning (SCNT without editing) may qualify for categorical exclusion, but de-extinct species do not. USDA/APHIS, ESA,
    CITES, and Australian biosecurity law all impose multi-jurisdictional compliance requirements. Operational risks include
    low SCNT success rates (<5%), Asian elephant surrogate dependency, and long reproductive cycles. Key-person dependency
    on George Church and Ben Lamm, DARPA grant non-renewal risk (~$11M), and a burn rate of $40–60M/year with ~$615M raised
    create financial runway concerns. Mitigations include proactive FDA engagement, CasX CRISPR licensing from UC Berkeley,
    and spinout commercialization. Thesis-break triggers are identified.
sections:
- id: CR-SEC-01
  title: Risk Overview and Severity Framework
  body: Colossal Biosciences operates in a legal, regulatory, and scientific environment with no established commercial precedent.
    De-extinction of any species has never been commercially approved by any regulatory authority globally. The company must
    navigate a multi-jurisdictional compliance environment spanning FDA IGA review (gene-edited animals), USDA APHIS oversight,
    ESA Section 9/10 permits (Asian elephant surrogate), CITES Appendix I requirements for international sample transport,
    and—for the thylacine program—Australian biosecurity and environmental law. Financial risks include a burn rate estimated
    at $40–60M per year against $615M raised, with ViaGen pet cloning providing only a fraction of operating costs. Key-person
    risks center on George Church (Harvard CSO), Beth Shapiro, and Ben Lamm. This risk profile is appropriate for a mission-driven
    deep-tech bet but must be weighed against the company's $10.3B valuation (September 2025) and pre-revenue-at-scale status.
    Residual risk is highest in the regulatory and funding categories, where no near-term resolution pathway is guaranteed.
    IUCN has noted that de-extinction programs could divert conservation funding from more cost-effective species protection
    efforts, presenting a reputational risk alongside the scientific one.
  claimRefs:
  - CR001
  - CR002
  - CR010
  - CR037
  - CR038
  - CR025
  - CR040
  tableRefs: []
  figureRefs:
  - FR001
- id: CR-SEC-02
  title: Regulatory and Legal Risk Register
  body: The most material near-term regulatory risk is FDA's Intentional Genomic Alterations (IGA) in Animals framework. Any
    gene-edited animal intended for commercial use must undergo FDA premarket consultation. ViaGen's SCNT pet cloning replicates
    existing genomes without new gene insertions and may not require IGA review; however, Colossal's de-extinct animals (thylacine,
    mammoth, dire wolf) involve gene edits and would fall under IGA requirements. The USDA APHIS oversees research involving
    genetically modified animals through Docket APHIS-2023-0042, which is specifically relevant to genetically modified animal
    regulations. The ESA Section 9 prohibits take of listed species; Asian elephants (CITES Appendix I) used as mammoth surrogates
    create international permit requirements. CITES Appendix I listing of Asian elephants restricts international transport
    of biological materials. The federalregister.gov regulations on genetically modified animals establish the legal framework.
    Law Cornell USC 16 §1531 establishes ESA requirements. Australian EPBC Act 1999 and Biosecurity Act 2015 would govern
    any thylacine reintroduction. No CITES permits, ESA Section 10 incidental take permits, or FDA IGA premarket approvals
    have been publicly disclosed by Colossal as of May 2026.
  claimRefs:
  - CR001
  - CR003
  - CR004
  - CR005
  - CR006
  - CR007
  - CR008
  - CR009
  - CR011
  - CR012
