- id: CR-SEC-05
  title: Mitigations, Monitoring Indicators, and Kill Criteria
  body: 'Colossal''s primary risk mitigation strategies include: (1) proactive engagement with FDA via voluntary premarket
    consultation for IGA compliance; (2) CasX CRISPR licensing from UC Berkeley to diversify IP away from Broad Institute/Harvard
    Church Group CRISPR portfolios; (3) spinout commercialization strategy (Form Bio, Astromech, Breaking) to generate revenue
    streams independent of de-extinction success; (4) ViaGen acquisition to establish a recurring revenue base. Key monitoring
    indicators: USDA APHIS rulemaking on genetically modified animals (Docket APHIS-2023-0042); USPTO inter partes reviews
    of foundational CRISPR patents; DARPA renewal decisions in FY2027; Australian DAFF/DCCEW regulatory position on thylacine.
    Thesis-break triggers include: FDA enforcement action against any de-extinct animal, loss of George Church or Ben Lamm
    without adequate succession, DARPA non-renewal, and >3 consecutive surrogate gestation failures. These triggers should
    be monitored by any investor holding or considering a Colossal position.'
  claimRefs:
  - CR029
  - CR030
  - CR031
  - CR032
  - CR033
  - CR034
  - CR035
  tableRefs:
  - TR005
  figureRefs: []
- id: CR-SEC-06
  title: Cross-Cutting Risk Synthesis
  body: 'Colossal''s risk profile is unusual among biotech investments: scientific risks (SCNT efficiency, ancient genome
    reconstruction) are partially mitigated by published results, but regulatory, legal, and financial risks remain high.
    The company has not disclosed formal risk management frameworks, regulatory engagement timelines, or capital runway projections.
    The $10.3B valuation implies a premium for an unprecedented mission, but investors should seek confirmation of: (1) FDA
    IGA engagement status for de-extinct species, (2) ESA/CITES permit status, (3) Australian regulatory pathway for thylacine,
    (4) DARPA renewal prospects, and (5) Form Bio and ViaGen combined ARR vs burn rate. IUCN''s critical position on de-extinction
    as a conservation strategy amplifies reputational risk if public discourse shifts against the company''s core mission.'
  claimRefs:
  - CR036
  - CR037
  - CR038
  - CR039
  - CR040
  tableRefs: []
  figureRefs: []
