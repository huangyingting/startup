- id: CR-SEC-03
  title: Operational and Technical Risks
  body: Colossal's de-extinction programs depend on somatic cell nuclear transfer (SCNT), the same technique used for Dolly
    the sheep. SCNT efficiency for large mammals is under 5% in cattle and horses; the rate for non-domesticated or extinct-lineage
    species is unknown and likely lower. The Asian elephant's 22-month gestation period means that a single failed embryo
    transfer results in a roughly two-year delay. Colossal has not disclosed how many elephant surrogates are available or
    where they are housed. The mammoth program requires sequential success across genome reconstruction, gene editing (7+
    genes confirmed via the 2025 biorxiv preprint), cell culture, embryo transfer, and live birth—each step representing an
    independent bottleneck. Operational integration of ViaGen Pets (acquired November 2025) adds organizational complexity.
    ViaGen's surrogate animal operations (dogs/cats/horses) must comply with USDA Animal Welfare Act (7 USC 2131). Biosafety
    protocols for novel de-extinct species with unknown pathogen interactions are an emerging risk not covered by existing
    frameworks.
  claimRefs:
  - CR013
  - CR014
  - CR015
  - CR016
  - CR017
  - CR018
  - CR019
  - CR020
  - CR039
