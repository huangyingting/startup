    - SP018
    confidence: medium
    freshness: current
  - id: CP039
    statement: Colossal's spinout model (Form Bio, Astromech, Breaking) creates a deliberate strategy for commercializing
      enabling technologies but also introduces competitive-distraction risk as each spinout pursues its own investor base
