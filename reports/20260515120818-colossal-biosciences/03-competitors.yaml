    topic: crispr-tools-competition
    sourceRefs:
    - SP010
    confidence: low
    freshness: current
  - id: CP032
    statement: A publicly funded academic consortium (analogous to the Human Genome Project) publishing mammoth genome blueprints
      as open-source would erode Colossal's IP moat, but no such consortium has been announced.
