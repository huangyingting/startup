- id: s4
  title: Genomic Tools and Enabling-Technology Competition
  body: The major CRISPR therapeutics companies — Editas Medicine, Beam Therapeutics, CRISPR Therapeutics, and Intellia Therapeutics
    — are not direct competitors in de-extinction or conservation genomics. All four focus exclusively on human disease applications.
    Editas's market capitalization had declined to below $500M by mid-2025 following commercial disappointment in its LCA10
    program; CRISPR Therapeutics received FDA approval for Casgevy in December 2023 (for sickle cell disease), while Intellia
    and Beam are in earlier-stage clinical programs. None of these companies has announced a conservation or agricultural
    CRISPR application. They represent the state of the art in CRISPR delivery and editing precision, and any of them could
    theoretically license their tools for non-therapeutic use, but this is speculative. Benchling dominates the lab-informatics
    space with an estimated $6 billion valuation (2021) and has deep penetration in top-tier pharma and biotech. This is a
    direct competitive challenge for Colossal's Form Bio spinout, which must overcome high switching costs and Benchling's
    feature depth to win enterprise deals.
