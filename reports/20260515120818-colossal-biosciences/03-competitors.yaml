- id: FP003
  title: Competitive Moat Readiness KPIs
  subtitle: Compact assessment of Colossal's five competitive moat dimensions
  type: kpi
  layout: compact
  summary: Colossal's talent moat and IP moat are strong but carry high key-person risk. ViaGen brand moat is moderate with
    near-term Sinogene threat. Form Bio faces an uphill battle against Benchling. No competitor has yet achieved a government
    mandate for de-extinction, leaving this potential moat unresolved.
  approximationNotes: Ratings (Strong / Moderate / Weak / Unresolved) are qualitative assessments based on public evidence
