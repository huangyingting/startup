callouts:
- type: strength
  title: Assembled team is the real moat
  body: Colossal has effectively removed its primary academic competitors by hiring Andrew Pask (TIGRR Lab) and Beth Shapiro
    (UC Santa Cruz) directly. The resulting team — the leading ancient-DNA, CRISPR, and reproductive-genomics experts in one
    organization — cannot be "cloned" by a startup within any near-term timeframe. This talent concentration is a durable
    advantage that no amount of capital alone can replicate quickly.
  claimRefs:
  - CP005
  - CP022
- type: risk
  title: Sinogene is a credible ViaGen competitor
  body: Sinogene has demonstrated comparable technical capabilities to ViaGen at similar pricing, with the additional achievement
    of cloning an Arctic wolf in 2022. Should Sinogene pursue US market entry, Colossal's only near-term revenue source (pet
    cloning) would face direct price and capability competition. ViaGen's US brand and regulatory familiarity are the primary
    barriers, but neither is permanent.
  claimRefs:
  - CP008
  - CP009
  - CP012
  - CP029
- type: risk
  title: Non-profit competitors have structural grant advantage
  body: Revive & Restore and SDZWA can access USFWS, NSF, and philanthropic grants that are structurally unavailable to Colossal
    as a for-profit company. If the de-extinction and conservation genomics sector receives substantial government investment,
    non-profit competitors will capture a disproportionate share. This structural disadvantage is not resolvable without a
    change in Colossal's legal structure or a specifically negotiated government contract.
  claimRefs:
  - CP021
  - CP035
  - CP038
