  claims:
  - id: CP001
    statement: No other commercially-funded entity has an active portfolio of de-extinction programs at a comparable scale
      to Colossal Biosciences as of May 2026.
    type: inferred
    topic: competitive-landscape
    sourceRefs:
    - SP003
    - SP018
    confidence: medium
    freshness: current
  - id: CP002
    statement: Revive & Restore (R&R), founded in 2012 in San Francisco, is the only other significant de-extinction organization
      and operates as a non-profit relying on donor and grant funding, not venture capital.
    type: observed
    topic: competitive-landscape
    sourceRefs:
    - SP003
    - SP004
    confidence: medium
    freshness: current
  - id: CP003
    statement: Revive & Restore's annual budget is not publicly disclosed; it is estimated below $10M based on the scale of
      its disclosed projects, far smaller than Colossal's $615M total raised.
    type: estimated
    topic: competitive-landscape
    sourceRefs:
    - SP003
    - SP004
    confidence: low
    freshness: current
  - id: CP004
    statement: R&R's Great Comeback project (passenger pigeon) and Black-footed Ferret Recovery are its most visible active
      programs; neither has published genome edits equivalent to Colossal's 45-trait mammoth CRISPR program.
    type: inferred
    topic: competitive-landscape
    sourceRefs:
    - SP003
    - SP004
    confidence: medium
    freshness: current
  - id: CP005
    statement: 'The academic labs that were Colossal''s primary technical competitors — Andrew Pask''s TIGRR Lab (Melbourne)
      and Beth Shapiro''s Paleogenomics Lab (UC Santa Cruz) — have been integrated into Colossal: Pask as CBO and Shapiro
      as CSO.'
    type: observed
    topic: team-and-moat
    sourceRefs:
    - SP001
    - SP002
    confidence: high
    freshness: current
  - id: CP006
    statement: BGI Genomics has published ancient elephant genome research and has the sequencing capacity to theoretically
      enter mammoth genomics, but has not announced a de-extinction program.
    type: inferred
    topic: competitive-landscape
    sourceRefs:
    - SP018
    confidence: low
    freshness: recent
  - id: CP007
    statement: ViaGen Pets (acquired by Colossal Nov 2025) and Sinogene (Beijing) are the two primary commercial pet cloning
      providers globally as of May 2026, both charging approximately $50K per dog and $35K per cat.
    type: observed
    topic: pet-cloning-competition
    sourceRefs:
    - SP006
    - SP015
    confidence: medium
    freshness: current
  - id: CP008
    statement: Sinogene offers dog cloning for approximately $50,000 and cat cloning for approximately $35,000, matching ViaGen
      pricing; Sinogene primarily serves China and international markets while ViaGen focuses on the US.
    type: observed
    topic: pet-cloning-competition
    sourceRefs:
    - SP006
    - SP015
    confidence: medium
    freshness: current
  - id: CP009
    statement: Sinogene, founded around 2012, has cloned over 1,000 dogs and cats, as well as horses, a mink (2019), and an
      Arctic wolf (2022), demonstrating technical capability in endangered-species cloning.
    type: third-party-reported
    topic: pet-cloning-competition
    sourceRefs:
    - SP015
    - SP018
    confidence: low
    freshness: recent
  - id: CP010
    statement: Sooam Biotech (South Korea), whose founder Hwang Woo-suk was convicted of research fraud in 2009, pioneered
      commercial dog cloning but its current market position is unclear.
    type: third-party-reported
    topic: pet-cloning-competition
    sourceRefs:
    - SP018
    confidence: medium
    freshness: historical
  - id: CP011
    statement: Newer entrants like Peternity Genetics (which sinogene.org now redirects to) offer pet cloning, DNA preservation,
      and gene editing services, indicating a competitive fringe with unverified scale.
    type: observed
    topic: pet-cloning-competition
    sourceRefs:
    - SP015
    confidence: low
    freshness: current
  - id: CP012
    statement: ViaGen's primary competitive advantage over Sinogene is its US market brand and established client relationships;
      Sinogene's advantage is lower Asian operating costs and broader cloning portfolio including horses and exotic species.
    type: inferred
    topic: pet-cloning-competition
    sourceRefs:
    - SP006
    - SP015
    confidence: medium
    freshness: current
  - id: CP013
    statement: Editas Medicine, Beam Therapeutics, CRISPR Therapeutics, and Intellia Therapeutics — the four largest standalone
      CRISPR biotechs — are all exclusively focused on human therapeutics and do not compete with Colossal in conservation
      genomics.
    type: observed
    topic: crispr-tools-competition
    sourceRefs:
    - SP007
    - SP008
    - SP010
    - SP024
    confidence: high
    freshness: current
  - id: CP014
    statement: Editas Medicine's market capitalization had declined to approximately $500M by mid-2025, reflecting commercial
      disappointment after it paused independent development of its LCA10 ocular gene therapy program in November 2022.
    type: third-party-reported
    topic: crispr-tools-competition
    sourceRefs:
    - SP008
    - SP019
    confidence: medium
    freshness: recent
  - id: CP015
    statement: CRISPR Therapeutics, in partnership with Vertex Pharmaceuticals, received FDA approval for Casgevy (exa-cel)
      in December 2023 — the first approved CRISPR therapy — for sickle cell disease and beta-thalassemia.
    type: observed
    topic: crispr-tools-competition
    sourceRefs:
    - SP010
    - SP023
    confidence: high
    freshness: recent
  - id: CP016
    statement: Benchling, with an estimated valuation of approximately $6 billion (2021), is the dominant competitor to Form
      Bio in life-science lab data management, with deep penetration in top-tier pharma and biotech.
    type: third-party-reported
    topic: informatics-competition
    sourceRefs:
    - SP009
    confidence: medium
    freshness: recent
  - id: CP017
    statement: Intellia Therapeutics focuses exclusively on in-vivo CRISPR gene editing for human disease and has no announced
      conservation-genomics, agricultural, or non-therapeutic applications.
    type: observed
    topic: crispr-tools-competition
    sourceRefs:
    - SP024
    confidence: medium
    freshness: current
  - id: CP018
    statement: Colossal's CRISPR tools are adapted for large-mammal and avian genome reconstruction in conservation settings
      — a niche not addressed by any of the major CRISPR therapeutic companies.
    type: inferred
    topic: differentiation
    sourceRefs:
    - SP001
    - SP017
    confidence: medium
    freshness: current
  - id: CP019
    statement: San Diego Zoo Wildlife Alliance's Frozen Zoo holds living cell cultures from over 1,100 species and is the
      world's largest cryopreservation biobank for endangered species as of 2026.
    type: observed
    topic: conservation-genomics-incumbents
    sourceRefs:
    - SP005
    - SP011
    confidence: medium
    freshness: current
  - id: CP020
    statement: Unlike Colossal, SDZWA's Frozen Zoo focuses on cryopreservation of living endangered species for genetic rescue,
      not de-extinction of already-extinct species; the two approaches are complementary but compete for conservation-funding
      narratives.
    type: inferred
    topic: conservation-genomics-incumbents
    sourceRefs:
    - SP005
    - SP011
    confidence: medium
    freshness: current
  - id: CP021
    statement: SDZWA's annual operating budget exceeds $250 million and it operates as a non-profit with deep institutional
      credibility, giving it preferential access to government and philanthropic conservation grants relative to a for-profit
      de-extinction company.
    type: estimated
    topic: conservation-genomics-incumbents
    sourceRefs:
    - SP005
    confidence: low
    freshness: recent
  - id: CP022
    statement: Colossal's primary competitive moat is its assembled multi-disciplinary team across molecular biology, evolutionary
      genomics, computational biology, cryopreservation, and reproductive science, which cannot be easily replicated.
    type: inferred
    topic: team-and-moat
    sourceRefs:
    - SP001
    - SP002
    confidence: medium
    freshness: current
  - id: CP023
    statement: Colossal holds or has filed for patents on its mammoth-specific CRISPR edits (cold-tolerance traits), thylacine
      genome assembly, and elephant somatic cell nuclear transfer protocols; full IP scope is not publicly disclosed.
    type: inferred
    topic: ip-moat
    sourceRefs:
    - SP001
    confidence: low
    freshness: current
  - id: CP024
    statement: Colossal's In-Q-Tel and USITF government investor relationships suggest potential for government-funded applications
      of its genomic tools that would not be available to purely academic or non-profit competitors.
    type: inferred
    topic: government-relationships
    sourceRefs:
    - SP002
    confidence: low
    freshness: current
  - id: CP025
    statement: Colossal's brand and media profile (TIME100 Most Influential Companies 2023; global press) gives it a marketing
      advantage in pet cloning and licensing discussions that smaller cloning companies cannot match.
    type: observed
    topic: brand-moat
    sourceRefs:
    - SP001
    - SP022
    confidence: medium
    freshness: recent
  - id: CP026
    statement: 'Critics argue that Colossal''s de-extinction claims are scientifically exaggerated: the Ars Technica editorial
      (April 2025) and The Conversation''s Moa piece argue the species revived are ''functional proxies,'' not true de-extinction,
      undermining differentiation claims.'
    type: third-party-reported
    topic: adverse-competitive
    sourceRefs:
    - SP012
    - SP014
    confidence: medium
    freshness: current
  - id: CP027
    statement: The Conversation's piece on the Moa project characterizes Colossal's program as 'bad science and ethically
      questionable,' representing an adversarial view from conservation scientists that could shift funder sentiment.
    type: third-party-reported
    topic: adverse-competitive
    sourceRefs:
    - SP014
    confidence: medium
    freshness: current
  - id: CP028
    statement: Scientists who have criticized Colossal's work claim they were targeted by a smear campaign; if these allegations
      gained institutional traction they could create reputational risk that smaller competitors without a high public profile
      would not face.
    type: third-party-reported
    topic: adverse-competitive
    sourceRefs:
    - SP013
    - SP016
    confidence: medium
    freshness: current
  - id: CP029
    statement: Sinogene's ability to clone endangered species (Arctic wolf, 2022) without Colossal's level of fundraising
      and public controversy suggests targeted cloning work can be accomplished more quietly and at lower cost.
    type: inferred
    topic: adverse-competitive
    sourceRefs:
    - SP015
    - SP018
    confidence: medium
    freshness: recent
  - id: CP030
    statement: Benchling's $6B valuation and established customer base in top-tier pharma and biotech creates high switching
      costs that Form Bio must overcome; Form Bio's customer base and revenue are not publicly disclosed.
    type: inferred
    topic: informatics-competition
    sourceRefs:
    - SP009
    confidence: medium
    freshness: recent
  - id: CP031
    statement: If CRISPR Therapeutics' platform were licensed for agricultural or conservation applications, it could create
      a well-resourced competitor with existing regulatory experience, but no such licensing has been announced.
