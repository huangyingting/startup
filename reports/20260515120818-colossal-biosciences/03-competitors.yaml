    - QP018
    diligenceAsk: Request ViaGen monthly cloning volume, revenue, and churn from Colossal management; cross-check against
      ViaGen staffing and capacity indicators.
  - type: missing-source
    description: Revive & Restore annual budget and Sinogene's revenue, operational scale, and US market-entry plans are not
      publicly available; both organizations are private/non-profit and do not publish financials.
    relatedQuestionRefs:
    - QP002
    - QP018
    diligenceAsk: Monitor Sinogene press releases and trade publications; check US trademark filings and USDA import records
      for cloning activity.
  - type: missing-source
    description: Colossal's full IP portfolio (granted vs. pending patents, claim scope) has not been publicly disclosed;
      only general descriptions of mammoth and thylacine IP exist in public press.
    relatedQuestionRefs:
    - QP004
    - QP012
    diligenceAsk: Request complete patent portfolio from Colossal legal; search USPTO and EPO for Colossal Biosciences filings;
      assess claim scope vs. prior art.
  - type: missing-source
    description: Form Bio's ARR, customer count, and competitive win/loss data vs. Benchling are not publicly available.
    relatedQuestionRefs:
    - QP006
    diligenceAsk: Request Form Bio financial and customer metrics from Colossal management; review Benchling's public case
      studies for any mentions of Form Bio as a competitor.
  - type: missing-source
    description: No government procurement records, RFPs, or contract awards related to de-extinction have been identified
      for the US, EU, or Australian governments.
    relatedQuestionRefs:
    - QP024
    - QP036
    diligenceAsk: Search USASpending.gov, SAM.gov, and AIHW for de-extinction or conservation genomics contract awards; review
      USFWS and DOI budget justifications.
