  topStrengths:
    - >-
      World-class scientific team (George Church, Beth Shapiro, Andrew Pask) with irreplaceable aDNA and de-extinction
      expertise; no competing organization has comparable depth.
    - >-
      Three validated technology spinouts (Form Bio, Astromech, Breaking Bio) collectively worth ~$2.1B in disclosed
      enterprise value, providing a meaningful intrinsic value floor.
    - >-
      Government endorsement via $17M in DARPA and NIH grants signals national security and conservation legitimacy;
      ViaGen acquisition adds the only existing commercial revenue base.
  topRisks:
    - >-
      $10.3B valuation at ~$10M ARR implies a 1,000x revenue multiple — an order of magnitude above comparable public
      CRISPR biotechs; probability-weighted fair value (~$8.5B) is below the entry price.
    - >-
      De-extinction milestones (2028 mammoth target) have never been achieved anywhere and depend on resolving
      technical, regulatory (FDA IGA, CITES, ESA), and ethical barriers simultaneously.
    - >-
      A $615M preference stack means any exit below ~$1.5B returns nothing to common shareholders; achieving a 3x return
      for new investors requires a $30B+ exit with no precedent in synthetic biology.
  unresolvedGaps:
    - >-
      Full capitalization table with liquidation preference waterfall is not publicly disclosed; essential for return
      modeling.
    - ViaGen Pets audited financial statements are unavailable; ARR estimate relies on pricing and inferred volume.
    - >-
      Astromech equity stake percentage held by Colossal is not publicly confirmed; sum-of-parts valuation has material
      uncertainty.
    - DARPA contract renewal probability and terms are not disclosed; government revenue visibility is limited.
    - Independent legal opinion on CITES/ESA release prohibition for de-extinction species is absent from public record.
