    severity: material
    topic: ViaGen Pets revenue (TM002 sizing table — pet cloning row)
    missingEvidence: ViaGen Pets annual revenue, clone volume, customer count, and pricing history are not publicly disclosed.
      The pricing data on the ViaGen website ($35K–$50K per clone) provides a price point but not a market size. No independent
      market estimate exists for companion animal genomics and cloning.
    whyItMatters: ViaGen is the only confirmed near-term commercial revenue source for Colossal; without revenue or volume
      data, modeling ViaGen's contribution to valuation is impossible.
    relatedQuestionRefs:
    - QM006
    - QM024
    relatedTableRefs:
    - TM002
  - type: missing-source
    severity: material
    topic: Government contract pipeline disclosure
    missingEvidence: No publicly confirmed SBIR, FWS, DOD, or NIH contract or grant has been identified for Colossal Biosciences
      as of May 2026. The In-Q-Tel and USITF investments confirm government interest but do not confirm contract revenue.
    whyItMatters: Government contract revenue would be a key indicator of Colossal's ability to convert its conservation narrative
      into non-dilutive cash flow; absence of disclosed contracts limits revenue modeling.
    relatedQuestionRefs:
    - QM010
    - QM018
  - type: missing-source
    severity: material
    topic: Independent TAM for de-extinction and conservation genomics
    missingEvidence: No independent analyst firm has published a dedicated market sizing study for the de-extinction or conservation
      genomics sub-segment as of the report date. Broad synthetic biology and gene editing TAMs are presented as proxies but
      do not disaggregate Colossal's relevant slice.
    whyItMatters: Without an independent TAM, valuation analysis must rely on company narrative and comparable-company multiples
      rather than bottom-up market penetration modeling.
    relatedQuestionRefs:
    - QM008
    - QM017
    - QM020
  - type: missing-source
    severity: minor
    topic: Regulatory engagement with FWS/EPA/USDA on de-extinct animal release
    missingEvidence: No public record of Colossal or any regulator initiating a formal rulemaking or pre-consultation process
      for the environmental release of a de-extinct megafauna has been identified.
    whyItMatters: Regulatory risk is the single largest ceiling on the de-extinction TAM; the absence of any regulatory pathway
      initiation suggests this constraint will persist for the foreseeable investment horizon.
    relatedQuestionRefs:
    - QM016
  - type: missing-source
    severity: minor
    topic: Form Bio and Astromech revenue and growth metrics
    missingEvidence: Form Bio and Astromech do not disclose revenue, customer count, annual recurring revenue, or growth rate.
      Market positioning claims are based on press releases and investor announcements rather than independently verified
      financial data.
    whyItMatters: The valuation ascribed to Astromech ($2B) and Form Bio ($40M raised) represents a meaningful fraction of
      the Colossal ecosystem; without revenue data, this value is based purely on capital raised.
    relatedQuestionRefs:
    - QM021
    - QM025
