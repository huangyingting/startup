callouts:
- type: strength
  title: Biodiversity crisis tailwind is real and accelerating
  body: The IPBES 2019 assessment (1M+ species threatened), IUCN Red List (48,600+ threatened species), and 30×30 global commitments
    represent genuine macro tailwinds that are expanding government conservation budgets and philanthropic giving. Colossal's
    positioning as the only well-funded commercial de-extinction company benefits from this sustained media and policy narrative
    cycle.
  claimRefs:
  - CM011
  - CM012
  - CM035
- type: risk
  title: No established commercial market for de-extinction
  body: Colossal's $10.3B valuation rests primarily on investor option value rather than on revenues from an established market.
    The de-extinction segment has no confirmed buyers, no price discovery, and no regulatory path to market. Near-term commercial
    revenues (ViaGen, Form Bio, government grants) are real but likely insufficient to justify the current valuation on fundamentals
    alone.
  claimRefs:
  - CM001
  - CM019
  - CM007
- type: risk
  title: Regulatory void is a hard ceiling on de-extinction TAM
  body: There is no US, EU, or Australian regulatory framework for the wild release of a de-extinct or genetically modified
    megafauna animal. Until such a framework is established, Colossal cannot commercially deploy its core species-revival
    assets even if scientific milestones are met. The regulatory gap is structural, not just procedural, and may persist beyond
    the current investment horizon.
  claimRefs:
  - CM015
  - CM016
  - CM017
