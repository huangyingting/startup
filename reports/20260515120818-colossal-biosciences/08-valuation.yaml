- id: CV-SEC-02
  title: Current Financing and Valuation Context
  body: 'Colossal has raised $615M across five funding rounds since its September 2021 founding: $15M seed, $60M Series A
    (2022), $150M Series B (2023), $200M Series C (January 2025, co-led by TWG Global and Breyer Capital), plus approximately
    $90M in extension rounds and a $100M non-dilutive foundation pledge. The last-round post-money valuation reached $10.3B
    in September 2025, implying a 16.7x capital-raised multiple.


    Dilution and preference dynamics deserve scrutiny. With $615M raised at escalating valuations, early investors hold substantial
    liquidation preferences that would absorb the first $600M+ of any exit proceeds before common shareholders see meaningful
    return. The capital structure requires a multi-billion-dollar exit to generate strong returns for late-stage entrants.


    Government non-dilutive capital — approximately $11M from DARPA and $6.5M from NIH confirmed via USASpending.gov — provides
    validation but represents only 3% of total financing. The company relies predominantly on institutional venture capital,
    not grants or strategic corporate partnerships, to fund its burn.'
  claimRefs:
  - CV009
  - CV010
  - CV011
  - CV012
  - CV013
  - CV014
