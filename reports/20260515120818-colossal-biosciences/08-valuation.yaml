- id: CV-SEC-05
  title: Exit Readiness and Final Diligence Asks
  body: 'Exit optionality for Colossal is constrained by the same pre-revenue profile that makes the valuation challenging.
    An IPO path faces headwinds: the public biotech market has been unforgiving of pre-revenue science narratives post-2021,
    and Colossal would require either a live de-extinction milestone or a Ginkgo-style SPAC — with similar risk of post-listing
    de-rating. A strategic acquisition by a major conservation organization, government agency, or natural-history conglomerate
    (Disney, National Geographic parent Fox, Nature Conservancy) is plausible but would likely be at a meaningful discount
    to $10.3B.


    Pharmaceutical acquirers (Regeneron, Illumina, Thermo Fisher) might value the CRISPR delivery and embryology IP, but would
    have no strategic rationale for the de-extinction brand. The most realistic acquisition scenario involves a multi-billion
    dollar life-sciences or conservation-tech buyer paying $4-8B — well below the last-round price.


    Key remaining diligence asks: full capitalization table with liquidation preference waterfall; audited ViaGen financials;
    status of Astromech and Form Bio stake percentages; patent prosecution timelines; DARPA contract renewal terms; and independent
    legal opinion on CITES/ESA release-prohibition risk.'
