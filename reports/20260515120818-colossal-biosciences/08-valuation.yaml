company:
  name: Colossal Biosciences
  website: https://colossal.com
chapter:
  number: 8
  title: Valuation
  summary: Colossal Biosciences carries a $10.3 billion private-market valuation on $615 million raised, implying a 16.7x
    capital-raised multiple with zero product revenue. ViaGen Pets provides the only commercial cash flow (~$8-12M ARR estimated),
    while de-extinction timelines remain aspirational (2028 mammoth target). Comparable public CRISPR companies trade at deep
    discounts versus Colossal's implied revenue multiple. Base-case fair value is estimated at $6-9B with meaningful downside
    to $2-4B in a bear scenario and upside to $14-20B in a bull scenario contingent on the first de-extinction proof of concept.
    Exit options remain limited to an eventual IPO (challenging given pre-revenue status) or strategic acquisition. The investment
    thesis rests on optionality and brand, not on near-term cash flows.
sections:
- id: CV-SEC-01
  title: Investment Thesis and Anti-Thesis
  body: 'Colossal Biosciences'' investment thesis rests on three compounding optionalities: (1) the extinction-reversal platform
    could command a new asset class premium if even one de-extinction proof-of-concept succeeds; (2) the enabling toolkit
    — CRISPR delivery, embryology, gene editing infrastructure — has broad licensing and spinout value demonstrated by Form
    Bio ($40M raised), Astromech ($2B valuation), and Breaking Bio ($10.5M); (3) the Colossal brand is the only consumer-facing
    name in de-extinction, with ViaGen Pets already generating commercial pet-cloning revenue.


    The anti-thesis is equally cogent. At $10.3B, the valuation implies roughly $10B in discounted future cash flows from
    businesses that either do not exist yet (mammoth tourism, ecosystem services) or are tiny today (ViaGen ~$10M ARR). Public
    CRISPR comparables - Editas Medicine (EDIT), CRISPR Therapeutics (CRSP), Beam Therapeutics (BEAM) - trade at 5-15x trailing
    revenue with actual clinical programs. Colossal has no equivalent. A capital markets reset or de-extinction technical
    failure could re-price the equity by 60-80%.


    The fundamental question for any investor entering at the $10.3B mark is whether the option value of success justifies
    the price paid, given that failure scenarios outnumber success scenarios and the exit path (IPO or acquisition) faces
    structural headwinds.'
