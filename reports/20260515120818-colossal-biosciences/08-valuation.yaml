callouts:
- id: CV-CALL-01
  type: warning
  title: Valuation Disconnect
  body: At $10.3B with ~$10M ARR, Colossal trades at approximately 1,000x trailing revenue — an order of magnitude above even
    the most optimistic public CRISPR biotech comps. Any new investment at this price requires a disciplined entry framework
    or a significant valuation reset.
  claimRefs:
  - CV016
  - CV017
- id: CV-CALL-02
  type: insight
  title: Spinout Floor Value
  body: Form Bio, Astromech, and Breaking Bio together represent ~$2.1B in disclosed enterprise value. If Colossal retains
    majority stakes, spinout value alone provides a meaningful intrinsic value floor under any scenario.
  claimRefs:
  - CV019
  - CV020
- id: CV-CALL-03
  type: warning
  title: Preference Waterfall Risk
  body: With $615M in cumulative preferences, any exit below ~$1.5B would return little to common shareholders. Late-stage
    investors entering at $10.3B need a $12B+ exit to generate a reasonable return.
  claimRefs:
  - CV011
  - CV012
