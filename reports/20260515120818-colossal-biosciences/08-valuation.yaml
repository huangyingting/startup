- id: CV-SEC-04
  title: Bull / Base / Bear Scenarios
  body: 'Three scenarios bracket the plausible valuation range at a five-year horizon.


    Bull case ($14-20B, probability ~20%). Colossal delivers a living mammoth-phenotype calf by 2028 as planned, triggering
    a media and scientific sensation. The event catalyzes an IPO at 30-50x the ViaGen + spinout revenue base, unlocks conservation-agency
    licensing contracts worth $100M+, and drives a re-rating of the entire de-extinction option value. Government and foundation
    capital accelerates, reducing reliance on venture dilution.


    Base case ($6-9B, probability ~50%). De-extinction timelines slip 2-4 years but partial milestones maintain investor confidence.
    ViaGen grows to $20-30M ARR; Form Bio achieves meaningful SaaS revenue. An IPO or large strategic acquisition occurs in
    the 2028-2031 window at a modest premium to the last private round. Late-stage venture investors see 1-1.5x on capital,
    not the 10x returns originally targeted.


    Bear case ($2-4B, probability ~30%). A combination of technical failures, adverse regulatory rulings on GMO/de-extinction
    release, or a broader biotech market correction forces a down-round or distressed exit. ViaGen revenue stagnates under
    animal-rights pressure. The $10.3B valuation proves a peak-enthusiasm artifact. Late-stage investors suffer 60-80% impairment.
    The spinout portfolio provides some residual value floor.'
  claimRefs:
  - CV023
  - CV024
  - CV025
  - CV026
