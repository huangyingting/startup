callouts:
- type: strength
  title: Proven Commercial Revenue via ViaGen
  body: The November 2025 acquisition of ViaGen Pets gives Colossal its first clearly commercial, consumer-facing revenue
    stream with published pricing. At $50,000 per dog procedure, ViaGen provides immediate revenue floor while Colossal builds
    toward institutional and government channels.
  claimRefs:
  - CI011
  - CI006
- type: risk
  title: Zero Disclosed Revenue Against $10.3B Valuation
  body: Colossal carries a $10.3B valuation with no public revenue disclosure. Implied revenue multiples exceed 400× against
    even optimistic ViaGen revenue estimates. This gap between valuation and confirmed traction is the single largest financial
    underwriting risk for new investors.
  claimRefs:
  - CI031
  - CI038
- type: risk
  title: Financial Opacity Extends Beyond Normal Private-Company Norms
  body: The combination of government investors (In-Q-Tel), no SEC reporting obligation, and undisclosed acquisition terms
    (ViaGen) creates layered opacity. Government contract revenue may be classified, creating a structural asymmetry between
    insiders and prospective investors.
  claimRefs:
  - CI036
  - CI038
  - CI016
- type: recommendation
  title: Require Audited Financials and Full Cap Table in Data Room
  body: 'Any prospective investor should require at minimum: (1) audited consolidated financials for FY2024 and FY2025, (2)
    segment P&L separating ViaGen, R&D, and Form Bio, (3) full capitalization table post-Series C, and (4) cash position and
    12-month budget. Without these, underwriting relies on narrative, not numbers.'
  claimRefs:
  - CI026
  - CI034
  - CI037
