- id: s2
  title: Pet Cloning Operations and Unit Economics
  body: 'ViaGen Pets, operated by Colossal since November 2025, is the company''s clearest commercial revenue engine. Published
    pricing positions dog cloning at $50,000 and cat cloning at $35,000, representing among the highest-ASP consumer-veterinary
    services globally. The cloning procedure involves somatic cell nuclear transfer (SCNT) using banked genetic material,
    requiring lab infrastructure, surrogate animals, veterinary oversight, and handling of live animals through to delivery.


    Gross margin is unconfirmed. Industry analogs for laboratory animal services and assisted reproduction suggest procedure-based
    margins of 35–60%, implying a gross profit of $12,250–$30,000 per dog and $12,250–$21,000 per cat. Volume is the key unknown:
    ViaGen has historically referred to ''thousands'' of successful clonings without specifying annual throughput. Revenue-generating
    capacity is constrained by surrogate animal availability and lab capacity, which limits meaningful scale. The equine market
    (horse racing and sport) has historically been ViaGen''s largest volume segment. Acquisition cost, working capital absorbed,
    and goodwill on the balance sheet are all undisclosed.'
  claimRefs:
  - CI011
  - CI012
  - CI013
  - CI017
  - CI028
  - CI034
  tableRefs:
  - TI002
  - TI003
  figureRefs:
  - FI002
- id: s3
  title: Capital Structure and Funding History
  body: 'Colossal''s capital formation has been rapid and consistent. SEC Form D filings (CIK 0001964433) confirm a Series
    B raise of $150M in January 2023 across 15 investors, subsequently amended via Form D/A to $173.8M total with 27 investors.
    Combined with the September 2021 seed ($15M), March 2022 Series A ($60M), January 2025 Series C ($200M), a reported $120M
    extension round, and a separate $100M Colossal Foundation raise, total capital formation exceeds $615M.


    Key strategic investors include Thomas Tull''s TWG Global, In-Q-Tel (CIA), ARCH Venture Partners, USITF, and a roster
    of celebrity LPs (Peter Jackson, Paris Hilton, Tom Brady, Chris Hemsworth). The diversity of investor types from defense
    intelligence to celebrity LPs signals brand-building and strategic adjacency as much as pure financial returns. The valuation
    trajectory ($10.3B by Sept 2025) represents a 68.7× step-up from the $150M Series B, driven by narrative and milestone
    milestones (dire wolf debut) rather than revenue growth. This valuation step-up without disclosed revenue is a key underwriting
    risk. Spinouts (Form Bio, Astromech, Breaking) complicate the consolidated balance sheet, as equity may be partially diluted
    outside the Colossal corporate entity.'
  claimRefs:
  - CI001
  - CI002
  - CI003
  - CI004
  - CI005
