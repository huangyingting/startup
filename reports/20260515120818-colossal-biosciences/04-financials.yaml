  evidenceGaps:
  - type: missing-source
    description: No audited financial statements or management accounts exist in the public domain for Colossal Biosciences;
      total revenue and gross margin cannot be verified.
    relatedQuestionRefs:
    - QI021
    diligenceAsk: Obtain FY2024 and FY2025 audited consolidated P&L including segment breakdown (ViaGen, R&D programs, Form
      Bio contribution).
  - type: incomplete-coverage
    description: ViaGen annual cloning volume data has not been publicly disclosed; revenue estimates are bounded only by
      published per-procedure pricing and anecdotal volume references.
    relatedQuestionRefs:
    - QI022
    diligenceAsk: 'Request ViaGen operational data: annual unit volume by species, waitlist size, lab utilization rate, and
      actuals gross margin.'
  - type: missing-source
    description: Form Bio has not disclosed ARR, customer count, or NRR; its valuation and contribution to Colossal's financial
      model cannot be independently assessed.
    relatedQuestionRefs:
    - QI023
    diligenceAsk: 'Obtain Form Bio standalone metrics: current ARR, paying logo count, NRR, and 12-month growth rate.'
  - type: incomplete-coverage
    description: Government contract revenue is implied by In-Q-Tel involvement but no contract values, agency names, or contract
      terms have been disclosed; some may be classified.
    relatedQuestionRefs:
    - QI024
    diligenceAsk: Request unclassified contract summary or investor briefing note describing contract scope, value, and renewal
      probability.
  - type: missing-source
    description: ViaGen acquisition cost and deal structure are not publicly disclosed; goodwill on the balance sheet and
      financing terms cannot be assessed.
    relatedQuestionRefs: []
    diligenceAsk: Review M&A transaction documents including purchase price, earn-out provisions, working capital adjustment,
      and any seller financing.
