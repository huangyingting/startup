company:
  name: Colossal Biosciences
  website: https://colossal.com
chapter:
  number: 4
  title: Financials
  summary: Colossal Biosciences has raised over $615M in equity since its 2021 founding, achieving a $10.3B valuation by late
    2025 while disclosing no revenue figures. The company's revenue architecture spans ViaGen Pets pet-cloning services (acquired
    Nov 2025; $35K–$85K per procedure), Form Bio computational biology SaaS (spun out; $40M raised), and undisclosed government/defense
    contracts facilitated by In-Q-Tel. With an estimated annual burn of $40–80M and no audited financials, underwriting depends
    on management projections rather than public data. The primary financial diligence blockers are total revenue, segment-level
    gross margins, and confirmation of current cash on hand.
sections:
- id: s1
  title: Revenue Model Architecture
  body: 'Colossal Biosciences operates a multi-stream revenue model spanning direct services, SaaS, government contracts,
    and IP licensing. The most mature stream is ViaGen Pets, acquired in November 2025, which provides premium pet cloning
    to consumer and equine markets at published prices of $35,000 per cat, $50,000 per dog, and approximately $85,000 per
    horse. This stream is the only revenue source with publicly confirmed unit pricing.


    Form Bio, a computational biology SaaS spinout, represents Colossal''s software-driven revenue ambition. It raised $40M
    independently and sells workflow tools to biotech research teams, but has not disclosed ARR or customer count. Government-facing
    revenue is implied by In-Q-Tel''s equity investment, suggesting aligned R&D contracts with intelligence and defense agencies,
    though terms remain undisclosed. IP licensing from CRISPR and genomics patents is at an early pre-commercial stage. Taken
    together, the revenue mix appears heavily weighted toward high-ASP low-volume services (ViaGen) in the near term, with
    SaaS and licensing potential in later periods. No blended revenue figure has been made public.'
  claimRefs:
  - CI011
  - CI012
  - CI013
  - CI014
  - CI015
  - CI016
  - CI018
  - CI019
  tableRefs:
