callouts:
- type: strength
  title: Dire Wolf Delivery Is a Landmark Platform Validation
  body: Three living dire wolf animals (2024-2025) demonstrate end-to-end pipeline viability for canid de-extinction, validating
    SCNT + multiplex CRISPR + surrogate reproductive delivery in a non-model organism.
  claimRefs:
  - CE007
  - CE008
- type: risk
  title: Elephant iPSC Gap Is the Single Largest Mammoth Blocker
  body: No lab globally has successfully established induced pluripotent stem cells (iPSCs) in Asian elephants. Without them,
    Colossal must rely on lower-efficiency SCNT from adult somatic cells, compressing iteration rate given the 22-month gestation
    cycle.
  claimRefs:
  - CE021
  - CE022
- type: insight
  title: Form Bio Creates Platform Defensibility Beyond Species Delivery
  body: Form Bio as an independent SaaS business creates a recurring revenue stream and broader market credibility for Colossal's
    computational tools, regardless of whether individual species milestones are met on schedule.
  claimRefs:
  - CE014
  - CE015
