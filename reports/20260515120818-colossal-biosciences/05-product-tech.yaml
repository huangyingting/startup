    diligenceAsk: Obtain unpublished data or management presentation on elephant fibroblast editing efficiency, off-target
      rates, and iPSC derivation progress.
  - type: missing-source
    description: No independent verification of the dire wolves' genetic authenticity, health status, or behavioral normalcy
      has been published; only company-issued communications exist.
    relatedQuestionRefs:
    - QE022
    diligenceAsk: Request independent veterinary and genomic audit of the three dire wolf animals to confirm genotype and
      phenotype claims.
  - type: incomplete-coverage
    description: SCNT efficiency comparison between canid (demonstrated) and elephant (unknown) programs is not available
      in public literature, making technical risk calibration for the mammoth 2028 target impossible.
    relatedQuestionRefs:
    - QE023
    diligenceAsk: Request internal data on elephant SCNT efficiency trials including attempts, embryo quality, and any failed
      transfer outcomes.
