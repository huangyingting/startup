            body: >-
              Colossal's status as a private company means that none of its core financial metrics — total revenue,
              segment gross margins, net loss, or cash on hand — are publicly available. This creates an unusually broad
              set of underwriting uncertainties. Total revenue is the most critical gap: without it, no burn multiple,
              growth rate, or capital efficiency calculation is possible. The ViaGen acquisition cost has not been
              disclosed, making it impossible to assess goodwill impairment risk or the financing terms used.


              Form Bio's ARR and net revenue retention (NRR) are unknown; without these, the SaaS spinout cannot be
              independently valued. Government contract revenue is potentially classified, posing a structural opacity
              issue beyond normal private-company opacity. The cap table — showing exact ownership stakes across 27+
              investors identified in the Form D/A — has not been published, making dilution and investor return path
              analysis impossible. The planned use of the $200M Series C and any remaining Series B capital has been
              described broadly as 'de-extinction programs and technology commercialization' without a specific
              deployment roadmap. Together, these gaps mean underwriting Colossal requires a combination of data room
              access, management presentation, and third-party financial audit that is standard for late-stage private
              companies.
