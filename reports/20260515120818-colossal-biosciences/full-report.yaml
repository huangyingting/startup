      - number: '3.3'
        title: Pet Cloning Segment Competition
        blocks:
          - type: paragraph
            body: >-
              ViaGen Pets, acquired by Colossal in November 2025, and Sinogene (Beijing) are the two dominant commercial
              pet cloning providers globally. ViaGen's pricing is approximately $50,000 per dog and $35,000 per cat,
              while Sinogene offers comparable pricing for its primarily Chinese and international customer base.
              Sinogene, founded around 2012, has cloned over 1,000 dogs and cats, plus horses, and notably cloned an
              Arctic wolf in 2022 — demonstrating technical capability in endangered species that Colossal does not
              claim in this segment. Sooam Biotech (South Korea) pioneered commercial dog cloning (2005 Snuppy first
              cloned dog) but its market position is clouded by founder Hwang Woo-suk's fraud conviction in 2009. Newer
              entrants like Peternity Genetics offer DNA preservation and gene editing, but at unspecified scale.
              ViaGen's primary competitive advantage over Sinogene is US brand trust and its established Austin-based
              operations; Sinogene benefits from lower Asian operating costs. Revenue and cloning volumes for all
              players are privately held and undisclosed. There is no evidence Colossal/ViaGen has lost market share to
              Sinogene in the US market, though the risk of Sinogene entering the US market cannot be ruled out.
