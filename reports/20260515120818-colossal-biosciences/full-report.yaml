      - number: '4.5'
        title: Financial Benchmarks and Comparables
        blocks:
          - type: paragraph
            body: >-
              No direct financial comparable exists for a de-extinction company operating at Colossal's scale. Proxy
              benchmarks come from three adjacent categories: (1) synthetic biology tools companies (Twist Bioscience:
              ~$200M revenue, positive gross margin), (2) gene-editing therapeutics (Editas, CRISPR Therapeutics:
              burning $80–200M/year on clinical programs), and (3) premium veterinary services (Hill's Pet Nutrition,
              Heifer International: not directly comparable).


              Colossal's valuation of $10.3B on zero disclosed revenue implies a notional revenue multiple north of 400×
              if annual revenue is approximately $20–25M (ViaGen-derived estimate). Comparable early-stage biotech
              companies achieving this valuation typically have Phase 2 clinical data, platform IP exclusivity, or a
              strategic acquirer offer. Colossal's moat is narrative and IP-based rather than commercial traction-based,
              which is atypical for a $10B+ valuation. Financial analysts have questioned whether the valuation is
              supportable through a traditional DCF or EV/revenue framework. The burn multiple (total equity raised /
              estimated revenue) is not calculable without revenue disclosure, but likely exceeds 30× — a level that
              would be difficult to sustain in a risk-off funding environment.
