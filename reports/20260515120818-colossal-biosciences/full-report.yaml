              trades at ~$350M market cap on approximately $40M revenue (8-9x), CRISPR Therapeutics at ~$2.5B on $200M
              revenue (12x), and Beam at ~$1.8B on minimal revenue. Colossal's $10.3B valuation at ViaGen's estimated
              ~$10M ARR implies a 1,000x revenue multiple — an order of magnitude above any public comp.


              Framework 2 — Private synthetic biology. Ginkgo Bioworks went public at $15B in 2021 and has since
              declined to under $500M, a 97% drawdown, illustrating the gap between platform narrative and cash-flow
              reality. Modern Meadow, Bolt Threads, and Zymergen followed similar de-rating trajectories.


              Framework 3 — Spinout and IP sum-of-parts. Form Bio (~$100M implied), Astromech ($2B), and Breaking Bio
              ($10.5M) together contribute ~$2.1B in disclosed enterprise value. If Colossal retains majority stakes,
              spinout value alone supports a $1.5-2B intrinsic value floor. The residual $8B must come from the
              de-extinction platform, IP, government relationships, and brand optionality.
            claimRefs:
              - CV015
              - CV016
              - CV017
              - CV018
              - CV019
              - CV020
              - CV021
              - CV022
