        title: Risk Overview and Severity Framework
        blocks:
          - type: paragraph
            body: >-
              Colossal Biosciences operates in a legal, regulatory, and scientific environment with no established
              commercial precedent. De-extinction of any species has never been commercially approved by any regulatory
              authority globally. The company must navigate a multi-jurisdictional compliance environment spanning FDA
              IGA review (gene-edited animals), USDA APHIS oversight, ESA Section 9/10 permits (Asian elephant
              surrogate), CITES Appendix I requirements for international sample transport, and—for the thylacine
              program—Australian biosecurity and environmental law. Financial risks include a burn rate estimated at
              $40–60M per year against $615M raised, with ViaGen pet cloning providing only a fraction of operating
              costs. Key-person risks center on George Church (Harvard CSO), Beth Shapiro, and Ben Lamm. This risk
              profile is appropriate for a mission-driven deep-tech bet but must be weighed against the company's $10.3B
              valuation (September 2025) and pre-revenue-at-scale status. Residual risk is highest in the regulatory and
              funding categories, where no near-term resolution pathway is guaranteed. IUCN has noted that de-extinction
              programs could divert conservation funding from more cost-effective species protection efforts, presenting
              a reputational risk alongside the scientific one.
