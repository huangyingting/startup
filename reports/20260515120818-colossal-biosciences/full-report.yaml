    sections:
      - number: '1.1'
        title: Identity, Mission, and Corporate Structure
        blocks:
          - type: paragraph
            body: >-
              Colossal Biosciences Inc. was incorporated and publicly announced on September 13, 2021. The company is
              headquartered at a 55,000 sq ft research facility in Dallas, Texas, and conducts additional research in
              partnership with Harvard Medical School, the University of Melbourne, and an expanding network of global
              conservation labs. The legal entity is a Delaware-incorporated C-corporation. Colossal's stated mission is
              the de-extinction of lost species and the development of genomic tools for conservation and ecosystem
              restoration. As of May 2026, the company describes itself as the world's first de-extinction company and
              has completed the sequencing of multiple extinct species' genomes from ancient DNA samples. The company's
              website identifies six active de-extinction programs: woolly mammoth, thylacine (Tasmanian tiger), dodo,
              dire wolf, giant moa, and bluebuck. Its genome engineering platform applies CRISPR-Cas9 and base-editing
              technologies derived from Church's laboratory at Harvard and adapted by internal scientists. Colossal is a
              private company; it does not publicly disclose revenue or operating financials. ViaGen Pets, acquired in
              November 2025, functions as a commercial pet-cloning subsidiary and provides ongoing cash-generating
              operations alongside the primary research mission.
