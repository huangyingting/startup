  - number: 8
    title: Valuation
    sections:
      - number: '8.1'
        title: Investment Thesis and Anti-Thesis
        blocks:
          - type: paragraph
            body: >-
              Colossal Biosciences' investment thesis rests on three compounding optionalities: (1) the
              extinction-reversal platform could command a new asset class premium if even one de-extinction
              proof-of-concept succeeds; (2) the enabling toolkit — CRISPR delivery, embryology, gene editing
              infrastructure — has broad licensing and spinout value demonstrated by Form Bio ($40M raised), Astromech
              ($2B valuation), and Breaking Bio ($10.5M); (3) the Colossal brand is the only consumer-facing name in
              de-extinction, with ViaGen Pets already generating commercial pet-cloning revenue.


              The anti-thesis is equally cogent. At $10.3B, the valuation implies roughly $10B in discounted future cash
              flows from businesses that either do not exist yet (mammoth tourism, ecosystem services) or are tiny today
              (ViaGen ~$10M ARR). Public CRISPR comparables - Editas Medicine (EDIT), CRISPR Therapeutics (CRSP), Beam
              Therapeutics (BEAM) - trade at 5-15x trailing revenue with actual clinical programs. Colossal has no
              equivalent. A capital markets reset or de-extinction technical failure could re-price the equity by
              60-80%.


              The fundamental question for any investor entering at the $10.3B mark is whether the option value of
              success justifies the price paid, given that failure scenarios outnumber success scenarios and the exit
              path (IPO or acquisition) faces structural headwinds.
