      - number: '2.3'
        title: Buyer and Payer Segmentation
        blocks:
          - type: paragraph
            body: >-
              Colossal's buyer landscape is highly segmented by funding source, decision-maker, and adoption trigger.
              For ViaGen pet cloning, the buyer is an individual pet owner with significant disposable income and an
              emotionally driven purchase decision. These buyers are found globally but concentrated in the US, Western
              Europe, and East Asia. The purchase trigger is the death or near-death of a beloved pet; the payer is the
              owner directly. ViaGen's price points ($35,000–$100,000 per clone) self-select for high-net-worth
              individuals. For conservation genomics tools (Form Bio), the buyer is typically a research institution,
              zoo, or biotech company; the payer may be a government grant agency, foundation, or corporate R&D budget.
              Adoption triggers are scientific validation and platform ease-of-use. For Colossal's de-extinction
              narrative itself, the key "payers" are venture investors (already committed $615M) and philanthropic
              foundations. Real-world downstream buyers for a revived mammoth or thylacine product do not yet exist,
              though Colossal has discussed potential revenue from conservation tourism, ecosystem services, and
              government rewilding contracts. For government/defense contracts, the buyer is a US government agency
              (DOD, NIH, DOI via In-Q-Tel and USITF), with procurement driven by national security and conservation
              policy mandates. The buyer journey is long — multi-year contract cycles — and requires regulatory and
              security clearance compatibility.
            claimRefs: []
