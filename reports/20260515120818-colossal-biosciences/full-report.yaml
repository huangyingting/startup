      - number: '1.2'
        title: Founders, Leadership, and Key-Person Risk
        blocks:
          - type: paragraph
            body: >-
              Ben Lamm, co-founder and CEO, is a Dallas-based serial tech entrepreneur who has founded and sold six
              companies, including Chaotic Moon Studios (to Accenture, 2015), Team Chaos (to Zynga, 2016), Conversable
              (to LivePerson, 2018), and Hypergiant Industries (to Trive Capital, 2023). His net worth was estimated at
              $3.9 billion as of early 2026. Lamm brought the business-building and fundraising capability that
              translated George Church's scientific vision into a funded company. George Church, PhD (Harvard/MIT
              professor, Human Genome Project co-architect, and inventor of multiple CRISPR technologies) serves as the
              founding scientific co-author and scientific adviser. Church's name is central to Colossal's scientific
              credibility with investors and media, representing meaningful key-person risk. Beth Shapiro, PhD serves as
              Chief Science Officer; she is a MacArthur Fellow, National Academy of Sciences member, Rhodes Scholar, and
              holds a PhD from the University of Oxford, having spent a decade as Professor of Ecology and Evolutionary
              Biology at UC Santa Cruz and a Howard Hughes Medical Institute Investigator. Andrew Pask, PhD serves as
              Chief Biology Officer; he led the TIGGR (Thylacine Integrated Genomic Restoration Research) Lab at the
              University of Melbourne for over 25 years before joining Colossal full-time in 2025 when Colossal formally
              acquired that lab as Colossal Australia. No CFO or COO has been publicly named; the senior leadership team
              appears heavily science-weighted with Lamm as the sole business-focused executive in the public-facing
              team.
