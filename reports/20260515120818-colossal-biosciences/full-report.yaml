  foundingLocation: Dallas, Texas, USA
  headquarters: Dallas, Texas
  productSummary: >-
    Colossal's primary product is the de-extinction platform — a proprietary workflow combining ancient DNA sequencing,
    CRISPR multiplex gene editing, stem cell reprogramming, and surrogate reproductive biology. Commercial products to
    date include ViaGen Pets cloning services ($50K dogs, $35K cats, ~$85K horses) and Form Bio SaaS bioinformatics
    software. The company holds 14+ patent families and has spawned Astromech (CRISPR delivery, $2B valuation) and
    Breaking Bio ($10.5M).
  customerFocus: >-
