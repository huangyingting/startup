            body: >-
              The most material near-term regulatory risk is FDA's Intentional Genomic Alterations (IGA) in Animals
              framework. Any gene-edited animal intended for commercial use must undergo FDA premarket consultation.
              ViaGen's SCNT pet cloning replicates existing genomes without new gene insertions and may not require IGA
              review; however, Colossal's de-extinct animals (thylacine, mammoth, dire wolf) involve gene edits and
              would fall under IGA requirements. The USDA APHIS oversees research involving genetically modified animals
              through Docket APHIS-2023-0042, which is specifically relevant to genetically modified animal regulations.
              The ESA Section 9 prohibits take of listed species; Asian elephants (CITES Appendix I) used as mammoth
              surrogates create international permit requirements. CITES Appendix I listing of Asian elephants restricts
              international transport of biological materials. The federalregister.gov regulations on genetically
              modified animals establish the legal framework. Law Cornell USC 16 §1531 establishes ESA requirements.
              Australian EPBC Act 1999 and Biosecurity Act 2015 would govern any thylacine reintroduction. No CITES
              permits, ESA Section 10 incidental take permits, or FDA IGA premarket approvals have been publicly
              disclosed by Colossal as of May 2026.
