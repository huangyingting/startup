      - number: '2.2'
        title: Market Sizing — Multiple Lenses
        blocks:
          - type: paragraph
            body: >-
              Because Colossal spans multiple segments, a single TAM figure is misleading. Three sizing lenses are
              constructed below. Lens 1 covers the synthetic biology market (the broadest applicable horizontal): $16.2B
              globally in 2024, projected to reach $42.06B by 2030 at a 17.3% CAGR (Grand View Research, 2024). This
              market includes pharmaceutical biotechs, biofuel producers, and ag-biotech — segments largely irrelevant
              to Colossal's core programs. Colossal's Form Bio platform competes for the genomic tools and
              bioinformatics slice, which is a fraction of the total. Lens 2 covers gene editing/CRISPR: $4.44B in 2023,
              $7.59B by 2029 (MarketsandMarkets, 2024). Colossal's CRISPR IP, once validated in de-extinction contexts,
              could be licensed to pharma, agriculture, and livestock genetics buyers. Lens 3 covers conservation
              genomics and pet cloning, for which no authoritative independent market study exists. Pet cloning (the
              only segment with direct consumer revenue) prices dog clones at approximately $50,000 and cat clones at
              approximately $35,000 per animal (ViaGen Pets). The global market for companion animal genomics and
              cloning is fragmented and small, estimated in the low hundreds of millions annually by industry
              participants but not verified by independent data. Global conservation finance is estimated at
              approximately $75 billion annually by the Paulson Institute (2020 baseline), with US federal conservation
              spending anchored by the DOI and FWS programs (the FWS endangered species program alone manages
              multi-billion-dollar recovery operations). Colossal's government revenue opportunity is primarily from
              SBIR-style contracts, DOD dual-use grants (via In-Q-Tel), and partnership agreements with government
              conservation agencies.
            claimRefs: []
