      - number: '5.5'
        title: Technology Risks and Critical Dependencies
        blocks:
          - type: paragraph
            body: >-
              Three categories of technical risk stand out. First, reproductive biology constraints: the mammoth program
              depends on developing functional Asian elephant iPSCs, which has not been achieved by any lab globally.
              Without iPSCs, Colossal must rely on SCNT from adult somatic cells, which has lower efficiency. Second,
              off-target editing effects: multiplex editing of 7+ genes simultaneously increases the probability of
              unintended edits at off-target loci. Third, gestation and surrogate availability: the 22-month elephant
              gestation cycle and the endangered status of Asian elephants (only ~2,000 wild individuals remain) create
              an inherent bottleneck on trial-and-error cycles.


              The thylacine program benefits from using the fat-tailed dunnart (Sminthopsis crassicaudata) as surrogate
              — a small marsupial with a 12–14 day gestation. This makes iteration cycles dramatically shorter.
              Colossal's 2026 dunnart neonatal pouch migration paper confirms progress in understanding marsupial
              developmental biology needed for thylacine work. Critical external dependencies include: access to live
              Asian elephants for research, government permits for working with endangered species, and USDA/FDA
              oversight of intentional genomic alterations (IGA) in animals.
