          - type: figure
            figureRef: FV004
            claimRefs:
              - CV010
              - CV014
              - CV019
              - CV020
      - number: '8.6'
        title: Exhibits
        blocks:
          - type: callout
            title: Valuation Disconnect
            body: >-
              At $10.3B with ~$10M ARR, Colossal trades at approximately 1,000x trailing revenue — an order of magnitude
              above even the most optimistic public CRISPR biotech comps. Any new investment at this price requires a
              disciplined entry framework or a significant valuation reset.
            calloutType: insight
            claimRefs:
              - CV016
              - CV017
          - type: callout
            title: Spinout Floor Value
            body: >-
              Form Bio, Astromech, and Breaking Bio together represent ~$2.1B in disclosed enterprise value. If Colossal
              retains majority stakes, spinout value alone provides a meaningful intrinsic value floor under any
              scenario.
            calloutType: insight
            claimRefs:
              - CV019
              - CV020
          - type: callout
            title: Preference Waterfall Risk
            body: >-
              With $615M in cumulative preferences, any exit below ~$1.5B would return little to common shareholders.
              Late-stage investors entering at $10.3B need a $12B+ exit to generate a reasonable return.
            calloutType: insight
            claimRefs:
              - CV011
              - CV012
