      - number: '1.4'
        title: De-Extinction Programs and Scientific Milestones
        blocks:
          - type: paragraph
            body: >-
              Colossal's flagship woolly mammoth program targets 65 to 85 key gene differences between the Asian
              elephant genome and ancient mammoth samples recovered from permafrost. As of early 2026, the program had
              generated elephant-induced pluripotent stem cells (a first for the species, announced March 2024),
              produced woolly mice (gene-edited mice carrying seven mammoth-like coat genes; 38 pups born October 2024)
              as a pipeline validation step, and was conducting ovum retrieval and IVF experiments with Asian elephants.
              A 2028 target date for the first mammoth calf remains Colossal's public roadmap. The dire wolf program
              became Colossal's highest-profile milestone: three gene-edited gray wolf pups expressing 20 traits derived
              from an ancient dire wolf genome (a 13,000-year-old tooth and 72,000-year-old ear bone) were born —
              Romulus and Remus on October 1, 2024, and Khaleesi on January 30, 2025. The company publicly announced the
              pups in April 2025 to global media coverage. The dodo program achieved a significant avian milestone:
              Colossal became the first entity to culture Nicobar pigeon (the dodo's closest living relative) primordial
              germ cells long-term and produced gene-edited chickens lacking endogenous PGCs, establishing a surrogate
              pipeline. A five-to-seven year dodo timeline was reiterated in 2026. The thylacine program, led by
              Colossal Australia, achieved a mid-gestation marsupial embryo in an artificial uterus, a critical
              reproductive-biology milestone. Colossal's broader ecosystem of scientific activity spans 2,000+
              peer-reviewed publications citing its work and an IP portfolio of 500+ patents. The company partners with
              75+ conservation organizations and 40+ academic research programs.
