      - number: '5.4'
        title: IP Portfolio and Research Publication Strategy
        blocks:
          - type: paragraph
            body: >-
              Colossal's IP strategy centers on patents covering CRISPR editing methods applied to specific species,
              multiplex editing workflows, SCNT protocols for endangered species, and genomic tools developed through
              Form Bio. The March 2025 bioRxiv preprint explicitly notes a patent application filed on the multiplex
              mammoth-trait editing workflow. The team's collective portfolio spans more than 500 patents, though the
              precise count of patents directly owned by Colossal (versus by affiliated scientists like George Church)
              is not publicly segmented.


              Publication strategy follows a dual-track model: preprints posted immediately to bioRxiv for community
              access, followed by peer review in established journals. This approach enables rapid IP filing before
              public disclosure while also building scientific credibility. Genomic data and experimental protocols are
              deposited in public repositories (GenBank, NCBI) per stated open-science policy. Competitive landscape
              risk: CRISPR-Cas9 base IP is owned by the Broad Institute (Zhang lab) and UC Berkeley (Doudna lab),
              meaning Colossal's CRISPR IP is necessarily built on licensed or workaround foundational technology.
