      - number: '5.2'
        title: Species Programs and Technology Readiness
        blocks:
          - type: paragraph
            body: >-
              Colossal is advancing six distinct de-extinction programs at varying technology readiness levels (TRL).
              The dire wolf program achieved the highest milestone: two living pups (Romulus and Remus) were born in
              October 2024 via SCNT and surrogate, with a third (Khaleesi) in January 2025. These animals represent the
              first proof of phenotype-directed de-extinction at full organism delivery.


              The mammoth (woolly mammoth) program is the most complex, requiring editing of the Asian elephant genome
              across hundreds of loci. Challenges include: (a) the Asian elephant's 22-month gestation cycle, (b) no
              established iPSC (induced pluripotent stem cell) line for elephants, and (c) regulatory uncertainty for
              releasing large edited animals. The thylacine (Tasmanian tiger) program is technically advanced due to the
              small marsupial dunnart as a surrogate. The dodo and moa programs are earlier-stage but benefit from
              exceptional ancient genome quality from island specimens. The bluebuck program commenced in 2025 with
              first antelope OPU (ovum pickup) protocols successfully executed.


              Colossal has published in-progress research for each species on bioRxiv, consistent with its stated policy
              of open science and transparency.
