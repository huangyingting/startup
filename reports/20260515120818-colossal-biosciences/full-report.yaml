      - number: '2.4'
        title: Growth Drivers and Adoption Constraints
        blocks:
          - type: paragraph
            body: >-
              The primary macro-level demand driver is the global biodiversity crisis. The IPBES 2019 Global Assessment
              found that approximately 1 million species are at risk of extinction in coming decades — the most severe
              extinction event since the end-Cretaceous mass extinction. The IUCN Red List as of 2024 lists 48,600+
              species as threatened, including 44% of reef-building corals, 41% of amphibians, and 26% of mammals. This
              crisis is generating increased political will for conservation investment, expanding the pipeline of
              potential government contracts and conservation NGO partnerships for Colossal. CRISPR technology cost
              reductions are a second structural driver: the falling cost of genome sequencing and editing (from ~$100M
              per human genome in 2001 to ~$200 today) removes one of the historical barriers to conservation genomics
              at scale. Third, growing private philanthropic funding for conservation (Bezos Earth Fund, Ørsted,
              Salesforce's 1% pledges) creates a new class of buyers for conservation technology services. The
              AI/genomics convergence — embodied by Astromech — is a fourth tailwind, as computational biology platforms
              now enable analysis of ancient DNA at speeds and costs previously impractical. Constraints are
              substantial: there is no regulatory pathway for the wild release of a genetically modified or de-extinct
              animal in the US, EU, or Australia; this means the stated goal of "rewilding" mammoths or thylacines
              cannot be legally achieved without novel regulatory frameworks. Animal welfare concerns, most prominently
              regarding the use of Asian elephant surrogates for mammoth gestation, create ethical opposition from
              organizations such as PETA and the Humane Society. The conservation science community has raised repeated
              concerns about resource diversion — money spent on de-extinction could reduce funding for the 1,000+
              species actively threatened today. These constraints do not prevent Colossal from generating revenue from
              its commercial segments, but they cap the total addressable market for its highest-profile activities.
            claimRefs: []
