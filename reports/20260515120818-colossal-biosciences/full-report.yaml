  - number: 5
    title: Product & Technology
    sections:
      - number: '5.1'
        title: Core Gene-Editing Platform
        blocks:
          - type: paragraph
            body: >-
              Colossal's core technology platform is built on three integrated capabilities: (1) ancient genome
              reconstruction from preserved samples (permafrost, museum specimens, fossils), (2) multiplex CRISPR gene
              editing — including Cas9, base editing, and prime editing — applied to contemporary proxy species' cells,
              and (3) somatic cell nuclear transfer (SCNT) or embryo transfer to create living animals from edited cell
              lines. The CRISPR editing pipeline has achieved simultaneous editing of up to seven genes in mouse models,
              as documented in the March 2025 bioRxiv preprint 'Multiplex-edited mice recapitulate woolly mammoth hair
              phenotypes.' This study demonstrated loss-of-function mutations in Fgf5, Tgm3, and Fam83g producing
              woolly, textured, golden-brown hair in mice — a critical functional validation of the mammoth
              trait-insertion approach.


              The computational layer is powered by Form Bio, a spinout SaaS platform that automates genome alignment,
              guide RNA design, off-target analysis, and experimental workflow management. The team collectively holds
              over 500 patents in related fields and has contributed to more than 2,000 publications. As of 2026,
              Colossal has published original research across all six species programs on bioRxiv and in peer-reviewed
              journals.
            claimRefs:
              - CE001
              - CE002
              - CE003
              - CE004
              - CE005
              - CE006
