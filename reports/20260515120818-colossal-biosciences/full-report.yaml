      - number: '3.2'
        title: De-Extinction and Conservation Genomics Direct Peers
        blocks:
          - type: paragraph
            body: >-
              Revive & Restore (R&R), founded in 2012 and based in San Francisco, is the most visible parallel
              organization. R&R functions as a non-profit grant-funder and scientific coordinator for projects including
              the passenger pigeon Great Comeback and Black-footed Ferret Recovery. Unlike Colossal, R&R has no venture
              investors, no proprietary genome editing IP, and no commercial revenue path beyond grants and
              philanthropy. Its non-profit status gives it privileged access to USFWS grants and conservation foundation
              funding that is structurally unavailable to a for-profit like Colossal. Two academic labs that were
              natural competitors — the TIGRR Lab (Melbourne, Andrew Pask) and UC Santa Cruz Paleogenomics Lab (Beth
              Shapiro) — have been substantially co-opted into Colossal: Pask joined as CBO and Shapiro as CSO. BGI
              Genomics has published ancient elephant DNA research but has not announced a de-extinction program. The
              San Diego Zoo Wildlife Alliance's Frozen Zoo holds cell cultures from over 1,100 species, making it the
              world's largest genetic repository for endangered species; its scope is cryopreservation of living
              species, not resurrection of extinct ones.
