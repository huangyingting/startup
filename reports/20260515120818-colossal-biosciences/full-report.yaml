            body: >-
              Form Bio is Colossal's computational biology platform, spun out as an independent SaaS company with a $40M
              Series B in 2023. It provides cloud-based bioinformatics workflows covering genomic sequencing analysis,
              variant calling, CRISPR off-target prediction, and custom pipeline management. The platform is used
              internally by Colossal teams across all species programs and is commercially offered to external biotech
              R&D customers.


              The benchling.com ecosystem and similar laboratory informatics platforms are competitors to Form Bio in
              the broader lab informatics market, though Form Bio focuses specifically on genomics workflows rather than
              general ELN (electronic laboratory notebook) use cases. Form Bio's differentiation is its deep integration
              with CRISPR design and multiplexed editing workflows. The software's dependency on Colossal's proprietary
              methods is a potential moat but also a concentration risk if the customer base remains narrow.
