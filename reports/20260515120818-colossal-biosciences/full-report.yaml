companyProfile:
  summary: >-
    Colossal Biosciences is a Dallas-based genomics and de-extinction platform company co-founded in September 2021 by
    entrepreneur Ben Lamm and Harvard geneticist George Church. The company aims to reverse extinction for iconic
    species — woolly mammoth (2028 target), thylacine, dodo, dire wolf, moa, and bluebuck — using CRISPR gene editing,
    ancient DNA reconstruction, and surrogate reproductive biology. It has raised $615M across five rounds, reaching a
    $10.3B valuation in September 2025. Its only current commercial revenue stream is ViaGen Pets (acquired November
    2025), which clones pets and livestock. Three technology spinouts — Form Bio, Astromech, and Breaking Bio — have
    been launched from the platform.
  foundedDate: '2021-09-13'
  founders:
