      - number: '5.6'
        title: Technology Verdict and Diligence Gaps
        blocks:
          - type: paragraph
            body: >-
              The dire wolf delivery (three live animals, 2024–2025) is the single most important technical validation
              event in Colossal's history. It demonstrates that the SCNT + gene editing + surrogate reproductive
              pipeline can deliver a live de-extinct phenotype in a canid context. However, the canid biology is far
              simpler than elephant (mammoth) or avian (dodo, moa) reproductive biology. The dire wolf benchmark should
              not be extrapolated linearly to the mammoth.


              Key technology diligence gaps: (1) No published data on Asian elephant cell line establishment or iPSC
              derivation attempts; (2) No peer-reviewed paper on CRISPR editing efficiency in elephant cells; (3) The
              2028 mammoth birth target is described as a first-generation 'mammoth-like animal' — not a full genetic
              mammoth; (4) The viability, health, and behavioral complexity of the three dire wolves post-birth has not
              been independently verified. These gaps do not invalidate the technology but set realistic expectations
              for milestone timing.
