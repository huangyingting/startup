              - CV018
      - number: '8.4'
        title: Bull / Base / Bear Scenarios
        blocks:
          - type: paragraph
            body: >-
              Three scenarios bracket the plausible valuation range at a five-year horizon.


              Bull case ($14-20B, probability ~20%). Colossal delivers a living mammoth-phenotype calf by 2028 as
              planned, triggering a media and scientific sensation. The event catalyzes an IPO at 30-50x the ViaGen +
              spinout revenue base, unlocks conservation-agency licensing contracts worth $100M+, and drives a re-rating
              of the entire de-extinction option value. Government and foundation capital accelerates, reducing reliance
              on venture dilution.


              Base case ($6-9B, probability ~50%). De-extinction timelines slip 2-4 years but partial milestones
              maintain investor confidence. ViaGen grows to $20-30M ARR; Form Bio achieves meaningful SaaS revenue. An
              IPO or large strategic acquisition occurs in the 2028-2031 window at a modest premium to the last private
              round. Late-stage venture investors see 1-1.5x on capital, not the 10x returns originally targeted.


              Bear case ($2-4B, probability ~30%). A combination of technical failures, adverse regulatory rulings on
              GMO/de-extinction release, or a broader biotech market correction forces a down-round or distressed exit.
              ViaGen revenue stagnates under animal-rights pressure. The $10.3B valuation proves a peak-enthusiasm
              artifact. Late-stage investors suffer 60-80% impairment. The spinout portfolio provides some residual
              value floor.
            claimRefs:
              - CV023
              - CV024
              - CV025
              - CV026
              - CV027
              - CV028
              - CV029
              - CV030
          - type: table
            tableRef: TV005
            claimRefs:
              - CV023
              - CV024
              - CV025
              - CV026
      - number: '8.5'
        title: Exit Readiness and Final Diligence Asks
        blocks:
          - type: paragraph
            body: >-
              Exit optionality for Colossal is constrained by the same pre-revenue profile that makes the valuation
              challenging. An IPO path faces headwinds: the public biotech market has been unforgiving of pre-revenue
              science narratives post-2021, and Colossal would require either a live de-extinction milestone or a
              Ginkgo-style SPAC — with similar risk of post-listing de-rating. A strategic acquisition by a major
              conservation organization, government agency, or natural-history conglomerate (Disney, National Geographic
              parent Fox, Nature Conservancy) is plausible but would likely be at a meaningful discount to $10.3B.


              Pharmaceutical acquirers (Regeneron, Illumina, Thermo Fisher) might value the CRISPR delivery and
              embryology IP, but would have no strategic rationale for the de-extinction brand. The most realistic
              acquisition scenario involves a multi-billion dollar life-sciences or conservation-tech buyer paying $4-8B
              — well below the last-round price.


              Key remaining diligence asks: full capitalization table with liquidation preference waterfall; audited
              ViaGen financials; status of Astromech and Form Bio stake percentages; patent prosecution timelines; DARPA
              contract renewal terms; and independent legal opinion on CITES/ESA release-prohibition risk.
            claimRefs:
              - CV031
              - CV032
              - CV033
              - CV034
              - CV035
              - CV036
              - CV037
              - CV038
              - CV039
              - CV040
