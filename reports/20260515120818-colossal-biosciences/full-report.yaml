        title: Revenue Model Architecture
        blocks:
          - type: paragraph
            body: >-
              Colossal Biosciences operates a multi-stream revenue model spanning direct services, SaaS, government
              contracts, and IP licensing. The most mature stream is ViaGen Pets, acquired in November 2025, which
              provides premium pet cloning to consumer and equine markets at published prices of $35,000 per cat,
              $50,000 per dog, and approximately $85,000 per horse. This stream is the only revenue source with publicly
              confirmed unit pricing.


              Form Bio, a computational biology SaaS spinout, represents Colossal's software-driven revenue ambition. It
              raised $40M independently and sells workflow tools to biotech research teams, but has not disclosed ARR or
              customer count. Government-facing revenue is implied by In-Q-Tel's equity investment, suggesting aligned
              R&D contracts with intelligence and defense agencies, though terms remain undisclosed. IP licensing from
              CRISPR and genomics patents is at an early pre-commercial stage. Taken together, the revenue mix appears
              heavily weighted toward high-ASP low-volume services (ViaGen) in the near term, with SaaS and licensing
              potential in later periods. No blended revenue figure has been made public.
