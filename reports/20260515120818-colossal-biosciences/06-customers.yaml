company:
  name: Colossal Biosciences
  website: https://colossal.com
chapter:
  number: 6
  title: Customers
  summary: 'Colossal Biosciences serves three distinct customer categories: B2C pet cloning consumers via ViaGen Pets (acquired
    November 2025), conservation organizations and government agencies as grant funders and partners, and B2B biotech/pharma
    customers via Form Bio. ViaGen Pets generates the clearest near-term commercial revenue through ultra-high-net-worth individuals
    paying $35,000–$85,000 for companion animal cloning and $1,600+$150/year for DNA banking. Government grant customers (DARPA,
    NIH, totaling ~$17.5M confirmed) are non-dilutive but not commercial. Form Bio''s B2B customer list is undisclosed. Customer
    concentration on ViaGen''s niche B2C market is a key risk. No published NRR, GRR, or customer count data exists for any
    segment.'
sections:
- id: CU-SEC-01
  title: Customer Segments and Market Overview
  body: Colossal Biosciences operates three economically distinct customer segments. The first and most commercially mature
    segment is B2C pet cloning via ViaGen Pets, acquired in November 2025. ViaGen targets ultra-high-net-worth individuals
    willing to pay $35,000–$85,000 to clone a beloved companion animal. The second segment is institutional partnerships with
    conservation organizations (San Diego Zoo Wildlife Alliance, Revive & Restore) and government agencies (DARPA, NIH), which
    provide non-dilutive grant funding rather than commercial revenue. The third segment is B2B software via Form Bio, a bioinformatics
    SaaS platform serving pharma and research organizations with undisclosed customer counts and revenue. Each segment has
    fundamentally different economics, evidence bases, and diligence requirements. The pet cloning segment offers the clearest
    evidence of willingness to pay and operational scale, while the other segments remain largely opaque due to private-company
    disclosure norms. Colossal's public positioning emphasizes the conservation and de-extinction mission, which serves brand
    and partner recruitment more than direct revenue. CBInsights and Crunchbase both classify Colossal as pre-revenue at scale,
    with ViaGen providing the only confirmed consumer-facing revenue stream.
  claimRefs:
  - CU001
  - CU004
  - CU005
  - CU006
  - CU007
  tableRefs:
  - TU001
  figureRefs:
  - FU001
- id: CU-SEC-02
  title: 'Consumer Pet Cloning: ViaGen Pets Customer Evidence'
  body: 'ViaGen Pets, now operating under the Colossal umbrella, has been providing genetic banking and companion animal cloning
    since 2001 (as Genetic Savings & Clone) and commercial cloning since 2015. The company publishes its pricing on petcloning.com:
    $50,000 per dog, $35,000 per cat, and $85,000+ per horse. DNA banking is available at $1,600 initial plus $150 per year.
    The most widely documented client is Barbra Streisand, who cloned her Coton de Tulear, Samantha, in 2018, producing two
    clones named Violet and Miss Scarlett—covered across Reuters, Bloomberg, and The New York Times. Other high-profile interest
    has been reported but not all are confirmed production clones. Formal review platforms—Trustpilot, Yelp (San Marcos TX
    listing), and BBB—returned 404 errors or show no verified listings for ViaGen Pets, indicating limited formal consumer
    review infrastructure. Reddit discussions on r/pets and ViaGen''s Facebook reviews page show a mix of emotionally resonant
    positive testimonials from grieving pet owners and ongoing ethical skepticism about the practice. The absence of formal
    complaints on BBB and the lack of Trustpilot reviews is ambiguous: it could indicate satisfied clients or simply a clientele
    disinclined to use consumer review platforms.'
  claimRefs:
  - CU008
  - CU009
  - CU010
  - CU011
  - CU012
  - CU013
  - CU014
  - CU015
  - CU016
  tableRefs:
  - TU002
  - TU003
  figureRefs:
  - FU002
- id: CU-SEC-03
  title: Conservation and Government Partners as Customers
  body: Colossal's de-extinction mission has attracted institutional validation in the form of conservation partnerships and
    government research grants. San Diego Zoo Wildlife Alliance is a named collaborator on conservation genomics efforts.
    Revive & Restore, a non-profit dedicated to de-extinction, is a longstanding partner. These relationships confer scientific
    legitimacy and access to biological samples, but represent no direct revenue. On the government side, DARPA has awarded
    approximately $11 million in research funding for dire wolf DNA preservation and de-extinction feasibility (confirmed
    via USASpending.gov records). NIH has contributed approximately $6.5 million in grants to Colossal-associated researchers.
    Combined non-dilutive government funding confirmed publicly exceeds $17 million. These grant relationships follow milestone-based
    structures; continuation is not guaranteed. No formal paid commercial contracts with conservation organizations have been
    publicly disclosed. The relationship model is funder-awardee rather than customer-vendor, with Colossal benefiting from
    access to samples, facilities, and scientific credibility rather than recurring commercial payments.
  claimRefs:
  - CU017
  - CU018
  - CU019
  - CU020
  - CU021
  - CU022
  tableRefs: []
  figureRefs: []
- id: CU-SEC-04
  title: Form Bio B2B Customers
  body: Form Bio, spun out of Colossal Biosciences in 2022, provides cloud-based bioinformatics workflow automation targeting
    pharma, biotech, and research organizations. The platform has raised approximately $40 million and positions itself against
    Benchling, Dotmatics, and comparable laboratory informatics tools. Form Bio's pricing page (form.bio/pricing) lists enterprise
    and academic subscription tiers, confirming a commercial SaaS model. However, Form Bio has not published a customer list,
    case studies with named companies, or revenue figures. CBInsights and Crunchbase list Form Bio as an active Colossal spinout
    but provide no revenue range or customer count. LinkedIn profiles of Form Bio employees reference unnamed pharma and biotech
    deployments. The customer evidence for Form Bio is essentially limited to the company's own marketing content and the
    credibility signal from its $40 million fundraise. G2, Capterra, and other SaaS review platforms show no verified Form
    Bio listings as of May 2026. This constitutes a significant evidence gap for diligence purposes.
  claimRefs:
  - CU023
  - CU024
  - CU025
  - CU026
  - CU027
  - CU028
  tableRefs: []
  figureRefs:
  - FU003
- id: CU-SEC-05
  title: Retention, Satisfaction, and Concentration Risk
  body: 'ViaGen''s DNA banking service creates a recurring revenue mechanism at $150 per year per client. DNA banking clients
    often bank DNA years before deciding to proceed with cloning, creating an extended funnel and sticky annual relationship.
    Cloning itself is typically a one-time transaction per client. Colossal has not published retention rates, NRR, GRR, or
    NPS for any segment. The absence of published metrics for a company at $615 million in total funding is consistent with
    private-company norms but creates significant diligence gaps. Concentration risk is notable: ViaGen Pets and the consumer
    pet cloning market appear to represent the dominant source of near-term commercial revenue, creating dependence on a niche
    ultra-high-net-worth segment. This segment is inherently small, bounded by high price points, and subject to ethical and
    regulatory headwinds. PETA and animal welfare organizations have publicly criticized pet cloning on ethical grounds, citing
    animal welfare concerns about surrogate mothers and the existence of millions of shelter animals awaiting adoption. These
    critiques could constrain ViaGen''s addressable market over time. Government grant concentration on DARPA/NIH also creates
    risk if de-extinction research priorities shift.'
  claimRefs:
  - CU029
  - CU030
  - CU031
  - CU032
  - CU033
  - CU034
  - CU035
  tableRefs:
  - TU004
  - TU005
  figureRefs:
  - FU004
- id: CU-SEC-06
  title: Customer Evidence Limitations and Diligence Asks
  body: 'Colossal Biosciences has not published customer counts, segment revenue, retention rates, or NPS data as of May 2026.
    ViaGen''s absence from major consumer review platforms (Trustpilot, Yelp, BBB) limits independent verification of satisfaction
    and complaint history. Form Bio''s B2B customer base is entirely undisclosed. Key diligence asks include: (1) annual ViaGen
    cloning volumes by species with year-over-year trend; (2) DNA banking client count, enrollment rate, and annual storage
    renewal percentage; (3) Form Bio ARR, customer count, and churn rate; (4) government grant pipeline and probability of
    DARPA/NIH renewal; (5) any named conservation organization contracts with financial terms; (6) customer acquisition cost
    and lifetime value for ViaGen B2C segment.'
  claimRefs:
  - CU036
  - CU037
  - CU038
  - CU039
  - CU040
