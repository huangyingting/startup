callouts:
- id: callout-CU-01
  type: finding
  title: ViaGen Pets is the only confirmed revenue-generating customer segment
  body: ViaGen Pets, acquired November 2025, provides Colossal's most direct commercial revenue through dog cloning ($50K),
    cat cloning ($35K), and horse cloning ($85K+). All other segments — conservation partnerships, government grants, and
    Form Bio — either represent non-revenue relationships or have undisclosed customer metrics. This concentration on a niche,
    ethics-sensitive B2C market is a material risk factor.
  claimRefs:
  - CU001
  - CU008
  - CU032
- id: callout-CU-02
  type: gap
  title: 'No formal review platform presence for ViaGen: signal of limited accountability infrastructure'
  body: 'Trustpilot, Yelp, and BBB searches for ViaGen Pets returned 404 errors or no verified listings as of May 2026. This
    is ambiguous: it may indicate a clientele that does not use consumer review platforms (ultra-HNW individuals), or it may
    reflect limited transparency infrastructure. No formal complaints were found, but absence of complaints should not be
    interpreted as evidence of high satisfaction.'
  claimRefs:
  - CU013
  - CU014
  - CU015
