companyProfile:
  summary: >-
    Colossal Biosciences is a Dallas-based genomics and de-extinction platform company co-founded in September 2021 by entrepreneur Ben Lamm and Harvard geneticist George Church.
    The company aims to reverse extinction for iconic species — woolly mammoth (2028 target), thylacine, dodo, dire wolf, moa, and bluebuck — using CRISPR gene editing, ancient DNA
    reconstruction, and surrogate reproductive biology. It has raised $615M across five rounds, reaching a $10.3B valuation in September 2025. Its only current commercial revenue stream is
    ViaGen Pets (acquired November 2025), which clones pets and livestock. Three technology spinouts — Form Bio, Astromech, and Breaking Bio — have been launched from the platform.
  foundedDate: '2021-09-13'
  founders:
    - name: Ben Lamm
      role: CEO and Co-Founder
      background: Serial entrepreneur; previously founded Hypergiant (AI), Conversable (conversational AI), and other deep-tech ventures.
      claimRefs: [CO001, CO006]
    - name: George Church
      role: Co-Founder and Scientific Advisor
      background: Professor at Harvard Medical School; pioneer in genomics, CRISPR technology, and ancient DNA reconstruction. Also advises 50+ other companies.
      claimRefs: [CO001, CO006]
  foundingLocation: Dallas, Texas, USA
  headquarters: Dallas, Texas
  productSummary: >-
    Colossal's primary product is the de-extinction platform — a proprietary workflow combining ancient DNA sequencing, CRISPR multiplex gene editing, stem cell reprogramming, and
    surrogate reproductive biology. Commercial products to date include ViaGen Pets cloning services ($50K dogs, $35K cats, ~$85K horses) and Form Bio SaaS bioinformatics software.
    The company holds 14+ patent families and has spawned Astromech (CRISPR delivery, $2B valuation) and Breaking Bio ($10.5M).
  customerFocus: >-
    B2C pet and livestock owners via ViaGen; conservation organizations, governments, and defense agencies via research partnerships; synthetic biology and biopharma companies via spinout licensing.
  businessModel: >-
    Service revenue from pet/livestock cloning (ViaGen); SaaS software (Form Bio); government grants and contracts (DARPA, NIH); future aspirational revenue from de-extinction licensing,
    ecosystem services, and spinout equity appreciation.
  stage: late-stage private
  fundingStatus: >-
