      - number: '3.4'
        title: 基因组工具与使能技术竞争
        blocks:
          - type: paragraph
            body: >-
              主要 CRISPR 疗法公司——Editas Medicine、Beam Therapeutics、CRISPR Therapeutics 和 Intellia
              Therapeutics——并不是灭绝复活或保护基因组学的直接竞争者。四家公司都只聚焦人类疾病应用。到 2025 年中，Editas 的市值在 LCA10 项目商业化失望后已跌破 $500M；CRISPR
              Therapeutics 的 Casgevy 于 2023 年 12 月获得 FDA 批准（用于镰状细胞病），Intellia 和 Beam 则处于更早期临床项目。上述公司均未宣布保护或农业 CRISPR
              应用。它们代表 CRISPR 递送和编辑精度的技术前沿，理论上任何一家都可以把工具授权给非治疗用途，但这仍属推测。Benchling 以估计 $6 billion
              估值（2021）主导实验室信息学领域，并深度渗透顶级制药和生物技术公司。这对 Colossal 的 Form Bio 衍生公司构成直接竞争挑战；Form Bio 必须克服高切换成本和 Benchling
              的功能深度，才能赢得企业交易。
