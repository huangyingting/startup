      - number: '2.2'
        title: 市场规模测算——多重视角
        blocks:
          - type: paragraph
            body: >-
              Colossal 横跨多个分部，单一 TAM 数字会误导判断。以下构建三种测算视角。视角 1 是合成生物学市场（最宽的适用横向市场）：2024 年全球规模 $16.2B，预计 2030 年达到
              $42.06B，CAGR 为 17.3%（Grand View Research，2024）。该市场包括制药生物技术、生物燃料生产商和农业生物技术——这些分部与 Colossal
              核心项目大多无关。Colossal 的 Form Bio 平台竞争的是基因组工具和生物信息学切片，只占总市场一小部分。视角 2 是基因编辑 / CRISPR：2023 年 $4.44B，2029 年达到
              $7.59B（MarketsandMarkets，2024）。一旦在灭绝复活场景中得到验证，Colossal 的 CRISPR IP 可授权给制药、农业和牲畜遗传学买方。视角 3
              是保护基因组学和宠物克隆，目前没有权威独立市场研究。宠物克隆（唯一具备直接消费者收入的分部）中，狗克隆价格约 $50,000，猫克隆价格约 $35,000 / 只（ViaGen
              Pets）。全球伴侣动物基因组学和克隆市场分散且规模较小，行业参与者估计年规模在低数亿美元，但缺少独立数据验证。Paulson Institute 估计全球保护融资每年约 $75 billion（2020
              基线），美国联邦保护支出由 DOI 和 FWS 项目支撑（仅 FWS 濒危物种项目就管理数十亿美元恢复行动）。Colossal 的政府收入机会主要来自 SBIR 式合同、DOD 军民两用拨款（通过
              In-Q-Tel）以及与政府保护机构的合作协议。
