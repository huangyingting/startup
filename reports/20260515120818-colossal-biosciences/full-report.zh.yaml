      - number: '2.4'
        title: 增长驱动与采用约束
        blocks:
          - type: paragraph
            body: >-
              最主要的宏观需求驱动，是全球生物多样性危机。IPBES 2019 Global Assessment 发现，未来几十年约 1 million 个物种面临灭绝风险——这是白垩纪末大灭绝以来最严重的灭绝事件。截至
              2024 年，IUCN Red List 列出 48,600 多个受威胁物种，包括 44% 造礁珊瑚、41% 两栖动物和 26% 哺乳动物。危机正在提高保护投资的政治意愿，为 Colossal
              扩大潜在政府合同和保护 NGO 合作管线。CRISPR 技术成本下降是第二个结构性驱动：基因组测序和编辑成本下降（人类基因组从 2001 年约 $100M 降至今天约
              $200），移除了规模化保护基因组学的历史障碍之一。第三，保护领域私人慈善资金增长（Bezos Earth Fund、Ørsted、Salesforce 的 1% 捐赠承诺）创造了新一类保护技术服务买方。AI /
              基因组学融合——Astromech 正体现这一点——是第四个顺风，因为计算生物学平台现在能以过去不可行的速度和成本分析古
              DNA。约束同样很重：美国、欧盟或澳大利亚都没有基因改造或灭绝复活动物野外释放的监管路径；也就是说，所谓猛犸象或袋狼「野化」目标，没有新监管框架就无法合法落地。动物福利担忧也会引发 PETA、Humane
              Society 等组织的伦理反对，其中最突出的是用亚洲象代孕猛犸象妊娠。保护科学界反复担心资源转移——花在灭绝复活上的钱，可能减少当下 1,000 多个活跃受威胁物种的资金。这些约束不妨碍 Colossal
              从商业分部获得收入，但会压低其最受关注活动的总可用市场上限。
