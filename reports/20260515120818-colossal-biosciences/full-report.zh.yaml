        title: Form Bio 与生物信息基础设施
        blocks:
          - type: paragraph
            body: >-
              Form Bio 是 Colossal 的计算生物学平台，已分拆为独立 SaaS 公司，并在 2023 完成 $40M Series B。它提供云端生物信息工作流，覆盖基因组测序分析、变异识别、CRISPR
              脱靶预测和自定义管线管理。Colossal 内部所有物种项目团队都使用该平台；外部商业化则面向生物技术研发客户。


              在更广义的实验室信息化市场中，benchling.com 生态和类似实验室信息平台是 Form Bio 的竞争对手。不过 Form Bio 聚焦基因组工作流，而非通用 ELN（电子实验室笔记本）场景。Form
              Bio 的差异化来自与 CRISPR 设计和多重编辑工作流的深度集成。软件依赖 Colossal 的专有方法，可能形成护城河；但若客户基础持续狭窄，也会带来集中风险。
