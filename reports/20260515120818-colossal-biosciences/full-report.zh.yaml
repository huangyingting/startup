      - number: '7.6'
        title: 交叉风险综合判断
        blocks:
          - type: paragraph
            body: >-
              在生物技术投资中，Colossal 的风险画像很不寻常：科学风险（SCNT
              效率、古基因组重建）已有公开结果部分缓释，但监管、法律和财务风险仍然高。公司没有披露正式风险管理框架、监管沟通时间表或现金跑道预测。$10.3B
              估值给一个前所未有的使命定价了溢价，但投资者应确认：（1）灭绝复活动物的 FDA IGA 沟通状态；（2）ESA/CITES 许可状态；（3）袋狼的澳大利亚监管路径；（4）DARPA 续约前景；（5）Form
              Bio 与 ViaGen 合计 ARR 相对于烧钱速度的关系。IUCN 对灭绝物种复活作为保护策略的批判立场，会在公共讨论转向不利于公司核心使命时放大声誉风险。
            claimRefs:
              - CR036
              - CR037
              - CR038
              - CR039
              - CR040
      - number: '7.7'
        title: 附录图表
        blocks:
          - type: callout
            title: 全球尚无任何地方存在灭绝复活动物商业化监管先例
            body: >-
              FDA IGA、USDA APHIS、CITES、ESA 和澳大利亚生物安全框架都适用于 Colossal 的项目，但没有任何框架为灭绝复活物种发布过路径。Colossal
              正在开创一个尚不存在的监管类别，因此同时拥有机会（先发）和风险（无先例可循，可能遭遇敌意解读）。
            calloutType: insight
            claimRefs:
              - CR010
              - CR037
          - type: callout
            title: 猛犸象 2028 目标依赖一连串低概率步骤，任一步都可能独立失败
            body: >-
              基因组编辑 → 细胞培养 → SCNT → 胚胎植入 → 亚洲象 22-month 妊娠 → 活体出生，是连续链条。大型哺乳动物 SCNT 成功率通常低于 5%；每失败一轮大约增加 24
              个月。任何阶段出现单点堵塞，时钟都会重置。
            calloutType: insight
            claimRefs:
              - CR013
              - CR014
              - CR015
  - number: 8
    title: 估值
    sections:
      - number: '8.1'
        title: 投资逻辑与反向逻辑
        blocks:
          - type: paragraph
            body: >-
              Colossal Biosciences 的投资逻辑建立在三层复合期权上：（1）只要一个灭绝物种复活概念验证成功，灭绝物种复活平台就可能获得新资产类别溢价；（2）底层工具包——CRISPR
              递送、胚胎学、基因编辑基础设施——具备广泛授权和分拆价值，Form Bio（已融资 $40M）、Astromech（$2B 估值）和 Breaking Bio（$10.5M）已作出证明；（3）Colossal
              品牌是灭绝物种复活领域唯一面向消费者的名字，而 ViaGen Pets 已经产生商业宠物克隆收入。


              反向逻辑同样有力。$10.3B 估值意味着，市场把约 $10B 的贴现未来现金流寄托在尚不存在的业务（猛犸象旅游、生态系统服务）或今天仍很小的业务（ViaGen 约 ~$10M ARR）上。公开 CRISPR
              可比公司——Editas Medicine（EDIT）、CRISPR Therapeutics（CRSP）、Beam Therapeutics（BEAM）——拥有真实临床项目，交易价格为过去十二个月收入的
              5-15x。Colossal 没有同等基础。资本市场重置或灭绝物种复活技术失败，都可能让股权重估下跌 60-80%。


              对任何以 $10.3B 标记进入的投资者来说，根本问题是：在失败场景多于成功场景、退出路径（IPO 或收购）面临结构性逆风的情况下，成功期权价值是否足以支撑付出的价格。
            claimRefs:
              - CV001
              - CV002
              - CV003
              - CV004
              - CV005
              - CV006
              - CV007
              - CV008
