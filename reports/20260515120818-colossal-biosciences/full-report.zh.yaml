      - number: '8.4'
        title: 乐观 / 基准 / 悲观情景
        blocks:
          - type: paragraph
            body: >-
              五年维度下，三种情景界定了合理估值区间。


              乐观情景（$14-20B，概率 ~20%）。Colossal 按计划在 2028 交付一头活体猛犸象表型幼崽，引发媒体和科学轰动。该事件催化公司按 ViaGen + 分拆收入基础的 30-50x 完成
              IPO，释放价值 $100M+ 的保护机构授权合同，并推动整个灭绝物种复活期权价值重估。政府和基金会资本加速进入，降低对风险资本稀释的依赖。


              基准情景（$6-9B，概率 ~50%）。灭绝物种复活时间表延后 2-4 年，但部分里程碑维持投资者信心。ViaGen 增长至 $20-30M ARR；Form Bio 实现有意义的 SaaS 收入。公司在
              2028-2031 窗口完成 IPO 或大型战略收购，相比最后一轮私募价格有温和溢价。后期风险投资者获得 1-1.5x 资本回报，而不是最初瞄准的 10x。


              悲观情景（$2-4B，概率 ~30%）。技术失败、GMO/灭绝物种复活释放遭遇不利监管裁定，或更广泛生物技术市场修正，迫使公司下轮融资降估值或以困境方式退出。动物权益压力下 ViaGen 收入停滞。$10.3B
              估值被证明只是热情峰值产物。后期投资者减值 60-80%。分拆公司组合提供一定剩余价值底部。
            claimRefs:
              - CV023
              - CV024
              - CV025
              - CV026
              - CV027
              - CV028
              - CV029
              - CV030
