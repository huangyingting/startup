  productSummary: >-
    Colossal 的核心产品是灭绝复活平台：一套自研工作流，把古 DNA 测序、CRISPR 多重基因编辑、干细胞重编程和代孕繁殖生物学拼在一起。迄今商业产品包括 ViaGen Pets 克隆服务（狗 $50K、猫 $35K、马约
