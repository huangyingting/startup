      - number: '3.2'
        title: 灭绝复活与保护基因组学直接同业
        blocks:
          - type: paragraph
            body: >-
              2012 年成立、总部在 San Francisco 的 Revive & Restore（R&R），是最显眼的平行组织。R&R 作为非营利资助方和科学协调者运作，项目包括 passenger pigeon
              Great Comeback 和 Black-footed Ferret Recovery。不同于 Colossal，R&R 没有风险投资人、没有自有基因组编辑
              IP，也没有除拨款和慈善之外的商业收入路径。非营利身份让它能优先触达 USFWS 拨款和保护基金会资金，而这些资金对 Colossal 这样的营利公司存在结构性不可得。两个天然竞争者——TIGRR
              Lab（Melbourne，Andrew Pask）和 UC Santa Cruz Paleogenomics Lab（Beth Shapiro）——已大幅被 Colossal 纳入麾下：Pask 加入担任
              CBO，Shapiro 加入担任 CSO。BGI Genomics 发表过古象 DNA 研究，但尚未宣布灭绝复活项目。San Diego Zoo Wildlife Alliance 的 Frozen Zoo
              保存了 1,100 多个物种的细胞培养物，是全球最大濒危物种遗传库；其范围是现存物种冷冻保存，而非复活灭绝物种。
