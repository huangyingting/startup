      - number: '2.5'
        title: 市场规模缺口与矛盾
        blocks:
          - type: paragraph
            body: >-
              缺少独立的灭绝复活 TAM，是 Colossal 市场叙事中最重要的缺口。公司 $10.3B 估值隐含了来自某些活动的大量未来收入，而这些活动尚无既定定价、无确认买方，也没有通往市场的监管路径。Grand
              View Research 和 MarketsandMarkets 的合成生物学、CRISPR 市场估计属于宽泛横向市场，没有剥离保护或灭绝复活子分部。公开 CAGR
              预测（11–17%）是标准行业研究估计，历史上往往高估早期市场增长。保护基因组学和宠物克隆市场本身缺乏独立分析师覆盖。ViaGen 的收入、定价结构和年度克隆数量均未公开披露。Paulson Institute
              的 $75B 保护融资估计（2020）是全球总量，包含政府土地管理和保护区运营——这类支出与 Colossal 的直接商业相关性很低。Colossal
              估值所暗示的规模，与各分部近期可获得商业收入之间存在明显矛盾。投资人似乎是在按未来 IP 可选性（CRISPR 工具授权、基因组平台价值、媒体 / 品牌）给 Colossal
              定价，而非按当前或近期收入分部定价。公司市场叙事与实际近期可服务市场之间形成缺口，应作为实质性尽调问题保留。
            claimRefs: []
