              毛利率未确认。实验动物服务和辅助繁殖的行业类比显示，按项目计费的毛利率可能在 35–60%，意味着每只狗毛利 $12,250–$30,000、每只猫毛利
              $12,250–$21,000。量是关键未知数：ViaGen 历史上提到过「数千」次成功克隆，但没有说明年度吞吐。创收能力受代孕动物可得性和实验室产能约束，这限制了有意义的规模化。马产业市场（赛马和运动马）历来是
              ViaGen 最大量分部。收购成本、吸收的营运资本和资产负债表商誉均未披露。
