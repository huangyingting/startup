  - number: 2
    title: 市场分析
    sections:
      - number: '2.1'
        title: 市场边界与定义
        blocks:
          - type: paragraph
            body: >-
              Colossal Biosciences
              位于多个非传统市场交叉点，任何单一分部都无法完整覆盖其范围。公司核心叙事——灭绝复活——尚无成熟商业市场；从未有买方为复活物种付费，也从未有合同约定用灭绝复活动物做生态修复。Colossal
              实际销售或预期销售的东西，对应四个独立机会区：（1）合成生物学平台工具和服务（通过 Form Bio 与 Astromech 衍生公司），（2）可用于保护基因组学和农业的 CRISPR 基因编辑技术，（3）通过
              ViaGen Pets 做伴侣动物克隆（唯一近期创收分部），以及（4）政府资助的保护科学合同和拨款，包括通过 In-Q-Tel 触达的军民两用国防应用。灭绝复活项目本身应被视为研究与 IP
              创造活动，而不是近期收入流。当前 Colossal 商业分部的总可用市场，取决于三条向量：ViaGen 宠物克隆市场、通过 Form Bio 触达的基因组工具 SaaS 市场，以及政府 /
              慈善保护科学资金。未来灭绝复活 IP（若猛犸象或袋狼项目成功）将进入一个完全新生的市场，服务形态可能包括物种复活、生态系统修复，甚至与娱乐相邻的旅游。
