      - number: '4.3'
        title: 资本结构与融资历史
        blocks:
          - type: paragraph
            body: >-
              Colossal 的资本形成速度快且持续。SEC Form D 文件（CIK 0001964433）确认，2023 年 1 月 Series B 在 15 名投资人中募资 $150M，随后通过 Form D/A
              修订为总额 $173.8M、27 名投资人。加上 2021 年 9 月种子轮（$15M）、2022 年 3 月 Series A（$60M）、2025 年 1 月 Series C（$200M）、据报道
              $120M 延伸轮，以及独立的 $100M Colossal Foundation 融资，累计资本形成超过 $615M。


              关键战略投资人包括 Thomas Tull 的 TWG Global、In-Q-Tel（CIA）、ARCH Venture Partners、USITF，以及一组名人 LP（Peter Jackson、Paris
              Hilton、Tom Brady、Chris Hemsworth）。投资人类型横跨国防情报到名人 LP，说明品牌建设和战略相邻性的重要性不亚于纯财务回报。估值轨迹（2025 年 9 月达到 $10.3B）相当于从
              $150M Series B 上升 68.7×，驱动因素是叙事和里程碑（恐狼亮相），而不是收入增长。未披露收入却出现这种估值跃升，是关键承销风险。衍生公司（Form
              Bio、Astromech、Breaking）让合并资产负债表更复杂，因为股权可能在 Colossal 公司实体之外被部分稀释。
