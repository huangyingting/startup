      - number: '5.4'
        title: IP 组合与研究发表策略
        blocks:
          - type: paragraph
            body: >-
              Colossal 的 IP 策略围绕几类专利展开：面向特定物种的 CRISPR 编辑方法、多重编辑工作流、用于濒危物种的 SCNT 流程，以及通过 Form Bio 开发的基因组工具。March 2025 的
              bioRxiv 预印本明确提到，公司已为多重猛犸象性状编辑工作流提交专利申请。团队合计专利组合超过 500 项，但 Colossal 直接拥有的专利数量，与 George Church
              等关联科学家持有的专利数量，公开资料没有拆分。


              发表策略走双轨：先把预印本立即发布到 bioRxiv 供社区访问，再进入成熟期刊的同行评审。该做法让团队能在公开披露前快速提交
              IP，同时积累科学可信度。按照其开放科学政策，基因组数据和实验方案会存入公共数据库（GenBank、NCBI）。竞争格局风险在于，CRISPR-Cas9 基础 IP 归 Broad Institute（Zhang
              lab）和 UC Berkeley（Doudna lab）所有，因此 Colossal 的 CRISPR IP 必然建立在授权技术或规避路径之上。
