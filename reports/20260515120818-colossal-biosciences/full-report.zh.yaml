      - number: '1.2'
        title: 创始人、领导层与关键人物风险
        blocks:
          - type: paragraph
            body: >-
              联合创始人兼 CEO Ben Lamm 是 Dallas 连续科技创业者，曾创办并出售六家公司，包括 Chaotic Moon Studios（2015 年出售给 Accenture）、Team
              Chaos（2016 年出售给 Zynga）、Conversable（2018 年出售给 LivePerson）和 Hypergiant Industries（2023 年出售给 Trive
              Capital）。截至 2026 年初，他的净资产估计为 $3.9 billion。Lamm 带来的公司搭建和融资能力，把 George Church 的科学愿景变成了一家拿到融资的公司。George
              Church 博士（Harvard/MIT 教授、Human Genome Project 联合设计者、多项 CRISPR 技术发明者）担任创始科学合著者和科学顾问。Church 的名字是 Colossal
              面向投资人和媒体的科学可信度核心，也构成实质性关键人物风险。Beth Shapiro 博士担任 Chief Science Officer；她是 MacArthur Fellow、National Academy
              of Sciences 成员、Rhodes Scholar，拥有 University of Oxford 博士学位，此前在 UC Santa Cruz 担任 Ecology and Evolutionary
              Biology 教授十年，并曾任 Howard Hughes Medical Institute Investigator。Andrew Pask 博士担任 Chief Biology Officer；加入
              Colossal 全职前，他在 University of Melbourne 领导 TIGGR（Thylacine Integrated Genomic Restoration Research）Lab 超过
              25 年。2025 年，Colossal 正式收购该实验室并成立 Colossal Australia。公司未公开任命 CFO 或 COO；公开露面的高管团队明显偏科学，Lamm 是唯一以商业为重心的高管。
