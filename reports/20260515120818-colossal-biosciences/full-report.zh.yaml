        title: 宠物克隆运营与单位经济模型
        blocks:
          - type: paragraph
            body: >-
              2025 年 11 月起由 Colossal 运营的 ViaGen Pets，是公司最清晰的商业收入引擎。公开定价把狗克隆定在 $50,000、猫克隆定在
