        title: 附录图表
        blocks:
          - type: callout
            title: 估值脱节
            body: >-
              在 $10.3B 估值和 ~$10M ARR 下，Colossal 的交易倍数约为过去十二个月收入的 1,000x——比最乐观的公开 CRISPR
              生物技术可比公司还高一个数量级。以该价格新增投资，需要严谨的进入框架或显著估值重置。
            calloutType: insight
