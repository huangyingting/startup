      - number: '7.2'
        title: 监管与法律风险清单
        blocks:
          - type: paragraph
            body: >-
              短期最重大的监管风险是 FDA 的动物有意基因组改变（IGA）框架。任何拟用于商业用途的基因编辑动物，都必须接受 FDA 上市前咨询。ViaGen 的 SCNT 宠物克隆复制既有基因组，不加入新基因，可能不需要
              IGA 审查；但 Colossal 的灭绝物种复活动物（袋狼、猛犸象、恐狼）涉及基因编辑，会落入 IGA 要求。USDA APHIS 通过 Docket APHIS-2023-0042
              监管涉及转基因动物的研究，该事项与转基因动物监管直接相关。ESA Section 9 禁止对列名物种的 take 行为；作为猛犸象代孕的亚洲象（CITES Appendix I）会触发国际许可要求。CITES
              Appendix I 对亚洲象的列名限制了生物材料国际运输。federalregister.gov 上的转基因动物规则构成法律框架。Law Cornell USC 16 §1531 确立 ESA 要求。澳大利亚
              EPBC Act 1999 和 Biosecurity Act 2015 将管辖任何袋狼再引入。截至 May 2026，Colossal 尚未公开披露 CITES 许可、ESA Section 10 附带
              take 许可或 FDA IGA 上市前批准。
