          detail: 在代理物种细胞系中做 CRISPR-Cas9 多重编辑（最多 7 个基因）、碱基编辑、引导编辑
        - id: reprobio
          label: 第 4 层：繁殖生物学
          detail: SCNT 胚胎构建、代孕植入、妊娠管理；按物种分化处理（犬科、有袋类、象、鸟类）
        - id: commercial
          label: 第 5 层：商业化产品
          detail: ViaGen 宠物克隆（SCNT 服务）、Form Bio SaaS（生物信息学）、政府研发合同 （国防 / 生物安全）
  - id: FE002
    title: 客户工作流：灭绝物种复活研究周期
    type: flow
    claimRefs:
      - CE001
      - CE007
    data:
      nodes:
        - id: sample
          label: 古样本采集
          detail: 永久冻土、博物馆标本，或现生濒危物种组织
        - id: genome
          label: 基因组测序与组装
          detail: 高覆盖度测序；质控；基于参考基因组组装
        - id: compare
          label: 比较基因组学
          detail: 将目标基因组与代理物种对齐；识别功能性变异位点
        - id: design
          label: CRISPR 引导 RNA 设计（Form Bio）
          detail: 自动化引导 RNA 设计；脱靶评分；多重编辑优化
        - id: edit
          label: 细胞系编辑
          detail: 转染代理物种细胞；测序验证；筛选高效率克隆
        - id: scnt
          label: SCNT / 胚胎创建
          detail: 将编辑后的细胞核转入去核卵母细胞；胚胎培养
        - id: surrogate
          label: 代孕植入
          detail: 将胚胎移植到代孕动物；监测妊娠
        - id: birth
          label: 活体动物交付
          detail: 表型验证；健康评估；为生态评估做隔离管理
      edges:
        - from: sample
          to: genome
          label: 提取 + 测序
        - from: genome
          to: compare
          label: 组装完成
        - from: compare
          to: design
          label: 变异清单
        - from: design
          to: edit
          label: 引导 RNA 交付
        - from: edit
          to: scnt
          label: 选定编辑克隆
        - from: scnt
          to: surrogate
          label: 可存活胚胎
        - from: surrogate
          to: birth
          label: 妊娠完成
