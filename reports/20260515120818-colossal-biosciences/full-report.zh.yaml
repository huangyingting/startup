  - number: 5
    title: 产品与技术
    sections:
      - number: '5.1'
        title: 核心基因编辑平台
        blocks:
          - type: paragraph
            body: >-
              Colossal 的核心技术平台靠三项集成能力撑起：（1）从保存样本（永久冻土、博物馆标本、化石）重建古基因组；（2）把多重 CRISPR 基因编辑——包括 Cas9、碱基编辑和先导编辑（prime
              editing）——应用到现生代理物种的细胞；（3）借助体细胞核移植（SCNT）或胚胎移植，从编辑后的细胞系培育活体动物。CRISPR 编辑管线已在小鼠模型中做到最多七个基因同步编辑，March 2025 的
              bioRxiv 预印本「Multiplex-edited mice recapitulate woolly mammoth hair phenotypes」记录了这一点。该研究显示，Fgf5、Tgm3 和
              Fam83g 的失活突变让小鼠长出羊毛状、有纹理、金棕色毛发——这是猛犸象性状插入路线的关键功能验证。


              计算层由 Form Bio 支撑。Form Bio 是 Colossal 分拆出的 SaaS 平台，自动化处理基因组比对、guide RNA 设计、脱靶分析和实验工作流管理。团队在相关领域合计持有 500
              多项专利，并参与发表 2,000 多篇论文。截至 2026，Colossal 已围绕全部六个物种项目，在 bioRxiv 和同行评审期刊上发表原创研究。
