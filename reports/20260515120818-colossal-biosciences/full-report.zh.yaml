      - number: '1.3'
        title: 融资历史、估值与投资人构成
        blocks:
          - type: paragraph
            body: >-
              Colossal 2021 年 9 月启动时完成 $15M 种子轮，由 Thomas Tull 领投，Tim Draper、Tony Robbins、Winklevoss Capital、Breyer
              Capital 和 Richard Garriott 参投。2022 年 3 月，公司完成 $60M Series A（Thomas Tull 再次领投，Paris Hilton、Animoca
              Brands、Bold Capital 等参与），累计融资达到 $75M。2023 年 1 月，$150M Series B 将 Colossal 推过 $1B 估值，进入独角兽行列。2024 年 10
              月，Colossal Foundation（独立 501(c)(3)）完成 $50M 融资；随后 2025 年 1 月，公司完成 $200M Series C，由 TWG Global（Mark Walter 与
              Thomas Tull 的控股公司）领投，估值 $10.2B，成为 Texas 首家百亿美元级私营初创公司。2025 年 9 月，围绕渡渡鸟项目的 $120M 延伸融资把股权融资总额推至 $555M，估值
              $10.3B；重要新投资人包括 US Innovative Technology Fund（政府相关基金）、ARCH Venture（Robert Nelsen）和电影导演 Peter Jackson。到
              2026 年 3 月，Colossal 披露累计融资 $615M（含 Foundation 资金），并与 Museum of the Future Dubai 和 BioVault 达成 UAE
              九位数合作。In-Q-Tel（CIA 风投机构）和 US Innovative Technology Fund 的出现，说明 Colossal 的基因组技术可能面向政府 /
              国防机构具备军民两用场景。政府敞口既提供验证，也带来围绕 IP 授权和基因组工程平台国家安全用途的治理问题。
