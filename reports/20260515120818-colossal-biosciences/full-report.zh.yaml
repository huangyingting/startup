  - number: 4
    title: 财务情况
    sections:
      - number: '4.1'
        title: 收入模型架构
        blocks:
          - type: paragraph
            body: >-
              Colossal Biosciences 采用多流收入模型，覆盖直接服务、SaaS、政府合同和 IP 授权。最成熟的收入流是 2025 年 11 月收购的 ViaGen
              Pets，它面向消费者和马产业市场提供高端宠物克隆，公开价格为每只猫 $35,000、每只狗 $50,000、每匹马约 $85,000。该收入流是唯一公开确认单价的收入来源。


              Form Bio 是计算生物学 SaaS 衍生公司，承载 Colossal 的软件驱动收入野心。它独立融资 $40M，向生物技术研究团队销售工作流工具，但未披露 ARR 或客户数。In-Q-Tel
              的股权投资暗示公司面向政府的收入，可能来自与情报和国防机构对齐的 R&D 合同，但条款仍未披露。来自 CRISPR 和基因组学专利的 IP
              授权仍处于早期商业化前阶段。合在一起看，近期收入组合明显偏向高客单价、低量服务（ViaGen），SaaS 和授权潜力则在更后期。公司未公开任何混合收入数字。
