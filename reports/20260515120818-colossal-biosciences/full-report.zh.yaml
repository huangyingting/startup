      - number: '8.3'
        title: 可比估值分析
        blocks:
          - type: paragraph
            body: >-
              Colossal 没有直接公开可比公司，但可以套用三套估值框架。


              框架 1——CRISPR 生物技术可比公司。Editas Medicine（EDIT）、CRISPR Therapeutics（CRSP）和 Beam
              Therapeutics（BEAM）是尚未产生收入或收入早期的基因编辑公司。截至 2026 初，Editas 的市值约 ~$350M，对应约 $40M 收入（8-9x）；CRISPR Therapeutics
              市值约 ~$2.5B，对应 $200M 收入（12x）；Beam 市值约 ~$1.8B，收入极少。以 ViaGen 估计 ~$10M ARR 计算，Colossal 的 $10.3B 估值意味着 1,000x
              收入倍数——比任何公开可比公司高一个数量级。


              框架 2——私有合成生物学。Ginkgo Bioworks 于 2021 以 $15B 估值上市，此后跌至不足 $500M，回撤 97%，显示平台叙事与现金流现实之间的落差。Modern Meadow、Bolt
              Threads 和 Zymergen 也经历了类似降估值轨迹。


              框架 3——分拆公司与 IP 的分部估值。Form Bio（隐含 ~$100M）、Astromech（$2B）和 Breaking Bio（$10.5M）合计贡献 ~$2.1B 已披露企业价值。如果
              Colossal 保留多数股权，仅分拆价值就能支撑 $1.5-2B 的内在价值底部。剩余 $8B 必须来自灭绝物种复活平台、IP、政府关系和品牌期权。
