      - number: '8.2'
        title: 当前融资与估值背景
        blocks:
          - type: paragraph
            body: >-
              Colossal 自 September 2021 创立以来，已通过五轮融资筹集 $615M：$15M 种子轮、$60M Series A（2022）、$150M Series B（2023）、$200M
              Series C（January 2025，由 TWG Global 和 Breyer Capital 共同领投），外加约 $90M 延展轮和 $100M 非稀释性基金会承诺。最近一轮投后估值在
              September 2025 达到 $10.3B，意味着融资额的 16.7x 倍数。


              稀释和优先权动态需要仔细审视。随着 $615M 资金以不断抬升的估值进入，早期投资者持有大量清算优先权，会在普通股股东获得有意义回报前吸收退出收益中的前
              $600M+。资本结构要求数十亿美元级退出，才能让后期进入者获得强回报。


              政府非稀释性资本——USASpending.gov 确认的 DARPA 约 $11M 和 NIH $6.5M——提供了背书，但只占总融资的 3%。公司主要依赖机构风险资本，而非拨款或战略企业伙伴，来支撑烧钱。
            claimRefs:
              - CV009
              - CV010
              - CV011
              - CV012
              - CV013
              - CV014
