            title: 学术批评和抹黑行动指控带来声誉与治理风险
            body: >-
              New Scientist 2025 年 7 月关于疑似抹黑学术批评者行动的调查，无论 Colossal 是否如其所称未参与，都构成实质性声誉风险。若未来报道把该行动归因于 Colossal
              或其投资人，可能触发监管或声誉后果。另一个独立问题是，针对灭绝复活保护成效的实质性科学批评，可能限制机构级保护资金合作。
