    title: 公司概况
    sections:
      - number: '1.1'
        title: 身份、使命与公司结构
        blocks:
          - type: paragraph
            body: >-
              Colossal Biosciences Inc. 于 2021 年 9 月 13 日注册成立并公开发布。公司总部位于 Texas 州 Dallas 的 55,000 sq ft 研究设施，并与 Harvard
              Medical School、University of Melbourne 及不断扩展的全球保护实验室网络合作开展额外研究。法律实体是 Delaware 注册的 C-corporation。Colossal
              宣称的使命，是复活已灭绝物种，并开发用于保护和生态系统修复的基因组工具。截至 2026 年 5 月，公司称自己是全球首家灭绝复活公司，并已用古 DNA
              样本完成多个灭绝物种的基因组测序。公司网站列出六个活跃灭绝复活项目：长毛猛犸象、袋狼（塔斯马尼亚虎）、渡渡鸟、恐狼、巨型恐鸟和蓝羚。其基因组工程平台使用 CRISPR-Cas9 和碱基编辑技术，这些技术源自
              Church 在 Harvard 的实验室，并由内部科学家改造。Colossal 是未上市私营公司，不公开披露收入或经营财务。2025 年 11 月收购的 ViaGen Pets
              作为商业宠物克隆子公司运营，在核心研究使命之外提供持续产生现金的业务。
