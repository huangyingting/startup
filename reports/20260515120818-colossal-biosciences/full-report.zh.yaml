  - number: 3
    title: 竞争格局
    sections:
      - number: '3.1'
        title: 竞争格局概览
        blocks:
          - type: paragraph
            body: >-
              Colossal Biosciences
              所处的商业灭绝复活赛道基本没有直接竞争。没有其他获得风险投资支持的公司，以相近规模启动复活灭绝物种项目。竞争格局可拆成四个场域：（1）直接灭绝复活组织同业，主要是非营利组织；（2）宠物和珍稀物种克隆，ViaGen
              在这里面对 Sinogene；（3）保护基因组学既有机构，核心是 San Diego Zoo Wildlife Alliance 的 Frozen Zoo；以及（4）横跨 CRISPR
              疗法和实验室信息学平台的使能技术供应商。每个场域的威胁画像不同，必须分别评估，因为一家在某一分部竞争的公司，可能在另一分部完全没有重叠。Colossal 的 $10.3B
              估值说明，市场正在计入显著商业期权价值，但尚无竞争者证明自己有路径捕捉该价值。
