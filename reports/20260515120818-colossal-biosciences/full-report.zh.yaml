      - number: '1.4'
        title: 灭绝复活项目与科学里程碑
        blocks:
          - type: paragraph
            body: >-
              Colossal 的旗舰长毛猛犸象项目，瞄准亚洲象基因组与从永久冻土中获取的古猛犸象样本之间 65 至 85 个关键基因差异。截至 2026 年初，该项目已生成大象诱导多能干细胞（该物种首次，2024 年 3
              月宣布），产出长毛小鼠（携带七个类猛犸毛发基因的基因编辑小鼠；2024 年 10 月出生 38 只幼崽）作为管线验证步骤，并在亚洲象身上开展取卵和 IVF 实验。首只猛犸象幼崽 2028 年诞生，仍是
              Colossal 公开路线图。恐狼项目成为 Colossal 最受关注的里程碑：三只基因编辑灰狼幼崽表达了来自古恐狼基因组（13,000 年历史牙齿和 72,000 年历史耳骨）的 20 个性状——Romulus
              与 Remus 于 2024 年 10 月 1 日出生，Khaleesi 于 2025 年 1 月 30 日出生。公司在 2025 年 4 月向全球媒体公开这些幼崽。渡渡鸟项目取得重要鸟类里程碑：Colossal
              成为首个长期培养 Nicobar pigeon（渡渡鸟现存最近亲）原始生殖细胞的实体，并产出缺乏内源 PGC 的基因编辑鸡，建立了代孕管线。2026 年，公司重申渡渡鸟五到七年时间表。由 Colossal
              Australia 领导的袋狼项目，在人工子宫中培育出妊娠中期有袋类胚胎，这是关键繁殖生物学里程碑。Colossal 更广泛的科学活动生态已覆盖 2,000 多篇引用其工作的同行评议论文和 500 多项专利的
              IP 组合。公司与 75 多个保护组织和 40 多个学术研究项目合作。
