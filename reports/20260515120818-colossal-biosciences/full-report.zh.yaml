      - number: '3.5'
        title: 护城河评估与竞争耐久性
        blocks:
          - type: paragraph
            body: >-
              Colossal 的核心竞争护城河，是已经拼起来的跨学科团队：Church、Shapiro、Pask，以及约 170
              名覆盖分子生物学、进化基因组学、计算生物学、冷冻保存和繁殖科学的员工。这种组合复制起来昂贵且耗时。次级护城河包括：（a）在猛犸象特异 CRISPR 抗寒编辑和袋狼基因组组装上早期提交 IP；（b）ViaGen
              宠物克隆品牌及其既有美国客户关系；（c）Colossal 的高媒体曝光（TIME100 2023）和名人投资人基础，带来竞争者难以轻易复制的公众认知。反向竞争证据也很重要：批评者公开质疑 Colossal
              的产出究竟是真正灭绝复活，还是功能性代理；2025 年围绕批评 Colossal 研究者的抹黑行动争议，带来机构声誉风险；Sinogene 能以更低成本克隆濒危物种，说明 Colossal
              在克隆上的技术边际优势可能收窄。Form Bio 面对 Benchling 的竞争位置，是一个隐藏护城河风险，需要独立评估。
