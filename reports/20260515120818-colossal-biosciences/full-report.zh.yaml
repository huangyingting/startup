              Colossal 的主要风险缓释策略包括：（1）主动与 FDA 沟通，通过自愿上市前咨询满足 IGA 合规；（2）从 UC Berkeley 取得 CasX CRISPR 授权，降低对 Broad
              Institute/Harvard Church Group CRISPR 组合的 IP 依赖；（3）采用分拆商业化策略（Form
              Bio、Astromech、Breaking），生成不依赖灭绝物种复活成功的收入流；（4）收购 ViaGen，建立经常性收入基础。关键监测指标包括：USDA APHIS 关于转基因动物的规则制定（Docket
              APHIS-2023-0042）；USPTO 对基础 CRISPR 专利的双方复审（inter partes review）；FY2027 的 DARPA 续约决定；澳大利亚 DAFF/DCCEW
              对袋狼的监管立场。投资逻辑击穿触发条件包括：FDA 对任何灭绝复活动物采取执法行动、George Church 或 Ben Lamm 离任且没有足够继任安排、DARPA 不续约，以及连续 >3
              次代孕妊娠失败。任何持有或考虑持有 Colossal 仓位的投资者，都应持续监测这些触发条件。
            claimRefs:
              - CR029
              - CR030
              - CR031
              - CR032
