      - number: '1.6'
        title: 批评、争议与负面事件
        blocks:
          - type: paragraph
            body: >-
              Colossal 的灭绝复活使命引来了实质性科学批评。2025 年 4 月，WWF India 前象类保护负责人 Nitin Sekar 在 Ars Technica
              评论文章中称，从保护角度看，猛犸象项目「极其误导」：支撑猛犸象野化的生态假设薄弱，使用圈养亚洲象作为代孕个体引发严重动物福利担忧，而同样资本若用于保护现存濒危物种，可能带来大得多的保护效果。University
              of Otago 动物学家 Philip Seddon 表示，恐鸟项目「与解决全球灭绝危机关系不大，更像是在制造融资媒体声量」。Associate Professor Jeremy
              Austin（Australian Centre for Ancient DNA）则把灭绝复活整体描述为「更多是给科学家博取媒体关注，较少是真正做严肃科学」。术语本身也存在科学争议：多位专家质疑，Colossal
              的基因编辑动物只是在现存物种基因组中携带一部分古 DNA 性状，究竟算真正「灭绝复活」，还是高度改造的现存动物。2025 年 7 月，New Scientist 报道称，至少四位公开批评 Colossal
              的学者——Vincent Lynch（University at Buffalo）、Flint Dibble（Cardiff University）、Victoria Herridge（University of
              Sheffield）和 Nic Rawlence（University of Otago）——遭遇调查人员所称的协同抹黑行动，包括攻击其资历的 AI 生成博客文章和虚假的 YouTube
              版权打击。Colossal 否认参与。此外，Colossal 律师向 Lynch 发出停止侵权函，引用其社交媒体批评；Lynch 称这是试图压制科学讨论。
            claimRefs:
