      - number: '8.5'
        title: 退出准备度与最终尽调事项
        blocks:
          - type: paragraph
            body: >-
              Colossal 的退出可选性受同一个尚未形成规模化收入画像约束，而这也是估值困难所在。IPO 路径面临逆风：2021 之后的公开生物技术市场对无收入科学叙事很苛刻；Colossal
              要么需要活体灭绝物种复活里程碑，要么需要 Ginkgo 式 SPAC——但后者同样可能上市后降估值。大型保护组织、政府机构或自然历史集团（Disney、National Geographic 母公司
              Fox、Nature Conservancy）进行战略收购并非不可能，但价格很可能较 $10.3B 大幅折让。


              制药收购方（Regeneron、Illumina、Thermo Fisher）可能看重 CRISPR 递送和胚胎学
              IP，但没有战略理由为灭绝物种复活品牌买单。最现实的收购情景，是一家数十亿美元级生命科学或保护科技买家支付 $4-8B——明显低于最后一轮价格。


              剩余关键尽调事项包括：完整股权结构表及清算优先权瀑布；经审计的 ViaGen 财务数据；Astromech 和 Form Bio 持股比例状态；专利审查时间线；DARPA 合同续约条款；以及关于
              CITES/ESA 释放禁令风险的独立法律意见。
