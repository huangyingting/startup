            body: Form Bio、Astromech 和 Breaking Bio 合计代表 ~$2.1B 已披露企业价值。如果 Colossal 保留多数股权，仅分拆公司价值就能在任何情景下提供有意义的内在价值底部。
            calloutType: insight
            claimRefs:
              - CV019
              - CV020
          - type: callout
            title: 清算优先权瀑布风险
            body: 在累计 $615M 优先权下，任何低于 ~$1.5B 的退出都几乎不会给普通股股东留下回报。以 $10.3B 进入的后期投资者，需要 $12B+ 退出才能获得合理回报。
            calloutType: insight
            claimRefs:
