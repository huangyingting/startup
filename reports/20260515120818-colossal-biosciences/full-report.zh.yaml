      - number: '5.2'
        title: 物种项目与技术成熟度
        blocks:
          - type: paragraph
            body: >-
              Colossal 正推进六个不同的灭绝物种复活项目，技术成熟度（TRL）各不相同。恐狼项目达到最高里程碑：两只活体幼崽（Romulus 和 Remus）通过 SCNT 和代孕于 October 2024
              出生，第三只（Khaleesi）于 January 2025 出生。这些动物首次证明，以表型为目标的灭绝物种复活可以交付完整活体。


              猛犸象（长毛猛犸象）项目最复杂，需要在亚洲象基因组上编辑数百个位点。难点包括：（a）亚洲象 22-month 妊娠周期；（b）尚无已建立的亚洲象
              iPSC（诱导多能干细胞）细胞系；（c）释放大型编辑动物的监管不确定性。袋狼（塔斯马尼亚虎）项目技术推进较快，因为可用小型有袋类袋鼩作为代孕。渡渡鸟和恐鸟项目仍处早期，但岛屿标本提供了质量极高的古基因组。蓝羚项目于
              2025 启动，首批羚羊 OPU（取卵）流程已成功执行。


              Colossal 已在 bioRxiv 上发布每个物种的在研成果，符合其宣称的开放科学与透明政策。
