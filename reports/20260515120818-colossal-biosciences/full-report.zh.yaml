      - number: '5.6'
        title: 技术结论与尽调缺口
        blocks:
          - type: paragraph
            body: >-
              恐狼交付（三只活体动物，2024–2025）是 Colossal 历史上最重要的技术验证事件。它证明，SCNT + 基因编辑 +
              代孕繁殖这条管线，能在犬科语境下交付活体灭绝物种复活表型。但犬科生物学远比象类（猛犸象）或鸟类（渡渡鸟、恐鸟）的繁殖生物学简单。恐狼基准不应线性外推到猛犸象。


              关键技术尽调缺口包括：（1）没有公开亚洲象细胞系建立或 iPSC 诱导尝试的数据；（2）没有同行评审论文披露象细胞中的 CRISPR 编辑效率；（3）2028
              猛犸象出生目标被描述为第一代「类猛犸象动物」，并非完整遗传意义上的猛犸象；（4）三只恐狼出生后的存活、健康和行为复杂性尚未得到独立验证。这些缺口不推翻技术路线，但会重设里程碑时间的现实预期。
            claimRefs:
              - CE026
              - CE027
              - CE028
              - CE029
              - CE030
