      - number: '2.3'
        title: 买方与付款方分层
        blocks:
          - type: paragraph
            body: >-
              Colossal 的买方图谱高度分层，资金来源、决策者和采用触发点各不相同。ViaGen
              宠物克隆的买方，是拥有较高可支配收入、购买决策由情感驱动的个人宠物主人。这些买方分布全球，但集中在美国、西欧和东亚。购买触发点是心爱宠物死亡或濒临死亡；付款方就是宠物主人本人。ViaGen 的价格区间（每个克隆
              $35,000–$100,000）天然筛选高净值个人。保护基因组学工具（Form Bio）的买方通常是研究机构、动物园或生物技术公司；付款方可能是政府拨款机构、基金会或企业 R&D
              预算。采用触发点是科学验证和平台易用性。Colossal 灭绝复活叙事本身的关键「付款方」是风险投资人（已投入 $615M）和慈善基金会。现实世界中，复活猛犸象或袋狼产品的下游买方尚不存在，尽管 Colossal
              讨论过来自保护旅游、生态系统服务和政府野化合同的潜在收入。政府 / 国防合同的买方是美国政府机构（DOD、NIH、DOI，通过 In-Q-Tel 和
              USITF），采购由国家安全和保护政策要求驱动。买方旅程很长——合同周期以多年计——并要求监管和安全审查兼容。
