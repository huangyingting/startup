companyProfile:
  summary: >-
    Colossal Biosciences 是一家总部在 Dallas 的基因组学与灭绝复活平台公司，2021 年 9 月由连续创业者 Ben Lamm 和 Harvard 遗传学家 George Church 联合创立。公司试图用
    CRISPR 基因编辑、古 DNA 重建和代孕繁殖生物学，复活长毛猛犸象（目标 2028 年）、袋狼、渡渡鸟、恐狼、恐鸟和蓝羚等标志性灭绝物种。Colossal 已完成五轮融资，累计融资 $615M，2025 年 9 月估值达到
    $10.3B。当前唯一商业收入流是 2025 年 11 月收购的 ViaGen Pets，业务是宠物和牲畜克隆。平台已孵化三家技术衍生公司：Form Bio、Astromech 和 Breaking Bio。
