      - number: '7.3'
        title: 运营与技术风险
        blocks:
          - type: paragraph
            body: >-
              Colossal 的灭绝物种复活项目依赖体细胞核移植（SCNT），也就是克隆羊 Dolly 所用技术。大型哺乳动物中，牛和马的 SCNT 效率低于 5%；非驯化或灭绝谱系物种的效率未知，且很可能更低。亚洲象
              22-month 妊娠期意味着，单次胚胎移植失败就会造成大约两年延迟。Colossal 没有披露可用的亚洲象代孕数量，也没有披露它们的安置地点。猛犸象项目需要连续跑通基因组重建、基因编辑（2025 bioRxiv
              预印本确认 7+ 个基因）、细胞培养、胚胎移植和活体出生；每一步都是独立瓶颈。ViaGen Pets（November 2025 收购）的运营整合增加组织复杂度。ViaGen 的代孕动物运营（狗 / 猫 /
              马）必须符合 USDA Animal Welfare Act（7 USC 2131）。面对病原体相互作用未知的新型灭绝复活动物，生物安全流程是新兴风险，现有框架尚未覆盖。
