  - id: TM004
    title: 增长驱动因素与采用约束
    description: >-
      Key demand drivers and adoption constraints for Colossal's commercial segments, with timing, direction, and
      implication for market sizing and risk assessment.
    columns:
      - 因素
      - 方向
      - 时间
      - 对 Colossal 的影响
      - 尽调追问
    enumerationScope:
      coverage: partial
      basis: >-
        Drivers and constraints identified from published analyst reports, regulatory filings, conservation science
        literature, and public adversarial sources. Unknown regulatory developments (e.g., US biosafety framework for
        de-extinct megafauna) may add or remove constraints not captured here.
    rows:
      - - 生物多样性危机（1M+ 物种受威胁）
        - 顺风
        - 持续；加速
        - 推动保护支出的政治意愿；扩大政府合同管线
        - 确认 Colossal 是否已赢得或投标具体联邦保护合同
      - - CRISPR 成本下降（基因组测序今天约 $200 / 人类基因组，2001 年为 $100M）
        - 顺风
        - 持续；历史上价格约每 18 个月下降 ~50%
        - 降低单项目研发成本；打开更广的保护基因组学用例
        - 跟踪成本下降是否跑赢 Colossal 的技术差异化
      - - 私人慈善保护资金增长（Bezos Earth Fund、30x30 initiative）
        - 顺风
        - 2023–2030 加速
        - 增加非稀释性拨款和合作收入路径；支撑 Colossal Foundation
        - 确认 Colossal Foundation（$100M）是否独立于运营实体，以及是否具备拨款资格
      - - 去灭绝 / GMO 大型动物野外释放的监管空白
        - 逆风
        - 期限不明；美国、欧盟或澳大利亚目前没有监管流程
        - 阻碍核心去灭绝叙事商业落地；压住 TAM 上限
        - 监测 USFWS、EPA、USDA 关于合成生物学释放框架的规则制定
      - - 动物福利反对（PETA、Humane Society、科学批评者）
        - 逆风
        - 活跃；媒体运动阶段性出现
        - 拖累声誉；限制公共资金合作；可能影响动物园 / NGO 交易
        - 监测可能限制 ViaGen 或猛犸象代孕使用的反对方出版物和游说活动
      - - 与现生物种保护争夺资源
        - 逆风
        - 结构性；长期
        - 约束 NGO 合作；限制学术协作；被 IPBES 顾问引用
        - 跟踪保护界反对是否升级为资金限制提案
    notes: 方向编码：顺风 = 利好市场增长；逆风 = 负面或约束。时间和影响估计为定性判断；没有针对任何驱动因素的定量影响模型。
