      - number: '1.5'
        title: 商业衍生公司与技术转移
        blocks:
          - type: paragraph
            body: >-
              Colossal 内部 R&D 已产出四家商业衍生公司，把业务从灭绝复活延展出去。Form Bio（2022 年 9 月拆分，Thomas Tull 通过 JAZZ Venture Partners 领投
              $30M）是计算生物学和 AI 平台，向生命科学公司授权基因组工程软件工具，用于药物发现、细胞治疗制造和生物信息学。Astromech（约 2025 年中拆分）是面向生物结果的 AI 预测引擎，由 George
              Church 参与联合创立；公司完成 $10.5M 融资（累计 $40.5M），九个月内达到 $2B 估值，成为独角兽。Breaking（2024 年 4 月启动）是 Colossal
              孵化的塑料降解合成生物学初创公司；它发现了 X-32，一种可在 22 个月内降解多种塑料的微生物，并已融资 $10.5M。第四家衍生公司是法医 DNA
              实验室。这些衍生公司为投资人提供重要可选性：即便核心灭绝复活时间表滑延，底层基因组工程和 AI 平台也可能独立创造价值。2025 年 11 月收购的 ViaGen
              Pets，则通过宠物和牲畜克隆服务提供近期商业收入。
