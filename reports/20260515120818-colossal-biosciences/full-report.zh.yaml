              Colossal 约有 170 名员工，运营地点覆盖 Dallas TX（55,000 sq ft 总部）、Cambridge MA、Melbourne Australia
              和额外实验室设施，成本结构主要由人员和设施驱动。按每名员工全口径平均成本 $225,000 计算，年薪酬支出约 $38M，且未计入租赁、动物护理、计算基础设施和差旅。


              年度总烧钱速度估计为 $40–80M，反映精简科学初创公司与拥有活体动物项目的全运营多地点生物技术公司之间的区间。可比上市公司——Editas Medicine 年 R&D 支出约 $90M、CRISPR
