              Colossal 的科学品牌与 George Church（Harvard/MIT）和 Beth Shapiro（MacArthur Fellow / NAS）高度绑定。Church 尚未全职加入，仍保留
              Harvard 教职。若两人中任一人离开或与公司疏远，投资人和媒体对科学项目的信心可能相对实际技术进展出现不成比例的下滑。
