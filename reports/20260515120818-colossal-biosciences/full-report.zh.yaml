  - number: 7
    title: 风险
    sections:
      - number: '7.1'
        title: 风险概览与严重性框架
        blocks:
          - type: paragraph
            body: >-
              Colossal Biosciences 所处的法律、监管和科学环境没有成熟商业先例。全球尚无任何监管机构批准过任何物种的灭绝物种复活商业化。公司必须穿越多辖区合规环境，涵盖 FDA IGA
              审查（基因编辑动物）、USDA APHIS 监管、ESA Section 9/10 许可（亚洲象代孕）、CITES Appendix I
              对国际样本运输的要求，以及——针对袋狼项目——澳大利亚生物安全和环境法。财务风险包括：在已融资 $615M 的基础上，烧钱速度估计为每年 $40–60M，而 ViaGen
              宠物克隆只能覆盖运营成本的一小部分。关键人风险集中在 George Church（Harvard CSO）、Beth Shapiro 和 Ben
              Lamm。作为使命驱动型深科技赌注，这一风险画像可以理解，但必须放在公司 $10.3B 估值（September
              2025）和尚未形成规模化收入的状态下衡量。剩余风险在监管和融资类别最高，因为近期没有可保证的解决路径。IUCN
              指出，灭绝物种复活项目可能把保护资金从更具成本效益的物种保护工作中分流出来；这在科学风险之外又带来声誉风险。
