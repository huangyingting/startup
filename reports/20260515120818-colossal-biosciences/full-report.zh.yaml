              Restore）和政府机构（DARPA、NIH）的机构合作，它们提供非稀释性资助，而非商业收入。第三层是 Form Bio 的 B2B 软件，一套面向制药和研究机构的生物信息 SaaS
              平台，但客户数和收入未披露。三个分层的经济模型、证据基础和尽调要求完全不同。宠物克隆分层最能证明付费意愿和运营规模，其他分层则因私营公司披露惯例而基本不透明。Colossal
