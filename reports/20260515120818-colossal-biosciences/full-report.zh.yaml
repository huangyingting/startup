              IPBES 2019 评估（1M+ 物种受威胁）、IUCN Red List（48,600+ 受威胁物种）和 30×30 全球承诺，是真实的宏观顺风，正在扩大政府保护预算和慈善捐赠。Colossal
              作为唯一资金充足的商业灭绝复活公司，受益于这轮持续的媒体和政策叙事周期。
