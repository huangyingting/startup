      - number: '4.5'
        title: 财务基准与可比公司
        blocks:
          - type: paragraph
            body: >-
              对 Colossal 这种规模的灭绝复活公司，没有直接财务可比对象。代理基准来自三个相邻类别：（1）合成生物学工具公司（Twist Bioscience：约 $200M
              收入，毛利率为正），（2）基因编辑疗法公司（Editas、CRISPR Therapeutics：每年在临床项目上烧 $80–200M），以及（3）高端兽医服务（Hill's Pet
              Nutrition、Heifer International：不可直接比较）。


              Colossal 在零披露收入下估值 $10.3B；若年收入约 $20–25M（ViaGen 衍生估计），名义收入倍数超过 400×。达到这种估值的可比早期生物技术公司，通常拥有 Phase 2 临床数据、平台
              IP 排他性或战略收购方报价。Colossal 的护城河更多建立在叙事和 IP 上，而非商业牵引，这对 $10B+ 估值而言并不典型。财务分析师质疑该估值能否用传统 DCF 或 EV/revenue
              框架支撑。由于收入未披露，烧钱倍数（累计股权融资 / 估计收入）无法计算，但很可能超过 30×——在避险融资环境中很难维持。
