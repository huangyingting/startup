      - number: '3.3'
        title: 宠物克隆分部竞争
        blocks:
          - type: paragraph
            body: >-
              2025 年 11 月被 Colossal 收购的 ViaGen Pets 与 Sinogene（Beijing），是全球两家主导性商业宠物克隆提供商。ViaGen 定价约为每只狗 $50,000、每只猫
              $35,000；Sinogene 面向主要在中国及国际市场的客户，价格大体相当。Sinogene 约 2012 年成立，已克隆 1,000 多只狗和猫，另有马，并在 2022
              年克隆出北极狼——这证明其在濒危物种上的技术能力，而 Colossal 并未在该分部做出同类声称。Sooam Biotech（South Korea）开创了商业犬克隆（2005 年 Snuppy
              成为首只克隆犬），但创始人 Hwang Woo-suk 2009 年欺诈定罪让其市场地位蒙上阴影。Peternity Genetics 等新进入者提供 DNA 保存和基因编辑，但规模未说明。ViaGen 相对
              Sinogene 的主要竞争优势，是美国品牌信任和 Austin 既有运营；Sinogene 则受益于较低亚洲运营成本。所有玩家的收入和克隆量均为私有且未披露。没有证据表明 Colossal / ViaGen
              在美国市场向 Sinogene 丢失份额，不过 Sinogene 进入美国市场的风险不能排除。
