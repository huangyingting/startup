              Colossal 实际上通过直接聘用 Andrew Pask（TIGRR Lab）和 Beth Shapiro（UC Santa Cruz），移除了其主要学术竞争者。形成后的团队把领先的古 DNA、CRISPR
              和繁殖基因组学专家放进同一个组织，任何初创公司都不可能在近期「克隆」出来。这种人才集中是持久优势，单靠资本无法快速复制。
