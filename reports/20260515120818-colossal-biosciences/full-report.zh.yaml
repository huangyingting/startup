      - number: '5.5'
        title: 技术风险与关键依赖
        blocks:
          - type: paragraph
            body: >-
              三类技术风险最突出。第一是繁殖生物学约束：猛犸象项目依赖可用的亚洲象 iPSC，但全球尚无任何实验室做到。没有 iPSC，Colossal 只能依赖成年体细胞做
              SCNT，效率更低。第二是脱靶编辑影响：同时多重编辑 7+ 个基因，会提高非目标位点发生意外编辑的概率。第三是妊娠周期和代孕资源：亚洲象 22-month 妊娠周期，加上濒危状态（野外仅存 ~2,000
              头），让试错周期天然受限。


              袋狼项目受益于使用肥尾袋鼩（Sminthopsis crassicaudata）作为代孕——这种小型有袋类妊娠期仅 12–14 天，迭代周期显著更短。Colossal 在 2026
              发表的袋鼩新生儿育儿袋迁移论文，确认团队在理解袋狼工作所需的有袋类发育生物学上取得进展。关键外部依赖包括：能接触活体亚洲象用于研究、取得政府濒危物种研究许可，以及 USDA/FDA
              对动物有意基因组改变（IGA）的监管。
