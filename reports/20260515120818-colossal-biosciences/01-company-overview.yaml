  - id: s3
    title: Funding History, Valuation, and Investor Composition
    body: >-
      Colossal raised $15M in seed funding at launch in September 2021, led by Thomas Tull with
      co-investors Tim Draper, Tony Robbins, Winklevoss Capital, Breyer Capital, and Richard
      Garriott. A $60M Series A followed in March 2022 (Thomas Tull again as lead; Paris Hilton,
      Animoca Brands, Bold Capital among participants), bringing total to $75M. In January 2023
      a $150M Series B pushed Colossal past a $1B valuation, making it a unicorn. A $50M Colossal
      Foundation raise in October 2024 (a separate 501(c)(3)) preceded a $200M Series C in
      January 2025, led by TWG Global (the holding company of Mark Walter and Thomas Tull),
      which valued Colossal at $10.2B — making it Texas's first decacorn private startup. In
      September 2025, a $120M extension targeting the dodo program brought total equity raised to
      $555M at a $10.3B valuation, with notable new investors US Innovative Technology Fund (a
      government-linked fund), ARCH Venture (Robert Nelsen), and film director Peter Jackson. By
      March 2026, Colossal disclosed $615M in total capital raised (including Foundation funds)
      alongside a UAE nine-figure partnership with the Museum of the Future Dubai and BioVault.
      The presence of In-Q-Tel (CIA's venture arm) and the US Innovative Technology Fund signals
      potential dual-use applications of Colossal's genomic technologies for government/defense
      agencies. This government exposure creates both validation and governance questions around
      IP licensing and national-security use of the genome engineering platform.
