  evidenceGaps:
    - type: private-evidence-only
      severity: material
      topic: governance (TO002 TO003 leadership and investor tables — partial coverage)
      missingEvidence: >-
        Full board composition, equity stakes per investor, and preferred-share control provisions
        are not publicly disclosed. No independent confirmation of board seat holders. The leadership
        table (TO002) does not include CFO, COO, or post-acquisition board members. The investor
        table (TO003) covers named investors only; full cap table is private. Advisory board
        composition and roles beyond Beth Shapiro and Andrew Pask are not publicly documented.
      whyItMatters: >-
        At a $10.3B valuation with government-linked investors, governance structure and control
        rights are material to investment risk assessment. Board independence from large celebrity
        investors is unknown.
      relatedQuestionRefs:
        - QO016
        - QO022
      relatedTableRefs:
        - TO002
        - TO003

    - type: private-evidence-only
      severity: material
      topic: financial metrics
      missingEvidence: >-
        Revenue, gross margin, burn rate, and runway are not publicly disclosed. ViaGen Pets
        revenue figures are not reported separately. Colossal does not publish audited financials.
        Valuation defensibility against comparable biotechs cannot be assessed without financials.
      whyItMatters: >-
        Without financial data, valuation at $10.3B cannot be independently assessed against
        cash generation; relies entirely on disclosed funding milestones. Valuation trajectory
        (from $1B in 2023 to $10.3B in 2025) requires financial context to evaluate sustainability.
      relatedQuestionRefs:
        - QO011
        - QO017

    - type: missing-source
      severity: material
      topic: government investor terms
      missingEvidence: >-
        The terms of In-Q-Tel's investment and the US Innovative Technology Fund's involvement
        are not publicly disclosed; no government filings or FOIA-accessible records identified
        during research.
      whyItMatters: >-
        Government investors may hold preferential data-access or IP-licensing rights that could
        constrain Colossal's ability to commercialize or partner internationally.

    - type: missing-source
      severity: material
      topic: mammoth feasibility and regulatory path
      missingEvidence: >-
        No independent third-party scientific peer review of Colossal's mammoth timeline or
        technical feasibility has been located. The 2028 target is company-claimed and has not
        been evaluated in peer-reviewed literature. Regulatory requirements for reintroduction
        of a mammoth-like animal into Siberian/North American ecosystems are not publicly defined.
      whyItMatters: >-
        The 2028 mammoth calf date drives investor narrative and valuation; independent scientific
        validation of its achievability is absent from public record. Regulatory uncertainty around
        genetically modified megafauna release could indefinitely delay any ecological deployment.
      relatedQuestionRefs:
        - QO015
        - QO018
        - QO020

    - type: missing-source
      severity: minor
      topic: smear campaign attribution
      missingEvidence: >-
        No evidence linking the smear campaign to Colossal or its investors has been published;
        Colossal denies involvement. The perpetrators remain unidentified as of the report date.
      whyItMatters: >-
        If future reporting attributes the campaign to Colossal or a connected party, the
        reputational and governance consequences would be significantly more material.
      relatedQuestionRefs:
        - QO024

    - type: missing-source
      severity: minor
      topic: competitive benchmarking (TO003 investor-backed comparators)
      missingEvidence: >-
        No independent comparative analysis of Colossal's valuation, funding trajectory, or
        technical approach versus Revivicor, Acrigen, Splice Bio, or other gene-editing
        biotechs has been located in publicly accessible sources.
      whyItMatters: >-
        Without a comparable-company analysis, the $10.3B valuation and speed of funding are
        evaluated only on absolute terms; relative benchmarking is needed for investor diligence.
      relatedQuestionRefs:
        - QO013
