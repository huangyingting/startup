chapter:
  number: 1
  title: Company Overview
  summary: >-
    Colossal Biosciences Inc. is a Dallas-based de-extinction and conservation biotech startup
    co-founded on September 13, 2021 by serial entrepreneur Ben Lamm (CEO) and Harvard/MIT
    geneticist George Church (scientific co-founder). The company uses CRISPR gene editing,
    ancient DNA, artificial reproduction, and AI-assisted genomics to revive extinct species
    and develop genomic tools for conservation. As of March 2026, Colossal has raised $615M
    (plus a separate $100M foundation), carries a $10.3B last-round valuation, employs approximately
    170 scientists, and operates a 55,000 sq ft HQ in Dallas plus an Australian arm (Colossal
    Australia, formerly TIGGR Lab, University of Melbourne). Active species programs include the
    woolly mammoth (2028 target), thylacine, dodo, dire wolf (three living specimens confirmed),
    giant moa, and bluebuck. Colossal has spun out four commercial subsidiaries — Form Bio,
    Astromech, Breaking, and a forensic DNA lab — demonstrating early technology transfer.
    Academic critics and at least one Ars Technica editorial challenge whether de-extinction
    constitutes sound conservation practice, and a July 2025 New Scientist investigation revealed
    that several scientists who criticized Colossal were targeted by an apparent AI-generated
    smear campaign; Colossal denies involvement.

sections:
  - id: s1
    title: Identity, Mission, and Corporate Structure
    body: >-
      Colossal Biosciences Inc. was incorporated and publicly announced on September 13, 2021.
      The company is headquartered at a 55,000 sq ft research facility in Dallas, Texas, and
      conducts additional research in partnership with Harvard Medical School, the University
      of Melbourne, and an expanding network of global conservation labs. The legal entity is a
      Delaware-incorporated C-corporation. Colossal's stated mission is the de-extinction of
      lost species and the development of genomic tools for conservation and ecosystem restoration.
      As of May 2026, the company describes itself as the world's first de-extinction company and
      has completed the sequencing of multiple extinct species' genomes from ancient DNA samples.
      The company's website identifies six active de-extinction programs: woolly mammoth, thylacine
      (Tasmanian tiger), dodo, dire wolf, giant moa, and bluebuck. Its genome engineering platform
      applies CRISPR-Cas9 and base-editing technologies derived from Church's laboratory at Harvard
      and adapted by internal scientists. Colossal is a private company; it does not publicly
      disclose revenue or operating financials. ViaGen Pets, acquired in November 2025, functions
      as a commercial pet-cloning subsidiary and provides ongoing cash-generating operations
      alongside the primary research mission.
