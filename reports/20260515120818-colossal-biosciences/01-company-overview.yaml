callouts:
  - calloutType: strength
    title: Diversified spinout portfolio reduces single-mission risk
    body: >-
      Colossal has demonstrated an unusual ability to commercialize internal R&D into standalone
      businesses (Form Bio, Astromech, Breaking), all of which have attracted independent capital.
      Astromech achieving a $2B valuation within nine months of spinout suggests the core platform
      value may be substantially higher than reflected in the primary de-extinction narrative.
    claimRefs:
      - CO036
      - CO037
      - CO038

  - calloutType: risk
    title: Key-person concentration in Church and Shapiro creates scientific credibility risk
    body: >-
      Colossal's scientific brand is closely tied to George Church (Harvard/MIT) and Beth Shapiro
      (MacArthur Fellow / NAS). Church has not joined full-time and retains his Harvard professorship.
      If either departed or distanced themselves from the company, investor and media confidence
      in the scientific program could fall disproportionately relative to actual technical progress.
    claimRefs:
      - CO031
      - CO034

  - calloutType: risk
    title: Academic criticism and smear campaign allegations pose reputational and governance risk
    body: >-
      The July 2025 New Scientist investigation into an apparent campaign to discredit academic
      critics represents a material reputational risk, regardless of Colossal's claimed non-involvement.
      If future reporting attributes the campaign to Colossal or its investors, it could trigger
      regulatory or reputational consequences. Separately, the substantive scientific critiques of
      de-extinction's conservation efficacy may limit institutional conservation funding partnerships.
    claimRefs:
      - CO040
      - CO041
      - CO042
      - CO043

