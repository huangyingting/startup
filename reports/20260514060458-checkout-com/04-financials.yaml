          unit: "USD M"
          note: "Sept 2025 buyback at $12B; Adyen-comparable multiple implies higher; $40B 2022 peak"
        - label: "Capital Raised to Date (USD M)"
          low: 1700
          mid: 1800
          high: 1900
          unit: "USD M"
          note: "Estimated cumulative; no precise public total provided; Series D $1B confirmed"
    approximationNotes: >
      All ranges are order-of-magnitude estimates derived from publicly available data and
      comparable company benchmarks. The net revenue range uses $300B TPV multiplied by
      0.20-0.30% take rate derived from analyst consensus. The EBITDA range applies the
      >10% floor to the revenue range. Gross margin uses Adyen's 2024 published data as the
      primary benchmark. Valuation range bounds use the $12B September 2025 buyback reference
      price as mid and standard PSP revenue multiples for high/low. Material uncertainty (plus
      or minus 40%) applies to all estimates until audited financials are disclosed.
    claimRefs:
      - CI022
      - CI037

  - id: FI004
    title: Capital intensity / cash-flow map
    type: flow
    layout: standard
    summary: >
      Capital intensity and cash-flow dynamics for Checkout.com, showing revenue inflows, major
      cost lines, and the residual free cash flow constrained by undisclosed capital obligations.
    data:
      nodes:
        - id: revenue-inflows
          label: "Revenue Inflows (est. $600M-$900M)"
          note: "Acquiring fees, VAS, issuing, payouts, FX — all volume-linked streams"
        - id: processing-costs
          label: "Payment Processing Costs (est. 60-70% of gross)"
          note: "Interchange and network fees; largest cost line; variable with volume"
        - id: opex-costs
          label: "Operating Expenses (technology, headcount, compliance)"
          note: "~2,000 employees; Microsoft Azure cloud; FCA, PCI DSS, GDPR, FDIC regulatory costs"
        - id: capex-malpb
          label: "MALPB Regulatory Capital (amount undisclosed)"
          note: "Georgia bank charter requires minimum capital in bank subsidiary; not yet quantified"
        - id: free-cash-flow
          label: "Free Cash Flow (cash-generative; amount undisclosed)"
          note: "Funded $12B employee buyback from operations; no external capital since Jan 2022"
      edges:
        - from: revenue-inflows
          to: processing-costs
          label: "Interchange pass-through"
        - from: revenue-inflows
          to: opex-costs
          label: "Operating expenditure"
        - from: revenue-inflows
          to: capex-malpb
          label: "Regulatory capital obligation"
        - from: revenue-inflows
          to: free-cash-flow
          label: "Residual free cash flow"
    approximationNotes: >
      Cash flow figures are not company-disclosed. The cash-generative characterisation is
      inferred from the September 2025 employee buyback funded from operations and the three-year
      absence of new institutional capital. MALPB regulatory capital is treated as a cost line
      given the Georgia bank charter obligation, but its amount is unknown. Processing costs
      are estimated from industry benchmarks. No balance sheet or cash flow statement is available
      from public sources for Checkout.com or its Jersey parent.
    claimRefs:
      - CI028
      - CI031

callouts:
  - calloutType: risk
    title: Financial Opacity Is the Primary Investment Diligence Blocker
    body: >
      Checkout.com's Jersey holding company structure legally prevents any mandatory public
      financial disclosure, making it impossible to verify revenue, margins, cash position,
      debt obligations, or capital adequacy from public sources alone. Every financial metric
      in this chapter is either company-claimed, estimated, or unknown. Any investment decision
      based solely on disclosed operational metrics ($300B TPV, >30% net revenue growth, >10%
      adjusted EBITDA) without obtaining audited consolidated financials under NDA constitutes
      information-insufficient underwriting. This is not a regulatory gap — it is the expected
      consequence of the company's deliberate incorporation and disclosure choices.
    claimRefs:
      - CI007
      - CI021
      - CI026
      - CI036

  - calloutType: risk
    title: Three-Year Capital Gap Creates Valuation Uncertainty at Exit
    body: >
      The last institutional financing round was the $1B Series D in January 2022 at a $40B
      valuation. The subsequent decline to $12B (September 2025 employee buyback reference) and
      the absence of any new external capital for over three years means there is no market-
      clearing valuation evidence from an arms-length institutional investor. The September 2025
      buyback at $12B is a company-set reference price and should not be treated as a market
      valuation. Any future liquidity event — IPO, acquisition, or secondary — will require
      revenue and profit disclosure that may reveal a materially different financial profile from
      the implied estimates in this chapter.
    claimRefs:
      - CI006
      - CI029
      - CI030
      - CI038

