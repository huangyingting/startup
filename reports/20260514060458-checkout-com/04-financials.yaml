  evidenceGaps:
    - type: private-evidence-only
      severity: blocking
      topic: revenue-disclosure
      missingEvidence: >
        Audited consolidated group P&L, gross and net revenue breakdown by stream, and unit
        economics including CAC and payback period for the enterprise merchant tier are entirely
        unavailable from public sources and have never been disclosed by Checkout.com.
      whyItMatters: >
        Without audited revenue and margin data, all financial estimates carry material uncertainty
        of plus or minus 40%, and it is not possible to calculate a verified valuation multiple,
        assess revenue quality, or underwrite an investment decision with adequate information.
      diligencePath: >
        Request audited consolidated accounts from Checkout.com management under a signed NDA;
        obtain management information package including P&L by stream and market, 3-year cohort
        CAC and payback period data, and revenue quality metrics (churn rate, ACV by tier).
      relatedQuestionRefs: [QI007, QI019]

    - type: private-evidence-only
      severity: blocking
      topic: capital-structure-disclosure
      missingEvidence: >
        Balance sheet, cash position, monthly burn rate, runway estimate, schedule of indebtedness,
        and MALPB regulatory capital held in the Georgia bank subsidiary are unavailable from any
        public source.
      whyItMatters: >
        Capital adequacy cannot be assessed without balance sheet and cash flow data; hidden
        leverage or a deteriorating cash position could materially affect equity value, exit timing,
        and the company's ability to fund the MALPB bank charter regulatory capital obligation.
      diligencePath: >
        Request 3-year audited cash flow statements, current month cash balance, full schedule of
        indebtedness, and Georgia bank subsidiary balance sheet from management under NDA; check
        Companies House subsidiary filings for registered charges on entities 08606477 and 09526965.
      relatedQuestionRefs: [QI024]

    - type: private-evidence-only
      severity: material
      topic: sales-efficiency-metrics
      missingEvidence: >
        Customer acquisition cost, enterprise sales cycle duration by merchant tier, payback
        period, and gross margin breakdown by cost line are not publicly available and have not
        been estimated from any direct data source.
      whyItMatters: >
        GTM sustainability and scalability at 1,000+ enterprise merchants depends on CAC economics;
        margin compression from rising interchange, compliance costs, or AI investment cannot be
        quantified without cost-line granularity.
      diligencePath: >
        Request cohort-level CAC and payback data, sales team headcount and productivity metrics,
        and cost of revenue breakdown from management under NDA; benchmark against Adyen's disclosed
        cost structure in its publicly available annual reports.
      relatedQuestionRefs: [QI014, QI028]
