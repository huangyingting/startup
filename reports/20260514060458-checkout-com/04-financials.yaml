chapter:
  number: 4
  title: Financials
  summary: >
    Checkout.com processed $300B+ in total payment volume in 2025 (64% YoY growth) and achieved
    full-year adjusted EBITDA profitability exceeding 10% margin for the first time, implying
    estimated net revenue of $600M-$900M. However, the Jersey parent company structure exempts
    the group from any mandatory financial disclosure, making revenue, margins, cash position, and
    debt obligations entirely private — the primary diligence blocker for any investment decision.
    The company has raised $1.8B in total capital, has not raised new institutional capital since
    January 2022, and funded an employee share buyback at a $12B valuation from operations in
    September 2025, signalling operational self-sufficiency but leaving capital structure opaque.

sections:
  - id: revenue-model-and-streams
    title: Revenue Model and Streams
    body: >
      Checkout.com generates revenue across six principal streams, all tied to payment activity
      volume or value-added service utilisation. The dominant stream is payment acquiring fees,
      charged as a small percentage of gross transaction value (GTV) where Checkout.com acts as
      the principal acquirer or acquiring network agent for a merchant. Based on $300B+ in total
      payment volume (TPV) disclosed for 2025 and an estimated blended take rate of 0.20-0.30%
      derived from analyst consensus, gross acquiring revenue likely falls in the range of
      $600M-$900M, though the company has never disclosed this figure.

      The second stream is the payment gateway and processing API, which charges per-transaction
      or per-API-call fees for authorisation, tokenisation, and routing services. Third, value-added
      services — Intelligent Acceptance, Fraud Detection Pro, Network Tokens, and Flow checkout —
      generate incremental revenue as separately licensed enterprise products atop core acquiring.
      Fourth, card issuing, conducted in partnership with Visa for B2B virtual and physical cards,
      reached a $5B annualised run rate in Q4 2025. Fifth, payouts (disbursements to marketplace
      sellers, gig-economy workers, and cross-border recipients) form a payout-as-a-service fee
      line. Sixth, FX conversion on cross-border transactions generates spread revenue where
      Checkout.com holds currency risk between settlement and payout.

      Revenue recognition follows the principal-agent framework: where Checkout.com is the principal
      acquirer it recognises gross revenue before interchange pass-through; where it acts as
      gateway-only it recognises net gateway fees only. The split between principal and net revenue
      is not publicly disclosed, creating material uncertainty for gross margin and revenue quality
      analysis. The Black Friday and Cyber Monday 2025 period processed $5.2B in 24 hours with
      approximately 100M transactions, demonstrating peak processing capacity.
    claimRefs:
      - CI001
      - CI004
      - CI005
      - CI008
      - CI009
      - CI010
    tableRefs:
      - TI001
    figureRefs:
      - FI001

  - id: pricing-and-gtm-efficiency
    title: Pricing and GTM Efficiency
    body: >
      Checkout.com operates an exclusively enterprise-direct sales model with no published list
      pricing and no self-serve or developer-led growth funnel. All pricing is negotiated
      individually via multi-year custom contracts. Enterprise merchants are assigned dedicated
      merchant success managers, and the sales cycle for major global enterprise accounts typically
      spans 6-18 months due to integration complexity, regulatory approvals, and the bespoke
      configuration of acceptance optimisation parameters. No self-serve channel or SMB tier exists,
      distinguishing Checkout.com from Stripe's product-led growth motion and making CAC inherently
      high and not publicly estimable.

      Blended take rate analysis using $300B volume and estimated revenue of $600M-$900M implies
      an effective rate of 0.20-0.30%, higher than Adyen's disclosed 0.13-0.15% but consistent with
      Checkout.com's higher value-added service attach rate from Intelligent Acceptance, issuing, and
      payout services. The company has not disclosed average contract value, gross revenue per
      merchant, or retention rates. The 63-merchant Billion Dollar Club and total merchant base of
      1,000+ enterprise accounts implies an estimated ACV range of $1M-$10M per enterprise account,
      entirely analytically derived. Distribution is global-direct with no reseller or channel
      partner programme. Key partnerships with Visa (issuing), Microsoft Azure (cloud infrastructure),
      and SAP (ERP payments integration) function as technology integrations reducing merchant
      onboarding friction rather than acting as revenue-generating distribution channels.
    claimRefs:
      - CI011
      - CI012
      - CI013
      - CI014
    tableRefs:
      - TI002

  - id: cost-structure-and-margins
    title: Cost Structure and Gross Margin Drivers
    body: >
      Checkout.com's cost structure is dominated by payment processing costs — interchange fees,
      card network fees (Visa, Mastercard), and local acquiring network costs. These are estimated
      at 60-70% of gross acquiring revenue, reflecting the economics of card-based payment
      processing where interchange is typically 1.5-2.5% of GTV and is borne by the processor
      before netting to the merchant. For a business at 0.20-0.30% blended take rate on volume,
      the majority of gross GTV passes through as interchange cost, leaving estimated net revenue
      in the $600M-$900M range with gross margin on that net revenue estimated at 50-60% based
      on comparable processor benchmarks.

      Technology infrastructure costs are materially lower than traditional payment processors
      because Checkout.com runs on public cloud (Microsoft Azure) rather than owning data centres,
      eliminating owned-infrastructure capex. Engineering headcount of approximately 1,000 staff
      (half of the ~2,000 total headcount) represents the largest fixed cost base, driving product
      development, AI model training for Intelligent Acceptance, and platform reliability to support
      the 99.999% uptime SLA. Working capital and capex dynamics are favourable: payment settlement
      creates timing differences but Checkout.com does not bear inventory risk or project-finance
      exposure beyond the MALPB bank charter regulatory capital obligation.

      Compliance costs — FCA authorisation, PCI DSS Level 1, GDPR across multiple jurisdictions,
      and now FDIC supervision of the MALPB bank subsidiary — are ongoing and growing operating
      expenditures. The primary capital intensity exposure introduced by the MALPB charter is
      minimum regulatory bank capital, which has not been publicly disclosed and must be treated
      as an unquantified balance-sheet obligation until confirmed through direct engagement with
      management or Georgia banking regulators.
    claimRefs:
      - CI015
      - CI016
      - CI017
      - CI018
      - CI019
      - CI020
    figureRefs:
      - FI002

  - id: public-traction-and-private-gaps
    title: Public Traction and Private Metric Gaps
    body: >
      Checkout.com's publicly disclosed financial indicators are unusually sparse for a company of
      its scale. Disclosed metrics include: total payment volume ($300B+ in 2025), net revenue
      growth rate (>30% YoY for the second consecutive year), adjusted EBITDA margin (>10% full
      year), card issuing annualised run rate ($5B in Q4 2025), APM volume growth (104% in 2025),
      and BFCM processing ($5.2B in 24 hours, ~100M transactions). All are company-claimed figures,
      unaudited and unverified by any independent third party.

      Critical private metrics unavailable for analysis include: absolute net revenue and gross
      revenue, absolute EBITDA, gross margin, customer acquisition cost, churn rate, average
      contract value, gross payment volume by geography, cost of revenue breakdown, balance sheet,
      cash position, and debt obligations. The Jersey holding company structure legally exempts the
      group from UK Companies Act filing requirements that would otherwise mandate annual accounts.
      UK subsidiary filings at Companies House for Checkout Ltd (08606477) and Checkout Technology
      Ltd (09526965) may contain partial UK-entity financials but are filed with delay and reflect
      only UK operations rather than consolidated group financials.

      The absence of these metrics creates a structural diligence gap. Revenue estimates of
      $600M-$900M carry material uncertainty — approximately plus or minus 40% — and should not
      be treated as verified data. The adjusted EBITDA profitability milestone is significant but
      insufficient for underwriting: the denominator (revenue) is unknown, and adjusted EBITDA
      excludes stock-based compensation, restructuring costs, and potentially one-time items that
      are not disclosed. Checkout.com's $15B+ in disclosed merchant value unlocked and 87M daily
      AI optimisations are company-claimed operational metrics, not financial metrics.
    claimRefs:
      - CI007
      - CI021
      - CI022
      - CI023
      - CI024
      - CI025
      - CI026
    tableRefs:
      - TI003
    figureRefs:
      - FI003

  - id: capital-adequacy-and-financing
    title: Capital Adequacy and Financing Dependency
    body: >
      Checkout.com has raised approximately $1.8B in total venture capital, with the most recent
      institutional financing being the $1B Series D at a $40B valuation in January 2022 — now
      over three years ago with no subsequent institutional round disclosed. In September 2025, the
      company conducted an employee share buyback programme at a $12B valuation reference price,
      funded entirely from operational cash flows rather than new external capital. This is a
      positive signal: it implies the company generates sufficient free cash flow to return capital
      to employees without a new financing round, consistent with the claimed >10% adjusted EBITDA
      margin. The buyback amount itself was not disclosed in any public announcement.

      Significant capital adequacy uncertainty remains. The cash position and cash burn rate have
      never been publicly disclosed. No debt facilities, revolving credit lines, or balance-sheet
      obligations have been announced publicly. The Georgia MALPB bank charter, approved in January
      2026, requires minimum regulatory capital to be held in the bank subsidiary as set by Georgia
      banking regulators — this amount has not been confirmed by the company and must be treated as
      an unquantified but real balance-sheet obligation.

      The valuation trajectory provides a secondary capital signal: the decline from $40B in January
      2022 to approximately $12B in September 2025 means any future institutional financing round
      would occur at significant discount to peak valuation. The three-year absence of institutional
      capital is either a sign of intentional self-sufficiency or a symptom of valuation disagreement
      with potential lead investors — both interpretations are consistent with public evidence. No
      debt-to-equity ratio, interest coverage, or leverage metrics are available from any public
      source. Full capital structure diligence requires audited financials and a direct management
      presentation under a signed NDA.
    claimRefs:
      - CI027
      - CI028
      - CI029
      - CI030
      - CI031
      - CI032
      - CI033
      - CI038
    tableRefs:
      - TI004
    figureRefs:
      - FI004

  - id: financial-verdict
    title: Financial Verdict
    body: >
      Revenue quality is strong relative to peer group benchmarks: $300B+ in volume with 64% YoY
      growth from 1,000+ enterprise merchants represents a defensible, diversified revenue base
      with low single-transaction concentration risk and meaningful geographic distribution. The
      >30% net revenue growth for a second consecutive year at this scale is exceptional and
      consistent with the AI acceptance and card issuing upsell theses. The >10% adjusted EBITDA
      margin is a positive inflection milestone, though the absolute EBITDA figure is unknown.

      The margin path is positive but opaque. A business at $600M-$900M estimated revenue with
      >10% adjusted EBITDA implies $60M-$90M in adjusted EBITDA — a viable but modest profit pool
      for a company last valued at $40B. Cloud infrastructure eliminates owned-infrastructure
      capex, favouring margin expansion. The absence of an SMB tier eliminates the support and
      churn costs that compress margins for processors with broad distribution. The primary margin
      risk is sustaining the technology investment required to maintain the AI acceptance
      competitive moat as Adyen Uplift and Stripe Adaptive Acceptance close the gap.

      Capital intensity is low for a payments business (no manufacturing, no owned data centres),
      though the MALPB bank charter introduces regulatory capital obligations of unknown size. The
      primary financial diligence blockers are: (1) no audited revenue or profit disclosure due to
      Jersey structure; (2) no cash position, burn rate, or debt obligations disclosed; (3) adjusted
      EBITDA excludes potentially material costs including stock-based compensation; (4) it is not
      possible to calculate a verified valuation multiple. Any investment commitment requires full
      audited consolidated financials and a complete schedule of indebtedness obtained under NDA.
    claimRefs:
      - CI034
      - CI035
      - CI036
      - CI037
      - CI038
      - CI039
      - CI040
    tableRefs:
      - TI005

