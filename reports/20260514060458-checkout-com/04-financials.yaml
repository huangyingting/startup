        - from: net-revenue-node
          to: opex-node
          label: "Operating cost allocation"
        - from: net-revenue-node
          to: adj-ebitda-node
          label: "Residual after operating costs"
    approximationNotes: >
      All cost estimates are analytically derived from comparable processor economics (Adyen,
