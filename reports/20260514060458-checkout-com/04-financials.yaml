figures:
  - id: FI001
    title: Revenue model bridge
    type: flow
    layout: standard
    summary: >
      How enterprise merchant payment activity converts through acquiring, value-added services,
      and interchange netting into Checkout.com's estimated net revenue base.
    data:
      nodes:
        - id: enterprise-merchant
          label: "Enterprise Merchant (1,000+ accounts)"
          note: "63 Billion Dollar Club; processing $1B+ each annually; custom contracts only"
        - id: tpv
          label: "$300B+ Total Payment Volume (2025)"
          note: "64% YoY growth; >$1B/day; BFCM $5.2B in 24hrs"
        - id: acquiring-fee
          label: "Acquiring Fee (~0.20-0.30% estimated take rate)"
          note: "Primary stream; principal vs. agent split undisclosed"
        - id: vas-revenue
          label: "Value-Added Service Revenue"
          note: "Intelligent Acceptance, Fraud Detection Pro, Issuing ($5B ARR), Payouts, FX"
        - id: net-revenue
          label: "Net Revenue (estimated $600M-$900M)"
          note: ">30% YoY growth second consecutive year; >10% adjusted EBITDA margin"
      edges:
        - from: enterprise-merchant
          to: tpv
          label: "Merchant submits transactions"
        - from: tpv
          to: acquiring-fee
          label: "Principal acquiring revenue net of interchange"
        - from: tpv
          to: vas-revenue
          label: "VAS utilisation and attachment"
        - from: acquiring-fee
          to: net-revenue
          label: "Net acquiring contribution"
        - from: vas-revenue
          to: net-revenue
          label: "VAS contribution"
    approximationNotes: >
      Revenue figures are estimated from publicly disclosed volume ($300B+) and analyst-derived
      take rate benchmarks (0.20-0.30%). No audited or company-confirmed revenue figures exist.
      The net revenue node excludes interchange pass-through which is the largest gross-to-net
      deduction. VAS revenue breakdown by stream is not available from public sources.
    claimRefs:
      - CI001
      - CI005

  - id: FI002
    title: Unit economics bridge
    type: flow
    layout: standard
    summary: >
      Qualitative representation of how gross payment volume translates through interchange costs,
      operating expenses, and technology investment into Checkout.com's estimated adjusted EBITDA.
