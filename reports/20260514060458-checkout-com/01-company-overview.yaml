callouts:
  - calloutType: risk
    title: Valuation Dislocation and Transparency Deficit
    body: >
      Checkout.com's headline valuation collapsed from $40B in January 2022 to $9.35B in 2023 —
      a 77% decline in under two years — before partially recovering to $12B in September 2025.
      The recovery relies entirely on an internally-administered 409A methodology with no new
      external institutional round to validate market price. The Jersey parent incorporation
      means no public revenue or profit disclosures are required, limiting independent verification
      of financial performance claims. Diligence must seek audited accounts, cap table detail,
      and board governance documents before any capital commitment.
    claimRefs:
      - CO014
      - CO017
      - CO018
      - CO019
      - CO020
      - CO004

  - calloutType: strength
    title: Profitable Growth at $300B+ Payment Volume Scale
    body: >
      The combination of $300B+ annual payment volume (64% YoY growth), >30% net revenue growth,
      and >10% adjusted EBITDA margin in 2025 represents a significant commercial milestone.
      Most independent payment processors did not achieve simultaneous high growth and EBITDA
      profitability at this scale before 2026. The 63-merchant "Billion Dollar Club" and the
      January 2026 US bank charter materially strengthen Checkout.com's competitive moat and
      long-term margin profile.
    claimRefs:
      - CO021
      - CO022
      - CO023
      - CO033
      - CO036

  - calloutType: risk
    title: Key-Person Risk — Founder Relocation and Governance Opacity
    body: >
      Guillaume Pousaz remains the sole founder, likely controlling shareholder, and CEO.
      His April 2025 relocation to Monaco reduces his tax liability but increases the governance
      risk of a single-person-controlled private company with an opaque board structure. No
      succession plan or board composition details have been disclosed. Any incapacity, departure,
      or governance dispute would have a material and likely irreversible impact on strategy,
      culture, and investor confidence.
    claimRefs:
      - CO006
      - CO013
      - CO004

