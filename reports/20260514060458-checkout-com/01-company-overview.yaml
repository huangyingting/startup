  name: Checkout.com

chapter:
  number: 1
  title: Company Overview
  summary: >
    Checkout.com is a London-headquartered global payment technology company founded in 2012 by
    Guillaume Pousaz. It processed $300B+ in payment volume in 2025 — a 64% YoY increase — and
    achieved full-year adjusted EBITDA profitability exceeding 10% margin for the first time. The
    company is valued at $12B (September 2025 employee buyback), has raised $1.8B in total capital,
    and obtained approval for a US Merchant Acquirer Limited Purpose Bank (MALPB) charter in Georgia
    in January 2026, expanding its regulated infrastructure capabilities.

sections:
  - id: identity-and-business-model
    title: Identity and Business Model
    body: >
      Checkout.com was founded in 2012 by Guillaume Pousaz as a full-stack payment infrastructure
      provider targeting enterprise merchants globally. It offers end-to-end payment services
      spanning acquiring, payment gateway, card issuing, fraud detection, alternative payment
      methods, and payouts. Its primary customer base is large enterprise merchants — over 1,000
      as of early 2026 — with a "Billion Dollar Club" of 63 merchants each processing more than
      $1B annually through the platform. The company's go-to-market focuses on complex, high-volume
      merchants who demand bespoke acceptance optimisation, risk management, and local acquiring
      capabilities across 50+ countries. Revenue derives from payment processing fees and,
      increasingly, value-added services like Intelligent Acceptance and card issuing. The
      parent entity is incorporated in Jersey, an offshore jurisdiction not legally required to
      disclose revenue or profit. The company operates through two principal UK subsidiaries:
      Checkout Ltd (which holds the FCA acquiring licence) and Checkout Technology Ltd (which
      owns the intellectual property and employs the R&D function). This structure gives the group
      flexibility in managing IP ownership and taxable profit attribution across jurisdictions.
    claimRefs:
      - CO001
      - CO002
      - CO003
      - CO004
      - CO005
      - CO033
    tableRefs:
      - TO001
    figureRefs:
      - FO002

  - id: leadership-and-governance
    title: Leadership and Governance
    body: >
      Guillaume Pousaz founded Checkout.com and has remained CEO throughout its growth from startup
      to a $12B-valued global payments processor. In April 2025, Pousaz relocated from the United
      Kingdom to Monaco in response to changes to the UK non-domicile tax rules, joining a wave of
      ultra-high-net-worth individuals departing the UK under the new tax regime. This relocation
      is a governance signal that diligence must interrogate for continuity risk. The current
      executive team is deep and experienced: CTO Mariano Albera oversees technology, CRO Antoine
      Nougué leads global revenue, CPO Meron Colbeci leads product, COO Jenny Hadlow leads
      operations, and CMO Rory O'Neill leads marketing. For the US banking push, Jordan Reynolds
      was appointed MALPB CEO and Head of North America Banking, reflecting the strategic importance
      of the Georgia bank charter obtained in January 2026. The company employs approximately 2,000
      people globally, with roughly 50% of staff based in the UK. Checkout.com's parent company
      structure in Jersey means that detailed financial disclosures are not required publicly, and
      the group does not release revenue or profit figures, reducing transparency for prospective
      investors and partners evaluating the business.
    claimRefs:
      - CO006
      - CO007
      - CO008
      - CO009
