  evidenceGaps:
    - type: private-evidence-only
      severity: material
      topic: funding
      missingEvidence: >
        Precise Series B (2019) and Series C (2021) round amounts, pre-money valuations,
        lead investors, and terms. Press reports cite ranges ($230M Series B; $450M Series C
        at $15B) but the company has not officially confirmed exact figures.
      whyItMatters: >
        Accurate earlier-round valuations are necessary to model the dilution trajectory and
        assess founder/investor incentive alignment entering the current pre-exit phase.
      diligencePath: >
        Request cap table and full historical term sheets from management in a formal data
        room. Cross-reference with Companies House filings for Checkout Ltd and Checkout
        Technology Ltd.
      relatedQuestionRefs: [QO005, QO028]
      relatedTableRefs: [TO004]

    - type: missing-source
      severity: material
      topic: competitive-positioning
      missingEvidence: >
        Independent head-to-head competitive analysis comparing Checkout.com's payment
        acceptance rates, total cost of processing, product capabilities, and enterprise
        win/loss rates against Stripe, Adyen, and Braintree (PayPal).
      whyItMatters: >
        Without a direct competitive benchmark, it is not possible to verify whether
        Checkout.com's claimed 3.8% average acceptance rate improvement via Intelligent
        Acceptance is differentiated or represents table-stakes performance.
      diligencePath: >
        Obtain the full Forrester Wave Q1 2026 report (paywalled) and commission merchant
        interviews to compare acceptance rates, fees, and integration complexity across
        the top three processors.
      relatedQuestionRefs: [QO024]

    - type: private-evidence-only
      severity: material
      topic: legal-structure
      missingEvidence: >
        Full cap table showing all shareholders, ownership percentages, preference stack,
        liquidation preferences, and board composition including independent directors.
      whyItMatters: >
        The Jersey parent structure and lack of public disclosures mean investor rights,
        governance controls on Pousaz as controlling shareholder, and any anti-dilution
        or drag-along provisions are unknown.
      diligencePath: >
        Request data room access. Review Jersey company register, UK Companies House
        filings for Checkout Ltd and Checkout Technology Ltd, and request a certified
        cap table from management.
      relatedTableRefs: [TO003]

    - type: enumeration-incomplete
      severity: minor
      topic: investors
      missingEvidence: >
        Ownership stakes of individual Series D investors, any secondary market transactions
        since January 2022, and whether any investors have sold down positions.
      whyItMatters: >
        Investor concentration and secondary activity affect available float and likely
        IPO or secondary timeline; unknown liquidation dynamics are a risk for new investors.
      diligencePath: >
        Review secondary market platforms (Forge Global, Nasdaq Private Market) for listing
        activity. Ask management for updated shareholder register at time of data room.
      relatedTableRefs: [TO003]

    - type: enumeration-incomplete
      severity: minor
      topic: leadership
      missingEvidence: >
        Board of directors composition: independent board members, audit committee existence,
        compensation committee, and any investor board seats from Series D investors.
      whyItMatters: >
        Without visibility into independent board oversight, it is not possible to assess
        whether governance controls exist to constrain the founder's decision-making.
      diligencePath: >
        Request a board charter and composition list from management. Check Jersey company
        register for publicly available director information.
      relatedTableRefs: [TO002]

