  - id: milestones-and-strategic-evolution
    title: Milestones and Strategic Evolution
    body: >
      Checkout.com has executed a disciplined strategic expansion over its 14-year history,
      evolving from a gateway provider into a full-stack global payments infrastructure platform.
      Key recent milestones include the February 2025 opening of a San Francisco engineering
      hub, the July 2025 launch of direct acquiring in Canada, and the October 2025 acceptance
      of the MALPB bank charter application by the Georgia Department of Banking and Finance —
      followed by formal approval on January 12, 2026, making Checkout.com one of a small number
      of payment processors with a US bank charter, enabling it to settle directly with card
      networks. The January 2026 acquisition of Blue EMI, a euro stablecoin issuer licensed in
      Lithuania, signals intent to expand into digital currency settlement. The March 2026 SAP
      Commerce Cloud integration via Open Payment Framework extends the company's enterprise ERP
      reach. Checkout.com was named a Leader in the Forrester Wave: Global Merchant Payment
      Processors Q1 2026, with the highest score in the Merchant Experience criterion. The
      company secured global payment partnerships with eBay (April 2025), Uber (October 2025),
      Spotify (February 2026), and a multi-year Microsoft Azure infrastructure agreement. These
      milestones collectively reflect a company transitioning from growth-at-all-costs to
      disciplined, profitable global scale.
