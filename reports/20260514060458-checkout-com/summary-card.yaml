summary:
  headline: >
    Checkout.com is a technically differentiated, direct-acquiring enterprise payment platform with first-ever full-year
    profitability in 2025 and accelerating TPV growth, but the $12B valuation — a 70% discount from its 2022 peak —
    reflects genuine opacity risks from Jersey holding structure, key-person concentration, and the absence of new
    institutional capital for 3+ years.
