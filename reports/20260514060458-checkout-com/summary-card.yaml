  topStrengths:
    - >-
      Direct acquiring moat: FCA (UK) licence and MALPB bank charter (US, approved Jan 2026) give Checkout.com
      network-member economics and lower interchange cost floors vs. aggregator/reseller competitors.
    - >-
      Intelligent Acceptance AI flywheel: 87M daily optimisation decisions and $15B+ in additional merchant revenue
      delivered since June 2023 creates a compounding data moat that is difficult for pure software competitors to
      replicate.
    - >-
      First full-year EBITDA profitability (2025): Achieved >10% adjusted EBITDA margin in 2025 — the first full year —
      demonstrating that the unit economics of direct acquiring are viable at scale, counter to bearish 2022–2023
      narrative.
    - >-
      Accelerating enterprise expansion: 63 Billion Dollar Club merchants (up 62% from 39) and 64% TPV growth confirm
      Checkout.com is winning enterprise mandates despite being priced at a 70% valuation discount to its 2022 peak.
    - >-
      Forrester Wave Leader (Q1 2026): Independent analyst validation consolidates enterprise sales cycles and de-risks
      the competitive position against Adyen and Stripe.
  topRisks:
    - >-
      Jersey holding structure opacity: Checkout Group Ltd (Jersey parent) has no mandatory consolidated P&L disclosure
      obligation; investors rely entirely on voluntary management commentary for revenue and margin visibility.
    - >-
      Key-person concentration — Guillaume Pousaz: Founder holds 100% voting control, Monaco residence since April 2025,
      and is the primary investor relationship manager. An exit or health event has no disclosed succession plan.
    - >-
      No new institutional capital since January 2022 (3+ years): While self-funded profitability is positive, the
      absence of a follow-on institutional round limits governance discipline and delays any IPO timeline.
    - >-
      Valuation mean-reversion risk: At ~$12B, Checkout.com trades at a ~30% discount to Adyen on P/TPV despite similar
      growth; any deterioration in enterprise win rates or US MALPB ramp-up delay could push secondary valuations lower.
    - >-
      ShinyHunters breach precedent: The 2024 legacy cloud storage incident — while no card data was exposed —
      introduces ICO regulatory scrutiny risk and potential enterprise merchant contract review clauses.
  unresolvedGaps:
    - >-
      No audited consolidated P&L; Jersey registration means no mandatory annual accounts disclosure. Net revenue and
      EBITDA margin figures are management-stated and unverifiable without a third-party audit.
    - >-
      US MALPB ramp-up timeline and volumes not disclosed; the $70% US growth figure could reflect a low base; direct US
      acquiring contribution to total TPV and revenue is unknown.
    - >-
      Card Issuing unit economics: the $5B ARR figure is for annualised run-rate TPV through the issuing infrastructure,
      not issuing revenue; margin and take rate for the issuing product line are undisclosed.
    - >-
      Employee equity underwater exposure post-$40B → $12B repricing; risk of talent attrition among option-heavy
      employees hired at 2021–2022 strike prices.
    - >-
      IPO timing: no formal S-1 or prospectus filing as of May 2026; absence of public market path increases liquidity
      risk for late-stage investors and makes exit valuation harder to stress-test.
