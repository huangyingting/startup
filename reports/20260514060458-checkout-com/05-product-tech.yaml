          label: "Merchant Checkout Trigger"
          detail: "Consumer initiates payment; merchant frontend calls Checkout.com Unified API with card token or APM selection"
        - id: w2
          label: "Intelligent Acceptance Routing"
          detail: "ML engine evaluates routing options; selects optimal network path; applies smart retry, network token, and 3DS rules"
        - id: w3
          label: "Fraud Detection Scoring"
          detail: "Fraud Detection Pro assigns ML risk score; adaptive rules applied; high-risk transactions challenged or declined before network submission"
        - id: w4
          label: "Authorisation (Direct Acquiring)"
