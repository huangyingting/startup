  - id: trust-security-and-roadmap
    title: Trust, Security, and Roadmap
    body: >
      Checkout.com's trust and compliance posture is certified at the highest
      commercially available levels. PCI DSS Level 1 Service Provider certification
      — re-assessed annually — covers all cardholder data processing environments.
      ISO 27001 and SOC 2 Type II certifications are current, with scope covering
      global cloud infrastructure. GDPR compliance under EU and UK frameworks is
      maintained via a published privacy policy and Data Processing Agreement
      template (available on request). The trust portal at trust.checkout.com is
      the primary public disclosure surface for compliance certificate links,
      security policies, incident updates, and the public status page.

      The ShinyHunters legacy cloud storage incident (approximately 2021) remains
      a documented open risk: the CTO confirmed no cardholder data or customer
      funds were compromised and the company donated an equivalent amount to
      cybersecurity research as a reputational signal. However, no public post-
      incident remediation report has been published, and a specific completion
      timeline for the legacy storage reconfiguration has not been confirmed as of
      May 2026. No FCA enforcement action related to the incident has been made
      public. This represents a residual transparency gap for enterprise procurement
      teams requiring a signed incident-closure certificate.

      The 2026 roadmap has four confirmed initiatives: (1) Agentic Commerce — AI
      agents that autonomously complete checkout sequences for consumer-authorised
      AI interactions, announced as a core 2026 development priority; (2) US Direct
      Acquiring via the Georgia MALPB charter, approved January 2026 and currently
      in operationalisation; (3) Digital Currency Settlement via Blue EMI
      (Lithuania), enabling euro-stablecoin settlement; and (4) SAP OPF integration
      (GA March 2026) as an ERP distribution layer. The Merchant Risk Council
      partnership (deepened late 2025) provides Fraud Detection Pro with network-
      level fraud pattern intelligence beyond Checkout.com's own transaction corpus.
