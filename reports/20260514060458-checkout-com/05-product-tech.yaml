    type: stack
    layout: wide
    summary: >
      Five-layer architecture of the Checkout.com payment platform from merchant
      developer surface through to direct network acquiring and infrastructure,
      showing principal modules and dependencies at each level.
    data:
      layers:
        - id: merchant-api
          label: "Merchant API & SDK Layer"
