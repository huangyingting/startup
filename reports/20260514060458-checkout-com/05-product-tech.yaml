  - id: architecture-and-operating-model
    title: Architecture and Operating Model
    body: >
      Checkout.com's platform is cloud-native and runs exclusively on Microsoft
      Azure under a multi-year strategic partnership announced in October 2025,
      spanning multiple global Azure regions to support 50+ country acquiring
      coverage with disaster recovery and multi-region failover. The company
      targets 99.999% service-level availability; a public status page at
      status.checkout.com provides real-time component health and historical
      incident data.

      The technology stack is organised in five layers. At the top, a Merchant
      API and SDK layer provides a single RESTful entry point for all payment
      products, with production-grade SDKs in Python, Node.js, .NET, Java, Go,
      iOS (Frames), and Android (Frames) maintained as open-source repositories
      under the github.com/checkout organisation. Beneath that, the Intelligent
      Acceptance Engine applies 87M daily ML decisions across smart retry, network
      token optimisation, and 3DS challenge intelligence. The Direct Acquiring
      Core — FCA-licensed in the UK and MALPB-chartered in Georgia for US —
      sits at the authorisation and settlement layer with direct Visa, Mastercard,
      and Amex network membership. Value-added services (Fraud Detection Pro,
      Flow, Payouts, Network Tokens, Card Issuing) share the same Azure backend.
      The APM Orchestration Layer routes to 50+ third-party payment methods via
      managed redirect and silent redirect flows.

      Peak load was demonstrated on Black Friday and Cyber Monday 2025 when the
      platform processed $5.2B in 24 hours across approximately 100M transactions
      without a reported outage, validating infrastructure scalability. Checkout.com
      was the first PSP to launch Google Pay Secure Payment Authentication (SPA)
      in 2024, confirming deep Tier-1 technology partner integration capability.
      The Frames SDKs (iOS and Android) provide pre-built PCI-compliant card input
      components enabling merchants to accept mobile payments without expanding
      their own PCI scope.
