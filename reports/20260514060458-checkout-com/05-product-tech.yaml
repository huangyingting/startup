callouts:
  - type: strength
    title: "AI Acceptance Data Moat: 87M Daily Decisions"
    body: >
      Intelligent Acceptance processes 87M payment optimisation decisions daily,
      delivering a +3.8 percentage-point average acceptance rate lift and unlocking
      $10B+ in additional merchant revenue since its June 2023 launch. The
      transaction feedback corpus — proprietary to Checkout.com's enterprise
      merchant base — creates a reinforcing data moat that smaller-volume PSPs
      cannot replicate without comparable transaction volume.
    claimRefs:
      - CE002
      - CE003
      - CE016

  - type: strength
    title: "Sponsor-Bank-Free Direct Acquiring in UK and US"
    body: >
      Direct Visa, Mastercard, and Amex network membership eliminates the sponsor
      bank layer for UK (FCA-licensed) and US (MALPB-chartered) acquiring, removing
      an intermediary cost and counterparty risk that constrains gateway-only PSP
      competitors. The January 2026 US MALPB approval converts what was previously
      a structural competitive disadvantage in North America into a cost and
      independence advantage as it operationalises.
    claimRefs:
      - CE015
      - CE017
      - CE029

  - type: risk
    title: "ShinyHunters Breach Remediation Not Publicly Confirmed"
    body: >
      The legacy cloud storage incident identified by the ShinyHunters group circa
      2021 remains partially open: no public post-incident remediation report has
      been published and no timeline for full closure has been confirmed as of May
      2026. While the CTO's assurance of no card data or funds exposure is on
      record, enterprise procurement teams and FCA supervisors typically require
      documented incident-closure certification for ongoing compliance sign-off.
    claimRefs:
      - CE026
      - CE027

  - type: risk
    title: "Multi-Year Azure Cloud Vendor Lock-In"
    body: >
      The October 2025 multi-year Azure partnership creates a single-vendor cloud
      dependency with limited near-term portability. A major Azure regional outage
      or pricing renegotiation would have direct platform availability and cost
      implications. Multi-cloud or hybrid redundancy has not been publicly disclosed
      as part of the architecture.
    claimRefs:
      - CE010
      - CE040

  - type: insight
    title: "Agentic Commerce: First-Mover Positioning in AI-Native Payments"
    body: >
      Checkout.com's 2026 agentic commerce initiative — AI agents completing payment
      sequences on behalf of consumer-authorised AI actors — is the earliest
      explicit product commitment to this payment paradigm from a major PSP. If
      agent-to-agent commerce materialises at scale, Checkout.com's head start in
      building the infrastructure and merchant relationships for AI-native checkout
      could become a category-defining moat.
    claimRefs:
      - CE018
      - CE039

