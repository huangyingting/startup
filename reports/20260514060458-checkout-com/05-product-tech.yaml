  evidenceGaps:
    - type: missing-source
      severity: minor
      topic: developer-ecosystem
      missingEvidence: >
        No public GitHub star counts, npm weekly download totals, PyPI monthly
        download figures, or Stack Overflow tag traffic statistics have been
        identified for Checkout.com's primary SDK repositories (checkout-sdk-node,
        frames-ios, frames-android) as of May 2026; no developer analytics
        dashboard aggregating these signals is publicly accessible.
      whyItMatters: >
        Developer community traction is a leading indicator of API market share and
        developer-led adoption velocity; without quantified community metrics, the
        depth of Checkout.com's developer ecosystem cannot be benchmarked against
        Stripe or Adyen, limiting comparative differentiation assessment.
      diligencePath: >
        Query the npm download stats API for checkout-sdk-node weekly download
        counts; retrieve PyPI monthly download data for checkout-sdk; check GitHub
        public star and fork counts for frames-ios and frames-android; benchmark
        against equivalent Stripe and Adyen SDK repository metrics.
      relatedQuestionRefs:
        - QE017

    - type: missing-source
      severity: material
      topic: reliability
      missingEvidence: >
        Independent third-party review sources (G2, Trustpilot, Capterra) contain
        only limited publicly accessible qualitative merchant feedback on Checkout.com
        API reliability, enterprise support responsiveness, and onboarding quality
        as of May 2026; the G2 product profile exists but the full review corpus
        was not retrieved for this chapter.
      whyItMatters: >
        Enterprise PSP selection is heavily influenced by support quality and API
        stability track record; undisclosed complaint patterns or support
        responsiveness gaps could indicate latent churn risk or onboarding friction
        not captured in official newsroom or partner-sourced materials.
      diligencePath: >
        Retrieve and analyse the complete G2 and Trustpilot review profiles for
        Checkout.com; identify recurring complaint themes across reviews;
        cross-reference with customer chapter findings; conduct 2-3 merchant
        reference calls to validate support quality and API stability under
        production conditions.
      relatedQuestionRefs:
        - QE021

    - type: private-evidence-only
      severity: material
      topic: security
      missingEvidence: >
        No public post-incident remediation report, third-party penetration test
        confirmation, or FCA supervisory response has been published for the
        ShinyHunters legacy cloud storage incident; the full remediation scope,
        timeline, and confirmed closure remain non-public as of May 2026.
      whyItMatters: >
        Open security remediation without confirmed public closure creates a
        residual compliance gap for enterprise merchants and regulators evaluating
        Checkout.com; enterprise procurement teams often require a documented
        incident-closure certificate before contract execution.
      diligencePath: >
        Request the post-incident review report and remediation status certificate
        from Checkout.com's security and trust team; confirm whether the FCA was
        formally notified under GDPR Article 33 and what supervisory response was
        received; request a CREST-certified third-party attestation of the
        remediated cloud storage environment.
      relatedQuestionRefs:
        - QE026

    - type: missing-source
      severity: minor
      topic: competition
      missingEvidence: >
        No independent head-to-head acceptance rate benchmarks comparing Checkout.com
        Intelligent Acceptance to Adyen's Network Optimization or Stripe's Adaptive
        Acceptance exist in public sources; competitor acceptance rate claims use
        different merchant pool compositions and measurement methodologies making
        direct comparison unreliable. No public comparative analysis of Checkout.com
        versus Stripe developer experience has been identified.
      whyItMatters: >
        Without comparative acceptance lift benchmarks, the +3.8 pp average
        improvement claim cannot be contextualised against industry baseline or
        competitor offerings; the developer experience comparison requires primary
        research rather than proxy inference, limiting independent verification of
        Checkout.com's technology differentiation narrative.
      diligencePath: >
        Commission or identify an independent PSP benchmark study (Edgar Dunn,
        Forrester, or Gartner); request head-to-head acceptance rate test data from
        merchant reference contacts running both Checkout.com and Adyen; conduct a
        structured developer experience evaluation comparing Checkout.com, Stripe,
        and Adyen API documentation, SDK coverage, and sandbox quality.
      relatedQuestionRefs:
        - QE014
        - QE023
