  - id: differentiation-and-technical-moats
    title: Differentiation and Technical Moats
    body: >
      Checkout.com's competitive moat rests on three reinforcing components. First,
      direct card network membership (Visa, Mastercard, Amex) enables end-to-end
      ownership of the acquiring relationship: no sponsor bank dependency, lower
      per-transaction cost, and a differentiated acceptance rate baseline compared
      to gateway-only PSPs. The January 2026 Georgia MALPB bank charter extends
      this ownership to the US market, removing a structural competitive
      disadvantage that previously forced Checkout.com to route US card volume
      through a sponsor bank.

      Second, the Intelligent Acceptance AI data moat derives from 87M daily
      optimisation decisions across a large enterprise transaction corpus. This
      data volume is not replicable by smaller-volume PSPs and compounds with
      each additional transaction, creating a reinforcing accuracy advantage. Since
      its June 2023 launch, Intelligent Acceptance has been attributed with $10B+
      in additional merchant revenue unlocked, averaging +3.8 percentage points in
      acceptance rate improvement. Checkout.com was ranked a Leader by a global
      analyst firm for its AI-powered acceptance platform in Q1 2026.

      Third, the integration ecosystem and ERP channel: the SAP Open Payment
      Framework integration (March 2026) distributes Checkout.com's acquiring to
      the SAP enterprise customer base — a new distribution channel bypassing
      the traditional enterprise sales cycle for SAP-using merchants. The Blue
      EMI acquisition (January 2026) adds euro-stablecoin settlement, positioning
      Checkout.com ahead of pure fiat-only competitors in the digital-asset
      settlement layer. The 2026 agentic commerce initiative positions AI agents
      as autonomous checkout actors, with the company's first-mover announcement
      ahead of confirmed comparable commitments from Stripe or Adyen.
