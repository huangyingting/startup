chapter:
  number: 6
  title: Customers
  summary: >
    Checkout.com serves 1,000+ enterprise merchants across six verticals, with
    a Billion Dollar Club of 63 merchants each processing over $1 billion per
    year — up 62% year-on-year — underpinning $300 billion in total 2025
    payment volume at 64% YoY growth. Named customer evidence is strong and
    broad, spanning Wise (5+ years), Spotify (Feb 2026), eBay (Apr 2025),
    Shein, Coinbase, PizzaHut, Virgin, Hyundai, Samsung, Remitly, and Henkel,
    with production-status proof in 12 public case studies or press releases.
    Retention signals are robust in proxy form — no confirmed churn, >30% net
    revenue growth for the second consecutive year, and 104% APM volume
    growth — though NRR, GRR, and merchant-level TPV concentration remain
    undisclosed and are the primary diligence gaps.

sections:
  - id: customer-segmentation
    title: Customer Segmentation
    body: >
      Checkout.com's customer base is deliberately concentrated at the enterprise
      end of the payments market. The company serves 1,000+ enterprise merchants
      as of its February 2026 full-year 2025 results, with no self-serve, SMB,
      or startup tier offered or signalled in any public communications. This
      enterprise-only go-to-market is a structural choice that elevates contract
      value and reduces customer support cost per dollar of TPV, but also means
      every customer relationship is a bespoke, high-stakes negotiation.

      The customer base spans six primary verticals. Digital and e-commerce
      (Shein, Samsung, eBay) is the volume anchor, representing platforms that
      individually process tens of billions in annual GMV. FinTech and crypto
      (Wise, Remitly, Coinbase) is the highest-quality reference cohort, with
      multi-year tenures and published case studies. Travel and hospitality
      (Virgin, Booking.com) and SaaS and streaming (Spotify, DocuSign) represent
      higher-margin, recurring-payment use cases where Intelligent Acceptance and
      subscription billing capabilities deliver measurable acceptance-rate value.
      Food delivery (PizzaHut, Deliveroo) and B2B/industrial (Hyundai, Henkel)
      round out the vertical footprint.

      Geographically, Checkout.com is strongest in Europe and the UK (its home
      market), with the US growing fastest at approximately 70% year-on-year
      volume growth in 2025. Asia-Pacific and Latin America are served through
      alternative payment method coverage but are not disclosed as distinct
      geographic revenue segments. The enterprise-only model means each of the
      1,000+ merchants operates under a bespoke multi-year contract, creating
      structural switching costs that support retention across the customer base.
    claimRefs:
      - CU001
      - CU010
      - CU013
      - CU029
      - CU032
    tableRefs:
      - TU001
    figureRefs:
      - FU001

  - id: adoption-trajectory-and-growth
    title: Adoption Trajectory and Growth
    body: >
      Checkout.com's headline adoption metrics in 2025 represent best-in-class
      growth for a payments infrastructure provider of its scale. Total Payment
      Volume exceeded $300 billion, a 64% year-on-year increase. The company
      processes more than $1 billion per day, and during the peak Black Friday
      and Cyber Monday 2025 window processed a record $5.2 billion in 24 hours
      — a proof point of elastic infrastructure capacity that enterprise
      merchants value highly in high-volume seasonal contexts.

      The Billion Dollar Club grew from 39 to 63 members year-on-year, a 62%
      increase in the number of merchants processing more than $1 billion
      annually. This cohort expansion is the most important single indicator of
      top-tier merchant adoption — it means the company's largest, most valuable
      merchants are staying, and that new large merchants are joining at an
      accelerating rate. Each BDC merchant generating $1B+ per year at a 0.2%
      implied take rate equates to $2M+ in annual revenue, meaning 63 BDC
      merchants alone represent at least $126M in estimated recurring revenue.

      Product adoption within the merchant base also expanded rapidly. Alternative
      Payment Method volume grew 104% year-on-year, indicating existing merchants
      are enabling additional APMs rather than migrating to other processors. Card
      Issuing reached a $5 billion annualised run rate in Q4 2025. US volumes
      grew approximately 70% year-on-year, reflecting the accelerated North
      American strategy underpinned by the Georgia MALPB bank charter approval in
      October 2025. Net revenue grew more than 30% for the second consecutive
      year, consistent with strong net revenue retention.
    claimRefs:
      - CU002
      - CU003
      - CU004
      - CU011
      - CU012
      - CU013
      - CU014
      - CU015
      - CU017
    tableRefs:
      - TU002
    figureRefs:
      - FU002

  - id: named-customer-proof
    title: Named Customer Proof
    body: >
      Checkout.com's named customer evidence is among the strongest in the
      enterprise payments segment, with publicly confirmed relationships spanning
      multiple verticals, geographies, and product depths. Twelve named customers
      have been confirmed through press releases, case studies, or public
      co-branded announcements as of May 2026.

      Wise is the most durable reference: a five-plus-year production deployment
      across acquiring, alternative payment methods, and payouts, with a published
      case study and Intelligent Acceptance AI used to optimise acceptance rates
      across dozens of currency corridors. The relationship illustrates what
      long-term enterprise adoption looks like when a FinTech platform and its
      PSP grow together through multiple product generations.

      Spotify (February 2026 partnership) and eBay (April 2025 partnership) are
      the most strategically significant recent additions. Spotify's global
      subscription billing and acquiring scale — estimated at over $12 billion
      in annual payments — and eBay's marketplace acquiring plus payouts across
      a $70+ billion annual GMV platform represent two of the largest single
      merchant additions in the company's history. Both are near-certain BDC
      entrants based on disclosed payment scales.

      Beyond the flagship references, Shein, Coinbase, PizzaHut, Virgin, Hyundai,
      Samsung, Remitly, and Henkel complete a 12-name roster across all six
      verticals. Production status is confirmed for all named merchants through
      press release, case study, or direct newsroom announcement. The primary
      evidence gap is that the full 1,000+ merchant roster is not disclosed;
      the named 12 represent only the publicly referenceable subset. The customer
      proof matrix provides a comparative view of evidence quality, outcome
      specificity, product depth, and tenure across flagship references.
    claimRefs:
