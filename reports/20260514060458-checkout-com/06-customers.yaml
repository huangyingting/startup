callouts:
  - calloutType: strength
    title: Billion Dollar Club Growth Is the Single Best Durability Signal
    body: >
      The BDC expanding 62% year-on-year (39 to 63 members) in a single annual
      results cycle is strong evidence that Checkout.com is retaining its largest
      merchants and winning new large ones at an accelerating rate. Each BDC
      merchant represents a multi-year contract valued at $2M+ in estimated
      annual revenue at minimum take rate. The combination of BDC growth, 104%
      APM volume expansion, and $5B card issuing ARR indicates that land-and-
      expand is working — merchants stay, expand product scope, and increase
      volumes, creating a compounding revenue base that is structurally resistant
      to churn-on-price dynamics.
    claimRefs:
      - CU002
      - CU011
      - CU014
      - CU017
      - CU031

  - calloutType: risk
    title: Merchant Concentration Is Undisclosed and Potentially Material
    body: >
      With 63 BDC merchants in a 1,000-merchant base, the top 20 merchants
      likely account for 40-50% or more of $300B+ total TPV. This is entirely
      undisclosed. The addition of Spotify and eBay — each likely contributing
      $5B+ in annual TPV — means two recent additions alone may account for
      3-5% of total volume. A single large departure from the BDC cohort could
      remove more volume than Checkout.com adds from dozens of standard-tier
      enterprise merchants in a quarter. Investors should request merchant-level
      TPV distribution under NDA before any commitment.
    claimRefs:
      - CU025
      - CU034
      - CU035
      - CU036

  - calloutType: risk
    title: Valuation Decline and Security Incident Create New Merchant Acquisition Risk
    body: >
      Checkout.com's valuation decline from $40 billion (January 2022) to
      $12 billion (September 2025 employee buyback reference price) is publicly
      known and may trigger questions from enterprise procurement teams about
      long-term vendor stability during the sales cycle. The ShinyHunters-linked
      2024 security incident — while not a confirmed card-data breach — adds a
      data security question to enterprise vendor due diligence. Neither event
      has produced confirmed merchant churn, but both will require active
      mitigation by Checkout.com's enterprise sales team for new logo acquisition
      in 2026 and beyond.
    claimRefs:
      - CU019
      - CU020
      - CU021

  - calloutType: insight
    title: Wise Relationship Is the Definitive Enterprise Durability Proof
    body: >
      Wise's 5+ year tenure across acquiring, APMs, and payouts — with a
      published case study and growing product footprint — is the single best
      proof of what long-term enterprise retention looks like at Checkout.com.
      Wise's own rapid growth (>$50B annual transfer flows) means Checkout.com
      has benefited from organic volume expansion within the relationship without
      any re-contracting required. The Wise case study also validates Intelligent
      Acceptance AI as a retention driver: the acceptance-rate improvement
      creates switching cost beyond mere API migration, since a merchant moving
      to another PSP loses the trained optimisation model built on its own
      transaction history.
    claimRefs:
      - CU005
      - CU028
      - CU037

