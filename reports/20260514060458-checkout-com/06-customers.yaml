  evidenceGaps:
    - type: private-evidence-only
      severity: material
      topic: nrr-grr-retention
      missingEvidence: >
        No public NRR, GRR, or cohort-level revenue retention metric for
        Checkout.com has been published in any analyst, news, or company source.
        The >30% net revenue growth is a combined new-plus-existing metric and
        cannot be decomposed into retention versus new merchant contributions
        without access to per-merchant revenue history.
      whyItMatters: >
        Without NRR or GRR data it is not possible to independently verify
        whether the >30% net revenue growth implies strong same-store retention
        or is primarily driven by new merchant additions. NRR above 100% would
        confirm expanding customer value; NRR below 110% would temper the BDC
        growth narrative.
      diligencePath: >
        Request NRR, GRR, and cohort-level revenue data in the data room during
        investment due diligence; require at least three years of cohort history
        segmented by merchant tier (BDC vs standard enterprise).
      relatedQuestionRefs: [QU006, QU011]

    - type: private-evidence-only
      severity: material
      topic: merchant-concentration
      missingEvidence: >
        Individual merchant TPV breakdown and top-N merchant concentration are
        not publicly disclosed by Checkout.com. The 40-50% top-20 concentration
        estimate is entirely derived from industry benchmarks and BDC structure,
        not from any disclosed data point.
      whyItMatters: >
        Material top-merchant concentration could create significant revenue
        risk if a large BDC merchant churns or reduces volumes; this risk is
        not quantifiable from public information alone, making it a blocking
        diligence item for any investment decision.
      diligencePath: >
        Request merchant-level TPV distribution under NDA, with specific focus
        on the top 10 BDC merchants; model scenarios for single-merchant and
        top-5 departure to stress-test the investment thesis.
      relatedQuestionRefs: [QU014]

    - type: missing-source
      severity: minor
      topic: smb-strategy-gaps
      missingEvidence: >
        No public statement from Checkout.com clarifies whether the company
        plans to address SMB or startup segments in 2026 or beyond, leaving
        the total addressable market scope ambiguous.
      whyItMatters: >
        Enterprise-only focus creates a potential vulnerability if Stripe or
        Adyen successfully attract enterprise prospects with simplifiedpricing
        tiers; understanding Checkout.com's deliberate exclusion rationale is
        important for long-term TAM assessment.
      diligencePath: >
        Review 2026 product roadmap, executive interviews, and any analyst
        reports on Checkout.com's market positioning versus Stripe's enterprise
        tier and Adyen's market share strategy.
      relatedQuestionRefs: [QU025]

    - type: enumeration-incomplete
      severity: minor
      topic: named-customer-proof-enumeration
      missingEvidence: >
        The full 1,000+ enterprise merchant roster is not publicly available;
        only approximately 12 named customers have been confirmed via press
        releases and case studies, representing less than 2% of the total base.
      whyItMatters: >
        The partial enumeration means customer quality, vertical distribution,
        and geographic breadth beyond the named 12 cannot be independently
        verified, leaving a gap in the named customer proof evidence base.
      diligencePath: >
        Request the full merchant list under NDA during due diligence; obtain
        a random sample of 50 merchants for independent reference call outreach.
      relatedTableRefs: [TU003]
      relatedQuestionRefs: []
