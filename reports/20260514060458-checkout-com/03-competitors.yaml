  evidenceGaps:
    - type: private-evidence-only
      severity: minor
      topic: competitor-gtm-channels
      missingEvidence: >
        GTM channel composition, salesforce headcount, and partner-channel strategy for Adyen,
        Stripe, and Worldpay are not publicly disclosed; sales team structure and reseller
        channel data require direct vendor engagement or channel-partner interviews.
      whyItMatters: >
        GTM channel strategy affects enterprise customer acquisition speed, partner conflict
        risk, and the competitive intensity of the enterprise sales cycle that Checkout.com
        faces in key geographies.
      diligencePath: >
        Conduct structured channel-partner interviews with Adyen and Stripe resellers; review
        LinkedIn headcount data for sales team sizing; obtain GTM detail via industry conference
        conversations with competitor sales representatives.
      relatedQuestionRefs: [QP005]

    - type: private-evidence-only
      severity: material
      topic: worldpay-pricing
      missingEvidence: >
        Worldpay's post-GTCR pricing strategy, take-rate targets, and enterprise discount
        structures have not been publicly disclosed following the 2023 acquisition; competitive
        pricing data requires merchant testimonials or channel-partner checks.
      whyItMatters: >
        Worldpay is the largest-volume processor globally and its pricing sets a directional
        floor for enterprise contract negotiations; without this data, pricing comparison
        analysis is incomplete.
      diligencePath: >
        Obtain sample merchant term sheets or proxy estimates via Worldpay channel-partner
        discussions; review enterprise RFP responses from merchants who received competing bids.
      relatedQuestionRefs: [QP008]

    - type: private-evidence-only
      severity: material
      topic: enterprise-merchant-market-share
      missingEvidence: >
        Enterprise merchant count by processor and revenue market share are not disclosed
        by any major PSP; estimates require cross-referencing competitor case-study databases,
        procurement announcements, and third-party industry database estimates.
      whyItMatters: >
        Market share data is needed to assess concentration risk, growth headroom, and the
        competitive intensity of account poaching between Checkout.com, Adyen, and Stripe.
      diligencePath: >
        Cross-reference Adyen, Stripe, and Worldpay public case study databases against
        Checkout.com's disclosed Billion Dollar Club merchant list; purchase Nilson Report
        or similar industry data for volume-based market share proxies.
      relatedQuestionRefs: [QP010]

    - type: missing-source
      severity: material
      topic: checkout-merchant-churn
      missingEvidence: >
        No publicly available win/loss data, merchant attrition rates, or competitive
        displacement evidence for Checkout.com versus Adyen or Stripe has been identified;
        this is the single most important missing piece of competitive durability evidence.
      whyItMatters: >
        Customer attrition is the primary lagging signal of competitive position deterioration
        and should be a mandatory diligence prerequisite before any investment in or
        acquisition of Checkout.com.
      diligencePath: >
        Request direct merchant reference interviews (minimum 10 Checkout.com enterprise
        customers); obtain NPS scores and management disclosure of attrition rates under NDA;
        review public procurement announcements from Checkout.com merchants for PSP changes.
      relatedQuestionRefs: [QP018]

    - type: private-evidence-only
      severity: material
      topic: enterprise-pricing-benchmarks
      missingEvidence: >
        All major PSPs negotiate enterprise contracts privately and no independently published
        pricing benchmarks exist for comparable enterprise-tier contracts; the take-rate
        estimates used in this chapter are derived from public volume and inferred revenue data
        and carry material uncertainty.
      whyItMatters: >
        Pricing comparison is necessary to assess Checkout.com's take-rate sustainability,
        competitive pricing floor, and the risk of margin compression from Adyen or Stripe
        pricing aggression in specific merchant segments.
      diligencePath: >
        Request term sheets and comparable merchant contracts from Checkout.com management
        and seek competing bids from Adyen and Stripe for a comparable hypothetical merchant
        profile during due diligence.
