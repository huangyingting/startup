chapter:
  number: 3
  title: Competitors
  summary: >
    Checkout.com operates in a concentrated field of direct peers (Adyen, Stripe), incumbent
    bank processors (Worldpay, JPMorgan Payments), and adjacent players (Braintree/PayPal,
    Nuvei) competing across enterprise payment acquiring, gateway software, AI acceptance
    optimisation, and alternative payment methods. Its three principal moats — a proprietary
    AI acceptance model trained on $300B+ in annual volume, a first-mover Georgia MALPB bank
    charter enabling sponsor-free US acquiring, and 6-18 month enterprise merchant switching
    costs — provide near-term differentiation, but Adyen and Stripe are actively closing the
    AI acceptance gap and the 70% valuation decline from $40B to $12B since 2022 creates an
    adverse signal relative to Adyen's stable €35–45B public market capitalisation.

sections:
  - id: competitive-landscape-overview
    title: Competitive Landscape Overview
    body: >
      Checkout.com competes against a tiered set of alternatives across three competitive
      dimensions: direct peers offering comparable full-stack enterprise acquiring and payment
      processing; incumbent bank processors delivering bundled bank-relationship pricing; and
      adjacent or substitute solutions including developer-focused gateways, niche verticalists,
      and internal-build options at the largest merchant tier.

      Adyen (Euronext: ADYEN) is the most direct peer — a public enterprise-only processor
      that processed approximately €1.35 trillion in volume in 2024 and earned approximately
      €1.83 billion in net revenue, implying a blended take rate of around 0.13–0.15%. With
      over 3,800 employees and direct-acquiring operations in 36+ markets since 2006, Adyen has
      greater operating history, public disclosure transparency, and market-capitalisation
      credibility than Checkout.com. Stripe (private, ~$65B secondary-market valuation) is the
      largest developer-ecosystem player, processing an estimated $1 trillion annually and
      offering the broadest product suite in the market. Worldpay, acquired by GTCR from FIS in
      2023 for approximately $18 billion, is the largest processor by volume ($2T+) but is
      hampered by legacy infrastructure and technology debt.

      Braintree (PayPal), JPMorgan Payments, and Nuvei complete the competitive set with
      differentiated product emphasis and distinct ICP focus. Status-quo substitutes — in-house
      bank acquiring relationships with Barclays, Lloyds, or Chase — remain viable for
      UK/US-centric merchants. Internal build is possible for mega-merchants such as Amazon,
      but requires $100M+ in investment and multi-year regulatory approvals, constraining
      competitive pressure to the top-10 global merchants only. Big Tech payments (Google Pay,
      Apple Pay) operate at the wallet and consumer layer rather than the direct acquiring layer,
      making them complementary rather than substitutes for Checkout.com's core acquiring product.
