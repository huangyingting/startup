callouts:
  - calloutType: insight
    title: AI Acceptance Is the Key Competitive Battleground
    body: >
      Checkout.com's Intelligent Acceptance (+3.8% average acceptance rate improvement,
      $15B+ merchant value unlocked) is its highest-ROI differentiator and the primary
      reason Adyen and Stripe launched competing AI acceptance products in 2024. The
      estimated 12-18 month lead is real but narrowing; the durability of this moat
      depends on Checkout.com maintaining volume growth above roughly 20% annually to
      expand training-data advantage and continuing model investment ahead of Adyen's
      larger engineering organisation.
    claimRefs:
      - CP024
      - CP026
      - CP032

  - calloutType: risk
    title: Valuation Reset Creates Structural Competitive Disadvantage
    body: >
      Checkout.com's 70% valuation decline from $40B (2022) to $12B (Sept 2025) creates
      a structural disadvantage in talent competition, vendor-pricing negotiation, and
      CFO-level deal credibility versus Adyen (€35-45B public market cap). Reuters and
      multiple financial outlets reported the decline, and without revenue disclosure to
      calibrate valuation multiples, Checkout.com cannot rebut adverse comparisons.
      Any investment or acquisition discussion must account for this signal alongside
      the founder's relocation to Monaco reported by CityAM.
    claimRefs:
      - CP031
      - CP035
      - CP036

