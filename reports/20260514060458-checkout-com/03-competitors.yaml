  - id: pricing-distribution-dynamics
    title: Pricing and Distribution Dynamics
    body: >
      No major payment processor in Checkout.com's competitive tier — including Adyen, Stripe,
      Worldpay, Braintree, or JPMorgan — publicly discloses enterprise pricing. All enterprise
      contracts are custom-negotiated, volume-tiered arrangements that bundle acquiring fees,
      gateway fees, and value-added service charges. Published list pricing (Stripe's 2.9%+$0.30
      and Braintree/PayPal's 2.59%+$0.49) applies to SMB and retail customers only and is not
      representative of enterprise contracts.

      Based on public company disclosures, Adyen's blended take rate is approximately 0.13–0.15%
      of volume, reflecting its enterprise-only mandate and relatively lower value-added service
      attachment. Checkout.com's estimated take rate of 0.20–0.30% (derived from publicly
      disclosed volume of $300B and an estimated revenue run rate of $600M–$900M) implies higher
      per-unit value extraction from AI acceptance value-adds, APM fees, and issuing products.
      Stripe's effective blended rate is higher (approximately 0.4–0.5%) due to its SMB and
      mid-market volume mix, but enterprise-specific pricing converges with Adyen and Checkout.com.

      GTM motion differentiation is meaningful. Checkout.com uses a direct enterprise sales
      model with dedicated merchant success managers — similar to Adyen's model. Stripe uses
      a product-led growth funnel that converts developer adoption to enterprise accounts.
      JPMorgan bundles payment services into broader banking relationships, lowering the
      marginal payment price but increasing bank-relationship dependency. Worldpay's legacy
      reseller and bank-channel distribution is its primary market access mechanism, less
      relevant for API-first enterprise merchants seeking modern integration stacks.
