      - TM003
    figureRefs:
      - FM003

  - id: growth-drivers-and-constraints
    title: Growth Drivers and Adoption Constraints
    body: >
      The primary growth drivers for Checkout.com's market are structural: (1) e-commerce
      compound annual growth of 10–15% expands the absolute volume of enterprise digital
      payments annually; (2) cross-border payment complexity — multiple currencies, local
      APMs, regulatory requirements across 50+ countries — makes in-house payment
      infrastructure uneconomical for most enterprises; (3) AI/ML-powered acceptance
      optimisation creates a new value layer beyond commodity processing fees, increasing
      average customer revenue and reducing churn; (4) alternative payment method proliferation
      (BNPL, digital wallets, real-time payments) requires ongoing platform investment; and
      (5) the US bank charter (MALPB, approved January 2026) enables direct card network
      settlement, reducing costs and improving settlement speed for US merchants.
      Key adoption constraints include: (1) high switching costs (6–18 month migrations);
      (2) capital requirements for banking charter compliance; (3) PCI DSS and regulatory
      compliance complexity; (4) competition from bank-integrated payment solutions with
      balance sheet leverage; (5) pricing pressure as base acquiring fees compress under
      EU interchange regulation (0.2–0.3% caps) and US network rule changes; (6) increasing
      fraud rates (57% of merchants saw worsening fraud in 2025 per MRC data) that raise
      operational costs; and (7) large-merchant proprietary payment infrastructure reducing
      TAM at the very top of the market. The balance of drivers versus constraints supports
      continued double-digit growth in the enterprise segment, with AI differentiation and
      direct acquiring (via MALPB) as the most defensible margin levers.
    claimRefs:
