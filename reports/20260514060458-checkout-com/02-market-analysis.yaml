  - id: buyer-and-segment-map
    title: Buyer and Segment Map
    body: >
      Checkout.com's target buyer is the payments or treasury executive at a large enterprise
      merchant — typically a VP of Payments, CFO, or CTO, often supported by a vendor
      evaluation team including IT security, legal, and finance. Decision cycles are long
      (6–18 months) and switching is costly (API integration, merchant testing, regulatory
      compliance). The primary verticals served include e-commerce and marketplaces (eBay),
      mobility and ride-hailing (Uber), digital subscriptions and streaming (Spotify), social
      commerce (Pinterest), and digital services. By geography, Checkout.com's primary
      deployment is in Europe (UK-headquartered, FCA-licensed) and growing rapidly in
      North America (US volumes >70% growth in 2025, Canada direct acquiring launched 2025).
      Asia-Pacific, Latin America (Sao Paulo hub), Middle East, and Japan represent growth
      adjacencies. The "Billion Dollar Club" of 63 merchants represents the top tier of
      Checkout.com's buyer pyramid — each processing >$1B through the platform annually,
      up from 39 in 2024, demonstrating both merchant spend growth and net new enterprise wins.
      The buyer's primary decision criteria are: acceptance rate (measured by Intelligent
      Acceptance's average 3.8% improvement), platform uptime (99.999%), local acquiring
      coverage, fraud/chargeback management, and total cost of processing.
    claimRefs:
      - CM016
      - CM017
      - CM018
      - CM019
      - CM020
      - CM021
