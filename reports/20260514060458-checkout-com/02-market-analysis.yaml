callouts:
  - calloutType: insight
    title: AI-Powered Acceptance Optimisation Transforms the Market's Revenue Equation
    body: >
      Traditional payment processing competed on price (basis points) and reliability. Checkout.com's
      Intelligent Acceptance — delivering 87M daily optimisations and $15B+ in additional
      merchant revenue since June 2023 — represents a qualitative shift: payment infrastructure
      that generates measurable merchant ROI above the base fee. An average 3.8% acceptance rate
      improvement at a merchant processing $1B annually translates to $38M in additional revenue
      captured, making Checkout.com's contract a revenue-positive investment rather than a cost.
      This reframes the buyer conversation from "cheapest processor" to "highest ROI processor"
      and justifies premium pricing — a structural competitive advantage.
    claimRefs:
      - CM025
      - CM019
      - CM021

  - calloutType: risk
    title: TAM Opacity Creates Significant Sizing Risk
    body: >
      The enterprise payment processing market lacks a single credible authoritative sizing study.
      Range estimates vary by 5–10× depending on scope, take-rate assumptions, and geographic
      coverage. Checkout.com does not disclose revenue, preventing independent verification of
      its take rate, gross margin, or market share. This opacity makes it impossible to determine
      whether Checkout.com is growing market share or simply riding macro e-commerce tailwinds.
      Any DCF or multiple-based valuation should stress-test market size assumptions across the
      full range of plausible estimates.
    claimRefs:
      - CM008
      - CM011
      - CM013
      - CM014

  - calloutType: risk
    title: Pricing Pressure and Interchange Regulation Compress Base Acquiring Margins
    body: >
      EU interchange fee regulation (0.2% consumer debit, 0.3% consumer credit cap) and ongoing
      US regulatory scrutiny compress base acquiring fee economics. This structural headwind means
      growth in processing volume does not translate linearly to revenue or margin improvement.
      Checkout.com's value-added services (Intelligent Acceptance, fraud detection, card issuing)
      are the primary margin defense — but these are also the most contested battlegrounds, with
      Adyen, Stripe, and bank processors all investing in similar capabilities.
    claimRefs:
      - CM028
      - CM030
      - CM032

