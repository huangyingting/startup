summary:
  headline: >
    Checkout.com 是技术差异化明显、具备直接收单能力的企业支付平台，2025 年首次实现全年盈利，TPV 增长也在加速；但 $12B 估值较 2022 年峰值折价 70%，反映的是真实不透明风险：Jersey
    控股结构、关键人集中，以及 3 年多没有新的机构资本。
