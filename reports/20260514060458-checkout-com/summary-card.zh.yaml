  shortDescription: >
    Checkout.com is a global enterprise payment technology company that provides direct card acquiring, intelligent
    acceptance optimisation, card issuing, fraud detection, and alternative payment methods to 1,000+ enterprise
    merchants. Founded in 2012 by Guillaume Pousaz, it processed $300B+ in total payment volume in 2025 and achieved its
    first full-year adjusted EBITDA profitability. Its last institutional funding round raised $1B at a $40B valuation
    in January 2022; a September 2025 employee share buyback implied a ~$12B valuation.
