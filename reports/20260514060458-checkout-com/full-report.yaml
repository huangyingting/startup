  - number: 2
    title: Market Analysis
    sections:
      - number: '2.1'
        title: Market Boundary and Taxonomy
        blocks:
          - type: paragraph
            body: >
              Checkout.com's primary market is enterprise payment processing — the end-to-end handling of
              card-not-present (online) and card-present transactions for large commercial merchants. The market
              includes payment acquiring (accepting card transactions and routing to card networks), payment gateway
              software (API-based transaction routing and tokenisation), fraud detection and risk management,
              alternative payment method (APM) acceptance (wallets, BNPL, real-time payments), card issuing for B2B use
              cases, and payouts. The market explicitly excludes consumer banking deposits, mortgage lending, insurance,
              and investment products. Adjacent markets — into which Checkout.com is expanding — include digital
              currency settlement (via Blue EMI acquisition) and US regulated banking (via the Georgia MALPB charter).
              Status-quo substitutes include in-house bank-owned acquiring relationships (Chase Paymentech, Barclays,
              Lloyds), legacy payment service providers (Worldpay/FIS, Adyen, Stripe), and proprietary payment
              infrastructure built by very large merchants (Amazon Pay, Meta Pay). The critical market distinction is
              enterprise vs. SMB: Checkout.com targets merchants above roughly $100M annual revenue who need bespoke
              integration, local acquiring in 50+ countries, and dedicated technical support — a narrower but
              higher-value segment than the SMB-focused players (Stripe, Square, PayPal).
            claimRefs:
              - CM001
              - CM002
              - CM003
              - CM004
              - CM005
              - CM006
              - CM007
