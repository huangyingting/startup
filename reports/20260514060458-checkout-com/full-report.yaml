      - number: '4.5'
        title: Capital Adequacy and Financing Dependency
        blocks:
          - type: paragraph
            body: >
              Checkout.com has raised approximately $1.8B in total venture capital, with the most recent institutional
              financing being the $1B Series D at a $40B valuation in January 2022 — now over three years ago with no
              subsequent institutional round disclosed. In September 2025, the company conducted an employee share
              buyback programme at a $12B valuation reference price, funded entirely from operational cash flows rather
              than new external capital. This is a positive signal: it implies the company generates sufficient free
              cash flow to return capital to employees without a new financing round, consistent with the claimed >10%
              adjusted EBITDA margin. The buyback amount itself was not disclosed in any public announcement.

              Significant capital adequacy uncertainty remains. The cash position and cash burn rate have never been
              publicly disclosed. No debt facilities, revolving credit lines, or balance-sheet obligations have been
              announced publicly. The Georgia MALPB bank charter, approved in January 2026, requires minimum regulatory
              capital to be held in the bank subsidiary as set by Georgia banking regulators — this amount has not been
              confirmed by the company and must be treated as an unquantified but real balance-sheet obligation.

              The valuation trajectory provides a secondary capital signal: the decline from $40B in January 2022 to
              approximately $12B in September 2025 means any future institutional financing round would occur at
              significant discount to peak valuation. The three-year absence of institutional capital is either a sign
              of intentional self-sufficiency or a symptom of valuation disagreement with potential lead investors —
              both interpretations are consistent with public evidence. No debt-to-equity ratio, interest coverage, or
              leverage metrics are available from any public source. Full capital structure diligence requires audited
              financials and a direct management presentation under a signed NDA.
