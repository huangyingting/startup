      - number: '8.4'
        title: Thesis-Break Triggers and Final Diligence Asks
        blocks:
          - type: paragraph
            body: >
              Eight monitorable kill triggers govern the investment thesis for Checkout.com. Of these, two are binary
              existential threats — FCA licence enforcement and MALPB revocation — that would require immediate exit
              regardless of valuation. The remaining six are threshold-based degradation signals that trigger diligence
              review, portfolio action planning, or active hedging rather than automatic exit. The kill criterion for
              Pousaz departure is a material but manageable event if a succession plan and named incoming CEO are
              announced simultaneously; an unplanned departure without succession constitutes an existential governance
              failure. The $8B secondary valuation kill criterion acts as a quantitative trip-wire: below this level,
              the investor preference stack from $1.8B of prior rounds begins to structurally impair common/ordinary
              equity returns even in the bull case.

              Final diligence asks are sequenced by blocking priority. The consolidated audited accounts and net revenue
              retention rate are blocking items — no committed capital should be deployed without these. The cap table
              and liquidation preference waterfall is the third blocking item because it determines the actual return
              profile of any entry below the $40B prior round mark. The MALPB charter conditions, merchant TPV
              concentration data, and IPO roadmap specifics are material diligence items that affect scenario weighting
              but do not individually block investment if the three blocking items are satisfied and the governance
              preconditions (independent director, succession plan) are met before closing.

              Investors with existing relationships at Adyen, Stripe, or PayPal should conduct a structured win/loss
              interview programme with two to three recently renewed Checkout.com enterprise merchants to validate the
              NRR thesis and gather independent product feedback. This primary diligence step — alongside the data room
              requirements above — represents the minimum independent verification framework for a $12B conditional buy
              position.
