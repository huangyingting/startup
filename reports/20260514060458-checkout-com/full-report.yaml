  - id: TV006
    title: Final diligence asks table
    columns:
      - Topic
      - Missing Evidence
      - Why It Matters
      - Owner / Diligence Path
    rows:
      - - Consolidated audited accounts
        - >-
          No public group P&L for Checkout Group Ltd (Jersey parent); all financial metrics are unaudited company press
          releases
        - >-
          Cannot verify net revenue, EBITDA margin, revenue mix, or cost structure; financial model is built on
          estimated ranges; a material gap from estimates would reprice the investment
        - >-
          Request FY2023–FY2025 consolidated group accounts under NDA from CFO; engage Big Four audit firm to perform
          agreed-upon procedures
      - - Net Revenue Retention rate
        - No NRR, GRR, or merchant cohort retention data disclosed; only proxy is BDC count growth from 39 to 63
        - >-
          Inability to model organic growth vs net new logo growth; hidden churn would collapse the base case revenue
          model and the 25–35% growth assumption
        - >-
          Request NRR and GRR by merchant cohort (2022–2025) and by product line (acquiring vs issuing vs APM) in data
          room; require independent calculation methodology
      - - Cap table and preference overhang
        - >-
          No published cap table, liquidation preference schedule, or anti-dilution provision disclosure; $1.8B in
          multiple preferred rounds
        - >-
          Preference overhang structure determines actual investor return in base and bear exits; a full-ratchet
          anti-dilution provision at the $40B round would severely impair any entry below $25B
        - >-
          Request fully diluted cap table, preference waterfall model, and anti-dilution provision terms for all series;
          stress-test returns at $12B, $16B, and $22B exit prices
      - - MALPB charter conditions
        - >-
          Georgia DBF charter conditions not publicly disclosed; the January 2026 approval letter and any conditions
          attached are private
        - >-
          Undisclosed restrictive conditions could limit US direct-acquiring scope, require additional capital, or
          impose BSA/AML programme milestones that slow the bull case ramp
        - >-
          Request full Georgia DBF charter approval letter and any compliance conditions under NDA; engage independent
          US banking regulatory counsel to assess the conditions
      - - Merchant TPV concentration
        - >-
          No per-merchant or top-N merchant TPV breakdown; 40–50% top-20 estimate is analyst inference from BDC
          composition
        - >-
          Single BDC departure removes $2B+ TPV; without concentration data the base case revenue model has
          unquantifiable churn risk; contract expiry schedule is equally critical
        - >-
          Request top-10 and top-20 merchant TPV breakdown; contract expiry schedule (2025–2028); and any contractual
          minimum spend commitments in the data room
      - - IPO roadmap and governance structure
        - >-
          No S-1 filed; no banks named; no LSE/NYSE venue selected; no board composition disclosure; Pousaz succession
          plan not disclosed
        - >-
          IPO is the most likely bull-case exit path; without a credible 2027–2028 timeline and independent board
          commitment, the bull case return must be haircut by 12–18 months
        - >-
          Request board composition, independent director appointment plan, investment bank engagement letters, and IPO
          readiness assessment from management
    notes: >
      Diligence priorities are sequenced by blocking status: consolidated accounts, NRR, and cap table are blocking
      items (no capital commitment without these); MALPB conditions, merchant concentration, and IPO roadmap are
      material items. The governance requirements (independent director appointment, succession plan) are recommended as
      closing conditions for any commitment, not merely diligence requests. All data room requests assume a standard
      NDA/confidentiality agreement is in place.
    claimRefs:
      - CV008
      - CV010
      - CV015
