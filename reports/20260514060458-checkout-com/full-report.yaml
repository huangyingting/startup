        title: Adoption Trajectory and Growth
        blocks:
          - type: paragraph
            body: >
              Checkout.com's headline adoption metrics in 2025 represent best-in-class growth for a payments
              infrastructure provider of its scale. Total Payment Volume exceeded $300 billion, a 64% year-on-year
              increase. The company processes more than $1 billion per day, and during the peak Black Friday and Cyber
              Monday 2025 window processed a record $5.2 billion in 24 hours — a proof point of elastic infrastructure
              capacity that enterprise merchants value highly in high-volume seasonal contexts.

              The Billion Dollar Club grew from 39 to 63 members year-on-year, a 62% increase in the number of merchants
              processing more than $1 billion annually. This cohort expansion is the most important single indicator of
              top-tier merchant adoption — it means the company's largest, most valuable merchants are staying, and that
              new large merchants are joining at an accelerating rate. Each BDC merchant generating $1B+ per year at a
              0.2% implied take rate equates to $2M+ in annual revenue, meaning 63 BDC merchants alone represent at
              least $126M in estimated recurring revenue.

              Product adoption within the merchant base also expanded rapidly. Alternative Payment Method volume grew
              104% year-on-year, indicating existing merchants are enabling additional APMs rather than migrating to
              other processors. Card Issuing reached a $5 billion annualised run rate in Q4 2025. US volumes grew
              approximately 70% year-on-year, reflecting the accelerated North American strategy underpinned by the
              Georgia MALPB bank charter approval in October 2025. Net revenue grew more than 30% for the second
              consecutive year, consistent with strong net revenue retention.
