  - number: 5
    title: Product & Technology
    sections:
      - number: '5.1'
        title: Product Definition and Module Map
        blocks:
          - type: paragraph
            body: >
              Checkout.com delivers payment infrastructure to enterprise merchants as a horizontally integrated platform
              spanning seven core product modules, all served under a single commercial relationship and unified API
              contract. Merchants integrate once — via RESTful API, hosted Frames SDK, or pre-built platform connectors
              — and gain access to card-not-present acquiring across 150+ currencies and 50+ countries, Intelligent
              Acceptance AI, card issuing, Fraud Detection Pro, payouts, Flow (hosted checkout UI), and an orchestrated
              network of more than 50 alternative payment methods including Apple Pay, Google Pay, Klarna, Pix, FedNow,
              and SEPA Instant.

              The customer-facing workflow begins when a merchant buyer initiates checkout: the Checkout.com Unified API
              receives the payment request, applies Intelligent Acceptance routing to select the optimal network path,
              submits for authorisation via the direct acquiring core, receives the issuer decision, and returns the
              result to the merchant within a few hundred milliseconds. Value-added services — Fraud Detection Pro
              scoring, network token presentation, and 3D Secure challenge orchestration — are applied inline as part of
              the same API transaction. Payouts and card issuing operate on co-hosted API surfaces managed within the
              same merchant dashboard.

              Commercially, all modules are priced per transaction or as enterprise add-ons negotiated in bespoke
              multi-year contracts. There is no published list pricing or self-serve tier. The 1,000+ enterprise
              merchant base and the 63-merchant Billion Dollar Club (each processing $1B+ annually) represent the
              addressable customer base for the complete product stack. APM volume grew 104% year-on- year in 2025, and
              card issuing reached a $5B annualised run rate in Q4 2025, underscoring the successful commercial
              expansion of value-added modules beyond core acquiring.
