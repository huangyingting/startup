  - id: FV004
    title: Investment KPIs
    slug: investment-kpis
    type: kpi
    summary: >
      Investment committee-ready KPI scorecard for Checkout.com covering total payment volume, net revenue growth,
      adjusted EBITDA margin, current implied valuation, card issuing ARR, and US geographic volume growth. These six
      metrics represent the core indicators for monitoring thesis progress against the base-case model.
    data:
      items:
        - id: tpv
          label: 2025 Total Payment Volume
          value: $300B+
          note: +64% YoY; 63 Billion Dollar Club enterprise merchants; BFCM 2025 single-day peak $5.2B
        - id: revenue-growth
          label: 2025 Net Revenue Growth
          value: '>30% YoY'
          note: Second consecutive year of >30% net revenue growth; absolute revenue undisclosed; est. $520–600M
        - id: ebitda
          label: 2025 Adj. EBITDA Margin
          value: '>10%'
          note: First full-year profitability milestone; estimated $52–60M adj. EBITDA on $520–600M net revenue
        - id: valuation
          label: Implied Valuation (Sep 2025)
          value: ~$12B
          note: Employee share buyback reference price; 70% decline from $40B Jan 2022 peak; secondary market proxy
        - id: issuing-arr
          label: Card Issuing ARR (Q4 2025)
          value: $5B
          note: Annualised run rate; Visa partnership; new product line not yet material to revenue but strong trajectory
        - id: us-growth
          label: US Volume Growth 2025
          value: ~70% YoY
          note: Fastest-growing geography; MALPB charter enables direct US acquiring from Jan 2026 onwards
