  - id: TV005
    title: Thesis-break and kill triggers table
    columns:
      - Trigger Event
      - Observable Threshold
      - Transmission to Thesis
      - Required Action
    rows:
      - - FCA enforcement action filed
        - >-
          Formal enforcement notice, licence variation, or requirement published on FCA public register against Checkout
          Ltd or Checkout Technology Ltd
        - >-
          Blocks UK/EEA acquiring; collapses UK/EU revenue thesis; signals severe regulatory risk across all
          jurisdictions
        - >-
          Immediate investment halt or exit trigger; engage regulatory counsel within 48h; monitor FCA enforcement
          database
      - - MALPB charter revoked or materially restricted
        - Georgia DBF publishes charter suspension, revocation, or material conditions amendment
        - >-
          Collapses US direct-acquiring bull case; removes $5–10B from valuation in base/bull scenarios; signals
          execution failure in the highest-value growth market
        - Halt further capital deployment; reassess US revenue model; assess exit timeline
      - - Guillaume Pousaz departure without named successor
        - CEO transition announcement without simultaneous named successor and transition plan
        - >-
          IPO delay by 12–18 months minimum; investor confidence at risk; governance vacuum makes primary round
          impossible near-term
        - Activate governance monitoring protocol; engage board; potential down-round or exit evaluation
      - - Valuation below $8B in any transaction
        - Secondary trade, employee programme, new primary round, or buyback priced below $8B implied company value
        - Down-round triggers; preference overhang impairs common equity; thesis return model fails in base case
        - Fundamental reassessment of investment thesis; model preference stack; assess legal options
      - - BDC merchant count below 60
        - Annual results announcement showing BDC count below 60 (currently 63 in FY2025)
        - >-
          NRR thesis impairment; net BDC contraction of 5%+ signals underlying retention problem not visible in press
          releases
        - Demand per-merchant TPV cohort data before further commitment; model churn scenarios
      - - Azure outage exceeding 4 hours in BFCM/Q4 peak
        - Confirmed platform outage during any November–December peak processing window exceeding 4 hours
        - >-
          SLA breach at $5.2B/day processing rate; merchant churn exposure; $867M+ unprocessed payments; enterprise
          confidence impact
        - Assess SLA penalty exposure; demand multi-cloud architecture disclosure; model churn scenarios
      - - 'ICO enforcement notice re: ShinyHunters or subsequent breach'
        - ICO publishes enforcement notice confirming card-data compromise or fine >£1M for breach-related violations
        - >-
          GDPR fine up to 4% global annual revenue (undisclosed quantum); enterprise procurement risk; regulatory
          escalation in multiple jurisdictions
        - Engage data protection counsel; assess ICO timeline; re-evaluate enterprise sales pipeline risk
      - - Visa or Mastercard membership review or suspension notice
        - Formal notice of membership review, corrective action plan, or suspension from Visa or Mastercard
        - >-
          Existential threat: suspension would immediately halt all acquiring for branded cards; no operational fallback
          exists
        - >-
          Immediate exit trigger regardless of valuation; engage payment network relationship team; assess recourse
          options
    notes: >
      Kill trigger thresholds are analyst-defined monitoring criteria and do not represent contractual terms or legal
      obligations. The BDC threshold of 60 is set below the current 63 to allow for normal single-year variation; a drop
      below 60 represents a material net contraction. The $8B valuation kill criterion is based on the bear-case lower
      bound minus a 15% buffer; below this level the preference stack on $1.8B of prior preferred equity significantly
      impairs common equity returns.
