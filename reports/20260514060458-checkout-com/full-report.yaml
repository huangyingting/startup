      - number: '1.2'
        title: Leadership and Governance
        blocks:
          - type: paragraph
            body: >
              Guillaume Pousaz founded Checkout.com and has remained CEO throughout its growth from startup to a
              $12B-valued global payments processor. In April 2025, Pousaz relocated from the United Kingdom to Monaco
              in response to changes to the UK non-domicile tax rules, joining a wave of ultra-high-net-worth
              individuals departing the UK under the new tax regime. This relocation is a governance signal that
              diligence must interrogate for continuity risk. The current executive team is deep and experienced: CTO
              Mariano Albera oversees technology, CRO Antoine Nougué leads global revenue, CPO Meron Colbeci leads
              product, COO Jenny Hadlow leads operations, and CMO Rory O'Neill leads marketing. For the US banking push,
              Jordan Reynolds was appointed MALPB CEO and Head of North America Banking, reflecting the strategic
              importance of the Georgia bank charter obtained in January 2026. The company employs approximately 2,000
              people globally, with roughly 50% of staff based in the UK. Checkout.com's parent company structure in
              Jersey means that detailed financial disclosures are not required publicly, and the group does not release
              revenue or profit figures, reducing transparency for prospective investors and partners evaluating the
              business.
