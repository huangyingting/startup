      - number: '6.4'
        title: Retention, Concentration, and Expansion Risk
        blocks:
          - type: paragraph
            body: >
              Retention evidence for Checkout.com is strong in proxy form but absent in direct disclosure form. The
              company has never published NRR, GRR, or cohort-level revenue retention metrics. However, three signals
              strongly imply high net revenue retention. First, net revenue grew more than 30% for the second
              consecutive year in 2025 — an outcome inconsistent with high churn. Second, the BDC grew from 39 to 63
              merchants in one year, implying retention of existing BDC members at very high rates alongside new
              entrants. Third, no publicly confirmed major merchant churn event has been reported in trade, news, or
              adverse sources as of May 2026.

              Multi-year enterprise contracts (typically two to three years minimum) provide structural retention
              mechanisms. Switching a PSP relationship involves API migration, compliance re-certification, and
              operational risk — costs that strongly disincentivise opportunistic switching on price alone. The 62% BDC
              cohort expansion implies both retention and expansion of the top-tier merchant base.

              Concentration risk is the most material unresolved diligence item. The top 20 merchants in a
              1,000-merchant base with 63 BDC members likely account for 40-50% or more of total TPV. This is
              undisclosed by the company. A departure of one or two of the largest BDC merchants could materially affect
              reported volumes. The valuation decline from $40 billion (2022) to $12 billion (2025) and the
              ShinyHunters-linked 2024 security incident are the two adverse facts most likely to affect new merchant
              acquisition rather than existing merchant retention. Neither has been reported to have caused merchant
              churn as of this report date. Independent review data (G2, Trustpilot, Gartner Peer Insights) confirms
              generally positive merchant sentiment, though pricing transparency and self-service gaps remain persistent
              complaints.
