      - number: '8.3'
        title: Comparable Company Analysis
        blocks:
          - type: paragraph
            body: >
              The most relevant public comparable for Checkout.com is Adyen, which operates a near-identical
              direct-acquiring model for enterprise merchants, is European-headquartered, and processes a similar TPV
              range. As of Q1 2026, Adyen trades at approximately $42B (€38B) market capitalisation, implying roughly 8x
              trailing revenue and 3.5% P/TPV on an estimated $1.2T annual TPV. At $12B on $300B TPV, Checkout.com
              trades at 4.0% P/TPV — a slight premium to Adyen's P/TPV ratio but at the same revenue multiple,
              reflecting higher TPV growth (64% vs Adyen's ~20–25%) offset by smaller absolute scale and less liquidity.
              The Adyen comparison supports the view that $12B is a fair-to- attractive entry point, not a stretched
              valuation.

              Stripe, valued at approximately $65B in its last known institutional round (Series I, 2023), is a partial
              comparable: it operates a developer-first aggregator model with broader SaaS components and serves a wider
              market segment including SMB. The $65B valuation implies approximately 12x estimated revenue, a premium to
              both Adyen and Checkout.com that reflects Stripe's product breadth and higher growth expectations.
              Stripe's higher revenue multiple does not support upward re-rating of Checkout.com without a corresponding
              expansion of the business model beyond pure acquiring.

              PayPal, Worldpay, Nuvei, and Klarna round out the comparable set with varying degrees of relevance.
              PayPal's depressed 2.5x revenue multiple and 0.7% P/TPV reflect mature growth and a consumer/SMB mix that
              Checkout.com does not share. Worldpay (PE-backed, ~$18B post-FIS sale) and Nuvei (go-private, ~$6.5B)
              represent the lower end of the enterprise acquiring spectrum — useful anchors for downside scenario
              pricing. Klarna's ~$15B BNPL valuation provides a European fintech frame but is structurally distinct. The
              overall peer set suggests that Checkout.com at $12B is trading at or below the lower end of its natural
              comparable range when adjusted for growth premium.
            claimRefs:
