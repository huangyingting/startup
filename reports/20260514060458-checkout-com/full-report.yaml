  - number: 7
    title: Risks
    sections:
      - number: '7.1'
        title: Regulatory, Legal, and Compliance Risks
        blocks:
          - type: paragraph
            body: >
              Checkout.com operates through a complex multi-jurisdictional structure that creates compounding regulatory
              risk. The parent entity, Checkout Group Ltd, is incorporated in Jersey — a Crown dependency that requires
              no mandatory consolidated P&L disclosure and operates outside direct EU or UK FCA regulatory perimeter at
              the group level. This creates opacity for regulators and investors evaluating capital adequacy and
              group-level exposures. The two principal UK operating subsidiaries, Checkout Ltd and Checkout Technology
              Ltd, hold active FCA payment institution licences under the Payment Services Regulations 2017. FCA
              enforcement actions in the payments sector have been limited historically, but the FCA has signalled
              increasing scrutiny of large non-bank payment institutions, particularly following the collapse of
              Wirecard; any formal investigation would be a material enterprise sales and investor confidence risk even
              without revocation.

              The January 2026 MALPB (Merchant Acquirer Limited Purpose Bank) charter approval from the Georgia
              Department of Banking and Finance is strategically positive but introduces new US federal and state
              regulatory obligations. As a chartered banking entity, Checkout.com becomes subject to enhanced BSA/AML
              program requirements under FinCEN guidelines and potential CFPB oversight as it expands into
              consumer-adjacent payment services. The CFPB has increasingly scrutinised large non-bank payment
              processors since 2023; the MALPB charter potentially brings Checkout.com under expanded CFPB supervisory
              authority. US state money transmitter licences are required across approximately 30 states even with the
              MALPB charter in place; the MALPB reduces but does not eliminate the burden of maintaining state-level
              money service business registrations. PSD2/PSD3 compliance is ongoing across EU/EEA markets; the PSD3
              legislative process is expected to conclude in 2026–27, requiring Checkout.com to adapt open banking,
              authentication, and liability frameworks. GDPR/UK GDPR exposure from the April 2024 ShinyHunters incident
              remains live: the ICO was notified but no confirmed enforcement action has been publicly reported; a
              confirmed data breach could trigger fines up to 4% of global annual revenue, which is material given that
              Checkout.com does not disclose this figure.
            claimRefs:
              - CR001
              - CR002
              - CR003
              - CR015
              - CR016
