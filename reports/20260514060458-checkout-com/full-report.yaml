  - id: FV001
    title: Recommendation logic
    slug: recommendation-logic
    type: flow
    summary: >
      Decision-tree flow showing how Checkout.com's market position, financial performance, competitive moat, and
      risk/valuation assessment combine to produce the conditional buy recommendation with entry discipline at sub-$15B.
      Each node represents a gateable investment thesis check; the verdict is conditional on all four checks clearing.
    data:
      nodes:
        - id: thesis-check
          label: Investment Thesis Check
          note: >-
            Does Checkout.com address a defensible, large-TAM problem? Enterprise payment processing; $3.7T+ global TAM;
            <10% direct-acquiring penetration
        - id: financial-check
          label: Financial Health Check
          note: >-
            Net revenue growth >30%; adj. EBITDA >10% margin; $300B+ TPV +64% YoY — first full-year profitability
            milestone confirmed
        - id: competitive-check
          label: Competitive Position Check
          note: >-
            Forrester Wave Leader Q1 2026; Intelligent Acceptance AI moat; MALPB direct-acquiring advantage; 63 BDC
            enterprise merchants
        - id: risk-check
          label: Risk and Valuation Check
          note: >-
            $12B secondary; 70% decline from $40B peak; 4.0% P/TPV peer-inline with Adyen; key-person and governance
            risks manageable within entry framework
        - id: verdict
          label: 'Verdict: Conditional Buy'
          note: >-
            Strong fundamentals; valuation normalisation creates entry opportunity at sub-$15B; blocking data room asks
            (accounts, NRR, cap table) and governance conditions must be satisfied
      edges:
        - from: thesis-check
          to: financial-check
          label: Thesis holds — large TAM, defensible position
        - from: financial-check
          to: competitive-check
          label: Financials healthy — growth + profitability confirmed
        - from: competitive-check
          to: risk-check
          label: Competitive moat confirmed — Forrester Leader, direct acquiring
        - from: risk-check
          to: verdict
          label: Risks manageable within entry discipline — conditional buy
    claimRefs:
      - CV001
      - CV005
      - CV007
      - CV017
      - CV030
      - CV040
  - id: FV002
    title: Valuation sensitivity
    slug: valuation-sensitivity
    type: bar
    summary: >
      Bar chart showing the valuation spectrum from bear-case repricing through current secondary implied value,
      bull-case IPO/acquisition range, and the 2022 peak, benchmarked against Adyen's current public market
      capitalisation. Illustrates the 70% recovery required to reach peak, the asymmetry of the current entry point, and
      the scale of the comparable anchor.
    data:
      items:
        - label: Bear Case ($6B)
          value: 6
          note: >-
            TPV growth stalls at <15%; EBITDA margin thin 5–8%; P/TPV 2.0%; Adyen/Stripe take share; governor trigger
            event
        - label: Current Secondary ($12B)
          value: 12
          note: Current secondary implied valuation (Sep 2025 employee buyback); P/TPV 4.0%; revenue multiple ~8x
        - label: Bull Case Exit ($20B)
          value: 20
          note: US MALPB accelerates; Card Issuing ARR $10B+; PE round or IPO filed 2027; P/TPV ~6.7%
        - label: Bull Case IPO ($30B)
          value: 30
          note: IPO with premium and public market multiple re-rating; Card Issuing ARR $15–20B; 10x forward revenue
        - label: Jan 2022 Peak ($40B)
          value: 40
          note: Series D peak at 15% P/TPV; ~60x estimated revenue; unsustainable fintech multiple environment
        - label: Adyen Market Cap ($42B)
          value: 42
          note: Current Adyen public market cap ~€38B/$42B; P/TPV ~3.5%; 8x revenue; most relevant public comparable
    claimRefs:
