      - number: '8.5'
        title: Exhibits
        blocks:
          - type: callout
            title: Conditional Buy at Sub-$15B — Asymmetric Entry Point After a 70% Re-Rating
            body: >
              Checkout.com at $12B secondary implied valuation represents the most attractive entry point the asset has
              offered since its pre-2021 growth phase. The 70% decline from the $40B January 2022 peak has reset the
              valuation to operationally defensible levels: 4.0% P/TPV is approximately peer-inline with Adyen's 3.5%,
              and 8x estimated revenue is consistent with public enterprise payment processing multiples. The underlying
              business has not deteriorated — it has materially improved. Revenue grew more than 30% year-on-year for
              the second consecutive year. The company achieved first full-year adj. EBITDA profitability. The MALPB
              bank charter was approved in January 2026. The Forrester Wave named it a Leader in Q1 2026. The bull case
              requires three specific catalysts: US MALPB volume acceleration, card issuing ARR scaling to $15–20B, and
              an IPO or strategic acquisition by 2027–2028. The base case requires none — it requires only that
              Checkout.com continues growing at its current trajectory. The conditional element is the governance gap:
              100% founder control and no succession plan are unacceptable for a $12B investment without pre-closing
              remediation.
            calloutType: recommendation
            claimRefs:
              - CV001
              - CV002
              - CV005
              - CV006
              - CV007
              - CV017
              - CV040
              - CV041
          - type: callout
            title: The Anti-Thesis Is Structural, Not Cyclical — Four Years Without Institutional Price Discovery
            body: >
              The most serious element of the Checkout.com anti-thesis is not the 70% valuation decline per se — that
              reflects a market-wide fintech re-rating that hit every company from Stripe to Klarna. The serious risk is
              structural: the last institutional capital raise was January 2022, four years before the current analysis
              date. The only valuation mark since then is the September 2025 employee share buyback — a transaction type
              that does not require independent third-party valuation, does not involve external investors conducting
              diligence, and is not a market-clearing price. This means that $12B is a reasonable internal reference
              point but is not independently verified institutional capital. A fresh primary round or public S-1 filing
              is the only path to converting the current implicit valuation into a credible market price. Until then,
              any investment is based on the buyer's own analysis without a recent institutional comparator. This is a
              legitimate risk that must be reflected in both the entry price and the required evidence standard:
              consolidated audited accounts are not optional.
            calloutType: risk
            claimRefs:
              - CV003
              - CV008
              - CV010
              - CV031
              - CV047
          - type: callout
            title: Three Exit Paths, One Required Catalyst — IPO Is the Preferred but Not the Only Route
            body: >
              Checkout.com's exit readiness presents three viable paths over a 3–5 year horizon. The IPO path
              (preferred, highest multiple) requires: a public S-1 filing on NYSE or LSE, a demonstrated 2–3 year
              public-quality financial audit trail, an independent board meeting institutional governance standards, and
              a 2027–2028 IPO window that is currently not confirmed. The strategic acquisition path (alternative,
              possible premium) would require a Visa, Mastercard, JPMC, or major bank holding company to identify
              Checkout.com as a direct-acquiring-platform acquisition target — plausible given the MALPB charter and
              $300B TPV scale, but not in any public pipeline as of May 2026. The PE continuation round path (base case
              fallback) involves a late-stage private equity sponsor (Advent, GTCR, Thoma Bravo-equivalent) taking a
              minority or controlling stake at $16–22B — a proven path for payment processors (see Worldpay/GTCR,
              Nuvei/Advent). Of these three, only the PE continuation requires no IPO readiness and no strategic buyer
              interest; it is therefore the most robustly de-risked exit path under the base case assumptions.
            calloutType: insight
            claimRefs:
              - CV011
              - CV029
              - CV032
              - CV044
