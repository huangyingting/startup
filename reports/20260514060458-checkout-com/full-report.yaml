  - number: 6
    title: Customers
    sections:
      - number: '6.1'
        title: Customer Segmentation
        blocks:
          - type: paragraph
            body: >
              Checkout.com's customer base is deliberately concentrated at the enterprise end of the payments market.
              The company serves 1,000+ enterprise merchants as of its February 2026 full-year 2025 results, with no
              self-serve, SMB, or startup tier offered or signalled in any public communications. This enterprise-only
              go-to-market is a structural choice that elevates contract value and reduces customer support cost per
              dollar of TPV, but also means every customer relationship is a bespoke, high-stakes negotiation.

              The customer base spans six primary verticals. Digital and e-commerce (Shein, Samsung, eBay) is the volume
              anchor, representing platforms that individually process tens of billions in annual GMV. FinTech and
              crypto (Wise, Remitly, Coinbase) is the highest-quality reference cohort, with multi-year tenures and
              published case studies. Travel and hospitality (Virgin, Booking.com) and SaaS and streaming (Spotify,
              DocuSign) represent higher-margin, recurring-payment use cases where Intelligent Acceptance and
              subscription billing capabilities deliver measurable acceptance-rate value. Food delivery (PizzaHut,
              Deliveroo) and B2B/industrial (Hyundai, Henkel) round out the vertical footprint.

              Geographically, Checkout.com is strongest in Europe and the UK (its home market), with the US growing
              fastest at approximately 70% year-on-year volume growth in 2025. Asia-Pacific and Latin America are served
              through alternative payment method coverage but are not disclosed as distinct geographic revenue segments.
              The enterprise-only model means each of the 1,000+ merchants operates under a bespoke multi-year contract,
              creating structural switching costs that support retention across the customer base.
