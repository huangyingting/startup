chapters:
  - number: 1
    title: Company Overview
    sections:
      - number: '1.1'
        title: Identity and Business Model
        blocks:
          - type: paragraph
            body: >
              Checkout.com was founded in 2012 by Guillaume Pousaz as a full-stack payment infrastructure provider
              targeting enterprise merchants globally. It offers end-to-end payment services spanning acquiring, payment
              gateway, card issuing, fraud detection, alternative payment methods, and payouts. Its primary customer
              base is large enterprise merchants — over 1,000 as of early 2026 — with a "Billion Dollar Club" of 63
              merchants each processing more than $1B annually through the platform. The company's go-to-market focuses
              on complex, high-volume merchants who demand bespoke acceptance optimisation, risk management, and local
              acquiring capabilities across 50+ countries. Revenue derives from payment processing fees and,
              increasingly, value-added services like Intelligent Acceptance and card issuing. The parent entity is
              incorporated in Jersey, an offshore jurisdiction not legally required to disclose revenue or profit. The
              company operates through two principal UK subsidiaries: Checkout Ltd (which holds the FCA acquiring
              licence) and Checkout Technology Ltd (which owns the intellectual property and employs the R&D function).
              This structure gives the group flexibility in managing IP ownership and taxable profit attribution across
              jurisdictions.
