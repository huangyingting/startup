companyProfile:
  summary: >
    Checkout.com was founded in 2012 in London by Guillaume Pousaz (a Swiss-French entrepreneur previously at Visa and
    PayPal) with the thesis that global enterprises were underserved by incumbent payment processors on acceptance
    rates, speed, and transparency. The company built a cloud-native, direct-acquiring payment platform that bypasses
    legacy middleware, enabling enterprise merchants to achieve higher authorisation rates and lower costs. After
    bootstrapped early growth, Checkout.com raised $1.8B across multiple rounds culminating in a January 2022 Series D
    at a $40B peak valuation (Altimeter, Dragoneer, Franklin Templeton, GIC, Insight Partners, QIA, Tiger Global).
    Fintech multiple compression drove a secondary repricing to ~$12B by September 2025, but the company achieved its
    first full-year adjusted EBITDA profitability in 2025 with $300B+ TPV (+64% YoY) and net revenue growing >30%. In
    January 2026, Checkout.com received approval for a Georgia MALPB bank charter, enabling US direct acquiring without
    bank intermediaries — a significant competitive milestone. The company acquired Blue EMI (Lithuania digital currency
    platform) in January 2026. It was named a Leader in the Forrester Wave: Payment Processing Platforms, Q1 2026.
