      - number: '3.2'
        title: Feature and Capability Comparison
        blocks:
          - type: paragraph
            body: >
              Across the five principal buying criteria — AI acceptance optimisation, direct acquiring infrastructure,
              alternative payment method (APM) breadth, card issuing, and developer experience — Checkout.com holds
              first-mover positions in AI acceptance and US direct acquiring (MALPB), but faces credible competition on
              all five dimensions.

              AI acceptance is the most debated differentiator. Checkout.com's Intelligent Acceptance product reports an
              average +3.8 percentage point improvement in card acceptance rates by routing transactions through the
              optimal acquiring path using models trained on $300 billion in annual volume. Adyen's "Uplift" and
              "Optimum Authorisation" products, plus Stripe's "Adaptive Acceptance," are the primary competitive
              responses — both launched or significantly expanded in 2024 — and are closing the gap. The estimated lead
              for Checkout.com is 12–18 months as of early 2026. APM coverage favours Adyen (200+ methods) by breadth,
              but Checkout.com by recent growth rate (104% APM volume growth in 2025 on 50+ methods), suggesting
              Checkout.com is deepening integrations in APAC and MENA rather than simply adding breadth.

              Direct acquiring infrastructure is a harder moat to replicate. Adyen built its direct- acquiring network
              over 18 years. Checkout.com is accelerating with the Georgia MALPB charter (approved January 2026), which
              removes the bank-sponsor intermediary for US card settlement — a structural advantage not yet replicated
              by Stripe or Braintree. Developer experience remains Stripe's most durable competitive moat;
              Checkout.com's SDK breadth (50+ across iOS, Android, and web, including the Frames card component) is
              competitive but does not match Stripe's documentation depth and developer community engagement.
