      - number: '4.2'
        title: Pricing and GTM Efficiency
        blocks:
          - type: paragraph
            body: >
              Checkout.com operates an exclusively enterprise-direct sales model with no published list pricing and no
              self-serve or developer-led growth funnel. All pricing is negotiated individually via multi-year custom
              contracts. Enterprise merchants are assigned dedicated merchant success managers, and the sales cycle for
              major global enterprise accounts typically spans 6-18 months due to integration complexity, regulatory
              approvals, and the bespoke configuration of acceptance optimisation parameters. No self-serve channel or
              SMB tier exists, distinguishing Checkout.com from Stripe's product-led growth motion and making CAC
              inherently high and not publicly estimable.

              Blended take rate analysis using $300B volume and estimated revenue of $600M-$900M implies an effective
              rate of 0.20-0.30%, higher than Adyen's disclosed 0.13-0.15% but consistent with Checkout.com's higher
              value-added service attach rate from Intelligent Acceptance, issuing, and payout services. The company has
              not disclosed average contract value, gross revenue per merchant, or retention rates. The 63-merchant
              Billion Dollar Club and total merchant base of 1,000+ enterprise accounts implies an estimated ACV range
              of $1M-$10M per enterprise account, entirely analytically derived. Distribution is global-direct with no
              reseller or channel partner programme. Key partnerships with Visa (issuing), Microsoft Azure (cloud
              infrastructure), and SAP (ERP payments integration) function as technology integrations reducing merchant
              onboarding friction rather than acting as revenue-generating distribution channels.
