      - number: '2.5'
        title: Exhibits
        blocks:
          - type: callout
            title: AI-Powered Acceptance Optimisation Transforms the Market's Revenue Equation
            body: >
              Traditional payment processing competed on price (basis points) and reliability. Checkout.com's
              Intelligent Acceptance — delivering 87M daily optimisations and $15B+ in additional merchant revenue since
              June 2023 — represents a qualitative shift: payment infrastructure that generates measurable merchant ROI
              above the base fee. An average 3.8% acceptance rate improvement at a merchant processing $1B annually
              translates to $38M in additional revenue captured, making Checkout.com's contract a revenue-positive
              investment rather than a cost. This reframes the buyer conversation from "cheapest processor" to "highest
              ROI processor" and justifies premium pricing — a structural competitive advantage.
            calloutType: insight
            claimRefs:
              - CM025
              - CM019
              - CM021
          - type: callout
            title: TAM Opacity Creates Significant Sizing Risk
            body: >
              The enterprise payment processing market lacks a single credible authoritative sizing study. Range
              estimates vary by 5–10× depending on scope, take-rate assumptions, and geographic coverage. Checkout.com
              does not disclose revenue, preventing independent verification of its take rate, gross margin, or market
              share. This opacity makes it impossible to determine whether Checkout.com is growing market share or
              simply riding macro e-commerce tailwinds. Any DCF or multiple-based valuation should stress-test market
              size assumptions across the full range of plausible estimates.
            calloutType: risk
            claimRefs:
              - CM008
              - CM011
              - CM013
              - CM014
          - type: callout
            title: Pricing Pressure and Interchange Regulation Compress Base Acquiring Margins
            body: >
              EU interchange fee regulation (0.2% consumer debit, 0.3% consumer credit cap) and ongoing US regulatory
              scrutiny compress base acquiring fee economics. This structural headwind means growth in processing volume
              does not translate linearly to revenue or margin improvement. Checkout.com's value-added services
              (Intelligent Acceptance, fraud detection, card issuing) are the primary margin defense — but these are
              also the most contested battlegrounds, with Adyen, Stripe, and bank processors all investing in similar
              capabilities.
            calloutType: risk
            claimRefs:
              - CM028
              - CM030
              - CM032
  - number: 3
    title: Competitors
    sections:
      - number: '3.1'
        title: Competitive Landscape Overview
        blocks:
          - type: paragraph
            body: >
              Checkout.com competes against a tiered set of alternatives across three competitive dimensions: direct
              peers offering comparable full-stack enterprise acquiring and payment processing; incumbent bank
              processors delivering bundled bank-relationship pricing; and adjacent or substitute solutions including
              developer-focused gateways, niche verticalists, and internal-build options at the largest merchant tier.

              Adyen (Euronext: ADYEN) is the most direct peer — a public enterprise-only processor that processed
              approximately €1.35 trillion in volume in 2024 and earned approximately €1.83 billion in net revenue,
              implying a blended take rate of around 0.13–0.15%. With over 3,800 employees and direct-acquiring
              operations in 36+ markets since 2006, Adyen has greater operating history, public disclosure transparency,
              and market-capitalisation credibility than Checkout.com. Stripe (private, ~$65B secondary-market
              valuation) is the largest developer-ecosystem player, processing an estimated $1 trillion annually and
              offering the broadest product suite in the market. Worldpay, acquired by GTCR from FIS in 2023 for
              approximately $18 billion, is the largest processor by volume ($2T+) but is hampered by legacy
              infrastructure and technology debt.

              Braintree (PayPal), JPMorgan Payments, and Nuvei complete the competitive set with differentiated product
              emphasis and distinct ICP focus. Status-quo substitutes — in-house bank acquiring relationships with
              Barclays, Lloyds, or Chase — remain viable for UK/US-centric merchants. Internal build is possible for
              mega-merchants such as Amazon, but requires $100M+ in investment and multi-year regulatory approvals,
              constraining competitive pressure to the top-10 global merchants only. Big Tech payments (Google Pay,
              Apple Pay) operate at the wallet and consumer layer rather than the direct acquiring layer, making them
              complementary rather than substitutes for Checkout.com's core acquiring product.
