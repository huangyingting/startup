      - number: '4.4'
        title: Public Traction and Private Metric Gaps
        blocks:
          - type: paragraph
            body: >
              Checkout.com's publicly disclosed financial indicators are unusually sparse for a company of its scale.
              Disclosed metrics include: total payment volume ($300B+ in 2025), net revenue growth rate (>30% YoY for
              the second consecutive year), adjusted EBITDA margin (>10% full year), card issuing annualised run rate
              ($5B in Q4 2025), APM volume growth (104% in 2025), and BFCM processing ($5.2B in 24 hours, ~100M
              transactions). All are company-claimed figures, unaudited and unverified by any independent third party.

              Critical private metrics unavailable for analysis include: absolute net revenue and gross revenue,
              absolute EBITDA, gross margin, customer acquisition cost, churn rate, average contract value, gross
              payment volume by geography, cost of revenue breakdown, balance sheet, cash position, and debt
              obligations. The Jersey holding company structure legally exempts the group from UK Companies Act filing
              requirements that would otherwise mandate annual accounts. UK subsidiary filings at Companies House for
              Checkout Ltd (08606477) and Checkout Technology Ltd (09526965) may contain partial UK-entity financials
              but are filed with delay and reflect only UK operations rather than consolidated group financials.

              The absence of these metrics creates a structural diligence gap. Revenue estimates of $600M-$900M carry
              material uncertainty — approximately plus or minus 40% — and should not be treated as verified data. The
              adjusted EBITDA profitability milestone is significant but insufficient for underwriting: the denominator
              (revenue) is unknown, and adjusted EBITDA excludes stock-based compensation, restructuring costs, and
              potentially one-time items that are not disclosed. Checkout.com's $15B+ in disclosed merchant value
              unlocked and 87M daily AI optimisations are company-claimed operational metrics, not financial metrics.
