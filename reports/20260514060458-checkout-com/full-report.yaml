      - number: '1.3'
        title: Funding History and Valuation
        blocks:
          - type: paragraph
            body: >
              Checkout.com has raised approximately $1.8B in total external capital across its funding history. The most
              recent public round was a $1B Series D closed on January 12, 2022, at a $40B valuation. Investors included
              Altimeter Capital, Dragoneer Investment Group, Franklin Templeton, GIC (Singapore's sovereign wealth
              fund), Insight Partners, Qatar Investment Authority, Tiger Global, and Oxford University Endowment Fund,
              with existing backers Blossom Capital, Coatue, DST Global, Endeavor Catalyst, and Ribbit Capital
              participating. Following the broader fintech valuation correction, Checkout.com's internal valuation was
              cut to approximately $11B in late 2022 and again to $9.35B in 2023. The September 2025 employee share
              buyback program implicitly established a $12B valuation using US 409A accounting rules — a 28% recovery
              from the 2023 trough but still a 70% discount to the peak $40B. IPO speculation has been reported by press
              but has not been confirmed by the company as of the report date. The company has not raised any new
              external institutional capital since the January 2022 Series D, suggesting it is operating on existing
              capital while targeting profitability ahead of a potential exit.
