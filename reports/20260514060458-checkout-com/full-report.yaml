  - id: FV003
    title: Valuation / return range
    slug: valuation-return-range
    type: range
    summary: >
      Range chart showing low/mid/high valuation estimates at the current implied entry, the 3-year base exit, the
      3-year bull exit, and the 3-year bear exit. Each band reflects the uncertainty inherent in private company
      valuation from secondary market data and estimated comparable multiples.
    data:
      items:
        - label: Current Entry (Sep 2025)
          low: 10
          mid: 12
          high: 14
          note: Secondary market implied; Sep 2025 employee buyback; range reflects secondary spread uncertainty
        - label: 3-Year Bull Exit
          low: 18
          mid: 27
          high: 35
          note: IPO or strategic acquisition; US MALPB at 100%+ growth; Card Issuing $15–20B ARR; 2x–3x on base
        - label: 3-Year Base Exit
          low: 14
          mid: 18
          high: 22
          note: PE continuation round or late secondary; 1.2–1.8x current; 25–35% revenue CAGR; EBITDA 12–15%
        - label: 3-Year Bear Exit
          low: 4
          mid: 6
          high: 9
          note: Revenue growth deceleration; competitive pressure; further secondary repricing; no IPO window
