      - number: '4.6'
        title: Financial Verdict
        blocks:
          - type: paragraph
            body: >
              Revenue quality is strong relative to peer group benchmarks: $300B+ in volume with 64% YoY growth from
              1,000+ enterprise merchants represents a defensible, diversified revenue base with low single-transaction
              concentration risk and meaningful geographic distribution. The >30% net revenue growth for a second
              consecutive year at this scale is exceptional and consistent with the AI acceptance and card issuing
              upsell theses. The >10% adjusted EBITDA margin is a positive inflection milestone, though the absolute
              EBITDA figure is unknown.

              The margin path is positive but opaque. A business at $600M-$900M estimated revenue with >10% adjusted
              EBITDA implies $60M-$90M in adjusted EBITDA — a viable but modest profit pool for a company last valued at
              $40B. Cloud infrastructure eliminates owned-infrastructure capex, favouring margin expansion. The absence
              of an SMB tier eliminates the support and churn costs that compress margins for processors with broad
              distribution. The primary margin risk is sustaining the technology investment required to maintain the AI
              acceptance competitive moat as Adyen Uplift and Stripe Adaptive Acceptance close the gap.

              Capital intensity is low for a payments business (no manufacturing, no owned data centres), though the
              MALPB bank charter introduces regulatory capital obligations of unknown size. The primary financial
              diligence blockers are: (1) no audited revenue or profit disclosure due to Jersey structure; (2) no cash
              position, burn rate, or debt obligations disclosed; (3) adjusted EBITDA excludes potentially material
              costs including stock-based compensation; (4) it is not possible to calculate a verified valuation
              multiple. Any investment commitment requires full audited consolidated financials and a complete schedule
              of indebtedness obtained under NDA.
