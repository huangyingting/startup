      - number: '2.2'
        title: Market Sizing — Multiple Lenses
        blocks:
          - type: paragraph
            body: >
              No single authoritative market sizing study covers enterprise-grade payment processing with the same scope
              as Checkout.com's product portfolio. Multiple lenses are required. Lens 1 (volume-based): Global
              e-commerce transaction volume is estimated at $5–7 trillion annually in 2024-2025. Enterprise processors
              earn take rates of 0.10–0.30% of volume; applying this to the enterprise segment of global digital
              commerce yields an annual processor revenue pool of $10–25B (conservative) to $50B+ (inclusive of
              value-added services). Lens 2 (listed-company comparison): Adyen (public, ~$2B revenue, ~0.15% take rate
              on ~€1.35T volume) and Stripe (private, estimated ~$5B revenue on ~$1T volume) serve as market calibration
              points. Checkout.com's $300B volume at an implied 0.20–0.30% take rate suggests $600M–$900M gross revenue,
              consistent with the 30%+ growth profile. Lens 3 (broader market reports): Various analyst reports estimate
              the global payment gateway/processing market at $75–130B by 2028 (including SMB), but the enterprise
              sub-segment accessible to Checkout.com is materially smaller. Sizing gaps are significant: no public
              revenue confirmation, no disclosed gross margin, and private company status prevent triangulation to a
              single number. All estimates carry material uncertainty and should be treated as order-of-magnitude
              guidance only.
