      - number: '4.3'
        title: Cost Structure and Gross Margin Drivers
        blocks:
          - type: paragraph
            body: >
              Checkout.com's cost structure is dominated by payment processing costs — interchange fees, card network
              fees (Visa, Mastercard), and local acquiring network costs. These are estimated at 60-70% of gross
              acquiring revenue, reflecting the economics of card-based payment processing where interchange is
              typically 1.5-2.5% of GTV and is borne by the processor before netting to the merchant. For a business at
              0.20-0.30% blended take rate on volume, the majority of gross GTV passes through as interchange cost,
              leaving estimated net revenue in the $600M-$900M range with gross margin on that net revenue estimated at
              50-60% based on comparable processor benchmarks.

              Technology infrastructure costs are materially lower than traditional payment processors because
              Checkout.com runs on public cloud (Microsoft Azure) rather than owning data centres, eliminating
              owned-infrastructure capex. Engineering headcount of approximately 1,000 staff (half of the ~2,000 total
              headcount) represents the largest fixed cost base, driving product development, AI model training for
              Intelligent Acceptance, and platform reliability to support the 99.999% uptime SLA. Working capital and
              capex dynamics are favourable: payment settlement creates timing differences but Checkout.com does not
              bear inventory risk or project-finance exposure beyond the MALPB bank charter regulatory capital
              obligation.

              Compliance costs — FCA authorisation, PCI DSS Level 1, GDPR across multiple jurisdictions, and now FDIC
              supervision of the MALPB bank subsidiary — are ongoing and growing operating expenditures. The primary
              capital intensity exposure introduced by the MALPB charter is minimum regulatory bank capital, which has
              not been publicly disclosed and must be treated as an unquantified balance-sheet obligation until
              confirmed through direct engagement with management or Georgia banking regulators.
