  - number: 4
    title: Financials
    sections:
      - number: '4.1'
        title: Revenue Model and Streams
        blocks:
          - type: paragraph
            body: >
              Checkout.com generates revenue across six principal streams, all tied to payment activity volume or
              value-added service utilisation. The dominant stream is payment acquiring fees, charged as a small
              percentage of gross transaction value (GTV) where Checkout.com acts as the principal acquirer or acquiring
              network agent for a merchant. Based on $300B+ in total payment volume (TPV) disclosed for 2025 and an
              estimated blended take rate of 0.20-0.30% derived from analyst consensus, gross acquiring revenue likely
              falls in the range of $600M-$900M, though the company has never disclosed this figure.

              The second stream is the payment gateway and processing API, which charges per-transaction or per-API-call
              fees for authorisation, tokenisation, and routing services. Third, value-added services — Intelligent
              Acceptance, Fraud Detection Pro, Network Tokens, and Flow checkout — generate incremental revenue as
              separately licensed enterprise products atop core acquiring. Fourth, card issuing, conducted in
              partnership with Visa for B2B virtual and physical cards, reached a $5B annualised run rate in Q4 2025.
              Fifth, payouts (disbursements to marketplace sellers, gig-economy workers, and cross-border recipients)
              form a payout-as-a-service fee line. Sixth, FX conversion on cross-border transactions generates spread
              revenue where Checkout.com holds currency risk between settlement and payout.

              Revenue recognition follows the principal-agent framework: where Checkout.com is the principal acquirer it
              recognises gross revenue before interchange pass-through; where it acts as gateway-only it recognises net
              gateway fees only. The split between principal and net revenue is not publicly disclosed, creating
              material uncertainty for gross margin and revenue quality analysis. The Black Friday and Cyber Monday 2025
              period processed $5.2B in 24 hours with approximately 100M transactions, demonstrating peak processing
              capacity.
