      - number: '5.3'
        title: Differentiation and Technical Moats
        blocks:
          - type: paragraph
            body: >
              Checkout.com's competitive moat rests on three reinforcing components. First, direct card network
              membership (Visa, Mastercard, Amex) enables end-to-end ownership of the acquiring relationship: no sponsor
              bank dependency, lower per-transaction cost, and a differentiated acceptance rate baseline compared to
              gateway-only PSPs. The January 2026 Georgia MALPB bank charter extends this ownership to the US market,
              removing a structural competitive disadvantage that previously forced Checkout.com to route US card volume
              through a sponsor bank.

              Second, the Intelligent Acceptance AI data moat derives from 87M daily optimisation decisions across a
              large enterprise transaction corpus. This data volume is not replicable by smaller-volume PSPs and
