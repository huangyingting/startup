      - number: '7.5'
        title: Exhibits
        blocks:
          - type: callout
            title: Key-Person Concentration Is the Single Most Underpriced Risk
            body: >
              Guillaume Pousaz's 100% founder control, Monaco residence, and absence of any disclosed succession plan
              represents a governance risk that is structurally uncommon at a $12B-valued global payments processor.
              Unlike most late-stage private companies — where founder control is partially diluted through
              institutional rounds and independent director appointments — Checkout.com has raised $1.8B without any
              disclosed governance concession. A Pousaz departure or reputational event would affect IPO readiness,
              enterprise customer confidence, and the ability to execute the MALPB charter rollout simultaneously.
              Investors must require a formal succession plan and at least two independent directors before any
              commitment.
            calloutType: risk
            claimRefs:
              - CR007
              - CR008
              - CR010
              - CR041
          - type: callout
            title: Azure Sole-Provider Architecture Is Structurally Incompatible With the 99.999% SLA
            body: >
              Checkout.com's 99.999% annual uptime SLA — approximately 5 minutes of downtime per year — is commercially
              incompatible with exclusive dependence on a single cloud provider. Microsoft Azure has experienced
              regional and service-wide outages that exceeded 5 minutes in 2022, 2023, and 2024. Checkout.com processed
              $5.2B on a single Black Friday/Cyber Monday day in 2025; a 4-hour outage during that window would leave
              approximately $867M in payments unprocessed. No multi-cloud failover architecture, no alternative
              provider, and no public RTO/RPO commitment exists. The SLA is a marketing and contractual commitment that
              cannot be independently validated from the infrastructure posture.
            calloutType: risk
            claimRefs:
              - CR012
              - CR013
              - CR035
              - CR039
          - type: callout
            title: MALPB Is a Risk Mitigation and a New Risk Source Simultaneously
            body: >
              The January 2026 MALPB charter approval is the most significant risk mitigation in Checkout.com's recent
              history: it removes the dependence on third-party sponsor banks for US direct acquiring and positions the
              company to compete with Adyen and Stripe on a level regulatory footing in the world's most valuable
              payment market. However, the charter also introduces a new cluster of risks: enhanced BSA/AML program
              requirements, potential CFPB supervisory jurisdiction, and the execution risk of standing up a de novo
              bank compliance function within 12–18 months. Jordan Reynolds, appointed as MALPB CEO, has less than two
              years in role. The charter's conditions have not been publicly disclosed. This is a calculated risk with a
              favourable expected value but requires active monitoring of the US regulatory build-out cadence.
            calloutType: insight
            claimRefs:
              - CR002
              - CR016
              - CR026
              - CR034
          - type: callout
            title: ShinyHunters Incident Leaves an Unresolved ICO Liability Tail
            body: >
              The April 2024 ShinyHunters claim against Checkout.com's legacy cloud storage environment remains
              unresolved in terms of ICO investigation outcome. While the CTO confirmed no card data was compromised and
              no ICO enforcement notice has been published, the GDPR notification obligation triggers a formal ICO
              review period that can last 12–36 months. An ICO enforcement notice — even for procedural GDPR violations
              rather than substantive data compromise — would be publicly listed on the ICO enforcement database and
              would immediately enter the procurement risk assessments of every enterprise merchant evaluating or
              renewing Checkout.com contracts in 2026 and beyond. The maximum fine of 4% of global annual revenue is an
              undisclosed figure but material at the company's scale.
            calloutType: risk
            claimRefs:
              - CR004
              - CR005
              - CR006
              - CR030
  - number: 8
    title: Valuation
    sections:
      - number: '8.1'
        title: Investment Recommendation and Thesis
        blocks:
          - type: paragraph
            body: >
              Checkout.com's investment case rests on four interlocking pillars: exceptional payment volume scale
              ($300B+ TPV at 64% YoY growth), a proven path to profitability (first full-year adjusted EBITDA positive
              in 2025), a defensible competitive moat anchored by Forrester Wave Leader status and Intelligent
              Acceptance AI, and a transformational US direct-acquiring opportunity via the January 2026 MALPB bank
              charter. These pillars, taken together, support a conditional buy recommendation at current secondary
              implied valuations of approximately $12B — a level that represents 4.0% of total payment volume, roughly
              in line with Adyen (3.5% P/TPV) and meaningfully below the 2022 peak of 15% P/TPV.

              The investment anti-thesis is also robust and must be confronted directly. The $40B to $12B valuation
              decline (70%) occurred without new institutional price discovery since January 2022; the last
              institutional mark is now over four years old. All financial metrics are unaudited press-release figures
              from a Jersey-registered parent with no mandatory consolidated disclosure. Guillaume Pousaz's 100% founder
              control without an independent board or succession plan creates a governance concentration that is
              structurally unusual for a $12B payment processor. The card issuing product ($5B ARR annualised run rate
              in Q4 2025) is promising but unproven at scale. The MALPB charter is operationally positive but its
              conditions have not been disclosed. These risks are manageable within a disciplined entry framework:
              sub-$15B valuation, pre-investment data room including consolidated accounts and NRR disclosure,
              independent director appointment as a closing condition, and explicit kill triggers with active monitoring
              protocols.

              The recommendation is conditional buy with medium-high confidence and a medium-high risk rating. Valuation
              stance is attractive at the current $12B mark but fair-to-stretched above $15B. Target return of 1.5–3x
              over 3–5 years is achievable in the base and bull cases. Downside in the bear case is 50–70% from current
              entry — investors with a low loss tolerance should track rather than invest until the governance gap is
              addressed.
