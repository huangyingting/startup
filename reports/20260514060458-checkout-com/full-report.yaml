      - number: '1.4'
        title: Financial Performance and Scale
        blocks:
          - type: paragraph
            body: >
              Checkout.com delivered strong financial results in 2025 across all key performance metrics. Total payment
              volume exceeded $300B for the full year, representing a 64% YoY increase and confirming Checkout.com's
              rank among the world's largest independent payment processors. The company processes more than $1B in
              payment volume per day. Net revenue grew more than 30% in 2025, the second consecutive year of 30%+ growth
              after 40% growth in 2024. For the first time, Checkout.com achieved full-year adjusted EBITDA
              profitability, with adjusted EBITDA margin exceeding 10%. US volumes grew over 80% in 2024 and continued
              strong growth in 2025 as the company expanded its North American commercial infrastructure. Alternative
              payment method volumes grew 104% in 2025, with 50+ payment methods supported. The platform maintained
              99.999% uptime throughout 2025. During Black Friday and Cyber Monday 2025, Checkout.com processed $5.2B
              across approximately 100 million transactions, with 95% completing in under one second. The company's
              Intelligent Acceptance product performs 87 million daily optimisations and has generated $15B+ in
              additional merchant revenue for clients since its June 2023 launch. The 63 merchants in the "Billion
              Dollar Club" represent a significant concentration in top-tier enterprise volume.
