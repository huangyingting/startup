  - id: operational-security-risks
    title: Operational and Security Risks
    body: >
      In April 2024, the ShinyHunters criminal hacking group claimed to have accessed Checkout.com's
      legacy cloud storage environment, asserting that 35,000 payment card records were exposed.
      Checkout.com's CTO confirmed that no card data was exfiltrated — the storage environment
      contained operational data, not cardholder data in PCI scope — and donated an equivalent
      sum to a security research fund. The ICO was notified per UK GDPR obligations. However, the
      reputational damage from a named breach claim involving one of the world's largest PSPs
      cannot be quantified in public sources, and no independent forensic report has been released.
      Any future ICO enforcement notice, even for a process violation rather than a data breach,
      would reintroduce this risk to enterprise sales cycles.

      Checkout.com's infrastructure runs exclusively on Microsoft Azure under a multi-year
      partnership agreement. The company has not disclosed any multi-cloud failover architecture,
      geographic redundancy outside Azure regions, or Recovery Time Objective (RTO) commitments
      in the event of an Azure regional or service-wide outage. The 99.999% uptime SLA equates to
      approximately 5 minutes of downtime per year; during the November 2025 Black Friday/Cyber
      Monday peak, the platform processed $5.2 billion in a single 24-hour period. An Azure
      outage of even 30 minutes during a future BFCM event would represent approximately $108M
      in unprocessed payments and potential SLA breach penalties across hundreds of enterprise
      contracts. PCI DSS Level 1 certification must be renewed annually; any lapse or failure
      in the annual certification audit would trigger contract termination clauses in standard
      PSP merchant agreements and could result in Visa/Mastercard fines against Checkout.com.
      API versioning and deprecation risk is a structural concern in Checkout.com's developer
      ecosystem: enterprise merchants who integrate against older API versions face breaking changes
      during migration, and the absence of a public API lifecycle governance document creates
      uncertainty for long-term integration planning. Rising chargebacks in higher-risk merchant
      verticals could trigger Visa and Mastercard monitoring programmes if rates exceed 1%;
      Checkout.com's Fraud Detection Pro product is a mitigation but chargeback rate data
      is not publicly disclosed.
