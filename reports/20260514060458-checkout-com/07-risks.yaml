  - id: partner-dependency-financial-risks
    title: Partner, Dependency, and Financial Risks
    body: >
      Guillaume Pousaz founded Checkout.com, is its sole controlling shareholder, and relocated
      from the UK to Monaco in April 2025. No succession plan, deputy CEO, or independent board
      governance structure has been publicly disclosed. This creates the most consequential
      key-person risk in the payments sector at the company's scale: Pousaz's departure,
      incapacitation, or reputational event would instantly affect investor confidence, enterprise
      procurement decisions, and the ability to complete an IPO or strategic transaction. The
      company's two most critical senior executives — CTO Mariano Albera and CRO Antoine Nougué
      — were both retained as of May 2026, but the competitive talent market for payments
      engineering and enterprise sales leadership makes their continued retention a monitoring
      item. Jordan Reynolds, appointed as MALPB CEO in 2025, is a key hire for US expansion
      but has been in role less than two years.

      Checkout.com's direct card acquiring model depends entirely on active principal membership
      with Visa and Mastercard. Any violation of network rules — including merchant risk thresholds,
      chargeback rates, or prohibited category processing — could trigger a membership review or
      suspension that would halt acquiring across the entire merchant base. No network suspension
      has occurred, but the absence of public chargeback rate data makes this risk impossible to
      independently assess. Microsoft Azure remains Checkout.com's sole disclosed cloud provider;
      no multi-cloud or distributed-provider strategy is public. The January 2026 Blue EMI
      acquisition adds a Lithuania-based digital currency and stablecoin settlement subsidiary
      whose integration into the core platform is ongoing and creates execution risk during a
      period when management is simultaneously executing the MALPB charter build-out.

      On the financial side, Checkout.com has not raised institutional capital since the January
      2022 $1B Series D at $40B valuation. The September 2025 employee buyback established a $12B
      implicit valuation — a 70% discount to peak. This compression means employee equity granted
      at prior valuations is materially underwater, creating talent retention risk across the
      engineering, sales, and product functions where equity is the primary long-term compensation
      driver. Revenue concentration among the Billion Dollar Club's 63 merchants — estimated at
      40–50% of $300B+ TPV in the top 20 — is not publicly disclosed but is the single largest
      financial risk to the investment thesis. One significant BDC departure could represent
      $2B+ of annual TPV loss without a guaranteed replacement timeline. The company's 150+
      currency processing scope creates ongoing FX exposure in a USD-strong macro environment;
      no hedging policy has been publicly disclosed.
