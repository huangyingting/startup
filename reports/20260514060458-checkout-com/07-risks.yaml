  evidenceGaps:
    - type: missing-source
      severity: material
      topic: regulatory-enforcement-history
      missingEvidence: >
        No public enforcement actions, formal warning letters, or regulatory investigations
        against Checkout.com have been identified in the FCA enforcement database, ICO enforcement
        register, FinCEN database, or any national competent authority record. It is not possible
        to independently confirm from public sources that no informal investigations or
        pre-enforcement correspondence has occurred; regulators typically do not publish
        pre-enforcement correspondence.
      whyItMatters: >
        A history of informal regulatory engagement or near-misses would materially affect the
        risk assessment; the FCA has increased scrutiny of large non-bank PSPs following Wirecard
        and the BNPL review, and Checkout.com's Jersey structure makes UK group-level oversight
        more complex than for a domestically consolidated entity.
      diligencePath: >
        Request full regulatory correspondence history from management under NDA; conduct
        direct FCA regulatory intelligence call; obtain independent regulatory counsel review
        of compliance programme.
      relatedQuestionRefs: [QR006]

    - type: missing-source
      severity: material
      topic: azure-multi-cloud-failover
      missingEvidence: >
        No public documentation, architecture diagram, or operational disclosure confirms
        whether Checkout.com has any multi-cloud failover capability, secondary cloud provider
        agreements, or Recovery Time Objective / Recovery Point Objective commitments beyond
        intra-Azure regional redundancy. The Microsoft Azure partnership is multi-year but
        does not preclude a simultaneous multi-region or service-wide failure.
      whyItMatters: >
        At $5.2B/day peak processing, a 4-hour Azure outage represents approximately $867M
        in unprocessed payments and would likely breach the 99.999% annual SLA; without
        multi-cloud failover, the SLA commitment is structurally unsupportable and may
        expose Checkout.com to material contractual penalty liability.
      diligencePath: >
        Request architecture diagram and business continuity plan from management; obtain
        RTO/RPO documentation; review Microsoft Azure master services agreement terms;
        commission independent infrastructure assessment.
      relatedQuestionRefs: [QR007, QR032]

    - type: private-evidence-only
      severity: material
      topic: top-merchant-tpv-concentration
      missingEvidence: >
        Individual merchant TPV distribution and top-N merchant concentration are not publicly
        disclosed by Checkout.com. The 40–50% top-20 concentration estimate is entirely derived
        from BDC composition structure and enterprise PSP concentration industry benchmarks,
        not from any Checkout.com-disclosed figure. A single BDC departure removing $2B+ of
        annual TPV cannot be confirmed or ruled out from public data.
      whyItMatters: >
        Material top-merchant concentration creates significant investment thesis risk: if the
        top five merchants represent 25%+ of TPV, one contested renewal cycle could remove
        more revenue than a year of new logo additions. The merchant concentration figure is
        an unresolvable blind spot without data room access.
      diligencePath: >
        Request merchant-level TPV distribution table under NDA; model 1-in-5 BDC departure
        scenario; obtain contract expiry schedule for top-10 merchants; require merchant-level
        NRR disclosure in any data room process.
      relatedQuestionRefs: [QR017]
      relatedTableRefs: [TR003]

    - type: missing-source
      severity: material
      topic: gdpr-fine-quantification
      missingEvidence: >
        The maximum GDPR fine of 4% of global annual revenue is unquantifiable because
        Checkout.com does not disclose revenue publicly. Even if the ICO investigation
        concludes with an enforcement notice, the fine quantum would depend on a revenue
        figure that Checkout.com has never publicly disclosed.
      whyItMatters: >
