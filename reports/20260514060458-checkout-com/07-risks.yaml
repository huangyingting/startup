callouts:
  - calloutType: risk
    title: Key-Person Concentration Is the Single Most Underpriced Risk
    body: >
      Guillaume Pousaz's 100% founder control, Monaco residence, and absence of any disclosed
      succession plan represents a governance risk that is structurally uncommon at a $12B-valued
      global payments processor. Unlike most late-stage private companies — where founder control
      is partially diluted through institutional rounds and independent director appointments —
      Checkout.com has raised $1.8B without any disclosed governance concession. A Pousaz departure
      or reputational event would affect IPO readiness, enterprise customer confidence, and the
      ability to execute the MALPB charter rollout simultaneously. Investors must require a
      formal succession plan and at least two independent directors before any commitment.
    claimRefs:
      - CR007
      - CR008
      - CR010
      - CR041

  - calloutType: risk
    title: Azure Sole-Provider Architecture Is Structurally Incompatible With the 99.999% SLA
    body: >
      Checkout.com's 99.999% annual uptime SLA — approximately 5 minutes of downtime per year —
      is commercially incompatible with exclusive dependence on a single cloud provider.
      Microsoft Azure has experienced regional and service-wide outages that exceeded 5 minutes
      in 2022, 2023, and 2024. Checkout.com processed $5.2B on a single Black Friday/Cyber
      Monday day in 2025; a 4-hour outage during that window would leave approximately $867M
      in payments unprocessed. No multi-cloud failover architecture, no alternative provider,
      and no public RTO/RPO commitment exists. The SLA is a marketing and contractual commitment
      that cannot be independently validated from the infrastructure posture.
    claimRefs:
      - CR012
      - CR013
      - CR035
      - CR039

  - calloutType: insight
    title: MALPB Is a Risk Mitigation and a New Risk Source Simultaneously
    body: >
      The January 2026 MALPB charter approval is the most significant risk mitigation in
      Checkout.com's recent history: it removes the dependence on third-party sponsor banks for
      US direct acquiring and positions the company to compete with Adyen and Stripe on a level
      regulatory footing in the world's most valuable payment market. However, the charter also
      introduces a new cluster of risks: enhanced BSA/AML program requirements, potential CFPB
      supervisory jurisdiction, and the execution risk of standing up a de novo bank compliance
      function within 12–18 months. Jordan Reynolds, appointed as MALPB CEO, has less than two
      years in role. The charter's conditions have not been publicly disclosed. This is a
      calculated risk with a favourable expected value but requires active monitoring of the
      US regulatory build-out cadence.
    claimRefs:
      - CR002
      - CR016
      - CR026
      - CR034

  - calloutType: risk
    title: ShinyHunters Incident Leaves an Unresolved ICO Liability Tail
    body: >
      The April 2024 ShinyHunters claim against Checkout.com's legacy cloud storage environment
      remains unresolved in terms of ICO investigation outcome. While the CTO confirmed no card
      data was compromised and no ICO enforcement notice has been published, the GDPR notification
      obligation triggers a formal ICO review period that can last 12–36 months. An ICO
      enforcement notice — even for procedural GDPR violations rather than substantive data
      compromise — would be publicly listed on the ICO enforcement database and would immediately
      enter the procurement risk assessments of every enterprise merchant evaluating or renewing
      Checkout.com contracts in 2026 and beyond. The maximum fine of 4% of global annual revenue
      is an undisclosed figure but material at the company's scale.
    claimRefs:
      - CR004
      - CR005
      - CR006
      - CR030

