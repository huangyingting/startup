  - id: mitigations-kill-criteria
    title: Mitigations and Kill Criteria
    body: >
      Checkout.com's direct acquiring model is itself the primary structural risk mitigation: by
      owning the acquiring infrastructure rather than depending on a sponsoring bank, the company
      has already eliminated the largest single-point-of-failure present in earlier-stage PSP
      business models. The MALPB charter approval replicates this resilience in the US market,
      removing dependence on Georgia-based sponsor banking relationships for direct acquiring.
      The Merchant Risk Council partnership formalises Checkout.com's engagement with the fraud
      and chargeback risk management community, providing visibility into emerging fraud vectors
      before they affect acceptance rates. The company's multi-year Microsoft Azure agreement
      provides contractual SLA protections and cost predictability, though it does not address
      the multi-cloud concentration risk.

      Against these mitigations, several risks remain insufficiently addressed. The Jersey parent
      structure opacity is structural and cannot be mitigated without a domicile change or
      voluntary disclosure; Checkout.com would need to publish consolidated audited accounts
      to resolve investor and regulatory concerns. Pousaz's key-person dependency requires a
      formal succession plan and independent board appointment to reach investment-grade
      governance standards. The Azure single-cloud architecture requires a documented
      multi-cloud strategy and RTO/RPO disclosures to meet the SLA commitments of enterprise
      merchants at the $5B+/day processing scale. Kill criteria for this investment include:
      FCA enforcement action filed; MALPB charter materially restricted or revoked; Pousaz
      departure without named successor; BDC count falling below 60 in any annual results
      cycle; Azure outage exceeding 4 hours during BFCM peak; or a confirmed ShinyHunters
      card-data breach triggering ICO enforcement. Any of these events would require immediate
      reassessment of the investment thesis and valuation basis.
    claimRefs:
      - CR029
      - CR032
      - CR036
      - CR042
