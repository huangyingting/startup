          - type: callout
            title: MALPB 同时是风险缓释和新风险来源
            body: >
              2026 年 1 月 MALPB 牌照获批，是 Checkout.com 近期历史中最重要的风险缓释：它消除了美国直接收单对第三方赞助银行的依赖，并让公司在全球最有价值的支付市场，以同等监管基础与 Adyen 和
              Stripe 竞争。不过，该牌照也引入一组新风险：更高的 BSA/AML 项目要求、潜在 CFPB 监管辖区，以及在 12–18 个月内搭建新设银行合规职能的执行风险。Jordan Reynolds 被任命为
              MALPB CEO，上任不到两年。牌照条件尚未公开披露。这是一项期望值有利的计算型风险，但需要主动监控美国监管建设节奏。
