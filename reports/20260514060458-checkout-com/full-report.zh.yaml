      - number: '8.4'
        title: 论证破裂触发器与最终尽调要求
        blocks:
          - type: paragraph
            body: >
              Checkout.com 的投资论证由八个可监控否决触发器约束。其中两个是二元存在性威胁——FCA 牌照执法和 MALPB
              被吊销——无论估值如何，都要求立即退出。其余六个是阈值型恶化信号，会触发尽调复核、组合行动规划或主动对冲，而不是自动退出。Pousaz 离任的否决条件是重大但可管理事件，前提是继任计划和具名接任 CEO
              同时公布；若无计划离任且没有继任安排，则构成存在性治理失败。$8B 二级市场估值否决条件是一条量化绊线：低于这一水平，过去轮次 $1.8B 的投资者优先权栈会开始结构性损害普通股回报，即便在牛市情景也如此。

              最终尽调要求按阻断优先级排序。经审计的合并账目和净收入留存率是阻断项——没有这些，不应部署已承诺资本。资本结构表和清算优先权分配瀑布是第三个阻断项，因为它决定任何低于 $40B
              上一轮标记进入时的实际回报曲线。MALPB 牌照条件、商户 TPV 集中度数据和 IPO
              路线图细节是重大尽调项，会影响情景权重；但如果三个阻断项得到满足，且治理前置条件（独立董事、继任计划）在交割前落实，它们本身不单独阻断投资。

              与 Adyen、Stripe 或 PayPal 有既有关系的投资者，应对两到三家近期续约的 Checkout.com 企业商户做结构化赢单 / 输单访谈，以验证 NRR
              论证并收集独立产品反馈。这一步一手尽调，加上上述数据室要求，构成 $12B 条件性买入头寸的最低独立验证框架。
