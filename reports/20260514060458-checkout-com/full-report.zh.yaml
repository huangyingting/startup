      - number: '2.5'
        title: 图表与证据
        blocks:
          - type: callout
            title: AI 驱动的接受率优化改写市场收入公式
            body: >
              传统支付处理主要拼价格（基点）和可靠性。Checkout.com 的 Intelligent Acceptance 自 2023 年 6 月以来每天执行 87M 次优化、带来 $15B+
              额外商户收入，代表了质变：支付基础设施开始在基础费用之上创造可衡量的商户 ROI。一个每年处理 $1B 的商户，平均接受率提升 3.8%，相当于多捕获 $38M 收入，使 Checkout.com
              合同从成本项变成正收入投资。买方对话因此从「最便宜处理商」改写为「最高 ROI 处理商」，也支撑溢价定价——这是结构性竞争优势。
            calloutType: insight
            claimRefs:
              - CM025
              - CM019
              - CM021
          - type: callout
            title: TAM 不透明带来显著规模测算风险
            body: >
              企业支付处理市场缺少单一可信的权威规模研究。不同估计因范围、take-rate 假设和地域覆盖不同而相差 5–10×。Checkout.com 不披露收入，外部无法独立核验其 take
              rate、毛利率或市场份额。这种不透明让人无法判断 Checkout.com 是在提升市场份额，还是只是搭上宏观电商增长顺风车。任何 DCF 或基于倍数的估值，都应在所有合理估计区间内对市场规模假设做压力测试。
