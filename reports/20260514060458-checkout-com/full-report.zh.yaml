      - number: '7.2'
        title: 运营与安全风险
        blocks:
          - type: paragraph
            body: >
              2024 年 4 月，犯罪黑客组织 ShinyHunters 声称访问了 Checkout.com 的旧版云存储环境，并称有 35,000 条支付卡记录暴露。Checkout.com 的 CTO
              确认没有银行卡数据被外传——该存储环境包含运营数据，而非 PCI 范围内的持卡人数据——并向安全研究基金捐出等额款项。公司已按 UK GDPR 义务通知 ICO。不过，涉及全球最大 PSP
              之一的具名泄露声称造成的声誉损害，无法从公开来源量化；公司也未发布独立取证报告。未来即便 ICO 执法通知针对的是流程违规而非数据泄露，也会把这一风险重新带回企业销售周期。

              Checkout.com 的基础设施在多年合作协议下完全运行在 Microsoft Azure 上。公司没有披露任何多云故障切换架构、Azure 区域之外的地理冗余，或 Azure 区域性 /
              全服务宕机时的恢复时间目标（RTO）承诺。99.999% 可用性 SLA 相当于每年约 5 分钟停机；在 2025 年 11 月 Black Friday / Cyber Monday 高峰期，平台单个 24
              小时处理 $5.2B。未来 BFCM 期间即使 Azure 宕机 30 分钟，也代表约 $108M 支付未能处理，并可能触发数百份企业合同下的 SLA 违约罚金。PCI DSS Level 1
              认证必须每年续期；年度认证审计中任何失效或失败，都会触发标准 PSP 商户协议中的合同终止条款，并可能导致 Visa / Mastercard 对 Checkout.com 罚款。API 版本管理和弃用风险是
              Checkout.com 开发生态的结构性问题：接入旧 API 版本的企业商户在迁移时会面临破坏性变更；公司没有公开 API 生命周期治理文件，也让长期集成规划存在不确定性。高风险商户垂直行业的拒付率上升，若超过
              1%，可能触发 Visa 和 Mastercard 监测项目；Checkout.com 的 Fraud Detection Pro 是缓释工具，但拒付率数据没有公开披露。
