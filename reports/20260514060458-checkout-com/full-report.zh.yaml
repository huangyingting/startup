        title: 留存、集中度与扩张风险
        blocks:
          - type: paragraph
            body: >
              Checkout.com 的留存证据在代理指标上很强，但没有直接披露。公司从未公布 NRR、GRR 或队列级收入留存指标。不过，三个信号强烈指向高净收入留存。第一，2025 年净收入连续第二年增长超过
              30%，这与高流失不相容。第二，BDC 在一年内从 39 家增至 63 家，意味着既有 BDC 成员留存率很高，同时有新成员加入。第三，截至 2026 年 5
              月，贸易媒体、新闻或负面来源中没有公开确认的重大商户流失事件。

              多年企业合同（通常至少两到三年）提供结构性留存机制。更换 PSP 关系涉及 API 迁移、合规重新认证和运营风险——这些成本强烈抑制商户仅因价格机会而切换。BDC 队列扩张
              62%，意味着顶级商户基础同时发生留存和扩张。

              集中度风险是最重要的未解决尽调事项。在 1,000 家商户基础和 63 家 BDC 成员中，前 20 大商户很可能贡献总 TPV 的 40–50% 或更多。公司没有披露这一点。一两家最大 BDC
              商户离开，就可能对已报告交易量产生重大影响。估值从 $40B（2022 年）降至 $12B（2025 年）以及 ShinyHunters 相关的 2024
              年安全事件，是最可能影响新商户获取而非既有商户留存的两项负面事实。截至本报告日期，没有报告显示二者导致商户流失。独立评价数据（G2、Trustpilot、Gartner Peer
              Insights）确认商户情绪总体正面，但定价透明度和自助服务缺口仍是持续抱怨点。
