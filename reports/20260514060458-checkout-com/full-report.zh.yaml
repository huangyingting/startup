  - number: 6
    title: 客户
    sections:
      - number: '6.1'
        title: 客户分层
        blocks:
          - type: paragraph
            body: >
              Checkout.com 的客户基础有意集中在支付市场的企业端。截至 2026 年 2 月公布 2025 全年业绩，公司服务 1,000+ 企业商户；公开沟通中没有提供或暗示自助、SMB
              或创业公司层级。这种只做企业客户的商业化路径是一项结构性选择：它抬高合同价值，降低每美元 TPV 的客户支持成本，但也意味着每一段客户关系都是定制化、高风险谈判。

              客户基础横跨六个主要垂直行业。数字与电商（Shein、Samsung、eBay）是交易量锚点，代表年 GMV 可达数百亿美元的平台。FinTech 与
              crypto（Wise、Remitly、Coinbase）是质量最高的参考客户群，具有多年合作期限和已发布案例研究。旅行与酒店（Virgin、Booking.com）以及 SaaS
              与流媒体（Spotify、DocuSign）代表利润率更高、重复支付更强的使用场景，Intelligent Acceptance
              和订阅计费能力能在这些场景中带来可衡量的授权通过率价值。外卖（PizzaHut、Deliveroo）和 B2B / 工业（Hyundai、Henkel）补齐了垂直覆盖。

              地理上，Checkout.com 在欧洲和英国（本土市场）最强；美国增长最快，2025 年交易量同比约增长 70%。亚太和拉美通过替代支付方式覆盖，但公司没有把它们披露为独立地理收入分部。只做企业客户的模式意味着
              1,000+ 商户中的每一家都在定制多年合同下运营，形成支撑整体客户留存的结构性切换成本。
