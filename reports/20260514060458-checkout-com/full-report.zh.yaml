  - id: TM002
    title: TAM/SAM/SOM 与规模测算视角表
    columns:
      - 视角
      - 方法
      - 估算
      - 置信度
      - 关键假设
      - 尽调缺口
    rows:
      - - TAM —— 全球数字支付处理收入
        - 全球电商交易量（约 $6T）× 企业级费率（0.15–0.30%）
        - $9–18B/yr（保守）；$30–50B（宽口径）
        - 低
        - 企业级约占整体处理量 20–40%；费率差异可达 5×
        - 没有单一权威研究；区间对口径高度敏感
      - - TAM —— 分析师报告区间（宽口径支付软件市场）
        - 已发布分析师报告（Mordor、Grand View、MarketsandMarkets）
        - 2028 年达 $75–130B（包括 SMB、收单、软件、APM）
        - 低
        - 这些报告纳入 SMB 和相邻软件；纯企业级口径需打 60–70% 折扣
        - 分析师报告口径不一致；需谨慎使用
      - - SAM —— 全球企业级跨境商户
        - 估计有 5,000–10,000 家收入 >$100M 且有跨境支付需求的企业级商户
        - 支付处理商收入 $10–40B/yr
        - 低
        - 合格商户数量不确定；预算分配为 GMV 的 0.2–0.5%
        - 没有企业级商户公开名录；估算来自自下而上的近似测算
      - - SAM —— 上市公司校准（Adyen）
        - Adyen（上市）：2024 年约 €1.35T 交易量带来约 $2B 收入，费率约 0.15%
        - 若 Checkout.com 以类似费率处理 $300B 交易量，隐含 SAM 份额为 $3–5B
        - 中
        - Adyen 费率包含增值服务；Checkout.com 未披露费率
        - Checkout.com 不披露收入或利润率；Adyen 对比仅作方向性参考
      - - SOM —— Checkout.com 当前收入估算
        - Checkout.com $300B 交易量 × 隐含 0.20–0.30% 费率
        - $600M–$900M 总收入估算（未确认）
        - 低
        - 费率未披露；利润率结构未知；经调整 EBITDA >10%，但基数未披露
        - 私营公司；无收入披露；区间有 ±50% 误差带
      - - SOM —— 20% CAGR 下的 5 年潜力
        - 当前 SOM 估算 × (1.20)^5 增长因子
        - 到 2030 年总收入 $1.5–2.2B（估计）
        - 低
        - 假设收入增速与交易量增速一致；未建模利润率扩张
        - 前瞻估算仅作示意，不是公司指引
    notes: |
      所有估算都由公开数据点和可比公司自下而上拼出；由于 Checkout.com 母公司注册在 Jersey，公开渠道没有经审计收入数据。这些只是数量级估算，不确定性很高。
    claimRefs:
      - CM008
      - CM009
      - CM010
      - CM011
      - CM012
      - CM013
