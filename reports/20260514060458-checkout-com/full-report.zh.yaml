      - number: '4.4'
        title: 公开牵引力与私有指标缺口
        blocks:
          - type: paragraph
            body: >
              以 Checkout.com 的规模看，公开披露的财务指标异常稀疏。已披露指标包括：总支付量（2025 年 $300B+）、净收入增长率（连续第二年同比 >30%）、调整后 EBITDA 利润率（全年
              >10%）、发卡年化运行率（2025 年 Q4 $5B）、APM 交易量增长（2025 年 104%），以及 BFCM 处理量（24 小时 $5.2B、约 100M
              笔交易）。这些全部是公司声称数据，未经审计，也没有任何独立第三方验证。

              分析无法获取的关键私有指标包括：绝对净收入和毛收入、绝对
              EBITDA、毛利率、获客成本、流失率、平均合同价值、按地域拆分的总支付量、收入成本拆分、资产负债表、现金头寸和债务义务。泽西控股公司结构使集团在法律上免于英国 Companies Act
              下本应要求年度账目的备案义务。Checkout Ltd（08606477）和 Checkout Technology Ltd（09526965）在 Companies House
              的英国子公司备案可能包含部分英国实体财务，但存在延迟，且只反映英国运营，而不是集团合并财务。

              这些指标缺失造成结构性尽调缺口。$600M–$900M 的收入估计存在重大不确定性——约正负 40%——不应被视为已验证数据。调整后 EBITDA
              盈利里程碑很重要，但不足以支持投资判断：分母（收入）未知，且调整后 EBITDA 排除了股权激励、重组成本和可能的一次性项目，而这些项目没有披露。Checkout.com 披露的 $15B+ 商户价值释放和
              87M 次日 AI 优化，是公司声称的运营指标，不是财务指标。
