            title: 关键人集中是最被低估的单一风险
            body: >
              Guillaume Pousaz 100% 创始人控制、居住在 Monaco，且没有披露任何继任计划；对于估值 $12B
              的全球支付处理商，这是一项结构上少见的治理风险。大多数后期私营公司会在机构轮融资和独立董事任命中部分稀释创始人控制权，而 Checkout.com 已募集 $1.8B，却没有披露任何治理让步。Pousaz
              离任或卷入声誉事件，会同时影响 IPO 准备度、企业客户信心和 MALPB 牌照落地能力。投资者在作出任何承诺前，必须要求正式继任计划和至少两名独立董事。
            calloutType: risk
