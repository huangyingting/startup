      - number: '4.6'
        title: 财务结论
        blocks:
          - type: paragraph
            body: >
              相对同业基准，收入质量较强：来自 1,000+ 企业商户的 $300B+ 交易量和 64% 同比增长，构成可防守、较分散的收入基底，单笔交易集中风险低，地域分布有意义。在这一规模上连续第二年净收入增长 >30%
              很突出，也符合 AI 接受率和发卡增购逻辑。>10% 调整后 EBITDA 利润率是正向拐点，但绝对 EBITDA 金额未知。

              利润率路径向好但不透明。一家估计收入 $600M–$900M、调整后 EBITDA 利润率 >10% 的公司，意味着 $60M–$90M 调整后 EBITDA——对于一家曾估值 $40B
              的公司，这是可行但不算大的利润池。云基础设施消除了自有基础设施 capex，有利于利润率扩张。没有 SMB 层级，也就没有广泛分销型处理商压低利润率的支持与流失成本。主要利润率风险在于，随着 Adyen
              Uplift 和 Stripe Adaptive Acceptance 缩小差距，公司必须持续投入技术以守住 AI 接受率竞争护城河。

              对支付业务而言，资本强度较低（没有制造、没有自有数据中心），但 MALPB
              银行牌照引入规模未知的监管资本义务。主要财务尽调阻碍是：（1）泽西结构导致没有经审计的收入或利润披露；（2）没有披露现金头寸、现金消耗率或债务义务；（3）调整后 EBITDA
              排除了可能重大的成本，包括股权激励；（4）无法计算经验证的估值倍数。任何投资承诺都需要在 NDA 下获取完整经审计合并财务和完整债务明细表。
            claimRefs:
              - CI034
              - CI035
              - CI036
              - CI037
              - CI038
              - CI039
              - CI040
