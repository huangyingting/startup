      - number: '1.2'
        title: 领导层与治理
        blocks:
          - type: paragraph
            body: >
              Guillaume Pousaz 创立 Checkout.com，并在公司从创业公司成长为估值 $12B 的全球支付处理商全程担任 CEO。2025 年 4 月，Pousaz
              因英国非居民税制变化从英国迁往摩纳哥，加入一批在新税制下离开英国的超高净值人群。这次迁居是一个治理信号，尽调必须追问其连续性风险。当前高管团队纵深较好且经验丰富：CTO Mariano Albera
              负责技术，CRO Antoine Nougué 负责全球收入，CPO Meron Colbeci 负责产品，COO Jenny Hadlow 负责运营，CMO Rory O'Neill
              负责市场。为了推进美国银行业务，Jordan Reynolds 被任命为 MALPB CEO 兼北美银行业务负责人，反映 2026 年 1 月拿到 Georgia 银行牌照的战略重要性。公司全球约有 2,000
              名员工，约 50% 位于英国。Checkout.com 母公司设在泽西，意味着详细财务披露不需要公开；集团也不公布收入或利润数据，降低了潜在投资者和合作伙伴评估业务时的透明度。
