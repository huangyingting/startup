      - P/TPV（估计）
      - 商业模式
      - 可比性说明
    rows:
      - - Adyen
        - ~€38B（~$42B）上市
        - ~8x
        - ~3.5%
        - 直接收单；泛欧洲；上市（Euronext）
        - 最接近的结构可比公司：直接收单、只做企业客户、TPV 区间相近；增速低于 Checkout.com；FY2025 收入估计约 ~$5B，TPV 为 $1.2T
      - - Stripe
        - ~$65B（私有，2023 Series I）
        - ~12x 估计
        - ~4%
        - 聚合器 + 开发者 SaaS；SMB 和企业客户
        - 更高倍数反映 SaaS 层和开发者市场份额；部分可比——模式比 Checkout.com 更宽；无公开财务数据
      - - PayPal
        - ~$65B（上市）
        - ~2.5x
        - ~0.7%
        - 消费者 + 商户多产品；成熟
        - 倍数低反映增长成熟和消费者业务敞口；绝对 TPV 体量很高，导致 P/TPV 偏低；与 Checkout.com 增长叙事相关性有限
      - - Worldpay
        - ~$18B（FIS 2023 年剥离）
        - ~6x
        - ~2%
        - 企业收单；FIS 后由 PE 支持
        - 有用的悲观情景锚点；PE 支持；增速较慢；剥离后整合导致利润率较低；FIS 交易企业价值约 ~$18B
      - - Nuvei
        - ~$6.5B（2024 年私有化）
        - ~7x
        - ~4.5%
        - 企业处理；特殊垂直行业（游戏、加密货币）
        - 2024 年经 Advent International 以约 ~$6.5B 私有化；特殊垂直行业聚焦限制直接可比性；展示私营收单机构重定价的下行情景
      - - Klarna
        - ~$15B（2024）
        - ~6x
        - N/A
        - BNPL；消费者先买后付；IPO 候选
        - 欧洲 fintech 估值情绪的相邻部分可比；BNPL 模式不可直接可比；$15B 反映预期美国 IPO 前的 2024 年二级交易
    notes: >
      所有私营公司估值均为估计，基于最后已知融资轮或二级市场报道；不反映当前企业价值。P/收入和 P/TPV 比率为分析师估算；Checkout.com 的收入和 TPV 基于公司新闻稿数字（未经审计）。Adyen 数据基于 Q1
      2026 的公开交易价格，是本表中最可独立验证的数据点。可比性评级反映商业模式和客户细分匹配度，不是财务质量评级。
    claimRefs:
