  - id: TV005
    title: 投资逻辑失效与终止触发器表
    columns:
      - 触发事件
      - 可观察阈值
      - 对投资逻辑的传导
      - 必要行动
    rows:
      - - FCA 执法行动立案
        - FCA 公共登记册发布针对 Checkout Ltd 或 Checkout Technology Ltd 的正式执法通知、牌照变更或要求
        - 阻断 UK/EEA 收单；击穿 UK/EU 收入逻辑；向所有辖区释放严重监管风险信号
        - 立即暂停投资或触发退出；48h 内聘请监管法律顾问；监控 FCA 执法数据库
      - - MALPB 牌照被撤销或受到重大限制
        - Georgia DBF 发布牌照暂停、撤销或重大条件修订
        - 击穿美国直接收单乐观情景；从基准 / 乐观估值中抹去 $5–10B；暴露最高价值增长市场的执行失败
        - 暂停进一步投放资本；重估美国收入模型；评估退出时间表
      - - Guillaume Pousaz 离职且未指定继任者
        - CEO 过渡公告未同步列明继任者和过渡计划
        - IPO 至少延迟 12–18 个月；投资人信心承压；治理真空让近期一级融资无法落地
        - 启动治理监控机制；接触董事会；可能评估降价融资或退出
      - - 任一交易中估值低于 $8B
        - 二级交易、员工计划、新一级融资或回购的隐含公司价值低于 $8B
        - 触发降价融资；优先股堆叠压低普通股回报；基准情景回报模型失效
        - 从根本上重估投资逻辑；建模优先股堆叠；评估法律选项
      - - BDC 商户数低于 60
        - 年度业绩公告显示 BDC 数量低于 60（FY2025 当前为 63）
        - NRR 逻辑受损；BDC 净收缩 5%+，说明新闻稿看不到的底层留存问题
        - 进一步承诺前要求单商户 TPV 队列数据；建模流失情景
      - - Azure 在 BFCM/Q4 高峰宕机超过 4 小时
        - 任一 11–12 月高峰处理窗口确认平台宕机超过 4 小时
        - 按 $5.2B/日处理速率构成 SLA 违约；商户流失敞口；$867M+ 付款无法处理；企业信心受冲击
        - 评估 SLA 罚金敞口；要求披露多云架构；建模流失情景
      - - ICO 关于 ShinyHunters 或后续泄露的执法通知
        - ICO 发布执法通知，确认卡数据被泄露，或因泄露相关违规罚款 >£1M
        - GDPR 罚款最高可达全球年收入 4%（金额未披露）；企业采购风险；多个辖区监管升级
        - 聘请数据保护法律顾问；评估 ICO 时间线；重新评估企业销售管线风险
      - - Visa 或 Mastercard 会员资格审查或暂停通知
        - Visa 或 Mastercard 发出的会员资格审查、整改计划或暂停正式通知
        - 生死级威胁：一旦暂停，品牌卡收单会立即停摆；没有运营备选方案
        - 无论估值如何都立即触发退出；联系支付网络关系团队；评估追索选项
    notes: >
      终止触发阈值为分析师定义的监控标准，不代表合同条款或法律义务。BDC 阈值 60 低于当前 63，用于容纳正常单年波动；低于 60 代表重大的净收缩。$8B 估值终止标准基于悲观情景下限再下调 15% 缓冲；低于该水平时，既有
      $1.8B 优先股堆叠会显著压低普通股回报。
    claimRefs:
      - CV002
      - CV008
      - CV010
      - CV011
      - CV012
      - CV015
      - CV025
      - CV031
      - CV039
  - id: TV006
    title: 最终尽调要求表
    columns:
      - 主题
      - 缺失证据
      - 重要性
      - 负责人 / 尽调路径
    rows:
      - - 合并经审计账目
        - Checkout Group Ltd（Jersey 母公司）没有公开集团 P&L；所有财务指标均为未经审计的公司新闻稿
        - 无法核验净收入、EBITDA 利润率、收入结构或成本结构；财务模型建立在估计区间上；若与估计出现重大缺口，投资将被重定价
        - 要求 CFO 在 NDA 下提供 FY2023–FY2025 集团合并账目；聘请 Big Four 审计所执行商定程序
      - - 净收入留存率（NRR）
        - 未披露 NRR、GRR 或商户队列留存数据；唯一代理指标是 BDC 数量从 39 增至 63
        - 无法拆分有机增长和新增 logo 增长；隐藏流失会击穿基准情景收入模型和 25–35% 增长假设
        - 在数据室要求按商户队列（2022–2025）和产品线（收单 vs 发卡 vs APM）披露 NRR 和 GRR；要求提供独立计算方法
      - - 股权结构表和优先权压力
        - 未公布股权结构表、清算优先权安排或反稀释条款；多轮优先股累计 $1.8B
        - 优先股堆叠结构决定基准和悲观退出中的实际投资人回报；若 $40B 轮含完全棘轮反稀释条款，任何低于 $25B 的入场都会严重压低回报
        - 要求提供完全摊薄股权结构表、优先权瀑布模型，以及所有系列的反稀释条款；按 $12B、$16B 和 $22B 退出价格做回报压力测试
      - - MALPB 牌照条件
        - Georgia DBF 牌照条件未公开；Jan 2026 批准函及任何附带条件均为非公开
        - 未披露的限制性条件可能限制美国直接收单范围、要求额外资本，或设置 BSA/AML 项目里程碑，从而拖慢乐观情景爬坡
        - 在 NDA 下要求完整 Georgia DBF 牌照批准函及任何合规条件；聘请独立美国银行监管法律顾问评估条件
      - - 商户 TPV 集中度
        - 未披露单商户或 Top-N 商户 TPV 拆分；前 20 大占 40–50% 是分析师根据 BDC 构成推断
        - 单个 BDC 流失会带走 $2B+ TPV；没有集中度数据，基准情景收入模型存在无法量化的流失风险；合同到期表同样关键
        - 在数据室要求前 10 和前 20 大商户 TPV 拆分、合同到期表（2025–2028），以及任何合同最低消费承诺
      - - IPO 路线图和治理结构
        - 未提交 S-1；未公布承销银行；未选择 LSE/NYSE 上市地；未披露董事会构成；Pousaz 接班计划未披露
        - IPO 是最可能的乐观情景退出路径；若没有可信的 2027–2028 时间表和独立董事会承诺，乐观情景回报必须下调 12–18 个月
        - 要求管理层提供董事会构成、独立董事任命计划、投行聘用函和 IPO 就绪评估
    notes: >
      尽调优先级按阻断状态排序：合并账目、NRR 和股权结构表是阻断项（没有这些就不承诺出资）；MALPB 条件、商户集中度和 IPO
      路线图是重大事项。治理要求（任命独立董事、接班计划）建议列为任何承诺的交割条件，而不仅是尽调请求。所有数据室请求均假设已签署标准 NDA/保密协议。
    claimRefs:
      - CV008
      - CV010
      - CV015
      - CV032
      - CV043
      - CV044
      - CV045
