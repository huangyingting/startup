      - number: '1.3'
        title: 融资历史与估值
        blocks:
          - type: paragraph
            body: >
              Checkout.com 历史上累计外部融资约 $1.8B。最近一轮公开融资是 2022 年 1 月 12 日完成的 $1B Series D，估值 $40B。投资方包括 Altimeter
              Capital、Dragoneer Investment Group、Franklin Templeton、GIC（新加坡主权财富基金）、Insight Partners、Qatar Investment
              Authority、Tiger Global 和 Oxford University Endowment Fund，存量股东 Blossom Capital、Coatue、DST Global、Endeavor
              Catalyst 和 Ribbit Capital 也参与。更广泛的金融科技估值修正之后，Checkout.com 内部估值在 2022 年末降至约 $11B，2023 年再次降至 $9.35B。2025 年 9
              月员工股份回购项目按美国 409A 会计规则隐含 $12B 估值——较 2023 年低点回升 28%，但仍比 $40B 峰值折价 70%。媒体报道过 IPO 猜测，但截至报告日公司尚未确认。2022 年 1 月
              Series D 之后，公司没有再募集新的外部机构资本，说明公司在依靠既有资本运营，同时为潜在退出前的盈利能力做准备。
