          - type: callout
            title: Azure 单一供应商架构与 99.999% SLA 结构性不兼容
            body: >
              Checkout.com 的 99.999% 年度可用性 SLA——每年约 5 分钟停机——在商业上无法与单一云提供商独占依赖兼容。Microsoft Azure 在 2022、2023 和 2024
              年发生过超过 5 分钟的区域性和全服务宕机。Checkout.com 在 2025 年单个 Black Friday / Cyber Monday 日处理 $5.2B；若该窗口宕机 4 小时，约 $867M
              支付将无法处理。公司没有多云故障切换架构，没有替代提供商，也没有公开 RTO/RPO 承诺。SLA 是营销和合同承诺，但从基础设施姿态无法独立验证。
