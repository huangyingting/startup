            body: >
              Checkout.com 2025 年的核心采用指标，在同规模支付基础设施提供商中属于一流水平。总支付交易量（TPV）超过 $300B，同比增长 64%。公司每天处理超过 $1B；在 2025 年 Black
              Friday 和 Cyber Monday 高峰窗口，24 小时处理创纪录的 $5.2B——这是企业商户在高交易量季节高度看重的弹性基础设施能力证明。

              Billion Dollar Club 成员同比从 39 家增至 63 家，年处理量超过 $1B 的商户数量增长
              62%。这一群体扩张是顶级商户采用的最重要单一指标：公司的最大、最有价值商户正在留下来，新大型商户也在加速加入。按 0.2% 隐含抽佣率（take rate）计算，每家 BDC 商户年处理 $1B+ 对应
              $2M+ 年收入；仅 63 家 BDC 商户就代表至少 $126M 估算经常性收入。

              商户基础内部的产品采用也快速扩张。替代支付方式（APM）交易量同比增长 104%，说明现有商户在启用更多 APM，而不是迁移到其他处理商。发卡业务在 2025 年 Q4 达到 $5B
