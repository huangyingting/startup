      - number: '7.3'
        title: 伙伴、依赖与财务风险
        blocks:
          - type: paragraph
            body: >
              Guillaume Pousaz 创立 Checkout.com，是唯一控股股东，并于 2025 年 4 月从英国迁居 Monaco。公司没有公开披露继任计划、副 CEO
              或独立董事会治理结构。这构成同等规模支付行业中最关键的关键人风险：Pousaz 离任、失能或卷入声誉事件，会立即影响投资者信心、企业采购决策，以及完成 IPO 或战略交易的能力。公司两名最关键高管——CTO
              Mariano Albera 和 CRO Antoine Nougué——截至 2026 年 5 月仍留任，但支付工程和企业销售领导人才市场竞争激烈，他们能否继续留任需要监测。Jordan Reynolds 于
              2025 年出任 MALPB CEO，是美国扩张的关键招聘，但上任不到两年。

              Checkout.com 的直接卡收单模型完全依赖其保持 Visa 和 Mastercard
              主会员资格。任何违反网络规则的行为——包括商户风险阈值、拒付率或禁止类别处理——都可能触发会员资格审查或暂停，从而让整个商户基础的收单停摆。尚未发生网络暂停，但公开拒付率数据缺失，使外部无法独立评估这一风险。Microsoft
              Azure 仍是 Checkout.com 唯一公开披露的云提供商；公司没有公开多云或分布式供应商策略。2026 年 1 月收购 Blue EMI，增加了一个位于 Lithuania
              的数字货币和稳定币清算子公司；其整合进核心平台仍在进行，并且在管理层同时执行 MALPB 牌照建设期间带来执行风险。

              财务侧，Checkout.com 自 2022 年 1 月以 $40B 估值完成 $1B Series D 后，再未募集机构资本。2025 年 9 月员工回购确立了 $12B 隐含估值，较峰值折价
              70%。这次压缩意味着按早先估值授予的员工股权大幅处于水下，而在工程、销售和产品职能中，股权是主要长期薪酬驱动，因此形成人才留存风险。Billion Dollar Club 63 家商户带来的收入集中度——估计前
              20 大贡献 $300B+ TPV 的 40–50%——没有公开披露，却是投资论证中最大的单一财务风险。任何重要 BDC 商户离开，都可能带来 $2B+ 年 TPV 损失，且没有保证替代时间表。公司处理 150+
              币种，带来 USD 强势宏观环境下的持续 FX 暴露；没有公开披露对冲政策。
