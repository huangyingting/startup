  - number: 3
    title: 竞争格局
    sections:
      - number: '3.1'
        title: 竞争格局概览
        blocks:
          - type: paragraph
            body: >
              Checkout.com
              面对的是分层替代方案，竞争发生在三个维度：提供可比全栈企业收单和支付处理的直接同行；把银行关系定价打包出售的传统银行处理商；以及相邻或替代方案，包括面向开发者的网关、垂直小众玩家，以及最大商户层级的内部自建选项。

              Adyen（Euronext: ADYEN）是最直接的同行——一家只服务企业的上市处理商，2024 年处理量约 €1.35T，净收入约 €1.83B，隐含综合 take rate 约
              0.13–0.15%。Adyen 拥有 3,800 多名员工，自 2006 年起在 36+ 市场开展直接收单，运营历史、公开披露透明度和市值可信度都强于
              Checkout.com。Stripe（私营，二级市场估值约 $65B）是最大的开发者生态玩家，估计每年处理 $1T，并拥有市场上最宽的产品套件。Worldpay 于 2023 年被 GTCR 以约 $18B 从
              FIS 收购，是按交易量计最大的处理商（$2T+），但受制于传统基础设施和技术债。

              Braintree（PayPal）、JPMorgan Payments 和 Nuvei 也构成竞争集合，各自有不同产品侧重和清晰 ICP。现状替代方案——与 Barclays、Lloyds 或 Chase
              建立内部银行收单关系——对以英国/美国为中心的商户仍然可行。Amazon 这类超大型商户可以内部自建，但需要 $100M+ 投入和多年监管批准，因此竞争压力只限于全球前 10 大商户。Big Tech
              支付（Google Pay、Apple Pay）运行在钱包和消费者层，而不是直接收单层，因此更像 Checkout.com 核心收单产品的补充，而不是替代品。
