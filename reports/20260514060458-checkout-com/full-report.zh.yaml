      - number: '8.3'
        title: 可比公司分析
        blocks:
          - type: paragraph
            body: >
              Checkout.com 最相关的公开可比公司是 Adyen。Adyen 面向企业商户运营几乎相同的直接收单模型，总部在欧洲，处理的 TPV 区间也相近。截至 2026 年 Q1，Adyen 市值约
              $42B（€38B），对应约 8x 过去 12 个月收入，并在估算 $1.2T 年 TPV 上对应 3.5% P/TPV。Checkout.com 以 $12B 估值、$300B TPV 计算，交易在 4.0%
              P/TPV——相对 Adyen 的 P/TPV 略有溢价，但收入倍数相同；这反映了更高 TPV 增长（64%，对比 Adyen 约 20–25%），也被更小绝对规模和更低流动性抵消。Adyen
              对比支持一个判断：$12B 是合理到有吸引力的进入点，而不是拉伸估值。

              Stripe 是部分可比公司，上一轮已知机构融资（Series I，2023 年）估值约 $65B。它采用开发者优先的聚合器模型，SaaS 组件更广，也服务包括 SMB 在内的更宽市场。$65B 估值意味着约
              12x 估算收入，较 Adyen 和 Checkout.com 都有溢价，反映 Stripe 的产品广度和更高增长预期。如果 Checkout.com 不把商业模式扩展到纯收单之外，Stripe
              的更高收入倍数并不能支撑 Checkout.com 向上重估。

              PayPal、Worldpay、Nuvei 和 Klarna 构成其余可比集合，相关性各不相同。PayPal 低迷的 2.5x 收入倍数和 0.7% P/TPV 反映成熟增长与消费者 / SMB 组合，而
              Checkout.com 并不具备这些特征。Worldpay（PE 支持，FIS 出售后约 $18B）和 Nuvei（私有化，约 $6.5B）代表企业收单光谱的低端，是下行情景定价的有用锚点。Klarna 约
              $15B 的 BNPL 估值提供欧洲金融科技参照，但结构不同。整体同行集合显示，按增长溢价调整后，Checkout.com 的 $12B 估值处在其自然可比范围的低端或以下。
