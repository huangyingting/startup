        - label: 调整后 EBITDA 估计（2025，USD M）
          low: 60
          mid: 90
          high: 135
          unit: USD M
          note: 由估计收入区间上的 >10% 利润率推导；利润率仅为公司声称
        - label: 净收入毛利率（估计，%）
          low: 45
          mid: 55
          high: 65
          unit: '%'
          note: 基于可比处理商经济模型；Adyen 2024 披露约 54%；公司未披露
        - label: 隐含估值区间（USD M）
          low: 9000
