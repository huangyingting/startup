companyProfile:
  summary: >
    Checkout.com 由 Guillaume Pousaz（瑞法企业家，此前任职 Visa 和 PayPal）于 2012
    年在伦敦创立，核心判断是大型全球企业在交易接受率、速度和透明度上长期被传统支付处理商服务不足。公司搭建了云原生、直接收单的支付平台，绕开传统中间件，让企业商户拿到更高授权率和更低成本。早期自举增长后，Checkout.com
    多轮累计融资 $1.8B，并在 2022 年 1 月以 $40B 峰值估值完成 Series D（Altimeter、Dragoneer、Franklin Templeton、GIC、Insight
    Partners、QIA、Tiger Global）。金融科技估值倍数压缩后，2025 年 9 月二级交易将估值重定价到约 $12B，但公司在 2025 年首次实现全年调整后 EBITDA 盈利，TPV 超过 $300B（同比
    +64%），净收入增长 >30%。2026 年 1 月，Checkout.com 获批 Georgia MALPB 银行牌照，可在美国绕开银行中介直接收单——这是一个重要竞争里程碑。公司于 2026 年 1 月收购 Blue
    EMI（立陶宛数字货币平台），并被评为 Forrester Wave: Payment Processing Platforms, Q1 2026 领导者。
