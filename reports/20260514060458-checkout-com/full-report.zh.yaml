    type: bar
    summary: >
      柱状图展示估值光谱：从熊市情景重定价、当前二级市场隐含价值，到牛市情景 IPO / 收购区间和 2022 年峰值，并以 Adyen 当前公开市场市值作基准。图中体现回到峰值所需回补的
      70%、当前入场点的不对称性，以及可比锚点的规模。
    data:
      items:
        - label: 熊市情景（$6B）
          value: 6
          note: TPV 增长停在 <15%；EBITDA 利润率仅 5–8%；P/TPV 2.0%；Adyen/Stripe 抢份额；治理触发事件
        - label: 当前二级市场（$12B）
          value: 12
          note: 当前二级市场隐含估值（2025 年 9 月员工回购）；P/TPV 4.0%；收入倍数 ~8x
        - label: 牛市情景退出（$20B）
          value: 20
          note: 美国 MALPB 加速；发卡 ARR 超 $10B；2027 年启动 PE 轮或提交 IPO；P/TPV ~6.7%
        - label: 牛市情景 IPO（$30B）
          value: 30
          note: 溢价 IPO，公开市场倍数重估；发卡 ARR $15–20B；远期收入 10x
        - label: 2022 年 1 月峰值（$40B）
          value: 40
          note: Series D 峰值，P/TPV 15%；估算收入 ~60x；金融科技倍数环境不可持续
        - label: Adyen 市值（$42B）
          value: 42
          note: Adyen 当前公开市场市值 ~€38B/$42B；P/TPV ~3.5%；收入 8x；最相关的上市可比公司
