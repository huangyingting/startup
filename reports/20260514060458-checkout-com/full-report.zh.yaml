      - number: '5.4'
        title: 信任、安全与路线图
        blocks:
          - type: paragraph
            body: >
              Checkout.com 的信任与合规姿态已达到商业上可获得的最高认证等级。PCI DSS Level 1 Service Provider 认证每年复审，覆盖所有持卡人数据处理环境。ISO 27001 和
              SOC 2 Type II 认证保持有效，范围覆盖全球云基础设施。公司通过已发布的隐私政策和 Data Processing Agreement 模板（可按需提供）维持 EU 和 UK 框架下的 GDPR
              合规。trust.checkout.com 的信任门户是主要公开披露入口，集中提供合规证书链接、安全政策、事故更新和公开状态页。

              ShinyHunters 相关的旧版云存储事故（约 2021 年）仍是一个有记录的开放风险：CTO
              确认未泄露持卡人数据或客户资金，公司也捐出等额资金支持网络安全研究，以释放声誉信号。不过，公司尚未发布公开的事故后整改报告；截至 2026 年 5
              月，旧版存储重新配置的明确完成时间也未得到确认。公开信息中没有与该事故相关的 FCA 执法行动。对需要签署事故关闭证书的企业采购团队来说，这构成剩余透明度缺口。

              2026 年路线图有四项已确认举措：（1）Agentic Commerce——AI 代理为消费者授权的 AI 交互自主完成结账流程，公司已将其宣布为 2026 年核心开发优先事项；（2）通过 Georgia
              MALPB 牌照实现美国直接收单，2026 年 1 月获批，目前处于运营落地阶段；（3）通过 Blue EMI（Lithuania）实现数字货币清算，支持欧元稳定币清算；（4）SAP OPF 集成（2026 年
              3 月 GA）作为 ERP 分发层。Merchant Risk Council 合作（2025 年末深化）让 Fraud Detection Pro 获得 Checkout.com
              自有交易语料之外的网络级欺诈模式情报。
