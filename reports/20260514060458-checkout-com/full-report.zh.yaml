  - id: FV003
    title: 估值 / 回报区间
    slug: valuation-return-range
    type: range
    summary: |
      区间图展示当前隐含入场、3 年基础情景退出、3 年牛市情景退出和 3 年熊市情景退出下的低 / 中 / 高估值估算。每条区间都反映私营公司估值天然的不确定性，来源是二级市场数据和估算可比倍数。
    data:
      items:
        - label: 当前入场（2025 年 9 月）
          low: 10
          mid: 12
          high: 14
          note: 二级市场隐含；2025 年 9 月员工回购；区间反映二级市场价差不确定性
        - label: 3 年牛市情景退出
          low: 18
          mid: 27
          high: 35
          note: IPO 或战略收购；美国 MALPB 带来 100%+ 增长；发卡 ARR $15–20B；较基础情景 2x–3x
        - label: 3 年基础情景退出
          low: 14
          mid: 18
          high: 22
          note: PE 延续轮或后期二级交易；当前估值的 1.2–1.8x；收入 CAGR 25–35%；EBITDA 12–15%
        - label: 3 年熊市情景退出
          low: 4
          mid: 6
          high: 9
          note: 收入增长减速；竞争压力；二级市场进一步重定价；没有 IPO 窗口
    claimRefs:
