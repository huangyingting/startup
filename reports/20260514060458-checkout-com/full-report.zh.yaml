          mid: 1800
          high: 1900
          unit: USD M
          note: 估计累计值；没有精确公开总额；Series D $1B 已确认
    approximationNotes: >
      所有区间都是由公开数据和可比公司基准推导的数量级估计。净收入区间用 $300B TPV 乘以分析师共识推导的 0.20-0.30% 抽成率。EBITDA 区间把 >10% 下限应用到收入区间。毛利率以 Adyen 2024
      年公布数据为主要基准。 估值区间的中值采用 2025 年 9 月 $12B 员工回购参考价，高 / 低值采用 PSP 标准收入倍数。 所有估计在审计财务披露前均存在重大不确定性（±40%）。
    claimRefs:
      - CI022
      - CI037
