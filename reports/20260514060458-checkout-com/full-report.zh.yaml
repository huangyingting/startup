      - number: '2.3'
        title: 买方与细分市场地图
        blocks:
          - type: paragraph
            body: >
              Checkout.com 的目标买方是大型企业商户中的支付或资金管理高管——通常是支付副总裁、CFO 或 CTO，背后往往有 IT 安全、法务和财务组成的供应商评估团队支持。决策周期长（6–18
              个月），切换成本高（API
              集成、商户测试、监管合规）。主要服务垂直包括电商和市场平台（eBay）、出行和网约车（Uber）、数字订阅和流媒体（Spotify）、社交电商（Pinterest）以及数字服务。按地域看，Checkout.com
              主要部署在欧洲（总部在英国、持有 FCA 牌照），并在北美快速增长（2025 年美国交易量增长 >70%，2025 年加拿大直接收单上线）。亚太、拉美（Sao Paulo 枢纽）、中东和日本是增长相邻区域。63
              家商户组成的「十亿美元俱乐部」位于 Checkout.com 买方金字塔顶端——每家每年通过平台处理 >$1B，较 2024 年的 39
              家增加，既体现商户支出增长，也体现新增企业客户赢单。买方主要决策标准是：接受率（以 Intelligent Acceptance 平均提升 3.8%
              衡量）、平台可用性（99.999%）、本地收单覆盖、欺诈/拒付管理，以及总处理成本。
