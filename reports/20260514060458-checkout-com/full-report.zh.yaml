chapters:
  - number: 1
    title: 公司概况
    sections:
      - number: '1.1'
        title: 身份与商业模式
        blocks:
          - type: paragraph
            body: >
              Checkout.com 由 Guillaume Pousaz 于 2012
              年创立，是一家面向全球企业商户的全栈支付基础设施提供商。公司提供端到端支付服务，覆盖收单、支付网关、发卡、欺诈检测、替代支付方式和付款。核心客户是大型企业商户——截至 2026 年初超过 1,000 家——其中
              63 家商户组成「十亿美元俱乐部」，每家每年通过平台处理超过 $1B。公司的商业化重点是复杂、高交易量商户，这类客户需要在 50+
              国家获得定制化接受率优化、风险管理和本地收单能力。收入来自支付处理费，并越来越多来自 Intelligent Acceptance
              和发卡等增值服务。母公司注册在泽西，该离岸司法辖区没有法定义务披露收入或利润。公司主要通过两家英国子公司运营：Checkout Ltd（持有 FCA 收单牌照）和 Checkout Technology
              Ltd（持有知识产权并承载研发职能）。这种结构让集团在跨司法辖区管理 IP 归属和应税利润分配时更有弹性。
