      - number: '3.2'
        title: 功能与能力对比
        blocks:
          - type: paragraph
            body: >
              在五个主要购买标准——AI 接受率优化、直接收单基础设施、替代支付方式（APM）广度、发卡和开发者体验——上，Checkout.com 在 AI
              接受率和美国直接收单（MALPB）上占据先发位置，但五个维度都面临可信竞争。

              AI 接受率是争议最大的差异化因素。Checkout.com 的 Intelligent Acceptance 产品称，通过使用以 $300B 年交易量训练的模型，把交易路由到最佳收单路径，平均将卡接受率提升
              +3.8 个百分点。Adyen 的「Uplift」和「Optimum Authorisation」产品，以及 Stripe 的「Adaptive Acceptance」，是主要竞争回应——二者都在 2024
              年推出或大幅扩展——正在缩小差距。截至 2026 年初，Checkout.com 的估计领先期为 12–18 个月。APM 覆盖广度上 Adyen 更强（200+ 方式），但 Checkout.com
              近期增长速度更快（2025 年 50+ 方式上的 APM 交易量增长 104%），说明 Checkout.com 正在 APAC 和 MENA 加深集成，而不只是增加广度。

              直接收单基础设施是更难复制的护城河。Adyen 用 18 年搭建直接收单网络。Checkout.com 借 Georgia MALPB 牌照（2026 年 1
              月获批）加速，移除了美国卡结算中的银行赞助中介——这是 Stripe 或 Braintree 尚未复制的结构性优势。开发者体验仍是 Stripe 最持久的竞争护城河；Checkout.com 的 SDK
              广度（覆盖 iOS、Android 和 Web 的 50+ SDK，包括 Frames 卡组件）具备竞争力，但不及 Stripe 的文档深度和开发者社区参与度。
