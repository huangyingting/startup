  - number: 5
    title: 产品与技术
    sections:
      - number: '5.1'
        title: 产品定义与模块地图
        blocks:
          - type: paragraph
            body: >
              Checkout.com 面向企业商户提供支付基础设施，是一个横向整合的平台，覆盖七个核心产品模块；所有模块都放在同一套商业关系和统一 API 合同之下。商户只需接入一次——通过 RESTful API、托管式
              Frames SDK，或预置平台连接器——就能获得覆盖 150+ 币种、50+ 国家 / 地区的无卡收单、Intelligent Acceptance AI、发卡、Fraud Detection
              Pro、Payouts、Flow（托管结账 UI），以及一套编排好的 50+ 替代支付方式网络，包括 Apple Pay、Google Pay、Klarna、Pix、FedNow 和 SEPA Instant。

              面向客户的流程从商户买家发起结账开始：Checkout.com Unified API 接收支付请求，Intelligent Acceptance
              路由选择最优网络路径，经由直接收单核心提交授权，拿到发卡行决策，并在数百毫秒内把结果返回给商户。增值服务——Fraud Detection Pro 评分、网络令牌展示、3D Secure
              挑战编排——都内嵌在同一笔 API 交易里。Payouts 和发卡运行在共用 API 表面上，并由同一个商户控制台管理。

              商业化上，所有模块按交易计费，或作为企业增购项纳入定制多年合同谈判。公司没有公开标价，也没有自助服务层级。1,000+ 企业商户基础和 63 家 Billion Dollar Club 商户（每家年处理量
              $1B+）构成完整产品栈的可触达客户池。2025 年 APM 交易量同比增长 104%，发卡业务在 2025 年 Q4 达到 $5B 年化运行率，说明核心收单之外的增值模块已经成功完成商业扩张。
