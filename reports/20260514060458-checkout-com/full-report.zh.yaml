      - number: '1.4'
        title: 财务表现与规模
        blocks:
          - type: paragraph
            body: >
              Checkout.com 2025 年在所有关键经营指标上交出强劲业绩。全年总支付量超过 $300B，同比增长 64%，确认 Checkout.com 跻身全球最大独立支付处理商之列。公司每天处理超过 $1B
              支付量。2025 年净收入增长超过 30%，这是继 2024 年 40% 增长后连续第二年增长 30%+。Checkout.com 首次实现全年调整后 EBITDA 盈利，调整后 EBITDA 利润率超过
              10%。美国交易量 2024 年增长超过 80%，2025 年随公司扩展北美商业基础设施继续强劲增长。替代支付方式交易量 2025 年增长 104%，支持 50+ 支付方式。平台 2025 年全年保持
              99.999% 可用性。2025 年 Black Friday 和 Cyber Monday 期间，Checkout.com 处理 $5.2B、约 1 亿笔交易，95% 在 1 秒内完成。Intelligent
              Acceptance 产品每天执行 87M 次优化，自 2023 年 6 月上线以来已为客户带来 $15B+ 额外商户收入。63 家「十亿美元俱乐部」商户意味着顶级企业交易量存在显著集中。
