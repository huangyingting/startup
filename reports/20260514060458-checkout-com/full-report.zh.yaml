      - number: '5.2'
        title: 架构与运营模型
        blocks:
          - type: paragraph
            body: >
              Checkout.com 的平台是云原生架构，并在 2025 年 10 月宣布的多年战略合作下完全运行在 Microsoft Azure 上；部署横跨多个全球 Azure 区域，以支撑 50+ 国家 /
              地区的收单覆盖、灾备和多区域故障切换。公司目标服务可用性为 99.999%；status.checkout.com 的公开状态页提供实时组件健康状况和历史事故数据。

              技术栈分为五层。最上层是 Merchant API 和 SDK 层，为所有支付产品提供单一 RESTful 入口；Python、Node.js、.NET、Java、Go、iOS（Frames）和
              Android（Frames）的生产级 SDK 由 github.com/checkout 组织以开源仓库维护。其下，Intelligent Acceptance Engine 每天做出 87M 次 ML
              决策，覆盖智能重试、网络令牌优化和 3DS 挑战智能。Direct Acquiring Core 位于授权和清算层，在英国持有 FCA 牌照，在美国通过 Georgia MALPB 牌照运营，并直接拥有
              Visa、Mastercard 和 Amex 网络会员资格。增值服务（Fraud Detection Pro、Flow、Payouts、Network Tokens、Card Issuing）共用同一 Azure
              后端。APM Orchestration Layer 通过托管跳转和静默跳转流程路由到 50+ 第三方支付方式。

              平台峰值负载已经在 2025 年 Black Friday 和 Cyber Monday 得到验证：24 小时内处理 $5.2B、约 100M
              笔交易，且未报告宕机，证明基础设施具备扩展能力。Checkout.com 是 2024 年首家上线 Google Pay Secure Payment Authentication（SPA）的 PSP，验证了其与
              Tier-1 技术伙伴深度集成的能力。Frames SDK（iOS 和 Android）提供预置、符合 PCI 的银行卡输入组件，让商户在不扩大自身 PCI 范围的情况下接受移动支付。
