            开发者门户；api-reference.checkout.com
        - id: intelligent-acceptance
          label: Intelligent Acceptance 引擎
          detail: |
            每日 87M 次优化决策；ML 路由；智能重试逻辑；网络令牌优化器；3DS 挑战智能；平均 +3.8 pp 接受率提升；智能体商务层（2026 路线图）
        - id: value-added-services
          label: 增值服务层
          detail: >
