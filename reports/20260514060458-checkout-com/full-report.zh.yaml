  - number: 2
    title: 市场分析
    sections:
      - number: '2.1'
        title: 市场边界与分类
        blocks:
          - type: paragraph
            body: >
              Checkout.com 的核心市场是企业支付处理——为大型商业商户端到端处理线上无卡交易和线下有卡交易。市场包括支付收单（接受卡交易并路由至卡组织）、支付网关软件（基于 API
              的交易路由和令牌化）、欺诈检测和风险管理、替代支付方式（APM）受理（钱包、BNPL、实时支付）、B2B
              场景发卡，以及付款。该市场明确排除消费者银行存款、按揭贷款、保险和投资产品。相邻市场——Checkout.com 正在进入的方向——包括数字货币结算（通过收购 Blue EMI）和美国受监管银行业务（通过
              Georgia MALPB 牌照）。现状替代方案包括企业自建的银行收单关系（Chase
              Paymentech、Barclays、Lloyds）、传统支付服务提供商（Worldpay/FIS、Adyen、Stripe），以及超大型商户自建的专有支付基础设施（Amazon Pay、Meta
              Pay）。关键市场区分是企业 vs. SMB：Checkout.com 盯住年收入大约超过 $100M、需要定制集成、50+ 国家本地收单和专属技术支持的商户——相较面向 SMB
              的玩家（Stripe、Square、PayPal），这是更窄但价值更高的细分市场。
