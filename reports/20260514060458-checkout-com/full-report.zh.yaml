    columns:
      - 缺失指标
      - 对尽调的影响
      - 尽调路径
      - 紧迫性
    rows:
      - - 经审计集团收入和损益表（P&L）
        - 没有该项，无法确定收入规模、质量或增长；所有估值估算都只能停留在数量级
        - 在 NDA 下向管理层索取经审计合并账目；Companies House 子公司文件只能部分替代
        - 阻断
      - - 主责方 vs. 代理方收入拆分
        - 不知道各市场主责处理 vs. 代理处理拆分，就无法计算毛利率和 take rate
        - 在 NDA 下要求管理层信息包按收入流和市场拆分收入
        - 阻断
      - - 现金状况和烧钱速度
        - 没有资产负债表和现金流数据，无法评估现金跑道或偿付风险
        - 在 NDA 下向管理层索取 3 年经审计现金流量表和当月现金余额
        - 阻断
      - - 债务和信贷义务
        - 隐性杠杆或契约限制可能实质影响股权价值和退出时点
        - 要求完整债务明细；在 Companies House 检查子公司实体 08606477 和 09526965 的登记押记
        - 阻断
      - - CAC 和企业回本周期
        - 没有单位经济，无法评估 GTM 的可持续性或可扩展性；企业销售成本对增长建模影响重大
        - 在 NDA 下索取队列级 CAC、平均销售周期，以及按商户层级拆分的 LTV
        - 重大
      - - MALPB 持有监管资本
        - Georgia 银行牌照资本义务会减少可用自由现金；规模未知，并影响自由现金流和资本配置
        - 获取 Georgia Department of Banking and Finance 牌照条件和银行子公司资产负债表
        - 重大
    notes: >
      紧迫性评级：阻断意味着不解决就无法完成投资承销；重大意味着会影响判断，但在明确保留意见下可继续尽调。所有项目都需要在签署 NDA 后直接接触 Checkout.com 管理层。Checkout Ltd（08606477）和
      Checkout Technology Ltd（09526965）的 Companies House 文件只提供部分英国实体数据，不能替代集团合并财务。在取得经审计账目之前，其他表中的估算收入数字都有重大不确定性。
    claimRefs:
      - CI021
      - CI026
      - CI036
