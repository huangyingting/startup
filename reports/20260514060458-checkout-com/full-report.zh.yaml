  - id: FV001
    title: 投资建议逻辑
    slug: recommendation-logic
    type: flow
    summary: |
      决策树流程展示 Checkout.com 的市场位置、财务表现、竞争护城河和风险 / 估值评估如何合起来，形成低于 $15B 入场纪律下的有条件买入建议。每个节点都是一道可设门槛的投资论证检查；只有四项检查全部通过，结论才成立。
    data:
      nodes:
        - id: thesis-check
          label: 投资论证检查
          note: Checkout.com 是否切中一个可防守的大 TAM 问题？企业支付处理；全球 TAM 超 $3.7T；直接收单渗透率 <10%
        - id: financial-check
          label: 财务健康检查
          note: 净收入增长 >30%；经调整 EBITDA 利润率 >10%；TPV 超 $300B、同比 +64% — 首次全年盈利里程碑已确认
        - id: competitive-check
          label: 竞争地位检查
          note: 2026 年 Q1 Forrester Wave Leader；Intelligent Acceptance AI 护城河；MALPB 直接收单优势；63 家 BDC 企业商户
        - id: risk-check
          label: 风险与估值检查
          note: 二级市场估值 $12B；较 $40B 峰值下跌 70%；P/TPV 4.0%，与 Adyen 同业水平一致；关键人和治理风险在入场框架内可控
        - id: verdict
          label: 结论：有条件买入
          note: 基本面强；估值正常化带来低于 $15B 的入场机会；必须先满足阻断性数据室问题（账目、NRR、股权结构表）和治理条件
      edges:
        - from: thesis-check
          to: financial-check
          label: 论证成立 — TAM 大、位置可防守
        - from: financial-check
          to: competitive-check
          label: 财务健康 — 增长和盈利已确认
        - from: competitive-check
          to: risk-check
          label: 竞争护城河确认 — Forrester Leader、直接收单
        - from: risk-check
          to: verdict
          label: 风险在入场纪律内可控 — 有条件买入
    claimRefs:
      - CV001
      - CV005
      - CV007
      - CV017
      - CV030
      - CV040
