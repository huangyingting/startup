  - id: FV004
    title: 投资 KPI
    slug: investment-kpis
    type: kpi
    summary: |
      面向投委会的 Checkout.com KPI 记分卡，覆盖总支付量、净收入增长、经调整 EBITDA 利润率、当前隐含估值、发卡 ARR 和美国地区交易量增长。这六项指标是跟踪投资论证相对基础情景模型推进情况的核心指标。
    data:
      items:
        - id: tpv
          label: 2025 年总支付量
          value: $300B+
          note: 同比 +64%；63 家 Billion Dollar Club 企业商户；BFCM 2025 单日峰值 $5.2B
        - id: revenue-growth
          label: 2025 年净收入增长
          value: '>30% YoY'
          note: 净收入连续第二年增长 >30%；绝对收入未披露；估算 $520–600M
        - id: ebitda
          label: 2025 年经调整 EBITDA 利润率
          value: '>10%'
          note: 首次全年盈利里程碑；按 $520–600M 净收入估算，经调整 EBITDA 为 $52–60M
        - id: valuation
          label: 隐含估值（2025 年 9 月）
          value: ~$12B
          note: 员工股票回购参考价；较 2022 年 1 月 $40B 峰值下跌 70%；二级市场代理值
        - id: issuing-arr
          label: 发卡 ARR（2025 年 Q4）
          value: $5B
          note: 年化运行率；Visa 合作；新产品线对收入尚不重大，但轨迹强劲
        - id: us-growth
          label: 2025 年美国交易量增长
          value: ~70% YoY
          note: 增长最快的地区；MALPB 特许状使 2026 年 1 月起可在美国直接收单
