      - number: '7.4'
        title: 缓释措施与否决条件
        blocks:
          - type: paragraph
            body: >
              Checkout.com 的直接收单模型本身就是主要结构性风险缓释：公司拥有收单基础设施，而不是依赖赞助银行，已经消除了早期 PSP 商业模式中最大的单点故障。MALPB
              牌照获批把这种韧性复制到美国市场，去掉了美国直接收单对 Georgia 赞助银行关系的依赖。Merchant Risk Council 合作把 Checkout.com
              与欺诈和拒付风险管理社区的互动正式化，让公司在新兴欺诈向量影响授权通过率之前就获得可见性。多年 Microsoft Azure 协议提供合同 SLA 保护和成本可预测性，但并未解决多云集中度风险。

              与这些缓释相对，若干风险仍处理不足。Jersey 母公司结构带来的不透明是结构性的；除非迁册或自愿披露，否则无法缓释。Checkout.com 需要发布经审计的合并账目，才能解决投资者和监管者关切。Pousaz
              的关键人依赖需要正式继任计划和独立董事任命，才能达到投资级治理标准。Azure 单云架构需要书面多云策略和 RTO/RPO 披露，才能匹配企业商户在 $5B+/天处理规模下的 SLA
              承诺。本投资的否决条件包括：FCA 提起执法行动；MALPB 牌照被实质性限制或吊销；Pousaz 未指定继任者即离任；任一年度业绩周期 BDC 数量跌破 60；BFCM 高峰期 Azure 宕机超过 4
              小时；或确认 ShinyHunters 涉及银行卡数据泄露并触发 ICO 执法。任一事件发生，都需要立即重估投资论证和估值基础。
