              层级交易可信度上造成结构性劣势。Reuters 和多家财经媒体报道了这一下降；在没有收入披露来校准估值倍数的情况下，Checkout.com 无法反驳不利比较。任何投资或收购讨论，都必须把这一信号与 CityAM
