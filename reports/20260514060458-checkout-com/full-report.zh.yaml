  - id: FI001
    title: 收入模型桥
    type: flow
    layout: standard
    summary: |
      企业商户支付活动如何经由收单、增值服务和交换费净额处理，转化为 Checkout.com 估计净收入基础。
    data:
      nodes:
        - id: enterprise-merchant
          label: 企业商户（1,000+ 账户）
          note: 63 家 Billion Dollar Club；每家年处理量 $1B+；仅定制合同
        - id: tpv
          label: $300B+ 总支付量（2025）
          note: 64% YoY 增长；>$1B/日；BFCM 24 小时 $5.2B
        - id: acquiring-fee
          label: 收单费（估计抽成率 ~0.20-0.30%）
          note: 主要收入流；principal / agent 口径拆分未披露
        - id: vas-revenue
          label: 增值服务收入
          note: 增值产品：Intelligent Acceptance、Fraud Detection Pro、Issuing（$5B ARR）、Payouts、FX
        - id: net-revenue
          label: 净收入（估计 $600M-$900M）
          note: '>30% YoY 增长连续第二年；调整后 EBITDA 利润率 >10%'
      edges:
        - from: enterprise-merchant
          to: tpv
          label: 商户提交交易
        - from: tpv
          to: acquiring-fee
          label: 收单收入扣除交换费净额
        - from: tpv
          to: vas-revenue
          label: VAS 使用和附加销售
        - from: acquiring-fee
          to: net-revenue
          label: 收单净贡献
        - from: vas-revenue
          to: net-revenue
          label: VAS 贡献
    approximationNotes: >
      收入数字根据公开披露的交易量（$300B+）和分析师推导的抽成率基准（0.20-0.30%）估计。 不存在已审计或公司确认的收入数字。净收入节点排除交换费转付；交换费是从总额到净额的最大扣减项。 公开来源没有按收入流拆分的
      VAS 收入。
    claimRefs:
      - CI001
      - CI005
  - id: FI002
    title: 单位经济模型桥
    type: flow
    layout: standard
    summary: |
      定性展示总支付量如何经过交换费成本、运营费用和技术投入，转化为 Checkout.com 估计调整后 EBITDA。
    data:
      nodes:
        - id: gross-tpv
          label: 总 TPV（$300B+）
          note: 处理的总交易价值；64% YoY 增长
        - id: interchange-cost
          label: 交换费和网络费（估计为总收入的 60-70%）
          note: 最大成本项；支付给卡组织；把总收入压到净收入
        - id: net-revenue-node
          label: 净收入（估计 $600M-$900M）
          note: 交换费后；约为 TPV 的 0.20-0.30%；>30% YoY 增长
        - id: opex-node
          label: 运营成本（工程、合规、云）
          note: ~2,000 名员工；Microsoft Azure 基础设施；FCA、PCI DSS、GDPR 合规成本
        - id: adj-ebitda-node
          label: 调整后 EBITDA（利润率 >10%，估计 $60M-$90M）
          note: 首个全年盈利年度；不含 SBC 和非经常性项目；金额未披露
      edges:
        - from: gross-tpv
          to: interchange-cost
          label: 扣除交换费转付
        - from: gross-tpv
          to: net-revenue-node
          label: 交换费后留存净收入
        - from: net-revenue-node
          to: opex-node
          label: 分摊运营成本
        - from: net-revenue-node
          to: adj-ebitda-node
          label: 运营成本后剩余
    approximationNotes: >
      所有成本估计都由可比处理商经济模型（Adyen、Stripe 公开披露）和行业基准推导。Checkout.com 未公开披露成本拆分。 调整后 EBITDA 不含股权激励、重组及金融科技调整后指标通常排除的其他潜在非经常性项目。
      从总额到净额的交换费步骤是桥中最大也最不确定的扣减项。
    claimRefs:
      - CI015
      - CI018
  - id: FI003
    title: 财务估计区间
