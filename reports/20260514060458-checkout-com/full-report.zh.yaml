      - number: '2.4'
        title: 增长驱动因素与采用约束
        blocks:
          - type: paragraph
            body: >
              Checkout.com 所在市场的主要增长驱动是结构性的：（1）电商 10–15% 的年复合增长，每年扩大全球企业数字支付的绝对交易量；（2）跨境支付复杂度——多币种、本地 APM、50+
              国家监管要求——让多数企业自建支付基础设施不经济；（3）AI/ML
              驱动的接受率优化在商品化处理费之外创造新的价值层，提高平均客户收入并降低流失；（4）替代支付方式扩散（BNPL、数字钱包、实时支付）要求平台持续投入；（5）美国银行牌照（MALPB，2026 年 1
              月获批）允许直接与卡组织清算，降低成本并提升美国商户结算速度。主要采用约束包括：（1）切换成本高（6–18 个月迁移）；（2）银行牌照合规的资本要求；（3）PCI DSS
              和监管合规复杂度；（4）来自银行整合型支付解决方案的竞争，这类方案可动用资产负债表；（5）基础收单费在欧盟 interchange 监管（0.2–0.3%
              上限）和美国卡组织规则变化下承压；（6）欺诈率上升（MRC 数据显示 2025 年 57% 商户遭遇更严重欺诈）抬高运营成本；（7）大型商户自建专有支付基础设施，压缩市场最顶端的
              TAM。驱动与约束的平衡支持企业细分市场继续保持两位数增长，其中 AI 差异化和直接收单（通过 MALPB）是最可防守的利润率杠杆。
