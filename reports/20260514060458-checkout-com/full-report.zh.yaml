  - number: 4
    title: 财务情况
    sections:
      - number: '4.1'
        title: 收入模型与收入来源
        blocks:
          - type: paragraph
            body: >
              Checkout.com 的收入来自六个主要来源，全部与支付活动规模或增值服务使用挂钩。最大的一项是支付收单费：当 Checkout.com
              作为商户的主收单方或收单网络代理时，按总交易价值（GTV）的一小部分收费。基于 2025 年披露的 $300B+ 总支付量（TPV），并套用分析师共识推导的 0.20–0.30% 综合 take
              rate，毛收单收入很可能落在 $600M–$900M 区间，尽管公司从未披露这一数字。

              第二项是支付网关和处理 API，对授权、令牌化和路由服务按交易或 API 调用收费。第三，增值服务——Intelligent Acceptance、Fraud Detection Pro、Network
              Tokens 和 Flow checkout——作为核心收单之上的独立授权企业产品贡献增量收入。第四，与 Visa 合作开展的 B2B 虚拟和实体卡发卡，在 2025 年 Q4 达到 $5B
              年化运行率。第五，付款（向市场平台卖家、零工经济工作者和跨境收款人拨付资金）形成付款即服务的费用线。第六，跨境交易中的 FX 兑换在 Checkout.com 承担结算与付款之间汇率风险时产生点差收入。

              收入确认遵循主事人-代理人框架：Checkout.com 作为主收单方时，在扣除 interchange
              传导前确认毛收入；只作为网关时，仅确认净网关费。公司不公开主事人与净收入之间的拆分，给毛利率和收入质量分析带来重大不确定性。2025 年 Black Friday 和 Cyber Monday 期间，公司在 24
              小时内处理 $5.2B、约 100M 笔交易，显示峰值处理能力。
