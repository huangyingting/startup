            body: >
              2024 年 4 月 ShinyHunters 针对 Checkout.com 旧版云存储环境的声称，在 ICO 调查结果层面仍未解决。虽然 CTO 确认没有银行卡数据受损，ICO 也没有发布执法通知，但
              GDPR 通知义务会触发一个正式 ICO 审查期，可能持续 12–36 个月。ICO 执法通知——即便针对程序性 GDPR 违规，而非实质性数据泄露——都会被公开列入 ICO 执法数据库，并立即进入 2026
              年及之后评估或续签 Checkout.com 合同的每一家企业商户的采购风险评估。最高罚款为全球年收入的 4%；这一数字未披露，但以公司规模看具有重大性。
