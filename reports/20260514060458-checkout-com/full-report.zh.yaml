      - number: '4.2'
        title: 定价与 GTM 效率
        blocks:
          - type: paragraph
            body: >
              Checkout.com 只采用企业直销模式，没有公开标价，也没有自助或开发者驱动增长漏斗。所有定价都通过多年期定制合同逐单谈判。企业商户配备专属商户成功经理，大型全球企业账户的销售周期通常为 6–18
              个月，原因是集成复杂、监管审批，以及接受率优化参数需要定制配置。公司没有自助渠道或 SMB 层级，这一点区别于 Stripe 的产品驱动增长打法，也使 CAC 天然较高且无法公开估算。

              用 $300B 交易量和估计 $600M–$900M 收入分析综合 take rate，可得有效费率 0.20–0.30%，高于 Adyen 披露的 0.13–0.15%，但与 Checkout.com 通过
              Intelligent Acceptance、发卡和付款服务形成的更高增值服务附着率一致。公司没有披露平均合同价值、单商户毛收入或留存率。63 家「十亿美元俱乐部」商户和 1,000+
              企业账户的总商户基数，意味着每个企业账户 ACV 估计在 $1M–$10M 区间，但这完全来自分析推导。分销是全球直销，没有经销商或渠道合作伙伴项目。与 Visa（发卡）、Microsoft
              Azure（云基础设施）和 SAP（ERP 支付集成）的重点合作，本质是降低商户上线摩擦的技术集成，而不是产生收入的分销渠道。
            claimRefs:
              - CI011
              - CI012
              - CI013
              - CI014
          - type: table
            tableRef: TI002
            claimRefs:
              - CI004
              - CI014
      - number: '4.3'
        title: 成本结构与毛利率驱动
        blocks:
          - type: paragraph
            body: >
              Checkout.com 的成本结构由支付处理成本主导——interchange 费用、卡组织费用（Visa、Mastercard）和本地收单网络成本。这些成本估计占毛收单收入的
              60–70%，反映卡支付处理的经济性：interchange 通常为 GTV 的 1.5–2.5%，由处理商先承担，再与商户净额结算。对于一家按交易量收取 0.20–0.30% 综合 take rate
              的公司，大多数毛 GTV 都作为 interchange 成本穿透，剩下估计 $600M–$900M 净收入；基于可比处理商基准，净收入毛利率估计为 50–60%。

              技术基础设施成本显著低于传统支付处理商，因为 Checkout.com 运行在公有云（Microsoft Azure）上，而不是自有数据中心，消除了自有基础设施 capex。约 1,000 名工程人员（约
              2,000 名总员工的一半）构成最大的固定成本基底，支撑产品开发、Intelligent Acceptance 的 AI 模型训练，以及满足 99.999% 可用性 SLA 的平台可靠性。营运资本和 capex
              动态有利：支付结算会制造时间差，但除 MALPB 银行牌照带来的监管资本义务外，Checkout.com 不承担库存风险或项目融资敞口。

              合规成本——FCA 授权、PCI DSS Level 1、多司法辖区 GDPR，以及现在 MALPB 银行子公司接受 FDIC 监管——是持续且不断增长的运营开支。MALPB
              牌照引入的主要资本强度敞口，是最低监管银行资本；该金额尚未公开披露，在通过直接接触管理层或 Georgia 银行监管机构确认前，必须视为未量化的资产负债表义务。
            claimRefs:
              - CI015
              - CI016
              - CI017
              - CI018
              - CI019
              - CI020
