      - number: '3.3'
        title: 定价与分销动态
        blocks:
          - type: paragraph
            body: >
              Checkout.com 所在竞争层级中的主要支付处理商——包括 Adyen、Stripe、Worldpay、Braintree 或
              JPMorgan——都不公开披露企业定价。所有企业合同都是逐单定制谈判、按交易量分层的安排，把收单费、网关费和增值服务费打包。公开标价（Stripe 的 2.9%+$0.30 和 Braintree/PayPal
              的 2.59%+$0.49）只适用于 SMB 和零售客户，不能代表企业合同。

              根据上市公司披露，Adyen 的综合 take rate 约为交易量的 0.13–0.15%，反映其只服务企业的定位和较低的增值服务附着。Checkout.com 估计 take rate 为
              0.20–0.30%（来自公开披露的 $300B 交易量和估计 $600M–$900M 收入运行率），意味着公司从 AI 接受率增值、APM 费用和发卡产品中提取更高单位价值。Stripe 的有效综合费率更高（约
              0.4–0.5%），原因是 SMB 和中端市场交易量占比更高，但企业专属定价会向 Adyen 和 Checkout.com 收敛。

              GTM 模式差异有实质意义。Checkout.com 使用直销企业销售模式，并配备专属商户成功经理——类似 Adyen。Stripe 使用产品驱动增长漏斗，把开发者采用转化为企业账户。JPMorgan
              把支付服务打包进更广泛的银行关系，降低边际支付价格，但提高对银行关系的依赖。Worldpay 的传统经销商和银行渠道分销是其主要市场进入机制，对追求现代集成栈的 API-first 企业商户吸引力较弱。
