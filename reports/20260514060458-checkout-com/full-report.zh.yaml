      - number: '4.5'
        title: 资本充足性与融资依赖
        blocks:
          - type: paragraph
            body: >
              Checkout.com 累计募集约 $1.8B 风险资本，最近一轮机构融资是 2022 年 1 月以 $40B 估值完成的 $1B Series D——距今已超过三年，之后没有披露新的机构轮。2025 年 9
              月，公司以 $12B 估值参考价开展员工股份回购，资金完全来自经营现金流，而不是外部新资本。这是正面信号：它意味着公司产生的自由现金流足以在不新融资的情况下向员工返还资本，与其声称的 >10% 调整后
              EBITDA 利润率一致。公司没有在任何公开公告中披露回购金额。

              资本充足性仍有重大不确定性。现金头寸和现金消耗率从未公开披露。公司没有公开宣布债务融资、循环信贷额度或资产负债表义务。2026 年 1 月获批的 Georgia MALPB 银行牌照，要求在银行子公司中持有
              Georgia 银行监管机构设定的最低监管资本——该金额尚未得到公司确认，必须被视为未量化但真实存在的资产负债表义务。

              估值轨迹提供了一个次级资本信号：从 2022 年 1 月 $40B 降至 2025 年 9 月约
              $12B，意味着未来任何机构融资轮都会相对峰值估值大幅折价。三年没有机构资本进入，要么说明公司有意自给自足，要么说明其与潜在领投方在估值上存在分歧——两种解释都与公开证据相容。公开来源没有任何债务权益比、利息覆盖或杠杆指标。完整资本结构尽调需要在签署
              NDA 后获取经审计财务和管理层直接展示。
