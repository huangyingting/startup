      - number: '2.2'
        title: 市场规模——多重视角
        blocks:
          - type: paragraph
            body: >
              没有单一权威市场规模研究能以 Checkout.com 产品组合相同的范围覆盖企业级支付处理。必须用多重视角。视角 1（按交易量）：全球电商交易量 2024–2025 年估计每年 $5–7T。企业处理商赚取交易量
              0.10–0.30% 的 take rate；套用到全球数字商务的企业细分市场，可得到每年 $10–25B（保守）到 $50B+（计入增值服务）的处理商收入池。视角 2（上市公司对比）：Adyen（上市，约
              $2B 收入，约 €1.35T 交易量上的 take rate 约 0.15%）和 Stripe（私营，估计在约 $1T 交易量上产生约 $5B 收入）可作为市场校准点。Checkout.com 的 $300B
              交易量若按隐含 0.20–0.30% take rate 估算，意味着 $600M–$900M 毛收入，与 30%+ 增长画像一致。视角 3（更宽市场报告）：多份分析师报告估计，全球支付网关/处理市场到 2028
              年为 $75–130B（包含 SMB），但 Checkout.com
              可触达的企业子细分市场要小得多。规模测算缺口很大：没有公开收入确认，没有披露毛利率，私营公司状态也阻止了对单一数字的三角验证。所有估计都有重大不确定性，只应作为数量级指引。
