      - number: '1.5'
        title: 里程碑与战略演进
        blocks:
          - type: paragraph
            body: >
              Checkout.com 在 14 年历史中持续推进有纪律的战略扩张，从网关提供商演进为全栈全球支付基础设施平台。近期关键里程碑包括：2025 年 2 月开设旧金山工程中心，2025 年 7
              月在加拿大推出直接收单，2025 年 10 月 Georgia Department of Banking and Finance 受理 MALPB 银行牌照申请，并于 2026 年 1 月 12 日正式批准，使
              Checkout.com 成为少数持有美国银行牌照、可与卡组织直接清算的支付处理商之一。2026 年 1 月收购 Blue EMI——一家在立陶宛持牌的欧元稳定币发行方——表明公司有意扩展到数字货币结算。2026
              年 3 月，通过 Open Payment Framework 集成 SAP Commerce Cloud，扩大了公司的企业 ERP 触达。Checkout.com 被评为 Forrester Wave:
              Global Merchant Payment Processors Q1 2026 领导者，并在 Merchant Experience 标准中得分最高。公司与 eBay（2025 年 4
              月）、Uber（2025 年 10 月）、Spotify（2026 年 2 月）建立全球支付合作，并签署多年 Microsoft Azure
              基础设施协议。这些里程碑共同反映出公司正从不惜代价增长，转向有纪律、可盈利的全球规模化。
