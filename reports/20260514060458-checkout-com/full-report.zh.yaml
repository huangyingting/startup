        title: 图表与证据
        blocks:
          - type: callout
            title: 财务不透明是首要投资尽调阻碍
            body: >
              Checkout.com
              的泽西控股公司结构在法律上避免了任何强制公开财务披露，使外部仅凭公开来源无法核验收入、利润率、现金头寸、债务义务或资本充足性。本章每一个财务指标要么是公司声称，要么是估计，要么未知。如果不在 NDA
              下取得经审计合并财务，而只凭披露的运营指标（$300B TPV、>30% 净收入增长、>10% 调整后
              EBITDA）做投资决策，就是信息不足下的投资判断。这不是监管漏洞，而是公司有意选择注册地和披露策略后的预期结果。
