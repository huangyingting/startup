  - number: 7
    title: 风险
    sections:
      - number: '7.1'
        title: 监管、法律与合规风险
        blocks:
          - type: paragraph
            body: >
              Checkout.com 通过复杂的多司法辖区结构运营，监管风险会相互叠加。母公司 Checkout Group Ltd 注册在 Jersey；Jersey 是英国王室属地，不强制披露合并 P&L，集团层面也不在
              EU 或 UK FCA 的直接监管边界内。监管者和投资者评估资本充足率与集团层面风险暴露时，会因此面对不透明。两家主要英国运营子公司 Checkout Ltd 和 Checkout Technology Ltd
              持有 Payment Services Regulations 2017 下有效的 FCA 支付机构牌照。历史上，FCA 对支付行业的执法有限，但 Wirecard 倒闭后，FCA
              已释放出加强审查大型非银行支付机构的信号；即便不吊销牌照，任何正式调查都会对企业销售和投资者信心构成重大风险。

              2026 年 1 月，Georgia Department of Banking and Finance 批准 MALPB（Merchant Acquirer Limited Purpose
              Bank）牌照，这在战略上是利好，但也引入新的美国联邦和州监管义务。作为持牌银行实体，Checkout.com 需要按照 FinCEN 指引满足更高的 BSA/AML
              项目要求，并在向消费者相邻支付服务扩张时可能受到 CFPB 监督。自 2023 年以来，CFPB 对大型非银行支付处理商的审查日益加强；MALPB 牌照可能把 Checkout.com 纳入更宽的 CFPB
              监管权限。即使 MALPB 牌照已经到位，公司仍需要在约 30 个州持有州级汇款牌照；MALPB 能降低但不能消除维护州级货币服务业务注册的负担。PSD2/PSD3 合规在 EU/EEA 市场持续推进；PSD3
              立法流程预计在 2026–27 年结束，Checkout.com 需要相应调整开放银行、身份验证和责任框架。2024 年 4 月 ShinyHunters 事故带来的 GDPR/UK GDPR
              风险仍未完全消退：公司已通知 ICO，但公开信息中没有确认的执法行动；一旦确认数据泄露，罚款最高可达全球年收入的 4%，而 Checkout.com 并不披露这一数字，因此金额具有重大性。
