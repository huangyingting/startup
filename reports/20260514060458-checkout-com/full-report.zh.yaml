              欧盟 interchange 费用监管（消费者借记卡 0.2%、消费者信用卡 0.3%
              上限）和美国持续监管审查压缩基础收单费经济性。这一结构性逆风意味着处理量增长不会线性转化为收入或利润率提升。Checkout.com 的增值服务（Intelligent
              Acceptance、欺诈检测、发卡）是主要利润率防线——但这些也是竞争最激烈的战场，Adyen、Stripe 和银行处理商都在投入类似能力。
