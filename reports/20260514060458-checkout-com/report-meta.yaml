companyProfile:
  summary: >
    Checkout.com was founded in 2012 in London by Guillaume Pousaz (a Swiss-French entrepreneur
    previously at Visa and PayPal) with the thesis that global enterprises were underserved by
    incumbent payment processors on acceptance rates, speed, and transparency. The company built a
    cloud-native, direct-acquiring payment platform that bypasses legacy middleware, enabling
    enterprise merchants to achieve higher authorisation rates and lower costs. After bootstrapped
    early growth, Checkout.com raised $1.8B across multiple rounds culminating in a January 2022
    Series D at a $40B peak valuation (Altimeter, Dragoneer, Franklin Templeton, GIC, Insight
    Partners, QIA, Tiger Global). Fintech multiple compression drove a secondary repricing to
    ~$12B by September 2025, but the company achieved its first full-year adjusted EBITDA
    profitability in 2025 with $300B+ TPV (+64% YoY) and net revenue growing >30%. In January
    2026, Checkout.com received approval for a Georgia MALPB bank charter, enabling US direct
    acquiring without bank intermediaries — a significant competitive milestone. The company
    acquired Blue EMI (Lithuania digital currency platform) in January 2026. It was named a Leader
    in the Forrester Wave: Payment Processing Platforms, Q1 2026.
  foundedDate: "2012-01-01"
  founders:
    - name: Guillaume Pousaz
      role: Founder & CEO
      background: >
        Swiss-French entrepreneur; previously at Visa (global payments) and an early-stage payments
        startup. Relocated to Monaco in April 2025; retains 100% voting control of Checkout Group
        Ltd (Jersey parent).
      claimRefs: [CO001, CO005]
  foundingLocation: London, UK
  headquarters: London, UK
  productSummary: >
    Checkout.com sells a unified enterprise payment platform comprising: (1) direct card acquiring
    (Visa/Mastercard/Amex) with FCA licence in the UK and MALPB bank charter in the US; (2)
    Intelligent Acceptance — AI/ML routing and optimisation delivering avg +3.8% acceptance lift
    across 87M daily decisions; (3) Flow — hosted checkout conversion product; (4) Card Issuing
    (Visa partnership, UK/EEA GA, $5B ARR); (5) Fraud Detection Pro; (6) Payouts; and (7) 50+
    alternative payment methods covering digital wallets, BNPL, and real-time payments.
  customerFocus: >
    Enterprise and scale-up merchants in digital commerce, FinTech/crypto, travel, streaming/SaaS,
    and marketplace verticals — typically processing >$100M/year in payment volume. Key named
    clients include Wise, Spotify, eBay, Shein, Coinbase, PizzaHut, Virgin, and Samsung.
  businessModel: >
    Blended basis-point take rate on total payment volume (estimated 0.10–0.20% net), plus
    value-added service fees for Intelligent Acceptance, Fraud Detection Pro, Card Issuing, and
    Flow. Revenue grows with merchant TPV and product penetration depth.
  stage: Private (Series D, last institutional round Jan 2022)
  fundingStatus: >
    ~$1.8B total raised; most recent institutional round: $1B Series D (January 2022) at $40B
    valuation (Altimeter Capital, Dragoneer Investment Group, Franklin Templeton, GIC, Insight
    Partners, Qatar Investment Authority, Tiger Global Management). No new institutional capital
    since January 2022. September 2025 secondary employee share buyback implied ~$12B valuation.
  disclosureProfile: private-undisclosed
  claimRefs: [CO001, CO002, CO005, CI001, CI002]

summary:
  headline: >
    Checkout.com is a technically differentiated, direct-acquiring enterprise payment platform with
    first-ever full-year profitability in 2025 and accelerating TPV growth, but the $12B valuation
    — a 70% discount from its 2022 peak — reflects genuine opacity risks from Jersey holding
    structure, key-person concentration, and the absence of new institutional capital for 3+ years.
  overallScore: 7.0
  recommendation: buy
  confidence: medium
  riskRating: medium
  valuationStance: attractive
  keyMetrics:
    valuationUsdM: 12000
    revenueRunRateUsdM: 560
    arrUsdM: null
    revenueGrowthYoYPct: 30
    grossMarginPct: null
    nrrPct: null
    totalRaisedUsdM: 1800
    customerCount: 1000
    headcount: 2000
  topStrengths:
    - "Direct acquiring moat: FCA (UK) licence and MALPB bank charter (US, approved Jan 2026) give Checkout.com network-member economics and lower interchange cost floors vs. aggregator/reseller competitors."
    - "Intelligent Acceptance AI flywheel: 87M daily optimisation decisions and $15B+ in additional merchant revenue delivered since June 2023 creates a compounding data moat that is difficult for pure software competitors to replicate."
    - "First full-year EBITDA profitability (2025): Achieved >10% adjusted EBITDA margin in 2025 — the first full year — demonstrating that the unit economics of direct acquiring are viable at scale, counter to bearish 2022–2023 narrative."
    - "Accelerating enterprise expansion: 63 Billion Dollar Club merchants (up 62% from 39) and 64% TPV growth confirm Checkout.com is winning enterprise mandates despite being priced at a 70% valuation discount to its 2022 peak."
    - "Forrester Wave Leader (Q1 2026): Independent analyst validation consolidates enterprise sales cycles and de-risks the competitive position against Adyen and Stripe."
  topRisks:
    - "Jersey holding structure opacity: Checkout Group Ltd (Jersey parent) has no mandatory consolidated P&L disclosure obligation; investors rely entirely on voluntary management commentary for revenue and margin visibility."
    - "Key-person concentration — Guillaume Pousaz: Founder holds 100% voting control, Monaco residence since April 2025, and is the primary investor relationship manager. An exit or health event has no disclosed succession plan."
    - "No new institutional capital since January 2022 (3+ years): While self-funded profitability is positive, the absence of a follow-on institutional round limits governance discipline and delays any IPO timeline."
    - "Valuation mean-reversion risk: At ~$12B, Checkout.com trades at a ~30% discount to Adyen on P/TPV despite similar growth; any deterioration in enterprise win rates or US MALPB ramp-up delay could push secondary valuations lower."
    - "ShinyHunters breach precedent: The 2024 legacy cloud storage incident — while no card data was exposed — introduces ICO regulatory scrutiny risk and potential enterprise merchant contract review clauses."
  unresolvedGaps:
    - "No audited consolidated P&L; Jersey registration means no mandatory annual accounts disclosure. Net revenue and EBITDA margin figures are management-stated and unverifiable without a third-party audit."
    - "US MALPB ramp-up timeline and volumes not disclosed; the $70% US growth figure could reflect a low base; direct US acquiring contribution to total TPV and revenue is unknown."
    - "Card Issuing unit economics: the $5B ARR figure is for annualised run-rate TPV through the issuing infrastructure, not issuing revenue; margin and take rate for the issuing product line are undisclosed."
    - "Employee equity underwater exposure post-$40B → $12B repricing; risk of talent attrition among option-heavy employees hired at 2021–2022 strike prices."
    - "IPO timing: no formal S-1 or prospectus filing as of May 2026; absence of public market path increases liquidity risk for late-stage investors and makes exit valuation harder to stress-test."

