  - id: financial-scenarios-and-valuation
    title: Financial Scenarios and Valuation
    body: >
      Checkout.com's financial scenario analysis is anchored by three verifiable inputs:
      $300B+ total payment volume in 2025 (up 64% YoY per BusinessWire announcement February
      2026), net revenue growth exceeding 30% year-on-year for the second consecutive year,
      and the first full-year adjusted EBITDA profit margin above 10%. These metrics derive
      from company press releases and have not been independently audited; the absence of
      consolidated group accounts from the Jersey parent remains a blocking diligence gap
      for any committed capital.

      At the $12B secondary implied valuation (September 2025 employee buyback), the implied
      revenue multiple is approximately 8x the estimated FY2025 net revenue of $520–600M
      (derived from >30% growth on an estimated $400M 2024 base). This multiple is consistent
      with Adyen's public trading multiple and represents a normalisation from the 40–60x
      revenue multiple implied at the $40B January 2022 peak — when fintech multiples globally
      were at all-time highs and Checkout.com had not yet demonstrated sustained profitability.
      The current valuation therefore reflects a fundamental re-rating that has reset
      expectations to operationally supportable levels.

      The bull case (3-year horizon, probability 20–30%) requires US MALPB volume to accelerate
      past 100% growth through 2026–27, card issuing ARR to scale from $5B to $15–20B, and a
      successful IPO or strategic acquisition at 10x forward revenue — implying an enterprise
      value of $25–35B. The base case (probability 40–50%) assumes continuation of current
      trajectory: 25–35% revenue growth, 12–15% EBITDA margin, TPV reaching $400B+ by 2027,
      and a late-stage PE or continuation round at $16–22B. The bear case (probability 20–30%)
      sees US MALPB underperform, Adyen and Stripe take enterprise share, revenue growth
      decelerate to below 15%, and a secondary repricing to $4–9B driven by further
      institutional mark-downs or a governor trigger event (FCA action, Pousaz departure,
      or Azure outage).

      The valuation sensitivity is principally driven by the US direct acquiring ramp: every
      10% acceleration in US TPV growth adds approximately $1–2B to the 3-year exit value in
      the base case. Card issuing runway is the second-highest swing factor, as a $20B ARR
      issuing business would justify a meaningfully higher multiple than the current
      acquiring-dominant revenue mix. The EBITDA margin path matters less in absolute terms
      at the current scale — the market will value this business on a revenue or TPV multiple
      until it demonstrates $500M+ EBITDA — but crossing 15% adj. EBITDA margin would
      significantly de-risk a 2027 IPO narrative.
