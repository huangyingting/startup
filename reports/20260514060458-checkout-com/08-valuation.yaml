      Decision-tree flow showing how Checkout.com's market position, financial performance,
      competitive moat, and risk/valuation assessment combine to produce the conditional buy
      recommendation with entry discipline at sub-$15B. Each node represents a gateable
      investment thesis check; the verdict is conditional on all four checks clearing.
