chapter:
  number: 8
  title: Valuation
  summary: >
    Checkout.com enters the valuation chapter as a fundamentally strong business trading at a
    significant discount to its January 2022 peak: $300B+ TPV growing at 64% year-on-year,
    first full-year adjusted EBITDA profitability, Forrester Wave Leader designation, and a
    MALPB bank charter that unlocks US direct acquiring represent a compelling investment
    thesis at the current $12B secondary implied valuation. However, the 70% valuation decline
    from peak, the absence of new institutional capital since 2022, Guillaume Pousaz's 100%
    founder control without succession planning, and structural opacity from Jersey
    incorporation create a medium-high risk profile that warrants conditional — not
    unconditional — investment, with entry discipline capped at sub-$15B and specific
    data room requirements before commitment.

sections:
  - id: investment-recommendation-and-thesis
    title: Investment Recommendation and Thesis
    body: >
      Checkout.com's investment case rests on four interlocking pillars: exceptional payment
      volume scale ($300B+ TPV at 64% YoY growth), a proven path to profitability (first
      full-year adjusted EBITDA positive in 2025), a defensible competitive moat anchored by
      Forrester Wave Leader status and Intelligent Acceptance AI, and a transformational US
      direct-acquiring opportunity via the January 2026 MALPB bank charter. These pillars, taken
      together, support a conditional buy recommendation at current secondary implied valuations
      of approximately $12B — a level that represents 4.0% of total payment volume, roughly
      in line with Adyen (3.5% P/TPV) and meaningfully below the 2022 peak of 15% P/TPV.

      The investment anti-thesis is also robust and must be confronted directly. The $40B to
      $12B valuation decline (70%) occurred without new institutional price discovery since
      January 2022; the last institutional mark is now over four years old. All financial
      metrics are unaudited press-release figures from a Jersey-registered parent with no
      mandatory consolidated disclosure. Guillaume Pousaz's 100% founder control without an
      independent board or succession plan creates a governance concentration that is
      structurally unusual for a $12B payment processor. The card issuing product ($5B ARR
      annualised run rate in Q4 2025) is promising but unproven at scale. The MALPB charter
      is operationally positive but its conditions have not been disclosed. These risks are
      manageable within a disciplined entry framework: sub-$15B valuation, pre-investment data
      room including consolidated accounts and NRR disclosure, independent director appointment
      as a closing condition, and explicit kill triggers with active monitoring protocols.

      The recommendation is conditional buy with medium-high confidence and a medium-high risk
      rating. Valuation stance is attractive at the current $12B mark but fair-to-stretched
      above $15B. Target return of 1.5–3x over 3–5 years is achievable in the base and bull
      cases. Downside in the bear case is 50–70% from current entry — investors with a low
      loss tolerance should track rather than invest until the governance gap is addressed.
