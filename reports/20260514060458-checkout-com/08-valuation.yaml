        - id: financial-check
          label: "Financial Health Check"
          note: "Net revenue growth >30%; adj. EBITDA >10% margin; $300B+ TPV +64% YoY — first full-year profitability milestone confirmed"
        - id: competitive-check
          label: "Competitive Position Check"
          note: "Forrester Wave Leader Q1 2026; Intelligent Acceptance AI moat; MALPB direct-acquiring advantage; 63 BDC enterprise merchants"
