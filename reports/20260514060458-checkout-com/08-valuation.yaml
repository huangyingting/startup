  evidenceGaps:
    - type: private-evidence-only
      severity: blocking
      topic: cap-table-preference-overhang
      missingEvidence: >
        Checkout.com has not publicly disclosed its capitalisation table, liquidation preference
        schedule, anti-dilution provisions, or waterfall analysis for the $1.8 billion across
        four rounds of preferred equity from Altimeter, Dragoneer, Franklin Templeton, GIC,
        Insight Partners, QIA, Tiger Global, and DST Global. The preference structure at the
        $40 billion Series D round is particularly critical — any full-ratchet or
        weighted-average anti-dilution provision would significantly impair common equity
        returns at entry prices below the $40 billion Series D round price.
      whyItMatters: >
        Without the cap table and preference waterfall, the actual investor return profile at
        any exit below $25 billion cannot be modelled; the headline valuation-multiple return
        may substantially overstate the common equity return after preference liquidation; this
        is a blocking diligence item before any capital commitment.
      diligencePath: >
        Request fully diluted capitalisation table, liquidation preference schedule, and
        anti-dilution provision terms for all series from Checkout.com's CFO or legal counsel
        under NDA; engage fund-level legal adviser to review preference terms and model
        waterfall at $12B, $16B, and $22B exit prices.
      relatedQuestionRefs: [QV010, QV027]

    - type: private-evidence-only
      severity: blocking
      topic: consolidated-group-accounts
      missingEvidence: >
        Checkout Group Ltd (Jersey parent) is not required to publish consolidated audited
        financial accounts; all financial metrics cited in this chapter and by Checkout.com
        in press releases are unaudited company-stated figures. No independent audit firm has
        published a review of Checkout.com's group-level revenue, EBITDA, costs, or balance
        sheet. The estimated FY2025 net revenue of $520–600 million is a model construct,
        not a verified figure.
      whyItMatters: >
        The investment thesis depends on validated revenue growth and EBITDA margin; any
        material divergence from the modelled estimates — particularly if net revenue is
        below $450 million or EBITDA margin below 8% — would reprice the investment and
        potentially collapse the base case return model. This gap cannot be closed from
        public sources.
      diligencePath: >
        Request FY2023–FY2025 consolidated group audited accounts under NDA; request
        management accounts for the most recently completed quarter; require a Big Four firm
        to provide agreed-upon procedures report on the key financial metrics.
      relatedQuestionRefs: [QV006]

    - type: missing-source
      severity: material
      topic: comparable-valuation-private-company-data
      missingEvidence: >
        Stripe's valuation data (Series I, 2023) is the only private company comparable for
        which an announcement was made; Nuvei's go-private price and Klarna's secondary
        valuation are reported via press coverage but are not independently verified by
        audited third-party disclosure. The comparable valuation table relies heavily on
        analyst estimates and press reporting for private companies; the public-company
        comparables (Adyen, PayPal) are independently verifiable via exchange filings.
      whyItMatters: >
        The comparable set's reliability varies by company; the private company estimates
        (Stripe $65B, Nuvei $6.5B, Klarna $15B) may embed reporting lag or secondary market
        premium/discount that makes the P/TPV and P/Revenue multiples less reliable than the
        Adyen public anchor; this introduces range uncertainty into the valuation conclusion.
      diligencePath: >
        Cross-reference PitchBook and Crunchbase reported valuations against press sources
        for consistency; commission proprietary secondary market research on Stripe pricing;
        treat Adyen public market data as the primary reliable anchor for the comparable
        analysis.
      relatedQuestionRefs: [QV008]
      relatedTableRefs: [TV004]

    - type: missing-source
      severity: material
      topic: net-revenue-retention-rate
      missingEvidence: >
        Checkout.com does not disclose net revenue retention rate (NRR), gross revenue
        retention rate (GRR), or any per-merchant or per-cohort retention data. The only
        publicly available retention proxy is the BDC count (39 to 63, FY2025), which
        measures net additions of the highest-tier merchants but does not capture organic
        revenue growth or churn within the existing merchant base. NRR could range from
        80% (implying significant underlying churn offset by net new logos) to 130%
        (implying strong land-and-expand dynamics), with materially different implications
        for the bull/base/bear cases.
      whyItMatters: >
        NRR below 100% would fundamentally challenge the revenue growth story even with
        continued TPV growth, because it would indicate that growth is driven by new logo
        additions rather than deepening existing relationships; this would compress the
        steady-state growth rate and reduce the value of the existing merchant base as
        collateral for valuation premium.
      diligencePath: >
        Request NRR and GRR by merchant cohort vintage (2020–2025) and product line in
        data room; require independent merchant reference calls with two to three enterprise
        clients representing $1B+ annual TPV each; compare NRR with Adyen's disclosed
        retention metrics.
      relatedQuestionRefs: [QV015]

    - type: private-evidence-only
      severity: minor
      topic: ipo-governance-readiness
      missingEvidence: >
        No public disclosure of Checkout.com's board composition, independent director
        identities, corporate governance framework, or IPO advisory engagement exists as of
        May 2026. The absence of an independent board and the 100% founder control structure
        are not compatible with NYSE or LSE listing requirements without remediation. The
        timeline and plan for governance remediation are not in the public domain.
      whyItMatters: >
        The bull case depends on an IPO by 2027–2028; without governance remediation
        (at minimum: two independent directors, an audit committee, and a disclosed
        compensation committee), institutional underwriters will not launch an IPO process;
        a 12–18 month governance build-out would push the earliest IPO window to late 2028
        or 2029 even if a decision is made today, directly affecting the bull case return
        multiple.
      diligencePath: >
        Request board composition and planned governance changes from Pousaz directly;
        require formal succession plan and at minimum one independent director appointment
        as a condition of any investment; engage legal counsel to assess LSE Premium/NYSE
        governance gap analysis.
      relatedQuestionRefs: [QV027]
