  topStrengths:
    - >-
      Royal Match is the #2 highest-grossing mobile game globally in 2024, generating $1.46B net IAP revenue —
      extraordinary capital efficiency on $467.5M raised
    - 'Exceptional revenue trajectory: $400M (2022) → $932M (2023) → $1.46B (2024), consistent ~57% YoY growth'
    - All-star founding team of five ex-Peak Games executives with direct match-3 category experience
    - >-
      Royal Kingdom provides a second revenue pillar, already generating $20.5M in soft-launch revenue before global
      launch
    - >-
      Backed by tier-1 investors: Index Ventures, Balderton Capital, Makers Fund, IVP, BlackRock; Edwin Catmull (Pixar)
      as strategic advisor
    - >-
      Strong competitive moat: 12,400+ hand-crafted levels, deep A/B testing infrastructure, significant UA spending
      advantage
  topRisks:
    - 'Single-game revenue concentration: Royal Match accounts for >90% of revenue; Royal Kingdom is unproven at scale'
    - >-
      August 2024 class action lawsuit in Washington state alleging Royal Match virtual currency mechanics violate
      gambling law — could trigger copycat litigation and regulatory scrutiny across jurisdictions
    - >-
      Platform dependency: Apple and Google each take 30% of IAP revenue; policy changes or fee increases would directly
      compress margins
    - >-
      Valuation staleness: last round was January 2022 at $2.75B; mobile gaming sector multiples have compressed
      significantly since 2022
    - >-
      User acquisition cost inflation: UA spend is the primary growth driver and remains opaque; rising CPIs could
      compress LTV/CPI ratios
    - >-
      Key-person risk: CEO Soner Aydemir is the primary public face and product visionary with no disclosed succession
      plan
  unresolvedGaps:
    - >-
      Dream Games has never disclosed audited financial statements, operating margins, or EBITDA — profitability remains
      unverified
    - No clarity on the Washington state class action lawsuit timeline, financial exposure, or settlement negotiations
    - Royal Kingdom's long-term monetization trajectory and revenue ramp post-global launch is not yet established
    - Exit path and timeline are unknown — no IPO plans or M&A discussions disclosed as of May 2026
    - Headcount figures are estimated; actual employee count and burn rate are not publicly disclosed
    - UA spend magnitude and customer acquisition economics (LTV, CPI) are not publicly available
