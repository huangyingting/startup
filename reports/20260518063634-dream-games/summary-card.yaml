summary:
  headline: >-
    Dream Games is a CONDITIONAL BUY — Royal Match is one of the most capital-efficient mobile games ever built, but
    single-game revenue concentration, a stale 2022 valuation, and mounting gambling-regulation risk require heavy
    diligence before committing capital.
