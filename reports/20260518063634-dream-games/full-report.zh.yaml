  - id: FV004
    title: 投资 KPI
    type: kpi
    layout: wide
    summary: 面向投委会的摘要，浓缩 Dream Games 估值和投资决策最关键的八项量化输入。所有收入和利润率数字均为第三方分析师估算；截至 2026 年 5 月，公司未披露经审计财务报表。
    data:
      items:
        - label: 2024 年 IAP 净收入（估算）
          value: $1.46B
          detail: 扣除 30% 平台费；第三方估算，来源为 Sensor Tower 和 MobileGamer.biz；不确定性 ±15%
        - label: 2022–2024 年收入 CAGR
          value: ~91%
          detail: 两年内从 $400M IAP 净收入（2022）增至 $1.46B（2024）；同比增速从 130% 放缓至 57%
        - label: 最近已知估值
          value: $2.75B
          detail: 2022 年 1 月 Series C 轮投后估值；距今 36+ 个月未更新；隐含 2024 年估算 IAP 收入的 1.9×
        - label: 累计融资额
          value: $467.5M
          detail: Series A（$50M，2021 年 2 月）、Series B（$155M，2021 年 6 月）、Series C（$255M，2022 年 1 月）；此后未融资
        - label: 全球收入排名（2024 年 10 月）
          value: '#2'
          detail: Sensor Tower 数据显示，2024 年 10 月全球手游收入第二；仅次于 Candy Crush Saga
        - label: 累计消费者总支出
          value: $3.9B+
          detail: 截至 2025 年初；2024 年跨过 $3B 里程碑——在移动益智品类中，$2B 到 $3B 的速度最快
        - label: 距上一轮融资年数
          value: 3+ years
          detail: 2022 年 1 月后未再股权融资；运营自我造血，提示 EBITDA 生成能力较强（估算利润率 20–35%）
        - label: 有条件买入 EV 区间
          value: $5B–$7B
          detail: 为 2024 年估算 IAP 净收入的 3.4–4.8×；与 King 收购倍数一致；需以尽调确认为前提
    claimRefs:
      - CV001
      - CV002
      - CV003
      - CV004
      - CV006
      - CV007
      - CV008
      - CV009
