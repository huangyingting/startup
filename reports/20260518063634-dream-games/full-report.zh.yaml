      - number: '1.4'
        title: 规模与里程碑
        blocks:
          - type: paragraph
            body: >
              Royal Match 的收入曲线让 Dream Games 跻身 2020 年代财务表现最强的移动游戏公司。2022 年估计 IAP 收入约 $400M，2023 年升至约 $932M，2024 年约为
              $1.46B。这些数据主要来自 Appmagic 和 MobileGamer，代表扣除应用商店 30% 抽成后的发行商分成；消费者总支出明显更高。仅 2024 年 10 月，Royal Match 就创造约
              $177M 消费者支出，并按 SensorTower 数据位列全球收入第二高游戏。累计消费者总收入在 2023 年 11 月突破 $2B，2024 年 4 月突破 $3B，并在 2024 年 10 月约达到
              $3.9B。


              第二款产品 Royal Kingdom 在 2024 年 11 月前的软启动阶段创造 $20.5M 收入，早于 2024 年 11 月 21 日全球上线。这一表现初步证明 Dream Games
              有能力把品牌系列延伸到 Royal Match 之外，不过 Royal Kingdom 在同阶段仍远小于前作。


              关键非财务里程碑包括：Edwin Catmull 于 2023 年 12 月加入担任战略顾问；2024 年 8 月集体诉讼指控 Royal Match 违反华盛顿州赌博法；GamesIndustry.biz 在
              2024 年年度报告中按收入将 Dream Games 列为全球第七大移动游戏开发商。截至 2026 年 5 月，公司没有披露任何 IPO 或 M&A 计划；最近一次已知外部估值 $2.75B 来自 2022 年
              1 月，早于 2023-2024 年收入加速，而这段加速已实质改变基本面估值基础。
