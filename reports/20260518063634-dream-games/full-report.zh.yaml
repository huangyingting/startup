  - id: FO002
    title: 公司快照逻辑
    type: flow
    layout: standard
    summary: Dream Games 把休闲解谜参与度转化为 IAP 收入，靠的是免费游玩循环：新玩家通过付费 UA 进入， 推进数千个关卡，在生命、道具、通行证上付费，并产生持续收入，再反哺 UA 和内容开发。
    data:
      nodes:
        - id: ua
          label: 用户获取（付费 UA）
          detail: 在 Meta、Google、TikTok 和电视上大规模投放广告；UA 支出是最大成本项。
          tone: neutral
        - id: install
          label: 游戏安装（iOS / Android）
          detail: 玩家免费安装 Royal Match 或 Royal Kingdom；没有前置付费。
          tone: neutral
        - id: engagement
          label: 关卡推进与参与度
          detail: 数千个三消关卡拉长参与周期；King Robert 叙事提升留存。
          tone: positive
        - id: iap
          label: 应用内购买（IAP）
          detail: 玩家购买额外生命、道具、金币包和限时通行证；IAP 是唯一收入来源。
          tone: positive
        - id: revenue
          label: 净收入（扣除 30% 商店抽成后）
          detail: Apple App Store 和 Google Play 留下约 30%；Dream Games 留下约 70% 消费者支出。
          tone: neutral
        - id: reinvest
          label: 收入再投入
          detail: 净收入继续投向 UA、内容开发（新关卡、活动）和运营成本。
          tone: neutral
      edges:
