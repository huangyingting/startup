      - number: '1.2'
        title: 创始团队
        blocks:
          - type: paragraph
            body: >
              Dream Games 由五名创始人共同创立，他们在创办自己的工作室前都曾在 Peak Games 建立职业履历。CEO Soner Aydemir 曾任 Peak Games 产品总监，被视为 Dream
              Games 的核心产品愿景负责人。Ikbal Namli 是公司联合创始人，加入前在 Peak 负责工程；Hakan Saglam 也曾在 Peak 担任工程领导岗位。Eren Sengul 曾任 Peak
              产品经理；Serdar Yilmaz 曾是 Peak 3D 艺术师。五名创始人都具备休闲解谜游戏的直接领域经验；对一家首款产品正面切入该细分市场的工作室而言，这是很强的创始人-市场匹配信号。


              团队的 Peak Games 背景具备分析意义：Peak Games 本身在 2020 年以 $1.8B 被 Zynga
              收购，成为土耳其游戏史上最成功的退出案例，也证明创始人理解如何规模化打造高价值休闲游戏。这段经历为产品机制、变现设计和实时运营管理提供了现成模板。截至 2026 年 5
              月最新公开来源，五名创始人均未显示已离职，说明创始团队早期流失率较低。


              2023 年 12 月，Dream Games 任命 Pixar 联合创始人、Pixar/Disney Animation Studios 前总裁 Edwin Catmull
              为战略顾问。这一任命带来媒体报道，也释放出公司希望把创意品牌从纯游戏机制上抬升出来的信号，不过 Catmull 的运营角色是顾问而非高管。公司员工数从 2022 年 1 月 Series C 时的约 80
              人增长到 2024 年估计 500+ 人，但确切当前人数未公开披露。
