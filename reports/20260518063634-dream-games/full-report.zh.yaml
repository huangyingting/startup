      - number: '7.4'
        title: 财务与治理风险
        blocks:
          - type: paragraph
            body: >-
              Dream Games 最近一次公开已知投后估值为 $2.75B，确定于 2022 年 1 月，距本报告已超过四年。此后公司未宣布新一轮融资，所有运营成本推定由 Royal Match 现金生成覆盖。2024
              年估计 EBITDA 为 $640M–$960M，表明公司高度盈利并能自我供血，但缺乏经审计财务报表意味着这仍是分析师估计。考虑参与新股或老股交易的投资人，没有经验证的 P&L 或资产负债表来锚定估值。


              平台费风险具有结构性且持续存在。Apple 和 Google 各自收取消费者总支出约 30% 作为发行费。以 2024 年估计 $2.1B 消费者总支出计算，这意味着约 $630M 支付给平台运营方。虽然
              Epic v. Apple 裁决及后续程序在美国略微放松了反引流限制，但 Dream Games 尚未部署替代发行或支付路径。因此 30% 费用是净收入利润率的永久结构性逆风。


              现有投资人的流动性风险真实存在。Index Ventures、Balderton、IVP 和 Makers Fund 自 2022 年或更早以来一直持有仓位。Dream Games 股权缺乏 IPO
              或二级市场，可能形成潜在悬顶：如果投资人开始大规模要求流动性，公司可能面临压力，以可能不利的估值倍数接受战略收购。治理风险来自创始人保留多数控制权——在该阶段很常见，但会限制投资人影响力。缺少具备与公司收入规模相匹配的财务和法律专业能力的独立董事会，这一点未确认，但在创始人主导的运营模式下很可能是风险。
