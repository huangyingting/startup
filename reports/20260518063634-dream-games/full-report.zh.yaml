      - number: '5.2'
        title: 技术架构
        blocks:
          - type: paragraph
            body: >-
              Royal Match 和 Royal Kingdom 都基于 Unity 游戏引擎。Unity 是全球移动游戏占主导地位的实时 3D 和 2D 开发平台。Unity 的跨平台导出能力让 Dream Games
              维护一套共享代码库，同时产出 iOS 和 Android 二进制包，减少重复工程投入，也能同步更新平台版本。Unity 的资产管线、着色器支持和粒子系统工具，支撑了 Royal Match
              互动设计中最关键的高保真视觉效果——动画道具、闪光级联和通关庆祝动画。

              发行完全依赖 Apple App Store 和 Google Play。两大渠道合计覆盖目标全球移动市场，并对所有应用内购买抽取标准 30% 分成。Dream Games
              未披露替代性的直接发行或网页商店渠道，也就是说 100% 支付处理都经过 Apple 和 Google 基础设施。该安排降低了 Dream Games
              处理支付卡数据的风险，但也让公司完全受制于两大平台的政策和费率结构。

              长线运营后端负责活动日程、新关卡包、季节内容和排行榜数据，运行在云基础设施上。Dream Games 未正式披露云服务商；考虑到 AWS 在移动游戏后端部署中的主导地位，AWS
              是最可能候选，但尚未确认。分析基础设施细节同样未披露，不过多家媒体提到，实时玩家行为数据是 Dream Games 关卡设计和 A/B 测试流程的核心输入。

              支付处理完全交给 Apple 和 Google 的应用内购买 SDK；Dream Games 不直接处理支付卡数据。这缩小了 PCI DSS 合规范围，但提高了对平台支付政策的依赖。社交功能（如 Facebook
              排行榜集成）和推送通知能力通过集成进 Unity 客户端的第三方 SDK 实现。内部开发工具链细节（CI/CD 管线、版本控制系统、构建基础设施）未公开披露。
