      - number: '7.3'
        title: 市场与竞争风险
        blocks:
          - type: paragraph
            body: >-
              Dream Games 所在的三消休闲益智赛道由三大产品主导：Royal Match（2024 年按收入全球排名第 1 或第 2）、Candy Crush Saga（King/Activision）和
              Monopoly Go（Scopely，累计收入达到 $2B+ 的速度快于此前任何手游）。竞争动态不是零和——在一个大市场里三款产品可以同时增长——但休闲玩家注意力有限，面对成熟竞争对手获取新 UA 成本高。


              Candy Crush Saga 以 200+ 款产品组成的系列和持续内容更新，保持三消王座超过十年。其母公司 Activision Blizzard（现为 Microsoft
              一部分）提供深厚内容和营销资源。Scopely 的 Monopoly Go 在 2023–2024 年证明，只要 UA 投入足够，新休闲 IP 可以快速取代既有玩家。Dream Games
              的风险不是被单一竞争对手替代，而是高强度 UA 支出常态化并成为竞争必需品——这一动态会压缩整个品类的长期利润率。


              土耳其里拉自 2018 年以来相对 USD 大幅贬值，按美元计算降低了 Dream Games 伊斯坦布尔工程和运营成本。目前这是成本优势，估计比美国或西欧同等人员成本低 30–50%。不过 TRY
              不稳定也带来工资螺旋风险：土耳其工程师越来越要求 USD 计价薪酬或选择移民。IMF 和 World Bank 预计土耳其 2025–2026 年通胀将继续高于平均水平。美国收入地域集中（约占收入
              55%）带来美国监管和平台政策变化敞口。
