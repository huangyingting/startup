        - 约 $2.0B 年收入
        - ~5.5×
        - 公开市场可比公司，可提供估值地板 / 天花板参考；Playtika 已多元化（约 20 款游戏），而 Dream Games 集中于单一游戏；疫情峰值倍数
      - - Rovio（Angry Birds）
