      - number: '5.4'
        title: 产品路线图与依赖
        blocks:
          - type: paragraph
            body: >-
              Dream Games 近期产品路线图由两条并行任务塑造：延续 Royal Match 的长线运营动能，并扩大 Royal Kingdom 的全球玩家基础。Royal Match
              需要持续产出关卡，按两周节奏扩大内容库，同时配套季节性长线运营活动和货币化迭代优化。截至 2026 年 5 月，Royal Kingdom 全球上线还不到完整一年，需要同时投入关卡内容、UA
              支出和长线运营活动设计，缩小与 Royal Match 已成型互动指标的差距。

              截至 2026 年 5 月，Dream Games 尚未公开宣布第三款游戏。公司的双产品策略体现出重执行深度、轻产品组合宽度的克制路线；这与创始团队的 Peak Games
              背景，以及工作室历史上愿意在全球发布前接受长期开发和软启动周期相一致。

              关键依赖风险包括：（1）Apple 和 Google 平台风险，其商店政策和 30% 费率结构控制所有收入收取，且可能朝不利方向变化；（2）Unity 引擎版本风险，重大 API
              变更可能要求大规模工程迁移；（3）长线运营后端可靠性，宕机会影响全球活动排期和玩家体验；（4）内容产能风险，在 12,400+ 关卡基础上继续维持两周一批节奏，受数据科学团队吞吐量和创意产能约束。

              一个被广泛讨论的潜在路线图事项是推出直接网页商店，让玩家无需支付 Apple/Google 30% 费用即可购买硬通货。欧盟《数字市场法》和 Epic Games 案之后美国 App Store 自由度扩大，使
              2025–2026 年网页商店的战略可选性增加，但 Dream Games 未公开确认任何此类计划。落地还需要在平台生态之外解决税务合规、支付处理和客服基础设施。
