      - number: '1.3'
        title: 融资历史
        blocks:
          - type: paragraph
            body: >
              Dream Games 已完成四轮融资，累计 $467.5M，并在 2022 年 1 月达到最近一次已知投后估值 $2.75B。2019 年 11 月，公司成立后不久完成 $7.5M Seed 轮，由
              Balderton Capital 和 Makers Fund 领投，为工作室在软启动阶段打磨 Royal Match 提供了足够资金。2021 年 2/3 月，Royal Match 全球上线时，公司宣布
              $50M Series A，由 Index Ventures 领投，Balderton 和 Makers Fund 参投；这一轮融资清楚地表达了市场对游戏早期指标的信心。


              六个月后，2021 年 6 月，Dream Games 完成 $155M Series B，公司估值达到 $1B（独角兽状态），由 Index Ventures 和 Makers Fund
              联合领投，Balderton、IVP 和 Kora 继续参投。从 Series A 到独角兽不到六个月，凸显 Royal Match 极强的表现曲线。最后一轮已披露融资是 2022 年 1 月完成的 $255M
              Series C，估值 $2.75B，由 Index Ventures 领投，Makers Fund、BlackRock、IVP、Balderton 和 Kora 参投。自 2022 年 1
              月以来，公司没有公开披露进一步融资；截至本报告日期已超过四年。截至 2026 年 5 月，Dream Games 仍为私营公司。


              公司投资方包括机构 VC（Index Ventures、Balderton Capital、IVP）、专业游戏基金（Makers
              Fund）、接近主权资本的大型资产管理公司（BlackRock）以及跨界成长基金（Kora）。Index Ventures 领投或联合领投四轮中的三轮，是最重要的机构支持者。没有公开老股交易、分红或 IPO
              申报，意味着投资人流动性完全押后到未来的战略退出或公开上市。
