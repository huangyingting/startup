              Dream Games 不披露经审计财务、LTV 队列曲线、UA 效率数据或地域收入拆分。本章所有风险评估都建立在分析师估计而非已验证数据上。$2.75B 的 2022 年 1
              月估值已过时超过四年；没有市场机制验证当前公允价值。投资人若按这些估计交易，除上述每项运营和监管风险外，还要承担模型风险。
