        - 确认实际关卡数量和新关卡产出速度；评估设计质量（不只是数量）是否维持
      - - Microsoft 对 Candy Crush 的深口袋支持
        - 风险
        - 高
        - 当前且在升级
        - Microsoft 可能把 Xbox/Game Pass 资产（营销、交叉推广、流媒体）分配给 Candy Crush，Dream Games 难以对冲这种打法
        - 评估 Candy Crush 的 UA 支出趋势是否体现 Microsoft 增量投入；跟踪 Game Pass 集成公告
      - - 多栖：玩家同时玩多款三消游戏
