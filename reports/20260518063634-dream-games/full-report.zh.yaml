  - id: A
    title: 关键来源与证据说明
    blocks:
      - type: paragraph
        body: >-
          本报告基于公开信息，包括 Appmagic、Appfigures、SensorTower、MobileGamer 和 GamesIndustry.biz
          的第三方分析师数据；TechCrunch、PocketGamer、Financial Times 和 Bloomberg 的新闻报道；classaction.org 的法律文件；以及公司沟通材料。Dream Games
