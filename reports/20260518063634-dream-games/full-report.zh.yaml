  - number: 6
    title: 客户情况
    sections:
      - number: '6.1'
        title: 客户基础与分群
        blocks:
          - type: paragraph
            body: >-
              Royal Match 面向大众休闲游戏用户，没有企业或 B2B 业务。核心玩家画像是 25–55
              岁女性，她们每天玩短时益智关卡，吸引点是易上手的三消机制和有满足感的城堡装饰元游戏。该人群贡献了安装和收入的大多数，尤其在美国和西欧市场。第二类人群是 30–45 岁的中度硬核男性玩家，单次游戏 IAP
              支出更高，也更常参与锦标赛、季节性挑战等竞争型长线运营活动。第三类是印度和东南亚玩家，下载量大但收入低，转化为付费用户的比例显著更低，反映区域收入差异和购买力差距。还有一个规模小但价值明显更高的“鲸鱼”群体，估计占付费玩家不到
              5%，通过集中购买金币包、活动通行证和道具，贡献了远超比例的 IAP 收入。Royal Match 发行覆盖 190+ 个国家，支持多语言，最大化可触达安装范围。美国市场是单一最大贡献者，约占全球收入
              55%；英国、德国、日本和韩国是主要收入市场。印度是美国之外下载量最大的市场，但因付费用户平均收入低，收入贡献只占很小部分。休闲益智是性别包容度最高的移动游戏品类之一，Royal Match
              易接近的美术风格和非暴力玩法进一步扩大了人群吸引力。
