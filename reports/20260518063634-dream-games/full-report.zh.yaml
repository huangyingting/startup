        - 持续；代际动能强
        - 核心人群加深并扩大；新队列进入主要消费窗口
        - 确认玩家 LTV 数据是否支撑该人群继续扩张
      - - Apple App Tracking Transparency（ATT）对 iOS UA 的影响
        - 约束
        - 2021 年以来生效；持续适应
        - 推高 iOS UA CPI；降低新玩家获取的定向精度
        - 了解 Dream Games 的 iOS/Android UA 拆分和 ATT 缓释策略
      - - Google Privacy Sandbox（Android）
        - 约束
        - 2024-2026 年推出
        - 在 Android 上复刻 ATT；进一步削弱跨应用定向；推高有效 CPI
        - 评估 Privacy Sandbox 变化前后 Android UA 表现
      - - US/UK match-3 市场饱和
        - 约束
        - 当前
        - 高价值市场已有多款根深蒂固的产品；边际 UA 成本上升
        - 判断 2022-2026 年 Royal Match 在头部收入市场的 CAC 趋势
      - - 应用商店费用上升 / 监管审查
        - 带部分抵消空间的约束
        - 持续；Epic v. Apple + EU DMA 正在打开替代支付路径
        - 有机会通过网页商店或替代支付收回部分 30% 应用商店费用
        - 评估 Dream Games 是否已有或计划网页商店策略
      - - 内容深度和 LiveOps（竞争护城河驱动）
        - 增长驱动
        - 持续；需要投入
        - Royal Match 的数千个关卡和实时活动维持参与度；后来者很难复制
        - 确认关卡库存和 LiveOps 内容管线健康度
      - - Royal Kingdom IP 延展
        - 增长驱动
        - 2024-2026 年爬坡
        - 第二款产品降低单一产品集中风险；扩大可触达玩家基础
        - 跟踪 Royal Kingdom 的 DAU、ARPU 和收入增长轨迹，与 Royal Match 早期生命周期对比
    notes: >-
      ATT / Privacy Sandbox 约束是行业性结构问题；相比小型同行，Dream Games 的规模和 UA 能力能提供一定缓冲。市场饱和是相对概念——即使头部市场趋于成熟，match-3
      的全球总付费用户基础仍在增长。应用商店费用监管约束仍在演进；截至 2026 年 5 月，可用来源中未发现 Dream Games 关于替代支付策略的公开表态。
