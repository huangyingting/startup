  - id: FE001
    title: Royal Match 产品架构流程
    type: flow
    layout: wide
    summary: Royal Match 横跨六个相互连接的系统层：基于 Unity 的玩家 App 与实时运营游戏服务器通信，服务器协同分析平台推动关卡设计决策；Apple/Google 商店处理分发和支付，UA 平台把新玩家导入漏斗顶部。
    data:
      nodes:
        - id: n1
          label: 玩家 App（Unity）
          detail: 基于 Unity 的 iOS/Android 游戏客户端，负责渲染、谜题逻辑和 IAP 界面
        - id: n2
          label: Apple / Google 商店
          detail: 分发入口和强制支付处理方；保留 IAP 收入的 30%
        - id: n3
          label: 实时运营游戏服务器
          detail: 云托管后端（推断为 AWS），下发活动日程、关卡包和排行榜数据
        - id: n4
          label: 分析平台
          detail: 实时追踪玩家行为；把 A/B 测试结果反馈给关卡设计团队
        - id: n5
          label: 关卡设计流水线
          detail: 数据科学辅助的内容创作团队，约每 2 周产出新关卡
        - id: n6
          label: UA 平台
          detail: Meta、Google UAC、TikTok，以及电视 / 名人广告活动带来新安装
      edges:
        - from: n6
          to: n1
          label: 新玩家安装
        - from: n2
          to: n1
          label: App 分发 + 支付
        - from: n1
          to: n3
          label: 玩家状态 + 活动请求
        - from: n3
          to: n4
          label: 行为事件流
        - from: n4
          to: n5
          label: 分析洞察
        - from: n5
          to: n3
          label: 新关卡内容
    approximationNotes: 云服务商（AWS）和分析平台根据行业惯例推断；Dream Games 均未正式确认。UA 平台组合根据行业对 Dream Games 广告活动的报道推断。
