      - number: '8.3'
        title: 情景分析
        blocks:
          - type: paragraph
            body: >-
              三个情景框定 Dream Games 投资结果区间，概率权重反映当前证据基础（见 TV003 和 FV003）。


              悲观情景（20% 概率）假设 Royal Match 收入在 2025 年下降 15%，原因是互动饱和加速，而 Royal Kingdom 无法贡献有意义收入。在该情景下，2025 年估计总收入约
              $1.2B；鉴于增长减速，适用 EV/收入倍数压缩至 3×，隐含企业价值 $3.6B。平台费上升或赌博法裁决不利会进一步加剧情景。若以 $5B 入场，回报将深度为负。关键早期信号是 2025 年 H1 数据中
              Royal Match 月活用户下行，或 Royal Kingdom 全球上线后前六个月收入低于 $10M。


              基准情景（55% 概率）假设 Royal Match 2025 年收入温和增长 5–10%，合并 IAP 净收入约 $1.6B，Royal Kingdom 贡献 $50–150M。市场因持续增长和盈利能力给予
              4–5× 倍数，产生 $6.4B–$8B 企业价值。以 $5B–$7B 入场，3–5 年持有期内现金倍数为 1.3–1.5×。具备平台协同的收购方若给出战略溢价，还可能进一步抬高回报。


              乐观情景（25% 概率）假设 Royal Kingdom 2025 年收入达到 $200–400M，受美国市场上线推动实现强货币化；同时 Royal Match 依靠关卡设计创新维持 15%+ 增长。合并收入接近
              $2.0B，市场因已证明多游戏能力将倍数重估至 5–7×，产生 $10B–$14B 企业价值。以 $5B–$7B 入场，现金倍数为 1.7–2.0× 或更高，风险调整后吸引力很强。


              关键情景分歧点包括：（1）Royal Kingdom 全球上线后前 180 天收入（2024 年 11 月数据很快可得）；（2）Royal Match 到 2025 年 Q2
              的同比收入变化；（3）华盛顿赌博集体诉讼的解决或重大进展；（4）Dream Games 提交 S-1 或聘请 M&A 顾问的任何信号。截至 2026 年 5 月，公司未宣布 IPO，也未公开披露未来计划。
            claimRefs: []
