      - number: '2.2'
        title: 三消与休闲解谜细分市场
        blocks:
          - type: paragraph
            body: >
              三消是休闲移动游戏中的独立子品类，特点是基于网格的颜色或形状匹配、关卡推进，以及推动道具和生命购买的递进难度。该子品类是休闲游戏中最主要的收入来源，前五大三消游戏合计每年估计创造 $4-7B 消费者总支出。至少自
              2023 年中以来，Royal Match 一直是收入最高的三消游戏；到 2023 年末和 2024 年，它在月收入上持续超过品类开创者 Candy Crush Saga。这是一个具有历史意义的反转：Candy
              Crush 曾连续多年是全球收入最高的移动游戏。


              三消市场在结构上是寡头格局。头部游戏受益于极高玩家留存、深厚关卡库（Royal Match 有数千关；Candy Crush 在 HTML5 上有 15,000+
              关），以及通过限时活动维持参与度的活跃实时运营团队。进入壁垒包括达到规模所需的 UA 投入强度，以及建立竞争性品牌忠诚度的难度。主要竞争对手包括 Candy Crush
              Saga（King/Microsoft）、Toon Blast 和 Toy Blast（Peak Games/Zynga）、Gardenscapes 和 Homescapes（Playrix）。这些产品加上
              Royal Match 和 Royal Kingdom，定义了三消赛道的收入核心。


              The Deconstructor of Fun 对三消机制的分析指出，该品类依赖四个元素：（1）以深度关卡推进系统作为核心参与循环；（2）元层（如 Gardenscapes 的房间装饰、Royal Match
              的城堡修复），为完成关卡之外提供长期目标；（3）社交功能（赠送生命、俱乐部/团队）；（4）精细调校的难度曲线，在不把玩家逼到流失的前提下推动道具 IAP。放在这个框架里，Royal Match
              的差异化来自视觉质量投入、King Robert 角色品牌，以及相较老牌三消同行更公平的难度调校口碑。
