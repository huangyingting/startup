      - number: '6.4'
        title: 客户风险
        blocks:
          - type: paragraph
            body: >-
              Royal Match 的客户基础存在几项结构性风险，会实质影响投资逻辑。最关键的是单一产品集中度：Dream Games 估计 90%+ 总收入来自 Royal Match 一款游戏。一旦 Royal
              Match 玩家互动因内容疲劳、平台变化或竞争替代而持续下滑，公司财务会直接受损，短期内没有抵消项。2023 年在华盛顿州提起的一起集体诉讼指控 Royal Match
              的旋转奖盘构成华盛顿州法律下的非法赌博；若原告胜诉，可能要求产品调整、损害赔偿或监管限制，从而扰乱现有游戏内经济和玩家信任。地域集中放大收入风险：美国贡献约 55% 收入，任何美国特定监管行动、App Store
              政策变化或消费者情绪转向，都会对公司总收入产生过大影响。游戏高度依赖付费用户获取（估计每年 $400–600M）来维持增长，带来结构性 CAC 依赖；如果休闲游戏市场成熟导致 UA
              回报压缩，又没有足够有机替代，收入增长可能停滞。Apple 和 Google 掌握 100% 发行与支付处理，平台依赖使 Dream Games 暴露于平台费率变化、政策执法或下架风险。美国 25–55
              岁女性用户倾斜是一项优势，但如果该人群游戏习惯变化，或竞争对手更有效地瞄准她们，也会变成集中风险。Royal Kingdom 2024 年 11 月全球上线，是缓解单一产品集中的主要路径，但它仍是早期商业赌注。
