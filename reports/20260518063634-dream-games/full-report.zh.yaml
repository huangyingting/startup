      - number: '6.2'
        title: 采用与增长指标
        blocks:
          - type: paragraph
            body: >-
              Royal Match 于 2020 年底在英国和加拿大开展有限软启动，全球发布前 DAU 约 200K。游戏 2021 年 3 月全球上线，并在上线数月内迅速扩大到约 6M MAU，成为 2020
              年代扩张最快的休闲手游之一。到 2024 年，累计下载量达到 200M+；Appmagic 估计截至 2024 年底 iOS 和 Android 总安装量约 296M，Appfigures 报告截至 2024 年
              4 月累计消费者总支出超过 $3B。按任何移动游戏基准看，其收入增长都非常突出：从 2022 年约 $400M，到 2023 年 $932M，再到 2024 年估计 $1.46B。2024 年 10
              月创下月度纪录，约 $177M；按月度 IAP 收入计，Royal Match 全球排名第 2，仅次于 Monopoly GO。自 2022 年底以来，该游戏在美国 App Store 收入榜连续 30
              多个月保持前 5，这种生命力只有极少数手游能做到。Royal Match 在 2023 年超过 Candy Crush Saga，成为全球收入最高的三消游戏，并且从 $2B 到 $3B 终身收入里程碑的速度快于
              Rise of Kingdoms、Lords Mobile 和 Slotomania。Dream Games 第二款产品 Royal Kingdom 在软启动阶段产生
