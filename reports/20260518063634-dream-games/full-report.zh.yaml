      items:
        - label: 月度 UA 广告曝光
          value: 500000000
          detail: Meta、Google 和广告网络付费 UA 活动带来的估计月度曝光
        - label: App Store 页面访问
          value: 15000000
          detail: 来自 UA 点击和自然浏览的估计月度商店页面访问
        - label: 新增安装
          value: 5000000
          detail: 估计月度新增安装；到 2024 年累计已达 200M+
        - label: 第 1 天活跃玩家
