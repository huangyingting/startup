      - number: '4.2'
        title: 单位经济与销售效率
        blocks:
          - type: paragraph
            body: >-
              Dream Games 不公布单位经济。关键指标——用户获取成本（CAC）、客户终身价值（LTV）、回本周期和日活用户（DAU）数量——均未披露。分析师和行业估计可以拼出大致区间。


              用户获取是主要增长引擎，也是最主要成本项。Dream Games 估计每年在 UA 上投入 $400–600M；这些数字来自多份关于全球头部移动 UA 买家的行业报告，并得到覆盖三消赛道的分析师佐证。在估计
              $2.1B 消费者总支出下，这意味着 UA 投放与总收入之比约为 19–29%；对规模化成熟三消游戏而言，这与 LTV 已明确、出价可高效优化的状态一致。


              Singular 和 AppsFlyer 的行业基准显示，LTV 模型校准良好的头部休闲游戏，在美国 25–55 岁女性人群中 CPI（每安装成本）为 $1.50–$4.00，成熟期 LTV/CAC 比为
              3–5×。按估计 UA 投放中点计算，Dream Games 的隐含比率（$500M UA / $1.47B 净收入）约为 2.9×，位于该区间低端但考虑规模后可以接受。基于品类基准，回本周期估计为 12–18
              个月；Dream Games 未确认。留存指标未公开；头部三消的行业可比值显示第 30 日留存为 15–25%。
