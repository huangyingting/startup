      - number: '3.3'
        title: 能力、定价与市场打法对比
        blocks:
          - type: paragraph
            body: >
              所有主要三消竞争对手都采用免费游玩加 IAP 变现。游戏层面没有有意义的价格差异；所有产品都可免费下载，真正的定价竞争来自道具包、生命包和活动通行证的价值主张。Royal Match
              的定价策略依赖相对公平的难度调校和高视觉质量，推动自然道具购买；这与一些因更激进付费墙机制而受批评的老产品形成对比。Candy Crush Saga 后来也根据玩家反馈逐步转向类似模型。


              能力维度上，关键差异点包括：（1）内容深度——关卡库规模是留存和长期参与的代理指标；（2）元层设计——关卡完成之外，为玩家提供长期目标的装饰/建造元游戏；（3）实时运营节奏——限时活动、锦标赛和社交功能的频率与质量；（4）UA
              成熟度——通过付费渠道高效获取高 LTV 玩家；（5）品牌认知——游戏 IP 带来自然安装和推荐安装的能力。Royal Match 在 UA 成熟度、元层质量和品牌新鲜感上领先。Candy Crush
              在关卡库深度、品牌历史认知和 Microsoft 分发资源上领先。


              截至 2026 年，分发主要通过 Apple App Store 和 Google Play，几乎没有有意义的替代渠道。UA 投放是核心竞争武器：所有主要三消开发商都是
              Facebook、Google、TikTok 和程序化移动广告库存的活跃买家。Dream Games 估计每年在 UA 上投入 $400-600M，跻身全球最大移动 UA 买家。这形成了 UA
              寡头拍卖动态：头部三消开发商实际彼此争夺同一批高 LTV 玩家，推高整个品类的 CPI。
