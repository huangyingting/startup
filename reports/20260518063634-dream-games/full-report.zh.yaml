  - id: TV005
    title: 逻辑破坏与退出触发条件表
    columns:
      - 触发条件
      - 阈值
      - 监控信号
      - 触发后的动作
      - 紧迫性
    rows:
      - - Royal Match 收入下滑
        - 月度净 IAP 收入连续 2 个季度同比下降 >15%
        - SensorTower/AppMagic 月度收入估算；App Store 畅销排名与上年位置对比
        - 暂停尽调；重新承销悲观情景；继续推进前要求 CEO 说明参与度轨迹
        - 关键 — 首个信号确认后立即行动
      - - 不利赌博法裁决
        - Washington 集体认证成立且估算赔偿 >$100M，或上诉法院裁定应用内金币机制可重新定性为赌博
        - PACER 案件案卷监控；行业法律报道（ClassAction.org、TopClassActions.com）；州总检察长公告
        - 立即升级至投资委员会；获取关于多司法辖区敞口的独立法律意见；暂停尽调，等待结果评估
        - 关键 — 立即向投资委员会标记
      - - 平台费上涨或惩罚性政策变化
        - Apple 或 Google 将实际平台费提高到 32% 以上，或出台限制 Royal Match 变现机制的新开发者政策
        - Apple/Google 开发者关系公告；行业报道（Pocket Gamer、GamesIndustry.biz）；Dream Games 公开声明
        - 用新费率结构重跑利润率模型；评估网页商店替代方案准备度；每上调 1 个百分点费用，将 EV 区间下调 10–20%
        - 高 — 政策变化后 30 天内重估
      - - 创始人离任
        - CEO Soner Aydemir 或任何联合创始人在交易交割前离任或释放离任信号
        - LinkedIn 资料变化；公开公告；被投公司网络情报；Dream Games 招聘页面
        - 将留任承诺和股权锁定列为任何交易的条件；重新评估估值中的领导力风险溢价
        - 高 — 需要重大重新承销
      - - Royal Kingdom 全球规模失败
        - Royal Kingdom 全球上线 6 个月后收入运行率低于 $50M 年化（2024 年 11 月上线）
        - AppMagic/SensorTower 对 Royal Kingdom 的月度收入估算；Pocket Gamer 关于商店排名的报道
        - 不立即修改投资逻辑，但提高单一游戏集中度风险权重；将乐观情景概率从 25% 降到 10%；把买入区间收窄至 $4.5B–$6B
        - 中 — 6 个月里程碑后 90 天内重新校准情景权重
    notes: 阈值由分析师基于可比移动游戏估值模型定义，并非合同约束。监控信号反映公开可得的第三方数据来源。行动建议仅为 LOI 前尽调指引。
