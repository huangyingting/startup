  - id: FU001
    title: Royal Match 玩家客户旅程
    type: journey-map
    insight: 玩家主要通过带名人出镜的重度 UA 广告（如 Simon Cowell）发现 Royal Match，快速完成新手教程，进入每日解谜和元游戏城堡装饰，并在卡点 IAP 提示中变现。实时运营 活动延长旅程，并重新激活流失玩家。
    data:
      items:
        - label: 阶段 1 — 发现：名人玩法广告（Simon Cowell 等）
          detail: 主要 UA 触点；玩家在社交媒体或另一款 App 中看到定向视频广告；阶段：发现
        - label: 阶段 1 — 发现：App Store 列表曝光
          detail: 玩家查看 App Store 页面；4.7/5 评分和截图轮播推动安装转化
        - label: 阶段 2 — 新手引导：教程关卡序列
          detail: 前 10–15 关引入三消机制、King Robert 角色和城堡翻新目标
        - label: 阶段 2 — 新手引导：首次解锁城堡装饰
          detail: 玩家完成城堡第一个区域；情感奖励锚定元游戏进度循环
        - label: 阶段 3 — 核心参与：每日解谜局
          detail: 玩家每天回访，游玩 15–30 分钟；关卡难度曲线维持参与度和习惯
        - label: 阶段 4 — 变现：首次 IAP 提示
          detail: 玩家遇到困难关卡或生命耗尽；系统提示购买金币或道具
        - label: 阶段 4 — 变现：购买金币组合包
          detail: 玩家转化为付费用户；休闲 F2P 惯例下，估计首次购买平均为 $2–$10
        - label: 阶段 5 — 实时运营留存：参与锦标赛
          detail: 玩家加入实时运营锦标赛活动；排行榜竞争提高游玩频次
        - label: 阶段 6 — 流失或再激活：新活动推送通知
          detail: 流失玩家收到季节性活动或新关卡包通知；推动再参与
  - id: FU002
    title: Royal Match 转化漏斗——从安装到付费用户
    type: funnel
    insight: >-
      Dream Games 年度 $400–600M 投放带来估计月度 UA 曝光，其中一小部分点击安装。安装用户中，约 40–45% 在第 1 天活跃。活跃玩家中，估计 3–5% 转为付费用户；该比例符合头部休闲 F2P
      基准，但在安装基础规模下对应巨大的绝对收入。
