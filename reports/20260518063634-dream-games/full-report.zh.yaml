        - 相比小型竞品，Dream Games 的规模提供一定缓释；大型 UA 买家有更多数据校准出价
        - 索取 ATT 推出以来（2021-2026）iOS 与 Android 的 UA 拆分及 CPI 趋势数据；与 Singular/AppsFlyer 行业 CPI 基准对比
      - - Playrix 内容和 LiveOps 竞争强度
        - 风险
        - 中
        - 当前
        - Playrix 盈利能力强、技术成熟；Gardenscapes/Homescapes 维护良好
        - 监测 Playrix 关卡更新节奏和活动质量；评估 Playrix 是否在招募 UA 人才或扩充工作室产能
      - - 新进入者颠覆（AI 原生三消）
