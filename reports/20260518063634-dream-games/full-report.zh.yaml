          label: 核心解谜玩法
          detail: 玩家推进数千个难度递增的三消关卡；失败会触发 IAP 提示
        - id: j4
          label: 建造元游戏
          detail: 玩家花费赚得的金币重建 King Robert 的城堡；为持续关卡游玩提供叙事动机
