      - number: '7.2'
        title: 运营与执行风险
        blocks:
          - type: paragraph
            body: >-
              Dream Games 最尖锐的运营风险是极端单一产品收入集中。根据所有可得分析师估计，Dream Games 超过 90% 收入来自 Royal Match。Royal Kingdom 于 2024 年 11
              月全球上线，首个不完整年度估计产生 $20–50M；对新游戏而言有意义，但仅相当于 Royal Match 2024 年估计 $2.1B 消费者总支出的约 1–3%。如果 Royal Match
              互动因玩家疲劳、内容质量回退或竞争替代而显著下滑，在没有多元化缓冲的情况下将是生存性事件。


              关键人风险集中在 CEO 层面。Soner Aydemir 是创始产品愿景制定者，也是 Royal Match
              关卡设计和货币化理念的设计者。公司未公开披露继任计划。由五人组成的创始团队（Aydemir、Namli、Saglam、Sengul、Yilmaz）截至 2026 年 5
              月仍保持完整，这是积极信号；但缺乏可接任产品领导的具名副手，形成单点故障。


              用户获取依赖 Meta、Google 和 TikTok 广告平台，构成第三项运营风险。Dream Games 估计 80–90%+ 的 UA 支出流向这三大平台。任何算法变化、政策转向或定向限制（例如 2021
              年 iOS 14 ATT 变化，使行业 CPI 上升 20–30%）都可能显著抬高 Dream Games 的有效 CPI 并压缩利润率。公司经受住了 2021 年 ATT 冲击，但底层集中度仍未在结构上解决。


              对一款拥有 12,000+ 关卡的游戏而言，关卡设计质量回退不是小风险。大规模维护益智难度曲线、互动钩子，以及自然推进和 IAP
              提示之间的平衡，需要深厚组织知识。随着团队扩张、最初关卡设计负责人离一线生产越来越远，质量波动会上升。Royal Match 这个规模下存在安全和反作弊风险，包括修改版
              APK、账号欺诈和服务器端漏洞利用尝试，但迄今未产生重大公开事件。
