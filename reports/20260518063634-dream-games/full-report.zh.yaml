      - number: '3.4'
        title: 护城河耐久度与竞争风险
        blocks:
          - type: paragraph
            body: >
              Royal Match 的竞争位置建立在几项相互强化的优势上。其关卡内容库截至 2026 年估计超过 5,000 关，代表多年设计投入，新进入者无法快速复制。Dream Games 的 UA
              成熟度和预算规模估计为三消赛道最高；四年规模化运营打磨出的每安装 LTV 指标，让它相对小竞争对手拥有 UA 效率优势。King Robert 角色 IP
              和品牌美术风格可识别，并在电视和数字广告中带来强广告记忆。Royal Match 的实时运营团队通过常规限时活动维持玩家参与，守住日活用户数。


              按软件标准看，三消游戏切换成本较低。玩家可以、也确实会多栖；同时玩多款休闲游戏很常见。休闲游戏研究数据表明，相当一部分 Royal Match 付费用户也玩 Candy Crush Saga 或
              Gardenscapes。这意味着 Dream Games 争夺的不是独占玩家注意力，而是移动娱乐预算和时间份额。低切换成本让玩家留存和 UA 效率成为关键竞争机制，而非排他性锁定。


              最主要的反向竞争事实是，Dream Games 面对三家资本充足的企业型竞争对手：Microsoft（通过 King 运营 Candy Crush）、Take-Two/Zynga（通过 Peak 运营 Toon
              和 Toy Blast）以及 Playrix（私营但据报道已规模化盈利）。它们都能用 Dream Games 作为私营独立公司更难承受的方式吸收 UA 投放带来的利润率压缩。尤其 Microsoft
              具备在纯经济回报之外维持 Candy Crush 规模的战略动机（平台生态、Game Pass 数据）。Royal Kingdom 是否会蚕食 Royal Match 玩家基础，是 Dream Games
              内部护城河耐久度的具体问题，公开证据仍无法回答。
