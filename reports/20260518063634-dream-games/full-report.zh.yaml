  - number: 3
    title: 竞争格局
    sections:
      - number: '3.1'
        title: 三消竞争格局概览
        blocks:
          - type: paragraph
            body: >
              三消休闲移动游戏赛道由少数高度规模化产品定义，这些产品合计占据该子品类大部分收入。Royal Match（Dream Games）、Candy Crush
              Saga（King/Microsoft）、Gardenscapes 和 Homescapes（Playrix）、Toon Blast 和 Toy Blast（Peak
              Games/Zynga）构成收入核心。这六款游戏合计估计每年创造 $4-7B 消费者 IAP 总支出。Royal Match 在 2023-2024 年按收入取得细分赛道领先，历史性地挤下 Candy Crush
              Saga；后者曾占据头名超过十年。


              该赛道结构高度集中：前六大产品控制绝大部分三消收入，长尾小三消游戏只占很小份额。这种寡头结构同时带来稳定性（新进入者门槛高）和风险（头部玩家除仍为私营公司的 Dream Games
              外，均资本充足，并背靠大型游戏集团）。Microsoft 于 2023 年收购 Activision Blizzard，把 King（Candy Crush 发行商）纳入 Microsoft 游戏组合，使
              Candy Crush 可以接入 Xbox Game Pass 生态和集团 UA 资金，实质强化其未来竞争位置。


              三消子品类之外也存在邻近竞争威胁。Scopely 于 2023 年推出的 Monopoly GO，在第一个完整年度创造超过 $2B
              消费者总支出，成为有史以来增长最快的休闲移动游戏之一。虽然其棋盘游戏机制不同于三消，但 Monopoly GO 瞄准同一批 25-55 岁休闲女性人群，争夺同一份移动娱乐预算。Moon Active 的 Coin
              Master 也以转盘和掠夺机制瞄准休闲移动付费用户。这些邻近产品是钱包竞争，而不是直接产品替代。
