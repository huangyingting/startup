  - id: FU004
    title: Royal Match 2024 年关键留存与参与指标
    type: bar
    insight: >-
      Royal Match 的参与指标反映一款成熟、高留存的休闲游戏。2024 年估计约 $1.46B 年 IAP 收入，对应该品类内很高的活跃用户收入。4.7/5 的 App Store 评分和连续 30+ 个月位列美国畅销榜前
      5，确认玩家满意度持久。估计 D1 留存约 40–45%，高于休闲品类基准。
    data:
      items:
        - label: 估计 2024 年 IAP 年收入（USD M）
          value: 1460
          detail: 分析师估计（BusinessOfApps / MobileGamer）；平台费用前总额
        - label: 2024 年 10 月单月收入纪录（USD M）
          value: 177
          detail: '单月收入最高；SensorTower 全球排名 #2'
        - label: iOS App Store 评分（满分 5，×100）
          value: 470
          detail: 2024 年为 4.7/5；数千万评分；为适配图表按 470 展示
        - label: 连续位列美国畅销榜前 5 的月数
          value: 30
          detail: 自 2022 年底起，Royal Match 位列美国畅销榜前 5；截至 2024 年中
        - label: 估计 D1 留存（% × 10）
          value: 425
          detail: 估计 D1 留存约 42.5%；图表按 ×10 展示；分析师估计
        - label: 估计累计下载量（M）
          value: 296
          detail: 据 Appmagic 估计，截至 2024 年底累计下载约 296M
        - label: 估计付费用户率（% × 100）
          value: 400
          detail: 付费转化率约 3–5%；图表按 ×100 展示；分析师估计
        - label: r/RoyalMatch 社区成员（K）
          value: 50
          detail: 截至 2024 年，Reddit 社区成员 50K+；可作为投入粉丝基数的代理指标
