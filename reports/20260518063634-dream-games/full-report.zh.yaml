  - number: 8
    title: 估值
    sections:
      - number: '8.1'
        title: 建议与投资逻辑
        blocks:
          - type: paragraph
            body: >-
              Dream Games 在 $5B–$7B 的入场企业价值下获得有条件买入建议，前提是完成 TV006 详述的六项优先尽调工作流。该区间约为 2024 年估计 IAP 净收入 $1.46B 的
              3.4–4.8×，或估计总收入 $1.6B–$1.9B（含广告）的 2.9–4.4×。投资逻辑由三根支柱支撑。


              第一，Royal Match 是 Candy Crush 之后移动休闲游戏中最有说服力的产品市场匹配证据。到 2025 年初，累计消费者总支出达到 $3.9B，从 $2B 到 $3B 的轨迹约 12
              个月完成，快于 Rise of Kingdoms、Lords Mobile 和 Slotomania 达到同等里程碑的速度。2024 年 10 月，Royal Match 按 iOS/Android
              收入全球排名第 2，仅落后 Candy Crush Saga。在贡献约 55% Royal Match 收入的美国，该游戏到 2024 年连续 17+ 个月领跑总收入榜。


              第二，估值缺口具有结构性吸引力。Dream Games 上一次外部融资在 2022 年 1 月，投后估值 $2.75B，当时年化收入运行率约 $333M。到 2024 年，同一业务产生 $1.46B IAP
              净收入，比 3 年多前的估值锚增长 4.4×。没有二级市场标记、结构化票据或公开披露更新该数字。在可比收购以 3–5× 收入成交的行业里，当前隐含区间（按 2024 年 IAP 收入 3–6× 为
              $4.4B–$8.8B）相较过时的 2022 年估值有可观溢价，而且不需要假设 91% CAGR 继续维持。


              第三，Dream Games 已证明运营自给。公司三轮累计融资 $467.5M，36+ 个月无需第四轮融资，几乎可以确定 EBITDA 为正（按移动游戏行业常态，扣除平台费和 UA 支出后，基于净收入估计
              EBITDA 利润率为 20–35%）。这降低了流动性风险，也表明任何退出都会按公司自己的时间表推进，而不是被现金需求逼迫。


              主要反向逻辑包括：（a）Royal Match 贡献 >90% 收入，使公司成为单一资产持有主体，二元暴露于互动衰退；（b）2024 年 8
              月提起的华盛顿州集体诉讼引入无法量化的或有负债，如结果不利，可能显著影响盈利能力；（c）在当前规模下，30% 平台费具有结构性且不可谈判，限制利润率改善；（d）没有经审计财务，所有收入数字都是第三方估计，存在
              ±10–20% 不确定性。
