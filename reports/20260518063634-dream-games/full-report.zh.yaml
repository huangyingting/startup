            title: 三家集团支持的竞争对手能承受 Dream Games 无法承受的 UA 亏损
            body: >-
              Microsoft（Candy Crush）、Take-Two/Zynga（Toon/Toy Blast）和 Playrix 都有能力出于战略原因承受超过经济回报的 UA 投放：Microsoft 为维持
              Game Pass 生态数据，Take-Two 为保护 $12.7B 收购，Playrix 为组合品牌。独立的 Dream Games 无法匹配无期限战略补贴型 UA 竞争。这种不对称是最主要的结构性竞争风险。
            calloutType: risk
            claimRefs:
              - CP028
              - CP032
              - CP033
          - type: callout
            title: Monopoly GO 证明邻近品类颠覆风险
            body: >-
              Monopoly GO 在第一年（2023 年）创造 $2B+ 收入，说明一款拥有授权 IP 并激进投放 UA 的新休闲游戏，可在 12-18 个月内达到三消规模。虽然 Monopoly GO
              的机制不会直接替代三消产品，但它验证了 25-55 岁休闲女性人群仍可被正确 IP 和 UA 资源触达，也说明这个品类并未永久封闭，仍可能被新进入者打穿。
            calloutType: insight
            claimRefs:
              - CP017
              - CP018
              - CP035
  - number: 4
    title: 财务情况
    sections:
      - number: '4.1'
        title: 收入模型与变现
        blocks:
          - type: paragraph
            body: >-
              Dream Games 采用单一收入流模型：100% 收入来自 Royal Match 以及 2024 年 11 月以来 Royal Kingdom 内的应用内购买（IAP）。两款游戏可在 iOS 和
              Android 免费下载；Dream Games 没有订阅收入，没有广告收入，也没有来自第三方的授权费。该模式在顶级休闲移动游戏赛道很常见，但纯度不寻常；许多同行（包括 Candy Crush
              Saga）已叠加广告收入或订阅通行证。


              IAP 机制是一套硬货币经济：玩家以 $0.99 到 $99.99 的价格点购买金币包或道具组合。解谜关卡中的难度峰值推动自然消费；Dream Games 的关卡设计团队会细致校准。所有交易均通过 Apple
              App Store 和 Google Play 处理，产生标准 30% 平台费，使 Dream Games 净收入相较消费者总支出减少约三分之一。截至报告日期，公司没有公开宣布网页商店替代方案。


              Royal Match 在 2024 年录得约 $2.1B 消费者总支出。扣除约 30% 平台费后，Dream Games 估计发行商净收入约 $1.47B。2024 年 10 月单月消费者总支出峰值约
              $177M，创下三消品类纪录。Royal Match 累计生命周期消费者总支出在 2024 年初超过 $3B。Royal Kingdom 于 2024 年 11 月上线，初始不完整年度期间估计总收入低于
              $100M。
