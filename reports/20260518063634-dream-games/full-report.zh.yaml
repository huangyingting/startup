  - number: 2
    title: 市场分析
    sections:
      - number: '2.1'
        title: 移动游戏市场概览
        blocks:
          - type: paragraph
            body: >
              全球移动游戏市场是 Dream Games 的核心可服务空间。2024 年移动游戏消费者支出估计为 $90-100B，是全球游戏行业按收入计最大的单一板块，约占全球游戏总收入的
              45-50%。BusinessOfApps 估计 2025 年全球移动游戏收入约 $98B，并预计到 2028 年 CAGR 约为 3-5%。Influencer Marketing Hub 汇总统计称，2024
              年移动游戏市场约 $98.7B，并预计到 2030 年增长至 $153B，CAGR 约 7.6%。这些估计口径不同（部分包含游戏内广告；businessofapps.com 数据主要追踪 IAP
              和付费下载收入），因此不能把任何单一数字视为权威，必须先比较方法。


              按平台看，iOS 和 Android 合计几乎占移动游戏收入的 100%，Apple App Store 和 Google Play 名义上都对 IAP 收取 30%
              平台费。这一收费结构正在全球范围内承受法律和监管挑战：美国最高法院 2021 年 Epic v. Apple 裁决，以及欧盟 Digital Markets Act 持续执法，已经开始打开替代支付路径；但截至
              2026 年，对大多数移动游戏开发商而言，30% 抽成仍是主导商业现实。Dream Games 的全部收入来自 IAP，且没有披露网页商店或替代支付策略，因此 30% 收入流失是一项重要结构性成本。


              移动游戏的地域结构决定 Dream Games 的收入暴露。美国是 IAP 收入最大的单一国家，通常占全球移动游戏收入的 30-35%。对 Dream Games 而言，美国约占收入
              55%；这一显著超配既说明公司在英语休闲游戏市场强势，也说明其在非英语市场仍渗透不足。日本、韩国和德国是全球下一批最大收入市场。印度虽然是下载量最高的市场之一，但因玩家平均支出较低，对 IAP 收入贡献较小。
