  - id: FV001
    title: 推荐逻辑流程
    type: flow
    layout: wide
    summary: 投资决策链从 Dream Games 的收入轨迹和市场位置出发，经风险评估和估值差距分析，落到一个有条件买入建议：企业价值 $5B–$7B。
    data:
      nodes:
        - id: n1
          label: 收入轨迹（$400M→$1.46B 净 IAP，2022–2024）
          detail: 91% CAGR；累计总消费者支出 $3.9B；全球移动游戏前 3
        - id: n2
          label: '市场位置（2024 年 10 月全球 #2，美国 #1 持续 17+ 个月）'
          detail: 三消品类主导者；下载量 200M+；美国收入集中度 55%
        - id: n3
          label: 估值差距（2022 年 $2.75B 陈旧估值与 2024 年隐含 $5–8B）
          detail: 上一轮距今 36+ 个月；收入比融资时高 4.4×；无二级市场标记
        - id: n4
          label: 风险评估（诉讼 + 平台 + 单一游戏）
          detail: Washington 博彩集体诉讼仍在进行；30% 平台费为结构性问题；Royal Match 贡献 >90% 收入
        - id: n5
          label: 入场价格纪律（$5B–$7B EV = 2024 年 IAP 收入 3.4–4.8×）
          detail: 以 King（4.2×）和 Supercell（3.7×）收购先例为锚；因单一游戏风险折价
        - id: n6
          label: 有条件买入——取决于 6 条尽调工作流
          detail: 在合适入场价买入，前提是拿到审计财务、股权结构表、LTV 数据、诉讼更新和 Royal Kingdom 指标
