  - number: 5
    title: 产品与技术
    sections:
      - number: '5.1'
        title: 核心产品与功能
        blocks:
          - type: paragraph
            body: >-
              截至 2026 年 5 月，Dream Games 运营两款移动解谜产品。旗舰产品 Royal Match 是一款三消解谜游戏，2021 年 3 月在 iOS 和 Android
              全球上线。玩家通过完成三消关卡，帮助卡通王室角色 King Robert 重建并装饰城堡。这套建造元游戏结构在核心解谜机制之外提供长期进度脚手架，鼓励玩家消费以获取建造材料并推进城堡叙事。截至 2025 年 11
              月，Royal Match 已超过 12,400 关，并以大约两周一次的节奏增加新内容。游戏在 190 多个国家可用，并支持多种语言，是休闲解谜品类中全球可达性最高的产品之一。

              Royal Match 在 Apple App Store 的年龄分级为 4+，在 Google Play 为 Everyone，说明内容定位广泛包容。该应用在 Apple App Store 保持约 4.7/5
              星评分，并拥有数百万用户评价；对一款免费游玩游戏而言，这是格外强的结果，因为变现摩擦通常会拉低用户情绪。在 Android 上，游戏评分同样较高。按 2024 年中媒体报道，Royal Match
              在两个应用商店累计生命周期下载量超过 2 亿。

              公司定期上线实时运营活动，包括限时锦标赛、季节主题和特殊挑战关卡，以维持日活参与并推动增量 IAP 支出。应用内经济采用硬货币（金币）模型，玩家以 $0.99 到 $99.99
              的价格点购买金币包或道具组合。所有购买均通过 Apple App Store 和 Google Play 处理；截至 2026 年 5 月，Dream Games 没有宣布直接网页商店。

              第二款产品 Royal Kingdom 经过从 2023 年 4 月开始、持续 19 个月的软启动，于 2024 年 11 月 21 日全球上线。Royal Kingdom 共享三消核心机制和类似建造元结构，以
              King Richard 为主角，并拥有不同的城堡与视觉设计。两款产品同属 Dream Games 的 “Royal” 品牌系列，并在没有明显蚕食 Royal Match 既有受众的情况下并存。
