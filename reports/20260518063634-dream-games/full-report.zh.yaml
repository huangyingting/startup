      - number: '5.3'
        title: 开发流程
        blocks:
          - type: paragraph
            body: >-
              Dream Games 的开发流程高度依赖数据科学和 A/B 测试。这套方法来自创始团队在 Peak Games 打磨 Toon Blast 和 Toy Blast
              的直接经验。每个新关卡都会通过分析完成率、星级数和道具使用情况来校准，样本来自庞大的实时玩家群体。让玩家推进过快或失败率过高的关卡，会在大范围发布前继续迭代。行业分析师持续把这种关卡设计与玩家行为分析之间的数据闭环，视为
              Dream Games 的核心运营能力和竞争差异点。

              公司设有专门关卡设计团队，并由数据科学家监控实时玩家队列指标。A/B 测试变体会投放到实时玩家分群，用于比较关卡配置、视觉处理和 IAP 报价位置，再决定是否推向全球。结果是，截至 2025 年 11
              月，Royal Match 已累积 12,400+ 个关卡，并保持大约每两周新增一批关卡的节奏。

              Dream Games 在全球发布前一直采用分阶段区域软启动方法。Royal Match 先在有限市场测试，据报道包括英国和加拿大，用于验证核心指标，随后在 2021 年 3 月全球上线。Royal
              Kingdom 也沿用同一方法：2023 年 4 月软启动，直到 2024 年 11 月才全球发布。即便按行业标准看，Royal Kingdom 19
              个月的软启动周期也很长，说明团队需要大量迭代时间才能达到内部发布质量门槛。

              用户获取策略以大规模精品创意投放为核心。Dream Games 投放过由名人出镜的营销活动，包括 Simon Cowell 参与的高知名度系列，目标是把品牌认知拉出核心休闲游戏用户圈。这些活动显示 Dream
              Games 愿意为 UA 创意砸重金，也符合外界估计公司年度 UA 支出 $400–600M 的量级。CI/CD 系统、代码审查流程和自动化测试管线等内部开发工具链细节未公开披露。
