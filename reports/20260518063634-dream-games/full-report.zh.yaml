      - number: '3.2'
        title: 竞争对手画像
        blocks:
          - type: paragraph
            body: >
              Candy Crush Saga 由 King 发行；King 是 Activision Blizzard 全资子公司，而 Activision Blizzard 已于 2023 年 1 月被 Microsoft
              收购。它是最重要的直接竞争对手。Royal Match 上升前，Candy Crush 曾多年位居全球收入最高移动游戏；它仍是强劲产品，拥有极深关卡库（网页版本 15,000+ 关；移动端 8,900+
              关）、超过 27 亿累计下载，以及习惯深度嵌入的成熟玩家基础。BusinessOfApps 估计 Candy Crush Saga 在 2024 年创造约 $700M-$900M 消费者总支出，低于超过 $1B
              的峰值。Microsoft 背书提供几乎无限的 UA 资金，并可能带来 Xbox 和 Game Pass 生态中的交叉推广整合。King 还运营 Candy Crush Soda Saga
              和其他组合产品，持续强化品牌。


              Playrix 是私营、爱尔兰注册、乌克兰创始的公司，按组合收入看是第二大三消开发商。Gardenscapes 和 Homescapes 合计估计每年创造 $900M-$1.1B
              消费者总支出。两款游戏都把元装饰层叠加在三消核心机制之上，Gardenscapes 是花园修复，Homescapes 是豪宅翻新；Royal Match 采用并改进了这一设计模式，将其变成城堡修复。俄罗斯
              2022 年入侵乌克兰后，Playrix 将公司总部从乌克兰迁至爱尔兰。据报道，Playrix 在全球约有 3,000-4,000 名员工。


              Peak Games 是土耳其开发商，2020 年以约 $1.8B 被 Zynga 收购，是 Toon Blast 和 Toy Blast
              的发行商；这两款休闲游戏使用颜色匹配爆破物理，而不是传统交换式三消机制。Zynga 于 2022 年被 Take-Two Interactive 以约 $12.7B 收购后，Peak Games 作为 Zynga
              工作室在 Take-Two 内运营。Toon Blast 和 Toy Blast 合计估计每年创造 $500-700M 消费者总支出，并受益于 Zynga 的 UA 基础设施和 Take-Two
              的资产负债表。Peak Games 是 Dream Games 最接近的本国同行；两者都是土耳其移动游戏工作室，但它们的产品在休闲游戏钱包中直接竞争。
