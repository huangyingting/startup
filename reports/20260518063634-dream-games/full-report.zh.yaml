      - number: '4.5'
        title: 财务缺口与尽调结论
        blocks:
          - type: paragraph
            body: >-
              Dream Games 是私营公司，没有义务披露财务结果。以下指标无法从公开来源获得，构成核心数据室请求：（1）经审计或管理口径 P&L；（2）精确 DAU 和 MAU 及地域分拆；（3）ARPU 和
              ARPPU；（4）按安装批次划分的队列 LTV 曲线和回本周期数据；（5）按渠道和地域划分的 UA 投放；（6）Royal Kingdom 相对 Royal Match 的独立财务表现；（7）现金余额和烧钱速度。


              收入质量评估：按移动游戏标准，Royal Match 收入质量较高。IAP 是实时现金收取，没有递延收入，没有规模化退款风险，没有客户集中，也没有 Apple/Google 双寡头之外的渠道风险。不过，30%
              平台费暴露构成结构性利润率上限；完全依赖两个分发守门人也形成集中风险，一旦任一平台实质改变费率结构或发现算法，风险会释放。


              利润率路径：只要 Royal Match 仍位于收入榜前十，业务应能维持净收入口径 40–60% EBITDA 利润率。如果 Royal Match 因竞争替代或玩家流失而收入下滑，为稳定收入所需的 UA
              再投资会压缩利润率。Royal Kingdom 的 UA 爬坡需要大量前期投入，回报时点不确定；这是近期最主要的利润率风险。


              资本强度结论：低。商业模式没有库存、没有应收账款、没有物理基础设施资本开支，也没有合同制造。主要资本配置决策是 UA 投放；这项支出具有自由裁量属性，并可在数月内逆转。
