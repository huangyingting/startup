  - id: FV003
    title: 估值与回报区间
    type: range
    layout: wide
    summary: 在悲观、基准、乐观情景下的示意企业价值区间，对比 2022 年 1 月 C 轮的陈旧估值标记，以及可比移动游戏 M&A 交易中位数。$5B–$7B 的有条件买入入场区间位于基准情景低端，高于可比中位数底线。
    data:
      items:
        - label: 悲观情景估值
          low: 3000
          high: 4500
          unit: $M
          detail: 3–3.75× 估计 2024 年悲观情景收入约 $1.2B；假设参与度放缓和博彩诉讼逆风
        - label: 基准情景估值
          low: 5000
          high: 8000
          unit: $M
          detail: 按 2024 年基准情景收入估算 $1.6B，取 3.1–5×；锚定 King/Supercell 收购可比区间
        - label: 乐观情景估值
          low: 8000
          high: 14000
          unit: $M
          detail: 按 2024 年乐观情景收入估算 $2.0B，取 4–7×；前提是 Royal Kingdom 带来贡献，且多游戏组合获得重估
        - label: 最近披露估值（2022 年 1 月）
          low: 2750
          high: 2750
          unit: $M
          detail: Series C 轮投后估值；相对 2024 年收入轨迹已严重过时；相当于 2024 年估算 IAP 净收入的 1.9×
        - label: 可比并购中位数（King/Zynga/Supercell/Rovio）
          low: 4000
          high: 6000
          unit: $M
          detail: 对 $1.3B–$1.5B 可比收入情景套用 3–4.5× 收入倍数后的中位数；由 2016–2023 年四笔收购混合得出
