chapters:
  - number: 1
    title: 公司概况
    sections:
      - number: '1.1'
        title: 身份与商业模式
        blocks:
          - type: paragraph
            body: >
              Dream Games 是一家土耳其移动游戏工作室，总部在伊斯坦布尔，并在伦敦设有第二办公室。公司成立于 2019 年，商业模式完全围绕免费游玩（F2P）移动解谜游戏展开，靠应用内购买（IAP）变现。截至
              2026 年 5 月，所有公开披露收入均来自 IAP；任何公开来源都没有披露广告收入或订阅收入层。工作室旗舰产品 Royal Match 是一款 iOS 和 Android 三消解谜游戏，以 King
              Robert 为核心角色，基于 Unity 引擎开发。Royal Match 于 2021 年 3 月全球上线，很快成为休闲解谜细分赛道收入最高的产品之一。第二款产品 Royal Kingdom（主角为 King
              Richard）于 2023 年 4 月软启动，并在 2024 年 11 月 21 日全球上线。


              Dream Games 将自己定位为高品质休闲游戏开发商，战略上刻意坚持单一游戏重心，与大型同行常见的多产品策略形成对比。公司创始人几乎全部来自 Peak Games；后者是以 Toon Blast 和 Toy
              Blast 闻名的土耳其工作室。Dream Games 在新品牌下复制并延展了 Peak 的三消经验。Dream Games 的商业模式靠三件事撑起：深度关卡内容（据报道 Royal Match
              有数千个关卡）、推动 IAP 支出的递进式难度曲线，以及大规模用户获取（UA）投放；UA 估计是公司最大的成本项。伦敦办公室被认为负责欧洲运营，但公司没有正式披露地域组织架构。


              按 GamesIndustry.biz 年度数据，截至 2024 年，Dream Games 按收入位列全球第七大移动游戏开发商。美国约贡献 55% 收入，印度约贡献 14%
              下载量。英国、日本、德国和韩国也被列为关键收入市场。
