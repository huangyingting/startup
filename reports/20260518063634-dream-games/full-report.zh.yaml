      - number: '4.3'
        title: 成本结构与毛利率
        blocks:
          - type: paragraph
            body: >-
              Dream Games 的成本结构由三类主导：用户获取（UA）投放、人员成本和平台费。平台费已经在计算发行商净收入时扣除。在剩余成本基础中，UA 是最大单项，估计每年 $400–600M。约 600–700
              名员工（工程、游戏设计、数据科学、营销和运营）的人员成本估计每年 $100–200M，与以伊斯坦布尔为锚点的资深工程薪酬水平一致。基础设施和云成本估计每年 $10–30M。


              扣除平台费后的 2024 年净收入约 $1.47B。扣除估计 $400–600M UA 投放，以及 $110–230M 人员/基础设施成本，可得估计 EBITDA 约 $640M–$960M，意味着净收入口径
              EBITDA 利润率为 44%–65%。这与规模化移动游戏在多数玩家队列已经超过 UA 回本期后通常实现的 40–60% 毛利率区间一致。行业分析师普遍报道 Dream Games
              已盈利；但没有公开财务披露可确认精确数字。


              营运资本在有利意义上是结构性为负：所有 IAP 收入在交易发生时预先收取，没有应收账款。资本开支极低；Dream Games
              不拥有物理基础设施，运行在云计算上，内容生产管线本质上是软件劳动力。这造就了一个高现金生成、资本强度有限的业务；UA 再投资周期之外不需要大量资本投入。
