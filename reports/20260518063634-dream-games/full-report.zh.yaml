          to: j4
        - from: j3
          to: j6
        - from: j4
          to: j3
        - from: j5
          to: j6
    approximationNotes: 工作流来自公开玩法描述、用户评论和分析师拆解。确切教程长度、难度曲线参数和 IAP 提示阈值属于 Dream Games 专有数据，未公开披露。
