  - number: 7
    title: 风险
    sections:
      - number: '7.1'
        title: 法律与监管风险
        blocks:
          - type: paragraph
            body: >-
              Dream Games 处在移动游戏、应用内购买和全球数字商业监管的交汇处；自 2020 年以来，这一组合持续吸引监管关注。最直接的法律敞口是 2024 年 8 月在华盛顿州提起的集体诉讼，指控 Royal
              Match 的游戏内金币机制构成华盛顿州反赌博法规下的非法赌博。原告主张，玩家用真钱购买金币，再用金币获取游戏内道具，但无法保证获得哪些道具，因此构成赌博。案件结果未知，财务敞口未披露。


              在联邦层面，FTC 多次表达对手游战利品箱机制的担忧。2023 年，FTC 发布新闻稿，审视数字游戏中的诱导式设计和战利品箱支出；2024 年 12 月，FTC 又发布更广泛的手游实践报告。截至 2026 年 5
              月，Dream Games 未被任何 FTC 执法行动单独点名，但监管轨迹偏负面：该机构正在建立记录，未来可能支持针对免费游戏战利品箱机制的规则制定。


              国际上，欧盟《数字服务法》于 2022 年 10 月通过，并自 2024 年 2 月起全面生效，为欧盟数字服务引入透明度和消费者保护义务。比利时在 2018 年根据 Gaming Commission
              认定战利品箱构成赌博后，禁止电子游戏中的战利品箱；荷兰对混合战利品箱与付费内容的游戏作出类似裁定。UK Gambling Commission
              审查战利品箱，并发布结论，呼吁强制年龄验证和支出限制。California AB-2426（2022）提议强制披露战利品箱。虽然这些措施尚未实质限制 Royal Match
              收入，但累计监管轨迹正走向更高透明度和潜在货币化限制，尤其针对未成年用户基础较大的游戏。


              Epic v. Apple（2021）之后，Apple App Store 的反引流规则仍在执行；该案并未要求 Apple 允许外部支付链接。随后 2024 年的一项裁定要求 Apple
              在美国允许部分应用外链接，但对 Dream Games 的实际影响可以忽略：公司未宣布网页商店替代方案，标准 30% 平台费仍在执行。GDPR、COPPA 和 CCPA
              合规是持续义务，不是生存性问题，但需要长期法律投入。
