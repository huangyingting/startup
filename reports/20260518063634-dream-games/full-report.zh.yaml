      - number: '2.4'
        title: 增长驱动与约束
        blocks:
          - type: paragraph
            body: >
              全球移动游戏市场有几项结构性增长驱动。大型新兴市场的智能手机渗透率仍在上升，尤其是印度、东南亚、巴西和撒哈拉以南非洲，这扩大了可触达的休闲玩家基础。印度已贡献约 14% Royal Match
              下载量，随着可支配收入提高，仍有可观未开发变现空间。25-55 岁女性人群是 Dream Games 的核心用户，这一人群的绝对规模和数字消费意愿都在增长。代际队列效应显示，今天 30
              岁的休闲玩家会随着年龄增长继续玩休闲游戏，从而把该赛道核心受众支撑到 2030 年及以后。


              这些驱动也受到明显约束。Apple 于 2021 年推出 App Tracking Transparency（ATT）框架，通过限制 iOS 跨应用追踪，降低移动广告定向精度。这显著抬高了依赖 Facebook
              IDFA 定向的开发商的 UA 成本；这一冲击覆盖全行业，但对 UA 预算更小、吸收高 CPI 能力更弱的中腰部开发商尤其明显。Dream Games 作为规模玩家，且拥有成熟 UA
              能力，可能比小竞争对手适应得更好，但 iOS UA 效率受到的结构性影响仍然存在。Google 面向 Android 的 Privacy Sandbox 变化在 2024-2026 年推出，在 Android
              侧引入类似动态。上升的 UA CPI 压缩所有休闲游戏开发商的利润率，也为新进入者设置壁垒。


              三消赛道的市场饱和是真实约束：Royal Match、Candy Crush、Gardenscapes、Homescapes、Toon Blast 和 Toy Blast
              都拥有可观玩家基础，发达市场中的高价值休闲玩家池正在被积极争夺。Dream Games 推出 Royal Kingdom 是在扩大工作室自身内部市场份额，而不是只依赖 Royal Match
              生命周期。不过，Royal Kingdom 会在多大程度上蚕食 Royal Match 玩家基础，仍是公开证据无法回答的尽调问题。
