      - number: '4.4'
        title: 资本结构与充足性
        blocks:
          - type: paragraph
            body: >-
              Dream Games 已在多轮融资中披露约 $255M 股权融资；完整融资情况见公司概况章节。最近一轮是 2022 年 $155M Series C，由 IVP 领投，Balderton Capital 和
              Index Ventures 参投，披露投后估值约 $2.75B。2022 年以来没有宣布新融资。


              鉴于 2024 年估计 EBITDA 为 $640M–$960M，且资本开支很低，Dream Games 几乎可以肯定依靠内部现金生成自我供血。没有公开证据显示公司有债务融资、循环信贷额度或项目融资义务。2022
              年资本的主要披露用途是加速 Royal Match 用户获取，并资助新游戏开发；后者最终落地为 Royal Kingdom。


              Dream Games 没有宣布 IPO，也没有公开表示下一轮融资。IVP、Balderton 和 Index Ventures 都是长周期成长股权投资者，典型持有期为 5–10
              年；短期内没有结构性压力迫使退出。
