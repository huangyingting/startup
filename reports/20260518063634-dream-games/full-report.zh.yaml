      - number: '2.3'
        title: 买方与玩家分层
        blocks:
          - type: paragraph
            body: >
              移动休闲游戏变现依赖一个二元用户结构：大量不付费或低付费玩家提供社交织物和社区（赠送生命、参与活动竞争），少量但高价值付费用户（通常为月活用户的 2-5%）贡献几乎全部 IAP
              收入。发达市场头部休闲游戏的日活用户平均收入（ARPDAU）在 $0.10 到 $0.40 之间，意味着高度参与付费用户的年收入为
              $36-$150。高价值付费用户（“鲸鱼用户”）支出高得多；研究显示，许多免费游玩游戏中，前 5% 付费用户贡献 50-70% IAP 收入。


              三消游戏核心人群偏女性（55-65%），年龄集中在 25-54 岁，其中 35-54
              岁群体尤其突出。该人群可支配收入更高，习惯性参与更强，流失率低于更年轻的超休闲人群。美国玩家价值异常高：更高的智能手机渗透率、信用卡使用率和数字交易接受度，推动美国贡献超额收入。对 Dream Games
              来说，美国约 55% 收入集中体现了这一人口结构现实，但如果美国 UA 成本上升，或核心人群随年龄增长支出下降，也会形成集中风险。


              在移动游戏语境下，“买方”就是玩家本人；不存在企业销售流程或机构采购。这种 B2C 结构意味着 Dream Games 的收入模型完全依赖通过 UA
              投放、应用商店可发现性、口碑和品牌广告获取自然玩家。公司没有披露任何网页商店，因此不同于部分在 Epic v. Apple 之后探索直接购买机制的竞争对手，Dream Games 无法绕开 30% 应用商店费用。
