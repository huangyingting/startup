      - number: '8.2'
        title: 估值框架
        blocks:
          - type: paragraph
            body: >-
              截至 2026 年 5 月，三种估值方法共同指向 Dream Games $5B–$7B 的基准企业价值区间。


              可比 M&A 交易提供主要锚点。2016–2023 年五笔最相关手游收购，在交易完成时显示 3–5× 收入倍数（见 TV004）。Activision 于 2016 年以 $5.9B 收购 King，当时
              King 年收入约 $1.4B，倍数为 4.2×，且 King 增长已明显放缓。Tencent 于 2016 年以 $8.6B 将 Supercell 私有化，收入约 $2.3B，倍数 3.7×，反映
              Supercell 的多游戏多元化溢价。Take-Two 于 2022 年以 $12.7B 收购 Zynga，LTM 收入约 $2.8B，倍数 4.5×，含控制权溢价。Playtika 2021 年 IPO
              估值约 $11B，对应 $2B 收入（5.5×），提供公开市场参照。Sega 于 2023 年以 $775M 收购 Rovio，收入约 $260M（3×），是负面离群值，反映游戏互动下滑和增长较低。


              Dream Games 在各个维度都不同于 Rovio 案例：Royal Match 收入在 2022–2024 年从约 $400M 增至约 $1.46B（IAP 净额），CAGR 约 91%，说明相对
              Rovio 3× 基线应有溢价。King 类比（单一旗舰游戏、美国收入集中、收购时年收入运行率 $1.4B）结构上最可比，暗示 4–5× 倍数。套用 Dream Games 2024 年 $1.46B IAP
              收入，得到 $5.8B–$7.3B，与 $5B–$7B 基准情景一致。折现现金流交叉检查假设 2025–2026 年净收入增长 15%、EBITDA 利润率 25%、5 年后以 15× EBITDA 退出，并以
              20% 折现，得到现值 $4B–$6B，进一步框定基准区间。


              估值敏感性矩阵（FV002）展示了企业价值如何随收入假设和 EV/收入倍数变化。以 $1.6B 基准收入、3× 计算，EV = $4.8B；同一收入 5× 为 $8B；7× 为 $11.2B。$5B–$7B
              的有条件买入区间大致对应估计 2024 年总收入的 3.5–5×，是纪律性入场点；如果 Royal Kingdom 扩大规模，倍数重估向 King/Zynga 先例靠拢，则仍保留上行空间。


              2022 年之后游戏行业倍数压缩是结构性逆风。疫情时期估值见顶后，纳斯达克上市游戏公司的 EV/收入倍数到 2023 年底收缩 40–60%。不过 Dream Games
              强劲的私有现金生成能力、以及不存在被迫退出时间表，让它在一定程度上隔绝公开市场倍数波动。战略收购方——尤其是平台方（Apple、Microsoft、Amazon）、寻求移动端敞口的大型发行商，或大市值游戏整合者——可以基于
              Royal Match 已验证的现金流特征，合理化 5–7× 溢价。
