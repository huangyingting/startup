        - 五位联合创始人保持完整（2026 年 5 月）；累计融资 $467.5M，但 2022 年 1 月以来未再需要新资本 —— 36+ 个月自筹资金运营，说明现金生成能力强
        - CEO Soner Aydemir 没有公开继任计划；产品愿景全部集中在创始团队；任何联合创始人离任都是严重执行风险
        - 中高 — 关键人物风险足以影响生死，但创始人仍在岗
      - - 单一游戏集中度
        - Royal Match 贡献估算收入的 >90%；Royal Kingdom 是唯一已知在研游戏
        - 一次造成参与度下滑的事件（算法变化、竞争者进入、监管禁止机制）会立刻损害 >90% 的企业价值
        - 高 — 近期没有多元化缓冲；Royal Kingdom 仍早期且规模化未经验证
      - - 赌博诉讼风险
        - Washington 州集体诉讼（2024 年 8 月）指控 Royal Match 金币机制违反州赌博法律；公司未公开评论财务敞口
        - 如果集体认证成立且原告胜诉，财务敞口可能重大；更关键的是，不利裁决可能形成先例，迫使全球调整游戏机制，直接伤害变现
        - 高 — 尾部风险概率低，但财务和运营后果严重
      - - 估值入场价差
        - >-
          2022 年 $2.75B 的估值标记已经陈旧，无法反映估计 2024 年 $1.46B+ 净 IAP 收入；按 2024 年收入 3–5× 计算，隐含 EV 为
          $4.4B–$7.3B，相比陈旧标记形成结构性有吸引力的入场点
        - 没有老股交易或按市价重估确认最新估值；在倍数压缩环境下，被迫 IPO 或降价融资可能重置更低预期
        - 中 — 若没有新的市场信息，这个价差真实存在；但 2022 年后游戏公司倍数压缩，可能部分抵消该价差
    notes: 反向逻辑严重性反映当前证据质量。赌博诉讼敞口为定性评估；公开来源无法支持财务估算。收入增长率基于第三方估算计算，存在 ±15% 不确定性。
