  - id: FR002
    title: 风险传导地图——因果链图
    description: DAG 展示主要风险事件如何在 Dream Games 业务系统中传导。节点代表风险状态或业务结果；边代表因果传导路径。
    type: dag
    sourceRefs:
      - SR001
      - SR003
      - SR015
      - SR019
      - SR022
      - SR026
      - SR029
    claimRefs:
      - CR001
      - CR009
      - CR010
      - CR016
      - CR022
    data:
      nodes:
        - label: 博彩 / 开箱机制监管落地
          note: Washington 集体诉讼、FTC 执法、欧盟 / 英国对金币机制的监管限制
        - label: IAP 机制受限或被禁
          note: 受影响司法辖区内，Royal Match 金币系统被迫改版
        - label: Royal Match 总收入下降
          note: 主要收入面临风险；占 Dream Games 总收入 >90%
        - label: 平台费上调（Apple/Google）
          note: 费用升至 30% 以上，或对 IAP 类别施加新限制
        - label: 净利润率承压
          note: 平台分成提高；发行商净收入缩水
        - label: 盈利能力和自我造血能力下降
          note: EBITDA 下滑；UA 再投资能力受限
        - label: UA 成本通胀（CPI 上升）
          note: iOS ATT、算法变化、Meta/Google 政策调整抬高有效 CPI
        - label: UA 投放 / 收入比恶化
          note: 更高 CPI 使 LTV/CAC 比率低于可接受阈值
        - label: 玩家信任和品牌受损
          note: 博彩指控或误导性广告执法带来负面报道
        - label: 关键人离任（CEO）
          note: Soner Aydemir 离任且未指定继任者
        - label: 产品战略受扰
          note: 关卡设计哲学和变现决策失稳
        - label: 被迫融资或折价 M&A 退出
          note: 现金生成低于运营需要，被迫以不利条款发生流动性事件
