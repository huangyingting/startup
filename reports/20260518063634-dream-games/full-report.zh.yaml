            title: 单一产品集中是关键生存风险
            body: >-
              Dream Games 超过 90% 收入来自 Royal Match。Royal Kingdom 首个不完整年度估计产生 $20–50M，而 Royal Match 为 $2.1B，代表不到 3%
              的多元化。玩家互动下降、战利品箱机制遭监管限制，或来自 Candy Crush Saga、Monopoly Go
              的持续竞争压力，都可能在没有抵消业务单元的情况下触发收入快速坍塌。投资人应在交割前要求按季度披露产品间收入拆分，并把 Royal Kingdom 里程碑门槛写入投资契约。
