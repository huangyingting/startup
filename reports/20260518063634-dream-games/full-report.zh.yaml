              - CV019
      - number: '8.4'
        title: 尽调缺口与否决触发器
        blocks:
          - type: paragraph
            body: >-
              公开来源仍有五类证据在结构上不可得，每一类都是投入资本前必须解决的重大缺口（完整尽调清单见 TV006）。


              第一，经审计财务报表。本章引用的所有收入数字都来自 Sensor Tower、AppMagic、MobileGamer.biz 及同类来源的第三方分析师估计。这些估计在可比公司披露实际数据时，历史上存在
              ±10–20% 偏差。没有经审计 P&L、资产负债表和现金流量表——尤其没有确认公司间转移（Dream Games 的 Istanbul 实体 vs. 任何集团控股结构）——就无法给出高置信度利润率或
              EBITDA 估计。三轮累计 $467.5M 融资尚未与披露用途核对。


              第二，股权结构表和优先股堆叠。Dream Games 的投资人包括 Index Ventures、IVP 和 Makers Fund，横跨三轮融资。清算优先权条款、反稀释条款、拖售权，以及任何共同投资人 MFN
              条款，在公开来源中完全未知。在 $5B–$7B 入场交易中，清算优先权悬顶可能显著改变普通股持有人的股权经济。


              第三，Royal Kingdom 业绩数据。该游戏在软启动产生约 $20M 后，于 2024 年 11 月全球上线。美国市场是 55%
              收入驱动因素，却被排除在软启动之外；没有第一方留存和货币化队列数据，就无法评估该市场是否会像 Royal Match 一样响应。


              第四，赌博诉讼财务敞口。2024 年 8 月提起的华盛顿州集体诉讼仍在进行，但尚无公开法院裁决、集体认证或和解要求。没有案件证据开示或损害赔偿估计，财务敞口完全无法量化。


              否决触发器列于 TV005。最重要的近期触发器是 Royal Match 月度 IAP 净收入连续两个季度同比下降超过 15%，这将是结构性互动衰退而非季节性波动的信号。华盛顿赌博案出现不利集体认证裁定，或
              Supreme Court / 上诉法院裁定从根本上将类似机制重新定性为赌博，也会构成立即否决触发器，要求暂停尽调并重新评估监管风险框架。
