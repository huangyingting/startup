company:
  name: Dream Games
chapter:
  number: 7
  title: Risks
  summary: >-
    Dream Games faces a concentrated set of risks anchored in four themes. First, legal and regulatory exposure:
    a Washington state class action filed in August 2024 alleges Royal Match violates gambling laws; the FTC has
    published multiple reports scrutinising mobile-game loot boxes; Belgium and the Netherlands have already banned
    certain loot-box formats; and EU/UK regulators are actively reviewing the issue. Second, single-title
    concentration: more than 90% of revenue derives from Royal Match, making engagement decline an existential event.
    Third, platform dependency: Apple and Google extract approximately 30% of gross consumer spend; neither Epic v.
    Apple (2021) nor subsequent rulings have materially reduced this toll. Fourth, user-acquisition cost inflation:
    industry CPIs rose 20–30% 2021–2023 and Dream Games is estimated to spend $400–600M annually on UA. Turkey's
    macro instability is a partial offset (cost advantage) but also a governance and key-person concentration risk.
    Royal Kingdom's execution trajectory remains the primary near-term strategic question.

sections:
  - id: section-R-1
    title: Legal & Regulatory Risks
    body: >-
      Dream Games operates at the intersection of mobile gaming, in-app purchases, and global digital commerce
      regulation — a combination that has attracted sustained regulatory attention since 2020. The most immediate
      legal exposure is a class action lawsuit filed in August 2024 in Washington state alleging that Royal Match's
      in-game coin mechanic constitutes illegal gambling under Washington anti-gambling statutes. The plaintiff argues
      that coins purchased with real money and used to acquire in-game boosters constitute gambling because players
      cannot guarantee which boosters they receive. The outcome is unknown and financial exposure is undisclosed.


      At the federal level, the Federal Trade Commission has repeatedly signalled concern about loot-box mechanics in
      mobile games. In 2023 the FTC published a press release examining dark patterns and loot-box spending in digital
      gaming, and in December 2024 the FTC issued a broader report on mobile gaming practices. While Dream Games has
      not been individually named in any FTC enforcement action as of May 2026, the regulatory trajectory is negative:
      the agency is building a record that could support rulemaking targeting loot-box mechanics in free-to-play games.


      Internationally, the EU Digital Services Act enacted October 2022 and fully effective since February 2024
      introduces transparency and consumer-protection obligations for digital services in the EU. Belgium banned loot
      boxes in video games in 2018 following a Gaming Commission finding that they constitute gambling; the Netherlands
      reached a similar ruling for games mixing loot boxes with paid content. The UK Gambling Commission reviewed loot
      boxes and published findings calling for mandatory age verification and spending limits. California AB-2426 (2022)
      proposed mandatory loot-box disclosures. While none of these has yet materially constrained Royal Match revenue,
      the cumulative regulatory trajectory is toward greater transparency and potential monetisation restrictions —
      particularly for games with significant under-18 user bases.


      Apple App Store anti-steering rules remain in force following Epic v. Apple (2021), which did not require Apple
      to allow external payment links. A subsequent 2024 ruling required Apple to permit some out-of-app links in the
      US, but the practical effect for Dream Games has been negligible: no web-shop alternative has been announced and
      the standard 30% platform fee remains operative. GDPR, COPPA, and CCPA compliance represent ongoing obligations
      that are not existential but require sustained legal investment.
