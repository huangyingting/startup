callouts:
  - calloutType: risk
    title: "Single-Title Concentration Is the Critical Existential Risk"
    body: >-
      More than 90% of Dream Games revenue derives from Royal Match. Royal Kingdom generated an estimated
      $20–50M in its first partial year versus Royal Match's $2.1B — representing under 3% diversification.
      A player-engagement decline, regulatory restriction on loot-box mechanics, or sustained competitive pressure
      from Candy Crush Saga or Monopoly Go could trigger a rapid revenue collapse with no offsetting business
      unit. Investors should require quarterly revenue breakdown between titles and define Royal Kingdom milestone
      thresholds as investment covenants before close.
    claimRefs:
      - CR010
      - CR011
      - CR016
      - CR017

  - calloutType: risk
    title: "Financial Opacity Compounds Every Other Risk"
    body: >-
      Dream Games does not disclose audited financials, LTV cohort curves, UA efficiency data, or geographic
      revenue splits. Every risk assessment in this chapter rests on analyst estimates rather than verified data.
      The $2.75B January 2022 valuation is over four years stale; there is no market mechanism to validate
      current fair value. An investor transacting on these estimates takes on model risk in addition to every
      operational and regulatory risk identified above.
    claimRefs:
      - CR026
      - CR027
      - CR044

