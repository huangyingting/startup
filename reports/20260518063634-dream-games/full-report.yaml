  - id: TV002
    title: Thesis / Anti-Thesis Table
    columns:
      - thesis_element
      - supporting_evidence
      - anti_thesis
      - severity_of_counter
    rows:
      - - Revenue growth trajectory
        - >-
          Net IAP revenue grew from ~$400M (2022) to ~$1.46B (2024), a 91% CAGR; gross consumer spend reached $3.9B
          cumulatively by early 2025
        - >-
          Growth rate is decelerating: 2022→2023 was ~130%, 2023→2024 was ~57%; market saturation could accelerate
          further deceleration in 2025–2026
        - High — deceleration trajectory is the single most important watchpoint
      - - Market leadership position
        - >-
          Royal Match ranked #2 globally by mobile revenue in October 2024; led US iOS gross revenue charts 17+
          consecutive months; cumulative downloads exceed 200M
        - >-
          Leadership is concentrated in a single genre (casual match-3) dominated by King's Candy Crush; structural
          share shift unlikely without multi-game portfolio
        - Medium — niche dominance is durable but limits expansion optionality
      - - Founder quality and capital efficiency
        - >-
          Five co-founders remain intact (May 2026); raised $467.5M total but has not needed new capital since January
          2022 — 36+ months of self-funded operations suggest strong cash generation
        - >-
          No public succession plan for CEO Soner Aydemir; entire product vision concentrated in founding team;
          departure of any co-founder is a severe execution risk
        - Medium-High — key-person risk is existential but founders are still in seat
      - - Single-game concentration
        - Royal Match generates >90% of estimated revenue; Royal Kingdom is the only known pipeline game
        - >-
          A single engagement-declining event (algorithm change, competitive entry, regulatory ban of mechanics) would
          immediately impair >90% of enterprise value
        - High — no near-term diversification buffer; Royal Kingdom is early and unproven at scale
      - - Gambling litigation risk
        - >-
          Washington state class action (August 2024) alleges Royal Match coin mechanic violates state gambling laws;
          company has not commented publicly on financial exposure
        - >-
          If class is certified and plaintiffs succeed, financial exposure could be material; more critically, an
          adverse ruling could set precedent that forces game mechanic changes globally, directly impairing monetisation
        - High — tail risk with low probability but severe financial and operational consequence
      - - Valuation entry gap
        - >-
          2022 valuation mark of $2.75B is stale versus estimated 2024 revenues of $1.46B+ net IAP; at 3–5× 2024
          revenues, implied EV of $4.4B–$7.3B creates a structurally attractive entry vs. stale mark
        - >-
          No secondary transactions or mark-to-market have confirmed updated valuations; a forced IPO or down-round in a
          compressed multiple environment could reset expectations lower
        - >-
          Medium — absent new market information, the gap is real; but compressed post-2022 gaming multiples mean the
          gap may be partially offset by market-wide multiple contraction
    notes: >-
      Anti-thesis severity reflects current evidence quality. Gambling litigation exposure is qualitatively assessed; no
      financial estimate is supportable from public sources. Revenue growth rate computed from third-party estimates
      with ±15% uncertainty.
