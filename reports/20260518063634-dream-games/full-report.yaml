              - CP033
          - type: callout
            title: Monopoly GO Demonstrates Adjacent Category Disruption Risk
            body: >-
              Monopoly GO's $2B+ revenue in its first year (2023) shows that a new casual game with a licensed IP and
              aggressive UA spend can reach match-3 scale within 12-18 months. While Monopoly GO's mechanic does not
              directly displace match-3 titles, it validates that the casual female 25-55 demographic is reachable by
              new entrants with the right IP and UA resources—suggesting the category is not permanently closed to
              disruption.
