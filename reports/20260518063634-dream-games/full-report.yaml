      - number: '2.4'
        title: Growth Drivers and Constraints
        blocks:
          - type: paragraph
            body: >
              The global mobile gaming market has several structural growth drivers. Smartphone penetration in large
              emerging markets—particularly India, Southeast Asia, Brazil, and Sub-Saharan Africa— is still growing,
              expanding the addressable casual player base. India already drives ~14% of Royal Match's downloads,
              suggesting meaningful untapped monetisation as disposable incomes rise. The 25-55 female demographic—Dream
              Games' core—is growing in both absolute size and willingness to spend digitally. Generational cohort
              effects suggest that today's 30-year-old casual gamers will remain casual game players as they age,
              sustaining the segment's core audience through 2030 and beyond.


              Significant constraints temper these drivers. Apple's App Tracking Transparency (ATT) framework, launched
              in 2021, reduced the targeting precision of mobile ads by limiting cross-app tracking on iOS. This raised
              UA costs materially for developers that relied on Facebook IDFA-based targeting—an impact felt
              industry-wide but particularly by mid-tier developers with smaller UA budgets and less ability to absorb
              higher CPIs. Dream Games, as a scale player with sophisticated UA capability, likely adapted better than
              smaller competitors, but the structural impact on iOS UA efficiency remains. Google's Privacy Sandbox
              changes for Android, rolling out in 2024-2026, introduce a similar dynamic on the Android side. Rising UA
              CPIs compress margins for all casual game developers and create a barrier for new entrants.


              Market saturation in the match-3 segment is a real constraint: with Royal Match, Candy Crush,
              Gardenscapes, Homescapes, Toon Blast, and Toy Blast each holding substantial player bases, the pool of
              high-value casual players in developed markets is being actively contested. Dream Games' Royal Kingdom
              launch addresses this by expanding the studio's own internal market share rather than relying solely on
              Royal Match's lifecycle. However, the degree to which Royal Kingdom can cannibalise Royal Match's player
              base is a diligence question that remains unresolved from public evidence.
