  - number: 3
    title: Competitors
    sections:
      - number: '3.1'
        title: Match-3 Competitive Landscape Overview
        blocks:
          - type: paragraph
            body: >
              The match-3 casual mobile gaming segment is defined by a small group of highly scaled titles that
              collectively represent the majority of the sub-genre's revenue. Royal Match (Dream Games), Candy Crush
              Saga (King/Microsoft), Gardenscapes and Homescapes (Playrix), and Toon Blast and Toy Blast (Peak
              Games/Zynga) form the revenue-generating core. Together, these six games account for an estimated $4-7
              billion in annual gross consumer IAP spend. Royal Match achieved segment leadership by revenue in
              2023-2024, a historically significant displacement of Candy Crush Saga, which had held the top position
              for over a decade.


              The segment's structure is highly concentrated: the top six titles control the vast majority of match-3
              revenue, with the long tail of smaller match-3 games generating a minimal share. This oligopolistic
              structure creates both stability (high barriers for new entrants) and risk (the top players are all
              well-capitalised and backed by major gaming corporations, with the exception of Dream Games, which remains
              private). Microsoft's acquisition of Activision Blizzard in 2023— which brought King (Candy Crush
              publisher) into the Microsoft gaming portfolio—gives Candy Crush access to Xbox Game Pass ecosystems and
              corporate UA funding, materially strengthening its competitive position going forward.


              Adjacent competitive threats exist outside the match-3 sub-genre. Monopoly GO (Scopely), launched in 2023,
              generated over $2 billion in gross consumer spend in its first full year, becoming one of the
              fastest-growing casual mobile games of all time. While its board-game mechanic is distinct from match-3,
              Monopoly GO targets the same casual female demographic (25-55) and competes for the same share of mobile
              entertainment budget. Coin Master (Moon Active) similarly targets casual mobile payers with a
              spin-and-raid mechanic. These adjacent titles represent wallet competition rather than direct product
              substitutes.
