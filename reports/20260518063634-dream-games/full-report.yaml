      - number: '7.3'
        title: Market & Competitive Risks
        blocks:
          - type: paragraph
            body: >-
              Dream Games competes in the match-3 casual puzzle segment dominated by three franchises: Royal Match
              (ranked #1 or #2 globally by revenue in 2024), Candy Crush Saga (King/Activision), and Monopoly Go
              (Scopely, which reached $2B+ in cumulative revenue faster than any prior mobile game). The competitive
              dynamic is not zero-sum — all three titles can grow simultaneously in a large market — but the attention
              economy for casual gamers is finite, and new UA acquisition against well-established competitors is
              expensive.


              Candy Crush Saga has held the match-3 crown for over a decade with a franchise of 200+ titles and
              continuous content updates. Its parent company Activision Blizzard (now part of Microsoft) provides deep
              content and marketing resources. Scopely's Monopoly Go demonstrated in 2023–2024 that a new casual IP can
              displace incumbents rapidly given sufficient UA investment. The risk for Dream Games is not displacement
              by a single competitor but the normalisation of heavy UA spend as a competitive necessity — a dynamic that
              compresses long-run margins for the entire category.


              The Turkish lira has depreciated substantially against the USD since 2018, reducing Dream Games'
              Istanbul-based engineering and operational costs in dollar terms. This is currently a cost advantage —
              estimated at 30–50% below US or Western European equivalent staffing costs. However, TRY instability also
              creates wage-spiral risk: Turkish engineers increasingly demand USD-denominated compensation or emigrate.
              The IMF and World Bank project continued above-average inflation for Turkey in 2025–2026. Geographic
              revenue concentration in the US (approximately 55% of revenue) creates exposure to US regulatory and
              platform policy changes.
