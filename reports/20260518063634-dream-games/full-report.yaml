      - number: '6.2'
        title: Adoption & Traction Metrics
        blocks:
          - type: paragraph
            body: >-
              Royal Match launched in a limited soft-launch phase in the UK and Canada in late 2020, achieving
              approximately 200K DAU before its global release. The game went live globally in March 2021 and rapidly
              scaled to approximately 6M MAU within months of launch, making it one of the fastest-scaling casual mobile
              titles in the 2020s. Cumulative downloads reached 200M+ by 2024, with Appmagic estimating ~296M total
              installs across iOS and Android by late 2024, and Appfigures reporting gross lifetime consumer spend
              exceeding $3B as of April 2024. Revenue growth has been exceptional by any mobile benchmark: from
              approximately $400M in 2022, $932M in 2023, to an estimated $1.46B in 2024. October 2024 set a monthly
              record of ~$177M, ranking Royal Match #2 globally by monthly IAP revenue behind only Monopoly GO. The game
              has maintained a top-5 grossing position on the US App Store for over 30 consecutive months since late
              2022, a longevity that very few mobile titles achieve. Royal Match overtook Candy Crush Saga as the
              highest-grossing match-3 game globally in 2023 and reached the $3B lifetime revenue milestone faster than
              Rise of Kingdoms, Lords Mobile, and Slotomania did from their $2B marks. Royal Kingdom, Dream Games'
              second title, generated $20M+ during its soft-launch phase, suggesting the studio can replicate
              distribution success, though Royal Match remains the dominant revenue engine.
