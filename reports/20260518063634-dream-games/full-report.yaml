  - id: FI001
    title: Revenue model bridge
    type: flow
    layout: standard
    summary: >-
      How player activity in Royal Match converts into gross consumer spend, then into Dream Games net publisher
      revenue, and finally into estimated EBITDA. The 30% platform fee is the single largest structural deduction; UA
      spend is the largest discretionary cost.
    approximationNotes: >-
      All financial values are estimates derived from SensorTower/Appmagic gross consumer spend data and standard mobile
      game industry cost benchmarks. Dream Games has not confirmed any of these figures. The EBITDA range reflects
      uncertainty in UA spend.
    data:
      nodes:
        - id: player-spend
          label: Gross consumer spend
          value: ~$2.1B (2024)
          detail: Players purchase IAP within Royal Match; App Store and Google Play process all transactions.
          tone: positive
        - id: platform-fee
          label: Platform fee (Apple / Google)
          value: ~$630M (~30%)
          detail: Standard 30% store rake retained by Apple App Store and Google Play. Dream Games has no web shop.
          tone: warning
        - id: net-revenue
          label: Net publisher revenue
          value: ~$1.47B (est.)
          detail: Revenue recognised by Dream Games after platform deduction.
          tone: positive
        - id: ua-spend
          label: UA spend
          value: $400–600M (est.)
          detail: Largest cost item. Meta, Google, Apple Search Ads, and programmatic networks.
          tone: warning
        - id: people-infra
          label: People and infrastructure
          value: $110–230M (est.)
          detail: 600–700 employees; cloud infrastructure; content production.
          tone: neutral
        - id: ebitda
          label: Estimated EBITDA
          value: $640–960M (est.)
          detail: 44–65% EBITDA margin on net revenue. Consistent with scaled mobile game benchmark.
          tone: positive
      edges:
