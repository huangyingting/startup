      Enterprise value sensitivity to revenue scenario and EV/revenue multiple assumptions. Rows represent
      bear/base/bull revenue estimates for 2024 total revenue; columns show implied EV at 3×, 5×, and 7× multiples. The
      $5B–$7B conditional-buy band corresponds to base revenue at 3–5× multiple.
