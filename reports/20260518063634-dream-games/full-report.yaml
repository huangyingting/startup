      - number: '6.4'
        title: Customer Risks
        blocks:
          - type: paragraph
            body: >-
              Royal Match's customer base presents several structural risks that materially affect the investment
              thesis. The most critical is single-title concentration: Dream Games derives an estimated 90%+ of total
              revenue from Royal Match alone. Any sustained decline in Royal Match player engagement, triggered by
              content fatigue, platform changes, or competitive displacement, would directly impair company financials
              with no near-term offset. A Washington state class action lawsuit filed in 2023 alleges that Royal Match's
              spinning prize wheels constitute illegal gambling under Washington law, which—if successful—could require
              product changes, damages payments, or regulatory restrictions that disrupt the current in-game economy and
              player trust. Geographic concentration amplifies revenue risk: the US contributes ~55% of revenue, meaning
              any US-specific regulatory action, App Store policy change, or consumer sentiment shift has outsized
              impact on total company revenue. The game's heavy dependence on paid user acquisition (estimated $400–600M
              annually) to sustain growth creates a structural CAC dependency; if UA returns compress as the
              casual-gaming market matures, revenue growth could stall without a proportional organic replacement.
              Platform dependency on Apple and Google for 100% of distribution and payment processing exposes Dream
              Games to platform fee changes, policy enforcement, or de-listing risk. The demographic skew toward women
              aged 25–55 in the US is a strength but also a concentration risk if this segment's gaming habits shift or
              if a competitor targets them more effectively. Royal Kingdom's global launch in November 2024 is the
              primary mitigation path for single-title concentration, but it represents an early-stage commercial bet.
