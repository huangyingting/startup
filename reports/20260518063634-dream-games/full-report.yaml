  - number: 4
    title: Financials
    sections:
      - number: '4.1'
        title: Revenue model and monetisation
        blocks:
          - type: paragraph
            body: >-
              Dream Games operates a single-revenue-stream model: 100% of its income derives from in-app purchases (IAP)
              within Royal Match and, since November 2024, Royal Kingdom. The games are free to download on iOS and
              Android; Dream Games earns no subscription revenue, no advertising income, and no licensing fees from
              third parties. This model is common across the top-tier casual mobile game segment but unusual in its
              purity—many peers (including Candy Crush Saga) have layered in ad revenue or subscription passes.


              The IAP mechanism is a hard currency economy: players purchase coin packs or booster bundles at price
              points from $0.99 to $99.99. Difficulty spikes in puzzle levels drive organic spend; Dream Games' level
              design team calibrates these carefully. All transactions are processed through Apple App Store and Google
              Play, generating a standard 30% platform fee that reduces Dream Games' net revenue by approximately
              one-third of gross consumer spend. No web-shop alternative has been publicly announced as of the report
              date.


              Royal Match recorded approximately $2.1 billion in gross consumer spend in 2024. After the ~30% platform
              fee, Dream Games' estimated net publisher revenue was approximately $1.47 billion. October 2024 was a
              single-month peak of approximately $177 million in gross consumer spend—a record for the match-3 genre.
              Cumulative lifetime gross consumer spend for Royal Match passed $3 billion in early 2024. Royal Kingdom
              launched in November 2024 and generated an estimated less than $100 million in gross revenue in its
              initial partial-year period.
            claimRefs:
