      - number: '4.2'
        title: Unit economics and sales efficiency
        blocks:
          - type: paragraph
            body: >-
              Dream Games does not publish its unit economics. The key metrics—user acquisition cost (CAC), lifetime
              value (LTV), payback period, and daily active user (DAU) count—are not disclosed. Analyst and industry
              estimates allow approximate ranges to be triangulated.


              User acquisition is the primary growth engine and the dominant cost item. Dream Games is estimated to
              spend $400–600 million annually on UA—figures derived from multiple industry reports on top mobile UA
              spenders globally and corroborated by analysts covering the match-3 segment. At an estimated $2.1 billion
              in gross consumer spend, this implies a UA spend-to- gross-revenue ratio of approximately 19–29%, which is
              consistent with mature match-3 games at scale where LTV is well-established and bidding can be optimised
              efficiently.


              Industry benchmarks from Singular and AppsFlyer suggest that top-performing casual games with
              well-calibrated LTV models achieve CPI (cost per install) in the $1.50–$4.00 range for the female 25–55
              demographic in the US, with LTV/CAC ratios of 3–5× at maturity. Dream Games' implied ratio at the midpoint
              of estimated UA spend ($500M UA / $1.47B net revenue) is approximately 2.9×, within the lower end of this
              range but acceptable given the scale. Payback period is estimated at 12–18 months based on genre
              benchmarks; Dream Games has not confirmed. Retention metrics are not public; industry comps for top-tier
              match-3 suggest Day-30 retention of 15–25%.
