  - number: 2
    title: Market Analysis
    sections:
      - number: '2.1'
        title: Mobile Gaming Market Overview
        blocks:
          - type: paragraph
            body: >
              The global mobile gaming market represents the primary addressable universe for Dream Games. Mobile games
              generated an estimated $90-100B in consumer spend in 2024, making mobile gaming the single largest segment
              of the global games industry by revenue—accounting for roughly 45-50% of total global game revenues.
              BusinessOfApps estimates global mobile game revenues reached approximately $98B in 2025, with a CAGR of
              approximately 3-5% through 2028. Influencer Marketing Hub's aggregated statistics cite a mobile gaming
              market of approximately $98.7B in 2024 and project growth to $153B by 2030 at a CAGR of ~7.6%. These
              estimates differ in scope (some include in-game advertising; the businessofapps.com figures primarily
              track IAP and paid download revenue), so methodological comparison is necessary before treating any single
              figure as authoritative.


              By platform, iOS and Android together account for essentially 100% of mobile gaming revenue, with Apple's
              App Store and Google Play each taking a nominal 30% platform fee on IAP. This fee structure is under
              active legal and regulatory challenge globally—the US Supreme Court's 2021 Epic v. Apple ruling and
              ongoing EU Digital Markets Act enforcement have begun to open alternative payment pathways, but the 30%
              fee remains the dominant commercial reality for most mobile game developers as of 2026. For Dream Games,
              which derives all revenue from IAP with no disclosed web-shop or alternative payment strategy, the 30%
              revenue leakage is a material structural cost.


              Mobile gaming's geographic mix matters for Dream Games' revenue exposure. The United States is the largest
              single country by IAP revenue, typically representing 30-35% of global mobile game revenues. For Dream
              Games specifically, the US represents ~55% of revenue—a substantial over-index that signals both its
              strength in English-speaking casual game markets and its continued under-penetration in non-English
              markets. Japan, South Korea, and Germany are the next-largest revenue markets globally. India, despite
              being one of the top download markets, contributes a lower share of IAP revenue due to lower average
              spend-per-player.
            claimRefs:
