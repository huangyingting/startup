      - number: '4.3'
        title: Cost structure and gross margin
        blocks:
          - type: paragraph
            body: >-
              Dream Games' cost structure is dominated by three categories: user acquisition (UA) spend, people costs,
              and platform fees. Platform fees are already deducted to derive net publisher revenue. Of the remaining
              cost base, UA is the single largest item at an estimated $400–600 million per year. People costs for
              approximately 600–700 employees (engineering, game design, data science, marketing, and operations) are
              estimated at $100–200 million annually, consistent with Istanbul-anchored headcount at senior engineering
              compensation levels. Infrastructure and cloud costs are estimated at $10–30 million annually.


              Net revenue after platform fees was approximately $1.47B in 2024. Deducting estimated UA spend of
              $400–600M and people/infrastructure costs of $110–230M yields estimated EBITDA of roughly $640M–$960M,
              implying EBITDA margins of 44%–65% on net revenue. This is consistent with the 40–60% gross margin range
              typical for scaled mobile games that have surpassed their UA payback period on the majority of their
              player cohorts. Dream Games is widely reported by industry analysts to be profitable; no public financial
              disclosure exists to confirm the exact figure.


              Working capital is structurally negative in a beneficial sense: all IAP revenue is collected upfront at
              point of transaction with no accounts receivable. Capex is minimal—Dream Games does not own physical
              infrastructure, operates on cloud compute, and its content production pipeline is software labour. This
              results in a highly cash-generative business with limited capital intensity beyond the UA reinvestment
              cycle.
