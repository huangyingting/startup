      - number: '6.3'
        title: Retention & Engagement
        blocks:
          - type: paragraph
            body: >-
              Royal Match demonstrates unusually strong engagement durability for a casual mobile title. The game
              remained in the top-5 grossing US App Store charts for more than 30 consecutive months following its
              global launch, indicating a retained paying-user base that rivals any title in the match-3 category. The
              construction meta-game provides long-term progression scaffolding beyond the core puzzle mechanic, giving
              players persistent goals that encourage re-engagement. Royal Match's live-ops model, which releases new
              seasonal events, tournaments, and themed level packs on a roughly two-week cadence, drives repeat sessions
              and reduces churn by providing fresh goals for players who have exhausted routine content. The game
              reached 12,400+ levels by November 2025, ensuring no near-term depletion of core content. Direct retention
              metrics (D1, D7, D30 cohort data) are not publicly disclosed by Dream Games; analyst benchmarks for
              top-tier casual games suggest D1 retention of 40–45%, D7 of 20–25%, and D30 of 8–12%, and Royal Match's
              chart longevity implies it meets or exceeds these benchmarks. The App Store rating of ~4.7/5 across tens
              of millions of reviews on both iOS and Google Play is a leading satisfaction proxy and reflects strong
              organic word-of-mouth. Player complaints documented on Reddit and Trustpilot focus primarily on misleading
              or fake advertisements shown in UA campaigns (not in-game experience) and aggressive IAP prompts; these
              are common mobile game complaints and do not appear to materially impact core retention. The r/RoyalMatch
              community on Reddit had over 50K members as of 2024, with active discussion of level strategies, event
              guides, and new content, indicating a committed player base.
