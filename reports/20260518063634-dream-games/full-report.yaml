      - number: '1.3'
        title: Funding History
        blocks:
          - type: paragraph
            body: >
              Dream Games has completed four funding rounds totalling $467.5M, reaching a last known post-money
              valuation of $2.75B in January 2022. The Seed round of $7.5M was led by Balderton Capital and Makers Fund
              in November 2019, immediately after the company's founding, and gave the studio enough capital to build
              Royal Match through its soft-launch phase. The Series A of $50M, led by Index Ventures with participation
              from Balderton and Makers Fund, was announced alongside Royal Match's global launch in February/March 2021
              and represented a clear vote of confidence in the game's early metrics.


              Six months later, in June 2021, Dream Games closed a $155M Series B that valued the company at $1B
              (unicorn status), co-led by Index Ventures and Makers Fund with further participation from Balderton, IVP,
              and Kora. The speed of progression from Series A to unicorn in under six months underscores the unusually
              strong performance trajectory of Royal Match. The final disclosed round, the $255M Series C, closed in
              January 2022 at a $2.75B valuation, led by Index Ventures with participation from Makers Fund, BlackRock,
              IVP, Balderton, and Kora. No further rounds have been publicly disclosed since January 2022, more than
              four years before the date of this report. Dream Games remains private as of May 2026.


              The company's investors include institutional venture capital (Index Ventures, Balderton Capital, IVP), a
              specialist games fund (Makers Fund), a sovereign-adjacent asset manager (BlackRock), and a crossover
              growth fund (Kora). Index Ventures led or co-led three of the four rounds and is the most prominent
              institutional backer. The absence of any public secondary transaction, dividend, or IPO filing leaves
              investor liquidity fully deferred to an eventual strategic exit or public offering.
