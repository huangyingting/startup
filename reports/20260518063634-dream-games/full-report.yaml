      - number: '7.2'
        title: Operational & Execution Risks
        blocks:
          - type: paragraph
            body: >-
              Dream Games' most acute operational risk is extreme single-title revenue concentration. More than 90% of
              Dream Games' revenue derives from Royal Match based on all available analyst estimates. Royal Kingdom
              launched globally in November 2024 and generated an estimated $20–50M in its first partial year —
              meaningful for a new title but roughly 1–3% of Royal Match's estimated $2.1B gross consumer spend in 2024.
              A material decline in Royal Match engagement — driven by player fatigue, content quality regression, or
              competitive displacement — would be an existential event with no diversification buffer.


              Key-person risk is concentrated at the CEO level. Soner Aydemir is the founding product visionary and
              architect of Royal Match's level-design and monetisation philosophy. No succession plan has been publicly
              disclosed. The founding team of five (Aydemir, Namli, Saglam, Sengul, Yilmaz) has remained intact through
              May 2026, which is positive, but the absence of named deputies who could assume product leadership creates
              a single point of failure.


              User acquisition dependency on Meta, Google, and TikTok advertising platforms creates a third operational
              risk. An estimated 80–90%+ of Dream Games' UA spend flows through these three platforms. Any algorithmic
              change, policy shift, or targeting restriction (such as the iOS 14 ATT change in 2021, which raised
              industry CPIs 20–30%) can materially raise Dream Games' effective CPI and compress margins. The company
              demonstrated resilience through the 2021 ATT disruption, but the underlying concentration remains
              structurally unresolved.


              Level design quality regression is a non-trivial risk for a game with 12,000+ levels. Maintaining puzzle
              difficulty curves, engagement hooks, and the balance between organic progression and IAP prompts at scale
              requires deep institutional knowledge. As the team grows and original level-design leads become further
              removed from production, quality variance increases. Security and anti-cheat risks — including modified
              APKs, account fraud, and server-side exploit attempts — are present at Royal Match's scale but have not
              generated significant public incidents to date.
