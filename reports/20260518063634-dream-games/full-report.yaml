  - id: FE001
    title: Royal Match product architecture flow
    type: flow
    layout: wide
    summary: >-
      Royal Match operates across six interconnected system layers: the Unity-based player app communicates with the
      live-ops game server, which coordinates with the analytics platform driving level design decisions, while
      Apple/Google stores handle distribution and payment, and UA platforms feed new players into the top of the funnel.
    data:
      nodes:
        - id: n1
          label: Player App (Unity)
          detail: iOS/Android game client built on Unity; handles rendering, puzzle logic, and IAP UI
        - id: n2
          label: Apple / Google Stores
          detail: Distribution gateways and mandatory payment processors; retain 30% of IAP revenue
        - id: n3
          label: Live-ops Game Server
          detail: Cloud-hosted backend (AWS inferred) delivering event schedules, level packs, and leaderboard data
        - id: n4
          label: Analytics Platform
          detail: Real-time player behaviour tracking; feeds A/B test results back to level design team
        - id: n5
          label: Level Design Pipeline
          detail: Data science-assisted content creation team producing new levels on ~2-week cadence
        - id: n6
          label: UA Platforms
          detail: Meta, Google UAC, TikTok, and TV/celebrity campaigns driving new installs
      edges:
        - from: n6
          to: n1
          label: New player installs
        - from: n2
          to: n1
          label: App delivery + payment
        - from: n1
          to: n3
          label: Player state + event requests
        - from: n3
          to: n4
          label: Behavioural event stream
        - from: n4
          to: n5
          label: Analytics insights
        - from: n5
          to: n3
          label: New level content
    approximationNotes: >-
      Cloud provider (AWS) and analytics platform are inferred from industry norms; neither is officially confirmed by
      Dream Games. UA platform mix is inferred from industry reporting on Dream Games' advertising activity.
