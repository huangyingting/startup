  - number: 6
    title: Customers
    sections:
      - number: '6.1'
        title: Customer Base & Segmentation
        blocks:
          - type: paragraph
            body: >-
              Royal Match serves a mass-market casual gaming audience with no enterprise or B2B component. The primary
              player demographic is women aged 25–55 who engage in short daily puzzle sessions, drawn by the accessible
              match-3 mechanic and the satisfying castle-decoration meta-game. This demographic segment drives the
              majority of both installs and revenue, particularly in the US and Western European markets. A secondary
              segment consists of mid-core male players aged 30–45 who skew toward higher per-session IAP spend and
              frequently participate in competitive live-ops events such as tournaments and seasonal challenges. A third
              large but low-revenue segment comprises players in India and Southeast Asia who install the game in high
              volumes but convert to paying users at significantly lower rates, reflecting regional income disparities
              and purchasing-power differences. A small but disproportionately valuable "whale" segment—estimated at
              under 5% of paying players—accounts for an outsize share of total IAP revenue through concentrated
              purchases of coin bundles, event passes, and boosters. Royal Match is distributed in 190+ countries and
              supports multiple languages, maximizing addressable install reach. The US market is the single largest
              contributor at approximately 55% of global revenue, followed by the UK, Germany, Japan, and South Korea as
              the key revenue markets. India is the largest download market outside the US by volume but contributes a
              small fraction of revenue due to low average revenue per paying user. Casual puzzle is one of the most
              gender-inclusive mobile genres, and Royal Match's approachable art style and non-violent gameplay
              reinforce broad demographic appeal.
            claimRefs:
              - CU010
              - CU011
              - CU018
