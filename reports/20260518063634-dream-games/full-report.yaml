            body: >-
              More than 90% of Dream Games revenue derives from Royal Match. Royal Kingdom generated an estimated
              $20–50M in its first partial year versus Royal Match's $2.1B — representing under 3% diversification. A
              player-engagement decline, regulatory restriction on loot-box mechanics, or sustained competitive pressure
              from Candy Crush Saga or Monopoly Go could trigger a rapid revenue collapse with no offsetting business
