            title: Royal Match Is the Match-3 Segment Leader with Deep Content and UA Moats
            body: >-
              Royal Match's displacement of Candy Crush Saga as the segment's highest-grossing title reflects genuine
              product superiority (meta-layer, visual quality, fair difficulty) backed by best-in-class UA execution.
              The 5,000+ level bank and weekly live-ops cadence sustain engagement and create structural barriers for
              new entrants. Dream Games' UA efficiency—built over four years of scaled operation—is estimated to be the
              highest in the match-3 segment, providing a compounding advantage as Apple ATT and Privacy Sandbox raise
              CPIs for less sophisticated buyers.
            calloutType: strength
            claimRefs:
              - CP001
              - CP019
              - CP022
              - CP029
          - type: callout
            title: Three Corporate-Backed Competitors Can Sustain UA Losses Dream Games Cannot
            body: >-
              Microsoft (Candy Crush), Take-Two/Zynga (Toon/Toy Blast), and Playrix all have the ability to sustain UA
              spend in excess of economic return for strategic reasons—Microsoft to sustain Game Pass ecosystem data,
              Take-Two to protect a $12.7B acquisition, Playrix for portfolio brand. An independent Dream Games cannot
              match indefinite strategically-subsidised UA competition. This asymmetry is the primary structural
              competitive risk.
            calloutType: risk
            claimRefs:
