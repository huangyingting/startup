  - id: FV003
    title: Valuation and Return Range
    type: range
    layout: wide
    summary: >-
      Illustrative enterprise value ranges under bear, base, and bull scenarios versus the stale January 2022 Series C
      mark and the median of comparable mobile-gaming M&A transactions. The conditional-buy entry range of $5B–$7B sits
      at the low end of the base case and above the comparable median floor.
    data:
      items:
        - label: Bear Case Valuation
          low: 3000
          high: 4500
          unit: $M
          detail: >-
            3–3.75× estimated 2024 bear-case revenue of ~$1.2B; assumes engagement deceleration and gambling litigation
            headwinds
        - label: Base Case Valuation
          low: 5000
          high: 8000
          unit: $M
          detail: 3.1–5× estimated 2024 base-case revenue of $1.6B; anchored to King/Supercell acquisition comparable range
        - label: Bull Case Valuation
          low: 8000
          high: 14000
          unit: $M
          detail: >-
            4–7× estimated 2024 bull-case revenue of $2.0B; requires Royal Kingdom contribution and multi-game portfolio
            re-rating
        - label: Last Stated Valuation (January 2022)
          low: 2750
          high: 2750
          unit: $M
          detail: >-
            Series C post-money; deeply stale vs. 2024 revenue trajectory; represents 1.9× 2024 estimated net IAP
            revenue
        - label: Comparable M&A Median (King/Zynga/Supercell/Rovio)
          low: 4000
          high: 6000
          unit: $M
          detail: >-
            Median of 3–4.5× revenue multiples applied to $1.3B–$1.5B comparable revenue scenarios; blended from four
            acquisitions 2016–2023
