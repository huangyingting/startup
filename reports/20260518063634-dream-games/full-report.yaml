      - number: '7.4'
        title: Financial & Governance Risks
        blocks:
          - type: paragraph
            body: >-
              Dream Games' last publicly known post-money valuation was $2.75B, established in January 2022 — over four
              years before this report. Since then no new funding round has been announced, and all operational costs
              are presumed funded from Royal Match cash generation. The estimated EBITDA of $640M–$960M in 2024 suggests
              the company is highly profitable and self-funding, but the absence of audited financial statements means
              this remains an analyst estimate. An investor considering a primary or secondary transaction has no
              validated P&L or balance sheet to anchor valuation.


              The platform fee risk is structural and enduring. Apple and Google each collect approximately 30% of gross
              consumer spend as a distribution fee. For an estimated $2.1B gross consumer spend in 2024, this represents
              roughly $630M paid to platform operators. While the Epic v. Apple ruling and subsequent proceedings have
              modestly loosened anti-steering restrictions in the US, no alternative distribution or payment pathway has
              been deployed by Dream Games. The 30% fee is therefore a permanent structural headwind on net revenue
              margins.


              Liquidity risk for existing investors is real. Index Ventures, Balderton, IVP, and Makers Fund have all
              held their positions since 2022 or earlier. The lack of an IPO or secondary market for Dream Games equity
              creates a potential overhang: if investors begin to require liquidity at scale, the company may face
              pressure to accept a strategic acquisition at a potentially unfavourable valuation multiple. Governance
              risk arises from the founders retaining majority control — common at this stage but limiting investor
              influence. The absence of an independent board with financial and legal expertise appropriate to a company
              of this revenue scale is an unconfirmed but likely risk given the founder-led operating model.
            claimRefs:
