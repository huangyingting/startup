      - number: '8.3'
        title: Scenario Analysis
        blocks:
          - type: paragraph
            body: >-
              Three scenarios bracket the range of outcomes for a Dream Games investment, with probability weights
              reflecting the current evidence base (see TV003 and FV003).


              The bear case (20% probability) assumes Royal Match revenue declines 15% in 2025 as engagement saturation
              accelerates and Royal Kingdom fails to contribute meaningfully. In this scenario, total estimated 2025
              revenue is approximately $1.2B, and applicable EV/revenue multiples compress to 3× given decelerating
              growth, implying a $3.6B enterprise value. Platform fee increases or an adverse gambling-law ruling would
              compound this scenario. Return at a $5B entry would be deeply negative. The key early signal is Royal
              Match monthly active users trending down in H1 2025 data or Royal Kingdom generating less than $10M in its
              first six months post-global launch.


              The base case (55% probability) assumes Royal Match revenue grows modestly at 5–10% in 2025 to
              approximately $1.6B in combined net IAP revenue, with Royal Kingdom adding $50–150M. The market assigns a
              4–5× multiple given continued growth and profitability, producing a $6.4B–$8B enterprise value. At a
              $5B–$7B entry, this represents a 1.3–1.5× cash multiple over a 3–5 year hold. A strategic premium from an
              acquirer with platform synergies could lift this further.


              The bull case (25% probability) assumes Royal Kingdom achieves $200–400M revenue in 2025 as the US market
              launch drives strong monetisation, and Royal Match sustains 15%+ growth through continued level-design
              innovation. Combined revenue approaches $2.0B, and the market re-rates to 5–7× given demonstrated
              multi-game capability, producing an $10B–$14B enterprise value. At a $5B–$7B entry, this is a 1.7–2.0× or
              better cash multiple — strongly attractive risk-adjusted.


              The key scenario discriminators are: (1) Royal Kingdom revenue in the first 180 days post-global launch
              (November 2024 data available shortly); (2) Royal Match year-over-year revenue change through Q2 2025; (3)
              resolution or material updates on the Washington gambling class action; and (4) any signal of Dream Games
              filing an S-1 or engaging M&A advisers. No IPO has been announced as of May 2026; the company has not
              disclosed future plans publicly.
            claimRefs: []
          - type: table
            tableRef: TV003
            claimRefs:
              - CV014
              - CV015
              - CV016
              - CV017
              - CV018
              - CV019
      - number: '8.4'
        title: Diligence Gaps & Kill Triggers
        blocks:
          - type: paragraph
            body: >-
              Five categories of evidence remain structurally unavailable from public sources, each representing a
              material gap that must be resolved before committing capital (see TV006 for the complete diligence list).


              First, audited financial statements. All revenue figures cited in this chapter are third-party analyst
              estimates from Sensor Tower, AppMagic, MobileGamer.biz, and related sources. These estimates have a track
              record of ±10–20% variance against disclosed actuals in comparable companies. Without audited P&L, balance
              sheet, and cash flow statements — and crucially, without confirmation of inter-company transfers (Dream
              Games' Istanbul entities vs. any group holding structure) — no high-confidence margin or EBITDA estimate
              is possible. The $467.5M raised across three rounds has not been reconciled against disclosed deployment.


              Second, cap table and preference stack. Dream Games' investors include Index Ventures, IVP, and Makers
              Fund across three funding rounds. Liquidation preference terms, anti-dilution provisions, drag-along
              rights, and any co-investor MFN clauses are entirely unknown from public sources. In a $5B–$7B entry
              transaction, liquidation preference overhang could materially alter equity economics for common holders.


              Third, Royal Kingdom performance data. The game launched globally in November 2024 after a soft launch
              generating approximately $20M. Whether the US market — the 55%-of-revenue driver excluded from soft launch
              — responds comparably to Royal Match cannot be assessed without first-party retention and monetisation
              cohort data.


              Fourth, gambling litigation financial exposure. The Washington state class action filed August 2024 is
              active but no court ruling, class certification, or settlement demand has been made public. The financial
              exposure is entirely unquantifiable without case discovery or a damages estimate.


              Kill triggers are enumerated in TV005. The most material near-term trigger is Royal Match monthly net IAP
              revenue declining more than 15% year-over-year for two consecutive quarters — a signal of structural
              engagement decay rather than seasonal variation. An adverse class certification ruling in the Washington
              gambling case, or a Supreme Court or appellate court ruling that fundamentally recharacterises similar
              mechanics as gambling, would also constitute an immediate kill trigger requiring suspension of diligence
              and re-evaluation of the regulatory risk framework.
            claimRefs: []
