  - number: 5
    title: Product & Technology
    sections:
      - number: '5.1'
        title: Core Products & Features
        blocks:
          - type: paragraph
            body: >-
              Dream Games operates two mobile puzzle titles as of May 2026. Royal Match, the flagship product, is a
              match-3 puzzle game that launched globally in March 2021 on iOS and Android. Players help King Robert—a
              cartoon royal character—rebuild and decorate a castle by completing match-3 puzzle levels. This
              construction meta-game structure provides a long-term progression scaffold beyond the core puzzle
              mechanic, encouraging players to spend in order to access construction materials and advance the castle
              narrative. Royal Match had surpassed 12,400 levels as of November 2025, with new content added on a
              roughly two-week cadence. The game is available in more than 190 countries and supports multiple
              languages, making it one of the most globally accessible titles in the casual puzzle genre.

              Royal Match carries an age rating of 4+ on Apple App Store and Everyone on Google Play, indicating broadly
              inclusive content targeting. The app has maintained approximately a 4.7 out of 5 star rating on Apple App
              Store with millions of user reviews—a particularly strong result for a free-to-play title where
              monetisation friction can drive negative sentiment. On Android, the game holds a comparably high rating.
              Across both stores, Royal Match has accumulated over 200 million lifetime downloads as reported in
              mid-2024 press coverage.

              Live-ops events—time-limited tournaments, seasonal themes, and special challenge levels—are deployed
              regularly to sustain daily active user engagement and drive incremental in-app purchase (IAP) spend. The
              in-app economy uses a hard currency (coin) model where players buy coin packs or booster bundles at price
              points from $0.99 to $99.99. All purchases are processed through Apple App Store and Google Play; Dream
              Games has not announced a direct web-shop as of May 2026.

              The second title, Royal Kingdom, launched globally on November 21, 2024, following a 19-month soft-launch
              period beginning April 2023. Royal Kingdom shares the match-3 core mechanic and similar construction meta
              structure, with King Richard as its protagonist and a distinct castle and visual design. Both titles are
              part of the Dream Games "Royal" franchise and coexist without apparent cannibalisation of Royal Match's
              established audience.
