      - number: '2.5'
        title: Exhibits
        blocks:
          - type: callout
            title: Dream Games is the match-3 segment leader by revenue since 2023
            body: >-
              Royal Match displaced Candy Crush Saga as the highest-grossing match-3 game, a title Candy Crush held for
              nearly a decade. This is a materially important competitive fact: segment leadership in a mature,
              oligopolistic market typically translates to UA efficiency advantages, better operator negotiating
              leverage, and stronger brand recall for UA creative.
            calloutType: strength
            claimRefs:
              - CM009
              - CM010
              - CM011
          - type: callout
            title: UA cost inflation threatens margin at scale
            body: >-
              Apple ATT and Google Privacy Sandbox are structural headwinds that raise the cost per install across the
              casual gaming segment. Dream Games' UA budget is its dominant cost line; any material rise in CPIs
              compresses the margin on new player cohorts and requires LTV growth to offset. This is a key variable in
              any financial model of Dream Games.
            calloutType: risk
            claimRefs:
              - CM028
              - CM029
              - CM030
          - type: callout
            title: US revenue concentration creates both scale advantage and risk
            body: >-
              The ~55% US revenue concentration reflects Dream Games' success in the highest-ARPU casual gaming market
              but creates sensitivity to US-specific factors: Apple ATT, potential legal/regulatory changes (see class
              action), or a US advertising market slowdown. Expanding the share from Japan, Germany, and emerging
              markets is both a growth opportunity and a risk-mitigation imperative.
            calloutType: insight
