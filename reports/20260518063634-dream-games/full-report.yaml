      - number: '4.5'
        title: Financial gaps and diligence verdict
        blocks:
          - type: paragraph
            body: >-
              Dream Games is a private company with no obligation to disclose financial results. The following metrics
              are unavailable from public sources and represent the core data-room requests: (1) audited or
              management-accounts P&L, (2) exact DAU and MAU with geo-segmentation, (3) ARPU and ARPPU, (4) cohort LTV
              curves and payback-period data by install vintage, (5) UA spend by channel and geography, (6) Royal
              Kingdom separate financial performance versus Royal Match, (7) cash balance and burn rate.


              Revenue quality assessment: Royal Match revenue is high quality by mobile gaming standards— IAP is
              real-time cash collection with no deferred revenue, no refund risk at scale, no customer concentration,
              and no channel risk beyond the Apple/Google duopoly. However, the 30% platform fee exposure is a
              structural margin ceiling and the complete dependence on two distribution gatekeepers is a concentration
              risk if either platform materially changes fee structures or discovery algorithms.


              Margin path: the business should sustain 40–60% EBITDA margins on net revenue as long as Royal Match
              remains in the top-10 grossing chart. If Royal Match declines in revenue due to competitive displacement
              or player churn, UA reinvestment to stabilise revenue would compress margins. Royal Kingdom's UA ramp
              requires significant upfront investment with uncertain return timing; this is the primary near-term margin
              risk.


              Capital intensity verdict: low. The business model has no inventory, no receivables, no physical
              infrastructure capex, and no contract manufacturing. The primary capital allocation decision is UA spend,
              which is discretionary and reversible within months.
