      - number: '8.2'
        title: Valuation Framework
        blocks:
          - type: paragraph
            body: >-
              Three valuation methodologies converge on a base-case enterprise value range of $5B–$7B for Dream Games as
              of May 2026.


              Comparable M&A transactions provide the primary anchor. The five most relevant mobile-gaming acquisitions
              span 2016–2023 and show revenue multiples of 3–5× at deal close (see TV004). King was acquired by
              Activision in 2016 for $5.9B at approximately $1.4B annual revenue — a 4.2× multiple — at a time when
              King's growth had decelerated materially. Supercell was taken private by Tencent in 2016 for $8.6B at
              approximately $2.3B revenue — 3.7×, reflecting Supercell's multi-game diversification premium. Zynga was
              acquired by Take-Two in 2022 for $12.7B at approximately $2.8B LTM revenue — 4.5× — with a control premium
              embedded. Playtika's 2021 IPO at approximately $11B for $2B revenue (5.5×) provides a public- markets
              reference. Rovio's 2023 acquisition by Sega for $775M at approximately $260M revenue (3×) is the negative
              outlier, reflecting declining game engagement and lower growth.


              Dream Games differentiates from the Rovio case on every dimension: Royal Match revenue grew from ~$400M to
              ~$1.46B (net IAP) between 2022 and 2024 (~91% CAGR), suggesting a premium over the Rovio 3× baseline. The
              King analogy (single-flagship game, US-concentrated revenue, $1.4B annual run-rate at acquisition) is the
              most structurally comparable, implying a 4–5× multiple. Applied to Dream Games' $1.46B 2024 IAP revenue,
              this produces $5.8B–$7.3B — consistent with the $5B–$7B base case. A discounted cash flow cross-check,
              assuming 15% net revenue growth in 2025–2026, 25% EBITDA margins, and a 15× EBITDA exit in 5 years
              discounted at 20%, yields a present value in the $4B–$6B range, further bracketing the base case.


              The valuation sensitivity matrix (FV002) illustrates how enterprise value changes across revenue
              assumptions and EV/revenue multiples. At 3× a $1.6B base revenue, EV = $4.8B; at 5× the same revenue, $8B;
              at 7×, $11.2B. The $5B–$7B conditional-buy band corresponds roughly to 3.5–5× estimated 2024 total revenue
              — a disciplined entry point that leaves upside if Royal Kingdom scales and the multiple re-rates toward
              the King/Zynga precedent.


              Post-2022 multiple compression in gaming is a structural headwind. Following the pandemic-era valuation
              peak, Nasdaq-listed gaming companies saw EV/revenue multiples contract 40–60% by end of 2023. However,
              Dream Games' strong private cash generation and absence of a forced-exit timeline insulate it somewhat
              from public-market multiple volatility. A strategic acquirer — particularly a platform (Apple, Microsoft,
              Amazon), a major publisher seeking mobile exposure, or a large-cap gaming consolidator — could justify a
              5–7× premium based on Royal Match's proven cash-flow profile.
            claimRefs: []
