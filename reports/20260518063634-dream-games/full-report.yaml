  - id: FU001
    title: Royal Match Player Customer Journey
    type: journey-map
    insight: >-
      Players discover Royal Match primarily through heavy UA campaigns featuring celebrity-led gameplay ads (e.g.,
      Simon Cowell), progress through a rapid onboarding tutorial, engage with daily puzzle sessions and meta-game
      castle decoration, and monetize through friction-point IAP prompts. Live-ops events extend the journey and
      re-engage lapsed players.
    data:
      items:
        - label: 'Stage 1 — Discovery: Celebrity gameplay ad (Simon Cowell, etc.)'
          detail: Primary UA touchpoint; player sees targeted video ad on social media or in another app stage; Discovery
        - label: 'Stage 1 — Discovery: App Store listing impression'
          detail: Player views App Store page; 4.7/5 rating and screenshot carousel drive install conversion
        - label: 'Stage 2 — Onboarding: Tutorial level sequence'
          detail: First 10–15 levels introduce match-3 mechanics, King Robert character, and castle renovation goal
        - label: 'Stage 2 — Onboarding: First castle decoration unlock'
          detail: Player completes first area of castle; emotional reward anchors the meta-game progression loop
        - label: 'Stage 3 — Core Engagement: Daily puzzle sessions'
          detail: Player returns daily for 15–30 min sessions; level difficulty curve maintains engagement and habit
        - label: 'Stage 4 — Monetization: First IAP prompt'
          detail: Player hits difficult level or runs out of lives; prompted to purchase coins or boosters
        - label: 'Stage 4 — Monetization: Coin bundle purchase'
          detail: Player converts to paying user; average first purchase estimated at $2–$10 in casual F2P norms
        - label: 'Stage 5 — Live-Ops Retention: Tournament participation'
          detail: Player joins live-ops tournament event; competitive leaderboard drives increased session frequency
        - label: 'Stage 6 — Churn or Reactivation: Push notification for new event'
          detail: Lapsed player receives notification about seasonal event or new level pack; drives re-engagement
