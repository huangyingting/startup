      - number: '3.3'
        title: Capability, Pricing, and GTM Comparison
        blocks:
          - type: paragraph
            body: >
              All major match-3 competitors are free-to-play with IAP monetisation. There is no meaningful price
              differentiation at the game level; all titles are free to download, and their primary pricing competition
              is the value proposition of their booster packs, life bundles, and event passes. Royal Match's pricing
              strategy relies on relatively fair difficulty tuning and high visual quality to drive organic booster
              purchases, contrasting with older titles that were criticised for more aggressive paywall mechanics. Candy
              Crush Saga has moved toward a similar model over time following player feedback.


              In terms of capability, the key differentiating dimensions are: (1) content depth—level bank size is a
              proxy for retention and engagement longevity; (2) meta-layer design—the decoration/ construction metagame
              that provides long-term player goals beyond level completion; (3) live- operations cadence—the frequency
              and quality of limited-time events, tournaments, and social features; (4) UA sophistication—the ability to
              acquire high-LTV players efficiently via paid channels; and (5) brand recognition—the strength of the
              game's IP to drive organic and referral installs. Royal Match leads on UA sophistication, meta-layer
              quality, and brand freshness. Candy Crush leads on level bank depth, brand legacy recognition, and
              Microsoft distribution resources.


              Distribution primarily occurs through Apple App Store and Google Play, with no meaningful alternative
              channels as of 2026. UA spend is the primary competitive weapon: all major match-3 developers are active
              buyers of Facebook, Google, TikTok, and programmatic mobile ad inventory. Dream Games is estimated to
              spend $400-600M annually on UA, placing it among the largest mobile UA spenders globally. This creates a
              UA oligopoly auction dynamic in which the top match-3 developers effectively compete against each other
              for the same high-LTV player segments, driving up CPIs across the entire category.
