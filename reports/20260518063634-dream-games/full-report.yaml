      - number: '1.4'
        title: Scale and Milestones
        blocks:
          - type: paragraph
            body: >
              Royal Match's revenue trajectory places Dream Games among the most financially successful mobile gaming
              companies of the 2020s. Estimated IAP revenue for 2022 was approximately $400M, rising to approximately
              $932M in 2023 and approximately $1.46B in 2024. These figures, sourced primarily from Appmagic and
              MobileGamer, represent publisher payouts after the app store's 30% cut; gross consumer spend is materially
              higher. In a single month—October 2024—Royal Match generated approximately $177M in consumer spend and
              ranked as the second-highest-grossing game globally by revenue per SensorTower data. Cumulative gross
              consumer revenue surpassed $2B by November 2023, $3B by April 2024, and approximately $3.9B by October
              2024.


              Royal Kingdom, the second title, generated $20.5M in revenue during its soft-launch phase by November
              2024, ahead of its global launch on November 21, 2024. This performance provides early evidence of Dream
              Games' ability to extend its franchise beyond Royal Match, though Royal Kingdom remains far smaller than
              its predecessor at the same stage.


              Key non-financial milestones include: Edwin Catmull joining as strategic advisor in December 2023; the
              August 2024 class action lawsuit alleging Royal Match violates Washington state gambling law; and
              GamesIndustry.biz ranking Dream Games as the seventh-largest mobile game developer by revenue in its 2024
              year-in-numbers report. The company has not disclosed any plans for an IPO or M&A transaction as of May
              2026, and the last known external valuation of $2.75B dates to January 2022—well before the 2023-2024
              revenue acceleration that materially changes the fundamental valuation basis.
