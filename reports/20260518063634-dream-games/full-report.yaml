  - id: FV004
    title: Investment KPIs
    type: kpi
    layout: wide
    summary: >-
      IC-ready summary of the eight most critical quantitative inputs to the Dream Games valuation and investment
      decision. All revenue and margin figures are third-party analyst estimates; audited financials are not available
      as of May 2026.
    data:
      items:
        - label: 2024 IAP Net Revenue (Est.)
          value: $1.46B
          detail: Net of 30% platform fee; third-party estimate from Sensor Tower and MobileGamer.biz; ±15% uncertainty
        - label: Revenue CAGR 2022–2024
          value: ~91%
          detail: $400M net IAP (2022) to $1.46B (2024) in two years; pace decelerating from 130% to 57% year-over-year
        - label: Last Known Valuation
          value: $2.75B
          detail: January 2022 Series C post-money; now 36+ months stale; implies 1.9× estimated 2024 IAP revenue
        - label: Total Capital Raised
          value: $467.5M
          detail: Series A ($50M, Feb 2021), Series B ($155M, Jun 2021), Series C ($255M, Jan 2022); no raise since
        - label: Global Revenue Rank (Oct 2024)
          value: '#2'
          detail: Second highest-grossing mobile game globally October 2024 per Sensor Tower; behind Candy Crush Saga only
        - label: Cumulative Gross Consumer Spend
          value: $3.9B+
          detail: Through early 2025; crossed $3B milestone in 2024 — fastest $2B-to-$3B trajectory in mobile puzzle genre
        - label: Years Since Last Raise
          value: 3+ years
          detail: >-
            No equity raise since January 2022; self-funded operations suggest strong EBITDA generation (est. 20–35%
            margin)
        - label: Conditional Buy EV Range
          value: $5B–$7B
          detail: >-
            3.4–4.8× 2024 est. net IAP revenue; consistent with King acquisition multiple; subject to diligence
            confirmation
    claimRefs:
      - CV001
      - CV002
      - CV003
      - CV004
      - CV006
      - CV007
      - CV008
      - CV009
