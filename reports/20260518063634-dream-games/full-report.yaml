            body: >-
              Dream Games has raised approximately $255 million in disclosed equity funding across multiple rounds
              covered in full in the Company Overview chapter. The most recent round was a $155 million Series C in 2022
              led by IVP with participation from Balderton Capital and Index Ventures at a post-money valuation reported
              at approximately $2.75 billion. No funding has been announced since 2022.


              Given the estimated EBITDA of $640M–$960M in 2024 and the minimal capex profile, Dream Games is almost
              certainly self-funding its operations from internal cash generation. There is no public evidence of debt
              financing, revolving credit facilities, or project-finance obligations. The primary stated use of the 2022
              capital was accelerating Royal Match user acquisition and funding new game development—which materialised
              as Royal Kingdom.


              Dream Games has not announced an IPO or publicly indicated a next funding round. IVP, Balderton, and Index
