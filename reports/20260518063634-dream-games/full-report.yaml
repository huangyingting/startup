      - number: '2.3'
        title: Buyer and Player Segmentation
        blocks:
          - type: paragraph
            body: >
              Mobile casual game monetisation relies on a bifurcated user base: a large population of non-paying or
              low-paying players who provide the social fabric and community (gifting lives, competing in events) and a
              small but high-value segment of payers (typically 2-5% of monthly active users) who drive essentially all
              IAP revenue. The average revenue per daily active user (ARPDAU) for top casual games in developed markets
              ranges from $0.10 to $0.40, implying an annual revenue per highly engaged payer of $36-$150. High-value
              payers ("whales") spend substantially more—research suggests the top 5% of payers account for 50-70% of
              IAP revenue in many free-to-play titles.


              The primary demographic for match-3 games skews female (55-65%) and aged 25-54, with the 35-54 cohort
              particularly well-represented. This demographic has higher disposable income, strong habitual engagement
              patterns, and lower churn than younger hypercasual demographics. US players are disproportionately
              high-value: higher smartphone penetration, credit card usage, and comfort with digital transactions drive
              the US's outsized revenue contribution. For Dream Games, the ~55% US revenue concentration reflects this
              demographic reality, but also represents concentration risk if US user acquisition costs rise or the core
              demographic ages into lower spending.


              The "buyer" in the mobile gaming context is the player themselves—there is no enterprise sales process or
              institutional procurement. This B2C structure means Dream Games' revenue model is entirely dependent on
              organic player acquisition through UA spend, app store discoverability, word-of-mouth, and brand
              advertising. The lack of any disclosed web-shop means Dream Games cannot bypass the 30% app store fee,
              unlike some competitors who have explored direct purchase mechanisms post-Epic v. Apple.
            claimRefs:
              - CM018
              - CM019
              - CM020
              - CM021
              - CM022
              - CM023
              - CM024
              - CM025
          - type: table
            tableRef: TM003
            claimRefs:
