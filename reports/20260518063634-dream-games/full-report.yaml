  - number: 7
    title: Risks
    sections:
      - number: '7.1'
        title: Legal & Regulatory Risks
        blocks:
          - type: paragraph
            body: >-
              Dream Games operates at the intersection of mobile gaming, in-app purchases, and global digital commerce
              regulation — a combination that has attracted sustained regulatory attention since 2020. The most
              immediate legal exposure is a class action lawsuit filed in August 2024 in Washington state alleging that
              Royal Match's in-game coin mechanic constitutes illegal gambling under Washington anti-gambling statutes.
              The plaintiff argues that coins purchased with real money and used to acquire in-game boosters constitute
              gambling because players cannot guarantee which boosters they receive. The outcome is unknown and
              financial exposure is undisclosed.


              At the federal level, the Federal Trade Commission has repeatedly signalled concern about loot-box
              mechanics in mobile games. In 2023 the FTC published a press release examining dark patterns and loot-box
              spending in digital gaming, and in December 2024 the FTC issued a broader report on mobile gaming
              practices. While Dream Games has not been individually named in any FTC enforcement action as of May 2026,
              the regulatory trajectory is negative: the agency is building a record that could support rulemaking
              targeting loot-box mechanics in free-to-play games.


              Internationally, the EU Digital Services Act enacted October 2022 and fully effective since February 2024
              introduces transparency and consumer-protection obligations for digital services in the EU. Belgium banned
              loot boxes in video games in 2018 following a Gaming Commission finding that they constitute gambling; the
              Netherlands reached a similar ruling for games mixing loot boxes with paid content. The UK Gambling
              Commission reviewed loot boxes and published findings calling for mandatory age verification and spending
              limits. California AB-2426 (2022) proposed mandatory loot-box disclosures. While none of these has yet
              materially constrained Royal Match revenue, the cumulative regulatory trajectory is toward greater
              transparency and potential monetisation restrictions — particularly for games with significant under-18
              user bases.


              Apple App Store anti-steering rules remain in force following Epic v. Apple (2021), which did not require
              Apple to allow external payment links. A subsequent 2024 ruling required Apple to permit some out-of-app
              links in the US, but the practical effect for Dream Games has been negligible: no web-shop alternative has
              been announced and the standard 30% platform fee remains operative. GDPR, COPPA, and CCPA compliance
              represent ongoing obligations that are not existential but require sustained legal investment.
