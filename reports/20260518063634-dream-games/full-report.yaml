  - number: 8
    title: Valuation
    sections:
      - number: '8.1'
        title: Recommendation & Thesis
        blocks:
          - type: paragraph
            body: >-
              Dream Games earns a CONDITIONAL BUY recommendation at an entry enterprise value of $5B–$7B, subject to
              completion of six priority diligence workstreams detailed in TV006. This range represents approximately
              3.4–4.8× estimated 2024 net IAP revenue of $1.46B, or approximately 2.9–4.4× estimated total revenue of
              $1.6B–$1.9B (including advertising). Three pillars support the thesis.


              First, Royal Match is the most compelling evidence of product-market fit in mobile casual gaming since
              Candy Crush. Cumulative gross consumer spend reached $3.9B by early 2025, a $2B-to-$3B trajectory
              completed in approximately 12 months — faster than peers Rise of Kingdoms, Lords Mobile, and Slotomania
              achieved equivalent milestones. Royal Match ranked #2 globally by iOS/Android revenue in October 2024,
              trailing only Candy Crush Saga. In the United States — which contributes approximately 55% of Royal Match
              revenue — the game led gross revenue charts for 17+ consecutive months through 2024.


              Second, the valuation gap is structurally attractive. Dream Games raised its last external capital in
              January 2022 at a $2.75B post-money valuation when the annualised revenue run-rate was roughly $333M. By
              2024, the same business generated $1.46B in net IAP revenue — a 4.4× increase on a 3+ year-old valuation
              mark. No secondary marks, structured notes, or public disclosures have updated this figure. In a sector
              where comparable acquisitions cleared 3–5× revenue, the current implied range ($4.4B–$8.8B at 3–6× 2024
              IAP revenues) represents a meaningful premium over the stale 2022 mark without requiring heroic
              assumptions about growth continuing at 91% CAGR.


              Third, Dream Games has demonstrated operating self-sufficiency. Having raised $467.5M across three rounds
              without needing a fourth raise in 36+ months, the company is almost certainly EBITDA-positive (estimated
              20–35% EBITDA margin on net revenue based on mobile-gaming industry norms after platform fees and UA
              spend). This reduces liquidity risk and signals that any exit would be on the company's timeline, not
              forced by a cash need.


              The principal anti-thesis drivers are: (a) Royal Match generates >90% of revenue, making the company a
              single-asset holding with binary exposure to engagement decay; (b) the Washington state class action filed
              in August 2024 introduces an unquantified contingent liability that could materially impact profitability
              if adverse; (c) platform fees of 30% are structurally non-negotiable at current scale, constraining margin
              improvement; and (d) no audited financials are available, meaning all revenue figures are third-party
              estimates with ±10–20% uncertainty.
