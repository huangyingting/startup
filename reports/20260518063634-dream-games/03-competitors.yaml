  - id: TP004
    title: Moat durability / competitive risk register
    columns:
      - moat factor / risk
      - direction
      - severity
      - time horizon
      - current mitigation / evidence
      - diligence ask
    rows:
      - - Dream Games UA efficiency advantage
        - Strength
        - High
        - Current to 2028
        - 4+ years of scaled UA operation; proprietary creative testing infrastructure; estimated lowest CPI in match-3 for target demographic
        - Request UA performance data (CPI, LTV, payback period) and compare to publicly reported industry benchmarks
      - - Royal Match level content bank (5,000+ levels)
        - Strength
        - High
        - Current to 2030+
        - Years of design investment; new entrants cannot replicate without 3-5 year content build; moat deepens with every update
        - Confirm actual level count and new-level production rate; assess whether design quality (not just quantity) is maintained
      - - Microsoft's deep-pocket backing of Candy Crush
        - Risk
        - High
        - Current and escalating
        - Microsoft could allocate Xbox/Game Pass assets (marketing, cross-promotion, streaming) to Candy Crush in ways Dream Games cannot counter
        - Assess whether Candy Crush UA spend trend shows Microsoft incremental investment; track Game Pass integration announcements
      - - "Multi-homing: players play multiple match-3 titles simultaneously"
        - Risk
        - Medium
        - Structural
        - Low switching cost is inherent to the genre; Dream Games' moat is share-of-wallet and engagement depth, not exclusivity
        - Determine Royal Match's average sessions-per-day and time-per-session vs segment benchmarks; assess multi-homing rate via UA partner data
      - - Royal Kingdom internal cannibalisation of Royal Match
        - Risk
        - Medium
        - 2025-2027
        - Dream Games has designed Royal Kingdom with a distinct narrative theme to minimise overlap; early data needed
        - Request segmented DAU and retention data for Royal Match players who also installed Royal Kingdom; assess cross-game ARPU impact
      - - UA cost inflation (ATT + Privacy Sandbox)
        - Risk
        - Medium-High
        - Structural; ongoing
        - Dream Games' scale provides some mitigation vs smaller competitors; large UA buyer has more data to calibrate bidding
        - Request iOS vs Android UA split and CPI trend data since ATT launch (2021-2026); compare to Singular/AppsFlyer industry CPI benchmarks
      - - Playrix content and live-ops competitive intensity
        - Risk
        - Medium
        - Current
        - Playrix is highly profitable and technically sophisticated; Gardenscapes/Homescapes are well-maintained products
        - Monitor Playrix level update cadence and event quality; assess whether Playrix is acquiring UA talent or expanding studio capacity
      - - New entrant disruption (AI-native match-3)
        - Risk
        - Low-Medium
        - 3-7 years
        - Level design AI tools could reduce content moat value by lowering production cost for new entrants; however, UA scale remains a barrier
        - Monitor AI-assisted game design tools adoption in mobile gaming; track whether AI-native casual studios are gaining traction in top charts
    notes: >-
      Severity assessments are qualitative analyst judgements based on public evidence. "High" severity
      risks are those where the competitive threat could materially affect Royal Match's revenue within
      3 years without mitigation. Microsoft's Candy Crush backing is designated High severity because
      of the potential for strategically subsidised UA and cross-platform distribution that would be
      asymmetric to Dream Games' capabilities as an independent studio.
