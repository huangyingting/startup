  - id: section-P-2
    title: Competitor Profiles
    body: >
      Candy Crush Saga, published by King (a wholly owned subsidiary of Activision Blizzard,
      itself acquired by Microsoft in January 2023), is the most significant direct competitor.
      Candy Crush was the world's highest-grossing mobile game for multiple years before Royal Match's
      ascent, and it remains a formidable title with an extraordinarily deep level bank (15,000+ levels
      on the web version; 8,900+ on mobile), over 2.7 billion cumulative downloads, and a mature
      player base with deeply embedded habits. BusinessOfApps estimates Candy Crush Saga generated
      approximately $700M-$900M in gross consumer spend in 2024, down from a peak above $1 billion.
      Microsoft's backing provides virtually unlimited UA funding and potential cross-promotional
      integration across Xbox and Game Pass ecosystems. King also maintains Candy Crush Soda Saga and
      other portfolio titles that provide brand reinforcement.


      Playrix (privately held, Irish-registered, Ukrainian-founded) is the second-largest match-3
      developer by combined portfolio revenue. Gardenscapes and Homescapes together generate an
      estimated $900M-$1.1B in annual gross consumer spend. Both games use a meta-decoration layer—
      garden restoration in Gardenscapes, mansion renovation in Homescapes—layered over match-3 core
      mechanics, a design pattern that Royal Match adopted and refined into castle restoration. Playrix
      relocated its corporate headquarters from Ukraine to Ireland following Russia's 2022 invasion of
      Ukraine. Playrix has a reported staff of approximately 3,000-4,000 employees globally.


      Peak Games, a Turkish developer acquired by Zynga in 2020 for approximately $1.8 billion, is the
      publisher of Toon Blast and Toy Blast—two blast-mechanic casual games that use colour-matching
      blast physics rather than traditional swap-match-3 mechanics. Following Zynga's acquisition by
      Take-Two Interactive in 2022 for approximately $12.7 billion, Peak Games operates as a Zynga
      studio within Take-Two. Toon Blast and Toy Blast collectively generate an estimated $500-700M
      in annual gross consumer spend, and benefit from Zynga's UA infrastructure and Take-Two's balance
      sheet. Peak Games is Dream Games' closest national peer—both are Turkish mobile gaming studios—
      but their games compete directly in the casual gaming wallet.
