callouts:
  - calloutType: strength
    title: Royal Match Is the Match-3 Segment Leader with Deep Content and UA Moats
    body: >-
      Royal Match's displacement of Candy Crush Saga as the segment's highest-grossing title reflects
      genuine product superiority (meta-layer, visual quality, fair difficulty) backed by best-in-class
      UA execution. The 5,000+ level bank and weekly live-ops cadence sustain engagement and create
      structural barriers for new entrants. Dream Games' UA efficiency—built over four years of scaled
      operation—is estimated to be the highest in the match-3 segment, providing a compounding
      advantage as Apple ATT and Privacy Sandbox raise CPIs for less sophisticated buyers.
    claimRefs:
      - CP001
      - CP019
      - CP022
      - CP029
  - calloutType: risk
    title: Three Corporate-Backed Competitors Can Sustain UA Losses Dream Games Cannot
    body: >-
      Microsoft (Candy Crush), Take-Two/Zynga (Toon/Toy Blast), and Playrix all have the ability
      to sustain UA spend in excess of economic return for strategic reasons—Microsoft to sustain
      Game Pass ecosystem data, Take-Two to protect a $12.7B acquisition, Playrix for portfolio
      brand. An independent Dream Games cannot match indefinite strategically-subsidised UA
      competition. This asymmetry is the primary structural competitive risk.
    claimRefs:
      - CP028
      - CP032
      - CP033
  - calloutType: insight
    title: Monopoly GO Demonstrates Adjacent Category Disruption Risk
    body: >-
      Monopoly GO's $2B+ revenue in its first year (2023) shows that a new casual game with a
      licensed IP and aggressive UA spend can reach match-3 scale within 12-18 months. While
      Monopoly GO's mechanic does not directly displace match-3 titles, it validates that the
      casual female 25-55 demographic is reachable by new entrants with the right IP and UA
      resources—suggesting the category is not permanently closed to disruption.
    claimRefs:
      - CP017
      - CP018
      - CP035

