  evidenceGaps:
    - type: missing-source
      severity: material
      topic: competitor-ua-spend
      missingEvidence: "Dream Games' exact UA spend and individual competitor UA budgets are not publicly disclosed; the $400-600M estimate for Dream Games is derived from analyst reports and press commentary, not confirmed primary data."
      whyItMatters: "UA spend is the primary competitive mechanism in match-3; if Dream Games' UA budget advantage is smaller than estimated, the efficiency moat is weaker than presented."
      diligencePath: "Request UA performance metrics and annual UA budget in data room; compare to AppsFlyer or Singular industry benchmarks for top-10 mobile UA spenders."
      relatedQuestionRefs: [QP009, QP016, QP022]
      relatedTableRefs: [TP002]

    - type: missing-source
      severity: material
      topic: royal-kingdom-cannibalisation
      missingEvidence: "No public data exists on whether Royal Kingdom players have reduced their Royal Match engagement or spend; this is a critical internal risk question with no public evidence."
      whyItMatters: "If Royal Kingdom cannibalises Royal Match's high-LTV player base, the two-title strategy could reduce total Dream Games revenue rather than expanding it."
      diligencePath: "Request segmented player analytics showing Royal Match ARPU and engagement metrics before and after Royal Kingdom launch; obtain cross-game cohort analysis."
      relatedQuestionRefs: [QP013, QP022]
      relatedTableRefs: [TP004]

