  - id: section-P-4
    title: Moat Durability and Competitive Risk
    body: >
      Royal Match's competitive position rests on several reinforcing advantages. Its level content
      bank—estimated at over 5,000 levels as of 2026—represents years of design investment that new
      entrants cannot replicate quickly. Dream Games' UA sophistication and budget scale are estimated
      to be the largest in the match-3 segment; its LTV-per-install metrics, honed over four years of
      scaled operation, provide a UA efficiency edge over smaller competitors. The King Robert character
      IP and brand aesthetic are recognisable and have driven strong TV and digital advertising recall.
      Royal Match's live-ops team maintains player engagement through regular limited-time events,
      maintaining daily active user count.


      Switching costs in match-3 games are relatively low by software standards. Players can—and
      do—multi-home: playing multiple casual games simultaneously is common. Data from casual gaming
      research suggests that a significant portion of Royal Match payers also play Candy Crush Saga or
      Gardenscapes. This means Dream Games is not competing for exclusive player attention but for
      share of mobile entertainment budget and time. The low switching cost makes player retention and
      UA efficiency—not exclusive lock-in—the key competitive mechanism.


      The primary adverse competitive fact is that Dream Games faces three well-capitalised corporate
      competitors: Microsoft (Candy Crush via King), Take-Two/Zynga (Toon and Toy Blast via Peak),
      and Playrix (private but reportedly profitable at scale). Each can absorb margin compression in
      UA spending in ways that Dream Games, as a private independent company, may find more
      challenging. Microsoft in particular has strategic incentives to sustain Candy Crush's scale
      beyond pure economic return (platform ecosystem, Game Pass data). Dream Games' internal risk
      from Royal Kingdom cannibalising Royal Match's player base is a specific moat-durability
      question that remains unresolved from public evidence.
    claimRefs:
      - CP027
      - CP028
      - CP029
      - CP030
      - CP031
      - CP032
      - CP033
      - CP034
      - CP035
