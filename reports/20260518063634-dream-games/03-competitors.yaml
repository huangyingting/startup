      severity: minor
      topic: microsoft-candy-crush-strategy
      missingEvidence: "Microsoft has not publicly disclosed its strategic plans for Candy Crush's integration with Xbox, Game Pass, or other Microsoft gaming properties; the threat is structural but unconfirmed from public evidence."
      whyItMatters: "If Microsoft deploys Xbox/Game Pass cross-promotional infrastructure for Candy Crush, it could accelerate Candy Crush player re-acquisition and reverse the revenue decline."
      diligencePath: "Monitor Microsoft's annual gaming division disclosures; track any Game Pass integration announcements for King titles."
      relatedQuestionRefs: [QP003, QP012]

    - type: conflicting-data
      severity: minor
      topic: candy-crush-revenue
      missingEvidence: "Candy Crush Saga's 2024 revenue estimates range from $700M to $1B depending on the source; the revenue trend (declining, stabilising, or adapting) is unclear from public data."
      whyItMatters: "If Candy Crush is stabilising rather than declining, the competitive threat to Royal Match's segment leadership is higher than a declining trajectory implies."
      diligencePath: "Cross-reference Appmagic, SensorTower, and BusinessOfApps Candy Crush revenue data; seek corroboration from Microsoft's mobile gaming segment disclosures in annual reports."
      relatedQuestionRefs: [QP002, QP018]

