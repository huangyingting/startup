    title: Founder team with demonstrated domain expertise
    body: >-
      All five co-founders left Peak Games—the studio whose exits (Toon Blast, Toy Blast) led to a $1.8B Zynga
      acquisition—to build Dream Games. This shared origin provides a rare combination of product, engineering,
      art, and live-ops expertise in the exact segment the company targets.
    claimRefs:
      - CO012
      - CO013
      - CO014
      - CO015
      - CO016
  - calloutType: risk
    title: Stale valuation and private-company opacity
    body: >-
      The most recent disclosed valuation of $2.75B dates to January 2022, before three years of material revenue
      growth. No audited financials, no secondary pricing, and no IPO timeline have been publicly disclosed, making
      fundamental valuation analysis dependent on third-party revenue estimates and comp multiples.
    claimRefs:
      - CO025
      - CO027
      - CO034
  - calloutType: risk
    title: Class action litigation introduces regulatory and reputational risk
    body: >-
      The August 2024 class action alleging Royal Match violates Washington state gambling law is the first
      disclosed litigation risk for Dream Games. The outcome is uncertain; adverse rulings could require game
      mechanic changes and set a precedent that expands to other markets.
    claimRefs:
      - CO041

