  - id: section-O-2
    title: Founding Team
    body: >
      Dream Games was co-founded by five individuals who collectively built their careers at Peak Games before leaving
      to launch their own studio. Soner Aydemir, the CEO, served as Director of Product at Peak Games and is
      considered the primary product visionary at Dream Games. Ikbal Namli co-founded the company and led engineering
      at Peak prior to the move; Hakan Saglam also held an engineering leadership role at Peak. Eren Sengul served as
      a product manager at Peak; and Serdar Yilmaz was a 3D artist at Peak. All five founders share direct
      domain experience in casual puzzle games, which is a strong founder-market fit signal for a studio whose
      first product competed in exactly that segment.


      The team's Peak Games pedigree is analytically meaningful: Peak Games was itself acquired by Zynga for $1.8B
      in 2020, making it the most successful Turkish games exit in history and demonstrating that the founders
      understood how to build high-value casual games at scale. That background provided a ready template for product
      mechanics, monetisation design, and live-operations management. None of the five founders appears to have
      departed as of the most recent publicly available sources in May 2026, suggesting low early-stage attrition in
      the founding team.


      In December 2023, Dream Games appointed Edwin Catmull—co-founder of Pixar and former President of Pixar/Disney
      Animation Studios—as a strategic advisor. This appointment generated press coverage and signals an interest in
      elevating the company's creative brand beyond pure game mechanics, though Catmull's operational role is advisory
      rather than executive. The company has grown its headcount from roughly 80 employees at the time of the January
      2022 Series C to an estimated 500+ by 2024, though exact current headcount is not publicly disclosed.
