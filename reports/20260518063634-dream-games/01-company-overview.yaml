  - id: FO002
    title: Company snapshot logic
    type: flow
    layout: standard
    summary: >-
      Dream Games converts casual puzzle engagement into IAP revenue via a freemium loop: new players enter
      through paid UA, progress through thousands of levels, spend on lives/boosters/passes, and generate
      recurring revenue that funds further UA and content development.
    data:
      nodes:
        - id: ua
          label: User Acquisition (paid UA)
          detail: Large-scale paid advertising on Meta, Google, TikTok, and TV; UA spend is the dominant cost line.
          tone: neutral
        - id: install
          label: Game Install (iOS / Android)
          detail: Player installs Royal Match or Royal Kingdom free; no upfront charge.
          tone: neutral
        - id: engagement
          label: Level Progression & Engagement
          detail: Thousands of match-3 levels create a long engagement runway; King Robert narrative adds retention.
          tone: positive
        - id: iap
          label: In-App Purchases
          detail: Players buy extra lives, boosters, coin packs, and limited-time passes; IAP is the sole revenue stream.
          tone: positive
        - id: revenue
          label: Net Revenue (after 30% store cut)
          detail: Apple App Store and Google Play retain ~30%; Dream Games retains ~70% of consumer spend.
          tone: neutral
        - id: reinvest
          label: Revenue Reinvestment
          detail: Net revenue funds UA spend, content development (new levels, events), and operating costs.
          tone: neutral
      edges:
        - from: ua
          to: install
        - from: install
          to: engagement
        - from: engagement
          to: iap
        - from: iap
          to: revenue
        - from: revenue
          to: reinvest
        - from: reinvest
          to: ua
