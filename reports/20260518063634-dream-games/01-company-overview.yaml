company:
  name: Dream Games
chapter:
  number: 1
  title: Company Overview
  summary: >-
    Dream Games is an Istanbul-based mobile puzzle developer founded in 2019 by five alumni of Peak Games. Its debut
    title, Royal Match, became one of the highest-grossing mobile games ever made, generating an estimated $1.46B in
    IAP revenue in 2024 alone and accumulating roughly $3.9B in cumulative consumer spend by October 2024. A $467.5M
    funding history from Index Ventures, Balderton Capital, Makers Fund, IVP, BlackRock, and Kora gives the company
    a last-known post-money valuation of $2.75B (January 2022). A second title, Royal Kingdom, launched globally in
    November 2024 and is the primary near-term growth catalyst. The company remains private as of May 2026 and
    discloses limited financial detail publicly.

sections:
  - id: section-O-1
    title: Identity and Business Model
    body: >
      Dream Games is a Turkish mobile video-game studio headquartered in Istanbul, with a secondary office in London.
      It was incorporated in 2019 and operates a business model centred entirely on free-to-play (F2P) mobile puzzle
      games monetised through in-app purchases (IAP). All publicly disclosed revenue is derived from IAP—there is no
      advertising or subscription revenue layer disclosed in any public source as of May 2026. The studio's flagship
      product, Royal Match, is a match-3 puzzle game for iOS and Android featuring King Robert as its central
      character and built on the Unity engine. Royal Match launched globally in March 2021 and rapidly became a top
      grossing title in the casual puzzle sub-genre. A second title, Royal Kingdom (starring King Richard), soft
      launched in April 2023 and globally launched on November 21, 2024.


      Dream Games positions itself as a premium casual-game developer with a disciplined single-game focus—a deliberate
      strategic contrast to the multi-title strategy common among larger peers. The company's founders came almost
      entirely from Peak Games, a Turkish studio known for Toon Blast and Toy Blast, and they replicated and extended
      Peak's match-3 expertise in a new brand. Dream Games' business model combines deep level content (Royal Match
      reportedly has several thousand levels), an escalating difficulty progression that drives IAP spend, and
      large-scale user acquisition (UA) spending—estimated to be the single largest expense category. The London office
      is believed to handle European operations, though the company has not officially disclosed its geographic
      organisational structure.


      As of 2024, Dream Games ranked as the seventh-largest mobile game developer globally by revenue, according to
      GamesIndustry.biz year-in-numbers data. The US accounted for approximately 55% of revenue, with India driving
      roughly 14% of downloads. UK, Japan, Germany, and South Korea are cited as additional key revenue markets.
