  evidenceGaps:
    - type: private-evidence-only
      severity: material
      topic: financials
      missingEvidence: "Dream Games has not disclosed audited financial statements, exact revenue figures, gross margin, EBITDA, burn rate, or cash position in any public filing or press release."
      whyItMatters: "Without audited financials, all revenue figures rest on third-party analytics estimates (Appmagic, SensorTower) that carry material uncertainty and do not reflect costs or profitability."
      diligencePath: "Request audited or reviewed financial statements from management; cross-check against App Store and Google Play reconciliation data if available in data room."
      relatedQuestionRefs: [QO005]

    - type: private-evidence-only
      severity: material
      topic: valuation
      missingEvidence: "The last disclosed post-money valuation of $2.75B dates to January 2022. No secondary transactions, tender offers, or new valuation marks have been publicly disclosed since."
      whyItMatters: "A four-year-old valuation that pre-dates a 3-6x revenue increase cannot support current investment decision-making; the implied multiple gap is a primary underwriting risk."
      diligencePath: "Seek secondary pricing data from Nasdaq Private Market, Carta, or comparable secondary brokers; request most recent 409A or board-approved valuation from management."
      relatedQuestionRefs: [QO003, QO009]

    - type: private-evidence-only
      severity: material
      topic: cap-table
      missingEvidence: "Exact ownership stakes, liquidation preferences, anti-dilution provisions, and pro-rata rights for all investors are not publicly available."
      whyItMatters: "Cap table structure directly affects return scenarios and ability to raise or exit; unknown preference stack could significantly reduce common equity value."
      diligencePath: "Obtain cap table via formal data room; request investor rights agreement and side letters from counsel."
      relatedQuestionRefs: [QO004]
      relatedTableRefs: [TO003]

    - type: enumeration-incomplete
      severity: minor
      topic: leadership
      missingEvidence: "Executive leadership below co-founder level (VP Engineering, CMO, CFO, GM) and full board composition are not publicly named."
      whyItMatters: "Key-person dependency below founder level cannot be assessed; succession risk and bench depth are unknown."
      diligencePath: "Request internal org chart and LinkedIn cross-check during diligence process."
      relatedQuestionRefs: [QO011]
      relatedTableRefs: [TO002]

    - type: missing-source
      severity: minor
      topic: litigation
      missingEvidence: "The August 2024 class action (Washington state gambling law) is reported only through ClassAction.org; no court docket, case number, or subsequent legal filings have been verified."
      whyItMatters: "Litigation outcome and financial exposure—whether settled, dismissed, or proceeding to trial—are undisclosed and could have product or financial implications."
      diligencePath: "Pull PACER docket; engage litigation counsel to assess viability and settlement risk."
      relatedQuestionRefs: [QO013]
      relatedTableRefs: [TO004]

    - type: missing-source
      severity: minor
      topic: headcount
      missingEvidence: "No official headcount figure has been disclosed; the ~500 estimate is derived from press narrative and LinkedIn trajectory."
      whyItMatters: "Headcount is a primary proxy for operating cost structure; without accurate headcount, burn rate and unit economics estimates cannot be grounded."
      diligencePath: "Request payroll confirmation or LinkedIn cross-check; ask management directly during diligence call."
      relatedQuestionRefs: [QO011]
      relatedTableRefs: [TO001]

    - type: missing-source
      severity: minor
      topic: offices
      missingEvidence: "Dream Games has not officially confirmed the function or size of its London office; all references come from job postings and LinkedIn, not official press releases."
      whyItMatters: "Understanding whether London is a small marketing/sales outpost or a substantial engineering presence affects headcount, cost geography, and operational risk assessment."
      diligencePath: "Review LinkedIn employee locations; request office lease or headcount breakdown by location during formal diligence."
      relatedQuestionRefs: [QO010]

    - type: missing-source
      severity: minor
      topic: geography
      missingEvidence: "The ~55% US revenue share figure is cited in press but not sourced to an official company disclosure or a named analyst report with methodology."
      whyItMatters: "Geographic revenue concentration affects regulatory exposure, FX risk, and user acquisition cost efficiency; unverified figures may overstate or understate US dependence."
      diligencePath: "Request management-provided geographic revenue breakdown in formal data room; cross-check against Appmagic or SensorTower geographic split data."
