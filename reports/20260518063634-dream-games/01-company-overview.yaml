callouts:
  - calloutType: strength
    title: Exceptional revenue growth from a single title
    body: >-
      Royal Match's trajectory from zero to $1.46B in estimated annual IAP revenue by 2024—achieved without a
      disclosed revenue from any second product—is among the strongest single-title performances in mobile gaming
      history. The game's peak at $177M in a single month (October 2024) suggests continued engagement depth
      rather than a declining lifecycle curve.
    claimRefs:
      - CO032
      - CO033
      - CO038
      - CO039
      - CO040
