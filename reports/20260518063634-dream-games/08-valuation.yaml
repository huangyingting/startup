company:
  name: Dream Games
chapter:
  number: 8
  title: Valuation
  summary: >-
    Dream Games is a CONDITIONAL BUY at the right entry price. The investment thesis rests on three pillars: (1)
    Royal Match is the most capital-efficient puzzle game ever built, generating an estimated $1.46B in net IAP
    revenue in 2024 from a single title with no disclosed debt and no new equity raise since January 2022; (2)
    the last stated valuation of $2.75B (Series C, January 2022) is deeply stale relative to a business that
    has grown ~91% CAGR since that mark, implying a valuation gap worth disciplined pursuit; and (3) comparable
    M&A transactions — King/Activision ($5.9B, 2016), Zynga/Take-Two ($12.7B, 2022), Supercell/Tencent ($8.6B,
    2016) — provide a precedent framework that, applied to 2024 revenues, implies an enterprise value range of
    $4.4B–$8.8B at 3–6× IAP revenue. The anti-thesis centres on single-game concentration (>90% revenue from
    Royal Match), a pending Washington state gambling class action, 30% platform fee dependency, and the absence
    of audited financials. The base-case conditional-buy range is $5B–$7B EV (approximately 3.4–4.8× estimated
    2024 IAP revenue or 2.9–4.4× estimated total revenue including advertising), requiring heavy diligence on
    platform risk, Royal Kingdom execution, and litigation exposure before commitment. At prices above $8B,
    the risk-adjusted return deteriorates sharply without confirmation of Royal Kingdom's commercial scale.

sections:
  - id: section-V-1
    title: Recommendation & Thesis
    body: >-
      Dream Games earns a CONDITIONAL BUY recommendation at an entry enterprise value of $5B–$7B, subject to
      completion of six priority diligence workstreams detailed in TV006. This range represents approximately
      3.4–4.8× estimated 2024 net IAP revenue of $1.46B, or approximately 2.9–4.4× estimated total revenue
      of $1.6B–$1.9B (including advertising). Three pillars support the thesis.


      First, Royal Match is the most compelling evidence of product-market fit in mobile casual gaming since
      Candy Crush. Cumulative gross consumer spend reached $3.9B by early 2025, a $2B-to-$3B trajectory
      completed in approximately 12 months — faster than peers Rise of Kingdoms, Lords Mobile, and Slotomania
      achieved equivalent milestones. Royal Match ranked #2 globally by iOS/Android revenue in October 2024,
      trailing only Candy Crush Saga. In the United States — which contributes approximately 55% of Royal
      Match revenue — the game led gross revenue charts for 17+ consecutive months through 2024.


      Second, the valuation gap is structurally attractive. Dream Games raised its last external capital in
      January 2022 at a $2.75B post-money valuation when the annualised revenue run-rate was roughly $333M.
      By 2024, the same business generated $1.46B in net IAP revenue — a 4.4× increase on a 3+ year-old
      valuation mark. No secondary marks, structured notes, or public disclosures have updated this figure.
      In a sector where comparable acquisitions cleared 3–5× revenue, the current implied range ($4.4B–$8.8B
      at 3–6× 2024 IAP revenues) represents a meaningful premium over the stale 2022 mark without requiring
      heroic assumptions about growth continuing at 91% CAGR.


      Third, Dream Games has demonstrated operating self-sufficiency. Having raised $467.5M across three
      rounds without needing a fourth raise in 36+ months, the company is almost certainly EBITDA-positive
      (estimated 20–35% EBITDA margin on net revenue based on mobile-gaming industry norms after platform
      fees and UA spend). This reduces liquidity risk and signals that any exit would be on the company's
      timeline, not forced by a cash need.


      The principal anti-thesis drivers are: (a) Royal Match generates >90% of revenue, making the company
      a single-asset holding with binary exposure to engagement decay; (b) the Washington state class action
      filed in August 2024 introduces an unquantified contingent liability that could materially impact
      profitability if adverse; (c) platform fees of 30% are structurally non-negotiable at current scale,
      constraining margin improvement; and (d) no audited financials are available, meaning all revenue
      figures are third-party estimates with ±10–20% uncertainty.
    tableRefs:
      - TV001
      - TV002
    figureRefs:
      - FV001
      - FV004

  - id: section-V-2
    title: Valuation Framework
    body: >-
      Three valuation methodologies converge on a base-case enterprise value range of $5B–$7B for Dream Games
      as of May 2026.


      Comparable M&A transactions provide the primary anchor. The five most relevant mobile-gaming acquisitions
      span 2016–2023 and show revenue multiples of 3–5× at deal close (see TV004). King was acquired by
      Activision in 2016 for $5.9B at approximately $1.4B annual revenue — a 4.2× multiple — at a time when
      King's growth had decelerated materially. Supercell was taken private by Tencent in 2016 for $8.6B at
      approximately $2.3B revenue — 3.7×, reflecting Supercell's multi-game diversification premium. Zynga
      was acquired by Take-Two in 2022 for $12.7B at approximately $2.8B LTM revenue — 4.5× — with a control
      premium embedded. Playtika's 2021 IPO at approximately $11B for $2B revenue (5.5×) provides a public-
      markets reference. Rovio's 2023 acquisition by Sega for $775M at approximately $260M revenue (3×) is
      the negative outlier, reflecting declining game engagement and lower growth.


      Dream Games differentiates from the Rovio case on every dimension: Royal Match revenue grew from ~$400M
      to ~$1.46B (net IAP) between 2022 and 2024 (~91% CAGR), suggesting a premium over the Rovio 3×
      baseline. The King analogy (single-flagship game, US-concentrated revenue, $1.4B annual run-rate at
      acquisition) is the most structurally comparable, implying a 4–5× multiple. Applied to Dream Games'
      $1.46B 2024 IAP revenue, this produces $5.8B–$7.3B — consistent with the $5B–$7B base case. A
      discounted cash flow cross-check, assuming 15% net revenue growth in 2025–2026, 25% EBITDA margins, and
      a 15× EBITDA exit in 5 years discounted at 20%, yields a present value in the $4B–$6B range, further
      bracketing the base case.


      The valuation sensitivity matrix (FV002) illustrates how enterprise value changes across revenue
      assumptions and EV/revenue multiples. At 3× a $1.6B base revenue, EV = $4.8B; at 5× the same revenue,
      $8B; at 7×, $11.2B. The $5B–$7B conditional-buy band corresponds roughly to 3.5–5× estimated 2024
      total revenue — a disciplined entry point that leaves upside if Royal Kingdom scales and the multiple
      re-rates toward the King/Zynga precedent.


      Post-2022 multiple compression in gaming is a structural headwind. Following the pandemic-era valuation
      peak, Nasdaq-listed gaming companies saw EV/revenue multiples contract 40–60% by end of 2023. However,
      Dream Games' strong private cash generation and absence of a forced-exit timeline insulate it somewhat
      from public-market multiple volatility. A strategic acquirer — particularly a platform (Apple, Microsoft,
      Amazon), a major publisher seeking mobile exposure, or a large-cap gaming consolidator — could justify
      a 5–7× premium based on Royal Match's proven cash-flow profile.
    tableRefs:
      - TV004
    figureRefs:
      - FV002
      - FV003

  - id: section-V-3
    title: Scenario Analysis
    body: >-
      Three scenarios bracket the range of outcomes for a Dream Games investment, with probability weights
      reflecting the current evidence base (see TV003 and FV003).


      The bear case (20% probability) assumes Royal Match revenue declines 15% in 2025 as engagement saturation
      accelerates and Royal Kingdom fails to contribute meaningfully. In this scenario, total estimated 2025
      revenue is approximately $1.2B, and applicable EV/revenue multiples compress to 3× given decelerating
      growth, implying a $3.6B enterprise value. Platform fee increases or an adverse gambling-law ruling
      would compound this scenario. Return at a $5B entry would be deeply negative. The key early signal is
      Royal Match monthly active users trending down in H1 2025 data or Royal Kingdom generating less than
      $10M in its first six months post-global launch.


      The base case (55% probability) assumes Royal Match revenue grows modestly at 5–10% in 2025 to
      approximately $1.6B in combined net IAP revenue, with Royal Kingdom adding $50–150M. The market
      assigns a 4–5× multiple given continued growth and profitability, producing a $6.4B–$8B enterprise
      value. At a $5B–$7B entry, this represents a 1.3–1.5× cash multiple over a 3–5 year hold. A strategic
      premium from an acquirer with platform synergies could lift this further.


      The bull case (25% probability) assumes Royal Kingdom achieves $200–400M revenue in 2025 as the US
      market launch drives strong monetisation, and Royal Match sustains 15%+ growth through continued
      level-design innovation. Combined revenue approaches $2.0B, and the market re-rates to 5–7× given
      demonstrated multi-game capability, producing an $10B–$14B enterprise value. At a $5B–$7B entry,
      this is a 1.7–2.0× or better cash multiple — strongly attractive risk-adjusted.


      The key scenario discriminators are: (1) Royal Kingdom revenue in the first 180 days post-global
      launch (November 2024 data available shortly); (2) Royal Match year-over-year revenue change through
      Q2 2025; (3) resolution or material updates on the Washington gambling class action; and (4) any
      signal of Dream Games filing an S-1 or engaging M&A advisers. No IPO has been announced as of
      May 2026; the company has not disclosed future plans publicly.
    tableRefs:
      - TV003

  - id: section-V-4
    title: Diligence Gaps & Kill Triggers
    body: >-
      Five categories of evidence remain structurally unavailable from public sources, each representing a
      material gap that must be resolved before committing capital (see TV006 for the complete diligence list).


      First, audited financial statements. All revenue figures cited in this chapter are third-party analyst
      estimates from Sensor Tower, AppMagic, MobileGamer.biz, and related sources. These estimates have a
      track record of ±10–20% variance against disclosed actuals in comparable companies. Without audited
      P&L, balance sheet, and cash flow statements — and crucially, without confirmation of inter-company
      transfers (Dream Games' Istanbul entities vs. any group holding structure) — no high-confidence
      margin or EBITDA estimate is possible. The $467.5M raised across three rounds has not been reconciled
      against disclosed deployment.


      Second, cap table and preference stack. Dream Games' investors include Index Ventures, IVP, and Makers
      Fund across three funding rounds. Liquidation preference terms, anti-dilution provisions, drag-along
      rights, and any co-investor MFN clauses are entirely unknown from public sources. In a $5B–$7B entry
      transaction, liquidation preference overhang could materially alter equity economics for common holders.


      Third, Royal Kingdom performance data. The game launched globally in November 2024 after a soft launch
      generating approximately $20M. Whether the US market — the 55%-of-revenue driver excluded from soft
      launch — responds comparably to Royal Match cannot be assessed without first-party retention and
      monetisation cohort data.


      Fourth, gambling litigation financial exposure. The Washington state class action filed August 2024
      is active but no court ruling, class certification, or settlement demand has been made public. The
      financial exposure is entirely unquantifiable without case discovery or a damages estimate.


      Kill triggers are enumerated in TV005. The most material near-term trigger is Royal Match monthly
      net IAP revenue declining more than 15% year-over-year for two consecutive quarters — a signal of
      structural engagement decay rather than seasonal variation. An adverse class certification ruling in
      the Washington gambling case, or a Supreme Court or appellate court ruling that fundamentally
      recharacterises similar mechanics as gambling, would also constitute an immediate kill trigger requiring
      suspension of diligence and re-evaluation of the regulatory risk framework.
    tableRefs:
      - TV005
      - TV006

