  evidenceGaps:
    - id: EG-V-01
      description: "Audited financial statements unavailable: No audited P&L, balance sheet, or cash flow statement has been published for Dream Games for any fiscal year. All revenue, margin, and EBITDA estimates are derived from third-party analytics platforms (Sensor Tower, AppMagic, MobileGamer.biz) with an estimated ±10–20% uncertainty range against disclosed actuals."
      impact: "Blocking — no investment decision should proceed without FY2022–FY2024 audited financials; all valuation modelling uncertainty is compounded by this gap."
      mitigationPath: "Require provision of audited financials as P0 condition of data room access; engage independent QoE provider to validate third-party estimates against management accounts."
      type: private-evidence-only
      severity: blocking
      relatedQuestionRefs: [QV017, QV023, QV030]

    - id: EG-V-02
      description: "Cap table and preference stack undisclosed: Liquidation preference terms for Series A (Index Ventures, $50M), Series B ($155M), and Series C ($255M) are not publicly available. Anti-dilution provisions, drag-along rights, board composition rights, and any secondary transactions or tender offers are unknown."
      impact: "Material — preference stack could materially reduce common equity proceeds in a $5B–$7B exit; without cap table, economics for all share classes cannot be modelled."
      mitigationPath: "Obtain fully-diluted cap table and complete shareholder agreement as P0 diligence requirement; model distribution waterfall across multiple exit price scenarios."
      type: private-evidence-only
      severity: blocking
      relatedQuestionRefs: [QV031]

    - id: EG-V-03
      description: "Royal Kingdom first-year performance: The game launched globally in November 2024 but first-party retention data, ARPDAU, and US market monetisation metrics are not available from public sources. All Royal Kingdom revenue contribution estimates carry high uncertainty, directly affecting bull and base case scenario probabilities."
      impact: "Material — Royal Kingdom performance is the primary driver of scenario weighting; without cohort data, bull-case probability (25%) is poorly supported."
      mitigationPath: "Obtain D7, D30, D90 retention and ARPDAU data from Dream Games product team; compare to Royal Match early-lifecycle benchmarks; obtain AppMagic/SensorTower estimates as interim proxy."
      type: missing-source
      severity: material
      relatedTableRefs: [TV003]
      relatedQuestionRefs: [QV021]

    - id: EG-V-04
      description: "Comparable valuation table (TV004) covers only 5 mobile-gaming transactions from 2016–2023; more recent private transactions (2024–2026) and additional mid-tier mobile gaming deals are not included due to limited public data availability. The comparable set may not fully reflect current market conditions."
      impact: "Minor — the five transactions selected are the most relevant; absence of 2024–2026 transactions understates any further multiple compression."
      mitigationPath: "Monitor PitchBook and CB Insights for any 2025–2026 gaming M&A transactions that could update the applicable multiple range."
      type: enumeration-incomplete
      severity: minor
      relatedTableRefs: [TV004]
      relatedQuestionRefs: [QV018]

    - id: EG-V-05
      description: "Washington gambling class action financial exposure: The lawsuit filed August 2024 is active but no court order, settlement demand, damages estimate, or class certification motion has been made public. The financial exposure ranges from immaterial (dismissed pre-certification) to potentially $100M+ (full class certification with damages)."
      impact: "Material — creates unquantifiable contingent liability that cannot be modelled into the valuation; could trigger covenant violations or deal-closing conditions."
      mitigationPath: "Engage litigation counsel; obtain case docket via PACER; request legal opinion from Dream Games counsel on class certification probability and damages exposure."
      type: missing-source
      severity: material
      relatedQuestionRefs: [QV015, QV016]

