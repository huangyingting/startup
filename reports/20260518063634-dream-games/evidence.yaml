evidenceGaps:
  - type: private-evidence-only
    severity: material
    topic: financials
    missingEvidence: >-
      Dream Games has not disclosed audited financial statements, exact revenue figures, gross margin, EBITDA, burn
      rate, or cash position in any public filing or press release.
    whyItMatters: >-
      Without audited financials, all revenue figures rest on third-party analytics estimates (Appmagic, SensorTower)
      that carry material uncertainty and do not reflect costs or profitability.
    diligencePath: >-
      Request audited or reviewed financial statements from management; cross-check against App Store and Google Play
      reconciliation data if available in data room.
    relatedQuestionRefs:
      - QO005
  - type: private-evidence-only
    severity: material
    topic: valuation
    missingEvidence: >-
      The last disclosed post-money valuation of $2.75B dates to January 2022. No secondary transactions, tender offers,
      or new valuation marks have been publicly disclosed since.
    whyItMatters: >-
      A four-year-old valuation that pre-dates a 3-6x revenue increase cannot support current investment
      decision-making; the implied multiple gap is a primary underwriting risk.
    diligencePath: >-
      Seek secondary pricing data from Nasdaq Private Market, Carta, or comparable secondary brokers; request most
      recent 409A or board-approved valuation from management.
