        - Confirm whether player LTV data supports continued expansion in this demographic
      - - Apple App Tracking Transparency (ATT) impact on iOS UA
        - Constraint
        - Active since 2021; ongoing adaptation
        - Raises iOS UA CPIs; reduces targeting precision for new-player acquisition
        - Understand Dream Games' iOS/Android UA split and ATT mitigation strategy
      - - Google Privacy Sandbox (Android)
        - Constraint
        - 2024-2026 rollout
        - Mirrors ATT on Android; further reduces cross-app targeting; raises effective CPIs
        - Assess Android UA performance pre- and post-Privacy Sandbox changes
      - - Match-3 market saturation in US/UK
        - Constraint
        - Current
        - High-value markets have multiple entrenched titles; marginal UA cost rising
        - Determine Royal Match's CAC trend in top revenue markets over 2022-2026
      - - Rising app store fees / regulatory scrutiny
        - Constraint with partial offset potential
        - Ongoing; Epic v. Apple + EU DMA creating alternative payment pathways
        - Potential to recover some of the 30% store fee via web shop or alternative payments
        - Assess whether Dream Games has or plans a web-shop strategy
      - - Content depth and live ops (competitive moat driver)
        - Growth driver
        - Ongoing; requires investment
        - Royal Match's thousands of levels and live events sustain engagement; hard for newcomers to replicate
        - Confirm level bank and live-ops content pipeline health
      - - Royal Kingdom franchise extension
        - Growth driver
