  - id: section-M-2
    title: Match-3 and Casual Puzzle Segment
    body: >
      Match-3 is a distinct sub-genre within casual mobile gaming characterised by grid-based color
      or shape matching, level progression, and escalating difficulty that drives booster and life
      purchases. The sub-genre is the dominant revenue generator within casual gaming, and the top
      five match-3 games collectively generate an estimated $4-7B in annual gross consumer spend.
      Royal Match has been the highest-grossing match-3 game since at least mid-2023, exceeding
      Candy Crush Saga—the genre pioneer—in monthly revenue on a sustained basis by late 2023 and
      2024. This is a historically significant reversal: Candy Crush was the world's top-grossing
      mobile game for several years.


      The match-3 segment is structurally oligopolistic. The top games benefit from very high player
      retention, deep level banks (Royal Match has thousands of levels; Candy Crush has 15,000+
      levels on HTML5), and active live-operations teams that maintain engagement through limited-time
      events. Entry barriers include the capital intensity of UA spend required to reach scale and
      the difficulty of building competing brand loyalty. Candy Crush Saga (King/Microsoft), Toon
      Blast and Toy Blast (Peak Games/Zynga), and Gardenscapes and Homescapes (Playrix) are the
      primary competitors. Together with Royal Match and Royal Kingdom, these games define the
      revenue-generating core of the match-3 segment.


      The Deconstructor of Fun's analysis of match-3 mechanics highlights that the genre relies on
      (1) a deep level-progression system as the core engagement loop, (2) meta-layers (e.g. room
      decoration in Gardenscapes, castle restoration in Royal Match) that provide long-term goals
      beyond level completion, (3) social features (gifting lives, clubs/teams), and (4) a
      carefully tuned difficulty curve that drives booster IAP without frustrating players into
      churn. Royal Match's differentiation within this framework is its investment in visual quality,
      its King Robert character brand, and its reputation for relatively fair difficulty tuning
      compared to older match-3 peers.
    claimRefs:
      - CM009
      - CM010
      - CM011
      - CM012
      - CM013
      - CM014
      - CM015
      - CM016
      - CM017
