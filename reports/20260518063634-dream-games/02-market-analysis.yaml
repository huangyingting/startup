        - Second title reduces single-title concentration risk; expands addressable player base
        - Track Royal Kingdom's DAU, ARPU, and revenue growth trajectory vs Royal Match's early lifecycle
    notes: >-
      The ATT/Privacy Sandbox constraints are structural and industry-wide; Dream Games' size and
      UA sophistication provide some mitigation versus smaller peers. The market saturation
      constraint is relative—match-3's total payer base is still growing globally even as top
      markets mature. The regulatory store-fee constraint is evolving; no public statement from
      Dream Games on alternative payment strategy has been identified in available sources as of
      May 2026.
