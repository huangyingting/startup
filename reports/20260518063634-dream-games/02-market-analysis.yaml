  evidenceGaps:
    - type: missing-source
      severity: material
      topic: match-3-segment-size
      missingEvidence: "No public analyst report provides a definitive total match-3/casual puzzle market size with a disclosed methodology. The $4-7B estimate is bottom-up derived from known individual game revenues."
      whyItMatters: "Without a defensible SAM number, Dream Games' implied market share and growth ceiling cannot be grounded; investor valuation models rely on SAM sizing."
      diligencePath: "Commission custom analysis from Appmagic, SensorTower, or Newzoo with a specific match-3 market boundary definition; cross-reference with Playrix, King/Microsoft public disclosures."
      relatedQuestionRefs: [QM003, QM021]
      relatedTableRefs: [TM002]

    - type: missing-source
      severity: minor
      topic: competitor-revenues
      missingEvidence: "Candy Crush Saga's precise 2024 annual revenue is not publicly disclosed by Activision Blizzard/Microsoft; analyst estimates range from $700M-$1B+ with material uncertainty."
      whyItMatters: "Candy Crush's trajectory (growing vs. declining) directly affects the competitive narrative—if declining, Royal Match's leadership is more defensible; if stabilised, the segment is more competitive."
      diligencePath: "Cross-reference Activision Blizzard mobile segment earnings disclosures, Appmagic estimates, and SensorTower data with named analyst commentary."
      relatedQuestionRefs: [QM013, QM019, QM020]

    - type: conflicting-data
      severity: minor
      topic: market-size
      missingEvidence: "Global mobile gaming TAM estimates range from ~$90B to ~$115B+ depending on methodology; no single source defines the boundary consistently."
      whyItMatters: "The choice of TAM baseline significantly affects Dream Games' implied market share calculation and growth narrative."
      diligencePath: "Select one primary source with the most transparent methodology for investor materials; disclose all other estimates as reference points."
      relatedQuestionRefs: [QM001, QM023]
      relatedTableRefs: [TM002]

    - type: missing-source
      severity: minor
      topic: ua-cost-trends
      missingEvidence: "Dream Games' specific UA cost-per-install trends and ATT impact magnitude are not publicly disclosed; the assessment is based on industry-wide reported effects."
      whyItMatters: "UA cost compression is the single largest financial risk to Dream Games' margin; without company-specific data, the impact cannot be sized."
      diligencePath: "Request UA performance metrics (CPI, LTV, payback period) in data room; compare to AppsFlyer or Singular published industry benchmarks."
      relatedQuestionRefs: [QM009, QM010, QM024]

    - type: missing-source
      severity: minor
      topic: market-saturation
      missingEvidence: "Market saturation in US/UK casual gaming is asserted in industry commentary but not quantified in a publicly available study specific to match-3."
      whyItMatters: "If saturation is severe, Dream Games' growth path in top revenue markets is limited to LTV improvement and ARPU growth; expansion markets become more important."
      diligencePath: "Obtain Appmagic or SensorTower geographic new-user acquisition data; compare MAU growth rates for Royal Match in US vs. emerging markets."
      relatedQuestionRefs: [QM024]

