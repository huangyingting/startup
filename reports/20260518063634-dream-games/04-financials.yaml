  evidenceGaps:
    - type: missing-source
      severity: material
      topic: audited-financial-statements
      missingEvidence: "Dream Games has never published audited financial statements; all revenue and margin figures are analyst estimates from SensorTower, Appmagic, and BusinessOfApps. The primary financial metrics—net revenue, EBITDA, cash balance—are unknown from public sources."
      whyItMatters: "Without audited financials, the valuation, profitability, and capital adequacy assertions cannot be verified. All unit economics remain modelled estimates with wide confidence intervals."
      diligencePath: "Request audited financial statements (income statement, balance sheet, cash flow) for fiscal years 2022, 2023, 2024 at minimum. Request management accounts if audit is not yet complete for 2024."
      relatedQuestionRefs: [QI001, QI002, QI003, QI008, QI017]
      relatedTableRefs: [TI003, TI004]

    - type: missing-source
      severity: material
      topic: cohort-ltv-data
      missingEvidence: "No cohort-level LTV data is available publicly. The LTV/CAC ratio and payback period are modelled from gross estimates and industry benchmarks, not from observed cohort performance."
      whyItMatters: "Cohort LTV determines whether UA spend is value-creating. If LTV has deteriorated (ATT impact, genre maturation) and the payback period has extended beyond 24 months, the current UA rate may be destroying value."
      diligencePath: "Request cohort LTV curves for 2020–2024 install vintages by channel; request payback period data; request D30/D90 retention by cohort."
      relatedQuestionRefs: [QI005, QI006, QI007, QI014, QI021]
      relatedTableRefs: [TI003]

    - type: missing-source
      severity: material
      topic: royal-kingdom-financial-contribution
      missingEvidence: "Royal Kingdom launched November 2024; no public data separates Royal Kingdom revenue and costs from Royal Match. The UA investment required to ramp Royal Kingdom is unknown."
      whyItMatters: "Royal Kingdom's UA ramp will compress near-term EBITDA margins. If Royal Kingdom underperforms LTV targets, Dream Games may be destroying capital on the second title while cannibalising the first."
      diligencePath: "Request segmented P&L for Royal Kingdom; request cross-game cohort analysis showing Royal Match ARPU pre/post Royal Kingdom launch."
      relatedQuestionRefs: [QI019, QI020]
      relatedTableRefs: [TI005]

    - type: missing-source
      severity: minor
      topic: platform-fee-negotiation
      missingEvidence: "Apple and Google's standard 30% fee applies to all IAP above the small business program threshold. At Dream Games' scale, there is no public evidence of any negotiated reduction or web-shop alternative."
      whyItMatters: "A 1% reduction in the platform fee at $2.1B gross spend = ~$21M in additional net revenue annually. If Dream Games had negotiated a preferential rate, margins would be materially higher."
      diligencePath: "Request actual weighted-average store fee paid to Apple and Google in the data room; confirm whether any direct commercial agreement exists."
      relatedQuestionRefs: [QI011, QI016]
      relatedTableRefs: [TI001]

    - type: conflicting-data
      severity: minor
      topic: ua-spend-estimate-variance
      missingEvidence: "Multiple industry sources produce UA spend estimates for Dream Games ranging from $300M to $700M; the $400–600M range is a consensus mid-range but has high uncertainty."
      whyItMatters: "The EBITDA estimate is highly sensitive to the UA spend assumption. If actual UA spend is $700M, EBITDA margins fall to ~36% on net revenue—still solid but lower than the central case."
      diligencePath: "Request total UA spend and UA spend by channel from management accounts; cross-check against AppsFlyer or Singular data-room analytics export."
      relatedQuestionRefs: [QI004, QI009]
      relatedTableRefs: [TI003]

