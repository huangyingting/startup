  - id: TI005
    title: Public financial gaps table
    columns:
      - missing metric
      - why it matters for underwriting
      - public evidence available
      - exact diligence path
    rows:
      - - Audited P&L (income statement)
        - Cannot confirm revenue, margin, or profitability without primary financial statements
        - None — Dream Games is private; no regulatory filing obligation in Turkey for private companies
        - Request audited financial statements for fiscal years 2022, 2023, 2024
      - - Gross consumer spend split iOS vs Android
        - iOS typically 65–70% of mobile IAP revenue; Android share affects net margin if fee structures change
        - Not disclosed; inferred as iOS-heavy based on market norms
        - Request platform-level revenue breakdown in data room
      - - Geographic revenue concentration
        - US accounts for ~40–50% of top casual game revenue; concentration affects FX risk and regulatory exposure
        - US dominance inferred from UA spend patterns but not confirmed
        - Request geo revenue breakdown by top-10 countries
      - - DAU / MAU time series
        - Engagement baseline needed to assess LTV trajectory and churn risk
        - Not disclosed
        - Request monthly DAU/MAU from product analytics dashboard (2022–2026)
      - - Cohort LTV curves (by install vintage)
        - Without LTV curves, UA efficiency and payback cannot be confirmed; all unit economics remain modelled
        - Not disclosed
        - Request cohort LTV curves for 2020–2024 install vintages, segmented by channel
      - - Royal Kingdom separate P&L
        - Needed to assess cannibalisation risk and incremental return on Royal Kingdom UA investment
        - Not disclosed; Royal Kingdom launched November 2024
        - Request segmented P&L for Royal Kingdom since launch; compare DAU and ARPU vs Royal Match at same age
      - - Employment cost breakdown
        - Opex modelling requires clarity on headcount by function and total compensation
        - Headcount estimated at 600–700 from LinkedIn data; salary ranges inferred
        - Request headcount by function and total employment cost for 2023–2024
      - - UA channel breakdown
        - Meta, Google, Apple Search Ads, and programmatic have different efficiency profiles; concentration risk if one channel deteriorates
        - Not disclosed
        - Request UA spend by channel for trailing 12 months; include ROAS and CPI by channel
    notes: >-
      All items in this table are material for financial underwriting. The top three diligence
      priorities are: (1) audited P&L, (2) cohort LTV curves, (3) Royal Kingdom segmented P&L.
      Without these, any financial model for Dream Games is a high-uncertainty estimate.
