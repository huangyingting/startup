company:
  name: Dream Games
chapter:
  number: 4
  title: Financials
  summary: >-
    Dream Games is a private company that does not disclose audited financial statements. All revenue
    figures are analyst estimates. Royal Match generated approximately $2.1B in gross consumer spend
    in 2024—after the standard 30% Apple/Google platform fee, estimated net publisher revenue is
    ~$1.47B. Dream Games is widely reported to be profitable, with estimated EBITDA margins of
    44–65% on net revenue, consistent with scaled mobile-game benchmarks. User acquisition spend
    is the dominant cost at an estimated $400–600M annually. The company raised $155M in Series C
    funding in 2022 at a ~$2.75B post-money valuation and has not announced further fundraising,
    consistent with self-funded operations. Key diligence blockers are the absence of audited P&L,
    cohort LTV curves, and segmented Royal Kingdom financial data.

sections:
  - id: section-I-1
    title: Revenue model and monetisation
    body: >-
      Dream Games operates a single-revenue-stream model: 100% of its income derives from in-app
      purchases (IAP) within Royal Match and, since November 2024, Royal Kingdom. The games are
      free to download on iOS and Android; Dream Games earns no subscription revenue, no advertising
      income, and no licensing fees from third parties. This model is common across the top-tier
      casual mobile game segment but unusual in its purity—many peers (including Candy Crush Saga)
      have layered in ad revenue or subscription passes.


      The IAP mechanism is a hard currency economy: players purchase coin packs or booster bundles
      at price points from $0.99 to $99.99. Difficulty spikes in puzzle levels drive organic spend;
      Dream Games' level design team calibrates these carefully. All transactions are processed
      through Apple App Store and Google Play, generating a standard 30% platform fee that reduces
      Dream Games' net revenue by approximately one-third of gross consumer spend. No web-shop
      alternative has been publicly announced as of the report date.


      Royal Match recorded approximately $2.1 billion in gross consumer spend in 2024. After the
      ~30% platform fee, Dream Games' estimated net publisher revenue was approximately $1.47 billion.
      October 2024 was a single-month peak of approximately $177 million in gross consumer spend—a
      record for the match-3 genre. Cumulative lifetime gross consumer spend for Royal Match passed
      $3 billion in early 2024. Royal Kingdom launched in November 2024 and generated an estimated
      less than $100 million in gross revenue in its initial partial-year period.
    tableRefs: [TI001, TI002]
    figureRefs: [FI001]
    claimRefs:
      - CI001
      - CI002
      - CI003
      - CI004
      - CI005
      - CI006
      - CI007
      - CI008

  - id: section-I-2
    title: Unit economics and sales efficiency
    body: >-
      Dream Games does not publish its unit economics. The key metrics—user acquisition cost (CAC),
      lifetime value (LTV), payback period, and daily active user (DAU) count—are not disclosed.
      Analyst and industry estimates allow approximate ranges to be triangulated.


      User acquisition is the primary growth engine and the dominant cost item. Dream Games is
      estimated to spend $400–600 million annually on UA—figures derived from multiple industry
      reports on top mobile UA spenders globally and corroborated by analysts covering the match-3
      segment. At an estimated $2.1 billion in gross consumer spend, this implies a UA spend-to-
      gross-revenue ratio of approximately 19–29%, which is consistent with mature match-3 games
      at scale where LTV is well-established and bidding can be optimised efficiently.


      Industry benchmarks from Singular and AppsFlyer suggest that top-performing casual games
      with well-calibrated LTV models achieve CPI (cost per install) in the $1.50–$4.00 range
      for the female 25–55 demographic in the US, with LTV/CAC ratios of 3–5× at maturity. Dream
      Games' implied ratio at the midpoint of estimated UA spend ($500M UA / $1.47B net revenue)
      is approximately 2.9×, within the lower end of this range but acceptable given the scale.
      Payback period is estimated at 12–18 months based on genre benchmarks; Dream Games has not
      confirmed. Retention metrics are not public; industry comps for top-tier match-3 suggest
      Day-30 retention of 15–25%.
    tableRefs: [TI003]
    figureRefs: [FI002]
    claimRefs:
      - CI009
      - CI010
      - CI011
      - CI012
      - CI013
      - CI014
      - CI015

  - id: section-I-3
    title: Cost structure and gross margin
    body: >-
      Dream Games' cost structure is dominated by three categories: user acquisition (UA) spend,
      people costs, and platform fees. Platform fees are already deducted to derive net publisher
      revenue. Of the remaining cost base, UA is the single largest item at an estimated $400–600
      million per year. People costs for approximately 600–700 employees (engineering, game design,
      data science, marketing, and operations) are estimated at $100–200 million annually, consistent
      with Istanbul-anchored headcount at senior engineering compensation levels. Infrastructure and
      cloud costs are estimated at $10–30 million annually.


      Net revenue after platform fees was approximately $1.47B in 2024. Deducting estimated UA spend
      of $400–600M and people/infrastructure costs of $110–230M yields estimated EBITDA of roughly
      $640M–$960M, implying EBITDA margins of 44%–65% on net revenue. This is consistent with the
      40–60% gross margin range typical for scaled mobile games that have surpassed their UA payback
      period on the majority of their player cohorts. Dream Games is widely reported by industry
      analysts to be profitable; no public financial disclosure exists to confirm the exact figure.


      Working capital is structurally negative in a beneficial sense: all IAP revenue is collected
      upfront at point of transaction with no accounts receivable. Capex is minimal—Dream Games
      does not own physical infrastructure, operates on cloud compute, and its content production
      pipeline is software labour. This results in a highly cash-generative business with limited
      capital intensity beyond the UA reinvestment cycle.
    tableRefs: []
    figureRefs: [FI003, FI004]
    claimRefs:
      - CI016
      - CI017
      - CI018
      - CI019
      - CI020
      - CI021

  - id: section-I-4
    title: Capital structure and adequacy
    body: >-
      Dream Games has raised approximately $255 million in disclosed equity funding across multiple
      rounds covered in full in the Company Overview chapter. The most recent round was a $155 million
      Series C in 2022 led by IVP with participation from Balderton Capital and Index Ventures at a
      post-money valuation reported at approximately $2.75 billion. No funding has been announced
      since 2022.


      Given the estimated EBITDA of $640M–$960M in 2024 and the minimal capex profile, Dream Games
      is almost certainly self-funding its operations from internal cash generation. There is no
      public evidence of debt financing, revolving credit facilities, or project-finance obligations.
      The primary stated use of the 2022 capital was accelerating Royal Match user acquisition and
      funding new game development—which materialised as Royal Kingdom.


      Dream Games has not announced an IPO or publicly indicated a next funding round. IVP, Balderton,
      and Index Ventures are all long-duration growth equity investors with typical hold periods of
      5–10 years; they are not under structural pressure to force an exit in the near term.
    tableRefs: [TI004]
    claimRefs:
      - CI022
      - CI023
      - CI024
      - CI025
      - CI026

  - id: section-I-5
    title: Financial gaps and diligence verdict
    body: >-
      Dream Games is a private company with no obligation to disclose financial results. The
      following metrics are unavailable from public sources and represent the core data-room
      requests: (1) audited or management-accounts P&L, (2) exact DAU and MAU with geo-segmentation,
      (3) ARPU and ARPPU, (4) cohort LTV curves and payback-period data by install vintage, (5) UA
      spend by channel and geography, (6) Royal Kingdom separate financial performance versus Royal
      Match, (7) cash balance and burn rate.


      Revenue quality assessment: Royal Match revenue is high quality by mobile gaming standards—
      IAP is real-time cash collection with no deferred revenue, no refund risk at scale, no
      customer concentration, and no channel risk beyond the Apple/Google duopoly. However, the
      30% platform fee exposure is a structural margin ceiling and the complete dependence on two
      distribution gatekeepers is a concentration risk if either platform materially changes fee
      structures or discovery algorithms.


      Margin path: the business should sustain 40–60% EBITDA margins on net revenue as long as
      Royal Match remains in the top-10 grossing chart. If Royal Match declines in revenue due to
      competitive displacement or player churn, UA reinvestment to stabilise revenue would compress
      margins. Royal Kingdom's UA ramp requires significant upfront investment with uncertain return
      timing; this is the primary near-term margin risk.


      Capital intensity verdict: low. The business model has no inventory, no receivables, no
      physical infrastructure capex, and no contract manufacturing. The primary capital allocation
      decision is UA spend, which is discretionary and reversible within months.
    tableRefs: [TI005]
    claimRefs:
      - CI027
      - CI028
      - CI029
      - CI030
      - CI031
      - CI032
      - CI033
      - CI034
      - CI035

