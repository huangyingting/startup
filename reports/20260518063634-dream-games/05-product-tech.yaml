  - id: section-E-3
    title: Development Process
    body: >-
      Dream Games' development process is defined by heavy reliance on data science and A/B testing,
      an approach refined from its founders' direct experience building Toon Blast and Toy Blast at
      Peak Games. Every new level is calibrated through analytics that track completion rates, star
      counts, and booster usage across a large live player population. Levels that drive too-rapid
      progression or too-high failure rates are iterated on before broad release. This data-driven
      loop between level design and player behaviour analytics is consistently cited by industry
      analysts as a core operational competency and competitive differentiator for Dream Games.

      The company employs a dedicated level design team supported by data scientists who monitor
      real-time player cohort metrics. A/B test variants are run on live player segments to compare
      level configurations, visual treatments, and IAP offer placements before any configuration is
      promoted globally. The result is the 12,400+ level corpus Royal Match had accumulated by
      November 2025, delivered at approximately one new level batch every two weeks.

      Dream Games has consistently used a staged regional soft-launch methodology before full global
      release. Royal Match was tested in limited markets—reportedly the UK and Canada—to validate
      core metrics before its March 2021 global roll-out. The same methodology was applied to Royal
      Kingdom, which soft-launched in April 2023 and did not go global until November 2024. This
      19-month soft-launch period for Royal Kingdom is notably long even by industry standards and
      suggests the team required substantial iteration time to meet internal launch quality thresholds.

      User acquisition strategy leverages premium creative campaigns at significant scale. Dream Games
      has run celebrity-fronted marketing campaigns including a high-profile series featuring Simon
      Cowell, designed to broaden brand recognition beyond core casual-game audiences. These campaigns
      reflect Dream Games' willingness to invest in expensive UA creatives, consistent with the
      company's known scale of estimated annual UA spend ($400–600M). Internal development toolchain
      specifics such as CI/CD systems, code review processes, and automated testing pipelines are
      not publicly disclosed.
