  - id: section-E-4
    title: Product Roadmap & Dependencies
    body: >-
      Dream Games' near-term product roadmap is shaped by two parallel imperatives: sustaining Royal
      Match's live-ops momentum and scaling Royal Kingdom's global player base. Royal Match requires
      continuous level production to keep its corpus growing at the two-week cadence, alongside
      seasonal live-ops events and iterative monetisation improvements. Royal Kingdom, still in its
      first full year of global availability as of May 2026, requires parallel investment in level
      content, UA spend, and live-ops event design to close the gap with Royal Match's established
      engagement metrics.

      A third game title has not been publicly announced by Dream Games as of May 2026. The company's
      two-title strategy reflects a disciplined approach prioritising execution depth over portfolio
      breadth—a posture consistent with the founders' Peak Games background and the studio's historical
      willingness to accept a long development and soft-launch cycle before global release.

      Key dependency risks include: (1) platform risk from Apple and Google, whose store policies
      and 30% fee structure govern all revenue collection and could change adversely; (2) Unity engine
      versioning risk, where major API changes could require significant engineering migration effort;
      (3) live-ops backend reliability, where outages would affect global event scheduling and player
      experience; and (4) content production capacity risk, where sustaining the two-week level cadence
      at 12,400+ levels and beyond is constrained by data science team throughput and creative capacity.

      A widely discussed potential roadmap item is the introduction of a direct web-shop, allowing
      players to purchase hard currency without the 30% Apple/Google fee. The EU Digital Markets Act
      and expanded US App Store freedom following the Epic Games case have increased strategic
      optionality for web-shops in 2025–2026, but Dream Games has not publicly confirmed any such
      plans. Implementation would also require resolving tax compliance, payment processing, and
      customer support infrastructure outside the platform ecosystems.
