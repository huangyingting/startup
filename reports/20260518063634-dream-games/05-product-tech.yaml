callouts:
  - calloutType: strength
    title: Exceptional level content volume with data-driven production
    body: >-
      Royal Match's 12,400+ level corpus—growing at approximately one batch every two weeks—is
      a substantial content moat. This volume is enabled by a data-science-driven level design
      process that uses real-time A/B testing to calibrate difficulty and IAP conversion,
      reducing the risk of either over-easy (low monetisation) or over-hard (high churn) levels.
      Few competitors have replicated this combination of content scale and analytical rigour.
    claimRefs:
      - CE004
      - CE005
      - CE010
      - CE026
      - CE033
  - calloutType: strength
    title: Strong multi-year user ratings signal product quality
    body: >-
      Royal Match maintaining approximately 4.7/5 stars on Apple App Store through millions of
      reviews over several years is unusual for a free-to-play title. High IAP monetisation
      typically generates negative reviews from players who find pay-walls frustrating; Dream
      Games' sustained high rating suggests effective difficulty calibration and perceived value
      from the IAP economy.
    claimRefs:
      - CE009
      - CE034
  - calloutType: risk
    title: Complete dependence on Apple and Google distribution and payment
    body: >-
      All of Dream Games' revenue is collected through Apple App Store and Google Play, each
      retaining a 30% fee. The company has no web-shop, no direct payment channel, and no
      alternative distribution. Any adverse change to platform fee structures, App Store review
      policies, or payment method rules would directly reduce net revenue with no ability to
      offset through alternative channels.
    claimRefs:
      - CE015
      - CE016
      - CE031
  - calloutType: risk
    title: Infrastructure and engine dependencies are not independently verifiable
    body: >-
      Dream Games has not publicly disclosed its cloud infrastructure provider, analytics
      platform, or internal development toolchain. Unity engine dependency is confirmed but
      creates long-term API migration risk. The live-ops backend's reliability, uptime SLAs,
      and disaster recovery capabilities are unknown, representing a material operational risk
      that cannot be assessed from public sources.
    claimRefs:
      - CE027
      - CE030
      - CE036

