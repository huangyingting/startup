  - id: section-E-2
    title: Technology Architecture
    body: >-
      Royal Match and Royal Kingdom are both built on the Unity game engine, the dominant real-time
      3D and 2D development platform for mobile games globally. Unity's cross-platform export
      capabilities allow Dream Games to maintain a shared codebase producing binaries for both iOS
      and Android, reducing duplicated engineering effort and enabling simultaneous platform updates.
      Unity's asset pipeline, shader support, and particle system tools support the high-fidelity
      visual effects—animated boosters, sparkle cascades, and level-completion celebrations—central
      to Royal Match's engagement design.

      Distribution runs exclusively through Apple App Store and Google Play. These two channels
      collectively cover the relevant global mobile market and impose a standard 30% revenue share
      on all in-app purchases. Dream Games has not disclosed an alternative direct distribution or
      web-shop channel, meaning 100% of payment processing is channelled through Apple and Google
      infrastructure. This arrangement reduces payment-card data handling risk for Dream Games but
      creates full dependency on both platforms' policies and fee structures.

      The live-ops backend—responsible for event schedules, new level packs, seasonal content, and
      leaderboard data—operates on cloud infrastructure. Dream Games has not officially disclosed its
      cloud provider; AWS is inferred as the most likely candidate given its dominance in mobile game
      backend deployments, but this is not confirmed. Analytics infrastructure is also undisclosed
      in detail, though multiple press sources reference real-time player behaviour data as the core
      input to Dream Games' level design and A/B testing workflows.

      Payment processing is fully delegated to Apple and Google in-app purchase SDKs; Dream Games
      does not handle payment card data directly. This reduces PCI DSS compliance scope but increases
      dependency on platform payment policies. Social features—such as Facebook leaderboard
      integration—and push notification capabilities are implemented through third-party SDKs
      integrated into the Unity client. Internal development toolchain details (CI/CD pipeline,
      version control system, build infrastructure) are not publicly disclosed.
