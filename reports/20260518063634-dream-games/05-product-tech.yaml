  evidenceGaps:
    - type: private-evidence-only
      severity: material
      topic: infrastructure
      missingEvidence: >-
        Dream Games has not publicly disclosed its cloud infrastructure provider, database
        architecture, live-ops backend technology, or analytics platform. AWS is inferred
        from industry norms but is not confirmed by any primary source.
      whyItMatters: >-
        Infrastructure reliability, uptime SLAs, disaster recovery capabilities, and vendor
        lock-in risk cannot be assessed without knowing the actual technology stack. A live-ops
        outage during a high-spend event window would directly reduce revenue.
      diligencePath: >-
        Request technical architecture overview from management; ask specifically about cloud
        provider(s), CDN, analytics vendor, and uptime track record in formal data room process.
      relatedQuestionRefs: [QE015, QE027]
      relatedTableRefs: [TE003]

    - type: private-evidence-only
      severity: material
      topic: Royal-Kingdom-metrics
      missingEvidence: >-
        Royal Kingdom's level count, App Store rating, detailed revenue trajectory post-global
        launch, and user acquisition efficiency are not publicly disclosed as of May 2026.
        The game launched globally only in November 2024, making comparative analysis with
        Royal Match at the same stage difficult.
      whyItMatters: >-
        Royal Kingdom is Dream Games' primary growth catalyst for 2025–2026. Without visibility
        into its performance metrics, the franchise extension thesis cannot be validated or
        pressure-tested against the Royal Match baseline at comparable lifecycle stage.
      diligencePath: >-
        Request Royal Kingdom monthly active users, DAU, revenue run-rate, and cohort retention
        curves from management; cross-check against Appmagic or SensorTower breakdowns for
        the Royal Kingdom app separately from Royal Match.
      relatedQuestionRefs: [QE011, QE023]
      relatedTableRefs: [TE001]

    - type: missing-source
      severity: minor
      topic: development-toolchain
      missingEvidence: >-
        Dream Games' internal CI/CD pipeline, version control system, automated testing
        framework, and build infrastructure are not publicly documented in any press release,
        job posting, or analyst report reviewed for this chapter.
      whyItMatters: >-
        Development toolchain maturity affects the speed and reliability of level content
        shipping, bug fix deployment, and live-ops event management. Inadequate CI/CD
        infrastructure could create bottlenecks in the two-week content cadence.
      diligencePath: >-
        Review engineering job postings for technology stack references; request engineering
        manager presentations during diligence process; ask specifically about deployment
        frequency, rollback capability, and incident response procedures.
      relatedQuestionRefs: [QE016, QE028]

    - type: missing-source
      severity: minor
      topic: anti-cheat-security
      missingEvidence: >-
        No public information exists about Dream Games' anti-cheat mechanisms, player account
        security architecture, or cheating-prevention controls in Royal Match or Royal Kingdom.
      whyItMatters: >-
        In-app purchase games are susceptible to payment fraud, fake account creation for
        tournament manipulation, and IAP refund abuse. Without visibility into security controls,
        the scale of these risks cannot be quantified.
      diligencePath: >-
        Ask management directly about fraud rates, refund rates, and anti-cheat tooling during
        diligence; review App Store and Google Play developer agreements for compliance requirements.
      relatedQuestionRefs: [QE014, QE016]

    - type: missing-source
      severity: minor
      topic: compliance
      missingEvidence: >-
        Dream Games has not published a GDPR privacy policy, COPPA compliance statement, or
        data processing agreement on any publicly accessible page as of May 2026. In-app
        privacy policy existence is not verifiable from public sources reviewed for this chapter.
      whyItMatters: >-
        Royal Match has millions of users in EU and US markets where GDPR and COPPA impose
        substantive data handling requirements. Non-compliance could result in regulatory fines
        and reputational damage in key markets.
      diligencePath: >-
        Review app store privacy nutrition labels; request data processing agreements and GDPR
        records of processing activities from management; confirm COPPA compliance posture
        given 4+ age rating targeting under-13 users.
      relatedQuestionRefs: [QE020, QE021]
      relatedTableRefs: [TE004]

