    summary: >-
      Royal Match operates across six interconnected system layers: the Unity-based player app
      communicates with the live-ops game server, which coordinates with the analytics platform
      driving level design decisions, while Apple/Google stores handle distribution and payment,
      and UA platforms feed new players into the top of the funnel.
