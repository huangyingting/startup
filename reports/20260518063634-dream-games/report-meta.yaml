companyProfile:
  summary: >-
    Dream Games is a Turkish mobile gaming company headquartered in Istanbul with a secondary
    office in London. Founded in 2019 by five alumni of Peak Games (acquired by Zynga for $1.8B
    in 2020), Dream Games has built Royal Match into one of the most commercially successful
    mobile games ever created. The company has raised $467.5M across four rounds (Seed, Series
    A, B, C) from top investors including Index Ventures, Balderton Capital, Makers Fund, IVP,
    BlackRock, and Kora, achieving a $2.75B valuation at its January 2022 Series C. Royal Match,
    a match-3 puzzle game built on Unity engine, generated an estimated $1.46B in net IAP
    revenue in 2024, ranking as the second-highest-grossing mobile game globally. The company
    launched its second title, Royal Kingdom, globally in November 2024. Dream Games remains
    private with no disclosed IPO plans as of May 2026.
