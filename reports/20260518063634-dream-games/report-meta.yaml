  productSummary: >-
    Dream Games develops premium free-to-play mobile casual puzzle games monetized through
    in-app purchases. Royal Match (iOS and Android, global launch March 2021) is a match-3
    puzzle game with a castle-construction meta-game, featuring over 12,400 levels. Royal
    Kingdom (global launch November 2024) is a second match-3 title with PvP elements.
  customerFocus: >-
    Casual mobile gamers globally, skewing toward female players aged 25-54 in the US, UK,
    Japan, Germany, and South Korea. The US accounts for approximately 55% of revenue.
  businessModel: >-
    Free-to-play with in-app purchases (IAP) as the primary revenue stream. Players download
    the game for free and purchase in-game currency, boosters, and extra lives. A secondary
    advertising revenue stream monetizes non-paying users. No subscription model or webshop
    as of May 2026.
  stage: Series C
  fundingStatus: >-
    Last round: Series C, $255M, January 2022, at $2.75B post-money valuation. Led by Index
    Ventures, with participation from Makers Fund, BlackRock, IVP, Balderton Capital, and Kora.
    Total raised: $467.5M. No new fundraise disclosed since January 2022.
  disclosureProfile: private-undisclosed
  claimRefs: [CO001, CO004, CO005, CO026, CO027]
summary:
  headline: >-
    Dream Games is a CONDITIONAL BUY — Royal Match is one of the most capital-efficient
    mobile games ever built, but single-game revenue concentration, a stale 2022 valuation,
    and mounting gambling-regulation risk require heavy diligence before committing capital.
