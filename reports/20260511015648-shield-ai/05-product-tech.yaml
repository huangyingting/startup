- id: hivemind-platform-architecture
  title: Hivemind Platform and EdgeOS Architecture
  body: 'Hivemind Enterprise is organized into four functional modules above a shared runtime layer. EdgeOS is the real-time
    operating substrate: it uses static JSON-based configuration management (avoiding ROS dependencies), shared-memory interprocess
    communication capable of millions of messages per second at sub-millisecond latency, and a plugin SDK that enables platform-agnostic
    deployment across heterogeneous vehicle types. This runtime architecture allows a new platform to be onboarded by writing
    hardware abstraction plugins without modifying mission logic. Hivemind Pilot handles autonomous flight and navigation
    in GPS-denied environments via simultaneous localization and mapping (SLAM), visual odometry, and EO/IR sensor fusion—no
    GNSS dependency. Hivemind Commander extends single-vehicle autonomy to multi-agent swarm coordination, enabling simultaneous
    orchestration of multiple autonomous platforms during complex missions. Hivemind Forge provides the ML development pipeline:
    operators and engineers use it to train, evaluate, and package mission AI models in a cloud environment (AWS collaboration
    for ECR-based container distribution), then deploy them to edge vehicles. The company''s Foundation Model for Defense
    provides a domain-specific model base trained on defense mission data rather than general internet corpora, which Shield
    AI characterizes as a necessary departure from commercial LLMs for contested-environment reliability. The AWS co-development
    relationship enables a cloud-to-edge workflow where models developed in Forge are containerized and pushed to vehicle
    fleets via ECR, supporting at-scale fleet autonomy management. Integration timelines demonstrated with actual customers—MQ-20
    Avenger in under 12 weeks, ROMULUS USV in 6 weeks—serve as primary proof points for the platform''s ease of integration
    claim.

    '
  claimRefs:
