chapter:
  number: 5
  title: Product & Technology
  summary: 'Shield AI''s product suite centers on Hivemind Enterprise—a modular autonomy software stack comprising EdgeOS
    (real-time runtime), Hivemind Pilot (autonomous flight), Hivemind Commander (multi-agent coordination), and Hivemind Forge
    (ML development pipeline). The stack has been deployed on 15+ platform types including the V-BAT Group-3 VTOL UAS (MQ-35A),
    ROMULUS USV, and MQ-20 Avenger. The October 2025 X-BAT announcement marks Shield AI''s push into Group-5 supersonic VTOL
    territory, powered by a GE F110 engine partnership. GPS-denied autonomy via SLAM and EO/IR sensor fusion is the core IP
    differentiator. Key diligence gaps include formal airworthiness certification status, security posture transparency, and
    OTA update lifecycle management for fielded fleets.

    '
sections:
- id: product-suite-overview
  title: Product Suite Overview
  body: 'Shield AI operates a two-layer product architecture: a software autonomy platform (Hivemind Enterprise) and a hardware
    product line (V-BAT, X-BAT) with an ancillary sensor system (ViDAR). Hivemind Enterprise is the commercial center of gravity—a
    middleware and mission-AI stack designed to run on any platform from Group-1 UAS to naval vessels and ground vehicles.
    As of early 2026 the company claims deployment on more than 15 distinct platform types, with production integrations on
    the V-BAT MQ-35A, MQ-20 Avenger (live autonomy tests), and the ROMULUS unmanned surface vessel via an HII partnership.
    The V-BAT Group-3 VTOL UAS remains the primary hardware revenue driver (~$1M average selling price, greater than 13-hour
    endurance, heavy-fuel engine) and carries the MQ-35A US Navy designation, signaling formal acquisition pathway progress.
    The October 2025 announcement of the X-BAT—billed as the world''s first AI-piloted VTOL fighter jet—signals Shield AI''s
    ambition to address Group-5, contested-environment air combat roles. The ViDAR sensor product provides long-range visual
    detection and ranging in GPS-denied conditions, extending platform-agnostic sensing capability across the product line.
    This breadth positions Shield AI as a vertically integrated defense autonomy company rather than a pure software ISV.

    '
