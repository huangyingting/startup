callouts:
- title: GPS-Denied Autonomy as Core IP Moat
  type: strength
  body: Hivemind's SLAM and EO/IR sensor fusion enabling GPS-denied operation is a genuine technical differentiator in the
    defense autonomy market. No peer has publicly demonstrated equivalent breadth of platform integration at this maturity
    level, and the USAF A-GRA prime designation validates mission-critical readiness.
  claimRefs:
  - CE001
  - CE024
  - CE026
- title: X-BAT Cost and Schedule Risk
  type: risk
  body: The X-BAT is a first-of-kind supersonic VTOL autonomous fighter jet with first flight targeted for fall 2026. Development,
    certification, and production of a Group-5 platform at $27M target unit cost involves significant engineering, supply
    chain, and regulatory risk. History of defense hardware programs suggests schedule slippage and cost overrun should be
    expected.
  claimRefs:
  - CE002
  - CE019
  - CE022
- title: Certification Gap Is Material Pre-IPO
  type: risk
  body: Neither Hivemind nor V-BAT has a publicly confirmed independent airworthiness certification (DAL A/B equivalent).
    As Shield AI approaches IPO, institutional investors and government contracting officers will require formal certification
    status. The absence of public disclosure on this dimension is a diligence ask that Shield AI must address.
  claimRefs:
  - CE033
  - CE035
- title: Aechelon Acquisition Accelerates X-BAT Test Cycle
  type: insight
  body: 'The March 2026 Aechelon acquisition adds synthetic environment simulation capability to Shield AI''s product stack.
    This is strategically important for X-BAT development: simulation-based training and test can compress the expensive live-flight
    test cycle, reducing X-BAT program cost and schedule risk if integrated effectively.'
  claimRefs:
  - CE023
  - CE019
- title: Developer-Surface Opacity Is a Diligence Risk
  type: assumption
  body: Shield AI's EdgeOS plugin SDK and Hivemind Forge are described as open to integrators, but no public GitHub presence,
    developer documentation portal, or community forum was identified. This analysis assumes the developer toolchain is real
    and functional based on integration case studies; independent corroboration from external integrators would strengthen
    this assessment.
  claimRefs:
  - CE014
  - CE015
