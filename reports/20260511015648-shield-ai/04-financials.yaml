company:
  name: "Shield AI"
chapter:
  number: 4
  title: "Financials"
  summary: >
    Shield AI posted $267M in revenue for fiscal year 2024, up 64% year-over-year, and projects over $540M for 2026 — an ~80% acceleration powered by its Coast Guard IDIQ, expanded international footprint, and growing Hivemind software licensing. The company completed a $2B financing event in March 2026 ($1.5B Series G equity + $500M Blackstone preferred + $250M delayed-draw facility) at a $12.7B post-money valuation. Despite impressive traction, several critical financial data points remain undisclosed: gross margin by segment, burn rate, EBITDA, and detailed unit economics. The Aechelon acquisition and heavy R&D spending (~22% of revenue) signal a capital-intensive growth phase, while a deliberate hardware-to-software revenue mix shift from ~30% to ~50% Hivemind by 2028 is the central margin-expansion thesis.

sections:
  - id: revenue-model-and-streams
    title: "Revenue Model and Revenue Streams"
    body: >
      Shield AI generates revenue from two interconnected streams: hardware systems sales and software autonomy licensing. The hardware segment centers on V-BAT (and the newer X-BAT, announced October 2025) — vertical takeoff and landing drones sold to the U.S. military and allied nations, with unit prices estimated at approximately $1 million each. The software segment, Hivemind Enterprise, consists of EdgeOS (the core autonomy operating system), Hivemind Pilot (autonomous flight), Hivemind Commander (multi-agent orchestration), and Hivemind Forge (ML model development environment). Hivemind is licensed to both government operators and third-party platform integrators such as Airbus, Kratos, and L3Harris.

      For fiscal year 2024 (ending March 2024), Shield AI reported approximately $267 million in total revenue, up 64% from $163 million in 2023. The fiscal year ending March 2025 came in around $300 million — short of the internal $400 million target by roughly $100 million, representing a material growth deceleration to 12% for that year. Management has projected 2026 revenue exceeding $540 million, implying a return to ~80% growth driven by contract deliveries and international expansion.

      Hivemind software contributed approximately 30% of 2025 revenue and is targeted to reach 50% of revenue by fiscal year 2028. The remainder comes from V-BAT hardware sales, services (installation, training, logistics support), and operator contracts. A significant portion of revenue — reportedly over 50% in 2025 — derives from international defense ministries including Romania, Japan, Greece, Canada, the Netherlands, Ukraine, and Egypt, reflecting a diversified but still government-dependent customer base.

      Revenue concentration risk is high: the business model is almost entirely dependent on government procurement cycles, and the majority of contracts are denominated in U.S. dollars under fixed-price or IDIQ structures. No commercial or dual-use revenue has been disclosed. The DoD and allied nations represent both the ceiling and the floor for near-term growth.
    claimRefs: [CI001, CI002, CI003, CI004, CI005, CI006, CI007]
    tableRefs: [TI001]
    figureRefs: [FI001]

  - id: pricing-and-gtm-motion
    title: "Pricing and Go-to-Market Motion"
    body: >
      Shield AI primarily sells through direct government contracting rather than commercial distribution. Its go-to-market relies on defense innovation pathways — starting with Other Transaction Authority (OTA) vehicles and Defense Innovation Unit (DIU) contracts — before scaling to full defense acquisition programs. This approach reduces early sales friction but creates elongated payment cycles typical of government procurement: contract awards often precede revenue recognition by twelve to thirty-six months.

      V-BAT hardware is sold under fixed-price contracts and contractor-owned, contractor-operated (COCO) service arrangements, such as the $198 million indefinite-delivery/indefinite-quantity (IDIQ) contract awarded by the U.S. Coast Guard in July 2024. Under COCO arrangements, Shield AI retains platform ownership and charges for flight hours or persistent surveillance availability — a model that improves recurring revenue visibility. Hivemind Enterprise is licensed per platform type and per mission set, though exact per-unit or per-seat pricing is not publicly disclosed.

      Customer acquisition cost (CAC) metrics, sales cycle length (beyond general multi-year DoD procurement norms), and payback period are not disclosed. Industry analogues for defense software platforms suggest CAC is high but lifetime contract value is also very high. Shield AI's CCA selection as the AI stack for the Anduril YFQ-44A Fury positions it as an embedded supplier — a form of platform lock-in that could seed recurring Hivemind licensing revenue at scale once the CCA program is fully operational.

      The company's international expansion is managed through direct country-level defense ministry relationships, supplemented by in-country integration partners. International contracts — with Romania, Japan, Greece, and others — collectively account for more than half of 2025 revenue, but the mix is opaque and subject to foreign military sales (FMS) regulatory timing. Sales efficiency ratios (revenue per sales employee, ARR per account executive) are not publicly available.
    claimRefs: [CI008, CI009, CI010, CI011, CI012]
    tableRefs: [TI002]
    figureRefs: []

  - id: cost-structure-and-unit-economics
    title: "Cost Structure and Unit Economics"
    body: >
      Shield AI's cost structure reflects the dual burden of a hardware manufacturer and a software R&D company. Hardware costs for V-BAT include airframe manufacturing, propulsion systems, sensor payloads, and supply chain logistics — with gross margins for defense hardware typically in the 20–35% range for comparable platforms. Software margins for Hivemind are estimated at 60%+ based on industry benchmarks for autonomous systems software, though Shield AI has not disclosed segment-level gross margins.

      Research and development spending stood at approximately 22% of revenue for fiscal year 2024, reflecting the company's significant investment in the Hivemind Foundation Model for Defense and the X-BAT development program. This R&D intensity is consistent with pre-IPO defense-tech companies seeking to establish platform dominance before scaling, but it will need to compress as the company scales to achieve acceptable profitability.

      The Aechelon Technology acquisition — announced concurrently with the March 2026 Series G — brings simulation and synthetic environment capabilities at undisclosed cost. Aechelon's technology supports the Joint Simulation Environment (JSE) for the U.S. Air Force and is critical for training Hivemind's Foundation Model using synthetic data. The acquisition adds headcount and integration cost, creating short-term margin pressure in 2026–2027 before potential synergies materialize.

      Working capital dynamics favor Shield AI modestly: government contracts typically provide milestone payments that reduce cash conversion cycle length versus commercial SaaS. However, the COCO model for V-BAT deployments requires capital to be tied up in deployed platforms. Capital expenditure data is not publicly available. Shield AI had approximately 1,422 employees as of early 2026, implying an estimated revenue-per-employee ratio of $188K at 2025 revenue levels — below software benchmarks but consistent with a hardware-software hybrid at this scale.
    claimRefs: [CI013, CI014, CI015, CI016, CI017, CI018]
    tableRefs: [TI003]
    figureRefs: [FI002]

  - id: capital-structure-and-financial-position
    title: "Capital Structure and Financial Position"
    body: >
      As of April 2026, Shield AI has raised approximately $3.6 billion in cumulative financing across 17+ rounds since its founding in 2015. The March 2026 financing event — the largest in company history — comprised three tranches: $1.5 billion in Series G equity (led by Advent International, co-led by JPMorganChase Strategic Investment Group, with participation from Snowpoint Ventures, InnovationX, Riot Ventures, Disruptive, and Apandion); $500 million in fixed-return preferred equity from Blackstone-managed funds; and a $250 million delayed-draw credit facility (also from Blackstone, available for future use). The post-money valuation following these transactions is $12.7 billion — a 140% increase from the $5.3 billion valuation established one year prior.

      The Blackstone preferred equity structure is economically closer to quasi-debt: Blackstone receives a fixed coupon, and the preferred is structurally senior to common equity. Combined with the $250 million delayed-draw facility, total Blackstone exposure is up to $750 million. This structure allows Shield AI to access substantial capital without proportionate equity dilution while maintaining flexibility for follow-on acquisitions. Management has indicated that the primary use of funds is the Aechelon acquisition, continued Hivemind development, V-BAT and X-BAT scaling, and international market expansion.

      Burn rate and cash position are not publicly disclosed. However, at $3.6 billion raised and a revenue run rate approaching $540 million for 2026, the company appears to have sufficient runway to reach or exceed the $1 billion revenue milestone management has targeted for fiscal year 2028. Whether that milestone coincides with IPO preparation — and what profitability profile the market will require — remains the central financial diligence question.

      The company missed its 2025 revenue guidance ($400M target, ~$300M actual), representing a material shortfall of ~$100 million or roughly 25%. This was the first publicly noted guidance miss and introduces some uncertainty about the reliability of the $540M+ 2026 projection. Multiple analysts have noted that at a $12.7 billion valuation, Shield AI trades at ~27-28x projected 2026 revenue — a multiple that prices in aggressive execution and a successful transition to high-margin Hivemind software as the majority revenue driver.
    claimRefs: [CI019, CI020, CI021, CI022, CI023, CI024, CI025]
    tableRefs: [TI004]
    figureRefs: [FI003, FI004]

  - id: financial-gaps-and-diligence-blockers
    title: "Financial Gaps and Diligence Blockers"
    body: >
      Shield AI is a privately held company with no obligation to disclose financial statements, and it has maintained unusually tight control over financial disclosures for a company at this scale. This creates significant diligence blockers across every key metric needed to underwrite a full investment thesis. The most critical gap is the absence of any disclosed gross margin — neither blended nor by segment. Without gross margins, it is impossible to assess the true economics of the hardware-software business mix or to validate the Hivemind margin-expansion thesis.

      Additional undisclosed metrics include: operating expenses by function (R&D, S&M, G&A beyond the 22% R&D figure), EBITDA or adjusted EBITDA, net income or net loss, cash and equivalents, and burn rate. Revenue recognition policies — particularly for COCO arrangements and multi-year IDIQ contracts — are not documented publicly, creating potential for revenue recognition timing differences that could materially affect period-level results.

      The company reported $267 million in 2024 revenue but provided no geographic breakdown, no segment-level gross margin, and no backlog disclosure. The $198 million Coast Guard IDIQ and any other named contracts represent only part of actual bookings; a comprehensive backlog figure would significantly improve underwriting confidence. Unit economics — specifically V-BAT cost-per-flight-hour, Hivemind licensing gross margin, and customer acquisition cost — are entirely absent from public disclosures.

      For a company valued at $12.7 billion and projecting $540 million in 2026 revenue, the opacity of Shield AI's financials is atypically high. Due diligence investors require access to audited financial statements, capitalization table details (including option pool, liquidation preferences on the preferred shares, and Blackstone preferred terms), detailed backlog by program, and cost-of-revenue by product line before any meaningful valuation model can be built with confidence.
    claimRefs: [CI026, CI027, CI028, CI029, CI030]
    tableRefs: [TI005]
    figureRefs: []

