companyProfile:
  summary: >
    Shield AI, founded in 2015 by brothers Ryan Tseng (CEO, USN veteran) and Brandon Tseng
    (President, Navy SEAL veteran) alongside Andrew Reiter (CTO), is a San Diego-based defense
    technology company that develops AI autonomy software and autonomous unmanned aerial systems.
    Its flagship product, Hivemind, is a multi-layer AI enterprise platform comprising EdgeOS
    (real-time middleware), Pilot (autonomous flight AI), Commander (multi-agent coordination),
    and Forge (ML model development). The company also manufactures the V-BAT Group-3 VTOL UAS
    and is developing the X-BAT Group-5 supersonic autonomous aircraft. Shield AI secured a
    $2B Series G round in March 2026 at a $12.7B post-money valuation and is widely regarded
    as a leading pre-IPO defense AI company.
  foundedDate: "2015-01-01"
  founders:
    - name: "Ryan Tseng"
      role: "CEO & Co-Founder"
      background: "U.S. Naval officer; previously aerospace engineer at Northrop Grumman."
    - name: "Brandon Tseng"
      role: "President & Co-Founder"
      background: "U.S. Navy SEAL; operational combat experience drove founding thesis."
    - name: "Andrew Reiter"
      role: "CTO & Co-Founder"
      background: "Computer scientist and robotics researcher; leads Hivemind architecture."
  foundingLocation: "San Diego, CA"
  headquarters: "San Diego, CA"
  productSummary: >
    Hivemind Enterprise AI platform (EdgeOS middleware, Pilot autonomous flight, Commander
    multi-agent coordination, Forge ML tooling, and Foundation Model for Defense), plus
    V-BAT Group-3 VTOL UAS (~$1M ASP) and X-BAT Group-5 supersonic autonomous aircraft
    (target ASP ~$27M, first flight fall 2026). Also acquired Aechelon Technology (simulation,
    March 2026).
  customerFocus: "U.S. Department of Defense (USAF, USN, USCG, SOCOM), allied governments, prime defense contractors."
  businessModel: "Platform software licensing + UAS hardware sales + defense prime contractor program-of-record revenue."
