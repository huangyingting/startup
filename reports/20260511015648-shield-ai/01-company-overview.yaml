  - id: products-technology
    title: "Products and Technology Portfolio"
    body: >
      Shield AI's product portfolio is organized around Hivemind Enterprise—the core AI autonomy software platform—plus a set of hardware-software products that serve as both revenue-generating products and demonstration vehicles for Hivemind's capabilities.

      Hivemind Enterprise is composed of four integrated components: EdgeOS (the run-time environment for autonomous execution), Pilot (the autonomy catalog and AI agent library), Commander (the command-and-control toolkit for multi-asset coordination), and Forge (the autonomy factory for training and simulation). Together, they form what Shield AI describes as the "developer platform for mission autonomy," allowing OEMs, defense primes, and government agencies to integrate autonomous behavior into their own platforms. Hivemind has been deployed on more than 15 distinct platforms, including the Avenger (MQ-20), the X-62A VISTA (a modified F-16), the BQM-177A target drone, and Kratos' MQM-178 Firejet. The platform has been operationally validated since 2019, including in active combat environments (Ukraine).

      V-BAT is Shield AI's flagship VTOL tactical drone, acquired through the purchase of Martin UAV in July 2021 and manufactured in Dallas, Texas. It is powered by a ducted heavy-fuel engine (JP5), offers up to 11 hours of endurance, carries 25 lbs of payload, and can take off and land on a footprint as small as 4.6 m × 4.6 m—including from moving ship decks. V-BAT has been selected by the US Coast Guard Maritime UAS program, operated by all seven Marine Expeditionary Units, and has been sold to allied militaries including those of India, Ukraine, the Netherlands, and Armenia. Its ViDAR (wide-area motion imaging) sensor system, derived from the Sentient Vision Systems acquisition (April 2024), provides a coverage rate of 3,140 NM² per hour—over 2.5× the nearest competitor.

      X-BAT, unveiled in October 2025, is the world's first AI-piloted VTOL fighter jet—a 23,000-pound, tail-sitting strike fighter designed for GPS- and comms-denied environments. X-BAT represents Shield AI's entry into the Collaborative Combat Aircraft (CCA) role and is designed to fly and fight in autonomous swarms under the command of a single operator.

      In March 2026, Shield AI acquired Aechelon Technology, a maker of high-fidelity military simulation software used to train US military pilots, to accelerate Hivemind training and simulation capabilities. The Booz Allen Hamilton strategic partnership (announced March 2025) extends Hivemind Enterprise's reach into the broader DoD enterprise through Booz Allen's mission engineering relationships.
