  - id: recommendation-and-financing-context
    title: "Recommendation and Financing Context"
    body: >
      The diligence recommendation is a conditional buy at late-stage private entry, with strict position sizing and an expectation of 18–36 months to liquidity via IPO or strategic transaction. Conviction is medium: Shield AI's revenue trajectory and platform win are clearly exceptional, but the forward multiple of 47x FY2024 revenue ($267M) is elevated relative to all public defense-tech comparables except Palantir. If management's $540M+ FY2026 guidance is delivered, the implied forward multiple drops to approximately 23x, which is more defensible given the recurring-software narrative. Risk rating is high, primarily driven by pre-profitability, execution dependency on the software pivot, and lack of public gross margin disclosure.

      The Series G financing closed in March 2026, raising $2B at a $12.7B post-money valuation, led by Advent International and J.P. Morgan. The round reportedly comprised approximately $1.5B in equity and $500M in debt or structured financing. This represents a 140% step-up from the $5.3B Series F completed in March 2025, where $240M was raised. Total cumulative funding through the Series G is approximately $3.52B. The pace of valuation step-up—from $5.3B to $12.7B in twelve months—reflects the CCA program win, the CEO transition, and the broader defense-AI market re-rating triggered by geopolitical events through 2025. Entry discipline is critical: investors entering at $12.7B should stress-test the position against a potential 30–40% multiple compression in a risk-off public market, which could price the IPO at $8–10B. Cap-table composition, preference stack, and anti-dilution provisions from the Series G preferred shares are key diligence items that are not yet publicly disclosed.

      Federal spending databases confirm the US government is Shield AI's primary contracting counterparty, and the Palantir 10-K filing provides precedent that defense AI software companies can sustain high revenue multiples post-IPO upon demonstrating profitability and government-wide contract awards.
