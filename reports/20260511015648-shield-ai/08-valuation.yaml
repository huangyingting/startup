  - id: exit-paths-and-diligence
    title: "Exit Readiness, Thesis-Break Triggers, and Final Diligence Asks"
    body: >
      Shield AI's most likely exit path is an IPO in the 2026–2027 window. The appointment of Gary Steele as CEO in May 2025 was widely interpreted as an IPO preparation move; Steele has prior IPO experience at Proofpoint and navigated Splunk to acquisition. The company's $12.7B private valuation creates a high IPO price bar that will require continued revenue momentum and margin improvement to sustain. A 2026 IPO at $14–18B would require the S-1 to show clear revenue acceleration, software gross margins above 50%, and a credible path to GAAP profitability by FY2027–28. Analyst estimates from ipo.club project a potential $24B IPO valuation in an optimistic scenario.

      Strategic M&A remains a second viable exit. Boeing, L3Harris, Northrop Grumman, and RTX (Raytheon Technologies) are logical acquirers that would value Hivemind as a software platform layer for their own autonomous-systems programs. An acquisition by a major prime at $15–25B would represent 1.2–2.0x the Series G entry valuation, a reasonable return for late-stage investors. A SPAC or direct listing is a lower-probability path given the current market environment.

      Thesis-break monitoring should focus on five triggers: (1) loss of the CCA program to a competitor such as Anduril or General Atomics; (2) revenue growth below 30% year-over-year in FY2026, signaling growth deceleration; (3) gross margin remaining below 40% through FY2026, confirming failure of the software-pivot; (4) departure of CEO Gary Steele within 12 months; (5) export control enforcement action against Hivemind's international deployments.

      Final diligence before any investment commitment must include: (1) gross margin breakdown by segment (software licensing vs. V-BAT hardware vs. government services); (2) cap-table and preference-stack analysis showing Series G liquidation preferences and anti-dilution provisions; (3) software ARR and net revenue retention metrics; (4) pipeline and backlog composition by customer and program; and (5) ITAR/EAR export control compliance posture for international Hivemind deployments.
