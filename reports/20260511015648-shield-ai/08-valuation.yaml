  - id: valuation-scenarios
    title: "Bull / Base / Bear Valuation Scenarios"
    body: >
      Three probability-weighted scenarios bracket the range of outcomes for Shield AI investors over a 24–36 month horizon. In the bull case (probability ~20%), Shield AI exceeds $700M in FY2026 revenue, achieves EBITDA-positive operations by FY2027, wins additional CCA increment slots and expands Hivemind Enterprise licensing internationally, and executes an IPO or strategic sale at $24–35B. In this scenario, the software revenue mix exceeds 55% of total revenue, gross margins approach 60%+, and the market awards a 30–45x NTM revenue multiple consistent with high-growth enterprise software. The ipo.club analysis places this upside estimate at approximately $24B post-IPO.

      In the base case (probability ~55%), Shield AI delivers $540M+ FY2026 revenue (matching management guidance), continues to scale Hivemind Enterprise at double-digit year-over-year growth in software bookings, and reaches positive contribution margin from software by late FY2027. An IPO in the 2026–2027 window prices the company at $14–18B, representing a 26–33x FY2026E revenue multiple—a premium to Kratos but well below Palantir's current multiple. Investors who entered at $12.7B would realize a 1.1–1.4x return in 18–24 months, making position sizing discipline critical.

      In the bear case (probability ~25%), revenue growth decelerates below 30% year-over-year, the software-versus-hardware revenue mix fails to improve materially, DoD budget constraints or a CCA program re-scope reduce backlog visibility, and multiple compression drives valuation to $5–8B—below the Series G entry price. This scenario is the key risk identified by adverse analysts and reflects the reality that Shield AI remains pre-profitable with unconfirmed gross margins. The ainvest.com analysis specifically flags this downside as the most underappreciated risk embedded in the current valuation.
