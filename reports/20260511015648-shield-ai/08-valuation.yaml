  - id: comparable-company-analysis
    title: "Comparable Company Valuation Analysis"
    body: >
      Constructing a comparable set for Shield AI requires spanning public defense primes, high-growth defense-software companies, and private defense-AI peers, because no single public comparable captures Hivemind's combination of AI software licensing and hardware integration. Five reference points anchor the analysis.

      Anduril Industries is the closest private peer: it competes on CCA and autonomous systems, has diversified into hardware-plus-software integration, and is reportedly targeting a $60B valuation in a new funding round as of early 2026. Anduril's prior $30.5B Acquinox-reported valuation already implied a steep premium to revenue. If Anduril trades at $60B, Shield AI's $12.7B reflects a meaningful discount to its most direct strategic competitor given similar growth trajectories.

      Palantir Technologies is the primary public software comp. Trading at approximately 38–50x trailing twelve-month revenue on a ~$110B market cap as of early 2026, Palantir demonstrates that defense-AI software companies can sustain very high multiples post-profitability. However, Palantir achieved profitability and has a diversified commercial revenue base; Shield AI has neither yet.

      Kratos Defense & Security Solutions is a hardware-centric drone maker that trades at 3–4x revenue (~$4B market cap), illustrating the multiple penalty for hardware-heavy defense businesses. This is Shield AI's downside scenario if the software pivot fails.

      L3Harris Technologies, a full-scale defense prime, trades at approximately 1x revenue (~$20B market cap), representing the floor for highly commoditized defense hardware.

      Axon Enterprise, a high-growth government-technology company with recurring software revenue, trades at ~15x revenue (~$30B market cap), offering a partial software-company comparable in the government market.

      The comparable set is a sample; a full enumeration would include CACI International, Booz Allen Hamilton, and recent M&A multiples from defense-AI bolt-on acquisitions.
