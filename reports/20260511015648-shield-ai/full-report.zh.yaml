      - number: '1.5'
        title: 公司里程碑与组织规模
        blocks:
          - type: paragraph
            body: >
              Shield AI 从两人创业的特种作战衍生公司发展为估值 $12.7B 的国防科技企业，经历了四个清晰阶段：创立原型期（2015—2018 年）、A 轮至 D 轮扩张期（2019—2022
              年）、平台化与规模化阶段（2022—2024 年）及企业化与全球化阶段（2025 年至今）。

              创立期诞生了 Nova 四轴飞行器——2018 年首款随美国特种作战司令部在战场实战部署的 AI 飞行员产品。Nova 专为 GPS
              拒止环境下在士兵前方清扫建筑威胁而设计，联合创始人频繁援引该项目"挽救的生命"作为公司最有说服力的成果佐证。2021 年收购 Heron Systems（DARPA AlphaDogfight 冠军）和
              Martin UAV（V-BAT 制造商）是两次关键规模化举措，使 Shield AI 同时获得了第五组飞机自主能力信誉和在海军/海军陆战队市场具有吸引力的战术 VTOL 产品。

              2023 年里程碑——Hivemind 在 DARPA 认可的 AI 对人类格斗模拟中击败 F-16 飞行员——引发了最广泛的公众关注，验证了难度最高的自主能力主张（空中格斗机动）。2024 年，V-BAT
              在乌克兰激烈电子战环境下的实战部署，展现了远超实验室条件的真实对抗性能，为盟军客户提供了极具说服力的参考。截至 2026 年 3 月，Shield AI 员工约 1,422 人——较 2025 年 5 月 CEO
              交接时报告的约 900 人增长约 60%。

              值得关注的风险维度：与所有致命自主系统研发商一样，Shield AI 面临日益上升的监管压力和人道主义压力。人权观察（2026 年 3 月）指出，美国五角大楼正加速推进完全自主武器——这一政策环境可能迫使
              Shield AI 在国防部期望与国际人道主义法规范之间艰难周旋，尤其是当 X-BAT 逐步迈向致命交战角色时。
