      - number: '1.2'
        title: 创始人与领导团队
        blocks:
          - type: paragraph
            body: >
              Shield AI 由三位背景互补的联合创始人共同创立，赋予公司少有的组合优势：军事实战信誉、工程深度和 AI 研究能力。Brandon Tseng
              毕业于美国海军学院，曾以海豹突击队员身份在阿富汗和太平洋战区执行战斗任务，随后联合创立 Shield AI，现任总裁兼首席增长官，负责全球战略拓展。Ryan Tseng 是工程与商业架构者，从创立之初担任 CEO
              至 2025 年 5 月，期间带领 Shield AI 员工规模突破 900 人、累计融资逾 $1B，估值达 $5.3B；2025 年 5 月转任总裁兼首席战略官，专注于美国及国际政策与国防高层关系。Andrew
              Reiter 是 AI 技术联合创始人，构建了 Hivemind 的初始算法基础。

              2025 年 3 月，Shield AI 宣布领导层更迭：Gary Steele 获任 CEO，于 2025 年 5 月 13 日正式上任，此前他曾担任 Cisco （2024 年以 $28B 收购
              Splunk）市场侧总裁，同时出任 Shield AI 董事会成员。其履历包括创立 Proofpoint 并将其从零带至 IPO、达成 $12B 企业价值，以及领导 Splunk 实现 58% 营收增长并在
              Cisco 收购前完成全年 GAAP 盈利。这一任命标志着 Shield AI 着力扩展企业软件分发能力，推动 Hivemind Enterprise 走向传统国防主承包商以外的更广泛市场。

              领导团队其他成员包括：Nathan Michael（CTO）、Kingsley Afemikhe（CFO）、Sharyl Givens（首席人事官）、Bob
              Harward（国际业务拓展执行副总裁）、Michael Yang（首席法务官）和 Chandra Rangan（首席营销官）。对联合创始人的关键人依赖——尤其是 Brandon Tseng 的军事人脉和
              Ryan Tseng 的战略关系——仍是值得关注的重要尽调因素，Steele 加入后形成的职业管理层在一定程度上缓解了这一风险。
