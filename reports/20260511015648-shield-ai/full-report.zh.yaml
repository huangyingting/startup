      - number: '7.3'
        title: 运营与技术风险
        blocks:
          - type: paragraph
            body: >
              X-BAT 项目是 Shield AI 最受关注的运营与技术风险所在。截至 2026 年 5 月，该载具尚未完成首飞，公司披露的目标为 2026 年秋季。Group-5 平台复杂度——X-BAT 是配备 GE
              F110 涡扇发动机、推力矢量 VTOL 系统和自主任务 AI 层的超音速 VTOL 战机——引入了多个硬件—软件集成风险向量，与 Shield AI 在小型 VTOL 平台上的现有量产经验截然不同。X-BAT
              量产时间表不确定，估计需要 10 亿美元以上的研发资本才能达到量产。该项目的 FAA 民用空域授权和 NAVAIR/DOT&E 军事适航认证路径明确但耗时多年。若首飞延迟至 2026
              年秋季之后，将压缩收入产生时间线，加剧投资者对资本部署效率的担忧。Hivemind GPS 拒止 SLAM 导航在低纹理或特征稀疏环境（开阔沙漠、开阔海面）下的性能，在公开来源中缺乏独立表征。Commander
              模块在通信拒止条件下的集群韧性尚未在运营规模下有公开文献记录。Shield AI 未披露 Hivemind 或 EdgeOS 的任何 SOC 2、FedRAMP、DISA APL 或同等安全认证。大规模
              V-BAT 和 Hivemind 赋能平台机群的 OTA 软件更新生命周期管理未有公开描述，随着机群规模扩大，这构成潜在的运营连续性风险。公开记录中未发现已知的 V-BAT
              运营故障、安全事故或可靠性驱动的合同行动，这是积极信号，但部分归因于国防部项目有限的公开报道。
