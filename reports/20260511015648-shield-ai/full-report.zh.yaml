      - number: '3.3'
        title: 技术差异化与竞争定位
        blocks:
          - type: paragraph
            body: >
              Shield AI 的主要技术差异化在于 Hivemind 在 GPS 拒止和通信拒止（COMMS-D）环境中的作战深度——这是自主能力谱系的"尖锋"，飞机必须在零人机接口的情况下完全自主行动。Anduril 的
              Lattice 相比之下针对网络互联、数据丰富的环境进行优化，其优势在于整合分布式传感器输入并协同多平台响应。这两家公司争夺的并非同一技术需求；它们争夺的是预算资金和合同载体，往往出现在互补架构中。2026 年
              3 月的 A-GRA 演示印证了这一点：Hivemind 和 Lattice 各自"占据"同一飞机自主能力栈的不同层级。

              在 GPS 拒止自主能力维度上，Shield AI 在需要该特定能力的国防系统集成商中具有无可争议的竞争优势。Hivemind 是唯一具有在 GPS/通信拒止战区（乌克兰、未公开的 SOCOM
              行动）有据可查的实战部署记录的商用 AI 软件栈。Anduril 的 Ghost 4 无人机已在边境安全和情报侦察场景中部署，但无公开记录的 GPS 拒止实战部署。Kratos 的 Valkyrie 依赖
              Northrop 的 Prism，后者在仿真优先环境中经过测试，但已记录的实战部署较少。

              切换成本分析揭示了持久壁垒。在国防部平台上认证新的自主能力软件栈需要：（1）按 MIL-STD 和 FACE
              技术标准进行软件鉴定测试；（2）为自主交战包线提供安全案例文档；（3）按国防部网络安全成熟度模型认证（CMMC）进行网络安全评估；（4）与平台项目办公室进行运营集成测试。在已认证的作战记录项目上切换自主能力栈的估计时间：18—36
              个月。这为率先在特定平台上完成认证的软件栈创造了强大的在位优势——这正是 CCA A-GRA 开放架构标准既是机遇（赋能初始中标）也是风险（若竞争对手更快完成认证则赋能未来替换）的原因。

              多栈分析：A-GRA 架构明确支持国防部项目在同一机体上运行多套自主能力栈——2026 年 3 月 YFQ-44A 测试已作证明。这意味着 Shield AI 和 Anduril 理论上在 CCA
              平台上可直接互换。然而，国防部项目办公室的预算约束在实际中将选择限定为每个项目一套主要自主能力栈。在 CCA 中观察到的结果是：Shield AI 主导"任务自主能力"层（自主驾驶行为），Anduril
              主导"传感器融合"层（战场态势感知与任务分配）。近期来看，两者是互补关系而非竞争关系。
