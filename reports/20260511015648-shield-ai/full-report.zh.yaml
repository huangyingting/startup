      - number: '4.2'
        title: 定价策略与市场拓展路径
        blocks:
          - type: paragraph
            body: >
              Shield AI
              主要通过直接政府合同而非商业渠道开展销售。其市场拓展路径依托国防创新机制——从其他交易授权（OTA）工具和国防创新部门（DIU）合同起步，再逐步迈向完整的国防采购项目。这种方式降低了早期销售阻力，但形成了政府采购典型的漫长回款周期：合同授予往往早于收入确认十二至三十六个月。

              V-BAT 硬件以固定价格合同和承包商自持、承包商运营（COCO）服务安排出售，例如 2024 年 7 月美国海岸警卫队授予的 1.98 亿美元不定量不定期（IDIQ）合同。在 COCO 安排下，Shield
              AI 保留平台所有权，按飞行小时或持续监视可用性收费——该模式提升了经常性收入的可预测性。Hivemind Enterprise 按平台类型和任务集授权，但确切的每单位或每席位定价未公开披露。

              获客成本（CAC）指标、销售周期长度（超出国防部多年采购惯例的部分）及回本周期均未披露。国防软件平台的行业类比表明 CAC 较高，但合同终身价值同样很高。Shield AI 的协同作战飞机（CCA）方案中，其
              AI 技术栈被选为 Anduril YFQ-44A Fury 的核心系统，这使 Shield AI 成为嵌入式供应商——一旦 CCA 项目全面投产，Hivemind 授权收入有望规模化持续增长，形成平台锁定效应。

              公司的国际扩张通过直接对接各国国防部关系推进，辅以本地集成合作伙伴。与罗马尼亚、日本、希腊等国的合同合计占 2025
              年收入超过一半，但具体构成不透明，并受对外军售（FMS）监管时效影响。销售效率指标（人均收入、客户经理负责的年经常性收入）尚无公开数据。
