      - number: '1.4'
        title: 融资历程与投资方构成
        blocks:
          - type: paragraph
            body: >
              Shield AI 自成立以来共完成 17 轮融资，累计融资约 $3.52B。首轮外部融资为 2015 年的 $600K 天使轮，公司于 2021 年跻身独角兽行列。融资历程折射出估值的快速跃升，驱动因素包括
              V-BAT 在国防部的强劲普及、Hivemind 作战自主能力的实证，以及 2022 年后国防科技投资热情的持续高涨。

              最近一轮重大融资为 $2B G 轮（2026 年 3 月 26 日），由 Advent International 和 JPMorganChase 安全与韧性倡议领投，另有 Blackstone
              以固定回报优先股形式提供 $500M，以及一笔 $250M 信贷额度。G 轮确立了 $12.7B 融资后估值——较十二个月前的 $5.3B 上涨 140%，主要源于 Shield AI 作为 Hivemind
              自主能力软件供应商入选美国空军协同作战飞机项目。其他 G 轮投资方包括 Snowpoint Ventures、InnovationX、Riot Ventures、Disruptive Ventures 和
              Apandion。

              上一轮 F 轮（含 2025 年 3 月 6 日宣布的 $240M F-1 子轮，合计约 $592M）由战略投资方
              L3Harris（美国最大国防承包商之一）和韩华宇航（韩国国防主承包商）领投，Andreessen Horowitz、Booz Allen Hamilton、US Innovative Technology
              Fund 和 Washington Harbour Partners 参与跟投。战略投资方构成——两家国防主承包商加一家顶尖 VC——既是商业验证，也是与美国及盟友国防生态深度供应链整合的信号。

              Shield AI 作为非上市公司未披露营收或 ARR 数据，但第三方分析引用的 2026 年预计营收约为 $540M（相当于较 2025 年估算基数约同比增长
              80%）。公司尚未报告盈利，具体烧钱速度和现金跑道数据在公开来源中不可查阅。
