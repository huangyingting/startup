      - number: '2.4'
        title: 增长驱动与采购催化剂
        blocks:
          - type: paragraph
            body: >
              截至 2026 年，多重结构性催化剂正在加速 Shield AI 产品的需求增长。


              **2026 财年国防部自主能力预算机制化。** 历史上首次，国防部将自主能力列为独立预算类别（2026 财年 $134 亿），标志着国防采购的永久性结构转变。这一举措消除了 Shield AI
              早年面临的最重要采购障碍：AI 自主能力专项资金的缺失。


              **乌克兰战争无人机需求信号。** 乌克兰冲突成为历史上可抛弃式无人机作战的最强有力概念验证。乌克兰 2024 年采购了 150 万架 FPV 无人机，计划 2025 年采购 450 万架，预算达 $26
              亿。美国陆军的"接触中转型"计划——旨在 2026 财年末为每个班组配备小型无人机——明确借鉴了乌克兰作战战法，为战术自主系统创造了直接的需求拉动。


              **CCA 项目作为平台无关软件楔入点。** 空军 CCA 项目采用开放的自主能力政府参考架构（A-GRA），为 Hivemind 在多款飞机平台的标准化集成创造了路径。Shield AI 于 2026 年 2
              月入选 Anduril YFQ-44A Fury 的任务自主能力供应商，随后飞行测试中 Hivemind 在飞行途中切换至 Anduril 的 Lattice AI，验证了平台无关论点。若 CCA
              项目扩展至数百架飞机，Hivemind 授权收入规模有望远超整个硬件产品线。


              **全球国防预算扩张。** 2024 年全球军事支出达 $2.7 万亿（SIPRI），亚太地区连续 35 年增长。日本同比增长 21%、AUKUS 多域自主能力项目，以及中东国防现代化进程，为 Shield AI
              提供了美国市场之外切实可行的近期增长机会。


              **软件原生架构优势。** 国防平台从硬件中心向软件定义转型，与商业科技从本地部署向 SaaS 演进的路径相呼应。Shield AI 的 Hivemind Enterprise
              平台即服务模式，无需为每款飞机重建软件栈即可快速实现多平台部署，每增加一个平台集成便带来更强的复合网络效应。
