      - number: '2.5'
        title: 市场约束与采购障碍
        blocks:
          - type: paragraph
            body: >
              在上述顺风之外，若干结构性约束抑制了近期市场的乐观预期。


              **国防预算不确定性。** 特朗普政府 2026 财年预算进程波折不断，包括 DOGE 驱动的文职削减、项目取消，以及为填补缺口而依赖国会和解拨款（申请 $1,133 亿）。Inside Unmanned
              Systems 报告指出，部分接近研发完成的长期无人机项目已被取消，转而倾向现货采购，给依赖特定项目续期的供应商带来营收风险。


              **国防部漫长的采购周期。** 尽管有 OTA 和 DIU 快速推进机制，大多数大型国防部项目仍需多年的来源选择、国会授权和漫长的作战测试。Shield AI 在 CCA
              中的角色虽经飞行测试验证，但尚未进入全速生产决策阶段。V-BAT 等硬件项目面临低速初始生产/全速量产节点及政府验收测试，带来营收时间上的不确定性。


              **出口管制约束。** ITAR/EAR 法规限制了 Shield AI 向特定盟友出口先进自主能力软件和 VTOL
              平台，除非获得政府许可。自主武器争论在国务院和商务部层面引发了额外审查。国际扩张步伐在一定程度上受制于监管审批时间线。


              **伦理与监管悬而未决。** 人权观察、国际红十字委员会以及越来越多的国际法学者认为，完全自主致命系统——包括 AI 驾驶的战斗机——可能违反武装冲突法。尽管 Shield AI
              当前部署在官方国防部框架下被归类为"人在回路"或"人在路上"系统，自主武器条约谈判带来的声誉和监管风险仍是中期隐患。


              **分析师估值差异作为尽调信号。** 军事 AI 和自主系统的市场规模估算 2026 年区间从约 $90 亿（仅 AI 软件）至约 $700 亿（所有自主国防平台）——差距达 8
              倍。这一差异反映的是真实的定义分歧，而非数据质量问题，并表明 Shield AI 等公司的营收预测对定义范围、项目结果和预算波动高度敏感。
