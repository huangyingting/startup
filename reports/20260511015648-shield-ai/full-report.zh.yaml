      - number: '2.3'
        title: 采购方、用户与付款方细分
        blocks:
          - type: paragraph
            body: >
              Shield AI 的市场涉及不同的采购方、用户和付款方角色，三者并不总是同一主体，这直接影响公司的市场进入模式。


              **主要付款方和采购方：美国国防部（USAF、USN、SOCOM、陆军、海岸警卫队）。** 国防部既是主要付款方（通过拨款），也是主要采购方（通过 AFWERX、DIU、PEO Aviation、NAVSEA 和
              SOCOM 等合同机构）。CCA 项目（AFMC/AFRL）是 2026 年最受关注的新增付款方。国防创新单元（DIU）通过其他交易授权（OTA）为 Shield AI 等非传统供应商快速推进合同。


              **用户（操作员）：** 空军战斗机飞行员和联队指挥官（CCA/Hivemind）；海军舰艇指挥官（V-BAT/ViDAR 用于海上情报监视侦察）；SOCOM 操作员（Nova，GPS
              拒止建筑清扫）；美国海岸警卫队（V-BAT 海上无人机系统服务）；陆军地面部队（小型无人机集成）。用户关注点在于对抗环境下的可靠性、操作便捷性和任务效果。


              **战略/盟国采购方：** 2026 财年国防部预算显示，海军申请无人系统经费 $53 亿（较 2025 财年增长 70%）。陆军申请 2026 财年小型无人机经费 $8.039 亿（较 $9,840
              万大幅增长）。这些新兴采购方的预算增长直接利好 Shield AI 产品路线图。


              **国际盟国采购方：** 通过合作协议和对外军售（FMS），Shield AI 已向印度、乌克兰、荷兰和亚美尼亚出售 V-BAT。韩华系统对 Shield AI
              的战略投资打开了韩国国防采购厅（DAPA）市场渠道。L3Harris $100M 战略投资及后续 V-BAT 集成，扩大了盟国 VTOL 情报监视侦察市场。


              **主承包商作为平台客户：** Anduril（YFQ-44A Fury CCA）、General Atomics（MQ-20 Avenger Hivemind 测试）、Northrop
              Grumman（Talon IQ 生态）和 Airbus（UH-72A Lakota）均作为平台客户集成 Hivemind 软件组件——这是一个有别于直接国防部采购的 B2B 授权渠道。
