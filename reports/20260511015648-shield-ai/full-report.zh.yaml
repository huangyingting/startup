      - number: '8.3'
        title: 乐观/基准/悲观估值情景
        blocks:
          - type: paragraph
            body: >
              三个概率加权情景界定了 Shield AI 投资者在未来 24—36 个月内的收益区间。

              乐观情景（概率约 20%）：Shield AI FY2026 营收超过 7 亿美元，FY2027 实现 EBITDA 转正，赢得更多 CCA 增量席位并在国际市场扩展 Hivemind Enterprise
              授权，以 240—350 亿美元估值完成 IPO 或战略出售。软件收入占比超过总营收的 55%，毛利率接近 60% 以上，市场给予与高增长企业软件相符的 30—45 倍 NTM 收入倍数。ipo.club
              的分析将此上行情景 IPO 估值约定在 240 亿美元。

              基准情景（概率约 55%）：Shield AI FY2026 营收达到 5.4 亿美元以上（与管理层指引吻合），Hivemind Enterprise 软件订单持续实现两位数同比增长，FY2027
              年底前软件贡献利润转正。2026—2027 年窗口 IPO 定价在 140—180 亿美元，对应 FY2026E 营收 26—33 倍——高于 Kratos 但明显低于 Palantir 当前倍数。以 127
              亿美元入场的投资者在 18—24 个月内可实现 1.1—1.4 倍回报，仓位纪律因此至关重要。

              悲观情景（概率约 25%）：营收增速低于 30% 同比，软硬件收入结构未能实质改善，DoD 预算限制或 CCA 项目重新划定范围压缩订单可见性，倍数收缩将估值压至 50—80 亿美元——低于 Series G
              入场价。这一情景是反向分析师识别的核心风险，也印证了 Shield AI 在毛利率尚未经证实、尚未盈利背景下的现实处境。ainvest.com 的分析专门指出，这一下行风险是当前估值中最被低估的隐含风险。
