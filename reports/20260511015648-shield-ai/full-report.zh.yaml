      - number: '7.6'
        title: 缓释措施与论断颠覆标准
        blocks:
          - type: paragraph
            body: >
              以下是关键风险缓释措施及其监测指标。监管/法律风险方面，主要缓释措施为通过 DDTC 注册、商品管辖权认定及许可出口协议构建积极的 ITAR 合规体系；监测指标为 DDTC 或 BIS 对 Shield AI
              发起任何执法行动，或任何盟友客户报告技术转让被拒。论断颠覆触发条件：国务院发起 ITAR 除名行动，或国会对自主武器出口施加限制。X-BAT
              运营风险方面，缓释措施为以里程碑为节点分阶段释放资金的试飞计划；监测指标为 2026 年秋季首飞里程碑能否如期达成。论断颠覆触发条件：首飞推迟至 2027 年中期以后，且费用超支超过估算开发预算的
              50%。财务/模型风险方面，缓释措施为 Series G 20 亿美元融资提供的资金跑道；监测指标为 2026 年营收增速是否达到约 80% 指引（对应约 4.8 亿美元）。论断颠覆触发条件：2026
              年实际营收低于 3.5 亿美元，意味着软件转型叙事下的执行持续落空。合作伙伴依赖方面，缓释措施为 GE Aerospace 合作协议及 IDIQ 合同结构；监测指标为 GE Aerospace
              任何供应中断公告，或 DoD 预算持续决议超过六个月。关键人物风险方面，缓释措施为正式接班计划及领导层保留激励权益；触发条件为两位联合创始人在 12 个月内相继离职。投资方应要求管理层披露：ITAR
              合规计划文件、Hivemind 安全认证路线图、X-BAT 项目预算及里程碑计划表、2025 年实际营收与指引的对账报告，以及 Aechelon 整合时间表与成本。
