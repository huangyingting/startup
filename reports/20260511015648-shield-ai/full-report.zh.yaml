      - number: '7.4'
        title: 合作伙伴与依赖性风险
        blocks:
          - type: paragraph
            body: >
              Shield AI 的运营和产品连续性依赖少数关键外部合作伙伴和结构性依赖。GE Aerospace F110 发动机是 X-BAT 的主要推进来源，构成单一供应商风险：若 GE Aerospace
              无法按时交付发动机，X-BAT 项目时间线将因无备用替代而延误。GE 与 Shield AI 已公开宣布 X-BAT 项目的推进系统合作，但尚未披露任何具约束力的供应协议条款或应急采购方案。AWS
              云服务似乎支撑着 Hivemind Forge 开发环境；AWS 访问中断或费用上涨可能影响 Shield AI 的软件开发流水线，但 AWS
              的可靠性记录在一定程度上缓释了这一风险。国防部预算周期依赖是一个结构性风险：Shield AI 收入的主要部分来自美国政府客户，持续决议（CR）、项目取消或预算封顶可能减少或延迟合同任务订单。2026 年 3
              月宣布的 Aechelon 收购引入了整合风险——时间表、成本和所收购团队的人员保留均未公开披露。美国海岸警卫队 1.98 亿美元 IDIQ 形成的客户集中度按年化计算超过 2024 财年收入的
              70%，使该单一合同的任何暂停或重组对近期收入而言都是重大事件。Anduril 获得的 Hivemind 授权取决于 Anduril 成功执行 CCA YFQ-44A
              项目，形成对竞争对手项目状态的间接依赖。上述任一合作伙伴或依赖方出现问题，都可能直接波及收入、研发时间线或估值倍数。
