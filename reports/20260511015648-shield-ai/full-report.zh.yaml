      - number: '2.6'
        title: 重要发现
        blocks:
          - type: callout
            title: 2026 财年标志着国防 AI 预算的结构性拐点
            body: >-
              国防部 2026 财年史无前例地设立 $134 亿自主能力专项预算，将 Shield AI 的市场从竞争性细分领域转变为主流采购类别。这不是临时性项目，而是国防部对自主系统的全面战略承诺，为 Shield AI
              全系产品组合创造了持久的多年期合同积压潜力。
            calloutType: strength
            claimRefs:
