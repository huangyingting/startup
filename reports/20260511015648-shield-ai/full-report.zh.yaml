          - type: callout
            title: 认证缺口在 IPO 前构成重大障碍
            body: >-
              Hivemind 和 V-BAT 均未获得公开确认的独立适航认证（DAL A/B 等效）。随着 Shield AI 推进 IPO，机构投资者和政府采购官员将要求正式认证状态。这一维度缺乏公开披露，是 Shield
              AI 必须回应的尽调追问。
            calloutType: insight
            claimRefs:
              - CE033
              - CE035
          - type: callout
            title: 收购 Aechelon 加速 X-BAT 测试周期
            body: >-
              2026 年 3 月收购 Aechelon 为 Shield AI 产品矩阵增加了合成环境仿真能力。这对 X-BAT 研发具有重要战略意义：基于仿真的训练和测试可压缩昂贵的实飞测试周期，若有效整合，将降低
