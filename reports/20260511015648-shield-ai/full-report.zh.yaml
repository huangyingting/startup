  - number: 5
    title: 产品与技术
    sections:
      - number: '5.1'
        title: 产品矩阵概览
        blocks:
          - type: paragraph
            body: >
              Shield AI 采用双层产品架构：软件自主平台（Hivemind Enterprise）与硬件产品线（V-BAT、X-BAT），辅以传感器系统 ViDAR。Hivemind Enterprise
              是商业重心——一套中间件与任务 AI 技术栈，设计上可运行于从一类无人机到海军舰艇和地面车辆的任意平台。截至 2026 年初，公司宣称已在 15 种以上不同平台上完成部署，生产集成包括 V-BAT
              MQ-35A、MQ-20 Avenger（实时自主测试），以及通过 HII 合作的 ROMULUS 无人水面舰艇。V-BAT Group-3 VTOL 无人机是主要的硬件收入驱动力（均价约 100 万美元，续航超
              13 小时，Block Upgrade 配置搭载重油发动机），并获得美国海军 MQ-35A 正式型号命名，标志着正规采购路径取得进展。2025 年 10 月发布的 X-BAT——定位为全球首款 AI 驾驶
              VTOL 战斗机——展示了 Shield AI 进军 Group-5 高对抗空战领域的雄心。ViDAR 传感器产品在 GPS
              拒止条件下提供远程视觉探测与测距能力，为整条产品线拓展了平台无关的感知能力。这一产品广度使 Shield AI 定位为垂直整合的国防自主化公司，而非单纯的软件 ISV。
