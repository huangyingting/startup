      - number: '8.2'
        title: 投资建议与融资背景
        blocks:
          - type: paragraph
            body: >
              尽调结论为有条件买入，适用于后期私募阶段入场，须严格控制仓位，预计 IPO 或战略并购的流动性窗口为 18—36 个月。确信度为中等：Shield AI 的营收轨迹及平台层胜出明显突出，但以 FY2024 营收
              2.67 亿美元计算，47 倍前瞻倍数相较所有国防科技上市可比公司已偏高，Palantir 除外。若管理层的 FY2026 5.4 亿美元以上指引落实，隐含前瞻倍数将降至约 23
              倍，考虑到经常性软件叙事，该估值更具可辩护性。风险评级为高，主要驱动因素为尚未盈利、软件转型执行依赖性强，以及公开毛利率数据缺失。

              Series G 融资于 2026 年 3 月完成，由 Advent International 和 J.P. Morgan 领投，融资 20 亿美元，投后估值 127 亿美元。据报道本轮融资约由 15
              亿美元股权和 5 亿美元债务或结构融资构成。相较于 2025 年 3 月完成的 Series F（融资 2.4 亿美元，估值 53 亿美元），此次估值增幅达 140%。通过 Series G 累计融资合计约
              35.2 亿美元。估值升幅之快——从 53 亿美元到 127 亿美元仅历时 12 个月——折射出 CCA 项目胜出、CEO 换届以及 2025 年地缘政治事件驱动的国防 AI 市场重新定价。入场纪律至关重要：以
              127 亿美元入场的投资者应压力测试该仓位，在风险偏好收缩的公开市场中，倍数压缩 30%—40% 可能将 IPO 定价压至 80—100 亿美元区间。Series G
              优先股的股权结构表组成、优先偿还堆叠及反稀释条款是关键尽调事项，目前尚未公开披露。

              美联邦支出数据库确认美国政府为 Shield AI 的主要合同方，Palantir 的 10-K 年度报告提供了先例——国防 AI 软件公司在实现盈利并获得政府全范围合同授予后，IPO 后可维持高收入倍数。
