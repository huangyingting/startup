            body: >
              Shield AI 面临重大的客户集中风险。若按年化计算，美国海岸警卫队 1.98 亿美元 IDIQ 约占 2024 财年 2.67 亿美元收入的
              74%——这种单一客户依赖在国防硬件早期公司中并不罕见，但若该项目暂停或重组，将暴露出战略脆弱性。值得注意的是，已公开确认的收入中约 100%
              来自美国政府客户，使公司面临国防部预算封顶、持续决议（CR）或采购优先事项调整的风险。AI Invest 的一份分析指出，Shield AI 127
              亿美元的估值在很大程度上依赖于尚未在已报告收入构成中体现的软件转型叙事，因为 Hivemind
              授权收入在总收入中仍占少数，而公司已按软件公司倍数定价。在扩张方面，国防主承包商授权（Anduril）和盟国部署代表了有意义的多元化方向。Anduril YFQ-44A Hivemind
              授权具有重要战略意义，因为协同作战飞机项目预计将被美国空军大批量采购，实际上将单一授权安排转化为事实上的多年高量间接收入流。向更多印太和欧洲北约盟友拓展对外军售（FMS），将进一步分散收入集中度。Shield
              AI 2026 年 3 月 20 亿美元的融资显示投资者对这些扩张叙事抱有信心，但软件转型的执行风险仍是合理的担忧。
