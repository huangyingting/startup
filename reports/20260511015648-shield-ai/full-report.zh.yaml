  - id: FU001
    title: 客户旅程图
    type: journey-map
    description: |
      Shield AI 客户从初步需求识别到长期平台扩展的端到端旅程，展示国防部终端用户及盟友国际客户常见的采购阶段、集成里程碑与扩张触发点。
    claimRefs:
      - CU012
      - CU018
      - CU027
      - CU030
    data:
      nodes:
        - id: awareness
          label: 认知/需求识别
          description: 国防部或盟国部队识别持续性 ISR、海上巡逻或自主编队需求；内部需求梳理与市场调研
        - id: evaluation
          label: 评估/竞争性中标
          description: Shield AI 通过 BAA、OTA、SBIR 或项目级竞争参与投标；V-BAT 或 Hivemind 被选定为解决方案
        - id: integration
          label: 平台集成
          description: Hivemind EdgeOS 集成至客户平台；典型周期为 6–12 周；V-BAT 以完整系统形式交付
        - id: qualification
          label: 作战资质认证
          description: NAVAIR、USAF 或盟国主管机构的资质认证与验收测试；MQ-35A 命名为海军里程碑节点
        - id: production
          label: 生产部署
          description: 全面作战部署至野战部队；IDIQ 任务订单下达；盟友部署启动
        - id: expansion
          label: 扩张/后续合同
          description: 采用 Block Upgrade，新增平台集成，扩大 IDIQ 任务订单，或盟友 FMS 转介
  - id: FU002
    title: 采用/部署漏斗
    type: funnel
    description: |
      Shield AI V-BAT 与 Hivemind 客户采用管道的示意性漏斗——从初期国家/机构潜在客户到活跃部署及重复合作。
