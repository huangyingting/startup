      - number: '8.5'
        title: 退出准备、论断颠覆触发条件与最终尽调清单
        blocks:
          - type: paragraph
            body: >
              Shield AI 最可能的退出路径是在 2026—2027 年窗口 IPO。Gary Steele 于 2025 年 5 月出任 CEO，被普遍解读为 IPO 准备动作；他有 Proofpoint IPO
              经验，并主导了 Splunk 被收购的全程。公司 127 亿美元私募估值设定了较高的 IPO 定价门槛，需要持续的营收动能和利润率改善才能撑住。若 2026 年以 140—180 亿美元估值上市，S-1
              须展现清晰的营收加速、软件毛利率超过 50%，以及 FY2027—28 实现 GAAP 盈利的可信路径。ipo.club 分析师预测，乐观情景下 IPO 估值可达约 240 亿美元。

              战略并购是第二条可行退出路径。Boeing、L3Harris、Northrop Grumman 和 RTX（Raytheon Technologies）是合理的潜在买家，均会将 Hivemind
              视为自身自主系统业务的软件平台层。主要承包商以 150—250 亿美元完成收购，意味着较 Series G 入场估值实现 1.2—2.0 倍回报，对后期投资者而言属于合理收益区间。鉴于当前市场环境，SPAC
              或直接上市路径概率较低。

              论断颠覆监控应聚焦五个触发条件：（1）CCA 项目落败于 Anduril 或 General Atomics 等竞争对手；（2）FY2026 同比营收增速低于 30%，表明增长减速；（3）FY2026
              全年毛利率仍低于 40%，确认软件转型失败；（4）CEO Gary Steele 在 12 个月内离职；（5）Hivemind 国际部署遭受出口管制执法行动。

              任何投资承诺前的最终尽调须包括：（1）分部毛利率明细（软件授权、V-BAT 硬件与政府服务的拆分）；（2）股权结构表及优先股堆叠分析，明确 Series G
              清算优先权及反稀释条款；（3）软件年经常性收入（ARR）及净收入留存率指标；（4）按客户与项目拆分的管道与订单构成；（5）Hivemind 国际部署的 ITAR/EAR 出口管制合规状况。
