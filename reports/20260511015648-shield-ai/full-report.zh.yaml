      - number: '2.2'
        title: 市场规模：TAM、SAM 与 SOM
        blocks:
          - type: paragraph
            body: >
              军事 AI 与自主能力的市场规模估算在各分析机构间存在争议，原因在于定义标准不一——部分机构纳入硬件平台，部分仅统计软件，部分将所有无人系统不论自主程度一律打包。以下分析采用三个嵌套视角，针对 Shield AI
              的实际产品覆盖进行校准。


              **总可用市场（TAM）：** 最广泛的相关市场为全球自主国防平台市场，Fortune Business Insights 估计 2026 年规模约为 $698 亿，以 14.0% 的年复合增长率扩张，预计
              2034 年达到 $1,989 亿，涵盖全球所有自主空中、陆地和海上国防平台。采用更窄定义——仅统计全球军事无人机——则 2026 年估值区间在 $186 亿（Mordor Intelligence）至 $272
              亿（Coherent Market Insights）之间，共识集中于 $190—210 亿。军事 AI 软件细分市场（Global Growth Insights）2026 年估计为 $93 亿，以 13.9%
              的年复合增长率扩张，预计 2035 年达到 $299 亿。


              **可服务市场（SAM）：** Shield AI 的 SAM 以美国国防部 2026 财年 $134 亿专项自主能力预算为锚——这是国防部首次将自主能力单独列为独立预算类别。其中，$94
              亿分配给无人及遥控空中飞行器，$12 亿专项用于"使能能力"（所有平台底层的自主能力软件）。盟国军事采购——包括韩国（韩华战略合作伙伴）、阿联酋、乌克兰、荷兰、印度和英国——带来有实质意义但难以量化的增量
              SAM。仅战术 VTOL 平台的 SAM 基于 V-BAT 项目支出速率估计为每年 $20—40 亿；自主能力软件授权的 SAM 估计为每年 $10—20 亿。综合 SAM：约 $30—60 亿。


              **可获取市场（SOM）：** 以 2026 年预计营收约 $540M 及快速扩张的平台无关模式计算，Shield AI 目标 SAM 占比约 10—15%。若 CCA
              项目达到全面量产（预计十年末装备数百架飞机），Shield AI 的 Hivemind Enterprise 授权 SOM
              将大幅扩张。空军明确提出要"大量"装备无人僚机，这将带来数十亿美元规模的经常性软件授权机会。
