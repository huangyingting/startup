  - number: 6
    title: 客户情况
    sections:
      - number: '6.1'
        title: 客户群体细分
        blocks:
          - type: paragraph
            body: >
              Shield AI 的客户群分为三个主要细分，各自代表不同的采购机制和收入属性。美国国防部终端用户是最成熟的细分：美国海岸警卫队在 1.98 亿美元 IDIQ 合同下以全量产模式运营 V-BAT；美国海军授予
              V-BAT MQ-35A 型号命名并正在推进 NAVAIR 鉴定；美国空军将 Hivemind 作为 A-GRA 项目主力自主技术栈，并已完成 MQ-20 Avenger 实飞自主测试。盟国国际客户细分涵盖 10
              个以上国家，其中仅日本和罗马尼亚为已公开命名的部署案例，通过对外军售（FMS）或直接渠道采购 V-BAT。第三个细分——国防主承包商集成商——是最新兴但具有重要战略意义的：Huntington Ingalls
              Industries 在其 ROMULUS 无人水面舰艇上集成了 Hivemind，Anduril 则为其协同作战飞机 YFQ-44A 项目获得 Hivemind 软件授权。这一 B2B2G
              渠道绕过直接政府采购时间线，使 Shield AI 的软件得以嵌入大型主承包商销售的平台中。在三个细分中，V-BAT 硬件驱动近期收入，而 Hivemind
              软件授权是一个新兴的经常性收入组成部分，潜在单位经济效益更优。
