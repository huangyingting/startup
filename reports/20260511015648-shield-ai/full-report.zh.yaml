companyProfile:
  summary: >
    Shield AI 由 Ryan Tseng（CEO，美国海军退役老兵）及其兄弟 Brandon Tseng（总裁，海豹突击队退役老兵）和 Andrew Reiter（CTO）于 2015 年联合创立，总部位于圣地亚哥，是一家开发
    AI 自主能力软件和自主无人机系统的国防科技公司。核心产品 Hivemind 是一个多层 AI 企业平台，包含 EdgeOS（实时中间件）、Pilot（自主飞行 AI）、Commander（多智能体协同）和 Forge（ML
    模型开发）四个模块。公司同时制造 V-BAT 第三组 VTOL 无人机，并正在研发 X-BAT 第五组超音速自主飞机。2026 年 3 月，Shield AI 完成 $2B G 轮融资，融资后估值达 $12.7B，被业界广泛视为
    IPO 前领先的国防 AI 公司。
