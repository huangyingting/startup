    sections:
      - number: '2.1'
        title: 市场边界与范围
        blocks:
          - type: paragraph
            body: >
              Shield AI 在两个相互交叉的市场垂直领域展开竞争：（1）军事 AI 自主能力软件——使无人系统能够在对抗环境中无需人类干预即可感知、决策和行动的软件；（2）战术 VTOL
              无人机（UAS），尤其是舰载与地面便携型平台，如 V-BAT 和 X-BAT。


              该市场的采购方集中于国防领域，主要为美国国防部和盟军，需要能在 GPS 拒止和通信拒止环境下运行的自主系统。核心采购决策在于选择平台无关的自主能力软件（Hivemind Enterprise
              授权模式）、战术硬件（V-BAT/X-BAT 采购）或两者组合。现状替代方案是人工驾驶或遥控平台，其操作员成本更高、认知负荷更重，且更容易受到电子战干扰。


              Shield AI 可服务市场不包括：民用/商业无人机应用（农业、物流、基础设施巡检）、消费级 AI 软件、非国防卫星系统，以及大型战略无人机项目（MQ-9 "死神"或"全球鹰"等 HALE
              平台，属于完全不同的预算类别）。反无人机（C-UAS）市场同样不在其中——尽管该市场在 2026 财年国防部预算中获得 $3.1B 拨款，但由独立供应商服务，与 Shield AI 产品组合无重叠。


              邻近市场包括：有人-无人协同（MUM-T）软件平台、国防通信与网络（JADC2），以及最终可能将 Hivemind 作为对抗性 AI 伙伴纳入的军事训练仿真系统。
            claimRefs:
              - CM021
              - CM011
              - CM031
