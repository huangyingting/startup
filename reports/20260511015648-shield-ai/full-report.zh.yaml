          - type: callout
            title: Hivemind 十年 GPS 拒止强化学习训练数据不可复制
            body: >-
              Shield AI 自 2016 年起持续以真实 GPS 拒止飞行数据训练 Hivemind 的强化学习代理。这一数据飞轮——10
              余年在对抗环境（包括实战部署）下实际自主飞行的训练信号——任何竞争对手都无法快速复制。Anduril、Kratos 和 DARPA 项目可以部署相似架构，但无法追溯获取十年真实 GPS 拒止作战的训练数据。这使
              Hivemind 的模型权重——而非其架构——成为持久的竞争资产。
