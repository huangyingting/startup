  - number: 4
    title: 财务情况
    sections:
      - number: '4.1'
        title: 收入模式与收入来源
        blocks:
          - type: paragraph
            body: >
              Shield AI 的收入来自两条相互关联的业务线：硬件系统销售和软件自主授权。硬件业务以 V-BAT（以及 2025 年 10 月发布的 X-BAT）为核心——向美国军方及盟友出售垂直起降无人机，单机均价估计约
              100 万美元。软件业务 Hivemind Enterprise 包含四个模块：EdgeOS（核心自主操作系统）、Hivemind Pilot（自主飞行）、Hivemind Commander（多智能体编排）和
              Hivemind Forge（机器学习模型开发环境）。Hivemind 同时向政府运营商及第三方平台集成商授权，合作方包括 Airbus、Kratos 和 L3Harris。

              2024 财年（截至 2024 年 3 月），Shield AI 报告总收入约 2.67 亿美元，较 2023 年的 1.63 亿美元增长 64%。截至 2025 年 3 月的财年收入约为 3 亿美元，低于内部
              4 亿美元目标约 1 亿美元，当年增速大幅放缓至 12%。管理层预计 2026 年收入将超过 5.4 亿美元，意味着在合同交付与国际扩张驱动下，增速有望回升至约 80%。

              Hivemind 软件约贡献 2025 年收入的 30%，目标是在 2028 财年达到 50%。其余收入来自 V-BAT 硬件销售、服务（安装、培训、后勤支持）及运营合同。2025 年逾 50%
              的收入据报道来自海外国防部，客户涵盖罗马尼亚、日本、希腊、加拿大、荷兰、乌克兰和埃及，反映出多元化但仍高度依赖政府的客户结构。

              收入集中风险较高：商业模式几乎完全依赖政府采购周期，大多数合同以美元计价，采用固定价格或 IDIQ 形式。目前尚未披露任何商业或两用收入。国防部及盟国既是近期增长的天花板，也是基础保障。
