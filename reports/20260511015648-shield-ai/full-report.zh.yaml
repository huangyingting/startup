      - number: '5.5'
        title: 可信度、安全性与合规
        blocks:
          - type: paragraph
            body: >
              Shield AI 在自主武器系统须遵守《国防部指令 3000.09》的领域运营——该指令要求对致命决策保留人员授权，这意味着当前配备 Hivemind
              的平台在交战决策上仍保持人在回路（或人在环外），即便导航和飞行已完全自主。这一监管框架在国防部采购体系内已被充分理解，目前并不构成 ISR 和协同任务（V-BAT、海上任务）的实质性障碍。V-BAT MQ-35A
              型号命名表明通过 NAVAIR 的正式军事鉴定正在推进，这是国防采购的可信度信号。Shield AI 与 AWS 的合作将类 FedRAMP 云安全实践延伸至 EdgeOS
              开发环境，是联邦客户重要的合规考量。Hivemind 的 GPS 无关架构天然具备抗干扰韧性，在对抗环境中是一项安全优势。然而，尽调发现若干关键缺口：截至 2026 年初，Hivemind 或 V-BAT
              尚无经第三方独立认证的适航资质（DAL A/B 等效）在审阅的公开文件中得到确认。Shield AI 未公开披露安全漏洞评估、渗透测试结果或正式安全认证时间表。X-BAT
              在对抗民用和拥挤空域中的自主运行将需要超出现有无人机框架的监管批准，这一过程可能延长时间表，并需要美国联邦航空局（FAA）、国防部及国际层面的协调。这些缺口对于评估公司在 IPO
              前合规准备度的机构投资者而言至关重要。
            claimRefs:
