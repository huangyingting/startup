      - number: '7.2'
        title: 监管与法律风险
        blocks:
          - type: paragraph
            body: >
              Shield AI 的产品组合——V-BAT、Hivemind 和 X-BAT——所处的监管环境复杂且仍在演进。根据 22 CFR 第 120—121
              条（ITAR），具备自主能力的军用无人机系统可能受《美国军品清单》第 XI 类（军事电子设备）或第 XV 类（航天器及相关物品）管辖。向盟国客户出口任何受 ITAR
              管制的物品，均需国务院国防贸易管制局（DDTC）批准的技术援助协议（TAA）、制造许可协议（MLA）或 DSP-5 出口许可证。AI 自主软件的两用性还可能对某些组件适用出口管理条例（EAR）。DDTC
              积压审批或政策变化可能延误或阻断盟国客户收入。《国防部指令 3000.09》（武器系统自主性）带来结构性政策风险：它要求自主系统的致命决策保留人员授权，限制了 Hivemind
              在进攻性任务中的运营角色。对该指令的任何政策收紧——或新的自主武器条约——都可能限制 Shield AI AI 飞行员概念在作战任务中的可寻址范围。国防采购合规要求（FAR/DFARS）和 CMMC
              网络安全认证要求在合同层面增加了监管合规负担。截至 2026 年 5 月，公开记录中未发现任何针对 Shield AI 的诉讼、执法行动、ITAR 违规或知识产权纠纷。Shield AI 的合规状况——包括
              ITAR 注册、商品司法管辖权确定及 CMMC 认证级别——未公开披露，构成关键尽调缺口。
