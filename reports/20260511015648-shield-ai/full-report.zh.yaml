      - number: '3.5'
        title: 重要发现
        blocks:
          - type: callout
            title: 与 Anduril 的竞合是特性，而非缺陷
            body: >-
              Shield AI 的 Hivemind 运行在 Anduril 的 YFQ-44A Fury 上，同时 Anduril 自家的 Lattice
              负责同一机体的传感器融合层——这是竞争格局中最颠覆直觉的事实。这一竞合模式验证了 A-GRA 论点：在 CCA 市场，国防部要的是最佳组合，而非单一供应商解决方案。Shield AI
              作为"任务自主能力"层的价值主张，实际上因这一安排而得到强化，因为它使 Hivemind 在战术边缘端无论谁制造飞行平台都不可替代。
            calloutType: insight
