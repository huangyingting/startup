  - number: 3
    title: 竞争格局
    sections:
      - number: '3.1'
        title: AI 优先同行：Anduril 与自主能力软件栈之争
        blocks:
          - type: paragraph
            body: >
              Shield AI 战略层面最重要的竞争对手是 Anduril Industries，2017 年由 Palmer Luckey 创立，总部位于加利福尼亚州科斯塔梅萨。Anduril
              是美国唯一一家具有可比软件优先自主能力架构、获风险投资支持且运营规模接近的国防科技公司。截至 2026 年 3 月，Anduril 正在 Thrive Capital 和 Andreessen Horowitz
              领投的 H 轮融资中寻求 $600 亿估值，较 2025 年 6 月 G 轮的 $305 亿大幅提升。Anduril 2025 年营收约 $21 亿——约为 Shield AI 估算 $540M 的 4
              倍——反映出其更早形成、更多元化的软硬件产品组合，包括 Ghost 4 无人机、Roadrunner 拦截器和 Fury 自主战斗机（YFQ-44A）。2026 年 3 月，Anduril 获得美国陆军 10
              年期、$200 亿上限的自主系统合同，是公司历史上最大单笔合同，也印证了国防部对 AI 原生主承包商的强烈胃口。

              技术层面，Anduril 的 Lattice AI 是一个传感器融合与指挥控制平台，作为战场神经系统运行——整合分布式传感器数据，形成统一战场态势图像，并在空中、陆地和海上域自动化威胁响应。Lattice
              的核心优势是跨异构平台网络的横向集成，而 Shield AI 的 Hivemind 专注于单平台级别的纵向深度：使单架飞机或无人机能够在完全信号隔离、零人机协同的情况下导航、规划和执行任务。2026 年 3 月
              YFQ-44A 双栈飞行演示——Hivemind 和 Lattice 均在同一机体上得到验证——证实了 A-GRA
              模块化架构允许共存，国防部追求的是最佳组合而非单一软件栈垄断。这种竞合模式使竞争格局更为复杂，但也验证了 Shield AI 的模块化授权逻辑。

              第二家 AI 优先同行是 Palantir Technologies（NYSE: PLTR），其 Gotham 平台是国防部情报社区主导的数据分析与打击 AI。Palantir 对 Shield AI
              的竞争威胁是间接的——Palantir 不制造自主飞行器或 GPS 拒止边缘代理——但在 Hivemind Commander 与国防部指挥控制框架交汇的指挥层面有所重叠。Palantir 2025 年营收约
              $28 亿（美国政府部门约 $11 亿），毛利率约 80%，自 2023 年起持续盈利。截至 2025 年末，Palantir 在五角大楼 AI 分析领域的垄断地位正在削弱：Shield AI、Anduril 和
              Applied Intuition 的竞争平台正在特定任务领域蚕食其市场，但 Palantir 在情报与打击工作流中仍具深度壁垒。
