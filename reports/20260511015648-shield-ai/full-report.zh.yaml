      - number: '8.4'
        title: 可比公司估值分析
        blocks:
          - type: paragraph
            body: >
              Shield AI 的可比集需横跨上市国防大型承包商、高增长国防软件公司及私营国防 AI 同类公司——因为没有任何一家上市公司能完整捕捉 Hivemind 将 AI
              软件授权与硬件集成结合起来的商业模式。分析共设五个参考锚点。

              Anduril Industries 是最接近的私营同类竞争对手：双方在 CCA 和自主系统上直接竞争，Anduril 同样向硬件加软件集成方向延伸，据报 2026 年初正目标以 600
              亿美元估值完成新一轮融资。Anduril 此前经 Acquinox 披露的 305 亿美元估值已隐含对收入的大幅溢价。若 Anduril 估值达到 600 亿美元，Shield AI 127
              亿美元的估值相对其最直接的战略竞争对手已形成明显折价，尽管两者增长轨迹相近。

              Palantir Technologies 是最主要的公开软件可比公司。2026 年初市值约 1,100 亿美元，对应约 38—50 倍过去十二个月营收，印证了国防 AI 软件公司在实现盈利后可维持极高倍数。但
              Palantir 已实现盈利且拥有多元化商业收入基础，Shield AI 两者均尚不具备。

              Kratos Defense & Security Solutions 是一家以硬件为主的无人机制造商，市值约 40 亿美元，对应 3—4 倍收入，揭示了硬件偏重国防业务所承受的倍数折价——这正是软件转型失败后
              Shield AI 的下行情景。

              L3Harris Technologies 是一家全规模国防大型承包商，市值约 200 亿美元，对应约 1 倍收入，代表高度商品化国防硬件业务的估值下限。

              Axon Enterprise 是一家拥有经常性软件收入的高增长政府技术公司，市值约 300 亿美元，对应约 15 倍收入，为政府市场中的软件属性公司提供了参考可比。

              上述可比集仅为示例；完整枚举还应包括 CACI International、Booz Allen Hamilton 及国防 AI 并购中的买入倍数。
