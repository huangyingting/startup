  - number: 7
    title: 风险
    sections:
      - number: '7.1'
        title: 风险严重程度概览
        blocks:
          - type: paragraph
            body: >
              Shield AI 的风险敞口涵盖六个主要维度。按已知缓释措施后的剩余严重程度排列：（1）财务/模型风险是最高剩余风险——127 亿美元 G
              轮估值隐含激进的软件转型假设，但这些假设尚未体现在已报告的收入构成中，且 2025 年收入落空（实际约 3 亿美元，指引 5 亿美元以上）已损害了近期增长的可信度。（2）X-BAT 运营/技术风险较高——截至
              2026 年 5 月该项目仍在首飞前阶段，涉及 Group-5 硬件复杂度，并存在 GE F110 单一来源推进系统依赖，尚无已公开披露的替代方案。（3）监管/法律风险为中高——ITAR/EAR
              管制对每一项盟国客户合同均产生重大出口许可义务，《国防部指令 3000.09》限制了 Hivemind 在进攻性致命任务中的运营范围。（4）合作伙伴/依赖风险为中等——AWS 云依赖用于 Hivemind
              Forge，国防部预算周期敞口是真实存在的风险，但合同 IDIQ 结构提供了部分缓释。（5）人才/执行风险为中等——对曾氏联合创始人的关键人物集中依赖，以及计划从 1,400 人扩张至 3,000
              人以上的人员规模增长，构成组织层面的脆弱性。（6）运营/安全风险为中低——V-BAT 或 Hivemind 均无已知公开的安全事件或可靠性故障，但缺乏公开认证披露限制了验证。投资含义：财务模型和 X-BAT
              风险是主要估值门槛因素；其余风险类别在正常国防项目执行假设下虽然重要但可管控。
