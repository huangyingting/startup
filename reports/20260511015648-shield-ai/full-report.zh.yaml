      - number: '1.3'
        title: 产品与技术组合
        blocks:
          - type: paragraph
            body: >
              Shield AI 的产品组合以 Hivemind Enterprise——核心 AI 自主能力软件平台——为核心，辅以一系列软硬件一体化产品，后者兼具营收来源和 Hivemind 能力展示载体的双重作用。

              Hivemind Enterprise 由四个模块组成：EdgeOS（自主执行运行时环境）、Pilot（自主能力目录与 AI 代理库）、Commander（多平台协同的指挥控制工具包）和
              Forge（训练与仿真的自主能力工厂）。四者共同构成 Shield AI 所称的"任务自主能力开发者平台"，使 OEM 厂商、国防主承包商和政府机构能够将自主行为集成到自身平台。Hivemind 已部署于逾 15
              个平台，包括 Avenger（MQ-20）、X-62A VISTA（改装型 F-16）、BQM-177A 靶机和 Kratos 的 MQM-178 Firejet。该平台自 2019
              年起经过实战验证，包括在乌克兰活跃战场环境中的部署。

              V-BAT 是 Shield AI 的旗舰 VTOL 战术无人机，于 2021 年 7 月通过收购 Martin UAV 获得，在德克萨斯州达拉斯生产。采用导管重型燃料发动机（JP5），续航时间最长 11
              小时，可携带 25 磅有效载荷，起降面积最小仅需 4.6 m × 4.6 m——包括在行进中的舰船甲板上。V-BAT
              已入选美国海岸警卫队海上无人机项目，被全部七支海军陆战队远征部队使用，并已向印度、乌克兰、荷兰和亚美尼亚等盟军出售。其 ViDAR（宽域运动成像）传感器系统源自 2024 年 4 月收购 Sentient
              Vision Systems，每小时覆盖面积达 3,140 平方海里——是最近竞争对手的 2.5 倍以上。

              X-BAT 于 2025 年 10 月发布，是全球首款 AI 驾驶的 VTOL 战斗机——重 23,000 磅，采用尾坐式设计，专为 GPS 拒止和通信拒止环境打造。X-BAT 代表 Shield AI
              进军协同作战飞机（CCA）领域，设计用于在单一操控员指挥下以自主蜂群模式飞行作战。

              2026 年 3 月，Shield AI 收购了 Aechelon Technology——一家为美军飞行员训练提供高保真军事仿真软件的公司，以加速 Hivemind 的训练与仿真能力。Booz Allen
              Hamilton 战略合作伙伴关系（2025 年 3 月宣布）借助 Booz Allen 的使命工程关系，将 Hivemind Enterprise 的触达范围扩展至更广泛的国防部企业。
