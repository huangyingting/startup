      - number: '7.5'
        title: 财务与模型风险
        blocks:
          - type: paragraph
            body: >
              Shield AI 在 2026 年 3 月完成 Series G 融资，估值 127 亿美元——这一估值水平对应的是软件公司倍数，但该公司目前收入主要来自国防硬件（V-BAT 销售）。AI Invest
              及其他分析机构指出，维持这一估值需要到 2028 年软件收入占比达到约 50%，而这一转型在已披露数据中尚无任何实质进展。管理层给出的 2025 年 5 亿美元以上营收指引据报未能达成，分析师估计实际 2025
              年营收约为 3 亿美元——前瞻指引与实际执行之间存在明显的可信度落差。Shield AI 尚未盈利，持续烧钱，正走向 IPO；Series G 所筹的 20 亿美元须同时支撑日常运营和 X-BAT
              研发所需的大额资本支出（估计须逾 10 亿美元才能投入量产）。客户集中风险进一步放大了财务模型的不确定性：一旦美国海岸警卫队合同暂停或 DoD A-GRA
              计划被重组，近期营收缺口可能加速烧钱，触发被动融资事件。公司未公开披露毛利率、EBITDA 或经营现金流数据；支撑当前估值所需的软硬件收入结构转型无法从公开数据中独立核实。IDIQ
              合同下的大额预付款、里程碑付款及营运资本需求带来执行层面的财务复杂性。基于公司国防行业运营背景及政府合同审计要求（DCAA），财务造假风险评估为低，但若无完整财务报表披露，则无法作出全面判断。
