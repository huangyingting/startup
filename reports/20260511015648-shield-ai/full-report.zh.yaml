    title: 投资正反逻辑
    slug: thesis-anti-thesis-table
    notes: 正向逻辑基于可公开观测的证据；反向逻辑引用反向分析师观点，主要来自 ainvest.com 和 acquinox.capital。未解决事项（如毛利率）已在证据缺口中标注。
    claimRefs:
      - CV011
      - CV012
      - CV013
      - CV014
      - CV015
    columns:
      - 类别
      - 正向逻辑（乐观）
      - 反向逻辑（悲观）
    rows:
      - - 市场
        - 国防 AI 预算预计从约 90 亿美元（2024 年）增至 400 亿美元以上（2032 年）；结构性顺风利好自主平台
        - 若近期在同等级冲突中 AI 自主系统的致命性指标未获验证，预算优先级可能从 AI 自主领域转移
      - - 产品 / 平台
        - Hivemind Enterprise 是覆盖 15 个以上部署系统的开发者平台，切换成本高；Aechelon 收购带来网络效应与仿真护城河
        - V-BAT 硬件收入仍占主导；软件授权模式尚未规模化验证；毛利率未披露
      - - 客户 / 营收
        - 美国空军 CCA 入选和海岸警卫队 V-BAT 合同构成耐久的长期营收支柱，有望多年续签
        - 国防部集中度高，单一客户风险突出；项目取消或缩减可能撤走主要营收支柱
      - - 财务
        - FY2024 营收同比增长 64% 至 2.67 亿美元；管理层指引 FY2026 达 5.4 亿美元以上；G 轮注入 20 亿美元新资本
        - 公司尚未实现 GAAP 盈利；研发与制造烧钱速度高；盈利路径依赖尚未验证的毛利率改善
      - - 竞争格局
        - CCA 项目击败 Anduril 和 General Atomics，印证 Hivemind 技术优势；Gary Steele 出任 CEO 释放 IPO 备战信号
        - Anduril 资本实力更强（目标估值约 600 亿美元），自主软件差距正在收窄；出口管制阻力压缩国际可触达市场
  - id: TV003
    title: 乐观 / 基准 / 悲观情景
    slug: bull-base-bear-scenario-table
    notes: 营收与估值数据均为推演性估算，来源于公开指引、可比倍数及分析师观点。概率为主观判断，非财务预测。前瞻营收倍数假设市场环境与 2026 年第一季度一致。
    claimRefs:
      - CV032
      - CV033
      - CV034
    columns:
      - 情景
      - 核心假设
      - FY2026E 营收
      - 隐含估值
      - 营收倍数
      - 概率
    rows:
      - - 乐观
        - CCA 快速规模化；Hivemind 国际扩张；软件收入占比超 55%；毛利率超 60%；以溢价 IPO 或被收购
        - $700M+
        - $24–35B
        - 34–50x FY2026E
        - ~20%
      - - 基准
        - 管理层指引兑现（5.4 亿美元以上）；软件占比提升；2026–2027 年窗口期以 26–33 倍 FY2026E 倍数 IPO 或并购
        - $540M+
        - $14–18B
        - 26–33x FY2026E
        - ~55%
      - - 悲观
        - 增长减速（同比 < 30%）；软件化转型停滞；估值倍数压缩；CCA 缩减或被竞争对手替代
        - <$400M
        - $5–8B
        - 12–20x FY2026E
        - ~25%
  - id: TV004
    title: 可比估值对照表
    slug: comparable-valuation-table
    notes: >-
      营收与估值数据均为近似值，来源于 2026 年第一季度的公开文件、分析师估算及新闻报道。私有公司数据（Anduril）来自二级来源估算。EV/Rev 倍数为推演性参考；Palantir 10-K
      年度报告作为公开市场防务软件先例。标注"~"的单元格为估算值。
    claimRefs:
      - CV016
      - CV018
      - CV019
      - CV020
      - CV024
    enumerationScope:
      coverage: sample
      basis: >-
        Selected public and private US defense-technology and defense-AI comparables as of Q1 2026, covering
        hardware-software integration and pure-software revenue models across NYSE/NASDAQ-listed and pre-IPO companies
    columns:
      - 公司
      - 阶段
      - FY2024 约收
      - 约估值
      - EV / 营收
      - 对 Shield AI 的主要参照意义
    rows:
      - - Anduril Industries
        - 私有公司（上市前）
        - ~$1.0B（估）
        - ~$60B（目标）
        - ~60x
        - 最直接的自主系统同行；CCA 竞争对手；硬件整合程度更高
      - - Palantir Technologies (PLTR)
        - 上市公司（纽交所）
        - ~$2.9B
        - ~$110B 市值
        - ~38–50x TTM
        - 防务 AI 软件先例；验证政府 AI 盈利后的高倍数估值
      - - Kratos Defense & Security (KTOS)
        - 上市公司（纳斯达克）
        - ~$1.1B
        - ~$4B 市值
        - ~3–4x
        - 以硬件为主的无人机可比标的；软件化转型失败时的悲观情景参照
      - - L3Harris Technologies (LHX)
        - 上市公司（纽交所）
        - ~$21B
        - ~$20B 市值
        - ~1x
        - 大型国防主承包商；商品化硬件营收模式的估值底部基准
      - - Axon Enterprise（AXON，上市可比公司）
        - 上市公司（纳斯达克）
        - ~$2.0B
        - ~$30B 市值
        - ~15x
        - 高增长政府科技可比标的；验证政府市场经常性软件收入的估值溢价
  - id: TV005
    title: 逻辑破坏与终止触发点
    slug: thesis-break-and-kill-triggers-table
    notes: 触发点定义为可观测事件或指标，一旦确认，需启动全面重新评估或退出持仓。严重程度：严重 = 立即考虑退出；高 = 减仓；中 = 加强监测。
    claimRefs:
      - CV036
      - CV037
    columns:
      - 触发点
      - 可观测阈值
      - 建议行动
      - 严重程度
    rows:
      - - CCA 项目失标或缩减
        - Shield AI 被移出 CCA 任务自主提供商，或项目平台数量缩减超 50%
        - 退出或全面重新评估；CCA 是核心长期营收支柱
        - 严重
      - - 营收增速下滑
        - FY2026 营收低于 4.5 亿美元（低于指引超 17%），或同比增速跌破 25%
        - 减仓 50%；重新评估 IPO 时间表与基准估值
        - 高
      - - 软件毛利率停滞
        - 任何 S-1 招股说明书或投资者披露确认 FY2026 软件部门毛利率低于 40%
        - 退出：硬软件组合不支持溢价估值；将标的重新归入硬件同行可比
        - 严重
      - - CEO 离职
        - Gary Steele 在任职 18 个月内离职（2027 年 5 月前）
        - 暂停新增投资；重新评估战略方向与 IPO 时间表
        - 高
      - - 出口管制执法
        - 针对 Hivemind 国际部署的 ITAR / EAR 执法行动或禁令
        - 重新评估总可用市场（TAM）；乐观和基准情景均预设了国际收入
        - 高
  - id: TV006
    title: 最终尽调要求清单
    slug: final-diligence-asks-table
    notes: 以下为最终确认投资承诺前所需的最低限度非公开数据。多数条目为上市前后期尽调的标准要求，但鉴于毛利率与股权结构均未披露，其重要性尤为突出。
    claimRefs:
      - CV038
      - CV039
    columns:
      - 尽调事项
      - 理由
      - 主要信息来源
    rows:
      - - 各营收板块毛利率（软件 vs. 硬件 vs. 服务）
        - 投资逻辑依赖软件化转型；未披露毛利率是承保不确定性中最大的一块
        - 经审计财务报告或管理层数据室
      - - 股权结构表与优先股堆叠分析
        - G 轮融资含股权与债务；优先股的清算优先权和反稀释条款影响普通股价值
        - 公司提供的股权结构表、股份购买协议（SPA）及公司章程
      - - 软件年经常性收入（ARR）与净收入留存率（NRR）
        - ARR 和 NRR 是软件平台估值的核心指标；缺失这两项数据，无法与 SaaS 同行进行比较
        - 内部 BI 或投资者报告包
      - - 按客户和项目划分的管线与积压订单
        - 国防部客户集中度风险要求细化至项目层级的积压分析，以压力测试悲观情景
        - 业务拓展管线报告或 CRM 数据提取
      - - ITAR / EAR 出口管制合规状态
        - Hivemind 已部署于乌克兰及其他冲突地区；出口管制违规可能导致执法行动或国际收入受限
        - 法律顾问备忘录及监管文件（SAM.gov、DDTC 记录）
