  - id: TM004
    title: 增长驱动因素与制约因素表
    columns:
      - 因素
      - 类型
      - 程度
      - 机制
      - 对 Shield AI 的影响
    rows:
      - - FY2026 美国国防部 $13.4B 自主性预算专项
        - 驱动因素
        - 高
        - 首个专项自主性预算，支持多年期采购规划
        - 直接影响：所有产品线受益；$1.2B 软件专项可直接寻址
      - - 乌克兰战争无人机战术理论
        - 驱动因素
        - 高
        - 可消耗自主 UAS 的实战概念验证；触发陆军 Transformation in Contact 项目
        - 间接影响：V-BAT 已在乌克兰部署；推动美军对类似系统的紧迫需求
      - - CCA A-GRA 开放架构
        - 驱动因素
        - 高
        - 平台无关的 A-GRA 标准支持 Hivemind 跨多个厂商授权
        - 直接影响：2026 年 2 月 Hivemind 获选 YFQ-44A；经常性软件授权模式
      - - 全球国防开支扩张（2024 年全球 $2.7T）
        - 驱动因素
        - 中
        - 盟国预算增长推动 FMS 需求；亚太地区连续 35 年增长
        - 间接影响：Hanwha（韩国）、印度、阿联酋渠道扩张；V-BAT 出口增长
      - - 软件优先、平台无关架构
        - 驱动因素
        - 中
        - 类似 SaaS 与本地部署的转型；降低每个平台的集成成本
        - 直接影响：Hivemind 的竞争护城河随每次平台集成不断扩大
      - - 国防创新单位（DIU）扩张（$2B 预算）
        - 驱动因素
        - 中
        - DIU 为非传统供应商快速推进 OTA 合同；Shield AI 属于 DIU 合作型供应商
        - 间接影响：加快从演示到合同的时间；降低采购摩擦
      - - 美国国防部预算不确定性 / DOGE 压力
        - 制约因素
        - 高
        - 项目取消、削减开支及预算协调不确定性带来收入时序风险
        - 实质影响：部分在途项目面临取消风险；V-BAT 项目可能受波及
      - - 美国国防部采购周期漫长
        - 制约因素
        - 中
        - 即便有 OTA，FRP 决策仍需 3–7 年；FRP 前收入可见度有限
        - 实质影响：CCA 尚未达到 FRP 阶段；V-BAT FRP 决策悬而未决
      - - 出口管制 / ITAR 限制
        - 制约因素
        - 中
        - ITAR/EAR 限制在无国务院许可证情况下向盟友出口自主武器
        - 中等影响：减缓盟国拓展；韩国/印度 FMS 需逐案审批许可
      - - 自主武器监管悬而未决
        - 制约因素
        - 低至中
        - 人权观察（HRW）、国际红十字委员会（ICRC）、条约谈判风险；美国国防部 3000.09 号指令要求"适当审慎"
        - 近期低风险：美国国防部尚未限制开发；中期存在声誉风险
      - - 分析师估算分歧（总可用市场（TAM）7 倍区间）
        - 风险信号
        - 低（尽调层面）
        - TAM 估算 8 倍区间意味着定义不确定性；预测可能与实际存在较大偏差
        - 信息性：投资逻辑的市场规模测算须考虑较大的不确定区间
    notes: >-
      增长驱动因素数据来源：FY2026 美国国防部预算（defensescoop.com）、startus-insights.com 2026 年无人机报告、 fortunebusinessinsights.com
      自主防务平台报告及 insideunmannedsystems.com 2026 年采购报告。 制约因素数据来源：人权观察（HRW）、360iresearch.com 及美国国防部 3000.09 号指令相关参考资料。
    claimRefs:
      - CM009
      - CM010
      - CM011
      - CM012
      - CM013
