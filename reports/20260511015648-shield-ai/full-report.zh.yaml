      - number: '5.3'
        title: 硬件产品与路线图
        blocks:
          - type: paragraph
            body: >
              V-BAT（MQ-35A）是 Group-3 垂直起降无人机，采用涵道风扇设计，Block Upgrade 配置搭载重油发动机，续航超 13 小时。Block Upgrade 通过新闻稿发布，新增
              Hivemind 增强自主能力、SATCOM 连接和重油发动机作为渐进式能力包。均价约 100 万美元的 V-BAT 以低成本持久 ISR 和协同作战平台定位参与竞争。X-BAT 于 2025 年 10 月 21
              日发布，是 Shield AI 首款 Group-5 平台：一款翼展 26 英尺（展开后达 39 英尺）、实用升限超过 50,000 英尺、航程超过 2,000 海里的超音速 AI 驾驶 VTOL
              战斗机。其动力来自 GE F110-GE-129 发动机，配有轴对称矢量排气喷管（AVEN），实现推力矢量超音速 VTOL 操作。Shield AI 与 GE Aerospace 于 2025 年 10
              月签署推进系统合作协议，目标是在目标单机成本约 2700 万美元的基础上，推动 X-BAT 在 2026 年秋季完成首飞。2026 年 3 月收购 Aechelon
              为产品矩阵增加了合成环境与仿真能力，可在逼真虚拟环境中完成部署前训练——对于压缩 X-BAT 测试周期、降低实飞测试成本至关重要。Shield AI 的产品路线图由此从近期 V-BAT 机群扩张，延伸至中期
              X-BAT 首飞，并最终指向量产级自主战斗机平台。
