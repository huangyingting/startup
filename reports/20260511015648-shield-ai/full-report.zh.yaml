      - number: '6.2'
        title: 部署采纳轨迹
        blocks:
          - type: paragraph
            body: >
              Shield AI 的增长指标表明其在各客户细分中的采纳呈现快速加速态势。2024 财年收入达 2.67 亿美元，较 2023 财年估算的约 1.63 亿美元增长 64%。管理层已指引 2026 年收入增长约
              80%，隐含前瞻收入运行率接近 4.8 亿美元。V-BAT 部署已从少量试点项目扩展至 10 个以上国家的实战部署。MQ-35A 美国海军型号命名一旦转化为正式量产项目，将意味着 V-BAT
