  - number: 8
    title: 估值
    sections:
      - number: '8.1'
        title: 投资逻辑与反向论点
        blocks:
          - type: paragraph
            body: >
              Shield AI 的投资逻辑建立在五大支柱之上。其一，美国及盟友国防市场对自主 AI 的需求正处于结构性转变的初期，国防 AI 预算预计从 2024 年约 90 亿美元增至 2032 年逾 400
              亿美元。Shield AI 占据平台层——Hivemind Enterprise 定位为军事自主系统的开发者操作系统，而非单点解决方案，一旦大规模部署至各类飞行器和无人机机队，将形成持久的切换成本。其二，2026
              年 2 月美国空军在协同作战飞机（CCA）项目中选择 Shield AI 担任任务自主供应商，将 Hivemind 在最高采购层级获得验证，并为超过 200 架飞机的潜在项目锁定了长期收入基础。其三，Gary
              Steele 于 2025 年 5 月出任 CEO，大幅提升了管理层厚度；其过往履历（Proofpoint IPO、Splunk 以 280 亿美元被收购）与推动 Shield AI 走向 IPO
              或战略并购的路径高度契合。其四，2026 年 3 月收购 Aechelon Technology 拓展了 Hivemind 在训练与仿真方面的优势，有望加速软件收入占比的提升。其五，公司累计融资 35.2
              亿美元，在不触发近期稀释性融资压力的前提下为持续研发投入提供了充足空间。

              反向逻辑同样有力。Shield AI 尚未实现 GAAP 盈利，研发和制造端烧钱持续；自由现金流转正依赖于一场迄今尚未在规模层面得到验证的软件转型。ainvest.com 的分析明确指出，127
              亿美元估值依赖一场从硬件主导的 V-BAT 收入转向软件优先的高风险变革，分部毛利率至今未公开披露。公司在客户结构上高度依赖美国 DoD 及盟友军方，一旦预算重组或项目取消，将面临单一品类集中风险。管理 AI
              自主软件出口的法规正在演变，可能制约国际关键市场的销售空间。
