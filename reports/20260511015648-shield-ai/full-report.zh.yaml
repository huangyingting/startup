      - number: '4.4'
        title: 资本结构与财务状况
        blocks:
          - type: paragraph
            body: >
              截至 2026 年 4 月，Shield AI 自 2015 年成立以来已累计完成 17 轮以上融资，合计约 36 亿美元。2026 年 3 月的融资事件是公司史上规模最大的一次，分为三个部分：15 亿美元 G
              轮股权（由 Advent International 领投，JPMorganChase Strategic Investment Group 联合领投，Snowpoint
              Ventures、InnovationX、Riot Ventures、Disruptive 和 Apandion 参与投资）；Blackstone 旗下基金提供的 5 亿美元固定回报优先股；以及 2.5
              亿美元延迟提款信贷额度（同样来自 Blackstone，供未来使用）。本轮融资后投后估值为 127 亿美元，较一年前确立的 53 亿美元估值上升 140%。

              Blackstone 优先股结构在经济上更接近准债务：Blackstone 获得固定票息，且优先股在结构上优先于普通股。加上 2.5 亿美元延迟提款额度，Blackstone 总敞口最高达 7.5
              亿美元。这一结构使 Shield AI 能在股权稀释幅度不成比例的情况下获取大量资本，同时为后续收购保留灵活性。管理层表示，资金的主要用途为收购 Aechelon、持续推进 Hivemind 开发、V-BAT 和
              X-BAT 规模化生产，以及国际市场拓展。

              烧钱速度和现金状况未公开披露。然而，在累计融资 36 亿美元、2026 年收入运行率接近 5.4 亿美元的背景下，公司似乎拥有足够的现金跑道，可实现或超越管理层为 2028 财年设定的 10
              亿美元收入里程碑。该里程碑是否与 IPO 筹备同步推进，以及市场将对盈利水平提出何种要求，仍是核心财务尽调问题。

              公司未能实现 2025 年收入指引（目标 4 亿美元，实际约 3 亿美元），差距约 1 亿美元，接近 25%。这是首次公开记录的指引落空，令外界对 5.4 亿美元以上 2026
              年预测的可靠性产生疑虑。多位分析师指出，在 127 亿美元估值下，Shield AI 对应预计 2026 年收入约 27—28 倍，该倍数预设了激进的执行力以及 Hivemind
              高毛利软件成功转型为主要收入驱动力。
