      - number: '4.5'
        title: 财务信息缺口与尽调障碍
        blocks:
          - type: paragraph
            body: >
              Shield AI
              是一家私有公司，没有披露财务报表的义务，且对于这一规模的企业而言，其财务披露控制异常严格。这在核实完整投资逻辑所需的每一项关键指标上，都构成重大尽调障碍。最关键的缺口在于没有任何已披露的毛利率——无论是综合毛利率还是分部毛利率。缺乏毛利率数据，根本无从评估硬件—软件混合业务的真实经济性，也无法验证
              Hivemind 毛利率提升的逻辑。

              其他未披露指标还包括：按职能划分的运营支出（研发、销售及营销、管理费用，超出已知 22% 研发比例之外的部分）、EBITDA 或调整后
              EBITDA、净利润或净亏损、现金及等价物，以及烧钱速度。收入确认政策——尤其是 COCO 安排和多年期 IDIQ 合同的确认政策——未公开记录，可能产生影响期间业绩的收入确认时间差异。

              公司披露了 2024 年 2.67 亿美元的收入，但未提供地区细分、分部毛利率或积压订单数据。1.98 亿美元的海岸警卫队 IDIQ
              及其他已命名合同只是实际订单的一部分；完整的积压订单数字将大幅提升核实信心。单位经济指标——具体包括 V-BAT 每飞行小时成本、Hivemind 授权毛利率和获客成本——在公开披露中完全缺失。

              对于一家估值 127 亿美元、预计 2026 年收入 5.4 亿美元的企业，Shield AI
              财务信息的不透明程度异常之高。参与尽调的投资者需要获取经审计的财务报表、股权结构表明细（包括期权池规模、优先股清算优先权及 Blackstone
              优先股条款）、按项目划分的详细积压订单，以及分产品线的营业成本，才能据此建立具有可信度的估值模型。
            claimRefs:
              - CI026
              - CI027
              - CI028
              - CI029
              - CI030
