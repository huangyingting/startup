            body: >
              2026 年 3 月合计 20 亿美元的融资——涵盖 G 轮股权、Blackstone 优先股和延迟提款额度——为 Shield AI 提供了充足资本，用于完成 Aechelon 收购并扩大 Hivemind
              规模。Blackstone 优先股结构相较纯股权融资减少了稀释压力。按预计 5.4 亿美元以上的 2026 年收入计算，公司资本状况充分，无需短期内再次股权融资即可冲击 10 亿美元收入里程碑。
