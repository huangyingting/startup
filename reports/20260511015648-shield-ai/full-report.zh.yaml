      - number: '6.4'
        title: 客户留存与黏性
        blocks:
          - type: paragraph
            body: >
              Shield AI 在已确认的美国国防部客户中留存信号强劲，但受限于有限的公开数据，难以进行完整的量化评估。美国海岸警卫队关系是最直观的指标：1.98 亿美元 IDIQ
              代表了从早期采购接触逐步深化的过程，表明海岸警卫队评估了 V-BAT，认为其在运营上令人满意，并在多年窗口内承诺了全量产量。截至 2026 年 5
