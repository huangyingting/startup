      - number: '3.2'
        title: 传统主承包商与平台集成商
        blocks:
          - type: paragraph
            body: >
              第二竞争梯队由传统国防主承包商和专业无人系统公司组成，它们正在构建或收购自主能力，以与 Shield AI 和 Anduril 展开竞争。这些参与者拥有制造规模、ITAR
              合规供应链和数十年积累的国防部关系资本，但受制于成本加成合同结构，限制了研发投入强度，拖慢了软件迭代周期。

              Kratos Defense & Security Solutions 是可抛弃式飞机领域与 Shield AI 最为相近的竞争对手。其 XQ-58A Valkyrie——一款最初在 AFRL 的 LCAAT
              项目下研发的低成本喷气动力可抛弃式自主飞机——2026 年 1 月通过 $2.315 亿合同入选美国海军陆战队 MUX TACAIR 项目，由 Northrop Grumman 牵头的团队承接，Kratos
              提供飞行平台，Northrop 集成任务套件和 Prism 自主能力软件栈。关键在于，Prism 是 Northrop 自研的自主能力层——既非 Hivemind 也非 Lattice——由此形成第三款争夺
              CCA 自主能力层市场的软件栈。Kratos 2025 年战术系统及卫星通信年营收约 $10 亿。其单位经济与 Shield AI 结构性不同：Valkyrie 作为可抛弃（一次性）资产设计，估计单价
              $200—300 万，而 Shield AI 的 V-BAT（$1M 以上）具备回收和重复使用能力。

              General Atomics Aeronautical Systems（GA-ASI）是美国第五组（大型）军事无人机的主导制造商，主力产品为 MQ-9 "死神"（2023—2025 年起逐步在 USAF
              退役）及其后继项目。GA-ASI 参与竞争空军 CCA 增量 1 项目未能胜出。其 Avenger 是一款更大、隐身性更强的喷气式无人机，用于情报侦察与打击任务。GA-ASI 是私人公司（General
              Atomics 旗下），估计年营收约 $30 亿以上，从根本上是一家以硬件为中心的组织。GA-ASI 正在其平台上集成更多机载自主能力，但其自主能力软件是自研专有的，而非平台无关。GA-ASI 和 Kratos
              共同代表了与 Shield AI"软件优先"模式相对的"硬件优先"竞争原型。

              Boeing Defense（MQ-25 Stingray 自主加油机、在澳大利亚的 MQ-28A Ghost Bat）、L3Harris（战术电子战和情报侦察系统、自主僚机项目）和 Northrop
              Grumman（RQ-4 "全球鹰"、X-47B 技术传承、B-21 突袭者集成）构成了主承包商集成商梯队。Boeing 于 2025 年 9 月与 Palantir 建立合作，在其国防和保密项目中加速 AI
              应用，将 Palantir 数据分析内嵌于 Boeing 的主承包商集成角色。L3Harris 2024 年以约 $8 亿将其 WESCAM 机载情报侦察业务出售给 Anduril，这是 Anduril
              获取硬件制造能力的战略举措，也印证了 AI 优先公司与传统主承包商之间的边界正通过并购日趋模糊。
