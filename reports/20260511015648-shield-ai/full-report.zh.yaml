            body: >-
              Anduril 2025 年收入约 21 亿美元，而 Shield AI 预计 2026 年收入约 5.4 亿美元；加上高达 200 亿美元的陆军合同天花板，Anduril
              在自主研发、制造及国防部关系建设上的可投入资本远超 Shield AI。即便 Anduril 仅将陆军合同收入的 10% 转投自主软件开发，也足以在 24—36 个月内打造出可与 Hivemind
              匹敌的边缘自主技术栈。Shield AI 凭借 G 轮融资跑道和约 5.4 亿美元的收入基础，必须保持积极增长，否则在研发投入上将被最直接的竞争对手甩开。
