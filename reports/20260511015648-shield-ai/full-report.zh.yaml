      - number: '5.2'
        title: Hivemind 平台与 EdgeOS 架构
        blocks:
          - type: paragraph
            body: >
              Hivemind Enterprise 在共享运行时层之上组织为四个功能模块。EdgeOS 是实时操作基底：采用静态 JSON 配置管理（规避 ROS 依赖），共享内存进程间通信每秒可处理数百万条消息且延迟低于
              1 毫秒，插件 SDK 支持跨异构载具类型的平台无关部署。这一运行时架构允许通过编写硬件抽象插件完成新平台接入，而无需修改任务逻辑。Hivemind Pilot
              通过同步定位与建图（SLAM）、视觉里程计和光电/红外传感器融合，在 GPS 拒止环境中实现自主飞行与导航——无需 GNSS 依赖。Hivemind Commander
              将单机自主扩展至多智能体集群协同，支持在复杂任务中同时调度多个自主平台。Hivemind Forge 提供机器学习开发流水线：运营商和工程师在云端环境（与 AWS 合作，基于 ECR
              的容器分发）中训练、评估并打包任务 AI 模型，再将其部署至边缘载具。公司的国防基础模型以国防任务数据而非通用互联网语料为训练基础，Shield AI
              认为这对于在对抗环境中实现可靠性是必要的，通用大语言模型无法满足该要求。AWS 联合开发关系支持云端到边缘的工作流：在 Forge 中开发的模型经容器化后通过 ECR
              推送至载具机群，支持大规模机群自主管理。与实际客户验证的集成时间线——MQ-20 Avenger 不到 12 周、ROMULUS 无人水面舰艇 6 周——是平台集成便捷性主张的主要佐证。
            claimRefs:
