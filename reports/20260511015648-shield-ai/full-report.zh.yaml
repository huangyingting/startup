      - number: '4.3'
        title: 成本结构与单位经济模型
        blocks:
          - type: paragraph
            body: >
              Shield AI 的成本结构同时承载硬件制造商与软件研发公司的双重负担。V-BAT 硬件成本涵盖机身制造、推进系统、传感器载荷及供应链物流——同类平台国防硬件毛利率通常在 20%—35% 之间。Hivemind
              软件毛利率据行业自主系统软件基准估计超过 60%，但 Shield AI 未披露分部毛利率。

              2024 财年研发支出约占收入 22%，体现了公司对 Hivemind 国防基础模型及 X-BAT 研发项目的大力投入。这一研发强度与 IPO
              前夕寻求建立平台主导地位的国防科技公司一致，但随着规模扩大，该比例需压缩以实现可接受的盈利水平。

              2026 年 3 月宣布的收购 Aechelon Technology——与 G 轮融资同步披露——以未披露价格引入了仿真和合成环境能力。Aechelon
              的技术为美国空军联合仿真环境（JSE）提供支持，对于用合成数据训练 Hivemind 基础模型至关重要。此次收购带来额外人员与整合成本，将在 2026—2027 年形成短期利润压力，协同效应需待此后才能显现。

              营运资本动态对 Shield AI 略为有利：政府合同通常提供里程碑付款，相比商业 SaaS 可缩短现金转换周期。但 V-BAT 的 COCO 部署模式需要将资本锁定于已部署平台。资本支出数据尚未公开。截至
              2026 年初，Shield AI 员工约 1,422 人，按 2025 年收入水平估算人均收入约 18.8 万美元——低于纯软件公司基准，但与这一规模的软硬件混合型企业相符。
