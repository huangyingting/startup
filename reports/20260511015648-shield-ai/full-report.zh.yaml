    title: 公司概况
    sections:
      - number: '1.1'
        title: 公司定位与使命
        blocks:
          - type: paragraph
            body: >
              Shield AI 总部位于加利福尼亚州圣地亚哥，是一家深度科技国防公司，使命是以智能自主系统保护服役人员和平民。公司由 Brandon Tseng（前美国海豹突击队员）、其兄弟 Ryan
              Tseng（工程师兼企业家）和 AI 技术专家 Andrew Reiter 于 2015 年创立，创立契机源自 Brandon Tseng 在阿富汗作战期间亲眼目睹的战场漏洞——AI
              飞行员这一概念由此诞生：能够在 GPS 拒止和通信拒止环境下无需人工操控自主执行任务的软件，可在人类控制受限或反应过慢时挽救生命。

              Shield AI 将自身定位不仅是无人机制造商，更是美国国防部及盟军的"自主能力基础设施"运营商。旗舰软件平台 Hivemind Enterprise
              让开发者和国防机构能够规模化构建、测试和部署自主任务能力。公司同时制造战术飞机，主要包括 V-BAT VTOL 无人机和新推出的 X-BAT VTOL 打击战斗机，两款产品均以 Hivemind 作为 AI
              飞行引擎。Shield AI 目前处于后期私募阶段（G 轮），在圣地亚哥、达拉斯、华盛顿特区、阿布扎比（阿联酋）、基辅（乌克兰）和墨尔本（澳大利亚）设有办公室，反映出其支持美国及盟军现役军事行动的全球化布局。

              公司商业模式横跨软件授权（Hivemind Enterprise 部署于第三方平台）、软硬件一体化产品（V-BAT、X-BAT）和政府服务三个层面。Shield AI 将 Hivemind
              定位为军事自主能力的"操作系统"——类似 GPS 曾为导航构建的那道持久软件护城河。创始团队始终聚焦使命；Ryan Tseng
              曾亲口讲述一个关键早期故事：一位湾区投资人要求公司转向商业市场，他宁可放弃该轮融资也不妥协于国防优先的创业使命。
