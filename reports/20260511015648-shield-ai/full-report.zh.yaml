              - CM010
          - type: callout
            title: 7 倍分析师估值区间揭示 TAM 高度不确定
            body: >-
              2026 年军事 AI/无人机市场估算区间从 $93 亿（仅 AI 软件）至 $698 亿（所有自主国防平台）。7 倍的差距并非研究质量低劣的体现——它反映的是"自主国防平台"定义的真实模糊性。依赖 TAM
              倍数估值框架的投资者，在对 Shield AI $12.7B 估值进行压力测试时，应锚定于最窄口径（$93 亿 AI 软件）和中间区间（$200 亿军事无人机）数字。
