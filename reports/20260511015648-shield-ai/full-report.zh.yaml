            body: >
              Shield AI 的 2025 年收入目标约落空 1 亿美元（缺口约 25%），实际收入 3 亿美元，低于内部目标 4 亿美元。这次指引落空发生在国防 AI 宏观环境有利的背景下，令市场对 5.4 亿美元以上
              2026 年预测的公信力产生质疑。以 127 亿美元估值投资的机构必须考量连续两年指引落空的可能性。
            calloutType: insight
            claimRefs:
