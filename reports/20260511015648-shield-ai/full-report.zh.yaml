            title: 估值倍数隐含激进执行假设
            body: >
              在预计收入 5.4 亿美元的基础上，127 亿美元的估值对应约 23 倍前瞻收入——该倍数预设了 80%
              以上的增长持续、硬件到软件混合比例的成功切换，以及规模化后持续的高毛利率。持怀疑态度的分析师指出，若要支撑潜在 240 亿美元的 IPO 估值，则需要实现 8.57 亿美元以上的收入并维持 25%—40% 的
              EBITDA 利润率，意味着多项战略押注必须同步兑现。
