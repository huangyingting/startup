          - type: callout
            title: 预算波动与采购周期风险
            body: >-
              Shield AI 营收在相当程度上依赖于国防部项目的持续推进。特朗普政府 2026 财年预算进程取消了多个长期无人机项目，DOGE 式节省压力带来实质性风险——Shield AI 的项目可能被暂停或重组。OTA
              和 DIU 快速推进机制能够降低但无法消除这一风险。
