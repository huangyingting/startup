  - id: FR001
    title: 风险热图
    type: matrix
    description: |
      风险热图，对 Shield AI 八大主要风险类别按可能性（低/中/高）与影响严重程度进行映射。矩阵单元格数值描述已知缓解措施后的残余风险敞口。行按残余影响严重程度由高到低排列。
    claimRefs:
      - CR001
      - CR008
      - CR010
      - CR011
      - CR014
      - CR016
      - CR024
      - CR033
    data:
      columns:
        - 低
        - 中
        - 高
      rows:
        - label: 财务/模型风险（软件转型）
          values:
            - label: 不适用 — 可能性评估为中高
            - label: 若营收结构未能向软件转型，估值将承压；2025 年未达预期造成公信力缺口
            - label: 若 2026 年收入再次未达预期，IPO 将延迟或出现估值倒退；投资逻辑随之瓦解
        - label: X-BAT 进度 / 技术风险
          values:
            - label: 不适用 — 可能性评估为中
            - label: 首飞推迟压缩生产时间表；对 GE 的依赖进一步放大风险
            - label: X-BAT 项目取消或多年延期将消除关键增长引擎
        - label: ITAR / 出口管制风险
          values:
            - label: 合规状态完备，无任何执法行动
            - label: 许可证积压拖慢盟友客户拓展
            - label: DDTC 禁令阻断所有盟友销售及国际收入
        - label: DoDD 3000.09 / 自主作战政策
          values:
            - label: 现行政策已在 Hivemind 架构中得到适配
            - label: 政策收紧限制 Hivemind 进攻性任务范围
            - label: 新条约或立法禁止自主交战 — Hivemind 总可用市场（TAM）结构性收窄
        - label: 收入集中度 / 国防部预算
          values:
            - label: 不适用 — 美国海岸警卫队 IDIQ 为多年合同，持续拨款决议（CR）不太可能取消在产项目
            - label: 持续拨款决议（CR）或自动减支延迟任务订单下达；对短期收入产生影响
            - label: 美国海岸警卫队 IDIQ 被取消或重组；国防部预算自动减支超过 6 个月
        - label: GE Aerospace 单一供应源依赖
          values:
            - label: GE 按时交付；X-BAT 项目顺利推进
            - label: GE 交付延迟导致 X-BAT 首飞推迟 3 至 6 个月
            - label: GE 供应失败致使 X-BAT 项目停摆，且无替代来源可用
        - label: 关键人物 / 联合创始人离职
          values:
            - label: 不适用 — 联合创始人在 G 轮融资后仍积极参与公司运营
            - label: 一位联合创始人离职；其余领导层予以弥补
            - label: 两位联合创始人同时离职；战略愿景与政府关系面临风险
        - label: 网络安全 / 软件认证
          values:
            - label: 无已知安全事件；公开披露有限
            - label: 采购过程中发现认证缺口；延迟进入敏感项目
            - label: Hivemind/EdgeOS 安全漏洞在实战环境中遭到利用
  - id: FR002
    title: 风险传导图
    type: dag
    description: >
      有向无环图，展示 Shield AI 主要风险如何逐级传导至下游运营、财务及战略层面的影响。边代表风险事件之间的因果路径。该图揭示了 X-BAT 进度延误、ITAR 合规及收入未达预期等风险如何汇聚于共同的估值压缩与 IPO
      风险节点。
    claimRefs:
      - CR007
      - CR008
      - CR011
      - CR015
      - CR025
      - CR038
      - CR040
    data:
      nodes:
        - id: xbat_slip
          label: X-BAT 首飞推迟
        - id: ge_failure
          label: GE 单一供应源失败
        - id: revenue_miss
          label: 收入未达预期（2025/2026）
        - id: itar_violation
          label: ITAR 违规 / 执法
        - id: dod_budget_cr
          label: 国防部预算持续拨款决议（CR）/ 自动减支
        - id: policy_change
          label: DoDD 3000.09 政策收紧
        - id: valuation_compression
          label: 估值压缩
        - id: ipo_risk
          label: IPO 延迟或估值倒退
        - id: allied_revenue_loss
          label: 盟友客户收入损失
        - id: hivemind_scope_restriction
          label: Hivemind 进攻范围受限
        - id: cash_burn
          label: 现金消耗加速
        - id: keymen_departure
          label: 联合创始人离职
      edges:
        - from: ge_failure
          to: xbat_slip
          label: 推进系统延迟
        - from: xbat_slip
          to: revenue_miss
          label: 增长项目缺失
        - from: revenue_miss
          to: valuation_compression
          label: 增长叙事失效
        - from: valuation_compression
          to: ipo_risk
          label: 市场时机风险
        - from: itar_violation
          to: allied_revenue_loss
          label: 出口许可证被拒
        - from: allied_revenue_loss
          to: revenue_miss
          label: 国际收入下滑
        - from: policy_change
          to: hivemind_scope_restriction
          label: 作战包线收窄
        - from: hivemind_scope_restriction
          to: valuation_compression
          label: 总可用市场（TAM）收缩
        - from: dod_budget_cr
          to: revenue_miss
          label: 任务订单延迟
        - from: revenue_miss
          to: cash_burn
          label: 资金跑道缩短
        - from: cash_burn
          to: ipo_risk
          label: 被迫融资事件
        - from: keymen_departure
          to: valuation_compression
          label: 战略公信力受损
