            body: >-
              X-BAT 是全球首款超音速 VTOL 自主战斗机，首飞目标定于 2026 年秋季。以 2700 万美元目标单机成本开发、认证并量产 Group-5
              平台，涉及重大工程、供应链和监管风险。国防硬件项目的历史经验表明，进度延误和成本超支应在预期之内。
            calloutType: insight
