  - id: partner-dependency-risk
    title: "Partner / Dependency Risk"
    body: >
      Shield AI's operational and product continuity is dependent on a small number of critical
      external partners and structural dependencies. The GE Aerospace F110 engine is the primary
      propulsion source for X-BAT and represents a single-supplier risk: if GE Aerospace were unable
      to deliver engines on schedule, the X-BAT program timeline would slip without a ready alternative.
      GE and Shield AI have publicly announced a propulsion collaboration for the X-BAT program, but
      no binding supply agreement terms or contingency sourcing plan have been disclosed. AWS cloud
      services appear to underpin the Hivemind Forge development environment; disruption to or cost
      increases in AWS access could affect Shield AI's software development pipeline, though this risk
      is partially mitigated by AWS's reliability track record. DoD budget cycle dependency is a
      structural risk: the bulk of Shield AI's revenue derives from US government customers, and
      continuing resolutions (CRs), program cancellations, or sequestration could reduce or delay
      contract task orders. The Aechelon acquisition (announced March 2026) introduces integration
      risk — timeline, cost, and personnel retention for the acquired team are not publicly disclosed.
      The US Coast Guard USCG $198M IDIQ represents customer concentration that exceeds 70% of
      FY2024 revenue if annualized, making any pause or restructuring of that single contract
      material to near-term revenue. The Anduril Hivemind license depends on Anduril executing its
      CCA YFQ-44A program successfully, creating an indirect dependency on a competitor's
      program-of-record status. A partner or dependency failure in any of these areas could cascade
      directly to revenue, development timelines, or valuation multiples.
