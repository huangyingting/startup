  evidenceGaps:
    - id: EGR001
      description: >
        Shield AI's ITAR compliance program — including DDTC registration status, export license
        portfolio, commodity jurisdiction determination outcomes, and compliance officer structure —
        is not publicly disclosed. Full assessment of ITAR regulatory risk requires direct company
        disclosure of compliance program documentation, which should be a mandatory diligence ask
        in any investment process.
      relatedQuestionRefs:
        - QR009
        - QR021
      impact: high

    - id: EGR002
      description: >
        The regulatory risk register (TR001) covers known regulatory frameworks applicable to
        Shield AI based on public ITAR, EAR, DoDD 3000.09, and FAR/DFARS requirements. However,
        Shield AI's actual compliance posture, certification levels, license holdings, and
        any pending regulatory reviews are not publicly disclosed. The enumeration is therefore
        partial — additional regulatory risks in classified programs, export-controlled software
        components, or classified airworthiness processes are outside the scope of this analysis.
      relatedTableRefs:
        - TR001
      impact: high

    - id: EGR003
      description: >
        No independent documentation of technical failures, operational reliability incidents,
        field performance gaps, or safety events for V-BAT or Hivemind has been found in public
        sources. The absence of adverse reporting could reflect genuine reliability, limited public
        reporting norms in DoD programs, or successful suppression of failure information in
        government contracting contexts. Diligence should include direct FOIA requests for
        incident reports and DoD program office feedback.
      relatedQuestionRefs:
        - QR022
      impact: medium

    - id: EGR004
      description: >
        Aechelon Technology acquisition cost, integration milestone obligations, and key personnel
        retention structure are not publicly disclosed. The acquisition was announced in March 2026
        alongside the Series G close, but no term details have appeared in public filings or press
        releases. This represents a material gap in assessing the total capital deployment requirement
        from the Series G proceeds.
      relatedQuestionRefs:
        - QR008
        - QR016
      impact: medium

    - id: EGR005
      description: >
        Shield AI's cash runway, operating burn rate, and gross margin structure are not publicly
        disclosed. The quantification of financial risk — including the adequacy of Series G proceeds
        to fund X-BAT development and reach IPO — requires access to financial statements, which are
        not available for a private company. Investors must request management presentation of
        projected burn and runway analysis as a foundational diligence step.
