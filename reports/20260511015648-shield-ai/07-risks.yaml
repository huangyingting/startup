  - id: mitigations-and-kill-criteria
    title: "Mitigations and Kill Criteria"
    body: >
      The most important risk mitigations and their monitoring indicators are summarized below.
      On regulatory/legal risk, the primary mitigation is an active ITAR compliance program through
      DDTC registration, commodity jurisdiction determinations, and licensed export agreements;
      the monitoring indicator is any DDTC or BIS enforcement action against Shield AI, or any
      allied customer reporting a denied technology transfer. A thesis-break trigger would be a
      State Department ITAR debarment action or a Congressional restriction on autonomous weapons
      exports. On X-BAT operational risk, the mitigation is a phased flight test program with
      milestone-based funding releases; the monitoring indicator is the announced fall 2026 first-flight
      milestone achievement. A thesis-break trigger would be a first-flight slip beyond mid-2027
      combined with a cost overrun exceeding 50% of the estimated development budget.
      On financial/model risk, the mitigation is the capital runway from the $2B Series G; the
      monitoring indicator is the 2026 revenue growth rate relative to the ~80% guidance (implying
      ~$480M). A thesis-break trigger is 2026 reported revenue below $350M, indicating continued
      execution shortfall relative to the software-pivot narrative. On partner dependency, the
      mitigation is the GE Aerospace collaboration agreement and IDIQ contract structures; the
      monitoring indicator is any GE Aerospace supply disruption announcement or DoD budget CR
      exceeding six months. On key-man risk, the mitigation is a formal succession plan and retention
      equity for leadership; the trigger is departure of both co-founders within a 12-month window.
      Investors should require management disclosure of: ITAR compliance program documentation,
      Hivemind security certification roadmap, X-BAT program budget and milestone schedule,
      2025 actual revenue versus guidance reconciliation, and Aechelon integration timeline and cost.
