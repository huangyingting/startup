        - QR011
      impact: high

    - id: EGR007
      description: >
        Hivemind's compliance with DoDD 3000.09 human-authorization requirements for lethal autonomous
        decisions is not independently verifiable from public sources. Shield AI has not published
        a formal compliance architecture document, independent test results, or government-validated
