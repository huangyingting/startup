  - id: financial-model-risk
    title: "Financial / Model Risk"
    body: >
      Shield AI's $12.7B Series G valuation — raised in March 2026 — reflects a premium software
      company multiple applied to a company that currently generates the majority of its revenue from
      defense hardware (V-BAT sales). Analysis by AI Invest and other observers notes that sustaining
      this valuation requires approximately 50% software revenue mix by 2028, a transition that has not
      yet begun to materialize in reported figures. Management's 2025 revenue guidance of $500M+ was
      reportedly missed by a meaningful margin, with analyst estimates suggesting approximately $300M
      in actual 2025 revenue — creating a credibility gap between forward guidance and execution.
      Shield AI remains pre-profit, burning cash toward a likely IPO; the $2B raised in Series G
      must fund both ongoing operations and significant capital expenditure for X-BAT development,
      estimated at $1B+ to reach production. Customer concentration risk amplifies financial model
      risk: if the USCG contract pauses or the DoD A-GRA program is restructured, near-term revenue
      shortfall could accelerate cash burn toward a forced capital event. The company has not disclosed
      gross margins, EBITDA, or operating cash flow metrics publicly; the software-to-hardware revenue
      mix transition required to justify the current valuation is not independently verifiable from
      public data. Credit risk from large advance payments, milestone payments, or working capital
      requirements on IDIQ contracts adds execution-level financial complexity. Fraud risk is assessed
      as low based on the company's defense-sector operational context and government contract audit
      requirements (DCAA), but cannot be fully evaluated without access to financial statements.
