        compliance documentation and any government program office assessments.
      relatedQuestionRefs:
        - QR014
      impact: medium

  callouts:
    - id: CALR001
      type: risk
      title: "Software Pivot Valuation Thesis Is Unproven and Vulnerable to Revenue Miss"
      body: >
        Shield AI's $12.7B valuation is predicated on a software company multiple applied to a
        company that currently generates the majority of its revenue from hardware. With 2025 revenue
        reportedly missing guidance by approximately $200M, and no public evidence of meaningful
        software revenue mix shift, the valuation narrative is vulnerable. A second consecutive
        guidance miss in 2026 would materially damage IPO prospects.
      claimRefs:
        - CR010
        - CR011
        - CR038
        - CR040

    - id: CALR002
      type: risk
      title: "ITAR Compliance Posture Is a Black Box — Key Pre-Investment Diligence Gap"
      body: >
        Shield AI has not publicly disclosed any aspect of its ITAR compliance program — no DDTC
        registration confirmation, no commodity jurisdiction determinations, no export license
        portfolio summary. For a company that claims 10+ country deployments and allied customer
        revenue, this is a material diligence gap. Any undisclosed ITAR violation or pending DDTC
        review could affect both US government contract eligibility and allied customer access.
      claimRefs:
        - CR001
        - CR003
        - CR029

    - id: CALR003
      type: recommendation
      title: "Require ITAR Compliance Audit, X-BAT Budget Disclosure, and Aechelon Integration Plan"
      body: >
        Before investment close, diligence should require: (1) ITAR compliance audit or management
        representation with outside counsel opinion; (2) X-BAT program budget, milestone schedule,
        and first-flight test plan; (3) Aechelon integration cost and retention plan; (4) 2025
        actual revenue reconciliation versus guidance; (5) Hivemind security certification roadmap.
        These five items represent the minimum required to adequately size the financial and
        regulatory risk dimensions.
      claimRefs:
        - CR006
        - CR009
        - CR035
        - CR039
        - CR040

    - id: CALR004
      type: insight
      title: "GE Aerospace Partnership Validates X-BAT But Does Not Mitigate Single-Source Risk"
      body: >
        GE Aerospace's collaboration on X-BAT propulsion is a strong signal of platform credibility
        — Tier-1 primes do not partner on programs without commercial conviction. However, the
        partnership's public announcement does not establish whether binding supply terms, volume
        commitments, or alternative sourcing provisions are in place. For a program that is
        pre-first-flight, a binding supply agreement with fallback options is standard risk
        management that investors should verify.
      claimRefs:
        - CR008
        - CR030

    - id: CALR005
      type: strength
      title: "Clean Regulatory Record Is a Positive Starting Point"
