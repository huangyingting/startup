callouts:
  - id: CALU001
    type: strength
    title: "USCG $198M IDIQ Validates Production-Scale Deployment"
    body: >
      The US Coast Guard's $198M IDIQ is the strongest single customer-proof data point in Shield AI's
      public record. IDIQ structures signal multi-year production intent and indicate the government views
      V-BAT as a programmatic platform, not a one-off procurement.
    claimRefs:
      - CU001
      - CU003
      - CU014

  - id: CALU002
    type: risk
    title: "DoD Revenue Concentration Creates Procurement-Cycle Dependency"
    body: >
      Approximately 100% of Shield AI's publicly confirmed revenue derives from US government customers,
      with the USCG contract alone potentially representing ~74% of FY2024 revenue. Budget sequestration,
      continuing resolutions, or program restructuring at any large DoD customer could materially impact
      near-term revenue.
    claimRefs:
      - CU022
      - CU040

  - id: CALU003
    type: insight
    title: "Anduril Hivemind License Opens Scalable B2B2G Software Channel"
    body: >
      The Anduril Hivemind license for CCA YFQ-44A represents Shield AI's most capital-efficient customer
      acquisition vector: software licensing to a prime contractor who integrates Hivemind into platforms
      procured at scale by the DoD. If the CCA program reaches full-rate production, this single licensing
      relationship could generate substantial recurring revenue without additional direct hardware sales.
    claimRefs:
      - CU007
      - CU015
      - CU016
      - CU035

  - id: CALU004
    type: assumption
    title: "80% Revenue Growth Guidance Assumes Multi-Stream Simultaneous Expansion"
    body: >
      Management's 2026 guidance of ~80% revenue growth implies approximately $481M in revenue. This
      requires simultaneous growth in V-BAT production volume, allied-nation deployment expansion, and
      material scaling of Hivemind software license revenue — all three tracks growing in parallel.
    claimRefs:
      - CU008
      - CU010
      - CU020

