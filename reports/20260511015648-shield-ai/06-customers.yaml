company:
  name: "Shield AI"
chapter:
  number: 6
  title: "Customers"
  summary: >
    Shield AI's confirmed customer base spans three segments: US DoD end users (US Coast Guard, Navy,
    Air Force), allied international operators (Japan, Romania, and 10+ countries deploying V-BAT), and
    defense prime integrators (HII on ROMULUS, Anduril Hivemind license for CCA YFQ-44A). The $198M IDIQ
    awarded by the US Coast Guard in July 2024 is the single largest publicly confirmed customer commitment
    and the clearest production-deployment proof point. FY2024 revenue of $267M (64% YoY growth) and ~80%
    2026 growth guidance reflect rapid adoption expansion. Customer retention signals are strong — no public
    contract cancellations found — and Hivemind's embedded architecture creates meaningful switching costs.
    Key risks are elevated DoD customer concentration (~100% of confirmed revenue) and a software-pivot
    valuation narrative that has not yet been fully reflected in reported revenue mix.

sections:
  - id: customer-base-segmentation
    title: "Customer Base Segmentation"
    body: >
      Shield AI's customer base divides into three primary segments, each representing distinct procurement
      mechanisms and revenue profiles. The US Department of Defense end-user segment is the most developed:
      the US Coast Guard operates V-BAT in full production under a $198M IDIQ, the US Navy has awarded V-BAT
      the MQ-35A designation and is conducting NAVAIR qualification, and the US Air Force is using Hivemind as
      the prime autonomy stack for the A-GRA program with live MQ-20 Avenger test flights. The allied
      international segment comprises 10+ countries, with Japan and Romania as the only publicly named
      deployments, procuring V-BAT through Foreign Military Sales or direct channels. The third segment —
      defense prime integrators — is newest but strategically significant: Huntington Ingalls Industries
      integrated Hivemind on its ROMULUS unmanned surface vessel, and Anduril licensed Hivemind software for
      its Collaborative Combat Aircraft YFQ-44A program. This B2B2G channel bypasses direct government
      procurement timelines, enabling Shield AI to embed its software into platforms sold by large primes.
      Across all three segments, V-BAT hardware drives near-term revenue while Hivemind software licensing
      represents an emerging recurring-revenue component with potentially superior unit economics.
    claimRefs:
      - CU001
      - CU002
      - CU004
      - CU005
      - CU006
      - CU007
      - CU012
      - CU017
      - CU028
      - CU030
    tableRefs:
      - TU001
    figureRefs:
      - FU001

  - id: adoption-trajectory
    title: "Adoption and Deployment Trajectory"
    body: >
      Shield AI's growth metrics indicate rapid and accelerating adoption across its customer segments.
      FY2024 revenue reached $267M, representing 64% year-over-year growth from an estimated FY2023 base of
      approximately $163M. Management has guided for approximately 80% revenue growth in 2026, implying a
      forward revenue run rate approaching $480M. V-BAT deployments have expanded from a handful of trial
      programs to active operations across 10+ countries. The MQ-35A US Navy designation — if converted to a
      production program of record — would represent a significant step-change in V-BAT production volumes.
      The A-GRA program integration with MQ-20 Avenger, completed within approximately 12 weeks, demonstrates
      that Hivemind can be rapidly onboarded to new platforms, reducing adoption friction for both hardware
      and software channels. The HII ROMULUS Hivemind integration, completed in 6 weeks, further validates
      rapid adoption timelines. The Anduril Hivemind license for CCA YFQ-44A marks the first known deployment
      of Shield AI software on a third-party prime-contractor autonomous combat aircraft, establishing the
      software licensing track as a parallel adoption vector. USASpending.gov data confirms sequential contract
      awards from multiple federal agencies — USCG, Navy, and Air Force — corroborating the revenue growth
      trajectory with observable federal procurement activity through May 2026.
    claimRefs:
      - CU008
      - CU009
      - CU010
      - CU011
      - CU013
      - CU014
      - CU019
      - CU020
      - CU032
    tableRefs:
      - TU002
    figureRefs:
      - FU002

  - id: named-customer-proof
    title: "Named Customer Proof"
    body: >
      The strongest customer proof is the US Coast Guard's $198M IDIQ contract awarded in July 2024 for
      V-BAT production delivery and operations support — the largest publicly confirmed single customer
      commitment in Shield AI's history. The IDIQ structure allows the government to issue task orders over
      the contract's performance period, indicating multi-year production intent and de-risking near-term
      revenue predictability. The US Navy's MQ-35A formal designation is a second high-confidence proof
      point: formal military type designations are awarded only after a platform has passed initial
      qualification milestones, signaling Navy investment and procurement seriousness. The USAF MQ-20 Avenger
      live-autonomy tests — where Hivemind operated the aircraft in contested-environment scenarios — represent
      program-level operational validation at the most capable air combat platform publicly confirmed.
      HII's ROMULUS USV integration was completed with both parties issuing press releases confirming
      milestone achievement, providing corroborated partner-proof evidence of Hivemind deployment on a naval
      surface vessel. Anduril's Hivemind license for the CCA YFQ-44A program is the most strategically
      significant software-licensing proof point, reflecting a defense prime's conviction in Hivemind's
      autonomy stack for a program that could produce large acquisition volumes for the US Air Force. Japan
      and Romania deployments, while unconfirmed by independent third parties, are consistent with Shield
      AI's documented allied market expansion and the company's stated 10+ country deployment footprint.
    claimRefs:
      - CU001
      - CU003
      - CU005
      - CU006
      - CU007
      - CU009
      - CU015
      - CU018
      - CU031
    tableRefs:
      - TU003
    figureRefs:
      - FU003

  - id: retention-and-durability
    title: "Customer Retention and Durability"
    body: >
      Shield AI's retention signals are strong within confirmed US DoD customers, though limited public
      data constrains a fully quantitative assessment. The USCG relationship is the most visible indicator:
      the $198M IDIQ represents a deepening of what began as earlier-stage procurement engagement, suggesting
      the Coast Guard evaluated V-BAT, found it operationally satisfactory, and committed to full production
      volumes across a multi-year window. No public evidence of contract cancellations, program terminations,
      or customer-initiated disengagements has been found in any reviewed source through May 2026. The
      MQ-35A program's continuation through NAVAIR qualification — a multi-year process — implies US Navy
      retention of V-BAT as a platform under active investment. Hivemind's integration architecture provides
      a structural retention mechanism: once Hivemind EdgeOS is embedded in a customer's platform ecosystem,
      replacing it requires re-architecting the mission AI layer, creating substantial switching costs.
      V-BAT Block Upgrade — adding Hivemind AI autonomy, SATCOM, and a heavy-fuel engine as incremental
      capability packages — creates a natural upsell pathway for existing V-BAT operators, deepening
      platform dependency. Shield AI reports no program terminations in FY2024 or FY2025 public commentary,
      and company-cited multi-year IDIQ structures further de-risk customer churn risk. The 6-week ROMULUS
      integration speed and HII's continued partnership engagement suggest partner-customer satisfaction
      even absent formal NPS or CSAT score disclosures.
    claimRefs:
      - CU024
      - CU025
      - CU033
      - CU034
      - CU036
      - CU037
    tableRefs:
      - TU004
    figureRefs:
      - FU004

  - id: expansion-and-concentration
    title: "Expansion Vectors and Concentration Risk"
    body: >
      Shield AI faces material customer concentration risk. The USCG's $198M IDIQ, if representative of
      annual delivery cadence, accounts for approximately 74% of the $267M FY2024 revenue — a level of
      single-customer dependency common in early-stage defense hardware companies but representing strategic
      fragility if that program pauses or is restructured. Critically, approximately 100% of publicly
      confirmed revenue derives from US government customers, leaving the company exposed to DoD budget
      sequestration, continuing resolutions, or shifts in acquisition priorities. An analysis by AI Invest
      notes that Shield AI's $12.7B valuation depends heavily on a software-pivot narrative not yet reflected
      in reported revenue mix, since Hivemind license revenue remains a fraction of total revenue while the
      company is valued at software-company multiples. On the expansion side, defense prime licensing
      (Anduril) and allied-nation deployments represent meaningful diversification vectors. The Anduril
      YFQ-44A Hivemind license is strategically significant because CCA programs are expected to be
      procured in large quantities by the USAF, effectively converting a single licensing arrangement into a
      de-facto multi-year, high-volume indirect revenue stream. International FMS expansion to additional
      Indo-Pacific and European NATO allies would further de-risk revenue concentration. Shield AI's
      $2B March 2026 capital raise suggests confidence from investors in these expansion narratives, though
      execution risk on the software transition remains a legitimate concern.
    claimRefs:
      - CU015
      - CU016
      - CU022
      - CU023
      - CU026
      - CU035
      - CU038
      - CU040
    tableRefs:
      - TU005
    figureRefs: []

