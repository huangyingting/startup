            title: DoD Revenue Concentration Creates Procurement-Cycle Dependency
            body: >
              Approximately 100% of Shield AI's publicly confirmed revenue derives from US government customers, with
              the USCG contract alone potentially representing ~74% of FY2024 revenue. Budget sequestration, continuing
              resolutions, or program restructuring at any large DoD customer could materially impact near-term revenue.
            calloutType: insight
            claimRefs:
