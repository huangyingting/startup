    title: Thesis-Break and Kill Triggers
    slug: thesis-break-and-kill-triggers-table
    notes: >-
      Triggers are defined as observable events or metrics that, if confirmed, warrant a full re-underwrite or position
      exit. Severity: Critical = immediate exit consideration; High = position reduction; Medium = enhanced monitoring.
    claimRefs:
