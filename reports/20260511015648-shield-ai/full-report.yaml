      - number: '7.2'
        title: Regulatory / Legal Risk
        blocks:
          - type: paragraph
            body: >
              Shield AI's product portfolio — V-BAT, Hivemind, and X-BAT — is subject to a complex and evolving
              regulatory environment. Under 22 CFR Parts 120-121 (ITAR), military unmanned aerial systems with
              autonomous capabilities are likely controlled under Category XI (Military Electronics) or Category XV
              (Spacecraft and Related Articles) of the United States Munitions List. Export of any ITAR-controlled item
              to allied customers requires a Technical Assistance Agreement (TAA), Manufacturing License Agreement
              (MLA), or DSP-5 export license approved by the State Department's Directorate of Defense Trade Controls
              (DDTC). The dual-use nature of AI autonomy software could also invoke Export Administration Regulations
              (EAR) for certain components. A licensing backlog or policy change at DDTC could delay or block allied
              customer revenue. DoDD 3000.09 (Autonomy in Weapon Systems) imposes a structural policy risk: it requires
              human authorization for lethal decisions by autonomous systems, which constrains Hivemind's operational
              role in offensive missions. Any policy tightening of this directive — or new autonomous weapons treaties —
              could restrict the addressable scope of Shield AI's AI pilot concept for combat missions. Defense
              acquisition compliance (FAR/DFARS) and CMMC cybersecurity certification requirements add contract-level
              regulatory overhead. No litigation, enforcement actions, ITAR violations, or IP disputes against Shield AI
              have been found in public records as of May 2026. Shield AI's compliance posture — including ITAR
              registration, commodity jurisdiction determinations, and CMMC certification level — is not publicly
              disclosed, representing a key diligence gap.
            claimRefs:
              - CR001
