      - number: '1.5'
        title: Company Milestones and Organizational Scale
        blocks:
          - type: paragraph
            body: >
              Shield AI's journey from a two-person special operations spinout to a $12.7B defense tech company spans
              four distinct phases: the founding prototyping phase (2015–2018), the Series A through D build-out
              (2019–2022), the platform-and-scale phase (2022–2024), and the enterprise-and-global phase (2025–present).

              The founding period produced the Nova quadcopter—the first AI pilot deployed in combat with US Special
              Operations Command in 2018. Nova was designed to clear buildings of threats ahead of soldiers in
              GPS-denied environments, and the "lives saved" claim from this program is frequently cited by co-founders
              as the company's most powerful proof point. The 2021 acquisitions of Heron Systems (DARPA AlphaDogfight
              winners) and Martin UAV (V-BAT manufacturer) were pivotal scale-up moves that gave Shield AI both Group-5
              aircraft autonomy credibility and a tactical VTOL product with Navy/Marine Corps market traction.

              The 2023 milestone—Hivemind defeating an F-16 pilot in a DARPA-sanctioned AI vs. human dogfight—generated
              the most public attention and validated the highest-difficulty autonomy claim (air combat maneuvering). In
              2024, V-BAT operational deployment in Ukraine under active electronic warfare demonstrated real-world
              contested-environment performance far beyond lab conditions, providing a compelling customer proof point
              for allied militaries. Shield AI employed approximately 1,422 people as of March 2026—roughly 60% growth
              from the ~900 reported at the time of the May 2025 CEO transition.

              The adverse dimension that warrants attention: Shield AI, like all developers of lethal autonomous
              systems, faces rising regulatory and humanitarian pressure. Human Rights Watch (March 2026) highlighted
              the US Pentagon's direction to accelerate fully autonomous weapons—a policy environment that could force
              Shield AI to navigate between DoD expectations and international humanitarian law norms, particularly as
              X-BAT moves toward lethal engagement roles.
