            title: A-GRA Certification Speed May Compress Shield AI's Moat Timeline
            body: >-
              A-GRA is both Shield AI's greatest competitive advantage and its most durable risk. Having achieved the
              first mission autonomy certification on the Air Force CCA platform creates a lead—but if A-GRA
              certification timelines compress from 18–36 months to 6–12 months as standards mature, Anduril's Lattice
              (already certified at the sensor-fusion layer) could rapidly qualify at the mission autonomy layer. The
              moat is real but is measured in qualification time, not technical capability—and qualification time is an
              administrative variable, not a permanent barrier.
            calloutType: risk
            claimRefs:
              - CP009
              - CP021
