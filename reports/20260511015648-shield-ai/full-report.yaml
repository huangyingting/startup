            static JSON config maps to platform hardware
        - id: model-dev
          label: AI Model Development (Cloud)
          description: >-
            Engineers use Hivemind Forge on AWS cloud to train, evaluate, and package mission AI models using the
            Foundation Model for Defense as a base
