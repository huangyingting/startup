      - number: '3.2'
        title: Incumbent Primes and Platform Integrators
        blocks:
          - type: paragraph
            body: >
              The second competitive tier consists of legacy defense primes and specialized unmanned systems companies
              that are building or acquiring autonomy capabilities to compete against Shield AI and Anduril. These
              players have manufacturing scale, ITAR-cleared supply chains, and decades of DoD relationship capital, but
              are constrained by cost-plus contracting structures that suppress R&D investment intensity and delay
              software iteration cycles.

              Kratos Defense & Security Solutions is the closest analog to Shield AI in the attritable aircraft segment.
              Its XQ-58A Valkyrie—a low-cost, jet-powered attritable autonomous aircraft originally developed under
              AFRL's LCAAT program—was selected in January 2026 for the US Marine Corps MUX TACAIR program through a
              $231.5 million contract to a Northrop Grumman-led team, with Kratos providing the air vehicle and Northrop
              integrating mission kits and the Prism autonomy software stack. Critically, Prism is Northrop's own
              autonomy layer—not Hivemind or Lattice—creating a third software stack competing for the CCA
              autonomy-layer market. Kratos reported approximately $1 billion in annual revenue in 2025 from tactical
              systems and satellite communications. Its unit economics are structurally different from Shield AI: the
              Valkyrie is designed as an attritable (expendable) asset at an estimated $2–3 million per unit, whereas
              Shield AI's V-BAT ($1M+) is recoverable and reusable.

              General Atomics Aeronautical Systems (GA-ASI) is the dominant US manufacturer of Group 5 (large) military
              UAS, primarily the MQ-9 Reaper (retired 2023–2025 for USAF) and its successor programs. GA-ASI competed
              against Anduril for the Air Force CCA Increment 1 program and lost. Its Avenger is a larger, stealthier
              jet UAS for ISR and strike missions. GA-ASI is a private company (part of General Atomics) with estimated
              annual revenue of approximately $3+ billion and is fundamentally a hardware-centric organization. GA-ASI
              is integrating more on-board autonomy into its platforms, but its autonomy software is proprietary rather
              than platform-agnostic. GA-ASI and Kratos together represent the "hardware-first" competitor archetype
              against Shield AI's "software-first" model.

              Boeing Defense (MQ-25 Stingray autonomous tanker, MQ-28A Ghost Bat in Australia), L3Harris (tactical EW
              and ISR systems, autonomous wing programs), and Northrop Grumman (RQ-4 Global Hawk, X-47B heritage, B-21
              Raider integration) round out the prime-integrator tier. Boeing partnered with Palantir in September 2025
              to accelerate AI adoption across its defense and classified programs, positioning Palantir's data
              analytics inside Boeing's prime integration role. L3Harris's 2024 sale of its WESCAM airborne ISR business
              to Anduril for approximately $800 million was a strategic move by Anduril to acquire hardware
              manufacturing capability—underscoring that the boundary between AI-first companies and legacy primes is
              becoming porous through M&A.
