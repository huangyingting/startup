        title: Customer Base Segmentation
        blocks:
          - type: paragraph
            body: >
              Shield AI's customer base divides into three primary segments, each representing distinct procurement
              mechanisms and revenue profiles. The US Department of Defense end-user segment is the most developed: the
              US Coast Guard operates V-BAT in full production under a $198M IDIQ, the US Navy has awarded V-BAT the
              MQ-35A designation and is conducting NAVAIR qualification, and the US Air Force is using Hivemind as the
              prime autonomy stack for the A-GRA program with live MQ-20 Avenger test flights. The allied international
              segment comprises 10+ countries, with Japan and Romania as the only publicly named deployments, procuring
              V-BAT through Foreign Military Sales or direct channels. The third segment — defense prime integrators —
              is newest but strategically significant: Huntington Ingalls Industries integrated Hivemind on its ROMULUS
              unmanned surface vessel, and Anduril licensed Hivemind software for its Collaborative Combat Aircraft
              YFQ-44A program. This B2B2G channel bypasses direct government procurement timelines, enabling Shield AI
              to embed its software into platforms sold by large primes. Across all three segments, V-BAT hardware
              drives near-term revenue while Hivemind software licensing represents an emerging recurring-revenue
              component with potentially superior unit economics.
