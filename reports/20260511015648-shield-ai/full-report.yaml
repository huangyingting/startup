  - number: 7
    title: Risks
    sections:
      - number: '7.1'
        title: Risk Severity Overview
        blocks:
          - type: paragraph
            body: >
              Shield AI's risk portfolio encompasses six major dimensions. Ranked by residual severity after known
              mitigations: (1) Financial/model risk is the highest residual risk — the $12.7B Series G valuation embeds
              aggressive software-pivot assumptions that are not yet reflected in reported revenue mix, and a 2025
              revenue miss (~$300M actual vs $500M+ guidance) has already damaged near-term growth credibility. (2)
              X-BAT operational/technical risk is elevated — the program is pre-first-flight as of May 2026, involves
              Group-5 hardware complexity, and carries a GE F110 single-source propulsion dependency with no publicly
              disclosed alternative. (3) Regulatory/legal risk is moderate-to-high — ITAR/EAR controls create material
              export licensing obligations for every allied customer engagement, and DoDD 3000.09 constrains Hivemind's
              operational scope for offensive lethal missions. (4) Partner/dependency risk is moderate — AWS cloud
              dependency for Hivemind Forge and DoD budget cycle exposure are real but partially mitigated by contract
              IDIQ structures. (5) People/execution risk is moderate — key-man concentration in the Tseng co-founders
              and a planned 2x headcount scale from 1,400 to 3,000+ employees create organizational fragility. (6)
              Operational/security risk is low-to-moderate — no known security incidents or reliability failures have
              been publicly documented for V-BAT or Hivemind, but absence of public certification disclosures limits
              verification. Investment implication: financial model and X-BAT risks are the primary valuation gating
              factors; the remaining risk categories are material but manageable under normal defense program execution
              assumptions.
            claimRefs:
