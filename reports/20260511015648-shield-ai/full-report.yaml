      - number: '1.2'
        title: Founders and Leadership Team
        blocks:
          - type: paragraph
            body: >
              Shield AI was co-founded by three people whose complementary backgrounds gave the company an unusual blend
              of operational military credibility, engineering depth, and AI research capability. Brandon Tseng, the
              operational spark of the enterprise, is a US Naval Academy graduate who served as a Navy SEAL with combat
              deployments in Afghanistan and the Pacific before co-founding Shield AI. He now holds the title of
              President and Chief Growth Officer, responsible for global strategic engagement. Ryan Tseng, the
              engineering-and-business architect, served as CEO from founding until May 2025, during which he grew
              Shield AI to over 900 employees, raised more than $1B in funding, and reached a $5.3B valuation. He
              transitioned to President and Chief Strategy Officer in May 2025, focusing on senior US and international
              policy and defense engagement. Andrew Reiter is the AI technologist co-founder who built the initial
              algorithmic foundation of Hivemind.

              In March 2025, Shield AI announced a leadership transition: Gary Steele, formerly President of
              Go-to-Market at Cisco (which acquired Splunk for $28B in 2024), was appointed CEO effective May 13, 2025.
              Steele also serves on Shield AI's Board of Directors. His background includes founding Proofpoint, growing
              it from zero to IPO with a $12B enterprise value, and then leading Splunk to 58% revenue growth and full
              fiscal-year GAAP profitability before the Cisco acquisition. The appointment signaled Shield AI's intent
              to scale enterprise software distribution and commercialize Hivemind Enterprise beyond traditional DoD
              primes.

              Additional members of the leadership team include Nathan Michael (CTO), Kingsley Afemikhe (CFO), Sharyl
              Givens (Chief People Officer), Bob Harward (EVP International Business Development), Michael Yang (Chief
              Legal Officer), and Chandra Rangan (Chief Marketing Officer). Key-person dependence on the
              co-founders—particularly Brandon Tseng's military network and Ryan Tseng's strategic relationships—remains
              a material diligence consideration, partially mitigated by the professional management layer added with
              Steele's appointment.
