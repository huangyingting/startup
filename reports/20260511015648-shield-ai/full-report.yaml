        - FY2026 revenue misses $450M (>17% below guidance) or YoY growth falls below 25%
        - Reduce position by 50%; reassess IPO timeline and base-case valuation
        - High
      - - Software gross margin stall
        - Software-segment gross margin confirmed below 40% through FY2026 in any S-1 or investor disclosure
