    title: Company Overview
    sections:
      - number: '1.1'
        title: Company Identity and Mission
        blocks:
          - type: paragraph
            body: >
              Shield AI is a San Diego, California-based deep-tech defense company with the mission to protect service
              members and civilians with intelligent, autonomous systems. Founded in 2015 by Brandon Tseng (a former US
              Navy SEAL), his brother Ryan Tseng (an engineer and entrepreneur), and Andrew Reiter (an AI technologist),
              Shield AI was conceived in response to the lethal gaps Brandon Tseng witnessed firsthand during combat
              operations in Afghanistan. The founding insight was that AI pilots—software capable of navigating
              GPS-denied and communications-denied environments without human operators—could save lives by executing
              missions where human control was impossible or too slow.

              Shield AI describes itself not merely as a drone manufacturer but as the operator of an "autonomy
              infrastructure" for the US Department of Defense and allied militaries. Its flagship software platform,
              Hivemind Enterprise, enables developers and defense organizations to build, test, and deploy autonomous
              mission capabilities at scale. The company also manufactures tactical aircraft, principally the V-BAT VTOL
              drone and the newly launched X-BAT VTOL strike fighter, both of which run Hivemind as their AI pilot.
              Shield AI's current stage is late-private (Series G), with offices in San Diego, Dallas, Washington D.C.,
              Abu Dhabi (UAE), Kyiv (Ukraine), and Melbourne (Australia), reflecting a global operational posture
              supporting active US and allied military operations.

              The company's business model bridges software licensing (Hivemind Enterprise deployed on third-party
              platforms) with integrated hardware-plus-software products (V-BAT, X-BAT) and government services. Shield
              AI positions Hivemind as the "operating system" of military autonomy—a durable software moat analogous to
              what GPS once provided for navigation. The founding team has remained mission-focused; a pivotal early
              anecdote in Ryan Tseng's own telling describes passing on a funding round rather than pivoting away from
              the defense-first mission when a Bay Area investor demanded otherwise.
