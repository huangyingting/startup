    claimRefs:
      - CR001
      - CR008
      - CR010
      - CR011
      - CR014
      - CR016
      - CR024
      - CR033
    data:
      columns:
        - Low
        - Medium
        - High
      rows:
        - label: Financial / Model Risk (Software Pivot)
          values:
            - label: Not applicable — likelihood assessed Medium-High
            - label: Valuation compression if revenue mix fails to shift to software; credibility gap from 2025 miss
            - label: IPO delayed or down-round if 2026 revenue misses again; investor thesis breaks
        - label: X-BAT Schedule / Technical Risk
          values:
            - label: Not applicable — likelihood assessed Medium
            - label: First-flight slip compresses production timeline; GE dependency amplifies
            - label: X-BAT cancellation or multi-year delay would eliminate key growth vector
        - label: ITAR / Export Control Risk
          values:
            - label: Full compliance posture maintained, no enforcement actions
            - label: License backlog slows allied customer expansion
            - label: DDTC debarment blocks all allied sales and international revenue
        - label: DoDD 3000.09 / Autonomous Policy
          values:
            - label: Current policy accommodated in Hivemind architecture
            - label: Policy tightening restricts Hivemind offensive mission scope
            - label: New treaty or legislation prohibits autonomous engagement — Hivemind TAM structurally reduced
        - label: Revenue Concentration / DoD Budget
          values:
            - label: Not applicable — USCG IDIQ multi-year and CR unlikely to cancel ongoing production
            - label: CR or sequestration delays task order issuance; short-term revenue impact
            - label: USCG IDIQ cancelled or restructured; DoD budget sequestration exceeds 6 months
        - label: GE Aerospace Single-Source Dependency
          values:
            - label: GE delivers on schedule; X-BAT program proceeds
            - label: GE delivery delays push X-BAT first flight by 3-6 months
            - label: GE supply failure halts X-BAT program with no alternative source available
        - label: Key-Man / Co-Founder Departure
          values:
            - label: Not applicable — co-founders actively engaged post-Series G
            - label: One co-founder departs; remaining leadership compensates
            - label: Both co-founders depart simultaneously; strategic vision and government relationships at risk
        - label: Cybersecurity / Software Certification
          values:
            - label: No known security incidents; limited public exposure
            - label: Certification gap identified during procurement; delays sensitive program access
            - label: Security vulnerability in Hivemind/EdgeOS exploited in operational context
