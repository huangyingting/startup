            title: Co-opetition With Anduril Is a Feature, Not a Bug
            body: >-
              Shield AI's Hivemind running on Anduril's YFQ-44A Fury—while Anduril's own Lattice runs the sensor-fusion
              layer on the same airframe—is the most counterintuitive fact in the competitive landscape. This
              co-opetition pattern validates the A-GRA thesis: in the CCA market, the DoD wants a best-of-breed stack,
              not a single-vendor solution. Shield AI's value proposition as the 'mission autonomy' layer is actually
              strengthened by this arrangement, because it positions Hivemind as irreplaceable at the tactical edge
              regardless of who builds the vehicle.
