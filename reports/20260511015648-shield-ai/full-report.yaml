          - type: callout
            title: Anduril's 4× Revenue Scale and $20B Army Contract Represent Existential Competitive Pressure
            body: >-
              Anduril's $2.1B 2025 revenue (vs. Shield AI's ~$540M estimated 2026) and $20 billion Army contract ceiling
              give Anduril dramatically more capital to invest in autonomy R&D, manufacturing, and DoD
              relationship-building. If Anduril redirects even 10% of its Army contract revenue toward autonomy software
              development, it could fund a Hivemind-competitive edge autonomy stack within 24–36 months. Shield AI's
              Series G runway and ~$540M revenue base means it must continue growing aggressively to avoid being
              outspent on R&D by its closest competitor.
            calloutType: risk
