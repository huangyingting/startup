      - number: '2.5'
        title: Market Constraints and Adoption Barriers
        blocks:
          - type: paragraph
            body: |
              Against these tailwinds, several structural constraints temper near-term market forecasts.

              **Defense budget uncertainty.** The Trump administration's FY2026 budget process has been
              marked by significant turbulence, including proposed DOGE-driven civilian cuts, program
              cancellations, and reliance on congressional reconciliation funding ($113.3 billion requested)
              to fill gaps. The Inside Unmanned Systems report notes that some long-running drone programs
              nearing development completion have been canceled in favor of off-the-shelf procurement,
              creating revenue risk for vendors dependent on specific program continuation.

              **Long DoD acquisition cycles.** Despite OTAs and DIU fast-tracking, most large DoD programs
              still require multi-year source selection, congressional authorization, and lengthy operational
              testing. Shield AI's CCA role, while validated in flight tests, has not yet reached full-rate
              production decision. Hardware programs like V-BAT face LRIP/FRP gating and government
              acceptance testing that introduce revenue timing uncertainty.

              **Export control constraints.** ITAR/EAR regulations limit Shield AI's ability to export
              advanced autonomy software and VTOL platforms to certain allied partners without government
              licenses. The autonomous weapons debate has triggered additional scrutiny at State Department
              and Commerce Department levels. The pace of international expansion is partly constrained by
              regulatory approval timelines.

              **Ethical and regulatory overhang.** Human Rights Watch, the ICRC, and a growing coalition
              of international law scholars argue that fully autonomous lethal systems—including AI-piloted
              combat aircraft—may violate the laws of armed conflict. While Shield AI's current deployments
              are classified as "human on the loop" or "human in the loop" systems in official DoD framing,
              the reputational and regulatory risk from autonomous weapons treaty negotiations remains a
              medium-term concern.

              **Analyst estimate divergence as a diligence signal.** Market sizing estimates for military AI
              and autonomous systems range from ~$9 billion (AI software only) to ~$70 billion (all autonomous
              defense platforms) for 2026—an 8× spread. This divergence reflects genuine definitional
              disagreement, not data quality, and signals that revenue projections for companies like Shield AI
              are highly sensitive to definitional scope, program outcomes, and budget volatility.
            claimRefs:
              - CM016
              - CM017
              - CM025
              - CM026
              - CM027
              - CM040
