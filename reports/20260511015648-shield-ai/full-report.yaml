            title: 80% Revenue Growth Guidance Assumes Multi-Stream Simultaneous Expansion
            body: >
              Management's 2026 guidance of ~80% revenue growth implies approximately $481M in revenue. This requires
              simultaneous growth in V-BAT production volume, allied-nation deployment expansion, and material scaling
              of Hivemind software license revenue — all three tracks growing in parallel.
