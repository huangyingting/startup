companyProfile:
  summary: >
    Shield AI, founded in 2015 by brothers Ryan Tseng (CEO, USN veteran) and Brandon Tseng (President, Navy SEAL
    veteran) alongside Andrew Reiter (CTO), is a San Diego-based defense technology company that develops AI autonomy
    software and autonomous unmanned aerial systems. Its flagship product, Hivemind, is a multi-layer AI enterprise
    platform comprising EdgeOS (real-time middleware), Pilot (autonomous flight AI), Commander (multi-agent
    coordination), and Forge (ML model development). The company also manufactures the V-BAT Group-3 VTOL UAS and is
    developing the X-BAT Group-5 supersonic autonomous aircraft. Shield AI secured a $2B Series G round in March 2026 at
    a $12.7B post-money valuation and is widely regarded as a leading pre-IPO defense AI company.
