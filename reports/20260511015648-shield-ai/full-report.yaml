      - number: '5.3'
        title: Hardware Products and Roadmap
        blocks:
          - type: paragraph
            body: >
              The V-BAT (MQ-35A) is a Group-3 vertical-takeoff-and-landing UAS built around a ducted-fan design,
              offering greater than 13 hours of flight endurance with a heavy-fuel engine on the Block Upgrade
              configuration. The Block Upgrade, announced via PR Newswire, adds Hivemind-powered advanced autonomy,
              SATCOM connectivity, and the heavy-fuel engine as incremental capability packages. At an estimated ~$1M
              ASP, V-BAT competes as an affordable persistent ISR and teaming asset. The X-BAT, unveiled October 21,
              2025, is Shield AI's first Group-5 platform: a supersonic, AI-piloted VTOL fighter jet with a 26-foot
              wingspan (extending to 39 feet), service ceiling above 50,000 feet, and range exceeding 2,000 nautical
              miles. It is powered by the GE F110-GE-129 engine with an axisymmetric vectoring exhaust nozzle (AVEN),
              enabling thrust-vectored supersonic VTOL operations. Shield AI and GE Aerospace formalized a propulsion
              collaboration in October 2025 to progress X-BAT development toward a first-flight target of fall 2026 at
              an approximate $27 million target unit cost. The March 2026 Aechelon acquisition adds synthetic
              environment and simulation capabilities to the product stack, enabling pre-deployment training in
              realistic virtual environments—important for scaling X-BAT test cycles and reducing live-test cost. Shield
              AI's roadmap thus spans from near-term V-BAT fleet expansion through medium-term X-BAT first-flight and
              eventually toward a production fighter-class autonomous platform.
            claimRefs:
