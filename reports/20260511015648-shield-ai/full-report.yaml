      - number: '4.4'
        title: Capital Structure and Financial Position
        blocks:
          - type: paragraph
            body: >
              As of April 2026, Shield AI has raised approximately $3.6 billion in cumulative financing across 17+
              rounds since its founding in 2015. The March 2026 financing event — the largest in company history —
              comprised three tranches: $1.5 billion in Series G equity (led by Advent International, co-led by
              JPMorganChase Strategic Investment Group, with participation from Snowpoint Ventures, InnovationX, Riot
              Ventures, Disruptive, and Apandion); $500 million in fixed-return preferred equity from Blackstone-managed
              funds; and a $250 million delayed-draw credit facility (also from Blackstone, available for future use).
              The post-money valuation following these transactions is $12.7 billion — a 140% increase from the $5.3
              billion valuation established one year prior.

              The Blackstone preferred equity structure is economically closer to quasi-debt: Blackstone receives a
              fixed coupon, and the preferred is structurally senior to common equity. Combined with the $250 million
              delayed-draw facility, total Blackstone exposure is up to $750 million. This structure allows Shield AI to
              access substantial capital without proportionate equity dilution while maintaining flexibility for
              follow-on acquisitions. Management has indicated that the primary use of funds is the Aechelon
              acquisition, continued Hivemind development, V-BAT and X-BAT scaling, and international market expansion.

              Burn rate and cash position are not publicly disclosed. However, at $3.6 billion raised and a revenue run
              rate approaching $540 million for 2026, the company appears to have sufficient runway to reach or exceed
              the $1 billion revenue milestone management has targeted for fiscal year 2028. Whether that milestone
              coincides with IPO preparation — and what profitability profile the market will require — remains the
              central financial diligence question.

              The company missed its 2025 revenue guidance ($400M target, ~$300M actual), representing a material
              shortfall of ~$100 million or roughly 25%. This was the first publicly noted guidance miss and introduces
              some uncertainty about the reliability of the $540M+ 2026 projection. Multiple analysts have noted that at
              a $12.7 billion valuation, Shield AI trades at ~27-28x projected 2026 revenue — a multiple that prices in
              aggressive execution and a successful transition to high-margin Hivemind software as the majority revenue
              driver.
