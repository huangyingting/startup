          - type: callout
            title: Hivemind's 10-Year GPS-Denied RL Training Data Is Non-Replicable
            body: >-
              Shield AI has been training Hivemind's reinforcement learning agents on real-world GPS-denied flight data
              since 2016. This data flywheel—10+ years of actual autonomous sorties in contested environments, including
              combat deployments—cannot be replicated quickly by any competitor. Anduril, Kratos, and DARPA programs can
              deploy similar architectures, but they cannot retroactively acquire the training signal from a decade of
              real-world GPS-denied operations. This makes Hivemind's model weights, not its architecture, the durable
              competitive asset.
            calloutType: strength
            claimRefs:
              - CP020
