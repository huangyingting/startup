              - CI007
      - number: '4.2'
        title: Pricing and Go-to-Market Motion
        blocks:
          - type: paragraph
            body: >
              Shield AI primarily sells through direct government contracting rather than commercial distribution. Its
              go-to-market relies on defense innovation pathways — starting with Other Transaction Authority (OTA)
              vehicles and Defense Innovation Unit (DIU) contracts — before scaling to full defense acquisition
              programs. This approach reduces early sales friction but creates elongated payment cycles typical of
              government procurement: contract awards often precede revenue recognition by twelve to thirty-six months.

              V-BAT hardware is sold under fixed-price contracts and contractor-owned, contractor-operated (COCO)
              service arrangements, such as the $198 million indefinite-delivery/indefinite-quantity (IDIQ) contract
              awarded by the U.S. Coast Guard in July 2024. Under COCO arrangements, Shield AI retains platform
              ownership and charges for flight hours or persistent surveillance availability — a model that improves
              recurring revenue visibility. Hivemind Enterprise is licensed per platform type and per mission set,
              though exact per-unit or per-seat pricing is not publicly disclosed.

              Customer acquisition cost (CAC) metrics, sales cycle length (beyond general multi-year DoD procurement
              norms), and payback period are not disclosed. Industry analogues for defense software platforms suggest
              CAC is high but lifetime contract value is also very high. Shield AI's CCA selection as the AI stack for
              the Anduril YFQ-44A Fury positions it as an embedded supplier — a form of platform lock-in that could seed
              recurring Hivemind licensing revenue at scale once the CCA program is fully operational.

              The company's international expansion is managed through direct country-level defense ministry
              relationships, supplemented by in-country integration partners. International contracts — with Romania,
              Japan, Greece, and others — collectively account for more than half of 2025 revenue, but the mix is opaque
              and subject to foreign military sales (FMS) regulatory timing. Sales efficiency ratios (revenue per sales
              employee, ARR per account executive) are not publicly available.
            claimRefs:
              - CI008
              - CI009
              - CI010
              - CI011
              - CI012
          - type: table
            tableRef: TI002
            claimRefs: []
      - number: '4.3'
        title: Cost Structure and Unit Economics
        blocks:
          - type: paragraph
            body: >
              Shield AI's cost structure reflects the dual burden of a hardware manufacturer and a software R&D company.
              Hardware costs for V-BAT include airframe manufacturing, propulsion systems, sensor payloads, and supply
              chain logistics — with gross margins for defense hardware typically in the 20–35% range for comparable
              platforms. Software margins for Hivemind are estimated at 60%+ based on industry benchmarks for autonomous
              systems software, though Shield AI has not disclosed segment-level gross margins.

              Research and development spending stood at approximately 22% of revenue for fiscal year 2024, reflecting
              the company's significant investment in the Hivemind Foundation Model for Defense and the X-BAT
              development program. This R&D intensity is consistent with pre-IPO defense-tech companies seeking to
              establish platform dominance before scaling, but it will need to compress as the company scales to achieve
              acceptable profitability.

              The Aechelon Technology acquisition — announced concurrently with the March 2026 Series G — brings
              simulation and synthetic environment capabilities at undisclosed cost. Aechelon's technology supports the
              Joint Simulation Environment (JSE) for the U.S. Air Force and is critical for training Hivemind's
              Foundation Model using synthetic data. The acquisition adds headcount and integration cost, creating
              short-term margin pressure in 2026–2027 before potential synergies materialize.

              Working capital dynamics favor Shield AI modestly: government contracts typically provide milestone
              payments that reduce cash conversion cycle length versus commercial SaaS. However, the COCO model for
              V-BAT deployments requires capital to be tied up in deployed platforms. Capital expenditure data is not
              publicly available. Shield AI had approximately 1,422 employees as of early 2026, implying an estimated
              revenue-per-employee ratio of $188K at 2025 revenue levels — below software benchmarks but consistent with
              a hardware-software hybrid at this scale.
            claimRefs:
              - CI013
              - CI014
              - CI015
              - CI016
              - CI017
              - CI018
