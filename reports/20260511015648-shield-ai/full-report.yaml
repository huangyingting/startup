    description: >
      Directed acyclic graph showing how primary Shield AI risks cascade into downstream operational, financial, and
      strategic impacts. Edges represent causal pathways between risk events. The map illustrates how X-BAT schedule,
      ITAR, and revenue miss risks converge on a common valuation compression and IPO risk node.
