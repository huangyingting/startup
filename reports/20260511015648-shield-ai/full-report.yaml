      - number: '4.5'
        title: Financial Gaps and Diligence Blockers
        blocks:
          - type: paragraph
            body: >
              Shield AI is a privately held company with no obligation to disclose financial statements, and it has
              maintained unusually tight control over financial disclosures for a company at this scale. This creates
              significant diligence blockers across every key metric needed to underwrite a full investment thesis. The
              most critical gap is the absence of any disclosed gross margin — neither blended nor by segment. Without
              gross margins, it is impossible to assess the true economics of the hardware-software business mix or to
              validate the Hivemind margin-expansion thesis.

              Additional undisclosed metrics include: operating expenses by function (R&D, S&M, G&A beyond the 22% R&D
              figure), EBITDA or adjusted EBITDA, net income or net loss, cash and equivalents, and burn rate. Revenue
              recognition policies — particularly for COCO arrangements and multi-year IDIQ contracts — are not
              documented publicly, creating potential for revenue recognition timing differences that could materially
              affect period-level results.

              The company reported $267 million in 2024 revenue but provided no geographic breakdown, no segment-level
              gross margin, and no backlog disclosure. The $198 million Coast Guard IDIQ and any other named contracts
              represent only part of actual bookings; a comprehensive backlog figure would significantly improve
              underwriting confidence. Unit economics — specifically V-BAT cost-per-flight-hour, Hivemind licensing
              gross margin, and customer acquisition cost — are entirely absent from public disclosures.

              For a company valued at $12.7 billion and projecting $540 million in 2026 revenue, the opacity of Shield
              AI's financials is atypically high. Due diligence investors require access to audited financial
              statements, capitalization table details (including option pool, liquidation preferences on the preferred
              shares, and Blackstone preferred terms), detailed backlog by program, and cost-of-revenue by product line
              before any meaningful valuation model can be built with confidence.
            claimRefs:
              - CI026
              - CI027
              - CI028
              - CI029
              - CI030
