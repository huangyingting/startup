  - number: 4
    title: Financials
    sections:
      - number: '4.1'
        title: Revenue Model and Revenue Streams
        blocks:
          - type: paragraph
            body: >
              Shield AI generates revenue from two interconnected streams: hardware systems sales and software autonomy
              licensing. The hardware segment centers on V-BAT (and the newer X-BAT, announced October 2025) — vertical
              takeoff and landing drones sold to the U.S. military and allied nations, with unit prices estimated at
              approximately $1 million each. The software segment, Hivemind Enterprise, consists of EdgeOS (the core
              autonomy operating system), Hivemind Pilot (autonomous flight), Hivemind Commander (multi-agent
              orchestration), and Hivemind Forge (ML model development environment). Hivemind is licensed to both
              government operators and third-party platform integrators such as Airbus, Kratos, and L3Harris.

              For fiscal year 2024 (ending March 2024), Shield AI reported approximately $267 million in total revenue,
              up 64% from $163 million in 2023. The fiscal year ending March 2025 came in around $300 million — short of
              the internal $400 million target by roughly $100 million, representing a material growth deceleration to
              12% for that year. Management has projected 2026 revenue exceeding $540 million, implying a return to ~80%
              growth driven by contract deliveries and international expansion.

              Hivemind software contributed approximately 30% of 2025 revenue and is targeted to reach 50% of revenue by
              fiscal year 2028. The remainder comes from V-BAT hardware sales, services (installation, training,
              logistics support), and operator contracts. A significant portion of revenue — reportedly over 50% in 2025
              — derives from international defense ministries including Romania, Japan, Greece, Canada, the Netherlands,
              Ukraine, and Egypt, reflecting a diversified but still government-dependent customer base.

              Revenue concentration risk is high: the business model is almost entirely dependent on government
              procurement cycles, and the majority of contracts are denominated in U.S. dollars under fixed-price or
              IDIQ structures. No commercial or dual-use revenue has been disclosed. The DoD and allied nations
              represent both the ceiling and the floor for near-term growth.
            claimRefs:
              - CI001
              - CI002
              - CI003
              - CI004
              - CI005
              - CI006
              - CI007
          - type: table
            tableRef: TI001
            claimRefs: []
          - type: figure
            figureRef: FI001
            claimRefs:
