      - number: '1.4'
        title: Funding History and Investor Base
        blocks:
          - type: paragraph
            body: >
              Shield AI has raised approximately $3.52B in total funding across 17 rounds since its founding. Its first
              external capital was a $600K angel round in 2015, and the company achieved unicorn status in 2021. The
              funding history reflects rapid valuation appreciation driven by strong DoD adoption of V-BAT, the
              demonstrated viability of Hivemind's combat autonomy, and surging investor interest in defense technology
              post-2022.

              The most recent major round was the $2B Series G (March 26, 2026), led by Advent International and
              JPMorganChase's Security and Resiliency Initiative, with additional $500M in fixed-return preferred equity
              from Blackstone and a $250M credit facility. The Series G established a post-money valuation of $12.7B—a
              140% increase from the $5.3B valuation set just twelve months earlier, largely attributable to Shield AI's
              selection as the Hivemind autonomy software provider for the US Air Force Collaborative Combat Aircraft
              program. Other Series G investors included Snowpoint Ventures, InnovationX, Riot Ventures, Disruptive
              Ventures, and Apandion.

              The previous round, Series F (total ~$592M including the $240M F-1 tranche announced March 6, 2025), was
              led by strategic investors L3Harris (one of the largest US defense contractors) and Hanwha Aerospace
              (South Korean defense prime), with participation from Andreessen Horowitz, Booz Allen Hamilton, US
              Innovative Technology Fund, and Washington Harbour Partners. The strategic investor composition—two
              defense primes plus a leading VC—signals both commercial validation and deep supply-chain integration with
              the US and allied defense ecosystems.

              Shield AI has not disclosed revenue or ARR figures as a private company, but projected 2026 revenue of
              approximately $540M has been cited in third-party analyses (representing ~80% YoY growth from the
              estimated 2025 base). The company is not yet reported to be profitable, and specific burn rate and runway
              figures are not available in public sources.
