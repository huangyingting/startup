      - number: '5.5'
        title: Trust, Safety, and Compliance
        blocks:
          - type: paragraph
            body: >
              Shield AI operates in a sector where autonomous weapons systems are governed by DoD Directive 3000.09,
              which requires human authorization for lethal decisions—meaning Hivemind-equipped platforms today operate
              with a human in or on the loop for engagement decisions, even if navigation and flight are fully
              autonomous. This regulatory framework is well-understood within DoD procurement and does not currently
              constitute a binding barrier for ISR and teaming roles (V-BAT, maritime). The V-BAT MQ-35A designation
              indicates formal military qualification progress through NAVAIR, which is a trust signal for defense
              procurement. Shield AI's AWS partnership extends FedRAMP-adjacent cloud security practices to the EdgeOS
              development environment, an important compliance consideration for federal customers. Hivemind's
              GPS-independent architecture is inherently resilient to jamming, which is a safety feature in contested
              environments. However, diligence identifies key gaps: no independent third-party airworthiness
              certification (DAL A/B equivalent) for Hivemind or V-BAT has been publicly confirmed as of early 2026.
              Shield AI does not publicly disclose security vulnerability assessments, penetration testing results, or
              formal safety certification timelines in any reviewed public documentation. The autonomous operation of
              X-BAT in contested civil and congested airspace will require regulatory approvals beyond existing UAS
              frameworks, a process that could extend timelines and require FAA, DoD, and international coordination.
              These gaps are material for institutional investors evaluating the company's compliance readiness as it
              scales toward IPO.
            claimRefs:
              - CE029
              - CE030
              - CE031
              - CE032
              - CE033
              - CE034
              - CE035
