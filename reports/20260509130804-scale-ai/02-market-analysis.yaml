callouts:
  - calloutType: insight
    title: "Enterprise AI Adoption Creates a Large and Growing Market — But Scale Needs to Win Enterprise, Not Just Labs"
    body: "McKinsey's finding that 88% of organizations use AI in at least one function (62% experimenting with AI agents) confirms a massive and growing market opportunity. However, Scale's historical revenue has been concentrated in AI labs (which are now departing). The enterprise segment — represented by customers like Cisco, Etsy, Instacart, and TIME — must become the primary growth engine. Enterprise AI is still largely in pilot stage, meaning revenue ramp will lag the adoption curve by 12–24 months."
    claimRefs: [CM019, CM020, CM021, CM022]

  - calloutType: risk
    title: "Synthetic Data Threat: A Structural Risk to the Annotation TAM"
    body: "Synthetic data generation — AI-generated training data used to supplement or replace human-labeled data — represents a long-term structural threat to Scale's core annotation business. If AI labs shift 30–50% of their annotation spend to synthetic data pipelines, the TAM for human-labeled data could shrink materially within 3–5 years. Scale's strategic pivot toward evaluation (which requires human judgment) and government AI (which requires human verification) is a partial hedge against this risk."
    claimRefs: [CM025, CM026, CM027]

  - calloutType: assumption
    title: "Key Sizing Assumption: Revenue From Google and OpenAI Not Quantified"
    body: "This analysis cannot quantify the revenue impact of Google's and OpenAI's departure from Scale AI. If these two customers represented 30–50% of Scale's revenue (consistent with their status as largest/major customers), the revenue gap is potentially hundreds of millions of dollars annually. Until Scale discloses revenue by segment, the true market opportunity for the enterprise and government pivot remains unverifiable."
    claimRefs: [CM029, CM030, CM031]

