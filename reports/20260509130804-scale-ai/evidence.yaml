  - type: private-evidence-only
    severity: blocking
    topic: revenue-segment-mix
    missingEvidence: >-
      Scale AI's revenue breakdown by segment (AI labs, enterprise, government) is not publicly disclosed, making it
      impossible to quantify the revenue impact of Google and OpenAI departures.
    whyItMatters: >-
      Without segment revenue disclosure, the TAM addressable by Scale's enterprise and government pivot is
      unverifiable.
    diligencePath: Request revenue by segment, customer count by segment, and ARR cohort data in due diligence.
