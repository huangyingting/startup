    severity: material
    topic: market-sizing-TAM
    missingEvidence: >-
      No tier-one analyst report (Gartner, IDC, Forrester) with a consistent AI data annotation TAM definition and CAGR
      estimate is available from public sources in this research cache.
    whyItMatters: Without a benchmark TAM estimate, sizing analysis relies on bottom-up proxies with high uncertainty.
    diligencePath: >-
      Purchase or obtain Gartner, IDC AI data services market reports; cross-reference with Scale's own market sizing
      analysis.
