  - type: missing-source
    severity: minor
    topic: office-locations
    missingEvidence: >-
      Scale AI's non-HQ office locations are not comprehensively disclosed; some presence is implied by global public
      sector page.
    whyItMatters: Geographic diversification and talent access affect operational capacity.
    diligencePath: Request facilities list and headcount by location.
    relatedQuestionRefs:
