evidenceGaps:
  - type: private-evidence-only
    severity: blocking
    topic: revenue
    missingEvidence: Scale AI's ARR, total revenue, revenue by segment, and gross margin are not publicly disclosed.
    whyItMatters: >-
      Without revenue disclosure, the $29B+ valuation cannot be independently verified or placed in context via revenue
      multiples.
    diligencePath: Request audited financials, ARR dashboard, and segment revenue breakdown in due diligence data room.
    relatedQuestionRefs:
      - QO015
  - type: private-evidence-only
    severity: material
    topic: customer-count
    missingEvidence: Scale AI does not disclose its total customer count, NRR, or churn metrics publicly.
    whyItMatters: >-
      Customer base size and retention quality are critical to assessing the durability of revenue post-Google and
      OpenAI departures.
    diligencePath: Request customer ledger, NRR cohort data, and customer count by segment in due diligence.
    relatedQuestionRefs:
      - QO016
  - type: private-evidence-only
    severity: material
    topic: board-composition
    missingEvidence: >-
      Scale AI's full board of directors composition is not publicly disclosed following the Meta deal and Wang
      departure.
    whyItMatters: >-
      Governance quality and independence of the board are critical given the structural conflict of interest between
      Wang (Meta, Scale board) and Droege (interim CEO without founder authority).
    diligencePath: Request board membership list, committee charters, and conflict-of-interest policies in governance due diligence.
    relatedQuestionRefs:
      - QO006
    relatedTableRefs:
      - TO002
  - type: enumeration-incomplete
    severity: minor
    topic: investor-stakeholder-map
    missingEvidence: >-
      Early-round financing amounts for Series A through Series D are approximate; bridge facilities, debt, or
      undisclosed secondary transactions may not be captured.
    whyItMatters: Full capital stack is needed to assess preference overhang, dilution, and liquidation waterfall.
    diligencePath: Request cap table, preference stack analysis, and full investment agreement summary.
    relatedTableRefs:
      - TO003
  - type: enumeration-incomplete
    severity: minor
    topic: milestone-chronology
    missingEvidence: >-
      Internal product launches, technology milestones, and key partnership events not disclosed publicly are not
      captured in the public milestone timeline.
    whyItMatters: Unreported milestones could reveal critical technology pivots or partnership dependencies.
    diligencePath: Request internal product roadmap history and partnership agreement list in due diligence.
    relatedTableRefs:
      - TO004
  - type: missing-source
    severity: minor
    topic: competitive-moat
    missingEvidence: >-
      No third-party independent assessment of Scale AI's competitive moat durability relative to Appen, Labelbox, and
      emerging competitors is available from public sources.
    whyItMatters: >-
      Moat assessment requires access to win/loss data, pricing comparisons, and customer switch data not publicly
      disclosed.
    diligencePath: >-
      Request win/loss analysis and customer NPS by segment; conduct reference calls with customers who evaluated
      alternatives.
    relatedQuestionRefs:
