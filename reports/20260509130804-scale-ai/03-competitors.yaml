callouts:
  - calloutType: strength
    title: Government Clearances Are Scale's Most Durable Competitive Moat
    body: >-
      Scale AI's DoD IL4 Provisional Authorization and FedRAMP High certifications, combined with the Donovan defense AI
      agent platform, create a near-exclusive position in classified AI data and agent services. No publicly disclosed
      competitor has equivalent clearances. Obtaining these certifications takes years and requires sustained investment
      in security infrastructure, creating a multi-year competitive barrier that cannot be closed quickly even with
      substantial capital.
    claimRefs:
      - CP015
      - CP016
      - CP026
  - calloutType: risk
    title: The Meta Investment Has Become a Competitive Liability
    body: >-
      Meta's strategic investment created an unprecedented competitive conflict: Scale's largest investor (Meta)
      competes directly with Scale's most important customers (Google, OpenAI). The immediate consequence — departure of
      both Google and OpenAI as customers — demonstrates that Scale's quality premium did not create sufficient lock-in
      to retain customers facing a structural conflict-of-interest. Mercor's active customer-poaching (per the lawsuit)
      suggests competitors view this as a sustained vulnerability to exploit.
    claimRefs:
      - CP003
      - CP004
      - CP005
      - CP029
  - calloutType: risk
    title: Annotation Commoditization Is a Structural Long-Term Threat
    body: >-
      Appen's publicly disclosed declining revenues are a leading indicator for the pure-annotation market segment.
      Scale's July 2025 layoffs specifically targeted data-labeling headcount, confirming management's internal
      acknowledgment that the commodity annotation segment is under pressure. If synthetic data and AI-assisted labeling
      reduce demand for human annotation, Scale must successfully transition to evaluation, GenAI platform, and defense
      revenue — segments that are growing but whose size relative to Scale's valuation is unverifiable without revenue
      disclosure.
    claimRefs:
      - CP028
      - CP030
      - CP031
