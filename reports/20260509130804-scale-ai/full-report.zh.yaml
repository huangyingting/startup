            title: 企业 GenAI Platform ARR 未知且未披露
            body: >-
              乐观和基准情景都要求 Enterprise GenAI Platform 收入在 18–24 个月内替代 AI 实验室流失。这一 ARR 数字没有公开披露。没有它，所有前瞻情景都是推测。TIME
              部署案例研究是唯一公开的企业生产证据，但没有量化其 ARR 贡献。
            calloutType: insight
