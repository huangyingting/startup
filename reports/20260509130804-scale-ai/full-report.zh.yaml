      - number: '6.2'
        title: 采用轨迹与增长信号
        blocks:
          - type: paragraph
            body: >
              Scale AI 不公开披露活跃客户总数、收入、ARR 或部署指标。采用信号只能从已披露里程碑、员工数变化、贡献者支付和第三方代理数据中推断。


              最强的规模信号是：（1）已向全球标注贡献者支付超过 $1 billion，表明标注吞吐量可观；（2）处理 15 billion+ 个人工标注决策，证明平台深度；（3）2024 年 5 月以 $13.8
              billion 估值完成 Series F，Amazon、Cisco、Intel、AMD 和 ServiceNow
              等企业买方参与，显示其在相当规模上获得客户验证。战略投资人本身也是企业客户，这为平台成熟度提供了独立佐证。


              2025 年 7 月裁减 14% 员工（约 200 名员工和 500 名承包商），且集中在数据标注业务，是滞后的采用信号：它表明 RLHF 和标注量已从峰值明显下滑，并与 Google、OpenAI 离开以及向
              GenAI Platform 和 Donovan 的战略转型同时发生。Snorkel AI、SuperAnnotate 和 Mercor 均已扩大企业标注产品，证据来自新产品页和合作伙伴 /
              排行榜资料；这说明即便 Scale 正在重新定位，市场活动仍在继续。


              自助增长无法量化。Scale 的 API 文档和定价页公开可访问，显示开发者仍在采用，但公司未披露活跃自助客户数或转化率。Scale
              客户页面上可见的企业客户——Etsy、Instacart、Pinterest、Cohere——只有标识，没有案例研究或结果指标，因此这些账户的采用证据质量有限。
