  - id: TV006
    title: 最终尽调清单
    columns:
      - 主题
      - 缺失证据
      - 重要性
      - 负责人 / 尽调路径
    rows:
      - - 客户流失后按板块拆分的 ARR
        - Google 和 OpenAI 曾是最大客户；二者的 ARR 贡献和离开后的净 ARR 尚未披露
        - 不知道收入缺口和替代 ARR 当前走势，就无法给任何情景承销
        - 数据室：索取 2024 年 Q1 – 2025 年 Q4 按板块 ARR 瀑布；如 NDA 要求可匿名化
      - - 政府合同排期和续约时间表
        - DoD 合同期权期、TCV 和续约率未公开披露
        - 政府护城河是核心投资逻辑支柱；合同不续约是最可能击穿逻辑的单一事件
        - USASpending.gov 查看可见合同；数据室：索取带期权期的政府合同台账；直接访谈 Scale 政府团队负责人
      - - Meta 交易后的现金头寸和现金跑道
        - Meta 交易所得分配给股东；当前运营现金、烧钱速度和现金跑道未披露
        - 看不清现金跑道，就无法判断转型能否在不稀释融资的情况下跑完
        - 数据室：索取资产负债表、P&L 和现金流量表；确认留作运营与分配给股东的金额
      - - 企业 GenAI Platform ARR 和增速
        - GenAI Platform ARR、客户数或从标注转平台的转化率均无公开披露
        - 平台转型是乐观情景的核心驱动；没有 ARR 数据，乐观情景就是猜测
        - 数据室：索取 2025 年 Q4 和 2026 年 Q1 的 GenAI Platform ARR、管线数据和代表性企业合同
      - - 管理团队留任和永久 CEO 计划
        - 永久 CEO 搜索或预计任命时间表未公开；Droege 上任后关键高管留任情况未知
        - 管理连续性直接关系到政府关系维护和企业转型执行
        - 董事会访谈：确认 CEO 搜索状态；索取关键高管留任 90 天复盘；与 HR 团队评估关键人风险
      - - Meta 治理防火墙和数据访问协议
        - Meta 与 Scale AI 的投资人权利协议未公开披露；尚未确认 Meta 作为投资人受到数据访问限制
        - 没有经确认的防火墙，Meta 利益冲突风险无法缓释，企业客户的数据主权担忧也无法解决
        - 数据室：索取投资人权利协议及任何数据访问限制附表；取得关于防火墙充分性的法律意见
    notes: 六项尽调问题对 $29B 隐含估值下的投资决策都是阻断项。优先级最高的三项 —— 按板块 ARR、政府合同排期、现金跑道 —— 应在讨论任何初步 term sheet 前完成。
    claimRefs:
      - CV002
      - CV012
      - CV013
      - CV014
      - CV029
      - CV030
      - CV031
