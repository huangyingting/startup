      - number: '4.3'
        title: 成本结构、毛利率与资本强度
        blocks:
          - type: paragraph
            body: >
              Scale AI 的收入成本主要由人力构成——负责数据标注、RLHF 反馈收集和模型评测任务的标注贡献者。Scale 已向全球贡献者网络支付超过 $1
              billion，印证了核心标注业务的劳动密集属性。相较纯软件业务，这类人力成本让标注业务的毛利率结构性更低。Appen 作为公开上市的标注可比公司，其行业参照显示，标注服务毛利率大约在 25–45%
              区间，且会随着市场商品化继续下行。


              Scale GenAI Platform 和评测产品的毛利率应高于标注服务，因为软件杠杆更强、单位人力投入更少。但企业级 GenAI Platform 项目仍需要大量专业服务和运营投入，毛利率因此低于纯 SaaS
              标杆。政府合同中的数据服务通常只有 15–30% 的利润率，受采购费率结构约束。


              运营费用包括工程和研发（搭建标注工具、GenAI Platform、Donovan 和评测基础设施）、销售和营销（企业销售团队、政府业务拓展）以及一般行政费用。2025 年 7 月裁员前，Scale 约有
              1,400 名员工；裁员后约 1,000 人。14% 的员工裁减叠加 500 名承包商缩减，意味着运营费用明显下降，主要指向数据标注成本底座。这也符合靠削减低毛利、商品化标注劳动力抬升综合利润率的路径。


              Scale 模型的资本强度主要体现在营运资金（向贡献者支付劳务费），而不是实物资本开支（硬件、设施）。基础设施成本（标注工具和模型评测所需的云计算）是次要资本开支因素。因此，相比硬件 AI 公司，Scale
              资本效率更高；但相比纯 SaaS，又更依赖人力。$1 billion 的 Series F 和 Meta 战略投资为公司提供了充足资本，用于转向利润率更高的企业和政府服务。
