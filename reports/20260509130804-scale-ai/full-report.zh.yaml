      - number: '8.6'
        title: 展品
        blocks:
          - type: callout
            title: $29B 估值按战略买家定价——不符合财务投资者逻辑
            body: >-
              $29B 隐含估值是 Meta 作为战略收购方定出的，不是财务投资者定出的。Meta 愿意支付估计 ARR 58–145x，反映的是它对自有 RLHF 数据基础设施的需求，而不是财务回报计算。按 $29B
              共同投资的财务投资者支付了一个无法靠财务回报收回的战略溢价。基准情景下，财务投资者的公允价值是 $8–12B，意味着当前入场价需要减记 60–70%。
            calloutType: insight
