      - number: '8.4'
        title: 可比公司组与估值定位
        blocks:
          - type: paragraph
            body: >
              Scale AI 横跨多个可服务市场，可以用几套不同框架比较。最重要的区别是：Scale 目前大部分收入来自标注和数据标注服务，却被按前沿 AI
              平台公司定价。这造成估值框架错配：套用标注服务倍数（Appen：0.5–2x ARR）意味着 $100M–1B；套用防务 AI 平台倍数（Palantir：25–30x ARR）意味着 $5B–15B；套用前沿
              AI 平台倍数（OpenAI 私募轮：100x+ ARR）意味着 $20B+。合适框架取决于 Scale 未来收入结构中哪个板块占主导。


              Appen (ASX: APX) 是最有启发意义的负面可比：一家上市标注公司，在 AI 实验室建立内部标注能力后削减 RLHF 支出时，收入下滑 60–80%。Appen 市值从峰值约 AUD $3.5B
              跌至客户流失后的约 AUD $250M，说明标注商品化会严重冲击估值。Scale 与 Appen 的关键结构差异是政府护城河：Scale 的防务垂直带来 Appen 没有的收入底座。


              Palantir (NYSE: PLTR) 提供政府 AI 平台可比：它深度嵌入 DoD/IC，切换成本高，拥有多年期政府合同，并凭强增长叙事拿到 25–30x ARR 倍数。Palantir 市值在估计
              $2B+ ARR 上超过 $100B，说明以政府为锚的 AI 平台可以维持高倍数。不过，Palantir 已经在政府收入之外证明了持续商业牵引力；Scale 的商业转向尚未验证。


              Labelbox（私有，约 $1B 估值）是不带政府护城河的标注基础设施可比，显示没有政府合同的标注基础设施大约只能拿 8–10x ARR，远低于 Scale 的隐含倍数。Labelbox 与 Scale
              倍数差额意味着，市场把 Scale 的政府护城河和 Meta 战略期权价值定价为约 $20B+ 溢价。该溢价必须通过政府合同时间表可见度和企业 ARR 轨迹数据来明确验证。
