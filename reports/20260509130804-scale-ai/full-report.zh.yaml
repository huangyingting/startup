      - number: '4.2'
        title: 定价、GTM 动作与销售效率
        blocks:
          - type: paragraph
            body: >
              Scale AI 的 GTM
              动作主要由企业销售驱动，并辅以自助的产品驱动增长层。企业层依赖专门销售团队、关系驱动型交易，以及与客户一起界定并交付大型标注或平台项目的解决方案工程师。企业合同采用定制报价，配备专门运营支持和
              SLA，说明平均合同价值高，销售周期也长于典型 SaaS 公司。


              标注服务按用量和项目定价。Scale 的自助层设立了标价锚点：前 1,000
              个免费单元之后，用户可按公开单元费率购买。企业客户为大规模标注项目谈判价格，这些项目可能包含专门标注员团队、质量保证工作流和平台集成。公司未公开披露折扣或典型交易规模。


              销售周期长度和获客成本（CAC）未公开披露。作为数据服务和基础设施公司，Scale 很可能经历较长企业销售周期（3–12 个月），且包含大量专业服务成分。政府合同销售周期更长（从采购启动到首次收入通常 12–36
              个月）。净留存率（NRR）无法验证——Google 和 OpenAI 2025 年离场代表一次严重的 NRR 压缩事件，但完整财务影响未知。


              分发渠道包括：直接企业销售、政府采购关系（DoD、IC）、与 AI 实验室提供商的伙伴关系，以及面向开发者和研究人员的自助 API / 平台接入。Scale
              与主要投资方（Accel、Amazon、Meta、Nvidia、Cisco）的关系创造了战略联合销售和转介绍渠道，但具体经济影响未披露。


              Scale 的数据标注业务收入集中在少数大型 AI 实验室（Google、OpenAI、Meta、Anthropic）。Meta 投资后，Google 和 OpenAI 于 2025 年离场，这构成实质性的
              GTM 与集中度风险，并直接压缩标注分段收入。
