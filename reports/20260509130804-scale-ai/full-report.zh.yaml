      - number: '5.6'
        title: 证据材料
        blocks:
          - type: callout
            title: 政府清关是持久产品护城河
            body: >-
              Scale AI 的 DoD IL4 和 FedRAMP High 认证，是产品组合中最可防守的护城河。公开披露的 AI 数据服务直接竞争对手没有同等清关。这些认证耗时 2–4 年取得，并要求持续合规维护。对
              Donovan 平台和 Public Sector Data Engine 来说，清关创造了接近独家的竞争位置，新进入者极难复制。
            calloutType: strength
            claimRefs:
              - CE016
              - CE017
              - CE011
          - type: callout
            title: GenAI Platform 面临超大规模云厂商竞争
            body: >-
              Scale GenAI Platform 面临 Amazon Web Services（Bedrock）、Google（Vertex AI）和 Microsoft Azure（Azure AI
              Studio）的强竞争。这些厂商以更低成本和更广分发，提供企业 LLM 定制基础设施。Scale 的差异化依赖更强标注质量集成，但超大规模云厂商可以收购或合作标注供应商，匹配这项能力。GenAI Platform
              是 Scale 的关键转型产品，而这场竞争不能只靠基础设施成本取胜。
            calloutType: risk
            claimRefs:
              - CE021
              - CE023
          - type: callout
            title: 合成数据威胁标注收入模型
            body: >-
              Scale AI 标注商业模式的长期威胁是合成数据：AI 生成的训练数据可在许多应用中替代人工标注数据集。Snorkel AI 等竞争对手正在构建降低人力需求的标注路径。如果合成数据质量在 LLM
              训练中达到与人工标注相当，Scale 核心 Data Engine TAM 可能明显收缩。Scale 未公开披露合成数据能力投入，这是关键产品路线图缺口。
            calloutType: risk
            claimRefs:
              - CE024
              - CE025
          - type: callout
            title: Scale Leaderboard 是开发者护城河
            body: >-
              Scale Leaderboard 是被低估的战略资产。Scale 把自己确立为 LLM 表现的可信公开评测方，创造了面向开发者的触点，在 AI 研究社区持续获得品牌能见度。开发者在模型选择中查阅排行榜，会熟悉
              Scale 作为「金标准」评测方的角色，从而为企业评测合同和政府独立 AI 评估要求创造线索入口。
