      - number: '8.5'
        title: 建议、置信度与最终尽调问题
        blocks:
          - type: paragraph
            body: >
              对 Scale AI 的建议是继续研究，并在入场估值大幅降低时有条件通过。证据支持 Scale 资产质量——政府护城河、标注数据基础设施、品牌和 Meta 验证——但在当前证据质量和收入轨迹下，不支持 $29B
              估值。该建议的主要驱动因素是，入场估值由战略收购方（Meta）按战略逻辑定出，这与财务投资者回报要求不兼容。在看不到客户流失后 ARR、政府合同续约时间表、企业平台转化指标和现金跑道的情况下支付
              $29B，认知上站不住。


              该建议置信度为中低，因为最关键数据——政府合同 ARR、企业平台 ARR 和交易后现金头寸——都是私有信息，公众无法取得。如果这些数据可得且有利，建议可以上调为 $15B 以下的有条件买入，甚至在 $8–12B
              且有强里程碑保护时上调为结构化买入。当前证据质量支持谨慎：本章三十个研究问题中，有八个仍处于部分解决或未解决状态，因为关键输入是私有的。


              会把建议下调为放弃（拒投）的破题条件包括：任何政府合同取消，任何新增企业客户因 Meta 冲突而离开，或确认截至 2026 年 Q1 GenAI Platform ARR 低于
              $30M。会把建议上调为有条件买入的条件包括：政府合同续约确认、企业平台 ARR 超过 $75M，以及任命具备政府 AI 或企业平台经验的永久
              CEO。投资者应注意，关键尽调问题的解决时间线很短——政府合同期权期和企业平台爬坡应在研究日期后 12–18 个月内产生可观察收入信号。
