      - number: '7.3'
        title: 运营与执行风险
        blocks:
          - type: paragraph
            body: >
              Scale AI 最尖锐的运营风险，是在逆风环境下执行商业模式转型。公司正试图从标注量驱动收入（因 AI 实验室客户离开和合成数据趋势而下滑）转向企业 GenAI Platform 和政府 Donovan
              收入（在增长，但速度不确定）。这一转型与 CEO 更替、大幅裁员以及失去两个最大客户同时发生。


              数据安全和标注质量是 Scale 核心业务内生的运营风险。作为一家为 AI 训练处理客户专有数据的公司，任何数据安全事件、质量失败或客户数据滥用事件，都会严重损害企业信任和政府合同资格。Scale 的 SOC 2
              Type II、ISO 27001、DoD IL4 和 FedRAMP High 认证降低了这一风险，但不能消除。本研究未发现公开数据安全事件。


              Scale 的供应链风险主要来自标注贡献者劳动力。Scale 依赖全球人工标注者网络；如果该劳动力出现中断（劳资纠纷、质量下降、Mercor 或其他竞争对手挖人），标注输出质量和交付时间都可能受损。2025 年
              7 月裁员约 500 名承包商，可能削弱了这条供应链的运营冗余。此外，Scale 依赖云基础设施提供商（AWS 及类似厂商），这带来平台集中风险；对云原生公司来说这很常见，但放在其 DoD
              对基础设施主权的要求下，仍值得关注。
