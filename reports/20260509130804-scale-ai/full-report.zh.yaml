      - number: '6.5'
        title: 扩张与客户集中风险
        blocks:
          - type: paragraph
            body: >
              Scale AI 的客户集中风险重大，并已在 2025 年反向兑现。Google——此前是 Scale 最大客户——和 OpenAI 在一个季度内离开，是 Scale 历史上最重要的反向客户事件。CNBC
              报道称，Google 退出源于 Meta 投资后对竞争冲突的担忧。这种流失模式中，Scale 两个最大 AI 实验室客户都因同一底层利益冲突离开，会让任何仍有 Meta 相邻竞争敞口的 AI
              实验室客户面临结构性风险。


              Meta 关系既创造最大扩张机会（Meta 的 AI 计划是训练数据主要消费方，且双方关系被描述为正在扩张），也带来重大依赖风险：Google/OpenAI 离开后，Scale
              相当一部分收入可能集中在单一客户身上，而该客户同时又是 49% 投资方。这种客户兼投资方集中度在结构上很不寻常，可能持续给其他客户带来商业摩擦。


              先落地再扩张机制在理论上存在：从数据标注到 RLHF、评测、GenAI Platform，再到 Donovan，形成了有记录的增购漏斗。TIME
              部署证明企业客户可以从标注试点转化到生产平台使用。但没有公开的扩张率、增购转化数据或单客户平均收入指标。Mercor 诉讼（2025 年 9
              月）指控挖客户，表明至少一个资金充足的竞争对手正威胁现有账户留存。SuperAnnotate 和 Mercor 正在扩大企业标注平台能力，证据来自产品页和合作伙伴资料，这给 Scale 的 Data Engine
              收入带来替代风险。
