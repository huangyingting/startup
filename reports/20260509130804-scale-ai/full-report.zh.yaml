      - number: '6.3'
        title: 具名客户证据与证据质量
        blocks:
          - type: paragraph
            body: >
              Scale AI 最重要的公开客户证据覆盖媒体、国防、电商和 AI 研究中的生产部署。TIME Media 案例是质量最高的公开证据：Scale 的 GenAI Platform 在发布前测试了 TIME AI
              内容的 7,000+ 个对抗攻击向量。这是生产安全应用，有清晰、可衡量的结果指标和不到两个月的部署窗口，并记录在 Scale 官方客户页面上。


              Meta 同时是 Scale 最大战略投资方（2025 年 6 月收购约 49% 股权）和活跃且扩张中的 RLHF 客户。这一双重角色既带来收入锚，也带来治理复杂性：Meta
              作为投资方拥有特权信息访问权，同时又是客户，这会让其他评估 Scale 数据安全实践的客户担心数据访问和利益冲突。


              美国国防部和情报共同体客户的证据来自 Scale 官方博客，内容描述了用于联合部队行动的 DoD 数据整理合同，以及 Donovan
              平台在国家安全场景中的部署。受保密限制，这些不是具名机构客户，但它们是公开来源中可信度最高的政府部署证据，并由 Scale 的 DoD IL4 和 FedRAMP High 认证佐证。企业客户
              Etsy、Instacart、Pinterest 出现在 Scale 客户页面，但没有案例研究或结果指标。


              Mercor 诉讼（2025 年 9 月）指控竞争对手挖客户，间接提供了反向证据：Scale 的企业账户有足够价值，值得竞争对手主动争夺；同时也说明竞争环境下账户留存存在脆弱性。Snorkel
