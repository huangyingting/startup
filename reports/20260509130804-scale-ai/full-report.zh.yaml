      - number: '7.5'
        title: 人员、执行与财务风险
        blocks:
          - type: paragraph
            body: >
              领导层交接是 Scale AI 最实质的风险之一。创始人 Alexandr Wang 用九年搭起 Scale，也一直是政府、企业和 AI 实验室关系的门面。他离职加入 Meta，同时 Meta 成为 Scale
              最大投资方，形成了客户、员工和投资者都看得见的委托代理冲突。临时 CEO Jason Droege 之前没有管理过一家估值 $29B 的 AI 基础设施公司；他的 Uber Eats
              经历对双边市场扩张有运营相关性，但与政府 AI 或企业数据平台商业化并不直接对口。


              裁员后的短期环境里，人才留存也是风险。2025 年 7 月裁掉 200 名员工和 500 名承包商，可能已经打击剩余约 1,000
              名员工士气，尤其是高绩效员工如果看不清临时领导层下的公司方向。掌握防务合同和企业部署制度知识的政府与企业客户经理，是难以替代的资产；能否留住他们，直接关系到合同续约和平台扩张。


              财务风险因 Meta 战略投资得到部分缓释，但这笔交易的资金分给了既有股东，而不是留在 Scale 资产负债表支持运营。因此，分配之后 Scale
              真实现金余额和现金跑道仍不确定。公司没有披露公开烧钱速度、现金头寸或盈利路径。如果 AI 实验室收入流失幅度接近 Google/OpenAI 离开所暗示的水平，Scale 可能在 2025-2026
              年遇到实质收入缺口；除非企业和政府业务增速超预期，否则需要额外外部资本。
