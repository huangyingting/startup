  - number: 7
    title: 风险
    sections:
      - number: '7.1'
        title: 按严重程度排序的风险概览
        blocks:
          - type: paragraph
            body: >
              Scale AI 进入当前投资期时，风险画像更偏战略和执行风险，而不是监管或运营风险。截至研究日期，客户集中度——已通过 Google 和 OpenAI
              离开兑现——是严重程度最高、发生概率也最高的风险。这些离开发生在 Meta 投资和领导层更替同一时期，使 2025 年 Q2 一个季度内出现了三个高度交织的高严重度风险事件。


              最关键的观察是，Scale 的主要风险彼此相互依赖：Meta 投资触发 Google 离开（利益冲突），Google 离开又触发对 Scale 在此前 AI
              实验室收入集中度下商业模式可行性的重新评估，进而触发领导层更替和裁员。每个风险都会放大其他风险。投资人必须评估，政府 / 国防护城河以及 Meta 正在扩大的客户关系，能否提供足够收入底线，支撑公司穿越 AI
              实验室客户流失和企业转型。


              监管和法律风险重要但可管理。Scale 的 DoD IL4 和 FedRAMP High 认证显示其政府业务合规姿态较强。Mercor 诉讼是持续法律风险，但不太可能致命。国防 AI
              的出口管制风险真实存在，但可通过现有认证和合规计划应对。最重要的前瞻性风险，是 Scale 的企业 GenAI Platform 能否在当前现金跑道定义的时间窗口内，为 AI 实验室板块创造足够替代收入。
