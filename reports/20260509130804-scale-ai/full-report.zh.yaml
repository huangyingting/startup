      - number: '1.4'
        title: 产品与商业模式
        blocks:
          - type: paragraph
            body: >
              Scale AI 的商业模式，是向构建和部署机器学习系统的组织出售高质量数据与 AI 基础设施服务。收入来源包括企业数据标注合同（按量和按项目）、Scale GenAI Platform（面向企业 AI
              应用的托管 SaaS 和专业服务）、政府与防务合同（包括美国国防部数据整理，以及服务情报和军事行动的 Donovan 平台），以及面向小型或实验性场景的自助层。Scale 不公开披露收入、毛利率或 ARR。


              Scale Data Engine 收集、整理、标注并验证文本、图像、视频、音频和文档数据。GenAI Platform 用自研流水线把企业数据转成特定领域 AI 应用。Scale RLHF
              提供经过整理的偏好数据，用于人类反馈强化学习，这是训练能遵循指令且更安全的大语言模型的核心。Scale Evaluation 提供可信基准测试，覆盖模型能力（包括 Scale
              Leaderboard）和安全性（包括 WMDP 有害知识基准），同时服务商业模型开发者和美国政府机构。Donovan 平台面向防务与情报任务，提供专用 AI 智能体工作流；凭借 Scale 的 DoD IL4
              和 FedRAMP High 安全认证，该平台可在涉密环境运行。


              定价分两层：企业客户采用定制定价，配备专门运营团队并承诺 SLA；自助客户按量付费接入平台，前 1,000 个标注单元免费。Scale 不公开披露收入；市场估计其 ARR
              达数亿美元级别，这一判断来自投资者评论和可比指标，并非公司确认披露。
