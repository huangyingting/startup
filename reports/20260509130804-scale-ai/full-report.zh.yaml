      - CV009
  - id: TV003
    title: 乐观 / 基准 / 悲观情景表
    columns:
      - 情景
      - 关键假设
      - ARR 估计（2027）
      - 估值逻辑
      - 隐含估值
      - 概率判断
    rows:
      - - 乐观情景
        - 政府合同续约率 >90%；GenAI Platform 达到 $150M+ ARR；Meta 数据采购扩至 $300M+；聘任永久 CEO
        - $700M–850M
        - 25x 远期 ARR（政府 AI 平台溢价）
        - $17.5B–25.5B
        - 20%——需要多个乐观结果同时出现；单个假设并不极端，但必须同时成立
      - - 基准情景
        - 政府合同续约率 85%；GenAI Platform 达到 $75–100M ARR；Meta ARR 稳定；AI 实验室板块小幅下滑
        - $350M–450M
        - 20–22x 远期 ARR（平台 / 服务混合估值）
        - $7.7B–10.4B
        - 55%——多数结果符合带政府护城河标注公司的历史轨迹
      - - 悲观情景
        - 政府合同不续约或延迟；GenAI Platform <$50M ARR；Meta 减少采购；更多 AI 实验室退出
        - $150M–200M
        - 10x 远期 ARR（政府定位削弱的标注服务）
        - $1.5B–2B
        - 25%——只需一个不利事件（政府不续约）兑现；鉴于远期合同不确定性，概率较高
    notes: >-
      情景为基于公开证据构建的分析师估计；不是公司预测。ARR 估计为总 ARR，包含政府、企业、AI 实验室和自助服务板块。 概率判断带主观性，但锚定可比标注公司的结果分布（Appen 先例偏向悲观 / 基准；Palantir
      先例偏向乐观）。以 $29B 入场，基准情景意味着 60–70% 减值。
