      - number: '7.2'
        title: 监管与法律风险
        blocks:
          - type: paragraph
            body: >
              Scale AI 处在国防 AI、企业数据处理和 AI 安全三者交叉处，而这三个领域都受到活跃且不断演变的监管关注。主要监管风险包括：美国政府对国防 AI 的合规要求（ITAR、出口管制、AI
              安全标准）、适用于企业数据处理的数据隐私和 AI 治理法规，以及 Mercor 诉讼引发的竞争法律程序。


              国防 AI 上，Scale 的 DoD IL4 和 FedRAMP High 认证显示其监管合规姿态较强。公司还作出白宫 AI 安全自愿承诺，显示其主动参与 AI 治理。该领域的主要监管风险，是 AI
              模型和数据服务出口管制限制可能扩大——尤其当 Scale 向 DoD 承包商提供的 AI 服务涉及敏感技术转移，可能引发 ITAR 审查。Scale 在国会作证也说明，国会对 AI 的监督正处于活跃状态。


              数据隐私上，Scale 的企业数据标注服务涉及处理客户专有数据。EU AI Act、GDPR 以及美国各州新兴 AI 法律带来合规义务，这些义务可管理但持续演变。Scale 的安全和合规页面显示，公司拥有有效的
              SOC 2 Type II 和 ISO 27001 认证，说明企业合规姿态较成熟。Mercor 诉讼（Scale AI vs. Mercor，2025 年 9
              月）指控挖客户和盗用商业秘密。诉讼结果不确定，但它带来法律不确定性、管理层分心和潜在反诉风险。目前来看，该诉讼尚未威胁 Scale 核心运营或认证。
