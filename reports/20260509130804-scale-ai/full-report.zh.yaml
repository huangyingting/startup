  - number: 6
    title: 客户情况
    sections:
      - number: '6.1'
        title: 客户群分层
        blocks:
          - type: paragraph
            body: >
              Scale AI 的客户群分为三大主要垂直领域：AI 实验室和模型开发者、Fortune 500 企业客户、美国政府及国防机构。每个板块都有不同的买方画像、采购机制、使用场景、收入结构和切换成本。


              AI 实验室（此前是最大板块）购买 Scale 的 RLHF 和评测服务，用于训练和基准测试大语言模型。这些客户历史上包括 OpenAI、Google/DeepMind、Cohere 和
              Anthropic，是技术能力很强的买方，拥有直接采购权，合同周期按季度与训练算力排期绑定。该板块目前进入结构性下滑：Google 于 2025 年 6 月退出，理由是 Meta 交易带来的竞争冲突；OpenAI
              同月结束与 Scale 的关系，释放出前沿模型开发者更广泛转向自建标注能力的信号。


              企业客户——包括 TIME、Etsy、Instacart 和 Pinterest——将 Scale 的 GenAI Platform 和 Data Engine 用于特定领域 AI
              应用，例如内容安全测试、推荐系统和电商 AI。这些买方通常涉及 IT 和数据领导层，采购周期为 6–18 个月，并承诺多年部署。TIME 案例是最强的公开证据：GenAI Platform
              在不到两个月内部署，在生产安全应用中针对 TIME 的 AI 内容输出测试了 7,000+ 个对抗攻击向量。


              政府和国防客户——主要是美国国防部和情报共同体机构——通过多年期合同工具采购数据整理、自主 AI 项目，以及用于涉密行动的 Donovan 平台。由于 DoD IL4 和 FedRAMP High
              认证要求、涉密环境集成和采购惯性，这些客户切换成本最高。地域上，Scale 已披露客户群主要总部位于美国。国际客户数或收入拆分未公开披露。
