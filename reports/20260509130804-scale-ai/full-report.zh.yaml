            title: CEO 交接与治理不透明
            body: >-
              Alexandr Wang 转投 Meta——也就是刚向 Scale 投资 $14.3 billion 的公司——带来两重担忧：（1）失去创始人，他的愿景和关系网塑造了 Scale 的独特位置；（2）Wang
              同时在 Meta 任职并保留 Scale 董事席位，治理边界变得模糊。临时 CEO Jason Droege 具备强运营履历，但尚未带领一家大型科技公司完成重大转型。Meta 交易后的董事会组成未公开披露。
            calloutType: risk
            claimRefs:
