          label: LLM 提供方（OpenAI、Anthropic、Meta LLaMA）
      edges:
        - from: scale
          to: cloud
          label: 基础设施依赖
        - from: scale
          to: contributors
          label: 标注执行
        - from: dod-fedramp
          to: scale
          label: 监管认证
        - from: meta-investor
          to: scale
          label: 战略投资 + RLHF 工作
        - from: meta-investor
          to: ai-labs
          label: 竞争关系（AI 实验室竞争对手）
        - from: scale
          to: ai-labs
          label: RLHF + 标注数据服务
        - from: scale
          to: enterprise
          label: GenAI Platform 交付
        - from: scale
          to: government
          label: Donovan + 防务数据服务
        - from: llm-providers
          to: scale
          label: GenAI Platform 的 LLM API 访问
    approximationNotes: 依赖关系根据公开产品说明和媒体报道推断。具体合同和商业条款未公开披露。
    claimRefs:
      - CE011
      - CE012
      - CE013
      - CE014
  - id: FE004
    title: 产品成熟度 / 能力图
    type: matrix
    layout: standard
    summary: 从四个维度评估 Scale AI 的五个核心产品：技术成熟度、企业适配度、竞争护城河和技术深度，评分 1-5（5=最高）。
    data:
      columns:
        - 成熟度（1-5）
        - 企业适配度（1-5）
        - 竞争护城河（1-5）
        - 技术深度（1-5）
      rows:
        - label: Scale Data Engine
          values:
            - 5
            - 4
            - 3
            - 4
        - label: Scale GenAI Platform 平台
          values:
            - 3
            - 5
            - 3
            - 4
        - label: Scale RLHF
          values:
            - 4
            - 4
            - 3
            - 4
        - label: Scale Evaluation + Leaderboard
          values:
            - 4
            - 4
            - 5
            - 4
        - label: Donovan（防务 AI）
          values:
            - 3
            - 3
            - 5
            - 4
        - label: 公共部门 Data Engine
          values:
            - 4
            - 3
            - 5
            - 3
    approximationNotes: >-
      评分为分析师基于公开证据作出的估计。成熟度 = 1（预发布）到 5（已验证 / 稳定）。企业适配度 = 1（不适合）到 5（企业核心）。竞争护城河 = 1（商品化）到 5（近乎独占）。技术深度 = 1（基础）到 5（高级 /
      自研）。
    claimRefs:
      - CE011
      - CE012
      - CE013
      - CE014
      - CE015
  - id: FU001
    title: 客户旅程图
    type: journey-map
    data:
      nodes:
        - id: awareness
          label: 认知 / 初次接触（会议、开发者文档、转介绍）
        - id: evaluation
          label: 评估 / PoC（API 试用、标注试点、基准测试）
        - id: procurement
          label: 合同 / 采购（企业 6–18 个月；政府多年期 RFP）
        - id: deployment
          label: 生产部署 / 集成（Data Engine → RLHF → GenAI Platform）
        - id: renewal
          label: 续约 / 扩张（增购平台、增加产品、Donovan）
    notes: 旅程仅作示意，不同客群差异很大。企业和政府路径在采购环节分叉（周期、采购工具和合规要求都不同）。自助路径更压缩：认知 → API 试用 → 按量付费激活。
  - id: FU002
    title: 采用 / 部署漏斗
    type: funnel
    data:
      items:
        - label: 发现 / 认知
          value: 100
        - label: 评估 / RFP / API 试用
          value: 30
        - label: 合同 / PoC 完成
          value: 15
        - label: 正式生产部署
          value: 12
        - label: 续约 / 扩张
          value: 9
    notes: 数值是指数化估计（基准 = 100）；Scale AI 未披露转化率数据。漏斗代表企业客群。政府漏斗周期更长，但末端留存更高。自助漏斗在发现阶段量大得多，但转成企业客户的比例低得多。
  - id: FU003
    title: 客户证明矩阵
    type: matrix
    data:
      columns:
        - 生产部署
        - 结果清晰度
        - 证据新鲜度
        - 引用质量
      rows:
        - label: TIME（媒体）
          values:
            - 5
            - 5
            - 5
            - 3
        - label: 美国 DoD / IC
          values:
            - 5
            - 3
            - 4
            - 2
        - label: Meta
          values:
            - 4
            - 3
            - 5
            - 2
        - label: Etsy / Instacart / Pinterest
          values:
            - 3
            - 1
            - 3
            - 1
        - label: Cohere
          values:
            - 3
            - 2
            - 3
            - 1
    notes: >-
      评分 1-5；5 = 最高。生产部署：确认生产使用而非试点。结果清晰度：披露结果的具体性和可衡量性。证据新鲜度：最近证据的时效性（5 = 已确认到 2025 年）。引用质量：来源的独立性和可引用性。DoD
      证据置信度高，但内容涉密，限制了引用质量。Meta 双重身份削弱了证据独立性。
  - id: FU004
    title: 留存 / 复购队列
    type: cohort
    approximationNotes: Scale AI 未公开披露 NRR、GRR、流失率或队列数据。数值为结构性估计，依据合同类型、切换成本分析，以及 AI 标注行业中可比数据服务公司的基准。估计仅用于尽调示意，必须用数据室披露数据确认。
    data:
      columns:
        - 第 1 年
        - 第 2 年
        - 第 3 年
      rows:
        - label: 政府 / 防务
          values:
            - 100
            - 97
            - 95
        - label: AI 实验室（当前留存）
          values:
            - 100
            - 65
            - 50
        - label: 企业（Fortune 500）
          values:
            - 100
            - 80
            - 70
        - label: 自助 / SMB
          values:
            - 100
            - 35
            - 20
    notes: >-
      估计留存百分比（0-100 量表）。政府队列反映多年期合同锁定效应和 IL4/FedRAMP 认证壁垒。AI 实验室队列反映 Google/OpenAI 退出后结构性流失，以及标注服务商品化。企业队列根据可比 SaaS
      数据标注同业估计。自助队列根据开发者平台基准估计。
  - id: FR001
    title: 风险热力图
    type: matrix
    data:
      columns:
        - 发生概率（1-5）
        - 影响（1-5）
        - 缓释成熟度（1-5）
        - 剩余严重性（1-5）
      rows:
        - label: 客户集中 / AI 实验室流失
          values:
            - 5
            - 5
            - 2
            - 5
        - label: CEO / 领导层交接
          values:
            - 4
            - 4
            - 2
            - 4
        - label: Meta 利益冲突
          values:
            - 4
            - 5
            - 2
            - 5
        - label: 商业模式转型执行
          values:
            - 4
            - 5
            - 2
            - 5
        - label: 标注商品化
          values:
            - 4
            - 4
            - 3
            - 4
        - label: 监管 / 防务合规
          values:
            - 2
            - 4
            - 4
            - 2
        - label: Mercor 诉讼
          values:
            - 3
            - 3
            - 3
            - 3
        - label: 裁员后人才留存
          values:
            - 3
            - 3
            - 2
            - 3
    notes: >-
      评分 1-5；5 = 风险最高。发生概率 = 负面事件发生概率。影响 = 一旦发生的破坏程度。缓释成熟度 = 现有缓释措施强度。剩余严重性 = 缓释后的剩余风险。数值为分析师估计。前 4 大风险剩余严重性均为
      4-5，说明在单一拐点上异常集中地叠加了高严重性风险。
  - id: FR002
    title: 风险传导图
    type: dag
    data:
      nodes:
        - id: meta_deal
          label: Meta 战略投资（2025 年 6 月）
        - id: customer_concentration
          label: 客户集中风险
        - id: ceo_transition
          label: CEO / 领导层交接风险
        - id: google_openai_exit
          label: Google + OpenAI 退出
        - id: revenue_attrition
          label: AI 实验室收入流失
        - id: pivot_execution
          label: 商业模式转型执行风险
        - id: margin_pressure
          label: 利润率 / 烧钱压力
        - id: valuation_risk
          label: 估值 / 融资风险
        - id: government_moat
          label: 政府 / 防务收入底线
      edges:
        - from: meta_deal
          to: google_openai_exit
        - from: meta_deal
          to: ceo_transition
        - from: meta_deal
          to: customer_concentration
        - from: google_openai_exit
          to: revenue_attrition
        - from: ceo_transition
          to: pivot_execution
        - from: revenue_attrition
          to: margin_pressure
        - from: pivot_execution
          to: margin_pressure
        - from: margin_pressure
          to: valuation_risk
        - from: government_moat
          to: margin_pressure
    notes: DAG 展示 Meta 交易如何把风险沿因果链传导到估值风险。政府护城河能缓解（降低）利润率压力，但无法消除。四项最高风险都追溯到 2025 年 6 月 Meta 交易这一根因事件。
  - id: FR003
    title: 依赖图
    type: dag
    data:
      nodes:
        - id: scale
          label: Scale AI（运营）
        - id: meta
          label: Meta（49% 投资者 + 客户）
        - id: dod
          label: 美国 DoD / IC（政府客户）
        - id: aws
          label: 云基础设施（AWS / Azure）
        - id: contributors
          label: 标注贡献者网络
        - id: enterprise
          label: 企业客户（TIME、Etsy 等）
        - id: ai_labs
          label: AI 实验室客户（Cohere 等）
      edges:
        - from: meta
          to: scale
        - from: dod
          to: scale
        - from: enterprise
          to: scale
        - from: ai_labs
          to: scale
        - from: scale
          to: aws
        - from: scale
          to: contributors
        - from: scale
          to: meta
        - from: scale
          to: dod
    notes: >-
      该图展示 Scale AI 的关键上下游依赖。Meta 同时在两侧出现：一边作为收入来源流向 Scale，另一边又让 Scale 在治理 /
      资本上产生依赖。政府依赖是正向的（收入），但也带来监管合规义务。云和贡献者依赖构成运营基础。
  - id: FV001
    title: 建议逻辑
    type: flow
    data:
      nodes:
        - id: market
          label: 市场：企业 AI 数据市场规模大、仍在早期；政府 AI 需求韧性强且在增长
          type: input
        - id: product
          label: 产品：RLHF 平台和标注基础设施已验证；GenAI Platform 商业化尚未验证
          type: process
        - id: customers
          label: 客户：Google/OpenAI 已退出；Meta 在扩张；政府客户韧性强；企业客户未确认
          type: process
        - id: financials
          label: 财务：ARR 范围 $200–500M；交易后现金未知；无公开 P&L
          type: process
        - id: risks
          label: 风险：4 项高严重性风险并发；CEO 交接；转型执行；Meta 集中
          type: process
        - id: valuation
          label: 估值：$29B 对应 58–145x ARR；战略买家溢价；基准情景公允价值 $8–12B
          type: decision
        - id: recommendation
          label: 建议：继续研究 / 有条件通过——继续推进前需数据室确认
          type: output
      edges:
        - from: market
          to: product
          label: 市场规模支撑大型标注平台
        - from: product
          to: customers
          label: 产品成熟度影响客户证明质量
        - from: customers
          to: financials
          label: 客户走势界定 ARR 范围
        - from: financials
          to: risks
          label: 财务可见度会降低或放大执行风险
        - from: risks
          to: valuation
          label: 风险画像约束可支撑倍数
        - from: valuation
          to: recommendation
          label: 估值与公允价值区间 → 建议
    notes: 流程展示从市场评估到建议的证据链。估值是关键关口：即便市场和产品质量都高，$29B 入场价也需要多个乐观结果同时兑现，才可能产生财务回报。
  - id: FV002
    title: 估值敏感性
    type: bar
    data:
      items:
        - label: 悲观：$150M ARR × 10x
          value: 1500
        - label: 基准-低：$250M ARR × 20x
          value: 5000
        - label: 基准：$350M ARR × 22x
          value: 7700
        - label: 基准-高：$450M ARR × 25x
          value: 11250
        - label: 乐观-低：$550M ARR × 25x
          value: 13750
        - label: 乐观：$700M ARR × 28x
          value: 19600
        - label: 乐观-高：$850M ARR × 30x
          value: 25500
        - label: 隐含入场价（$29B）
          value: 29000
    notes: 数值以百万美元计。柱形展示不同 ARR 与倍数组合下的隐含企业价值。$29B 入场线说明，只有最乐观的乐观情景接近入场价。所有基准和悲观情景相对入场都意味着显著减记。ARR 估计和倍数是分析师假设，并非公司指引。
  - id: FV003
    title: 估值 / 回报区间
    type: range
    data:
      items:
        - label: 悲观情景——估值
          low: 1500
          mid: 1750
          high: 2000
          unit: $M
        - label: 基准情景——估值
          low: 7700
          mid: 9300
          high: 11250
          unit: $M
        - label: 乐观情景——估值
          low: 17500
          mid: 21000
          high: 25500
          unit: $M
        - label: 战略收购方估值（Meta 隐含）
          low: 27000
          mid: 29000
          high: 32000
          unit: $M
        - label: 建议财务投资者入场上限
          low: 8000
          mid: 11000
          high: 14000
          unit: $M
    notes: >-
      所有数值以百万美元计。区间为分析师估计，基于 ARR 情景分析和可比倍数。「建议财务投资者入场上限」是最高入场价格，在基准和乐观情景按概率加权后仍能提供正期望值。若基准情景概率 >40%，以 $29B
      入场在任何情景权重下都提供负期望值。
  - id: FV004
    title: 投资 KPI
    type: kpi
    data:
      items:
        - label: 市场规模吸引力
          value: 7/10
          unit: score
          trend: stable
        - label: 产品 / 技术证明
          value: 7/10
          unit: score
          trend: stable
        - label: 政府护城河强度
          value: 8/10
          unit: score
          trend: stable
        - label: 管理层稳定性
          value: 3/10
          unit: score
          trend: down
        - label: 客户留存质量
          value: 4/10
          unit: score
          trend: down
        - label: 财务可见度
          value: 2/10
          unit: score
          trend: unknown
        - label: 估值合理性（财务投资者）
          value: 2/10
          unit: score
          trend: down
        - label: 证据质量（章节）
          value: 5/10
          unit: score
          trend: stable
        - label: 风险调整后回报预期
          value: 3/10
          unit: score
          trend: down
    notes: >-
      评分 1–10；10 = 最有利。政府护城河和产品证明是最强支柱。管理层稳定性、财务可见度和估值合理性最弱，反映 CEO 同期交接、缺乏公开财务披露，以及按战略买家定价的入场估值。整体 IC
      建议由最低的三项评分驱动；三者合起来，足以阻断在当前隐含价格下投资。
