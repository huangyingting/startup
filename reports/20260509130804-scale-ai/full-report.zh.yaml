      - number: '4.5'
        title: 财务结论——收入质量、利润率路径与尽调阻断项
        blocks:
          - type: paragraph
            body: >
              Scale AI 的财务画像复杂：资本充足，收入轨迹不清晰，管理团队又要在主要客户明显流失的背景下执行高风险商业模式转型。


              收入质量令人担忧。数据标注板块曾是 Scale 最大的收入驱动，但定位已接近商品化，正面对结构性逆风（Appen 公开收入下滑是先行指标）、客户流失（Google 和 OpenAI 离开）以及直接竞争。GenAI
              Platform 和政府 / 国防板块的收入质量更高（合同更长、锁定更强、商品化风险更低），但它们目前对总收入的贡献未知，且很可能仍较小。2025 年之后，AI 实验室板块的净留存率（NRR）很可能低于
              100%。


              如果转型成功，利润率方向上会改善：剥离低毛利数据标注劳动力、扩大更高毛利的平台和政府板块，将随时间抬升综合毛利率。但转型本身有执行风险，中间阶段（2025–2027
              年）很可能先出现收入压缩，随后平台和政府收入才开始放量。


              资本充足性是最强的财务正面因素。Scale 已融资 $1.6B+，Meta 交易又为股东提供了额外流动性（并带来部分新股资金）。裁员后，公司以更低员工数和更低烧钱速度运营。现金跑道估计为 3+
              年，足以支撑转型执行。


              主要尽调阻断项：（1）没有公开收入或 ARR 数据，估值倍数无法验证；（2）Google 和 OpenAI 流失对收入的影响未知；（3）政府合同收入规模和增长轨迹未披露；（4）分板块毛利率未披露；（5）Meta
              交易中新股与老股交易的拆分未确认；（6）Mercor 诉讼结果可能带来财务影响（赔偿、客户流失）。
