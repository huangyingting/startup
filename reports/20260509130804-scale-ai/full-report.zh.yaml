      - number: '5.5'
        title: 产品路线图、部署与待解问题
        blocks:
          - type: paragraph
            body: >
              截至 2025 年，Scale AI 的产品路线图被 2025 年 7 月转向企业和政府的战略转型隐性牵引：优先推动 Scale GenAI Platform 企业部署，扩展面向政府机构的 Donovan，并扩大
              Scale Evaluation 能力，以服务正在形成的 AI 治理和合规市场。数据标注板块虽仍在运营，但在 2025 年 7 月裁减 200 名员工和 500 名承包商之后，预计会以更小规模运转。


              部署和集成能力：Scale 提供企业 API 访问、面向 MLOps 流水线的 webhook 集成，以及用于应用开发的 Scale GenAI
              Platform。自助门户支持标注任务快速上线。政府侧，Donovan 部署在涉密云环境，并为 DoD 和 IC 系统提供专用集成。Scale
              没有公开变更日志或发布说明；公司也不维护可独立验证的公开产品路线图或面向开发者的状态页。


              开发者信号：Scale Leaderboard 是最面向开发者的公开产品，在 AI 研究和工程社区获得明显关注。WMDP 基准已被 AI 安全研究引用。Scale 的 API
              文档（scale.com/docs）提供程序化访问规格，但相较开发者生态更强的 AI 基础设施公司（如 Hugging Face、LangChain），其开源工具或开发者社区参与度（GitHub
              活动、HackerNews 讨论、包下载量）有限。


              关键待解问题和产品尽调缺口：（1）GenAI Platform 相对超大规模云厂商竞争（AWS Bedrock、Google Vertex AI、Azure AI）的技术深度未获独立验证——Scale
              的平台优势依赖标注质量集成，但超大规模云厂商可收购或合作标注供应商，获得同等能力；（2）Donovan 在涉密环境中面向 AI 智能体的具体技术能力，公开资料披露不足，无法评估其相对其他国防 AI
              公司（Palantir、Booz Allen）的差异化；（3）标注工具相对 Labelbox、Snorkel AI
              和开源替代方案（CVAT、LabelImg）的技术优越性只是公司主张，未被独立基准验证；（4）Scale 的合成数据能力开发路线图未知——合成数据可能替代人工标注，这是关键缺口。
            claimRefs:
