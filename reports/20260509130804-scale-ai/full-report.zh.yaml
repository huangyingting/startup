      - number: '8.2'
        title: 估值背景与当前融资
        blocks:
          - type: paragraph
            body: >
              Scale AI 当前约 $29B 的隐含估值来自 Meta 于 2025 年 6 月以 $14.3B 收购公司约 49%
              股权。多家独立高声誉媒体（TechCrunch、CNBC、Reuters）报道了该交易，本分析将其视为已确认。隐含公司总估值（$29B）基于报道中的约 49% 股权；具体的
              pre-money/post-money 处理和股权结构表没有公开披露。重要的是，Meta 交易所得分给了既有股东，而不是留在 Scale 资产负债表支持运营，因此 Scale 的真实营运资本和现金跑道仍不明确。


              在 $29B 隐含估值下：

              - 低 ARR 估计（$200M）：收入倍数 145x —— 与 2024 年初前沿 AI 实验室倍数一致，但对一家正在经历客户流失的公司而言极高

              - 中 ARR 估计（$350M）：收入倍数 83x —— 可比于市场顶点时期的高增长企业 SaaS

              - 高 ARR 估计（$500M）：收入倍数 58x —— 只有在政府 ARR 快速增长且企业平台转化加速时才说得通


              Scale 历史上最可比的融资事件是 2024 年 5 月 Series F，估值 $13.8B，当时估计 ARR 约 $200–300M（46–69x ARR）。Meta 交易在约 13
              个月内几乎把估值翻倍，而同期 Scale 两个最大客户离开。这一动态说明，Meta 估值反映的是战略收购逻辑（Meta 需要自有 RLHF 数据基础设施），不是财务回报最优。按 $29B
              隐含估值共同投资的投资者，支付的是战略收购方逻辑定下的价格，而不是独立财务投资者回报框架下的价格。估值纪律的关键问题在这里：战略买家能接受财务投资者无法承销的溢价。尽调必须确定财务投资者的入场价上限。


              稀释与优先权压力未知。Meta 交易前，Scale 已累计股权融资约 $1.6B；优先股堆叠、清算权，以及参与型 / 非参与型结构都没有公开披露。任何按 $29B
              隐含估值进入的财务投资者，都必须评估悲观情景下优先权瀑布对普通股回报的影响。
