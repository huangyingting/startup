      - number: '1.6'
        title: 展项
        blocks:
          - type: callout
            title: 政府级 AI 数据基础设施中的先发优势
            body: >-
              Scale AI 在美国政府和防务 AI 数据基础设施中占据独特且可防守的位置。DoD IL4 临时授权和 FedRAMP High 认证，加上 Donovan
              平台和正在执行的美国国防部数据整理合同，形成了大多数商业 AI 数据公司难以匹敌的进入壁垒。这块政府业务带来粘性强、周期多年的合同，也让 Scale 更有机会承接联邦 AI 支出的快速增长。
            calloutType: strength
            claimRefs:
              - CO027
              - CO029
              - CO030
          - type: callout
            title: 客户集中：Meta 交易后 Google 和 OpenAI 离场
            body: >-
              Scale AI 最大的商业客户 Google 和 OpenAI，都在 Meta 战略投资后释放出缩减或退出 Scale 合作的信号。两家 AI
              实验室关系同时流失，既带来实质性收入风险，也验证了投资者对利益冲突的担忧：战略投资方 Meta 同时也是 Scale 最大客户的直接竞争对手。没有收入披露，这一客户集中风险的规模无法量化。
            calloutType: risk
            claimRefs:
              - CO035
              - CO036
              - CO038
