          - type: callout
            title: Meta 交易更像资本再分配，而非为增长融资
            body: >-
              不同于传统融资轮，Meta 战略投资所得主要分配给既有股东和已归属股权持有人，而不是进入 Scale 的运营金库。这意味着 $14.3 billion 交易并未实质改善 Scale 的现金位置和现金跑道。评估
              Scale 的投资者必须独立判断其烧钱速度、剩余现金，以及企业平台转型所需资本。
