  - id: TV002
    title: 投资逻辑 / 反向逻辑表
    columns:
      - 论点
      - 证据依据
      - 什么会改变这一判断
    rows:
      - - 投资逻辑：政府护城河凭高切换成本和多年期合同撑起耐久收入下限
        - DoD IL4、FedRAMP High、Donovan 平台、DIU/DARPA 合同；未宣布不续约
        - 政府合同取消或安全重新认证失败，会拿掉这一投资逻辑支柱
      - - 投资逻辑：数据基础设施和标注平台代表 9 年难以复制的质量工程
        - scale.com 记录的 RLHF 平台、500K+ 贡献者网络、模型评估工具；Stanford HAI 背书
        - 出现系统性标注质量下降证据，或竞争对手以可比规模复制
      - - 投资逻辑：Meta 背书（$14.3B、49%）释放战略价值信号，并确保近期资本供给
        - 多来源确认投资；有记录以来最大单笔 AI 战略投资
        - Meta 减少数据采购，或寻求以压低估值收购剩余股权
      - - 投资逻辑：企业 GenAI Platform 为 AI 实验室流失创造替代收入
        - TIME 部署案例研究；企业客户标识；官方 GenAI Platform 产品页
        - 企业平台 ARR 在 24 个月内（到 2027 年中）未能替代 >50% AI 实验室收入
      - - 反向逻辑：$29B 估值由战略买方决定，不符合财务投资人的理性定价
        - 入场倍数 58x–145x ARR；前 2 大客户同时流失；Google/OpenAI 退出已确认
        - 入场价格显著更低（<$15B），或确认流失后 ARR 快速恢复
      - - 反向逻辑：标注商品化是核心 RLHF 收入的结构性威胁
        - McKinsey/Stanford HAI 报告每 token 标注成本下降；合成数据生成降低人工标注需求
        - 有证据表明 Scale 的平台级评估服务（不是原始标注）能避开商品化
      - - 反向逻辑：CEO 过渡和 Meta 冲突带来缺少先例的管理与治理风险
        - Wang 离任确认；Droege 临时任命确认；未宣布永久 CEO 搜寻
        - 任命具备政府 AI 和企业平台履历的永久 CEO；确认 Meta 与 Scale 客户数据之间存在结构性防火墙
    notes: 投资逻辑和反向逻辑均以证据为根基；排除投机性论点。投资逻辑在结构上成立，但关键收入替代假设需要私有数据确认。 反向逻辑可从公开来源观察，不需要任何私有数据。
