      - number: '1.3'
        title: 融资历史与资本结构
        blocks:
          - type: paragraph
            body: >
              Scale AI 已公开披露的风险融资约为 $1.6 billion，横跨多轮融资，最终落在 2024 年 5 月 F 轮和 2025 年 6 月 Meta 战略投资。F 轮之前，公司此前多轮合计融资约 $600
              million，包括 2021 年 $325 million E 轮，当时 Scale 估值约 $7.3 billion。2023 年，公司裁员约 20%，反映出 AI 市场压力和数据标注需求重估。


              2024 年 5 月，Scale 完成由 Accel 领投的 $1 billion F 轮，投后估值 $13.8 billion。本轮包含新股融资，也包含让既有股东获得流动性的老股交易部分。新投资方包括
              Amazon、Cisco、Intel、AMD、ServiceNow、DFJ Growth、WCM Investment Management、Elad Gil 和 Meta。老股东包括
              Nvidia、Coatue、Y Combinator、Index Ventures、Founders Fund、Tiger Global、Thrive Capital、Spark
              Capital、Greenoaks、Wellington Management 和 Nat Friedman。


              2025 年 6 月，Meta 做出 CNBC 所称其史上最大一笔 AI 投注：支付约 $14.3 billion，取得 Scale AI 少数股权（据报道按完全摊薄口径约占 49%），对应公司估值超过 $29
              billion。Scale 表示公司仍与 Meta 保持运营独立。交易所得流向既有股东和已归属股权持有人，而非全部进入 Scale 资产负债表作为运营资金，因此 Scale 剩余现金和现金跑道仍不清楚。
