      - number: '7.4'
        title: 合作伙伴与依赖风险
        blocks:
          - type: paragraph
            body: >
              Scale AI 最重大的依赖风险来自 Meta——它同时是最大投资方（约 49% 股权）、剩余最大 AI 实验室客户，也是前 CEO 的新雇主。这种三重角色依赖，在风险投资支持的 AI
              领域没有先例，带来集中度和治理风险。如果 Meta 对 Scale 的战略兴趣减弱、减少数据采购或推出新的竞争产品，Scale 将同时面对客户收入流失、估值压力和治理扰动。


              对 AWS 和主要云厂商的云基础设施依赖，是 AI 基础设施公司的标准风险；但对 Scale 政府业务尤为重要，因为平台主权和 AI 训练算力主权是合规要求。Scale 的 DoD
              认证意味着其云基础设施安排已获批准，但云厂商关系的任何变化都可能影响政府合同资格。OpenAI 和 Google 的离开，消除了两个关键合作伙伴关系；它们此前既提供收入，也提供声誉背书。剩余 AI
              实验室伙伴（Cohere 等）规模更小，单个客户的收入集中度也更低。


              政府采购中的渠道和合作伙伴集中度更偏正面，而不是负面：政府合同依托既定合同工具（GSA、DIU、DARPA 渠道）推进，采购规则清晰。不过，政府预算周期和持续决议机制会带来收入确认时间波动。Snorkel AI
