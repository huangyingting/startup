      - number: '5.4'
        title: 信任、安全、合规与质量控制
        blocks:
          - type: paragraph
            body: >
              Scale AI 大量投入信任和合规基础设施，尤其服务政府客户。公司公开披露的认证包括：SOC 2 Type II（企业安全控制审计）、ISO 27001（信息安全管理体系）、DoD IL4
              Provisional Authorization（美国国防部针对受控非密信息和部分涉密数据的数据安全要求）以及 FedRAMP High
              Authorization（美国联邦政府面向高影响系统、包括涉密数据处理的云安全要求）。


              AI 安全上，Scale 已根据 2024 年白宫 AI 安全承诺作出自愿承诺，覆盖 RLHF 安全实践、红队测试和负责任 AI 部署。Scale 贡献了 WMDP（Weapons of Mass
              Destruction Proxy）基准，用于评估 LLM 是否经过训练以防止生成危险内容。WMDP 基准衡量双用途知识领域中的 AI 安全，Scale 的测试与评估白皮书也记录了其负责任 AI 模型评估方法。


              Scale 的标注质量控制是自研体系，但包括：特定任务质量指南、高风险任务的多标注者冗余、统计质量监控、专家复核升级以及标注者间一致性评分。公司声称标注质量行业领先，但没有公开可得的独立第三方质量审计。


              TIME 客户案例（GenAI 平台在不到 2 个月内部署，并测试 7,000+ 个攻击向量）为红队能力提供了部分证据。DIU RCV 项目中标确认 Scale
              技术通过了国防采购要求。这些能佐证技术能力，但仍低于独立第三方技术审计的证据强度。


              隐私和数据治理：Scale 的企业标注数据处理涉及客户提供的数据，可能包含专有或敏感信息。Scale 的安全认证（SOC 2 Type II、ISO 27001）为数据治理控制提供了一定保证。对政府客户，DoD
              IL4 和 FedRAMP High 施加严格数据处理要求，Scale 已证明其符合要求。标注流水线中的客户数据处理，尤其是 AI 实验室的专有训练数据，仍是公开材料未完全回答的尽调关注点。
            claimRefs:
              - CE016
              - CE017
              - CE018
              - CE019
              - CE020
