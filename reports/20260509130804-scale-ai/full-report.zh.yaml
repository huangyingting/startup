  - number: 5
    title: 产品与技术
    sections:
      - number: '5.1'
        title: 产品组合与客户工作流
        blocks:
          - type: paragraph
            body: >
              Scale AI 的产品组合对应 AI 开发中的四类客户工作流问题：（1）为模型开发创建高质量训练数据；（2）为 LLM 对齐和 RLHF 收集人工反馈；（3）独立评估 AI
              模型安全性和能力；（4）以企业级规模部署定制 GenAI 应用。第五条产品线 Donovan 面向国防和情报任务中的专用 AI 工作流。


              Scale Data Engine 是 Scale 的核心产品，也是公司的根基。它帮助 AI 团队跨模态（文本、图像、视频、音频、3D）收集、整理、标注并质检训练数据集。客户工作流是：AI
              工程师定义标注需求和质量标准；Scale 的贡献者网络在 Scale 自研工具和 QA 流水线指导下执行标注任务；标注后的数据集再交付回客户的 MLOps 流水线。Data Engine
              覆盖模型开发全生命周期，从预训练数据整理，到 RLHF，再到评测。


              Scale GenAI Platform 解决企业 AI 部署工作流。企业客户（覆盖零售、媒体、金融、政府等领域的 Fortune 500 公司）带来自有数据和领域需求；Scale 将这些输入转化为定制化 LLM
              应用。平台包含数据摄取、LLM 微调、RAG 流水线配置和生产部署支持。该产品瞄准想要定制 AI、但缺少从零搭建所需深度 ML 能力的企业。


              Scale Evaluation 和 Scale Leaderboard 提供独立模型基准测试服务。AI 实验室和企业使用 Scale Evaluation，从推理、安全、编码、领域知识等维度评估 LLM
              能力。Scale Leaderboard 是 LLM 表现的公开排名，是面向开发者的工具，也让 Scale 在 AI 社区建立了可信第三方评测方的定位。WMDP（Weapons of Mass
              Destruction Proxy）基准是其在 AI 安全上的专项评测贡献。


              Donovan 服务 DoD、IC 和民用政府机构，为关键任务工作流提供 AI 智能体。它接入涉密数据源，支持有授权要求的运营环境，并为国防和情报应用提供 AI 驱动的决策支持。Donovan 部署在 DoD
              IL4 授权环境中，是 Scale 在国防板块的主要竞争护城河。
