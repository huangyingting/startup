      - number: '2.3'
        title: 买方与用户分层及采用路径
        blocks:
          - type: paragraph
            body: >
              Scale AI 的可触达市场由四类主要买方构成，预算权、采购流程和切换成本差异很大。理解这些分层，是判断 Scale 收入韧性和增长天花板的前提。


              第一类——AI 研究实验室和基础模型开发商——是 Scale 最早的客户群。OpenAI、Meta、Google DeepMind、Anthropic、Cohere 和 Adept
              等公司，需要海量高质量标注数据用于预训练和 RLHF。预算权在研究和工程职能。采购通常通过直接谈判，签署多年合同。切换成本中等：实验室可以自建内部标注流水线，也可以换供应商，OpenAI 和 Google
              2025 年离场已证明这一点。这个分层收入集中风险很高。


              第二类——大型企业 AI 采用者——包括用 AI 做内部自动化、客户产品和竞争差异化的 Fortune 500 公司。Cisco、Etsy、Instacart 和 Pinterest 等公司代表这一类别，它们使用
              Scale 的 GenAI Platform 开发特定领域 AI 应用。预算权通常落在 CTO/CDO 组织，并伴随多年平台承诺。由于平台集成更深，切换成本高于标注服务。


              第三类——美国政府与防务——是 Scale 最有辨识度、也最可防守的分层。预算权掌握在 DoD 项目办公室、DHS、NSA/IC
              和民用机构手中。采购遵循联邦采购法规，并使用多年合同工具。切换成本很高，因为需要安全准入（DoD IL4、FedRAMP High）、机构知识，以及 Donovan
              平台带来的竞争护城河。这个分层带来稳定、长周期收入，也能隔离商业客户集中风险。


              第四类——AI 初创公司和研究机构——通过自助层接入 Scale。预算权分散；单个客户支出较低，但数量可能可观。切换成本低（按量付费）。
