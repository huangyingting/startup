      - number: '3.4'
        title: 切换成本、锁定效应与多供应商并用
        blocks:
          - type: paragraph
            body: >
              Scale AI 各市场的切换成本因分段而差异巨大。AI 实验室主要用 Scale 获取标注和 RLHF 数据，切换成本中等：标注流水线在一定程度上可替代，实验室也已展示换供应商的意愿（Google 和
              OpenAI 于 2025 年离场）。这正是 Meta 投资利益冲突会如此迅速造成客户流失的原因——面对数据供应商新投资方带来的利益冲突时，切换成本不足以留住客户。


              企业客户使用 Scale 的 GenAI Platform，切换成本更高：平台牵涉数据迁移、与企业系统的工作流集成、数据流水线定制和组织知识迁移。其切换成本类似中端 SaaS 平台（6–18 个月）。


              美国政府与防务客户的切换成本极高。转向新供应商，要求新供应商取得同等安全准入（DoD IL4 和 FedRAMP High 授权需要 12–36 个月）、重建机构知识，并穿过联邦采购法规。这为 Scale
              的防务分段创造了持久、持续多年的锁定效应。


              标注市场常见多供应商并用：许多大型组织（AI 实验室、企业）会同时把标注工作交给多个供应商，以比较质量、优化成本并保留冗余。这意味着即便是具名客户，Scale 也未必拥有独家关系。Scale
              的自助层明确鼓励多供应商并用（低承诺、按量付费）。Labelbox 的专家网络和 Surge 的质量定位说明，它们有能力从 Scale 客户手中拿走多供应商并用下的标注支出。


              分发能力与供给获取：Scale 的贡献者网络（全球累计支付 $1B+）是一项专有的人类标注员供给。竞争对手必须建立同等网络，才能在质量和吞吐量上竞争。运营 AI 人才市场的 Mercor
              正试图建立替代专家贡献者供应链，直接与 Scale 的贡献者网络竞争。
            claimRefs:
              - CP021
              - CP022
              - CP023
              - CP024
              - CP025
          - type: table
            tableRef: TP004
