  - number: 8
    title: 估值
    sections:
      - number: '8.1'
        title: 投资逻辑与反向逻辑
        blocks:
          - type: paragraph
            body: >
              Scale AI 的投资逻辑靠三根结构性支柱支撑。第一，政府与防务：Scale 的 Donovan AI 平台、DoD IL4/FedRAMP High
              认证，以及深厚政府关系，构成一个耐久收入底座；切换成本高、合同周期长，与 AI 实验室的竞争重叠很低。这个板块是一项战略资产，即便不计商业 AI 实验室业务，也能支撑 $3–5B
              的最低估值。第二，数据护城河：Scale 用九年训练出标注质量基础设施、贡献者管理和模型评估工具，这套能力很难大规模复制。Fortune 500 公司从 AI
              试验转向生产部署后，需要人在回路的数据工作流；上述基础设施让公司有机会捕捉企业 GenAI Platform 收入。第三，Meta 验证：全球最精明的 AI 投资方之一 Meta 投入
              $14.3B，既提供财务和声誉背书，也释放 Scale 数据基础设施的战略价值信号，并带来一个仍在扩大的客户关系。


              反向逻辑同样扎实。在 $29B 隐含估值下，Scale 的交易倍数为估计 ARR 的 58x–145x；与此同时，两大收入贡献方（Google 和 OpenAI）都已离开，创始人 CEO
              也已离任，业务模式正在半路转向。标注商品化风险（合成数据、前沿实验室自建 RLHF）对 AI 实验室板块构成结构性威胁。Meta 既是投资方又是客户，形成治理阴影，吓退其他客户，也制造了 AI
              行业没有先例的委托代理冲突。临时 CEO Droege 没有在 Scale 核心市场被验证过的履历。要守住 $29B 估值，只能依靠一组乐观假设：政府合同续约、企业平台转化、Meta ARR
              增长——而这些都没有公开证据确认。基准情景指向入场价带来的实质稀释风险。


              证据合起来看，Scale 是高质量资产，但处在结构性逆风里。尽调必须确认三件事：政府收入底座是否稳固，企业平台 ARR
              是否以足够速度增长，管理团队能否在不接受稀释性条款新增融资的情况下完成转向。问题回答前，现有证据不支持按 $29B
              隐含估值投资。基于当前证据质量，合适建议是有条件放弃——只有在入场价明显更低且里程碑兑现时才投——或继续研究。
