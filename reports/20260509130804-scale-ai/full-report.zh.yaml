      - number: '8.3'
        title: 乐观 / 基准 / 悲观情景
        blocks:
          - type: paragraph
            body: >
              Scale AI 的情景分析取决于三个关键驱动变量：（1）政府 / 防务 ARR 轨迹以及既有 DoD 合同续约率，（2）商业转向带来的企业 GenAI Platform 转化率和 ARR 增长，（3）Meta
              客户关系的耐久性，以及 AI 实验室客户进一步流失或增厚的情况。


              乐观情景：政府合同续约率 >90%，并随着 Donovan 新项目授予继续扩张；企业 GenAI Platform 借助 Fortune 500 生产部署，到 2027 年做到 $150M+ ARR；Meta
              将数据采购扩大到 $300M+ ARR；临时 CEO Droege 稳住运营，并在 12 个月内引入一位标志性永久 CEO。在这些假设下，2027 年总 ARR 达到 $600M–800M，按 25–30x
              前瞻倍数，估值达到 $18–24B。这意味着相对 $29B 入场价只有有限上行，而且只有多个有利结果同时发生时才可能实现。


              基准情景：政府合同续约率 85%，温和增长；企业 GenAI Platform 到 2027 年实现 $75–100M ARR（爬坡慢于乐观情景）；Meta ARR 保持当前水平；AI 实验室
              ARR（Cohere 等）小幅下滑。2027 年总 ARR 达到 $350–450M，按 20–25x 前瞻倍数，对应 $8–11B 估值，较 $29B 入场价显著减记。基于现有证据，这是最可能的情景。


              悲观情景：政府合同延期或出现实质性不续约；企业 GenAI Platform 到 2027 年未跑通产品市场匹配（平台净 ARR < $50M）；Meta 在建立内部标注能力后减少数据采购；更多 AI
              实验室客户退出。2027 年总 ARR 降至 $150–200M，按 10–12x 前瞻倍数，对应 $1.5–2.5B 估值。在这个估值下，$29B
              入场价在经济上是灾难性的；即便优先权堆叠也可能挡不住总回报亏损。


              各情景的概率信号不对称：乐观情景需要多个乐观结果同时发生；悲观情景只需要政府合同没有按期续约这一个事件。加上入场价由战略买家定出，财务投资者按 $29B 进入时，风险 / 回报结构性不利。基准情景意味着
              60–70% 减记，悲观情景意味着金融价值几乎全损。只有能够把政府护城河的战略期权定价到 $20B+ 的投资者，才有理由接受 $29B 入场。
            claimRefs:
              - CV005
