    title: 建议摘要表
    columns:
      - 维度
      - 评估
      - 依据
      - 条件 / 限定
    rows:
      - - 建议
        - 继续研究 / 有条件通过
        - 估值按战略买方定价；财务投资人的回报模型要求显著更低的入场价
        - 若政府合同排期确认且 GenAI Platform ARR 超过 $75M，则上调至有条件买入
      - - 信心
        - 低-中（35%）
        - 关键输入（政府 ARR、企业平台 ARR、现金跑道）均为私有且未确认
        - 若 2026 年 Q2 收入数据确认基准情景轨迹，信心升至中-高
      - - 风险评级
        - 高
        - 四个高严重性风险并发（集中度、CEO、Meta 冲突、转型执行）；未证明曾处理过这一风险组合
        - 若政府合同续约且管理层稳定，风险降至中
      - - 估值立场
        - 对财务投资人而言，$29B 隐含估值明显偏高
        - 战略收购方逻辑给出 58x–145x 估计 ARR；财务回报模型要求 $8–15B 入场
        - 公允价值区间：基准情景 $8–12B；乐观情景 $15–22B
      - - 决策含义
        - 没有额外数据室可见性，不应以 $29B 投资
        - $29B 入场在基准情景下预期价值为负；投资逻辑要求多个乐观结果同时出现
        - 请求进入私有数据室；将价格纪律设在 <$15B；谈判基于里程碑的估值调整
    notes: 建议对证据和价格敏感。该评估反映公开证据限制和基准情景估值框架。若入场价格不同，或私有数据室确认关键 ARR 指标，可能得出不同建议（有条件买入或观察）。
