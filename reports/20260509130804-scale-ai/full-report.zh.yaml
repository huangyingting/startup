  - number: 4
    title: 财务情况
    sections:
      - number: '4.1'
        title: 收入模式与收入来源
        blocks:
          - type: paragraph
            body: >
              Scale AI 的收入来自三条主要来源：（1）企业数据标注和 RLHF 服务，（2）Scale GenAI Platform（企业 AI 应用开发），以及（3）通过 Donovan 和 Public
              Sector Data Engine 获得的美国政府与防务合同。自助层构成第四条、更小的收入来源，服务研究和实验项目。


              企业数据标注分段长期是 Scale 最大收入驱动，支撑公司从 2016 年增长到 2024 年 F 轮。这一分段向企业和 AI 实验室收取基于项目或基于用量的费用，覆盖标注、RLHF
              数据收集和模型评测。定价模式定制且不透明——Scale 不公布其标注服务的企业定价。自助层提供 1,000 个免费标注单元，此后按单元收费；这是用来获取小客户的免费增值模型。


              Scale GenAI Platform 是利润率更高、更偏 SaaS 的收入来源，目标客户是希望部署定制 AI 应用的企业。这个分段服务包括零售（Etsy、Instacart）和媒体（TIME）在内的
              Fortune 500 公司。Scale 为企业客户定制构建 LLM 驱动应用，并接入客户自有数据和工作流。这条收入可能包含订阅和托管服务成分，但定价细节未公开披露。


              政府与防务合同构成第三条收入来源，正在增长且具有战略重要性。Scale 持有 DoD IL4 和 FedRAMP High 安全准入，能争取涉密和防务级 AI 数据合同。Donovan 平台（防务 AI
              智能体）和 Scale Public Sector Data Engine 面向防务市场，这类市场定价通常不公开，而是基于联邦采购日程。DIU RCV 项目中标和正在执行的 DoD
              数据整理合同，确认了商业相关性。这个分段今天可能小于商业标注，但考虑切换成本，潜在规模更大、持久性也更强。
