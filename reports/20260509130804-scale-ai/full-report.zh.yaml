  - number: 2
    title: 市场分析
    sections:
      - number: '2.1'
        title: 市场边界与定义
        blocks:
          - type: paragraph
            body: >
              Scale AI 位于几个彼此独立但相连的市场交界处，因此在有意义地测算规模之前，必须先把边界讲清楚。核心市场是 AI
              数据服务：为机器学习模型收集、标注、整理和验证训练及评测数据。这个市场包括面向计算机视觉、自然语言处理、语音识别和多模态 AI 的人类标注数据。相邻市场是 AI
              模型评测，即面向大语言模型的可信基准测试和安全测试，Scale Evaluation 和 Scale Leaderboard 在这里竞争。


              再向外扩，Scale 的 GenAI Platform 进入企业 AI 部署市场：帮助大型组织在基础模型之上构建、定制并投入运营生成式 AI 应用的工具和服务。这个市场与超大规模云厂商 AI 服务（Azure
              AI、AWS Bedrock、Google Vertex AI）、精品 AI 咨询公司和 AI 模型 API 厂商重叠。Donovan 平台则切出一个专门的政府与防务 AI 垂直市场，其采购规则和预算机制与商业
              AI 支出不同。


              Scale 核心数据标注服务的现状替代方案包括内部人工审核团队（许多大型 AI 实验室和企业最初都自建标注流水线）、更低成本的离岸服务商，以及自动化合成数据生成。市场测算的关键问题，是应当把服务市场窄定义为 AI
              数据标注服务，还是宽定义为所有 AI 基础设施和工具支出。本章将主要市场定义为 AI 数据服务与评测基础设施（标注、RLHF、基准测试），把企业 GenAI 平台和政府 AI 视为相邻子市场。
            claimRefs:
              - CM001
              - CM002
              - CM003
              - CM004
              - CM005
          - type: table
            tableRef: TM001
            claimRefs: []
      - number: '2.2'
        title: TAM、SAM 与 SOM 的多口径测算
        blocks:
          - type: paragraph
            body: >
              公开来源没有给出足够细、足够可靠的 AI 数据服务 TAM/SAM/SOM
              精确数字，无法直接支撑高置信度估值分析。这里呈现的数字，是基于公开市场代理指标、投资者报道和竞争对手披露模式综合得出的、受证据约束的估计。


              截至 2025 年，全球 AI 数据服务与基础设施的总可用市场（TAM）——包括标注、RLHF、评测和 GenAI 平台工具——估计每年为 $5 billion 到 $20
              billion。区间很宽，反映市场快速演进，也反映不同分析师对边界定义不一致。这个估计锚定在 McKinsey 的发现：88% 的受访组织如今已在至少一个职能中使用 AI（高于 2024 年的
              78%）；Stanford HAI AI Index 2025 也显示 AI 投资已急剧加速。如果每家采用 AI 的 Fortune 1000 企业每年在 AI 数据和评测基础设施上花费
              $1M–$10M，仅企业端合计支出就达到 $1B–$10B，AI 实验室还会带来大量增量需求。


              Scale AI 的可服务市场（SAM）——拥有复杂 AI 数据需求、且有预算购买高端质量的大型企业、领先 AI 实验室和美国政府机构——估计为 $2 billion 到 $8 billion，反映 Scale
              站在市场质量端，而不是低成本商品化标注段。可获取市场（SOM）——Scale 未来 3-5 年现实可捕获规模——估计为 $500M 到
              $2B，这与其后期私有估值所隐含的企业与政府收入轨迹大体一致。公司未披露收入；这些估计不确定性很高，必须用实际财务数据验证。
