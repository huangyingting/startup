chapters:
  - number: 1
    title: 公司概况
    sections:
      - number: '1.1'
        title: 公司身份与概况
        blocks:
          - type: paragraph
            body: >
              Scale AI, Inc. 总部位于加州旧金山，2016 年注册成立。公司对外称使命是「为全球最重要的决策开发可靠的 AI 系统」。2024 年 5 月完成 $1 billion F 轮、2025 年 6
              月获得 Meta 战略投资后，Scale 已是后期未上市科技公司，隐含估值超过 $29 billion。Scale 称自己提供数据和全栈技术，覆盖 AI 系统构建、评测、改进的完整开发生命周期。


              Scale 的核心业务横跨五条产品线：Scale Data Engine（为模型训练做数据收集、整理和标注）、Scale GenAI Platform（企业级生成式 AI 应用部署）、Scale
              RLHF（为大语言模型训练提供人类反馈强化学习数据）、Scale Evaluation（面向模型开发者和公共部门的模型能力与安全基准测试），以及 Donovan（服务防务与情报任务的专用 AI
              智能体工作流）。公司也运营自助层，采用按量付费，让研究和实验项目能以更低门槛接入标注流水线。Scale 的关于页面显示，截至目前，公司已处理超过 15 billion 次人类标注决策，并向全球贡献者支付超过 $1
              billion。
            claimRefs:
              - CO001
              - CO002
              - CO003
              - CO004
              - CO008
              - CO009
      - number: '1.2'
        title: 创始人、领导层与治理
        blocks:
          - type: paragraph
            body: >
              Scale AI 由 Alexandr Wang 于 2016 年创立，Wang 当时 19 岁，从 MIT 退学创业。他把 Scale 从一家小型数据标注初创公司，做成能拿下领先 AI 实验室、Fortune
              500 企业和美国国防部合同的公司。Wang 自创立起担任 CEO，直到 2025 年 6 月；Meta 对 Scale 作出标志性战略投资后，他离任并加入 Meta 的 AI 业务。离任后，Wang 仍保留
              Scale AI 董事席位。


              Jason Droege 在 Wang 离任时于 2025 年 6 月出任 Scale AI 临时 CEO。Droege 于 2024 年 9 月加入 Scale，担任首席战略官。加入 Scale 前，他创办
              Uber Eats，并将其做到 $19 billion GMV 运行率；更早之前，他曾任 Uber 副总裁，也曾是知名风投机构、Scale 投资方 Benchmark
              的合伙人。他在市场型和平台型业务上的运营经历，是 Scale 对外宣称转向企业与政府平台收入的核心支撑。


              Scale 尚未详细披露治理结构。Wang 保留董事席位；Meta 投资和领导层交接后，公司未披露完整董事会组成，也未披露独立董事名单。对潜在投资者而言，这带来实质性的治理不透明风险，尤其是 Wang 同时在
              Meta 任职；Meta 既是战略投资方，也可能在 AI 人才和技术上与 Scale 竞争。
