      - number: '5.2'
        title: 架构与运营模式
        blocks:
          - type: paragraph
            body: >
              Scale AI 的运营模式把软件工具和人在回路执行结合起来——它是 AI
              辅助的混合标注架构，而不是纯软件或纯劳动力模型。核心技术栈包括：（1）面向跨模态标注任务的网页标注工具平台；（2）负责复核、调和和反馈的质量保证流水线；（3）向企业和实验室客户以程序化方式开放 Scale 服务的
              API 基础设施；（4）支持 LLM 定制工作流的 GenAI Platform；（5）面向国防任务的 Donovan AI 智能体运行时。


              标注贡献者网络是 Scale 自有的全球劳动力，公司负责招募、培训、质检筛选和管理。贡献者平台（Scale
              称之为「任务市场」）把标注任务分配给具备相应技能的贡献者，实时监控完成质量，并在质量敏感任务中升级给专家复核。Scale 把贡献者质量管理当作核心差异化能力来投入，并声称自研 QA
              流水线产生的标注质量高于竞争对手。


              Scale API 是 Data Engine 面向开发者的主要接口，支持以程序化方式提交标注任务、取回已完成数据集，并接入 ML 训练流水线。该 API 支持所有标注任务类型（文本分类、边界框、分割、RLHF
              偏好对等），并提供 webhook，以便实时通知任务完成。


              GenAI Platform 的运营模式包括：数据摄取和预处理、LLM 选择和提示词工程、微调或 RAG 流水线配置、红队测试和安全评估，以及带监控的生产部署。这是一种托管服务路径，由 Scale
              工程师和平台工具共同交付定制 AI 应用。


              Donovan 的架构专为有授权要求的环境设计：它运行在 DoD IL4 认证云基础设施上，接入涉密政府数据系统，支持多模态 AI
              智能体工作流（规划、搜索、决策支持），并提供军事应用所需的可解释性功能。Donovan 的技术架构细节未公开披露；其运营模式更接近托管式国防 IT 服务，而不是商业 SaaS 产品。
            claimRefs:
