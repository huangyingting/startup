      - number: '6.4'
        title: 留存、持久性与满意度信号
        blocks:
          - type: paragraph
            body: >
              Scale AI
              未披露任何净留存率（NRR）、总留存率（GRR）、流失率、续约率、客户总数或满意度（NPS/CSAT）指标。这是投资分析中的重大信息缺口。以下所有留存评估，均是从合同类型、切换成本、竞争动态和反向事件中作出的结构性推断，而不是来自已披露数据。


              政府和国防客户是最持久的队列。多年期合同工具、DoD IL4 和 FedRAMP High 认证壁垒、涉密环境集成以及高采购切换成本，共同形成结构性锁定。2024 年 DoD 联合部队数据整理合同和
              Donovan 在涉密场景的部署，显示该板块年留存率较高；按可比政府 IT 合同续约基准估计，为 90–97%。该板块的持久性基本不受同时发生的 AI 实验室客户流失影响。


              企业客户（TIME、Etsy、Instacart、Pinterest）可能签署 12–36 个月合同，并带有续约选择权。没有 NRR 数据，就无法确认先落地再扩张机制是否运转。GenAI Platform 作为
              Data Engine 的增购路径，在理论上提供扩张机会；TIME 部署证明试点可转化为生产安全场景，但没有公开的交叉销售成功率或扩张收入指标。


              AI 实验室板块正在主动收缩。Google 和 OpenAI 均于 2025 年 6 月退出，估计占历史 AI 实验室收入的 20–40%（未披露，基于报道中的客户重要性估计）。剩余 AI
              实验室客户（Cohere 等）也面对转向自建标注的相似结构性压力。截至本分析，未识别到 Scale AI 企业平台的 G2、Gartner Peer Insights 或 Capterra
              评价，因此客户满意度完全无法量化。
