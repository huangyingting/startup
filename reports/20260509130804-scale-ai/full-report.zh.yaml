              - CV011
              - CV012
          - type: callout
            title: 政府合同时间表是最重要的未解决数据点
            body: >-
              Scale 的整套投资逻辑都建立在政府 / 防务收入底座上。DoD 和 IC 合同的期权期时间表、续约率和 TCV 都没有公开披露。USASpending.gov
              可以部分填补缺口，但覆盖不了机密合同。一次不续约事件，是最可能的单点破题因素。
            calloutType: insight
            claimRefs:
              - CV006
