      - number: '3.3'
        title: 能力、定价与监管对比
        blocks:
          - type: paragraph
            body: >
              Scale AI 最重要的竞争差异集中在三处：（1）政府级安全认证（DoD IL4、FedRAMP High），没有公开披露的竞争对手达到同等水平，这让 Scale 在涉密和防务 AI
              数据市场接近独占；（2）Scale Evaluation 的模型安全基准测试和 Scale Leaderboard 已建立声誉，成为 LLM 能力可信第三方评测方；（3）Donovan 防务 AI
              智能体平台，在获准入的 AI 智能体空间没有公开记录的直接竞争者。


              在核心标注业务中，Scale 相比低成本竞争对手的主要差异是质量溢价。自研 Scale Data Engine、质量反馈闭环、专家贡献者网络（已向全球贡献者支付超过 $1B）和标注工具链，都难以快速复制。不过
              Labelbox、Snorkel AI 等竞争对手也在质量管理工作流上投入很大，正在缩小差距。


              定价上，Scale 位于高端层：企业合同采用定制定价，并配备专门运营团队。Appen 和 SuperAnnotate 价格更低，更容易触达那些不需要 Scale 质量保证的中端市场客户。Labelbox
              提供分层定价和自助选项，因此既是 Scale 自助层的直接竞争对手，也竞争企业合同。


              监管与信任姿态是关键战场。Scale 的政府安全准入和监管承诺（白宫 AI 安全承诺、WMDP 基准、国会证词）把它定位为可信政府 AI 数据供应商。Appen 有一些政府业务，但缺少 Scale
              在防务专用安全准入上的深度。Labelbox 和 Snorkel 看起来没有发布同等级别的政府安全认证。由于取得 DoD IL4 和 FedRAMP High 认证需要多年流程，这是 Scale
              最持久、也最可防守的竞争优势。
