  - number: 3
    title: 竞争格局
    sections:
      - number: '3.1'
        title: 竞争格局概览
        blocks:
          - type: paragraph
            body: >
              Scale AI 在 AI 数据与基础设施市场的多个重叠分段竞争，每个分段的竞争动态不同。在核心 AI 数据标注分段，Scale 面对 Appen（ASX
              上市，也是唯一公开交易的直接可比公司）、SuperAnnotate、Labelbox 和 Surge AI。具体到 RLHF 和 LLM 训练数据，Surge AI 和 Mercor
              是最聚焦的直接竞争对手。企业模型评测与基准测试方面，Labelbox 的评测套件和 Snorkel AI 的程序化标注构成相邻威胁。企业 GenAI 平台部署方面，Scale 面对超大规模云厂商（AWS
              Bedrock、Azure AI、Google Vertex AI）、精品 AI 咨询公司和系统集成商——这些对手规模更大、资源更足。


              竞争格局还包括相邻领域的既有公司：传统数据外包公司（Accenture、Capita）、众包标注平台（Amazon Mechanical Turk、Remotasks），以及 AI
              实验室内部标注团队，后者代表「自建」替代方案。可能的新进入者包括在内部构建标注和评测能力的大型科技公司，以及从学术或特定领域 AI 切入的专业精品公司。


              关键竞争动态是 Meta 战略投资：Meta 成为 Scale 最大投资者的同时，也制造了利益冲突，已经导致 Scale 两个最大 AI 实验室客户 Google 和 OpenAI 退出或减少与 Scale
              的合作。这是一个罕见局面：Scale 自己的投资方正在导致最大商业分段客户流失。Mercor 是一家更新、更小的竞争对手，正试图通过直接招揽客户来利用这一脆弱点，Scale 2025 年 9 月诉讼就是证据。
            claimRefs:
              - CP001
              - CP002
              - CP003
              - CP004
              - CP005
          - type: table
            tableRef: TP001
            claimRefs: []
      - number: '3.2'
        title: 竞争对手画像
        blocks:
          - type: paragraph
            body: >
              Appen（ASX: APX）是 Scale AI 标注业务唯一公开交易的直接可比公司。Appen 为全球企业和政府客户提供 AI 训练数据，包括图像、视频、语音、文本和文档标注。随着 AI 标注市场转向高端和
              LLM 专用服务，Appen 公开报告的收入一直下滑。Appen 服务全球企业和政府客户，与 Scale 客户群有部分重叠。Appen 的竞争重心主要是覆盖广度和成本效率，而不是 Scale 的高质量溢价定位。


              Labelbox 是一家位于旧金山的数据标注和模型评测平台，目标客户是企业 AI 团队。Labelbox 已从核心标注扩展到 RLHF 数据收集和模型排行榜，因此在 Scale
              多条产品线上构成直接竞争。Labelbox 定价比 Scale 企业合同更易接近，并建立了专家网络（Labelbox Expert Network）服务质量要求高的标注任务。Labelbox 为机器人 AI
              训练提供专门产品，而 Scale 尚未公开强调这一市场。


              Snorkel AI 专注于使用 AI 辅助的弱监督技术做程序化数据标注，以降低人类参与瓶颈。Snorkel 面向需要构建 AI 训练数据集、但不想投入大量人工标注的企业客户。Snorkel 的方法与 Scale
              的人类专家模型根本不同——Snorkel 试图减少人类标注需求，Scale 的模型则依赖人类质量。Snorkel 客户包括大型企业和部分政府机构。


              SuperAnnotate 是面向企业团队的 AI 标注平台，提供协作式标注工作流、质量管理和 ML 流水线集成。SuperAnnotate 提供服务企业合规的安全功能，并已扩展到计算机视觉、NLP
              和多模态标注。Mercor 是更新的进入者，运营 AI 人才市场，服务 RLHF、模型评测和数据标注，由前 Scale 贡献者创办。Scale 于 2025 年 9 月起诉 Mercor，指控其挖走客户，说明
              Mercor 正在主动瞄准 Scale 的企业客户群。


              Surge AI（现已成为更广泛 RLHF 数据生态的一部分）曾专注于为 LLM 训练提供高质量人类反馈数据，拥有类似 Scale 但规模更小的专家标注员网络。Invisible Technologies 提供
              AI 驱动的业务运营和数据服务，与 Scale 的企业自动化和标注能力竞争。
            claimRefs:
