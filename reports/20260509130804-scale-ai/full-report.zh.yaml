      - number: '2.5'
        title: 市场测算缺口、相互矛盾的估计与尽调问题
        blocks:
          - type: paragraph
            body: >
              AI 数据服务的市场测算存在显著结构性不确定性。没有公开分析师报告能对 AI 数据标注可触达市场给出一致、细颗粒度拆分。估计差异很大，取决于边界只包括人类标注数据服务，还是延伸到 AI 模型评测、企业 AI
              工具和政府 AI 平台支出。本章给出的宽区间（$5B–$20B TAM）反映真实的分析师分歧和市场边界模糊，而不是测量误差。


              合成数据市场让测算更复杂：一些预测假设合成数据会在 3-5 年内大幅替代许多任务中的人类标注，显著压缩 Scale 这类公司的 TAM。另一些观点则认为，人类评测、RLHF
              和对抗性红队永远需要人类判断，并会随着模型增多而扩张。这是投资命题层面的不确定性，潜在投资者必须通过与 AI 实验室和 Scale 客户的一手研究来解决。


              Scale AI 披露的牵引力指标（15B 次决策标注、向贡献者支付 $1B）能说明规模，却不能说明收入。没有收入披露，就无法验证哪个分层主导 Scale 收入结构，也无法判断企业平台和政府分层能否替代下滑的
              AI 实验室收入。Google 和 OpenAI 作为主要客户离场——假设它们曾是 Scale 收入前 10 大贡献者——留下了规模未知的收入缺口，企业与政府转型必须填补这块缺口。量化这两家客户离场的收入影响，是
              Scale 投资案例中最重要、尚未解决的市场测算问题。
            claimRefs:
              - CM027
              - CM028
              - CM029
              - CM030
              - CM031
      - number: '2.6'
        title: 展项
        blocks:
          - type: callout
            title: 企业 AI 采用创造了巨大且增长中的市场——但 Scale 必须赢下企业，而不只是实验室
            body: >-
              McKinsey 发现 88% 的组织已在至少一个职能中使用 AI（62% 正在试验 AI 智能体），这确认了一个巨大且增长中的市场机会。但 Scale 的历史收入集中在 AI 实验室，而这些客户正在离开。由
              Cisco、Etsy、Instacart 和 TIME 等客户代表的企业分层，必须成为主要增长引擎。企业 AI 仍大多处在试点阶段，意味着收入爬坡会比采用曲线滞后 12–24 个月。
            calloutType: insight
            claimRefs:
              - CM019
              - CM020
              - CM021
              - CM022
          - type: callout
            title: 合成数据威胁：标注 TAM 的结构性风险
            body: >-
              合成数据生成——用 AI 生成训练数据，以补充或替代人类标注数据——是 Scale 核心标注业务的长期结构性威胁。如果 AI 实验室把 30–50% 标注支出转向合成数据流水线，人类标注数据的 TAM 可能在
              3–5 年内显著收缩。Scale 转向评测（需要人类判断）和政府 AI（需要人工验证），只能部分对冲这一风险。
            calloutType: risk
            claimRefs:
              - CM025
              - CM026
              - CM027
          - type: callout
            title: 关键测算假设：Google 和 OpenAI 收入贡献未量化
            body: >-
              本分析无法量化 Google 和 OpenAI 离开 Scale AI 的收入影响。如果这两家客户贡献了 Scale 收入的 30–50%（与其最大 / 主要客户地位一致），收入缺口可能达到每年数亿美元。除非
              Scale 按分层披露收入，否则企业与政府转型的真实市场机会仍无法验证。
            calloutType: assumption
            claimRefs:
