      - number: '3.5'
        title: 护城河持久性、商品化风险与反向证据
        blocks:
          - type: paragraph
            body: >
              Scale AI 的竞争护城河在政府 / 防务 AI 中最强，在商品化数据标注中最弱。政府业务（DoD IL4、FedRAMP
              High、Donovan、正在执行的防务合同）高度持久，因为安全准入需要多年取得，防务 AI 工作流中的机构知识也无法快速复制。这构成真实、持续多年的竞争优势。


              在核心标注市场，Scale 的护城河正在削弱。Google 和 OpenAI 作为客户离开——这是 Scale 两个最大商业关系——说明仅靠质量溢价，并不能为 AI
              实验室客户创造牢不可破的锁定效应。竞争对手正在缩小质量差距，质量足够且成本更低的提供商（Appen、SuperAnnotate、离岸团队）仍会在价格敏感型企业中赢得标注工作。


              商品化风险真实存在，并在加速。随着 AI 基础模型训练成熟、合成数据能力增强，人类标注市场的 TAM 可能显著收缩。Snorkel AI
              等竞争对手正在构建减少单位产出人力需求的标注工具。如果趋势延续，标注市场会分化：一个由低成本提供商主导的大型商品化分段，以及一个规模更小、面向专家评测和政府级工作的高端分段；Scale 在后者的位置更强。


              反向竞争证据：（1）Meta 交易后 Google 和 OpenAI 离场，说明 AI 实验室分段存在客户集中风险，切换成本也不足；（2）按 Scale 诉讼，Mercor 主动挖客户，说明竞争对手认为
              Scale 客户脆弱；（3）Appen 收入下滑，是纯标注分段面临结构性逆风的警示指标；（4）Scale 2025 年 7 月裁员专门针对数据标注人员，承认公司在正在商品化的分段投入过度。
