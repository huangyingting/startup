      - number: '1.5'
        title: 关键里程碑与不利事件
        blocks:
          - type: paragraph
            body: >
              从创立到 2026 年，Scale AI 走过十年增长、战略转向和重大不利事件，这些共同定义了公司当前的投资画像。Scale 2016 年创立，最初专注于自动驾驶汽车的程序化数据标注（Waymo
              是早期客户），随后扩展到更广泛的企业 AI 训练数据。到 2021 年，公司凭 E 轮达到 $7.3 billion 估值；到 2022 年，公司公开称自己是估值 $7 billion、员工超过 700 人，并为
              DoD 提供自主系统数据层的公司。


              2023 年，AI 基础模型训练数据支出放缓，Scale 执行了痛苦的 20% 裁员。2024 年 5 月，Scale 以 $13.8 billion 估值完成 $1 billion F
              轮，引入广泛的战略与财务投资方联盟。2024 年，Scale 还加入白宫 AI 安全自愿承诺，并拿下 DoD 联合作战数据整理合同。


              2025 年 6 月是最关键拐点：Meta 作出 $14.3 billion 战略投资，创始人 Alexandr Wang 同时离开 Scale、加入 Meta 的 AI 工作。三周后（2025 年 7
              月），临时 CEO Droege 宣布裁员约 200 名员工（占员工数 14%）和 500 名承包商，理由是公司相较于转向企业与政府平台收入的战略方向，对数据标注人员投入过度。2025 年 6 月，CNBC
              报道称 Google——当时 Scale 最大客户——计划结束或大幅缩减与 Scale 的合作，原因是担忧与 Meta 发生竞争冲突。OpenAI 也在 2025 年 6 月结束了与 Scale 的合作。2025
              年 9 月，Scale 起诉竞争对手 Mercor 和一名前员工，指控其挖走客户。这些不利事件，对评估 Scale 的投资者构成实质性的客户集中和治理风险。
