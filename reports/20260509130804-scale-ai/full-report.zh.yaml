        - Scale Evaluation + Leaderboard
      - - 企业 GenAI Platform
        - 基于基础模型的垂直 GenAI 应用开发
        - 超大规模云厂商 AI 服务（Azure、AWS、GCP）
        - 企业自建 GenAI；精品 AI 咨询
