      - number: '2.4'
        title: 增长驱动因素与采用约束
        blocks:
          - type: paragraph
            body: >
              Scale AI 可触达市场最强的增长驱动因素，是企业采用 AI 正在加速。McKinsey 2025 年 State of AI 调研显示，使用 AI 覆盖至少一个业务职能的组织比例，从上一年的 78% 跳升至
              88%，其中 62% 正在积极试验 AI 智能体。这个宏观扩张，为四类买方分层中的数据标注、模型评测和企业 AI 部署工具带来结构性需求。


              第二个主要驱动因素，是大语言模型提供商持续增多——OpenAI、Meta、Anthropic、Google、Mistral、Cohere 及其他厂商，每一家都需要持续的 RLHF
              循环、安全基准测试和规模化能力评测。基础模型开发商越多，对专家级训练数据和中立评测基础设施的需求也越高。Scale 的 Evaluation 产品和 Scale Leaderboard 正好受益于这一趋势。


              美国政府 AI 投资是尤其强劲的增长驱动因素。Scale 的安全准入（DoD IL4、FedRAMP High）、Donovan 平台和正在执行的防务合同，让它有机会承接更大份额的联邦 AI 预算。随着 DoD
              将 AI 融入监视、后勤、网络安全和自主系统，防务 AI 支出预计会显著增长；这些场景都需要可信数据基础设施。


              采用约束同样明显。第一，Meta 战略投资后，最大 AI 实验室正从 Scale 分散出去，可能压低收入。第二，合成数据生成技术（部分 AI
              实验室在内部使用）长期可能减少某些应用对人类标注数据的需求。第三，Appen、SuperAnnotate、离岸团队等低成本提供商竞争激烈，给商品化标注段带来利润率压力。第四，企业 AI 项目仍大量停留在试点 /
              POC 阶段——McKinsey 指出，多数组织还在测试，而非大规模推广 AI——因此企业平台收入增长可能滞后于采用曲线。第五，政府采购周期长且依赖预算，导致合同收入波动。
