  - id: TM002
    title: TAM / SAM / SOM 或规模测算视角表
    columns:
      - 规模测算视角
      - 市场范围
      - 估计
      - 置信度
      - 依据 / 关键假设
    rows:
      - - TAM — 广义 AI 数据与基础设施
        - 全球所有 AI 数据服务 + 评估 + 企业 GenAI 工具
        - $10B–$30B
        - 低
        - McKinsey：88% 的组织使用 AI；如果大型组织在数据 / 工具上支出 $1M–$10M，合计可达 $10B+；不确定性高
      - - TAM — 仅 AI 数据标注
        - 全球面向 ML 的人工标注数据服务
        - $2B–$8B
        - 低
        - 由上市公司类比（Appen 收入代理指标）+ 全球市场放大系数推导；高度不确定
      - - SAM — 高端 AI 数据（Scale 定位）
        - 大型企业、AI 实验室、政府——高端标注 + 评估 + 平台
        - $1.5B–$6B
        - 低
        - Scale 面向质量端；SAM 约为标注 TAM 的 30–50%；政府增加独立 SAM 板块
      - - SAM — 政府 / 防务子市场
        - Scale 可服务的美国政府 AI 数据和评估预算
        - $300M–$1B
        - 低
        - 按 DoD AI 投资增长和涉密供应商供给约束估计；无公开预算拆分
      - - SOM — Scale 3-5 年可获取
        - 基于竞争位置，Scale AI 在 3-5 年内可现实捕获的收入
        - $500M–$2B
        - 低
        - 若 ARR 在 $500M-$2B 区间，15-60x ARR 可支撑 $29B 估值；但收入未获确认
    notes: 所有估计都是证据约束下的近似值，来自市场代理数据、投资者报道和公开牵引力指标。收入未公开披露。这些数字只作方向性参考，仍需用实际财务数据验证。
