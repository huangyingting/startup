      - number: '4.4'
        title: 资本充足性与融资历史
        blocks:
          - type: paragraph
            body: >
              Scale AI 累计外部融资约 $1.6 billion+。融资历史包括：2016–2019 年的种子轮和早期轮次（包括 Y Combinator、Index Ventures、Founders
              Fund）；2021 年以约 $7.3 billion 估值完成的 $325 million Series E；Series F 前累计约 $600 million；以及 2024 年 5 月由 Accel
              领投、Amazon、Meta、Cisco、Intel、AMD、ServiceNow、Nvidia、DFJ Growth、WCM 以及 Tiger
              Global、Thrive、Greenoaks、Wellington、Nat Friedman、Elad Gil 等老股东参与的 $1 billion Series F，估值 $13.8
              billion。Series F 同时包含新股（公司获得新现金）和老股交易（为现有股东提供流动性）。


              2025 年 6 月 Meta 战略投资约 $14.3 billion，获得少数股权（约占已发行股权 49%）。关键在于，Meta
              投资的大部分资金分配给了现有股东和已归属股权持有人，而不是进入公司运营金库，符合老股交易结构。Meta 交易中实际进入 Scale 运营业务的新股资金尚未完全披露。Scale 仍保持独立公司结构；Meta
              持有少数股权。


              没有公开财务报表，现金余额未知。Series F 于 2024 年 5 月完成；如果其中相当部分为新股资金（$500M+ 进入公司），再叠加 Meta 交易的新股部分，按当前烧钱速度，Scale 很可能拥有 3+
              年的充足现金跑道。2025 年 7 月裁减 200 名员工和 500 名承包商，加上战略上撤离数据标注，都是降低成本的动作，意在拉长现金跑道、提升现金效率。


              烧钱速度未公开披露。Scale 裁员前的费用底座（1,400+ 名员工、大量标注承包商成本）意味着月度烧钱规模不小。裁员后，现金效率应明显改善。Scale 未公开披露债务融资安排或项目融资义务。Meta
              交易带来了结构性依赖（Meta 同时是投资方，也是这些 AI 服务的关键客户），但未披露任何经济性约束或限制条款。
