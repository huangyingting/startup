  - id: TV005
    title: 投资逻辑破裂与否决触发因素表
    columns:
      - 触发因素
      - 阈值 / 事件
      - 对投资逻辑的传导
      - 行动含义
    rows:
      - - 政府合同未续约
        - 任何 DoD 或 IC 合同被取消，或未在计划期权期续约
        - 政府收入托底逻辑失效；基准情景估值降至 Appen 同等水平（$1.5–3B 区间）
        - 硬性放弃 —— 政府护城河是核心支柱；一旦失效，投资逻辑无法修复
      - - 更多企业客户以 Meta 冲突为由流失
        - 任何非 AI 实验室企业客户明确将 Meta 关系列为退出或不采购原因
        - 确认 Meta 冲突是系统性的 GTM 阻力，而不只是 AI 实验室特有问题；TAM 风险从 AI 实验室扩散到更大范围
        - 若确认则硬性放弃；或必须提高入场折扣，以反映结构性获客约束
      - - Meta ARR 下滑
        - Meta 数据采购 ARR 连续两个季度环比下降 >20%，且没有可由其他企业增长解释
        - 乐观情景的锚定客户假设失效；不再有大型锚定客户；收入集中度塌陷
        - 硬性放弃 —— 收入地板消失；触发所有情景重新承销
      - - 截至 2026 年 Q4，GenAI Platform ARR 低于 $30M
        - 企业 GenAI Platform ARR 经确认为低于 $30M（2026 年 Q4 收入日期或数据室披露）
        - 确认企业转型没有达到最低可行转化；ARR 替换速度不足，无法在投资逻辑窗口内抵消 AI 实验室流失
        - 放弃或严守价格纪律：入场价较基准情景上限下调 40%
      - - CEO 交接失败信号
        - Droege 上任后 12 个月内未能签下任何 >$5M 企业交易，或 Droege 任命后 2 名以上高级领导离职
        - 表明管理团队无法执行企业转型；执行风险倍数上升
        - 黄旗 —— 重新评估管理能力；推进前向董事会确认永久 CEO 时间表
    notes: 这些触发因素不需要内部访问权，可通过公开报道或数据室披露观察。政府合同触发因素最关键：它是二元事件，可公开观察（USASpending.gov），且会直接拿掉核心投资逻辑支柱。
    claimRefs:
      - CV003
      - CV006
      - CV007
      - CV008
      - CV009
      - CV029
