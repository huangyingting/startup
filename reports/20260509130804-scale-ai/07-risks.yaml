callouts:
  - id: KR001
    type: finding
    severity: high
    title: "Four High-Severity Risks Crystallized Simultaneously in Q2 2025"
    body: "Customer concentration (Google/OpenAI exits), CEO transition (Wang to Meta), Meta conflict of interest (deterring AI labs), and business model pivot execution are all high-severity risks that emerged in a single quarter. Their interdependency means that failure on any one dimension amplifies the others. This represents an unusually concentrated risk inflection for a late-stage company at a $29B+ implied valuation."
    claimRefs: [CR001, CR002, CR003, CR004]

  - id: KR002
    type: gap
    severity: high
    title: "No Burn Rate, Cash Position, or Runway Disclosed"
    body: "Scale AI has not disclosed its post-Meta-deal cash position, quarterly burn rate, or expected runway. The Meta transaction proceeds were distributed to shareholders rather than retained for operations, creating uncertainty about whether current revenue is sufficient to fund the business model pivot without additional capital raises."
    claimRefs: [CR028, CR026]

