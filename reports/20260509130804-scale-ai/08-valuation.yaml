  - id: TV005
    title: Thesis-Break and Kill Triggers Table
    columns:
      - Trigger
      - Threshold / Event
      - Transmission to Thesis
      - Action Implication
    rows:
      - - Government contract non-renewal
        - Any DoD or IC contract cancelled or not renewed at scheduled option period
        - Eliminates the government floor thesis; base case valuation collapses to Appen-equivalent ($1.5–3B range)
        - Hard pass — government moat is the primary thesis pillar; its failure is a non-recoverable thesis break
      - - Additional enterprise customer citing Meta conflict
        - Any non-AI-lab enterprise customer explicitly citing Meta relationship as reason for exit or non-purchase
        - >-
          Confirms that Meta conflict is a systematic go-to-market inhibitor, not just an AI lab-specific issue; expands
          the TAM risk beyond the AI lab segment
        - >-
          Hard pass if confirmed; increases required entry discount to reflect structural customer acquisition
          constraints
      - - Meta ARR decline
        - >-
          Meta data purchasing ARR falls >20% QoQ for two consecutive quarters without explanation from alternative
          enterprise growth
        - Eliminates the anchor customer assumption of the bull case; no remaining large anchor; concentration collapse
        - Hard pass — revenue floor disappears; triggers re-underwriting of all scenarios
      - - GenAI Platform ARR below $30M as of Q4 2026
        - Enterprise GenAI Platform ARR confirmed below $30M (Q4 2026 revenue date or data room disclosure)
        - >-
          Confirms that the enterprise pivot is not achieving minimum viable conversion; ARR replacement pace is
          insufficient to offset AI lab attrition within the thesis window
        - 'Pass or price discipline: reduce entry price by 40% from base case ceiling'
      - - CEO transition failure signal
        - >-
          Droege fails to close any enterprise deal >$5M in first 12 months, OR 2+ senior leadership exits post-Droege
          appointment
        - Signals that the management team cannot execute the enterprise pivot; increases execution risk multiplier
        - Yellow flag — reassess management capability; seek board clarity on permanent CEO timeline before proceeding
    notes: >-
      Triggers are designed to be observable from public reporting or data room disclosures without requiring insider
      access. The government contract trigger is the most critical: it is binary, publicly observable (USASpending.gov),
