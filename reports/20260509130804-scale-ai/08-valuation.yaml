      Scores 1–10; 10 = most favorable. Government moat and product proof are the strongest pillars. Management
      stability, financial visibility, and valuation fairness are the weakest, reflecting the concurrent CEO transition,
      lack of public financial disclosure, and strategic-buyer-priced entry valuation. Overall IC recommendation driven
      by the bottom three scores, which are collectively blocking for investment at the current implied price.
callouts:
  - id: KV001
    type: finding
    severity: high
    title: $29B Valuation Is Strategic-Buyer Priced — Not Financial-Investor Rational
    body: >-
      The $29B implied valuation was set by Meta acting as a strategic acquirer, not a financial investor. Meta's
      willingness to pay 58–145x estimated ARR reflects its need for proprietary RLHF data infrastructure, not a
      financial return calculation. Financial investors co-investing at $29B are paying a strategic premium they cannot
      recover through financial returns. Fair value for a financial investor is $8–12B under the base case, implying
      60–70% markdown at current entry.
    claimRefs:
      - CV001
      - CV010
      - CV011
      - CV012
  - id: KV002
    type: gap
    severity: high
    title: Government Contract Schedule Is the Single Most Important Unresolved Data Point
    body: >-
      Scale's entire investment thesis rests on the government/defense revenue floor. The option period schedule,
      renewal rates, and TCV of DoD and IC contracts are not publicly disclosed. USASpending.gov can partially address
      this gap but does not cover classified contracts. A single non-renewal event is the most likely single-event
      thesis killer.
    claimRefs:
      - CV006
      - CV007
      - CV031
  - id: KV003
    type: gap
    severity: high
    title: Enterprise GenAI Platform ARR Is Unknown and Undisclosed
    body: >-
      The bull and base case scenarios both require Enterprise GenAI Platform revenue to replace AI lab attrition within
      18–24 months. This ARR figure is not publicly disclosed. Without it, all forward scenarios are speculation. The
      TIME deployment case study is the only public enterprise production evidence, and its ARR contribution is not
      quantified.
    claimRefs:
      - CV005
      - CV008
      - CV017
      - CV029
