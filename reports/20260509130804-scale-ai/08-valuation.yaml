  - id: bull-base-bear-scenarios
    title: Bull / Base / Bear Scenarios
    body: >
      The scenario analysis for Scale AI hinges on three key driver variables: (1) the government/defense ARR trajectory
      and renewal rate for existing DoD contracts, (2) the enterprise GenAI Platform conversion rate and ARR growth from
      the commercial pivot, and (3) the Meta customer relationship durability and any further AI lab attrition or
      accretion.


      Bull case: Government contracts renew at >90% and expand with new Donovan program awards; enterprise GenAI
      Platform achieves $150M+ ARR by 2027 driven by Fortune 500 production deployments; Meta expands its data
      purchasing to $300M+ ARR; Interim CEO Droege stabilizes operations and attracts a marquee permanent CEO within 12
      months. Under these assumptions, total ARR reaches $600M–800M by 2027, and at a 25–30x forward multiple, valuation
      reaches $18–24B. This implies modest upside from $29B entry and is achievable only under multiple concurrent
      favorable outcomes.


      Base case: Government contracts renew at 85% and grow modestly; enterprise GenAI Platform achieves $75–100M ARR by
      2027 (slower ramp than bull); Meta ARR holds at current levels; AI lab ARR (Cohere, others) declines modestly.
      Total ARR reaches $350–450M by 2027 at 20–25x forward multiple, implying a valuation of $8–11B—a significant
      markdown from the $29B entry. This is the most likely scenario given the evidence available.


      Bear case: Government contracts face delays or a material non-renewal; enterprise GenAI Platform fails to achieve
      product-market fit by 2027 (net ARR < $50M from platform); Meta reduces data purchasing following establishment of
      in-house annotation capability; additional AI lab customers exit. Total ARR falls to $150–200M by 2027 at 10–12x
      forward multiple, implying $1.5–2.5B valuation. At this valuation, the $29B entry becomes economically
      devastating; even preference stacks may not protect against total return loss.


      The probability signal for each case is asymmetric: the bull case requires multiple concurrent optimistic
      outcomes; the bear case requires only the government contract not renewing on schedule (a single event). This
      asymmetry, combined with the entry price being set by a strategic buyer, creates a structurally unfavorable
      risk/return ratio for a financial investor at $29B. The base case implies a 60–70% markdown, and the bear case
      implies near-total loss of financial value. Only investors who can price the strategic optionality of the
      government moat at $20B+ can justify the $29B entry.
