  - id: valuation-context-and-financing
    title: Valuation Context and Current Financing
    body: >
      Scale AI's current implied valuation of approximately $29B derives from Meta's June 2025 purchase of approximately
      49% of the company for $14.3B. This transaction was reported by multiple independent high-reputation sources
      (TechCrunch, CNBC, Reuters) and is considered confirmed for this analysis. The implied total company valuation
      ($29B) is based on the reported ~49% equity stake; the precise pre-money/post-money treatment and cap table
      structure are not publicly disclosed. Importantly, the Meta transaction proceeds were distributed to existing
      shareholders rather than retained on Scale's balance sheet for operations, leaving Scale's actual working capital
      and cash runway uncertain.


      At the $29B implied valuation:

      - Low ARR estimate ($200M): 145x revenue multiple — consistent with frontier AI lab multiples in early 2024 but
      extreme for a company experiencing customer attrition

      - Mid ARR estimate ($350M): 83x revenue multiple — comparable to high-growth enterprise SaaS at peak market
      conditions

      - High ARR estimate ($500M): 58x revenue multiple — justified only if government ARR is growing rapidly and
      enterprise platform conversion is accelerating


      The most comparable funding event in Scale's history is the May 2024 Series F at $13.8B on approximately $200–300M
      estimated ARR (46–69x ARR). The Meta deal nearly doubled that valuation in approximately 13 months despite the
      concurrent departure of two of Scale's largest customers. This dynamic suggests the Meta valuation reflects
      strategic acquisition logic (Meta's need for proprietary RLHF data infrastructure) rather than financial return
      optimization. Investors co-investing at $29B implied are therefore paying a price set by a strategic acquirer's
      logic, not an arm's-length financial investor's return framework. This is a critical valuation discipline issue:
      strategic buyers accept premiums that financial investors cannot underwrite. The diligence path must establish a
      financial investor's ceiling for the entry price.


      Dilution and preference overhang are unknown. Scale has raised approximately $1.6B in equity prior to the Meta
      deal; the preference stack, liquidation rights, and participating vs. non-participating structures are not
      publicly disclosed. Any financial investor entering at $29B implied must assess the preference waterfall impact on
      common equity returns in the bear case.
