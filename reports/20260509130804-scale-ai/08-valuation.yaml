  - id: recommendation-and-final-diligence
    title: Recommendation, Confidence, and Final Diligence Asks
    body: >
      The recommendation for Scale AI is Research-More with a Conditional Pass at materially lower entry valuation. The
      evidence supports the quality of Scale's assets—government moat, annotation data infrastructure, brand, and Meta
      validation—but does not support the $29B valuation at current evidence quality and revenue trajectory. The primary
      driver of this recommendation is that the entry valuation was set by a strategic acquirer (Meta) operating under
      strategic logic incompatible with financial investor return requirements. Paying $29B without visibility into
      post-attrition ARR, government contract renewal schedule, enterprise platform conversion metrics, and cash runway
      is epistemically unsound.


      The confidence in this recommendation is medium-low because the most critical data—government contract ARR,
      enterprise platform ARR, and post-deal cash position—are private and not publicly accessible. If those data points
      were available and favorable, the recommendation could upgrade to Conditional Buy at a price below $15B, or even
      Structured Buy at $8–12B with aggressive milestone protections. The current evidence quality justifies caution:
      eight of the thirty research questions in this chapter have partial or unresolved status because the key inputs
      are private.


      Thesis-break conditions that would move the recommendation to Pass (reject): any government contract cancellation,
      any additional enterprise customer citing Meta conflict, or confirmation that GenAI Platform ARR is below $30M as
      of Q1 2026. Conditions that would upgrade to Conditional Buy: government contract renewal confirmation, enterprise
      platform ARR exceeding $75M, and a permanent CEO appointment with government AI or enterprise platform experience.
      Investors should note that the timeline for resolution of the critical diligence questions is short—the government
      contract option periods and enterprise platform ramp should produce observable revenue signals within 12–18 months
      of the research date.
