  - id: TV002
    title: Thesis / Anti-Thesis Table
    columns:
      - Argument
      - Evidence Basis
      - What Would Change This View
    rows:
      - - 'THESIS: Government moat creates durable revenue floor with high switching costs and multi-year contracts'
        - DoD IL4, FedRAMP High, Donovan platform, DIU/DARPA contracts; no announced non-renewal
        - Government contract cancellation or failed security re-certification would eliminate this thesis pillar
      - - 'THESIS: Data infrastructure and annotation platform represent 9 years of unreplicable quality engineering'
        - >-
          RLHF platform, 500K+ contributor network, model evaluation tooling documented on scale.com; Stanford HAI
          endorsement
        - Evidence of systematic annotation quality degradation or competitor replication at comparable scale
      - - 'THESIS: Meta validation ($14.3B, 49%) signals strategic value and secures near-term capital'
        - Multi-source confirmed investment; largest single AI strategic investment on record
        - Meta reducing data purchasing or seeking to acquire remaining equity at depressed valuation
      - - 'THESIS: Enterprise GenAI Platform creates replacement revenue for AI lab attrition'
        - TIME deployment case study; enterprise customer logos; official GenAI Platform product page
        - Enterprise platform ARR failing to replace >50% of AI lab revenue within 24 months (by mid-2027)
      - - 'ANTI-THESIS: $29B valuation set by strategic buyer is not financial-investor-rational'
        - Entry multiple of 58x–145x ARR; concurrent attrition of top 2 customers; Google/OpenAI exit confirmed
        - Entry at materially lower price (<$15B) or confirmation of rapid post-attrition ARR recovery
      - - 'ANTI-THESIS: Annotation commoditization is a structural threat to core RLHF revenue'
        - >-
          McKinsey/Stanford HAI report declining per-token annotation cost; synthetic data generation reducing human
          annotation requirements
        - >-
          Evidence that Scale's platform-level evaluation services (not raw annotation) are insulated from
          commoditization
      - - 'ANTI-THESIS: CEO transition and Meta conflict create management and governance risk without precedent'
        - Wang departure confirmed; Droege interim appointment confirmed; no announced permanent CEO search
        - >-
          Appointment of a permanent CEO with government AI and enterprise platform track record; structural firewall
          between Meta and Scale customer data confirmed
    notes: >-
      Thesis and anti-thesis are evidence-grounded; speculative arguments excluded. The thesis is structurally coherent
      but requires private data confirmation for the critical revenue replacement assumption. The anti-thesis is
      observable from public sources without any private data requirement.
