chapter:
  number: 8
  title: Valuation
  summary: >-
    Scale AI's implied valuation of approximately $29B (derived from Meta's June 2025 investment of $14.3B for ~49%
    equity) represents a revenue multiple of 58x–145x on estimated ARR of $200–500M. This multiple is not supportable
    under standard late-stage SaaS frameworks and requires a combination of: (1) government/defense moat sustaining a
    high-quality revenue floor, (2) enterprise GenAI Platform ARR replacing AI lab attrition within 18–24 months, (3)
    management stability under interim CEO Droege, and (4) Meta maintaining and expanding its data purchasing
    relationship. The base case assigns a range of $8–12B fair value; the bull case reaches $18–25B under aggressive but
    coherent assumptions. The recommendation is Research-More with a conditional pass: do not invest at implied
    valuation without visibility into post-attrition ARR, government contract schedule, and enterprise platform
    conversion metrics.
