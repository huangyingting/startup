company:
  name: Scale AI

chapter:
  number: 1
  title: "Company Overview"
  summary: "Scale AI is a San Francisco-based AI infrastructure company founded in 2016 by Alexandr Wang, providing data annotation, RLHF, model evaluation, and enterprise GenAI platform services to AI labs, Fortune 500 enterprises, and U.S. government agencies. After raising $1B at a $13.8B valuation in 2024 and securing a landmark Meta strategic investment at over $29B in 2025, Scale is pivoting from core data-labeling to a broader enterprise and defense AI platform under interim CEO Jason Droege."

sections:
  - id: identity-overview
    title: Company Identity and Overview
    body: |
      Scale AI, Inc. is headquartered in San Francisco, California, and was incorporated in 2016. The company's stated mission is to "develop reliable AI systems for the world's most important decisions." Scale operates as a late-stage private technology company following its $1 billion Series F round in May 2024 and the subsequent Meta strategic investment in June 2025, which placed the company's implied valuation at over $29 billion. Scale describes itself as providing the data and full-stack technologies needed to build, evaluate, and improve artificial intelligence systems across the complete AI development lifecycle.

      Scale's core business spans five primary product lines: the Scale Data Engine (data collection, curation, and annotation for model training), the Scale GenAI Platform (enterprise-grade generative AI application deployment), Scale RLHF (reinforcement learning from human feedback data for large language model training), Scale Evaluation (model capability and safety benchmarking for model developers and the public sector), and Donovan (specialized AI agent workflows for defense and intelligence missions). The company also operates a self-serve tier with pay-as-you-go pricing, providing access to its annotation pipeline at lower entry cost for research and experimental projects. As of its about page, Scale has processed more than 15 billion human-labeled decisions and paid contributors over $1 billion globally.
    claimRefs: [CO001, CO002, CO003, CO004, CO008, CO009]

  - id: founders-leadership
    title: Founders, Leadership, and Governance
    body: |
      Scale AI was founded in 2016 by Alexandr Wang, who left MIT at age 19 to build the company. Wang grew Scale from a small data-labeling startup into a company that secured contracts with leading AI laboratories, Fortune 500 enterprises, and the United States Department of Defense. He served as CEO from founding until June 2025, when he departed to join Meta's AI efforts following Meta's landmark strategic investment in Scale. Wang retained a seat on Scale AI's board of directors following his departure.

      Jason Droege was appointed Interim CEO of Scale AI in June 2025 upon Wang's departure. Droege had joined Scale in September 2024 as Chief Strategy Officer. Prior to Scale, Droege founded Uber Eats and scaled it to a $19 billion GMV run rate, and previously served as a Vice President at Uber and as a partner at Benchmark, the prominent venture capital firm and Scale investor. His operational background in marketplace and platform businesses is central to Scale's stated pivot toward enterprise and government platform revenue.

      Scale's governance structure is not publicly disclosed in detail. Wang retains board representation, and the company has not disclosed the full board composition or independent director roster following the Meta investment and leadership transition. This creates a material governance opacity risk for prospective investors, particularly given Wang's concurrent role at Meta—a strategic investor and potential competitor for AI talent and technology.
    claimRefs: [CO001, CO010, CO011, CO012, CO013, CO014, CO015, CO016]

  - id: funding-capital
    title: Funding History and Capital Structure
    body: |
      Scale AI has raised approximately $1.6 billion in disclosed venture funding across multiple rounds, culminating in its Series F in May 2024 and a strategic investment from Meta in June 2025. The company raised approximately $600 million pre-Series F across earlier rounds, including a $325 million Series E in 2021 that valued Scale at approximately $7.3 billion. The 2023 period saw a significant workforce reduction of approximately 20% of employees, reflecting broader AI market pressures and recalibration of data-labeling demand.

      In May 2024, Scale closed a $1 billion Series F round led by Accel, at a post-money valuation of $13.8 billion. This round included primary capital and a secondary component allowing existing shareholders to liquidate. New investors included Amazon, Cisco, Intel, AMD, ServiceNow, DFJ Growth, WCM Investment Management, Elad Gil, and Meta. Returning investors included Nvidia, Coatue, Y Combinator, Index Ventures, Founders Fund, Tiger Global, Thrive Capital, Spark Capital, Greenoaks, Wellington Management, and Nat Friedman.

      In June 2025, Meta made what CNBC described as its largest-ever bet on AI, paying approximately $14.3 billion for a minority stake in Scale AI (reported as approximately 49% of outstanding equity on a fully diluted basis), implying a company valuation of over $29 billion. Scale stated it remains operationally independent from Meta. The proceeds were distributed to existing shareholders and holders of vested equity rather than entirely to Scale's balance sheet for operating capital, creating uncertainty about Scale's remaining cash position and runway.
    claimRefs: [CO005, CO006, CO007, CO017, CO018, CO019, CO020, CO021, CO022, CO023]

  - id: products-business-model
    title: Products and Business Model
    body: |
      Scale AI's business model centers on selling high-quality data and AI infrastructure services to organizations building and deploying machine learning systems. Revenue streams include enterprise data annotation contracts (volume-based and project-based), the Scale GenAI Platform (managed SaaS and professional services for enterprise AI applications), government and defense contracts (including Department of Defense data curation and the Donovan platform for intelligence and military operations), and a self-serve tier for smaller or experimental use cases. Scale does not publicly disclose revenue, gross margins, or ARR.

      The Scale Data Engine collects, curates, annotates, and validates data across text, images, video, audio, and documents. The GenAI Platform transforms enterprise data into domain-specific AI applications using a proprietary pipeline. Scale RLHF provides curated preference data for reinforcement learning from human feedback, which is central to training large language models for instruction-following and safety. Scale Evaluation offers trusted benchmarking for model capability (including the Scale Leaderboard) and safety (including the WMDP harmful-knowledge benchmark), serving both commercial model developers and U.S. government agencies. The Donovan platform targets defense and intelligence missions with specialized AI agent workflows that can operate in classified environments given Scale's DoD IL4 and FedRAMP High security certifications.

      Pricing is bifurcated: enterprise customers receive custom pricing with dedicated operations teams and SLA commitments, while self-serve customers access the platform on a pay-as-you-go basis with the first 1,000 labeling units free. Scale publicly discloses no revenue figures; its estimated hundreds of millions in ARR is derived from investor commentary and proxy comparisons, not confirmed disclosures.
    claimRefs: [CO002, CO003, CO008, CO024, CO025, CO026, CO027, CO028, CO029, CO030]

  - id: milestones-events
    title: Key Milestones and Adverse Events
    body: |
      Scale AI's trajectory from founding through 2026 spans a decade of growth, strategic pivots, and significant adverse events that define its current investment profile. Founded in 2016, Scale initially focused on programmatic data labeling for self-driving vehicles (Waymo was an early customer) before expanding into broader enterprise AI training data. By 2021, the company had achieved a $7.3 billion valuation with its Series E, and by 2022 was publicly describing itself as a $7 billion company with more than 700 employees providing the DoD's autonomy data layer.

      The 2023 period saw Scale execute a painful 20% workforce reduction amid a slowdown in AI foundation model training data spend. Scale rebounded with its $1 billion Series F in May 2024, attracting a broad consortium of strategic and financial investors at $13.8 billion. In 2024, Scale also entered White House AI safety voluntary commitments and secured a DoD data curation contract for joint force operations.

      June 2025 marked the most consequential inflection: Meta's $14.3 billion strategic investment and the simultaneous departure of founder Alexandr Wang to join Meta's AI work. Three weeks later (July 2025), interim CEO Droege announced layoffs of approximately 200 employees (14% of staff) and 500 contractors, citing overinvestment in the data-labeling headcount relative to the company's strategic direction toward enterprise and government platform revenue. In June 2025, CNBC reported that Google—Scale's then-largest customer—planned to wind down or significantly reduce its Scale relationship due to concerns about competitive conflict with Meta. OpenAI also wound down its Scale work in June 2025. In September 2025, Scale filed a lawsuit against Mercor, a competitor and former employee, alleging customer poaching. These adverse events represent material customer concentration and governance risks for investors evaluating Scale.
    claimRefs: [CO001, CO031, CO032, CO033, CO034, CO035, CO036, CO037, CO038, CO039, CO040]

