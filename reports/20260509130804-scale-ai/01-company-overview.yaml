callouts:
  - calloutType: strength
    title: "First-Mover Advantage in Government-Grade AI Data Infrastructure"
    body: "Scale AI holds a unique and defensible position in U.S. government and defense AI data infrastructure. Its DoD IL4 Provisional Authorization and FedRAMP High certification — combined with the Donovan platform and active Department of Defense data curation contracts — create significant barriers to entry that most commercial AI data companies cannot match. This government franchise generates sticky, multi-year contracts and positions Scale favorably for the rapid growth of federal AI spending."
    claimRefs: [CO027, CO029, CO030]

  - calloutType: risk
    title: "Customer Concentration: Google and OpenAI Departures Post-Meta Deal"
    body: "Scale AI's largest commercial customers — Google and OpenAI — both signaled reductions or exits from their Scale relationships following the Meta strategic investment. The loss of these two AI lab relationships simultaneously represents a material revenue risk and validates investor concerns about conflict-of-interest dynamics when a strategic investor (Meta) is also a direct competitor to Scale's largest customers. The scale of this customer concentration risk is unquantifiable without revenue disclosure."
    claimRefs: [CO035, CO036, CO038]

  - calloutType: risk
    title: "CEO Transition and Governance Opacity"
    body: "Alexandr Wang's departure to Meta — the company that just invested $14.3 billion in Scale — creates dual concerns: (1) loss of the founder whose vision and relationships built Scale's unique positioning, and (2) governance ambiguity given Wang's concurrent Meta role and board seat at Scale. Interim CEO Jason Droege has strong operational credentials but has not led a large technology company through a major strategic pivot. Board composition post-Meta deal is not publicly disclosed."
    claimRefs: [CO011, CO013, CO015, CO016]

  - calloutType: insight
    title: "The Meta Deal Redistributed Capital Rather Than Funded Growth"
    body: "Unlike a traditional funding round, the Meta strategic investment proceeds were primarily distributed to existing shareholders and holders of vested equity rather than deposited into Scale's operating treasury. This means Scale's cash position and runway after the deal are not meaningfully improved by the $14.3 billion transaction. Investors evaluating Scale must independently assess its burn rate, remaining cash, and capital needs for the enterprise platform pivot."
    claimRefs: [CO022, CO023]

