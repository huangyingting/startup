            title: No Burn Rate, Cash Position, or Runway Disclosed
            body: >-
              Scale AI has not disclosed its post-Meta-deal cash position, quarterly burn rate, or expected runway. The
              Meta transaction proceeds were distributed to shareholders rather than retained for operations, creating
              uncertainty about whether current revenue is sufficient to fund the business model pivot without
              additional capital raises.
