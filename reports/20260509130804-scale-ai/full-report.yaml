              Meta's strategic investment created an unprecedented competitive conflict: Scale's largest investor (Meta)
              competes directly with Scale's most important customers (Google, OpenAI). The immediate consequence —
              departure of both Google and OpenAI as customers — demonstrates that Scale's quality premium did not
              create sufficient lock-in to retain customers facing a structural conflict-of-interest. Mercor's active
              customer-poaching (per the lawsuit) suggests competitors view this as a sustained vulnerability to
              exploit.
            calloutType: risk
