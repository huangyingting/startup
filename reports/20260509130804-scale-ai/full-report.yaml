      - number: '6.5'
        title: Expansion and Customer Concentration Risk
        blocks:
          - type: paragraph
            body: >
              Scale AI's customer concentration risk is material and has adversely crystallized in 2025. The departure
              of Google—previously Scale's largest customer—and OpenAI within a single quarter is the single most
              important adverse customer event in Scale's history. CNBC reported Google's exit was driven by concerns
              about competitive conflict following the Meta investment. This departure pattern—where Scale's two largest
              AI lab customers exited citing the same underlying conflict of interest—creates structural risk for any
              remaining AI lab customers with Meta-adjacent competitive exposure.


              The Meta relationship creates both the largest expansion opportunity (Meta's AI initiatives are major
              consumers of training data, and the relationship is described as expanding) and a significant dependency
              risk: a substantial share of Scale's revenue post-Google/OpenAI may now be concentrated in a single
              customer who is also a 49% investor. This customer-investor concentration is structurally unusual and may
              create ongoing commercial friction for other customers.


              Land-and-expand dynamics are theoretically present: the pathway from data annotation to RLHF to evaluation
              to GenAI Platform to Donovan represents a documented upsell funnel. The TIME deployment demonstrates that
              enterprise customers can be converted from annotation pilots to production platform use. However, no
              quantified expansion rate, upsell conversion data, or average revenue per customer metrics are publicly
              available. The Mercor lawsuit (September 2025) alleging customer poaching indicates active competitive
              threat to existing account retention from at least one well-funded competitor. SuperAnnotate and Mercor
              are expanding enterprise annotation platform capabilities, evidenced by product pages and partner
              profiles, creating displacement risk for Scale's data engine revenue.
