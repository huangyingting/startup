  - number: 6
    title: Customers
    sections:
      - number: '6.1'
        title: Customer Base Segmentation
        blocks:
          - type: paragraph
            body: >
              Scale AI's customer base is organized into three primary verticals: AI Labs and model developers, Fortune
              500 enterprise customers, and U.S. government and defense agencies. Each segment has distinct buyer
              profiles, procurement dynamics, use cases, revenue structures, and switching cost profiles.


              AI Labs (formerly the largest segment) purchase Scale's RLHF and evaluation services to train and
              benchmark large language models. These customers—historically including OpenAI, Google/DeepMind, Cohere,
              and Anthropic—are sophisticated technical buyers with direct procurement authority and quarterly contract
              cycles tied to training compute schedules. This segment is now in structural decline: Google exited in
              June 2025 citing competitive conflict arising from the Meta deal, and OpenAI wound down its Scale
              relationship the same month, signaling a broader shift toward in-house annotation capacity among frontier
              model developers.


              Enterprise customers—including TIME, Etsy, Instacart, and Pinterest—deploy Scale's GenAI Platform and Data
              Engine for domain-specific AI applications such as content safety testing, recommendation systems, and
              e-commerce AI. These buyers typically involve IT and data leadership with procurement cycles of 6–18
              months and multi-year deployment commitments. The TIME case study is the strongest public proof point:
              GenAI Platform deployment occurred in under two months, with 7,000+ adversarial attack vectors tested
              against TIME's AI content outputs in a production safety application.


              Government and defense customers—primarily U.S. Department of Defense and intelligence community
              agencies—engage through multi-year contract vehicles for data curation, autonomy AI programs, and the
              Donovan platform for classified operations. These customers have the highest switching costs due to DoD
              IL4 and FedRAMP High certification requirements, classified environment integration, and procurement
              inertia. Geographically, Scale's disclosed customer base is predominantly U.S.-headquartered. No
              international customer count or revenue split is publicly disclosed.
            claimRefs:
              - CU001
              - CU004
              - CU005
              - CU006
              - CU007
              - CU008
              - CU009
              - CU010
              - CU015
              - CU036
      - number: '6.2'
        title: Adoption Trajectory and Growth Signals
        blocks:
          - type: paragraph
            body: >
              Scale AI does not publicly disclose total active customer counts, revenue, ARR, or deployment metrics.
              Adoption signals must be inferred from disclosed milestones, headcount dynamics, contributor payments, and
              third-party proxy data.


              The strongest scale signals are: (1) over $1 billion paid to annotation contributors globally, indicating
              substantial annotation throughput volume; (2) 15 billion+ human-labeled decisions processed, demonstrating
              platform depth; and (3) the May 2024 Series F at $13.8 billion valuation with participation from Amazon,
              Cisco, Intel, AMD, and ServiceNow—all enterprise buyers—suggesting customer validation at significant
              scale. The inclusion of strategic investors who are themselves enterprise customers provides independent
              corroboration of platform maturity.


              The July 2025 layoffs of 14% of staff (approximately 200 employees and 500 contractors), specifically
              concentrated in the data-labeling business, represent a lagging adoption signal: they indicate that RLHF
              and annotation volume has declined materially from peak, coinciding with Google and OpenAI departures and
              the strategic pivot toward the GenAI Platform and Donovan. Competitors Snorkel AI, SuperAnnotate, and
              Mercor have each expanded their enterprise annotation offerings, evidenced by new product pages and
              partner/leaderboard profiles, suggesting continued market activity even as Scale repositions.


              Self-serve growth is unquantified. Scale's API documentation and pricing pages are publicly accessible,
              suggesting ongoing developer adoption, but no active self-serve customer count or conversion rate has been
              disclosed. Enterprise customers visible on Scale's customers page—Etsy, Instacart, Pinterest,
              Cohere—appear without case studies or outcome metrics beyond logo presence, limiting the quality of
              adoption proof for these accounts.
            claimRefs:
              - CU011
              - CU012
              - CU013
              - CU017
              - CU021
              - CU023
              - CU024
              - CU025
              - CU035
      - number: '6.3'
        title: Named Customer Proof and Evidence Quality
        blocks:
          - type: paragraph
            body: >
              Scale AI's most important disclosed customer proof points span production deployments across media,
              defense, e-commerce, and AI research. The TIME Media case study is the highest-quality public proof point:
              Scale's GenAI Platform was deployed to test over 7,000 adversarial attack vectors against TIME's AI
              content before publication. This is a production safety application with clear, measurable outcome metrics
              and a sub-two-month deployment window, documented on Scale's official customers page.


              Meta is simultaneously Scale's largest strategic investor (~49% stake acquired June 2025) and an active,
              expanding RLHF customer. This dual role creates both a revenue anchor and a governance complication:
              Meta's privileged information access as an investor alongside its role as a customer raises data access
              and conflict-of-interest concerns for other customers evaluating Scale's data security practices.


              U.S. Department of Defense and intelligence community customers are evidenced by official Scale blog posts
              describing a DoD data curation contract for joint force operations and the Donovan platform's deployment
              in national security contexts. These are not named agency customers (classification prevents naming), but
              they represent the highest-confidence government deployment proof available in public sources,
              corroborated by Scale's DoD IL4 and FedRAMP High certifications. Enterprise customers—Etsy, Instacart,
              Pinterest—appear on Scale's customers page without case studies or outcome metrics.


              The Mercor lawsuit (September 2025) alleging customer poaching provides indirect adverse proof that Scale
              has enterprise accounts valuable enough to be actively solicited by a competitor, while also demonstrating
              competitive account retention vulnerability. Competitor profiles at Snorkel AI, SuperAnnotate, and Mercor
              indicate continued enterprise demand for annotation and AI data platforms, validating the market even as
              competition intensifies.
