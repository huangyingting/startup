              internal acknowledgment that the commodity annotation segment is under pressure. If synthetic data and
              AI-assisted labeling reduce demand for human annotation, Scale must successfully transition to evaluation,
              GenAI platform, and defense revenue — segments that are growing but whose size relative to Scale's
