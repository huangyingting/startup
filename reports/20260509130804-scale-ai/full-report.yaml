  - number: 7
    title: Risks
    sections:
      - number: '7.1'
        title: Severity-Ranked Risk Overview
        blocks:
          - type: paragraph
            body: >
              Scale AI enters the current investment period with a risk profile weighted toward strategic and execution
              risk rather than regulatory or operational risk. Customer concentration—already crystallized through the
              Google and OpenAI departures—represents the highest-severity, highest-probability risk as of the research
              date. These departures coincided with the Meta investment and the leadership transition, creating three
              concurrent high-severity risk events in a single quarter (Q2 2025) that are deeply interlinked.


              The most critical observation is the interdependency of Scale's top risks: the Meta investment triggered
              the Google departure (conflict of interest), which triggered a reassessment of Scale's business model
              viability at its previous AI lab revenue concentration, which in turn triggered the leadership transition
              and layoffs. Each risk amplifies the others. Investors must evaluate whether the government/defense moat
              and Meta's expanding customer relationship provide a sufficient revenue floor to sustain the business
              through the AI lab attrition and the enterprise pivot.


              Regulatory and legal risks are material but manageable. Scale's DoD IL4 and FedRAMP High certifications
              demonstrate a strong compliance posture for government work. The Mercor lawsuit is an ongoing legal risk
              but is unlikely to be existential. Export control risks for defense AI are real but addressed through
              existing certification and compliance programs. The most important forward-looking risk is whether Scale's
              enterprise GenAI Platform can generate sufficient replacement revenue for the AI lab segment within the
              time window defined by its current cash runway.
            claimRefs:
              - CR001
              - CR002
              - CR003
              - CR004
              - CR005
              - CR006
              - CR007
              - CR008
      - number: '7.2'
        title: Regulatory and Legal Risk
        blocks:
          - type: paragraph
            body: >
              Scale AI operates at the intersection of defense AI, enterprise data processing, and AI safety—three
              domains with active and evolving regulatory attention. The primary regulatory risks are U.S. government
              compliance requirements for defense AI (ITAR, export control, AI safety standards), data privacy and AI
              governance regulations applicable to enterprise data processing, and the competitive legal proceedings
              arising from the Mercor lawsuit.


              For defense AI, Scale's DoD IL4 and FedRAMP High certifications demonstrate strong regulatory compliance
              posture. The company has also made voluntary White House AI safety commitments, demonstrating proactive
              engagement with AI governance. The principal regulatory risk in this domain is potential expansion of
              export control restrictions on AI models and data services—particularly if the AI services Scale provides
              to DoD contractors involve sensitive technology transfer that could attract ITAR scrutiny. Congressional
              AI oversight is active, as evidenced by Scale's testimony before Congress.


              On data privacy, Scale's enterprise data annotation services involve processing customer proprietary data.
              The EU AI Act, GDPR, and emerging U.S. state AI laws create compliance obligations that are manageable but
              evolving. Scale's security and compliance pages indicate active SOC 2 Type II and ISO 27001
              certifications, suggesting a mature enterprise compliance posture. The Mercor lawsuit (Scale AI vs.
              Mercor, September 2025) alleges customer poaching and trade secret misappropriation. While the lawsuit's
              outcome is uncertain, it creates legal uncertainty, management distraction, and potential counterclaim
              risk. The litigation does not currently appear to threaten Scale's core operations or certifications.
            claimRefs:
              - CR005
              - CR006
              - CR007
              - CR009
              - CR010
              - CR011
              - CR012
              - CR013
              - CR014
      - number: '7.3'
        title: Operational and Execution Risk
        blocks:
          - type: paragraph
            body: >
              Scale AI's most acute operational risk is the execution of a business model pivot under adverse
              conditions. The company is attempting to transition from annotation-volume revenue (declining due to AI
              lab departures and synthetic data trends) to enterprise GenAI Platform and government Donovan revenue
              (growing but uncertain pace). This pivot is occurring simultaneously with a CEO transition, significant
              headcount reduction, and the loss of two of its largest customers.


              Data security and annotation quality are operational risks inherent to Scale's core business. As a company
              that processes proprietary customer data for AI training, any data security incident, quality failure, or
              customer data misuse event would be severely damaging to enterprise trust and government contract
              eligibility. Scale's SOC 2 Type II, ISO 27001, DoD IL4, and FedRAMP High certifications reduce—but do not
              eliminate—this risk. No public data security incidents were identified in this research.


              Supply chain risk for Scale relates primarily to its annotation contributor workforce. Scale relies on a
              global network of human annotators; disruptions to this workforce (labor disputes, quality degradation,
              competitive poaching by Mercor or others) could impair annotation output quality and delivery timelines.
              The July 2025 layoffs that eliminated approximately 500 contractors may have reduced operational
              redundancy in this supply chain. Additionally, Scale's dependency on cloud infrastructure providers (AWS
              and similar) creates a platform concentration risk that is standard for cloud-native companies but worth
              noting in the context of its DoD requirements for infrastructure sovereignty.
            claimRefs:
              - CR001
              - CR003
              - CR008
              - CR015
              - CR016
              - CR017
              - CR018
              - CR019
      - number: '7.4'
        title: Partner and Dependency Risk
        blocks:
          - type: paragraph
            body: >
              Scale AI's most significant dependency risk is its relationship with Meta—simultaneously its largest
              investor (~49% equity), its largest remaining AI lab customer, and its former CEO's new employer. This
              triple-role dependency creates a concentration and governance risk without precedent in the venture-backed
              AI sector. If Meta's strategic interest in Scale diminishes, reduces its data purchasing, or introduces
              new competitive products, Scale faces simultaneous customer revenue loss, valuation pressure, and
              governance disruption.


              Cloud infrastructure dependency on AWS and major cloud providers is a standard risk for AI infrastructure
              companies, but it is especially relevant for Scale's government business where platform sovereignty and
              sovereignty over AI training compute are compliance requirements. Scale's DoD certifications imply
              approved cloud infrastructure arrangements, but any change in cloud provider relationships could affect
              government contract eligibility. OpenAI and Google's departures eliminated two key partner relationships
              that provided both revenue and reputational validation. Remaining AI lab partners (Cohere, others) are
              smaller and represent less revenue concentration individually.


              Channel and partner concentration in government procurement is positive rather than negative: government
              contracts proceed through established contract vehicles (GSA, DIU, DARPA channels) with well-defined
              procurement rules. However, government budget cycles and continuing resolution dynamics can create revenue
              timing volatility. The Snorkel AI partner ecosystem (evidenced by its partners page) and SuperAnnotate's
              enterprise partnerships indicate that Scale's competitors are also building partner-dependent go-to-market
              strategies, creating a race for ecosystem lock-in.
            claimRefs:
              - CR002
              - CR003
              - CR004
              - CR006
              - CR009
              - CR020
              - CR021
              - CR022
              - CR023
      - number: '7.5'
        title: People, Execution, and Financial Risk
        blocks:
          - type: paragraph
            body: >
              Leadership transition risk is among the most material at Scale AI. Founder Alexandr Wang built Scale over
              nine years and was the face of its government, enterprise, and AI lab relationships. His departure to join
              Meta, concurrent with Meta becoming Scale's largest investor, creates a principal-agent conflict that is
              visible to customers, employees, and investors. Interim CEO Jason Droege has no prior experience running a
              $29B-valued AI infrastructure company; his Uber Eats background is operationally relevant to marketplace
              scaling but not directly to government AI or enterprise data platform go-to-market.


              Talent retention is a risk in the immediate post-layoff environment. The July 2025 reduction of 200
              employees and 500 contractors may have damaged morale among the remaining ~1,000 employees, particularly
              if high performers perceive uncertainty about Scale's direction under interim leadership. Key government
              and enterprise relationship managers who held institutional knowledge of defense contracts and enterprise
              deployments represent irreplaceable assets; their retention is critical to contract renewal and platform
              expansion.


              Financial risk is partially mitigated by the Meta strategic investment, but the capital from that
              transaction was distributed to existing shareholders rather than retained on Scale's balance sheet for
              operations. This creates uncertainty about Scale's actual cash position and runway post-distribution. No
              public burn rate, cash position, or path-to-profitability data has been disclosed. If the AI lab revenue
              attrition is as large as the Google/OpenAI departures imply, Scale may face material revenue shortfalls in
              2025-2026 that require additional external capital unless the enterprise and government growth rate
              exceeds expectations.
            claimRefs:
              - CR001
              - CR002
              - CR003
              - CR007
              - CR008
              - CR024
              - CR025
              - CR026
              - CR027
              - CR028
      - number: '7.6'
        title: Exhibits
        blocks:
          - type: callout
            title: Four High-Severity Risks Crystallized Simultaneously in Q2 2025
            body: >-
              Customer concentration (Google/OpenAI exits), CEO transition (Wang to Meta), Meta conflict of interest
              (deterring AI labs), and business model pivot execution are all high-severity risks that emerged in a
              single quarter. Their interdependency means that failure on any one dimension amplifies the others. This
              represents an unusually concentrated risk inflection for a late-stage company at a $29B+ implied
              valuation.
            calloutType: insight
            claimRefs:
              - CR001
              - CR002
              - CR003
