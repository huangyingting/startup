            - 3
            - 2
            - 3
            - 1
    notes: >-
      Scores 1-5; 5=highest. Production Deployment: confirmed production use vs pilot. Outcome Clarity: specificity and
      measurability of disclosed outcomes. Evidence Freshness: recency of most recent proof (5=2025 confirmed).
      Reference Quality: independence and quotability of source. DoD evidence is high-confidence but classified,
      limiting reference quality. Meta dual-role reduces evidence independence.
  - id: FU004
    title: Retention / Repeat Cohort
    type: cohort
    approximationNotes: >-
      No public NRR, GRR, churn, or cohort data disclosed by Scale AI. Values are structural estimates based on contract
      type, switching cost analysis, and AI-annotation industry benchmarks for comparable data-services businesses.
      Estimates are for illustrative diligence purposes only and must be confirmed with disclosed data in the data room.
    data:
      columns:
        - Year 1
        - Year 2
        - Year 3
      rows:
        - label: Government / Defense
          values:
            - 100
            - 97
            - 95
        - label: AI Labs (Current Remaining)
          values:
            - 100
            - 65
            - 50
        - label: Enterprise (Fortune 500)
          values:
            - 100
            - 80
            - 70
        - label: Self-Serve / SMB
          values:
            - 100
            - 35
            - 20
    notes: >-
      Estimated retention percentages (0-100 scale). Government cohort reflects multi-year contract lock-in and
      IL4/FedRAMP certification barriers. AI lab cohort reflects structural attrition following Google/OpenAI exits and
      commoditization of annotation. Enterprise cohort estimated from comparable SaaS data annotation peers. Self-serve
      estimated from developer-platform benchmarks.
  - id: FR001
    title: Risk Heatmap
    type: matrix
    data:
      columns:
        - Likelihood (1-5)
        - Impact (1-5)
        - Mitigation Maturity (1-5)
        - Residual Severity (1-5)
      rows:
        - label: Customer Concentration / AI Lab Attrition
          values:
            - 5
            - 5
            - 2
            - 5
        - label: CEO / Leadership Transition
          values:
            - 4
            - 4
            - 2
            - 4
        - label: Meta Conflict of Interest
          values:
            - 4
            - 5
            - 2
            - 5
        - label: Business Model Pivot Execution
          values:
            - 4
            - 5
            - 2
            - 5
        - label: Annotation Commoditization
          values:
            - 4
            - 4
            - 3
            - 4
        - label: Regulatory / Defense Compliance
          values:
            - 2
            - 4
            - 4
            - 2
        - label: Mercor Lawsuit
          values:
            - 3
            - 3
            - 3
            - 3
        - label: Talent Retention Post-Layoff
          values:
            - 3
            - 3
            - 2
            - 3
    notes: >-
      Scores 1-5; 5=highest risk. Likelihood=probability of negative event. Impact=magnitude if realized. Mitigation
      Maturity=strength of current mitigations. Residual Severity=remaining risk after mitigation. Values are analyst
      estimates. Top 4 risks are all rated 4-5 residual severity, reflecting the unusual concentration of high-severity
      risks at a single inflection point.
  - id: FR002
    title: Risk Transmission Map
    type: dag
    data:
      nodes:
        - id: meta_deal
          label: Meta Strategic Investment (Jun 2025)
        - id: customer_concentration
          label: Customer Concentration Risk
        - id: ceo_transition
          label: CEO / Leadership Transition Risk
        - id: google_openai_exit
          label: Google + OpenAI Departure
        - id: revenue_attrition
          label: AI Lab Revenue Attrition
        - id: pivot_execution
          label: Business Model Pivot Execution Risk
        - id: margin_pressure
          label: Margin / Burn Pressure
        - id: valuation_risk
          label: Valuation / Financing Risk
        - id: government_moat
          label: Government / Defense Revenue Floor
      edges:
        - from: meta_deal
          to: google_openai_exit
        - from: meta_deal
          to: ceo_transition
        - from: meta_deal
          to: customer_concentration
        - from: google_openai_exit
          to: revenue_attrition
        - from: ceo_transition
          to: pivot_execution
        - from: revenue_attrition
          to: margin_pressure
        - from: pivot_execution
          to: margin_pressure
        - from: margin_pressure
          to: valuation_risk
        - from: government_moat
          to: margin_pressure
    notes: >-
      DAG shows causal risk transmission from the Meta deal through to valuation risk. Government moat mitigates
      (reduces) margin pressure but does not eliminate it. All four top risks trace back to the June 2025 Meta deal as
      the root cause event.
  - id: FR003
    title: Dependency Map
    type: dag
    data:
      nodes:
        - id: scale
          label: Scale AI (Operations)
        - id: meta
          label: Meta (49% Investor + Customer)
        - id: dod
          label: U.S. DoD / IC (Gov't Customer)
        - id: aws
          label: Cloud Infrastructure (AWS / Azure)
        - id: contributors
          label: Annotation Contributor Network
        - id: enterprise
          label: Enterprise Customers (TIME, Etsy, etc.)
        - id: ai_labs
          label: AI Lab Customers (Cohere, others)
      edges:
        - from: meta
          to: scale
        - from: dod
          to: scale
        - from: enterprise
          to: scale
        - from: ai_labs
          to: scale
        - from: scale
          to: aws
        - from: scale
          to: contributors
        - from: scale
          to: meta
        - from: scale
          to: dod
    notes: >-
      Map shows Scale AI's critical inbound and outbound dependencies. Meta appears on both sides (as revenue source
      flowing to Scale, and as dependency from Scale for governance/capital). Government dependency is positive
      (revenue) but creates regulatory compliance obligations. Cloud and contributor dependencies are operational
      foundations.
  - id: FV001
    title: Recommendation Logic
    type: flow
    data:
      nodes:
        - id: market
          label: 'Market: Large, early-stage enterprise AI data market; government AI is durable and growing'
          type: input
        - id: product
          label: 'Product: RLHF platform and annotation infrastructure proven; GenAI Platform unproven commercially'
          type: process
        - id: customers
          label: 'Customers: Google/OpenAI departed; Meta expanding; government durable; enterprise unconfirmed'
          type: process
        - id: financials
          label: 'Financials: ARR range $200–500M; post-deal cash unknown; no public P&L'
          type: process
        - id: risks
          label: 'Risks: 4 concurrent high-severity risks; CEO transition; pivot execution; Meta concentration'
          type: process
        - id: valuation
          label: 'Valuation: $29B implied at 58–145x ARR; strategic buyer premium; base-case fair value $8–12B'
          type: decision
        - id: recommendation
          label: 'Recommendation: Research-More / Conditional Pass — require data room confirmation before proceeding'
          type: output
      edges:
        - from: market
          to: product
          label: Market size supports large-scale annotation platform
        - from: product
          to: customers
          label: Product maturity informs customer proof quality
        - from: customers
          to: financials
          label: Customer trajectory defines ARR range
        - from: financials
          to: risks
          label: Financial visibility reduces or amplifies execution risk
        - from: risks
          to: valuation
          label: Risk profile constrains supportable multiple
        - from: valuation
          to: recommendation
          label: Valuation vs. fair value range → recommendation
    notes: >-
      Flow shows the evidence chain from market assessment through to recommendation. Valuation is the critical gate:
      even with high market and product quality, the $29B entry price requires multiple concurrent optimistic outcomes
      to generate financial returns.
  - id: FV002
    title: Valuation Sensitivity
    type: bar
    data:
      items:
        - label: 'Bear: $150M ARR × 10x'
          value: 1500
        - label: 'Base-Low: $250M ARR × 20x'
          value: 5000
        - label: 'Base: $350M ARR × 22x'
          value: 7700
        - label: 'Base-High: $450M ARR × 25x'
          value: 11250
        - label: 'Bull-Low: $550M ARR × 25x'
          value: 13750
        - label: 'Bull: $700M ARR × 28x'
          value: 19600
        - label: 'Bull-High: $850M ARR × 30x'
          value: 25500
        - label: Implied Entry ($29B)
          value: 29000
    notes: >-
      Values in USD millions. Bars represent implied enterprise value under different ARR and multiple combinations. The
      $29B entry line shows that only the most optimistic bull case approaches the entry price. All base and bear cases
      imply significant markdown from entry. ARR estimates and multiples are analyst assumptions; not company guidance.
  - id: FV003
    title: Valuation / Return Range
    type: range
    data:
      items:
        - label: Bear Case — Valuation
          low: 1500
          mid: 1750
          high: 2000
          unit: $M
        - label: Base Case — Valuation
          low: 7700
          mid: 9300
          high: 11250
          unit: $M
        - label: Bull Case — Valuation
          low: 17500
          mid: 21000
          high: 25500
          unit: $M
        - label: Strategic Acquirer Valuation (Meta implied)
          low: 27000
          mid: 29000
          high: 32000
          unit: $M
        - label: Recommended Financial Investor Entry Ceiling
          low: 8000
          mid: 11000
          high: 14000
          unit: $M
    notes: >-
      All values in USD millions. Ranges represent analyst estimates based on ARR scenario analysis and comparable
      multiples. The 'Recommended Financial Investor Entry Ceiling' is the maximum entry price that provides positive
      expected value across base and bull case probability-weighted outcomes. Entry at $29B offers negative expected
      value under any scenario weighting that assigns >40% probability to the base case.
  - id: FV004
    title: Investment KPIs
    type: kpi
    data:
      items:
        - label: Market Size Attractiveness
          value: 7/10
          unit: score
          trend: stable
        - label: Product / Technology Proof
          value: 7/10
          unit: score
          trend: stable
        - label: Government Moat Strength
          value: 8/10
          unit: score
          trend: stable
        - label: Management Stability
          value: 3/10
          unit: score
          trend: down
        - label: Customer Retention Quality
          value: 4/10
          unit: score
          trend: down
        - label: Financial Visibility
          value: 2/10
          unit: score
          trend: unknown
        - label: Valuation Fairness (financial investor)
          value: 2/10
          unit: score
          trend: down
        - label: Evidence Quality (chapter)
          value: 5/10
          unit: score
          trend: stable
        - label: Risk-Adjusted Return Expectation
          value: 3/10
          unit: score
          trend: down
    notes: >-
      Scores 1–10; 10 = most favorable. Government moat and product proof are the strongest pillars. Management
      stability, financial visibility, and valuation fairness are the weakest, reflecting the concurrent CEO transition,
      lack of public financial disclosure, and strategic-buyer-priced entry valuation. Overall IC recommendation driven
      by the bottom three scores, which are collectively blocking for investment at the current implied price.
