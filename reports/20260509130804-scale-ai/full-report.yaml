  - number: 3
    title: Competitors
    sections:
      - number: '3.1'
        title: Competitive Landscape Overview
        blocks:
          - type: paragraph
            body: >
              Scale AI competes across multiple overlapping segments of the AI data and infrastructure market, each with
              distinct competitor dynamics. In the core AI data annotation segment, Scale faces competition from Appen
              (ASX-listed, the only publicly traded direct comparable), SuperAnnotate, Labelbox, and Surge AI. For RLHF
              and LLM training data specifically, Surge AI and Mercor are the most focused direct competitors. For
              enterprise model evaluation and benchmarking, Labelbox's evaluation suite and Snorkel AI's programmatic
              labeling are adjacent threats. For enterprise GenAI platform deployment, Scale faces competition from
              hyperscalers (AWS Bedrock, Azure AI, Google Vertex AI), boutique AI consultancies, and system integrators
              — significantly larger and better-resourced opponents.


              The competitive landscape also includes incumbents in adjacent spaces: traditional data outsourcing firms
              (Accenture, Capita), crowdsource annotation platforms (Amazon Mechanical Turk, Remotasks), and AI lab
              internal annotation teams who represent the "internal build" substitute. Likely new entrants include
              larger technology companies building annotation and evaluation capabilities in-house, and specialist
              boutique firms entering from academic or domain-specific AI.


              A critical competitive dynamic is the Meta strategic investment: by becoming Scale's largest investor,
              Meta has simultaneously created a conflict of interest that has already led Google and OpenAI — Scale's
              two largest AI lab customers — to exit or reduce their relationships with Scale. This represents an
              unusual competitive situation where Scale's own investor is causing customer attrition at its largest
              commercial segment. Mercor, a newer and smaller competitor, is actively attempting to exploit this
              vulnerability through direct customer solicitation, as evidenced by Scale's September 2025 lawsuit.
            claimRefs:
              - CP001
              - CP002
              - CP003
              - CP004
              - CP005
      - number: '3.2'
        title: Competitor Profiles
        blocks:
          - type: paragraph
            body: >
              Appen (ASX: APX) is the only publicly traded direct comparable to Scale AI's annotation business. Appen
              provides AI training data including image, video, speech, text, and document annotation for global
              enterprise and government customers. Appen's publicly reported revenues have been declining as the AI
              annotation market shifts toward premium and LLM-specialized services. Appen serves enterprise and
              government customers globally, including some overlap with Scale's customer base. Appen competes primarily
              on breadth and cost-effectiveness rather than Scale's quality-premium positioning.


              Labelbox is a San Francisco-based data labeling and model evaluation platform targeting enterprise AI
              teams. Labelbox has expanded from core annotation into RLHF data collection and model leaderboards, making
              it a direct competitor across multiple of Scale's product lines. Labelbox's pricing is more accessible
              than Scale's enterprise contracts, and it has built an expert network (Labelbox Expert Network) for
              quality-critical annotations. Labelbox offers specific products for robotics AI training, which is a
              market Scale has not publicly emphasized.


              Snorkel AI focuses on programmatic data labeling using AI-assisted weak supervision techniques to reduce
              the human-in-the-loop bottleneck. Snorkel targets enterprise customers who need to build AI training
              datasets without extensive manual labeling. Snorkel's approach differs fundamentally from Scale's
              human-expert model — Snorkel aims to reduce the need for human annotation, while Scale's model depends on
              human quality. Snorkel's customers include large enterprises and some government agencies.


              SuperAnnotate is an AI annotation platform targeting enterprise teams with collaborative annotation
              workflows, quality management, and ML pipeline integrations. SuperAnnotate provides security features
              relevant to enterprise compliance and has expanded into computer vision, NLP, and multimodal annotation.
              Mercor is a newer entrant operating an AI talent marketplace for RLHF, model evaluation, and data
              labeling, founded by ex-Scale contributors. Scale filed a lawsuit against Mercor in September 2025 for
              alleged customer poaching, suggesting Mercor is actively targeting Scale's enterprise customer base.


              Surge AI (now part of a broader RLHF data ecosystem) focused specifically on high-quality human feedback
              data for LLM training, with an expert annotator network similar to Scale's but smaller in scale. Invisible
              Technologies offers AI-powered business operations and data services, competing with Scale's enterprise
              automation and annotation capabilities.
            claimRefs:
              - CP006
              - CP007
              - CP008
              - CP009
              - CP010
              - CP011
              - CP012
              - CP013
              - CP014
      - number: '3.3'
        title: Capability, Pricing, and Regulatory Comparison
        blocks:
          - type: paragraph
            body: >
              Scale AI's most significant competitive differentiators are in three areas: (1) government-grade security
              certifications (DoD IL4, FedRAMP High) that no publicly disclosed competitor has matched, creating a
              near-exclusive position in classified and defense AI data markets; (2) Scale Evaluation's model safety
              benchmarking and the Scale Leaderboard, which have established reputational authority as a trusted
              third-party evaluator for LLM capabilities; and (3) the Donovan defense AI agent platform, which has no
              direct documented competitor in the cleared AI agent space.


              In core annotation, Scale's quality premium is its primary differentiator against lower-cost competitors.
              The proprietary Scale Data Engine with its quality feedback loops, expert contributor network (having paid
              over $1B to contributors globally), and annotation tooling is difficult to replicate quickly. However,
              competitors including Labelbox and Snorkel AI have invested significantly in quality management workflows,
              narrowing this gap.


              On pricing, Scale occupies the premium tier: enterprise contracts with custom pricing and dedicated
              operations teams. Appen and SuperAnnotate offer lower price points, making them more accessible to
              mid-market customers who may not need Scale's quality guarantee. Labelbox offers tiered pricing including
              a self-serve option, making it a direct competitor for Scale's self-serve tier as well as enterprise
              contracts.


              Regulatory and trust posture is a key battleground. Scale's government clearances and regulatory
              commitments (White House AI safety commitments, WMDP benchmark, Congress testimony) position it as the
              trusted government AI data vendor. Appen has some government work but lacks Scale's defense-specific
              clearance depth. Labelbox and Snorkel do not appear to have published equivalent government security
              certifications. This is Scale's most durable competitive advantage and is highly defensible due to the
              multi-year process required to obtain DoD IL4 and FedRAMP High certifications.
            claimRefs:
              - CP015
              - CP016
              - CP017
              - CP018
              - CP019
              - CP020
      - number: '3.4'
        title: Switching Cost, Lock-in, and Multi-Homing
        blocks:
          - type: paragraph
            body: >
              Switching costs in Scale AI's markets vary dramatically by segment. For AI labs using Scale primarily for
              annotation and RLHF data, switching costs are moderate: the annotation pipeline is fungible to some
              degree, and labs have demonstrated willingness to switch (Google and OpenAI departing in 2025). This is
              precisely why the Meta investment conflict-of-interest created such rapid customer attrition — switching
              costs were not high enough to retain customers facing a conflict of interest with their data vendor's new
              investor.


              For enterprise customers using Scale's GenAI Platform, switching costs are higher: the platform involves
              data migration, workflow integration with enterprise systems, customization of data pipelines, and
              organizational knowledge transfer. Comparable to mid-market SaaS platform switching costs (6–18 months).


              For U.S. government and defense customers, switching costs are extremely high. Transitioning to a new
              vendor requires the new vendor to obtain equivalent security clearances (DoD IL4 and FedRAMP High
              authorization is a 12–36 month process), rebuild institutional knowledge, and navigate federal acquisition
              regulations. This creates a durable, multi-year lock-in for Scale's defense segment.


              Multi-homing is common in the annotation market: many large organizations (AI labs, enterprises) run
              annotation work through multiple vendors simultaneously for quality comparison, cost optimization, and
              redundancy. This means Scale may not have exclusive relationships even with named customers. Scale's
              self-serve tier explicitly encourages multi-homing (low commitment, pay-as-you-go). Labelbox's expert
              network and Surge's quality focus suggest they are positioned to capture multi-homed annotation spend from
              Scale's customers.


              Distribution power and supply access: Scale's contributor network (paid $1B+ globally) is a proprietary
              supply of human annotators. Competitors must build equivalent networks to compete on quality and
              throughput. Mercor, which operates an AI talent marketplace, is attempting to build an alternative expert
              contributor supply chain that directly competes with Scale's contributor network.
            claimRefs:
              - CP021
              - CP022
              - CP023
              - CP024
              - CP025
      - number: '3.5'
        title: Moat Durability, Commoditization Risk, and Adverse Evidence
        blocks:
          - type: paragraph
            body: >
              Scale AI's competitive moat is strongest in government/defense AI and weakest in commodity data
              annotation. The government franchise (DoD IL4, FedRAMP High, Donovan, active defense contracts) is highly
              durable because clearances take years to obtain and the institutional knowledge embedded in defense AI
              workflows cannot be rapidly replicated. This represents a genuine, multi-year competitive advantage.


              In the core annotation market, Scale's moat is eroding. The departure of Google and OpenAI as customers —
              Scale's two largest commercial relationships — demonstrates that the quality premium alone does not create
              unbreakable lock-in for AI lab customers. Competitors are narrowing the quality gap, and lower-cost
              providers with adequate quality (Appen, SuperAnnotate, offshore teams) continue to win annotation work at
              price-sensitive enterprises.


              The commoditization risk is real and accelerating. As AI foundation model training matures and synthetic
              data becomes more capable, the TAM for human-labeled annotation could shrink materially. Competitors like
              Snorkel AI are building annotation tools that reduce human labor requirements per output unit. If this
              trend continues, the annotation market will bifurcate: a large commodity segment dominated by low-cost
              providers and a smaller premium segment for expert evaluation and government-grade work where Scale has a
              stronger position.


              Adverse competitive evidence: (1) Google and OpenAI departures post-Meta deal demonstrate customer
              concentration risk and insufficient switching costs in the AI lab segment; (2) Mercor's active customer
              poaching (per Scale's lawsuit) suggests competitor perception that Scale customers are vulnerable; (3)
              Appen's declining revenues serve as a cautionary indicator that the pure annotation segment is facing
              structural headwinds; (4) Scale's July 2025 layoffs specifically targeted data-labeling headcount,
              acknowledging over-investment in the commoditizing segment.
            claimRefs:
              - CP026
              - CP027
              - CP028
              - CP029
              - CP030
              - CP031
      - number: '3.6'
        title: Exhibits
        blocks:
          - type: callout
            title: Government Clearances Are Scale's Most Durable Competitive Moat
            body: >-
              Scale AI's DoD IL4 Provisional Authorization and FedRAMP High certifications, combined with the Donovan
              defense AI agent platform, create a near-exclusive position in classified AI data and agent services. No
              publicly disclosed competitor has equivalent clearances. Obtaining these certifications takes years and
