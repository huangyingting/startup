companyProfile:
  summary: "Scale AI is a San Francisco-based AI infrastructure company founded in 2016 by Alexandr Wang. It provides data annotation, RLHF, model evaluation, and enterprise GenAI platform services to leading AI laboratories, Fortune 500 enterprises, and U.S. government agencies including the Department of Defense. Following a $1 billion Series F in 2024 and a landmark Meta strategic investment valuing the company at over $29 billion in 2025, Scale is pivoting from data-labeling to a broader enterprise and government AI platform play under interim CEO Jason Droege."
