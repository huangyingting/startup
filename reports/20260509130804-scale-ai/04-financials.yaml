callouts:
  - calloutType: risk
    title: Revenue Concentration Risk — Google and OpenAI Departure
    body: >-
      Scale AI's annotation revenue was significantly concentrated in a small number of large AI lab customers, with
      Google reportedly Scale's largest customer prior to the 2025 Meta deal. Both Google and OpenAI have wound down or
      significantly reduced their Scale relationships post-Meta-investment. The financial magnitude of this customer
      attrition is unknown but potentially material — the loss of two of the top three AI lab customers in a single
      quarter represents a severe near-term revenue headwind that cannot be quantified without access to Scale's
      financial statements.
    claimRefs:
      - CI022
      - CI023
      - CI025
  - calloutType: risk
    title: Valuation-to-Revenue Multiple is Unverifiable
    body: >-
      At Scale's $29B+ implied valuation from the Meta deal, the implied revenue multiple is unverifiable without public
      financial data. If Scale's ARR is $200–500M, the implied multiple (58x–145x) would be in the range of
      hypergrowth-premium SaaS multiples, which requires confirming high growth, strong NRR, and margin expansion — none
      of which can be verified publicly. Due diligence investors must obtain audited revenue data before the valuation
      can be assessed.
    claimRefs:
      - CI021
      - CI022
      - CI024
  - calloutType: strength
    title: Capital Adequacy Buffers the Business Model Pivot
    body: >-
      Despite near-term revenue headwinds from customer attrition, Scale AI's substantial capital position (estimated
      $500M–$1B+ cash) and the post-layoff cost structure provide multi-year runway to execute the enterprise and
      government pivot. The strategic investment from Meta also provides structural stability and reduces the urgency of
      near-term profitability. This capital buffer is the primary financial mitigant against the execution risk of the
      pivot.
    claimRefs:
      - CI016
      - CI017
      - CI018
      - CI019
  - calloutType: insight
    title: Appen as the Public Proxy for Annotation Economics
    body: >-
      Appen (ASX: APX) is the only publicly traded direct comparable for Scale AI's annotation segment. Appen's gross
      margins (historically 25–40%), revenue trends (declining), and operating model (crowdsource annotation) provide
      the best available proxy for Scale's core segment economics. Key differences: Scale is premium-quality focused
      with a smaller workforce than Appen's crowd, and Scale has diversified into higher-margin platform and government
      segments. Appen's declining revenues confirm the structural headwinds in commodity annotation.
    claimRefs:
      - CI011
      - CI012
      - CI014
