  evidenceGaps:
    - type: private-evidence-only
      severity: blocking
      topic: revenue
      missingEvidence: Scale AI does not disclose total revenue, ARR, or growth rate. No public financial statements exist.
      whyItMatters: >-
        At a $29B+ valuation, revenue is the primary valuation input. Without revenue, the valuation multiple is
        unverifiable.
      diligencePath: Request audited financial statements (3 years); CFO briefing on revenue by segment and growth trajectory.
      relatedQuestionRefs:
        - QI002
    - type: private-evidence-only
      severity: blocking
      topic: gross-margin
      missingEvidence: No gross margin data by segment (annotation, platform, government) is publicly available for Scale AI.
      whyItMatters: >-
        Blended gross margin determines business quality and scalability; annotation vs. platform mix materially changes
        the investment thesis.
      diligencePath: Request segment P&L; annotator cost as % of revenue; compare to Appen proxy.
      relatedQuestionRefs:
        - QI004
    - type: private-evidence-only
      severity: blocking
      topic: net-revenue-retention
      missingEvidence: >-
        NRR is not disclosed; post-2025 NRR is directionally negative (Google and OpenAI departures) but magnitude is
        unknown.
      whyItMatters: >-
        NRR below 100% in the annotation segment indicates compounding revenue headwinds; NRR above 100% in
        platform/government would offset.
      diligencePath: Request NRR by annual cohort (2021–2025) and by customer segment; revenue impact of Google and OpenAI departure.
      relatedQuestionRefs:
        - QI007
    - type: missing-source
      severity: material
      topic: customer-attrition-revenue-impact
      missingEvidence: >-
        The revenue contribution of Google and OpenAI as Scale AI customers is not publicly disclosed; their departure
        impact is unquantifiable.
      whyItMatters: >-
        Google was reportedly Scale's largest customer; OpenAI was a major RLHF customer; their departure could
        represent 20–50%+ of annotation revenue.
      diligencePath: Request revenue by customer (top 10); Google and OpenAI revenue by year (2022–2025).
      relatedQuestionRefs:
        - QI013
    - type: private-evidence-only
      severity: material
      topic: meta-deal-primary-capital
      missingEvidence: >-
        The primary vs. secondary split of the Meta $14.3B investment is not disclosed; exact cash to Scale's operating
        treasury is unknown.
      whyItMatters: >-
        Capital adequacy assessment depends on how much new cash Scale received versus how much was distributed to
        shareholders.
      diligencePath: Request closing documents for Meta investment; confirm primary capital allocation and use of proceeds.
      relatedQuestionRefs:
        - QI009
        - QI014
    - type: private-evidence-only
      severity: material
      topic: burn-rate
      missingEvidence: Monthly burn rate and operating cash flow are not disclosed; estimates are proxy-based with low confidence.
      whyItMatters: >-
        Runway calculation depends on both cash position and burn rate; both are estimated, creating compounding
        uncertainty.
      diligencePath: Request monthly P&L and cash flow statements (Jan 2024 – present); confirm headcount cost structure post-layoff.
      relatedQuestionRefs:
        - QI010
    - type: private-evidence-only
      severity: material
      topic: enterprise-sales-efficiency
      missingEvidence: CAC, enterprise sales cycle duration, and typical ACV are not publicly disclosed.
      whyItMatters: >-
        Sales efficiency ratios determine whether Scale can scale the enterprise pivot without proportional sales
        headcount growth.
      diligencePath: Request CAC by segment; ACV distribution (P25, P50, P75, P90); quota attainment and sales headcount.
      relatedQuestionRefs:
        - QI006
