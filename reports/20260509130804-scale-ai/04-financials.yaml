company:
  name: Scale AI
chapter:
  number: 4
  title: Financials
  summary: >-
    Scale AI is a private company with no public revenue disclosure. The company generates revenue through enterprise
    data annotation contracts, a GenAI platform, and growing U.S. government/defense contracts. Following the $1 billion
    Series F (May 2024) and Meta's ~$14.3 billion strategic investment (June 2025), Scale has substantial capital but
    faces material revenue attrition from Google and OpenAI departures and an uncertain business model pivot away from
    data-labeling.
sections:
  - id: revenue-model
    title: Revenue Model and Revenue Streams
    body: >
      Scale AI generates revenue across three primary streams: (1) enterprise data annotation and RLHF services, (2) the
      Scale GenAI Platform (enterprise AI application development), and (3) U.S. government and defense contracts
      through Donovan and its Public Sector Data Engine. A self-serve tier provides a fourth, smaller revenue stream for
      research and experimental projects.


      The enterprise data annotation segment has historically been Scale's largest revenue driver, powering growth from
      2016 through the 2024 Series F. This segment charges enterprises and AI labs project-based or volume-based rates
      for annotation, RLHF data collection, and model evaluation. The pricing model is custom and opaque — Scale does
      not publish enterprise pricing for its annotation services. The self-serve tier offers 1,000 labeling units free,
      then charges per unit thereafter, a freemium model designed to land smaller accounts.


      The Scale GenAI Platform represents a higher-margin, SaaS-oriented revenue stream targeting enterprises seeking to
      deploy custom AI applications. This segment serves Fortune 500 companies across industries including retail (Etsy,
      Instacart) and media (TIME). Scale custom-builds LLM-powered applications for enterprise clients, integrating with
      their proprietary data and workflows. This stream has the potential for subscription and managed-service
      components, though pricing details are not publicly disclosed.


      Government and defense contracts constitute a third, growing, and strategically important revenue stream. Scale
      holds DoD IL4 and FedRAMP High clearances, enabling it to pursue classified and defense-grade AI data contracts.
      The Donovan platform (defense AI agents) and the Scale Public Sector Data Engine target a defense market where
      pricing is typically non-public, based on federal procurement schedules. The DIU RCV program win and active DoD
      data curation contract confirm commercial relevance. This segment is likely smaller than commercial annotation
      today but potentially larger and more durable given switching costs.
    claimRefs:
      - CI001
      - CI002
      - CI003
      - CI004
      - CI005
    tableRefs:
      - TI001
    figureRefs:
      - FI001
  - id: pricing-and-gtm
    title: Pricing, GTM Motion, and Sales Efficiency
    body: >
      Scale AI's go-to-market motion is primarily enterprise sales-led, supplemented by a self-serve product-led growth
      tier. The enterprise tier relies on a dedicated sales team, relationship-driven deals, and solution engineers who
      work with customers to scope and deliver large annotation or platform projects. Enterprise contracts are
      custom-quoted with dedicated operational support and SLAs, indicating high average contract values and longer
      sales cycles relative to typical SaaS companies.


      The pricing for annotation services is volume-based and project-specific. Scale's self-serve tier establishes a
      list-price anchor: units are available at a disclosed per-unit rate after the first 1,000 free units. Enterprise
      customers negotiate pricing for large-volume annotation programs that may include dedicated annotator teams,
      quality assurance workflows, and platform integrations. No discounts or typical deal sizes are publicly disclosed.


      Sales cycle length and customer acquisition cost (CAC) are not publicly disclosed. As a data services and
      infrastructure company, Scale likely experiences long enterprise sales cycles (3–12 months) with significant
      professional services components. Government contract sales cycles are even longer (often 12–36 months from
      procurement initiation to first revenue). Net revenue retention (NRR) is unverifiable — the Google and OpenAI
      departures in 2025 represent a severe NRR compression event, but the full financial impact is unknown.


      Distribution channels include: direct enterprise sales, government procurement relationships (DoD, IC),
      partnerships with AI lab providers, and self-serve API/platform access for developers and researchers. Scale's
      relationships with major investors (Accel, Amazon, Meta, Nvidia, Cisco) create strategic co-sell and referral
      channels, though the specific economic impact is not disclosed.


      Scale's data-labeling business had revenue concentration among a small number of large AI labs (Google, OpenAI,
      Meta, Anthropic). The departure of Google and OpenAI in 2025 following the Meta investment represents a material
      GTM and concentration risk that directly compresses revenue in the annotation segment.
    claimRefs:
      - CI006
      - CI007
      - CI008
      - CI009
      - CI010
    tableRefs:
      - TI002
    figureRefs:
      - FI002
  - id: cost-structure
    title: Cost Structure, Gross Margin, and Capital Intensity
    body: >
      Scale AI's cost of revenue is dominated by human labor — the annotation contributors who perform data labeling,
      RLHF feedback collection, and model evaluation tasks. Scale has paid over $1 billion globally to its contributor
      network, confirming the labor-intensive nature of the core annotation business. This human labor cost creates a
      structurally lower gross margin for annotation relative to pure software businesses. Industry proxies from Appen
      (the publicly traded annotation comparable) suggest gross margins for annotation services in the 25–45% range,
      declining as the market commoditizes.


      The Scale GenAI Platform and evaluation products should carry higher gross margins than annotation services, as
      they involve more software leverage and less per-unit human labor. However, GenAI Platform projects at the
      enterprise level still require significant professional services and operational effort, capping margins below
      pure SaaS benchmarks. Government contracts typically carry margins in the 15–30% range for data services,
      constrained by procurement rate structures.


      Operating expenses include engineering and R&D (building annotation tooling, the GenAI Platform, Donovan, and
      evaluation infrastructure), sales and marketing (enterprise sales team, government BD), and general and
      administrative. Scale had approximately 1,400 employees before the July 2025 layoffs and approximately 1,000
      after, suggesting a significant OpEx reduction from the 14% headcount cut plus 500 contractor reductions —
      primarily targeting the data-labeling cost base. This is consistent with improving blended margins by shedding the
      lower-margin commodity annotation labor force.


      Capital intensity in Scale's model is primarily working-capital-based (labor payments to contributors) rather than
      physical capex (hardware, facilities). Infrastructure costs (cloud compute for annotation tooling and model
      evaluation) are a secondary capex factor. This makes Scale relatively capital-efficient compared to hardware AI
      companies but more labor-intensive than pure SaaS. The $1 billion Series F and Meta strategic investment have
      provided substantial capital to fund the pivot toward higher-margin enterprise and government services.
    claimRefs:
      - CI011
      - CI012
      - CI013
      - CI014
      - CI015
    tableRefs:
      - TI003
    figureRefs:
      - FI003
  - id: capital-adequacy
    title: Capital Adequacy and Financing History
    body: >
      Scale AI has raised approximately $1.6 billion+ in external capital. The funding history includes: seed and early
      rounds from 2016–2019 (including Y Combinator, Index Ventures, Founders Fund); a 2021 Series E of $325 million at
      approximately $7.3 billion valuation; approximately $600 million total pre-Series F; and the May 2024 Series F of
      $1 billion at $13.8 billion valuation led by Accel with participation from Amazon, Meta, Cisco, Intel, AMD,
      ServiceNow, Nvidia, DFJ Growth, WCM, and returning investors including Tiger Global, Thrive, Greenoaks,
      Wellington, Nat Friedman, and Elad Gil. The Series F included both primary (new cash to company) and secondary
      (liquidity to existing shareholders) components.


      The June 2025 Meta strategic investment was approximately $14.3 billion for a minority stake (approximately 49% of
      outstanding equity). Critically, the majority of Meta's investment proceeds were distributed to existing
      shareholders and vested equity holders — not to the company's operating treasury — consistent with a secondary
      transaction structure. The net new primary capital to Scale's operating business from the Meta deal is not fully
      disclosed. Scale maintains an independent corporate structure; Meta holds a minority stake.


      Without public financial statements, cash on hand is unknown. The Series F closed in May 2024, and if a
      significant portion was primary capital ($500M+ to the company), combined with the Meta deal's primary component,
      Scale likely has adequate runway of 3+ years at current burn rates. The July 2025 layoffs of 200 employees and 500
      contractors, plus the strategic pivot away from data-labeling, are cost-reduction measures consistent with
      extending runway and improving cash efficiency.


      Burn rate is not publicly disclosed. Scale's pre-layoff expense base (1,400+ employees, significant annotator
      contractor costs) suggests a substantial monthly burn. Post-layoff, cash efficiency should improve materially.
      Scale has no publicly disclosed debt facilities or project-finance obligations. The Meta deal created structural
      dependencies (Meta as both investor and key customer for related AI services) but no disclosed economic covenants
      or restrictions.
    claimRefs:
      - CI016
      - CI017
      - CI018
      - CI019
      - CI020
    tableRefs:
      - TI004
    figureRefs:
      - FI004
  - id: financial-verdict
    title: Financial Verdict — Revenue Quality, Margin Path, and Diligence Blockers
    body: >
      Scale AI presents a complex financial profile: abundant capital, an unclear revenue trajectory, and a management
      team executing a high-stakes business model pivot under conditions of significant customer attrition.


      Revenue quality is concerning. The data-labeling segment — historically Scale's largest revenue driver — is
      commodity-positioned and facing structural headwinds (Appen's declining public revenues are a leading indicator),
      customer attrition (Google and OpenAI departing), and direct competition. The GenAI Platform and
      government/defense segments offer higher revenue quality (longer contracts, stronger lock-in, less commoditization
      risk) but their current contribution to total revenue is unknown and likely smaller. Net revenue retention
      post-2025 is likely below 100% in the AI lab segment.


      Margin trajectory is directionally positive if the pivot succeeds: shedding the low-margin data-labeling workforce
      and growing the higher-margin platform and government segments would improve blended gross margins over time.
      However, the pivot carries execution risk, and the intermediate period (2025–2027) likely shows revenue
      compression before platform and government revenue scales.


      Capital adequacy is the strongest financial positive. Scale has raised $1.6B+ and the Meta deal provided
      additional liquidity to shareholders (and some primary capital). Post-layoff, the company is operating with
      reduced headcount and lower burn. Runway is estimated at 3+ years, sufficient for the pivot execution.


      Primary diligence blockers: (1) No public revenue or ARR data — valuation multiples are unverifiable; (2) Google
      and OpenAI attrition impact on revenue unknown; (3) government contract revenue size and growth trajectory not
      disclosed; (4) gross margin by segment not disclosed; (5) primary vs. secondary split of the Meta deal not
      confirmed; (6) Mercor lawsuit outcome could have financial implications (indemnification, customer loss).
    claimRefs:
      - CI021
      - CI022
      - CI023
      - CI024
      - CI025
