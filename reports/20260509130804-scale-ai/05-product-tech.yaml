  - id: trust-safety-compliance
    title: Trust, Safety, Compliance, and Quality Controls
    body: >
      Scale AI has invested heavily in trust and compliance infrastructure, particularly for government customers. The
      company's publicly disclosed certifications include: SOC 2 Type II (enterprise security controls audit), ISO 27001
      (information security management system), DoD IL4 Provisional Authorization (Defense Department data security for
      controlled unclassified information and some classified), and FedRAMP High Authorization (U.S. federal government
      cloud security for high-impact systems including classified data handling).


      For AI safety, Scale has made voluntary commitments under the 2024 White House AI Safety commitments, covering
      RLHF safety practices, red-teaming, and responsible AI deployment. Scale contributed the WMDP (Weapons of Mass
      Destruction Proxy) benchmark for evaluating whether LLMs have been trained to prevent generation of dangerous
      content. The WMDP benchmark measures AI safety in dual-use knowledge domains, and Scale's test-and-evaluation
      white paper documents its approach to responsible AI model evaluation.


      Scale's annotation quality controls are proprietary but include: task-specific quality guidelines, multiple
      annotator redundancy for high-stakes tasks, statistical quality monitoring, expert reviewer escalation, and
      inter-annotator agreement scoring. The company claims industry-leading annotation quality — though independent
      third-party quality audits of Scale's annotation are not publicly available.


      The TIME customer case study (GenAI platform deployed in under 2 months, with 7,000+ attack vectors tested)
      provides partial evidence of red-teaming capability. The DIU RCV program win confirms that Scale's technology
      passed defense procurement requirements. These are corroborating evidence of technical capabilities but fall short
      of independent third-party technical audits.


      Privacy and data governance: Scale's data handling practices for enterprise annotation involve customer-provided
      data that may contain proprietary or sensitive information. Scale's security certifications (SOC 2 Type II, ISO
      27001) provide some assurance of data governance controls. For government customers, DoD IL4 and FedRAMP High
      impose strict data handling requirements that Scale has demonstrated compliance with. Customer data handling in
      the annotation pipeline (particularly for AI labs with proprietary training data) is a due diligence concern that
      is not fully addressed by public documentation.
