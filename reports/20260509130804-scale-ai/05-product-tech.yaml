chapter:
  number: 5
  title: Product & Technology
  summary: >-
    Scale AI delivers a portfolio of AI data infrastructure products spanning data annotation (Scale Data Engine), RLHF
    and LLM training data (Scale RLHF), model evaluation and safety benchmarking (Scale Evaluation + Leaderboard),
    enterprise GenAI application development (Scale GenAI Platform), and a defense AI agents platform (Donovan). The
    company holds DoD IL4 and FedRAMP High certifications, differentiated through quality-focused annotation
    methodology, proprietary tooling, and government-grade compliance. Key product risks include the transition of core
    annotation revenue toward platform and government use cases, and limited public third-party validation of technical
    capabilities beyond official claims.
sections:
  - id: product-definition
    title: Product Portfolio and Customer Workflow
    body: >
      Scale AI's product portfolio addresses four distinct customer workflow problems in AI development: (1) creating
      high-quality training data for model development; (2) collecting human feedback for LLM alignment and RLHF; (3)
      independently evaluating AI model safety and capability; and (4) deploying custom GenAI applications at enterprise
      scale. A fifth product line — Donovan — addresses defense and intelligence mission-specific AI workflows.


      The Scale Data Engine is Scale's core product and the foundation of the company. It enables AI teams to collect,
      curate, annotate, and quality-assure training datasets across modalities (text, image, video, audio, 3D). The
      customer workflow: AI engineers define annotation requirements and quality standards; Scale's contributor network
      executes annotation tasks guided by Scale's proprietary tooling and QA pipeline; annotated datasets are delivered
      back into the customer's MLOps pipeline. The Data Engine supports the full model development lifecycle from
      pre-training data curation to RLHF to evaluation.


      The Scale GenAI Platform addresses the enterprise AI deployment workflow. Enterprise customers (Fortune 500
      companies across retail, media, finance, and government) bring proprietary data and domain requirements; Scale
      transforms this into customized LLM-powered applications. The platform includes data ingestion, LLM fine-tuning,
      RAG pipeline configuration, and production deployment support. This product targets enterprises that want custom
      AI without the deep ML expertise required to build from scratch.


      Scale Evaluation and the Scale Leaderboard provide independent model benchmarking services. AI labs and
      enterprises use Scale Evaluation to assess LLM capabilities across dimensions including reasoning, safety, coding,
      and domain knowledge. The Scale Leaderboard is a public ranking of LLM performance — a developer-facing tool that
      has established Scale as a trusted third-party evaluator in the AI community. The WMDP (Weapons of Mass
      Destruction Proxy) benchmark is a specialized evaluation contribution for AI safety.


      Donovan serves DoD, IC, and civilian government agencies with AI agents for mission-critical workflows. It
      integrates classified data sources, supports cleared operational environments, and provides AI-powered decision
      support for defense and intelligence applications. Donovan is deployed in DoD IL4-authorized environments and is
      Scale's primary competitive moat in the defense segment.
    claimRefs:
