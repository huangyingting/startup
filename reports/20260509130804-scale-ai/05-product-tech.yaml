  - id: architecture-operating-model
    title: Architecture and Operating Model
    body: >
      Scale AI's operating model combines software tooling with human-in-the-loop execution — a hybrid AI-assisted
      annotation architecture rather than a pure software or pure labor model. The core technology stack consists of:
      (1) a web-based annotation tooling platform for labeling tasks across modalities; (2) a quality assurance pipeline
      for review, reconciliation, and feedback; (3) API infrastructure exposing Scale's services programmatically to
      enterprise and lab customers; (4) the GenAI Platform for LLM customization workflows; and (5) the Donovan AI agent
      runtime for defense missions.


      The annotation contributor network is a proprietary, global workforce recruited, trained, quality-screened, and
      managed by Scale. The contributor platform (which Scale calls its "task marketplace") routes annotation jobs to
      appropriately skilled contributors, monitors completion quality in real-time, and escalates to expert reviewers
      for quality-sensitive tasks. Scale has invested in contributor quality management as a core differentiator,
      claiming that its proprietary QA pipeline produces annotation quality exceeding competitors.


      The Scale API is the primary developer-facing interface for the Data Engine, offering programmatic submission of
      annotation jobs, retrieval of completed datasets, and integration with ML training pipelines. The API supports all
      annotation task types (text classification, bounding boxes, segmentation, RLHF preference pairs, etc.) and
      includes webhook support for real-time job completion notification.


      For the GenAI Platform, Scale's operating model involves: data ingestion and preprocessing, LLM selection and
      prompt engineering, fine-tuning or RAG pipeline configuration, red-teaming and safety evaluation, and production
      deployment with monitoring. This is a managed services approach where Scale's engineers and the platform tooling
      jointly deliver the custom AI application.


      For Donovan, the architecture is specialized for cleared environments: it runs on DoD IL4-certified cloud
      infrastructure, integrates with classified government data systems, supports multi-modal AI agent workflows
      (planning, search, decision support), and provides explainability features required for military applications.
      Donovan's technical architecture is not publicly disclosed in detail; the operational model is closer to a managed
      defense IT service than a commercial SaaS product.
