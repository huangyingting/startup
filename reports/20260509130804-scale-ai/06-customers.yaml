callouts:
  - id: KU001
    type: finding
    severity: high
    title: Google and OpenAI Departures Are a Material Concentration Event
    body: >-
      Both Scale AI's then-largest customer (Google) and a major RLHF customer (OpenAI) exited in Q2 2025, triggered by
      the Meta investment creating a perceived conflict of interest. This coincides with the CEO departure and 14% staff
      layoff—signaling that the AI lab segment is in structural decline and that customer concentration risk has already
      crystallized adversely.
    claimRefs:
      - CU009
      - CU010
      - CU027
      - CU028
      - CU029
  - id: KU002
    type: gap
    severity: high
    title: No NRR, Customer Count, or Retention Metrics Disclosed
    body: >-
      Scale AI discloses no net revenue retention, gross retention, churn, total active customer count, or satisfaction
      metrics. Investors cannot assess durability, expansion efficiency, or cohort health without direct data room
      access. This is the most critical information gap in the customer analysis.
    claimRefs:
      - CU019
      - CU020
      - CU032
      - CU037
  - id: KU003
    type: finding
    severity: medium
    title: Government / Defense Is the Most Durable Customer Segment
    body: >-
      DoD IL4 and FedRAMP High certification requirements, multi-year contract vehicles, and classified-environment
      integration create structural retention advantages in the government segment that are difficult for competitors to
      replicate. This segment represents Scale's most defensible revenue floor regardless of AI lab attrition.
    claimRefs:
      - CU008
      - CU015
      - CU016
      - CU026
      - CU030
