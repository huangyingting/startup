chapter:
  number: 6
  title: Customers
  summary: >-
    Scale AI's customer base spans three primary segments—AI Labs, Enterprise, and Government/Defense—with
    production-grade proof from TIME (7,000+ attack vectors, <2-month deployment), active U.S. DoD contracts, and Meta
    as both investor and expanding RLHF customer. The most material adverse development is the simultaneous departure of
    Google (previously the largest customer) and OpenAI in Q2 2025, driven by Meta conflict-of-interest concerns and AI
    labs' move toward in-house annotation. No public NRR, churn, or customer count data exists. Customer concentration
    risk has already crystallized adversely; the government/defense moat and Meta relationship provide a revenue floor,
    but AI lab segment attrition is structurally significant.
sections:
  - id: customer-segmentation
    title: Customer Base Segmentation
    body: >
      Scale AI's customer base is organized into three primary verticals: AI Labs and model developers, Fortune 500
      enterprise customers, and U.S. government and defense agencies. Each segment has distinct buyer profiles,
      procurement dynamics, use cases, revenue structures, and switching cost profiles.


      AI Labs (formerly the largest segment) purchase Scale's RLHF and evaluation services to train and benchmark large
      language models. These customers—historically including OpenAI, Google/DeepMind, Cohere, and Anthropic—are
      sophisticated technical buyers with direct procurement authority and quarterly contract cycles tied to training
      compute schedules. This segment is now in structural decline: Google exited in June 2025 citing competitive
      conflict arising from the Meta deal, and OpenAI wound down its Scale relationship the same month, signaling a
      broader shift toward in-house annotation capacity among frontier model developers.


      Enterprise customers—including TIME, Etsy, Instacart, and Pinterest—deploy Scale's GenAI Platform and Data Engine
      for domain-specific AI applications such as content safety testing, recommendation systems, and e-commerce AI.
      These buyers typically involve IT and data leadership with procurement cycles of 6–18 months and multi-year
      deployment commitments. The TIME case study is the strongest public proof point: GenAI Platform deployment
      occurred in under two months, with 7,000+ adversarial attack vectors tested against TIME's AI content outputs in a
      production safety application.


      Government and defense customers—primarily U.S. Department of Defense and intelligence community agencies—engage
      through multi-year contract vehicles for data curation, autonomy AI programs, and the Donovan platform for
      classified operations. These customers have the highest switching costs due to DoD IL4 and FedRAMP High
      certification requirements, classified environment integration, and procurement inertia. Geographically, Scale's
      disclosed customer base is predominantly U.S.-headquartered. No international customer count or revenue split is
      publicly disclosed.
    claimRefs:
      - CU001
