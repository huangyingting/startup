      - Current State
      - Impact Assessment
      - Diligence Path
    rows:
      - - Meta customer + investor relationship
        - Concentration + Conflict of interest
        - Meta holds ~49% stake and is expanding RLHF customer relationship
        - High positive (revenue anchor) + High negative (governance risk; other customers may reduce share)
        - >-
          Verify Meta revenue share as % of total ARR; assess data access governance; confirm enterprise customers
          remain comfortable with arrangement
      - - Google and OpenAI simultaneous departure
        - Customer attrition
        - 'Both exited Q2 2025; Google was Scale''s #1 customer'
        - High negative — material revenue reduction; AI lab segment in structural decline
        - >-
          Quantify revenue impact; confirm replacement pipeline; review remaining AI lab contract NDA and exit-clause
          terms
      - - DoD / IC multi-year contract vehicles
        - Expansion moat
        - Multiple active DoD contracts; Donovan in classified deployments; IL4/FedRAMP High certified
