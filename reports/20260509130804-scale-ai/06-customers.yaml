  - id: adoption-trajectory
    title: Adoption Trajectory and Growth Signals
    body: >
      Scale AI does not publicly disclose total active customer counts, revenue, ARR, or deployment metrics. Adoption
      signals must be inferred from disclosed milestones, headcount dynamics, contributor payments, and third-party
      proxy data.


      The strongest scale signals are: (1) over $1 billion paid to annotation contributors globally, indicating
      substantial annotation throughput volume; (2) 15 billion+ human-labeled decisions processed, demonstrating
      platform depth; and (3) the May 2024 Series F at $13.8 billion valuation with participation from Amazon, Cisco,
      Intel, AMD, and ServiceNow—all enterprise buyers—suggesting customer validation at significant scale. The
      inclusion of strategic investors who are themselves enterprise customers provides independent corroboration of
      platform maturity.


      The July 2025 layoffs of 14% of staff (approximately 200 employees and 500 contractors), specifically concentrated
      in the data-labeling business, represent a lagging adoption signal: they indicate that RLHF and annotation volume
      has declined materially from peak, coinciding with Google and OpenAI departures and the strategic pivot toward the
      GenAI Platform and Donovan. Competitors Snorkel AI, SuperAnnotate, and Mercor have each expanded their enterprise
      annotation offerings, evidenced by new product pages and partner/leaderboard profiles, suggesting continued market
      activity even as Scale repositions.


      Self-serve growth is unquantified. Scale's API documentation and pricing pages are publicly accessible, suggesting
      ongoing developer adoption, but no active self-serve customer count or conversion rate has been disclosed.
      Enterprise customers visible on Scale's customers page—Etsy, Instacart, Pinterest, Cohere—appear without case
      studies or outcome metrics beyond logo presence, limiting the quality of adoption proof for these accounts.
    claimRefs:
      - CU011
      - CU012
      - CU013
      - CU017
      - CU021
      - CU023
      - CU024
      - CU025
      - CU035
