        - Review contract vehicle types, option periods, and scheduled renewal dates; confirm new award pipeline
      - - Mercor lawsuit — customer poaching
        - Competitive attrition risk
        - Scale sued Mercor Sep 2025 alleging poaching of key customers and trade secret misappropriation
        - Medium — indicates competitive account retention risk; may expand to other competitors
        - Monitor litigation outcome; request post-Mercor customer retention data; assess scope of contacts made
