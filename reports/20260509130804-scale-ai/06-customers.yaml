  - id: retention-durability
    title: Retention, Durability, and Satisfaction Signals
    body: >
      Scale AI has not disclosed any net revenue retention (NRR), gross revenue retention (GRR), churn rate, renewal
      rate, total customer count, or satisfaction (NPS/CSAT) metrics. This represents a material information gap for
      investment analysis. All retention assessments below are structural inferences from contract type, switching
      costs, competitive dynamics, and adverse events—not from disclosed data.


      Government and defense customers represent the most durable cohort. Multi-year contract vehicles, DoD IL4 and
      FedRAMP High certification barriers, classified-environment integration, and high procurement switching costs
      create structural lock-in. The 2024 DoD joint force data curation contract and Donovan platform deployments in
      classified contexts suggest high annual retention rates for this segment, estimated at 90–97% based on comparable
      government IT contract renewal benchmarks. This segment's durability is largely independent of the AI lab
      attrition occurring in parallel.


      Enterprise customers (TIME, Etsy, Instacart, Pinterest) are likely on 12–36 month contracts with renewal
      optionality. Without NRR data, it is impossible to confirm whether land-and-expand dynamics are functioning. The
      GenAI Platform as an upsell from the Data Engine represents a theoretical expansion path, and the TIME deployment
      demonstrates conversion from pilot to production safety use case, but no cross-sell success rates or expansion
      revenue metrics are publicly available.


      The AI lab segment is in active contraction. Google and OpenAI both exited in June 2025, representing an estimated
      20–40% of historical AI lab revenue (not disclosed, estimated from reported customer prominence). The remaining AI
      lab customers (Cohere, others) face similar structural pressures toward in-house annotation. No G2, Gartner Peer
      Insights, or Capterra reviews were identified for Scale AI's enterprise platform as of this analysis, leaving
      customer satisfaction entirely unquantified.
