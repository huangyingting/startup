  evidenceGaps:
    - type: private-evidence-only
      severity: blocking
      topic: net-revenue-retention-nrr
      missingEvidence: Scale AI has not disclosed NRR, GRR, churn rate, or any cohort retention data for any customer segment.
      whyItMatters: >-
        Without NRR/GRR, it is impossible to assess whether the customer base is growing, stable, or contracting on a
        net basis. This is the most critical metric gap for a late-stage SaaS-adjacent company.
      diligencePath: >-
        Request trailing 4-quarter NRR and GRR by segment (AI Labs, Enterprise, Government) in the due diligence data
        room. Cross-check with billing records and customer contract ledger.
      relatedQuestionRefs:
        - QU023
        - QU025
    - type: private-evidence-only
      severity: blocking
      topic: customer-count-total-active
      missingEvidence: >-
        Scale AI has not disclosed its total active customer count, number of enterprise accounts, or government
        contract count.
      whyItMatters: >-
        Without customer count data, it is impossible to calculate average revenue per customer, assess concentration
        beyond named customers, or model growth scenarios with confidence.
      diligencePath: >-
        Request full customer ledger segmented by ARR band, segment, and geography. Request cohort data showing new
        logos, expansions, and churns by quarter.
      relatedQuestionRefs:
        - QU024
    - type: private-evidence-only
      severity: material
      topic: customer-satisfaction-nps
      missingEvidence: >-
        No NPS, CSAT, or third-party review platform data (G2, Gartner Peer Insights, Capterra) found for Scale AI's
        enterprise platform.
      whyItMatters: >-
        Customer satisfaction data provides leading indicators of retention risk and competitive displacement. Its
        absence prevents assessment of enterprise satisfaction quality.
      diligencePath: >-
        Request internal NPS scores and CSAT data. Search G2/Gartner for current review coverage. Request customer
        references from at least 3 enterprise accounts across different verticals.
      relatedQuestionRefs:
        - QU026
    - type: private-evidence-only
      severity: material
      topic: government-segment-revenue-share
      missingEvidence: Scale AI has not disclosed the government and defense segment's ARR contribution or share of total revenue.
      whyItMatters: >-
        Without segment ARR data, it is impossible to determine how much of Scale's revenue base is protected by the
        government moat vs. exposed to AI lab attrition.
      diligencePath: >-
        Request government segment ARR, number of active contracts, total contract value (TCV), and option period
        schedule in data room.
      relatedQuestionRefs:
        - QU027
    - type: missing-source
      severity: material
      topic: named customer proof table — partial coverage
      missingEvidence: >-
        Scale AI's full customer list is not publicly disclosed. Customers beyond those on scale.com/customers and
        confirmed in press coverage are not enumerated.
      whyItMatters: >-
        Partial customer enumeration may understate or overstate concentration risk. Full customer list is needed to
        identify additional concentration beyond named logos.
      diligencePath: >-
        Request full customer ledger from data room. Confirm whether Anthropic, other AI labs, and additional Fortune
        500 companies are active customers.
      relatedQuestionRefs: []
      relatedTableRefs:
        - TU003
