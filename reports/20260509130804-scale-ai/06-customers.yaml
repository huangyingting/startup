    figureRefs:
      - FU002
  - id: named-customer-proof
    title: Named Customer Proof and Evidence Quality
    body: >
      Scale AI's most important disclosed customer proof points span production deployments across media, defense,
      e-commerce, and AI research. The TIME Media case study is the highest-quality public proof point: Scale's GenAI
      Platform was deployed to test over 7,000 adversarial attack vectors against TIME's AI content before publication.
      This is a production safety application with clear, measurable outcome metrics and a sub-two-month deployment
      window, documented on Scale's official customers page.


      Meta is simultaneously Scale's largest strategic investor (~49% stake acquired June 2025) and an active, expanding
      RLHF customer. This dual role creates both a revenue anchor and a governance complication: Meta's privileged
      information access as an investor alongside its role as a customer raises data access and conflict-of-interest
      concerns for other customers evaluating Scale's data security practices.


      U.S. Department of Defense and intelligence community customers are evidenced by official Scale blog posts
      describing a DoD data curation contract for joint force operations and the Donovan platform's deployment in
      national security contexts. These are not named agency customers (classification prevents naming), but they
      represent the highest-confidence government deployment proof available in public sources, corroborated by Scale's
      DoD IL4 and FedRAMP High certifications. Enterprise customers—Etsy, Instacart, Pinterest—appear on Scale's
      customers page without case studies or outcome metrics.


      The Mercor lawsuit (September 2025) alleging customer poaching provides indirect adverse proof that Scale has
      enterprise accounts valuable enough to be actively solicited by a competitor, while also demonstrating competitive
      account retention vulnerability. Competitor profiles at Snorkel AI, SuperAnnotate, and Mercor indicate continued
      enterprise demand for annotation and AI data platforms, validating the market even as competition intensifies.
