callouts:
  - id: KCP001
    type: key-finding
    title: "Strongest moat is the rebuild pipeline, weakest is runtime coverage"
    body: >
      Chainguard holds a structurally defensible position in zero-CVE image provision backed by a
      nightly rebuild pipeline and contractual SLA. No direct competitor offers an equivalent operational
      infrastructure today. The critical gap is runtime protection: Chainguard has no behavioral
      analytics, CSPM, or network-level detection, making it a partial solution for buyers seeking
      consolidated CNAPP coverage.
    claimRefs:
      - CP011
      - CP022
      - CP036

  - id: KCP002
    type: risk-flag
    title: "Platform consolidation could erode the standalone container-security TAM"
    body: >
      The rapid consolidation of the CNAPP market (Wiz→Google, Lacework→Fortinet) signals that
      enterprise buyers may prefer full-platform vendors for a single-vendor security relationship.
      Chainguard's standalone position is increasingly exposed to platform-acquisition risk — or could
      itself become an acquisition target for a CNAPP vendor seeking supply-chain provenance leadership.
    claimRefs:
      - CP019
      - CP018
      - CP029

