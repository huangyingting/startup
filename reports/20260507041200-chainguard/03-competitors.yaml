chapter:
  number: 3
  title: Competitive Landscape
  summary: |
    Chainguard competes at the intersection of container security, supply chain provenance, and
    DevSecOps tooling. Its primary direct competitors are Snyk ($8.5B DevSecOps leader), Aqua
    Security ($1B+ CNAPP), and Palo Alto Cortex Cloud. Chainguard's moat rests on a nightly
    zero-CVE image rebuild pipeline, contractual CVE SLA (7 days critical), and co-ownership of
    key open standards (sigstore, cosign, SLSA, Wolfi OS). Platform consolidation is accelerating
    (Wiz acquired by Google for $32B, Lacework absorbed by Fortinet), raising the question of
    whether Chainguard remains independent or becomes an acquisition target.

