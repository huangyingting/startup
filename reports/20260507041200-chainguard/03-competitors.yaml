sections:
  - id: SP_OVERVIEW
    title: "Competitive Overview"
    order: 1
    claimRefs:
      - CP011
      - CP013
      - CP019
      - CP018
      - CP033
    body: |
      Chainguard competes at the intersection of container security, software supply chain provenance,
      and DevSecOps tooling. The vendor landscape spans three distinct layers: (1) direct supply-chain
      and container-security specialists — Snyk ($8.5B valuation, developer-first SCA and container
      scanning), RapidFort (post-build container hardening), and Sysdig (Kubernetes runtime security);
      (2) full Cloud-Native Application Protection Platform (CNAPP) vendors — Aqua Security ($1B+),
      Palo Alto Cortex Cloud, Orca Security, and CrowdStrike Falcon Cloud Security; and (3) indirect
      substitutes — Red Hat Universal Base Images (UBI), Alpine Linux, Docker Official Images, and
      cloud-provider native scanning tools (AWS Inspector, Azure Defender for Containers). JFrog Xray
      covers the artifact-scanning and software composition analysis (SCA) adjacency.

      The competitive landscape is consolidating rapidly. Wiz was acquired by Google in March 2026 for
      $32B — removing the fastest-growing CNAPP competitor from the independent vendor landscape. Lacework
      was absorbed by Fortinet and rebranded FortiCNAPP. Checkmarx merged into Synopsys. These moves
      reduce the number of independent specialist vendors, pressure remaining point solutions to demonstrate
      platform ambitions, and signal that large-enterprise security buyers are consolidating security
      vendors for unified coverage. Chainguard's narrow but deep positioning — supply chain provenance
      and zero-CVE image provision — occupies a differentiated niche that no tier-1 platform vendor
      fully replicates today, but the window to establish durable category leadership before platform
      absorption narrows each year.

  - id: SP_MOAT
    title: "Chainguard's Competitive Moat"
    order: 2
    claimRefs:
      - CP014
      - CP015
      - CP022
      - CP027
      - CP032
      - CP036
    body: |
      Chainguard's moat rests on three reinforcing layers: (1) technical infrastructure — Wolfi OS
      is a purpose-built Linux "undistro" that enables nightly rebuilds of 2,000+ images against upstream
      sources, delivering sub-7-day critical CVE patching with a contractual SLA; (2) standards
      co-ownership — co-creation and maintenance of sigstore, cosign, SLSA, and Wolfi means Chainguard
      shapes the supply-chain security standards that every competitor must eventually implement; and
      (3) brand and community trust built through open-source leadership (OpenSSF and CNCF participation)
      that commercial-only vendors cannot quickly replicate.

      The technical moat is the most durable: replicating a nightly-rebuild pipeline for 2,000+ images
      requires multi-year infrastructure investment, upstream maintainership relationships, and a team
      with deep Linux packaging expertise that is extremely scarce. The standards-ownership moat is
      more fragile — as sigstore adoption becomes near-universal, it transitions from differentiator
      to table stakes. Chainguard's community trust moat provides asymmetric brand value in security-
      conscious enterprises and government agencies that require supply chain provenance and SBOM
      compliance, but is non-trivially replicable by well-resourced incumbents over a 2–3 year horizon
      if they commit to open-source contribution at comparable depth.

  - id: SP_PRICING
    title: "Pricing and Distribution"
    order: 3
    claimRefs:
      - CP006
      - CP007
      - CP008
      - CP017
      - CP026
      - CP035
    body: |
      Chainguard uses a team-size + image-access pricing model starting at approximately $19,000/year
      for a team of 10 engineers, with full access to 2,000+ images, contractual CVE-remediation SLAs
      (7 days for critical, 14 days for high/medium/low), and unlimited image pulls. A free tier
      allows up to five production images per organization at no cost, enabling evaluation and
      developer adoption before enterprise commitment. This model differs strategically from Snyk's
      per-developer seat pricing (which scales with headcount but not image consumption) and Aqua's
      per-workload/node pricing (which scales with cloud infrastructure scale).

      Chainguard distributes through its own registry, AWS Marketplace, and Azure Marketplace, enabling
      enterprise procurement through existing committed cloud spend (EDP/MACC agreements). Marketplace
      availability removes a common friction point in enterprise security sales by allowing procurement
      without a new vendor relationship. The company also sells directly through an enterprise sales
      motion targeting platform-engineering and DevSecOps teams. The combination of a free community
      tier, per-team pricing, and marketplace distribution creates a low-friction adoption funnel
      that mirrors successful developer-first software businesses, with a clear upgrade path to
      enterprise contract as deployment scales. Annual contract values estimated in the
      $200K–$500K range for large enterprise deployments, with federal and regulated-sector
      customers typically at the higher end given FIPS and STIG compliance add-ons.

