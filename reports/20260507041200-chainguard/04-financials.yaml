callouts:
  - id: KCI001
    type: key-finding
    title: "7x ARR growth is exceptional but burn is high relative to revenue"
    body: >
      Chainguard's 7x YoY ARR growth to $40M places it in the top decile for enterprise SaaS growth.
      However, 622 employees at $40M ARR ($64K ARR per employee) indicates a significant growth
      investment that is not yet converting to capital efficiency. The company is well-capitalized
      ($892M raised, ~4–8 years estimated runway) and the growth investment is consistent with
      comparable cybersecurity SaaS at this stage. Gross margin and NRR are the key unknowns that
      would either validate or challenge the $3.5B valuation.
    claimRefs:
      - CI001
      - CI007
      - CI022

  - id: KCI002
    type: risk-flag
    title: "Revenue concentration and $100M ARR bridge are key financial risks"
    body: >
      Reaching $100M ARR from $40M in a single fiscal year requires either doubling customer count
      (to ~375) or expanding ACV significantly — or both. Customer concentration (est. top 10 customers
      holding 15–25% of ARR) creates revenue fragility if a major customer churns or renegotiates.
      The financial disclosure gap (no gross margin, NRR, or burn data) makes independent verification
      of the $3.5B valuation difficult, increasing diligence risk.
    claimRefs:
      - CI024
      - CI034
      - CI012

evidenceGaps:
  - type: missing-source
    severity: major
    topic: "Gross margin, NRR, CAC, LTV, burn rate, and churn — all financial operating metrics undisclosed"
    missingEvidence: "Chainguard has not disclosed any operating financial metrics beyond ARR, headcount, funding, valuation, and customer count."
    whyItMatters: "Without gross margin and NRR, it is impossible to independently validate the $3.5B valuation or assess the sustainability of the growth model."
    diligencePath: "Request management disclosure of at minimum gross margin, NRR, and dollar retention rate; review audited financials if available."
    relatedQuestionRefs:
      - QI011
      - QI012

