chapter:
  number: 4
  title: Financial Profile
  summary: |
    Chainguard is a high-growth, loss-making SaaS company in the hyper-scale phase. ARR reached
    $40M in FY2025 (7x year-over-year from approximately $5.7M in FY2024), with a $100M+ ARR
    target for FY2026. The company has raised $892M in total, including $636M in a six-month
    window (Series D + growth financing, April–October 2025), providing strong capital runway.
    Revenue model is subscription SaaS with per-team and per-image pricing. Unit economics are
    not publicly disclosed; estimated revenue per employee of ~$64K is below mature SaaS efficiency,
    consistent with aggressive growth investment. Gross margin and NRR are undisclosed private
    information. ARR multiple of ~87.5x (at April 2025 valuation) reflects frontier-growth pricing.

