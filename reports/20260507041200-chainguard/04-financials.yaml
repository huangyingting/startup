    missingEvidence: "No public disclosure of ARR attribution by product line; Images is assumed to be dominant but unconfirmed."
    whyItMatters: "Product mix affects gross margin (Libraries and VMs may have different margins) and revenue diversification story."
    diligencePath: "Request ARR bridge by product line from Chainguard finance."
