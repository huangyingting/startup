  headline: >
    Chainguard has built the deepest supply chain security moat in the market — SLSA L3 provenance, nightly zero-CVE
    rebuild, and Wolfi OS represent 4+ years of engineering investment that is hard for CNAPP incumbents to replicate.
    Strong regulatory tailwinds (EO 14028, NIS2, DORA) and a growing developer-led pipeline support the long-term
    thesis. However, the 87.5x trailing ARR entry multiple is priced for perfection and leaves no margin for execution
    failure. Recommendation: HOLD — upgrade to BUY on confirmed FY2026 ARR ≥ $80M with NRR ≥ 120%.
