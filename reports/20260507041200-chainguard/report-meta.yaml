companyProfile:
  summary: >
    Chainguard is a supply chain security company that produces zero-CVE container images
    and hardened language packages for enterprise and cloud-native customers. Its core
    product, Chainguard Images (2,000+ hardened images), is powered by Wolfi OS — a
    purpose-built Linux undistro with glibc support, daily package updates, and full
    SLSA L3 build provenance. Customers include Canva, GitLab, HPE, Snap, Anduril, ANZ Bank,
    Booz Allen Hamilton, and Elastic, spanning technology, defense, and financial services.
    Founded in October 2021 by four ex-Google engineers; led by CEO Dan Lorenc, co-creator
    of sigstore and cosign. Series D at $3.5B (April 2025); $892M total raised.
  foundedDate: "2021-10-01"
