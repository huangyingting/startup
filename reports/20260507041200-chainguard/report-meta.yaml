  foundingLocation: "Kirkland, WA"
  headquarters: "Kirkland, WA (remote-first)"
  productSummary: >
    Chainguard Images: 2,000+ hardened, zero-CVE container base images available as drop-in
    replacements for Docker Hub images. Chainguard Libraries: hardened open-source language
    packages (Python, Java, Node.js, Go). Chainguard VMs: hardened VM images for cloud providers.
    Commercial Builds (Jan 2026): bring-your-own-code builds with Chainguard hardening.
    All products carry full SLSA L3 provenance, cosign signatures, SBOMs, and a 24-hour
    critical CVE remediation SLA.
  customerFocus: >
    Enterprise DevSecOps and platform engineering teams in regulated industries (financial
    services, defense, healthcare) and high-security technology companies. U.S. federal
    and defense contractors (FedRAMP-aligned, FIPS-capable, EO 14028 SBOM compliance).
    PLG motion: developers adopting via cgr.dev (4M+ monthly pulls) → enterprise land-and-expand.
  businessModel: >
    SaaS subscription: per-image license fees based on image type and update frequency.
    Commercial Builds: custom hardening as a service (announced January 2026).
    Open core: Wolfi OS and base tooling (melange, apko, cosign) open source under Apache 2.0;
    commercial catalog, enterprise SLA, and support are subscription-gated.
  stage: Series D
  fundingStatus: >
    $140M Series D (April 2025) at $3.5B valuation; $892M total raised across seed, Series A
    ($50M, 2022), Series B ($61M, 2023), Series C ($140M, 2024), Series D ($140M, 2025).
    Investors include IVP, Redpoint, Sequoia Capital, and others.
  disclosureProfile: private-disclosed
  claimRefs: []

summary:
  headline: >
    Chainguard has built the deepest supply chain security moat in the market — SLSA L3
    provenance, nightly zero-CVE rebuild, and Wolfi OS represent 4+ years of engineering
    investment that is hard for CNAPP incumbents to replicate. Strong regulatory tailwinds
    (EO 14028, NIS2, DORA) and a growing developer-led pipeline support the long-term thesis.
    However, the 87.5x trailing ARR entry multiple is priced for perfection and leaves no
    margin for execution failure. Recommendation: HOLD — upgrade to BUY on confirmed FY2026
    ARR ≥ $80M with NRR ≥ 120%.
