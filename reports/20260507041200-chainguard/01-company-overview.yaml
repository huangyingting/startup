company:
  name: Chainguard

chapter:
  number: 1
  title: Company Overview
  summary: |
    Chainguard is a fully remote, Kirkland-Washington-incorporated cybersecurity startup founded in
    2021 by four former Google engineers who built foundational open-source supply-chain security
    tooling (sigstore, distroless, Tekton). The company's mission is to be the "trusted source for
    open source," providing zero-CVE hardened container images, language libraries, and VM images
    that eliminate vulnerabilities before they enter production. Chainguard crossed the unicorn
    threshold in July 2024 with a $140M Series C at a $1.12B valuation, then tripled to $3.5B in
    April 2025 ($356M Series D). A $280M General Catalyst growth-financing round in October 2025
    brought total raised to $892M. ARR reached $40M in fiscal year 2025 — a 7x year-on-year leap
    from roughly $5M — with 150+ enterprise customers including Canva, GitLab, HPE, Snap, and
    Anduril. The company employs approximately 350–620 people worldwide (estimates vary) and
    operates with no physical offices.

sections:
  - id: S-identity
    title: Identity, Founding, and Business Model
    body: |
      Chainguard was incorporated in 2021 and launched publicly with a December 2021 seed round of
      $5 million. The company is registered in Kirkland, Washington, though it operates as a
      fully distributed organization with no permanent physical office. Its four active co-founders —
      Dan Lorenc (CEO), Matt Moore (CTO), Kim Lewandowski (CPO), and Ville Aikas (Distinguished
      Engineer) — all held senior roles at Google, where they created or led sigstore (the de-facto
      open-source code-signing infrastructure), Distroless container images, and Kubernetes supply
      chain tooling. A fifth co-founder, Scott Nichols, departed in 2022.

      Chainguard's product thesis is "secure-by-design": rather than scanning for vulnerabilities
      after they appear, the company delivers minimal, hardened container images and language
      libraries that contain zero known CVEs (Common Vulnerabilities and Exposures) at time of
      delivery. Customers subscribe on a SaaS model to receive continuously rebuilt, patched image
      feeds and provenance-signed software bills of materials (SBOMs), replacing commodity public
      images from Docker Hub or language ecosystems with hardened equivalents that dramatically
      shrink the attack surface.

      The business model is subscription-based SaaS, with per-seat or per-image-pull pricing tiers
      targeting enterprise DevSecOps and platform-engineering teams. Revenue is aligned with
      customer usage of Chainguard Images, Chainguard Libraries, and the newer Chainguard VMs
      product line. Government-sector deals are structured around FedRAMP-aligned compliance
      requirements and SBOM mandates from U.S. executive orders.
    claimRefs:
      - CO001
      - CO002
      - CO003
      - CO004
      - CO005
      - CO006

  - id: S-funding
    title: Funding History, Valuation, and Investors
    body: |
      Chainguard has completed five priced rounds and one growth-financing tranche since founding,
      raising a cumulative $892 million as of October 2025. The trajectory reflects exceptional
      valuation compression: seed at implied sub-$50M; Series A ($50M, June 2022) at undisclosed
      terms; Series B ($61M, November 2023); Series C ($140M, July 2024) establishing the $1.12B
      unicorn valuation; and Series D ($356M, April 2025) reaching $3.5B — a 3.1x step-up in nine
      months. The October 2025 General Catalyst growth-financing round ($280M from the Customer
      Value Fund) was structured as strategic debt/growth capital rather than a traditional priced
      equity round, and did not trigger a new equity valuation headline; together with Series D it
      secured $636M within six months.

      Core venture investors include Sequoia Capital (since Series A), Kleiner Perkins (new in
      Series D), IVP (Series C and D co-lead), Lightspeed Venture Partners, Redpoint Ventures, and
      Spark Capital. Strategic corporate investors include Salesforce Ventures and Datadog Ventures
      (both new in Series D), signaling deep-pocketed go-to-market alignment with the enterprise
      software ecosystem. Amplify Partners and Mantis VC are also participating investors.

      There is no public indication of secondary transactions, tender offers, or founder liquidity
      events in any disclosed round. The company has not filed for IPO as of the report date.
    claimRefs:
      - CO007
      - CO008
      - CO009
      - CO010
      - CO011
      - CO012
      - CO013
      - CO014

  - id: S-milestones
    title: Key Milestones and Traction
    body: |
      Chainguard's rapid ascent from founding to $3.5B valuation in under four years is among the
      fastest supply-chain-security scale-ups on record. Demand accelerated sharply after several
      headline supply-chain incidents validated the market: the SolarWinds hack (2020), Log4Shell
      (2021), and the XZ Utils backdoor (March 2024) — an attempted compromise of a widely-used
      open-source compression library — each drove renewed enterprise urgency around securing
      software build pipelines. U.S. Executive Order 14028 (May 2021) and the subsequent OMB
      guidance on SBOMs created a compliance pull in federal procurement that benefits Chainguard
      directly.

      Customer traction metrics: 5x customer base growth year-on-year as reported at Series C
      (July 2024); over 175% ARR growth in the first six months of fiscal year 2024; 150+
      enterprise customers at Series D (April 2025); and ARR of $40M for full-year FY2025
      representing approximately 7x year-on-year growth from roughly $5–6M in FY2024. The company
      projects crossing $100M ARR before end of FY2026.

      Headcount has grown from under 50 at Series A to approximately 350–620 by 2025 (range
      reflects methodological differences across sources: GeekWire cited "over 350" in April 2025;
      LATKA estimated 622 for the same period). The company is fully remote and plans no physical
      office, offering coworking stipends and biannual company-wide summits.

      Notable product milestones include the July 2022 public launch of Chainguard Images, the
      2023 launch of Chainguard Libraries, the 2024 expansion into VM images, and the 2025
      introduction of AI-workload-specific secure images targeting LLM and GPU infrastructure
      deployments.
    claimRefs:
      - CO015
      - CO016
      - CO017
      - CO018
      - CO019
      - CO020

