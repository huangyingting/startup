callouts:
  - id: KCR001
    type: key-finding
    title: "Platform consolidation is the primary existential risk — 3 to 5 year horizon"
    body: >
      Google's $32B Wiz acquisition sets the pattern. Chainguard's window to reach $300M+ ARR
      independently before its category is consolidated into CNAPP platforms is approximately
      2027-2029. The federal compliance moat (FIPS/STIG/EO14028) provides partial insulation
      but does not protect the commercial enterprise market from platform bundling.
    claimRefs: [CR001, CR002, CR035]

  - id: KCR002
    type: risk-flag
    title: "Burn rate requires Series E or IPO by late 2026 — tight execution window"
    body: >
      Estimated $8-12M/month burn against $140M raised April 2025 gives 12-18 months runway.
      If FY2026 ARR tracks below $80M versus the $100M+ target, the $3.5B valuation faces
      material impairment requiring strategic alternatives. This is the most time-sensitive
      risk requiring active monitoring from close of investment.
    claimRefs: [CR018, CR019, CR032]
