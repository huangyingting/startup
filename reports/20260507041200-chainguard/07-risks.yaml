chapter:
  number: 7
  title: Risks
  summary: |
    Chainguard faces a moderate-to-high risk profile typical of a hypergrowth security startup
    at $3.5B valuation. Key risks: (1) platform consolidation by CNAPPs before IPO scale;
    (2) key-person concentration in Dan Lorenc; (3) sigstore/CNCF infrastructure dependency;
    (4) burn rate requiring IPO or Series E by late 2026; (5) EU data sovereignty gap.
    Regulatory environment is net-positive: EU NIS2, DORA, EO 14028, CISA Secure by Design
    create compliance tailwinds. No known litigation. The overriding thesis risk is CNAPP
    platform consolidation before Chainguard achieves independent IPO scale ($300M+ ARR).

