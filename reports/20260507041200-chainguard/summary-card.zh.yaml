summary:
  headline: >
    Chainguard 做出了市场里最深的供应链安全护城河：SLSA L3 溯源、每晚零 CVE 重建、Wolfi OS 背后是 4+ 年工程投入，CNAPP 既有厂商很难复制。EO 14028、NIS2、DORA
    等监管顺风，加上开发者驱动管线扩大，支撑长期逻辑。但 87.5x 追踪 ARR 入场倍数已经按完美执行定价，没有给执行失误留安全边际。建议：持有；若确认 FY2026 ARR ≥ $80M 且 NRR ≥ 120%，再上调至买入。
