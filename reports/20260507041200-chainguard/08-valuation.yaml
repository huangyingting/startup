sections:
  - id: SV_THESIS
    title: Investment Thesis and Anti-Thesis
    order: 1
    claimRefs:
      - CV009
      - CV010
      - CV011
      - CV012
      - CV013
      - CV014
      - CV022
      - CV029
    body: |
      Chainguard's investment thesis rests on three pillars: (1) a technology moat that is
      structurally difficult for CNAPP incumbents to replicate within 2-3 years (Wolfi OS,
      nightly rebuild pipeline, SLSA L3 provenance — ~4 years of engineering investment);
      (2) a regulatory tailwind that is multi-year and multi-jurisdictional (EO 14028, NIS2,
      DORA, CISA Secure by Design), creating compliance-driven enterprise pull without direct
      regulatory burden on Chainguard itself; and (3) a developer-led PLG motion (4M+ monthly
      pulls) that builds a capital-efficient bottom-up enterprise pipeline.

      The OSSRA 2025 report validates the persistent urgency of supply chain security (84% of
      commercial codebases carry open source vulnerabilities), and ARK and Goldman Sachs forecast
      25-30% CAGR in the relevant security market through 2030 — providing a long-term TAM
      of $7B+ to support the standalone growth thesis. The software supply chain security market
      is projected to grow from $2.4B in 2024 to $9.7B in 2030 at 26% CAGR.

      The anti-thesis centers on three concerns: (1) the 87.5x ARR entry multiple is punishing
      and leaves no room for execution failure — an ARR miss of even 20% would expand the multiple
      to ~100x, likely forcing a down round; (2) CNAPP platform consolidation (Google-Wiz, CRWD,
      PANW) could commoditize the container hardening market within 3 years, compressing
      Chainguard's TAM before it achieves IPO scale; (3) narrow product scope creates a ceiling
      risk at $100-200M ARR where enterprise buyers consolidate to fewer security platforms.
    tableRefs:
      - TV001
      - TV002
    figureRefs:
      - FV001
      - FV004
  - id: SV_VALUATION
    title: Valuation Context and Scenario Analysis
    order: 2
    claimRefs:
      - CV001
      - CV002
      - CV003
      - CV015
      - CV016
      - CV017
      - CV018
      - CV023
      - CV027
      - CV028
      - CV031
      - CV035
      - CV040
    body: |
      At $3.5B and ~$40M estimated FY2025 ARR, Chainguard trades at approximately 87.5x trailing
      ARR — a multiple that is 4x the 2024 VC market median of 22x (Pitchbook) and reflects
      a premium for 150%+ growth and a defensible technical moat. Goldman Sachs growth-adjusted
      benchmarks suggest 150%+ growth companies can command 30-50x forward revenue multiples;
      at $100M FY2026 ARR (bull), the multiple compresses to 35x — still at a premium to public
      comps (CrowdStrike ~25x, SentinelOne ~20x) but within justifiable range. The Bessemer /
      Meritech public SaaS benchmark for premium-growth cybersecurity companies supports 30-50x
      forward for the fastest-growing cohort.

      Three scenarios: Bull (25%): $100M+ FY2026 ARR, NRR 130%+, 2027-2028 exit at 40-50x ARR
      = $7.2-9B, 2-2.6x return. Base (50%): $80M FY2026 ARR, $200M ARR at IPO 2028 at 30-35x
      = $6-7B, 1.7-2x return. Bear (25%): $55-65M FY2026 ARR, deceleration, M&A or down round
      at 20-25x ARR = $1.4-2B, 0.4-0.57x return. Probability-weighted expected value is ~$5.7B
      implying a 1.6x expected return at $3.5B entry (pre-dilution). With $892M raised and likely
      1x liquidation preferences, the preference overhang is material — in the bear case, preferred
      investors capture all proceeds below $892M. A Lacework-style outcome (2024 acquisition for
      significantly less than $8.3B raised valuation) remains a tail risk.
    tableRefs:
      - TV003
      - TV005
    figureRefs:
      - FV002
      - FV003
  - id: SV_COMPARABLES
    title: Comparable Set and Exit Readiness
    order: 3
