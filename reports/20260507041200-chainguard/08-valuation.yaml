  title: Valuation
  summary: |
    Chainguard trades at ~87.5x estimated FY2025 ARR ($3.5B / ~$40M ARR), reflecting a
    premium valuation for a company with proven technology differentiation and a clear
    regulatory tailwind but limited public ARR evidence and a concentrated product scope.
    Recommendation: HOLD with a 12-month review trigger. Upgrade to BUY if FY2026 ARR
    exceeds $80M with NRR > 120%. Downgrade to SELL/EXIT if FY2026 ARR tracks below $60M
    or a CNAPP announces native zero-CVE image rebuilding at commodity pricing.
    Base case exit: $6–8B in an IPO or strategic acquisition at $200–250M ARR (2028).
