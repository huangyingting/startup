chapter:
  number: 6
  title: Customers and Market Traction
  summary: |
    Chainguard has 150+ enterprise customers as of early 2025, anchored by named references
    including Canva, GitLab, HPE, Snap, Anduril, and ANZ Bank. The customer base spans
    cloud-native software companies, defense/government contractors, and regulated-industry
    enterprises. Growth is driven by a product-led motion (PLG) through the free image tier
    that converts to paid subscriptions. Customers typically report 80%+ reduction in
    container CVEs and significant engineering time savings. Net revenue retention is not
    publicly disclosed, but the company is targeting $100M+ ARR for FY2026, implying
    strong expansion dynamics within the existing customer base.
