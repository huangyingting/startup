callouts:
  - id: KCU001
    type: key-finding
    title: 150+ enterprise customers with strong vertical diversification at $40M ARR
    body: >
      Chainguard's 150+ enterprise customers span five distinct verticals with no apparent concentration in any single
      industry, and named references include cloud-scale logos (Canva, Elastic, Snap) alongside regulated-sector anchors
      (Anduril, ANZ Bank). The Elastic case study's 90% CVE reduction outcome is the strongest quantitative validation
      of Chainguard's core value proposition.
    claimRefs:
      - CU001
      - CU004
      - CU016
  - id: KCU002
    type: risk-flag
    title: NRR and customer concentration not disclosed — key due diligence gap
    body: >
      Chainguard does not publicly disclose NRR, customer concentration (top-10 ARR share), or formal churn rate. At
      $267K implied ACV and 150 customers, even moderate concentration (top 10 customers at 50% ARR) would create
      meaningful revenue sustainability risk. Investors should require NRR disclosure and cohort retention data as a
      pre-closing diligence condition.
    claimRefs:
      - CU015
      - CU012
