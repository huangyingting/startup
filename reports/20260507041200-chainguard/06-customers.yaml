sections:
  - id: SU_OVERVIEW
    title: Customer Base Overview and Growth
    order: 1
    claimRefs:
      - CU001
      - CU002
      - CU003
      - CU019
      - CU023
    body: |
      Chainguard has grown to 150+ enterprise customers as of April 2025, achieving this in
      approximately 3.5 years since founding in October 2021. The customer base is anchored by
      named references including Canva, GitLab, HPE, Snap, Anduril, ANZ Bank, Booz Allen
      Hamilton, and Elastic. ARR was approximately $40M in FY2025, with a target of $100M+
      for FY2026, implying a 150%+ growth rate — significantly above the 30-40% growth
      typical for security SaaS at comparable scale. Customer count has grown at approximately
      50-75% CAGR since founding: from essentially zero at founding (October 2021) to 150+ at
      Series D (April 2025).

      The aggregate customer impact claimed by Chainguard is 100,000+ engineering hours saved
      on vulnerability remediation — a metric reflecting the labor intensity of manual CVE
      patching that Chainguard's automated pipeline eliminates. At $40M ARR and 150+ customers,
      the implied average contract value is approximately $267K per customer, consistent with
      an enterprise (not SMB) business model. Compared to Snyk at a similar ARR stage (which
      had 1,200+ customers at $100M ARR implying ~$83K ACV), Chainguard operates significantly
      upmarket — reflecting a CISO-level, compliance-driven buying process rather than Snyk's
      developer-led bottom-up motion.
    tableRefs:
      - TU002
  - id: SU_CUSTOMERS
    title: Named Customer Case Studies and Vertical Coverage
    order: 2
    claimRefs:
      - CU005
      - CU006
      - CU007
      - CU008
      - CU011
      - CU016
      - CU022
    body: |
      Chainguard's named customer portfolio spans five distinct verticals: cloud-native
      software companies (Canva, GitLab, Elastic, Snap), enterprise IT (HPE), defense and
      government (Anduril Industries, Booz Allen Hamilton), financial services (ANZ Bank),
      and federal contractors. This vertical diversification is notable for a company at
      Chainguard's stage and reduces revenue concentration risk across any single industry.

      The strongest documented customer outcome is Elastic's published case study, which
      reports approximately 90% CVE reduction after migrating to Chainguard Images —
      making it the most quantitatively validated customer reference. Snap's public
      endorsement confirms consumer-internet-scale production adoption. GitLab's November
      2024 partnership announcement gives Chainguard distribution access to GitLab's 30M+
      developer user base as a channel for PLG adoption.

      Federal and defense customers (Anduril, Booz Allen) follow a distinct adoption
      pattern: rather than developer-led bottom-up adoption, these customers are driven
      by compliance requirements — FIPS 140-2 certification, STIG hardening mandates, and
      EO 14028's SBOM requirements. This creates a second, regulatory-driven demand
      channel that operates independently of Chainguard's PLG motion.
    tableRefs:
      - TU001
      - TU003
    figureRefs:
      - FU003
  - id: SU_GTM
    title: Go-to-Market Model, Retention, and Expansion
    order: 3
    claimRefs:
      - CU009
      - CU010
      - CU014
      - CU015
      - CU017
      - CU020
      - CU026
    body: |
      Chainguard operates a hybrid PLG plus enterprise sales model. Developers adopt the
      free tier of Chainguard Images (up to 5 images, :latest tag only) through self-serve
      pull from the Chainguard registry (cgr.dev). Chainguard's inside and field sales
      team then identifies developer-adopting organizations and converts them to paid
      enterprise subscriptions through a land-and-expand motion. The free tier is
      deliberately limited to drive conversion: version pinning, historical image access,
      SBOM downloads, and SLA coverage all require paid subscription.

      The expansion model within customers flows from Images (initial land) to Libraries
      (language-level hardening, broader team coverage) to VMs (infrastructure teams)
      to Commercial Builds (for ISVs and enterprises with proprietary application builds).
      Net revenue retention and customer concentration are not publicly disclosed,
      creating diligence uncertainty. At 622 employees against $40M ARR, revenue
      per employee is approximately $64K — below the $200K efficiency target — indicating
      the company is still in GTM scaling mode, consistent with its hiring pace and
      fundraising cadence. The primary adoption blockers cited in user reviews are
      catalog coverage gaps and migration complexity when transitioning from Alpine-
      based images to Wolfi-based equivalents. Chainguard does not appear to have a
      channel or reseller program beyond the GitLab partnership, relying primarily on
      direct enterprise field sales supported by the PLG developer community funnel. The
      developer ecosystem signal from GitHub community activity (tens of thousands of
      repository stars across open-source Wolfi and sigstore projects) provides an
      organic awareness channel that reduces cost of top-of-funnel customer acquisition
      relative to competitors who rely exclusively on paid marketing.
    tableRefs:
      - TU004
      - TU005
    figureRefs:
      - FU001
      - FU002
      - FU004
