  - id: SM-buyers
    title: Buyer Segments and Demand Dynamics
    body: |
      Chainguard's primary buyers are large enterprise and public-sector organizations that operate
      cloud-native production environments and face regulatory or contractual security requirements.
      The buying decision typically sits with Platform Engineering, DevSecOps, or Cloud Security
      teams, with CISO and Chief Architect sign-off for enterprise deals and Contracting Officer
      approval for U.S. federal deals.

      **Technology sector** (including software companies and hyperscalers) is the largest
      segment by volume. These organizations run extensive container-based workloads, maintain
      large open-source software dependencies, and often face customer security review requirements
      (SOC 2, ISO 27001) that incentivize supply chain hardening. Named Chainguard customers
      including Canva, GitLab, Snap, and Anduril reflect this segment.

      **Financial services** (banking, insurance, capital markets) is the second-largest segment
      by revenue potential due to high regulatory scrutiny, large IT budgets, and zero-tolerance
      for data breaches. ANZ Bank is a named customer, suggesting APAC banking adoption. U.S. and
      EU financial regulators increasingly require provenance documentation for software systems.

      **Federal government** (U.S. Department of Defense, civilian agencies, defense contractors)
      is the highest-value segment for per-contract revenue, driven by EO 14028 and OMB M-22-18
      SBOM mandates. FedRAMP authorization requirements for cloud-based tools create both a barrier
      to entry (protecting incumbents) and a competitive moat once cleared (locking out
      unauthorized vendors).

      **Healthcare and critical infrastructure** segments are emerging, driven by HHS cybersecurity
      guidance, CISA Critical Infrastructure advisories, and post-incident response requirements
      following ransomware attacks on healthcare IT.

      The buying cycle for enterprise supply chain security tools typically ranges from 3–9 months,
      with complexity increasing in regulated industries. Chainguard's strategy of developer
      adoption (bottom-up, community) combined with enterprise contracts (top-down, CISO) reflects
      the product-led-growth pattern common in developer-tool companies.
