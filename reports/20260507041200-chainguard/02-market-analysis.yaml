  - id: FM004
    title: Adoption Path — Value Chain from OSS Publish to Secure Production Deployment
    type: flow
    layout: wide
    summary: |
      Traces the software supply chain from upstream open-source publishing through
      to enterprise production deployment, showing where Chainguard intervenes and the
      attack surfaces at each step.
    data:
      nodes:
        - id: oss_pub
          label: Upstream OSS Publishing
          detail: Developers/maintainers publish packages to registries (npm, PyPI, Docker Hub)
        - id: oss_risk
          label: Supply Chain Attack Surface
          detail: Compromised maintainer, typosquatting, malicious dependency, CVE introduction
        - id: chainguard_build
          label: Chainguard Secure Build
          detail: Wolfi-based minimal images, zero-CVE at delivery, SBOM + sigstore attestation
        - id: enterprise_ci
          label: Enterprise CI/CD Pipeline
          detail: GitHub Actions, Jenkins, GitLab CI — pulls Chainguard hardened base images
        - id: container_registry
          label: Private Container Registry
          detail: AWS ECR, Azure ACR, GCP Artifact Registry with Chainguard images
        - id: prod
          label: Production Kubernetes / VM
          detail: Running with continuously patched, zero-CVE Chainguard runtime
        - id: compliance
          label: SBOM / Compliance Output
          detail: Automated SBOM generation satisfies EO 14028, EU CRA, FedRAMP audit
      edges:
        - from: oss_pub
          to: oss_risk
        - from: oss_risk
          to: chainguard_build
        - from: chainguard_build
          to: enterprise_ci
        - from: enterprise_ci
          to: container_registry
        - from: container_registry
          to: prod
        - from: prod
          to: compliance
    approximationNotes: null
    claimRefs:
      - CM014
      - CM015
      - CM016
callouts:
  - calloutType: strength
    title: Triple Demand Catalyst Is Structural, Not Cyclical
    body: |
      Chainguard benefits from simultaneous tailwinds: security incidents create urgency,
      regulatory mandates create compliance pull, and cloud-native adoption creates
      the technical prerequisite for its products. Unlike single-catalyst security markets,
      this multi-driver pattern is likely to sustain demand even if one driver weakens.
    claimRefs:
      - CM012
      - CM013
      - CM014
  - calloutType: risk
    title: Market Estimates Vary Widely — Execution Risk Is High at Sub-1% Share
    body: |
      The software supply chain security and container security markets are fragmented across
      analyst definitions, with estimates ranging 2x–3x for the same segment. Chainguard's
      $40M ARR in a $6–8B market means the company has barely scratched the surface — both
      a massive opportunity and a signal that widespread adoption is far from guaranteed.
    claimRefs:
      - CM001
      - CM002
      - CM019
