chapter:
  number: 2
  title: Market Analysis
  summary: |
    Chainguard operates at the intersection of three converging security markets: software supply
    chain security (~$2.5B TAM in 2024), container/cloud-native application security (~$2.3–3.6B
    in 2024), and DevSecOps platforms ($8.84B in 2024). Combined, the addressable market for
    Chainguard's products is approximately $6–8B in 2024, expanding to $15–25B by 2030 at
    blended CAGRs of 15–25%. The market is driven by a triple catalyst of supply-chain incidents
    (SolarWinds, XZ Utils), regulatory mandates (U.S. EO 14028, EU CRA, FedRAMP SBOM
    requirements), and enterprise cloud-native adoption. Buyers span large enterprise platform
    engineering and DevSecOps teams in technology, financial services, healthcare, and
    federal government verticals. Chainguard's $40M ARR against a $6–8B market implies sub-1%
    market share, indicating early-stage penetration with substantial headroom. Constraints include
    high DevSecOps maturity requirements, complex enterprise sales cycles, and competition from
    established incumbents with bundled security offerings.
sections:
  - id: SM-market-def
    title: Market Definition and Scope
    body: |
      Chainguard competes in the software supply chain security market — a subset of application
      security addressing vulnerabilities introduced at build time, before code reaches production.
      The company's products (hardened container images, language libraries, VM images) occupy a
      distinct niche within this market: preventive secure-by-design infrastructure rather than
      reactive vulnerability detection (scanning). The relevant TAM encompasses organizations
      that (a) rely on containerized or VM-based workloads in production, (b) consume open-source
      software at scale, and (c) face regulatory or contractual requirements around software
      provenance and SBOM generation.

      Three adjacent markets define Chainguard's combined TAM frame:

      1. **Software supply chain security**: focused on securing the build pipeline, dependency
      management, code signing, and artifact integrity. Global market estimated at $2.4–3.1B in
      2024, growing at 12–22% CAGR toward $5.1–12.5B by 2030–2033 across multiple analyst
      estimates.

      2. **Container and cloud-native application security**: covers container image scanning,
      runtime protection, Kubernetes security posture management (KSPM), and supply chain integrity
      for containerized workloads. Estimated at $2.3–3.6B in 2024, with more aggressive growth
      forecasts of 20–26% CAGR reaching $9.4–25B by 2030–2035.

      3. **DevSecOps platforms**: integrated security tooling embedded in CI/CD pipelines. Grand
      View Research estimates the DevSecOps market at $8.84B in 2024, growing to $20.2B by 2030
      at a 13.2% CAGR. Chainguard's workflow integrations position it inside the DevSecOps
      platform layer as a secure base-image provider.

      The blended TAM for Chainguard — applying a conservative overlap-adjusted estimate — is
      approximately $6–8B in 2024, expanding to $15–25B by 2030. Chainguard's $40M ARR
      represents less than 0.7% market share, indicating the company is in an early scaling
      phase against a very large opportunity.
