  - id: SM-growth
    title: Growth Drivers, Constraints, and Market Risks
    body: |
      **Primary growth drivers** for Chainguard's market are structural and near-term:

      - *Regulatory acceleration*: U.S. Executive Order 14028 (SBOM mandates, May 2021), OMB
        M-22-18, EU Cyber Resilience Act (2024), NIST SSDF, and FedRAMP SBOM requirements create
        compliance pull. By 2025–2026, SBOM requirements are expanding to financial services (ECB,
        PRA) and critical infrastructure sectors beyond federal IT.

      - *Supply chain incidents*: Each high-profile incident (SolarWinds 2020, Log4Shell 2021,
        XZ Utils 2024) produces a measurable surge in security buyer urgency and procurement
        timeline compression. The XZ Utils backdoor specifically validated the risk of
        nation-state attackers compromising open-source maintainers — Chainguard's exact
        threat model.

      - *Cloud-native adoption*: Kubernetes usage continues to grow; CNCF's 2024 Annual Survey
        found over 80% of enterprises running Kubernetes in production. Each container-based
        workload creates a unit of demand for secure base images.

      - *AI workload proliferation*: The emergence of LLM inference and training infrastructure
        (GPU clusters, containerized model serving) introduces new and large open-source dependency
        footprints. Chainguard has explicitly targeted AI workloads in its Series C messaging.

      **Market constraints and risks**:

      - *DevSecOps maturity prerequisite*: Chainguard's products require customers to have
        established CI/CD pipelines and container infrastructure. Small and mid-market organizations
        lack this maturity, narrowing the current SAM.

      - *CISO skepticism about scanning vs. prevention*: Some enterprise buyers continue to use
        point scanning tools and are skeptical of migrating to a prevention-first model. This
        creates customer education overhead and longer sales cycles.

      - *Competition from bundled security platforms*: Cloud providers (AWS ECR, Azure ACR, GCP
        Artifact Registry) and endpoint security vendors (CrowdStrike, Palo Alto Networks,
        Aqua Security) bundle container scanning into broader platforms, reducing standalone
        budgets available for purpose-built tools.

      - *Regulatory slowdown risk*: If U.S. policy direction shifts and SBOM enforcement slackens
        under a different administration, compliance pull could diminish — though industry-driven
        adoption would likely continue on its own momentum.

      - *Market fragmentation*: Analyst estimates for the market size vary by 2x–3x across
        sources, reflecting definitional inconsistencies. This fragmentation complicates
        TAM/SAM measurement and investor comparisons.
