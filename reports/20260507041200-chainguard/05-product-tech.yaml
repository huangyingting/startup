callouts:
  - id: KCE001
    type: key-finding
    title: "Build-time security and nightly rebuild is the core technical moat"
    body: >
      Chainguard's architectural advantage is that security is built into the image at
      construction time, not detected afterward. The nightly Wolfi rebuild pipeline — supported by
      melange, apko, and cosign — creates an operational flywheel that no competitor currently
      replicates at this scale (2,000+ images). Elastic's 90% CVE reduction validates the
      real-world impact for customers.
    claimRefs: [CE001, CE013, CE014]

  - id: KCE002
    type: risk-flag
    title: "Runtime security gap and catalog coverage limit are the key product risks"
    body: >
      Chainguard has no runtime security product, creating a platform coverage gap relative to
      CNAPP competitors. The catalog coverage limitation (not every package has a Wolfi equivalent)
      creates friction for organizations with complex or legacy software stacks. These two gaps
      define the product's current ceiling and are the primary arguments for Chainguard either
      building runtime capabilities or partnering with a complementary runtime vendor.
    claimRefs: [CE019, CE032]

