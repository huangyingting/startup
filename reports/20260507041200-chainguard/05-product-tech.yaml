chapter:
  number: 5
  title: Product and Technology
  summary: |
    Chainguard's product portfolio centers on Wolfi OS — a purpose-built Linux "undistro" —
    and a nightly rebuild pipeline that produces 2,000+ zero-CVE container images, hardened
    language libraries, and VM images. The technical differentiation is build-time security:
    images are rebuilt nightly from upstream sources, SBOMs are generated at build time, and
    every artifact is signed with cosign/sigstore achieving SLSA Build Level 3. Tools melange
    (package builder) and apko (image assembler) are the open-source build infrastructure.
    The product delivers drop-in compatibility with public Docker Hub images while eliminating
    known CVEs at the point of delivery.

