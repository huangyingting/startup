sections:
  - id: SE_PRODUCT
    title: "Product Architecture and Core Technology"
    order: 1
    claimRefs: [CE001, CE002, CE003, CE014, CE034]
    body: |
      Chainguard's technical architecture is built on a three-layer stack: (1) Wolfi OS — a
      purpose-built Linux undistro that provides the foundational package system; (2) the melange/apko
      build pipeline — open-source, declarative tools that convert Wolfi package definitions into
      minimal OCI container images with embedded SBOMs; and (3) the cosign/sigstore signing layer
      that cryptographically attests every artifact. Every night, the pipeline evaluates all 2,000+
      image definitions against upstream source repositories, rebuilds any image whose upstream
      packages have changed (including CVE patches), and signs the resulting images with in-toto
      provenance attestations at SLSA Build Level 3. This automated rebuild cadence is a core
      operational differentiator: competitors who patch on-demand cannot match Chainguard's
      systematic approach to maintaining zero-CVE status across the full image catalog.

      Wolfi's key design decisions differentiate it from Alpine Linux: it uses glibc (vs Alpine's
      musl libc) for broader enterprise application compatibility, provides individually versioned
      packages rather than a monolithic distro release cycle, and generates machine-readable SBOMs
      for every package at build time. The melange build system is fully declarative (YAML-based
      package definitions), making builds reproducible and auditable. The pipeline processes
      over 500 million build manifests, reflecting its considerable scale and sustained operational maturity across the entire image catalog.

  - id: SE_PRODUCTS
    title: "Product Portfolio and Compliance"
    order: 2
    claimRefs: [CE006, CE007, CE015, CE010, CE023, CE024]
    body: |
      Chainguard's product portfolio comprises four lines: (1) Chainguard Images — the flagship
      container image subscription covering 2,000+ images across OS bases, language runtimes,
      databases, web servers, and AI/ML frameworks; (2) Chainguard Libraries — hardened, continuously
      patched packages for Python, Java, Node.js, Go, and other ecosystems; (3) Chainguard VMs —
      hardened virtual machine images for AWS, Azure, and GCP cloud compute; and (4) Commercial
      Builds (launched January 2026) — a product allowing enterprises to use the Wolfi build
      infrastructure to produce proprietary application builds with verified provenance.

      The compliance story is central to the federal and regulated-industry go-to-market: Chainguard
      provides FIPS 140-2 validated and STIG-hardened image variants, aligning with NIST SP 800-218
      SSDF mandates and enabling FedRAMP-compliant deployments. This regulatory moat is difficult for
      pure DevSecOps SaaS vendors (Snyk, Aqua) to replicate without equivalent build-time SBOM and
      attestation infrastructure.

  - id: SE_LIMITS
    title: "Product Limitations and Competitive Considerations"
    order: 3
    claimRefs: [CE008, CE019, CE020, CE021, CE032, CE033]
    body: |
      Chainguard's principal product limitation is catalog coverage: not every open-source software
      package has a Wolfi equivalent, requiring customers to request new images or maintain custom
      builds for legacy or niche software. The free tier is restricted to the :latest tag without
      version pinning, creating friction for teams that require reproducible builds with pinned
      image digests. G2 user reviews note that this free-tier limitation makes initial value
      demonstration harder compared to tools (Docker Scout, Grype) that scan existing images
      without requiring a migration to a new container base.

      The 'zero-CVE' claim is precise but requires nuanced interpretation: Chainguard Images have
      zero known CVEs at publish time, not zero future CVEs; new vulnerabilities discovered post-publish
      are remediated within the contractual SLA (7 days for critical). Chainguard has a material
      dependency on the sigstore/cosign infrastructure (hosted by CNCF/OpenSSF), which introduces
      an upstream supply chain dependency for its own signing chain. A compromise of the sigstore
      transparency log or CNCF-hosted infrastructure would materially affect Chainguard's trust model.

      The product scope excludes runtime security, CSPM (cloud security posture management), and
      network-level threat detection — a gap relative to CNAPP competitors such as Palo Alto
      Prisma Cloud and Wiz that provide end-to-end cloud security. This positions Chainguard
      as a point solution in the broader security stack rather than a platform, which may limit
      budget size per deal and increase risk of platform consolidation as CNAPPs expand into
      image supply chain capabilities. Community feedback on GitHub and G2 also cites that the
      Wolfi glibc choice, while improving compatibility, can require application-level build
      adjustments for teams migrating from Alpine-based musl images.

