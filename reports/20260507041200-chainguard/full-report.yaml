      - number: '1.2'
        title: Funding History, Valuation, and Investors
        blocks:
          - type: paragraph
            body: |
              Chainguard has completed five priced rounds and one growth-financing tranche since founding,
              raising a cumulative $892 million as of October 2025. The trajectory reflects exceptional
              valuation compression: seed at implied sub-$50M; Series A ($50M, June 2022) at undisclosed
              terms; Series B ($61M, November 2023); Series C ($140M, July 2024) establishing the $1.12B
              unicorn valuation; and Series D ($356M, April 2025) reaching $3.5B — a 3.1x step-up in nine
              months. The October 2025 General Catalyst growth-financing round ($280M from the Customer
              Value Fund) was structured as strategic debt/growth capital rather than a traditional priced
              equity round, and did not trigger a new equity valuation headline; together with Series D it
              secured $636M within six months.

              Core venture investors include Sequoia Capital (since Series A), Kleiner Perkins (new in
              Series D), IVP (Series C and D co-lead), Lightspeed Venture Partners, Redpoint Ventures, and
              Spark Capital. Strategic corporate investors include Salesforce Ventures and Datadog Ventures
              (both new in Series D), signaling deep-pocketed go-to-market alignment with the enterprise
              software ecosystem. Amplify Partners and Mantis VC are also participating investors.

              There is no public indication of secondary transactions, tender offers, or founder liquidity
              events in any disclosed round. The company has not filed for IPO as of the report date.
