      - number: '8.3'
        title: Comparable Set and Exit Readiness
        blocks:
          - type: paragraph
            body: |
              The comparable set spans positive M&A comps, public trading comps, and cautionary
              private comps. Positive: Wiz acquired at ~$32B / ~$500M ARR = ~64x ARR (March 2025) is
              the ceiling M&A comparable; suggests a strategic acquirer could pay $5-7B for Chainguard
              at $150-200M ARR. Public comps trade at 18-25x ARR; CrowdStrike at $5B ARR commands 25x,
              SentinelOne at $1B ARR commands ~20x. Palo Alto Networks' Prisma Cloud CNAPP carries 8-12x
              blended, illustrating the severe derating at slower growth rates.

              Cautionary comps: Lacework raised at $8.3B in 2021 at sub-$100M ARR (~80x), then sold to
              Fortinet (2024) at a fraction, with Fortinet taking a write-down. Orca Security's 2024
              flat round at $1.8B signals that stagnant growth leads to valuation reset. Both are direct
              precedents for the risk Chainguard carries at 87.5x ARR. Exit readiness: Chainguard has
              strong qualitative attributes (governance, legal maturity, prominent investors) but requires
              $200M+ ARR, 70%+ gross margins, and Rule of 40 > 50 for a successful public offering.
              The IPO window for cybersecurity is improving in 2025-2026, but the practical timeline
              for Chainguard under the base case is 2028. M&A by a strategic buyer remains a credible
              alternative exit path at a 40% probability within 3 years.
            claimRefs:
