  - number: 5
    title: Product & Technology
    sections:
      - number: '5.1'
        title: Product Architecture and Core Technology
        blocks:
          - type: paragraph
            body: >
              Chainguard's technical architecture is built on a three-layer stack: (1) Wolfi OS — a

              purpose-built Linux undistro that provides the foundational package system; (2) the melange/apko

              build pipeline — open-source, declarative tools that convert Wolfi package definitions into

              minimal OCI container images with embedded SBOMs; and (3) the cosign/sigstore signing layer

              that cryptographically attests every artifact. Every night, the pipeline evaluates all 2,000+

              image definitions against upstream source repositories, rebuilds any image whose upstream

              packages have changed (including CVE patches), and signs the resulting images with in-toto

              provenance attestations at SLSA Build Level 3. This automated rebuild cadence is a core

              operational differentiator: competitors who patch on-demand cannot match Chainguard's

              systematic approach to maintaining zero-CVE status across the full image catalog.


              Wolfi's key design decisions differentiate it from Alpine Linux: it uses glibc (vs Alpine's

              musl libc) for broader enterprise application compatibility, provides individually versioned

              packages rather than a monolithic distro release cycle, and generates machine-readable SBOMs

              for every package at build time. The melange build system is fully declarative (YAML-based

              package definitions), making builds reproducible and auditable. The pipeline processes

              over 500 million build manifests, reflecting its considerable scale and sustained operational maturity
              across the entire image catalog.
            claimRefs:
              - CE001
              - CE002
              - CE003
              - CE014
              - CE034
