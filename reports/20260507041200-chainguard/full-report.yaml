  - number: 7
    title: Risks
    sections:
      - number: '7.1'
        title: Strategic and Competitive Risks
        blocks:
          - type: paragraph
            body: |
              The dominant strategic risk for Chainguard is platform consolidation: as CNAPP vendors
              (Palo Alto Prisma Cloud, post-Wiz Google Security, CrowdStrike Falcon Cloud Security,
              Microsoft Defender for Cloud) expand container security and supply chain capabilities,
              the standalone market for an image hardening point solution may compress. Google's March
              2025 acquisition of Wiz for $32B is the defining precedent — Google now has a CNAPP
              platform with container scanning capabilities and will develop aggressively into the image
              supply chain layer. CrowdStrike and Microsoft represent the second and third most significant
              platform threats, each expanding their CNAPP offerings with scanning and attestation features.
              Chainguard's technical moat (nightly rebuild pipeline, Wolfi OS, build-time SBOMs, SLSA L3
              provenance) is deep and difficult to replicate quickly, but well-resourced competitors at
              Google or Microsoft scale could invest meaningfully in replication over a 2–3 year horizon.

              Startup competition is more modest: RapidFort competes with a lower-friction approach
              (removing unused packages without migration) providing weaker supply chain guarantees.
              AWS ECR Inspector and Docker Scout provide free scanning that competes for scanning
              budget but not for Chainguard's rebuild-and-attest model. The open-core Wolfi model
              introduces a free-rider dynamic: any competitor can fork Wolfi package definitions under
              Apache 2.0 to build a competing image catalog without contributing back commercially.
              Compared to Snyk at a comparable ARR stage, Chainguard's moat is deeper (build-time
              hardening is harder to replicate than scanning) but market concentration is higher.
              The existential risk ranking places consolidation first by severity; the window for
              Chainguard to achieve independent IPO scale ($300M+ ARR) before consolidation makes
              point-solution positioning untenable is estimated at 2027–2029. Strategic acquisition
              by Google, CrowdStrike, or Palo Alto at a premium to $3.5B remains the most likely
              exit path if the IPO window narrows.
            claimRefs:
              - CR001
              - CR002
              - CR013
              - CR014
              - CR020
              - CR021
              - CR033
              - CR036
          - type: table
            tableRef: TR003
            claimRefs:
              - CR008
              - CR014
              - CR022
              - CR024
      - number: '7.2'
        title: Regulatory, Legal, and Compliance Risks
        blocks:
          - type: paragraph
            body: |
              Chainguard's regulatory risk profile is asymmetrically positive: minimal direct regulatory
              obligations (no known litigation, no EU entity creating direct NIS2/DORA liability) while
              customers' compliance obligations create pull-demand for Chainguard's products. EU NIS2
              (effective October 2024) mandates supply chain risk management for critical infrastructure
              operators across 18 sectors; EU DORA (effective January 2025) mandates ICT supply chain
              controls and due diligence for EU financial institutions. The European Banking Authority's
              DORA guidelines specifically require documentation of ICT third-party risk including
              software supply chains — a requirement Chainguard's SBOM attestation and SLSA provenance
              directly satisfy. Both create demand for SBOM-attested container images across European
              enterprise customers.

              In the United States, CISA Secure by Design guidance (2024) and EO 14028 SBOM mandate
              provide parallel regulatory tailwinds in the federal and defense segments, reinforcing the
              compliance moat against CNAPP consolidation in government verticals. CISA's endorsement of
              supply chain attestation practices makes Chainguard's product positioning officially endorsed
              by the U.S. cybersecurity authority. The key risk to monitor is EU data sovereignty:
              Chainguard lacks a European data center or EU legal entity, potentially limiting adoption
              by NIS2-regulated entities with data residency requirements in Germany, France, and other
              member states. DORA compliance assessments extend European financial services sales cycles
              but increase switching costs post-adoption — a structural retention benefit for enterprise
              accounts acquired through compliance-driven procurement. No material litigation, IP disputes,
              or regulatory enforcement actions against Chainguard have been identified as of May 2026.
            claimRefs:
              - CR003
              - CR004
              - CR007
              - CR016
              - CR022
              - CR027
              - CR031
              - CR039
          - type: table
            tableRef: TR001
