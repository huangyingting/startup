      - number: '7.4'
        title: Exhibits
        blocks:
          - type: callout
            title: Platform consolidation is the primary existential risk — 3 to 5 year horizon
            body: >
              Google's $32B Wiz acquisition sets the pattern. Chainguard's window to reach $300M+ ARR independently
              before its category is consolidated into CNAPP platforms is approximately 2027-2029. The federal
              compliance moat (FIPS/STIG/EO14028) provides partial insulation but does not protect the commercial
              enterprise market from platform bundling.
            calloutType: insight
            claimRefs:
              - CR001
