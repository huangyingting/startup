  - number: 3
    title: Competitors
    sections:
      - number: '3.1'
        title: Competitive Overview
        blocks:
          - type: paragraph
            body: |
              Chainguard competes at the intersection of container security, software supply chain provenance,
              and DevSecOps tooling. The vendor landscape spans three distinct layers: (1) direct supply-chain
              and container-security specialists — Snyk ($8.5B valuation, developer-first SCA and container
              scanning), RapidFort (post-build container hardening), and Sysdig (Kubernetes runtime security);
              (2) full Cloud-Native Application Protection Platform (CNAPP) vendors — Aqua Security ($1B+),
              Palo Alto Cortex Cloud, Orca Security, and CrowdStrike Falcon Cloud Security; and (3) indirect
              substitutes — Red Hat Universal Base Images (UBI), Alpine Linux, Docker Official Images, and
              cloud-provider native scanning tools (AWS Inspector, Azure Defender for Containers). JFrog Xray
              covers the artifact-scanning and software composition analysis (SCA) adjacency.

              The competitive landscape is consolidating rapidly. Wiz was acquired by Google in March 2026 for
              $32B — removing the fastest-growing CNAPP competitor from the independent vendor landscape. Lacework
              was absorbed by Fortinet and rebranded FortiCNAPP. Checkmarx merged into Synopsys. These moves
              reduce the number of independent specialist vendors, pressure remaining point solutions to demonstrate
              platform ambitions, and signal that large-enterprise security buyers are consolidating security
              vendors for unified coverage. Chainguard's narrow but deep positioning — supply chain provenance
              and zero-CVE image provision — occupies a differentiated niche that no tier-1 platform vendor
              fully replicates today, but the window to establish durable category leadership before platform
              absorption narrows each year.
            claimRefs:
              - CP011
              - CP013
              - CP019
