          - type: callout
            title: Burn rate requires Series E or IPO by late 2026 — tight execution window
            body: >
              Estimated $8-12M/month burn against $140M raised April 2025 gives 12-18 months runway. If FY2026 ARR
              tracks below $80M versus the $100M+ target, the $3.5B valuation faces material impairment requiring
              strategic alternatives. This is the most time-sensitive risk requiring active monitoring from close of
              investment.
            calloutType: insight
