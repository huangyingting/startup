      - number: '1.3'
        title: Key Milestones and Traction
        blocks:
          - type: paragraph
            body: |
              Chainguard's rapid ascent from founding to $3.5B valuation in under four years is among the
              fastest supply-chain-security scale-ups on record. Demand accelerated sharply after several
              headline supply-chain incidents validated the market: the SolarWinds hack (2020), Log4Shell
              (2021), and the XZ Utils backdoor (March 2024) — an attempted compromise of a widely-used
              open-source compression library — each drove renewed enterprise urgency around securing
              software build pipelines. U.S. Executive Order 14028 (May 2021) and the subsequent OMB
              guidance on SBOMs created a compliance pull in federal procurement that benefits Chainguard
              directly.

              Customer traction metrics: 5x customer base growth year-on-year as reported at Series C
              (July 2024); over 175% ARR growth in the first six months of fiscal year 2024; 150+
              enterprise customers at Series D (April 2025); and ARR of $40M for full-year FY2025
              representing approximately 7x year-on-year growth from roughly $5–6M in FY2024. The company
              projects crossing $100M ARR before end of FY2026.

              Headcount has grown from under 50 at Series A to approximately 350–620 by 2025 (range
              reflects methodological differences across sources: GeekWire cited "over 350" in April 2025;
              LATKA estimated 622 for the same period). The company is fully remote and plans no physical
              office, offering coworking stipends and biannual company-wide summits.

              Notable product milestones include the July 2022 public launch of Chainguard Images, the
              2023 launch of Chainguard Libraries, the 2024 expansion into VM images, and the 2025
              introduction of AI-workload-specific secure images targeting LLM and GPU infrastructure
              deployments.
