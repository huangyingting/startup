      - number: '8.4'
        title: Exhibits
        blocks:
          - type: callout
            title: 'HOLD: strong moat, aggressive multiple — await ARR confirmation'
            body: >
              Chainguard earns a HOLD recommendation. The technology moat (Wolfi, SLSA L3, nightly rebuild) and
              regulatory tailwinds (EO 14028, NIS2, DORA) are real and durable. But 87.5x ARR is priced for perfection:
              the Lacework precedent ($8.3B peak to discounted exit) is a direct cautionary comparable. Upgrade to BUY
              when FY2026 ARR is confirmed ≥ $80M with NRR ≥ 120%. Downgrade to SELL on an ARR miss below $60M or a
              CNAPP native rebuild announcement.
            calloutType: insight
            claimRefs:
              - CV001
              - CV006
              - CV019
          - type: callout
            title: Expected 1.6x return is below the 2x+ threshold for high-risk private investment
            body: >
              The probability-weighted expected exit value of ~$5.7B implies a 1.6x return at the $3.5B entry — below
              the 2x+ threshold typically required to justify late-stage private market risk. This is a function of the
              premium entry multiple. The return profile improves materially in the bull case (2.3-2.9x) but requires
              sustained 150%+ ARR growth for 3+ years. Entry price discipline is the key risk management lever available
              at this stage.
            calloutType: insight
            claimRefs:
              - CV018
              - CV023
              - CV040
