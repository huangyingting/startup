      - number: '5.3'
        title: Product Limitations and Competitive Considerations
        blocks:
          - type: paragraph
            body: |
              Chainguard's principal product limitation is catalog coverage: not every open-source software
              package has a Wolfi equivalent, requiring customers to request new images or maintain custom
              builds for legacy or niche software. The free tier is restricted to the :latest tag without
              version pinning, creating friction for teams that require reproducible builds with pinned
              image digests. G2 user reviews note that this free-tier limitation makes initial value
              demonstration harder compared to tools (Docker Scout, Grype) that scan existing images
              without requiring a migration to a new container base.

              The 'zero-CVE' claim is precise but requires nuanced interpretation: Chainguard Images have
              zero known CVEs at publish time, not zero future CVEs; new vulnerabilities discovered post-publish
              are remediated within the contractual SLA (7 days for critical). Chainguard has a material
              dependency on the sigstore/cosign infrastructure (hosted by CNCF/OpenSSF), which introduces
              an upstream supply chain dependency for its own signing chain. A compromise of the sigstore
              transparency log or CNCF-hosted infrastructure would materially affect Chainguard's trust model.

              The product scope excludes runtime security, CSPM (cloud security posture management), and
              network-level threat detection — a gap relative to CNAPP competitors such as Palo Alto
              Prisma Cloud and Wiz that provide end-to-end cloud security. This positions Chainguard
              as a point solution in the broader security stack rather than a platform, which may limit
              budget size per deal and increase risk of platform consolidation as CNAPPs expand into
              image supply chain capabilities. Community feedback on GitHub and G2 also cites that the
              Wolfi glibc choice, while improving compatibility, can require application-level build
              adjustments for teams migrating from Alpine-based musl images.
            claimRefs:
              - CE008
              - CE019
              - CE020
              - CE021
              - CE032
              - CE033
