  - number: 7
    title: 风险
    sections:
      - number: '7.1'
        title: 战略与竞争风险
        blocks:
          - type: paragraph
            body: |
              Chainguard 面临的主导战略风险是平台整合：CNAPP 厂商（Palo Alto Prisma Cloud、收购
              Wiz 后的 Google Security、CrowdStrike Falcon Cloud Security、Microsoft Defender for Cloud）
              扩展容器安全和供应链能力后，镜像加固点解决方案的独立市场可能被压缩。Google 2025 年 3
              月以 $32B 收购 Wiz 是关键先例——Google 现在拥有带容器扫描能力的 CNAPP 平台，并会积极
              推进到镜像供应链层。CrowdStrike 和 Microsoft 是第二、第三大平台威胁，各自都在为 CNAPP
              产品扩展扫描和证明功能。Chainguard 的技术护城河（夜间重建流水线、Wolfi OS、构建时
              SBOM、SLSA L3 溯源）很深，短期难以复制，但 Google 或 Microsoft 这类资源规模的竞争对手，
              可能在 2–3 年周期内投入重金复制。

              创业公司竞争更温和：RapidFort 以迁移摩擦更低的方案竞争（移除未使用软件包，无需迁移），
              但供应链保证更弱。AWS ECR Inspector 和 Docker Scout 提供免费扫描，争夺扫描预算，却不
              触及 Chainguard 的重建并证明模型。开源核心的 Wolfi 模型带来搭便车效应：任何竞争者都可在
              Apache 2.0 下 fork Wolfi 软件包定义，搭建竞争性镜像目录，而无需商业回馈。与 ARR 阶段相当的
              Snyk 相比，Chainguard 的护城河更深（构建时加固比扫描更难复制），但市场集中度更高。生存风险
              排序中，整合按严重性排第一；Chainguard 要在整合让点解决方案定位站不住脚之前达到独立 IPO 规模
              （$300M+ ARR），窗口估计在 2027–2029 年。若 IPO 窗口收窄，Google、CrowdStrike 或 Palo Alto
              以高于 $3.5B 的溢价战略收购，仍是最可能的退出路径。
