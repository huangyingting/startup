      - number: '8.3'
        title: 可比公司与退出准备度
        blocks:
          - type: paragraph
            body: |
              可比集合横跨正向 M&A 可比、公开市场交易可比和警示性私有公司可比。正向：Wiz 2025 年 3 月以
              约 $32B / 约 $500M ARR 被收购 = 约 64x ARR，是 M&A 可比上限；这说明战略买家可能愿意在
              Chainguard 达到 $150-200M ARR 时支付 $5-7B。公开可比公司交易在 18-25x ARR；CrowdStrike
              $5B ARR 对应 25x，SentinelOne $1B ARR 对应约 20x。Palo Alto Networks 的 Prisma Cloud CNAPP
              混合倍数为 8-12x，说明增速放慢后会遭遇严重降级。

              警示性可比：Lacework 2021 年在低于 $100M ARR 时以 $8.3B 融资（约 80x），随后 2024 年以零头价
              卖给 Fortinet，Fortinet 随后减记。Orca Security 2024 年按 $1.8B 平轮融资，说明增长停滞会
              带来估值重置。两者都是 Chainguard 以 87.5x ARR 承担风险的直接先例。退出准备度：Chainguard 具备
              强定性属性（治理、法律成熟度、知名投资人），但成功 IPO 需要 $200M+ ARR、70%+ 毛利率，以及
              Rule of 40 > 50。网络安全 IPO 窗口在 2025-2026 年改善，但在基准情景下，Chainguard 的现实时间线是
              2028 年。战略买家 M&A 仍是可信替代退出路径，3 年内概率为 40%。
            claimRefs:
              - CV004
