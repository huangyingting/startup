            title: 平台整合是第一大生存风险——3 到 5 年周期
            body: >
              Google 以 $32B 收购 Wiz 定下模式。Chainguard 要在品类被整合进 CNAPP 平台前，独立做到 $300M+ ARR，窗口大约是 2027-2029
              年。联邦合规护城河（FIPS/STIG/EO14028）提供部分隔离， 但无法保护商业企业市场免受平台打包挤压。
            calloutType: insight
            claimRefs:
              - CR001
              - CR002
              - CR035
          - type: callout
            title: 烧钱速度要求 2026 年底前完成 Series E 或 IPO——执行窗口很紧
            body: >
              估计每月烧钱 $8-12M，对应 2025 年 4 月融得的 $140M，现金跑道只有 12-18 个月。如果 FY2026 ARR 低于 $100M+ 目标、落在 $80M 以下，$3.5B
              估值将面临实质减值，需要考虑战略替代方案。 这是最具时效性的风险，投资交割后需要主动监控。
            calloutType: insight
            claimRefs:
              - CR018
              - CR019
              - CR032
  - number: 8
    title: 估值
    sections:
      - number: '8.1'
        title: 投资逻辑与反向逻辑
        blocks:
          - type: paragraph
            body: |
              Chainguard 的投资逻辑有三根支柱：（1）技术护城河，CNAPP 现有厂商在 2-3 年内结构性难以复制
              （Wolfi OS、夜间重建流水线、SLSA L3 溯源——约 4 年工程投入）；（2）监管顺风，跨多年、跨多个
              司法辖区（EO 14028、NIS2、DORA、CISA Secure by Design），在 Chainguard 自身没有直接监管负担的
              情况下，拉动企业合规采购；（3）开发者主导的 PLG 动作（每月 4M+ 拉取），以资本效率较高的方式
              自下而上搭建企业管线。

              OSSRA 2025 报告验证了供应链安全的持续紧迫性（84% 商业代码库带有开源漏洞），ARK 和
              Goldman Sachs 预测相关安全市场到 2030 年 CAGR 为 25-30%——给独立增长逻辑提供 $7B+ 长期
              TAM 支撑。软件供应链安全市场预计从 2024 年 $2.4B 增至 2030 年 $9.7B，CAGR 为 26%。

              反向逻辑集中在三点担忧：（1）87.5x ARR 入场倍数苛刻，容不下执行失误——ARR 即便少 20%，
              倍数也会扩到约 100x，大概率逼出降价轮；（2）CNAPP 平台整合（Google-Wiz、CRWD、PANW）
              可能在 3 年内把容器加固市场商品化，在 Chainguard 达到 IPO 规模前压缩其 TAM；（3）产品范围窄，
              可能在 $100-200M ARR 形成天花板，企业买家会合并到更少安全平台。
            claimRefs:
              - CV009
              - CV010
              - CV011
