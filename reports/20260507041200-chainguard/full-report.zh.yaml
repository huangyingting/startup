      - number: '3.3'
        title: 定价与分销
        blocks:
          - type: paragraph
            body: >
              Chainguard 采用“团队规模 + 镜像访问”定价模型，起价约 $19,000/year，面向 10 名工程师团队，提供 2,000+ 个镜像的完整访问、合同化 CVE 修复 SLA（关键 7 天，高 /
              中 / 低 14 天）和无限镜像拉取。免费层允许每个组织最多使用五个生产镜像，便于企业承诺前评估和开发者采用。这一模型在战略上不同于 Snyk 的按开发者席位定价（随员工数扩张，但不随镜像消耗扩张），也不同于
              Aqua 的按工作负载 / 节点定价（随云基础设施规模扩张）。


              Chainguard 通过自有镜像仓库、AWS Marketplace 和 Azure Marketplace 分发，让企业能用既有云承诺消费（EDP/MACC 协议）采购。Marketplace
              可用性消除了企业安全销售中的常见摩擦：无需建立新的供应商关系即可采购。公司也通过企业销售动作直接销售，目标是平台工程和 DevSecOps 团队。免费社区层、按团队定价和 Marketplace
              分发共同形成低摩擦采用漏斗，类似成功的开发者优先软件业务；部署规模扩大后，也有清晰的企业合同升级路径。大型企业部署的年度合同价值估计在 $200K–$500K 区间；联邦和受监管行业客户通常在高端，因为还会增加
              FIPS 和 STIG 合规附加项。
