      - number: '5.2'
        title: 产品组合与合规
        blocks:
          - type: paragraph
            body: >
              Chainguard 的产品组合包括四条线：（1）Chainguard Images——旗舰容器镜像订阅，覆盖操作系统基础镜像、语言运行时、数据库、Web 服务器和 AI/ML 框架在内的 2,000+
              个镜像；（2）Chainguard Libraries——面向 Python、Java、Node.js、Go 等生态的加固、持续修补包；（3）Chainguard VMs——面向 AWS、Azure 和 GCP
              云计算的加固虚拟机镜像；（4）Commercial Builds（2026 年 1 月发布）——让企业使用 Wolfi 构建基础设施，生产带验证来源证明的自有应用构建。


              合规叙事是联邦和受监管行业 GTM 的核心：Chainguard 提供 FIPS 140-2 验证和 STIG 加固的镜像变体，对齐 NIST SP 800-218 SSDF 要求，并支持 FedRAMP
              合规部署。这条监管护城河很难被纯 DevSecOps SaaS 厂商（Snyk、Aqua）复制，除非它们拥有同等的构建时 SBOM 和证明基础设施。
