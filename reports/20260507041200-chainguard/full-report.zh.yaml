      - number: '1.2'
        title: 融资历史、估值与投资者
        blocks:
          - type: paragraph
            body: >
              自创立以来，截至 2025 年 10 月，Chainguard 已完成五轮定价融资和一笔成长融资，累计融资 $892 million。融资轨迹显示估值时间线被极度压缩：种子轮隐含估值低于 $50M；Series
              A（$50M，2022 年 6 月）条款未披露；Series B（$61M，2023 年 11 月）；Series C（$140M，2024 年 7 月）确立 $1.12B 独角兽估值；Series
              D（$356M，2025 年 4 月）达到 $3.5B——九个月内上调 3.1x。2025 年 10 月 General Catalyst 成长融资（Customer Value Fund 出资
              $280M）按战略债务 / 成长资本设计，而不是传统定价股权轮，因此没有触发新的股权估值标题；它与 Series D 一起让公司在六个月内锁定 $636M。


              核心风险投资方包括 Sequoia Capital（Series A 起进入）、Kleiner Perkins（Series D 新进）、IVP（Series C 和 D 共同领投）、Lightspeed
              Venture Partners、Redpoint Ventures 和 Spark Capital。战略企业投资方包括 Salesforce Ventures 和 Datadog Ventures（均为
              Series D 新进），显示公司与企业软件生态在 GTM 上有资金实力强的协同。Amplify Partners 和 Mantis VC 也参与投资。


              任何已披露轮次中，都没有二级交易、要约回购或创始人套现事件的公开迹象。截至报告日，公司尚未提交 IPO 申请。
