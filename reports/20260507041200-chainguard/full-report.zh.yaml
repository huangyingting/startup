  - number: 3
    title: 竞争格局
    sections:
      - number: '3.1'
        title: 竞争概览
        blocks:
          - type: paragraph
            body: >
              Chainguard 竞争的位置在容器安全、软件供应链来源证明和 DevSecOps 工具的交叉点。供应商版图分成三层：（1）直接供应链和容器安全专门厂商——Snyk（估值 $8.5B，开发者优先的 SCA
              和容器扫描）、RapidFort（构建后容器加固）和 Sysdig（Kubernetes 运行时安全）；（2）完整云原生应用保护平台（Cloud-Native Application Protection
              Platform，CNAPP）厂商——Aqua Security（$1B+）、Palo Alto Cortex Cloud、Orca Security 和 CrowdStrike Falcon Cloud
              Security；（3）间接替代品——Red Hat Universal Base Images（UBI）、Alpine Linux、Docker Official Images，以及云厂商原生扫描工具（AWS
              Inspector、Azure Defender for Containers）。JFrog Xray 覆盖制品扫描和软件成分分析（SCA）相邻领域。


              竞争格局正在快速整合。Wiz 于 2026 年 3 月被 Google 以 $32B 收购——独立厂商版图中增速最快的 CNAPP 竞争者消失。Lacework 被 Fortinet 吸收并更名为
              FortiCNAPP。Checkmarx 并入
              Synopsys。这些动作减少了独立专门厂商数量，迫使剩余单点解决方案证明自己的平台野心，也表明大型企业安全买方正在整合安全供应商以获得统一覆盖。Chainguard 狭窄但很深的定位——供应链来源证明和零
              CVE 镜像供给——占据了差异化生态位，今天还没有一线平台厂商完全复制，但在被平台吸收前建立持久品类领导力的窗口每年都在变窄。
