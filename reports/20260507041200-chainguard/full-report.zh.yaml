            body: >
              Chainguard 的架构优势在于：安全在镜像构建时就被嵌入，而不是事后再检测。由 melange、apko 和 cosign 支撑的夜间 Wolfi 重建流水线，形成了竞争者当前无法以同等规模（2,000+
