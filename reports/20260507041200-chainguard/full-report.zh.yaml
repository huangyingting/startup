  - number: 6
    title: 客户情况
    sections:
      - number: '6.1'
        title: 客户基数概览与增长
        blocks:
          - type: paragraph
            body: >
              截至 2025 年 4 月，Chainguard 已增长到 150+ 企业客户，距离 2021 年 10 月创立约 3.5 年。客户基数由一批具名参考客户支撑，包括
              Canva、GitLab、HPE、Snap、Anduril、ANZ Bank、Booz Allen Hamilton 和 Elastic。FY2025 ARR 约 $40M，FY2026 目标为
              $100M+，意味着 150%+ 增长率——显著高于同等规模安全 SaaS 常见的 30-40% 增长。自创立以来，客户数约以 50-75% CAGR 增长：从创立时（2021 年 10 月）几乎为零，到
              Series D（2025 年 4 月）时 150+。


              Chainguard 声称为客户累计节省 100,000+ 工程小时，用于漏洞修复——这个指标反映手工 CVE 修补的劳动密集度，而 Chainguard 的自动化流水线消除了这部分工作。以 $40M ARR 和
              150+ 客户计算，隐含平均合同价值约 $267K / 客户，符合企业级（而非 SMB）商业模式。相比类似 ARR 阶段的 Snyk（$100M ARR 时拥有 1,200+ 客户，隐含约 $83K
              ACV），Chainguard 明显更偏高端市场——反映 CISO 级、合规驱动的采购流程，而不是 Snyk 那种开发者带动的自下而上动作。
