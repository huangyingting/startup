            body: >
              Chainguard 的具名客户组合横跨五个不同垂直：云原生软件公司（Canva、GitLab、Elastic、Snap）、企业 IT（HPE）、防务和政府（Anduril Industries、Booz
              Allen Hamilton）、金融服务（ANZ Bank）以及联邦承包商。对 Chainguard 所处阶段而言，这种垂直多元化值得注意，也降低了单一行业收入集中风险。


              记录最扎实的客户成效来自 Elastic 的公开案例研究：迁移到 Chainguard Images 后，CVE 约减少 90%——这是对 Chainguard 核心价值主张最有量化支撑的客户参考。Snap
              的公开背书确认了消费互联网规模的生产采用。GitLab 在 2024 年 11 月宣布的合作，为 Chainguard 提供了接触 GitLab 30M+ 开发者用户基数的渠道，可用于 PLG 采用。


              联邦和防务客户（Anduril、Booz Allen）遵循不同采用模式：它们不是由开发者自下而上采用驱动，而是由合规要求驱动——FIPS 140-2 认证、STIG 加固强制要求和 EO 14028 的 SBOM
