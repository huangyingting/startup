    title: 推荐逻辑：从证据到持有
    order: 1
    layout: wide
    summary: |
      流程图把市场证据、技术验证、风险评估和估值背景串联起来，得出持有建议，并标明上调 / 下调触发因素。
    claimRefs:
      - CV001
      - CV009
      - CV010
      - CV019
    data:
      nodes:
        - id: FL1
          label: 供应链安全市场到 2030 年达 $9.7B，CAGR 26%
          detail: 庞大且增长中的 TAM 支撑独立 $500M ARR 潜力
        - id: FL2
          label: 技术护城河：Wolfi + SLSA L3 + 每夜重建流水线
          detail: 领先 3–4 年；CNAPP 现有厂商 <2 年内难以复刻
        - id: FL3
          label: 监管顺风：EO 14028 + NIS2 + DORA + CISA
          detail: 美国联邦和欧盟企业市场有多年合规拉动
        - id: FL4
          label: 平台整合风险（Google-Wiz、CRWD、PANW）
          detail: 3–5 年周期；整合窗口关闭前需达到 $300M ARR
        - id: FL5
          label: 87.5x 往绩 ARR —— 激进入场倍数
          detail: 按完美表现定价；为 VC 同行中位数 4x；ARR 不能失手
        - id: FL6
          label: 持有建议
          detail: 达到 $80M ARR + NRR >120% 时上调至买入；ARR 未达预期则下调至卖出
        - id: FL7
          label: 监控：FY2026 ARR 季度进展；NRR；CNAPP 竞争公告
          detail: 12 个月复盘触发器，上调和下调标准清晰
