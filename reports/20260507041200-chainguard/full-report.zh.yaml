              稳稳放在企业级市场，与其面向受监管行业和联邦机构的安全与合规价值主张一致。镜像订阅成本模型具有有利的毛利特征：Wolfi
              重建流水线搭好后，增量镜像拉取成本接近零，说明收入成本主要是人力（安全工程师、开源维护者），而不是基础设施可变成本。如果 Chainguard 以当前员工规模为基础、只做温和扩员就达到 $100M
              ARR，企业安全 SaaS 70–85% 毛利率基准意味着可观的贡献利润。


