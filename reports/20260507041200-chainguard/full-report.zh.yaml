  - number: 5
    title: 产品与技术
    sections:
      - number: '5.1'
        title: 产品架构与核心技术
        blocks:
          - type: paragraph
            body: >
              Chainguard 的技术架构建立在三层栈上：（1）Wolfi OS——专门构建的 Linux “非发行版”，提供基础包系统；（2）melange/apko 构建流水线——开源、声明式工具，把 Wolfi
              包定义转换成嵌入 SBOM 的最小化 OCI 容器镜像；（3）cosign/sigstore 签名层，对每个制品做密码学证明。每晚，流水线都会把全部 2,000+
              个镜像定义与上游源码仓库比对，重建所有上游包发生变化的镜像（包括 CVE 补丁），并以 SLSA Build Level 3 的 in-toto
              来源证明签名产物。这种自动重建节奏是核心运营差异：按需打补丁的竞争者无法复制 Chainguard 在全镜像目录上系统维护零 CVE 状态的做法。

              Wolfi 的关键设计选择把它和 Alpine Linux 区分开：它使用 glibc（而非 Alpine 的 musl
              libc）以获得更广泛的企业应用兼容性；它提供单独版本化的包，而不是整版发行周期；并在构建时为每个包生成机器可读 SBOM。melange 构建系统完全声明式（基于 YAML
              的包定义），让构建可复现、可审计。流水线处理超过 500 million 份构建清单，体现出整个镜像目录上的可观规模和持续运营成熟度。
