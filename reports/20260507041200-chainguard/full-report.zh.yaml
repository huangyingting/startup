              四位仍在职联合创始人都是开源工具（sigstore、Distroless、SLSA、Tekton）的共同创建者或主要贡献者，这些工具构成了软件供应链安全的技术底座。这很少见：创始团队亲手写出自家产品要执行的标准，因此拥有异常强的技术信誉和社区信任。
