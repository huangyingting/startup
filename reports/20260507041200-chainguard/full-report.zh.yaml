  - number: 2
    title: 市场分析
    sections:
      - number: '2.1'
        title: 市场定义与范围
        blocks:
          - type: paragraph
            body: >
              Chainguard 参与的是软件供应链安全市场——应用安全的一个子集，处理代码进入生产之前、构建阶段引入的漏洞。公司的产品（加固容器镜像、语言库、VM
              镜像）在该市场中占据一个清晰生态位：预防式“设计即安全”基础设施，而不是事后漏洞检测（扫描）。相关 TAM 包括三类组织：（a）在生产环境依赖容器化或基于 VM
              的工作负载，（b）大规模使用开源软件，（c）面对软件来源证明和 SBOM 生成方面的监管或合同要求。


              三个相邻市场共同界定 Chainguard 的综合 TAM 框架：


              1. **软件供应链安全**：聚焦构建流水线、依赖管理、代码签名和制品完整性。多家分析机构估计，全球市场 2024 年为 $2.4–3.1B，并以 12–22% CAGR 增长，到 2030–2033 年达到
              $5.1–12.5B。


              2. **容器与云原生应用安全**：覆盖容器镜像扫描、运行时保护、Kubernetes 安全态势管理（KSPM）以及容器化工作负载的供应链完整性。2024 年估计为 $2.3–3.6B，更激进的预测认为
              20–26% CAGR 可推动市场在 2030–2035 年达到 $9.4–25B。


              3. **DevSecOps 平台**：嵌入 CI/CD 流水线的一体化安全工具。Grand View Research 估计，DevSecOps 市场 2024 年为 $8.84B，到 2030 年以
              13.2% CAGR 增至 $20.2B。Chainguard 的工作流集成让它作为安全基础镜像提供商进入 DevSecOps 平台层。


              对 Chainguard 做保守的重叠调整后，综合 TAM 约为 2024 年 $6–8B，到 2030 年扩大至 $15–25B。Chainguard 的 $40M ARR 代表不到 0.7%
              的市场份额，说明公司仍处在面向巨大机会的早期扩张阶段。
