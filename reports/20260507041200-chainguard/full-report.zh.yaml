      - number: '7.3'
        title: 运营、财务与依赖风险
        blocks:
          - type: paragraph
            body: |
              Chainguard 有三类重大运营风险。第一是 sigstore/CNCF 依赖：Rekor 透明日志、Fulcio OIDC CA
              或 CNCF DNS/CDN 一旦被攻破，会削弱所有 Chainguard 客户的镜像签名和 SLSA 溯源完整性。
              MITRE ATT&CK 将供应链基础设施攻击记录为不断增长的对手战术。第二是 XZ 式供应链攻击风险——
              2024 年 XZ utils 后门（CVE-2024-3094）说明，恶意 Wolfi 软件包维护者可能引入后门代码，并通过
              Chainguard Images 扩散。夜间重建和 SLSA L3 溯源提供检测能力，但无法阻止上游仓库被攻破。
              Chainguard Image 中若确认存在恶意载荷，将对客户信任造成灾难性打击。

              第三是关键人集中：Dan Lorenc（CEO、sigstore 共同创建者）是最大的单人依赖风险。四位前 Google
              联合创始人作为一个整体，代表创始团队集中风险——若两人或更多同时离职，将严重影响工程领导力。
              开源社区嵌入（共同创建 sigstore、参与 CNCF）把技术可信度部分分散到多位可见工程师身上，缓解
              但不能消除这一风险。财务风险最具时效性：按估计 $8–12M/月烧钱速度，对应 2025 年 4 月融得的
              $140M，现金跑道约 12–18 个月，因此需要在 2026 年底前完成 Series E 或 IPO。资本结构干净
              （按 SEC Form D 为纯股权；无可转债）。如果 FY2026 ARR 低于 $100M+ 目标、落在 $80M 以下，
              $3.5B 估值将面临实质减值。触发放弃的标准包括：CNAPP 以商品化价格宣布原生 zero-CVE 重建能力；
              Chainguard 构建的镜像确认发生安全事件；12 个月内两名或更多联合创始人离职；或 FY2026 ARR 低于
              $80M。
