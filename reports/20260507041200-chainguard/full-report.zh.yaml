      - number: '1.3'
        title: 关键里程碑与增长牵引
        blocks:
          - type: paragraph
            body: >
              Chainguard 从创立到估值 $3.5B 用时不到四年，是供应链安全领域有记录以来增长最快的扩张型公司之一。几起标志性供应链事件验证市场后，需求急剧升温：SolarWinds
              黑客事件（2020）、Log4Shell（2021）和 XZ Utils 后门（2024 年 3 月）——对一个广泛使用的开源压缩库的攻击尝试——都重新推高了企业保护软件构建流水线的紧迫感。美国行政令
              14028（2021 年 5 月）以及之后 OMB 关于 SBOM 的指引，在联邦采购中形成合规牵引，Chainguard 直接受益。


              客户牵引指标：Series C（2024 年 7 月）时披露客户基数同比增长 5x；2024 财年前六个月 ARR 增长超过 175%；Series D（2025 年 4 月）时拥有 150+
              企业客户；FY2025 全年 ARR 为 $40M，从 FY2024 的大约 $5–6M 增长约 7x。公司预计 FY2026 结束前跨过 $100M ARR。


              员工数从 Series A 时不到 50 人，增长到 2025 年约 350–620 人（区间反映不同来源的方法差异：GeekWire 在 2025 年 4 月称“超过 350”；LATKA 对同期估计为
              622）。公司完全远程办公，不计划设立实体办公室，而是提供联合办公补贴和一年两次的全公司峰会。


              重要产品里程碑包括：2022 年 7 月 Chainguard Images 公开发布，2023 年推出 Chainguard Libraries，2024 年扩展到 VM 镜像，2025 年推出面向 LLM 和
              GPU 基础设施部署的 AI 工作负载专用安全镜像。
