      - number: '7.2'
        title: 监管、法律与合规风险
        blocks:
          - type: paragraph
            body: |
              Chainguard 的监管风险画像偏正面且不对称：自身直接监管义务很少（未见已知诉讼，也没有会
              造成直接 NIS2/DORA 责任的 EU 实体），而客户合规义务反而拉动 Chainguard 产品需求。EU NIS2
              （2024 年 10 月生效）要求 18 个行业的关键基础设施运营方管理供应链风险；EU DORA（2025 年
              1 月生效）要求 EU 金融机构实施 ICT 供应链控制和尽调。European Banking Authority 的 DORA 指引
              明确要求记录 ICT 第三方风险，包括软件供应链——Chainguard 的 SBOM 证明和 SLSA 溯源正好直接
              满足该要求。两项规则都带来欧洲企业客户对带 SBOM 证明容器镜像的需求。

              在美国，CISA Secure by Design 指引（2024）和 EO 14028 SBOM 强制要求，在联邦和国防领域提供
              平行的监管顺风，强化政府垂直领域对抗 CNAPP 整合的合规护城河。CISA 对供应链证明实践的背书，
              让 Chainguard 的产品定位获得美国网络安全主管机构正式认可。需要监控的关键风险是 EU 数据主权：
              Chainguard 缺少欧洲数据中心或 EU 法律实体，可能限制德国、法国及其他成员国中有数据驻留要求的
              NIS2 受监管实体采用。DORA 合规评估会拉长欧洲金融服务销售周期，但采用后会提高切换成本——
              对通过合规驱动采购拿下的企业账户，这是结构性留存利好。截至 2026 年 5 月，未发现针对
              Chainguard 的重大诉讼、IP 争议或监管执法行动。
