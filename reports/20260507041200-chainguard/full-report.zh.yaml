      - number: '6.3'
        title: GTM 模型、留存与扩张
        blocks:
          - type: paragraph
            body: >
              Chainguard 采用 PLG 加企业销售的混合模型。开发者通过自助从 Chainguard 镜像仓库（cgr.dev）拉取，采用 Chainguard Images 免费层（最多 5 个镜像，仅
              :latest 标签）。随后，Chainguard 的内勤和现场销售团队识别这些已经有开发者采用的组织，并通过先落地再扩张动作把它们转化为付费企业订阅。免费层刻意设限以推动转化：版本固定、历史镜像访问、SBOM
              下载和 SLA 覆盖都需要付费订阅。


              客户内扩张路径从 Images（初始落地）流向 Libraries（语言层加固，更广团队覆盖）、VMs（基础设施团队），再到 Commercial Builds（面向有自有应用构建的 ISV
              和企业）。净收入留存和客户集中度未公开披露，形成尽调不确定性。在 $40M ARR 对 622 名员工的状态下，人均收入约 $64K——低于 $200K 效率目标——说明公司仍处于 GTM
              扩张模式，这与其招聘速度和融资节奏一致。用户评论中提到的主要采用阻碍是目录覆盖缺口，以及从基于 Alpine 的镜像迁移到基于 Wolfi 的等价物时的复杂性。除 GitLab 合作外，Chainguard
              似乎没有渠道或经销商计划，主要依赖企业现场直销，并由 PLG 开发者社区漏斗支持。GitHub 社区活动释放的开发者生态信号（Wolfi 和 sigstore
              等开源项目累计数万代码仓库星标）提供了一条有机认知渠道，相比完全依赖付费营销的竞争者，能降低漏斗顶部获客成本。
