      - number: '5.3'
        title: 产品限制与竞争考量
        blocks:
          - type: paragraph
            body: >
              Chainguard 的主要产品限制是目录覆盖：并非每一个开源软件包都有 Wolfi 等价物，客户需要请求新镜像，或为遗留 / 小众软件维护自定义构建。免费层仅限 :latest
              标签，不支持版本固定；需要可复现构建和固定镜像摘要的团队会因此遇到摩擦。G2 用户评论指出，与 Docker Scout、Grype
              这类扫描现有镜像、无需迁移到新容器基础的工具相比，这个免费层限制让初始价值展示更难。


              “零 CVE”主张很精确，但需要细读：Chainguard Images 在发布时没有已知 CVE，不是未来也没有 CVE；发布后发现的新漏洞会在合同 SLA 内修复（关键漏洞 7 天）。Chainguard 对
              sigstore/cosign 基础设施（由 CNCF/OpenSSF 托管）有实质依赖，这给它自己的签名链引入上游供应链依赖。如果 sigstore 透明日志或 CNCF
              托管基础设施被攻陷，Chainguard 的信任模型会受到实质影响。


              产品范围不包括运行时安全、CSPM（云安全态势管理）和网络层威胁检测——相对 Palo Alto Prisma Cloud、Wiz 等提供端到端云安全的 CNAPP 竞争者，这是一个缺口。这让
              Chainguard 在更广泛安全栈中更像单点解决方案，而不是平台；它可能限制单笔交易预算规模，也会随着 CNAPP 扩展到镜像供应链能力而增加平台整合风险。GitHub 和 G2 上的社区反馈还提到，Wolfi
              选择 glibc 虽改善兼容性，但团队从基于 Alpine 的 musl 镜像迁移时，可能需要做应用层构建调整。
