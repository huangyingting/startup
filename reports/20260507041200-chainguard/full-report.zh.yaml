      - number: '8.2'
        title: 估值语境与情景分析
        blocks:
          - type: paragraph
            body: |
              按 $3.5B 估值和估计约 $40M FY2025 ARR，Chainguard 当前约为 87.5x 往绩 ARR——该倍数是
              2024 年 VC 市场中位数 22x（Pitchbook）的 4 倍，反映市场为 150%+ 增长和可防守技术护城河支付
              的溢价。Goldman Sachs 增长调整基准显示，150%+ 增长公司可拿到 30-50x 前瞻收入倍数；若
              FY2026 ARR 达 $100M（乐观情景），倍数压缩到 35x——仍高于公开可比公司（CrowdStrike 约 25x、
              SentinelOne 约 20x），但处在可解释区间。Bessemer / Meritech 面向高增长网络安全公司的公开
              SaaS 基准，支持最快增长队列 30-50x 前瞻倍数。

              三种情景：乐观（25%）：$100M+ FY2026 ARR、NRR 130%+，2027-2028 年以 40-50x ARR 退出 =
              $7.2-9B，回报 2-2.6x。基准（50%）：FY2026 ARR 为 $80M，2028 年 IPO 时 ARR 达 $200M、估值
              30-35x = $6-7B，回报 1.7-2x。悲观（25%）：FY2026 ARR 为 $55-65M、增速放缓，M&A 或
              降价轮按 20-25x ARR = $1.4-2B，回报 0.4-0.57x。概率加权预期价值约 $5.7B，意味着
              $3.5B 入场价下预期回报 1.6x（未计稀释）。公司已融资 $892M，且大概率有 1x 清算优先权，优先股
              堆叠压力很实质——悲观情景下，低于 $892M 的所有退出对价都被优先股投资人拿走。Lacework 式结果
              （2024 年被收购价显著低于 $8.3B 融资估值）仍是尾部风险。
