      - number: '2.2'
        title: 买方细分与需求动态
        blocks:
          - type: paragraph
            body: >
              Chainguard 的主要买方是运营云原生生产环境、同时面对监管或合同安全要求的大型企业和公共部门组织。采购决策通常落在平台工程、DevSecOps 或云安全团队；企业交易需要 CISO
              和首席架构师签字，美国联邦交易还需要合同官批准。


              **科技行业**（包括软件公司和超大规模云厂商）按数量看是最大细分。此类组织运行大量基于容器的工作负载，维护庞大的开源软件依赖，并常常面对客户安全审查要求（SOC 2、ISO
              27001），因此有动力做供应链加固。Canva、GitLab、Snap 和 Anduril 等 Chainguard 具名客户反映了这一细分。


              **金融服务**（银行、保险、资本市场）按收入潜力看是第二大细分，原因是监管审查严格、IT 预算庞大、对数据泄露零容忍。ANZ Bank 是具名客户，说明 APAC
              银行业已有采用。美国和欧盟金融监管机构正越来越多地要求软件系统提供来源证明文档。


              **联邦政府**（美国国防部、民用机构、防务承包商）是单合同收入价值最高的细分，驱动因素是 EO 14028 和 OMB M-22-18 的 SBOM 强制要求。面向云工具的 FedRAMP
              授权要求既形成进入壁垒（保护既有玩家），一旦通过也形成竞争护城河（把未授权供应商挡在门外）。


              **医疗与关键基础设施**细分正在出现，驱动因素包括 HHS 网络安全指引、CISA Critical Infrastructure 通告，以及医疗 IT 遭遇勒索软件攻击后的事件响应要求。


              企业供应链安全工具的采购周期通常为 3–9 个月，受监管行业复杂度更高。Chainguard 采取开发者采用（自下而上、社区）叠加企业合同（自上而下、CISO）的策略，符合开发者工具公司的 PLG 模式。
