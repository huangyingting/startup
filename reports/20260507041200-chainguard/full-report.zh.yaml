companyProfile:
  summary: >
    Chainguard 是一家供应链安全公司，为企业和云原生客户提供零 CVE 容器镜像和加固语言包。核心产品 Chainguard Images（2,000+ 个加固镜像）由 Wolfi OS 支撑；Wolfi OS 是专门构建的
    Linux “非发行版”，支持 glibc、每日包更新和完整 SLSA L3 构建来源证明。客户包括 Canva、GitLab、HPE、Snap、Anduril、ANZ Bank、Booz Allen Hamilton 和
