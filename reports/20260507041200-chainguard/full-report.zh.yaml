      - number: '3.2'
        title: Chainguard 的竞争护城河
        blocks:
          - type: paragraph
            body: >
              Chainguard 的护城河由三层相互强化的能力构成：（1）技术基础设施——Wolfi OS 是专门构建的 Linux “非发行版”，支持按上游源夜间重建 2,000+ 个镜像，并以合同 SLA 交付 7
              天内关键 CVE 修复；（2）标准共建权——共同创建并维护 sigstore、cosign、SLSA 和 Wolfi，意味着 Chainguard
              影响每个竞争者最终都必须实现的供应链安全标准；（3）通过开源领导力（参与 OpenSSF 和 CNCF）建立的品牌与社区信任，这是纯商业厂商很难快速复制的。


              技术护城河最持久：复制一条面向 2,000+ 个镜像的夜间重建流水线，需要多年基础设施投入、上游维护者关系，以及深厚 Linux 打包经验的团队，而这类人才极其稀缺。标准所有权护城河更脆弱——随着
              sigstore 采用接近普及，它会从差异化因素变成入场券。Chainguard 的社区信任护城河，在要求供应链来源证明和 SBOM
              合规的安全敏感型企业与政府机构中带来不对称品牌价值；但如果资源雄厚的既有厂商愿意以相当深度投入开源贡献，2–3 年维度内并非不可复制。
