      - number: '2.3'
        title: 增长驱动、约束与市场风险
        blocks:
          - type: paragraph
            body: >
              Chainguard 市场的**主要增长驱动**兼具结构性和近端催化：


              - *监管加速*：美国行政令 14028（SBOM 强制要求，2021 年 5 月）、OMB M-22-18、欧盟 Cyber Resilience Act（2024）、NIST SSDF 和 FedRAMP
              SBOM 要求共同形成合规拉力。到 2025–2026 年，SBOM 要求正从联邦 IT 扩展到金融服务（ECB、PRA）和关键基础设施行业。


              - *供应链事件*：每一起高关注事件（SolarWinds 2020、Log4Shell 2021、XZ Utils 2024）都会让安全买方紧迫感显著上升，并压缩采购时间线。XZ Utils
              后门尤其验证了国家级攻击者攻陷开源维护者的风险——这正是 Chainguard 的威胁模型。


              - *云原生采用*：Kubernetes 使用继续增长；CNCF 的 2024 Annual Survey 发现，超过 80% 的企业在生产环境运行
              Kubernetes。每一个基于容器的工作负载都会产生一单位安全基础镜像需求。


              - *AI 工作负载扩散*：LLM 推理和训练基础设施（GPU 集群、容器化模型服务）带来新的、庞大的开源依赖足迹。Chainguard 在 Series C 叙事中明确瞄准 AI 工作负载。


              **市场约束与风险**：


              - *DevSecOps 成熟度前提*：Chainguard 产品要求客户已经建立 CI/CD 流水线和容器基础设施。中小型组织缺少这种成熟度，压缩了当前 SAM。


              - *CISO 对扫描与预防的怀疑*：部分企业买方仍在使用单点扫描工具，对迁移到预防优先模型持怀疑态度。这会带来客户教育成本并拉长销售周期。


              - *捆绑式安全平台的竞争*：云厂商（AWS ECR、Azure ACR、GCP Artifact Registry）和端点安全厂商（CrowdStrike、Palo Alto Networks、Aqua
              Security）把容器扫描捆进更广的平台，减少留给专用工具的独立预算。


              - *监管放缓风险*：如果美国政策方向变化，SBOM 执法在不同政府下放松，合规拉力可能减弱——不过行业自身驱动的采用大概率会凭惯性继续。


              - *市场碎片化*：不同来源对市场规模的分析估算相差 2x–3x，反映定义不一致。这种碎片化让 TAM/SAM 测量和投资者比较更复杂。
