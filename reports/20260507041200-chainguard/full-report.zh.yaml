chapters:
  - number: 1
    title: 公司概况
    sections:
      - number: '1.1'
        title: 公司身份、创立与商业模式
        blocks:
          - type: paragraph
            body: >
              Chainguard 于 2021 年注册成立，并在 2021 年 12 月 $5 million 种子轮时公开亮相。公司注册地在 Washington 州
              Kirkland，但以完全分布式组织运转，没有固定实体办公室。四位仍在职的联合创始人——Dan Lorenc（CEO）、Matt Moore（CTO）、Kim Lewandowski（CPO）和 Ville
              Aikas（杰出工程师）——都曾在 Google 担任高级职务，在那里创建或领导 sigstore（事实上的开源代码签名基础设施）、Distroless 容器镜像和 Kubernetes
              供应链工具。第五位联合创始人 Scott Nichols 于 2022 年离职。


              Chainguard 的产品逻辑是“设计即安全”：不是等漏洞出现后再扫描，而是交付最小化、加固的容器镜像和语言库，交付时不含已知 CVE（通用漏洞与暴露）。客户按 SaaS
              订阅，持续获得重建、修补后的镜像源和带来源签名的软件物料清单（SBOM）；这些加固等价物替换 Docker Hub 或语言生态里的通用公共镜像，显著压缩攻击面。


              商业模式是订阅式 SaaS，按席位或按镜像拉取量分层定价，面向企业 DevSecOps 和平台工程团队。收入与客户使用 Chainguard Images、Chainguard Libraries 和较新的
              Chainguard VMs 产品线挂钩。政府部门交易围绕 FedRAMP 对齐的合规要求，以及美国行政令带来的 SBOM 强制要求设计。
