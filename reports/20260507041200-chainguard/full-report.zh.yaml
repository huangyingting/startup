      - number: '8.4'
        title: 附录图表
        blocks:
          - type: callout
            title: 持有：护城河强、倍数激进——等待 ARR 确认
            body: >
              Chainguard 得到持有建议。技术护城河（Wolfi、SLSA L3、夜间重建）和监管顺风（EO 14028、NIS2、 DORA）真实且耐久。但 87.5x ARR 按完美执行定价：Lacework
              先例（峰值 $8.3B 到折价退出）是 直接警示性可比。FY2026 ARR 确认 ≥ $80M 且 NRR ≥ 120% 后，上调至买入。若 ARR 低于 $60M， 或 CNAPP
              宣布原生重建能力，下调至卖出。
            calloutType: insight
            claimRefs:
              - CV001
              - CV006
              - CV019
          - type: callout
            title: 预期 1.6x 回报低于高风险私有投资 2x+ 门槛
            body: >
              概率加权预期退出价值约 $5.7B，意味着 $3.5B 入场价下回报 1.6x——低于后期私有市场风险通常 要求的 2x+ 门槛。核心原因是入场倍数过高。乐观情景下回报显著改善（2.3-2.9x），但需要 3
              年以上 持续 150%+ ARR 增长。现阶段可用的关键风险管理杠杆是入场价格纪律。
            calloutType: insight
            claimRefs:
              - CV018
              - CV023
              - CV040
