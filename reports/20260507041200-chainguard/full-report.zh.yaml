  - number: 4
    title: 财务情况
    sections:
      - number: '4.1'
        title: 收入模式与增长轨迹
        blocks:
          - type: paragraph
            body: >
              Chainguard 的收入模式是订阅式 SaaS，围绕团队规模定价叠加镜像目录访问。三条产品线分别是 Chainguard Images（核心收入驱动——由 Wolfi OS 夜间重建的精选、零 CVE
              容器镜像）、Chainguard Libraries（面向 Python、Java、Node 等语言生态的加固包）和 Chainguard
              VMs（加固虚拟机镜像，是产品线中最新加入的一支）。收入确认按年度订阅，除团队规模 / 镜像层级基础外没有消费计量，因此模型可预测，客户也容易做预算。


              ARR 在 FY2025 达到 $40M（财年大约截至 2025 年 4 月），相对 FY2024 估计 $5–6M 约实现 7x 同比增长。Sacra 估计 2023 自然年 ARR 为 $12.7M，这意味着
              2024 年公司明显加速。公司目标是在 FY2026 结束前达到 $100M+ ARR——2.5x 增长目标如果兑现，将代表供应链安全子行业最快跨过九位数 ARR 门槛。通过 AWS 和 Azure
              Marketplace 分销，客户可用既有云承诺消费协议购买 Chainguard 订阅，降低销售周期摩擦，并把有效买方从传统安全预算持有人扩展出去。CrowdStrike 的 10-K
              基准也验证：成长阶段的企业网络安全 SaaS 公司通常在 70–78% 毛利率运行。
