company:
  name: Climeworks
chapter:
  number: 3
  title: Competitive Landscape
  summary: |
    Climeworks competes in the engineered direct air capture (DAC) market against two primary
    commercial peers—1PointFive/Carbon Engineering (liquid-DAC, Oxy-backed) and Heirloom Carbon
    (limestone mineralization)—plus the much larger shadow of low-cost nature-based carbon
    offsets as price substitutes. Climeworks holds first-mover advantage, the most delivered
    tonnes, and the strongest brand in permanent CDR, but faces an existential scale challenge:
    1PointFive's Stratos plant targets 500,000 t/yr—14× Mammoth's nameplate—and Heirloom
    has planned 320,000 t/yr in the US. If Stratos achieves scale, it could displace Climeworks
    as the volume leader, eroding its technology differentiation narrative. Climeworks' moat
    rests on Gen3 technology validation, European regulatory alignment, long-term corporate
    relationships, and the Iceland geothermal advantage—but each of these has durability risks.

