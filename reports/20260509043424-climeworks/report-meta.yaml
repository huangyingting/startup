companyProfile:
  summary: |
    Climeworks is the world's most operationally experienced direct air capture (DAC) company,
    founded in 2009 as an ETH Zurich spin-off by engineers Christoph Gebald and Jan Wurzbacher.
    The company has built and operated Orca (4,000 t/yr, 2021) and Mammoth (36,000 t/yr nameplate,
    2024) at Iceland's Hellisheiði geothermal field, capturing atmospheric CO2 using proprietary
    amine sorbent technology and permanently mineralizing it in basalt via Carbfix. As of 2025,
    Climeworks has 160+ corporate customers, 18,000+ individual subscribers, and 6 million tonnes
    contracted—but faces a critical operational crisis with Mammoth producing only ~105 tonnes in
    its first 10 months vs. 36,000 t/yr nameplate. The company's path forward rests on Gen3
    technology (validated in Basel, June 2024) achieving $250–350/t cost and 2× throughput at
    commercial scale by 2027–2028.
  foundedDate: "2009-01-01"
  founders:
    - name: Christoph Gebald
      role: Co-CEO
      background: ETH Zurich mechanical engineering; co-leads all strategic and operational decisions as co-CEO since founding.
      claimRefs: [CO003]
    - name: Jan Wurzbacher
      role: Co-CEO
      background: ETH Zurich materials engineering; co-leads commercial strategy and investor relations as co-CEO since founding.
