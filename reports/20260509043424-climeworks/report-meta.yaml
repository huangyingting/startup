  foundingLocation: Zurich, Switzerland
  headquarters: Zurich, Switzerland
  productSummary: |
    Climeworks' core product is verified permanent CO2 removal credits (CORCs) delivered via its
    proprietary DAC-plus-mineralization system: (1) amine-functionalized solid sorbent filters
    capture CO2 from ambient air; (2) CO2 is desorbed by low-temperature heat; (3) CO2 is
    permanently injected and mineralized in basalt rock via Carbfix. Gen2 plants (Orca, Mammoth)
    use modular container-based collector units. Gen3 technology uses a cube design (26×26×22.5m)
    with structured sorbents targeting 2× throughput and 0.5× energy vs. Gen2. Credits are
    certified by Puro.earth (CORC standard) and Climeworks is the first DAC company to achieve
    Puro certification. Individual subscribers access CORCs via monthly subscription; corporates
    sign multi-year forward purchase agreements.
  customerFocus: Corporate enterprise buyers (BCG, Morgan Stanley, SAP, British Airways, MOL, TikTok, Microsoft, Swiss Re) and 18,000+ individual subscribers globally. Primary verticals are professional services, financial services, technology, aviation, and maritime shipping.
  businessModel: Multi-year forward purchase agreements for CO2 removal credits (B2B); monthly subscription model for individual subscribers (B2C); CO2 utilization (food-grade, historical). Priced at ~$1,000/t individual and $400–600/t estimated enterprise; targeting $250–350/t with Gen3 by 2030.
  stage: late-stage private
  fundingStatus: ">$1B raised total; latest round $162M (January 2025, Partners Group + BigPoint). Series C (2022) was $650M led by Partners Group and GIC at implied $1–2B post-money valuation (not officially disclosed)."
  disclosureProfile: private-disclosed
  claimRefs: [CO001, CO003, CO012, CO015, CO022, CO024, CO025, CU003]

