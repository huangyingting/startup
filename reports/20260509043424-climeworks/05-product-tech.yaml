  title: Product and Technology
  summary: |
    Climeworks operates a solid-sorbent direct air capture (S-DAC) system with an integrated
    underground CO2 storage solution—the only commercially deployed DAC+storage system at
    scale globally. The technology stack comprises three layers: (1) a proprietary amine-
    functionalized structured sorbent that captures CO2 from ambient air using temperature-
    swing adsorption at ~100°C; (2) modular collector units ("cubes," 26×26×22.5m) that
    enable factory-style replication; and (3) Carbfix's basalt-water mineralization for
    permanent underground CO2 storage. The Generation 3 technology (validated June 2024,
    5,000 test cycles, 15,000 R&D hours) promises to double throughput per module, halve
    energy use, and triple sorbent life—targeting USD 250–350/tonne by 2030. Operational
    maturity is TRL 8-9 for Gen2, TRL 5-6 for Gen3 commercial deployment. Critical risks:
    Mammoth underperformance (only 12 of 72 containers operational), Gen3 unproven at
    commercial scale, and deep dependency on Carbfix for the storage layer.
