  - id: section-4
    title: Trust, Quality, Compliance, and Differentiation
    body: |
      Climeworks was the first DAC company to achieve Puro Standard certification for its Orca
      plant, establishing the MRV template for DAC carbon credits. The MRV framework generates
      continuous time-series data at the plant level (fan speed, temperature, CO2 concentrations,
      cycle count) and integrates with Carbfix's geological monitoring (injection pressure,
      geochemical tracers) to verify every tonne. Corporate buyers receive CORC certificates
      usable in CDP/SBTi/GHG Protocol Scope 3 reporting.

      Climeworks' compliance positioning for the EU Carbon Removals Certification Framework
      (CRCF) is strong: the CRCF's requirements (quantification, additionality, permanence,
      sustainability) are closely aligned with Climeworks' existing Puro-certified system.
      This regulatory-readiness advantage over competitors without equivalent verification
      infrastructure will become more significant as EU corporate buyers face mandatory CDR
      quality standards in their sustainability reporting.

      The trust layer includes a Swiss Re insurance arrangement: Swiss Re, as both an investor
      and insurance partner, provides reversal risk coverage for Climeworks CDR buyers—an
      unusual product that reduces counterparty risk perception and allows risk-sensitive buyers
      (especially insurance/financial firms) to commit with more confidence.

      Climeworks' technology is structurally differentiated from nature-based CDR: permanence
      (thousands of years vs. decades), measurability (direct sensor data vs. modeled forest
      biomass), and additionality (fully additional by design). These technical properties align
      with the direction of tightening carbon accounting standards globally.
