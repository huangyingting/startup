    - id: CE005
      statement: |
        The Gen2 S-DAC process (in use at Orca and Mammoth) requires approximately 1,500–2,000
        kWh of thermal energy and 200–400 kWh of electrical energy per tonne of CO2 captured.
        At Iceland geothermal rates (~2–5 USD/GJ), this translates to an energy cost of roughly
        USD 200–300/tonne. Gen3's 50% energy reduction targets approximately 750–1,000 kWh
        thermal + 100–200 kWh electrical per tonne—a significant improvement but still energy
        intensive by industrial standards.
      type: third-party-reported
      topic: energy requirements
      confidence: medium
