  - id: TE002
    title: Workflow / Use-Case Table
    columns:
      - Workflow Step
      - Actor
      - Activity
      - Output
      - Verification Method
    rows:
      - - 1. Customer agreement
        - Climeworks + corporate buyer
        - Sign forward offtake for N tonnes over M years
        - Signed contract; delivery schedule
        - Legal contract
      - - 2. Air capture
        - Climeworks (DAC plant)
        - Fans draw ambient air; CO2 adsorbs on amine sorbent at ambient temp
        - CO2 captured in sorbent
        - 'Plant sensors: inlet/outlet CO2 concentration'
      - - 3. Sorbent regeneration
        - Climeworks (DAC plant)
        - Heat sorbent to ~100°C with steam; CO2 releases as pure gas stream
        - Pure CO2 gas ready for compression
        - Temperature/pressure sensors; CO2 mass flow meter
      - - 4. CO2 compression and transport
        - Climeworks + Carbfix
        - CO2 compressed, mixed with water, piped to Carbfix injection site
        - CO2-rich fluid ready for injection
        - Mass flow measurement; pipeline sensors
      - - 5. Underground injection
        - Carbfix
        - Inject CO2-rich water into basaltic rock at 400-800m depth
        - CO2 begins mineralizing into calcite
        - Injection pressure/volume; geochemical tracers
      - - 6. Mineralization verification
        - Carbfix + independent geologists
        - Monitor geochemical changes; confirm CO2 conversion to calcite within 1-2 years
        - Permanence confirmed
        - Tracer measurements; independent geochemical analysis
      - - 7. CORC issuance
        - Puro.earth
        - Issue Carbon Removal Certificate for verified tonne
        - CORC in buyer's registry account
        - Puro Standard audit; plant + geological data
      - - 8. ESG reporting integration
        - Corporate buyer
        - Import CORCs into CDP/SBTi/GHG Protocol Scope 3 report
        - Published ESG disclosure with verified CDR
        - Third-party ESG auditor
    notes: |
      This workflow applies to the DAC+underground storage product (Orca and Mammoth plants).
      For the blended portfolio product, steps 2-6 vary by method (biochar, enhanced weathering).
      For individual subscribers, steps 1 and 8 are simplified via Climeworks' website interface.
