        locations globally offer (1) abundant, cheap, near-zero-carbon geothermal steam and
        (2) basaltic rock at accessible depths. This creates a scale-up bottleneck: future
        plants in Louisiana (Project Cypress), Norway, Kenya, and Canada must use alternative
        heat sources and storage geologies.
