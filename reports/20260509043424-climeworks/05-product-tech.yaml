  claims:
    - id: CE001
      statement: |
        Climeworks' core product is a direct air capture (DAC) system using solid-sorbent
        technology: a temperature-swing adsorption (TSA) process in which ambient air is
        drawn by fans through a bed of amine-functionalized sorbent material. CO2 from the
        air binds chemically to the sorbent; when the sorbent is heated with low-temperature
        steam (~100°C), CO2 is released as a pure gas stream. The captured CO2 is then
        compressed and either stored underground (via Carbfix basalt mineralization) or used
        for industrial applications (e.g., beverages, greenhouses).
      type: company-claimed
      topic: product description
      confidence: high
      freshness: current
      sourceRefs:
        - SE001
        - SE003
      answersQuestionRefs:
        - QE001
    - id: CE002
      statement: |
        Climeworks' Generation 3 (Gen3) technology uses novel structured sorbent materials
        (not the packed filter beds of Gen1/Gen2) that increase surface contact area with
        CO2, reducing capture and release cycle time by a factor of at least two. The result:
        more than 2× CO2 capture per module, 0.5× energy consumption per tonne, and 3×
        material lifetime vs. Generation 2. Gen3 was validated in full-scale testing at
        Climeworks' Basel, Switzerland testing facility in June 2024 after 5,000 CO2 capture-
        and-release cycles and 15,000 hours of R&D testing by 50 specialists.
      type: company-claimed
      topic: Gen3 technology
      confidence: high
      freshness: current
      sourceRefs:
        - SE001
        - SE002
      answersQuestionRefs:
        - QE003
    - id: CE003
      statement: |
        The Generation 3 collector unit design uses modular "cubes" measuring 26×26 meters
        footprint and 22.5 meters tall (approximately 85×85×73 feet). This represents a
        redesign from the stacked-container format used at Orca and Mammoth to a cube format
        that increases capture efficiency, reduces material costs, and improves robustness.
        The cube design enables standardized factory-style manufacturing and field assembly,
        reducing construction lead time vs. bespoke plant designs.
      type: company-claimed
      topic: Gen3 hardware design
      confidence: high
      freshness: current
      sourceRefs:
