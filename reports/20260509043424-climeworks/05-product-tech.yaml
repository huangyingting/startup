    - id: CE034
      statement: |
        At the process level, Climeworks runs a batch cycle: (1) capture phase (~several
        hours): air flows through sorbent, CO2 adsorbs; (2) isolation phase: valves close
        the container; (3) desorption phase (~1 hour, steam at ~100°C): CO2 releases from
        sorbent into a closed loop; (4) collection phase: pure CO2 is compressed and piped
        to Carbfix. Gen3's structured sorbent reduces cycle time by at least 2×, meaning
        more cycles per day per module and proportionally higher annual throughput per unit.
      type: third-party-reported
      topic: process mechanics
      confidence: medium
      freshness: current
      sourceRefs:
