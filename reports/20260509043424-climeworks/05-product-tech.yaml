sections:
  - id: section-1
    title: Product Definition and Customer Workflow
    body: |
      Climeworks' primary product is a carbon removal certificate (CORC) representing one metric
      tonne of CO2 permanently removed from the atmosphere and stored underground for thousands
      of years. The customer-facing workflow is: (1) sign a forward purchase agreement; (2)
      Climeworks captures CO2 from ambient air using its solid-sorbent system; (3) Carbfix
      injects the CO2 into Iceland basalt rock, where it mineralizes within 1–2 years; (4)
      Puro.earth independently verifies each tonne and issues a CORC; (5) the customer receives
      CORCs usable in CDP submissions, SBTi compliance reports, and GHG Protocol Scope 3
      accounting.

      The product has four key quality dimensions: (1) permanence—basalt mineralization locks
      CO2 for thousands to millions of years, verified by geochemical tracers; (2) measurability—
      continuous plant sensor data and geological injection records enable tonne-level accounting;
      (3) additionality—each CORC represents net new CO2 removal, not avoided emissions or
      sequestration of existing sinks; (4) sustainability—the system runs on near-zero-carbon
      geothermal energy in Iceland.

      Climeworks has expanded its product offering with a blended CDR portfolio (DAC + biochar +
      enhanced weathering), allowing corporate buyers to achieve larger removal volumes at lower
      blended cost while maintaining DAC in the mix for quality credibility. The maritime deal
      with Mitsui O.S.K. Lines (13,400 tonnes, 2025) demonstrates the product's applicability
      to decarbonization strategies across new industry verticals.
    claimRefs:
      - CE001
      - CE015
      - CE020
      - CE027
      - CE028
      - CE033
    tableRefs:
      - TE002
    figureRefs:
      - FE001
      - FE002
  - id: section-2
    title: 'Technology Architecture: Generation 2, Generation 3, and the Storage Layer'
    body: |
      Climeworks' technology stack has three layers: (1) the solid-sorbent DAC system (proprietary);
      (2) the modular hardware platform (cubes, fans, heat exchangers); and (3) the CO2 storage
      system (Carbfix partnership). Each layer is critical; a failure in any one prevents carbon
      removal credit delivery.

      The core chemistry is temperature-swing adsorption (TSA): amine-functionalized sorbent
      captures CO2 from air at ambient temperature, then releases concentrated CO2 when heated
      to ~100°C with steam. This low-temperature regeneration is the key advantage over L-DAC
      (Carbon Engineering), which requires 900°C calciner temperature. Gen2 uses packed filter
      beds; Gen3 replaces these with structured sorbent materials that increase surface contact,
      halving cycle time and doubling throughput per module.

      Gen3 was validated in June 2024 at Climeworks' Basel testing facility after 5,000
      capture-release cycles and 15,000 R&D hours by 50 dedicated specialists from the
      company's 180-person R&D organization. The Gen3 cube format (26×26m, 22.5m tall) is
      a hardware redesign that improves manufacturing standardization vs. the stacked containers
      of Gen2.

      Carbfix's Iceland storage layer provides a permanent, measurable storage mechanism:
      CO2-rich water is injected into basaltic rock at 400–800m depth, where it mineralizes
      into calcite within 1–2 years as independently verified by geochemical tracers. This
      makes Climeworks' combined product uniquely verifiable compared to any nature-based
      or utilization-based CDR alternative.
    claimRefs:
      - CE001
      - CE002
      - CE003
      - CE005
      - CE006
      - CE007
      - CE013
      - CE034
    tableRefs:
      - TE003
    figureRefs:
      - FE003
      - FE004
  - id: section-3
    title: Operational Maturity, Adverse Technology Findings, and Deployment Roadmap
    body: |
      Climeworks' operational maturity is split: Gen2 (Orca) is at TRL 9 with 3+ years of
      continuous commercial operation; Mammoth (also Gen2) is at TRL 8 but operationally
      impaired (12 of 72 containers active). Gen3 is at TRL 6–7 (full-scale prototype tested
      but not commercially deployed).

      The most adverse technology finding is Mammoth's container failure rate: if 60 of 72
      modular units fail to operate in Iceland's controlled environment with 3+ years of
      operational learning from Orca, what does this imply for Gen3 cube deployment in
      Louisiana (different energy source, different climate, different geology)? This question
      has no public answer and represents the single highest-severity technology risk in this
      diligence.

      The Gen3 Louisiana plant (Project Cypress) is planned to begin construction in 2026
      and would be the first commercial Gen3 deployment—a major demonstration of whether
      the Basel validation translates to commercial reliability. Additional sites in Norway,
      Kenya, and Canada are in earlier stages, each requiring local energy and storage
      adaptation. Orca continues to operate as a steady-state Gen2 reference facility.

      Climeworks' partnership with Avantium (Q1 2025) for high-throughput sorbent material
      screening accelerates the next generation of material candidates beyond Gen3, reducing
      R&D cycle time. The company's IP portfolio (patent EP3034149B1 and others) covers key
      sorbent formulations and process configurations, creating a 5–10 year replication barrier.
    claimRefs:
