      answersQuestionRefs:
        - QE002
    - id: CE004
      statement: |
        Climeworks' Mammoth plant (launched May 2024) consists of 72 modular collector
        containers in Iceland, with a nameplate capacity of 36,000 tonnes CO2/yr. As of
        early 2025, only 12 of 72 containers were operational, implying a 17% operational
        deployment rate and actual capture well below nameplate. The root cause of the
        60 non-operational containers has not been publicly disclosed; it is reported as
        a filtration or sorbent regeneration issue.
      type: third-party-reported
      topic: operational maturity
      confidence: high
