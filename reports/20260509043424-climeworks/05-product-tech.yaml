    - id: CE006
      statement: |
        Carbfix, Climeworks' Iceland storage partner, injects CO2-rich water into basaltic rock
        formations beneath the Hellisheiði geothermal power plant at depths of 400–800 meters.
        The CO2 mineralizes into carbonate rock (calcite) within 1–2 years—a permanent, verified
        storage pathway. Carbfix publishes injection rate data and has independently measured
        mineralization rates using geochemical tracers. The Puro.earth Standard certifies each
        tonne of stored CO2 as a carbon removal certificate (CORC).
      type: third-party-reported
