      answersQuestionRefs: [QR015]

    - id: CR028
      statement: |
        Climeworks' foreign exchange risk: the company's costs are primarily in Swiss francs
        (CHF) and Euros (staff, Swiss HQ, EU suppliers), while some revenue is in USD (US
