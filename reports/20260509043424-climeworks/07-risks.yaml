      type: inferred
      topic: labor market risk
      confidence: medium
      freshness: current
      sourceRefs: [SR010, SR015]
      answersQuestionRefs: [QR008]

    - id: CR027
      statement: |
        Climeworks' data security and privacy risk: the corporate buyer dashboard and individual
