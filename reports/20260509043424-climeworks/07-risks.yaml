      freshness: current
      sourceRefs: [SR030, SR022]
      answersQuestionRefs: [QR017]

    - id: CR036
      statement: |
        Climeworks' Avantium partnership (Q1 2025) for high-throughput sorbent screening
        represents an attempt to accelerate Gen3 sorbent optimization—but also creates a
        dependency. If Avantium is acquired, faces financial difficulties, or the joint
        development program stalls, Climeworks' sorbent development roadmap could be disrupted.
        The partnership is early-stage; the depth of the Avantium dependency relative to
        Climeworks' internal R&D capacity is not publicly clear.
      type: inferred
      topic: R&D partner dependency risk
      confidence: low
      freshness: current
      sourceRefs: [SR015, SR014]
      answersQuestionRefs: [QR005]

    - id: CR037
      statement: |
        Climeworks' Norwegian and Kenyan expansion risk: both countries require negotiation
        of new site leases, local permitting, energy supply agreements, and CO2 storage
        access—each a complex, multi-year process. Norway has its own stringent environmental
        regulations (Petroleum Act, Nature Diversity Act); Kenya has developing environmental
        regulatory frameworks for large industrial projects. Any site-level delay in these
        new geographies directly delays the multi-plant Gen3 rollout that is Climeworks' path
        to cost parity.
      type: inferred
      topic: international expansion risk
      confidence: medium
      freshness: current
      sourceRefs: [SR025, SR022]
      answersQuestionRefs: [QR002]

    - id: CR038
      statement: |
        Climeworks' HR and culture risk post-layoff: the May 2025 22% reduction left ~377
        employees. Survivors of large layoffs typically experience elevated stress, reduced
        productivity, and increased voluntary attrition in the 6–12 months following
        (survivor syndrome). For Climeworks, whose Mammoth repair success depends on a highly
        specialized technical team, voluntary attrition of 10–15% of the remaining workforce
        in H2 2025–H1 2026 would represent a meaningful execution risk. No public data exists
        on post-layoff attrition at Climeworks.
      type: inferred
      topic: HR / survivor syndrome risk
      confidence: medium
      freshness: current
      sourceRefs: [SR010, SR006]
      answersQuestionRefs: [QR008]

    - id: CR039
      statement: |
        Climeworks' regulatory risk in the VCM: Article 6 of the Paris Agreement creates
        a framework for international CDR credit trading, but its implementation (particularly
        Article 6.4, the UN-supervised CDR crediting mechanism) is still being negotiated.
        If Article 6.4 creates burdensome requirements for DAC credits (e.g., Corresponding
        Adjustments that prevent credits from counting for buyers in certain countries),
        the international market for Climeworks' credits could be constrained by treaty-level
        regulatory complexity.
      type: third-party-reported
      topic: Paris Agreement / Article 6 risk
      confidence: medium
      freshness: current
      sourceRefs: [SR023, SR013]
      answersQuestionRefs: [QR002]

    - id: CR040
      statement: |
        Climeworks' financial model risk from capital intensity: each Gen3 commercial plant
        is expected to require several hundred million dollars in CapEx. To achieve 1 Mt/yr
        by 2030 (Climeworks' aspirational target), Climeworks would need 28 plants at
        36,000 t/yr each (or fewer larger Gen3 plants). At $300M–$500M per Gen3 plant,
        this implies $8–14B in CapEx by 2030—far beyond what equity raises alone can support.
        Without project finance structures (debt, green bonds, government loans, tax credits)
        from multiple sources, the 2030 target is financially unreachable.
      type: inferred
      topic: capital intensity risk
      confidence: high
      freshness: current
      sourceRefs: [SR005, SR018]
      answersQuestionRefs: [QR003]

