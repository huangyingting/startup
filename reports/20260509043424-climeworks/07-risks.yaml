      type: inferred
      topic: VCM market credibility risk
      confidence: medium
      freshness: current
      sourceRefs: [SR011, SR023]
      answersQuestionRefs: [QR014]

    - id: CR023
      statement: |
        Climeworks' dilution and governance risk: multi-billion-dollar capital needs for
