      type: inferred
      topic: governance / co-founder risk
      confidence: medium
      freshness: current
      sourceRefs: [SR010, SR006]
      answersQuestionRefs: [QR008]

    - id: CR024
      statement: |
        Insurance and liability risk: Swiss Re provides CDR delivery insurance for Climeworks'
        credit products. If Swiss Re's actuarial models underestimate delivery failure probability
        (as Mammoth suggests), Swiss Re may reprice or withdraw CDR delivery insurance.
        Without Swiss Re's backstop, financial institutions that bought CDR credits based on
        the insurance guarantee would face credit quality issues in their ESG reporting,
        potentially triggering further contractual complications for Climeworks.
      type: inferred
      topic: insurance / liability risk
      confidence: medium
      freshness: current
      sourceRefs: [SR024, SR005]
      answersQuestionRefs: [QR005]

    - id: CR025
      statement: |
        Climeworks' construction and permitting risk in new geographies: Gen3 plant construction
        in Louisiana (Project Cypress), Norway, Kenya, Canada, and Saudi Arabia will each
        face distinct local permitting regimes, labor markets, geological conditions, and
        regulatory requirements. The Louisiana site in particular requires: US DOE approval,
        Louisiana DEQ environmental permits, and EPA underground injection control (UIC) Class
        VI permits for CO2 storage. EPA UIC Class VI permitting has historically taken 2–5
        years; a delay would directly push back Climeworks' US commercial timeline.
      type: third-party-reported
      topic: permitting / construction risk
      confidence: high
      freshness: current
      sourceRefs: [SR025, SR003]
      answersQuestionRefs: [QR002]

    - id: CR026
      statement: |
        Climeworks' labor market risk: DAC engineering requires specialized skills in
        chemical engineering, mechanical engineering, HVAC, sorbent chemistry, and remote
