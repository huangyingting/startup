  claims:
    - id: CR001
      statement: |
        Mammoth's operational performance is Climeworks' highest-severity near-term risk.
        Only 12 of 72 collector containers were reported online after approximately 12 months
        of operation, producing an estimated ~105 tonnes of CO2 in 10 months vs. 36,000 t/yr
        nameplate capacity. The root cause has not been publicly disclosed. If the remaining
        60 containers cannot be brought online, Climeworks' near-term delivery capacity is
        capped at ~10% of planned output, and corporate customers face a multi-year delivery
        gap. This is a "thesis-break" risk: it challenges the fundamental assumption that
        Climeworks can scale DAC to commercial delivery rates.
      type: inferred
      topic: Mammoth performance risk
      confidence: high
      freshness: current
      sourceRefs: [SR001, SR002]
      answersQuestionRefs: [QR001]

    - id: CR002
      statement: |
        Project Cypress, Climeworks' planned US Gulf Coast DAC hub (Louisiana), is at risk
        under the Trump administration's review of DOE-funded clean energy programs. Project
        Cypress was selected as a DAC Hub in August 2023 with up to $500M+ in DOE funding
        commitments across construction phases. As of early 2025, all DOE DAC Hub projects
        were under review, with reports of funding pauses and political pressure to de-prioritize
        climate-specific programs. If Cypress is defunded or significantly delayed, Climeworks
        loses its primary US scale-up vehicle and the expected sovereign-backstopped revenue
        that underpins the Gen3 business case.
      type: third-party-reported
      topic: US policy / regulatory risk
      confidence: high
      freshness: current
      sourceRefs: [SR003, SR004]
      answersQuestionRefs: [QR002]

    - id: CR003
      statement: |
        Climeworks' burn rate is estimated at $80–150M/yr based on its 483-person workforce
        (pre-layoffs) and known capital expenditure at Mammoth. The January 2025 $162M raise
        provides an estimated 12–24 months of additional runway—taking the company to
        approximately January 2026–January 2027. If Gen3's commercial deployment (construction
        start 2026, first commercial plant 2027–2028) slips, or if Project Cypress funding
        is lost, Climeworks will need to raise additional capital in a challenging clean-energy
        fundraising environment. The company has raised over $1B to date; continued fundraising
        at similar terms is not guaranteed, especially in a post-Mammoth-failure context.
      type: inferred
      topic: financial runway risk
      confidence: medium
      freshness: current
      sourceRefs: [SR005, SR006]
      answersQuestionRefs: [QR003]

    - id: CR004
      statement: |
        Climeworks' operations are geographically concentrated: Orca and Mammoth are both
        located at the Hellisheiði geothermal field in Iceland. This creates a single point
        of failure: a geothermal plant disruption, natural disaster (Iceland is seismically
        active), extreme weather event, or Carbfix operational failure would halt all of
        Climeworks' delivery capacity simultaneously. There is no operational geographic
        diversification until Gen3 plants come online in multiple countries (projected 2027+).
      type: inferred
      topic: geographic concentration risk
      confidence: high
      freshness: current
      sourceRefs: [SR007, SR001]
      answersQuestionRefs: [QR004]

    - id: CR005
      statement: |
        Carbfix is Climeworks' sole CO2 storage partner at its Iceland plants. Carbfix
        (a subsidiary of Reykjavik Energy/OR) manages the underground injection and
        mineralization of captured CO2. If Carbfix experiences operational issues, regulatory
        problems, or financial difficulties, Climeworks cannot store its captured CO2 in Iceland.
        This dependency is structural: there is no alternative storage provider at the Hellisheiði
        site. Carbfix's operational stability is therefore a critical dependency with no
        near-term substitutability.
      type: inferred
      topic: partner dependency risk
      confidence: high
      freshness: current
      sourceRefs: [SR007, SR012]
      answersQuestionRefs: [QR005]

    - id: CR006
      statement: |
        The EU Carbon Removals Certification Framework (CRCF) became effective in 2024, creating
        a mandatory certification pathway for carbon removal credits sold in EU regulated contexts.
        While Climeworks is broadly aligned with CRCF requirements (its Puro.earth/CORC
        certification and permanent geological storage model meet most CRCF criteria), the
        regulatory details are still being finalized through delegated acts. Incorrect assumption
        of compliance, or unintended conflicts with CRCF's additionality or permanence criteria,
        could disqualify Climeworks from EU-regulated markets—its largest current customer geography.
      type: third-party-reported
      topic: EU regulatory compliance risk
      confidence: medium
      freshness: current
      sourceRefs: [SR008, SR013]
      answersQuestionRefs: [QR002]

    - id: CR007
      statement: |
        Climeworks' Gen3 sorbent technology represents a step-change from Gen2: structured
        sorbents (replacing packed filter beds) have only been tested in a 5,000-cycle,
        ~15,000-hour Basel pilot. Commercial-scale Gen3 has never been deployed; the structural
        sorbent material must survive industrial conditions (humidity, temperature cycling,
        vibration, contamination) at 100× the pilot scale. There is no precedent for this
        material at commercial DAC scale. If Gen3 sorbents degrade faster than expected
        at commercial scale, the cost and throughput projections ($250–350/t, 2× throughput)
        would not be achieved.
      type: inferred
      topic: Gen3 technology execution risk
      confidence: high
      freshness: current
      sourceRefs: [SR014, SR001]
      answersQuestionRefs: [QR006]

    - id: CR008
      statement: |
        Climeworks' sorbent supply chain is not publicly disclosed. The amine-functionalized
        material used in DAC sorbents requires specialty chemical manufacturing; if the supply
        chain relies on a single supplier or on specialty chemicals subject to geopolitical
        disruption (e.g., Chinese rare earth supply chains), Gen3 scale-up could face material
        availability constraints. The 2022–2024 global supply chain disruptions demonstrated
        the vulnerability of specialty materials; a similar event affecting DAC sorbents
        would directly limit Climeworks' production capacity.
      type: inferred
      topic: supply chain risk
      confidence: medium
      freshness: current
      sourceRefs: [SR015, SR001]
      answersQuestionRefs: [QR007]

    - id: CR009
      statement: |
        The 22% workforce reduction (106 of 483 employees) announced in May 2025 reduces
        Climeworks' operational capacity and creates key person retention risk. Specifically:
        (1) the Mammoth repair team may have been reduced, slowing the diagnosis and fix of
        underperforming collector containers; (2) senior technical talent may leave due to
        uncertainty, particularly if equity compensation is now underwater relative to prior
        funding rounds; and (3) the reputational signal of a large layoff at a climate tech
        company with a flagship failing plant creates negative press that complicates recruitment.
      type: inferred
      topic: key person / execution risk
      confidence: medium
      freshness: current
      sourceRefs: [SR010, SR006]
      answersQuestionRefs: [QR008]

    - id: CR010
      statement: |
        Climeworks faces competitive technology risk from second-generation entrants: 1PointFive
        (Stratos, Texas, operational June 2024), Heirloom Carbon (California, lime-based DAC),
        and Sustaera (Georgia, monolith-based low-temperature DAC) are all progressing toward
        commercial scale with different cost structures. 1PointFive's Stratos plant (claiming
        $300–400/t commercial costs) directly challenges Climeworks' pricing in the US market.
        If a competitor achieves sub-$250/t DAC at scale before Climeworks' Gen3 deployment,
        Climeworks may face pricing pressure that compresses margins and slows customer acquisition.
      type: third-party-reported
      topic: competitive technology risk
      confidence: medium
      freshness: current
      sourceRefs: [SR009, SR016]
      answersQuestionRefs: [QR009]

    - id: CR011
      statement: |
        Climeworks' credit quality risk: if voluntary carbon market (VCM) standards bodies
        (Gold Standard, Verra, ICVCM) or corporate ESG reporting standards (ISSB, GRI, CDP)
        evolve their treatment of DAC credits in a way that reduces their accounting value
        to buyers (e.g., tighter additionality, permanence discounting, 100-year monitoring
        requirements), demand for Climeworks' CDR credits could fall. The ICVCM's Core Carbon
        Principles and EU CRCF delegated acts are both in flux; unfavorable outcomes would
        directly affect Climeworks' revenue model.
      type: inferred
      topic: VCM standards / regulatory risk
      confidence: medium
      freshness: current
      sourceRefs: [SR011, SR013]
      answersQuestionRefs: [QR002]

    - id: CR012
      statement: |
        Climeworks has received DOE Advanced Research Projects Agency – Energy (ARPA-E) and
        DOE Loan Programs Office (LPO) attention. However, DOE Clean Energy Demonstration
        projects (including DAC hubs) are now classified as lower priority under the Trump
        administration's executive orders on "unleashing American energy." The Bipartisan
        Infrastructure Law funding that backed Project Cypress could be paused, redirected,
        or subjected to administrative proceedings that block disbursement. This is a
        legal/regulatory risk with a direct $500M+ financial impact on Climeworks.
      type: third-party-reported
      topic: US government funding risk
      confidence: high
      freshness: current
      sourceRefs: [SR003, SR004]
      answersQuestionRefs: [QR002]

    - id: CR013
      statement: |
        Iceland's environmental permitting regime for large-scale CO2 injection is managed
        by the Icelandic Environment Agency (Umhverfisstofnun). While Climeworks and Carbfix
        have operated under existing permits since 2021, any expansion of injection volumes
        (required to bring more Mammoth containers online at full capacity) may require
        updated environmental impact assessments or new permits. Delays in Icelandic
        regulatory approvals would directly delay Climeworks' ability to scale injection
        beyond current levels.
      type: inferred
      topic: Iceland environmental permitting risk
      confidence: medium
      freshness: current
      sourceRefs: [SR012, SR013]
      answersQuestionRefs: [QR002]

    - id: CR014
      statement: |
        Climeworks' intellectual property risk: the core patent (EP3034149B1, amine sorbent
        for CO2 capture, filed ~2014) will expire approximately 2034, removing patent
        protection just as Gen3 plants are at commercial scale. Competitors who reverse-engineer
        or independently develop similar sorbent formulations could erode Climeworks' technology
        moat after patent expiration. Additionally, the patent landscape in DAC is becoming
        more contested: companies like Sustaera, Heirloom, and academic institutions have
        filed competing patents; freedom-to-operate in Gen3 configurations is not confirmed.
      type: inferred
      topic: intellectual property risk
      confidence: medium
      freshness: current
      sourceRefs: [SR017, SR009]
      answersQuestionRefs: [QR010]

    - id: CR015
      statement: |
        Climeworks' energy cost risk is structural: DAC requires 1,500–2,000 kWh/tonne
        (Gen2) and targets ~750 kWh/tonne (Gen3). All of this energy comes from Iceland's
        geothermal grid at competitive rates. If geothermal energy costs rise (due to increased
        demand from data centers in Iceland, infrastructure constraints, or contractual
        renegotiation), Climeworks' unit economics deteriorate directly. Energy represents
        approximately 30–50% of DAC operating costs; a 20% energy cost increase would
        translate to a $50–100/tonne increase in Gen2 OPEX.
      type: inferred
      topic: energy cost risk
      confidence: medium
      freshness: current
      sourceRefs: [SR007, SR018]
      answersQuestionRefs: [QR007]

    - id: CR016
      statement: |
        Climeworks' reputational risk: Mammoth's underperformance has already received
        significant negative press coverage (Latitude Media, CTOL, Sifted, SwissInfo).
        If the delivery gap persists, the press narrative may shift from "technology is
        hard but Climeworks is trying" to "Climeworks oversold Mammoth and cannot deliver."
        This reputational risk could: (1) slow new customer acquisition; (2) make future
        fundraising more expensive; and (3) create regulatory attention if customers feel
        they were misled about delivery timelines.
      type: inferred
      topic: reputational risk
      confidence: medium
      freshness: current
      sourceRefs: [SR006, SR010]
      answersQuestionRefs: [QR011]

    - id: CR017
      statement: |
        Climeworks' contract delivery risk: if Mammoth continues to underperform, Climeworks
        may be exposed to breach of contract claims from corporate customers who expected
        delivery of specific annual tonnages. While contracts likely include force majeure
        and "best efforts" provisions, repeated multi-year delivery failures could give
        customers grounds to seek price adjustments, partial refunds, or contract termination.
        No such claims have been publicly disclosed; the probability is low near-term but
        rises as the delivery gap extends.
      type: inferred
      topic: contract delivery legal risk
      confidence: medium
      freshness: current
      sourceRefs: [SR019, SR001]
      answersQuestionRefs: [QR012]

    - id: CR018
      statement: |
        Climeworks' safety risk: DAC facilities handle large volumes of CO2 (a potential
        asphyxiation hazard at high concentrations) and amine sorbents (potential skin/eye
        irritants; some amines are suspected carcinogens at high exposure). The Mammoth plant
        employs ~50+ onsite workers; an industrial safety incident (CO2 leak, chemical spill,
        mechanical failure) could: (1) injure workers; (2) halt operations for regulatory
        investigation; and (3) create significant reputational and financial liability.
        Climeworks has not published its occupational health and safety incident record.
      type: inferred
      topic: operational safety risk
      confidence: medium
      freshness: current
      sourceRefs: [SR020, SR001]
      answersQuestionRefs: [QR004]

    - id: CR019
      statement: |
        Climeworks' CCS monitoring, reporting, and verification (MRV) risk: permanence
        claims depend on Carbfix's ability to confirm that injected CO2 has mineralized
        into rock within ~2 years. If CO2 proves to re-mobilize (due to unexpected geochemistry,
        seismic events, or Carbfix measurement errors), the delivered CORCs would be invalidated.
        While the academic literature on Carbfix's basalt mineralization is favorable, the
        long-term geological performance has only been validated at relatively small scales
        (Orca volumes) and not at the multi-hundred-thousand tonne scales required for
        commercial delivery.
      type: inferred
      topic: MRV / permanence risk
      confidence: medium
      freshness: current
      sourceRefs: [SR012, SR021]
      answersQuestionRefs: [QR013]

    - id: CR020
      statement: |
        Climeworks' capital structure risk: with >$1B raised at what appears to be unicorn+
        valuations (implied >$1B valuation based on funding rounds), a down round or flat round
        in the next capital raise would dilute existing shareholders, damage morale, and
        signal loss of investor confidence. Partners Group and GIC are institutional investors
        with portfolio return requirements; if Climeworks' operational trajectory does not
        support the implied valuation, the next fundraise could require a structural reset
        of terms, governance, or leadership.
      type: inferred
      topic: capital structure / funding risk
      confidence: medium
      freshness: current
      sourceRefs: [SR005, SR006]
      answersQuestionRefs: [QR003]

    - id: CR021
      statement: |
        The political risk from Switzerland's geopolitical position: Climeworks is a Swiss
        company with EU-facing regulatory exposure (CRCF), US government dependency (Project
        Cypress), and Iceland operations. Any deterioration in Switzerland-EU relations
        (e.g., due to Swiss Framework Agreement negotiations) or US-Switzerland trade policy
        changes could affect Climeworks' regulatory standing, government partnership eligibility,
        or cross-border investment flows. This is a low-probability but non-zero background risk.
      type: inferred
      topic: political / geopolitical risk
      confidence: low
      freshness: current
      sourceRefs: [SR022, SR013]
      answersQuestionRefs: [QR002]

    - id: CR022
      statement: |
        Climeworks' market risk: if the voluntary carbon market (VCM) experiences a
        significant credibility shock (e.g., comparable to the Verra/Guardian crisis in 2023
        where nature-based offsets were shown to be near-worthless), buyer demand for all CDR
        credits—including DAC—could temporarily collapse. Even though DAC is scientifically
        distinct from nature-based offsets, the market psychology of "carbon offset scandals"
