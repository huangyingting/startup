chapter:
  number: 7
  title: Risk Analysis
  summary: |
    Climeworks faces a convergence of operational, regulatory, financial, partner, and execution
    risks that collectively represent the most concentrated risk profile in the CDR sector. The
    highest-severity risks are: (1) Mammoth performance failure—only 12/72 collector containers
    online after 12 months, producing ~105 t vs. 36,000 t/yr nameplate; (2) Project Cypress DOE
    hub jeopardization under Trump administration review, potentially losing up to $500M+ of
    expected government support; (3) burn rate vs. runway mismatch—$162M raised in January 2025
    provides an estimated 12–24 months of runway at the current ~$80–150M/yr burn, requiring
    another fundraise before Gen3 reaches commercial deployment; (4) single-plant geographic
    concentration—Iceland geothermal dependency creates both supply chain and business continuity
    risk. The 22% workforce reduction (106 of 483 employees) in May 2025 reduces burn but also
    constrains Mammoth repair capacity and Gen3 deployment timelines. Regulatory tailwinds
    (EU CRCF, US DOE support) could rapidly reverse under political changes—as is already
    evident in the Trump administration's review of DOE DAC hubs. Mitigation maturity is low
    across most operational dimensions; Climeworks' main risk mitigation is technological
    iteration (Gen3) rather than operational redundancy.

