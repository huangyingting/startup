  topStrengths:
    - >-
      World's most operationally experienced DAC operator: 3+ years Orca, 1 year Mammoth, 1,081 tonnes of verified CDR
      delivered.
    - >-
      Gen3 technology validated in Basel: 2× throughput, 0.5× energy, 3× filter life vs. Gen2—a credible path to
      $250–350/t if commercial-scale deployment succeeds.
    - >-
      Premium customer base: BCG (80,000 t), Morgan Stanley (40,000 t), SAP (37,000 t), Swiss Re
      (investor+buyer+insurer)—strongest enterprise proof set in DAC.
    - >-
      6 million contracted tonnes represents $2.4B in face-value backlog, validating long-term buyer demand even at
      current premium prices.
    - >-
      Structural regulatory tailwinds: EU CRCF, SBTi, CORSIA, IMO 2050, and IRA 45Q ($180/t) all drive durable CDR
      demand from Climeworks' customer verticals.
  topRisks:
    - >-
      Mammoth at 0.3% of 36,000 t/yr nameplate (12/72 containers active, ~105 t in 10 months)—root cause not publicly
      disclosed; recovery timeline unknown.
    - >-
      Project Cypress (DOE Hub, up to $500M+ funding) under Trump administration review; US scale-up could be delayed
      3–5 years or cancelled without government capital.
    - >-
      Financial runway of 12–24 months ($162M January 2025 raise at $80–150M/yr burn) before next raise, while Gen3
      commercial deployment requires $8–14B in CapEx.
    - >-
      Gen3 structured sorbent technology has never been deployed at commercial scale; scale-up failure would invalidate
      the 2030 cost parity roadmap.
    - >-
      22% workforce reduction (106 of 483 employees) creates key person attrition risk and constrains Mammoth repair
      capacity at the moment it is most needed.
  unresolvedGaps:
    - Root cause of Mammoth's 60/72 container failure is not publicly disclosed—the single most important diligence gap.
    - >-
      Cap table, preference stack, and 2025 round valuation are not publicly disclosed; dilution impact on new investors
      is unquantifiable.
    - >-
      Project Cypress DOE funding status changes rapidly and may have evolved since this report was written; investors
      should verify directly.
    - >-
      Gen3 commercial plant capital budget, financing structure (debt vs. equity vs. 45Q), and site-specific storage
      geology confirmation are not public.
