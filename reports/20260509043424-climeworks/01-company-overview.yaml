      statement: |
        Climeworks inaugurated Mammoth, the world's largest direct air capture and storage facility,
        in Iceland in May 2024. The plant has a nameplate capacity of up to 36,000 tonnes of CO2
        per year and is built on a 72-container modular design.
      type: third-party-reported
      topic: operational plants
      confidence: high
      freshness: recent
      sourceRefs: [SO001, SO007]
      answersQuestionRefs: [QO006]

