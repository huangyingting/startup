callouts:
  - calloutType: strength
    title: "Delivery Leader in DAC"
    body: |
      Climeworks is the clear delivery leader in Direct Air Capture, accounting for approximately
      81% of global DAC tonnes delivered as of H1 2025. With 421 purchase orders—more than any
      other DAC supplier—it demonstrates unmatched commercial execution in a nascent industry.
    claimRefs: [CO017, CO018]

  - calloutType: risk
    title: "Severe Plant Underperformance"
    body: |
      Both Orca and Mammoth have significantly underperformed nameplate capacities. Mammoth captured
      only ~105 tonnes in its first 10 months against a 36,000 t/yr target—less than 1%—raising
      fundamental questions about filter technology reliability at commercial scale and the company's
      ability to deliver contracted credits on schedule.
    claimRefs: [CO009, CO010, CO023, CO035]

  - calloutType: insight
    title: "$1B+ Funding Despite Setbacks"
    body: |
      Despite significant operational underperformance, Climeworks crossed the $1 billion total
      funding threshold in 2025 with a $162M raise led by institutional investors who retain
      conviction in the long-term DAC technology thesis. This signals that capital availability
      remains intact but demands cost reduction and operational proof points.
    claimRefs: [CO005, CO019]

  - calloutType: recommendation
    title: "Require Operational Proof Before Future Funding"
    body: |
      Prospective investors should require a clear operational performance recovery plan for Mammoth
      plant filter technology, independent third-party audit of delivered versus contracted credits,
      and a credible path to Mammoth reaching at least 50% of nameplate capacity before committing
      to the next funding milestone.
    claimRefs: [CO009, CO010, CO027]
