sections:
  - id: section-1
    title: "Founding, History, and Corporate Structure"
    body: |
      Climeworks AG was founded in 2009 by mechanical engineers Christoph Gebald and Jan Wurzbacher,
      who met during their PhD studies at ETH Zurich. Their doctoral research on direct air capture
      technology—extracting CO2 directly from the atmosphere—formed the scientific foundation of the
      company. Climeworks was spun out of ETH Zurich as a university start-up, a rare distinction
      that gave it academic credibility and early institutional support.

      In 2011, the company received its first external capital, which funded development of a modular
      prototype. By 2014, Climeworks had produced a working modular CO2 collector demonstrating
      progression from laboratory bench to commercial-scale engineering. The company's first
      commercial plant opened in Hinwil, Switzerland in May 2017 on the rooftop of a waste
      incineration facility, using 18 collector containers with a combined capacity of approximately
      900 tonnes of CO2 per year. The captured CO2 was sold to a nearby greenhouse operator and to
      Coca-Cola HBC for use in Valser sparkling water. In October 2017, Climeworks launched the
      CarbFix2 demo project in Iceland, exploring underground mineralization of CO2 with partner
      Carbfix. This pivotal experiment shaped Climeworks' future direction: transitioning from CO2
      utilization to permanent underground storage. The Hinwil facility closed in October 2022 as
      Climeworks fully embraced the storage-first model.

      The company is headquartered in Zurich, Switzerland with a German subsidiary in Cologne. Its
      board includes co-founders Dr. Gebald and Mr. Wurzbacher (co-CEOs), Alfred Gantner (co-founder
      of Partners Group), Dr. Ulf Berg, Dr. Martin Burkhardt, Syrie Crouch, and Dr. Maurits van Tol.
      As of early 2025, Climeworks employs approximately 377 people after laying off 106 (22%) in
      May 2025.
    claimRefs: [CO001, CO003, CO020, CO021, CO031]

  - id: section-2
    title: "Capital Raises, Valuation, and Investor Base"
    body: |
      Climeworks has raised more than USD 1 billion in total equity funding since inception, making
      it the best-funded pure-play carbon removal company globally. The company's funding trajectory
      mirrors the maturation of the climate tech investment landscape.

      The landmark fundraising event was an April 2022 Series C round of CHF 600 million
      (approximately USD 650 million), co-led by Partners Group and the Singapore sovereign wealth
      fund GIC. Additional investors included Baillie Gifford, Carbon Removal Partners, Global
      Founders Capital, M&G Investments, and Swiss Re. This round classified Climeworks as a unicorn
      (valuation exceeding USD 1 billion), a rare designation in the carbon removal sector. The
      funding was earmarked to scale DAC capacity to multi-million-tonne levels and finance the
      construction of Mammoth, Climeworks' second Iceland plant.

      In 2025, Climeworks secured an additional USD 162 million—the single largest carbon removal
      investment globally that year—led again by BigPoint Holding and Partners Group, with
      participation from existing investors. This raise brought total funding to over USD 1 billion
      and was described by the company as critical for advancing Generation 3 technology, expanding
      its carbon removal portfolio, and reducing per-tonne costs. Despite this capital infusion,
      the company simultaneously announced significant workforce reductions in May 2025, indicating
      that the raise was aimed at extending runway toward profitability rather than accelerating
      headcount growth.

      Co-CEO Jan Wurzbacher has publicly stated the company continues to seek acquisitions of
      smaller DAC startups that fail to secure their next funding round, suggesting an opportunistic
      consolidation strategy in the broader DAC sector.
    claimRefs: [CO004, CO005, CO019, CO029, CO006, CO037]

  - id: section-3
    title: "Operational Plants and Performance"
    body: |
      Climeworks' operational history centers on two large-scale plants in Iceland, both located
      adjacent to the Hellisheiði geothermal power station, which provides renewable energy to
      power the DAC process.

      The Orca plant (named after the Icelandic word for energy) launched in September 2021 with
      a nameplate capacity of 4,000 tonnes of CO2 per year. Despite being a landmark achievement—
      the world's first large-scale commercial DAC and permanent storage facility—Orca has never
      captured more than 1,000 tonnes in any calendar year. In 2024, Orca operated approximately
      65% of the time, with downtime attributed to planned maintenance on the geothermal power plant
      that supplies its energy. The co-CEO described the 4,000-tonne figure as analogous to "a car's
      top speed: the maximum possible." Climeworks has decided not to significantly invest further
      in Orca, as the capture technology is now considered outdated.

      Mammoth, inaugurated in May 2024, was designed as a tenfold scale-up with a 36,000-tonne
      annual nameplate capacity. However, in its first approximately 10 months of operation, Mammoth
      captured only ~105 tonnes of CO2—less than 1% of its design capacity. The root cause was
      filter performance issues identified during prototype testing at Orca in 2023. Rather than
      waiting indefinitely for a fix, Climeworks deployed what the COO described as a "band-aid"
      approach and proceeded with construction, but the same filter problems resurfaced at scale.
      As of early 2025, only 12 of the plant's 72 planned collector containers were fully operational.
      Climeworks has indicated that Mammoth is expected to enter a three-year ramp-up phase, with
      full operational capacity not expected until the late 2020s.

      These underperformance challenges have attracted significant adverse media coverage, including
      reporting by the Icelandic outlet Heimildin and Bloomberg, which noted that Climeworks' plants
      were capturing only a fraction of their stated capacities and had not yet offset their own
      operational and construction-related CO2 emissions.
    claimRefs: [CO007, CO008, CO009, CO010, CO023, CO035, CO038]

  - id: section-4
    title: "Business Model, Customers, and Commercial Traction"
    body: |
      Climeworks operates a B2B subscription and long-term purchase model for verified permanent
      carbon dioxide removal services. Corporate customers pay per tonne of CO2 removed and
      permanently stored underground, with individual subscriber pricing at approximately USD 1,000
      per tonne. This price point is approximately 13x above European compliance carbon credit
      prices, situating Climeworks firmly in the high-quality voluntary premium carbon removal market.

      The company's customer base spans 160+ corporate entities across technology, finance, aviation,
      consulting, and insurance sectors. Landmark multi-year offtake agreements include BCG's
      15-year, 80,000-tonne deal (December 2023, the largest single corporate purchase to date),
      Morgan Stanley's 40,000-tonne agreement through 2037 (October 2024, Morgan Stanley's first
      DAC credit purchase), and an undisclosed volume with JPMorgan Chase. British Airways joined
      as the first aviation sector customer in September 2024. Frontier Climate—an advance market
      commitment backed by Stripe, Shopify, Alphabet, and McKinsey—channels catalytic purchases
      from tech giants toward Climeworks and other high-potential DAC suppliers.

      As of mid-2025, Climeworks has secured over 380,000 contracted tonnes of removal across its
      customer base and holds 421 purchase orders—more than any other DAC supplier—according to
      CDR.fyi. It accounts for ~81% of all DAC tonnes actually delivered globally. However, the
      gap between contracted volumes and actual deliveries remains enormous: only 1,186 total tonnes
      had been delivered industry-wide as of H1 2025, representing 0.05% of total contracted volumes.
      Climeworks also offers blended portfolios through Climeworks Solutions, combining its own
      engineered removals with nature-based and third-party solutions to meet near-term corporate
      demand while the pure DAC supply scales up.
    claimRefs: [CO002, CO014, CO015, CO016, CO017, CO018, CO025, CO026, CO032, CO034]

