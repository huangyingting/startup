chapter:
  number: 1
  title: Company Overview
  summary: |
    Climeworks AG is a Zurich-based direct air capture (DAC) pioneer founded in 2009 by
    ETH Zurich engineers Christoph Gebald and Jan Wurzbacher. The company operates the world's
    two largest commercial DAC plants—Orca (4,000 t/yr nameplate) and Mammoth (36,000 t/yr
    nameplate)—in Iceland. With over $1 billion in total equity funding including a $650M Series C
    in 2022 and a $162M raise in 2025, Climeworks is the best-funded pure-play carbon removal
    company globally. However, its plants significantly underperform their nameplate capacities,
    a 22% workforce reduction in May 2025 signaled financial stress, and US expansion plans face
    policy uncertainty under the Trump administration.

