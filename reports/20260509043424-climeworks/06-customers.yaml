  evidenceGaps:
    - type: private-evidence-only
      description: |
        Climeworks does not disclose individual deal terms, payment schedules, delivery
        guarantee clauses, or force majeure provisions. NRR, CAC, payback period, and
        renewal rate data are not public. Whether any customers are in dispute over Mammoth
        delivery is not publicly known. The full list of 160+ corporate customers is not
        disclosed; the named customer proof table (TU003) covers only the ~10–15% of
        customers that Climeworks has publicly named.
      relatedQuestionRefs: [QU013, QU016, QU017, QU022]
      relatedTableRefs: [TU003]

    - type: access-blocked
      description: |
        Customer satisfaction data (NPS, CSAT, renewal intentions) is not publicly available.
        No customer has given on-record adverse statements; the absence of adverse evidence
        could reflect genuine satisfaction or non-disclosure obligations.
      relatedQuestionRefs: [QU012]

    - type: stale
      description: |
        Customer acquisition pipeline velocity (new customers per quarter in 2025) is not
        publicly trackable after Mammoth underperformance announcement. Whether the delivery
        gap has slowed new deal flow in the second half of 2025 is unknown.
      relatedQuestionRefs: [QU016]

sections:
  - id: section-1
    title: "Customer Base Overview, Segmentation, and Acquisition Channels"
    body: |
      Climeworks' customer base as of 2025 comprises 160+ corporate customers and 18,000+
      individual subscribers across 60+ countries. The corporate base spans seven primary
      verticals: professional services/consulting (BCG, Capgemini, McKinsey via Frontier);
      financial services (Morgan Stanley, Swiss Re); technology/software (Microsoft, SAP, TikTok,
      Stripe, Shopify, Alphabet via Frontier); aviation (British Airways); maritime (MOL, NYK);
      retail/consumer (Coca-Cola HBC); and manufacturing/industrials. Technology and financial
      services appear to represent the majority of contracted volume by value.

      Customer acquisition has followed three phases: (1) 2017–2021: early adopters via direct
      sales and CO2 utilization buyers (greenhouses, beverages); (2) 2021–2023: Frontier AMC
      cohort (Microsoft, Stripe, Shopify, Alphabet, McKinsey) and early CDR-focused direct sales;
      (3) 2023–2025: acceleration via name-brand deals (BCG 80,000 t, Morgan Stanley 40,000 t,
      SAP 37,000 t) and new verticals (maritime, digital consumer). The Frontier AMC was a critical
      inflection: Stripe, Shopify, and Alphabet's early commitment validated Climeworks' quality
      at the most scrutinized level in the CDR market and opened the next wave of buyers.

      Customer channels include: direct B2B enterprise sales (primary); Carbonfuture marketplace
      (secondary); Frontier AMC disbursements; and individual web subscription. Deal cycles
      for large enterprise accounts are estimated at 6–18 months, involving sustainability,
      procurement, legal, and finance teams. The individual subscription channel requires minimal
      sales resources and provides recurring cash flow and brand ambassadorship.
    claimRefs: [CU003, CU004, CU012, CU014, CU017, CU022, CU023]

  - id: section-2
    title: "Named Customer Proof, Deal Quality, and Vertical Expansion"
    body: |
      Climeworks' most significant publicly disclosed customer relationships demonstrate breadth
      and quality. BCG (80,000 t through 2040) and Morgan Stanley (40,000 t through 2037) are
      the anchor accounts: two global professional and financial services firms with sophisticated
      ESG teams, committing at the highest per-tonne prices to the longest durations available.
      These deals signal that Climeworks' product quality passes the scrutiny of buyers with
      dedicated carbon markets expertise.

      The SAP partnership (37,000 t by 2034, blended portfolio + ERP integration) represents
      a qualitatively different deal structure: it combines carbon removal with product co-
      development, creating a partnership moat beyond credit delivery. The MOL maritime deal
      (13,400 t, 2025) opens the shipping vertical—a sector with growing IMO 2050 compliance
      pressure. British Airways' engagement positions Climeworks in aviation (CORSIA compliance
      pressure). TikTok's 6,000+ t deal illustrates demand from digital consumer companies.

      The Frontier Climate cohort (Stripe, Shopify, Alphabet/Google, McKinsey, Meta) represents
      the highest-quality early proof: Frontier's technical advisory panel evaluated DAC suppliers
      on permanence, additionality, and MRV rigor—and Climeworks passed. No Frontier buyer has
      publicly exited. Orca has delivered ~1,081 tonnes of verified CDR to Frontier-affiliated
      buyers (2021–2024), representing genuine post-delivery proof.

      However, the quality of proof for Mammoth customers is weaker: with ~105 t delivered in
      10 months vs. 36,000 t/yr nameplate, most of Climeworks' "160+ customers" are pre-delivery
      commitments. This distinguishes Climeworks' commercial proof from truly validated customer
      outcomes.
    claimRefs: [CU001, CU002, CU005, CU006, CU007, CU008, CU009, CU016, CU019, CU029, CU031, CU035]

  - id: section-3
    title: "Retention, Churn, Adverse Signals, and Contract Structure"
    body: |
      Climeworks' structural retention is high: forward purchase contracts spanning 5–15 years
      create contractual lock-in, and ESG disclosure consistency requirements create soft retention
      (changing CDR suppliers requires explaining the switch to external auditors and investors).
      Swiss Re, Partners Group, and Microsoft's multi-dimensional relationships (investor +
      customer, or buyer + ecosystem partner) make exit economically and reputationally costly.

      No corporate customer has publicly announced a contract exit or reduction. However, the
      absence of disclosed adverse events should not be interpreted as guaranteed satisfaction:
      customers may have non-disclosure obligations, and the first multi-year contracts are only
      3–5 years old with many not yet at renewal decision points. The true retention test will
      come at 2026–2028 renewal cycles.

      The most adverse signal is latent: Mammoth's delivery gap (105 t in 10 months vs. 36,000 t/yr
      nameplate) means corporate customers who signed contracts expecting annual deliveries of
      hundreds to thousands of tonnes have received a fraction of expected credits. While force
      majeure provisions likely protect Climeworks contractually, repeated multi-year delivery
      shortfalls could trigger buyer frustration at renewal. No customer has publicly invoked
      force majeure or announced a dispute.

      Concentration risk is moderate: BCG, Morgan Stanley, and SAP's combined ~157,000 t represents
      about 2.6% of the 6M contracted tonnes, suggesting the portfolio is not highly concentrated
      by volume—but the most near-term deliverable volume may be more concentrated in these anchor
      accounts.
    claimRefs: [CU010, CU011, CU013, CU015, CU018, CU021, CU024, CU025, CU026, CU027, CU030]

  - id: section-4
    title: "Expansion Potential, Individual Channel, and Customer Verdict"
    body: |
      Climeworks' customer expansion opportunities are substantial: aviation (CORSIA compliance
      creates demand for permanent removal credits), maritime (IMO 2050 net-zero targets),
      financial services (ECB/Fed net-zero pressure on regulated institutions), and technology
      (digital companies with highest WTP for permanent CDR). Each vertical has regulatory
      tailwinds that convert CDR from voluntary (nice-to-have) to compliance-adjacent (must-have).

      The individual subscriber channel (18,000+ at est. CHF 20/month avg = ~$4.5M ARR) provides
      predictable recurring revenue and brand amplification. While small in absolute terms vs.
      corporate offtake, it creates community engagement and policy-relevant proof that millions
      of individuals are willing to pay $1,000/t for permanent CDR—an important data point for
      policy makers considering DAC subsidies.

      The shift toward blended CDR portfolios (SAP deal) expands Climeworks' addressable customer
      universe to mid-market companies who cannot afford pure-DAC pricing. By bundling lower-cost
      removal with DAC, Climeworks can serve 3–5x more corporate buyers at a blended per-tonne
      price of $200–400.

      Customer verdict: Climeworks has demonstrated the ability to win and retain premium
      enterprise customers across diverse verticals, with genuine quality proof from Frontier AMC
      buyers. The main concern is the delivery gap creating latent customer risk, and the need
      to convert forward commitments to post-delivery references before the 2026–2028 renewal
      cycle.
    claimRefs: [CU020, CU028, CU032, CU033, CU034]

tables:
  - id: TU001
    title: "Customer Segmentation Table"
    columns: ["Segment", "Representative Customers", "Approx. Volume (t, est.)", "Primary Motivation", "Risk"]
    enumerationScope:
      coverage: partial
      basis: "Based on publicly disclosed deals; non-disclosed customers estimated to be similar verticals"
    rows:
      - ["Financial services", "Morgan Stanley, Swiss Re, insurance/bank buyers", "40,000+ t publicly disclosed", "SBTi compliance, ESG reporting quality, ECB net-zero", "High quality; long-term; renewal risk if delivery gap persists"]
      - ["Professional services", "BCG, Capgemini, McKinsey (Frontier)", "80,000+ t publicly disclosed", "SBTi net-zero pledges, client leadership positioning", "BCG is anchor account; very high quality; long duration"]
      - ["Technology / Software", "SAP, Microsoft, TikTok, Stripe, Shopify, Alphabet", "37,000+ t disclosed", "High ESG profile, internal net-zero targets, Frontier AMC", "Technically sophisticated; highest scrutiny; strong retention"]
      - ["Aviation", "British Airways, airlines in CORSIA", "Not disclosed", "CORSIA compliance; IATA net-zero target", "Regulatory tailwind; volume could be significant per carrier"]
      - ["Maritime shipping", "MOL (13,400 t), NYK Line", "13,400+ t disclosed", "IMO 2050 net-zero; EU ETS maritime extension", "New vertical; growing compliance pressure; first-mover advantage"]
      - ["Individuals", "18,000+ subscribers globally", "~18,000 t/yr at $1,000/t subscriptions (est.)", "Climate commitment; personal net-zero", "High churn risk; but also sticky with climate-committed users"]
    notes: |
      Volume figures are based on publicly disclosed deals only. Many of the 160+ corporate
      customers have not disclosed deal sizes. Segment-level total contracted tonnes are
      therefore significantly understated.
    claimRefs: [CU001, CU002, CU003, CU005, CU008, CU012]

  - id: TU002
    title: "Customer Growth / Adoption Trajectory Table"
    columns: ["Period", "Key Customer Events", "Channel Driver", "Cumulative Corporate Customers (est.)", "Delivery Status"]
    rows:
      - ["2017–2020", "Hinwil plant (CO2 utilization); early greenhouse/beverage buyers", "Direct local sales; demonstration market", "<20 (CO2 utilization)", "CO2 utilization only; no permanent storage"]
      - ["2021 (Orca launch)", "Orca opens; first permanent CDR buyers (Stripe, Shopify, Microsoft via early pilots)", "Direct enterprise sales; early Frontier discussions", "~20–40", "First CDR deliveries begin; Orca 4,000 t/yr"]
