company:
  name: Climeworks
chapter:
  number: 6
  title: Customers and Traction
  summary: |
    Climeworks has 160+ corporate customers and 18,000+ individual subscribers across 60+
    countries, with a 6 million-tonne contracted backlog. Named customers include BCG (80,000 t
    through 2040), Morgan Stanley (40,000 t through 2037), British Airways, SAP, Mitsui O.S.K.
    Lines, TikTok, Microsoft, Shopify, Stripe, and Swiss Re. Customers span technology, financial
    services, professional services, retail, aviation, and shipping—with Europe, North America,
    and Asia-Pacific all represented. Customer retention in the DAC market is structurally high
    because multi-year forward contracts lock in buyers; however, if Climeworks fails to deliver
    against contracted volumes, renegotiation risk rises. The most adverse customer signal is
    the delivery gap: Mammoth's ~105 tonne output in 10 months vs. 36,000 t/yr nameplate means
    that even long-term committed customers have received a fraction of expected credits, creating
    latent dissatisfaction that could surface as contractual disputes or public reputation damage.

