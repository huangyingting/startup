  claims:
    - id: CU001
      statement: |
        BCG signed a long-term offtake agreement with Climeworks in December 2023 for 80,000
        tonnes of CO2 removal through 2040—one of the largest single corporate CDR deals
        globally. BCG describes the agreement as part of its strategy to "redefine carbon
        removal leadership" and to meet its net-zero commitment under Science Based Targets
        initiative (SBTi). The deal is high-profile customer proof of Climeworks' ability
        to win premium, long-duration enterprise relationships.
      type: third-party-reported
      topic: named customer proof
      confidence: high
      freshness: historical
      sourceRefs: [SU001, SU012]
      answersQuestionRefs: [QU001]

    - id: CU002
      statement: |
        Morgan Stanley signed a multi-year carbon removal agreement with Climeworks in October
        2024 for 40,000 tonnes of CO2 removal through 2037. Morgan Stanley is one of the
        largest financial institutions in the world; the deal is notable as it extends through
        13 years and represents a significant per-tonne commitment from a financial services
        buyer—a sector that is among the most quality-conscious in voluntary carbon markets.
      type: third-party-reported
      topic: named customer proof
      confidence: high
      freshness: current
      sourceRefs: [SU002, SU003]
      answersQuestionRefs: [QU001]

    - id: CU003
      statement: |
        Climeworks' customer base as of 2025 includes 160+ corporate customers and 18,000+
        individual subscribers across 60+ countries. Individual subscribers pay monthly
        subscriptions of approximately CHF 7–50/month and receive quarterly allocation of
        their proportional share of removed CO2. The individual channel is unique among
        DAC companies and provides a recurring revenue base with lower churn than enterprise
        offtake deals.
      type: company-claimed
      topic: customer base size
      confidence: high
      freshness: current
      sourceRefs: [SU004, SU006]
      answersQuestionRefs: [QU002]

    - id: CU004
      statement: |
        Climeworks' earliest large corporate customers (Microsoft, Stripe, Shopify, Swiss Re)
        were part of Frontier Climate's Advance Market Commitment (AMC) launched in 2022.
        Frontier committed USD 925 million over 10 years to carbon removal companies including
        Climeworks. These early adopters provided both revenue proof and brand association that
        enabled Climeworks to attract the next wave of customers (BCG, Morgan Stanley, British
        Airways, SAP) independently of the AMC.
      type: third-party-reported
      topic: customer acquisition
      confidence: high
      freshness: historical
      sourceRefs: [SU005, SU012]
      answersQuestionRefs: [QU003]

    - id: CU005
      statement: |
        Climeworks has secured deals in the maritime sector: Mitsui O.S.K. Lines (MOL) signed
        a carbon removal agreement in Q2 2025 for 13,400 tonnes—described as the first maritime
        CDR deal in the sector. This opens a new vertical for Climeworks: shipping companies
        facing IMO 2050 net-zero targets and the EU Emissions Trading System (EU ETS) extension
        to maritime have a growing demand for verifiable permanent CDR to offset residual Scope 1
        and Scope 3 emissions.
      type: third-party-reported
      topic: named customer proof
      confidence: medium
      freshness: current
      sourceRefs: [SU008]
      answersQuestionRefs: [QU001]

    - id: CU006
      statement: |
        TikTok signed a carbon removal agreement with Climeworks in Q1 2025 for removal of
        over 6,000 tonnes of CO2. This deal illustrates Climeworks' expansion into social media
        and digital consumer companies—a buyer segment with high public ESG visibility. TikTok's
        net-zero commitments are publicly stated; the Climeworks deal provides permanent removal
        credentials for a company under significant sustainability scrutiny.
      type: third-party-reported
      topic: named customer proof
      confidence: medium
      freshness: current
      sourceRefs: [SU004]
      answersQuestionRefs: [QU001]

    - id: CU007
      statement: |
        SAP signed a strategic partnership with Climeworks in 2025 for removal of 37,000 tonnes
        of CO2 by 2034, using a blended portfolio of DAC, biochar, and mineralization. The deal
        includes a co-creation component where Climeworks and SAP develop ERP-integrated carbon
        management tools; Climeworks also adopted SAP's software for its own operations. This
        integrated partnership model deepens the customer relationship beyond pure credit
        purchase and creates product co-development alignment.
      type: third-party-reported
      topic: named customer proof
      confidence: medium
      freshness: current
      sourceRefs: [SU011, SU004]
      answersQuestionRefs: [QU001]

    - id: CU008
      statement: |
        British Airways has signed a carbon removal offtake agreement with Climeworks. The
        aviation sector is under particular pressure to demonstrate credible carbon removal
        credentials due to the difficulty of fully electrifying flight; long-haul airlines
        are among the most motivated buyers of permanent CDR as part of their net-zero
        strategy under CORSIA (Carbon Offsetting and Reduction Scheme for International Aviation).
      type: third-party-reported
      topic: named customer proof
      confidence: medium
      freshness: current
      sourceRefs: [SU007]
      answersQuestionRefs: [QU001]

    - id: CU009
      statement: |
        Climeworks has served Coca-Cola HBC as a customer for CO2 in sparkling beverages
        (food-grade CO2 utilization, not permanent removal). While this is not a carbon removal
        credit, it demonstrates Climeworks' ability to supply industrial-quality CO2 and to
        reach corporate buyers across non-financial verticals. It also broadens the business
        model beyond CDR credits into CO2-as-a-product.
      type: third-party-reported
      topic: named customer proof
      confidence: medium
      freshness: current
      sourceRefs: [SU004]
      answersQuestionRefs: [QU001]

    - id: CU010
      statement: |
        Climeworks' customer retention in the CDR context is structurally high: multi-year
        forward contracts lock buyers in for 5–15 years, and ESG disclosure consistency
        requirements create a soft retention mechanism (changing suppliers requires explaining
        the change to external auditors). However, if Climeworks fails to deliver contracted
        tonnes on schedule, buyers may have contractual rights to renegotiate, reduce commitments,
        or demand refunds—none of which are publicly disclosed.
      type: inferred
      topic: retention
      confidence: medium
      freshness: current
      sourceRefs: [SU010, SU009]
      answersQuestionRefs: [QU004]

    - id: CU011
      statement: |
        The most adverse customer finding: given Mammoth's ~105-tonne actual output in 10
        months vs. 36,000 t/yr nameplate, Climeworks has delivered approximately 0.3% of
        Mammoth's planned annual capacity. Corporate customers who signed contracts expecting
        annual deliveries of hundreds to thousands of tonnes have received a fraction of
        expected credits. While no customer has publicly announced a dispute or contract
        exit, the delivery gap creates latent counterparty risk.
      type: inferred
      topic: adverse delivery evidence
      confidence: high
      freshness: current
      sourceRefs: [SU009, SU010]
      answersQuestionRefs: [QU005]

    - id: CU012
      statement: |
        Climeworks' customer segmentation by vertical (inferred from named customers and
        public announcements) includes: (1) professional services/consulting (BCG, Capgemini);
        (2) financial services (Morgan Stanley, Swiss Re); (3) technology/software (Microsoft,
        SAP, TikTok, Stripe, Shopify); (4) aviation (British Airways); (5) maritime (MOL);
        (6) retail/consumer (Coca-Cola HBC); and (7) individuals (18,000+ subscribers). The
        technology and financial services segments appear to represent the majority of contracted
        volume by value.
      type: inferred
      topic: customer segmentation
      confidence: medium
      freshness: current
      sourceRefs: [SU004, SU006]
      answersQuestionRefs: [QU002]

    - id: CU013
      statement: |
        Climeworks' largest publicly disclosed contracts (BCG 80,000 t, Morgan Stanley 40,000 t,
        SAP 37,000 t, MOL 13,400 t) concentrate significant contracted volume in a small number
        of customers. If BCG and Morgan Stanley represent 120,000 of the 6,000,000 contracted
        tonnes (only 2%), Climeworks is not heavily concentrated. However, if these deals
        represent a larger proportion of near-term deliverable volume (the first 5 years of
        production), concentration risk could be meaningful.
      type: inferred
      topic: concentration risk
      confidence: low
      freshness: current
      sourceRefs: [SU001, SU002]
      answersQuestionRefs: [QU006]

    - id: CU014
      statement: |
        Climeworks' customer acquisition trajectory shows acceleration: from first commercial
        buyers in 2017 (CO2 utilization, Hinwil) to Frontier AMC cohort (2022), to 160+
        customers by 2025. The pace of customer acquisition accelerated post-Orca launch (2021)
        as buyers gained confidence in Climeworks' delivery track record. The Mammoth launch
        (May 2024) was expected to further accelerate adoption—but subsequent underperformance
        may slow new customer acquisition in 2025–2026.
      type: inferred
      topic: adoption trajectory
      confidence: medium
      freshness: current
      sourceRefs: [SU004, SU006]
      answersQuestionRefs: [QU003]

    - id: CU015
      statement: |
        Climeworks' net revenue retention (NRR) in traditional SaaS terms is not applicable
        to the DAC model: the analogy is a forward delivery contract, not a recurring subscription
        license. The key retention metrics in this context are: (1) contract renewal rate
        (do customers renew after initial commitment expires?); (2) tonnage expansion (do
        customers buy more over time?); and (3) no contractual exits. None of these metrics
        are publicly disclosed. Anecdotally, Swiss Re and Partners Group are both investors
        and buyers—suggesting ultra-high retention from investor-aligned buyers.
      type: inferred
      topic: retention metrics
      confidence: low
      freshness: current
      sourceRefs: [SU005, SU006]
      answersQuestionRefs: [QU004]

    - id: CU016
      statement: |
        Climeworks' Frontier Climate Advance Market Commitment buyers (Microsoft, Stripe,
        Shopify, McKinsey, Alphabet) represent the highest-quality customer proof: these are
        among the world's most sophisticated ESG buyers who evaluated Climeworks' technology,
        permanence claims, and MRV rigor before committing. Their continued participation in
        Climeworks' customer base (no known exits) is a strong retention signal.
      type: third-party-reported
      topic: customer quality
      confidence: high
      freshness: current
      sourceRefs: [SU005, SU012]
      answersQuestionRefs: [QU001]

    - id: CU017
      statement: |
        Climeworks' customer geography is primarily European and North American (where SBTi
        commitments and corporate net-zero mandates are most mature) but is expanding to
        Asia-Pacific. The MOL deal (Japanese shipping company) and TikTok (global digital
        company) represent APAC-origin buyers. As Asian corporates face increasing ESG reporting
        requirements (Japan's Green Transformation; Singapore MAS net-zero guidelines; China's
        ESG disclosure mandates), the APAC CDR buyer market is expected to grow.
      type: inferred
      topic: geographic expansion
      confidence: medium
      freshness: current
      sourceRefs: [SU008, SU004]
      answersQuestionRefs: [QU002]

    - id: CU018
      statement: |
        Climeworks' most defensible customer relationships are those where the buyer is also
        an investor or strategic partner: Swiss Re (investor + buyer + insurance partner),
        Partners Group (investor + buyer signal), Microsoft (Frontier AMC + active buyer).
        These multi-dimensional relationships create retention through strategic alignment
        rather than just price or volume, and are unlikely to exit without significant adverse
        events affecting the fundamental partnership.
      type: inferred
      topic: strategic customer depth
      confidence: medium
      freshness: current
      sourceRefs: [SU005, SU012]
      answersQuestionRefs: [QU004]

    - id: CU019
      statement: |
        The Capgemini, NYK Line, and Two Drifters Distillery deals (all 2025) indicate that
        Climeworks is broadening across consulting, shipping, and spirits/consumer goods. These
        smaller deals demonstrate sales pipeline depth and Climeworks' ability to close across
        diverse verticals, though the per-deal volume is likely small (individual agreements
        likely under 5,000 tonnes each). Volume-wise, they are not transformational but broaden
        the proof point set.
      type: third-party-reported
      topic: customer proof breadth
      confidence: medium
      freshness: current
      sourceRefs: [SU004]
      answersQuestionRefs: [QU001]

    - id: CU020
      statement: |
        Climeworks' individual subscriber channel (18,000+ subscribers) is differentiated from
        all DAC competitors. The average subscriber lifetime value is significant: if a typical
        subscriber pays CHF 20/month for 2 years, that's CHF 480 ($530) per subscriber, giving
        an estimated LTV pool of approximately USD 9.5M for the entire 18,000-subscriber base.
        While small in absolute terms, this channel provides steady cash flow, brand ambassadorship,
        and an indicator of mass-market climate sentiment.
      type: inferred
      topic: individual subscriber value
      confidence: low
      freshness: current
      sourceRefs: [SU006]
      answersQuestionRefs: [QU007]

    - id: CU021
      statement: |
        The contractual structure of Climeworks' corporate deals is not fully public. Based on
        public statements, BCG's 80,000 t "through 2040" and Morgan Stanley's 40,000 t "through
        2037" suggest annual delivery obligations of approximately 5,000 t/yr and 3,000 t/yr
        respectively—far above Mammoth's 2024–2025 actual delivery rate. Whether these contracts
        include delivery guarantees, force majeure provisions, or performance penalty clauses
        is unknown and represents a material diligence gap.
      type: inferred
      topic: contract structure risk
      confidence: low
      freshness: current
      sourceRefs: [SU001, SU002]
      answersQuestionRefs: [QU005]

    - id: CU022
      statement: |
        Climeworks' customer acquisition model relies on: (1) direct B2B enterprise sales
        (large corporate deals like BCG, Morgan Stanley); (2) marketplace distribution
        (Carbonfuture, Frontier AMC); and (3) word-of-mouth and press coverage that drives
        inbound enterprise interest. The company does not appear to have a significant
        self-serve enterprise signup flow; most deals likely require active sales engagement
        with 6–18 month deal cycles.
      type: inferred
      topic: customer acquisition model
      confidence: medium
      freshness: current
      sourceRefs: [SU006, SU012]
      answersQuestionRefs: [QU003]

    - id: CU023
      statement: |
        Climeworks' corporate customer proof covers a wide range of company sizes: Fortune 500
        (BCG, Morgan Stanley, SAP, Microsoft, British Airways) and mid-size enterprises (Two
        Drifters Distillery, smaller tech companies). The breadth of customer sizes suggests
        that permanent DAC credits at USD 400–600/tonne are accessible to buyers beyond the
        mega-corporation tier, particularly in the technology sector where CDR budgets are
        embedded in sustainability programs.
      type: inferred
      topic: customer size range
      confidence: medium
      freshness: current
      sourceRefs: [SU004, SU006]
      answersQuestionRefs: [QU002]

    - id: CU024
      statement: |
        Customer expansion within existing relationships (land-and-expand) is a key growth
        hypothesis for Climeworks: once a company has reported Climeworks credits in its CDP
        disclosure and built the internal reporting workflow, the barrier to expanding purchase
        volume in the next contract cycle is low. BCG's 80,000-tonne deal (a likely expansion
        from an earlier smaller purchase) and SAP's multi-method partnership are both consistent
        with a land-and-expand trajectory in existing relationships.
      type: inferred
      topic: land-and-expand
      confidence: medium
      freshness: current
      sourceRefs: [SU001, SU007]
      answersQuestionRefs: [QU006]

    - id: CU025
      statement: |
        Climeworks' customer concentration risk is moderate: the 6 million contracted tonnes
        figure suggests a diverse portfolio, but the actual deliverable volume in the near term
        (2025–2027) is limited by Mammoth's performance and Gen3 timeline. This creates a
        mismatch: buyers have signed large long-term deals, but Climeworks can only deliver
        a tiny fraction in the near term. If buyers have performance-contingent commitment
        structures, the 6M tonne backlog may be worth less than face value as a commercial
        indicator.
      type: inferred
      topic: concentration and delivery risk
      confidence: medium
      freshness: current
      sourceRefs: [SU009, SU010]
      answersQuestionRefs: [QU006]

    - id: CU026
      statement: |
        Swiss Re's role as Climeworks customer, investor, and insurance partner represents
        the most deeply integrated customer relationship in the portfolio. Swiss Re's insurance
        product backing Climeworks CDR credits provides a trust mechanism that enables other
        financial institutions (who would typically require full certainty before purchase) to
        commit. This creates a network effect: Swiss Re's validation attracts other financial
        services buyers (Morgan Stanley, insurers, banks) who trust Swiss Re's CDR assessment.
      type: inferred
      topic: strategic customer network effects
      confidence: medium
      freshness: current
      sourceRefs: [SU005, SU012]
      answersQuestionRefs: [QU004]

    - id: CU027
      statement: |
        The most adverse customer signal not yet surfaced publicly: given Climeworks' Mammoth
        delivery gap, sophisticated corporate buyers with annual ESG reporting cycles (fiscal
        year end) may find that they cannot report the expected tonnes in their 2024 or 2025
        CDP filings. While individual contracts contain force majeure or delay provisions
        (typical for infrastructure contracts), repeated multi-year delivery shortfalls could
        trigger buyer frustration that surfaces in the next renewal cycle.
      type: inferred
      topic: adverse customer risk
      confidence: medium
      freshness: current
      sourceRefs: [SU009, SU010]
      answersQuestionRefs: [QU005]

    - id: CU028
      statement: |
        Climeworks operates a buyer verification and reporting dashboard accessible to
        corporate customers, enabling them to track their CDR delivery progress and export
        data for ESG reporting. This tool is described in Climeworks' corporate-facing
        marketing but is not publicly accessible. The existence of this platform indicates
        a product-led retention mechanism that creates operational stickiness beyond the
        contract itself.
      type: company-claimed
      topic: customer success tools
      confidence: low
      freshness: current
      sourceRefs: [SU006]
      answersQuestionRefs: [QU007]

    - id: CU029
      statement: |
        The Frontier Climate Advance Market Commitment (Stripe, Shopify, Alphabet/Google,
        McKinsey, Meta) committed USD 925M to CDR companies including Climeworks. Frontier's
        buyers represent the "most sophisticated" early adopter tier: they used technical
        advisory panels to evaluate CDR suppliers on permanence, additionality, and MRV
        rigor. Climeworks' inclusion validates its product quality at the highest-scrutiny
        level in the CDR market.
      type: third-party-reported
      topic: customer quality indicator
      confidence: high
      freshness: historical
      sourceRefs: [SU005, SU013]
      answersQuestionRefs: [QU001]

    - id: CU030
      statement: |
        Climeworks' customer churn signals are largely absent from public information: no
        corporate customer has announced an exit from a Climeworks contract. This absence
        of churn evidence is consistent with the market (the first multi-year DAC contracts
        are only 3–5 years old; many have not yet reached renewal points) and with the
        structural retention mechanism of forward delivery contracts. The true test of
        customer retention will come at the 2026–2028 renewal cycles.
      type: inferred
      topic: churn evidence
      confidence: low
      freshness: current
      sourceRefs: [SU006, SU012]
      answersQuestionRefs: [QU004]

    - id: CU031
      statement: |
        Climeworks' customer proof set is primarily pre-delivery: most customers have signed
        forward purchase agreements but received little actual CDR to date. This distinguishes
        Climeworks' "proof" from truly post-delivery customer references. The strongest
        post-delivery proof is Orca's 1,081 tonnes delivered to Frontier AMC buyers (2021–2024),
        which is genuine completed delivery. Mammoth's ~105 tonnes represents minimal additional
        proof. This means most of Climeworks' "160+ customer" figure is forward commitment,
        not delivered outcome.
      type: inferred
      topic: customer proof quality
      confidence: high
      freshness: current
      sourceRefs: [SU009, SU013]
      answersQuestionRefs: [QU001]

    - id: CU032
      statement: |
        Two sectors with growing demand for Climeworks' CDR credentials are finance and
        aviation: financial institutions face increasing pressure from regulators (ECB, Fed,
        Bank of England) to demonstrate net-zero transition plans, and DAC provides a
        credible offset for residual emissions. Airlines face CORSIA and EU ETS requirements
        that create demand for high-quality removal credits. Both sectors are represented in
        Climeworks' current customer base (Morgan Stanley, British Airways).
      type: inferred
      topic: sector expansion potential
      confidence: medium
      freshness: current
      sourceRefs: [SU003, SU007]
      answersQuestionRefs: [QU008]

    - id: CU033
      statement: |
        Climeworks' customer survey and satisfaction data are not publicly available. The only
        proxy for customer satisfaction is contract renewal behavior (no public exits) and
        public statements from named customers (BCG, Morgan Stanley, Swiss Re, SAP have all
        made positive public statements about their Climeworks partnerships). No negative
        public customer statements have been identified, though this may reflect non-disclosure
        agreements rather than genuine satisfaction.
      type: inferred
      topic: customer satisfaction evidence
      confidence: low
      freshness: current
      sourceRefs: [SU001, SU002]
      answersQuestionRefs: [QU004]

    - id: CU034
      statement: |
        The shift toward blended CDR portfolios (DAC + biochar + nature-based) in deals like
        SAP enables Climeworks to serve a broader customer base: buyers who cannot afford
        pure-DAC pricing (~$400–600/t) but want some DAC in their portfolio can access
        blended deals at lower average cost. This strategy expands the addressable customer
        base beyond the premium-only tier and could add hundreds of mid-market corporate
        buyers to Climeworks' pipeline.
      type: inferred
      topic: customer expansion strategy
      confidence: medium
      freshness: current
      sourceRefs: [SU011, SU004]
      answersQuestionRefs: [QU006]

    - id: CU035
      statement: |
        Climeworks' NYK Line deal (2025) and MOL deal (2025) represent two Japanese shipping
        companies committing to CDR—a signal that the maritime sector is beginning to treat
        DAC credits as compliance-relevant for IMO 2050 targets. The first-mover advantage
        in maritime shipping as a customer vertical is significant: as IMO regulations tighten,
        Climeworks' existing maritime relationships give it a reference that competitors
        without shipping industry experience cannot immediately match.
      type: third-party-reported
      topic: vertical expansion proof
      confidence: medium
      freshness: current
      sourceRefs: [SU008, SU004]
      answersQuestionRefs: [QU001]

