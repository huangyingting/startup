      - number: '7.4'
        title: 缓释措施、监测指标与投资逻辑失效触发点
        blocks:
          - type: paragraph
            body: >
              Climeworks 的主要风险缓释包括：（1）Gen3 技术，这是逃离 Gen2 成本和可靠性约束的路径；（2）2025 年 1 月 $162M 融资，把现金跑道延长到关键的 Gen3 验证期；（3）Swiss
              Re 的保险背书，维持客户对 CDR 交付质量的信心；（4）地域和客户多元化（Gen3 站点在 5+ 个国家；160+ 客户覆盖 7 个垂直领域）。这些缓释真实存在，但不足以抵御 Mammoth 失败和
              Project Cypress 资金被撤同时发生的最坏情景。


              投资者要盯的关键监测指标：（1）Mammoth 活跃容器数量（目标：到 2025 年底 72/72）；（2）Project Cypress DOE 资金状态（关注官方暂停 /
              取消通知）；（3）Climeworks 下一轮融资（条款和估值会显示投资人是否相信 Gen3 故事）；（4）Gen3 商业工厂动工日期；（5）裁员后技术员工自愿离职率；（6）任何关于合同修改的公开客户沟通。


              投资逻辑失效触发点：最重要的一条，是 Mammoth 容器数量到 2025 年 Q4 仍没有实质改善——这意味着 Gen2 架构可能存在结构缺陷，Gen3 必须避开这一缺陷，并付出延迟代价。第二条是
              Project Cypress 失去 DOE 资金，且 6 个月内没有宣布替代资本。第三条是某个客户公开减少或退出承诺，说明“你买单，我们就建设”的社会契约已经破裂。
            claimRefs:
              - CR030
              - CR031
              - CR032
  - number: 8
    title: 估值
    sections:
      - number: '8.1'
        title: 估值背景、隐含定价与可比交易
        blocks:
          - type: paragraph
            body: >
              根据行业媒体把 2022 年 4 月 Series C（$650M）描述为“独角兽”级融资，Climeworks 该轮隐含投后估值估计为 $1–2B。2025 年 1 月 $162M 融资规模明显更小（轮次规模小
              75%），且没有披露新估值；考虑到 Mammoth 表现不及预期，这一小规模融资可能意味着（a）有意提高资本效率，或（b）机构兴趣下降——两者都与估值持平或估值下调轮定价相符。


              公开可得的最佳 M&A 可比交易，是 Occidental 于 2023 年 8 月以 $1.1B 收购 Carbon Engineering。后者是一家商业化前 DAC
              技术公司，没有已交付吨数，只有试点规模验证。Climeworks 拥有 4 年商业交付记录（Orca）、更大的客户订单簿和已验证的 Gen3 技术；在一个充分运转的 M&A 市场中，理论上应较 Carbon
              Engineering 收购价获得溢价。不过，Mammoth 失败带来了显著折价风险。


              目前没有纯 DAC 上市公司，市场倍数比较很难。深科技气候基础设施公司在乐观情景下按 5–15× 预期收入（不是当前收入）交易；按 Climeworks 当前约 ~$2M 已交付收入运行率，10× 倍数只意味着
              $20M 企业价值——这说明估值完全取决于期权价值，而不是当前指标。Heirloom Carbon（2022 年 $50M 融资隐含 $200–300M）和
              Sustaera（未披露种子轮）是更小的可比公司，运营记录弱于 Climeworks，也强化了 Climeworks 的溢价定位。
            claimRefs:
