      - number: '5.3'
        title: 运营成熟度、负面技术发现和部署路线图
        blocks:
          - type: paragraph
            body: >
              Climeworks 的运营成熟度呈分裂状态：Gen2（Orca）为 TRL 9，已有 3+ 年连续商业运营；Mammoth（同为 Gen2）为 TRL 8，但运营受损（72 个集装箱中 12 个活跃）。Gen3
              为 TRL 6–7（全尺寸原型已测试，但尚未商业部署）。


              最负面的技术发现是 Mammoth 的集装箱失效率：如果 72 个模块化单元中有 60 个，连在冰岛受控环境且已有 Orca 3+ 年运营学习的条件下都无法运行，那么这对 Gen3 立方体在 Louisiana
              部署意味着什么（能源来源不同、气候不同、地质不同）？这个问题没有公开答案，也构成本次尽调中严重程度最高的单一技术风险。


              Gen3 Louisiana 工厂（Project Cypress）计划于 2026 年开工，并将成为首个商业 Gen3 部署——这是检验 Basel 验证能否转化为商业可靠性的重大示范。Norway、Kenya
              和 Canada 的其他场址处于更早阶段，每个都需要适配当地能源和封存条件。Orca 继续作为稳态 Gen2 参考设施运行。


              Climeworks 与 Avantium 的合作（2025 年 Q1）用于高通量吸附剂材料筛选，加速 Gen3 之后下一代候选材料，缩短 R&D 周期。公司的 IP 组合（专利 EP3034149B1
              等）覆盖关键吸附剂配方和流程配置，形成 5–10 年复制壁垒。
