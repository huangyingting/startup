chapters:
  - number: 1
    title: 公司概况
    sections:
      - number: '1.1'
        title: 创立、历史和公司结构
        blocks:
          - type: paragraph
            body: >
              Climeworks AG 由机械工程师 Christoph Gebald 和 Jan Wurzbacher 于 2009 年创立，两人在 ETH Zurich
              攻读博士期间相识。他们关于直接空气捕集技术的博士研究——直接从大气中提取 CO2——构成了公司的科学基础。Climeworks 从 ETH Zurich
              分拆成为大学创业公司，这一少见身份给了它学术可信度和早期机构支持。


              2011 年，公司获得首笔外部资本，用于开发模块化原型。到 2014 年，Climeworks 做出了可运行的模块化 CO2 捕集器，证明技术已从实验台走向商业规模工程。公司首座商业工厂于 2017 年 5
              月在瑞士 Hinwil 投运，位于一座垃圾焚烧设施屋顶，使用 18 个捕集器集装箱，总产能约 900 tonnes CO2/年。捕集的 CO2 出售给附近温室运营商，并供 Coca-Cola HBC 用于
              Valser 气泡水。2017 年 10 月，Climeworks 在冰岛启动 CarbFix2 示范项目，与合作伙伴 Carbfix 探索 CO2 地下矿化。这次关键实验塑造了 Climeworks
              后来的方向：从 CO2 利用转向永久地下封存。Climeworks 随后完全转向封存优先模式，Hinwil 设施于 2022 年 10 月关闭。


              公司总部位于瑞士苏黎世，并在德国科隆设有子公司。董事会成员包括联合创始人 Dr. Gebald 和 Mr. Wurzbacher（联席 CEO）、Alfred Gantner（Partners Group
              联合创始人）、Dr. Ulf Berg、Dr. Martin Burkhardt、Syrie Crouch 和 Dr. Maurits van Tol。截至 2025 年初，Climeworks 在 2025 年
              5 月裁员 106 人（22%）后约有 377 名员工。
