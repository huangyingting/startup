      - number: '7.2'
        title: 监管、法律与政治风险
        blocks:
          - type: paragraph
            body: >
              Climeworks 面对的多司法辖区监管风险，比几乎任何其他气候科技公司都复杂。在美国：Project Cypress（Louisiana）需要 DOE 酌情批准、EPA UIC Class VI 许可（历史上
              2–5 年）和 Louisiana DEQ 环境许可。Trump 政府审查清洁能源项目之下，Project Cypress 最高 $500M+ 的 DOE 资金面临暂停、缩减或取消风险。这是 Climeworks
              在美国最主要的规模化载体；如果失去 DOE 支持，公司必须用私人资本替换政府资本，条件会明显更差。


              在欧盟：Carbon Removals Certification Framework（CRCF）已于 2024 年生效，但仍在通过授权法案最终确定。Climeworks 必须确保自己的 MRV
              方法（Puro.earth/CORC 认证）符合 CRCF 对永久性、额外性和监测的要求。如果 CRCF 授权法案引入 Climeworks 当前方法无法满足的要求（例如 1,000 年储存永久性而非 100
              年，或更严格的额外性测试），Climeworks 就需要更新认证方法，并可能重新认证已交付信用。


              《巴黎协定》第 6.4 条给国际 CDR 信用交易增加了复杂性：对应调整（Corresponding Adjustments）要求可能限制 Climeworks 信用可被计入的市场。冰岛扩大 CO2
              注入量的环境许可，形成监管依赖，可能拖慢 Mammoth 满负荷修复。IP 风险真实但偏长期：核心专利 EP3034149B1 约 2034 年到期；Gen3
              结构化吸附剂在不同专利版图辖区（US、EU、Japan）的实施自由，需要持续 IP 监控。
