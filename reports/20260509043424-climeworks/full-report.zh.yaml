      - number: '6.2'
        title: 具名客户验证、交易质量与垂直扩张
        blocks:
          - type: paragraph
            body: >
              Climeworks 已公开披露的重大客户关系，证明了客户广度和质量。BCG（到 2040 年 80,000 t）和 Morgan Stanley（到 2037 年 40,000
              t）是锚定账户：一家全球专业服务公司和一家全球金融服务公司，都有成熟 ESG 团队，愿意以最高每吨价格锁定可获得的最长合约期。这些交易说明，Climeworks 的产品质量经得起拥有专职碳市场专家买家的审查。


              SAP 合作（到 2034 年 37,000 t，混合组合 + ERP 集成）是另一类交易结构：它把碳移除和产品共研捆在一起，在信用交付之外形成合作护城河。MOL 海运交易（13,400
              t，2025）打开了航运垂直领域——这一行业正承受越来越大的 IMO 2050 合规压力。British Airways 的合作把 Climeworks 放进航空场景（CORSIA 合规压力）。TikTok 的
              6,000+ t 交易说明，数字消费公司也有需求。


              Frontier Climate 队列（Stripe、Shopify、Alphabet/Google、McKinsey、Meta）是质量最高的早期证明：Frontier 的技术顾问小组按永久性、额外性和 MRV
              严谨性评估 DAC 供应商，Climeworks 通过了审查。没有 Frontier 买家公开退出。Orca 已向 Frontier 关联买家交付约 ~1,081 吨经验证的
              CDR（2021–2024），构成真实的交付后证明。


              但 Mammoth 客户的验证质量更弱：10 个月交付约 ~105 t，而铭牌产能为 36,000 t/yr，意味着 Climeworks 所称的“160+ 个客户”大多还是交付前承诺。这使 Climeworks
              的商业验证不同于真正经过客户结果验证的交付。
