      - number: '1.3'
        title: 运营工厂和表现
        blocks:
          - type: paragraph
            body: >
              Climeworks 的运营历史围绕冰岛两座大型工厂展开，两者都毗邻 Hellisheiði 地热电站，由后者向 DAC 流程提供可再生能源。


              Orca 工厂（名称来自冰岛语“能量”）于 2021 年 9 月投运，铭牌产能为每年 4,000 tonnes CO2。尽管这是一个标志性里程碑——全球首座大型商业 DAC 和永久封存设施——Orca
              从未在任何自然年捕集超过 1,000 tonnes。2024 年，Orca 约 65% 的时间处于运行状态，停机原因是为其供能的地热电站计划检修。联席 CEO 将 4,000 tonnes
              这个数字比作“汽车最高时速：可能达到的上限”。Climeworks 已决定不再对 Orca 大幅追加投资，因为这代捕集技术已被视为过时。


              Mammoth 于 2024 年 5 月启用，设计为十倍放大，年铭牌产能 36,000 tonnes。然而，在最初约 10 个月运行中，Mammoth 仅捕集 ~105 tonnes CO2——不到设计产能的
              1%。根因是 2023 年在 Orca 原型测试中发现的滤芯性能问题。Climeworks 没有无限期等待修复，而是采用 COO 所称的“创可贴”方案并继续建设；同样的滤芯问题随后在规模化时再次暴露。截至
              2025 年初，该工厂规划的 72 个捕集器集装箱中只有 12 个完全投运。Climeworks 表示，Mammoth 预计会进入三年爬坡期，全面运行产能要到 2020 年代后期才有望实现。


              这些表现不及预期的问题引发了大量负面媒体报道，包括冰岛媒体 Heimildin 和 Bloomberg 的报道；报道指出，Climeworks
              工厂实际捕集量只是其标称产能的一小部分，并且尚未抵消自身运营和建设产生的 CO2 排放。
