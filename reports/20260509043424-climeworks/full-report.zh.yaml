      - number: '8.2'
        title: 乐观 / 基准 / 悲观情景与投资逻辑
        blocks:
          - type: paragraph
            body: >
              Climeworks 的估值高度依赖情景，结果分布很宽：


              **乐观情景（20% 概率，公允价值 $2–5B）：** Mammoth 到 2025 年 Q4 启用 >50/72 个容器，Gen3 商业工厂 2026 年动工，Project Cypress 获得 DOE
              资金确认，Series D 以 $2B+ 投后估值融资 >$500M。收入到 2028 年达到 $30M+（部分 Gen3 交付），到 2031–2032 年达到 $300M+。按 2032 年收入
              5–8×，2028 年公允价值 = $1.5–2.4B，2032 年为 $6–12B；以 30% 折现到今天，为 $2–5B。关键 45Q 税收抵免（每座 36,000 t/yr 工厂
              $6.5M/yr）提供有意义的非稀释性现金。


              **基准情景（50% 概率，公允价值 $800M–$1.5B）：** Mammoth 启用 30–50/72 个容器，Gen3 在 2028–2029 年启动，Project Cypress
              延期。签约积压（票面价值 $2.4B，60% 交付折扣 = $960M PV）加上 IP 期权价值（按 Carbon Engineering 可比为 $500–800M），得到 $1.4–1.8B 的
              SOTP；但考虑稀释和现金跑道缺口后，公允价值为 $800M–$1.5B。


              **悲观情景（30% 概率，公允价值 $200–500M）：** Mammoth 无法修复，Cypress 取消，2026 年出现估值下调轮。困境资产价值（IP + 合同 + 团队）驱动回收；现有 Series
              C 投资人面临 75–80% 减值。石油巨头以困境价格（$200–500M）收购，是主要回收情景。


              投资逻辑是：Climeworks 持有一个围绕 DAC 市场的独特高价值期权，竞争对手无法用少于数亿美元投资和 5+ 年运营学习复制。即便在悲观情景下，其技术和客户基础对收购方仍保有显著战略价值。
