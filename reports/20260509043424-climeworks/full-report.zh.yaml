      - number: '7.3'
        title: 财务、伙伴与执行风险
        blocks:
          - type: paragraph
            body: >
              Climeworks 的财务风险集中在当前现金跑道与 Gen3 商业部署需求之间的资本强度缺口。2025 年 1 月 $162M 融资，在 $80–150M/yr 烧钱速度下提供 12–24
              个月现金跑道；Gen3 商业工厂每座需要 $300–500M，意味着到 2030 年达到 1 Mt/yr 需要总计 $8–14B
              CapEx。如果没有项目融资结构（绿色债券、开发银行债务、税收抵免），单靠股权无法满足这一资本需求。融资失败或估值下调轮会严重限制 Gen3 部署。


              伙伴风险集中且不易替代：Carbfix 是冰岛运营唯一的 CO2 储存伙伴——任何 Carbfix 中断都会让全部 CDR 交付停摆。Swiss Re 的三重角色（投资人、客户、保险方）制造了联动集中风险：如果
              Swiss Re 因气候相关巨灾赔付导致财务状况恶化，其为 CDR 交付保险兜底的能力，可能恰好在 DAC 需求理论上最高时受损。Avantium 在吸附剂筛选中的角色带来较小的 R&D 依赖。


              Partners Group 和 GIC 的投资人集中度带来一种风险：任何一方改变清洁能源配置策略，都可能让 Climeworks 在下一轮融资时失去已承诺的领投方。旗舰工厂表现不佳时发生 22%
              裁员，会释放一个信号，让吸引新机构投资者变得更难。关键人执行风险上升：联合创始人 Christoph Gebald 和 Jan Wurzbacher
              正在同时应对工厂故障、裁员和政治逆风，并把公司维系在一起；任何一位联合创始人离开，破坏性都会格外大。公司没有公开披露继任计划。
