  - number: 5
    title: 产品与技术
    sections:
      - number: '5.1'
        title: 产品定义和客户工作流
        blocks:
          - type: paragraph
            body: >
              Climeworks 的主要产品是碳移除证书（CORC），代表从大气中永久移除并地下封存数千年的一公吨 CO2。面向客户的工作流是：（1）签署远期采购协议；（2）Climeworks
              用固体吸附剂系统从环境空气中捕集 CO2；（3）Carbfix 将 CO2 注入冰岛玄武岩，在 1–2 年内矿化；（4）Puro.earth 独立核验每一吨并签发 CORC；（5）客户获得可用于 CDP
              提交、SBTi 合规报告和 GHG Protocol Scope 3 核算的 CORCs。


              产品有四个关键质量维度：（1）永久性——玄武岩矿化把 CO2 锁定数千到数百万年，并由地球化学示踪剂核验；（2）可衡量性——连续工厂传感器数据和地质注入记录支持按吨核算；（3）额外性——每个 CORC 代表净新增
              CO2 移除，而不是避免排放或现有碳汇封存；（4）可持续性——系统在冰岛使用近零碳地热能源运行。


              Climeworks 已将产品扩展为混合 CDR 组合（DAC + 生物炭 + 增强风化），让企业买方以更低混合成本获得更大移除量，同时在组合中保留 DAC 以维持质量可信度。与 Mitsui O.S.K.
              Lines 的海运交易（13,400 tonnes，2025 年）证明该产品可用于新行业垂直领域的脱碳策略。
