      - number: '3.3'
        title: 竞争定位、护城河和耐久性风险
        blocks:
          - type: paragraph
            body: >
              Climeworks 的竞争护城河分为四类：（1）品牌和先发优势：它是永久 CDR 的既定先驱，拥有 15+ 年 DAC
              运营经验；（2）欧洲市场准入：德国、瑞士和欧盟阵营企业买家因欧洲来源、监管熟悉度和既有关系，强烈偏好 Climeworks；（3）技术管线：Gen3 代表一条已经验证（但尚未部署）的 50%
              成本下降路径；（4）客户关系：BCG、Morgan Stanley、British Airways 和 160+ 家企业客户带来关系型护城河，切换成本来自 ESG 披露一致性。


              主要耐久性风险是，如果 1PointFive 的 Stratos 实现规模化运营，将削弱 Climeworks “最大 DAC
              运营商”的叙事，并可能以美国本土替代方案吸引美国企业买家，且交付量更高。Stratos 的 500,000 t/yr 相当于单座美国工厂交付 ~14× Mammoth 铭牌产能，对寻求经核验、大体量 DAC
              信用的大型美国企业买家来说，会成为显而易见的选择。


              多供应商采购风险中等：BCG、Morgan Stanley 和类似买家很可能同时在多个 CDR 供应商之间分散配置。这会限制锁定效应，也意味着 Climeworks
              即便面对最大客户，也没有排他关系。其冰岛封存合作伙伴 Carbfix 提供了一定地理排他性，但并非合同上的独家关系。


              三个最关键的护城河耐久性风险是：（1）1PointFive 在 Climeworks 的 Gen3 商业化运营前先交付规模化体量；（2）Heirloom 在 Climeworks 达成 Gen3
              成本目标前，以低于 USD 200/tonne 实现成本平价；（3）Mammoth 表现不及预期侵蚀交付可信度，直到大型企业买家暂停新承诺，或要求 Climeworks 当前无法提供的履约保证。
