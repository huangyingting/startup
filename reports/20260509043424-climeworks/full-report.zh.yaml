      - number: '4.3'
        title: 单位经济、资本强度和盈利路径
        blocks:
          - type: paragraph
            body: >
              相比收入定价，Climeworks 当前成本结构极不有利：成本约 USD 1,000/tonne，而企业价格为 USD
              400–600/tonne，公司大多数销售按每吨计算都是负毛利——本质上是在用资本购买交付经验和客户关系，而不是创造利润。个人订阅价格（~USD 1,000/tonne）是当前成本下唯一可能接近毛利为零的渠道。


              Gen3 成本下降路线图到 2030 年目标为 USD 250–350/tonne，靠三根杠杆：（1）每模块吞吐量 2×；（2）每吨能耗下降 50%；（3）滤芯寿命 3×（降低材料成本摊销）。如果达成，企业价格
              USD 400–600/tonne 将产生 14–58% 毛利率——在 ~1 million tonnes/year 规模下，足以开始覆盖运营成本。但达到 1 million t/yr 需要估计 USD
              500M–2B 额外工厂投资，依据是 Mammoth 隐含成本结构（36,000 t/yr 产能需要 USD 200–400M）。


              DAC 的资本强度显著高于太阳能或风电（可再生能源每 MW 为 USD 0.5–2M，而 Climeworks 当前工厂估计每吨年产能需要 USD 5,000–11,000）。这意味着即使在乐观假设下，盈利也是
              2030+ 的结果；路径需要大规模追加股权或项目融资部署。2025 年 5 月 22% 的裁员会边际降低烧钱速度（估计每年节省 USD 12–15M 薪酬），但不改变基本资本强度方程。
