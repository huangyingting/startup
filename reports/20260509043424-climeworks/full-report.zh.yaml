      - number: '8.3'
        title: 入场纪律、退出准备度与建议
        blocks:
          - type: paragraph
            body: >
              对 Climeworks 的建议是有条件观察。理由是：按当前隐含估值（$1–2B），考虑 Mammoth 修复问题的二元性，新投资人的风险调整后回报并不具吸引力。若较隐含 Series C 定价打 30%
              折扣（$700M–$1.4B 入场），乐观情景可提供 3–4× 回报，且下行可接受。新投资人应等到 2025 年 Q4 Mammoth 运营数据后，再考虑以任何高于 $700M 投后估值的价格出手。


              对现有投资人（Series C 及之前）：持有。今天退出的成本（在缺乏流动性情况下，被迫以困境价格做老股交易）比继续持有并观察 Mammoth 修复更差。2025 年 1 月融资带来的现金跑道延伸到
              2026–2027 年初，给核心投资逻辑验证点（Mammoth 容器数量）留出了时间。


              退出准备度低：公司仍处收入前阶段，未来 3–5 年没有 IPO 路径。战略 M&A（石油巨头、工业公司）在基准情景下可能发生在 $800M–$2B，悲观情景下为
              $200–500M。老股交易是现有投资人近期唯一流动性路径。任何新投资决策前，五个最终尽调问题（Mammoth 根因、Cypress 备用方案、股权结构表、客户留存、Gen3 CapEx 融资）都必须回答。
