      - number: '1.2'
        title: 融资、估值和投资者基础
        blocks:
          - type: paragraph
            body: >
              Climeworks 自创立以来累计股权融资超过 USD 1 billion，是全球融资最多的纯碳移除公司。公司的融资轨迹也映射出气候科技投资版图走向成熟。


              标志性融资是 2022 年 4 月的 Series C，金额 CHF 600 million（约 USD 650 million），由 Partners Group 和新加坡主权财富基金 GIC
              共同领投。其他投资方包括 Baillie Gifford、Carbon Removal Partners、Global Founders Capital、M&G Investments 和 Swiss
              Re。这轮融资使 Climeworks 进入独角兽行列（估值超过 USD 1 billion），在碳移除领域并不常见。资金被指定用于把 DAC 产能扩到百万吨级，并建设 Climeworks 在冰岛的第二座工厂
              Mammoth。


              2025 年，Climeworks 又获得 USD 162 million——当年全球单笔最大的碳移除投资——再次由 BigPoint Holding 和 Partners Group
              领投，现有投资者参与。本轮融资使累计融资超过 USD 1 billion；公司称，资金对推进 Generation 3 技术、扩大碳移除组合、降低单位吨成本至关重要。尽管资本注入，公司也在 2025 年 5
              月同时宣布大幅裁员，说明这轮融资更像是把现金跑道延长到盈利，而不是加速扩员。


              联席 CEO Jan Wurzbacher 曾公开表示，公司会继续寻求收购那些无法拿到下一轮融资的小型 DAC 初创公司，显示其在更广泛 DAC 领域采取机会型整合策略。
