      - number: '2.2'
        title: 市场规模：从 TAM、SAM、SOM 多重视角看
        blocks:
          - type: paragraph
            body: >
              相比行业野心，今天的 DAC 市场仍然很小。Grand View Research 估计，2024 年全球 DAC 市场为 USD 97.56 million，并预计以 61.15%
              的复合年增长率（CAGR）增长，到 2030 年达到 USD 1.699 billion。MarketsandMarkets 的估计几乎相同：到 2030 年为 USD 1.727 billion，CAGR 为
              60.9%。这些分析师预测捕捉了投资流和规划产能扩张，但基础是已宣布项目，而这些项目面临显著执行风险。


              IEA 给出了更冷静的视角。截至 2024 年，全球全部 27 座在运 DAC 工厂每年捕集量不到 0.01 Mt CO2，远低于与 2050 年净零（NZE）情景对齐所需的 80 Mt CO2/year。如果
              130+ 个规划 DAC 项目到 2030 年全部按满铭牌产能推进，全球 DAC 总产出也只有 ~3 Mt CO2/yr——不到气候目标的 4%。这一执行缺口是评估 DAC 市场近期现实的最重要事实。


              从买方需求看，CDR.fyi 追踪到截至 2026 年，所有耐久 CDR 供应商累计交付 1.36 million tonnes，承诺市场总价值为 USD 12 billion，隐含平均有效价格约 USD
              8,800/tonne。这个混合费率被早期高价采购推高，随着规模增长会下降。Frontier AMC 到 2030 年的 USD 1 billion 承诺，为近期已承诺需求提供了一个锚点。Climeworks 的
              380,000+ tonnes 签约管线在这个新生市场中占有有意义的份额，但相对气候目标仍然很小。


              Climeworks 2025–2030 年的可获取市场（SOM）受实体工厂产能约束：Mammoth 铭牌产能 36,000 t/yr（Gen2 在 10 个月只交付 ~105 t），而 Gen3 扩产还需要
              USD 1–2 billion 额外资本。到 2030 年，Climeworks 的现实 SOM 是实际交付 50,000–200,000 tonnes 移除量，对应 USD 50–200 million
              收入——不到 USD 1.7 billion 市场预测的 1%。
