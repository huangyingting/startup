      - number: '3.2'
        title: 竞争对手画像和技术对比
        blocks:
          - type: paragraph
            body: >
              1PointFive 使用 Carbon Engineering 的 L-DAC 技术：两步流程先让空气通过氢氧化钾（KOH）洗涤塔，再在 ~900°C 的煅烧炉中加热捕集溶液，以再生并释放纯 CO2。Oxy 于
              2023 年以约 USD 1.1 billion 收购 Carbon Engineering，使 1PointFive 获得深厚的资本开支资源、50+ 年 CO2 注入经验（来自强化采油）以及 6 billion
              tonnes 已锁定地质封存容量。位于 West Texas 的 Stratos 是旗舰 L-DAC 部署，设计产能 500,000 t/yr——为 Mammoth 铭牌产能的 14×。


              Heirloom Carbon 使用完全不同的机制：加热石灰石（碳酸钙）把 CO2 从岩石中驱出，再把反应性石灰（氧化钙）暴露在环境空气中，让其在数天内自然重新吸收 CO2。Heirloom
              称，其能耗强度低于基于吸附剂的系统，因为它依赖石灰石热力学，而不是自研吸附剂再生。California 商业工厂已投运；Louisiana 规划两座设施，合计 ~320,000 t/yr，使用 100%
              额外可再生能源。


              技术对比在几个维度上有利于 Climeworks：S-DAC 再生温度较低（~100°C，而 L-DAC 煅烧炉为
              900°C），让地热集成更高效；模块化立方体设计支持按单元积累学习曲线改进；固体吸附剂材料也可以持续优化。不过，在天然气充足、可为煅烧炉供热的地区，L-DAC 可能更容易规模化；而 Heirloom
              的石灰石路线完全避开了自研吸附剂供应链依赖。


              三种技术共享同一个根本挑战：没有一家已经证明能够按规划铭牌产能持续大规模运营。这个共同执行缺口意味着，竞争不只是技术差异化，同样比拼组织和运营能力。
