      - number: '2.4'
        title: 增长驱动和采用约束
        blocks:
          - type: paragraph
            body: >
              最重要的近期增长驱动是监管：美国 45Q 税收抵免对带永久封存的 DAC 提供 USD 180/tonne（在 2022 年 IRA 中扩大），大幅改善了美国 DAC 项目经济性。EU Carbon
              Removals Certification Framework（2024 年 2 月临时协议）为欧盟 DAC 信用认可建立共同标准。英国 CCUS 一揽子计划（GBP 20 billion）和日本允许 DAC
              的排放交易体系，也增加了政策需求锚。


              《巴黎协定》和 SBTi 框架下的企业净零承诺推动组织需求。CDR 市场受益于 2023–2024 年 VCM 信任危机；买方从声誉受损的自然基抵消转向永久、可衡量、经独立核验的工程移除。


              主导性的采用约束是成本：在 USD 1,000/tonne（个人）或 USD 400–600/tonne（企业）的价格下，DAC
              只有高度主动、资本充足的买方才能负担。按当前价格，全球可触达买方估计只有数百家大型企业。能源强度（1,500–2,000 kWh/tonne）使当地低成本可再生能源或地热电力成为经济性关键。Climeworks
              的冰岛运营受益于地热能源，但如果没有重大创新，这一模式无法在全球规模复制。


              最尖锐的近期逆风是美国政策不确定性。Trump 政府在 2025 年审查并可能终止 DOE DAC Hub 资金，可能撤掉 USD 3.5 billion 联邦支持；这笔支持原本是美国 DAC
              扩张计划的基石。这直接影响 Climeworks 的 Project Cypress（Louisiana），既是近期财务风险，也向企业买家发出信号：美国 DAC 政策支持不能被视为可靠。
