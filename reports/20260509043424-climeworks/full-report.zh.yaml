  - id: TV006
    title: 最终尽调问题表
    columns:
      - 尽调问题
      - 重要性
      - 预期披露程度
      - 以下情况为红旗...
    rows:
      - - Mammoth 容器激活失败的根因是什么？
        - 决定恢复概率和 Gen3 设计风险
        - 在 NDA 下应可向 Series D 投资人披露
        - 对根因含糊其辞或拒绝说明；没有清晰修复路径
      - - Project Cypress 现状如何？如果 DOE 取消，B 计划是什么？
        - 决定美国扩张的财务韧性
        - 管理层应有应急方案
        - 没有 B 计划；完全依赖 DOE；没有替代资本来源
      - - Series D 进入时的完整股权结构表、优先股堆叠和投资人权利是什么？
        - 决定回报结构和退出优先级
        - 标准尽调披露
        - 优先股负担 >3× 已投资本；反稀释条款复杂
      - - 是否有客户表示降低承诺或退出？所有合同的不可抗力状态如何？
        - 决定留存风险和合同敞口
        - 管理层应掌握所有客户状态；可能涉及保密
        - 任何未披露客户处于争议或合同重谈
      - - Gen3 商业化工厂 CapEx 估算是多少？公司在推进哪些融资结构（债务、绿色债券、45Q）？
        - 决定 Gen3 资本效率和稀释风险
        - 应已具备 Gen3 财务模型的初步估算
        - 没有非股权资本方案；Gen3 完全依赖股权融资
      - - 裁员后的自愿离职率是多少？关键技术团队成员是谁？
        - 决定执行能力和关键人物风险
        - HR 数据通常不会完全披露，但应分享趋势
        - Mammoth 维修团队显著流失；联合创始人离职信号
    notes: |
      这些尽调问题应放进 Series D 尽调流程。问题答案将是决定有条件观察建议应上调为买入，
      还是下调为回避的最重要因素。
    claimRefs:
      - CV025
