      - number: '5.4'
        title: 信任、质量、合规和差异化
        blocks:
          - type: paragraph
            body: >
              Climeworks 是第一家为其 Orca 工厂取得 Puro Standard 认证的 DAC 公司，建立了 DAC 碳信用的 MRV 模板。MRV 框架在工厂层面生成连续时间序列数据（风机速度、温度、CO2
              浓度、循环次数），并与 Carbfix 的地质监测（注入压力、地球化学示踪剂）整合，以核验每一吨。企业买方获得可用于 CDP/SBTi/GHG Protocol Scope 3 报告的 CORC 证书。


              Climeworks 在 EU Carbon Removals Certification Framework（CRCF）下的合规定位很强：CRCF 要求（量化、额外性、永久性、可持续性）与 Climeworks
              现有 Puro 认证系统高度一致。欧盟企业买方开始面对强制性 CDR 质量标准后，Climeworks 相比缺少等同核验基础设施的竞争对手，监管就绪优势会更重要。


              信任层还包括 Swiss Re 保险安排：Swiss Re 既是投资者，也是保险合作伙伴，为 Climeworks CDR
              买方提供逆转风险保障——这是一种少见产品，可降低交易对手风险感知，并让风险敏感买方（尤其是保险 / 金融公司）更有信心承诺采购。


              Climeworks 的技术与自然基 CDR 有结构性差异：永久性（数千年，而非数十年）、可衡量性（直接传感器数据，而非森林生物量模型）和额外性（按设计完全额外）。这些技术属性与全球碳核算标准收紧方向一致。
