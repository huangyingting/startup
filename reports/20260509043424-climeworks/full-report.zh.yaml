      - number: '1.4'
        title: 商业模式、客户和商业牵引
        blocks:
          - type: paragraph
            body: >
              Climeworks 为经核验的永久二氧化碳移除服务采用 B2B 订阅和长期采购模式。企业客户按每吨已移除并永久地下封存的 CO2 付费，个人订阅价格约为每吨 USD 1,000。该价格约为欧洲合规碳信用价格的
              13x，把 Climeworks 明确定位在高质量自愿高端碳移除市场。


              公司客户群覆盖科技、金融、航空、咨询和保险等领域的 160+ 家企业。标志性多年承购协议包括 BCG 的 15 年 80,000 tonnes 交易（2023 年 12 月，迄今最大单笔企业采购）、Morgan
              Stanley 到 2037 年的 40,000 tonnes 协议（2024 年 10 月，Morgan Stanley 首次采购 DAC 信用），以及与 JPMorgan Chase
              的未披露规模协议。British Airways 于 2024 年 9 月成为首家航空业客户。Frontier Climate 是由 Stripe、Shopify、Alphabet 和 McKinsey
              支持的预先市场承诺机制，把科技巨头的催化性采购导向 Climeworks 和其他高潜力 DAC 供应商。


              截至 2025 年中，按 CDR.fyi 数据，Climeworks 已在客户群中锁定超过 380,000 tonnes 移除量，并持有 421 份采购订单——超过任何其他 DAC 供应商。它约占全球所有 DAC
              实际交付吨数的 81%。但签约量和实际交付之间的差距仍然巨大：截至 2025 年 H1，全行业累计只交付 1,186 tonnes，占总签约量的 0.05%。Climeworks 还通过 Climeworks
              Solutions 提供混合组合，把自有工程移除与自然基和第三方方案组合起来，在纯 DAC 供应扩大前满足企业近期需求。
