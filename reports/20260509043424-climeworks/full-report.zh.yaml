  - number: 4
    title: 财务情况
    sections:
      - number: '4.1'
        title: 融资历史、投资者画像和资本结构
        blocks:
          - type: paragraph
            body: >
              Climeworks 通过两轮主要融资和若干小额批次累计获得超过 USD 1 billion 股权融资。2022 年 4 月的标志性 Series C 融资 CHF 600 million（约 USD 650
              million），由 Partners Group 和 GIC 共同领投，Baillie Gifford、M&G、Swiss Re、Carbon Removal Partners、Global Founders
              Capital 和 John Doerr 参与——这些都是机构投资和气候投资中最有声誉的名字。2025 年的 USD 162 million 由 BigPoint Holding AG（瑞士亿万富豪 Martin
              Haefner 的投资工具和锚定股东）以及 Partners Group 领投，显示尽管 Mammoth 遭遇运营挑战，投资者承诺仍在。


              投资者基础构成很有特点：Partners Group 管理偏基础设施的私募市场资本，投资期限为 10+ 年；GIC 是主权财富基金，没有退出压力；BigPoint Holding
              被描述为“锚定股东”，带有长期授权；Swiss Re 既是投资者，也是 CDR 买方——激励更一致。Baillie Gifford
              管理耐心股权资本，以押注长期变革性技术闻名。这样的股权结构表明投资者耐心较高，近期被迫退出或困境融资的可能性较低——但也意味着典型的回报导向压力（IPO 时间表、并购触发点）可能较弱。


              截至报告日期，Climeworks 未披露债务融资，没有公开股权发行，也没有确认的项目融资工具。作为一家瑞士
              Aktiengesellschaft，它在瑞士商业登记处备案，但不需要公开披露财务报表。因此，本章所有财务分析都来自模型推导。
            claimRefs:
              - CI001
              - CI002
              - CI007
              - CI014
              - CI022
              - CI033
      - number: '4.2'
        title: 收入模式、定价和收入质量
        blocks:
          - type: paragraph
            body: >
              Climeworks 的收入模式有三个渠道：（1）个人订阅，等价价格约 USD 1,000/tonne（CHF 7–50/月，对应不同月度移除量）；（2）企业长期承购协议，估计 USD
              400–600/tonne；（3）混合 CDR 组合销售，把 DAC 与成本更低的方法（生物炭、自然基、增强风化）组合。2025 年 SAP 交易（到 2034 年 37,000
              tonnes，混合方法）体现了混合路径。


              收入确认以交付为基础：实际捕集 CO2 并核验封存前，签约量不会产生收入。也就是说，6 million
              合同吨数代表未来交付义务——不是当前收入——尽管这些合同体现了可观的商业动能。如果企业预付款，预收款隐含的递延收入负债在缺少资产负债表时是一个关键未知数。


              个人订阅估计贡献 USD 3.2–5.4M/year 经常性收入（18,000+ 名订阅者，估计平均 USD 180–300/year）。企业承购收入不均匀：按照当前交付速度，BCG 到 2040 年的
              80,000 t 对应 ~USD 5,000–8,000/year；Morgan Stanley 到 2037 年的 40,000 t 也类似。Mammoth 最初 10 个月交付收入（~105 t × USD
              400–600/t = ~USD 42,000–63,000）相对公司成本基础几乎可以忽略。


              转向混合组合会提高财务效率（低成本方法扩大每美元可提供的体量），但也引入质量风险：买方可能会审视其信用中有多少比例是真正 DAC，而不是更便宜的替代方案，尤其是在 MRV 标准收紧之后。
