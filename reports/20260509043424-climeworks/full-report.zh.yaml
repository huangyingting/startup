      - number: '6.3'
        title: 留存、流失、反向信号与合同结构
        blocks:
          - type: paragraph
            body: >
              Climeworks 的结构性留存率很高：覆盖 5–15 年的远期采购合同带来合同锁定，ESG 披露一致性要求又带来软性留存（更换 CDR 供应商，需要向外部审计师和投资者解释切换原因）。Swiss
              Re、Partners Group 和 Microsoft 的多维关系（投资人 + 客户，或买家 + 生态伙伴）让退出在经济和声誉上代价都很高。


              没有企业客户公开宣布退出或缩减合同。不过，未披露负面事件并不等于客户一定满意：客户可能受保密义务约束，第一批多年期合同也只有 3–5 年历史，很多还没走到续约决策点。真正的留存测试会落在 2026–2028
              年续约周期。


              最负面的信号仍是潜在的：Mammoth 的交付缺口（10 个月 105 t，而铭牌产能 36,000
              t/yr）意味着，签约时预期每年拿到数百至数千吨交付的企业客户，只收到了预期信用的很小一部分。不可抗力条款很可能在合同层面保护
              Climeworks，但多年反复交付不足，可能在续约时引发买家不满。没有客户公开援引不可抗力或宣布争议。


              集中度风险中等：BCG、Morgan Stanley 和 SAP 合计约 ~157,000 t，占 6M 签约吨数的约 2.6%，说明按量看组合并不高度集中；但最接近交付期的量，可能更集中在这些锚定账户。
