  - number: 3
    title: 竞争格局
    sections:
      - number: '3.1'
        title: 竞争版图：直接 DAC 同业和相邻替代品
        blocks:
          - type: paragraph
            body: >
              截至 2025 年初，直接空气捕集（DAC）市场全球约有 150 家公司（WRI），但商业层很窄：只有 Climeworks 以及可能的 1PointFive，展示过大规模连续商业
              DAC+封存运营。版图分为三层：（1）商业规模运营商（Climeworks、1PointFive）；（2）融资充足的扩张期进入者（Heirloom）；（3）商业化前 / 研究型公司（Global
              Thermostat、CarbonCapture Inc. 以及数十家学术分拆公司）。


              除直接 DAC 同业外，Climeworks 还面临自然基碳抵消（REDD+、再造林、土壤碳）的替代竞争，价格为 USD 5–30/tonne，相比 Climeworks 个人端 USD 1,000/tonne
              低 30–200x。尽管 2023–2024 年 VCM 诚信危机让部分高端买方转向永久 CDR，自然基抵消按量仍占自愿碳市场压倒性多数。BECCS 和点源 CCS 在特定买方场景中也是替代品，不过 SBTi 和
              VCMI 下的监管区分越来越偏向大气移除（Climeworks 所在领域），而不是 Scope 1 减排（CCS 的竞争领域）。


              竞争动态的特点是，在普遍运营表现不及预期的背景下，各家公司仍提出巨大规模目标：1PointFive 目标到 2030 年达到 55,300 kt/yr，而 Climeworks 为 1,300
              kt/yr；但两家公司当前工厂实际捕集量都只是铭牌产能的一小部分。这个共同执行缺口创造了特殊竞争条件——双方都在营销未来规模，却只能基于当前有限交付相互竞争。
