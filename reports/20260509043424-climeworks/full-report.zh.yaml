  - number: 2
    title: 市场分析
    sections:
      - number: '2.1'
        title: 市场定义和边界
        blocks:
          - type: paragraph
            body: >
              Climeworks 所在市场是自愿碳移除（CDR）市场，具体是由直接空气捕集（DAC）锚定的耐久 /
              永久工程移除细分。这不同于更广义的自愿碳市场（VCM）；后者包括自然基抵消（再造林、REDD+、土壤碳），交易价格为每吨 USD 5–30，质量保证较弱。耐久 CDR
              细分因工程移除的永久性（地下封存数千年）、可衡量性和额外性，享有每吨 USD 200–2,000 的溢价。


              在 DAC 子市场内，主要有两类技术：固体 DAC（S-DAC），使用 Climeworks 部署的固体胺基吸附剂；液体 DAC（L-DAC），使用 Carbon Engineering（现为
              Occidental 子公司 1PointFive 的一部分）部署的氢氧化钾溶剂。2024 年，S-DAC 约占 DAC 市场收入的 56.73%，受益于 Climeworks
              的早期商业规模。主导终端用途是碳捕集与封存（占市场 78.27%），即捕集的 CO2 被永久注入地下，而不是用于产品。


              市场边界排除了几个相邻领域：点源工业 CCS（在电厂或工厂捕集 CO2）、生物能源与碳捕集（BECCS）以及碳利用（把 CO2 转化为燃料或化学品）。这些替代方案会争夺 ESG
              预算，但不能提供等同的大气移除质量。Climeworks 只在大气移除细分竞争，核心业务不提供碳减排或利用产品。
            claimRefs:
              - CM007
              - CM008
              - CM017
              - CM018
              - CM019
          - type: table
            tableRef: TM001
