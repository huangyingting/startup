    title: 市场定义表
    columns:
      - 细分 / 类别
      - 纳入支出
      - 排除支出
      - 买家 / 付款方
      - 对 Climeworks 的意义
    rows:
      - - 持久工程化 CDR（DAC + 储存）
        - 企业和主权包销；个人订阅；AMC 承诺
        - 本类别内无
        - 科技企业；金融行业；政府；AMC 联盟
        - 核心市场——Climeworks 的主要产品
      - - 自愿碳市场（VCM）——自然基抵消
        - 再造林、REDD+、土壤碳、红树林信用
        - 永久 DAC 信用不纳入该细分
        - 寻求便宜 Scope 3 抵消信用的企业
        - 相邻市场——价格低 5–30x 的竞品；威胁买家价格上移
      - - 点源工业 CCS
        - 水泥、钢铁、电厂源头 CO2 捕集
        - 排除大气移除
        - 工业运营商；监管机构
        - 可替代净零合规方案，但不是大气 CDR
      - - 带 CCS 的生物能源（BECCS）
        - 生物质燃烧 + 碳储存
        - 排除大气 DAC
        - 公用事业公司；有燃料敞口的大企业
        - 部分替代；永久性弱于矿化储存
      - - 碳利用（CO2 转产品）
        - 合成燃料、建筑材料、化学品
        - 排除储存部分
        - 工业化工和能源公司
        - 非 Climeworks 核心；用于气候主张时质量更低
      - - 第 6 条主权交易
        - 国家自主贡献（NDC）信用转让
        - 仅适用于主权对主权交易
        - 国家政府；主权财富基金
        - 新兴需求渠道——潜在规模大但仍处早期
    notes: |
      市场边界反映 Climeworks 核心产品聚焦永久移除。VCM 自然基抵消细分是价格替代品；在成本收敛前，它会限制 DAC 买家池扩张。
