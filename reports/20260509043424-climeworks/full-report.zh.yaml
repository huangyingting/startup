companyProfile:
  summary: >
    Climeworks 是全球运营经验最深的直接空气捕集（DAC）公司，由工程师 Christoph Gebald 和 Jan Wurzbacher 于 2009 年从 ETH Zurich 分拆创立。公司在冰岛
    Hellisheiði 地热场建设并运营 Orca（4,000 t/yr，2021）和 Mammoth（36,000 t/yr 铭牌产能，2024），用自研胺基吸附剂技术从空气中捕集 CO2，并借助 Carbfix
    将其永久矿化进玄武岩。到 2025 年，Climeworks 拥有 160+ 家企业客户、18,000+ 名个人订阅者和 6 million tonnes 签约量——但 Mammoth 正遭遇关键运营危机：投运前 10 个月仅产出
    ~105 tonnes，远低于 36,000 t/yr 铭牌产能。公司下一步押注 Gen3 技术（2024 年 6 月在 Basel 验证），要在 2027–2028 年商业规模下把成本降至 $250–350/t，并把吞吐量提升
    2×。
