      - 反向逻辑
      - 结论
    rows:
      - - 技术
        - Gen3 在 Basel 得到验证：通量 2×、能耗 0.5×；结构化吸附剂是真创新
        - Gen3 从未商业部署；Mammoth 失败可能说明 Gen2 设计缺陷，并提示 Gen3 风险
        - 有条件：Basel 验证真实，但商业规模不确定性很大
      - - 市场
        - DAC 是唯一永久、可规模化的 CDR；成本平价时市场潜力达 $1T
        - 按 Gen3 $250–350/t 目标，可触达市场只有理论上限的 5–10%（大众市场需要 $100–150/t）
        - 有条件：高端市场真实；大众市场需要 Gen4 成本水平，而该路线尚未规划
      - - 客户
        - 160+ 企业客户、6M 合同吨数，BCG / Morgan Stanley / SAP 为锚定客户
        - 大部分“证明”是远期承诺；已交付客户只有几十家，不是数百家
        - 混合：商业关系真实；交付质量偏弱
      - - 运营
        - Orca 连续运营 3+ 年；全球最有经验的 DAC 运营团队
        - Mammoth 仅达到铭牌产能 0.3%；根因未披露；裁员后团队缩减 22%
        - 反向：Mammoth 失败是近期主导信号
      - - 财务
        - 已融资 >$1B；EIB / 45Q / DOE 项目融资路径可用
        - 现金跑道 12–24 个月；到 2030 年 Gen3 需要 $8–14B CapEx；2026 年有下轮风险
        - 反向：当前位置到商业化 Gen3 之间资本缺口巨大
      - - 政策
        - CRCF、SBTi、CORSIA、IMO 2050 都会创造结构性 CDR 需求
        - DOE Cypress 资金存在风险；Trump 政府降低清洁能源优先级；CRCF 授权法案不确定
        - 混合：EU / 国际顺风强；美国政治风险重大
    notes: |
      投资逻辑与反向逻辑的结论反映截至 2025 年中证据的平衡。多数维度呈“混合”或
      “有条件”结论——这与有条件观察建议一致，而不是明确买入或卖出。
    claimRefs:
      - CV007
      - CV008
      - CV013
      - CV014
      - CV019
