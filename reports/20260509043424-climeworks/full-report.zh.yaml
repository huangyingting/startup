  productSummary: >
    Climeworks 的核心产品是经核验的永久 CO2 移除信用（CORCs），由自研 DAC 加矿化系统交付：（1）胺功能化固体吸附剂滤芯从环境空气中捕集 CO2；（2）低温热量解吸 CO2；（3）Carbfix 将 CO2
    注入玄武岩并永久矿化。Gen2 工厂（Orca、Mammoth）采用集装箱式模块化捕集单元。Gen3 技术改用立方体设计（26×26×22.5m），配套结构化吸附剂，目标是相较 Gen2 实现 2× 吞吐量和 0.5× 能耗。信用由
