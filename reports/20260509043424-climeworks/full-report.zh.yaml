  - number: 6
    title: 客户情况
    sections:
      - number: '6.1'
        title: 客户基础概览、分层和获客渠道
        blocks:
          - type: paragraph
            body: >
              截至 2025 年，Climeworks 的客户基础包括来自 60+ 个国家的 160+ 家企业客户和 18,000+ 名个人订阅者。企业客户覆盖七个主要垂直领域：专业服务 /
              咨询（BCG、Capgemini、McKinsey 通过 Frontier）；金融服务（Morgan Stanley、Swiss Re）；科技 /
              软件（Microsoft、SAP、TikTok、Stripe、Shopify、Alphabet 通过 Frontier）；航空（British Airways）；海运（MOL、NYK）；零售 /
              消费（Coca-Cola HBC）；以及制造 / 工业。按合同价值看，科技和金融服务似乎占已签约量的大头。


              Climeworks 的获客走过三个阶段：（1）2017–2021：靠直销和 CO2 利用买家（温室、饮料）拿下早期采用者；（2）2021–2023：进入 Frontier AMC
              队列（Microsoft、Stripe、Shopify、Alphabet、McKinsey），并启动早期面向 CDR 的直销；（3）2023–2025：借品牌客户交易加速（BCG 80,000 t、Morgan
              Stanley 40,000 t、SAP 37,000 t），同时切入新垂直领域（海运、数字消费）。Frontier AMC 是关键拐点：Stripe、Shopify 和 Alphabet 的早期承诺，在 CDR
              市场最严苛的审查层面验证了 Climeworks 的质量，也打开了下一波买家。


              客户渠道包括：直销 B2B 企业客户（主渠道）；Carbonfuture marketplace（次渠道）；Frontier AMC 资金分配；以及个人网页订阅。大型企业账户的成交周期估计为 6–18
              个月，牵涉可持续发展、采购、法务和财务团队。个人订阅渠道几乎不吃销售资源，同时带来经常性现金流和品牌大使效应。
