      - 方向
      - 时点
      - 对 Climeworks 的影响
      - 尽调问题
    rows:
      - - 美国 45Q 税收抵免（DAC $180/t）
        - 驱动因素
        - 已生效（2022–至今）
        - 撑起美国项目经济性；对 Project Cypress 至关重要
        - 评估 Trump 政府的 45Q 政策风险；核实 Gen3 下的抵免资格
      - - 欧盟碳移除认证框架
        - 驱动因素
        - 已生效（2024 年暂定）
        - 为 Climeworks 碳信用建立欧盟标准；打开欧盟采购
        - 跟踪 CRCF 最终定稿时间；确认 Climeworks 符合 CRCF 资格的路径
      - - 英国 CCUS 一揽子计划（£20B）
        - 驱动因素
        - 已生效（2023–至今）
        - 潜在打开英国市场
        - 评估 Climeworks 是否在推进英国项目或买方
      - - 企业净零承诺（SBTi / TCFD）
        - 驱动因素
        - 已生效且在增长
        - 2030 目标逼近，扩大企业买方池
        - 量化 Climeworks 在已承诺 SBTi 企业中的买方管线
      - - VCM 信任危机推动买方转向工程化 CDR
        - 驱动因素
        - 已生效（2023–至今）
        - 需求被拉向 Climeworks 这类产品
        - 监测买方替代行为；跟踪 ICVCM 标准进展
      - - Trump 政府 DOE Hub 审查
        - 约束因素
        - 已生效（2025–至今）
        - 直接威胁 Project Cypress 资金和美国市场信心
        - 跟踪 DOE 终止状态；评估 $500M+ 资金损失情景
      - - DAC 成本：个人 ~$1,000/t，企业 $400–600/t
        - 约束因素
        - 当前存在；随时间下降
        - 限制买方范围；Gen3 必须降本，才能扩大可服务市场（SAM）
        - 核实 Gen3 成本目标；评估达到 $400/t 的时间表风险
      - - 能耗（1,500–2,000 kWh/t CO2）
        - 约束因素
        - 当前存在；随时间下降
