  - id: TE002
    title: 工作流 / 使用场景表
    columns:
      - 工作流步骤
      - 参与方
      - 活动
      - 产出
      - 验证方法
    rows:
      - - 1. 客户协议
        - Climeworks + 企业买方
        - 签署 M 年 N 吨远期承购协议
        - 已签合同；交付计划
        - 法律合同
      - - 2. 空气捕集
        - Climeworks（DAC 工厂）
        - 风机吸入环境空气；CO2 在常温下吸附到胺基吸附剂上
        - 吸附剂捕获 CO2
        - 工厂传感器：进 / 出口 CO2 浓度
      - - 3. 吸附剂再生
        - Climeworks（DAC 工厂）
        - 用蒸汽将吸附剂加热至 ~100°C；CO2 以纯气流释放
        - 纯 CO2 气体可压缩
        - 温度 / 压力传感器；CO2 质量流量计
      - - 4. CO2 压缩与输送
        - Climeworks + Carbfix
        - 压缩 CO2，与水混合后，通过管道送至 Carbfix 注入点
        - 富 CO2 流体可注入
        - 质量流量测量；管道传感器
      - - 5. 地下注入
        - Carbfix
        - 将富 CO2 水注入 400-800m 深的玄武岩
        - CO2 开始矿化成方解石
        - 注入压力 / 体积；地球化学示踪剂
      - - 6. 矿化验证
        - Carbfix + 独立地质学家
        - 监测地球化学变化；确认 CO2 在 1-2 年内转化为方解石
        - 永久性得到确认
        - 示踪剂测量；独立地球化学分析
      - - 7. CORC 签发
        - Puro.earth
        - 为经验证的吨数签发碳移除证书
        - 买方登记账户中的 CORC
        - Puro Standard 审计；工厂 + 地质数据
      - - 8. ESG 报告整合
        - 企业买方
        - 将 CORC 导入 CDP/SBTi/GHG Protocol Scope 3 报告
        - 发布含已验证 CDR 的 ESG 披露
        - 第三方 ESG 审计方
    notes: |
      该工作流适用于 DAC+地下封存产品（Orca 和 Mammoth 工厂）。混合组合产品的
      第 2-6 步会因方法不同而变化（生物炭、强化风化）。个人订阅者
      的第 1 步和第 8 步通过 Climeworks 网站界面简化。
