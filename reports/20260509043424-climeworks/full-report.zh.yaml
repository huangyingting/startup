      - number: '2.3'
        title: 买方分层和采用动态
        blocks:
          - type: paragraph
            body: >
              当前 DAC 买方市场集中在一小群大型、受 ESG 驱动的企业买家。Microsoft 购买了全球已发行碳移除信用的 80% 以上，造成极高的买方集中风险。Frontier Climate（由
              Stripe、Shopify、Alphabet、McKinsey 等支持）承诺到 2030 年向永久 CDR 投入 USD 1 billion，为 Climeworks 及同业提供结构化需求锚。


              主要买方画像是大型科技或金融企业，具备：（1）公开的 2030 或 2040 净零承诺；（2）拥有预算权的专职可持续发展或环境事务团队；（3）在 TCFD 或 EU CSRD 下的 ESG
              董事会报告要求；（4）偏好可衡量、可核验的移除，而非减排抵消。BCG（到 2040 年 80,000 tonnes）和 Morgan Stanley（到 2037 年 40,000
              tonnes）是这种画像的代表。金融行业买方正在增长，驱动因素是 PCAF 融资排放标准。


              航空业代表一个正在出现的增长细分：British Airways 于 2024 年与 Climeworks 合作，将碳移除用于 CORSIA 和自愿承诺。预计 EU ReFuelEU 要求和 CSRD
              披露要求会加速航空企业对永久碳移除凭证的需求。


              主权买方仍处于早期，但潜在规模很大，路径是《巴黎协定》第 6 条；该条款允许国家之间转让碳移除信用，以实现 NDC 目标。Switzerland 和 Norway 已经建立 DACS 信用交易双边安排。如果第 6
              条交易规模化，政府采购可能成为最大的 DAC 需求来源——但到 2025 年，这个市场仍高度不确定。


              个人订阅者——Climeworks 的 18,000+ 名零售客户，每月支付 ~USD 7–50——经济贡献边际，但能带来品牌认知、早期采用者可信度，以及对营销和政策倡导有价值的直接消费者触点。
