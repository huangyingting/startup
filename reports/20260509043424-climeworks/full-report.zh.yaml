        title: 扩张潜力、个人渠道与客户结论
        blocks:
          - type: paragraph
            body: >
              Climeworks 的客户扩张机会很大：航空（CORSIA 合规创造永久移除信用需求）、海运（IMO 2050 净零目标）、金融服务（ECB/Fed 对受监管机构的净零压力）和科技（数字公司对永久 CDR
              的支付意愿最高）。每个垂直领域都有监管顺风，把 CDR 从自愿的可选项转向近合规的必需品。


              个人订阅渠道（18,000+，估计平均 CHF 20/month = ~$4.5M
              ARR）提供可预测的经常性收入和品牌放大。相较企业包销，它的绝对规模很小，但能形成社区参与，也给政策制定者一个关键证据：数百万人愿意为永久 CDR 支付 $1,000/t，这对考虑 DAC
              补贴的政策制定者很重要。


              SAP 交易体现的混合 CDR 组合，把 Climeworks 的可触达客户群扩到负担不起纯 DAC 定价的中型企业。把低成本移除和 DAC 打包后，Climeworks 能以 $200–400
              的混合每吨价格服务 3–5x 更多企业买家。


              客户结论：Climeworks 已证明自己能在多个垂直领域赢下并留住高端企业客户，Frontier AMC 买家也给出了真实的质量证明。主要担忧在于交付缺口正在制造潜在客户风险；公司需要在 2026–2028
              年续约周期前，把远期承诺转成交付后的客户背书。
            claimRefs:
              - CU020
              - CU028
              - CU032
              - CU033
              - CU034
  - number: 7
    title: 风险
    sections:
      - number: '7.1'
        title: 运营与技术风险
        blocks:
          - type: paragraph
            body: >
              Climeworks 最尖锐的风险是运营：Mammoth 未能启用 72 个捕集容器中的 60 个，相比铭牌产能短缺约 ~90%。商业运营前 10 个月只产出约 ~105 吨，而计划产能为 36,000
              t/yr。根因尚未公开披露。可能解释包括：吸附剂在冰岛湿度和温度条件下降解；捕集风机或换热器机械故障；过程控制软件问题；或者 Gen2
              捕集器设计存在结构问题，需要大规模改造。每种情景对应不同的恢复概率和恢复时间表。


              Gen3 技术执行风险进一步叠加：Climeworks 整条降本路线图都押在 Gen3 结构化吸附剂上，要求其在商业规模下达到 Gen2 的 2× 吞吐量和 0.5× 能耗。Gen3 已在 Basel 试点中完成
              5,000 次循环、15,000 小时验证，但商业规模结构化吸附剂从未部署进 DAC
              工厂。这种材料必须扛住工业规模的温度循环、湿度变化、振动和化学污染，这些条件与试点环境在程度和性质上都不同。特种化工工艺放大的失败率不可忽视；如果没有对结构化吸附剂材料商业规模性能数据的独立技术审查，风险无法被完整刻画。


              Gen2 到 Gen3 的过渡管理风险同样很大：Climeworks 剩余约 ~377 名员工（22% 裁员后）必须同时处理 Mammoth 修复、Gen3 商业工程和多站点准备。优先级冲突不可避免；22%
              裁员降低了烧钱速度，也削弱了团队同时推进三条战线的执行能力。能源成本风险是结构性的：按 Gen2 的 1,500–2,000 kWh/tonne 能耗，能源成本上涨 20% 就会给 OPEX 增加
              $50–100/tonne。冰岛地热电网正承受全球数据中心运营商寻找可再生能源带来的需求压力。
