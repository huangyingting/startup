      - number: '4.4'
        title: 资本充足性、负面情景和财务结论
        blocks:
          - type: paragraph
            body: >
              Climeworks 估计年现金消耗为 USD 80–150 million，意味着 2025 年 USD 162M 融资可提供约 12–24 个月现金跑道。这让 2026 年中至 2026
              年底成为关键财务窗口：Climeworks 必须（1）证明 Mammoth 表现改善，足以支撑可信的 Series D；（2）拿下额外 DOE
              资金或欧洲公共资本；或（3）如果签约现金流具备可融资性，则推进项目融资。


              DOE Project Cypress 风险是最重要的单一资本事件：如果 USD 500M+ 联邦拨款在 Trump 政府下被取消，Climeworks
              会失去一大块非稀释性资本，必须用股权替代——考虑到运营挑战，条款很可能更差。这会提前融资时间表，并可能触发下轮估值下调风险。


              负面情景很严峻：Mammoth 到 2026 年产能利用率仍低于 5% + Project Cypress 取消 + Stratos/Heirloom 竞争压力 = 可能以低于此前轮次隐含 $1B+
              的估值进行困境融资。有利情景同样合理：Mammoth 在 2025 年改善至 30% 产能，Gen3 商业部署于 2026 年开始，Series D 基于改善后的运营数据以 $300M+ 规模完成。


              财务结论：Climeworks 的收入模式在根本上成立（长期需求、经常性订阅、高端买方的高
              WTP），但相对于成本基础，它在运营上仍接近收入前阶段，持续烧钱填补交付缺口。只有交付缺口收窄，进一步资本部署才有理由。独立财务尽调需要完整数据室。
