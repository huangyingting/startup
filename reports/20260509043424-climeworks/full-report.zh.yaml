      - number: '5.2'
        title: 技术架构：Generation 2、Generation 3 和封存层
        blocks:
          - type: paragraph
            body: >
              Climeworks 的技术栈分为三层：（1）固体吸附剂 DAC 系统（自研）；（2）模块化硬件平台（立方体、风机、换热器）；（3）CO2 封存系统（Carbfix
              合作）。每一层都很关键；任何一层失效都会阻止碳移除信用交付。


              核心化学是变温吸附（TSA）：胺功能化吸附剂在环境温度下从空气中捕集 CO2，再用蒸汽加热到 ~100°C 时释放浓缩 CO2。这种低温再生是相对 L-DAC（Carbon
              Engineering）的关键优势，后者需要 900°C 的煅烧炉温度。Gen2 使用填充滤床；Gen3 用结构化吸附剂材料取代它，提高表面接触，令循环时间减半、每模块吞吐量翻倍。


              Gen3 于 2024 年 6 月在 Climeworks 的 Basel 测试设施完成验证，经过 5,000 次捕集-释放循环和公司 180 人 R&D 组织中 50 名专职专家投入的 15,000 R&D
              小时。Gen3 立方体形态（26×26m，高 22.5m）是一次硬件重新设计，相比 Gen2 的堆叠集装箱，提高了制造标准化程度。


              Carbfix 的冰岛封存层提供了永久、可衡量的封存机制：富 CO2 水被注入 400–800m 深的玄武岩中，并在 1–2 年内矿化为方解石，过程由地球化学示踪剂独立核验。与任何自然基或利用型 CDR
              替代方案相比，这让 Climeworks 的组合产品具有独特可核验性。
