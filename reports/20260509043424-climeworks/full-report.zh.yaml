      - number: '3.4'
        title: 切换成本、分销和负面竞争证据
        blocks:
          - type: paragraph
            body: >
              DAC 市场在签约前切换成本低，签约后切换成本中等。一旦企业买家在年度 ESG 披露或 CDP 提交中公开报告 Climeworks 信用，转向竞争对手会带来叙事不一致，ESG
              审计团队和投资者可能审视。由此形成的软留存机制有利于 Climeworks，即便竞争对手价格更好。


              Climeworks 的分销优势包括：自有 B2B 直销，覆盖 160+ 家企业客户；Carbonfuture 市场入口（Microsoft、Swiss Re、First Movers
              Coalition）；以及个人订阅渠道（18,000+ 名零售订阅者）。1PointFive 的企业直销刚起步，也没有等同的零售渠道。Heirloom 的分销高度依赖美国政府关系（DOE Hub 计划）和
              Frontier Climate 的 AMC。


              对 Climeworks 最不利的竞争证据是：（1）Mammoth 运营失败，无法接近铭牌产能（10 个月 ~105 t，对比 36,000 t/yr 目标），直接削弱 Climeworks “全球最有经验”
              DAC 运营商的核心主张；（2）2025 年 5 月 22% 裁员显示财务压力，可能影响 R&D 和 Gen3 部署时间表；（3）如果 1PointFive 在 2025–2026 年从 Stratos 实现哪怕
              100,000 t/yr，也会超过 Climeworks 历史累计交付总量（按 CDR.fyi 为累计 1,186 tonnes），决定性改变市场领导地位认知。
