    - id: CM013
      statement: |
        A key growth driver for the DAC market is the US 45Q tax credit, which was expanded
        in the 2022 Inflation Reduction Act (IRA) to provide up to USD 180 per tonne of CO2
        captured via DAC and stored permanently underground, with a minimum capture threshold
        of just 1,000 tonnes/year, dramatically lowering the qualification bar for new projects.
      type: third-party-reported
      topic: policy and regulation
      confidence: high
      freshness: current
      sourceRefs:
        - SM004
        - SM003
      answersQuestionRefs:
        - QM003
    - id: CM014
      statement: |
        The European Commission set a target to store up to 50 Mt CO2/year by 2030 including
        from DAC, and in February 2024 reached a provisional agreement with the European
        Parliament on the Carbon Removals Certification Framework, which creates a legal
        standard for quantifying and certifying carbon removal activities across the EU.
      type: third-party-reported
      topic: policy and regulation
      confidence: medium
      freshness: current
      sourceRefs:
        - SM003
      answersQuestionRefs:
        - QM003
    - id: CM015
      statement: |
        The UK government announced in March 2023 that it would provide up to GBP 20 billion
        (~USD 25 billion) for carbon capture, utilization, and storage (CCUS) applications
        including DAC, while Japan set a CCUS roadmap targeting 6–12 Mt CO2/year captured
        by 2030, with DAC included as a compliance option in its emissions-trading scheme.
      type: third-party-reported
      topic: policy and regulation
      confidence: medium
      freshness: recent
      sourceRefs:
        - SM003
      answersQuestionRefs:
        - QM003
    - id: CM016
      statement: |
        The largest structural constraint on DAC market growth is cost: current commercial
        DAC pricing of approximately USD 1,000 per tonne (Climeworks individual subscriptions)
        or USD 400–600/tonne (typical corporate offtake) is 5–14x the price of low-quality
        nature-based carbon offsets and 7–15x the EU ETS spot price, making DAC economically
        accessible only to ESG-motivated, well-capitalized corporate buyers and governments.
      type: inferred
      topic: market constraints
      confidence: high
      freshness: current
      sourceRefs:
        - SM007
        - SM008
        - SM003
      answersQuestionRefs:
        - QM004
    - id: CM017
      statement: |
        The voluntary carbon market (VCM) is the parent market that includes DAC. In 2024,
        the VCM faced credibility headwinds as research challenged the additionality and
        permanence of nature-based offsets, driving buyers toward higher-integrity permanent
        removal categories—including DAC—and creating near-term structural demand pull for
        Climeworks and peers.
      type: inferred
      topic: market structure
      confidence: medium
      freshness: current
      sourceRefs:
        - SM009
        - SM005
      answersQuestionRefs:
        - QM005
    - id: CM018
      statement: |
        The "durable carbon removal" or "engineered CDR" sub-market—including DAC, BECCS, and
        enhanced weathering—is estimated to account for only 2–5% of total VCM purchases in
        2024 but commands premium pricing (USD 200–2,000/tonne vs USD 5–30 for typical
        nature-based offsets), reflecting quality differentiation based on permanence, additionality,
        and measurability.
      type: inferred
      topic: market segmentation
      confidence: medium
      freshness: current
      sourceRefs:
        - SM009
        - SM010
      answersQuestionRefs:
        - QM005
    - id: CM019
      statement: |
        Climeworks' serviceable addressable market (SAM) in the near-term (2024–2030) is the
        pool of corporate buyers committed to purchasing permanent, high-quality carbon removal
        at above-market pricing: primarily large technology companies, financial institutions,
        and multinational corporates with public net-zero 2030 or 2040 targets and available
        sustainability budget. This corporate SAM is estimated at 3–10 Mt CO2/yr of purchasing
        intent through 2030, with USD 5–15 billion in committed and intent-to-commit spend.
      type: inferred
      topic: market sizing
      confidence: low
      freshness: current
      sourceRefs:
        - SM010
        - SM005
      answersQuestionRefs:
        - QM001
    - id: CM020
      statement: |
        Climeworks' BCG deal (80,000 tonnes through 2040) and Morgan Stanley deal (40,000 tonnes
        through 2037) together represent approximately USD 80–160 million in committed spend
        (at $1,000–$2,000/tonne blended pricing), illustrating that individual enterprise contracts
        can be material in size but that the total addressable pipeline of such contracts is
        likely in the hundreds rather than thousands of corporate buyers.
      type: inferred
      topic: buyer segments
      confidence: medium
      freshness: current
      sourceRefs:
        - SM011
        - SM012
      answersQuestionRefs:
        - QM006
    - id: CM021
      statement: |
        A significant growth constraint for DAC is energy intensity: current DAC systems
        require approximately 1,500–2,000 kWh of energy (electricity and heat) per tonne of
        CO2 captured. At grid electricity prices, this contributes USD 100–300/tonne to cost.
        The CarbonPlan DAC cost calculator confirms that without access to low-cost renewable
        energy or geothermal power, DAC becomes barely economical even at optimistic technology
        projections.
      type: third-party-reported
      topic: technology and cost constraints
      confidence: medium
      freshness: current
      sourceRefs:
        - SM013
        - SM003
      answersQuestionRefs:
        - QM004
    - id: CM022
      statement: |
        Climeworks has a structural advantage in accessing Iceland's geothermal energy base,
        enabling Orca and Mammoth to operate with nearly carbon-neutral electricity at competitive
        energy prices. However, geothermal access in Iceland limits Climeworks' ability to
        replicate this cost structure globally; Gen3 plants in non-geothermal locations will
        require more expensive renewable energy solutions.
      type: inferred
      topic: competitive positioning
      confidence: medium
      freshness: current
      sourceRefs:
        - SM014
        - SM003
      answersQuestionRefs:
        - QM004
    - id: CM023
      statement: |
        The Trump administration's decision in 2025 to review and potentially terminate the
        DOE DAC Hub funding program (Project Cypress in Louisiana and South Texas DAC Hub)
        represents the most immediate regulatory risk to US DAC market growth, with up to
        USD 3.5 billion in federal funding commitments in jeopardy as of the report date.
      type: third-party-reported
      topic: policy risk
      confidence: high
      freshness: current
      sourceRefs:
        - SM015
