      statement: |
        The IEA projects that DAC expansion plans filed through 2024 include at least 130
        facilities at various planning stages, but only around 15 are in advanced development
        or under construction. Even if all 130 advance simultaneously, total DAC output by 2030
        would reach only ~3 Mt/yr—representing a massive execution gap between announced
        ambition and the 80 Mt/yr needed for climate alignment.
      type: third-party-reported
      topic: market scaling gap
      confidence: medium
      freshness: current
      sourceRefs:
        - SM003
      answersQuestionRefs:
        - QM003
    - id: CM025
      statement: |
        The primary buyer archetype for Climeworks' corporate offtake product is a large
        multinational company with: (1) a public Scope 3 net-zero target for 2030 or 2040;
        (2) a dedicated sustainability budget for carbon removal; (3) ESG board governance
        requiring measurable, verifiable removal rather than avoidance offsets; and (4)
        public reputation exposure that makes credibility of the carbon claim valuable.
      type: inferred
      topic: buyer segmentation
      confidence: medium
      freshness: current
      sourceRefs:
        - SM011
        - SM006
      answersQuestionRefs:
        - QM006
    - id: CM026
      statement: |
        Financial sector buyers—including Morgan Stanley (40,000 tonnes through 2037), Swiss Re
        (an investor and buyer), and other financial institutions—represent an emerging segment
        motivated by Scope 3 financed emissions accounting under the PCAF standard, where
        permanent CDR can reduce disclosed financed emissions and meet regulatory guidance
        under evolving EU taxonomy requirements.
      type: third-party-reported
      topic: buyer segments
      confidence: medium
      freshness: current
      sourceRefs:
        - SM012
        - SM011
      answersQuestionRefs:
        - QM006
    - id: CM027
      statement: |
        Aviation represents a growth segment for DAC buyers: British Airways partnered with
        Climeworks in 2024 for CORSIA and voluntary offset commitments, as airlines face
        mandatory sustainable aviation fuel (SAF) blending mandates under the EU's ReFuelEU
        Aviation regulation and growing Scope 1 disclosure requirements under the CSRD.
      type: third-party-reported
      topic: buyer segments
      confidence: medium
      freshness: current
      sourceRefs:
        - SM016
        - SM004
      answersQuestionRefs:
        - QM006
    - id: CM028
      statement: |
        The government/sovereign buyer segment has grown via two channels: (1) Switzerland and
        Norway agreed to sell each other credits generated from DACS under Article 6 of the
        Paris Agreement; and (2) DOE and other agencies have used direct purchase agreements as
        carbon credit buyers as part of CDR demonstration programs. Sovereign buyers could become
        a significant demand source if Article 6 trading scales.
      type: third-party-reported
      topic: buyer segments
      confidence: medium
      freshness: current
      sourceRefs:
        - SM004
        - SM003
      answersQuestionRefs:
        - QM006
    - id: CM029
      statement: |
        Climeworks' individual subscriber channel—where consumers pay ~USD 7–50/month for
        monthly carbon removal subscriptions—represents a long-tail retail CDR market estimated
        at 18,000 subscribers by 2025. This segment is economically marginal at $1,000/tonne
        individual rates but serves brand-building, early-adopter signaling, and public
        engagement functions.
      type: company-claimed
      topic: buyer segments
      confidence: medium
      freshness: current
      sourceRefs:
        - SM016
        - SM007
      answersQuestionRefs:
        - QM006
    - id: CM030
      statement: |
        A key adoption constraint for corporate buyers is the lack of standardized verification
        and accounting frameworks for DAC credits. The Voluntary Carbon Markets Integrity
        Initiative (VCMI) and ICVCM (formerly TSVCM) were developing common standards, but
        as of 2025, no single market-wide protocol existed for DAC credit issuance and retirement,
        creating procurement friction for corporate accounting and ESG disclosure teams.
      type: inferred
      topic: adoption constraints
      confidence: medium
      freshness: current
      sourceRefs:
        - SM009
        - SM004
      answersQuestionRefs:
        - QM011
    - id: CM031
      statement: |
        The DAC cost learning curve follows a similar pattern to early solar PV: costs are
        expected to decline 15–20% for each doubling of cumulative capacity based on
        historical DAC learning rates, per IEA models. To reach USD 300/tonne by 2035,
        cumulative global DAC capacity would need to be approximately 100–200 Mt/yr—a level
        that requires capital investment in the hundreds of billions of dollars.
      type: third-party-reported
      topic: cost trajectory
      confidence: medium
      freshness: current
      sourceRefs:
        - SM003
        - SM013
      answersQuestionRefs:
        - QM004
    - id: CM032
      statement: |
        The market structure of DAC purchasing in 2024–2025 shows extreme buyer concentration:
        approximately 3–5 companies (Microsoft, BCG, Stripe ecosystem, Morgan Stanley) account
        for the majority of committed volume in the durable CDR space, raising systemic risk if
        any major buyer pauses or cancels commitments, as the voluntary market lacks liquidity
        to absorb sudden demand shifts.
      type: inferred
      topic: market risks
      confidence: medium
      freshness: current
      sourceRefs:
        - SM005
        - SM017
      answersQuestionRefs:
