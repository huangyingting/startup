tables:
  - id: TM001
    title: Market Definition Table
    columns:
      - Segment / Category
      - Included Spend
      - Excluded Spend
      - Buyer / Payer
      - Relevance to Climeworks
    rows:
      - - Durable engineered CDR (DAC + storage)
        - Corporate and sovereign offtake; individual subscriptions; AMC commitments
        - None within this category
        - Technology corporates; financial sector; governments; AMC consortia
        - Core market—Climeworks' primary product
      - - Voluntary Carbon Market (VCM) – Nature-based offsets
        - Reforestation, REDD+, soil carbon, mangrove credits
        - Permanent DAC credits excluded from this segment
        - Corporations seeking cheap offset credits for Scope 3
        - Adjacent—competitor product at 5–30x lower price; threatens buyer uplift
      - - Point-source industrial CCS
        - Cement, steel, power plant CO2 capture at source
        - Atmospheric removal excluded
        - Industrial operators; regulators
        - Substitute for net-zero compliance but not atmospheric CDR
      - - Bioenergy with CCS (BECCS)
        - Biomass combustion + carbon storage
        - Atmospheric DAC excluded
        - Utilities; large corporates with fuel exposure
        - Partial substitute; permanence inferior to mineral storage
      - - Carbon utilization (CO2 to products)
        - Synthetic fuels, construction materials, chemicals
        - Storage component excluded
        - Industrial chemical and energy companies
        - Non-core for Climeworks; lower quality for climate claims
      - - Article 6 sovereign trading
        - Nationally Determined Contribution credit transfers
        - Only applies to sovereign-to-sovereign transactions
        - National governments; sovereign wealth funds
        - Emerging demand channel—potentially large but nascent
    notes: |
      Market boundaries reflect the permanent removal focus of Climeworks' core product. The VCM
      nature-based offset segment is a price substitute that limits DAC buyer pool expansion until
      costs converge.
    claimRefs:
      - CM017
      - CM018
      - CM008
