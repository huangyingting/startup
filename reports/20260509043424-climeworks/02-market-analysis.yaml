        The global direct air capture (DAC) market was estimated at USD 97.56 million in 2024
        by Grand View Research, with a projected CAGR of 61.15% from 2025 to 2030, reaching
        USD 1,699.33 million by 2030, driven primarily by corporate net-zero commitments and
        government policy incentives.
      type: third-party-reported
      topic: market sizing
      confidence: medium
      freshness: current
      sourceRefs:
