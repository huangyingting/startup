      statement: |
        Frontier Climate, an advance market commitment (AMC) backed by Stripe, Shopify,
        Alphabet, McKinsey, and others, has committed more than USD 1 billion to purchase
        high-quality permanent carbon removal credits including DAC through 2030, with
        Climeworks as a named supplier.
