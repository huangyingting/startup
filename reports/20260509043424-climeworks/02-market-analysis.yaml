      statement: |
        North America accounted for the largest regional revenue share of the DAC market in
        2024 at 46.79%, driven by the US 45Q tax credit, the Bipartisan Infrastructure Law's
        $3.5 billion DAC Hub program, and a high concentration of early-adopter corporate buyers.
      type: third-party-reported
      topic: geography
