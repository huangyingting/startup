sections:
  - id: section-1
    title: Market Definition and Boundary
    body: |
      The relevant market for Climeworks is the voluntary carbon removal (CDR) market, specifically
      the durable/permanent engineered removal segment anchored by direct air capture (DAC). This is
      distinct from the broader voluntary carbon market (VCM), which includes nature-based offsets
      (reforestation, REDD+, soil carbon) that trade at USD 5–30 per tonne with lower quality
      assurance. The durable CDR segment commands premium pricing of USD 200–2,000 per tonne
      due to the permanence (thousands of years for underground storage), measurability, and
      additionality of engineered removals.

      Within the DAC sub-market, there are two primary technology categories: solid-DAC (S-DAC),
      which uses solid amine-based sorbents as deployed by Climeworks; and liquid-DAC (L-DAC),
      which uses potassium hydroxide solvents as deployed by Carbon Engineering (now part of
      1PointFive, an Occidental subsidiary). S-DAC held approximately 56.73% of DAC market revenue
      in 2024, benefiting from Climeworks' early commercial scale. The dominant end-use application
      is carbon capture and storage (78.27% of market), meaning captured CO2 is permanently
      injected underground rather than utilized in products.

      The market boundary excludes several adjacent spaces: point-source industrial CCS (capturing
      CO2 at power plants or factories), bioenergy with carbon capture (BECCS), and carbon
      utilization (converting CO2 to fuels or chemicals). These substitutes compete for ESG budget
      but do not offer equivalent atmospheric removal quality. Climeworks competes exclusively in
      the atmospheric removal segment and does not offer carbon avoidance or utilization products
      in its core business.
    claimRefs:
      - CM007
      - CM008
      - CM017
      - CM018
      - CM019
    tableRefs:
      - TM001
  - id: section-2
    title: 'Market Sizing: TAM, SAM, and SOM with Multiple Lenses'
    body: |
      The DAC market is very small today relative to ambitions. Grand View Research estimated the
      global DAC market at USD 97.56 million in 2024, projecting a compound annual growth rate
      (CAGR) of 61.15% to reach USD 1.699 billion by 2030. MarketsandMarkets reached a near-identical
      estimate of USD 1.727 billion by 2030 at 60.9% CAGR. These analyst forecasts capture investment
      flows and planned capacity buildout but are based on announced projects that face significant
      execution risk.

      The IEA provides a more sobering lens. As of 2024, all 27 operational DAC plants globally
      captured less than 0.01 Mt CO2 per year—far below the 80 Mt CO2/year required to align with
      the Net Zero by 2050 (NZE) scenario. If all 130+ planned DAC projects proceed at full nameplate
      capacity by 2030, total global DAC output would reach only ~3 Mt CO2/yr—less than 4% of the
      climate target. This execution gap is the single most important fact for assessing the DAC
      market's near-term reality.

      From a buyer demand lens, CDR.fyi tracks 1.36 million cumulative tonnes delivered across all
      durable CDR suppliers through 2026, with USD 12 billion in total committed market value—implying
      an average effective price of approximately USD 8,800 per tonne. This blended rate is skewed
      by early purchases at premium prices and will decline as volume grows. The Frontier AMC's
      USD 1 billion commitment by 2030 provides one anchoring data point for near-term committed
      demand. Climeworks' contracted pipeline of 380,000+ tonnes represents meaningful share
      of this nascent market but is tiny against climate targets.

      Climeworks' serviceable obtainable market (SOM) for 2025–2030 is constrained by physical plant
      capacity: Mammoth's 36,000 t/yr nameplate (with Gen2 only delivering ~105 t in 10 months),
      and Gen3 scale-up requiring USD 1–2 billion in additional capital. A realistic SOM for
      Climeworks through 2030 is 50,000–200,000 tonnes of actual delivered removal, generating
      USD 50–200 million in revenue—less than 1% of the USD 1.7 billion market forecast.
    claimRefs:
      - CM001
      - CM002
      - CM005
      - CM012
      - CM019
      - CM024
      - CM040
    tableRefs:
      - TM002
    figureRefs:
      - FM001
      - FM002
  - id: section-3
    title: Buyer Segmentation and Adoption Dynamics
    body: |
      The DAC buyer market currently concentrates among a small group of large, ESG-motivated
      corporate buyers. Microsoft has purchased more than 80% of all carbon removal credits
      issued globally, creating extreme buyer concentration risk. Frontier Climate (backed by
      Stripe, Shopify, Alphabet, McKinsey, and others) has committed USD 1 billion to permanent
      CDR by 2030, providing a structured demand anchor for Climeworks and peers.

      The primary buyer archetype is a large technology or financial corporation with: (1) a
      public 2030 or 2040 net-zero commitment; (2) a dedicated sustainability or environmental
      affairs team with budget authority; (3) ESG board reporting requirements under TCFD or
      EU CSRD; and (4) a preference for measurable, verifiable removal over avoidance offsets.
      BCG (80,000 tonnes through 2040) and Morgan Stanley (40,000 tonnes through 2037) exemplify
      this archetype. Financial sector buyers are growing, driven by PCAF financed emissions
      standards.

      The aviation sector represents an emerging growth segment: British Airways partnered with
      Climeworks in 2024 for carbon removal under CORSIA and voluntary commitments. EU ReFuelEU
      mandates and CSRD disclosure requirements are expected to accelerate aviation corporate
      demand for permanent carbon removal credentials.

      Sovereign buyers represent a nascent but potentially large segment via Article 6 of the
      Paris Agreement, which enables countries to transfer carbon removal credits internationally
      to meet NDC targets. Switzerland and Norway have already established bilateral arrangements
      for DACS credit trading. If Article 6 trading scales, government procurement could become
      the largest DAC demand source—but this market remains highly uncertain in 2025.

      Individual subscribers—Climeworks' 18,000+ retail customers paying ~USD 7–50/month—are
      economically marginal but provide brand awareness, early-adopter credibility, and a direct
      consumer touchpoint valuable for marketing and policy advocacy.
    claimRefs:
      - CM010
      - CM011
      - CM020
      - CM025
      - CM026
      - CM027
      - CM028
      - CM029
    tableRefs:
      - TM003
    figureRefs:
      - FM003
      - FM004
  - id: section-4
    title: Growth Drivers and Adoption Constraints
    body: |
      The most important near-term growth driver is regulatory: the US 45Q tax credit at
      USD 180/tonne for DAC with permanent storage (expanded in the 2022 IRA) dramatically
      improved the economics of US-based DAC projects. The EU Carbon Removals Certification
      Framework (provisional agreement February 2024) creates a common standard for EU DAC
      credit recognition. The UK CCUS package (GBP 20 billion) and Japan's DAC-eligible
      emissions trading scheme add further policy demand anchors.

      Corporate net-zero pledges under the Paris Agreement and SBTi framework drive organizational
      demand. The CDR market has benefited from the 2023–2024 VCM trust crisis, as buyers
      shifted away from discredited nature-based offset purchases toward permanent, measurable
      engineered removals with independent verification.

      The dominant adoption constraint is cost: at USD 1,000/tonne (individual) or USD 400–600/tonne
      (corporate), DAC is economically accessible only to highly motivated, well-capitalized buyers.
      The addressable buyer universe at current pricing is estimated at a few hundred large corporations
      globally. Energy intensity (1,500–2,000 kWh/tonne) makes location-specific access to low-cost
      renewable or geothermal power essential for economics. Climeworks' Iceland operations benefit
      from geothermal energy, but this is not replicable at global scale without significant innovation.

      The most acute near-term headwind is US policy uncertainty. The Trump administration's review
      and potential termination of DOE DAC Hub funding in 2025 threatens to remove USD 3.5 billion
      in federal support that was a cornerstone of the US DAC scaling plan. This directly affects
      Climeworks' Project Cypress (Louisiana) and represents both a near-term financial risk and
      a signal to corporate buyers that US policy support for DAC cannot be relied upon.
    claimRefs:
      - CM013
      - CM014
      - CM015
      - CM016
