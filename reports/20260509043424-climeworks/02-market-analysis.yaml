company:
  name: Climeworks
chapter:
  number: 2
  title: Market Analysis
  summary: |
    The addressable market for Climeworks spans the voluntary carbon removal (CDR) market,
    specifically its durable/permanent engineered removal segment anchored by direct air
    capture (DAC). The global DAC market stood at roughly USD 97.6 million in 2024 and is
    projected to reach USD 1.7 billion by 2030 at a 61% CAGR on strong climate policy and
    corporate net-zero tailwinds. The SAM is more constrained: actual committed corporate
    spend on durable CDR through 2030 totals roughly USD 1–2 billion, led by Frontier AMC
    and a handful of hyperscale buyers. Climeworks is the category creator but faces growing
    cost pressure, a concentration in few large buyers, US policy headwinds, and the risk
    that cost reductions arrive too late to capture an expanding but increasingly competitive
    permanent-CDR market.
localEvidence:
