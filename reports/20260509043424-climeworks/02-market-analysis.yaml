    - id: CM008
      statement: |
        Carbon capture and storage (CCS/DACS) is the dominant end-use application, holding
        78.27% of the DAC market in 2024. Carbon utilization—converting captured CO2 into
        fuels, chemicals, or materials—accounted for the remaining ~22% and represents an
        alternate revenue pathway that Climeworks has historically deprioritized in favor
        of permanent storage.
      type: third-party-reported
      topic: market segmentation
      confidence: medium
      freshness: current
