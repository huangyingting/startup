    - id: CM012
      statement: |
        CDR.fyi tracks total durable carbon removal deliveries across all suppliers at
        approximately 1.36 million tonnes cumulatively through H1 2026, representing a
        year-over-year increase of approximately 75%, with a total committed market value
        exceeding USD 12 billion.
