    - id: CM033
      statement: |
        EnkiAI analysis of Climeworks' 2025 market position identifies two critical market
        constraints: (1) actual DAC output (105 tonnes at Mammoth in 10 months) is so far
        below contracted volume that delivery credibility is at risk, and (2) corporate buyers
        are now requiring proof-of-delivery rather than forward purchase commitments, shifting
        market power from suppliers to buyers.
      type: third-party-reported
      topic: market risks
      confidence: medium
      freshness: current
      sourceRefs:
        - SM017
        - SM018
      answersQuestionRefs:
        - QM012
    - id: CM034
      statement: |
        Climeworks has publicly stated a Gen3 cost target of USD 400–600 per tonne by 2030,
        representing a 40–60% reduction from current pricing levels. Achieving this target
        would significantly expand the addressable market by making DAC competitive with
        high-quality nature-based removals and accessible to mid-market corporate buyers
        with smaller sustainability budgets.
      type: company-claimed
      topic: cost trajectory
      confidence: medium
      freshness: current
      sourceRefs:
        - SM018
        - SM019
      answersQuestionRefs:
        - QM004
    - id: CM035
      statement: |
        The voluntary carbon market experienced a trust crisis in 2023–2024 following published
        research questioning the effectiveness of major REDD+ forest protection projects sold
        by Verra, contributing to a 60%+ decline in issuance of low-quality nature-based
        offsets. This crisis paradoxically benefited high-integrity engineered removals like DAC
        by differentiating them from discredited products.
      type: third-party-reported
      topic: market drivers
      confidence: medium
      freshness: current
      sourceRefs:
        - SM009
      answersQuestionRefs:
        - QM005
    - id: CM036
      statement: |
        The Stratos DAC plant in Texas—operated by 1PointFive (Oxy subsidiary using Carbon
        Engineering liquid-DAC technology)—is designed for 500,000 tonnes/yr nameplate capacity
        when complete and has been described as a potential future 1 million tonne/yr operation.
        If Stratos achieves scale, it would represent approximately 14 times Mammoth's nameplate
        capacity, potentially shifting the competitive balance in DAC market share.
      type: third-party-reported
      topic: competitive landscape
      confidence: medium
      freshness: current
      sourceRefs:
        - SM004
        - SM003
      answersQuestionRefs:
        - QM010
    - id: CM037
      statement: |
        Climeworks faces substitution risk from two directions: (1) improved natural carbon sinks
        (reforestation, soil carbon) that may achieve better price/tonne ratios as standards improve;
        and (2) hard-to-abate industrial CO2 sources that offer point-source capture at $50–150/tonne,
        which buyers may prefer over atmospheric removal at $400–1,000/tonne for Scope 1 compliance.
      type: inferred
      topic: substitution risk
      confidence: medium
      freshness: current
      sourceRefs:
        - SM013
        - SM009
      answersQuestionRefs:
        - QM013
    - id: CM038
      statement: |
        The pipeline of 130+ planned DAC facilities globally as of 2024 (IEA) is dominated by
        US-based projects leveraging 45Q credits and DOE hub funding; the Trump administration's
        review of the DAC Hub program in 2025 created direct risk of project cancellations and
        a potential 40–60% reduction in planned US DAC capacity additions through 2030.
      type: inferred
      topic: market risks
      confidence: medium
      freshness: current
      sourceRefs:
        - SM015
        - SM003
      answersQuestionRefs:
        - QM012
    - id: CM039
      statement: |
        Geographic market expansion for Climeworks is constrained by geology and energy access:
        CO2 underground storage requires specific geological formations (basalt or saline aquifers),
        and Climeworks' current Iceland operations depend on Carbfix mineralization in basalt rock.
        Viable locations for new Climeworks plants are limited to geothermal-rich areas with
        suitable geology, including Kenya, Iceland, and potentially Norway, constraining the
        company's global footprint growth.
      type: inferred
      topic: market constraints
      confidence: medium
      freshness: current
      sourceRefs:
        - SM004
        - SM014
      answersQuestionRefs:
        - QM008
    - id: CM040
      statement: |
        The GeoCDR analysis of Climeworks' scale-up strategy calculates that to reach 1 Mt/yr
        of CO2 removal by 2030 at Gen3 economics (USD 400–600/t), Climeworks would need to
        deploy approximately 28 Gen3 cubes costing an estimated USD 1–2 billion in capital,
        implying a capital intensity of roughly USD 1,000–2,000 per annual tonne of nameplate
        capacity—substantially higher than current solar or wind power capital intensity.
      type: third-party-reported
      topic: market scaling
      confidence: medium
      freshness: current
      sourceRefs:
        - SM007
        - SM019
      answersQuestionRefs:
        - QM003
