      statement: |
        Solid-DAC (S-DAC), the technology category used by Climeworks (solid sorbents),
        held the largest revenue share of 56.73% in the DAC market in 2024, while
        liquid-DAC (L-DAC), used by Carbon Engineering/1PointFive, held the remaining ~43%.
