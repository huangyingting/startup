  - id: TM004
    title: Growth Drivers and Constraints Table
    columns:
      - Driver / Constraint
      - Direction
      - Timing
      - Implication for Climeworks
      - Diligence Ask
    rows:
      - - US 45Q tax credit ($180/t for DAC)
        - Driver
        - Active (2022–present)
        - Enables US project economics; critical for Project Cypress
        - Assess Trump administration 45Q policy risk; verify credit eligibility under Gen3
      - - EU Carbon Removals Certification Framework
        - Driver
        - Active (provisional 2024)
        - Creates EU standard for Climeworks credits; enables EU procurement
        - Track CRCF finalization timeline; confirm Climeworks' CRCF eligibility pathway
      - - UK CCUS package (£20B)
        - Driver
        - Active (2023–present)
        - Potential UK market expansion
        - Evaluate whether Climeworks is pursuing UK-based projects or buyers
      - - Corporate net-zero pledges (SBTi/TCFD)
        - Driver
        - Active and growing
        - Expands corporate buyer pool as 2030 targets approach
        - Quantify Climeworks' buyer pipeline in SBTi-committed companies
      - - VCM trust crisis shifting buyers to engineered CDR
        - Driver
        - Active (2023–present)
        - Demand pull toward Climeworks-type products
        - Monitor buyer substitution behavior; track ICVCM standards progress
      - - Trump administration DOE Hub review
        - Constraint
        - Active (2025–present)
        - Direct risk to Project Cypress funding; US market confidence
        - Track DOE termination status; assess $500M+ funding loss scenario
      - - DAC cost at ~$1,000/t individual / $400–600/t corporate
        - Constraint
        - Active; declining over time
        - Limits buyer universe; Gen3 must deliver cost cuts to expand SAM
        - Verify Gen3 cost targets; assess timeline risk for $400/t achievement
      - - Energy intensity (1,500–2,000 kWh/t CO2)
        - Constraint
        - Active; declining over time
        - Geothermal access in Iceland creates structural advantage but limits global replication
        - Assess energy supply chain for future sites; evaluate Kenya and Norway options
      - - Absence of standardized DAC credit verification
        - Constraint
        - Active; ICVCM in progress
        - Creates procurement friction; blocks some corporate accounting teams
        - Track ICVCM/Verra standard development for DAC; verify Climeworks' current certification body
      - - VCM price competition from cheap nature-based offsets
        - Constraint
        - Active; may ease as quality standards improve
        - Price anchors buyer expectations below DAC's actual cost
        - Monitor nature-based offset market; assess risk of buyers switching back post-VCM reform
    notes: |
      Timing reflects status as of the 2026-05-09 report date. The relative weight of drivers vs
      constraints will shift significantly depending on US policy trajectory and Gen3 deployment success.
