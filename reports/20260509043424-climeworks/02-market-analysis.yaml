    - id: CM003
      statement: |
        The International Energy Agency (IEA) identifies direct air capture as one of few
        technologies capable of removing CO2 from the atmosphere at scale and views it as
        essential for achieving the 2050 net-zero scenario, which requires removing roughly
        980 Mt CO2/yr from the atmosphere by mid-century.
      type: third-party-reported
      topic: market drivers
      confidence: high
      freshness: recent
      sourceRefs:
        - SM003
        - SM001
      answersQuestionRefs:
        - QM003
    - id: CM004
      statement: |
        As of late 2024, the IEA counted 27 DAC plants commissioned globally across Europe,
        North America, Japan, and the Middle East. Only three of those plants were capturing
        1,000 tonnes of CO2 per year or more: Climeworks' Orca in Iceland, the Global
        Thermostat headquarters plant in Colorado, and Heirloom's first large-scale facility
        in California.
      type: third-party-reported
      topic: competitive landscape
      confidence: high
      freshness: current
      sourceRefs:
        - SM003
        - SM004
      answersQuestionRefs:
        - QM010
    - id: CM005
      statement: |
        The IEA projects that if all currently planned DAC projects proceed and achieve full
        nameplate capacity, global DAC capture would reach approximately 3 Mt CO2 per year
        by 2030. This is more than 500 times the current capture rate but less than 5% of
        the 80 Mt CO2/yr needed to align with the IEA's Net Zero by 2050 scenario.
      type: third-party-reported
      topic: market sizing
      confidence: medium
      freshness: current
      sourceRefs:
        - SM003
      answersQuestionRefs:
        - QM001
        - QM003
