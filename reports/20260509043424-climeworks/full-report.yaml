  - id: TV006
    title: Final Diligence Asks Table
    columns:
      - Diligence Ask
      - Why It Matters
      - Expected Disclosure Level
      - Red Flag if...
    rows:
      - - What is the root cause of Mammoth's container activation failure?
        - Determines probability of recovery and Gen3 design risk
        - Should be disclosable to Series D investors under NDA
        - Vague or refuses to explain root cause; no clear fix pathway
      - - What is the status of Project Cypress and what is the plan B if DOE cancels?
        - Determines US scale-up financial resilience
        - Management should have a contingency plan
        - No plan B; entirely dependent on DOE; no alternative capital sources
      - - What is the full cap table, preference stack, and investor rights at Series D entry?
        - Determines return profile and exit priority
        - Standard due diligence disclosure
        - Preference overhang >3× invested capital; complex anti-dilution provisions
      - - Has any customer indicated reduced commitment or exit? What is the force majeure status of all contracts?
        - Determines retention risk and contractual exposure
        - Management should know all customer status; may be confidential
        - Any undisclosed customer in dispute or contract renegotiation
      - - >-
          What is the Gen3 commercial plant CapEx estimate and what financing structures (debt, green bonds, 45Q) are
          being pursued?
        - Determines Gen3 capital efficiency and dilution risk
        - Should have preliminary estimates for Gen3 financial model
        - No non-equity capital plan; entirely dependent on equity raises for Gen3
      - - What is the post-layoff voluntary attrition rate and who are the critical technical team members?
        - Determines execution capacity and key person risk
        - HR data typically not fully disclosed but trends should be shared
        - Significant attrition in Mammoth repair team; co-founder departure signals
    notes: |
      These diligence asks should be posed in a Series D due diligence process. Answers to these
      questions would be the most important determinants of whether the CONDITIONAL WATCH
      recommendation should be upgraded to a BUY or downgraded to AVOID.
    claimRefs:
      - CV025
