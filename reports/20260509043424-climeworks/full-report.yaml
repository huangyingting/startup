  productSummary: |
    Climeworks' core product is verified permanent CO2 removal credits (CORCs) delivered via its
    proprietary DAC-plus-mineralization system: (1) amine-functionalized solid sorbent filters
    capture CO2 from ambient air; (2) CO2 is desorbed by low-temperature heat; (3) CO2 is
    permanently injected and mineralized in basalt rock via Carbfix. Gen2 plants (Orca, Mammoth)
    use modular container-based collector units. Gen3 technology uses a cube design (26×26×22.5m)
    with structured sorbents targeting 2× throughput and 0.5× energy vs. Gen2. Credits are
    certified by Puro.earth (CORC standard) and Climeworks is the first DAC company to achieve
    Puro certification. Individual subscribers access CORCs via monthly subscription; corporates
    sign multi-year forward purchase agreements.
  customerFocus: >-
