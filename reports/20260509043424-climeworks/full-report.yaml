      - number: '7.3'
        title: Financial, Partner, and Execution Risk
        blocks:
          - type: paragraph
            body: |
              Climeworks' financial risk centers on the capital intensity gap between current runway and
              Gen3 commercial deployment requirements. The $162M January 2025 raise provides 12–24 months
              of runway at $80–150M/yr burn; Gen3 commercial plants require $300–500M per plant, implying
              $8–14B in total CapEx to reach 1 Mt/yr by 2030. Without project finance structures (green
              bonds, development bank debt, tax credits), this capital requirement is unreachable through
              equity alone. A failed fundraise or down round would severely constrain Gen3 deployment.

              Partner risks are concentrated and not easily substitutable: Carbfix is the sole CO2 storage
              partner at Iceland operations—any Carbfix disruption halts all CDR delivery. Swiss Re's
              triple role (investor, customer, insurer) creates a correlated concentration risk: if Swiss
              Re's financial position deteriorates due to climate-related catastrophic claims, its capacity
              to backstop CDR delivery insurance may be impaired exactly when DAC demand is theoretically
              highest. Avantium's role in sorbent screening creates a minor R&D dependency.

              Investor concentration in Partners Group and GIC creates the risk that a change in either
              institution's clean-energy allocation strategy could leave Climeworks without a committed
              lead investor at its next funding round. The 22% layoff, occurring while the flagship plant
              underperforms, sends a signal that may make attracting new institutional investors more
              difficult. Key person execution risk is elevated: with co-founders Christoph Gebald and
              Jan Wurzbacher holding the company together through a period of simultaneous plant failure,
              layoffs, and political headwinds, co-founder attrition would be uniquely damaging. No
              succession plan is publicly disclosed.
