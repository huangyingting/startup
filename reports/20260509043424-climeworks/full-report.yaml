      - number: '1.4'
        title: Business Model, Customers, and Commercial Traction
        blocks:
          - type: paragraph
            body: |
              Climeworks operates a B2B subscription and long-term purchase model for verified permanent
              carbon dioxide removal services. Corporate customers pay per tonne of CO2 removed and
              permanently stored underground, with individual subscriber pricing at approximately USD 1,000
              per tonne. This price point is approximately 13x above European compliance carbon credit
              prices, situating Climeworks firmly in the high-quality voluntary premium carbon removal market.

              The company's customer base spans 160+ corporate entities across technology, finance, aviation,
              consulting, and insurance sectors. Landmark multi-year offtake agreements include BCG's
              15-year, 80,000-tonne deal (December 2023, the largest single corporate purchase to date),
              Morgan Stanley's 40,000-tonne agreement through 2037 (October 2024, Morgan Stanley's first
              DAC credit purchase), and an undisclosed volume with JPMorgan Chase. British Airways joined
              as the first aviation sector customer in September 2024. Frontier Climate—an advance market
              commitment backed by Stripe, Shopify, Alphabet, and McKinsey—channels catalytic purchases
              from tech giants toward Climeworks and other high-potential DAC suppliers.

              As of mid-2025, Climeworks has secured over 380,000 contracted tonnes of removal across its
              customer base and holds 421 purchase orders—more than any other DAC supplier—according to
              CDR.fyi. It accounts for ~81% of all DAC tonnes actually delivered globally. However, the
              gap between contracted volumes and actual deliveries remains enormous: only 1,186 total tonnes
              had been delivered industry-wide as of H1 2025, representing 0.05% of total contracted volumes.
              Climeworks also offers blended portfolios through Climeworks Solutions, combining its own
              engineered removals with nature-based and third-party solutions to meet near-term corporate
              demand while the pure DAC supply scales up.
