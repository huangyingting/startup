      - number: '3.2'
        title: Competitor Profiles and Technology Comparison
        blocks:
          - type: paragraph
            body: |
              1PointFive uses Carbon Engineering's L-DAC technology: a two-step process drawing air
              through a potassium hydroxide (KOH) scrubbing tower, then heating the captured solution
              in a calciner at ~900°C to regenerate and release pure CO2. Oxy acquired Carbon Engineering
              in 2023 for approximately USD 1.1 billion, providing 1PointFive with deep capex resources,
              50+ years of CO2 injection expertise (from enhanced oil recovery), and 6 billion tonnes of
              secured geologic storage capacity. Stratos in West Texas is the flagship L-DAC deployment,
              designed for 500,000 t/yr—14× Mammoth's nameplate.

              Heirloom Carbon uses a fundamentally different mechanism: it heats limestone (calcium
              carbonate) to drive off CO2 from the rock, then exposes the reactive lime (calcium oxide)
              to ambient air, where it naturally re-absorbs CO2 over days. Heirloom claims lower energy
              intensity than sorbent-based systems because it relies on the thermodynamics of limestone
              rather than proprietary sorbent regeneration. The California commercial plant is active;
              two Louisiana facilities are planned for ~320,000 t/yr combined, using 100% additional
              renewable energy.

              The technology comparison favors Climeworks on several dimensions: S-DAC operates at lower
              regeneration temperatures (~100°C vs. 900°C for L-DAC calciner), making geothermal integration
              more efficient; the modular cube design enables learning-curve improvements per unit; and the
              solid sorbent material can be continuously improved. However, L-DAC may be more scalable in
              geographies with abundant natural gas for calciner heat, while Heirloom's limestone approach
              avoids proprietary sorbent supply chain dependency entirely.

              All three technologies share the same fundamental challenge: none has yet demonstrated
              consistent large-scale operation at planned nameplate capacity. This shared execution gap
              means the competitive race is as much about organizational and operational excellence as
              technology differentiation.
