chapters:
  - number: 1
    title: Company Overview
    sections:
      - number: '1.1'
        title: Founding, History, and Corporate Structure
        blocks:
          - type: paragraph
            body: |
              Climeworks AG was founded in 2009 by mechanical engineers Christoph Gebald and Jan Wurzbacher,
              who met during their PhD studies at ETH Zurich. Their doctoral research on direct air capture
              technology—extracting CO2 directly from the atmosphere—formed the scientific foundation of the
              company. Climeworks was spun out of ETH Zurich as a university start-up, a rare distinction
              that gave it academic credibility and early institutional support.

              In 2011, the company received its first external capital, which funded development of a modular
              prototype. By 2014, Climeworks had produced a working modular CO2 collector demonstrating
              progression from laboratory bench to commercial-scale engineering. The company's first
              commercial plant opened in Hinwil, Switzerland in May 2017 on the rooftop of a waste
              incineration facility, using 18 collector containers with a combined capacity of approximately
              900 tonnes of CO2 per year. The captured CO2 was sold to a nearby greenhouse operator and to
              Coca-Cola HBC for use in Valser sparkling water. In October 2017, Climeworks launched the
              CarbFix2 demo project in Iceland, exploring underground mineralization of CO2 with partner
              Carbfix. This pivotal experiment shaped Climeworks' future direction: transitioning from CO2
              utilization to permanent underground storage. The Hinwil facility closed in October 2022 as
              Climeworks fully embraced the storage-first model.

              The company is headquartered in Zurich, Switzerland with a German subsidiary in Cologne. Its
              board includes co-founders Dr. Gebald and Mr. Wurzbacher (co-CEOs), Alfred Gantner (co-founder
              of Partners Group), Dr. Ulf Berg, Dr. Martin Burkhardt, Syrie Crouch, and Dr. Maurits van Tol.
              As of early 2025, Climeworks employs approximately 377 people after laying off 106 (22%) in
              May 2025.
