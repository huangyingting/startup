      - number: '1.3'
        title: Operational Plants and Performance
        blocks:
          - type: paragraph
            body: |
              Climeworks' operational history centers on two large-scale plants in Iceland, both located
              adjacent to the Hellisheiði geothermal power station, which provides renewable energy to
              power the DAC process.

              The Orca plant (named after the Icelandic word for energy) launched in September 2021 with
              a nameplate capacity of 4,000 tonnes of CO2 per year. Despite being a landmark achievement—
              the world's first large-scale commercial DAC and permanent storage facility—Orca has never
              captured more than 1,000 tonnes in any calendar year. In 2024, Orca operated approximately
              65% of the time, with downtime attributed to planned maintenance on the geothermal power plant
              that supplies its energy. The co-CEO described the 4,000-tonne figure as analogous to "a car's
              top speed: the maximum possible." Climeworks has decided not to significantly invest further
              in Orca, as the capture technology is now considered outdated.

              Mammoth, inaugurated in May 2024, was designed as a tenfold scale-up with a 36,000-tonne
              annual nameplate capacity. However, in its first approximately 10 months of operation, Mammoth
              captured only ~105 tonnes of CO2—less than 1% of its design capacity. The root cause was
              filter performance issues identified during prototype testing at Orca in 2023. Rather than
              waiting indefinitely for a fix, Climeworks deployed what the COO described as a "band-aid"
              approach and proceeded with construction, but the same filter problems resurfaced at scale.
              As of early 2025, only 12 of the plant's 72 planned collector containers were fully operational.
              Climeworks has indicated that Mammoth is expected to enter a three-year ramp-up phase, with
              full operational capacity not expected until the late 2020s.

              These underperformance challenges have attracted significant adverse media coverage, including
              reporting by the Icelandic outlet Heimildin and Bloomberg, which noted that Climeworks' plants
              were capturing only a fraction of their stated capacities and had not yet offset their own
              operational and construction-related CO2 emissions.
