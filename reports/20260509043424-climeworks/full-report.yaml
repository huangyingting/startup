      - number: '5.3'
        title: Operational Maturity, Adverse Technology Findings, and Deployment Roadmap
        blocks:
          - type: paragraph
            body: |
              Climeworks' operational maturity is split: Gen2 (Orca) is at TRL 9 with 3+ years of
              continuous commercial operation; Mammoth (also Gen2) is at TRL 8 but operationally
              impaired (12 of 72 containers active). Gen3 is at TRL 6–7 (full-scale prototype tested
              but not commercially deployed).

              The most adverse technology finding is Mammoth's container failure rate: if 60 of 72
              modular units fail to operate in Iceland's controlled environment with 3+ years of
              operational learning from Orca, what does this imply for Gen3 cube deployment in
              Louisiana (different energy source, different climate, different geology)? This question
              has no public answer and represents the single highest-severity technology risk in this
              diligence.

              The Gen3 Louisiana plant (Project Cypress) is planned to begin construction in 2026
              and would be the first commercial Gen3 deployment—a major demonstration of whether
              the Basel validation translates to commercial reliability. Additional sites in Norway,
              Kenya, and Canada are in earlier stages, each requiring local energy and storage
              adaptation. Orca continues to operate as a steady-state Gen2 reference facility.

              Climeworks' partnership with Avantium (Q1 2025) for high-throughput sorbent material
              screening accelerates the next generation of material candidates beyond Gen3, reducing
              R&D cycle time. The company's IP portfolio (patent EP3034149B1 and others) covers key
              sorbent formulations and process configurations, creating a 5–10 year replication barrier.
