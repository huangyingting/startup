      - number: '8.2'
        title: Bull/Base/Bear Scenarios and Investment Thesis
        blocks:
          - type: paragraph
            body: |
              Climeworks' valuation is highly scenario-dependent, with a wide distribution of outcomes:

              **Bull case (20% probability, fair value $2–5B):** Mammoth achieves >50/72 containers by
              Q4 2025, Gen3 commercial plant groundbreaking in 2026, Project Cypress receives DOE
              funding confirmation, and a Series D raises >$500M at $2B+ post-money. Revenue reaches
              $30M+ by 2028 (partial Gen3 delivery) and $300M+ by 2031–2032. At 5–8× 2032 revenue,
              fair value = $1.5–2.4B at 2028 and $6–12B at 2032; discounted to today at 30%: $2–5B.
              Key 45Q tax credits ($6.5M/yr/plant at 36,000 t/yr) provide meaningful non-dilutive cash.

              **Base case (50% probability, fair value $800M–$1.5B):** Mammoth achieves 30–50/72
              containers, Gen3 begins 2028–2029, Project Cypress delayed. Contracted backlog ($2.4B
              face value, 60% delivery discount = $960M PV) plus IP option value ($500–800M on
              Carbon Engineering comp) yields SOTP of $1.4–1.8B—but discounted for dilution and
              runway gap, fair value is $800M–$1.5B.

              **Bear case (30% probability, fair value $200–500M):** Mammoth cannot be repaired,
              Cypress cancelled, down round in 2026. Distressed asset value (IP + contracts + team)
              drives recovery; existing Series C investors face 75–80% impairment. An oil major
              acquisition at distressed pricing ($200–500M) is the primary recovery scenario.

              The investment thesis is that Climeworks holds a uniquely valuable option on the DAC
              market—one that no competitor can acquire for less than several hundred million dollars
              of investment and 5+ years of operational learning. Even in the bear case, the technology
              and customer base retain significant strategic value for an acquirer.
