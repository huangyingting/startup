      - number: '7.4'
        title: Mitigations, Monitoring Indicators, and Thesis-Break Triggers
        blocks:
          - type: paragraph
            body: |
              Climeworks' primary risk mitigations are: (1) Gen3 technology as the path to escaping
              Gen2 cost and reliability constraints; (2) the $162M January 2025 raise, which extends
              runway through the critical Gen3 validation period; (3) Swiss Re's insurance backing,
              which maintains customer confidence in CDR delivery quality; (4) geographic and customer
              diversification (Gen3 sites in 5+ countries; 160+ customers across 7 verticals). These
              mitigations are real but insufficient against the worst-case scenario of simultaneous
              Mammoth failure and Project Cypress defunding.

              Key monitoring indicators for investors: (1) Mammoth active container count (target: 72/72
              by end of 2025); (2) Project Cypress DOE funding status (watch for official pause/cancellation
              notice); (3) Climeworks' next fundraise (conditions and valuation will signal whether
              investors believe the Gen3 story); (4) Gen3 commercial plant groundbreaking date; (5)
              post-layoff voluntary attrition rate in technical staff; (6) any public customer communication
              about contract modifications.

              Thesis-break triggers: the single most important thesis-break is if Mammoth's container
              count does not improve materially by Q4 2025—suggesting the Gen2 architecture has a
              structural flaw that Gen3 must avoid, at the cost of delay. The second thesis-break is
              Project Cypress losing DOE funding and no alternative capital being announced within 6
              months. The third is a customer publicly reducing or exiting a commitment, signaling
              that the social contract ("we will build it if you buy it") has been broken.
            claimRefs:
              - CR030
              - CR031
              - CR032
  - number: 8
    title: Valuation
    sections:
      - number: '8.1'
        title: Valuation Context, Implied Pricing, and Comparable Transactions
        blocks:
          - type: paragraph
            body: |
              Climeworks' implied post-money valuation from the April 2022 Series C ($650M) is estimated
              at $1–2B based on industry press coverage describing the round as a "unicorn" level raise.
              The January 2025 $162M raise was notably smaller (75% smaller round size) and did not
              disclose a new valuation; in the context of Mammoth's underperformance, this smaller round
              may represent either (a) deliberate capital efficiency or (b) reduced institutional appetite—
              both consistent with flat or down-round pricing.

              The best publicly available M&A comparable is Occidental's $1.1B acquisition of Carbon
              Engineering (August 2023), which was a pre-commercial DAC technology company with no
              delivered tonnes and only pilot-scale validation. Climeworks, with a 4-year commercial
              delivery track record (Orca), a larger customer book, and Gen3 validated technology, would
              theoretically command a premium to Carbon Engineering's acquisition price in a fully
              functioning M&A market. However, Mammoth's failure creates a significant discount risk.

              No pure-play public DAC company exists, making market-multiple comparisons difficult.
              Deep-tech climate infrastructure companies trade at 5–15× projected revenue (not current
              revenue) in the bull case; at Climeworks' current ~$2M delivered revenue run rate, a
              10× multiple implies only $20M enterprise value—demonstrating why the valuation is entirely
              a function of option value, not current metrics. Heirloom Carbon ($200–300M implied at
              $50M raise in 2022) and Sustaera (undisclosed seed) are smaller comps with less operational
              track record than Climeworks, reinforcing Climeworks' premium positioning.
            claimRefs:
              - CV001
              - CV002
              - CV009
