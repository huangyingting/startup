      - number: '5.2'
        title: 'Technology Architecture: Generation 2, Generation 3, and the Storage Layer'
        blocks:
          - type: paragraph
            body: |
              Climeworks' technology stack has three layers: (1) the solid-sorbent DAC system (proprietary);
              (2) the modular hardware platform (cubes, fans, heat exchangers); and (3) the CO2 storage
              system (Carbfix partnership). Each layer is critical; a failure in any one prevents carbon
              removal credit delivery.

              The core chemistry is temperature-swing adsorption (TSA): amine-functionalized sorbent
              captures CO2 from air at ambient temperature, then releases concentrated CO2 when heated
              to ~100°C with steam. This low-temperature regeneration is the key advantage over L-DAC
              (Carbon Engineering), which requires 900°C calciner temperature. Gen2 uses packed filter
              beds; Gen3 replaces these with structured sorbent materials that increase surface contact,
              halving cycle time and doubling throughput per module.

              Gen3 was validated in June 2024 at Climeworks' Basel testing facility after 5,000
              capture-release cycles and 15,000 R&D hours by 50 dedicated specialists from the
              company's 180-person R&D organization. The Gen3 cube format (26×26m, 22.5m tall) is
              a hardware redesign that improves manufacturing standardization vs. the stacked containers
              of Gen2.

              Carbfix's Iceland storage layer provides a permanent, measurable storage mechanism:
              CO2-rich water is injected into basaltic rock at 400–800m depth, where it mineralizes
              into calcite within 1–2 years as independently verified by geochemical tracers. This
              makes Climeworks' combined product uniquely verifiable compared to any nature-based
              or utilization-based CDR alternative.
