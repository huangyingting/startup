  - number: 5
    title: Product & Technology
    sections:
      - number: '5.1'
        title: Product Definition and Customer Workflow
        blocks:
          - type: paragraph
            body: |
              Climeworks' primary product is a carbon removal certificate (CORC) representing one metric
              tonne of CO2 permanently removed from the atmosphere and stored underground for thousands
              of years. The customer-facing workflow is: (1) sign a forward purchase agreement; (2)
              Climeworks captures CO2 from ambient air using its solid-sorbent system; (3) Carbfix
              injects the CO2 into Iceland basalt rock, where it mineralizes within 1–2 years; (4)
              Puro.earth independently verifies each tonne and issues a CORC; (5) the customer receives
              CORCs usable in CDP submissions, SBTi compliance reports, and GHG Protocol Scope 3
              accounting.

              The product has four key quality dimensions: (1) permanence—basalt mineralization locks
              CO2 for thousands to millions of years, verified by geochemical tracers; (2) measurability—
              continuous plant sensor data and geological injection records enable tonne-level accounting;
              (3) additionality—each CORC represents net new CO2 removal, not avoided emissions or
              sequestration of existing sinks; (4) sustainability—the system runs on near-zero-carbon
              geothermal energy in Iceland.

              Climeworks has expanded its product offering with a blended CDR portfolio (DAC + biochar +
              enhanced weathering), allowing corporate buyers to achieve larger removal volumes at lower
              blended cost while maintaining DAC in the mix for quality credibility. The maritime deal
              with Mitsui O.S.K. Lines (13,400 tonnes, 2025) demonstrates the product's applicability
              to decarbonization strategies across new industry verticals.
