  - number: 3
    title: Competitors
    sections:
      - number: '3.1'
        title: 'Competitive Landscape: Direct DAC Peers and Adjacent Substitutes'
        blocks:
          - type: paragraph
            body: |
              The direct air capture (DAC) market had approximately 150 companies globally as of early
              2025 (WRI), but the commercial tier is narrow: only Climeworks and potentially 1PointFive
              have demonstrated continuous commercial DAC+storage operations at large scale. The landscape
              divides into three competitive tiers: (1) commercial-scale operators (Climeworks, 1PointFive);
              (2) well-funded scale-up entrants (Heirloom); and (3) pre-commercial/research companies
              (Global Thermostat, CarbonCapture Inc., and dozens of academic spin-offs).

              Beyond direct DAC peers, Climeworks faces substitution competition from nature-based carbon
              offsets (REDD+, reforestation, soil carbon) at USD 5–30/tonne—a 30–200x price discount to
              Climeworks' USD 1,000/tonne individual rate. While the VCM integrity crisis of 2023–2024
              shifted some premium buyers toward permanent CDR, nature-based offsets retain the overwhelming
              majority of the voluntary carbon market by volume. BECCS and point-source CCS represent
              additional substitutes for specific buyer use cases, though regulatory differentiation under
              SBTi and VCMI increasingly favors atmospheric removal (where Climeworks operates) over
              Scope 1 abatement (where CCS competes).

              The competitive dynamic is characterized by enormous scale ambition against a backdrop of
              widespread operational underperformance: 1PointFive targets 55,300 kt/yr by 2030 vs.
              Climeworks' 1,300 kt/yr, yet both companies' current plants are capturing at tiny fractions
              of nameplate. This shared execution gap creates unusual competitive conditions—both companies
              market their future scale while competing on the modest foundation of current delivery.
            claimRefs:
