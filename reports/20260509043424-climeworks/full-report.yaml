      - number: '8.3'
        title: Entry Discipline, Exit Readiness, and Recommendation
        blocks:
          - type: paragraph
            body: |
              Climeworks' RECOMMENDATION is CONDITIONAL WATCH. The rationale: the risk-adjusted return
              profile at current implied valuation ($1–2B) is unattractive for new investors given
              the binary nature of the Mammoth recovery question. A 30% discount to implied Series C
              pricing ($700M–$1.4B entry) would provide 3–4× return in the bull case with acceptable
              downside. New investors should wait for Q4 2025 Mammoth operational data before committing
              at any price above $700M post-money.

              For existing investors (Series C and prior): HOLD. The cost of exit today (forced into
              a secondary transaction at distressed pricing given lack of liquidity) is worse than
              holding and monitoring for Mammoth recovery. The January 2025 raise's runway extends
              through early 2026–2027, providing time for the primary thesis-check (Mammoth container
              count) to resolve.

              Exit readiness is LOW: no IPO pathway in the next 3–5 years given pre-revenue status.
              Strategic M&A (oil major, industrial company) is possible at $800M–$2B in the base
              case and $200–500M in the bear case. Secondary transactions represent the only near-term
              liquidity path for existing investors. The five final diligence asks (Mammoth root cause,
              Cypress plan B, cap table, customer retention, Gen3 CapEx financing) are essential before
              any new investment decision.
