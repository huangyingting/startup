      - - 5. Underground injection
        - Carbfix
        - Inject CO2-rich water into basaltic rock at 400-800m depth
        - CO2 begins mineralizing into calcite
        - Injection pressure/volume; geochemical tracers
      - - 6. Mineralization verification
        - Carbfix + independent geologists
        - Monitor geochemical changes; confirm CO2 conversion to calcite within 1-2 years
        - Permanence confirmed
        - Tracer measurements; independent geochemical analysis
      - - 7. CORC issuance
        - Puro.earth
        - Issue Carbon Removal Certificate for verified tonne
        - CORC in buyer's registry account
        - Puro Standard audit; plant + geological data
      - - 8. ESG reporting integration
        - Corporate buyer
