      - number: '7.2'
        title: Regulatory, Legal, and Political Risk
        blocks:
          - type: paragraph
            body: |
              Climeworks faces a multi-jurisdictional regulatory risk landscape that is more complex than
              almost any other climate tech company. In the US: Project Cypress (Louisiana) requires
              DOE discretionary approval, EPA UIC Class VI permits (historically 2–5 years), and Louisiana
              DEQ environmental permits. Under the Trump administration's review of clean energy programs,
              Project Cypress' up to $500M+ in DOE funding is at risk of pause, reduction, or cancellation.
              This is Climeworks' primary US scale-up vehicle; loss of DOE support would require replacing
              government capital with private capital at materially less favorable terms.

              In the EU: the Carbon Removals Certification Framework (CRCF) became effective in 2024
              and is still being finalized through delegated acts. Climeworks must ensure its MRV
              methodology (Puro.earth/CORC certification) aligns with CRCF permanence, additionality,
              and monitoring requirements. If CRCF's delegated acts introduce requirements that Climeworks'
              current methodology does not meet (e.g., 1,000-year storage permanence vs. 100-year, or
              stricter additionality tests), Climeworks would need to update its certification methodology
              and potentially re-certify delivered credits.

              Article 6.4 of the Paris Agreement creates additional complexity for international CDR credit
              trading: Corresponding Adjustments requirements could limit the markets in which Climeworks'
              credits can be counted. Iceland's environmental permitting for CO2 injection volume expansion
              creates regulatory dependency that could slow Mammoth repair at full capacity. IP risk is
              real but long-term: core patent EP3034149B1 expires ~2034; freedom-to-operate for Gen3
              structured sorbents in jurisdictions with different patent landscapes (US, EU, Japan) requires
              ongoing IP monitoring.
