      - number: '2.2'
        title: 'Market Sizing: TAM, SAM, and SOM with Multiple Lenses'
        blocks:
          - type: paragraph
            body: |
              The DAC market is very small today relative to ambitions. Grand View Research estimated the
              global DAC market at USD 97.56 million in 2024, projecting a compound annual growth rate
              (CAGR) of 61.15% to reach USD 1.699 billion by 2030. MarketsandMarkets reached a near-identical
              estimate of USD 1.727 billion by 2030 at 60.9% CAGR. These analyst forecasts capture investment
              flows and planned capacity buildout but are based on announced projects that face significant
              execution risk.

              The IEA provides a more sobering lens. As of 2024, all 27 operational DAC plants globally
              captured less than 0.01 Mt CO2 per year—far below the 80 Mt CO2/year required to align with
              the Net Zero by 2050 (NZE) scenario. If all 130+ planned DAC projects proceed at full nameplate
              capacity by 2030, total global DAC output would reach only ~3 Mt CO2/yr—less than 4% of the
              climate target. This execution gap is the single most important fact for assessing the DAC
              market's near-term reality.

              From a buyer demand lens, CDR.fyi tracks 1.36 million cumulative tonnes delivered across all
              durable CDR suppliers through 2026, with USD 12 billion in total committed market value—implying
              an average effective price of approximately USD 8,800 per tonne. This blended rate is skewed
              by early purchases at premium prices and will decline as volume grows. The Frontier AMC's
              USD 1 billion commitment by 2030 provides one anchoring data point for near-term committed
              demand. Climeworks' contracted pipeline of 380,000+ tonnes represents meaningful share
              of this nascent market but is tiny against climate targets.

              Climeworks' serviceable obtainable market (SOM) for 2025–2030 is constrained by physical plant
              capacity: Mammoth's 36,000 t/yr nameplate (with Gen2 only delivering ~105 t in 10 months),
              and Gen3 scale-up requiring USD 1–2 billion in additional capital. A realistic SOM for
              Climeworks through 2030 is 50,000–200,000 tonnes of actual delivered removal, generating
              USD 50–200 million in revenue—less than 1% of the USD 1.7 billion market forecast.
            claimRefs:
              - CM001
              - CM002
              - CM005
