      - number: '1.2'
        title: Capital Raises, Valuation, and Investor Base
        blocks:
          - type: paragraph
            body: |
              Climeworks has raised more than USD 1 billion in total equity funding since inception, making
              it the best-funded pure-play carbon removal company globally. The company's funding trajectory
              mirrors the maturation of the climate tech investment landscape.

              The landmark fundraising event was an April 2022 Series C round of CHF 600 million
              (approximately USD 650 million), co-led by Partners Group and the Singapore sovereign wealth
              fund GIC. Additional investors included Baillie Gifford, Carbon Removal Partners, Global
              Founders Capital, M&G Investments, and Swiss Re. This round classified Climeworks as a unicorn
              (valuation exceeding USD 1 billion), a rare designation in the carbon removal sector. The
              funding was earmarked to scale DAC capacity to multi-million-tonne levels and finance the
              construction of Mammoth, Climeworks' second Iceland plant.

              In 2025, Climeworks secured an additional USD 162 million—the single largest carbon removal
              investment globally that year—led again by BigPoint Holding and Partners Group, with
              participation from existing investors. This raise brought total funding to over USD 1 billion
              and was described by the company as critical for advancing Generation 3 technology, expanding
              its carbon removal portfolio, and reducing per-tonne costs. Despite this capital infusion,
              the company simultaneously announced significant workforce reductions in May 2025, indicating
              that the raise was aimed at extending runway toward profitability rather than accelerating
              headcount growth.

              Co-CEO Jan Wurzbacher has publicly stated the company continues to seek acquisitions of
              smaller DAC startups that fail to secure their next funding round, suggesting an opportunistic
              consolidation strategy in the broader DAC sector.
