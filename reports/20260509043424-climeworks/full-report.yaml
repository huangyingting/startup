      - number: '4.4'
        title: Capital Adequacy, Adverse Scenarios, and Financial Verdict
        blocks:
          - type: paragraph
            body: |
              Climeworks' estimated annual cash burn of USD 80–150 million implies the USD 162M 2025 raise
              provides approximately 12–24 months of runway. This makes the period from mid-2026 to late-
              2026 a critical financial window: Climeworks must either (1) demonstrate Mammoth performance
              improvement sufficient to support a credible Series D; (2) close additional DOE funding or
              European public capital; or (3) pursue project finance if contracted cash flows are bankable.

              The DOE Project Cypress risk is the most material single capital event: if the USD 500M+
              federal grant is cancelled under the Trump administration, Climeworks loses access to a
              substantial block of non-dilutive capital and must replace it with equity—likely at worse
              terms given the operational challenges. This would accelerate the capital-raise timeline and
              potentially trigger down-round risk.

              The adverse scenario is stark: Mammoth remaining below 5% capacity utilization through
              2026 + Project Cypress cancellation + competitive pressure from Stratos/Heirloom = potential
              distress financing at a lower valuation than the implied $1B+ from prior rounds. The favorable
              scenario is equally plausible: Mammoth improves to 30% capacity in 2025, Gen3 commercial
              deployment begins in 2026, and the Series D closes at $300M+ on improved operational data.

              Financial verdict: Climeworks has a fundamentally sound revenue model (long-term demand,
              recurring subscriptions, high WTP from premium buyers) but is operationally pre-revenue
              relative to its cost base, burning capital against a delivery gap that must close to justify
              further capital deployment. Independent financial diligence requires a full data room.
