    - type: private-evidence-only
      description: |
        Climeworks' cap table, preference stack, primary round pricing terms, and secondary
        market transaction prices are not publicly disclosed. The implied post-money valuations
        are estimates based on press reporting, not audited disclosures. Actual dilution,
        preference terms, and liquidation preference waterfalls are unknown. The comparable
        valuation table (TV004) is limited to publicly disclosed or press-reported transactions;
        many private round valuations are not confirmed figures.
      relatedQuestionRefs: [QV028]
      relatedTableRefs: [TV004]

    - type: access-blocked
      description: |
        Project Cypress' detailed financial modeling (DOE funding structure, equity vs. debt
        components, construction budget, 45Q allocation method) is not publicly available as
        of the report date. DOE OCED has not released detailed funding term sheets.
      relatedQuestionRefs: [QV010]

    - type: stale
      description: |
        CDR credit spot pricing and secondary market transaction data changes rapidly. The
        CDR.fyi tracker provides the most current data but reflects a thin market with limited
        price discovery. Actual corporate contract pricing is not public; $400–600/t estimates
        are inferences from industry reporting.
      relatedQuestionRefs: [QV002]

sections:
  - id: section-1
    title: "Valuation Context, Implied Pricing, and Comparable Transactions"
    body: |
      Climeworks' implied post-money valuation from the April 2022 Series C ($650M) is estimated
      at $1–2B based on industry press coverage describing the round as a "unicorn" level raise.
      The January 2025 $162M raise was notably smaller (75% smaller round size) and did not
      disclose a new valuation; in the context of Mammoth's underperformance, this smaller round
      may represent either (a) deliberate capital efficiency or (b) reduced institutional appetite—
      both consistent with flat or down-round pricing.

      The best publicly available M&A comparable is Occidental's $1.1B acquisition of Carbon
      Engineering (August 2023), which was a pre-commercial DAC technology company with no
      delivered tonnes and only pilot-scale validation. Climeworks, with a 4-year commercial
      delivery track record (Orca), a larger customer book, and Gen3 validated technology, would
      theoretically command a premium to Carbon Engineering's acquisition price in a fully
      functioning M&A market. However, Mammoth's failure creates a significant discount risk.

      No pure-play public DAC company exists, making market-multiple comparisons difficult.
      Deep-tech climate infrastructure companies trade at 5–15× projected revenue (not current
      revenue) in the bull case; at Climeworks' current ~$2M delivered revenue run rate, a
      10× multiple implies only $20M enterprise value—demonstrating why the valuation is entirely
      a function of option value, not current metrics. Heirloom Carbon ($200–300M implied at
      $50M raise in 2022) and Sustaera (undisclosed seed) are smaller comps with less operational
      track record than Climeworks, reinforcing Climeworks' premium positioning.
    claimRefs: [CV001, CV002, CV009, CV012, CV022, CV026, CV036]

  - id: section-2
    title: "Bull/Base/Bear Scenarios and Investment Thesis"
    body: |
      Climeworks' valuation is highly scenario-dependent, with a wide distribution of outcomes:

      **Bull case (20% probability, fair value $2–5B):** Mammoth achieves >50/72 containers by
      Q4 2025, Gen3 commercial plant groundbreaking in 2026, Project Cypress receives DOE
      funding confirmation, and a Series D raises >$500M at $2B+ post-money. Revenue reaches
      $30M+ by 2028 (partial Gen3 delivery) and $300M+ by 2031–2032. At 5–8× 2032 revenue,
      fair value = $1.5–2.4B at 2028 and $6–12B at 2032; discounted to today at 30%: $2–5B.
      Key 45Q tax credits ($6.5M/yr/plant at 36,000 t/yr) provide meaningful non-dilutive cash.

      **Base case (50% probability, fair value $800M–$1.5B):** Mammoth achieves 30–50/72
      containers, Gen3 begins 2028–2029, Project Cypress delayed. Contracted backlog ($2.4B
      face value, 60% delivery discount = $960M PV) plus IP option value ($500–800M on
      Carbon Engineering comp) yields SOTP of $1.4–1.8B—but discounted for dilution and
      runway gap, fair value is $800M–$1.5B.

      **Bear case (30% probability, fair value $200–500M):** Mammoth cannot be repaired,
      Cypress cancelled, down round in 2026. Distressed asset value (IP + contracts + team)
      drives recovery; existing Series C investors face 75–80% impairment. An oil major
      acquisition at distressed pricing ($200–500M) is the primary recovery scenario.

      The investment thesis is that Climeworks holds a uniquely valuable option on the DAC
      market—one that no competitor can acquire for less than several hundred million dollars
      of investment and 5+ years of operational learning. Even in the bear case, the technology
      and customer base retain significant strategic value for an acquirer.
    claimRefs: [CV004, CV005, CV006, CV007, CV008, CV013, CV014, CV018, CV023, CV027, CV035, CV037]

  - id: section-3
    title: "Entry Discipline, Exit Readiness, and Recommendation"
    body: |
      Climeworks' RECOMMENDATION is CONDITIONAL WATCH. The rationale: the risk-adjusted return
      profile at current implied valuation ($1–2B) is unattractive for new investors given
      the binary nature of the Mammoth recovery question. A 30% discount to implied Series C
      pricing ($700M–$1.4B entry) would provide 3–4× return in the bull case with acceptable
      downside. New investors should wait for Q4 2025 Mammoth operational data before committing
      at any price above $700M post-money.

      For existing investors (Series C and prior): HOLD. The cost of exit today (forced into
      a secondary transaction at distressed pricing given lack of liquidity) is worse than
      holding and monitoring for Mammoth recovery. The January 2025 raise's runway extends
      through early 2026–2027, providing time for the primary thesis-check (Mammoth container
      count) to resolve.

      Exit readiness is LOW: no IPO pathway in the next 3–5 years given pre-revenue status.
      Strategic M&A (oil major, industrial company) is possible at $800M–$2B in the base
      case and $200–500M in the bear case. Secondary transactions represent the only near-term
      liquidity path for existing investors. The five final diligence asks (Mammoth root cause,
      Cypress plan B, cap table, customer retention, Gen3 CapEx financing) are essential before
      any new investment decision.
    claimRefs: [CV010, CV011, CV015, CV016, CV019, CV020, CV021, CV024, CV025, CV028, CV029, CV030, CV031, CV032, CV033, CV034, CV038, CV039, CV040]

