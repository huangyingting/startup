      statement: |
        In 2025, Climeworks closed a USD 162 million equity financing round led by BigPoint
        Holding AG (the investment vehicle of Swiss billionaire Martin Haefner, Climeworks'
        anchor shareholder) and Partners Group. This round brought total equity raised to more
        than USD 1 billion—the highest of any pure-play carbon removal company globally.
      type: company-claimed
