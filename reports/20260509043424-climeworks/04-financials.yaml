chapter:
  number: 4
  title: Financial Overview
  summary: |
    Climeworks has raised more than USD 1 billion in total equity—the most of any pure-play
    carbon removal company—including a CHF 600 million Series C (April 2022) and a USD 162
    million round in 2025. The revenue model relies on long-term corporate offtake agreements
    (estimated USD 400–600/tonne) and individual subscriptions (~USD 1,000/tonne), with over
    6 million contracted tonnes and 160+ corporate customers. However, actual delivered revenue
    is extremely small relative to contracted volume: Mammoth produced only ~105 tonnes in its
    first ~10 months vs. 36,000 t/yr nameplate, implying delivered revenue of roughly USD
    40–60K vs. a likely annual cash burn of USD 80–150 million. The company is deeply
    pre-revenue relative to its cost structure, and the May 2025 22% workforce reduction, the
    DOE Project Cypress funding risk, and the absence of any public financial disclosure make
    independent financial diligence extremely limited. Capital adequacy may be tight: the
    USD 162M 2025 raise likely provides 12–18 months of runway assuming current burn rate,
    with the next funding event or DOE capital decision structurally critical.
