  claims:
    - id: CI001
      statement: |
        Climeworks raised CHF 600 million (approximately USD 650 million) in an equity round
        in April 2022, co-led by Partners Group (acting on behalf of clients) and GIC
        (Singapore sovereign wealth fund). Additional investors included Baillie Gifford,
        M&G, Swiss Re, Carbon Removal Partners, Global Founders Capital, and John Doerr—
        some of the most reputable names in institutional and climate investing. This was
        the largest single funding round for a carbon removal company at the time.
