    - id: CI003
      statement: |
        Climeworks' revenue model has three primary streams: (1) individual subscriptions at
        approximately USD 1,000/tonne (offered at CHF 7–50/month for different tonne volumes),
        (2) long-term corporate offtake agreements at estimated USD 400–600/tonne for forward
        delivery of CDR credits, and (3) blended carbon removal portfolios combining DAC with
        nature-based or biochar credits, sold to corporates seeking cost-effective, scalable
        net-zero solutions. Revenue from each stream is recognized upon tonne delivery.
      type: company-claimed
      topic: revenue model
      confidence: medium
      freshness: current
      sourceRefs:
        - SI005
        - SI006
      answersQuestionRefs:
        - QI003
    - id: CI004
      statement: |
        Climeworks' current cost of carbon removal is approximately USD 1,000/tonne under its
        Generation 2 solid-sorbent process powered by Iceland geothermal energy. The company
        targets reducing this to USD 250–350/tonne by 2030 through Generation 3 technology
        (50% energy reduction, 2× throughput, 3× filter life), manufacturing scale-up, and
        learning curve effects from multi-plant deployment. An independent estimate from
        CarbonPlan suggests the realistic near-term floor is USD 300–600/tonne for DAC with
        underground storage.
      type: company-claimed
      topic: unit economics
      confidence: medium
      freshness: current
      sourceRefs:
