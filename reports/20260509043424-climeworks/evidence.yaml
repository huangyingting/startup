      (not the packed filter beds of Gen1/Gen2) that increase surface contact area with
      CO2, reducing capture and release cycle time by a factor of at least two. The result:
      more than 2× CO2 capture per module, 0.5× energy consumption per tonne, and 3×
      material lifetime vs. Generation 2. Gen3 was validated in full-scale testing at
      Climeworks' Basel, Switzerland testing facility in June 2024 after 5,000 CO2 capture-
      and-release cycles and 15,000 hours of R&D testing by 50 specialists.
    type: company-claimed
