claims:
  - id: CO001
    statement: |
      Climeworks was founded in 2009 by mechanical engineers Christoph Gebald and Jan Wurzbacher,
      who conducted PhD research on direct air capture technology at ETH Zurich and spun out
      the company as a university spin-off.
    type: third-party-reported
    topic: founding history
    confidence: high
    freshness: historical
    sourceRefs:
      - SO001
      - SO005
    answersQuestionRefs:
      - QO001
  - id: CO002
    statement: |
      Climeworks operates a dual business model: proprietary solid sorbent Direct Air Capture
      (DAC) technology that extracts CO2 from ambient air, and Climeworks Solutions that designs
      and manages blended carbon removal portfolios combining engineered and nature-based removals.
    type: company-claimed
    topic: business model
    confidence: high
    freshness: current
    sourceRefs:
      - SO002
      - SO009
    answersQuestionRefs:
      - QO002
  - id: CO003
    statement: |
      Climeworks AG is headquartered in Zurich, Switzerland, with a German subsidiary in Cologne
      opened in 2019. Its two major commercial plants are located near the Hellisheiði geothermal
      power station in Iceland.
    type: third-party-reported
    topic: headquarters and locations
    confidence: high
    freshness: current
    sourceRefs:
      - SO001
      - SO010
    answersQuestionRefs:
      - QO003
  - id: CO004
    statement: |
      In April 2022, Climeworks raised CHF 600 million (approximately USD 650 million) in a
      Series C equity round led by Partners Group and GIC (Singapore sovereign wealth fund),
      with additional investors including Baillie Gifford, Carbon Removal Partners, Global
      Founders Capital, M&G, and Swiss Re.
    type: third-party-reported
    topic: funding history
    confidence: high
    freshness: historical
    sourceRefs:
      - SO003
      - SO014
    answersQuestionRefs:
      - QO004
  - id: CO005
    statement: |
      In 2025, Climeworks secured USD 162 million in additional equity funding—the largest
      carbon removal investment of 2025 globally—led by BigPoint Holding and Partners Group,
      with participation from existing investors, bringing total funding since inception to
      over USD 1 billion.
    type: third-party-reported
    topic: funding history
    confidence: high
    freshness: current
    sourceRefs:
      - SO004
      - SO024
    answersQuestionRefs:
      - QO004
  - id: CO006
    statement: |
      In May 2025, Climeworks laid off 106 employees, representing 22% of its 483-person
      pre-layoff workforce, citing unfavorable market conditions, shifting US climate policy,
      and the need to cut costs toward profitability.
    type: third-party-reported
    topic: workforce and headcount
    confidence: high
    freshness: current
    sourceRefs:
      - SO006
      - SO011
    answersQuestionRefs:
      - QO005
  - id: CO007
    statement: |
      Climeworks launched Orca, the world's first large-scale commercial Direct Air Capture
      and permanent storage facility, in Iceland in September 2021 near the Hellisheiði
      geothermal power station. The plant's nameplate capacity is up to 4,000 tonnes of CO2
      per year.
    type: third-party-reported
    topic: operational plants
    confidence: high
    freshness: historical
    sourceRefs:
      - SO001
      - SO007
    answersQuestionRefs:
      - QO006
  - id: CO008
    statement: |
      Climeworks inaugurated Mammoth, the world's largest direct air capture and storage facility,
      in Iceland in May 2024. The plant has a nameplate capacity of up to 36,000 tonnes of CO2
      per year and is built on a 72-container modular design.
    type: third-party-reported
    topic: operational plants
    confidence: high
    freshness: recent
    sourceRefs:
      - SO001
      - SO007
    answersQuestionRefs:
      - QO006
  - id: CO009
    statement: |
      Mammoth captured approximately 105 tonnes of CO2 in its first ~10 months of operation,
      representing less than 1% of its 36,000-tonne annual nameplate capacity. This underperformance
      was caused by filter performance issues and delays in installing additional collector containers.
    type: third-party-reported
    topic: plant performance
    confidence: high
    freshness: current
    sourceRefs:
      - SO007
      - SO026
    answersQuestionRefs:
      - QO007
  - id: CO010
    statement: |
      As of early 2025, only 12 of Mammoth's planned 72 collector containers were fully
      operational, as Climeworks halted further installations after discovering the Gen2 filter
      design was performing worse than expected in field conditions.
    type: third-party-reported
    topic: plant performance
    confidence: high
    freshness: current
