callouts:
  - calloutType: insight
    title: "Hyperscaler 24/7 CFE Demand Creates Immediate Pull"
    body: |
      Google, Microsoft, Amazon, and Meta collectively consume hundreds of terawatt-hours annually and have
      signed commitments to source 100% clean, 24/7 power by 2030. Solar and wind alone cannot meet the 24/7
      requirement. This creates a $10B+ annual pipeline for firm clean power that fusion, nuclear SMRs, and
      geothermal will compete to fill. Google's signed CFS PPA (the first ever fusion PPA) demonstrates that
      at least one hyperscaler will accept technology risk for a fusion offtake commitment.
    claimRefs: [CM009, CM010, CM011, CM021]

  - calloutType: risk
    title: "Solar + Storage LCOE Is the Key Market Risk"
    body: |
      Solar PV LCOE has fallen below $30–$40/MWh in sun-rich locations. Battery storage costs continue
      to drop. If 4–12 hour storage + solar achieves true 24/7 performance at $60/MWh by the early 2030s,
      fusion's market case weakens unless ARC achieves target LCOE of $50–$70/MWh. CFS's first-of-a-kind
      ARC plant will face significant cost overrun risk relative to engineering estimates.
    claimRefs: [CM015, CM022]

