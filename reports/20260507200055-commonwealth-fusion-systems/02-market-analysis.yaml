    summary: |
      Three-level market sizing for CFS. TAM is the global electricity generation market (~$2.4T annually).
      SAM is the baseload clean/dispatchable power market (~$300–400B by 2030). SOM in the near term is
      the corporate/utility 24/7 CFE PPA market for the first generation of fusion plants (first decade of
      ARC operations, targeted at $1B+ in total PPA commitments already signed for a single 400 MW plant).
