  claims:
    - id: CV001
      statement: "CFS cannot be valued using revenue multiples or DCF on current earnings; the appropriate framework is milestone-probability-adjusted option value (rNPV), standard for pre-commercial nuclear and deep-tech ventures."
      type: inferred
      topic: valuation methodology
      sourceRefs: [SV010, SV011]
      confidence: high
      freshness: current
      answersQuestionRefs: [QV001, QV017]
    - id: CV002
      statement: "Analyst consensus post-2024 SPARC ion temperature record estimates CFS's SPARC Q>1 probability at approximately 60–70%, up from ~45–55% pre-2024, materially improving the option-value calculation."
      type: estimated
      topic: Q>1 probability
      sourceRefs: [SV011, SV012, SV024]
      confidence: low
      freshness: recent
      answersQuestionRefs: [QV003]
    - id: CV003
      statement: "ARC construction requires approximately $2.5–3B per plant; CFS's current cash position (estimated ~$2–2.5B of $3.2B raised) leaves a ~$3–5B funding gap before ARC FID, depending on capital deployment rate."
      type: estimated
      topic: capital gap
      sourceRefs: [SV013, SV014]
      confidence: low
      freshness: current
      answersQuestionRefs: [QV019]
    - id: CV004
      statement: "The tritium breeding risk (TRL 2–3 globally) is the most underpriced risk in the current CFS valuation; successful SPARC Q>1 does not eliminate this risk, which could delay ARC commercial operations by 3–5 years beyond the SPARC timeline."
      type: inferred
      topic: underpriced risk
      sourceRefs: [SV012, SV010]
      confidence: medium
      freshness: current
      answersQuestionRefs: [QV022]
    - id: CV005
      statement: "CFS's funding trajectory: Seed $50M (2018) → Series A $115M (2020) → Series B $1.8B (2021) → Series B2 $863M (2025); total capital raised approximately $3.2B, the highest of any private fusion company."
      type: third-party-reported
      topic: funding history
      sourceRefs: [SV003, SV004, SV001]
      confidence: high
      freshness: current
      answersQuestionRefs: [QV015, QV016]
    - id: CV006
      statement: "CFS's Series B ($1.8B, 2021) implied a post-money valuation in the range of $3.2–5B; this was the first round large enough to confirm unicorn+ status, anchored by Eni as cornerstone and Breakthrough Energy Ventures."
      type: estimated
      topic: Series B valuation
      sourceRefs: [SV003, SV004]
      confidence: medium
      freshness: historical
      answersQuestionRefs: [QV016]
    - id: CV007
      statement: "CFS Series B2 ($863M, August 2025) was publicly described as an 'up round' from the 2021 Series B, implying the B2 pre-money valuation exceeded the B round implied valuation of ~$3.2–5B."
      type: third-party-reported
      topic: B2 valuation anchor
      sourceRefs: [SV001, SV002, SV017]
      confidence: high
      freshness: recent
      answersQuestionRefs: [QV002]
    - id: CV008
      statement: "Analysts estimate CFS B2 post-money at approximately $5.1–8B, based on typical 20–25% dilution for a $863M growth-stage raise; the exact B2 valuation has not been disclosed by CFS."
      type: estimated
      topic: B2 implied valuation
      sourceRefs: [SV016, SV017]
      confidence: low
      freshness: recent
      answersQuestionRefs: [QV002]
    - id: CV009
      statement: "Bull case (25% probability): SPARC Q>1 with Q=2–3 in 2027; ARC FID 2028; first power 2032; LCOE $55/MWh; equity value at ARC FID ~$8–12B; IRR to B2 investors ~25–35%."
      type: estimated
      topic: bull scenario
      sourceRefs: [SV012, SV013]
      confidence: low
      freshness: current
      answersQuestionRefs: [QV004, QV010]
    - id: CV010
      statement: "Base case (45% probability): SPARC Q>1 with Q=1.2–1.8 in 2028–2029 (1–2 year delay); ARC FID 2030; first power 2035; LCOE $65/MWh; equity value at ARC FID ~$4–7B; IRR ~12–18%."
      type: estimated
      topic: base scenario
      sourceRefs: [SV012, SV010]
      confidence: low
      freshness: current
      answersQuestionRefs: [QV005, QV010]
    - id: CV011
      statement: "Bear case (30% probability): SPARC Q<1 or major delay; ARC FID postponed to 2033+ or cancelled; LCOE $90–120/MWh; equity value ~$0.5–2B (restructuring/strategic acquisition); IRR negative for B2 investors."
