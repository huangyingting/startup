callouts:
  - calloutType: strength
    title: "World-Record Magnet + MIT Physics Basis Is Differentiating"
    body: |
      CFS's peer-reviewed 20T REBCO HTS magnet (IEEE TAS, 2024) and the tokamak confinement physics
      validated by 70+ years of global research give it the most defensible technical basis among private
      fusion companies. No competitor has published equivalent high-field magnet data in peer-reviewed venues.
    claimRefs: [CP017, CP018]

  - calloutType: risk
    title: "Helion's Microsoft PPA Is a Near-Term Competitive Catalyst"
    body: |
      Helion has committed to delivering 50 MW to Microsoft by 2028—a contractual milestone with
      a penalty clause. If Helion delivers, it will establish FRC fusion as a viable commercial approach
      and could shift hyperscaler confidence away from CFS's D-T tokamak path. CFS has no equivalent
      hard delivery commitment in public PPA terms.
    claimRefs: [CP006, CP009, CP010, CP022]

