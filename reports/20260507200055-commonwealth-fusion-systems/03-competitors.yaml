    summary: |
      A 2x2 quadrant positioning fusion and clean energy alternatives on Technology Readiness Level (TRL)
      vs. Capital Raised axes. CFS and Helion occupy the upper-right (high TRL, high capital) quadrant;
      Tokamak Energy and TAE are mid-TRL, mid-capital. SMRs (NuScale, TerraPower) are at higher TRL
      (licensed/near-licensed) but remain expensive. Solar+storage dominates on TRL but is not represented
      as a "startup."
