callouts:
  - calloutType: risk
    title: ARC Construction Capital Gap Is the Critical Financial Risk
    body: |
      The Series B2 ($863M) provides runway through SPARC Q>1 but is insufficient for ARC construction
      (~$2.5B+ estimated). CFS will need a major additional financing round (~$3–5B) at ARC FID (~2028).
      This round will happen when technology risk is lower (post-SPARC Q>1) but financing risk is still
      material (first-of-kind nuclear plant). The NuScale CFPP cancellation at $89/MWh is the most
      relevant precedent for first-of-a-kind nuclear power plant cost escalation risk.
    claimRefs:
      - CI009
      - CI015
      - CI018
      - CI021
  - calloutType: insight
    title: DOE LPO Loan Guarantee Could Transform ARC Construction Financing
    body: |
      A DOE Loan Programs Office Title XVII guaranteed loan could provide $2–5B at government-backed
      rates for ARC construction, dramatically reducing the cost of capital and improving ARC unit
      economics. CFS has not confirmed a LPO application but the project meets preliminary eligibility
      criteria (innovative clean energy, U.S.-based construction, significant private co-investment).
    claimRefs:
      - CI009
      - CI021
