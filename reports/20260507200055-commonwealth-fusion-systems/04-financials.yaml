  evidenceGaps:
    - type: private-evidence-only
      severity: material
      topic: CFS PPA pricing and contract terms
      missingEvidence: >-
        The per-MWh price, penalty clauses, and delivery trigger conditions for both Google and Eni PPAs are not public;
        revenue certainty is impossible to assess without these terms.
      whyItMatters: >-
        PPA pricing determines whether ARC is profitable; below-market PPA prices could undermine unit economics despite
        achieving target LCOE.
      diligencePath: Request PPA agreements including price, take-or-pay provisions, and early termination clauses in data room.
      relatedQuestionRefs:
        - QI002
        - QI018
    - type: private-evidence-only
      severity: material
      topic: Audited financial statements
      missingEvidence: >-
        CFS has not published audited financials. No P&L, balance sheet, or cash flow statement is available. Burn rate
        and cash position are analyst estimates.
      whyItMatters: >-
        Without audited financials, capital adequacy assessment is speculative; investors cannot assess true runway or
        GAAP compliance.
      diligencePath: Request audited financials for the most recent 3 fiscal years in data room; confirm cash on hand vs. burn rate.
      relatedQuestionRefs:
        - QI011
        - QI005
    - type: private-evidence-only
      severity: material
      topic: ARC independent cost estimate
      missingEvidence: >-
        No third-party independent cost assessment of ARC plant construction cost has been published; the $2.5B and
        $50–$70/MWh figures are company-derived.
      whyItMatters: First-of-kind cost overruns are the key financial risk; NuScale's 50–100% overrun is the relevant precedent.
      diligencePath: >-
        Commission independent engineering cost assessment by a firm experienced in nuclear power plant construction
        (e.g., SAIC, Bechtel).
      relatedQuestionRefs:
        - QI006
        - QI021
    - type: private-evidence-only
      severity: minor
      topic: Capitalization table and dilution history
      missingEvidence: >-
        CFS's capitalization table, including preferred stock terms, liquidation preferences, and common equity
        dilution, is not public.
      whyItMatters: >-
        In a down scenario, liquidation preferences and pari-passu rights affect common stockholder recovery and
        employee equity value.
      diligencePath: Request cap table, certificate of incorporation, and most recent 409A valuation in data room.
      relatedQuestionRefs:
        - QI012
        - QI023
    - type: missing-source
      severity: minor
      topic: CFS annual operating cost vs. comparable deep-tech companies
      missingEvidence: >-
        No audited financials or public cost reporting; analyst estimates of $300–500M/year are derived from headcount
        and capital expenditure proxies, not disclosed data.
      whyItMatters: >-
        Burn rate uncertainty means capital adequacy cannot be precisely assessed; actual burn could be higher due to
        specialized SPARC construction costs.
      diligencePath: >-
        Request monthly management accounts and CFO model in data room; compare against SPARC construction contract
        milestones.
      relatedQuestionRefs:
        - QI020
    - type: missing-source
      severity: minor
      topic: ARC hyperscaler ESG pricing premium and 24/7 firmness value
      missingEvidence: >-
        No public analysis exists of the exact premium hyperscalers will pay for fusion's 24/7 zero-carbon profile vs.
        solar+storage; the $90–$150/MWh advanced nuclear benchmark is from fission SMR deals.
      whyItMatters: >-
        If hyperscalers choose to pay a premium for fusion-specific ESG attributes (no waste, no meltdown risk), ARC's
        realized PPA price could exceed the $50–$70/MWh target, improving economics significantly.
      diligencePath: Review Google and Eni PPA terms for any 'fusion premium' provisions; conduct hyperscaler buyer interviews.
      relatedQuestionRefs:
        - QI022
    - type: missing-source
      severity: minor
      topic: PJM capacity market eligibility for ARC
      missingEvidence: >-
        No public determination of whether ARC will qualify for PJM capacity auctions or FERC's capacity market rules
        for fusion plants.
      whyItMatters: >-
        Capacity market payments of $20–$50/MWe/year could provide $8–20M/year per ARC plant in additional revenue above
        PPA pricing.
      diligencePath: >-
        Review FERC rules for fusion plant participation in PJM capacity auctions; consult Dominion Energy on Virginia
        grid interconnection.
      relatedQuestionRefs:
        - QI024
