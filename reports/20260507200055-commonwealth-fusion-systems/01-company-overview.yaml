callouts:
  - calloutType: strength
    title: "World's Largest Private Fusion Company"
    body: |
      CFS has raised ~$3B—roughly one-third of all private capital ever invested in the fusion industry. The
      Series B2 oversubscription and a first-ever corporate fusion PPA (Google) signal strong institutional
      confidence in the SPARC/ARC pathway. CFS's HTS magnet technology, independently validated by DOE,
      represents a structurally differentiated position in the fusion landscape.
    claimRefs: [CO013, CO014, CO022]

  - calloutType: risk
    title: "Pre-Revenue Capital Intensity Risk"
    body: |
      CFS has no revenue and no commercial product. All value is contingent on SPARC achieving net energy gain
      (Q > 1), a first-of-a-kind engineering milestone. The company's construction program—already in its third
      year at Devens—requires sustained capital deployment over years before any commercial electricity is generated.
      Delay in SPARC first plasma or net-energy demonstration would defer ARC and the PPAs.
    claimRefs: [CO019, CO025, CO026]

