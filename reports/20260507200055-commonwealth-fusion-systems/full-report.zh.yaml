chapters:
  - number: 1
    title: 公司概况
    sections:
      - number: '1.1'
        title: 身份与商业模式
        blocks:
          - type: paragraph
            body: >
              Commonwealth Fusion Systems（CFS）于 2018 年成立，是 MIT Plasma Science and Fusion

              Center（PSFC）的孵化公司。公司总部在 Massachusetts Devens 园区——一块 47 英亩的工业场地，同时承担主要制造和反应堆组装功能。CFS
              走两阶段商业化路径：（1）SPARC，一个紧凑型净能量演示托卡马克；随后是（2）ARC，一个面向电网的 400
              兆瓦电商业聚变电站。公司的商业模式，是授权并运营聚变电站，作为发电型公用事业公司通过长期购电协议售电。技术差异化来自 REBCO 高温超导（HTS）磁体：它能在紧凑形态下产生 20 tesla
              磁场，使反应堆单位瓦成本比早期设计低约 40×。CFS 根据赞助研究协议，与 MIT 共同持有该磁体设计的 IP。
            claimRefs:
              - CO001
              - CO002
              - CO003
              - CO004
              - CO005
      - number: '1.2'
        title: 领导层、董事会与治理
        blocks:
          - type: paragraph
            body: >
              CFS 由 CEO 兼联合创始人 Bob Mumgaard 领导。Mumgaard 是等离子体物理学家，在 MIT 获得博士学位，曾在 MIT PSFC 工作，之后参与创立 CFS。Dan Brunner
              担任首席技术官，负责 SPARC 和 ARC 设计。Steve Renter 是首席运营官，负责建设执行和供应链管理。Ally Yost 是企业发展高级副总裁。Alex Mozdzanowska
              担任首席人事官。David Tressler 是首席法务官。公司董事会包括主要投资方代表，其中 Eni 被其 CEO 称为「相对多数股东」。Tiger Global、Breakthrough Energy
              Ventures 和其他 Series B 投资方持有重要经济权益。关键人风险集中在 Mumgaard 和 Brunner 身上，因为两人深度参与技术和融资。CFS 聘请 MIT 教授 Dennis
              Whyte（他曾宣布最初的磁体突破）担任战略顾问；Whyte 已卸任 PSFC 主任。
