      - number: '7.4'
        title: 监管与法律风险
        blocks:
          - type: paragraph
            body: |
              CFS 计划依据 ADVANCE Act（2024 年签署）的先进反应堆许可框架，为 ARC 向 NRC 申请
              合并建设与运营许可证（CBOL）。ADVANCE Act 要求 NRC 为先进反应堆
              建立新的许可路径，但实施细则仍在制定中——截至 2026 年 Q1，关键的聚变专项监管规则尚未定稿。
              NRC 历史上只许可过轻水堆；聚变不产生长寿命放射性废物，但会产生氚和活化结构材料，因此许可边界
              仍有模糊地带。ARC 的 FERC 并网队列尚未公开申报；在 PJM 区域，大型新增发电机组的并网研究可能给
              项目时间线增加 3–5 年。除联邦 NRC 许可外，还需要弗吉尼亚州的选址和环境审批。公开信息未显示
              CFS 面临不利法律行动。CFS 持有约 50+ 项与磁体和等离子体技术相关的专利，但尚未公开披露来自
              Tokamak Energy（UK）或 TAE Technologies 的专利挑战。
            claimRefs:
              - CR015
              - CR016
              - CR017
              - CR018
          - type: table
            tableRef: TR001
