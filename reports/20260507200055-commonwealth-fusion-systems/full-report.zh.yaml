      - number: '1.5'
        title: 规模、员工数与不利事件
        blocks:
          - type: paragraph
            body: >
              截至 2025 年初，CFS 员工约 800 至 1,000 人或更多，高于 2022 年末约 350 人。Devens 园区一栋建筑负责 HTS 磁体制造，Tokamak Hall 负责 SPARC
              组装。公开资料未显示 2024–2025 年期间发生重大裁员、领导层离职、制裁、产品召回或重大诉讼。公司在品牌上公开淡化「nuclear」一词，尽管 SPARC 和 ARC 使用放射性氚燃料；CEO
              Mumgaard 公开谈过管理公众感知的策略。不利维度在于，CFS 的业务完全依赖 SPARC 先证明净能量增益，之后才可能产生商业收入，这带来执行风险，也要求很长的资本跑道。美国能源部部长 Chris
              Wright 在 2025 年末访问 SPARC 场地，凸显监管互动。未发现诉讼或监管执法行动。
