      - number: '6.4'
        title: 留存、满意度与扩张风险
        blocks:
          - type: paragraph
            body: >
              公司只有两个远期 PPA 客户，且尚未商业运行，传统 SaaS 式留存指标（NRR、流失率）并不适用。真正的留存风险，是 ARC 交付电力前 PPA 被取消或重谈。关键留存风险包括：（1）若 ARC
              商业时间线明显滑出 2030 年代初，Google 或 Eni 重谈 PPA 条款；（2）Google 企业清洁能源战略转向优先采用其他清洁来源（地热、SMR），且发生在 ARC
              交付前；（3）能源转型加速或反转时，Eni 的能源战略改变；（4）新的超大规模云清洁能源来源（先进核能 SMR、Helion）在 ARC 前部分满足 24/7 CFE 需求，降低 CFS 的边际价值。Google
              已公开的 24/7 CFE 承诺和直接投资显示其承诺度较高，但缺乏公开罚则条款会降低可执行性确定性。ARC-1 之后的扩张机会在于：若 ARC 证明商业可行，Google、Eni 和新买家可能承诺
              ARC-2、ARC-3 PPA，为机队订单簿提供深度。
