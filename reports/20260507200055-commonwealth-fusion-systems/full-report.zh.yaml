      - number: '4.3'
        title: 成本结构与烧钱速度
        blocks:
          - type: paragraph
            body: >
              CFS 的成本结构主要由研发和 SPARC 建设资本开支驱动。公司没有公开利润表数据；CFS 是私人公司，未披露收入、EBITDA 或净亏损。基于员工数（截至 2025 年 800–1,000+
              人）、典型航空航天 / 深科技全成本人工（约 $250–$350K / 人 / 年，含福利和股权），以及已知资本成本（Massachusetts Devens 的 SPARC
              建设、场地建设、磁体制造），估计年度运营成本为 $300–$500 million。这与两点一致：（a）$863M Series B2 被描述为提供现金跑道，覆盖 SPARC 第一等离子体并推进至 ARC
              FID；（b）$1.8B Series B（2021）在 4 年 SPARC 建设中已大体投入。上述仅为分析师估计——没有经审计财务数据。按 $300–500M / 年估计烧钱速度，2025 年 8 月
              $863M B2 带来的现金跑道约 18–36 个月，足以覆盖 SPARC Q>1（2027），但不能覆盖到 ARC FID（约 2028–2030）。
            claimRefs:
              - CI010
              - CI011
              - CI012
              - CI013
      - number: '4.4'
        title: 单位经济性与 ARC 电站经济性
        blocks:
          - type: paragraph
            body: >
              CFS 公开引用过 ARC 约 $50–$70/MWh 的目标平准化度电成本（LCOE）。Georgetown Space Policy Institute 的一项分析（2025）评估了 ARC
              经济模型，认为如果建设成本和容量因子目标达成，$50–$70/MWh 目标具备可行性；但该分析也指出，首创核能 / 聚变电站建设通常比初始估计高出 50–100%。ARC 设计容量为 400 MWe，容量因子约
              90%；按目标 LCOE，每座电站年收入为约 $175–$245 million。按当前企业稳定清洁电力 PPA 市场价格（SMR 竞争性招标约 $90–$150/MWh），若 LCOE 目标实现，ARC
              经济性将有盈利空间。公开领域中关键 ARC 建设成本估计是「首座电站约 $2.5 billion」（见 Georgetown 和 Canary Media 分析）；这是公司口径估计，缺乏独立验证。NuScale
              的 CFPP 取消（实际 $89/MWh vs. 原始估计约 $55/MWh）是最相关的警示先例。
