      - number: '5.2'
        title: SPARC：物理演示装置
        blocks:
          - type: paragraph
            body: >
              SPARC 是首创物理演示托卡马克，正在 CFS 的 Massachusetts Devens 设施建设。它不是商业电站——不会产生净电力——但将首次在紧凑装置中演示净聚变能量增益（Q>1）。SPARC
              组装里程碑包括：低温恒温器底座安装完成（2025 年 3 月）、真空室安装（2025 年 10 月，按公司更新）。第一等离子体目标为 2026 年；持续 D-T 运行和 Q>1 演示目标为 2027
              年。SPARC 设计参数在 2020 年 Journal of Plasma Physics 的一组同行评议论文中有完整记录（MIT PSFC，8 位共同作者），为私人聚变机器提供了最透明的物理基础。SPARC
              关键设计参数：主半径 1.85 m，副半径 0.57 m，轴上磁场 12T，等离子体电流 8.7 MA。SPARC 建设由 Series B 和 B2 轮融资支持。
            claimRefs:
              - CE005
              - CE006
              - CE007
              - CE008
              - CE009
      - number: '5.3'
        title: ARC：商业聚变电站设计
        blocks:
          - type: paragraph
            body: >
              ARC（Affordable, Robust, Compact）是 CFS 的商业电站设计，计划交付为一座并网 400 MWe 聚变电站。ARC 在 SPARC
              已演示的物理基础上放大到净电输出：设计把轴上磁场提升至约 12T（与 SPARC 相同），但采用更大的等离子体体积和氚增殖包层，以维持 D-T 运行。ARC 设计场地位于 Virginia 的
              Chesterfield County（从 Dominion Energy 租赁），计划接入 PJM East 电网。ARC 关键设计特征包括：可拆卸 HTS 磁体线圈（CFS
              创新，相比固定线圈设计可更快、更低成本维护）、用于氚增殖的高温包层、氦冷增殖包层把聚变中子通量转化为热能，再通过蒸汽循环发电。ARC 的商业可行性目标是 $50–$70/MWh LCOE；这要求首座电站估计
              ~$2.5B 的建设成本守住纪律。
