      - number: '3.2'
        title: CFS 与 Helion：正面对比
        blocks:
          - type: paragraph
            body: >
              CFS 和 Helion 是最直接可比的两家头部、高融资私人聚变公司。CFS（托卡马克，氘-氚）借力 70+ 年托卡马克物理、已在规模上验证的约束结果（JET、ITER 前身），以及经过同行评议的 SPARC
              设计基础。Helion（FRC，氘-氦-3）规模化验证较少，但声称直接电能转换可以绕开热循环，从而可能降低资本成本。Helion 的 Microsoft PPA（2028 年前 50
              MW）带有终止罚则，形成公开问责。CFS 的 Google PPA（200 MW，未公开交付日期触发条件）MW 规模更大，但距离交付更远。融资上，CFS 已融资约 $3B，Helion 约 $2.2B。CFS 的
              REBCO HTS 磁体纪录（20T，2021）是具体技术里程碑；Helion 尚未发表同等级别、经过同行评议的磁体或等离子体性能数据。没有数据室访问时，等离子体里程碑很难比较：CFS 目标 2027 年
              SPARC Q>1；Helion 曾把 Polaris 第一等离子体目标定在 2024 年，但尚未公开确认状态。CFS 的氘-氚路径需要氚增殖（供应风险）；Helion 的 D-He3 路径降低放射性，但氦-3
              稀缺本身也是约束。
