      - number: '4.2'
        title: 融资历史与资本结构
        blocks:
          - type: paragraph
            body: >
              截至 2025 年 8 月，CFS 累计完成约 $3 billion 私募股权融资，是全球资本最充足的私人聚变公司。融资历史为：种子轮约 $50M（2018，Eni）；Series A
              $115M（2019，Eni、Khosla、BEV、The Engine）；Series B $1.8B（2021，史上最大私人聚变融资；Tiger Global 领投，Breakthrough Energy
              Ventures、Google、Khosla、Altimeter、Temasek 等参与）；Series B2 $863M（2025 年 8 月，新闻稿称为「up round」但未披露估值，由
              Khosla、Google、Coatue 和老股东完成）。四舍五入后，累计融资约 $2.8–3.0 billion。CFS 未披露公开债务、政府贷款担保或项目融资义务。公司资本结构为 100% 股权。这意味着在
              ARC 产生收入前，所有烧钱都由股东承担。ARC 建设（估计 $2.5B+）将需要一轮非常大规模的追加股权融资、项目融资，或 DOE Loan Programs Office（LPO）Title XVII
