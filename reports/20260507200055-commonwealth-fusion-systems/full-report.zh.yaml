      - number: '6.5'
        title: 集中度风险与客户多元化
        blocks:
          - type: paragraph
            body: |
              CFS 面临极高的客户集中风险：Google 和 Eni 两个买方占了合同收入账本的 100%。
              任何一方违约、重谈条款或战略转向，都会直接拿掉 CFS 的收入确定性。公司仍处在商业化前阶段，
              这种集中度不可避免；但 ARC 接近 FID 时，必须主动压降风险。可用的分散抓手包括：
              (1) 让 Dominion Energy 成为向 PJM 电网供电的公用事业承购伙伴（尚未签约）；(2) 鉴于 Microsoft
              或 Amazon 自身有 24/7 CFE 承诺，引入它们作为额外超大规模云厂商买方；(3) 面向美国 DOD
              或国家安全场景的分布式聚变电力用途（仍属推测）；(4) 弗吉尼亚州的工业买方（钢铁、制氢）。
              截至本次报告日期，CFS 尚未宣布 Google 和 Eni 之外的新客户签约。集中风险是早期深科技企业
              已知且可接受的特征——第一批客户验证会撬动下一波客户——但投资人建模 ARC 经济性时，应假设
              机组规模化部署前至少需要 3–4 个客户。
