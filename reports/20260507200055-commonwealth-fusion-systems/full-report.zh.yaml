              - CR015
              - CR016
              - CR017
              - CR018
      - number: '7.5'
        title: 团队与执行风险
        blocks:
          - type: paragraph
            body: |
              CFS 的技术领导力最初由 MIT PSFC 校友奠基，核心人物包括 Dennis Whyte 教授（前 PSFC 主任）、
              创始 CEO Bob Mumgaard 和等离子体物理学家 Brandon Sorbom。Whyte 是 CFS 面向投资人和国家实验室的
              主要科学信用锚；如果他离开或明显疏离，会释放技术信心转弱的负面信号。CFS 目前约有 1,000 名员工，
              从 MIT、国家实验室和工业界招来了一批等离子体物理学家、磁体工程师和系统工程师。公司从 2019 年
              约 50 人快速扩张到 2025 年约 1,000 人；规模放大后，文化、设计纪律和建设进度都带来执行风险。
              关键执行风险在于 ARC 需要从 R&D 模式切到制造 / 建设模式；这与 SPARC 物理验证阶段所需的组织能力
              根本不同。CFS 已开始招聘制造和建设管理人才，但尚未公开披露 ARC 的建设项目管理高管团队。
            claimRefs:
              - CR019
              - CR020
              - CR021
              - CR022
          - type: table
            tableRef: TR004
            claimRefs:
              - CR019
              - CR020
              - CR021
              - CR022
      - number: '7.6'
        title: 图表
        blocks:
          - type: callout
            title: SPARC 未达 Q>1 是生死线风险
            body: |
              如果 SPARC 未能实现 Q>1，CFS 的整个商业逻辑都会坍塌。公司的 $3.2B+ 资本、两份 PPA 和
              ARC 建设时间表，都压在这一个物理实验上。2024 年离子温度纪录实质性降低了风险，但没有消除风险。
              投资人应把 SPARC Q>1 作为 ARC 资本投入是否推进的里程碑。
            calloutType: risk
            claimRefs:
              - CR001
              - CR002
          - type: callout
            title: 氚增殖是 SPARC 之后的隐性风险
            body: |
              即便 SPARC 实现 Q>1，ARC 若不解决氚增殖（TBR >1），也无法商业运行。这在全球范围内仍是
              TRL 2–3 挑战，尚无电站规模运行中的氚增殖包层示范。CFS 必须与 SPARC 并行解决这个问题，
              才能避免 Q>1 之后再延迟多年。多数 CFS 投资人叙事没有反映这项风险。
            calloutType: risk
            claimRefs:
              - CR003
              - CR004
              - CR005
          - type: callout
            title: ARC LCOE 超支风险——NuScale 先例值得参考
            body: |
              NuScale 的 CFPP LCO 估算在项目取消前从 $65/MWh 升至 $89/MWh，接近翻倍。ARC 的
              $50–70/MWh 目标依赖 HTS 带材成本下降（较当前价格降 10x）、首堆建设学习曲线假设，以及
              12–15 年运营寿命。每个假设都可能偏乐观。尽调应建模 ARC LCOE 达到 $100–130/MWh 的情景，
              以评估商业可行性。
            calloutType: risk
            claimRefs:
              - CR010
              - CR011
          - type: callout
            title: SPARC 离子温度纪录证明物理进展真实
            body: |
              CFS 在 2024 年创下的 SPARC 离子温度世界纪录（D-D 等离子体中 1 亿摄氏度）表明，其
              HTS 磁体技术能够产生 MIT PSFC 模型所预测的等离子体条件。与 2024 年前相比，这大幅降低了
              物理风险；但主要降风险事件仍是 Q>1，而不只是温度纪录。
            calloutType: strength
            claimRefs:
              - CR001
              - CR002
  - number: 8
    title: 估值
    sections:
      - number: '8.1'
        title: 收入前估值框架
        blocks:
          - type: paragraph
            body: |
              CFS 不能用标准收入倍数，也不能按当前利润做 DCF 估值；公司没有收入，且在 ARC 实现商业运行前
              不会产生有意义收入，目标时间是 2030 年代初。更合适的框架是按里程碑成功概率调整后的期权价值
              （也称风险调整 NPV 或 rNPV），常用于商业化前的生物技术、核能和深科技公司。在这一框架下，
              每个里程碑都是一个决策节点：(1) SPARC Q>1（目标 2027 年）；(2) ARC FID（目标 2028 年）；
              (3) ARC 首次发电（目标 2030 年代初）。每个节点都有成功概率，也有成功后的剩余价值。公司总价值
              等于各里程碑终值按概率加权后的总和，再用适合风险投资的折现率折现（考虑技术和融资风险，35–50%）。
              可比的商业化前核能公司（Terrapower、X-energy、Oklo）和聚变同业（Helion、TAE）都按类似期权价值
              逻辑估值，而不是看收入倍数。CFS 在 B2 轮募得 $863M，估值未披露但被称为“上行轮”，为市场提供了
              最新锚点。
            claimRefs:
              - CV001
              - CV002
              - CV003
              - CV004
