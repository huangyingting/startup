      - number: '8.4'
        title: 可比估值
        blocks:
          - type: paragraph
            body: |
              私有聚变同业提供最直接可比：Helion Energy（已融资约 $2.2–2.5B，估值未披露，但基于 Microsoft
              PPA 和 OpenAI CEO Sam Altman 投资，估计为 $3–5B）；TAE Technologies（已融资约 $1.3B，
              最近一轮估值估计约 $2–3B）；Tokamak Energy（UK，已融资约 $250M，估值未披露）。CFS 估值
              （估计）为 $5–8B，是估值最高的私有聚变公司，反映其资本规模、SPARC 进展，以及 Google + Eni PPA
              锚点。先进 SMR 公司提供次级可比：Terrapower（已融资约 $800M+，隐含估值约 $2–3B）、X-energy
              （已融资约 $1B+，SPAC 尝试在约 $1.5B 估值失败）。相对这些 SMR 公司，CFS 的估值溢价有其合理性：
              募资规模更大、商业锚点（PPA）更好、SPARC 技术的科学基础更强。考虑 CFS 仍处商业化前阶段，更广义的
              清洁能源基础设施可比公司（可再生能源 IPO、电池储能）相关性较弱。
