      edges:
        - from: cfs
          to: hts_superox
          label: HTS 带材供应（当前主要来源）
        - from: cfs
          to: hts_sunam
          label: HTS 带材供应（多元化目标）
        - from: hts_superox
          to: hts_sunam
          label: 制裁驱动替代
        - from: cfs
          to: google_ppa
          label: 收入依赖
        - from: cfs
          to: eni_ppa
          label: 收入依赖
        - from: cfs
          to: nrc
          label: 需要 ARC 建设许可证
        - from: cfs
          to: doe_grants
          label: 研发共同资助
        - from: cfs
          to: dominion
          label: 场址和电网并网
        - from: cfs
          to: mit_psfc
          label: 等离子体物理研究
    claimRefs:
