      - number: '2.3'
        title: 买家分层与采用路径
        blocks:
          - type: paragraph
            body: >
              三类买家构成 CFS 的需求版图：（1）超大规模云和 AI 公司（Google、Microsoft、Amazon、Meta），它们承诺为数据中心采购 24/7 CFE，需要可调度的稳定清洁电力和长周期
              PPA（15–25 年）；Google 已签的 200 MW PPA 是首个真实样本。（2）受监管公用事业公司，希望用低碳基荷替代退役煤电 / 气电机组，并满足州级可再生能源配额标准；Dominion
              Energy 在 Virginia 的场地合作（CFS 的 ARC 所在州）体现了这一路径。（3）高耗能工业买家（钢铁、化工、绿色氢能），需要大块稳定、低成本电力。各细分市场的采用触发点不同：超大规模云厂商会在
              SPARC 概念验证（预计 2027 年）后行动，也可以带技术风险提前签署远期 PPA；受监管公用事业公司会在商业许可和标准 FERC
              并网批准后行动；工业买家则跟随公用事业先例。预算所有权在超大规模云厂商的首席可持续发展 / 能源官手中，也在公用事业公司的资源规划团队手中——两类团队都拥有数十年投资周期，并受强政策顺风推动。
