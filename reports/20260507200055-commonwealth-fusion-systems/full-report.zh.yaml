      - number: '4.5'
        title: 财务风险与资本充足性
        blocks:
          - type: paragraph
            body: >
              CFS 面临四项主要财务风险：（1）ARC 建设资金缺口——Series B2（$863M，2025 年 8 月）不足以覆盖 ARC 电站建设（估计 $2.5B+）；公司将需要大规模追加融资或项目融资，可能在
              ARC FID（约 2028 年）发生；股权稀释或债务服务成本会影响股权价值和单位经济性。（2）收入前周期——时间线每滑一年，就会在没有收入的情况下消耗额外股权资本；ARC 若滑期 3 年，可能需要 $1B+
              追加资金。（3）LCOE 验证——ARC 的 $50–$70/MWh 目标没有独立验证；NuScale 先例显示有 50–100% 成本超支风险，可能把 LCOE 推高到
              $75–$140/MWh，削弱市场竞争力。（4）PPA 条件性——Google 和 Eni PPA 均以商业运行为前提；没有公开证据显示存在罚则条款，可在 PPA 被重谈或取消时补偿 CFS。披露有限：CFS
              不提供公开 P&L、资产负债表或现金流量表。
            claimRefs:
