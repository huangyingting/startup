      - number: '5.4'
        title: 技术风险与成熟度评估
        blocks:
          - type: paragraph
            body: >
              CFS 的技术处于技术成熟度等级（TRL）约 4–5：组件验证已完成（20T HTS 磁体，经过同行评议），系统集成在建（2025 年 SPARC
              组装），但完整原型运行尚未实现。关键技术风险包括：（1）SPARC 规模的等离子体约束——Q>1 里程碑不能保证；尽管物理基础强，每台新托卡马克都有独特的第一等离子体挑战；（2）ARC
              的氚增殖包层——规模化未演示；商业聚变电站需要自持氚燃料循环，而 ARC 包层设计未公开验证；（3）HTS 带材供应链——CFS 依赖外部供应商（SuperOx、SuNAM、FUJIKURA）的 REBCO
              带材；若不扩产，当前全球 REBCO 产能可能不足以支撑 ARC 机队；（4）12T 下的可拆卸线圈接头——这是 CFS
              的新设计特征，可实现维护通道，但接头在满场下的热性能和电磁性能尚未在运行中演示；（5）电力转换和热循环——ARC 的氦包层和蒸汽循环仍处早期设计阶段；与电网级电力电子的集成是未来里程碑。
