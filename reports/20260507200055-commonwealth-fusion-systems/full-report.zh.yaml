          claimRefs:
            - CR013
        - id: eni_ppa
          label: Eni $1B+ PPA
          detail: 第二个远期承购；Eni 也是投资者
          claimRefs:
            - CR013
        - id: nrc
          label: NRC ADVANCE Act 许可
          detail: ARC 建设施工的联邦监管权限
          claimRefs:
            - CR015
        - id: doe_grants
          label: DOE 拨款和 INFUSE
          detail: 研发共同资助；资本上并非关键，但对可信度重要
          claimRefs:
            - CR014
        - id: dominion
          label: Dominion Energy（场址方）
          detail: ARC 场址位于 Virginia 州 Chesterfield County；支持 PJM 并网
          claimRefs:
            - CR017
        - id: mit_psfc
          label: MIT PSFC 合作
