      - CR007
      - CR013
      - CR015
      - CR017
      - CR022
  - id: FV001
    title: 建议逻辑
    type: flow
    layout: standard
    summary: |
      决策树展示从 SPARC Q>1 结果到估值情景的投资者逻辑，
      分出乐观、基准和悲观三条路径。
    data:
      nodes:
        - id: sparc_q1
          label: SPARC Q>1 结果（2027）
          detail: 二元里程碑：达到 Q>1 或未达到
          claimRefs:
            - CV001
        - id: bull_q1
          label: Q>1 超预期（Q=2+）：乐观
          detail: 25% 概率；2028 年 ARC FID；2032 年首次发电
          claimRefs:
            - CV009
        - id: base_q1
          label: Q>1 勉强达到（Q=1.2–1.8）：基准
          detail: 45% 概率；2030 年 ARC FID；2035 年首次发电
          claimRefs:
            - CV010
        - id: bear_q1
          label: Q<1 或重大延迟：悲观
          detail: 30% 概率；重组；战略出售
          claimRefs:
            - CV011
        - id: arc_fid_bull
          label: ARC FID 2028 → $8–12B 股权价值
          detail: 乐观情景下 ARC-1 FID 时的价值
          claimRefs:
            - CV009
        - id: arc_fid_base
          label: ARC FID 2030 → $4–7B 股权价值
          detail: 基准情景下 ARC-1 FID 时的价值
          claimRefs:
            - CV010
        - id: restructure
          label: 重组 → $0.5–2B
          detail: 悲观情景；最可能收购方为 Eni / Alphabet
          claimRefs:
            - CV011
        - id: fleet_upside
          label: 机组队列部署（ARC-2+）→ $30–50B 期权价值
          detail: ARC-1 之后的长期乐观上行空间
          claimRefs:
            - CV012
      edges:
        - from: sparc_q1
          to: bull_q1
          label: 25%
        - from: sparc_q1
          to: base_q1
          label: 45%
        - from: sparc_q1
          to: bear_q1
          label: 30%
        - from: bull_q1
          to: arc_fid_bull
          label: → 乐观路径
        - from: base_q1
          to: arc_fid_base
          label: → 基准路径
        - from: bear_q1
          to: restructure
          label: → 悲观路径
        - from: arc_fid_bull
          to: fleet_upside
          label: → 机组队列期权
    claimRefs:
      - CV001
      - CV009
      - CV010
      - CV011
      - CV012
  - id: FV002
    title: 估值敏感性图
    type: bar
    layout: standard
    summary: |
      柱状图展示 CFS 在乐观、基准和悲观情景下的隐含股权价值，
      对应两个时间点：ARC FID 和 ARC 首次发电。
