  - number: 4
    title: 财务情况
    sections:
      - number: '4.1'
        title: 收入模式与商业模式
        blocks:
          - type: paragraph
            body: >
              截至运行日，CFS 完全尚未产生收入。公司计划中的收入模式，以 ARC 商业聚变电站电力的长期购电协议（PPA）为核心。CFS 已签署两份有条件 PPA：Google（200 MW，2025 年 6 月宣布）和
              Eni（总承诺 $1B+，2025 年 9 月宣布）。两份 PPA 都以 ARC 实现商业运行为前提；价格、交付时间线触发条件和罚则条款均未披露。投资者材料中暗示的第二个收入杠杆，是向未来由被授权方建设的 ARC
              电站授权聚变技术（磁体设计、托卡马克几何），类似部分 SMR 开发商提出的授权模式。该授权收入流尚未合同化。公司也获得基于里程碑的政府拨款（DOE INFUSE；2024 年 $8M
              里程碑拨款），但这些是非经常性研究补贴，不是收入。
            claimRefs:
              - CI001
