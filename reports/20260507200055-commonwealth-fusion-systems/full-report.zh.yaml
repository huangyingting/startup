      - number: '8.5'
        title: 投资建议
        blocks:
          - type: paragraph
            body: |
              尽调结论：有条件看好，但有重大保留。CFS 是最可信、进展最靠前的私有聚变公司，融资额最大，
              独立科学验证最强，也是唯一签下两份远期 PPA 的聚变公司。这些因素足以支撑其在聚变板块的领先估值。
              但这笔投资需要：(1) 明确接受 SPARC Q>1 的二元风险（负面情景概率约 30%）；(2) 承受正现金流前
              6–10 年周期；(3) 接受 ARC 还需额外 $3–5B 且尚未锁定的资本需求；(4) 持续跟踪氚增殖——这是
              SPARC 之后、多数投资人尚未定价的风险。按 $5–8B 估值看，CFS 在期权价值意义上并不便宜——市场已经
              计入 65–70% 的 Q>1 概率。后期成长基金应把 CFS 定位为高信念押注，组合权重 2–5%；建议在多家
              聚变公司之间分散配置（CFS + Helion）。投资前尽调问题：(1) 数据室审阅 PPA 条款；(2) 氚增殖计划和
              时间表；(3) HTS 带材供应合同；(4) ARC pre-FEED 成本研究；(5) NRC 预申请状态。
            claimRefs:
