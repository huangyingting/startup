  - number: 5
    title: 产品与技术
    sections:
      - number: '5.1'
        title: 核心技术：HTS 磁体与紧凑型托卡马克
        blocks:
          - type: paragraph
            body: >
              CFS 的基础创新，是把经过验证的托卡马克等离子体物理，与能够产生远强于传统超导磁体磁场的高温超导（HTS）REBCO（稀土钡铜氧化物）磁体结合。SPARC 设计采用 20-Tesla 环向场磁体——2021 年
              9 月演示时，这是全球最强超导磁体，并于 2024 年 3 月在 IEEE Transactions on Applied Superconductivity
              经过同行评议发表。物理优势来自几何：更强磁场能在小得多的反应堆体积中约束等离子体（SPARC 主半径 1.85 m，ITER 为 6.2 m），从而大幅降低建设成本和时间线。SPARC
              设计以氘-氚（D-T）燃料模式运行，目标实现 Q>1（输出聚变功率 > 输入加热功率），目标聚变功率约 140 MWth。VIPER（Variable Integrated Prototype
              Engineering Run）电缆是 CFS 内部开发的高性能 HTS 电缆系统，使磁体能在 20T 和高电流密度下可靠运行——这对紧凑几何至关重要。
