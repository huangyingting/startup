          - type: callout
            title: 商业化前的资本强度风险
            body: >
              CFS 没有收入，也没有商业产品。所有价值都取决于 SPARC 实现净能量增益（Q > 1）这个首创工程里程碑。公司在 Devens 的建设项目已经进入第三年，在产生任何商业电力之前，还需要多年持续砸入资本。若
              SPARC 第一等离子体或净能量演示延迟，ARC 和 PPA 都会顺延。
