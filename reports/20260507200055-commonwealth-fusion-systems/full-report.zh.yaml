companyProfile:
  summary: >
    Commonwealth Fusion Systems（CFS）是一家聚变能源公司，总部位于马萨诸塞州 Cambridge / Devens。公司 2018 年从 MIT PSFC 孵化，由 CEO Bob
    Mumgaard、等离子体物理学家 Dennis Whyte（现任首席科学官）和 Brandon Sorbom 创立。CFS 的核心创新，是用 REBCO（稀土钡铜氧化物）高温超导（HTS）磁体在 12+ Tesla
    下运行——这是商业验证过的最高磁场——从而做出紧凑型高场托卡马克 SPARC，以 ITER 1/60 的体积实现聚变能量增益（Q>1）。公司已从 Breakthrough Energy Ventures、Khosla
    Ventures、Eni S.p.A.、Google/Alphabet、Temasek、Tiger Global 等投资方融资约 $3.2B。2024 年，SPARC 创下离子等离子体温度世界纪录（100
    million°C）。2025 年，CFS 与 Google（200 MW）和 Eni（$1B+）签下全球首批企业聚变 PPA，二者都以 ARC 商业运行为前提。SPARC 预计 2026 年产生第一等离子体；Q>1 演示目标为
    2027 年。ARC 是 CFS 规划中的 400 MWe 商业电站，将落地 Virginia 的 Chesterfield County，目标 LCOE 为 $50–70/MWh，计划 2030 年代初首次发电。
