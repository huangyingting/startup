        - 数据室：请求氚包层研发计划
      - - NRC ADVANCE Act 预申请咨询状态
        - 监管时间线是关口风险；需要了解 CFS 与 NRC 沟通走到哪一步
        - 高
        - 数据室：请求 NRC 往来函件；查询 FERC ELIBRARY
      - - Google 和 Eni 之外的客户管线（LOI、初步沟通）
        - 机组经济性需要 3 个以上客户；需要看见 ARC-2+ 买方管线
        - 高
        - 数据室：请求客户管线报告
      - - 股权结构表和所有已发行证券（B2 后）
        - 未来 ARC 融资轮对 B2 投资人的稀释，是关键 IRR 风险；需要完整股权结构表
