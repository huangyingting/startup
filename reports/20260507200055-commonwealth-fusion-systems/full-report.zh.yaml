      - number: '2.5'
        title: 市场规模不确定性与尽调缺口
        blocks:
          - type: paragraph
            body: >
              所有聚变专项 TAM 估计都假设 2030 年代初开始商业运行；若 SPARC 未实现净能量，或 ARC 建设延迟，实际市场获取时间就会后移。分析师给出的 TAM 区间（2024–2040 年
              $301B–$840B）反映了部署速度、电价轨迹和竞争者进入时间的不同情景假设。更可操作的近期市场信号是企业 PPA 市场：2023–2025 年，超大规模云厂商已与先进核能供应商签署约 $5–10
              billion 的 24/7 CFE 合同，证明其付费意愿。关键数据缺口包括：（a）ARC 的实际 LCOE（唯一公开估计约 $50–$70/MWh，来自公司）；（b）可再生能源 +
              储能缩小可调度性差距的速度，以及由此对稳定清洁电力溢价的压缩；（c）Virginia ARC 场地的输电拥塞经济性。这些不确定性让市场机会巨大，但时间点不确定——投资者真正要问的不是市场是否存在，而是 CFS
              能否按 SPARC/ARC 进度执行。
            claimRefs:
              - CM020
              - CM021
              - CM022
