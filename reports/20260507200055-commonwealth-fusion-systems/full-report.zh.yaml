  - number: 2
    title: 市场分析
    sections:
      - number: '2.1'
        title: 市场定义与边界
        blocks:
          - type: paragraph
            body: >
              CFS 的目标市场是全球基荷发电板块，尤其是需要稳定、可调度、24/7 零碳电力的部分。售电对象包括：（1）希望替代煤炭和天然气基荷的受监管公用事业公司；（2）承诺 24/7
              无碳能源（CFE）的超大规模数据中心运营商（Google、Microsoft、Amazon、Meta）；（3）钢铁、绿色氢能、海水淡化等高耗能行业的工业用电客户。市场边界明确排除间歇性可再生能源（太阳能、风能）和传统核裂变，后两者处在不同的技术与监管生态位。相邻市场包括过程热（工业脱碳）以及利用富余聚变电力制氢的潜在场景。全球电力市场是聚变最终可触达机会的最宽代理口径，按发电、输电和配电收入合计，2024
              年估计约 $2.4 trillion。CFS 近期 SAM 是美国公用事业和超大规模云厂商针对稳定清洁电力的 PPA 市场，首座 ARC 电站将在这里交付。
            claimRefs:
              - CM001
              - CM002
              - CM003
