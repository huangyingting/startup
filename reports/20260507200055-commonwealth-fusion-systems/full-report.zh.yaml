      - number: '7.3'
        title: 商业与财务风险
        blocks:
          - type: paragraph
            body: |
              ARC 目标 LCOE 为 $50–70/MWh，纸面上技术可达，但工程不确定性很大。NuScale CFPP 的先例
              很有参考价值：其 LCOE 估计从 $65/MWh 升至 $89/MWh，最终触发 2023 年项目取消。ARC 的
              LCOE 模型假设 HTS 带材成本下降 10x、建设成本沿用 2018 年概念设计研究、运营寿命为
              12–15 年。任一假设都可能乐观 2x，进而把 ARC LCOE 推到 $100–140/MWh——高于规模化的
              风电 + 储能。ARC 建设资本需求估计为每座电站 $2.5–3B；以 CFS 当前约 $3B 资本（含 B2）计算，
              ARC FID（投资决策）前仍有约 $3–5B 资金缺口。这个缺口需要未来股权融资、债务融资、政府贷款担保
              （DOE LPO）或 PPA 预付款来补，但截至 2026 年 5 月都没有落实。Google 和 Eni PPA 以商业运行为
              前提，并不是融资工具。SPARC 之后，如果 CFS 以降估值再融下一笔 $5B（假设 SPARC 达到 Q>1
              但增益低于预期），财务上可行，但会显著稀释现有投资人。
            claimRefs:
              - CR010
