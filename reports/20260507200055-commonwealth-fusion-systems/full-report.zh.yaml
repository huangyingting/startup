            title: 全球最大的私人聚变公司
            body: >
              CFS 已融资约 $3B，大约占聚变行业历史私人资本总额的三分之一。Series B2 超额认购，加上史上首个企业聚变 PPA（Google），显示机构对 SPARC/ARC 路径信心很强。CFS 的 HTS
              磁体技术已由 DOE 独立验证，使公司在聚变版图中具备结构性差异化位置。
            calloutType: strength
