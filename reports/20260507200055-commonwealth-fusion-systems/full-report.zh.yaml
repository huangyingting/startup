            title: 有条件看好：CFS 是质量最高的纯聚变投资标的
            body: |
              按估计 $5–8B 估值，CFS 是商业聚变上风险调整后最好的期权：资本最多、物理验证最充分，也是私有聚变板块
              唯一签下两份远期 PPA 的公司。建议长周期深科技或能源转型基金以高信念仓位配置（组合权重 2–5%）。
              投入前必须追问的尽调项：PPA 条款、HTS 带材供应合同、ARC pre-FEED 成本研究和氚增殖计划。
            calloutType: recommendation
            claimRefs:
              - CV017
              - CV018
          - type: callout
            title: 当前估值尚未计入氚增殖风险
            body: |
              市场正在为 SPARC Q>1 风险定价（这一点正确），但 SPARC 之后的氚增殖风险（TRL 2–3）尚未进入估值共识。
              如果到 2029–2030 年仍未示范氚增殖，无论 SPARC 是否成功，ARC 都会推迟到 2030 年代中期。投资人应
              明确给这项风险定价，并要求 CFS 提供氚增殖路线图。
            calloutType: risk
            claimRefs:
              - CV003
              - CV004
          - type: callout
            title: B2 轮“上行轮”提供有用市场锚
            body: |
              2025 年 8 月 $863M 的 Series B2 被描述为相对 2021 年 Series B 的“上行轮”，意味着 CFS
              较其 B 轮约 $3.2–5B 估值被上调。市场显然认为 SPARC 进展降低了投资风险，提高了 Q>1 期权的
              概率调整价值。这与 2024 年离子温度纪录，以及 Google / Eni PPA 作为重大正面数据点相一致。
            calloutType: insight
            claimRefs:
              - CV007
              - CV008
