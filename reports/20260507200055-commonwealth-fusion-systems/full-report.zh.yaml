      - number: '2.6'
        title: 展示项
        blocks:
          - type: callout
            title: 超大规模云厂商 24/7 CFE 需求带来即时拉力
            body: >
              Google、Microsoft、Amazon 和 Meta 每年合计消耗数百 TWh 电力，并承诺到 2030 年采购 100% 清洁、24/7 电力。单靠太阳能和风能无法满足 24/7 要求。由此形成
              $10B+ 年度管线，聚变、核能 SMR 和地热将争夺这一稳定清洁电力需求。Google 已签的 CFS PPA（史上首个聚变 PPA）证明，至少一家超大规模云厂商愿意为聚变承购承诺承担技术风险。
            calloutType: insight
            claimRefs:
              - CM009
              - CM010
              - CM011
              - CM021
          - type: callout
            title: 太阳能 + 储能 LCOE 是关键市场风险
            body: >
              在日照资源丰富地区，太阳能光伏 LCOE 已降至 $30–$40/MWh 以下。电池储能成本仍在下降。若到 2030 年代初，4–12 小时储能 + 太阳能能以 $60/MWh 实现真正 24/7 性能，除非
              ARC 达到 $50–$70/MWh 的目标 LCOE，否则聚变的市场逻辑会变弱。相对工程估算，CFS 首座首创 ARC 电站将面对显著成本超支风险。
            calloutType: risk
            claimRefs:
              - CM015
              - CM022
  - number: 3
    title: 竞争格局
    sections:
      - number: '3.1'
        title: 私人聚变竞争版图
        blocks:
          - type: paragraph
            body: >
              全球私人聚变板块约有 40 家公司，高于 2019 年的约 10 家；截至 2025 年末，已部署私人资本超过 $7 billion。CFS 和 Helion 是进展最靠前、融资最多的两家公司。CFS
              聚焦紧凑型托卡马克聚变（SPARC，2026/27）和商业电力（ARC，2030 年代初）。Helion Energy 采用场反位形（FRC），使用 D-He3 燃料并直接电能转换，背后有
              Musk/Bezos/Altman 关联的 $375M Series E+F 支持，还与 Microsoft 签署了首创 PPA，承诺到 2028 年交付 50 MW。TAE
              Technologies（California，已融资 $1.3B）采用质子-硼燃料的场反位形，目标是聚变增强的无中子电力。Tokamak Energy（UK，已融资 $335M）采用球形托卡马克几何和 HTS
              磁体，目标在 2020 年代末建设早期试点电站。General Fusion（Canada，已融资 $325M）采用磁化靶聚变（MTF）和活塞压缩；2024 年从 Steam Generator
              转向新概念。每条路径的物理基础、时间线和资本要求都不同。
