      - number: '8.3'
        title: 乐观 / 基准 / 悲观情景分析
        blocks:
          - type: paragraph
            body: |
              乐观情景（约 25% 概率）：SPARC 在 2027 年实现 Q>1，且 Q=2–3，超过目标。ARC 在 2028 年 FID
              并开工，2032 年首次发电。ARC 运营成本对应 $55/MWh LCOE。到 2035 年签下 10 台 ARC 机组订单。
              以 ARC 收入 20x 退出 / IPO（基于 PPA 现金流，ARC-1 每年净额约 $250M）→ ARC-1 FID 时股权价值
              $5–8B；机队期权价值 $30–50B。B2 投资人 IRR：约 25–35%（周期长但达到风险投资级回报）。
              基准情景（约 45% 概率）：SPARC 在 2028–2029 年实现 Q>1（延迟 1–2 年）。ARC 2030 年 FID，
              2035 年首次发电。LCOE $65/MWh。机队部署再晚 5–7 年。ARC-1 FID 时股权价值：$4–7B。
              B2 投资人 IRR：约 12–18%。低于典型风险投资门槛，但作为能源转型战略押注可以接受。
              悲观情景（约 30% 概率）：SPARC 实现 Q<0.8，或遭遇多年等离子体破裂问题。ARC FID 延至
              2033+，或被取消。公司以 $1–2B 重组，或被 Eni/Alphabet 战略收购。B2 投资人 IRR 为负。
              这个情景正是 CFS 股权只适合高风险承受力、长投资周期投资人的主要原因。
