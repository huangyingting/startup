      - number: '2.4'
        title: 增长驱动因素与采用约束
        blocks:
          - type: paragraph
            body: >
              关键需求驱动因素包括：（1）AI 数据中心电力激增——IEA 预计 2024–2030 年数据中心用电翻倍至约 945 TWh，主要超大规模云厂商受 24/7 CFE
              要求约束，需要稳定清洁电源；（2）全球脱碳目标——IEA 净零情景要求到 2050 年约 50% 电力来自非间歇性清洁来源，为可调度零碳发电创造结构性拉力；（3）核能复兴带来监管和公众接受度顺风——美国
              ADVANCE Act（2024）以及欧洲 taxonomy
              将核能纳入其中，有助于投资者相信聚变监管路径；（4）可再生能源渗透率提高后，电网可靠性担忧上升，抬高稳定电源的容量支付。关键约束：（1）商业化前周期很长——CFS 预计 2030
              年代初前没有并网电力，限制近期市场份额；（2）太阳能 + 储能 LCOE 快速下降带来成本竞争（部分市场已低于 $40/MWh），聚变必须低于该成本，或凭 24/7
              可调度溢价自证合理；（3）氚燃料供应——商业聚变需要氚增殖，但规模化尚未验证，形成燃料链风险；（4）尽管聚变风险结构不同，公众仍可能受「nuclear」污名影响。
            claimRefs:
              - CM014
              - CM015
              - CM016
              - CM017
              - CM018
