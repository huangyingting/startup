          - type: callout
            title: 两个买方高度集中，是最主要的收入风险
            body: |
              Google 和 Eni 占 CFS 合同收入基础的 100%。两份 PPA 都以 ARC 商业运行为前提，且没有公开的
              违约罚则。任何一方重谈或退出，CFS 都会失去首座电站预计收入的相当大部分。ARC FID 之前，
              CFS 必须扩充分散买方基础（Dominion、Microsoft、Amazon、工业买方），才能压低这项风险。
            calloutType: risk
            claimRefs:
              - CU019
              - CU020
              - CU022
  - number: 7
    title: 风险
    sections:
      - number: '7.1'
        title: 技术与物理风险
        blocks:
          - type: paragraph
            body: |
              CFS 的根本风险在于，SPARC 未能在目标 2027 年窗口实现 Q>1（科学盈亏平衡，聚变能量增益 >1）。
              Q>1 是投资人和客户降风险的首要里程碑；一旦失败或明显延迟，下游会连锁受冲击：Google/Eni
              PPA 信心丧失，ARC 建设资本无法募集，Helion 和 TAE Technologies 重新卡位竞争。SPARC
              设计采用轴上 12 Tesla 的 REBCO HTS 磁体——SPARC 这种尺度此前从未达到这一磁场强度，因此
              MIT PSFC 的 SPARC 论文所建模的等离子体约束物理，必须能准确预测新机器里的行为。全新装置的
              首次等离子体通常会遇到意外挑战（NIF 从首次等离子体到点火用了 7 年；ITER 较原计划延迟
              12+ 年）。SPARC 规模较小，路径更短，但物理问题确实是全新的。第二个关键技术风险是氚增殖：
              ARC 的 D-T 燃料循环需要靠锂包层自行产氚（TBR >1）；全球氚增殖包层技术仍在 TRL 2–3，
              还没有电站规模的运行示范。这不是 SPARC 风险（SPARC 使用外部供应的 D-T），但会卡住 ARC
              商业运行。CFS 必须与 SPARC 并行发展氚增殖能力，避免 Q>1 之后 ARC 开工前再拖数年。
            claimRefs:
              - CR001
              - CR002
              - CR003
              - CR004
              - CR005
