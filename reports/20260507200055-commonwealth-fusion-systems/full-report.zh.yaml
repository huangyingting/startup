      - number: '1.4'
        title: SPARC 与 ARC 项目状态
        blocks:
          - type: paragraph
            body: >
              SPARC（Smallest Plasma Achieving Replication of ITER Conditions）是在 Massachusetts Devens
              建设中的紧凑型托卡马克。关键组装里程碑包括：75 吨、直径 24 英尺的低温恒温器底座安装完成（2025 年 3 月），以及首个 48 吨半环形真空室到场（2025 年 10 月）。CFS 目标 2026
              年产生第一等离子体，并在 2027 年实现净聚变能量增益（Q > 1）。2024 年 10 月，Massachusetts 向 CFS 授予 SPARC 广范围放射性材料许可证。SPARC
              预计将成为首个在磁约束装置中实现科学盈亏平衡的托卡马克。ARC 是 CFS 规划中的首座商业 400 MWe 聚变电站，将建在 Virginia 的 Chesterfield County，土地来自
              Dominion Energy 的选择权。2025 年 6 月 30 日，Google 与 CFS 签署 200 MW 购电协议，这是史上首个企业聚变 PPA。2025 年 9 月，Eni 签署 $1
              billion+ 的购电协议，购买 ARC 输出。ARC 目标在 2030 年代初并网运行。ARC 计划 2020 年代末开工，前提是 SPARC 实现净能量成功。
