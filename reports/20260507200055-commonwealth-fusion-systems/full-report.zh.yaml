      - number: '3.3'
        title: 间接竞争者：SMR 与先进可再生能源
        blocks:
          - type: paragraph
            body: >
              CFS 商业上最接近的竞争者不是其他聚变公司，而是先进裂变 SMR，以及长时储能 + 可再生能源组合；它们都瞄准同一个 24/7 清洁基荷市场。NuScale Power 的 NuScale SMR（每模块 60
              MWe）已获得 NRC 设计认证（2022），并在与公用事业公司谈判；但 Idaho 的 Carbon Free Power Project（CFPP）因成本上升（预计 $89/MWh）在 2023
              年取消。TerraPower 的 Natrium（345 MWe，Wyoming，2030 年目标）和 X-energy 的 Xe-100 也处于 NRC 审查中。这些 SMR
              的监管路径和公用事业合作伙伴都领先于聚变。地热（AltaRock、Fervo、Quaise）正成为可调度清洁替代方案。长时储能（Form Energy 铁-空气、Ambri）瞄准多日储能。若这些替代方案在 ARC
              之前规模化，CFS 的 PPA 转化机会会收窄。CFS 相对 SMR 的关键差异点，是没有长寿命放射性废物，也没有裂变风险；这对公众接受度和超大规模云厂商 ESG 定位很重要。
            claimRefs:
