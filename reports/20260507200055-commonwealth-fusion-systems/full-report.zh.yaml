      - number: '3.5'
        title: 竞争风险与开放问题
        blocks:
          - type: paragraph
            body: >
              CFS 的竞争风险登记包括：（1）Helion 在 SPARC 实现 Q>1 前向 Microsoft 交付 50 MW，使超大规模云厂商信心转向其他聚变路线；（2）NuScale 或 TerraPower
              SMR 在 2029–2030 年实现具成本竞争力的基荷定价，压缩 CFS 窗口；（3）竞争性 REBCO HTS 磁体项目（Tokamak Energy 的 HTS 项目，融资约 $335M；MIT
              周边创业公司）削弱磁体 IP 护城河；（4）一个或多个资金充足的后进入者（由 BHP/Rio Tinto 或主权财富基金支持），凭更低资本成本超过当前领先者的融资能力；（5）SPARC
              表现不佳触发聚变「寒冬」，压低整个板块私人投资，在商业化前形成资本低谷。这些风险不对称：正向结果（SPARC Q>1）会成为所有聚变公司的强正面催化；负向结果（错过里程碑）对 CFS
              尤其有害，因为它是托卡马克路线的旗手。
