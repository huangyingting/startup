      - number: '7.2'
        title: 供应链与运营风险
        blocks:
          - type: paragraph
            body: |
              每套磁体需要约 300–500 km 的 REBCO HTS 带材；按 SPARC 规模（18 个超导磁体）计算，
              意味着约 5,000+ km 带材。商业可用 HTS 带材由全球少数厂商供应：SuperOx（与俄罗斯有关联）、
              SuNAM（韩国）、FUJIKURA（日本）和 AMSC（美国）。在当前美国制裁背景下，
              SuperOx 的俄罗斯关联带来地缘政治供应链风险；CFS 已公开表示正转向 SuNAM 和 FUJIKURA
              做多元化供应。但相对 SPARC 需求，SuNAM 和 FUJIKURA 产能有限；扩产需要多年。到了 ARC，
              由于需要 50+ 个生产级磁体，HTS 带材总需求会大幅放大（约为 SPARC 的 100x），这是真正的
              长周期供应链挑战。CFS 在 Devens 的 Materials Facility 负责制造定制导体，但底层 REBCO
              带材仍来自外部供应商。运营风险还包括新机器首次等离子体的复杂度（真空系统完整性、低温系统调试、
              破裂事件管理），以及把高场等离子体维持到有意义燃烧时长的全新挑战。
            claimRefs:
              - CR006
              - CR007
              - CR008
              - CR009
