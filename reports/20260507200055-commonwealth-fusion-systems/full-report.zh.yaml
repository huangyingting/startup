      - number: '2.2'
        title: 市场规模
        blocks:
          - type: paragraph
            body: >
              聚变专项市场研究估计，2024–2025 年全球聚变能源市场为 $301–$347 billion，到 2030 年增至 $420–$497 billion，到 2040 年达到 $840
              billion，CAGR 约 6–8%。这些估计代表聚变电站商业运行后的预测总收入，是从假设部署轨迹外推而来，并非当下收入。自下而上看，ARC 规模为 400 MWe；若按 $50–$70/MWh 的 LCOE
              目标售电，单座电站在 100% 容量因子下每年产生约 $175–$245 million 收入。美国首个市场奖池——稳定清洁电力的基荷 PPA 价格——在 2024–2025 年先进核能（SMR
              公告）的竞争性招标中为 $90–$150/MWh，说明如果建设成本符合估计，ARC 经济性具备可行性。全球清洁能源投资流量在 2023 年超过 $1.8 trillion，预计 2024 年接近 $2
              trillion，显示市场有足够资本部署新的清洁电力技术。数据中心电力市场尤其是有吸引力的增长向量：IEA 预计数据中心用电需求将从约 415 TWh（2024）翻倍至 2030 年约 945
              TWh，为可调度清洁电力带来强劲增量需求。
            claimRefs:
