      - number: '1.3'
        title: 融资历史与估值
        blocks:
          - type: paragraph
            body: >
              自成立以来，CFS 已融资约 $3 billion，约占全球聚变公司历史私人资本总额的三分之一。融资轮次包括：2018 年 Eni 领投的种子轮，约 $50 million；2019 年 6 月 $115
              million 的 Series A（Eni、Breakthrough Energy Ventures、Khosla Ventures、The Engine/MIT、Future Ventures、Safar
              Partners、Starlight Ventures 等）；2021 年 12 月 $1.8 billion 的 Series B（Tiger Global 领投，约 70 家投资方参与，包括 Bill
              Gates、Google、Equinor、Temasek、Emerson Collective 和 Eni）；以及 2025 年 8 月 28 日完成的 $863 million Series
              B2（Nvidia/NVentures、Counterpoint Global/Morgan Stanley、Stanley Druckenmiller、由 Mitsui 和 Mitsubishi 牵头的 12
              家日本公司财团、Galaxy Digital 等）。2021 年投后估值据报道为 $3.2–$5 billion。管理层称 2025 年 B2 是「up round」，意味着估值更高；但 2025
              年的具体数字未披露。CFS 未披露收入；公司仍处于商业化前。财务结构以股权为主；公司还获得了一笔 $8 million 的 DOE 里程碑式拨款，2025 年 9 月因磁体技术性能通过验证而确认。
