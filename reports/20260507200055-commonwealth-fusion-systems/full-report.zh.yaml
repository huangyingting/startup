    claimRefs:
      - CU002
      - CU005
      - CU007
  - id: FR001
    title: 风险热力图
    type: matrix
    layout: standard
    summary: |
      风险矩阵按发生概率（列）和严重性（行）映射 12 项 CFS 关键风险。
      右上象限标出需要主动缓释的关键风险。
    data:
      columns:
        - 低概率
        - 中概率
        - 高概率
      rows:
        - label: 严重性：关键
          values:
            - 无
            - SPARC Q>1 失败（OPS-01）
            - 无
        - label: 严重性：高
          values:
            - Google PPA 取消（DEP-02）
            - HTS 带材供应（DEP-01）；ARC LCOE 超支（OPS-05）；NRC 许可延迟（REG-01）
            - 氚增殖未解决（OPS-02）
        - label: 严重性：中
          values:
            - Eni PPA 重谈（DEP-03）；Dominion 延迟（DEP-04）
            - FERC 电网排队（REG-02）；Dennis Whyte 离职（PEO-01）；等离子体扰动（OPS-06）
            - ARC 资本缺口（FIN-01）；研发到建设转型（PEO-04）
        - label: 严重性：低
          values:
            - 专利挑战（REG-06）；DOE 资金削减（DEP-06）
            - MIT 合作收缩（DEP-05）
            - 无
    notes: null
    claimRefs:
      - CR001
      - CR002
      - CR006
      - CR010
      - CR015
      - CR019
  - id: FR002
    title: 风险传导图
    type: dag
    layout: wide
    summary: |
      展示主要风险如何向下游影响级联。SPARC Q>1 失败是根节点，
      会带动最严重的下游连锁反应。
    data:
      nodes:
        - id: sparc_q1_fail
          label: SPARC 未达 Q>1（OPS-01）
          detail: 首要技术淘汰标准
          claimRefs:
            - CR001
        - id: investor_confidence
          label: 投资者信心崩塌
          detail: 下一轮股权融资失败，或公司估值远低于 B2 轮前水平
          claimRefs:
            - CR012
        - id: ppa_cancelled
          label: Google / Eni PPA 重谈风险
          detail: 附带条件的 PPA 被重谈，购电量下调
          claimRefs:
            - CR013
        - id: arc_fid_fails
          label: ARC FID 无法推进
          detail: 资本缺口无法弥合；ARC 建设延迟 5 年以上
          claimRefs:
            - CR011
        - id: restructuring
          label: CFS 重组或被收购
          detail: Helion、NuScale 或战略收购方吸收 CFS IP
          claimRefs:
            - CR014
        - id: hts_shortage
          label: HTS 带材供应短缺（OPS-03 / DEP-01）
          detail: Russia 制裁；SuNAM / FUJIKURA 产能不足
          claimRefs:
            - CR006
        - id: arc_delay
          label: ARC 建设延迟 2–3 年
          detail: HTS 带材短缺拖慢磁体生产
          claimRefs:
            - CR008
        - id: tritium_fail
          label: 氚增殖未解决（OPS-02）
          detail: ARC-1 启动时 TBR 包层尚未就绪
          claimRefs:
            - CR003
        - id: arc_fuel_limited
          label: ARC 受外部氚供应限制
          detail: 来自 CANDU 反应堆的外部 D-T 供应有限；限制 ARC 运行时长
          claimRefs:
            - CR004
        - id: lcoe_overrun
          label: ARC LCOE 超过 $120/MWh（OPS-05）
          detail: NuScale 式成本膨胀；LCOE 模型假设失效
          claimRefs:
            - CR010
        - id: ppa_price_mismatch
          label: PPA 价格低于 LCOE
          detail: 若 LCOE 达 $120/MWh，Google / Eni 按 $50–70/MWh 谈成的 PPA 不经济
          claimRefs:
            - CR013
      edges:
        - from: sparc_q1_fail
          to: investor_confidence
          label: 直接因果
        - from: sparc_q1_fail
          to: ppa_cancelled
          label: 触发重谈
        - from: investor_confidence
          to: arc_fid_fails
          label: 资本不可得
        - from: arc_fid_fails
          to: restructuring
          label: CFS 无法为 ARC 融资
        - from: hts_shortage
          to: arc_delay
          label: 供应链卡点
        - from: tritium_fail
          to: arc_fuel_limited
          label: ARC 使用外部氚
        - from: lcoe_overrun
          to: ppa_price_mismatch
          label: 价格低于成本
        - from: ppa_price_mismatch
          to: arc_fid_fails
          label: 项目不经济
    claimRefs:
      - CR001
      - CR003
      - CR006
      - CR010
      - CR011
      - CR012
      - CR013
  - id: FR003
    title: 依赖关系图
    type: dag
    layout: wide
    summary: |
