            - 否
            - 否
            - N/A
            - N/A
    notes: null
    claimRefs:
      - CU003
      - CU005
      - CU006
      - CU007
      - CU009
      - CU022
  - id: FU004
    title: 留存 / 复购队列
    type: bar
    layout: standard
    summary: |
      示意性比较 CFS 已签约 PPA 容量与完整 ARC-1 产能，
      展示已锁定比例（Google + Eni）与首座 ARC 电站剩余未承诺容量。
    data:
      items:
        - label: Google PPA（200 MW）
