      - 优先级
      - 获取路径
    rows:
      - - Google 和 Eni 的 PPA 条款（价格、期限、违约条款）
        - 收入确定性取决于 PPA 经济性；没有罚则的附条件 PPA，确定性低于明确购电承诺
