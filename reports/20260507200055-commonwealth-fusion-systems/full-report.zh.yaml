      - number: '8.2'
        title: 隐含估值历史与当前估算
        blocks:
          - type: paragraph
            body: |
              CFS 融资历史给出了隐含估值锚：种子轮（$50M，2018 年，投前约 $50–100M）、Series A
              （$115M，2020 年，投前约 $200–300M）、Series B（$1.8B，2021 年，据 Crunchbase
              和媒体报道隐含投后约 $3.2–5B）。Series B2（$863M，2025 年 8 月）被公开描述为相对
              B 轮的“上行轮”；B2 轮具体投前估值未披露。参考类似深科技轮次结构（$863M 融资对应
              20–25% 稀释），估计 B2 隐含投前估值为 $4.3–5.2B。加上 $863M 融资，B2 隐含投后
              约 $5.1–6.1B。这与分析师对当前轮次 $5–8B 的估计一致。在这一估值下，CFS 定价约为复制公司硬资产
              （科学团队、SPARC 机器、IP、PPA）成本的 1.5–2x，反映适度里程碑溢价。市场正在为 SPARC Q>1 成功
              计入中等概率（期权模型隐含 60–70%），考虑 2024 年离子温度纪录和 CFS 的科学论文记录，这一概率合理。
            claimRefs:
