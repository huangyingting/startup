  - id: FU003
    title: 客户证据矩阵
    type: matrix
    layout: standard
    summary: |
      矩阵汇总 Google、Eni、DOE 以及潜在未来买方的客户证据质量，
      维度包括承诺类型、财务价值和 PPA 条款可信度。
    data:
      columns:
        - Google
        - Eni S.p.A.（能源公司）
        - DOE
        - Dominion Energy（潜在）
      rows:
        - label: 客户类型
          values:
