      - number: '3.4'
        title: CFS 竞争护城河与持久性
        blocks:
          - type: paragraph
            body: >
              CFS 的主要竞争优势包括：（1）HTS 磁体技术——世界纪录级 20T REBCO 磁体设计受 IP 保护，并已在规模上验证；该设计发表在经过同行评议的 IEEE TAS
              文献中，增强可信度，但也降低了一部分保密性；（2）MIT PSFC 合作——独家接触全球领先聚变物理研究团队之一，以及 50+ 名 MIT 博士级研究人员深度嵌入项目；（3）先发 PPA
              承诺——Google（200 MW）和 Eni（$1B+）承诺带来收入可见性，并释放市场验证信号；（4）资本厚度——约 $3B 融资提供现金跑道，支撑第一等离子体和商业电站 FID
              决策，近期无需稀释性融资。关键护城河风险：（a）HTS 磁体 IP 可以被绕开设计；SuperOx、SuNAM 和 Fujikura 生产 REBCO 带材，其他公司（Tokamak
              Energy、Helion）也在开发竞争性 HTS 磁体项目；（b）科学基础已公开——CFS 的物理基础部分开放，降低资金充足竞争者的进入壁垒；（c）如果 SPARC 未能达到
              Q>1，护城河叙事会坍塌；（d）PPA 先发不保证 ARC 承购——买家可以重谈，或分散到 SMR。
