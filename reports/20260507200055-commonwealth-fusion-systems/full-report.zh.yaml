  - number: 6
    title: 客户情况
    sections:
      - number: '6.1'
        title: 当前客户基础与收入状态
        blocks:
          - type: paragraph
            body: >
              截至运行日，CFS 没有付费客户，也没有商业收入。公司完全以研发和商业化前实体运行。截至 2026 年 5 月，公司所谓「客户基础」仅由远期 PPA 交易对手构成：Google（Google
              LLC，Alphabet Inc. 子公司）将从 ARC 电站购买 200 MW 电力，Eni S.p.A.（意大利跨国能源公司）承诺购买总额 $1B+ 的电力。两份 PPA 都以 ARC
              实现商业运行为前提，尚未确认为收入。唯一产生现金的活动是 DOE 里程碑拨款（2024 年约 $8M），这些是研究拨款，不是客户收入。CFS 也通过 INFUSE
              和竞争性拨款项目，将美国能源部作为研究类政府客户，但规模（总计 $8–15M）相对于公司累计融资并不重要。
            claimRefs:
              - CU001
              - CU002
              - CU003
              - CU004
      - number: '6.2'
        title: 具名客户画像
        blocks:
          - type: paragraph
            body: >
              Google LLC（Alphabet Inc.）：Google 于 2025 年 6 月签署全球首个企业聚变 PPA，从 CFS 位于 Virginia Chesterfield County 的 ARC
              电站购买 200 MW 电力。Google 的动机是其到 2030 年实现 24/7 无碳能源（CFE）的承诺——即每一单位用电都要全天候来自清洁来源。单靠太阳能和风能无法满足该标准；Google
              需要可调度、稳定、24/7 零碳电力。Google 也直接投资了 CFS（Series B 和 B2），使其同时作为客户和财务支持方实现利益一致。Eni S.p.A.：这家意大利油气巨头于 2025 年 9
              月签署 $1B+ 电力承诺，购买 ARC 电力。自 2018 年种子轮以来，Eni 一直是 CFS 的基石投资者，并在所有轮次中持有股权。Eni 同时是投资者和买家，使双方在商业结果上更一致；但这也意味着 Eni
              在定价谈判上的独立性可能有限，而且 Eni 财务状况或战略优先级一旦恶化，可能同时影响融资和承购。Eni 的动机包括为其工业能源使用脱碳，并在 Enilive 和清洁能源战略下展示清洁能源领导力。
