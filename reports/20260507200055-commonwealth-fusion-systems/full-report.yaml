  - number: 8
    title: Valuation
    sections:
      - number: '8.1'
        title: Pre-Revenue Valuation Framework
        blocks:
          - type: paragraph
            body: |
              CFS cannot be valued using standard revenue multiples or DCF on current earnings; the company
              has no revenue and will not have meaningful revenue until ARC achieves commercial operations,
              targeted for the early 2030s. The appropriate valuation framework is milestone-probability-
              adjusted option value (also known as risk-adjusted NPV or rNPV), commonly applied to
              pre-commercial biotech, nuclear, and deep-tech ventures. Under this framework, each milestone
              creates a decision node: (1) SPARC Q>1 (targeted 2027); (2) ARC FID (targeted 2028); (3)
              ARC first power (targeted early 2030s). At each node, there is a probability of success and
              a residual value if succeeded. The overall company value is the sum of probability-weighted
              terminal values at each milestone, discounted at a venture-appropriate rate (35–50% given
              technology and financing risk). Comparable pre-commercial nuclear companies (Terrapower,
              X-energy, Oklo) and fusion peers (Helion, TAE) are all valued on similar option-value logic
              rather than revenue multiples. The fact that CFS raised $863M in B2 at an undisclosed (but
              "up round") valuation provides the most recent market anchor.
            claimRefs:
              - CV001
              - CV002
              - CV003
              - CV004
      - number: '8.2'
        title: Implied Valuation History and Current Estimate
        blocks:
          - type: paragraph
            body: |
              CFS's funding history provides implied valuation anchors: Seed ($50M, 2018, pre-money ~$50–100M),
              Series A ($115M, 2020, pre-money ~$200–300M), Series B ($1.8B, 2021, implied post-money ~$3.2–5B
              per Crunchbase and press coverage). The Series B2 ($863M, August 2025) was publicly described
              as an "up round" from the B; the exact B2 pre-money valuation was not disclosed. Based on
              analogous deep-tech round structures (20–25% dilution for $863M raise), the implied B2 pre-money
              valuation is estimated at $4.3–5.2B. Adding the $863M raise, the implied B2 post-money is
              approximately $5.1–6.1B. This is consistent with analyst estimates of $5–8B for the current
              round. At this valuation, CFS is priced at approximately 1.5–2x the cost to reproduce the
              company's hard assets (scientific staff, SPARC machine, IP, PPAs), reflecting a modest milestone
              premium. The market is pricing a moderate probability of SPARC Q>1 success (60–70% implied
              by option model), which is reasonable given the 2024 ion temperature record and CFS's scientific
              publication track record.
            claimRefs:
              - CV005
              - CV006
              - CV007
              - CV008
      - number: '8.3'
        title: Bull / Base / Bear Scenario Analysis
        blocks:
          - type: paragraph
            body: |
              Bull case (~25% probability): SPARC achieves Q>1 in 2027 with Q=2–3, exceeding targets.
              ARC FID in 2028, construction begins, first power in 2032. ARC operating costs at $55/MWh LCOE.
              Fleet order book of 10 ARC units signed by 2035. Exit/IPO at 20x ARC revenue (PPA-based cash
              flows, ~$250M/year net from ARC-1) → $5–8B equity value at ARC-1 FID; fleet optionality at
              $30–50B. IRR to B2 investors: ~25–35% (venture-level returns with long duration).
              Base case (~45% probability): SPARC achieves Q>1 in 2028–2029 (1–2 year delay). ARC FID in
              2030, first power in 2035. LCOE $65/MWh. Fleet deployment 5–7 years later. Equity value at
              ARC-1 FID: $4–7B. IRR to B2 investors: ~12–18%. This is below typical venture hurdle rates
              but acceptable for a strategic energy transition bet.
              Bear case (~30% probability): SPARC achieves Q<0.8 or faces multi-year plasma disruption issues.
              ARC FID delayed to 2033+, or cancelled. Restructuring or strategic acquisition by Eni/Alphabet
              at $1–2B. IRR to B2 investors: negative. This scenario is the primary reason CFS equity is
              appropriate only for investors with high risk tolerance and long investment horizons.
            claimRefs:
              - CV009
              - CV010
              - CV011
              - CV012
      - number: '8.4'
        title: Comparable Valuation
        blocks:
          - type: paragraph
            body: |
              Private fusion peers provide the most direct comparables: Helion Energy (~$2.2–2.5B raised,
              undisclosed valuation but estimated $3–5B based on Microsoft PPA and OpenAI CEO Sam Altman's
              investment); TAE Technologies (~$1.3B raised, last round valuation estimated ~$2–3B); Tokamak
              Energy (UK, ~$250M raised, valuation undisclosed). CFS at $5–8B (estimated) is the highest
              valued private fusion company, reflecting its scale of capital, SPARC progress, and Google+
              Eni PPA anchor. Advanced SMR companies provide secondary comparables: Terrapower (~$800M+
              raised, implied valuation ~$2–3B), X-energy (~$1B+ raised, SPAC attempt failed at ~$1.5B).
              CFS's valuation premium over these SMR companies is justified by its larger capital raise,
              better commercial anchors (PPAs), and the SPARC technology's stronger science base. The broader
              clean energy infrastructure comparables (renewable IPOs, battery storage) are less relevant
              given CFS's pre-commercial stage.
            claimRefs:
              - CV013
              - CV014
              - CV015
              - CV016
      - number: '8.5'
        title: Investment Recommendation
        blocks:
          - type: paragraph
            body: |
              Diligence verdict: CONSTRUCTIVE with significant caveats. CFS is the most credibly advanced
              private fusion company, has raised the most capital, has the strongest independent scientific
              validation, and is the only fusion company with two signed forward PPAs. These factors justify
              a leading valuation in the fusion sector. However, the investment requires: (1) explicit
              acceptance of binary SPARC Q>1 risk (~30% probability of negative scenario); (2) a 6–10 year
              horizon before positive cash flow; (3) comfort with an additional $3–5B capital requirement
              for ARC that is not yet secured; and (4) monitoring of tritium breeding as the post-SPARC
              risk that most investors are not pricing. At $5–8B valuation, CFS is not cheap on option-value
              terms—the market is already pricing 65–70% Q>1 probability. Late-stage growth fund investors
              should position CFS as a high-conviction conviction bet with 2–5% portfolio weight;
              diversification across multiple fusion companies (CFS + Helion) is advisable. Diligence asks
              before investment: (1) data room review of PPA terms; (2) tritium breeding plan and timeline;
              (3) HTS tape supply contracts; (4) ARC pre-FEED cost study; (5) NRC pre-application status.
            claimRefs:
              - CV017
              - CV018
              - CV019
              - CV020
      - number: '8.6'
        title: Exhibits
        blocks:
          - type: callout
            title: 'Constructive: CFS Is the Highest-Quality Pure-Play Fusion Investment'
            body: |
              At an estimated $5–8B valuation, CFS offers the best risk-adjusted option on commercial
              fusion: it has the most capital, the most validated physics, and the only two signed forward
              PPAs in the private fusion sector. Recommended as a high-conviction position (2–5% portfolio
              weight) for long-horizon deep-tech or energy transition funds. Critical diligence asks before
              committing: PPA terms, HTS tape supply contracts, ARC pre-FEED cost study, and tritium
              breeding plan.
            calloutType: recommendation
            claimRefs:
              - CV017
              - CV018
          - type: callout
            title: Tritium Breeding Is Not Priced Into the Current Valuation
            body: |
              The market is pricing SPARC Q>1 risk (correctly), but the post-SPARC tritium breeding risk
              (TRL 2–3) is not yet in the valuation consensus. If tritium breeding is not demonstrated by
              2029–2030, ARC would be delayed to the mid-2030s regardless of SPARC's success. Investors
              should explicitly price this risk and request a CFS tritium breeding roadmap.
            calloutType: risk
            claimRefs:
              - CV003
              - CV004
          - type: callout
            title: B2 'Up Round' Provides Useful Market Anchor
            body: |
              The August 2025 $863M Series B2 being described as an "up round" from the 2021 Series B
              implies CFS was marked up from its ~$3.2–5B B round valuation. This suggests the market
              considers SPARC progress to have de-risked the investment, increasing the probability-adjusted
              value of the Q>1 option. This is consistent with the 2024 ion temperature record and Google/
              Eni PPAs being significant positive datapoints.
            calloutType: insight
            claimRefs:
              - CV007
              - CV008
