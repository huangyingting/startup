              CFS has no revenue and no commercial product. All value is contingent on SPARC achieving net energy gain

              (Q > 1), a first-of-a-kind engineering milestone. The company's construction program—already in its third

              year at Devens—requires sustained capital deployment over years before any commercial electricity is
              generated.

              Delay in SPARC first plasma or net-energy demonstration would defer ARC and the PPAs.
