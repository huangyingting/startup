    title: Recommendation Logic
    type: flow
    layout: standard
    summary: |
      Decision tree showing the investor logic from SPARC Q>1 outcome through valuation scenarios,
      with branching paths for bull, base, and bear cases.
    data:
      nodes:
        - id: sparc_q1
          label: SPARC Q>1 outcome (2027)
