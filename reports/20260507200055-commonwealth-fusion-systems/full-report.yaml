          detail: HTS tape shortage drives magnet production delay
          claimRefs:
            - CR008
        - id: tritium_fail
          label: Tritium breeding unsolved (OPS-02)
          detail: TBR blanket not ready by ARC-1 start
          claimRefs:
            - CR003
        - id: arc_fuel_limited
          label: ARC limited by external tritium supply
          detail: External D-T supply from CANDU reactors is finite; limits ARC runtime
