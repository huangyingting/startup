            title: DOE LPO Loan Guarantee Could Transform ARC Construction Financing
            body: |
              A DOE Loan Programs Office Title XVII guaranteed loan could provide $2–5B at government-backed
              rates for ARC construction, dramatically reducing the cost of capital and improving ARC unit
              economics. CFS has not confirmed a LPO application but the project meets preliminary eligibility
              criteria (innovative clean energy, U.S.-based construction, significant private co-investment).
