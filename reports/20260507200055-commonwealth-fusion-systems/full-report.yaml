chapters:
  - number: 1
    title: Company Overview
    sections:
      - number: '1.1'
        title: Identity and Business Model
        blocks:
          - type: paragraph
            body: >
              Commonwealth Fusion Systems (CFS) was incorporated in 2018 as a spinout from MIT's Plasma Science and
              Fusion

              Center (PSFC). Headquartered at its Devens, Massachusetts campus—a 47-acre industrial site that doubles as
              its

              primary manufacturing and reactor-assembly facility—CFS pursues a two-phase commercialization path: (1)
              SPARC,

              a compact net-energy demonstration tokamak, followed by (2) ARC, a 400-megawatt-electric commercial fusion

              power plant targeted at the grid. The company's business model is to license and operate fusion power
              plants as

              a power-generating utility, selling electricity under long-term power purchase agreements. Its technology

              differentiator is REBCO high-temperature superconducting (HTS) magnets that produce a 20-tesla magnetic
              field

              in a compact form factor, enabling a reactor roughly 40× cheaper per watt than earlier designs. CFS holds
              the

              IP for the magnet design jointly with MIT under a sponsored-research agreement.
            claimRefs:
              - CO001
              - CO002
              - CO003
              - CO004
              - CO005
      - number: '1.2'
        title: Leadership, Board, and Governance
        blocks:
          - type: paragraph
            body: >
              Bob Mumgaard, CEO and Co-founder, leads CFS. A plasma physicist who earned his PhD from MIT, Mumgaard
              co-founded

              CFS after working at MIT's PSFC. Dan Brunner serves as Chief Technology Officer, overseeing SPARC and ARC
              design.

              Steve Renter is Chief Operating Officer, responsible for construction execution and supply-chain
              management.

              Ally Yost is Senior Vice President of Corporate Development. Alex Mozdzanowska holds the Chief People
              Officer role.

              David Tressler is Chief Legal Officer. The company's board includes representatives from major investors
              including

              Eni, which is described by its own CEO as a "relative majority shareholder." Tiger Global, Breakthrough
              Energy

              Ventures, and other Series B investors hold significant economic stakes. Key-person risk is concentrated
              in

              Mumgaard and Brunner given their deep technical and fundraising roles. CFS hired MIT Professor Dennis
              Whyte

              (who announced the original magnet breakthrough) as a strategic advisor; he stepped down as PSFC director.
            claimRefs:
              - CO006
              - CO007
              - CO008
              - CO009
              - CO010
      - number: '1.3'
        title: Funding History and Valuation
        blocks:
          - type: paragraph
            body: >
              CFS has raised approximately $3 billion since founding, roughly one-third of all private capital ever
              invested

              in fusion companies worldwide. The funding rounds are: initial seed investment in 2018 of approximately
              $50

              million led by Eni; Series A of $115 million in June 2019 (Eni, Breakthrough Energy Ventures, Khosla
              Ventures,

              The Engine/MIT, Future Ventures, Safar Partners, Starlight Ventures, and others); Series B of $1.8 billion
              in

              December 2021 (led by Tiger Global, ~70 investors including Bill Gates, Google, Equinor, Temasek, Emerson

              Collective, and Eni); and Series B2 of $863 million closed August 28, 2025 (Nvidia/NVentures, Counterpoint

              Global/Morgan Stanley, Stanley Druckenmiller, Japanese consortium of 12 companies led by Mitsui and
              Mitsubishi,

              Galaxy Digital, and others). The 2021 post-money valuation was reported at $3.2–$5 billion. The 2025 B2
              was

              described as an "up round" by management, indicating a higher valuation; the exact 2025 figure was not
              disclosed.

              CFS has no disclosed revenue; it is pre-commercialization. Financial structure is equity; the company has
              also

              received an $8 million DOE milestone-based grant validated in September 2025 for magnet technology
              performance.
            claimRefs:
              - CO011
              - CO012
              - CO013
              - CO014
              - CO015
              - CO016
      - number: '1.4'
        title: SPARC and ARC Program Status
        blocks:
          - type: paragraph
            body: >
              SPARC (Smallest Plasma Achieving Replication of ITER Conditions) is a compact tokamak under construction
              in

              Devens, Massachusetts. Key assembly milestones include: installation of the 75-ton, 24-foot-diameter
              cryostat

              base (March 2025), and receipt of the first 48-ton half-donut vacuum vessel (October 2025). CFS targets
              first

              plasma in 2026 and net fusion energy gain (Q > 1) in 2027. Massachusetts granted CFS a broad-scope
              radioactive

              materials license for SPARC in October 2024. SPARC is expected to be the first tokamak to achieve
              scientific

              break-even in a magnetic confinement device. ARC is CFS's planned first commercial 400 MWe fusion power
              plant,

              to be built in Chesterfield County, Virginia, on land optioned from Dominion Energy. Google signed a 200
              MW

              power purchase agreement with CFS on June 30, 2025—the first corporate fusion PPA in history. Eni signed a

              $1 billion-plus power purchase agreement in September 2025 for ARC output. ARC targets early 2030s grid

              operations. Construction on ARC is slated for the late 2020s, contingent on SPARC net-energy success.
            claimRefs:
              - CO017
              - CO018
              - CO019
              - CO020
              - CO021
              - CO022
              - CO023
      - number: '1.5'
        title: Scale, Headcount, and Adverse Events
        blocks:
          - type: paragraph
            body: >
              CFS employed approximately 800 to 1,000 or more people as of early 2025, up from roughly 350 in late 2022.

              The Devens campus hosts manufacturing of HTS magnets in one building and SPARC assembly in the Tokamak
              Hall.

              No significant layoffs, leadership departures, sanctions, product recalls, or major litigation have been

              publicly reported for the 2024–2025 period. The company publicly distanced itself from the word "nuclear"
              in

              branding, though SPARC and ARC use radioactive tritium fuel; CEO Mumgaard has openly discussed the
              strategy

              to manage public perception. An adverse dimension is that CFS's business depends entirely on demonstrating

              net energy gain with SPARC before any commercial revenue can flow, creating execution risk with a long
              capital

              runway requirement. The U.S. Department of Energy Secretary Chris Wright visited the SPARC site in late
              2025,

              underscoring regulatory engagement. No lawsuits or regulatory enforcement actions have been identified.
            claimRefs:
              - CO024
              - CO025
              - CO026
              - CO027
              - CO028
