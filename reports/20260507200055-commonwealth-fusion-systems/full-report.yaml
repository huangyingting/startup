  - number: 4
    title: Financials
    sections:
      - number: '4.1'
        title: Revenue Model and Business Model
        blocks:
          - type: paragraph
            body: |
              CFS is wholly pre-revenue as of the run date. Its intended revenue model centers on long-term power
              purchase agreements (PPAs) for electricity from the ARC commercial fusion power plant. CFS has signed
              two contingent PPAs: Google (200 MW, announced June 2025) and Eni ($1B+ total commitment, announced
              September 2025). Both PPAs are contingent on ARC achieving commercial operations; neither has disclosed
              pricing, delivery timeline triggers, or penalty terms. A second revenue lever, alluded to in investor
              presentations, is licensing the fusion technology (magnet design, tokamak geometry) to future licensee-
              built ARC plants—similar to the licensing model proposed by some SMR developers. This licensing
              revenue stream is not yet contractualized. The company also receives milestone-based government grants
              (DOE INFUSE; $8M milestone grant 2024) but these are non-recurring research subsidies, not revenue.
            claimRefs:
              - CI001
              - CI002
              - CI003
              - CI004
      - number: '4.2'
        title: Funding History and Capital Structure
        blocks:
          - type: paragraph
            body: |
              CFS has raised approximately $3 billion in total private equity as of August 2025, making it the
              best-capitalized private fusion company globally. The funding history is: Seed ~$50M (2018, Eni);
              Series A $115M (2019, Eni, Khosla, BEV, The Engine); Series B $1.8B (2021, largest private fusion
              round ever; led by Tiger Global, with Breakthrough Energy Ventures, Google, Khosla, Altimeter,
              Temasek, and others); Series B2 $863M (August 2025, "up round" per press but valuation not disclosed,
              closed by Khosla, Google, Coatue, returning investors). Total capital raised is approximately
              $2.8–3.0 billion when rounded. CFS has no disclosed public debt, government loan guarantees, or
              project finance obligations. Its capital structure is 100% equity. This means all burn is borne by
              equity holders until ARC generates revenue. ARC construction ($2.5B+ estimated) will require either
              a very large additional equity round, project finance, or a DOE Loan Programs Office (LPO) Title
              XVII guaranteed loan—none of which have been confirmed.
            claimRefs:
              - CI005
              - CI006
              - CI007
              - CI008
              - CI009
      - number: '4.3'
        title: Cost Structure and Burn Rate
        blocks:
          - type: paragraph
            body: |
              CFS's cost structure is dominated by R&D and capital expenditure for SPARC construction. No income
              statement data is public; CFS is a private company with no disclosed revenue, EBITDA, or net loss.
              Based on headcount (800–1,000+ employees as of 2025), typical aerospace/deep-tech fully loaded
              labor costs (~$250–$350K/person/year including benefits and equity), and known capital costs
              (SPARC construction at Devens, MA, site build-out, magnet manufacturing), the estimated annual
              operating cost is $300–$500 million per year. This is consistent with: (a) the $863M Series B2
              being described as providing runway through SPARC first plasma and toward ARC FID; (b) the $1.8B
              Series B (2021) having been substantially deployed in 4 years of SPARC construction. These are
              analyst estimates only—no audited financials are available. Cash runway from the $863M B2 (Aug
              2025) at $300–500M/year estimated burn is approximately 18–36 months, consistent with coverage
              through SPARC Q>1 (2027) but not through ARC FID (~2028–2030).
            claimRefs:
              - CI010
              - CI011
              - CI012
              - CI013
      - number: '4.4'
        title: Unit Economics and ARC Plant Economics
        blocks:
          - type: paragraph
            body: |
              CFS has publicly cited a target levelized cost of energy (LCOE) of approximately $50–$70/MWh for
              ARC. A Georgetown Space Policy Institute analysis (2025) evaluated the ARC economic model and found
              the $50–$70/MWh target plausible if construction costs and capacity factor targets are met, but
              noted that first-of-a-kind nuclear/fusion plant construction typically exceeds initial estimates
              by 50–100%. ARC's design capacity is 400 MWe at ~90% capacity factor; at target LCOE, annual
              revenue per plant is ~$175–$245 million. At current corporate PPA market pricing for firm clean
              power (~$90–$150/MWh for SMRs in competitive tenders), ARC's economics would be profitable if
              LCOE targets are achieved. The key ARC construction cost estimate in the public domain is
              "approximately $2.5 billion for the first plant" (cited in Georgetown and Canary Media analysis);
              this is a company-derived estimate without independent validation. NuScale's CFPP cancellation
              ($89/MWh actual vs. ~$55/MWh original estimate) is the most relevant cautionary precedent.
            claimRefs:
              - CI014
              - CI015
              - CI016
              - CI017
              - CI018
      - number: '4.5'
        title: Financial Risks and Capital Adequacy
        blocks:
          - type: paragraph
            body: |
              CFS faces four primary financial risks: (1) ARC construction capital gap—the Series B2 ($863M, Aug
              2025) is insufficient for ARC plant construction ($2.5B+ estimated); a large additional financing
              round or project finance will be required, likely at ARC FID (~2028); equity dilution or debt
              service costs will affect equity value and unit economics. (2) Pre-revenue duration—every year of
              timeline slippage burns additional equity capital without revenue; a 3-year slip in ARC could
              require $1B+ in additional funding. (3) LCOE validation—ARC's $50–$70/MWh target has no independent
              validation; NuScale precedent suggests risk of 50–100% cost overrun, which would raise LCOE to
              $75–$140/MWh, reducing market competitiveness. (4) PPA contingency—Google and Eni PPAs are
              contingent on commercial operations; no public evidence of penalty clauses that would compensate
              CFS if PPAs are renegotiated or cancelled. Disclosures are limited: CFS provides no public
              P&L, balance sheet, or cash flow statement.
            claimRefs:
              - CI019
              - CI020
              - CI021
              - CI022
              - CI023
      - number: '4.6'
        title: Exhibits
        blocks:
          - type: callout
            title: ARC Construction Capital Gap Is the Critical Financial Risk
            body: |
              The Series B2 ($863M) provides runway through SPARC Q>1 but is insufficient for ARC construction
              (~$2.5B+ estimated). CFS will need a major additional financing round (~$3–5B) at ARC FID (~2028).
              This round will happen when technology risk is lower (post-SPARC Q>1) but financing risk is still
              material (first-of-kind nuclear plant). The NuScale CFPP cancellation at $89/MWh is the most
              relevant precedent for first-of-a-kind nuclear power plant cost escalation risk.
            calloutType: risk
            claimRefs:
              - CI009
              - CI015
              - CI018
              - CI021
