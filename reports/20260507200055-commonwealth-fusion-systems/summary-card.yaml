  topStrengths:
    - >-
      World's most advanced private fusion project: SPARC ion temperature world record (100 million°C, 2024),
      peer-reviewed physics basis (12 journal papers), and on-track first plasma (2026)
    - >-
      First corporate fusion PPAs in history: Google (200 MW) and Eni ($1B+) represent unique demand pull and commercial
      validation unavailable to any other fusion competitor
    - >-
      Highest total capital raised in private fusion ($3.2B): Breakthrough Energy Ventures, Khosla, Temasek,
      Google/Alphabet, Eni, Tiger Global provide financial depth and strategic alignment
    - >-
      REBCO HTS magnet technology creates genuine competitive moat: 50+ patents, proprietary Materials Facility, MIT
      PSFC alumni pipeline, and 5–7 year head start over fusion competitors
    - >-
      MIT spinout lineage with CSO Dennis Whyte (former PSFC Director) provides unmatched plasma physics credibility
      with national labs, DOE, and institutional investors
  topRisks:
    - >-
      SPARC Q>1 failure (~30% probability): failure or material delay is the existential risk; it would collapse
      investor confidence, trigger PPA renegotiations, and make ARC FID impossible
    - >-
      Tritium breeding (TRL 2–3 globally): the most underpriced risk; ARC cannot operate commercially without on-site
      tritium breeding, which has never been demonstrated at engineering scale
    - >-
      ARC capital gap (~$3–5B): ARC construction requires $2.5–3B per plant; the funding gap is unsecured and requires
      SPARC Q>1 as a prerequisite for closure
    - >-
      ARC LCOE overrun risk: NuScale's LCOE doubled before cancellation; ARC's $50–70/MWh target relies on aggressive
      HTS tape cost reduction (10x) that is not yet demonstrated at scale
    - >-
      HTS tape supply chain concentration: SuperOx (Russia-linked) and limited SuNAM/FUJIKURA capacity create a supply
      bottleneck for SPARC and especially ARC magnet builds
    - >-
      NRC licensing uncertainty: ADVANCE Act framework is not finalized for fusion; PJM grid queue at 3–5 years could
      delay ARC commercial operations independent of construction
  unresolvedGaps:
    - >-
      SPARC Q>1 probability cannot be precisely known before the experiment; all current estimates (60–70%) are analyst
      approximations
    - >-
      ARC pre-FEED cost study not published; 2018 conceptual design LCOE estimate ($50–70/MWh) may be materially
      outdated
    - >-
      Google and Eni PPA terms (price, duration, penalty clauses) are not publicly disclosed; revenue certainty is lower
      than PPA volume implies
    - >-
      Tritium breeding roadmap and timeline not publicly disclosed; this is the critical post-SPARC risk with no public
      CFS plan
    - Series B2 exact valuation not disclosed; all investor dilution calculations are estimates
    - HTS tape supply contracts with SuNAM/FUJIKURA not disclosed; supply chain security for ARC not publicly verifiable
