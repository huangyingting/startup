callouts:
  - calloutType: strength
    title: Google's Dual Investor-Customer Role Is Powerful Market Validation
    body: |
      Google is the world's most credible corporate 24/7 CFE buyer and also a direct investor in CFS
      through multiple rounds. The Google PPA is simultaneously a demand signal and a de-facto
      technology endorsement. No other clean energy startup has secured both a financial commitment
      and a binding off-take commitment from a Big Tech company with Google's credibility on clean energy.
    claimRefs:
      - CU005
      - CU008
      - CU009
  - calloutType: risk
    title: Customer Concentration in Two Buyers Is the Dominant Revenue Risk
    body: |
      Google and Eni represent 100% of CFS's contracted revenue base. Both PPAs are contingent on
      ARC commercial operations with no public penalty clauses. If either buyer renegotiates or exits,
      CFS loses a significant portion of its projected first-plant revenue. CFS must diversify its
      buyer base (Dominion, Microsoft, Amazon, industrial buyers) before ARC FID to reduce this risk.
    claimRefs:
      - CU019
      - CU020
      - CU022
