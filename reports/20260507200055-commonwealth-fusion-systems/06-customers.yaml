company:
  name: Commonwealth Fusion Systems
chapter:
  number: 6
  title: Customers
  summary: |
    CFS has zero paying customers—it is pre-revenue with no commercial operations. However, it has signed
    two landmark forward power purchase agreements (PPAs): Google (200 MW, June 2025) and Eni S.p.A.
    ($1B+ total commitment, September 2025), both contingent on ARC commercial operations in the early
    2030s. These PPAs establish CFS as the only fusion company with multiple signed buyer commitments,
    providing early market validation and demand visibility. The customer base is institutional—utilities,
    energy-intensive hyperscalers, and industrial companies—not consumer. Adoption is gated exclusively on
    SPARC Q>1 and ARC construction completion; until then, no revenue is possible. Customer concentration
    risk is high: the first two PPA buyers (Google and Eni) represent CFS's entire contracted revenue
    book. Google's 24/7 carbon-free energy mandate is the demand driver for the first PPA; Eni's dual
    investor-customer role creates alignment but also potential conflict of interest concerns.
sections:
  - id: U-S1
    title: Current Customer Base and Revenue Status
    body: |
      CFS has no paying customers and no commercial revenue as of the run date. The company operates
      exclusively as an R&D and pre-commercial entity. Its "customer base" as of May 2026 consists
      solely of forward PPA counterparties: Google (Google LLC, subsidiary of Alphabet Inc.) for
      200 MW from the ARC plant, and Eni S.p.A. (Italian multinational energy company) for a $1B+
      total power commitment. Both PPAs are contingent on ARC achieving commercial operations and are
      not yet recognized as revenue. The only cash-generating activity is DOE milestone grants (~$8M
      in 2024), which are research grants, not customer revenue. CFS also has U.S. Department of
      Energy as a government customer for research through INFUSE and competitive grant programs, but
      at a scale ($8–15M total) that is not meaningful relative to the company's total capital raise.
    claimRefs:
      - CU001
      - CU002
      - CU003
      - CU004
  - id: U-S2
    title: Named Customer Profiles
    body: |
      Google LLC (Alphabet Inc.): Google signed the world's first corporate fusion PPA in June 2025
      for 200 MW of power from CFS's ARC plant at Chesterfield County, Virginia. Google's motivation
      is its 24/7 carbon-free energy (CFE) commitment by 2030—a pledge to source every unit of
      electricity it consumes from clean sources around the clock. Solar and wind alone cannot meet
      this standard; Google needs dispatchable, firm, 24/7 zero-carbon power. Google has also invested
      in CFS directly (Series B and B2), aligning its interests as both customer and financial sponsor.
      Eni S.p.A.: The Italian oil and gas major signed a $1B+ power commitment in September 2025 for
      power from ARC. Eni has been CFS's cornerstone investor since the 2018 seed round and holds an
      equity stake through all rounds. Eni's dual role as investor and buyer creates alignment on
      commercial outcomes; however, it also means Eni's negotiating independence on pricing may be
      limited, and any deterioration in Eni's financial position or strategic priorities could affect
      both funding and off-take. Eni's motivation includes decarbonizing its industrial energy use
      and demonstrating clean energy leadership under its Enilive and clean energy strategy.
    claimRefs:
      - CU005
      - CU006
      - CU007
      - CU008
      - CU009
      - CU010
    tableRefs:
      - TU001
      - TU003
    figureRefs:
      - FU001
      - FU003
      - FU004
  - id: U-S3
    title: Customer Growth and Adoption Trajectory
    body: |
      CFS's customer acquisition trajectory is entirely milestone-gated: no new PPAs can be meaningfully
      signed or activated until SPARC demonstrates Q>1 (targeted 2027). The adoption funnel has three
      stages: (1) speculative forward PPAs signed before physics proof (Google/Eni represent this stage);
      (2) utility and industrial PPA pipeline development post-SPARC Q>1, targeting Dominion Energy
      (Virginia, site partner), mid-Atlantic utilities, and additional hyperscalers; (3) fleet order
      book from ARC-2 onwards. The Google PPA represents the first conversion in history of a corporate
      buyer to a fusion power commitment—a significant market validation signal. However, there is no
      public evidence of a signed or committed customer pipeline beyond Google and Eni. CFS has not
      disclosed customer acquisition metrics, buyer pipeline volumes, or contract durations.
    claimRefs:
      - CU011
      - CU012
      - CU013
      - CU014
    tableRefs:
      - TU002
  - id: U-S4
    title: Retention, Satisfaction, and Expansion Risks
    body: |
      With only two forward PPA customers and no commercial operations, conventional SaaS-style
      retention metrics (NRR, churn) are inapplicable. The relevant retention risk is PPA cancellation
      or renegotiation before ARC delivers power. Key retention risks: (1) Google or Eni renegotiating
      PPA terms if ARC's commercial timeline slips materially beyond early 2030s; (2) Google's corporate
      clean energy strategy evolving to prioritize alternative clean sources (geothermal, SMRs) before
      ARC delivery; (3) Eni's energy strategy changing as the energy transition accelerates or reverses;
      (4) new hyperscaler clean energy sources (advanced nuclear SMRs, Helion) partially satisfying 24/7
      CFE demand before ARC, reducing CFS's marginal value. Google's published 24/7 CFE commitment and
      direct investment suggest high commitment, but the absence of public penalty clauses reduces
      enforceability certainty. Expansion opportunity post-ARC-1: if ARC demonstrates commercial
      viability, Google, Eni, and new buyers could commit to ARC-2, ARC-3 PPAs, providing fleet
      order book depth.
    claimRefs:
      - CU015
      - CU016
      - CU017
      - CU018
    tableRefs:
      - TU004
  - id: U-S5
    title: Concentration Risk and Customer Diversification
    body: |
      CFS faces extreme customer concentration risk: two buyers (Google and Eni) represent 100% of
      its contracted revenue book. Any default, renegotiation, or strategic pivot by either buyer
      eliminates CFS's revenue certainty. This is unavoidable in the current pre-commercial phase but
      must be actively managed as ARC FID approaches. Diversification levers: (1) Dominion Energy as
      a utility offtake partner for power delivered to the PJM grid (not yet signed); (2) Microsoft or
      Amazon as additional hyperscaler buyers given their own 24/7 CFE commitments; (3) U.S. DOD or
      national security use cases for distributed fusion power (speculative); (4) industrial buyers
      (steel, hydrogen production) in Virginia. CFS has announced no additional customer signings
      beyond Google and Eni as of the run date. The concentration risk is a known and acceptable
      feature of early-stage deep-tech ventures—the first customer proofs drive the next wave—but
      investors should model ARC economics assuming at least 3–4 customers before fleet deployment.
    claimRefs:
      - CU019
      - CU020
      - CU021
      - CU022
    tableRefs:
      - TU005
    figureRefs:
      - FU002
