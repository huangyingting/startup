  claims:
    - id: CR001
      statement: >-
        SPARC failure to achieve Q>1 is CFS's existential risk; analyst estimates place probability of SPARC Q>1 failure
        at 20–30%, reduced from 40% pre-2024 ion temperature record.
      type: estimated
      topic: technology risk
      sourceRefs:
        - SR001
        - SR020
      confidence: low
      freshness: current
      answersQuestionRefs:
        - QR001
    - id: CR002
      statement: >-
        CFS's 2024 SPARC ion temperature record (100 million degrees Celsius in D-D plasma) substantially validated the
        company's HTS magnet performance predictions and reduced the SPARC Q>1 failure probability.
      type: third-party-reported
      topic: risk mitigation
      sourceRefs:
        - SR002
        - SR014
        - SR015
      confidence: high
      freshness: recent
      answersQuestionRefs:
        - QR002
    - id: CR003
      statement: >-
        Tritium breeding blanket technology globally is at TRL 2–3 (demonstrated in laboratory conditions; not at
        engineering scale); no operating tritium breeding blanket module has been demonstrated at power-plant scale
        anywhere in the world.
      type: third-party-reported
      topic: tritium risk
      sourceRefs:
        - SR003
        - SR004
      confidence: high
      freshness: current
      answersQuestionRefs:
        - QR003
    - id: CR004
      statement: >-
        ARC's D-T fuel cycle requires on-site tritium breeding (TBR >1) for commercial sustainability; if this is not
        solved before ARC start-up, ARC would be limited by external tritium supply from CANDU reactors, which is finite
        and diminishing.
      type: inferred
      topic: tritium dependency
      sourceRefs:
        - SR003
        - SR004
      confidence: high
      freshness: current
      answersQuestionRefs:
        - QR004
    - id: CR005
      statement: >-
        ITER's test blanket module program (TBM) is the only ongoing engineering-scale tritium breeding experiment
        globally; results are not expected until the late 2020s, meaning CFS must develop its own blanket R&D program in
        parallel.
      type: third-party-reported
      topic: tritium risk
      sourceRefs:
        - SR004
        - SR017
      confidence: high
      freshness: current
      answersQuestionRefs:
        - QR003
        - QR004
    - id: CR006
      statement: >-
        CFS has publicly stated it is diversifying its HTS tape supply to SuNAM (South Korea) and FUJIKURA (Japan) to
        reduce dependence on SuperOx (Russia-linked); however, SuNAM and FUJIKURA have limited annual production
        capacity.
      type: third-party-reported
      topic: supply chain risk
      sourceRefs:
        - SR005
        - SR006
      confidence: high
      freshness: current
      answersQuestionRefs:
        - QR005
