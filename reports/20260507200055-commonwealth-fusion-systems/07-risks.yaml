company:
  name: Commonwealth Fusion Systems
chapter:
  number: 7
  title: Risks
  summary: |
    CFS faces a multi-layered risk stack spanning technology, commercial, regulatory, and people dimensions.
    The dominant risk is scientific/engineering: SPARC Q>1 failure or meaningful delay would deprive the
    company of its primary commercial de-risking event, triggering investor confidence collapse and likely
    restructuring. Secondary risks include tritium breeding (TRL 2–3, unsolved), HTS tape supply chain
    concentration (Russia-linked SuperOx, plus SuNAM/FUJIKURA), ARC LCOE overrun (NuScale cautionary
    precedent: $9B/GW vs. promised $3B/GW), and a ~$3–5B capital gap before ARC FID. Regulatory risk
    is moderate—the NRC's ADVANCE Act framework streamlines licensing but key rules remain in development.
    Geopolitical risk is present in the HTS tape supply chain (SuperOx's Russia exposure). People risk
    centers on founder/chief scientist retention (Dennis Whyte, MIT PSFC alumni). Despite this risk
    profile, CFS has demonstrated exceptional early risk mitigation: SPARC ion-temperature record (2024),
    Google and Eni PPAs, $3B+ raised. The key question is whether physics delivery at SPARC in 2027
    unlocks the commercial flywheel or exposes gaps in the technology thesis.
sections:
  - id: R-S1
    title: Technology and Physics Risks
    body: |
      CFS's fundamental risk is that SPARC fails to achieve Q>1 (scientific breakeven, fusion energy
      gain >1) in its targeted 2027 timeframe. Q>1 is the primary investor and customer de-risking
      milestone; failure or material delay triggers downstream cascades: loss of Google/Eni PPA
      confidence, inability to raise ARC construction capital, and competitive repositioning by Helion
      and TAE Technologies. The SPARC design uses REBCO HTS magnets at 12 Tesla on-axis—a field never
      achieved at SPARC's scale before, requiring that the plasma confinement physics modeled in
      MIT PSFC SPARC publications accurately predicts behavior in a new machine. First-plasma in a
      novel device typically encounters unforeseen challenges (NIF first-plasma-to-ignition took 7 years;
      ITER delayed 12+ years from original schedule). SPARC has a shorter path given its smaller scale,
      but the physics is genuinely novel. A second critical technology risk is tritium breeding: ARC's
      D-T fuel cycle requires producing its own tritium from a lithium blanket (TBR >1); tritium
      breeding blanket technology is at TRL 2–3 globally, with no operational demonstration at
      power-plant scale. This risk is not a SPARC risk (SPARC uses D-T from external supply), but it
      gates ARC's commercial operation. CFS must develop tritium breeding capability in parallel with
      SPARC to avoid a post-Q>1 delay before ARC construction can begin.
    claimRefs:
      - CR001
      - CR002
      - CR003
      - CR004
      - CR005
    tableRefs:
      - TR002
    figureRefs:
      - FR001
  - id: R-S2
    title: Supply Chain and Operational Risks
    body: |
      CFS requires approximately 300–500 km of REBCO HTS tape per magnet set; at SPARC scale (18
      superconducting magnets) this implies ~5,000+ km of tape. Commercially viable HTS tape is
      produced by a small global group: SuperOx (Russia-linked), SuNAM (South Korea), FUJIKURA (Japan),
      and AMSC (US). SuperOx's Russia connection creates geopolitical supply chain risk under current
      U.S. sanctions; CFS has publicly stated it is diversifying to SuNAM and FUJIKURA. However, SuNAM
      and FUJIKURA have limited capacity relative to SPARC's needs; scaling production is a multi-year
      effort. For ARC, the total HTS tape requirement is dramatically larger (~100x SPARC) given 50+
      production-scale magnets; this is a genuine long-lead supply chain challenge. CFS's Materials
      Facility in Devens fabricates custom conductors but sources the underlying REBCO tape from
      external suppliers. Operational risks include the complexity of first-plasma in a new machine
      (vacuum system integrity, cryogenic system commissioning, disruption event management), and
      the novel challenges of sustaining high-field plasmas long enough for meaningful burn time.
    claimRefs:
      - CR006
      - CR007
      - CR008
      - CR009
    tableRefs:
      - TR003
    figureRefs:
      - FR003
  - id: R-S3
    title: Commercial and Financial Risks
    body: |
      ARC's target LCOE of $50–70/MWh is technically achievable on paper but carries significant
      engineering uncertainty. The NuScale CFPP precedent is instructive: its LCOE estimate rose from
      $65/MWh to $89/MWh and ultimately triggered plant cancellation in 2023. ARC's LCOE model assumes
      HTS tape costs falling by 10x, construction costs per the 2018 conceptual design study, and a
      12–15 year operating life. Any of these assumptions could be optimistic by 2x, which would push
      ARC LCOE to $100–140/MWh—above wind+storage at scale. The capital requirement for ARC construction
      is estimated at $2.5–3B per plant; with current CFS capital of ~$3B (including B2), there is a
      ~$3–5B funding gap before ARC FID (investment decision). This gap requires either future equity
      rounds, debt financing, government loan guarantees (DOE LPO), or PPA prepayments—none of which
      are committed as of May 2026. The Google and Eni PPAs are contingent on commercial operations;
      they are not financing instruments. A scenario where CFS raises the next $5B at a down valuation
      post-SPARC (if SPARC meets Q>1 but at lower gain than expected) is financially feasible but
      would significantly dilute existing investors.
    claimRefs:
      - CR010
      - CR011
      - CR012
      - CR013
      - CR014
    tableRefs:
      - TR005
    figureRefs:
      - FR002
  - id: R-S4
    title: Regulatory and Legal Risks
    body: |
      CFS plans to seek a Combined Construction and Operating License (CBOL) from the NRC for ARC,
      using the ADVANCE Act (signed 2024) framework for advanced reactor licensing. The ADVANCE Act
      directs the NRC to develop new licensing pathways for advanced reactors, but the implementing
      rules are still in development—key fusion-specific regulations are not finalized as of Q1 2026.
      NRC has historically licensed only light-water reactors; fusion produces no long-lived radioactive
      waste but does produce tritium and activated structural materials, creating licensing ambiguity.
      The FERC grid queue for ARC has not been publicly filed; in the PJM territory, grid connection
      studies for large new generators can add 3–5 years to a project timeline. Virginia state siting
      and environmental approvals are required in addition to federal NRC licensing. No adverse legal
      actions against CFS have been publicly reported. CFS holds approximately 50+ patents relevant to
      its magnet and plasma technology, but patent challenges from Tokamak Energy (UK) or TAE
      Technologies have not been publicly disclosed.
    claimRefs:
      - CR015
      - CR016
      - CR017
      - CR018
    tableRefs:
      - TR001
  - id: R-S5
    title: People and Execution Risks
    body: |
      CFS's technology leadership was originally seeded by MIT PSFC alumni led by Professor Dennis
      Whyte (former PSFC director), founding CEO Bob Mumgaard, and plasma physicist Brandon Sorbom.
      Whyte is CFS's primary scientific credibility anchor with the investor community and national labs;
      his departure or serious disengagement would negatively signal on technology confidence. CFS
      is now ~1,000 employees with a deep bench of plasma physicists, magnet engineers, and systems
      engineers recruited from MIT, national labs, and industry. The company has grown rapidly from
      ~50 employees in 2019 to ~1,000 in 2025, creating execution risk in maintaining culture,
      design discipline, and construction schedule as scale increases. Key execution risk is the
      transition from R&D mode to manufacturing/construction mode required for ARC; this is a
      fundamentally different organizational capability than the SPARC physics phase. CFS has begun
      hiring manufacturing and construction management talent but has not publicly disclosed a
      construction project management executive team for ARC.
    claimRefs:
      - CR019
      - CR020
      - CR021
      - CR022
    tableRefs:
      - TR004
