company:
  name: Commonwealth Fusion Systems

chapter:
  number: 5
  title: Product and Technology
  summary: |
    CFS's technology platform rests on three integrated innovations: compact high-field tokamak plasma
    confinement (SPARC/ARC geometry), world-record REBCO HTS magnet technology (20T, demonstrated and
    peer-reviewed 2021/2024), and the VIPER cable manufacturing system for reliable HTS conductor
    production at scale. SPARC (under active assembly at Devens MA) will be the world's first net-energy
    fusion experiment using HTS magnets, with first plasma targeted 2026 and Q>1 in 2027. ARC, the
    commercial successor, is a 400 MWe plant designed for modular construction and a target LCOE of
    $50–$70/MWh. The physics basis is the strongest in private fusion: peer-reviewed by MIT PSFC and
    published in a dedicated Nature Energy SPARC series (2020). Key technology risks are tritium
    breeding (undemonstrated at scale), first-plasma engineering unknowns, and the HTS tape supply
    chain (CFS relies on external REBCO tape suppliers including SuperOx, SuNAM, FUJIKURA). The
    product roadmap is clear and milestone-gated: SPARC (physics demo) → ARC (commercial plant) →
    ARC fleet (licensed global deployment).

sections:
  - id: E-S1
    title: Core Technology — HTS Magnets and Compact Tokamak
    body: |
      CFS's foundational innovation is combining proven tokamak plasma physics with high-temperature
      superconducting (HTS) REBCO (Rare-Earth Barium Copper Oxide) magnets capable of generating
      much stronger magnetic fields than conventional superconducting magnets. The SPARC design uses
      20-Tesla toroidal field magnets—the world's strongest superconducting magnets when demonstrated
      in September 2021, peer-reviewed in IEEE Transactions on Applied Superconductivity (March 2024).
      The physics advantage is geometric: stronger magnetic fields enable plasma confinement in a much
      smaller reactor volume (SPARC's major radius is 1.85 m vs. ITER's 6.2 m), reducing construction
      cost and timeline dramatically. SPARC is designed to operate in deuterium-tritium (D-T) fuel mode
      and achieve Q>1 (fusion power out > heating power in) with a target fusion power of ~140 MWth.
      The VIPER (Variable Integrated Prototype Engineering Run) cable is CFS's internally developed
      high-performance HTS cable system that enables the magnet to operate reliably at 20T with high
      current density—critical for the compact geometry.
    claimRefs: [CE001, CE002, CE003, CE004]

  - id: E-S2
    title: SPARC — Physics Demonstration Device
    body: |
      SPARC is the first-of-a-kind physics demonstration tokamak under construction at CFS's Devens, MA
      facility. It is not a commercial power plant—it will not generate net electricity—but will
      demonstrate net fusion energy gain (Q>1) for the first time in a compact device. SPARC assembly
      milestones: cryostat base installed (March 2025), vacuum vessel installation (October 2025, per
      company updates). First plasma is targeted for 2026; sustained D-T operations and Q>1 demonstration
      targeted for 2027. The SPARC design parameters are thoroughly documented in a 2020 peer-reviewed
      paper series in the Journal of Plasma Physics (MIT PSFC, 8 co-authors), providing the most
      transparent physics basis of any private fusion machine. Key SPARC design parameters: major radius
      1.85 m, minor radius 0.57 m, magnetic field 12T on axis, plasma current 8.7 MA. SPARC's
      construction is funded by the Series B and B2 rounds.
    claimRefs: [CE005, CE006, CE007, CE008, CE009]

  - id: E-S3
    title: ARC — Commercial Fusion Power Plant Design
    body: |
      ARC (Affordable, Robust, Compact) is CFS's commercial plant design, intended for delivery as a
      400 MWe grid-connected fusion power station. ARC builds on SPARC's demonstrated physics to scale
      to net electrical output: its design raises the magnetic field to ~12T on axis (same as SPARC) but
      with a larger plasma volume and tritium breeding blanket to sustain D-T operations. ARC is designed
      for the Chesterfield County, Virginia site (leased from Dominion Energy), with planned grid
      interconnection to the PJM East grid. Key ARC design features: demountable HTS magnet coils (a
      CFS innovation enabling faster and cheaper maintenance than fixed-coil designs), high-temperature
      blanket for tritium breeding, helium-cooled breeding blanket converting fusion neutron flux to
      thermal energy for steam cycle power conversion. ARC's commercial viability target is LCOE of
      $50–$70/MWh; this requires capital cost discipline on the ~$2.5B estimated first-plant construction.
    claimRefs: [CE010, CE011, CE012, CE013]

  - id: E-S4
    title: Technology Risks and Maturity Assessment
    body: |
      CFS's technology is at Technology Readiness Level (TRL) ~4–5: component validation complete
      (HTS magnets at 20T, peer-reviewed), system integration under construction (SPARC assembly 2025),
      but full prototype operation not yet achieved. The key technical risks are: (1) plasma confinement
      at SPARC scale—the Q>1 milestone is not guaranteed; while the physics basis is strong, each new
      tokamak has unique first-plasma challenges; (2) tritium breeding blanket for ARC—undemonstrated
      at scale; commercial fusion plants require a self-sustaining tritium fuel cycle, and ARC's blanket
      design has not been publicly validated; (3) HTS tape supply chain—CFS depends on REBCO tape from
      external suppliers (SuperOx, SuNAM, FUJIKURA); current global REBCO production capacity may be
      insufficient for an ARC fleet without scale-up; (4) demountable coil joints at 12T—a novel CFS
      design feature enabling maintenance access, but thermal and electromagnetic performance of joints
      at full field is not yet demonstrated in operation; (5) power conversion and thermal cycle—
      ARC's helium blanket and steam cycle are at early design stages; integration with grid-scale
      power electronics is a future milestone.
    claimRefs: [CE014, CE015, CE016, CE017, CE018]

  - id: E-S5
    title: Product Roadmap and Development Milestones
    body: |
      CFS's product roadmap has three stages: Stage 1 — SPARC physics demonstration (2026–2027):
      first plasma 2026, D-T operations and Q>1 2027, physics validation campaign 2027–2028.
      Stage 2 — ARC design and construction (2028–2032): ARC FID 2028–2029 (contingent on SPARC
      success and financing), construction 2029–2032 at Chesterfield County VA, grid commissioning
      2032. Stage 3 — ARC fleet deployment (2033+): license ARC design to additional plants, build
      utility partnerships for fleet order book, develop second-generation ARC with improved economics.
      Key dependencies: SPARC Q>1 is the gating milestone for ARC FID; regulatory approval from NRC
      or NRC-equivalent fusion framework (established under ADVANCE Act 2024); PJM grid interconnection
      at Chesterfield County; tritium supply agreement (current source: CANDU reactor byproducts, limited
      to ~0.5 kg/year globally—enough for SPARC but not a commercial fleet).
    claimRefs: [CE019, CE020, CE021, CE022, CE023]

