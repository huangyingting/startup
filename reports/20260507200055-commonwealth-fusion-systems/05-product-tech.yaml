  claims:
    - id: CE001
      statement: "VIPER (Variable Integrated Prototype Engineering Run) is CFS's internally developed HTS REBCO cable technology, enabling the compact high-current-density magnets needed for SPARC's 20T field at reduced size vs. conventional superconductors."
