      topic: core technology
      sourceRefs: [SE009, SE001]
      confidence: high
      freshness: current
      answersQuestionRefs: [QE001, QE002]
    - id: CE002
      statement: "CFS demonstrated a 20-Tesla REBCO HTS magnet in September 2021—a world record for high-temperature superconducting magnets—enabling compact tokamak geometry for SPARC and ARC."
      type: third-party-reported
      topic: technology milestone
      sourceRefs: [SE002, SE010]
      confidence: high
      freshness: historical
      answersQuestionRefs: [QE001, QE003]
