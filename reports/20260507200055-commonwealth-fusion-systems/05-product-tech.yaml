callouts:
  - calloutType: strength
    title: "Peer-Reviewed Physics Basis Is CFS's Most Differentiating Asset"
    body: |
      CFS's SPARC design basis is published in the Journal of Plasma Physics (2020, 8-paper series)
      and the HTS magnet performance is peer-reviewed in IEEE TAS (2024). No other private fusion
      company has published comparable peer-reviewed device design and component validation data,
      making CFS's technical claims uniquely verifiable and defensible.
    claimRefs: [CE003, CE004, CE008]

  - calloutType: risk
    title: "Tritium Breeding Blanket Is the Highest-Risk Technology Gap"
    body: |
      ARC requires a self-sustaining tritium breeding cycle (tritium breeding ratio ≥1.05) to operate
      commercially. This technology is at TRL 2–3 globally—no fusion plant has yet demonstrated
      tritium breeding at commercial scale. CFS has not published its ARC blanket design. If tritium
      breeding is delayed or fails, ARC commercial operations could be limited by external tritium
      supply, which is currently only ~0.5 kg/year globally from CANDU reactors.
    claimRefs: [CE016, CE017]

