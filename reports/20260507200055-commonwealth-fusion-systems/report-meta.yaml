summary:
  headline: |
    CFS is the highest-quality, most credibly funded private fusion company globally, with
    the world's most advanced Q>1-targeting tokamak (SPARC), the first signed corporate fusion
    PPAs (Google + Eni), and a $3.2B investor base led by Breakthrough Energy Ventures, Khosla,
    and Eni. SPARC first plasma (2026) and Q>1 (2027) are the next binary milestones that
    determine whether CFS can close the $3–5B ARC construction capital gap. At an estimated
    $5–8B valuation, the market prices a ~65% SPARC Q>1 probability; the primary underpriced
    risk is tritium breeding (TRL 2–3 globally), which could delay ARC commercial operations
    regardless of SPARC success. Constructive on a 6–10 year horizon for deep-tech energy
    transition funds.
