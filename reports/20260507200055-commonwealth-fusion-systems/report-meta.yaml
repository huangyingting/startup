companyProfile:
  summary: |
    Commonwealth Fusion Systems (CFS) is a Cambridge/Devens, MA-based fusion energy company
    founded in 2018 as an MIT PSFC spinout by CEO Bob Mumgaard, plasma physicist Dennis Whyte
    (now Chief Science Officer), and Brandon Sorbom. CFS's core innovation is the use of REBCO
    (rare-earth barium copper oxide) high-temperature superconducting (HTS) magnets operating
    at 12+ Tesla — the highest field commercially demonstrated — to produce a compact, high-field
    tokamak (SPARC) capable of achieving fusion energy gain (Q>1) at 1/60th the volume of ITER.
    The company has raised approximately $3.2B from Breakthrough Energy Ventures, Khosla Ventures,
    Eni S.p.A., Google/Alphabet, Temasek, Tiger Global, and others. In 2024, SPARC set a world
    record ion plasma temperature (100 million°C). In 2025, CFS signed the world's first
    corporate fusion PPAs with Google (200 MW) and Eni ($1B+), both contingent on ARC commercial
    operations. SPARC first plasma is expected in 2026; Q>1 demonstration is targeted for 2027.
    ARC, CFS's 400 MWe commercial power plant, is planned for Chesterfield County, Virginia,
    targeting LCOE of $50–70/MWh and first power in the early 2030s.
