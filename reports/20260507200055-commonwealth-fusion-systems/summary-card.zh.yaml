summary:
  headline: >
    CFS 是全球质量最高、融资最可信的私营聚变公司之一，拥有全球最先进、以 Q>1 为目标的 tokamak（SPARC），签下首批企业聚变 PPA（Google + Eni），并有 Breakthrough Energy
    Ventures、Khosla、Eni 领投的 $3.2B 投资人基础。SPARC 首等离子体（2026）和 Q>1（2027）是下一组二元里程碑，决定 CFS 能否补上 ARC 建设所需的 $3–5B 资本缺口。按估计 $5–8B
    估值，市场计入约 65% 的 SPARC Q>1 概率；最被低估的主要风险是氚增殖（全球 TRL 2–3），即便 SPARC 成功，也可能推迟 ARC 商业运营。对深科技能源转型基金，6–10 年周期下可建设性看待。
