summary:
  headline: >
    Brex 以 $5.15B 并入 Capital One（2026 年 4 月）把估值较 2022 年峰值折价 58% 这件事落到了纸面上：企业金融科技业务找到了可交割的退出，但独立独角兽逻辑已经失败——收购前私募二级市场应观察 /
    回避；交易现在变成 Capital One 的整合题。
