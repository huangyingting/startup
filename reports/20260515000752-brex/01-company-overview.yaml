company:
  name: Brex
  website: https://www.brex.com

chapter:
  number: 1
  title: Company Overview
  summary: >-
    Brex is an AI-native corporate spend management platform founded in January 2017 by
    Brazilian entrepreneurs Henrique Dubugras and Pedro Franceschi. Originally launched as a
    corporate charge card for venture-backed startups that traditional banks rejected, Brex
    expanded into a full-stack financial platform covering cards, expense management, business
    accounts, bill pay, travel, and treasury. The company raised $1.5B+ across nine rounds,
    peaking at a $12.3B valuation in January 2022. On January 22, 2026, Capital One announced
    the acquisition of Brex for $5.15B in cash and stock — a 58% discount to peak. Brex LLC
    now operates as a wholly owned subsidiary of Capital One, N.A., with Pedro Franceschi
    continuing as CEO and Henrique Dubugras as Chairman of the Board.

sections:
  - id: s1
    title: Identity, Business Model, and Current Ownership Status
    body: >-
      Brex was founded on January 3, 2017 by Henrique Dubugras and Pedro Franceschi, two Brazilian
      entrepreneurs who had previously co-founded Pagar.me — a payments processor sold to Stone in 2016.
      The founders met on Twitter at age 16 and joined Y Combinator's Winter 2017 cohort as a VR startup,
      then pivoted to fintech within three weeks after identifying a structural gap: venture-backed startups
      flush with capital could not obtain corporate credit cards from traditional banks because they lacked
      personal credit histories. Brex solved this by underwriting cards based on company bank balance and
      VC funding raised, eliminating personal guarantees. [CO002] [CO004] [CO005]

      The initial corporate charge card product launched publicly in January 2018. By 2026, the platform
      covers corporate cards (Mastercard via Emigrant Bank, Fifth Third/Airwallex; Visa via Sutton Bank),
      Brex Empower expense management, Brex Cash checking accounts (via Column N.A.), Brex Treasury
      (FINRA/SIPC-registered, a Capital One company), bill pay, AI-native travel, and AI expense agents.
      Products operate in 50+ countries with local currency cards. Revenue is primarily interchange-driven
      (~2.7% gross interchange x Brex's share), supplemented by interest on Brex Cash and SaaS fees.
      Estimated gross margins are approximately 65%. [CO003] [CO007] [CO021]

      As of May 2026, Brex is no longer an independent company. Capital One announced the $5.15B
      acquisition of Brex on January 22, 2026 in cash and stock. The Brex website footer confirms
      completion: "Brex LLC is a wholly owned subsidiary of Capital One, N.A." with headquarters
      at 650 S 500W Suite 300, Salt Lake City, UT 84101. Pedro Franceschi continues as CEO under
      Capital One ownership. [CO001] [CO006]
    claimRefs:
      - CO001
      - CO002
      - CO003
      - CO004
      - CO005
      - CO006
      - CO007
      - CO021
    tableRefs:
      - TO001
    figureRefs:
      - FO001

  - id: s2
    title: Founders, Leadership, and Governance
    body: >-
      Brex's founding team brings deep fintech infrastructure expertise. Pedro Franceschi (sole CEO
      since June 2024) built all of Brex's core financial infrastructure — including Mastercard
      integrations, ACH, SWIFT, and wire processing — from scratch starting at age 22. Henrique
      Dubugras (Chairman since June 2024) led fundraising ($1.5B+), investor relations, and banking
      partnerships through the growth phase. Both co-founded Pagar.me in 2013 in Brazil (building it
      from age 17 to a Stone acquisition), then dropped out of Stanford in 2017 to join YC. [CO030] [CO008] [CO009]

      The June 2024 leadership transition was material: Brex abandoned its co-CEO structure, naming
      Franceschi as sole CEO and Dubugras as Chairman to streamline decision-making. Simultaneously,
      COO Michael Tannenbaum transitioned to the Board of Directors, with Camilla Morais elevated from
      SVP Global Operations to COO. CTO Cosmin Nicolaescu departed in January 2024 to an advisory role,
      concurrent with the January 2024 workforce reduction. Karandeep Anand serves as President;
      Doug Adamic joined as Chief Revenue Officer in August 2022 from SAP Concur. [CO010] [CO011] [CO012] [CO014] [CO015]

      Post-acquisition by Capital One, Franceschi retains his CEO role and Brex continues operating as
      a distinct brand. Board composition post-acquisition is not fully publicly disclosed; Capital One
      has not published a full post-merger board roster. [CO013]
    claimRefs:
      - CO008
      - CO009
      - CO010
      - CO011
      - CO012
      - CO013
