    - type: missing-source
      severity: material
      topic: governance
      missingEvidence: >-
        Brex's board of directors composition post-acquisition by Capital One is not publicly
        disclosed. Capital One-designated board seats and any independent directors have not been
        publicly named. This information would be required for a complete governance assessment.
      whyItMatters: >-
        Post-acquisition board composition determines governance dynamics, Capital One's level of
        integration control, and any ongoing independence for Brex's leadership team.
      diligencePath: >-
