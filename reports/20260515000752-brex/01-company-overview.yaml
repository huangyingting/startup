  - id: s4
    title: Scale, Milestones, Financial Trajectory, and Adverse Events
    body: >-
      As of May 2026, Brex serves 35,000+ companies including approximately 250 public companies; named
      enterprise customers include DoorDash, Anthropic, OpenAI, Robinhood, CrowdStrike, and Plaid.
      Headcount was approximately 1,100 employees as of 2025, down from a peak of roughly 1,300+ before
      workforce reductions. Revenue grew 35%+ in 2023 and was tracking 49% growth as of August 2025.
      Gross profit grew 75% in 2023. Analyst estimates cite $163M+ in annualized customer savings from
      Brex's automation tools. Monthly cash burn was $17M in Q4 2023 (down from $22M in Q4 2022), and
      the company achieved operating cash flow positivity in October 2025. [CO028] [CO029] [CO032] [CO033] [CO035] [CO038]

      Three layoff events mark Brex's adverse operational history: June 2020 (~62 employees, ~17%),
      October 2022 (~136 employees, ~11%), and January 2024 (282 employees, ~20%). The June 2022 SMB
      exit — where Brex offboarded thousands of non-VC-backed small businesses with 30-day notice —
      caused significant customer and media backlash. Brex also withdrew its bank charter application
      (filed February 2021) without completion. A positive inflection came in March 2023 when Silicon
      Valley Bank collapsed and Brex received a large influx of SVB deposits and new customers. [CO024] [CO026] [CO027] [CO034]

      On the product and partnership side, Brex secured a European Payment Institution license, launched
      stablecoin (USDC) support for enterprise payments, integrated Oracle Fusion Cloud ERP, and
      established a Fifth Third Bank commercial card partnership (~$5.6B ACV). Brex's AI-native roadmap
      — including an AI CFO agent for natural-language spend queries — positions it competitively vs.
      Ramp and Rippling. [CO036] [CO039] [CO040]
