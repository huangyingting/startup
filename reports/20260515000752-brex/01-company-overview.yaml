    - type: missing-source
      severity: material
      topic: financial-trajectory
      missingEvidence: >-
        Specific ARR figures for Brex are not publicly disclosed. Revenue growth rates (35% in 2023,
        49% in Aug 2025) are available but without an absolute revenue base confirmed from official
        filings. Analyst estimates (Sacra.com) imply a multi-hundred-million ARR range but this has
        not been verified against audited figures.
      whyItMatters: >-
        ARR and revenue quality are primary value drivers for the $5.15B acquisition price; without
        official disclosure, estimates carry high uncertainty and cannot be used to derive EV/ARR
        multiple.
      diligencePath: >-
