  - id: sv02
    title: Valuation History and the 2022 ZIRP Inflection
    body: >
      Brex's valuation trajectory is a case study in ZIRP-era private-market excess followed by fundamental
      normalisation. From a YCombinator S17 cohort company, Brex scaled through rapid successive fundraises
      to $7.4B at its April 2021 Series D and $12.3B at its January 2022 Series D-2 extension — a 66%
      step-up in nine months [CV010] [CV009]. Total capital raised across approximately 12 funding rounds
      was $1.5B [CV011]. The $12.3B valuation was formed at peak ZIRP conditions when high-growth SaaS and
      fintech commanded 50–100x ARR multiples; by contrast, public markets corrected sharply in H2 2022,
      compressing comparable multiples by 60–80%.

      The post-ZIRP reality arrived at Brex in June 2022 with the exit from the SMB market [CV022] and
      October 2022 with an 11% headcount reduction (136 people) [CV021]. By January 2024, a 20% workforce
      reduction of approximately 282 employees reflected continued cost discipline as annual cash burn of
      roughly $200M required a four-year runway to sustain independent operations [CV020] [CV023]. The
      Destiny Tech100 closed-end fund held a Brex investment as of March 2022, providing secondary-market
      evidence that Brex shares traded in institutional hands during the peak period [CV026]. Brex's ILC
      charter application was withdrawn in August 2021, reducing a significant regulatory overhang [CV024].
      Prior to the Capital One deal materialising, Brex was considering an IPO or additional private capital
      raise as standard growth paths [CV029].
    claimRefs:
      - CV009
      - CV010
      - CV011
      - CV020
      - CV021
      - CV022
      - CV023
      - CV024
      - CV026
      - CV029
