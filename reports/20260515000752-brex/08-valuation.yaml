  evidenceGaps:
    - type: private-evidence-only
      severity: material
      topic: revenue-estimate
      missingEvidence: >
        Brex has never disclosed audited revenue, gross profit, or EBITDA figures. The 13x gross profit
        multiple and the 40–50% growth rate assertions derive entirely from CFO Dorfman statements in press
        interviews, not from audited or reviewed financial statements.
      whyItMatters: >
        The implied $790–880M revenue estimate is the central quantitative anchor of this chapter.
        If gross margins differ significantly from the 45–50% assumption, the implied revenue — and thus
        the 5.8–6.5x EV/Revenue multiple — changes materially.
      diligencePath: >
        Request audited financial statements from Capital One investor relations; monitor Capital One 10-K
        for 2026 segment-level disclosures on Brex commercial banking contribution.
      relatedQuestionRefs:
        - QV029
      relatedTableRefs:
        - TV004
  
    - type: private-evidence-only
      severity: material
      topic: profitability
      missingEvidence: >
        No evidence confirms Brex was EBITDA positive or cash-flow positive at the time of the acquisition.
        CFO Dorfman stated the company expected to "reach profitability" — implying it had not yet done so.
        The Q4 2023 monthly cash burn of $17M suggests ongoing losses through at least early 2024.
      whyItMatters: >
        The acquisition price and 13x gross profit multiple are harder to justify if Brex was still burning
        $100M+ annually. Capital One's ROI horizon depends on how quickly Brex reaches operational
        self-sufficiency within the bank's cost structure.
      diligencePath: >
        Review Capital One commercial banking segment profitability disclosures in 2026–2027 annual reports.
      relatedQuestionRefs:
        - QV015
        - QV023
  
    - type: private-evidence-only
      severity: minor
      topic: cap-table
      missingEvidence: >
        The exact liquidation preference stack, per-investor returns for the 2022 Series D-2 investors
        (Greenoaks and co-investors), and any ratchet provisions at acquisition are not publicly disclosed.
      whyItMatters: >
        Without the cap-table details, it is not possible to determine exact per-share returns for different
        investor classes or whether any investors received preferential treatment at the $5.15B price.
      diligencePath: >
        Monitor LP letters from Greenoaks Capital and other 2022-vintage investors; request cap-table details
        from Brex legal counsel (unlikely to be public post-acquisition).
      relatedQuestionRefs:
        - QV029
