callouts:
  - calloutType: risk
    title: 2022 investors absorbed a 58% valuation haircut
    body: >
      Investors who participated in the January 2022 Series D-2 round at $12.3B received liquidity at
      $5.15B — a 58.3% discount. CNBC described this as "more than a 50% decline in valuation from 2022
      level" and framed it as evidence of the headwinds even successful fintechs face [CV003] [CV027].
      CFO Dorfman acknowledged the comparison is structurally different (full liquidity vs. minority stake)
      but did not dispute the absolute decline in per-share implied value [CV028].
    claimRefs:
      - CV003
      - CV027
      - CV028

  - calloutType: insight
    title: 13x gross profit is a premium to public-market comps
    body: >
      CFO Dorfman's "13x multiple on gross profit" framing is the central valuation anchor. Bill.com
      trades at approximately 2.5x EV/Revenue with ~55% gross margins — implying ~4.5x gross profit.
      Brex's 13x gross-profit multiple reflects a significant growth premium (40–50% vs. Bill.com's 12.5%)
      and strategic premium for Capital One's distribution synergy [CV004] [CV012].
    claimRefs:
      - CV004
      - CV012

  - calloutType: recommendation
    title: Capital One paid a fair-to-premium price; acquirer thesis is sound
    body: >
      At 5.8–6.5x implied EV/Revenue for a 40–50% growth enterprise fintech, Capital One's $5.15B
      acquisition price is defensible by public comparable analysis. The strategic premium — distribution
      through Fifth Third and future bank-embedded payments — justifies the above-market multiple.
      The primary risk to Capital One's ROI is whether Brex sustains 40%+ growth post-integration [CV038].
    claimRefs:
      - CV038
      - CV019
      - CV031

