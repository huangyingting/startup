  - id: sv03
    title: Acquisition Multiples and Comparable Analysis
    body: >
      The Capital One deal was structured as approximately $2.75B cash plus approximately 10.6 million
      shares of Capital One common stock, totalling $5.15B [CV002] [CV008]. Brex CFO Erica Dorfman
      anchored the valuation logic around a "13x multiple on gross profit," which she described as "a
      massive premium to where public companies are trading today" [CV004]. This framing implies a gross
      profit of approximately $396M (= $5.15B ÷ 13) [CV006]. Assuming a gross margin in the 45–50% range
      typical of fintech platforms — which blend high-margin SaaS with lower-margin interchange — the
      implied revenue at acquisition was approximately $790M–$880M annualised [CV007]. This equates to an
      EV/Revenue multiple of approximately 5.8–6.5x, consistent with premium public fintech comparable
      companies growing above 30% [CV038].

      The public comparable set supports this framing. Bill.com (BILL) traded at approximately $3.93B
      market cap on TTM revenue of $1.6B as of May 2026 — roughly 2.5x EV/Revenue — but Bill.com's growth
      rate was only 12.5% YoY, far below Brex's 40–50% [CV012]. Navan (NAVN), which IPO'd on NASDAQ at
      $6.2B in October 2025 and traded at $4.64B by May 2026, implied approximately 6.6x EV/Revenue on
      $702M TTM revenue growing 30.8% YoY [CV013] [CV014]. Ramp's last primary round of $7.65B (March
      2024) suggests a comparable private company is trading at a material premium to Brex's exit price,
      reflecting higher growth expectations [CV015]. The Coupa Software acquisition by Thoma Bravo in
      early 2023 at approximately $8B provides an M&A comp for slower-growth spend management software
      [CV041]. The 13x gross-profit framing looks fair to premium relative to these comps when adjusted
      for Brex's higher growth rate and integration premium paid by Capital One for distribution access
      [CV038].
    claimRefs:
      - CV002
      - CV004
      - CV006
      - CV007
      - CV008
      - CV012
      - CV013
      - CV014
      - CV015
      - CV038
      - CV041
    tableRefs:
      - TV005
    figureRefs:
      - FV002
      - FV004

  - id: sv04
    title: Post-Acquisition Status and Evidence Gaps
    body: >
      Following the April 7, 2026 close, Brex operates as Brex LLC, a wholly owned subsidiary of Capital
      One, N.A. [CV033] [CV031]. Capital One reported Q1 2026 earnings on April 21, 2026, with Brex
      integrated into its portfolio [CV031]. The Fifth Third Bank partnership signed December 2025 —
      unlocking $5.6B in annual commercial card volume via Brex Embedded [CV019] — transitioned into
      Capital One's distribution asset post-close, extending Brex's platform to approximately 8% of the
      U.S. commercial banking sector. The CFO described Capital One as "a technology company" with a
      "massive balance sheet" that enables Brex to fast-track investments and provide its customers with
      bank-scale credit infrastructure [CV028] [CV044]. Pedro Franceschi retains operational continuity as
      CEO of the Brex subsidiary, maintaining founder-led culture under Capital One's structure [CV025].

      The critical evidence gaps in this valuation analysis are (1) the absence of any audited or officially
      disclosed revenue or EBITDA figures for Brex — the 13x gross-profit and 40–50% growth assertions
      derive entirely from CFO statements in press interviews and not from audited financials; (2) the exact
      cap-table structure, liquidation preference overhang, and per-investor return profiles for the 2022
      vintage investors remain undisclosed; and (3) Brex's post-acquisition growth trajectory within
      Capital One is unverifiable as a standalone entity. Successor institutional investors who wish to
      assess Capital One's ROI on the Brex acquisition should monitor Capital One's segment disclosures
      for commercial banking revenue, cross-sell activity with Brex customers, and Brex Embedded
      partnership volume expansion in 2026 and beyond.
    claimRefs:
      - CV019
      - CV025
      - CV028
      - CV031
      - CV033
      - CV044
    tableRefs:
      - TV006
    figureRefs: []

