company:
  name: Brex
chapter:
  number: 8
  title: Valuation
  summary: >
    Capital One acquired Brex for $5.15B in April 2026, closing the only plausible exit for investors.
    The deal — structured as roughly 50% cash and 50% Capital One stock — was priced at 13x gross profit,
    a premium to public-market comps but a 58% haircut to Brex's January 2022 peak private valuation of
    $12.3B. The acquisition validates Brex's enterprise-pivot thesis while underscoring how ZIRP-era
    unicorn multiples collapsed under post-2022 rate normalisation. Revenue at deal time is estimated at
    $790M–$880M, growing 40–50% YoY, with the company targeting profitability post-close.
sections:
  - id: sv01
    title: Investment Thesis and Acquisition Context
    body: >
      The bull case for Brex was ultimately validated through a $5.15B strategic acquisition by Capital One —
      the largest bank-fintech M&A deal in reported history as of April 2026 [CV001] [CV016]. Brex built a
      vertically integrated intelligent finance platform combining corporate cards, expense management, bill
      pay, travel, and banking — acquiring 35,000+ business customers across 120 countries [CV018]. The
      enterprise pivot executed in June 2022 narrowed the addressable market but meaningfully improved unit
      economics by shedding unprofitable SMB accounts and concentrating growth on VC-backed startups and
      public companies [CV022]. Revenue was growing at 40–50% YoY at the time of the deal, and the company
      was on a trajectory toward profitability [CV005] [CV040].

      The anti-thesis materialised most clearly in the 58.3% haircut from the January 2022 peak valuation
      of $12.3B to the acquisition price of $5.15B [CV003] [CV027]. Investors who participated in the
      January 2022 Series D-2 at $12.3B — a ZIRP-era round led by Greenoaks Capital — absorbed one of the
      sharpest valuation reversals in venture history for a company that was still growing [CV009] [CV027].
      Three successive headcount reductions in 2020, 2022, and 2024 and an average monthly cash burn of
      $17M as recently as Q4 2023 signalled that the business required significant capital efficiency
      improvement before reaching self-sufficiency [CV042] [CV023]. The deal ultimately provided full
      liquidity for all shareholders — a structural advantage that CFO Erica Dorfman distinguished from the
      minority-stake nature of a typical venture round [CV028].
    claimRefs:
      - CV001
      - CV003
      - CV005
      - CV009
      - CV016
