summary:
  headline: >
    Brex's $5.15B Capital One outcome (April 2026) crystallises a 58% discount to the 2022 peak: a workable
    enterprise-fintech exit but a decisive failure of the standalone unicorn thesis — TRACK / AVOID at pre-acquisition
    private secondaries; the deal is now a Capital One integration story.
