callouts:
  - calloutType: risk
    title: Post-Acquisition Integration Risk
    body: >
      Capital One's completed acquisition of Brex on April 7, 2026 introduces integration
      risk for enterprise customers who selected Brex as an independent fintech. Any perceived
      shift in product roadmap priorities, pricing, or support model toward Capital One's
      commercial banking standards could accelerate churn among Brex's innovation-focused
      customer base. Monitoring G2 review velocity and rating trends in the 12 months
      post-close is the most accessible leading indicator.
    claimRefs:
      - CU034
      - CU035
      - CU036

  - calloutType: risk
    title: 2022 SMB Exit Remains a Reputational Liability
    body: >
      The June 2022 decision to abruptly offboard approximately 17,000 non-VC-backed customers
      with 30 days' notice remains the defining adverse event in Brex's customer history. Axios
      Pro confirmed the move; Fast Company explicitly labeled it "Brex drops small-business
      customers." The subsequent layoff cycles (October 2022, January 2024) and elevated cash
      burn confirm this was not a clean strategic pivot but a multi-year cost-and-revenue
      restructuring. The trust deficit with the small-business community has not been
      fully repaired and represents a persistent brand liability in adjacent mid-market
      segments where word-of-mouth diligence is standard.
    claimRefs:
      - CU022
      - CU023
      - CU024
      - CU026
      - CU027

  - calloutType: strength
    title: Capital One Acquisition Dramatically Expands Distribution
    body: >
      The $5.15 billion Capital One acquisition — the largest bank-fintech deal in history —
      provides Brex access to Capital One's $900 billion annual card GMV, $150 billion market
      cap, $6 billion marketing budget, and $6 billion R&D budget. Pedro Franceschi explicitly
      frames this as a decade-long acceleration of Brex's distribution into the mainstream US
      business economy. If executed without customer attrition, this is the most significant
      positive inflection point in Brex's customer-expansion history.
    claimRefs:
      - CU003
      - CU004
      - CU009
      - CU034
      - CU035

