  evidenceGaps:
    - type: private-evidence-only
      severity: material
      topic: customer-count
      missingEvidence: >
        Audited or independently verified breakdown of Brex customers by segment (startup vs.
        mid-market vs. enterprise), cohort retention, and the reason for the discrepancy between
        the "35,000+" claim (mid-2024) and the "25,000+" figure in the January 2026 acquisition
        filing.
      whyItMatters: >
        The gap between 35,000 and 25,000 customers is unexplained and could reflect account
        scope differences, churn after the SMB pivot, or a counting methodology change. This
        affects the durability narrative.
      diligencePath: >
        Request Capital One's internal segment breakdown and customer count methodology from
        the Brex investor relations team post-close.
      relatedQuestionRefs:
        - QU001
        - QU003

    - type: private-evidence-only
      severity: material
      topic: retention
      missingEvidence: >
        Net Revenue Retention (NRR), Gross Revenue Retention (GRR), and cohort-level retention
        data are not publicly disclosed by Brex.
      whyItMatters: >
        Without NRR/GRR, it is impossible to assess whether the enterprise segment is expanding
        or churning, or whether the post-pivot customer base is economically durable.
      diligencePath: >
        Request cohort NRR by year and segment (startup vs. enterprise) from Capital One
        investor relations or Brex CFO.
      relatedQuestionRefs:
        - QU004
        - QU016
        - QU017
      relatedTableRefs:
        - TU005

    - type: access-blocked
      severity: material
      topic: SMB-pivot
      missingEvidence: >
        Brex's June 2022 blog post ("Focusing on Our Core Customers") that announced the SMB
        exit to customers is no longer accessible on brex.com; archived snapshots via Wayback
        Machine were also unavailable. Independent primary coverage is paywalled (Axios Pro)
        or link-rotted (TechCrunch, Fortune URLs for 2022 pieces).
      whyItMatters: >
        The original announcement language is relevant for understanding how the company
        communicated the pivot to affected customers, and whether the 30-day notice period
        was as stated in coverage.
      diligencePath: >
        Use Wayback Machine CDX API with broader URL patterns, or request Axios Pro subscription
        for full article text; check contemporaneous Hacker News thread links.
