  - id: TU001
    title: Customer segmentation table
    notes: >
      Segment definitions based on Brex solutions pages, G2 reviewer company sizes, Capital One
      acquisition press release, and Brex founder letter. Counts and ARPU estimates are
      company-claimed or inferred; no audited breakdown is publicly available.
    enumerationScope:
      coverage: partial
      basis: >
        Six segments derived from Brex's publicly stated product surfaces (solutions/startups,
        enterprise, global), G2 reviewer size bands, and named customer verticals in the Capital
        One acquisition announcement. Covers the primary buyer types and use cases but does not
        reflect proprietary cohort or ARR data.
    claimRefs:
      - CU001
      - CU003
      - CU004
      - CU005
      - CU006
      - CU007
      - CU008
      - CU010
    columns:
      - Segment
      - Buyer / User / Payer
      - Primary Use Case
      - Estimated Size
      - Revenue / Strategic Value
      - Key Gap
    rows:
      - - VC-backed startups (seed–Series B)
        - Founder / CFO; employees as card users; entity pays
        - Corporate card, virtual cards for SaaS, basic expense reports
        - 1–50 employees
        - High count, lower ACV; primary growth funnel via YC/VC partnerships
        - High portfolio-failure churn; limited multi-entity upsell
      - - VC-backed growth companies (Series C–D)
        - VP Finance / Controller; AP team; entity pays
        - Card + expense management + bill pay + banking
        - 50–300 employees
        - Core revenue segment; multi-product cross-sell potential
        - Competitive pressure from Ramp and Mercury at this stage
      - - Mid-market non-VC (bootstrapped/PE)
        - CFO / Controller; entity pays
        - Full suite — card, travel, bill pay, ERP sync
        - 200–1,000 employees
        - Highest revenue per account; strong retention from ERP lock-in
        - Historically underserved post-2022 pivot; rebuilding trust
      - - Large enterprise (1,000+ employees)
        - CFO / CTO / IT; entity pays
        - Global multi-entity card program + SSO/SCIM + AP automation
        - 1,000–10,000+ employees
        - Highest card GMV per account; DoorDash, Intel, Crowdstrike tier
        - Long enterprise sales cycles; SAP/Coupa incumbents; Amex competition
      - - Public companies (listed equities)
        - CFO / VP Finance; entity pays
        - Global card + compliance controls + audit-grade reporting
        - 300+ accounts per Franceschi letter
        - Brand proof and large card volume; stable long-term accounts
        - SEC-grade audit requirements; implementation complexity
      - - International subsidiaries of US companies
        - Regional Finance; entity pays
        - Local-currency cards in 50+ countries; multi-entity consolidation
        - Variable (subsidiary size)
        - Post-Capital One enablement; significant expansion opportunity
        - Currency hedging complexity; local regulatory compliance

