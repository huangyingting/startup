  - id: sec-notable-customers
    title: Notable Logos and Enterprise Wins
    body: >
      Brex's named customer list, confirmed via the Capital One acquisition press release and
      Brex's own product pages, includes some of the most prominent technology companies globally.
      DoorDash is the most frequently cited reference, appearing in Brex press materials as a
      flagship enterprise deployment with multi-entity card programs across DoorDash's corporate
      and subsidiary structure [CU011, CU012]. TikTok's inclusion signals Brex's ability to win
      in complex cross-border corporate structures requiring multi-currency card programs and
      international subsidiaries [CU013]. Anthropic and Robinhood represent the AI and fintech
      verticals respectively — sectors where Brex is well-known in the VC community through its
      startup roots [CU014].

      Crowdstrike and Intel demonstrate penetration beyond the pure startup-to-growth arc into
      large publicly-traded enterprise accounts where Brex competes against established players
      such as Coupa, SAP Concur, and American Express Corporate [CU015]. Zoom, Plaid, SeatGeek,
      and the Boston Celtics round out the disclosed reference list, with the Boston Celtics
      notable as a non-technology entertainment vertical use case [CU016].

      G2 reviewer data (1,471 reviews, archived December 2025; rating 4.8/5.0) provides
      independent corroboration of adoption across company sizes. The most frequently cited
      G2 strengths include ease of setup, AI-assisted receipt matching, virtual card issuance,
      and ERP sync quality [CU017]. Brex's bill-pay page features a named quote from Sean Soper,
      Head of Accounting and Financial Operations at Alchemy, who notes that replacing separate
      Bill.com and Bank of America card programs with Brex's unified platform streamlined
      month-end close [CU018]. Brex's expense management page features Teddy Collins, VP
      Corporate Finance at SeatGeek, endorsing Brex's controls and visibility [CU019].

      Brex's claim to serve "1 in 3 startups in the US" — corroborated by a Y Combinator
      referral partnership and active Brex for Startups program — implies a large, partly-passive
      base of early-stage companies for whom Brex is the first or default card product [CU020].
      This startup flywheel creates natural upsell as companies scale, though the 2022 SMB
      pivot introduced a trust deficit with early-stage founders that the company has spent
      subsequent years partially repairing [CU021].
