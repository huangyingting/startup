figures:
  - id: FU001
    title: Customer journey map — Brex adoption from startup to enterprise
    type: journey-map
    layout: wide
    summary: >
      Maps Brex's customer lifecycle from initial startup card sign-up through growth-stage
      multi-product deployment, enterprise expansion, and the Capital One distribution
      overlay post-2026.
    claimRefs:
      - CU005
      - CU006
      - CU020
      - CU034
    data:
      items:
        - label: Discover
          detail: VC referral, YC accelerator, peer recommendation, or G2 review drives initial awareness; CFO or VP Finance typically champions evaluation
        - label: Sign Up
          detail: 10-minute online application; card issued within days; no personal guarantee required; $0/user starter plan
        - label: Activate Card + Expense
          detail: Corporate card deployed to employees; automated expense capture and receipt matching; first 30–90 days
        - label: Add Banking
          detail: Brex business account and treasury add-on replaces external bank account; typically within Year 1
        - label: Add Bill Pay / AP
          detail: Invoice management and PO workflow integrated; month-end close improvement cited by Alchemy CFO; typically Year 1–2
        - label: Add Travel
          detail: Integrated T&E via Brex Travel or BrexPay for Navan; saves parallel T&E tool subscription; larger accounts
        - label: ERP Integration
          detail: NetSuite, QuickBooks, Xero, Sage, HRIS provisioning embedded; creates high switching cost; full suite deployed
        - label: Global Expansion
          detail: Multi-entity global cards in 50+ countries; local-currency statements; enterprise accounts such as TikTok and Intel
        - label: Capital One Distribution
          detail: Post-April 2026; Capital One commercial bank referrals and co-marketing; access to $900B annual card GMV network

