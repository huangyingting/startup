    title: Financial information gaps and diligence requirements
    columns:
      - Metric
      - Gap Type
      - Materiality
      - Why It Matters
      - Diligence Path
    rows:
      - - Official GAAP revenue and ARR
        - Never disclosed
        - Critical
        - All revenue estimates are directional; the $5.15B acquisition is priced on undisclosed financials
        - Request audited management accounts; verify ARR and NRR in due diligence
      - - EBITDA / net income / operating cash flow
        - Never disclosed
        - Critical
        - Cash-flow positive target set for 2025; actual achievement unconfirmed
        - Request P&L statements; verify profitability milestones with Capital One integration team
      - - Net revenue retention (NRR) and churn rate
        - Never disclosed
        - Material
        - NRR is the primary predictor of long-term revenue quality; without it, ARR trajectory cannot be modelled
        - Request cohort analysis and churn data by customer segment in due diligence
      - - Bank partner revenue share economics (Mastercard/Visa/Sutton/Fifth Third)
        - Not public
