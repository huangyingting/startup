company:
  name: Brex
  website: https://www.brex.com
chapter:
  number: 4
  title: Financials
  summary: >
    Brex does not publish audited financial statements as a private company. Revenue is estimated at $350–500M ARR
    (late 2025) based on disclosed directional metrics: CEO-confirmed "hundreds of millions" of revenue, 35%+ revenue
    growth in 2023 (YoY), and 200%+ YoY growth in 2022 off a smaller base. Revenue is predominantly interchange income
    from its Mastercard and Visa corporate card programs, supplemented by SaaS software subscriptions ($12/user/month
    Advanced tier), treasury net interest income (up to 3.65% yield on DGVXX), and bill pay and FX fees. Brex's
    financial narrative is defined by three structural forces: (1) a successful pivot from SMB to enterprise/startup in
    2022 that stabilised the business at the cost of headcount reductions (136 in Oct 2022, 282 in Jan 2024), (2) a
    sustained effort to reduce cash burn from ~$17M/month in Q4 2023 toward cash-flow positivity, and (3) the January
    2026 Capital One acquisition at $5.15B — a 58% haircut from its $12.3B peak valuation — which ends the IPO
    narrative and creates a new integration chapter under a major U.S. bank. Key financial gaps: no official ARR
    disclosure, no profitability confirmation, no NRR data, and unclear integration economics post-acquisition.
