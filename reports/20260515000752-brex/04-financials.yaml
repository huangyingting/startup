        - Request card program agreements and interchange waterfall analysis
      - - Post-acquisition integration financials
        - Nascent/not yet disclosed
        - Material
        - Capital One integration may alter revenue model, customer terms, pricing, and product roadmap
        - Monitor Capital One quarterly earnings for Brex segment reporting
      - - Brex Embedded platform revenue and margin
        - Not separately disclosed
        - Important
        - Fifth Third deal creates a new B2B licensing revenue vector that could be material; no revenue reported
        - Request breakdown of Embedded revenue in any due diligence; track Fifth Third quarterly card volume
