callouts:
  - calloutType: insight
    title: Capital One acquisition validates the market at $5.15 billion
    body: >-
      Capital One's January 2026 announcement to acquire Brex for $5.15 billion confirms that
      a top-five US bank views AI-native corporate spend management as a strategic priority.
      The acquisition implies an enterprise value roughly 7× Brex's estimated $700 million ARR,
      consistent with high-growth SaaS multiples. It also represents a significant discount from
      Brex's 2021 peak valuation of $12.3 billion, reflecting the broader repricing of growth-stage
      fintech. Post-close, Brex gains Capital One's underwriting scale, brand, and $475 billion
      deposit base.
    claimRefs:
      - CM004
      - CM022
      - CM036

  - calloutType: risk
    title: CCCA could materially compress card interchange economics
    body: >-
      The Credit Card Competition Act, reintroduced in January 2026 as S.3623 / H.R.7035,
      would require large banks (>$100 billion in assets) to enable at least two unaffiliated
      payment networks on credit cards. Capital One's assets exceed this threshold. If passed,
      the CCCA could reduce interchange revenue that currently funds corporate card rewards
      programmes — a key value proposition for Brex's enterprise customers. The EU precedent
      (0.30% credit card interchange cap vs 1.5–3.5% US average) illustrates the potential
      downside magnitude.
    claimRefs:
      - CM014
      - CM015
      - CM016

  - calloutType: strength
    title: Enterprise NRR of ~140% signals deep product stickiness
    body: >-
      Brex's enterprise segment net revenue retention of approximately 140% as of February 2025
      indicates that customers are expanding their platform usage significantly over time — buying
      more modules, adding more employees, or expanding internationally. This level of NRR is
      consistent with best-in-class enterprise SaaS and implies that Brex's current customer base
      represents a substantial embedded growth opportunity, independent of new customer acquisition.
    claimRefs:
      - CM002
      - CM001

  - calloutType: assumption
    title: Market size estimates are highly varied and boundary-dependent
    body: >-
      Analyst estimates for the relevant TAM range from $5.4 billion (AP automation only, Allied
      Market Research 2023) to $43.7 billion (commercial corporate card issuer revenue, Market.us
      2024) to $83 trillion (total global B2B payments, ResearchAndMarkets 2024). These figures
      are not directly comparable — they measure different layers of the market stack. The absence
      of a single, consistent, public-access TAM definition for "corporate spend management" means
      that sizing analysis in this chapter is necessarily multi-lens and approximative.
    claimRefs:
      - CM006
      - CM007
      - CM008
      - CM010

