  researchQuestions:
    - id: QM001
      question: >-
        What are the distinct buyer segments that use corporate spend management platforms, and
        how do they differ in buying criteria, budget ownership, and adoption triggers?
      type: enumeration
      targets:
        - contentRequirements/2
        - plannedTables/segment-buyer-map
      status: answered

    - id: QM002
      question: >-
        What market segments and spending categories constitute the boundary of the "corporate
        spend management" market, and which adjacent categories (payroll, sourcing) are excluded?
      type: enumeration
      targets:
        - contentRequirements/0
        - plannedTables/market-definition-table
      status: answered

    - id: QM003
      question: >-
        What types of regulatory risk apply to the corporate card and spend management market
        in 2026, and how do they differ in mechanism and timing?
      type: enumeration
      targets:
        - contentRequirements/3
        - plannedTables/growth-drivers-and-constraints-table
      status: answered

    - id: QM004
      question: >-
        What are the key competitive alternatives to Brex in each buyer segment, and how do
        they differ in product coverage and go-to-market strategy?
      type: enumeration
      targets:
        - contentRequirements/2
        - plannedTables/segment-buyer-map
      status: answered

    - id: QM005
      question: >-
        What is the total addressable market for global corporate spend management platforms
        (card + SaaS combined) as estimated by analyst firms in 2024–2025?
      type: quantification
      targets:
        - contentRequirements/1
        - plannedTables/tam-sam-som-or-sizing-lens-table
        - plannedFigures/market-sizing-lens
      status: answered

    - id: QM006
      question: >-
        What is the CAGR of the global accounts payable automation market through 2032, and
        which segment dynamics are driving that growth rate?
      type: quantification
      targets:
        - contentRequirements/1
        - plannedFigures/market-estimate-range
      status: answered

    - id: QM007
      question: >-
        How large is the global commercial corporate card issuer revenue pool, and at what
        rate is it growing relative to overall B2B payment volume?
      type: quantification
      targets:
        - contentRequirements/1
        - plannedTables/tam-sam-som-or-sizing-lens-table
      status: answered

    - id: QM008
      question: >-
        What was Brex's estimated annual recurring revenue as of early 2025, and how does
        that compare to analysts' Brex SAM estimates?
      type: quantification
      targets:
        - contentRequirements/1
        - plannedFigures/market-estimate-range
      status: answered

    - id: QM009
      question: >-
        How many companies use Brex as of January 2026, and how many of them are publicly
        traded enterprises?
      type: quantification
      targets:
        - contentRequirements/1
        - plannedFigures/market-sizing-lens
      status: answered

    - id: QM010
      question: >-
        What is the estimated annual merchant savings from the Credit Card Competition Act,
        and how is that figure calculated?
      type: quantification
      targets:
        - contentRequirements/3
        - plannedTables/growth-drivers-and-constraints-table
      status: answered

    - id: QM011
      question: >-
        Does Brex actually serve approximately one in three US startups as claimed by its
        Chief Revenue Officer, and is that claim independently corroborated?
      type: verification
      targets:
        - contentRequirements/2
        - plannedTables/segment-buyer-map
      status: partial

    - id: QM012
      question: >-
        Is Brex's enterprise NRR of approximately 140% a validated and sustained metric, or
        was it a one-time peak figure reported in a single press release?
      type: verification
      targets:
        - contentRequirements/1
        - plannedFigures/market-estimate-range
      status: answered

    - id: QM013
      question: >-
        What is the current status of the CCCA in the 119th Congress as of May 2026, and has
        it advanced beyond reintroduction to committee markup or a floor vote?
      type: freshness
      targets:
        - contentRequirements/3
        - plannedTables/growth-drivers-and-constraints-table
      status: partial

    - id: QM014
      question: >-
        Is the Capital One acquisition of Brex on track to close by mid-2026, and what
        regulatory approvals are outstanding as of the report runDate?
      type: freshness
      targets:
        - contentRequirements/4
      status: unresolved

    - id: QM015
      question: >-
        What was the reputational and market impact of Brex's 2022 SMB customer exit on its
        startup segment penetration and competitive positioning versus Ramp?
      type: adverse
      targets:
        - contentRequirements/4
      status: answered

    - id: QM016
      question: >-
        What factors explain the significant valuation discount in the Capital One acquisition
        ($5.15B) relative to Brex's 2021 peak private valuation of $12.3B?
      type: adverse
      targets:
        - contentRequirements/4
      status: answered

    - id: QM017
      question: >-
        How could CCCA passage negatively affect Brex's and Capital One's interchange-based
        revenue model, and what is the estimated financial impact at EU-equivalent rates?
      type: adverse
      targets:
        - contentRequirements/3
        - plannedTables/growth-drivers-and-constraints-table
      status: answered

    - id: QM018
