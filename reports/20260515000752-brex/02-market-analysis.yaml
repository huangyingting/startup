  - id: TM004
    title: Growth drivers and constraints table
    columns:
      - Factor
      - Type
      - Direction
      - Timing
      - Implication
      - Diligence Ask
    rows:
      - - AI-native expense and AP automation
        - Product/demand driver
        - Tailwind
        - Near-term; ongoing (2024–2027)
        - Reduces CFO friction; differentiates modern platforms; increases willingness to pay
        - What % of Brex customers actively use AI features, and what is the NRR lift from AI adopters?
      - - Remote work and globally distributed teams
        - Demand driver
        - Tailwind
        - Present; sustained
        - Accelerates need for global card issuance, multi-currency reimbursement, and local FX
        - What share of Brex's 2025–2026 growth is attributable to international vs domestic US expansion?
      - - Capital One acquisition (pending close)
        - Strategic inflection
        - Neutral near-term; positive long-term
        - Close expected mid-2026; integration risk; Capital One scale enables faster underwriting
        - Brex gains Capital One's $669B balance sheet, underwriting capacity, and brand; integration complexity could slow product iteration
        - What antitrust or regulatory conditions, if any, are attached to the acquisition approval?
      - - Credit Card Competition Act (CCCA) — reintroduced Jan 2026
        - Regulatory risk
        - Headwind (material)
        - Medium-term; uncertain passage (2026–2028)
        - If passed, compresses interchange on large-bank-issued cards; Capital One is >$100B; affects Brex card economics
        - What is Brex's interchange revenue as a % of total net revenue, and what is the downside scenario at EU-equivalent rates?
      - - EU / international interchange caps
        - Regulatory risk
        - Headwind (present)
        - Ongoing; capped at 0.30% for EU credit cards
        - Limits card economics in Brex's 30-country EU expansion; pushes toward SaaS fee model
        - What % of Brex's revenue is software subscription vs interchange-based globally?
      - - SMB market exit and Ramp competitive gain
        - Adverse constraint
        - Headwind (ongoing)
        - Established; 2022 onward
        - Ceded large SMB TAM to Ramp; reputational risk with small-business ecosystem
        - Has Brex recovered SAM through enterprise wins, or is there a structural cap on US startup segment growth?
      - - Enterprise software consolidation (ERP vendors expanding)
        - Competitive constraint
        - Headwind
        - Medium-term (3–5 years)
        - SAP, Oracle, Workday expanding native spend management; risks displacing independent platforms
        - How defensible is Brex's ERP-integration position if SAP or Oracle builds competitive expense modules?
      - - Virtual card and B2B digital payment adoption
        - Product/demand driver
        - Tailwind
        - Near-term; accelerating
        - Expands card volume through procurement and tail-spend use cases; virtual cards enable automated reconciliation
        - What is Brex's virtual card issuance volume and take rate vs physical card programs?
    claimRefs:
      - CM013
      - CM014
      - CM015
      - CM016
      - CM024
      - CM032
      - CM038
    notes: >-
      The CCCA headwind is particularly relevant post-Capital One acquisition, as Capital One
      (with >$100B in assets) would be subject to CCCA routing requirements if the bill passes.
      The EU interchange cap is an existing constraint that limits card-economics revenue from
      Brex's European markets. Timing assessments reflect the analyst's best judgment as of
      the report runDate (2026-05-15) and are subject to change.

