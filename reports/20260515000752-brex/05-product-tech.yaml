            - Invoice OCR capture (multi-language, multi-currency)
            - Anomaly and fraud detection (statistical ML + real-time rules)
            - Brex Assistant (LLM conversational agent; tool-calling over Brex APIs)
        - id: l4
          label: Product Surfaces and Integrations
          modules:
            - Corporate Card (Mastercard; up to 7× rewards; virtual + physical; 30+ currencies)
            - Expense Management (employee + manager + accounting workflows)
            - Bill Pay / AP Automation (vendor onboarding; PO matching; batch payments)
            - Business Account (checking + treasury + vault)
            - Travel & Expense (GDS booking; BrexPay-for-Navan)
            - REST API + Webhooks (10 domains; developer.brex.com)

