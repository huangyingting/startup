callouts:
  - calloutType: strength
    title: Proprietary global card-issuing infrastructure is Brex's deepest moat
    body: >
      Brex's seven-year investment in building its own global card-issuing stack — enabling local-currency
      cards in 30+ currencies across 60+ countries through multiple bank issuer partnerships — is not
      replicable in the near term by domestic-only competitors such as Ramp (US-only card infrastructure).
      Capital One's acquisition rationale explicitly cited this as the key strategic asset.
    claimRefs:
      - CE008
      - CE009
      - CE019

  - calloutType: risk
    title: Capital One integration is the dominant near-term execution risk
    body: >
      The $5.15B acquisition announced January 22, 2026 (pending regulatory close expected mid-2026) introduces
      integration execution risk across technology stacks, product roadmap alignment, and regulatory review under
      OCC/Federal Reserve. Pedro Franceschi continues to lead Brex as a separate operating unit, which reduces
      cultural integration risk, but product velocity and capital allocation decisions will shift to a corporate
      parent context.
    claimRefs:
      - CE024
      - CE025

  - calloutType: insight
    title: Adverse customer reviews cluster around operational controls, not core product functionality
    body: >
      Trustpilot and HN adverse feedback consistently targets account closure procedures, international wire
      complexity, and intraday liquidity sequencing — operational and compliance processes, not the core
      spend-management software. This pattern suggests the adverse customer experience is fixable with
      process improvement and does not signal fundamental product-market fit failure.
    claimRefs:
      - CE021
      - CE022
      - CE023

