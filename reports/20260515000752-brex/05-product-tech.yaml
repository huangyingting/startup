  evidenceGaps:
    - type: private-evidence-only
      severity: material
      topic: Capital One integration plan
      missingEvidence: >
        Detailed technology integration roadmap between Brex and Capital One post-acquisition close
        (expected mid-2026). Specific milestones, API harmonisation plans, and product roadmap changes.
      whyItMatters: >
        Integration execution is the dominant near-term risk; without the integration plan, the
        product roadmap and competitive trajectory post-close are speculative.
      diligencePath: >
        Request integration roadmap and engineering org structure from Brex management during diligence;
        review Capital One's public statements on Brex integration approach in Q2-Q3 2026 earnings calls.
      relatedQuestionRefs:
        - QE007
        - QE024

    - type: private-evidence-only
      severity: material
      topic: ISO 27001 certification status
      missingEvidence: >
        ISO 27001 certification not confirmed via public sources; Brex trust page does not list it
        among its certifications (SOC 1, SOC 2, PCI-DSS, FINRA, NY DFS are listed).
      whyItMatters: >
        ISO 27001 is increasingly required by European enterprise customers for vendor security diligence;
        absence would be a gap for European market expansion under the Capital One strategic plan.
      diligencePath: >
        Request ISO 27001 certificate or ISMS scope documentation from Brex security team during diligence.
      relatedQuestionRefs:
        - QE005
      relatedTableRefs:
        - TE004

    - type: enumeration-incomplete
      severity: minor
      topic: Full ERP integration count
      missingEvidence: >
        Total count of Brex ERP/accounting connectors not publicly disclosed; named integrations
        confirmed but comprehensive directory not available on public product pages.
      whyItMatters: >
        Exact integration count is a key sales comparison metric vs. Ramp (which claims 200+ connectors);
        without a confirmed count, parity cannot be assessed.
      diligencePath: >
        Request current integration directory from Brex product team; review integration marketplace
        documentation if available post-Capital One close.
      relatedQuestionRefs:
        - QE006
      relatedTableRefs:
        - TE002

    - type: private-evidence-only
      severity: minor
      topic: FedRAMP and government customer compliance
      missingEvidence: >
        Brex's FedRAMP status not publicly disclosed as of May 2026; unlike Ramp which publicly
        disclosed FedRAMP work in 2025–2026, Brex has not made similar announcements.
      whyItMatters: >
        FedRAMP is required for US government and regulated-industry customers, a segment Capital One
        has strong existing relationships in; absence limits combined addressable market.
      diligencePath: >
        Confirm FedRAMP status with Brex security and compliance teams; review Capital One's government
        business relationships for potential pathway.
      relatedQuestionRefs:
        - QE005
      relatedTableRefs:
        - TE004

