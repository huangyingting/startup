callouts:
  - title: Acquisition valuation reset is the clearest adverse signal in Brex's history
    body: >
      Capital One's acquisition of Brex at $5.15 billion — a 58% discount to the $12.3 billion peak set in January 2022 —
      is the single most material adverse data point in this risk chapter. It confirms that the standalone venture-growth
      thesis was not validated over four years, that three rounds of layoffs did not achieve profitability, and that the
      strategic pivot away from SMB permanently narrowed Brex's addressable market. The 50% Capital One stock consideration
      introduces ongoing market risk for employees and investors. Due-diligence focus should prioritise Capital One
      integration terms, employee retention commitments, and the regulatory approval timeline for the deal itself.
    calloutType: risk
    claimRefs:
      - CR001
      - CR002
      - CR006
      - CR031
      - CR045
  - title: Bank-partner concentration and ILC failure are structural risks that remain post-acquisition
    body: >
      Brex permanently relies on Sutton Bank (Visa cards) and Emigrant Bank / Fifth Third Bank / Airwallex (Mastercard
      cards) after its ILC charter withdrawal in August 2021. Unlike a standalone fintech risk, this dependency does not
      disappear under Capital One ownership — Capital One does not automatically become the card issuer, and Brex's
      programme-level contracts with Sutton Bank remain in place. An OCC enforcement action against Sutton Bank (which
      also sponsors Ramp) could simultaneously disrupt Brex and Ramp, representing an industry-level systemic risk.
      Diligence should confirm whether Capital One plans to migrate Brex card issuance onto its own bank balance sheet
      and the timeline for doing so.
    calloutType: risk
    claimRefs:
      - CR015
      - CR016
      - CR017
      - CR030
      - CR042
