              Crowdstrike and Intel demonstrate penetration beyond the pure startup-to-growth arc into large
              publicly-traded enterprise accounts where Brex competes against established players such as Coupa, SAP
              Concur, and American Express Corporate [CU015]. Zoom, Plaid, SeatGeek, and the Boston Celtics round out
              the disclosed reference list, with the Boston Celtics notable as a non-technology entertainment vertical
              use case [CU016].

              G2 reviewer data (1,471 reviews, archived December 2025; rating 4.8/5.0) provides independent
              corroboration of adoption across company sizes. The most frequently cited G2 strengths include ease of
              setup, AI-assisted receipt matching, virtual card issuance, and ERP sync quality [CU017]. Brex's bill-pay
              page features a named quote from Sean Soper, Head of Accounting and Financial Operations at Alchemy, who
              notes that replacing separate Bill.com and Bank of America card programs with Brex's unified platform
              streamlined month-end close [CU018]. Brex's expense management page features Teddy Collins, VP Corporate
              Finance at SeatGeek, endorsing Brex's controls and visibility [CU019].

