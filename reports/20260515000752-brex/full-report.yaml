  - number: 6
    title: Customers
    sections:
      - number: '6.1'
        title: Customer Base Composition and Segmentation
        blocks:
          - type: paragraph
            body: >
              Brex's customer base as of mid-2024 spans over 35,000 companies, though that aggregate figure reflects
              diverse segment mixes that shifted dramatically after the company's June 2022 SMB exit [CU001, CU002]. At
              the January 2026 acquisition announcement, Capital One described the Brex customer base as "over 25,000 of
              the world's best companies, from startups to enterprises" — indicating either a refinement of reporting
              scope or a modest contraction in the counted customer universe between mid-2024 and early 2026 [CU003].
              Pedro Franceschi's announcement letter to employees cited "1 in 3 startups in the US" using Brex, and
              "over 300 public companies" on the platform — providing a rare window into segment depth beyond raw count
              [CU004].

              The buyer profile is predominantly finance-team-led. The CFO, VP Finance, or Controller typically drives
              the initial Brex purchase decision, with employees as secondary card users and accounting or ERP teams as
              downstream beneficiaries [CU005]. Brex's solutions page for startups is explicit about spanning the full
              venture-backed lifecycle from pre-seed through growth stage, while the enterprise solutions target
              companies with 500–10,000+ employees requiring multi-entity global card programs, SSO, SCIM, advanced AP
              automation, and ERP integration [CU006, CU007].

              Geographic composition reflects Brex's global card ambition: the platform supports local currency cards in
              50+ countries, positioning it well beyond its original US-only footprint [CU008]. The company competes
              with Ramp, Mercury, and corporate T&E suites (Navan, SAP Concur) for the US mid-market and serves
              international subsidiaries of US enterprises for non-US card programs. Post-Capital One acquisition, there
              is incremental distribution into Capital One's existing commercial banking client base, a segment Brex had
              not previously served at scale [CU009].

              Customer segmentation by vertical includes technology/software (highest software spend per employee),
              financial services, healthcare tech, and increasingly defence-adjacent and enterprise verticals (e.g.,
              Intel and Crowdstrike) where large card volume and complex multi-entity structures demand Brex's global
              policy engine [CU010].
