              value roughly 7× Brex's estimated $700 million ARR, consistent with high-growth SaaS multiples. It also
              represents a significant discount from Brex's 2021 peak valuation of $12.3 billion, reflecting the broader
              repricing of growth-stage fintech. Post-close, Brex gains Capital One's underwriting scale, brand, and
              $475 billion deposit base.
            calloutType: insight
            claimRefs:
              - CM004
              - CM022
              - CM036
          - type: callout
            title: CCCA could materially compress card interchange economics
            body: >-
              The Credit Card Competition Act, reintroduced in January 2026 as S.3623 / H.R.7035, would require large
              banks (>$100 billion in assets) to enable at least two unaffiliated payment networks on credit cards.
              Capital One's assets exceed this threshold. If passed, the CCCA could reduce interchange revenue that
              currently funds corporate card rewards programmes — a key value proposition for Brex's enterprise
              customers. The EU precedent (0.30% credit card interchange cap vs 1.5–3.5% US average) illustrates the
              potential downside magnitude.
            calloutType: risk
            claimRefs:
              - CM014
              - CM015
              - CM016
          - type: callout
            title: Enterprise NRR of ~140% signals deep product stickiness
            body: >-
              Brex's enterprise segment net revenue retention of approximately 140% as of February 2025 indicates that
              customers are expanding their platform usage significantly over time — buying more modules, adding more
              employees, or expanding internationally. This level of NRR is consistent with best-in-class enterprise
              SaaS and implies that Brex's current customer base represents a substantial embedded growth opportunity,
              independent of new customer acquisition.
            calloutType: strength
            claimRefs:
