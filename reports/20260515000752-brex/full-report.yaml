        in June 2024 when the co-CEO model was dissolved. Continues to lead Brex post-acquisition as the Brex business
        reports into Capital One.
      claimRefs:
        - CO002
        - CO008
        - CO011
  foundingLocation: Stanford, CA, USA (Y Combinator W17)
  headquarters: Salt Lake City, UT, USA (corporate); San Francisco, CA (operations)
  productSummary: >
    Brex's product platform spans the corporate spend lifecycle: a corporate charge card (Mastercard via Emigrant Bank
    and Fifth Third / Airwallex; Visa via Sutton Bank), Brex Empower (AI-powered expense management with receipt
    matching, policy enforcement, and ERP integrations), Brex Bill Pay, Brex Cash / Treasury (FINRA/SIPC-registered
    money-market and yield products via Brex Treasury LLC), Brex Travel, and an embedded-finance Brex Embedded API that
    powers third-party programmes such as the December 2025 Fifth Third Bank commercial-card partnership. Global
    coverage spans 50+ currencies and 100+ countries.
  customerFocus: >
    Post-2022 pivot: US and global mid-market and enterprise — venture-backed startups (~1 in 3 US startups, per
    company), 300+ public companies, and enterprise logos including DoorDash, Anthropic, Robinhood, CrowdStrike, Zoom,
    Plaid, SeatGeek, and the Boston Celtics. Pre-pivot Brex famously served small / non-VC-backed businesses; ~30,000
    SMB accounts were offboarded in June 2022.
  businessModel: >
    Primary revenue is card interchange (~2.7% gross on card spend, with rebates/rewards passed through to customers);
    secondary revenue from SaaS subscriptions (Brex Advanced at $12/user/month; Brex Enterprise custom pricing),
    treasury net interest income on customer cash, bill pay transaction fees, and embedded-API revenue share with bank
    partners. CFO Erica Dorfman framed the Capital One transaction at a "13x gross profit multiple," implying gross
    profit on the order of $400M — consistent with $400–500M of net revenue at industry-typical spend-management gross
    margins.
  stage: Acquired (subsidiary of Capital One, N.A. as of April 7, 2026)
  fundingStatus: >
    Lifetime primary equity raised approximately $1.5B across Series A (March 2018, $57M, Ribbit/DST), Series B (October
    2018, $125M @ $1.1B — fastest US fintech unicorn), Series C (June 2019, $100M @ $2.6B), Series C-2 (May 2020,
    $150M), Series D (April 2021, $425M @ $7.4B), and Series F (January 2022, $300M @ $12.3B led by Greenoaks). Plus a
    $250M debt facility with Citi (2023). The January 2026 Capital One acquisition at $5.15B (approx. 50% cash / 50%
    Capital One stock, closed April 7, 2026) terminated independent capital-markets activity.
