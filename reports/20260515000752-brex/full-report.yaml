      - number: '5.2'
        title: Architecture and Platform
        blocks:
          - type: paragraph
            body: >
              Brex's most defensible technical asset is its proprietary global card-issuing infrastructure. Unlike
              competitors that rely on a single bank sponsor issuing cards under one programme, Brex operates with
              multiple issuing bank partners (Emigrant Bank, Fifth Third Bank, Airwallex Netherlands for Mastercard;
              Sutton Bank for Visa), enabling issuance in 30+ currencies across 60+ countries under local regulatory
              frameworks. This "build from the bottom of the stack up" approach, highlighted by CEO Pedro Franceschi in
              the Capital One acquisition announcement, took seven years to construct and is not easily replicated.
              [CE008] [CE009] [CE010]

              The software platform is cloud-native, built on a microservices architecture deployed on AWS. Brex
              engineers built critical financial components in-house to maintain upgrade and security control. The
              unified transaction data model across all product lines — cards, expenses, bill pay, banking, travel —
              enables the AI layer to operate across all spend categories simultaneously. The platform exposes a
              REST/OpenAPI developer API covering ten functional domains: Accounting, Budgets, Expenses, Fields,
              Onboarding, Payments, Team, Transactions, Travel, and Webhooks. A public Slack developer community and
              dedicated API status page (status.brex.com) support third-party integrators. [CE011] [CE012] [CE013]

              The Brex engineering organisation has published open-source tooling reflecting its AI focus: the
              brexhq/prompt-engineering repository (9,500+ GitHub stars), focused on LLM best practices, and
              brexhq/substation, a toolkit for routing and normalising security and audit logs. Brex also maintains a
              Go-based LLM-as-a-judge HTTP proxy for agent security in production (brexhq/bedrock). [CE014]
            claimRefs: []
