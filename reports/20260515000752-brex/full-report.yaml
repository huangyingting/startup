      - number: '7.4'
        title: Financial, Operational and Key-Person Risk
        blocks:
          - type: paragraph
            body: >
              Brex's financial risk is most visible in its burn trajectory and multi-year failure to reach
              profitability. Cash burn ran at $22 million per month in Q4 2022 and improved to $17 million per month by
              Q4 2023 per The Information [CR007]. CEO Pedro Franceschi's January 2024 all-hands message acknowledged
              that Brex remained not yet cash-flow positive and committed to reaching that milestone "with the money we
              have in the bank" — the acquisition by Capital One approximately 24 months later suggests the standalone
              path to profitability was tighter than anticipated [CR008]. Revenue is publicly characterised as "hundreds
              of millions of dollars" with gross profit growth of 75%+ in 2023, but no audited financials have been
              disclosed [CR009]. The revenue mix of interchange plus SaaS subscription plus interest and FX income means
              a regulatory interchange compression event would hit multiple product lines simultaneously [CR036, CR021].

              Three layoff events — June 2020 (approximately 62 employees, 17%), October 2022 (136 employees, 11%), and
              January 2024 (282 employees, 20%) — are an adverse signal of persistent difficulty scaling revenues ahead
              of costs [CR006]. Rising interest rates in 2022–2024 increased the cost of float financing, though the
              rate cycle began reversing in late 2024 [CR032]. Platform operational risk centres on service availability
              during month-end close, the card-authorisation pipeline's dependency on Sutton Bank and Visa, and the
              security of financial transaction data held for 1,100+ enterprise customers [CR039, CR043].

              Key-person risk is acute. CTO Cosmin Nicolaescu departed in January 2024 (now an advisor), COO Michael
              Tannenbaum transitioned to board member the same month, and the prior CFO (Swiecicki) departed in October
              2022 for Rippling [CR024, CR025, CR026]. Pedro Franceschi is sole CEO as of June 2024 (co-CEO model
              abandoned; Henrique Dubugras became chairman) [CR027]. New COO Camilla Morais, CFO Ben Gammell, and VP
              Engineering James Reggio must now execute the Capital One integration without several senior leaders who
              built the original platform. Post-acquisition retention of engineering talent is an open diligence
              question: Capital One stock as consideration introduces market risk, and competing fintech employers
              (particularly Ramp) are actively recruiting [CR028, CR029].
