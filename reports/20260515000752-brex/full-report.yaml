companyProfile:
  summary: >
    Brex Inc. (now Brex LLC, a wholly owned subsidiary of Capital One, N.A.) is a US-headquartered corporate spend
    management platform founded in January 2017 by Henrique Dubugras and Pedro Franceschi, two Brazilian entrepreneurs
    who had previously co-founded Pagar.me (sold to Stone in 2016). Brex pioneered the no-personal-guarantee corporate
    charge card for venture-backed startups, became the fastest US fintech to reach unicorn status (October 2018), and
    at its January 2022 peak raised $300M from Greenoaks Capital at a $12.3B valuation. After exiting the SMB segment in
    June 2022 to refocus on mid-market and enterprise, three rounds of layoffs (Oct 2022, Oct 2023, Jan 2024), CFO and
    CTO turnover, and a withdrawn Industrial Loan Company charter application, Brex stabilised around 25,000–35,000
    enterprise customers and "hundreds of millions" of annual revenue growing 35–50% YoY. On January 22, 2026 Capital
    One announced its agreement to acquire Brex for $5.15B (approximately 50% cash, 50% Capital One stock); the
    transaction closed on April 7, 2026 at a 58% discount to the 2022 peak valuation but a meaningful premium to
    secondary-market trades and the most recent primary mark.
  foundedDate: '2017-01-03'
  founders:
    - name: Henrique Dubugras
      role: Co-founder; former Co-CEO; Chairman of the Board (post-June 2024)
      background: >
        Brazilian-born entrepreneur who met co-founder Pedro Franceschi on Twitter at age 16 and co-founded Pagar.me in
        Brazil in 2013, sold to Stone in 2016. Dubugras served as co-CEO from founding through June 2024, then
        transitioned to Chairman.
      claimRefs:
