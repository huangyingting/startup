      - number: '2.4'
        title: Competitive Structure and Regulatory Risk
        blocks:
          - type: paragraph
            body: >
              The corporate spend management market is in mid-innings disruption. Legacy players — SAP Concur (SAP),
              Oracle iProcurement, and Coupa — hold enterprise installed-base contracts but face attrition from
              AI-native challengers. The cloud-native segment is consolidating around full-stack platforms (Brex, Ramp)
              versus point solutions (Expensify, BILL). Brex's 2022 decision to exit its SMB customer segment has been
              characterised by analysts as a strategic misstep that ceded addressable market to Ramp and others, though
              the company has more than offset this with enterprise growth. [CM024] [CM038]

              Regulatory risk is material. The Credit Card Competition Act (CCCA), reintroduced in January 2026 as
              S.3623 and H.R.7035, would require financial institutions with assets exceeding $100 billion to enable at
              least two unaffiliated payment networks on credit cards. Passage would directly affect Capital One
              (>$100B) and could compress the interchange economics underpinning Brex's card rewards programmes. [CM014]
              [CM015] Credit card interchange rates in the US average 1.5–3.5%, compared to a European Union cap of
              0.30%, illustrating the downside scenario if CCCA-style regulation passes. [CM016]

              The ABA, Visa, and Mastercard oppose the CCCA, arguing it would reduce consumer rewards, jeopardise
              transaction security, and harm community financial institutions — factors that also represent adverse tail
              risk for Brex's card economics. [CM018] [CM019]

              Brex's BIN-sponsor dependency on Emigrant Bank, Fifth Third Bank N.A., Airwallex (Netherlands) B.V., and
              Sutton Bank, and its pre-existing Treasury relationship with Capital One, are structural elements that the
              acquisition is expected to simplify. [CM020] [CM021]

              The acquisition at $5.15 billion represents a notable discount versus Brex's 2021 peak private valuation
              of $12.3 billion, indicating that the market for growth-stage fintech has repriced. Brex also laid off
              approximately 20% of its workforce in January 2024 as part of its path to positive cash flow. [CM036]
              [CM037]
