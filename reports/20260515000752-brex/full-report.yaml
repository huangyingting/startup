      - number: '5.3'
        title: AI and ML Capabilities
        blocks:
          - type: paragraph
            body: >
              Brex's AI layer pervades every product surface. The spend management workflow uses AI to auto-generate
              IRS/local-tax-compliant receipts, draft expense memos, auto-populate attendee fields, categorise
              transactions to GL accounts, detect policy violations, flag anomalous spend (including per-diem overages
              and duplicate charges), and route exceptions to managers via Slack or SMS without requiring a Brex login.
              The Brex Assistant conversational agent handles employee queries and automates tasks via natural language.
              [CE015] [CE016]

              In bill pay, AI captures itemised invoice details from forwarded/uploaded documents (OCR supporting multi-
              language and multi-currency), suggests matching POs, and drafts payment workflows. The ML layer maps
              transactions to subsidiary GL accounts, applies custom coding rules at scale, and produces mapping
              suggestions for accelerated month-end close. [CE017] [CE018]

              Capital One characterised Brex as an "AI-native software platform" and "AI agents to help customers
              automate complex workflows." Capital One's own $6B R&D budget and proprietary ML underwriting
              infrastructure — used for two decades across consumer credit cards and auto loans — will be available to
              accelerate Brex's AI capabilities post-acquisition. The AI layer is a key differentiation point versus
              pure-software competitors: Ramp's data network effect depends on its own customer base, while Brex gains
              access to Capital One's far larger dataset post-close. [CE019] [CE020]
