  - number: 5
    title: Product & Technology
    sections:
      - number: '5.1'
        title: Product Suite Overview
        blocks:
          - type: paragraph
            body: >
              Brex offers a unified spend management platform built around five major product lines, all integrated on a
              single data model: (1) Corporate Card — Mastercard-branded credit card (issued by Emigrant Bank, Fifth
              Third Bank, or Airwallex) with up to 7× rewards; a separate Visa Commercial Card issued by Sutton Bank is
              available where Mastercard is not preferred; (2) Business Account — commercial checking (Column N.A.),
              Treasury (money-market sweep via Dreyfus Government Cash Management Fund, FDIC coverage up to $6M across
              24 partner banks), and Vault (advanced fraud protection); (3) Expense Management — AI-powered receipt
              auto-generation, memo drafting, GL coding, policy enforcement, manager approval workflows via Slack/SMS;
              (4) Bill Pay — vendor onboarding, OCR invoice capture, multi-level approval routing, PO two-way matching,
              ACH/wire/check/card payments; (5) Travel & Expense (T&E) — integrated flight/hotel booking with policy
              guardrails, plus a BrexPay-for-Navan integration embedding Brex cards in Navan's travel management
              platform. [CE001] [CE002] [CE003] [CE004]

              The platform serves 35,000+ companies as of the Capital One acquisition announcement (January 2026),
              including approximately 1 in 3 US startups, 300+ public companies, and enterprises such as DoorDash,
              TikTok, Anthropic, Robinhood, CrowdStrike, Zoom, Plaid, Intel, SeatGeek, and the Boston Celtics. Plans
              start at $0/user/month for the base tier and $12/user/month for advanced features. Customers have
              collectively put $51B in spend under policy automation and earned $680M in rewards on the platform.
              [CE005] [CE006] [CE007]
            claimRefs: []
