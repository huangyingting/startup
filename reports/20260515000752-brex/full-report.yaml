    title: Company Overview
    sections:
      - number: '1.1'
        title: Identity, Business Model, and Current Ownership Status
        blocks:
          - type: paragraph
            body: >-
              Brex was founded on January 3, 2017 by Henrique Dubugras and Pedro Franceschi, two Brazilian entrepreneurs
              who had previously co-founded Pagar.me — a payments processor sold to Stone in 2016. The founders met on
              Twitter at age 16 and joined Y Combinator's Winter 2017 cohort as a VR startup, then pivoted to fintech
              within three weeks after identifying a structural gap: venture-backed startups flush with capital could
              not obtain corporate credit cards from traditional banks because they lacked personal credit histories.
              Brex solved this by underwriting cards based on company bank balance and VC funding raised, eliminating
              personal guarantees. [CO002] [CO004] [CO005]

              The initial corporate charge card product launched publicly in January 2018. By 2026, the platform covers
              corporate cards (Mastercard via Emigrant Bank, Fifth Third/Airwallex; Visa via Sutton Bank), Brex Empower
              expense management, Brex Cash checking accounts (via Column N.A.), Brex Treasury (FINRA/SIPC-registered, a
              Capital One company), bill pay, AI-native travel, and AI expense agents. Products operate in 50+ countries
              with local currency cards. Revenue is primarily interchange-driven (~2.7% gross interchange x Brex's
              share), supplemented by interest on Brex Cash and SaaS fees. Estimated gross margins are approximately
              65%. [CO003] [CO007] [CO021]

              As of May 2026, Brex is no longer an independent company. Capital One announced the $5.15B acquisition of
              Brex on January 22, 2026 in cash and stock. The Brex website footer confirms completion: "Brex LLC is a
              wholly owned subsidiary of Capital One, N.A." with headquarters at 650 S 500W Suite 300, Salt Lake City,
              UT 84101. Pedro Franceschi continues as CEO under Capital One ownership. [CO001] [CO006]
