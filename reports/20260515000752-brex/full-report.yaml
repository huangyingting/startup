      - number: '4.3'
        title: Capital Structure and the Capital One Acquisition
        blocks:
          - type: paragraph
            body: >
              Brex raised approximately $1.4–1.5B in total primary and secondary transactions from 2017 through its
              final independent funding round. Primary equity rounds include an estimated seed in 2017 (Y Combinator),
              Series A (~$25M, 2018), Series B (~$50M, 2018), Series C (~$100M at ~$2.6B, 2019), Series D ($425M at
              $7.4B, April 2021), and Series D extension ($300M at $12.3B, January 2022). No venture debt or public
              credit facilities have been disclosed. [CI010] [CI011] [CI032]

              The Capital One Financial Corporation (NYSE: COF) announced the acquisition of Brex for $5.15B on January
              22, 2026, in conjunction with Capital One's Q4 2025 earnings release. The deal is structured as 50% cash
              and 50% Capital One common stock (COF). Capital One filed an 8-K with the SEC on January 22, 2026
              (accession number 0001193125-26-019543) formally disclosing the transaction. The deal was expected to
              close mid-2026; as of May 15, 2026, the Brex website already identifies Brex LLC as "a wholly owned
              subsidiary of Capital One, N.A." and Brex Treasury LLC as "a Capital One company" — suggesting the
              transaction has closed or subsidiaries have been transferred. [CI012] [CI013] [CI014] [CI034]

              The $5.15B acquisition price represents a 58% discount from Brex's $12.3B peak valuation (Series D
              extension, January 2022). CNBC noted this represents "more than 50% decline in valuation" — emblematic of
              broader fintech multiple compression from the 2021 ZIRP-era peak. At $350–500M estimated ARR, the implied
              EV/ARR acquisition multiple is approximately 10–15x, which is reasonable for a high-growth fintech with
              embedded payments infrastructure and B2B platform extension value (Fifth Third deal). The total $1.4–1.5B
              raised yields an approximately 3.4x return on invested capital at $5.15B — positive but below the 10x+
              expected return for investors who anchored to the $12.3B peak valuation. [CI013] [CI031] [CI030]
