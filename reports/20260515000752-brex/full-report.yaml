      - - Capital One integration costs exceed $500M
        - Net integration charges disclosed in Capital One earnings
        - ROI on $5.15B acquisition deteriorates materially
        - Review Capital One annual / quarterly segment disclosures for Brex integration costs
  - id: TV006
    title: Final diligence asks table
    subtitle: Outstanding evidence requests for Capital One integration monitoring
    notes: Evidence gaps that existed at acquisition close and remain relevant for post-deal monitoring.
    claimRefs:
      - CV005
      - CV006
      - CV007
    columns:
      - Topic
      - Missing Evidence
      - Why It Matters
      - Diligence Path
    rows:
      - - Brex revenue and gross profit (audited)
        - No audited income statement has been publicly disclosed for Brex Inc.
        - >-
          The 13x gross profit multiple is the sole valuation anchor; without audited financials the implied $790–880M
          revenue range is unverified
        - Request financial statements from Capital One investor relations; monitor Capital One 10-K segment disclosures
      - - Gross margin structure
        - Exact interchange vs. SaaS revenue split and resulting blended gross margin not disclosed
        - If gross margin is below 40%, the implied revenue exceeds $990M — changing the EV/Revenue multiple materially
        - Review Capital One commercial banking segment metrics; request CFO clarification
      - - Investor-level returns for 2022 vintage
        - Exact liquidation preference stack and per-investor return at $5.15B acquisition not disclosed
        - Critical for assessing VC fund performance and whether 2022 investors recovered principal
        - Request cap table details from Brex legal counsel or monitor investor LP letters
      - - Post-acquisition growth trajectory
        - No standalone Brex revenue or growth metrics post-close
        - Determines whether Capital One's integration thesis is on track
        - Monitor Capital One quarterly earnings calls for Brex commercial banking contribution
      - - Brex Embedded bank partner pipeline
        - Only Fifth Third disclosed; other bank partners (if any) not announced
        - Core distribution thesis depends on B2B banking partner network scale
        - Monitor Brex press releases and Capital One partnership announcements in 2026
      - - Employee retention post-acquisition
        - No data on employee attrition following April 2026 close
        - >-
          Three prior layoff rounds create cultural risk; retention of Brex engineering team critical for product
          velocity
        - Monitor LinkedIn headcount trends and Glassdoor sentiment post-acquisition
