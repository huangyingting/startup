      - number: '8.4'
        title: Post-Acquisition Status and Evidence Gaps
        blocks:
          - type: paragraph
            body: >
              Following the April 7, 2026 close, Brex operates as Brex LLC, a wholly owned subsidiary of Capital One,
              N.A. [CV033] [CV031]. Capital One reported Q1 2026 earnings on April 21, 2026, with Brex integrated into
              its portfolio [CV031]. The Fifth Third Bank partnership signed December 2025 — unlocking $5.6B in annual
              commercial card volume via Brex Embedded [CV019] — transitioned into Capital One's distribution asset
              post-close, extending Brex's platform to approximately 8% of the U.S. commercial banking sector. The CFO
              described Capital One as "a technology company" with a "massive balance sheet" that enables Brex to
              fast-track investments and provide its customers with bank-scale credit infrastructure [CV028] [CV044].
              Pedro Franceschi retains operational continuity as CEO of the Brex subsidiary, maintaining founder-led
              culture under Capital One's structure [CV025].

              The critical evidence gaps in this valuation analysis are (1) the absence of any audited or officially
              disclosed revenue or EBITDA figures for Brex — the 13x gross-profit and 40–50% growth assertions derive
              entirely from CFO statements in press interviews and not from audited financials; (2) the exact cap-table
              structure, liquidation preference overhang, and per-investor return profiles for the 2022 vintage
              investors remain undisclosed; and (3) Brex's post-acquisition growth trajectory within Capital One is
              unverifiable as a standalone entity. Successor institutional investors who wish to assess Capital One's
              ROI on the Brex acquisition should monitor Capital One's segment disclosures for commercial banking
              revenue, cross-sell activity with Brex customers, and Brex Embedded partnership volume expansion in 2026
              and beyond.
            claimRefs:
              - CV019
              - CV025
              - CV028
              - CV031
              - CV033
              - CV044
          - type: table
            tableRef: TV006
            claimRefs:
              - CV005
              - CV006
              - CV007
      - number: '8.5'
        title: Exhibits
        blocks:
          - type: callout
            title: 2022 investors absorbed a 58% valuation haircut
            body: >
              Investors who participated in the January 2022 Series D-2 round at $12.3B received liquidity at $5.15B — a
              58.3% discount. CNBC described this as "more than a 50% decline in valuation from 2022 level" and framed
              it as evidence of the headwinds even successful fintechs face [CV003] [CV027]. CFO Dorfman acknowledged
              the comparison is structurally different (full liquidity vs. minority stake) but did not dispute the
              absolute decline in per-share implied value [CV028].
            calloutType: risk
            claimRefs:
              - CV003
              - CV027
              - CV028
          - type: callout
            title: 13x gross profit is a premium to public-market comps
            body: >
              CFO Dorfman's "13x multiple on gross profit" framing is the central valuation anchor. Bill.com trades at
              approximately 2.5x EV/Revenue with ~55% gross margins — implying ~4.5x gross profit. Brex's 13x
              gross-profit multiple reflects a significant growth premium (40–50% vs. Bill.com's 12.5%) and strategic
              premium for Capital One's distribution synergy [CV004] [CV012].
            calloutType: insight
            claimRefs:
              - CV004
              - CV012
          - type: callout
            title: Capital One paid a fair-to-premium price; acquirer thesis is sound
            body: >
              At 5.8–6.5x implied EV/Revenue for a 40–50% growth enterprise fintech, Capital One's $5.15B acquisition
              price is defensible by public comparable analysis. The strategic premium — distribution through Fifth
              Third and future bank-embedded payments — justifies the above-market multiple. The primary risk to Capital
              One's ROI is whether Brex sustains 40%+ growth post-integration [CV038].
            calloutType: recommendation
            claimRefs:
              - CV038
              - CV019
              - CV031
