      - number: '4.2'
        title: Unit Economics, Cost Structure, and Burn Reduction
        blocks:
          - type: paragraph
            body: >
              Brex's unit economics are structurally favourable but poorly documented publicly. At an estimated
              $350–500M ARR with approximately 1,000 employees post-January 2024 layoffs, the implied revenue per
              employee is $350,000– 500,000 — competitive with top-quartile B2B fintech. Customer count of 25,000–35,000
              companies implies average revenue per customer of $10,000–20,000 annually (much lower than Ramp's implied
              $20,000–28,000), consistent with a customer mix skewed toward high-growth startups with lower initial card
              spend. [CI017] [CI018] [CI022]

              **Cash burn and runway**: The Information reported that Brex burned $17M/month in Q4 2023. Brex disputed
              this figure. TechCrunch reported in June 2024 that Brex had cut its burn rate in half, implying
              ~$8–9M/month by mid-2024 and a cash runway of approximately four years (co-founders confirmed four-year
              runway in June 2024). Pedro Franceschi set a target of cash-flow positive by 2025 (TechCrunch June 2024);
              whether this was achieved is not publicly confirmed. [CI015] [CI016] [CI037]

              **Cost reduction levers**: Three restructuring events since 2020 reduced headcount by ~30% from the ~1,400
              employee peak: COVID-era layoff of 62 people (~15%) in 2020; October 2022 layoff of 136 people (~11%)
              following the SMB exit and market reset; January 2024 layoff of 282 people (~20%) to flatten structure and
              accelerate path to profitability. Gross profit growth of 75%+ in 2023 — outpacing 35%+ revenue growth —
              confirms improving gross margin, likely driven by reduced partner economics, software mix shift, and
              operating leverage. [CI019] [CI020] [CI021]

              **Revenue quality**: Pedro Franceschi noted in June 2024 that revenue is "mostly from interchange" but the
              software business is growing as startups grow larger and enterprise accounts expand. This mix shift is
              financially beneficial: software/SaaS gross margins (~80–90%) are materially higher than net interchange
              (~40–60%), so increasing software contribution expands blended gross margin over time. The 75%+ gross
              profit growth vs. 35%+ revenue growth in 2023 is consistent with this favourable mix shift. [CI001]
              [CI005] [CI033]
