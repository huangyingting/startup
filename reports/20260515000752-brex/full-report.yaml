      - number: '2.2'
        title: Market Sizing — TAM, SAM, and SOM
        blocks:
          - type: paragraph
            body: >
              Market sizing for corporate spend management is highly dependent on the chosen boundary. Total global B2B
              payment value reached approximately $83 trillion in 2024 (ResearchAndMarkets via Yahoo Finance), with a
              conflicting estimate of $130.64 trillion (Fit Small Business) reflecting different methodological scopes;
              these represent the broadest possible context but not Brex's direct TAM. [CM006] [CM007]

              Within the commercially relevant layers, the global commercial corporate card market (issuer revenue, not
              payment volume) was valued at $43.7 billion in 2024, projected to reach $87.6 billion by 2034 at a 7.2%
              CAGR (Market.us). Commercial card total payment volume exceeded $4 trillion globally in 2023 and is
              expected to surpass $6 trillion by 2029. [CM008] [CM009]

              The global accounts payable automation software market was valued at $5.4 billion in 2023 and is projected
              to grow to $17 billion by 2032 at a 13.9% CAGR (Allied Market Research), driven by cloud-native mid-market
              adoption. [CM010]

              Expense management software represents a $6–12 billion global market as of 2025, growing at approximately
              8–15% CAGR. US B2B payment volume reached approximately $197 billion in 2023 and is projected to reach
              $390 billion by 2031 (Fit Small Business). Brex's estimated annual recurring revenue of approximately $700
              million by January 2025 implies early-stage penetration of these larger market layers. [CM011] [CM022]

              A conservative Brex SAM — US and key international enterprises and growth-stage companies not yet on
              modern spend platforms — is estimated at $3–6 billion in annual software and card-economics revenue, with
              meaningful expansion possible as Brex scales its global card issuance and AP automation capabilities under
              Capital One.
