      - number: '3.5'
        title: Exhibits
        blocks:
          - type: callout
            title: Acquisition Discount Signals Weakened Competitive Position
            body: >
              Capital One acquired Brex for $5.15 billion — a ~58% discount to Brex's prior $12.3 billion valuation.
              This compression reflects diminished competitive positioning versus Ramp rather than market conditions:
              Ramp's $13B implied valuation at the same time was rising, not falling. The discount is a concrete market
              signal that should inform any assessment of Brex's standalone competitive trajectory and moat durability.
            calloutType: risk
            claimRefs:
