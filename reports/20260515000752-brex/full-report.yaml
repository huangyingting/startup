  - number: 3
    title: Competitors
    sections:
      - number: '3.1'
        title: Competitive Overview and Market Structure
        blocks:
          - type: paragraph
            body: >
              The corporate spend management market that Brex operates in is structurally multi-tiered. The first and
              most dangerous tier for Brex is the AI-native fintech peer group: Ramp is the definitive benchmark
              competitor, having scaled to 50,000+ businesses while Brex reports 25,000+ customers. Ramp's implied
              valuation of ~$13 billion — established in its 2025 funding round — is more than double the $5.15 billion
              that Capital One paid for Brex in early 2025, a deal that closed by May 2026. [CP001] [CP002] [CP022]

              The second competitive tier is the enterprise incumbent layer. SAP Concur (founded 1993, SAP-owned since
              2014 for $8.3B) controls the Fortune 500 T&E market via deep ERP integration and compliance depth. Coupa
              (taken private by Thoma Bravo at ~$8B in 2023) dominates enterprise procurement spend management with $1B+
              revenues and 3,200+ enterprise customers. These incumbents have near-zero churn from existing customers
              due to ERP lock-in, but lose new mid-market deals to cloud-native alternatives. [CP009] [CP010]

              The third tier is SMB and mid-market AP automation. BILL (NYSE: BILL) serves 498,000 businesses — the
              largest US SMB customer base in finance — with $345B in annual payment volume that equals approximately 1%
              of US GDP. Its 2021 acquisition of Divvy added a corporate card product, making it a full-stack spend
              management competitor to Brex in the sub-$10M revenue band. [CP008] [CP026]

              The fourth tier consists of adjacent and specialist competitors: Navan (travel + expense integration),
              Mercury (banking-led corporate cards for startups), Airbase/Paylocity (integrated spend + HR/payroll), and
              European challengers Pleo and Spendesk that have no meaningful US presence. Stripe Issuing represents an
              infrastructure-layer threat, enabling embedded card programs that bypass both Brex and Ramp. [CP014]
              [CP025]
            claimRefs: []
