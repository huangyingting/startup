              and active Brex for Startups program — implies a large, partly-passive base of early-stage companies for
              whom Brex is the first or default card product [CU020]. This startup flywheel creates natural upsell as
              companies scale, though the 2022 SMB pivot introduced a trust deficit with early-stage founders that the
