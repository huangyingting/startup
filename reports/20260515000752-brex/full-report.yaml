      - number: '7.3'
        title: Regulatory, Legal and Bank-Partner Risk
        blocks:
          - type: paragraph
            body: >
              Brex's regulatory architecture is defined by a failed attempt to obtain its own banking licence. The ILC
              (industrial loan company) application, filed in February 2021, was withdrawn in August 2021 after facing
              sustained opposition from banking regulators and congressional members who questioned Brex's capital
              adequacy and supervision readiness [CR015, CR042]. As a result, Brex permanently relies on issuing bank
              partners: Sutton Bank for Visa commercial cards, and Emigrant Bank, Fifth Third Bank, and Airwallex for
              Mastercard-branded cards [CR016]. Any regulatory enforcement action, capital adequacy stress, or strategic
              exit by a key issuing bank would require Brex to migrate its card program — a process typically taking six
              to eighteen months and affecting all active cardholders [CR030].

              Brex Payments LLC (NMLS #2035354) is licensed as a money transmitter across multiple US states.
              State-level licence suspensions or new state-specific compliance requirements add operational overhead
              that scales with geographic expansion [CR018]. Brex Treasury LLC (formerly a registered investment adviser
              and FINRA/SIPC member) adds investment-product regulatory exposure [CR034].

              Capital One — Brex's acquiring parent — was sued by the CFPB on January 14, 2025 for alleged violations
              related to savings-account disclosures totalling approximately $2 billion; this parent-company regulatory
              overhang increases the scrutiny applied to the combined entity post-close [CR019]. The CFPB's nonbank
              supervision rule (finalised 2024) also creates direct examination risk for Brex's own operations at
              current scale [CR023]. BSA/AML compliance obligations shared between Brex Payments LLC and its bank
              partners compound as transaction volume grows [CR022].

              CourtListener records confirm four active cases as of the runDate: Giuliano v. Brex Inc. (Bankr.D.Del.
              2024, case 24-50301), Stowers v. Brex Inc. (N.D.Ga. 2024, case 1:24-cv-05926), Beskrone v. Brex Inc.
              (Bankr.D.Del. 2025, case 25-50610), and Brex Inc. v. Mack (S.D.N.Y. 2024, case 1:24-cv-04192) [CR020].
              Case details and dollar exposures are not publicly available from docket search alone. The Credit Card
              Competition Act (S.1838, 118th Congress) is the primary legislative risk: if enacted, mandatory routing
              competition for credit and commercial cards could reduce interchange revenue by 30–50%, materially
              compressing Brex's card economics [CR021]. Brex's user arbitration clause (confirmed in user terms) limits
              class-action exposure but may be challenged under future CFPB interpretive guidance [CR044].
            claimRefs: []
