      - number: '1.2'
        title: Founders, Leadership, and Governance
        blocks:
          - type: paragraph
            body: >-
              Brex's founding team brings deep fintech infrastructure expertise. Pedro Franceschi (sole CEO since June
              2024) built all of Brex's core financial infrastructure — including Mastercard integrations, ACH, SWIFT,
              and wire processing — from scratch starting at age 22. Henrique Dubugras (Chairman since June 2024) led
              fundraising ($1.5B+), investor relations, and banking partnerships through the growth phase. Both
              co-founded Pagar.me in 2013 in Brazil (building it from age 17 to a Stone acquisition), then dropped out
              of Stanford in 2017 to join YC. [CO030] [CO008] [CO009]

              The June 2024 leadership transition was material: Brex abandoned its co-CEO structure, naming Franceschi
              as sole CEO and Dubugras as Chairman to streamline decision-making. Simultaneously, COO Michael Tannenbaum
              transitioned to the Board of Directors, with Camilla Morais elevated from SVP Global Operations to COO.
              CTO Cosmin Nicolaescu departed in January 2024 to an advisory role, concurrent with the January 2024
              workforce reduction. Karandeep Anand serves as President; Doug Adamic joined as Chief Revenue Officer in
              August 2022 from SAP Concur. [CO010] [CO011] [CO012] [CO014] [CO015]

              Post-acquisition by Capital One, Franceschi retains his CEO role and Brex continues operating as a
              distinct brand. Board composition post-acquisition is not fully publicly disclosed; Capital One has not
              published a full post-merger board roster. [CO013]
