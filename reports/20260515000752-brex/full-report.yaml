      - number: '1.3'
        title: Funding History, Valuation, and the Capital One Acquisition
        blocks:
          - type: paragraph
            body: >-
              Brex raised capital across nine primary rounds from 2017 through 2022, accumulating more than $1.5 billion
              in total primary funding. Key rounds include a $57M Series A led by Ribbit Capital and DST Global (March
              2018), $125M Series B at $1.1B (October 2018, fastest US fintech unicorn at the time), $100M Series C at
              $2.6B (June 2019), $425M Series D at $7.4B (April 2021), and a $300M Series F at $12.3B led by Greenoaks
              Capital (January 2022). Early angel investors include Peter Thiel (PayPal co-founder) and Max Levchin
              (PayPal/Affirm founder). Institutional investors include Greenoaks, IVP, Tiger Global, YC Continuity,
              Kleiner Perkins, DST Global, Lone Pine Capital, and Ribbit Capital. [CO016] [CO017] [CO018] [CO019]
              [CO020]

              The January 22, 2026 Capital One acquisition at $5.15 billion represents a 58% discount from the $12.3B
              peak valuation. This discount reflects post-2021 fintech multiple compression, three layoff rounds, the
              June 2022 SMB exit that reduced customers from ~50,000+ to ~30,000+, and persistent pre-tax losses through
              late 2025. Cash-flow positivity (achieved October 2025) came too late to support a premium. The deal
              nonetheless represents a successful exit: Brex gains Capital One's banking charter, balance sheet, and
              commercial card distribution; investors receive meaningful exit proceeds on $1.5B+ of deployed capital.
              [CO025] [CO027] [CO031]
