      - number: '8.3'
        title: Acquisition Multiples and Comparable Analysis
        blocks:
          - type: paragraph
            body: >
              The Capital One deal was structured as approximately $2.75B cash plus approximately 10.6 million shares of
              Capital One common stock, totalling $5.15B [CV002] [CV008]. Brex CFO Erica Dorfman anchored the valuation
              logic around a "13x multiple on gross profit," which she described as "a massive premium to where public
              companies are trading today" [CV004]. This framing implies a gross profit of approximately $396M (= $5.15B
              ÷ 13) [CV006]. Assuming a gross margin in the 45–50% range typical of fintech platforms — which blend
              high-margin SaaS with lower-margin interchange — the implied revenue at acquisition was approximately
              $790M–$880M annualised [CV007]. This equates to an EV/Revenue multiple of approximately 5.8–6.5x,
              consistent with premium public fintech comparable companies growing above 30% [CV038].

              The public comparable set supports this framing. Bill.com (BILL) traded at approximately $3.93B market cap
              on TTM revenue of $1.6B as of May 2026 — roughly 2.5x EV/Revenue — but Bill.com's growth rate was only
              12.5% YoY, far below Brex's 40–50% [CV012]. Navan (NAVN), which IPO'd on NASDAQ at $6.2B in October 2025
              and traded at $4.64B by May 2026, implied approximately 6.6x EV/Revenue on $702M TTM revenue growing 30.8%
              YoY [CV013] [CV014]. Ramp's last primary round of $7.65B (March 2024) suggests a comparable private
              company is trading at a material premium to Brex's exit price, reflecting higher growth expectations
              [CV015]. The Coupa Software acquisition by Thoma Bravo in early 2023 at approximately $8B provides an M&A
              comp for slower-growth spend management software [CV041]. The 13x gross-profit framing looks fair to
              premium relative to these comps when adjusted for Brex's higher growth rate and integration premium paid
              by Capital One for distribution access [CV038].
            claimRefs:
