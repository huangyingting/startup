      - number: '5.4'
        title: Risks and Limitations
        blocks:
          - type: paragraph
            body: >
              Adverse customer feedback on Trustpilot (rated 2.4/5 "Poor" from a Dec 2025 archive) and Hacker News
              documents several recurring technical and operational failures: (1) abrupt account closures without
              explanation or adequate notice, sometimes in as few as 10 days; (2) SMB de-platforming in 2022 with 6-week
              notice while refocusing on enterprise; (3) international wire complexity requiring third-party bank
              routing by payees and generating return-fee charges of $26–$200; (4) Treasury-to-Checking transfer timing
              misalignment causing failed ACH or payroll payments due to intraday liquidity sequencing; (5)
              virtual/physical cards remaining active after account closure — a UX design failure that led to
              unauthorised post-closure charges. [CE021] [CE022] [CE023]

              The multi-issuer bank partner dependency is a structural risk: if any one issuer (Emigrant Bank, Fifth
              Third Bank, Airwallex, Sutton Bank) terminates or renegotiates its arrangement, Brex must migrate card
              portfolios under that issuer — a complex, customer-disruptive exercise. The Capital One acquisition
              introduces a new category of risk: integration complexity across two different technology stacks,
              potential product roadmap reprioritisation, and regulatory review under OCC/Federal Reserve that could
              delay or limit combined platform capabilities. G2 reviewers also note limited customisability for complex
              reporting needs and episodic customer-support responsiveness. The 2026 Brex acquisition price of $5.15B
              represented a 58% decline from the $12.3B valuation at peak (2021), reflecting the broader fintech
              valuation reset and investor scepticism about interchange-dependent revenue models. [CE024] [CE025]
              [CE026]
