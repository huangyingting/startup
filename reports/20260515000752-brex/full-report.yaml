      - number: '7.5'
        title: Exhibits
        blocks:
          - type: callout
            title: Acquisition valuation reset is the clearest adverse signal in Brex's history
            body: >
              Capital One's acquisition of Brex at $5.15 billion — a 58% discount to the $12.3 billion peak set in
              January 2022 — is the single most material adverse data point in this risk chapter. It confirms that the
              standalone venture-growth thesis was not validated over four years, that three rounds of layoffs did not
              achieve profitability, and that the strategic pivot away from SMB permanently narrowed Brex's addressable
              market. The 50% Capital One stock consideration introduces ongoing market risk for employees and
              investors. Due-diligence focus should prioritise Capital One integration terms, employee retention
              commitments, and the regulatory approval timeline for the deal itself.
            calloutType: risk
            claimRefs:
              - CR001
              - CR002
              - CR006
              - CR031
              - CR045
          - type: callout
            title: Bank-partner concentration and ILC failure are structural risks that remain post-acquisition
            body: >
              Brex permanently relies on Sutton Bank (Visa cards) and Emigrant Bank / Fifth Third Bank / Airwallex
              (Mastercard cards) after its ILC charter withdrawal in August 2021. Unlike a standalone fintech risk, this
              dependency does not disappear under Capital One ownership — Capital One does not automatically become the
              card issuer, and Brex's programme-level contracts with Sutton Bank remain in place. An OCC enforcement
              action against Sutton Bank (which also sponsors Ramp) could simultaneously disrupt Brex and Ramp,
              representing an industry-level systemic risk. Diligence should confirm whether Capital One plans to
              migrate Brex card issuance onto its own bank balance sheet and the timeline for doing so.
            calloutType: risk
            claimRefs:
              - CR015
              - CR016
              - CR017
              - CR030
              - CR042
  - number: 8
    title: Valuation
    sections:
      - number: '8.1'
        title: Investment Thesis and Acquisition Context
        blocks:
          - type: paragraph
            body: >
              The bull case for Brex was ultimately validated through a $5.15B strategic acquisition by Capital One —
              the largest bank-fintech M&A deal in reported history as of April 2026 [CV001] [CV016]. Brex built a
              vertically integrated intelligent finance platform combining corporate cards, expense management, bill
              pay, travel, and banking — acquiring 35,000+ business customers across 120 countries [CV018]. The
              enterprise pivot executed in June 2022 narrowed the addressable market but meaningfully improved unit
              economics by shedding unprofitable SMB accounts and concentrating growth on VC-backed startups and public
              companies [CV022]. Revenue was growing at 40–50% YoY at the time of the deal, and the company was on a
              trajectory toward profitability [CV005] [CV040].

              The anti-thesis materialised most clearly in the 58.3% haircut from the January 2022 peak valuation of
              $12.3B to the acquisition price of $5.15B [CV003] [CV027]. Investors who participated in the January 2022
              Series D-2 at $12.3B — a ZIRP-era round led by Greenoaks Capital — absorbed one of the sharpest valuation
              reversals in venture history for a company that was still growing [CV009] [CV027]. Three successive
              headcount reductions in 2020, 2022, and 2024 and an average monthly cash burn of $17M as recently as Q4
              2023 signalled that the business required significant capital efficiency improvement before reaching
              self-sufficiency [CV042] [CV023]. The deal ultimately provided full liquidity for all shareholders — a
              structural advantage that CFO Erica Dorfman distinguished from the minority-stake nature of a typical
              venture round [CV028].
            claimRefs:
              - CV001
              - CV003
              - CV005
              - CV009
              - CV016
