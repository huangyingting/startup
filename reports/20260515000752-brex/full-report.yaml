              - CM001
          - type: callout
            title: Market size estimates are highly varied and boundary-dependent
            body: >-
              Analyst estimates for the relevant TAM range from $5.4 billion (AP automation only, Allied Market Research
              2023) to $43.7 billion (commercial corporate card issuer revenue, Market.us 2024) to $83 trillion (total
              global B2B payments, ResearchAndMarkets 2024). These figures are not directly comparable — they measure
              different layers of the market stack. The absence of a single, consistent, public-access TAM definition
              for "corporate spend management" means that sizing analysis in this chapter is necessarily multi-lens and
              approximative.
