      - number: '2.3'
        title: Buyer Segments and Market Drivers
        blocks:
          - type: paragraph
            body: >
              Brex's customer base spans six primary segments: venture-backed startups, growth-stage companies,
              mid-market enterprises, large public companies, international and multinational corporations, and
              SaaS/technology companies. According to Brex Chief Revenue Officer Art Levy, approximately one in three US
              startups uses Brex, demonstrating deep penetration in the venture-backed segment. [CM012] The Capital One
              acquisition announcement confirmed over 25,000 companies on the platform, including DoorDash, TikTok,
              Anthropic, Robinhood, and CrowdStrike. [CM034]

              Enterprise adoption is accelerating: Brex's enterprise business grew 80% year-over-year as of February
              2025, with enterprise net revenue retention (NRR) of approximately 140%. Over 150 publicly traded
              companies have adopted Brex, with a combined market capitalization exceeding $2.9 trillion. [CM001]
              [CM002] [CM003]

              Growth drivers include: AI-native expense automation (Brex's AI features are estimated to save customers
              approximately 11 million employee hours annually), global remote work trends requiring multi-currency
              reimbursement and card programs, the shift from manual AP workflows to automated platforms, and Capital
              One's scale enabling faster credit underwriting for enterprise accounts. [CM013] [CM035]

              The Federal Reserve's payments study confirmed continued growth in electronic B2B payment volume, with ACH
              B2B transactions reaching 6.59 billion and $54.2 trillion in value, corroborating the secular shift to
              digital payment infrastructure. [CM031]
