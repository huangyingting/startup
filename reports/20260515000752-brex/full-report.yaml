  - number: 2
    title: Market Analysis
    sections:
      - number: '2.1'
        title: Market Definition and Structure
        blocks:
          - type: paragraph
            body: >
              Brex competes in a multi-layer market that spans corporate card programs, expense management software,
              accounts payable automation, travel management, and corporate banking. The market boundary for this
              analysis is the set of products and workflows through which a business controls, records, and settles
              employee and vendor spend — collectively "corporate spend management." Adjacent categories that are
              excluded from the core boundary include payroll processing, personal consumer banking, and strategic
              procurement sourcing (though tail-spend and procurement workflows are an emerging adjacency via Brex
              Embedded and the Coupa partnership). [CM026]

              Status-quo substitutes include traditional corporate card programs from American Express, Visa, and
              Mastercard bank issuers; legacy expense software such as SAP Concur and Expensify; manual
              spreadsheet-based AP workflows; and ERP-native spend modules from Oracle, SAP, and Workday. These
              incumbents retain the majority of enterprise installed-base accounts but are vulnerable to displacement by
              AI-native platforms that integrate card, expense, AP, and banking in a single data layer. [CM027]

              A significant structural event occurred on January 22, 2026, when Capital One announced a definitive
              agreement to acquire Brex for $5.15 billion in a combination of stock and cash. The acquisition, expected
              to close in mid-2026, confirms the strategic value of AI-native corporate spend management platforms and
              positions Brex inside a bank with $669 billion in total assets. Pedro Franceschi, Brex's founder and CEO,
              will continue to lead Brex post-close. [CM004]
