      - number: '6.3'
        title: '2022 SMB Pivot: Strategic Rationale, Fallout, and Recovery'
        blocks:
          - type: paragraph
            body: >
              In June 2022, Brex — then valued at $12.3 billion — announced it was exiting the small business market,
              confirming to Axios Pro that it was "closing SMB accounts" to focus exclusively on enterprise customers
              [CU022]. The announcement, which reportedly reached approximately 17,000 non-VC-backed customers via email
              with a 30-day account closure notice, generated intense backlash on Hacker News and social media, with
              small-business owners describing the abrupt notice as reputationally damaging [CU023]. Fast Company
              reported the move explicitly as "Brex drops small-business customers to focus on enterprise" [CU024].

              The strategic rationale was articulated by Pedro Franceschi as a product-market fit misalignment: Brex's
              underwriting model (equity-based credit limits rather than revenue-based) was designed for VC-backed
              companies with large funding rounds, not cash-flow-based SMBs. Serving both segments simultaneously
              created support complexity and product fragmentation [CU025]. Brex subsequently launched Brex 3.0,
              focusing product investment on large enterprise and mid-market accounts requiring global card programs,
              multi-entity AP, and deep ERP integrations.

              The pivot triggered a wave of layoffs. In October 2022, Brex cut approximately 136 employees (11% of
              staff), followed by a larger reduction in January 2024 when 20% of its workforce was laid off, including
              the departure of CTO Cosmin Nicolaescu to an advisory role [CU026, CU027]. Fortune reported that The
              Information disclosed Brex's average monthly cash burn was approximately $17 million in Q4 2023, down from
              $22 million/month in Q4 2022, with an estimated four-year cash runway [CU028]. These adverse signals —
              multiple layoff cycles, elevated cash burn, and a strategy reset — persisted from 2022 through mid-2024
              and culminated in the January 2026 Capital One acquisition announcement, which Franceschi acknowledged as
              a direct consequence of the Brex 3.0 transformation: "We earned the right to be ambitious again" [CU029].

              From a customer-quality perspective, the pivot was a calculated sacrifice of low-ARPU, high-support-cost
              SMB accounts in favour of high-ARPU enterprise accounts with greater card volume and cross-sell potential.
              The 2026 customer base of 25,000–35,000 companies is meaningfully higher quality per account than the 2022
              base, even if the count is lower than the pre-pivot total [CU030].
