  - number: 4
    title: Financials
    sections:
      - number: '4.1'
        title: Revenue Model and Growth Trajectory
        blocks:
          - type: paragraph
            body: >
              Brex's revenue is primarily driven by **net interchange income** from its corporate card programmes
              (Mastercard and Visa). Brex earns gross interchange from the card networks on each transaction made by
              customers, then returns a portion as cashback/rewards (up to 7x points or cash equivalents). The net
              interchange retained, after card network fees and banking partner revenue shares, represents the largest
              revenue stream. [CI001] [CI002]

              Secondary revenue streams include: **SaaS software subscriptions** — the Advanced tier at $12/user/month
              generates recurring software revenue from companies that upgrade from the free Essentials tier; **treasury
              net interest income (NII)** — Brex Treasury LLC holds customer cash in the Dreyfus Government Cash
              Management Fund (DGVXX) and earns yield of up to 3.65%, with a portion flowing to Brex; **bill pay fees**
              — flat or percentage fees on ACH/wire payment execution; **foreign exchange fees** on international
              transactions; and **Brex Embedded** — B2B licensing of Brex's payments API to bank partners such as Fifth
              Third Bank, unlocking $5.6B in annual commercial card volume. [CI003] [CI007] [CI008]

              CEO Pedro Franceschi confirmed in January 2024 that Brex had grown to "hundreds of millions of dollars in
              revenue" and that revenue grew 35%+ YoY in 2023 while gross profit increased 75%+ in the same year. Prior
              to the 2022 SMB pivot, Brex reported 200%+ YoY revenue growth (2022 Disruptor 50). These metrics are
              directional rather than audited. Estimated ARR of $350–500M as of late 2025 is derived from these
              directional disclosures and is subject to material uncertainty. [CI004] [CI005] [CI038]

              **Critical gap**: Brex has never disclosed official GAAP revenue, ARR, or profitability. All estimates are
              based on management's directional public statements and carry high uncertainty. The 200% → 35%
              deceleration reflects the structural transition from high-growth SMB aggregation to stickier but slower
              enterprise expansion. [CI006]
            claimRefs: []
