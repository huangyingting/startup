            body: >
              Brex's named customer list, confirmed via the Capital One acquisition press release and Brex's own product
              pages, includes some of the most prominent technology companies globally. DoorDash is the most frequently
              cited reference, appearing in Brex press materials as a flagship enterprise deployment with multi-entity
              card programs across DoorDash's corporate and subsidiary structure [CU011, CU012]. TikTok's inclusion
              signals Brex's ability to win in complex cross-border corporate structures requiring multi-currency card
              programs and international subsidiaries [CU013]. Anthropic and Robinhood represent the AI and fintech
              verticals respectively — sectors where Brex is well-known in the VC community through its startup roots
