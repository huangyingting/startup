      - number: '4.3'
        title: 资本结构与 Capital One 收购
        blocks:
          - type: paragraph
            body: >
              从 2017 年到最后一轮独立融资，Brex 在新股和老股交易中累计融资约 $1.4–1.5B。新股轮次包括 2017 年估计种子轮（Y Combinator）、Series A（约
              $25M，2018）、Series B（约 $50M，2018）、Series C（约 $100M，估值约 $2.6B，2019）、Series D（$425M，估值 $7.4B，2021 年 4 月），以及
              Series D 延续轮（$300M，估值 $12.3B，2022 年 1 月）。没有披露风险债务或公开信贷额度。[CI010] [CI011] [CI032]

              Capital One Financial Corporation（NYSE: COF）于 2026 年 1 月 22 日结合 2025 年 Q4 业绩发布，宣布以 $5.15B 收购 Brex。交易结构为
              50% 现金、50% Capital One 普通股（COF）。Capital One 于 2026 年 1 月 22 日向 SEC 提交 8-K（accession number
              0001193125-26-019543），正式披露交易。交易原预计在 2026 年中完成；截至 2026 年 5 月 15 日，Brex 网站已将 Brex LLC 标识为「a wholly owned
              subsidiary of Capital One, N.A.」，并将 Brex Treasury LLC 标识为「a Capital One
              company」——这意味着交易已完成，或子公司已完成转移。[CI012] [CI013] [CI014] [CI034]

              $5.15B 收购价较 Brex $12.3B 峰值估值（Series D 延续轮，2022 年 1 月）折价 58%。CNBC 指出，这代表估值「more than 50% decline in
              valuation」——是 2021 年 ZIRP 时代峰值后金融科技倍数压缩的典型案例。按估计 $350–500M ARR 计算，收购隐含 EV/ARR 倍数约 10–15x；对于一家拥有嵌入式支付基础设施和
              B2B 平台延展价值（Fifth Third 交易）的高增长金融科技公司，这一倍数合理。累计融资 $1.4–1.5B 在 $5.15B 退出价下带来约 3.4x 投入资本回报——结果为正，但低于那些按
              $12.3B 峰值估值锚定的投资者所期待的 10x+ 回报。[CI013] [CI031] [CI030]
