  customerFocus: >
    2022 年转向后：美国和全球中型市场及企业客户——风投支持的初创公司（公司称约每 3 家美国初创公司中有 1 家使用 Brex）、300+ 家上市公司，以及
    DoorDash、Anthropic、Robinhood、CrowdStrike、Zoom、Plaid、SeatGeek、Boston Celtics 等企业标杆。转向前，Brex 以服务小型 / 非 VC 支持企业闻名；2022
