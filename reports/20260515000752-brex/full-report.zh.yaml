      - number: '1.4'
        title: 规模、里程碑、财务轨迹与不利事件
        blocks:
          - type: paragraph
            body: >-
              截至 2026 年 5 月，Brex 服务 35,000+ 家公司，其中约 250 家为上市公司；已披露企业客户包括 DoorDash、Anthropic、OpenAI、Robinhood、CrowdStrike
              和 Plaid。2025 年员工数约 1,100 人，低于裁员前约 1,300+ 人的峰值。2023 年收入增长 35%+，截至 2025 年 8 月增长跟踪值为 49%。2023 年毛利增长
              75%。分析师估计，Brex 自动化工具每年为客户节省 $163M+。2023 年 Q4 月烧钱速度为 $17M（低于 2022 年 Q4 的 $22M），公司于 2025 年 10
              月实现经营现金流转正。[CO028] [CO029] [CO032] [CO033] [CO035] [CO038]

              三次裁员构成 Brex 不利运营史的主线：2020 年 6 月（约 62 人，约 17%）、2022 年 10 月（约 136 人，约 11%）、2024 年 1 月（282 人，约 20%）。2022 年 6
              月的 SMB 退出——Brex 给数千家非 VC 支持小企业 30 天通知并下线账户——引发明显客户和媒体反弹。Brex 还撤回了 2021 年 2 月提交的银行牌照申请，未能完成。一个正向拐点出现在 2023
              年 3 月：Silicon Valley Bank 倒闭后，Brex 承接了大量 SVB 存款和新客户。[CO024] [CO026] [CO027] [CO034]

              产品和合作方面，Brex 获得欧洲支付机构牌照，推出面向企业支付的稳定币（USDC）支持，集成 Oracle Fusion Cloud ERP，并与 Fifth Third Bank 建立商业卡合作（约
              $5.6B ACV）。Brex 的 AI 原生路线图——包括用自然语言查询支出的 AI CFO 智能体——让其在与 Ramp 和 Rippling 的竞争中保持位置。[CO036] [CO039] [CO040]
