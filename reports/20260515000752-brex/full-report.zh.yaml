      - number: '8.2'
        title: 估值历史与 2022 ZIRP 拐点
        blocks:
          - type: paragraph
            body: >
              Brex 的估值轨迹，是 ZIRP 时代私募市场过热、随后回归基本面的案例。从 YCombinator S17 队列公司起步，Brex 通过快速连续融资扩张，April 2021 Series D 估值达到
              $7.4B，January 2022 Series D-2 延展轮达到 $12.3B——九个月抬升 66% [CV010] [CV009]。约 12 轮融资累计募集资本为 $1.5B [CV011]。$12.3B
              估值形成于 ZIRP 顶峰，当时高增长 SaaS 和 fintech 可拿到 50–100x ARR 倍数；相比之下，公开市场在 H2 2022 大幅回调，可比倍数压缩 60–80%。

              后 ZIRP 现实在 June 2022 通过退出 SMB 市场抵达 Brex [CV022]，又在 October 2022 通过裁员 11%（136 人）进一步显现 [CV021]。到 January
              2024，约 282 名员工、20% 的减员反映公司继续严控成本，因为约 $200M 的年度现金消耗需要四年现金跑道支撑独立运营 [CV020] [CV023]。Destiny Tech100 封闭式基金截至
              March 2022 持有 Brex 投资，提供了二级市场证据，说明峰值时期 Brex 股份曾在机构手中交易 [CV026]。Brex 的 ILC 牌照申请于 August 2021
              撤回，减轻了一项重大监管悬置风险 [CV024]。在 Capital One 交易成形前，Brex 曾考虑 IPO 或追加私募融资这类标准增长路径 [CV029]。
