      - - 智能金融平台护城河：卡、银行、费用、差旅、账单支付等多产品抬高切换成本
        - 已证实 — Capital One 支付整合溢价；Brex Embedded 成为银行分销产品
      - - 对这个规模的支出管理平台，40–50% YoY 增长具备结构性强度
        - CFO 表述证实；增速从 2022 年 200%+ YoY 峰值放缓，但仍处于前四分位
      - - 反向逻辑：$12.3B（Jan 2022）估值是 ZIRP 过剩，脱离基本面
        - 已证实 — 收购估值折价 58%；每月烧钱 $17M 暴露盈利能力不足
      - - 反向逻辑：连续裁员（2020、2022、2024）显示成本纪律缺口持续存在
        - 部分证实 — 三轮裁员使员工数从 2022 年约 1,400 人降至 2025 年约 1,100 人
      - - 反向逻辑：撤回银行牌照、ILC 申请失败削弱监管竞争护城河
