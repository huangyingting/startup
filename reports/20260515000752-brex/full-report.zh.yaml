      - number: '3.3'
        title: 现有厂商与专门化竞争者威胁
        blocks:
          - type: paragraph
            body: >
              SAP Concur 通过 Brex 难以轻易替代的结构性优势主导企业 T&E 市场：原生 SAP ERP 集成、满足 Fortune 500
              审计要求的合规深度，以及叠加在费用平台上的全球差旅预订产品。Concur 的弱点也很明确——复杂的 3 到 6 个月部署、$50K–$500K 实施成本、以及老旧 UX——但一旦安装，切换成本很高。Brex
              争取的是新的企业标杆，而不是替换已安装 Concur 的账户。[CP033]

              Navan（原 TripActions）靠差旅优先的企业支出打法，实现了 $613M LTM 收入和 $7.6B LTM 总预订量。43 的 NPS 分和 96% CSAT
              评分反映出该细分客户满意度强。Navan 与 Brex 的全球卡和差旅管理产品直接竞争，其差旅预订数据还形成 Brex 缺少的差异化费用自动化飞轮。[CP006] [CP038]

              Mercury 瞄准 Brex 2022 年转离 SMB 后退出的初创公司银行客群。Mercury 的银行主导模式——主支票、储蓄和资金管理账户，再叠加企业卡——与 Brex 的卡主导模式结构不同。Mercury
              拥有 1,000+ 名员工、2024 年融资轮形成的 $3.5B 估值、免费基础层加 $35/月付费选项，填补了 Brex 退出 SMB 后留下的空白。[CP007] [CP023] [CP035]

              Airbase 在 2024 年被 Paylocity 收购后，已把企业支出与 HR/薪资工作流集成。这为已经使用 Paylocity 薪资的公司提供了有吸引力的中型市场主张——支出管理作为 HR
              平台附加模块打包。Emburse 和 Mesh Payments 分别以企业费用管理和 AI 驱动多币种卡管理，补齐中型市场替代方案。[CP011] [CP029] [CP030]

              Pleo（40,000+ 家企业，覆盖 16 个欧洲国家，800+ 名员工）和 Spendesk（5,000+ 家公司，CFO Connect 中有 10,000+
              名财务专业人士）主导欧洲企业卡，但在美国存在感很小，因此对 Brex 北美收入基础构成间接而非直接威胁。[CP012] [CP013] [CP028]
