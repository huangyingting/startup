      - number: '6.2'
        title: 重点客户 Logo 与企业级斩获
        blocks:
          - type: paragraph
            body: >
              Capital One 收购新闻稿和 Brex 自身产品页面确认的 Brex 具名客户名单，包含全球最知名的一批科技公司。DoorDash 是最常被引用的案例，在 Brex 新闻材料中作为旗舰企业部署出现，覆盖
              DoorDash 公司及子公司结构下的多实体卡计划 [CU011, CU012]。TikTok 入列，说明 Brex 能赢下复杂跨境公司结构中的业务，这类结构需要多币种卡计划和国际子公司支持
              [CU013]。Anthropic 和 Robinhood 分别代表 AI 与 fintech 垂直行业；凭借初创公司根基，Brex 在 VC 社区对这些行业并不陌生 [CU014]。

              Crowdstrike 和 Intel 说明 Brex 已突破纯初创到成长阶段曲线，进入大型上市企业账户，并在这些账户中与 Coupa、SAP Concur、American Express Corporate
              等既有玩家竞争 [CU015]。Zoom、Plaid、SeatGeek 和 Boston Celtics 补充了已披露案例名单，其中 Boston Celtics 作为非科技娱乐垂直行业用例尤其值得注意
              [CU016]。

              G2 评价数据（1,471 条评论，December 2025 归档；评分 4.8/5.0）独立佐证了不同公司规模中的采用情况。G2 中最常被提到的 Brex 优势包括设置容易、AI 辅助收据匹配、虚拟卡发行和
              ERP 同步质量 [CU017]。Brex 账单支付页面引用了 Alchemy 会计与财务运营负责人 Sean Soper 的具名评价；他指出，用 Brex 统一平台替代分散的 Bill.com 和 Bank
              of America 卡计划后，月结流程被简化 [CU018]。Brex 费用管理页面则引用 SeatGeek 公司财务副总裁 Teddy Collins 对 Brex 控制能力和可见性的背书 [CU019]。

              Brex 声称服务「美国每 3 家初创公司中有 1 家」——Y Combinator 转介合作和活跃的 Brex for Startups 计划也支持这一点——意味着 Brex
              拥有大量部分被动的早期公司基础，对这些公司来说，Brex 是第一张或默认企业卡。这个初创客户飞轮会在公司扩张时自然带来增购；但 2022 SMB 转向也在早期创始人中留下信任赤字，Brex 此后几年只修复了一部分
              [CU020, CU021]。
