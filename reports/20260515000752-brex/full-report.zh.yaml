  - number: 8
    title: 估值
    sections:
      - number: '8.1'
        title: 投资逻辑与收购背景
        blocks:
          - type: paragraph
            body: >
              Brex 的乐观情景最终通过 Capital One 的 $5.15B 战略收购得到验证——截至 April 2026，这是报道史上最大的银行-fintech M&A 交易 [CV001]
              [CV016]。Brex 搭建了一个垂直一体化的智能金融平台，把企业卡、费用管理、账单支付、差旅和银行能力合在一起，并在 120 个国家获得 35,000+ 企业客户 [CV018]。June 2022
              执行的企业转向缩窄了可服务市场，但通过剥离不盈利的 SMB 账户、把增长集中到 VC 支持的初创公司和上市公司，显著改善了单位经济 [CV022]。交易发生时，收入正以 40–50% YoY
              增长，公司也在走向盈利 [CV005] [CV040]。

              反向逻辑最清晰地体现在估值从 January 2022 峰值 $12.3B 到 $5.15B 收购价的 58.3% 折价 [CV003] [CV027]。参与 January 2022 Series D-2、估值
              $12.3B 的投资者——这轮融资由 Greenoaks Capital 领投，发生在 ZIRP 时代——承受了风险投资史上最剧烈的估值反转之一，而公司当时仍在增长 [CV009]
              [CV027]。2020、2022、2024 年连续三次减员，以及截至 Q4 2023 仍有 $17M 的平均月度烧钱速度，都说明公司在实现自我造血前，需要大幅提升资本效率 [CV042]
              [CV023]。这笔交易最终为所有股东提供了完整流动性——CFO Erica Dorfman 将这一结构优势与典型风险投资轮的少数股权性质区分开来 [CV028]。
