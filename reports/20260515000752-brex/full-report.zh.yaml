  - number: 6
    title: 客户情况
    sections:
      - number: '6.1'
        title: 客户基础构成与分层
        blocks:
          - type: paragraph
            body: >
              截至 mid-2024，Brex 客户基础覆盖 35,000+ 家公司，但这个汇总数字背后是多元客群组合；公司在 June 2022 退出 SMB 后，结构发生剧烈变化 [CU001, CU002]。在
              January 2026 收购公告中，Capital One 将 Brex 客户基础描述为「超过 25,000 家全球最优秀公司，从初创公司到企业客户」——这意味着 mid-2024 到 early 2026
              之间，统计口径可能收窄，也可能是被计入客户总量小幅收缩 [CU003]。Pedro Franceschi 写给员工的公告信称，「美国每 3 家初创公司中有 1 家」使用 Brex，平台上还有「超过 300
              家上市公司」——这为观察原始数量之外的分层深度提供了少见窗口 [CU004]。

              买方画像主要由财务团队牵头。CFO、VP Finance 或 Controller 通常推动最初的 Brex 采购决定，员工作为二级持卡用户，会计或 ERP 团队则是下游受益者 [CU005]。Brex
              面向初创公司的解决方案页面明确覆盖从 种子前到成长期的完整 VC 支持生命周期；企业解决方案则瞄准 500–10,000+ 名员工、需要多实体全球卡计划、SSO、SCIM、高级 AP 自动化和 ERP 集成的公司
              [CU006, CU007]。

              地理构成体现了 Brex 的全球卡野心：平台在 50+ 个国家支持本币卡，定位已远超最初仅覆盖美国的足迹 [CU008]。在美国中端市场，Brex 与 Ramp、Mercury 和企业 T&E
              套件（Navan、SAP Concur）竞争；在非美国卡计划上，则服务美国企业的国际子公司。Capital One 收购后，Brex 可进一步进入 Capital One 既有商业银行客户基础，这是 Brex
              过去未能规模化服务的客群 [CU009]。

              按垂直行业看，客户分层包括技术/软件（人均软件支出最高）、金融服务、医疗科技，以及越来越多的国防相邻和企业垂直行业（如 Intel 和 Crowdstrike）。这些客户有大额卡交易量和复杂多实体结构，需要
              Brex 的全球政策引擎 [CU010]。
