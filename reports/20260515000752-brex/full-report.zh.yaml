      - number: '8.5'
        title: 附录
        blocks:
          - type: callout
            title: 2022 年投资者承受了 58% 估值折价
            body: >
              参与 January 2022 Series D-2、估值 $12.3B 的投资者，以 $5.15B 获得流动性——折价 58.3%。CNBC 将其描述为「较 2022 年水平估值下降超过
              50%」，并把它视为即便成功 fintech 也会面对阻力的证据 [CV003] [CV027]。CFO Dorfman 承认，这个比较在结构上不同（完整流动性 vs.
              少数股权），但没有否认每股隐含价值的绝对下降 [CV028]。
            calloutType: risk
            claimRefs:
              - CV003
              - CV027
              - CV028
          - type: callout
            title: 13x 毛利相对公开市场可比公司有溢价
            body: >
              CFO Dorfman 的「按毛利 13x 倍数」是核心估值锚。Bill.com 以约 2.5x EV/Revenue 交易，毛利率约 55%——意味着约 4.5x 毛利。Brex 的 13x
              毛利倍数体现了显著增长溢价（40–50% vs. Bill.com 的 12.5%），以及 Capital One 分销协同带来的战略溢价 [CV004] [CV012]。
            calloutType: insight
            claimRefs:
              - CV004
              - CV012
          - type: callout
            title: Capital One 支付了合理到偏高的价格；收购方逻辑成立
            body: >
              对一家增长 40–50% 的企业 fintech 而言，5.8–6.5x 隐含 EV/Revenue 足以让 Capital One 的 $5.15B 收购价在公开可比分析下站得住。战略溢价——经由 Fifth
              Third 和未来银行嵌入式支付的分销——支撑了高于市场的倍数。Capital One ROI 的主要风险，在于 Brex 整合后能否维持 40%+ 增长 [CV038]。
            calloutType: recommendation
            claimRefs:
              - CV038
              - CV019
              - CV031
