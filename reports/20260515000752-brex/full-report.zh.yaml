        - id: l2
          label: 核心平台服务（云原生，AWS）
          modules:
            - 卡控制引擎（实时授权；支出限额；商户类别）
            - 统一交易数据模型（卡 + 费用 + 银行 + 差旅）
            - 支付处理服务（ACH、电汇、支票、虚拟卡）
            - 预算管理服务（Live Budgets™；部门分配）
            - 身份 / SSO 服务（SAML 2.0；SCIM；OIDC；Okta、Microsoft、Google Workspace）
        - id: l3
          label: AI 与 ML 层
          modules:
            - 收据自动生成（OCR + NLP；IRS / 本地税务规则）
            - GL 自动编码（分类 ML + 规则引擎）
            - 发票 OCR 抓取（多语言、多币种）
            - 异常和欺诈检测（统计 ML + 实时规则）
            - Brex Assistant（LLM 对话智能体；基于 Brex APIs 调用工具）
        - id: l4
          label: 产品界面与集成
          modules:
            - 公司卡（Mastercard；最高 7× 奖励；虚拟 + 实体；30+ 币种）
            - 费用管理（员工 + 经理 + 会计工作流）
            - 账单支付 / AP 自动化（供应商入驻；PO 匹配；批量付款）
            - Business Account（支票账户 + 资金管理 + Vault）
            - 差旅与费用（GDS 预订；BrexPay-for-Navan）
            - REST API + Webhooks（10 个领域；developer.brex.com）
