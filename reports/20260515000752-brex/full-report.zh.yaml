  - number: 4
    title: 财务情况
    sections:
      - number: '4.1'
        title: 收入模式与增长轨迹
        blocks:
          - type: paragraph
            body: >
              Brex 的收入主要来自企业卡项目（Mastercard 与 Visa）的 **净交换费收入**。客户每笔交易发生后，Brex 从卡网络赚取总交换费，再拿出一部分作为返现 / 奖励（最高 7x
              积分或现金等价物）返还。扣除卡网络费用和银行合作伙伴分成后，Brex 留下的净交换费构成最大收入流。[CI001] [CI002]

              次要收入流包括：**SaaS 软件订阅**——Advanced 层按 $12/用户/月收费，从免费 Essentials 层升级的公司贡献经常性软件收入；**资金管理净利息收入（NII）**——Brex
              Treasury LLC 将客户现金放入 Dreyfus Government Cash Management Fund (DGVXX)，赚取最高 3.65% 的收益，其中一部分流向
              Brex；**账单支付费用**——ACH/电汇执行按固定或百分比收费；国际交易上的 **外汇费用**；以及 **Brex Embedded**——把 Brex 支付 API 以 B2B 形式授权给 Fifth
              Third Bank 等银行合作伙伴，撬动 $5.6B 年商业卡交易量。[CI003] [CI007] [CI008]

              CEO Pedro Franceschi 于 2024 年 1 月确认，Brex 已增长到「数亿美元收入」，2023 年收入同比增长 35%+，同年毛利增长 75%+。2022 年 SMB 转向前，Brex
              披露收入同比增长 200%+（2022 Disruptor 50）。这些指标只是方向性披露，不是审计数据。截至 2025 年末估计 ARR 为
              $350–500M，来自这些方向性披露，因此存在重大不确定性。[CI004] [CI005] [CI038]

              **关键缺口**：Brex 从未披露官方 GAAP 收入、ARR 或盈利能力。所有估计都基于管理层公开的方向性表述，具有高度不确定性。200% → 35% 的减速，反映 Brex 从高增长 SMB
              聚合转向更粘但更慢的企业扩张。[CI006]
