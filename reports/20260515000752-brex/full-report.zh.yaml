      - number: '7.4'
        title: 财务、运营与关键人物风险
        blocks:
          - type: paragraph
            body: >
              Brex 的财务风险最明显地体现在烧钱曲线和多年未能盈利上。据 The Information，现金消耗在 Q4 2022 为每月 $22 million，到 Q4 2023 改善至每月 $17 million
              [CR007]。CEO Pedro Franceschi 在 January 2024 全员信中承认 Brex 仍未现金流转正，并承诺用「我们银行里的钱」达到这一里程碑；约 24 个月后被 Capital One
              收购，说明独立盈利路径比预期更紧 [CR008]。公开口径称收入为「数亿美元」，2023 年毛利增长 75%+，但没有披露经审计财务报表 [CR009]。收入结构由交换费、SaaS 订阅、利息和 FX
              收入组成；一旦发生监管导致的交换费压缩，多条产品线会同时受击 [CR036, CR021]。

              三次裁员——June 2020（约 62 名员工，17%）、October 2022（136 名员工，11%）和 January 2024（282
              名员工，20%）——是一个负面信号，说明公司持续难以让收入扩张跑在成本前面 [CR006]。2022–2024 年利率上行抬高了浮存融资成本，尽管利率周期已在 late 2024 开始反转
              [CR032]。平台运营风险集中在月结期间的服务可用性、卡授权管线对 Sutton Bank 和 Visa 的依赖，以及 1,100+ 家企业客户金融交易数据的安全性 [CR039, CR043]。

              关键人物风险突出。CTO Cosmin Nicolaescu 于 January 2024 离任（现任顾问），COO Michael Tannenbaum 同月转为董事会成员，前 CFO（Swiecicki）于
              October 2022 离职加入 Rippling [CR024, CR025, CR026]。截至 June 2024，Pedro Franceschi 是唯一 CEO（联合 CEO
              模式已放弃；Henrique Dubugras 成为董事长）[CR027]。新任 COO Camilla Morais、CFO Ben Gammell 和 VP Engineering James Reggio
              现在必须在多位打造原平台的资深领导者离开后执行 Capital One 整合。收购后工程人才留存仍是开放尽调问题：Capital One 股票作为对价引入市场风险，竞争性 fintech 雇主（尤其
              Ramp）也在积极招聘 [CR028, CR029]。
