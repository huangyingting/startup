        - id: n2
          label: 员工发起购买
          detail: 使用 Brex 卡或提交报销；支持 Apple Pay；通过 Slack/WhatsApp/text 提供 24/7 支持
        - id: n3
          label: AI 自动生成收据 + 备注
          detail: 符合 IRS / 本地税务要求的收据；自动填入参会人；起草备注；Uber/Lyft/Gmail 收据自动转发
        - id: n4
          label: AI 实时执行政策
          detail: 合规交易自动批准；不合规交易被拦截或标记；例外通过 Slack/SMS 流转给经理
