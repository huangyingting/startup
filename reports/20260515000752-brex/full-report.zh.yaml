companyProfile:
  summary: >
    Brex Inc.（现为 Brex LLC，Capital One, N.A. 全资子公司）是一家总部在美国的企业支出管理平台，由两位巴西创业者 Henrique Dubugras 与 Pedro Franceschi 于 2017
    年 1 月创立；两人此前共同创办 Pagar.me，并于 2016 年卖给 Stone。Brex 最早把无需个人担保的企业签账卡带给风投支持的初创公司，2018 年 10 月成为美国最快晋级独角兽的金融科技公司，并在 2022 年
    1 月由 Greenoaks Capital 领投融得 $300M，估值 $12.3B。2022 年 6 月退出 SMB 客群、转向中型市场和企业客户之后，Brex 经历三轮裁员（2022 年 10 月、2023 年 10
    月、2024 年 1 月）、CFO 与 CTO 离职，以及撤回 Industrial Loan Company 牌照申请；业务随后稳定在 25,000–35,000 家企业客户左右，年收入达「数亿美元」，同比增长
    35–50%。2026 年 1 月 22 日，Capital One 宣布同意以 $5.15B 收购 Brex（约 50% 现金、50% Capital One 股票）；交易于 2026 年 4 月 7 日完成，价格较 2022
    年峰值估值折价 58%，但相较二级市场交易和最近一轮新股估值仍有明显溢价。
