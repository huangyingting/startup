      - number: '4.2'
        title: 单位经济、成本结构与烧钱压降
        blocks:
          - type: paragraph
            body: >
              Brex 单位经济结构上有利，但公开资料记录很少。按估计 $350–500M ARR、2024 年 1 月裁员后约 1,000 名员工计算，隐含人均收入为 $350,000– 500,000，在 B2B
              金融科技第一四分位中有竞争力。25,000–35,000 家公司客户数意味着单客年收入 $10,000–20,000（显著低于 Ramp 隐含的
              $20,000–28,000），符合客户组合偏向高增长初创公司、初始卡消费较低的特征。[CI017] [CI018] [CI022]

              **烧钱速度与现金跑道**：The Information 报道 Brex 在 2023 年 Q4 每月烧钱 $17M。Brex 对这一数字提出异议。TechCrunch 在 2024 年 6 月报道称 Brex
              已把烧钱速度砍半，意味着到 2024 年中约为 $8–9M/月，现金跑道约四年（两位联合创始人在 2024 年 6 月确认四年现金跑道）。Pedro Franceschi 设定 2025
              年实现现金流转正目标（TechCrunch 2024 年 6 月）；是否已实现尚未公开确认。[CI015] [CI016] [CI037]

              **成本压降杠杆**：2020 年以来三次重组，把员工数从约 1,400 人峰值削减约 30%：2020 年 COVID 期间裁员 62 人（约 15%）；2022 年 10 月，SMB 退出和市场重置后裁员
              136 人（约 11%）；2024 年 1 月裁员 282 人（约 20%），用来压平组织并加速走向盈利。2023 年毛利增长 75%+，快于收入增长
              35%+，证实毛利率在改善，可能来自合作伙伴经济性优化、软件收入占比提升和经营杠杆。[CI019] [CI020] [CI021]

              **收入质量**：Pedro Franceschi 2024 年 6 月提到，收入「主要来自交换费」，但随着初创公司变大、企业账户扩张，软件业务在增长。这个结构迁移对财务有利：软件/SaaS 毛利率（约
              80–90%）显著高于净交换费（约 40–60%），因此软件贡献上升会随着时间推高综合毛利率。2023 年毛利增长 75%+、收入增长 35%+，与这种有利的收入结构迁移相吻合。[CI001] [CI005]
              [CI033]
