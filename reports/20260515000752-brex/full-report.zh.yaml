      - number: '5.4'
        title: 风险与限制
        blocks:
          - type: paragraph
            body: >
              Trustpilot 上的负面客户反馈（Dec 2025 归档评分为 2.4/5「差」）和 Hacker News 记录了几类反复出现的技术与运营失灵：（1）账户突然关闭，缺少解释或充分通知，有时短至 10
              天；（2）2022 年公司重新聚焦企业客户时，给 SMB 客户 6 周通知并撤除服务；（3）国际电汇流程复杂，收款人需要走第三方银行路由，并产生 $26–$200 的退汇费用；（4）Treasury 到
              Checking 转账时点错配，因日内流动性顺序导致 ACH 或工资支付失败；（5）账户关闭后，虚拟/实体卡仍保持激活——这是 UX 设计失误，最终导致关闭后的未经授权扣款。[CE021] [CE022]
              [CE023]

              多发卡方银行伙伴依赖是一项结构性风险：任何一家发卡方（Emigrant Bank、Fifth Third Bank、Airwallex、Sutton Bank）终止或重谈安排，Brex
              都必须迁移该发卡方名下的卡组合；这项工作复杂，也会扰动客户。Capital One 收购又引入一类新风险：两套不同技术栈的整合复杂度、产品路线图可能被重新排序，以及 OCC/Federal Reserve
              监管审查可能拖延或限制合并后平台能力。G2 评价者还提到，复杂报告需求下可定制性有限，客户支持响应也会阶段性波动。2026 年 Brex 收购价为 $5.15B，较 2021 年峰值估值 $12.3B 下降
              58%，反映了更广泛的 fintech 估值重置，以及投资者对依赖交换费收入模式的怀疑。[CE024] [CE025] [CE026]
