          detail: 35,000+ 企业客户；$5.6B+ 商业卡交易量；业务覆盖 120 个国家
        - id: n2
          label: 产品平台
          detail: 智能财务栈（卡、费用、银行业务、差旅、账单支付），建立在自研 Brex Embedded API 上
        - id: n3
          label: 收入增长
          detail: 交易时同比增长 40–50%；隐含年经常性收入（ARR）$790–880M；交易完成后目标转向盈利
        - id: n4
          label: 与 Capital One 的战略契合
          detail: 银行级资产负债表 + Brex AI 平台 = 可触达美国商业银行 8% 份额
        - id: n5
          label: 估值评估
          detail: 13x 毛利润（CFO 口径）；隐含 EV/Revenue 5.8–6.5x；按增长调整后相对上市可比公司有溢价
        - id: n6
          label: 已完成 — Capital One M&A 退出，$5.15B
          detail: 历史最大银行-金融科技交易；April 7, 2026 完成；投资者相对 2022 ZIRP 峰值折价 58%
      edges:
        - from: n1
          to: n4
        - from: n2
          to: n4
        - from: n3
          to: n5
        - from: n4
          to: n6
        - from: n5
          to: n6
  - id: FV002
    type: bar
    title: 估值敏感性 — 不同毛利率假设下的 EV/Revenue
    summary: Brex $5.15B 收购价在不同毛利率情景下的隐含 EV/Revenue 倍数
    layout: standard
    approximationNotes: 基于 CFO 给出的 13x 毛利润倍数，并套用于 $5.15B 收购价。毛利率根据公开金融科技基准估计；Brex 未披露经审计财务。
    claimRefs:
      - CV004
      - CV006
      - CV007
      - CV038
    data:
      items:
        - label: 35% 毛利率（低）
          value: 4.52
        - label: 40% 毛利率
          value: 5.17
        - label: 45% 毛利率
          value: 5.81
        - label: 50% 毛利率（基准）
          value: 6.46
        - label: 55% 毛利率
          value: 7.1
        - label: 60% 毛利率（高）
          value: 7.75
  - id: FV003
    type: range
    title: 估值 / 回报区间
    summary: 金融科技可比公司估值 — Brex 收购价 vs. 上市与私有同业基准（May 2026，$M）
    layout: wide
    approximationNotes: >-
      区间反映以百万美元计的低 / 中 / 高估值估计。Brex 中位数 = $5,150M 实际收购价；低 / 高反映交易价值对 COF 股价波动的敏感性。上市公司区间反映 52 周交易区间。Ramp
      区间反映新股轮（$7,650M）到隐含老股交易（$13,000M）。
    claimRefs:
      - CV001
      - CV012
      - CV013
      - CV014
      - CV015
    data:
      items:
        - label: Brex（Capital One 收购，Apr 2026）
          low: 4850
          mid: 5150
          high: 5450
        - label: Bill.com（公开市值，May 2026）
          low: 3500
          mid: 3930
          high: 5000
        - label: Navan IPO 后（NAVN，May 2026）
          low: 4000
          mid: 4640
          high: 6200
        - label: Ramp（私有，上一轮新股 Mar 2024）
          low: 7650
          mid: 10300
          high: 13000
        - label: Brex 2022 私有峰值（ZIRP 时代）
          low: 12300
          mid: 12300
          high: 12300
  - id: FV004
    type: kpi
    title: 投资 KPI — M&A 估值评分卡
    summary: 面向 IC 的评分，覆盖 Brex 被 Capital One 收购的关键尽调维度
    layout: standard
    approximationNotes: 评分是基于本尽调报告汇总证据的定性评估（0–10 分）；未经审计。
    claimRefs:
      - CV001
      - CV004
      - CV005
      - CV018
      - CV023
      - CV038
    data:
      items:
        - label: 收入增长质量
          value: 7
          detail: 交易时同比增长 40–50%；较 2022 200%+ 峰值放缓，但在该规模下仍处于前四分位
          score: 7
        - label: 市场地位
          value: 8
          detail: 35,000+ 客户，120 个国家；已转向企业客户；Brex Embedded 银行分销
          score: 8
        - label: 产品 / 平台护城河
          value: 8
          detail: Brex Embedded API 支撑银行分销；多产品粘性；AI 原生栈
          score: 8
        - label: 收购倍数 vs. 可比公司
          value: 6
          detail: 隐含 EV/Revenue 5.8–6.5x；相对 Bill.com（2.5x）有溢价，但匹配 40–50% 增长算合理
          score: 6
        - label: 资本效率
          value: 4
          detail: Q4 2023 每月烧钱 $17M；三轮裁员；交割时尚未盈利
          score: 4
        - label: 证据质量
          value: 5
          detail: 无经审计财务；收入 / GP 仅由 CFO 表述推断；显著不透明
          score: 5
        - label: 卖方结果（2022 批次）
          value: 2
          detail: 较 $12.3B 峰值折价 58%；2022 轮投资者承受实质亏损
          score: 2
        - label: Capital One 战略契合
          value: 9
          detail: 银行资产负债表 + Brex 平台 = 银行-金融科技协同；CEO 关系匹配；4 周交易速度
          score: 9
