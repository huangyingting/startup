        - Sutton Bank 被纳入正式协议，或宣布退出金融科技业务
        - 6–18 个月卡项目迁移风险；需要立即升级运营应对
      - - Brex 收购分心后 Ramp 企业客户赢率加速
        - Ramp 客户增长公告；G2 评论趋势；Brex G2 评分下降
        - Ramp 公开声称从 Brex 赢下 >50 个具名企业客户；Brex G2 评分跌破 4.5
        - 竞争复盘；重排产品路线图优先级；评估定价应对
      - - Credit Card Competition Act 通过生效
        - 国会全院投票；参议院终结辩论；总统签署
        - CCCA 签署成法；公布生效日期
        - 按交换费收入削减 50% 建模；评估 Capital One 缓释策略
      - - Brex 月度烧钱到 2026 年底仍未实现现金流转正
        - Capital One Q1–Q2 2026 财报披露；任何 Brex 财务披露
        - 收购后披露连续两个季度经营现金流为负
        - 升级整合效率复盘；评估交易逻辑是否落地
      - - CEO Pedro Franceschi 在交割后 24 个月内离职
        - 媒体；LinkedIn；Capital One IR；Brex 博客
        - Franceschi 宣布离职，或 LinkedIn 显示新职位
        - 董事会和 Capital One 领导层复盘；投资者沟通策略
      - - 交割后 CFPB 对 Brex Payments LLC 或 Capital One 发起执法行动
        - CFPB 执法公告；Capital One IR 披露
        - CFPB 同意令或民事调查要求点名 Brex Payments LLC
        - 监管应对；暂停受影响产品功能；投资者披露
    notes: 阈值为指示性，基于行业基准；实际叫停标准阈值应根据 Capital One 与 Brex 约定的具体投资条款和整合里程碑校准。
