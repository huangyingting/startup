      - number: '8.4'
        title: 收购后状态与证据缺口
        blocks:
          - type: paragraph
            body: >
              April 7, 2026 交割后，Brex 以 Brex LLC 运营，是 Capital One, N.A. 的全资子公司 [CV033] [CV031]。Capital One 于 April 21,
              2026 公布 Q1 2026 财报，Brex 已被纳入其组合 [CV031]。Fifth Third Bank 于 December 2025 签署的合作——通过 Brex Embedded 解锁 $5.6B
              年商业卡交易量 [CV019]——在交割后转入 Capital One 的分销资产，把 Brex 平台延伸到约 8% 的美国商业银行业。CFO 将 Capital One
              描述为一家拥有「巨大资产负债表」的「技术公司」，这让 Brex 能加速投资，并向客户提供银行级信贷基础设施 [CV028] [CV044]。Pedro Franceschi 继续担任 Brex 子公司
              CEO，保持 Capital One 结构下的创始人主导文化连续性 [CV025]。

              本估值分析的关键证据缺口包括：（1）Brex 没有任何经审计或正式披露的收入或 EBITDA 数据——13x 毛利和 40–50% 增长说法完全来自 CFO 在媒体采访中的表述，而非经审计财务报表；（2）2022
              年批次投资者的确切股权结构、清算优先权悬置和单个投资者回报情况仍未披露；（3）Brex 在 Capital One 内部的收购后增长轨迹，无法作为独立实体验证。希望评估 Capital One 收购 Brex
              ROI 的后续机构投资者，应关注 Capital One 分部披露中的商业银行收入、与 Brex 客户的交叉销售活动，以及 2026 年及之后 Brex Embedded 合作伙伴交易量扩张。
