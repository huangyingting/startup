  - number: 2
    title: 市场分析
    sections:
      - number: '2.1'
        title: 市场定义与结构
        blocks:
          - type: paragraph
            body: >
              Brex
              所在的是一个多层市场，横跨企业卡项目、费用管理软件、应付账款自动化、差旅管理和企业银行。本分析把市场边界定义为企业控制、记录并结算员工及供应商支出的产品与工作流，统称「企业支出管理」。相邻但不纳入核心边界的类别包括薪资处理、个人消费者银行，以及战略采购寻源（尽管
              长尾支出与采购工作流正通过 Brex Embedded 和 Coupa 合作成为新邻近场景）。[CM026]

              现状替代方案包括 American Express、Visa 和 Mastercard 发卡银行的传统企业卡项目；SAP Concur、Expensify 等传统费用软件；基于电子表格的人工 AP 工作流；以及
              Oracle、SAP、Workday 的 ERP 原生支出模块。现有厂商仍掌握多数企业存量账户，但容易被 AI 原生平台替代；后者把卡、费用、AP 和银行集中到同一数据层。[CM027]

              2026 年 1 月 22 日发生了一个重要结构性事件：Capital One 宣布达成最终协议，以股票加现金组合、作价 $5.15B 收购 Brex。收购预计于 2026 年中完成，确认了 AI
              原生企业支出管理平台的战略价值，并把 Brex 放进一家总资产 $669B 的银行体系内。Brex 创始人兼 CEO Pedro Franceschi 将在交易完成后继续领导 Brex。[CM004]
