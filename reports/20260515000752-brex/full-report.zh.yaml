    定制定价）、客户现金产生的资金管理净利息收入、账单支付交易费，以及与银行合作伙伴分成的嵌入式 API 收入。CFO Erica Dorfman 称 Capital One 交易按「13x 毛利倍数」定价，意味着毛利约
    $400M——与 $400–500M 净收入、行业典型支出管理毛利率相匹配。
  stage: Acquired (subsidiary of Capital One, N.A. as of April 7, 2026)
