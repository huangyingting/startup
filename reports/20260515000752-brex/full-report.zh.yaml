      - number: '8.3'
        title: 收购倍数与可比分析
        blocks:
          - type: paragraph
            body: >
              Capital One 交易结构为约 $2.75B 现金加约 10.6 million 股 Capital One 普通股，总计 $5.15B [CV002] [CV008]。Brex CFO Erica
              Dorfman 将估值逻辑锚定在「按毛利的 13x 倍数」，并称其为「相对今天公开公司交易水平的巨大溢价」[CV004]。这个口径意味着毛利约 $396M（= $5.15B ÷ 13）[CV006]。假设
              fintech 平台典型毛利率在 45–50% 区间——混合了高毛利 SaaS 和较低毛利交换费——收购时隐含年化收入约 $790M–$880M [CV007]。对应 EV/Revenue 倍数约为
              5.8–6.5x，与增长超过 30% 的优质公开 fintech 可比公司一致 [CV038]。

              公开可比公司支持这一框架。截至 May 2026，Bill.com（BILL）市值约 $3.93B，TTM 收入 $1.6B——EV/Revenue 约 2.5x——但 Bill.com 增速只有 12.5%
              YoY，远低于 Brex 的 40–50% [CV012]。Navan（NAVN）于 October 2025 以 $6.2B 在 NASDAQ IPO，到 May 2026 交易价对应 $4.64B，基于
              $702M TTM 收入和 30.8% YoY 增长，隐含 EV/Revenue 约 6.6x [CV013] [CV014]。Ramp 最近一轮一级市场融资估值为 $7.65B（March
              2024），说明一家可比私营公司相对 Brex 退出价有显著溢价，反映更高增长预期 [CV015]。Thoma Bravo 于 early 2023 以约 $8B 收购 Coupa
              Software，为增长较慢的支出管理软件提供了 M&A 可比交易 [CV041]。在按 Brex 更高增速和 Capital One 为分销入口支付的整合溢价调整后，13x
              毛利口径相对这些可比样本看起来处于合理到偏高区间 [CV038]。
