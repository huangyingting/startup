          values:
            - 高（30+ 种货币；60+ 个国家；本币卡）
            - 低（仅美国卡基础设施）
            - Brex — 自研 7 年积累；Ramp 短期难以追平
        - label: AI 费用自动化
          values:
            - 高（收据生成；GL 编码；政策执行；LLM 助手）
            - 高（AI 收据捕获；重复检测；合同分析）
            - 持平 — 双方都成熟；交易完成后 Brex 获得 Capital One ML 数据
        - label: 企业银行 / 资金管理
          values:
            - 高（支票账户 + 3.65% 资金管理；Vault；$6M FDIC；账单支付）
            - 中（Ramp Treasury；无集成支票账户）
            - Brex — 银行集成更深；Column N.A. 支票账户通道
        - label: 账单支付 / AP 自动化
          values:
            - 高（PO 匹配；多级审批；供应商入驻；批量付款）
            - 高（AP 自动化于 2021 推出）
            - 持平 — 功能深度相近
        - label: ERP 集成广度
          values:
            - 高（QuickBooks、NetSuite、SAP、Workday、Sage、Xero、Dynamics 365）
            - 高（声称 200+ ERP 连接器）
            - 持平 — Ramp 声称数量更多；Brex 证实更多具名企业级 ERP
        - label: 差旅管理
          values:
            - 中（T&E 模块；BrexPay-for-Navan 合作）
            - 中（Ramp Travel 于 2024 推出；Navan 直接竞争）
            - 持平 — 双方都处早期；Brex 借 Navan 嵌入受益，而不是正面竞争
        - label: 反向客户体验
          values:
            - 低（Trustpilot 2.4/5；账户关闭；电汇摩擦）
            - 中（公开记录的反向信号较少；SMB 被停止服务事件较少）
            - Ramp — 公开评论中的反向记录更干净
  - id: FU001
    title: 客户旅程图 — Brex 从初创到企业的采用路径
    type: journey-map
    layout: wide
    summary: |
      梳理 Brex 客户生命周期：先以初创卡开户注册起步，再在成长阶段部署多产品、扩张到企业账户，并在 2026 后叠加 Capital One 分销。
