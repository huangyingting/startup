    title: 公司概况
    sections:
      - number: '1.1'
        title: 身份、商业模式与当前所有权状态
        blocks:
          - type: paragraph
            body: >-
              Brex 由 Henrique Dubugras 与 Pedro Franceschi 于 2017 年 1 月 3 日创立。两位巴西创业者此前共同创办支付处理商 Pagar.me，并在 2016 年卖给
              Stone。两位创始人 16 岁时在 Twitter 认识，随后以 VR 初创公司身份进入 Y Combinator 2017
              年冬季批次；三周内，他们发现一个结构性缺口后转向金融科技：风投支持的初创公司账上有大量资金，却因缺少个人信用记录，拿不到传统银行的企业信用卡。Brex
              用公司银行余额和已融资金额来做承保，免掉个人担保，解决了这一问题。[CO002] [CO004] [CO005]

              最初的企业签账卡产品于 2018 年 1 月公开上线。到 2026 年，平台覆盖企业卡（Mastercard 经 Emigrant Bank、Fifth Third/Airwallex；Visa 经 Sutton
              Bank）、Brex Empower 费用管理、Brex Cash 支票账户（经 Column N.A.）、Brex Treasury（FINRA/SIPC 注册，Capital One
              旗下公司）、账单支付、AI 原生差旅，以及 AI 费用智能体。产品支持 50+ 个国家，并提供本地货币卡。收入主要靠交换费驱动（约 2.7% 总交换费 × Brex 分成），再由 Brex Cash 利息和
              SaaS 费用补充。估计毛利率约 65%。[CO003] [CO007] [CO021]

              截至 2026 年 5 月，Brex 已不再是独立公司。Capital One 于 2026 年 1 月 22 日宣布以现金加股票方式、作价 $5.15B 收购 Brex。Brex
              网站页脚确认交易已完成：「Brex LLC is a wholly owned subsidiary of Capital One, N.A.」，总部位于 650 S 500W Suite 300, Salt
              Lake City, UT 84101。Pedro Franceschi 在 Capital One 持有 Brex 后继续担任 CEO。[CO001] [CO006]
