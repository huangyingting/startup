      - number: '2.2'
        title: 市场规模——TAM、SAM 与 SOM
        blocks:
          - type: paragraph
            body: >
              企业支出管理的市场规模高度取决于边界选择。2024 年全球 B2B 支付总额约为 $83T（ResearchAndMarkets 经 Yahoo Finance），另有 $130.64T 的冲突估计（Fit
              Small Business），反映方法口径不同；这些是最宽口径背景，不是 Brex 的直接总可用市场（TAM）。[CM006] [CM007]

              商业上更相关的层面里，全球商业企业卡市场（发卡方收入，而非支付量）2024 年为 $43.7B，预计到 2034 年达到 $87.6B，CAGR 为 7.2%（Market.us）。2023
              年全球商业卡总支付量超过 $4T，预计 2029 年超过 $6T。[CM008] [CM009]

              全球应付账款自动化软件市场 2023 年规模为 $5.4B，预计 2032 年增至 $17B，CAGR 为 13.9%（Allied Market Research），由云原生中型市场采用驱动。[CM010]

              费用管理软件截至 2025 年对应 $6–12B 的全球市场，约以 8–15% CAGR 增长。美国 B2B 支付量 2023 年约为 $197B，预计 2031 年达到 $390B（Fit Small
              Business）。Brex 到 2025 年 1 月估计约 $700M 的年经常性收入（ARR），意味着其在这些更大市场层中的渗透仍处早期。[CM011] [CM022]

              保守估计，Brex 的可服务市场（SAM）——美国及重点国际企业、尚未使用现代支出平台的成长型公司——对应每年 $3–6B 的软件和卡经济收入；在 Capital One 旗下扩大全球发卡与 AP
              自动化能力后，仍有明显扩张空间。
