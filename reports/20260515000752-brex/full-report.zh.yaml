      - number: '1.2'
        title: 创始人、领导层与治理
        blocks:
          - type: paragraph
            body: >-
              Brex 创始团队带来深厚的金融科技基础设施经验。Pedro Franceschi（2024 年 6 月起担任唯一 CEO）从 22 岁开始，从零搭起 Brex 的核心金融基础设施，包括 Mastercard
              集成、ACH、SWIFT 和电汇处理。Henrique Dubugras（2024 年 6 月起任董事长）在增长期负责融资（$1.5B+）、投资者关系和银行合作。两人 2013 年在巴西共同创办
              Pagar.me（17 岁起把公司做大并卖给 Stone），随后于 2017 年从 Stanford 退学加入 YC。[CO030] [CO008] [CO009]

              2024 年 6 月的领导层交接影响重大：Brex 放弃联席 CEO 架构，任命 Franceschi 为唯一 CEO、Dubugras 为董事长，以简化决策。同一时间，COO Michael
              Tannenbaum 转入董事会，Camilla Morais 从全球运营 SVP 升任 COO。CTO Cosmin Nicolaescu 于 2024 年 1 月转为顾问角色，时间与 2024 年 1
              月裁员同步。Karandeep Anand 担任总裁；Doug Adamic 于 2022 年 8 月从 SAP Concur 加入，担任首席营收官。[CO010] [CO011] [CO012] [CO014]
              [CO015]

              被 Capital One 收购后，Franceschi 保留 CEO 职务，Brex 继续以独立品牌运营。收购后的董事会构成尚未完全公开；Capital One 未发布完整的并购后董事名单。[CO013]
