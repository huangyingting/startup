      - number: '2.3'
        title: 买方细分与市场驱动因素
        blocks:
          - type: paragraph
            body: >
              Brex 客户基础覆盖六个主要细分：风投支持的初创公司、成长型公司、中型市场企业、大型上市公司、国际及跨国公司，以及 SaaS/科技公司。Brex 首席营收官 Art Levy
              称，约每三家美国初创公司中就有一家使用 Brex，显示其在风投支持细分中的深度渗透。[CM012] Capital One 收购公告确认平台上有超过 25,000 家公司，包括
              DoorDash、TikTok、Anthropic、Robinhood 和 CrowdStrike。[CM034]

              企业采用正在提速：截至 2025 年 2 月，Brex 企业业务同比增长 80%，企业净留存率（NRR）约 140%。超过 150 家上市公司已采用 Brex，总市值合计超过 $2.9T。[CM001]
              [CM002] [CM003]

              增长驱动包括：AI 原生费用自动化（估计 Brex AI 功能每年为客户节省约 1100 万员工小时）、全球远程办公趋势带来的多币种报销和卡项目需求、从人工 AP 工作流向自动化平台迁移，以及 Capital
              One 规模支持企业账户更快完成信用承保。[CM013] [CM035]

              Federal Reserve 支付研究确认，电子 B2B 支付量继续增长；ACH B2B 交易达到 6.59B 笔、价值 $54.2T，印证了向数字支付基础设施迁移的长期趋势。[CM031]
