        - label: 注册
          detail: 10 分钟在线申请；数天内发卡；无需个人担保；$0/user 入门计划
        - label: 激活卡与费用管理
          detail: 公司卡发给员工；自动捕获费用并匹配收据；前 30–90 天
        - label: 增加银行业务
