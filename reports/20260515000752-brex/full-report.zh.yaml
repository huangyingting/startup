      - number: '7.5'
        title: 附录
        blocks:
          - type: callout
            title: 收购估值重置是 Brex 历史上最清晰的负面信号
            body: >
              Capital One 以 $5.15 billion 收购 Brex，较 January 2022 确立的 $12.3 billion 峰值折价
              58%，这是本风险章节中最重要的单一负面数据点。它确认，独立风险增长逻辑在四年里没有得到验证，三轮裁员没有带来盈利，离开 SMB 的战略转向也永久缩窄了 Brex 的可服务市场。50% Capital One
              股票对价给员工和投资者引入持续市场风险。尽调应优先关注 Capital One 整合条款、员工留存承诺，以及交易本身的监管批准时间表。
            calloutType: risk
            claimRefs:
              - CR001
              - CR002
              - CR006
              - CR031
              - CR045
          - type: callout
            title: 银行伙伴集中和 ILC 失败是收购后仍然存在的结构性风险
            body: >
              Brex 在 August 2021 撤回 ILC 牌照申请后，永久依赖 Sutton Bank（Visa 卡）以及 Emigrant Bank / Fifth Third Bank /
              Airwallex（Mastercard 卡）。不同于独立 fintech 风险，这种依赖不会因 Capital One 持有而消失——Capital One 不会自动成为发卡方，Brex 与 Sutton
              Bank 的计划级合同仍然有效。若 OCC 对 Sutton Bank（也赞助 Ramp）采取执法行动，Brex 和 Ramp 可能同时受冲击，构成行业层面的系统性风险。尽调应确认 Capital One
              是否计划把 Brex 发卡迁移到自身银行资产负债表上，以及时间表。
