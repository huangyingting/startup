      - number: '2.4'
        title: 竞争结构与监管风险
        blocks:
          - type: paragraph
            body: >
              企业支出管理市场处在中局阶段的颠覆中。传统玩家——SAP Concur（SAP）、Oracle iProcurement 和 Coupa——掌握企业存量合同，但面临 AI
              原生挑战者流失压力。云原生赛道正围绕全栈平台（Brex、Ramp）与单点方案（Expensify、BILL）整合。分析师把 Brex 2022 年退出 SMB 客群视为战略失误，因为它把可服务市场让给 Ramp
              等公司；不过 Brex 已用企业业务增长不止抵消了这一影响。[CM024] [CM038]

              监管风险重大。Credit Card Competition Act（CCCA）于 2026 年 1 月以 S.3623 和 H.R.7035 重新提出，将要求资产超过 $100B
              的金融机构在信用卡上启用至少两个无关联支付网络。一旦通过，法案将直接影响 Capital One（>$100B），并可能压缩支撑 Brex 企业卡奖励计划的交换费经济性。[CM014] [CM015]
              美国信用卡交换费平均为 1.5–3.5%，而欧盟上限为 0.30%，说明 CCCA 式监管一旦落地，下行情景有多大。[CM016]

              ABA、Visa 和 Mastercard 反对 CCCA，认为法案会削弱消费者奖励、危及交易安全，并伤害社区金融机构——这些因素也构成 Brex 卡经济性的负面尾部风险。[CM018] [CM019]

              Brex 依赖 Emigrant Bank、Fifth Third Bank N.A.、Airwallex (Netherlands) B.V. 和 Sutton Bank 作为 BIN 赞助方，并且此前已与
              Capital One 建立 Treasury 关系；这些结构性环节预计会因收购而简化。[CM020] [CM021]

              $5.15B 收购价相较 Brex 2021 年 $12.3B 的私募峰值估值明显折价，说明成长型金融科技市场已重新定价。Brex 还在 2024 年 1 月裁掉约 20%
              员工，作为走向正现金流的一部分。[CM036] [CM037]
