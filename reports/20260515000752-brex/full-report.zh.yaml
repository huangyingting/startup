      - number: '3.5'
        title: 展示项
        blocks:
          - type: callout
            title: 收购折价释放竞争位置走弱信号
            body: >
              Capital One 以 $5.15B 收购 Brex，较 Brex 此前 $12.3B 估值折价约 58%。这次压缩反映的不是市场环境，而是相对 Ramp 的竞争位置走弱：同一时期 Ramp 的 $13B
              隐含估值在上升，而非下跌。折价是具体市场信号，评估 Brex 独立竞争轨迹和护城河耐久性时必须纳入。
            calloutType: risk
            claimRefs:
              - CP004
              - CP022
          - type: callout
            title: Ramp 在客户规模上已经甩开 Brex
            body: >
              Ramp 的 50,000+ 家企业客户数是 Brex 25,000+ 的 2×，同时提供同等产品范围且完全免费。支出智能中的数据网络效应会随规模复利：Ramp 的基准数据集约为 Brex 的
              2×，每新增一个客户都会拉大 AI 准确性差距。在 Capital One 整合压力下缩小这一差距，是 Brex 最高优先级的竞争任务。
            calloutType: risk
            claimRefs:
              - CP001
              - CP002
              - CP009
          - type: callout
            title: Capital One 资产负债表是真正的结构性优势
            body: >
              Capital One 是美国最大的信用卡发行方之一，信用卡应收款超过 $171B，并持有受监管银行牌照。这让 Brex
              能获得独立金融科技公司拿不到的卡资金成本。企业客户如果寻找一家拥有监管稳定性和授信能力的卡合作伙伴，Brex 现在能提供 Ramp 无法匹配的东西：卡项目背后有银行级资产负债表。
