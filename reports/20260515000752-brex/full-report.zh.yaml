      - number: '6.3'
        title: 2022 SMB 转向：战略理由、负面影响与修复
        blocks:
          - type: paragraph
            body: >
              June 2022，当时估值 $12.3 billion 的 Brex 宣布退出小企业市场，并向 Axios Pro 确认其正在「关闭 SMB 账户」，以专注企业客户
              [CU022]。据报道，这项通知通过邮件发给约 17,000 名非 VC 支持客户，并给出 30 天账户关闭通知；Hacker News 和社交媒体上随即出现强烈反弹，小企业主称这种突然通知损害了其声誉
              [CU023]。Fast Company 明确将此举报道为「Brex 放弃小企业客户，转向企业市场」[CU024]。

              Pedro Franceschi 将战略理由表述为产品-市场匹配错位：Brex 的授信模型（基于股权融资给额度，而非基于收入）是为拥有大额融资轮的 VC 支持公司设计的，不适合依赖现金流的
              SMB。同时服务两个客群，带来了支持复杂度和产品碎片化 [CU025]。Brex 随后推出 Brex 3.0，把产品投入聚焦到需要全球卡计划、多实体 AP 和深度 ERP 集成的大型企业与中端市场账户。

              这次转向引发了一轮裁员潮。October 2022，Brex 裁减约 136 名员工（11%）；January 2024 又进行了更大规模裁员，20% 员工离开，CTO Cosmin Nicolaescu
              也转为顾问角色 [CU026, CU027]。Fortune 报道称，The Information 披露 Brex 在 Q4 2023 的平均月度烧钱速度约为 $17 million，低于 Q4 2022 的
              $22 million/month，估计现金跑道约四年 [CU028]。这些负面信号——多轮裁员、较高烧钱速度和战略重置——从 2022 持续到 mid-2024，并最终走向 January 2026 的
              Capital One 收购公告；Franceschi 承认这是 Brex 3.0 转型的直接结果：「我们重新赢得了保持雄心的资格」[CU029]。

              从客户质量看，这次转向是一次有计算的牺牲：放弃低 ARPU、高支持成本的 SMB 账户，换取高 ARPU、更大卡交易量和更高交叉销售潜力的企业账户。2026 年 25,000–35,000
              家公司的客户基础，单账户质量明显高于 2022 年基础；即便数量低于转向前总量，也是如此 [CU030]。
