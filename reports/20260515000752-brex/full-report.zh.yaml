      - number: '5.3'
        title: AI 与 ML 能力
        blocks:
          - type: paragraph
            body: >
              Brex 的 AI 层铺进每个产品界面。支出管理工作流用 AI 自动生成符合 IRS/地方税要求的收据、起草费用备注、自动填充参会人字段、把交易归类到 GL
              科目、发现政策违规、标记异常支出（包括日津贴超额和重复收费），并通过 Slack 或 SMS 把例外推给经理处理，无需登录 Brex。Brex Assistant
              这个对话式智能体负责回答员工问题，并用自然语言自动化任务。[CE015] [CE016]

              在账单支付中，AI 从转发或上传的文件中抓取逐项发票明细（OCR 支持多语言、多币种），建议匹配 PO，并起草付款工作流。ML 层把交易映射到子公司 GL
              科目，规模化套用自定义编码规则，并给出映射建议，加快月结。[CE017] [CE018]

              Capital One 将 Brex 称为「AI 原生软件平台」，并称其拥有「帮助客户自动化复杂工作流的 AI 智能体」。收购完成后，Capital One 自身 $6B 的 R&D 预算和自研 ML
              授信基础设施——已在消费信用卡和汽车贷款中使用 20 年——将用于加速 Brex 的 AI 能力。AI 层是 Brex 相比纯软件竞争对手的关键差异点：Ramp 的数据网络效应取决于自身客户基础，而 Brex
              在交割后可接入 Capital One 规模大得多的数据集。[CE019] [CE020]
