      - number: '5.2'
        title: 架构与平台
        blocks:
          - type: paragraph
            body: >
              Brex 最深的技术护城河，是自研全球发卡基础设施。不同于依赖单一银行发起方、在单一计划下发卡的竞争对手，Brex 与多家发卡银行伙伴合作（Mastercard 对应 Emigrant Bank、Fifth
              Third Bank、Airwallex Netherlands；Visa 对应 Sutton Bank），能在本地监管框架下，覆盖 60+ 个国家、30+ 种货币发卡。CEO Pedro Franceschi
              在 Capital One 收购公告中强调，这套「从技术栈底层一路向上搭建」的方法花了七年，短期内很难复制。[CE008] [CE009] [CE010]

              软件平台采用云原生架构，基于部署在 AWS 的微服务。Brex 工程团队把关键金融组件自研，以守住升级和安全控制权。所有产品线——卡、费用、账单支付、银行、差旅——共用统一交易数据模型，让 AI
              层能同时覆盖所有支出类别。平台开放 REST/OpenAPI 开发者 API，覆盖 10
              个功能域：Accounting、Budgets、Expenses、Fields、Onboarding、Payments、Team、Transactions、Travel 和 Webhooks。公开的 Slack
              开发者社区和专用 API 状态页（status.brex.com）支持第三方集成商。[CE011] [CE012] [CE013]

              Brex 工程组织发布了体现其 AI 重心的开源工具：brexhq/prompt-engineering 仓库（GitHub 9,500+ 星标），聚焦 LLM 最佳实践；brexhq/substation
              是用于路由和标准化安全及审计日志的工具包。Brex 还维护了一个基于 Go 的 LLM-as-a-judge HTTP 代理（brexhq/bedrock），用于生产环境中的智能体安全。[CE014]
