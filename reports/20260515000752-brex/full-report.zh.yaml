      - number: '1.3'
        title: 融资历史、估值与 Capital One 收购
        blocks:
          - type: paragraph
            body: >-
              2017 至 2022 年，Brex 完成九轮新股融资，累计融资超过 $1.5B。关键轮次包括 Ribbit Capital 与 DST Global 领投的 $57M Series A（2018 年 3
              月）、估值 $1.1B 的 $125M Series B（2018 年 10 月，当时美国最快金融科技独角兽）、估值 $2.6B 的 $100M Series C（2019 年 6 月）、估值 $7.4B 的
              $425M Series D（2021 年 4 月），以及 Greenoaks Capital 领投、估值 $12.3B 的 $300M Series F（2022 年 1 月）。早期天使投资人包括 Peter
              Thiel（PayPal 联合创始人）和 Max Levchin（PayPal/Affirm 创始人）。机构投资者包括 Greenoaks、IVP、Tiger Global、YC
              Continuity、Kleiner Perkins、DST Global、Lone Pine Capital 和 Ribbit Capital。[CO016] [CO017] [CO018] [CO019]
              [CO020]

              2026 年 1 月 22 日，Capital One 以 $5.15B 收购 Brex，较 $12.3B 峰值估值折价 58%。折价来自 2021 年后金融科技倍数收缩、三轮裁员、2022 年 6 月 SMB
              退出导致客户数从 50,000+ 降至约 30,000+，以及截至 2025 年末仍持续税前亏损。公司到 2025 年 10 月才实现现金流转正，太晚，无法支撑溢价。交易仍是一次成功退出：Brex 获得
              Capital One 的银行牌照、资产负债表和商业卡分销；投资者则在 $1.5B+ 已投入资本上拿到有意义的退出回款。[CO025] [CO027] [CO031]
