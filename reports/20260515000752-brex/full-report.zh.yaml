  - number: 3
    title: 竞争格局
    sections:
      - number: '3.1'
        title: 竞争概览与市场结构
        blocks:
          - type: paragraph
            body: >
              Brex 所在的企业支出管理市场结构上分为多层。对 Brex 最危险的第一层，是 AI 原生金融科技同业：Ramp 是明确的标杆竞争对手，已扩张到 50,000+ 家企业，而 Brex 披露 25,000+
              家客户。Ramp 在 2025 年融资轮中形成约 $13B 的隐含估值，是 Capital One 在 2025 年初为 Brex 支付 $5.15B 的两倍以上；该交易已于 2026 年 5
              月前完成。[CP001] [CP002] [CP022]

              第二个竞争层是企业现有厂商。SAP Concur（1993 年成立，2014 年被 SAP 以 $8.3B 收购）靠深度 ERP 集成和合规深度控制 Fortune 500 的 T&E 市场。Coupa（2023
              年被 Thoma Bravo 以约 $8B 私有化）以 $1B+ 收入和 3,200+ 家企业客户主导企业采购支出管理。这些现有厂商因 ERP
              锁定效应几乎没有存量客户流失，但在新的中型市场交易中输给云原生替代方案。[CP009] [CP010]

              第三层是 SMB 和中型市场 AP 自动化。BILL（NYSE: BILL）服务 498,000 家企业，是美国金融领域最大的 SMB 客户基础，年支付量 $345B，约等于美国 GDP 的 1%。2021
              年收购 Divvy 后，BILL 加入企业卡产品，成为 Brex 在收入低于 $10M 客群中的全栈支出管理竞争对手。[CP008] [CP026]

              第四层由相邻和专门化竞争对手组成：Navan（差旅 + 费用集成）、Mercury（以银行为核心的初创公司企业卡）、Airbase/Paylocity（支出 + HR/薪资集成），以及在美国存在感有限的欧洲挑战者
              Pleo 和 Spendesk。Stripe Issuing 是基础设施层威胁，可让嵌入式卡项目绕开 Brex 与 Ramp。[CP014] [CP025]
