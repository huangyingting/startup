  - number: 5
    title: 产品与技术
    sections:
      - number: '5.1'
        title: 产品套件概览
        blocks:
          - type: paragraph
            body: >
              Brex 提供统一的支出管理平台，围绕五条核心产品线搭建，并全部接在同一个数据模型上：（1）Corporate Card — Mastercard 品牌信用卡（由 Emigrant Bank、Fifth
              Third Bank 或 Airwallex 发行），最高 7× 奖励；在不偏好 Mastercard 的场景，也可使用由 Sutton Bank 发行的独立 Visa Commercial
              Card；（2）Business Account — 商业支票账户（Column N.A.）、Treasury（通过 Dreyfus Government Cash Management Fund
              做货币市场自动扫款， 24 家合作银行合计 FDIC 保障最高 $6M）和 Vault（高级欺诈防护）；（3）Expense Management — AI 自动生成收据、起草报销备注、做 GL
              编码、执行政策，并经 Slack/SMS 推送经理审批流；（4）Bill Pay — 供应商入驻、OCR 发票采集、多级审批路由、PO 双向匹配、ACH/电汇/支票/卡付款；（5）Travel & Expense
              (T&E) — 内置政策护栏的机票/酒店预订，并通过 BrexPay-for-Navan 集成，把 Brex 卡嵌入 Navan 的差旅管理平台。[CE001] [CE002] [CE003] [CE004]

              截至 Capital One 收购公告（January 2026），平台服务 35,000+ 家公司，包括约每 3 家美国初创公司中的 1 家、300+ 家上市公司，以及
              DoorDash、TikTok、Anthropic、Robinhood、CrowdStrike、Zoom、Plaid、Intel、SeatGeek 和 Boston Celtics 等企业。基础层级价格从
              $0/user/month 起，高级功能为 $12/user/month。客户已累计把 $51B 支出纳入平台政策自动化管理，并在平台上获得 $680M 奖励。[CE005] [CE006] [CE007]
