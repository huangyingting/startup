    月，Greenoaks 领投 $300M，估值 $12.3B）。另有 2023 年与 Citi 的 $250M 债务额度。Capital One 于 2026 年 1 月以 $5.15B 收购（约 50% 现金 / 50%
    Capital One 股票，2026 年 4 月 7 日完成）后，Brex 终止独立资本市场活动。
