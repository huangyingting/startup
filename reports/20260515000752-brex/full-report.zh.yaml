      - number: '7.3'
        title: 监管、法律与银行伙伴风险
        blocks:
          - type: paragraph
            body: >
              Brex 的监管架构由一次未能取得自有银行牌照的尝试定义。ILC（industrial loan company）申请于 February 2021 提交，August 2021
              撤回；此前银行监管机构和国会议员持续反对，质疑 Brex 的资本充足性和监管准备度 [CR015, CR042]。因此，Brex 永久依赖发卡银行伙伴：Visa 商业卡由 Sutton Bank
              发行，Mastercard 品牌卡由 Emigrant Bank、Fifth Third Bank 和 Airwallex 发行 [CR016]。任何监管执法行动、资本充足压力或关键发卡银行战略退出，都会要求
              Brex 迁移其卡计划；这一流程通常需要 6 至 18 个月，并影响所有活跃持卡人 [CR030]。

              Brex Payments LLC（NMLS #2035354）在多个美国州持有汇款牌照。州级牌照暂停或新的州特定合规要求，会增加运营开销，并随地理扩张放大 [CR018]。Brex Treasury
              LLC（曾为注册投资顾问，并是 FINRA/SIPC 成员）还增加了投资产品监管暴露 [CR034]。

              Brex 的收购方母公司 Capital One 于 January 14, 2025 被 CFPB 起诉，指控其在储蓄账户披露方面涉嫌违规，金额约 $2
              billion；这一母公司监管阴影，会提高交割后合并实体承受的审查强度 [CR019]。CFPB 的非银行监管规则（2024 年最终版）也让 Brex 当前规模下的自有运营面临直接检查风险
              [CR023]。随着交易量增长，Brex Payments LLC 与其银行伙伴共同承担的 BSA/AML 合规义务会进一步叠加 [CR022]。

              CourtListener 记录确认，截至 runDate 有四个活跃案件：Giuliano v. Brex Inc. (Bankr.D.Del. 2024, case 24-50301)、Stowers v.
              Brex Inc. (N.D.Ga. 2024, case 1:24-cv-05926)、Beskrone v. Brex Inc. (Bankr.D.Del. 2025, case 25-50610)，以及
              Brex Inc. v. Mack (S.D.N.Y. 2024, case 1:24-cv-04192) [CR020]。仅靠案卷搜索，无法获得案件细节和金额暴露。Credit Card Competition
              Act (S.1838, 118th Congress) 是主要立法风险：若该法通过，信用卡和商业卡强制路由竞争可能使交换费收入减少 30–50%，实质挤压 Brex 的卡经济性 [CR021]。Brex
              用户仲裁条款（已在用户条款中确认）限制了集体诉讼暴露，但未来可能受到 CFPB 解释性指引挑战 [CR044]。
