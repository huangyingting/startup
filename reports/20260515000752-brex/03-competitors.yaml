callouts:
  - calloutType: risk
    title: Acquisition Discount Signals Weakened Competitive Position
    body: >
      Capital One acquired Brex for $5.15 billion — a ~58% discount to Brex's prior $12.3 billion valuation.
      This compression reflects diminished competitive positioning versus Ramp rather than market conditions:
      Ramp's $13B implied valuation at the same time was rising, not falling. The discount is a concrete market
      signal that should inform any assessment of Brex's standalone competitive trajectory and moat durability.
    claimRefs:
      - CP004
      - CP022
  - calloutType: risk
    title: Ramp Has Lapped Brex on Customer Scale
    body: >
      Ramp's 50,000+ business customer count is 2× Brex's 25,000+, with Ramp offering the same product
      scope entirely free. The data network effect moat in spend intelligence compounds with scale: Ramp's
      benchmarking dataset is approximately 2× the size of Brex's, widening the AI accuracy gap with each
      new customer acquired. Closing this gap under Capital One integration pressure is Brex's highest
      competitive priority.
    claimRefs:
      - CP001
      - CP002
      - CP009
  - calloutType: strength
    title: Capital One Balance Sheet Is a Genuine Structural Advantage
    body: >
      Capital One is one of the largest US credit card issuers, with $171B+ in credit card receivables and
      a regulated banking license. This gives Brex access to card funding costs unavailable to standalone
      fintechs. For enterprise customers seeking a card partner with regulatory stability and credit capacity,
      Brex now offers something Ramp cannot match: a bank-grade balance sheet behind the card program.
    claimRefs:
      - CP018
      - CP019
