  evidenceGaps:
    - type: private-evidence-only
      severity: material
      topic: Ramp-valuation
      missingEvidence: >-
        Ramp's $13B implied valuation has been reported but not formally confirmed in a public filing or
        definitive press release accessible without a paywall; the exact terms and date of the 2025 funding
        round are not publicly disclosed.
      whyItMatters: >-
        The valuation comparison between Ramp ($13B) and Brex's acquisition price ($5.15B) is central to
        the competitive positioning narrative; if Ramp's valuation is materially different, the gap analysis
        changes.
      diligencePath: >-
        Request Ramp funding documentation through investor relations or review SEC Form D filings for any
        registered investment.
      relatedQuestionRefs:
        - QP020
    - type: access-blocked
      severity: minor
      topic: Brex-win-rate-vs-Ramp
      missingEvidence: >-
        No public data exists on Brex vs Ramp win rates in competitive evaluations; G2 and Trustpilot give
        sentiment but not head-to-head selection data.
      whyItMatters: >-
        Win/loss data would directly quantify whether Ramp is taking customers from Brex or simply acquiring
        net-new customers; without it, the competitive displacement intensity is uncertain.
      diligencePath: >-
        Commission a primary research survey of finance leaders who evaluated both platforms, or request
        reference calls with Brex customers who considered Ramp.
      relatedQuestionRefs:
        - QP016
    - type: private-evidence-only
      severity: minor
      topic: BILL-fiscal-2025-latest
      missingEvidence: >-
        BILL's most recent quarterly results (Q2 FY2025 or later) were referenced in the fetch log but the
        customer count of 498,000 is from September 30, 2025; more recent BILL metrics may be available.
      whyItMatters: >-
        BILL customer count trajectory (growing or declining) affects the assessment of its SMB competitive
        position relative to Brex.
      diligencePath: >-
        Access BILL's most recent quarterly earnings release on investor.bill.com for the latest customer
        count as of March 2026 or later.
      relatedQuestionRefs:
        - QP021
