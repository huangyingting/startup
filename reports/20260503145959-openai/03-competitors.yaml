  - id: S3
    title: Moat durability and displacement risk
    body: >-
      OpenAI's moat is real but not clean. Brand leadership, direct control of the flagship model roadmap, and visible
      cross-functional customer proofs support a durable competitive position. At the same time, the company remains
      entangled with Microsoft for infrastructure and part of its distribution narrative, and API-layer economics face
      pressure from both marketplaces and bundles. The strongest public evidence for durability is workflow breadth, not
      exclusive lock-in. That means OpenAI should be treated as competitively strong but still vulnerable to
      commoditization and channel-power pressure if it cannot keep owning the highest-value customer problems. For
      underwriting, the key distinction is between visible public proof and the private operating detail that still
      remains unavailable. The reviewed sources are strong enough to shape a directional conclusion, but they are not
      strong enough to support precision on conversion, economics, contract quality, or competitive durability. That
      matters because OpenAI is already valued like a scaled platform company, so even modest changes in adoption
      quality, partner leverage, regulatory friction, or cost structure can move the investment case materially. Every
      conclusion in this section should therefore be read as bounded but decision-useful, not as a substitute for
      management diligence. It should also be read alongside the unresolved evidence gaps, because the next layer of
      diligence could still change the slope, timing, or durability of the thesis.
    claimRefs:
      - C092
      - C093
      - C099
      - C100
      - C101
      - C107
      - C108
      - C109
      - C110
      - C113
