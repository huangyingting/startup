evidenceGaps:
  - topic: headcount
    missingEvidence: >-
      Current employee count, technical headcount split, and location footprint are not disclosed in the reviewed public
      sources.
    whyItMatters: Workforce scale and composition affect operating leverage, hiring intensity, and execution risk.
    diligencePath: Request current org chart, headcount by function and geography, and the last four quarterly hiring plans.
  - topic: economics
    missingEvidence: >-
      Public sources reviewed do not provide realized gross margin, inference cost per query, or customer-level
      monetization by product line.
    whyItMatters: OpenAI's valuation depends on whether revenue growth can outpace compute and support costs.
    diligencePath: Request audited or board-level revenue mix, gross margin by product, and current compute-spend run rate.
  - topic: cap-table
    missingEvidence: >-
      The reviewed corpus gives only high-level ownership buckets after recapitalization, not a full cap table or
      investor-rights stack.
    whyItMatters: >-
      Preference overhang, governance rights, and conversion mechanics can materially change investability and exit
      value.
    diligencePath: Request the latest cap table, shareholder agreement, protective provisions, and any Microsoft side letters.
  - topic: valuation-current
    missingEvidence: >-
      The official structure page implies a current valuation from the Foundation's stake value, but the reviewed
      independent source pack does not fully document the most recent financing terms behind that number.
    whyItMatters: >-
