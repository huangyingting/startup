callouts:
  - type: strength
    title: Product-market pull is already enterprise-scale
    body: >
      The combination of ChatGPT breakout, Microsoft-backed infrastructure scaling, and CNBC-reported 250 million weekly
      active users suggests OpenAI is no longer a research story with optional commercialization; it is already
      operating at platform scale [C024][C025][C026][C036].
    claimRefs:
      - C024
      - C025
      - C026
      - C036
  - type: watchout
    title: Governance is improved, not fully de-risked
    body: >
      The 2023 board crisis was severe enough to require a full legal review, a board rebuild, and a later 2025
      structural recapitalization. That is a meaningful remediation story, but it also confirms that governance design
      is a first-order diligence topic rather than a footnote [C011][C014][C017][C018][C020].
    claimRefs:
      - C011
      - C014
      - C017
      - C018
      - C020
  - type: gap
    title: Public economics remain incomplete
    body: >
      Public reporting gives useful directional signals on revenue, losses, and user counts, but the reviewed corpus
      does not disclose current headcount, realized margins, customer concentration, or a complete post-2025 cap table.
      Those items still need management diligence before any investment committee treats the public narrative as
      sufficient [C033][C034][C035][C040].
    claimRefs:
      - C033
      - C034
      - C035
      - C040
