company:
  name: OpenAI
chapter:
  number: 1
  title: Company Overview
  summary: >
    OpenAI remains a mission-led AI research and deployment company, but its current underwriting profile is defined by
    a much more commercial structure: a nonprofit foundation controls a public-benefit-corporation operating arm,
    Microsoft remains a major economic partner, and the company has moved from product breakout in 2022 to large-scale
    financing and governance rework by 2025. Public evidence supports strong product adoption and financing access, but
    key underwriting variables such as current headcount, realized margins, and the exact post-2025 valuation path still
    require direct diligence.
sections:
  - id: S1
    title: Identity, mission, and legal structure
    body: >
      OpenAI describes itself as an AI research and deployment company whose mission is to ensure that artificial
      general intelligence benefits all of humanity. The current public structure is materially more complex than the
      original 2015 nonprofit launch: OpenAI says it was founded in 2015 as a nonprofit, created a for-profit subsidiary
      in 2019 to scale research and deployment, and updated that structure again on October 28, 2025 so that the
      operating company became OpenAI Group PBC while the nonprofit became the OpenAI Foundation
      [C001][C002][C003][C004][C005][C006]. The company states that the Foundation still controls the Group and that
      both entities share the same mission, which matters because later financing, governance, and valuation analysis
      depends on whether mission control still sits above commercial equity holders [C007][C008].


      Official legal pages also provide a concrete operating footprint even though OpenAI does not foreground a standard
      “headquarters” page. The privacy policy names OpenAI OpCo, LLC and lists a registered office at 1455 Third Street,
      San Francisco, California 94158; the consumer terms of use repeat the same San Francisco address in the IP notice
      section [C009][C010]. That is sufficient to anchor the company in San Francisco for diligence purposes, but the
      reviewed corpus does not provide a current campus map, location count, or headcount disclosure, so the scale
      picture should be treated as partly public and partly incomplete [C040].
    claimRefs:
      - C001
      - C002
      - C003
      - C004
      - C005
      - C006
      - C007
      - C008
      - C009
      - C010
      - C040
  - id: S2
    title: Leadership, governance, and control dynamics
    body: >
      Leadership and governance remain one of the most material diligence topics because OpenAI’s 2023 board crisis
      forced the company to formalize a more durable control model. On November 17, 2023, OpenAI announced that Sam
      Altman would depart as CEO and leave the board, with CTO Mira Murati named interim CEO; the post also said Greg
      Brockman would step down as board chair but remain at the company [C011][C012][C013]. A November 29, 2023 official
      update reversed course: Altman returned as CEO, Brockman returned as President, and the new initial board was set
      as Bret Taylor as chair with Larry Summers and Adam D’Angelo [C014][C015][C016]. A later March 8, 2024 review
      update said WilmerHale reviewed more than 30,000 documents, found that the November crisis was precipitated by a
      breakdown in trust between the prior board and Altman, and concluded the decision was not driven by product
      safety, finances, or investor communications [C017][C018][C019].


      OpenAI then broadened the board in March 2024 and again presented a fuller foundation-controlled structure in
      2025. The current structure page says the Foundation board includes Bret Taylor, Adam D’Angelo, Sue
      Desmond-Hellmann, Zico Kolter, Paul Nakasone, Adebayo Ogunlesi, Nicole Seligman, and Sam Altman, while Kolter
      chairs the Safety and Security Committee and serves exclusively on the Foundation board [C020][C021][C022]. For
      diligence, the key conclusion is that OpenAI has clearly invested in governance repair, but key-person dependence
      on Altman and a still-evolving board design remain central underwriting issues rather than fully retired risks
      [C014][C020][C021][C039].
    claimRefs:
      - C011
      - C012
      - C013
      - C014
      - C015
      - C016
      - C017
      - C018
      - C019
      - C020
      - C021
      - C022
      - C039
  - id: S3
    title: Capital base, scale signals, and chronology
    body: >
      OpenAI’s commercial profile shifted from research institution to large-scale platform company during 2022-2025.
      Official company posts show major product and partnership milestones: ChatGPT was introduced on November 30, 2022;
      Microsoft extended its partnership with OpenAI on January 23, 2023 with a multi-year, multi-billion-dollar
      investment and Azure exclusivity across OpenAI research, API, and products; and GPT-4 was positioned as the
      company’s most advanced system with better internal safety and factuality metrics than GPT-3.5
      [C023][C024][C025][C026][C027][C028][C029]. Company posts also show OpenAI signing news partnerships with Le Monde
      and Prisa Media in March 2024, reinforcing its push to secure content, distribution, and enterprise relevance
      beyond a single chatbot product [C030].


      Independent reporting provides the clearest financing and scale snapshot. CNBC reported on October 2, 2024 that
      OpenAI raised $6.6 billion at a $157 billion post-money valuation, with Thrive Capital leading and participation
      from Microsoft, Nvidia, SoftBank, and others [C031][C032]. The same report said OpenAI generated $300 million in
      revenue in the prior month, expected $11.6 billion in next-year sales versus $3.7 billion in 2024, expected to
      lose about $5 billion in 2024, and had 250 million weekly active ChatGPT users, 11 million Plus subscribers, and 1
      million paying business users [C033][C034][C035][C036][C037][C038]. The 2025 structure page later added that the
      Foundation held a 26% stake worth approximately $130 billion, Microsoft held roughly 27%, and the remaining 47%
      sat with current and former employees and investors, implying a much larger later valuation but without the same
      level of independent detail in the reviewed source pack [C023][C031][C032]. That leaves valuation and economics
      directionally strong but still partly dependent on management or financing diligence rather than only static
      public filings [C039][C040].
    claimRefs:
      - C023
      - C024
