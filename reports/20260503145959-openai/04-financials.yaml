  - id: S3
    title: Capital adequacy and key financial unknowns
    body: >-
      OpenAI’s capital base is clearly strong enough to support ongoing expansion, but public evidence is still too thin
      to call the business financially transparent. A $6.6 billion 2024 round, Microsoft partnership support, and
      implied 2025 ownership-value marks show deep financing access. Customer cases also suggest meaningful ROI, which
      supports future monetization potential. Still, investors cannot underwrite runway, payback, or true margin path
      from public evidence alone. The main blockers are missing data on revenue mix, cash balance, burn cadence,
      contract quality, and customer concentration. That means the financial verdict is “powerful but under-disclosed,”
      not “fully underwritable.” For underwriting, the key distinction is between visible public proof and the private
      operating detail that still remains unavailable. The reviewed sources are strong enough to shape a directional
      conclusion, but they are not strong enough to support precision on conversion, economics, contract quality, or
      competitive durability. That matters because OpenAI is already valued like a scaled platform company, so even
      modest changes in adoption quality, partner leverage, regulatory friction, or cost structure can move the
      investment case materially. Every conclusion in this section should therefore be read as bounded but
      decision-useful, not as a substitute for management diligence. It should also be read alongside the unresolved
      evidence gaps, because the next layer of diligence could still change the slope, timing, or durability of the
      thesis.
    claimRefs:
