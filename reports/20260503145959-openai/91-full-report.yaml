  - number: 5
    title: Financials
    sections:
      - number: '5.1'
        title: Revenue model and monetization surfaces
        blocks:
          - type: paragraph
            body: >-
              The revenue model is visible at a high level even though detailed economics remain private. OpenAI clearly
              monetizes direct API usage and sells business-oriented workspace products. The API pricing page gives a
              clean list-price ladder across flagship, mini, realtime, and multimodal models, while the business page
              confirms separate Business and Enterprise surfaces. That is enough to conclude OpenAI is not dependent on
              one monetization mechanism. What remains unknown is the revenue mix: the public record does not show how
              much revenue comes from consumption, seats, services, or consumer subscriptions, and that uncertainty
              matters for both margin analysis and competitive risk. For underwriting, the key distinction is between
              visible public proof and the private operating detail that still remains unavailable. The reviewed sources
              are strong enough to shape a directional conclusion, but they are not strong enough to support precision
              on conversion, economics, contract quality, or competitive durability. That matters because OpenAI is
              already valued like a scaled platform company, so even modest changes in adoption quality, partner
              leverage, regulatory friction, or cost structure can move the investment case materially. Every conclusion
              in this section should therefore be read as bounded but decision-useful, not as a substitute for
              management diligence. It should also be read alongside the unresolved evidence gaps, because the next
