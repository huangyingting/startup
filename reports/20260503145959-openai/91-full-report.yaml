  - number: 8
    title: Risks
    sections:
      - number: '8.1'
        title: Governance, legal, and regulatory risk
        blocks:
          - type: paragraph
            body: >-
              OpenAI's governance history remains too material to treat as closed. The 2023 board crisis was severe
              enough to trigger a public reversal and a later WilmerHale review, which the company says examined more
              than 30,000 documents. The current structure and board are much stronger than the crisis-era
              configuration, and the Safety and Security Committee creates a visible governance control for
              high-consequence decisions. Even so, investors should view governance risk as reduced rather than
              eliminated. The company also operates under a growing regulatory burden, with the EU AI Act and related
              policy questions becoming part of the operating environment for any scaled AI platform. For underwriting,
              the key distinction is between visible public proof and the private operating detail that still remains
              unavailable. The reviewed sources are strong enough to shape a directional conclusion, but they are not
              strong enough to support precision on conversion, economics, contract quality, or competitive durability.
              That matters because OpenAI is already valued like a scaled platform company, so even modest changes in
              adoption quality, partner leverage, regulatory friction, or cost structure can move the investment case
              materially. Every conclusion in this section should therefore be read as bounded but decision-useful, not
