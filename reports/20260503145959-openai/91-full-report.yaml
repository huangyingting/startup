  - number: 4
    title: Competitors
    sections:
      - number: '4.1'
        title: Competitive set by buyer job
        blocks:
          - type: paragraph
            body: >-
              OpenAI's competitive landscape cannot be reduced to “other model labs.” For enterprise buyers, the most
              relevant alternatives include bundled productivity suites such as Microsoft 365 Copilot, model
              marketplaces such as Amazon Bedrock, internal build efforts, and the status quo of manual or
              legacy-software workflows. OpenAI's differentiation is that it can serve both the application layer and
              the developer layer directly, but that same breadth means it meets different competitors in different
              buying motions. Gartner's observation that CIOs are favoring commercial off-the-shelf solutions reinforces
              the importance of distribution and packaging, not just raw model capability. For underwriting, the key
              distinction is between visible public proof and the private operating detail that still remains
              unavailable. The reviewed sources are strong enough to shape a directional conclusion, but they are not
              strong enough to support precision on conversion, economics, contract quality, or competitive durability.
              That matters because OpenAI is already valued like a scaled platform company, so even modest changes in
              adoption quality, partner leverage, regulatory friction, or cost structure can move the investment case
              materially. Every conclusion in this section should therefore be read as bounded but decision-useful, not
              as a substitute for management diligence. It should also be read alongside the unresolved evidence gaps,
              because the next layer of diligence could still change the slope, timing, or durability of the thesis.
            claimRefs:
              - C079
              - C080
              - C090
              - C102
              - C104
              - C105
