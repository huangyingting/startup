      - number: '2.3'
        title: Capital base, scale signals, and chronology
        blocks:
          - type: paragraph
            body: >
              OpenAI’s commercial profile shifted from research institution to large-scale platform company during
              2022-2025. Official company posts show major product and partnership milestones: ChatGPT was introduced on
              November 30, 2022; Microsoft extended its partnership with OpenAI on January 23, 2023 with a multi-year,
              multi-billion-dollar investment and Azure exclusivity across OpenAI research, API, and products; and GPT-4
              was positioned as the company’s most advanced system with better internal safety and factuality metrics
              than GPT-3.5 [C023][C024][C025][C026][C027][C028][C029]. Company posts also show OpenAI signing news
              partnerships with Le Monde and Prisa Media in March 2024, reinforcing its push to secure content,
              distribution, and enterprise relevance beyond a single chatbot product [C030].


              Independent reporting provides the clearest financing and scale snapshot. CNBC reported on October 2, 2024
              that OpenAI raised $6.6 billion at a $157 billion post-money valuation, with Thrive Capital leading and
              participation from Microsoft, Nvidia, SoftBank, and others [C031][C032]. The same report said OpenAI
              generated $300 million in revenue in the prior month, expected $11.6 billion in next-year sales versus
              $3.7 billion in 2024, expected to lose about $5 billion in 2024, and had 250 million weekly active ChatGPT
              users, 11 million Plus subscribers, and 1 million paying business users
              [C033][C034][C035][C036][C037][C038]. The 2025 structure page later added that the Foundation held a 26%
              stake worth approximately $130 billion, Microsoft held roughly 27%, and the remaining 47% sat with current
              and former employees and investors, implying a much larger later valuation but without the same level of
              independent detail in the reviewed source pack [C023][C031][C032]. That leaves valuation and economics
              directionally strong but still partly dependent on management or financing diligence rather than only
              static public filings [C039][C040].
