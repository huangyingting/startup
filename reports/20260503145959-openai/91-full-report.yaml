      - number: '3.2'
        title: Buyer, user, and payer map
        blocks:
          - type: paragraph
            body: >-
              Buyer evidence points to a dual-entry model. OpenAI explicitly markets to business leaders and developers,
              while the John Deere and Wayfair stories show that deployments cross customer success, dealer enablement,
              legal, marketing, engineering, and customer-service workflows. That implies budget ownership can sit with
              product, IT, operations, customer support, or functional leaders depending on the use case. The practical
              adoption path is rarely a single top-down license motion; instead, teams appear to start with
              experimentation in a function, then expand when the workflow shows measurable time savings, improved
              decision quality, or better service outcomes. For underwriting, the key distinction is between visible
              public proof and the private operating detail that still remains unavailable. The reviewed sources are
              strong enough to shape a directional conclusion, but they are not strong enough to support precision on
              conversion, economics, contract quality, or competitive durability. That matters because OpenAI is already
              valued like a scaled platform company, so even modest changes in adoption quality, partner leverage,
              regulatory friction, or cost structure can move the investment case materially. Every conclusion in this
              section should therefore be read as bounded but decision-useful, not as a substitute for management
              diligence. It should also be read alongside the unresolved evidence gaps, because the next layer of
              diligence could still change the slope, timing, or durability of the thesis.
