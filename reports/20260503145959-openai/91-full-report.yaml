      - number: '4.2'
        title: Capability, pricing, and trust posture
        blocks:
          - type: paragraph
            body: >-
              Public pricing and trust surfaces reveal meaningful but incomplete differentiation. OpenAI publishes
              direct token pricing, batch discounts, and enterprise privacy commitments. Microsoft competes by bundling
              AI chat into an existing suite and upselling richer Copilot capabilities, while Bedrock competes on choice
              and infrastructure adjacency rather than a single branded model family. OpenAI still has a clear message
              around privacy controls, model access, and direct-platform use, but competitors increasingly meet buyers
              with adjacent value: Microsoft through workflow context and Bedrock through provider breadth. Unsupported
              cells remain important, especially around realized discounts, procurement friction, and operational
              integration depth. For underwriting, the key distinction is between visible public proof and the private
              operating detail that still remains unavailable. The reviewed sources are strong enough to shape a
              directional conclusion, but they are not strong enough to support precision on conversion, economics,
              contract quality, or competitive durability. That matters because OpenAI is already valued like a scaled
              platform company, so even modest changes in adoption quality, partner leverage, regulatory friction, or
              cost structure can move the investment case materially. Every conclusion in this section should therefore
              be read as bounded but decision-useful, not as a substitute for management diligence. It should also be
              read alongside the unresolved evidence gaps, because the next layer of diligence could still change the
              slope, timing, or durability of the thesis.
