appendices:
  - id: A
    title: Method and remaining gaps
    blocks:
      - type: paragraph
        body: >-
          This report uses public evidence only. It is strongest on company identity, market momentum, product breadth,
          and headline traction. It remains weaker on realized economics, partner-contract detail, concentration, and
          private valuation mechanics.
      - type: list
        items:
          - >-
            headcount: Current employee count, technical headcount split, and location footprint are not disclosed in
            the reviewed public sources.
          - >-
            economics: Public sources reviewed do not provide realized gross margin, inference cost per query, or
            customer-level monetization by product line.
          - >-
            cap-table: The reviewed corpus gives only high-level ownership buckets after recapitalization, not a full
            cap table or investor-rights stack.
          - >-
            valuation-current: The official structure page implies a current valuation from the Foundation's stake
            value, but the reviewed independent source pack does not fully document the most recent financing terms
            behind that number.
          - >-
            enterprise-sam: Public evidence does not isolate a product-line, geography, or customer-size-specific SAM
            for OpenAI.
          - >-
            seat-vs-usage: The public corpus does not reveal how much commercial demand is monetized through seats
            versus token consumption.
          - >-
            vertical-concentration: Official customer stories show breadth but do not disclose concentration by industry
            or top account.
          - >-
            realized-pricing: Public evidence does not show realized discounting, enterprise minimums, or competitive
            win/loss pricing.
          - >-
            channel-mix: The reviewed corpus does not show what share of enterprise demand is reached through Microsoft,
            direct sales, or cloud intermediaries.
          - >-
            feature-parity: A comprehensive, independently verified feature comparison against all major competitor
            classes is not publicly available in the reviewed corpus.
