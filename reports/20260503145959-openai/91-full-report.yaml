      - number: '5.2'
        title: Traction signals and cost structure
        blocks:
          - type: paragraph
            body: >-
              The strongest public traction signal comes from CNBC’s October 2024 financing coverage. It reported
              roughly $300 million of prior-month revenue, $3.7 billion of 2024 sales expectations, $11.6 billion for
              the following year, and a roughly $5 billion expected 2024 loss. Those numbers imply extraordinary
              top-line growth alongside major cost intensity. The Microsoft partnership helps explain why: OpenAI still
              depends on Azure for workloads across research, API, and products. Reliability and compliance surfaces
              improve revenue quality for enterprise sales, but they do not reveal unit cost. The underwriting
              conclusion is that growth is visible, while gross margin and burn remain largely opaque. For underwriting,
              the key distinction is between visible public proof and the private operating detail that still remains
