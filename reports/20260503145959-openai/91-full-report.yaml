chapters:
  - number: 2
    title: Company Overview
    sections:
      - number: '2.1'
        title: Identity, mission, and legal structure
        blocks:
          - type: paragraph
            body: >
              OpenAI describes itself as an AI research and deployment company whose mission is to ensure that
              artificial general intelligence benefits all of humanity. The current public structure is materially more
              complex than the original 2015 nonprofit launch: OpenAI says it was founded in 2015 as a nonprofit,
              created a for-profit subsidiary in 2019 to scale research and deployment, and updated that structure again
              on October 28, 2025 so that the operating company became OpenAI Group PBC while the nonprofit became the
              OpenAI Foundation [C001][C002][C003][C004][C005][C006]. The company states that the Foundation still
              controls the Group and that both entities share the same mission, which matters because later financing,
              governance, and valuation analysis depends on whether mission control still sits above commercial equity
              holders [C007][C008].


              Official legal pages also provide a concrete operating footprint even though OpenAI does not foreground a
              standard “headquarters” page. The privacy policy names OpenAI OpCo, LLC and lists a registered office at
              1455 Third Street, San Francisco, California 94158; the consumer terms of use repeat the same San
              Francisco address in the IP notice section [C009][C010]. That is sufficient to anchor the company in San
              Francisco for diligence purposes, but the reviewed corpus does not provide a current campus map, location
              count, or headcount disclosure, so the scale picture should be treated as partly public and partly
              incomplete [C040].
            claimRefs:
              - C001
              - C002
              - C003
              - C004
              - C005
              - C006
              - C007
              - C008
              - C009
              - C010
              - C040
      - number: '2.2'
        title: Leadership, governance, and control dynamics
        blocks:
          - type: paragraph
            body: >
              Leadership and governance remain one of the most material diligence topics because OpenAI’s 2023 board
              crisis forced the company to formalize a more durable control model. On November 17, 2023, OpenAI
              announced that Sam Altman would depart as CEO and leave the board, with CTO Mira Murati named interim CEO;
              the post also said Greg Brockman would step down as board chair but remain at the company
              [C011][C012][C013]. A November 29, 2023 official update reversed course: Altman returned as CEO, Brockman
              returned as President, and the new initial board was set as Bret Taylor as chair with Larry Summers and
              Adam D’Angelo [C014][C015][C016]. A later March 8, 2024 review update said WilmerHale reviewed more than
              30,000 documents, found that the November crisis was precipitated by a breakdown in trust between the
              prior board and Altman, and concluded the decision was not driven by product safety, finances, or investor
              communications [C017][C018][C019].


              OpenAI then broadened the board in March 2024 and again presented a fuller foundation-controlled structure
              in 2025. The current structure page says the Foundation board includes Bret Taylor, Adam D’Angelo, Sue
              Desmond-Hellmann, Zico Kolter, Paul Nakasone, Adebayo Ogunlesi, Nicole Seligman, and Sam Altman, while
              Kolter chairs the Safety and Security Committee and serves exclusively on the Foundation board
              [C020][C021][C022]. For diligence, the key conclusion is that OpenAI has clearly invested in governance
              repair, but key-person dependence on Altman and a still-evolving board design remain central underwriting
              issues rather than fully retired risks [C014][C020][C021][C039].
            claimRefs:
              - C011
              - C012
              - C013
              - C014
              - C015
