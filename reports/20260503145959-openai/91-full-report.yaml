      - number: '4.3'
        title: Moat durability and displacement risk
        blocks:
          - type: paragraph
            body: >-
              OpenAI's moat is real but not clean. Brand leadership, direct control of the flagship model roadmap, and
              visible cross-functional customer proofs support a durable competitive position. At the same time, the
              company remains entangled with Microsoft for infrastructure and part of its distribution narrative, and
              API-layer economics face pressure from both marketplaces and bundles. The strongest public evidence for
              durability is workflow breadth, not exclusive lock-in. That means OpenAI should be treated as
              competitively strong but still vulnerable to commoditization and channel-power pressure if it cannot keep
              owning the highest-value customer problems. For underwriting, the key distinction is between visible
              public proof and the private operating detail that still remains unavailable. The reviewed sources are
