  - number: 3
    title: Market Analysis
    sections:
      - number: '3.1'
        title: Market boundary and realistic sizing lenses
        blocks:
          - type: paragraph
            body: >-
              OpenAI should not be underwritten against the full “AI” narrative without first separating what the
              company actually sells from broader infrastructure spend. Gartner’s 2025 forecast confirms the category is
              enormous, but the same source also shows most spending sits in hardware rather than the software and
              services layers where OpenAI participates most directly. That matters because OpenAI is monetizing APIs,
              business plans, and enterprise deployments rather than servers, PCs, or phones. The public evidence
              therefore supports a broad TAM framed by generative-AI software and services plus a narrower SAM made up
              of workflow automation, copilots, and developer-model consumption where OpenAI has a direct route to
              budget. For underwriting, the key distinction is between visible public proof and the private operating
              detail that still remains unavailable. The reviewed sources are strong enough to shape a directional
              conclusion, but they are not strong enough to support precision on conversion, economics, contract
              quality, or competitive durability. That matters because OpenAI is already valued like a scaled platform
              company, so even modest changes in adoption quality, partner leverage, regulatory friction, or cost
              structure can move the investment case materially. Every conclusion in this section should therefore be
              read as bounded but decision-useful, not as a substitute for management diligence. It should also be read
              alongside the unresolved evidence gaps, because the next layer of diligence could still change the slope,
              timing, or durability of the thesis.
            claimRefs:
