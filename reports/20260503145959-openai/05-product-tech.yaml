  - id: S2
    title: Architecture, dependencies, and operating model
    body: >-
      The reviewed public evidence supports only a partial architecture map, but that partial map is still meaningful.
      OpenAI clearly exposes direct model APIs, application-layer workspace tools, and trust or policy surfaces that
      function as part of the enterprise product contract. The GPT-4 page supports a product-maturity narrative, while
      the Microsoft partnership establishes that Azure remains a critical infrastructure dependency. OpenAI's
      internal-use story also suggests a workflow-centric product-development model built around rapid iteration and
      live deployment. What stays opaque is the full orchestration stack, evaluation pipeline, and how much
      implementation work sits behind each enterprise deployment. For underwriting, the key distinction is between
      visible public proof and the private operating detail that still remains unavailable. The reviewed sources are
      strong enough to shape a directional conclusion, but they are not strong enough to support precision on
      conversion, economics, contract quality, or competitive durability. That matters because OpenAI is already valued
      like a scaled platform company, so even modest changes in adoption quality, partner leverage, regulatory friction,
      or cost structure can move the investment case materially. Every conclusion in this section should therefore be
      read as bounded but decision-useful, not as a substitute for management diligence. It should also be read
      alongside the unresolved evidence gaps, because the next layer of diligence could still change the slope, timing,
      or durability of the thesis.
    claimRefs:
      - C153
      - C163
      - C166
      - C167
      - C170
      - C173
      - C174
      - C177
      - C178
      - C182
  - id: S3
    title: Trust, safety, and reliability as product features
    body: >-
      For enterprise underwriting, OpenAI's trust and control surfaces should be treated as part of the product, not as
      appendix material. OpenAI explicitly markets no-training-use, zero-retention, compliance support, and
      third-party-audited controls. It also maintains Safety, transparency, and status surfaces that communicate
      moderation policy and operating reliability. Those signals materially improve the product case for regulated or
      high-consequence workflows, even if they do not eliminate risk. The caveat is that public trust surfaces are still
      claims by the company; they strengthen product credibility, but they are not a substitute for customer-reference
      checks, security diligence, or direct architecture review. For underwriting, the key distinction is between
      visible public proof and the private operating detail that still remains unavailable. The reviewed sources are
      strong enough to shape a directional conclusion, but they are not strong enough to support precision on
      conversion, economics, contract quality, or competitive durability. That matters because OpenAI is already valued
      like a scaled platform company, so even modest changes in adoption quality, partner leverage, regulatory friction,
      or cost structure can move the investment case materially. Every conclusion in this section should therefore be
      read as bounded but decision-useful, not as a substitute for management diligence. It should also be read
      alongside the unresolved evidence gaps, because the next layer of diligence could still change the slope, timing,
      or durability of the thesis.
    claimRefs:
