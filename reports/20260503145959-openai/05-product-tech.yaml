company:
  name: OpenAI
chapter:
  number: 5
  title: Product & Technology
  summary: >-
    OpenAI has evolved from a single chatbot brand into a multi-surface AI platform spanning consumer, enterprise, and
    developer workflows. The public evidence supports meaningful product breadth and explicit trust controls, but the
    underlying architecture still has important opaque layers: proprietary data flywheels, model-training economics,
    evaluation systems, and the exact boundary between software platform and services-heavy enterprise deployment.
sections:
  - id: S1
    title: Product stack and workflow coverage
    body: >-
      OpenAI's visible product estate spans multiple layers: consumer-facing entry points, enterprise workspace
      products, developer APIs, and growing multimodal capabilities. The homepage, business surface, and API pricing
      page all support the conclusion that the company is now operating as a platform with multiple monetization and
      deployment routes rather than as a single chatbot. Customer cases reinforce that view. John Deere and Wayfair use
      OpenAI across support, operations, legal, marketing, and engineering-adjacent work, while OpenAI's own internal
      story extends that footprint into GTM, finance, and support. The product question is therefore less “does OpenAI
      have use cases?” and more “which workflows are sticky enough to support durable monetization?” For underwriting,
      the key distinction is between visible public proof and the private operating detail that still remains
      unavailable. The reviewed sources are strong enough to shape a directional conclusion, but they are not strong
      enough to support precision on conversion, economics, contract quality, or competitive durability. That matters
      because OpenAI is already valued like a scaled platform company, so even modest changes in adoption quality,
      partner leverage, regulatory friction, or cost structure can move the investment case materially. Every conclusion
      in this section should therefore be read as bounded but decision-useful, not as a substitute for management
      diligence. It should also be read alongside the unresolved evidence gaps, because the next layer of diligence
      could still change the slope, timing, or durability of the thesis.
    claimRefs:
      - C149
      - C150
      - C151
      - C152
      - C154
      - C164
