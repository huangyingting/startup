  - id: S2
    title: Why the current underwriting problem is still hard
    body: >-
      The same public record also argues against overconfidence. OpenAI's implied valuation has already stepped far
      above the latest independently reported financing mark, while the business still does not disclose gross margin,
      runway, concentration, contract quality, or the detailed mechanics behind the later valuation implication.
      Microsoft remains both a critical enabler and a concentrated source of partner and channel risk. Governance repair
      is real, but the crisis history is recent enough to matter. Taken together, those factors make current pricing
      look rich relative to public-evidence certainty, even if the asset quality itself is very high. For underwriting,
      the key distinction is between visible public proof and the private operating detail that still remains
      unavailable. The reviewed sources are strong enough to shape a directional conclusion, but they are not strong
      enough to support precision on conversion, economics, contract quality, or competitive durability. That matters
      because OpenAI is already valued like a scaled platform company, so even modest changes in adoption quality,
      partner leverage, regulatory friction, or cost structure can move the investment case materially. Every conclusion
      in this section should therefore be read as bounded but decision-useful, not as a substitute for management
      diligence. It should also be read alongside the unresolved evidence gaps, because the next layer of diligence
      could still change the slope, timing, or durability of the thesis.
    claimRefs:
