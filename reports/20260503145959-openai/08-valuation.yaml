callouts:
  - type: verdict
    title: 'Recommendation: research-more'
    body: >-
      OpenAI is a premium asset with premium uncertainty. The business quality is impressive, but the current implied
      valuation and missing economic detail make a wait-and-diligence posture more defensible than a clean buy.
    claimRefs:
      - C277
      - C278
      - C280
      - C287
      - C288
  - type: watchout
    title: This is an underwriting caution, not a category skepticism call
    body: >-
      The report does not dispute OpenAI's strategic strength; it disputes the wisdom of pretending public evidence
      already answers the hardest valuation questions.
    claimRefs:
      - C274
      - C275
      - C276
      - C277
  - type: gap
    title: Private diligence could move the call materially
    body: >-
      Gross margin, concentration, runway, contract economics, and valuation mechanics are the specific missing facts
      that matter most.
    claimRefs:
      - C281
      - C282
      - C288
