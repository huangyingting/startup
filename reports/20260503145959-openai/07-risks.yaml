company:
  name: OpenAI
chapter:
  number: 7
  title: Risks
  summary: >-
    OpenAI's risk profile is unusually asymmetric: category leadership and financing access reduce some classic startup
    risks, but governance history, legal exposure, regulatory complexity, infrastructure concentration, and opaque
    economics create material downside paths. The right framing is not whether risk exists—it clearly does—but which
    risks are already mitigated by public controls and which remain unresolved enough to gate a stronger recommendation.
sections:
  - id: S1
    title: Governance, legal, and regulatory risk
    body: >-
      OpenAI's governance history remains too material to treat as closed. The 2023 board crisis was severe enough to
      trigger a public reversal and a later WilmerHale review, which the company says examined more than 30,000
      documents. The current structure and board are much stronger than the crisis-era configuration, and the Safety and
      Security Committee creates a visible governance control for high-consequence decisions. Even so, investors should
      view governance risk as reduced rather than eliminated. The company also operates under a growing regulatory
      burden, with the EU AI Act and related policy questions becoming part of the operating environment for any scaled
      AI platform. For underwriting, the key distinction is between visible public proof and the private operating
      detail that still remains unavailable. The reviewed sources are strong enough to shape a directional conclusion,
      but they are not strong enough to support precision on conversion, economics, contract quality, or competitive
      durability. That matters because OpenAI is already valued like a scaled platform company, so even modest changes
      in adoption quality, partner leverage, regulatory friction, or cost structure can move the investment case
      materially. Every conclusion in this section should therefore be read as bounded but decision-useful, not as a
      substitute for management diligence. It should also be read alongside the unresolved evidence gaps, because the
      next layer of diligence could still change the slope, timing, or durability of the thesis.
    claimRefs:
      - C219
      - C220
      - C221
      - C222
      - C223
      - C224
      - C225
      - C234
      - C244
      - C251
      - C252
  - id: S2
    title: Operational, partner, and financial risk
    body: >-
      The most concentrated risk in the public record is the Microsoft relationship. Azure exclusivity, ownership
      overlap, and partnership economics all make Microsoft simultaneously a core enabler and a concentrated dependency.
      Public reliability reporting is helpful, but the status surface is aggregate and explicitly warns that
      customer-level availability can vary. Financially, the business is well funded, yet CNBC’s reported loss
      expectations remind investors that scaling remains capital intensive. That means the capital story is strong, but
      it should not be confused with low risk. Concentrated supplier power and opaque runway keep the risk profile
      elevated. For underwriting, the key distinction is between visible public proof and the private operating detail
      that still remains unavailable. The reviewed sources are strong enough to shape a directional conclusion, but they
      are not strong enough to support precision on conversion, economics, contract quality, or competitive durability.
      That matters because OpenAI is already valued like a scaled platform company, so even modest changes in adoption
      quality, partner leverage, regulatory friction, or cost structure can move the investment case materially. Every
      conclusion in this section should therefore be read as bounded but decision-useful, not as a substitute for
      management diligence. It should also be read alongside the unresolved evidence gaps, because the next layer of
      diligence could still change the slope, timing, or durability of the thesis.
    claimRefs:
      - C226
      - C227
      - C228
      - C232
      - C233
      - C237
