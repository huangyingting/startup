  - id: T705
    title: Mitigation and kill criteria table
    columns:
      - risk area
      - current mitigation
      - kill / escalation trigger
      - public monitor
      - private diligence ask
    rows:
      - - Governance
        - Foundation control and revised board
        - Fresh board instability or unexplained executive churn
        - Newsroom / official governance posts
        - Request board materials and succession plan
      - - Azure dependence
        - Strategic partnership and capital support
        - Deteriorating contract terms or major service disruption
        - Partnership statements / incidents
        - Request cloud contract and fallback options
      - - Economics
        - Large financing access
        - Runway compression or margin deterioration
        - Future financing and public reporting
        - Request cash, burn, and gross margin
      - - Regulatory posture
        - Policy, privacy, and safety surfaces
        - Major enforcement action or inability to serve key segments
        - Policy updates and legal developments
        - Request legal reserve and compliance audit status
      - - Customer quality
        - Strong named proof and broad demand
        - Evidence of concentration or weak renewals
        - Customer stories and public user updates
        - Request NRR, churn, and top-customer concentration
    notes: Kill criteria are phrased as diligence triggers that would materially change the investment view.
