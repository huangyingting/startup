startupIntroduction:
  summary: >-
    OpenAI is a mission-led AI research and deployment company that now operates as a broad platform spanning consumer
    products, enterprise work tools, and developer APIs. Public evidence shows extraordinary market pull and financing
    access, but also confirms that Microsoft concentration, economics opacity, and governance history remain central
    diligence topics.
