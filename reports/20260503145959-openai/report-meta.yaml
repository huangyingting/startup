  topStrengths:
    - OpenAI combines direct developer APIs, business products, and strong brand pull in a fast-growing category.
    - Public customer proof spans industrial operations, retail, and internal commercial workflows.
    - The company has unusually strong financing access and visible trust / compliance surfaces for enterprise buyers.
  topRisks:
    - Current implied valuation is far ahead of what public economic disclosure can fully support.
    - Microsoft / Azure concentration creates material partner, channel, and infrastructure risk.
    - Gross margin, runway, concentration, and retention remain major public-data gaps.
  unresolvedGaps:
    - Gross margin, burn, runway, and revenue mix by product are not publicly disclosed.
    - Customer concentration, NRR, and enterprise ACV remain undisclosed.
    - The mechanics behind the latest implied valuation and Microsoft contract protections remain private.
appendices:
  - id: A
    title: Method and remaining gaps
    blocks:
      - type: paragraph
        body: >-
          This report uses public evidence only. It is strongest on company identity, market momentum, product breadth,
          and headline traction. It remains weaker on realized economics, partner-contract detail, concentration, and
          private valuation mechanics.
      - type: list
        items:
          - 'headcount: Current employee count, technical headcount split, and location footprint are not disclosed in the reviewed public sources.'
          - 'economics: Public sources reviewed do not provide realized gross margin, inference cost per query, or customer-level monetization by product line.'
          - 'cap-table: The reviewed corpus gives only high-level ownership buckets after recapitalization, not a full cap table or investor-rights stack.'
          - "valuation-current: The official structure page implies a current valuation from the Foundation's stake value, but the reviewed independent source pack does not fully document the most recent financing terms behind that number."
          - "enterprise-sam: Public evidence does not isolate a product-line, geography, or customer-size-specific SAM for OpenAI."
          - 'seat-vs-usage: The public corpus does not reveal how much commercial demand is monetized through seats versus token consumption.'
          - 'vertical-concentration: Official customer stories show breadth but do not disclose concentration by industry or top account.'
          - 'realized-pricing: Public evidence does not show realized discounting, enterprise minimums, or competitive win/loss pricing.'
          - 'channel-mix: The reviewed corpus does not show what share of enterprise demand is reached through Microsoft, direct sales, or cloud intermediaries.'
          - 'feature-parity: A comprehensive, independently verified feature comparison against all major competitor classes is not publicly available in the reviewed corpus.'
disclaimer: >-
  This report is a public-evidence diligence snapshot, not investment advice. Important financial, legal, technical, and
  contractual facts remain non-public and should be verified directly with management and primary documents before any
  investment decision.
