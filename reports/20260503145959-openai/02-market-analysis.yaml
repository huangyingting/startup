  - id: S3
    title: Growth drivers, procurement constraints, and timing
    body: >-
      Independent adoption evidence is strong enough to support continued market expansion, but the way that demand is
      captured will matter. Deloitte’s survey suggests enterprise leaders are already using text and code generation at
      meaningful rates, while Gartner says CIOs are increasingly favoring packaged commercial offerings. That trend
      benefits OpenAI, but only if enterprise procurement barriers are cleared. Privacy, retention, auditability, and
      reliability are therefore not side issues; they are adoption gates. Competitive packaging from Microsoft and
      hyperscaler marketplaces also compresses OpenAI’s room to price purely on model novelty, which is why the most
      durable segment appears to be buyers who need a high-performing model platform plus workflow integration rather
      than a bundled seat alone. For underwriting, the key distinction is between visible public proof and the private
      operating detail that still remains unavailable. The reviewed sources are strong enough to shape a directional
      conclusion, but they are not strong enough to support precision on conversion, economics, contract quality, or
      competitive durability. That matters because OpenAI is already valued like a scaled platform company, so even
      modest changes in adoption quality, partner leverage, regulatory friction, or cost structure can move the
      investment case materially. Every conclusion in this section should therefore be read as bounded but
      decision-useful, not as a substitute for management diligence. It should also be read alongside the unresolved
      evidence gaps, because the next layer of diligence could still change the slope, timing, or durability of the
      thesis.
    claimRefs:
