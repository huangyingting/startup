chapter:
  number: 2
  title: Market Analysis
  summary: >-
    OpenAI participates in a very large but heterogeneous market spanning developer APIs, enterprise copilots, and
    consumer AI interfaces. Public evidence supports strong demand and rapid enterprise experimentation, but it also
    shows the spend pool is fragmented across hardware, software, bundled suites, and internal workflow budgets, which
    argues for a disciplined SAM rather than a generic “AI is huge” conclusion.
sections:
  - id: S1
    title: Market boundary and realistic sizing lenses
    body: >-
      OpenAI should not be underwritten against the full “AI” narrative without first separating what the company
      actually sells from broader infrastructure spend. Gartner’s 2025 forecast confirms the category is enormous, but
      the same source also shows most spending sits in hardware rather than the software and services layers where
      OpenAI participates most directly. That matters because OpenAI is monetizing APIs, business plans, and enterprise
      deployments rather than servers, PCs, or phones. The public evidence therefore supports a broad TAM framed by
      generative-AI software and services plus a narrower SAM made up of workflow automation, copilots, and
      developer-model consumption where OpenAI has a direct route to budget. For underwriting, the key distinction is
      between visible public proof and the private operating detail that still remains unavailable. The reviewed sources
      are strong enough to shape a directional conclusion, but they are not strong enough to support precision on
      conversion, economics, contract quality, or competitive durability. That matters because OpenAI is already valued
      like a scaled platform company, so even modest changes in adoption quality, partner leverage, regulatory friction,
      or cost structure can move the investment case materially. Every conclusion in this section should therefore be
      read as bounded but decision-useful, not as a substitute for management diligence. It should also be read
      alongside the unresolved evidence gaps, because the next layer of diligence could still change the slope, timing,
      or durability of the thesis.
    claimRefs:
      - C043
      - C044
      - C045
      - C046
      - C047
      - C052
      - C053
      - C054
      - C075
  - id: S2
    title: Buyer, user, and payer map
    body: >-
      Buyer evidence points to a dual-entry model. OpenAI explicitly markets to business leaders and developers, while
      the John Deere and Wayfair stories show that deployments cross customer success, dealer enablement, legal,
      marketing, engineering, and customer-service workflows. That implies budget ownership can sit with product, IT,
      operations, customer support, or functional leaders depending on the use case. The practical adoption path is
      rarely a single top-down license motion; instead, teams appear to start with experimentation in a function, then
      expand when the workflow shows measurable time savings, improved decision quality, or better service outcomes. For
      underwriting, the key distinction is between visible public proof and the private operating detail that still
      remains unavailable. The reviewed sources are strong enough to shape a directional conclusion, but they are not
      strong enough to support precision on conversion, economics, contract quality, or competitive durability. That
      matters because OpenAI is already valued like a scaled platform company, so even modest changes in adoption
      quality, partner leverage, regulatory friction, or cost structure can move the investment case materially. Every
      conclusion in this section should therefore be read as bounded but decision-useful, not as a substitute for
      management diligence. It should also be read alongside the unresolved evidence gaps, because the next layer of
      diligence could still change the slope, timing, or durability of the thesis.
    claimRefs:
      - C052
      - C053
      - C054
      - C057
      - C058
      - C059
      - C060
      - C061
      - C062
      - C071
