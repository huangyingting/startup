        - constraint
        - Microsoft includes Copilot Chat with eligible subscriptions
        - Current
        - Raises pricing pressure for seat-based workflows
        - Request displacement data versus Microsoft stack
      - - Multi-model cloud marketplaces
        - constraint
        - AWS Bedrock offers multi-provider choice and batch discounts
        - Current
        - Can weaken direct platform lock-in
        - Request share of direct versus marketplace-originated demand
      - - Customer ROI proof
        - positive
        - John Deere and Wayfair disclose workflow-level benefits
        - Current
        - Supports broader departmental expansion
        - Request cohort retention and expansion metrics
