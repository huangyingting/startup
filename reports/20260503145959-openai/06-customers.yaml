slug: openai
runDate: '2026-05-03'
company:
  name: OpenAI
chapter:
  number: 6
  title: Customers
  summary: >-
    Public customer evidence for OpenAI is strong at the top of funnel and still incomplete in the middle. The company
    has extraordinary user-scale proxies and credible named customer stories across multiple industries and functions,
    but it does not disclose concentration, renewal, churn, NRR, or the split between consumer enthusiasm and durable
    enterprise monetization. Customer proof is therefore a strength, but customer durability remains an important
    diligence gate.
sections:
  - id: S1
    title: Customer segments and visible adoption scale
    body: >-
      OpenAI's customer base is visibly broad, but the public evidence is uneven. CNBC's October 2024 report supplies
      unusually strong top-of-funnel numbers—weekly active users, Plus subscribers, and paying business users—while the
      business surface and stories hub show that OpenAI is pursuing both organizational buyers and developers. This
      combination matters: it suggests OpenAI has one of the deepest demand funnels in the category, but it does not by
      itself prove enterprise durability. The company is clearly not struggling to find users. The harder diligence
      question is how efficiently that reach converts into high-quality commercial relationships. For underwriting, the
      key distinction is between visible public proof and the private operating detail that still remains unavailable.
      The reviewed sources are strong enough to shape a directional conclusion, but they are not strong enough to
      support precision on conversion, economics, contract quality, or competitive durability. That matters because
      OpenAI is already valued like a scaled platform company, so even modest changes in adoption quality, partner
      leverage, regulatory friction, or cost structure can move the investment case materially. Every conclusion in this
      section should therefore be read as bounded but decision-useful, not as a substitute for management diligence. It
      should also be read alongside the unresolved evidence gaps, because the next layer of diligence could still change
      the slope, timing, or durability of the thesis.
    claimRefs:
      - C184
      - C185
      - C186
      - C187
      - C188
      - C195
      - C204
      - C212
  - id: S2
    title: Named customer proof and workflow depth
    body: >-
      Named-customer evidence is strong enough to conclude OpenAI can support real production workflows across multiple
      departments and industries. John Deere links OpenAI to field operations, dealers, and customer success at
      industrial scale. Wayfair ties OpenAI to legal review, marketing, customer service, and engineering modernization.
      OpenAI's own internal-use stories extend the same pattern to GTM, finance, and support. The common theme is not
      novelty; it is operational leverage. The most persuasive customer proof in the public record is therefore
      cross-functional depth, not just logo count. For underwriting, the key distinction is between visible public proof
      and the private operating detail that still remains unavailable. The reviewed sources are strong enough to shape a
      directional conclusion, but they are not strong enough to support precision on conversion, economics, contract
      quality, or competitive durability. That matters because OpenAI is already valued like a scaled platform company,
      so even modest changes in adoption quality, partner leverage, regulatory friction, or cost structure can move the
      investment case materially. Every conclusion in this section should therefore be read as bounded but
      decision-useful, not as a substitute for management diligence. It should also be read alongside the unresolved
      evidence gaps, because the next layer of diligence could still change the slope, timing, or durability of the
      thesis.
    claimRefs:
      - C189
      - C190
      - C191
      - C192
      - C193
      - C194
      - C196
      - C197
      - C198
      - C199
      - C200
      - C205
      - C206
      - C216
      - C217
  - id: S3
    title: Durability, expansion, and concentration limits
    body: >-
      The public corpus is less helpful on customer durability than on customer breadth. OpenAI does publish privacy,
      compliance, and reliability surfaces that likely improve renewal odds for business buyers, and those surfaces help
      explain why the company can credibly pursue regulated or high-consequence workflows. But the reviewed materials do
      not disclose concentration, NRR, churn, enterprise ACVs, deployment time, or conversion rates from free to paid.
      That is a major limitation. The right conclusion is that customer proof is a strength and concentration visibility
      is a gap—not that public proof alone settles the durability question. For underwriting, the key distinction is
      between visible public proof and the private operating detail that still remains unavailable. The reviewed sources
      are strong enough to shape a directional conclusion, but they are not strong enough to support precision on
      conversion, economics, contract quality, or competitive durability. That matters because OpenAI is already valued
      like a scaled platform company, so even modest changes in adoption quality, partner leverage, regulatory friction,
      or cost structure can move the investment case materially. Every conclusion in this section should therefore be
      read as bounded but decision-useful, not as a substitute for management diligence. It should also be read
      alongside the unresolved evidence gaps, because the next layer of diligence could still change the slope, timing,
      or durability of the thesis.
    claimRefs:
      - C201
      - C202
      - C203
      - C207
      - C208
      - C209
      - C210
      - C211
      - C213
      - C214
      - C215
      - C218
