  - id: T702
    title: 监管与法律风险表
    columns:
      - 风险领域
      - 当前证据
      - 状态
      - 缓解
      - 待解尽调
    rows:
      - - Bartz 图书版权和解
        - >-
          Authors Guild 称简易判决认定具名原告的合法图书训练属于合理使用，但盗版主张并非合理使用；和解
          基金 15 亿美元
        - 已初步批准；最终听证 2026 年 5 月 14 日
        - 和解流程与符合资格作品的索赔管理
        - >-
          最终批准、上诉、付款时间、保险覆盖、会计处理，以及未来的数据许可控制。
      - - 音乐出版商 / 歌词诉讼
        - >-
          可靠报道称出版商寻求对 Anthropic 合理使用抗辩的不利裁决，而 Anthropic 主张训练具变革性
        - 待裁
        - 合理使用抗辩与输出控制
        - 案件案卷、禁令风险、损害赔偿区间、和解姿态以及训练数据/许可补救。
      - - 前沿 AI 安全监管
        - >-
          SB 53 要求公开的灾难性风险框架；Anthropic 已发布前沿合规框架并维护 RSP
        - 持续合规要求
        - RSP、FCF、系统卡片、风险报告、举报渠道
        - 董事会监督、内部审计、事件报告演练与监管沟通。
      - - 隐私与数据保护
        - >-
          隐私政策列出输入、输出、反馈、用量/日志数据、控制者/处理者角色与模型训练数据来源
        - 持续合规敞口
        - >-
          商业条款规定不在客户内容上训练模型；消费者用户可控制模型改进设置
        - DPA、子处理者、跨境传输、删除 SLA、opt-out UX 与非用户数据权利。
      - - 用量政策执行
        - >-
          用量政策禁止违法、网络、武器、隐私与高风险滥用，并允许限速/暂停/输出阻止
        - 运营持续中
        - 检测/监控、Safeguards 团队、账户执行
        - 误报/漏报率、执行审计日志、申诉路径与转售商执行。
    notes: 不包含未受支持的政府调查主张。
    claimRefs:
      - C093
      - C094
      - C095
      - C096
      - C097
      - C098
      - C099
      - C107
      - C108
      - C109
  - id: T703
    title: 合作伙伴、供应商与集中度风险
    columns:
      - 依赖
      - 证据
      - 风险传导
      - 缓解 / 抵消
      - 尽调要求
    rows:
      - - AWS
        - >-
          Amazon 称 Anthropic 承诺十年内投入 1000 亿美元以上、确保最多 5GW 容量，并将 AWS 作为主要训练
          /云提供商
        - 厂商定价、Trainium 路线图、AWS 故障、承诺支出与渠道毛对净经济
        - Project Rainier、AWS 分发与 Amazon 投资构成的主要提供商关系
        - 合同最低额、终止权、服务信用、数据驻留与关联方经济。
      - - Google / Broadcom TPU
        - Anthropic 宣布与 Google、Broadcom 自 2027 年起数千兆瓦下一代 TPU 容量
        - 硬件可获得性、TPU 路线图、Broadcom 供应与超大云厂商芯片集中度
        - 横跨 AWS Trainium、Google TPU 与 NVIDIA GPU 的多芯片组合
        - 容量交付计划、性价比、功能对等与迁移约束。
      - - Microsoft Azure
        - Anthropic 称 Claude 在 AWS Bedrock、Google Vertex AI、Microsoft Azure Foundry 上均可获得
        - 分发依赖与企业采购预期
        - 多云可获得性降低单一渠道客户锁定
        - 实际 Azure 份额、条款、支持义务与地区可获得性。
      - - 战略客户 / 平台合作伙伴
        - 客户章节显示强劲的平台证据，但无公开头部客户收入清单
        - 集中账户的流失可传导至收入、估值与算力承诺
        - 100 万美元以上客户超 1,000 家、财富 10 强中 8 家提供广度信号
        - 前 10/25 收入、续约时间与合作伙伴/客户重叠。
      - - 半导体地缘政治
        - >-
          Anthropic 指出 90% 的领先半导体在美国境外制造，并主张更强的出口管制
        - 供应中断、出口限制、非美市场准入受限
        - 美国境内基础设施承诺与出口管制倡导
        - 供应链韧性、数据中心地理与出口许可敞口。
    notes: >-
      关键风险不是单一云依赖，而是少数超大云厂商的集中度与固定算力承诺。
    claimRefs:
      - C101
      - C102
      - C103
      - C104
      - C106
      - C112
  - id: T704
    title: 运营、安全、隐私与模型风险表
    columns:
      - 风险
      - 公开证据
      - 严重度
      - 当前缓解
      - 剩余缺口
    rows:
      - - Claude Code / 智能体质量回退
        - 4 月 23 日事后分析将质量问题归因于产品层变更，并称所有问题已于 4 月 20 日解决
        - 高
        - 事后分析、回滚/修复、用量上限重置、计划中的流程变更
        - 企业流失、支持工单、事件信用与回归仪表盘。
      - - 基础设施输出退化
        - >-
          Anthropic 事后分析称 2025 年 8-9 月的 bug 因路由、TPU 输出损坏与编译器行为，在部分流量上
          降低了 Claude 响应质量
        - 高
        - 修复、测试、监控、跨平台验证
        - 纵向运行时间/质量 SLO 与按云的事件历史。
      - - Anthropic 发现的安全漏洞
        - >-
          协调漏洞披露政策目标 90 天披露、对正在被利用的关键漏洞 7 天时间表，以及人工审查的 AI 辅助
          报告
        - 中
        - 披露政策、节奏、维护者协调、漏洞处理
        - 外部研究者范围、漏洞赏金结果与渗透测试发现。
      - - AI 滥用
        - >-
          威胁情报报告记录使用 Claude Code 的大规模勒索、朝鲜雇佣欺诈与勒索软件相关滥用
        - 高
        - 封禁账户、定制分类器、新检测方法、与当局共享指标
        - 检测召回率/精确率、滥用运营积压与监管/客户通知阈值。
      - - 消费者隐私 / 留存
        - >-
          消费者用户可允许 Free/Pro/Max 与消费者 Claude Code 对话/编程会话用于改进 Claude；启用后
          数据留存五年
        - 中
        - 用户控制、删除排除在未来训练之外、敏感数据过滤、不出售用户数据
        - opt-in/opt-out UX 证据、审计日志与受监管用户教育。
      - - 商业数据保密
        - >-
          商业条款规定客户保留 Inputs、拥有 Outputs，且 Anthropic 不得在客户内容上训练模型
        - 中
        - 商业条款、DPA 嵌入、保密条款
        - 企业 DPA 审查、子处理者、审计权与违约通知条款。
    notes: 运营风险并非假设；Anthropic 的透明度有助量化控制缺口。
    claimRefs:
      - C098
      - C099
      - C100
      - C105
      - C107
      - C108
      - C109
      - C110
  - id: T705
    title: 信用、对手方与资产负债表风险框架
    columns:
      - 风险类型
      - 适用性
      - 证据
      - 承销含义
    rows:
      - - 信用/违约风险
        - 直接相关性低
        - 在公开证据中，Anthropic 不是借贷/支付资产负债表公司
        - 尽调聚焦于合同负债，而非贷款损失。
      - - 法律支付风险
        - 高度相关
        - 15 亿美元 Bartz 和解待最终批准
        - 确认现金储备、保险、费用确认与额外诉讼敞口。
      - - 算力承诺风险
        - 高度相关
        - 1000 亿美元以上 AWS 承诺加上数千兆瓦 Google/Broadcom 扩张
        - 在下行情景中视为类资本支出的固定义务。
      - - 对手方集中度
        - 高度相关
        - AWS 主要提供商；Google/Broadcom 次级扩张；云市场与战略投资人重叠
        - 分析关联方条款、渠道经济与运营依赖。
      - - 客户应收 / 收入质量
        - 中度相关
        - 公开收入规模可见，但未披露集中度或净收入
        - 索取账龄、承诺支出、退款/抵扣与毛对净调和。
    notes: >-
      Anthropic 没有明显的信用承销敞口，但大额合同义务造成资产负债表风险。
    claimRefs:
      - C093
      - C101
      - C102
      - C103
  - id: T706
    title: 缓解框架与止损标准
    columns:
      - 风险集群
      - 缓解证据
      - 剩余风险
      - 止损 / 弃投标准
    rows:
      - - 版权/数据来源
        - 和解流程；隐私/模型训练披露；商业不训练条款
        - 高
        - >-
          超出已计提负债的实质性不利版权裁决；无法证明训练数据获许可/可追溯；新禁令限制核心模型使用。
      - - 安全/监管
        - RSP v3.2、SB 53 FCF、系统卡片、风险报告、自愿承诺
        - 中-高
        - >-
          监管认定框架不合规；未披露的严重安全事件；举报人证实治理失败。
      - - 算力经济
        - AWS/Google/Broadcom 容量、多硬件策略
        - 高
        - >-
          合同义务超出下行收入承受能力；尽管路由/缓存改进，毛利率仍未改善；供应商路线图滑期。
      - - 可靠性/安全
        - 状态页、事后分析、漏洞披露、漏洞赏金/私有报告计划
        - 中-高
        - 反复的关键故障、未解决的数据暴露，或导致流失的企业 SLA 失败。
      - - AI 滥用
        - 用量政策、分类器、账户封禁、威胁情报共享
        - 中-高
        - 因可预防的滥用导致监管/客户损失；无法在规模上控制代理式网络滥用。
      - - 客户质量
        - 100 万美元以上客户超 1,000 家、财富 10 强中 8 家、具名案例
        - 因不透明而高
        - >-
          净收入留存率低于一线企业软件水平、头部客户集中度超过投资政策，或质量事件后显著流失。
    notes: 在当前估值水平做后期投资前，应测试这些标准。
    claimRefs:
      - C093
      - C096
      - C097
      - C098
      - C099
      - C100
      - C101
      - C102
      - C105
      - C107
      - C109
      - C112
