sections:
  - number: '7.1'
    title: 风险概览
    body: |
      Anthropic 的风险画像更接近前沿基础设施公司而非传统 SaaS 厂商。法律、算力、安全、隐私、
      可靠性与客户集中度风险都是实质性的，因为每一项都可传导至利润率与估值。抵消因素是
      Anthropic 异常透明：它发布事后分析、安全框架、合规材料、威胁情报示例与法律/隐私条款，
      使其风险画面比许多私营 AI 同行更可被尽调。
    claimRefs:
      - C096
      - C097
      - C098
      - C099
      - C100
      - C101
      - C105
      - C107
      - C108
  - number: '7.2'
    title: 法律与监管风险
    body: |
      版权/数据来源是最具体的法律风险。Bartz 案设有 15 亿美元和解基金，最终批准听证安排在本
      报告日期之后。该和解降低了不确定性，但未关闭音乐出版商诉讼、未来权利人主张、许可成本
      上升，或证明未来训练语料获得授权、可证、可辩护的需要。前沿 AI 监管是第二个高影响集群；
      加州 SB 53 将许多安全透明度实践转化为大型开发者的强制义务，Anthropic 的 FCF 现已成为其
      合规姿态的一部分。
    claimRefs:
      - C093
      - C094
      - C095
      - C096
      - C097
  - number: '7.3'
    title: 安全、隐私与滥用风险
    body: |
      Anthropic 的商业条款对企业信任有利，因为条款规定客户 Inputs 由客户保留、Outputs 归客户
      所有，且 Anthropic 不得在商业服务的客户内容上训练模型。消费者隐私较为微妙：Free/Pro/Max
      用户可允许对话与编程会话用于改进 Claude，启用后留存五年。滥用风险持续存在：Anthropic
      自家威胁情报记录了 Claude Code 在勒索、朝鲜雇佣欺诈与 AI 生成勒索软件中的滥用，缓解措施
      包括账户封禁、分类器、检测方法与指标共享。
    claimRefs:
      - C099
      - C100
      - C107
      - C108
      - C109
      - C110
  - number: '7.4'
    title: 运营与算力集中度风险
    body: |
      算力既是 Anthropic 的战略优势，也是资产负债表式风险。Amazon 称 Anthropic 已承诺十年内
      向 AWS 投入逾 1000 亿美元、确保最多 5GW 容量；同时 Anthropic 还宣布与 Google、Broadcom
      合作的数千兆瓦 TPU 容量。多云与多芯片部署降低单一平台失败风险，但并未消除固定承诺、
      供应商路线图、电力、数据中心、渠道与毛利率风险。
    claimRefs:
      - C101
      - C102
      - C103
      - C104
  - number: '7.5'
    title: 产品可靠性与客户信任
    body: |
      Anthropic 已承认 2025 年的基础设施 bug 与 2026 年 Claude Code/Agent SDK/Cowork 产品层回退。
      其事后分析是高质量的缓解措施，但商业后果必须在续约、支持、SLA 信用与流失数据中核查。
      对于一个收入运行率超过 25 亿美元的开发者重度产品，即便底层模型或 API 未退化，感知到的
      质量下降也可成为客户留存问题。
    claimRefs:
      - C098
      - C105
      - C106
  - number: '7.6'
    title: 风险结论
    body: |
      风险评级为高，缓解成熟度高于平均。Anthropic 拥有可信的控制与强劲的透明度姿态，但剩余
      未知项过大，不能轻易承销：最终法律敞口、算力承诺经济、正式安全/合规证据、客户集中度、
      质量事件后留存，以及 AI 安全与滥用控制的运营成本。
    claimRefs:
      - C093
      - C096
      - C097
      - C098
      - C099
      - C100
      - C101
      - C102
      - C107
