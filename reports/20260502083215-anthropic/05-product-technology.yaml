  - id: T503
    title: AI/automation capability map
    columns:
      - Capability
      - Evidence
      - Differentiation
      - Risk / limitation
    rows:
      - - Agentic coding
        - >-
          Claude Code run-rate revenue above $2.5B; engineering posts describe effort settings, thinking history, prompt
          caching, and code review context
        - Strong developer wedge and workflow data
        - Quality regression showed product-layer defaults can harm outcomes.
      - - Long-horizon agents
        - Managed Agents virtualize session, harness, sandbox, and tools
        - Architecture designed for recoverable long-running work
        - Requires robust sandbox and tool security.
      - - Workflow vs autonomous agent patterns
        - Anthropic distinguishes predefined workflows from agents that dynamically direct tool use
        - Clear developer education and design philosophy
        - Cost/latency tradeoff may limit agentic use cases.
      - - MCP integration
        - Engineering and product materials cite MCP for tool access and external services
        - Open integration strategy and connector ecosystem
        - Connector trust, token scoping, and data leakage need diligence.
      - - Agent Skills
        - Skills package procedural knowledge, scripts, and resources with progressive disclosure
        - Creates portable domain specialization
        - Skill supply chain and execution permissions need governance.
    notes: Capabilities are company-claimed unless backed by status or external evidence.
    claimRefs:
      - C064
      - C065
      - C071
