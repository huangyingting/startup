artifact: product-technology
slug: anthropic
runDate: 2026-05-02
company:
  name: Anthropic
  website: https://www.anthropic.com/
chapter:
  number: 5
  title: Product & Technology
  summary: |
    Anthropic has evolved Claude from a model/API product into a multi-surface enterprise AI platform: Claude.ai,
    Claude Code, Claude Cowork, Team/Enterprise plans, Messages API, Managed Agents, MCP integrations, Agent
    Skills, and cloud endpoints across AWS, Google Cloud, and Microsoft Azure. The technical moat is strongest
    in agentic coding, long-horizon agent infrastructure, safety/trust positioning, and enterprise controls.
    The key product diligence risks are reliability regressions, opaque certification details, compute-cost-driven
    product tradeoffs, and whether workflow integration depth creates durable switching costs.
  claimRefs:
    - C063
    - C064
    - C065
    - C066
    - C067
    - C068
    - C069
    - C075
callouts:
  - type: key-insight
    title: Anthropic is building workflow infrastructure, not just a chat model.
    body: |
      Official docs expose both direct Messages API access and Managed Agents; engineering posts describe agent
      sessions, harnesses, sandboxes, durable event logs, MCP-based tools, and secure credential separation. This
      is a credible platform architecture for enterprise agentic work, not merely a model endpoint.
    claimRefs:
      - C063
      - C064
      - C065
      - C071
  - type: risk-alert
    title: Recent Claude Code/Cowork quality regression shows product-layer risk.
    body: |
      Anthropic's April 23 postmortem traced degraded Claude Code, Agent SDK, and Cowork quality to three
      product-layer changes, while the API and inference layer were not impacted. This validates the need for
      release governance, customer-visible quality monitoring, and agent-specific regression tests.
    claimRefs:
      - C074
      - C075
      - C076
