      - - API
        - Docs show Messages API and code example with claude-opus-4-7
        - Developer-managed state and tool loops remain available
        - SLA, latency percentiles, rate limits, and data retention by plan.
      - - Managed agent control plane
        - Managed Agents decouple harness, session log, and sandbox
        - Recoverable long-horizon agent architecture
        - Isolation, observability, and enterprise deployment modes.
      - - Sandbox/tools
        - Managed Agents keep credentials outside generated-code sandboxes and use MCP proxy/vault patterns
        - Security-conscious tool execution model
        - Formal security review, penetration testing, and audit evidence.
      - - Cloud distribution
        - Claude available on AWS Bedrock, Google Vertex AI, and Microsoft Azure Foundry
        - Multi-cloud resilience and buyer procurement flexibility
        - Channel-specific feature parity and cloud-residency limits.
    notes: Public architecture is high-level; detailed system design is not public.
