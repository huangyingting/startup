  - id: F502
    title: Product reliability risk flow
    type: risk-transmission-map
    layout: standard
    summary: >-
      Recent Claude quality issues demonstrate how product-layer changes can affect enterprise trust even when model
      weights and API are stable.
    data:
      nodes:
        - id: p1
          label: Product-layer change
          detail: Default reasoning effort, session thinking-cache behavior, and verbosity prompts changed in March-April.
          tone: high
        - id: p2
          label: Agent workflow degradation
          detail: Users experienced lower perceived intelligence, forgetfulness, repetition, and coding-quality issues.
          tone: risk
        - id: p3
          label: Usage and trust impact
          detail: Usage limits drained faster and Anthropic reset usage limits for subscribers after fixes.
          tone: risk
        - id: p4
          label: Governance response
          detail: Anthropic published a postmortem and said it would change practices to reduce recurrence.
          tone: neutral
        - id: p5
          label: Diligence implication
          detail: >-
            Investors need evidence of agent-specific evals, staged rollouts, status signaling, and enterprise incident
            communications.
          tone: high
      edges:
        - from: p1
          to: p2
          label: configuration / bug
        - from: p2
          to: p3
          label: customer impact
        - from: p3
          to: p4
          label: remediation
        - from: p4
          to: p5
          label: verify controls
    approximationNotes: Based on Anthropic's April 23 postmortem; no independent customer churn quantified.
    claimRefs:
      - C074
      - C075
      - C076
sections:
  - number: '5.1'
    title: Product platform overview
    body: |
      Anthropic's product portfolio now spans end-user applications, developer APIs, agent infrastructure, and
      enterprise governance. The official docs present two main developer surfaces: Messages for direct model
      access where the customer controls state and tool loops, and Managed Agents for hosted long-horizon agents.
      Pricing and product pages add Claude Code, Claude Cowork, Team, Enterprise, managed agents, web search,
      code execution, prompt caching, and model families.
    claimRefs:
      - C063
      - C066
      - C067
      - C068
      - C069
  - number: '5.2'
    title: Technical differentiation
    body: |
      The strongest technical differentiation is the shift from model endpoint to agent operating layer. Managed
      Agents decouple sessions, harnesses, and sandboxes, and Anthropic describes vaulting OAuth credentials
      outside generated-code sandboxes while Claude calls MCP tools through a proxy. Agent Skills add a portable
      way to package procedural knowledge, scripts, and resources for dynamic loading. These are credible pieces
      of a durable workflow moat if they are adopted broadly and governed safely.
    claimRefs:
      - C064
      - C065
      - C071
      - C072
  - number: '5.3'
    title: Enterprise readiness
    body: |
      Enterprise readiness is supported by visible controls such as SSO, SCIM, audit logs, Compliance API,
      custom data retention, network-level access control, IP allowlisting, HIPAA-ready availability, a trust
      center, a public status page, privacy policies, and a coordinated vulnerability disclosure framework.
      However, detailed certifications, SOC reports, BAAs, uptime SLAs, penetration tests, and incident-credit
      terms must be reviewed directly rather than inferred from marketing pages.
    claimRefs:
      - C067
      - C073
      - C077
      - C078
  - number: '5.4'
    title: Reliability and product risk
    body: |
      Anthropic's public status page showed all major surfaces operational on May 2, 2026, but it also recorded
      multiple resolved late-April incidents across Claude.ai, API, Claude Code, and model requests. More
      importantly, Anthropic's April 23 postmortem attributed perceived Claude Code/Cowork/Agent SDK quality
      degradation to three product-layer changes. The company deserves credit for transparency, but the incident
      shows that agent workflows require specialized regression testing and customer communication thresholds.
    claimRefs:
      - C074
      - C075
      - C076
  - number: '5.5'
    title: Product verdict
    body: |
      Product depth is a strength: Anthropic has credible models, developer surfaces, agent infrastructure,
      workflow extensions, and enterprise controls. The moat is not just safety branding; it is the ability to
      turn frontier models into governed, integrated workflows. The diligence burden is to prove that reliability,
      compliance, integration depth, and unit economics can keep pace with the scale implied by Anthropic's
      valuation.
    claimRefs:
      - C063
      - C064
      - C065
      - C066
      - C067
      - C074
      - C075
      - C076
