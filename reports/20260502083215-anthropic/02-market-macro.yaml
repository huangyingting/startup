company:
  name: Anthropic
  website: https://www.anthropic.com/
chapter:
  number: 2
  title: Market Sizing & Macro Analysis
  summary: |
    Anthropic competes across overlapping markets: enterprise AI platforms, generative AI software, AI agents,
    AI coding assistants, and cloud-distributed foundation-model APIs. The market is attractive because multiple
    independent lenses already show nine- to twelve-figure 2026 spend pools, but addressability is constrained by
    adoption maturity, enterprise governance, compute economics, and the fact that much reported generative AI
    market size includes services, hardware, consumer usage, or application categories that Claude cannot capture.
  claimRefs:
    - C020
    - C021
    - C022
    - C023
    - C025
    - C029
    - C030
callouts:
  - type: key-insight
    title: The served market is large, but the clean SAM is enterprise workflow AI rather than all generative AI.
    body: |
      Coherent Market Insights estimates the global generative AI market at $121.1B in 2026, while Mordor
      estimates enterprise AI at $114.87B in 2026. Anthropic's near-term SAM is the subset where enterprises
      buy frontier model access, agentic workflow tools, coding assistants, and secure enterprise AI deployments.
    claimRefs:
      - C020
      - C021
      - C022
      - C023
  - type: risk-alert
    title: Adoption breadth does not equal scaled ROI.
    body: |
      Deloitte reports worker access to AI rose 50% in 2025 and expects more companies to move projects to
      production, but IBM cites MIT research that 95% of generative AI pilots fail and says only about 25% of AI
      initiatives deliver expected ROI.
    claimRefs:
      - C030
      - C031
      - C032
