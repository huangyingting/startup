sections:
  - number: '2.1'
    title: Category boundaries
    body: |
      Anthropic should not be underwritten against a single generic "AI market" number. Claude monetizes across
      model APIs, enterprise AI subscriptions, coding assistants, agentic workflow automation, and cloud
      marketplaces. Broad generative AI market estimates are useful for top-down context, but the tighter
      underwriting lens is enterprise workflow AI where buyers can tie spending to developer productivity,
      customer support, analytics, regulated-document work, and knowledge automation.
    claimRefs:
      - C020
      - C021
      - C022
      - C023
      - C026
      - C027
  - number: '2.2'
    title: Market size and growth
    body: |
      The market is large enough to support a public-company-scale outcome if Anthropic sustains share. Coherent
      Market Insights estimates generative AI at $121.1B in 2026 with a 33.2% CAGR to 2033. Mordor estimates
      enterprise AI at $114.87B in 2026, growing to $273.08B by 2031. More directly relevant submarkets are
      earlier: AI agents at roughly $10.9B-$12.1B in 2026 and AI coding assistants at $12.8B. Anthropic's $14B
      run-rate revenue is therefore already large relative to tight submarket proxies, implying that Claude's
      monetization crosses several market definitions.
    claimRefs:
      - C020
      - C021
      - C022
      - C023
      - C027
  - number: '2.3'
    title: Adoption and timing
    body: |
      Adoption evidence is favorable but uneven. Deloitte says worker access to AI rose 50% in 2025 and expects
      the number of companies with at least 40% of projects in production to double in six months. Anthropic's
      own Economic Index shows rapid US workplace adoption, with 40% of employees reporting AI use at work, but
      also shows geographic concentration: richer countries and regions are overrepresented in Claude usage.
      This supports a North America- and high-income-market-first revenue model.
    claimRefs:
      - C024
      - C025
      - C030
  - number: '2.4'
    title: Buyer budgets and segment logic
    body: |
      Claude sells into CIO/CTO, engineering, compliance, and function-owner budgets. Budget substitution can
      come from legacy automation, developer tools, business intelligence, contact center, content production,
      and professional-services workflows, while expansion budgets come from AI infrastructure, cloud AI
      services, copilots, and digital-transformation programs. The most attractive segments are high-value
      workflows where long context, safety controls, tool use, and agentic execution matter.
    claimRefs:
      - C026
      - C027
      - C028
      - C029
  - number: '2.5'
    title: Disconfirming market evidence
    body: |
      The strongest counter-signal is not lack of interest; it is failure to scale. IBM cites a 2025 MIT report
      that 95% of generative AI pilots are failing and says only around 25% of AI initiatives deliver expected
      ROI and just 16% have scaled enterprise-wide. Deloitte similarly emphasizes that governance and operational
      readiness lag agentic AI enthusiasm. For Anthropic, this means the market will reward vendors that solve
      integration, control, and measurable workflow value, not merely model quality.
    claimRefs:
      - C030
      - C031
      - C032
