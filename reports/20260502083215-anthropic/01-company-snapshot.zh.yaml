callouts:
  - type: key-insight
    title: 超大规模的企业级增长牵引已足够公开，可纳入承销，但利润率质量仍不透明。
    body: >
      Anthropic 在 2026 年 2 月披露收入运行率 140 亿美元、年化付费超 100 万美元的客户 500 余家；

      到 2026 年 4 月再次披露收入运行率突破 300 亿美元、上述客户数超过 1,000 家、财富 10 强

      客户 8 家、Claude Code 收入运行率超过 25 亿美元。但同一份官方披露并未提供净收入、毛利率、

      获客成本、留存率或算力成本强度。
