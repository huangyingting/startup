  - id: F102
    title: 融资与规模里程碑
    type: timeline
    layout: standard
    summary: 展示 Anthropic 从成立到后期超大规模历程的公开里程碑。
    data:
      items:
        - date: '2021'
          label: Anthropic 成立
          detail: 在旧金山成立的公益公司，由 Dario Amodei、Daniela Amodei、Jared Kaplan、Jack Clark、Chris Olah 等前 OpenAI 人员创办；围绕 AI 安全与研究组建。
          tone: neutral
        - date: '2023-03'
          label: Claude 正式可用
          detail: Claude 助手首次公开发布；该产品成为公司主要的商业化触面。
          tone: positive
        - date: '2023-09'
          label: 宣布与 Amazon 战略投资
          detail: Amazon 承诺投资最多 40 亿美元，Anthropic 指定 AWS 为其主要云提供商，奠定了多年算力关系。
          tone: opportunity
        - date: '2023-10'
          label: 宣布与 Google Cloud 战略投资
          detail: 据报道 Google 在已有云合作之外追加投资最多 20 亿美元，强化了多云分发态势。
          tone: opportunity
        - date: '2024-03'
          label: Claude 3 模型家族发布
          detail: Opus / Sonnet / Haiku 分级确立了今天 API 定价所依托的性价比路由模型。
          tone: positive
        - date: '2024-11'
          label: 发布模型上下文协议（MCP）
          detail: 连接 Claude 与外部工具/数据的开放标准；之后成为企业代理式工作流的集成底座。
          tone: positive
        - date: '2025-02'
          label: Claude 3.7 / 扩展思考代际
          detail: 注重推理的模型发布，强化了 Claude 在编程与长周期智能体基准上的位置。
          tone: positive
        - date: '2025-05'
          label: Claude Code 正式可用
          detail: 代理式编程产品后续披露收入运行率超过 25 亿美元，企业使用占收入一半以上。
          tone: positive
        - date: '2025-09'
          label: F 轮投后估值 1830 亿美元
          detail: F 轮融资 130 亿美元，是 2026 年 2 月 G 轮之前的估值锚点；当前融资报道引用。
          tone: neutral
        - date: '2025-09'
          label: Bartz 作者版权和解达成
          detail: 15 亿美元和解基金获初步批准，最终批准定于 2026 年 5 月 14 日；量化了一项主要训练数据法律敞口。
          tone: risk
        - date: '2026-02'
          label: 300 亿美元 G 轮，投后 3800 亿美元
          detail: 由 GIC 与 Coatue 领投，后期财团广泛；包含此前宣布的 Microsoft 与 NVIDIA 投资的一部分。同时披露收入运行率 140 亿美元、年化付费超 100 万美元客户 500 余家。
          tone: positive
        - date: '2026-04'
          label: Google / Broadcom TPU 扩张 + 披露收入运行率超 300 亿美元
          detail: 宣布 2027 年起的多吉瓦下一代 TPU 容量；同次披露称收入运行率突破 300 亿美元、年化付费超 100 万美元客户超过 1,000 家。
          tone: positive
    approximationNotes: 公开来源未提供精确交割机制时使用月份级时间；已知里程碑之间可能发生其他事件，但在不可独立引用时予以排除。
    claimRefs:
      - C002
      - C003
      - C005
      - C006
      - C007
      - C009
      - C010
sections:
  - number: '1.1'
    title: 身份与定位
    body: |
      Anthropic 自我定位为 AI 安全与研究公司，致力于打造可靠、可解释、可控的 AI 系统。它是一家
      公益公司，其公司页面将使命与"负责任地开发与维护先进 AI、服务全人类长期利益"联系起来。
      这一治理姿态对尽调而言并非表面文章：它影响采购选择、投资人控制权、安全红线，以及公司
      相对更商业化 AI 实验室的公开定位。
    claimRefs:
      - C001
      - C004
  - number: '1.2'
    title: 产品与收入触面
    body: |
      Claude 已发展为多触面平台：消费者与团队订阅、Claude Code、Claude Cowork、API 使用、企业部署，
      以及第三方云端分发。Anthropic 定价页展示 Free、Pro、Max、Team 与 Enterprise 层级；G 轮公告
      则强调 Claude Code、财务/数据分析、销售、网络安全、科学发现，以及面向 HIPAA 合规医疗与
      生命科学的扩张类别。
    claimRefs:
      - C011
      - C012
      - C019
  - number: '1.3'
    title: 融资与投资人结构
    body: |
      2026 年 2 月的 G 轮是当前估值锚点：融资 300 亿美元，投后估值 3800 亿美元。GIC 与 Coatue 领投，
      搭配由资产管理公司、风投机构、主权财富基金、银行与战略科技公司组成的广泛财团。Anthropic 表示
      本轮包含此前宣布的 Microsoft 与 NVIDIA 投资的一部分，独立报道则继续将 Amazon 与 Google 列为
      主要战略投资人与云合作伙伴。
    claimRefs:
      - C005
      - C018
  - number: '1.4'
    title: 运营规模信号
    body: >
      Anthropic 当前的规模披露对一家私营 AI 公司而言异常丰富。管理层报告：收入运行率超过 300 亿美元，

      较 2025 年底约 90 亿美元快速增长；年化付费超过 100 万美元的客户超过 1,000 家；8 家财富 10 强

      客户；Claude Code 收入运行率超过 25 亿美元。这些指标支持产品-市场匹配的强劲结论，但并未披露

      毛利率、云渠道分成、用量集中度或留存。
    claimRefs:
      - C006
      - C007
      - C008
      - C009
  - number: '1.5'
    title: 管理层与治理
    body: |
      Anthropic 董事会列有 Dario Amodei、Daniela Amodei，以及 Yasmin Razavi、Jay Kreps、
      Reed Hastings、Chris Liddell、Vas Narasimhan。其长期利益信托受托人为 Neil Buddy Shah、
      Richard Fontaine、Mariano-Florentino Cuéllar。尽调含义是：常规的后期投资人控制权可能受
      使命与信托治理约束，同时公司仍需大规模资本以在前沿模型层面竞争。
    claimRefs:
      - C004
  - number: '1.6'
    title: 主要风险摘要
    body: |
      公司层级主要风险包括估值压缩、未披露的净收入与模型服务利润率、算力依赖、企业客户集中度、
      版权与数据来源争议，以及与安全限制相关的潜在采购冲突。这些不否定 Anthropic 的规模，但
      实质性影响下一轮融资或 IPO 能否消化 3800 亿美元的私募市场估值。
    claimRefs:
      - C005
      - C014
      - C016
      - C017
