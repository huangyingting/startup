  title: 公司简介与快照
  summary: >
    Anthropic 是一家位于旧金山的公益公司（PBC），打造 Claude 这一前沿 AI 助手、开发者、API 与企业级平台。

    公开证据显示公司已进入超大规模阶段：2026 年 2 月完成 G 轮融资，金额 300 亿美元，投后估值

    3800 亿美元；此后披露收入运行率突破 300 亿美元，年化付费超 100 万美元的客户超过 1,000 家，

    财富 10 强中已有 8 家成为 Claude 客户。当前的承销问题不再是产品-市场匹配，而是企业 AI 增长、

    算力可获得性、法律与安全治理能否支撑历史上最高的几个私人公司估值之一。
