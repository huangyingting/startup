sections:
  - number: '3.1'
    title: 竞争格局
    body: |
      Anthropic 的竞争集比 OpenAI 更广。直接的前沿模型同行包括 OpenAI、Google DeepMind/Gemini、
      xAI、Meta/Llama、Mistral。分发渠道老牌玩家包括 Microsoft、GitHub、Google Workspace/Cloud、
      AWS 市场，以及在工作流产品背后嵌入模型的企业软件厂商。聚焦开发者的对手包括 GitHub Copilot、
      Cursor、Codex 风格的智能体与开源编程智能体。结果是一个客户可多供应商并存、按模型质量、价格、
      数据策略、上下文窗口、工作流触面或云合约路由任务的市场。
    claimRefs:
      - C033
      - C034
      - C036
      - C037
      - C038
      - C039
  - number: '3.2'
    title: 能力与基准位置
    body: |
      Artificial Analysis 将 GPT-5.5 变体置于其智能榜首，随后是 Claude Opus 4.7 与 Gemini 3.1 Pro
      Preview。这有利之处在于 Claude 仍位列领先模型之中，但也是一个警示：前沿能力是移动靶，
      顶级厂商之间的差距不足以仅凭智能性承销持久定价权。
    claimRefs:
      - C033
  - number: '3.3'
    title: 产品与打包差异化
    body: |
      Anthropic 最强的打包优势是 Claude Code、Claude Cowork、企业控制与多云可获得性的组合。
      官方定价页展示消费者、团队与企业计划，企业计划在此基础上增加支出控制、SCIM、审计日志、
      Compliance API、自定义留存、网络访问控制、IP 白名单与 HIPAA 就绪。这使 Anthropic 在受监管
      与高信任买方面前定位良好，尽管 Microsoft 与 Google 可在更广泛的生产力与云合约中捆绑类似的
      买方信任。
    claimRefs:
      - C034
      - C035
      - C041
  - number: '3.4'
    title: 开发者工作流竞争
    body: |
      Claude Code 是一项主要战略资产，因为 Anthropic 报告其收入运行率超过 25 亿美元并增长迅速。
      但开发者工作流的所有权仍存争夺。GitHub Copilot 拥有官方 Free、Pro 与 Pro+ 计划，配备智能体
      模式、代码评审、云端智能体、CLI、MCP 集成与企业管理功能。Cursor 通过 Pro+、Ultra、Teams 与
      Enterprise 打包瞄准 AI IDE 与团队工作流，提供管理面板、隐私模式、汇集用量与高级安全。
      这些对手即便 Claude 模型仍在后端，也可掌控开发者日常触面。
    claimRefs:
      - C036
      - C037
      - C040
      - C042
      - C043
      - C044
  - number: '3.5'
    title: 竞争风险与护城河结论
    body: |
      Anthropic 的护城河真实但并非绝对。其防御在客户重视安全行为、长上下文推理、代理式编程、
      企业管理与跨云平台模型可获得性的场景中最强；在价格敏感、易于跨供应商路由或适合开源权重/
      自托管模型的工作负载中最弱。因此投资判断应要求证据证明持久的净留存、产品级毛利率与工作流
      特定锁定，而不应仅依赖品牌或模型基准领先。
    claimRefs:
      - C033
      - C034
      - C035
      - C037
      - C038
      - C039
      - C045
      - C046
