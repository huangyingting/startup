slug: anthropic
runDate: 2026-05-02
company:
  name: Anthropic
  website: https://www.anthropic.com/
chapter:
  number: 7
  title: Risk & Regulatory
  summary: |
    Anthropic's risk profile is high but unusually visible. The biggest underwriting risks are copyright/data
    provenance litigation, compute and hyperscaler concentration, product reliability regressions, AI misuse,
    privacy/data-retention exposure, and frontier-AI safety regulation. Mitigants include a public Responsible
    Scaling Policy, SB 53 compliance framework, commercial no-training terms, trust/security programs, usage
    policy enforcement, multi-cloud deployment, and unusually detailed postmortems. Residual risk remains high
    because legal outcomes, gross-to-net cloud economics, critical-incident history, customer concentration, and
    formal certification details are not fully public.
  claimRefs:
    - C093
    - C094
    - C095
    - C096
    - C097
    - C098
    - C099
    - C100
    - C101
    - C102
    - C103
    - C104
callouts:
  - type: risk-alert
    title: Copyright litigation is a quantified, still-pending legal overhang.
    body: |
      The Bartz settlement is preliminarily approved at $1.5B, with final approval scheduled for May 14, 2026.
      It narrows one major class-action path but does not eliminate broader data-provenance, licensing, music
      publisher, or future rightsholder claims.
    claimRefs:
      - C093
      - C094
      - C095
  - type: key-insight
    title: Safety governance is a real mitigation, not just marketing.
    body: |
      Anthropic publicly maintains an RSP, a Frontier Compliance Framework for California SB 53, system cards,
      voluntary-commitments reporting, threat-intelligence reports, policy enforcement, and vulnerability
      disclosure processes. Investors should still verify operating evidence and compliance artifacts directly.
    claimRefs:
      - C096
      - C097
      - C098
      - C099
      - C100
      - C107
