        - Enterprise churn, support tickets, incident credits, and regression dashboard.
      - - Infrastructure output degradation
        - >-
          Anthropic postmortem says August-September 2025 bugs degraded Claude responses on subsets of traffic across
          routing, TPU output corruption, and compiler behavior
        - High
        - Fixes, tests, monitoring, cross-platform validation
        - Longitudinal uptime/quality SLOs and cloud-specific incident history.
      - - Security vulnerabilities discovered by Anthropic
        - >-
          Coordinated Vulnerability Disclosure policy targets 90-day disclosure, 7-day timelines for actively exploited
