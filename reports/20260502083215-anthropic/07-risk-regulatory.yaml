sections:
  - number: '7.1'
    title: Risk overview
    body: |
      Anthropic has the risk profile of a frontier infrastructure company rather than a conventional SaaS vendor.
      Legal, compute, safety, privacy, reliability, and customer-concentration risks are all material because each
      can propagate into margins and valuation. The offset is that Anthropic is unusually transparent: it publishes
      postmortems, safety frameworks, compliance materials, threat-intelligence examples, and legal/privacy terms
      that make the risk picture more diligenceable than many private AI peers.
    claimRefs:
      - C096
      - C097
      - C098
      - C099
      - C100
      - C101
      - C105
      - C107
      - C108
  - number: '7.2'
    title: Legal and regulatory risk
    body: |
      Copyright/data provenance is the most concrete legal risk. Bartz has a $1.5B settlement fund and a final
      approval hearing scheduled after the report date. The settlement reduces uncertainty but does not close
      music-publisher litigation, future rightsholder claims, licensing cost escalation, or the need to prove
      that future training corpora are licensed, permissioned, or otherwise defensible. Frontier AI regulation is
      a second high-impact cluster; California SB 53 turns many safety transparency practices into mandatory
      obligations for large developers, and Anthropic's FCF is now part of its compliance posture.
    claimRefs:
      - C093
      - C094
      - C095
      - C096
      - C097
  - number: '7.3'
    title: Security, privacy, and misuse risk
    body: |
      Anthropic's commercial terms are favorable for enterprise trust because they state that customer Inputs are
      retained by the customer, Outputs are owned by the customer, and Anthropic may not train models on Customer
      Content from commercial services. Consumer privacy is more nuanced: Free/Pro/Max users may allow chats and
      coding sessions to improve Claude, with five-year retention if enabled. Misuse risk is active: Anthropic's
      own threat-intelligence reporting documents Claude Code abuse in extortion, North Korean employment fraud,
      and AI-generated ransomware, with mitigations including account bans, classifiers, detection methods, and
      indicator sharing.
    claimRefs:
      - C099
      - C100
      - C107
      - C108
      - C109
      - C110
  - number: '7.4'
    title: Operational and compute concentration risk
    body: |
      Compute is both Anthropic's strategic advantage and a balance-sheet-style risk. Amazon says Anthropic has
      committed more than $100B over ten years to AWS and will secure up to 5GW of capacity, while Anthropic has
      also announced multiple-gigawatt TPU capacity with Google and Broadcom. Multi-cloud and multi-chip deployment
      reduce single-platform failure risk, but they do not eliminate fixed-commitment, supplier-roadmap, power,
      data-center, channel, and gross-margin risk.
    claimRefs:
      - C101
      - C102
      - C103
      - C104
  - number: '7.5'
    title: Product reliability and customer trust
    body: |
      Anthropic has acknowledged both 2025 infrastructure bugs and 2026 Claude Code/Agent SDK/Cowork product-layer
      regressions. Its postmortems are high-quality mitigants, but the commercial consequence must be checked in
      renewal, support, SLA credit, and churn data. For a developer-heavy product with $2.5B+ Claude Code run-rate
      revenue, perceived quality degradation can become a customer-retention issue even when the underlying model
      or API is not degraded.
    claimRefs:
      - C098
      - C105
      - C106
  - number: '7.6'
    title: Risk verdict
    body: |
      The risk rating is high with above-average mitigation maturity. Anthropic has credible controls and a strong
      transparency posture, but the remaining unknowns are too large to underwrite lightly: final legal exposure,
      compute-commitment economics, formal security/compliance evidence, customer concentration, retention after
      quality incidents, and the operating cost of AI safety and misuse controls.
    claimRefs:
      - C093
      - C096
      - C097
      - C098
      - C099
      - C100
      - C101
      - C102
      - C107
