    title: Regulatory and legal risk table
    columns:
      - Risk area
      - Current evidence
      - Status
      - Mitigation
      - Open diligence
    rows:
      - - Bartz book-copyright settlement
        - >-
          Authors Guild says summary judgment found legal-book training fair use for named plaintiffs but piracy claims
          were not fair use; settlement fund is $1.5B
        - Preliminarily approved; final hearing scheduled May 14, 2026
        - Settlement process and eligible-work claims administration
        - >-
          Final approval, appeals, payment timing, insurance coverage, accounting treatment, and future data-licensing
          controls.
      - - Music publishers / lyrics litigation
        - >-
          Reliable reporting says publishers seek rulings against Anthropic's fair-use defenses while Anthropic argues
          training is transformative
        - Pending
        - Fair-use defense and output controls
        - Case docket, injunction risk, damages range, settlement posture, and training-data/license remediation.
      - - Frontier AI safety regulation
        - >-
          SB 53 requires public catastrophic-risk framework; Anthropic published a Frontier Compliance Framework and
          maintains RSP
        - Active compliance requirement
        - RSP, FCF, system cards, risk reports, whistleblower channels
        - Board oversight, internal audit, incident-reporting drills, and regulator correspondence.
      - - Privacy and data protection
        - >-
          Privacy policy identifies inputs, outputs, feedback, usage/log data, controller/processor roles, and
          model-training data sources
        - Ongoing compliance exposure
        - >-
          Commercial terms state no model training on Customer Content; consumer users can control model-improvement
          setting
        - DPA, subprocessors, cross-border transfers, deletion SLAs, opt-out UX, and non-user data rights.
      - - Usage-policy enforcement
        - >-
          Usage Policy prohibits illegal, cyber, weapons, privacy, and high-risk abuse and allows
          throttling/suspension/output blocking
        - Operationally active
        - Detection/monitoring, safeguards team, account enforcement
        - False positive/negative rates, enforcement audit logs, appeal path, and reseller enforcement.
    notes: No unsupported government-investigation claims are included.
