sections:
  - number: '1.1'
    title: Identity and purpose
    body: |
      Anthropic describes itself as an AI safety and research company building reliable, interpretable, and
      steerable AI systems. It is a public benefit corporation, and its company page links its purpose to the
      responsible development and maintenance of advanced AI for the long-term benefit of humanity. This
      governance posture is not cosmetic for diligence: it affects procurement choices, investor control,
      safety red lines, and the company's public positioning against more commercialization-first AI labs.
    claimRefs:
      - C001
      - C004
  - number: '1.2'
    title: Product and revenue surface
    body: |
      Claude now operates as a multi-surface platform: consumer and team subscriptions, Claude Code,
      Claude Cowork, API usage, enterprise deployments, and third-party cloud distribution. Anthropic's
      pricing page shows Free, Pro, Max, Team, and Enterprise tiers, while the Series G announcement
      emphasizes Claude Code, financial/data analysis, sales, cybersecurity, scientific discovery, and
      HIPAA-enabled healthcare and life sciences as expansion categories.
    claimRefs:
      - C011
      - C012
      - C019
  - number: '1.3'
    title: Funding and investor base
    body: |
      The February 2026 Series G is the current valuation anchor: $30 billion raised at a $380 billion
      post-money valuation. GIC and Coatue led the round, with a broad syndicate of asset managers,
      venture firms, sovereign wealth investors, banks, and strategic technology companies. Anthropic also
      says the round includes part of previously announced Microsoft and NVIDIA investments, while external
      reporting continues to identify Amazon and Google as major strategic investors and cloud partners.
    claimRefs:
      - C005
      - C018
  - number: '1.4'
    title: Operating scale signals
    body: >
      Anthropic's current scale disclosures are unusually rich for a private AI company. Management reports

      more than $30 billion in run-rate revenue, rapid growth from approximately $9 billion at the end of 2025,

      more than 1,000 customers spending above $1 million annually, eight Fortune 10 customers, and Claude Code run-rate
      revenue above

      $2.5 billion. These metrics support a strong product-market-fit conclusion but do not reveal gross

      margin, cloud-channel take rates, usage concentration, or retention.
    claimRefs:
      - C006
      - C007
      - C008
      - C009
  - number: '1.5'
    title: Management and governance
    body: |
      Anthropic lists Dario Amodei and Daniela Amodei on its board alongside Yasmin Razavi, Jay Kreps,
      Reed Hastings, Chris Liddell, and Vas Narasimhan. Its Long-Term Benefit Trust trustees are Neil
      Buddy Shah, Richard Fontaine, and Mariano-Florentino Cuéllar. The diligence implication is that
      ordinary late-stage investor controls may be constrained by mission and trust governance, while the
      company still needs massive capital access to compete at the frontier.
    claimRefs:
      - C004
  - number: '1.6'
    title: Key risks summary
    body: |
      The primary company-level risks are valuation compression, undisclosed net revenue and model-serving
      margins, compute dependency, enterprise concentration, copyright and data provenance disputes, and
      potential procurement conflicts tied to safety limits. None of these negates Anthropic's scale, but they
      materially affect whether the next financing or IPO can clear a $380 billion private-market mark.
    claimRefs:
      - C005
      - C014
      - C016
      - C017
