callouts:
  - type: key-insight
    title: Hyper-scale enterprise traction is now public enough to underwrite, but margin quality remains opaque.
    body: >
      Anthropic disclosed $14 billion run-rate revenue and 500+ $1 million annualized customers in February 2026,

      then disclosed run-rate revenue above $30 billion and over 1,000 $1 million annualized customers in April 2026;
      eight Fortune 10

      customers, and Claude Code at more than $2.5 billion run-rate revenue. The same official disclosure does

      not provide net revenue, gross margin, CAC, retention, or compute-cost intensity.
    claimRefs:
      - C006
      - C007
      - C008
      - C009
  - type: risk-alert
    title: Legal, compute, and valuation risks are inseparable from the growth story.
    body: |
      The company has reached an exceptional scale but is exposed to copyright litigation precedent,
      frontier-model compute dependency, large strategic investors, and a $380 billion post-money valuation
      that leaves little tolerance for growth deceleration.
    claimRefs:
      - C005
      - C016
      - C017
      - C018
