    - C001
    - C005
    - C006
    - C007
    - C008
    - C010
startupIntroduction:
  summary: |
    Anthropic is an AI safety and research company founded in 2021 by former OpenAI researchers and
    executives including Dario Amodei and Daniela Amodei. Its Claude platform spans consumer chat,
    developer tooling, enterprise subscriptions, API access, and cloud distribution through AWS Bedrock,
    Google Cloud Vertex AI, and Microsoft Azure Foundry.
