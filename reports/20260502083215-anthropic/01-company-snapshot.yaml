chapter:
  number: 1
  title: Startup Introduction & Company Snapshot
  summary: >
    Anthropic is a San Francisco-based public benefit corporation building Claude, a frontier AI assistant,

    developer, API, and enterprise platform. Public evidence supports a company at hyper-scale: a February

    2026 Series G raised $30 billion at a $380 billion post-money valuation; Anthropic later reported run-rate

    revenue surpassed $30 billion and customers spending more than $1 million annually exceeded 1,000. Eight of the
    Fortune 10

    as Claude customers. The underwriting question is no longer product-market fit; it is whether enterprise

    AI growth, compute access, and legal/safety governance can justify one of the highest private-company

    valuations in history.
