      本表不构造自下而上的 SOM；Anthropic 官方收入运行率仅作为当前规模指标使用。
    claimRefs:
      - C020
      - C021
      - C022
      - C023
      - C027
  - id: T203
    title: 买方细分与预算池
    columns:
      - 买方
      - 预算来源
      - Claude 切入点
      - 采用驱动
      - 约束
    rows:
