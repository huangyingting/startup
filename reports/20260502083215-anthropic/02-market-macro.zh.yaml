        - 云、数据平台、AI 平台、开发者生产力
        - API、Claude Code、云市场访问
        - 现代化软件交付与自动化知识工作的压力
        - 安全审查、数据集成与云成本控制
      - - CISO / 合规
        - 安全、治理、审计、受监管工作流软件
        - 企业控制、SSO、SCIM、审计日志、数据留存、HIPAA 就绪
        - 受监管工作流对可治理 AI 的需求
        - 监管敞口与模型风险管理
      - - 工程负责人
        - 开发工具、QA、生产力、平台工程
        - Claude Code 与代码库级上下文
        - 开发者生产力与代理式编程工作流
        - 代码质量、IP 泄露与工具碎片化
      - - 业务职能负责人
        - 自动化、联络中心、分析、内容、财务/法务运营
        - Claude Enterprise、Cowork、连接器、长上下文分析
        - AI 从生产力工具走向流程再造
        - 投资回报衡量与变革管理
    notes: 买方映射基于 Anthropic 定价/产品页面与市场采用证据。
    claimRefs:
      - C026
      - C027
      - C028
      - C029
      - C030
  - id: T204
    title: 市场增长驱动与约束
    columns:
      - 主题
      - 证据
      - 对 Anthropic 的影响
      - 方向
    rows:
      - - 云端 AI-as-a-service
        - Mordor 称云端方案占 2025 年企业 AI 收入 67.33%
        - 支持 Claude 在 AWS、Google Cloud 与 Azure 上的分发
        - 正面
      - - 大型企业集中度
        - Mordor 称大型企业占 2025 年企业 AI 市场份额 71.43%
        - 与 Anthropic 的财富 10 强及百万美元客户聚焦相符
        - 正面
      - - 代理式采用
        - >-
          Deloitte 称代理式 AI 用量将快速上升，但只有五分之一的公司对自主智能体拥有成熟治理
        - 若买方信任安全控制，Claude 受益；治理不成熟之处采用可能放慢
        - 中性
      - - 投资回报不确定
        - IBM 引用 95% 的生成式 AI 试点失败、仅约 25% 的 AI 项目交付预期投资回报
        - 提高扩张与续约的举证门槛
        - 负面
      - - 地理不均衡
        - Anthropic 经济指数发现 Claude 用量集中在高收入国家与地区
        - 近期收入很可能集中于北美及其他高采用市场
        - 中性
    notes: 方向是基于引用证据的承销判断。
    claimRefs:
      - C021
      - C024
      - C025
      - C030
      - C031
      - C032
  - id: T205
    title: 市场证据缺口
    columns:
      - 缺口
      - 重要性
      - 后续尽调路径
    rows:
      - - 没有干净的、独立的 Claude 可服务 TAM
        - >-
          已报告的市场互相重叠，且包含不可获取的硬件、服务、消费者或横向软件支出
        - >-
          基于企业席位、API token、编程用户、云市场提取与受监管垂直工作流自下而上建模。
      - - 细分份额数据不成熟
        - 智能体、编程与企业 AI 估算差异巨大
        - 用厂商收入、客户调查、云市场数据与采购小组进行三角验证。
      - - 地理收入构成未披露
        - AI 采用因国家与监管制度而异
        - 索取按地区的收入、数据驻留产品可获得性，以及 EU AI Act 就绪度。
      - - 投资回报跨队列的可持续性未经证实
        - 试点失败数据与公开热情相冲突
        - 按用例与客户成熟度审查扩张/续约队列。
    notes: 这些缺口应输入到财务与客户留存尽调中。
    claimRefs:
      - C024
      - C030
      - C031
      - C032
