schemaVersion: startup-diligence-report-v2
artifact: market-macro
slug: anthropic
runDate: 2026-05-02
company:
  name: Anthropic
  website: https://www.anthropic.com/
chapter:
  number: 2
  title: 市场规模与宏观分析
  summary: |
    Anthropic 在多个互相重叠的市场中竞争：企业 AI 平台、生成式 AI 软件、AI 智能体、AI 编程助手，
    以及云端分发的基础模型 API。市场吸引力很高——多个独立视角都显示 2026 年的支出池在百亿至万亿
    美元级——但可服务规模受限于采用成熟度、企业治理、算力经济，以及大多数生成式 AI 市场报告
    将服务、硬件、消费用法或 Claude 无法捕获的应用类别都计入其中。
  claimRefs:
    - C020
    - C021
    - C022
    - C023
    - C025
    - C029
    - C030
callouts:
  - type: key-insight
    title: 可服务市场广阔，但干净的 SAM 是企业工作流 AI，而非全部生成式 AI。
    body: |
      Coherent Market Insights 估计 2026 年全球生成式 AI 市场为 1211 亿美元，Mordor 估计 2026 年
      企业 AI 为 1148.7 亿美元。Anthropic 的近期 SAM 是其中由企业购买前沿模型访问、代理式工作流
      工具、编程助手与安全企业 AI 部署的子集。
    claimRefs:
      - C020
      - C021
      - C022
      - C023
  - type: risk-alert
    title: 采用广度不等于规模化的投资回报。
    body: |
      Deloitte 报告 2025 年员工对 AI 的访问权增长 50%，并预计更多公司将项目投入生产；但 IBM 引用
      MIT 研究称 95% 的生成式 AI 试点失败，仅约 25% 的 AI 项目交付预期投资回报。
    claimRefs:
      - C030
      - C031
      - C032
tables:
  - id: T201
    title: 市场定义与 Anthropic 相关性
    columns:
      - 市场视角
      - 定义
      - 2026 年规模信号
      - Anthropic 相关性
      - 边界风险
    rows:
      - - 生成式 AI
        - 生成文本、代码、图像、分析或其他内容的软件与模型驱动应用
        - 2026 年市场估值 1211 亿美元
        - Claude 通过对话、API、编程、智能体与企业工作流产品参与
        - 包含内容、消费者、服务与基础设施支出，并非全部可获取。
      - - 企业 AI
        - 组织部署的 AI 软件、平台、硬件与服务
        - 2026 年市场估值 1148.7 亿美元
        - Claude Enterprise、API 与云端分发部署的最佳广义预算池
        - 包含硬件与非生成式 AI 类别。
      - - AI 智能体
        - 自主或半自主规划与执行任务的系统
        - 2026 年市场估值 109 亿至 121 亿美元
        - Claude Code、Cowork、MCP 与企业工作流自动化直接对应这一视角
        - 定义不稳定，仍处早期。
      - - AI 编程助手
        - 用于代码生成、重构、测试与软件全生命周期辅助的开发者工具
        - 2026 年市场估值 128 亿美元
        - Claude Code 已披露收入运行率超过 25 亿美元
        - 市场预估包含可能被捆绑进 IDE 或云套件的开发者工具。
    notes: 各视角不可相加，存在大量重叠。
    claimRefs:
      - C020
      - C021
      - C022
      - C023
      - C027
  - id: T202
    title: 受证据约束的 TAM/SAM/SOM 估算
    columns:
      - 层级
      - 证据支撑代理
      - 2026 年数值
      - Anthropic 含义
      - 置信度
    rows:
