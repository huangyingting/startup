sections:
  - number: '2.1'
    title: 类别边界
    body: |
      不能用单一笼统的"AI 市场"数字来承销 Anthropic。Claude 的变现横跨模型 API、企业 AI 订阅、
      编程助手、代理式工作流自动化与云市场。广义的生成式 AI 市场估算适合作为自上而下的语境，
      但更精准的承销视角是企业工作流 AI——买方在此可将支出与开发者生产力、客户支持、分析、
      受监管文档处理与知识自动化挂钩。
    claimRefs:
      - C020
      - C021
      - C022
      - C023
      - C026
      - C027
  - number: '2.2'
    title: 市场规模与增长
    body: |
      若 Anthropic 能维持市场份额，市场规模足以支撑上市公司体量的结果。Coherent Market Insights
      估算 2026 年生成式 AI 市场 1211 亿美元，到 2033 年复合年增长率 33.2%。Mordor 估算 2026 年
      企业 AI 市场 1148.7 亿美元，到 2031 年增至 2730.8 亿美元。更直接相关的子市场仍处早期：2026 年
      AI 智能体约 109 亿至 121 亿美元、AI 编程助手 128 亿美元。因此 Anthropic 140 亿美元的收入
      运行率相对于紧致子市场代理已显大体量，意味着 Claude 的变现横跨多个市场定义。
    claimRefs:
      - C020
      - C021
      - C022
      - C023
      - C027
  - number: '2.3'
    title: 采用与时机
    body: |
      采用证据有利但不均衡。Deloitte 称 2025 年员工对 AI 的访问权增长 50%，并预计在六个月内拥有
      至少 40% 项目处于生产中的公司数量将翻倍。Anthropic 自家经济指数显示美国职场快速采用——
      40% 的员工报告在工作中使用 AI——但也显示地理集中：富裕国家与地区在 Claude 用量中占比
      过高。这支持以北美与高收入市场优先的收入模型。
    claimRefs:
      - C024
      - C025
      - C030
  - number: '2.4'
    title: 买方预算与细分逻辑
    body: |
      Claude 销售对接 CIO/CTO、工程、合规与职能负责人预算。预算替代可能来自传统自动化、开发者
      工具、商业智能、联络中心、内容生产与专业服务工作流；扩张预算则来自 AI 基础设施、云端 AI
      服务、副驾产品与数字化转型计划。最具吸引力的细分是高价值工作流——长上下文、安全控制、
      工具使用与代理式执行至关重要的场景。
    claimRefs:
      - C026
      - C027
      - C028
      - C029
  - number: '2.5'
    title: 反向市场证据
    body: |
      最强的反向信号不是兴趣不足，而是无法规模化。IBM 引用 2025 年 MIT 报告称 95% 的生成式 AI
      试点正在失败，仅约 25% 的 AI 项目交付预期投资回报，仅 16% 实现了企业范围规模化。Deloitte
      同样强调治理与运营就绪度落后于代理式 AI 的热情。对 Anthropic 而言，这意味着市场将奖励
      解决集成、控制与可衡量工作流价值的供应商，而不仅仅是模型质量。
    claimRefs:
      - C030
      - C031
      - C032
