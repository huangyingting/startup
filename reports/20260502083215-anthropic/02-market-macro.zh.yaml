        - 全球生成式 AI 市场
        - 1211 亿美元
        - 含 Claude 相邻用例的最广泛可变现 AI 软件与应用池
        - 中
      - - SAM
        - 企业 AI 市场
        - 1148.7 亿美元
        - 企业用于 AI 平台、应用、云端 AI 服务与自动化的预算
        - 中
      - - 近期核心 SAM
        - AI 智能体加编程助手
        - 237 亿至 249 亿美元
        - Claude Code、Cowork、API 自动化与工作流智能体最贴合的公开规模代理
        - 中
