sections:
  - number: '6.1'
    title: 客户基础概览
    body: |
      Anthropic 最佳的客户证据现在是运营性的，而非仅基于 Logo。公司称年化付费超过 10 万美元的
      客户同比增长 7 倍，超过 1,000 家客户年化付费超过 100 万美元，财富 10 强中有 8 家是 Claude
      客户。公开客户页面还包含软件、网络安全、教育、法律、金融服务、电商、非营利与平台合作
      伙伴等多个类别的具名账户。
    claimRefs:
      - C079
      - C080
      - C085
  - number: '6.2'
    title: 具名客户证据
    body: |
      ServiceNow 是最强的平台规模证据：Claude 是 ServiceNow Build Agent 的默认模型，也是
      ServiceNow AI Platform 上的首选模型，已推广至 ServiceNow 29,000 余名员工，并在测试中宣称
      销售备案时间减少 95%。eSentire 是最强的运营安全证据，引用 12 万余次自主调查、500 万余次
      工具调用、加密前 99.96% 的勒索软件遏制率，以及部署后每客户多检测出 41% 的已确认攻击。
    claimRefs:
      - C081
      - C082
  - number: '6.3'
    title: 细分与扩张逻辑
    body: |
      客户组合具吸引力，因为它结合了直接企业账户、开发者团队，以及将 Claude 分发至自家工作流的
      平台。Claude Code 可落地于工程团队；企业控制可扩展至受监管业务职能；API 与 Agent SDK 使用
      可驱动 eSentire、GC AI 等外部产品。这创造多条扩张路径，但也使客户集中度与毛对净经济从
      公开证据中更难评估。
    claimRefs:
      - C081
      - C082
      - C083
      - C084
      - C085
      - C087
  - number: '6.4'
    title: 留存与满意度证据
    body: |
      公开留存证据不足。扩张信号强，但没有公司披露的净/总收入留存率、客户流失、队列留存、
      头部客户集中度、NPS、CSAT、支持 SLA 或续约率数据。正确的尽调立场是将案例研究视作
      选定账户的产品价值证据，而非组合范围留存证据。
    claimRefs:
      - C079
      - C080
      - C086
      - C087
  - number: '6.5'
    title: 不利客户信号
    body: |
      不利客户信号集中在质量、可靠性、沟通与成本可预测性。The Register 报道 4 月发生短暂故障
      影响 Claude.ai 与 Claude Code，且用户报告的 Claude Code 质量投诉上升。Anthropic 自己的
      事后分析随后确认三处产品层变更影响 Claude Code、Agent SDK 与 Cowork，而 API 未受影响。
      该事件不否定 Anthropic 的客户基础，但提高了对支持、状态信号传递与续约数据的门槛。
    claimRefs:
      - C088
      - C089
      - C091
      - C092
