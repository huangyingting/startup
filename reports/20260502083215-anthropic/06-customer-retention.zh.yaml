schemaVersion: startup-diligence-report-v2
artifact: customer-retention
slug: anthropic
runDate: 2026-05-02
company:
  name: Anthropic
  website: https://www.anthropic.com/
chapter:
  number: 6
  title: 客户与留存
  summary: |
    Anthropic 的公开客户证据对一家私营 AI 公司而言异常有力：官方披露年化付费超 100 万美元客户
    超过 1,000 家、财富 10 强中 8 家为 Claude 客户、年化付费超 10 万美元客户增长 7 倍；具名案例
    覆盖 ServiceNow、eSentire、Smartsheet、Delivery Hero、Syracuse University、GC AI、Bubble、
    AirOps 等。但留存质量披露不足：净/总收入留存率、客户流失、队列扩张、支持 SLA、客户集中度
    与生产对比试点的组合均未公开。
  claimRefs:
    - C079
    - C080
    - C081
    - C082
    - C083
    - C084
    - C085
    - C090
callouts:
  - type: key-insight
    title: 客户证据已超越 Logo，进入运营性用例。
    body: |
      官方客户证据包括 ServiceNow 将 Claude 与 Claude Code 推广至 29,000 多名员工、eSentire
      在 12 个月内运行 12 万余次自主调查与 500 万余次工具调用、Delivery Hero 的智能体每天合并
      100 余个 PR，以及 GC AI 为 1,500 家公司驱动法律工作流。
    claimRefs:
      - C081
      - C082
      - C083
      - C084
  - type: risk-alert
    title: 留存指标与集中度是缺失的承销桥接。
    body: |
      Anthropic 披露了强劲的扩张信号，但净/总收入留存率、流失、队列留存、头部客户集中度与
      客户级毛利率均未公开。近期 Claude 的质量投诉与停机使这些指标更重要而非更次要。
    claimRefs:
      - C086
      - C087
      - C088
      - C089
      - C091
      - C092
