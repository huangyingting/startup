  website: https://www.anthropic.com/
chapter:
  number: 6
  title: Customer & Retention
  summary: |
    Anthropic has unusually strong public customer proof for a private AI company: official disclosures cite
    1,000+ $1M annualized customers, eight Fortune 10 Claude customers, and a 7x increase in $100K+ annualized
    customers, while named case studies span ServiceNow, eSentire, Smartsheet, Delivery Hero, Syracuse University,
    GC AI, Bubble, AirOps, and more. However, retention quality is still under-disclosed: NRR, GRR, logo churn,
    cohort expansion, support SLAs, customer concentration, and production-versus-pilot mix are not public.
  claimRefs:
    - C079
    - C080
    - C081
    - C082
    - C083
    - C084
    - C085
    - C090
callouts:
  - type: key-insight
    title: Customer proof has moved beyond logos into operational use cases.
    body: |
      Official customer evidence includes ServiceNow rolling Claude and Claude Code to 29,000+ employees,
      eSentire running 120,000+ autonomous investigations and 5M+ tool calls in 12 months, Delivery Hero's
      agent merging 100+ pull requests per day, and GC AI powering legal workflows for 1,500 companies.
    claimRefs:
      - C081
      - C082
      - C083
      - C084
  - type: risk-alert
    title: Retention metrics and concentration are the missing underwriting bridge.
    body: |
      Anthropic discloses strong expansion signals, but NRR, GRR, churn, cohort retention, top-customer
      concentration, and customer-level gross margin are not public. Recent Claude quality complaints and
      outages make these metrics more important, not less.
    claimRefs:
      - C086
      - C087
      - C088
      - C089
      - C091
      - C092
