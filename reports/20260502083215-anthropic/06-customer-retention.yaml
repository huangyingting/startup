sections:
  - number: '6.1'
    title: Customer base overview
    body: |
      Anthropic's best customer evidence is now operational rather than purely logo-based. The company says
      customers spending over $100K annually grew 7x year over year, more than 1,000 customers spend over $1M
      annually, and eight of the Fortune 10 are Claude customers. The public customer page adds named accounts
      across software, cybersecurity, education, legal, financial services, ecommerce, nonprofits, and platform
      partners.
    claimRefs:
      - C079
      - C080
      - C085
  - number: '6.2'
    title: Named customer proof
    body: |
      ServiceNow is the strongest platform-scale proof point: Claude is the default model for ServiceNow Build
      Agent and a preferred model across the ServiceNow AI Platform, with a rollout to ServiceNow's 29,000+
      employees and claimed 95% seller prep-time reduction in testing. eSentire is the strongest operational
      security proof point, citing 120,000+ autonomous investigations, 5M+ tool calls, 99.96% ransomware
      containment before encryption, and 41% more confirmed attacks detected per customer after deployment.
    claimRefs:
      - C081
      - C082
  - number: '6.3'
    title: Segment and expansion logic
    body: |
      The customer mix is attractive because it combines direct enterprise accounts, developer teams, and
      platforms that distribute Claude into their own workflows. Claude Code can land in engineering teams;
      Enterprise controls can expand into regulated business functions; API and Agent SDK use can power external
      products such as eSentire and GC AI. This creates multiple expansion paths, but also makes customer
      concentration and gross-to-net economics harder to evaluate from public evidence.
    claimRefs:
      - C081
      - C082
      - C083
      - C084
      - C085
      - C087
  - number: '6.4'
    title: Retention and satisfaction evidence
    body: |
      Public retention evidence is insufficient. Expansion signals are strong, but there is no company-disclosed
      NRR, GRR, logo churn, cohort retention, top-customer concentration, NPS, CSAT, support SLA, or renewal-rate
      data. The correct diligence stance is to treat case studies as proof of product value in selected accounts,
      not as proof of portfolio-wide retention.
    claimRefs:
      - C079
      - C080
      - C086
      - C087
  - number: '6.5'
    title: Adverse customer signals
    body: |
      Adverse customer signals center on quality, reliability, communication, and cost predictability. The
      Register reported a brief April outage affecting Claude.ai and Claude Code and a rise in user-reported
      Claude Code quality complaints. Anthropic's own postmortem subsequently confirmed three product-layer
      changes affected Claude Code, Agent SDK, and Cowork while the API was not impacted. The episode does not
      invalidate Anthropic's customer base, but it raises the bar for support, status signaling, and renewal data.
    claimRefs:
      - C088
      - C089
      - C091
      - C092
