    claimRefs:
      - C074
      - C075
      - C076
sections:
  - number: '5.1'
    title: 产品平台概览
    body: |
      Anthropic 的产品组合现已涵盖终端用户应用、开发者 API、智能体基础设施与企业治理。官方文档
      呈现两个主要开发者触面：Messages 提供由客户控制状态与工具循环的直接模型访问，Managed
      Agents 提供托管的长周期智能体。定价与产品页面还增加了 Claude Code、Claude Cowork、Team、
      Enterprise、托管智能体、Web 搜索、代码执行、提示缓存与模型家族。
    claimRefs:
      - C063
      - C066
      - C067
      - C068
      - C069
  - number: '5.2'
    title: 技术差异化
    body: |
      最强的技术差异化是从模型端点到智能体运行层的转变。Managed Agents 将会话、外壳与沙箱解耦，
      Anthropic 描述将 OAuth 凭证保留在生成代码沙箱之外，由 Claude 通过代理调用 MCP 工具。
      Agent Skills 增加一种可移植方式，将程序知识、脚本与资源打包供动态加载。这些都是构建持久
      工作流护城河的可信组件，前提是被广泛采用且安全治理到位。
    claimRefs:
      - C064
      - C065
      - C071
      - C072
  - number: '5.3'
    title: 企业级就绪度
    body: |
      企业级就绪度由可见的控制能力支撑：SSO、SCIM、审计日志、Compliance API、自定义数据留存、
      网络级访问控制、IP 白名单、HIPAA 就绪、信任中心、公开状态页、隐私政策与协调漏洞披露框架。
      但详细认证、SOC 报告、BAA、运行时间 SLA、渗透测试与事件信用条款必须直接审查文档，不能
      仅从营销页推断。
    claimRefs:
      - C067
      - C073
      - C077
      - C078
  - number: '5.4'
    title: 可靠性与产品风险
    body: |
      Anthropic 公开状态页显示 2026 年 5 月 2 日所有主要触面运行正常，但同样记录了 4 月下旬涉及
      Claude.ai、API、Claude Code 与模型请求的多起已解决事件。更重要的是，Anthropic 4 月 23 日
      的事后分析将感知到的 Claude Code/Cowork/Agent SDK 质量下降归因于三处产品层变更。透明度
      值得肯定，但事件表明智能体工作流需要专门的回归测试与客户沟通阈值。
    claimRefs:
      - C074
      - C075
      - C076
  - number: '5.5'
    title: 产品结论
    body: |
      产品深度是优势：Anthropic 拥有可信的模型、开发者触面、智能体基础设施、工作流扩展与企业
      控制。护城河不仅是安全品牌，而是将前沿模型转化为受治理、集成式工作流的能力。尽调负担
      在于证明可靠性、合规、集成深度与单位经济模型能跟上 Anthropic 估值所暗含的规模。
    claimRefs:
      - C063
      - C064
      - C065
      - C066
      - C067
      - C074
      - C075
      - C076
