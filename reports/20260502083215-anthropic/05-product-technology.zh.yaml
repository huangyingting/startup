  - id: F502
    title: 产品可靠性风险流
    type: causal-map
    layout: standard
    summary: 近期 Claude 质量问题表明，即便模型权重与 API 稳定，产品层变更仍可影响企业信任。
    data:
      nodes:
        - id: p1
          label: 产品层变更
          detail: 默认推理 effort、会话思考缓存行为与冗长度提示在 3-4 月发生变化。
          tone: high
        - id: p2
          label: 智能体工作流退化
          detail: 用户感受到智能下降、遗忘、重复与编程质量问题。
          tone: risk
        - id: p3
          label: 用量与信任影响
          detail: 用量上限消耗加快，Anthropic 在修复后为订阅用户重置用量上限。
          tone: risk
        - id: p4
          label: 治理回应
          detail: Anthropic 发布事后分析，并表示将改变实践以减少复发。
          tone: neutral
        - id: p5
          label: 尽调含义
          detail: 投资人需要智能体专用评测、分阶段推广、状态信号传递与企业事件沟通的证据。
          tone: high
