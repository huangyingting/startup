schemaVersion: startup-diligence-report-v2
artifact: product-technology
slug: anthropic
runDate: 2026-05-02
company:
  name: Anthropic
  website: https://www.anthropic.com/
chapter:
  number: 5
  title: 产品与技术
  summary: |
    Anthropic 已将 Claude 从模型/API 产品演进为多触面企业 AI 平台：Claude.ai、Claude Code、
    Claude Cowork、Team/Enterprise 计划、Messages API、Managed Agents、MCP 集成、Agent Skills，
    以及 AWS、Google Cloud、Microsoft Azure 上的云端入口。技术护城河在代理式编程、长周期智能体
    基础设施、安全与信任定位以及企业控制方面最强。主要的产品尽调风险是可靠性回退、不透明的认证
    细节、由算力成本驱动的产品权衡，以及工作流集成深度能否形成持久转换成本。
  claimRefs:
    - C063
    - C064
    - C065
    - C066
    - C067
    - C068
    - C069
    - C075
callouts:
  - type: key-insight
    title: Anthropic 在构建工作流基础设施，而不仅仅是聊天模型。
    body: |
      官方文档同时暴露直接的 Messages API 访问与 Managed Agents；工程帖子描述了智能体会话、
      外壳、沙箱、持久事件日志、基于 MCP 的工具与安全凭证隔离。这是面向企业代理式工作的可信
      平台架构，而非仅仅是一个模型端点。
    claimRefs:
      - C063
      - C064
      - C065
      - C071
  - type: risk-alert
    title: 近期 Claude Code/Cowork 质量回退暴露了产品层风险。
    body: |
      Anthropic 4 月 23 日的事后分析将 Claude Code、Agent SDK 与 Cowork 的质量下降归因于三处
      产品层变更，而 API 与推理层未受影响。这印证了发布治理、客户可见质量监控以及智能体专用
      回归测试的必要性。
    claimRefs:
      - C074
      - C075
      - C076
tables:
  - id: T502
    title: 产品模块矩阵
    columns:
      - 模块
      - 证据支撑能力
      - 买方 / 用户
      - 打包信号
      - 尽调备注
    rows:
      - - Claude.ai / 桌面 / 移动
        - 对话、内容、代码、artifacts/文件、Web 搜索、记忆、连接器、Office 风格生产力功能
        - 消费者、专业人士、知识工作者
        - Free、Pro、Max、Team、Enterprise
        - 验证按细分的留存与连接应用的隐私控制。
      - - Claude Code
        - 代理式编程；官方收入规模；2026 年 3-4 月质量问题已修复
        - 开发者与工程团队
        - 包含在 Pro 与 Team；企业用量与技术席位/API 用量挂钩
        - 衡量代码库级成功率、安全缺陷与毛利率。
      - - Claude Cowork
        - G 轮披露中提及、且在事后分析范围内的更广义代理式工作产品
        - 知识工作者与企业团队
        - 包含在 Pro/Team 打包与企业工作流中
        - 厘清 GA 成熟度、用例与采用指标。
      - - Messages API
        - 由开发者管理回合、状态与工具循环的直接模型访问
        - 开发者与平台团队
        - 按 Opus/Sonnet/Haiku 的 token 定价
        - 评估速率限制、数据留存与生产 SLA。
      - - Managed Agents
        - 托管的长周期智能体，配备会话日志、外壳、沙箱、工具与运行时定价
        - 企业开发者/平台团队
        - 0.08 美元/活跃运行时会话小时加 token
        - 评估安全边界、恢复语义与 VPC/私有部署选项。
      - - MCP / 连接器
        - MCP 用于外部工具；Managed Agents 的 OAuth token 存于安全保管库
        - 企业 IT 与工作流团队
        - 启用连接器的团队/企业工作流
        - 审查连接器权限、审计日志与提示注入控制。
      - - Agent Skills
        - 由智能体动态加载的可组合指令、脚本与资源文件夹
        - 拥有领域工作流的开发者与团队
        - 开放标准 / 产品能力
        - 评估 skill 治理、来源与沙箱安全。
    notes: 模块成熟度从 GA 产品到演进中的智能体基础设施不等；状态不清时保留尽调缺口。
    claimRefs:
      - C063
      - C064
      - C065
      - C066
      - C067
      - C071
      - C072
      - C074
  - id: T503
    title: AI / 自动化能力图
    columns:
      - 能力
      - 证据
      - 差异化
      - 风险 / 局限
    rows:
      - - 代理式编程
        - Claude Code 收入运行率超过 25 亿美元；工程帖子描述 effort 设置、思考历史、提示缓存与代码评审上下文
        - 强劲的开发者切入点与工作流数据
        - 质量回退表明产品层默认配置可能损害结果。
      - - 长周期智能体
        - Managed Agents 将会话、外壳、沙箱与工具虚拟化
        - 为可恢复长时运行设计的架构
        - 需要稳健的沙箱与工具安全。
      - - 工作流模式 vs 自主智能体模式
        - Anthropic 区分预定义工作流与动态指挥工具使用的智能体
        - 清晰的开发者教育与设计哲学
        - 成本/延迟权衡可能限制代理式用例。
      - - MCP 集成
        - 工程与产品材料援引 MCP 用于工具访问与外部服务
        - 开放集成战略与连接器生态
        - 连接器信任、token 范围与数据泄露需要尽调。
      - - Agent Skills
        - Skills 通过渐进式披露打包程序知识、脚本与资源
        - 形成可移植的领域专精
        - skill 供应链与执行权限需要治理。
    notes: 除非有状态或外部证据支撑，能力均视为公司声称。
    claimRefs:
      - C064
      - C065
      - C071
      - C072
      - C074
      - C075
  - id: T504
    title: 架构与基础设施证据
    columns:
      - 层级
      - 公开证据
      - 架构含义
      - 待解技术问题
    rows:
      - - 模型
        - 文档列出 Opus 4.7、Sonnet 4.6、Haiku 4.5；定价页列出 token 价
        - 按能力/成本/延迟的多模型路由
        - 实际路由策略、评测门控与按客户的模型可用性。
      - - API
        - 文档展示 Messages API 与使用 claude-opus-4-7 的代码示例
        - 开发者管理状态与工具循环仍可用
        - 按计划的 SLA、延迟分位、速率限制与数据留存。
      - - 托管智能体控制平面
        - Managed Agents 将外壳、会话日志与沙箱解耦
        - 可恢复的长周期智能体架构
        - 隔离、可观测性与企业部署模式。
      - - 沙箱 / 工具
        - Managed Agents 将凭证保留在生成代码沙箱之外，并使用 MCP 代理/保管库模式
        - 注重安全的工具执行模型
        - 正式安全审查、渗透测试与审计证据。
      - - 云分发
        - Claude 在 AWS Bedrock、Google Vertex AI、Microsoft Azure Foundry 上均可获得
        - 多云韧性与买方采购灵活性
        - 渠道特定的功能对等与云驻留限制。
    notes: 公开架构停留在高层；详细系统设计未公开。
    claimRefs:
      - C063
      - C064
      - C065
      - C066
      - C067
  - id: T505
    title: 安全、隐私、合规与可靠性矩阵
    columns:
      - 领域
      - 公开证据
      - 优势
      - 缺口
    rows:
      - - 隐私角色
        - 隐私政策将 Anthropic 区分为消费者服务的数据控制者与商业客户用例的处理者
        - 隐私角色边界清晰
        - 商业 DPA 控制与留存细节需要审查。
      - - Inputs/Outputs 与反馈
        - 隐私政策称 Anthropic 收集提示/输入、输出、反馈、技术、用量、日志与排障信息
        - 透明的收集类别
        - 企业级 opt-out 与留存需要合同审查。
      - - 信任中心
        - 由 Vanta 托管的 Anthropic Trust Center 存在，含透明度/安全描述
        - 信任门户表明合规计划
        - 抓取的静态内容中未见认证清单。
      - - 漏洞披露
        - Anthropic 目标 90 天披露与人工审查的漏洞报告
        - 安全研究流程有文档
        - 负责任披露政策与漏洞赏金范围需要审查。
      - - 状态 / 可靠性
        - 状态页显示 5 月 2 日所有主要触面运行正常，并记录 4 月下旬多起已解决事件
        - 公开状态透明度
        - 需要运行时间历史、SLA、事件严重度与企业信用条款。
      - - 质量回退
        - 事后分析说明 API/推理层未受影响，但 Claude Code、Agent SDK 与 Cowork 因三处变更受影响
        - 事后分析透明度强
        - 需要发布门控、客户沟通阈值与回归测试套件证据。
    notes: 不超出可见公开证据范围去推定合规声称。
    claimRefs:
      - C073
      - C074
      - C075
      - C076
      - C077
      - C078
  - id: T506
    title: 路线图与技术尽调要求
    columns:
      - 主题
      - 当前信号
      - 尽调要求
    rows:
      - - 智能体基础设施
        - Managed Agents 已作为托管的长周期智能体基础设施推出
        - 审查 GA 状态、客户采用、隔离模型、可观测性、VPC/私有部署与事件历史。
      - - Claude Code 质量
        - 4 月事后分析已解决问题并重置用量上限
        - 审查回归仪表盘、评测覆盖、推广策略，以及事件后的客户流失。
      - - 合规就绪
        - 信任中心已存在，Enterprise 包含 Compliance API、留存控制、IP 白名单与 HIPAA 就绪
        - 获取 SOC 2/ISO/HIPAA 文档、BAA 条款、DPA 与安全问卷。
      - - 数据隐私
        - 隐私政策识别所收集的数据类别与控制者/处理者角色
        - 绘制商业服务的数据流、留存、训练用途、子处理者与跨境传输。
      - - 集成生态
        - MCP、连接器与 Skills 将 Claude 扩展到工具与工作流
