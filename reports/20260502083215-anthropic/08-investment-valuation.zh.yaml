  website: https://www.anthropic.com/
chapter:
  number: 8
  title: 投资与估值
  summary: |
    Anthropic 是顶级的后期 AI 投资标的，但公开估值证据要求纪律性，而非盲目买入。已确认的 3800
    亿美元 G 轮约相当于当前 300 亿美元以上收入运行率的 12.7 倍——若净收入、毛利率、留存与算力
    效率强劲，这一倍数仍可支撑。传闻中 8500-9000 亿美元的抢投估值则意味着同一收入锚点下的
    28-30 倍，在缺乏卓越的利润率、留存与 IPO 证据时，不可凭公开数据承销。建议：跟踪 / 仅在私募
    尽调获得验证且有估值保护时参与。
  claimRefs:
