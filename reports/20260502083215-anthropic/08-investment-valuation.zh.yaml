callouts:
  - type: key-insight
    title: 在当前收入运行率下，已确认估值偏高但并非荒谬。
    body: |
      在 3800 亿美元投后估值与 300 亿美元以上当前运行率收入下，Anthropic 在调整现金、优先股、
      云合作伙伴经济或净收入之前的运行率收入倍数约为 12.7 倍。该倍数只有在利润率与留存远强于
      当前公开证据所证明时才成立。
    claimRefs:
      - C113
      - C114
      - C115
      - C116
  - type: risk-alert
    title: 传闻中 8500-9000 亿美元的估值是另一类承销问题。
    body: |
      TechCrunch 报道在 8500-9000 亿美元估值下 400-500 亿美元的抢投要约。该区间在 300 亿美元以上
      运行率收入锚点下约为 28-30 倍；若接近 400 亿美元的来源运行率准确则为 21-22.5 倍。在没有
      私募利润率、留存与 IPO 证据下，公开数据不支持追逐该入场点。
    claimRefs:
      - C116
      - C117
      - C118
tables:
  - id: T801
    title: 投资建议摘要
    columns:
      - 维度
      - 评估
      - 证据
      - 决策含义
    rows:
      - - 投资建议
        - 跟踪 / 有条件参与
        - 规模与产品质量极佳，但估值与披露缺口仍重大
        - 不基于公开数据发出买入。
      - - 置信度
        - 中
        - 官方收入/客户/融资锚点强劲；利润率、净收入、净收入留存率与集中度缺失
        - 在定价之前要求私募尽调。
      - - 风险评级
        - 高
        - >-
          版权和解、算力承诺、可靠性事件、滥用控制与客户集中度的不透明
        - 采用小额仓位与止损触发器。
      - - 估值立场
        - 在 3800 亿美元偏高但可观察；在 8500-9000 亿美元下若无新证据则缺乏吸引力
        - 3800 亿美元下当前运行率倍数 12.7 倍；8500-9000 亿美元在 300 亿美元以上收入下为 28-30 倍
        - 设定硬性入场纪律。
      - - 退出路径
        - IPO
        - >-
          Crunchbase 称 Anthropic 与 OpenAI 据报道正在考虑 IPO；第三方 IPO 时间主张可靠性较低
        - 视 IPO 为可能路径，但时机未确认。
      - - 目标回报
        - null
        - 无公开毛利率、自由现金流、清算优先权或股价数据
        - 不计算虚假精确的 IRR。
    notes: 此建议有意对价格敏感。
    claimRefs:
      - C113
      - C114
      - C115
      - C116
      - C117
      - C118
      - C119
      - C094
      - C120
      - C121
  - id: T802
    title: 投资论点与反向论点
    columns:
      - 立场
      - 论据
      - 证据
      - 改变观点的条件
    rows:
      - - 论点
        - 拥有真正企业规模的前沿 AI 平台
        - 300 亿美元以上收入运行率、100 万美元以上客户超 1,000 家、财富 10 强中 8 家、Claude Code 规模
        - 验证的净收入、净收入留存率与客户集中度。
      - - 论点
        - 开发者与智能体切入点可复合为工作流基础设施
        - Claude Code、Cowork、Managed Agents、ServiceNow、eSentire 与云分发证据
        - 质量事件后留存的企业用量证据。
      - - 论点
        - 资本与算力可获得性是战略优势
        - 300 亿美元 G 轮；1000 亿美元以上 AWS 承诺；Google/Broadcom TPU 扩张
        - 算力合同条款改善毛利率，而非成为固定成本负担。
      - - 反向论点
        - 估值可能已折现完美执行
        - 已确认的 3800 亿美元估值与传闻中 8500-9000 亿美元的抢投要约
        - 入场低于经尽调支持的公允价值，或新的公开市场可比支撑。
      - - 反向论点
        - 收入质量未在公开层面证明
        - 没有公开的毛利率、净收入、获客成本、净收入留存率、烧钱速度或头部客户清单
        - 经审计的毛对净桥接与队列经济。
      - - 反向论点
        - 法律/安全/运营风险真实存在
        - 15 亿美元 Bartz 和解待最终批准；产品质量事后分析；滥用报告
        - 已了结的法律敞口、验证的控制措施与客户流失数据。
    notes: 论点强；反向论点主要在价格与证据缺口。
    claimRefs:
      - C113
      - C114
      - C115
      - C116
      - C117
      - C119
      - C094
      - C101
      - C122
  - id: T803
    title: 融资与估值历程
    columns:
      - 日期
      - 事件
      - 金额 / 估值
      - 倍数语境
      - 尽调含义
    rows:
      - - 2026-02
        - G 轮宣布
        - 300 亿美元，投后 3800 亿美元
        - 2 月 140 亿美元运行率的 27.1 倍；当前 300 亿美元以上运行率的 12.7 倍
        - 已确认的私募估值锚点。
      - - 2026-04
        - Google/Broadcom 算力公告
        - 收入运行率突破 300 亿美元；100 万美元以上客户超过 1,000 家
        - 改善了 3800 亿美元下的倍数视角，但毛对净桥接仍缺失
        - 用作当前收入锚点。
      - - 2026-04
        - TechCrunch 抢投要约报道
        - 在 8500-9000 亿美元下 400-500 亿美元的潜在轮次
        - 300 亿美元运行率下 28.3-30.0 倍；接近 400 亿美元时 21.3-22.5 倍
        - 在缺乏私募证据时不要追逐。
      - - '2026'
        - 关于 IPO 考量的报道
        - 没有公开 S-1
        - 退出倍数未知
        - IPO 就绪度合理，但未经证实。
    notes: >-
      倍数采用收入运行率与估值（非企业价值）；忽略现金、优先股与类债务的算力义务。
    claimRefs:
      - C113
      - C114
      - C115
      - C116
      - C117
      - C118
      - C121
  - id: T804
    title: 牛市 / 基线 / 熊市情景
    columns:
      - 情景
      - 假设
      - 估值视角
      - 回报逻辑
      - 概率信号
    rows:
      - - 牛市
        - >-
          收入运行率持续复合增长、净收入留存率非常高、通过路由/缓存/定制硅件改善毛利率、法律成本可控、
          IPO 以前沿 AI 溢价开局
        - 长期可支撑 6000-9000 亿美元
        - 若公开市场投资人为高速增长 AI 领导者接受 20-30 倍收入，3800 亿美元入场尚有上行
        - 可能但需要私募证据。
      - - 基线
        - >-
          300 亿美元以上运行率真实，但毛对净、利润率、算力承诺与客户集中度降低质量；IPO 倍数向高速增长
          基础设施软件回归
        - 在调整优先股/现金前公允价值区间 3000-5000 亿美元
        - 除非指标证实同类最佳经济，否则 3800 亿美元入场上行有限
        - 公开数据下最审慎的立场。
      - - 熊市
        - >-
          收入减速、毛利率结构性偏低、法律/许可成本上升、质量问题损害留存，或公开 AI 倍数收缩
        - 1500-2500 亿美元的下行区间
        - 相对 3800 亿美元下行明显，相对传闻 8500-9000 亿美元下行严重
        - 在缺乏私募财务时不可排除。
    notes: 情景区间是承销区间，并非正式 DCF 输出。
    claimRefs:
      - C114
      - C115
      - C116
      - C117
      - C119
      - C094
      - C101
      - C122
