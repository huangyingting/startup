  - id: T806
    title: 公开与私募可比视角
    columns:
      - 可比 / 类别
      - 估值证据
      - 相关性
      - 局限
    rows:
      - - OpenAI
        - TechCrunch 称 OpenAI 在 2026 年 2 月以 8520 亿美元投后估值完成 1220 亿美元轮次
        - 最贴近的前沿模型估值基准
        - 分发、治理与会计画像不同。
      - - Anthropic
        - 已确认的 3800 亿美元 G 轮；8500-9000 亿美元抢投要约据报道但未完成
        - 直接标的
        - 私募估值不等于公开市场出清价。
      - - Databricks / AI 基础设施私募同行
        - 搜索证据显示基础设施领导者可获得高私募倍数
        - 适用于 AI 基础设施溢价
        - 公开来源数据不一致，本报告未独立验证。
      - - Snowflake / Palantir / 高速增长软件
        - 公开软件同行提供利润率与现金流纪律
        - 可作下行倍数锚点
        - Anthropic 增长更快，但毛利率可能较低且类资本支出义务较高。
      - - Nvidia / Microsoft
        - 巨型 AI 受益者
        - 显示 AI 机会规模与公开市场胃纳
        - 因硬件/云经济不同，并非直接的软件/模型实验室可比。
    notes: 本报告避免依赖第三方公开可比的精确倍数，因为来源质量参差。
    claimRefs:
      - C117
      - C118
      - C121
