      - - 客户质量
        - 100 万美元以上客户超 1,000 家、财富 10 强中 8 家，但无净/总收入留存率/流失
        - 3
        - 头部账户集中度与留存。
      - - 治理
        - PBC 与 LTBT 治理已记录
        - 3
        - 上市公司股东权利、董事会控制权、优先股结构。
      - - 法律就绪
        - 15 亿美元和解待最终听证；音乐案待裁
        - 2
        - 法律日程、准备金、保险与上诉。
      - - 公开市场时机
        - 有 IPO 报道但无 S-1
        - 3
        - 审计师就绪、S-1 草稿、银行与内部控制。
