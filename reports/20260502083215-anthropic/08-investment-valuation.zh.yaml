  - id: T808
    title: 仓位规模与止损触发器
    columns:
      - 领域
      - 建议立场
      - 止损 / 论点破裂触发器
    rows:
      - - 入场价
        - 在没有新审计证据时不要在 3800 亿美元以上追逐
        - 在没有毛利率、净收入留存率与净收入披露时，新私募轮次估值高于 6000 亿美元。
      - - 财务质量
        - 要求经审计的毛对净与毛利率桥接
        - 毛利率明显低于一线软件/基础设施预期且无改善路径。
      - - 客户质量
        - 要求头部客户清单与留存队列
        - 前 10 客户或合作伙伴渠道占收入主导；净/总收入留存率明显偏弱。
      - - 法律/监管
        - 要求法律准备金与数据来源尽调
        - 不利的版权裁决、禁令或重大未计提负债。
      - - 算力承诺
        - 将 AWS/Google/Broadcom 承诺视为类债务义务建模
        - 在下行情景中承诺支出超过收入。
      - - 产品质量
        - 要求事后分析行动完成与流失分析
        - 反复出现导致企业流失的 Claude Code/API 质量事件。
    notes: 触发器是投资委员会门控所用的可衡量要求。
    claimRefs:
      - C116
      - C119
      - C094
      - C101
      - C122
  - id: T809
    title: 承销前的最终尽调要求
    columns:
      - 要求
      - 优先级
      - 重要性
    rows:
      - - '经审计的收入桥接：总账单、净收入、云市场费用、抵扣、退款'
        - 高
        - 决定收入倍数是否真实。
      - - 产品/渠道毛利率与算力承诺计划
        - 高
        - 决定 AI 规模能否产出软件式经济。
      - - 净收入留存率、总收入留存率、流失、前 25 客户、续约流水线与客户集中度
        - 高
        - 决定增长可持续性与下行风险。
      - - 法律日程、和解会计、保险、补偿与训练数据来源审计
        - 高
        - 决定尾部风险与 IPO 就绪度。
      - - 股权结构、清算优先权、战略投资人权利与 LTBT/控制条款
        - 高
        - 决定入场经济与上市治理。
      - - 'IPO 就绪材料包：审计师、内部控制、S-1 草稿时间表、银行流程、风险因素'
        - 中
        - 决定退出路径与持有期风险。
      - - 可靠性、安全、隐私与滥用控制证据
        - 中
        - 决定企业信任与受监管市场扩张。
    notes: 缺少这些要求时，正确的建议仍是跟踪/继续研究，而非买入。
    claimRefs:
      - C115
      - C116
      - C119
      - C094
      - C101
      - C120
      - C122
