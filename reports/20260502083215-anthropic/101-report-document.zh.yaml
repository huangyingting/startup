    type: recommendation-logic
    layout: wide
    summary: Synthesis of scale proof, product wedge, valuation constraints, and residual risks driving the track recommendation.
    data:
      nodes:
        - label: Frontier-scale revenue
          detail: Run-rate revenue surpassed $30B in April 2026, up from approximately $9B at end-2025.
          tone: positive
        - label: Enterprise platform proof
          detail: 1,000+ $1M annualized customers, 8/10 Fortune 10 customers, and a $2.5B+ Claude Code run-rate.
          tone: positive
        - label: Compute and capital access
          detail: $30B Series G at $380B post-money plus $100B+ AWS commitment and Google/Broadcom TPU expansion.
          tone: opportunity
        - label: Valuation discipline required
          detail: $380B is roughly 12.7x current run-rate revenue; rumored $850B-$900B preemptive offers imply 28x-30x.
          tone: high
        - label: Residual risk overhang
          detail: Bartz settlement, compute commitments, quality regressions, misuse, and customer-concentration opacity.
          tone: risk
        - label: Recommendation
          detail: Track and conditionally participate only with verified private diligence and valuation protection.
          tone: neutral
