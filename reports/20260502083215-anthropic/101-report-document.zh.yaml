      - 事件
      - 金额 / 估值
      - 倍数语境
      - 尽调含义
    rows:
      - - 2026-02
        - G 轮宣布
        - 300 亿美元，投后 3800 亿美元
        - 2 月 140 亿美元运行率的 27.1 倍；当前 300 亿美元以上运行率的 12.7 倍
        - 已确认的私募估值锚点。
      - - 2026-04
        - Google/Broadcom 算力公告
        - 收入运行率突破 300 亿美元；100 万美元以上客户超过 1,000 家
        - 改善了 3800 亿美元下的倍数视角，但毛对净桥接仍缺失
        - 用作当前收入锚点。
      - - 2026-04
        - TechCrunch 抢投要约报道
        - 在 8500-9000 亿美元下 400-500 亿美元的潜在轮次
        - 300 亿美元运行率下 28.3-30.0 倍；接近 400 亿美元时 21.3-22.5 倍
        - 在缺乏私募证据时不要追逐。
      - - '2026'
        - 关于 IPO 考量的报道
        - 没有公开 S-1
        - 退出倍数未知
        - IPO 就绪度合理，但未经证实。
    notes: 倍数采用收入运行率与估值（非企业价值）；忽略现金、优先股与类债务的算力义务。
