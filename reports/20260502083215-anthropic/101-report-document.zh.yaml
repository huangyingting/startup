figures:
  - id: F101
    title: Anthropic 公司快照逻辑
    type: recommendation-logic
    layout: wide
    summary: 公司层级论点、变现向量、退出路径与风险节点的紧凑映射图，供下游报告综合使用。
    data:
      nodes:
        - label: 前沿模型平台
          detail: Claude 覆盖对话、API、企业产品、Claude Code、Cowork 与工作流集成。
          tone: positive
        - label: 企业级采用
          detail: 官方披露收入运行率超 300 亿美元、年化付费超 100 万美元客户超 1,000 家、财富 10 强中 8 家为客户。
          tone: positive
        - label: 云端分发基础设施
          detail: Claude 在 AWS Bedrock、Google Cloud Vertex AI、Microsoft Azure Foundry 上均可获得，运行于 AWS Trainium、 Google TPU 与
            NVIDIA GPU 上。
          tone: opportunity
        - label: 退出路径
          detail: 规模、战略投资人与企业渗透支撑 IPO 就绪度，但估值纪律与治理复杂性是关键。
          tone: neutral
        - label: 风险节点
          detail: 版权诉讼、算力强度、竞争性前沿模型支出、安全治理与高估值共同构成显著的承销风险。
          tone: risk
    approximationNotes: 图表综合公开证据；退出时机与 IPO 就绪度未经公司确认。
