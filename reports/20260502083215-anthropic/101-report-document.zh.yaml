  - id: T804
    title: 牛市 / 基线 / 熊市情景
    columns:
      - 情景
      - 假设
      - 估值视角
      - 回报逻辑
      - 概率信号
    rows:
      - - 牛市
        - 收入运行率持续复合增长、净收入留存率非常高、通过路由/缓存/定制硅件改善毛利率、法律成本可控、 IPO 以前沿 AI 溢价开局
        - 长期可支撑 6000-9000 亿美元
        - 若公开市场投资人为高速增长 AI 领导者接受 20-30 倍收入，3800 亿美元入场尚有上行
        - 可能但需要私募证据。
      - - 基线
        - 300 亿美元以上运行率真实，但毛对净、利润率、算力承诺与客户集中度降低质量；IPO 倍数向高速增长 基础设施软件回归
        - 在调整优先股/现金前公允价值区间 3000-5000 亿美元
        - 除非指标证实同类最佳经济，否则 3800 亿美元入场上行有限
        - 公开数据下最审慎的立场。
      - - 熊市
        - 收入减速、毛利率结构性偏低、法律/许可成本上升、质量问题损害留存，或公开 AI 倍数收缩
        - 1500-2500 亿美元的下行区间
        - 相对 3800 亿美元下行明显，相对传闻 8500-9000 亿美元下行严重
        - 在缺乏私募财务时不可排除。
    notes: 情景区间是承销区间，并非正式 DCF 输出。
