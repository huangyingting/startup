  - number: 9
    title: 投资与估值
    sections:
      - number: '9.1'
        title: Investment thesis
        blocks:
          - type: paragraph
            title: Investment thesis
            body: |-
              Anthropic is one of the few private companies with credible evidence of public-company-scale AI revenue,
              deep enterprise adoption, top-tier product capability, and strategic compute access. The current thesis is
              that Claude can become a critical workflow and developer platform rather than a replaceable model endpoint.
              The thesis is strongest if $30B+ run-rate revenue converts into high-quality net revenue with durable
              retention, improving compute efficiency, and expanding enterprise workflows.
            calloutType: null
