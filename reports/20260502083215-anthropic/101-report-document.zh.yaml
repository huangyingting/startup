      - number: '9.2'
        title: Anti-thesis
        blocks:
          - type: paragraph
            title: Anti-thesis
            body: |-
              The anti-thesis is valuation and evidence quality. Anthropic's public disclosures do not provide net revenue,
              gross margin, CAC, NRR, GRR, burn, customer concentration, or preference-stack detail. Compute commitments
              can operate like fixed obligations, legal exposure remains non-trivial, and quality regressions can affect
              developer trust. At $380B, these gaps are acceptable only if diligence proves best-in-class economics; at
              $850B-$900B, the burden of proof becomes extreme.
            calloutType: null
            tableRef: null
