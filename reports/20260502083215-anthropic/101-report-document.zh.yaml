    rows:
      - - 投资建议
        - 跟踪 / 有条件参与
        - 规模与产品质量极佳，但估值与披露缺口仍重大
        - 不基于公开数据发出买入。
      - - 置信度
        - 中
        - 官方收入/客户/融资锚点强劲；利润率、净收入、净收入留存率与集中度缺失
        - 在定价之前要求私募尽调。
      - - 风险评级
        - 高
        - 版权和解、算力承诺、可靠性事件、滥用控制与客户集中度的不透明
        - 采用小额仓位与止损触发器。
      - - 估值立场
        - 在 3800 亿美元偏高但可观察；在 8500-9000 亿美元下若无新证据则缺乏吸引力
        - 3800 亿美元下当前运行率倍数 12.7 倍；8500-9000 亿美元在 300 亿美元以上收入下为 28-30 倍
        - 设定硬性入场纪律。
      - - 退出路径
        - IPO
        - Crunchbase 称 Anthropic 与 OpenAI 据报道正在考虑 IPO；第三方 IPO 时间主张可靠性较低
        - 视 IPO 为可能路径，但时机未确认。
