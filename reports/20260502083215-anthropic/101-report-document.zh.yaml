  - id: T802
    title: 投资论点与反向论点
    columns:
      - 立场
      - 论据
      - 证据
      - 改变观点的条件
    rows:
      - - 论点
        - 拥有真正企业规模的前沿 AI 平台
        - 300 亿美元以上收入运行率、100 万美元以上客户超 1,000 家、财富 10 强中 8 家、Claude Code 规模
        - 验证的净收入、净收入留存率与客户集中度。
      - - 论点
        - 开发者与智能体切入点可复合为工作流基础设施
        - Claude Code、Cowork、Managed Agents、ServiceNow、eSentire 与云分发证据
        - 质量事件后留存的企业用量证据。
      - - 论点
        - 资本与算力可获得性是战略优势
        - 300 亿美元 G 轮；1000 亿美元以上 AWS 承诺；Google/Broadcom TPU 扩张
        - 算力合同条款改善毛利率，而非成为固定成本负担。
      - - 反向论点
        - 估值可能已折现完美执行
        - 已确认的 3800 亿美元估值与传闻中 8500-9000 亿美元的抢投要约
        - 入场低于经尽调支持的公允价值，或新的公开市场可比支撑。
      - - 反向论点
        - 收入质量未在公开层面证明
        - 没有公开的毛利率、净收入、获客成本、净收入留存率、烧钱速度或头部客户清单
        - 经审计的毛对净桥接与队列经济。
      - - 反向论点
        - 法律/安全/运营风险真实存在
        - 15 亿美元 Bartz 和解待最终批准；产品质量事后分析；滥用报告
        - 已了结的法律敞口、验证的控制措施与客户流失数据。
    notes: 论点强；反向论点主要在价格与证据缺口。
