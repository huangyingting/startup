sections:
  - number: '8.1'
    title: Investment thesis
    body: |
      Anthropic is one of the few private companies with credible evidence of public-company-scale AI revenue,
      deep enterprise adoption, top-tier product capability, and strategic compute access. The current thesis is
      that Claude can become a critical workflow and developer platform rather than a replaceable model endpoint.
      The thesis is strongest if $30B+ run-rate revenue converts into high-quality net revenue with durable
      retention, improving compute efficiency, and expanding enterprise workflows.
    claimRefs:
      - C113
      - C114
      - C115
      - C119
      - C101
  - number: '8.2'
    title: Anti-thesis
    body: |
      The anti-thesis is valuation and evidence quality. Anthropic's public disclosures do not provide net revenue,
      gross margin, CAC, NRR, GRR, burn, customer concentration, or preference-stack detail. Compute commitments
      can operate like fixed obligations, legal exposure remains non-trivial, and quality regressions can affect
      developer trust. At $380B, these gaps are acceptable only if diligence proves best-in-class economics; at
      $850B-$900B, the burden of proof becomes extreme.
    claimRefs:
      - C116
      - C117
      - C118
      - C094
      - C101
      - C122
  - number: '8.3'
    title: Valuation framework
    body: |
      The cleanest public valuation framework is a run-rate revenue multiple, because public EBITDA, FCF, gross
      margin, and capex-equivalent compute obligations are unavailable. The $380B Series G mark is about 12.7x
      the $30B+ revenue anchor, or about 9.5x if TechCrunch's closer-to-$40B sourced figure is accurate. The
      rumored $850B-$900B mark is roughly 28x-30x on $30B+ revenue. A DCF would be false precision without
      margins, reinvestment, retention, and long-term compute economics.
    claimRefs:
      - C113
      - C114
      - C116
      - C117
      - C118
  - number: '8.4'
    title: IPO and exit readiness
    body: |
      Anthropic has IPO-scale revenue and funding, but public IPO readiness is not proven without an S-1, audited
      financials, legal risk factors, controls, and governance disclosure. Crunchbase states Anthropic and OpenAI
      are reportedly considering IPOs, while other IPO-timing sources are less reliable and should be treated as
      directional only. The most likely scaled exit is IPO; strategic M&A is unrealistic at the current valuation.
    claimRefs:
      - C113
      - C121
  - number: '8.5'
    title: Final recommendation
    body: |
      Final recommendation is track / conditional participate. Anthropic is too important and too scaled to ignore,
      but public evidence does not justify chasing rumored preemptive marks. A growth investor should pursue access
      only at a valuation that leaves upside after legal, compute, retention, and margin diligence. The preferred
      entry zone is below the confirmed $380B mark unless private data proves exceptional net revenue, gross margin,
      retention, and IPO readiness.
    claimRefs:
      - C113
      - C114
      - C115
      - C116
      - C117
      - C119
      - C094
      - C101
      - C122
