      - - Margin quality
        - Not public
        - 2
        - Gross margin, contribution margin, cloud partner economics, compute commitments.
      - - Customer quality
        - 1,000+ $1M customers and 8/10 Fortune 10, but no NRR/GRR/churn
        - 3
        - Top-account concentration and retention.
      - - Governance
        - PBC and LTBT governance documented
        - 3
        - Public-company shareholder rights, board control, preference stack.
      - - Legal readiness
        - $1.5B settlement pending final hearing; music case pending
        - 2
        - Legal schedule, reserves, insurance, and appeals.
      - - Public-market timing
        - IPO reports exist but no S-1
        - 3
        - Auditor readiness, S-1 draft, banks, and internal controls.
    notes: Scores are 1-5 qualitative public-readiness ratings.
    claimRefs:
