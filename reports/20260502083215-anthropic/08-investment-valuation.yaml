      - C114
      - C115
      - C119
      - C094
      - C120
      - C121
      - C122
  - id: T808
    title: Position sizing and stop-loss triggers
    columns:
      - Area
      - Suggested stance
      - Stop-loss / thesis-break trigger
    rows:
      - - Entry price
        - Do not chase above $380B without new audited evidence
        - New private round above $600B without gross margin, NRR, and net revenue disclosure.
      - - Financial quality
        - Require audited gross-to-net and gross margin bridge
        - Gross margin materially below top-tier software/infrastructure expectations with no path to improvement.
      - - Customer quality
        - Require top-customer schedule and retention cohorts
        - Top 10 customers or partner channels dominate revenue; NRR/GRR materially weak.
      - - Legal/regulatory
        - Require legal reserve and data-provenance diligence
        - Adverse copyright ruling, injunction, or material unreserved liability.
      - - Compute obligations
        - Model AWS/Google/Broadcom commitments like debt-like obligations
        - Committed spend outpaces revenue under downside case.
      - - Product quality
        - Require postmortem action completion and churn analysis
        - Repeated Claude Code/API quality incidents that cause enterprise churn.
    notes: Triggers are measurable asks for investment committee gating.
    claimRefs:
      - C116
      - C119
      - C094
      - C101
      - C122
  - id: T809
    title: Final diligence asks before underwriting
    columns:
      - Ask
      - Priority
      - Why it matters
    rows:
      - - 'Audited revenue bridge: gross billings, net revenue, cloud marketplace fees, credits, refunds'
        - High
        - Determines whether the revenue multiple is real.
      - - Product/channel gross margin and compute commitment schedule
        - High
        - Determines whether AI scale can produce software-like economics.
      - - NRR, GRR, churn, top 25 customers, renewal pipeline, and customer concentration
        - High
        - Determines growth durability and downside.
      - - Legal schedule, settlement accounting, insurance, indemnities, and training-data provenance audit
        - High
        - Determines tail risk and IPO readiness.
      - - Capitalization table, liquidation preferences, strategic investor rights, LTBT/control terms
        - High
        - Determines entry economics and public-market governance.
      - - 'IPO readiness packet: auditor, controls, S-1 draft timeline, banking process, risk factors'
        - Medium
        - Determines exit path and holding-period risk.
      - - Reliability, security, privacy, and misuse-control evidence
        - Medium
        - Determines enterprise trust and regulated-market expansion.
    notes: Without these asks, the right recommendation remains track/research-more, not buy.
    claimRefs:
      - C115
      - C116
      - C119
      - C094
      - C101
      - C120
      - C122
