  - id: T802
    title: Investment thesis and anti-thesis
    columns:
      - Side
      - Argument
      - Evidence
      - What would change the view
    rows:
      - - Thesis
        - Frontier AI platform with genuine enterprise scale
        - $30B+ run-rate revenue, 1,000+ $1M customers, 8/10 Fortune 10, and Claude Code scale
        - Verified net revenue, NRR, and customer concentration.
      - - Thesis
        - Developer and agent wedge can compound into workflow infrastructure
        - Claude Code, Cowork, Managed Agents, ServiceNow, eSentire, and cloud distribution evidence
        - Proof of retained enterprise usage after quality incidents.
      - - Thesis
        - Capital and compute access are strategic advantages
        - $30B Series G; $100B+ AWS commitment; Google/Broadcom TPU expansion
        - Compute contract terms improve gross margin rather than becoming fixed-cost overhang.
      - - Anti-thesis
        - Valuation may already discount flawless execution
        - $380B confirmed mark and $850B-$900B rumored preemptive offers
        - Entry below diligence-supported fair value or new public-market comp support.
      - - Anti-thesis
        - Revenue quality is not proven publicly
        - No public gross margin, net revenue, CAC, NRR, burn, or top-customer schedule
        - Audited gross-to-net bridge and cohort economics.
      - - Anti-thesis
        - Legal/safety/operational risks are real
        - $1.5B Bartz settlement pending final approval; product-quality postmortems; misuse reports
        - Closed legal exposure, verified controls, and customer churn data.
    notes: The thesis is strong; the anti-thesis is mostly about price and evidence gaps.
    claimRefs:
