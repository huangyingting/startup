callouts:
  - type: key-insight
    title: The confirmed mark is high but not absurd on current run-rate revenue.
    body: |
      At $380B post-money and $30B+ current run-rate revenue, Anthropic trades at roughly 12.7x run-rate
      revenue before adjusting for cash, preferences, cloud partner economics, or net revenue. That multiple can
      work only if margins and retention are much stronger than public evidence currently proves.
    claimRefs:
      - C113
      - C114
      - C115
      - C116
  - type: risk-alert
    title: The rumored $850B-$900B mark is a different underwriting problem.
    body: |
      TechCrunch reports preemptive offers around $40B-$50B at an $850B-$900B valuation. That range implies
      roughly 28x-30x the $30B+ run-rate revenue anchor, or 21x-22.5x if the sourced closer-to-$40B run-rate is
      accurate. Public data does not support chasing that entry without private margin, retention, and IPO proof.
    claimRefs:
      - C116
      - C117
      - C118
tables:
  - id: T801
    title: Recommendation summary
    columns:
      - Dimension
      - Assessment
      - Evidence
      - Decision implication
    rows:
      - - Recommendation
        - Track / conditional participate
        - Scale and product quality are exceptional, but valuation and disclosure gaps remain material
        - Do not issue a public-data buy.
      - - Confidence
        - Medium
        - Official revenue/customer/funding anchors are strong; margin, net revenue, NRR, and concentration are missing
        - Require private diligence before pricing.
      - - Risk rating
        - High
        - >-
          Copyright settlement, compute commitments, reliability incidents, misuse controls, and customer concentration
          opacity
        - Use small position sizing and stop-loss triggers.
      - - Valuation stance
        - Expensive but watchable at $380B; unattractive at $850B-$900B without new proof
        - 12.7x current run-rate revenue at $380B; 28x-30x at $850B-$900B on $30B+ revenue
        - Set hard entry discipline.
      - - Exit route
        - IPO
        - >-
          Crunchbase says Anthropic and OpenAI are reportedly considering IPOs; third-party IPO-date claims are less
          reliable
        - Treat IPO as likely route but timing unconfirmed.
      - - Target return
        - null
        - No public gross margin, FCF, liquidation preference, or share price data
        - Do not calculate false-precision IRR.
    notes: This recommendation is intentionally price-sensitive.
