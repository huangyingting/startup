schemaVersion: startup-diligence-report-v2
artifact: investment-valuation
slug: anthropic
runDate: 2026-05-02
company:
  name: Anthropic
  website: https://www.anthropic.com/
chapter:
  number: 8
  title: Investment & Valuation
  summary: |
    Anthropic is an elite late-stage AI investment candidate, but the public valuation evidence argues for
    discipline rather than a blind buy. The confirmed $380B Series G equates to about 12.7x the current $30B+
    run-rate revenue disclosure, which can be supportable if net revenue, gross margin, retention, and compute
    efficiency are strong. The rumored $850B-$900B preemptive valuation would imply about 28x-30x the same
    revenue anchor and is not underwritable from public data without exceptional margin, retention, and IPO
    evidence. Recommendation: track / participate only with verified private diligence and valuation protection.
  claimRefs:
    - C113
    - C114
    - C115
    - C116
    - C117
    - C118
    - C119
    - C094
    - C101
    - C120
    - C121
    - C122
recommendation:
  action: track
  confidence: medium
  riskRating: significant
  valuationStance: expensive
  targetReturn: null
  suggestedHoldPeriod: 3-5 years if entry is at or below a diligence-supported valuation
  exitRoute: IPO is the most likely scaled exit; strategic acquisition is implausible at current scale.
  positionSizing: Small, valuation-capped growth allocation only after private financial, legal, and customer diligence.
  claimRefs:
    - C113
    - C114
    - C115
