  - id: T804
    title: Bull / base / bear scenarios
    columns:
      - Scenario
      - Assumptions
      - Valuation view
      - Return logic
      - Probability signal
    rows:
      - - Bull
        - >-
          Run-rate revenue continues compounding, NRR is very high, gross margins improve through routing/caching/custom
          silicon, legal costs are contained, IPO opens at a frontier-AI premium
        - $600B-$900B could be supportable over time
        - Upside from $380B if public investors accept 20x-30x revenue for a hypergrowth AI leader
        - Possible but requires private evidence.
      - - Base
        - >-
          $30B+ run-rate is real but gross-to-net, margin, compute obligations, and customer concentration reduce
          quality; IPO multiple normalizes toward high-growth infrastructure software
        - $300B-$500B fair-value range before preference/cash adjustments
        - Limited upside from $380B unless metrics verify best-in-class economics
        - Most prudent public-data stance.
      - - Bear
        - >-
          Revenue decelerates, gross margin is structurally low, legal/licensing costs rise, quality issues hurt
          retention, or public AI multiples compress
        - $150B-$250B downside range
        - Material downside versus $380B and severe downside versus rumored $850B-$900B
        - Cannot be dismissed without private financials.
    notes: Scenario ranges are underwriting bands, not formal DCF outputs.
