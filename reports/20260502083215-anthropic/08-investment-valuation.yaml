  - id: T806
    title: Public and private comparable lens
    columns:
      - Comparable / class
      - Valuation evidence
      - Relevance
      - Limitation
    rows:
      - - OpenAI
        - TechCrunch says OpenAI closed a $122B round at an $852B post-money valuation in February 2026
        - Closest frontier-model valuation benchmark
        - Different distribution, governance, and accounting profile.
      - - Anthropic
        - $380B confirmed Series G; $850B-$900B preemptive offers reported but not closed
        - Direct target
        - Private marks do not equal public-market clearing price.
      - - Databricks / AI infrastructure private peers
        - Search evidence suggests infra leaders can command high private multiples
        - Useful for AI infrastructure premium
        - Public-source data inconsistent and not independently verified here.
      - - Snowflake / Palantir / high-growth software
        - Public software peers provide margin and cash-flow discipline
        - Useful downside multiple anchor
        - Anthropic grows faster but may have lower gross margin and higher capex-like obligations.
      - - Nvidia / Microsoft
        - Mega-cap AI beneficiaries
        - Show scale of AI opportunity and public-market appetite
        - Not direct software/model-lab comps due hardware/cloud economics.
    notes: This report avoids relying on precise third-party public-comp multiples because source quality is uneven.
