evidenceGaps:
  - gap: Exact current employee count and contractor inclusion are not company-confirmed.
    impact: medium
    diligencePath: Request HRIS headcount by function, region, employee/contractor type, and monthly hiring plan.
  - gap: Gross margin, net revenue, cloud-provider take rates, CAC, NRR, and cohort retention are not publicly disclosed.
    impact: high
    diligencePath: Obtain audited or board-approved financial package with product and channel-level unit economics.
  - gap: Named Fortune 10 and $1M+ customers are mostly undisclosed.
    impact: high
    diligencePath: Review anonymized customer cohort data, concentration schedule, references, and production versus pilot
      classification.
  - gap: Copyright settlement final approval, reserves, indemnities, and training-data licensing posture require legal diligence.
    impact: high
    diligencePath: Review court docket, settlement approval order, legal reserve schedule, and data provenance controls.
  - gap: No clean independent estimate isolates Anthropic's enterprise foundation-model, coding, agent, and regulated-workflow
      SAM without overlap.
    impact: high
    diligencePath: Build a bottoms-up SAM from customer counts, API usage, cloud marketplace data, seat penetration, coding
      teams, and regulated-workflow spend.
  - gap: AI coding assistant and agent market estimates are early and weakly corroborated in public sources.
    impact: medium
    diligencePath: Purchase analyst reports or triangulate with vendor ARR, developer survey panels, and enterprise procurement
      data.
  - gap: Regional revenue and adoption mix for Anthropic is undisclosed.
    impact: medium
    diligencePath: Request revenue by geography, data residency needs, regulated-sector mix, and EU AI Act readiness.
  - gap: Reliable, independent enterprise market-share data by LLM provider is not available from reviewed public sources.
    impact: high
    diligencePath: Request customer overlap studies, cloud marketplace consumption data, and third-party enterprise buyer
      surveys.
  - gap: API pricing and volume discounts for OpenAI, Google, and Anthropic are contract-specific and change quickly.
    impact: high
    diligencePath: Compare actual enterprise invoices, committed-use discounts, token mix, caching rates, and support/SLA
      terms.
  - gap: Customer switching, multi-homing, and churn versus OpenAI/Gemini/Copilot/Cursor are not independently quantified.
    impact: high
    diligencePath: Obtain Anthropic cohort retention, competitive displacement logs, win/loss notes, and renewal-call transcripts.
  - gap: Public benchmark leaderboards do not fully capture regulated-enterprise workflow value, security, or total cost.
    impact: medium
    diligencePath: Run customer-owned benchmark suites across Claude, GPT, Gemini, Copilot, Cursor, Llama/Mistral, and DeepSeek-like
      models.
  - gap: Net revenue, gross margin, and product/channel-level contribution margin are not company-disclosed.
    impact: high
    diligencePath: Request audited revenue recognition memo, gross-to-net bridge, cloud-channel statements, product-level
      COGS, and margin by API/Claude Code/Enterprise.
  - gap: CAC, LTV, NRR, GRR, payback, and customer concentration are not public.
    impact: high
    diligencePath: Review cohort retention, sales efficiency, top-customer schedule, renewal pipeline, and expansion by use
      case.
  - gap: Burn, runway, compute commitments, cloud credits, and training/inference prepaids are not public in a reliable company-confirmed
      form.
    impact: high
    diligencePath: Obtain board-approved cash-flow forecast, committed compute contracts, prepaid schedule, cloud credits,
      and debt/off-balance-sheet obligations.
  - gap: Current $30B+ run-rate revenue needs a clear definition of gross versus net run-rate and channel accounting.
    impact: medium
    diligencePath: Ask management for monthly revenue bridge from December 2025 through April 2026 by product, channel, customer
      segment, and recognition basis.
  - gap: Trust center certification list, SOC 2 report details, ISO scope, HIPAA/BAA terms, and penetration-test evidence
      were not visible in fetched public content.
    impact: high
    diligencePath: Request Vanta trust-center access, SOC reports, ISO certificates, BAA, DPA, pen-test summaries, and security
      questionnaire.
  - gap: Official SLA, uptime percentage, incident severity taxonomy, and enterprise service-credit terms are not established
      from public status content.
    impact: medium
    diligencePath: Review master services agreement, SLA exhibit, incident history export, and customer notification policy.
  - gap: Detailed model routing, context-window limits by plan, rate limits, data retention by API surface, and private deployment/VPC
      options are not fully captured.
    impact: medium
    diligencePath: Review full platform docs, contract terms, enterprise architecture guide, and cloud marketplace feature
      parity.
  - gap: Agent Skills and MCP supply-chain governance, permissioning, and prompt-injection defenses need evidence beyond engineering
      narrative.
    impact: high
    diligencePath: Review connector threat model, OAuth vault design, audit logs, allowlist policies, and red-team results.
  - gap: Anthropic-specific NRR, GRR, logo churn, renewal rates, NPS, CSAT, and support SLA metrics are not public.
    impact: high
    diligencePath: Request cohort retention by product/channel/segment, renewal pipeline, churn reasons, NPS/CSAT, support
      tickets, and SLA credits.
  - gap: Customer concentration and top-account exposure are not company-disclosed.
    impact: high
    diligencePath: Review top 10/25 revenue, partner/customer dependency, Cursor/GitHub/developer-tool exposure, and contract
      renewal terms.
  - gap: Production versus pilot mix for named customers is unevenly disclosed.
    impact: medium
    diligencePath: Classify each major customer by paid pilot, production deployment, platform embedding, internal rollout,
      and downstream customer exposure.
  - gap: Case-study outcomes are mostly company/customer-claimed and not independently audited.
    impact: medium
    diligencePath: Conduct reference calls and request raw usage, outcome methodology, and before/after baselines.
  - gap: Complete litigation schedule, reserves, insurance coverage, indemnities, and future data-licensing controls are not
      public.
    impact: high
    diligencePath: Request legal docket map, reserve model, settlement accounting, insurer communications, data-provenance
      audit, and training-license inventory.
  - gap: Compute commitments are public at high level but not enough to model cash obligations, cancellation rights, gross
      margin, or related-party accounting.
    impact: high
    diligencePath: Review AWS/Google/Broadcom contracts, committed minimums, cloud credits, price-performance curves, and
      Board-approved infrastructure plan.
  - gap: Public trust center content does not expose complete SOC/ISO/HIPAA/BAA/pentest/security-report details in fetched
      static content.
    impact: high
    diligencePath: Obtain security packet, SOC 2 report, ISO certificates, HIPAA/BAA terms, penetration tests, VDP/bug-bounty
      results, and incident-response tabletop records.
  - gap: Safety-governance artifacts are public, but operational evidence of compliance, incident escalation, and board oversight
      is not.
    impact: medium
    diligencePath: Review RSP/FCF implementation logs, LTBT materials, risk reports, red-team results, noncompliance reports,
      and whistleblower channel history.
  - gap: Customer concentration, NRR, GRR, churn, and support/SLA credit history remain undisclosed.
    impact: high
    diligencePath: Request top-account schedule, renewal cohorts, support escalations, incident credits, churn reasons, and
      March-April 2026 customer impact analysis.
  - gap: No public audited financials, gross margin, net revenue, EBITDA, free cash flow, burn, or compute-obligation schedule.
    impact: high
    diligencePath: Obtain audited financials, revenue-recognition memo, cloud-channel statements, gross-to-net bridge, and
      infrastructure commitments.
  - gap: No public NRR, GRR, churn, customer concentration, cohort expansion, or renewal schedule.
    impact: high
    diligencePath: Review top 25 customers, cohort retention, product/channel revenue, renewal pipeline, churn reasons, and
      support escalations.
  - gap: No public capitalization table, liquidation preference stack, strategic investor rights, or LTBT/control terms sufficient
      for entry economics.
    impact: high
    diligencePath: Review full cap table, rights agreements, preference waterfall, board/control provisions, and IPO governance
      plan.
  - gap: IPO timing and readiness are directional only without S-1, audited public-company controls, bank engagement proof,
      or risk-factor disclosure.
    impact: medium
    diligencePath: Request IPO readiness packet, auditor status, internal controls, draft risk factors, and board approval
      path.
  - gap: Public comparables are directionally useful but not reliable enough for a precise multiple without updated trading
      data and margin comparability.
    impact: medium
    diligencePath: Build a current comp set from audited public filings and verified private-market data before investment
      committee.
