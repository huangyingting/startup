        title: IPO and exit readiness
        blocks:
          - type: paragraph
            title: IPO and exit readiness
            body: |-
              Anthropic has IPO-scale revenue and funding, but public IPO readiness is not proven without an S-1, audited
              financials, legal risk factors, controls, and governance disclosure. Crunchbase states Anthropic and OpenAI
              are reportedly considering IPOs, while other IPO-timing sources are less reliable and should be treated as
              directional only. The most likely scaled exit is IPO; strategic M&A is unrealistic at the current valuation.
