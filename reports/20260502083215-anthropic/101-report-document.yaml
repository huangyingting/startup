  - number: 9
    title: Investment & Valuation
    sections:
      - number: '9.1'
        title: Investment thesis
        blocks:
          - type: paragraph
            title: Investment thesis
            body: |-
              Anthropic is one of the few private companies with credible evidence of public-company-scale AI revenue,
              deep enterprise adoption, top-tier product capability, and strategic compute access. The current thesis is
              that Claude can become a critical workflow and developer platform rather than a replaceable model endpoint.
              The thesis is strongest if $30B+ run-rate revenue converts into high-quality net revenue with durable
              retention, improving compute efficiency, and expanding enterprise workflows.
            calloutType: null
            tableRef: null
            figureRef: null
            items: []
            equation: null
            claimRefs:
              - C113
              - C114
              - C115
              - C119
              - C101
          - type: callout
            title: The confirmed mark is high but not absurd on current run-rate revenue.
            body: |-
              At $380B post-money and $30B+ current run-rate revenue, Anthropic trades at roughly 12.7x run-rate
              revenue before adjusting for cash, preferences, cloud partner economics, or net revenue. That multiple can
              work only if margins and retention are much stronger than public evidence currently proves.
            calloutType: key-insight
            tableRef: null
            figureRef: null
