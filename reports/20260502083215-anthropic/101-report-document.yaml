      - number: '8.2'
        title: Legal and regulatory risk
        blocks:
          - type: paragraph
            title: Legal and regulatory risk
            body: |-
              Copyright/data provenance is the most concrete legal risk. Bartz has a $1.5B settlement fund and a final
              approval hearing scheduled after the report date. The settlement reduces uncertainty but does not close
              music-publisher litigation, future rightsholder claims, licensing cost escalation, or the need to prove
              that future training corpora are licensed, permissioned, or otherwise defensible. Frontier AI regulation is
              a second high-impact cluster; California SB 53 turns many safety transparency practices into mandatory
              obligations for large developers, and Anthropic's FCF is now part of its compliance posture.
