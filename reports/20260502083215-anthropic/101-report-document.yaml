        title: Buyer budgets and segment logic
        blocks:
          - type: paragraph
            title: Buyer budgets and segment logic
            body: |-
              Claude sells into CIO/CTO, engineering, compliance, and function-owner budgets. Budget substitution can
              come from legacy automation, developer tools, business intelligence, contact center, content production,
              and professional-services workflows, while expansion budgets come from AI infrastructure, cloud AI
              services, copilots, and digital-transformation programs. The most attractive segments are high-value
              workflows where long context, safety controls, tool use, and agentic execution matter.
