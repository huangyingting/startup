  - id: F102
    title: Financing and scale milestones
    type: timeline
    layout: standard
    summary: Public milestones showing Anthropic's movement from founding to late-stage hyper-scale.
    data:
      items:
        - date: '2021'
          label: Anthropic founded
          detail: Public benefit corporation founded in San Francisco by former OpenAI personnel including Dario Amodei, Daniela
            Amodei, Jared Kaplan, Jack Clark, and Chris Olah; organized around AI safety and research.
          tone: neutral
        - date: 2023-03
          label: Claude generally available
          detail: First public release of the Claude assistant; product becomes the company's primary commercial surface.
          tone: positive
        - date: 2023-09
          label: Strategic Amazon investment announced
          detail: Amazon committed up to $4B and Anthropic named AWS its primary cloud provider, anchoring the multi-year
            compute relationship.
          tone: opportunity
        - date: 2023-10
          label: Strategic Google Cloud investment announced
          detail: Google reportedly invested up to $2B alongside an existing cloud partnership, strengthening the multi-cloud
            distribution posture.
          tone: opportunity
        - date: 2024-03
          label: Claude 3 model family released
          detail: Opus / Sonnet / Haiku tiering establishes the price/performance routing model that anchors today's API pricing.
          tone: positive
        - date: 2024-11
          label: Model Context Protocol (MCP) announced
          detail: Open standard for connecting Claude to external tools and data; later becomes the integration substrate
            for enterprise agent workflows.
          tone: positive
        - date: 2025-02
          label: Claude 3.7 / extended-thinking generation
          detail: Reasoning-focused model release strengthens Claude's position on coding and long-horizon agent benchmarks.
          tone: positive
        - date: 2025-05
          label: Claude Code generally available
          detail: Agentic coding product later disclosed to exceed $2.5B run-rate revenue with enterprise use over half of
            revenue.
          tone: positive
        - date: 2025-09
          label: Series F at $183B post-money
          detail: $13B raised in the Series F, the prior valuation anchor before the February 2026 Series G; cited by current
            funding coverage.
          tone: neutral
        - date: 2025-09
          label: Bartz authors copyright settlement reached
          detail: $1.5B settlement fund preliminarily approved with final approval scheduled for May 14, 2026; quantifies
            one major training-data legal exposure.
          tone: risk
        - date: 2026-02
          label: $30B Series G at $380B post-money
          detail: Led by GIC and Coatue with a broad late-stage syndicate; includes a portion of previously announced Microsoft
            and NVIDIA investments. Run-rate revenue at $14B and 500+ $1M-annualized customers disclosed at the same time.
          tone: positive
        - date: 2026-04
          label: Google / Broadcom TPU expansion + $30B+ run-rate disclosed
          detail: Multiple-gigawatt next-generation TPU capacity announced for 2027; same disclosure says run-rate revenue
            surpassed $30B and customers spending over $1M annually exceeded 1,000.
          tone: positive
    approximationNotes: Month-level timing is used where public sources did not provide exact close mechanics; events between
