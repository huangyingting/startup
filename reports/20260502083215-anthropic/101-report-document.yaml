    title: Anthropic company snapshot logic
    type: logic-chain
    layout: wide
    summary: A compact map of the company-level thesis, monetization vectors, exit path, and risk nodes for downstream report
      synthesis.
    data:
      nodes:
        - label: Frontier model platform
          detail: Claude spans chat, API, enterprise products, Claude Code, Cowork, and workflow integrations.
          tone: positive
