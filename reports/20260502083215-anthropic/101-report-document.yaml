      - number: '9.5'
        title: Final recommendation
        blocks:
          - type: paragraph
            title: Final recommendation
            body: |-
              Final recommendation is track / conditional participate. Anthropic is too important and too scaled to ignore,
              but public evidence does not justify chasing rumored preemptive marks. A growth investor should pursue access
              only at a valuation that leaves upside after legal, compute, retention, and margin diligence. The preferred
              entry zone is below the confirmed $380B mark unless private data proves exceptional net revenue, gross margin,
