      - number: '3.2'
        title: Market size and growth
        blocks:
          - type: paragraph
            title: Market size and growth
            body: |-
              The market is large enough to support a public-company-scale outcome if Anthropic sustains share. Coherent
              Market Insights estimates generative AI at $121.1B in 2026 with a 33.2% CAGR to 2033. Mordor estimates
              enterprise AI at $114.87B in 2026, growing to $273.08B by 2031. More directly relevant submarkets are
              earlier: AI agents at roughly $10.9B-$12.1B in 2026 and AI coding assistants at $12.8B. Anthropic's $14B
              run-rate revenue is therefore already large relative to tight submarket proxies, implying that Claude's
              monetization crosses several market definitions.
            calloutType: null
            tableRef: null
            figureRef: null
            items: []
