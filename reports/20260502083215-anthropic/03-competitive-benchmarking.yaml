sections:
  - number: '3.1'
    title: Competitive landscape
    body: |
      Anthropic's competitive set is broader than OpenAI. Direct frontier-model peers include OpenAI,
      Google DeepMind/Gemini, xAI, Meta/Llama, and Mistral. Distribution incumbents include Microsoft,
      GitHub, Google Workspace/Cloud, AWS marketplaces, and enterprise software vendors embedding models
      behind workflow products. Developer-focused rivals include GitHub Copilot, Cursor, Codex-style agents,
      and open-source coding agents. The result is a market where customers can multi-home and route tasks
      by model quality, price, data policy, context window, workflow surface, or cloud contract.
    claimRefs:
      - C033
      - C034
      - C036
      - C037
      - C038
      - C039
  - number: '3.2'
    title: Capability and benchmark position
    body: |
      Artificial Analysis places GPT-5.5 variants at the top of its intelligence leaderboard, followed by
      Claude Opus 4.7 and Gemini 3.1 Pro Preview. This is favorable because Claude remains among the leading
      models, but it is also a warning: frontier capability is a moving target, and the gap between top vendors
      is not large enough to underwrite durable pricing power on intelligence alone.
    claimRefs:
      - C033
  - number: '3.3'
    title: Product and packaging differentiation
    body: |
      Anthropic's strongest packaging advantage is the combination of Claude Code, Claude Cowork, enterprise
      controls, and multi-cloud availability. The official pricing page shows consumer, team, and enterprise
      plans, while the enterprise plan adds spend controls, SCIM, audit logs, Compliance API, custom retention,
      network access controls, IP allowlisting, and HIPAA-ready availability. This positions Anthropic well for
      regulated and high-trust buyers, though Microsoft and Google can bundle similar buyer trust into broader
      productivity and cloud contracts.
    claimRefs:
      - C034
      - C035
      - C041
  - number: '3.4'
    title: Developer workflow competition
    body: |
      Claude Code is a major strategic asset because Anthropic reports more than $2.5B in run-rate revenue and
      rapid growth. But developer workflow ownership remains contested. GitHub Copilot has official Free, Pro,
      and Pro+ plans with agent mode, code review, cloud agent, CLI, MCP integration, and enterprise management
      features. Cursor targets AI IDE and team workflows with Pro+, Ultra, Teams, and Enterprise packaging,
      admin dashboards, privacy mode, pooled usage, and advanced security. These rivals can own the daily
      developer surface even when Claude models remain part of the backend.
    claimRefs:
      - C036
      - C037
      - C040
      - C042
      - C043
      - C044
  - number: '3.5'
    title: Competitive risk and moat verdict
    body: |
      Anthropic's moat is real but not absolute. Its defense is strongest where customers value safe behavior,
      long-context reasoning, agentic coding, enterprise administration, and model availability across cloud
      platforms. It is weakest where workloads are price-sensitive, easy to route across providers, or suitable
      for open-weight/self-hosted models. The investment case should therefore require evidence of durable net
      retention, product-level gross margin, and workflow-specific lock-in rather than relying on brand or model
      benchmark leadership alone.
    claimRefs:
      - C033
      - C034
      - C035
      - C037
      - C038
      - C039
      - C045
      - C046
