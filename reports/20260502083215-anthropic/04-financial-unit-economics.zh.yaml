sections:
  - number: '4.1'
    title: 收入模型
    body: |
      Anthropic 通过多触面 AI 平台变现：基于 token 的 API 用量、Claude 应用订阅、Team 与 Enterprise
      席位、Claude Code、Claude Cowork、托管智能体、Web 搜索与代码执行等功能附加，以及云市场分发。
      这一组合可支持高收入速度，但也带来毛利率复杂性——重度用户的推理与运行时资源消耗可能与
      席位价格相差极大。
    claimRefs:
      - C049
      - C050
      - C051
      - C052
      - C053
  - number: '4.2'
    title: 收入规模与增长锚点
    body: |
      当前官方锚点是 Anthropic 2026 年 4 月的 Google/Broadcom 算力公告：收入运行率已超过 300 亿
      美元，相较 2025 年底约 90 亿美元和 2026 年 2 月披露的 140 亿美元有大幅增长。TechCrunch 另行
      报道一位熟悉财务的知情人士称运行率接近 400 亿美元。本报告将 300 亿美元以上视作公司确认数据，
      但仍需管理层确认收入定义、渠道会计与毛对净处理方式。
    claimRefs:
      - C006
      - C059
  - number: '4.3'
    title: 融资、估值与跑道姿态
    body: |
      Anthropic 宣布由 GIC 与 Coatue 领投的 300 亿美元 G 轮，投后估值 3800 亿美元，财团非常广泛，
      并包含此前宣布的部分 Microsoft 与 NVIDIA 投资。TechCrunch 此后报道在 8500-9000 亿美元估值下
      400-500 亿美元的多笔抢投要约，但截至文章日期尚未完成。资本可获得性看起来异常，但如此短时间
      内再次融资的意愿应结合算力强度与在 IPO 前延长现金跑道的诉求来解读。
    claimRefs:
      - C047
      - C048
      - C059
  - number: '4.4'
    title: 利润率与单位经济模型
    body: |
      Anthropic 未公开披露毛利率、净收入、云市场分成、获客成本、客户终身价值、回收期、净收入留存
      率、烧钱速度或自由现金流。第三方报道指控存在毛对净报告差异、算力成本压力、客户集中度与
      持续亏损，但最有力的结论是公共证据不足以计算贡献利润率。严肃的投资流程必须按 API、
      Claude Code、Enterprise 与云市场渠道获取产品级收入与成本。
    claimRefs:
      - C054
      - C057
      - C058
      - C060
      - C061
      - C062
  - number: '4.5'
    title: 财务承销结论
    body: |
      收入质量是财务尽调的核心话题。Anthropic 拥有未来巨型软件公司的营收规模，但公开记录尚未证明
      软件式利润率或留存。如果增长能在净额口径下持续、算力效率改善且企业工作流产品维持溢价定价，
      公司仍可能具吸引力；如果收入通过云渠道毛额化、集中于少数模型消费客户或依赖被补贴的推理，
      则在财务上具风险。
    claimRefs:
      - C006
      - C047
      - C048
      - C054
      - C057
      - C058
      - C060
      - C061
      - C062
