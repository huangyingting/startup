sections:
  - number: '4.1'
    title: Revenue model
    body: |
      Anthropic monetizes a multi-surface AI platform: token-based API usage, Claude app subscriptions, Team
      and Enterprise seats, Claude Code, Claude Cowork, managed agents, feature add-ons such as web search and
      code execution, and cloud marketplace distribution. This mix can support high revenue velocity, but it
      also creates gross-margin complexity because heavy users may consume materially different inference and
      runtime resources from seat price alone.
    claimRefs:
      - C049
      - C050
      - C051
      - C052
      - C053
  - number: '4.2'
    title: Revenue scale and growth anchors
    body: |
      The current official anchor is Anthropic's April 2026 Google/Broadcom compute announcement: run-rate
      revenue had surpassed $30B, up from approximately $9B at the end of 2025 and the $14B disclosed in
      February 2026. TechCrunch separately reported that a person familiar with the financials said the run-rate
      was closer to $40B. The report should treat $30B+ as company-confirmed while still requiring management
      confirmation of revenue definition, channel accounting, and gross-versus-net treatment.
    claimRefs:
      - C006
      - C059
  - number: '4.3'
    title: Funding, valuation, and runway posture
    body: |
      Anthropic announced a $30B Series G at a $380B post-money valuation led by GIC and Coatue, with a very
      broad syndicate and a portion of previously announced Microsoft and NVIDIA investments. TechCrunch later
      reported multiple preemptive offers for a $40B-$50B round at an $850B-$900B valuation, but that was not
      closed as of the article. Capital access appears extraordinary, yet the willingness to raise again so soon
      should be interpreted alongside compute intensity and the desire to extend runway before an IPO.
    claimRefs:
      - C047
      - C048
      - C059
  - number: '4.4'
    title: Margin and unit economics
    body: |
      Anthropic does not publicly disclose gross margin, net revenue, cloud marketplace take rates, CAC, LTV,
      payback, NRR, burn, or free cash flow. Third-party reports allege gross-versus-net reporting differences,
      compute-cost pressure, customer concentration, and ongoing losses, but the strongest conclusion is that
      public evidence is insufficient to calculate contribution margin. A serious investment process must obtain
      product-level revenue and cost by API, Claude Code, Enterprise, and cloud marketplace channel.
    claimRefs:
      - C054
      - C057
      - C058
      - C060
      - C061
      - C062
  - number: '4.5'
    title: Financial underwriting verdict
    body: |
      Revenue quality is the central financial diligence topic. Anthropic has the top-line scale of a future
      mega-cap software company, but the public record does not yet prove software-like margins or retention.
      The company may still be attractive if growth is net-retained, compute efficiency improves, and enterprise
      workflow products sustain premium pricing; it is financially risky if revenue is grossed-up through cloud
      channels, concentrated in a few model-consuming customers, or dependent on subsidized inference.
    claimRefs:
      - C006
      - C047
      - C048
      - C054
      - C057
      - C058
      - C060
      - C061
      - C062
