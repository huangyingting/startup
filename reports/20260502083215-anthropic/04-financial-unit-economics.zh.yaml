      - 公开证据
      - 定价 / 变现
      - 质量评估
      - 关键尽调缺口
    rows:
      - - Claude API / 平台
        - Claude 通过直接 API 与主要云平台均可获得
        - >-
          基于 token 的 Opus/Sonnet/Haiku 定价，配以提示缓存、批量折扣、托管智能体与 Web 搜索附加
        - 战略价值高，但毛对净经济不清晰
        - 云渠道分成、承诺用量折扣与净收入留存率。
      - - Claude 订阅
        - Free、Pro、Max、Team、Enterprise 计划均已公开列出
        - Pro 年付每月 17 美元或月付 20 美元；Max 起售每月 100 美元；Team 每席位 20-25 美元或 100-125 美元
        - 席位收入可预测，但用量强度可能造成利润率波动
