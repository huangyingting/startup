  - id: T403
    title: Pricing and usage economics
    columns:
      - Offering
      - Public price
      - Usage cost driver
      - Financial implication
    rows:
      - - Opus 4.7 API
        - $5 / MTok input; $25 / MTok output
        - High-intelligence agent and coding workloads
        - Premium pricing but likely high inference cost.
      - - Sonnet 4.6 API
        - $3 / MTok input; $15 / MTok output
        - Balanced intelligence/cost use cases
        - Likely core enterprise/API workhorse.
      - - Haiku 4.5 API
        - $1 / MTok input; $5 / MTok output
        - High-volume lower-complexity workloads
        - Supports margin defense and routing by workload.
      - - Prompt cache reads
        - $0.50 / MTok Opus; $0.30 Sonnet; $0.10 Haiku
        - Repeated context and workflow state
        - Caching can materially improve gross margin on repetitive enterprise tasks.
      - - Managed agents
        - $0.08 per session-hour plus token rates
        - Runtime time plus model tokens
        - Agent product monetizes orchestration separately from tokens.
      - - Web search
        - $10 / 1K searches plus tokens
        - External information retrieval
        - Feature add-ons create non-token revenue but require cost controls.
      - - Team seats
        - $20-$25 or $100-$125 per seat/month depending tier and billing
        - Seat count and included usage
        - Seat revenue can be predictable; usage intensity can compress margin.
    notes: >-
      Prices are list prices and exclude enterprise discounts, committed spend, taxes, regional uplifts, and partner
      terms.
