schemaVersion: startup-diligence-report-v2
artifact: financial-unit-economics
slug: anthropic
runDate: 2026-05-02
company:
  name: Anthropic
  website: https://www.anthropic.com/
chapter:
  number: 4
  title: 财务与单位经济模型
  summary: |
    Anthropic 的财务画像在收入规模与资本可获得性上极为出色，但在经济质量上披露不足。官方证据
    支持 2026 年 4 月收入运行率突破 300 亿美元、Claude Code 收入运行率超过 25 亿美元、G 轮
    300 亿美元（投后 3800 亿美元），以及横跨订阅与 API 用量的公开定价。当前媒体报道指出 2026 年
    4 月运行率可能已超过 300 亿美元，但净收入、毛利率、获客成本、净/总收入留存率、LTV/CAC、
    回收期、客户集中度、云分成与烧钱速度均未由公司披露，仍是核心尽调项。
  claimRefs:
    - C006
    - C047
    - C048
    - C049
    - C050
    - C051
    - C055
    - C059
callouts:
  - type: key-insight
    title: 收入速度是公开的；收入质量不是。
    body: >
      Anthropic 官方 G 轮披露称 2026 年 2 月收入运行率达到 140 亿美元；Anthropic 4 月与

      Google/Broadcom 的算力公告称运行率随后突破 300 亿美元。关键尽调问题是：扣除云、算力与

      转售经济后，其中有多少属于净留存收入。
    claimRefs:
      - C006
      - C047
      - C048
      - C059
  - type: risk-alert
    title: 单位经济模型是 3800 亿美元以上估值的关卡问题。
    body: |
      公开来源支持巨量收入与融资规模，但毛利率、各产品的推理成本、获客成本、回收期、留存、
      客户集中度与自由现金流均未由公司披露。缺乏这些情况下，估值依赖对未来利润率扩张的信念，
      而非已证明的公开单位经济模型。
    claimRefs:
      - C054
      - C057
      - C058
      - C060
      - C061
      - C062
tables:
