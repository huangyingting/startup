company:
  name: Anthropic
  website: https://www.anthropic.com/
chapter:
  number: 4
  title: Financial & Unit Economics
  summary: |
    Anthropic's financial profile is exceptional on revenue scale and capital access but under-disclosed on
    economic quality. Official evidence supports run-rate revenue surpassing $30B by April 2026, $2.5B+ Claude Code
    run-rate revenue, a $30B Series G at $380B post-money, and public pricing across subscriptions and API
    usage. Current press reports indicate run-rate revenue may have surpassed $30B by April 2026, but net
    revenue, gross margin, CAC, NRR, LTV/CAC, payback, customer concentration, cloud take rates, and burn are
    not company-disclosed and remain core diligence items.
  claimRefs:
    - C006
    - C047
    - C048
    - C049
    - C050
    - C051
    - C055
    - C059
callouts:
  - type: key-insight
    title: Revenue velocity is public; revenue quality is not.
    body: >
      Anthropic's official Series G disclosure says run-rate revenue reached $14B in February 2026; Anthropic's

      April Google/Broadcom compute announcement says run-rate revenue later surpassed $30B. The critical diligence
      issue is how much of

      that is net retained revenue after cloud, compute, and reseller economics.
    claimRefs:
      - C006
      - C047
      - C048
      - C059
  - type: risk-alert
    title: Unit economics are the gating issue for a $380B-plus valuation.
    body: |
      Public sources support massive revenue and funding scale, but gross margin, inference cost per product,
      CAC, payback, retention, customer concentration, and free cash flow are not company-disclosed. Without
      these, valuation depends on belief in future margin expansion rather than proven public-unit economics.
    claimRefs:
      - C054
      - C057
      - C058
      - C060
      - C061
      - C062
tables:
  - id: T401
    title: Revenue streams and monetization mechanics
    columns:
      - Revenue stream
      - Public evidence
      - Pricing / monetization
      - Quality assessment
      - Key diligence gap
    rows:
      - - Claude API / platform
        - Claude available through direct API and major cloud platforms
        - >-
          Token-based Opus/Sonnet/Haiku pricing with prompt caching, batch discounts, managed agents, and web search
          add-ons
        - High strategic value but gross-to-net economics unclear
        - Cloud channel margin split, committed-use discounts, and net revenue retention.
      - - Claude subscriptions
        - Free, Pro, Max, Team, and Enterprise plans listed publicly
        - Pro $17 annual or $20 monthly; Max from $100; Team $20-$25 or $100-$125 per seat depending tier
        - Predictable seat revenue but usage intensity can create margin variability
        - Actual seat mix, usage caps, overage, and churn.
      - - Claude Code
        - Anthropic reports Claude Code run-rate revenue above $2.5B
        - Bundled into Pro/Team; enterprise and API usage can add metered spend
        - Major growth asset with potentially high compute intensity
        - Gross margin by coding workload and enterprise versus individual mix.
      - - Enterprise / regulated workflows
        - Enterprise plan includes compliance, SCIM, audit logs, retention, IP allowlisting, HIPAA-ready availability
        - Custom enterprise contracting plus usage controls and committed spend
        - Can support premium ACVs if ROI is measurable
        - ACV, NRR, concentration, implementation cost, and security-review cycle.
      - - Cloud marketplace / partner distribution
        - Claude is available on AWS Bedrock, Google Cloud Vertex AI, and Microsoft Azure Foundry
        - Revenue can flow through partner marketplaces or customer cloud commitments
        - Large distribution but may reduce net retained revenue
        - Partner fees, cloud credits, reseller accounting, and platform-specific churn.
    notes: Revenue streams overlap; public information does not provide product-level revenue mix beyond Claude Code.
    claimRefs:
      - C049
      - C050
      - C051
      - C052
      - C053
      - C055
