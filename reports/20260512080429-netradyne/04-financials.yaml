    {
      "id": "overview",
      "title": "Thesis and scope",
      "body": "The revenue model is hardware-enabled SaaS: cameras and sensors create vehicle-level data, while software, analytics, coaching, compliance, integrations, and insurance workflows create recurring value. Evidence is weighted toward primary, independent, customer, regulatory, legal, and market-data sources. Public materials are treated as directional where Netradyne or a partner is the publisher, and every unresolved item is converted into a concrete diligence ask rather than presented as a settled fact. This framing is important because Netradyne is private, its product touches driver data, and its value proposition depends on customer outcomes that can vary by deployment quality, driver adoption, insurance context, hardware reliability, and jurisdiction-specific privacy rules. The section therefore separates what public sources can establish from what only management, counsel, customers, and audited operating data can prove, which is the central discipline for this report. Because the evidence base mixes marketing pages, customer stories, filings, market reports, litigation documents, and private-company databases, the narrative intentionally repeats caveats where they affect underwriting, board questions, pricing, legal exposure, and the next investor decision.",
