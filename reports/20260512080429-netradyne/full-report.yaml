companyProfile:
  summary: >-
    Netradyne is a San Diego-based private AI fleet-safety and video telematics company. Its Driver•i platform combines
    AI cameras, edge analysis, coaching, driver recognition, analytics, integrations, and compliance workflows for
    commercial fleets. Public evidence indicates meaningful scale after the January 2025 Series D, but audited
    financials and legal/privacy status require data-room diligence.
  foundedDate: '2015-01-01'
  founders:
    - name: Avneesh Agrawal
      role: Co-founder & CEO
      background: Founder-leader associated with Netradyne’s AI fleet-safety strategy.
      claimRefs:
        - CO004
        - CO009
    - name: David Julian
      role: Co-founder & CTO
      background: Technology co-founder associated with Driver•i product architecture.
      claimRefs:
        - CO004
        - CO009
  foundingLocation: San Diego, California
  headquarters: San Diego, California
  productSummary: >-
    Driver•i AI cameras and software analyze driving behavior, coach drivers, recognize safe driving, and provide video
    evidence and fleet-safety analytics.
  customerFocus: >-
    Commercial fleets in trucking, distribution, field service, waste, construction, passenger transport, utilities, and
    related verticals.
  businessModel: >-
    Hardware-enabled SaaS subscriptions with cameras, analytics, coaching, compliance, integrations, and possible
    insurance/data-service channels.
  stage: Series D private company
  fundingStatus: >-
    Raised $90 million Series D in January 2025 led by Point72 Private Investments; public sources disagree on
    cumulative funding totals.
  disclosureProfile: private-undisclosed
