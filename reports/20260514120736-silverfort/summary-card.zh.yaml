summary:
  headline: >
    Silverfort 的无代理身份安全架构确实有差异化，市场顺风也真实存在；但 $1.5B Series D 估值较上市可比公司有 20-50% 溢价。在审计后 ARR、NRR
    和烧钱速度披露前，无法高确信度承销这笔投资，因此应在尽调完成前维持有条件买入。
