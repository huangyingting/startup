summary:
  headline: >
    Silverfort's agentless identity security architecture is genuinely differentiated and the market tailwind is real,
    but the $1.5B Series D valuation carries a 20–50% premium over public comps and cannot be underwritten at high
    conviction without audited ARR, NRR, and burn-rate disclosure — warranting a conditional-buy stance pending
    diligence completion.
