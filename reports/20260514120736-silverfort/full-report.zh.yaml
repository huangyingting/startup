              2025 年 6 月被任命为总裁 / CRO，显示公司正在积极投入 GTM，也可能加速渠道合作伙伴收入。

              反向信号：$1B 估值标记（来自 2024 年 1 月 Series D）、已滞后 16 个月的 ARR 披露，以及 Series D 后没有任何财务更新，给截至 2026 年 5
