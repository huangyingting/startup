      - number: '5.2'
        title: 平台模块：Universal MFA、NHI、ITDR、PAM Gateway、Cloud NHI
        blocks:
          - type: paragraph
            body: >-
              Silverfort 平台由五个主要能力模块构成，由统一 SaaS 租户和本地转发器栈交付。模块 1：Universal MFA——把多因素认证扩展到 AD 环境中的每个身份和资源，包括传统基于代理的 MFA
              工具无法保护的系统与协议（NTLM、Kerberos、LDAP、RDP、SMB、RADIUS）。核心差异是覆盖广度：拥有大型机、遗留 ERP 系统、制造 OT 和定制本地应用的组织，即便这些系统无法支持 MFA
              代理，也能通过 RAP 在不做任何修改的情况下获得保护。Silverfort 与既有 MFA 提供商（Microsoft Authenticator、Duo、Okta
              Verify）集成，将其作为验证层，因此是企业 MFA 基础设施的扩展，而不是替代。

              模块 2：非人类身份（NHI）防护——Silverfort 自动发现 AD 环境里的所有服务账号，映射其认证行为，并执行策略来发现和阻断偏离。服务账号通常无法纳入 MFA，且往往权限过高；Silverfort
              用行为基线建立“虚拟围栏”，一旦服务账号从意外来源、目标或协议发起认证，就告警或阻断。公司估计 60–80% 的企业身份是非人类身份，使 NHI 成为最大的身份风险向量。模块 3：ITDR（Identity
              Threat Detection and Response）——对认证遥测应用基于 ML 的异常检测，实时识别横向移动、Pass-the-Hash、Kerberoasting、Golden Ticket
              攻击和其他基于身份的 TTP。ITDR 模块为 SIEM 集成生成告警，并可触发自动 MFA 质询或账号阻断。

              模块 4：PAM Gateway——Silverfort 提供特权访问管理功能，包括即时（JIT）特权访问、启动会话监控、对特权账号执行策略，但不包含原生凭证库。需要凭证库的组织仍须继续使用
              CyberArk、BeyondTrust 或 Delinea；Silverfort 的 PAM Gateway 补充而不是替代专门的 PAM 凭证库方案。模块 5：Cloud NHI（收购 Rezonate
              后，2024 年末）——把 NHI 防护扩展到云环境（AWS IAM、Azure Entra ID 服务主体、GCP 服务账号、SaaS 应用 OAuth 凭据）、云 IdP 和混合环境。Rezonate 技术为
              Silverfort 以本地优先的平台加入 ISPM（Identity Security Posture Management）、权限管理和云 ITDR 能力。
            claimRefs:
