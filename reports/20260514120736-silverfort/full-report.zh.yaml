companyProfile:
  summary: >
    Silverfort 于 2016 年在以色列特拉维夫成立，创始人为 Hed Kovetz（CEO）、Matan Fattal（CTO）和 Yaron Kassner（CSO），
    三人均出身以色列军方网络情报部队。公司开发了一套获得专利的无代理、代理式多因素认证方案， 无需在终端或服务器安装任何软件代理，就能在 Active Directory Kerberos 认证上强制执行 MFA。 这一区别化架构让
    Silverfort 能以更具成本效率的方式保护传统系统、OT 网络和本地基础设施， 触达传统基于代理的 PAM 和 MFA 厂商难以覆盖的资产。完成 Series A（$11.5M，2018）、Series
    B（$30M，2020）和 Series C（$65M，2021）之后， Silverfort 于 2023 年 10 月完成由 Brighton Park Capital 领投的 $116 million Series
    D，估计投后估值 $1.5 billion。 公司在 2024 年 Q1 被评为 Forrester Wave ITDR 领导者，并进入 Gartner 的 ITDR 覆盖范围。 截至 2025 年，Silverfort
    报告称其在金融服务、医疗、制造和政府等行业拥有超过 1,000 家企业客户。
