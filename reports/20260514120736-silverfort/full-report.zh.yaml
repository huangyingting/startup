      - number: '4.5'
        title: 资本充足性、现金跑道与融资依赖
        blocks:
          - type: paragraph
            body: >-
              Silverfort 2024 年 1 月完成 $116M Series D，由 Brighton Park Capital 领投，估值约 $1B。自创立以来累计融资
              $222M。根据融资历史（完整时间线见公司概况章节），2018–2022 年公司完成了合计 $106M 的早期轮次。本轮融资体现的是成长阶段资本投放，重点用于美国市场 GTM 扩张、MSSP 渠道建设，以及
              NHI / 云身份能力研发。

              现金跑道评估：按每月 $3–8M 的估计净烧钱速度（参照类似 ARR 规模和增速的企业身份 SaaS 公司）测算，$116M Series D 融资款意味着自 2024 年 1 月起有 14–38
              个月的总现金跑道，也就是从融资日看大约到 2025 年 10 月至 2027 年 3 月。Series D 交割至今已过去 16 个月（2024 年 1 月至 2026 年 5 月），估计剩余净现金跑道为
              0–22 个月——也就是说，Silverfort 要么正在推进 Series E，要么已完成未披露的桥轮或 Series E，要么靠 ARR 增长接近现金流盈亏平衡。截至 2026 年 5
              月没有任何公开融资公告，这一点值得注意：公司要么烧钱管理较克制（接近盈利），要么处在 Series E 公告前流程中。

              Rezonate 收购（2024 年末）消耗了部分 Series D 资金，但金额未披露；如果对价按早期公司常见水平采用现金加股票（$10–30M 区间），估计会缩短现金跑道约 2–4 个月。Brighton
              Park Capital 的组合构建方式和过往退出显示，它通常支持 18–36 个月的融资窗口，再进入下一次融资事件；如果 ARR 增长和 NRR 指标支撑，Silverfort 在 2026–2027 年以
              $200–400M 投后估值完成 Series E 有一定可能。对任何截至 2026 年 5 月考虑持仓的投资人来说，资本充足性是最紧迫的财务尽调问题。
