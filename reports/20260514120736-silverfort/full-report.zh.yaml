      - number: '6.4'
        title: 留存耐久度与切换成本
        blocks:
          - type: paragraph
            body: >-
              得益于深度 Active Directory 集成，Silverfort 的留存动态在结构上有利。平台作为内联代理部署在域控制器上；替换或移除它，需要重新设计组织认证流、测试 NTLM 和 Kerberos
              策略连续性，并可能在迁移期间让遗留系统失去保护。这种切换成本画像更接近 PAM 凭证库和目录服务，而不是云原生 SaaS 工具。已经通过 Silverfort 把 MFA 扩展到遗留协议、服务账号和 OT
              系统的客户，切换成本尤其高，因为没有直接竞争者能在规模上提供同等无代理覆盖。TrustRadius 和 PeerSpot 评论者持续把“与既有 AD 无缝集成”和“无需代理”列为继续使用的原因。没有公开 NPS
              分数、总留存率或净留存率数据。缺少公开流失数据，对私营企业安全厂商来说很常见，但会降低尽调信心。反向信号：一条 G2
              评论（已归档，2022）批评定价不透明和合同灵活性，说明早期续约谈判可能存在摩擦。PeerSpot 评论者提到初始设置需要大量专业服务参与，这意味着实施投入进一步巩固留存，但也可能拖慢初始部署周期。
            claimRefs: []
          - type: table
            tableRef: TU005
            claimRefs: []
          - type: figure
            figureRef: FU004
            claimRefs: []
      - number: '6.5'
        title: 扩张经济与集中度风险
        blocks:
          - type: paragraph
            body: >-
              Silverfort 的平台架构天然支持扩张：新模块（NHI、通过 Rezonate 获得的云端 NHI、ITDR）可以在既有 AD connector
              基础设施上启用，不需要新代理或新部署项目。每个新模块都是既有客户团队的增购机会。MSSP 渠道为中端市场账号提供“先落地、再扩张”的路径：初始部署覆盖核心 AD
              MFA，随着组织身份安全成熟，再扩展到服务账号防护和云端 NHI。网络保险渠道（Resilience、Coalition）制造了独特扩张动态：保险方如果把 Silverfort
              推荐为降低风险的措施，可能会在续保时要求或激励更广的平台采用。对一家 1,000+ 客户、主要靠企业销售做到规模的公司来说，集中度风险是结构性问题：前 20 大账号贡献 30–50% ARR 很常见，丢失一个
              Fortune 50 账号就可能显著影响披露增长。公司没有公开集中度数据。Rezonate 整合增加了云端 NHI 这条交叉销售路径，但截至 2026
              年中整合成熟度不明，可能限制近期增购能力。单账号总可扩张空间很高——身份安全平台厂商通常瞄准 Fortune 500 部署的 $500K–$3M ACV——但 Silverfort 没有公开实际 ACV 数据。
            claimRefs: []
