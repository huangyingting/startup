          - type: callout
            title: BeyondTrust 是唯一同时获得 PAM 与 ITDR 分析师领导者定位的厂商
            body: >-
              BeyondTrust 已同时获得 Gartner 和 KuppingerCole 在 PAM 与 ITDR 两个领域的领导者认可，而 Silverfort 还没有做到。这种双重认可，是 BeyondTrust
              面向希望用单一厂商整合身份安全的客户时的 GTM 资产。Silverfort 的价值主张需要多厂商架构（没有 PAM 凭证库），在预算整合力度加大的环境里，这会形成越来越强的逆风。
            calloutType: insight
