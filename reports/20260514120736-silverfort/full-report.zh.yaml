            title: FedRAMP 状态未知——美国联邦部署的监管门槛
            body: >-
              截至 2026 年 5 月，Silverfort 未在官网公开披露 SOC 2 Type II、FedRAMP 或 ISO 27001 认证状态。缺少可见的 FedRAMP 授权，会限制公司获取美国联邦民用和
              DoD 身份安全预算；这部分预算占整体身份安全 TAM 的相当一部分（估计每年 $2–4B）。这是一个需要数据室验证的尽调缺口。
