  - number: 5
    title: 产品与技术
    sections:
      - number: '5.1'
        title: Runtime Access Protection（RAP）架构
        blocks:
          - type: paragraph
            body: >-
              Silverfort 的核心架构创新是 Runtime Access Protection（RAP）。这项技术作为内联代理运行在企业既有 IAM
              基础设施中。不同于需要在每台终端安装软件的基于代理身份安全工具，RAP 直接连接域控制器、LDAP 服务器和 RADIUS 基础设施，作为代理层接收每一个认证请求的副本——Kerberos 票据、NTLM
              质询、LDAP 绑定请求、RADIUS 包，以及 RDP/SMB 会话——并在认证完成前执行策略决策。执行机制是内联的：Silverfort 能在域控制器响应客户端前，实时批准、质询（触发
              MFA）或阻断任意认证。

              这个架构的前提是，Active Directory 域控制器和 RADIUS 服务器会接收本地 Windows 环境中的所有认证请求，因此域控制器天然就是拦截点。Silverfort
              在域控制器上安装轻量级转发器（不同于终端代理），把认证包代理到 Silverfort 策略引擎。策略引擎应用风险评分、行为基线和策略规则，并在毫秒级把决策返回给转发器。这意味着，任何通过 AD
              认证的设备、服务账号或应用——包括遗留系统、OT 设备、制造 PLC，以及无法接入 MFA 代理的应用——都能在不修改系统的情况下自动纳入覆盖。

              云交付模型采用混合架构：Silverfort SaaS 租户负责策略管理和遥测聚合，域控制器转发器在本地处理认证拦截，以避免延迟和单点故障风险。status.silverfort.com 提供状态监控，显示核心
              MFA Service（CMS）和 Azure Service Bus 集成（MMS）达到 99.999% 可用性，符合企业级可用性要求。RAP 架构是 Silverfort
              最主要的技术差异，也是所有平台模块的基础。
            claimRefs:
              - CE001
              - CE002
              - CE003
              - CE004
              - CE005
              - CE006
