      - number: '2.6'
        title: 图表
        blocks:
          - type: callout
            title: 凭证滥用是 TAM 增长的核心引擎
            body: >-
              CrowdStrike 2025 Global Threat Report 的头条发现——攻击者如今通常“登录”而不是“闯入”——不是营销话术， 而是身份安全平台的结构性需求信号。平均 eCrime 突破时间只有
              29 分钟，AI 赋能攻击同比增长 89%，检测窗口正在塌缩。 服务账户、Kerberoasting 或 NTLM relay 带来的每一分钟未监控横向移动，都是正在发生的泄露。 Silverfort
              的实时执行架构正面应对这一向量。投资者问题是：凭证滥用带来的 TAM 增长，能否超过 Microsoft MDI 改进和捆绑策略的速度。
            calloutType: insight
