      - number: '5.3'
        title: 部署模型、集成与运营要求
        blocks:
          - type: paragraph
            body: >-
              Silverfort 的部署模型是混合 SaaS：云托管策略引擎和管理控制台，与安装在域控制器和 RADIUS
              基础设施上的轻量级本地转发器配合。部署不需要终端代理、防火墙变更，也不需要改动受保护系统；唯一基础设施变更，是在域控制器上安装 DC 转发器（一个 Windows
              服务）。这是显著的运营优势：拥有数百或数千台域控制器的企业，可以在不为受保护系统启动变更管理流程的情况下部署 Silverfort，把覆盖时间从基于代理工具需要的数月，缩短到数天或数周。

              集成生态覆盖三层：（1）认证基础设施——Active Directory（2003+ 起的所有版本）、Azure AD / Microsoft Entra ID、LDAP 目录、RADIUS
              服务器、Kerberos KDC；（2）安全栈——通过 syslog/API 集成 SIEM（Splunk、Microsoft Sentinel、QRadar、LogRhythm），关联特权账号的 PAM
              平台（CyberArk、BeyondTrust、Delinea），自动化响应的 SOAR 平台，以及提供富化信号的 EDR/XDR 平台；（3）云身份——Microsoft Entra ID（Azure
              AD）、Okta、Ping Identity、ForgeRock，用于云 IdP 关联和策略延展。Rezonate 收购加入了 AWS IAM、GCP IAM 和 SaaS 应用身份提供商覆盖。

              与基于代理的替代方案相比，运营足迹很轻：没有终端代理，没有硬件设备，也没有单独的凭证存储数据库。主要运营依赖是域控制器转发器，以及到 Silverfort 云租户的互联网连接。高可用靠域控制器冗余（每个站点多台
              DC）和 Silverfort SaaS 租户的地理分布式架构实现。状态页显示核心 MFA 服务可用性为 99.999%。没有原生凭证库意味着 Silverfort
              不会制造特权凭证管理风险，但也不能原生支持需要取出凭证或会话录像的场景。
            claimRefs:
              - CE014
              - CE015
              - CE016
              - CE017
              - CE018
