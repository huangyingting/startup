              Silverfort 没有披露总留存率、净留存率或 NPS 分数。留存耐久度来自架构切换成本（内联 AD 代理、无代理、遗留协议锁定）的推断，而不是量化续约数据的确认。一条归档 G2
              评论把定价不透明列为摩擦点。尽调必须从数据室拿到留存指标和前 10 大账号续约历史，才能验证增长故事。
