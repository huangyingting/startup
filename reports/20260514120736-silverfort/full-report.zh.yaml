chapters:
  - number: 1
    title: 公司概况
    sections:
      - number: '1.1'
        title: 公司身份、总部与商业模式
        blocks:
          - type: paragraph
            body: >
              Silverfort 是一家私营网络安全公司，运营唯一一套端到端统一身份安全平台，能够在本地、混合和云等所有环境中， 保护人类、机器和 AI 驱动的全部身份。公司于 2016 年在以色列特拉维夫成立， 创始人为
              Hed Kovetz、Yaron Kassner 和 Matan Fattal。三人均来自以色列国防军秘密情报部队 Unit 8200， 该部队被广泛视为全球顶尖网络情报组织之一。

              公司运营总部已迁至得克萨斯州 Plano（5525 Granite Parkway），同时在特拉维夫 Leonardo da Vinci Street 的 Landmark TLV Tower
              保留大型研发和工程中心。 其他办公室分布在 Boston（Massachusetts）、Sydney 和 Melbourne（Australia）、Frankfurt（Germany）、Singapore 以及
              Antwerp（Belgium）， 体现出一个面向全球企业客户的分布式组织。

              Silverfort 的核心产品 Silverfort Identity Security Platform 围绕获得专利的 Runtime Access Protection（RAP）技术构建。 RAP
              可内联接入现有身份与访问管理（IAM）基础设施，包括 Active Directory（AD）、Okta、Azure AD（Entra ID）、RADIUS、LDAP、ADFS，
              无需在终端安装代理、无需在系统之间部署代理，也无需改造服务器或应用。这种无代理、无代理服务器架构是 Silverfort 最主要的技术差异化：
              企业可以把多因素认证（MFA）、身份威胁检测和零信任策略延伸到其他方案难以覆盖的资源， 包括传统系统、命令行工具、服务账户、工业 OT 基础设施和机器到机器认证。

              商业模式是 B2B SaaS，采用订阅授权，目标客户是身份环境复杂且异构的企业。 收入和商业化重点集中在北美，约一半客户位于该地区；金融服务、医疗、政府 / 国防、关键基础设施和制造业占比突出。
              Silverfort 不公开披露 ARR 或具体收入数字，但公司在 Series D（2024 年 1 月）时披露， 收入年增速为 100%，ARR 处于“数千万美元”区间。
