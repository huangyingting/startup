  - number: 4
    title: 财务情况
    sections:
      - number: '4.1'
        title: 收入模型、定价与收入结构
        blocks:
          - type: paragraph
            body: >-
              Silverfort 通过统一身份保护平台的按用户 / 按身份年度 SaaS 订阅收费。主要 SKU 包括：（1）Silverfort 核心平台，覆盖人类身份的 MFA
              执行、身份威胁检测和策略管理；（2）面向服务账号与机器身份的非人类身份（NHI）防护模块，并在收购 Rezonate 后扩展到 AWS、Azure、GCP
              的云服务主体；（3）部署、集成和持续客户成功的专业服务。公司在 2024 年 1 月披露年经常性收入（ARR）同比增长 100%；之后没有公开任何 ARR 或增长率数字。按每个企业部署估计 $100K–$500K
              ARR 的入门价格（见第 3 章），再叠加公司材料披露的 1,000+ 企业客户数，如果平均合同额超过 $100K，总 ARR 合理区间可能在 $100M–$200M；但“客户数 × ACV”测算对 ACV
              假设高度敏感。

              收入确认采用订阅式 SaaS，企业安全领域常见多年期合同（通常 1–3 年）。这会带来可预测的递延收入负债，也提高续约可见度。参照同类企业安全厂商，专业服务收入估计占总收入 5–15%（CyberArk
              FY2024 披露的 PS 占比约 10–12%）。Silverfort 纯软件交付（无硬件、无需分发代理基础设施）使新增席位和 NHI 覆盖扩展具备较高增量毛利。2024 年末加入 Rezonate 的云端
              NHI 能力后，公司新增了一个 TAM 分段，而且不需要改动核心 SaaS 交付模型。

              渠道经济：Silverfort 通过直销企业客户（估计贡献 ARR 的 70% 以上）和不断扩大的 MSSP / 经销商渠道销售。MSSP 渠道对覆盖中端市场很关键，也能降低 ACV 低于 $100K
              交易的获客成本（CAC）。Howard Greenfield 2025 年 6 月出任总裁兼 CRO，明确聚焦加速渠道合作伙伴。Silverfort 也把平台上架云市场（AWS
              Marketplace、Microsoft Azure Marketplace），在已有云承诺消费的客户中降低采购摩擦。
