    layout: standard
    summary: >-
      Silverfort 可触达身份安全市场的总可用市场（TAM）/可服务市场（SAM）/可获取市场（SOM）层级，从更宽的 IAM 市场收窄到 PAM + ITDR，再落到基于当前企业客户数和交易经济性的 Silverfort
      近期可获取份额。
