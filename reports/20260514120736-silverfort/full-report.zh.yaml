      - number: '2.2'
        title: 市场规模：TAM、SAM 与 SOM
        blocks:
          - type: paragraph
            body: >-
              没有分析机构发布一个与 Silverfort 完整平台范围完全匹配的统一身份保护市场规模。 三个代理市场定义了 TAM 区间。MarketsandMarkets（2025 年 11 月发布）估计全球 IAM 市场
              2025 年为 $25.96B， 到 2030 年增至 $42.61B，CAGR 为 10.4%。PAM 子板块中，MarketsandMarkets 明确将 Silverfort 列为关键参与者，
              并预计该市场到 2028 年达到 $7.7B，CAGR 为 21.5%。Mordor Intelligence 估计 PAM 市场 2025 年为 $4.25B， 到 2031 年增至 $13.83B，CAGR
              为 21.72%，且机器身份数量以 40:1 超过人类身份。 零信任安全市场提供更宽的结构性背景：MarketsandMarkets 估计其 2024 年为 $36.5B，到 2029 年增至
              $78.7B，CAGR 为 16.6%。

              Silverfort 的可服务市场（SAM）更窄，定义为：运营混合 Active Directory 环境、员工数 500 人及以上的企业组织中，PAM 与 ITDR 的交集。 基于 PAM 市场区间和 ITDR
              作为独立 Gartner 类别（2022 年）兴起，合理 SAM 区间估计到 2028 年为 $7–12B； 上限反映在 PAM 凭证库之上叠加 ITDR 能力后的溢价定价。分析师对 PAM 的估计差异很大：
              MarketsandMarkets 预计 2028 年为 $7.7B，而 VerifiedMarketResearch 预计 2032 年为 $28B， 差异来自不同范围定义，有些会纳入相邻 IGA
              和身份分析支出。北美占 2025 年 PAM 收入的 38.1%， BFSI 是最大垂直行业，占 28.3%；医疗到 2031 年 CAGR 最高，为 23.2%。

              Silverfort 的可获取市场（SOM）未公开披露。基于公司累计融资 $222M、约 1,000 家企业客户， 以及行业标准 SaaS 渗透率为 SAM 的 3–8%，3 年期方向性 SOM 约
              $200–600M 具有合理性， 但需要在尽调中确认 ARR 和净收入留存数据。
