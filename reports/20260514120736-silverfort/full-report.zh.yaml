      - number: '5.5'
        title: 信任、合规、路线图与技术风险
        blocks:
          - type: paragraph
            body: >-
              信任与合规姿态：Silverfort 运营状态页（status.silverfort.com），提供实时可用性指标，并披露核心 MFA 服务达到 99.999% 可用性。Silverfort
              官网未公开披露安全认证；截至 2026 年 5 月，公司没有公开声称获得 SOC 2 Type II、ISO 27001 或 FedRAMP 授权。对评估受监管行业部署的企业采购团队来说，这是一个缺口。竞争者
              CyberArk 和 Okta 突出展示 FedRAMP High 认证，这是美国联邦部署的前提。如果 Silverfort 缺乏 FedRAMP 授权，它在美国联邦民用和 DoD 环境中的可触达市场会受限。

              路线图：Rezonate 收购公告称，目标是在“2025 年中完成 Rezonate 技术整合进我们的统一平台”。截至 2026 年 5 月，公开来源看不到整合状态。Silverfort
              首页在其保护的身份类型中提到“AI agents”，说明平台正在把 NHI 能力延伸到 AI 智能体身份（OAuth token、API key、AI 编排平台创建的服务账号）。企业部署 AI
              智能体框架（Microsoft Copilot、LangChain agents、Salesforce AgentForce）后会制造机器身份风险，这是一个新兴场景。

              技术风险：（1）RAP 代理失效模式——如果 Silverfort 转发器在域控制器上失效，认证回退行为会决定用户是被锁在外面，还是绕过安全控制；fail-open 与 fail-close
              配置至关重要，但公开资料没有说明。（2）Microsoft MDI 扩张——Microsoft Defender for Identity 覆盖 Kerberos/NTLM 威胁检测（同一协议层），并随
              Microsoft 365 E5 授权免费交付；MDI 持续扩展功能，会降低 Silverfort 面向 Microsoft 深度客户的 ITDR 差异化。（3）没有公开开发者 API 或
              SDK，意味着客户无法自助集成 Silverfort；所有集成工作都要依赖 Silverfort 专业服务或受支持连接器。（4）没有公开 GitHub 仓库或开发者社区（HN 上没有提到 Silverfort
              的讨论、没有 StackOverflow tag），说明产品定位更接近厂商托管的安全设备，而不是可由开发者扩展的平台。
            claimRefs:
              - CE025
              - CE026
              - CE027
              - CE028
              - CE029
              - CE030
