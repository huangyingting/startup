      - number: '1.3'
        title: 融资历史、估值与投资者基础
        blocks:
          - type: paragraph
            body: >
              从 2016 年成立至 2024 年 1 月，Silverfort 共完成五轮融资，累计融资 $222 million。 公司在 2024 年 1 月 23 日交割的 Series D 中成为独角兽，估值超过
              $1 billion；该轮融资 $116 million， 由 Brighton Park Capital 领投。Brighton Park Capital 是一家专注软件和技术赋能服务的成长型股权投资机构；
              其创始合伙人 Mike Gregoire 曾任 CA Technologies CEO，他称 Silverfort 是
              “少数成功预判大市场将如何转型、以解决棘手问题的公司之一——在这个案例里，问题就是身份安全。”

              融资时间线如下：2017 年 6 月种子轮（金额未披露）；2018 年 6 月由 TLV Partners 领投的 $11.5 million Series A； 2020 年 8 月由 Aspect
              Ventures 领投的 $30 million Series B（Citi Ventures、Maor Investments、TLV Partners、StageOne Ventures 和 Singtel
              Innov8 参投）； 2022 年 4 月由 Greenfield Partners 领投的 $65 million Series C（GM Ventures、Acrew Capital、Vintage
              Investment Partners、StageOne Ventures、 Singtel Innov8、Citi Ventures、Aspect Ventures 和 Maor Investments
              参投）； 以及 2024 年 1 月由 Brighton Park Capital 领投的 $116 million Series D（Acrew Capital、Greenfield Partners、Citi
              Ventures、 General Motors Ventures、Maor Investments、Vintage Investment Partners 和 Singtel Innov8
              参投；TechCrunch 称该轮为全股权结构）。

              累计投资者基础值得注意，兼具战略投资者和财务投资者。战略投资者包括 Citi Ventures（Citibank 的企业 VC 部门）、 General Motors Ventures 和 Singtel
              Innov8（Singapore Telecom 的企业 VC），它们都可能带来渠道或企业客户关系。 财务投资者包括 Brighton Park Capital、Greenfield Partners、Acrew
              Capital、Vintage Investment Partners、TLV Partners （专注以色列的风险投资机构）、StageOne Ventures、Maor Investments 和
              Aspect Ventures。 多轮融资中机构支持者的广度和质量，反映出投资人跨多个周期对 Silverfort 市场逻辑的强信念。

              公开资料没有披露任何老股交易、债务工具或授信额度。公司迄今完全依靠股权融资。 公司未披露 Series C 投前估值；PitchBook 引用截至 2020 年 8 月（Series B 后）约 $150M
              的估值， Series C 隐含显著增长。TechCrunch 来源确认 Series D 将投后估值定在约 $1B。
