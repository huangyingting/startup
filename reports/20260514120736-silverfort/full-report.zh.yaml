        - 关于以色列对双用途身份技术出口管制的法律意见
        - 美国联邦和欧盟政府销售可能受限
        - 具备 ITAR/EAR 和以色列 MOD 出口经验的外部法律顾问
      - - 客户集中度
        - 前 5 大客户收入占比；在 NDA 下披露名称
        - 单一客户流失可能实质影响 ARR 轨迹
        - 公司 CRO；与具名企业客户做访谈
      - - Microsoft Entra 路线图
        - 对 Entra ID 无代理本地 AD MFA 达到同等能力时间线的独立技术评估
        - 核心竞争护城河可能比假设更快被侵蚀
        - 委托技术分析；CTO 访谈；Gartner 分析师简报
    notes: 这些事项是高置信承销的门槛要求。只有部分数据时，最多支持较小的探索性仓位。
