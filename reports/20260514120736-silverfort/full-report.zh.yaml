        - GA — 全量可用
        - 无需终端代理，即可对 Kerberos/NTLM/LDAP/RDP/SMB 做内联执行；覆盖竞争对手够不到的遗留系统
        - 各类遗留协议的覆盖深度；MFA 疲劳处理；与具体 MFA 提供商的集成
      - - 非人类身份（NHI）保护
        - IAM 团队、安全运营
        - GA — 全量可用
        - 自动发现所有服务账号和机器身份；虚拟围栏模型实时阻断访问偏离
        - 大规模管理的 NHI 数量；服务账号行为基线的误报率
      - - ITDR（身份威胁检测与响应）
        - SOC 团队、威胁猎手
        - GA — 全量可用
        - 基于 ML，从实时认证遥测中检测 Pass-the-Hash、Kerberoasting、Golden Ticket、横向移动
        - 检测准确率数据；误报率；与 SIEM/SOAR 的集成深度
      - - PAM Gateway
        - 特权账号持有人、PAM 管理员
