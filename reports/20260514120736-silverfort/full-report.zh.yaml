          - type: callout
            title: 无代理 NHI 防护正在扩张 Silverfort 的护城河
            body: >-
              Silverfort 把无代理架构与 NHI 防护结合起来（Rezonate 收购进一步增强了这条线），切中增长最快的攻击面——服务账号与机器身份。企业环境中机器身份数量已达到人类身份的
              40:1，Silverfort 能在没有代理的情况下发现、监控并对所有 NHI 执行策略，这种结构性差异是 PAM 凭证库和基于终端的 ITDR 工具难以轻易复制的。
