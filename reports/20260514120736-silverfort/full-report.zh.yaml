            body: >-
              Silverfort 的公开财务披露极少。作为一家以色列 - 美国私营公司，Silverfort 没有公开提交财务报表的义务。记录中唯一与 ARR 有关的披露，是 2024 年 1 月 Series D
              公告：公司称 ARR 达到“数千万美元”，并同比增长 100%。截至 2026 年 5 月，这项披露已经滞后 16+ 个月。如果披露的 100% 增速在 2024 年持续，外推 ARR 到 2025 年 1
              月会达到 $80–160M；如果 2025–2026 年合理降速至 40–60% 增长，到 2026 年 5 月约为 $110–250M。这些外推的不确定性区间很宽，只能作为方向性参考。

              非财务牵引信号仍可观察：1,000+ 企业客户（公司披露）、600+ 员工（LinkedIn），以及公司 2024 年 1 月称其服务 Fortune 500 与关键基础设施行业客户。Rezonate
