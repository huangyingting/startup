  - id: FI002
    title: 单位经济模型桥
    type: flow
    layout: standard
    summary: 定性映射 Silverfort 如何把企业销售投入转化为可持续客户终身价值。多数输入来自可比企业身份 SaaS 厂商估算；Silverfort 具体单位经济模型没有公开数据。
    approximationNotes: >-
      获客成本（CAC）、净留存率（NRR）、客户终身价值（LTV）和毛利率基于 CyberArk、SentinelOne、Okta 等企业身份 SaaS 可比公司估算。没有 Silverfort
      尽调数据室数据。节点代表结构性关系，不是已验证财务输入。
    claimRefs:
      - CI009
      - CI012
      - CI013
      - CI015
    data:
      nodes:
        - id: u1
          label: 需求信号（董事会紧迫感）
          detail: 勒索软件、SEC 报告、CISA 零信任要求带来 CISO 紧迫感；相比早期市场，获客成本（CAC）更低
          type: input
        - id: u2
          label: 企业销售转化
          detail: 直销 + MSSP；估计 6–12 个月周期；ACV $100K–$1M；1,000+ 家客户
          type: process
        - id: u3
          label: 毛利率
          detail: 估计综合 78–85%（纯软件交付；以 CyberArk 88% 订阅毛利率为基准）
          type: process
        - id: u4
          label: 扩张动作（NHI、身份域扩展）
          detail: 先落地再扩张；估计净留存率（NRR）110–125%；NHI 模块 + 新身份域推动增购
          type: process
        - id: u5
          label: 客户终身价值（LTV）
          detail: 高切换成本（策略复杂度、NHI 清单）；多年合同；成熟 NRR 下估计 LTV/CAC >4x
          type: output
