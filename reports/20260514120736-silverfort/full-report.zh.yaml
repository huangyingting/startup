              - CM021
              - CM022
              - CM030
          - type: callout
            title: 分析师估计分歧带来 SAM 不确定性
            body: >-
              PAM 市场规模估计从 $3.6B（VerifiedMarketResearch 2024 年基准）到 2032 年 $28B，跨度接近 8x。 这种分歧并非随机；它反映出市场对 PAM
              边界在哪里结束、相邻类别（IGA、ITDR、NHI、身份分析）从哪里开始存在真实分歧。 锚定 $28B 数字的投资者会高估 Silverfort 的 TAM；只使用最窄 PAM 凭证库估计的人，则会低估 ITDR
              和 NHI 机会。 尽调应要求 Silverfort 提供内部市场规模测算方法，以及 Series D 路演材料使用的分析师报告， 因为这些材料会揭示管理层如何界定自身可服务市场和增长假设。
