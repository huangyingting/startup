      - number: '2.5'
        title: 规模测算缺口与尽调要求
        blocks:
          - type: paragraph
            body: >-
              最重要的证据缺口，是 ITDR 或统一身份保护缺乏被广泛接受的独立市场规模。 分析师分别测算 IAM（$25.96B）、PAM（$4–7.7B）和零信任（$36.5B），没有单独隔离 Silverfort 特定的
              PAM、ITDR 和 NHI 交集。 这造成了 TAM 区间问题：使用最宽的 IAM TAM，会把市场夸大到远超 Silverfort 现实销售动作； 只用 PAM，又会排除使 Silverfort 区别于纯
              PAM 凭证库厂商的 ITDR 和 NHI 机会。

              NHI 管理市场在分析上仍不成熟。Mordor Intelligence 将机器身份——服务账户、API 密钥、OAuth 令牌和 AI 智能体凭证—— 列为关键需求驱动因素，现代企业中机器与人类身份比例达到
              40:1。 但截至 2026 年 5 月，没有大型分析机构把 NHI 作为独立市场板块来测算。 鉴于 Silverfort 2024 年收购 Rezonate 以强化 NHI 能力，NHI
              用例带来的增量收入贡献是关键尽调要求。

              到 2032 年 PAM 市场估计从 $3.6B 到 $28B 不等，反映出对边界条件的真实不确定性， 不应被平均或引用为单一共识数字。VerifiedMarketResearch 更高的估计很可能纳入了相邻
              IGA 和身份分析支出， 超出 MarketsandMarkets 与 Mordor 统计的核心 PAM 凭证库和会话管理范围。 Silverfort 截至 2026 年 Q1 的 ARR
              未公开披露；最后已知数据点是 2024 年 1 月 Series D 公告时 “数千万美元，YoY 增长约 100%”。优先尽调要求包括：当前 ARR 和净收入留存；PAM、ITDR 和 NHI 的收入拆分；
              交易规模分布；以及对 CyberArk、BeyondTrust 和 Microsoft MDI 的赢单 / 输单率。
            claimRefs:
              - CM036
              - CM037
              - CM038
              - CM039
