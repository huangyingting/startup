          label: 2028 年 ITAM/ITDR TAM 超过 $21B
          note: IDC 与 MarketsandMarkets 共识
        - id: n2
          label: Forrester 领导者，Gartner ITDR 覆盖
          note: 独立分析师验证
        - id: n3
          label: 无代理 AD 护城河（竞品没有复制）
          note: 技术差异化；专利背书
        - id: n4
          label: 1,000+ 企业客户；估计 ARR 约 $115M
          note: Series D 验证和规模信号
        - id: n5
          label: Microsoft Entra 与 CrowdStrike 压力
          note: 关键下行风险：打包销售
        - id: n6
          label: 无经审计财务；按估计 ARR 计算为 13× 溢价
          note: 估值和尽调风险
        - id: n7
          label: 有条件买入 — 中高置信度，高风险
          note: 取决于 ARR/NRR 验证和尽调问题
    sourceRefs:
