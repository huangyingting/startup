      - number: '5.6'
        title: 补充论据
        blocks:
          - type: callout
            title: RAP 补上遗留 MFA 缺口——复杂企业里的结构性优势
            body: >-
              Silverfort 的无代理协议拦截方法，解决了 MFA 发明以来一直存在的认证安全缺口：遗留系统、OT 设备、服务账号，以及通过 NTLM 或 Kerberos 认证的应用，无法用基于代理的 MFA
              保护。这不是小众场景，而是 Fortune 500 公司的主流环境。结构性优势真实存在，并由 1,000+ 企业客户基础和 100% 同比增长披露验证。当前没有竞争者在这一协议范围内复制内联执行。
            calloutType: insight
            claimRefs:
              - CE001
              - CE003
              - CE019
          - type: callout
            title: 没有公开专利、没有开发者生态——护城河是实践层面，不是法律层面
            body: >-
              截至 2026 年 5 月，Google Patents 上没有分配给 Silverfort 的专利。公司的竞争护城河来自商业秘密
              know-how、集成深度和切换成本，而不是知识产权保护。缺少开发者生态（没有公开 GitHub、没有 API 文档、没有 HN 提及、没有 StackOverflow
              tag）限制了平台可扩展性，也给企业客户制造了单一厂商依赖风险。这两个因素都会削弱技术护城河的耐久度，相比开放平台竞争者尤其如此。
