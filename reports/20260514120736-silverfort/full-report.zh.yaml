      - number: '2.4'
        title: 增长驱动因素与采用约束
        blocks:
          - type: paragraph
            body: >-
              基于身份的攻击已成为企业入侵的主导向量。CrowdStrike 2025 Global Threat Report 记录，攻击者如今通常是“登录”而不是“闯入”， 用被盗或滥用的凭证作为主要入侵方法。2025
              年平均 eCrime 突破时间仅为 29 分钟，AI 赋能攻击同比增长 89%， 压缩了检测和响应窗口。IBM Cost of Data Breach Report 2025
              也印证了这一趋势，将钓鱼和被攻陷凭证列为主要初始攻击向量。

              三股监管顺风直接推动 IAM 和身份安全支出。SEC 2023 年网络安全披露规则要求上市公司在四个工作日内报告重大网络安全事件， 提升了董事会层面对身份可见性和治理的紧迫感。NIST SP 800-207
              Zero Trust Architecture 标准和 CISA Zero Trust Maturity Model 为联邦和企业提供框架，并将身份视为主要安全支柱。欧洲 NIS2 Directive 自
              2024 年 10 月起可执行， 要求 18 个关键行业中的基本实体和重要实体运营商部署身份安全控制，为 Silverfort 打开了可观的欧洲市场机会。

              关键采用约束会压制增长前景。Microsoft Defender for Identity（MDI）包含在 Microsoft 365 E5 中，零增量成本， 可为已采用 E5 的买方提供实时 AD
              威胁检测。任何账户策略都必须识别 MDI 已部署但不足的场景，以及尚未配置的场景。 带有传统林结构的存量 AD 环境实施复杂，会拖慢企业 PAM 项目。2024–2025 年安全合理化周期中的预算压缩，
              促使企业整合重叠工具。CyberArk 或 BeyondTrust 等现有 PAM 部署带来的组织切换成本形成惯性。 网络保险公司如今经常把 PAM 控制作为承保前提，创造了结构性需求顺风，部分抵消预算压力。
