      - number: '5.4'
        title: 技术差异化、知识产权与竞争护城河
        blocks:
          - type: paragraph
            body: >-
              Silverfort 的主要技术差异化建立在三根支柱上。第一，协议级拦截：Silverfort 在 Kerberos/NTLM/LDAP/RADIUS
              协议层而非操作系统或应用层运行，因此能获得通用覆盖，包括无法安装代理的系统（遗留系统、OT、嵌入式设备、第三方 SaaS）。CrowdStrike Identity Protection、Microsoft
              MDI 等竞争者作为 LDAP/Kerberos 被动监测器运行（不是内联执行），因此能检测，却无法在同等范围内预防。CyberArk 和 BeyondTrust
              需要代理或凭证库才能保护特权账号。没有竞争者能在企业规模下，不用代理就对遗留 Kerberos 与 NTLM 协议提供内联 MFA 执行。

              第二，NHI 行为基线：按分析师评估，Silverfort
              的服务账号发现和行为画像系统是市场里最成熟的，能在不打断自动化工作流的情况下，自动发现、映射并对服务账号执行策略。“虚拟围栏”模型（阻断对既定访问模式的偏离）在运营上优于需要手工配置策略的基于规则方法。第三，无代理架构带来很深的安装切换成本：一旦
              Silverfort 转发器接入组织 DC 基础设施，MFA 策略也配置到数百个应用和系统，强行替换就需要重新枚举每条认证路径。大型企业完成这种切换通常需要 6–18 个月。

              知识产权策略：截至 2026 年 5 月，在 Google Patents 搜索 Silverfort 受让专利没有结果。公司似乎依赖商业秘密和实现 know-how，而不是专利来保护 RAP
              技术。如果资源充足的竞争者（Microsoft、CrowdStrike 或 CyberArk）逆向并复制协议拦截方法，这会形成潜在 IP
              风险，因为没有专利壁垒挡住新进入者。护城河更多是实践层面，而不是法律层面：难点在于以企业级可靠性构建等价的协议级覆盖，以及生产 AD 环境深度集成带来的切换成本。
            claimRefs:
