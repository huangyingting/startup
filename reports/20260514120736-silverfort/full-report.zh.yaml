  - id: FV004
    title: 投资 KPI
    type: kpi
    description: 以 10 分制对 Silverfort 七个投资维度打分，可直接供投委会使用。
    data:
      items:
        - label: 市场机会
          value: 8
          unit: /10
          note: TAM 超过 $21B，CAGR 为 20-25%；身份安全是 CISO 的首要事项
        - label: 产品护城河
          value: 7
          unit: /10
          note: 无代理 AD 代理；1,000+ 集成；专利背书；没有直接复制
        - label: 客户证明
          value: 6
          unit: /10
          note: 1,000+ 企业客户；Forrester 领导者，但 ARR/NRR 披露有限
        - label: 竞争防御力
          value: 5
          unit: /10
          note: Microsoft Entra 打包销售和 CrowdStrike 收敛是实质下行风险
        - label: 财务健康度
          value: 4
          unit: /10
          note: 估计 ARR 约 $115M；无 GAAP 披露；烧钱速度和 CAC 未知
        - label: 风险画像
          value: 4
          unit: /10
          note: 以色列总部、出口管制、地缘政治风险，以及 VC 优先股堆叠偏好形成的压力
        - label: 估值纪律
          value: 5
          unit: /10
          note: Series D 按估计 ARR 计算为 13×，较上市可比公司溢价 20-50%；需要确认增长
    sourceRefs:
      - SV004
      - SV010
      - SV011
