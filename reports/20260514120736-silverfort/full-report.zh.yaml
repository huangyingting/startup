      - number: '4.2'
        title: GTM 路径与销售效率代理指标
        blocks:
          - type: paragraph
            body: >-
              Silverfort 的主要 GTM 动作是企业直销，典型销售周期为 6–12 个月，目标客户是 Fortune 500 与 Global 2000 公司。平均交易由 CISO 或身份 /
              安全副总裁推动，预算通常来自身份安全或 SIEM/SOC 预算。这个市场的企业销售周期通常包括概念验证（PoC）部署、主动替换现有工具，以及董事会 / CFO 对新平台类别的预算批准。

              关键销售效率代理指标（参照同类企业身份 SaaS 厂商估计）：获客成本（CAC）未公开披露。根据 CyberArk 披露的销售与营销费用率（约占收入 45%），以及 Okta、SentinelOne
              的可比公司基准，企业身份安全厂商通常要花 $0.80–$1.50 才能获得 $1 的首年 ARR。在估计 $100M+ ARR 的规模下，Silverfort 年化销售与营销支出可能在 $50–80M
              区间，对应销售效率比约 1.0–1.5x。在 80%+ 毛利率下，CAC 回本周期约 12–20 个月，落在企业 SaaS 认为高效的 24 个月窗口内。

              销售周期与扩张动态：Silverfort 的无代理架构提供了“先落地、再扩张”的机会。初始部署保护人类身份认证，后续扩张加入 NHI 防护模块、延伸到更多域，或加入 Rezonate 的云端 NHI
              能力。这种扩张动作是自然增购，不需要重新争夺预算，却能扩大平台足迹。净留存率（NRR）是验证扩张模型的关键指标，但公司没有公开披露。可比企业身份安全厂商（CyberArk：估计 115–120% NRR；Okta
              Enterprise：披露 120%+ NRR）显示，如果扩张动作有效，Silverfort 的目标 NRR 应在 110–125%。
