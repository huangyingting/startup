      - number: '3.3'
        title: 能力、定价、商业化与监管状态对比
        blocks:
          - type: paragraph
            body: >-
              Silverfort 最决定性的能力差异化，是在认证协议层无代理执行身份安全策略。 没有其他已生产部署厂商，能在不向受保护系统安装代理的情况下，同时对 NTLM、Kerberos、LDAP、RDP 和 SMB
              执行 MFA、 风险自适应条件访问或实时阻断。这一能力缺口直接让 Silverfort 能保护服务账户、机器账户和传统系统—— 这些资产类型因为 CyberArk、BeyondTrust、CrowdStrike
              和 SentinelOne 的代理优先架构，无法被系统性覆盖。 CyberArk 的 Conjur secrets manager 处理机器密钥的凭证库管理，但不覆盖 Silverfort
              管理的运行时认证控制平面。

              定价和 GTM 姿态方面：CyberArk 是最昂贵方案（每个企业部署 $150K–$1M+），通过结构化企业销售动作售卖， 销售周期 6–12 个月，SI / 合作伙伴渠道强。BeyondTrust
              使用类似模式。Delinea 以 SaaS 简洁性和更低总体拥有成本竞争。 CrowdStrike 和 SentinelOne 把身份作为现有终端平台合同的附加产品销售（估计
              $8–15/endpoint/year）， 大幅降低已有终端关系账户的摩擦。Microsoft MDI 在 M365 E5 内以零增量成本进入，形成价格底线竞争动态。 Silverfort
              面向中大型企业的定价估计为 $100K–$500K ARR；Rezonate 集成之后，NHI 保护通常成为新交易的主要预算理由。

              监管状态：CrowdStrike 和 Microsoft 均持有 FedRAMP High 授权，可进入最敏感的联邦工作负载。 Silverfort 正在推进 FedRAMP 授权（截至 2026 年 5
              月尚未完成），因此在美国联邦民用机构和 DoD 账户中存在缺口。 CyberArk 拥有 FedRAMP Moderate，并拥有强政府合同载体存在（GSA
              Schedule、CIO-SP3）。BeyondTrust 持有 FedRAMP Moderate。 对 CISA Zero Trust Architecture 要求（EO 14028、CISA
              ZTMM）而言，Silverfort 的身份支柱覆盖在架构上位置良好， 但缺少 FedRAMP High 授权，是涉密和 DoD 账户的短期约束。

              多供应商并存是这个市场的常态：大多数大型企业 Silverfort 客户同时保有 Microsoft MDI（随 M365 E5 默认部署），也可能使用 CyberArk 做 PAM。 Silverfort
              的销售动作必须持续证明，其在零成本 MDI 基线之上的增量支出合理；因此竞争差异化是关键销售赋能资产。
