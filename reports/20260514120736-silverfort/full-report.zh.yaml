          - type: callout
            title: Microsoft MDI 捆绑是首要市场结构风险
            body: >-
              Microsoft Defender for Identity 包含在 Microsoft 365 E5 授权中，已采用 E5 的买方无需支付增量成本。 在大多数大型企业账户中——也正是 Silverfort
              的目标 ICP——MDI 已经开通，即便尚未完整配置。 任何未纳入 MDI 基线的投资者模型都会高估 Silverfort 的绿地机会。 关键尽调问题是：Silverfort 赢单中，有多大比例发生在 MDI
              已部署但不足的账户，而不是 MDI 从未配置的账户。 带有 MDI 语境的赢单 / 输单分析应成为管理层尽调会议中的必需请求。 CyberArk 作为 PAM 主导在位者，也在替换场景中增加了第二层竞争摩擦。
