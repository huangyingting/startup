      - number: '1.4'
        title: 规模指标、里程碑与市场牵引力
        blocks:
          - type: paragraph
            body: >
              截至 2026 年初，Silverfort 服务北美、欧洲和亚太地区 1,000+ 家企业组织； LinkedIn 公司简介称其中包括数家 Fortune 50 公司。公司不公开披露具名企业客户。
              公开已知客户包括 Singtel、Samsonite 和 UPS，CEO Hed Kovetz 在 Series C 公告中提到它们当时属于“较小”客户。 1,000+
              客户数字由公司声称，并得到多份第三方报告和公司自有网站佐证。

              2024 年 1 月 Series D 时，Silverfort 每季度新增约 100 家客户，意味着每年约 400 家净新增客户的获客速度。 据报道，ARR 处于“数千万美元”区间，且年增速
              100%；按“数千万美元”限定语推算， Series D 公告时 ARR 约为 $40–90M。此后没有公开披露新的 ARR。

              员工数大幅增长。Series B（2020 年 8 月）时，Silverfort 有 60 名员工；Series C（2022 年 4 月）时有 120 名员工； 截至 2025 年 3 月，Tracxn 统计为
              604 名员工；按 2025 年可得 LinkedIn 数据，公司显示 629 名员工。 五年内从 60 人增至 600+，大致对应公司快速资本投放和全球扩张。

              关键产品里程碑包括：2023 年 12 月推出可扩展 Service Account Protection；2024 年 1 月完成 Series D 独角兽轮； 2024 年 9 月推出
              Identity-First Incident Response 方案；2024 年末收购 Rezonate（扩展 NHI 安全能力）； 2024 年 12 月推出 Privileged Access
              Security（PAS）；2025 年 1 月完成 CrowdStrike 集成； 以及 2025 年 6 月推出 AI Agent Security，并任命 Howard Greenfield 为总裁兼
              CRO。 Silverfort 入选 Fast Company 2025 年 10 家最具创新力安全公司之一，确认其获得广泛行业认可。
