  - id: TE002
    title: 工作流 / 用例表
    description: >-
      Key enterprise identity workflows that Silverfort addresses, with current-state problem, Silverfort solution,
      measured benefit, and limitation.
    sourceRefs:
      - SE001
      - SE014
      - SE018
      - SE024
    columns:
      - 用户任务 / 工作流
      - 当前工作流问题
      - Silverfort 解决方案
      - 可衡量收益
      - 限制
    notes: 用例描述综合自产品页面和分析师二级来源（SE001、SE014、SE018、SE024）；限制反映公开文档中的缺口。
    rows:
      - - 遗留系统 MFA 执行（大型机、ERP、OT/SCADA）
        - NTLM/Kerberos 应用无法启用 MFA；安全缺口已被承认多年却未补上
        - RAP 内联拦截所有 AD 认证；不改遗留系统，借助现有提供商执行 MFA
        - MFA 覆盖延伸到原本无法保护的系统；OT 环境中的身份攻击向量被封堵
        - 故障时 fail-close 还是 fail-open 未公开成文；认证延迟影响未披露
      - - 服务账号横向移动防护
        - 服务账号权限过大且无法使用 MFA；80%+ 勒索软件攻击会用到
        - NHI 自动发现 + 行为基线建立虚拟围栏；实时阻断或质询偏离行为
        - 受陷服务账号的横向移动在凭证使用环节被拦下；缩小勒索软件爆炸半径
        - 行为基线误报率未公开基准数据；过度调优可能带来运营中断风险
      - - 云身份安全（Rezonate 之后）
        - 本地 AD 覆盖强；云 IdP（Entra ID、AWS IAM）给云工作负载留下覆盖缺口
        - Rezonate 的云 NHI/ISPM 将覆盖扩展到云服务主体和 SaaS OAuth 凭证
        - 单一平台统一本地和云身份态势；无需单独的云 CIEM 工具
        - 集成时间线不确定；云覆盖成熟度低于经实战检验的 AD 覆盖
      - - 身份威胁狩猎和 ITDR
        - SOC 团队依赖终端遥测；基于身份的攻击 TTP（Kerberoasting、横向移动）检出不足
        - ITDR 模块从认证遥测生成实时告警；接入 SIEM/SOAR 工作流
        - 相比基于日志的 SIEM，可从实时认证流更早发现 Pass-the-Hash、Golden Ticket、Kerberoasting 攻击
        - ML 模型准确率和误报率未公开披露；MDI（E5 免费附带）覆盖类似检测范围
      - - 不替换保管库的 PAM 执行
        - 已使用 CyberArk 或 BeyondTrust 的组织需要 MFA 执行和 JIT 访问，但承担不起更换保管库
        - Silverfort 的 PAM gateway 拦截特权认证流，对特权账号执行 JIT 访问和 MFA
        - 无需迁移保管库即可把 PAM 覆盖扩展到特权账号；补充既有 PAM 投入
        - 无原生保管库或会话录制；凭证签出工作流需要单独 PAM 工具
  - id: TE003
    title: 技术 / 运行架构表
    description: Silverfort's architectural layers, component roles, key dependencies, and associated technical risks.
    sourceRefs:
      - SE006
      - SE012
      - SE013
      - SE015
    columns:
      - 层 / 组件
      - 角色
      - 依赖
      - 风险
    notes: 架构来自官方技术文档和 Microsoft Active Directory 集成文档（SE006、SE012、SE013、SE015）；部分层级细节根据产品行为推断。
    rows:
      - - 云 SaaS 租户
        - 策略引擎、ML 风险评分、管理控制台、遥测聚合、告警管理
        - 本地环境需要互联网连接；云消息传递依赖 Azure Service Bus（MMS）
        - SaaS 中断会打断策略更新和遥测；离线时 MFA 执行故障转移到本地决策
      - - 域控制器转发器
        - 协议层认证拦截（Kerberos、NTLM、LDAP）；将认证包代理到策略引擎
        - 域控制器上的 Windows Server；每个站点所有 DC 都必须安装转发器才能完整覆盖
        - 主 DC 上的转发器故障可能影响认证延迟；HA 需要冗余 DC
      - - RADIUS / LDAP 集成
        - 拦截来自 VPN、Wi-Fi 和网络设备认证流的 RADIUS 认证
        - RADIUS 服务器可用性；用于属性查找的 LDAP 目录结构
        - 若部分 RADIUS 服务器未接入，会形成覆盖缺口；非 Microsoft 环境中 LDAP schema 存在差异
      - - 云身份层（Rezonate）
        - 面向云环境的 AWS IAM、Azure Entra ID、GCP 服务账号发现和 NHI 执行
        - 用于枚举服务主体的云 IdP API 访问；云连接
        - 收购后集成成熟度不确定；云覆盖需要与本地分开配置
      - - SIEM / SOAR 集成
        - 通过 Syslog/API 将告警转发到 SIEM 平台（Splunk、Sentinel、QRadar）；用 SOAR 触发自动响应
        - SIEM 平台 API 兼容性；syslog 基础设施
        - 需要调校告警量以避免 SOC 疲劳；集成深度因 SIEM 厂商而异
      - - MFA 提供商集成
        - 与 Microsoft Authenticator、Duo、Okta Verify、TOTP/SMS 集成，作为 MFA 质询第二因子
        - 第三方 MFA 提供商可用性和可靠性；客户的 MFA 许可证
        - MFA 提供商中断会传导为认证失败；Silverfort 自身不是 MFA 提供商
