      - number: '6.2'
        title: 采用轨迹与增长证据
        blocks:
          - type: paragraph
            body: >-
              采用轨迹最清晰的公开信号，是 2023 年 5 月 Series D 前后投资人沟通中提到的 ARR 同比增长 100%。如果这一增速持续，按合理起点估算，到 2025 年中 ARR 区间会达到
              $40–90M，尽管 Silverfort 没有公开披露 ARR。Calcalist 2023 年 5 月报道的 $116M Series D、$1B+ 估值，与一家处在 10–15x ARR
              倍数的公司相符；这也是当时高增长身份安全厂商的典型区间。员工数从 Series D 前约 300 人增至截至 2026 年 5 月 LinkedIn 上的 629 人，说明公司持续投入 GTM
              和研发能力。Rezonate 收购（2024 年末）把平台扩展到云端 NHI，显示管理层对近期向既有客户群交叉销售有信心。合作伙伴渠道激活——尤其是 MSSP
              计划和网络保险集成——提供了结构性增长倍增器，也降低中端市场账号的 CAC。截至 2026 年中没有 Series E 或 IPO 文件，可能说明现有资本已足够支撑有机增长，也可能意味着公司在探索 M&A
              定位，或潜在收购方（Microsoft、CrowdStrike、Palo Alto Networks 常被提为身份安全战略收购方）正在拉长尽调。公开资料没有销售管线指标、赢单率或销售周期长度数据。
