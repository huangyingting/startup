  - number: 6
    title: 客户情况
    sections:
      - number: '6.1'
        title: 客户基础画像与规模
        blocks:
          - type: paragraph
            body: >-
              Silverfort 公开声称截至 2025–2026 年拥有“1,000+ 家组织”客户，这一数字可由公司 LinkedIn 数据（629 名员工、44,086 名关注者）、Series D
              交割时的投资人沟通，以及公司网站、合作伙伴材料和第三方分析师报道中的一致表述相互印证。公司称若干 Fortune 50 企业是客户，主要垂直行业包括金融服务、医疗健康和政府。1,000 客户门槛据称在 2023
              年 5 月 $116M Series D 之前已经跨过，说明到 2026 年中实际安装基数可能显著高于 1,000。公开评论平台提供的信号有限但偏正面：TrustRadius 记录 3 名企业评论者给出
              9.3/10；GetApp 列出整体评分 4.5/5；PeerSpot 评论强调医疗健康和金融服务部署。相对公司声称的客户数，评论量偏低；对通过企业采购销售、且部署受 NDA
              约束的安全厂商来说，这很常见。公司没有发布客户名单、含具名账号的案例研究库或地域拆分，限制了外部对头部数字的佐证。按合作伙伴生态地理分布和会议活动看，市场覆盖主要集中在北美和西欧。Silverfort
              官网突出其网络保险渠道合作伙伴（Resilience、Coalition）和 MSSP 计划，作为触达无法承担直销企业销售参与的中端市场客户的次级路径。
