      - number: '2.3'
        title: 买方细分与预算归属
        blocks:
          - type: paragraph
            body: >-
              Silverfort 面向拥有混合 Active Directory 环境和正式身份安全项目的企业安全买方。 主要决策者是 CISO 或身份安全负责人，掌握安全工具预算，并与 IAM 基础设施团队共同拥有决策权。
              在中端市场组织中，IT Security Director 或 IT Director 可能主导评估，尤其当评估由网络保险要求触发时。

              五个垂直领域主导 Silverfort 买方基础。金融服务是身份安全支出最高的垂直行业，受 DORA、SOX 和 PCI-DSS 合规要求驱动。 医疗行业面临严重勒索软件暴露和 HIPAA
              泄露责任，因此身份安全投资成为董事会层面的高紧迫优先事项。 美国联邦政府机构受第 14028 号行政令的零信任要求和 CMMC 2.0 要求约束。 制造和关键基础设施运营商面临 OT/IT
              融合挑战，需要保护基于代理方案无法触达的传统 RADIUS 和 LDAP 环境。 中端市场企业也在增长，触发因素包括网络保险保费要求，以及勒索软件同行事件带来的认知提升。

              预算归属随组织成熟度不同，横跨安全和 IT 预算。大型企业中，身份安全工具由 CISO 控制的专门安全预算出资。 中端市场组织里，安全和 IT 预算往往重叠，CIO
              可能共享采购权限。采用通常由同行组织遭遇勒索软件事件、监管审计发现、 网络保险承保前强制要求 PAM 控制，或董事会层面风险复盘后的主动项目触发。 截至 2025 年，云部署占 PAM 市场的
              57%，反映市场转向混合部署模式，而 Silverfort 的无代理架构正是为支持这一模式而设计。 MSSP 是中端市场客户寻求托管身份安全服务的重要间接渠道。
