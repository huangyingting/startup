      - number: '6.3'
        title: 具名客户证据与垂直深度
        blocks:
          - type: paragraph
            body: >-
              Silverfort 没有发布具名客户名单，但第三方评论平台和分析师引用提供了部分证据。PeerSpot 评论者提到金融服务公司、医疗健康网络和制造企业是部署方。TrustRadius 评论提到保护
              10,000+ 用户环境的企业级部署。公司网站合作伙伴页面列出 Resilience 和 Coalition（网络保险承保方）作为渠道伙伴，意味着这些风险量化专家在承保场景中验证过产品保护主张。Cyber
              Defense Magazine Gold Award（2024）以及公司持续出现在 Gartner Access Management 和身份威胁检测报告中，提供了分析师层面的验证。SCWorld 和
              VentureBeat 在身份安全综述中把 Silverfort 作为具名厂商报道，提供第三方编辑背书。公司出现在 MSSPAlert 上，也确认托管服务提供商把 Silverfort
              作为中端市场和受监管行业托管身份安全捆绑的一部分来销售和部署。Fortune 50
              客户主张无法从公开来源验证——没有新闻稿披露具体账号。尽调路径：向公司销售团队索取参考客户联系人；在数据室审查合同条款和续约历史。
