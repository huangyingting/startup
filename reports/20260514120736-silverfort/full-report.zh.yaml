  - number: 3
    title: 竞争格局
    sections:
      - number: '3.1'
        title: 竞争格局——直接同业、平台、现状方案与潜在进入者
        blocks:
          - type: paragraph
            body: >-
              Silverfort 的竞争格局可分为四层，战略意义差异明显。第一层是 PAM 在位者，包括 CyberArk（NASDAQ: CYBR，FY2026 估计 ARR 约 $1.1B）、
              BeyondTrust（Francisco Partners / Thomas Bravo 支持，估计收入 $350–500M）和 Delinea（TPG Capital 支持，估计收入 $200–300M， 原
              Thycotic 和 Centrify）。这些厂商主导特权访问管理预算，主要销售凭证库、特权会话管理（PSM）和密钥管理。 Silverfort
              不托管凭证——其无代理架构在认证层而非凭证存储层运行——因此这些关系既有竞争性（身份安全预算重叠）， 也可能互补（凭证库 + 无代理执行）。

              第二层是 ITDR 和身份平台厂商，包括 CrowdStrike（Falcon Identity Protection，FY2026 总 ARR 约 $3.65B，29,000+ 终端客户） 和
              SentinelOne（Singularity Identity，FY2026 ARR 约 $1.1B）。两家厂商利用现有终端代理部署增加身份遥测， 提供终端 +
              身份的交叉关联威胁检测。它们的分发优势（多年企业合同、SOC 集成）带来显著销售周期替换风险， 但两家都不提供 Silverfort 面向传统系统的无代理、协议级 MFA 执行。 Semperis（身份韧性、AD
              恢复）处在 AD 安全相邻领域，但竞争点是 AD 恢复能力，而不是认证执行； Semperis 的免费工具 Purple Knight 下载量 75,600+，形成 Silverfort 缺少的漏斗顶部认知。

              第三层、也是最关键的一层，是平台厂商捆绑，即 Microsoft Defender for Identity（MDI）。 MDI 以零增量成本包含在 Microsoft 365
              E5（$57/user/month）中，估计已部署于 70%+ 大型企业账户， 而这些账户也是 Silverfort 的主要目标市场。MDI 已知限制——缺少无代理 MFA 执行、没有 NHI
              保护、传统协议覆盖有限、 没有跨协议条件访问——是 Silverfort 的主要销售切入点；但 MDI 免费部署为竞争设定了底线， 要求 Silverfort 在每一笔企业交易中证明增量支出的合理性。

              第四层是现状方案和免费工具，也是真正最常见的在位者：组织依赖原生 Windows 事件日志、Microsoft 免费 BloodHound CE（攻击路径分析）、 Semperis 免费 Purple
              Knight（AD 安全评分）和手工 AD 管理流程来管理身份安全。 现状替代方案是 Silverfort 在中端市场账户中最主要替换的对象，这些账户正在进入首次结构化 ITDR / 统一 MFA 采购。
              潜在新进入者包括 Palo Alto Networks（Cortex XDR 身份集成）、IBM（QRadar UEBA / 身份分析）， 以及 Astrix、Entro Security、Oasis
              Security 等专门竞争机器身份治理的新兴非人类身份（NHI）纯品类公司。
