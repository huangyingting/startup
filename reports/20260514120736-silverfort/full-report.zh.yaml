      - number: '3.4'
        title: 切换成本、锁定效应、多供应商并存与分发能力
        blocks:
          - type: paragraph
            body: >-
              Silverfort 的切换成本来自两个主要来源：认证策略复杂度和 NHI 发现完整性。 企业部署 Silverfort 的统一认证策略引擎后，会积累数十到数百条身份特定访问策略，
              规定哪些用户、组和服务账户可以在何种条件下认证到哪些资源。这些策略编码了业务逻辑 （例如，“service account X 只能从 server Y 认证到 resource Z，生产时间之外阻断”），
              很难迁移到另一种身份执行架构。Silverfort 长期构建的 NHI 清单——编目机器账户、服务账户和非人类身份及其行为基线—— 会成为机构资产，重发现、重建基线和重写策略的替换成本很高。

              多供应商并存普遍存在：多数 Silverfort 企业账户也部署 Microsoft MDI（通过 M365 E5），并常用 CyberArk 做特权账户凭证库。 这种共存是 Silverfort
              的装机基础防御——它定位为覆盖凭证库之上和周边的执行层，覆盖凭证库和标准 ITDR 工具漏掉的认证协议和账户类型。 风险来自预算压力：2025–2026 年审查身份安全支出的 CISO 越来越会质疑， 当
              Microsoft 和 CrowdStrike 正在扩展平台覆盖时，三厂商身份栈（凭证库 + ITDR + 无代理执行）是否仍有合理性。 Silverfort 的回应，是把 NHI /
              服务账户保护用例作为独立预算理由来切入。

              分发能力不对称显著：Microsoft 在企业身份基础设施中几乎无处不在（Active Directory 是事实上的企业身份底座）； CrowdStrike 拥有 29,000+
              企业终端客户；SentinelOne 拥有 12,000+ 企业 EDR 客户。 Silverfort 必须靠直接销售（主要）和不断增长的合作伙伴 / MSSP 渠道逐个赢下账户，
              对手的身份产品则是现有关系上的附加扩展。Silverfort 的 MSSP 渠道和 Howard Greenfield（总裁 / CRO，2025 年 6 月加入）的商业化体系搭建，
              是公司跨过分发劣势、继续放大的关键。
            claimRefs:
              - CP022
              - CP023
              - CP024
              - CP025
              - CP026
              - CP027
      - number: '3.5'
        title: 护城河耐久性、商品化风险与反向竞争证据
        blocks:
          - type: paragraph
            body: >-
              Silverfort 受专利保护的无代理架构，是它最耐久的竞争护城河。它能在域控制器层面拦截认证协议并执行策略，而且不触碰终端或服务器；这需要很深的 Active Directory
              工程能力，也反映出创始团队来自 IDF Unit 8200 的技术底子。截至 2026 年 5 月，商业市场里还没有直接对标的架构。Silverfort
              已围绕认证代理和协议拦截方法提交多项专利，为架构优势再加上一层知识产权防御。

              第二层护城河来自 NHI 覆盖完整度。Silverfort 2024 年收购 Rezonate 后，补上了 AWS、Azure、GCP 服务主体的云端非人类身份（NHI）发现能力，把本地服务账号到云工作负载身份的
              NHI 治理故事拼得更完整。企业正在加速采用 AI 智能体和自动化工作流，机器身份随之膨胀（Mordor Intelligence 2025 估计机器身份与人类身份比例为 40:1）；NHI
              防护因此成为无代理身份执行的一条结构性长期增长线。

              反向证据与商品化风险：三股力量会削弱护城河耐久度。第一，BeyondTrust 与 CyberArk 都在投入可支持无代理工作流的能力——CyberArk 的 Identity Flows 和
              BeyondTrust 的 Pathways 产品加入了一些接近无代理的能力，不过截至 2026 年 5 月，二者都没有复制 Silverfort 的协议级拦截架构。第二，Microsoft 正在主动扩大 MDI
              对 AD 攻击技术和 Entra ID 条件访问策略的覆盖；如果 MDI 最终覆盖 Silverfort 核心的 NTLM/Kerberos 执行场景，Silverfort
              可触达市场里的差异化会明显收窄。第三，CrowdStrike 的 Charlotte AI 智能体身份响应能力（实时 MFA 执行、特权账号阻断）正在逼近 Silverfort 的自适应执行价值主张，背后还有
              CrowdStrike 大得多的工程和销售资源。Silverfort 无代理护城河未来三到五年的竞争耐久度，是尽调的关键问题。
