      - number: '3.6'
        title: 补充论据
        blocks:
          - type: callout
            title: Microsoft MDI 是每个目标客户里的零成本既有对手
            body: >-
              Microsoft Defender for Identity 随 Microsoft 365 E5 授权交付，不产生增量成本；Silverfort 目标的大型企业账号中，估计 70% 以上已持有
              E5。Silverfort 的每一笔企业级交易，都必须证明自己值得客户在既有基线竞争者之上追加预算。MDI 当前的短板（没有无代理 MFA、没有 NHI）是 Silverfort 的销售叙事，但
              Microsoft 有工程资源在未来补上这些缺口。
            calloutType: risk
            claimRefs:
