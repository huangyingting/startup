      items:
        - label: 总可用市场（TAM）— 2025 年全球 IAM 市场（MarketsandMarkets）
          value: '~$26B (growing to $42.6B by 2030; includes all IAM: PAM, IGA, access management, MFA, SSO)'
        - label: 可服务市场（SAM）— 面向混合企业的 PAM + ITDR（2028 年估计）
