  - number: 2
    title: 市场分析
    sections:
      - number: '2.1'
        title: 市场边界与定义
        blocks:
          - type: paragraph
            body: >-
              Silverfort 的可服务市场横跨三个相邻的身份安全类别：特权访问管理（PAM）、身份威胁检测与响应（ITDR）和非人类身份（NHI）安全。 公司的 Unified Identity Protection
              平台监控并执行跨本地 Active Directory、Azure Active Directory / Entra ID、Okta、LDAP、RADIUS 和传统企业系统的认证策略， 能触达传统 PAM
              工具必须部署代理或代理服务器才能保护的身份表面。

              纳入范围的支出包括用于检测凭证盗窃、防止横向移动、保护服务账户和机器身份、在特权资源上强制 MFA， 并跨混合环境交付实时、基于风险的访问策略的软件和服务。Silverfort
              主要范围之外包括终端检测与响应（EDR）、 网络层防火墙、云安全态势管理（CSPM），以及侧重入职-转岗-离职流程而非运行时威胁预防的身份治理与管理（IGA）平台。

              关键相邻领域包括零信任架构平台——这些平台要求身份安全作为基础支柱——更广义的 IAM 平台（Okta、Microsoft Entra）， 以及 PAM
              凭证库方案（CyberArk、BeyondTrust）。主要现状替代方案是 Microsoft Defender for Identity（MDI）， 其包含在 Microsoft 365 E5
              授权中，零增量成本。其他替代方案包括基于 SIEM 的身份分析、手工特权账户审计和原生 Entra ID Conditional Access 策略。 Silverfort
              相比替代方案的差异化在于无代理部署、覆盖基于代理的工具无法触达的未托管传统系统， 以及实时执行，而非仅告警的态势。
            claimRefs:
              - CM001
              - CM002
              - CM003
              - CM004
              - CM005
