      - number: '3.2'
        title: 竞争对手画像——规模、融资、目标客户与战略方向
        blocks:
          - type: paragraph
            body: >-
              CyberArk 是 PAM 市场板块领导者，估计 ARR 为 $1.1B，2026 年 5 月在 NASDAQ 交易市值 $13–14B。 其 Identity Security Platform 覆盖
              PAM（Privileged Access Manager）、终端权限管理（EPM）、密钥管理， 以及通过 Secure Browser 和 Behavioral Analytics 产品提供的 Identity
              Threat Detection。 CyberArk 的主线动作仍是面向特权账户的凭证库和会话录制；其 ITDR 扩张来自并购和平台延伸， 而不是从零搭建的无代理路径。鉴于产品互补性（凭证库 + 无代理）以及
              Silverfort 独特的 NHI / 服务账户保护能力， CyberArk 是 Silverfort 的潜在战略收购方。CyberArk 披露，63% 受访组织未能充分保护最高风险特权访问，
              验证了两家公司共同面对的市场问题。

              BeyondTrust 在其官网称自己是“唯一同时被分析师认定为 PAM 和 ITDR 领导者的厂商”， 这一说法来自 Gartner 和 KuppingerCole 同时给予的领导者定位。其 “Paths to
              Privilege” 平台横跨 PAM、远程访问和身份威胁检测， 由统一控制平面承载。BeyondTrust 依赖代理——其 PAM 和 ITDR 能力要求在受保护系统上部署软件—— 因此在传统 / OT
              环境中与 Silverfort 架构互补，但在标准企业账户中存在竞争。估计收入 $350–500M，并拥有显著政府合同存在感。

              Delinea（原 Thycotic + Centrify，2025 年收购 StrongDM）正重新定位为云原生 PAM 和“身份安全平台”， 宣传 99.995% 合同保证可用性和 500+
              企业集成。Delinea 收购 StrongDM（即时数据库和基础设施访问）， 增加了与开发者访问和云运维用例相关的运行时授权能力，而 Silverfort 也通过 NHI 保护瞄准这些用例。 Delinea
              缺少 Silverfort 的协议级 MFA 执行和无代理架构。

              CrowdStrike Falcon Identity Protection 利用其 29,000+ 终端代理部署，增加 AD 用户风险评分、横向移动检测， 以及通过 Charlotte AI
              智能体工作流实时执行 MFA。CrowdStrike 的终端优先分发优势很强： 在已部署 CrowdStrike Falcon 的账户中，Falcon Identity Protection
              是低摩擦、同一厂商扩展， 直接重叠 Silverfort 的 ITDR 检测层。CrowdStrike 不提供针对服务账户或传统系统的无代理、协议级 MFA， 这是 Silverfort 在
              OT、医疗和传统银行环境中对 CrowdStrike 的主要差异化主张。

              SentinelOne Singularity Identity 用单一轻量代理整合终端和身份遥测，提供跨 AD 与 Entra ID 的统一威胁检测、 主动欺骗能力，以及暗网凭证暴露监控。SentinelOne
              的欺骗技术（蜜罐 / 诱饵部署）是 Silverfort 不具备的技术差异化能力。 Microsoft MDI 在架构上内置于 SIEM+XDR 套件，为 80+ 种攻击技术提供零增量成本 AD 威胁检测，
              但缺少跨协议 MFA 执行、NHI 保护和 Silverfort 无代理架构提供的传统系统覆盖。
