  - id: FE001
    title: Silverfort 产品架构栈
    type: stack
    description: Silverfort 平台从身份基础设施到策略执行再到结果的架构层。
    sourceRefs:
      - SE013
      - SE014
      - SE006
    data:
      layers:
        - label: 身份基础设施（本地部署）
          modules:
            - Active Directory 域控制器
            - LDAP 目录
            - RADIUS 服务器
            - Kerberos KDC
        - label: Silverfort DC Forwarder（本地代理）
          modules:
            - 协议拦截：Kerberos / NTLM / LDAP / RDP / SMB / RADIUS
            - 实时将认证数据包代理到策略引擎
            - 在线执行：批准 / 挑战 / 阻断
        - label: Silverfort SaaS Policy Engine（云端）
          modules:
            - 基于 ML 的风险评分和行为基线
            - NHI 发现和虚拟围栏管控
            - ITDR 告警生成和 SIEM 转发
            - PAM 网关 JIT 访问管控
        - label: 云身份层（Rezonate）
          modules:
            - AWS IAM / Azure Entra ID / GCP 服务账号发现
            - SaaS OAuth 凭据态势管理
            - 云 ITDR 和权限管理
        - label: 安全生态集成
          modules:
            - SIEM：Splunk / Sentinel / QRadar
            - PAM：CyberArk / BeyondTrust / Delinea
            - MFA 提供商：Microsoft Authenticator / Duo / Okta Verify
  - id: FE002
    title: 带 RAP 执行的客户认证工作流
    type: flow
    description: 用户或服务账号认证请求如何流经 Silverfort RAP 层。
    sourceRefs:
      - SE001
      - SE006
      - SE013
    data:
      nodes:
        - id: n1
          label: 用户 / 服务账号
          detail: 发起认证（登录、网络共享访问、服务间调用）
          type: input
        - id: n2
          label: 域控制器
          detail: 接收认证请求（Kerberos TGT、NTLM 挑战、LDAP 绑定、RADIUS）
          type: process
        - id: n3
          label: Silverfort DC Forwarder
          detail: 拦截认证数据包；带身份上下文转发到 Silverfort 策略引擎
          type: process
        - id: n4
          label: Silverfort Policy Engine（云端）
          detail: 为请求打风险分：行为基线检查、ML 异常检测、策略评估
          type: process
        - id: n5
          label: 策略决策
          detail: 批准 / MFA 挑战 / 阻断 — 在毫秒内返回转发器
          type: process
        - id: n6
          label: MFA 提供商（如触发挑战）
          detail: Microsoft Authenticator / Duo / Okta Verify — 二次因子验证
          type: process
        - id: n7
          label: 认证结果
          detail: DC 批准 / 拒绝认证；遥测记录到 SIEM；如检测到 TTP 则生成告警
          type: output
  - id: FE003
    title: Silverfort 关键依赖图
    type: dag
    description: Silverfort 平台依赖的关键要素 — 基础设施、云和合作伙伴生态。
    sourceRefs:
      - SE013
      - SE003
      - SE006
    data:
      nodes:
        - id: dep1
          label: Active Directory / 域控制器
          detail: 核心依赖：所有本地身份管控都需要 AD；DC 转发器必须安装在 DC 上
          type: input
        - id: dep2
          label: Azure Service Bus / 云连接
          detail: Silverfort SaaS 租户通信，用于策略同步、遥测和告警管理
          type: input
        - id: dep3
          label: 第三方 MFA 提供商
          detail: Microsoft Authenticator、Duo、Okta Verify — Silverfort 不提供自己的 MFA 因子
          type: input
        - id: dep4
          label: 云 IdP（Entra ID / AWS IAM / GCP）
          detail: 覆盖云 NHI 所必需（Rezonate 能力）；通过 API 访问服务主体清单
          type: input
        - id: dep5
          label: Silverfort DC Forwarder
          detail: 处理认证拦截；要完整覆盖，所有 DC 都必须安装
          type: process
        - id: dep6
          label: Silverfort SaaS Policy Engine
          detail: 策略评估、ML 风险评分、管理、告警生成 — 云托管
          type: process
        - id: dep7
          label: SIEM / SOAR 集成
          detail: 向 Splunk/Sentinel/QRadar 转发告警；SOAR 响应自动化
          type: output
        - id: dep8
          label: PAM 工具（CyberArk / BeyondTrust / Delinea）
          detail: 互补依赖：Silverfort 执行 PAM 策略，但凭据签出仍需要 PAM 保险库
          type: output
      edges:
        - from: dep1
          to: dep5
          label: AD 认证请求转发给转发器
        - from: dep2
          to: dep6
          label: 通过云连接同步策略
        - from: dep3
          to: dep6
          label: MFA 因子委托
        - from: dep4
          to: dep6
          label: 通过云 IdP API 访问发现 NHI
        - from: dep5
          to: dep6
          label: 将认证数据包代理到策略引擎
        - from: dep6
          to: dep7
          label: 通过 syslog/API 转发告警
        - from: dep6
          to: dep8
          label: PAM 网关执行信号
