      - number: '1.2'
        title: 创始人、领导层与治理
        blocks:
          - type: paragraph
            body: >
              Silverfort 由三名 IDF 精英 Unit 8200 情报部队老兵共同创立，三人分工覆盖公司主要高管能力。 Hed Kovetz 担任 CEO 兼联合创始人。Kovetz
              是主要外部发言人、投资者关系联系人，也是 Silverfort 市场定位战略的设计者。 他出现在所有主要融资公告、客户简报和媒体采访中。自公司成立以来，他的领导保持了稳定的战略方向。 Yaron Kassner
              担任 CTO 兼联合创始人。Kassner 负责 Silverfort 的技术架构、创新路线图和研究团队。 他的密码学和企业安全背景推动了专利 RAP 技术的开发。他曾在 RSAC 等安全会议公开演讲， 阐述
              Silverfort 保护过去无法保护的身份资产这一愿景。Matan Fattal 担任 VP R&D 兼联合创始人。 Fattal 负责工程和产品开发，推动平台在 NHI 安全、AI 智能体保护和 PAM
              现代化上的能力扩展。

              2025 年 6 月，Silverfort 任命 Howard Greenfield 为总裁兼首席营收官，这是公司下一阶段增长的重要领导层补强。 Greenfield 在身份市场经验深厚，曾在 SailPoint
              2017 年成功 IPO 期间担任 CRO，也曾任 Centrify（现 Delinea）CRO。 加入 Silverfort 前，他是风险投资机构 Canaan 的运营合伙人，帮助被投公司放大商业化战略。
              Greenfield 的加入表明 Silverfort 准备更激进地扩大收入，并追求潜在退出或重要扩张里程碑。

              Brighton Park Capital 创始合伙人 Mike Gregoire 曾任 CA Technologies 和 Taleo CEO。 Brighton Park 领投 2024 年 1 月
              Series D 时，Gregoire 加入 Silverfort 董事会。 他公开支持 Silverfort 的市场逻辑，并多次在官方传播中被引用。 Greenfield Partners 合伙人 Avery
              Schwartz（Series C 领投方）也在 Series C 交割时加入董事会。

              关键人物风险中等偏高。三名创始人已深度嵌入 Silverfort 的公司身份——每位联合创始人的持续参与， 都是技术可信度（Kassner）、产品执行（Fattal）和市场叙事（Kovetz）的核心。
              公开资料没有披露接班计划或关键人物保险，构成尽调中的治理信息缺口。
