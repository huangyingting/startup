callouts:
  - calloutType: risk
    title: "Microsoft MDI Is the Zero-Cost Incumbent in Every Target Account"
    body: >-
      Microsoft Defender for Identity ships at no incremental cost in Microsoft 365 E5 licenses
      held by an estimated 70%+ of large enterprise accounts that Silverfort targets. Every
      Silverfort enterprise deal must justify incremental spend above an already-deployed baseline
      competitor. MDI's current limitations (no agentless MFA, no NHI) are Silverfort's sales
      story — but Microsoft has the engineering resources to close these gaps over time.
    claimRefs:
      - CP007
      - CP017

  - calloutType: insight
    title: "BeyondTrust Is the Only Vendor with Dual PAM + ITDR Analyst Leadership"
    body: >-
      BeyondTrust has achieved simultaneous Gartner and KuppingerCole recognition as a leader
      in both PAM and ITDR — a positioning that Silverfort has not yet replicated. This dual
      recognition is a GTM asset for BeyondTrust in accounts seeking a single-vendor identity
      security consolidation. Silverfort's value proposition requires a multi-vendor architecture
      (no PAM vault), which is an increasing budget consolidation headwind.
    claimRefs:
      - CP001
      - CP002

  - calloutType: insight
    title: "Agentless NHI Protection Is Silverfort's Expanding Moat"
    body: >-
      Silverfort's combination of agentless architecture and NHI protection (enhanced by the
      Rezonate acquisition) addresses the fastest-growing attack surface — service accounts and
      machine identities. With machine identities now outnumbering human identities 40:1 in
      enterprise environments, Silverfort's ability to discover, monitor, and enforce policy on
      all NHIs without agents is a structural differentiation that PAM vaults and endpoint-based
      ITDR tools cannot easily replicate.
    claimRefs:
      - CP029
      - CP033
      - CP034

