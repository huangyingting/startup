  - id: capability-comparison
    title: "Capability, Pricing, GTM, and Regulatory Posture Comparison"
    body: >-
      The most decisive capability differentiation for Silverfort is its agentless enforcement of
      identity security policies at the authentication protocol level. No other production-deployed
      vendor can enforce MFA, risk-adaptive conditional access, or real-time blocking on NTLM,
      Kerberos, LDAP, RDP, and SMB simultaneously without agents on protected systems. This
      capability gap directly enables Silverfort to protect service accounts, machine accounts,
      and legacy systems — asset classes that CyberArk, BeyondTrust, CrowdStrike, and SentinelOne
      cannot systematically cover due to their agent-first architecture. CyberArk's Conjur
      secrets manager addresses machine secrets vaulting but not the runtime authentication
      control plane that Silverfort manages.

      On pricing and GTM posture: CyberArk is the most expensive solution ($150K–$1M+ per
      enterprise deployment), sold through a structured enterprise motion with 6–12-month sales
      cycles and strong SI/partner channel. BeyondTrust uses a similar model. Delinea competes
      on SaaS simplicity and lower total cost of ownership. CrowdStrike and SentinelOne sell
      identity as an add-on to their existing endpoint platform contract (estimated $8–15/endpoint/year),
      dramatically lowering friction for accounts with existing endpoint relationships. Microsoft MDI
      enters at zero incremental cost within M365 E5, creating a price-floor competitive dynamic.
      Silverfort's pricing is estimated at $100K–$500K ARR for mid-to-large enterprise, with NHI
      protection typically the primary budget justification in new deals since Rezonate integration.

      Regulatory posture: CrowdStrike and Microsoft both hold FedRAMP High authorization, giving
      them access to the most sensitive federal workloads. Silverfort is working toward FedRAMP
      authorization (as of May 2026, not yet completed), creating a gap in US federal civilian
      agency and DoD accounts. CyberArk has FedRAMP Moderate and a strong government contract
      vehicle presence (GSA Schedule, CIO-SP3). BeyondTrust holds FedRAMP Moderate. For CISA
      Zero Trust Architecture mandates (EO 14028, CISA ZTMM), Silverfort's identity-pillar
      coverage is architecturally well-positioned, but the lack of FedRAMP High authorization
      is a near-term constraint for classified and DoD accounts.

      Multi-homing is common in this market: the majority of large enterprise Silverfort customers
      also maintain Microsoft MDI (deployed by default with M365 E5) and may have CyberArk
      for PAM. Silverfort's sales motion must consistently justify incremental spend above the
      zero-cost MDI baseline, making competitive differentiation a critical sales enablement asset.
