  claims:
    - id: CP001
      statement: >-
        BeyondTrust positions itself as the only vendor with analyst recognition as a leader
        in both Privileged Access Management (PAM) and Identity Threat Detection and Response
        (ITDR) simultaneously across multiple analyst frameworks including Gartner and KuppingerCole.
      type: company-claimed
      topic: competitive-positioning
      sourceRefs:
        - SP001
        - SP010
      confidence: high
      freshness: current

    - id: CP002
      statement: >-
        BeyondTrust's "Paths to Privilege" messaging centers on a unified identity security control
        plane that spans PAM, remote access, and ITDR from a single platform — an architectural
        consolidation pitch that challenges Silverfort's multi-vendor integration approach.
      type: observed
      topic: competitive-positioning
      sourceRefs:
        - SP001
      confidence: medium
      freshness: current

    - id: CP003
      statement: >-
        Delinea claims 99.995% contractually assured uptime for its cloud-native PAM platform
        and 500+ enterprise integrations, positioning on operational simplicity and reliability
        as primary differentiators versus legacy PAM infrastructure.
      type: company-claimed
      topic: competitive-positioning
      sourceRefs:
        - SP004
      confidence: medium
      freshness: current

    - id: CP004
      statement: >-
        Delinea's 2025 acquisition of StrongDM adds just-in-time (JIT) runtime authorization
        and developer-access management capabilities to its PAM platform, directly competing
        with Silverfort's JIT access policies for privileged and service accounts.
      type: observed
      topic: competitive-positioning
      sourceRefs:
        - SP004
        - SP014
      confidence: medium
      freshness: current

    - id: CP005
      statement: >-
        CyberArk disclosed in its 2024 Threat Landscape Report that 63% of surveyed organizations
        fail to adequately secure their highest-risk privileged access, validating the persistent
        PAM market problem and the size of the unprotected account base that Silverfort and
        CyberArk both address.
      type: third-party-reported
      topic: market-demand
      sourceRefs:
        - SP005
      confidence: medium
      freshness: recent

    - id: CP006
      statement: >-
        CyberArk is a publicly traded company (NASDAQ: CYBR) with estimated ARR exceeding $1B
        in fiscal year 2025, making it the largest pure-play identity security vendor by revenue
        and a potential strategic acquirer of Silverfort given product complementarity between
        PAM vaulting and agentless authentication enforcement.
      type: estimated
      topic: competitive-scale
      sourceRefs:
        - SP005
        - SP023
      confidence: high
      freshness: current

    - id: CP007
      statement: >-
        Microsoft Defender for Identity (MDI) ships at no incremental cost within Microsoft 365
        E5 ($57/user/month) and provides baseline Active Directory threat detection coverage for
        enterprise accounts, creating a zero-cost incumbent in the primary Silverfort target account
        base that Silverfort must demonstrate incremental value above.
      type: observed
      topic: competitive-threat
      sourceRefs:
        - SP007
        - SP017
      confidence: high
      freshness: current

    - id: CP008
      statement: >-
        CrowdStrike Falcon Identity Protection provides AI-driven identity threat detection and
        leverages Charlotte AI for real-time MFA enforcement and privileged-account blocking,
        with deployment dependent on CrowdStrike's existing endpoint-agent infrastructure already
        deployed across 29,000+ enterprise customers.
      type: observed
      topic: competitive-capability
      sourceRefs:
        - SP002
        - SP019
      confidence: high
      freshness: current

    - id: CP009
      statement: >-
        SentinelOne Singularity Identity provides active deception technology — honeypot and lure
        deployment to detect reconnaissance and credential harvesting — a technically distinctive
        capability that Silverfort's detection architecture does not offer as of May 2026.
      type: observed
      topic: competitive-capability
      sourceRefs:
        - SP003
      confidence: medium
      freshness: current

    - id: CP010
      statement: >-
        CrowdStrike and Microsoft hold FedRAMP High authorization, while CyberArk and BeyondTrust
        hold FedRAMP Moderate, and Silverfort has not disclosed completion of FedRAMP authorization
        as of May 2026 — a gap that restricts Silverfort's access to DoD and high-classification
        federal civilian agency accounts.
      type: observed
      topic: regulatory-posture
      sourceRefs:
        - SP002
        - SP005
        - SP007
      confidence: medium
      freshness: current

    - id: CP011
      statement: >-
        Semperis Purple Knight, a free Active Directory security assessment tool, has achieved
        75,600+ downloads as of May 2026, creating significant top-of-funnel awareness and
        an installed-base moat in the AD security assessment market that Silverfort does not
        have an equivalent free-tool strategy to address.
      type: observed
      topic: competitive-positioning
      sourceRefs:
        - SP006
      confidence: medium
      freshness: current

    - id: CP012
      statement: >-
        Silverfort's agentless architecture enables protocol-level MFA enforcement across NTLM,
        Kerberos, LDAP, RDP, and SMB simultaneously without requiring agents on protected systems —
        a capability no other production-deployed identity security vendor replicates as of May 2026.
      type: company-claimed
      topic: differentiation
      sourceRefs:
        - SP011
        - SP009
      confidence: medium
      freshness: current

    - id: CP013
      statement: >-
        CrowdStrike's total ARR crossed $3.65B in fiscal year 2026 with 29,000+ enterprise endpoint
        customers, representing an overwhelming distribution advantage: Falcon Identity Protection
        can expand within this existing base at low incremental cost with same-vendor contract terms.
      type: third-party-reported
      topic: competitive-scale
      sourceRefs:
        - SP002
        - SP019
      confidence: high
      freshness: current

    - id: CP014
      statement: >-
        SentinelOne's unified endpoint and identity telemetry approach — combining endpoint-agent
        context with identity-directory data in a single threat detection platform — provides
        superior endpoint-correlated identity context compared to Silverfort's agentless network-level
        approach, which lacks visibility into endpoint process and memory activity.
      type: inferred
      topic: competitive-capability
      sourceRefs:
        - SP003
        - SP016
      confidence: medium
      freshness: current

    - id: CP015
      statement: >-
        Silverfort's competitive position is most durable in environments with significant non-human
        identity (NHI) sprawl, legacy authentication protocols, and operational technology (OT)
        systems where agent-based identity security tools cannot be deployed — use cases where
        CyberArk, CrowdStrike, SentinelOne, and Microsoft MDI all have fundamental architectural
        limitations.
      type: inferred
      topic: differentiation
      sourceRefs:
        - SP011
        - SP012
        - SP022
      confidence: medium
      freshness: current

    - id: CP016
      statement: >-
        Silverfort's 2024 acquisition of Rezonate extended its platform into cloud non-human identity
        (NHI) management for AWS, Azure, and GCP service principals, adding cloud-IdP-native NHI
