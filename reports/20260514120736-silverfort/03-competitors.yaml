  - id: switching-costs
    title: "Switching Costs, Lock-in, Multi-homing, and Distribution Power"
    body: >-
      Silverfort's switching costs stem from two primary sources: authentication-policy complexity
      and NHI discovery completeness. Once an enterprise deploys Silverfort's unified authentication
      policy engine, the organization accumulates dozens to hundreds of identity-specific access
      policies governing which users, groups, and service accounts can authenticate to which
      resources under which conditions. These policies encode business logic (e.g., "service account
      X can authenticate from server Y to resource Z only, blocked outside production hours") that
      is difficult to migrate to a different identity enforcement architecture. The NHI inventory
      that Silverfort builds over time — cataloging machine accounts, service accounts, and
      non-human identities with their behavioral baselines — becomes an institutional asset with
      significant replacement cost in terms of re-discovery, re-baselining, and re-policy-writing.

      Multi-homing is prevalent: most Silverfort enterprise accounts also deploy Microsoft MDI
      (via M365 E5) and often CyberArk for privileged-account vaulting. This co-existence is
      Silverfort's installed-base defense — it positions as an enforcement layer above and around
      the vault, covering the authentication protocols and account types that vaults and standard
      ITDR tools miss. The risk is budget pressure: CISOs reviewing identity security spending
      in 2025–2026 increasingly question whether three-vendor identity stacks (vault + ITDR +
      agentless enforcement) are justifiable when Microsoft and CrowdStrike are expanding platform
      coverage. Silverfort's response is to target the NHI/service-account protection use case
      as a standalone budget justification.

      Distribution power asymmetry is significant: Microsoft has near-universal enterprise identity
      infrastructure presence (Active Directory is the de facto corporate identity fabric); CrowdStrike
      has 29,000+ enterprise endpoint customers; SentinelOne has 12,000+ enterprise EDR customers.
      Silverfort must win each account through direct sales (primary) and a growing partner/MSSP
      channel, competing against vendors whose identity products are add-on expansions to existing
      relationships. Silverfort's MSSP channel and Howard Greenfield's (President/CRO, hired June
      2025) go-to-market build-out are critical to scaling past this distribution disadvantage.
