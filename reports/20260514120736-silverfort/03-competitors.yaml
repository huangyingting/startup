  - id: profiles
    title: "Competitor Profiles — Scale, Funding, Target Customer, and Strategic Direction"
    body: >-
      CyberArk is the PAM market segment leader with an estimated $1.1B ARR, trading on NASDAQ
      at $13–14B market cap in May 2026. Its Identity Security Platform spans PAM (Privileged
      Access Manager), endpoint privilege management (EPM), secrets management, and Identity Threat
      Detection via its Secure Browser and Behavioral Analytics products. CyberArk's primary
      motion remains credential vaulting and session recording for privileged accounts; its ITDR
      expansion is via acquisition and platform extension rather than a ground-up agentless approach.
      CyberArk is a potential strategic acquirer of Silverfort given product complementarity
      (vault + agentless) and Silverfort's unique NHI/service-account protection capability.
      CyberArk disclosed that 63% of surveyed organizations fail to adequately secure their
      highest-risk privileged access, validating the market problem both vendors address.

      BeyondTrust positions itself as the "only analyst-recognized leader in both PAM and ITDR,"
      per its homepage, a claim it derives from simultaneous Gartner and KuppingerCole leadership
      positioning. Its "Paths to Privilege" platform spans PAM, remote access, and identity threat
      detection from a unified control plane. BeyondTrust is agent-dependent — its PAM and ITDR
      capabilities require software deployment on protected systems — making it architecturally
      complementary to Silverfort in legacy/OT environments but competitive in standard enterprise
      accounts. Estimated revenue of $350–500M and significant government contract presence.

      Delinea (formerly Thycotic + Centrify, acquired StrongDM 2025) is repositioning as a cloud-native
      PAM and "identity security platform," advertising 99.995% contractually assured uptime and
      500+ enterprise integrations. Delinea's acquisition of StrongDM (just-in-time database and
      infrastructure access) adds runtime authorization capabilities relevant to the developer-access
      and cloud-operations use cases that Silverfort also targets via its NHI protection. Delinea
      lacks Silverfort's protocol-level MFA enforcement and agentless architecture.

      CrowdStrike Falcon Identity Protection leverages its 29,000+ endpoint-agent deployments
      to add AD user risk scoring, lateral movement detection, and real-time MFA enforcement via
      Charlotte AI agentic workflows. CrowdStrike's endpoint-first distribution advantage is
      significant: in accounts where CrowdStrike Falcon is already deployed, Falcon Identity
      Protection represents a low-friction, same-vendor expansion that directly overlaps Silverfort's
      ITDR detection layer. CrowdStrike does not offer agentless protocol-level MFA for service
      accounts or legacy systems, which is Silverfort's primary differentiation claim against
      CrowdStrike in OT, healthcare, and legacy-banking environments.

      SentinelOne Singularity Identity combines endpoint and identity telemetry from a single
      lightweight agent, providing unified threat detection across AD and Entra ID, active deception
      capabilities, and dark-web credential exposure monitoring. SentinelOne's deception technology
      (honeypot/lure deployment) is a technically distinctive capability Silverfort does not offer.
      Microsoft MDI is architecturally built into the SIEM+XDR suite, providing zero-incremental-cost
      AD threat detection for 80+ attack techniques but lacking cross-protocol MFA enforcement,
      NHI protection, and legacy-system coverage that Silverfort's agentless architecture provides.
