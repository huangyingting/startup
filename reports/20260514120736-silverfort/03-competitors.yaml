    - id: CP032
      statement: >-
        CrowdStrike's Charlotte AI agentic identity-response workflows — real-time MFA enforcement
        and privileged-account blocking based on behavioral risk signals — represent a convergence
        toward Silverfort's adaptive-enforcement value proposition, backed by CrowdStrike's
        substantially larger engineering resources ($3.65B ARR vs. Silverfort's estimated
        $50–100M ARR).
      type: observed
      topic: moat-threat
      sourceRefs:
        - SP002
        - SP013
      confidence: medium
      freshness: current

    - id: CP033
      statement: >-
        Silverfort's patent filings covering its authentication-proxy and protocol-interception
        technology provide some IP defensibility for its agentless moat, though the commercial
        value of these patents depends on enforcement capability and the degree to which
        competitors' approaches are architecturally distinct enough to avoid infringement.
      type: inferred
      topic: moat
      sourceRefs:
        - SP011
        - SP021
      confidence: low
      freshness: current

    - id: CP034
      statement: >-
        The combination of Silverfort's on-premises agentless enforcement and Rezonate's cloud-native
        NHI discovery creates the broadest hybrid NHI governance coverage of any identity security
        vendor across AD service accounts, cloud service principals, and AI-agent credentials —
        a unique multi-plane NHI story as of May 2026.
      type: company-claimed
      topic: differentiation
      sourceRefs:
        - SP012
        - SP025
      confidence: medium
      freshness: current

    - id: CP035
      statement: >-
        The three-to-five year durability of Silverfort's agentless architecture moat is the
        most critical unresolved diligence question: if CrowdStrike or Microsoft invest specifically
        in agentless AD-level protocol interception (technically feasible), the primary Silverfort
        differentiation could be replicated within 24–36 months by a well-resourced engineering team.
      type: inferred
      topic: moat-risk
      sourceRefs:
        - SP002
        - SP007
        - SP018
      confidence: medium
      freshness: current

    - id: CP036
      statement: >-
        Silverfort's NRR and gross logo churn rates are not publicly disclosed; without these
        metrics, the strength of Silverfort's switching cost moat and its ability to retain
        customers in the face of CrowdStrike and Microsoft platform bundling cannot be independently
        assessed — representing the most significant missing validation signal in competitive diligence.
      type: open-question
      topic: moat-validation
      sourceRefs: []
      confidence: low
      freshness: unknown

