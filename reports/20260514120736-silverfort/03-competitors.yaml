chapter:
  number: 3
  title: Competitive Analysis
  summary: >
    Silverfort competes across four distinct identity-security battlegrounds: (1) PAM incumbents (CyberArk,
    BeyondTrust, Delinea) that own credential vaulting and privileged session management budgets;
    (2) ITDR/identity platform vendors (CrowdStrike, SentinelOne) that bundle identity signals with
    dominant endpoint-agent distributions; (3) Microsoft's Defender for Identity (MDI), which is
    included at zero incremental cost in M365 E5 and covers basic AD threat detection for most of
    Silverfort's target enterprise base; and (4) the status-quo alternative of native AD event logs,
    free tools (BloodHound CE, Purple Knight), and manual processes. Silverfort's primary defensible
    differentiator is its agentless architecture and protocol-level MFA enforcement — the only
    production-deployed solution capable of enforcing MFA, conditional access, and identity threat
    detection across every authentication protocol (NTLM, Kerberos, LDAP, RDP, SMB) without requiring
    agents on protected systems. This capability is uniquely valuable for protecting non-human identities
    (NHI), service accounts, and legacy/OT environments that cannot support agents. Adverse evidence:
    BeyondTrust is the only vendor "analyst-recognized leader in both PAM and ITDR," Microsoft MDI
    is deployed in most Silverfort target accounts at zero marginal cost, and CrowdStrike's agent
    advantage creates superior endpoint-identity correlation that Silverfort's agentless approach
    cannot replicate.

sections:
  - id: landscape
    title: "Competitive Landscape — Direct Peers, Platforms, Status Quo, and Likely Entrants"
    body: >-
      Silverfort's competitive landscape segments into four layers of materially different strategic
      significance. The first layer — PAM incumbents — includes CyberArk (NASDAQ: CYBR, ~$1.1B
      estimated ARR FY2026), BeyondTrust (Francisco Partners / Thomas Bravo-backed, estimated $350–500M
      revenue), and Delinea (TPG Capital-backed, estimated $200–300M revenue, formerly Thycotic and
      Centrify). These vendors dominate the privileged-access-management budget and primarily sell
      credential vaulting, privileged session management (PSM), and secrets management. Silverfort does
      not vault credentials — its agentless architecture operates at the authentication layer rather
      than the credential store layer — making these relationships simultaneously competitive (identity
      security budget overlap) and potentially complementary (vault + agentless enforcement).

      The second layer — ITDR and identity platform vendors — includes CrowdStrike (Falcon Identity
      Protection, ~$3.65B total ARR FY2026, 29,000+ endpoint customers) and SentinelOne (Singularity
      Identity, ~$1.1B ARR FY2026). Both vendors leverage existing endpoint-agent deployments to
      add identity telemetry, providing cross-correlated endpoint-plus-identity threat detection.
      Their distribution advantages (multi-year enterprise contracts, SOC integration) create significant
      sales-cycle displacement risk, though neither vendor offers Silverfort's agentless protocol-level
      MFA enforcement for legacy systems. Semperis (identity resilience, AD recovery) occupies
      adjacent territory in AD security but competes on AD recovery capabilities rather than
      authentication enforcement; Semperis' Purple Knight free tool has 75,600+ downloads, creating
      top-of-funnel awareness Silverfort lacks.

      The third and most consequential layer — platform vendor bundling — is Microsoft's Defender
      for Identity (MDI). MDI is included at no incremental cost in Microsoft 365 E5 ($57/user/month)
      and provides AD-focused threat detection deployed across an estimated 70%+ of large enterprise
      accounts that also represent Silverfort's primary target market. MDI's documented limitations —
      lack of agentless MFA enforcement, no NHI protection, limited legacy protocol coverage, and no
      cross-protocol conditional access — are Silverfort's primary sales angles, but MDI's free
      deployment creates a floor of competition that requires Silverfort to justify incremental spend
      on every enterprise deal.

      The fourth layer — status quo and free tooling — is the most common actual incumbent: organizations
      managing identity security through native Windows event logs, Microsoft's free BloodHound CE
      (attack-path analysis), Semperis' free Purple Knight (AD security scoring), and manual AD
      administration processes. The status-quo alternative is the primary displacement Silverfort
      achieves in mid-market accounts entering their first structured ITDR/unified-MFA purchase.
      Likely new entrants include Palo Alto Networks (Cortex XDR identity integration), IBM
      (QRadar UEBA/identity analytics), and the emerging non-human identity (NHI) pure-plays such
      as Astrix, Entro Security, and Oasis Security competing specifically in machine-identity governance.
