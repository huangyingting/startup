      type: observed
      topic: product-expansion
      sourceRefs:
        - SP025
        - SP012
      confidence: high
      freshness: recent

    - id: CP017
      statement: >-
        Microsoft MDI lacks agentless MFA enforcement capability on legacy authentication protocols
        (NTLM, Kerberos, LDAP), cannot natively protect non-human identities and service accounts
