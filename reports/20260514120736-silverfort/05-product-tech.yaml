figures:
  - id: FE001
    title: "Silverfort Product Architecture Stack"
    type: stack
    description: "Architectural layers of the Silverfort platform from identity infrastructure to policy enforcement to outcome."
    sourceRefs:
      - SE013
      - SE014
      - SE006
    data:
      layers:
        - label: "Identity Infrastructure (On-Prem)"
          modules:
            - "Active Directory Domain Controllers"
            - "LDAP Directories"
            - "RADIUS Servers"
            - "Kerberos KDC"
        - label: "Silverfort DC Forwarder (On-Prem Agent)"
          modules:
            - "Protocol interception: Kerberos / NTLM / LDAP / RDP / SMB / RADIUS"
            - "Real-time auth packet proxying to policy engine"
            - "In-line enforcement: approve / challenge / block"
        - label: "Silverfort SaaS Policy Engine (Cloud)"
          modules:
            - "ML-based risk scoring and behavioral baselining"
            - "NHI discovery and virtual fence enforcement"
            - "ITDR alert generation and SIEM forwarding"
            - "PAM gateway JIT access enforcement"
        - label: "Cloud Identity Layer (Rezonate)"
          modules:
            - "AWS IAM / Azure Entra ID / GCP service account discovery"
            - "SaaS OAuth credential posture management"
            - "Cloud ITDR and entitlement management"
        - label: "Security Ecosystem Integration"
          modules:
            - "SIEM: Splunk / Sentinel / QRadar"
            - "PAM: CyberArk / BeyondTrust / Delinea"
            - "MFA providers: Microsoft Authenticator / Duo / Okta Verify"

  - id: FE002
    title: "Customer Authentication Workflow with RAP Enforcement"
    type: flow
    description: "How a user or service account authentication request flows through the Silverfort RAP layer."
    sourceRefs:
      - SE001
      - SE006
      - SE013
    data:
      nodes:
        - id: "n1"
          label: "User / Service Account"
          detail: "Initiates authentication (login, network share access, service-to-service call)"
          type: input
        - id: "n2"
          label: "Domain Controller"
          detail: "Receives authentication request (Kerberos TGT, NTLM challenge, LDAP bind, RADIUS)"
          type: process
        - id: "n3"
          label: "Silverfort DC Forwarder"
          detail: "Intercepts auth packet; forwards to Silverfort policy engine with identity context"
          type: process
        - id: "n4"
          label: "Silverfort Policy Engine (Cloud)"
          detail: "Risk-scores request: behavioral baseline check, ML anomaly detection, policy evaluation"
          type: process
        - id: "n5"
          label: "Policy Decision"
          detail: "Approve / MFA Challenge / Block — returned to forwarder within milliseconds"
          type: process
        - id: "n6"
          label: "MFA Provider (if challenged)"
          detail: "Microsoft Authenticator / Duo / Okta Verify — secondary factor verification"
          type: process
        - id: "n7"
          label: "Authentication Outcome"
          detail: "DC grants/denies authentication; telemetry logged to SIEM; alerts generated if TTPs detected"
          type: output

  - id: FE003
    title: "Silverfort Critical Dependency Map"
    type: dag
    description: "Key dependencies that the Silverfort platform relies on — infrastructure, cloud, and partner ecosystem."
    sourceRefs:
      - SE013
      - SE003
      - SE006
    data:
      nodes:
        - id: "dep1"
          label: "Active Directory / Domain Controllers"
          detail: "Core dependency: all on-prem identity enforcement requires AD; DC forwarder must be installed"
          type: input
        - id: "dep2"
          label: "Azure Service Bus / Cloud Connectivity"
          detail: "Silverfort SaaS tenant communication for policy sync, telemetry, and alert management"
          type: input
        - id: "dep3"
          label: "Third-Party MFA Providers"
          detail: "Microsoft Authenticator, Duo, Okta Verify — Silverfort does not provide its own MFA factor"
          type: input
        - id: "dep4"
          label: "Cloud IdPs (Entra ID / AWS IAM / GCP)"
          detail: "Required for cloud NHI coverage (Rezonate capabilities); API access to service principal inventory"
          type: input
        - id: "dep5"
          label: "Silverfort DC Forwarder"
          detail: "Processes authentication intercepts; must be installed on all DCs for complete coverage"
          type: process
        - id: "dep6"
          label: "Silverfort SaaS Policy Engine"
          detail: "Policy evaluation, ML risk scoring, management, alert generation — cloud-hosted"
          type: process
        - id: "dep7"
          label: "SIEM / SOAR Integration"
          detail: "Alert forwarding to Splunk/Sentinel/QRadar; SOAR response automation"
          type: output
        - id: "dep8"
          label: "PAM Tools (CyberArk / BeyondTrust / Delinea)"
          detail: "Complementary dependency: Silverfort enforces PAM policy but requires PAM vault for credential checkout"
          type: output
      edges:
        - from: "dep1"
          to: "dep5"
          label: "AD auth requests forwarded to forwarder"
        - from: "dep2"
          to: "dep6"
          label: "cloud connectivity for policy sync"
        - from: "dep3"
          to: "dep6"
          label: "MFA factor delegation"
        - from: "dep4"
          to: "dep6"
          label: "cloud IdP API access for NHI discovery"
        - from: "dep5"
          to: "dep6"
          label: "auth packet proxying to policy engine"
        - from: "dep6"
          to: "dep7"
          label: "alert forwarding via syslog/API"
        - from: "dep6"
          to: "dep8"
          label: "PAM gateway enforcement signals"

  - id: FE004
    title: "Product Maturity / Capability Map"
    type: matrix
    description: "Maturity assessment across five product modules and four capability dimensions."
