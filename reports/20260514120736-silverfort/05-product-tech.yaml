  claims:
    - id: CE001
      statement: >-
        Silverfort's Runtime Access Protection (RAP) technology operates as an inline proxy at the
        Kerberos/NTLM/LDAP/RADIUS protocol layer within Active Directory infrastructure, intercepting
        authentication requests before domain controller responses and enforcing policy decisions
        including MFA challenges and access blocks without requiring endpoint agents.
      topic: rap-architecture
      type: company-claimed
      confidence: high
      freshness: current
      sourceRefs:
        - SE013
        - SE014
        - SE001

    - id: CE002
      statement: >-
        Silverfort installs a lightweight forwarder on domain controllers (not an endpoint agent)
        that proxies authentication packets to the Silverfort policy engine in real time, enabling
        inline authentication enforcement for all AD-joined resources.
      topic: rap-architecture
      type: company-claimed
      confidence: high
      freshness: current
      sourceRefs:
        - SE013
        - SE001

    - id: CE003
      statement: >-
        The agentless RAP architecture enables Silverfort to enforce MFA and policy on legacy systems,
        OT equipment, manufacturing PLCs, mainframes, and on-premises applications that cannot support
        agent installation — a use case that is categorically unaddressable by agent-based identity
        security tools.
      topic: agentless-coverage
      type: company-claimed
      confidence: high
      freshness: current
      sourceRefs:
        - SE001
        - SE014
        - SE018

    - id: CE004
      statement: >-
        Silverfort's status page (status.silverfort.com) reports 99.999% uptime for the MFA Service
        (CMS) over the prior 90 days, and 100.000% uptime for the Azure Service Bus integration (MMS)
        in the West Europe region.
      topic: operational-reliability
      type: observed
      confidence: high
      freshness: current
      sourceRefs:
        - SE005
        - SE013

    - id: CE005
      statement: >-
        The Silverfort platform uses a hybrid deployment model: a cloud SaaS tenant for policy management
        and telemetry, combined with on-premises domain controller forwarders for authentication
        interception, providing inline enforcement without full cloud dependency.
      topic: deployment-model
      type: company-claimed
      confidence: high
      freshness: current
      sourceRefs:
        - SE013
        - SE014

    - id: CE006
      statement: >-
        Kerberos version 5 is the primary authentication protocol for Windows domain environments,
        and the KDC (Key Distribution Center) is integrated with Active Directory Domain Services —
        making the DC the natural interception point for protocol-level authentication enforcement.
      topic: authentication-protocols
      type: third-party-reported
      confidence: high
      freshness: current
      sourceRefs:
        - SE006
        - SE012

    - id: CE007
      statement: >-
        The Universal MFA module extends multi-factor authentication to every identity and system
        in the AD environment, including resources that cannot accept agent-based MFA, by intercepting
        authentication at the protocol layer and integrating with third-party MFA providers
        (Microsoft Authenticator, Duo, Okta Verify).
      topic: universal-mfa
      type: company-claimed
      confidence: high
      freshness: current
      sourceRefs:
        - SE001
        - SE013

    - id: CE008
      statement: >-
        Service accounts (non-human accounts enabling application-to-application communication)
        represent 60–80% of enterprise identities and cannot be enrolled in conventional MFA,
        making them a primary vector for lateral movement and ransomware attacks.
      topic: nhi-protection
      type: estimated
      confidence: medium
      freshness: current
      sourceRefs:
        - SE004
        - SE019

    - id: CE009
      statement: >-
        Silverfort's NHI protection module auto-discovers all service accounts in the AD environment,
        maps their authentication behavior patterns, and enforces "virtual fences" that alert or block
        when service accounts deviate from established access patterns (new sources, destinations,
        or protocols).
      topic: nhi-protection
      type: company-claimed
      confidence: high
      freshness: current
      sourceRefs:
        - SE002
        - SE019

    - id: CE010
      statement: >-
        The ITDR module applies ML-based anomaly detection to authentication telemetry to identify
        identity-based attack TTPs including lateral movement, Pass-the-Hash, Kerberoasting, Golden
        Ticket attacks, and AS-REP roasting in real time.
      topic: itdr
      type: company-claimed
      confidence: high
      freshness: current
      sourceRefs:
        - SE015
        - SE013

    - id: CE011
      statement: >-
        Silverfort provides PAM gateway capabilities including just-in-time privileged access and
        policy enforcement for privileged accounts, but does NOT include a native credential vault —
        organizations must integrate with CyberArk, BeyondTrust, or Delinea for credential vaulting.
      topic: pam-gateway
      type: company-claimed
      confidence: high
      freshness: current
      sourceRefs:
        - SE013
        - SE017

    - id: CE012
      statement: >-
        The Rezonate acquisition (late 2024) adds cloud NHI capabilities covering AWS IAM, Azure
        Entra ID service principals, GCP service accounts, SaaS OAuth credentials, cloud IdPs,
        ISPM (Identity Security Posture Management), entitlement management, and cloud ITDR.
      topic: cloud-nhi
      type: company-claimed
      confidence: high
      freshness: current
      sourceRefs:
        - SE003
        - SE019

    - id: CE013
      statement: >-
        Silverfort's homepage explicitly references protection for "AI agents" as an identity type,
        indicating the platform is extending NHI coverage to AI agent identities (OAuth tokens, API
        keys, service accounts created by AI orchestration platforms) as an emerging product capability.
      topic: ai-agent-identity
      type: observed
      confidence: high
      freshness: current
      sourceRefs:
        - SE014
        - SE003

    - id: CE014
      statement: >-
        Silverfort deployment does not require endpoint agent installation, firewall rule changes, or
        modifications to protected systems — the only infrastructure change is a Windows service
        forwarder on domain controllers, significantly reducing deployment time-to-coverage compared
        to agent-based tools.
      topic: deployment-model
      type: company-claimed
      confidence: high
      freshness: current
      sourceRefs:
        - SE001
        - SE014
        - SE013

    - id: CE015
      statement: >-
        Silverfort integrates with Active Directory (all versions from 2003+), Azure AD/Microsoft
        Entra ID, LDAP directories, RADIUS servers, and Kerberos KDCs for authentication
        infrastructure coverage.
      topic: integrations
      type: company-claimed
      confidence: medium
      freshness: current
      sourceRefs:
        - SE013
        - SE018

    - id: CE016
      statement: >-
        Silverfort's security stack integrations include SIEM platforms (Splunk, Microsoft Sentinel,
        QRadar, LogRhythm) via syslog/API, PAM platforms (CyberArk, BeyondTrust, Delinea) for
        privileged account correlation, and SOAR platforms for automated response workflows.
      topic: integrations
      type: company-claimed
      confidence: medium
      freshness: current
      sourceRefs:
        - SE013
        - SE017

    - id: CE017
      statement: >-
        Active Directory Domain Services (AD DS) is the directory service for Windows environments,
        required for Silverfort's default Kerberos and NTLM interception capabilities; the DC is
        both the authentication authority and the Silverfort interception point.
      topic: authentication-protocols
      type: third-party-reported
      confidence: high
      freshness: current
      sourceRefs:
        - SE012
        - SE006

    - id: CE018
      statement: >-
        Silverfort's cloud NHI capabilities via Rezonate extend coverage to cloud environments
        (AWS, Azure, GCP) and SaaS applications, with the Rezonate acquisition announced in late 2024
        with a stated integration target of mid-2025.
      topic: cloud-nhi
      type: company-claimed
      confidence: high
      freshness: current
      sourceRefs:
        - SE003
        - SE023

    - id: CE019
      statement: >-
        Silverfort is differentiated from competitors by inline enforcement at the protocol layer:
        CrowdStrike Identity Protection and Microsoft MDI provide passive Kerberos/NTLM monitoring
        (detection) but not inline MFA enforcement; CyberArk and BeyondTrust require credential
        vault installation or endpoint agents for privileged account protection.
      topic: competitive-differentiation
      type: inferred
      confidence: high
      freshness: current
      sourceRefs:
        - SE011
        - SE013
        - SE017

    - id: CE020
      statement: >-
        Silverfort's NHI service account discovery and behavioral profiling system provides
        auto-discovery without manual policy configuration, using access pattern baselines to
        enforce virtual fences — an approach that is operationally superior to rule-based alternatives
        requiring per-account policy setup.
      topic: nhi-protection
      type: company-claimed
      confidence: medium
      freshness: current
      sourceRefs:
        - SE002
        - SE016

    - id: CE021
      statement: >-
        Silverfort creates deep installation-depth switching costs: once forwarders are integrated
        with the customer's DC infrastructure and MFA policies configured across hundreds of
        applications, ripping-and-replacing requires re-enumerating every authentication path,
        estimated at 6–18 months for large enterprises.
      topic: switching-costs
      type: inferred
      confidence: medium
      freshness: current
      sourceRefs:
        - SE013
        - SE022

    - id: CE022
      statement: >-
        A search of Google Patents for patents assigned to "silverfort" with priority after 2016
        returns no results as of May 2026, indicating Silverfort has not filed or been granted
        patents for its RAP technology and relies on trade secret protection.
      topic: ip-patents
      type: observed
      confidence: high
      freshness: current
      sourceRefs:
        - SE008
        - SE013

    - id: CE023
      statement: >-
        Silverfort's NIST Zero Trust Architecture alignment is a product positioning advantage:
        NIST SP 800-207 defines identity as a core ZTA pillar, and Silverfort's protocol-level
        enforcement directly addresses ZTA's requirement for identity verification at every
        access request regardless of network location.
      topic: zero-trust-alignment
      type: inferred
      confidence: medium
      freshness: current
      sourceRefs:
        - SE007
        - SE013

    - id: CE024
      statement: >-
        Manufacturing OT, critical infrastructure, and healthcare environments with legacy systems
        that cannot support endpoint agents represent the highest-demand use case for agentless MFA,
        making these verticals Silverfort's primary source of non-replicable deployment wins.
      topic: target-verticals
      type: inferred
      confidence: medium
      freshness: current
      sourceRefs:
        - SE003
        - SE018
        - SE011

    - id: CE025
      statement: >-
        The Silverfort status page reports operational uptime metrics publicly at status.silverfort.com,
        showing the MFA Service (CMS) at 99.999% uptime and the Azure Service Bus integration (MMS)
        at 100.000% uptime for the 90-day trailing period as of May 2026.
      topic: operational-reliability
      type: observed
      confidence: high
      freshness: current
      sourceRefs:
        - SE005
        - SE013

    - id: CE026
      statement: >-
        Silverfort does not publicly disclose SOC 2 Type II, FedRAMP, ISO 27001, or other security
        certifications on its website as of May 2026, creating a procurement barrier for regulated
        industries (US federal, healthcare, financial services) that require certification evidence.
      topic: certifications
      type: observed
      confidence: high
      freshness: current
      sourceRefs:
        - SE014
        - SE013

    - id: CE027
      statement: >-
        FedRAMP High authorization is required for US federal agency deployments; competitors
        CyberArk and Okta prominently disclose FedRAMP authorization, limiting Silverfort's
        addressable federal market without equivalent certification.
      topic: fedramp
      type: inferred
      confidence: medium
      freshness: current
      sourceRefs:
        - SE007
        - SE017

    - id: CE028
      statement: >-
        Microsoft Defender for Identity (MDI) covers Kerberos and NTLM threat detection passively
        and is included in Microsoft 365 E5 licensing; continued MDI feature expansion toward inline
        enforcement capabilities represents the most significant long-term competitive threat to
        Silverfort's ITDR differentiation for Microsoft-committed enterprises.
      topic: competitive-risk
      type: inferred
      confidence: medium
      freshness: current
      sourceRefs:
        - SE017
        - SE011

    - id: CE029
      statement: >-
        Silverfort has no public GitHub organization, no publicly documented developer API or SDK,
        no StackOverflow tag, and zero Hacker News story threads as of May 2026, indicating the
        product is positioned as a vendor-managed security appliance without self-service extensibility.
      topic: developer-ecosystem
      type: observed
      confidence: medium
      freshness: current
      sourceRefs:
        - SE009
        - SE010

    - id: CE030
      statement: >-
        The absence of public patents and a developer ecosystem limits Silverfort's IP defensibility:
        without patent barriers, a well-resourced competitor could theoretically replicate the RAP
        protocol interception approach; without a developer ecosystem, third-party integrations
        require Silverfort professional services involvement.
      topic: ip-moat
      type: inferred
      confidence: medium
      freshness: current
      sourceRefs:
        - SE008
        - SE009

    - id: CE031
      statement: >-
        Silverfort is trusted by 1,000+ enterprise organizations globally as of 2026 and has
        achieved 100%+ year-over-year ARR growth for several consecutive years per company
        disclosures in the Rezonate acquisition announcement (late 2024).
      topic: traction
      type: company-claimed
      confidence: medium
      freshness: recent
      sourceRefs:
        - SE003
        - SE018

    - id: CE032
      statement: >-
        The Rezonate acquisition announcement stated an intent to "finish integrating Rezonate's
        technology into our unified platform in mid-2025"; as of May 2026, no public announcement
        confirming completion of the platform integration has been made.
      topic: rezonate-integration
      type: observed
      confidence: medium
      freshness: current
      sourceRefs:
        - SE003

    - id: CE033
      statement: >-
        Stack Overflow's active-directory and authentication tag combines represent a large developer
        community discussing AD authentication challenges — the ecosystem Silverfort serves — but
        no Silverfort-specific tags, questions, or vendor answers appear in the community.
      topic: developer-ecosystem
      type: observed
      confidence: medium
      freshness: current
      sourceRefs:
        - SE010
        - SE009

    - id: CE034
      statement: >-
        Silverfort's G2 presence includes peer reviews confirming agentless deployment experience
        and broad legacy system coverage as key differentiating factors, while noting the lack of
        a native PAM vault as a limitation requiring integration with dedicated PAM tools.
      topic: customer-perception
      type: third-party-reported
      confidence: medium
      freshness: recent
      sourceRefs:
        - SE016
        - SE025

    - id: CE035
      statement: >-
        NIST SP 800-207 defines identity verification as a core ZTA pillar and recommends
        verification of every access request regardless of network location — a standard that
        Silverfort's protocol-level enforcement model directly supports for legacy and on-prem
        environments that cannot implement ZTA through conventional means.
      topic: zero-trust-alignment
      type: third-party-reported
      confidence: high
      freshness: current
      sourceRefs:
        - SE007
        - SE013

    - id: CE036
      statement: >-
        Hacker News Algolia search returns no stories referencing Silverfort as of May 2026 —
