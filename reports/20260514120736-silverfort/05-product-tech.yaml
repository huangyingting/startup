  - id: deployment-integrations
    title: "Deployment Model, Integrations, and Operational Requirements"
    body: >-
      Silverfort's deployment model is hybrid SaaS: a cloud-hosted policy engine and management
      console combined with lightweight on-premises forwarders installed on domain controllers and
      RADIUS infrastructure. Deployment does not require endpoint agents, firewall changes, or
      modifications to protected systems — the only infrastructure change is installing the DC
      forwarder (a Windows service) on domain controllers. This is a significant operational
      advantage: enterprise organizations with hundreds or thousands of domain controllers can
      deploy Silverfort without change management processes for protected systems, reducing the
      time-to-coverage from months (for agent-based tools) to days or weeks.

      Integration ecosystem covers three tiers: (1) authentication infrastructure — Active Directory
      (all versions from 2003+), Azure AD/Microsoft Entra ID, LDAP directories, RADIUS servers,
      Kerberos KDCs; (2) security stack — SIEM integration (Splunk, Microsoft Sentinel, QRadar,
      LogRhythm) via syslog/API, PAM platforms (CyberArk, BeyondTrust, Delinea) for privileged
      account correlation, SOAR platforms for automated response, and EDR/XDR platforms for
      enrichment signal; (3) cloud identity — Microsoft Entra ID (Azure AD), Okta, Ping Identity,
      ForgeRock for cloud IdP correlation and policy extension. The Rezonate acquisition adds
      coverage for AWS IAM, GCP IAM, and SaaS application identity providers.

      The operational footprint is low compared to agent-based alternatives: no endpoint agents,
      no hardware appliances, no separate database for credential storage. The primary operational
      dependencies are the domain controller forwarders and internet connectivity to the Silverfort
      cloud tenant. High availability is achieved through domain controller redundancy (multiple
      DCs in each site) and the Silverfort SaaS tenant's geo-distributed architecture. The status
      page shows 99.999% uptime for core MFA services. The absence of a native credential vault
      means Silverfort does not create privileged credential management risk but also cannot
      support use cases that require checked-out credentials or session recording natively.
