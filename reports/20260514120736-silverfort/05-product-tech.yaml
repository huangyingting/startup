  - id: product-modules
    title: "Platform Modules: Universal MFA, NHI, ITDR, PAM Gateway, Cloud NHI"
    body: >-
      The Silverfort platform consists of five primary capability modules delivered from a unified
      SaaS tenant and on-premises forwarder stack. Module 1: Universal MFA — extends multi-factor
      authentication to every identity and resource in the AD environment, including systems and
      protocols (NTLM, Kerberos, LDAP, RDP, SMB, RADIUS) that cannot be protected by conventional
      agent-based MFA tools. The key differentiator is coverage breadth: organizations with mainframes,
      legacy ERP systems, manufacturing OT, and bespoke on-prem applications that cannot support
      MFA agents can protect these systems via RAP without any modification. Silverfort integrates
      with existing MFA providers (Microsoft Authenticator, Duo, Okta Verify) as the verification
      layer, making it an extension of rather than a replacement for enterprise MFA infrastructure.

      Module 2: Non-Human Identity (NHI) Protection — Silverfort auto-discovers all service accounts
      in the AD environment, maps their authentication behaviors, and enforces policy to detect and
      block deviations. Service accounts typically cannot be enrolled in MFA and often have excessive
      privileges; Silverfort uses behavioral baselines to create "virtual fences" that alert or block
      when a service account authenticates from an unexpected source, destination, or protocol. The
      company estimates 60–80% of enterprise identities are non-human, making NHI the largest identity
      risk vector. Module 3: ITDR (Identity Threat Detection and Response) — applies ML-based anomaly
      detection to authentication telemetry to identify lateral movement, Pass-the-Hash, Kerberoasting,
      Golden Ticket attacks, and other identity-based TTPs in real time. The ITDR module generates
      alerts for SIEM integration and can trigger automated MFA challenges or account blocks.

      Module 4: PAM Gateway — Silverfort provides privileged access management features including
      just-in-time (JIT) privileged access, session monitoring initiation, and policy enforcement
      for privileged accounts, but does NOT include a native credential vault. Organizations needing
      vaulting must continue using CyberArk, BeyondTrust, or Delinea; Silverfort's PAM gateway
      complements rather than replaces dedicated PAM vault solutions. Module 5: Cloud NHI (post-Rezonate
      acquisition, late 2024) — extends NHI protection to cloud environments (AWS IAM, Azure Entra
      ID service principals, GCP service accounts, SaaS application OAuth credentials), cloud IdPs,
      and hybrid environments. The Rezonate technology adds ISPM (Identity Security Posture Management),
      entitlement management, and cloud ITDR capabilities to Silverfort's on-prem-first platform.
