  - id: TE002
    title: "Workflow / Use-Case Table"
    description: "Key enterprise identity workflows that Silverfort addresses, with current-state problem, Silverfort solution, measured benefit, and limitation."
    sourceRefs:
      - SE001
      - SE014
      - SE018
      - SE024
    columns:
