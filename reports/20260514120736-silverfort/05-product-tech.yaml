tables:
  - id: TE001
    title: "Product Module / Asset Matrix"
    description: "Silverfort's five primary platform modules: user/buyer, GA status, differentiation, and diligence gap."
    sourceRefs:
      - SE001
      - SE002
      - SE003
      - SE013
    columns:
      - "Module"
      - "Primary User / Buyer"
      - "Status / Maturity"
      - "Differentiation"
      - "Diligence Gap"
    notes: "Module status and maturity based on Silverfort public product pages and homepage (SE001–SE003, SE013); gaps reflect absence of public documentation."
    rows:
      - - "Universal MFA"
        - "CISO, IAM team, all end-users"
        - "GA — generally available"
        - "Inline enforcement for Kerberos/NTLM/LDAP/RDP/SMB without endpoint agents; covers legacy systems competitors cannot reach"
        - "Coverage depth per legacy protocol; MFA fatigue handling; integration with specific MFA providers"
      - - "Non-Human Identity (NHI) Protection"
