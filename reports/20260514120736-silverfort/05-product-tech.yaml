  - id: trust-compliance-roadmap
    title: "Trust, Compliance, Roadmap, and Technical Risks"
    body: >-
      Trust and compliance posture: Silverfort operates a status page (status.silverfort.com) with
      real-time uptime metrics and has achieved 99.999% reported uptime for its core MFA service.
      Security certifications are not publicly disclosed on the Silverfort website; the company does
      not publicly claim SOC 2 Type II, ISO 27001, or FedRAMP authorization as of May 2026 — a gap
      for enterprise procurement teams evaluating regulated-industry deployments. Competitors
      CyberArk and Okta prominently display FedRAMP High certification, which is a prerequisite
      for US federal deployments. If Silverfort lacks FedRAMP authorization, its addressable market
      within US federal civilian and DoD environments is limited.

      Roadmap: The Rezonate acquisition announcement stated a target to "finish integrating Rezonate's
      technology into our unified platform in mid-2025." As of May 2026, the integration status is
      unknown from public sources. Silverfort's homepage references coverage for "AI agents" among
      the identity types it protects, suggesting the platform is extending NHI capabilities to AI
      agent identities (OAuth tokens, API keys, service accounts created by AI orchestration
      platforms) — an emerging use case as enterprises deploy AI agent frameworks (Microsoft Copilot,
      LangChain agents, Salesforce AgentForce) that create machine identity risk.

      Technical risks: (1) RAP proxy failure modes — if the Silverfort forwarder fails on a domain
      controller, authentication fallback behavior determines whether users are locked out or bypass
      security controls; this fail-open vs. fail-close configuration is critical but not publicly
      documented. (2) Microsoft MDI expansion — Microsoft's Defender for Identity product covers
      Kerberos/NTLM threat detection (the same protocol layer) and is delivered free with Microsoft
      365 E5 licenses; continued MDI feature expansion reduces the ITDR differentiation for
      Microsoft-invested enterprises. (3) No public developer API or SDK means Silverfort cannot
      be integrated by customers through self-service; all integration work requires Silverfort
      professional services or supported connectors. (4) No public GitHub repository or developer
      community (0 HN threads referencing Silverfort, no StackOverflow tag) indicates the product
      is positioned as a vendor-managed security appliance rather than a developer-extensible platform.
    claimRefs:
      - CE025
      - CE026
      - CE027
      - CE028
      - CE029
      - CE030
    tableRefs:
      - TE004
    figureRefs: []

callouts:
  - calloutType: insight
    title: "RAP Solves the Legacy MFA Gap — A Structural Advantage in Complex Enterprises"
    body: >-
      Silverfort's agentless protocol-interception approach addresses an authentication security gap
      that has existed since MFA was invented: legacy systems, OT equipment, service accounts, and
      applications that authenticate via NTLM or Kerberos cannot be protected by agent-based MFA.
      This is not a niche use case — it is the dominant environment in Fortune 500 companies. The
      structural advantage is real and validated by the 1,000+ enterprise customer base and 100% YoY
      growth disclosure. No competitor currently replicates inline enforcement at this protocol scope.
    claimRefs:
      - CE001
      - CE003
      - CE019

  - calloutType: risk
    title: "No Public Patents, No Developer Ecosystem — Moat Is Practical, Not Legal"
    body: >-
      Silverfort has no patents assigned on Google Patents as of May 2026. The company's competitive
      moat is based on trade-secret know-how, integration depth, and switching costs — not IP protection.
      The absence of a developer ecosystem (no public GitHub, no API docs, no HN mentions, no
      StackOverflow tag) limits the platform's extensibility and creates a single-vendor dependency
      risk for enterprise customers. Both factors reduce the durability of the technical moat
      compared to open-platform competitors.
    claimRefs:
      - CE022
      - CE030
      - CE031

  - calloutType: risk
    title: "FedRAMP Status Unknown — Regulatory Barrier for US Federal Deployments"
    body: >-
      Silverfort does not publicly disclose SOC 2 Type II, FedRAMP, or ISO 27001 certification status
      on its website as of May 2026. The absence of visible FedRAMP authorization limits the company's
      ability to capture US federal civilian and DoD identity security budgets, which represent a
      significant portion of the overall identity security TAM (estimated $2–4B annually). This is
      a diligence gap that requires data room validation.
    claimRefs:
      - CE026
      - CE027

