chapter:
  number: 5
  title: Product & Technology
  summary: >
    Silverfort delivers an agentless identity security platform built on Runtime Access Protection (RAP)
    technology — a proprietary protocol-interception layer that connects inline to existing IAM infrastructure
    (Active Directory, LDAP, RADIUS, and cloud IdPs) without requiring agents on endpoints or modifications
    to target systems. The platform's five primary modules are: Universal MFA (extending MFA to legacy
    protocols including NTLM and Kerberos), Non-Human Identity (NHI) protection (service accounts and
    machine identities), Identity Threat Detection and Response (ITDR), a PAM gateway (credential brokering
    without a native vault), and cloud NHI (added via the Rezonate acquisition, covering AWS, Azure, and
    GCP service principals and cloud IdPs). The core technical differentiation is the ability to enforce
    MFA and identity policy on authentication protocols that cannot be intercepted by agent-based tools,
    enabling protection of legacy systems — mainframes, manufacturing OT, on-prem applications, and
    service accounts — that had previously been categorically unprotectable. No public patents are
    assigned to Silverfort; the competitive moat relies on trade-secret protocol knowledge, implementation
    depth, and switching costs in complex AD environments. Key technical risks include: (1) the RAP proxy
    architecture creates a single-pane-of-glass risk requiring high availability and failover maturity;
    (2) Microsoft MDI's expanding AD threat detection narrows the ITDR differentiation; and (3) Silverfort
    has no public GitHub org, no public API, and minimal developer community footprint, indicating a
    vendor-controlled distribution model with limited third-party extensibility.

sections:
  - id: rap-architecture
    title: "Runtime Access Protection (RAP) Architecture"
    body: >-
      Silverfort's core architectural innovation is Runtime Access Protection (RAP), a technology that
      operates as an inline proxy within the organization's existing IAM infrastructure. Unlike agent-based
      identity security tools that require software installation on each endpoint, RAP connects directly
      to the domain controllers, LDAP servers, and RADIUS infrastructure as a proxying layer, receiving
      a copy of every authentication request — Kerberos tickets, NTLM challenges, LDAP bind requests,
      RADIUS packets, and RDP/SMB sessions — and enforcing policy decisions before the authentication
      completes. The enforcement mechanism is inline: Silverfort can approve, challenge (trigger MFA),
      or block any authentication in real time before the domain controller responds to the client.

      The architectural premise is that Active Directory domain controllers and RADIUS servers receive
      all authentication requests for on-premises Windows environments, making the domain controller
      a natural interception point. Silverfort installs a lightweight forwarder on the domain controller
      (distinct from an endpoint agent) that proxies authentication packets to the Silverfort policy
      engine. The policy engine applies risk scoring, behavioral baselines, and policy rules, then
      returns a decision to the forwarder within milliseconds. This approach means that any device,
      service account, or application that authenticates via AD — including legacy systems, OT
      equipment, manufacturing PLCs, and applications that cannot accept MFA agents — is automatically
      covered without any modification to those systems.

      The cloud delivery model uses a hybrid architecture: the Silverfort SaaS tenant handles policy
      management and telemetry aggregation, while the domain controller forwarder handles the
      authentication interception locally to avoid latency and single-point-of-failure risk. Status
      monitoring is provided at status.silverfort.com, which reports 99.999% uptime for the core MFA
      Service (CMS) and Azure Service Bus integration (MMS), consistent with enterprise-grade availability
      requirements. The RAP architecture is Silverfort's primary technical differentiation and is the
      foundation on which all platform modules are built.
    claimRefs:
