chapter:
  number: 4
  title: Financial Analysis
  summary: >
    Silverfort is a private, venture-backed company with $222M total raised across five rounds through
    Series D ($116M, January 2024, led by Brighton Park Capital at approximately $1B valuation). Public
    financial disclosures are sparse: the only ARR data point is a company-claimed "tens of millions"
    growing 100% YoY, disclosed in January 2024 and now 16+ months stale as of May 2026. Extrapolating
    conservatively from this disclosure suggests ARR of $80–160M by mid-2026, though actual ARR at
    mid-2025 growth rates is unverifiable. Silverfort's revenue model is a per-user/identity SaaS
    subscription with estimated 78–85% gross margins comparable to software-only enterprise security
    peers. The primary financial risks are: (1) ARR disclosure staleness makes valuation justification
    impossible to verify independently; (2) with $116M raised in January 2024 and enterprise SaaS burn
    rates of $3–8M/month, runway extends to approximately late 2026 to mid-2027, creating a likely
    Series E financing dependency within the next 12–18 months; and (3) the Rezonate acquisition
    (undisclosed consideration, late 2024) introduces integration cost and potential ARR disruption.
    The financial verdict is limited by severe data sparsity; underwriting the $1B valuation requires
    investor access to data room disclosures and is not possible from public evidence alone.

sections:
  - id: revenue-model
    title: "Revenue Model, Pricing, and Revenue Mix"
    body: >-
      Silverfort monetizes through a per-user/per-identity annual SaaS subscription for its unified
      identity protection platform. The primary SKUs are (1) the core Silverfort platform covering
      MFA enforcement, identity threat detection, and policy management for human identities; (2) the
      Non-Human Identity (NHI) protection module for service accounts and machine identities, now
      expanded via the Rezonate acquisition to cover cloud service principals in AWS, Azure, and GCP;
      and (3) professional services for deployment, integration, and ongoing customer success. The
      company-claimed ARR growth rate of 100% YoY was disclosed in January 2024; any subsequent ARR
      or growth-rate figures have not been publicly released. At an estimated entry price of $100K–$500K
      ARR per enterprise deployment (see Chapter 3), and with 1,000+ enterprise customer count
      disclosed in company materials, total ARR is plausibly $100M–$200M if average contract values
      exceed $100K — but the customer count × ACV calculation is highly sensitive to ACV assumptions.

      Revenue recognition is subscription-based SaaS, with multi-year contracts (typically 1–3 years)
      common in enterprise security. This creates predictable deferred revenue liabilities but also
      strong renewal visibility. Professional services revenue is estimated at 5–15% of total revenue
      based on comparable enterprise security vendors (CyberArk's reported PS mix was ~10–12% in
      FY2024). Silverfort's software-only delivery model (no hardware, no agent infrastructure to
      distribute) supports high incremental margins on additional seats and NHI coverage expansions.
      The addition of Rezonate's cloud NHI capability in late 2024 adds a new TAM segment without
      requiring structural changes to the core SaaS delivery model.

      Channel economics: Silverfort distributes through a combination of direct enterprise sales
      (estimated >70% of ARR) and a growing MSSP/reseller channel. The MSSP channel is strategically
      important for mid-market coverage and reduces CAC for sub-$100K ACV deals. Howard Greenfield,
      appointed President and CRO in June 2025, is specifically focused on channel partner acceleration.
      Silverfort also lists its platform on cloud marketplaces (AWS Marketplace, Microsoft Azure
      Marketplace), which reduce procurement friction in accounts with existing cloud commit.
