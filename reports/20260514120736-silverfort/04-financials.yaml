  - id: capital-adequacy
    title: "Capital Adequacy, Runway, and Financing Dependency"
    body: >-
      Silverfort raised $116M in its Series D in January 2024, led by Brighton Park Capital
      at approximately a $1B valuation. Total capital raised since founding is $222M.
      Based on the round history (see Company Overview chapter for full chronology), earlier
      rounds totaling $106M were completed between 2018 and 2022. The current financing reflects
      growth-stage capital deployment focused on GTM expansion into the US market, MSSP channel
      development, and R&D investment in NHI/cloud identity capabilities.

      Runway assessment: At estimated monthly net cash burn of $3–8M per month (derived from
      comparable enterprise identity SaaS companies at similar ARR scale and growth rate), the
      $116M Series D proceeds imply a gross runway of 14–38 months from January 2024, or
      approximately October 2025 to March 2027 as of the fundraise date. With 16 months elapsed
      since the Series D close (January 2024 to May 2026), net remaining runway is estimated at
      0–22 months — meaning Silverfort is either currently fundraising its Series E, has already
      closed an undisclosed bridge or Series E, or has reached cash-flow near-breakeven through
      ARR growth. The absence of any public fundraising announcement through May 2026 is notable:
      either the company is disciplined in burn management (approaching profitability) or is in
      a pre-announcement Series E process.

      The Rezonate acquisition (late 2024) consumed some of the Series D capital but amount is
      not disclosed; if the consideration was cash-plus-stock at typical early-stage acquisition
      levels ($10–30M range), this reduces estimated runway by approximately 2–4 months.
      Brighton Park Capital's portfolio construction and prior exits suggest it supports 18–36 month
      funding windows before the next financing event; a Series E at $200–400M post-money is
      plausible in 2026–2027 if ARR growth and NRR metrics support it. Capital adequacy is the
      most urgent financial diligence question for any investor considering a position as of
      May 2026.
