    figureRefs: []

callouts:
  - calloutType: risk
    title: "ARR Disclosure Is 16 Months Stale — Underwriting Requires Data Room Access"
    body: >-
      The only public ARR figure for Silverfort — "tens of millions" growing 100% YoY — was
      disclosed in January 2024. As of May 2026, this disclosure is 16 months old with no
      subsequent update. Given the $1B valuation mark and active competitive dynamics, no
      financial underwriting at that valuation level is possible without investor access to
      current ARR, NRR, and burn data. This is the single most important financial diligence
      risk in this report.
    claimRefs:
      - CI020
      - CI031

  - calloutType: risk
    title: "Series E Financing Dependency Within 12 Months"
    body: >-
      Based on estimated burn rates and 16 months elapsed since Series D close, Silverfort's
      remaining Series D runway may be 0–22 months as of May 2026. If cash burn has not been
      significantly moderated by ARR growth, Silverfort will require Series E financing in 2026.
      Growth financing at $1B+ pre-money requires strong ARR and NRR metrics in a challenging
      late-stage private market — a financing risk that should factor into any deal thesis.
    claimRefs:
      - CI027
      - CI028
      - CI029

  - calloutType: insight
    title: "Software-Only Model Supports 80%+ Gross Margins at Scale"
    body: >-
      Silverfort's agentless architecture eliminates the agent distribution and infrastructure
      overhead that increases COGS for competitors like CrowdStrike and BeyondTrust. This
      positions the company for CyberArk-comparable gross margins (88% subscription in FY2024)
      once at scale, with operating leverage achievable through controlled headcount growth.
      The NHI product expansion adds high-margin incremental ARR from the existing customer base.
    claimRefs:
      - CI013
      - CI014
      - CI015

