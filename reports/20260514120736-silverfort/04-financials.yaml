  - id: cost-structure
    title: "Cost Structure, Gross Margin, and Working Capital"
    body: >-
      Silverfort's cost structure is consistent with a software-only enterprise SaaS business.
      Cost of revenue (COGS) consists primarily of cloud infrastructure hosting costs, customer
      success personnel, and professional services delivery costs. Based on comparable vendors,
      gross margins are estimated at 78–85%: software subscription gross margins are typically
      85–90%, blended down by professional services (30–50% gross margin). CyberArk reported
      subscription gross margins of 88% in FY2024; Silverfort's margin profile should be broadly
      comparable given similar software-only delivery with no hardware or agent infrastructure.

      Operating expenses: R&D investment is critical for Silverfort given the pace of competitive
      innovation from CrowdStrike and Microsoft. Based on 600+ employees and typical SaaS R&D
      headcount ratios (~30–40% of headcount in engineering), Silverfort likely employs 180–250
      engineers. At Israeli engineering market compensation ($100–150K fully-loaded) and US
      leadership team costs, total R&D spend is estimated at $40–70M annually. Sales and marketing
      is the largest operating expense category for a scaling SaaS vendor; at the 45% of revenue
      benchmark, S&M would be approximately $45–90M at $100–200M ARR. G&A at ~10–12% of revenue
      adds $10–20M. Total operating expense is estimated at $100–180M annually, implying an
      operating loss (pre-stock-based compensation) of approximately $25–80M per year depending
      on ARR.

      Working capital and capital intensity are low: Silverfort collects subscriptions annually
      (or multi-year prepayments), creating favorable deferred revenue dynamics. Capex is minimal
      (software company with cloud-hosted infrastructure). The Rezonate acquisition in late 2024
      introduced integration costs and potentially increased headcount, though the deal consideration
      was not disclosed. The primary financial flexibility risk is that Silverfort is burning cash
      to grow and depends on investor capital to fund operations until profitability.
    claimRefs:
      - CI012
      - CI013
      - CI014
      - CI015
