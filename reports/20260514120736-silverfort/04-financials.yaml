  - id: public-traction
    title: "Public Traction Metrics and Financial Disclosure Gaps"
    body: >-
      Silverfort's public financial disclosures are severely limited. As a private Israeli-American
      company, Silverfort has no obligation to file financial statements publicly. The only
      ARR-related disclosure on record is the January 2024 Series D announcement in which the
      company stated it was generating "tens of millions" in ARR growing 100% YoY. This disclosure
      is now 16+ months stale as of May 2026. At the disclosed 100% growth rate sustained through
      2024, extrapolated ARR would reach $80–160M by January 2025 — and, at plausible deceleration
      to 40–60% growth in 2025–2026, approximately $110–250M by May 2026. These extrapolations
      carry wide uncertainty bands and should be treated as directional only.

      Non-financial traction signals are available: 1,000+ enterprise customers (company-disclosed),
      600+ employees (LinkedIn), and the company's January 2024 claim that it serves customers in
      Fortune 500 and critical infrastructure sectors. The Rezonate acquisition (undisclosed
      consideration) closed in late 2024, adding cloud-native NHI capabilities and presumably
      some incremental ARR from Rezonate's existing customer base (a small company by Series A
      stage). Howard Greenfield was appointed President/CRO in June 2025, signaling active GTM
      investment and potentially accelerating channel partner revenue.

      Adverse signal: The combination of a $1B valuation mark (from January 2024 Series D),
      16-month-stale ARR disclosures, and no post-Series D financial updates creates a significant
      valuation opacity problem for any investor or acquirer performing diligence as of May 2026.
      At industry-standard enterprise identity SaaS revenue multiples of 10–20x ARR, the $1B
      valuation requires $50–100M ARR — achievable at the disclosed "tens of millions" floor —
      but the multiple paid at Series D implies a growth premium that is not independently
      verifiable without a data room.
    claimRefs:
