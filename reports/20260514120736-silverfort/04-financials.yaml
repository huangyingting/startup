  - id: gtm-efficiency
    title: "GTM Motion and Sales Efficiency Proxies"
    body: >-
      Silverfort's primary GTM motion is a direct enterprise sales model with typical 6–12-month
      sales cycles targeting Fortune 500 and Global 2000 companies. The average deal is championed
      by a CISO or VP of Identity/Security, with budget typically drawn from the identity security
      or SIEM/SOC budget. Enterprise sales cycles in this market are characterized by proof-of-concept
      deployments, active displacement of incumbent tools, and board/CFO budget approval for new
      platform categories.

      Key sales efficiency proxies (estimated from comparable enterprise identity SaaS vendors):
      Customer Acquisition Cost (CAC) is not publicly disclosed. Based on CyberArk's reported
      sales and marketing expense ratio (~45% of revenue) and comparable company benchmarks from
      Okta and SentinelOne, enterprise identity security vendors typically spend $0.80–$1.50 to
      acquire $1 of first-year ARR. At estimated $100M+ ARR, Silverfort's annualized S&M spend
      is likely in the $50–80M range, implying a sales efficiency ratio of approximately 1.0–1.5x.
      CAC payback at 80%+ gross margins would be approximately 12–20 months — within the 24-month
      window considered efficient for enterprise SaaS.

      Sales cycle and expansion dynamics: Silverfort's agentless architecture creates a land-and-expand
      opportunity: initial deployments protect human identity authentication, with subsequent expansions
      adding NHI protection modules, extending to more domains, or adding the Rezonate cloud-NHI
      capability. This expansion motion is a natural upsell that does not require re-competing for
      budget but extends the platform footprint. Net Revenue Retention (NRR) is the key metric
      for validating this expansion model but has not been publicly disclosed. Comparable enterprise
      identity security vendors (CyberArk: est. 115-120% NRR, Okta Enterprise: reported 120%+ NRR)
      suggest Silverfort's target NRR is 110–125% in an effective expansion motion.
    claimRefs:
