    statement: >-
      Silverfort's product is built on patented Runtime Access Protection (RAP) technology that integrates inline with
      an organization's existing IAM infrastructure (Active Directory, Okta, Azure AD, RADIUS, LDAP) without requiring
      agents on endpoints, proxies between systems, or changes to servers or applications.
    type: company-claimed
    topic: product-architecture
    sourceRefs:
      - SO001
