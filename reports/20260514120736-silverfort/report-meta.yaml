  recommendation: track
  confidence: medium
  riskRating: high
  valuationStance: stretched
  keyMetrics:
    valuationUsdM: 1500
    revenueRunRateUsdM: 115
    arrUsdM: 115
    revenueGrowthYoYPct: 35
    grossMarginPct: null
    nrrPct: null
