      background: >
        Chief Security Officer; previously led identity security research at Microsoft.
        Guides threat research and product security strategy.
      claimRefs: [CO003]
  foundingLocation: Tel Aviv, Israel
  headquarters: Tel Aviv, Israel
  productSummary: >
    Silverfort's Unified Identity Protection platform provides: (1) agentless MFA for Active
    Directory Kerberos, NTLM, LDAP, and RDP; (2) identity threat detection and response (ITDR)
    with behavioral risk scoring; (3) service account discovery and protection; and (4) privileged
    access intelligence across hybrid and multi-cloud environments — all without endpoint agents.
  customerFocus: >
    Primary: Enterprises with large on-premises Active Directory deployments and significant
    legacy infrastructure (financial services, healthcare, manufacturing, critical infrastructure,
    government). Secondary: Organizations seeking to layer ITDR onto existing CyberArk or Delinea
    PAM deployments. Typical ICP: 1,000–50,000 identity accounts across hybrid environments.
  businessModel: >
    Annual SaaS subscription priced per identity (user account) per year, with tiers for
    on-premises AD, cloud, and service account coverage. MSSP channel resale and OEM
    partnerships with leading MDR and SIEM vendors supplement direct enterprise sales.
  stage: Late-Stage Private (Series D, October 2023)
  fundingStatus: >
    Total raised: ~$228M across Series A ($11.5M, 2018), Series B ($30M, 2020), Series C
    ($65M, 2021), and Series D ($116M, Oct 2023). Series D led by Brighton Park Capital with
    participation from Greenfield Partners, Maor Investments, and StageOne Ventures.
    Post-money valuation: ~$1.5B (estimated).
  disclosureProfile: private-undisclosed
  claimRefs: [CO001, CO002, CO003, CV001, CV002]

summary:
  headline: >
    Silverfort's agentless identity security architecture is genuinely differentiated and
    the market tailwind is real, but the $1.5B Series D valuation carries a 20–50% premium
    over public comps and cannot be underwritten at high conviction without audited ARR, NRR,
    and burn-rate disclosure — warranting a conditional-buy stance pending diligence completion.
