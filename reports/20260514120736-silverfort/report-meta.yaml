companyProfile:
  summary: >
    Silverfort was founded in 2016 in Tel Aviv, Israel, by Hed Kovetz (CEO), Matan Fattal (CTO),
    and Yaron Kassner (CSO) — three alumni of Israel's military cyber intelligence units. The
    company developed a patented agentless, proxy-based approach to multi-factor authentication
    that enforces MFA on Active Directory Kerberos authentication without requiring any software
    agents on endpoints or servers. This architectural differentiation allows Silverfort to protect
    legacy systems, OT networks, and on-premises infrastructure that traditional agent-based PAM
    and MFA vendors cannot reach cost-effectively. After Series A ($11.5M, 2018), Series B ($30M,
    2020), and Series C ($65M, 2021), Silverfort raised $116 million in Series D led by Brighton
    Park Capital in October 2023 at an estimated $1.5 billion post-money valuation. The company
    was named a Leader in the Forrester Wave for ITDR in Q1 2024 and appeared in Gartner's ITDR
    coverage. As of 2025, Silverfort reports over 1,000 enterprise customers across financial
    services, healthcare, manufacturing, and government sectors.
  foundedDate: "2016-01-01"
  founders:
    - name: Hed Kovetz
      role: Co-founder & CEO
      background: >
        Israeli military cyber intelligence veteran; previously served in IDF Unit 8200.
        Leads product strategy and commercial execution at Silverfort.
      claimRefs: [CO001]
    - name: Matan Fattal
