figures:
- id: FU001
  title: Customer Adoption Journey Map
  description: Silverfort's typical enterprise customer journey from initial contact to full platform deployment.
  type: journey-map
  data:
    items:
    - label: Awareness
      value: 1
      note: Cyber insurance requirement, MSSP recommendation, or analyst report triggers evaluation; legacy AD protocol coverage
        is primary discovery hook.
    - label: Evaluation
      value: 2
      note: POC in AD lab environment; agentless deployment advantage demonstrated; competing against CyberArk and Microsoft
        MDI in most enterprise evaluations.
    - label: Procurement
      value: 3
      note: Security budget owner (CISO) approval required; contract terms and pricing negotiation; 3–6 month typical sales
        cycle for enterprise.
    - label: Deployment
      value: 4
      note: Inline proxy integration on domain controllers; significant professional services engagement; staged rollout across
        AD forest.
    - label: Expansion
      value: 5
      note: NHI module activation for service accounts; ITDR integration; cloud NHI (Rezonate) for hybrid environments; cyber
        insurance annual review triggers re-evaluation of coverage.
  sourceRefs:
  - SU006
  - SU010
  - SU012
