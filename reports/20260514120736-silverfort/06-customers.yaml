chapter:
  number: 6
  title: Customers
  summary: 'Silverfort has reached the 1,000+ enterprise customer milestone and claims several Fortune 50 logos, with a validated
    100% year-over-year growth trajectory backed by the $116M Series D (2023) investor narrative. The customer base skews
    toward large, complex enterprises — Fortune 500 financial services, healthcare systems, and government agencies — where
    Active Directory environments with legacy protocols make agentless identity protection uniquely valuable. Third-party
    review platforms (TrustRadius 9.3/10, G2 early positive reviews) provide modest but corroborating customer satisfaction
    signals; no large-scale NPS or churn data are publicly disclosed. The MSSP and cyber insurance channel expands reach into
    mid-market and regulated industries without dedicated enterprise sales overhead. Key unknowns include net revenue retention
    rate, named customer references with verifiable contract details, and whether the Fortune 50 claims are current active
    deployments or historical pilots. Retention durability is supported structurally by deep AD integration switching costs,
    but no quantified churn or gross retention figure is publicly available. Concentration risk is plausible — early-stage
    enterprise security companies frequently derive 30–50% of ARR from a handful of accounts — but cannot be verified from
    public data.

    '
sections:
- id: customer-base-profile
  title: Customer Base Profile and Scale
  body: 'Silverfort publicly claims "1,000+ organizations" as of 2025–2026, a figure corroborated by the company''s LinkedIn
    presence (629 employees, 44,086 followers), investor communications at the Series D close, and consistent messaging across
    the company website, partner materials, and third-party analyst coverage. Several Fortune 50 companies are cited as customers,
    with financial services, healthcare, and government identified as the primary verticals. The 1,000-customer threshold
    was reportedly crossed ahead of the $116M Series D in May 2023, suggesting that by mid-2026 the actual installed base
    may meaningfully exceed 1,000. Public review platforms provide limited but positive signals: TrustRadius records a 9.3/10
    rating from 3 enterprise reviewers; GetApp lists an overall 4.5/5 score; PeerSpot reviews emphasize healthcare and financial
    services deployments. Review volume is low relative to the stated customer count, which is typical for security vendors
    selling through enterprise procurement and NDA-constrained deployments. The company does not publish a customer list,
    case study library with named accounts, or geographic breakdown, which limits corroboration of the headline claim. The
    market coverage is primarily North America and Western Europe based on partner ecosystem geography and conference presence.
    Silverfort''s website highlights its cyber insurance channel partners (Resilience, Coalition) and MSSP program as secondary
    vectors reaching mid-market customers who cannot justify a direct enterprise sales engagement.'
  tableRefs:
  - TU001
  - TU002
  figureRefs:
  - FU002
- id: adoption-trajectory
  title: Adoption Trajectory and Growth Evidence
  body: The clearest public signal of adoption trajectory is the 100% year-over-year ARR growth cited in investor communications
    around the Series D in May 2023. This growth rate, if sustained, would imply an ARR range of $40–90M by mid-2025 based
    on plausible starting points, though Silverfort does not disclose ARR publicly. The $116M Series D at a reported $1B+
    valuation (Calcalist, May 2023) is consistent with a company at 10–15x ARR multiple, typical for high-growth identity
    security vendors in that period. Headcount grew from roughly 300 employees pre-Series D to 629 on LinkedIn as of May 2026,
    suggesting continued investment in go-to-market and R&D capacity. The Rezonate acquisition (late 2024) expanded the platform
    into cloud NHI, indicating confidence in near-term cross-sell capacity to the existing base. Partner channel activation
    — particularly the MSSP program and cyber insurance integrations — provides a structural growth multiplier that reduces
    CAC for mid-market accounts. The absence of a Series E or IPO filing as of mid-2026 may indicate either organic sufficiency
    of current capital, exploratory M&A positioning, or extended diligence by potential acquirers (Microsoft, CrowdStrike,
    and Palo Alto Networks are frequently cited as strategic acquirers in identity security). No public pipeline metrics,
    win rates, or sales cycle length data are available.
  tableRefs:
  - TU004
- id: named-customer-proof
  title: Named Customer Proof and Vertical Depth
  body: 'Silverfort does not publish a named customer list, but third-party review platforms and analyst citations provide
    partial evidence. PeerSpot reviewers identify financial services firms, healthcare networks, and manufacturing companies
    as deployers. TrustRadius reviews reference enterprise-scale deployments protecting 10,000+ user environments. The company''s
    website partner pages cite Resilience and Coalition (cyber insurance underwriters) as channel partners, implying endorsement
    by risk-quantification specialists who have validated the product''s protection claims in underwriting contexts. The Cyber
    Defense Magazine Gold Award (2024) and the company''s consistent appearance on Gartner''s Magic Quadrant for Access Management
    and identity threat detection reports provide analyst-tier validation. SCWorld and VentureBeat have covered Silverfort
    as a named vendor in identity security roundups, lending third-party editorial credibility. The company''s MSSPAlert presence
    confirms that managed service providers sell and deploy Silverfort as part of managed identity security bundles for mid-market
    and regulated industries. Fortune 50 customer claims remain unverifiable from public sources — no press releases name
    specific accounts. Diligence path: request reference customer contacts from the company''s sales team; review contract
    terms and renewal history in the data room.'
  tableRefs:
  - TU003
  - TU006
  figureRefs:
  - FU001
- id: retention-durability
  title: Retention Durability and Switching Costs
  body: 'Silverfort''s retention dynamics are structurally favorable due to deep Active Directory integration. The platform
    is deployed as an inline proxy on domain controllers — replacing or removing it requires re-architecting the organization''s
    authentication flow, testing NTLM and Kerberos policy continuity, and potentially leaving legacy systems unprotected during
    transition. This creates a switching cost profile comparable to PAM vaults and directory services rather than cloud-native
    SaaS tools. Customers who have extended MFA to legacy protocols, service accounts, and OT systems through Silverfort face
    a particularly high switching cost because no direct competitor offers equivalent agentless coverage at scale. TrustRadius
    and PeerSpot reviewers consistently cite "seamless integration with existing AD" and "no agents required" as reasons for
    continued use. No public NPS score, gross retention rate, or net revenue retention figure is available. The absence of
    public churn data is typical for private enterprise security vendors but limits diligence confidence. Adverse signals:
    one G2 review (archived, 2022) criticizes pricing opacity and contract flexibility, suggesting that early-stage renewal
    negotiations may be contentious. PeerSpot reviewers note that initial setup requires significant professional services
    engagement, which implies implementation investment that further cements retention but may slow initial deployment cycles.'
  tableRefs:
  - TU005
  figureRefs:
  - FU004
- id: expansion-concentration
  title: Expansion Economics and Concentration Risk
  body: 'Silverfort''s platform architecture creates natural expansion vectors: new modules (NHI, cloud NHI via Rezonate,
    ITDR) can be activated on the existing AD connector infrastructure without new agents or deployment projects. Each new
    module represents an upsell opportunity for the existing account team. The MSSP channel provides a land-and-expand path
    for mid-market accounts, where initial deployments covering core AD MFA can grow to include service account protection
    and cloud NHI as organizations mature their identity security posture. The cyber insurance channel (Resilience, Coalition)
    creates a unique expansion dynamic: insurers who recommend Silverfort as a risk mitigation measure may require or incentivize
    broader platform adoption at renewal. Concentration risk is a structural concern for a 1,000+ customer company that grew
    to scale primarily through enterprise sales: it is common for the top 20 accounts to represent 30–50% of ARR, and loss
    of a single Fortune 50 account could materially impact reported growth. No public concentration data is available. The
    Rezonate integration adds cloud NHI as a cross-sell vector, but integration maturity as of mid-2026 is unclear and may
    limit near-term upsell capacity. Total addressable expansion per account is high — identity security platform vendors
    typically target $500K–$3M ACV for Fortune 500 deployments — but actual ACV data for Silverfort is not publicly disclosed.'
  figureRefs:
  - FU003
callouts:
- calloutType: insight
  title: 1,000+ Enterprises with Fortune 50 Logos — Structurally Validated by Cyber Insurance Channel
  body: The 1,000+ customer claim is corroborated by the Series D investor narrative (100% YoY growth, $1B+ valuation), MSSP
    ecosystem activation, and cyber insurance channel endorsement by Resilience and Coalition — underwriters who validate
    protection claims for risk-pricing purposes. The Fortune 50 claim, while unverified by name, is consistent with the platform's
    value proposition in complex AD environments that are exclusively found at that scale.
  claimRefs:
  - CU001
  - CU003
  - CU012
- calloutType: risk
  title: No Public Churn or NPS Data — Retention Durability Structurally Inferred, Not Verified
  body: Silverfort has not disclosed gross retention, net revenue retention, or NPS scores. Retention durability is inferred
    from architectural switching costs (inline AD proxy, no agents, legacy protocol lock-in) rather than confirmed by quantitative
    renewal data. One archived G2 review raises pricing opacity as a friction point. Diligence must obtain retention metrics
    and top-10 account renewal history from the data room before validating the growth story.
  claimRefs:
  - CU021
  - CU022
  - CU031
- calloutType: risk
  title: Fortune 50 Claim Unverifiable — Named Reference Risk for Due Diligence
  body: No press releases, case studies, or regulatory disclosures name Silverfort's Fortune 50 customers. The claim is credible
    given the platform's technical value proposition, but cannot be independently confirmed from public sources. Any acquisition
    or funding diligence must include reference checks with named accounts to validate current active deployment status versus
    historical pilots.
