  - id: adverse-risks
    title: Adverse Signals, Governance Gaps, and Diligence Flags
    body: >
      Silverfort's most material diligence gaps reflect its status as a private company with no SEC reporting
      obligations and limited public financial disclosure. ARR and revenue figures are company-claimed and
      unaudited; the last disclosed growth rate (100% annually) and customer addition rate (100/quarter) date
      from January 2024, leaving an 18-month+ information gap through mid-2026. Independent verification of
      current financial metrics requires direct access to management or investor data rooms.

      Key-person dependency on the three co-founders — particularly CEO Hed Kovetz — is a structural risk.
      The founding team's continued involvement is central to the company's market narrative, investor
      relationships, and technical credibility. No public succession plan, executive bench depth disclosure,
      or key-man insurance arrangements have been disclosed.

      The headquarters migration from Tel Aviv, Israel to Plano, Texas (Dallas area) represents a strategic
      pivot toward North American enterprise sales. While this reduces geopolitical concentration risk, it also
      introduces operational complexity: engineering and R&D remain heavily concentrated in Israel, creating
      a dual-headquarters model with inherent coordination costs. Israel's cybersecurity ecosystem geopolitical
      risks (regional conflict, talent pipeline disruption) apply to Silverfort's R&D operations.

      Competitive pressure is intensifying from Microsoft (which bundles Defender for Identity with Microsoft
      365 E5), CrowdStrike (Falcon Identity), CyberArk, BeyondTrust, and new entrants like Delinea. The
      bundling threat from Microsoft in particular affects pricing leverage for Silverfort in accounts with
      heavy Microsoft licensing commitments.

      No material litigation, regulatory enforcement actions, leadership fraud allegations, layoffs, or
      sanctions were identified in public sources during this research. The company carries normal cybersecurity
      sector risks (geopolitical, competitive, customer concentration) without elevated adverse signals.
    claimRefs:
