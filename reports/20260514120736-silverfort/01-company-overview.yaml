  - id: founders-leadership
    title: Founders, Leadership, and Governance
    body: >
      Silverfort was co-founded by three veterans of the IDF's elite Unit 8200 intelligence corps, each
      occupying a distinct functional role that covers the primary executive competencies of the company.
      Hed Kovetz serves as CEO and Co-Founder. Kovetz is the primary external spokesperson, investor relations
      contact, and the architect of Silverfort's market positioning strategy. He has been the public face in all
      major fundraise announcements, customer briefings, and press interviews. His leadership has maintained
      consistent strategic direction since founding. Yaron Kassner serves as CTO and Co-Founder. Kassner leads
      Silverfort's technology architecture, innovation roadmap, and research team. His background in cryptography
      and enterprise security has driven the development of the patented RAP technology. He has spoken publicly
      at security conferences including RSAC and has articulated Silverfort's vision for protecting previously
      unprotectable identity assets. Matan Fattal serves as VP R&D and Co-Founder. Fattal leads engineering
      and product development, overseeing the build-out of the platform's expanding capabilities across NHI
      security, AI agent protection, and PAM modernization.

      In June 2025, Silverfort brought on Howard Greenfield as President and Chief Revenue Officer, a material
      leadership augmentation for the company's next-stage growth. Greenfield has extensive identity market
      experience, having served as CRO at SailPoint during its successful IPO in 2017 and as CRO at Centrify
      (now Delinea). Prior to joining Silverfort, he was an Operating Partner at Canaan, a venture capital firm,
      helping portfolio companies scale their go-to-market strategy. Greenfield's appointment signals Silverfort's
      intention to scale revenue aggressively and pursue a potential exit or significant expansion milestone.

      Mike Gregoire, Founding Partner at Brighton Park Capital and former CEO of CA Technologies and Taleo,
      joined Silverfort's board of directors when Brighton Park led the Series D round in January 2024. Gregoire
      has been a public champion for Silverfort's market thesis, quoted in multiple official communications.
      Avery Schwartz, a partner at Greenfield Partners (Series C lead), also joined the board at Series C close.

      Key-person risk is moderate to high. The founding team of three is fully integrated into Silverfort's
      identity as a company — each co-founder's continued engagement is central to technology credibility
      (Kassner), product execution (Fattal), and market narrative (Kovetz). No succession plan or key-man
      insurance disclosures are publicly available, representing a governance information gap for diligence.
