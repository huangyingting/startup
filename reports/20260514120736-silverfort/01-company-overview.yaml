  - id: scale-milestones
    title: Scale Metrics, Milestones, and Market Traction
    body: >
      As of early 2026, Silverfort serves 1,000+ enterprise organizations across North America, Europe, and
      Asia-Pacific, including several Fortune 50 companies per LinkedIn's company description. The company
      does not publicly disclose named enterprise customers. Publicly known customer references include Singtel,
      Samsonite, and UPS, which were mentioned by CEO Hed Kovetz in the Series C announcement as being among
      the "smaller" customers at that time. The 1,000+ customer figure is company-claimed and corroborated
      across multiple third-party reports and the company's own website.

      At the time of the Series D in January 2024, Silverfort was adding approximately 100 new customers per
      quarter, reflecting a customer acquisition velocity of approximately 400 net new customers per year. ARR
      was reported to be in the "tens of millions of dollars" and growing at 100% annually, implying ARR of
      approximately $40–90M at the time of the Series D announcement based on the "tens of millions" qualifier.
      No subsequent ARR disclosure has been publicly made.

      Employee count has grown substantially. At Series B (August 2020), Silverfort had 60 employees; at Series
      C (April 2022), the company had 120 employees; as of March 2025, Tracxn counted 604 employees; and as of
      LinkedIn data available in 2025, the company shows 629 employees. This roughly 10x growth from 60 to
      600+ employees over five years tracks with the rapid capital deployment and global expansion.

      Key product milestones include: the December 2023 scalable Service Account Protection launch; the January
      2024 Series D unicorn round; the September 2024 Identity-First Incident Response solution launch; the late
      2024 acquisition of Rezonate (extending NHI security capabilities); the December 2024 Privileged Access
      Security (PAS) launch; the January 2025 CrowdStrike integration; and the June 2025 AI Agent Security
      launch and Howard Greenfield appointment as President & CRO. Silverfort was named one of Fast Company's
      10 Most Innovative Companies in Security for 2025, confirming broad industry recognition.
