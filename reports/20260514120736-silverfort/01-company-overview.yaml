  - calloutType: strength
    title: Agentless Architecture Addresses Structural Market Gap
    body: >
      Silverfort's patented Runtime Access Protection (RAP) technology is the only commercially deployed
      solution that provides identity security controls across legacy systems, service accounts, command-line
      tools, and OT/ICS infrastructure without requiring agents, proxies, or application changes. This
      addresses a gap that incumbent PAM, MFA, and ITDR vendors have not solved, giving Silverfort a
      defensible differentiation in complex enterprise environments.
    claimRefs:
      - CO005
      - CO008

  - calloutType: strength
    title: Diverse Strategic Investor Syndicate
    body: >
      Silverfort's investor base includes Citi Ventures, General Motors Ventures, and Singtel Innov8 —
      strategic investors that represent potential enterprise customer relationships in financial services,
      automotive, and telco/APAC markets. This mix of strategic and financial investors provides both
      capital access and go-to-market leverage.
    claimRefs:
      - CO019
      - CO020
      - CO021
      - CO022

  - calloutType: risk
    title: 18-Month Financial Information Gap
    body: >
      The last disclosed revenue metrics (100% ARR growth, 100 customers/quarter) are from January 2024.
      No subsequent ARR, revenue, or growth rate disclosures are publicly available, creating material
      uncertainty about current financial trajectory. Diligence requires direct financial data access.
    claimRefs:
      - CO028
      - CO029

  - calloutType: risk
    title: Key-Person Risk in Founding Team
    body: >
      The three co-founders occupy the top three operational roles (CEO, CTO, VP R&D) with no identified
      management succession plan or disclosed key-man protections. Any departure of two or more co-founders
      simultaneously would represent a material adverse signal for the company's strategic continuity.
    claimRefs:
      - CO010
      - CO011
      - CO012

