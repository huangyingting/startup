company:
  name: Silverfort
chapter:
  number: 1
  title: Company Overview
  summary: >
    Silverfort is a US-Israeli privately held cybersecurity company founded in 2016 in Tel Aviv by three Unit 8200
    alumni — Hed Kovetz (CEO), Yaron Kassner (CTO), and Matan Fattal (VP R&D) — building the world's first
    agentless, proxyless unified identity security platform. The company reached unicorn status ($1B valuation)
    in January 2024 with a $116M Series D led by Brighton Park Capital, having raised $222M total, and as of
    early 2026 serves 1,000+ enterprise customers globally from offices in Plano (Texas HQ), Boston, Tel Aviv,
    London, Singapore, Sydney, Melbourne, Frankfurt, and Antwerp with approximately 629 employees.

sections:
  - id: company-identity
    title: Company Identity, Headquarters, and Business Model
    body: >
      Silverfort is a privately held cybersecurity company that operates the only end-to-end unified identity
      security platform capable of protecting all identities — human, machine, and AI-driven — across all
      environments: on-premises, hybrid, and cloud. The company was founded in 2016 in Tel Aviv, Israel by Hed
      Kovetz, Yaron Kassner, and Matan Fattal, three alumni of the Israeli Defense Forces' clandestine Unit 8200
      intelligence unit, widely recognized as one of the world's premier cyber intelligence organizations.

      The company's operational headquarters moved to Plano, Texas (5525 Granite Parkway), while maintaining a
      major R&D and engineering hub in Tel Aviv at Leonardo da Vinci Street, Landmark TLV Tower. Additional
      offices span Boston (Massachusetts), Sydney and Melbourne (Australia), Frankfurt (Germany), Singapore,
      and Antwerp (Belgium), reflecting a globally distributed enterprise-oriented organization.

      Silverfort's core product, the Silverfort Identity Security Platform, is built around patented Runtime
      Access Protection (RAP) technology. RAP integrates inline with existing Identity and Access Management
      (IAM) infrastructure — including Active Directory (AD), Okta, Azure AD (Entra ID), RADIUS, LDAP, ADFS —
      without requiring agents on endpoints, proxies between systems, or modifications to servers or applications.
      This agentless, proxyless architecture is Silverfort's primary technical differentiator: it enables
      organizations to extend Multi-Factor Authentication (MFA), identity threat detection, and Zero Trust
      policies to resources that other solutions cannot reach, including legacy systems, command-line tools,
      service accounts, industrial OT infrastructure, and machine-to-machine authentication.

      The business model is B2B SaaS with subscription-based licensing, targeting enterprises with complex
      heterogeneous identity environments. Revenue and go-to-market emphasis is concentrated in North America,
      where roughly half the customer base is located, with strong representation in financial services,
      healthcare, government/defense, critical infrastructure, and manufacturing. Silverfort does not publicly
      disclose ARR or specific revenue figures, but the company disclosed at Series D (January 2024) that revenue
      was growing at 100% annually and ARR was in the "tens of millions of dollars."
