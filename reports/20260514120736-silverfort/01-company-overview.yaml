    title: Unit 8200 Founding Pedigree with Persistent Leadership
    body: >
      All three co-founders are alumni of Israel's elite Unit 8200 intelligence corps, providing deep
      technical and operational credibility in enterprise identity security. The founding team has remained
      intact through all five funding rounds spanning eight years, an unusual stability that supports customer
      trust and institutional investor confidence.
