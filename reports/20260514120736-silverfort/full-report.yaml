      - number: '1.3'
        title: Funding History, Valuation, and Investor Base
        blocks:
          - type: paragraph
            body: >
              Silverfort has raised a total of $222 million across five distinct funding rounds from its founding in
              2016 through January 2024. The company achieved unicorn status — a valuation exceeding $1 billion — with
              its Series D round, closed January 23, 2024, which raised $116 million led by Brighton Park Capital.
              Brighton Park Capital is a growth equity firm focused on software and technology-enabled services; its
              Founding Partner Mike Gregoire, former CEO of CA Technologies, has described Silverfort as "one of the
              rare companies that has successfully envisioned how a large market will need to transform to solve a tough
              problem — in this case, identity security."

              The funding chronology is: a seed round in June 2017 (amount undisclosed); a Series A of $11.5 million in
              June 2018 led by TLV Partners; a Series B of $30 million in August 2020 led by Aspect Ventures (with Citi
              Ventures, Maor Investments, TLV Partners, StageOne Ventures, and Singtel Innov8 participating); a Series C
              of $65 million in April 2022 led by Greenfield Partners (with GM Ventures, Acrew Capital, Vintage
              Investment Partners, StageOne Ventures, Singtel Innov8, Citi Ventures, Aspect Ventures, and Maor
              Investments participating); and the Series D of $116 million in January 2024 led by Brighton Park Capital
              (with Acrew Capital, Greenfield Partners, Citi Ventures, General Motors Ventures, Maor Investments,
              Vintage Investment Partners, and Singtel Innov8 participating — all-equity structure per TechCrunch).

              The cumulative investor base is notable for its mix of strategic and financial investors. Strategic
              investors include Citi Ventures (Citibank's corporate VC arm), General Motors Ventures, and Singtel Innov8
              (Singapore Telecom's corporate VC), all of which represent potential channel or enterprise customer
              relationships. Financial investors include Brighton Park Capital, Greenfield Partners, Acrew Capital,
              Vintage Investment Partners, TLV Partners (an Israel-focused venture firm), StageOne Ventures, Maor
              Investments, and Aspect Ventures. The breadth and quality of institutional backers across all rounds
              reflects strong conviction across multiple investment cycles in Silverfort's market thesis.

              No secondary transactions, debt instruments, or credit facilities are publicly disclosed. The company has
              operated exclusively on equity financing to date. Pre-money valuation for Series C was not disclosed by
              the company; PitchBook cited a ~$150M valuation as of August 2020 (post-Series B), with significant growth
              implied at Series C. The Series D established a ~$1B post-money valuation confirmed by TechCrunch
              sourcing.
