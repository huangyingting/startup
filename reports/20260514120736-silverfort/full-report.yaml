              Key sales efficiency proxies (estimated from comparable enterprise identity SaaS vendors): Customer
              Acquisition Cost (CAC) is not publicly disclosed. Based on CyberArk's reported sales and marketing expense
              ratio (~45% of revenue) and comparable company benchmarks from Okta and SentinelOne, enterprise identity
              security vendors typically spend $0.80–$1.50 to acquire $1 of first-year ARR. At estimated $100M+ ARR,
