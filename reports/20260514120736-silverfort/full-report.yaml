        - label: CyberArk
          x: 1
          'y': 5
          note: Agent-required; broadest identity lifecycle (PAM, EPM, ITDR, secrets, SSO)
        - label: BeyondTrust
          x: 2
          'y': 4
          note: Agent-required; dual PAM+ITDR leader; strong breadth but not agentless
        - label: Delinea
          x: 2
          'y': 3
          note: Agent-required SaaS PAM; strong vaulting; limited ITDR/NHI
        - label: CrowdStrike Identity
          x: 1
          'y': 3
          note: Endpoint-agent-dependent; strong ITDR; limited agentless or NHI
        - label: SentinelOne Identity
