  - number: 5
    title: Product & Technology
    sections:
      - number: '5.1'
        title: Runtime Access Protection (RAP) Architecture
        blocks:
          - type: paragraph
            body: >-
              Silverfort's core architectural innovation is Runtime Access Protection (RAP), a technology that operates
              as an inline proxy within the organization's existing IAM infrastructure. Unlike agent-based identity
              security tools that require software installation on each endpoint, RAP connects directly to the domain
              controllers, LDAP servers, and RADIUS infrastructure as a proxying layer, receiving a copy of every
              authentication request — Kerberos tickets, NTLM challenges, LDAP bind requests, RADIUS packets, and
              RDP/SMB sessions — and enforcing policy decisions before the authentication completes. The enforcement
              mechanism is inline: Silverfort can approve, challenge (trigger MFA), or block any authentication in real
              time before the domain controller responds to the client.

              The architectural premise is that Active Directory domain controllers and RADIUS servers receive all
              authentication requests for on-premises Windows environments, making the domain controller a natural
              interception point. Silverfort installs a lightweight forwarder on the domain controller (distinct from an
              endpoint agent) that proxies authentication packets to the Silverfort policy engine. The policy engine
              applies risk scoring, behavioral baselines, and policy rules, then returns a decision to the forwarder
              within milliseconds. This approach means that any device, service account, or application that
              authenticates via AD — including legacy systems, OT equipment, manufacturing PLCs, and applications that
              cannot accept MFA agents — is automatically covered without any modification to those systems.

              The cloud delivery model uses a hybrid architecture: the Silverfort SaaS tenant handles policy management
              and telemetry aggregation, while the domain controller forwarder handles the authentication interception
              locally to avoid latency and single-point-of-failure risk. Status monitoring is provided at
              status.silverfort.com, which reports 99.999% uptime for the core MFA Service (CMS) and Azure Service Bus
              integration (MMS), consistent with enterprise-grade availability requirements. The RAP architecture is
              Silverfort's primary technical differentiation and is the foundation on which all platform modules are
              built.
            claimRefs:
              - CE001
              - CE002
              - CE003
              - CE004
              - CE005
              - CE006
