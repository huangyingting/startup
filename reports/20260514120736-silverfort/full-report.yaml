      - number: '2.2'
        title: 'Market Sizing: TAM, SAM, and SOM'
        blocks:
          - type: paragraph
            body: >-
              No analyst firm publishes a single unified identity protection market that matches Silverfort's full
              platform scope. Three proxy markets define the TAM range. The global IAM market is estimated at $25.96B in
              2025 growing to $42.61B by 2030 at a 10.4% CAGR per MarketsandMarkets (November 2025 publication). The PAM
              sub-segment, where Silverfort is explicitly named as a key player by MarketsandMarkets, is projected to
              reach $7.7B by 2028 at a 21.5% CAGR. Mordor Intelligence estimates the PAM market at $4.25B in 2025,
              growing to $13.83B by 2031 at 21.72% CAGR, with machine identities outnumbering human identities by 40:1.
              The Zero Trust security market provides a broader structural context at $36.5B in 2024 growing to $78.7B
              by 2029 at 16.6% CAGR per MarketsandMarkets.

              Silverfort's serviceable addressable market (SAM) is more narrowly defined as the intersection of PAM and
              ITDR for enterprise organizations operating hybrid Active Directory environments with 500 or more
              employees. Based on the PAM market range and ITDR's emergence as a discrete Gartner category (2022), the
              plausible SAM range is estimated at $7–12B by 2028 — the upper bound reflecting premium pricing for ITDR
              capability layered on top of PAM vaulting. Analyst estimates for PAM diverge substantially:
              MarketsandMarkets projects $7.7B by 2028 while VerifiedMarketResearch projects $28B by 2032, driven by
              different scope definitions that sometimes include adjacent IGA and identity analytics spending. North
              America accounted for 38.1% of PAM revenue in 2025, BFSI the largest vertical at 28.3%, and healthcare the
              fastest growing at 23.2% CAGR through 2031.

              Silverfort's serviceable obtainable market (SOM) is not publicly disclosed. Based on the company's $222M
              total raised, approximately 1,000 enterprise customers, and industry-standard SaaS penetration rates of
              3–8% of SAM, a directional SOM of $200–600M over a 3-year horizon is plausible but requires diligence
              confirmation of ARR and net revenue retention data.
