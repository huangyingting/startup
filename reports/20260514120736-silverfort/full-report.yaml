  - number: 2
    title: Market Analysis
    sections:
      - number: '2.1'
        title: Market Boundary and Definition
        blocks:
          - type: paragraph
            body: >-
              Silverfort's addressable market spans three adjacent identity security categories: privileged access
              management (PAM), identity threat detection and response (ITDR), and non-human identity (NHI) security.
              The company's Unified Identity Protection platform monitors and enforces authentication policies across
              on-premises Active Directory, Azure Active Directory / Entra ID, Okta, LDAP, RADIUS, and legacy enterprise
              systems — reaching identity surfaces that traditional PAM tools require deployed agents or proxies to
              protect.

              Included spend covers software and services that detect credential theft, prevent lateral movement,
              protect service accounts and machine identities, enforce MFA on privileged resources, and deliver
              real-time risk-based access policies across hybrid environments. Excluded from Silverfort's primary scope
              are endpoint detection and response (EDR), network-layer firewalls, cloud security posture management
              (CSPM), and identity governance and administration (IGA) platforms focused on joiner-mover-leaver
              workflows rather than runtime threat prevention.

              Key adjacencies include zero trust architecture platforms — which require identity security as a
              foundational pillar — broader IAM platforms (Okta, Microsoft Entra), and PAM vaulting solutions (CyberArk,
              BeyondTrust). The primary status-quo substitute is Microsoft Defender for Identity (MDI), included at zero
              incremental cost in the Microsoft 365 E5 license. Other substitutes include SIEM-based identity analytics,
              manual privileged-account auditing, and native Entra ID Conditional Access policies. Silverfort's
              differentiation from substitutes lies in agentless deployment, coverage of unmanaged legacy systems
              inaccessible to agent-based tools, and real-time enforcement rather than alerting-only posture.
            claimRefs:
              - CM001
              - CM002
              - CM003
              - CM004
              - CM005
