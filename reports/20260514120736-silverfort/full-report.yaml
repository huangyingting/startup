      - number: '5.5'
        title: Trust, Compliance, Roadmap, and Technical Risks
        blocks:
          - type: paragraph
            body: >-
              Trust and compliance posture: Silverfort operates a status page (status.silverfort.com) with real-time
              uptime metrics and has achieved 99.999% reported uptime for its core MFA service. Security certifications
              are not publicly disclosed on the Silverfort website; the company does not publicly claim SOC 2 Type II,
              ISO 27001, or FedRAMP authorization as of May 2026 — a gap for enterprise procurement teams evaluating
              regulated-industry deployments. Competitors CyberArk and Okta prominently display FedRAMP High
              certification, which is a prerequisite for US federal deployments. If Silverfort lacks FedRAMP
              authorization, its addressable market within US federal civilian and DoD environments is limited.

              Roadmap: The Rezonate acquisition announcement stated a target to "finish integrating Rezonate's
              technology into our unified platform in mid-2025." As of May 2026, the integration status is unknown from
              public sources. Silverfort's homepage references coverage for "AI agents" among the identity types it
              protects, suggesting the platform is extending NHI capabilities to AI agent identities (OAuth tokens, API
              keys, service accounts created by AI orchestration platforms) — an emerging use case as enterprises deploy
              AI agent frameworks (Microsoft Copilot, LangChain agents, Salesforce AgentForce) that create machine
              identity risk.

              Technical risks: (1) RAP proxy failure modes — if the Silverfort forwarder fails on a domain controller,
              authentication fallback behavior determines whether users are locked out or bypass security controls; this
              fail-open vs. fail-close configuration is critical but not publicly documented. (2) Microsoft MDI
              expansion — Microsoft's Defender for Identity product covers Kerberos/NTLM threat detection (the same
              protocol layer) and is delivered free with Microsoft 365 E5 licenses; continued MDI feature expansion
              reduces the ITDR differentiation for Microsoft-invested enterprises. (3) No public developer API or SDK
              means Silverfort cannot be integrated by customers through self-service; all integration work requires
              Silverfort professional services or supported connectors. (4) No public GitHub repository or developer
              community (0 HN threads referencing Silverfort, no StackOverflow tag) indicates the product is positioned
              as a vendor-managed security appliance rather than a developer-extensible platform.
