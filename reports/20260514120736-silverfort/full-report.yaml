      - number: '4.3'
        title: Cost Structure, Gross Margin, and Working Capital
        blocks:
          - type: paragraph
            body: >-
              Silverfort's cost structure is consistent with a software-only enterprise SaaS business. Cost of revenue
              (COGS) consists primarily of cloud infrastructure hosting costs, customer success personnel, and
              professional services delivery costs. Based on comparable vendors, gross margins are estimated at 78–85%:
              software subscription gross margins are typically 85–90%, blended down by professional services (30–50%
              gross margin). CyberArk reported subscription gross margins of 88% in FY2024; Silverfort's margin profile
              should be broadly comparable given similar software-only delivery with no hardware or agent
              infrastructure.

              Operating expenses: R&D investment is critical for Silverfort given the pace of competitive innovation
