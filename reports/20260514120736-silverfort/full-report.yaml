            - 'MFA providers: Microsoft Authenticator / Duo / Okta Verify'
  - id: FE002
    title: Customer Authentication Workflow with RAP Enforcement
    type: flow
    description: How a user or service account authentication request flows through the Silverfort RAP layer.
    sourceRefs:
      - SE001
      - SE006
      - SE013
    data:
      nodes:
        - id: n1
          label: User / Service Account
          detail: Initiates authentication (login, network share access, service-to-service call)
          type: input
        - id: n2
          label: Domain Controller
          detail: Receives authentication request (Kerberos TGT, NTLM challenge, LDAP bind, RADIUS)
          type: process
        - id: n3
          label: Silverfort DC Forwarder
          detail: Intercepts auth packet; forwards to Silverfort policy engine with identity context
          type: process
        - id: n4
          label: Silverfort Policy Engine (Cloud)
          detail: 'Risk-scores request: behavioral baseline check, ML anomaly detection, policy evaluation'
          type: process
        - id: n5
          label: Policy Decision
          detail: Approve / MFA Challenge / Block — returned to forwarder within milliseconds
          type: process
        - id: n6
          label: MFA Provider (if challenged)
          detail: Microsoft Authenticator / Duo / Okta Verify — secondary factor verification
          type: process
        - id: n7
          label: Authentication Outcome
          detail: DC grants/denies authentication; telemetry logged to SIEM; alerts generated if TTPs detected
          type: output
