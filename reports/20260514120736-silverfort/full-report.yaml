              approximately 1.0–1.5x. CAC payback at 80%+ gross margins would be approximately 12–20 months — within the
              24-month window considered efficient for enterprise SaaS.

              Sales cycle and expansion dynamics: Silverfort's agentless architecture creates a land-and-expand
              opportunity: initial deployments protect human identity authentication, with subsequent expansions adding
              NHI protection modules, extending to more domains, or adding the Rezonate cloud-NHI capability. This
              expansion motion is a natural upsell that does not require re-competing for budget but extends the
              platform footprint. Net Revenue Retention (NRR) is the key metric for validating this expansion model but
              has not been publicly disclosed. Comparable enterprise identity security vendors (CyberArk: est. 115-120%
              NRR, Okta Enterprise: reported 120%+ NRR) suggest Silverfort's target NRR is 110–125% in an effective
              expansion motion.
