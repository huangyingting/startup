  - id: TE002
    title: Workflow / Use-Case Table
    description: >-
      Key enterprise identity workflows that Silverfort addresses, with current-state problem, Silverfort solution,
      measured benefit, and limitation.
    sourceRefs:
      - SE001
      - SE014
      - SE018
      - SE024
    columns:
      - User Job / Workflow
      - Current Workflow Problem
      - Silverfort Solution
      - Measurable Benefit
      - Limitation
    notes: >-
      Use-case descriptions synthesized from product pages and analyst secondary sources (SE001, SE014, SE018, SE024);
      limitations reflect gaps in public documentation.
    rows:
      - - Legacy system MFA enforcement (mainframes, ERP, OT/SCADA)
        - No MFA possible on NTLM/Kerberos apps; security gap acknowledged but unaddressed for years
        - >-
          RAP intercepts all AD authentications inline; enforces MFA via existing provider without touching legacy
          system
        - >-
          MFA coverage extended to categorically unprotectable systems; identity attack vectors in OT environments
          closed
        - >-
          Fail-close vs. fail-open behavior during outages not publicly documented; latency impact on authentication not
          disclosed
      - - Service account lateral movement prevention
        - Service accounts have excessive privileges, cannot use MFA; used in 80%+ of ransomware attacks
        - >-
          NHI auto-discovery + behavioral baselining creates virtual fences; deviations blocked or challenged in real
          time
        - >-
          Lateral movement via compromised service accounts stopped at the credential-use step; reduces ransomware blast
          radius
        - >-
          False positive rate on behavioral baselines not publicly benchmarked; operational disruption risk from
          over-tuning
      - - Cloud identity security (post-Rezonate)
        - On-prem AD coverage strong; cloud IdPs (Entra ID, AWS IAM) created a coverage gap for cloud workloads
        - Rezonate's cloud NHI/ISPM extends coverage to cloud service principals and SaaS OAuth credentials
        - >-
          Unified on-prem and cloud identity posture from a single platform; eliminates need for separate cloud CIEM
          tool
        - Integration timeline uncertain; cloud coverage maturity lower than battle-tested AD coverage
      - - Identity threat hunting and ITDR
        - >-
          SOC teams rely on endpoint telemetry; identity-based attack TTPs (Kerberoasting, lateral movement) are
          underdetected
        - ITDR module generates real-time alerts from authentication telemetry; integrates into SIEM/SOAR workflow
        - >-
          Earlier detection of Pass-the-Hash, Golden Ticket, Kerberoasting attacks from live authentication flow vs.
          log-based SIEM
        - >-
          ML model accuracy and false positive rate not publicly disclosed; MDI (free with E5) covers similar detection
          scope
      - - PAM enforcement without vault replacement
        - >-
          Organizations with CyberArk or BeyondTrust need MFA enforcement and JIT access but cannot afford vault
          replacement
        - >-
          Silverfort's PAM gateway enforces JIT access and MFA on privileged accounts by intercepting privileged auth
          flows
        - PAM coverage extended to privileged accounts without vault migration; complementary to existing PAM investment
        - No native vault or session recording; credential checkout workflows require separate PAM tool
  - id: TE003
    title: Technology / Operating Architecture Table
    description: Silverfort's architectural layers, component roles, key dependencies, and associated technical risks.
    sourceRefs:
      - SE006
      - SE012
      - SE013
      - SE015
    columns:
      - Layer / Component
      - Role
      - Dependency
      - Risk
    notes: >-
      Architecture derived from official technical documentation and Microsoft Active Directory integration docs (SE006,
      SE012, SE013, SE015); some layer details inferred from product behavior.
    rows:
      - - Cloud SaaS Tenant
        - Policy engine, ML risk scoring, management console, telemetry aggregation, alert management
        - Internet connectivity from on-prem environment; Azure Service Bus for cloud messaging (MMS)
        - >-
          SaaS outage would disrupt policy updates and telemetry; MFA enforcement fails over to local decision if
          offline
      - - Domain Controller Forwarder
        - Protocol-layer authentication interception (Kerberos, NTLM, LDAP); proxies auth packets to policy engine
        - Windows Server on domain controller; all DCs in each site must have forwarder for full coverage
        - Forwarder failure on primary DC could impact authentication latency; redundant DCs required for HA
      - - RADIUS / LDAP Integration
        - Intercepts RADIUS authentication from VPN, Wi-Fi, and network device authentication flows
        - RADIUS server availability; LDAP directory structure for attribute lookups
        - Coverage gap if some RADIUS servers not onboarded; LDAP schema variations in non-Microsoft environments
      - - Cloud Identity Layer (Rezonate)
        - AWS IAM, Azure Entra ID, GCP service account discovery and NHI enforcement for cloud environments
        - Cloud IdP API access for service principal enumeration; cloud connectivity
        - Integration maturity post-acquisition uncertain; cloud coverage requires separate configuration from on-prem
      - - SIEM / SOAR Integration
        - Syslog/API alert forwarding to SIEM platforms (Splunk, Sentinel, QRadar); SOAR trigger for automated response
        - SIEM platform API compatibility; syslog infrastructure
        - Alert volume tuning required to avoid SOC fatigue; integration depth varies by SIEM vendor
      - - MFA Provider Integration
        - Integrates with Microsoft Authenticator, Duo, Okta Verify, TOTP/SMS as second factor for MFA challenges
        - Third-party MFA provider availability and reliability; customer's MFA license
        - MFA provider outages propagate to authentication failures; Silverfort is not a MFA provider itself
