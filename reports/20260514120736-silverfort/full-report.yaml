      - number: '2.5'
        title: Sizing Gaps and Diligence Asks
        blocks:
          - type: paragraph
            body: >-
              The most material evidence gap is the absence of a widely accepted standalone market size for ITDR or
              unified identity protection. Analysts size IAM ($25.96B), PAM ($4–7.7B), and Zero Trust ($36.5B) as
              separate categories without isolating the Silverfort-specific intersection of PAM, ITDR, and NHI. This
              creates a range-of-TAM problem: using the broadest IAM TAM implies a market far larger than Silverfort's
              realistic sales motion, while using PAM alone excludes the ITDR and NHI opportunity that distinguish
              Silverfort from pure PAM vaulting vendors.

              The NHI management market is analytically underdeveloped. Machine identities — service accounts, API keys,
              OAuth tokens, and AI agent credentials — are cited by Mordor Intelligence as a critical demand driver,
              with machine-to-human ratios reaching 40:1 in modern enterprises. However, no major analyst firm had sized
              NHI as a discrete market segment as of May 2026. Given Silverfort's 2024 acquisition of Rezonate to
              strengthen NHI capabilities, the incremental revenue contribution from NHI use cases is a key diligence
              ask.

              Conflicting PAM market estimates ranging from $3.6B to $28B by 2032 reflect genuine uncertainty about
              boundary conditions and should not be averaged or cited as a single consensus figure.
              VerifiedMarketResearch's higher estimate likely includes adjacent IGA and identity analytics spending
              beyond the core PAM vaulting and session management that MarketsandMarkets and Mordor count. Silverfort's
              own ARR as of Q1 2026 has not been publicly disclosed; the last known data point was "tens of millions
              growing ~100% YoY" as of the January 2024 Series D announcement. Priority diligence asks include: current
              ARR and net revenue retention; revenue split across PAM, ITDR, and NHI; deal size distribution; and
              win/loss rates against CyberArk, BeyondTrust, and Microsoft MDI.
