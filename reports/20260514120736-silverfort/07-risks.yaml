  evidenceGaps:
  - id: EGR001
    title: No Public SLA or Availability History for Silverfort RAP Proxy
    description: 'Silverfort''s status page (status.silverfort.com) provides real-time incident visibility but does not publish
      historical uptime data, SLA commitments, or availability percentages. The inline proxy architecture''s fail-open vs.
      fail-close behavior under failure conditions is not documented in publicly accessible materials. Diligence path: request
      SLA contract terms, historical incident reports, and HA architecture design documentation from the data room.'
    relatedQuestionRefs:
    - QR018
    - QR019
  - id: EGR002
    title: Microsoft MDI Inline Enforcement Roadmap Not Publicly Disclosed
    description: 'Microsoft has not publicly committed to adding Kerberos/NTLM inline policy enforcement to Microsoft Defender
      for Identity or Entra ID Protection. The competitive timeline for closing this capability gap is unknown. Diligence
      path: obtain Microsoft roadmap intelligence from resellers, Gartner briefings, or Microsoft advisory relationships;
      test current MDI capabilities in a lab environment.'
    relatedQuestionRefs:
    - QR009
    - QR010
  - id: EGR003
    title: Israeli Export Control Applicability Not Publicly Determined
    description: 'Whether Silverfort''s platform is subject to Israeli Ministry of Defense export licensing requirements (given
      its dual-use nature as an authentication interception technology) or US EAR/ECCN controls on Israeli-origin security
      software is not publicly disclosed. This is particularly relevant for US federal agency sales and Five Eyes government
      deployments. Diligence path: obtain export control legal opinion from Israeli and US counsel; review any existing export
      licenses or ITAR/EAR determinations in the data room.'
    relatedQuestionRefs:
    - QR005
    - QR006
    relatedTableRefs:
    - TR001
  - id: EGR004
    title: Silverfort Post-Series D Burn Rate and Runway Not Disclosed
    description: 'No financial statements, burn rate disclosures, or runway estimates have been publicly filed or disclosed
      by Silverfort. The $116M Series D close was May 2023; runway at typical growth-stage burn rates (estimated $35–60M/year
      for a 629-employee company) may be reaching its limit without a Series E or ARR cash-flow positive status. Diligence
      path: request audited financial statements, current cash position, and 12-month forward burn model from the data room.'
    relatedQuestionRefs:
    - QR024
    - QR023
    - QR022
