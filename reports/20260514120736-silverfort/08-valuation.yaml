  title: Thesis / anti-thesis table
  description: Thesis drivers and anti-thesis arguments with view-change triggers for Silverfort's investment case.
  columns:
  - Axis
  - Thesis Argument
  - Anti-Thesis Argument
  - What Would Change the View
  rows:
  - - Market
    - 'ITDR/PAM growing 20-25% CAGR; identity is #1 CISO priority'
    - Market could be captured by Microsoft bundles at $0 marginal cost
    - Microsoft closes agentless on-prem gap natively in Entra
  - - Product
    - Agentless AD coverage unmatched; 1,000+ integrations create switching cost
    - CrowdStrike and SentinelOne converging on identity via endpoint agent
    - CrowdStrike Identity GA at comparable coverage with existing deployment
  - - Financials
    - ~$115M est. ARR with 35%+ growth trajectory on strong Series D validation
    - No audited disclosures; burn rate and NRR unknown
    - ARR disclosed below $80M or NRR below 105% in due diligence
  - - Exit
    - Strategic M&A from PANW/CrowdStrike/Broadcom remains credible at 8-12× ARR
    - IPO market requires $250M+ ARR threshold; may need Series E first
    - 3 consecutive NRR < 100% quarters signaling competitive erosion
  notes: View-change triggers are binary thesis-break events; partial deterioration warrants position sizing reduction only.
