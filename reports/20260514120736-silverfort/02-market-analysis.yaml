  evidenceGaps:
    - type: missing-source
      severity: material
      topic: itdr-market-size
      missingEvidence: >-
        A standalone analyst market size for identity threat detection and response (ITDR) as a
        discrete category, published by Gartner, Forrester, or IDC for the 2025–2028 period.
      whyItMatters: >-
        Without a bounded ITDR market estimate, TAM analysis defaults to the broader IAM or Zero
        Trust market, which substantially overstates Silverfort's realistic sales motion and makes
        TAM comparisons to direct competitors (Semperis, Illusive) imprecise.
      diligencePath: >-
        Request Silverfort's internal market sizing model and the analyst reports used in the Series D
        materials. Also check KuppingerCole and Forrester ITDR wave publications for discrete sizing.
      relatedQuestionRefs:
        - QM003

    - type: missing-source
      severity: material
      topic: nhi-market-size
      missingEvidence: >-
        A published market size estimate for non-human identity (NHI) management as a standalone
        category, including service accounts, API tokens, OAuth credentials, and AI agent identities.
      whyItMatters: >-
        Silverfort's 2024 acquisition of Rezonate was explicitly to strengthen NHI capabilities.
        Without an NHI market estimate, it is not possible to size this incremental TAM component
        or assess whether NHI expands Silverfort's SAM materially beyond the core PAM/ITDR estimate.
      diligencePath: >-
        Monitor Gartner emerging technology research for NHI market sizing. Request Rezonate
        integration roadmap and NHI-specific ARR contribution from management.
      relatedQuestionRefs:
        - QM017
        - QM025

    - type: private-evidence-only
      severity: material
      topic: silverfort-arr-sam
      missingEvidence: >-
        Silverfort's current ARR (Q1 2026), net revenue retention rate, and company-generated
        SAM estimate showing how management sizes its addressable market internally.
      whyItMatters: >-
        The last disclosed ARR data point was "tens of millions growing ~100% YoY" as of January
        2024 — over 18 months stale. Without current ARR and NRR, it is impossible to cross-check
        analyst market sizing against actual company traction or build a credible valuation model.
      diligencePath: >-
        Request ARR, NRR, deal size distribution, and pipeline metrics directly from Silverfort
        management as part of due-diligence data-room access.
      relatedQuestionRefs:
        - QM004

    - type: missing-source
      severity: minor
      topic: pam-deal-size
      missingEvidence: >-
        Published data on average contract value (ACV) or annual recurring revenue per enterprise
        customer for PAM and ITDR vendors, broken out by deal size tier (SMB vs mid-market vs large enterprise).
      whyItMatters: >-
        Without deal size benchmarks, it is difficult to project SOM from the enterprise customer
        count or assess whether Silverfort's ~1,000 customer base implies ARR consistent with
        industry benchmarks for enterprise security platforms.
      diligencePath: >-
        Check CyberArk and BeyondTrust public filings for ARPU or ACV disclosures. Review
        Gartner Peer Insights pricing data for PAM solutions.
