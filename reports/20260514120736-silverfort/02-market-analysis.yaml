  - id: sizing-gaps
    title: "Sizing Gaps and Diligence Asks"
    body: >-
      The most material evidence gap is the absence of a widely accepted standalone market size for
      ITDR or unified identity protection. Analysts size IAM ($25.96B), PAM ($4–7.7B), and Zero Trust
      ($36.5B) as separate categories without isolating the Silverfort-specific intersection of
      PAM, ITDR, and NHI. This creates a range-of-TAM problem: using the broadest IAM TAM implies a
      market far larger than Silverfort's realistic sales motion, while using PAM alone excludes the
      ITDR and NHI opportunity that distinguish Silverfort from pure PAM vaulting vendors.

      The NHI management market is analytically underdeveloped. Machine identities — service accounts,
      API keys, OAuth tokens, and AI agent credentials — are cited by Mordor Intelligence as a critical
      demand driver, with machine-to-human ratios reaching 40:1 in modern enterprises. However, no
      major analyst firm had sized NHI as a discrete market segment as of May 2026. Given Silverfort's
      2024 acquisition of Rezonate to strengthen NHI capabilities, the incremental revenue contribution
      from NHI use cases is a key diligence ask.

      Conflicting PAM market estimates ranging from $3.6B to $28B by 2032 reflect genuine uncertainty
      about boundary conditions and should not be averaged or cited as a single consensus figure.
      VerifiedMarketResearch's higher estimate likely includes adjacent IGA and identity analytics
      spending beyond the core PAM vaulting and session management that MarketsandMarkets and Mordor
      count. Silverfort's own ARR as of Q1 2026 has not been publicly disclosed; the last known
      data point was "tens of millions growing ~100% YoY" as of the January 2024 Series D announcement.
      Priority diligence asks include: current ARR and net revenue retention; revenue split across PAM,
      ITDR, and NHI; deal size distribution; and win/loss rates against CyberArk, BeyondTrust, and
      Microsoft MDI.
    claimRefs:
      - CM036
      - CM037
      - CM038
      - CM039
      - CM040

callouts:
  - calloutType: insight
    title: "Credential Abuse Is the Primary TAM Growth Engine"
    body: >-
      The CrowdStrike 2025 Global Threat Report's headline finding — that adversaries now routinely
      log in rather than break in — is not marketing language; it is a structural demand signal for
      identity security platforms. With the average eCrime breakout time at 29 minutes and AI-enabled
      attacks growing 89% year-over-year, the window for detection is collapsing. Every minute of
      unmonitored lateral movement via service accounts, Kerberoasting, or NTLM relay is a breach in
      progress. Silverfort's real-time enforcement architecture is directly positioned to address this
      vector. The investor question is whether the TAM growth from credential abuse will exceed the
      pace of Microsoft's MDI improvement and bundling strategy.
    claimRefs:
      - CM020
      - CM021
      - CM022
      - CM030

  - calloutType: risk
    title: "Analyst Estimate Divergence Creates SAM Uncertainty"
    body: >-
      PAM market size estimates range from $3.6B (VerifiedMarketResearch 2024 baseline) to $28B by
      2032 — a nearly 8x spread. This divergence is not random; it reflects genuine disagreement about
      where PAM ends and adjacent categories (IGA, ITDR, NHI, identity analytics) begin. An investor
      who anchors on the $28B figure will overstate Silverfort's TAM; one who uses only the narrowest
      PAM vaulting estimate will understate the ITDR and NHI opportunity. Diligence should request
      Silverfort's internal market sizing methodology and the analyst report(s) used in the Series D
      pitch deck, as these will reveal how management frames its own addressable market and growth
      assumptions.
    claimRefs:
      - CM007
      - CM009
      - CM013
      - CM038

  - calloutType: risk
    title: "Microsoft MDI Bundling Is the Primary Market Structure Risk"
    body: >-
      Microsoft Defender for Identity is included in the Microsoft 365 E5 license at zero incremental
      cost to buyers already on E5. In the majority of large enterprise accounts — precisely Silverfort's
      target ICP — MDI is already provisioned, even if not fully configured. Any investor model that
      does not account for the MDI baseline will overstate Silverfort's greenfield opportunity. The
      critical diligence question is what percentage of Silverfort wins occur in accounts where MDI is
      deployed and inadequate versus accounts where MDI was never configured. This win/loss analysis
      with MDI context should be a mandatory request in management due-diligence sessions. CyberArk's
      position as the dominant PAM incumbant adds a second layer of competitive friction in displacement
      scenarios.
    claimRefs:
      - CM030
      - CM031
      - CM033

