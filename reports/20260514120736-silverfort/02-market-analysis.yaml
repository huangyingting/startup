  - id: growth-drivers-constraints
    title: "Growth Drivers and Adoption Constraints"
    body: >-
      Identity-based attacks are the dominant enterprise intrusion vector. The CrowdStrike 2025 Global
      Threat Report documented that adversaries now routinely log in rather than break in, using stolen
      or abused credentials as the primary intrusion method. The average eCrime breakout time reached
      just 29 minutes in 2025, and AI-enabled attacks grew 89% year-over-year, compressing the window
      for detection and response. The IBM Cost of Data Breach Report 2025 corroborates this trend,
      with phishing and compromised credentials identified as leading initial attack vectors.

      Three regulatory tailwinds directly drive IAM and identity security spending. The SEC's 2023
      cybersecurity disclosure rules require public companies to report material cybersecurity incidents
      within four business days, elevating board-level urgency for identity visibility and governance.
      The NIST SP 800-207 Zero Trust Architecture standard and the CISA Zero Trust Maturity Model
      provide federal and enterprise frameworks that treat identity as the primary security pillar.
      Europe's NIS2 Directive, enforceable since October 2024, mandates identity security controls for
      operators of essential and important entities across 18 critical sectors, opening a substantial
      European market opportunity for Silverfort.

      Key adoption constraints temper the growth outlook. Microsoft Defender for Identity (MDI) is
      included in Microsoft 365 E5 at zero incremental cost, providing real-time AD threat detection
      to buyers already on E5. Any account strategy must identify where MDI is deployed and insufficient
      versus where it has not been configured. Implementation complexity in brownfield AD environments
      with legacy forest structures slows enterprise PAM projects. Budget compression during 2024–2025
      security rationalization cycles has led enterprises to consolidate overlapping tools. Organizational
      switching costs from incumbent PAM deployments at CyberArk or BeyondTrust create inertia.
      Cyber-insurance companies now frequently require PAM controls as a precondition for underwriting,
      creating a structural demand tailwind that partially offsets budget pressures.
