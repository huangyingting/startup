  name: Silverfort

chapter:
  number: 2
  title: Market Analysis
  summary: >-
    Silverfort competes at the intersection of privileged access management (PAM), identity threat
    detection and response (ITDR), and non-human identity (NHI) security — a composite addressable
    market with no single analyst consensus but estimated in aggregate at $7–12B by 2028, growing at
    roughly 20% CAGR driven by credential-based attacks (CrowdStrike 2025 GTR: adversaries "log in,
    not break in"), zero-trust regulatory mandates (NIST SP 800-207, CISA ZTMM, EO 14028), SEC
    cybersecurity disclosure requirements, and the emergence of machine identity management as
    enterprises grapple with 40:1 non-human-to-human identity ratios. Key constraints include
    Microsoft Defender for Identity bundled at zero incremental cost in M365 E5 and complex brownfield
    AD deployments. Silverfort's ARR and SAM penetration remain undisclosed, creating material sizing
    uncertainty.

sections:
  - id: market-boundary
    title: "Market Boundary and Definition"
    body: >-
      Silverfort's addressable market spans three adjacent identity security categories: privileged
      access management (PAM), identity threat detection and response (ITDR), and non-human identity
      (NHI) security. The company's Unified Identity Protection platform monitors and enforces
      authentication policies across on-premises Active Directory, Azure Active Directory / Entra ID,
      Okta, LDAP, RADIUS, and legacy enterprise systems — reaching identity surfaces that traditional
      PAM tools require deployed agents or proxies to protect.

      Included spend covers software and services that detect credential theft, prevent lateral
      movement, protect service accounts and machine identities, enforce MFA on privileged resources,
      and deliver real-time risk-based access policies across hybrid environments. Excluded from
      Silverfort's primary scope are endpoint detection and response (EDR), network-layer firewalls,
      cloud security posture management (CSPM), and identity governance and administration (IGA)
      platforms focused on joiner-mover-leaver workflows rather than runtime threat prevention.

      Key adjacencies include zero trust architecture platforms — which require identity security as a
      foundational pillar — broader IAM platforms (Okta, Microsoft Entra), and PAM vaulting solutions
      (CyberArk, BeyondTrust). The primary status-quo substitute is Microsoft Defender for Identity
      (MDI), included at zero incremental cost in the Microsoft 365 E5 license. Other substitutes
      include SIEM-based identity analytics, manual privileged-account auditing, and native Entra ID
      Conditional Access policies. Silverfort's differentiation from substitutes lies in agentless
      deployment, coverage of unmanaged legacy systems inaccessible to agent-based tools, and
      real-time enforcement rather than alerting-only posture.
    claimRefs:
      - CM001
      - CM002
      - CM003
      - CM004
      - CM005
    tableRefs:
      - TM001

  - id: market-sizing
    title: "Market Sizing: TAM, SAM, and SOM"
    body: >-
      No analyst firm publishes a single unified identity protection market that matches Silverfort's
      full platform scope. Three proxy markets define the TAM range. The global IAM market is
      estimated at $25.96B in 2025 growing to $42.61B by 2030 at a 10.4% CAGR per MarketsandMarkets
      (November 2025 publication). The PAM sub-segment, where Silverfort is explicitly named as a key
      player by MarketsandMarkets, is projected to reach $7.7B by 2028 at a 21.5% CAGR. Mordor
      Intelligence estimates the PAM market at $4.25B in 2025, growing to $13.83B by 2031 at 21.72%
      CAGR, with machine identities outnumbering human identities by 40:1. The Zero Trust security
      market provides a broader structural context at $36.5B in 2024 growing to $78.7B by 2029 at
      16.6% CAGR per MarketsandMarkets.

      Silverfort's serviceable addressable market (SAM) is more narrowly defined as the intersection
      of PAM and ITDR for enterprise organizations operating hybrid Active Directory environments with
      500 or more employees. Based on the PAM market range and ITDR's emergence as a discrete Gartner
      category (2022), the plausible SAM range is estimated at $7–12B by 2028 — the upper bound
      reflecting premium pricing for ITDR capability layered on top of PAM vaulting. Analyst estimates
      for PAM diverge substantially: MarketsandMarkets projects $7.7B by 2028 while VerifiedMarketResearch
      projects $28B by 2032, driven by different scope definitions that sometimes include adjacent IGA
      and identity analytics spending. North America accounted for 38.1% of PAM revenue in 2025,
      BFSI the largest vertical at 28.3%, and healthcare the fastest growing at 23.2% CAGR through 2031.

      Silverfort's serviceable obtainable market (SOM) is not publicly disclosed. Based on the company's
      $222M total raised, approximately 1,000 enterprise customers, and industry-standard SaaS
      penetration rates of 3–8% of SAM, a directional SOM of $200–600M over a 3-year horizon is
      plausible but requires diligence confirmation of ARR and net revenue retention data.
    claimRefs:
      - CM006
      - CM007
