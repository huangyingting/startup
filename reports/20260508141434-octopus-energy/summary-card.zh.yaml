summary:
  headline: Octopus Energy 把英国 NPS 最高的能源零售商和 $8.65B 的 AI 公用事业平台绑在一起；如果 Kraken ARR 和流失率得到验证，$9B 入场有防守性——但 data room 缺口仍是硬阻碍。
