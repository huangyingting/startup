  topStrengths:
    - >-
      Kraken Technology spun off at $8.65B (December 2025) — a category-defining utility SaaS platform with 70M+
      contracted accounts across 27+ jurisdictions, commanding a 17x ARR multiple consistent with winner-take-most
      platform dynamics.
    - >-
      Seven consecutive years as Which? Recommended Provider with NPS exceeding +60, reflecting Kraken's live production
      performance and validating the platform's core value proposition to prospective utility licensees.
    - >-
      First materially profitable year in FY24 (£83M net profit, £95M EBITDA) following sustained investment, reducing
      late-stage burn risk and demonstrating that the retail and technology businesses can support each other
      economically.
    - >-
      OEG Generation's solar asset portfolio provides a natural hedge against wholesale electricity price spikes,
      creating a structural cost advantage unavailable to pure retail competitors.
  topRisks:
    - >-
      Kraken ARR ($500M+ estimated) is unaudited and unconfirmed by any public disclosure; the entire $8.65B spinoff
      valuation and 17x ARR multiple cannot be underwritten without data-room access to audited recurring revenue
      figures and churn rates by geography.
    - >-
      OEG's commodity procurement credit facility (size, counterparties, covenants) is not publicly disclosed — creating
      implicit leverage that cannot be modelled and could trigger margin calls during commodity price stress.
    - >-
      Ofgem enforcement remains an active risk: the July 2025 £1.5M billing fine and open 2023 prepayment meter
      investigation represent contingent liabilities of unknown quantum, with potential for escalation to industry-wide
      market investigation.
    - >-
      AWS single-cloud dependency for Kraken (70M+ accounts) creates a catastrophic failure mode with no disclosed
      multi-cloud failover or DR test results — a thesis-break risk if a P0 outage triggers SLA penalties and regulatory
      censure simultaneously.
  unresolvedGaps:
    - >-
      Kraken ARR and trailing 12-month churn by geography — the primary valuation driver is unauditable from public
      sources; without this, the $8.65B multiple is speculative.
    - >-
      OEG commodity credit facility: size, counterparties, covenants, and mark-to-market position represent implicit
      leverage that cannot be modelled without data-room access.
    - >-
      Full preference/dilution stack (Series A through E): secondary investors cannot compute effective per-share
      economics from public filings alone; Companies House provides partial data.
    - >-
      Ofgem prepayment meter investigation (2023): no formal outcome has been announced for Octopus specifically as of
      the run date; contingent liability is not quantifiable from public data.
    - >-
      OEG FY25 audited accounts: not yet published; the financial position post-Kraken spinoff and post-July 2025 Ofgem
      enforcement is unknown.
