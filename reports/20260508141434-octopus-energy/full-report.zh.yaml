      - number: '4.4'
        title: 财务结论与尽调议程
        blocks:
          - type: paragraph
            body: >
              Octopus Energy Group 的财务画像最好拆成两家公司看：一家大型、低利润零售和大宗商品运营商（£12.4 billion 收入，约 0.76% EBITDA 利润率），以及一个高增长、高利润
              SaaS 平台（Kraken：£90 million SaaS 收入、£35 million 利润、68%
              增长）。收入质量混合——零售收入体量大，但暴露于大宗商品价格波动、监管价格上限和营运资金波动；Kraken SaaS 收入则是经常性、签约且高利润。Kraken 部分分拆会模糊后续财务可比性，并引入估值拐点风险。


              核心财务尽调卡点是：（1）未公开披露现金、未提取信用额度或月度烧钱；（2）没有独立审计的分部毛利率视角；（3）国际零售亏损头寸未量化；（4）Kraken 分拆估值和所有权经济性尚未披露。考虑到 FY24
              集团层面盈利，以及公司持续以更高估值获得融资的可见记录，资本风险看起来可控，但没有数据室访问无法确认。对潜在投资或合作而言，核心问题是：英国能源市场危机后常态化、零售利润被压缩时，Kraken 的 SaaS
              利润率能否结构性抵消这种压力。
