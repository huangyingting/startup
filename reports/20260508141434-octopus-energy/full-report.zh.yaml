        - 显示基础设施相对纯零售的溢价；受监管网络资产支撑高于纯零售的倍数
        - SSE 倍数主要由受监管网络资产（RIIO-T2/ED2）驱动；单看零售部分，倍数低得多
      - - EDF Group（英国和法国）
        - 综合欧洲能源巨头
        - ~€143B 合并收入（FY2023）
        - ~0.5x 集团（EV ~€70B）
        - 为核电 / 零售混合的综合公用事业提供欧洲参考倍数
        - 法国国有权扭曲市场定价；英国零售业务相对 EDF 集团规模不足
      - - Orsted
        - 海上风电开发商；丹麦
        - DKK 86B（约 £9.6B，FY2023）
        - ~2.5x（2024；从 2021 年约 5x 压缩）
        - 展示能源转型溢价如何在成本和利率逆风下迅速压缩
        - 纯可再生能源开发商，不是零售或软件业务；倍数反映签约海上风电收入
      - - OVO Energy / Kaluza（私营）
        - 英国能源供应商加平台
        - 估计 £7–9B 收入（FY2023）；Kaluza ARR 未披露
        - 对 Kaluza 技术层隐含约 £400–600M（最近已知私募轮）；OVO 集团约 0.1–0.2x
        - Kraken 软件层估值最接近的可比对象；与 Octopus 处于同一英国市场细分
        - 高度不确定——私募估值信号稀疏；Kaluza ARR 未公开披露；数字为新闻估计
      - - Salesforce / ServiceNow（SaaS 参考）
        - 企业垂直 SaaS；全球
        - 参考：Salesforce $34.9B ARR（FY2024）；ServiceNow $10.0B ARR
        - 8–12x 收入（2024 年两家公司平均）
        - 若 Kraken 在分拆时完成纯 SaaS 重估，这定义了上限倍数
        - 上市大市值 SaaS，客户群多元；公用事业专用 SaaS 因客户集中而折价交易
    claimRefs:
