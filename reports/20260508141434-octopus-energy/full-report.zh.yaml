      - number: '7.4'
        title: 竞争与商业模式风险
        blocks:
          - type: paragraph
            body: >-
              Octopus Energy 的竞争地位依赖 Kraken 的服务成本优势——每账户约 £15-20，行业平均为 £40-60。随着传统供应商投资竞争性的云原生平台，这一优势可能被侵蚀。Ovo Energy
              分拆出的 Kaluza 是最直接的 Kraken 竞争者；它没有披露同等规模，但正在积极向公用事业公司销售。British Gas（Centrica）已投资数字化转型和数据分析能力。E.ON 授权使用
              Kraken——这给 Octopus 带来收入——但也意味着 E.ON 同时获得 Kraken 能力，从而缩小自身服务成本劣势。Oracle Utilities
              在全球传统公用事业公司中保持庞大装机基础，并一直投资将 IS-U 平台迁移到云端。如果 Oracle 的云公用事业产品成熟到与 Kraken 功能相当，大型公用事业公司采用 Kraken
              授权的壁垒可能下降。Octopus 的零售市场份额（英国家庭 23.7%）带来监管审查风险：作为市场最大供应商，Octopus 面临更高 Ofgem 监视强度，无法再像从零增长时那样依赖挑战者品牌定位。通过
              SoLR 接收的 Avro 和 Bulb 客户，形成了非有机客户群，其流失特征、满意度水平和参与模式可能不同于自然获客的 Octopus 客户。Kraken 分拆带来结构性冲突：Kraken 的商业激励是从包括
              Octopus 竞争对手在内的所有公用事业客户最大化许可收入，而 Octopus 零售的利益是防止竞争对手补齐平台差距。分拆后如何管理这组张力，公开资料没有披露。
            claimRefs:
              - CR021
              - CR022
              - CR023
              - CR024
              - CR025
              - CR026
