      - number: '6.4'
        title: 留存韧性与流失
        blocks:
          - type: paragraph
            body: >-
              客户留存是 Octopus Energy 最重要、也最难精确量化的指标之一，因为英国零售能源市场不要求公开披露流失率。现有证据显示，Octopus
              相比行业同行留存更强。行业分析师和消费者调查数据表明，Octopus 月流失率约为 2-3%，典型英国能源传统供应商为 4-5%。较低流失率来自几个结构性因素。第一，智能费率带来粘性：使用
              Agile、Intelligent Octopus Go 或 Cosy 的客户，一旦把设备配置为自动调度，转供成本会更高，因为其他地方很难找到可比费率。第二，Which? Recommended Provider
              身份和 Trustpilot 评分向客户释放信号：离开 Octopus 可能带来服务质量风险。第三，部分产品的捆绑属性——尤其是热泵和 EV 客户可能同时拥有 Octopus
              安装的硬件和费率——加深了转供壁垒。第四，App 和数字账户管理工具用户体验得分高，降低了摩擦和惰性。消费者业务没有公开披露净收入留存或总收入留存；在受监管能源市场，单客收入主要由 Ofgem
              价格上限和实际用量决定，NRR 的意义弱于 SaaS。家庭客户合同期限通常为 12 个月或标准可变合同，且无退出费。Kraken B2B 分部未公开披露合同期限，但集成深度（替换账单系统）意味着多年期。2025
              年 5 月 Ofgem 强制退款令和 2025 年 7 月罚款针对历史账单故障，不是当前系统性服务失效；按现有满意度数据，尚未显示已造成重大客户流失。
            claimRefs:
              - CU016
              - CU017
              - CU018
              - CU019
