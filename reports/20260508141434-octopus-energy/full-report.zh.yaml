  - number: 8
    title: 估值
    sections:
      - number: '8.1'
        title: 投资论点与反论点
        blocks:
          - type: paragraph
            body: >-
              Octopus Energy Group 的投资论点分两层：第一，公司打造了一个结构性更优的英国零售能源业务，增长快于任何可比同行，并保持高于市场的获客经济性；第二，也是支撑 $9B
              估值更关键的一点，Kraken Technologies 平台是真正的垂直 SaaS 资产——它把自身操作系统大规模授权给第三方公用事业公司，目前声称产生 $500M+ 经常性
              ARR；一旦从零售能源业务中分离出来，理应拿科技公司倍数，而不是公用事业倍数。五个论点支柱是：（1）英国市场领导地位，750 万家庭客户产生可防御零售现金流；（2）Kraken 在 27 个国家覆盖 7,000
              万账户，形成抵御新进入者的许可护城河；（3）进入德国、日本、澳大利亚、Texas 等市场，提供纯英国公用事业公司没有的增长可选性；（4）能源转型提供跨数十年的结构性顺风；（5）CPP Investments 和
              Generation Investment Management 以 $9B 估值作为机构锚定，给出来自成熟投资者的可信价格信号。反论点基于四个结构性反驳：（1）Kraken 账单自动化故障——已被 2025 年
              7 月 Ofgem 执法验证——直接冲撞 Kraken 软件优势已经被证明且可扩展的核心主张；（2）$9B 估值约为集团收入 1.3 倍，要求市场相信 Kraken 在分拆时会获得 SaaS
              重估，但这一结果尚未确认，且随着能源软件倍数压缩而更不确定；（3）Octopus 0.76% EBITDA 利润率几乎没有缓冲，一旦大宗商品价格或 Ofgem 上限不利移动，就可能进入亏损年；（4）Kraken
              分拆引入结构复杂性，也可能在作为独立软件供应商的 Kraken 与其最大客户 Octopus 之间制造利益冲突。
