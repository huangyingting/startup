      - number: '5.2'
        title: Kraken 平台架构与能力
        blocks:
          - type: paragraph
            body: >-
              Kraken 是 Octopus Energy Group 的核心技术资产。它是云原生公用事业操作系统，基于 Amazon Web Services，使用 Python 和
              Django，从零设计来处理公用事业运营全栈：客户管理和 CRM、实时计费、智能电表数据处理、DER 聚合以及现场人员管理。平台围绕三大组件构建。Kraken Customer
              处理计费、直接借记管理、数字沟通和客服工作流。Kraken Asset（原 KrakenFlex）是 DER 聚合和虚拟电厂调度引擎，与智能 EV
              充电器、热泵和电池系统通信，根据批发价格信号或电网稳定需求转移负荷。Kraken Field 管理现场服务运营，包括热泵安装排程和智能电表铺设。这些模块合在一起形成端到端平台，运行遗留 SAP 或 Oracle
              公用事业软件的竞争对手很难复制。AWS 基础设施支撑全球可扩展性：Octopus 称 AWS 支持其快速国际扩张；Kraken 目前按授权管理 17 million 能源账户。Kraken 内部
              Skyrocket 机器学习系统自动化最高 40% 的数字客户沟通，降低客服处理时长并提升 NPS。Kraken API-first 架构让第三方授权无缝落地：EDF、E.ON Next、Origin
              Energy、Plenitude、Tokyo Gas、Cuckoo Broadband、Severn Trent Water 和 National Grid US 都是客户。截至 FY2024，平台已锁定
              $500M 承诺年经常性收入，Octopus 目标是在 2027 年达到 100 million 总账户。Kraken 分拆于 2025 年 3 月宣布、2025 年 9 月完成，赋予 Kraken
              独立治理，使企业销售周期更快，也让其未来可能在不与 Octopus 零售产生战略冲突的情况下 IPO。公司声称获得 ISO/IEC 27001 信息安全管理认证，但具体范围需要独立验证。
