      - number: '1.5'
        title: 里程碑与监管记录
        blocks:
          - type: paragraph
            body: >-
              Octopus Energy 的里程碑一边是常规增长叙事，一边被两起政府支持的大型收购和不断加重的监管合规负担打断。2022 年 12 月收购 Bulb Energy 的 1.5 million
              客户，有英国政府支持，是公司首次动用大型外延增长事件。到 2023 年中，Bulb 客户已全部迁移到 Kraken 平台，验证了 Kraken 吸收大规模转移的能力。2023 年末收购 Shell Energy
              Retail UK，新增约 1.3 million 能源客户，并在不到三个月内完成迁移，进一步证明平台能力。随着有机增长和收购推进，Octopus Energy 受到的监管审视也随规模上升。2025 年 7
              月，Ofgem 因公司未能及时向约 34,000 名预付费电表客户开具最终账单，罚款 £1.5 million。2025 年 5 月，Ofgem 命令 Octopus 和另外九家供应商合计退款 £7
              million，原因是固定费用多收费；Octopus 的份额为 £2.64 million，另加 £546,000 善意付款，覆盖 2019 年 1 月至 2024 年 9 月的错误。Greg Jackson 在
              2024 年公开警告，非大宗商品网络和政策成本可能使英国家庭能源账单到 2029 年上涨 20%；该表态提升声誉可信度，也提示零售业务的成本压力风险。2025 年 9 月 Kraken
              分拆是创立以来最重要的结构性事件，将技术平台拆为独立实体，估值最高可达 £10 billion，管理层也能在不依附零售集团的情况下推进自己的资本议程。
