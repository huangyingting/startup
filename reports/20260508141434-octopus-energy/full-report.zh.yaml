      - number: '6.2'
        title: 采用轨迹与增长
        blocks:
          - type: paragraph
            body: >-
              Octopus Energy 的增长轨迹，是英国零售能源史上最突出的案例之一。公司 2015 年成立、2016 年上线，起步时没有客户，到 2020 年已增长到约 150 万个英国家庭账户，2021 年突破
              200 万，并通过非有机的 Supplier of Last Resort 任命迅速提速。2021 年接手 Avro Energy 客户，增加约 58 万个账户。Bulb Energy 2021 年 11
              月进入破产管理并随后进入 Special Administration；英国政府在 2022 年 10 月选择 Octopus 收购 Bulb，2023 年 1 月至 6 月期间，150 万客户迁移到
              Octopus 和 Kraken 平台。2023 年末收购 Shell Energy Retail UK，又增加 130 万个账户。这些非有机增量共同推动 Octopus 在 2025 年 1 月超过
              British Gas，成为英国最大家庭能源供应商。有机增长来自高 NPS 带来的口碑推荐、面向 EV 车主和光伏家庭的有竞争力智能费率，以及相对传统供应商更低获客成本的强数字营销。非英国客户群在 FY2024
              约 3 倍增长，证实国际扩张正在形成实质牵引，其中德国通过自然转供和本地营销活动增长到超过 100 万客户。到 2024 年 10 月，英国在管电表增至 1,290
              万块，其中包括燃气表和电表，显示双燃料客户关系的深度。智能费率采用率未精确披露，但 Ofgem 数据显示，英国 502,000 名智能 TOU EV 费率客户中，Octopus 拥有超过 250,000
              名，说明基础客户中智能产品渗透率已经很高。
