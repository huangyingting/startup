    layout: wide
    summary: Octopus Energy 的公开时间线显示，公司从 2016 年英国数字挑战者，发展为 2025 年的全球市场领导者和平台授权方；其间穿插两次政府促成的收购、四次重大融资，以及 2025 年 9 月 Kraken 分拆。
