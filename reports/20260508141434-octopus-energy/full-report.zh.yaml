      - number: '6.3'
        title: 具名客户证明与引用质量
        blocks:
          - type: paragraph
            body: >-
              Octopus Energy 的客户证据在英国零售能源行业里属于最强一档，但市场属性决定了个体案例研究不如汇总满意度指标常见。最权威的第三方客户证明是连续八年保持的 Which? Recommended
              Provider 奖项；该奖项要求独立验证满意度调查，覆盖客户服务、性价比、账单准确性和投诉处理。Trustpilot 上超过 40 万条评价给出 4.8/5，覆盖面很广，但存在自选择偏差。英国最大能源转供平台
              Uswitch 在年度客户满意度调查中也长期将 Octopus 排在前列。B2B 侧，具名 Kraken 客户构成另一类参考账户：Origin Energy（澳交所上市、约 400
              万客户的澳大利亚公用事业公司）既是 23% 股东，也是 Kraken 许可客户，是价值最高的战略客户证明。英国最大传统供应商之一 EDF Energy 授权使用 Kraken
              做客户管理，说明即便竞争对手也承认平台优势。受监管配电公用事业公司 National Grid US，为北美市场提供了受监管资产所有者参考。日本最大燃气公用事业公司 Tokyo
              Gas，则提供了全球要求最高监管环境之一中的参考。这些 B2B 参考都是生产部署，不是试点——Octopus 自身 750 万英国客户运行在同一个 Kraken 平台上，构成最可信的概念验证。Bulb 和
              Shell Energy 的迁移都在数月内完成，且没有重大服务中断，证明其交付能力不止于软件。一个反向信号是 2025 年 7 月 Ofgem 因 34,000
              名预付费电表客户未收到最终账单而开出罚单；尽管汇总满意度很高，特定受监管分层仍存在客户服务缺口。
