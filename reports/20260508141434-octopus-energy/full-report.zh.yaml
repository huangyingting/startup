      - number: '3.4'
        title: 竞争护城河与耐久性分析
        blocks:
          - type: paragraph
            body: >-
              Octopus Energy Group 的竞争护城河在三层相互强化。第一，Kraken 平台切换成本：公用事业公司一旦把计费、CRM 和调度迁移到 Kraken，重平台化需要 3–5 年和
              £10M–£50M，形成结构性长期留存。Oracle 安装基数也受益于同样动态，但 Kraken 是唯一把云原生规模与商业部署级 ML
              调度结合起来的平台。中期主要风险不是具名传统厂商，而是超大规模云厂商支持的新进入者（AWS Energy、Google Cloud）把计费基础设施层商品化。

              第二，Octopus 的智能电价基础设施（Agile、Intelligent Octopus Go）：复制这些产品需要把 ML 调度与批发结算打通，需要足够大的客户基数平滑波动，也需要竞争对手无法授权的
              Kraken 引擎。E.ON Next 2024 年 TOU 电价是衍生产品，技术深度落后 2–3 年。第三，发电、零售和软件的垂直整合带来复合成本优势。OEG 的可再生资产锚定 Agile
              的批发底价；Kraken 成本效率为零售利润提供资金。OVO 缺少发电资产；Oracle 缺少零售业务。

              最可信的反向情景，是账户快速增长（Bulb + Shell 迁移）后服务质量下滑，Ofgem 2025 年 7 月 £1.5M 罚款和 2025 年 5 月退款已发出信号。如果 NPS
              领先地位被侵蚀，Octopus 最核心的零售护城河会减弱。国际壁垒真实存在：Octopus 27 个目标国家各有本地传统厂商和监管本土优势，需要逐个市场进入；没有一个全球竞争对手能在所有市场同时被替换。
