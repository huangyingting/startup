      - number: '1.2'
        title: 领导团队与治理
        blocks:
          - type: paragraph
            body: >-
              Greg Jackson CBE 担任 CEO 兼联合创始人；他毕业于 Cambridge
              经济学，转向能源前曾创办软件公司。他是集团最主要的公众面孔，也把持监管关系、融资和战略方向，形成实质性关键人集中风险。Stuart Jackson（与 Greg 无亲属关系）是联合创始人兼 CFO，同样毕业于
              Cambridge 经济学，自创立以来延续财务管理。联合创始人兼 CTO James Eddison 拥有 Cambridge 工程背景，负责包括 Kraken 平台在内的技术战略。2025 年 9 月
              Kraken 分拆后，Amir Orad 出任独立 Kraken CEO，Tim Wan 出任 Kraken CFO，执行责任部分外移。Greg Jackson
              公开谈论能源政策、家庭可负担性以及智能电价在脱碳中的作用，并因服务能源和商业获授 CBE。董事会详细构成未在公开文件中完整披露；治理透明度因此仍是尽调未决问题。Octopus Energy Group Ltd
              在英国提交简式账目，不发布完整公司治理声明；要完整评估董事会构成、独立董事人数、审计委员会组成和关联方交易披露，仍需进入私有数据室。
