      - number: '3.3'
        title: 能源技术平台竞争对手
        blocks:
          - type: paragraph
            body: >-
              Oracle Utilities 是全球主导的遗留公用事业客户管理和计费平台，通过授权部署（CC&B、MDM、Opower）服务超过 430 million 公用事业客户。竞争地位建立在 Oracle ERP
              集成、成熟专业服务生态和数十年积累的 C-suite 买方关系之上。Oracle 部署模式主要是本地部署或 Oracle Cloud Infrastructure，大型公用事业实施周期 3–5 年，重平台化成本
              £10M–£50M。这让既有客户切换成本很高，但也使 Oracle 不适合需要数月内完成上线的挑战者零售商。Kraken 的云原生单代码库 SaaS 能在数月而非数年内接入新公用事业客户。

              Kaluza 是 OVO Energy 的自研智能能源平台，是英国市场功能上最接近 Kraken 的产品。它处理 EV 智能充电调度、需求灵活性和客户互动。截至 2024 年，OVO 已将 Kaluza
              授权给约两个英国外部公用事业客户，但未披露 SaaS 收入或签约账户数，无法直接对标。Kaluza 战略范围看起来比 Kraken 窄，对完整计费到调度栈着墨更少，也没有已确认的国际授权计划。

              Ensek（Ignition 平台）面向英国中端能源供应商（sub-500K 账户），提供云原生计费、CRM 和市场结算。路线图正在接入 AI 自动化和行为洞察层（Flex module），会让它更接近
              Kraken 的 ML 调度功能。Ensek 缺少 Kraken 的国际授权网络和批发价格优化基础设施，竞争被限制在英国居民中端市场。没有其他公用事业软件平台宣布过与 Kraken 可比规模的国际云原生授权战略。
