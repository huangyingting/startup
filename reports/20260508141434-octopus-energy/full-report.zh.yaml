      - number: '3.2'
        title: 英国零售能源竞争对手画像
        blocks:
          - type: paragraph
            body: >-
              Centrica 的 British Gas 是英国零售历史上的存量巨头，目前以约 6.5–7 million 户家庭位居第二大居民供应商。竞争资产包括品牌认知、一支现场工程师队伍（约 7,000 名工程师）支撑
              Home Services（锅炉维修、热泵、电气工程），以及拥有 2M+ 连接设备的 Hive 智能家居平台——英国最大的居民能源 IoT 生态。British Gas 在 Citizens Advice
              投诉指标上长期落后于 Octopus，也尚未开发出能匹敌 Agile 或 Intelligent Octopus Go 的动态电价产品。Centrica 策略优先通过 Hive
              和服务变现留住客户终身价值，而不是靠价格竞争夺回零售市场份额。

              E.ON Next 是 €35B+ E.ON SE 集团的英国零售部门，吸收 Npower 后持有约 4.5 million 账户。它使用自研 CRM / 计费栈，并在 2024
              年推出分时电价，释放传统厂商投资智能能源的信号。E.ON 的结构性优势包括母公司在欧洲的配电网资产，以及建立外部授权业务的潜力——但尚未宣布。OVO Energy（2020 年收购 SSE 后约 4–4.5M
              英国客户）是 Octopus 技术战略上最接近的同行：其 Kaluza 平台处理 EV 智能充电和需求灵活性，并已授权给约两个英国外部公用事业客户。

              EDF Energy 聚焦核电支持的固定费率电价（约 2.7–3M 英国客户），竞争点是核电发电带来的供给成本确定性（约占英国电力 15%），而非智能产品差异化。EDF 战略方向是 Great British
              Nuclear 旗下核电机组整合，不是扩大零售份额。四家传统厂商与 Octopus 合计控制英国居民能源供应约 80%+。
