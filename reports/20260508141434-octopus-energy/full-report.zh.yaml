  - number: 6
    title: 客户
    sections:
      - number: '6.1'
        title: 客户群分层
        blocks:
          - type: paragraph
            body: >-
              Octopus Energy Group 的客户群覆盖三大核心分层。最大的一块是英国家庭零售能源供应，截至 2025 年 1 月约有 750 万个家庭账户，占英国国内能源市场
              23.7%；这是英国市场进入现代竞争时代以来，单一供应商拿到的最高份额。国际市场上，Octopus 还在德国（超过 100 万）、法国（约 60 万）、日本（约 50 万）、意大利（约 50 万）、西班牙（约
              40 万）和新西兰（约 10 万）服务至少 250 万名客户。按 Octopus 新闻稿，全球客户数在 2024 年底已超过 1,000 万。第二个独立分层是企业能源客户：Octopus 通过 Shape
              Shifters 费率组合、Electric Match 和 Wind Works 服务英国 SME 和商业客户，但未公开披露精确的 SME 账户数。第三个分层是 Kraken B2B
              许可客户——美国、澳大利亚、日本、意大利和欧洲的公用事业公司，授权使用 Kraken 平台服务自身客户群。按渠道看，绝大多数零售客户来自数字化获客；免退出费转供让客户进出 Octopus 都很容易。按用例看，使用
              Agile、Intelligent Octopus Go、Cosy 和 Flux 等智能费率的客户，是价值最高、参与度最高的人群；他们使用 Kraken 的需求调度能力，并贡献支撑 Octopus
              平台差异化的数据优势。按地区看，英国仍是主要收入市场，但非英国客户群在 FY2024
              增长至三倍，这是一个关键战略里程碑，说明国际扩张命题正在推进。英国零售收入集中仍是残余风险，因为英国价格上限监管压缩利润率，天气、批发价格和监管政策又会同时影响英国盈利。
