      - number: '4.3'
        title: 资本充足性与财务位置
        blocks:
          - type: paragraph
            body: >
              Octopus Energy Group 已在多轮融资中累计获得超过 $2 billion 股权融资（详见 Chapter 1 中指向 company-overview 的
              claimRefs）。最近一次披露估值是 2024 年 5 月，在 $370 million 融资后达到 $9 billion。FY24 净资产为 £1.7
              billion。手头现金、月度运营烧钱和未提取债务额度，任何公开文件都未披露；Octopus Energy Group Ltd（公司编号 09263047）在 Companies House 提交的年度申报滞后
              12-18 months，也不提供详细流动性分析。Centrica 的公开年报提供了一个传统厂商成本和资本结构参照：Centrica（British Gas
              母公司）报告由上游和交易业务支撑的净现金正值，这一结构性优势被 Octopus 通过 Kraken IP 所有权部分抵消。


              可再生能源发电板块资本强度高：以 £7 billion 组合 AUM 收购并开发约 4.9 GW 风电和太阳能资产，意味着大量使用项目融资。OEG 发电资产通常通过无追索项目债务融资，将大部分债务隔离在
              Octopus Energy Group 零售资产负债表之外。Kraken 分拆预计于 2025 年 9 月完成，签约年经常性收入（ARR）为 $500 million，预计会为 OEG
              股东带来部分变现事件，在不整体出售给战略买家的情况下提供流动性。Ofgem 于 2025 年 7 月因客户直接借记多收费对 Octopus 罚款 £1.5
              million，构成财务和声誉风险，但相对集团收入规模并不重大。缺少披露现金头寸，无法分析现金跑道；不过 FY24 盈利（£83 million 净利润）说明 Octopus 在集团层面已越过盈亏平衡。
