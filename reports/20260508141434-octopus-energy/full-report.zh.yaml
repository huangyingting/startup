      - number: '7.3'
        title: 市场与大宗商品风险
        blocks:
          - type: paragraph
            body: >-
              英国零售能源本质上暴露于批发天然气和电力大宗商品价格波动。Ofgem
              价格上限保护消费者，却限制供应商可赚取的单位利润率；当大宗商品价格跌破上限地板（收入比成本下降更快）或飙升至其上方（必须吸收对冲损失）时，风险是不对称的。2021-2022
              年欧洲天然气价格危机期间，多家英国能源供应商破产；Octopus 通过 Supplier of Last Resort 任命接收 Avro Energy（58 万客户）和 Bulb（150
              万客户），并承担整合成本。Octopus 披露 FY24 EBITDA 利润率仅 0.76%，处在临界位置：即便大宗商品价格持续波动 1-2%，也可能把集团推入经营亏损。Q2 2026 Ofgem 价格上限下调
              6.6%，会降低全部英国零售客户的单位收入，却没有对应降低固定成本基础设施。Octopus
              使用大宗商品信贷额度，在向客户开票回款前先为批发能源采购融资，因此在价格波动期产生按市值计价的资产负债表敞口。这些信贷额度的规模和交易对手均未披露。天气风险既有季节性，也有结构性：异常温和的冬季会降低能源消费和收入，极端寒潮则同时推高需求和采购成本。随着热泵渗透率提升，气候变化还会给燃气消费带来长期需求不确定性。
