      - number: '8.2'
        title: 估值背景与可比公司
        blocks:
          - type: paragraph
            body: >-
              Octopus Energy Group 是私营公司，没有公开上市股份。最近一次独立价格信号是 2024 年 Q1 CPP Investments 轮，隐含集团估值 $9B（按 2024 年平均汇率约
              £7.1B）。此前 2021 年，Generation Investment Management 以据报 £2.2B 估值投入 £630M；三年估值约增长 3 倍，来自客户增长和 Kraken
              授权势头。2025 年或 2026 年没有公开确认的一级融资轮。可比公司分三类。纯英国能源供应商（Centrica、EDF UK）交易在 0.15–0.5x
              EV/Revenue，反映零售利润薄、大宗商品敞口和监管风险。基础设施权重更高的能源企业（SSE）享有溢价，通常为 1.0–1.5x，因为受监管网络资产能拿到高于商品零售的收益型估值。Ørsted
              等海上风电开发商在 2021 年因转型可选性按 4–5x 收入交易，但到 2024 年，随着海上风电成本上升和利率提高，压缩到约 2.5x；这对 Octopus 自身科技溢价估值是一个警示先例。Kraken
              最相关的 SaaS 可比公司——Salesforce、ServiceNow 和类似企业垂直 SaaS——按 8–12x 收入交易。如果 Kraken 的 $500M+ ARR 得到验证，并在分拆时成功按 8x
              ARR 倍数执行，仅 Kraken 实体价值就约为 $4B；在把零售公用事业业务按 0.3x 收入计入后，相对当前 $9B 集团价格仍有上行。基准情景不假设完整重估；它假设 Kraken ARR 的混合倍数为
              5–7x，同时对零售收入基数采用纯公用事业倍数，得到 $4–5.5B 集团权益价值。
