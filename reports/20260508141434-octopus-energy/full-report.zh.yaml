  foundingLocation: London, United Kingdom
  headquarters: London, United Kingdom
  productSummary: >-
    两项业务相互咬合：（1）OEG Retail——面向英国消费者和 SME 的能源供应，采用灵活电价和分时电价，包括 Agile Octopus、Saving Sessions 和 EV 智能充电；（2）Kraken
    Technology——云原生公用事业管理平台（计费、CRM、交易、计量、需求响应），授权给 E.ON、Origin Energy、Tokyo Gas、EDF Renewables 等全球第三方公用事业公司。
  customerFocus: 零售：希望获得透明、数字优先能源供应的英国家庭和 SME。Kraken：希望替换遗留计费基础设施、加入 AI 驱动需求管理能力的 Tier-1 和 Tier-2 公用事业运营商。
