  - number: 4
    title: 财务情况
    sections:
      - number: '4.1'
        title: 收入模式与收入结构
        blocks:
          - type: paragraph
            body: >
              Octopus Energy Group 的收入主要来自四块：英国零售能源供应、国际零售能源、Kraken SaaS 授权，以及 OEG 可再生能源发电。英国零售能源供应——按对标 Ofgem
              价格上限的电价，向约 7.8 million 户家庭和 SME 客户供应电力与燃气——占集团收入绝大部分，估计超过 FY24 £12.4 billion 总额的 90%。收入确认按消费量走：客户按用电的每
              kilowatt-hour 或用气的每 cubic metre 付费，再加每日固定费用；价格按 Ofgem 价格上限复核周期逐季调整。收入流因此主要由用量驱动、受大宗商品影响；利润率相对流水很薄，但受到
              Ofgem 允许回报方法的部分保护。


              Kraken Technologies——Octopus 自研公用事业操作系统——向第三方公用事业公司（E.ON Next、Origin Energy、Tokyo Gas
              等）按每账户每月收费，让其使用计费、客户管理和灵活性栈，从而产生 SaaS 授权收入。Kraken FY24 SaaS 收入达到 £90 million，同比增长 68%，授权账户 70
              million。Kraken 利润增至 £35 million，增幅 483%。这些数字披露在 Octopus Energy Group FY24 业绩新闻稿中，代表质量最高、利润率最高的收入板块。2025 年
              9 月部分分拆预计将单独货币化 Kraken，签约年经常性收入（ARR）为 $500 million。Octopus Energy Generation（OEG）通过在九个市场约 4.9 GW
              可再生能源组合（£7 billion AUM）发售电力贡献收入，并通过面向零售业务的优惠 PPA 定价进一步带来垂直整合收益。
