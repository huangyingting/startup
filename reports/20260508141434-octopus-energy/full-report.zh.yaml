      - number: '8.4'
        title: 建议与风险调整后回报
        blocks:
          - type: paragraph
            body: >-
              在当前 $9B 估值下，整体建议是有条件正面，条件是 Kraken 分拆能以可防御的软件倍数成功执行。置信度为中，原因是英国零售客户资产和 Kraken 全球覆盖很强，但零售利润率薄、Ofgem
              执法先例存在，而且外部投资者拿不到经审计 Kraken ARR 数据。估值判断是，$9B 价格既不明显高估，也不明显低估——它押注一个具体结果，即 Kraken 软件重估；这个结果有可能，但并不确定。任何以
              $9B 进入的投资者，都必须能承受 Kraken 分拆催化出现前估值先下调 40–60% 的情景。风险评级为高。大宗商品价格敞口、薄零售利润率、Ofgem 执法风险和 Kraken
              分拆执行风险叠加，使结果分布很宽。下行保护有限，因为业务没有有意义的资产支撑（不同于 SSE 的受监管网络资产或 Ørsted 的已签约海上风电容量）——账面价值之上的全部溢价，都压在 Kraken
              软件估值上。当前投资者的目标退出窗口为 2028–2032 年，假设 Kraken 在 2024 年 CPP 轮后 3–5 年内 IPO 或二级交易。若 2028 年 Kraken IPO
              按基准情景估值（$3B），对 $9B 入场价中的 Kraken 部分回报约为 0.3–0.4x；随着利润率改善，零售业务可能恢复到 0.25–0.3x 收入。基准情景下，入场投资者总回报估计为
              0.5–0.7x；除非 Kraken 明显超预期，否则会毁损价值。
