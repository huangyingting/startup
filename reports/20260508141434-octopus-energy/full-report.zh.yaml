      - number: '5.3'
        title: 虚拟电厂与需求灵活性
        blocks:
          - type: paragraph
            body: >-
              Octopus Energy 的虚拟电厂是英国能源系统中运营成熟度最高的消费侧灵活性资产之一。Kraken Asset 聚合加入智能电价的 EV、热泵和家庭电池负荷，调度约 2GW 灵活需求——Octopus
              称这是全球最大的面向消费者 VPP。该能力在多个维度具备商业价值。第一，Octopus 可以参与 Balancing Mechanism 和辅助服务市场，向 National Grid ESO
              提供需求上调和下调并赚取收入。第二，它能向授权公用事业客户证明 Kraken Asset 是生产级 DER
              调度系统，加速企业销售。第三，智能电价客户能从参与中获得可量化的财务收益，客户锁定更深。Intelligent Octopus Go 电价只要求客户连接 EV 并设定出发时间；Kraken 的 ML
              系统会自动处理全部充电排程。Ofgem 2024 年 1 月数据显示，英国 502,000 名居民智能 TOU EV 电价客户中，超过一半使用 Octopus 电价，说明在车队大规模电气化之前，Octopus
              已主导 EV 灵活性市场。Fan Club 电价在特定风电场发电时向附近客户提供折扣，形成超本地需求响应，降低平衡成本和输电损耗。Octopus Energy Generation 在 8 个国家拥有 300
              个可再生项目，资产基础把市场情报反馈给 Kraken 的批发价格预测，打通从发电、调度到客户计费的垂直整合数据闭环。Heatmiser 恒温器集成把 VPP
              合格资产扩展到热泵；对电网稳定而言，可控时序至关重要。公开讨论的路线图包括随着 EV 电池技术成熟接入 V2G，以及进一步扩大电池储能参与电网平衡市场。
