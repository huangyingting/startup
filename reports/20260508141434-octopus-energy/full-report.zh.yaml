  - number: 2
    title: 市场分析
    sections:
      - number: '2.1'
        title: 市场边界与定义
        blocks:
          - type: paragraph
            body: >-
              Octopus Energy Group
              横跨三个彼此不同但相互依赖的市场，每个市场都有自己的边界、买方结构和竞争动态。第一是英国居民能源零售，消费者通过持牌供应商购买电力和燃气，电价可以是标准可变、固定或动态。该市场由 Great Britain 约
              28.5 million 个电表点和约 22 million 个燃气表点定义，按当前价格水平每年产生约 £40 billion 或以上零售收入。Ofgem
              管理的价格上限为标准可变电价家庭设定单位费率和固定费用天花板，直接限制包括 Octopus
              在内所有零售供应商的单位利润。第二是全球公用事业技术软件，具体是公用事业运营中的计费、客户信息系统、需求响应和智能电网集成层。过去该市场主要由 Oracle Utilities、SAP
              和大型系统集成商服务；Kraken 以云原生 SaaS 替代方案竞争。第三是清洁能源发电投资，Octopus Energy Generation
              与大型基础设施基金、养老金支持资本和专业可再生能源开发商争夺欧洲陆上风电、海上风电和太阳能资产。现状替代品包括存量 ERP / 计费系统（Oracle、SAP）、传统能源供应商（British
              Gas、E.ON）以及受监管回报支撑的常规化石燃料发电。这些市场相邻而非独立：Octopus 的零售规模给 Kraken 背书，Kraken 的运营优势又支撑零售利润防守。
            claimRefs:
              - CM001
              - CM002
              - CM003
              - CM031
              - CM039
      - number: '2.2'
        title: 零售、公用事业软件与清洁能源的市场规模
        blocks:
          - type: paragraph
            body: >-
              按收入计，英国居民能源零售市场是欧洲最大的市场之一，由约 28.5 million 个电表点和 22 million 个燃气表点驱动；按价格水平不同，年度消费者能源支出处于 £40 billion 至 £50
              billion 区间。这既包括批发大宗商品成本转嫁，也包括网络费用、政策附加费和供应商利润。Octopus FY24 收入 £12.4 billion，约占估算英国全部家庭能源支出的 25-30%，与其 24%
              市占率大体一致。按客户量看，该市场基本持平，但收入会随批发价格波动而摆动。全球公用事业软件和 SaaS 市场从公开来源更难定量。Kraken 签约年收入 $500 million，只占全球公用事业 IT
              支出的一小部分。行业观察者估计，全球公用事业公司每年在运营上合计支出数千亿美元；其中计费、CRM 和智能电表集成软件子集估计每年 $10 billion 或更多。Kraken
              三年内将签约收入扩大到四倍，说明它在吃下既有 IT 预算份额，而不是创造全新支出。全球清洁能源投资市场规模大且仍在增长；多项估算显示 2023 年年度清洁能源投资超过 $1 trillion，IEA 的
              World Energy Investment 2024 报告引用 2023 年清洁能源投资 $1.7 trillion、化石燃料约 $1 trillion——这是历史性拐点。Octopus Energy
              Generation £7 billion AUM 使其成为该市场的中型参与者，与规模大得多的基础设施基金并列竞争。
