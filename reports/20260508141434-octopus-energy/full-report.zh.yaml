        - label: Ofgem 因直接借记超收罚款 £1.5M
          date: Jul 2025
          detail: Kraken 计费自动化被认定向 34K+ 客户超收；需退款 £2.64M
        - label: Ofgem Q2 2026 价格上限下调（6.6%）
          date: Apr 2026
          detail: 季度上限修订降低单位收入；利润率压缩风险兑现
  - id: FR004
    title: 竞争与结构性风险依赖图
    type: dag
    layout: standard
    summary: 有向无环图展示竞争与结构性风险，说明市场地位、技术平台和战略决策如何为 Octopus Energy Group 形成相互连接的风险依赖。
    approximationNotes: 依赖关系为分析师推断。该图基于公开可得信息呈现逻辑因果关系，并非 Octopus 管理层自身风险模型。
    claimRefs:
      - CR021
      - CR022
      - CR023
      - CR024
      - CR027
      - CR034
    data:
      nodes:
        - id: kraken-advantage
          label: Kraken 服务成本优势
          detail: £15-20/账户，对比行业 £40-60；竞争与授权护城河的主要来源
        - id: competitor-investment
          label: 传统供应商平台投资
          detail: Kaluza（Ovo）、Oracle 云、Centrica 数字化；3-5 年视野内差距收窄
        - id: client-migration-risk
          label: Kraken 被许可方迁移风险
          detail: E.ON、Origin 或其他客户可能在合同到期后自建或切换平台
        - id: key-person-risk
          label: Greg Jackson 关键人风险
          detail: CEO 离任或健康事件扰乱监管关系和投资者信心
        - id: spinoff-conflict
          label: Kraken 分拆利益冲突
          detail: Kraken 外部授权目标可能偏离 Octopus 零售的平台访问利益
        - id: margin-erosion
          label: 零售利润率侵蚀
          detail: 竞争对手服务成本改善，削弱 Octopus 在零售端的定价优势
      edges:
        - from: competitor-investment
          to: kraken-advantage
          label: 优势随时间收窄
        - from: kraken-advantage
          to: client-migration-risk
          label: 差异化下降抬高流失风险
        - from: spinoff-conflict
          to: kraken-advantage
          label: 分拆后定价可能侵蚀 Octopus 零售成本优势
        - from: key-person-risk
          to: spinoff-conflict
          label: 领导层缺口放大治理复杂性
        - from: client-migration-risk
          to: margin-erosion
          label: Kraken ARR 增长放缓，削弱 SaaS 对零售的交叉补贴
        - from: competitor-investment
          to: margin-erosion
          label: 成本差距收窄，侵蚀 Octopus 零售竞争性定价能力
  - id: FV001
    title: 建议逻辑
    type: flow
    layout: standard
    summary: 从五个证据支柱——市场地位、产品验证、客户牵引、财务结构和风险画像——推导出有条件正面建议，并连接到两个条件（Kraken 分拆、无进一步 Ofgem 执法）；这些条件会决定建议转为明确买入，还是触发下调。
    approximationNotes: 节点描述为分析师定性摘要。量化触发阈值见 TV005（投资逻辑失效与否决触发表）。
    claimRefs:
      - CV004
      - CV005
      - CV027
      - CV036
    data:
      nodes:
        - id: n1
          label: 英国市场领导地位（7.5M 客户，NPS 第 1）
        - id: n2
          label: Kraken 平台（70M 账户，声称 $500M+ ARR）
        - id: n3
          label: 国际扩张（27 个国家，8+ 被许可方）
        - id: n4
          label: 利润率薄（0.76% EBITDA）叠加 Ofgem 执法风险
        - id: n5
          label: $9B 估值由 CPP Investments 锚定（Q1 2024）
        - id: n6
          label: Kraken 分拆落地——关键价值催化剂
        - id: n7
          label: 有条件正面——在 Kraken 分拆结构披露和 ARR 审计前暂缓
        - id: n8
          label: 乐观上调触发点——Kraken 分拆估值达到 $2B+，且不再发生 Ofgem 执法
        - id: n9
          label: 悲观下调触发点——第二次 Ofgem 执法，或主要许可客户流失
      edges:
        - from: n1
          to: n5
          label: 支撑
        - from: n2
          to: n5
          label: 主要驱动
        - from: n3
          to: n5
          label: 增长期权
        - from: n4
          to: n5
          label: 折价因素
        - from: n5
          to: n6
          label: 由此释放价值
        - from: n6
          to: n7
          label: 未确认——有条件
        - from: n6
          to: n8
          label: 正面情景
        - from: n4
          to: n9
          label: 升级情景
  - id: FV002
    title: 估值敏感性
    type: bar
    layout: wide
    summary: >-
      该图测试 Octopus Energy Group 隐含企业价值对三项关键变量的敏感性：Kraken 年经常性收入（ARR）倍数（0x 至 12x）、Kraken ARR 绝对规模（$300M 至 $800M），以及基于
      £6.9B 收入的零售公用事业倍数。每组序列只调整一个变量，其余变量固定在基准值，展示低、基准、高三种假设下对集团估值的隐含贡献。
    approximationNotes: 所有数字均为分析师估计。Kraken ARR 为管理层声称口径，未经审计。零售收入为 FY2024 披露数字。EV/Revenue 倍数取自 TV004 中的可比公司组。
    claimRefs:
      - CV013
      - CV015
      - CV016
      - CV017
      - CV018
      - CV019
    data:
      items:
        - label: Kraken ARR 倍数——低：0x（纯公用事业）
          value: 0
          unit: USD millions
          detail: 不给 Kraken SaaS 价值；整个集团按零售公用事业估值
          tone: negative
        - label: Kraken ARR 倍数——基准：6x ARR（$500M）
          value: 3000
          unit: USD millions
          detail: 基准 ARR 下，Kraken 软件贡献按基准假设计入
          tone: neutral
        - label: Kraken ARR 倍数——高：10x ARR（$500M）
          value: 5000
          unit: USD millions
          detail: 当前 ARR 水平下，乐观情景给予 Kraken SaaS 估值重估
          tone: positive
        - label: Kraken ARR 水平——低：$300M，6x
          value: 1800
          unit: USD millions
          detail: 分拆后 ARR 触顶；倍数保持不变
          tone: negative
        - label: Kraken ARR 水平——基准：$500M，6x
          value: 3000
          unit: USD millions
          detail: 管理层声称 ARR，套用基准倍数
          tone: neutral
        - label: Kraken ARR 水平——高：$800M，6x
          value: 4800
          unit: USD millions
          detail: FY2027 前 ARR 增长到 $800M，套用基准倍数
          tone: positive
        - label: 英国零售倍数——低：0.15x（£6.9B 收入）
          value: 1315
          unit: USD millions
          detail: 纯公用事业底部倍数；不给技术溢价
          tone: negative
        - label: 英国零售倍数——基准：0.25x（£6.9B 收入）
          value: 2191
          unit: USD millions
          detail: Centrica 与 SSE 之间的混合可比倍数
          tone: neutral
        - label: 英国零售倍数——高：0.50x（£6.9B 收入）
          value: 4382
          unit: USD millions
          detail: 若市场认可受监管资产，可给到 SSE 式溢价
          tone: positive
  - id: FV003
    title: 估值 / 回报区间
    type: range
    layout: wide
    summary: >-
      以十亿美元计，列出 Octopus Energy Group 乐观、基准、悲观三种隐含企业价值区间，并把 CPP Investments $9B 入场估值作为参照。乐观情景要求 Kraken 在分拆时获得 SaaS
      重估；悲观情景假设公司回落到纯公用事业倍数。
    approximationNotes: 所有区间均为分析师估计，使用 TV004 中的可比倍数。汇率假设为 $1.27/GBP（2024 年平均）。上述估计没有经审计财务数据支撑。
    claimRefs:
      - CV001
      - CV017
      - CV018
      - CV019
      - CV024
    data:
      items:
        - label: 悲观情景隐含 EV（十亿美元）
          low: 1.3
          mid: 1.8
          high: 2.2
          unit: $B
          detail: £6.9B 收入按 0.15–0.25x 纯公用事业倍数估值；Kraken 分拆放弃或失败；基于 TV003 悲观假设
        - label: 基准情景隐含 EV（十亿美元）
          low: 4
          mid: 4.8
          high: 5.5
          unit: $B
          detail: Kraken 按 $500M ARR 的 5–7x 估值，零售业务按 0.25x 收入估值；采用 TV003 基准假设
        - label: 乐观情景隐含 EV（十亿美元）
          low: 6.5
          mid: 7.5
          high: 9
          unit: $B
          detail: Kraken 按 $600M+ ARR 的 8–12x 估值，零售业务按 0.3x 收入估值；Kraken 分拆顺利落地
        - label: 入场估值参照（CPP Investments，Q1 2024，十亿美元）
          low: 9
          mid: 9
          high: 9
          unit: $B
          detail: 最近已知的新股交易；投资者回报测算的参考价格
  - id: FV004
    title: 投资 KPI
    type: kpi
    layout: standard
    summary: Octopus Energy Group 七维投资评分卡，投委会可直接使用。每项 KPI 都是分析师给出的方向性判断，并以本尽调报告中的证据作支撑；证据仅来自截至 2026-05-08 的公开来源。
    approximationNotes: 评级是基于公开证据的定性分析师判断，不是正式评分模型，也不代表具体回报概率。
    claimRefs:
      - CV001
      - CV002
      - CV003
      - CV004
      - CV033
      - CV035
      - CV042
    data:
      items:
        - label: 市场机会
          value: Positive
          detail: 英国能源转型叠加全球公用事业软件可服务市场；政策和技术确认了数十年的结构性顺风
        - label: 产品差异化
          value: Neutral
          detail: Ofgem 2025 年 7 月认定 Kraken 计费自动化失效，削弱了原本较强的产品差异化叙事；ARR 未经审计
        - label: 客户验证
          value: Positive
          detail: 7.5M 英国客户、70M 全球账户；Kraken 授权客户包括 E.ON Next、Tokyo Gas、National Grid US
        - label: 财务健康度
          value: Negative
          detail: 0.76% EBITDA 利润率、现金头寸未披露、有大宗商品价格敞口；公开信息未确认现金跑道缓冲
        - label: 风险画像
          value: Negative
          detail: 风险高——Ofgem 执法先例、大宗商品价格敞口、Kraken 分拆复杂度、利润率很薄，共同拉宽了下行情景分布
        - label: 估值支撑
          value: Neutral
          detail: $9B 估值只有在 Kraken 获得 SaaS 重估时才站得住；基准情景较入场价隐含 40–55% 减记
        - label: 证据质量
          value: Neutral
          detail: 市场和客户证据较强；Kraken ARR、资本结构、分拆条款、现金头寸证据较弱
