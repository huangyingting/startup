      - number: '5.6'
        title: 信任、安全、隐私与合规
        blocks:
          - type: paragraph
            body: >-
              运营一家服务 1/4 英国家庭、为全球 7,000 万个账户处理账单的公用事业公司，需要严格的安全、隐私和合规控制。Octopus 声称其 Kraken 平台的信息安全管理已获 ISO/IEC 27001
              认证，但认证范围和当前状态仍需尽调独立核实。集团参与英国 Smart Data 计划，说明其正在接入不断演进的开放能源数据监管。Kraken 在德国、法国、意大利和西班牙的欧盟部署内嵌 GDPR 合规，并通过
              AWS 区域基础设施满足数据驻留要求。智能电表数据处理受 DCC 数据访问控制和 Ofgem 许可条件约束。消费者安全义务包括预付费电表保护（与 2025 年 7 月 Ofgem 执法直接相关）、通过
              Priority Services Register 识别脆弱客户，以及遵守监管债务管理规则。2025 年 Ofgem 开出的 £1.5M 账单罚款，以及 £2.64M 退款令外加 £546K
              善意补偿，暴露出合规监控缺口，尤其是预付费和固定费用账单的边缘场景。相对 £12.4B 收入，这些事件的财务规模不大，但声誉影响显著，也说明受监管客户分层的账单周期异常处理存在质量控制缺口。Octopus
              大举投入客户运营团队，英国员工从 50 人扩至 4,000 多人，Trustpilot 和 Which? 得分良好，说明即便后台账单自动化出现过孤立故障，面向客户的服务质量仍然较强。对 Kraken B2B
              平台而言，安全是核心：持牌公用事业公司把客户数据和账单基础设施交给 Kraken，一旦持牌客户侧发生重大数据泄露或账单中断，Kraken 的企业销售管线将承受严重声誉后果。渗透测试、SOC
              监控，以及第三方集成的供应链安全，都需要在现有公开披露之外继续尽调确认。
