  - number: 5
    title: 产品与技术
    sections:
      - number: '5.1'
        title: 产品组合与客户工作流集成
        blocks:
          - type: paragraph
            body: >-
              Octopus Energy Group 围绕三条主产品线覆盖能源客户全生命周期：带智能电价的零售能源供应、Kraken B2B 平台，以及 Octopus Energy Generation
              投资部门。从客户工作流看，零售主张从获客开始——以数字渠道为主、无退出费切换——再进入智能电价接入，随后通过半小时数据、自动直接借记和 app 控制保持持续互动。智能电价是主要产品差异化：Agile
              Octopus 提供与批发市场价格挂钩的半小时动态定价，奖励把需求转移到低碳、低成本时段的客户。Intelligent Octopus Go 面向 EV 车主，在批发价格最低时自动充电，提供 8p/kWh
              夜间电价，相比公共充电节省最高 85%。Cosy Octopus 面向热泵用户，在热泵效率最高的上午和下午提供补贴电价。Flux 面向太阳能加电池家庭，按动态费率支付出口和进口。Fan Club
              在风电场发电时奖励附近客户折扣。Zero Bills 面向由 Octopus 安装太阳能和电池的家庭，提供零持续能源账单，彻底消除客户能源成本。企业端，Shape Shifters 电价套件包括 Trio 和
              Agile 变体，Electric Match 与 Wind Works 面向商业和工业客户。Electroverse 把欧洲 EV
              公共充电聚合进单一漫游账户，将产品足迹延伸到公共出行基础设施。整体看，这些产品把 Octopus 定位成全屋能源管理者，而非大宗商品供应商；Kraken
              平台支撑客户侧全部编排，从智能电表数据摄取，到调度命令，再到计费结算。Octopus Electric Vehicles 子公司提供薪资牺牲式 EV 租赁，把客户更深绑定进生态，并为 Kraken
              需求调度引擎生成更多数据。Octopus 收购 Heatmiser 以控制热泵排程，并接入 Kraken 的 VPP 调度层，把公司垂直整合栈从软件经硬件延伸进家庭。OEG
              通过自有和管理发电资产增加供给侧维度，使 Octopus 能越来越多地用自有可再生出力匹配客户负荷。
