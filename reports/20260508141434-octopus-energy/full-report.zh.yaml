      EV/Revenue 倍数为近似值，来源包括 S&P Global Market Intelligence、Morningstar 和已提交账户（Centrica 2024 Annual Report、SSE 2024
      Annual Report、Orsted 2023 Annual Report、EDF investor relations）。私营公司数字（OVO/Kaluza）根据新闻报道估计，可能与实际交易价值有重大差异。汇率：GBP 1
      = USD 1.27（2024）。列举并不完整：全球公用事业和能源软件范围未做穷尽覆盖。
  - id: TV005
    title: 投资逻辑破裂与退出触发器表
    columns:
      - 触发器
      - 触发阈值
      - 破坏投资逻辑的机制
      - 行动含义
    rows:
      - - 进一步 Ofgem 执法牵涉 Kraken 计费
        - 2025 年 7 月罚款后 18 个月内，任何新的执法行动或临时决定引用计费自动化失败
        - 直接否定 Kraken 的核心差异化主张；授权客户可能重新评估或退出；ARR 增长停滞；SaaS 倍数坍塌
        - 全面审查 Kraken 授权客户合同和 ARR；重估基准与乐观情景；若 SaaS 倍数假设站不住，考虑退出
      - - Kraken 主要授权客户离开
        - 任何占 Kraken ARR 15% 以上的授权客户流失（如 E.ON Next UK、Tokyo Gas、National Grid US）
        - 证明授权客户流失风险；释放产品或服务质量失败信号；ARR 增长可能无法抵消流失；乐观情景坍塌
        - 立即要求 ARR 审计；测算 ARR 减少 20–30% 的模型敏感性；将投资列入观察名单
      - - Kraken 分拆结构对集团投资者不利
        - 分拆披露中没有按比例股权分配；分拆后向 Kraken 支付高于市场的授权费；或集团投资者未获得 Kraken 股权
        - 消除 $9B 估值中嵌入的主要上行；剩余集团价值回落到纯公用事业倍数，对应 $1.3–2.2B
        - 请法律顾问评估少数投资者权利；判断剥离条款是否允许按当前账面价值退出
      - - 估值下调轮或承压老股交易
        - 2026 年 5 月后 24 个月内，任何新股融资或老股交易的隐含估值低于 $7B
        - 释放机构对软件逻辑失去信心的信号；触发 LP 按市值减记；为 Kraken 分拆制造负面动量
        - 立即做估值复核；重新评估仓位；要求 GP 透明披露股权结构表和优先权机制
      - - 大宗商品价格冲击或 Ofgem 上限降幅超出预测
        - Ofgem 价格上限环比下调超过 10%，且批发远期价格显示未来两个或更多季度锁定利润率亏损
        - 零售业务转为经营亏损；集团动用大宗商品信用额度；股息能力消失；重心从增长转向生存
        - 压力测试流动性；确认大宗商品信用额度余量；推迟任何新增资本承诺
    claimRefs:
      - CV021
      - CV033
      - CV034
      - CV036
      - CV037
      - CV039
      - CV040
    notes: 触发阈值是分析师基于投资逻辑假设的重要性作出的判断。它们不是投资管理指令，也不构成投资建议。
  - id: TV006
    title: 最终尽调问题表
    columns:
      - 主题
      - 缺失证据
      - 重要性
      - 负责人 / 尽调路径
    rows:
      - - Kraken ARR（经审计）
        - 经审计的 Kraken Technologies ARR，按客户、合同类型、地域和增长率拆分；流失率；净收入留存
        - $9B 估值押注 Kraken 拿到 SaaS 倍数；未经审计的 $500M+ ARR 管理层声称，缺少独立验证就撑不起该倍数
        - 要求开放数据室；审阅 UK Companies House 的 Kraken Technologies Ltd 经审计账户；要求四大对 ARR 出具审计意见
      - - Kraken 分拆结构
        - 股权分配计划、优先权瀑布、分拆后 Octopus 零售向 Kraken 支付的授权费、治理结构、时间表，以及 IPO 或老股交易路线图
        - 没有分拆结构，$9B 估值上行的主要来源无法量化；价值可能流向 Kraken 实体，损害集团投资者
        - 管理层披露；法律顾问审阅分拆文件草案；董事会层面沟通少数投资者保护
      - - Ofgem 执法走向
        - 2025 年 7 月计费罚款的结果与整改状态；预付费电表调查状态；Ofgem 对 Kraken 自动化计费的前瞻监管姿态
        - 第二次执法将触发投资逻辑破裂；持续调查形成公开信息无法量化的或有负债
        - 直接询问 Ofgem；审阅数据室披露的监管往来；就最大责任敞口取得法律意见
      - - 大宗商品采购信用额度
        - 大宗商品采购额度的规模、期限、交易对手、抵押条款和使用情况；截至 2026 年的套保比例和按市值计价敞口
        - 0.76% EBITDA 利润率几乎没有缓冲；价外套保头寸或信用额度撤回会立刻带来流动性风险
        - 索取财资资料包；独立审阅大宗商品套保政策和交易对手信用额度
      - - 集团合并账目
        - 完整集团合并 P&L、资产负债表和现金流量表，并按分部披露（英国零售、Kraken 软件、发电、国际）
        - UK Companies House 文件披露有限；仅凭公开来源无法验证分部利润率和现金状况
        - 要求在数据室提供经审计集团账目；若无法提供，要求管理账目，并由审计师对关键指标签字确认
    claimRefs:
      - CV003
      - CV007
      - CV026
      - CV027
      - CV029
      - CV033
      - CV039
    notes: 尽调路径假设公司配合正式数据室流程。部分事项（Ofgem 调查状态）可能受监管保密限制。
