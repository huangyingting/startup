      - number: '8.5'
        title: 融资背景与资本结构
        blocks:
          - type: paragraph
            body: >-
              自 2019 年以来，Octopus Energy Group 通过一级融资轮累计融资约 £1B+。已知投资者包括 Generation Investment Management（2021 年
              £630M）、CPP Investments（金额未披露，2024 年 Q1 隐含集团估值 $9B）、Tokyo Gas（战略伙伴和投资者，金额未披露）以及 Origin Energy Australia（JV
              设立，澳大利亚业务隐含
              $500M+）。优先股权栈——清算优先级、反稀释权和参与机制——任何一轮都未公开披露，这是重大缺口：在熊市清算或被迫退出时，普通股（包括管理层和员工股权）可能相较标题估值被大幅稀释。集团层面债务融资未公开确认。零售能源业务需要大宗商品采购信贷额度，通常由银行以对冲头寸为抵押提供，但额度规模、期限和交易对手均未披露。在批发价格飙升情景下，考虑到
              Octopus 利润率很薄，大宗商品信用敞口可能很大。Kraken Technologies 分拆带来额外复杂性：如果 Kraken 分拆为独立实体，Octopus Group 股东是否按比例获得 Kraken
              股权，取决于分拆结构（全额分配、部分 IPO 或融资式剥离）。管理层已披露 Kraken CEO 任命（Amir Orad，2025 年 Q4），但未披露分拆后 Kraken
              实体的股权结构、优先清偿瀑布，以及持续 Kraken-Octopus 商业关系的许可费。Octopus Energy Group Ltd 的 UK Companies House 备案（注册号
              09263047）确认了备案历史和已注册账目，但公开来源没有集团层面、具完整分部披露的合并账目，限制了对资本充足性和现金头寸的量化评估。
            claimRefs:
              - CV025
              - CV026
              - CV027
              - CV028
              - CV029
