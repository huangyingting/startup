  - number: 7
    title: 风险
    sections:
      - number: '7.1'
        title: 监管与合规风险
        blocks:
          - type: paragraph
            body: >-
              Octopus Energy 持有 Ofgem 零售能源供应许可，受英国能源消费者保护全套规则约束，包括行为准则、智能电表义务、脆弱客户保护和直接借记管理规则。2025 年 7 月，Ofgem
              因直接借记付款超收向其开出 £1.5M 罚款——这是 Kraken CRM/账单自动化模块的直接失效——并要求 Octopus 向受影响客户退款 £2.64M、支付 £546K 消费者补偿。这是 Octopus
              首次重大 Ofgem 执法事件，尤其值得注意，因为账单自动化正是 Kraken 平台主张的核心差异化。另一项 Ofgem 调查仍在进行，涉及预付费电表做法；此前 2022-2023
              年，行业内强制安装预付费电表影响脆弱家庭，引发广泛担忧。议会对能源供应商行为的审查已经升温，2023-2024 年特别委员会听证会聚焦预付费电表滥用和家庭能源债务。Energy Act 2023
              对供应商提出新义务，涉及脆弱性识别、智能电表铺设和净零家庭技术安装，带来持续合规成本。Octopus 业务覆盖 27+
              个国家，各自监管框架不同，合规风险会叠加。在德国、法国、意大利、西班牙和日本，消费者保护法、数据隐私要求和智能电表标准各不相同；任何单一市场的监管失误，如果客户因 Kraken 管理运营承受合规后果，都可能影响
              Kraken 的许可收入。
