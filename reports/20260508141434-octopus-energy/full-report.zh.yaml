chapters:
  - number: 1
    title: 公司概况
    sections:
      - number: '1.1'
        title: 公司定位与商业模式
        blocks:
          - type: paragraph
            body: >-
              Octopus Energy Group Ltd 于 2015 年注册成立，2016
              年进入英国居民能源市场。它以挑战者供应商切入，靠直达消费者的数字模式提供简单、价格有竞争力的绿色能源电价。之后公司长成垂直整合的清洁能源集团，三块业务相互咬合：零售能源供应、Kraken 云技术平台，以及通过
              Octopus Energy Generation 布局可再生能源发电。零售业务覆盖英国、德国、法国、意大利、西班牙、日本、美国和新西兰；英国仍是核心市场，截至 2025 年初覆盖 7.8 million
              户家庭，约占居民市场 24%。Kraken 是专为公用事业打造的操作系统，在全球 70 million 签约账户上处理计费、客户管理、智能电表集成和灵活调度；2025 年 9 月已分拆为独立实体。Octopus
              Energy Generation 管理约 £7 billion 资产，投向陆上 / 海上风电和太阳能，是欧洲较大的专业可再生能源投资者之一。集团收入既来自零售能源的大宗商品价差，也来自 EDF、E.ON
              Next、Origin Energy、Tokyo Gas 等 Kraken 客户支付的经常性 SaaS 授权费，在能源行业形成少见的双重收入结构。Octopus Electric Vehicles 负责 EV
              租赁和智能充电，Electroverse 则是公共充电网络，两者把集团延伸到邻近电气化市场。
