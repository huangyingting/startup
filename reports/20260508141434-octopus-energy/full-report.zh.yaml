      - number: '2.3'
        title: 买方分层与采用路径
        blocks:
          - type: paragraph
            body: >-
              在英国能源零售，主要买方是居民家庭，选择供应商时看价格、客服口碑、电价结构和环保资质。预算由家庭掌握；价格差、费率到期和比价网站媒体报道会触发切换。中小企业是次级客群，采购复杂度略高，留存期也更长。Ofgem
              价格上限适用于居民客户，不适用于 SME 或大型工业用户，因此不同分群的利润动态不同。Kraken 公用事业软件业务的买方是公用事业公司的高管团队（CTO、COO 或 CEO），采购由 IT
              和客户运营团队支持。采用路径包括长期供应商评估、概念验证迁移，然后签订多年平台合同。Kraken 客户包括大型国际公用事业公司（EDF、E.ON Next、National Grid
              US）和较小独立公司，说明企业级和中端市场均可触达。迁移承诺周期长，客户切换成本高；一旦上平台，留存很强。清洁能源发电投资方面，Octopus Energy Generation
              的买方最终是其上市和非上市基金（ORIT、海上风电基金）的机构 LP，Tokyo Gas 则是基石
              LP。付费方是基金投资人；底层能源的使用者是电网，最终是零售消费者。采用触发因素包括企业或机构投资人的净零承诺，以及政府可再生能源目标。
