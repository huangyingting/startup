      - number: '8.6'
        title: 最终尽调问题与论点失效触发器
        blocks:
          - type: paragraph
            body: >-
              在确认或扩大任何 Octopus Energy Group 持仓前，四类最终尽调问题最关键。第一，Kraken ARR 经审计数据：管理层目前声称的 $500M+ ARR 无法从公开来源独立验证。必须拿到经审计的
              Kraken 收入，并按合同类型（许可、托管服务、按表现计费）、客户和地区拆分，才能验证支撑 $9B 估值的软件倍数假设。第二，Kraken 分拆结构和时间表：准确的股权分配、优先清偿瀑布、持续 Octopus
              零售关系的许可费结构，以及分拆后 Kraken 实体的治理安排，都必须披露，才能评估当前 Octopus Group 投资者获得的价值转移。第三，Ofgem 执法走向：2025 年 7
              月账单自动化罚款和仍在进行的预付费电表调查必须解决，监管风险画像才可评估。任何进一步执法一旦指向 Kraken
              账单，尤其是导致许可条件或重大整改成本，就会触发论点失效。第四，大宗商品采购信贷额度：任何大宗商品采购融资的规模、期限和抵押条款都应披露，以评估批发能源价格飙升时的下行风险。论点失效触发器包括：（1）2025 年
              7 月罚款后 18 个月内，第二起重大 Ofgem 执法指向 Kraken 账单自动化；（2）失去一个或多个主要 Kraken 许可客户（E.ON Next、Tokyo Gas、National Grid
              US），且这些客户代表 Kraken ARR 超过 15%；（3）Kraken 分拆结构不给现有 Octopus Group 投资者按比例分配 Kraken 实体股权；（4）被迫下轮融资或困境二级交易隐含估值低于
              $7B，释放机构对软件论点失去信心的信号。
