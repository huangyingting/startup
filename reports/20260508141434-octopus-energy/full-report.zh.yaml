      - number: '4.2'
        title: 单位经济性与成本结构
        blocks:
          - type: paragraph
            body: >
              能源零售天然是低利润业务：Ofgem 的价格上限方法允许供应商在大宗商品和网络成本转嫁之上获得封顶单位利润。行业分析师普遍估计，英国能源零售毛利率约为收入的 3% 至 5%；按 FY24 收入水平推算，毛利约
              £370 million 至 £620 million。Octopus 约 £1 billion 的隐含毛利（约 8% 毛利率）说明垂直整合带来运营效率，也说明拥有 Kraken、而不是向 Oracle 或
              SAP 采购计费基础设施，带来避免费用的收益。Octopus 在 £12.4 billion 收入上实现 £95 million EBITDA，对应 0.76% EBITDA
              利润率，符合轻资产零售模式，但被大宗商品转嫁大幅稀释。


              获客成本（CAC）未披露。Octopus 称转介绍驱动增长高于平均水平，因而相对传统厂商降低付费 CAC，但没有独立验证数字。单位经济性桥接只能依赖代理指标：英国能源零售行业通过数字渠道获客的 CAC
              估计为每客户 £50 至 £150；由于低流失和智能电价产品（Agile Octopus、Intelligent Octopus
              Go）高互动，回本周期按月计。营运资金需求有季节性，冬季能源消费和计费量最高时达到峰值，在股权之外还需要信用额度。与所有英国能源零售商一样，Octopus
              使用大宗商品采购信用额度，管理在批发市场购能与通过客户账单回收成本之间的现金时间差，使资产负债表暴露于远期头寸的按市值计价波动。
