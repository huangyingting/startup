companyProfile:
  summary: >-
    Octopus Energy Group（OEG）是一家英国后期私营能源公司，由 Greg Jackson 于 2015 年创立。它在英国经营零售能源供应，服务 7.5M 客户，并将 Kraken 云平台授权给 27+ 个国家的
    70M+ 公用事业账户。OEG 在 FY24 首次实现实质性盈利（£83M 净利润、£12.4B 收入）。Kraken Technology 于 2025 年 12 月以 $8.65B 估值分拆，释放了集团内嵌的 SaaS
    价值。OEG 在英国能源市场 NPS 最高（连续七年获 Which? Recommended Provider），也是认证 B Corporation。
  foundedDate: '2015-01-01'
  founders:
    - name: Greg Jackson CBE
      role: CEO 兼联合创始人
      background: 创办 OEG 前是连续软件创业者；Cambridge 经济学毕业。Octopus 使命驱动品牌、技术战略和国际扩张的主要推动者。一直抵制战略出售叙事，并为 Kraken 最终 IPO 做定位。
      claimRefs:
