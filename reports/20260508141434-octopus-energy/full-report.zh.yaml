      - number: '7.5'
        title: 战略与执行风险
        blocks:
          - type: paragraph
            body: >-
              CEO 兼联合创始人 Greg Jackson CBE 是 Octopus Energy Group 最主要的公共面孔，也是监管关系、融资和战略方向的核心。这一关键人物集中度在 Octopus
              治理披露中被明确点出，且没有通过继任规划披露得到实质缓解。Greg Jackson 离职或丧失履职能力，会给零售业务和 Kraken
              授权业务同时带来重大执行和声誉风险。德国、法国、日本、意大利、西班牙、新西兰、美国及其他市场同步国际扩张，会放大执行复杂度：每个市场都需要监管批准、本地人才、对冲能力和产品本地化。非英国业务按当前规模估计仍在亏损（FY24
              国际贡献未单独披露）。Kraken Technologies 分拆（2025 年 12 月）带来管理带宽风险，领导层注意力要在完成分拆、加速 Kraken 独立增长，以及维持 Octopus
              零售竞争地位之间分配。通过 SoLR 任命快速增长客户——尤其是 6 个月迁移 150 万个 Bulb 账户——可能在没有主动选择的迁移客户群中埋下潜在满意度或流失风险。Octopus
              的气候和净零战略带来品牌资产，但也制造长期产品转型风险，因为热泵、光伏和 EV 需要不同于燃气和电力账单的客户主张、安全制度和安装能力。
            claimRefs:
              - CR027
              - CR028
              - CR029
              - CR030
              - CR031
              - CR032
      - number: '7.6'
        title: 财务与资产负债表风险
        blocks:
          - type: paragraph
            body: >-
              Octopus Energy Group FY24 EBITDA 利润率仅 0.76%，面对大宗商品成本上升、监管罚款或执行失误，缓冲极小。£1.7B
              净资产提供了有意义的权益基础，但现金头寸、月度烧钱速度和可用信贷额度余量都未公开披露，外部无法评估资本充足性。Kraken Technologies 分拆（2025 年 12 月）估值 $8.65B，可能通过
              OEG 保留股权提供部分流动性，但具体持股比例和预期现金所得未披露。OEG 继续持有 OEG 内部的可再生能源资产组合（£7B
              AUM），资金来自股权和项目层面债务的组合；项目债务总量和契约未公开披露。集团营运资本周期在冬季高峰期结构性为负，批发采购必须在客户账单回款前融资，需要短期大宗商品信贷额度。英国零售业务存在坏账风险，尤其是预付费客户分层，Ofgem
              已经识别出账单合规故障。Octopus 报告 FY24 净利润 £83M（£12.4B 收入上的 0.67%
              净利率），这是集团历史上首次实现重大盈利；尚无穿越完整大宗商品周期的持续盈利记录。集团未披露杠杆率、利息覆盖倍数或债务到期结构，信用风险评估必须依赖数据室访问。
            claimRefs:
