      - number: '6.5'
        title: 扩张集中度与 Land-and-Expand 动态
        blocks:
          - type: paragraph
            body: >-
              Octopus Energy 的扩张经济性由两套不同的 land-and-expand 逻辑驱动。在零售分部，主要扩张机制是产品交叉销售：一个从标准可变费率获客的客户，可以被升级到 Agile，再到
              Intelligent Octopus Go，随后再到绑定 EV 租赁或使用 Cosy Octopus 的热泵安装。每一步都会提高客户生命周期价值、降低流失，并为 Kraken
              平台生成更丰富的需求调度数据。Electroverse 产品把客户关系延伸到公共充电。Octopus Electric Vehicles 增加薪资牺牲式租赁。Zero Bills
              产品在费率关系之外拉动硬件安装收入。结果是在能源生态里形成一个多产品漏斗，明显不同于商品化零售能源供应。对 Kraken B2B
              而言，扩张逻辑是地域和垂直行业：客户通常从一个市场或一个模块起步，随后逐步扩至更多市场或模块。National Grid US 从初步讨论走到完整 Kraken 部署，是大规模地域
              land-and-expand。Severn Trent Water 采用 Kraken
              管理水务公用事业，则是能源之外的垂直扩张。英国家庭分部的客户集中度风险中等：没有单个居民客户贡献有意义的收入份额，在商品化零售市场里，前十大客户风险基本为零。更大的集中度风险在分部层面——英国家庭零售贡献集团大部分收入和利润，因此英国监管或批发市场的不利变化，会对集团产生超比例影响。消费者采购摩擦低（数字优先、免退出费转供），但
              B2B Kraken 客户采购摩擦高（替换账单系统是多年迁移，需要董事会级别批准和大量实施资源）；这让赢客很难，也让客户流失很少。
            claimRefs:
              - CU020
              - CU021
              - CU022
              - CU023
              - CU024
