  - number: 3
    title: 竞争格局
    sections:
      - number: '3.1'
        title: 竞争格局概览
        blocks:
          - type: paragraph
            body: >-
              Octopus Energy Group 在三个不同但相互强化的战场竞争。英国居民零售方面，它目前以约 7.8 million 家庭（约 24% 份额）领先市场，排在 Centrica 的 British
              Gas（约 6.5–7M）、OVO Energy（约 4–4.5M）、E.ON Next（约 4.5M）和 EDF Energy（约 2.7–3M）之前。这个位置靠更高客户满意度、两次大型收购（2022 年
              Bulb、2023 年 Shell Energy UK）以及 Kraken 平台支撑的技术驱动成本结构打出来。2021–22 年英国能源危机淘汰了 25+ 家小型供应商，是结构性加速器：Octopus
              接收了多个政府分配组合，并用更高 NPS 和更低 Ofgem 投诉率，把品牌巩固为相对传统厂商更可靠、数字优先的替代方案。

              公用事业软件方面，Kraken Technologies（2025 年 9 月分拆）将其云原生计费、调度和 CRM 平台授权给 27+ 个国家的公用事业公司，覆盖 70M 签约账户和 $500M
              签约年经常性收入（ARR）。主要竞争对手是 Oracle Utilities（全球 430M+ 遗留客户，服务重、本地部署模式）、OVO 的 Kaluza（云原生 EV 和需求灵活性平台，约 2
              个英国外部授权客户）以及 Ensek（英国中端计费和 CRM，服务 sub-500K 账户供应商）。没有竞争对手同时具备 Kraken 的授权规模、按账户计价的 SaaS 经济性和 ML 调度能力。

              可再生能源发电方面，Octopus Energy Generation 在 9 个市场管理 4.9 GW、£7B AUM，与 Ørsted（全球已安装海上风电 10.2 GW，全球领导者）和
              Vattenfall（瑞典国有支持的公用事业公司，拥有英国海上风电和区域供热资产）竞争。OEG 的优势在于零售锚定需求降低市场电价风险，同时资产组合（太阳能、电池、陆上风电）比 Ørsted
              海上优先的组合更宽。所有战场的潜在新进入者包括超大规模云厂商支持的公用事业平台和国际能源巨头，但截至 2026 年，尚无一家在英国规模上落地。
