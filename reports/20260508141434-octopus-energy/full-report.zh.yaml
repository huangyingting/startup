      - number: '7.2'
        title: 技术与运营风险
        blocks:
          - type: paragraph
            body: >-
              Kraken 独家部署在 Amazon Web Services 上，给全部 7,000 万以上已签约账户带来结构性集中风险：如果 Kraken 主要 AWS 部署区域长时间宕机，E.ON Next、Tokyo
              Gas、National Grid US 等多家独立公用事业公司以及 Octopus 自身 750 万英国客户的账单、直接借记收款和客户管理都会同时受损。公司未公开披露多云故障切换或灾难恢复架构。2025 年 7
              月 Ofgem 罚款，是 Kraken 账单自动化故障引发监管处罚的已验证案例：如果自动化直接借记管理能对 34,000+ 名预付费客户造成超收，AI 驱动账单错误影响更大客户群的风险就存在。Kraken 关于
              AI 和 ML 表现的说法——效率提升 40%、NPS 提升 3 倍、节省 2,700 万吨 CO2——都是管理层主张，没有独立审计，潜在被许可方和监管者都无法核验其准确性。AI
              需求预测一旦出现重大偏差，可能通过批发交易集成模块造成对冲损失，直接影响能源采购成本和零售利润率。Kraken Technologies 未公开确认 SOC 2 Type II 或 ISO 27001
              认证，这对受监管公用事业客户构成重大信息安全保证缺口。7,000 万以上客户账户、横跨 27 个国家的个人和财务数据集中在单一平台上，同时受 GDPR、日本 APPI、加州 CCPA
              和其他数据保护制度约束，数据泄露风险因而更高。
