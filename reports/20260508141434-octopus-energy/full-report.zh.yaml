      - number: '2.4'
        title: 增长驱动、约束与证据缺口
        blocks:
          - type: paragraph
            body: >-
              英国能源零售的增长驱动是结构性的，包括交通和供暖电气化（EV 和热泵推动用电需求增长）、智能电表覆盖扩张（支持分时电价和需求响应）、UK Net Zero Strategy 要求到 2050
              年显著降低能源系统碳排放，以及消费者对绿色电价认知提升。Agile Octopus 这类动态电价每半小时把价格挂钩批发市场情况，利好懂技术的消费者，也利好 Octopus 的智能充电
              VPP。英国零售增长约束包括大宗商品利润薄（Octopus FY24 净利率 0.7%）、非大宗商品网络和政策成本上升（Greg Jackson 预计到 2029 年会让家庭账单增加
              20%），以及六家供应商目前控制超过 90% 账户的市场结构，集中度担忧上升。向德国、法国、意大利、西班牙、日本和美国扩张零售，带来增长可选性；但每个市场都有自身监管框架、语言要求和 Kraken
              本地化成本。Kraken
              软件市场的增长驱动包括全球公用事业运营数字化、多个市场的智能电表强制要求，以及管理分布式能源资源（EV、电池、热泵）的需要——遗留系统无法处理这些资源。约束包括公用事业采购周期长、既有供应商关系，以及从
              Oracle 和 SAP 遗留安装迁移所需的资本和时间。证据缺口很大：没有公开分析师用一致方法覆盖 Kraken 总可用市场（TAM），IEA
              全球清洁能源投资数据被广泛引用，但公用事业软件子集没有独立测算；Octopus 在英国以外的国际零售市占率也未经独立来源公开审计。
