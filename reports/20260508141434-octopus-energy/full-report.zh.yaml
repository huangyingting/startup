      - number: '8.3'
        title: 牛市 / 基准 / 熊市情景
        blocks:
          - type: paragraph
            body: >-
              牛市情景要求三个条件同时成立：Kraken 完成分拆，并在 2027 年前以经验证的 $600M+ ARR 拿到独立 SaaS 或混合 SaaS 的 8–12x 倍数；国际客户增长继续每年增加 300–500
              万个新账户；英国监管环境保持稳定，不再出现重大 Ofgem 执法。在这些假设下，仅 Kraken 实体就值 $5–7B，服务 800 万+ 客户、利润率改善的英国零售业务再贡献
              $1.5–2B，意味着集团权益价值在计入 IPO 或 M&A 执行溢价前为 $6.5–9B。由于 $9B 入场价已经计入大量 Kraken 可选性，牛市情景下当前投资者总回报也只是温和；上行取决于超过当前 ARR
              预期。基准情景假设 Kraken 分拆时实现 5–7x ARR 混合倍数，英国客户数稳定在 750–800 万，Ofgem 执法趋势不升级。这得到 Kraken 独立价值 $2.5–3.5B，以及零售公用事业价值
              $1.5–2B（约按 £6.9B 收入的 0.25x），对应集团权益价值 $4–5.5B，相比入场估值折价 35–55%。熊市情景假设 Kraken 未能完成干净分拆，发生一项或多项进一步 Ofgem
              执法并指向账单自动化，失去一个或多个主要许可客户，同时随着 Centrica 的 Hive 和 Kaluza 达到功能相当，英国市场份额停滞。集团随后回归纯公用事业倍数，即 £6.9B 收入的
              0.15–0.25x，隐含集团权益价值约 £1–1.7B（$1.3–2.2B），较 $9B 入场价下跌 75–85%。熊市概率低，但考虑到 Ofgem 执法先例和能源软件倍数压缩已经发生，并非可以忽略。
