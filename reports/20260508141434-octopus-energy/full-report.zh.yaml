        title: 资本基础与投资人
        blocks:
          - type: paragraph
            body: >-
              Octopus Energy Group 已从多元化的战略和财务投资人处融资超过 $2 billion。最近一轮重大融资于 2023 年 12 月以 $8 billion 估值完成（融资 $800
              million），随后 2024 年 5 月 GIM 和 CPP Investments 增持时估值升至 $9 billion。澳大利亚上市能源公司 Origin Energy 持股约
              23%，是最大单一股东，既获得经济上行，也对 Kraken 在澳大利亚的部署拥有战略杠杆。Generation Investment Management（Al Gore 的基金）持股 13%，CPP
              Investments（加拿大养老金）持股 12%，提供机构信誉背书。日本 Tokyo Gas 于 2020 年投资约 $200 million、换取约 9.7%，并参与经营 Octopus Energy
              日本零售业务的合资公司。澳大利亚养老基金 Aware Super 在 2024 年 5 月与 GIM 共同投资。FY24 在 £722 million 综合股权投资和留存收益推动下，公司净资产达到 £1.7
              billion。集团控股公司层面未披露公开债务或信用额度，不过 Octopus Energy Generation 内部很可能存在项目融资结构。公司仍为私有；管理层公开讨论过上市，但尚未宣布明确时间表。
