      - number: '1.4'
        title: 增长指标与市场地位
        blocks:
          - type: paragraph
            body: >-
              Octopus Energy 的增长轨迹是英国能源史上最快之一。2016 年从零起步，到 2025 年 10 月达到 7.8 million 英国家庭客户，并在 2025 年 1 月超过 British
              Gas，成为英国最大的居民能源供应商，覆盖约四分之一家庭。全球来看，2025 年 10 月其八个直营零售市场合计零售客户超过 10 million；仅 FY24，非英国客户基数就增长至三倍。FY24 收入达到
              £12.4 billion（以英国零售大宗商品为主），毛利 £1 billion，EBITDA £95 million，净利润 £83 million（0.7% 利润率）。Kraken FY24 经常性 SaaS
              收入为 £90 million，同比增长 68%，利润 £35 million，增幅 483%，显示技术业务经济性改善。员工数 FY24 从 4,800 增至 8,500，此后已超过
              11,000。德国业务客户超过 1 million，法国约 600,000，意大利 500,000，日本 500,000，西班牙 400,000，体现出有意义的国际分散。多数市场 Trustpilot 评分
              4.8/5，连续八年获得 Which? Recommended Provider，说明客户满意度表现持续领先，传统厂商尚未追上。TIME Magazine 将 Octopus Energy 列入 100 Most
              Influential Companies，进一步强化英国以外的品牌可信度。
