      - number: '5.4'
        title: 部署、集成、可靠性与路线图
        blocks:
          - type: paragraph
            body: >-
              Kraken 的部署模式是在 AWS 上云原生运行，Octopus 进入新地理市场时可以启动区域实例，而不需要大量本地基础设施。2023 年，1.5 million Bulb Energy
              客户在六个月内快速迁移到 Kraken 基础设施，随后 2023 年末又迁移 1.3 million Shell Energy 客户，这证明了该模式。两次迁移都未发生重大服务中断，Octopus
              在企业客户对话中把它们用作参考标杆。集成架构 API-first：授权公用事业公司通过 RESTful APIs 接入 Kraken，用于计费、计量数据交换和客户管理；Kraken Field
              则与外部现场人员管理和地图平台集成。智能电表数据通过英国 Data Communications Company 网络摄取；各国际市场有对应集成。可靠性由 AWS
              多区域架构和自动扩缩容支撑，不过集中在单一云供应商也形成潜在单点故障，投资人需要评估。客户侧可靠性证据包括超过 400,000 条评价给出的 Trustpilot 4.8/5，以及连续八年 Which?
              Recommended Provider 状态。已知可靠性事件包括两起 Ofgem 计费执法：2025 年因未向 34,000 名预付费客户开具最终账单被罚 £1.5M，以及 2025 年 5
              月因固定费用多收费错误被责令退还 £2.64M 并支付 £546K 善意款。这些事件说明，尽管平台整体技术成熟，某些受监管客户分群的计费边缘案例仍需要更强的质量控制工具。Kraken 路线图目标是到 2027
              年通过美国、日本和欧洲国际扩张达到 100M 账户。热泵集成、V2G 调度、AI 驱动联络中心自动化，以及水务等邻近垂直行业，会进一步扩大可服务市场。
            claimRefs:
              - CE023
              - CE024
              - CE025
              - CE026
              - CE027
      - number: '5.5'
        title: 差异化——技术 IP、数据与品牌
        blocks:
          - type: paragraph
            body: >-
              Octopus Energy 的竞争差异化靠四根柱子撑住。第一是自有技术：Kraken 平台从一开始就面向现代云环境和智能电表数据量搭建，绕开了传统 Oracle 和 SAP
              公用事业平台背上的技术债。Skyrocket ML 系统和 Kraken Asset 调度引擎，在自动化需求响应和客户沟通自动化上是真正的 IP，竞争对手要复刻需要多年。第二是数据优势：仅英国就有 1,290
              万块电表在管，全球覆盖 7,000 万个账户，Octopus 积累了消费模式、设备行为和批发电价响应的自有数据集，反过来用于费率设计、ML
              模型训练和发电资产调度。没有大规模智能电表基础的竞争对手，拼不出可比数据集。第三是品牌资产：Octopus 已形成口碑驱动的品牌认知，降低获客成本；Trustpilot 评分长期高企、Which?
              认可持续获得，而传统广告投入很少，都是证据。其服务 1/4 英国家庭的指标，以及 2025 年 1 月超过 British Gas 的里程碑，进一步强化了品牌存在感。第四是监管关系：Octopus 多次被指定为
              Supplier of Last Resort，说明监管方信任，也让公司以低于市场的成本拿到客户群。参与英国 Smart Data 计划、较早采用 TOU 费率，让 Octopus 成为 Ofgem 和
              DESNZ 的政策伙伴。关键 IP 包括为热泵 VPP 控制收购 Heatmiser、提供漫游数据和网络效应的 Electroverse EV 充电网络，以及 Skyrocket ML
              系统。复制壁垒很高：从零重建一个等同 Kraken 的平台，估计需要 5 到 7 年和数亿英镑，这也解释了为什么大型公用事业公司宁愿支付经常性许可费，而不是内部自建。
