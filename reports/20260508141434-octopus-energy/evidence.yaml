evidenceGaps:
  - type: private-evidence-only
    severity: material
    topic: Board composition and detailed governance structure
    missingEvidence: >-
      Octopus Energy Group does not publish a full board composition, independent director count, audit or remuneration
      committee constitution, or related-party transaction disclosures in publicly available sources. The company files
      abbreviated accounts in the UK and no full annual report is available publicly.
    whyItMatters: >-
      Governance structure is a core diligence variable, particularly given founder concentration and the dual-class
      interests created by the Kraken spinoff. Without board disclosure, it is not possible to assess independence,
      oversight quality, or conflict management.
    diligencePath: >-
      Request full board composition, governance charter, audit committee terms of reference, and any shareholder
      agreement from management.
