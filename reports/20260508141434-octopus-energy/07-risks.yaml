  - id: SR-S5
    title: Strategic and execution risk
    body: >-
      Greg Jackson CBE, CEO and co-founder, is the dominant public face of Octopus Energy Group and central to its
      regulatory relationships, fundraising, and strategic direction. This key-person concentration is explicitly
      identified in Octopus's governance disclosures and has not been materially mitigated through succession planning
      disclosure. The departure or incapacitation of Greg Jackson would represent a significant execution and
      reputational risk for both the retail business and the Kraken licensing franchise. Simultaneous international
      expansion across Germany, France, Japan, Italy, Spain, New Zealand, the United States, and additional markets
      multiplies execution complexity: each market requires regulatory approvals, local talent, hedging capabilities,
      and product localisation. The non-UK business is estimated to be loss-making at current scale (FY24 international
      contribution not disclosed separately). The Kraken Technologies spinoff (December 2025) introduces management
      bandwidth risk as leadership attention is divided between completing the spinoff, accelerating Kraken's
      independent growth, and maintaining Octopus retail's competitive position. Rapid customer growth through SoLR
      appointments — particularly the Bulb migration of 1.5 million accounts in six months — may have embedded latent
      customer satisfaction or churn risk in cohorts migrated without active choice. Octopus's climate and net-zero
      strategy is a source of brand equity but also creates long-term product transition risk as heat pumps, solar, and
      EVs require different customer propositions, safety regimes, and installation capabilities than gas and
      electricity billing.
    claimRefs:
      - CR027
      - CR028
      - CR029
      - CR030
      - CR031
      - CR032
  - id: SR-S6
    title: Financial and balance sheet risk
    body: >-
      Octopus Energy Group's EBITDA margin of 0.76% in FY24 leaves minimal buffer against commodity cost increases,
      regulatory penalties, or execution failures. Net assets of £1.7 billion provide a meaningful equity base, but cash
      position, monthly burn rate, and available credit facility headroom are not publicly disclosed — preventing
      external capital adequacy assessment. The Kraken Technologies spinoff (December 2025) at $8.65 billion valuation
      may provide partial liquidity to OEG through its retained stake, but the exact ownership percentage and expected
      cash proceeds are not disclosed. OEG continues to hold a portfolio of renewable energy assets in OEG (£7 billion
      AUM), financed through a combination of equity and project-level debt; the total project debt quantum and
      covenants are not publicly disclosed. The group's working capital cycle is structurally negative in peak winter
      periods, when wholesale procurement must be financed ahead of customer billing recovery, requiring short-term
      commodity credit facilities. Bad debt risk is present in the UK retail business, particularly for the pre-payment
      customer segment where Ofgem has already identified billing compliance failures. Octopus's reported FY24 net
      profit of £83 million (0.67% net margin on £12.4 billion revenue) is the first material profitable year in the
      group's history; no track record of sustained profitability through a full commodity cycle exists. The group has
      not disclosed leverage ratios, interest coverage, or debt maturity profiles, making credit risk assessment
      dependent on data-room access.
    claimRefs:
      - CR033
      - CR034
      - CR035
      - CR036
      - CR037
      - CR038
