        - Not disclosed; no multi-cloud or DR architecture publicly confirmed
        - Disaster-recovery architecture documentation; SLA commitments to Kraken licensees
      - - Market (commodity price volatility)
        - Wholesale gas/electricity prices spike or fall outside hedged positions, compressing retail margin
        - Medium — UK energy markets remain volatile post-crisis
        - High — 0.76% EBITDA margin leaves minimal buffer; group could move to loss
        - Commodity procurement automation via Kraken; wholesale trading integration; hedging
        - Hedge ratio and coverage period; credit facility size and terms; mark-to-market exposure
      - - Technology (AI model failure)
        - AI demand forecasting or billing models produce material errors at scale
        - Low — but unaudited and prior billing failure precedent exists
        - Medium-high — hedging losses or billing errors across millions of accounts
        - Model validation and testing frameworks (not publicly disclosed)
        - Independent model validation reports; error rate monitoring SLAs
      - - Strategic (key-person dependency)
        - Loss or departure of CEO Greg Jackson disrupts regulatory relationships and strategic direction
        - Low — Jackson is active and committed; but no succession disclosure
        - High — central to fundraising, regulatory credibility, and culture
        - No public succession plan; broader leadership team strengthened with Kraken spinoff
        - Succession planning documentation; key-man insurance; leadership team depth
      - - Competitive (Kaluza / Oracle / incumbents)
        - Competitors close Kraken's cost-to-serve gap; Kraken licensee growth slows
        - Medium — Kaluza growing; Oracle cloud investing; E.ON has platform capability now via Kraken
        - Medium — Kraken revenue growth is the primary investment thesis valuation driver
        - First-mover scale advantage; data network effect; multi-year client contracts
        - Kraken licensee contract lengths; net revenue retention; competitive win/loss data
      - - Financial (thin retail margins)
        - EBITDA margin compression from price cap changes, cost inflation, or SoLR obligations
        - Medium — price cap reduced Q2 2026; structural margin constraint exists
        - High — group moved to profitability only in FY24; margin reversal is plausible
        - International diversification; Kraken SaaS growth; operational efficiency
        - Segment gross margin data; commodity credit facility terms; FY25 interim results
      - - Regulatory (international compliance fragmentation)
        - Market-specific regulatory failure in Japan, Germany, or US impairs Kraken licensing revenue
        - Low-medium — 27+ markets have different compliance requirements
        - Medium — revenue and reputational damage; Kraken client liability
        - Local legal counsel; country-specific compliance wrappers (architecture undisclosed)
        - Cross-border compliance architecture; country-specific regulatory risk assessment
    notes: >-
      Likelihood and impact are qualitative analyst assessments based on public information only. 'Low', 'Medium', and
