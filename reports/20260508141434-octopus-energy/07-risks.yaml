  researchQuestions:
    - id: QR001
      type: adverse
      status: answered
      question: What Ofgem enforcement actions has Octopus Energy faced and what are the implications?
      answer: >-
        In July 2025, Ofgem fined Octopus £1.5M for direct-debit overcharging (Kraken billing failure). Required
        remedies: £2.64M customer refunds + £546K consumer redress. A separate industry-wide prepayment meter
        investigation also involves Octopus. These are the first material enforcement actions against Octopus and
        directly implicate Kraken's core billing automation module.
      targets:
        - contentRequirements/0
    - id: QR002
      type: mechanism
      status: answered
      question: How does the Ofgem price cap create margin risk for Octopus Energy's retail business?
      answer: >-
        The Ofgem price cap sets a ceiling on unit rates and standing charges for standard variable customers. When the
        cap is reduced (e.g., Q2 2026 -6.6%), per-unit retail revenue falls without a corresponding immediate reduction
        in wholesale procurement or fixed costs. Octopus's 0.76% EBITDA margin means even small cap reductions can move
        the business toward operating loss.
      targets:
        - contentRequirements/2
    - id: QR003
      type: verification
      status: unresolved
      question: What is the current status of the Ofgem prepayment meter investigation affecting Octopus?
      answer: null
      targets:
        - contentRequirements/0
    - id: QR004
      type: adverse
      status: answered
      question: What technology failures or security incidents has the Kraken platform experienced?
      answer: >-
        The July 2025 Ofgem-fined direct-debit overcharging event is a confirmed technology control failure in Kraken's
        billing automation. No publicly disclosed security breach or data incident has been identified. SOC 2 or ISO
        27001 certifications are not publicly confirmed.
      targets:
        - contentRequirements/1
    - id: QR005
      type: quantification
      status: answered
      question: How thin are Octopus Energy's retail margins and what is the breakeven risk?
      answer: >-
        FY24 EBITDA margin was 0.76% on £12.4B revenue (£95M EBITDA). Net profit was £83M (0.67% net margin). A
        commodity cost increase of even 1-2% of revenue would eliminate EBITDA. The group has only been materially
        profitable since FY24.
      targets:
        - contentRequirements/4
    - id: QR006
      type: mechanism
      status: answered
      question: How does Octopus's AWS dependency create operational risk for its Kraken licensees?
      answer: >-
        Kraken runs exclusively on AWS. An extended AWS region outage would simultaneously impair billing, customer
        management, and VPP dispatch for all 70M+ contracted accounts across multiple independent utilities. Licensees'
        customers would be unable to access services and billing runs would fail — creating regulatory SLA breach risk
        for the licensees.
      targets:
        - contentRequirements/1
    - id: QR007
      type: comparison
      status: answered
      question: How does Kaluza (Ovo Energy's platform) compare to Kraken as a competitive threat?
      answer: >-
        Kaluza is Kraken's closest disclosed direct competitor. Ovo Energy has more than 4 million UK customers and
        Kaluza is actively marketing to other utilities. Kaluza has not disclosed equivalent scale metrics (accounts,
        ARR) to Kraken's 70M+ / $500M+ ARR. Oracle Utilities also competes but from a legacy position.
      targets:
        - contentRequirements/3
    - id: QR008
      type: quantification
      status: partial
      question: What is the size of Octopus Energy's commodity credit facility and hedging exposure?
      answer: >-
        Not disclosed publicly. UK energy retailers typically maintain revolving credit facilities sized to cover 60-90
        days of wholesale procurement. At Octopus's scale (~7.5M UK customers), the facility could be several hundred
        million pounds. Terms, counterparties, and covenants are not public.
      targets:
        - contentRequirements/4
    - id: QR009
      type: adverse
      status: answered
      question: What governance and key-person risks exist at Octopus Energy Group?
      answer: >-
        Greg Jackson CBE (CEO) is identified as a key-person risk. Board composition, independent director count, audit
        committee, and succession planning are not publicly disclosed in Companies House filings. The Kraken spinoff
        added Amir Orad (Kraken CEO) and Tim Wan (Kraken CFO) as partial mitigation, but Greg Jackson remains sole
        Octopus retail CEO.
      targets:
        - contentRequirements/5
    - id: QR010
      type: mechanism
      status: answered
      question: How does the Kraken Technologies spinoff create potential conflicts of interest?
      answer: >-
        Post-spinoff, Kraken is an independent entity with incentives to maximise revenue from all utility clients —
        including Octopus's competitors. Octopus retail has an interest in preferential platform access and pricing.
        Without disclosed inter-company agreements, it is unknown how platform access, pricing, and feature
        prioritisation will be managed between competing interests.
      targets:
        - contentRequirements/3
    - id: QR011
      type: enumeration
      status: answered
      question: What are the primary risk categories for Octopus Energy Group as an investment?
      answer: >-
        Six primary categories: (1) regulatory/compliance — Ofgem enforcement, price cap, international regulation; (2)
        technology — AWS concentration, AI model risk, billing failure precedent; (3) market — commodity volatility,
        weather risk; (4) competitive — Kaluza, Oracle, incumbent investment; (5) strategic — key-person Greg Jackson,
        international execution complexity, spinoff conflict; (6) financial — thin margins, undisclosed credit
        facilities, no profitability track record.
      targets:
        - contentRequirements/0
    - id: QR012
      type: verification
      status: partial
      question: >-
        Does Octopus Energy have adequate liquidity and financial resilience to withstand a commodity shock or
        regulatory penalty?
      answer: >-
        Partially verified. Net assets of £1.7B provide equity buffer. Cash and credit facility headroom are not
        disclosed. FY24 EBITDA of £95M and net profit of £83M are positive but thin. OEG's £7B renewable AUM provides
        balance sheet support. Full capital adequacy cannot be assessed without data-room access.
      targets:
        - contentRequirements/4
    - id: QR013
      type: mechanism
      status: answered
      question: How does Octopus Energy manage commodity price risk through its wholesale trading and hedging?
      answer: >-
        Kraken's wholesale trading integration module uses AI/ML demand forecasting to optimise procurement timing and
        hedge ratios. Octopus participates in intraday and day-ahead energy markets. Hedge coverage period and ratio are
        not disclosed. The company has not experienced a publicly disclosed hedging loss but the July 2025 billing
        incident shows model automation can fail.
      targets:
        - contentRequirements/2
    - id: QR014
      type: quantification
      status: answered
      question: How many customers were affected by the July 2025 Ofgem billing enforcement?
      answer: >-
        Ofgem enforcement records cite approximately 34,000 customers overcharged on direct-debit payments, requiring
        £2.64M in refunds. This is a fraction of the 7.5M UK customer base but is nonetheless a verified control failure
        in the Kraken billing module.
      targets:
        - contentRequirements/0
    - id: QR015
      type: comparison
      status: answered
      question: How does Octopus's regulatory risk profile compare to British Gas (Centrica)?
      answer: >-
        British Gas has faced multiple Ofgem enforcement actions historically and has a larger, more complex customer
        estate. Octopus's July 2025 fine is its first material enforcement; British Gas's recent enforcement focused on
        prepayment meters and customer service standards. Both face price-cap margin risk. Octopus's advantage is Kraken
        automation; its disadvantage is that automation failures have now been evidenced.
      targets:
        - contentRequirements/3
    - id: QR016
      type: mechanism
      status: answered
      question: How does the Supplier of Last Resort (SoLR) mechanism create risk for Octopus?
      answer: >-
        Octopus has been appointed SoLR three times (Avro 580K, Bulb 1.5M, plus other smaller SoLRs). Each SoLR
        appointment transfers customers not by choice, potentially with different satisfaction, churn, and engagement
        profiles. SoLR obligations include rapid onboarding within regulatory timelines, absorbing out-of-contract
        customers, and managing legacy systems from failed suppliers.
      targets:
        - contentRequirements/0
    - id: QR017
      type: enumeration
      status: answered
      question: What specific regulatory obligations has the Energy Act 2023 imposed on Octopus Energy?
      answer: >-
        The Energy Act 2023 (UK) created new obligations on: (1) smart meter rollout acceleration to net-zero targets;
        (2) proactive vulnerability identification for customers in financial difficulty; (3) installation standards for
        heat pumps, solar, and EV chargers; (4) strengthened licence compliance for retail suppliers. These increase
        Octopus's compliance cost and regulatory exposure.
      targets:
        - contentRequirements/0
    - id: QR018
      type: freshness
      status: answered
      question: What are the most current risk signals for Octopus Energy as of the run date (May 2026)?
      answer: >-
        Most current signals: (1) Q2 2026 Ofgem price cap -6.6% reducing retail revenue per customer; (2) Ofgem
        prepayment meter investigation status unknown (ongoing at last public report); (3) Kraken Technologies spun off
        December 2025 — spinoff integration risk and conflict of interest management entering operational phase; (4)
        FY25 results not yet disclosed.
      targets:
        - contentRequirements/0
    - id: QR019
      type: mechanism
      status: answered
      question: What is the risk profile of Octopus's international expansion strategy?
      answer: >-
        Eight markets with different regulatory frameworks, competitive dynamics, and customer profiles simultaneously.
        Non-UK customers tripled in FY24 to ~1.2M but revenue contribution is not separately disclosed. Germany is the
        largest at 1M+ customers but faces strong incumbents. Japan has Tokyo Gas as a partner/competitor. The US is
        early-stage. International operations are likely loss-making at current scale (segment P&L not disclosed).
      targets:
        - contentRequirements/3
    - id: QR020
      type: verification
      status: unresolved
      question: Does Kraken hold any ISO 27001 or SOC 2 Type II certifications covering its platform?
      answer: null
      targets:
        - contentRequirements/1
    - id: QR021
      type: quantification
      status: partial
      question: What is the financial exposure from Kraken's unaudited AI claims if they are materially overstated?
      answer: >-
        If the 40% efficiency claim (vs industry benchmark of £40-60/account) is overstated and actual savings are
        20-25%, Kraken's competitive advantage is narrowed. This would slow licensee acquisition, reduce ARR growth, and
        impair Kraken's $8.65B standalone valuation. Quantifying this without audit data is not possible; this is a
        material unresolved gap.
      targets:
        - contentRequirements/1
    - id: QR022
      type: mechanism
      status: answered
      question: How is bad debt and customer credit risk managed in Octopus Energy's retail business?
      answer: >-
        Kraken's AI customer-risk-identification module flags customers at risk of default proactively. Octopus's
        OctoAssist fund (£200M over 3 years) provides support to vulnerable customers, reducing forced prepayment meter
        installation risk. Direct-debit management by Kraken is intended to optimise collection — but the July 2025 fine
        showed this can overcharge customers. Bad debt ratio is not publicly disclosed.
      targets:
        - contentRequirements/4
    - id: QR023
      type: comparison
      status: answered
      question: How does Oracle Utilities' competitive threat to Kraken compare to Kaluza's?
      answer: >-
        Oracle Utilities has a large global installed base (thousands of utility deployments) and deep relationships
        with regulated utilities in the US, Australia, and Europe. Oracle is investing in cloud migration of IS-U.
        Kaluza is newer, cloud-native, and closer in design to Kraken but has smaller disclosed scale. Both represent
        genuine medium-term threats; Oracle is more dangerous in regulated-utility segments, Kaluza in UK
        retail-adjacent utilities.
      targets:
        - contentRequirements/3
    - id: QR024
      type: mechanism
      status: answered
      question: How does climate change create long-term demand risk for Octopus Energy's gas retail business?
      answer: >-
        UK net-zero targets require phasing out gas boilers by the 2030s, replacing gas central heating with heat pumps.
        Octopus is positioned for this transition through its heat-pump installation programme (744k installs FY24) and
        Intelligent Octopus heat-pump tariffs. However, a rapid gas-demand decline would reduce the revenue contribution
        from gas billing before heat-pump tariff revenue fully compensates.
      targets:
        - contentRequirements/2
    - id: QR025
      type: adverse
      status: answered
      question: What reputational risks has Octopus Energy accumulated that could affect customer acquisition?
      answer: >-
        Adverse signals: (1) July 2025 Ofgem £1.5M fine — widely reported, damages claim of billing superiority; (2)
        prepayment meter investigation — reputational risk if findings are adverse; (3) perception risk if SoLR-acquired
        customers (Bulb, Avro) attribute negative experience to Octopus. Positive signals (Trustpilot 4.8, Which? 8
        years) remain strong but the fine introduces first material negative data point.
      targets:
        - contentRequirements/0
    - id: QR026
      type: mechanism
      status: answered
      question: How does the Kraken Technologies spinoff affect Octopus Energy Group's consolidated risk profile?
      answer: >-
        Post-spinoff: (1) Kraken SaaS revenue deconsolidates, reducing group revenue but not necessarily value if OEG
        retains a valuable equity stake; (2) Kraken's client pricing power increases as standalone entity, raising
        Octopus retail's licence cost over time; (3) execution risk shifts to managing two separate entities with
        aligned but not identical interests; (4) Kraken's new investors have independent governance expectations that
        may create pressure on inter-company terms.
      targets:
        - contentRequirements/5
    - id: QR027
      type: quantification
      status: answered
      question: What was the financial quantum of the July 2025 Ofgem enforcement action?
      answer: >-
        £1.5M fine + £2.64M customer refunds + £546K consumer redress = approximately £4.7M total financial impact.
        Immaterial relative to £12.4B FY24 revenue (0.04%) but material for reputational impact on a platform claiming
        billing automation superiority.
      targets:
        - contentRequirements/0
    - id: QR028
      type: verification
      status: answered
      question: Has Octopus Energy disclosed a succession plan or key-man insurance for Greg Jackson?
      answer: >-
        No public succession plan or key-man insurance disclosure has been identified in any public Octopus filing,
        press release, or investor communication. The Kraken spinoff added leadership depth through Amir Orad (Kraken
        CEO) and Tim Wan (Kraken CFO), but these are Kraken-level appointments, not Octopus retail CEO succession.
      targets:
        - contentRequirements/5
    - id: QR029
      type: mechanism
      status: answered
      question: How do UK household energy debt trends affect Octopus Energy's credit risk?
      answer: >-
        Rising household energy debt (broadly estimated at £3B+ across UK suppliers post-2021 crisis) increases bad-debt
        provisioning requirements. Ofgem's focus on prepayment meter practices and direct-debit oversight reflects this
        backdrop. Octopus's bad-debt ratio is not disclosed; Kraken's customer-risk AI is claimed to identify at-risk
        customers proactively.
      targets:
        - contentRequirements/4
    - id: QR030
      type: freshness
      status: partial
      question: Has Octopus Energy disclosed FY25 results or interim financials that update the FY24 risk baseline?
      answer: >-
        FY25 results had not been disclosed as of the run date (2026-05-08). The most recent financial data is FY24
        (financial year ending October 2024), disclosed via press release in late 2024. The Kraken spinoff at $8.65B in
        December 2025 provides an implicit valuation update but no interim P&L disclosure.
      targets:
        - contentRequirements/4
