  - id: SR-S2
    title: Technology and operational risk
    body: >-
      Kraken's exclusive deployment on Amazon Web Services creates a structural concentration risk for all 70
      million-plus contracted accounts: an extended outage of Kraken's primary AWS deployment region would
      simultaneously impair billing, direct-debit collection, and customer management for multiple independent utilities
      including E.ON Next, Tokyo Gas, and National Grid US, alongside Octopus's own 7.5 million UK customers. Neither
      multi-cloud failover nor disaster-recovery architecture is publicly disclosed. The July 2025 Ofgem fine is a
      verified example of Kraken billing automation failure causing regulatory sanction: if automated direct-debit
      management can overcharge 34,000+ prepayment customers, the risk of further AI-driven billing errors affecting
      larger customer populations exists. Kraken's AI and ML performance claims — 40% efficiency gain, 3x NPS
      improvement, 27 million tonnes CO2 saved — are management assertions without independent audit, making their
      accuracy unverifiable for prospective licensees and regulators alike. Any significant inaccuracy in AI demand
      forecasting could drive hedging losses in the wholesale trading integration module, directly impacting energy
      procurement costs and retail margin. No SOC 2 Type II or ISO 27001 certification is publicly confirmed for Kraken
      Technologies, representing a material information security assurance gap for regulated utility clients.
      Data-breach risk is elevated by the concentration of personal and financial data for 70 million-plus customer
      accounts across 27 countries on a single platform, subject to GDPR, Japan's APPI, California's CCPA, and other
      data protection regimes simultaneously.
    claimRefs:
      - CR008
      - CR009
      - CR010
      - CR011
      - CR012
      - CR013
      - CR014
    tableRefs:
      - TR001
      - TR003
  - id: SR-S3
    title: Market and commodity risk
    body: >-
      UK retail energy is fundamentally exposed to wholesale gas and electricity commodity price volatility. The Ofgem
      price cap, while protecting consumers, constrains the unit margin suppliers can earn — creating asymmetric risk
      when commodity prices fall below the cap floor (reducing revenue faster than costs fall) or surge above it
      (requiring hedging losses to be absorbed). During the 2021-2022 European gas price crisis, multiple UK energy
      suppliers became insolvent; Octopus absorbed Avro Energy (580,000 customers) and Bulb (1.5 million customers)
      through Supplier of Last Resort appointments, incurring integration costs. Octopus disclosed a profitability
      margin of only 0.76% EBITDA in FY24 — at the threshold where a sustained commodity price movement of even 1-2%
      could move the group to operating loss. The Q2 2026 Ofgem price cap reduction of 6.6% reduces per-unit revenue
      across all UK retail customers without a corresponding reduction in fixed-cost infrastructure. Octopus uses
      commodity credit facilities to fund wholesale energy procurement ahead of customer billing, creating
      mark-to-market balance sheet exposure during periods of price volatility. These credit facilities are not
      disclosed in terms of size or counterparty. Weather risk is seasonal and structural: abnormally mild winters
      reduce energy consumption and revenue, while extreme cold events increase demand and procurement costs
      simultaneously. Climate change introduces long-term demand uncertainty for gas consumption as heat-pump
      penetration increases.
    claimRefs:
      - CR015
      - CR016
      - CR017
      - CR018
      - CR019
      - CR020
    figureRefs:
      - FR002
  - id: SR-S4
    title: Competitive and business model risk
    body: >-
      Octopus Energy's competitive position depends on Kraken's cost-to-serve advantage — approximately £15-20 per
      account versus the £40-60 industry average. As incumbents invest in competing cloud-native platforms, this
      advantage could erode. Ovo Energy's Kaluza spinout is the closest direct Kraken competitor; it has not disclosed
      equivalent scale but is actively marketing to utilities. British Gas (Centrica) has invested in digital
      transformation and data analytics capabilities. E.ON has licensed Kraken — a revenue gain for Octopus — but this
      means E.ON simultaneously has access to Kraken capabilities that reduce its own cost-to-serve disadvantage. Oracle
      Utilities maintains a large installed base of traditional utilities globally and has been investing in cloud
      migration of its IS-U platform. If Oracle's cloud utility product matures to competitive feature parity with
      Kraken, the barrier to Kraken licensing for large utilities may shrink. Octopus's retail market share (23.7% UK
      household) creates regulatory scrutiny risk: as the market's largest supplier, Octopus faces heightened Ofgem
      surveillance and cannot rely on the challenger-brand positioning it used when growing from zero. The SoLR
      absorption of Avro and Bulb customers created inorganic customer cohorts with potentially different churn
      profiles, satisfaction levels, and engagement patterns compared to natively-acquired Octopus customers. The Kraken
      spinoff creates a structural conflict: Kraken's commercial incentive is to maximise licensee revenue from all
      utility clients including Octopus competitors, while Octopus retail's interest is to prevent competitors from
      closing the platform gap. How this tension is managed post-spinoff is not publicly disclosed.
    claimRefs:
      - CR021
      - CR022
      - CR023
      - CR024
      - CR025
      - CR026
    figureRefs:
