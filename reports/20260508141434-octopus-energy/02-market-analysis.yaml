          mid: 12
          high: 20
          unit: USD B
          detail: >-
            Low: conservative based on Kraken's market positioning and Gartner utility software estimates. Mid:
            triangulated from multiple tech-market sources. High: includes adjacent flexibility and energy management
            software. No public analyst covers this precisely.
        - label: Octopus UK market share (households)
          low: 22
          mid: 24
          high: 26
          unit: '% of UK household accounts'
          detail: >-
            Low: 2024 Q3 Cornwall Insight estimate. Mid: January 2025 Cornwall Insight figure. High: forward projection
            if Shell/Bulb consolidation gains hold.
        - label: Kraken contracted annual revenue
          low: 450
          mid: 500
          high: 600
          unit: USD M
          detail: >-
            Low: company stated $500M at Sep 2025 spinoff; low assumes some contract attrition. Mid: company stated
            figure. High: includes pipeline that converts in 12 months.
        - label: Octopus Energy Generation AUM
