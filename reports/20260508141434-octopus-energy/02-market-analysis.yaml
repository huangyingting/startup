  evidenceGaps:
    - type: missing-source
      severity: material
      topic: No independent analyst covers Kraken's utility software TAM with consistent methodology
      missingEvidence: >-
        Public market sizing for the utility billing/CRM/smart-metering SaaS segment has not been published by any major
        analyst firm (Gartner, IDC, Wood Mackenzie, etc.) with a methodology that directly aligns with Kraken's product
        scope. The $10B+ estimate is triangulated from Kraken's own contracted revenue position rather than a published
        source.
      whyItMatters: >-
        Without an independent TAM estimate, it is difficult to assess Kraken's market penetration rate, long-term
        growth ceiling, or the credibility of its valuation assumptions at £10B.
      diligencePath: >-
        Commission independent utility software market sizing from Wood Mackenzie or Gartner; or request Kraken
        management's own TAM model with underlying assumptions.
      relatedQuestionRefs:
        - QM005
        - QM028
        - QM029
      relatedTableRefs:
        - TM002
    - type: private-evidence-only
      severity: moderate
      topic: Octopus international retail market shares outside UK are not independently audited
      missingEvidence: >-
        Customer counts for Germany (1M+), France (~600K), Italy (~500K), Spain (~400K), Japan (~500K) are
        company-stated and not audited by an independent market data provider equivalent to Cornwall Insight's UK
        meter-point data.
      whyItMatters: >-
        Unaudited international figures make it difficult to assess the true scale of international operations, growth
        rates, and profitability by market.
      diligencePath: >-
        Request country-level audited meter-point or customer data from local regulators, or require management accounts
        broken out by geography in the data room.
      relatedQuestionRefs:
        - QM020
        - QM028
      relatedTableRefs: []
    - type: missing-source
      severity: minor
      topic: Smart meter rollout data requires more recent official publication than available
      missingEvidence: >-
        DESNZ DUKES 2024 provides electricity meter count but specific smart meter installation counts and the
        proportion of Octopus customers on smart meters and dynamic tariffs are not publicly audited. The 35M+ installed
        base figure is an estimate.
      whyItMatters: >-
        Octopus's competitive advantage in smart tariffs depends on smart meter penetration in its customer base;
        without this data, smart tariff adoption rates are uncertain.
      diligencePath: >-
        Request DESNZ quarterly smart meter statistics and Octopus's internal breakdown of customer base by tariff type
        and smart meter status.
      relatedQuestionRefs:
        - QM009
      relatedTableRefs: []
