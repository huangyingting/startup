figures:
  - id: FM001
    title: Market sizing lens
    type: pyramid
    layout: standard
    summary: >-
      TAM/SAM/SOM hierarchy for Octopus Energy Group, from the broadest global clean energy investment market down to
      the directly served UK household energy base and Kraken's contracted revenue.
    data:
      nodes:
        - level: 1
          label: 'TAM Layer 1: Global clean energy investment'
          value: 1700
          unit: USD B annually (2023)
          detail: >-
            IEA World Energy Investment 2024 proxy; all clean energy asset classes globally. Far larger than Octopus's
            addressable market but establishes macro tailwind.
        - level: 2
          label: 'TAM Layer 2: Global utility software and SaaS'
          value: 10
          unit: USD B+ estimated annually
          detail: >-
            Estimated from Kraken's $500M contracted revenue as small share of global utility IT spend. No independent
            analyst has published this figure directly.
        - level: 3
          label: 'SAM: UK domestic energy retail + key international markets'
          value: 50
          unit: GBP B (UK retail ~£40-50B; international markets approximate)
          detail: >-
            UK domestic retail revenue estimated from Ofgem data (~28.5M electricity meters at average £1,641/yr).
            International markets (DE, FR, IT, ES, JP) add further SAM on top.
        - level: 4
          label: 'SOM: Octopus served base (UK 24% + international)'
          value: 12.4
          unit: GBP B FY24 revenue
          detail: >-
            Octopus FY24 revenue £12.4B represents actual served market; Kraken SaaS £90M FY24 revenue within utility
            software SOM.
    approximationNotes: >-
      The pyramid layers use different units and market definitions. TAM Layer 2 is not independently published and
      relies on triangulation. The layers are directionally illustrative rather than precisely nested.
    claimRefs:
      - CM001
      - CM004
      - CM007
      - CM008
      - CM028
  - id: FM002
