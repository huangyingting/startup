  - id: TM004
    title: Growth drivers and constraints table
    columns:
      - Driver/Constraint
      - Direction
      - Timing
      - Implication
      - Diligence Ask
    rows:
      - - UK Net Zero mandate (2050 target, interim carbon budgets)
        - driver
        - 2025-2050 structural
        - >-
          Increases demand for renewable generation, flexible tariffs, and demand response; benefits Octopus retail,
          OEG, and Kraken
        - Confirm how each regulation change (e.g. heat pump mandates) flows through to Octopus revenue
      - - EV adoption and smart charging growth
        - driver
        - 2025-2035 accelerating
        - Increases electricity demand; boosts Intelligent Octopus Go VPP and EV leasing business
        - Quantify incremental revenue per EV customer enrolled in VPP vs standard tariff
      - - Smart meter rollout UK (35M+ installed)
        - driver
        - Current; ongoing through 2030
        - Enables half-hourly settlements; expands addressable base for Agile and time-of-use tariffs
        - Assess what % of Octopus customer base is on smart meter and dynamic tariff
      - - Utility digitalization globally (legacy replacement)
        - driver
        - 2025-2030
        - Expands Kraken TAM; generates demand for cloud-native billing and flexibility management
        - Map Kraken's pipeline of utility RFPs vs Oracle/SAP incumbent renewal cycles
      - - Rising non-commodity energy costs (network charges, levies)
        - constraint
        - 2025-2029 rising
        - Squeezes household disposable income; raises bill and switching pressure; Greg Jackson warned 20% rise by 2029
        - Model scenario where non-commodity costs cause political intervention to cap or redistribute charges
      - - UK market concentration at 6 suppliers / 90%+ share
        - constraint
        - Current
        - Ofgem concentration concern may trigger market investigation; limits further inorganic growth options
        - Monitor any CMA market study referral; assess Octopus's policy on further domestic acquisitions
      - - Slow utility procurement cycles (Kraken clients)
        - constraint
        - Structural
        - Limits speed of Kraken revenue growth; long lead times reduce contracted revenue predictability
        - Request a Kraken pipeline breakdown by stage and expected conversion timeline
      - - International regulatory divergence
        - constraint
        - Structural in each market
        - Requires Kraken localisation by country (language, billing rules, regulatory APIs); raises entry costs
        - Assess Kraken's localisation cost per new market and track record for on-time delivery
    notes: >-
      Timing estimates are based on public policy timelines and Octopus management statements. Diligence asks are
      illustrative; specific data would require management data-room access.
