        - label: UK domestic energy retail revenues (annual)
          low: 38
          mid: 45
          high: 55
          unit: GBP B
          detail: >-
            Low: normalized post-crisis wholesale pass-through at £1,641/yr cap × 28.5M meters. Mid: typical bill
            including SME and discretionary product uplift. High: elevated wholesale price scenario (~2022-2023 levels
            would imply £60B+).
        - label: Global utility SaaS/billing market (annual)
