  - id: FM004
    title: Adoption funnel or value-chain map
    type: funnel
    layout: standard
    summary: >-
      Simplified adoption funnel for Kraken utility software, from initial awareness of platform capability to full
      migration and contracted revenue. UK retail funnel runs in parallel.
    data:
      items:
        - stage: Market Awareness
          value: 100
          label: Utility identifies billing/CRM modernisation need or smart meter mandate
          detail: Triggered by regulatory deadlines, legacy system EOL, or competitive pressure from Octopus's own performance
        - stage: Vendor Evaluation
          value: 70
          label: Kraken enters RFP alongside Oracle Utilities, SAP, Ensek, Kaluza
          detail: Technical demo, reference checks with EDF, E.ON, Origin Energy; 6–18 months evaluation
        - stage: Proof of Concept
          value: 40
          label: Pilot migration of subset of accounts to Kraken in sandboxed environment
          detail: Kraken has migrated Bulb (1.5M) and Shell (1.3M) at scale; strongest proof point
        - stage: Contract Signed
          value: 25
          label: Multi-year SaaS platform agreement signed; migration plan agreed
          detail: Contracts feed into Kraken's $500M contracted annual revenue
        - stage: Full Migration
          value: 15
          label: All customer accounts live on Kraken; legacy system decommissioned
          detail: Creates high switching cost; 40% operational cost reduction claimed by Kraken
        - stage: Upsell and Expansion
          value: 10
          label: Kraken adds flexibility, VPP, and new market modules; revenue grows
          detail: Non-energy verticals (Severn Trent water, Cuckoo Fibre) expanding TAM
    approximationNotes: >-
      Stage proportions are illustrative based on standard enterprise software funnel norms and Kraken's disclosed
      client list relative to global utility count. Actual conversion rates are not disclosed.
    claimRefs:
      - CM007
      - CM021
      - CM022
      - CM037
