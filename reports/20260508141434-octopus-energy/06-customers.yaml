company:
  name: Octopus Energy Group
chapter:
  number: 6
  title: Customers
  summary: >-
    Octopus Energy Group serves more than 10 million customers globally across eight markets as of early 2026,
    with the UK domestic segment of 7.5 million accounts representing approximately 23.7% market share — the
    largest single-supplier position in UK retail energy history. International expansion across Germany, France,
    Japan, Italy, Spain, and New Zealand has tripled the non-UK customer base in FY2024. Customer acquisition
    has been partly inorganic through Supplier of Last Resort appointments for Bulb (1.5M) and Shell Energy
    (1.3M), supplemented by strong organic switching driven by Trustpilot scores of 4.8 out of 5 and eight
    consecutive Which? Recommended Provider years. Churn is estimated at 2-3% monthly versus 4-5% industry
    average, and satisfaction scores remain the highest in the UK market. The Kraken B2B client base adds seven
    or more named utility partners across five geographies. Customer concentration in UK domestic retail creates
    regulatory exposure, while international markets require significant ongoing investment to achieve profitability.
    An Ofgem billing fine affecting 34,000 prepayment customers signals residual compliance risk in vulnerable
    customer segments.

sections:
  - id: SU-01
    title: Customer Base Segmentation
    body: >-
      Octopus Energy Group's customer base spans three primary segments. The largest is UK domestic retail
      energy supply, comprising approximately 7.5 million household accounts as of January 2025 and representing
      23.7% of the UK domestic energy market — the highest share held by any single supplier in the UK market's
      modern competitive era. Internationally, Octopus serves a further 2.5 million or more customers across
      Germany (over 1 million), France (approximately 600,000), Japan (approximately 500,000), Italy
      (approximately 500,000), Spain (approximately 400,000), and New Zealand (approximately 100,000). The
      global customer count exceeded 10 million as of late 2024 per Octopus press releases. A second distinct
      segment is business energy customers: Octopus serves SMEs and commercial customers in the UK through the
      Shape Shifters tariff suite, Electric Match, and Wind Works, though precise SME account numbers are not
      publicly disclosed. The third segment is Kraken B2B licence clients — utilities across the US, Australia,
      Japan, Italy, and Europe that licence the Kraken platform for their own customer bases. By channel, the
      overwhelming majority of retail customers are acquired digitally, with no-exit-fee switching enabling
      ease of movement both into and out of Octopus. By use case, smart-tariff customers including those on
      Agile, Intelligent Octopus Go, Cosy, and Flux represent the highest-value and most engaged cohort,
      using Kraken's demand-dispatch capabilities and generating the data advantage that underpins Octopus's
      platform differentiation. By geography, the UK remains the dominant revenue market, but the non-UK
      customer base tripled during FY2024 — a key strategic milestone demonstrating that the international
      expansion thesis is progressing. Revenue concentration in UK retail is a residual risk, given that UK
      price-cap regulation constrains margins and weather, wholesale prices, and regulatory policy all affect
      UK profitability simultaneously.
    claimRefs:
      - CU001
      - CU002
      - CU003
      - CU004
      - CU005

  - id: SU-02
    title: Adoption Trajectory and Growth
    body: >-
      Octopus Energy's growth trajectory is one of the most remarkable in UK retail energy history. Founded
      in 2015 and launching in 2016 with zero customers, Octopus grew to approximately 1.5 million UK household
      accounts by 2020, crossing 2 million in 2021, and accelerating sharply through inorganic Supplier of Last
      Resort appointments. The appointment to rescue Avro Energy customers in 2021 added roughly 580,000
      accounts. The administration of Bulb Energy in November 2021 and subsequent Special Administration saw
      Octopus selected by the UK government to acquire Bulb in October 2022, migrating 1.5 million customers
      to the Octopus and Kraken platform between January and June 2023. The acquisition of Shell Energy Retail
      UK added a further 1.3 million accounts in late 2023. Together these inorganic additions contributed
      significantly to the January 2025 milestone of surpassing British Gas to become the UK's largest household
      energy supplier. Organic growth is driven by high net promoter scores generating word-of-mouth referrals,
      competitive smart tariffs for EV owners and solar households, and strong digital marketing at low
      customer acquisition cost relative to incumbents. The non-UK customer base growth of approximately 3x
      during FY2024 confirms that international expansion is generating meaningful traction, with Germany in
      particular growing to over 1 million customers through organic switching and local marketing campaigns.
      Meters under management grew to 12.9 million in the UK by October 2024, which includes gas meters
      alongside electricity, indicating the depth of the dual-fuel customer relationship. Smart-tariff adoption
      rates are not precisely disclosed but Ofgem data showing over 250,000 UK smart TOU EV tariff customers
      with Octopus out of 502,000 total demonstrates significant smart-product penetration within the base.
    claimRefs:
      - CU006
      - CU007
      - CU008
      - CU009
      - CU010

  - id: SU-03
    title: Named Customer Proof and Reference Quality
    body: >-
      Octopus Energy's customer evidence is among the strongest in UK retail energy, though the nature of
      the market means individual case studies are less common than aggregate satisfaction metrics. The most
      authoritative third-party customer proof is the Which? Recommended Provider award, maintained for eight
      consecutive years, which requires independently verified satisfaction surveys covering customer service,
      value for money, billing accuracy, and complaint handling. Trustpilot reviews of 4.8 out of 5 from over
      400,000 submissions provide breadth of coverage, though self-selection bias applies. Uswitch, the UK's
      largest energy switching platform, consistently ranks Octopus highly in its annual customer satisfaction
      surveys. On the B2B side, named Kraken clients serve as reference accounts of a different kind: Origin
      Energy (ASX-listed Australian utility with approximately 4 million customers) is both a 23% shareholder
      and a Kraken licence client, representing the highest-value strategic customer proof. EDF Energy, one of
      the UK's largest incumbents, licensing Kraken for customer management signals that even competitors
      recognise the platform superiority. National Grid US, the regulated distribution utility, adds a regulated-
      asset-owner reference in the North American market. Tokyo Gas, Japan's largest gas utility, provides a
      reference in one of the world's most demanding regulatory environments. These B2B references are
      production deployments, not pilots — Octopus's own 7.5 million UK customers run on the same Kraken
      platform, providing the most credible possible proof-of-concept. The Bulb and Shell Energy migrations
      — each executed within months and without material service disruption — demonstrate operational delivery
      capability beyond just software. One adverse signal is the July 2025 Ofgem fine related to 34,000
      prepayment meter customers not receiving final bills, which indicates customer service gaps in specific
      regulated segments despite the high aggregate satisfaction scores.
    claimRefs:
      - CU011
      - CU012
      - CU013
      - CU014
      - CU015

  - id: SU-04
    title: Retention Durability and Churn
    body: >-
      Customer retention is one of Octopus Energy's most important — and most difficult to precisely
      quantify — metrics, because UK retail energy does not require public disclosure of churn rates.
      Available evidence points to superior retention relative to sector peers. Industry analysts and consumer
      survey data suggest Octopus experiences monthly churn of approximately 2-3%, compared to 4-5% for
      typical UK energy incumbents. This lower churn is attributable to several structural factors. First,
      smart tariffs create stickiness: customers on Agile, Intelligent Octopus Go, or Cosy who have configured
      their devices for automated dispatch have a higher switching cost because comparable tariffs are not
      easily available elsewhere. Second, Which? Recommended Provider status and Trustpilot scores signal to
      customers that switching away from Octopus carries service-quality risk. Third, the bundled nature of
      some products — particularly for heat pump and EV customers who may have Octopus-installed hardware
      and tariffs — creates deeper switching barriers. Fourth, the app and digital account management tools
      have high user-experience scores that reduce friction and inertia. There is no publicly disclosed Net
      Revenue Retention or Gross Revenue Retention figure for the consumer business; in the regulated energy
      market, revenue per customer is largely determined by Ofgem's price cap and actual consumption, making
      NRR a less meaningful metric than in SaaS businesses. Contract lengths for domestic customers are
      typically 12 months or standard variable, with no exit fees. For the Kraken B2B segment, contract
      lengths are not publicly disclosed, though the strategic depth of integrations (billing system replacement)
      implies multi-year terms. The Ofgem-mandated refund order in May 2025 and the July 2025 fine relate to
      historic billing failures, not current systematic service failures, and do not yet appear to have caused
      material customer churn based on available satisfaction data.
    claimRefs:
      - CU016
      - CU017
      - CU018
      - CU019

  - id: SU-05
    title: Expansion Concentration and Land-and-Expand Dynamics
    body: >-
      Octopus Energy's expansion economics are driven by two distinct land-and-expand logics. In the retail
      segment, the primary expansion mechanism is product cross-sell: a customer acquired on a standard
      variable tariff can be upsold to Agile, then to Intelligent Octopus Go, then to a bundled EV lease or
      heat pump installation with Cosy Octopus. Each step increases customer lifetime value, reduces churn,
      and generates richer demand-dispatch data for the Kraken platform. The Electroverse product extends the
      customer relationship into public charging. Octopus Electric Vehicles adds salary-sacrifice leasing. The
      Zero Bills product drives hardware installation revenue alongside the tariff relationship. This creates
      a multi-product funnel within the energy ecosystem that is meaningfully differentiated from commodity
      retail energy supply. For Kraken B2B, the expansion logic is geographic and vertical: clients typically
      start in one market or with one module and expand to additional markets or modules over time. National
      Grid US expansion from initial discussions to full Kraken deployment represents a large-scale geographic
      land-and-expand. Severn Trent Water's adoption of Kraken for water utility management represents a
      vertical expansion beyond energy. Customer concentration risk in the UK domestic segment is moderate:
      no single residential customer represents meaningful revenue share, and the top-10 customer risk is
      effectively zero in a commodity retail market. The more significant concentration risk is at the
      segment level — UK domestic retail generates the majority of group revenue and profit, meaning adverse
      UK regulatory or wholesale market conditions have an outsized group impact. Procurement friction is
      low for consumers (digital-first, no-exit-fee switching) but high for B2B Kraken clients (billing
      system replacement is a multi-year migration requiring board-level approval and significant
      implementation resources), which simultaneously makes winning clients difficult and losing them rare.
    claimRefs:
      - CU020
      - CU021
      - CU022
      - CU023
      - CU024

callouts:
  - calloutType: strength
    title: 23.7% UK market share — largest supplier in modern era
    body: >-
      Octopus became the UK's largest household energy supplier in January 2025 with 7.5 million accounts,
      surpassing British Gas. Combined with 8 consecutive Which? Recommended Provider years and Trustpilot
      4.8 out of 5, this represents unmatched customer franchise strength in UK retail energy.
    claimRefs:
      - CU001
      - CU011

  - calloutType: risk
    title: Ofgem fine signals compliance gaps in vulnerable customer segments
    body: >-
      The July 2025 Ofgem fine for failing to bill 34,000 prepayment customers is an adverse customer proof
      that sits awkwardly alongside Octopus's premium satisfaction scores. Prepayment customers are among
      the most financially vulnerable; regulatory scrutiny of this segment will increase.
    claimRefs:
      - CU015
      - CU016

  - calloutType: insight
    title: Non-UK customer base tripled in FY2024 — international thesis progressing
    body: >-
      The tripling of non-UK customers during FY2024 to approximately 2.5 million internationally validates
      the international expansion thesis, though international markets remain subscale relative to the UK
      and require continued investment to reach profitability.
    claimRefs:
      - CU003
      - CU009

