  evidenceGaps:
    - id: GU001
      type: data-unavailable
      severity: moderate
      topic: NRR-disclosure
      missingEvidence: >-
        Octopus Energy does not publicly disclose Net Revenue Retention, Gross Revenue Retention, or
        customer cohort analyses for either its retail or Kraken B2B business.
      whyItMatters: >-
        Without NRR or cohort data, it is impossible to assess whether revenue per customer is stable,
        growing, or declining over time — a critical input for retail and B2B valuation.
      diligencePath: >-
        Request cohort retention data and B2B NRR metrics from management data room.
      relatedQuestionRefs:
        - QU008

    - id: GU002
      type: data-unavailable
      severity: moderate
      topic: customer-cohort-data
      missingEvidence: >-
        No publicly available cohort analysis of customer satisfaction NPS trends over time, no
        cohort churn data by acquisition vintage (organic vs SoLR), and no disclosed split of smart
        tariff adoption rates within the customer base.
      whyItMatters: >-
        Inorganically acquired customers (Bulb, Shell Energy) may have different churn profiles than
        organic customers; understanding this is critical for forward retention modelling.
      diligencePath: >-
        Request customer cohort analysis from management; ask for churn rates by acquisition channel
        and tariff type.
      relatedQuestionRefs:
        - QU018

    - id: GU003
      type: data-unavailable
      severity: moderate
      topic: competitive-switching-data
      missingEvidence: >-
        Precise data on net switching flows to and from Octopus versus each competitor (British Gas,
        E.ON, OVO) are not publicly available; Ofgem switching data provides market totals but not
        per-supplier net flows.
      whyItMatters: >-
        Understanding net switching dynamics is important for assessing whether Octopus growth is
        primarily from inorganic SoLR appointments or genuine organic competitive switching gains.
      diligencePath: >-
        Request Ofgem switching data or management estimates of net switching flows per competitor.
      relatedQuestionRefs:
        - QU019

    - id: GU004
      type: data-unavailable
      severity: moderate
      topic: B2B-contract-terms
      missingEvidence: >-
        Kraken B2B licence contract lengths, renewal terms, minimum commitment periods, and any
        break-clause provisions are not publicly disclosed for any named client.
      whyItMatters: >-
        Contract term length and renewal dynamics are critical to assessing the durability of the
        $500M ARR and the risk of client churn following the Kraken spin-off as an independent entity.
      diligencePath: >-
        Request representative client contract terms from management data room; ask about renewal
        pipeline and any contracts up for renewal in the next 24 months.
      relatedQuestionRefs:
        - QU020

    - id: GU006
      type: data-unavailable
      severity: low
      topic: named customer proof table
      missingEvidence: >-
        Outcome metrics for named Kraken B2B clients (Origin Energy, EDF, E.ON Next, National Grid US,
        Tokyo Gas) — including NPS changes, churn reductions, cost savings, or billing accuracy
        improvements post-Kraken deployment — are not publicly disclosed. Listed client references are
        therefore production-deployment confirmations without quantified outcome evidence.
      whyItMatters: >-
        Without quantified deployment outcomes, named client references prove adoption but not value
        realisation, limiting the quality of Kraken B2B as customer proof.
      diligencePath: >-
        Request outcome data from Kraken management or named client reference calls; seek NPS, billing
        error rate, and cost-per-account metrics pre- and post-Kraken from at least two named clients.
      relatedTableRefs:
        - TU004
      relatedQuestionRefs:
        - QU009

    - id: GU005
      type: data-unavailable
      severity: low
      topic: CAC-disclosure
      missingEvidence: >-
        Customer acquisition cost per channel is not publicly disclosed for UK domestic retail or
        international markets; no competitor CAC benchmarks are available.
      whyItMatters: >-
        CAC efficiency determines the economics of organic growth and whether current growth rates
        are sustainable at current marketing spend levels.
      diligencePath: >-
        Request CAC by channel from management; compare against industry benchmarks from Ofgem data.
      relatedQuestionRefs:
        - QU022

    - id: GU007
      type: enumeration-incomplete
      severity: moderate
      topic: TU004-named-customer-proof
      missingEvidence: >-
        Table TU004 (named customer proof table) lists only five confirmed Kraken B2B clients
        with publicly verifiable production deployment evidence. Octopus Energy and Kraken have
        named additional clients (Plenitude, Severn Trent Water, Portsmouth Water, Good Energy,
        Shell Energy Germany) in various press releases but without the depth of evidence available
        for the five clients in TU004. Quantitative outcome data (cost savings, NPS improvement,
        churn reduction) are not publicly disclosed for any named B2B client.
      whyItMatters: >-
        Without quantitative outcome data from B2B clients, it is impossible to independently
        verify Kraken's claimed 40% efficiency gains or 3x NPS improvement. Client reference
        conversations (data room access) are required before these claims can be treated as verified.
      diligencePath: >-
        Request reference calls with at least three named Kraken clients (ideally Origin Energy,
        E.ON Next, and National Grid US). Ask for before/after cost-to-serve, churn, and NPS data.
      relatedQuestionRefs:
        - QU009
        - QU020
      relatedTableRefs:
        - TU004
