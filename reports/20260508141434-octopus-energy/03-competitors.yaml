  evidenceGaps:
    - id: EGP001
      title: Kraken Platform Renewal Rates and Licensee Churn Data
      description: >-
        Kraken Technologies does not publicly disclose individual licensee renewal rates, weighted average contract
        durations, or churn events. The September 2025 spinoff announcement cites $500M contracted ARR and 70M accounts
        but provides no retention metrics. Assessment of Kraken's switching-cost moat durability depends on verified
        contract retention data unavailable from public sources. Diligence requires Kraken management access or investor
        data room review.
      relatedQuestionRefs:
        - QP007
        - QP028
      severity: material
    - id: EGP002
      title: Kaluza External Licensing Revenue, Pricing, and Account Numbers
      description: >-
        OVO Energy has not publicly disclosed Kaluza's SaaS revenue, per-account pricing, or the identities of external
        licensees beyond references to approximately two UK utilities. Without this data, comparative benchmarking of
        Kaluza vs Kraken on revenue quality, growth rate, and margin is not possible. Diligence should include review of
        OVO Energy's UK statutory filings at Companies House for any Kaluza segment disclosures.
      relatedQuestionRefs:
        - QP019
      severity: material
    - id: EGP003
      title: Net Customer Flow Direction Between Named UK Suppliers
      description: >-
        Ofgem's published switching data shows aggregate switching volumes by quarter but does not provide bilateral
        supplier-pair flow matrices. It is not possible from public data to confirm whether E.ON Next post-TOU launch or
        British Gas post-Hive investment are winning net customers specifically from Octopus. Obtaining MHHS switching
        data or Ofgem supplier-level matrices via a regulatory data request would be needed.
      relatedQuestionRefs:
        - QP017
      severity: minor
