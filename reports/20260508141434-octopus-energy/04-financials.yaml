company:
  name: Octopus Energy Group
chapter:
  number: 4
  title: Financials
  summary: 'Octopus Energy Group reported FY24 group revenue of £12.4 billion, EBITDA of £95 million (0.76%
    margin), and net profit of £83 million — its first material profitable year. Revenue quality is mixed:
    UK retail energy supply (estimated ~90% of revenue) is commodity-driven and margin-thin, while Kraken
    Technologies SaaS licensing (£90M revenue, +68% YoY, £35M profit) is high-margin and recurring with
    $500M contracted ARR ahead of a September 2025 partial spinoff. OEG''s 4.9 GW renewable generation
    portfolio (£7B AUM) provides vertical integration benefit. Capital adequacy cannot be fully assessed
    without data room access: cash position, monthly burn, segment gross margins, and international P&L
    are not publicly disclosed. The group''s $9B valuation (May 2024) and >$2B total equity raised signal
    continued investor confidence.'
sections:
- id: S-FIN-1
  title: Revenue Model and Revenue Mix
  body: 'Octopus Energy Group operates across four principal revenue segments: UK retail energy supply,

    international retail energy, Kraken SaaS licensing, and OEG renewable generation. UK retail

    energy supply — supplying electricity and gas to approximately 7.8 million domestic and SME

    customers at tariffs benchmarked against the Ofgem price cap — accounts for the dominant share

    of group revenue, estimated at over 90 percent of the FY24 total of £12.4 billion. Revenue

    recognition follows a consumption model: customers are billed per kilowatt-hour of electricity

    or cubic metre of gas consumed, plus a daily standing charge, with prices adjusted quarterly

    in line with Ofgem''s price cap review cycle. This creates a revenue stream that is largely

    volume-driven and commodity-influenced, with margins thin relative to turnover but partially

    protected by Ofgem''s allowed return methodology.


    Kraken Technologies — Octopus''s proprietary utility operating system — generates SaaS licensing

    revenue by charging third-party utilities (E.ON Next, Origin Energy, Tokyo Gas, and others)

    per account per month for access to its billing, customer management, and flexibility stack.

    Kraken FY24 SaaS revenue reached £90 million, up 68 percent year-on-year, with 70 million

    accounts licensed. Kraken profit grew to £35 million, a 483 percent increase. These figures

    are disclosed in Octopus Energy Group''s FY24 results press release and represent the

    highest-quality, highest-margin revenue segment. A September 2025 partial spinoff is expected

    to monetise Kraken separately, with contracted ARR at $500 million. Octopus Energy Generation

    (OEG) contributes revenue through sale of power generated from its approximately 4.9 GW

    renewable portfolio (£7 billion AUM) across nine markets, providing a further vertical

    integration benefit through preferential PPA pricing for the retail business.

    '
