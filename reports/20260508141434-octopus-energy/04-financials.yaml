- id: S-FIN-4
  title: Financial Verdict and Diligence Agenda
  body: 'Octopus Energy Group''s financial profile is best read as two distinct businesses: a large,

    thin-margin retail and commodity operation (£12.4 billion revenue, ~0.76 percent EBITDA margin)

    and a high-growth, high-margin SaaS platform (Kraken: £90 million SaaS revenue, £35 million

    profit, 68 percent growth). Revenue quality is mixed — retail revenue is high in volume but

    exposed to commodity price movements, regulatory price caps, and working capital volatility,

    while Kraken SaaS revenue is recurring, contracted, and high-margin. The partial spinoff of

    Kraken blurs ongoing financial comparability and introduces a valuation inflection risk.


    The principal financial diligence blockers are: (1) no public disclosure of cash, undrawn

    credit facilities, or monthly burn; (2) no independently audited view of segment-level gross

    margins; (3) international retail loss positions not quantified; (4) Kraken spinoff valuation

    and ownership economics not yet disclosed. Given FY24 group-level profitability and the

    evident track record of funding access at increasing valuations, the capital risk appears

    manageable but cannot be confirmed without data room access. For a potential investment or

    partnership, the core question is whether Kraken''s SaaS margin profile can structurally offset

    retail margin compression as the UK energy market normalises post-crisis.

    '
