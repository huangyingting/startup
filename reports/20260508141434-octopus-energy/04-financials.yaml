  rows:
  - - Standard Variable Tariff (SVT)
    - 'Ofgem price cap: £1,641/yr typical household Q2 2026'
    - Realised pricing at or below cap depending on direct debit discount
    - Direct debit discount ~£5-10/yr; green premium unknown
    - Ofgem price cap review; Octopus tariff page
  - - Agile Octopus (TOU)
    - Half-hourly wholesale-linked rate; varies 0p-100p/kWh
    - Realised pricing below SVT in off-peak hours for smart users
    - Customer benefit depends on usage flexibility; no cap floor discount
    - Octopus website; smart tariff documentation
  - - Intelligent Octopus Go (EV)
    - Flat overnight EV charging rate; approx. 7.5p-9p/kWh overnight
    - Effective discount vs SVT of ~60-70% for overnight energy
    - Requires compatible EV or heat pump; grid availability dependent
    - Octopus website; Ofgem market data
  - - Kraken External Licence (B2B)
    - Per-account per-month SaaS licence; pricing not publicly disclosed
