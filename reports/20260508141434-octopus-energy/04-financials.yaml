- id: S-FIN-2
  title: Unit Economics and Cost Structure
  body: 'Energy retail is a low-margin business by design: Ofgem''s price cap methodology allows

    suppliers a capped unit margin above commodity and network cost pass-throughs. UK energy

    retail gross margins are broadly estimated by industry analysts at three to five percent of

    revenue, implying a gross profit of roughly £370 million to £620 million at FY24 revenue

    levels; Octopus''s implied gross profit of approximately £1 billion (at around eight percent

    gross margin) suggests operational efficiencies from vertical integration and the avoided-cost

    benefit of owning Kraken rather than procuring billing infrastructure from Oracle or SAP.

    Octopus''s EBITDA of £95 million on £12.4 billion of revenue equates to a 0.76 percent

    EBITDA margin, consistent with the capital-light retail model but heavily diluted by commodity

    pass-through.


    Customer acquisition cost (CAC) is not disclosed. Octopus claims above-average referral-driven

    growth — reducing paid CAC versus incumbents — but no independently verified figure is

    available. The unit economics bridge must rely on proxies: industry CAC for UK energy retail

    is estimated at £50 to £150 per customer via digital channels, with payback measured in months

    given low churn and high engagement with smart tariff products (Agile Octopus, Intelligent

    Octopus Go). Working capital demand is seasonal, peaking in winter when energy consumption

    and billing volumes are highest, creating a credit facility requirement on top of equity.

    Octopus, in common with all UK energy retailers, uses commodity procurement credit lines to

    manage the cash timing gap between purchasing energy on wholesale markets and recovering costs

    through customer billing, exposing the balance sheet to mark-to-market movements on

    forward positions.

    '
  claimRefs:
  - CI020
  - CI023
  - CI024
  - CI025
