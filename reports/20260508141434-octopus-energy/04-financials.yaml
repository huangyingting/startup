  researchQuestions:
  - id: QI001
    type: enumeration
    status: answered
    question: What revenue streams does Octopus Energy Group operate?
    answer: 'Four main streams: UK retail energy supply (~£11B est.), Kraken SaaS licensing (£90M), OEG
      renewable generation (part of £7B AUM portfolio), and international retail energy (27+ countries).
      Flexibility and B2B supply are sub-components of retail.'
    targets:
    - contentRequirements/0
    - plannedTables/revenue-streams-table
    - plannedFigures/revenue-model-bridge
  - id: QI002
    type: quantification
    status: answered
    question: What was Octopus Energy Group's FY24 group revenue?
    answer: £12.4 billion, as disclosed in the OEG FY24 results press release.
    targets:
    - contentRequirements/3
  - id: QI003
    type: quantification
    status: answered
    question: What was Octopus Energy Group's FY24 EBITDA?
    answer: £95 million (0.76% EBITDA margin on £12.4B revenue), as disclosed in the FY24 press release.
    targets:
    - contentRequirements/3
  - id: QI004
    type: quantification
    status: answered
    question: What was Octopus Energy Group's FY24 net profit?
    answer: £83 million, as disclosed in the FY24 press release, representing the first material profitable
      year at group level.
    targets:
    - contentRequirements/3
  - id: QI005
    type: quantification
    status: partial
    question: What is Octopus Energy Group's gross profit margin across business segments?
    answer: Not disclosed at segment level. Group implied gross profit is estimated at ~£1B (~8% blended
      gross margin). UK retail gross margin estimated at 3-8% from industry benchmarks. Kraken SaaS gross
      margin estimated >60% based on SaaS norms.
    targets:
    - contentRequirements/2
  - id: QI006
    type: quantification
    status: answered
    question: What is Octopus Energy's customer acquisition cost (CAC) per retail customer?
    answer: Not publicly disclosed by Octopus. Industry benchmark for UK energy retail via digital/referral
      channels is estimated at £50-150 per customer. Octopus claims below-market CAC through referral-driven
      growth.
    targets:
    - contentRequirements/1
  - id: QI007
    type: mechanism
    status: answered
    question: How does Octopus Energy convert customer energy usage into gross profit?
    answer: Customers are billed per-unit of energy consumed (£/kWh, £/m³) plus a daily standing charge.
      Pricing is capped by Ofgem's price cap methodology. Gross profit is the spread between billing revenue
      and wholesale energy cost plus network charges, after operating costs.
    targets:
    - contentRequirements/0
    - plannedFigures/revenue-model-bridge
  - id: QI008
    type: verification
    status: answered
    question: Does Octopus Energy generate recurring versus spot/transactional revenue?
    answer: Yes. UK retail generates quasi-recurring revenue from ongoing customer contracts with monthly
      direct debit billing. Kraken SaaS is fully recurring (contracted ARR). OEG generation is a mix of
      long-dated PPA contracts and spot market exposure.
    targets:
    - contentRequirements/0
  - id: QI009
    type: quantification
    status: answered
    question: What is Kraken Technologies' contracted ARR as of the planned spinoff?
    answer: $500 million contracted ARR, as stated in the March 2025 Kraken spinoff announcement; 70 million
      accounts licensed across E.ON Next, Tokyo Gas, Origin Energy, and other utilities.
    targets:
    - contentRequirements/0
    - contentRequirements/3
  - id: QI010
    type: quantification
    status: partial
    question: What is Octopus Energy Group's current cash on hand?
    answer: Not publicly disclosed. No Companies House filing or press release provides cash on hand figures.
      FY24 profitability and recent fundraising suggest positive cash position but quantum is unknown.
    targets:
    - contentRequirements/4
  - id: QI011
    type: quantification
    status: partial
    question: What is Octopus Energy Group's monthly operating cash burn?
    answer: Not publicly disclosed. Group-level profitability at FY24 suggests positive operating cash
      generation, but international expansion and renewable asset investment may create net investment
      cash outflows. Exact figure unavailable.
    targets:
    - contentRequirements/4
  - id: QI012
    type: enumeration
    status: answered
    question: What is the chronology of Octopus Energy Group's equity funding rounds?
    answer: 'Covered in detail in Chapter 1 (Company Overview). Key rounds: 2018 Series A (~£20M), 2019-2020
      Centrica investment, 2021 General Atlantic ($350M), 2022-23 Generation IM + CPPIB ($800M+), Dec
      2023 ($500M, $8B val), May 2024 ($370M, $9B val). Total >$2B raised.'
    targets:
    - contentRequirements/4
  - id: QI013
    type: verification
    status: answered
    question: Has Octopus Energy raised debt or project finance in addition to equity?
    answer: Yes. OEG renewable generation assets are financed through project finance (non-recourse or
      limited-recourse debt). Retail operations use commodity credit facilities for wholesale procurement.
      The exact quantum of group debt is not publicly disclosed.
    targets:
    - contentRequirements/4
  - id: QI014
    type: quantification
    status: answered
    question: What is OEG's assets under management and renewable generation capacity?
    answer: £7 billion AUM and approximately 4.9 GW of installed and in-development renewable generation
      capacity across nine markets, as per OEG website disclosures.
    targets:
    - contentRequirements/2
  - id: QI015
    type: mechanism
    status: answered
    question: How does Octopus monetise the Kraken platform externally?
    answer: Third-party utilities pay a per-account per-month SaaS licence fee to use Kraken's billing,
      customer management, and flexibility stack. Revenue is recognised on an ARR basis. Major licensees
      include E.ON Next, Tokyo Gas, and Origin Energy.
    targets:
    - contentRequirements/0
    - plannedFigures/unit-economics-bridge
  - id: QI016
    type: quantification
    status: partial
    question: What is the expected valuation of the Kraken Technologies spinoff?
    answer: Not disclosed. At $500M contracted ARR and applying typical SaaS multiples of 4-10x ARR, implied
      valuation is $2-5 billion. No formal valuation has been announced.
    targets:
    - contentRequirements/3
  - id: QI017
    type: adverse
    status: answered
    question: Has Octopus Energy faced adverse regulatory or financial findings that could affect its
      financial position or reputation?
    answer: Yes. Ofgem fined Octopus £1.5M in July 2025 for overcharging customer direct debits, with
      required customer refunds of £2.64M plus £546K consumer redress. This is immaterial to group financials
      (£12.4B revenue) but reflects operational control risk.
    targets:
    - contentRequirements/5
  - id: QI018
    type: comparison
    status: answered
    question: How does Octopus Energy's cost structure compare to British Gas (Centrica)?
    answer: Octopus benefits from owning Kraken (avoiding third-party billing costs), lower physical estate,
      and digital-first customer management. Centrica has diversified revenue from upstream gas production
      and North Sea assets. Octopus's EBITDA margin (0.76%) is thin, consistent with energy retail norms;
      Centrica's retail margin is comparable.
    targets:
    - contentRequirements/2
  - id: QI019
    type: mechanism
    status: answered
    question: What portion of Octopus Energy's retail revenue is at risk from Ofgem price cap reductions?
    answer: Substantially all UK retail revenue is benchmarked against the price cap. A cap reduction
      reduces unit revenue per customer without reducing wholesale procurement costs proportionately,
      compressing gross margin. The Q2 2026 cap reduction of 6.6% illustrates this risk.
    targets:
    - contentRequirements/0
    - contentRequirements/5
  - id: QI020
    type: comparison
    status: answered
    question: How did Octopus Energy Group's FY24 revenue compare to FY23?
    answer: FY24 revenue was £12.4 billion; FY23 revenue was not separately disclosed but is estimated
      at approximately £11 billion based on analyst commentary and growth trajectory. Estimated growth
      is approximately 12% year-on-year.
    targets:
    - contentRequirements/3
  - id: QI021
    type: quantification
    status: partial
    question: What is Octopus Energy's international revenue breakdown by market?
    answer: Not disclosed. International operations span 27+ countries but segment-level revenue by country
      is not published. UK is estimated at >90% of group revenue. International markets are at varying
      maturity stages.
    targets:
    - contentRequirements/3
  - id: QI022
    type: mechanism
    status: answered
    question: How does Octopus Energy use debt for energy commodity procurement?
    answer: UK energy retailers use revolving credit facilities to fund wholesale gas and electricity
      purchases made ahead of customer billing. These create a working capital timing gap and mark-to-market
      balance sheet exposure during periods of commodity price volatility.
    targets:
    - contentRequirements/2
    - contentRequirements/4
  - id: QI023
    type: quantification
    status: answered
    question: What are Octopus Energy's R&D and technology capital expenditure levels?
    answer: Not separately disclosed. Kraken is developed internally by approximately 3,000+ engineers.
      Development cost is embedded in Kraken's operating cost base (COGS + R&D). The £35M FY24 Kraken
      profit implies significant investment is already absorbed in generating that profit figure.
    targets:
    - contentRequirements/2
  - id: QI024
    type: mechanism
    status: answered
    question: What working capital requirements does Octopus face in energy retail?
    answer: 'UK retail energy creates seasonal working capital peaks in winter: higher energy consumption,
      higher billing amounts, and forward procurement positions all increase credit facility drawdowns.
      Direct debit billing smooths cash receipt but creates a lag versus wholesale procurement.'
    targets:
    - contentRequirements/2
    - contentRequirements/4
  - id: QI025
    type: verification
    status: answered
    question: Does Octopus Energy generate positive free cash flow at group level?
    answer: Based on FY24 net profit of £83 million and positive EBITDA, group-level operating cash generation
      is positive. However, investment cash outflows from OEG renewable asset acquisition and international
      expansion may result in negative free cash flow at group level. Exact FCF is not disclosed.
    targets:
    - contentRequirements/5
  - id: QI026
    type: enumeration
    status: answered
    question: What are the critical financial diligence blockers for an investor assessing Octopus Energy?
    answer: 'Four blockers: (1) no disclosed cash/liquidity position; (2) no segment gross margin data;
      (3) no international P&L by market; (4) no independently verified Kraken spinoff valuation. Data
      room access is required to address all four.'
    targets:
    - contentRequirements/5
    - plannedTables/public-financial-gaps-table
  - id: QI027
    type: mechanism
    status: answered
    question: How will the Kraken Technologies spinoff affect Octopus Energy Group's consolidated financial
      statements?
    answer: Post-spinoff, Kraken revenue (£90M SaaS, growing) will no longer consolidate into OEG accounts.
      OEG will retain a stake in Kraken (percentage TBD) and may receive royalty or licensing income.
      The remaining OEG entity will have a lower revenue base but will be assessed as a retail + generation
      business.
    targets:
    - contentRequirements/4
    - contentRequirements/5
  - id: QI028
    type: freshness
    status: answered
    question: How current are the financial data available for Octopus Energy Group?
    answer: FY24 results (financial year ending October 2024) were disclosed via press release in late
      2024. These are the most recent available. FY25 results are not yet disclosed. Companies House filings
      lag by 12-18 months. No quarterly financial reporting exists.
    targets:
    - contentRequirements/3
  - id: QI029
    type: comparison
    status: answered
    question: How does Octopus Energy's pricing approach for tariffs compare to the Ofgem price cap?
    answer: Octopus offers tariffs at or below the price cap for its standard variable customers, with
      competitive pricing enabled by Kraken automation efficiency and vertical integration. Smart tariffs
      (Agile, Intelligent Octopus Go) can offer substantially lower effective rates for flexible users.
    targets:
    - contentRequirements/0
    - plannedTables/pricing-monetization-table
