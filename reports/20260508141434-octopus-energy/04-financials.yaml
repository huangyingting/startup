- id: S-FIN-3
  title: Capital Adequacy and Financial Position
  body: 'Octopus Energy Group has raised over two billion dollars of equity across multiple funding

    rounds (detailed in Chapter 1 via claimRefs to company-overview). The most recent disclosed

    valuation was $9 billion in May 2024 following a $370 million raise. Net assets at FY24

    stood at £1.7 billion. Cash on hand, monthly operating burn, and undrawn debt facilities

    are not disclosed in any public filing; the Companies House annual return for Octopus Energy

    Group Ltd (company number 09263047) lags by 12-18 months and does not provide detailed

    liquidity analysis. Centrica''s published annual report provides a comparison point for

    incumbent cost and capital structure: Centrica (British Gas parent) reports net cash

    positive positions underpinned by its upstream and trading operations, a structural advantage

    Octopus partially offsets through Kraken IP ownership.


    Capital intensity in the renewable generation segment is high: acquiring and developing

    approximately 4.9 GW of wind and solar assets at a portfolio AUM of £7 billion implies

    significant project finance utilisation. OEG generation assets are typically financed via

    non-recourse project debt, isolating the bulk of debt from Octopus Energy Group''s retail

    balance sheet. The Kraken spinoff, expected in September 2025 at a contracted ARR of

    $500 million, is expected to generate a partial realisation event for OEG shareholders,

    providing liquidity without a full trade sale. Ofgem fined Octopus £1.5 million in July 2025

    for overcharging customer direct debits, a financial and reputational risk, though immaterial

    relative to group revenue scale. Runway analysis is not possible without disclosed cash

    position, but FY24 profitability (£83 million net profit) indicates Octopus is past breakeven

    at group level.

    '
