  - id: section-4
    title: Growth metrics and market position
    body: >-
      Octopus Energy's growth trajectory is among the most rapid in UK energy history. From a standing start
      in 2016 it reached 7.8 million UK household customers by October 2025 and overtook British Gas to become
      the UK's largest domestic energy supplier in January 2025, capturing roughly one in four homes.
      Globally it passed 10 million retail customers in October 2025 across its eight direct retail markets,
      having tripled its non-UK customer base in FY24 alone. FY24 revenue reached £12.4 billion (primarily UK
      retail commodity), gross profit was £1 billion, EBITDA £95 million, and net profit £83 million (0.7%
      margin). Kraken's FY24 recurring SaaS revenue was £90 million, up 68% year on year, with profit of
      £35 million, a 483% increase, demonstrating improving technology segment economics. Headcount grew from
      4,800 to 8,500 during FY24 and has since exceeded 11,000. The Germany operation exceeds 1 million
      customers, France approximately 600,000, Italy 500,000, Japan 500,000, and Spain 400,000, reflecting
      meaningful international diversification. Trustpilot ratings of 4.8 out of 5 across most markets and
      eight consecutive Which? Recommended Provider awards indicate sustained customer satisfaction performance
      that incumbents have not matched. TIME Magazine named Octopus Energy among the 100 Most Influential
      Companies, reinforcing brand credibility beyond the UK.
