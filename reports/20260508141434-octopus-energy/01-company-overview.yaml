  evidenceGaps:
    - type: private-evidence-only
      severity: material
      topic: Board composition and detailed governance structure
      missingEvidence: >-
        Octopus Energy Group does not publish a full board composition, independent director count,
        audit or remuneration committee constitution, or related-party transaction disclosures in
        publicly available sources. The company files abbreviated accounts in the UK and no full
        annual report is available publicly.
      whyItMatters: >-
        Governance structure is a core diligence variable, particularly given founder concentration
        and the dual-class interests created by the Kraken spinoff. Without board disclosure, it is
        not possible to assess independence, oversight quality, or conflict management.
      diligencePath: >-
        Request full board composition, governance charter, audit committee terms of reference,
        and any shareholder agreement from management.
      relatedQuestionRefs:
        - QO022
      relatedTableRefs: []
    - type: enumeration-incomplete
      severity: minor
      topic: Leadership and founder table remains a partial public enumeration
      missingEvidence: >-
        Public sources identify only the three co-founders and the post-spinoff Kraken CEO. A full
        executive team list, board member names, and committee compositions are not publicly disclosed.
      whyItMatters: >-
        The table is analytically useful for key-person risk but completeness cannot be demonstrated
        from public records alone.
      diligencePath: >-
        Request an internally maintained executive team list and full board roster from management.
      relatedTableRefs:
        - TO002
      relatedQuestionRefs: []
    - type: enumeration-incomplete
      severity: minor
      topic: Stakeholder or investor map is a partial public enumeration
      missingEvidence: >-
        The full cap table including exact share classes, preference terms, anti-dilution provisions,
        board seat rights, management option pool size, and any debt-to-equity instruments has not
        been publicly disclosed. Percentage stakes for GIM, CPP, and Tokyo Gas are sourced from press
        releases which may not reflect precise legal ownership.
      whyItMatters: >-
        Accurate economic and control rights are essential for valuation and governance underwriting.
      diligencePath: >-
        Request a full cap table, shareholders agreement, and any side letters from the CFO.
      relatedTableRefs:
        - TO003
      relatedQuestionRefs: []
    - type: enumeration-incomplete
      severity: minor
      topic: Milestone table covers a sample of key events from the public record
      missingEvidence: >-
        The milestone table is derived from press releases and news reporting and does not include
        all product launches, partnership agreements, or regulatory correspondence. Internal governance
        events such as board changes, option grants, or material contract signings are not publicly disclosed.
      whyItMatters: >-
        A complete chronology reduces the risk of missing events that would affect the diligence
        narrative or risk assessment.
      diligencePath: >-
        Cross-reference with Companies House filings and a data-room timeline document from management.
