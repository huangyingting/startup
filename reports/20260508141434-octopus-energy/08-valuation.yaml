  - id: SV-S6
    title: Final diligence asks and thesis-break triggers
    body: >-
      Four categories of final diligence asks are critical before confirming or expanding any position in Octopus Energy
      Group. First, Kraken ARR audited figures: current management claims of $500M+ ARR cannot be independently verified
      from public sources. Audited Kraken revenue by contract type (licensing vs managed-service vs performance-based),
      customer, and geography is essential to validate the software multiple assumption underpinning the $9B valuation.
      Second, the Kraken spinoff structure and timeline: the exact equity distribution, preference waterfall, licensing
      fee structure for the continuing Octopus retail relationship, and governance arrangements of the post-spinoff
      Kraken entity must be disclosed to assess value transfer to current Octopus Group investors. Third, the Ofgem
      enforcement trajectory: the July 2025 billing automation fine and the ongoing prepayment meter investigation must
      be resolved before the regulatory risk profile is assessable. Any further enforcement action implicating Kraken
      billing — particularly if it results in licence conditions or material remediation cost — would be a thesis-break
      trigger. Fourth, the commodity procurement credit facility: size, tenor, and collateral terms of any commodity
      procurement financing should be disclosed to assess downside risk in a wholesale energy price spike. Thesis-break
      triggers are: (1) a second material Ofgem enforcement action implicating Kraken billing automation within 18
      months of the July 2025 fine; (2) loss of one or more major Kraken licensing clients (E.ON Next, Tokyo Gas,
      National Grid US) representing more than 15% of Kraken ARR; (3) a Kraken spinoff structure that does not give
      existing Octopus Group investors proportional equity in the Kraken entity; and (4) a forced down-round or
      distressed secondary transaction below $7B implied valuation, signalling institutional loss of confidence in the
      software thesis.
