  - id: SV-S5
    title: Financing context and capital structure
    body: >-
      Octopus Energy Group has raised approximately £1B+ across its primary funding rounds since 2019. Known investors
      include Generation Investment Management (£630M, 2021), CPP Investments (amount undisclosed, implied $9B group
      valuation, Q1 2024), Tokyo Gas (strategic partner and investor, amount undisclosed), and Origin Energy Australia
      (JV formation, implied $500M+ for Australian operations). The preference stack — liquidation seniority,
      anti-dilution rights, and participation mechanics — is not publicly disclosed for any round, which is a material
      gap: in a bear-case liquidation or forced exit, common equity (including management and employee equity) could be
      substantially diluted below headline valuation. Debt financing at the group level is not publicly confirmed. The
      retail energy business requires commodity procurement credit facilities — typically provided by banks against
      hedged positions — but neither the size, term, nor counterparty of these facilities is disclosed. Commodity credit
      exposure could be material in a wholesale price spike scenario given Octopus's thin margin environment. The Kraken
      Technologies spinoff introduces additional complexity: if Kraken is spun off as a separate entity, Octopus Group
      shareholders may or may not receive proportional Kraken equity depending on the spinoff structure (full
      distribution, partial IPO, or funded carve-out). Management has indicated a Kraken CEO appointment (Amir Orad, Q4
      2025) but has not disclosed the equity structure, preference waterfall, or licensing fees governing the ongoing
      Kraken-Octopus commercial relationship post-spinoff. UK Companies House filing for Octopus Energy Group Ltd
      (registered number 09263047) confirms filing history and registered accounts, but group-level consolidated
      accounts with full segment disclosure are not available from public sources, limiting quantitative assessment of
      capital adequacy and cash position.
