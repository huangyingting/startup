  researchQuestions:
    - id: QV001
      type: enumeration
      status: answered
      question: >-
        What public and private comparable companies are most directly relevant for valuing Octopus Energy Group across
        its retail energy and software licensing segments?
      answer: >-
        Six key comparables identified: Centrica PLC (pure UK utility, ~0.15x EV/Revenue), SSE PLC (infrastructure
        premium, ~1.5x), EDF Group (~0.5x integrated European utility), Orsted (offshore wind transition, ~2.5x
        compressed from 5x), OVO/Kaluza (private energy software, ~£500M implied for tech layer), and
        Salesforce/ServiceNow (SaaS ceiling reference at 8–12x). See TV004 for full comparable analysis.
      targets:
        - contentRequirements/4
        - plannedTables/comparable-valuation-table
    - id: QV002
      type: enumeration
      status: answered
      question: >-
        What are all known primary funding rounds, investors, and implied valuations for Octopus Energy Group from
        inception through 2024?
      answer: >-
        Known rounds: 2021 Generation Investment Management £630M (implied ~£2.2B valuation); Q1 2024 CPP Investments
        commitment (implied $9B valuation); Tokyo Gas (strategic investor, amount undisclosed). Total raised estimated
        at £1B+. Australia JV with Origin Energy implies $500M+ for Octopus Australia operations. Preference mechanics
        and earlier-round terms are not publicly disclosed.
      targets:
        - contentRequirements/2
    - id: QV003
      type: enumeration
      status: answered
      question: >-
        What exit routes are available to current Octopus Energy Group investors, and what are the realistic timelines
        for each?
      answer: >-
        Four routes: (1) Kraken Technologies IPO or partial sale — most likely primary catalyst, 2027–2030 window; (2)
        full Octopus Group IPO — no date announced; (3) strategic M&A of the group or divisions — possible but no
        declared processes; (4) secondary market transaction — limited given private company status. CPP Investments'
        7–10 year horizon implies 2031–2034 exit window. New Zealand exit shows geographic disposals also possible.
      targets:
        - contentRequirements/5
    - id: QV004
      type: quantification
      status: answered
      question: >-
        What is the most recently confirmed enterprise valuation of Octopus Energy Group, and what transaction implied
        it?
      answer: >-
        $9 billion (approximately £7.1B at 2024 exchange rates), implied by the CPP Investments commitment confirmed in
        March 2024. This is the most recent primary-round price signal publicly available. No 2025 or 2026 primary round
        or secondary transaction at a different price has been publicly confirmed.
      targets:
        - contentRequirements/2
        - plannedFigures/valuation-return-range
    - id: QV005
      type: quantification
      status: answered
      question: >-
        What is Kraken Technologies' annual recurring revenue (ARR) as of 2024, and how reliable is that figure for
        valuation purposes?
      answer: >-
        Management claims $500M+ ARR as of 2024 via corporate communications and public statements. This is an unaudited
        management assertion and cannot be independently verified from public sources. No big-4 audit, third-party
        verification, or regulatory filing confirms this number. The 70M-account global footprint corroborates scale but
        per-account pricing and contract mix are unknown.
      targets:
        - contentRequirements/0
        - plannedFigures/investment-kpis
    - id: QV006
      type: quantification
      status: answered
      question: >-
        What EV/Revenue multiples do comparable UK and European energy suppliers trade at in FY2023–2024, and how do
        these benchmark against Octopus's implied multiple?
      answer: >-
        UK retail suppliers: Centrica ~0.15x, EDF UK component ~0.5x on group. Infrastructure mix: SSE ~1.5x (network
        assets dominate). Offshore wind: Orsted ~2.5x (2024, compressed from 5x). UK retail average: 0.2–0.3x per S&P
        Global and Morningstar. Octopus implied multiple at $9B = ~1.3x on £6.9B revenue — substantially above all
        pure-retail comparables, requiring Kraken software premium to be justified.
      targets:
        - contentRequirements/4
        - plannedTables/comparable-valuation-table
    - id: QV007
      type: quantification
      status: answered
      question: >-
        What is the implied Kraken standalone valuation at different ARR multiples, and what group equity value does
        each scenario produce?
      answer: >-
        At $500M ARR: 6x = $3B Kraken entity; 10x = $5B; 12x = $6B. Adding retail at 0.25x £6.9B (~$2.2B): bull total
        $7.2–8.2B; base $5.2B. At $300M ARR (downside): 6x = $1.8B; total group ~$4B. Pure utility (0x Kraken):
        $1.3–2.2B bear case. See FV002 for the full sensitivity chart.
      targets:
        - contentRequirements/3
        - plannedFigures/valuation-sensitivity
    - id: QV008
      type: quantification
      status: answered
      question: >-
        What are the bull, base, and bear case implied valuations for Octopus Energy Group, and what assumptions drive
        each scenario?
      answer: >-
        Bull: $6.5–9B (Kraken 8–12x on $600M+ ARR + retail 0.3x revenue); assumes clean spinoff and no further Ofgem
        enforcement. Base: $4–5.5B (Kraken 5–7x on $500M ARR + retail 0.25x revenue); 35–55% discount to $9B entry.
        Bear: $1.3–2.2B (pure utility 0.15–0.25x applied; Kraken spinoff fails); 75–85% collapse from entry. See TV003
        and FV003.
      targets:
        - contentRequirements/3
        - plannedTables/bull-base-bear-scenario-table
    - id: QV009
      type: verification
      status: answered
      question: >-
        Has the $9 billion CPP Investments valuation been independently confirmed by multiple credible sources, and are
        there conflicting valuation signals?
      answer: >-
        Yes — PitchBook, Bloomberg, and the CPP Investments press release all confirm the $9B implied valuation from the
        Q1 2024 round. No conflicting primary-round valuation signal exists; no subsequent down-round or repricing has
        been publicly reported. The valuation is corroborated across independent analysts and the investor's own public
        communications.
      targets:
        - contentRequirements/2
    - id: QV010
      type: verification
      status: answered
      question: >-
        Do UK Companies House records confirm Octopus Energy Group's corporate structure and filing history, and what
        financial disclosures are available publicly?
      answer: >-
        Yes — Companies House confirms Octopus Energy Group Ltd (09263047) exists, with filing history through accounts
        for year ended 31 March 2024. However, consolidated group accounts with segment-level detail (UK retail, Kraken,
        generation, international) are not available from public filing alone; the publicly filed accounts provide
        limited transparency compared to a listed company's reporting obligations.
      targets:
        - contentRequirements/2
    - id: QV011
      type: verification
      status: answered
      question: >-
        Has Kraken Technologies been confirmed as a separate management entity in preparation for the planned spinoff,
        and what evidence supports this?
      answer: >-
        The appointment of Amir Orad as standalone Kraken Technologies CEO in Q4 2025 (confirmed by The Guardian and
        Financial Times) indicates Kraken is being operated as a distinct management unit with its own leadership. A UK
        legal entity for Kraken Technologies Ltd is expected; the exact spinoff corporate structure remains unconfirmed
        as of May 2026.
      targets:
        - contentRequirements/2
    - id: QV012
      type: verification
      status: answered
      question: >-
        Are comparable company EV/Revenue multiples for Centrica, SSE, and EDF confirmed through their respective filed
        accounts and independent analyst data?
      answer: >-
        Yes — Centrica confirmed via 2024 Annual Results; SSE confirmed via 2024 Annual Report; EDF via investor
        relations page. S&P Global Market Intelligence and Morningstar provide independent verification of computed
        EV/Revenue multiples using market capitalisation and net-debt data. Data is reliable for the FY2023–2024 period.
      targets:
        - contentRequirements/4
    - id: QV013
      type: verification
      status: answered
      question: >-
        Has Orsted's valuation compression from approximately £18B (2021) to £8B (2024) been verified through
        independent sources, making it a credible warning comparable?
      answer: >-
        Yes — Orsted's 2023 Annual Report confirms the revenue base; Reuters and Aurora Energy Research confirm the
        share price decline and EV compression timeline. The precedent is well-documented and directly relevant as a
        cautionary case for energy-transition premium valuation contraction affecting Octopus's own tech-premium
        multiple.
      targets:
        - contentRequirements/4
    - id: QV014
      type: adverse
      status: answered
      question: >-
        Is the $9B valuation defensible given Octopus Energy Group's 0.76% EBITDA margin, commodity price exposure, and
        absence of audited Kraken ARR data?
      answer: >-
        Defensible only conditionally: the $9B price is not unreasonable IF Kraken ARR is validated at $500M+ and the
        spinoff executes cleanly at a 5–7x multiple. Without those conditions, utility multiples applied to group
        revenue yield $1.3–2.2B — a 75–85% write-down. The thin 0.76% EBITDA margin means retail cash flow cannot
        support a $9B valuation without the software premium. Overall rating: conditional positive, not a clear buy at
        current entry price.
      targets:
        - contentRequirements/1
        - plannedTables/thesis-anti-thesis-table
    - id: QV015
      type: adverse
      status: answered
      question: >-
        Has Kraken's billing automation failure — validated by the July 2025 Ofgem enforcement action — materially
        damaged the software licensing moat thesis underpinning the $9B valuation?
      answer: >-
        Yes, materially. The Ofgem fine directly implicates Kraken's core differentiator (automated billing management).
        The claim that Kraken provides superior, error-free automated billing is now contradicted by a verified
        regulatory enforcement outcome affecting 34,000+ customers. This does not eliminate the software thesis but
        increases the risk that future Ofgem scrutiny could lead to further enforcement, licensee confidence loss, or
        billing automation liability claims from utility clients.
      targets:
        - contentRequirements/0
        - plannedTables/thesis-anti-thesis-table
    - id: QV016
      type: adverse
      status: partial
      question: >-
        Is there evidence of overvaluation, down-round risk, governance concerns, or preference-stack issues that would
        reduce common equity value below the $9B headline?
      answer: >-
        Partial evidence: the $9B valuation at 1.3x group revenue implies a significant tech premium that is unconfirmed
        by audited Kraken data. Base-case analysis implies 35–55% value erosion. Preference-stack structure is not
        disclosed; if CPP/Generation have liquidation preference, common equity could be worth substantially less in a
        moderate outcome. No explicit down-round signal confirmed as of May 2026, but absence of a 2025 re-up round
        could signal stagnation.
      targets:
        - contentRequirements/2
        - plannedTables/thesis-break-and-kill-triggers-table
    - id: QV017
      type: adverse
      status: answered
      question: >-
        Is energy software valuation multiple compression reducing the probability that Kraken will achieve a SaaS-level
        multiple at spinoff, and if so by how much?
      answer: >-
        Yes — Bloomberg and Wood Mackenzie confirm 30–40% multiple compression from 2021 peaks for energy software
        platforms. The realistic ceiling for utility software M&A has moved from 10–15x ARR (2021) to 4–8x ARR
        (2024–2025). The bull case probability (Kraken at 10–12x) has materially decreased; the base case at 5–7x is
        more achievable but the full SaaS re-rating is now a low-probability outcome.
      targets:
        - contentRequirements/3
    - id: QV018
      type: freshness
      status: partial
      question: >-
        What is the most recent valuation marker for Octopus Energy Group in 2025 or 2026, and has any secondary
        transaction or new primary round occurred since the CPP Investments Q1 2024 commitment?
      answer: >-
        No confirmed 2025 or 2026 primary round or secondary transaction has been publicly reported. The $9B CPP
        Investments valuation remains the most recent price signal as of May 2026. Absence of a new round in 2025 is
        ambiguous: it could reflect investor satisfaction with existing cap table or difficulty raising at or above $9B
        in a compressed multiple environment.
      targets:
        - contentRequirements/2
    - id: QV019
      type: freshness
      status: answered
      question: >-
        What is the current Ofgem price cap trajectory for 2025–2026, and how does it affect Octopus Energy's near-term
        retail margin?
      answer: >-
        The Q2 2026 Ofgem price cap reduced by approximately 6.6% versus Q1 2026, continuing a series of reductions that
        compress per-unit retail revenue. Octopus's 0.76% EBITDA margin means even a 2–3% further cap reduction without
        offsetting wholesale cost decline could push the retail business to operating loss. Price cap risk is a live
        near-term threat, confirmed by Ofgem's published cap decisions.
      targets:
        - contentRequirements/0
    - id: QV020
      type: freshness
      status: partial
      question: >-
        What is the current operational status and disclosed timeline of the Kraken Technologies spinoff, and what
        management signals exist about structure?
      answer: >-
        As of May 2026: Amir Orad appointed Kraken CEO (Q4 2025), confirming active spinoff preparation. No formal
        spinoff timeline, IPO filing, or equity structure is public. Greg Jackson has referenced the spinoff in public
        statements but without committing to a specific date or structure. The spinoff is confirmed in intent but
        unconfirmed in structure or timing.
      targets:
        - contentRequirements/2
        - contentRequirements/5
    - id: QV021
      type: freshness
      status: answered
      question: >-
        What are the most recently available EV/Revenue multiples for Centrica, SSE, Orsted, and EDF, reflecting their
        2024 reported results?
      answer: >-
        Centrica: ~0.15x (FY2024 Annual Results, February 2025). SSE: ~1.5x (FY2024 Annual Report, November 2024). EDF:
        ~0.5x group (investor relations, October 2024). Orsted: ~2.5x compressed (FY2023 Annual Report, February 2024;
        deterioration confirmed through 2024). All multiples sourced from filed accounts corroborated by S&P Global and
        Morningstar.
      targets:
        - contentRequirements/4
    - id: QV022
      type: comparison
      status: answered
      question: >-
        How does Octopus Energy's customer unit economics (revenue per customer) compare to UK utility peers Centrica
        and SSE?
      answer: >-
        Octopus: £6.9B revenue / 7.5M UK customers = ~£920 average revenue per customer (UK retail only). Centrica:
        £32.5B / ~12M customers = ~£2,700 per customer (broader business including commercial and infrastructure).
        Octopus's per-customer revenue is lower because it serves primarily domestic residential. Direct
        EBITDA-per-customer comparison requires segment data not publicly available; Octopus's blended 0.76% margin
        suggests near-breakeven on UK retail per customer.
      targets:
        - contentRequirements/4
        - plannedFigures/valuation-sensitivity
    - id: QV023
      type: comparison
      status: partial
      question: >-
        How does Kraken's ARR and per-account licensing economics compare to OVO Energy's Kaluza platform and Oracle
        Utilities' licensing revenue?
      answer: >-
        Kraken: $500M+ ARR claimed (unaudited) on 70M accounts = ~$7 per account per year implied. Kaluza: ARR not
        disclosed; implied ~£400–600M total company valuation for tech layer, much smaller than Kraken's claimed scale.
        Oracle Utilities: public-company utilities segment revenue is not separately disclosed in filed accounts.
        Comparison is partial due to private data limitations and lack of audited Kraken data.
      targets:
        - contentRequirements/4
    - id: QV024
      type: comparison
      status: answered
      question: >-
        How does Orsted's valuation compression trajectory compare to Octopus Energy's current situation, and what does
        it indicate about downside risk?
      answer: >-
        Orsted compressed 56% from peak (£18B to £8B, 2021–2024) as offshore wind economics deteriorated — within 3
        years. Octopus faces an analogous risk: the tech-premium in the $9B valuation could compress 55–75% if the
        Kraken software thesis fails or energy software multiples continue to contract. The parallel is imperfect
        (Orsted is asset-intensive; Octopus is software+retail) but the speed and scale of energy-sector multiple
        contraction is directly instructive for valuation risk assessment.
      targets:
        - contentRequirements/4
        - plannedFigures/valuation-sensitivity
    - id: QV025
      type: comparison
      status: answered
      question: >-
        How does the $9B group valuation compare to a bottom-up build using utility multiples for retail plus SaaS
        multiples for Kraken ARR?
      answer: >-
        Bottom-up at base assumptions: Kraken at 6x $500M ARR = $3B + retail at 0.25x £6.9B = $2.2B, total ~$5.2B — a
        42% discount to $9B. To justify $9B bottom-up: need Kraken at 10x $500M ARR ($5B) + retail at 0.25x ($2.2B) +
        rounding = ~$7.2B; or Kraken at 8x $700M ARR ($5.6B) + retail at 0.3x ($2.6B) = $8.2B. Reaching $9B requires
        aggressive ARR and/or multiple assumptions well above the base case.
      targets:
        - contentRequirements/4
        - plannedTables/comparable-valuation-table
    - id: QV026
      type: comparison
      status: partial
      question: >-
        How does the CPP Investments $9B implied valuation compare to an independent DCF or comparable transaction
        analysis?
      answer: >-
        No public DCF or independent transaction analysis for Octopus is available. Analyst estimates (PitchBook, S&P
        Global) reference the CPP round as a price signal rather than providing independent DCF verification. Bottom-up
        comparable analysis yields $4–5.5B base case vs $9B entry — a substantial gap attributable to the Kraken SaaS
        premium assumption. Without audited Kraken cash flows, a rigorous DCF cannot be constructed from public
        information.
      targets:
        - contentRequirements/2
        - plannedFigures/valuation-return-range
    - id: QV027
      type: mechanism
      status: answered
      question: >-
        What is the precise mechanism by which the Kraken spinoff would create equity value for Octopus Group
        shareholders beyond the current blended valuation?
      answer: >-
        The value-creation mechanism has three steps: (1) Kraken is separated and its ARR is independently audited and
        reported; (2) Kraken attracts a software/SaaS investor base applying a higher revenue multiple (5–10x) than the
        blended utility+software multiple applied to the group; (3) Octopus Group shareholders receive Kraken equity
        proportionally, unlocking the gap between the utility-implied group price (~$5B) and the potential Kraken
        standalone price (~$3–5B). This only works if the spinoff structure does not disadvantage Group investors
        through licensing fees or equity leakage.
      targets:
        - contentRequirements/0
        - plannedFigures/recommendation-logic
    - id: QV028
      type: mechanism
      status: answered
      question: >-
        What is the mechanism by which Ofgem price cap regulation translates into valuation risk for Octopus Energy
        Group?
      answer: >-
        The Ofgem price cap sets a ceiling on unit tariff rates for standard variable customers. When the cap falls,
        Octopus's per-unit revenue decreases immediately, but wholesale energy procurement costs (hedged in advance)
        take time to adjust. This creates a temporary margin squeeze each time the cap is lowered. At 0.76% EBITDA
        margin, a 5–10% cap reduction not offset by equivalent wholesale cost reduction within the same quarter can
        produce an operating loss quarter, reducing available cash flow and increasing covenant risk on any credit
        facility.
      targets:
        - contentRequirements/0
        - contentRequirements/3
    - id: QV029
      type: mechanism
      status: answered
      question: >-
        How does international customer growth translate into Kraken ARR growth, and what are the key unit economics of
        the licensing model?
      answer: >-
        Kraken charges a per-account licensing fee to utility clients (publicly implied at ~$7 per account per year,
        derived from ARR / total accounts). Each new utility client that migrates accounts to Kraken adds recurring ARR
        at the per-account rate. International growth adds ARR through new licensee agreements and account migrations —
        non-UK Kraken licensees now account for a majority of the 70M account base. The model has high operating
        leverage: marginal cost of adding an account is low once the platform is deployed, so ARR growth above the
        marginal cost threshold should expand Kraken's EBITDA margin.
      targets:
        - contentRequirements/0
    - id: QV030
      type: mechanism
      status: answered
      question: >-
        How would a Kraken billing failure recurrence affect licensee confidence, ARR growth, and the software valuation
        thesis?
      answer: >-
        A recurrence would operate through four channels: (1) existing licensees (E.ON Next, Tokyo Gas, National Grid
        US) would review SLA terms and assess whether to continue or exit — ARR at risk equals the departing licensee's
        account-based fee; (2) prospective licensees would pause contract negotiations, stalling ARR growth; (3) Ofgem
        and international regulators would increase scrutiny, raising compliance costs; (4) the SaaS re-rating thesis
        would become untenable as investors price in software reliability risk, collapsing the multiple from 5–8x toward
        2–3x or pure utility. This is the single highest-impact thesis-break scenario.
      targets:
        - contentRequirements/5
        - plannedTables/thesis-break-and-kill-triggers-table
    - id: QV031
      type: mechanism
      status: partial
      question: >-
        What is the specific timeline and value-transfer mechanism for a Kraken IPO or M&A transaction at a
        technology-software multiple, and how does this benefit current Octopus Group investors?
      answer: >-
        No specific timeline is public. The mechanism would likely involve: (1) Kraken Technologies Ltd filing for an
        IPO (UK AIM or Nasdaq) or entering exclusive M&A discussions; (2) existing Octopus Group investors receiving
        Kraken shares or cash proportional to their Group stake; (3) Octopus retaining a minority stake as an ongoing
        licensing client. Without a disclosed equity structure, it is impossible to confirm that the value transfer
        benefits current Group investors proportionally. This is a critical unresolved diligence point.
      targets:
        - contentRequirements/5
