        - Closest comparable for Octopus retail business; largest UK domestic energy supplier by revenue
        - >-
          No technology licensing revenue; Hive IoT platform subscale vs Kraken; legacy infrastructure cost base raises
          unit costs
      - - SSE PLC
        - Integrated energy and infrastructure; UK
        - £9.8B (FY2024 estimate)
        - ~1.5x (EV ~£14.5B)
