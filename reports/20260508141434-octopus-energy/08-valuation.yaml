  - id: SV-S4
    title: Recommendation and risk-adjusted return
    body: >-
      The overall recommendation is conditional positive at the current $9B valuation, with the condition being
      successful execution of the Kraken spinoff at a defensible software multiple. Confidence is medium, reflecting the
      strength of the UK retail franchise and Kraken's global footprint, offset by the thin retail margin, the Ofgem
      enforcement precedent, and the absence of audited Kraken ARR figures available to outside investors. The valuation
      stance is that the $9B price is neither obviously overvalued nor obviously undervalued — it is a bet on a specific
      outcome (Kraken software re-rating) that is plausible but not certain. Any investor entering at $9B must be
      comfortable holding through a scenario where the valuation marks down 40–60% before Kraken spinoff catalysts
      materialise. Risk rating is high. The combination of commodity price exposure, thin retail margin, Ofgem
      enforcement risk, and Kraken spinoff execution risk creates a wide distribution of outcomes. Downside protection
      is limited because the business has no meaningful asset backing (unlike SSE's regulated network assets or Ørsted's
      contracted offshore wind capacity) — the entire premium over book value rests on the Kraken software valuation.
      Target exit horizon for current investors is 2028–2032, assuming a Kraken IPO or secondary transaction within 3–5
      years of the 2024 CPP round. A 2028 Kraken IPO at the base case ($3B) would return approximately 0.3–0.4x on the
      Kraken portion of a $9B entry, with the retail business potentially recovering to 0.25–0.3x revenue as margins
      improve. Total return to entry investors in the base case is estimated at 0.5–0.7x — value-destructive unless
      Kraken clearly outperforms expectations.
