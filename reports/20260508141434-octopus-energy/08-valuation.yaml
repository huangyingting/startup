chapter:
  number: 8
  title: Valuation
  summary: >-
    Octopus Energy Group's $9 billion (£7.1B) valuation as of its Q1 2024 CPP Investments round is defensible only as a
    hybrid utility-plus-software price: applied to £6.9B FY2024 group revenue, it implies a ~1.3x EV/Revenue multiple —
    far above the 0.15–0.5x range for comparable pure-play UK and European energy suppliers, but below the 8–12x
    multiples that apply to comparable vertical SaaS platforms. The valuation thesis rests almost entirely on Kraken
    Technologies achieving a standalone SaaS re-rating at or after its planned spinoff. The conditional-positive
    recommendation reflects this optionality: the $9B price is defensible if the Kraken spinoff executes cleanly at a
    $2–3B software multiple, but a bear-case reversion to pure-utility multiples implies a 55–65% valuation haircut to
    $3–4B. Final diligence must resolve Kraken ARR audited figures, the spinoff timeline, and the Ofgem enforcement
    trajectory before any position sizing is determined.
sections:
  - id: SV-S1
    title: Investment thesis and anti-thesis
    body: >-
      The investment thesis for Octopus Energy Group is a two-part argument: first, that the company has built a
      structurally superior UK retail energy business growing faster than any comparable peer and sustaining
      above-market customer acquisition economics; second, and more importantly for the $9B valuation, that the Kraken
      Technologies platform is a genuine vertical SaaS asset — one that licenses its operating system to third-party
      utilities at scale, generates recurring ARR currently claimed at $500M+, and deserves a technology-company
      multiple rather than a utility multiple once separated from the retail energy business. The five thesis pillars
      are: (1) UK market leadership with 7.5M domestic customers generating defensible retail cash flow; (2) Kraken's
      70M-account global footprint across 27 countries creating a licensing moat against new entrants; (3) international
      expansion into Germany, Japan, Australia, Texas, and other markets providing growth optionality unavailable to
      pure UK utilities; (4) energy transition providing a multi-decade structural tailwind; and (5) CPP Investments and
      Generation Investment Management institutional anchor at $9B providing a credible price signal from sophisticated
      investors. The anti-thesis rests on four structural objections: (1) the Kraken billing automation failure —
      validated by the July 2025 Ofgem enforcement action — directly contradicts the core claim that Kraken's software
      superiority is proven and scalable; (2) the $9B valuation at 1.3x group revenue requires the market to believe
      Kraken will achieve a SaaS re-rating at spinoff, an outcome unconfirmed and increasingly uncertain as
      energy-software multiples compress; (3) Octopus's 0.76% EBITDA margin leaves almost no buffer before a loss year
      if commodity prices or the Ofgem cap move adversely; and (4) the Kraken spinoff introduces structural complexity
      and potential conflicts of interest between Kraken as an independent software vendor and Octopus as its largest
      customer.
