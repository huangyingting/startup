  - id: SV-S3
    title: Bull / base / bear scenarios
    body: >-
      The bull case requires three conditions to hold simultaneously: Kraken completes its spinoff and achieves a
      standalone SaaS or hybrid-SaaS multiple of 8–12x on a validated $600M+ ARR by 2027; international customer growth
      continues to add 3–5M new accounts per year; and UK regulatory conditions remain stable with no further material
      Ofgem enforcement actions. Under these assumptions, the Kraken entity alone would be worth $5–7B and the UK retail
      business — serving 8M+ customers at improved margins — would contribute a further $1.5–2B, implying a group equity
      value of $6.5–9B before applying an IPO or M&A execution premium. The bull case total-return to current investors
      is modest because the $9B entry price already prices in significant Kraken optionality; upside depends on
      exceeding current ARR expectations. The base case assumes Kraken achieves a blended 5–7x ARR multiple at spinoff,
      UK customer count stabilises at 7.5–8M, and the Ofgem enforcement trajectory does not escalate. This yields a
      Kraken standalone value of $2.5–3.5B and a retail utility value of $1.5–2B (at approximately 0.25x £6.9B revenue),
      implying a group equity value of $4–5.5B — representing a 35–55% discount to the entry valuation. The bear case
      assumes Kraken fails to achieve a clean spinoff, suffers one or more additional Ofgem enforcement actions
      implicating billing automation, loses one or more major licensing clients, and sees UK market share plateau as
      Centrica's Hive and Kaluza achieve feature parity. The group then reverts to a pure utility multiple of 0.15–0.25x
      £6.9B revenue, implying a group equity value of approximately £1–1.7B ($1.3–2.2B) — a 75–85% collapse from the $9B
      entry price. The bear case is low probability but non-trivial given the Ofgem enforcement precedent and energy
      software multiple compression already underway.
