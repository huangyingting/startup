  - id: SV-S2
    title: Valuation context and comparable companies
    body: >-
      Octopus Energy Group is a private company with no publicly listed shares. The most recent independent price signal
      is the Q1 2024 CPP Investments round, which implied a $9 billion (approximately £7.1 billion at 2024 average
      exchange rates) group valuation. This followed a £630M raise from Generation Investment Management in 2021 at a
      reported £2.2B valuation, demonstrating roughly 3x appreciation in three years driven by customer growth and
      Kraken licensing momentum. No 2025 or 2026 primary round has been publicly confirmed. The comparable set spans
      three categories. Pure-play UK energy suppliers (Centrica, EDF UK) trade at 0.15–0.5x EV/Revenue, reflecting thin
      retail margins, commodity exposure, and regulatory risk. Infrastructure-weighted energy businesses (SSE) attract a
      premium — typically 1.0–1.5x — because regulated network assets command a yield-based valuation above commodity
      retail. Offshore wind developers such as Ørsted traded at 4–5x revenue in 2021 on transition optionality, but
      compressed to approximately 2.5x by 2024 as offshore wind costs rose and interest rates increased — a cautionary
      precedent for Octopus's own tech-premium valuation. The most relevant SaaS comparables for Kraken — Salesforce,
      ServiceNow, and similar enterprise vertical SaaS — trade at 8–12x revenue. If Kraken's $500M+ ARR is validated and
      the spinoff is successfully executed at an 8x ARR multiple, the Kraken entity alone would be valued at
      approximately $4B, providing upside to the current $9B group price after accounting for the retail utility
      business at a 0.3x revenue multiple. The base case does not assume this full re-rating; it assumes a blended 5–7x
      Kraken ARR multiple and a pure utility multiple on the retail revenue base, yielding a $4–5.5B group equity value.
