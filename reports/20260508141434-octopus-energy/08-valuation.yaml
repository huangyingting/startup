          would be an immediate liquidity risk
        - Request treasury pack; independent review of commodity hedging policy and counterparty credit lines
      - - Group consolidated accounts
        - >-
          Full group consolidated P&L, balance sheet, and cash flow statement with segment-level disclosure (UK retail,
          Kraken software, generation, international)
        - >-
          UK Companies House filing shows limited disclosure; segment margins and cash position are unverifiable from
          public sources alone
        - >-
          Request audited group accounts in data room; if unavailable, request management accounts with auditor sign-off
          on key metrics
    claimRefs:
      - CV003
      - CV007
      - CV026
      - CV027
      - CV029
      - CV033
      - CV039
    notes: >-
      Diligence paths assume a formal data-room process with company cooperation. Some items (Ofgem investigation
      status) may be subject to regulatory confidentiality restrictions.
