          Shows infrastructure premium over pure retail; regulated network assets justify higher multiple than pure
          retail
        - >-
          SSE multiple dominated by regulated network assets (RIIO-T2/ED2); retail component alone is much lower
          multiple
      - - EDF Group (UK and France)
        - Integrated European energy major
        - ~€143B consolidated (FY2023)
        - ~0.5x group (EV ~€70B)
        - Provides European reference multiple for integrated utility with nuclear/retail mix
        - French state ownership distorts market pricing; UK retail operations are subscale relative to EDF group
      - - Orsted
        - Offshore wind developer; Denmark
        - DKK 86B (~£9.6B, FY2023)
        - ~2.5x (2024; compressed from ~5x in 2021)
