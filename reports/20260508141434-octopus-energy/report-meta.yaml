companyProfile:
  summary: >-
    Octopus Energy Group (OEG) is a late-stage private UK energy company founded in 2015 by Greg
    Jackson. It operates UK retail energy supply to 7.5M customers and licenses the Kraken cloud
    platform to 70M+ utility accounts across 27+ countries. OEG achieved its first materially
    profitable year in FY24 (£83M net profit on £12.4B revenue). The Kraken Technology spinoff in
    December 2025 at $8.65B crystallised the SaaS value embedded in the group. OEG holds the highest
    NPS in the UK energy market (Which? Recommended Provider for seven consecutive years) and is a
    certified B Corporation.
  foundedDate: '2015-01-01'
  founders:
    - name: Greg Jackson CBE
      role: CEO and co-founder
      background: >-
        Serial software entrepreneur before OEG; Economics graduate of Cambridge. Primary driver
        of Octopus's mission-led brand, technology strategy, and international expansion. Has resisted
        strategic sale narrative and positioned Kraken for eventual IPO.
      claimRefs: [CO003]
  foundingLocation: London, United Kingdom
  headquarters: London, United Kingdom
  productSummary: >-
    Two interlocking businesses: (1) OEG Retail — UK direct-to-consumer and SME energy supply on
    flexible and time-of-use tariffs, including Agile Octopus, Saving Sessions, and EV smart charging;
    (2) Kraken Technology — a cloud-native utility management platform (billing, CRM, trading,
    metering, demand response) licensed to third-party utilities globally including E.ON, Origin
    Energy, Tokyo Gas, and EDF Renewables.
  customerFocus: >-
    Retail: UK households and SMEs seeking transparent, digital-first energy supply. Kraken: Tier-1
    and Tier-2 utility operators seeking to replace legacy billing infrastructure and add AI-driven
    demand management capabilities.
  businessModel: >-
    Retail: unit margin on electricity and gas supply, with OEG Generation's solar backstop reducing
    wholesale exposure. Kraken: recurring SaaS licensing fees from utility clients scaled per account
    managed, supplemented by implementation and support revenues.
  stage: late-stage private
  fundingStatus: >-
    Series E: $9B post-money (May 2024, co-led by Generation Investment Management and CDPQ).
    Kraken Technology separately valued at $8.65B in December 2025 spinoff. Full preference/dilution
    stack is not publicly disclosed.
  disclosureProfile: private-disclosed
  claimRefs: [CO001, CO002, CO003, CV001, CV002, CV003]

summary:
  headline: >-
    Octopus Energy pairs the UK's highest-NPS energy retailer with a $8.65B AI utility platform;
    entry at $9B is defensible if Kraken ARR and churn are verified — but the data-room gaps are blocking.
  overallScore: 6.5
  recommendation: track
  confidence: medium
  riskRating: high
  valuationStance: fair
  keyMetrics:
    valuationUsdM: 9000
    revenueRunRateUsdM: 15750
    arrUsdM: null
    revenueGrowthYoYPct: null
    grossMarginPct: null
    nrrPct: null
    totalRaisedUsdM: null
    customerCount: 7500000
    headcount: null
  topStrengths:
    - >-
      Kraken Technology spun off at $8.65B (December 2025) — a category-defining utility SaaS
      platform with 70M+ contracted accounts across 27+ jurisdictions, commanding a 17x ARR
      multiple consistent with winner-take-most platform dynamics.
    - >-
      Seven consecutive years as Which? Recommended Provider with NPS exceeding +60, reflecting
      Kraken's live production performance and validating the platform's core value proposition
      to prospective utility licensees.
    - >-
      First materially profitable year in FY24 (£83M net profit, £95M EBITDA) following sustained
      investment, reducing late-stage burn risk and demonstrating that the retail and technology
      businesses can support each other economically.
    - >-
      OEG Generation's solar asset portfolio provides a natural hedge against wholesale electricity
      price spikes, creating a structural cost advantage unavailable to pure retail competitors.
  topRisks:
    - >-
      Kraken ARR ($500M+ estimated) is unaudited and unconfirmed by any public disclosure; the
      entire $8.65B spinoff valuation and 17x ARR multiple cannot be underwritten without
      data-room access to audited recurring revenue figures and churn rates by geography.
    - >-
      OEG's commodity procurement credit facility (size, counterparties, covenants) is not
      publicly disclosed — creating implicit leverage that cannot be modelled and could trigger
      margin calls during commodity price stress.
    - >-
      Ofgem enforcement remains an active risk: the July 2025 £1.5M billing fine and open 2023
      prepayment meter investigation represent contingent liabilities of unknown quantum, with
      potential for escalation to industry-wide market investigation.
    - >-
      AWS single-cloud dependency for Kraken (70M+ accounts) creates a catastrophic failure mode
      with no disclosed multi-cloud failover or DR test results — a thesis-break risk if a P0
      outage triggers SLA penalties and regulatory censure simultaneously.
  unresolvedGaps:
    - >-
      Kraken ARR and trailing 12-month churn by geography — the primary valuation driver is
      unauditable from public sources; without this, the $8.65B multiple is speculative.
    - >-
      OEG commodity credit facility: size, counterparties, covenants, and mark-to-market position
      represent implicit leverage that cannot be modelled without data-room access.
    - >-
      Full preference/dilution stack (Series A through E): secondary investors cannot compute
      effective per-share economics from public filings alone; Companies House provides partial data.
    - >-
      Ofgem prepayment meter investigation (2023): no formal outcome has been announced for Octopus
      specifically as of the run date; contingent liability is not quantifiable from public data.
    - >-
      OEG FY25 audited accounts: not yet published; the financial position post-Kraken spinoff
      and post-July 2025 Ofgem enforcement is unknown.

