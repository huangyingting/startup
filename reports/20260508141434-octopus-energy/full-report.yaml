chapters:
  - number: 1
    title: Company Overview
    sections:
      - number: '1.1'
        title: Identity and business model
        blocks:
          - type: paragraph
            body: >-
              Octopus Energy Group Ltd was incorporated in 2015 and entered the UK domestic energy market in 2016 as a
              challenger supplier offering simple, competitively priced green energy tariffs via a direct-to-consumer
              digital model. The company has since evolved into a vertically integrated clean energy group operating
              across three interlocking segments: retail energy supply, the Kraken cloud technology platform, and
              renewable energy generation through Octopus Energy Generation. The retail business serves customers in the
              UK, Germany, France, Italy, Spain, Japan, the United States, and New Zealand, with the UK remaining the
              dominant market at 7.8 million homes and roughly 24% domestic market share as of early 2025. Kraken is a
              purpose-built utility operating system handling billing, customer management, smart-meter integration, and
              flexible dispatch across 70 million contracted accounts globally; it was spun off as a separate entity in
              September 2025. Octopus Energy Generation manages approximately £7 billion in assets under management
              across onshore and offshore wind and solar, making it one of Europe's larger dedicated renewables
              investors. The group generates revenue from both commodity margin on retail energy and recurring SaaS
              licence fees from Kraken clients such as EDF, E.ON Next, Origin Energy, and Tokyo Gas, giving it an
              unusual dual revenue profile within the energy sector. Octopus Electric Vehicles, an EV leasing and
              smart-charging unit, and Electroverse, a public charging network, extend the group's presence into
              adjacent electrification markets.
            claimRefs:
              - CO001
              - CO002
              - CO009
              - CO011
              - CO020
              - CO023
              - CO024
              - CO030
              - CO032
