      - number: '1.2'
        title: Leadership and governance
        blocks:
          - type: paragraph
            body: >-
              Greg Jackson CBE is CEO and co-founder, a Cambridge Economics graduate who previously founded software
              businesses before pivoting to energy. He is the dominant public face of the group and central to its
              regulatory relationships, fundraising, and strategic direction, creating material key-person
              concentration. Stuart Jackson (no family relation to Greg) is co-founder and CFO, also a Cambridge
              Economics graduate, providing continuity in financial stewardship since founding. James Eddison,
              co-founder and CTO, holds a Cambridge Engineering background and leads technology strategy including the
              Kraken platform. The Kraken spinoff in September 2025 introduced Amir Orad as standalone Kraken CEO and
              Tim Wan as Kraken CFO, partially redistributing execution responsibility. Greg Jackson has publicly voiced
              views on energy policy, household affordability, and the role of smart tariffs in decarbonisation, and was
              awarded a CBE for services to energy and business. The board's detailed composition is not fully disclosed
              in public filings; governance transparency is therefore an open diligence question. Octopus Energy Group
              Ltd files abbreviated accounts in the UK and does not publish a full corporate governance statement,
              meaning board composition, independent director count, audit committee constitution, and related-party
              transaction disclosures require private data-room access to fully assess.
            claimRefs:
              - CO003
              - CO004
              - CO005
              - CO022
              - CO037
      - number: '1.3'
        title: Capital base and investors
        blocks:
          - type: paragraph
            body: >-
              Octopus Energy Group has raised more than $2 billion from a diversified base of strategic and financial
              investors. The most recent major round closed at an $8 billion valuation in December 2023 ($800 million
              raised), followed by a valuation step-up to $9 billion in May 2024 when GIM and CPP Investments increased
              their positions. Origin Energy, the Australian listed energy company, holds approximately 23% and is the
              largest single shareholder, giving it both economic upside and strategic leverage over Kraken's Australian
              deployment. Generation Investment Management (Al Gore's fund) holds 13% and CPP Investments (Canada's
              pension) holds 12%, providing institutional credibility. Tokyo Gas of Japan invested approximately $200
              million in 2020 for roughly 9.7% and participates in a joint venture operating Octopus Energy's Japanese
              retail business. Aware Super, an Australian pension fund, co-invested alongside GIM in May 2024. The
              company's net assets reached £1.7 billion in FY24 following £722 million of combined equity investment and
              retained earnings. No public debt or credit facility has been disclosed at the group holding-company
              level, though project-finance structures are likely within Octopus Energy Generation. The company remains
              private; a public listing has been publicly discussed by management but no firm timeline has been
              announced.
            claimRefs:
