  - id: TV006
    title: Final diligence asks table
    columns:
      - Topic
      - Missing Evidence
      - Why It Matters
      - Owner / Diligence Path
    rows:
      - - Kraken ARR (audited)
        - >-
          Audited Kraken Technologies ARR by client, contract type, geography, and growth rate; churn rate; net revenue
          retention
        - >-
          $9B valuation rests on Kraken achieving SaaS multiple; unaudited management claim of $500M+ ARR cannot support
          that multiple without independent verification
        - >-
          Request data room; review audited Kraken Technologies Ltd accounts at UK Companies House; require big-4 audit
          opinion on ARR
      - - Kraken spinoff structure
        - >-
          Equity distribution plan, preference waterfall, post-spinoff licensing fee for Octopus retail, governance
          structure, timeline, and IPO or secondary roadmap
        - >-
          Without spinoff structure, the primary source of $9B valuation upside is unquantifiable; risk of value leakage
          to Kraken entity at expense of Group investors
        - >-
          Management disclosure; legal counsel review of draft spinoff documents; board-level engagement on minority
          investor protections
      - - Ofgem enforcement trajectory
        - >-
          Outcome and remediation status of July 2025 billing fine; status of prepayment meter investigation; Ofgem
          forward supervisory posture toward Kraken-automated billing
        - >-
          A second enforcement action would be a thesis-break trigger; ongoing investigation creates contingent
          liability not quantifiable from public information
        - >-
          Direct Ofgem inquiry; review regulatory correspondence disclosed in data room; legal opinion on maximum
          liability exposure
      - - Commodity procurement credit facility
        - >-
          Size, tenor, counterparty, collateral terms, and utilisation of commodity procurement facilities; hedging
          ratio and mark-to-market exposure as of 2026
        - >-
          0.76% EBITDA margin provides almost no cushion; an out-of-money hedge position or credit facility withdrawal
          would be an immediate liquidity risk
        - Request treasury pack; independent review of commodity hedging policy and counterparty credit lines
      - - Group consolidated accounts
        - >-
          Full group consolidated P&L, balance sheet, and cash flow statement with segment-level disclosure (UK retail,
          Kraken software, generation, international)
        - >-
          UK Companies House filing shows limited disclosure; segment margins and cash position are unverifiable from
          public sources alone
        - >-
          Request audited group accounts in data room; if unavailable, request management accounts with auditor sign-off
          on key metrics
    claimRefs:
      - CV003
      - CV007
      - CV026
      - CV027
      - CV029
      - CV033
      - CV039
    notes: >-
      Diligence paths assume a formal data-room process with company cooperation. Some items (Ofgem investigation
      status) may be subject to regulatory confidentiality restrictions.
