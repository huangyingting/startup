  - number: 4
    title: Financials
    sections:
      - number: '4.1'
        title: Revenue Model and Revenue Mix
        blocks:
          - type: paragraph
            body: |
              Octopus Energy Group operates across four principal revenue segments: UK retail energy supply,
              international retail energy, Kraken SaaS licensing, and OEG renewable generation. UK retail
              energy supply — supplying electricity and gas to approximately 7.8 million domestic and SME
              customers at tariffs benchmarked against the Ofgem price cap — accounts for the dominant share
              of group revenue, estimated at over 90 percent of the FY24 total of £12.4 billion. Revenue
              recognition follows a consumption model: customers are billed per kilowatt-hour of electricity
              or cubic metre of gas consumed, plus a daily standing charge, with prices adjusted quarterly
              in line with Ofgem's price cap review cycle. This creates a revenue stream that is largely
              volume-driven and commodity-influenced, with margins thin relative to turnover but partially
              protected by Ofgem's allowed return methodology.

              Kraken Technologies — Octopus's proprietary utility operating system — generates SaaS licensing
              revenue by charging third-party utilities (E.ON Next, Origin Energy, Tokyo Gas, and others)
              per account per month for access to its billing, customer management, and flexibility stack.
              Kraken FY24 SaaS revenue reached £90 million, up 68 percent year-on-year, with 70 million
              accounts licensed. Kraken profit grew to £35 million, a 483 percent increase. These figures
              are disclosed in Octopus Energy Group's FY24 results press release and represent the
              highest-quality, highest-margin revenue segment. A September 2025 partial spinoff is expected
              to monetise Kraken separately, with contracted ARR at $500 million. Octopus Energy Generation
              (OEG) contributes revenue through sale of power generated from its approximately 4.9 GW
              renewable portfolio (£7 billion AUM) across nine markets, providing a further vertical
              integration benefit through preferential PPA pricing for the retail business.
            claimRefs:
              - CI001
              - CI006
              - CI007
              - CI008
              - CI009
              - CI010
              - CI011
              - CI013
              - CI014
              - CI015
      - number: '4.2'
        title: Unit Economics and Cost Structure
        blocks:
          - type: paragraph
            body: |
              Energy retail is a low-margin business by design: Ofgem's price cap methodology allows
              suppliers a capped unit margin above commodity and network cost pass-throughs. UK energy
              retail gross margins are broadly estimated by industry analysts at three to five percent of
              revenue, implying a gross profit of roughly £370 million to £620 million at FY24 revenue
              levels; Octopus's implied gross profit of approximately £1 billion (at around eight percent
              gross margin) suggests operational efficiencies from vertical integration and the avoided-cost
              benefit of owning Kraken rather than procuring billing infrastructure from Oracle or SAP.
              Octopus's EBITDA of £95 million on £12.4 billion of revenue equates to a 0.76 percent
              EBITDA margin, consistent with the capital-light retail model but heavily diluted by commodity
              pass-through.

              Customer acquisition cost (CAC) is not disclosed. Octopus claims above-average referral-driven
              growth — reducing paid CAC versus incumbents — but no independently verified figure is
              available. The unit economics bridge must rely on proxies: industry CAC for UK energy retail
              is estimated at £50 to £150 per customer via digital channels, with payback measured in months
              given low churn and high engagement with smart tariff products (Agile Octopus, Intelligent
              Octopus Go). Working capital demand is seasonal, peaking in winter when energy consumption
              and billing volumes are highest, creating a credit facility requirement on top of equity.
              Octopus, in common with all UK energy retailers, uses commodity procurement credit lines to
              manage the cash timing gap between purchasing energy on wholesale markets and recovering costs
              through customer billing, exposing the balance sheet to mark-to-market movements on
              forward positions.
            claimRefs:
              - CI020
              - CI023
              - CI024
              - CI025
              - CI028
              - CI031
              - CI033
              - CI040
              - CI042
      - number: '4.3'
        title: Capital Adequacy and Financial Position
        blocks:
          - type: paragraph
            body: |
              Octopus Energy Group has raised over two billion dollars of equity across multiple funding
              rounds (detailed in Chapter 1 via claimRefs to company-overview). The most recent disclosed
              valuation was $9 billion in May 2024 following a $370 million raise. Net assets at FY24
              stood at £1.7 billion. Cash on hand, monthly operating burn, and undrawn debt facilities
              are not disclosed in any public filing; the Companies House annual return for Octopus Energy
              Group Ltd (company number 09263047) lags by 12-18 months and does not provide detailed
              liquidity analysis. Centrica's published annual report provides a comparison point for
              incumbent cost and capital structure: Centrica (British Gas parent) reports net cash
              positive positions underpinned by its upstream and trading operations, a structural advantage
              Octopus partially offsets through Kraken IP ownership.

              Capital intensity in the renewable generation segment is high: acquiring and developing
              approximately 4.9 GW of wind and solar assets at a portfolio AUM of £7 billion implies
              significant project finance utilisation. OEG generation assets are typically financed via
              non-recourse project debt, isolating the bulk of debt from Octopus Energy Group's retail
              balance sheet. The Kraken spinoff, expected in September 2025 at a contracted ARR of
              $500 million, is expected to generate a partial realisation event for OEG shareholders,
              providing liquidity without a full trade sale. Ofgem fined Octopus £1.5 million in July 2025
              for overcharging customer direct debits, a financial and reputational risk, though immaterial
              relative to group revenue scale. Runway analysis is not possible without disclosed cash
              position, but FY24 profitability (£83 million net profit) indicates Octopus is past breakeven
              at group level.
            claimRefs:
              - CI016
              - CI017
              - CI018
              - CI019
              - CI022
