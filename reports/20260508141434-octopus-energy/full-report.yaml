      - number: '8.5'
        title: Financing context and capital structure
        blocks:
          - type: paragraph
            body: >-
              Octopus Energy Group has raised approximately £1B+ across its primary funding rounds since 2019. Known
              investors include Generation Investment Management (£630M, 2021), CPP Investments (amount undisclosed,
              implied $9B group valuation, Q1 2024), Tokyo Gas (strategic partner and investor, amount undisclosed), and
              Origin Energy Australia (JV formation, implied $500M+ for Australian operations). The preference stack —
              liquidation seniority, anti-dilution rights, and participation mechanics — is not publicly disclosed for
              any round, which is a material gap: in a bear-case liquidation or forced exit, common equity (including
              management and employee equity) could be substantially diluted below headline valuation. Debt financing at
              the group level is not publicly confirmed. The retail energy business requires commodity procurement
              credit facilities — typically provided by banks against hedged positions — but neither the size, term, nor
              counterparty of these facilities is disclosed. Commodity credit exposure could be material in a wholesale
              price spike scenario given Octopus's thin margin environment. The Kraken Technologies spinoff introduces
              additional complexity: if Kraken is spun off as a separate entity, Octopus Group shareholders may or may
              not receive proportional Kraken equity depending on the spinoff structure (full distribution, partial IPO,
              or funded carve-out). Management has indicated a Kraken CEO appointment (Amir Orad, Q4 2025) but has not
              disclosed the equity structure, preference waterfall, or licensing fees governing the ongoing
              Kraken-Octopus commercial relationship post-spinoff. UK Companies House filing for Octopus Energy Group
              Ltd (registered number 09263047) confirms filing history and registered accounts, but group-level
              consolidated accounts with full segment disclosure are not available from public sources, limiting
              quantitative assessment of capital adequacy and cash position.
            claimRefs:
              - CV025
              - CV026
              - CV027
              - CV028
              - CV029
              - CV030
              - CV031
              - CV032
              - CV039
      - number: '8.6'
        title: Final diligence asks and thesis-break triggers
        blocks:
          - type: paragraph
            body: >-
              Four categories of final diligence asks are critical before confirming or expanding any position in
              Octopus Energy Group. First, Kraken ARR audited figures: current management claims of $500M+ ARR cannot be
              independently verified from public sources. Audited Kraken revenue by contract type (licensing vs
              managed-service vs performance-based), customer, and geography is essential to validate the software
              multiple assumption underpinning the $9B valuation. Second, the Kraken spinoff structure and timeline: the
              exact equity distribution, preference waterfall, licensing fee structure for the continuing Octopus retail
              relationship, and governance arrangements of the post-spinoff Kraken entity must be disclosed to assess
              value transfer to current Octopus Group investors. Third, the Ofgem enforcement trajectory: the July 2025
              billing automation fine and the ongoing prepayment meter investigation must be resolved before the
              regulatory risk profile is assessable. Any further enforcement action implicating Kraken billing —
              particularly if it results in licence conditions or material remediation cost — would be a thesis-break
              trigger. Fourth, the commodity procurement credit facility: size, tenor, and collateral terms of any
              commodity procurement financing should be disclosed to assess downside risk in a wholesale energy price
              spike. Thesis-break triggers are: (1) a second material Ofgem enforcement action implicating Kraken
              billing automation within 18 months of the July 2025 fine; (2) loss of one or more major Kraken licensing
              clients (E.ON Next, Tokyo Gas, National Grid US) representing more than 15% of Kraken ARR; (3) a Kraken
              spinoff structure that does not give existing Octopus Group investors proportional equity in the Kraken
              entity; and (4) a forced down-round or distressed secondary transaction below $7B implied valuation,
              signalling institutional loss of confidence in the software thesis.
            claimRefs:
