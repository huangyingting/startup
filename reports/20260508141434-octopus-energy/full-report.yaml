  - number: 8
    title: Valuation
    sections:
      - number: '8.1'
        title: Investment thesis and anti-thesis
        blocks:
          - type: paragraph
            body: >-
              The investment thesis for Octopus Energy Group is a two-part argument: first, that the company has built a
              structurally superior UK retail energy business growing faster than any comparable peer and sustaining
              above-market customer acquisition economics; second, and more importantly for the $9B valuation, that the
              Kraken Technologies platform is a genuine vertical SaaS asset — one that licenses its operating system to
              third-party utilities at scale, generates recurring ARR currently claimed at $500M+, and deserves a
              technology-company multiple rather than a utility multiple once separated from the retail energy business.
              The five thesis pillars are: (1) UK market leadership with 7.5M domestic customers generating defensible
              retail cash flow; (2) Kraken's 70M-account global footprint across 27 countries creating a licensing moat
              against new entrants; (3) international expansion into Germany, Japan, Australia, Texas, and other markets
              providing growth optionality unavailable to pure UK utilities; (4) energy transition providing a
              multi-decade structural tailwind; and (5) CPP Investments and Generation Investment Management
              institutional anchor at $9B providing a credible price signal from sophisticated investors. The
              anti-thesis rests on four structural objections: (1) the Kraken billing automation failure — validated by
              the July 2025 Ofgem enforcement action — directly contradicts the core claim that Kraken's software
              superiority is proven and scalable; (2) the $9B valuation at 1.3x group revenue requires the market to
              believe Kraken will achieve a SaaS re-rating at spinoff, an outcome unconfirmed and increasingly uncertain
              as energy-software multiples compress; (3) Octopus's 0.76% EBITDA margin leaves almost no buffer before a
              loss year if commodity prices or the Ofgem cap move adversely; and (4) the Kraken spinoff introduces
              structural complexity and potential conflicts of interest between Kraken as an independent software vendor
              and Octopus as its largest customer.
            claimRefs:
              - CV001
              - CV002
              - CV003
              - CV004
              - CV005
              - CV006
              - CV033
              - CV035
      - number: '8.2'
        title: Valuation context and comparable companies
        blocks:
          - type: paragraph
            body: >-
              Octopus Energy Group is a private company with no publicly listed shares. The most recent independent
              price signal is the Q1 2024 CPP Investments round, which implied a $9 billion (approximately £7.1 billion
              at 2024 average exchange rates) group valuation. This followed a £630M raise from Generation Investment
              Management in 2021 at a reported £2.2B valuation, demonstrating roughly 3x appreciation in three years
              driven by customer growth and Kraken licensing momentum. No 2025 or 2026 primary round has been publicly
              confirmed. The comparable set spans three categories. Pure-play UK energy suppliers (Centrica, EDF UK)
              trade at 0.15–0.5x EV/Revenue, reflecting thin retail margins, commodity exposure, and regulatory risk.
              Infrastructure-weighted energy businesses (SSE) attract a premium — typically 1.0–1.5x — because regulated
              network assets command a yield-based valuation above commodity retail. Offshore wind developers such as
              Ørsted traded at 4–5x revenue in 2021 on transition optionality, but compressed to approximately 2.5x by
              2024 as offshore wind costs rose and interest rates increased — a cautionary precedent for Octopus's own
              tech-premium valuation. The most relevant SaaS comparables for Kraken — Salesforce, ServiceNow, and
              similar enterprise vertical SaaS — trade at 8–12x revenue. If Kraken's $500M+ ARR is validated and the
              spinoff is successfully executed at an 8x ARR multiple, the Kraken entity alone would be valued at
              approximately $4B, providing upside to the current $9B group price after accounting for the retail utility
              business at a 0.3x revenue multiple. The base case does not assume this full re-rating; it assumes a
              blended 5–7x Kraken ARR multiple and a pure utility multiple on the retail revenue base, yielding a
              $4–5.5B group equity value.
            claimRefs:
              - CV001
              - CV007
              - CV008
              - CV009
              - CV010
              - CV011
              - CV012
              - CV013
              - CV014
              - CV015
              - CV016
              - CV025
              - CV029
              - CV030
      - number: '8.3'
        title: Bull / base / bear scenarios
        blocks:
          - type: paragraph
            body: >-
              The bull case requires three conditions to hold simultaneously: Kraken completes its spinoff and achieves
              a standalone SaaS or hybrid-SaaS multiple of 8–12x on a validated $600M+ ARR by 2027; international
              customer growth continues to add 3–5M new accounts per year; and UK regulatory conditions remain stable
              with no further material Ofgem enforcement actions. Under these assumptions, the Kraken entity alone would
              be worth $5–7B and the UK retail business — serving 8M+ customers at improved margins — would contribute a
              further $1.5–2B, implying a group equity value of $6.5–9B before applying an IPO or M&A execution premium.
              The bull case total-return to current investors is modest because the $9B entry price already prices in
              significant Kraken optionality; upside depends on exceeding current ARR expectations. The base case
              assumes Kraken achieves a blended 5–7x ARR multiple at spinoff, UK customer count stabilises at 7.5–8M,
              and the Ofgem enforcement trajectory does not escalate. This yields a Kraken standalone value of $2.5–3.5B
              and a retail utility value of $1.5–2B (at approximately 0.25x £6.9B revenue), implying a group equity
              value of $4–5.5B — representing a 35–55% discount to the entry valuation. The bear case assumes Kraken
              fails to achieve a clean spinoff, suffers one or more additional Ofgem enforcement actions implicating
              billing automation, loses one or more major licensing clients, and sees UK market share plateau as
              Centrica's Hive and Kaluza achieve feature parity. The group then reverts to a pure utility multiple of
              0.15–0.25x £6.9B revenue, implying a group equity value of approximately £1–1.7B ($1.3–2.2B) — a 75–85%
              collapse from the $9B entry price. The bear case is low probability but non-trivial given the Ofgem
              enforcement precedent and energy software multiple compression already underway.
            claimRefs:
              - CV017
              - CV018
              - CV019
              - CV020
              - CV021
              - CV022
              - CV023
              - CV034
              - CV038
      - number: '8.4'
        title: Recommendation and risk-adjusted return
        blocks:
          - type: paragraph
            body: >-
              The overall recommendation is conditional positive at the current $9B valuation, with the condition being
              successful execution of the Kraken spinoff at a defensible software multiple. Confidence is medium,
              reflecting the strength of the UK retail franchise and Kraken's global footprint, offset by the thin
              retail margin, the Ofgem enforcement precedent, and the absence of audited Kraken ARR figures available to
              outside investors. The valuation stance is that the $9B price is neither obviously overvalued nor
              obviously undervalued — it is a bet on a specific outcome (Kraken software re-rating) that is plausible
              but not certain. Any investor entering at $9B must be comfortable holding through a scenario where the
              valuation marks down 40–60% before Kraken spinoff catalysts materialise. Risk rating is high. The
              combination of commodity price exposure, thin retail margin, Ofgem enforcement risk, and Kraken spinoff
              execution risk creates a wide distribution of outcomes. Downside protection is limited because the
              business has no meaningful asset backing (unlike SSE's regulated network assets or Ørsted's contracted
              offshore wind capacity) — the entire premium over book value rests on the Kraken software valuation.
              Target exit horizon for current investors is 2028–2032, assuming a Kraken IPO or secondary transaction
              within 3–5 years of the 2024 CPP round. A 2028 Kraken IPO at the base case ($3B) would return
              approximately 0.3–0.4x on the Kraken portion of a $9B entry, with the retail business potentially
              recovering to 0.25–0.3x revenue as margins improve. Total return to entry investors in the base case is
              estimated at 0.5–0.7x — value-destructive unless Kraken clearly outperforms expectations.
            claimRefs:
              - CV001
              - CV005
              - CV017
              - CV018
              - CV019
