companyProfile:
  summary: >-
    Octopus Energy Group (OEG) is a late-stage private UK energy company founded in 2015 by Greg Jackson. It operates UK
    retail energy supply to 7.5M customers and licenses the Kraken cloud platform to 70M+ utility accounts across 27+
    countries. OEG achieved its first materially profitable year in FY24 (£83M net profit on £12.4B revenue). The Kraken
    Technology spinoff in December 2025 at $8.65B crystallised the SaaS value embedded in the group. OEG holds the
    highest NPS in the UK energy market (Which? Recommended Provider for seven consecutive years) and is a certified B
    Corporation.
  foundedDate: '2015-01-01'
  founders:
    - name: Greg Jackson CBE
      role: CEO and co-founder
      background: >-
        Serial software entrepreneur before OEG; Economics graduate of Cambridge. Primary driver of Octopus's
        mission-led brand, technology strategy, and international expansion. Has resisted strategic sale narrative and
        positioned Kraken for eventual IPO.
      claimRefs:
        - CO003
  foundingLocation: London, United Kingdom
  headquarters: London, United Kingdom
  productSummary: >-
    Two interlocking businesses: (1) OEG Retail — UK direct-to-consumer and SME energy supply on flexible and
    time-of-use tariffs, including Agile Octopus, Saving Sessions, and EV smart charging; (2) Kraken Technology — a
    cloud-native utility management platform (billing, CRM, trading, metering, demand response) licensed to third-party
    utilities globally including E.ON, Origin Energy, Tokyo Gas, and EDF Renewables.
  customerFocus: >-
    Retail: UK households and SMEs seeking transparent, digital-first energy supply. Kraken: Tier-1 and Tier-2 utility
    operators seeking to replace legacy billing infrastructure and add AI-driven demand management capabilities.
  businessModel: >-
    Retail: unit margin on electricity and gas supply, with OEG Generation's solar backstop reducing wholesale exposure.
    Kraken: recurring SaaS licensing fees from utility clients scaled per account managed, supplemented by
    implementation and support revenues.
