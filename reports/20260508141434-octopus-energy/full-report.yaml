      - number: '1.5'
        title: Milestones and regulatory record
        blocks:
          - type: paragraph
            body: >-
              Octopus Energy's milestone record spans a conventional growth narrative interrupted by two major
              government-supported acquisitions and an increasing regulatory compliance burden. The December 2022
              acquisition of Bulb Energy's 1.5 million customers was facilitated by UK government support and marked the
              company's first use of a large-scale inorganic growth event. Full migration of Bulb customers to the
              Kraken platform was completed by mid-2023, validating Kraken's ability to absorb mass transfers. The
              acquisition of Shell Energy Retail UK in late 2023, adding approximately 1.3 million energy customers, was
              migrated in under three months, further demonstrating platform capability. Alongside organic and
              acquisitive growth, Octopus Energy has attracted regulatory scrutiny proportional to its size. In July
              2025 Ofgem fined the company £1.5 million for failing to issue final bills to approximately 34,000
              prepayment meter customers in a timely manner. In May 2025 Ofgem ordered Octopus and nine other suppliers
              to refund a combined £7 million for overcharging standing charges; Octopus's share was £2.64 million plus
              £546,000 in goodwill payments covering errors spanning January 2019 to September 2024. Greg Jackson
              publicly warned in 2024 that UK household energy bills could rise 20% by 2029 due to non-commodity network
              and policy costs, a statement that adds reputational credibility but also signals cost-pressure risk for
              the retail business. The September 2025 Kraken spinoff represents the most significant structural event
              since founding, separating the technology platform into a standalone entity with an estimated valuation of
              up to £10 billion and management that can pursue its own capital agenda independently of the retail group.
