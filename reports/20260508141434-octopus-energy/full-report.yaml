    layout: standard
    summary: >-
      A logic chain from five evidence pillars — market position, product proof, customer traction, financial structure,
      and risk profile — through to the conditional-positive recommendation and the two conditions (Kraken spinoff and
      no further Ofgem enforcement) that would convert it to a firm buy recommendation or trigger a downgrade.
    approximationNotes: >-
      Node descriptions are qualitative analyst summaries. Quantitative trigger thresholds appear in TV005 (Thesis-break
      and kill triggers table).
    claimRefs:
      - CV004
      - CV005
      - CV027
      - CV036
    data:
      nodes:
        - id: n1
          label: UK market leadership (7.5M customers, No.1 NPS)
        - id: n2
          label: Kraken platform (70M accounts, $500M+ ARR claimed)
        - id: n3
          label: International expansion (27 countries, 8+ licensees)
        - id: n4
          label: Thin margin (0.76% EBITDA) plus Ofgem enforcement risk
        - id: n5
          label: $9B valuation anchored by CPP Investments (Q1 2024)
        - id: n6
          label: Kraken spinoff execution — key value catalyst
        - id: n7
          label: CONDITIONAL POSITIVE — hold pending Kraken spinoff structure disclosure and ARR audit
        - id: n8
          label: Bull upgrade trigger — Kraken spinoff at $2B+ plus no Ofgem recurrence
        - id: n9
          label: Bear downgrade trigger — second Ofgem enforcement or major licensee churn
      edges:
        - from: n1
          to: n5
          label: supports
        - from: n2
          to: n5
          label: primary driver
        - from: n3
          to: n5
          label: growth optionality
        - from: n4
          to: n5
          label: discounts
        - from: n5
          to: n6
          label: value unlocked by
        - from: n6
          to: n7
          label: unconfirmed — conditional
        - from: n6
          to: n8
          label: positive scenario
        - from: n4
          to: n9
          label: escalation scenario
  - id: FV002
    title: Valuation sensitivity
    type: bar
    layout: wide
    summary: >-
      Sensitivity of implied Octopus Energy Group enterprise value to three key drivers: Kraken ARR multiple (range 0x
      to 12x), Kraken ARR absolute figure (range $300M to $800M), and retail utility multiple on £6.9B revenue. Each
      series shows the implied group valuation contribution under low, base, and high assumptions for that single
      driver, holding others at base values.
    approximationNotes: >-
      All figures are analyst estimates. Kraken ARR is management-claimed and unaudited. Retail revenue is the FY2024
      reported figure. EV/Revenue multiples derived from comparable set in TV004.
    claimRefs:
      - CV013
      - CV015
      - CV016
      - CV017
      - CV018
      - CV019
    data:
      items:
        - label: 'Kraken ARR multiple — Low: 0x (pure utility)'
          value: 0
          unit: USD millions
          detail: Zero Kraken SaaS credit; entire group valued as retail utility
          tone: negative
        - label: 'Kraken ARR multiple — Base: 6x ARR ($500M)'
          value: 3000
          unit: USD millions
          detail: Base assumption for Kraken software contribution at base ARR
          tone: neutral
        - label: 'Kraken ARR multiple — High: 10x ARR ($500M)'
          value: 5000
          unit: USD millions
          detail: Bull-case SaaS re-rating for Kraken at current ARR level
          tone: positive
        - label: 'Kraken ARR level — Low: $300M at 6x'
          value: 1800
          unit: USD millions
          detail: ARR plateaus post-spinout; multiple held constant
          tone: negative
        - label: 'Kraken ARR level — Base: $500M at 6x'
          value: 3000
          unit: USD millions
          detail: Management-claimed ARR at base multiple
          tone: neutral
        - label: 'Kraken ARR level — High: $800M at 6x'
          value: 4800
          unit: USD millions
          detail: ARR growth to $800M by FY2027 at base multiple
          tone: positive
        - label: 'UK retail multiple — Low: 0.15x on £6.9B rev'
          value: 1315
          unit: USD millions
          detail: Pure utility floor multiple; no tech premium
          tone: negative
        - label: 'UK retail multiple — Base: 0.25x on £6.9B rev'
          value: 2191
          unit: USD millions
          detail: Blended peer multiple between Centrica and SSE
          tone: neutral
        - label: 'UK retail multiple — High: 0.50x on £6.9B rev'
          value: 4382
          unit: USD millions
          detail: SSE-like premium if regulated assets credited
          tone: positive
  - id: FV003
    title: Valuation / return range
    type: range
    layout: wide
    summary: >-
      Bull, base, and bear implied enterprise value ranges for Octopus Energy Group in USD billions, with the $9B CPP
      Investments entry price shown as a reference point. Bull case requires Kraken SaaS re-rating at spinoff; bear case
      assumes reversion to pure-utility multiple.
    approximationNotes: >-
      All ranges are analyst estimates using comparable multiples from TV004. Exchange rate assumed at $1.27/GBP (2024
      average). No audited financial data underlies these estimates.
    claimRefs:
      - CV001
      - CV017
      - CV018
      - CV019
      - CV024
    data:
      items:
        - label: Bear case implied EV (USD billions)
          low: 1.3
          mid: 1.8
          high: 2.2
          unit: $B
          detail: >-
            Pure utility multiple 0.15–0.25x on £6.9B revenue; Kraken spinoff abandoned or failed; based on TV003 bear
            assumptions
        - label: Base case implied EV (USD billions)
          low: 4
          mid: 4.8
          high: 5.5
          unit: $B
          detail: Kraken 5–7x on $500M ARR plus retail at 0.25x revenue; base assumptions from TV003
        - label: Bull case implied EV (USD billions)
          low: 6.5
          mid: 7.5
          high: 9
          unit: $B
          detail: Kraken 8–12x on $600M+ ARR plus retail at 0.3x revenue; Kraken spinoff executed cleanly
        - label: Entry valuation reference (CPP Investments, Q1 2024, USD billions)
          low: 9
          mid: 9
          high: 9
          unit: $B
          detail: Most recent known primary transaction; reference price for investor return calculation
  - id: FV004
    title: Investment KPIs
    type: kpi
    layout: standard
    summary: >-
      IC-ready scorecard for Octopus Energy Group across seven investment dimensions. Each KPI reflects a directional
      analyst rating with a supporting rationale grounded in evidence from this diligence report, using public sources
      only as of 2026-05-08.
    approximationNotes: >-
      Ratings are qualitative analyst judgements based on public evidence only. They are not a formal scoring model and
      do not imply a specific probability of return.
    claimRefs:
      - CV001
      - CV002
      - CV003
      - CV004
      - CV033
      - CV035
      - CV042
    data:
      items:
        - label: Market opportunity
          value: Positive
          detail: >-
            UK energy transition plus global utility software addressable market; multi-decade structural tailwind
            confirmed by policy and technology
        - label: Product differentiation
          value: Neutral
          detail: >-
            Kraken billing automation failure (Ofgem July 2025) tempers otherwise strong product differentiation claim;
            ARR unaudited
        - label: Customer proof
          value: Positive
          detail: 7.5M UK customers, 70M global accounts; E.ON Next, Tokyo Gas, National Grid US as Kraken licensees
        - label: Financial health
          value: Negative
          detail: 0.76% EBITDA margin, undisclosed cash position, commodity exposure; no runway cushion publicly confirmed
        - label: Risk profile
          value: Negative
          detail: >-
            High risk — Ofgem enforcement precedent, commodity price exposure, Kraken spinoff complexity, thin margin
            create wide downside distribution
        - label: Valuation support
          value: Neutral
          detail: >-
            $9B defensible only under Kraken SaaS re-rating assumption; base case implies 40–55% write-down from entry
            price
        - label: Evidence quality
          value: Neutral
          detail: >-
            Strong public evidence on market and customers; weak on Kraken ARR, cap structure, spinoff terms, and cash
            position
