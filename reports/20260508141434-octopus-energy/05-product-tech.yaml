    body: >-
      Octopus's aggregated VPP of EVs, heat pumps, and batteries totalling 2GW positions it as a grid-stability
      partner and live proof-of-concept for Kraken Asset enterprise clients, creating a self-reinforcing B2B
      and B2C value loop.
