company:
  name: Octopus Energy Group
chapter:
  number: 5
  title: Product and Technology
  summary: >-
    Octopus Energy Group's product and technology stack comprises three interlocking layers: a consumer-facing
    retail energy business with differentiated smart tariffs, the Kraken cloud platform serving as the operating
    system for utility operations globally, and Octopus Energy Generation managing £7B+ in renewable assets.
    The Kraken platform — built on AWS, Python, and Django — automates billing, CRM, smart-meter integration,
    demand flexibility, and field operations for 70 million customer accounts across 17 million energy accounts
    under licence, targeting 100 million by 2027 with $500M in committed ARR. Smart tariffs including Agile,
    Intelligent Octopus Go, Cosy, Flux, and Zero Bills are both consumer products and live proof-points of
    Kraken's dispatch capability. The virtual power plant aggregates 2GW from EVs, heat pumps, and batteries.
    Two Ofgem enforcement actions in 2025 highlight compliance gaps in prepayment and standing-charge billing
    edge cases, requiring investor attention to platform quality controls in regulated environments.

sections:
  - id: SE-01
    title: Product Suite and Customer Workflow Integration
    body: >-
      Octopus Energy Group addresses the full energy customer lifecycle across three main product lines: retail
      energy supply with smart tariffs, the Kraken B2B platform, and the Octopus Energy Generation investment
      arm. From a customer workflow perspective, the retail proposition begins at acquisition — predominantly
      digital, no-exit-fee switching — progresses through onboarding onto smart tariffs, then into ongoing
      engagement via half-hourly data, automated direct debit, and app-based controls. Smart tariffs are the
      primary product differentiator: Agile Octopus offers half-hourly dynamic pricing linked to wholesale
      market rates, rewarding customers who shift demand to low-carbon, low-cost periods. Intelligent Octopus
      Go targets EV owners, charging vehicles automatically when wholesale prices are cheapest, delivering
      8p/kWh overnight and savings of up to 85% versus public charging. Cosy Octopus is designed for heat pump
      users, offering subsidised rates in the mornings and afternoons when heat pumps are most efficient. Flux
      is for solar-and-battery homes, paying export and import at dynamic rates. Fan Club rewards customers near
      wind farms with discounts when those farms are generating. Zero Bills offers a home with solar and battery
      fitted by Octopus at zero ongoing energy bills, eliminating the customer's energy cost entirely. For
      businesses, the Shape Shifters tariff suite including Trio and Agile variants, Electric Match, and Wind
      Works target commercial and industrial customers. Electroverse aggregates EV public charging across Europe
      in a single roaming account, extending the product footprint into public mobility infrastructure.
      Collectively these products position Octopus as a whole-home energy manager rather than a commodity
      supplier, with the Kraken platform underpinning all customer-side orchestration from smart-meter data
      ingestion to dispatch commands and billing settlement. The Octopus Electric Vehicles subsidiary offers
      salary-sacrifice EV leasing, tying customers deeper into the ecosystem and generating additional data
      for the Kraken demand-dispatch engine. Octopus acquired Heatmiser to control heat pump schedules and
      integrate them into Kraken's VPP dispatch layer, extending the company's vertically integrated stack
      from software through hardware into homes. OEG adds a supply-side dimension by owning and managing
      generation assets, enabling Octopus to increasingly match customer load with its own renewable output.
    claimRefs:
      - CE001
      - CE002
      - CE003
      - CE004
      - CE005
      - CE006
      - CE007
      - CE008

  - id: SE-02
    title: Kraken Platform Architecture and Capabilities
    body: >-
      Kraken is the central technology asset of Octopus Energy Group. It is a cloud-native utility operating
      system built on Amazon Web Services using Python and Django, designed from scratch to handle the full stack
      of utility operations: customer management and CRM, real-time billing, smart-meter data processing, DER
      aggregation, and field workforce management. The platform is structured around three principal components.
      Kraken Customer handles billing, direct-debit management, digital communications, and customer service
      workflows. Kraken Asset (formerly KrakenFlex) is the DER aggregation and virtual power plant dispatch
      engine that communicates with smart EV chargers, heat pumps, and battery systems to shift load in response
      to wholesale price signals or grid stability needs. Kraken Field manages field service operations including
      heat-pump installation scheduling and smart-meter rollout. Together these modules provide an end-to-end
      platform that competitors running legacy SAP or Oracle utilities software cannot easily replicate. AWS
      infrastructure underpins global scalability: Octopus cited AWS as enabling rapid international expansion,
      and Kraken today manages 17 million energy accounts under licence. The Skyrocket machine learning system
      within Kraken automates up to 40% of all digital customer communications, reducing agent handle time and
      improving NPS scores. Kraken's API-first architecture enables seamless licensing to third parties: EDF,
      E.ON Next, Origin Energy, Plenitude, Tokyo Gas, Cuckoo Broadband, Severn Trent Water, and National Grid
      US are all clients. The platform achieves $500M in committed annual recurring revenue as of FY2024, with
      Octopus targeting 100 million total accounts by 2027. The Kraken spin-off announced in March 2025 and
      completed September 2025 gives Kraken independent governance, enabling faster enterprise sales cycles
      and a potential future IPO without strategic conflicts with Octopus retail. ISO/IEC 27001 certification
      is claimed for information security management, though the precise scope requires independent verification.
    claimRefs:
      - CE009
      - CE010
      - CE011
      - CE012
      - CE013
      - CE014
      - CE015
      - CE016

  - id: SE-03
    title: Virtual Power Plant and Demand Flexibility
    body: >-
      Octopus Energy's virtual power plant is among the most operationally mature consumer-side flexibility
      assets in the UK energy system. By aggregating load from electric vehicles, heat pumps, and home batteries
      enrolled in smart tariffs, Kraken Asset dispatches approximately 2GW of flexible demand — a figure Octopus
      claims represents the world's largest consumer-facing VPP. This capability has commercial value on multiple
      dimensions. First, it enables Octopus to participate in Balancing Mechanism and ancillary service markets,
      earning revenue from National Grid ESO for demand turn-up and turn-down. Second, it allows Octopus to
      demonstrate to its licensed utility clients that Kraken Asset is a production-grade DER dispatch system,
      accelerating enterprise sales. Third, it deepens customer lock-in by giving smart-tariff customers
      measurable financial benefits from participation. The Intelligent Octopus Go tariff requires only that a
      customer connect an EV and set a departure time; Kraken's ML system handles all charge scheduling
      automatically. Ofgem data from January 2024 indicates that more than half of all UK domestic smart TOU
      EV tariff customers — out of 502,000 total — are on Octopus tariffs, demonstrating dominant EV flexibility
      market position before widespread fleet electrification. The Fan Club tariff creates hyperlocal demand
      response by giving discounts to customers near specific wind farms when those farms are generating,
      reducing balancing costs and transmission losses. Octopus Energy Generation's asset base of 300 renewable
      projects across 8 countries feeds market intelligence back into Kraken's wholesale price forecasting,
      completing a vertically integrated data loop from generation through dispatch to customer billing. The
      integration of Heatmiser thermostats extends VPP-eligible assets to heat pumps, where controllable timing
      is critical for grid stability. Roadmap items publicly discussed include V2G integration as EV battery
      technology matures, and further expansion of battery storage participation in grid-balancing markets.
    claimRefs:
      - CE017
      - CE018
      - CE019
      - CE020
      - CE021
      - CE022

  - id: SE-04
    title: Deployment, Integration, Reliability, and Roadmap
    body: >-
      Kraken's deployment model is cloud-native on AWS, enabling Octopus to enter new geographic markets by
      standing up regional instances without significant on-premise infrastructure. This was demonstrated by the
      rapid migration of 1.5 million Bulb Energy customers to Kraken infrastructure within six months in 2023,
      and the subsequent migration of 1.3 million Shell Energy customers in late 2023. Both migrations proceeded
      without material service disruption, and Octopus uses these as reference benchmarks in enterprise client
      conversations. Integration architecture is API-first: licensed utilities connect to Kraken via RESTful APIs
      for billing, metering data exchange, and customer management, while Kraken Field integrates with external
      workforce management and mapping platforms. Smart-meter data is ingested via the UK's Data Communications
      Company network, with equivalent integrations in each international market. Reliability is supported by
      AWS multi-region architecture and auto-scaling, though the concentration on a single cloud provider creates
      a potential single point of failure that investors should assess. Customer-facing reliability is evidenced
      by Trustpilot scores of 4.8 out of 5 from over 400,000 reviews and Which? Recommended Provider status for
      eight consecutive years. Known reliability incidents include two Ofgem billing enforcement actions: a
      £1.5M fine in 2025 for failure to issue final bills to 34,000 prepayment customers, and a May 2025 refund
      order of £2.64M plus £546K goodwill for standing-charge overcharging errors. These suggest that despite
      high-level platform sophistication, billing edge cases in certain regulated customer segments require
      stronger quality-control tooling. The Kraken roadmap targets 100M accounts by 2027 via international
      expansion in the US, Japan, and Europe. Heat pump integration, V2G dispatch, AI-driven contact-centre
      automation, and adjacent verticals such as water utilities extend the addressable market further.
    claimRefs:
      - CE023
      - CE024
      - CE025
      - CE026
      - CE027

  - id: SE-05
    title: Differentiation — Technology IP Data and Brand
    body: >-
      Octopus Energy's competitive differentiation rests on four pillars. First, proprietary technology: the
      Kraken platform was built ground-up for modern cloud environments and smart-meter data volumes, avoiding
      the technical debt inherent in legacy Oracle and SAP utility platforms. The Skyrocket ML system and the
      Kraken Asset dispatch engine represent genuine IP in automated demand-response and customer communication
      automation that would take competitors years to replicate. Second, data advantage: with 12.9 million meters
      under management in the UK alone and 70 million accounts globally, Octopus accumulates a proprietary
      dataset of consumption patterns, device behaviour, and wholesale-price response that informs tariff design,
      ML model training, and generation asset dispatch. Competitors without smart-metering at scale cannot build
      comparable datasets. Third, brand equity: Octopus has achieved word-of-mouth brand recognition that reduces
      customer acquisition cost, evidenced by consistently high Trustpilot scores and Which? recognition despite
      minimal traditional advertising spend. The 1-in-4 UK households served metric and the January 2025
      milestone of surpassing British Gas reinforce brand salience. Fourth, regulatory relationships: Octopus has
      been designated Supplier of Last Resort multiple times, demonstrating regulatory trust and gaining access
      to customer bases at below-market cost. Participation in the UK Smart Data scheme and early adoption of
      TOU tariffs have established Octopus as a policy partner for Ofgem and DESNZ. Key IP items include the
      Heatmiser acquisition for heat pump VPP control, the Electroverse EV charging network providing roaming
      data and network effects, and the Skyrocket ML system. Barriers to replication are substantial: rebuilding
      a Kraken-equivalent platform from scratch would require an estimated five to seven years and hundreds of
      millions of pounds, explaining why major utilities pay recurring licence fees rather than build internally.
    claimRefs:
      - CE028
      - CE029
      - CE030
      - CE031
      - CE032

  - id: SE-06
    title: Trust Safety Security Privacy and Compliance
    body: >-
      Operating a utility serving 1-in-4 UK households and processing billing for 70 million global accounts
      requires rigorous security, privacy, and compliance controls. Octopus claims ISO/IEC 27001 certification
      for information security management across its Kraken platform, though independent verification of
      certification scope and current status requires diligence confirmation. The group participates in the UK
      Smart Data scheme, indicating engagement with evolving open-energy-data regulations. GDPR compliance is
      embedded in Kraken's EU deployments across Germany, France, Italy, and Spain, with data residency
      requirements met via AWS regional infrastructure. Smart-meter data handling is governed by the DCC's data
      access controls and Ofgem's licence conditions. Consumer safety obligations include prepayment meter
      protections (directly relevant to the July 2025 Ofgem enforcement), vulnerability customer identification
      via the Priority Services Register, and regulatory debt management rules. The Ofgem billing fine of £1.5M
      and the refund order of £2.64M plus £546K goodwill in 2025 reveal gaps in compliance monitoring,
      particularly for prepayment and standing-charge billing edge cases. These incidents are financially modest
      relative to £12.4B revenue but are reputationally significant and indicative of quality-control gaps in
      billing-cycle exception handling for regulated customer segments. Octopus has invested heavily in its
      customer operations team, scaling from 50 to over 4,000 UK staff, and scores well on Trustpilot and
      Which?, suggesting that customer-facing service quality is strong even where backend billing automation
      has had isolated failures. For the Kraken B2B platform, security is critical: licensed utilities entrust
      customer data and billing infrastructure to Kraken, meaning a significant data breach or billing outage
      at a licensed client would carry severe reputational consequences for Kraken's enterprise sales pipeline.
      Penetration testing, SOC monitoring, and supply-chain security for third-party integrations are areas
      requiring diligence confirmation beyond current public disclosures.
    claimRefs:
      - CE033
      - CE034
      - CE035
      - CE036
      - CE037

