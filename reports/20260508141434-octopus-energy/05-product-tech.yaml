      topic: platform-reliability
      missingEvidence: >-
        Kraken B2B SLA terms, uptime metrics, and any recorded platform outages or priority-1 incidents
        at licensed client sites are not publicly disclosed by Octopus or Kraken.
      whyItMatters: >-
        Enterprise utility clients depend on Kraken for billing continuity; undisclosed outages could
        affect the B2B pipeline and contract renewals, representing material commercial risk.
