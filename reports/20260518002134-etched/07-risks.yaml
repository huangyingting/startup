    - id: "CR002"
      statement: "Because Sohu's silicon hardcodes attention, any shift in the dominant model architecture away from dense Transformer decoders makes the chip architecturally stranded with no recovery path short of a complete ASIC redesign requiring 3–4 years and an estimated $100–400M in new NRE costs."
      type: "inferred"
      topic: "transformer-lock-in"
      sourceRefs: [SR015, SR025]
      confidence: "medium"
      freshness: "current"
