company:
  name: "Etched"
chapter:
  number: 7
  title: "Risks"
  summary: >-
    Etched faces a five-cluster risk surface that is unusually severe for a Series-A chip startup: (1)
    Technology/architecture risk — the hardcoded Transformer-only ASIC has no software-patch path and faces
    potential architectural obsolescence if state-space models (Mamba, RWKV) or mixture-of-experts paradigms
    displace Transformer decoder inference within 4–7 years; (2) Regulatory/geopolitical/legal risk — US export
    controls under EAR/BIS, CHIPS Act restrictions, EU AI Act compliance requirements, and IP patent exposure from
    NVIDIA and Arm Holdings all represent material legal obligations; (3) Competitive displacement risk — NVIDIA's
    Blackwell/Rubin roadmap, AMD MI300X, hyperscaler captive silicon (Google TPU, AWS Trainium, Microsoft Maia),
    and direct inference ASIC competitors (Groq, Cerebras) create a crowded field where Sohu must clear a 10x
    throughput bar to justify customer switching costs; (4) Execution/team risk — the CEO is 23 years old with no
    chip-to-production track record, the team is ~30 people for a full-stack ASIC development, and there is no
    prior tape-out history; (5) Financial/runway risk — ASIC tape-out at TSMC N3/N4 costs $50–200M, a Series B
    is required before any product revenue, and the combination of burn rate and ASIC NRE costs creates a
    narrow window before runway exhaustion. Etched has zero revenue, zero customers, and zero design wins as
    of Q1 2026; the Graphcore failure pattern — strong architecture but no commercial traction — is the most
    directly applicable cautionary analog.

sections:
  - id: "SR001"
    title: "Technology and Architecture Risks"
    body: |
      The primary technology risk for Etched is the irreversibility of its architectural bet. The Sohu ASIC
      hardcodes Transformer attention mechanisms directly in silicon: the wiring for multi-head attention,
      key-value caching, and softmax computation is physically instantiated in hardware. Once tape-out is
      committed — a decision with an estimated $50–200 million price tag at TSMC's N3/N4 process node —
      there is no software-layer path to recover if the Transformer paradigm is materially displaced
      before Sohu reaches commercial revenue.

      The architectural displacement risk is not hypothetical. Mamba (structured state-space models) and
      RWKV have demonstrated competitive performance with Transformers on language-modeling benchmarks
      while eliminating the KV-cache — the exact data structure Sohu's silicon is optimized to accelerate.
      Mixture-of-Experts (MoE) models such as Mixtral 8x7B have also shown that inference at scale can
      be achieved with a fundamentally different computational graph than dense-decoder Transformers.
      If SSM or MoE architectures achieve production adoption at hyperscalers within 4–6 years, Sohu's
      silicon is architecturally stranded with no recovery path short of a full redesign.

      Beyond architecture risk, the supply chain for High Bandwidth Memory (HBM) is concentrated among
      three manufacturers — SK Hynix, Samsung, and Micron — with AI chip startups holding essentially
      no leverage in the allocation queue relative to NVIDIA and AMD. A supply constraint on HBM3E
      would delay Sohu production regardless of tape-out success. TSMC itself represents a single-point
      dependency: there is no alternative N3/N4 foundry with sufficient capacity if TSMC faces disruption
      from Taiwan Strait escalation, earthquake, or other force-majeure events. Finally, PPA (power,
      performance, area) targets for a first-ever ASIC design are frequently missed on first silicon;
      a respin adds 12–18 months and $20–50 million in additional cost.
    claimRefs: [CR001, CR002, CR003, CR004, CR005, CR006, CR007, CR008]
    tableRefs: [TR001]
    figureRefs: [FR002, FR003]

  - id: "SR002"
    title: "Regulatory, Geopolitical, and Legal Risks"
    body: |
      Etched operates at the intersection of three distinct legal and regulatory risk vectors. First,
      US export controls administered by the Bureau of Industry and Security (BIS) under the Export
      Administration Regulations (EAR) require export licenses for advanced semiconductor items. The
      BIS Entity List restricts exports to hundreds of parties of concern; any sale of Sohu chips to
      international customers requires verification against the Entity List and potentially an export
      license application. The October 2023 Federal Register rule tightening export controls on
      semiconductor manufacturing items also imposes restrictions on the advanced logic chip supply
      chain, affecting how TSMC-manufactured chips flow to customers in restricted jurisdictions.

      Second, the CHIPS and Science Act (2022) provides up to $52 billion in semiconductor manufacturing
      incentives, but any company receiving CHIPS Act funding accepts restrictions including a 10-year
      prohibition on material expansion of advanced chip manufacturing in countries of concern. While
      Etched itself may not seek direct CHIPS Act funding, its manufacturing partner TSMC does — and
      supply agreements with CHIPS-funded fabs carry compliance obligations that could constrain
      Etched's ability to serve certain international customers.

      Third, IP and patent exposure creates legal risk. NVIDIA has demonstrated willingness to pursue
      patent litigation against semiconductor competitors; Arm Holdings licenses its ISA and
      microarchitecture broadly, and any chip incorporating Arm processor cores requires a current
      license agreement. If Sohu incorporates any Arm-based control cores (common in complex ASICs),
      Etched carries ongoing Arm licensing obligations. Trade secret risk is also elevated: engineers
      who join Etched from NVIDIA, Meta, or Google may face claims of IP misappropriation from their
      former employers. The EU AI Act (2024) introduces a fourth regulatory dimension: its provisions
      on general-purpose AI (GPAI) model compliance affect Etched's target customers and could create
      indirect chip compliance requirements for the inference infrastructure layer.
    claimRefs: [CR009, CR010, CR011, CR012, CR013, CR014, CR015, CR016, CR017, CR018, CR019]
    tableRefs: [TR002]
    figureRefs: [FR001]

  - id: "SR003"
    title: "Competitive Displacement and Obsolescence Risks"
    body: |
      The competitive risk facing Etched is more severe than for most chip startups because the
      primary competitor — NVIDIA — has both a dominant market position and a multi-generational
      roadmap that continuously raises the performance threshold Sohu must clear. NVIDIA's Blackwell
      architecture (H100 successor, launched 2024–2025) delivered a 2–4× inference throughput
      improvement over Hopper-class silicon. The Rubin architecture, expected 2026–2027, is expected
      to extend this lead further. For Etched to win customers, Sohu must deliver not a single-point
      performance advantage but a sustained advantage across the entire NVIDIA roadmap — a requirement
      that grows harder with each NVIDIA generation because the gap Sohu must close increases if
      Sohu's tape-out slips by even one generation.

      Beyond NVIDIA, AMD MI300X/MI325X chips have captured meaningful AI inference market share
      particularly among inference-as-a-service platforms running open-source models. AMD's competitive
      position at lower price points than NVIDIA creates a two-sided price/performance squeeze for
      Etched: NVIDIA sets the performance ceiling, AMD sets the cost floor. Hyperscaler captive silicon
      programs — Google TPU v6 (Trillium), AWS Trainium 2, and Microsoft Maia 100 — disintermediate
      the market for the highest-value potential Etched customers; if hyperscalers deploy entirely
      captive silicon for their own inference workloads, Etched's addressable market contracts to
      inference-as-a-service platforms and enterprise ML teams that cannot build their own silicon.

      Direct AI inference ASIC competitors Groq (LPU) and Cerebras (CS-3) are already in production
      with real customers and published performance benchmarks. Etched enters a market where at least
      two direct hardware analogs have a 2–3 year head start on customer relationships and production
      experience. Graphcore's failure — strong technical architecture, no sustained commercial traction
      — is the most instructive precedent: specialized AI chip companies that cannot convert
      architectural advantages into customer commitments before their capital runs out tend to fail
      regardless of technical merit.
    claimRefs: [CR020, CR021, CR022, CR023, CR024, CR025, CR026]
    tableRefs: [TR003]
    figureRefs: []

  - id: "SR004"
    title: "Execution, Team, and Operational Risks"
    body: |
      Etched's execution risk profile is unusually high even by chip startup standards. The company
      is attempting to build the world's first production Transformer-inference ASIC with a team of
      approximately 30 people, no prior tape-out track record as an organization, and a CEO (Gavin
      Uberti) who is 23 years old with no prior chip-to-production experience. The team includes
      engineers who have previously worked at NVIDIA, Meta, and Google, providing relevant domain
      expertise, but the organizational capability to execute a multi-year full-stack ASIC program —
      from RTL design through DFT, physical design, TSMC PDK integration, and first-silicon bring-up
      — has not been publicly demonstrated by this team at this scale.

      The ASIC development cycle creates a structural execution timeline risk. From tape-out submission
      to first-silicon return is approximately 6–9 months; from first silicon to volume production is
      an additional 12–18 months. If Etched's tape-out is in 2025–2026 (the most plausible window
      given the 2024 Series A), first revenue cannot realistically occur before H2 2027 at the
      earliest — and only if first silicon meets performance targets, SDK development is complete,
      and a customer evaluation completes within 6–12 months of silicon delivery.

      The software/SDK execution risk is particularly underappreciated. The Graphcore failure was
      driven substantially by SDK immaturity that prevented customers from efficiently porting their
      models to Graphcore's architecture. Etched has disclosed no SDK, no compiler, no software
      stack, and no developer program as of Q1 2026. Building a performant MLIR/XLA compiler backend
      or custom SDK for Sohu is a multi-year engineering effort that requires a separate software team
      with different skills from the hardware team. A hardware-only approach that assumes customer
      self-service SDK adoption is not a viable commercial path for a chip startup without established
      ecosystem relationships.
    claimRefs: [CR027, CR028, CR029, CR030, CR031, CR032]
    tableRefs: [TR004]
    figureRefs: [FR004]

  - id: "SR005"
    title: "Financial and Investment Risks"
    body: |
      Etched's financial risk profile is dominated by three compounding factors: (1) extremely high
      capital intensity with uncertain timing, (2) zero current revenue with no line of sight to first
      revenue before H2 2027 at best, and (3) a funding market that has shown reduced appetite for
      deep-tech hardware investments outside AI hyperscaler-backed companies since 2023.

      ASIC development at TSMC's N3/N4 process node carries an estimated total program cost of
      $50–200 million for a single tape-out, depending on mask count, design complexity, and the
      number of validation iterations required. This cost is committed before a single chip is
      delivered to a customer. Etched's $120 million Series A provides a runway of approximately
      18–36 months at typical pre-tape-out burn rates ($3–6 million per month), but this runway
      may be insufficient to bridge from tape-out through first silicon, customer evaluation, and
      design win — particularly if the tape-out requires one or more respins.

      A Series B raise will be required before any product revenue is realized, making Etched's
      financial survival entirely dependent on VC market conditions at a time when interest rates,
      AI investment sentiment, and startup funding multiples are all uncertain. If AI spending
      growth slows or pauses in 2026–2027, the inference chip market that Etched is targeting may
      contract, reducing both customer willingness to adopt new hardware and investor appetite to
      fund pre-revenue chip startups. Revenue concentration risk is also severe: even if Etched
      reaches production, the first 3–5 customers are likely to represent 60–80% of initial revenue,
      creating extreme exposure to any single-customer volume reduction or exit.
    claimRefs: [CR033, CR034, CR035, CR036, CR037, CR038, CR039, CR040]
    tableRefs: [TR005]
    figureRefs: []

