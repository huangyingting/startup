          detail: "Low end assumes high burn rate and large tape-out cost; high end assumes conservative spending and tape-out at lower NRE range."
        - label: "Series B raise required"
          low: 100
          mid: 200
          high: 500
          unit: "$M"
          detail: "Must cover tape-out (if not funded from Series A), first-silicon bringup, SDK development, customer evaluation support, and production ramp NRE before first revenue."
        - label: "Months from tape-out to first revenue"
          low: 9
          mid: 18
          high: 36
          unit: "months"
          detail: "Low assumes first-silicon success, rapid customer evaluation, no respin; high assumes one respin plus extended 12–24 month customer procurement cycle."
    claimRefs: [CR033, CR034, CR035, CR036, CR037, CR038]

callouts:
  - type: "risk"
    title: "Architecture lock-in is irreversible and market-timing dependent"
    body: "The hardcoded Transformer-only architecture is both Etched's primary performance differentiator and its existential risk. Once tape-out is committed, the company's commercial viability depends entirely on Transformer architectures remaining the dominant inference paradigm for the 5–8 year commercial life of the chip. There is no software patch path if this assumption fails."
    claimRefs: [CR001, CR002, CR003]
  - type: "risk"
    title: "No design wins or customers after 2+ years of operation is a blocking diligence signal"
    body: "Etched has zero announced customers, zero design wins, zero signed LOIs, and zero publicly named evaluation partners as of Q1 2026 — more than two years post-founding and twelve months post Series A. The Graphcore precedent shows that specialized AI chip companies can fail to convert strong architecture into commercial traction even with substantial funding."
    claimRefs: [CR026, CR027, CR040]
  - type: "recommendation"
    title: "Diligence must confirm tape-out schedule, burn rate, and at least one named evaluation partner"
    body: "Before investment, diligence must verify: (1) current tape-out schedule and NRE commitment to date, (2) monthly burn rate and runway projection, (3) whether any company has received a pre-silicon engineering briefing under NDA, and (4) whether Arm licensing is in place. These four data points determine whether the financial and commercial risks are within an acceptable range."
    claimRefs: [CR033, CR034, CR035, CR036]

