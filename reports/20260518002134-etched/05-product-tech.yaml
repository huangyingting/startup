callouts:
  - calloutType: "risk"
    title: "Architecture Lock-In Is the Defining Technical Risk"
    body: "Sohu's hardwired Transformer attention is simultaneously its performance advantage and its existential risk. If any non-Transformer architecture (Mamba, RWKV, or a future hybrid) captures a significant share of LLM inference workloads before Sohu reaches volume production, the chip becomes obsolete in its primary market. The history of domain-specific silicon shows that single-architecture bets can become stranded assets within one product generation. Unlike GPU incumbents that can reconfigure workloads with software updates, Sohu's architecture is permanent post-manufacture."
    claimRefs: [CE012, CE014, CE036, CE037]
  - calloutType: "risk"
    title: "No Production Silicon, No SDK, No Customer: The Three Zeros"
    body: "As of Q1 2026, Etched has no production silicon, no public SDK or documentation, and no announced customer or design win. This is consistent with a pre-tape-out semiconductor startup at 18-24 months before first revenue — but it means every commercial assumption (performance claims, cost-per-token advantages, model compatibility) is based entirely on company-stated projections without independent validation. Diligence requires treating all technical claims as hypothetical until first silicon is benchmarked."
    claimRefs: [CE004, CE005, CE018, CE019, CE028]

