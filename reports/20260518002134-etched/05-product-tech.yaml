          tone: "neutral"
        - id: "n3"
          label: "Inference Runtime Initialization"
          detail: "Runtime loads compiled model onto Sohu chip via PCIe DMA; allocates HBM for model weights and initializes KV-cache for session"
          tone: "neutral"
        - id: "n4"
          label: "Inference Request (Token Prefill)"
          detail: "Customer submits prompt; runtime executes prefill pass — attention over full input sequence computed by hardwired engine, populating KV-cache in HBM"
          tone: "positive"
        - id: "n5"
          label: "Autoregressive Decode (Hardwired Attention)"
          detail: "Sohu hardwired attention engine reads KV-cache from HBM and computes next-token attention at full hardware speed without software kernel dispatch overhead"
          tone: "positive"
        - id: "n6"
          label: "Output Token Stream Returned"
          detail: "Decoded token returned via PCIe to host CPU; runtime streams token to caller; autoregressive loop repeats until EOS token or max-length reached"
          tone: "positive"
