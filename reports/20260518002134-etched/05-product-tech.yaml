  title: "Product & Technology"

sections:
  - id: "SE001"
    title: "Product Definition and Sohu Chip Specification"
    body: |
      Etched's sole product is the Sohu ASIC — a purpose-built inference accelerator that permanently encodes the Transformer self-attention computation in silicon. The company's central premise is that by hardwiring the attention mechanism rather than emulating it on programmable logic, Sohu eliminates the instruction-dispatch and memory-management overhead that limits GPU throughput on autoregressive Transformer workloads. According to Etched, this architectural choice produces approximately 10× the throughput of an NVIDIA H100 for Transformer inference tasks, though this claim has not been independently verified with production silicon.

      Sohu targets the inference phase of LLM deployment, not training. The chip is designed for Transformer-only architectures: dense decoder models (GPT-4 class, LLaMA, Mistral, Falcon) and encoder-decoder models (T5 class). It does not support non-Transformer architectures such as Mamba state-space models or purely recurrent networks. The chip's specialization means any customer adopting Sohu commits to the Transformer paradigm for the chip's useful life.

      As of Q1 2026, Sohu does not exist as production silicon. The company has claimed that tape-out on TSMC's 4N process node is in progress, but no engineering samples have been publicly demonstrated. No product specification sheet, die photograph, or third-party benchmark has been published. The product page at etched.com/sohu returns a 404 error. Etched's commercial product assets are currently: a company homepage (etched.com), a fundraising announcement ($120M Series A, June 2024), and two founders' professional histories at Google.
    tableRefs: [TE001, TE002]
    figureRefs: [FE001]

  - id: "SE002"
    title: "Architecture — Hardened Transformer Attention Silicon"
    body: |
      Etched's core architectural thesis is that the Transformer attention operation — scaled dot-product multi-head self-attention as introduced by Vaswani et al. in "Attention Is All You Need" (2017) — is sufficiently stable and computationally dominant to justify permanent silicon encoding. In a conventional GPU, attention is computed by CUDA kernels (including FlashAttention-optimized variants) on general-purpose SIMD compute units. Sohu's attention engine replaces this programmable path with hardwired logic gates whose function cannot be changed post-manufacture.

      The memory architecture is the second key design dimension. Modern LLM inference is bottleneck-limited by memory bandwidth, not raw compute, because each token generation step requires reading the full KV-cache and model weights from DRAM. Sohu almost certainly integrates High Bandwidth Memory (HBM) stacks to address this, following the same path as NVIDIA H100 (HBM3) and Groq LPU (SRAM-dominant). The specific HBM generation and stack count have not been disclosed. HBM bandwidth determines how many tokens per second the chip can decode, which is the primary customer-visible performance metric.

      The hardwired attention engine creates a meaningful architectural trade-off: it achieves maximum silicon efficiency for the attention computation but permanently excludes support for future architectures that may become dominant. Mamba and other state-space models represent the most visible alternative paradigm; these architectures replace attention with linear recurrence and cannot run on Sohu's attention engine. Etched is therefore making a high-conviction bet that Transformer attention will remain the dominant LLM inference paradigm for the duration of Sohu's commercial life, which typically spans 3-5 years from first production.
    tableRefs: [TE003]
    figureRefs: [FE002]

  - id: "SE003"
    title: "Manufacturing, Maturity, and Technology Dependencies"
    body: |
      Sohu is designed for TSMC's 4N process node, a 4nm-class advanced node that provides high transistor density and power efficiency appropriate for AI inference chips. TSMC's 4N is a customer-specific variant of the N4 process family and requires a foundry relationship with significant minimum wafer commitments. Access to leading-edge TSMC capacity is competitively constrained; major customers including NVIDIA, AMD, Apple, and Qualcomm hold priority allocation. As a startup with no prior TSMC production history, Etched must negotiate wafer allocation as a new customer, which typically involves accepting smaller batch sizes and longer lead times.

      The chip's manufacturing maturity as of Q1 2026 is pre-silicon: tape-out has been claimed as in progress but not confirmed. First-pass silicon on a novel architecture at a leading-edge node carries inherent design-under-silicon risk: first-pass success rates for complex digital ASICs are reported in industry literature at 50-70% without re-spin, and re-spins add 6-12 months and $5-15M in additional NRE costs. No engineering samples have been publicly demonstrated.

      Critical technology dependencies beyond TSMC include: HBM supply (concentrated with SK Hynix, Micron, and Samsung), advanced packaging (CoWoS-style integration is required for HBM and is itself capacity-constrained at TSMC), and EDA toolchain licensing (Cadence, Synopsys). Each of these dependencies represents a potential supply chain single point of failure. Etched, as a small startup, may face allocation challenges relative to hyperscaler-backed chip companies (Amazon Trainium, Google TPU, Microsoft Maia) that have priority agreements in place.
    tableRefs: []
    figureRefs: [FE003]

  - id: "SE004"
    title: "Software Stack, SDK, and Developer Surface"
    body: |
      Etched has not published a developer SDK, API documentation, integration guide, or model compatibility matrix as of Q1 2026. The absence of any public software artifact is the most significant product-readiness gap from a commercial deployment perspective. Enterprise inference customers require at minimum: a model conversion tool (to load HuggingFace-format checkpoints onto the chip), an inference runtime (to handle request batching and token scheduling), and a serving API compatible with OpenAI-format endpoints (the de facto inference API standard).

      The HuggingFace Transformers library is the dominant ecosystem framework for Transformer model distribution and inference. Any commercial AI inference chip must integrate with the HuggingFace model hub format (SafeTensors, config.json schema) to allow customers to run standard LLaMA, Mistral, and Falcon checkpoints without manual conversion. Etched has not disclosed whether its compiler ingests HuggingFace model formats directly or requires a separate conversion step.

      Developer adoption for inference chips follows a well-documented pattern: developer-facing documentation → open-source SDK → first reference deployment → ecosystem tooling. Etched is currently at step zero: no SDK, no documentation, no reference implementation. Groq, which shipped its LPU with a developer-accessible cloud API and public benchmark data, demonstrates that developer surface is a critical commercial accelerant. Etched's lack of developer surface suggests the company is focused on silicon first and software second — a reasonable priority ordering at tape-out stage — but this creates a customer adoption delay that will add 6-12 months to revenue realization after first silicon.
    tableRefs: [TE004]
    figureRefs: []

  - id: "SE005"
    title: "Roadmap, Differentiation, and Technical Risks"
    body: |
      Etched's differentiation thesis rests on three claims: (1) that hardwired Transformer attention delivers 10× throughput vs. NVIDIA H100 for inference workloads; (2) that this performance advantage translates to materially lower cost-per-token economics for hyperscaler inference operators; and (3) that the Transformer architecture will remain dominant for long enough to justify a single-architecture ASIC investment. None of these claims has been independently validated as of Q1 2026.

      The most significant technical risk is architecture lock-in. If non-Transformer architectures — Mamba, RWKV, or future recurrent variants — gain significant market share, Sohu becomes obsolete faster than its depreciation schedule allows. The history of domain-specific silicon (early AI training chips, FPGA-based inference accelerators, first-generation neuromorphic chips) shows that architectural bets made in silicon can become stranded assets within one design generation. Etched has made an unusually concentrated bet: not just Transformer, but the specific attention operation hardwired in silicon, with no programmable fallback.

      The product roadmap is entirely uncharacterized beyond the current Sohu tape-out. No second-generation chip has been announced, and no product family (e.g., inference-only vs. fine-tuning, data-center vs. edge) has been disclosed. This is appropriate for a company at tape-out stage, but represents an additional risk factor: customers making supply commitments need visibility into the next-generation roadmap to justify long-term platform adoption. Etched's roadmap opacity is a commercial risk even if first silicon succeeds on schedule.
    tableRefs: [TE005]
    figureRefs: [FE004]

