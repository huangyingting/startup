callouts:
  - calloutType: "risk"
    title: "Capital Adequacy is the Most Urgent Financial Risk"
    body: "Etched's $120M Series A at a semiconductor startup burn rate (est. $3-8M/month) provides approximately 15-40 months of runway from June 2024—expiring in approximately 2025-2027. The production timeline for a leading-edge ASIC development program typically requires 18-30 months from tape-out to volume production. These timelines are tight: the company may need to raise a Series B (estimated $200-500M) before production silicon is proven, at the highest-risk point in the capital cycle. Failure to secure this bridge raises a material going-concern risk."
    claimRefs: [CI014, CI015, CI016, CI017]
  - calloutType: "recommendation"
    title: "No Financial Data Available for Underwriting"
    body: "Etched has no public financial disclosures. There is no revenue, no audited financial statements, no public cap table beyond the announced Series A, and no disclosed operating metrics (burn rate, headcount, cash position). Underwriting this investment requires obtaining the company's internal financial model, TSMC cost terms, and Series B fundraising timeline. This is a standard position for a pre-revenue semiconductor startup but should be treated as a hard gate: do not underwrite without company-provided financial data."
    claimRefs: [CI001, CI002, CI003, CI020, CI021, CI022]

