sections:
  - id: "SI001"
    title: "Revenue Model and Streams"
    body: |
      Etched is a pre-revenue semiconductor startup. Its intended revenue model is hardware sales: designing a custom ASIC (the Sohu chip) optimized for Transformer inference and selling it to hyperscalers, large AI-native companies, and inference platform operators. This is a one-time hardware sales model with potential repeat purchase cycles tied to chip generations, analogous to NVIDIA's GPU product cycle (H100 → H200 → Blackwell). There is no disclosed software licensing, cloud API, or SaaS revenue stream.

      The primary revenue stream is direct hardware unit sales of Sohu chips at OEM or enterprise pricing. A secondary stream could be system-level sales (rack or server configurations incorporating Sohu chips), analogous to how Cerebras sells CS-3 appliances rather than bare chips. No cloud marketplace offering has been announced. The company has made no public disclosures about revenue run rate, ARR, or any executed customer contracts.

      Revenue recognition for hardware sales typically follows ASC 606 point-in-time recognition upon chip delivery. Unlike SaaS, this creates lumpy revenue tied to production batch deliveries and procurement cycles. Capital intensity is extremely high for semiconductor companies: Etched must fund tape-out, wafer purchases, testing, and packaging before any revenue is collected. The working capital cycle for semiconductor hardware spans 12-24 months from tape-out to revenue.
    tableRefs: [TI001, TI002]
    figureRefs: [FI001]

  - id: "SI002"
    title: "GTM Motion and Sales Efficiency"
    body: |
      Etched's go-to-market model is direct enterprise sales targeting hyperscalers and large AI-native companies. This is a high-ASP, low-volume sales motion typical of semiconductor infrastructure vendors. The target buyer is a VP of Engineering Infrastructure or CTO-level decision maker at a company spending >$100M/year on GPU compute. Buying cycles for inference silicon in this segment typically span 12-24 months from initial evaluation to production deployment.

      At pre-revenue stage, Etched has no disclosed sales team size, pipeline metrics, or customer acquisition cost data. The company's primary go-to-market asset is the claimed 10× throughput advantage for Transformer inference, which creates a compelling economic argument if validated. The sales process would require: (1) free or subsidized chip samples for evaluation; (2) technical integration support for SDK adoption; (3) reference architecture validation; and (4) supply commitment negotiations.

      Channel economics for Etched are uncharacterized. NVIDIA sells through an extensive reseller, OEM, and cloud marketplace channel. Etched would need to either develop similar channel relationships or rely on direct sales to a small number of large accounts. Given the chip design's Transformer-only specialization, customer concentration in the top 10 AI inference buyers (OpenAI, Anthropic, Cohere, hyperscalers, inference platforms) is nearly certain in the early years.
    tableRefs: []
    figureRefs: [FI002]

  - id: "SI003"
    title: "Cost Structure and Unit Economics"
    body: |
      Etched's cost structure is dominated by semiconductor manufacturing costs: wafer costs, packaging and test, yield loss, and NRE (non-recurring engineering) for chip design. At TSMC's 4N process node, wafer costs are estimated at $15,000-20,000+ per wafer for leading-edge advanced nodes. Yield rates for first-generation designs at a new process node typically run 50-70%, improving to 85-95%+ in volume production. A single tape-out at TSMC leading-edge node costs $5-15M in mask set costs alone.

      Semiconductor gross margins at scale can be very attractive: NVIDIA's data center GPU gross margins exceed 70-75%. However, these margins require scale to cover the fixed NRE costs. Etched would need to sell thousands of chip units before the NRE costs are amortized. At $120M total funding, Etched faces a capital adequacy challenge: a single generation of leading-edge chip development plus initial production run costs can consume $50-100M, leaving limited headroom for a second generation or for sustaining operations through the 2+ year sales cycle before revenue.

      Key unit economics inputs that are unknown include: wafer cost commitment with TSMC, die size (which determines chips-per-wafer and cost-per-die), target ASP per chip, and yield assumptions. Without these, cost-per-token economics claimed by Etched cannot be independently validated.
    tableRefs: [TI003]
    figureRefs: [FI003]

  - id: "SI004"
    title: "Capital Adequacy and Runway"
    body: |
      Etched raised $120M in a Series A round in June 2024, with investors including Primary Venture Partners and Positive Sum. As of Q1 2026, the company has not announced subsequent fundraising. The $120M raise is the entirety of disclosed external funding. No debt facilities, project finance, or government grants have been publicly disclosed.

      Monthly burn for a semiconductor startup of Etched's stage is typically $3-8M/month, driven by: (1) engineering headcount (chip designers at $300-500K total compensation); (2) EDA software licensing ($5-10M/year); (3) wafer shuttle and mask set costs; and (4) operating expenses. At a $5M/month midpoint burn rate, $120M provides approximately 24 months of runway from close, suggesting runway into approximately H2 2026, aligned with expected tape-out completion timing.

      The critical capital milestone is production silicon availability. If tape-out completes on schedule, the company will need to raise a Series B (estimated $200-500M based on comparable semiconductor raises) before or immediately after first silicon, to fund volume production, customer ramp, and next-generation chip development. Failure to raise on schedule creates a material going-concern risk. The runway to first customer revenue is longer than the current funding supports without additional capital.
    tableRefs: [TI004]
    figureRefs: []

  - id: "SI005"
    title: "Financial Gaps and Diligence Blockers"
    body: |
      Etched's financial profile has significant gaps that cannot be resolved from public sources. Revenue is zero (pre-product). All operating metrics (burn rate, cash position, headcount, COGS structure, gross margin projections) are undisclosed. No financial statements are available. The company is not required to file public financials as a private company. The funding of $120M in June 2024 is the primary financial fact of record.

      The most material financial diligence blockers are: (1) actual burn rate and cash position as of Q1 2026 (is the company funded through tape-out or does it face near-term capital need?); (2) TSMC wafer commitment and cost terms (which determine cost-per-chip and gross margin potential); (3) first customer LOI or design win (which would validate revenue model and timing); and (4) total capital required to reach first production volume (which determines whether Series A is sufficient or a bridge is needed).

      The financial verdict is that Etched is in the highest-risk zone for a semiconductor startup: all capital has been deployed against development without revenue, the product is unproven in production, and the next funding round must be raised before commercial validation is possible. This is structurally similar to the capital position of Cerebras, Groq, and SambaNova at comparable stages—but each of those companies required $700M-$1.2B to reach commercial offering, compared to Etched's $120M raised to date.
    tableRefs: [TI005]
    figureRefs: [FI004]

