  topStrengths:
    - >-
      Hardcoded Transformer attention in TSMC 4nm delivers theoretically 10–20× better tokens/dollar than H100 for
      Transformer inference — a genuine physical advantage if the architecture assumption holds.
    - >-
      $120M Series A with Positive Sum lead provides runway for a full ASIC tape-out and bring-up cycle without
      immediate revenue pressure; first-mover positioning in the Transformer-ASIC sub-segment.
    - >-
      Young, technically credible founders with a clear product thesis and early industry awareness; team includes
      engineers from NVIDIA, Meta, and Google with chip-design pedigree.
  topRisks:
    - >-
      Architecture lock-in is existential: if state-space models (Mamba, RWKV), mixture-of-experts (MoE), or hybrid
      attention-free architectures displace vanilla Transformers, Sohu becomes obsolete before volume production.
    - >-
      No customers, no design wins, no disclosed tape-out status as of Q1 2026; Etched must close its first design win
      before Series B to maintain credibility and valuation.
    - >-
      TSMC 4nm geopolitical and capacity dependency creates single-point-of-failure supply chain risk; any Taiwan Strait
      disruption or US export-control tightening could halt production entirely.
    - >-
      First-time ASIC team (CEO is 23, no prior tape-out track record); ASIC development cycles are unforgiving and
      typical tape-out-to-volume timelines are 24–36 months with significant risk of re-spins.
  unresolvedGaps:
    - >-
      Tape-out status, silicon bring-up results, and independently validated benchmark data for Sohu are not publicly
      disclosed; all performance claims are company-stated and unverified.
    - >-
      Post-money Series A valuation, cap table structure, liquidation preferences, and investor dilution schedule are
      not public; estimated $600M–$800M post-money is unconfirmed.
    - >-
      No named customer, letter of intent, or design-win announcement has been made as of Q1 2026; the absence of any
      customer signal is the primary diligence blocker.
    - >-
      TSMC tape-out slot booking, HBM supply agreements, and manufacturing partner contracts are not disclosed; supply
      chain concentration risk cannot be independently assessed.
    - >-
      Mamba and hybrid SSM/Transformer architectures are scaling rapidly; whether Sohu's hardcoded attention logic can
      be cost-effectively updated to support emerging architectures is unknown.
