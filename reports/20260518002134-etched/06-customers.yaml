chapter:
  number: 6
  title: "Customers"
  summary: "Etched has zero customers, zero design wins, and zero LOIs as of Q1 2026; the company is pre-revenue and entirely without customer validation. The nearest comparable customer proof is drawn from Groq's case studies (inference platforms adopting the LPU) and AWS Inferentia case studies (AI companies achieving 40-70% cost reductions vs GPU inference). The primary diligence blocker is the complete absence of any named customer signal — no evaluator, no NDA partner, no engineering-briefing recipient — combined with a 12-24 month chip evaluation cycle that precludes revenue realization before mid-2027 at the earliest."

sections:
  - id: "SU001"
    title: "Customer Base Segmentation and Target Buyers"
    body: |
      Etched's Sohu chip targets the AI inference chip buyer, a narrow population of companies running Transformer-based large language models at a scale where GPU cost is a material operational expense. The primary buyer persona is the VP of Infrastructure or the Head of ML Platform at a company spending more than $50 million annually on GPU compute for Transformer inference. This profile describes approximately 50-200 companies globally as of Q1 2026, concentrated in three tiers: (1) frontier AI labs such as OpenAI, Anthropic, and Mistral that run proprietary Transformer models at consumer web scale; (2) hyperscalers such as AWS, Google, and Microsoft that offer LLM inference APIs as a commercial product; and (3) inference-as-a-service platforms such as Together AI, Anyscale, and Perplexity AI that run open-source Transformer models for commercial developers.

      The segmentation is defined by the nature of the Transformer workload rather than by industry vertical. Any organization that runs autoregressive Transformer decoder inference at scale — whether it is an AI-native company, a hyperscaler offering LLM APIs, or a large enterprise with a proprietary model deployment — represents a potential Sohu customer. Organizations that run primarily Transformer encoder workloads (embedding, classification, BERT-class models) are a lower-priority segment because the attention-compute advantage of hardwired silicon is less pronounced for single-pass encoder inference than for autoregressive decoding.

      The geographic concentration of Etched's addressable buyer segment is heavily US-centric in the first wave: OpenAI, Anthropic, Together AI, Anyscale, Scale AI, and Perplexity are all US-headquartered companies. Cohere (Canada) and Mistral (France) represent the only tier-1 international prospects with publicly known inference scale. This concentration is advantageous from a sales-motion perspective — fewer accounts, geographically accessible — but creates risks if the US regulatory environment or export-control framework restricts chip supply relationships.
    claimRefs: [CU001, CU002, CU003, CU018]
    tableRefs: [TU001]
    figureRefs: [FU001]

  - id: "SU002"
    title: "Adoption Trajectory and Current Traction"
    body: |
      Etched has zero customer traction as of Q1 2026. The company has not disclosed any customers, active evaluations, signed LOIs, design wins, or named engineering-briefing recipients. This is the baseline state for a chip startup whose silicon has not yet been demonstrated publicly: potential customers cannot benchmark a chip that does not exist as a production sample, and procurement teams are unlikely to sign evaluation agreements for hardware without physical samples available for technical validation.

      The adoption trajectory for an AI inference chip startup typically follows five phases: (1) pre-silicon awareness and engineering briefings to potential customers, (2) first-silicon delivery and confidential performance benchmarking, (3) pilot deployment with 1-3 committed design-win customers, (4) production ramp and named customer announcements, and (5) ecosystem expansion. Based on public evidence, Etched has not yet entered phase 1 on any publicly confirmable basis. The company has not announced engineering briefings, sample availability timelines, or any customer engagement program as of Q1 2026.

      For comparison, Groq began its customer engagement before shipping hardware by building a developer community around its architecture and providing early access to benchmarks. Cerebras similarly briefed hyperscaler customers well in advance of commercial availability. Etched's adoption trajectory, measured against these analogs, is delayed: the company has raised $120 million but has not yet provided any public evidence of customer engagement activity. The earliest plausible first-revenue date, given a 12-24 month evaluation cycle after first-silicon delivery, is H2 2027 to 2028 — assuming tape-out completes on schedule in 2025-2026 and first silicon is delivered H1 2027.
    claimRefs: [CU012, CU013, CU020, CU024, CU029]
    tableRefs: [TU002]
    figureRefs: [FU002]

  - id: "SU003"
    title: "Named Customer Evidence — Absence and Analog Proof"
    body: |
      Etched has no named customers, design wins, or publicly confirmed evaluation partners as of Q1 2026. All customer cells in the Named Customer Proof table for Etched itself are placeholders representing potential market targets, not actual commercial relationships. This is an uncommon position for a company 2+ years post-founding and 12+ months post-Series-A: most inference chip companies at comparable funding stages have at least named one evaluation partner or announced a developer access program.

      Analog customer proof from comparable inference chip companies is available and informative. Groq's case studies page demonstrates that AI-native inference platforms — including companies of the scale and type that Etched is targeting — do adopt specialized inference hardware when the performance-per-token economics are compelling. Groq lists case studies from customers that run large-scale Transformer inference for production consumer products, validating that the buyer segment exists and is willing to adopt non-GPU inference hardware. AWS Inferentia case studies, including Stability AI (image generation inference) and Quora (Poe chatbot inference), demonstrate that companies adopting custom inference silicon can achieve 40-70% cost reductions versus GPU-based inference at comparable throughput levels.

      These analog proofs are valuable for validating the buyer behavior hypothesis — that AI-native companies will adopt inference ASICs when cost-per-token economics are proven — but they do not validate Etched specifically. The critical gap is the complete absence of Etched-specific customer signal: no LOI, no NDA evaluation agreement, no engineering briefing, and no design win. G2 reviews of Groq provide developer-level feedback confirming that inference chip adoption is real and that performance benchmarks drive developer adoption decisions. Etched currently has no equivalent developer signal, no SDK, and no public benchmark data.
    claimRefs: [CU001, CU004, CU005, CU021, CU027, CU028, CU029]
    tableRefs: [TU003]
    figureRefs: [FU003]

  - id: "SU004"
    title: "Retention, Expansion, and Concentration Risk"
    body: |
      Etched has no customers, so retention and churn metrics cannot be measured directly. However, the structural economics of inference chip adoption strongly favor high retention once integration is complete. An AI company that re-engineers its serving stack, model compiler, and deployment pipeline to run on Sohu hardware — a process estimated at 3-6 months of engineering work by 2-5 dedicated engineers — faces switching costs equivalent to 12-18 months of re-engineering to move back to GPU infrastructure or to an alternative ASIC. This creates structural lock-in analogous to cloud infrastructure switching costs, though without the data portability friction.

      Expansion economics in the inference chip segment are favorable if performance is validated. AWS Inferentia case studies show that customers who adopt custom inference silicon typically expand capacity within 12 months of first deployment, driven by lower cost-per-inference enabling higher inference volumes. Together AI and Anyscale, as potential Etched customers, would likely expand Sohu capacity in proportion to their overall LLM inference growth — which is projected to grow significantly as open-source model quality improves and inference costs fall.

      Concentration risk is the most serious near-term structural concern for Etched. With zero current customers, Etched's first customer would represent 100% of its initial revenue. Even with 3-5 early customers, a scenario where any single customer represents 25-35% of first-year revenue creates extreme concentration risk. If that customer reduces usage — due to a strategic pivot away from Transformer models, a competitor offering better economics, or a loss of their own funding — Etched faces a revenue shock with no diversification buffer. Graphcore's failure was partly attributable to customer concentration: a small number of large customers that delayed or cancelled deployments created a cascading revenue shortfall. Etched must prioritize customer diversification from its very first production run.
    claimRefs: [CU019, CU025, CU033, CU035, CU036, CU037]
    tableRefs: [TU004, TU005]
    figureRefs: [FU004]

  - id: "SU005"
    title: "Customer Verdict — Diligence Blockers"
    body: |
      The customer diligence verdict for Etched is unambiguously the highest-severity blocker in this report. Etched is a pre-revenue, pre-silicon company with zero publicly named customer relationships, zero published benchmarks for customer evaluation, zero SDK for developer experimentation, and zero design wins. The absence of any customer signal is not explained by stealth strategy — the company publicly announced a $120 million Series A in June 2024 — but rather reflects the genuine pre-commercialization stage of the company.

      The analog evidence from Groq (case studies showing AI-native inference platform adoption) and AWS Inferentia (hyperscaler customer proof of ASIC adoption) validates the buyer behavior hypothesis at the market level. These analogs confirm that the inference chip buyer segment exists, has the budget and procurement capacity to adopt non-GPU inference hardware, and will do so when cost-per-token economics are demonstrated. However, this market-level proof does not reduce Etched's company-specific customer risk, which remains critical.

      The key diligence asks for the customer chapter are: (1) Has Etched entered any NDA-governed evaluation agreements, even informally? (2) Which companies has Etched briefed at the engineering level on Sohu architecture? (3) What is the company's estimate of first customer close date and first revenue date? (4) Has any company expressed written interest in a production supply agreement contingent on first-silicon performance? Until these questions are answered with verifiable evidence, the customer chapter represents a blocking diligence risk that no investment committee should overlook. The Graphcore precedent — a $700M+ chip startup that failed to convert strong engineering proof into customer adoption at scale — is a direct warning about the difficulty of the customer development problem Etched faces.
    claimRefs: [CU001, CU014, CU015, CU037]
    tableRefs: []
    figureRefs: []

