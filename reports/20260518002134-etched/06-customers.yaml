figures:
  - id: "FU001"
    title: "Customer journey map"
    type: "journey-map"
    layout: "wide"
    summary: "Eight-phase journey from first awareness to multi-year expansion for an AI inference chip buyer evaluating Etched's Sohu chip."
    data:
      nodes:
        - label: "Awareness & Discovery"
          detail: "Potential customer learns about Etched through press coverage, investor network referral, or AI infrastructure conference; no public SDK or benchmark data available to drive inbound developer discovery"
          tone: "neutral"
        - label: "Technical Briefing (Etched-initiated)"
          detail: "Etched team presents Sohu architecture and 10x throughput claim to customer engineering team under NDA; no physical hardware or benchmark runnable by customer"
          tone: "warning"
        - label: "Architecture Compatibility Check"
          detail: "Customer's ML team evaluates whether production workloads are Transformer-compatible (decoder-only, encoder-decoder); MoE and SSM workloads may be disqualified at this stage"
          tone: "neutral"
        - label: "Benchmark / Proof of Concept"
          detail: "Customer runs representative inference workload on Sohu engineering sample; compares tokens/second, cost/token, and latency vs current H100 deployment; requires physical chip delivery"
          tone: "warning"
        - label: "Procurement & Legal Review"
          detail: "Customer negotiates volume commitment, supply SLA, pricing, and IP ownership terms; legal review adds 3-6 months to timeline; SOC 2 / security review required for hyperscalers"
          tone: "neutral"
        - label: "Hardware Integration & SDK Development"
          detail: "Customer engineers retool serving stack: model compiler, KV-cache management, batching scheduler, and API endpoint to run on Sohu hardware; estimated 3-6 months, 2-5 dedicated engineers"
          tone: "risk"
        - label: "Production Deployment"
          detail: "Customer routes live inference traffic to Sohu hardware; measures real-world throughput, reliability, and cost-per-token at production load"
          tone: "neutral"
        - label: "Expansion & Re-order"
          detail: "Customer orders additional Sohu capacity as inference volumes grow; evaluates Gen-2 roadmap for multi-year platform commitment; high retention due to integration switching costs"
          tone: "positive"
    approximationNotes: "Journey phases and time estimates are inferred from analog inference chip company adoption patterns (Groq, AWS Inferentia, Cerebras). Etched has disclosed no customer journey details. Phase durations are estimated at 1-4 months each for a total 12-24 month cycle."
