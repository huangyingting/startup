    - type: "private-evidence-only"
      severity: "blocking"
      topic: "etched-customer-evaluations-undisclosed"
      missingEvidence: "Any confirmed LOIs, NDA-governed evaluation agreements, informal engineering engagements, or customer pipeline stage data; all such information, if it exists, would be confidential and undisclosed by Etched."
      whyItMatters: "The complete absence of any named customer signal — after $120M raised and 2+ years of operations — is the single most important diligence risk in this chapter; a single named evaluation partner would substantially de-risk the commercial thesis and affect the investment recommendation."
      diligencePath: "Ask Etched directly for the number and stage of active customer evaluations under NDA; request any signed evaluation agreements or term sheets; ask whether any hyperscaler has received a pre-tape-out engineering briefing or preliminary chip specification under NDA."
