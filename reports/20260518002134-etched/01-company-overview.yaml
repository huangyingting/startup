company:
  name: "Etched"
chapter:
  number: 1
  title: "Company Overview"
  summary: "Etched is a Cupertino-based AI semiconductor startup founded in 2022 that raised $120M in a Series A in June 2024 at a reported ~$1B valuation. The company is building Sohu, a purpose-built ASIC chip hardcoded for Transformer neural network inference, claiming 25x or greater performance advantages over NVIDIA H100 GPUs. As of the research date the company is pre-revenue and the chip remains in development."

sections:
  - id: "company-identity"
    title: "Company Identity and Mission"
    body: >
      Etched is a semiconductor startup headquartered in Cupertino, California, incorporated in 2022. The company's stated mission, as displayed on its official website, is "Building the hardware for superintelligence." Etched's core thesis is that the Transformer neural network architecture — the backbone of modern large language models including GPT-4, LLaMA, and Claude — will remain the dominant paradigm for AI for the foreseeable future, and that purpose-built silicon optimized exclusively for Transformer workloads can dramatically outperform general-purpose GPUs.

      The company's primary product is the Sohu chip, an application-specific integrated circuit (ASIC) designed from the ground up to accelerate Transformer inference. Unlike GPUs which are programmable general-purpose accelerators, Sohu hardcodes the Transformer computation graph into silicon, eliminating the overhead of programmability and achieving substantially higher throughput per watt. Etched has publicly claimed that a single Sohu chip can deliver approximately 500,000 tokens per second for Transformer inference workloads, compared to approximately 20,000 tokens per second for an NVIDIA H100 GPU — a claimed 25x advantage. These performance figures are company-claimed and have not been independently verified as of the research date. Etched operates as a fabless semiconductor company, meaning it designs chips but relies on third-party foundries (most likely TSMC) for fabrication.

      Etched's business model centers on selling Sohu chips to cloud hyperscalers, large enterprises, and AI inference service providers seeking to dramatically reduce the cost and latency of serving large Transformer-based models at scale. The company is currently pre-revenue and the Sohu chip is in development.
    claimRefs: [CO001, CO002, CO005, CO006, CO007, CO008, CO014, CO015, CO016, CO017]
    tableRefs: [TO001]
    figureRefs: [FO003]

  - id: "leadership-founders"
    title: "Founders and Leadership"
    body: >
      Etched was co-founded by Gavin Uberti (CEO) and Chris Zhu (CTO), with Robert Winslow also named as a co-founder in early press coverage. Gavin Uberti, who serves as Chief Executive Officer, was previously a researcher at Microsoft, bringing experience in AI systems and hardware acceleration to the role. His background in both AI research and engineering positions him as a founder-market-fit candidate for a deep-tech semiconductor startup. Chris Zhu serves as Chief Technology Officer and brings complementary technical expertise in hardware design and AI systems.

      The founding team is small and the company's leadership roster beyond the three co-founders has not been publicly disclosed. This creates meaningful key-person dependency — if any founder were to depart, the technical trajectory and investor confidence could be materially impacted. The board of directors and governance structure have not been publicly disclosed, which is typical for a private startup at this stage but represents a diligence gap. Etched has not reported any material leadership changes since founding as of the research date. The company's headcount has not been publicly disclosed; the team size is inferred to have grown post-Series A based on typical hiring patterns for well-funded semiconductor startups, but no specific numbers are available.

      The technical depth of the founding team is a meaningful asset: building a custom ASIC requires deep expertise in hardware design, chip architecture, EDA tools, and semiconductor manufacturing, and the founders' backgrounds suggest relevant capability, though independent verification of their specific chip design credentials has not been possible from public sources.
    claimRefs: [CO010, CO011, CO012, CO032, CO041]
    tableRefs: [TO002]

  - id: "funding-investors"
    title: "Funding History and Investors"
    body: >
      Etched completed a $120 million Series A funding round announced publicly on June 26, 2024, at a reported valuation of approximately $1 billion, making Etched a unicorn at Series A. The round was covered extensively by financial and technology media including Bloomberg, Reuters, TechCrunch, Wired, and Fortune. Primary Venture Partners was identified as a key investor, and Positive Sum was confirmed as a participating investor. The full investor syndicate composition and ownership percentages have not been publicly disclosed.

      The $120 million raise is substantial for a pre-revenue semiconductor startup, reflecting both the intensity of investor interest in AI infrastructure and the early-stage bets being placed on next-generation inference hardware. By comparison, other AI chip startups in recent years have raised comparable amounts: Groq has raised over $1 billion in aggregate over multiple rounds, and Cerebras Systems raised approximately $720 million total. Prior to the Series A, Etched's pre-seed and seed funding history has not been publicly disclosed. There is no public record of secondary share sales, debt financing, or convertible notes as of the research date.

      The $1 billion valuation at Series A is aggressive for a company that has not taped out a chip, does not have paying customers, and faces formidable competitors with established ecosystems. This valuation appears to be primarily an option on the thesis that Transformer architectures will dominate AI inference and that Etched can execute on chip production — an assessment that carries significant technical and market risk.
    claimRefs: [CO003, CO004, CO009, CO018, CO023, CO037, CO038]
    tableRefs: [TO003]

  - id: "milestones-history"
    title: "Company Milestones and History"
    body: >
      Etched's public history is limited given the company is approximately two years old as of the research date. The company was founded in 2022 in Cupertino, California, with the mission of building specialized AI inference hardware. The founding period (2022-2023) was characterized by stealth development — Etched operated largely without public disclosure of its technology or funding status. The major inflection point was June 26, 2024, when the company simultaneously announced both its $120 million Series A funding and its Sohu chip with a detailed set of performance claims.

      The public announcement of Sohu marked Etched's first significant public disclosure, including claims of 500,000 tokens per second throughput and 25x performance over NVIDIA H100 GPUs. The announcement generated substantial media attention across Bloomberg, Reuters, Wired, Fortune, and TechCrunch, as well as significant discussion in developer communities. Industry analysts noted both the ambition of the claims and the significant risks associated with betting exclusively on a single AI architecture.

      From the chip design perspective, the relevant milestones would include architecture design, RTL development, pre-silicon simulation, tape-out (first silicon), and eventual production. As of the research date, Etched has not publicly confirmed a tape-out or production timeline, representing a material gap in the company's public milestone disclosure. Post-Series A, the company is presumed to be in active chip development with available capital to fund the silicon cycle, though specific technical milestones remain undisclosed.
    claimRefs: [CO001, CO003, CO005, CO006, CO037, CO040]
    tableRefs: [TO004]
    figureRefs: [FO001]

  - id: "strategic-context"
    title: "Strategic Context and Competitive Position"
    body: >
      Etched's strategic bet is fundamentally an architecture-level bet: that Transformer neural networks will remain the dominant paradigm for AI for the next decade or more, and that this dominance will be durable enough to justify an ASIC designed exclusively for Transformer computation. The key risk is architectural obsolescence — if AI research produces a successor architecture (such as state space models, Mamba, or hybrid approaches) that achieves comparable or superior performance with different computational primitives, the Sohu chip's hardcoded Transformer logic could become obsolete before reaching commercial scale.

      NVIDIA dominates the AI accelerator market with its H100 and successor GPU products, backed by the CUDA software ecosystem, established supply chains, enterprise relationships, and thousands of engineer-years of software optimization. Competing against NVIDIA requires not just superior hardware performance but superior total-cost-of-ownership and ecosystem compatibility. Other pure-play AI chip startups — including Groq (LPU inference), Cerebras (wafer-scale ASIC), SambaNova (AI accelerator systems), Tenstorrent (RISC-V based AI chips), and Intel Gaudi — have all struggled to capture meaningful market share from NVIDIA despite years of effort.

      The competitive landscape makes Etched's position high-risk but potentially high-reward: if Transformer architectures prove durable and Etched executes on silicon production, the company could serve the enormous inference market at dramatically lower cost. The 25x performance claim, if validated, would represent a compelling economic advantage for hyperscalers spending hundreds of millions of dollars annually on inference compute. However, the unverified nature of these claims at this stage of development means investors and potential customers must rely primarily on technical thesis evaluation rather than empirical evidence.
    claimRefs: [CO019, CO020, CO024, CO025, CO026, CO027, CO028, CO029, CO030, CO035, CO036, CO039]
    figureRefs: [FO002]

