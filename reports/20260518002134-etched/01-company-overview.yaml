callouts:
  - calloutType: "strength"
    title: "First-Mover in Transformer-Specific Silicon"
    body: "Etched is pioneering purpose-built ASIC architecture for Transformer inference. If the chip delivers on its claimed 25x performance advantage, it could enable dramatically lower-cost AI inference at scale, addressing one of the most capital-intensive constraints in deploying modern LLMs."
    claimRefs: [CO005, CO006, CO016]
  - calloutType: "risk"
    title: "Single-Architecture Bet with Obsolescence Risk"
    body: "Etched's entire value proposition depends on Transformer architecture remaining dominant. Emerging alternatives including state space models (Mamba), hybrid architectures, and non-Transformer LLMs represent meaningful tail risk that could render Sohu's hardcoded logic obsolete before the chip reaches commercial production."
    claimRefs: [CO035, CO036]

