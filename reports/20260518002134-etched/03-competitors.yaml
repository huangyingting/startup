sections:
  - id: "SP001"
    title: "Competitive Landscape Overview"
    body: |
      Etched competes in the AI inference accelerator market, which is currently dominated by NVIDIA. The competitive landscape spans several distinct tiers: GPU incumbents (NVIDIA), hyperscaler internal programs (AWS Trainium/Inferentia, Google TPU, Microsoft Maia), purpose-built inference startups (Groq, Cerebras, SambaNova), AI chip generalists (AMD, Intel Gaudi), and Etched's unique sub-segment of Transformer-only ASICs. The status quo competitor in virtually every buyer's current stack is the NVIDIA H100 or H200 GPU cluster.

      Etched's differentiation strategy is architectural specialization: by hardcoding the Transformer attention mechanism into silicon, it claims 10× or greater throughput efficiency versus GPU-based inference. No other identified competitor has taken a similarly narrow architectural bet on Transformer-only execution. Groq uses LPUs (Language Processing Units) with a deterministic streaming architecture. Cerebras uses a wafer-scale processor. Graphcore uses IPUs (Intelligence Processing Units). All three are general-purpose AI accelerators; none is Transformer-only.

      The competitive risk is structural: NVIDIA's ecosystem moat (CUDA, NeMo, TensorRT, distribution) is the dominant switching barrier. Buyers evaluating Etched must overcome software integration costs, uncertainty about model compatibility, and absence of a production reference deployment. Etched's only durable counter-argument is cost-per-token economics at Transformer inference scale, which cannot be validated until production silicon is available.
    tableRefs: [TP001, TP002]
    figureRefs: [FP001]

  - id: "SP002"
    title: "Incumbent GPU Competitors"
    body: |
      NVIDIA holds approximately 80-90% of the AI accelerator market as of 2024-2025. Its H100 and forthcoming Blackwell architecture dominate both training and inference workloads. NVIDIA's competitive moat consists of four interlocking layers: (1) CUDA software ecosystem with decades of developer investment; (2) NeMo and TensorRT inference optimization frameworks; (3) scale of manufacturing commitments with TSMC; and (4) trust—every major AI company has proven NVIDIA silicon in production. NVIDIA's primary vulnerability is pricing power: H100 GPUs were selling at $30-40K per unit at peak in 2023-2024, with H100 inference clusters costing $2-8M per rack.

      AMD Instinct MI300X has emerged as the most credible alternative GPU for inference workloads. AMD's ROCm software stack has improved significantly, and Microsoft Azure has committed to large-scale MI300X deployments for its OpenAI workloads. Intel Gaudi (formerly Habana Labs, acquired in 2019 for ~$2B) targets training and inference workloads but has not achieved significant market share; Intel's software ecosystem lags CUDA significantly.

      The GPU incumbents' primary strategic response to Etched would be pricing reductions on inference-optimized SKUs (H100 NVL, Blackwell B100, B200) and accelerated development of inference-specific firmware and software. Both AMD and NVIDIA are already shipping inference-optimized variants with higher memory bandwidth per FLOP.
    tableRefs: []
    figureRefs: []

  - id: "SP003"
    title: "Hyperscaler Internal Programs"
    body: |
      AWS, Google, and Microsoft have all developed internal AI chips specifically to reduce NVIDIA dependency and lower inference costs. Google's TPU (Tensor Processing Unit) program, now on v5, is the most mature internal chip program. Google TPU v5e is specifically optimized for inference and is available through Google Cloud; it cannot be purchased by third parties. Google uses TPUs extensively for Gemini inference and has deployed tens of thousands of units internally.

      AWS Trainium (training) and Inferentia (inference) are Amazon's internal AI chips. AWS Inferentia2 targets cost-effective inference for large language models and is available to AWS customers through Amazon EC2 Inf2 instances. AWS has not disclosed revenue or deployment scale for these chips, but they represent a credible threat to third-party inference hardware in the AWS ecosystem. Microsoft has developed the Maia 100 AI accelerator, announced in November 2023, which targets internal Azure AI inference workloads including OpenAI's Azure deployments.

      Etched's potential to sell to hyperscalers exists—OpenAI is publicly listed as a potential customer given the Sohu chip's throughput claims—but the hyperscaler internal programs represent both competition and a buyer validation risk: hyperscalers have demonstrated willingness and capability to build their own silicon rather than pay third parties.
    tableRefs: [TP003]
    figureRefs: [FP002]

  - id: "SP004"
    title: "Purpose-Built Inference Startup Competitors"
    body: |
      Groq, Cerebras, and SambaNova are the three most-funded inference chip startups ahead of Etched. Groq has raised approximately $1.1B+ and offers the LPU (Language Processing Unit) as a deterministic streaming inference chip with very low latency. Groq's GroqCloud provides API access to inference at competitive pricing. Groq's architecture supports general AI model inference, not just Transformers—it can run Mamba, MoE, and other architectures. Groq's differentiation is latency (tokens per second response speed) rather than throughput at batch inference.

      Cerebras Systems has raised approximately $720M+ and uses a wafer-scale processing approach (the Cerebras WSE-3 is 46,225 mm², compared to ~800 mm² for H100). Cerebras focuses primarily on training and can do inference; it targets enterprise and government customers. SambaNova Systems has raised approximately $1.2B and uses a reconfigurable dataflow architecture. SambaNova has targeted enterprise AI deployment with its DataScale systems.

      Tenstorrent is a newer entrant (founded 2016, led by Jim Keller) using RISC-V-based AI chips with a focus on open hardware and software. Graphcore (UK-based) developed the Intelligence Processing Unit (IPU) for AI workloads; it has struggled commercially and was acquired by SoftBank in 2023 for a reported $120M—substantially below its ~$2.8B peak valuation. The Graphcore trajectory is an important adverse data point: a well-funded AI chip startup with differentiated architecture can fail to achieve commercial traction even with significant capital.
    tableRefs: []
    figureRefs: []

  - id: "SP005"
    title: "Switching Costs, Moat Durability, and Displacement Risk"
    body: |
      Etched's primary moat claim is architectural: by implementing attention in hardened logic, it achieves throughput efficiency that GPU-based approaches cannot match at equivalent silicon area. This moat is real but narrow and fragile. It is real because attention-optimized hardware can genuinely run Transformer inference more efficiently. It is narrow because it only applies to Transformer inference. It is fragile because (1) NVIDIA and hyperscalers can respond with inference-optimized SKUs, (2) model architectures are evolving away from pure Transformer, and (3) software optimization (Flash Attention, quantization, speculative decoding) continuously reduces the efficiency gap between specialized and general-purpose hardware.

      CUDA lock-in is the dominant competitive moat for NVIDIA. A company switching from NVIDIA GPUs to Etched must: (1) re-validate every model in production on Etched silicon; (2) replace CUDA/TensorRT pipeline integration with Etched's SDK; (3) accept vendor concentration risk with an early-stage startup; and (4) build internal expertise in Etched's toolchain. These switching costs are non-trivial but manageable for large organizations with dedicated ML infrastructure teams. They represent a meaningful barrier to Etched's sales process, not an insurmountable barrier to adoption.

      Adverse evidence on displacement risk: The AI chip startup landscape has produced multiple well-funded failures. Graphcore's acquisition at a fraction of its peak valuation is the most recent data point. Wave Computing and Mythic AI have also failed or pivoted. The pattern suggests AI chip startups face a "valley of death" between chip demonstration and production-scale deployment, where software ecosystem immaturity, customer inertia, and NVIDIA's incremental improvement create compounding headwinds.
    tableRefs: [TP004]
    figureRefs: [FP003]

