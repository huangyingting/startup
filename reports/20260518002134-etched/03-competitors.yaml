  claims:
    - id: "CP001"
      statement: "NVIDIA holds approximately 80-90% of the AI accelerator market as of 2024-2025, making it the dominant status-quo competitor for any AI inference chip."
      type: "estimated"
      topic: "competitive-landscape"
      sourceRefs: [SP012, SP013]
      confidence: "medium"
      freshness: "current"
      answersQuestionRefs: [QP002]

    - id: "CP002"
      statement: "Etched has raised $120M in total funding as of 2024, significantly less than Groq ($1.1B+), Cerebras ($720M+), or SambaNova ($1.2B+)."
      type: "estimated"
      topic: "funding-comparison"
      sourceRefs: [SP026, SP002, SP004]
      confidence: "medium"
      freshness: "current"
      answersQuestionRefs: [QP005, QP030]

    - id: "CP003"
      statement: "Groq uses a Language Processing Unit (LPU) architecture with deterministic streaming execution, optimized for low-latency inference; it supports general AI model inference including non-Transformer architectures."
      type: "third-party-reported"
      topic: "competitor-architecture"
      sourceRefs: [SP001, SP002]
      confidence: "medium"
      freshness: "current"
      answersQuestionRefs: [QP003, QP020]

    - id: "CP004"
      statement: "Cerebras Systems uses a wafer-scale engine (WSE-3) with 44GB of on-chip SRAM and focuses primarily on training and large-model inference; it is not Transformer-specialized."
      type: "third-party-reported"
      topic: "competitor-architecture"
      sourceRefs: [SP003, SP004]
      confidence: "medium"
      freshness: "current"
      answersQuestionRefs: [QP023]

    - id: "CP005"
      statement: "Google's TPU v5e is an inference-optimized tensor processing unit available on Google Cloud, used extensively for Gemini inference; it is not available for external purchase."
      type: "third-party-reported"
      topic: "hyperscaler-chip"
      sourceRefs: [SP009, SP017]
      confidence: "medium"
      freshness: "current"
      answersQuestionRefs: [QP004, QP025]

    - id: "CP006"
      statement: "AWS Inferentia2 is available on EC2 Inf2 instances and targets cost-effective inference for large language models at approximately $0.76/hr per chip on-demand."
      type: "estimated"
      topic: "pricing"
      sourceRefs: [SP016]
      confidence: "medium"
      freshness: "current"
      answersQuestionRefs: [QP004, QP006]

    - id: "CP007"
      statement: "Etched has not delivered production silicon as of Q1 2026; the company has claimed a TSMC 4N tape-out but no third-party verification or production deliveries have been reported."
      type: "third-party-reported"
      topic: "production-status"
      sourceRefs: [SP026, SP019]
      confidence: "medium"
      freshness: "current"
      answersQuestionRefs: [QP009]

    - id: "CP008"
      statement: "No known competitor has built a Transformer-only hardened ASIC for inference; Etched's specific architectural niche has no direct competition as of 2026."
      type: "inferred"
      topic: "differentiation"
      sourceRefs: [SP001, SP003, SP010, SP012]
      confidence: "medium"
      freshness: "current"
      answersQuestionRefs: [QP013, QP020, QP024]

    - id: "CP009"
      statement: "The CUDA software ecosystem, representing decades of developer investment in GPU-native ML toolchains, is NVIDIA's primary moat against alternatives including Etched."
      type: "inferred"
      topic: "switching-costs"
      sourceRefs: [SP021, SP012]
      confidence: "medium"
      freshness: "current"
      answersQuestionRefs: [QP008, QP015]

    - id: "CP010"
      statement: "Etched has no publicly available SDK or demonstrated framework compatibility (PyTorch, JAX, vLLM) as of Q1 2026; software ecosystem is pre-launch."
      type: "third-party-reported"
      topic: "software-readiness"
      sourceRefs: [SP019, SP026]
      confidence: "medium"
      freshness: "current"
      answersQuestionRefs: [QP009]

    - id: "CP011"
      statement: "AMD MI300X has achieved credible commercial traction as a NVIDIA alternative for inference, with Microsoft deploying MI300X at scale for Azure AI/OpenAI workloads."
      type: "third-party-reported"
      topic: "competitor-traction"
      sourceRefs: [SP014, SP015]
      confidence: "medium"
      freshness: "current"
      answersQuestionRefs: [QP011]

    - id: "CP012"
      statement: "Groq's GroqCloud API offers inference at approximately $0.27/1M tokens for Llama 3-70B as of late 2024, setting a competitive benchmark for inference-optimized silicon."
      type: "estimated"
      topic: "pricing"
      sourceRefs: [SP002, SP001]
      confidence: "medium"
      freshness: "current"
      answersQuestionRefs: [QP006, QP012]

    - id: "CP013"
      statement: "Tenstorrent has raised over $700M in 2024 funding and is building RISC-V-based AI chips with open hardware architecture, targeting both edge and cloud AI inference."
      type: "third-party-reported"
      topic: "competitor-profile"
      sourceRefs: [SP010, SP011]
      confidence: "medium"
      freshness: "current"
      answersQuestionRefs: [QP014]

    - id: "CP014"
      statement: "Intel Gaudi (formerly Habana Labs, acquired for ~$2B in 2019) has not achieved significant market share in AI inference; Intel's software ecosystem lags CUDA significantly."
      type: "inferred"
      topic: "competitor-failure"
      sourceRefs: [SP006, SP007, SP008]
      confidence: "medium"
      freshness: "current"
      answersQuestionRefs: [QP018]

    - id: "CP015"
      statement: "Multi-homing in AI inference—running both NVIDIA GPU and alternative inference chip in parallel—is technically feasible but requires significant engineering investment; buyers typically evaluate alternatives rather than fully switching."
      type: "inferred"
      topic: "switching-costs"
      sourceRefs: [SP021, SP024]
      confidence: "medium"
      freshness: "current"
      answersQuestionRefs: [QP016]

    - id: "CP016"
      statement: "A company evaluating Etched faces a 12-24 month sales and qualification cycle requiring SDK availability, model validation, and supply chain verification before production deployment."
      type: "inferred"
      topic: "sales-cycle"
      sourceRefs: [SP024, SP018]
      confidence: "medium"
      freshness: "current"
      answersQuestionRefs: [QP008, QP016]

    - id: "CP017"
      statement: "NVIDIA, AMD, Google, and AWS have not disclosed plans for a Transformer-only hardened ASIC; their roadmaps focus on general-purpose AI accelerators with inference optimization."
      type: "inferred"
      topic: "competitive-response"
      sourceRefs: [SP012, SP013, SP009, SP016]
      confidence: "medium"
      freshness: "current"
      answersQuestionRefs: [QP024]

    - id: "CP018"
      statement: "Graphcore raised over $700M in venture funding, reached a $2.8B peak valuation, and was acquired by SoftBank in 2023 for approximately $120M after failing to achieve commercial scale."
      type: "third-party-reported"
      topic: "adverse-competitor"
      sourceRefs: [SP005]
      confidence: "medium"
      freshness: "current"
      answersQuestionRefs: [QP010, QP026]

    - id: "CP019"
      statement: "Graphcore's commercial failure has been attributed to: misalignment with Transformer-dominated inference workloads, CUDA switching cost barriers, and failure to achieve required software ecosystem depth."
      type: "inferred"
      topic: "adverse-competitor"
      sourceRefs: [SP005]
      confidence: "medium"
      freshness: "current"
      answersQuestionRefs: [QP010, QP026]

    - id: "CP020"
      statement: "Etched faces the same three failure modes as Graphcore: architectural alignment risk (Transformer-only), CUDA ecosystem switching costs, and software ecosystem immaturity—the company must address all three before achieving commercial scale."
      type: "inferred"
      topic: "displacement-risk"
      sourceRefs: [SP005, SP021, SP019]
      confidence: "medium"
      freshness: "current"
      answersQuestionRefs: [QP010, QP017]

    - id: "CP021"
      statement: "NVIDIA is continuously improving its inference-specific software (TensorRT-LLM, NeMo Guardrails, Flash Attention integration) to close the throughput-efficiency gap with specialized inference chips."
      type: "inferred"
      topic: "competitive-response"
      sourceRefs: [SP012, SP013]
      confidence: "medium"
      freshness: "current"
      answersQuestionRefs: [QP022]

    - id: "CP022"
      statement: "Intel's Gaudi acquisition and integration journey demonstrates that acquiring or building non-CUDA AI chip capability is difficult even for a company with Intel's resources and ecosystem."
      type: "inferred"
      topic: "competitive-landscape"
      sourceRefs: [SP006, SP007, SP008]
      confidence: "medium"
      freshness: "current"
