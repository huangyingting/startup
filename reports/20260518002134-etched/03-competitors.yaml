callouts:
  - calloutType: "risk"
    title: "Graphcore Precedent is a Material Adverse Data Point"
    body: "Graphcore raised over $700M in venture capital, developed a genuinely differentiated AI chip architecture (the IPU), built enterprise relationships, and was valued at $2.8B at its peak. In 2023, it was acquired by SoftBank for approximately $120M—a 96% decline from peak valuation. The failure was attributed to: architecture mismatch with Transformer-dominated workloads, CUDA ecosystem switching costs, and inability to achieve the software ecosystem depth needed for enterprise adoption. Etched faces all three of these risks. Any diligence should explicitly compare Etched's go-to-market plan against the specific barriers Graphcore failed to overcome."
    claimRefs: [CP018, CP019, CP020]
  - calloutType: "risk"
    title: "CUDA Ecosystem Is the Real Moat"
    body: "Every AI chip startup faces NVIDIA's true moat: not hardware performance, but software lock-in. Switching from NVIDIA to any alternative requires re-validating models, replacing toolchain integration, and accepting vendor risk. Etched's SDK is pre-launch as of 2026. Until a production SDK is available with demonstrable PyTorch/vLLM compatibility, hardware performance claims are not actionable for most buyers. The sales cycle for inference silicon at a hyperscaler or large AI company spans 12-24 months and requires proven software compatibility before any hardware evaluation."
    claimRefs: [CP009, CP010, CP015, CP016]

