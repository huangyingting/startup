company:
  name: "Etched"
chapter:
  number: 2
  title: "Market Analysis"
  summary: "Etched operates at the intersection of the AI chip market, the AI inference market, and the broader semiconductor industry. The global AI chip market was estimated at $53B in 2023 and is projected to reach $300-500B by the late 2020s. Etched's direct serviceable market is the AI inference accelerator segment, driven by the explosive growth of large language model deployment by cloud hyperscalers. Key growth drivers include rising inference compute costs, LLM adoption, and the economic incentive to replace expensive GPU clusters with more efficient specialized silicon."

sections:
  - id: "market-definition"
    title: "Market Definition and Boundaries"
    body: >
      Etched competes in the AI accelerator hardware market, a fast-growing segment of the broader semiconductor industry. The market can be defined at multiple levels of granularity. At the broadest level, Etched participates in the total AI chip market, which includes chips for training, inference, and edge AI. More precisely, Etched's product (the Sohu ASIC) targets the AI inference accelerator segment — chips optimized for running, rather than training, neural network models in production environments.

      The market boundary for Etched's addressable opportunity is further defined by architecture: Sohu is hardcoded for Transformer models only, meaning its TAM is bounded by the share of AI inference workloads that are Transformer-based. As of the research date, the vast majority of commercially deployed large language models and generative AI workloads are built on Transformer architecture, including GPT-4, LLaMA, Claude, and Gemini. This gives Etched a large near-term market. However, the addressable market could contract if non-Transformer architectures capture significant inference share.

      Status-quo substitutes are primarily NVIDIA H100/H200/B200 GPU clusters deployed by cloud providers (AWS, Google Cloud, Microsoft Azure, Oracle Cloud) and on-premises by large enterprises. Adjacent competitors include Google's internal TPU infrastructure (not sold externally in traditional chip form), AWS Trainium/Inferentia, and third-party AI accelerators from Groq, Cerebras, AMD (MI300X), and Intel (Gaudi 3). Etched's chip is not positioned against training workloads — this is explicitly out of scope for the Sohu ASIC.
    claimRefs: [CM001, CM002, CM003, CM004, CM005]
    tableRefs: [TM001]

  - id: "market-sizing"
    title: "Market Sizing: TAM, SAM, and SOM"
    body: >
      Sizing the AI chip market requires multiple lenses given the rapid and uncertain growth trajectory. Global AI chip market revenue was estimated at approximately $53 billion in 2023, with NVIDIA capturing the dominant share. Independent market research firms project compound annual growth rates of 30-40% through 2030, which would put total AI chip market revenue in the $300-500 billion range by 2030, though such long-range projections carry wide uncertainty intervals.

      Within this total, the inference segment is gaining share relative to training. Several industry analyses suggest that inference will account for 50% or more of total AI compute spend by 2025-2027 as model training becomes more mature and inference demand grows with commercial deployment of LLMs. If the inference share reaches $150 billion by 2028-2030, and Transformer-based workloads represent 80-90% of inference (consistent with current model deployment patterns), the Transformer inference ASIC SAM would be in the $120-135 billion range — though Etched would capture only a fraction of this as a startup against incumbents.

      Etched's near-term SOM is considerably more constrained. In the first 2-3 years post-product launch, a realistic SOM would be cloud hyperscaler pilot programs and inference-as-a-service workloads where cost-per-token economics dominate the purchasing decision. If Etched captures just 0.1-1% of the $50-100 billion inference market by 2027-2028, that represents $50M-$1B in revenue — a wide range that reflects the extreme uncertainty in the company's commercial trajectory at this stage.

      All sizing figures in this chapter are third-party estimated from industry analysis sources and carry material uncertainty; no official market research reports were accessible for this study.
    claimRefs: [CM006, CM007, CM008, CM009, CM010, CM011]
    tableRefs: [TM002]
    figureRefs: [FM001, FM002]

  - id: "buyer-segmentation"
    title: "Buyer Segmentation and Adoption Path"
    body: >
      Etched's primary buyers are cloud hyperscalers and large enterprises that operate AI inference infrastructure at scale. The buyer landscape can be segmented into three tiers based on scale and procurement sophistication.

      Tier 1 — Hyperscalers (AWS, Google, Microsoft Azure, Oracle Cloud): These companies deploy GPU clusters at massive scale for inference workloads supporting LLM APIs (GPT, Claude, Gemini, LLaMA-based products). They have the highest volume, most sophisticated procurement processes, and the greatest potential benefit from lower cost-per-token silicon. However, they also have the longest sales cycles, highest technical validation requirements, and significant existing NVIDIA ecosystem investments. Google and AWS already operate proprietary AI chips (TPU, Trainium/Inferentia), creating an internal competition for Etched's potential sales.

      Tier 2 — AI-native Companies (OpenAI, Anthropic, Cohere, Mistral AI, etc.): These companies run massive inference workloads for their commercial AI APIs. They are cost-sensitive, technically sophisticated buyers who would benefit significantly from lower inference cost. However, they often depend on NVIDIA GPU availability as a strategic fallback.

      Tier 3 — Inference-as-a-Service Providers (Together AI, Anyscale, Replicate, etc.): Smaller-scale inference platforms that could integrate Etched's chip into their infrastructure if the performance and cost-per-token economics are validated. These buyers have shorter sales cycles and greater willingness to experiment with alternative hardware.

      The adoption path requires Etched to: (1) complete chip tape-out and first silicon; (2) achieve software compatibility with leading model serving frameworks (vLLM, TensorRT-LLM, Hugging Face Transformers); (3) demonstrate cost-per-token economics that compellingly beat NVIDIA H100/H200; and (4) build or acquire the enterprise sales and support infrastructure to serve hyperscaler procurement teams.
    claimRefs: [CM012, CM013, CM014, CM015, CM016, CM017]
    tableRefs: [TM003]
    figureRefs: [FM003]

  - id: "growth-drivers"
    title: "Growth Drivers and Adoption Constraints"
    body: >
      The primary growth driver for the AI inference hardware market is the explosive adoption of large language models in commercial applications. Since the launch of ChatGPT in November 2022, LLM inference volumes have grown dramatically across consumer AI applications, enterprise software integrations, and API-based AI services. Every query to an LLM API incurs inference compute cost, and as LLM adoption grows, the cumulative inference compute demand creates a massive and growing addressable opportunity.

      Secondary drivers include: (1) cost economics — GPU inference is expensive, and companies running millions of inferences per day face enormous compute bills; (2) latency requirements — real-time applications require low-latency inference that specialized hardware can potentially deliver more efficiently; (3) energy efficiency — data center power constraints make higher performance-per-watt silicon attractive to hyperscalers; (4) supply chain diversification — hyperscalers are actively seeking alternatives to NVIDIA dependency.

      Key adoption constraints for Etched specifically include: (1) software ecosystem — CUDA and the NVIDIA GPU software ecosystem are deeply entrenched; any new chip must support major ML frameworks; (2) switching costs — GPU infrastructure is expensive to replace; hyperscalers would need compelling TCO to justify migration; (3) silicon maturity — as a startup, Etched carries yield risk, reliability risk, and support risk that incumbents do not; (4) architecture lock-in risk — customers adopting Sohu expose themselves to a single-vendor risk on a chip tied to a specific AI architecture; (5) capital intensity — chip development and production require scale that only large orders can support.
    claimRefs: [CM018, CM019, CM020, CM021, CM022, CM023, CM024]
    tableRefs: [TM004]
    figureRefs: [FM004]

  - id: "market-gaps"
    title: "Market Sizing Gaps and Contradictions"
    body: >
      The AI chip market is characterized by rapidly changing conditions, limited public data, and widely divergent analyst estimates. Several important gaps affect the quality of the market sizing analysis in this chapter.

      First, the Transformer-specific inference share of the total AI inference market is not well-documented in public industry research; most market sizing reports aggregate all inference compute together. Etched's addressable market is bounded by this share, but quantifying it precisely requires proprietary market data not available in public sources.

      Second, multiple market research firms (IDC, Gartner, Grand View Research, Markets and Markets) publish significantly different AI chip market size estimates, with 2023 figures ranging from $40B to $80B and 2030 projections ranging from $200B to $900B. These discrepancies reflect different market boundary definitions, differing assumptions about GPU adoption rates, and different views on the training-to-inference ratio. The figures used in this chapter represent reasonable midpoints of publicly cited ranges and should be treated as order-of-magnitude estimates.

      Third, the inference market dynamics are evolving rapidly with model efficiency improvements (quantization, distillation, speculative decoding) potentially reducing per-query compute requirements — which would change the total compute spend trajectory. These efficiency gains represent both a risk (lower total market) and an opportunity (more efficient models might expand demand by making inference more affordable).
    claimRefs: [CM025, CM026, CM027, CM028, CM029]

