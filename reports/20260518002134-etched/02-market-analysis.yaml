callouts:
  - calloutType: "strength"
    title: "Massive and Growing Inference Market"
    body: "The AI inference market is one of the fastest growing segments in technology. With LLM API calls growing exponentially and hyperscalers spending tens of billions annually on GPU infrastructure, the total addressable opportunity for more efficient inference silicon is enormous. If Etched delivers on its cost-per-token economics, the market pull could be very strong."
    claimRefs: [CM006, CM018, CM019]
  - calloutType: "risk"
    title: "Architecture Dependency Constrains Addressable Market"
    body: "Etched's market is bounded by the persistence of Transformer architecture. If non-Transformer models capture even 30-40% of inference workloads, Etched's SAM shrinks proportionally. This is not a speculative risk — Mamba and SSM architectures are actively being developed and deployed, and hybrid models that combine Transformer and non-Transformer components are gaining traction."
    claimRefs: [CM003, CM004, CM027]

