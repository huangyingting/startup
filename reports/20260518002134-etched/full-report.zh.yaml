        - 竞争对手使用同一家晶圆厂；完成流片不保证量产良率或成本竞争力
        - 中
        - 核验流片状态；索取良率目标和每片晶圆成本预测
      - - Etched SDK 与软件生态
        - SDK 尚不可用；CUDA 生态护城河反过来压制 Etched
        - 高
