      - number: '2.4'
        title: 增长驱动因素与采用约束
        blocks:
          - type: paragraph
            body: >
              AI 推理硬件市场的首要增长驱动，是大语言模型在商业应用中的爆发式采用。自 2022 年 11 月 ChatGPT 发布以来，LLM 推理量在消费者 AI 应用、企业软件集成和基于 API 的 AI
              服务中大幅增长。每一次 LLM API 查询都会产生推理计算成本；LLM 采用越多，累计推理计算需求就越大，可触达机会也随之扩大。

              次级驱动包括：（1）成本经济性——GPU
              推理昂贵，每天运行数百万次推理的公司面临巨额计算账单；（2）延迟要求——实时应用需要低延迟推理，专用硬件可能更高效；（3）能源效率——数据中心电力受限，让更高每瓦性能的硅片对超大规模云厂商更有吸引力；（4）供应链多元化——超大规模云厂商正在主动寻找
              NVIDIA 依赖的替代方案。

              Etched 自身的关键采用约束包括：（1）软件生态——CUDA 和 NVIDIA GPU 软件生态根基很深，任何新芯片都必须支持主要 ML 框架；（2）切换成本——替换 GPU
              基础设施代价高，超大规模云厂商需要有说服力的总拥有成本（TCO）才会迁移；（3）硅片成熟度——作为创业公司，Etched 有良率、可靠性和支持能力风险，而既有厂商没有这些负担；（4）架构锁定风险——采用 Sohu
              的客户，会暴露在绑定特定 AI 架构的单一供应商风险之下；（5）资本强度——芯片开发和量产需要规模，只有大订单才能支撑。
