      - number: '5.4'
        title: 软件栈、SDK 与开发者界面
        blocks:
          - type: paragraph
            body: >
              截至 Q1 2026，Etched 没有发布开发者 SDK、API 文档、集成指南或模型兼容矩阵。没有任何公开软件产物，是商业部署角度最重大的产品就绪缺口。企业推理客户至少需要三样东西：模型转换工具（把
              HuggingFace 格式检查点加载到芯片上）、推理运行时（处理请求批处理和 token 调度）、以及兼容 OpenAI 格式端点的服务 API（事实上的推理 API 标准）。


              HuggingFace Transformers 库是 Transformer 模型分发和推理的主导生态框架。任何商用 AI 推理芯片都必须接入 HuggingFace
              模型中心格式（SafeTensors、config.json schema），让客户无需手工转换即可运行标准 LLaMA、Mistral、Falcon 检查点。Etched 尚未披露其编译器是直接吃
              HuggingFace 模型格式，还是需要单独转换步骤。


              推理芯片的开发者采用通常沿着一条清晰路径推进：面向开发者的文档 → 开源 SDK → 首个参考部署 → 生态工具。Etched 目前在第零步：没有 SDK、没有文档、没有参考实现。Groq 已经随 LPU
              推出开发者可访问的云 API 和公开基准数据，说明开发者界面是关键商业加速器。Etched 缺少开发者界面，显示公司先抓硅片、后抓软件——在流片阶段这是合理优先级——但会推迟客户采用，首版硅片之后收入兑现还要再多
              6-12 个月。
            claimRefs: []
          - type: table
            tableRef: TE004
            claimRefs: []
      - number: '5.5'
        title: 路线图、差异化与技术风险
        blocks:
          - type: paragraph
            body: >
              Etched 的差异化逻辑建立在三项主张上：（1）硬连线 Transformer 注意力在推理负载上相对 NVIDIA H100 带来 10×
              吞吐；（2）这种性能优势会转化为超大规模云厂商推理运营商实质性更低的每 token 成本；（3）Transformer 架构会长期占优，足以证明单一架构 ASIC 投资合理。截至 Q1
              2026，这三项主张都没有得到独立验证。


              最大技术风险是架构锁定。如果非 Transformer 架构——Mamba、RWKV 或未来循环变体——拿到显著市场份额，Sohu 会比折旧周期允许的速度更快过时。领域专用芯片的历史（早期 AI 训练芯片、基于
              FPGA 的推理加速器、第一代神经形态芯片）说明，写进硅片的架构押注可能在一个设计代际内变成搁浅资产。Etched 的赌注异常集中：不只是
              Transformer，而是把具体注意力操作硬连线进硅片，没有可编程后备路径。


              除了当前 Sohu 流片，产品路线图完全没有被刻画。第二代芯片尚未宣布，产品家族也未披露（例如仅推理 vs. 微调、数据中心 vs.
              边缘）。这对于流片阶段公司可以理解，但也是额外风险因子：客户要做供应承诺，就需要看见下一代路线图，才有理由长期采用一个平台。即使首版硅片按期成功，Etched 路线图不透明仍是商业风险。
