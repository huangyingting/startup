      - number: '5.2'
        title: 架构——硬化的 Transformer 注意力硅片
        blocks:
          - type: paragraph
            body: >
              Etched 的核心架构判断是：Transformer 注意力操作——Vaswani 等人在 "Attention Is All You
              Need"（2017）中提出的缩放点积多头自注意力——足够稳定，也足够占计算主导地位，值得被永久编码进硅片。传统 GPU 用 CUDA 内核（包括 FlashAttention 优化变体）在通用 SIMD
              计算单元上计算注意力。Sohu 的注意力引擎用硬连线逻辑门取代这条可编程路径；芯片出厂后，这些逻辑门的功能就无法更改。


              内存架构是第二个关键设计维度。现代 LLM 推理的瓶颈不是原始算力，而是内存带宽：每生成一个 token，都要从 DRAM 读取完整 KV-cache 和模型权重。Sohu 几乎肯定集成 High
              Bandwidth Memory（HBM）堆栈来解决这一点，路径类似 NVIDIA H100（HBM3）和 Groq LPU（以 SRAM 为主）。具体 HBM 代际和堆栈数量尚未披露。HBM
              带宽决定芯片每秒可解码多少 token，这也是客户最能感知的核心性能指标。


              硬连线注意力引擎带来实质性的架构取舍：它把注意力计算的硅片效率推到最高，但也永久排除了对未来可能成为主流架构的支持。Mamba 和其他状态空间模型是最显眼的替代范式；这些架构用线性递归取代注意力，无法在 Sohu
              的注意力引擎上运行。因此，Etched 做的是高信念押注：在 Sohu 的商业生命周期内，Transformer 注意力仍会主导 LLM 推理；这段生命周期通常从首次量产起算 3-5 年。
            claimRefs: []
          - type: table
            tableRef: TE003
            claimRefs: []
          - type: figure
            figureRef: FE002
            claimRefs:
              - CE001
              - CE005
              - CE008
              - CE025
              - CE030
      - number: '5.3'
        title: 制造、成熟度与技术依赖
        blocks:
          - type: paragraph
            body: >
              Sohu 面向 TSMC 4N 工艺节点设计。4N 属于 4nm 级先进节点，晶体管密度和能效适合 AI 推理芯片。TSMC 4N 是 N4
              工艺家族的客户定制变体，要求客户与晶圆厂建立关系，并承诺相当规模的最低晶圆量。领先 TSMC 产能竞争激烈；NVIDIA、AMD、Apple、Qualcomm 等大客户拥有优先配额。Etched 是没有 TSMC
              量产历史的初创公司，必须以新客户身份谈判晶圆配额，通常要接受更小批量和更长交期。


              截至 Q1 2026，芯片制造成熟度仍处于硅前阶段：公司称流片正在推进，但尚未确认。先进节点上的新架构首版硅片天然带有设计落硅风险：行业文献称，复杂数字 ASIC 不返工的首版成功率为
              50-70%，一次返工会额外增加 6-12 个月和 $5-15M NRE 成本。工程样片尚未公开展示。


              TSMC 之外的关键技术依赖包括：HBM 供应（集中在 SK Hynix、Micron、Samsung）、先进封装（HBM 需要 CoWoS 式集成，而 TSMC 的该产能本身也受限），以及 EDA
              工具链授权（Cadence、Synopsys）。每一项依赖都可能成为供应链单点故障。Etched 体量小，相比已经签有优先协议的超大规模云厂商自研芯片项目（Amazon Trainium、Google
              TPU、Microsoft Maia），可能在配额上处于劣势。
            claimRefs: []
          - type: figure
            figureRef: FE003
            claimRefs:
              - CE003
