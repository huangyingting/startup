          - type: callout
            title: CUDA 生态才是真正护城河
            body: >-
              每一家 AI 芯片创业公司面对的 NVIDIA 真护城河，都不是硬件性能，而是软件锁定。从 NVIDIA 切到任何替代方案，都需要重新验证模型、替换工具链集成，并接受供应商风险。截至 2026 年，Etched
              的 SDK 尚未发布。在可用于生产、且能证明兼容 PyTorch/vLLM 的 SDK 出现之前，对多数买方来说，硬件性能说法不可执行。超大规模云厂商或大型 AI 公司的推理硅片销售周期通常为 12-24
              个月，任何硬件评估之前，都必须先证明软件兼容。
