      - number: '6.3'
        title: 具名客户证据——缺席与类比证明
        blocks:
          - type: paragraph
            body: >
              截至 Q1 2026，Etched 没有具名客户、设计定点或公开确认的评估伙伴。Etched 自身在「具名客户证明」表中的所有客户格都是占位，代表潜在市场目标，而不是实际商业关系。对一家成立 2
              年以上、Series A 后 12 个月以上的公司来说，这并不常见：大多数处于类似融资阶段的推理芯片公司，至少会具名一个评估伙伴，或宣布开发者访问计划。


              可比推理芯片公司的类比客户证明存在，也有参考价值。Groq 的案例研究页显示，AI 原生推理平台——包括 Etched 瞄准的同规模、同类型公司——会在每 token
              性能经济性足够有吸引力时采用专用推理硬件。Groq 列出的客户案例运行面向生产消费产品的大规模 Transformer 推理，验证了买家群体存在，也愿意采用非 GPU 推理硬件。AWS Inferentia
              案例，包括 Stability AI（图像生成推理）和 Quora（Poe 聊天机器人推理），表明采用定制推理硅片的公司可在相近吞吐水平下，相比 GPU 推理实现 40-70% 成本下降。


              这些类比证明对验证买家行为假设有价值——即当每 token 成本经济性被证明后，AI 原生公司会采用推理 ASIC——但并不验证 Etched 本身。关键缺口是 Etched 特定客户信号完全缺失：没有
              LOI、没有 NDA 评估协议、没有工程简报、没有设计定点。Groq 的 G2 评价提供了开发者层面反馈，确认推理芯片采用是真实的，性能基准测试会驱动开发者采用决策。Etched 目前没有等价开发者信号，没有
              SDK，也没有公开基准测试数据。
