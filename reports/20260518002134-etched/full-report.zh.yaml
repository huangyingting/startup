chapters:
  - number: 1
    title: 公司概况
    sections:
      - number: '1.1'
        title: 公司身份与使命
        blocks:
          - type: paragraph
            body: >
              Etched 是一家总部位于 California 州 Cupertino 的半导体创业公司，2022 年注册成立。公司官网展示的使命是「为超级智能打造硬件」。Etched 的核心判断是：Transformer
              神经网络架构——GPT-4、LLaMA、Claude 等现代大语言模型的底座——在可预见的未来仍会主导 AI；只为 Transformer 工作负载优化的专用硅片，能显著跑赢通用 GPU。

              公司的主产品是 Sohu 芯片，一颗从零设计、用于加速 Transformer 推理的专用集成电路（ASIC）。GPU 是可编程的通用加速器，Sohu 则把 Transformer
              计算图固化进硅片，去掉可编程性带来的开销，以大幅提高每瓦吞吐。Etched 公开声称，单颗 Sohu 芯片在 Transformer 推理工作负载下可提供约 500,000 tokens/second，而
              NVIDIA H100 GPU 约为 20,000 tokens/second——相当于公司声称的 25x 优势。截至研究日期，这些性能数字来自公司口径，尚未得到独立验证。Etched
              采用无晶圆厂（fabless）半导体模式：公司设计芯片，制造依赖第三方晶圆厂（最可能是 TSMC）。

              Etched 的商业模式，是把 Sohu 芯片卖给希望大幅降低大规模 Transformer 模型服务成本和延迟的云超大规模厂商、大企业和 AI 推理服务商。公司目前尚无收入，Sohu 芯片仍在开发中。
