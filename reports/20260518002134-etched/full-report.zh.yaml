      - number: '6.4'
        title: 留存、扩张与集中度风险
        blocks:
          - type: paragraph
            body: >
              Etched 没有客户，因此无法直接衡量留存和流失指标。不过，推理芯片采用的结构性经济性强烈偏向高留存。一家 AI 公司若要重构服务栈、模型编译器和部署管线，让它们跑在 Sohu 硬件上——估计需要 2-5
              名专职工程师投入 3-6 个月——再切回 GPU 基础设施或替代 ASIC 时，切换成本相当于 12-18 个月的重新工程化。这会形成类似云基础设施的结构性锁定，只是不带数据可携性摩擦。


              如果性能得到验证，推理芯片赛道的扩张经济性有利。AWS Inferentia 案例显示，采用定制推理硅片的客户通常会在首次部署后 12 个月内扩容，原因是每次推理成本更低，从而支撑更高推理量。Together
              AI 和 Anyscale 若成为 Etched 潜在客户，Sohu 容量大概率会随其整体 LLM 推理增长而扩张；开源模型质量提升、推理成本下降，预计会显著拉动这类增长。


              集中度风险是 Etched 近期最严重的结构性问题。当前客户为零，因此第一个客户会贡献初始收入的 100%。即使早期有 3-5 个客户，任何单一客户占首年收入 25-35%
              的情景也会带来极端集中度风险。如果该客户减少用量——因为战略转向离开 Transformer 模型、竞争对手提供更好经济性，或其自身融资受挫——Etched
              会在没有多元化缓冲的情况下遭遇收入冲击。Graphcore 的失败部分源于客户集中：少数大客户推迟或取消部署，造成连锁收入缺口。Etched 从第一批量产开始就必须优先分散客户。
