      - number: '1.4'
        title: 公司里程碑与历史
        blocks:
          - type: paragraph
            body: >
              截至研究日期，Etched 约成立两年，公开历史有限。公司 2022 年创立于 California 州 Cupertino，使命是打造专用 AI
              推理硬件。创立初期（2022-2023）以隐身开发为主——Etched 基本没有公开披露技术或融资状态。关键拐点出现在 2024 年 6 月 26 日：公司同日宣布 $120 million Series
              A，并发布 Sohu 芯片及一组详细性能说法。

              Sohu 的公开发布，是 Etched 首次重大对外披露，内容包括 500,000 tokens per second 吞吐、相对 NVIDIA H100 GPU 25x 性能等说法。公告获得
              Bloomberg、Reuters、Wired、Fortune、TechCrunch 等媒体大量关注，也在开发者社区引发讨论。行业分析师既注意到这些说法的雄心，也指出只押注单一 AI 架构的巨大风险。

              从芯片设计角度看，关键里程碑应包括架构设计、RTL 开发、硅前仿真、流片（首颗硅片）和最终量产。截至研究日期，Etched 尚未公开确认流片或量产时间表，这是公司公开里程碑披露中的重大缺口。Series A
              之后，公司推定正处于活跃芯片开发阶段，并拥有支持硅片周期的资金；但具体技术里程碑仍未披露。
