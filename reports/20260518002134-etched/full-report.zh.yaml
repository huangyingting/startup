  - id: FU001
    title: 客户旅程图
    type: journey-map
    layout: wide
    summary: AI 推理芯片买方评估 Etched 的 Sohu 芯片时，从首次认知到多年扩张的八阶段旅程。
    data:
      nodes:
        - label: 认知与发现
          detail: 潜在客户从媒体报道、投资人网络转介或 AI 基础设施会议了解 Etched；公开 SDK 或基准数据缺位， 难以拉动开发者主动发现。
          tone: neutral
        - label: 技术简报（Etched 发起）
          detail: Etched 团队在 NDA 下向客户工程团队介绍 Sohu 架构和 10x 吞吐量主张；客户拿不到实物硬件， 也跑不了自己的基准测试。
          tone: warning
        - label: 架构兼容性检查
          detail: 客户的 ML 团队评估生产负载是否适配 Transformer（仅解码器、编码器-解码器）；MoE 和 SSM 负载这一关可能过不了。
          tone: neutral
        - label: 基准测试 / 概念验证
          detail: 客户在 Sohu 工程样片上跑代表性推理负载；对比 tokens/second、cost/token 和当前 H100 部署的延迟； 前提是 Etched 交付实物芯片。
          tone: warning
        - label: 采购与法务审查
          detail: 客户谈判采购量承诺、供货 SLA、定价和 IP 所有权条款；法务审查会把周期拉长 3–6 个月； 超大规模云厂商还需要 SOC 2 / 安全审查。
          tone: neutral
        - label: 硬件集成与 SDK 开发
          detail: 客户工程师改造服务栈：模型编译器、KV-cache 管理、批处理调度器和 API 端点都要跑在 Sohu 硬件上； 估计耗时 3–6 个月，需要 2–5 名专职工程师。
          tone: risk
        - label: 生产部署
          detail: 客户将线上推理流量路由到 Sohu 硬件；在生产负载下测量真实吞吐量、可靠性和单 token 成本。
          tone: neutral
        - label: 扩张与复购
          detail: 推理量增长后，客户追加订购 Sohu 产能；同时评估 Gen-2 路线图，决定是否做多年平台承诺； 集成切换成本高，留存预计偏高。
          tone: positive
    approximationNotes: 旅程阶段和时间估计来自类比推理芯片公司的采用模式（Groq、AWS Inferentia、Cerebras）。 Etched 未披露任何客户旅程细节。各阶段估计耗时 1–4 个月，全周期合计 12–24 个月。
