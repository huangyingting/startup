  - number: 2
    title: 市场分析
    sections:
      - number: '2.1'
        title: 市场定义与边界
        blocks:
          - type: paragraph
            body: >
              Etched 竞争的是 AI 加速器硬件市场，这是更大半导体行业中增长很快的一块。这个市场可以按不同颗粒度定义。最宽口径下，Etched 属于整体 AI 芯片市场，覆盖训练、推理和边缘 AI
              芯片。更精确地看，Etched 的产品（Sohu ASIC）瞄准 AI 推理加速器细分市场——也就是为生产环境中运行神经网络模型、而非训练模型而优化的芯片。

              Etched 可触达市场的边界，还受架构进一步限定：Sohu 只为 Transformer 模型硬编码，因此它的总可用市场（TAM）受限于 AI 推理工作负载中 Transformer
              占比。截至研究日期，商业部署的大语言模型和生成式 AI 工作负载绝大多数都建立在 Transformer 架构之上，包括 GPT-4、LLaMA、Claude 和 Gemini。这给 Etched
              带来很大的近端市场。但如果非 Transformer 架构拿到重要推理份额，可触达市场就会收缩。

              现状替代方案主要是云厂商（AWS、Google Cloud、Microsoft Azure、Oracle Cloud）部署的 NVIDIA H100/H200/B200 GPU
              集群，以及大型企业的本地部署。相邻竞争者包括 Google 内部 TPU 基础设施（不以传统芯片形式对外销售）、AWS Trainium/Inferentia，以及
              Groq、Cerebras、AMD（MI300X）、Intel（Gaudi 3）等第三方 AI 加速器。Etched 的芯片并不面向训练工作负载——这明确不在 Sohu ASIC 范围内。
