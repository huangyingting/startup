      - number: '6.5'
        title: 客户结论——尽调阻断项
        blocks:
          - type: paragraph
            body: >
              Etched 的客户尽调结论，在本报告中明确是最高严重级别的阻断项。Etched 是一家尚无收入、尚无硅片的公司，公开具名客户关系为零，供客户评估的公开基准测试为零，供开发者试验的 SDK
              为零，设计定点为零。任何客户信号的缺失并非由保密策略解释——公司已在 June 2024 公开宣布 $120 million Series A——而是反映公司确实仍处于商业化前阶段。


              来自 Groq（案例研究显示 AI 原生推理平台采用）和 AWS Inferentia（超大规模云客户采用 ASIC
              的证明）的类比证据，在市场层面验证了买家行为假设。这些类比确认推理芯片买家群体存在，有预算和采购能力采用非 GPU 推理硬件，并会在每 token 成本经济性被证明后这样做。但这种市场层面证明并不降低
              Etched 的公司特定客户风险，后者仍然关键。


              客户章节的关键尽调问题是：（1）Etched 是否已进入任何 NDA 约束下的评估协议，即便只是非正式？（2）Etched 已向哪些公司在工程层面介绍 Sohu
              架构？（3）公司对首个客户关闭日期和首笔收入日期的估计是什么？（4）是否有任何公司表达过书面兴趣，愿意在首版硅片性能达标后签署量产供应协议？在这些问题拿到可验证证据前，客户章节就是阻断性尽调风险，任何投资委员会都不应忽视。Graphcore
              先例——一家融资超过 $700M 的芯片初创公司，未能把强工程证明转化为规模客户采用——直接警示了 Etched 面临的客户开发难度。
