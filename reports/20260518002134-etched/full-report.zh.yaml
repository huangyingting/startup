      - number: '8.2'
        title: 可比公司与先例交易分析
        blocks:
          - type: paragraph
            body: >
              对一家尚无收入、只做 Transformer 推理 ASIC 的初创公司，没有直接可比的上市公司。最接近的公开可比对象是 Marvell Technology——其面向超大规模云厂商的定制 AI ASIC 业务在
              2025 财年产生约 $1.6 billion 收入，EV/Revenue 为 10–15×——以及 Broadcom，其 AI 定制硅片和网络业务在整体市值中维持 18–20× EV/Revenue
              溢价。NVIDIA 仍是理想化标杆，AI 基础设施收入约 25× EV/Revenue，但其多元化护城河和软件栈（CUDA）与 Etched 单产品、尚无收入的画像在结构上不可比。


              在可比私人阶段同行中，Cerebras 于 September 2024 提交 IPO，隐含估值 $7–8 billion，尽管商业客户有限，说明 AI 芯片初创公司可以维持较高私人估值。Groq 在 2024
              年初融资 $640 million，隐含估值约 $2.5 billion，但 Groq 已有生产 LPU 部署和付费客户，风险已显著低于 Etched。Intel 于 December 2019 以约 $2
              billion 收购 Habana Labs，是尚无收入 AI 芯片初创公司收购的主要正面数据点，不过 2026 年 AI 芯片格局比 2019 年竞争明显更激烈。
