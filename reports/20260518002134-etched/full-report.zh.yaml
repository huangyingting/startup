      - number: '7.5'
        title: 财务与投资风险
        blocks:
          - type: paragraph
            body: >
              Etched 的财务风险由三项因素叠加主导：（1）资本强度极高且时点不确定；（2）当前收入为零，最好也要到 H2 2027 前才可能看见首笔收入；（3）自 2023 年以来，除 AI
              超大规模云厂商支持的公司外，融资市场对深科技硬件投资的胃口已经下降。


              在 TSMC N3/N4 工艺节点开发 ASIC，单次流片总项目成本估计为 $50–200 million，取决于掩膜版数量、设计复杂度和所需验证迭代次数。这笔成本会在向客户交付任何芯片前就被投入。Etched
              的 $120 million Series A 按典型硅前烧钱速度（每月 $3–6 million）可提供约 18–36
              个月现金跑道，但这条跑道可能不足以覆盖从流片到首版硅片、客户评估和设计定点的桥段，尤其是如果流片需要一次或多次重新流片。


              在任何产品收入实现前，Etched 必须融资 Series B，这让公司的财务生存完全依赖 VC 市场条件；而利率、AI 投资情绪、初创公司融资倍数都不确定。如果 2026–2027 年 AI
              支出增长放缓或暂停，Etched 瞄准的推理芯片市场可能收缩，既降低客户采用新硬件的意愿，也削弱投资人资助尚无收入芯片初创公司的胃口。收入集中度风险也很严重：即便 Etched 进入量产，最初 3–5
              个客户也可能贡献初始收入的 60–80%，对任何单一客户的用量下调或退出形成极端敞口。
            claimRefs:
              - CR033
              - CR034
              - CR035
              - CR036
              - CR037
              - CR038
              - CR039
              - CR040
