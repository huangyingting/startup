      - number: '2.2'
        title: 市场规模：TAM、SAM 与 SOM
        blocks:
          - type: paragraph
            body: >
              AI 芯片市场增长快且不确定，测算必须同时看几个口径。2023 年全球 AI 芯片市场收入估计约 $53 billion，其中 NVIDIA 占主导份额。独立市场研究机构预计，到 2030 年复合年增长率为
              30-40%，这会把整体 AI 芯片市场收入推到 $300-500 billion 区间；但这类长期预测的不确定区间很宽。

              在整体市场内部，推理相对训练的份额正在上升。多份行业分析认为，随着模型训练更成熟、LLM 商业部署带动推理需求增长，到 2025-2027 年，推理将占 AI 计算总支出的 50% 或以上。如果推理份额在
              2028-2030 年达到 $150 billion，而 Transformer 工作负载占推理的 80-90%（与当前模型部署模式一致），Transformer 推理 ASIC 的可服务市场（SAM）将在
              $120-135 billion 区间——不过 Etched 作为对抗既有巨头的创业公司，只能拿到其中一小部分。

              Etched 近期可获取市场（SOM）要受限得多。产品发布后的前 2-3 年，现实 SOM 应该是云超大规模厂商试点项目，以及由每 token 成本主导采购决策的推理即服务工作负载。如果到 2027-2028
              年，Etched 只拿到 $50-100 billion 推理市场的 0.1-1%，也对应 $50M-$1B 收入——区间很宽，反映出公司当前商业路径仍极不确定。

              本章所有规模数字均来自第三方行业分析估计，且存在重大不确定性；本研究无法访问官方市场研究报告。
