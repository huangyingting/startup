      - number: '1.2'
        title: 创始人与领导层
        blocks:
          - type: paragraph
            body: >
              Etched 由 Gavin Uberti（CEO）和 Chris Zhu（CTO）共同创立，早期媒体报道还将 Robert Winslow 列为联合创始人。Gavin Uberti 担任首席执行官，此前曾在
              Microsoft 从事研究，具备 AI 系统和硬件加速经验。AI 研究与工程的交叉背景，让他具备深科技半导体创业公司所需的创始人与市场匹配度。Chris Zhu 担任首席技术官，带来硬件设计和 AI
              系统方面的互补技术能力。

              创始团队规模很小，三位联合创始人之外的领导层名单未公开。关键人依赖因此较重——任何一位创始人离开，都可能明显影响技术路线和投资人信心。董事会和治理结构也未公开；这对当前阶段的私营创业公司很常见，但仍是尽调缺口。截至研究日期，Etched
              自创立以来未报告任何重大领导层变动。公司员工数未公开；基于资金充足的半导体创业公司在 Series A 后的典型招聘节奏，团队规模应已扩大，但没有可用的具体数字。

              创始团队的技术深度是重要资产：定制 ASIC 需要硬件设计、芯片架构、EDA 工具和半导体制造的深厚能力。创始人背景显示他们具备相关能力，但公开资料无法独立核验其具体芯片设计资历。
