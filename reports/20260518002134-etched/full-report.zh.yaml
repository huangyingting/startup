      - number: '8.6'
        title: 图表
        blocks:
          - type: callout
            title: Graphcore 类比——架构强，商业牵引弱
            body: >-
              Graphcore 融资超过 $700 million，达到基准测试优于对手的架构性能，并一度维持 $2.8 billion 峰值估值，但在未实现商业规模的情况下于 2023–2024 年陷入严重下滑。其 IPU
              软件栈从未达到企业级成熟度。Etched 与 Graphcore 共享所有结构性风险：第一次做芯片的公司、专用架构、无收入、依赖超大规模云采用，而这种采用从未在 Graphcore 身上实现。押注
              Graphcore 技术资质而非商业进展的投资人，经历了近乎全额减记。
            calloutType: insight
            claimRefs:
              - CV006
              - CV017
              - CV021
          - type: callout
            title: 条件性负面：高溢价入场下，概率加权 EV 不足
            body: >-
              $800 million 至 $1.1 billion 的概率加权预期企业价值，几乎只能覆盖估计 $600–800 million 入场区间中点。任何高于 $1.5 billion
              的隐含投后估值下，按当前情景分析，投资的期望值为负。高溢价入场要转为正期望值，唯一路径是大幅提高乐观情景概率——这需要首版硅片交付、客户 LOI 或 Series B 牵引的证据，而截至 Q2 2026
              公开信息中并不存在。
            calloutType: insight
            claimRefs:
              - CV040
              - CV041
          - type: callout
            title: Marvell 和 Broadcom 是最可能的战略收购方
            body: >-
              如果 Etched 实现首版硅片，并拿下哪怕一个超大规模云客户设计定点，Marvell Technology 和 Broadcom 就是结构上最有动机的收购方：两家公司都有成熟的超大规模云定制 ASIC
              业务，都需要扩展 Transformer 推理 IP 组合，也都有整合 Sohu 架构的技术团队。$1.5–3 billion 的收购——位于基准到乐观过渡区间内——会显著改变 Etched
              投资人的回报，并且对任一收购方都有战略合理性。这条路径是基准情景结果下最可信的退出场景。
            calloutType: insight
            claimRefs:
              - CV024
              - CV027
              - CV030
