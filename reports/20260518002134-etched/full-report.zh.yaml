      - number: '1.3'
        title: 融资历史与投资人
        blocks:
          - type: paragraph
            body: >
              Etched 于 2024 年 6 月 26 日公开宣布完成 $120 million Series A，报道估值约 $1 billion，使公司在 Series A
              阶段成为独角兽。Bloomberg、Reuters、TechCrunch、Wired、Fortune 等财经与科技媒体均做了大量报道。Primary Venture Partners
              被列为关键投资人，Positive Sum 被确认参投。完整投资人银团构成和持股比例未公开。

              对尚无收入的半导体创业公司来说，$120 million 融资规模很大，反映出投资人对 AI 基础设施的高度兴趣，也反映出资本正在押注下一代推理硬件。相比之下，近年其他 AI
              芯片创业公司的融资也接近这一量级：Groq 多轮累计融资超过 $1 billion，Cerebras Systems 累计融资约 $720 million。Series A 之前，Etched
              的前种子轮和种子轮融资历史未公开。截至研究日期，没有公开记录显示公司发生老股交易、债务融资或可转债。

              对一家尚未流片、没有付费客户、且面对成熟生态巨头的公司来说，Series A 即 $1 billion 估值相当激进。这个估值主要像是在买一个期权：Transformer 架构将主导 AI 推理，且 Etched
              能把芯片做出来。这个判断同时带有显著技术风险和市场风险。
