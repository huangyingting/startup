          detail: 用于 RTL 综合、布局布线、时序收敛、DRC/LVS 验证的电子设计自动化软件；年度授权成本 $5-10M+
          tone: neutral
        - id: d4
          label: IP 核（ARM / Synopsys DesignWare）
          detail: 从 IP 供应商授权的标准单元库、PCIe PHY IP、HBM 控制器 IP；嵌入 ASIC 设计，流片必需
          tone: neutral
        - id: d5
          label: TSMC CoWoS 先进封装
          detail: Chip-on-Wafer-on-Substrate 或等效封装，用于 HBM-on-interposer 集成；TSMC 产能受限，且超大规模云厂商优先
          tone: neutral
        - id: d6
