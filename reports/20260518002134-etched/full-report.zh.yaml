  - number: 6
    title: 客户情况
    sections:
      - number: '6.1'
        title: 客户群分层与目标买家
        blocks:
          - type: paragraph
            body: >
              Etched 的 Sohu 芯片瞄准 AI 推理芯片买家。这个群体很窄：他们以足够大规模运行基于 Transformer 的大语言模型，GPU 成本已经成为实质性运营开支。主要买家画像是每年在
              Transformer 推理 GPU 计算上花费超过 $50 million 的公司里的基础设施 VP 或 ML 平台负责人。截至 Q1 2026，全球大约有 50-200
              家公司符合这一画像，集中在三层：（1）OpenAI、Anthropic、Mistral 等前沿 AI 实验室，在消费者互联网规模运行自研 Transformer
              模型；（2）AWS、Google、Microsoft 等超大规模云厂商，把 LLM 推理 API 作为商业产品；（3）Together AI、Anyscale、Perplexity AI
              等推理即服务平台，为商业开发者运行开源 Transformer 模型。


              这个分层由 Transformer 负载性质定义，而不是行业垂直。任何大规模运行自回归 Transformer 解码器推理的组织——无论是 AI 原生公司、提供 LLM API
              的超大规模云厂商，还是部署自研模型的大企业——都是潜在 Sohu 客户。主要运行 Transformer 编码器负载的组织（embedding、分类、BERT
              级模型）优先级更低，因为硬连线硅片的注意力计算优势在单次编码器推理上不如自回归解码明显。


              Etched 可触达买家第一波高度集中在美国：OpenAI、Anthropic、Together AI、Anyscale、Scale AI、Perplexity 都总部在美国。Cohere（加拿大）和
              Mistral（法国）是公开已知具备推理规模的少数一线国际潜在客户。这种集中度对销售动作有利——账户更少、地理上更容易触达——但如果美国监管环境或出口管制框架限制芯片供应关系，也会带来风险。
