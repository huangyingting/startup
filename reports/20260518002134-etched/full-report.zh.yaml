      - number: '8.4'
        title: 资本结构、回报要求与退出路径
        blocks:
          - type: paragraph
            body: >
              Etched 在 June 2024 融资 $120 million Series A，由 Positive Sum 领投，Primary Venture Partners
              共同投资。投后估值未公开披露。根据这种规模硬件公司典型 Series A 稀释规范，分析师估计投后估值在 $600–800 million 区间，隐含约 15–20% 新股稀释。在这一入场价格下，领投方至少需要
              10× 回报才能达到标准创投基金回报目标，对应退出企业价值 $6–8 billion。本分析没有任何情景在基准概率权重下达到这一门槛；只有在 2024 年水平的退出倍数维持不变时，乐观情景才达到。


              最可能的退出路径是被超大规模云厂商——AWS、Google、Microsoft 或 Apple——战略收购，或被有 AI ASIC 敞口的半导体公司——Broadcom、Marvell 或
              Qualcomm——收购。IPO 最早也不太可能早于 H2 2028；Cerebras IPO 推迟说明，即便已有生产部署，AI 芯片公司上市也很困难。尚无收入硬件公司的历史创投基准率很冷峻：不到 10% 能实现
              10× 或更高回报；多数会在 Series A 后五年内经历减记或困境退出，因此应对预测情景施加高折现率。概率加权期望值约 $800–1,100 million，仅略高于估计 $700 million
              入场区间中点；对于高于基准入场价的新仓位，风险补偿不足。
            claimRefs:
