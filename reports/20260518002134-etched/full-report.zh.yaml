      - number: '3.2'
        title: 现有 GPU 竞争者
        blocks:
          - type: paragraph
            body: >
              截至 2024-2025 年，NVIDIA 约占 AI 加速器市场 80-90%。H100 和即将推出的 Blackwell 架构主导训练与推理工作负载。NVIDIA
              的竞争护城河由四层相互咬合的能力构成：（1）CUDA 软件生态，积累了数十年开发者投入；（2）NeMo 和 TensorRT 推理优化框架；（3）与 TSMC 绑定的大规模制造承诺；（4）信任——每一家主要 AI
              公司都已在生产环境验证 NVIDIA 硅片。NVIDIA 的主要弱点是定价权：2023-2024 年峰值时期，H100 GPU 单价为 $30-40K，H100 推理集群每机架成本为 $2-8M。


              AMD Instinct MI300X 已成为推理工作负载中最可信的替代 GPU。AMD 的 ROCm 软件栈明显改善，Microsoft Azure 也承诺为 OpenAI 工作负载大规模部署
              MI300X。Intel Gaudi（原 Habana Labs，2019 年以约 $2B 被收购）瞄准训练和推理工作负载，但尚未取得显著市场份额；Intel 软件生态明显落后于 CUDA。


              GPU 既有厂商对 Etched 的主要战略回应，会是降低推理优化 SKU（H100 NVL、Blackwell B100、B200）价格，并加快推理专用固件和软件开发。AMD 和 NVIDIA
              都已在出货推理优化版本，提供更高的每 FLOP 内存带宽。
            claimRefs: []
      - number: '3.3'
        title: 超大规模云厂商内部项目
        blocks:
          - type: paragraph
            body: >
              AWS、Google 和 Microsoft 都开发了内部 AI 芯片，专门用来降低 NVIDIA 依赖和推理成本。Google 的 TPU（张量处理单元）项目已迭代到 v5，是最成熟的内部芯片项目。Google
              TPU v5e 专门针对推理优化，并可通过 Google Cloud 使用；第三方不能直接购买芯片。Google 大量使用 TPU 做 Gemini 推理，内部已部署数万颗。


              AWS Trainium（训练）和 Inferentia（推理）是 Amazon 的内部 AI 芯片。AWS Inferentia2 面向大语言模型的高性价比推理，可由 AWS 客户通过 Amazon EC2
              Inf2 实例使用。AWS 未披露这些芯片的收入或部署规模，但它们对 AWS 生态中的第三方推理硬件构成可信威胁。Microsoft 开发了 Maia 100 AI 加速器，并于 2023 年 11
              月发布，目标是 Azure AI 内部推理工作负载，包括 OpenAI 的 Azure 部署。


              Etched 仍有向超大规模云厂商销售的可能——鉴于 Sohu 芯片的吞吐说法，OpenAI
              被公开列为潜在客户——但云厂商内部项目既是竞争，也带来买方验证风险：超大规模云厂商已经证明，它们愿意且有能力自研硅片，而不是向第三方付费。
