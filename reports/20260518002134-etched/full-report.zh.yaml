      - number: '7.3'
        title: 竞争替代与过时风险
        blocks:
          - type: paragraph
            body: >
              Etched 面临的竞争风险比多数芯片初创公司更严峻，因为主要竞争对手 NVIDIA 既拥有主导市场地位，又有多代路线图，不断抬高 Sohu 必须跨过的性能门槛。NVIDIA Blackwell 架构（H100
              后继，2024–2025 推出）较 Hopper 级硅片带来 2–4× 推理吞吐提升。预计 2026–2027 的 Rubin 架构还会进一步拉大领先。Etched 要赢得客户，Sohu
              需要的不是某一个时间点的性能优势，而是跨越整个 NVIDIA 路线图的持续优势；如果 Sohu 流片哪怕滑后一代，这个要求都会更难，因为 Sohu 要追的差距会变大。


              NVIDIA 之外，AMD MI300X/MI325X 芯片已拿下有意义的 AI 推理市场份额，尤其是在运行开源模型的推理即服务平台中。AMD 相比 NVIDIA 价格更低的位置，对 Etched 形成双向价格
              / 性能挤压：NVIDIA 设定性能天花板，AMD 设定成本地板。超大规模云厂商自用硅片项目——Google TPU v6（Trillium）、AWS Trainium 2、Microsoft Maia
              100——会绕开 Etched 最有价值潜在客户所在的市场；如果超大规模云厂商把自有推理负载全部转向自研硅片，Etched 的可触达市场会收缩到推理即服务平台和不能自研芯片的企业 ML 团队。


              直接 AI 推理 ASIC 竞争对手 Groq（LPU）和 Cerebras（CS-3）已经量产，有真实客户和公开性能基准测试。Etched
              进入的是一个至少已有两个直接硬件类比对象的市场；它们在客户关系和量产经验上领先 2–3 年。Graphcore 的失败——技术架构强，但没有持续商业牵引——是最有启发性的先例：专用 AI
              芯片公司如果在资本耗尽前无法把架构优势转化为客户承诺，往往会失败，不管技术本身多强。
