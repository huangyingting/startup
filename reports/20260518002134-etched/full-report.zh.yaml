        - 高（反向数据）
        - 研究 Graphcore 失败模式；评估 Etched 的 GTM 计划是否解决 Graphcore 曾遇到的分发和 软件生态壁垒
    notes: >-
      风险登记表基于公开竞争对手披露、独立 AI 芯片行业报道和历史先例作分析评估。严重性评级： 高 = 若不解决，可能实质损害 Etched 市场机会；中 = 执行得当即可管理；低 = 仅需监测。 所有严重性评级都需对照
