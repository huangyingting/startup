  - number: 7
    title: 风险
    sections:
      - number: '7.1'
        title: 技术与架构风险
        blocks:
          - type: paragraph
            body: >
              Etched 的首要技术风险，是其架构押注不可逆。Sohu ASIC 把 Transformer 注意力机制直接硬编码进硅片：多头注意力、key-value caching、softmax
              计算的连线都在硬件中物理实现。一旦提交流片——在 TSMC N3/N4 工艺节点，估计价格为 $50–200 million——如果 Transformer 范式在 Sohu
              实现商业收入前被实质性替代，就没有软件层面的补救路径。


              架构替代风险不是假设。Mamba（结构化状态空间模型）和 RWKV 已在语言建模基准测试上展现出与 Transformer 竞争的性能，同时去掉了 KV-cache；而 KV-cache 正是 Sohu
              硅片被优化来加速的数据结构。Mixtral 8x7B 等 Mixture-of-Experts（MoE）模型也显示，大规模推理可以用与稠密解码器 Transformer 根本不同的计算图实现。如果 SSM 或
              MoE 架构在 4–6 年内获得超大规模云厂商的生产采用，Sohu 硅片就会在架构上搁浅，除非完全重新设计，否则没有恢复路径。


              架构风险之外，High Bandwidth Memory（HBM）供应链集中在 SK Hynix、Samsung、Micron 三家；相比 NVIDIA 和 AMD，AI
              芯片初创公司在配额队列中几乎没有议价权。HBM3E 供应受限会拖慢 Sohu 量产，不管流片是否成功。TSMC 本身也是单点依赖：如果台海升级、地震或其他不可抗力冲击 TSMC，就没有具备足够产能的替代
              N3/N4 晶圆厂。最后，首次 ASIC 设计经常在首版硅片上错过 PPA（power, performance, area）目标；一次重新流片会增加 12–18 个月和 $20–50 million 额外成本。
