              Etched 的财务画像存在重大缺口，无法从公开资料补齐。收入为零（产品前阶段）。所有运营指标（烧钱速度、现金余额、员工数、COGS 结构、毛利率预测）均未披露。没有可用财务报表。作为私营公司，Etched
              无需提交公开财务文件。2024 年 6 月的 $120M 融资，是记录中最主要的财务事实。


              最重要的财务尽调阻断项包括：（1）截至 2026 年 Q1 的实际烧钱速度和现金余额（公司资金是否足以撑到流片，还是近期就需要融资？）；（2）TSMC
              晶圆承诺和成本条款（决定每颗芯片成本和毛利率潜力）；（3）首个客户 LOI 或设计定点（验证收入模式和时间表）；（4）达到首次量产所需总资本（决定 Series A 是否足够，还是需要过桥融资）。


              财务结论是，Etched 正处在半导体创业公司的最高风险区间：所有资本都投入开发且没有收入，产品尚未在生产环境验证，下一轮融资必须在商业验证前完成。这在结构上类似 Cerebras、Groq 和
