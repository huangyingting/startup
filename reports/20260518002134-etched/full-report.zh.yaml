      - number: '8.3'
        title: 情景分析——乐观、基准与悲观情景
        blocks:
          - type: paragraph
            body: >
              乐观情景给 Etched 15–20% 概率：在 TSMC N4 首版硅片一次通过、无需重新流片；到 H2 2027 至少确认一个超大规模云客户设计定点；到 2028 年达到 $200–300 million
              合同收入或确认收入。套用与早期 Marvell AI ASIC 可比对象一致的 10–15× EV/Revenue 倍数，企业价值隐含为 $3–5 billion，相当于在估计 $600–800 million
              入场价上实现 4–7× 回报。


              基准情景（40–50% 概率）假设首版硅片交付，但至少出现一次重大性能短板或集成挑战，初始只有一个客户设计定点，2028 年收入轨迹为 $100–150 million。按 4–6× EV/Revenue
              做风险调整，企业价值隐含为 $800 million 至 $1.5 billion——低于领投 Series A 投资人 10× 回报门槛。悲观情景（30–40% 概率）涵盖流片失败、需要硅片重新流片、Mamba
              或 SSM 采用导致架构过时，或到 2026 年底无法关闭 Series B。结果是以 $200–500 million 困境退出，相当于 Series A 资本基数亏损。Cerebras 自身经验说明，没有
              IPO 动能也可能维持私人估值，但很脆弱；Graphcore 从 $2.8 billion 峰值到困境收购，是下行参考点。
