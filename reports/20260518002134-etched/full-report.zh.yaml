      - number: '7.2'
        title: 监管、地缘政治与法律风险
        blocks:
          - type: paragraph
            body: >
              Etched 处在三条不同法律和监管风险向量的交点。第一，美国 Bureau of Industry and Security（BIS）根据 Export Administration
              Regulations（EAR）执行出口管制，要求先进半导体物项出口取得许可证。BIS Entity List 限制向数百个受关注主体出口；任何向国际客户销售 Sohu 芯片的行为，都需要核验 Entity
              List，并可能提交出口许可申请。October 2023 Federal Register 收紧半导体制造物项出口管制的规则，也对先进逻辑芯片供应链施加限制，影响 TSMC 制造芯片流向受限司法辖区客户的方式。


              第二，CHIPS and Science Act（2022）提供最高 $52 billion 半导体制造激励，但任何接受 CHIPS Act 资金的公司都要承担限制，包括 10
              年内不得在受关注国家实质性扩张先进芯片制造。Etched 本身未必寻求直接 CHIPS Act 资金，但其制造伙伴 TSMC 会；与获得 CHIPS 资助的晶圆厂签供应协议，会带来合规义务，可能限制 Etched
              服务某些国际客户的能力。


              第三，IP 和专利敞口带来法律风险。NVIDIA 已表现出对半导体竞争对手提起专利诉讼的意愿；Arm Holdings 广泛授权其 ISA 和微架构，任何纳入 Arm 处理器核心的芯片都需要有效授权协议。如果
              Sohu 纳入任何基于 Arm 的控制核心（复杂 ASIC 中很常见），Etched 就承担持续 Arm 授权义务。商业秘密风险也偏高：从 NVIDIA、Meta 或 Google 加入 Etched
              的工程师，可能面对前雇主的 IP 挪用指控。EU AI Act（2024）引入第四个监管维度：其关于通用 AI（GPAI）模型合规的条款会影响 Etched
              的目标客户，并可能为推理基础设施层带来间接芯片合规要求。
