              AI 推理市场是科技行业增长最快的细分领域之一。LLM API 调用量呈指数级增长，超大规模云厂商每年在 GPU 基础设施上投入数百亿美元，因此更高效推理硅片的总可触达机会巨大。如果 Etched 兑现每
