      - number: '8.5'
        title: 退出准备度、终止触发器与投资结论
        blocks:
          - type: paragraph
            body: >
              三个明确的投资逻辑破裂触发器，定义了任何现有仓位必须退出、任何潜在投资都必须拒绝的条件，不论入场价格如何。第一，TSMC N4 流片失败或计划外中止会把企业价值压到接近零；在没有功能芯片的困境情景下，IP
              价值低于 $100 million。第二，如果 Mamba、RWKV 或任何 SSM 家族架构在 Sohu 商业发布前，在任一前三大超大规模云厂商处获得确认的生产推理部署，仅支持 Transformer
              的差异化就会在没有恢复路径的情况下被消除。第三，如果 Etched 无法在 Series A 完成后 24 个月内，以 $800 million 或更高估值关闭 Series
              B，投资人担忧将释放即将陷入困境的信号。


              投资决策前还必须解决三个最终尽调问题。必须披露 Series A 投后估值和股权结构表，以确定入场价格、稀释基线和清算优先权堆叠。必须提供月度烧钱速度、带里程碑日期的流片时间表、累计 TSMC NRE
              支付，以验证现金跑道和 Series B 时点。必须披露任何已签 LOI、评估协议、客户管线数据或 NDA 下简报接收方，以支撑商业逻辑。投资结论是：隐含估值高于 $1.5 billion 时为条件性负面；在
              $800 million 或以下时为条件性观察，但前提是 Series B 关闭、流片完成，并确认首个客户设计定点。
            claimRefs:
              - CV031
              - CV032
              - CV033
              - CV034
              - CV035
              - CV036
