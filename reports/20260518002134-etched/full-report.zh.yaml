      - number: '2.3'
        title: 买方分层与采用路径
        blocks:
          - type: paragraph
            body: >
              Etched 的主要买方，是规模化运营 AI 推理基础设施的云超大规模厂商和大型企业。按规模和采购成熟度，买方可以分成三层。

              第一层——超大规模云厂商（AWS、Google、Microsoft Azure、Oracle Cloud）：这些公司以巨大规模部署 GPU 集群，支撑 LLM API（GPT、Claude、Gemini、基于
              LLaMA 的产品）的推理工作负载。它们量最大、采购流程最成熟，也最可能从更低每 token 成本的硅片中受益。但它们的销售周期也最长，技术验证要求最高，并且已经在 NVIDIA 生态中投入巨大。Google 和
              AWS 已运营自研 AI 芯片（TPU、Trainium/Inferentia），对 Etched 的潜在销售形成内部竞争。

              第二层——AI 原生公司（OpenAI、Anthropic、Cohere、Mistral AI 等）：这些公司为商业 AI API
              运行海量推理工作负载。它们对成本敏感，技术成熟度高，会显著受益于更低推理成本。但它们通常也把 NVIDIA GPU 可用性当作战略后备。

              第三层——推理即服务提供商（Together AI、Anyscale、Replicate 等）：这些较小规模的推理平台，如果 Etched 的性能和每 token 成本得到验证，可能把 Etched
              芯片接入基础设施。这类买方销售周期更短，也更愿意试验替代硬件。

              Etched 的采用路径需要完成四步：（1）完成芯片流片和首颗硅片；（2）与主流模型服务框架（vLLM、TensorRT-LLM、Hugging Face Transformers）实现软件兼容；（3）证明每
              token 成本明显优于 NVIDIA H100/H200；（4）自建或补齐企业销售和支持能力，以服务超大规模云厂商采购团队。
