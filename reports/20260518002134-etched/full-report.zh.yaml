      - number: '3.6'
        title: 图表
        blocks:
          - type: callout
            title: Graphcore 先例是重要反向数据点
            body: >-
              Graphcore 融资超过 $700M，开发出真正差异化的 AI 芯片架构（IPU），建立了企业客户关系，并在峰值时估值 $2.8B。2023 年，SoftBank 以约 $120M 收购
              Graphcore，较峰值估值下跌 96%。失败原因被归结为：架构与 Transformer 主导的工作负载不匹配、CUDA 生态切换成本，以及无法建立企业采用所需的软件生态深度。Etched
              面临这三类风险。任何尽调都应把 Etched 的上市销售计划，与 Graphcore 未能跨越的具体壁垒逐项对比。
            calloutType: risk
            claimRefs:
              - CP018
