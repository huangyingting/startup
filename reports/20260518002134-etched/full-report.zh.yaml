            body: >
              Etched 于 2024 年 6 月完成 $120M Series A，投资人包括 Primary Venture Partners 和 Positive Sum。截至 2026 年
              Q1，公司尚未宣布后续融资。$120M 是全部已披露外部融资。公司未公开披露任何债务额度、项目融资或政府补助。


              Etched 这个阶段的半导体创业公司，月度烧钱速度通常为 $3-8M/month，主要由以下因素驱动：（1）工程人员（芯片设计师总薪酬 $300-500K）；（2）EDA
              软件授权（$5-10M/year）；（3）晶圆试产和掩膜组成本；（4）运营费用。按 $5M/month 中点烧钱计算，$120M 可从交割日起支撑约 24 个月现金跑道，意味着跑道延伸至约 2026 年
              H2，与预期流片完成时点一致。


              关键资本里程碑，是量产硅片可用。如果流片按计划完成，公司需要在首颗硅片前或刚完成后立即募集 Series B（基于同类半导体融资，估计
              $200-500M），以支持量产、客户爬坡和下一代芯片开发。无法按时融资会带来重大持续经营风险。在没有额外资本的情况下，通向首笔客户收入的跑道长于当前资金能支撑的时间。
