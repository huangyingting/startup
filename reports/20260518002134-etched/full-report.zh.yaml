          detail: Etched 制造的芯片，集成硬连线注意力引擎、HBM 接口和主机 PCIe；截至 2026 年 Q1 正在流片
          tone: positive
        - id: d7
          label: 模型框架（HuggingFace / PyTorch）
          detail: 开源模型分发和 checkpoint 格式生态；Etched 编译器必须接入 HuggingFace SafeTensors 和 config 格式
          tone: neutral
        - id: d8
          label: 客户推理部署
          detail: 客户将 Sohu 集成进推理服务器基础设施；需要可用的编译器、运行时和 SDK；截至 2026 年 Q1 未宣布客户
          tone: positive
