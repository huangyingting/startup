  - id: FR003
    title: 技术迁移风险图
    type: dag
    layout: wide
    summary: 有向无环图，展示架构替代风险（Mamba/MoE 采用）如何沿 Sohu 价值链传导至收入风险和融资结果。
    data:
      nodes:
        - id: mamba-adoption
          label: Mamba / SSM 采用激增
          detail: 状态空间模型在生产规模上证明性能达到或超过 Transformer 质量，减少受注意力计算约束的推理负载占比。
        - id: moe-diffusion
          label: MoE 架构成为默认选择
          detail: Mixture-of-Experts 模型（如 Mixtral）取代稠密 Transformer 解码器，成为主导 LLM 架构， 推理计算图随之改变，Sohu 无法加速。
        - id: transformer-share-falls
          label: 仅 Transformer 负载下降
          detail: SSM 和 MoE 模型获得采用后，纯稠密 Transformer 解码器推理在总推理计算中的占比下降。
        - id: sohu-tam-contracts
          label: Sohu 可服务市场收缩
          detail: Sohu 的性能优势完全来自硬编码的 Transformer 注意力机制；当总推理市场中适配负载占比收缩， 这一优势能覆盖的市场也缩小。
        - id: tape-out-committed
          label: 已承诺流片（不可逆）
          detail: Etched 为硬编码 Transformer 架构投入 $50–200M 流片 NRE，硅设计由此锁定，软件层没有补救路径。
        - id: redesign-required
          label: 需要完整 ASIC 重新设计
          detail: 如果 Transformer 范式在收入到来前转移，Etched 必须废弃 Sohu，并从 RTL 开始设计新 ASIC——耗时 3–4 年、 成本 $100–400M。
        - id: revenue-risk
          label: 收入风险显现
          detail: Sohu TAM 变窄，加上资本已押注在搁浅架构上，可能导致公司在现金跑道耗尽前无法取得首次收入。
        - id: down-round-or-wind-down
          label: 降估值融资或公司清盘
          detail: 架构搁浅且没有收入，Etched 无法按上一轮条款完成 Series B，将面对降估值融资、清盘或困境收购。
      edges:
        - from: mamba-adoption
          to: transformer-share-falls
          label: 加速
        - from: moe-diffusion
          to: transformer-share-falls
          label: 加速
        - from: transformer-share-falls
          to: sohu-tam-contracts
          label: 压缩 TAM
        - from: tape-out-committed
          to: redesign-required
          label: 排除补救
        - from: sohu-tam-contracts
          to: revenue-risk
          label: 触发
        - from: redesign-required
          to: revenue-risk
          label: 时间线延长 3–4 年
        - from: revenue-risk
          to: down-round-or-wind-down
          label: 导致
    claimRefs:
      - CR001
      - CR003
      - CR004
      - CR005
      - CR007
  - id: FR004
    title: 财务压力情景
    type: range
    layout: wide
    summary: Etched 现金跑道、流片成本和融资需求关键财务参数的低 / 基准 / 高情景区间。
    data:
      items:
        - label: ASIC 流片 NRE 成本
          low: 20
          mid: 75
          high: 200
          unit: $M
          detail: 反映 N3/N4 节点掩膜组成本；低端假设一次流片成功，高端假设多掩膜验证外加一次 $50M 重新流片。
        - label: 月度烧钱速度（流片前）
          low: 2
          mid: 4
          high: 7
          unit: $M/month
          detail: 由团队薪酬、TSMC NRE 押金、IP 授权费和工具成本驱动；随员工数增长和流片进度扩大。
        - label: $120M 融资后的剩余现金跑道
          low: 8
          mid: 20
          high: 36
          unit: months
          detail: 低端假设烧钱速度高且流片成本大；高端假设支出保守且流片落在较低 NRE 区间。
        - label: 所需 Series B 融资
          low: 100
          mid: 200
          high: 500
          unit: $M
          detail: 必须覆盖流片（若 Series A 未资助）、首片硅点亮调试、SDK 开发、客户评估支持和首次收入前的生产爬坡 NRE。
        - label: 从流片到首次收入的月份
          low: 9
          mid: 18
          high: 36
          unit: months
          detail: 低端假设首片硅成功、客户快速评估、无重新流片；高端假设一次重新流片加上延长的 12–24 个月客户采购周期。
    claimRefs:
      - CR033
      - CR034
      - CR035
      - CR036
      - CR037
      - CR038
  - id: FV001
    title: 投资建议逻辑
    type: flow
    layout: wide
    summary: 从 Series A 背景到可比公司、情景权重和否决触发项筛查，最终推导投资结论的决策链。
    data:
      nodes:
        - id: n1
          label: Series A 完成（$120M，估计投后 $600–800M）
          detail: 2024 年 6 月；Positive Sum 领投，Primary Venture Partners 跟投；投后估值未披露
        - id: n2
          label: 可比公司分析
          detail: Marvell 10–15×、Broadcom 18–20×、NVIDIA 25×；Habana Labs $2B 先例；应用 40–60% 折价
        - id: n3
          label: 情景加权
          detail: 乐观 15–20%（$3–5B）；基准 40–50%（$800M–1.5B）；悲观 30–40%（$200–500M）
        - id: n4
          label: 概率加权 EV：$800M–1.1B
          detail: 仅略高于估计入场中点（$700M）；超过 $1.5B 时风险补偿不足
        - id: n5
          label: 三项否决触发项筛查
          detail: 硅片失败 / 架构替代 / Series B 失败——任一项触发退出
        - id: n6
          label: 投资结论
          detail: 估值 >$1.5B 时条件性负面；≤$800M 可条件性跟踪，等待 Series B、流片和首个设计导入
      edges:
        - from: n1
          to: n2
          label: 提供基准依据
        - from: n2
          to: n3
          label: 校准倍数
        - from: n3
          to: n4
          label: 产出 EV 估计
        - from: n4
          to: n5
          label: 用于检验
        - from: n5
          to: n6
          label: 导出
    claimRefs:
      - CV039
      - CV040
      - CV041
  - id: FV002
    title: 估值 / 回报区间
    type: range
    layout: wide
    summary: 悲观、基准、乐观情景下企业价值区间与估计 Series A 入场点对比，单位为百万美元。
    data:
      items:
        - label: 悲观情景退出（30–40% 概率）
          low: 200
          mid: 350
          high: 500
          unit: M USD
          detail: 流片失败、重新流片或困境收购；Graphcore 类比
        - label: Series A 入场估计
          low: 600
          mid: 700
          high: 800
          unit: M USD
          detail: 分析师估计的投后估值；Etched 未公开披露
        - label: 基准情景退出（40–50% 概率）
          low: 800
          mid: 1150
          high: 1500
          unit: M USD
          detail: 首片硅交付；一个初始客户；按预计 2028 年收入计 4–6× EV/Revenue
        - label: 乐观情景退出（15–20% 概率）
          low: 3000
          mid: 4000
          high: 5000
          unit: M USD
          detail: 首片硅通过；2027 年 H2 获得超大规模云厂商设计导入；基于 $200–300M 收入计 10–15× EV/Revenue
    claimRefs:
      - CV015
      - CV016
      - CV017
  - id: FV003
    title: 估值敏感性
    type: bar
    layout: standard
    summary: 隐含退出 EV（以 $B 计）对关键价值驱动里程碑的敏感性，从基准情景延伸到上行情景。
    data:
      items:
        - label: 基准（无额外上行）
          value: 1.15
          detail: 40–50% 概率；单一客户；4–6× EV/Revenue
        - label: 首片硅通过且无重新流片
          value: 2
          detail: 消除流片风险；降低 Series B 风险；倍数扩张至约 8×
        - label: 确认超大规模云厂商设计导入
          value: 3
          detail: 改写商业逻辑；可比 Habana Labs 被收购前状态；约 10× EV/Revenue
        - label: 收入获取为基准的 2×
          value: 4.2
          detail: 两个或更多客户；收入运行率接近 $200M；倍数重估至 12–14×
        - label: IPO / 溢价收购情景
          value: 5.5
          detail: 在完整 Marvell 可比倍数下的乐观情景；需要公开市场或战略溢价
    claimRefs:
      - CV028
      - CV030
      - CV039
  - id: FV004
    title: 投资 KPI
    type: kpi
    layout: standard
    summary: 面向 IC 的关键投资指标，汇总 Etched 的估值画像、回报测算和情景结果。
    data:
      items:
        - label: Series A 融资
          value: $120M
          unit: USD
          detail: 2024 年 6 月完成；Positive Sum 领投，Primary Venture Partners 跟投
        - label: 估计投后估值（Series A）
          value: $600–800M
          unit: USD
          detail: 基于典型稀释规范的分析师估计；未公开披露
        - label: 乐观情景退出 EV
          value: $3–5B
          unit: USD
          detail: 15–20% 概率；首片硅通过 + 2027 年 H2 获得超大规模云厂商设计导入
        - label: 基准情景退出 EV
          value: $800M–1.5B
          unit: USD
          detail: 40–50% 概率；首片硅遇到挑战；单一初始客户
        - label: 悲观情景退出 EV
          value: $200–500M
          unit: USD
          detail: 30–40% 概率；Graphcore 类比的困境或流片失败
        - label: 概率加权 EV
          value: $800M–1.1B
          unit: USD
          detail: 乐观 / 基准 / 悲观情景加权均值；仅略高于 Series A 中点入场
        - label: 实现 10× 回报所需最低退出
          value: $6–8B
          unit: USD
          detail: 主投 VC 基于 $600–800M 投后实现 10× 回报所需退出；只有乐观尾部情景能达到
        - label: 结论
          value: Conditional Negative >$1.5B
          unit: null
          detail: ≤$800M 条件性跟踪；>$1.5B 坚决放弃；三项否决触发项需监控
    claimRefs:
      - CV009
      - CV011
      - CV012
