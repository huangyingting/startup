    rows:
      - - 收入启动时客户集中度
        - 严重
        - Etched 带着零客户进入量产；首个客户 = 收入的 100%；即使早期采用者达到 3 个，只要任何一个客户贡献首年收入 >33%，集中度仍然极高
        - 首次晶圆投片前签署 ≥3 份有约束力的评估合同；与不同分群的多家买方谈判供应承诺，分散风险
      - - 单一架构把客户挡在门外
        - 高
        - Sohu 只加速 Transformer attention；运行 MoE、SSM（Mamba）或混合架构的客户无法采用 Sohu，除非非 attention 层回退到 GPU
        - 扩大模型兼容清单；披露哪些模型家族可完全加速、哪些只能部分加速；为非 attention 层开发回退调度
      - - 长评估周期导致收入延迟
        - 高
        - 芯片评估周期长达 12-24 个月，即使流片按计划完成，收入最早也要到 2027 年才出现；每延迟一个月都会加大融资现金跑道风险
        - 签署带里程碑付款的早期 LOI；提供预付款激励；用更强基准测试和预构建集成脚本缩短评估周期
      - - 超大规模云厂商偏好自有芯片
        - 中高
        - AWS Trainium、Google TPU、Microsoft Maia 意味着头部超大规模云厂商可能更愿意内部开发定制推理芯片，而不是采用初创公司的芯片；三大潜在客户被移除后，可触达市场缩小
        - 把推理即服务平台（Together AI、Anyscale、Perplexity）作为第一波主要客户；将 Sohu 定位为无法承担自有芯片项目公司的替代方案
      - - SDK / 软件生态不成熟
        - 中
        - >-
          Groq 和 Cerebras 的软件生态领先 1-3 年；客户需要兼容 HuggingFace 的编译器、兼容 vLLM 的 serving，以及兼容 OpenAI API 的端点；截至 Q1 2026，Etched
          没有公开 SDK
        - 在首版硅片之前或同时优先交付 SDK 和开发者工具；开源关键集成层以加速生态采用；招聘有经验的 ML 系统软件工程师
    notes: >-
