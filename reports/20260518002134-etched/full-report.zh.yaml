  - number: 5
    title: 产品与技术
    sections:
      - number: '5.1'
        title: 产品定义与 Sohu 芯片规格
        blocks:
          - type: paragraph
            body: >
              Etched 唯一产品是 Sohu ASIC —— 一颗专为推理打造的加速芯片，把 Transformer
              自注意力计算永久写进硅片。公司的核心判断是：与其在可编程逻辑上模拟注意力机制，不如把注意力硬连线。这样，Sohu 可以拿掉指令分发和内存管理开销；这些开销正是 GPU 在自回归 Transformer
              负载上吞吐受限的关键。Etched 称，这种架构选择让 Sohu 在 Transformer 推理任务上达到 NVIDIA H100 约 10× 的吞吐，但该说法尚未用量产芯片得到独立验证。


              Sohu 瞄准的是 LLM 部署中的推理阶段，而不是训练。芯片只面向 Transformer 架构：稠密解码器模型（GPT-4 级、LLaMA、Mistral、Falcon）和编码器—解码器模型（T5
              级）。它不支持 Mamba 状态空间模型、纯循环网络等非 Transformer 架构。Sohu 的专用化意味着，任何采用它的客户都在芯片可用寿命内押注 Transformer 范式。


              截至 Q1 2026，Sohu 还不是量产芯片。公司称 TSMC 4N 工艺节点的流片正在推进，但尚未公开展示工程样片。产品规格书、裸片照片、第三方基准测试都没有发布。etched.com/sohu 的产品页返回
              404 错误。Etched 目前可见的商业产品资产只有：公司主页（etched.com）、融资公告（$120M Series A，June 2024），以及两位创始人在 Google 的职业经历。
            claimRefs: []
