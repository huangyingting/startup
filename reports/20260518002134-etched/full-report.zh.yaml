        - 要求提供 SDK 路线图和开发者访问时间线；询问首个公开基准何时发布
      - - 合同期限与续约模式
        - 推理芯片供应协议通常是带采购量承诺的 2-3 年合同；超大规模云厂商芯片项目通常是 5 年以上关系
        - 不适用 — 尚未签署合同
        - 结构性模式有利：长合同期限降低流失风险；但 Etched 必须先拿下首份合同，留存指标才有意义
