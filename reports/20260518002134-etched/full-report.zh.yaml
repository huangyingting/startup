      - number: '4.3'
        title: 成本结构与单位经济模型
        blocks:
          - type: paragraph
            body: >
              Etched 的成本结构由半导体制造成本主导：晶圆成本、封装与测试、良率损失，以及芯片设计的 NRE（一次性工程费用）。在 TSMC 4N 制程节点，先进节点晶圆成本估计为每片
              $15,000-20,000+。新制程节点上的第一代设计，良率通常为 50-70%，到量产阶段可提升至 85-95%+。仅 TSMC 先进节点的一次流片，掩膜组成本就达 $5-15M。


              半导体在规模化后毛利率可以很高：NVIDIA 数据中心 GPU 毛利率超过 70-75%。但这些毛利率需要规模来覆盖固定 NRE 成本。Etched 需要卖出数千颗芯片，才能摊销 NRE 成本。以 $120M
              累计融资计，Etched 面临资本充足性挑战：一代先进制程芯片开发加初始量产批次，可能消耗 $50-100M；在收入到来前超过 2 年的销售周期内，留给第二代芯片或维持运营的余地有限。


              关键单位经济输入仍未知，包括：与 TSMC 的晶圆成本承诺、裸片尺寸（die size，决定每片晶圆可切出多少芯片和每颗 die 成本）、目标 ASP，以及良率假设。缺少这些数据，就无法独立验证 Etched
              声称的每 token 成本经济性。
