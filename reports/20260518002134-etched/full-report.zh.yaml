      - number: '7.4'
        title: 执行、团队与运营风险
        blocks:
          - type: paragraph
            body: >
              即便按芯片初创公司的标准看，Etched 的执行风险也异常高。公司试图用约 30 人团队打造世界首颗量产 Transformer 推理 ASIC；组织层面没有既往流片记录，CEO Gavin Uberti 年仅
              23 岁，也没有芯片走向量产的经验。团队中有曾在 NVIDIA、Meta、Google 工作的工程师，提供了相关领域经验，但这支团队是否具备执行多年期全栈 ASIC 项目的组织能力——从 RTL 设计到
              DFT、物理设计、TSMC PDK 集成，再到首版硅片点亮调试——尚未在这种规模上公开证明。


              ASIC 开发周期带来结构性执行时间线风险。从提交流片到首版硅片返回约需 6–9 个月；从首版硅片到量产还需要 12–18 个月。如果 Etched 在 2025–2026 年流片（考虑 2024 Series
              A，这是最可能窗口），首笔收入现实上最早也不会早于 H2 2027——而且前提是首版硅片达到性能目标，SDK 开发完成，客户评估在硅片交付后 6–12 个月内完成。


              软件 / SDK 执行风险尤其被低估。Graphcore 失败很大程度上由 SDK 不成熟驱动，客户无法高效把模型移植到 Graphcore 架构。Etched 截至 Q1 2026 没有披露
              SDK、编译器、软件栈或开发者计划。为 Sohu 构建高性能 MLIR/XLA 编译器后端或定制 SDK，是多年工程工作，且需要一支技能不同于硬件团队的软件团队。只做硬件、假设客户会自助采用
              SDK，对一家没有既有生态关系的芯片初创公司不是可行商业路径。
            claimRefs:
