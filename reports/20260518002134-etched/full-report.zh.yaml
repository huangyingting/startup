      - number: '7.6'
        title: 图表
        blocks:
          - type: callout
            title: 架构锁定不可逆，并取决于市场时点
            body: >-
              硬编码的仅支持 Transformer 架构既是 Etched 的主要性能差异化，也是其生存风险。一旦提交流片，公司的商业可行性就完全取决于：在芯片 5–8 年商业寿命内，Transformer
              架构仍是主导推理范式。如果这一假设失败，没有软件补丁路径。
            calloutType: insight
            claimRefs:
              - CR001
              - CR002
              - CR003
          - type: callout
            title: 运营 2 年多仍无设计定点或客户，是阻断性尽调信号
            body: >-
              截至 Q1 2026，Etched 宣布客户为零、设计定点为零、签署 LOI 为零、公开具名评估伙伴为零——公司成立已超过两年，Series A 后也已十二个月。Graphcore 先例表明，即便有大量融资，专用
              AI 芯片公司也可能无法把强架构转化为商业牵引。
            calloutType: insight
            claimRefs:
              - CR026
              - CR027
              - CR040
          - type: callout
            title: 尽调必须确认流片时间表、烧钱速度和至少一个具名评估伙伴
            body: >-
              投资前，尽调必须验证：（1）当前流片时间表和迄今 NRE 承诺；（2）月度烧钱速度和现金跑道预测；（3）是否有任何公司在 NDA 下收到过硅前工程 briefing；（4）Arm
              授权是否到位。这四个数据点决定财务和商业风险是否落在可接受范围内。
            calloutType: insight
            claimRefs:
              - CR033
              - CR034
              - CR035
              - CR036
  - number: 8
    title: 估值
    sections:
      - number: '8.1'
        title: 投资逻辑与反向逻辑
        blocks:
          - type: paragraph
            body: >
              Etched 的投资逻辑建立在一个不可分散的单一架构押注上：未来五到八年，Transformer 解码器架构仍将主导大语言模型推理；并且只针对这一负载设计的专用硅片，在推理时能相对通用 GPU 带来 10×
              或更高的成本性能优势。如果两个条件都成立，随着超大规模云厂商优化 token 成本而不是训练时灵活性，Etched 可能在推理 ASIC 市场拿下不成比例的份额。


              反向逻辑同样集中。截至 Q2 2026，Etched 收入为零、客户为零、设计定点为零，也没有交付首版硅片。CEO 23
              岁，没有既往流片记录。公司的可触达市场只有在多项条件同时成立时才存在：架构假设成立、TSMC 流片不发生昂贵 respin 且成功、至少一个超大规模云客户在竞争对手追平差距前评估 Sohu。Graphcore
              失败模式——技术架构更强、商业牵引不足、最终困境退出——是 AI 芯片行业最适用的警示类比。任何按情景加权的分析，都必须正面处理这些执行要求同时成功的叠加概率。
            claimRefs:
