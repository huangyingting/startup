      - number: '4.2'
        title: GTM 动作与销售效率
        blocks:
          - type: paragraph
            body: >
              Etched 的 GTM 模式是直销企业客户，目标是超大规模云厂商和大型 AI 原生公司。这是半导体基础设施供应商典型的高 ASP、低销量销售动作。目标买方是在 GPU 计算上每年花费 >$100M
              的公司中的工程基础设施 VP 或 CTO 级决策者。这个细分领域的推理硅片采购周期，从初次评估到生产部署通常需要 12-24 个月。


              在尚无收入阶段，Etched 未披露销售团队规模、销售管线指标或获客成本数据。公司最主要的 GTM 资产，是其声称的 Transformer 推理 10×
              吞吐优势；若得到验证，这会形成很强的经济论证。销售流程需要：（1）为评估提供免费或补贴芯片样品；（2）为 SDK 采用提供技术集成支持；（3）验证参考架构；（4）谈判供应承诺。


              Etched 的渠道经济性尚未成形。NVIDIA 通过广泛的经销商、OEM 和云市场渠道销售。Etched 要么建立类似渠道关系，要么依靠直销服务少数大客户。鉴于这颗芯片只为 Transformer
              优化，早期客户几乎一定集中在前 10 大 AI 推理买方（OpenAI、Anthropic、Cohere、超大规模云厂商、推理平台）。
