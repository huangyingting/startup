  - number: 4
    title: 财务情况
    sections:
      - number: '4.1'
        title: 收入模式与收入流
        blocks:
          - type: paragraph
            body: >
              Etched 是一家尚无收入的半导体创业公司。公司计划的收入模式是硬件销售：设计一颗为 Transformer 推理优化的定制 ASIC（Sohu 芯片），并卖给超大规模云厂商、大型 AI
              原生公司和推理平台运营商。这是一种一次性硬件销售模式，后续重复购买周期会与芯片代际绑定，类似 NVIDIA 的 GPU 产品周期（H100 → H200 → Blackwell）。公司未披露任何软件授权、云
              API 或 SaaS 收入流。


              主要收入流是以 OEM 或企业价格直接销售 Sohu 芯片硬件单元。次级收入流可能是系统级销售（包含 Sohu 芯片的机架或服务器配置），类似 Cerebras 销售 CS-3
              设备而非裸芯片。公司尚未宣布云市场产品，也没有公开披露收入运行率、年经常性收入（ARR）或任何已签客户合同。


              硬件销售的收入确认通常遵循 ASC 606，在芯片交付时点确认。不同于 SaaS，这会让收入与生产批次交付和采购周期绑定，呈现波动。半导体公司的资本强度极高：Etched
              必须先支付流片、晶圆采购、测试和封装费用，之后才可能收款。半导体硬件从流片到收入的营运资本周期通常为 12-24 个月。
