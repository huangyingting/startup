      - number: '2.5'
        title: 市场规模测算缺口与矛盾
        blocks:
          - type: paragraph
            body: >
              AI 芯片市场变化很快，公开数据有限，分析师估计差异很大。本章市场规模分析受到几个重要缺口影响。

              第一，公开行业研究没有充分记录 Transformer 专用推理在整体 AI 推理市场中的占比；多数市场规模报告把所有推理计算合并统计。Etched
              的可触达市场受这个比例约束，但要精确量化，需要公开资料中没有的专有市场数据。

              第二，IDC、Gartner、Grand View Research、Markets and Markets 等市场研究机构发布的 AI 芯片市场规模估计差异很大：2023 年数字从 $40B 到 $80B
              不等，2030 年预测从 $200B 到 $900B 不等。这些差异来自市场边界定义不同、对 GPU 采用率假设不同，以及对训练与推理比例的看法不同。本章采用的数字，是公开引用区间中的合理中点，应视为数量级估计。

              第三，模型效率提升（量化、蒸馏、speculative
              decoding）正在快速改变推理市场动态，可能降低单次查询所需计算量——进而改变总计算支出轨迹。这些效率提升既是风险（总市场更小），也是机会（模型更高效后，推理更便宜，需求可能扩大）。
            claimRefs:
              - CM025
              - CM026
              - CM027
              - CM028
              - CM029
