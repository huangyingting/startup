        - 询问计划中的合同结构：最低采购量承诺、照付不议条款、NDA 评估条款
      - - 客户满意度 / NPS
        - Groq：开发者社区在 G2 上报告满意度较高（评论强调相较 GPU 替代方案速度更快）；AWS Inferentia：客户案例研究报告 ROI 为正
