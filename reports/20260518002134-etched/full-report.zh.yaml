  - id: FE002
    title: 客户工作流 / 操作流程
    type: flow
    layout: standard
    summary: Sohu 芯片上的端到端推理工作流：从客户模型导入，经 Etched 编译器和运行时，到返回推理输出，说明硬连线注意力引擎如何嵌入服务栈。
    data:
      nodes:
        - id: n1
          label: 客户模型导入
          detail: 客户将 Transformer checkpoint（LLaMA、Mistral、GPT 类）以 HuggingFace SafeTensors 格式载入 Etched 编译器进行转换
          tone: neutral
        - id: n2
          label: Etched 编译器（图转换）
          detail: 编译器将 Transformer 计算图转换为 Sohu 优化执行格式；把多头注意力层映射到硬连线硅块
          tone: neutral
        - id: n3
          label: 推理运行时初始化
          detail: 运行时通过 PCIe DMA 将编译后的模型加载到 Sohu 芯片；为模型权重分配 HBM，并初始化会话 KV-cache
          tone: neutral
        - id: n4
          label: 推理请求（token 预填充）
          detail: 客户提交提示词；运行时执行预填充阶段——硬连线引擎计算完整输入序列上的注意力，并在 HBM 中填充 KV-cache
          tone: positive
        - id: n5
          label: 自回归解码（硬连线注意力）
          detail: Sohu 硬连线注意力引擎从 HBM 读取 KV-cache，并以完整硬件速度计算下一个 token 的注意力，没有软件内核调度开销
          tone: positive
        - id: n6
          label: 返回输出 token 流
          detail: 解码后的 token 通过 PCIe 返回主机 CPU；运行时将 token 流式传给调用方；自回归循环重复，直到 EOS token 或达到最大长度
          tone: positive
      edges:
        - from: n1
          to: n2
          label: HuggingFace checkpoint 进入编译器
        - from: n2
          to: n3
          label: 编译后的执行图进入运行时
        - from: n3
          to: n4
          label: 模型已加载，可推理
        - from: n4
          to: n5
          label: KV-cache 已填充，解码循环开始
        - from: n5
          to: n6
          label: token 已解码，返回调用方
        - from: n6
          to: n5
          label: 请求下一个 token（自回归循环）
    approximationNotes: 工作流是假设——基于预期推理芯片操作模型；Etched 未发布编译器或运行时文档。编译器和运行时步骤尚未发布。边标签反映使用 HBM 支撑的 KV-cache 的 Transformer 解码器模型标准推理服务流程。
    claimRefs:
      - CE001
      - CE005
      - CE008
      - CE025
      - CE030
