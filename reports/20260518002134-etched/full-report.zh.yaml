        - Transformer 解码器（GPT、LLaMA、Mistral 类）
        - 自回归 token 生成；顺序解码
        - 高 — 硬编码注意力非常适合顺序自回归解码；KV-cache 访问模式适配 HBM
        - 仅支持 Transformer；不支持 SSM 或混合模型
        - 主要目标用例；技术适配度最高
      - - 代码生成（Copilot 类工具）
        - Transformer 解码器，长上下文
        - 自回归解码，8K-100K+ 上下文窗口
        - 高 — 长上下文工作负载中注意力计算占比高；硬编码注意力随上下文扩展更有利
        - 长上下文 KV-cache 需要大 HBM 容量；堆叠数量和淘汰策略很关键
        - 契合度强；长上下文是 Sohu 架构甜点区
      - - 文本向量嵌入生成
        - Transformer 编码器（BERT、RoBERTa 类）
        - 单次前向传播；无自回归解码
        - 中 — 注意力固化仍可降低编码器计算成本，但完整吞吐收益需要解码工作负载
        - 相比 GPU 差异化较弱；FlashAttention 已针对编码器推理高度优化
        - 契合度中等；不是主要工作负载，但可支持
      - - 多模态推理（视觉-语言）
        - Transformer 编码器 + 解码器；交叉注意力
        - 编码后解码混合流程；模态之间使用交叉注意力
        - 中低 — 交叉注意力层随架构变化；Sohu 注意力引擎必须支持交叉注意力模式
        - 多模态交叉注意力设计因模型而异；兼容性未确认
        - 契合度不确定；需要逐模型验证
      - - 专家混合 Transformer 推理（Mixtral 类）
        - 稀疏 MoE Transformer
        - 稀疏路由 + 注意力；每个 token 只激活部分专家
        - 低 — 注意力可加速，但稀疏 MoE 路由开销发生在主机侧；尚未确认支持 MoE
        - MoE token 路由可能无法加速；门控计算不在硬连线注意力引擎内
        - 契合度有限；MoE 路由瓶颈很可能在主机 CPU
      - - 非 Transformer SSM 推理（Mamba、RWKV）
        - 状态空间模型或循环架构
        - 基于递归；无点积注意力
        - 不支持 — Sohu 仅面向 Transformer；SSM 需要不同计算原语
        - 架构层面不兼容；Mamba 使用选择性状态空间，没有注意力运算
        - 排除用例；确认与 Sohu 设计不兼容
    notes: >-
      用例契合度按 Etched 声称的 Transformer-only 架构评估。MoE 和 SSM 限制来自硬连线 Transformer 注意力设计的推断，Etched 尚未确认。实际模型兼容性需要公司提供 SDK
      和模型兼容性矩阵。
