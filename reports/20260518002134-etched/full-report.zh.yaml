  - number: 3
    title: 竞争格局
    sections:
      - number: '3.1'
        title: 竞争格局概览
        blocks:
          - type: paragraph
            body: >
              Etched 竞争的是 AI 推理加速器市场，目前由 NVIDIA 主导。竞争格局分为几个层级：GPU 既有厂商（NVIDIA）、超大规模云厂商内部项目（AWS
              Trainium/Inferentia、Google TPU、Microsoft Maia）、专用推理创业公司（Groq、Cerebras、SambaNova）、AI 芯片通用厂商（AMD、Intel
              Gaudi），以及 Etched 独有的仅支持 Transformer 的 ASIC 细分。几乎每个买方当前技术栈中的现状竞争者，都是 NVIDIA H100 或 H200 GPU 集群。


              Etched 的差异化策略是架构专用化：把 Transformer 注意力机制固化进硅片后，公司声称相对 GPU 推理可实现 10× 或更高的吞吐效率。已识别竞争者中，没有其他公司对仅支持 Transformer
              执行做出同样狭窄的架构押注。Groq 使用带确定性流式架构的 LPU（语言处理单元）。Cerebras 使用晶圆级处理器。Graphcore 使用 IPU（智能处理单元）。这三者都是通用 AI
              加速器，没有一家只面向 Transformer。


              竞争风险是结构性的：NVIDIA 的生态护城河（CUDA、NeMo、TensorRT、分销）是最强切换壁垒。买方评估 Etched
              时，必须克服软件集成成本、模型兼容性不确定，以及缺少量产参考部署的问题。Etched 唯一可持续的反驳，是在 Transformer 推理规模下给出每 token 成本优势；但在量产硅片可用前，这一点无法验证。
