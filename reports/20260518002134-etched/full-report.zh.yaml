      - number: '6.2'
        title: 采用轨迹与当前牵引
        blocks:
          - type: paragraph
            body: >
              截至 Q1 2026，Etched 客户牵引为零。公司没有披露任何客户、活跃评估、签署的
              LOI、设计定点，或具名工程简报接收方。对于硅片尚未公开展示的芯片初创公司，这属于基线状态：潜在客户无法对不存在的量产样片做基准测试；没有实物样片可供技术验证时，采购团队也不太可能签署硬件评估协议。


              AI 推理芯片初创公司的采用轨迹通常分为五个阶段：（1）硅前认知和面向潜在客户的工程简报，（2）首版硅片交付和保密性能基准测试，（3）与 1-3
              个已承诺设计定点客户做试点部署，（4）量产爬坡和具名客户公告，（5）生态扩张。基于公开证据，Etched 尚未以任何可公开确认的形式进入阶段 1。截至 Q1
              2026，公司没有宣布工程简报、样片可用时间表或任何客户参与计划。


              对比来看，Groq 在硬件出货前就围绕其架构建设开发者社区，并提供早期基准测试访问，从而开始客户参与。Cerebras 也早在商业可用前就向超大规模云客户做简报。按这些类比衡量，Etched
              的采用轨迹落后：公司已融资 $120 million，但尚未拿出任何公开证据证明客户参与活动。假设 2025-2026 年按期完成流片、H1 2027 交付首版硅片，首笔收入最早也只能合理落在 H2 2027 到
              2028；前提是首版硅片交付后还要经过 12-24 个月评估周期。
