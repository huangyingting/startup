      - number: '1.5'
        title: 战略背景与竞争位置
        blocks:
          - type: paragraph
            body: >
              Etched 的战略押注，本质上是架构级押注：Transformer 神经网络将在未来十年甚至更久继续主导 AI，且这种主导足够稳，值得为 Transformer 计算单独设计一颗
              ASIC。核心风险是架构过时——如果 AI 研究产出继任架构（例如状态空间模型、Mamba 或混合方案），以不同计算原语达到相当或更好性能，Sohu 芯片中固化的 Transformer
              逻辑可能在商业化规模形成前就过时。

              NVIDIA 以 H100 和后续 GPU 产品主导 AI 加速器市场，背后有 CUDA 软件生态、成熟供应链、企业关系，以及数千工程师年的软件优化。要挑战
              NVIDIA，硬件性能更好还不够，还必须在总拥有成本和生态兼容性上胜出。其他纯 AI 芯片创业公司——包括 Groq（LPU 推理）、Cerebras（晶圆级 ASIC）、SambaNova（AI
              加速器系统）、Tenstorrent（基于 RISC-V 的 AI 芯片）和 Intel Gaudi——多年努力后，仍难以从 NVIDIA 手中拿到有意义份额。

              因此，Etched 的竞争位置高风险，也可能高回报：如果 Transformer 架构足够持久，且 Etched 把硅片量产跑通，公司就能以显著更低成本服务庞大的推理市场。若 25x
              性能说法得到验证，对每年在推理计算上花费数亿美元的超大规模云厂商来说，将是很有吸引力的经济优势。但在当前开发阶段，这些说法尚未验证，投资人和潜在客户只能主要评估技术逻辑，而不是依靠经验证据。
