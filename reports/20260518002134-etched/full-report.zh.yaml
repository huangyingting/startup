      - number: '3.4'
        title: 专用推理芯片创业公司
        blocks:
          - type: paragraph
            body: >
              在 Etched 之前，Groq、Cerebras、SambaNova 是融资最多的三家推理芯片创业公司。Groq 累计融资约 $1.1B+，提供
              LPU（语言处理单元），这是一种确定性流式推理芯片，延迟很低。GroqCloud 以有竞争力的价格提供推理 API 访问。Groq 架构支持通用 AI 模型推理，不只支持 Transformer——它可以运行
              Mamba、MoE 和其他架构。Groq 的差异化是延迟（tokens per second 响应速度），而不是批量推理吞吐。


              Cerebras Systems 累计融资约 $720M+，采用晶圆级处理方案（Cerebras WSE-3 为 46,225 mm²，而 H100 约为 ~800 mm²）。Cerebras
              主要聚焦训练，也能做推理；目标客户是企业和政府。SambaNova Systems 累计融资约 $1.2B，采用可重构数据流架构。SambaNova 以 DataScale 系统瞄准企业 AI 部署。


              Tenstorrent 是较新的入局者（2016 年创立，由 Jim Keller 领导），使用基于 RISC-V 的 AI 芯片，聚焦开放硬件和软件。Graphcore（英国）为 AI 工作负载开发了
              IPU（智能处理单元）；商业化受挫，并于 2023 年以据报 $120M 被 SoftBank 收购——远低于其约 $2.8B 的峰值估值。Graphcore
              的路径是一个重要反向数据点：即使融资充足、架构差异化，AI 芯片创业公司也可能拿不到商业牵引力。
            claimRefs: []
      - number: '3.5'
        title: 切换成本、护城河持续性与替代风险
        blocks:
          - type: paragraph
            body: >
              Etched 的主要护城河主张来自架构：用硬化逻辑实现注意力机制后，它能达到 GPU 方案在同等硅面积下无法匹配的吞吐效率。这个护城河真实存在，但很窄，也很脆弱。它真实，是因为为注意力优化的硬件确实能更高效地运行
              Transformer 推理。它狭窄，是因为只适用于 Transformer 推理。它脆弱，是因为（1）NVIDIA 和超大规模云厂商可以推出推理优化 SKU 回应；（2）模型架构正在从纯 Transformer
              向外演进；（3）软件优化（Flash Attention、量化、speculative decoding）会持续缩小专用硬件与通用硬件之间的效率差距。


              CUDA 锁定效应是 NVIDIA 最强的竞争护城河。公司从 NVIDIA GPU 切换到 Etched 时，必须：（1）在 Etched 硅片上重新验证每一个生产模型；（2）用 Etched 的 SDK 替换
              CUDA/TensorRT 管线集成；（3）接受早期创业公司的供应商集中风险；（4）在内部培养 Etched 工具链能力。这些切换成本不低，但对拥有专门 ML 基础设施团队的大组织来说仍可管理。它们会显著阻碍
              Etched 的销售流程，但不是采用的不可逾越障碍。


              替代风险的反向证据是：AI 芯片创业领域已经出现多家融资充足但失败的公司。Graphcore 以峰值估值一小部分价格被收购，是最近的数据点。Wave Computing 和 Mythic AI
              也已失败或转向。这一模式说明，AI 芯片创业公司在芯片演示与量产规模部署之间会遇到「死亡谷」：软件生态不成熟、客户惯性、NVIDIA 持续迭代，几股逆风会叠加。
