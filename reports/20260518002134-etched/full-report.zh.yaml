        - 无晶圆厂芯片公司的估值倍数下限参照
        - 以移动业务为中心；没有直接的推理 ASIC 业务
      - - Cerebras / Groq（私有公司）
        - Series C–D，IPO 前
        - $2.5B（Groq，2024）；$7–8B（Cerebras，隐含 IPO）
        - N/A（无公开收入）
        - 披露估值的私有阶段 AI 芯片同行
        - 两者都有生产部署；Etched 连首版硅片也没有
      - - Habana Labs（2019 年被 Intel 收购）
        - 收购时仍未产生收入
        - ~$2B 收购价
        - N/A（退出时无收入）
        - AI 芯片初创公司 M&A 的主要先例交易
        - 2019 年案例；当时 AI 芯片竞争远不如现在激烈
    notes: >-
      上市公司估值为截至 2024 年末的大致市值；EV/Revenue 倍数为作者根据公开申报文件和分析师共识估算。私有阶段估值来自公开报道的融资轮或 IPO 文件。与 Etched 对比时，需要在可比倍数基础上打 40–60%
      折扣，以反映其尚未产生收入、单一架构集中度和执行风险。
    claimRefs:
      - CV001
      - CV003
      - CV005
      - CV009
  - id: TV002
    title: 建议摘要表
    columns:
      - 入场条件
      - 隐含投后估值
      - 建议立场
      - 概率加权企业价值
      - 关键限定条件
    rows:
      - - 有吸引力的入场
        - ≤$800M
        - 有条件观察——Series B 完成后重新评估
        - $800M–1.1B
        - 以完成流片和拿下首个客户为前提重新评估
      - - 边际入场
        - $800M–1.5B
        - 放弃——风险调整后回报不足
        - $800M–1.1B
        - 安全边际不足；概率加权 EV 仅略高于入场估值
      - - 无吸引力的入场
        - '>$1.5B'
        - 坚决放弃——基于现有信息，期望价值为负
        - $800M–1.1B
        - 任何现实情景权重下都预期亏损；三项否决触发器已触发
    notes: >-
      概率加权 EV 来自乐观情景（15–20% × $3–5B）+ 基准情景（40–50% × $800M–1.5B）+ 悲观情景（30–40% × $200–500M）。投后入场条件假设未来融资轮；实际 Series A
      投后估值未披露。本立场不构成投资建议。
    claimRefs:
      - CV040
      - CV041
  - id: TV003
    title: 乐观 / 基准 / 悲观情景表
    columns:
      - 情景
      - 概率
      - 关键假设
      - 2028 年收入估计
      - 退出 EV/Revenue
      - 隐含退出企业价值
    rows:
      - - 乐观
        - 15–20%
        - 首版硅片一次通过；2027 年 H2 前拿下 ≥1 个超大规模云厂商设计赢单；Transformer 架构保持主导
        - $200–300M
        - 10–15×
        - $3–5B
      - - 基准
        - 40–50%
        - 交付首版硅片；性能不及预期或集成延迟；1 个初始客户；Series B 完成
        - $100–150M
        - 4–6×
        - $800M–1.5B
      - - 悲观
        - 30–40%
        - 流片失败或重制；架构被替代；Series B 融不到；困境退出
        - <$50M 或为零
        - <5× 或困境估值
        - $200–500M
    notes: 概率是作者基于可比 AI 芯片初创公司的基准成功率（Graphcore、Cerebras）校准后的定性估计。收入估计是示意性情景分析，不是公司预测。退出倍数假设 2024 年水平的 AI 芯片板块情绪持续。
    claimRefs:
      - CV015
      - CV016
      - CV017
  - id: TV004
    title: 投资逻辑 / 反向逻辑表
    columns:
      - 维度
      - 乐观逻辑
      - 反向逻辑
      - 证据权重
    rows:
      - - 架构锁定效应
        - Transformer 架构已经证明耐用；第一代硬编码芯片在推理时捕捉切换成本护城河
        - Mamba / RWKV / SSM 替代方案具备无 KV cache 优势；任何范式迁移都会让 Sohu 永久失去着力点
        - 混合——Transformers 目前占主导，但 SSM 证据在增加
      - - 团队执行
        - MIT/OpenAI 背景；AI / 硬件积累深；年轻意味着行动更快、承诺周期更长
        - CEO 23 岁且没有流片历史；约 30 人团队做全栈 ASIC，按历史经验偏小
        - 弱——没有流片记录可验证执行力
      - - 市场时点
        - $120M 融资踩在推理成本压力峰值；超大规模云厂商有强动机采用更便宜的推理芯片
        - NVIDIA Blackwell/Rubin 路线图每 2 年缩小性能差距；优势窗口可能很短
        - 混合——时点说得通，但竞争时钟走得很快
      - - 资本效率
        - 聚焦单一架构，减少固件和软件复杂度；运营支出低于更宽平台的竞争者
        - TSMC N4 ASIC 流片仅 NRE 就要 $50–200M；任何产品收入前还需要 Series B
        - 负面——资本密集风险高，且在 Series A 阶段没有缓释
    notes: 证据权重是作者基于公开信息的定性判断。“混合”表示正反两侧都有证据；“弱”或“负面”表示在公司当前发展阶段，反向逻辑证据明显强于投资逻辑证据。
    claimRefs:
      - CV001
      - CV002
      - CV004
  - id: TV005
    title: 逻辑破裂与否决触发器表
    columns:
      - 触发器
      - 类别
      - 信号事件
      - 紧迫度
      - 必要动作
    rows:
      - - 首版硅片失败或流片中止
        - 执行 / 硬件
        - TSMC 报告流片被拒、PPA 严重不达标，或功能硅片交付前出现计划外重制
        - 立即
        - 退出持仓；困境情景下 IP 价值 <$100M；业务没有收入路径
      - - Transformer 架构被替代
        - 技术 / 市场
        - 任一前三大超大规模云厂商（Google、AWS、Microsoft）宣布在生产推理中部署 Mamba/SSM/MoE，替换推理层的 Transformer 解码器
        - 1 个季度内
        - 退出持仓；Sohu 核心差异化被消除，且没有恢复路径
      - - 无法以可行估值完成 Series B
        - 财务 / 现金跑道
        - Etched 未能在 Series A 交割后 24 个月内以 ≥$800M 投后估值完成 Series B（截止：2026 年中）
        - 截止日期后 6 个月内
        - 重新评估；资本跑道耗尽意味着被迫出售或关停
    notes: 否决触发器是作者参考可比 AI 芯片初创公司失败案例（Graphcore）和标准风投风险管理定义的阈值。它们是监测指标，不是机械卖出规则；每一项都需要在发生时结合当时背景重新评估。
    claimRefs:
      - CV031
      - CV032
      - CV033
  - id: TV006
    title: 最终尽调追问表
    columns:
      - 追问事项
      - 优先级
      - 必要性
      - 未解决风险
    rows:
      - - Series A 投后估值，以及包含完整期权池和清算优先权堆叠的股权结构表
        - P0——阻塞
        - 没有这些，无法评估入场价格、稀释基线和优先权负担
        - 无法判断任何入场价格是否提供正的风险调整后回报
      - - 月度烧钱速度、流片里程碑计划、截至目前累计 TSMC NRE 支付额，以及预计现金耗尽日期
        - P0——阻塞
        - 现金跑道验证和 Series B 时点完全取决于烧钱速度与 NRE 节奏
        - 现金跑道可能短于假设；Series B 时间线可能压到 12 个月以内
      - - 任何已签署 LOI、评估协议、NDA 下工程简报接收方，或客户管线数据
        - P1——重大
        - 商业逻辑没有公开证据；即便是非约束性 LOI，也会实质改变概率权重
        - 没有客户管线信号，无法验证任何乐观情景概率
      - - TSMC 代工协议条款——节点选择（N4 vs N3）、NRE 支付计划、产能分配优先级，以及任何优先分配权条款
        - P1——重大
        - 代工锁定和 NRE 结构决定资本需求和执行可选性
        - 无法评估 $120M 是否足够撑到首版硅片交付
    notes: P0 项是任何投资决策的前置条件；P1 项是签署 term sheet 前必须获得的信息。四项都涉及 Etched 需要在 data room 披露的非公开信息；截至研究日期，没有任何一项公开可得。
    claimRefs:
      - CV034
      - CV035
      - CV036
