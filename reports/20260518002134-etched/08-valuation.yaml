schemaVersion: "report-v2"
artifact: "valuation"
slug: "etched"
runDate: "2026-05-18"
company:
  name: "Etched"
chapter:
  number: 8
  title: "Valuation"
  summary: >-
    Etched's June 2024 Series A ($120 million at an estimated $600–800 million post-money)
    prices a concentrated bet on Transformer-only silicon becoming the dominant AI inference
    substrate by 2027–2028. Comparable company analysis and precedent transactions bracket an
    expected enterprise value range of $200 million to $5 billion across bear-to-bull scenarios;
    the probability-weighted expected value ($800–1,100 million) barely exceeds the estimated
    entry price, yielding a conditional negative recommendation at implied valuations above $1.5
    billion. Three thesis-break triggers — first-silicon failure, Transformer architecture
    displacement, and Series B failure — require explicit monitoring before any investment
    decision is finalised.

sections:
  - id: "val-thesis"
    title: "Investment Thesis and Anti-Thesis"
    body: |
      Etched's investment thesis rests on a single, non-diversifiable architectural bet: that
      Transformer decoder architectures will remain the dominant paradigm for large-language-model
      inference for the next five to eight years, and that purpose-built silicon targeting only
      that workload will deliver a 10× or greater cost-performance advantage over general-purpose
      GPUs at inference time. If both conditions hold, Etched could capture a disproportionate
      share of the inference ASIC market as hyperscalers optimise for token-cost rather than
      training-time flexibility.

      The anti-thesis is equally concentrated. Etched has zero revenue, zero customers, zero
      design wins, and no first-silicon delivery as of Q2 2026. Its CEO is 23 years old with no
      prior tape-out track record. The company's addressable market exists only if its
      architectural assumptions hold, its TSMC tape-out succeeds without a costly respin, and
      at least one hyperscaler customer evaluates Sohu before competitors close the gap. The
      Graphcore failure pattern — technically superior architecture, no commercial traction,
      eventual distressed exit — is the most applicable cautionary analog in the AI chip
      industry. Every scenario-weighted analysis must grapple with the compounded probability
      of these simultaneous execution requirements all succeeding.
    claimRefs: [CV001, CV002, CV003, CV004, CV039, CV040, CV041, CV042]
    tableRefs: [TV002, TV004]
    figureRefs: [FV001]

  - id: "val-comparables"
    title: "Comparable Company and Precedent Transaction Analysis"
    body: |
      No directly comparable public company exists for a pre-revenue, Transformer-only inference
      ASIC startup. The closest public comparables are Marvell Technology — whose custom AI ASIC
      business for hyperscalers generated approximately $1.6 billion in fiscal year 2025 revenue
      at 10–15× EV/Revenue — and Broadcom, whose custom silicon and networking revenues for AI
      have sustained an 18–20× EV/Revenue premium within its overall market capitalisation.
      NVIDIA remains the aspirational benchmark at approximately 25× EV/Revenue on AI
      infrastructure revenues, though its diversified moat and software stack (CUDA) are
      structurally incommensurable with Etched's single-product, pre-revenue profile.

      Among comparable private-stage peers, Cerebras filed for IPO in September 2024 at an
      implied $7–8 billion valuation despite limited commercial customers, demonstrating that AI
      chip startups can sustain elevated private valuations. Groq raised $640 million in early
      2024 at approximately $2.5 billion implied, but Groq has production LPU deployments and
      paying customers — a substantially de-risked profile versus Etched. The precedent
      acquisition of Habana Labs by Intel for approximately $2 billion in December 2019 remains
      the primary positive data point for pre-revenue AI chip startup acquisitions, though the
      AI chip landscape is materially more competitive in 2026 than it was in 2019.
    claimRefs: [CV005, CV006, CV007, CV008, CV026, CV027, CV028, CV029, CV030, CV037, CV038]
    tableRefs: [TV001]
    figureRefs: [FV002]

  - id: "val-scenarios"
    title: "Scenario Analysis — Bull, Base, and Bear Cases"
    body: |
      The bull case assigns a 15–20% probability to Etched achieving first-silicon pass without
      a respin at TSMC N4, confirming at least one hyperscaler customer design win by H2 2027,
      and reaching $200–300 million in contracted or recognised revenue by 2028. Applied to a
      10–15× EV/Revenue multiple consistent with early-stage Marvell AI ASIC comparables, this
      implies an enterprise value of $3–5 billion, representing a 4–7× return on the estimated
      $600–800 million entry.

      The base case (40–50% probability) assumes first-silicon delivery but with at least one
      major performance shortfall or integration challenge, a single initial customer design win,
      and a 2028 revenue trajectory of $100–150 million. Risk-adjusted at 4–6× EV/Revenue, this
      implies an enterprise value of $800 million to $1.5 billion — below the 10× return
      threshold for lead Series A investors. The bear case (30–40% probability) encompasses
      tape-out failure, silicon respin requirement, architecture obsolescence via Mamba or SSM
      adoption, or inability to close a Series B by late 2026. This results in a distressed exit
      at $200–500 million, representing a loss on the Series A capital base. Cerebras's own
      experience demonstrates that sustaining private valuation without IPO momentum is possible
      but fragile; Graphcore's trajectory — $2.8 billion peak to distressed acquisition — is
      the downside reference point.
    claimRefs: [CV013, CV014, CV015, CV016, CV017, CV018, CV019, CV020, CV021]
    tableRefs: [TV003]
    figureRefs: [FV003]

  - id: "val-capital"
    title: "Capital Structure, Return Requirements, and Exit Path"
    body: |
      Etched raised $120 million in a Series A in June 2024, led by Positive Sum with Primary
      Venture Partners as co-investor. The post-money valuation was not publicly disclosed. Based
      on typical Series A dilution norms for hardware companies at this scale, analyst estimates
      place the post-money in the $600–800 million range, implying approximately 15–20% primary
      dilution. At this entry price, lead investors need a minimum 10× return to meet standard
      venture fund return targets, requiring an exit enterprise value of $6–8 billion. No scenario
      in this analysis achieves that threshold at base-case probability weighting; the bull case
      does if exit multiples hold at 2024 levels.

      The most probable exit path is a strategic acquisition by a hyperscaler — AWS, Google,
      Microsoft, or Apple — or a semiconductor company with AI ASIC exposure — Broadcom, Marvell,
      or Qualcomm. An IPO is unlikely before H2 2028 at the earliest, and Cerebras's delayed IPO
      illustrates the difficulty of listing an AI chip company even after production deployments.
      Historical venture base rates for pre-revenue hardware companies are sobering: fewer than 10%
      achieve 10× or greater returns; the majority experience write-downs or distressed exits
      within five years of Series A, arguing for a high discount rate applied to projected
      scenarios. The probability-weighted expected value of approximately $800–1,100 million
      marginally exceeds the estimated $700 million mid-point of the entry range, providing
      insufficient risk compensation for a new position above base-case entry price.
    claimRefs: [CV009, CV010, CV011, CV012, CV022, CV023, CV024, CV025, CV042]
    figureRefs: [FV004]

  - id: "val-conclusion"
    title: "Exit Readiness, Kill Triggers, and Investment Verdict"
    body: |
      Three explicit thesis-break triggers define the conditions under which any existing position
      must be exited or any prospective investment must be declined regardless of entry price.
      First, a tape-out failure or unscheduled abort at TSMC N4 would reduce the enterprise value
      to near zero; IP in a distressed scenario is worth under $100 million absent a functional
      chip. Second, if Mamba, RWKV, or any SSM-family architecture achieves a confirmed
      production inference deployment at any top-three hyperscaler before Sohu's commercial
      launch, the transformer-only differentiation is eliminated without a recovery path. Third,
      if Etched fails to close a Series B at $800 million or above within 24 months of Series A
      close, investor concern would signal imminent distress.

      Three final diligence asks must be resolved before any investment decision. The post-money
      Series A valuation and cap table require disclosure to establish the entry price, dilution
      baseline, and liquidation preference stack. The monthly burn rate, tape-out schedule with
      milestone dates, and cumulative TSMC NRE payments are required to validate runway and
      Series B timing. Any signed LOIs, evaluation agreements, customer pipeline data, or
      briefing recipients under NDA must be disclosed to substantiate the commercial thesis.
      The investment verdict is conditional negative at implied valuations above $1.5 billion,
      and conditional track at or below $800 million, contingent on Series B close, tape-out
      completion, and first customer design win confirmation.
    claimRefs: [CV031, CV032, CV033, CV034, CV035, CV036]
    tableRefs: [TV005, TV006]

tables:
  - id: "TV001"
    title: "Comparable valuation table"
    enumerationScope:
      coverage: "exhaustive"
      basis: >-
        Covers all publicly known AI chip companies with reported valuation or market capitalisation
        data and relevant precedent M&A transactions used in this valuation analysis as of May 2026;
        includes both public semiconductor incumbents and private AI inference startup analogues
        relevant to the comparable company analysis for Etched Sohu.
    columns:
      - "Company"
      - "Stage"
      - "Implied Val. / Market Cap"
      - "EV/Revenue Multiple"
      - "Primary Relevance"
      - "Limitation vs Etched"
    rows:
      - ["NVIDIA", "Public (NASDAQ: NVDA)", "~$3T (2024)", "~25× LTM", "Aspirational benchmark for AI chip dominance", "Diversified GPU+CUDA moat; not inference-only; far larger scale"]
      - ["Marvell Technology", "Public (NASDAQ: MRVL)", "~$80–100B (2024)", "~10–15× on AI ASIC revenue", "Closest production-stage AI custom ASIC comparable", "Marvell has paying hyperscaler customers; Etched has zero revenue"]
      - ["Broadcom", "Public (NASDAQ: AVGO)", "~$700B (2024)", "~18–20× AI chip implied", "Custom silicon for hyperscalers at scale", "Broadcom earns revenue across networking+ASIC; not startup comparable"]
      - ["Qualcomm", "Public (NASDAQ: QCOM)", "~$150B (2024)", "~7–9× semiconductor revenue", "Fabless chip company multiple floor reference", "Mobile-centric; no direct inference ASIC business"]
      - ["Cerebras / Groq (private)", "Series C–D, pre-IPO", "$2.5B (Groq, 2024); $7–8B (Cerebras, implied IPO)", "N/A (no public revenue)", "Private-stage AI chip peers with disclosed valuations", "Both have production deployments; Etched has zero first silicon"]
      - ["Habana Labs (acquired by Intel, 2019)", "Pre-revenue at acquisition", "~$2B acquisition", "N/A (no revenue at exit)", "Primary precedent transaction for AI chip startup M&A", "2019 vintage; AI chip competition far less intense then"]
    notes: >-
      Public company valuations are approximate market-cap as of late 2024; EV/Revenue multiples
      are author estimates from public filings and analyst consensus. Private-stage valuations are
      from publicly reported funding rounds or IPO filings. Comparison to Etched requires a 40–60%
      discount to comparable multiples to reflect pre-revenue stage, single-architecture
      concentration, and execution risk.
    claimRefs: [CV001, CV003, CV005, CV009]

  - id: "TV002"
    title: "Recommendation summary table"
    columns:
      - "Entry Condition"
      - "Implied Post-Money"
      - "Recommended Stance"
      - "Probability-Weighted EV"
      - "Key Qualifier"
    rows:
      - ["Attractive entry", "≤$800M", "Conditional track — re-evaluate at Series B close", "$800M–1.1B", "Re-evaluate contingent on tape-out completion and first customer win"]
      - ["Marginal entry", "$800M–1.5B", "Pass — risk-adjusted return insufficient", "$800M–1.1B", "Insufficient margin of safety; probability-weighted EV barely above entry"]
      - ["Unattractive entry", ">$1.5B", "Hard pass — negative expected value at current information", "$800M–1.1B", "Expected loss at any realistic scenario weighting; three kill triggers active"]
    notes: >-
      Probability-weighted EV derived from bull (15–20% × $3–5B) + base (40–50% × $800M–1.5B) +
      bear (30–40% × $200–500M). Post-money entry conditions assume a future financing round;
      actual Series A post-money is undisclosed. Stance does not constitute investment advice.
    claimRefs: [CV040, CV041]

  - id: "TV003"
    title: "Bull / base / bear scenario table"
    columns:
      - "Scenario"
      - "Probability"
      - "Key Assumptions"
      - "2028 Revenue Est."
      - "Exit EV/Revenue"
      - "Implied Exit EV"
    rows:
      - ["Bull", "15–20%", "First-silicon pass; ≥1 hyperscaler design win by H2 2027; Transformer architecture dominant", "$200–300M", "10–15×", "$3–5B"]
      - ["Base", "40–50%", "First-silicon delivered; performance shortfall or integration delay; 1 initial customer; Series B closed", "$100–150M", "4–6×", "$800M–1.5B"]
      - ["Bear", "30–40%", "Tape-out failure or respin; architecture displacement; Series B unavailable; distressed exit", "<$50M or zero", "<5× or distressed", "$200–500M"]
    notes: >-
      Probabilities are qualitative author estimates calibrated to comparable AI chip startup base
      rates (Graphcore, Cerebras). Revenue estimates are illustrative scenario analysis, not
      company projections. Exit multiples assume 2024-level AI chip sector sentiment persists.
    claimRefs: [CV015, CV016, CV017]

  - id: "TV004"
    title: "Thesis / anti-thesis table"
    columns:
      - "Dimension"
      - "Thesis (Bull)"
      - "Anti-Thesis (Bear)"
      - "Evidence Weight"
    rows:
      - ["Architecture lock-in", "Transformer architecture has proven durable; first-gen hardcoded silicon captures switching-cost moat at inference time", "Mamba / RWKV / SSM alternatives have no-KV-cache advantage; any paradigm shift strands Sohu permanently", "Mixed — Transformers dominant now but SSM evidence growing"]
      - ["Team execution", "MIT/OpenAI lineage; deep AI/hardware expertise; youth indicates agility and long commitment horizon", "CEO is 23 with no tape-out history; ~30-person team for full-stack ASIC is historically undersized", "Weak — no tape-out track record to validate execution"]
      - ["Market timing", "$120M raise coincides with peak inference cost pressure; hyperscalers have active incentive to adopt cheaper inference silicon", "NVIDIA Blackwell/Rubin roadmap narrows the performance gap every 2 years; window to achieve advantage may be short", "Mixed — timing plausible but competitive clock is fast"]
      - ["Capital efficiency", "Focused architecture reduces firmware and software complexity; lower opex than broader-platform competitors", "ASIC tape-out at TSMC N4 costs $50–200M in NRE alone; Series B required before any product revenue", "Negative — capital intensity risk is high and unmitigated at Series A stage"]
    notes: >-
      Evidence weight is author's qualitative judgement from publicly available information.
      'Mixed' indicates countervailing evidence exists on both sides; 'Weak' or 'Negative'
      indicates the anti-thesis evidence is materially stronger than the thesis evidence at
      this stage of the company's development.
    claimRefs: [CV001, CV002, CV004]

  - id: "TV005"
    title: "Thesis-break and kill triggers table"
    columns:
      - "Trigger"
      - "Category"
      - "Signal Event"
      - "Urgency"
      - "Required Action"
    rows:
      - ["First-silicon failure or tape-out abort", "Execution / hardware", "TSMC reports tape-out reject, severe PPA miss, or unscheduled respin before functional silicon delivery", "Immediate", "Exit position; IP value <$100M in distressed scenario; business has no revenue path"]
      - ["Transformer architecture displacement", "Technology / market", "Any top-3 hyperscaler (Google, AWS, Microsoft) announces production inference deployment of Mamba/SSM/MoE replacing Transformer decoder at inference layer", "Within 1 quarter", "Exit position; Sohu's core differentiation is eliminated with no recovery path"]
      - ["Series B failure at viable valuation", "Financial / runway", "Etched fails to close a Series B at ≥$800M post-money within 24 months of Series A close (deadline: mid-2026)", "Within 6 months of deadline", "Reevaluate; capital runway exhaustion implies forced sale or wind-down"]
    notes: >-
      Kill triggers are author-defined thresholds informed by comparable AI chip startup failures
      (Graphcore) and standard venture risk management. They are monitoring indicators, not
      mechanical sell rules; each requires re-evaluation in context at the time of occurrence.
    claimRefs: [CV031, CV032, CV033]

  - id: "TV006"
    title: "Final diligence asks table"
    columns:
      - "Ask"
      - "Priority"
      - "Why Required"
      - "Risk If Unresolved"
    rows:
      - ["Post-money Series A valuation and cap table with full option pool and liquidation preference stack", "P0 — Blocking", "Entry price, dilution baseline, and preference overhang cannot be assessed without this", "Cannot determine whether any entry price offers a positive risk-adjusted return"]
      - ["Monthly burn rate, tape-out milestone schedule, cumulative TSMC NRE payments to date, and projected cash exhaustion date", "P0 — Blocking", "Runway validation and Series B timing depend entirely on burn and NRE cadence", "Runway may be shorter than assumed; Series B timeline may be inside 12 months"]
      - ["Any signed LOIs, evaluation agreements, engineering briefing recipients under NDA, or customer pipeline data", "P1 — Material", "Commercial thesis has zero public evidence; even a non-binding LOI materially changes probability weighting", "Cannot validate any bull-case probability without customer pipeline signal"]
      - ["TSMC foundry agreement terms — node selection (N4 vs N3), NRE payment schedule, allocation priority, and any right-of-first-allocation clause", "P1 — Material", "Foundry lock-in and NRE structure determine capital requirements and execution optionality", "Cannot assess whether $120M is sufficient to reach first silicon delivery"]
    notes: >-
      P0 items are pre-conditions for any investment decision; P1 items are required before
      closing a term sheet. All four items relate to non-public information that Etched would
      need to disclose in a data room; none are publicly available as of the research date.
    claimRefs: [CV034, CV035, CV036]

