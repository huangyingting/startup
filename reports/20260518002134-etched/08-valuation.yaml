callouts:
  - type: "risk"
    title: "Graphcore Analog — Strong Architecture, No Commercial Traction"
    body: >-
      Graphcore raised over $700 million, achieved benchmark-superior architecture performance,
      and maintained a $2.8 billion peak valuation before entering severe decline by 2023–2024
      without achieving commercial scale. Its IPU software stack never reached enterprise-grade
      maturity. Etched shares every structural risk with Graphcore: first-time chip company,
      specialised architecture, no revenue, dependence on hyperscaler adoption that never
      materialised for Graphcore. Investors who anchored to Graphcore's technical credentials
      rather than commercial progress experienced near-total write-downs.
    claimRefs: [CV006, CV017, CV021]

  - type: "recommendation"
    title: "Conditional Negative: Probability-Weighted EV Insufficient at Premium Entry"
    body: >-
      The probability-weighted expected enterprise value of $800 million to $1.1 billion barely
      covers the mid-point of the estimated $600–800 million entry range. At any implied
      post-money valuation above $1.5 billion, the investment is negatively expected value on
      current scenario analysis. The only path to a positive expected value at premium entry is
      to assign materially higher probability to the bull case — which requires evidence of
      first-silicon delivery, customer LOIs, or Series B traction that does not exist in public
      information as of Q2 2026.
    claimRefs: [CV040, CV041]

  - type: "insight"
    title: "Marvell and Broadcom as the Most Plausible Strategic Acquirers"
    body: >-
      If Etched achieves first silicon and even a single hyperscaler design win, Marvell Technology
      and Broadcom are the most structurally motivated acquirers: both have established custom ASIC
      businesses for hyperscalers, both need to expand their Transformer-inference IP portfolio, and
      both have the technical teams to integrate Sohu's architecture. An acquisition at $1.5–3
      billion — within the base-to-bull transition range — would be transformative for Etched's
      investors and strategically rational for either acquirer. This path represents the most
      credible exit scenario for a base-case outcome.
    claimRefs: [CV024, CV027, CV030]

