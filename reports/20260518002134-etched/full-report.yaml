      - number: '3.2'
        title: Incumbent GPU Competitors
        blocks:
          - type: paragraph
            body: >
              NVIDIA holds approximately 80-90% of the AI accelerator market as of 2024-2025. Its H100 and forthcoming
              Blackwell architecture dominate both training and inference workloads. NVIDIA's competitive moat consists
              of four interlocking layers: (1) CUDA software ecosystem with decades of developer investment; (2) NeMo
              and TensorRT inference optimization frameworks; (3) scale of manufacturing commitments with TSMC; and (4)
              trust—every major AI company has proven NVIDIA silicon in production. NVIDIA's primary vulnerability is
              pricing power: H100 GPUs were selling at $30-40K per unit at peak in 2023-2024, with H100 inference
              clusters costing $2-8M per rack.


              AMD Instinct MI300X has emerged as the most credible alternative GPU for inference workloads. AMD's ROCm
              software stack has improved significantly, and Microsoft Azure has committed to large-scale MI300X
              deployments for its OpenAI workloads. Intel Gaudi (formerly Habana Labs, acquired in 2019 for ~$2B)
              targets training and inference workloads but has not achieved significant market share; Intel's software
              ecosystem lags CUDA significantly.


              The GPU incumbents' primary strategic response to Etched would be pricing reductions on
              inference-optimized SKUs (H100 NVL, Blackwell B100, B200) and accelerated development of
              inference-specific firmware and software. Both AMD and NVIDIA are already shipping inference-optimized
              variants with higher memory bandwidth per FLOP.
            claimRefs: []
      - number: '3.3'
        title: Hyperscaler Internal Programs
        blocks:
          - type: paragraph
            body: >
              AWS, Google, and Microsoft have all developed internal AI chips specifically to reduce NVIDIA dependency
              and lower inference costs. Google's TPU (Tensor Processing Unit) program, now on v5, is the most mature
              internal chip program. Google TPU v5e is specifically optimized for inference and is available through
              Google Cloud; it cannot be purchased by third parties. Google uses TPUs extensively for Gemini inference
              and has deployed tens of thousands of units internally.


              AWS Trainium (training) and Inferentia (inference) are Amazon's internal AI chips. AWS Inferentia2 targets
              cost-effective inference for large language models and is available to AWS customers through Amazon EC2
              Inf2 instances. AWS has not disclosed revenue or deployment scale for these chips, but they represent a
              credible threat to third-party inference hardware in the AWS ecosystem. Microsoft has developed the Maia
              100 AI accelerator, announced in November 2023, which targets internal Azure AI inference workloads
              including OpenAI's Azure deployments.


              Etched's potential to sell to hyperscalers exists—OpenAI is publicly listed as a potential customer given
              the Sohu chip's throughput claims—but the hyperscaler internal programs represent both competition and a
              buyer validation risk: hyperscalers have demonstrated willingness and capability to build their own
              silicon rather than pay third parties.
