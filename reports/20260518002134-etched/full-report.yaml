              ASIC startup. The closest public comparables are Marvell Technology — whose custom AI ASIC
              business for hyperscalers generated approximately $1.6 billion in fiscal year 2025 revenue
              at 10–15× EV/Revenue — and Broadcom, whose custom silicon and networking revenues for AI
              have sustained an 18–20× EV/Revenue premium within its overall market capitalisation.
              NVIDIA remains the aspirational benchmark at approximately 25× EV/Revenue on AI
              infrastructure revenues, though its diversified moat and software stack (CUDA) are
              structurally incommensurable with Etched's single-product, pre-revenue profile.

              Among comparable private-stage peers, Cerebras filed for IPO in September 2024 at an
              implied $7–8 billion valuation despite limited commercial customers, demonstrating that AI
              chip startups can sustain elevated private valuations. Groq raised $640 million in early
              2024 at approximately $2.5 billion implied, but Groq has production LPU deployments and
              paying customers — a substantially de-risked profile versus Etched. The precedent
              acquisition of Habana Labs by Intel for approximately $2 billion in December 2019 remains
              the primary positive data point for pre-revenue AI chip startup acquisitions, though the
              AI chip landscape is materially more competitive in 2026 than it was in 2019.
