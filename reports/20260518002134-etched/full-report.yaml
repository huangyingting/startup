              The most material financial diligence blockers are: (1) actual burn rate and cash position as of Q1 2026
              (is the company funded through tape-out or does it face near-term capital need?); (2) TSMC wafer
              commitment and cost terms (which determine cost-per-chip and gross margin potential); (3) first customer
              LOI or design win (which would validate revenue model and timing); and (4) total capital required to reach
