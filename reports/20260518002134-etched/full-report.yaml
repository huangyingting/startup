      - number: '4.3'
        title: Cost Structure and Unit Economics
        blocks:
          - type: paragraph
            body: >
              Etched's cost structure is dominated by semiconductor manufacturing costs: wafer costs, packaging and
              test, yield loss, and NRE (non-recurring engineering) for chip design. At TSMC's 4N process node, wafer
              costs are estimated at $15,000-20,000+ per wafer for leading-edge advanced nodes. Yield rates for
              first-generation designs at a new process node typically run 50-70%, improving to 85-95%+ in volume
              production. A single tape-out at TSMC leading-edge node costs $5-15M in mask set costs alone.


              Semiconductor gross margins at scale can be very attractive: NVIDIA's data center GPU gross margins exceed
              70-75%. However, these margins require scale to cover the fixed NRE costs. Etched would need to sell
              thousands of chip units before the NRE costs are amortized. At $120M total funding, Etched faces a capital
              adequacy challenge: a single generation of leading-edge chip development plus initial production run costs
              can consume $50-100M, leaving limited headroom for a second generation or for sustaining operations
              through the 2+ year sales cycle before revenue.


              Key unit economics inputs that are unknown include: wafer cost commitment with TSMC, die size (which
              determines chips-per-wafer and cost-per-die), target ASP per chip, and yield assumptions. Without these,
              cost-per-token economics claimed by Etched cannot be independently validated.
