      - number: '6.5'
        title: Customer Verdict — Diligence Blockers
        blocks:
          - type: paragraph
            body: >
              The customer diligence verdict for Etched is unambiguously the highest-severity blocker in this report.
              Etched is a pre-revenue, pre-silicon company with zero publicly named customer relationships, zero
              published benchmarks for customer evaluation, zero SDK for developer experimentation, and zero design
              wins. The absence of any customer signal is not explained by stealth strategy — the company publicly
              announced a $120 million Series A in June 2024 — but rather reflects the genuine pre-commercialization
              stage of the company.


              The analog evidence from Groq (case studies showing AI-native inference platform adoption) and AWS
              Inferentia (hyperscaler customer proof of ASIC adoption) validates the buyer behavior hypothesis at the
              market level. These analogs confirm that the inference chip buyer segment exists, has the budget and
              procurement capacity to adopt non-GPU inference hardware, and will do so when cost-per-token economics are
              demonstrated. However, this market-level proof does not reduce Etched's company-specific customer risk,
              which remains critical.


              The key diligence asks for the customer chapter are: (1) Has Etched entered any NDA-governed evaluation
              agreements, even informally? (2) Which companies has Etched briefed at the engineering level on Sohu
              architecture? (3) What is the company's estimate of first customer close date and first revenue date? (4)
              Has any company expressed written interest in a production supply agreement contingent on first-silicon
              performance? Until these questions are answered with verifiable evidence, the customer chapter represents
              a blocking diligence risk that no investment committee should overlook. The Graphcore precedent — a $700M+
              chip startup that failed to convert strong engineering proof into customer adoption at scale — is a direct
              warning about the difficulty of the customer development problem Etched faces.
