  - id: TV004
    title: Thesis / anti-thesis table
    columns:
      - Dimension
      - Thesis (Bull)
      - Anti-Thesis (Bear)
      - Evidence Weight
    rows:
      - - Architecture lock-in
        - >-
          Transformer architecture has proven durable; first-gen hardcoded silicon captures switching-cost moat at
          inference time
        - Mamba / RWKV / SSM alternatives have no-KV-cache advantage; any paradigm shift strands Sohu permanently
        - Mixed — Transformers dominant now but SSM evidence growing
      - - Team execution
        - MIT/OpenAI lineage; deep AI/hardware expertise; youth indicates agility and long commitment horizon
        - CEO is 23 with no tape-out history; ~30-person team for full-stack ASIC is historically undersized
        - Weak — no tape-out track record to validate execution
      - - Market timing
        - >-
          $120M raise coincides with peak inference cost pressure; hyperscalers have active incentive to adopt cheaper
          inference silicon
        - >-
          NVIDIA Blackwell/Rubin roadmap narrows the performance gap every 2 years; window to achieve advantage may be
          short
        - Mixed — timing plausible but competitive clock is fast
      - - Capital efficiency
        - Focused architecture reduces firmware and software complexity; lower opex than broader-platform competitors
        - ASIC tape-out at TSMC N4 costs $50–200M in NRE alone; Series B required before any product revenue
        - Negative — capital intensity risk is high and unmitigated at Series A stage
    notes: >-
      Evidence weight is author's qualitative judgement from publicly available information. 'Mixed' indicates
      countervailing evidence exists on both sides; 'Weak' or 'Negative' indicates the anti-thesis evidence is
      materially stronger than the thesis evidence at this stage of the company's development.
    claimRefs:
      - CV001
      - CV002
      - CV004
  - id: TV005
    title: Thesis-break and kill triggers table
    columns:
      - Trigger
      - Category
      - Signal Event
      - Urgency
      - Required Action
    rows:
      - - First-silicon failure or tape-out abort
        - Execution / hardware
        - TSMC reports tape-out reject, severe PPA miss, or unscheduled respin before functional silicon delivery
        - Immediate
        - Exit position; IP value <$100M in distressed scenario; business has no revenue path
      - - Transformer architecture displacement
        - Technology / market
        - >-
          Any top-3 hyperscaler (Google, AWS, Microsoft) announces production inference deployment of Mamba/SSM/MoE
          replacing Transformer decoder at inference layer
        - Within 1 quarter
        - Exit position; Sohu's core differentiation is eliminated with no recovery path
      - - Series B failure at viable valuation
        - Financial / runway
        - 'Etched fails to close a Series B at ≥$800M post-money within 24 months of Series A close (deadline: mid-2026)'
        - Within 6 months of deadline
        - Reevaluate; capital runway exhaustion implies forced sale or wind-down
    notes: >-
      Kill triggers are author-defined thresholds informed by comparable AI chip startup failures (Graphcore) and
