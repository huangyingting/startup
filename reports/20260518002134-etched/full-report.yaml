      - number: '2.4'
        title: Growth Drivers and Adoption Constraints
        blocks:
          - type: paragraph
            body: >
              The primary growth driver for the AI inference hardware market is the explosive adoption of large language
              models in commercial applications. Since the launch of ChatGPT in November 2022, LLM inference volumes
              have grown dramatically across consumer AI applications, enterprise software integrations, and API-based
              AI services. Every query to an LLM API incurs inference compute cost, and as LLM adoption grows, the
              cumulative inference compute demand creates a massive and growing addressable opportunity.

              Secondary drivers include: (1) cost economics — GPU inference is expensive, and companies running millions
              of inferences per day face enormous compute bills; (2) latency requirements — real-time applications
              require low-latency inference that specialized hardware can potentially deliver more efficiently; (3)
              energy efficiency — data center power constraints make higher performance-per-watt silicon attractive to
              hyperscalers; (4) supply chain diversification — hyperscalers are actively seeking alternatives to NVIDIA
              dependency.

              Key adoption constraints for Etched specifically include: (1) software ecosystem — CUDA and the NVIDIA GPU
              software ecosystem are deeply entrenched; any new chip must support major ML frameworks; (2) switching
              costs — GPU infrastructure is expensive to replace; hyperscalers would need compelling TCO to justify
              migration; (3) silicon maturity — as a startup, Etched carries yield risk, reliability risk, and support
              risk that incumbents do not; (4) architecture lock-in risk — customers adopting Sohu expose themselves to
              a single-vendor risk on a chip tied to a specific AI architecture; (5) capital intensity — chip
              development and production require scale that only large orders can support.
