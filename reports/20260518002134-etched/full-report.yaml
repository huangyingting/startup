              - CE016
              - CE029
      - number: '5.2'
        title: Architecture — Hardened Transformer Attention Silicon
        blocks:
          - type: paragraph
            body: >
              Etched's core architectural thesis is that the Transformer attention operation — scaled dot-product
              multi-head self-attention as introduced by Vaswani et al. in "Attention Is All You Need" (2017) — is
              sufficiently stable and computationally dominant to justify permanent silicon encoding. In a conventional
              GPU, attention is computed by CUDA kernels (including FlashAttention-optimized variants) on
              general-purpose SIMD compute units. Sohu's attention engine replaces this programmable path with hardwired
              logic gates whose function cannot be changed post-manufacture.


              The memory architecture is the second key design dimension. Modern LLM inference is bottleneck-limited by
              memory bandwidth, not raw compute, because each token generation step requires reading the full KV-cache
              and model weights from DRAM. Sohu almost certainly integrates High Bandwidth Memory (HBM) stacks to
              address this, following the same path as NVIDIA H100 (HBM3) and Groq LPU (SRAM-dominant). The specific HBM
              generation and stack count have not been disclosed. HBM bandwidth determines how many tokens per second
              the chip can decode, which is the primary customer-visible performance metric.


              The hardwired attention engine creates a meaningful architectural trade-off: it achieves maximum silicon
              efficiency for the attention computation but permanently excludes support for future architectures that
              may become dominant. Mamba and other state-space models represent the most visible alternative paradigm;
              these architectures replace attention with linear recurrence and cannot run on Sohu's attention engine.
              Etched is therefore making a high-conviction bet that Transformer attention will remain the dominant LLM
              inference paradigm for the duration of Sohu's commercial life, which typically spans 3-5 years from first
              production.
            claimRefs: []
          - type: table
            tableRef: TE003
            claimRefs: []
          - type: figure
            figureRef: FE002
            claimRefs:
              - CE001
              - CE005
              - CE008
              - CE025
              - CE030
      - number: '5.3'
        title: Manufacturing, Maturity, and Technology Dependencies
        blocks:
          - type: paragraph
            body: >
              Sohu is designed for TSMC's 4N process node, a 4nm-class advanced node that provides high transistor
              density and power efficiency appropriate for AI inference chips. TSMC's 4N is a customer-specific variant
              of the N4 process family and requires a foundry relationship with significant minimum wafer commitments.
              Access to leading-edge TSMC capacity is competitively constrained; major customers including NVIDIA, AMD,
              Apple, and Qualcomm hold priority allocation. As a startup with no prior TSMC production history, Etched
              must negotiate wafer allocation as a new customer, which typically involves accepting smaller batch sizes
              and longer lead times.


              The chip's manufacturing maturity as of Q1 2026 is pre-silicon: tape-out has been claimed as in progress
              but not confirmed. First-pass silicon on a novel architecture at a leading-edge node carries inherent
              design-under-silicon risk: first-pass success rates for complex digital ASICs are reported in industry
              literature at 50-70% without re-spin, and re-spins add 6-12 months and $5-15M in additional NRE costs. No
              engineering samples have been publicly demonstrated.


              Critical technology dependencies beyond TSMC include: HBM supply (concentrated with SK Hynix, Micron, and
              Samsung), advanced packaging (CoWoS-style integration is required for HBM and is itself
              capacity-constrained at TSMC), and EDA toolchain licensing (Cadence, Synopsys). Each of these dependencies
              represents a potential supply chain single point of failure. Etched, as a small startup, may face
              allocation challenges relative to hyperscaler-backed chip companies (Amazon Trainium, Google TPU,
              Microsoft Maia) that have priority agreements in place.
            claimRefs: []
          - type: figure
            figureRef: FE003
            claimRefs:
              - CE003
              - CE011
              - CE016
              - CE021
              - CE027
      - number: '5.4'
        title: Software Stack, SDK, and Developer Surface
        blocks:
          - type: paragraph
            body: >
              Etched has not published a developer SDK, API documentation, integration guide, or model compatibility
              matrix as of Q1 2026. The absence of any public software artifact is the most significant
              product-readiness gap from a commercial deployment perspective. Enterprise inference customers require at
              minimum: a model conversion tool (to load HuggingFace-format checkpoints onto the chip), an inference
              runtime (to handle request batching and token scheduling), and a serving API compatible with OpenAI-format
              endpoints (the de facto inference API standard).


              The HuggingFace Transformers library is the dominant ecosystem framework for Transformer model
              distribution and inference. Any commercial AI inference chip must integrate with the HuggingFace model hub
              format (SafeTensors, config.json schema) to allow customers to run standard LLaMA, Mistral, and Falcon
              checkpoints without manual conversion. Etched has not disclosed whether its compiler ingests HuggingFace
              model formats directly or requires a separate conversion step.


              Developer adoption for inference chips follows a well-documented pattern: developer-facing documentation →
              open-source SDK → first reference deployment → ecosystem tooling. Etched is currently at step zero: no
              SDK, no documentation, no reference implementation. Groq, which shipped its LPU with a
              developer-accessible cloud API and public benchmark data, demonstrates that developer surface is a
              critical commercial accelerant. Etched's lack of developer surface suggests the company is focused on
              silicon first and software second — a reasonable priority ordering at tape-out stage — but this creates a
              customer adoption delay that will add 6-12 months to revenue realization after first silicon.
            claimRefs: []
          - type: table
            tableRef: TE004
            claimRefs: []
      - number: '5.5'
        title: Roadmap, Differentiation, and Technical Risks
        blocks:
          - type: paragraph
            body: >
              Etched's differentiation thesis rests on three claims: (1) that hardwired Transformer attention delivers
              10× throughput vs. NVIDIA H100 for inference workloads; (2) that this performance advantage translates to
              materially lower cost-per-token economics for hyperscaler inference operators; and (3) that the
              Transformer architecture will remain dominant for long enough to justify a single-architecture ASIC
              investment. None of these claims has been independently validated as of Q1 2026.


              The most significant technical risk is architecture lock-in. If non-Transformer architectures — Mamba,
              RWKV, or future recurrent variants — gain significant market share, Sohu becomes obsolete faster than its
              depreciation schedule allows. The history of domain-specific silicon (early AI training chips, FPGA-based
              inference accelerators, first-generation neuromorphic chips) shows that architectural bets made in silicon
              can become stranded assets within one design generation. Etched has made an unusually concentrated bet:
              not just Transformer, but the specific attention operation hardwired in silicon, with no programmable
              fallback.


              The product roadmap is entirely uncharacterized beyond the current Sohu tape-out. No second-generation
              chip has been announced, and no product family (e.g., inference-only vs. fine-tuning, data-center vs.
              edge) has been disclosed. This is appropriate for a company at tape-out stage, but represents an
              additional risk factor: customers making supply commitments need visibility into the next-generation
              roadmap to justify long-term platform adoption. Etched's roadmap opacity is a commercial risk even if
              first silicon succeeds on schedule.
            claimRefs: []
          - type: table
            tableRef: TE005
            claimRefs: []
          - type: figure
            figureRef: FE004
            claimRefs:
              - CE001
              - CE003
              - CE004
              - CE005
              - CE018
              - CE019
      - number: '5.6'
        title: Exhibits
        blocks:
          - type: callout
            title: Architecture Lock-In Is the Defining Technical Risk
            body: >-
              Sohu's hardwired Transformer attention is simultaneously its performance advantage and its existential
              risk. If any non-Transformer architecture (Mamba, RWKV, or a future hybrid) captures a significant share
              of LLM inference workloads before Sohu reaches volume production, the chip becomes obsolete in its primary
              market. The history of domain-specific silicon shows that single-architecture bets can become stranded
              assets within one product generation. Unlike GPU incumbents that can reconfigure workloads with software
              updates, Sohu's architecture is permanent post-manufacture.
            calloutType: risk
            claimRefs:
              - CE012
              - CE014
              - CE036
              - CE037
          - type: callout
            title: 'No Production Silicon, No SDK, No Customer: The Three Zeros'
            body: >-
              As of Q1 2026, Etched has no production silicon, no public SDK or documentation, and no announced customer
              or design win. This is consistent with a pre-tape-out semiconductor startup at 18-24 months before first
              revenue — but it means every commercial assumption (performance claims, cost-per-token advantages, model
              compatibility) is based entirely on company-stated projections without independent validation. Diligence
