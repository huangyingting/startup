      - number: '3.4'
        title: Purpose-Built Inference Startup Competitors
        blocks:
          - type: paragraph
            body: >
              Groq, Cerebras, and SambaNova are the three most-funded inference chip startups ahead of Etched. Groq has
              raised approximately $1.1B+ and offers the LPU (Language Processing Unit) as a deterministic streaming
              inference chip with very low latency. Groq's GroqCloud provides API access to inference at competitive
              pricing. Groq's architecture supports general AI model inference, not just Transformers—it can run Mamba,
              MoE, and other architectures. Groq's differentiation is latency (tokens per second response speed) rather
              than throughput at batch inference.


              Cerebras Systems has raised approximately $720M+ and uses a wafer-scale processing approach (the Cerebras
              WSE-3 is 46,225 mm², compared to ~800 mm² for H100). Cerebras focuses primarily on training and can do
              inference; it targets enterprise and government customers. SambaNova Systems has raised approximately
              $1.2B and uses a reconfigurable dataflow architecture. SambaNova has targeted enterprise AI deployment
              with its DataScale systems.


              Tenstorrent is a newer entrant (founded 2016, led by Jim Keller) using RISC-V-based AI chips with a focus
              on open hardware and software. Graphcore (UK-based) developed the Intelligence Processing Unit (IPU) for
              AI workloads; it has struggled commercially and was acquired by SoftBank in 2023 for a reported
              $120M—substantially below its ~$2.8B peak valuation. The Graphcore trajectory is an important adverse data
              point: a well-funded AI chip startup with differentiated architecture can fail to achieve commercial
              traction even with significant capital.
            claimRefs: []
      - number: '3.5'
        title: Switching Costs, Moat Durability, and Displacement Risk
        blocks:
          - type: paragraph
            body: >
              Etched's primary moat claim is architectural: by implementing attention in hardened logic, it achieves
              throughput efficiency that GPU-based approaches cannot match at equivalent silicon area. This moat is real
              but narrow and fragile. It is real because attention-optimized hardware can genuinely run Transformer
              inference more efficiently. It is narrow because it only applies to Transformer inference. It is fragile
              because (1) NVIDIA and hyperscalers can respond with inference-optimized SKUs, (2) model architectures are
              evolving away from pure Transformer, and (3) software optimization (Flash Attention, quantization,
              speculative decoding) continuously reduces the efficiency gap between specialized and general-purpose
              hardware.


              CUDA lock-in is the dominant competitive moat for NVIDIA. A company switching from NVIDIA GPUs to Etched
              must: (1) re-validate every model in production on Etched silicon; (2) replace CUDA/TensorRT pipeline
              integration with Etched's SDK; (3) accept vendor concentration risk with an early-stage startup; and (4)
              build internal expertise in Etched's toolchain. These switching costs are non-trivial but manageable for
              large organizations with dedicated ML infrastructure teams. They represent a meaningful barrier to
              Etched's sales process, not an insurmountable barrier to adoption.


              Adverse evidence on displacement risk: The AI chip startup landscape has produced multiple well-funded
              failures. Graphcore's acquisition at a fraction of its peak valuation is the most recent data point. Wave
              Computing and Mythic AI have also failed or pivoted. The pattern suggests AI chip startups face a "valley
              of death" between chip demonstration and production-scale deployment, where software ecosystem immaturity,
              customer inertia, and NVIDIA's incremental improvement create compounding headwinds.
