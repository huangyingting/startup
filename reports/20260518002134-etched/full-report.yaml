          - type: paragraph
            body: |
              The bull case assigns a 15–20% probability to Etched achieving first-silicon pass without
              a respin at TSMC N4, confirming at least one hyperscaler customer design win by H2 2027,
              and reaching $200–300 million in contracted or recognised revenue by 2028. Applied to a
              10–15× EV/Revenue multiple consistent with early-stage Marvell AI ASIC comparables, this
              implies an enterprise value of $3–5 billion, representing a 4–7× return on the estimated
              $600–800 million entry.

              The base case (40–50% probability) assumes first-silicon delivery but with at least one
              major performance shortfall or integration challenge, a single initial customer design win,
              and a 2028 revenue trajectory of $100–150 million. Risk-adjusted at 4–6× EV/Revenue, this
              implies an enterprise value of $800 million to $1.5 billion — below the 10× return
              threshold for lead Series A investors. The bear case (30–40% probability) encompasses
              tape-out failure, silicon respin requirement, architecture obsolescence via Mamba or SSM
              adoption, or inability to close a Series B by late 2026. This results in a distressed exit
              at $200–500 million, representing a loss on the Series A capital base. Cerebras's own
              experience demonstrates that sustaining private valuation without IPO momentum is possible
              but fragile; Graphcore's trajectory — $2.8 billion peak to distressed acquisition — is
              the downside reference point.
            claimRefs:
              - CV013
              - CV014
              - CV015
              - CV016
              - CV017
              - CV018
              - CV019
              - CV020
              - CV021
          - type: table
            tableRef: TV003
            claimRefs:
              - CV015
              - CV016
              - CV017
          - type: figure
            figureRef: FV003
            claimRefs:
              - CV028
              - CV030
              - CV039
      - number: '8.4'
        title: Capital Structure, Return Requirements, and Exit Path
        blocks:
          - type: paragraph
            body: |
              Etched raised $120 million in a Series A in June 2024, led by Positive Sum with Primary
              Venture Partners as co-investor. The post-money valuation was not publicly disclosed. Based
              on typical Series A dilution norms for hardware companies at this scale, analyst estimates
              place the post-money in the $600–800 million range, implying approximately 15–20% primary
              dilution. At this entry price, lead investors need a minimum 10× return to meet standard
              venture fund return targets, requiring an exit enterprise value of $6–8 billion. No scenario
              in this analysis achieves that threshold at base-case probability weighting; the bull case
              does if exit multiples hold at 2024 levels.

              The most probable exit path is a strategic acquisition by a hyperscaler — AWS, Google,
              Microsoft, or Apple — or a semiconductor company with AI ASIC exposure — Broadcom, Marvell,
              or Qualcomm. An IPO is unlikely before H2 2028 at the earliest, and Cerebras's delayed IPO
              illustrates the difficulty of listing an AI chip company even after production deployments.
              Historical venture base rates for pre-revenue hardware companies are sobering: fewer than 10%
              achieve 10× or greater returns; the majority experience write-downs or distressed exits
              within five years of Series A, arguing for a high discount rate applied to projected
              scenarios. The probability-weighted expected value of approximately $800–1,100 million
              marginally exceeds the estimated $700 million mid-point of the entry range, providing
              insufficient risk compensation for a new position above base-case entry price.
            claimRefs:
              - CV009
              - CV010
              - CV011
              - CV012
              - CV022
              - CV023
              - CV024
              - CV025
              - CV042
          - type: figure
            figureRef: FV004
            claimRefs:
              - CV009
              - CV011
              - CV012
      - number: '8.5'
        title: Exit Readiness, Kill Triggers, and Investment Verdict
        blocks:
          - type: paragraph
            body: |
              Three explicit thesis-break triggers define the conditions under which any existing position
              must be exited or any prospective investment must be declined regardless of entry price.
              First, a tape-out failure or unscheduled abort at TSMC N4 would reduce the enterprise value
              to near zero; IP in a distressed scenario is worth under $100 million absent a functional
              chip. Second, if Mamba, RWKV, or any SSM-family architecture achieves a confirmed
              production inference deployment at any top-three hyperscaler before Sohu's commercial
              launch, the transformer-only differentiation is eliminated without a recovery path. Third,
              if Etched fails to close a Series B at $800 million or above within 24 months of Series A
              close, investor concern would signal imminent distress.

              Three final diligence asks must be resolved before any investment decision. The post-money
              Series A valuation and cap table require disclosure to establish the entry price, dilution
              baseline, and liquidation preference stack. The monthly burn rate, tape-out schedule with
              milestone dates, and cumulative TSMC NRE payments are required to validate runway and
              Series B timing. Any signed LOIs, evaluation agreements, customer pipeline data, or
              briefing recipients under NDA must be disclosed to substantiate the commercial thesis.
              The investment verdict is conditional negative at implied valuations above $1.5 billion,
              and conditional track at or below $800 million, contingent on Series B close, tape-out
              completion, and first customer design win confirmation.
            claimRefs:
              - CV031
              - CV032
              - CV033
              - CV034
              - CV035
              - CV036
          - type: table
            tableRef: TV005
            claimRefs:
              - CV031
              - CV032
              - CV033
          - type: table
            tableRef: TV006
            claimRefs:
              - CV034
              - CV035
              - CV036
      - number: '8.6'
        title: Exhibits
        blocks:
          - type: callout
            title: Graphcore Analog — Strong Architecture, No Commercial Traction
            body: >-
              Graphcore raised over $700 million, achieved benchmark-superior architecture performance, and maintained a
              $2.8 billion peak valuation before entering severe decline by 2023–2024 without achieving commercial
              scale. Its IPU software stack never reached enterprise-grade maturity. Etched shares every structural risk
              with Graphcore: first-time chip company, specialised architecture, no revenue, dependence on hyperscaler
              adoption that never materialised for Graphcore. Investors who anchored to Graphcore's technical
              credentials rather than commercial progress experienced near-total write-downs.
            calloutType: insight
            claimRefs:
              - CV006
              - CV017
              - CV021
          - type: callout
            title: 'Conditional Negative: Probability-Weighted EV Insufficient at Premium Entry'
            body: >-
              The probability-weighted expected enterprise value of $800 million to $1.1 billion barely covers the
              mid-point of the estimated $600–800 million entry range. At any implied post-money valuation above $1.5
              billion, the investment is negatively expected value on current scenario analysis. The only path to a
              positive expected value at premium entry is to assign materially higher probability to the bull case —
              which requires evidence of first-silicon delivery, customer LOIs, or Series B traction that does not exist
              in public information as of Q2 2026.
            calloutType: insight
            claimRefs:
              - CV040
              - CV041
          - type: callout
            title: Marvell and Broadcom as the Most Plausible Strategic Acquirers
            body: >-
              If Etched achieves first silicon and even a single hyperscaler design win, Marvell Technology and Broadcom
              are the most structurally motivated acquirers: both have established custom ASIC businesses for
              hyperscalers, both need to expand their Transformer-inference IP portfolio, and both have the technical
              teams to integrate Sohu's architecture. An acquisition at $1.5–3 billion — within the base-to-bull
              transition range — would be transformative for Etched's investors and strategically rational for either
              acquirer. This path represents the most credible exit scenario for a base-case outcome.
            calloutType: insight
            claimRefs:
              - CV024
              - CV027
              - CV030
