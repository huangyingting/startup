      - number: '4.2'
        title: GTM Motion and Sales Efficiency
        blocks:
          - type: paragraph
            body: >
              Etched's go-to-market model is direct enterprise sales targeting hyperscalers and large AI-native
              companies. This is a high-ASP, low-volume sales motion typical of semiconductor infrastructure vendors.
              The target buyer is a VP of Engineering Infrastructure or CTO-level decision maker at a company spending
              >$100M/year on GPU compute. Buying cycles for inference silicon in this segment typically span 12-24
              months from initial evaluation to production deployment.


              At pre-revenue stage, Etched has no disclosed sales team size, pipeline metrics, or customer acquisition
              cost data. The company's primary go-to-market asset is the claimed 10× throughput advantage for
              Transformer inference, which creates a compelling economic argument if validated. The sales process would
              require: (1) free or subsidized chip samples for evaluation; (2) technical integration support for SDK
              adoption; (3) reference architecture validation; and (4) supply commitment negotiations.


              Channel economics for Etched are uncharacterized. NVIDIA sells through an extensive reseller, OEM, and
              cloud marketplace channel. Etched would need to either develop similar channel relationships or rely on
              direct sales to a small number of large accounts. Given the chip design's Transformer-only specialization,
              customer concentration in the top 10 AI inference buyers (OpenAI, Anthropic, Cohere, hyperscalers,
              inference platforms) is nearly certain in the early years.
