  - number: 2
    title: Market Analysis
    sections:
      - number: '2.1'
        title: Market Definition and Boundaries
        blocks:
          - type: paragraph
            body: >
              Etched competes in the AI accelerator hardware market, a fast-growing segment of the broader semiconductor
              industry. The market can be defined at multiple levels of granularity. At the broadest level, Etched
              participates in the total AI chip market, which includes chips for training, inference, and edge AI. More
              precisely, Etched's product (the Sohu ASIC) targets the AI inference accelerator segment — chips optimized
              for running, rather than training, neural network models in production environments.

              The market boundary for Etched's addressable opportunity is further defined by architecture: Sohu is
              hardcoded for Transformer models only, meaning its TAM is bounded by the share of AI inference workloads
              that are Transformer-based. As of the research date, the vast majority of commercially deployed large
              language models and generative AI workloads are built on Transformer architecture, including GPT-4, LLaMA,
              Claude, and Gemini. This gives Etched a large near-term market. However, the addressable market could
              contract if non-Transformer architectures capture significant inference share.

              Status-quo substitutes are primarily NVIDIA H100/H200/B200 GPU clusters deployed by cloud providers (AWS,
              Google Cloud, Microsoft Azure, Oracle Cloud) and on-premises by large enterprises. Adjacent competitors
              include Google's internal TPU infrastructure (not sold externally in traditional chip form), AWS
              Trainium/Inferentia, and third-party AI accelerators from Groq, Cerebras, AMD (MI300X), and Intel (Gaudi
              3). Etched's chip is not positioned against training workloads — this is explicitly out of scope for the
              Sohu ASIC.
