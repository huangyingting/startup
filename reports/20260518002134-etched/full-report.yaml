  - id: TE002
    title: Workflow / use-case table
    columns:
      - Use Case
      - Model Architecture
      - Inference Pattern
      - Sohu Fit
      - Limitation / Constraint
      - Assessment
    rows:
      - - LLM chatbot / conversational AI
        - Transformer decoder (GPT, LLaMA, Mistral class)
        - Autoregressive token generation; sequential decode
        - >-
          High — hardcoded attention is ideal for sequential autoregressive decode; KV-cache access pattern well-suited
          to HBM
        - Transformer-only; no SSM or hybrid model support
        - Primary intended use case; best technical fit
      - - Code generation (Copilot-class tools)
        - Transformer decoder, long-context
        - Autoregressive decode, 8K-100K+ context windows
        - High — long-context workloads have high attention compute fraction; hardcoded attention scales favorably
        - Long-context KV-cache requires large HBM capacity; stack count and eviction policy matter
        - Strong fit; long-context is Sohu's architectural sweet spot
      - - Text embedding generation
        - Transformer encoder (BERT, RoBERTa class)
        - Single forward pass; no autoregressive decoding
        - >-
          Medium — attention hardening still reduces encoder compute cost, but full throughput benefit requires decoding
          workloads
        - Less differentiation vs GPU; FlashAttention already highly optimized for encoder inference
        - Moderate fit; not the primary workload but supported
      - - Multimodal inference (vision-language)
        - Transformer encoder + decoder; cross-attention
        - Mixed encode-then-decode; cross-attention between modalities
        - >-
          Medium-Low — cross-attention layers are architecture-specific; Sohu attention engine must support
          cross-attention patterns
        - Multimodal cross-attention design varies by model; compatibility unconfirmed
        - Uncertain fit; requires model-specific validation
      - - Mixture-of-Experts Transformer inference (Mixtral class)
        - Sparse MoE Transformer
        - Sparse routing + attention; only subset of experts active per token
        - Low — attention is accelerated but sparse MoE routing overhead occurs on host; no confirmed MoE support
        - MoE token routing may not be accelerated; gating computation falls outside hardwired attention engine
        - Limited fit; MoE routing bottleneck likely on host CPU
      - - Non-Transformer SSM inference (Mamba, RWKV)
        - State-space model or recurrent architecture
        - Recurrence-based; no dot-product attention
        - Not supported — Sohu is Transformer-only; SSM requires different compute primitives
        - Fundamental architectural incompatibility; Mamba uses selective state spaces with no attention operation
        - Excluded use case; confirmed incompatibility with Sohu design
    notes: >-
      Use-case fit assessed against Etched's stated Transformer-only architecture. MoE and SSM limitations are inferred
      from the hardwired Transformer attention design, not confirmed by Etched. Actual model compatibility requires SDK
      and model-compatibility matrix from the company.
