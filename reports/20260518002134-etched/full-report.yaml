  - id: FE002
    title: Customer workflow / operating flow
    type: flow
    layout: standard
    summary: >-
      End-to-end inference workflow on a Sohu chip: from customer model import through Etched compiler and runtime to
      returned inference output, illustrating how the hardwired attention engine fits into the serving stack.
    data:
      nodes:
        - id: n1
          label: Customer Model Import
          detail: >-
            Customer loads Transformer checkpoint (LLaMA, Mistral, GPT class) in HuggingFace SafeTensors format into
            Etched compiler for conversion
          tone: neutral
        - id: n2
          label: Etched Compiler (Graph Conversion)
          detail: >-
            Compiler converts Transformer computation graph into Sohu-optimized execution format; maps multi-head
            attention layers to hardwired silicon blocks
          tone: neutral
        - id: n3
          label: Inference Runtime Initialization
          detail: >-
            Runtime loads compiled model onto Sohu chip via PCIe DMA; allocates HBM for model weights and initializes
            KV-cache for session
          tone: neutral
        - id: n4
          label: Inference Request (Token Prefill)
          detail: >-
            Customer submits prompt; runtime executes prefill pass — attention over full input sequence computed by
            hardwired engine, populating KV-cache in HBM
          tone: positive
        - id: n5
          label: Autoregressive Decode (Hardwired Attention)
          detail: >-
            Sohu hardwired attention engine reads KV-cache from HBM and computes next-token attention at full hardware
            speed without software kernel dispatch overhead
          tone: positive
        - id: n6
          label: Output Token Stream Returned
          detail: >-
            Decoded token returned via PCIe to host CPU; runtime streams token to caller; autoregressive loop repeats
            until EOS token or max-length reached
          tone: positive
      edges:
        - from: n1
          to: n2
          label: HuggingFace checkpoint to compiler
        - from: n2
          to: n3
          label: Compiled execution graph to runtime
        - from: n3
          to: n4
          label: Model loaded, ready for inference
        - from: n4
          to: n5
          label: KV-cache populated, decode loop begins
        - from: n5
          to: n6
          label: Token decoded, returned to caller
        - from: n6
          to: n5
          label: Next token requested (autoregressive loop)
    approximationNotes: >-
      Workflow is hypothetical — based on expected inference chip operating model; Etched has not published compiler or
      runtime documentation. Compiler and runtime steps are pre-release. Edge labels reflect standard inference serving
      flow for Transformer decoder models using HBM-backed KV-cache.
    claimRefs:
      - CE001
      - CE005
      - CE008
      - CE025
      - CE030
