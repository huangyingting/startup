  - number: 4
    title: Financials
    sections:
      - number: '4.1'
        title: Revenue Model and Streams
        blocks:
          - type: paragraph
            body: >
              Etched is a pre-revenue semiconductor startup. Its intended revenue model is hardware sales: designing a
              custom ASIC (the Sohu chip) optimized for Transformer inference and selling it to hyperscalers, large
              AI-native companies, and inference platform operators. This is a one-time hardware sales model with
              potential repeat purchase cycles tied to chip generations, analogous to NVIDIA's GPU product cycle (H100 →
              H200 → Blackwell). There is no disclosed software licensing, cloud API, or SaaS revenue stream.


              The primary revenue stream is direct hardware unit sales of Sohu chips at OEM or enterprise pricing. A
              secondary stream could be system-level sales (rack or server configurations incorporating Sohu chips),
              analogous to how Cerebras sells CS-3 appliances rather than bare chips. No cloud marketplace offering has
              been announced. The company has made no public disclosures about revenue run rate, ARR, or any executed
              customer contracts.


              Revenue recognition for hardware sales typically follows ASC 606 point-in-time recognition upon chip
              delivery. Unlike SaaS, this creates lumpy revenue tied to production batch deliveries and procurement
              cycles. Capital intensity is extremely high for semiconductor companies: Etched must fund tape-out, wafer
              purchases, testing, and packaging before any revenue is collected. The working capital cycle for
              semiconductor hardware spans 12-24 months from tape-out to revenue.
