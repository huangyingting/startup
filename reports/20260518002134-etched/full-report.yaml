      - number: '6.2'
        title: Adoption Trajectory and Current Traction
        blocks:
          - type: paragraph
            body: >
              Etched has zero customer traction as of Q1 2026. The company has not disclosed any customers, active
              evaluations, signed LOIs, design wins, or named engineering-briefing recipients. This is the baseline
              state for a chip startup whose silicon has not yet been demonstrated publicly: potential customers cannot
              benchmark a chip that does not exist as a production sample, and procurement teams are unlikely to sign
              evaluation agreements for hardware without physical samples available for technical validation.


              The adoption trajectory for an AI inference chip startup typically follows five phases: (1) pre-silicon
              awareness and engineering briefings to potential customers, (2) first-silicon delivery and confidential
              performance benchmarking, (3) pilot deployment with 1-3 committed design-win customers, (4) production
              ramp and named customer announcements, and (5) ecosystem expansion. Based on public evidence, Etched has
              not yet entered phase 1 on any publicly confirmable basis. The company has not announced engineering
              briefings, sample availability timelines, or any customer engagement program as of Q1 2026.


              For comparison, Groq began its customer engagement before shipping hardware by building a developer
              community around its architecture and providing early access to benchmarks. Cerebras similarly briefed
              hyperscaler customers well in advance of commercial availability. Etched's adoption trajectory, measured
              against these analogs, is delayed: the company has raised $120 million but has not yet provided any public
              evidence of customer engagement activity. The earliest plausible first-revenue date, given a 12-24 month
              evaluation cycle after first-silicon delivery, is H2 2027 to 2028 — assuming tape-out completes on
              schedule in 2025-2026 and first silicon is delivered H1 2027.
