      - number: '6.4'
        title: Retention, Expansion, and Concentration Risk
        blocks:
          - type: paragraph
            body: >
              Etched has no customers, so retention and churn metrics cannot be measured directly. However, the
              structural economics of inference chip adoption strongly favor high retention once integration is
              complete. An AI company that re-engineers its serving stack, model compiler, and deployment pipeline to
              run on Sohu hardware — a process estimated at 3-6 months of engineering work by 2-5 dedicated engineers —
              faces switching costs equivalent to 12-18 months of re-engineering to move back to GPU infrastructure or
              to an alternative ASIC. This creates structural lock-in analogous to cloud infrastructure switching costs,
              though without the data portability friction.


              Expansion economics in the inference chip segment are favorable if performance is validated. AWS
              Inferentia case studies show that customers who adopt custom inference silicon typically expand capacity
              within 12 months of first deployment, driven by lower cost-per-inference enabling higher inference
              volumes. Together AI and Anyscale, as potential Etched customers, would likely expand Sohu capacity in
              proportion to their overall LLM inference growth — which is projected to grow significantly as open-source
              model quality improves and inference costs fall.


              Concentration risk is the most serious near-term structural concern for Etched. With zero current
              customers, Etched's first customer would represent 100% of its initial revenue. Even with 3-5 early
              customers, a scenario where any single customer represents 25-35% of first-year revenue creates extreme
              concentration risk. If that customer reduces usage — due to a strategic pivot away from Transformer
              models, a competitor offering better economics, or a loss of their own funding — Etched faces a revenue
              shock with no diversification buffer. Graphcore's failure was partly attributable to customer
              concentration: a small number of large customers that delayed or cancelled deployments created a cascading
              revenue shortfall. Etched must prioritize customer diversification from its very first production run.
