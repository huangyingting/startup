  - number: 5
    title: Product & Technology
    sections:
      - number: '5.1'
        title: Product Definition and Sohu Chip Specification
        blocks:
          - type: paragraph
            body: >
              Etched's sole product is the Sohu ASIC — a purpose-built inference accelerator that permanently encodes
              the Transformer self-attention computation in silicon. The company's central premise is that by hardwiring
              the attention mechanism rather than emulating it on programmable logic, Sohu eliminates the
              instruction-dispatch and memory-management overhead that limits GPU throughput on autoregressive
              Transformer workloads. According to Etched, this architectural choice produces approximately 10× the
              throughput of an NVIDIA H100 for Transformer inference tasks, though this claim has not been independently
              verified with production silicon.


              Sohu targets the inference phase of LLM deployment, not training. The chip is designed for
              Transformer-only architectures: dense decoder models (GPT-4 class, LLaMA, Mistral, Falcon) and
              encoder-decoder models (T5 class). It does not support non-Transformer architectures such as Mamba
              state-space models or purely recurrent networks. The chip's specialization means any customer adopting
              Sohu commits to the Transformer paradigm for the chip's useful life.


              As of Q1 2026, Sohu does not exist as production silicon. The company has claimed that tape-out on TSMC's
              4N process node is in progress, but no engineering samples have been publicly demonstrated. No product
              specification sheet, die photograph, or third-party benchmark has been published. The product page at
              etched.com/sohu returns a 404 error. Etched's commercial product assets are currently: a company homepage
              (etched.com), a fundraising announcement ($120M Series A, June 2024), and two founders' professional
              histories at Google.
            claimRefs: []
          - type: table
            tableRef: TE001
            claimRefs: []
          - type: table
            tableRef: TE002
            claimRefs: []
          - type: figure
            figureRef: FE001
            claimRefs:
