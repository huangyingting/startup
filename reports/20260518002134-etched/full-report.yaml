      - number: '2.3'
        title: Buyer Segmentation and Adoption Path
        blocks:
          - type: paragraph
            body: >
              Etched's primary buyers are cloud hyperscalers and large enterprises that operate AI inference
              infrastructure at scale. The buyer landscape can be segmented into three tiers based on scale and
              procurement sophistication.

              Tier 1 — Hyperscalers (AWS, Google, Microsoft Azure, Oracle Cloud): These companies deploy GPU clusters at
              massive scale for inference workloads supporting LLM APIs (GPT, Claude, Gemini, LLaMA-based products).
              They have the highest volume, most sophisticated procurement processes, and the greatest potential benefit
              from lower cost-per-token silicon. However, they also have the longest sales cycles, highest technical
              validation requirements, and significant existing NVIDIA ecosystem investments. Google and AWS already
              operate proprietary AI chips (TPU, Trainium/Inferentia), creating an internal competition for Etched's
              potential sales.

              Tier 2 — AI-native Companies (OpenAI, Anthropic, Cohere, Mistral AI, etc.): These companies run massive
              inference workloads for their commercial AI APIs. They are cost-sensitive, technically sophisticated
              buyers who would benefit significantly from lower inference cost. However, they often depend on NVIDIA GPU
              availability as a strategic fallback.

              Tier 3 — Inference-as-a-Service Providers (Together AI, Anyscale, Replicate, etc.): Smaller-scale
              inference platforms that could integrate Etched's chip into their infrastructure if the performance and
              cost-per-token economics are validated. These buyers have shorter sales cycles and greater willingness to
              experiment with alternative hardware.

              The adoption path requires Etched to: (1) complete chip tape-out and first silicon; (2) achieve software
              compatibility with leading model serving frameworks (vLLM, TensorRT-LLM, Hugging Face Transformers); (3)
              demonstrate cost-per-token economics that compellingly beat NVIDIA H100/H200; and (4) build or acquire the
              enterprise sales and support infrastructure to serve hyperscaler procurement teams.
