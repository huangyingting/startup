      - number: '2.5'
        title: Market Sizing Gaps and Contradictions
        blocks:
          - type: paragraph
            body: >
              The AI chip market is characterized by rapidly changing conditions, limited public data, and widely
              divergent analyst estimates. Several important gaps affect the quality of the market sizing analysis in
              this chapter.

              First, the Transformer-specific inference share of the total AI inference market is not well-documented in
              public industry research; most market sizing reports aggregate all inference compute together. Etched's
              addressable market is bounded by this share, but quantifying it precisely requires proprietary market data
              not available in public sources.

              Second, multiple market research firms (IDC, Gartner, Grand View Research, Markets and Markets) publish
              significantly different AI chip market size estimates, with 2023 figures ranging from $40B to $80B and
              2030 projections ranging from $200B to $900B. These discrepancies reflect different market boundary
              definitions, differing assumptions about GPU adoption rates, and different views on the
              training-to-inference ratio. The figures used in this chapter represent reasonable midpoints of publicly
              cited ranges and should be treated as order-of-magnitude estimates.

              Third, the inference market dynamics are evolving rapidly with model efficiency improvements
              (quantization, distillation, speculative decoding) potentially reducing per-query compute requirements —
              which would change the total compute spend trajectory. These efficiency gains represent both a risk (lower
              total market) and an opportunity (more efficient models might expand demand by making inference more
              affordable).
            claimRefs:
              - CM025
              - CM026
              - CM027
              - CM028
              - CM029
