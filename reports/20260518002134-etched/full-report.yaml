      - number: '1.5'
        title: Strategic Context and Competitive Position
        blocks:
          - type: paragraph
            body: >
              Etched's strategic bet is fundamentally an architecture-level bet: that Transformer neural networks will
              remain the dominant paradigm for AI for the next decade or more, and that this dominance will be durable
              enough to justify an ASIC designed exclusively for Transformer computation. The key risk is architectural
              obsolescence — if AI research produces a successor architecture (such as state space models, Mamba, or
              hybrid approaches) that achieves comparable or superior performance with different computational
              primitives, the Sohu chip's hardcoded Transformer logic could become obsolete before reaching commercial
              scale.

              NVIDIA dominates the AI accelerator market with its H100 and successor GPU products, backed by the CUDA
              software ecosystem, established supply chains, enterprise relationships, and thousands of engineer-years
              of software optimization. Competing against NVIDIA requires not just superior hardware performance but
              superior total-cost-of-ownership and ecosystem compatibility. Other pure-play AI chip startups — including
              Groq (LPU inference), Cerebras (wafer-scale ASIC), SambaNova (AI accelerator systems), Tenstorrent (RISC-V
              based AI chips), and Intel Gaudi — have all struggled to capture meaningful market share from NVIDIA
              despite years of effort.

              The competitive landscape makes Etched's position high-risk but potentially high-reward: if Transformer
              architectures prove durable and Etched executes on silicon production, the company could serve the
              enormous inference market at dramatically lower cost. The 25x performance claim, if validated, would
              represent a compelling economic advantage for hyperscalers spending hundreds of millions of dollars
              annually on inference compute. However, the unverified nature of these claims at this stage of development
              means investors and potential customers must rely primarily on technical thesis evaluation rather than
              empirical evidence.
