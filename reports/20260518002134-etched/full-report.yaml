  - id: FR003
    title: Technology transition risk diagram
    type: dag
    layout: wide
    summary: >-
      Directed acyclic graph showing how architectural displacement risk (Mamba/MoE adoption) flows through Sohu's value
      chain to revenue risk and funding outcomes.
    data:
      nodes:
        - id: mamba-adoption
          label: Mamba / SSM adoption surges
          detail: >-
            State-space models demonstrate production-scale performance at or above Transformer quality, reducing the
            share of inference workloads that are attention-compute-bound.
        - id: moe-diffusion
          label: MoE architecture becomes default
          detail: >-
            Mixture-of-Experts models (e.g. Mixtral) displace dense Transformer decoders as the dominant LLM
            architecture, changing the inference compute graph in ways Sohu cannot accelerate.
        - id: transformer-share-falls
          label: Transformer-only workloads decline
          detail: >-
            The fraction of total inference compute that is pure dense-Transformer decoder inference decreases as SSM
            and MoE models gain adoption.
        - id: sohu-tam-contracts
          label: Sohu addressable market shrinks
          detail: >-
            Sohu's performance advantage — derived entirely from hardcoded Transformer attention — applies to a
            shrinking share of the total inference market.
        - id: tape-out-committed
          label: Tape-out committed (irreversible)
          detail: >-
            Etched commits to tape-out NRE of $50–200M for the hardcoded Transformer architecture, locking in the
            silicon design with no software-layer recovery path.
        - id: redesign-required
          label: Full ASIC redesign required
          detail: >-
            If the Transformer paradigm shifts before revenue, Etched must scrap Sohu and begin a new ASIC design from
            RTL — a 3–4 year and $100–400M process.
        - id: revenue-risk
          label: Revenue risk materializes
          detail: >-
            Sohu's narrowing TAM combined with capital committed to a stranded architecture creates a scenario where the
            company cannot reach first revenue before runway exhaustion.
        - id: down-round-or-wind-down
          label: Down-round or company wind-down
          detail: >-
            Unable to raise Series B on prior terms with a stranded architecture and no revenue, Etched faces a
            down-round, wind-down, or distressed acquisition.
      edges:
        - from: mamba-adoption
          to: transformer-share-falls
          label: accelerates
        - from: moe-diffusion
          to: transformer-share-falls
          label: accelerates
        - from: transformer-share-falls
          to: sohu-tam-contracts
          label: reduces TAM
        - from: tape-out-committed
          to: redesign-required
          label: precludes recovery
        - from: sohu-tam-contracts
          to: revenue-risk
          label: triggers
        - from: redesign-required
          to: revenue-risk
          label: extends timeline 3–4 yrs
        - from: revenue-risk
          to: down-round-or-wind-down
          label: causes
    claimRefs:
