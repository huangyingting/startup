  - number: 6
    title: Customers
    sections:
      - number: '6.1'
        title: Customer Base Segmentation and Target Buyers
        blocks:
          - type: paragraph
            body: >
              Etched's Sohu chip targets the AI inference chip buyer, a narrow population of companies running
              Transformer-based large language models at a scale where GPU cost is a material operational expense. The
              primary buyer persona is the VP of Infrastructure or the Head of ML Platform at a company spending more
              than $50 million annually on GPU compute for Transformer inference. This profile describes approximately
              50-200 companies globally as of Q1 2026, concentrated in three tiers: (1) frontier AI labs such as OpenAI,
              Anthropic, and Mistral that run proprietary Transformer models at consumer web scale; (2) hyperscalers
              such as AWS, Google, and Microsoft that offer LLM inference APIs as a commercial product; and (3)
              inference-as-a-service platforms such as Together AI, Anyscale, and Perplexity AI that run open-source
              Transformer models for commercial developers.


              The segmentation is defined by the nature of the Transformer workload rather than by industry vertical.
              Any organization that runs autoregressive Transformer decoder inference at scale — whether it is an
              AI-native company, a hyperscaler offering LLM APIs, or a large enterprise with a proprietary model
              deployment — represents a potential Sohu customer. Organizations that run primarily Transformer encoder
              workloads (embedding, classification, BERT-class models) are a lower-priority segment because the
              attention-compute advantage of hardwired silicon is less pronounced for single-pass encoder inference than
              for autoregressive decoding.


              The geographic concentration of Etched's addressable buyer segment is heavily US-centric in the first
              wave: OpenAI, Anthropic, Together AI, Anyscale, Scale AI, and Perplexity are all US-headquartered
              companies. Cohere (Canada) and Mistral (France) represent the only tier-1 international prospects with
              publicly known inference scale. This concentration is advantageous from a sales-motion perspective — fewer
              accounts, geographically accessible — but creates risks if the US regulatory environment or export-control
              framework restricts chip supply relationships.
