      - number: '2.2'
        title: 'Market Sizing: TAM, SAM, and SOM'
        blocks:
          - type: paragraph
            body: >
              Sizing the AI chip market requires multiple lenses given the rapid and uncertain growth trajectory. Global
              AI chip market revenue was estimated at approximately $53 billion in 2023, with NVIDIA capturing the
              dominant share. Independent market research firms project compound annual growth rates of 30-40% through
              2030, which would put total AI chip market revenue in the $300-500 billion range by 2030, though such
              long-range projections carry wide uncertainty intervals.

              Within this total, the inference segment is gaining share relative to training. Several industry analyses
              suggest that inference will account for 50% or more of total AI compute spend by 2025-2027 as model
              training becomes more mature and inference demand grows with commercial deployment of LLMs. If the
              inference share reaches $150 billion by 2028-2030, and Transformer-based workloads represent 80-90% of
              inference (consistent with current model deployment patterns), the Transformer inference ASIC SAM would be
              in the $120-135 billion range — though Etched would capture only a fraction of this as a startup against
              incumbents.

              Etched's near-term SOM is considerably more constrained. In the first 2-3 years post-product launch, a
              realistic SOM would be cloud hyperscaler pilot programs and inference-as-a-service workloads where
              cost-per-token economics dominate the purchasing decision. If Etched captures just 0.1-1% of the $50-100
              billion inference market by 2027-2028, that represents $50M-$1B in revenue — a wide range that reflects
              the extreme uncertainty in the company's commercial trajectory at this stage.

              All sizing figures in this chapter are third-party estimated from industry analysis sources and carry
              material uncertainty; no official market research reports were accessible for this study.
