      - number: '1.4'
        title: Company Milestones and History
        blocks:
          - type: paragraph
            body: >
              Etched's public history is limited given the company is approximately two years old as of the research
              date. The company was founded in 2022 in Cupertino, California, with the mission of building specialized
              AI inference hardware. The founding period (2022-2023) was characterized by stealth development — Etched
              operated largely without public disclosure of its technology or funding status. The major inflection point
              was June 26, 2024, when the company simultaneously announced both its $120 million Series A funding and
              its Sohu chip with a detailed set of performance claims.

              The public announcement of Sohu marked Etched's first significant public disclosure, including claims of
              500,000 tokens per second throughput and 25x performance over NVIDIA H100 GPUs. The announcement generated
              substantial media attention across Bloomberg, Reuters, Wired, Fortune, and TechCrunch, as well as
              significant discussion in developer communities. Industry analysts noted both the ambition of the claims
              and the significant risks associated with betting exclusively on a single AI architecture.

              From the chip design perspective, the relevant milestones would include architecture design, RTL
              development, pre-silicon simulation, tape-out (first silicon), and eventual production. As of the research
              date, Etched has not publicly confirmed a tape-out or production timeline, representing a material gap in
              the company's public milestone disclosure. Post-Series A, the company is presumed to be in active chip
              development with available capital to fund the silicon cycle, though specific technical milestones remain
              undisclosed.
