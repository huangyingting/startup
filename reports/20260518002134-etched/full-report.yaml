  - number: 3
    title: Competitors
    sections:
      - number: '3.1'
        title: Competitive Landscape Overview
        blocks:
          - type: paragraph
            body: >
              Etched competes in the AI inference accelerator market, which is currently dominated by NVIDIA. The
              competitive landscape spans several distinct tiers: GPU incumbents (NVIDIA), hyperscaler internal programs
              (AWS Trainium/Inferentia, Google TPU, Microsoft Maia), purpose-built inference startups (Groq, Cerebras,
              SambaNova), AI chip generalists (AMD, Intel Gaudi), and Etched's unique sub-segment of Transformer-only
              ASICs. The status quo competitor in virtually every buyer's current stack is the NVIDIA H100 or H200 GPU
              cluster.


              Etched's differentiation strategy is architectural specialization: by hardcoding the Transformer attention
              mechanism into silicon, it claims 10× or greater throughput efficiency versus GPU-based inference. No
              other identified competitor has taken a similarly narrow architectural bet on Transformer-only execution.
              Groq uses LPUs (Language Processing Units) with a deterministic streaming architecture. Cerebras uses a
              wafer-scale processor. Graphcore uses IPUs (Intelligence Processing Units). All three are general-purpose
              AI accelerators; none is Transformer-only.


              The competitive risk is structural: NVIDIA's ecosystem moat (CUDA, NeMo, TensorRT, distribution) is the
              dominant switching barrier. Buyers evaluating Etched must overcome software integration costs, uncertainty
              about model compatibility, and absence of a production reference deployment. Etched's only durable
              counter-argument is cost-per-token economics at Transformer inference scale, which cannot be validated
              until production silicon is available.
