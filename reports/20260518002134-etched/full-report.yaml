      - number: '1.2'
        title: Founders and Leadership
        blocks:
          - type: paragraph
            body: >
              Etched was co-founded by Gavin Uberti (CEO) and Chris Zhu (CTO), with Robert Winslow also named as a
              co-founder in early press coverage. Gavin Uberti, who serves as Chief Executive Officer, was previously a
              researcher at Microsoft, bringing experience in AI systems and hardware acceleration to the role. His
              background in both AI research and engineering positions him as a founder-market-fit candidate for a
              deep-tech semiconductor startup. Chris Zhu serves as Chief Technology Officer and brings complementary
              technical expertise in hardware design and AI systems.

              The founding team is small and the company's leadership roster beyond the three co-founders has not been
              publicly disclosed. This creates meaningful key-person dependency — if any founder were to depart, the
              technical trajectory and investor confidence could be materially impacted. The board of directors and
              governance structure have not been publicly disclosed, which is typical for a private startup at this
              stage but represents a diligence gap. Etched has not reported any material leadership changes since
              founding as of the research date. The company's headcount has not been publicly disclosed; the team size
              is inferred to have grown post-Series A based on typical hiring patterns for well-funded semiconductor
              startups, but no specific numbers are available.

              The technical depth of the founding team is a meaningful asset: building a custom ASIC requires deep
              expertise in hardware design, chip architecture, EDA tools, and semiconductor manufacturing, and the
              founders' backgrounds suggest relevant capability, though independent verification of their specific chip
              design credentials has not been possible from public sources.
