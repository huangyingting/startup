chapters:
  - number: 1
    title: Company Overview
    sections:
      - number: '1.1'
        title: Company Identity and Mission
        blocks:
          - type: paragraph
            body: >
              Etched is a semiconductor startup headquartered in Cupertino, California, incorporated in 2022. The
              company's stated mission, as displayed on its official website, is "Building the hardware for
              superintelligence." Etched's core thesis is that the Transformer neural network architecture — the
              backbone of modern large language models including GPT-4, LLaMA, and Claude — will remain the dominant
              paradigm for AI for the foreseeable future, and that purpose-built silicon optimized exclusively for
              Transformer workloads can dramatically outperform general-purpose GPUs.

              The company's primary product is the Sohu chip, an application-specific integrated circuit (ASIC) designed
              from the ground up to accelerate Transformer inference. Unlike GPUs which are programmable general-purpose
              accelerators, Sohu hardcodes the Transformer computation graph into silicon, eliminating the overhead of
              programmability and achieving substantially higher throughput per watt. Etched has publicly claimed that a
              single Sohu chip can deliver approximately 500,000 tokens per second for Transformer inference workloads,
              compared to approximately 20,000 tokens per second for an NVIDIA H100 GPU — a claimed 25x advantage. These
              performance figures are company-claimed and have not been independently verified as of the research date.
              Etched operates as a fabless semiconductor company, meaning it designs chips but relies on third-party
              foundries (most likely TSMC) for fabrication.

              Etched's business model centers on selling Sohu chips to cloud hyperscalers, large enterprises, and AI
              inference service providers seeking to dramatically reduce the cost and latency of serving large
              Transformer-based models at scale. The company is currently pre-revenue and the Sohu chip is in
              development.
