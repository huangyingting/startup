      - number: '1.3'
        title: Funding History and Investors
        blocks:
          - type: paragraph
            body: >
              Etched completed a $120 million Series A funding round announced publicly on June 26, 2024, at a reported
              valuation of approximately $1 billion, making Etched a unicorn at Series A. The round was covered
              extensively by financial and technology media including Bloomberg, Reuters, TechCrunch, Wired, and
              Fortune. Primary Venture Partners was identified as a key investor, and Positive Sum was confirmed as a
              participating investor. The full investor syndicate composition and ownership percentages have not been
              publicly disclosed.

              The $120 million raise is substantial for a pre-revenue semiconductor startup, reflecting both the
              intensity of investor interest in AI infrastructure and the early-stage bets being placed on
              next-generation inference hardware. By comparison, other AI chip startups in recent years have raised
              comparable amounts: Groq has raised over $1 billion in aggregate over multiple rounds, and Cerebras
              Systems raised approximately $720 million total. Prior to the Series A, Etched's pre-seed and seed funding
              history has not been publicly disclosed. There is no public record of secondary share sales, debt
              financing, or convertible notes as of the research date.

              The $1 billion valuation at Series A is aggressive for a company that has not taped out a chip, does not
              have paying customers, and faces formidable competitors with established ecosystems. This valuation
              appears to be primarily an option on the thesis that Transformer architectures will dominate AI inference
              and that Etched can execute on chip production — an assessment that carries significant technical and
              market risk.
