            body: >
              Etched raised $120M in a Series A round in June 2024, with investors including Primary Venture Partners
              and Positive Sum. As of Q1 2026, the company has not announced subsequent fundraising. The $120M raise is
              the entirety of disclosed external funding. No debt facilities, project finance, or government grants have
              been publicly disclosed.


              Monthly burn for a semiconductor startup of Etched's stage is typically $3-8M/month, driven by: (1)
              engineering headcount (chip designers at $300-500K total compensation); (2) EDA software licensing
              ($5-10M/year); (3) wafer shuttle and mask set costs; and (4) operating expenses. At a $5M/month midpoint
              burn rate, $120M provides approximately 24 months of runway from close, suggesting runway into
              approximately H2 2026, aligned with expected tape-out completion timing.


              The critical capital milestone is production silicon availability. If tape-out completes on schedule, the
              company will need to raise a Series B (estimated $200-500M based on comparable semiconductor raises)
              before or immediately after first silicon, to fund volume production, customer ramp, and next-generation
              chip development. Failure to raise on schedule creates a material going-concern risk. The runway to first
