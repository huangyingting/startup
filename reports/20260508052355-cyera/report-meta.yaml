companyProfile:
  summary: Cyera is a New York-headquartered, Israeli-founded AI-native data security company founded in 2021 by Unit 8200 veterans Yotam Segev (CEO) and Tamar Bar-Ilan (CTO). The company has built an agentless, API-powered platform that discovers, classifies, and protects sensitive data across cloud, SaaS, on-premises, and AI environments. From a $500M Series B valuation in June 2023, Cyera has grown to a $9B Series D valuation by January 2025 after raising approximately $1.7B in total funding. ARR reached approximately $100M by Q4 2024, supported by ~800 employees across 10+ countries. Major customers include AT&T, Paramount Pictures, Mercury Financial, and Valvoline. In October 2024 Cyera acquired Trail Security for $162M, adding next-generation DLP to its DSPM platform. It is named a Gartner Customers' Choice and representative vendor in the 2025 Gartner Market Guide for DSPM.
  foundedDate: "2021-01-01"
  founders:
    - name: Yotam Segev
      role: CEO and Co-Founder
      background: Unit 8200 intelligence veteran; previously at Palo Alto Networks; responsible for Cyera's go-to-market, vision, and fundraising strategy.
      claimRefs: [CO002]
    - name: Tamar Bar-Ilan
      role: CTO and Co-Founder
      background: Unit 8200 intelligence veteran; architect of Cyera's agentless scanning and AI classification platform; drives product and engineering.
      claimRefs: [CO002]
  foundingLocation: New York, NY
  headquarters: "New York, NY (engineering center: Tel Aviv, Israel)"
  productSummary: Cyera's platform provides agentless, AI-powered data discovery and classification across 200+ cloud connectors (AWS, Azure, GCP, Snowflake, Databricks, and major SaaS applications). Core capabilities include automated sensitive data discovery, policy-based remediation, compliance reporting (GDPR, HIPAA, PCI-DSS), AI Security governance, and next-generation DLP via the Trail Security Omni DLP integration.
  customerFocus: Large enterprises (Fortune 500) in regulated industries including financial services, healthcare, media, retail, and technology. Primary buyers are CISOs, data security teams, and privacy/compliance officers.
  businessModel: SaaS subscription with volume-based pricing tied to data volume scanned and cloud environments covered. Enterprise multi-year contracts with seat/environment expansion upsell. AI security and DLP modules drive incremental ACV expansion.
  stage: late-stage private
  fundingStatus: Series D closed January 2025 at $9B post-money valuation; $300M raised in Series D. Total raised approximately $1.7B across Series A (2022), B (2023), C (April 2024), D (January 2025) and the Trail Security acquisition ($162M, October 2024).
  disclosureProfile: private-undisclosed
  claimRefs: [CO001, CO002, CO005, CO010, CO015]

