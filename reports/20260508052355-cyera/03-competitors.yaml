  evidenceGaps:
    - type: access-blocked
      severity: material
      topic: gartner-magic-quadrant-dspm
      missingEvidence: "Gartner Magic Quadrant or Forrester Wave for DSPM was not accessible without paywall, preventing independent analyst scoring of Cyera versus competitors."
      whyItMatters: "Magic Quadrant positioning provides the most credible independent competitive ranking; its absence requires reliance on vendor-authored comparison content that carries inherent bias."
      diligencePath: "Request Gartner MQ for DSPM from Cyera data room; consult Forrester Wave for cloud data security."
      relatedQuestionRefs: [QP023]

    - type: missing-source
      severity: medium
      topic: fedramp-market-exclusion-size
      missingEvidence: "No quantified estimate of the U.S. federal DSPM addressable market excluded by Cyera's absent FedRAMP authorization was accessible."
      whyItMatters: "FedRAMP gap materially constrains total addressable market; a $1-3B federal cloud security market is plausible but unquantified for the DSPM subset."
      diligencePath: "Request FedRAMP authorization timeline from Cyera management; estimate federal TAM from public federal IT spend reports."
      relatedQuestionRefs: [QP022]
      relatedTableRefs: [TP004]

    - type: enumeration-incomplete
      severity: low
      topic: competitor-pricing-acv-verification
      missingEvidence: "DSPM pricing ACV estimates ($200K–$500K+) are analyst-assessed approximations; no vendor has publicly confirmed ACV ranges, and Cyera has not disclosed average contract values."
      whyItMatters: "ACV data affects unit economics modeling, sales cycle efficiency assessment, and competitive pricing positioning."
      diligencePath: "Request average ACV, deal size distribution, and new logo contract data from Cyera CFO in data room."
      relatedTableRefs: [TP003]

    - type: private-evidence-only
      severity: medium
      topic: cyera-win-loss-data
      missingEvidence: "Cyera competitive win/loss rates against Wiz, BigID, Varonis, and Microsoft Purview are not publicly disclosed, preventing quantitative assessment of competitive position."
      whyItMatters: "Win/loss data reveals which competitors Cyera most frequently faces and where it loses, critical for assessing competitive moat durability."
      diligencePath: "Request competitive win/loss report from CRO or VP Sales in data room."
      relatedQuestionRefs: [QP008, QP017]

    - type: missing-source
      severity: low
      topic: on-premises-coverage-verification
      missingEvidence: "Varonis's claim that Cyera struggles with large on-premises data stores could not be independently verified through customer reference calls or technical evaluation; Cyera does not prominently feature on-premises coverage in its public materials."
      whyItMatters: "If the Varonis claim is accurate, hybrid enterprises with significant on-premises Windows data would have a genuine functional gap that could derail Cyera evaluations."
      diligencePath: "Request customer references at enterprises with significant on-premises NAS/Windows data; conduct POC including on-prem file server scan."
      relatedQuestionRefs: [QP008]
      relatedTableRefs: [TP002]
