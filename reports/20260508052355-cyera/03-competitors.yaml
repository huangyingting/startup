callouts:
  - calloutType: risk
    title: "CNAPP platform bundling is the primary competitive threat"
    body: |
      Wiz, Orca, and Palo Alto are bundling DSPM as a feature within broader CNAPP platforms, creating a
      scenario where enterprise buyers opt for 'good enough' DSPM at no incremental cost rather than a
      purpose-built solution. As Wiz's 4,000+ enterprise customer base renews platform contracts, DSPM
      adoption within that base is effectively free, reducing Cyera's addressable deal count.
    claimRefs: [CP019, CP020]

  - calloutType: strength
    title: "Gartner recognition and AI accuracy are durable near-term advantages"
    body: |
      Cyera's Customers' Choice status (4.7/5.0 on Gartner Peer Insights) and claimed 95%+ classification
      precision for 100+ sensitive data types are independently validated quality signals that give enterprise
      procurement teams third-party confidence. These signals create sales acceleration for security-led
      DSPM evaluations where accuracy and analyst endorsement are primary buying criteria.
    claimRefs: [CP026, CP014]

  - calloutType: insight
    title: "FedRAMP absence is a material addressable market constraint"
    body: |
      Cyera's absence from the FedRAMP marketplace excludes it from U.S. federal and DoD contracts, which
      represent a large, high-value buyer segment with growing cloud data security requirements. Competitors
      Palo Alto, Microsoft, and Wiz all hold FedRAMP authorizations. This gap limits Cyera's total addressable
      market and will become increasingly relevant as federal cloud adoption accelerates under zero-trust mandates.
    claimRefs: [CP022]

  - calloutType: assumption
    title: "Competitor capability claims are largely from vendor-authored content"
    body: |
      The feature matrix and competitive positions in this chapter rely heavily on vendor-authored comparison
      content (Varonis vs. Cyera, BigID alternatives article), which carries inherent bias. Independent
      third-party evaluations (Gartner Magic Quadrant, Forrester Wave) were paywalled. Customer reference
      calls and a formal POC are required to verify Varonis's specific criticism of Cyera's on-premises
      coverage and remediation depth.
    claimRefs: [CP008, CP009]

