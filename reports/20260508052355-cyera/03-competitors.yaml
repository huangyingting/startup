  claims:
    - id: CP001
      statement: "The DSPM competitive landscape bifurcates between pure-play vendors (Cyera, BigID, Varonis) competing on classification depth and platform vendors (Wiz, Orca, Palo Alto, Microsoft, Google) competing on bundled convenience within broader security platforms."
      type: observed
      topic: competitive-landscape-structure
      sourceRefs: [SP013, SP014, SP015]
      confidence: high
      freshness: current
      answersQuestionRefs: [QP001, QP002]

    - id: CP002
      statement: "Legacy DLP vendors (Symantec/Broadcom, Forcepoint, Trellix) represent the status quo that enterprise buyers are migrating away from, creating a replacement upgrade cycle rather than entirely new budget creation for DSPM platforms."
      type: inferred
      topic: competitive-landscape-structure
      sourceRefs: [SP015, SP014]
      confidence: medium
      freshness: current
      answersQuestionRefs: [QP001]

    - id: CP003
      statement: "Internal build is a viable competitive alternative for hyperscale technology companies, but requires significant engineering investment and ongoing maintenance, making purpose-built DSPM platforms economically superior for most enterprise buyers."
      type: inferred
      topic: competitive-landscape-structure
      sourceRefs: [SP007, SP006]
      confidence: medium
      freshness: current
      answersQuestionRefs: [QP003]

    - id: CP004
      statement: "BigID, founded 2016, has raised approximately $400 million and positions its platform as a unified data intelligence solution spanning security, privacy, and governance — deliberately broader in scope than Cyera's security-first DSPM focus."
      type: third-party-reported
      topic: bigid-profile
      sourceRefs: [SP001, SP009, SP011]
      confidence: medium
      freshness: current
      answersQuestionRefs: [QP004]

    - id: CP005
      statement: "Varonis Systems (NASDAQ: VRNS) reported $619 million in ARR for 2024, making it the most financially mature pure-play data security vendor and providing a real-world monetization benchmark; Varonis's core strength is deep file-level analytics for on-premises Windows and NAS environments."
      type: third-party-reported
      topic: varonis-profile
      sourceRefs: [SP002, SP010, SP014]
      confidence: high
      freshness: current
      answersQuestionRefs: [QP005]

    - id: CP006
      statement: "Wiz, valued at approximately $16 billion as of 2025 and having raised $1.9 billion, is the dominant CNAPP vendor with 4,000+ enterprise customers; Wiz launched DSPM capability (Wiz for Data) and competes with Cyera primarily through its installed base distribution advantage."
      type: third-party-reported
      topic: wiz-profile
      sourceRefs: [SP005, SP021]
      confidence: high
      freshness: current
      answersQuestionRefs: [QP006]

    - id: CP007
      statement: "Rubrik, which completed a $752M IPO on the NYSE in April 2024 at a ~$5.6B valuation, focuses on cyber resilience (backup/recovery + security) and competes with Cyera at the edges of data security posture for cloud workloads, though its core market is data resilience rather than DSPM."
      type: third-party-reported
      topic: rubrik-profile
      sourceRefs: [SP004, SP020]
      confidence: medium
      freshness: current
      answersQuestionRefs: [QP007]

    - id: CP008
      statement: "Varonis publicly argues in comparison content that Cyera 'struggles to scan large data stores' and 'can't remediate issues without third-party integrations,' positioning Varonis as stronger for hybrid security programs with significant on-premises data estates."
