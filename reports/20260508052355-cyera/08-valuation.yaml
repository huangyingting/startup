callouts:
  - calloutType: recommendation
    title: "Investment Recommendation: Conditional Hold / Monitor"
    body: "Conditional Hold / Monitor — DSPM category leadership is compelling but the $9B entry price leaves no margin of safety. Series D investors require a hyper-bull outcome to achieve positive returns. Seek secondary market entry at $5.4–6.3B or wait for IPO roadshow disclosures that confirm $200M+ ARR and audited NRR above 125%."
    claimRefs: [CV021, CV034, CV035]

  - calloutType: risk
    title: "Valuation Compression is Primary Downside Risk"
    body: "At 45–90x current ARR, the entry multiple exceeds every public cybersecurity comparable. A single miss — NRR deterioration, competitive bundling announcement, IPO market closure — would compress the multiple to 6–10x on a smaller revenue base than the bull model requires, resulting in a permanent capital loss for Series D investors."
    claimRefs: [CV022, CV023, CV030]

  - calloutType: insight
    title: "Trail Security DLP Option Value May Swing Bull vs Base"
    body: "The Trail Security acquisition creates an option value in DLP+DSPM convergence that existing valuations do not fully reflect. If Trail's Omni DLP achieves enterprise-grade GA by Q3 2025 and Cyera can demonstrate a DSPM+DLP co-sell motion that increases average deal size by 30–40%, the platform ARR trajectory could support the $9B valuation — making the diligence question about Trail integration completeness a potential swing factor."
    claimRefs: [CV020, CV032]

  - calloutType: assumption
    title: "ARR Definition Must Be Confirmed Before Co-Investment"
    body: "This analysis assumes Cyera's reported $100M ARR figure (Q4 2024) is accurate and annualized ARR (not cumulative billing). If ARR is defined as total contracted value rather than annualized recurring revenue, the implied valuation multiple would be higher and the return math even more challenging. Audited revenue schedule verification is required before any co-investment decision."
    claimRefs: [CV019, CV034]

