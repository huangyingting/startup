  evidenceGaps:
    - type: private-evidence-only
      severity: material
      topic: exact-ARR-and-revenue
      missingEvidence: Cyera has not publicly confirmed its ARR, total revenue, or audited financial statements.
      whyItMatters: >-
        Without confirmed ARR, the $9B valuation (~90x estimated ARR) cannot be independently verified, and burn rate
        assessment is impossible.
      diligencePath: >-
        Request data room access or audited financials; cross-check with investor materials from Accel or Sapphire
        Ventures.
      relatedQuestionRefs:
        - QO011
        - QO017
    - type: missing-source
      severity: minor
      topic: exact-founding-date
      missingEvidence: No public source has confirmed a specific month or day for Cyera's founding in 2021.
      whyItMatters: Relevant for precise milestone dating; minor impact on diligence.
      diligencePath: Request founding documents or incorporation filings.
      relatedQuestionRefs:
        - QO001
    - type: missing-source
      severity: material
      topic: AT&T-commercial-relationship
      missingEvidence: >-
        AT&T Ventures is a strategic investor (Series C), but it is unclear whether AT&T is also a paying enterprise
        customer.
      whyItMatters: >-
        Strategic investor / customer overlap is a key diligence question for revenue quality and conflict-of-interest
        assessment.
      diligencePath: Request confirmation from Cyera of any commercial agreements with AT&T; review investor rights agreement.
      relatedQuestionRefs:
        - QO021
    - type: private-evidence-only
      severity: material
      topic: seed-series-a-details
      missingEvidence: >-
        Funding amount, valuation, and investor list for Cyera's Seed / Series A rounds (pre-Series B) are not publicly
        disclosed.
      whyItMatters: Affects full cap table understanding and early dilution picture.
      diligencePath: Request cap table from company; review any Delaware filing data.
      relatedQuestionRefs:
        - QO008
    - type: missing-source
      severity: minor
      topic: blackstone-series-f-closing-confirmation
      missingEvidence: >-
        The Times of Israel Series F article states it is 'raising' (not yet closed) as of December 2025; closing
        confirmation has not been found.
      whyItMatters: If the round did not close as expected, the $9B valuation and $1.7B total raised may not be final.
      diligencePath: Verify closing through company PR, SEC Form D filing, or direct confirmation.
      relatedQuestionRefs:
        - QO009
        - QO025
    - type: missing-source
      severity: minor
      topic: named-customer-base-completeness
      missingEvidence: >-
        Only a handful of named enterprise customers have been publicly cited (Paramount, Mercury Financial, AT&T,
        Valvoline). Full customer list, customer count, and any NPS data are undisclosed.
      whyItMatters: >-
        Customer concentration risk and quality of revenue validation require a broader named-customer set than is
        publicly available at this stage.
      diligencePath: Request customer list, NPS/CSAT data, and expansion/renewal rates in data room.
      relatedQuestionRefs:
        - QO013
      relatedTableRefs:
        - TO002
    - type: private-evidence-only
      severity: minor
      topic: full-cap-table-and-ownership-splits
      missingEvidence: >-
        Post-money ownership percentages for any investor in Cyera's cap table are not publicly disclosed. TO003 shows
        investor roles and estimated economic importance but not actual ownership stakes.
      whyItMatters: >-
        Understanding investor control, anti-dilution rights, and founder dilution requires a full cap table that is
        only available under NDA.
      diligencePath: Request full cap table and investor rights agreements from company or legal counsel.
      relatedQuestionRefs:
        - QO008
      relatedTableRefs:
        - TO003
    - type: private-evidence-only
      severity: minor
      topic: governance-events-and-minor-milestones
      missingEvidence: >-
        The milestone table (TO004) is based on publicly announced events; internal governance decisions, product
        launches not covered by press, and early fundraising details are not captured.
      whyItMatters: >-
        A complete milestone picture is needed for a full company history and to assess founder-to-institutional
        investor power transitions.
      diligencePath: Request board minutes summaries and internal milestone list from management team.
      relatedQuestionRefs:
        - QO021
      relatedTableRefs:
        - TO004
