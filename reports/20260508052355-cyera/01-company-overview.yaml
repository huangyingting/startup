company:
  name: Cyera
chapter:
  number: 1
  title: Company Overview
  summary: |
    Cyera is a New York-headquartered, Israeli-founded AI-native data security company founded in 2021 by
    Unit 8200 veterans Yotam Segev (CEO) and Tamar Bar-Ilan (CTO). The company has built an agentless,
    AI-powered platform that discovers, classifies, and protects sensitive data across cloud, SaaS, on-premises,
    and AI environments. From a $500M Series B valuation in June 2023, Cyera has grown to a $9B valuation by
    December 2025 after raising approximately $1.7B in total funding. ARR reached approximately $100M by
    mid-2025, supported by ~800 employees across 10+ countries. Major customers include AT&T, Paramount
    Pictures, Mercury Financial, and Valvoline. In October 2024 Cyera acquired Trail Security for $162M,
    adding next-generation DLP to its DSPM platform. It is named a Gartner Customers' Choice and representative
    vendor in the 2025 Gartner Market Guide for DSPM.
sections:
  - id: S01
    title: Identity, Mission, and Business Model
    body: |
      Cyera was founded in 2021 in New York with development operations anchored in Tel Aviv, Israel. The company
      operates as a pure-play data security vendor, offering an AI-native platform that gives enterprises a unified
      view of where their sensitive data lives, how it is accessed, and how to remediate exposure risk. The mission
      is to enable every organization to safely harness the power of data by eliminating the blind spots that allow
      breaches, regulatory violations, and AI-driven data leakage to occur.

      The business model is enterprise software-as-a-service (SaaS), with subscription revenue tied to data-volume
      scanned and the number of environments connected. Cyera's platform is agentless, deploying in under one day
      without requiring software installation in customer environments. Core capabilities include Data Security
      Posture Management (DSPM), AI-powered data classification, Data Loss Prevention (DLP via Omni DLP, built
      on the October 2024 Trail Security acquisition), identity and access governance, and AI security for generative
      AI systems. By June 2025 the company reported approximately $100M in ARR, a roughly 353% increase in Fortune
      500 client count since the start of 2023, and operations in more than 10 countries.
    claimRefs:
      - CO001
      - CO002
      - CO003
      - CO004
    figureRefs:
      - FO003
  - id: S02
    title: Founders, Leadership, and Governance
    body: |
      Cyera was founded by Yotam Segev (CEO) and Tamar Bar-Ilan (CTO), who met during service in the Israel
      Defense Force's elite Talpiot program. Both subsequently built and ran the cloud security division of
      Unit 8200, the IDF's signals intelligence and cyber unit. After completing service, they interviewed more
      than 100 CISOs, uncovering a consistent gap: enterprises could not answer basic questions about where their
      most sensitive data resided or who could access it. This interview-driven insight became Cyera's founding
      thesis. A third co-founder, Yonatan Itai, serves as VP of R&D.

      The senior leadership team includes Brandon Sweeney (President), Jason Clark (Chief Strategy Officer),
      Lamont Orange (Chief Information Security Officer), Steve Rog (Chief Revenue Officer), Joseph Iantosca
      (Chief Financial Officer), Shira Azran (Chief Legal Officer), Sharon Shaked (Chief People Officer), and
      Aygun Suleymanova (Chief Marketing Officer). The board includes Doug Leone (Sequoia Capital, emeritus
      partner) and Frank Slootman (former CEO of Snowflake, joined the board in 2025), adding significant
      enterprise software scale and GTM experience to the company's governance.

      Key-person concentration remains a material dependency: Segev and Bar-Ilan are the primary public faces
      and technical visionaries. The company has proactively reduced single-person dependency by building a
      large executive team, but the founding pair's Unit 8200 background and IDF network are integral to
      recruiting top talent from Israel's cyber ecosystem.
    claimRefs:
      - CO005
      - CO006
      - CO007
      - CO008
      - CO009
    tableRefs:
      - TO002
  - id: S03
    title: Funding History and Investors
    body: |
      Cyera has executed one of the fastest valuation escalations in the global cybersecurity sector, growing
      from a $500M Series B valuation in June 2023 to a $9B Series F valuation in December 2025 — an 18×
      increase in approximately 30 months. Total funding reached approximately $1.7B by December 2025.

      The Series B ($100M, $500M valuation, June 2023) was backed by Accel, Sequoia, Redpoint, and Cyberstarts.
      The Series C ($300M, $1.4B valuation, April 2024) was led by Coatue, with new investors Spark Capital,
      Georgian, and strategic backer AT&T Ventures, along with continued participation from Accel, Sequoia,
      Redpoint, and Cyberstarts. The Series D ($300M, $3B valuation, November 2024) was co-led by Accel and
      Sapphire Ventures, with Sequoia, Redpoint, Coatue, and Georgian also participating. Six months later, the
      Series E ($540M, $6B valuation, June 2025) was led by Georgian, Greenoaks, and Lightspeed Venture Partners,
      joined by existing investors. The Series F ($400M, $9B valuation, December 2025) was led by Blackstone,
      marking a notable entry of a large alternative asset manager into Cyera's cap table. The company also
      executed a strategic tuck-in acquisition in October 2024, purchasing Trail Security — a next-generation DLP
      startup whose founders came through the IDF's Talpiot program — for $162M.
    claimRefs:
      - CO010
      - CO011
      - CO012
      - CO013
      - CO014
      - CO015
    tableRefs:
      - TO003
      - TO004
    figureRefs:
      - FO001
  - id: S04
    title: Scale, Operations, and Market Position
    body: |
      As of mid-2025, Cyera employs approximately 800 people, a tripling of its workforce in under 12 months.
      The company operates primarily from its New York headquarters and Tel Aviv development center, with
      customer-facing teams in more than 10 countries. Revenue is undisclosed for most periods, but ARR was
      estimated at approximately $100M in mid-2025 per Globes reporting based on market estimates.

      Cyera serves customers across financial services, telecommunications, media, healthcare, and technology
      verticals. Named customers include Paramount Pictures, Mercury Financial, Valvoline, and AT&T (which is
      also a strategic investor through AT&T Ventures). The company has cited 353% growth in Fortune 500 client
      count since the beginning of 2023 and operates a multi-cloud architecture capable of scanning 74 petabytes
      of data in seven days with claimed 95%+ classification precision.

      The company is positioned as the leader in Data Security Posture Management and is expanding into DLP,
      AI security governance, and identity data access governance. Gartner named Cyera a representative vendor
      in its 2025 Market Guide for DSPM and a Customers' Choice in its Peer Insights "Voice of the Customer"
      report for DSPM. Cyera also integrates with major enterprise security ecosystems including Microsoft
      Sentinel, ServiceNow, and Okta.
    claimRefs:
      - CO016
      - CO017
      - CO018
      - CO019
      - CO020
    tableRefs:
      - TO001
    figureRefs:
      - FO002
  - id: S05
    title: Key Milestones and Adverse Events
    body: |
      Cyera's trajectory has been marked by rapid product expansion, aggressive M&A, and several potential
      risk indicators. The Trail Security acquisition accelerated its DLP roadmap but also added integration
      execution risk and $162M of deployed capital. The company has grown headcount by approximately 3× in
      under a year (as of mid-2025), a pace that introduces organizational complexity and potential culture
      dilution. No material lawsuits, regulatory actions, or data breaches have been publicly reported against
      Cyera as of May 2026.

      Competitive pressure is intensifying: Varonis has publicly challenged Cyera's depth, stating that "Cyera
      is a discovery tool" that "struggles to scan large data stores" and "can't remediate issues without
      third-party integrations." BigID, Rubrik/Laminar, Wiz, and Microsoft Purview are all competing for DSPM
      budget. The company has not disclosed FedRAMP authorization status, which could limit its penetration into
      US federal markets where competitors like Varonis hold FedRAMP High authorization.

      Despite rapid valuation growth, no independent audited financials have been disclosed, making it difficult
      to verify ARR claims or assess burn rate. The Blackstone-led Series F at $9B valuation implies a high
      ARR multiple (~90× estimated ARR) consistent with other fast-growing cybersecurity platforms but raising
      valuation sustainability questions if growth slows.
    claimRefs:
      - CO021
      - CO022
      - CO023
      - CO024
      - CO025
