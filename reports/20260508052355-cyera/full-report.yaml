  - number: 7
    title: Risks
    sections:
      - number: '7.1'
        title: Regulatory and Legal Risk Assessment
        blocks:
          - type: paragraph
            body: |
              Cyera operates in a regulatory environment that is simultaneously its largest demand driver and its
              largest compliance constraint. The company processes metadata about sensitive enterprise data across
              GDPR, CCPA, HIPAA, PCI DSS, and EU AI Act regulatory jurisdictions. As a cloud security vendor
              that accesses enterprise cloud environments via read-only API, Cyera's own regulatory obligations as
              a data processor are significant: any breach of Cyera's internal systems could expose the metadata
              maps of thousands of enterprise customers' sensitive data — which is itself highly sensitive, even
              if no actual customer data is stored.

              GDPR imposes 72-hour breach notification requirements on Cyera as a data processor for EU customers.
              A security incident at Cyera's infrastructure would require rapid customer notification, regulators,
              and potentially media disclosure — a reputational risk that is asymmetric: the company's core value
              proposition is data security, making any vendor-side breach especially damaging to customer trust.

              EU AI Act enforcement beginning August 2026 creates potential product architecture requirements for
              Cyera's AI Security module: if the module is categorized as a high-risk AI system under the Act's
              classification rules, Cyera would need to implement EU AI Act conformity assessments, technical
              documentation, and human oversight mechanisms. The classification of DSPM AI tools under the Act
              is not yet settled, creating regulatory uncertainty. U.S. state privacy laws (California, Virginia,
              Colorado, Texas) are expanding, potentially requiring product customization for state-specific
              compliance reporting — a fragmentation risk for the compliance reporting module.
            claimRefs:
              - CR001
              - CR002
              - CR003
              - CR004
      - number: '7.2'
        title: Operational, Quality, and Security Risk Assessment
        blocks:
          - type: paragraph
            body: |
              Cyera's core operational risks are architectural: its reliance on cloud provider APIs and the
              read-only access model creates dependencies on hyperscaler API stability, permission model changes,
              and API rate limits that are entirely outside Cyera's control. If AWS, Azure, or GCP modifies
              authentication or permissions APIs (as happens with regular product updates), Cyera's scanning
              coverage could become incomplete or interrupted — requiring rapid engineering response that may
              delay risk posture accuracy for affected customers.

              Trail Security integration creates concentrated near-term operational risk. Integrating an acquired
              DLP codebase into a GA DSPM platform requires bidirectional data model alignment, performance
              testing at scale, and customer migration from Trail's native UI to Cyera's unified interface.
              Integration delays would leave Cyera's DSPM+DLP competitive claim unsupported by production-quality
              unified functionality — creating sales friction in competitive evaluations versus Varonis (native DLP)
              and Microsoft (bundled DLP).

              Security risk for a DSPM vendor is existential: Cyera's platform holds access to customer cloud
              environments via API credentials and OAuth tokens. If Cyera's credential management, API key storage,
              or OAuth refresh token handling contains vulnerabilities, a breach could give attackers read access
              to enterprise cloud environments globally. Cyera holds SOC 2 Type II, but SOC 2 does not provide
              guaranteed protection against sophisticated nation-state attackers who specifically target cloud
              security vendors — a known threat category (e.g., SolarWinds, Okta supply chain incidents).
            claimRefs:
              - CR005
              - CR006
              - CR007
              - CR008
              - CR009
      - number: '7.3'
        title: Partner and Dependency Risk Assessment
        blocks:
          - type: paragraph
            body: |
              Cyera's most concentrated external dependency is its cloud infrastructure hosting on AWS. AWS's
              99.99% SLA covers most operational availability scenarios, but Cyera's customers are directly impacted
              by AWS regional outages during active data classification scans. Historical AWS outages (us-east-1
              and eu-west-1 have experienced significant outages) would interrupt Cyera's scanning operations and
              risk posture freshness for affected customers. Multi-region AWS architecture mitigates this risk but
              does not eliminate it.

              Hyperscaler API dependency is the most structurally significant long-term partner risk. If a major
              cloud provider (particularly AWS, given Cyera's primary customer concentration) restricts third-party
              API data access for competitive reasons — as has occurred in adjacent markets — it could materially
              limit Cyera's coverage breadth. This risk is mitigated by antitrust scrutiny of hyperscaler competitive
              behavior and by the multi-cloud architecture of most enterprise customers, but cannot be fully
              eliminated.

              Key integration partners (CrowdStrike, Okta, Microsoft Sentinel) represent enabling dependencies:
              if these vendors change their API contracts, deprecate connectors, or shift their integration
              ecosystem policies, Cyera's workflow integrations could break or require significant re-engineering.
              CrowdStrike's own competitive ambitions (Falcon Data Protection) create a specific risk: CrowdStrike
              may eventually compete directly with Cyera in the DSPM space, turning a distribution partner into
              a competitive threat.
            claimRefs:
              - CR010
              - CR011
              - CR012
              - CR013
      - number: '7.4'
        title: People, Execution, and Geopolitical Risk Assessment
        blocks:
          - type: paragraph
            body: |
              Cyera's Israeli engineering concentration creates a material geopolitical risk that is not typical
              for U.S.-headquartered cybersecurity companies. The October 7, 2023 Hamas attack on Israel followed
              by the Gaza conflict created significant disruption for Israeli technology companies: reserve duty
              call-ups removed key engineers from product development for weeks to months, and the security
              environment in Israel increased employee stress and distraction. Cyera explicitly navigated this period
              and continued fundraising (Series F, December 2025), but the risk of future military escalation
              disrupting Tel Aviv-based R&D remains elevated relative to a purely domestic U.S. engineering team.

              Leadership depth risk: Cyera's founding team from Israeli intelligence community (Unit 8200 background)
              is technically exceptional, but the company's CEO, CTO, and CPO concentration in the founding pair
              creates key-person dependency at the executive level. Departure or incapacitation of founder leadership
              prior to IPO would require significant investor-managed transition, a risk that is common at this stage
              but requires succession planning.

              Hiring velocity risk: The Tel Aviv cybersecurity talent market is competitive and increasingly
              expensive, with hyperscalers (Microsoft, AWS, Google) and other Israeli unicorns competing for the
              same Unit 8200 graduate talent pool. Cyera's ability to maintain engineering velocity as it scales
              from 800 to 1,500+ employees (likely pre-IPO target) depends on continued ability to attract and
              retain top-tier Israeli cyber engineers in an increasingly competitive talent environment.
            claimRefs:
              - CR014
              - CR015
              - CR016
              - CR017
      - number: '7.5'
        title: Kill Criteria and Risk Mitigation Assessment
        blocks:
          - type: paragraph
            body: |
              The most critical kill criterion for Cyera's category thesis is CNAPP market share: if Wiz, Palo Alto,
              and Orca collectively capture more than 60% of new enterprise DSPM deployments by 2027 via bundled
              platform economics, the standalone DSPM addressable market may shrink to a size that does not support
              a $27B+ exit. This metric should be tracked quarterly through analyst surveys (Gartner, Forrester) and
              competitive win/loss data.

              A secondary kill criterion is Microsoft Purview AI classification parity: if Microsoft achieves
              comparable AI classification accuracy to Cyera within Microsoft 365 and Azure environments by 2026–2027,
              Cyera's accuracy advantage in the largest single enterprise cloud environment (Microsoft is 80%+
              enterprise deployment coverage) could erode, undermining the core technical differentiation for the
              largest market segment.

              Mitigations in place: Cyera's $9B valuation at Series F and its $700M+ estimated cash position provide
              significant runway to execute through competitive pressure. The AI Security module and Omni DLP
              integration expand Cyera beyond pure DSPM into a broader platform, creating a revenue base that is
              less susceptible to DSPM commoditization. The Gartner Customers' Choice status and 4.7/5.0 rating
              provide ongoing sales credibility that is difficult to replicate quickly. The founding team's Unit 8200
              background creates a technical credibility halo with enterprise CISO buyers that is not easily
              displaced by platform bundling from IT-oriented vendors.
            claimRefs:
              - CR018
              - CR019
              - CR020
              - CR021
              - CR022
      - number: '7.6'
        title: Exhibits
        blocks:
          - type: callout
            title: CNAPP bundling is the highest-probability category-level risk
            body: |
              The bundling of DSPM as a feature within Wiz, Palo Alto Prisma Cloud, and Orca's CNAPP platforms at
              no incremental cost is not a speculative future risk — it is happening now. Wiz's 4,000+ enterprise
              customers can evaluate Wiz for Data without a separate procurement process. If Wiz's DSPM module
              achieves 70–80% feature parity with Cyera's accuracy within 24 months, the standalone DSPM value
              proposition materially narrows to the 20–30% of enterprises with the most complex multi-cloud data
              estates and strictest accuracy requirements.
            calloutType: risk
            claimRefs:
              - CR018
              - CR019
          - type: callout
            title: Israeli R&D concentration is a geopolitical risk not present in comparable U.S. companies
            body: |
              Cyera's primary engineering team in Tel Aviv creates a geopolitical dependency that is unique among
              comparable U.S.-listed cybersecurity companies. The October 2023 conflict demonstrated that Israeli
              technology company operations are vulnerable to military call-up disruptions; a future escalation
              could simultaneously remove 20–30% of Cyera's engineering capacity for months. This risk is real,
              ongoing, and cannot be fully mitigated without significant investment in non-Israeli engineering
              redundancy.
            calloutType: risk
            claimRefs:
              - CR014
              - CR015
          - type: callout
            title: Verify Trail Security integration completeness before attributing DSPM+DLP competitive advantage
            body: |
              Cyera's DSPM+DLP competitive positioning is contingent on the Trail Security Omni DLP integration
              achieving production quality. Before treating this as a confirmed competitive moat, diligence should
              include: (1) a technical POC specifically testing Omni DLP enforcement scenarios, (2) reference calls
              with customers who have deployed the combined DSPM+DLP module, and (3) engineering architecture review
              of the integration in the data room. Do not accept company marketing claims about integration maturity
              without independent technical verification.
            calloutType: recommendation
            claimRefs:
              - CR006
              - CR022
          - type: callout
            title: Cyera's $700M+ cash position is the most significant risk mitigation available
            body: |
              With an estimated $700M+ in cash post-Series F, Cyera can sustain current burn for 4–7 years and
              invest aggressively in FedRAMP authorization, international engineering redundancy, and AI Security
              module expansion simultaneously. This capital position converts several medium-risk items (FedRAMP,
              APAC expansion, hiring velocity) from urgent threats into manageable investment decisions — a
              structural advantage over less-capitalized DSPM competitors who must prioritize more aggressively.
            calloutType: insight
            claimRefs:
              - CR020
              - CR021
