      Market cap and ARR data sourced from Yahoo Finance (finance.yahoo.com), Stock Analysis (stockanalysis.com), and
      PitchBook (pitchbook.com). Sources: SV002 (PANW), SV003 (CRWD), SV004 (ZS), SV005 (VRNS), SV006 (PANW financials),
      SV007 (CRWD financials), SV008 (ZS financials), SV009 (VRNS financials), SV010 (PitchBook private comparable
      data).
    claimRefs:
      - CV003
      - CV004
      - CV009
      - CV010
      - CV012
  - id: TV005
    title: Thesis-Break and Kill Triggers
    columns:
      - Trigger
      - Threshold
      - Transmission to Thesis
      - Action Implication
    rows:
      - - Palo Alto DSPM native launch
        - Prisma Cloud DSPM feature at RSA 2026 with cloud-scanning parity
        - Eliminates core differentiation for ~30% of Cyera TAM (PANW-installed base)
        - Reduce exposure; accelerate timeline to secondary sale
      - - NRR decline below 110%
        - Two consecutive quarters of reported NRR < 110%
        - Growth model breaks; 90x ARR multiple requires 130%+ NRR to sustain
        - Trigger thesis-break review; request CFO cohort data call
      - - Material security breach
        - Any publicly disclosed breach involving customer credential access or sensitive data exfiltration
        - Trust destruction in DSPM category; likely 30–50% immediate ARR churn
        - Full exit or secondary hedge at any available price
      - - IPO window closure
        - 12+ months without viable IPO path in public market
        - Acquisition exit becomes primary option; strategic buyers likely discount to $4–6B
        - Negotiate bridge at flat valuation; monitor strategic M&A conversations
      - - ARR growth below 50% YoY
        - FY2026 ARR growth below 50% (below $150M threshold)
        - At below-50% growth, public market multiples compress to 6–8x; $9B entry unrecoverable
        - Thesis failure; exit via secondary at available price
    enumerationScope:
      coverage: exhaustive
      basis: >-
        Five trigger conditions covering competitive, financial, operational, and market-access risks that would break
        the Series D thesis; each has a clear threshold and required action.
  - id: TV006
    title: Final Diligence Asks
    columns:
      - Topic
      - Missing Evidence
      - Why It Matters
      - Owner / Diligence Path
    rows:
      - - ARR and NRR schedule
        - Audited quarterly ARR by cohort, including NRR by vintage year
        - 'Core model assumption: 130% NRR is unaudited; cohort erosion would break the bull case entirely'
        - 'CFO: request data room access to audited revenue schedule and cohort retention table'
      - - SOC 2 Type II scope
        - Full audit report with system boundary, control exceptions, and qualified opinions
        - Regulatory buyers require unqualified SOC 2 Type II; scope gaps create legal liability at point of sale
        - 'CISO/CTO: request full SOC 2 Type II report with AWS/Azure/GCP scope coverage details'
      - - FedRAMP authorization timeline
        - Formal FedRAMP authorization plan with target authorization date and sponsoring agency
        - Without FedRAMP, federal civilian and DoD market ($3–4B TAM segment) is closed to Cyera
        - 'VP Federal Sales/GC: request FedRAMP project plan and sponsoring agency MOU'
      - - Trail Security DLP integration completeness
        - Technical milestone completion report and GA readiness date for Omni DLP integration
        - >-
          DLP+DSPM platform narrative drives Series D premium; if integration is pre-GA, the platform claim is
          marketing-ahead-of-product
        - 'CTO: request integration roadmap and POC acceptance test results from 3+ enterprise customers'
      - - Liquidation preference waterfall
        - Series A–D preference stack, ESOP pool, and fully-diluted cap table with conversion terms
        - >-
          Series D return math requires understanding liquidation preferences vs participation; may eliminate common
          returns entirely
        - 'General Counsel: request fully-diluted cap table, liquidation preference schedule, and ESOP overhang analysis'
      - - Customer concentration
        - ARR breakdown by top-10 and top-20 customers; sector concentration table
        - If top-5 customers represent 40%+ ARR, single-customer churn creates material NRR volatility
        - 'CFO: request customer concentration table; probe public disclosure plans for customer identity'
    enumerationScope:
      coverage: exhaustive
      basis: >-
        Six final diligence topics are the minimum required before co-investing at the $9B Series D valuation; each
        represents information asymmetry that directly affects the return model.
