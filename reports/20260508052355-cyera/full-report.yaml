        Four scenario bands from hyper-bull to bear; probabilities calibrated against Cyera's current ARR trajectory,
        competitive dynamics, and comparable hyperscale cybersecurity IPO outcomes.
  - id: TV004
    title: Comparable Valuation Table
    columns:
      - Comparable
      - ARR / Revenue
      - EV or Valuation
      - NTM Revenue Multiple
      - Relevance to Cyera
      - Key Limitation
    rows:
      - - Palo Alto Networks (PANW)
        - $9.2B ARR (FY2025E)
        - ~$120B market cap
        - 8–9x NTM revenue
        - Platform SASE/CNAPP leader; Prisma overlaps with DSPM
        - 10x larger, diversified; DSPM is a minor feature, not the core revenue driver
      - - CrowdStrike (CRWD)
        - $4.2B ARR (FY2025E)
        - ~$85B market cap
        - 14–17x NTM revenue
        - Best hyperscale SaaS cybersecurity growth comparable
        - No direct DSPM product; data protection is endpoint-centric, not cloud-data-centric
      - - Zscaler (ZS)
        - $2.6B ARR (FY2025E)
        - ~$30B market cap
        - 9–11x NTM revenue
        - Cloud-native SaaS security architecture comparable
        - Network/proxy security; DSPM is not a product area; different buyer (network vs data team)
      - - Varonis (VRNS)
        - $650M ARR (FY2024)
        - ~$4B market cap
        - 5–7x NTM revenue
        - Closest DSPM comparable; on-premises architecture
        - On-premises vs cloud-native; Varonis multiple depressed by slower growth and higher churn vs Cyera
      - - Wiz (private)
        - $500M ARR (est. Dec 2024)
        - $12B valuation (Series E)
        - ~24x ARR (implied)
        - Cloud security pure-play unicorn with adjacent CSPM/CNAPP
        - CSPM/CNAPP focus; DSPM is secondary; no public filing for direct comp
      - - Lacework (private, distressed)
        - ~$150M ARR (est.)
        - Acquired at ~$1.5B (2024)
        - ~10x ARR at exit
        - CNAPP peer that failed to achieve hyperscale; cautionary comparable
        - Different product focus and failure mode; highlights risk of multiple compression without profitable scale
    enumerationScope:
      coverage: partial
      basis: >-
        Six comparables spanning closest DSPM peers (Varonis), cloud security peers (Palo Alto, CrowdStrike, Zscaler,
        Wiz), and a cautionary comparable (Lacework). Private ARR figures are analyst and press estimates, not audited.
