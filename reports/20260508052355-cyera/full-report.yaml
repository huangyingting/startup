  - number: 6
    title: Customers
    sections:
      - number: '6.1'
        title: Customer Segmentation and Ideal Customer Profile
        blocks:
          - type: paragraph
            body: |
              Cyera's ideal customer profile (ICP) centers on CISO-led buying organizations at enterprises with
              $500M–$10B+ revenue, multi-cloud architectures, and significant compliance obligations. The CISO
              (or VP of Security) is typically the economic buyer, with involvement from cloud security engineers,
              data governance teams, and compliance/GRC officers as key influencers. Deal size and urgency are
              highest in regulated industries — financial services (FFIEC, PCI DSS), healthcare (HIPAA, HITECH),
              retail (PCI DSS, CCPA), and technology (SOC 2, GDPR) — where regulatory penalties for data security
              failures are quantified and career-ending for CISOs who fail audits.

              Industry verticals served, per TrustRadius and G2 customer review data, include financial services,
              healthcare providers, manufacturing, retail, and technology providers. G2 reviews show enterprise
              buyers (>1,000 employees) as the primary segment, with financial services reviewers among the most
              active. The customer base is geographically concentrated in North America and Europe, consistent
              with Cyera's U.S. headquarters and Tel Aviv R&D center distribution.

              Mid-market buyers (100–999 employees) are underserved relative to enterprise; Cyera's pricing and
              sales motion (no self-serve trial, demo-first model) suggest mid-market is not a current ICP focus.
              MSSP-assisted mid-market reach represents an emerging channel opportunity. Public sector and federal
              government are excluded by FedRAMP absence, representing a structural addressable market constraint
              that limits Cyera's domestic public sector revenue opportunity.
            claimRefs:
              - CU001
              - CU002
              - CU003
              - CU004
      - number: '6.2'
        title: Customer Growth and Adoption Trajectory
        blocks:
          - type: paragraph
            body: |
              Cyera's customer growth trajectory must be inferred from financing pace, headcount growth, and
              analyst review volume rather than disclosed customer counts. Gartner Peer Insights shows 130+
              enterprise reviews — an unusually high review volume for a four-year-old security startup, suggesting
              sustained customer addition velocity. G2 shows 9 reviews and a separate integration-focused rating
              set (13 ratings), with enterprise (>1,000 employee) reviewers dominating the active buyer profile.

              Headcount growth from approximately 200 employees at Series C (October 2023) to 800+ at the Series F
              (December 2025) is the most direct indicator of customer growth pace: sales, customer success, and
              solutions engineering headcount typically tracks revenue growth in enterprise SaaS. A 4x headcount
              increase in 26 months in the revenue-generating functions (estimated 150–200 of 800 total) suggests
              active customer addition velocity at scale.

              Geographic expansion is ongoing: Cyera opened European offices and offers EU data residency, indicating
              that EMEA enterprise customers are a growing portion of the base. The company's GDPR compliance
              infrastructure and EU-hosted deployment option support European enterprise onboarding. Asia-Pacific
              coverage appears limited based on available public signals, though no formal APAC market entry
              announcement has been confirmed. Customer growth in 2024–2025 is the critical period corresponding
              to the valuation step-up from $1.4B to $9B, implying that revenue acceleration was concentrated in
              this period.
            claimRefs:
              - CU005
              - CU006
              - CU007
              - CU008
      - number: '6.3'
        title: Named Customer Proof and Reference Quality
        blocks:
          - type: paragraph
            body: |
              Cyera has not disclosed a public customer list, but several named or identifiable customer references
              appear across review platforms and press coverage. G2 reviews include an identified financial services
              enterprise reviewer, an enterprise reviewer who described on-premises NAS integration alongside cloud
              scanning, and a reviewer using Cyera with Qualys (suggesting mid-to-large enterprise security stack
              integration). TrustRadius confirms coverage across financial services, healthcare, manufacturing, retail,
              and technology verticals without naming specific companies.

              The Gartner Customers' Choice designation requires a minimum number of enterprise reviews and a minimum
              rating, providing the strongest validated customer proof: 130+ enterprise reviews with 4.7/5.0 rating
              implies that a significant number of enterprise organizations have deployed Cyera in production and
              evaluated its quality post-deployment. The Gartner review corpus is managed against conflicts of interest
              and carries more independent validation weight than vendor-curated case studies.

              Key adverse customer signals from review platforms: (1) a G2 reviewer noted that DLP capabilities were
              immature at the time of review, expressing hope for comprehensive agent-based DLP — this was pre-Trail
              Security integration and may be resolved by Omni DLP; (2) another G2 reviewer cited technology maturity
              concerns for legacy system integration; (3) platform lag and occasional downtime were noted across
              multiple reviewers. These are normal growth-stage product criticisms rather than fundamental product
              failures, but they confirm that deployment experience is not uniformly smooth.
            claimRefs:
              - CU009
              - CU010
              - CU011
              - CU012
              - CU013
      - number: '6.4'
        title: Customer Retention and Satisfaction Assessment
        blocks:
          - type: paragraph
            body: |
              Cyera's customer retention is not publicly disclosed. NRR inferred from comparable platforms and
              product characteristics suggests 110–130% NRR, driven primarily by data volume growth expanding the
              billable footprint and module add-on opportunities (Omni DLP, AI Security module). Customer satisfaction
              scores on Gartner Peer Insights (4.7/5.0) and TrustRadius suggest high deployment satisfaction for
              the customers who complete reviews, though review platform respondents are biased toward satisfied
              customers.

              Recurrent satisfaction themes from customer reviews include: consistent praise for data discovery
              accuracy (finding data "we didn't know we had"), dashboard usability, and fast time-to-value. Critical
              themes include concerns about DLP maturity (pre-Trail), platform stability (lag/downtime), and
              complexity for legacy system integration. The overall sentiment pattern is consistent with a product
              that delivers strong core DSPM value but whose breadth (DLP, AI security, on-premises coverage) is
              maturing rapidly following acquisitions and feature investments.

              A meaningful proxy for retention quality is the renewal urgency created by compliance cycles:
              organizations using Cyera for PCI DSS, HIPAA, or GDPR annual certification processes face significant
              operational disruption if they switch providers mid-cycle. This compliance lock-in mechanism provides
              natural retention pressure beyond product quality, supporting higher NRR than product satisfaction
              scores alone would imply.
            claimRefs:
              - CU014
              - CU015
              - CU016
              - CU017
      - number: '6.5'
        title: Expansion Revenue and Concentration Risk
        blocks:
          - type: paragraph
            body: |
              Cyera's customer expansion revenue opportunity is driven by three mechanisms: (1) data volume growth —
              as customer data estates grow, billable scanning volume expands without new sales effort; (2) module
              add-ons — installed base customers can add Omni DLP and AI Security modules as incremental subscriptions;
              and (3) environment expansion — customers who start with AWS-only coverage often expand to Azure, GCP,
              and SaaS connectors over 12-24 months. This expansion dynamic supports the 110–130% NRR estimate.

              Concentration risk is the most significant unknown customer metric. Because Cyera has not disclosed
              customer counts, the revenue distribution among customers is opaque. At an estimated $100–250M ARR,
              if customer count is in the range of 200–400 enterprises, the top 10 accounts likely represent 20–35%
              of revenue — acceptable concentration for enterprise SaaS at this stage. However, if customer count
              is lower (50–100), top-10 concentration could exceed 50%, which would be a material risk for IPO
              investors.

              The most adverse customer-related risk is customer churn in the 2021–2023 cohorts — the earliest
              customers who adopted Cyera when the product was early-stage and before the Trail Security DLP and AI
              Security modules. These customers had the least complete product and the highest likelihood of
              experiencing capability gaps. Whether these cohorts renewed and expanded or churned is unknowable from
              public sources but is the critical historical retention question for a due diligence data room review.
            claimRefs:
              - CU018
              - CU019
              - CU020
              - CU021
      - number: '6.6'
        title: Exhibits
        blocks:
          - type: callout
            title: 130+ Gartner Peer Insights reviews are the strongest independent customer proof signal
            body: |
              Gartner Peer Insights uses verification mechanisms including professional email validation, conflict-of-
              interest screening, and employer verification. The 130+ enterprise reviews for Cyera with 4.7/5.0 rating
              represent a statistically significant sample of real-world enterprise deployments, making it the most
              credible available customer proof signal. This review corpus reduces the risk that the company's customer
              base is shallow or that satisfaction is artificially high.
            calloutType: strength
            claimRefs:
              - CU009
              - CU014
          - type: callout
            title: Customer count opacity creates concentration and churn risk that is unmeasurable from public sources
            body: |
              Cyera's failure to disclose customer count means that revenue concentration, early cohort churn, and
              module attach rates are entirely opaque from outside the company. At the $9B valuation, investors and
              acquirers need confirmed customer-level financial metrics to validate that the revenue base is broad and
              defensible. This is the most actionable customer-chapter diligence gap.
            calloutType: risk
            claimRefs:
              - CU019
              - CU020
              - CU021
          - type: callout
            title: Pre-Trail DLP immaturity and platform stability concerns from customer reviews
            body: >
              Multiple G2 reviewers cited DLP capability immaturity and platform stability (lag, downtime) as specific

              concerns. While Trail Security's Omni DLP acquisition may have addressed the DLP gap, platform stability

              issues are operational quality problems independent of feature breadth. These reviewer criticisms
              represent

              the most credible adverse customer evidence available and should be investigated through customer
              reference

              calls before relying on Cyera's claimed satisfaction metrics.
            calloutType: risk
            claimRefs:
              - CU012
              - CU013
          - type: callout
            title: Compliance renewal cycles provide structural retention that supplements product satisfaction
            body: |
              Organizations using Cyera for PCI DSS, HIPAA, or GDPR annual certification face meaningful operational
              disruption if they switch mid-cycle. Compliance workflows built around Cyera's classification output —
              audit reports, evidence packages, remediation queues — create switching cost lock-in that supplements
              product satisfaction as a retention driver, likely supporting NRR above 110% even among moderately
              satisfied customers.
            calloutType: insight
            claimRefs:
