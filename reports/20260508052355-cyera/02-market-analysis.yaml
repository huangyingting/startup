callouts:
  - calloutType: strength
    title: "Multi-layer regulatory tailwind makes DSPM non-discretionary"
    body: |
      GDPR (€4B+ cumulative fines), CCPA, HIPAA, EU AI Act, and SEC disclosure rules form a durable
      multi-jurisdiction compliance stack that makes automated data classification and posture management
      operationally mandatory for regulated enterprises — not a discretionary security upgrade. This
      regulatory overlay insulates core DSPM demand from budget freezes affecting lower-priority security
      categories.
    claimRefs: [CM009, CM010, CM011, CM012, CM023]

  - calloutType: risk
    title: "Hyperscaler bundling constrains TAM and pricing power"
    body: |
      AWS Macie, Microsoft Purview, and Google Cloud DLP provide native data-security capabilities bundled
      with cloud subscriptions at minimal incremental cost. For organizations with a single primary cloud
      provider and moderate compliance requirements, these tools may satisfy basic DSPM needs without standalone
      vendor spend, effectively reducing Cyera's addressable market and limiting pricing leverage in less
      sophisticated or less multi-cloud buyer segments.
    claimRefs: [CM030, CM018]

  - calloutType: insight
    title: "GenAI creates net-new DSPM demand not captured in original market sizing"
    body: |
      Enterprise generative AI deployments are generating massive volumes of unstructured training and retrieval
      datasets that require classification, provenance tracking, and EU AI Act compliance review. This use case
      was not contemplated in DSPM market sizing models from 2022–2023, making current TAM estimates likely
      conservative for the 2026–2028 period when GenAI governance obligations mature.
    claimRefs: [CM012, CM022, CM031]

  - calloutType: assumption
    title: "Market size estimates lack audited primary-source report"
    body: |
      The $4–6B DSPM TAM and 25–30% CAGR figures are synthesized from analyst commentary, vendor communications,
      and market analogues (Varonis ARR, IBM breach data). No single audited IDC or Forrester primary market
      report was accessible without paywall. Actual market size may vary materially depending on how DSPM
      boundaries are drawn relative to DLP and CNAPP.
    claimRefs: [CM005, CM021]

