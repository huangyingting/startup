      topic: adoption-rate
      sourceRefs: [SM021, SM019]
      confidence: medium
      freshness: current
      answersQuestionRefs: [QM007]

    - id: CM007
      statement: "The primary buyer persona for DSPM is the CISO, frequently co-sponsored by the Chief Data Officer or VP-level compliance leaders in financial services, healthcare, and technology verticals, with Legal and Procurement increasingly co-sponsoring for third-party risk validation."
