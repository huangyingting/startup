  claims:
    - id: CM001
      statement: "Data Security Posture Management (DSPM) is a cloud security discipline that automatically discovers, classifies, and continuously monitors sensitive data across cloud environments to identify and remediate data exposure risks without requiring agents or pre-existing data classification."
      type: third-party-reported
      topic: dspm-category-definition
      sourceRefs: [SM001, SM002, SM004]
      confidence: high
      freshness: current
      answersQuestionRefs: [QM001, QM002]

    - id: CM002
      statement: "Gartner formally defined DSPM as a market category in 2022 via its Hype Cycle for Data Security, and by 2025 published a Market Guide for DSPM naming at least eight representative vendors including Cyera."
      type: third-party-reported
      topic: dspm-category-definition
      sourceRefs: [SM020, SM022]
      confidence: high
      freshness: current
      answersQuestionRefs: [QM001]

    - id: CM003
      statement: "IBM Security's 2024 Cost of a Data Breach Report found the global average data breach cost reached $4.88 million — a record high and 10% increase over 2023 — with AI-augmented security teams saving an average $2.2 million per breach versus peers."
      type: third-party-reported
      topic: breach-cost-roi
      sourceRefs: [SM007, SM008]
      confidence: high
      freshness: current
      answersQuestionRefs: [QM003]

    - id: CM004
      statement: "Cloud infrastructure proliferation creates massive data visibility gaps: enterprises run hundreds of cloud data stores across AWS, Azure, GCP, and SaaS platforms with unclassified sensitive data, which legacy DLP tools lack the architecture to address at cloud scale."
      type: inferred
      topic: cloud-data-sprawl
      sourceRefs: [SM001, SM002, SM016]
      confidence: medium
      freshness: current
      answersQuestionRefs: [QM004]

    - id: CM005
      statement: "The DSPM market is projected to grow at approximately 25–30% CAGR through 2028, with total addressable market estimates for the narrow DSPM category ranging from $4–6 billion by 2027 and the broader cloud data security TAM at $15–20 billion by 2028."
      type: estimated
      topic: market-sizing
      sourceRefs: [SM007, SM025, SM009]
      confidence: medium
      freshness: current
      answersQuestionRefs: [QM005, QM006]

