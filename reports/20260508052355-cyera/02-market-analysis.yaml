  evidenceGaps:
    - type: missing-source
      severity: material
      topic: primary-source-dspm-market-sizing
      missingEvidence: "No audited primary-source DSPM TAM/SAM figures from IDC, Forrester, or Gartner primary reports were accessible without paywall. All market size estimates are synthesized from analyst commentary, vendor communications, and analogues."
      whyItMatters: "Market sizing credibility affects investment thesis confidence and management's total market narrative at Series F stage."
      diligencePath: "Request Gartner Market Guide for DSPM primary document from company data room; cross-check with IDC cybersecurity spend tracker."
      relatedQuestionRefs: [QM005, QM006]
      relatedTableRefs: [TM002]

    - type: enumeration-incomplete
      severity: low
      topic: vertical-buyer-segment-revenue-sizing
      missingEvidence: "Buyer segment revenue breakdown by vertical is absent; all segment characterization is qualitative assessment rather than primary survey data with quantified segment sizes."
      whyItMatters: "Segment revenue data is needed to assess market concentration risk and which vertical is most critical to near-term growth."
      diligencePath: "Request Cyera customer segment breakdown from sales team; request CRM pipeline data by vertical in data room."
      relatedTableRefs: [TM003]

    - type: enumeration-incomplete
      severity: low
      topic: growth-constraints-quantification
      missingEvidence: "Growth driver and constraint impact levels are qualitatively assessed; no quantified market share data per competitor or detailed procurement cycle length data from primary surveys is available."
      whyItMatters: "Quantified constraint data would allow more precise estimation of effective market velocity and competitor win rates."
      diligencePath: "Request Cyera competitive win/loss data and average sales cycle length from CRO in data room."
      relatedTableRefs: [TM004]

    - type: private-evidence-only
      severity: medium
      topic: cyera-customer-segment-breakdown
      missingEvidence: "Cyera does not publicly disclose customer count by vertical, segment revenue concentration, or NPS/CSAT metrics. The buyer map relies on a small number of publicly named customers and Gartner Peer Insights data."
      whyItMatters: "Buyer segment concentration risk requires knowledge of whether 2–3 verticals represent 70%+ of ARR or if the portfolio is diversified."
      diligencePath: "Request customer segment breakdown, ARR by vertical, and churn/renewal data in data room."
      relatedQuestionRefs: [QM005, QM007]

    - type: stale
      severity: low
      topic: market-sizing-currency
      missingEvidence: "Market sizing estimates were synthesized as of May 2026 run date; post-2025 analyst reports on DSPM market dynamics were not yet available, making the outer year (2027–2028) estimates the least reliable."
      whyItMatters: "Bull-case GenAI demand scenarios may already be partially reflected in updated market sizing from 2026 reports."
      diligencePath: "Re-run market sizing check against Gartner 2026 Magic Quadrant for DSPM when published."
      relatedQuestionRefs: [QM006]
