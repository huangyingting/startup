callouts:
  - calloutType: strength
    title: "Agentless architecture and sub-1-day deployment are genuine enterprise adoption accelerators"
    body: |
      Cyera's read-only API connector model eliminates the primary friction point in enterprise data security
      deployments — software installation, agent management, and change control approval cycles. Sub-1-day
      time-to-value versus weeks/months for legacy DLP agents is a material procurement and adoption advantage
      that Gartner customer reviews consistently cite as the primary reason for choosing Cyera over alternatives.
    claimRefs: [CE001, CE002, CE013]

  - calloutType: risk
    title: "Omni DLP integration completeness is an open technical risk"
    body: |
      The Trail Security acquisition-based Omni DLP module requires deep bidirectional integration with
      Cyera's classification layer to deliver the promised unified DSPM+DLP experience. Integration of
      acquired codebases into production SaaS platforms frequently introduces technical debt, API incompatibilities,
      and performance regressions. The completeness and quality of this integration has not been independently
      verified and represents a key due diligence item for technical evaluators.
    claimRefs: [CE019, CE021]

  - calloutType: insight
    title: "AI Security module positions Cyera at the highest-growth intersection of data security and AI governance"
    body: |
      The AI Security module addresses a problem that enterprises are only beginning to solve: how to govern
      sensitive data flowing through GenAI training pipelines, RAG architectures, and AI assistant tools.
      This is a first-mover positioning opportunity: no major DSPM vendor has a compelling AI governance
      module, and the EU AI Act (enforcement August 2026) creates regulatory demand for exactly this
      capability. If Cyera executes well, AI Security could become as large as the core DSPM module within
      2–3 years.
    claimRefs: [CE007, CE008, CE017]

  - calloutType: risk
    title: "On-premises coverage gap is a structural architectural limitation for hybrid enterprises"
    body: |
      Cyera's cloud-native agentless architecture is fundamentally less suited to on-premises file server
      scanning than Varonis's native Windows/NAS integration. For enterprises with significant on-premises
      data estates — typical in financial services and manufacturing — this creates a coverage gap that
      requires either Cyera on-prem agent deployment (adding complexity) or a hybrid Varonis+Cyera strategy.
      The adversarial competitor claim about scale limitations for large on-prem stores deserves technical
      evaluation, not dismissal.
    claimRefs: [CE020, CE016]

