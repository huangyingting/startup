company:
  name: Cyera
chapter:
  number: 5
  title: Product and Technology Assessment
  summary: |
    Cyera's core product is an AI-powered agentless data security platform built natively for cloud
    environments. Its architecture relies on read-only API integrations with cloud providers (AWS, Azure,
    GCP), SaaS platforms (Microsoft 365, Google Workspace, Salesforce, Snowflake, Databricks), and
    on-premises connectors for hybrid environments. The AI classification engine processes discovered data
    against 100+ sensitive data type policies with claimed 95%+ precision using a combination of supervised
    ML, NLP, and LLM-based classification approaches. The platform spans four product modules: DSPM
    (discovery, classification, risk posture), Omni DLP (data loss prevention enforcement, from Trail
    Security acquisition), AI Security (generative AI data governance), and integrations. Key technical
    differentiators are the agentless deployment model (sub-1-day), cross-cloud data context correlation,
    and AI-native classification accuracy. Technology risks include scale limitations for very large on-premises
    file stores (per competitor claims), dependency on hyperscaler API availability and permissions models,
    and the integration of Trail Security's codebase into a unified platform architecture. The product
    is GA-quality with Gartner Customers' Choice recognition validating real-world enterprise deployability.

sections:
  - id: SE001
    title: Platform Architecture and Data Discovery Engine
    body: |
      Cyera's platform is architected around a cloud-native agentless data discovery engine that connects to
      enterprise data environments via read-only API and OAuth-based authorizations — never requiring agents,
      proxies, or network traffic redirection. This architectural choice is fundamental to the company's
      deployment speed (sub-1-day) and enterprise security team appeal: no agents means no attack surface
      expansion, no endpoint software management, and no performance impact on production workloads.

      The discovery engine performs three primary operations: first, it enumerates all data stores and assets
      across connected cloud environments (S3 buckets, RDS databases, Azure Blob Storage, GCP BigQuery,
      Snowflake tables, Databricks notebooks, M365 SharePoint/Teams); second, it samples and scans data store
      contents to identify sensitive data types using the AI classification engine; third, it maps data
      lineage, access permissions, and user/group access patterns to generate the risk posture assessment.

      The platform connects to 100+ data store types across structured (databases, data warehouses), semi-
      structured (JSON, CSV files in object storage), and unstructured (documents, email, collaboration
      content) formats. Integration with SaaS platforms for unstructured data — Microsoft 365, Google
      Workspace, Salesforce, Slack — significantly expands coverage beyond infrastructure-layer data
      stores, addressing the "shadow data" problem where sensitive information proliferates in email
      attachments and collaboration tools beyond traditional perimeter controls.
    claimRefs: [CE001, CE002, CE003, CE004]
    tableRefs: [TE001]
    figureRefs: [FE001]

  - id: SE002
    title: AI Classification Engine and Technical Differentiation
    body: |
      Cyera's AI classification engine is positioned as the company's core technical differentiation.
      The engine classifies discovered data against 100+ sensitive data type policies spanning PII
      (names, SSN, passport numbers, dates of birth), financial data (card numbers, account numbers,
      bank codes), health data (PHI under HIPAA, diagnosis codes), credentials (API keys, passwords,
      tokens), intellectual property (source code, trade secrets), and AI training data. The company
      claims 95%+ precision for classification across these categories, with accuracy improving
      as new enterprise deployments add to the proprietary model training dataset.

      The classification methodology combines multiple AI approaches: supervised machine learning models
      trained on labeled enterprise data (a significant competitive moat given the proprietary training
      dataset), natural language processing for contextual classification of unstructured text, regular
      expression-based pattern matching for structured data types (SSN format, credit card Luhn), and
      large language model (LLM) assistance for ambiguous or complex classification tasks.

      The AI Security module, launched in 2024, extends classification specifically to generative AI
      risk scenarios: identifying enterprise data used in AI model training, data flowing through RAG
      (retrieval-augmented generation) pipelines, and sensitive data exposed to AI assistant tools
      (Copilot, ChatGPT Enterprise). This module addresses a rapidly growing enterprise security concern
      and positions Cyera at the intersection of data security and AI governance, a strategically
      important positioning given the accelerating enterprise AI adoption trend.
    claimRefs: [CE005, CE006, CE007, CE008]
    tableRefs: [TE002]
    figureRefs: [FE002]

  - id: SE003
    title: Product Modules and Workflow Coverage
    body: |
      Cyera's product is organized into four primary modules, with the Omni DLP module added via the
      2024 Trail Security acquisition. The core DSPM module handles data discovery, classification, risk
      prioritization, and posture recommendations. Risk prioritization uses a combination of data sensitivity
      score, exposure level (who has access, is it over-privileged), and regulatory compliance context to
      generate a risk-ranked remediation queue for security teams.

      The Omni DLP module adds active data enforcement capabilities: policy-based controls that prevent
      unauthorized data movement, exfiltration monitoring across email and collaboration channels, and
      incident response workflow integration with SIEM platforms. This positions Cyera as a unified
      DSPM+DLP solution rather than a pure discovery-and-reporting tool, significantly expanding its
      addressable use case versus standalone DSPM-only platforms.

      Workflow integration is a key product capability. Cyera integrates with the core security operations
      stack — Microsoft Sentinel (SIEM), ServiceNow (ITSM/ticketing), Okta (identity), CrowdStrike (EDR),
      AWS Security Hub, and Jira (project management) — enabling automated remediation ticket creation,
      SOAR playbook triggering, and identity-aware risk attribution. These integrations make Cyera's risk
      output actionable within existing workflows rather than requiring security teams to manage a
      separate remediation process, which is critical for enterprise adoption at scale.
    claimRefs: [CE009, CE010, CE011, CE012]
    tableRefs: [TE003]
    figureRefs: [FE003]

  - id: SE004
    title: Trust, Compliance, and Security Architecture
    body: |
      Cyera's trust and compliance posture is critical for enterprise security buyers who evaluate vendor
      security posture as a buying criterion. The platform holds SOC 2 Type II certification, ISO 27001
      certification, and GDPR/CCPA data processing compliance documentation. The company operates a
      responsible disclosure program and publishes a security trust center with architectural diagrams
      showing data access scope (read-only API, no data movement from customer environments).

      The read-only architectural model is a trust enabler: because Cyera never moves or copies sensitive
      customer data out of the customer's environment, the security posture evaluation framework differs
      materially from solutions that require data egress for scanning. This is a meaningful competitive
      advantage with security-conscious enterprise buyers who scrutinize vendor data access models.

      The notable trust gap is the absence of FedRAMP authorization, which prevents deployment in U.S.
      federal and DoD environments. FedRAMP requires extensive NIST 800-53 controls documentation and
      third-party assessment; the timeline to achieve FedRAMP Moderate authorization from initial
      application is typically 12–18 months. Cyera has not publicly announced FedRAMP pursuit, suggesting
      federal market entry is not an immediate roadmap priority. SOC 2 Type II is confirmed; HITRUST CSF
      certification, which is valued in healthcare buyer evaluations, has not been publicly confirmed.
    claimRefs: [CE013, CE014, CE015, CE016]
    tableRefs: [TE004]
    figureRefs: []

  - id: SE005
    title: Technology Roadmap and Development Trajectory
    body: |
      Cyera's product roadmap signals continued expansion across three vectors: (1) deeper platform integrations
      with AI development toolchains (Hugging Face, Vertex AI, Azure OpenAI Service) to extend AI Security
      governance coverage; (2) expanded SaaS data store coverage to address shadow data in collaboration
      platforms (Zoom, Notion, Box); and (3) international expansion of data residency options to serve
      European and APAC enterprise customers under local data sovereignty requirements.

      The Trail Security acquisition represents the company's most significant inorganic product development,
      adding enforcement capabilities to a previously discovery-and-reporting focused platform. The integration
      of Trail's Omni DLP with Cyera's discovery layer is technically complex: mapping Trail's enforcement
      policies to Cyera's data classification taxonomy requires bidirectional data context passing that
      traditional siloed DLP products do not support. The success of this integration is a key product
      development milestone for 2025–2026.

      Technical limitations and open development questions include: (1) scale handling for very large data
      estates (petabyte-scale object storage with billions of objects) — competitor criticism suggests this
      may be an engineering bottleneck; (2) on-premises file server coverage depth — Cyera's cloud-native
      architecture makes NAS/Windows file server scanning architecturally more complex than cloud API scanning;
      (3) real-time event stream monitoring (not just periodic scan-based discovery) for continuous compliance
      monitoring use cases; and (4) multi-tenancy support for MSSP managed service deployments requiring
      customer isolation at the data classification layer.
    claimRefs: [CE017, CE018, CE019, CE020, CE021]
    tableRefs: [TE005]
    figureRefs: [FE004]

