  evidenceGaps:
    - type: private-evidence-only
      severity: high
      topic: on-premises-scale-limitation
      missingEvidence: "Varonis's public claim that Cyera struggles with large on-premises data stores could not be independently verified through technical evaluation or POC. The agentless API model is architecturally less suited to on-premises NAS scanning than native agents."
      whyItMatters: "If the limitation is real, hybrid enterprises with significant Windows/NAS data estates have a functional coverage gap that would prevent full data security posture visibility — the core value proposition."
      diligencePath: "Conduct POC with 10M+ file on-premises NAS store; request customer reference calls specifically at hybrid enterprises with large on-premises data estates."
      relatedQuestionRefs: [QE012, QE013]
      relatedTableRefs: [TE003, TE005]

    - type: private-evidence-only
      severity: high
      topic: trail-integration-completeness
      missingEvidence: "The technical completeness and production quality of the Trail Security DLP integration into the Cyera classification platform was not independently verifiable from public sources."
      whyItMatters: "If the integration is incomplete, Cyera's DSPM+DLP positioning is premature and customers may experience functionality gaps in the Omni DLP module."
      diligencePath: "Request Trail Security Omni DLP technical architecture documentation; conduct DLP-specific POC; interview Trail Security engineers post-acquisition."
      relatedQuestionRefs: [QE016]
      relatedTableRefs: [TE005]

    - type: access-blocked
      severity: medium
      topic: fedramp-timeline
      missingEvidence: "Cyera has not publicly announced FedRAMP pursuit; no FedRAMP authorization timeline is available."
      whyItMatters: "Federal market entry timeline determines TAM expansion speed; absence of public FedRAMP announcement suggests no near-term federal market strategy."
      diligencePath: "Request FedRAMP roadmap from Cyera engineering leadership; assess whether 3PAO engagement has begun."
      relatedQuestionRefs: [QE011]
      relatedTableRefs: [TE004]

    - type: missing-source
      severity: medium
      topic: real-time-monitoring-capability
      missingEvidence: "Whether Cyera supports real-time event streaming for continuous data access monitoring (vs. periodic scan cycles) was not confirmed from public sources."
      whyItMatters: "Periodic scan cycles mean risk posture is accurate at scan time but may lag real-time access changes; real-time monitoring is increasingly expected for modern DSPM deployments."
      diligencePath: "Request technical documentation on scan cadence, event-driven scanning triggers, and near-real-time access monitoring capabilities."
      relatedQuestionRefs: [QE021]
      relatedTableRefs: [TE003]

    - type: missing-source
      severity: low
      topic: classification-accuracy-independent-verification
      missingEvidence: "Cyera's 95%+ classification precision claim is company-asserted; no independent third-party benchmarking or technical audit of classification accuracy was accessible. ML engineer staffing and model retraining cadence are also not publicly disclosed."
      whyItMatters: "Classification accuracy is Cyera's primary technical differentiation; if actual precision is materially lower (e.g., 80–85%), the competitive moat against ML-improving competitors narrows significantly."
      diligencePath: "Request classification accuracy benchmarking data (precision/recall by data type) from Cyera engineering; conduct independent test with sample enterprise data of known types."
      relatedQuestionRefs: [QE005, QE023, QE025]
