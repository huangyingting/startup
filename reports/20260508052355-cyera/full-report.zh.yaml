      - number: '8.2'
        title: 估值框架与可比分析
        blocks:
          - type: paragraph
            body: >
              Cyera 的 $9B 估值意味着，按估计 2025 ARR $100–200M 计算，远期收入倍数约为 45–90x，远高于 10–15x 的同业中位数。Palo Alto Networks（PANW）在
              $9B+ ARR 上交易约 8–9x 未来十二个月收入；CrowdStrike（CRWD）为 14–17x；Zscaler（ZS）为 9–11x。Varonis（VRNS）是最接近的公开 DSPM
              可比公司，采用本地架构，在 $650M ARR 上交易 5–7x。Cyera 的私募溢价部分可由快速 ARR 增长轨迹（约 12 个月从 $30M 到 $100M）、AI 时代变现可选性，以及作为领先云原生
              DSPM 纯标的的稀缺性解释。但相较增长最快的上市同业（CrowdStrike）仍高出 3–4x 的溢价，除非 Cyera 在 IPO 窗口前持续做到 100%+ 同比增长，否则很难维持。


              锚定现实 2027 年情景的自下而上估值框架显示：乐观情景——$400M ARR × 12x 倍数 = $4.8B；基准情景——$250M ARR × 9x = $2.25B；悲观情景——$150M ARR ×
              6x = $0.9B。面对 $9B 投后估值、4–5 轮清算优先权和稀释，三种情景都意味着 Series D 入场价在典型优先股转普通股转换下产生负回报。这不代表 Cyera 会失败——它代表 Series D
              定价已经按最佳一流结果定价，安全边际有限。


              IPO 窗口很重要。如果公开市场条件关闭（利率上行、避险轮动），Cyera 的流动性路径将主要转向收购。战略收购方——Palo Alto（考虑平台重叠，可能在 $3–5B 区间）、Wiz、Google 或
              Amazon——大概率会较当前私募估值打折，这意味着除非 Cyera 维持超常增长，否则并购退出会摧毁后期投资者价值。
            claimRefs:
              - CV006
              - CV007
              - CV008
              - CV009
              - CV010
