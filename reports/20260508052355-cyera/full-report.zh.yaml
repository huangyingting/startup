      - number: '4.4'
        title: 资本充足性与烧钱速度评估
        blocks:
          - type: paragraph
            body: >
              Cyera 已融资 $1.54B，并在 2025 年 12 月完成 Series F；以当前运营阶段看，资产负债表显得资本充足。假设自成立至 Series F 累计消耗现金
              $400–$600M（符合一家四年内扩张到 800 名员工且至少完成一次收购的公司），Cyera 在 Series F 后可能仍有 $900M–$1.1B 现金等价物，按当前烧钱速度足以支撑 3–5
              年运营，无需追加融资。


              烧钱速度估计：一家 800 人的企业软件公司，若计入人力成本（工程、销售、G&A、R&D 的平均全负担成本 $100K–$180K）、云基础设施、办公设施和 Trail 收购整合成本，通常每年消耗
              $120M–$180M 总运营费用。按 $150M 年烧钱和 $1B 现金计算，Cyera 约有 6–7 年现金跑道，资本实力显著，降低融资紧迫性。


              主要资本充足性风险不是运营风险，而是 Series F 投资者的回报预期。$9B 的 Series F 估值意味着投资者需要 3–5x 回报（$27–45B 退出）才能达到目标基金回报。这会给公司带来压力：在
              4–7 年内以 $30B+ IPO 或战略收购退出。这个门槛很高，要求公司在 2027–2030 年窗口持续高增长收入执行。
            claimRefs:
