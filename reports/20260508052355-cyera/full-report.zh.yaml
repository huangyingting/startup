      - number: '1.2'
        title: 创始人、领导团队与治理
        blocks:
          - type: paragraph
            body: >
              Cyera 由 Yotam Segev（CEO）和 Tamar Bar-Ilan（CTO）创立。两人在以色列国防军精英 Talpiot 项目服役时相识。之后，两人搭建并管理 Unit 8200（IDF
              的信号情报与网络部队）的云安全部门。退役后，他们访谈了 100 多位 CISO，发现一个反复出现的缺口：企业回答不了最敏感数据在哪里、谁能访问这些基础问题。这个由访谈得出的洞察成了 Cyera
              的创立命题。第三位联合创始人 Yonatan Itai 担任研发副总裁。


              高管团队包括 Brandon Sweeney（总裁）、Jason Clark（首席战略官）、Lamont Orange（首席信息安全官）、Steve Rog（首席营收官）、Joseph
              Iantosca（首席财务官）、Shira Azran（首席法务官）、Sharon Shaked（首席人力官）和 Aygun Suleymanova（首席营销官）。董事会包括 Doug Leone（Sequoia
              Capital 荣休合伙人）和 Frank Slootman（Snowflake 前 CEO，2025 年加入董事会），为公司治理补入了可观的企业软件规模化和 GTM 经验。


              关键人物集中仍是实质依赖：Segev 和 Bar-Ilan 是最主要的公开面孔和技术愿景领导者。公司通过搭建庞大的高管团队，主动降低单人依赖，但创始二人的 Unit 8200 背景和 IDF 网络，仍是
              Cyera 从以色列网络安全生态招揽顶尖人才的核心资产。
