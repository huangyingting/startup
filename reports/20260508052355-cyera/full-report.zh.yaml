      - number: '6.5'
        title: 扩张收入与集中度风险
        blocks:
          - type: paragraph
            body: >
              Cyera 的客户扩张收入机会由三套机制驱动：(1) 数据量增长——客户数据资产扩张后，可计费扫描量无需新增销售动作即可扩大；(2) 模块加购——已安装客户可把 Omni DLP 和 AI Security
              模块作为增量订阅加入；(3) 环境扩张——从仅覆盖 AWS 开始的客户，通常会在 12-24 个月内扩展到 Azure、GCP 和 SaaS 连接器。这一扩张动态支撑 110–130% NRR 估计。


              集中度风险是最重要的未知客户指标。Cyera 未披露客户数量，因此客户间收入分布不透明。在估计 $100–250M ARR 下，如果客户数量为 200–400 家企业，前 10 大账户可能贡献 20–35%
              收入——对现阶段企业 SaaS 来说可以接受。但如果客户数量较低（50–100 家），前 10 大集中度可能超过 50%，对 IPO 投资者就是实质风险。


              最不利的客户风险来自 2021–2023 年队列的客户流失——这些最早客户在产品早期、Trail Security DLP 和 AI Security 模块推出前采用
              Cyera。他们拿到的产品最不完整，也最可能遇到能力缺口。这些队列是续约并扩张，还是流失，公开来源无法得知；但这是尽调数据室审查中最关键的历史留存问题。
            claimRefs:
              - CU018
              - CU019
              - CU020
              - CU021
          - type: table
            tableRef: TU005
            claimRefs:
              - CU018
              - CU019
