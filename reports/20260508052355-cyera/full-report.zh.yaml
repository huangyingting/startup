      - number: '5.6'
        title: 附录材料
        blocks:
          - type: callout
            title: 无代理架构和低于 1 天部署是真正的企业采用加速器
            body: >
              Cyera 的只读 API 连接器模型消除了企业数据安全部署中的主要摩擦——软件安装、代理管理和变更控制审批周期。与传统 DLP 代理需要数周 / 数月相比，低于 1
              天达成价值的速度构成实质采购和采用优势。Gartner 客户评论也一再把这点列为选择 Cyera 而非替代方案的首要原因。
            calloutType: strength
            claimRefs:
              - CE001
              - CE002
              - CE013
          - type: callout
            title: Omni DLP 整合完整性仍是未解技术风险
            body: >
              基于收购 Trail Security 获得的 Omni DLP 模块，需要与 Cyera 分类层做深度双向整合，才能交付承诺中的统一 DSPM+DLP 体验。把收购来的代码库并入生产级 SaaS
              平台，常常会带来技术债、API 不兼容和性能回退。此次整合的完整性和质量尚未得到独立验证，是技术评估者的关键尽调项。
            calloutType: risk
            claimRefs:
              - CE019
              - CE021
          - type: callout
            title: AI Security 模块把 Cyera 放在数据安全和 AI 治理最高增长的交叉点
            body: >
              AI Security 模块处理的是企业刚开始解决的问题：如何治理流经 GenAI 训练管线、RAG 架构和 AI 助手工具的敏感数据。这是先发定位机会：主要 DSPM 厂商尚无有说服力的 AI 治理模块，而
              EU AI Act（2026 年 8 月执行）正好会为这一能力制造监管需求。如果 Cyera 执行到位，AI Security 可能在 2–3 年内成长到与核心 DSPM 模块同等规模。
            calloutType: insight
            claimRefs:
              - CE007
              - CE008
              - CE017
          - type: callout
            title: 本地覆盖缺口是混合企业的结构性架构限制
            body: >
              相比 Varonis 原生 Windows/NAS 集成，Cyera 的云原生无代理架构天然不太适合本地文件服务器扫描。对拥有大量本地数据资产的企业——金融服务和制造业很典型——这会形成覆盖缺口，要么需要
              Cyera 部署本地代理（增加复杂度），要么采用 Varonis+Cyera 的混合策略。竞品关于大型本地存储规模限制的反向说法，值得技术评估，而不是直接否定。
            calloutType: risk
            claimRefs:
              - CE020
              - CE016
  - number: 6
    title: 客户情况
    sections:
      - number: '6.1'
        title: 客户分层与理想客户画像
        blocks:
          - type: paragraph
            body: >
              Cyera 的理想客户画像（ICP）聚焦于 CISO 主导采购的企业：收入 $500M–$10B+，采用多云架构，并承担大量合规义务。CISO（或安全副总裁）通常是经济买家，云安全工程师、数据治理团队和合规 /
              GRC 官员则是关键影响者。受监管行业的交易规模和紧迫性最高——金融服务（FFIEC、PCI DSS）、医疗健康（HIPAA、HITECH）、零售（PCI DSS、CCPA）和科技（SOC
              2、GDPR）。在这些行业，数据安全失败带来的监管处罚可量化，CISO 审计不过关也足以断送职业生涯。


              按 TrustRadius 和 G2 客户评论数据，服务行业包括金融服务、医疗服务提供方、制造、零售和科技服务商。G2 评论显示，企业买家（>1,000
              名员工）是主要客群，金融服务评论者最活跃。客户基础在地理上集中于北美和欧洲，这与 Cyera 美国总部和 Tel Aviv 研发中心的分布一致。


              相较企业客户，中端市场买家（100–999 名员工）服务不足；Cyera 的定价和销售动作（无自助试用、先演示模式）说明中端市场并非当前 ICP 重心。借助 MSSP
              触达中端市场，是一个正在出现的渠道机会。公共部门和联邦政府因缺少 FedRAMP 被排除在外，这是结构性的可服务市场约束，也限制了 Cyera 在美国本土公共部门的收入机会。
            claimRefs:
              - CU001
              - CU002
              - CU003
              - CU004
