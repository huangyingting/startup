      - number: '2.6'
        title: 图表
        blocks:
          - type: callout
            title: 多层监管顺风让 DSPM 变成非可选项
            body: >
              GDPR（累计罚款 €4B+）、CCPA、HIPAA、EU AI Act 和 SEC
              披露规则构成一套持久的多司法辖区合规栈，使自动化数据分类和态势管理成为受监管企业的运营强制项，而不是可选安全升级。这层监管约束让核心 DSPM 需求免受影响低优先级安全品类的预算冻结。
            calloutType: strength
            claimRefs:
              - CM009
              - CM010
              - CM011
              - CM012
              - CM023
          - type: callout
            title: 超大规模云厂商捆绑压缩 TAM 和定价权
            body: >
              AWS Macie、Microsoft Purview 和 Google Cloud DLP
              提供随云订阅捆绑的原生数据安全能力，增量成本很低。对于单一主云厂商、合规要求中等的组织，这些工具可能无需独立供应商支出就能满足基础 DSPM 需求，实质上缩小 Cyera
              的可服务市场，并限制其在成熟度较低或多云程度较低买方细分中的定价杠杆。
            calloutType: risk
            claimRefs:
              - CM030
              - CM018
          - type: callout
            title: GenAI 创造原始市场规模测算未覆盖的净新增 DSPM 需求
            body: >
              企业生成式 AI 部署正在产生海量非结构化训练和检索数据集，需要分类、来源追踪和 EU AI Act 合规审查。2022–2023 年 DSPM 市场规模模型并未纳入这个用例，因此在 2026–2028 年
              GenAI 治理义务成熟时，当前 TAM 估计很可能偏保守。
            calloutType: insight
            claimRefs:
              - CM012
              - CM022
              - CM031
          - type: callout
            title: 市场规模估计缺少经审计一手报告
            body: >
              $4–6B DSPM TAM 和 25–30% CAGR 来自分析师评论、供应商沟通和市场类比（Varonis ARR、IBM 泄露数据）的综合推算。没有可免费访问的单一经审计 IDC 或 Forrester
              一手市场报告。实际市场规模可能因 DSPM 相对 DLP 和 CNAPP 的边界划法而出现实质差异。
            calloutType: assumption
