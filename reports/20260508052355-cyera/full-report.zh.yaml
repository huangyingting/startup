  - number: 5
    title: 产品与技术
    sections:
      - number: '5.1'
        title: 平台架构与数据发现引擎
        blocks:
          - type: paragraph
            body: >
              Cyera 平台围绕云原生、无代理的数据发现引擎搭建，通过只读 API 和 OAuth 授权接入企业数据环境，不需要安装代理、部署代理服务器，也不需要重定向网络流量。这一架构直接支撑公司低于 1
              天的部署速度，也打中企业安全团队的痛点：没有代理，就不扩大攻击面，不增加终端软件管理负担，也不影响生产工作负载性能。


              发现引擎做三件事：首先，枚举已连接云环境中的所有数据存储和资产（S3 buckets、RDS databases、Azure Blob Storage、GCP BigQuery、Snowflake
              tables、Databricks notebooks、M365 SharePoint/Teams）；其次，抽样并扫描数据存储内容，借助 AI 分类引擎识别敏感数据类型；第三，映射数据血缘、访问权限以及用户 /
              群组访问模式，生成风险态势评估。


              平台连接 100+ 种数据存储类型，覆盖结构化（数据库、数据仓库）、半结构化（对象存储里的 JSON、CSV 文件）和非结构化（文档、邮件、协作内容）格式。与 SaaS
              平台集成以覆盖非结构化数据——Microsoft 365、Google
              Workspace、Salesforce、Slack——显著扩大了基础设施层数据存储之外的覆盖面，也处理了“影子数据”问题：敏感信息会在传统边界控制之外的邮件附件和协作工具里扩散。
            claimRefs:
              - CE001
              - CE002
              - CE003
              - CE004
          - type: table
