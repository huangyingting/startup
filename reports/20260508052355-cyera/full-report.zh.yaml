  - number: 2
    title: 市场分析
    sections:
      - number: '2.1'
        title: DSPM 品类定义与市场边界
        blocks:
          - type: paragraph
            body: >
              数据安全态势管理（DSPM）是一门安全领域，自动发现、分类并持续监控云存储、SaaS 和混合环境中的敏感数据，以识别配置错误、访问风险和监管暴露。Gartner 在 2022 Hype Cycle for
              Data Security 中提出该术语，将 DSPM 确立为区别于相邻领域的独立品类。到 2025 年，2025 Gartner Market Guide for DSPM 已列出至少 8
              家代表性供应商，并描述该品类正从早期采用转向主流企业评估。


              DSPM 不同于传统数据防泄漏（DLP）：DLP 在网络出口点拦截传输中的数据，而 DSPM 聚焦云仓库中的静态数据，不要求代理或预先分类。DSPM
              也补充云原生应用保护平台（CNAPP）——后者保护云工作负载、容器和基础设施——DSPM 则增加专门的数据感知层。与数据治理和数据目录工具（BigID 的策略）的重叠正在扩大，边界更模糊；部分供应商把 DSPM
              定位成更广义数据智能平台中偏安全的子集。


              DSPM 买方面对的核心问题是数据蔓延：现代企业在 AWS、Azure、GCP 和几十种 SaaS 工具上运行数百个云数据存储，产生海量无人管理、未分类的敏感数据，暴露于数据泄露和监管罚款。Cyera
              的无代理架构不到一天即可部署、无需安装软件，正面击中这一盲区。
            claimRefs:
              - CM001
              - CM002
              - CM015
              - CM029
