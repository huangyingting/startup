      - number: '5.4'
        title: 信任、合规与安全架构
        blocks:
          - type: paragraph
            body: >
              Cyera 的信任与合规态势对企业安全买家很关键，因为他们会把供应商安全态势作为采购标准。平台持有 SOC 2 Type II 认证、ISO 27001 认证，并提供 GDPR/CCPA
              数据处理合规文档。公司运营负责任披露计划，发布安全信任中心，附有架构图，说明数据访问范围（只读 API，不从客户环境移动数据）。


              只读架构是信任抓手：Cyera 从不把客户敏感数据移出或复制出客户环境，因此安全态势评估框架与那些需要外传数据来扫描的方案有实质差异。面对严格审查供应商数据访问模型的企业安全买家，这是有意义的竞争优势。


              明显的信任缺口是缺少 FedRAMP 授权，这会阻止其进入美国联邦和 DoD 环境。FedRAMP 需要大量 NIST 800-53 控制文档和第三方评估；从初始申请到取得 FedRAMP Moderate
              授权，通常需要 12–18 个月。Cyera 尚未公开宣布推进 FedRAMP，说明联邦市场进入并非近期路线图优先事项。SOC 2 Type II 已确认；医疗健康买家评估中重视的 HITRUST CSF
              认证尚未公开确认。
            claimRefs:
              - CE013
              - CE014
              - CE015
              - CE016
