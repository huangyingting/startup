      - number: '3.3'
        title: 超大规模云厂商与平台型竞争对手
        blocks:
          - type: paragraph
            body: >
              Microsoft Purview 是 Microsoft 集成的数据治理与安全平台，嵌入 Microsoft 365 和 Azure 生态。对于重度投入 Microsoft 基础设施的组织，Purview
              以零增量成本提供 DSPM 邻近能力（数据分类、敏感度标签、合规）。Microsoft 的分发优势——几乎覆盖所有企业——使 Purview 成为 Microsoft
              中心型买方的数据安全默认起点。不过，在多云环境（AWS、GCP）下，Purview 能力较弱，也无法匹配 Cyera 面向混合环境中复杂、多格式敏感数据的 AI 驱动分类准确性。


              Google Cloud Sensitive Data Protection（原 Cloud DLP）为 Google Cloud 工作负载提供数据发现和遮盖。与 Microsoft Purview
              类似，它捆绑在 Google Cloud 平台内，是 GCP 原生组织的自然起点。两类超大规模云工具在跨云覆盖、AI 分类复杂度和风险工作流自动化上都落后于纯玩家 DSPM 供应商。


              Orca Security 主要通过其 CNAPP 平台与 Cyera 竞争，其中包括 Orca Data Security 模块。Orca 的无代理架构和云范围扫描模型与 Cyera 方法类似，但 DSPM
              是更广泛 CNAPP 产品中的一个功能，而不是主产品。Palo Alto Networks 的 Prisma Cloud 将 DSPM 纳入 CNAPP 套件，动态类似：DSPM 深度让位于工作负载和配置安全。
            claimRefs:
              - CP010
              - CP011
              - CP012
              - CP013
      - number: '3.4'
        title: 能力、定价与分发对比
        blocks:
          - type: paragraph
            body: >
              Cyera 相对主要竞争对手的关键能力差异包括：AI 原生分类，覆盖 100+ 类敏感数据，声称精度 95%+；无需代理、不到一天部署；通过 Trail Security 收购（Omni DLP 模块）集成
              DSPM 与 DLP；以及面向生成式 AI 训练数据集的 AI 安全治理。Varonis 领先于本地 Windows 环境的文件级分析。BigID 领先于数据治理和隐私用例广度。Wiz 领先于 CNAPP
              平台完整性和分发。Microsoft Purview 对 Microsoft 原生买方提供零增量成本部署，领先于这一场景。


              DSPM 平台定价普遍不透明，随扫描数据量、环境数量和企业折扣层级变化。Cyera 定价页面显示采用基于数据量的许可，并通过企业谈判成交。Varonis 公布了以数据量为锚的用量计价。BigID
              按功能模块提供分层定价。Wiz 将 DSPM 捆绑进 CNAPP 平台定价，后者还包括其他安全能力，因此难以直接比较 DSPM 成本。


              分发优势明显偏向 Wiz 和 Microsoft。Wiz 通过激进的 PLG 辅助打法建立了 4,000+ 客户基础。Microsoft 的 MSSP 和合作伙伴生态几乎覆盖全球每个企业买方。Cyera
              主要通过直销面向企业竞争，同时在发展中端市场渠道计划。Cyera 与 MSSP 的合作以及 AWS 和 Azure Marketplace 上架，帮助其触达更多企业买方，而不必完全依赖专门直销动作。
            claimRefs:
              - CP014
              - CP015
              - CP016
              - CP017
              - CP018
