chapters:
  - number: 1
    title: 公司概况
    sections:
      - number: '1.1'
        title: 身份定位、使命与商业模式
        blocks:
          - type: paragraph
            body: >
              Cyera 2021 年创立于纽约，研发运营扎根以色列 Tel Aviv。公司是一家纯数据安全厂商，提供 AI
              原生平台，让企业统一看清敏感数据在哪里、谁在访问、如何修复暴露风险。其使命是消除盲区，让每个组织都能安全释放数据价值；这些盲区正是数据泄露、监管违规和 AI 驱动的数据外泄发生的入口。


              商业模式是企业级 SaaS，订阅收入与扫描数据量和接入环境数量挂钩。Cyera 平台无需代理，不到一天即可部署，客户环境内不需要安装软件。核心能力包括数据安全态势管理（DSPM）、AI
              驱动的数据分类、数据防泄漏（DLP，通过 Omni DLP 提供，基于 2024 年 10 月收购 Trail Security）、身份与访问治理，以及面向生成式 AI 系统的 AI 安全。截至 2025 年 6
              月，公司报告 ARR 约 $100M，Fortune 500 客户数自 2023 年初以来约增长 353%，业务覆盖 10+ 个国家。
