              - CR010
              - CR011
              - CR012
          - type: figure
            figureRef: FR003
            claimRefs: []
      - number: '7.4'
        title: 人员、执行与地缘政治风险评估
        blocks:
          - type: paragraph
            body: >
              Cyera 工程团队集中在 Israel，形成了对美国总部网络安全公司来说并不常见的实质地缘政治风险。2023 年 10 月 7 日 Hamas 对 Israel 的袭击及其后的 Gaza 冲突，严重扰动了
              Israeli 科技公司：预备役征召让关键工程师离开产品开发数周到数月，Israel 安全环境也增加了员工压力和分心。Cyera 明确穿越了这一时期并继续融资（Series F，2025 年 12
              月），但未来军事升级扰动 Tel Aviv 研发的风险，相比纯美国本土工程团队仍然更高。


              领导层深度风险：Cyera 创始团队来自 Israeli intelligence community（Unit 8200 背景），技术上非常强，但公司 CEO、CTO 和 CPO
              集中在创始搭档身上，形成高管层关键人依赖。IPO 前创始领导层离开或失去履职能力，将需要投资者主导重大过渡。这是该阶段常见风险，但需要接班计划。


              招聘速度风险：Tel Aviv 网络安全人才市场竞争激烈且越来越贵，超大规模云厂商（Microsoft、AWS、Google）和其他 Israeli 独角兽都在争抢同一批 Unit 8200 毕业人才。Cyera
              从 800 人扩张到 1,500+ 人（可能是 IPO 前目标）时能否保持工程速度，取决于它能否在日益竞争的人才环境里持续吸引并留住顶尖 Israeli 网络安全工程师。
            claimRefs:
              - CR014
              - CR015
              - CR016
              - CR017
          - type: table
            tableRef: TR004
