      - number: '3.5'
        title: 护城河耐久度与竞争风险评估
        blocks:
          - type: paragraph
            body: >
              Cyera 的竞争护城河来自四个来源：（1）AI 驱动分类的数据优势——公司模型随着每次客户部署而改进，形成数据飞轮；（2）切换成本——围绕 Cyera 平台搭建修复工作流、合规映射和 SIEM
              集成的企业，会面临实质迁移摩擦；（3）品牌和分析师认可——Gartner Customers' Choice 状态和进入 Market Guide，为企业销售提供可信背书；（4）人才护城河——Unit 8200
              创始团队和以色列网络安全生态人才网络难以复制。


              主要竞争风险包括：（1）CNAPP 捆绑带来的商品化——如果 Wiz 或 Palo Alto 的 DSPM 模块在 AI 分类准确性上追平，Cyera
              的独立溢价定价可能被侵蚀；（2）超大规模云厂商原生能力提升——Microsoft Purview 正大力投资基于 AI 的分类，足够强的原生工具会压缩独立供应商的可服务市场；（3）BigID 扩大竞争——随着
              AI 治理需求增长，BigID 的数据智能定位会变得更宽；（4）Varonis 云扩张——Varonis 正积极扩大云覆盖，可能在 24–36 个月内缩小纯云环境差距。


              最负面的公开竞争说法来自 Varonis，其在公开内容中称 Cyera「扫描大型数据存储很吃力」并且「没有第三方集成就无法修复问题」。这些具体能力异议需要通过客户访谈和技术评估验证，也构成潜在买方的正当尽调项。
            claimRefs:
              - CP019
              - CP020
              - CP021
              - CP022
              - CP023
              - CP024
              - CP025
