      - number: '2.2'
        title: 市场规模与增长轨迹
        blocks:
          - type: paragraph
            body: >
              DSPM 市场估计以 25–30% CAGR 增长，狭义 DSPM 品类的总可用市场预计到 2027 年达 $4–6B；如果 GenAI 数据治理用例加快采用，到 2030 年可能超过
              $10B。更广义的云数据安全 TAM 包括 DLP、CASB、DSPM 和数据治理，预计到 2028 年为
              $15–20B。这些数字综合自分析师评论、投资者信号和市场类比；本次报告生成时，未能获得无付费墙的单一经审计 IDC 或 Forrester 报告。


              IBM Security 的 2024 Cost of a Data Breach Report 是引用最广的独立基准，报告称 2024 年全球平均数据泄露成本达到 $4.88M，创历史新高，较 2023 年增长
              10%。泄露成本是量化 DSPM ROI 的主要财务依据，使 IBM 报告成为关键需求驱动因素。更快发现并遏制泄露的组织付出的成本也更低：同一报告发现，使用 AI 安全工具的公司每次泄露平均节省 $2.2M。


              Varonis 是最接近的上市类比公司，聚焦以数据为中心的安全，2024 年 ARR 为 $619M，为规模化数据安全平台能变现到什么程度提供了市场验证基准。Cyera 截至 2025 年 12 月累计融资
              $1.54B，显示投资者相信该市场机会；但公司约 $100M ARR（2025 年估计）意味着它仍需证明自己能渗透到 Varonis 所代表的 $600M+ 规模。
