      - number: '3.2'
        title: 主要竞争对手画像
        blocks:
          - type: paragraph
            body: >
              BigID（2016 年成立，纽约）是 Cyera 在 DSPM 和数据智能领域最接近的纯玩家竞争对手。BigID 已融资约 $400M，并把平台定位为覆盖安全、隐私和数据治理用例的统一数据智能解决方案，刻意比
              Cyera 的安全重点更宽。BigID 主张，更广的定位更适合既需要安全分类、又需要业务元数据管理的企业数据团队。对需要超出安全范畴的数据智能的买方来说，公司治理宽度是真实差异点，但也会让 DSPM
              专项评估更复杂。


              Varonis Systems（NASDAQ: VRNS）是上市数据安全既有厂商，2024 年报告 ARR 为 $619M。Varonis 的核心差异化在于本地 Windows/NAS
              环境和电子邮件中的深度文件级分析，以及强大的传统企业客户关系。Varonis 已扩张到云 DSPM，但在纯云原生覆盖深度上落后于 Cyera。Varonis 公开称 Cyera
              对大型本地数据存储的分析较弱，且缺少第三方集成时自动修复有限；这些说法值得尽调核查。Varonis 的公开市场流动性和成熟企业关系，给了它显著 GTM 优势。


              Wiz（私有公司，截至 2025 年估值约 $16B+）是主导性的云原生应用保护平台（CNAPP）厂商。Wiz 2024 年收购 Gem Security，并推出 Wiz for Data（DSPM
              模块），作为统一云安全平台的一部分。Wiz 在 DSPM 的竞争优势是分发：其 4,000+ 企业客户装机基础，可以用极低增量采购摩擦添加 DSPM 模块。Wiz 在技术深度上与 Cyera
              竞争，但在交易决策由整合云安全支出、而非 DSPM 深度驱动时，通常更容易胜出。
            claimRefs:
              - CP004
              - CP005
              - CP006
              - CP007
              - CP008
              - CP009
