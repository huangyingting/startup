      - number: '3.6'
        title: 图表
        blocks:
          - type: callout
            title: CNAPP 平台捆绑是首要竞争威胁
            body: >
              Wiz、Orca 和 Palo Alto 将 DSPM 作为更广泛 CNAPP 平台中的功能捆绑，造成一种局面：企业买方会选择无需增量成本的「足够好」DSPM，而不是专门构建的解决方案。随着 Wiz 的
              4,000+ 企业客户基础续签平台合同，该基础内的 DSPM 采用实际上免费，减少 Cyera 可触达的交易数量。
            calloutType: risk
            claimRefs:
              - CP019
              - CP020
          - type: callout
            title: Gartner 认可与 AI 准确性是近期耐久优势
            body: >
              Cyera 的 Customers' Choice 状态（Gartner Peer Insights 评分 4.7/5.0）和对 100+ 类敏感数据 95%+
              分类精度的主张，是经过独立验证的质量信号，能让企业采购团队获得第三方信心。在以安全团队为主导、准确性和分析师背书是主要购买标准的 DSPM 评估中，这些信号能加速销售。
            calloutType: strength
            claimRefs:
              - CP026
              - CP014
          - type: callout
            title: 缺少 FedRAMP 是实质性可服务市场约束
            body: >
              Cyera 不在 FedRAMP marketplace 中，因而无法进入美国联邦和 DoD 合同；这是一块规模大、价值高的买方细分，云数据安全需求还在增长。竞争对手 Palo Alto、Microsoft 和
              Wiz 都持有 FedRAMP 授权。这个缺口限制 Cyera 的总可服务市场，并会随着联邦云采用在零信任要求下加速而越来越重要。
            calloutType: insight
            claimRefs:
              - CP022
          - type: callout
            title: 竞争对手能力主张主要来自供应商撰写内容
            body: >
              本章的功能矩阵和竞争定位高度依赖供应商撰写的对比内容（Varonis vs. Cyera、BigID 替代品文章），本身带有偏向。独立第三方评估（Gartner Magic Quadrant、Forrester
              Wave）有付费墙。要验证 Varonis 对 Cyera 本地覆盖和修复深度的具体批评，仍需要客户参考电话和正式 POC。
            calloutType: assumption
            claimRefs:
              - CP008
              - CP009
  - number: 4
    title: 财务情况
    sections:
      - number: '4.1'
        title: 融资历史与资本结构
        blocks:
          - type: paragraph
            body: >
              Cyera 完成了一轮快速且大规模的融资，约四年运营中累计披露融资 $1.54B。融资轨迹呈现高速度企业增长常见的间隔压缩模式：Series A（$30M，2021）、Series B（$60M，2022 年 3
              月）、Series C（$100M，2023 年 10 月）、Series D（$300M，2024 年 4 月，估值 $1.4B）以及 Series F（$300M，2025 年 12 月，估值
              $9B）。Series E 信息没有与 F 公开区分，说明最近一轮可能按顺序标为 Series F、但没有中间公开 Series E 公告；也可能 Series E 是一轮内部过桥。


              2024 年 4 月 Series D 估值 $1.4B，2025 年 12 月 Series F 估值 $9B，约 20 个月估值跃升 6.4x——速度极不寻常，意味着收入爆发、DSPM
              市场显著重估，或两者兼有。知名投资方包括 Accel Partners、Sequoia Capital、Cyberstarts、e.ventures 和 Spark
              Capital；五家都是顶级基金，在网络安全领域有强记录，为估值逻辑增加投资人质量信号。


              Trail Security 收购（2024 年宣布）增加了 Omni DLP 产品线，带来人员和技术。收购成本未披露，但整合看起来是战略性而非机会主义：它把集成式数据防泄漏补进来，与 DSPM 互补，扩大
              Cyera 相对 Varonis 独立 DLP 和 Microsoft 捆绑 DLP 的竞争面。
            claimRefs:
              - CI001
              - CI002
              - CI003
              - CI004
          - type: table
            tableRef: TI001
            claimRefs:
              - CI005
              - CI006
              - CI007
          - type: figure
            figureRef: FI001
            claimRefs: []
      - number: '4.2'
        title: 收入模型与变现机制
        blocks:
          - type: paragraph
            body: >
              Cyera 的收入模型是订阅制，企业定价以扫描数据量和监控云环境数量为锚。公司不公布标价；买方通常先演示、再合同谈判，这是企业网络安全平台常见路径。根据分析师评论和竞争市场基准，收入在 $500M–$10B
              区间的企业部署，年度合同价值（ACV）估计在 $200K 到 $700K+；超大型企业（金融服务、医疗系统、Global 2000）很可能是 $1M+ ACV 账户。


              Cyera 通过四条主要收入流变现：（1）DSPM 平台订阅，覆盖云数据发现、分类、风险评估和风险优先级排序；（2）Omni DLP 模块（来自 Trail Security
              收购），用于数据防泄漏策略执行；（3）AI Security 模块，处理生成式 AI 系统中的数据风险；（4）专业服务与实施支持。公司的集成生态覆盖 Microsoft
              Sentinel、ServiceNow、Okta、Crowdstrike 和 AWS Security Hub，客户启用更多连接器工作流后，会创造扩张收入机会。


              净留存率（NRR）未公开披露。根据公司的云数据安全定位、年度 CISA 驱动的合规续约周期，以及数据增长会持续扩大可计费足迹这一经常性特征，最佳估计推断 NRR 可能超过
              120%。数据安全上市可比公司提供了基准区间：Varonis 约 110% NRR，Rubrik 约 125% NRR。
            claimRefs:
