            title: 客户数量不透明，带来公开来源无法衡量的集中度和流失风险
            body: >
              Cyera 未披露客户数量，意味着从公司外部完全看不清收入集中度、早期队列流失和模块加购率。在 $9B
              估值下，投资者和收购方需要确认客户层面的财务指标，验证收入基础足够广且可防守。这是客户章节中最可执行的尽调缺口。
            calloutType: risk
            claimRefs:
              - CU019
