      - number: '1.5'
        title: 关键里程碑与负面事件
        blocks:
          - type: paragraph
            body: >
              Cyera 的发展轨迹由快速产品扩张、激进 M&A 和若干潜在风险信号共同构成。Trail Security 收购加快了 DLP 路线图，但也带来整合执行风险，并动用了 $162M 资本。公司在不到一年内（截至
              2025 年中）员工数约增长 3×，这种速度会带来组织复杂度和文化稀释风险。截至 2026 年 5 月，公开信息未显示 Cyera 面临重大诉讼、监管行动或数据泄露。


              竞争压力正在升温：Varonis 公开质疑 Cyera 的深度，称「Cyera
              只是一个发现工具」，并称其「扫描大型数据存储很吃力」「没有第三方集成就无法修复问题」。BigID、Rubrik/Laminar、Wiz 和 Microsoft Purview 都在争夺 DSPM 预算。公司未披露
              FedRAMP 授权状态，这可能限制其进入美国联邦市场；Varonis 等竞争对手已持有 FedRAMP High 授权。


              尽管估值快速增长，公司没有披露独立审计财务，ARR 主张难以验证，烧钱速度也难以评估。Blackstone 领投的 Series F 以 $9B 估值完成，意味着 ARR 倍数很高（约 90× 估计
              ARR），与其他高速增长网络安全平台一致；但如果增速放缓，估值可持续性会成为问题。
