      - number: '6.3'
        title: 具名客户证明与参考质量
        blocks:
          - type: paragraph
            body: >
              Cyera 尚未披露公开客户名单，但评论平台和新闻报道中出现了若干具名或可识别的客户参考。G2 评论包括一名可识别的金融服务企业评论者、一名提到本地 NAS 集成和云扫描并用的企业评论者，以及一名将 Cyera
              与 Qualys 搭配使用的评论者（暗示中大型企业安全栈集成）。TrustRadius 确认覆盖金融服务、医疗健康、制造、零售和科技垂直行业，但未点名具体公司。


              Gartner Customers' Choice 称号要求达到最低企业评论数量和最低评分，是目前最强的已验证客户证明：130+ 条企业评论、4.7/5.0 评分，意味着大量企业组织已在生产环境部署
              Cyera，并在部署后评估了质量。Gartner 评论语料会管理利益冲突，比供应商挑选的案例研究拥有更高独立验证权重。


              评论平台上的关键反向客户信号包括：(1) 一名 G2 评论者指出，评论时 DLP 能力尚不成熟，并希望看到全面的基于代理的 DLP——这是 Trail Security 整合前的反馈，可能已由 Omni DLP
              解决；(2) 另一名 G2 评论者提到旧系统集成的技术成熟度问题；(3) 多名评论者提到平台卡顿和偶发宕机。这些更像成长阶段的正常产品批评，而不是根本性产品失败，但它们确认部署体验并不总是顺畅。
