              - CU021
          - type: callout
            title: Trail 前 DLP 不成熟和客户评论中的平台稳定性担忧
            body: >
              多名 G2 评论者把 DLP 能力不成熟和平台稳定性（卡顿、宕机）列为具体担忧。Trail Security 的 Omni DLP 收购可能已补上 DLP
              缺口，但平台稳定性是独立于功能宽度的运营质量问题。这些评论者批评是当前最可信的反向客户证据。在依赖 Cyera 声称的满意度指标前，应通过客户访谈调查。
            calloutType: risk
