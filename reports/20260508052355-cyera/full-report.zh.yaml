  - number: 3
    title: 竞争格局
    sections:
      - number: '3.1'
        title: 竞争格局结构
        blocks:
          - type: paragraph
            body: >
              DSPM 竞争格局分为两类：专门打造的纯玩家，以及在更广泛云安全产品中加入 DSPM 模块的平台厂商。纯玩家（Cyera、BigID、Varonis）主要在深度、准确性和覆盖广度上竞争。平台厂商（Wiz、Orca
              Security、Palo Alto Networks、Microsoft Purview、Google Cloud DLP）则靠捆绑便利性、统一账单和既有客户关系竞争。


              第三层是传统数据安全既有厂商（Symantec/Broadcom、Forcepoint、Trellix），它们提供 DLP 产品，但缺少现代云原生 DSPM
              架构。这些厂商正在把企业交易输给云原生替代品，但仍代表买方正在迁离的「现状」。内部自建也是实际竞争选项：一些超大规模科技公司会在云原生工具之上自建数据分类管道，不过这条路需要大量工程投入。


              Cyera 把自己定位为独立纯玩家领导者，拥有最先进的 AI 驱动分类能力和最广的云数据存储覆盖，Gartner Peer Insights 认可和 $9B
              估值也支撑其市场领导信号。不过，平台厂商的分发优势和捆绑经济性，是独立 DSPM 作为一个品类面临的最大竞争威胁。
            claimRefs:
              - CP001
              - CP002
              - CP003
          - type: table
            tableRef: TP001
            claimRefs:
              - CP001
              - CP004
              - CP005
              - CP006
