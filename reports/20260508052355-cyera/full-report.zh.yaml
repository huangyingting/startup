          mid: 9000
  - id: FV004
    title: 投资 KPI 评分卡
    type: kpi
    description: 面向 IC 的七项投资维度评分
    data:
      items:
        - label: 市场质量
          value: 8
          detail: DSPM 品类真实、足够大，受监管驱动；$10B+ TAM 站得住
        - label: 产品差异化
          value: 8
          detail: 无代理架构、200+ 个连接器、AI 分类；12–18 个月内可守住差异化
        - label: 收入验证
          value: 9
          detail: 2024 年 Q4 ARR 达 $100M；12 个月增长 6x；在 DSPM 领域处于行业领先
        - label: 竞争护城河
          value: 6
          detail: 短期强；18–24 个月内受 Palo Alto 和 Microsoft 捆绑威胁
        - label: 财务健康度
          value: 5
          detail: 增长高，但估计烧掉 ARR 的 80–120%；未公开披露 GAAP 数据
        - label: 风险画像
          value: 4
          detail: 高：估值、竞争、地缘政治、法律、集中度风险均偏高
        - label: 估值 / 入场
          value: 3
          detail: $9B 已按最佳情景定价；基准情景下预期回报为负
