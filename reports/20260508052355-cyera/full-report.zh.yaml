      - number: '8.3'
        title: 乐观、基准与悲观情景
        blocks:
          - type: paragraph
            body: >
              乐观情景假设 Cyera 到 FY2027 年底达到 $400M ARR，NRR 维持在 130% 以上，毛利率扩张至 78%+，成功整合 Trail Security DLP，将 AI
              安全作为高价加购模块推出，并在 2026 年以 12–14x 远期收入倍数申报 IPO。在这些假设下，按 2026 或 2027 年 IPO 计算，完全稀释 IPO 估值达到 $5–7B，相当于从 $9B
              投后估值获得 0.5–0.8x 回报——这是一个温和结果，反映了当前估值溢价。


              基准情景建模为 FY2027 年 $250M ARR，随着早期采用者队列成熟，NRR 降至 115–120%，毛利率稳定在约 72%，并以 9–10x 远期收入上市，估值
              $2.5–3B。在该情景下，早期投资者（Series A/B）获得强回报，而 Series D 投资者遭遇降价融资或持平结果。基准与乐观的主要分水岭，是 Cyera 在跨过 $150M ARR 后能否维持
              100%+ 增长——CrowdStrike 和 Zscaler 的历史证据表明这可以做到，但要求新增客户获取持续高于当前水平。


              悲观情景包括 Palo Alto Networks 或 Microsoft 成功把竞争性 DSPM 功能捆绑进现有平台合同，压缩 Cyera 平均售价或触发一波不续约。在该情景下，NRR 跌破 100%，ARR
              增长停滞在 $150M，并以 $1.5–3B 困境出售方式被收购，清算优先权堆叠后 Series D 完全归零。悲观情景概率估计为 15–20%，基准为 55%，乐观为 25–30%。
            claimRefs:
              - CV011
              - CV012
              - CV013
              - CV014
              - CV015
      - number: '8.4'
        title: 打破投资逻辑的触发点与尽调优先级
        blocks:
          - type: paragraph
            body: >
              Cyera 在 $9B 的投资逻辑会在以下任一情况发生时失效：(1) Palo Alto Networks 在 RSA 2026 发布原生云扫描 DSPM 能力，消除 Cyera 面向 Palo Alto
              客户的主要差异化论点；(2) 季度 NRR 跌破 110%，说明客户扩张采购没有跟上支撑入场倍数所需的增长率；(3) Cyera 披露涉及客户凭据访问的重大安全事件或泄露，摧毁 DSPM 所需的信任基础；(4)
              IPO 窗口关闭 12+ 个月，迫使 Cyera 以低于 $9B 入场价的折扣做二级交易或被收购。


              在以 $9B 股权结构表承诺共同投资前，最终尽调优先事项包括：(a) CFO 提供的经审计 ARR 和 NRR 明细表，包括季度队列层面留存数据；(b) 完整 SOC 2 Type II
              报告，包括覆盖的云集成范围；(c) 确认 FedRAMP 授权时间线和联邦销售管线；(d) Trail Security DLP 整合技术完成状态和 GA 准备度；(e)
              总法律顾问提供董事会构成、员工期权池和清算优先权瀑布；(f) 按行业拆分的销售管线，包括前 10 大客户集中多少 ARR；(g) AI 安全变现产品路线图，包括 AI Data Security
              加购模块的定价和打包方式。


              尽调结论是有条件支持：市场真实，产品有差异化，ARR 速度在 DSPM 同业中领先。但在 $9B 估值下，价格假设公司同时在所有维度完美执行。成熟共同投资者应要求棘轮条款或清算优先权结构，在 Series D
              完成后 24 个月内若 IPO 估值低于 $6B 时提供下行保护。
            claimRefs:
              - CV016
              - CV017
              - CV018
              - CV019
              - CV020
