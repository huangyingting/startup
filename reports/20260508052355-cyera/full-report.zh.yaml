      - number: '8.5'
        title: 投资建议与风险评级
        blocks:
          - type: paragraph
            body: >
              投资建议：有条件持有 / 观察。DSPM 品类已经成立，Cyera 的 ARR 轨迹异常出色，创始团队具备运营可信度，也有投资者支持（累计融资 $1B+）去冲刺 IPO。然而，$9B
              估值给后期投资者制造了结构性回报压缩问题。按风险调整后的入场价意味着，当前投后估值下乐观情景回报仅 0.5–0.8x，基准和悲观情景为负回报。建议观察 Series E 或二级市场机会，价格需较 Series D
              折价 30–40%，才能建立有意义回报潜力的入场点。


              风险评级：高。估值已充分定价、执行要求接近二元、Palo Alto Networks 和 Microsoft 的竞争捆绑风险、DSPM AI 模块的监管不确定性、Israeli
              研发集中带来的地缘政治暴露，以及缺少 FedRAMP 授权，共同构成多维风险画像。在当前入场价格下，这一风险超过多数投资授权的容忍度。


              估值立场：已充分估值。$9B 投后估值要求 $15–20B 退出估值，才能为 Series D 投资者产生 2x 回报；这需要在较高公开市场倍数下成功
              IPO，或以显著高于私募估值的溢价被战略收购。两种情景都需要最佳假设同时兑现。平台长期潜力并非问题——估值纪律才是问题。已从更早轮次持仓的投资者应维持仓位，并评估能否以 Series C（$1.4B）或
              Series B 估值取得过桥融资或二级流动性；这些价位才是有吸引力的风险调整入场点。
            claimRefs:
              - CV021
              - CV022
              - CV023
              - CV024
              - CV025
      - number: '8.6'
        title: 附录材料
        blocks:
          - type: callout
            title: 投资建议：有条件持有 / 观察
            body: >-
              有条件持有 / 观察——DSPM 品类龙头地位有吸引力，但 $9B 入场价没有安全边际。Series D 投资者要赚到正回报，必须押中极度乐观情景。应在二级市场 $5.4–6.3B 估值区间入场，或等 IPO
              路演披露确认 ARR 超过 $200M、经审计 NRR 高于 125%。
            calloutType: recommendation
            claimRefs:
              - CV021
              - CV034
              - CV035
          - type: callout
            title: 估值压缩是主要下行风险
            body: >-
              以当前 ARR 的 45–90x 入场，估值倍数高过所有上市网络安全可比公司。只要一次失手——NRR 恶化、竞争对手宣布捆绑、IPO 市场关闭——倍数就可能压到
              6–10x，而且收入基数还小于牛市模型要求，Series D 投资者将遭受永久资本损失。
            calloutType: risk
            claimRefs:
              - CV022
              - CV023
              - CV030
          - type: callout
            title: Trail Security 的 DLP 期权价值可能左右牛市与基准情景
            body: >-
              收购 Trail Security 带来 DLP+DSPM 融合的期权价值，现有估值尚未充分计入。如果 Trail 的 Omni DLP 到 2025 年 Q3 达到企业级 GA，且 Cyera 能跑通
              DSPM+DLP 联合销售，把平均订单金额提高 30–40%，平台 ARR 轨迹就可能支撑 $9B 估值——因此，Trail 整合是否完整会成为尽调中的潜在摇摆因素。
            calloutType: insight
            claimRefs:
              - CV020
              - CV032
          - type: callout
            title: 共同投资前必须确认 ARR 定义
            body: >-
              本分析假设 Cyera 披露的 $100M ARR（2024 年 Q4）准确，且口径是年化 ARR，而非累计账单。如果 ARR
              指合同总额而不是年化经常性收入，隐含估值倍数会更高，回报测算也更吃紧。任何共同投资决定前，都必须核验经审计的收入排期。
            calloutType: assumption
            claimRefs:
              - CV019
              - CV034
