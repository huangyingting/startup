      - number: '4.3'
        title: 收入规模估计与 ARR 推断
        blocks:
          - type: paragraph
            body: >
              Cyera 是私有公司且未披露收入，ARR 必须从相关指标估计。最可靠的三角测算有三种：（1）估值 / 倍数分析，将 Cyera 的 $9B 估值与上市可比公司倍数比较；（2）基于员工数的收入估计，使用 SaaS
              行业基准；（3）融资时点分析，将轮次时点、节奏和金额与可比公司发展路径比较。


              估值 / ARR 倍数分析：Cyera 最接近的上市可比公司是 Varonis，交易倍数约为 4–6x ARR（当前市值约 $3B，对应 $619M ARR）。如果在 Varonis 倍数上加入 20–50%
              的私有高增速溢价，则 Cyera 需要 $100M–$250M ARR，才能仅靠基本面倍数支撑 $9B 估值。更广泛的网络安全增长溢价逻辑可支持更高倍数（对标 Wiz：40–50x
              ARR），意味着在激进溢价定价下，ARR 低至 $200M 也可能成立。


              员工数分析：Cyera 约有 800 名员工，其中估计 150–200 人产生收入（销售 + 客户成功）。按高增长企业 SaaS 行业标准，每名员工收入 $200K–$350K，推算总 ARR 在
              $100M–$200M 区间。这些数字对 ACV 假设和销售周期长度高度敏感，只应视为粗略指示区间。没有公开可访问来源确认 Cyera 的 ARR，这些估计有显著不确定性。
            claimRefs:
              - CI009
              - CI010
              - CI011
              - CI012
