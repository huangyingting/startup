      - number: '5.2'
        title: AI 分类引擎与技术差异化
        blocks:
          - type: paragraph
            body: >
              Cyera 的 AI 分类引擎被定位为公司的核心技术差异化。该引擎按照 100+ 类敏感数据政策对发现的数据做分类，覆盖
              PII（姓名、SSN、护照号、出生日期）、金融数据（卡号、账户号、银行代码）、健康数据（HIPAA 下的 PHI、诊断代码）、凭证（API keys、密码、tokens）、知识产权（源代码、商业秘密）和 AI
              训练数据。公司声称这些类别的分类精确率达到 95%+；随着新的企业部署不断加入自有模型训练数据集，准确度还会提升。


              分类方法把多种 AI 路线组合起来：在标注企业数据上训练的监督机器学习模型（自有训练数据集构成重要竞争护城河）、用于非结构化文本上下文分类的自然语言处理、用于结构化数据类型的正则表达式模式匹配（SSN
              格式、信用卡 Luhn 校验），以及用于模糊或复杂分类任务的大语言模型（LLM）辅助。


              2024 年推出的 AI Security 模块把分类能力延伸到生成式 AI 风险场景：识别用于 AI 模型训练的企业数据、流经 RAG（retrieval-augmented
              generation）管线的数据，以及暴露给 AI 助手工具（Copilot、ChatGPT Enterprise）的敏感数据。该模块切中企业安全团队快速升温的担忧，也把 Cyera 放在数据安全与 AI
              治理的交叉点上。考虑到企业 AI 采用正在加速，这一定位具有战略意义。
            claimRefs:
              - CE005
              - CE006
              - CE007
              - CE008
