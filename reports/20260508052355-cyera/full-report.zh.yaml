      - - Varonis (VRNS)
        - $650M ARR (FY2024)
        - ~$4B 市值
        - 5–7x NTM 收入
        - 最接近的 DSPM 可比；本地部署架构
        - 本地部署 vs 云原生；相较 Cyera，Varonis 增长更慢、流失更高，倍数受压
      - - Wiz（未上市）
        - $500M ARR（估计 Dec 2024）
        - $12B 估值（Series E）
        - ~24x ARR（隐含）
        - 专注云安全的独角兽，毗邻 CSPM/CNAPP
        - CSPM/CNAPP 为主；DSPM 是次要；缺少公开文件做直接可比
      - - Lacework（未上市，困境）
        - ~$150M ARR（估计）
        - 以 ~$1.5B 被收购（2024）
        - 退出时 ~10x ARR
        - 未能跑出超大规模增长的 CNAPP 同业；警示性可比
        - 产品重点和失败模式不同；提示若无法盈利规模化，倍数压缩风险
    enumerationScope:
      coverage: partial
      basis: >-
        Six comparables spanning closest DSPM peers (Varonis), cloud security peers (Palo Alto, CrowdStrike, Zscaler,
        Wiz), and a cautionary comparable (Lacework). Private ARR figures are analyst and press estimates, not audited.
    notes: >-
      市值和 ARR 数据来自 Yahoo Finance（finance.yahoo.com）、Stock Analysis（stockanalysis.com）和
      PitchBook（pitchbook.com）。来源：SV002（PANW）、SV003（CRWD）、SV004（ZS）、SV005（VRNS）、SV006（PANW 财务）、SV007（CRWD 财务）、SV008（ZS
      财务）、SV009（VRNS 财务）、SV010（PitchBook 私募可比数据）。
    claimRefs:
      - CV003
      - CV004
      - CV009
      - CV010
      - CV012
  - id: TV005
    title: 投资逻辑破裂与否决触发器
    columns:
      - 触发器
      - 阈值
      - 对投资逻辑的传导
      - 行动含义
    rows:
      - - Palo Alto 原生 DSPM 发布
        - RSA 2026 推出 Prisma Cloud DSPM 功能，并达到云扫描持平
        - 消除 Cyera TAM 中约 30% 的核心差异化（PANW 存量客户群）
        - 降低敞口；加快二级市场出售时间表
      - - NRR 降至 110% 以下
        - 连续两个季度披露 NRR < 110%
        - 增长模型破裂；90x ARR 倍数需要 130%+ NRR 才能维持
        - 触发投资逻辑破裂复核；要求与 CFO 进行队列数据电话会
      - - 重大安全泄露
        - 任何公开披露、涉及客户凭证访问或敏感数据外泄的安全事件
        - DSPM 品类信任被摧毁；ARR 可能立即流失 30–50%
        - 全面退出，或以任何可得价格做二级市场对冲
      - - IPO 窗口关闭
        - 12+ 个月内没有可行的公开市场 IPO 路径
        - 收购退出成为主要选项；战略买家可能折价到 $4–6B
        - 以平价估值谈判过桥；跟踪战略 M&A 对话
      - - ARR 增长低于 50% YoY
        - FY2026 ARR 增速低于 50%（低于 $150M 阈值）
        - 增长低于 50% 时，公开市场倍数压缩到 6–8x；$9B 进入价无法回收
        - 投资逻辑失败；以可得价格通过二级市场退出
    enumerationScope:
      coverage: exhaustive
      basis: >-
        Five trigger conditions covering competitive, financial, operational, and market-access risks that would break
        the Series D thesis; each has a clear threshold and required action.
  - id: TV006
    title: 最终尽调要求
    columns:
      - 主题
      - 缺失证据
      - 重要性
      - 负责人 / 尽调路径
    rows:
      - - ARR 和 NRR 明细表
        - 经审计的按季度 ARR（按队列），包括按年份划分的 NRR
        - 核心模型假设：130% NRR 未经审计；队列侵蚀会彻底击穿乐观情景
        - CFO：要求进入资料室，获取经审计收入明细和队列留存表
      - - SOC 2 Type II 范围
        - 完整审计报告，包括系统边界、控制例外和保留意见
        - 监管型买方要求无保留 SOC 2 Type II；范围缺口在销售节点形成法律责任
        - CISO/CTO：要求完整 SOC 2 Type II 报告，含 AWS/Azure/GCP 范围覆盖细节
      - - FedRAMP 授权时间表
        - 正式 FedRAMP 授权计划，含目标授权日期和赞助机构
        - 没有 FedRAMP，联邦民用和 DoD 市场（$3–4B TAM 细分）对 Cyera 关闭
        - 联邦销售 VP/GC：要求 FedRAMP 项目计划和赞助机构 MOU
      - - Trail Security DLP 整合完整性
        - Omni DLP 整合技术里程碑完成报告及 GA 就绪日期
        - DLP+DSPM 平台叙事支撑 Series D 溢价；若整合仍处 pre-GA，平台说法就是产品未到位、营销先行
        - CTO：要求整合路线图，以及来自 3+ 企业客户的 POC 验收测试结果
      - - 清算优先权瀑布
        - Series A–D 优先股堆叠、ESOP 池、完全摊薄股权结构表及转换条款
        - Series D 回报测算需要厘清清算优先权 vs 参与分配；可能完全吃掉普通股回报
        - 总法律顾问：要求完全摊薄股权结构表、清算优先权明细和 ESOP 悬空分析
      - - 客户集中度
        - 前 10 和前 20 大客户 ARR 拆分；行业集中度表
        - 若前 5 大客户占 ARR 40%+，单一客户流失会造成显著 NRR 波动
        - CFO：要求客户集中度表；追问客户身份公开披露计划
    enumerationScope:
      coverage: exhaustive
      basis: >-
        Six final diligence topics are the minimum required before co-investing at the $9B Series D valuation; each
        represents information asymmetry that directly affects the return model.
