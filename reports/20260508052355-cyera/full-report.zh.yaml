      - number: '6.2'
        title: 客户增长与采用轨迹
        blocks:
          - type: paragraph
            body: >
              Cyera 的客户增长轨迹必须从融资节奏、员工增长和分析师评论量推断，而不是从披露的客户数量得出。Gartner Peer Insights 显示 130+
              条企业评论——对一家成立四年的安全创业公司来说，这一评论量异常高，说明客户新增速度持续。G2 显示 9 条评论，另有一组以集成为核心的评分（13 个评分）；企业（>1,000 名员工）评论者主导了活跃买家画像。


              员工数从 Series C（2023 年 10 月）时约 200 人增长到 Series F（2025 年 12 月）时 800+ 人，这是客户增长速度最直接的指标：在企业 SaaS
              中，销售、客户成功和解决方案工程团队规模通常跟随收入增长。26 个月内总员工数增长 4 倍，且创收职能估计有 150–200 人，说明公司已在规模化新增客户。


              地域扩张正在推进：Cyera 开设了欧洲办公室并提供 EU 数据驻留，说明 EMEA 企业客户在客户基础中的占比正在上升。公司的 GDPR 合规基础设施和 EU
              托管部署选项支持欧洲企业入驻。根据公开信号，Asia-Pacific 覆盖似乎有限，不过尚未确认正式 APAC 入市公告。2024–2025 年的客户增长是关键阶段，对应估值从 $1.4B 跳升至
              $9B，意味着收入加速集中在这一时期。
            claimRefs:
              - CU005
