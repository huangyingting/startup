  - id: TM001
    title: 市场定义表
    columns:
      - 维度
      - 描述
    rows:
      - - 品类名称
        - 数据安全态势管理（DSPM）
      - - 正式提出方
        - Gartner——2022 数据安全 Hype Cycle
      - - 核心功能
        - 自动发现、分类云端数据，监控并修复风险
      - - 部署模式
        - 无代理、云原生；通过 API 接入数据存储
      - - 相比 DLP
        - DLP = 防止数据在网络出口流出；DSPM = 管理云端静态数据态势
      - - 相比 CNAPP
        - CNAPP 保护云工作负载 / 基础设施；DSPM 在其上增加数据感知层
      - - 相比数据治理 / 目录
        - 数据治理面向业务价值做数据目录；DSPM 评估安全态势和风险
      - - 关键差异点
        - 无需预标记或代理，就能自动发现云端敏感数据
      - - 主要监管触发因素
        - GDPR、CCPA/CPRA、HIPAA、EU AI Act、SOC 2、ISO 27001、PCI-DSS 等合规框架
      - - 主要买方
        - 云数据足迹显著的企业，由 CISO + CDO 共同发起采购
    notes: 定义综合 Gartner、Wiz Academy、Varonis 博客和 Palo Alto Cyberpedia，截至 2025 年 H1。随着 CNAPP 和数据治理平台向 DSPM 扩张，相邻品类边界仍在变化。
    enumerationScope:
      coverage: partial
      basis: >
        Category definition derived from Varonis, Wiz, Orca Security, and Palo Alto Networks educational content;
        Gartner's 2025 Market Guide (via Cyera blog); and competitive comparison articles. No access to the primary
        Gartner 2025 Market Guide document.
    claimRefs:
      - CM001
      - CM002
      - CM015
      - CM029
