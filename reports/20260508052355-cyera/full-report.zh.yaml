              融资是事实，但这些数字是否由底层收入基本面支撑，还是代表私有市场亢奋，需要通过经审计管理账进入数据室验证。任何基于 Cyera 财务画像的投资或战略决策，都应以确认的 ARR、NRR 和单位经济模型为前提。
