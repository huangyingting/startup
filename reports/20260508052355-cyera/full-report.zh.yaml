      - number: '5.3'
        title: 产品模块与工作流覆盖
        blocks:
          - type: paragraph
            body: >
              Cyera 产品分为四个主要模块，其中 Omni DLP 模块来自 2024 年收购 Trail Security。核心 DSPM
              模块负责数据发现、分类、风险优先级排序和态势建议。风险优先级排序结合数据敏感度评分、暴露水平（谁能访问、是否过度授权）以及合规语境，为安全团队生成按风险排序的修复队列。


              Omni DLP 模块增加主动数据执行能力：基于政策的控制可阻止未经授权的数据流动，监控邮件和协作渠道中的数据外泄，并与 SIEM 平台集成事故响应工作流。这使 Cyera 从纯发现和报告工具，升级为统一的
              DSPM+DLP 方案，相比仅做 DSPM 的独立平台显著扩大了可服务用例。


              工作流集成是关键产品能力。Cyera 接入核心安全运营栈——Microsoft Sentinel（SIEM）、ServiceNow（ITSM / 工单）、Okta（身份）、CrowdStrike（EDR）、AWS
              Security Hub 和 Jira（项目管理）——支持自动创建修复工单、触发 SOAR 剧本，并做结合身份的风险归因。这些集成让 Cyera
              输出的风险能进入既有工作流，而不是要求安全团队另管一套修复流程；这对大规模企业采用很关键。
            claimRefs:
              - CE009
