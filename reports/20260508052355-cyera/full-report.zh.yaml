      - number: '6.4'
        title: 客户留存与满意度评估
        blocks:
          - type: paragraph
            body: >
              Cyera 未公开披露客户留存。参考可比平台和产品特征推断，NRR 可能为 110–130%，主要由数据量增长扩大计费范围，以及模块加购机会（Omni DLP、AI Security 模块）驱动。Gartner
              Peer Insights（4.7/5.0）和 TrustRadius 的客户满意度分数显示，完成评论的客户部署满意度较高，不过评论平台答复者本身偏向满意客户。


              客户评论中的反复满意主题包括：数据发现准确性（发现“我们都不知道自己拥有的数据”）、仪表盘易用性和快速达成价值持续获得好评。批评主题包括 DLP 成熟度（Trail 前）、平台稳定性（卡顿 /
              宕机）和旧系统集成复杂。整体情绪模式符合这样一个产品：核心 DSPM 价值很强，但 DLP、AI 安全、本地覆盖等宽度还在并购和功能投入后快速成熟。


              衡量留存质量的一个有意义代理指标，是合规周期制造的续约紧迫性：组织若用 Cyera 支撑 PCI DSS、HIPAA 或 GDPR 年度认证流程，中途更换供应商会造成显著运营扰动。围绕 Cyera
              分类输出搭建的合规工作流——审计报告、证据包、修复队列——形成切换成本锁定，在产品质量之外提供自然留存压力，支撑 NRR 高于单看产品满意度分数所暗示的水平。
            claimRefs:
              - CU014
              - CU015
              - CU016
              - CU017
