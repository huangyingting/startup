              - CR014
              - CR015
              - CR016
      - number: '7.5'
        title: 终止投资标准与风险缓释评估
        blocks:
          - type: paragraph
            body: >
              Cyera 品类逻辑最关键的终止标准是 CNAPP 市场份额：如果 Wiz、Palo Alto 和 Orca 到 2027 年通过捆绑平台经济，合计拿下超过 60% 的企业新增 DSPM 部署，独立 DSPM
              可服务市场可能收缩到不足以支撑 $27B+ 退出的规模。该指标应通过分析师调查（Gartner、Forrester）和竞争 win/loss 数据按季度跟踪。


              第二个终止标准是 Microsoft Purview AI 分类达到同等水平：如果 Microsoft 到 2026–2027 年在 Microsoft 365 和 Azure 环境内实现与 Cyera 相当的
              AI 分类准确度，Cyera 在最大单一企业云环境中的准确度优势（Microsoft 覆盖 80%+ 企业部署）可能被侵蚀，削弱其面向最大市场分层的核心技术差异化。


              已有缓释因素：Cyera Series F 的 $9B 估值和估计 $700M+ 现金头寸，为其穿越竞争压力提供了充足跑道。AI Security 模块和 Omni DLP 整合让 Cyera 从纯 DSPM
              扩展到更广平台，收入基础更不容易受到 DSPM 商品化影响。Gartner Customers' Choice 身份和 4.7/5.0 评分持续提供销售可信度，竞品很难快速复制。创始团队的 Unit 8200
              背景也在企业 CISO 买家中形成技术可信度光环，不容易被 IT 导向供应商的平台捆绑替代。
            claimRefs:
              - CR018
              - CR019
              - CR020
              - CR021
              - CR022
