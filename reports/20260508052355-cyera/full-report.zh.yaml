  - id: FE001
    title: 产品架构图
    type: dag
    layout: wide
    summary: |
      这张有向无环图展示 Cyera 平台的数据流：从客户云环境进入无代理发现层，
      再到 AI 分类引擎、风险态势评估，以及修复工作流集成输出。
    sourceRefs:
      - SE001
      - SE002
    data:
      nodes:
        - id: n1
          label: 客户数据源
          detail: AWS S3/RDS、Azure Blob/SQL、GCP BigQuery、Snowflake、M365、Salesforce、本地 NAS
          group: input
        - id: n2
          label: 无代理发现层
          detail: 只读 API 连接器；枚举数据存储，抽样内容，映射权限
          group: platform
        - id: n3
          label: AI 分类引擎
          detail: 100+ 类数据类型策略；ML + NLP + LLM 集成；声称精度 95%+
          group: platform
        - id: n4
          label: 访问图谱与风险引擎
          detail: 把敏感度、访问权限和监管语境关联起来，生成风险分数
          group: platform
        - id: n5
          label: Omni DLP（Trail Security）
          detail: 策略执行；外泄监控；电子邮件 / 云 DLP 执行
          group: platform
        - id: n6
          label: AI 安全模块
          detail: AI 训练数据风险；RAG 管线监控；LLM 暴露治理
          group: platform
        - id: n7
          label: 修复与集成层
          detail: Sentinel、ServiceNow、Okta、CrowdStrike、Jira、AWS Security Hub 等集成
          group: output
      edges:
        - from: n1
          to: n2
          label: API / OAuth 连接器
        - from: n2
          to: n3
          label: 数据样本和元数据
        - from: n3
          to: n4
          label: 分类结果
        - from: n4
          to: n5
          label: 用于策略执行的风险上下文
        - from: n4
          to: n6
          label: AI 数据暴露信号
        - from: n4
          to: n7
          label: 按风险排序的修复队列
        - from: n5
          to: n7
