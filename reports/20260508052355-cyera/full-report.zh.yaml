      - number: '2.4'
        title: 监管顺风与合规驱动因素
        blocks:
          - type: paragraph
            body: >
              监管环境是 DSPM 最持久的单一需求驱动因素。GDPR 自 2018 年 5 月以来累计罚款超过 €4B，高知名度数据泄露之后执法仍在升级。GDPR
              的数据映射和隐私设计要求，让自动化数据发现成为跨国企业的运营必需。CCPA 及其 CPRA 修订案对在加州经营的企业施加消费者数据权利和泄露通知义务，实际上要求企业具备数据分类能力。HIPAA 的
              Security Rule 要求覆盖实体保护电子受保护健康信息（ePHI），使医疗成为 DSPM 采用紧迫性最高的垂直行业。


              EU AI Act 将在 2026 年全面执行，对 AI 训练数据集提出数据治理要求：组织必须证明用于高风险 AI 系统的数据已被适当分类、完成偏见评估，并按照书面政策保留。由此出现一个净新增 DSPM
              用例——AI 训练数据治理——直接利好 Cyera 平台。EU AI Act 适用于向 EU 消费者提供 AI 系统的任何实体，因此是全球性合规驱动因素。


              美国 SEC 的网络安全披露规则（2023 年 12 月生效）要求重大网络安全事件在四个工作日内披露。这把泄露检测和数据暴露感知提升为董事会层面的治理义务，增加 CISO 在主动态势管理上的预算。Cloud
              Security Alliance 的 2024 Top Threats 报告将不安全接口和云存储配置错误列为最主要攻击向量，进一步强化了持续 DSPM 监控的技术理由。
            claimRefs:
              - CM009
              - CM010
              - CM011
              - CM012
              - CM013
              - CM023
      - number: '2.5'
        title: 竞争格局与市场约束
        blocks:
          - type: paragraph
            body: >
              DSPM 竞争格局包括专门打造的纯玩家（Cyera、BigID）和把 DSPM 能力加入既有云安全或数据平台的平台型厂商（Wiz、Orca Security、Varonis、Microsoft
              Purview、Google Cloud DLP、Palo Alto Networks）。这种二分结构带来不同的竞争动态：纯玩家提供更深的 DSPM 功能和独立部署，平台厂商则把 DSPM
              打包成捆绑功能，降低增量预算要求。


              DSPM 市场增长最大的约束，是云超大规模厂商提供免费或低成本的 DSPM 邻近能力。AWS Macie、Microsoft Purview 和 Google Cloud DLP
              都是原生工具，能满足合规成熟度较低组织的基础数据发现需求，不需要增量支出。这限制了中端市场的定价权，迫使纯玩家在深度、准确性、跨云覆盖和修复工作流上竞争。


              其他市场约束包括受监管行业漫长的采购周期（通常 6–9 个月）、买方把 DSPM 与 DLP 或 CASB 混淆造成的市场教育缺口、与既有 IAM、SIEM
              和工单系统的集成要求，以及更成熟的终端和网络安全投资对安全预算的争夺。M&A 整合——包括 Fortinet 收购 Lacework——显示平台整合仍在推进，较大型安全厂商可能收购 DSPM
              纯玩家，而不是自建独立能力。
            claimRefs:
