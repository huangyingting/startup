            - 中（集成风险）
            - 高（DLP 差异化）
            - 低（收购无法逆转）
            - 中高
  - id: FV001
    title: 推荐逻辑流程
    type: dag
    description: 从证据到投资建议的决策链
    data:
      nodes:
        - id: n1
          label: 市场规模
          detail: 2028 年 DSPM TAM 超过 $10B；云端数据激增；监管强制要求
          group: positive
        - id: n2
          label: 产品护城河
          detail: 无代理、API 原生 DSPM；200+ 个连接器；AI 分类；没有代理部署摩擦
          group: positive
        - id: n3
          label: 收入验证
          detail: 2024 年 Q4 ARR 达 $100M；12 个月增长 6x；据报 NRR >130%
          group: positive
        - id: n4
          label: 竞争风险
          detail: Palo Alto、Wiz、Microsoft 捆绑风险；12–18 个月内可能追平功能
          group: risk
        - id: n5
          label: 估值风险
          detail: $9B = 45–90x ARR；高于所有上市同业；乐观情景隐含回报持平
          group: risk
        - id: n6
          label: 建议
          detail: 有条件持有：关注 $5.4–6.3B 二级市场交易（折价 30–40%）
          group: neutral
      edges:
        - from: n1
          to: n6
          label: 支撑
        - from: n2
          to: n6
          label: 支撑
        - from: n3
          to: n6
          label: 支撑
        - from: n4
          to: n6
          label: 限制
        - from: n5
          to: n6
          label: 约束
  - id: FV002
    title: 估值对 ARR 与倍数的敏感性
    type: bar
    description: 按 2027 年 ARR 情景和不同 NTM 收入倍数推算的隐含退出估值
    data:
