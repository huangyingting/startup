      - number: '5.5'
        title: 技术路线图与开发轨迹
        blocks:
          - type: paragraph
            body: >
              Cyera 的产品路线图显示，公司会沿三条线继续扩展：(1) 与 AI 开发工具链（Hugging Face、Vertex AI、Azure OpenAI Service）做更深平台集成，扩大 AI
              Security 治理覆盖；(2) 扩大 SaaS 数据存储覆盖，处理协作平台（Zoom、Notion、Box）中的影子数据；(3) 扩展国际数据驻留选项，服务受本地数据主权要求约束的欧洲和 APAC 企业客户。


              收购 Trail Security 是公司最重要的非有机产品开发，为此前偏发现和报告的平台加入执行能力。把 Trail 的 Omni DLP 与 Cyera 发现层整合起来技术复杂：要把 Trail
              的执行政策映射到 Cyera 的数据分类体系，需要双向传递数据上下文，而传统孤岛式 DLP 产品并不支持。此次整合能否成功，是 2025–2026 年关键产品开发里程碑。


              技术限制和待解开发问题包括：(1) 超大数据资产的规模处理（petabyte 级对象存储、数十亿对象）——竞品批评暗示这可能是工程瓶颈；(2) 本地文件服务器覆盖深度——Cyera 的云原生架构让
              NAS/Windows file server 扫描在架构上比云 API 扫描更复杂；(3) 面向持续合规监控用例的实时事件流监控，而不仅是基于周期扫描的发现；(4) 面向 MSSP
              托管服务部署的多租户支持，这要求在数据分类层做客户隔离。
