      - number: '2.3'
        title: 买方细分与采用模式
        blocks:
          - type: paragraph
            body: >
              DSPM
              的主要买方画像是首席信息安全官（CISO），在高度受监管行业中，常由首席数据官（CDO）或副总裁级合规负责人共同推动。金融服务、医疗、技术和零售率先在企业中采用，原因是这些行业收集和存储的敏感数据密度高、监管义务重，云成熟度也更高。这些垂直行业的
              CISO 必须在监管审计（SOC 2、ISO 27001、PCI-DSS）中证明数据可控，并在 M&A 交易中满足外部律师主导的数据映射要求。


              一个值得注意的新买方画像正在出现：AI 团队或 CTO 组织需要 DSPM，根据 EU AI Act 治理训练数据集，并满足部署在敏感内部数据上的企业 AI copilots 的数据治理要求。这个用例不在最初
              DSPM 市场规模测算范围内，代表一条净新增需求向量。法务和采购团队也越来越多地共同支持 DSPM 投资，以便在第三方风险评估中验证供应商的数据处理控制。


              SMB 细分（收入低于 $500M 的公司）目前仍未被包括 Cyera 在内的 DSPM 供应商充分服务；Cyera 将部署资源分配给收入约 $500M
              以上的企业账户。这个区间的云原生初创公司可能使用更轻量或云厂商原生工具。Gartner Peer Insights 显示，截至 2025 年 Q1，Cyera 在 130+ 条企业评价中的评分为
              4.7/5.0，说明其在目标企业买方层中产品市场契合度强。向 Asia-Pacific 扩张仍是渗透不足的增长机会；India 的 DPDP Act、Singapore 的 PDPA 和 Japan 的 APPI
              正在催生类似 GDPR 的需求。
            claimRefs:
              - CM006
              - CM007
              - CM008
