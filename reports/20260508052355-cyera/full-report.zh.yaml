  - number: 7
    title: 风险
    sections:
      - number: '7.1'
        title: 监管与法律风险评估
        blocks:
          - type: paragraph
            body: >
              Cyera 所处的监管环境既是最大需求驱动，也是最大合规约束。公司处理的是跨 GDPR、CCPA、HIPAA、PCI DSS 和 EU AI Act 监管辖区的企业敏感数据元数据。作为通过只读 API
              访问企业云环境的云安全供应商，Cyera 自身作为数据处理者承担重大监管义务：Cyera 内部系统一旦被攻破，可能暴露数千家企业客户敏感数据的元数据地图——即便不存储实际客户数据，这些地图本身也高度敏感。


              GDPR 要求 Cyera 作为 EU 客户的数据处理者，在 72 小时内通知数据泄露。Cyera
              基础设施发生安全事件后，需要快速通知客户、监管机构，并可能向媒体披露——这是非对称声誉风险：公司的核心价值主张就是数据安全，因此任何供应商侧泄露都会尤其伤害客户信任。


              EU AI Act 自 2026 年 8 月开始执行，可能给 Cyera 的 AI Security 模块带来产品架构要求：如果该模块按法案分类规则被归为高风险 AI 系统，Cyera 就需要落地 EU AI
              Act 合规性评估、技术文档和人工监督机制。DSPM AI
              工具在该法案下如何分类尚未定论，带来监管不确定性。美国州级隐私法（California、Virginia、Colorado、Texas）正在扩张，可能要求合规报告模块按州定制——这是合规报告模块的碎片化风险。
            claimRefs:
              - CR001
              - CR002
              - CR003
              - CR004
          - type: table
            tableRef: TR001
            claimRefs:
              - CR001
              - CR002
              - CR003
          - type: figure
            figureRef: FR001
            claimRefs: []
      - number: '7.2'
        title: 运营、质量与安全风险评估
        blocks:
          - type: paragraph
            body: >
              Cyera 的核心运营风险来自架构：依赖云提供商 API 和只读访问模型，使公司受制于超大规模云厂商 API 稳定性、权限模型变化和 API 速率限制，而这些完全不在 Cyera 控制之内。如果
              AWS、Azure 或 GCP 修改认证或权限 API（常规产品更新中会发生），Cyera 的扫描覆盖可能变得不完整或中断——需要工程团队快速响应，并可能拖慢受影响客户的风险态势准确性更新。


              Trail Security 整合制造了集中的近期运营风险。把收购来的 DLP 代码库并入已正式发布的 DSPM 平台，需要双向数据模型对齐、大规模性能测试，并将客户从 Trail 原生 UI 迁移到 Cyera
              统一界面。整合延迟会让 Cyera 的 DSPM+DLP 竞争主张缺少生产级统一功能支撑，在与 Varonis（原生 DLP）和 Microsoft（捆绑 DLP）的竞争评估中制造销售摩擦。


              DSPM 供应商的安全风险是生死线：Cyera 平台持有客户云环境的 API credentials 和 OAuth tokens。如果 Cyera 的凭据管理、API key 存储或 OAuth refresh
              token 处理存在漏洞，攻击者可能获得全球企业云环境的只读访问。Cyera 持有 SOC 2 Type II，但 SOC 2 不能保证挡住专门瞄准云安全供应商的高级民族国家攻击者——这已经是已知威胁类别（例如
              SolarWinds、Okta 供应链事件）。
            claimRefs:
              - CR005
              - CR006
              - CR007
              - CR008
              - CR009
          - type: table
            tableRef: TR002
            claimRefs:
              - CR005
              - CR006
              - CR007
          - type: figure
            figureRef: FR002
            claimRefs: []
      - number: '7.3'
        title: 合作伙伴与依赖风险评估
        blocks:
          - type: paragraph
            body: >
              Cyera 最集中的外部依赖是托管在 AWS 上的云基础设施。AWS 的 99.99% SLA 覆盖大多数运营可用性场景，但客户在进行主动数据分类扫描时，会直接受 AWS 区域故障影响。历史 AWS
              故障（us-east-1 和 eu-west-1 都经历过重大故障）会中断 Cyera 扫描操作，削弱受影响客户风险态势的新鲜度。多区域 AWS 架构可缓解这一风险，但不能消除。


              超大规模云厂商 API 依赖是最具结构性的长期合作伙伴风险。如果主要云提供商（尤其是 AWS，考虑到 Cyera 的主要客户集中度）出于竞争原因限制第三方 API
              数据访问——相邻市场已发生过类似情况——Cyera 的覆盖广度可能受到实质限制。反垄断审查会约束超大规模云厂商的竞争行为，多数企业客户也采用多云架构，这些因素可缓解风险，但无法完全消除。


              关键集成伙伴（CrowdStrike、Okta、Microsoft Sentinel）是赋能性依赖：如果这些供应商修改 API 合约、弃用连接器或调整集成生态政策，Cyera
              的工作流集成可能失效，或需要大量重新工程。CrowdStrike 自身的竞争野心（Falcon Data Protection）形成特定风险：CrowdStrike 未来可能在 DSPM 领域直接竞争
              Cyera，把分销伙伴变成竞争威胁。
            claimRefs:
              - CR010
              - CR011
              - CR012
              - CR013
          - type: table
