slug: cyera
runDate: "2026-05-08"
company:
  name: Cyera
chapter:
  number: 4
  title: Financial Analysis
  summary: |
    Cyera is a private, venture-backed company that has raised approximately $1.54 billion across six rounds
    between 2021 and December 2025, most recently at a $9 billion post-money valuation in its Series F.
    The company has no publicly disclosed revenue figures, ARR, or profitability metrics. Financial estimates
    must be inferred from headcount growth (800+ employees), valuation trajectory, comparable public company
    multiples (Varonis at ~5x ARR), and typical Series F SaaS burn dynamics. Best-case estimates suggest
    ARR in the $100–250 million range as of early 2026, implying a 36–90x ARR multiple at the $9B valuation —
    elevated relative to public comps but in line with high-growth cybersecurity private market premiums.
    Capital adequacy appears sound with $1.5B+ raised; the Trail Security acquisition cost was not disclosed.
    The largest financial risk is the absence of a path to public market liquidity within 24 months, creating
    Series F investor pressure to demonstrate revenue scale for IPO readiness by 2027–2028.

sections:
  - id: SI001
    title: Funding History and Capitalization Structure
    body: |
      Cyera has executed a rapid and large-scale fundraise, accumulating $1.54 billion in disclosed funding
      in approximately four years of operation. The financing trajectory follows a compressing interval pattern
      consistent with high-velocity enterprise growth: Series A ($30M, 2021), Series B ($60M, March 2022),
      Series C ($100M, October 2023), Series D ($300M, April 2024 at $1.4B valuation), and Series F ($300M,
      December 2025 at $9B valuation). The Series E information is not publicly distinguished from the F,
      suggesting the most recent round may be labeled Series F sequentially without an intermediate public
      Series E announcement, or that Series E was an internal bridge round.

      The April 2024 Series D at $1.4 billion valuation and the December 2025 Series F at $9 billion
      valuation represent a 6.4x valuation step-up in approximately 20 months — an extraordinary pace that
      implies either explosive revenue growth, significant DSPM market re-rating, or both. Prominent investors
      include Accel Partners, Sequoia Capital, Cyberstarts, e.ventures, and Spark Capital; all five are
      top-tier funds with strong cybersecurity sector track records, adding investor quality signal to the
      valuation thesis.

      The Trail Security acquisition (announced 2024) added the Omni DLP product line, contributing
      headcount and technology. The acquisition cost has not been disclosed, but the integration appears
      strategic rather than opportunistic — adding integrated data loss prevention to complement DSPM,
      expanding Cyera's competitive surface versus Varonis's standalone DLP and Microsoft's bundled DLP.
    claimRefs: [CI001, CI002, CI003, CI004]
    tableRefs: [TI001]
    figureRefs: [FI001]

  - id: SI002
    title: Revenue Model and Monetization Mechanics
    body: |
      Cyera's revenue model is subscription-based, with enterprise pricing anchored to the volume of data
      scanned and the number of cloud environments monitored. The company does not publish list pricing;
      instead, buyers engage through a demo-first, contract-negotiation model typical of enterprise
      cybersecurity platforms. Annual contract values (ACVs) for enterprise deployments in the $500M–$10B
      revenue segment are estimated to range from $200K to $700K+ based on analyst commentary and competitive
      market benchmarks; very large enterprises (financial services, healthcare systems, global 2000) likely
      represent $1M+ ACV accounts.

      Cyera monetizes through four primary revenue streams: (1) the DSPM platform subscription covering
      cloud data discovery, classification, risk assessment, and risk prioritization; (2) the Omni DLP module
      (Trail Security acquisition) for data loss prevention policy enforcement; (3) the AI Security module
      addressing data risk in generative AI systems; and (4) professional services and implementation support.
      The company's integration ecosystem — spanning Microsoft Sentinel, ServiceNow, Okta, Crowdstrike, and
      AWS Security Hub — creates expansion revenue opportunities as customers activate additional connector
      workflows.

      Net revenue retention (NRR) is not publicly disclosed. Best-estimate inference from the company's
      cloud data security positioning, annual CISA-driven compliance renewal cycles, and the recurring nature
      of data growth (which continuously expands the billable footprint) suggests NRR likely exceeds 120%.
      Comparable public companies in data security (Varonis: ~110% NRR, Rubrik: ~125% NRR) provide the
      benchmark range.
    claimRefs: [CI005, CI006, CI007, CI008]
    tableRefs: [TI002, TI003]
    figureRefs: [FI002]

  - id: SI003
    title: Revenue Scale Estimation and ARR Inference
    body: |
      Because Cyera is private and has not disclosed revenue, ARR must be estimated from correlated
      indicators. The most reliable triangulation uses three approaches: (1) valuation/multiple analysis
      comparing Cyera's $9B valuation to public comp multiples; (2) headcount-based revenue estimation
      using SaaS industry benchmarks; and (3) financing timing analysis comparing round timing, pace, and
      amounts to comparable company progressions.

      Valuation-to-ARR multiple analysis: Cyera's closest public comp is Varonis, trading at approximately
      4–6x ARR (currently ~$3B market cap on $619M ARR). Applying a 20–50% private growth premium to
      Varonis multiples implies Cyera would need $100M–$250M ARR to justify a $9B valuation on fundamental
      multiples alone. The broader cybersecurity growth premium thesis could support higher multiples
      (Wiz-comparable: 40–50x ARR) suggesting ARR as low as $200M at aggressive premium pricing.

      Headcount analysis: Cyera employs approximately 800 people, of which an estimated 150–200 are
      revenue-generating (sales + CS). At industry-standard revenue-per-headcount of $200K–$350K for
      high-growth enterprise SaaS, total ARR in the $100–$200M range is implied. These figures are highly
      sensitive to ACV assumptions and sales cycle length, and should be treated as rough indicative ranges
      only. No publicly accessible source confirms Cyera's ARR, and these estimates carry significant
      uncertainty.
    claimRefs: [CI009, CI010, CI011, CI012]
    tableRefs: []
    figureRefs: [FI003]

  - id: SI004
    title: Capital Adequacy and Burn Rate Assessment
    body: |
      With $1.54 billion raised and a Series F closed in December 2025, Cyera's balance sheet appears
      well-capitalized for its current operational phase. Assuming cumulative cash consumption of $400–$600M
      from inception through the Series F (consistent with a company that has grown to 800 employees in four
      years and made at least one acquisition), Cyera likely holds $900M–$1.1B in remaining cash equivalents
      post-Series F — sufficient for 3–5 years of operations at current burn rates without additional financing.

      Burn rate estimation: A company with 800 employees in enterprise software typically consumes $120M–
      $180M annually in total operating expenses when accounting for headcount costs ($100K–$180K average
      loaded cost across engineering, sales, G&A, and R&D), cloud infrastructure, facilities, and trail
      acquisition integration costs. At $150M annual burn and $1B cash, Cyera has approximately 6–7 years
      of runway, a position of significant capital strength that reduces fundraise urgency.

      The primary capital adequacy risk is not operational: it is the Series F investors' return expectations.
      A $9B valuation at Series F implies investors need a 3–5x return ($27–45B exit) to achieve target fund
      returns. This creates pressure for an IPO or strategic acquisition at $30B+ within 4–7 years, a
      challenging bar that requires sustained high-growth revenue execution through the 2027–2030 window.
    claimRefs: [CI013, CI014, CI015, CI016]
    tableRefs: [TI004]
    figureRefs: [FI004]

  - id: SI005
    title: Financial Risks, Gaps, and Comparable Market Context
    body: |
      The most critical financial risk is information asymmetry: Cyera's status as a private company means
      that revenue scale, profitability, cash position, and key SaaS health metrics (churn, NRR, CAC payback)
      are entirely undisclosed. Prospective investors and customers are forced to rely on valuation signals
      (Series F at $9B), headcount signals (800+ employees), and product signals (Gartner recognition) rather
      than fundamentals-based financial analysis. This opacity is standard for late-stage private unicorns
      but represents elevated diligence risk compared to publicly traded competitors like Varonis.

      Comparable company market context: Varonis (VRNS) demonstrated that DSPM-adjacent data security can
      sustain $600M+ ARR and reach public market viability. Rubrik's April 2024 IPO at $5.6B valuation
      (on ~$790M ARR) validates cyber resilience as a public-market-eligible category, though Rubrik trades
      at a lower multiple than Cyera's implied private premium. SailPoint's return to public markets in 2025
      (valued at ~$12B at IPO) signals that identity and data security platforms at scale command premium
      public market multiples. Cyera's implied path mirrors SailPoint's: build to $400–600M ARR with strong
      NRR, then IPO in the 2027–2028 window.

      The Trail Security DLP acquisition represents a financial risk factor that requires disclosure: the
      acquisition price, goodwill impairment exposure, and revenue contribution from Trail have not been
      disclosed. If Trail was acquired for >$50M, the dilution and integration cost could be material to
      Cyera's capital efficiency ratios, and any Trail customer churn post-acquisition would affect revenue
      trajectory.
    claimRefs: [CI017, CI018, CI019, CI020, CI021]
    tableRefs: [TI005]
    figureRefs: []

