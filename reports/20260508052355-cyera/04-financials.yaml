callouts:
  - calloutType: risk
    title: "Complete financial opacity is the dominant diligence risk"
    body: |
      Cyera has disclosed zero financial KPIs — no ARR, no NRR, no revenue growth rate, no burn rate.
      All financial estimates in this chapter are analyst triangulations with low confidence. The $9B
      valuation and $1.54B raised are factual, but whether they are justified by underlying revenue fundamentals
      or represent private market exuberance requires verified data room access. Any investment or strategic
      decision based on Cyera's financial profile must be conditioned on confirmed ARR, NRR, and unit
      economics from audited management accounts.
    claimRefs: [CI017, CI018, CI019, CI020]

  - calloutType: insight
    title: "6.4x valuation step-up in 20 months requires explanation"
    body: |
      The Series D at $1.4B (April 2024) to Series F at $9B (December 2025) in 20 months implies either
      extraordinary revenue growth (e.g., from ~$40M to ~$150M+ ARR), a market re-rating of DSPM multiples,
      or both. This pace exceeds most precedent in enterprise cybersecurity; the most plausible explanation
      is a combination of strong ARR growth (3–4x in the period) and DSPM category market premium expansion
      driven by AI security governance demand.
    claimRefs: [CI001, CI002, CI009]

  - calloutType: strength
    title: "Capital position provides exceptional operating leverage"
    body: |
      With an estimated $700M–$1.1B in remaining cash and a 4–9 year runway at current burn rates, Cyera
      is exceptionally well-capitalized relative to stage. This capital position allows aggressive enterprise
      sales hiring, M&A strategy, and international expansion without near-term fundraising pressure — a
      structural advantage over less-capitalized pure-play DSPM competitors.
    claimRefs: [CI013, CI014, CI015]

  - calloutType: assumption
    title: "Trail Security acquisition metrics require disclosure"
    body: |
      The Trail Security acquisition added the Omni DLP product but its financial impact — purchase price,
      inorganic ARR contribution, integration cost, and customer retention — has not been disclosed. If Trail
      contributed material ARR, its carve-out from organic Cyera growth metrics is critical for accurate
      assessment. If Trail was expensive relative to ARR contribution, it could affect capital efficiency
      ratios used in IPO readiness assessment.
    claimRefs: [CI006, CI021]

