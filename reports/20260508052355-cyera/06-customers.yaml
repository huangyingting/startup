  evidenceGaps:
    - type: private-evidence-only
      severity: critical
      topic: customer-count-revenue-concentration
      missingEvidence: "Cyera has not disclosed customer count; top-10 customer revenue concentration, churn by cohort year, and module attach rates are entirely private."
      whyItMatters: "Without customer count and concentration data, the revenue quality and retention durability of the $9B valuation cannot be assessed from fundamentals. A thin customer base with high concentration is a material IPO risk."
      diligencePath: "Request total customer count, ACV distribution by tier, top-10 revenue concentration percentage, and NRR by cohort year in data room."
      relatedQuestionRefs: [QU015, QU019, QU020]
      relatedTableRefs: [TU002, TU005]

    - type: private-evidence-only
      severity: high
      topic: early-cohort-retention
      missingEvidence: "Retention of 2021–2023 vintage customers (earliest cohorts, pre-DLP, pre-AI Security) was not verifiable from public sources. This cohort had the most immature product and highest churn risk."
      whyItMatters: "If early cohort NRR is below 100%, it would signal that the company has product-fit issues it is masking with new customer growth, a red flag for long-term revenue quality."
      diligencePath: "Request cohort NRR analysis specifically for 2021, 2022, and 2023 vintages in data room. Compare to post-Trail and post-AI-Security cohorts."
      relatedQuestionRefs: [QU015]
      relatedTableRefs: [TU004]

    - type: missing-source
      severity: medium
      topic: named-customer-case-studies
      missingEvidence: "No formal named-customer case studies or press-release-endorsed customer endorsements were publicly accessible. Customer proof is limited to anonymous review platform data."
      whyItMatters: "Named customer proof is standard for enterprise software at $9B valuation; its absence may indicate NDA restrictions or customer reluctance to be publicly associated with a data security vendor — both of which are normal but reduce external validation quality."
      diligencePath: "Request customer reference list (anonymized by vertical and size) and two direct enterprise reference calls before any material decision. Ask Cyera to facilitate introductions."
      relatedQuestionRefs: [QU008, QU024]
      relatedTableRefs: [TU003]

    - type: missing-source
      severity: medium
      topic: customer-success-model
      missingEvidence: "Details of Cyera's customer success organization — staffing ratio, onboarding methodology, escalation processes — were not publicly disclosed."
      whyItMatters: "Customer success organization quality is a leading indicator of NRR quality; understaffed CS teams create expansion and retention risk at scale."
      diligencePath: "Request CS org chart, CS:customer ratio, and CSAT/NPS internal metrics in data room."
      relatedQuestionRefs: [QU018]

    - type: private-evidence-only
      severity: low
      topic: no-documented-public-churn
      missingEvidence: "No publicly documented Cyera customer churn events were identified; this absence could reflect genuine low churn or low public visibility of churn events."
      whyItMatters: "Absence of public churn evidence is weakly positive but not confirmatory; private churn data is required for definitive assessment."
