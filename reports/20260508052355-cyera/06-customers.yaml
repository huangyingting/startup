callouts:
  - calloutType: strength
    title: "130+ Gartner Peer Insights reviews are the strongest independent customer proof signal"
    body: |
      Gartner Peer Insights uses verification mechanisms including professional email validation, conflict-of-
      interest screening, and employer verification. The 130+ enterprise reviews for Cyera with 4.7/5.0 rating
      represent a statistically significant sample of real-world enterprise deployments, making it the most
      credible available customer proof signal. This review corpus reduces the risk that the company's customer
      base is shallow or that satisfaction is artificially high.
    claimRefs: [CU009, CU014]

  - calloutType: risk
    title: "Customer count opacity creates concentration and churn risk that is unmeasurable from public sources"
    body: |
      Cyera's failure to disclose customer count means that revenue concentration, early cohort churn, and
      module attach rates are entirely opaque from outside the company. At the $9B valuation, investors and
      acquirers need confirmed customer-level financial metrics to validate that the revenue base is broad and
      defensible. This is the most actionable customer-chapter diligence gap.
    claimRefs: [CU019, CU020, CU021]

  - calloutType: risk
    title: "Pre-Trail DLP immaturity and platform stability concerns from customer reviews"
    body: |
      Multiple G2 reviewers cited DLP capability immaturity and platform stability (lag, downtime) as specific
      concerns. While Trail Security's Omni DLP acquisition may have addressed the DLP gap, platform stability
      issues are operational quality problems independent of feature breadth. These reviewer criticisms represent
      the most credible adverse customer evidence available and should be investigated through customer reference
      calls before relying on Cyera's claimed satisfaction metrics.
    claimRefs: [CU012, CU013]

  - calloutType: insight
    title: "Compliance renewal cycles provide structural retention that supplements product satisfaction"
    body: |
      Organizations using Cyera for PCI DSS, HIPAA, or GDPR annual certification face meaningful operational
      disruption if they switch mid-cycle. Compliance workflows built around Cyera's classification output —
      audit reports, evidence packages, remediation queues — create switching cost lock-in that supplements
      product satisfaction as a retention driver, likely supporting NRR above 110% even among moderately
      satisfied customers.
    claimRefs: [CU016, CU017]

