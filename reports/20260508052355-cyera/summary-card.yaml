  topStrengths:
    - >-
      Agentless, cloud-native DSPM architecture with 200+ connectors eliminates deployment friction that blocks legacy
      DLP and data governance tools.
    - >-
      Exceptional ARR velocity: estimated $30M to $100M in approximately 12 months (2023–2024) is industry-leading for
      the DSPM category.
    - >-
      Regulatory demand floor from SEC Rule 33-11216, GDPR Article 33, HIPAA, and state privacy laws creates
      non-discretionary enterprise security spending.
    - >-
      Unit 8200 founding team, Gartner Customers' Choice recognition, and top-tier investor syndicate (Accel, Redpoint,
      Sequoia, Coatue, Wellington) provide strong signal quality.
    - >-
      Trail Security acquisition ($162M, October 2024) positions Cyera to expand from DSPM into DLP+DSPM convergence,
      increasing average deal size and defensibility.
  topRisks:
    - >-
      Valuation fully priced: $9B post-money implies 45–90x estimated ARR; probability-weighted expected return for
      Series D investors is approximately 0.35–0.45x, well below growth equity thresholds.
    - >-
      Competitive bundling risk from Palo Alto Networks (Prisma Cloud), Microsoft (Purview), and Wiz could erode Cyera's
      standalone positioning over 18–24 months.
    - >-
      Geopolitical R&D concentration: majority of engineering in Tel Aviv creates force majeure exposure with no
      confirmed business continuity plan for prolonged disruption.
    - >-
      Absence of FedRAMP authorization excludes Cyera from the $3–4B federal DSPM procurement opportunity; every quarter
      without authorization is a compounding growth gap.
    - >-
      No public GAAP financials: audited ARR, NRR cohort data, burn rate, and cap table are all non-public, creating
      material information asymmetry for potential investors.
  unresolvedGaps:
    - >-
      Audited ARR and cohort NRR schedule from CFO are not publicly available; all return scenarios rely on
      press-reported figures that may not match GAAP definitions.
    - >-
      Full cap table, liquidation preference waterfall (Series A–D), and ESOP overhang are non-public; break-even
      acquisition price for Series D cannot be calculated without these.
    - >-
      Trail Security DLP integration GA readiness date and technical completeness status are not confirmed; the DSPM+DLP
      platform claim is a forward-looking assertion until confirmed.
    - >-
      SOC 2 Type II audit report scope — specifically which cloud integrations and API access points are covered — is
      not publicly disclosed.
    - >-
      Customer ARR concentration table is non-public; whether top-5 customers represent 40%+ of ARR is unknown and
      creates potential single-account churn risk.
