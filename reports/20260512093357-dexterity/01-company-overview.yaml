callouts:
  - calloutType: strength
    title: Unique founder-market fit and Stanford research origin
    body: >
      Samir Menon's PhD research on control-theory models of human motor coordination directly underpins Dexterity's core product architecture. This is a rare case of founder-market fit where the founder's academic output is the product IP, reducing the gap between scientific theory and deployable engineering.
    claimRefs: [CO002, CO003]

  - calloutType: strength
    title: 100 million in-production actions create a compounding data flywheel
    body: >
      Dexterity's Foresight world model has been trained on over 100 million autonomous actions in real production environments — not simulation. This production-data advantage compounds over time: each additional deployment generates new edge-case experience that further strengthens model robustness, creating a defensible moat against later entrants who lack equivalent production coverage.
    claimRefs: [CO016, CO025]

  - calloutType: risk
    title: Commercial proof point concentration in a single named customer (FedEx)
    body: >
      Despite $291M raised and a $1.65B valuation, Dexterity's only publicly named and independently corroborated large-scale customer is FedEx. Robotics.press notes the absence of audited deployment KPIs and multiple named customer references. While the company mentions UPS and GXO, the scale and commercial status of those relationships are unverified in public sources.
    claimRefs: [CO033, CO015]

  - calloutType: risk
    title: Key-person dependency on sole disclosed CEO Samir Menon
    body: >
      All public fundraising announcements, technical vision statements, customer relationship communications, and media appearances are associated with Samir Menon alone. No other C-suite executive has been disclosed. This creates material key-person risk in a sector where execution depends heavily on leadership continuity.
    claimRefs: [CO002]

  - calloutType: insight
    title: Sumitomo's layered relationship creates a template for strategic distribution partnerships
    body: >
      Sumitomo's evolution from CVC investor (2020) to exclusive Japan distributor (2022) to co-lead in the 2025 round to JV partner (2024) illustrates a capital-efficient market entry model: the strategic investor absorbs distribution cost in exchange for equity participation. This structure could be replicated in other geographies (e.g., Europe) to expand without building a direct sales force from scratch.
    claimRefs: [CO017, CO018, CO019, CO038]

