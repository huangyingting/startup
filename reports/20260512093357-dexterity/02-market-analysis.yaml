callouts:
  - type: risk
    title: "Market size mismatch with valuation"
    body: "Dexterity's $1.65B valuation implies that investors see a path to $150-300M+ ARR. At a $1.3-1.8B US+Japan SOM (truck loading only), this requires 10-20% market penetration — aggressive for an early-stage company with a ~$21M ARR estimate. Expansion into adjacencies (palletizing, depalletizing, sortation) and geographies (EU, rest of Asia) is the implicit bull thesis."
    claimRefs: [CM035, CM010, CM004]

  - type: insight
    title: "Labor shortage as the irreversible driver"
    body: "The structural labor shortage in US and Japanese warehouse logistics — driven by demographics and immigration trends, not cyclical conditions — is the market force most likely to sustain Dexterity's demand pipeline regardless of macroeconomic conditions. This is the thesis's structural moat: the problem does not go away."
    claimRefs: [CM020, CM023]

