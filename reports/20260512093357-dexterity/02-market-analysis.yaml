  claims:
    - id: CM001
      statement: "The warehouse robotics market boundary for this analysis includes autonomous mobile robots (AMRs), articulated robotic arms, AI-guided automated guided vehicles (AGVs), and orchestration software; it excludes conventional forklifts without autonomy, pure WMS software, and non-robotic conveyor systems."
      type: observed
      topic: market-boundary
      sourceRefs: [SM001, SM004]
      confidence: medium
      freshness: current
      answersQuestionRefs: [QM001]

    - id: CM002
      statement: "The status-quo substitute for autonomous truck loading is manual dock labor; industry sources and the US Bureau of Labor Statistics confirm that transportation and material-moving workers face above-average injury rates in logistics, and dock workers at major carriers earn $25-$40 per hour, making labor cost and safety compliance structural incentives for automation."
      type: inferred
      topic: market-boundary
      sourceRefs: [SM003, SM021, SM027]
      confidence: medium
      freshness: current
      answersQuestionRefs: [QM002]

    - id: CM003
      statement: "Analysts define three overlapping sub-markets: (1) warehouse robotics focused on hardware (AMRs, arms, AGVs); (2) warehouse automation encompassing hardware and software including AS/RS; and (3) automated truck loading systems as a distinct sub-segment. The broad market yields a larger TAM; the narrow segment yields a more precise SAM applicable to Dexterity's current product."
      type: observed
      topic: market-boundary
      sourceRefs: [SM004, SM016, SM001]
      confidence: medium
      freshness: current
      answersQuestionRefs: [QM005, QM020]

    - id: CM004
      statement: "GM Insights estimated the global warehouse robotics market at approximately USD 14.7 billion in 2024, projected to reach USD 17.6 billion in 2025 and USD 117.3 billion by 2034 at a CAGR of 23.1%."
