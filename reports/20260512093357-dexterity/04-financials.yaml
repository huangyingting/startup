company:
  name: Dexterity
chapter:
  number: 4
  title: Financials
  summary: >
    Dexterity operates a Robots-as-a-Service (RaaS) subscription model that generates
    predictable recurring revenue from enterprise logistics customers (FedEx, UPS, GXO,
    Sagawa), but no financial metrics—revenue, gross margin, burn, or unit economics—are
    publicly disclosed. Third-party estimates place ARR at $57–$66M with a ~25x
    valuation/revenue multiple. The company has raised $291M total ($95M in March 2025),
    implying 12–24 months of estimated runway at typical robotics-startup burn rates of
    $5–$15M/month. Hardware-intensive RaaS creates meaningful capital intensity: Dexterity
    must manufacture, deploy, and maintain robots at its own expense before recovering cost
    through subscription revenues. Comparable public data from Symbotic (21% gross margin
    on $2.25B FY2025 revenue) suggests warehouse robotics scale-up is margin-dilutive early.
    The primary diligence priority is obtaining ARR by customer, gross margin, hardware cost
    per deployment, and burn trajectory before any new financing commitment.

sections:
  - id: SI-REV
    title: Revenue Model and Pricing Architecture
    body: >
      Dexterity generates revenue almost entirely through its RaaS (Robots-as-a-Service)
      subscription model, whereby enterprise customers pay ongoing fees that bundle hardware
      deployment, software licensing, maintenance, and support rather than purchasing robots
      outright. This design intentionally shifts capital expenditure from the customer's
      balance sheet to Dexterity's, eliminating the large upfront barrier that historically
      slowed enterprise robotics adoption. The model creates predictable recurring revenue
      aligned with operational uptime and throughput commitments; if performance drops,
      economics deteriorate for Dexterity, not the customer. While Dexterity does not
      publicly disclose list pricing, third-party estimates and industry benchmarks suggest
      per-site contract values in the $1–5M ARR range for large-format trailer loading
      and unloading operations. Initial integration and non-recurring engineering (NRE) fees
      may supplement the base subscription for complex deployments. Revenue recognition
      follows subscription accrual over the performance period; any upfront NRE fees are
      likely recognized over the initial contract term.
    tableRefs:
      - TI001
      - TI002
    figureRefs:
      - FI001
    claimRefs:
      - CI001
      - CI002
      - CI003
      - CI012
      - CI017
      - CI023

  - id: SI-GTM
    title: Go-to-Market and Sales Efficiency
    body: >
      Dexterity pursues an enterprise direct sales model targeting the top tier of global
      logistics operators—carriers and 3PLs with high-volume parcel or pallet throughput
      where the automation ROI is clearest. Named customers FedEx, UPS, and GXO represent
      the Tier-1 integrator segment. The Dexterity-SC joint venture with Sumitomo Corporation
      expands addressable reach into Japan, where Sumitomo maintains relationships with over
      1,400 warehouse operators, providing a structured distribution channel without the full
      burden of direct enterprise sales in an unfamiliar market. Sales cycles in warehouse
      automation typically run 12–18 months for enterprise deals, reflecting procurement
      committee processes, site design reviews, and pilot validation requirements before
      full commercial rollout. CAC and payback period are not publicly disclosed; headcount
      data suggesting ~$327K revenue per employee implies a reasonably lean sales structure
      for the current scale, but this metric is sensitive to estimated-revenue quality. The
      company's 100M+ cumulative autonomous actions provide proof-of-performance for reference
      selling but require auditable customer case studies to carry diligence weight.
    tableRefs:
      - TI003
    figureRefs:
      - FI002
    claimRefs:
      - CI017
      - CI018
      - CI020
      - CI021
      - CI022
      - CI028
      - CI030

  - id: SI-COST
    title: Cost Structure and Unit Economics
    body: >
      Dexterity's cost structure is distinguished by high upfront capital intensity relative
      to pure-software peers. Manufacturing robot hardware (arms, controllers, perception
      systems) requires supply-chain management and assembly costs that appear on Dexterity's
      balance sheet as inventory or capitalized assets under the RaaS model. Ongoing service
      delivery costs include on-site engineering support, hardware refresh cycles,
      compute for inference (NVIDIA GPU clusters or cloud), and network connectivity. Physical
      AI training—using Dexterity's Foresight world model—requires substantial GPU-accelerated
      simulation and real-world data collection infrastructure, creating an ongoing R&D capex
      obligation distinct from per-deployment costs. Symbotic's reported 21% adjusted gross
      margin (FY2025) for its installed-systems warehouse robotics business provides the
      most comparable public reference point; Dexterity's manipulation-focused RaaS could
      achieve higher margins at scale if software and data flywheel effects reduce per-unit
      service costs, but hardware intensity constrains gross margins well below pure SaaS
      benchmarks (70–80%). Dexterity does not disclose gross margin or cost-per-site data;
      obtaining these figures is a pre-investment priority.
    tableRefs: []
    figureRefs:
      - FI004
    claimRefs:
      - CI007
      - CI008
      - CI009
      - CI016
      - CI024
      - CI025
      - CI031
      - CI032

  - id: SI-CAP
    title: Capital Adequacy and Financing Dependency
    body: >
      Dexterity has raised $291M in total venture funding across multiple rounds, most
      recently closing a $95M Series C in March 2025 at a $1.65B post-money valuation.
      Investors include Lightspeed Venture Partners (lead, Series C), Kleiner Perkins,
      Qualcomm Ventures, and Sumitomo Corporation—reflecting both financial and strategic
      capital. With approximately 195 employees and heavy hardware plus compute obligations,
      industry analysts estimate monthly burn in the $5–$15M range, implying 6–19 months
      of runway from the March 2025 close depending on actual spending velocity. If ARR is
      growing toward $60–$70M, growing subscription cash flows may partially offset burn,
      but hardware-intensive RaaS deployment typically requires significant working capital
      to fund new sites before subscription payments ramp. A next financing round—either
      late-stage venture, structured debt, or strategic partner capital—will likely be
      required in 2026–2027 absent a step-change in revenue scale. The Dexterity-SC joint
      venture provides a non-dilutive growth pathway in Japan with Sumitomo bearing some
      deployment costs.
    tableRefs:
      - TI004
      - TI005
    figureRefs:
      - FI003
    claimRefs:
