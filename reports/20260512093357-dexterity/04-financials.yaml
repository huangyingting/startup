callouts:
  - id: SI-CALL-01
    calloutType: risk
    title: Financial Opacity Limits Conviction
    body: >
      Dexterity has disclosed no audited financial metrics—revenue, gross margin, burn, or
      customer-level ARR—making it impossible to independently verify any of the financial
      claims in this chapter. Third-party estimates (ARR ~$63M, burn ~$10M/month) are
      plausible but unverified and could be off by 30–50%. Investors should treat all
      financial figures as directional estimates requiring confirmation in due diligence.
    claimRefs:
      - CI019
      - CI004
      - CI014

  - id: SI-CALL-02
    calloutType: risk
    title: Hardware-Intensive RaaS Creates Capital J-Curve
    body: >
      Unlike pure-SaaS companies, Dexterity must fund robot hardware, deployment, and service
      infrastructure on its balance sheet before collecting subscription revenue. Each new site
      creates a temporary negative cash contribution during ramp-up (hardware cost + integration
      > early subscription receipts). Symbotic's 21% gross margin on $2.25B revenue illustrates
      how even at scale, warehouse robotics gross margins remain well below software benchmarks.
      Fast growth in sites deployed accelerates cash consumption before the subscription flywheel
      matures, creating potential financing dependency in periods of high growth.
    claimRefs:
      - CI016
      - CI007
      - CI024

  - id: SI-CALL-03
    calloutType: insight
    title: Sumitomo JV as Capital-Efficient Growth Vehicle
    body: >
      The Dexterity-SC joint venture with Sumitomo Corporation provides access to 1,400+ Japanese
      warehouse operators through Sumitomo's existing relationships, with costs shared between the
      two parties. This structure reduces both customer acquisition cost and hardware deployment
      capital required from Dexterity's balance sheet for Japan expansion—a structurally superior
      approach to unilateral international expansion at the current capital position.
    claimRefs:
      - CI020
      - CI034
      - CI035

