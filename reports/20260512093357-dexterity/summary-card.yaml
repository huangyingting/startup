summary:
  headline: >-
    Dexterity has the most commercially validated physical AI platform in warehouse logistics, but the $1.65 B entry
    price at ~25× ARR requires a near-term Series D to sustain the capital-intensive RaaS deployment model.
  overallScore: 7.2
  recommendation: buy
  confidence: medium
  riskRating: high
  valuationStance: stretched
