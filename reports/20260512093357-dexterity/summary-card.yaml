  topStrengths:
    - >-
      Production deployments with Tier-1 logistics operators (FedEx, UPS, GXO, Sagawa Express) provide the strongest
      commercial validation in the warehouse robotics segment.
    - >-
      Proprietary Foresight world model trained on 100 M+ manipulation actions creates a compounding data moat that is
      difficult for capital-constrained rivals to replicate.
    - >-
      Japan logistics market entry via Sumitomo JV unlocks a $200 B+ market with immediate regulatory and distribution
      advantages unavailable to Western-only competitors.
    - >-
      RaaS subscription model with multi-year contracts provides revenue visibility and aligns vendor incentives with
      customer uptime, supporting long-term retention.
    - >-
      World-class investor syndicate including Kleiner Perkins, GV, and Goldman Sachs signals access to follow-on
      capital and strategic network advantage.
  topRisks:
    - >-
      Estimated burn rate of $5–15 M per month and runway of 6–19 months from March 2025 create near-term refinancing
      risk if a Series D does not close in 2026.
    - >-
      $1.65 B valuation at ~25× estimated ARR demands exceptional growth execution; hardware capital intensity
      compresses the margin for error relative to pure-software comparables.
    - >-
      NVIDIA GPU dependency for Foresight inference and Kawasaki arm supply concentration expose deployment velocity to
      single-supplier disruptions.
    - >-
      Physical AI safety incidents in production could trigger OSHA enforcement, product liability claims, and
      reputational damage that pause enterprise procurement.
    - >-
      Humanoid robot convergence (Tesla Optimus, Figure AI, 1X) could commoditize dexterous manipulation capability
      within 3–5 years, compressing Dexterity's valuation multiple.
  unresolvedGaps:
    - >-
      Dexterity has not disclosed audited ARR, recognized revenue, or gross margin; all revenue estimates are
      third-party and unverified.
    - >-
      RaaS contract terms, renewal rates, and revenue concentration by customer are not disclosed; the four known
      customers may not represent equal revenue contribution.
    - >-
      Hardware COGS, per-site capex, depreciation schedules, and full-fleet unit economics are private; the path to
      positive site-level contribution margin is unconfirmed.
    - >-
      Preference stack structure (liquidation preferences, anti-dilution provisions) for $291 M in cumulative capital is
      not public; downside scenario recoveries are uncertain.
