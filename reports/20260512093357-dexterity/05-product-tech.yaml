  - id: SE-DEPLOY
    title: Deployment, Reliability, and Safety
    body: >
      Dexterity operates a turnkey deployment model in which its engineering team manages
      site installation, commissioning, and ongoing performance optimization, leaving the
      customer to manage only the operational inbound/outbound load scheduling. Integration
      with existing warehouse management systems (WMS) occurs through the IRIS API, which
      auto-discovers hardware and provides a vendor-neutral command interface. Typical
      deployment cycle for a new site includes structural assessment, IRIS hardware
      registration, safety zone demarcation, and model calibration against site-specific
      carton profiles before live operation begins. Dexterity's stated MTBF for the Mech
      hardware platform exceeds 10 years under normal logistics operating conditions, with
      rated environmental tolerances of 0–50°C and up to 90% relative humidity.
      Reliability targets are 99%+ system uptime across commercial deployments, with at
      least one production deployment reporting 99.5% pick-and-place accuracy. Field
      telemetry from deployed Mech units continuously updates the Foresight model, creating
      an incremental improvement loop that benefits all subsequent deployments.
      Safety architecture relies on Beckhoff USA-supplied automation and safety electronics,
      implementing FSoE (Functional Safety over EtherCAT) at SIL 3 / PLe level for all
      safety-critical axes. The system is designed to ISO 10218 (industrial robot safety)
      and ISO/TS 15066 (collaborative robots) standards. Force-torque and tactile sensors
      provide compliant contact detection, enabling safe operation alongside dock workers
      within shared workspace zones defined by the ISO/TS 15066 speed-and-separation
      monitoring model. Emergency stop circuitry and redundant safety relays are integrated
      via the Beckhoff EL6900 FSoE terminal hardware.
