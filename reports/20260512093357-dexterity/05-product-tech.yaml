  evidenceGaps:
    - id: EE001
      description: >
        Dexterity has not published a formal multi-year product roadmap. Public evidence covers
        only Foresight (March 2026), Instinct (April 2026), the Foresight API developer preview,
        and Dexterity-SC Japan scaling. No timelines, feature plans, or platform evolution
        commitments for 2027+ are available in public sources. This limits assessment of whether
        the roadmap addresses NVIDIA compute dependency, arm sourcing diversification, or new
        vertical market entry.
      severity: moderate
      relatedQuestionRefs:
        - QE023

    - id: EE002
      description: >
        Neither the IRIS API nor the Foresight API has publicly documented licensing terms,
        service-level agreements (SLAs), versioning policy, or deprecation guarantees. Enterprise
        customers and third-party developers building on these APIs face unknown contractual
        exposure. The Foresight API developer access status is inferred from GitHub activity
        rather than confirmed via official documentation.
      severity: moderate
      relatedQuestionRefs:
        - QE024

    - id: EE003
      description: >
        No publicly available evidence exists of independent third-party security audits,
        penetration tests, or vulnerability assessments of the Mech system, including its
        NVIDIA inference layer, IRIS API endpoints, and Beckhoff EtherCAT safety network.
        Given that Mech operates in shared-space logistics facilities alongside workers, the
        absence of public cybersecurity posture disclosure is a material gap for enterprise
        due diligence.
      severity: material
      relatedQuestionRefs:
        - QE025
