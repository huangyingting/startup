chapter:
  number: 5
  title: Product & Technology
  summary: >
    Dexterity's product portfolio centers on Mech, a dual-arm "superhumanoid" robot built
    around Kawasaki-designed 8-axis custom arms capable of 30 kg payload per arm (60 kg
    combined), a 5.4 m armspan, and 2.4 m+ vertical reach. Mech integrates 16+ cameras,
    6-axis force sensing, tactile sensors, and an omnidirectional AGV base with four steerable
    wheels for autonomous repositioning on warehouse floors. The intelligence layer is composed
    of three products: Foresight (launched March 2026), a physics-consistent 4D world model
    trained on 100 M+ autonomous actions that plans at <400 ms latency while evaluating 400
    placements per step; Instinct (launched April 2026), an agentic orchestration platform
    with 68+ specialized Perception, Decision, and Motion agents; and two APIs—IRIS for
    hardware-agnostic integration across 4+ robot types and 5+ hand designs, and Foresight
    API for external developer customization. Mech is validated across six logistics workflows
    (truck loading, trailer unloading, palletizing, depalletizing, parcel singulation, and
    dock-to-pallet relay) and deployed commercially at FedEx and via the Dexterity-SC JV in
    Japan. Safety relies on Beckhoff FSoE (Safety over EtherCAT) electronics, ISO 10218 and
    ISO/TS 15066 compliance, and a stated MTBF of >10 years. The compounding data flywheel
    —each real-world action improving Foresight—represents Dexterity's primary competitive moat.

sections:
  - id: SE-PROD
    title: Product Definition and Capabilities
    body: >
      Dexterity's commercial product is Mech, a dual-arm superhumanoid robot engineered
      specifically for high-mix, high-throughput logistics tasks that resist conventional
      fixed-automation approaches. Each Mech unit is built around two Kawasaki-manufactured
      custom 8-axis robotic arms capable of 30 kg payload per arm (60 kg combined), with a
      5.4-metre armspan and more than 2.4 metres of vertical reach. The hardware design
      deliberately mirrors the human form factor so that Mech can operate inside standard
      truck trailers and dock doors without infrastructure modification. The robot travels
      autonomously on an omnidirectional AGV base equipped with four independently steerable
      wheels, enabling repositioning along the trailer length during a loading or unloading
      cycle without guidance tape or floor markers. Perception is provided by a fusion of
      16+ RGB-D and structured-light cameras supplemented by 6-axis force-torque sensing
      at each wrist and tactile sensor arrays on the gripper surfaces, enabling compliant
      handling of irregular, unlabeled, and mixed-SKU cartons.
      Mech is validated across six core logistics workflows: truck loading (primary commercial
      use case at FedEx and Sagawa Express), trailer unloading, palletizing, depalletizing,
      parcel singulation, and dock-to-pallet relay. The Dexterity-SC joint venture with
      Sumitomo Corporation extends the product to the Japanese market. The product is sold
      exclusively under a Robots-as-a-Service subscription model that bundles hardware,
      software, maintenance, and support, removing capital-expenditure barriers for enterprise
      customers. Mech's rated operating envelope—0–50°C ambient temperature and up to 90%
      relative humidity—covers the thermal and humidity extremes encountered in refrigerated
      and ambient logistics environments.
