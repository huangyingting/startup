callouts:
  - id: SE-CALL-01
    calloutType: strength
    title: Compounding Data Flywheel Is the Primary Technical Moat
    body: >
      Dexterity's 100 M+ autonomous action corpus—aggregated across all commercial
      deployments—creates a compounding competitive moat. Every Mech unit operated by
      FedEx, UPS, GXO, or Sagawa adds training signal that improves Foresight for the
      entire fleet. Competitors without a comparable corpus of real-world manipulation
      data will face a widening performance gap even if they replicate the hardware.
      This flywheel dynamic is analogous to search or recommendation platform moats and
      is the single most defensible asset Dexterity has built.
    claimRefs:
      - CE021
      - CE005
      - CE033

  - id: SE-CALL-02
    calloutType: risk
    title: NVIDIA L4 GPU Is a Critical Single-Vendor Inference Dependency
    body: >
      Dexterity's Foresight world model and Instinct Perception agents are optimized for
      NVIDIA L4 GPUs with TensorRT. A supply disruption, product discontinuation, or
      significant price increase from NVIDIA could constrain Mech deployment capacity or
      force a costly re-optimization of the inference stack. The company's public showcase
      of Foresight specifically on NVIDIA hardware at FedEx Investor Day deepens this
      dependency signal. Investors should assess whether the AI inference layer is portable
      to alternative GPU hardware without material re-engineering.
    claimRefs:
      - CE026
      - CE027
      - CE008

  - id: SE-CALL-03
    calloutType: insight
    title: Kawasaki OEM Arms Create Both Capability and Supply-Chain Concentration
    body: >
      The custom 8-axis Kawasaki arms are a significant source of competitive differentiation—
      no off-the-shelf robotic arm offers the same payload-to-reach profile in the Mech form
      factor. However, this exclusivity also creates a concentrated supply-chain dependency:
      Dexterity cannot scale hardware production independently of Kawasaki's capacity and
      lead times. Due diligence should verify whether the partnership includes volume
      commitments, capacity reservations, and exclusivity provisions that protect Dexterity's
      manufacturing ramp.
    claimRefs:
      - CE001
      - CE014
      - CE002

