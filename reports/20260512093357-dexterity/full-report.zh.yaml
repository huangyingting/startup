      - number: '7.5'
        title: 缓释措施和投资监控
        blocks:
          - type: paragraph
            body: >
              Dexterity 的核心技术缓释，围绕每次新部署持续积累专有训练数据形成的数据飞轮护城河展开。每个新客户站点都会增加 Foresight 世界模型语料，随着时间推移降低边缘案例脆弱性风险。RaaS
              模式也让激励更一致：Dexterity 保留已部署硬件所有权，因此有财务动机维持机器人可靠性，并降低客户对生命周期成本的反对。Beckhoff 在自动化和安全技术上的合作，直接回应了人机协作中的 OSHA
              合规要求，说明公司正主动投入安全栈。Sumitomo 带来覆盖 1,400+ 个日本仓库的物流行业关系，中期内可分散客户集中风险。监管和法律层面，最有效的缓释是在新部署前主动完成 ISO 10218 / ISO
              TS 15066 合规认证，并配套明确的合同赔偿上限和产品责任保险。两者都尚未公开确认；它们是 Series D 投资人的具体尽调问题。财务层面，主要缓释是拿到足够大的合同在手收入，以支撑 Series D
              在非稀释性估值上完成——FedEx 和 UPS 的多枢纽扩张是最可信路径。投资监控应按季度跟踪五个打破投资逻辑的触发器：（1）FedEx 或 UPS 不续约重大部署合同；（2）Series D 未能关闭，或低于
              Series C 估值关闭；（3）公开报道 OSHA 传票或严重机器人安全事故；（4）确认 NVIDIA 已限制向机器人 OEM 客户分配 L4；以及（5）直接竞争对手宣布的自主操作部署规模达到
              Dexterity 已确认规模的 10 倍。任何一个事件出现，都需要立即重估投资逻辑。
