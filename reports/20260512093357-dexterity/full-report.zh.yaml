      - number: '8.4'
        title: 可比估值分析
        blocks:
          - type: paragraph
            body: >
              Dexterity 的可比对象横跨三类：上市仓库自动化公司、私有 RaaS 机器人融资轮，以及战略 M&A 先例。没有任何单一可比公司能完全对标——Dexterity 的物理 AI 定位和多客户 RaaS
              模式确实有差异化——但这个组合为投资人建立了应使用的估值走廊。

              Symbotic (NASDAQ: SYM) 是最接近的公开市场基准。公司 2024 财年收入为 $1.79 billion，同比增长 52%，毛利率约 13.7%，财年末市值约 $8–10
              billion，意味着 4.5–5.6 倍收入。Symbotic 截至 2024 年 9 月财年末的 $22.4 billion 在手订单，证明仓库 AI
              的需求规模，但其毛利率画像也验证了硬件型物流自动化的资本密集担忧。Dexterity 隐含 27.5 倍 ARR，相比 Symbotic 4.5 倍收入倍数有 6
              倍溢价；这个溢价必须完全由更高增长率、更优商业模式质量，或更早期风险投资支持的阶段溢价来解释。

              私有可比融资包括 Nimble Robotics（累计融资超过 $200 million，估计估值 $500 million，聚焦电商履约）和 Pickle Robot（$50 million Series
              B，卡车卸货 RaaS，与 Dexterity 的 DexR 直接竞争）。Berkshire Grey 是关键负面先例：这家资金充足的仓库机器人公司 2021 年通过 SPAC 上市时估值 $2.7
              billion，随后因收入未能规模化而在 2024 年退市。Dexterity 的投资人应研究 Berkshire Grey 案例，把它作为检验自身 RaaS 扩张速度假设的压力测试。
