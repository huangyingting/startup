        - label: FedEx 合同不续约
          values:
            - label: 低-中
              tone: warning
            - label: 关键
              tone: negative
            - label: 已部分缓释
              tone: neutral
            - label: 高
              tone: warning
        - label: NVIDIA L4 GPU 供应中断
          values:
            - label: 低-中
              tone: warning
            - label: 高
              tone: warning
