  - id: FU001
    title: 客户旅程图
    targetSlug: customer-journey-map
    type: journey-map
    approximationNotes: |
      旅程阶段综合自公开案例研究、客户新闻稿和 Dexterity 官方沟通。各阶段时间线根据已公开里程碑推断；内部采购和评估时间线没有公开来源。FedEx 旅程记录最完整；GXO 和 UPS 的旅程细节根据新闻报道推断。
    data:
      nodes:
        - label: 认知与评估
          description: 企业物流运营商将卡车装载或码垛识别为自动化目标。Dexterity 通过直销或 Sumitomo 合资渠道介入。RFP 或概念验证讨论启动。
          actors: Operations VP, Automation Engineering team
          examples: FedEx evaluation ~2022–2023; GXO evaluation ~2023–2024
        - label: 试点 / POC 部署
          description: Dexterity 工程团队在一个枢纽或场地安装 Mech。IRIS API 接入客户 WMS。完成站点特定纸箱画像和模型校准。双方确认 KPI，基线测量开始。
          actors: Dexterity deployment team, Customer engineering team, Dock operations manager
          examples: FedEx pilot 2023; GXO pilot 2024; Sagawa pilot under JV formation 2024
        - label: 生产上线
          description: 客户批准生产状态。订阅计费启动。Mech 在实时物流工作流中与月台工人并行运行。性能数据回流 Foresight 训练流水线。
          actors: Dock operations, Dexterity remote monitoring
          examples: FedEx production 2024; Sagawa Express May 2025
        - label: 扩容与拓展
          description: 客户将 Mech 推向更多枢纽、站点或新的工作流类型。累积性能数据提升 Foresight 针对该客户纸箱画像的模型准确率。RaaS 合同扩容。
          actors: Customer VP Operations, Dexterity account team
          examples: FedEx hub scale-up (announced); Sagawa 1,000+ unit goal; GXO multi-brand expansion
        - label: 长期合作
          description: 客户将 Dexterity 完全纳入多年自动化路线图。Dexterity 成为投资者和公开沟通中点名的技术伙伴。数据飞轮锁定效应加深。
          actors: C-suite, Investor relations
          examples: FedEx Investor Day showcase March 2026; Sagawa JV long-term commitment
