      - number: '4.2'
        title: 市场进入与销售效率
        blocks:
          - type: paragraph
            body: >
              Dexterity 采用企业直销模式，瞄准全球物流运营商的最高层级——拥有高吞吐包裹或托盘流量、自动化 ROI 最清晰的承运商和 3PL。 FedEx、UPS 和 GXO 等具名客户代表 Tier-1
              集成商板块。Dexterity-SC 与 Sumitomo Corporation 的合资公司把可寻址范围扩展到日本； Sumitomo 与超过 1,400 家仓储运营商保持关系，提供了结构化分销渠道，避免
              Dexterity 在不熟悉的市场承担完整企业直销负担。 仓储自动化的企业销售周期通常为 12–18 个月，反映采购委员会流程、站点设计审查和全面商业推出前的试点验证要求。 CAC
              和回本周期未公开披露；员工数数据暗示每名员工收入约 $327K，以当前规模看销售结构相对精简，但该指标对估计收入质量非常敏感。 公司累计 100M+
