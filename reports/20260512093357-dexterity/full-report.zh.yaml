      - number: '7.4'
        title: 财务、战略和执行风险
        blocks:
          - type: paragraph
            body: >
              Dexterity 的财务风险画像，反映了一家尚未盈利、同时经营硬件、AI 和服务模式公司的资本密集现实。Robots-as-a-Service
              订阅模式要求公司先制造并部署实体机器人——每台硬件和安装成本可能达到六到七位数美元——再在多年合同期内逐步收取订阅收入。行业基准显示，每个新的 RaaS 站点在回本前 18 至 36
              个月内都是现金流为负。按估计每月 $5–15 million 的烧钱速度，以及自 2025 年 3 月起估计 6 至 19 个月的现金跑道，公司在 2026–2027 年完成 Series D
              面临显著压力。Series D 失败或严重稀释，是实质性打破投资逻辑的事件。客户集中会放大财务风险。据估计，FedEx 占 Dexterity 总合同收入的 25% 或更多；FedEx
              不续约或重新议价，将构成近期收入的重大不利事件。UPS 是第二个具有类似集中潜力的大客户。日本 Sumitomo 合资公司增加地域多元化，但引入结构化收入分成安排，可能相对直销压缩单台经济性。公司没有公开预计
              2027–2028 年前可实现盈利；半导体周期里的硬件成本通胀可能进一步延后利润率改善。执行层面，Samir Menon 是唯一公开的创始人兼 CEO，也是 Dexterity
              投资人和客户关系的主要代表。OpenAI、Google DeepMind 和 Meta 对资深 AI 工程师的争夺非常激烈，而 Dexterity 从估计 195 名员工冲向 500+
              目标的快速招聘轨迹，会带来文化一致性和工程质量风险。Figure AI 和 Tesla Optimus 的人形机器人，是 3–5 年视野里的战略市场风险：如果通用操作能力通过人形平台商品化，Dexterity
              专用 Mech 的优势可能比预期更快被侵蚀。Symbotic 收购 Fox Robotics 后，在码垛和拆垛细分领域形成了更强的竞争对手。
