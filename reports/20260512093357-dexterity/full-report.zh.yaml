      - number: '6.4'
        title: 扩张策略和集中度风险
        blocks:
          - type: paragraph
            body: >
              Dexterity 的增长策略，一边在大型物流运营商内部沿用经典的落地后扩张打法，一边通过日本 Dexterity-SC 合资公司做地域扩张。在 FedEx 内部，从 2023
              年初始试点，到多枢纽生产部署，再到宣布在美国主要枢纽扩大规模，路径就是标准的先落地后扩张。每新增一个 FedEx 枢纽，既增加经常性收入，也向 Foresight 训练语料贡献数据，加深客户关系。日本渠道以
              Sagawa Express 为锚点，并借助 Sumitomo 的 1,400+ 家运营商网络进入市场；长期目标是部署 1,000+ 台，构成重要的可服务扩张空间。日本物流劳动力短缺被 2024
              年加班监管进一步结构性放大，形成持久需求拉力，支持多年持续部署增长。若 GXO 向更多品牌客户扩展落地，将显著分散 3PL 板块风险。GXO 全球运营约 970+
              个仓库，说明即便只在现有账户内，单元扩张空间也很大。UPS 宣布到 2028 年自动化 60+ 个美国设施；如果 Dexterity 目前在 UPS
              的部署表现符合预期，这也是潜在多年扩张向量。不过，客户集中风险偏高。公开具名账户只有四个，合理情景是其中两个（FedEx 和 Sagawa Express）占当前收入大头。最大客户（可能是
              FedEx）可能贡献总合同价值的 30–50%。这种集中度对 Series C 阶段机器人公司并不罕见，但代表实质性的单一账户风险：如果 FedEx
              流失或重新议价，收入会受到重大影响。公开证据未显示还有渠道合作伙伴、系统集成商或 OEM 经销商可以分散获客渠道、降低集中度风险。Dexterity-SC 合资公司是唯一披露的渠道合作伙伴。
