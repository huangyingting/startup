      - number: '1.2'
        title: 创始团队与领导层
        blocks:
          - type: paragraph
            body: >
              Samir Menon 是 Dexterity 唯一公开披露的创始人兼 CEO。他拥有 Stanford University 计算机科学博士和硕士学位，
              博士研究提出了一套控制理论框架，用来建模人脑如何协调身体运动；该框架直接转化为 Dexterity 自研的机器人运动与灵巧操作方法。 在 Stanford 之前，Menon 曾任 Microsoft India
              R&D 软件设计工程师，并在 Simon Fraser University 担任研究助理。 他于 2017 年末创办 Dexterity，将 Stanford 论文工作向外延展，并组建了一支 Stanford
              机器人学背景的创始团队。 公司 About 页面和博客提到的创始团队成员包括 Robert Sun（联合创始人兼创始工程师）、Kevin Chavez（创始工程师、 Foresight 共同作者）、Ben
              Varkey Benjamin、Talbot Morris-Downing 和 Cuthbert Sun。创始团队在机器人控制理论、 神经仿真和 AI 上的学术深度，构成了企业 Physical AI
              问题上的强创始人—市场匹配。Menon 是公开资料中唯一具名高管， 公司的技术和商业叙事又与他个人高度绑定，因此关键人依赖是实质风险。公司未公开披露董事会构成、治理结构或独立董事，
              外部难以判断监督机制。博客内容提到过战略执行副总裁 Dr. Keshav Prasad，说明高级管理层正在扩展；但除此之外， 没有其他 C-suite 高管被公开识别。截至 2026 年 5
              月，公开资料未显示领导层离职或裁员，这与第三方目录反映的员工数稳定相符。
