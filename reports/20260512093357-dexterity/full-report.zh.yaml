companyProfile:
  summary: >-
    Dexterity 是一家位于加州 Redwood City 的 Physical AI 公司，由 Samir Menon 于 2017 年创立。公司打造 AI 原生仓储物流机器人，主要处理卡车装车、卸车和拆垛，底层是自研
    Foresight 世界模型，该模型用超过 100 million 次抓取操作训练。Mech 机器人把 8-axis Kawasaki 双臂系统、计算机视觉、触觉感知和 Instinct
    多智能体规划平台组合在一起，可按商业速度处理混 SKU、未分拣货物。Dexterity 已与 FedEx、UPS、 GXO Logistics 和 Sagawa Express Japan 建立生产部署，并通过与 Sumitomo
    Corporation 的合资公司进入日本物流市场。 公司已融资 $291 million，轮后估值 $1.65 billion，投资方包括 Kleiner Perkins、Google Ventures、 Lightspeed
    Venture Partners、Goldman Sachs、Sumitomo Corporation 和 NTT。
