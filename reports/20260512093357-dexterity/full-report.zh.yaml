  - number: 2
    title: 市场分析
    sections:
      - number: '2.1'
        title: 市场边界与定义
        blocks:
          - type: paragraph
            body: >
              Dexterity 位于两个重叠市场的交叉点：广义仓储机器人市场，以及更窄的自动卡车装卸市场。分析师通常把仓储机器人市场定义为硬件
              （AMR、关节式机械臂、AGV）及配套编排软件。更广义的「仓储自动化」市场还包括自动存储与检索系统（AS/RS）、输送系统和 WMS 集成。对 Dexterity
              最相关的最窄定义，是自动卡车装载系统子板块，最直接对应其 DexR 和 Mech 产品部署。


              现状替代方案是人工码头劳动力。行业来源估计，两到四名工人手动卸载一辆 53-foot 拖车需要 45-90 minutes， 每名工人每小时成本为
              $25-$40。这不仅是成本目标，也是安全性和可靠性缺口：码头劳动力是物流中工伤率最高的岗位之一； 美国劳工统计局数据显示，运输和物料搬运工人的工伤和职业病发生率高于平均水平。


              关键相邻市场——码垛和拆垛自动化、分拣机器人，以及订单履约中的件拣选——都被 Dexterity 的产品路线图 （Foresight 世界模型、Instinct
              平台）列为扩张方向。受数据限制，本章未对这些相邻市场单独测算规模； 但它们代表了 Dexterity 从 $3.27B 卡车装车 SAM 走向更广义仓储机器人 TAM 的路径。
