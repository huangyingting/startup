      - number: '7.3'
        title: 运营和依赖风险
        blocks:
          - type: paragraph
            body: >
              Dexterity 的运营风险栈主要由两项可能打断规模化部署的硬件依赖主导：用于推理的 NVIDIA L4 GPU，以及作为 Dexterity 机器人硬件唯一已确认 OEM 来源的 Kawasaki 8
              轴机械臂。NVIDIA L4 GPU 嵌在 Dexterity 的 Foresight 世界模型推理管线中，2026 年 3 月 FedEx Investor Day 已公开展示。NVIDIA 若限制向机器人
              OEM 客户分配 L4——无论原因是优先满足数据中心需求、地缘政治造成半导体供应链中断，还是 NVIDIA 自身战略转向——都会直接停住新机器人的生产和部署。2022–2023 年 AI GPU 短缺证明
              NVIDIA 能够且确实会限制分配；公开资料没有记录 Dexterity 与 NVIDIA 签有明确的合同供给承诺。Beckhoff 在 2025 年底发布合作公告时披露，Kawasaki Robotics 是
              Dexterity 的确认 OEM 供应商，负责 Mech 系统中的 8 轴机械臂组件。Kawasaki 若出现产能瓶颈、质量问题或商业分歧，会直接限制 Dexterity
              履行客户订单的能力。关键物理部件依赖单一 OEM，是硬件机器人公司的标准风险；缓释路径通常需要认证第二来源 OEM，或自建专有制造能力，而 Dexterity 均未公开披露。训练分布外环境里的 AI
              技术脆弱性，是任何物理 AI 系统的根本风险。Dexterity 的 Foresight
              模型在大规模包裹处理场景语料上训练，但新颖包裹形状、堆叠货物导致的传感器遮挡、装卸区湿滑地面，或特定仓库配置里的异常光照，都可能形成模型没有见过的边缘案例。单站点故障传播风险同样存在：如果一个 Dexterity
              部署发生高严重性事件——机器人造成伤害、货损或生产停摆——公司可能必须在调查期间暂停或修改所有类似部署，由此造成与单站点故障规模不成比例的系统性收入中断。
