  - id: TR001
    title: 监管 / 法律风险登记表
    columns:
      - 规则 / 许可 / 法规
      - 管辖区
      - 状态
      - 可能性
      - 严重性
      - 缓释措施
      - 剩余敞口
      - 尽调路径
    rows:
      - - OSHA 29 CFR 1910 — 仓储场景中工业机器人的机器防护与锁定/挂牌（LOTO）
        - 美国
        - 已生效 — 适用于 Dexterity 在美国 FedEx、UPS、GXO 枢纽的所有部署
        - 中 — OSHA 检查通常由事故或转介触发；假定公司主动合规，但未公开确认
        - 高 — 若机器人致伤后收到 OSHA 处罚，可能迫使美国所有站点暂停部署
        - Beckhoff 安全技术合作覆盖协作运行防护；假定 LOTO 流程已嵌入部署协议
        - 中 — 未公开确认 OSHA 合规审计或认证；事故触发检查的风险仍在
        - 向 Dexterity 索取 OSHA 合规文档和事故响应协议；确认 LOTO 流程是否纳入客户部署清单
      - - ISO 10218-1/10218-2 — 工业机器人安全要求（设计与集成）
        - 国际 / 美国 / 欧盟
        - 已生效 — 适用于全球所有 Mech 机器人部署；进入欧盟市场拿 CE 标志需要符合 ISO 10218
        - 短期低（美国部署可容忍自我认证）— 欧洲扩张为中
        - 高 — ISO 10218 缺口会卡住 CE 标志和欧洲市场进入；若未认证，美国市场也有声誉风险
        - 假定 Kawasaki 机械臂制造商已在标准商用机器人 OEM 流程中覆盖 ISO 合规
        - 中 — 截至 2026 年 5 月，Dexterity Mech 系统的 ISO 10218 认证状态未公开披露
        - 索取 ISO 10218 认证文件和 CE 标志状态；确认 Kawasaki 机械臂认证能否延伸到完整 Mech 系统
      - - ISO/TS 15066 — 协作机器人运行安全（速度与力限制）
        - 国际
        - 已生效 — 适用于任何在无实体防护下与人共享工作空间的机器人
        - 中 — Dexterity Mech 与码头工人并行作业；协作运行参数必须满足 ISO/TS 15066
        - 高 — 协作运行限制不合规会触发 OSHA 执法，也带来产品责任敞口
        - Beckhoff 合作明确覆盖 Mech 超人形协作部署所需的安全技术
        - 中 — 协作运行参数和 ISO/TS 15066 合规状态未公开确认
        - 确认 Mech 的 ISO/TS 15066 功率与力限制参数；索取第三方安全评估文件
      - - 产品责任 — 美国侵权法下，机器人导致工人受伤或货损
        - 美国
        - 潜在 — 未公开确认存在进行中的诉讼；首次重大事故后风险才会显性化
        - 低-中 — 实体机器人部署带来持续敞口；新品类的责任规则仍在演进
        - 致命 — FedEx 枢纽若发生工伤，会同时引发诉讼、媒体关注、客户暂停和 Series D 受损
        - 假定已配置产品责任险；RaaS 协议中与企业客户约定合同赔偿条款属常规做法
        - 高 — 产品责任险额度和客户赔偿上限未公开披露
        - 索取产品责任险保额、合同赔偿结构，以及法律顾问关于产品/服务定性的意见
      - - 专利诉讼 — 既有机器人公司围绕抓取和运动规划提出 IP 主张
        - 美国
        - 潜在 — 未公开确认存在进行中的 IP 诉讼；Dexterity 的抓取相关专利未公开盘点
        - 低-中 — Series C 成功和 FedEx 合作提高了能见度；FANUC、ABB、Boston Dynamics 等既有玩家握有大量专利组合
        - 高 — 专利纠纷中的禁令救济可能阻止特定机器人配置出货；诉讼成本对创业公司也很重
        - 假定已完成自由实施（FTO）分析，这是部署前尽调的常规动作；AI 原生路线新，可能绕开较早的抓取专利
        - 中 — FTO 分析结果和专利组合策略未公开披露
        - 索取专利组合清单、FTO 分析范围，以及与既有机器人 OEM 的既往 IP 往来记录
      - - 日本 2024 年物流改革（卡车司机加班上限）— Dexterity-SC JV 的监管复杂度
        - 日本
        - 2024 年 4 月起生效 — 创造自动化结构性需求，也给日本部署增加劳动法合规复杂度
        - 合规失败风险低 — 监管复杂度拖慢 JV 部署节奏的风险为中
        - 中 — 若日本劳动法合规负担增加站点资格审核步骤，JV 部署时间表可能滑坡
        - Sumitomo Corporation 带来日本监管关系和 1,400 多家运营商网络，可消化合规负担
        - 低 — Sumitomo 既有关系降低合规风险；劳动力短缺的顺风大于摩擦
        - 与 Sumitomo 确认 Dexterity-SC JV 的法律结构和日本监管合规打法；评估 2024 年加班改革对部署排期的影响
    notes: >
      本监管风险登记表反映截至 2026 年 5 月公开可识别的合规义务。各行按剩余敞口严重性排序。未取得非公开公司数据和法律顾问审阅前，无法枚举客户特定监管要求（如海关合规、州级仓库安全法）、环保法规和合同特定赔偿条款。IP
      诉讼敞口按行业基准估算；未确认 Dexterity 存在进行中诉讼。
