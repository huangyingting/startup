      - number: '5.3'
        title: 部署、可靠性与安全
        blocks:
          - type: paragraph
            body: >
              Dexterity 采用交钥匙部署模式，由工程团队管理站点安装、调试和持续性能优化；客户只需管理运营中的入库 / 出库负载排程。 与现有仓储管理系统（WMS）的集成通过 IRIS API 完成，该 API
              会自动发现硬件，并提供供应商中立的命令接口。 新站点典型部署周期包括结构评估、IRIS 硬件注册、安全区划定，以及上线运行前针对站点特定箱型画像的模型校准。 Dexterity 表示，Mech
              硬件平台在正常物流运行条件下 MTBF 超过 10 年，额定环境耐受为 0–50°C、最高 90% 相对湿度。 商业部署的可靠性目标为系统可用率 99%+，至少一个生产部署报告取放准确率为 99.5%。已部署
              Mech 单元的现场遥测持续更新 Foresight 模型，形成增量改进闭环，并惠及后续所有部署。安全架构依赖 Beckhoff USA 提供的自动化和安全电子设备， 在所有安全关键轴上以 SIL 3 / PLe
              等级实现 FSoE（Functional Safety over EtherCAT）。系统按 ISO 10218 （工业机器人安全）和 ISO/TS
              15066（协作机器人）标准设计。力矩和触觉传感器提供柔性接触检测，让机器人能在 ISO/TS 15066 速度与距离监控模型定义的共享工作区内，与码头工人并行安全作业。紧急停止电路和冗余安全继电器通过
              Beckhoff EL6900 FSoE 端子硬件集成。
