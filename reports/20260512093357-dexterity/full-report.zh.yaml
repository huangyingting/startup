  - number: 6
    title: 客户情况
    sections:
      - number: '6.1'
        title: 客户基础分层
        blocks:
          - type: paragraph
            body: >
              Dexterity 目前的付费客户集中在全球物流和包裹行业的大型企业板块。所有公开具名账户——FedEx、Sagawa Express、GXO Logistics 和
              UPS——都是营收数十亿美元、每年自动化预算可观、拥有多枢纽物流网络的运营商。按买方类型看，每个案例里的直接采购方都是企业的运营或物流技术部门。付款方是企业本身；终端使用者则是监督机器人系统的码头工人和运营经理。按地域看，客户分成两个清晰集群：美国（FedEx、GXO、UPS）和日本（Sagawa
              Express，通过 Dexterity 与 Sumitomo Corporation 的合资公司 Dexterity-SC 获得）。截至 2026 年 5
              月，公司尚未公开确认欧洲或其他亚太客户。按垂直领域看，所有具名账户都落在包裹和第三方物流（3PL）子行业。包裹承运商（FedEx、UPS、Sagawa）是最深的部署渠道；GXO 代表 3PL /
              合同物流。公司尚未公开具名任何制造、零售或冷链客户。按渠道看，Dexterity 通过企业销售团队直接触达美国客户，并通过 Dexterity-SC 合资公司进入日本，后者借助 Sumitomo
              Corporation 与 1,400+ 家日本仓库运营商的关系网络。客户规模完全是大型企业：FedEx 年收入约 $88B，UPS 约 $91B，GXO 约 $8.5B，Sagawa Express 约
              $4B。Dexterity 未公开披露任何中端市场或 SMB 客户。所有部署均采用
              Robots-as-a-Service（RaaS）订阅模式，把硬件、软件、维护和支持打包，降低资本开支门槛，并建立经常性收入关系。
