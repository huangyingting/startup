      - number: '1.5'
        title: 技术平台与产品架构
        blocks:
          - type: paragraph
            body: >
              Dexterity 的技术差异化来自架构，而不是硬件形态。公司采用「AI of AIs」设计：不依赖单一大型端到端神经网络， 而是通过高阶编排层协调数百个专用小型 AI
              模型，即「技能模型」。每个技能模型处理一个具体子任务 （例如感知、抓取选择、装箱轨迹、力控），并以可解释、受安全边界约束为设计目标。Foresight 世界模型用超过 100 million
              次生产中的自主动作训练，提供符合物理规律的状态表示，让规划器能在低于 400 milliseconds 内， 围绕多个同时优化目标评估候选放置方案。4D Packing Agent（2026 年 3
              月发布）每个周期最多评估 400 个候选箱体放置点， 覆盖三维空间加时间维度，并在 55°C 和 600W 的热与功率包络内运行。Instinct（2026 年 4 月）引入触觉力控，
              可不经重新训练部署到任意任务。DexR 机器人使用两条工业机械臂，载荷 60 kg、触达超过 5-meter，用于卡车车厢装车；
              Mech「超级仿人」在相同双臂配置上加入移动底盘，支持设施范围内作业。Dexterity 已与 Sanmina（制造扩产）、 Beckhoff USA（EtherCAT 自动化和安全集成）以及 ASRock
              Rack（用于机载推理的边缘 AI 服务器）合作。公司还与 Dematic 建立合作（2022 年），在制造、包裹和零售客户中部署全任务机器人。SmartLoadingHub 部署笔记另行指出， 在低于 5
              秒的超高速单件分离节拍下，Dexterity 存在运营限制，基于输送线的系统可能更高效；在与 Amazon 自研自动化竞争其最高吞吐设施时，这一约束尤其相关。
