              Dexterity 的 Foresight 世界模型和 Instinct Perception 智能体针对搭配 TensorRT 的 NVIDIA L4 GPU 做了优化。NVIDIA
              若出现供给中断、产品停产或大幅涨价，可能限制 Mech 部署能力，或迫使公司高成本重新优化推理栈。公司在 FedEx Investor Day 上专门用 NVIDIA 硬件公开展示
              Foresight，也进一步强化了这一依赖信号。投资人应评估 AI 推理层能否在不进行重大重构的情况下迁移到替代 GPU 硬件。
