        title: 资本充足性与融资依赖
        blocks:
          - type: paragraph
            body: >
              Dexterity 多轮风险融资合计 $291M，最近一轮是在 2025 年 3 月完成的 $95M Series C，轮后估值 $1.65B。 投资方包括 Lightspeed Venture
              Partners（Series C 领投）、Kleiner Perkins、Qualcomm Ventures 和 Sumitomo Corporation，体现财务资本与战略资本并存。公司约 195
              名员工，又背负重硬件和计算义务；行业分析师估计月烧钱速度在 $5–$15M 区间，意味着自 2025 年 3 月融资后，现金跑道取决于实际支出速度约为 6–19 个月。若 ARR 正向 $60–$70M
              增长，订阅现金流增长可能部分抵消烧钱速度；但硬件密集型 RaaS 部署通常需要大量营运资本，先为新站点投入资金，再等订阅付款爬坡。 若 2026–2027
              年收入规模没有阶跃式提升，公司大概率需要下一轮融资——晚期风险投资、结构化债务或战略伙伴资本。Dexterity-SC 合资公司让日本增长有一条非稀释路径， 由 Sumitomo 承担部分部署成本。
