        - id: cogs
          label: COGS：硬件折旧 + 现场服务 + 计算
        - id: gross-profit
          label: 毛利（规模化后估计 30–50%；当前爬坡期为负）
        - id: raas-nre
          label: 可选 NRE / 集成费（站点启动时一次性收取）
      edges:
        - from: customer-activity
          to: robot-deployment
          label: 履约义务
        - from: robot-deployment
          to: subscription-fee
          label: 服务交付
        - from: subscription-fee
          to: cogs
          label: 成本吸收
        - from: subscription-fee
          to: raas-nre
          label: 前期集成
