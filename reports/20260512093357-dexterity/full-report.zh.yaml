  - number: 7
    title: 风险
    sections:
      - number: '7.1'
        title: 风险版图和严重性框架
        blocks:
          - type: paragraph
            body: >
              Dexterity 竞争的位置是物理 AI
              与仓库机器人前沿，这个领域的风险面与纯软件业务有本质差异。每一台部署出去的机器人都是客户车间里的资本资产，要和人类工人并肩作业、接触实体货物，并接入企业仓库管理系统。上述任一维度失效，都会同时引发安全、法律、运营和声誉后果。公司的风险画像可按严重性分成六类：（1）监管和法律暴露——OSHA
              与 ISO 合规、产品责任、IP 诉讼；（2）技术和 AI 风险——训练分布外脆弱性、传感器故障、MTBF 验证；（3）运营和供应链风险——NVIDIA GPU 与 Kawasaki
              机械臂单一来源依赖；（4）合作伙伴和客户集中风险——FedEx 锚定客户、Sumitomo 合资公司、NVIDIA 平台锁定；（5）财务和模式风险——RaaS J
              曲线、烧钱速度、现金跑道；以及（6）人员和执行风险——Samir Menon 关键人物集中、人才竞争、快速扩张。最高严重性层级上有三项相互关联的风险：FedEx 或 UPS 部署发生重大安全事故，引发 OSHA
              执法和监管审查；2026–2027 年 Series D 融资失败，威胁业务连续性；以及 FedEx
              合同不续约，导致最大已知锚定客户消失。三件事单独发生都可能打破投资逻辑，一旦叠加会进一步放大。风险热力图（Figure FR001）展示了按发生概率、影响和缓释成熟度划分的完整风险栈。
