          - type: paragraph
            body: >
              相比纯软件公司，Dexterity 的成本结构最突出的特点是前期资本强度高。制造机器人硬件（机械臂、控制器、感知系统）需要供应链管理和组装成本； 在 RaaS 模式下，这些成本会作为存货或资本化资产体现在
              Dexterity 的资产负债表上。持续服务交付成本包括现场工程支持、 硬件刷新周期、推理计算（NVIDIA GPU 集群或云）和网络连接。Physical AI 训练——使用 Dexterity 的
              Foresight 世界模型—— 需要大量 GPU 加速仿真和真实数据采集基础设施，形成与单次部署成本不同的持续 R&D capex 义务。Symbotic 已披露其装机系统仓储机器人业务 FY2025
              调整后毛利率为 21%，这是最可比的公开参照；如果软件和数据飞轮降低单台服务成本，Dexterity 的抓取型 RaaS 在规模化后可能达到更高毛利率， 但硬件强度会把毛利率限制在远低于纯 SaaS
              基准（70–80%）的位置。Dexterity 未披露毛利率或单站点成本数据；获得这些数字是投资前优先事项。
