      - number: '1.3'
        title: 融资历史与投资方名单
        blocks:
          - type: paragraph
            body: >
              Dexterity 已通过三轮主要股权融资，从至少十五家机构投资者处合计融资约 $291 million。公司 2020 年 7 月走出隐身期时， 完成了 Kleiner Perkins 领投的 $56.2
              million Series A，共同投资方包括 Lightspeed Venture Partners、 Obvious Ventures、Pacific West Bank、B37
              Ventures、Presidio Ventures（Sumitomo 的 CVC 部门）、 Blackhorn Ventures、Liquid 2 Ventures 和 Stanford StartX
              fund。走出隐身期时，Dexterity 披露公司此前已运营约 三年，但未公开宣布融资。2021 年 10 月，Lightspeed 和 Kleiner Perkins 共同领投 $140 million
              Series B， 将公司推至独角兽行列，轮后估值 $1.4 billion；Presidio Ventures 和其他 Series A 投资方也参与该轮，Obvious Ventures 和 B37
              Ventures 同轮跟投。第三轮也是最近一轮，为 2025 年 3 月 11 日完成的 $95 million 风险投资轮， 由 Lightspeed Venture Partners 和 Sumitomo
              Corporation 直接领投（不再仅通过 Presidio CVC 载体）， 轮后估值定为 $1.65 billion。按 Latka 数据，2025 年该轮约出售 6% 股权，与所引轮后估值一致。
              锚定投资方 Lightspeed Venture Partners 是 Silicon Valley 最活跃的早期科技基金之一，且连续三轮参与， 说明机构对公司投资逻辑仍有信心。Sumitomo
              的参与不断加深——从 2020 年 Presidio CVC 投资，到 2025 年直接投资， 再到 2024 年 Dexterity-SC
              日本合资公司——反映出一种战略共同投资关系：财务资本与日本分销和市场准入绑定在一起。
