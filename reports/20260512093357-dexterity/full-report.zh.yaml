      - number: '2.2'
        title: 市场规模：TAM、SAM 与 SOM
        blocks:
          - type: paragraph
            body: >
              仓储机器人 TAM 的分析师估计，因范围定义不同而明显分化。在最窄的纯硬件范围内，Research and Markets 估计 2025 年为 USD 9.33B（到 2030 年增至 USD
              21.08B，CAGR 17.7%）。在更宽的中等范围内，GM Insights 和 Straits Research 均估计 2024 年约为 USD 14.7B（2025 年 USD 17.6B），到
              2033-2034 年 CAGR 为 15.5-23.1%。在最宽范围内（包括 AS/RS 的完整仓储自动化），Mordor Intelligence 估计 2025 年为 USD 29.98B，到 2030
              年增至 USD 59.52B，CAGR 18.7%。


              对 Dexterity 最直接适用的子市场——自动卡车装载系统——The Business Research Company 估计 2025 年全球规模为 USD 3.27B，到 2030 年增至 USD
              4.67B，CAGR 7.5%。相较更广义仓储机器人，卡车装车板块 CAGR 更低， 反映出买方范围更受限。DataIntelo 对装卸机器人的更广义估计（2023 年 $6.3B 到 2032 年
              $14.7B）覆盖更宽， 包括码头级拆垛和输送线供料系统等。


              按美国和日本在 $3.27B 全球卡车装车市场中的份额，自下而上测算 Dexterity 的 SAM，2025 年美国和日本合计可寻址约 $1.3-1.8B（美国约占全球物流价值 35%，日本约占
              15%）。相较之下，Dexterity 估计 $21.2M ARR（Latka，2025 年） 意味着其最直接可寻址子市场渗透率约 1-2%。美国包裹市场背景进一步支撑需求规模：2025 年共寄送 23.9
              billion 个包裹 （每天 65M），承运商枢纽需要匹配的车厢装载吞吐。
