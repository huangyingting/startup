      - number: '3.3'
        title: 能力与功能对比
        blocks:
          - type: paragraph
            body: >
              Dexterity 的产品套件覆盖卡车装车（Mech/Instinct、4D packing）、卡车卸车、混箱码垛、单件分离和 putwall 分拣， 覆盖的物流工作流多于任何纯机器人竞争者。Foresight
              世界模型的 90ms 感知延迟（相比 NVIDIA 硬件上的 1.5 seconds 已降低）、 每箱跨 400 个选项的组合式 4D
              packing，以及跨多种机器人形态部署，构成了硬件优先竞争者缺少的软件定义优势。 Boston Dynamics Stretch 执行箱件卸载，但未发布卡车装车能力。Pickle Robot
              专注卸载。Symbotic 的托盘式 AS/RS 系统服务于 高吞吐零售分销，但处理的是预先分槽的单元载荷，不是混箱卡车处理。Fox Robotics（现属 Symbotic）处理码头级叉车作业， 而非箱件级
              AI 抓取。工业机械臂 OEM 需要为每类 SKU 定制末端执行器，无法跨混 SKU 环境泛化。切换成本来自资本安装、 WMS 集成（6-18 months）和操作员再培训。
