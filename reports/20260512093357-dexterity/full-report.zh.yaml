  - number: 5
    title: 产品与技术
    sections:
      - number: '5.1'
        title: 产品定义与能力
        blocks:
          - type: paragraph
            body: >
              Dexterity 的商业产品是 Mech，一款专为高混合、高吞吐物流任务打造的双臂超级仿人机器人，用来处理传统固定自动化难以覆盖的场景。 每台 Mech 围绕两条 Kawasaki 制造的定制 8-axis
              机械臂构建，单臂载荷 30 kg（合计 60 kg），臂展 5.4-metre， 垂直触达超过 2.4 metres。硬件设计刻意贴近人类形态，因此 Mech 可在标准卡车车厢和码头门内作业，无需改造基础设施。
              机器人在配备四个独立转向轮的全向 AGV 底盘上自主移动，可在装车或卸车周期中沿车厢长度重新定位，不需要导引胶带或地面标记。 感知由 16+ 个 RGB-D 和结构光摄像头融合提供，并在每个腕部叠加 6-axis
              力矩传感、在夹爪表面布置触觉传感阵列， 从而柔性处理不规则、无标签、混 SKU 箱件。Mech 已在六个核心物流工作流中验证：卡车装车（FedEx 和 Sagawa Express 的主要商业用例）、
              车厢卸货、码垛、拆垛、包裹单件分离和码头到托盘中转。Dexterity-SC 与 Sumitomo Corporation 的合资公司把产品延伸到日本市场。 产品只通过 Robots-as-a-Service
              订阅模式销售，打包硬件、软件、维护和支持，消除企业客户的资本开支门槛。Mech 标称运行包络为 0–50°C 环境温度、最高 90% 相对湿度，覆盖冷链和常温物流环境中的温湿度极端情况。
