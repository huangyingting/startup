    title: 公司概况
    sections:
      - number: '1.1'
        title: 身份、产品与使命
        blocks:
          - type: paragraph
            body: >
              Dexterity, Inc. 是一家美国注册、风投支持的私营机器人创业公司，总部位于加州 Redwood City 的 1205 Veterans Blvd。公司创立于 2017 年 12 月，并于 2020
              年 7 月走出隐身期。其法定名称为 Dexterity, Inc.，运营品牌为 Dexterity 或 Dexterity AI。公司的核心判断是，人工智能的下一段前沿不在数字内容生成，
              而在机器能否在非结构化物理环境中像人一样灵巧操作；Dexterity 称其为「Physical AI」。产品组合围绕两类机器人平台： DexR 是面向卡车车厢装卸的双臂机器人；Mech
              是移动抓取「超级仿人」机器人，可执行码垛、拆垛、分拣和卡车装车。 AI 技术栈包括 Foresight 世界模型（2026 年 3 月公开推出）、协调专项感知、规划、抓取和运动智能体的智能体技能 框架，以及
              Instinct（2026 年 4 月推出）这一触觉力控技能层。Dexterity 将商业模式定义为
              Robotics-as-a-Service（RaaS），在长期生产合同下，将机器人作为托管系统部署给企业物流客户，并辅以集成和部署服务。 客户包括北美的 FedEx、UPS、GXO
              Logistics，以及日本通过与 Sumitomo Corporation 的 Dexterity-SC 合资公司服务的 Sagawa Express。Dexterity
              官网强调，生产部署中报告安全事故为零，并称每次放置的平均决策速度低于 400 milliseconds——这是面向高吞吐物流环境的核心卖点。
