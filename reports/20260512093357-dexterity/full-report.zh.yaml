            title: 25× ARR 倍数需要乐观情景执行到位才打平
            body: >-
              按 $1.65 billion 估值和估计 $60 million ARR 计算，Dexterity 定价为经常性收入的 27.5 倍——比 Symbotic 公开市场 4.5 倍收入倍数高出 6
              倍，也远高于硬件机器人业务常见的 1.5–4 倍收入区间。Series C 要打平，必须兑现乐观情景：到 2028 年 ARR 达到 $475 million、毛利率 35%、并以 7–8 倍 ARR
              退出。路径可以实现，但要求制造规模、客户扩张和利润率改善在竞争市场中同时执行到位。投资人必须明确，当前入场价格押注的是一个高概率结果的期权，而不是价值投资。
