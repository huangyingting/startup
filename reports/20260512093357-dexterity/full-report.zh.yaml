      - number: '8.5'
        title: 退出准备度、打破投资逻辑的触发器和最终尽调问题
        blocks:
          - type: paragraph
            body: >
              Dexterity 的退出路径分为三类：战略 M&A、IPO，以及二级 / 延续融资。

              战略 M&A 是近期最可能的退出渠道。最可信的收购方包括 Amazon Robotics（其已表现出收购机器人初创公司的意愿，目前运营超过 100 万台机器人；Amazon 于 2026 年 3 月收购
              Fauna Robotics）、Ocado Group（曾收购机器人 IP 以分散其仓库自动化平台），以及 FedEx 等大型物流运营商本身，FedEx 已在 DexR 开发上合作。若 ARR 达到 $150
              million 且毛利率改善至 25% 或以上，2026–2028 年窗口内以 $2–3 billion 被战略收购是可实现的。若收购方愿为协同可选性支付溢价，报价可上探至 $3.5 billion。

              IPO 准备度至少要求 $200 million ARR、可信的毛利率转正路径、超过一个公开披露的生产客户，并且没有重大 OSHA 执法风险。基准情景下，这些条件最早到 2027–2028
              年才满足。乐观情景下，2027 年有可能。

              六个打破投资逻辑的触发器应促成立即投资复盘。第一，FedEx 不续约或公开终止其 DexR 生产合同。第二，Dexterity 在 2026–2027 年未能以不低于 Series C 价格完成 Series
              D。第三，机器人相关工人安全事故引发 OSHA 执法和多站点部署暂停。第四，ARR 增长连续两个季度低于 30% 同比。第五，主要竞争对手以显著更低单台机器人成本达到 500
              台或更多商业机器人部署。第六，Samir Menon 离任 CEO，且没有明确合格的继任者到位。
