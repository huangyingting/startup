            body: >
              Dexterity 的部署证据集中在三个记录较完整的账户，第四个账户 UPS 则出现在二级聚合资料中。FedEx 是 Dexterity 最成熟、记录最充分的客户。初始试点大约始于 2023
              年，现已推进到美国多个 FedEx 包裹枢纽的生产状态。双方合作在 2026 年 3 月孟菲斯 FedEx Investor Day 上公开展示，Dexterity 演示了运行在 NVIDIA L4 GPU 上的
              Foresight 世界模型。量化结果包括感知速度提升 17×（每周期从 1,508 ms 降至 90 ms）以及每周期数据吞吐量提升 32×。FedEx 计划在美国主要枢纽扩大 Dexterity
              部署；FedEx 每年整体自动化投入约 $1 billion。Dexterity 在官网发布了 FedEx 正式案例研究，使其成为记录最扎实的客户证明点。Sagawa Express 代表 Mech
              机器人在日本的首次大规模商业使用。通过 Dexterity-SC 合资公司（Dexterity 与 Sumitomo Corporation 的合资企业），Sagawa 于 2025 年 5 月在东京 X
              Frontier 中转中心开始部署。据报道，Sagawa 对卡车装载质量、速度和拖车利用率的基准均被超过。Dexterity 和 Sumitomo 披露的战略目标，是在数年内于日本部署 1,000+ 台
              Mech。日本 2024 年卡车司机加班上限（“2024 问题”）为采用提供了强监管顺风。GXO Logistics 于 2024 年开始与 Dexterity
              试点，聚焦为一家美妆品牌客户执行拆垛、贴标和重新码垛流程。Supply Chain Dive、Modern Materials Handling 和 Automated Warehouse Online 均确认了
              GXO 合作。GXO 表示正在“与其他主要品牌洽谈”扩展，但截至 2026 年 5 月，尚无第二个 GXO 站点获得公开确认。UPS 在二级资料和 Dexterity 官网被列为 Dexterity
              客户，部署被描述为覆盖“多个枢纽”。UPS 每年自动化支出约 $1 billion，并宣布到 2028 年自动化 60+ 个美国设施，但 UPS 具体使用 Dexterity 的部署成果尚未被独立记录。
