      - number: '2.4'
        title: 增长驱动与采用约束
        blocks:
          - type: paragraph
            body: >
              仓储机器人需求增长由三项结构性驱动支撑：


              （1）劳动力短缺与工资通胀：2024 年美国仓储工资同比上涨 7-9%；移民流入下降正从结构上加剧到 2027 年的码头用工短缺。 83% 的供应链领导者预计五年内会采用机器人（当前为
              41%），显示潜在需求很大。


              （2）电商量增长：电商推动约 40% 的自动存储系统需求；到 2030 年，美国包裹量约以 6% CAGR 增长。B2C 包裹如今约占美国发货量 75%（1985 年为 10%），放大了单设施吞吐要求。


              （3）已记录 ROI：在按自动化设计的设施中，AMR 回本周期低于 24 个月，规模化 ROI 超过 250%；早期采用者报告劳动力成本下降 25-30%，订单履约速度提升 300%。RaaS 模式把 CapEx
              转为 OpEx，降低 VP 层级买方的资本授权负担。


              采用约束同样重要：


              （1）基础设施成本与集成复杂度：每个设施的网络升级成本为 $30,000-$150,000；WMS 和 ERP 集成需要重做工作流并推动变更管理。 「试点炼狱（Pilot
              purgatory）」——试点在企业部署前停滞——是已有充分记录的模式。


              （2）资本强度与切换成本：部署后，硬件和服务合同形成锁定，切换供应商门槛高；即便采用 RaaS 模式，小型 3PL 仍面临前期资本约束。


              （3）市场整合风险：Automation.com 预测，2026 年供应商洗牌将由市场碎片化和客户对多应用解决方案的需求推动。McKinsey 指出， 大规模部署中的吞吐提升低于预期，带来 ROI 不确定性。
