      - number: '2.3'
        title: 买方与细分画像
        blocks:
          - type: paragraph
            body: >
              Dexterity 产品的主要买方分为三类：（1）在专用枢纽管理高吞吐车厢作业的快递和包裹承运商（FedEx、UPS、DHL）； （2）运营多客户分销中心的合同 3PL（GXO、XPO、DB
              Schenker）；（3）拥有自有履约网络的大型零售商 （Walmart、Target）。Amazon 大体不属于 Dexterity 的可获客市场，因为其将大部分自动化开发内化 （Proteus
              AMR、Cardinal arm），限制了第三方可寻址空间。


              预算授权采用分层模式：每年 $0.5-5M 的 RaaS 合同由物流 / 运营副总裁层级批准；超过 $3M 的资本性采购需要 CFO 批准。 因此，RaaS 结构对销售周期很关键：它能在不触发 CFO
              闸门的情况下，加快 VP 层级签批。


              3PL 市场在 2026 年价值 $1.8 trillion，预计到 2035 年达到 $4.3 trillion，是自动化投资的买方生态。 74% 的托运方表示，若 3PL 服务商具备更好的 AI
              和自动化能力，他们愿意更换服务商；因此，3PL 部署机器人是保持竞争力和留住客户的要求， 不再是可选投资。预计到 2030 年，3PL 自动化采用速度将超过品牌自营设施。


              由 Dexterity-SC 与 Sumitomo 的合资公司打开的日本买方板块，是一个接受度高的第二市场：日本劳动力老龄化、
              码头人工成本高、电商增长，共同形成强结构性需求。更广义的亚太地区也领跑全球仓储机器人投资。
