        - 立即复核投资假设；暂停任何未出资承诺；等待根因分析和完整补救计划后再推进 Series D
      - - FedEx 或 UPS 合同不续约
        - Series C 关闭后 12 个月内没有新的 FedEx 枢纽部署公告；FedEx Investor Day 自动化展示中不再提及 Dexterity
        - 公开宣布 FedEx 合同不续约，或竞争对手替换任何仍在运行的 Dexterity 枢纽部署
        - 实质性重评投资假设；索取更新后的收入模型和客户多元化路线图；评估近期跑道影响
      - - Series D 融资失败或严重降价轮
        - 估算 Series C 关闭后 18 个月内没有 Series D 公告；仅由现有投资人提供桥接融资
        - 确认以低于 Series C 估值融资；披露仅有桥接融资；启动战略买家沟通
        - 全面重评投资假设；索取更新后的财务预测、跑道分析和战略替代方案评估
      - - 机器人 OEM 的 NVIDIA L4 GPU 配额被大幅削减
        - NVIDIA 宣布优先向数据中心客户分配；Dexterity 推迟新机器人生产出货
        - 确认 Dexterity 因 NVIDIA 配额约束停产，或交付承诺延误超过 6 个月
        - 上调运营风险；向管理层索取替代算力路线图；评估生产积压对收入指引的影响
      - - Samir Menon 离任且无继任计划
        - CEO 离任公告或长期病假；未任命能获得投资人信任的继任者或临时 CEO
        - Series D 关闭前 CEO 宣布离任，且没有获得机构投资人背书的确认继任者
        - 立即与投资人董事会沟通；索取正式继任流程时间表；基于继任者画像评估持有还是退出
      - - 直接竞争对手达到 Dexterity 10 倍部署规模
        - 竞争对手（Symbotic、Figure AI 或人形机器人平台）宣布自主抓取部署量超过 Dexterity 已确认站点数的 10 倍
        - 竞争对手公开确认在 Dexterity 核心包裹 / 物流垂直领域达到 10 倍部署规模，且发生在 24 个月窗口内
        - 复核战略差异化；向管理层索取竞争分析；评估 Dexterity 数据飞轮护城河是否仍然耐久
    notes: >
      终止标准是一组可监测的二元事件，清晰指向投资假设恶化。本章列出的风险并非都构成终止标准，许多仍可在投资假设内管理。工人安全事故和 FedEx 不续约优先级最高，因为任一事件都会同时损害收入、监管地位和 Series D
      融资可信度。
