        title: 展示材料
        blocks:
          - type: callout
            title: 复利式数据飞轮是最核心的技术护城河
            body: >
              Dexterity 跨所有商业部署汇聚的 100 M+ 次自主动作语料，构成会复利的竞争护城河。FedEx、UPS、GXO 或 Sagawa 运营的每一台 Mech 都会增加训练信号，反过来提升整个机队的
              Foresight 表现。没有同等真实世界操作数据语料的竞争者，即便复制了硬件，也会面对不断拉大的性能差距。这种飞轮机制类似搜索或推荐平台的护城河，是 Dexterity 已经建立的最可防守资产。
