        - 高 — 机器人停产；面向 FedEx、UPS、Sagawa Express 的部署承诺无法按期兑现
        - 低 — 未公开确认第二来源 OEM 认证或自有机械臂制造能力
        - 中-高 — 超出当前生产批次的扩张，需要 Kawasaki 产能确认或替代 OEM 认证
        - Kawasaki 供应协议条款、最低订单承诺和第二来源认证计划未公开披露
      - - 单站点故障外溢 — 某一部署发生重大安全事故，触发所有同类部署的预防性暂停
        - 低 — 单季度内单次重大事故概率低；是否外溢取决于政策选择，并非必然
        - 高 — 多个 FedEx 和 UPS 站点同时暂停，会实质压低 ARR，并向投资人释放产品质量问题信号
        - 早期 — 未公开确认事故响应协议或站点隔离能力
        - 中 — 长时间调查会中断数据飞轮收益；客户信心难以恢复
