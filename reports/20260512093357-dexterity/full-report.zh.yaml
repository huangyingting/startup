      - number: '7.6'
        title: 展示材料
        blocks:
          - type: callout
            title: FedEx 客户集中是最大的单一财务风险
            body: >
              基于 FedEx 在所有公开沟通中的锚定角色、FedEx Investor Day 展示，以及美国多枢纽部署深度，FedEx 估计占 Dexterity 总合同 ARR 的 25% 或更多。FedEx
              合同不续约——无论原因是成本重新议价、被竞争对手替代，还是 FedEx 自动化供应商策略转向——都会实质性损害收入，打乱 Series D 融资叙事，并削弱支撑 Dexterity
              产品差异化主张的证据基础。投资人在任何 Series D 承诺前，应要求 FedEx 确认多年期合同在手收入。
            calloutType: risk
            claimRefs:
              - CR020
              - CR021
              - CR035
          - type: callout
            title: NVIDIA L4 GPU 单一来源依赖尚未缓释
            body: >
              Dexterity 的 Foresight 世界模型推理运行在 NVIDIA L4 GPU 上，并在 2026 年 3 月 FedEx Investor Day
              公开展示。公司未公开披露任何替代推理计算平台。2022–2023 年 AI GPU 短缺证明，当数据中心需求激增时，NVIDIA 会限制 OEM 分配。若供给受限 6 至 12
              个月，新机器人生产会停摆，客户部署承诺会延后，成功完成 Series D 所需的增长叙事也会受损。截至报告日，这一依赖在技术和商业上都未被缓释。
            calloutType: risk
            claimRefs:
              - CR014
              - CR016
              - CR038
          - type: callout
            title: RaaS 资本 J 曲线加剧 Series D 时间压力
            body: >
              Robots-as-a-Service 模式要求 Dexterity 先制造并部署实体机器人，再收取订阅收入；每个新站点在回本前 18 至 36 个月内都是现金流为负。按估计每月 $5–15 million
              的烧钱速度，以及自 2025 年 3 月起 6 至 19 个月的现金跑道，公司必须在资本基础耗尽前完成 Series D。Series D
              失败或严重稀释，是最可能的财务层面打破投资逻辑情景。投资人应要求明确的单元经济数据，以及足以支持 Series D 以建设性估值完成的合同在手收入。
            calloutType: risk
            claimRefs:
              - CR024
              - CR025
              - CR026
              - CR036
          - type: callout
            title: Series D 前需确认 ISO 10218 认证和产品责任覆盖
            body: >
              截至 2026 年 5 月，Dexterity 未公开披露其 ISO 10218 认证状态和产品责任保险覆盖金额。在承诺 Series D 前，投资人应要求：（1）Mech 机器人系统的 ISO 10218-1
              / 10218-2 认证文件；（2）ISO/TS 15066 协作运行合规确认；（3）产品责任保险覆盖金额，以及任何客户赔偿上限结构；（4）法律顾问对 Dexterity RaaS
              模式中产品与服务责任定性的意见。这些是标准尽调前置项，目前在公开记录中缺失。
            calloutType: recommendation
