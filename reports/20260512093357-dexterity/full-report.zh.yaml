      - number: '6.3'
        title: 留存、续约和满意度
        blocks:
          - type: paragraph
            body: >
              截至 2026 年 5 月，任何公开来源都没有披露 Dexterity
              的净留存率（NRR）、总留存率（GRR）、流失率、续约率、合同期限或净推荐值（NPS）。这符合一家处于早期商业阶段、尚未经历需要公开投资人披露的新一轮融资的公司特征。不过，间接耐久性信号有意义。FedEx
              持续在多个枢纽部署 Dexterity，并把合作放在面向机构投资人的旗舰活动 FedEx Investor Day 核心展示位置，强烈说明双方是活跃且会续展的合作，而非试用关系。Sagawa Express
              公开认可系统相对内部基准的表现，并承诺 1,000+ 台的长期扩张目标，暗示多年期商业承诺。GXO 表示有意扩展至更多品牌客户，说明现有试点达到或超过了内部绩效门槛。RaaS
              订阅模式在结构上鼓励留存：客户为硬件、软件和支持打包支付经常性费用，切换成本包括重新培训运营人员，以及把替代系统重新接入既有 WMS 基础设施。Dexterity
              的数据飞轮还会随时间进一步抬高切换成本：每个部署都会增加 Foresight
              训练语料，长期客户因此受益于累积模型改进，而新进入者无法自动复制。公开渠道尚未报告负面客户反馈、取消或被竞争对手替换的事件。但不能把缺少公开负面数据等同于留存已被确认——客户基础太小，部署时间也太短，公开来源还看不出流失动态。
