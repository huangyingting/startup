  - number: 4
    title: 财务情况
    sections:
      - number: '4.1'
        title: 收入模式与定价架构
        blocks:
          - type: paragraph
            body: >
              Dexterity 的收入几乎全部来自 RaaS（机器人即服务）订阅模式。企业客户不直接购买机器人，而是持续付费， 打包获得硬件部署、软件许可、维护和支持。这一设计有意把资本开支从客户资产负债表转到
              Dexterity，消除了过去拖慢企业采用机器人的大额前期门槛。 该模式带来可预测的经常性收入，并与运营可用率和吞吐承诺绑定；一旦性能下降，经济损失由 Dexterity 承担，而不是客户。 Dexterity
              未公开披露标价，但第三方估计和行业基准显示，大型车厢装卸站点的单站点合同价值可能在 $1–5M ARR 区间。
              对复杂部署而言，初始集成和非经常性工程（NRE）费用可能补充基础订阅。收入确认按履约期递延确认；任何前期 NRE 费用很可能在初始合同期内确认。
