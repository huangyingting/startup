      - number: '5.4'
        title: 差异化、竞争护城河与路线图
        blocks:
          - type: paragraph
            body: >
              Dexterity 的竞争差异化靠三根柱子互相加固：自研世界模型训练语料会随每一次部署继续长大；硬件无关的 API
              架构降低了企业集成商的切换成本；人形作业尺度的机器人无需改造基础设施，就能在标准拖车内作业，这个设计约束直接拿掉了竞争性固定自动化方案常见的场地重建成本。数据飞轮是最深的技术护城河。任何一台 Mech
              处理的每个纸箱——跨所有客户和站点——都会生成带标注的动作数据，并进入 Foresight 训练管线。截至 2026 年初，公司已累计 100 M+
              次自主动作，训练语料规模比任何单一物流运营商独立积累的数据高出几个数量级。FedEx、UPS、GXO、Sagawa
              等既有客户因此更有理由留在平台上：它们的运营数据不只改善自身站点表现，还会和全球机队一起复利，形成共享网络效应，抬高转向替代系统的退出成本。Kawasaki 合作制造的定制 8
              轴机械臂带来现成机械臂拿不到的机械能力（负载、工作半径、灵巧度）。Beckhoff 的 FSoE 安全栈和 NVIDIA L4 推理底座在各自领域都是事实标准，但 Dexterity
              把两者整合进统一的实时架构，这是一项系统级能力，复制需要大量时间。Foresight API
              和开发者社区进一步加深护城河：平台邀请第三方技能构建者贡献能力并依赖平台，打法类似云平台生态。公开沟通显示，近期路线图重点包括借助 Dexterity-SC
              扩大地域部署、覆盖更大规模的包裹分拣单件化流程，以及更深入接入 NVIDIA Isaac 机器人仿真平台，加速生成合成数据。
