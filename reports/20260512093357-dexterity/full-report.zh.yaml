      - number: '1.4'
        title: 里程碑、规模与客户证据
        blocks:
          - type: paragraph
            body: >
              Dexterity 的运营里程碑显示，公司用八年时间从研究原型稳步推进到生产级部署。2021 年，公司完成第一次完全自主机器人抓取， 标志着 Physical AI 从实验室走向功能性演示。第一次企业部署发生在
              2022 年，地点是一家 Fortune 500 客户设施， 用于自主卡车装车；公司新闻材料称其为「最早将 Physical AI 投入连续生产的公司之一」。到 2023 年末， Dexterity
              在客户现场累计完成超过 10 million 次自主生产动作。关键在于，到 2025 年累计自主动作数达到 100 million，在大约两年内增长 10 倍；公司将其归因于机群扩张和单站点吞吐提升。2023 年
              9 月， Dexterity 公开宣布与 FedEx 合作测试用于车厢装车的 DexR，公告中引用了 FedEx 运营科学企业副总裁 Rebecca Yeung 的表述。2023 年 12
              月，Dexterity、Sumitomo、SG Holdings 和 Sagawa Express 宣布在日本合作推进机器人卡车装车， 并于 2025 年 5 月在 Sagawa 位于东京的 X Frontier
              中转中心启动运营验证。2024 年 6 月成立的 Dexterity-SC Japan 合资公司，目标是向日本客户交付超过 1,000 台 Mech 机器人。2026 年 3 月，FedEx 在 Investor
              Day 将 Dexterity 列为关键技术伙伴。同月，Dexterity 公开推出 Foresight。2026 年 4 月，Dexterity 推出 Instinct。robotics.press 在
              2026 年 4 月发布反向分析师笔记，认为 Dexterity 的商业逻辑尚未在工业规模上得到验证，理由包括未公开披露收入、 经审计部署 KPI，且只有一个具名客户引用。
