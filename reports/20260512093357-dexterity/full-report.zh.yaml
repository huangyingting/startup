            body: >
              Dexterity 未披露任何经审计财务指标——收入、毛利率、烧钱速度或客户级 ARR——因此无法独立验证本章任何财务主张。第三方估计 （ARR 约 $63M、月烧钱约 $10M）看起来合理，但未经验证，可能有
