      - number: '8.3'
        title: 乐观、基准和悲观情景分析
        blocks:
          - type: paragraph
            body: >
              三种情景决定 Dexterity 在 2025–2028 年投资期内的估值轨迹；每种情景都锚定 ARR 增长、毛利率路径和退出倍数的明确假设。

              乐观情景假设，到 2028 年 RaaS 订阅规模达到 $500 million ARR，驱动因素包括 FedEx 和 UPS 多站点扩张、日本合资公司成功部署 1,500 台机器人、再获得三个或更多
              Fortune 500 物流客户，以及毛利率从当前估计的 15–25% 改善至 35% 或以上。按 7–8 倍 ARR 退出倍数（符合高增长硬件型 SaaS），隐含企业价值达到 $3.5–4
              billion，Series C 资本在稀释前可获得约 2–2.5 倍回报。该情景概率设为 30%，前提是制造规模、客户扩张和利润率改善同时执行到位。

              基准情景预计，到 2028 年 ARR 达到 $180–220 million，毛利率升至 25–30%，并以 $2–2.5 billion 完成战略 M&A 退出或 Series D。Series C
              投资人回报约 1.2–1.5 倍——边际，但仍高于成本线。概率为 45%，要求 FedEx 和 UPS 续约，并新增一个具名生产客户。

              悲观情景设想，如果 ARR 增长不及预期、FedEx 客户集中恶化，或宏观环境收紧，公司在 2026–2027 年 Series D 融资失败或下轮降估值。在这种情况下，以 $700 million 至 $1
              billion 被人才收购或困境战略出售，较 Series C 价格折价 40–60%。持有 1× 非参与型清算优先权的 Series C 投资人可能收回本金；普通股东会受到严重损害。悲观概率为
              25%。各情景按概率加权后的预期价值约 $2.05 billion——略高于 Series C 入场价格，但对追求风险调整后回报的投资授权来说并不有吸引力。
