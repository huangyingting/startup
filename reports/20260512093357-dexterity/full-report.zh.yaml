  - id: FR002
    type: dag
    title: 风险传导图
    layout: standard
    summary: |
      这张有向无环图展示 Dexterity 的主要风险如何在组织内传导，并威胁收入、客户关系、融资和估值结果。
    data:
      nodes:
        - id: safety_incident
          label: |-
            工人安全事故
            （OSHA 处罚或机器人伤害）
          type: risk
        - id: nvidia_shortage
          label: |-
            NVIDIA L4 GPU 短缺
            （分配受限）
          type: risk
        - id: fedex_dependency
          label: |-
            FedEx 客户集中
            （估计占 ARR 25%+）
          type: risk
        - id: key_person
          label: |-
            Samir Menon 离任
            （唯一创始人兼 CEO）
          type: risk
        - id: deployment_pause
          label: |-
            多站点部署暂停
            （安全或监管叫停）
          type: process
        - id: production_halt
          label: |-
            机器人生产停摆
            （硬件供应受限）
          type: process
        - id: revenue
          label: |-
            收入与 ARR
            （RaaS 订阅基础）
          type: output
        - id: series_d
          label: |-
            D 轮融资
            （2026-2027 年时间压力）
          type: output
        - id: valuation
          label: |-
            估值与回报
            （投资者退出倍数）
          type: output
      edges:
        - from: safety_incident
          to: deployment_pause
          label: 触发预防性暂停
        - from: nvidia_shortage
          to: production_halt
          label: 叫停新机器人生产
        - from: deployment_pause
          to: revenue
          label: 减少有效 ARR
        - from: production_halt
          to: revenue
          label: 限制新站点 ARR
        - from: fedex_dependency
          to: revenue
          label: 不续约会削掉 25%+ ARR
        - from: revenue
          to: series_d
          label: 削弱融资叙事
        - from: key_person
          to: series_d
          label: 动摇投资者信心
        - from: series_d
          to: valuation
          label: 决定退出价格
    approximationNotes: |
      风险传导路径是分析师对公开信息的解读。实际因果关系取决于具体合同条款、投资者动态和未公开运营细节。图中展示最可能出现、严重性最高的传导链。
    claimRefs:
      - CR009
      - CR014
      - CR020
      - CR025
      - CR029
      - CR035
      - CR036
      - CR037
  - id: FR003
    type: dag
    title: 依赖关系图
    layout: standard
    summary: |
      这张有向图梳理 Dexterity 的关键外部依赖——硬件供应商、平台提供方、合资伙伴和锚定客户；每个依赖带来的单点集中风险和级联失效情景也在图中展开。
    data:
      nodes:
        - id: nvidia_l4
          label: |-
            NVIDIA L4 GPU
            （单一来源推理算力）
          type: input
        - id: kawasaki
          label: |-
            Kawasaki Robotics
            （唯一 8 轴机械臂 OEM）
          type: input
        - id: beckhoff
          label: |-
            Beckhoff Automation
            （安全技术合作伙伴）
          type: input
        - id: sumitomo
          label: |-
            Sumitomo Corporation 合资公司
            （日本市场渠道）
          type: input
        - id: mech_production
          label: |-
            Mech 机器人生产
            （硬件 + AI + 安全栈）
          type: process
        - id: fedex
          label: |-
            FedEx 部署
            （锚定客户，约占 ARR 25%+）
          type: output
        - id: sagawa
          label: |-
            Sagawa Express（日本）
            （通过 Dexterity-SC 合资公司）
          type: output
        - id: other_customers
          label: |-
            UPS、GXO 及其他客户
            （扩张客户基础）
          type: output
      edges:
        - from: nvidia_l4
          to: mech_production
          label: 推理算力
        - from: kawasaki
          to: mech_production
          label: 8 轴机械臂硬件
        - from: beckhoff
          to: mech_production
          label: 安全技术栈
        - from: mech_production
          to: fedex
          label: 美国枢纽部署
        - from: mech_production
          to: sagawa
          label: 日本部署
        - from: mech_production
          to: other_customers
          label: 其他部署
        - from: sumitomo
          to: sagawa
          label: 合资渠道准入
    approximationNotes: |
      依赖关系基于截至 2026 年 5 月公开确认的合作伙伴关系和产品披露。最终组装 EMS 合作伙伴及其他组件供应商未公开确认，因此本图未纳入。收入集中度估计是分析师基于公开信息作出的判断；实际比例需要数据室资料验证。
    claimRefs:
      - CR013
      - CR014
      - CR015
      - CR019
      - CR020
      - CR022
  - id: FV001
    title: 投资建议逻辑
    type: flow
    notes: 从证据支柱出发，经由估值和风险评估推导到建议立场。“观察”反映估值倍数偏高，但商业部署证据已经验证。
    claimRefs:
      - CV001
      - CV003
      - CV004
      - CV026
      - CV030
      - CV031
    data:
      nodes:
        - id: n1
          label: 客户：FedEx、UPS、GXO、Sagawa Express（已确认部署）
        - id: n2
          label: 融资：投后 $1.65B；累计融资 $291M；2025 年 3 月 C 轮
        - id: n3
          label: ARR 估计 $57–66M；收入倍数约 25×（相对硬件可比公司偏高）
        - id: n4
          label: Symbotic 可比：收入 4.5×；Berkshire Grey：不利 SPAC 先例
        - id: n5
          label: 风险：FedEx 集中度 >25%；每月烧钱 $5–15M；RaaS J 曲线
        - id: n6
          label: 乐观 / 基准 / 悲观：$4B / $2.25B / $1B 退出；概率加权 EV 约 $2.05B
        - id: n7
          label: 观察——条件性买入（第三个具名客户 + ARR 达 $100M 触发）
      edges:
        - source: n1
          target: n7
        - source: n2
          target: n7
        - source: n3
          target: n7
        - source: n4
          target: n7
        - source: n5
          target: n7
        - source: n6
          target: n7
  - id: FV002
    title: 估值敏感性
    type: bar
    notes: 不同收入和倍数情景下，退出时对应的隐含企业价值。所有数字都是基于公开证据和可比公司组合的模型估计。
    claimRefs:
      - CV017
      - CV018
      - CV019
      - CV020
      - CV022
      - CV023
    data:
      items:
        - label: 乐观情景（ARR $475M × 7.5×）
          value: 3563
          detail: 30% 概率；假设 FedEx/UPS 多站点部署 + 日本 1,500 台机器人 + 新客户
        - label: C 轮投后估值（2025 年 3 月）
          value: 1650
          detail: 入场参考价；按估计 ARR $60M 计算约 25×
        - label: 基准情景（ARR $200M × 10×）
          value: 2000
          detail: 45% 概率；锚定客户续约 + 一个新增具名客户
        - label: Symbotic 隐含倍数（估计 ARR × 5×）
          value: 300
          detail: 以可比公司锚定的下限；将 Symbotic 4.5-5× 倍数套用于 $60M ARR
        - label: 悲观情景（人才收购 / 降价融资）
          value: 850
          detail: 25% 概率；D 轮融资失败，或以大幅折价定价
  - id: FV003
    title: 估值 / 回报区间
    type: range
    notes: 在既定情景假设下的低 / 中 / 高估值和隐含退出区间。区间反映模型估计；实际结果取决于执行和市场条件。
    claimRefs:
      - CV017
      - CV018
      - CV019
      - CV020
      - CV022
    data:
      items:
        - label: 当前隐含估值（C 轮，2025 年 3 月）
          low: 1500
          mid: 1650
          high: 1800
          unit: M USD
        - label: 乐观退出 2027–2028 年（M&A 或 D 轮）
          low: 3000
          mid: 3750
          high: 4500
          unit: M USD
        - label: 基准退出 2027–2028 年（战略 M&A）
          low: 1800
          mid: 2250
          high: 2800
          unit: M USD
        - label: 悲观退出（困境 M&A 或降价融资）
          low: 600
          mid: 850
          high: 1100
          unit: M USD
  - id: FV004
    title: 投资 KPI
    type: kpi
    notes: 面向 IC 的记分卡，总结关键财务、运营和战略指标。除非另有说明，收入和 ARR 数字均为第三方分析师估计。
    claimRefs:
      - CV001
      - CV002
      - CV003
      - CV004
      - CV007
      - CV009
    data:
      items:
        - label: C 轮投后估值
          value: $1.65B
          detail: 2025 年 3 月；Lightspeed 和 Sumitomo 领投
        - label: 累计股权融资
          value: ~$291–300M
          detail: 种子轮至 C 轮；Kleiner Perkins、GV、Goldman Sachs、Lightspeed、Sumitomo
        - label: 估计 ARR（第三方）
          value: $57–66M
          detail: Growjo / ZoomInfo 分析估计；公司未确认
        - label: 隐含 ARR 倍数
          value: ~25–27.5×
          detail: 对比 Symbotic 收入 4.5×；对比硬件 RaaS 通常 1.5–4×
        - label: 概率加权退出 EV
          value: ~$2.05B
          detail: 30% 乐观（$3.75B）+ 45% 基准（$2.25B）+ 25% 悲观（$0.85B）
        - label: Symbotic FY2024 收入（公开可比公司）
          value: $1.79B
          detail: SEC 10-K；同比增长 52%；毛利率约 13.7%
        - label: 估计月度烧钱速度
          value: $5–15M/month
          detail: 分析师基于员工数和已投入资本推断
        - label: IPO 准备就绪门槛
          value: $200M ARR + positive GM
          detail: 基准情景下估计为 2027–2028 年
