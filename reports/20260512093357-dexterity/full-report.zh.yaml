        - 驱动因素
        - 2027+ 年前结构性
        - 主要需求拉力；码头工资每上涨 1%，DexR 回本期约缩短 6 个月
        - 给管线假设背书前，确认 FedEx 和 GXO 的码头岗位空缺高于平均水平
      - - 电商包裹量增长（6% CAGR）
        - 驱动因素
        - 2030 年前结构性
        - 货量上升提高承运商枢纽的拖车装载频次，增强单设施 ROI 论证
        - 对销售管线中可触达设施的装载频次假设建模
      - - 物流 RaaS 模式采用
        - 驱动因素
        - 2025-2027 年加速
        - 降低买方资本门槛；支持 VP 层级授权；形成经常性收入
        - 向 Dexterity 索取合同留存率和平均期限
      - - 83% 的供应链负责人计划 5 年内采用机器人
        - 驱动因素
        - 潜在管线，3-5 年周期
        - 未来需求信号大，但转化滞后带来短期收入不确定性
        - 按年跟踪管线转签约合同的转化率
      - - 基础设施升级成本（每站点 $30K-$150K）
        - 约束
        - 选址时立即出现
        - 设施资格筛选将可触达基数限制在电力和装卸口几何条件达标的站点
        - 量化目标设施中已预审合格与需要升级的占比
      - - 集成复杂度与试点泥潭
        - 约束
        - 部署周期长达数月
        - 拉长销售周期；若 Dexterity 比竞争对手更能简化集成，就能拉开差异
        - 索取从签约到投产的平均时长；跟踪试点转生产率
      - - 2026 年供应商洗牌预测（Automation.com）
        - 约束
        - 近期（2026 年）
        - 市场整合可能挤压单一任务供应商；Dexterity 的多机器人产品组合可缓释风险
        - 监测竞争对手退出动态；跟踪 Dexterity 多机器人部署占比
      - - Amazon 内部自动化把一个大买家从 SAM 中剔除
        - 约束
        - 持续
