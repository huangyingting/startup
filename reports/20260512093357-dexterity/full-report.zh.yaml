  - number: 8
    title: 估值
    sections:
      - number: '8.1'
        title: 投资逻辑、反向逻辑和建议
        blocks:
          - type: paragraph
            body: >
              Dexterity 的投资逻辑建立在五个互相强化的支柱上。第一，公司占据仓库物流物理 AI 中一个可防守的细分位置——这个类别不同于纯软件 AI，也不同于 Dematic 或 Honeywell
              Intelligrated 这类固定自动化既有厂商，并且已在 FedEx、UPS、GXO 和日本 Sagawa Express 证明部署。第二，Robots-as-a-Service
              模式产生多年期合同经常性收入，收入可见性优于硬件销售同行。第三，与 Sumitomo Corporation 的合资公司在日本建立机构级分销渠道，日本是全球最大的物流市场之一。第四，NVIDIA
              硬件和平台背书带来算力可得性和生态可信度，小型同行不易复制。第五，累计融资 $291–300 million 带来从 2025 年 3 月起估计 6 至 19
              个月的现金跑道；若部署速度保持，足以支撑公司抵达下一个 ARR 里程碑。

              反向逻辑同样具体。$1.65 billion 的 Series C 估值约等于估计 ARR $57–66 million 的 25 倍——这一倍数高于 Symbotic 4.5
              倍收入倍数，也远高于硬件机器人公司常见的 1.5–4 倍收入倍数。该溢价已经计入增长，但公司尚未在证明入场价格所需的 ARR 规模上展示增长。FedEx 估计贡献超过 25% 收入，形成单一客户集中风险。RaaS
              模式的资本 J 曲线意味着 Dexterity 必须先为机器人机队融资，等订阅收入覆盖硬件成本之前都承受结构性现金拖累；在每月 $5–15 million
              烧钱速度下，这会放大烧钱风险。总体建议是观察：只有在确认第三个具名生产客户且 ARR 接近 $100 million 后，才触发有条件买入。
