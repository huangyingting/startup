      - number: '7.2'
        title: 监管、法律和安全风险
        blocks:
          - type: paragraph
            body: >
              Dexterity 的机器人在美国仓库环境中运行，受 OSHA 29 CFR 1910 一般工业安全要求，以及 29 CFR 1910.217 中机器防护和上锁 / 挂牌（LOTO）条款约束。OSHA
              机器人指南明确，任何可能造成伤害的自动化系统都必须通过工作站设计、周界防护，或限制速度与力的协作运行方式来保护人员。Dexterity 的 Mech 机器人是大负载 8
              轴机械臂系统，在包裹分拣环境中靠近人类码头工人作业，因此 OSHA 合规是必选项，不是可选项。若未能满足这些要求，或工作场所事故后 OSHA
              检查发现文档缺口，公司会收到传票和罚款，受影响客户站点的部署还可能被暂停。国际标准框架同样严格。ISO 10218-1 和 ISO 10218-2 规范工业机器人及集成安全要求，ISO/TS 15066
              处理协作机器人运行。若要进入欧洲市场，满足欧盟 Machinery Directive 下的 CE 标志是前置条件。Dexterity 未公开披露其 ISO 10218 认证状态，形成一个投资人应在 Series
              D 承诺前补齐的证据缺口。日本 2024 年卡车司机加班改革为 Dexterity-SC 与 Sumitomo 的合资公司带来监管顺风，但也给跨境部署和劳动关系增加监管复杂性。产品责任是独立法律风险。如果
              Dexterity Mech
              机器人造成工人受伤或重大财产损失，无论合同赔偿条款如何，公司都将在美国侵权法下承担产品责任暴露。机器人专属责任法理仍在演进，法院会分析机器人究竟构成产品（适用严格责任）还是服务（适用过失标准）——这一区分会显著影响保险要求和诉讼暴露。来自既有机器人公司的
              IP 诉讼是次级法律风险：Boston Dynamics、FANUC、ABB 等公司持有大量操作类专利组合，针对 Dexterity 夹爪或运动规划技术的专利挑战，可能带来多年诉讼成本和禁令风险。截至 2026
              年 5 月，尚无公开确认的 Dexterity 进行中诉讼。
