      - number: '8.2'
        title: 估值背景、入场纪律和资本结构
        blocks:
          - type: paragraph
            body: >
              Dexterity 的 $1.65 billion 投后估值是在 2025 年 3 月通过 $95 million Series C 确立的，该轮由 Lightspeed Venture Partners 和
              Sumitomo Corporation 领投，Kleiner Perkins、GV (Google Ventures) 和 Goldman Sachs 等既有投资人参投。累计股权融资约 $291–300
              million，覆盖种子轮、Series A、$56 million 早期轮、2021 年 $140 million Series B（估值 $1.4 billion）以及 2025 年 Series
              C。这笔累计资本形成显著优先股堆叠：在低于 $1.5 billion 的中等退出情景下，标准 1× 非参与型清算优先权会让投资人先拿回资本，但普通股东——员工和创始人——几乎没有剩余收益。若是 2×
              参与型结构，以 $1.65 billion 入场的优先权压力在财务上更重。

              第三方 ARR 估计 $57–66 million（来自 Growjo 和 ZoomInfo analytics）是分析师推断，不是公司确认披露。按估计 ARR $60 million 计算，$1.65
              billion 估值意味着 27.5× ARR——只有两种条件能支撑这一溢价：（a）ARR 数据被显著低估，实际收入更接近 $100–120 million；或（b）投资人正在定价 3 至 5 年后的前瞻 ARR
              $300 million 或更多。公开证据无法验证任一条件。Dexterity 约 $5–15 million / 月的烧钱速度，以及自 2025 年初起估计 6 至 19 个月的现金跑道，使 2026–2027
              年 Series D 融资成为必要事项，也让届时市场环境成为关键风险变量。入场纪律要求，任何新资本承诺都应按 Series D 可能带来 15–20% 稀释来确定规模，且该轮估值未必高于 Series C 价格。
