  - id: FM004
    title: 采用漏斗或价值链图
    type: flow
    data:
      nodes:
        - id: F1
          label: 1. 认知
          detail: 买方发现码头劳动力短缺或货量增长缺口；扫描市场寻找自动化选项
          type: step
        - id: F2
          label: 2. 评估
          detail: RFI/RFP 流程；供应商演示、现场访问、试点范围界定；通常历时 2-6 个月
          type: step
          parent: F1
        - id: F3
          label: 3. 试点授权
          detail: 试点需 VP 级签批；完成场地资质确认（电力、货位几何）；界定 WMS 集成范围
          type: step
          parent: F2
        - id: F4
          label: 4. 试点部署
          detail: 单个货位或单个场地运行 3-6 个月；与人工基线做性能对标；可能在此卡住
          type: step
          parent: F3
        - id: F5
          label: 5. 企业规模化决策
          detail: CFO/CSCO 授权多场地铺开；试点 ROI 有书面证明；RaaS 合同或 CapEx 审批通过
          type: step
          parent: F4
        - id: F6
          label: 6. 生产部署
          detail: 多场地铺开；WMS 集成上线；持续服务合同生效；Foresight 平台增购
          type: step
          parent: F5
        - id: LEAK1
          label: 风险：试点泥潭
          detail: 许多公司在第 4 步卡住，原因包括集成复杂、ROI 不达标或组织协同失配（McKinsey、SupplyChainBrain）
          type: risk
          parent: F4
    approximationNotes: 该流程是基于 McKinsey、SupplyChainBrain 和 Logistics Viewpoints 来源推断出的通用企业机器人采用路径。Dexterity 尚未公开披露销售转化率或平均销售周期长度。
