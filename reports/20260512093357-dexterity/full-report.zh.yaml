  - number: 3
    title: 竞争格局
    sections:
      - number: '3.1'
        title: 竞争格局概览
        blocks:
          - type: paragraph
            body: >
              仓储机器人抓取市场可分为四个清晰竞争层级：（1）面向卡车装卸的直接 AI 抓取创业公司（Pickle Robot、 Berkshire
              Grey/SoftBank）；（2）拥有卡车处理产品的大型平台型机器人公司（Boston Dynamics Stretch、Symbotic 以及其近期收购的 Fox Robotics）；（3）需要定制 SKU
              集成的工业机械臂 OEM（Fanuc、KUKA、ABB、Universal Robots）； （4）普遍存在的人工劳动现状，它仍是大多数设施中的主导在位方案。2024 年 8 月，Amazon 吸收
              Covariant 创始团队和 IP， 事实上使 Covariant 不再是独立竞争者。行业正在向少数资本充足的对手集中，而不是分散长尾；这提高了企业客户获取和生产扩产速度的赌注。
              人工劳动这一现状——在多数设施中仍占主导，成本约为每小时 ~$15-20——仍是最大单一竞争替代方案；所有机器人玩家最终都在挑战替代人工所需的 ROI 门槛。
