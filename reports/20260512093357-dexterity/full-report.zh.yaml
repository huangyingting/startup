      - number: '5.2'
        title: 技术架构与软件平台
        blocks:
          - type: paragraph
            body: >
              Dexterity 的 AI 技术栈分为三层，且彼此紧密集成：用于预测规划的 Foresight 世界模型，用于实时执行的 Instinct 智能体编排平台，以及向企业集成商和第三方开发者开放技术栈的一组
              API（IRIS 和 Foresight）。Foresight 于 2026 年 3 月发布，是一个符合物理规律的 4D 世界模型，用商业部署中累计的超过 100 million 次自主动作训练。
              它生成空间密集的箱体放置选项表示，每个规划步骤评估 400 个候选位置，端到端延迟低于 400 milliseconds。Foresight 的实时仿真纳入重量、
              摩擦和结构物理，用来预测在异构堆叠中放置箱体后的下游稳定性；这项能力让机器人不必依赖预编程 pick-and-place 序列。 2026 年 3 月 FedEx Investor Day 是 Foresight
              运行在 NVIDIA L4 GPU 硬件上的首次公开展示，Dexterity 报告称， 相比上一代推理配置，数据吞吐提升 32×。Instinct 于 2026 年 4 月发布，是位于 Foresight
              之上的智能体编排层。 它协调 68+ 个专用智能体，分为三类功能：感知智能体（在 NVIDIA L4 GPU 上通过 TensorRT 优化，以 <100 ms 周期运行）、 决策智能体（调用 Foresight
              生成无碰撞运动计划）和运动智能体（通过实时控制回路执行低层关节轨迹）。IRIS API 与硬件无关， 可在运行时自动发现已连接硬件特征，并在不改代码的情况下支持至少 4 种机器人类型和 5+ 种夹爪 /
              机械手设计。 Foresight API 向外部开发者开放模型推理端点，使其可基于 Dexterity 世界模型构建定制抓取技能；GitHub 上的开发者社区活动提供了佐证。 推理计算底座为 NVIDIA L4
              GPU 与 TensorRT，Beckhoff TwinCAT 则提供实时现场总线层和 EtherCAT 安全协议。
