  evidenceGaps:
    - type: private-evidence-only
      severity: blocking
      topic: regulatory-certification-status
      missingEvidence: >
        ISO 10218 and ISO/TS 15066 certification documentation for the Mech robot system; product liability
        insurance coverage amounts and policy limits; legal counsel opinion on product vs. service liability
        characterization for the RaaS model.
      whyItMatters: >
        Without ISO certification confirmation, enterprise customers in regulated environments cannot validate
        compliance procurement requirements; without liability insurance confirmation, investors cannot
        quantify the balance-sheet risk of a robot-caused injury event at a FedEx or UPS hub.
      diligencePath: >
        Request ISO certification documents, CE marking status, product liability policy declarations, and
        legal opinion memo from Dexterity's legal counsel in Series D data room.
      relatedQuestionRefs:
        - QR011
      relatedTableRefs:
        - TR001

    - type: private-evidence-only
      severity: blocking
      topic: financial-unit-economics
      missingEvidence: >
        Dexterity's actual monthly burn rate, runway months remaining as of May 2026, per-site RaaS unit
        economics, hardware cost per deployed Mech robot, and contracted revenue backlog breakdown by customer.
      whyItMatters: >
        Without unit economics confirmation, the capital J-curve analysis and Series D timing pressure cannot
        be quantified; the burn rate range of $5-15M/month spans a three-fold uncertainty range that
        materially affects runway and fundraising urgency assessment.
      diligencePath: >
        Request income statement, burn schedule, contracted ARR by customer, per-site deployment cost, and
        Series D fundraising timeline from Dexterity CFO in data room access.
      relatedQuestionRefs:
        - QR029

    - type: missing-source
      severity: material
      topic: ai-field-performance
      missingEvidence: >
        Independent field reliability data for the Mech robot: inference failure rates, misgrip rates,
        production stoppage frequency, MTBF in sustained production, and safety incident history across
        FedEx, UPS, GXO, and Sagawa deployments.
      whyItMatters: >
        Technology brittleness risk cannot be assessed without field performance data; the claimed MTBF
        exceeding ten years cannot be verified from three years of deployment history; investor thesis
        depends on reliable physical-AI performance at scale.
      diligencePath: >
        Request site-level performance reports, MTBF tracking, safety incident log, and OSHA compliance
        audit results from Dexterity operations team and customer reference calls.
      relatedQuestionRefs:
        - QR028

    - type: missing-source
      severity: material
      topic: supply-chain-agreements
      missingEvidence: >
        NVIDIA L4 GPU supply agreement terms including allocation commitments, minimum order volumes, and
        pricing; Kawasaki arm supply agreement terms including production capacity, exclusivity provisions,
        and lead times; alternative compute or arm supplier qualification status.
      whyItMatters: >
        Without supply agreement terms, the hardware production risk from single-source dependencies
        cannot be quantified; investors cannot determine whether production halts are likely to affect
        deployment commitments in the Series D revenue ramp period.
      diligencePath: >
        Request supply agreement summaries for NVIDIA and Kawasaki from Dexterity supply chain team;
        confirm alternative compute evaluation roadmap and second-source OEM qualification timeline.
      relatedQuestionRefs:
        - QR027
