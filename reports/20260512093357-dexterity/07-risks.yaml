  claims:
    - id: CR001
      statement: >
        OSHA 29 CFR 1910 general industry standards and machine guarding regulations require that all industrial
        robots deployed in US warehouses be safeguarded through physical barriers, collaborative operation limits,
        or lock-out/tag-out procedures, creating a mandatory compliance baseline for every Dexterity deployment
        at FedEx, UPS, and GXO facilities.
      type: third-party-reported
      topic: regulatory-risk
      sourceRefs:
        - SR001
        - SR003
      confidence: high
      freshness: current
      answersQuestionRefs:
        - QR001
        - QR002

    - id: CR002
      statement: >
        ISO 10218-1 and ISO 10218-2 establish international safety requirements for industrial robot design and
        integration applicable to all Dexterity Mech deployments, while ISO/TS 15066 governs collaborative
        robot operation in shared human-robot workspaces — both standards are applicable to Dexterity's
        warehouse environments given the proximity of the Mech arm to human dock workers.
      type: third-party-reported
      topic: regulatory-risk
      sourceRefs:
        - SR007
        - SR006
      confidence: high
      freshness: current
      answersQuestionRefs:
        - QR003

    - id: CR003
      statement: >
        If a Dexterity Mech robot causes a worker injury or significant freight damage, the company faces
        product liability exposure under US tort law, with evolving robotics liability doctrine analyzing
        whether autonomous robots constitute products (strict liability) or services (negligence standard),
        a distinction with material consequences for insurance requirements and litigation outcomes.
      type: third-party-reported
      topic: legal-risk
      sourceRefs:
        - SR002
        - SR006
      confidence: medium
      freshness: current
      answersQuestionRefs:
        - QR001

    - id: CR004
      statement: >
        Japan's 2024 overtime reform for truck drivers — capping annual overtime at 960 hours — creates both
        regulatory tailwind for the Dexterity-SC JV's Japan deployment strategy and regulatory complexity for
        cross-border labor-law compliance in warehouse automation deployments via the Sumitomo joint venture.
      type: third-party-reported
      topic: regulatory-risk
      sourceRefs:
        - SR005
        - SR018
      confidence: medium
      freshness: current
      answersQuestionRefs:
        - QR001

    - id: CR005
      statement: >
        Dexterity faces IP litigation risk from incumbent robot companies including FANUC, ABB, and Boston
        Dynamics, which hold large manipulation and motion-planning patent portfolios; no active Dexterity
        IP litigation is publicly confirmed as of May 2026, but the company's growing commercial profile
        increases its visibility as a litigation target.
      type: inferred
      topic: legal-risk
      sourceRefs:
        - SR026
        - SR002
      confidence: medium
      freshness: current
      answersQuestionRefs:
        - QR012

    - id: CR006
      statement: >
        CE marking under the EU Machinery Directive and conformity with ISO 10218 are prerequisites for
        Dexterity to deploy Mech robots in European customer facilities; Dexterity has not publicly disclosed
        CE marking status, making European market entry timeline and compliance cost uncertain.
      type: inferred
      topic: regulatory-risk
      sourceRefs:
        - SR007
        - SR005
      confidence: medium
      freshness: current
      answersQuestionRefs:
        - QR003

    - id: CR007
      statement: >
        The Federal Register's 2023 guidance on worker and technology in the workplace establishes an ongoing
        regulatory posture toward transparency in automation deployment decisions, creating potential future
        compliance obligations around worker notification and impact assessment that could affect Dexterity's
        enterprise sales process in unionized logistics facilities.
      type: third-party-reported
      topic: regulatory-risk
      sourceRefs:
        - SR005
        - SR023
      confidence: medium
      freshness: recent
      answersQuestionRefs:
        - QR001

    - id: CR008
      statement: >
        Dexterity's Foresight world model is trained on a large corpus of parcel-handling data, but physical
        AI systems face systematic brittleness when deployed in environments that differ from the training
        distribution — including novel package shapes, sensor occlusion from stacked freight, wet floors
        in loading bays, and unusual lighting conditions — creating ongoing inference failure risk.
      type: inferred
      topic: technology-risk
      sourceRefs:
        - SR010
        - SR022
      confidence: medium
      freshness: current
      answersQuestionRefs:
        - QR017

    - id: CR009
      statement: >
        A serious worker safety incident involving a Dexterity Mech robot at a FedEx or UPS hub would
        trigger an OSHA inspection and potential enforcement action under 29 CFR 1910 machine guarding
        requirements, with possible consequences including deployment suspension at the affected site,
        citation fines, and precautionary pauses at all similar US deployments pending investigation.
      type: inferred
      topic: regulatory-risk
      sourceRefs:
        - SR001
        - SR003
      confidence: high
      freshness: current
      answersQuestionRefs:
        - QR018

    - id: CR010
      statement: >
        Dexterity's Mech robot processes diverse parcel types across FedEx and UPS facilities, but the
        company has not publicly disclosed inference failure rates, misgrip rates, or production stoppage
        frequency for novel package types — creating an evidence gap around the AI model's real-world
        edge-case performance in sustained production environments.
      type: observed
      topic: technology-risk
      sourceRefs:
        - SR009
        - SR010
      confidence: medium
      freshness: current
      answersQuestionRefs:
        - QR017

    - id: CR011
      statement: >
        Dexterity claims a robot mean time between failure (MTBF) exceeding ten years for the Mech system,
        but this figure has not been verified through sustained multi-year production deployments as of
        May 2026, given that the company's commercial deployment program is less than three years old.
      type: company-claimed
      topic: technology-risk
      sourceRefs:
        - SR009
        - SR008
      confidence: medium
      freshness: current
      answersQuestionRefs:
        - QR017

    - id: CR012
      statement: >
        Sensor occlusion scenarios — where stacked freight or environmental conditions obscure the Mech
        robot's visual sensors during sorting operations — represent a systematic physical-AI edge case
        that Beckhoff's safety technology mitigates through force-limiting but cannot fully eliminate
        from the inference failure probability.
      type: inferred
      topic: technology-risk
      sourceRefs:
        - SR010
        - SR008
      confidence: medium
      freshness: current
      answersQuestionRefs:
        - QR017

