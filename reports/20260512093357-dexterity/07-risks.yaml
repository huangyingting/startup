  - id: SE-RISK-FIN
    title: Financial, Strategic, and Execution Risks
    body: >
      Dexterity's financial risk profile reflects the capital-intensive reality of a
      hardware-plus-AI-plus-service business model at the pre-profitability stage. The
      Robots-as-a-Service subscription model requires the company to manufacture and
      deploy physical robots — each likely costing six to twelve figures in hardware and
      installation — before receiving subscription revenue spread across multi-year
      contract periods. Industry benchmarks suggest each new RaaS site is cash-negative
      for eighteen to thirty-six months before reaching payback. With an estimated burn
      rate of five to fifteen million dollars per month and a runway estimated at six to
      nineteen months from March 2025, the company faces significant pressure to close
      a Series D round in 2026-2027. A failed or severely dilutive Series D is a
      material thesis-break event.
      Customer concentration amplifies financial risk. FedEx is estimated to represent
      25 percent or more of Dexterity's total contracted revenue; a non-renewal or
      renegotiation by FedEx would be a material adverse event for near-term revenue.
      UPS represents a second major customer with similar concentration potential. The
      Sumitomo JV for Japan adds geographic diversification but introduces a structured
      revenue-sharing arrangement that may compress per-unit economics relative to direct
      sales. No path to profitability before 2027-2028 is publicly projected; hardware
      cost inflation in the semiconductor cycle could further delay margin improvement.
      On the execution side, Samir Menon is the sole public founder-CEO and the primary
      face of Dexterity's investor and customer relationships. Competition for senior
      AI engineers from OpenAI, Google DeepMind, and Meta is intense, and Dexterity's
      rapid hiring trajectory — from an estimated 195 employees toward a target of 500-plus
      — creates cultural coherence and engineering quality risk. Humanoid robots from
      Figure AI and Tesla Optimus represent a strategic market risk in the 3-5 year
      horizon: if general-purpose manipulation becomes commoditized through humanoid
      platforms, Dexterity's specialized Mech advantage could erode faster than expected.
      Symbotic's acquisition of Fox Robotics has created a more formidable competitor in
      the palletizing and depalletizing subsector.
