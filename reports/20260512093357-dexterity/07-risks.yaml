  - id: SE-RISK-MIT
    title: Mitigations and Investment Monitoring
    body: >
      Dexterity's core technology mitigations center on the data-flywheel moat created
      by accumulating proprietary training data from each new deployment. Every new
      customer site adds to the Foresight world model corpus, reducing the brittleness
      risk of edge cases over time. The RaaS model also aligns incentives: Dexterity
      retains ownership of deployed hardware, which creates a financial incentive to
      maintain robot reliability and minimizes customer lifetime cost objections. The
      Beckhoff partnership for automation and safety technology directly addresses OSHA
      compliance requirements for human-robot collaboration, signaling that the company
      is actively investing in the safety stack. Sumitomo brings logistics-sector
      relationships across 1,400-plus Japanese warehouses that diversify the customer
      concentration risk in the medium term.
      On the regulatory and legal side, the most effective mitigation is proactive ISO
      10218/ISO TS 15066 compliance certification before new deployments, combined with
      explicit contractual indemnification caps and product liability insurance. Neither
      has been publicly confirmed; these represent concrete diligence asks for Series D
      investors. On the financial side, the primary mitigation is achieving contracted
      revenue backlog large enough to support a Series D at a non-dilutive valuation —
      FedEx and UPS multi-hub expansions provide the most credible path to this.
      Investment monitoring should track five thesis-break triggers on a quarterly basis:
      (1) FedEx or UPS non-renewal of a major deployment contract; (2) Series D failing
      to close or closing below Series C valuation; (3) a publicly reported OSHA citation
      or serious robot safety incident; (4) confirmation that NVIDIA has restricted L4
      allocations to robotics OEM customers; and (5) a direct competitor announcing
      autonomous manipulation deployments at ten times Dexterity's confirmed scale.
      Any one of these events would require immediate thesis reassessment.
