chapter:
  number: 7
  title: Risks
  summary: >
    Dexterity's risk landscape is wide and multi-dimensional, combining technology brittleness
    in a physical-AI system, a concentrated regulatory and legal exposure set, an NVIDIA GPU
    and Kawasaki arm hardware dependency that could stall deployments, a customer base
    anchored on two marquee accounts that represent the majority of estimated revenue, and a
    financial profile in which the Robots-as-a-Service capital J-curve has not yet been
    proven through profitability. On the regulatory front, OSHA 29 CFR 1910 machine guarding
    and lock-out/tag-out rules, ISO 10218/ISO TS 15066 collaborative-robot safety standards,
    and potential product liability suits following a robot-caused worker injury are the
    highest-severity exposures. Technology risks center on AI edge cases outside the training
    distribution — novel packages, sensor occlusion, wet floors — and on the unverified claim
    that robot MTBF exceeds ten years in sustained production. FedEx is estimated to account
    for 25-plus percent of revenue; non-renewal would be a material event. Samir Menon as
    sole founder-CEO creates key-person concentration. A burn rate of roughly five to fifteen
    million dollars per month and a runway estimated at six to nineteen months from early 2025
    compound the fundraising risk. Thesis-break triggers include FedEx or UPS contract
    non-renewal, a Series D fundraising failure in 2026-2027, a regulatory halt following a
    safety incident, a severe NVIDIA allocation cut, and a humanoid-robot competitor reaching
    deployments at ten times Dexterity's scale. Mitigations exist but many are early-stage.

