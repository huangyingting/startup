callouts:
  - calloutType: risk
    title: "FedEx Customer Concentration Is the Single Largest Financial Risk"
    body: >
      FedEx is estimated to represent 25 percent or more of Dexterity's total contracted
      ARR based on its anchor role in all public communications, the FedEx Investor Day
      showcase, and the depth of multi-hub US deployment. A FedEx contract non-renewal —
      whether driven by cost renegotiation, competitive displacement, or strategic shift
      in FedEx's automation vendor strategy — would materially impair revenue, disrupt
      the Series D fundraising narrative, and reduce the evidence base that supports
      Dexterity's product differentiation claims. Investors should require a multi-year
      contracted backlog confirmation from FedEx before any Series D commitment.
    claimRefs:
      - CR020
      - CR021
      - CR035

  - calloutType: risk
    title: "NVIDIA L4 GPU Single-Source Dependency Is Unmitigated"
    body: >
      Dexterity's Foresight world model inference runs on NVIDIA L4 GPUs, publicly
      demonstrated at FedEx Investor Day in March 2026. No alternative inference compute
      platform has been publicly disclosed. The 2022-2023 AI GPU shortage demonstrated
      that NVIDIA restricts OEM allocations when datacenter demand surges. A supply
      restriction of six to twelve months would halt new robot production, delay customer
      deployment commitments, and impair the growth narrative required for a successful
      Series D. This dependency is technically and commercially unmitigated as of the
      report date.
    claimRefs:
      - CR014
      - CR016
      - CR038

  - calloutType: risk
    title: "RaaS Capital J-Curve Compounds Series D Timing Pressure"
    body: >
      The Robots-as-a-Service model requires Dexterity to manufacture and deploy physical
      robots before receiving subscription revenue, and each new site is cash-negative for
      eighteen to thirty-six months before reaching payback. At an estimated burn rate of
      five to fifteen million dollars per month and a runway of six to nineteen months from
      March 2025, the company must close a Series D before the capital base is exhausted.
      A failed or severely dilutive Series D is the most plausible financial thesis-break
      scenario. Investors should require explicit unit economics data and a contractual
      revenue backlog sufficient to underwrite the Series D at a constructive valuation.
    claimRefs:
      - CR024
      - CR025
      - CR026
      - CR036

  - calloutType: recommendation
    title: "Require ISO 10218 Certification and Product Liability Coverage Confirmation Before Series D"
    body: >
      Dexterity's ISO 10218 certification status and product liability insurance coverage
      amounts are not publicly disclosed as of May 2026. Before a Series D commitment,
      investors should require: (1) ISO 10218-1/10218-2 certification documentation for
      the Mech robot system; (2) ISO/TS 15066 collaborative operation compliance
      confirmation; (3) product liability insurance coverage amounts and any customer
      indemnification cap structure; and (4) a legal counsel opinion on the product-vs.-
      service liability characterization for Dexterity's RaaS model. These items are
      standard diligence prerequisites that are currently missing from the public record.
    claimRefs:
      - CR001
      - CR002
      - CR003

