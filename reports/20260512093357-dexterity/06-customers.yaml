company:
  name: Dexterity
chapter:
  number: 6
  title: Customers
  summary: >
    Dexterity has assembled a small but high-quality roster of enterprise logistics customers
    anchored by FedEx (production, US parcel hubs), Sagawa Express (production, Tokyo X
    Frontier relay center via the Dexterity-SC JV with Sumitomo), and GXO Logistics (active
    pilot for depalletizing, labeling, and repalletizing). UPS is cited in secondary sources
    as a named customer, though deployment depth is less documented. All four are blue-chip
    names in global logistics—a strong signal of enterprise fit—but also reflect a narrow
    base of four publicly confirmed accounts. Quantified outcomes from FedEx include a 17×
    perception speed improvement (1,508 ms to 90 ms) and 32× data throughput gain on NVIDIA
    L4 hardware, showcased at FedEx Investor Day in March 2026. Sagawa began Mech deployment
    in May 2025 and has publicly stated a goal of 1,000+ units across Japan within several
    years. GXO has indicated it is discussing expansion with additional brand clients. No
    public Net Revenue Retention, churn, or renewal figures have been disclosed. Customer
    concentration risk is elevated: the four named accounts likely represent the majority of
    current revenue, and expansion beyond US–Japan logistics into new verticals or geographies
    remains unproven. The RaaS subscription model provides some structural stickiness, and
    Dexterity's data-flywheel moat raises switching costs over time.

sections:
  - id: SE-CUST-SEG
    title: Customer Base Segmentation
    body: >
      Dexterity's current paying customer base is concentrated in the large-enterprise segment
      of the global logistics and parcel industry. All publicly named accounts—FedEx, Sagawa
      Express, GXO Logistics, and UPS—are multi-billion-dollar operators with significant
      annual automation budgets and multi-hub logistics networks.
      By buyer type, the immediate purchaser in each case is the operations or logistics
      technology division of the enterprise. The payer is the enterprise itself; end-users are
      dock workers and operations managers who supervise the robotic systems. By geography,
      two distinct clusters exist: the United States (FedEx, GXO, UPS) and Japan (Sagawa
      Express, accessed via the Dexterity-SC JV with Sumitomo Corporation). No publicly
      confirmed European or other Asia-Pacific customers have been disclosed as of May 2026.
      By vertical, all named accounts fall within the parcel and third-party logistics
      (3PL) sub-sectors. Parcel carriers (FedEx, UPS, Sagawa) are the deepest deployment
      channel; GXO represents 3PL/contract logistics. No manufacturing, retail, or
      cold-chain customers have been publicly named. By channel, Dexterity reaches US
      customers directly through its enterprise sales team and reaches Japan through the
      Dexterity-SC JV, which leverages Sumitomo Corporation's relationships with 1,400+
      Japanese warehouse operators.
      Customer size is exclusively large enterprise: FedEx generates approximately $88B in
      annual revenue, UPS approximately $91B, GXO approximately $8.5B, and Sagawa Express
      approximately $4B. Dexterity does not publicly disclose any mid-market or SMB customers.
      All deployments are offered under a Robots-as-a-Service (RaaS) subscription model that
      bundles hardware, software, maintenance, and support—removing capital expenditure
      barriers and creating recurring revenue relationships.
