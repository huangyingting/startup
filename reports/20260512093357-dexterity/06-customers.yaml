  - id: SE-CUST-ADOPT
    title: Customer Adoption and Deployment Evidence
    body: >
      Dexterity's deployment evidence is concentrated in three well-documented accounts with
      a fourth (UPS) cited in secondary aggregators.
      FedEx is Dexterity's most mature and best-documented customer. Initial pilots began
      around 2023 and have progressed to production status at FedEx parcel hubs across the
      United States. The partnership was publicly showcased at FedEx Investor Day in Memphis
      in March 2026, where Dexterity demonstrated its Foresight world model running on
      NVIDIA L4 GPUs. Quantified outcomes include a 17× improvement in perception speed
      (from 1,508 ms to 90 ms per cycle) and a 32× increase in data throughput per cycle.
      FedEx plans to scale Dexterity deployments across major US hubs; FedEx invests
      approximately $1 billion per year in automation overall. Dexterity publishes a formal
      case study for FedEx on its website, making it the most robustly documented customer
      proof point.
      Sagawa Express represents the first large-scale commercial use of the Mech robot in
      Japan. Deployment at the X Frontier relay center in Tokyo began in May 2025 via the
      Dexterity-SC JV (a joint venture between Dexterity and Sumitomo Corporation). Sagawa's
      benchmarks for truck loading quality, speed, and trailer utilization were reportedly
      exceeded. The strategic goal disclosed by Dexterity and Sumitomo is to deploy 1,000+
      Mech units across Japan within several years. Japan's 2024 overtime cap for truck
      drivers ("2024 problem") provides strong regulatory tailwind for adoption.
      GXO Logistics began a pilot with Dexterity in 2024, focused on depalletizing, labeling,
      and repalletizing workflows for a beauty brand client. Supply Chain Dive, Modern
      Materials Handling, and Automated Warehouse Online each confirmed the GXO partnership.
      GXO has indicated it is "talking with other major brands" for expansion, but no
      second GXO site has been publicly confirmed as of May 2026.
      UPS is listed as a Dexterity customer in secondary profiles and the Dexterity website,
      with deployment described as covering "several hubs." UPS spends approximately $1 billion
      per year on automation and has announced plans to automate 60+ US facilities by 2028,
      but specific Dexterity deployment outcomes at UPS have not been independently documented.
