callouts:
  - id: SE-CALL-01
    type: highlight
    title: FedEx Investor Day Validation
    body: >
      FedEx chose Dexterity's Mech robot as the centrepiece of its March 2026 Investor Day
      automation showcase—an institutional investor event watched by analysts and shareholders.
      The demonstrated outcomes (17× perception speed improvement, 32× data throughput on
      NVIDIA L4) represent unusually strong public endorsement from a $88B revenue enterprise
      customer. For a Series C robotics company, Investor Day co-presentation is a material
      proof of commercial credibility.
    claimRefs:
      - CU001
      - CU005
      - CU008

  - id: SE-CALL-02
    type: risk
    title: Customer Concentration Risk
    body: >
      With four publicly named accounts, Dexterity faces elevated concentration risk. Two
      accounts (FedEx and Sagawa Express) have confirmed production deployments and represent
      the majority of likely current revenue. Loss of or material renegotiation by FedEx
      alone could be highly damaging at Dexterity's current scale. No channel partners,
      resellers, or system integrators have been publicly disclosed that could rapidly
      diversify the customer base.
    claimRefs:
      - CU009
      - CU027
      - CU029

  - id: SE-CALL-03
    type: gap
    title: No Public Retention or Satisfaction Metrics
    body: >
      Dexterity has not disclosed any quantitative retention or satisfaction metrics (NRR,
      GRR, NPS, churn, renewal rates, or contract lengths). While indirect signals from
      FedEx and Sagawa Express suggest durable engagement, the absence of formal metrics
      means investors cannot directly assess retention quality or model renewal economics.
      This gap is expected at Dexterity's commercial stage but is a material open item for
      Series D due diligence.
    claimRefs:
      - CU010
      - CU022

