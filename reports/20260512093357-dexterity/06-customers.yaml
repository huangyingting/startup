  - id: SE-CUST-RET
    title: Retention, Renewals, and Satisfaction
    body: >
      No Net Revenue Retention (NRR), Gross Revenue Retention (GRR), churn rate, renewal
      rate, contract duration, or Net Promoter Score (NPS) figures for Dexterity have been
      disclosed in any public source as of May 2026. This is consistent with a company at
      an early commercial stage that has not yet undergone a funding round requiring public
      investor disclosures.
      Indirect durability signals, however, are meaningful. FedEx's continued investment in
      Dexterity through multiple hub deployments and the use of the partnership as a
      centerpiece at FedEx Investor Day—a flagship event for institutional investors—strongly
      signals active, renewing engagement rather than a trial relationship. Sagawa Express
      publicly endorsed the system's performance against internal benchmarks and committed to
      a long-term scaling goal of 1,000+ units, which implies a multi-year commercial
      commitment. GXO's stated intent to expand to additional brand clients suggests the
      existing pilot is meeting or exceeding internal performance thresholds.
      The RaaS subscription model provides structural incentives for retention: customers pay
      recurring fees for hardware, software, and support in a bundle, and the cost of
      switching includes retraining operational staff and re-integrating alternative systems
      into existing WMS infrastructure. Dexterity's data flywheel further raises switching
      costs over time: each deployment adds to the Foresight training corpus, meaning
      long-tenured customers benefit from cumulative model improvement that a new entrant
      would not automatically replicate.
      No adverse customer feedback, cancellations, or competitive displacement events have
      been publicly reported. However, absence of public adverse data should not be equated
      with confirmed retention—the customer base is simply too small and too recently deployed
      for churn dynamics to be observable in public sources.
