figures:
  - id: FU001
    title: Customer Journey Map
    targetSlug: customer-journey-map
    type: journey-map
    approximationNotes: >
      Journey stages synthesized from public case studies, customer press releases, and
      Dexterity official communications. Timelines for individual stages are inferred from
      publicly announced milestones; internal procurement and evaluation timelines are not
      available in public sources. FedEx journey is most thoroughly documented; GXO and UPS
      journey detail is inferred from news coverage.
    data:
      nodes:
        - label: "Awareness & Evaluation"
          description: "Enterprise logistics operator identifies truck loading or palletizing as target for automation. Dexterity engaged via direct sales or Sumitomo JV channel. RFP or proof-of-concept discussion initiated."
          actors: "Operations VP, Automation Engineering team"
          examples: "FedEx evaluation ~2022–2023; GXO evaluation ~2023–2024"
        - label: "Pilot / POC Deployment"
          description: "Dexterity engineering team installs Mech at one hub or facility. IRIS API integrates with customer WMS. Site-specific carton profiling and model calibration completed. KPIs agreed and baselining begins."
          actors: "Dexterity deployment team, Customer engineering team, Dock operations manager"
          examples: "FedEx pilot 2023; GXO pilot 2024; Sagawa pilot under JV formation 2024"
        - label: "Production Launch"
          description: "Customer approves production status. Subscription billing activates. Mech operates in live logistics workflows alongside dock workers. Performance data flows back to Foresight training pipeline."
          actors: "Dock operations, Dexterity remote monitoring"
          examples: "FedEx production 2024; Sagawa Express May 2025"
        - label: "Scale-Up & Expansion"
          description: "Customer rolls out Mech to additional hubs, sites, or new workflow types. Accumulated performance data improves Foresight model accuracy for that customer's carton profile. RaaS contract expanded."
          actors: "Customer VP Operations, Dexterity account team"
          examples: "FedEx hub scale-up (announced); Sagawa 1,000+ unit goal; GXO multi-brand expansion"
        - label: "Long-Term Partnership"
          description: "Customer fully integrates Dexterity into multi-year automation roadmap. Dexterity becomes a named technology partner in investor and public communications. Data flywheel lock-in deepens."
          actors: "C-suite, Investor relations"
          examples: "FedEx Investor Day showcase March 2026; Sagawa JV long-term commitment"
    claimRefs:
