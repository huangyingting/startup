  - id: SE-CUST-EXP
    title: Expansion Strategy and Concentration Risk
    body: >
      Dexterity's growth strategy combines a classic land-and-expand playbook within large
      logistics operators with geographic expansion through the Dexterity-SC JV in Japan.
      Within FedEx, the progression from initial 2023 pilots to multi-hub production
      deployments and the announced scale-up across major US hubs represents a textbook
      land-and-expand trajectory. Each additional FedEx hub both adds recurring revenue and
      contributes to the Foresight training corpus, deepening the customer relationship.
      The Japan channel, anchored by Sagawa Express and accessed via Sumitomo's 1,400+
      operator network, represents a significant addressable expansion with a long-term
      deployment goal of 1,000+ units. Japan's logistics labor shortage—structurally
      exacerbated by the 2024 overtime regulation—creates durable demand pull that supports
      sustained multi-year deployment growth.
      GXO expansion to additional brand clients, if realized, would meaningfully diversify
      the 3PL segment. GXO operates approximately 970+ warehouses globally, suggesting
      significant room for unit expansion even within the existing account. UPS's announced
      plan to automate 60+ US facilities by 2028 is a potential multi-year expansion vector
      if Dexterity's current deployments at UPS perform as expected.
      Customer concentration risk, however, is elevated. With four publicly named accounts,
      a plausible scenario is that two (FedEx and Sagawa Express) represent the majority of
      current revenue. The top customer (likely FedEx) may account for 30–50% of total
      contracted value. This level of concentration is not unusual for a Series C–stage
      robotics company but represents a meaningful single-account risk: loss of or
      renegotiation by FedEx would materially impact revenue. No public evidence exists of
      channel partners, system integrators, or OEM resellers who would diversify the
      acquisition channel and reduce concentration risk. The Dexterity-SC JV is the only
      disclosed channel partner.
