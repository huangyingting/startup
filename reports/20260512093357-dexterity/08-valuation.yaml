      - - Series C preference stack and liquidation waterfall
        - Cap table, preference terms, anti-dilution provisions, and drag-along rights are not publicly disclosed
        - Determines downside recovery for new investors in bear/acqui-hire scenarios
        - Legal counsel review of Delaware certificate of incorporation and investor rights agreement
      - - Japan JV financial milestones and deployment schedule
        - Sumitomo JV announced 1,500-robot Japan target; no quarterly deployment figures publicly reported
        - Japan is a key bull-case component; delays would shift scenario probabilities materially
        - Dexterity VP Business Development; Sumitomo Dexterity-SC investor relations contacts
      - - Third named production customer agreement
        - Only FedEx, UPS, GXO, and Sagawa Express are publicly confirmed; no fifth customer disclosed
        - Diversification away from FedEx concentration is required before recommending BUY at Series C price
        - Dexterity CRO; press release monitoring; logistics industry trade show announcements
      - - OSHA/RIA 15.06 certification coverage across all active sites
        - Company states RIA 15.06 compliance but no site-by-site OSHA approval list is publicly available
        - Regulatory exposure is material; a single enforcement action could halt multiple deployments
        - Dexterity legal/compliance; OSHA establishment records for FedEx Memphis Hub, UPS Louisville, GXO sites

