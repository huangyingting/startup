company:
  name: Dexterity
chapter:
  number: 8
  title: Valuation
  summary: >
    Dexterity's March 2025 Series C established a $1.65 billion post-money valuation on
    roughly $291–300 million of total cumulative capital raised, implying approximately
    25 times estimated annual recurring revenue of $57–66 million. That premium is
    defensible only under a bull-case RaaS scaling scenario in which ARR reaches
    $500 million by 2028 — an outcome requiring sustained multi-site expansions with
    FedEx, UPS, GXO, and Sagawa Express plus successful delivery of the Dexterity-Sumitomo
    Japan joint venture. The recommended investment posture is TRACK with a conditional
    buy trigger: the current entry price is stretched relative to hardware-robotics
    comparables, where Symbotic trades at roughly 4.5 times fiscal 2024 revenue and
    Berkshire Grey's SPAC implosion sets an adverse precedent for overvalued warehouse
    automation. Three scenarios govern the 2025–2028 horizon — a bull case at $3–4 billion
    exit valuation (30 percent probability), a base case at $2–2.5 billion (45 percent),
    and a bear case acqui-hire or down-round at $1 billion (25 percent). Thesis-break
    triggers include FedEx contract non-renewal, Series D financing failure, and a
    significant safety incident. Six final diligence asks are identified covering ARR
    confirmation, gross margin trajectory, preference stack disclosure, Japan JV milestones,
    OSHA certification coverage, and a third named production customer. IPO readiness
    requires $200 million-plus ARR and positive gross margins, placing any listing no
    earlier than 2027–2028 under the base case.

