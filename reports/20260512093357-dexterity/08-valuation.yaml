  - id: SE-VAL-EXIT
    title: Exit Readiness, Thesis-Break Triggers, and Final Diligence Asks
    body: >
      Dexterity's exit pathways span three categories: strategic M&A, IPO, and
      secondary/continuation financing.

      Strategic M&A is the most probable near-term exit channel. The most credible
      acquirers are Amazon Robotics (which has demonstrated willingness to acquire
      robotics startups and now operates over one million robots; Amazon acquired Fauna
      Robotics in March 2026), Ocado Group (which has acquired robotics IP to diversify
      its warehouse automation platform), and potentially a large logistics operator
      such as FedEx itself, which already collaborates on DexR development. A strategic
      acquisition at $2–3 billion in the 2026–2028 window is achievable if ARR reaches
      $150 million and gross margin improves to 25 percent or above. A premium acquirer
      with synergy optionality could bid up to $3.5 billion.

      IPO readiness requires at minimum $200 million ARR with a credible path to gross
      margin positive, more than one publicly disclosed production customer, and no
      material OSHA enforcement risk. Under the base case, these conditions are met no
      earlier than 2027–2028. Under the bull case, 2027 is possible.

      Six thesis-break triggers should prompt an immediate investment review. First,
      FedEx does not renew or publicly terminates its DexR production contract. Second,
      Dexterity fails to close a Series D at or above the Series C price in 2026–2027.
      Third, a robot-related worker safety incident triggers OSHA enforcement and multi-
      site deployment suspension. Fourth, ARR growth stalls below 30 percent year-over-
      year for two consecutive quarters. Fifth, a major competitor reaches 500 or more
      commercial robot deployments at materially lower cost per robot. Sixth, Samir Menon
      departs as CEO without a clearly qualified successor in place.
