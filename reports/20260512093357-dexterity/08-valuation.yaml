  - id: SE-VAL-SCENARIOS
    title: Bull, Base, and Bear Scenario Analysis
    body: >
      Three scenarios govern Dexterity's valuation trajectory over the 2025–2028
      investment horizon, each anchored to explicit assumptions about ARR growth,
      gross margin trajectory, and exit multiple.

      The bull case assumes RaaS subscriptions scale to $500 million ARR by 2028,
      driven by multi-site FedEx and UPS expansions, successful Japan JV deployment
      of 1,500 robots, three or more additional Fortune 500 logistics customers, and
      gross margin improvement to 35 percent or above from estimated current levels
      of 15–25 percent. At a 7–8 times ARR exit multiple (consistent with high-growth
      hardware-enabled SaaS), implied enterprise value reaches $3.5–4 billion, delivering
      approximately 2–2.5 times return on Series C capital before dilution. This
      probability is assigned at 30 percent, conditional on simultaneous execution across
      manufacturing scale, customer expansion, and margin improvement.

      The base case projects ARR of $180–220 million by 2028, with gross margins reaching
      25–30 percent and a strategic M&A exit or Series D at $2–2.5 billion. Return to
      Series C investors is approximately 1.2–1.5 times — marginal but above water.
      Probability is 45 percent, requiring FedEx and UPS renewal plus one new named
      production customer.

      The bear case envisions a Series D financing failure or down-round in 2026–2027 if
      ARR growth disappoints, customer concentration with FedEx deteriorates, or macro
      conditions tighten. In this scenario, an acqui-hire or distressed strategic sale
      at $700 million to $1 billion represents a 40–60 percent haircut from Series C
      price. Series C investors with 1× non-participating preferences may recover principal;
      common shareholders would be severely impaired. Bear probability is 25 percent.
      The probability-weighted expected value across scenarios is approximately $2.05
      billion — modestly above the Series C entry price but not compelling for a risk-
      adjusted return mandate.
