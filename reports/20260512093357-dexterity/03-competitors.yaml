callouts:
  - id: SP-CALL-01
    calloutType: risk
    title: Hyperscaler talent absorption risk
    body: >
      The Covariant-to-Amazon transition (August 2024) illustrates a structural risk: a hyperscaler
      can absorb a frontier AI robotics team and remove an independent competitor, while indirectly
      arming captive programs that compete against the same enterprise customers. Dexterity faces
      analogous risk from Amazon, Google, or Microsoft acquiring or talent-raiding a manipulation AI
      company to accelerate internal warehouse automation competing with Dexterity's UPS and FedEx
      accounts.
    claimRefs:
      - CP012
      - CP033

  - id: SP-CALL-02
    calloutType: risk
    title: Symbotic/Fox channel overlap risk
    body: >
      Symbotic's acquisition of Fox Robotics (early 2026) creates a dock-level foothold at Walmart,
      DHL, and BJ's Wholesale—overlapping with Dexterity's logistics operator channel. Symbotic can
      now leverage Fox's existing relationships as an entry point to cross-sell dock automation that
      eventually competes with Dexterity's loading/unloading systems at the same facilities.
    claimRefs:
      - CP010
      - CP013
      - CP032

  - id: SP-CALL-03
    calloutType: insight
    title: Truck loading remains an uncontested moat
    body: >
      As of May 2026, no competitor—including Boston Dynamics Stretch or Pickle Robot—has publicly
      announced a truck loading (outbound trailer packing) capability. Dexterity's Mech/Instinct
      4D packing product represents a genuine capability gap in the competitive landscape; the
      question is how long this window of exclusivity holds before a well-funded rival adds it.
    claimRefs:
      - CP014
      - CP015
      - CP026

