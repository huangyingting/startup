      - - Symbotic (SYM)
        - Adjacent — pallet automation
        - NASDAQ:SYM; ~$2.25B FY2025 revenue; $22B backlog; Walmart-exclusive
        - Mass-market retail DCs (Walmart 86% rev, Target, Albertsons)
        - Fully integrated AS/RS + putwall + AMRs at Walmart scale
        - Pallet-level only; no mixed-case truck manipulation; single-customer concentration
      - - Fox Robotics (now Symbotic)
        - Adjacent — dock forklift
        - $38M raised pre-acquisition; acquired by Symbotic early 2026
        - Retail/logistics DCs (Walmart, DHL, BJ's); 50+ sites
        - Autonomous forklift dock ops; FoxBot Mk3 trailer loading; 6M+ pallet moves
