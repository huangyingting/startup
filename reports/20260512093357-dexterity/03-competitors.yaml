      - - Pickle Robot
        - Direct — truck unloading
        - $87M total; $50M Series B Nov 2024; Teradyne/Toyota/Ranpak investors
        - Parcel/apparel 3PLs (Yusen Logistics, UPS)
        - AI vision for non-palletized goods; 10M+ lbs production unloaded
