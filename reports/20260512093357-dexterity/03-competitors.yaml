      - - Berkshire Grey (SoftBank)
        - Direct — mixed-case AI picking
        - Acquired by SoftBank Mar 2023 ($1.40/share); ~$2.7B peak market cap
        - 3PLs requiring mixed-SKU fulfillment
        - Multi-task AI (pick, sort, unload); SoftBank financial backing
        - Now private; reduced customer visibility; competing SoftBank priorities
      - - Covariant (Amazon)
        - Former direct — AI picking
        - $147M raised; founders/IP absorbed by Amazon Aug 2024; no longer independent
        - Amazon internal warehouse automation
        - Robotic foundation model (RFM-1); Amazon distribution scale
        - No longer independent; IP locked into Amazon captive program
      - - Status Quo (Manual Labor)
        - Universal incumbent
        - No capital cost; ~$15-20/hr fully-loaded US logistics labor
        - Any warehouse, any SKU, any workflow
        - Universal flexibility; no integration risk
        - 7-9% annual wage inflation; labor shortage; worker injuries; no throughput scaling
      - - Industrial Arm OEMs (Fanuc/KUKA/ABB/UR)
        - Incumbent robotics
        - Multi-billion revenue; decades of manufacturing installed base
        - Automotive, consumer goods, fixed-task manufacturing
        - Proven reliability; global service network; long-term enterprise relationships
        - Not AI-general; custom tooling per SKU; cannot generalize across tasks

