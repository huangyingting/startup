        - Hyundai subsidiary (~$1.1B 2021 acq.); DHL MOU for 1,000+ units (May 2025)
        - Parcel carriers, 3PLs (DHL, Amazon pilots)
        - 700 cases/hr; mobile base enabling repositioning; Hyundai capex
