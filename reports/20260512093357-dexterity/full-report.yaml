      - number: '7.3'
        title: Operational and Dependency Risks
        blocks:
          - type: paragraph
            body: >
              Dexterity's operational risk stack is dominated by two hardware dependencies that could interrupt
              deployment at scale: NVIDIA L4 GPUs for inference and Kawasaki 8-axis arms as the sole confirmed OEM
              source for Dexterity's robot hardware. The NVIDIA L4 GPU is embedded in Dexterity's Foresight world model
              inference pipeline, as publicly demonstrated at FedEx Investor Day in March 2026. Any restriction in
              NVIDIA's L4 allocation to robotics OEM customers — whether caused by datacenter demand prioritization,
              geopolitical semiconductor supply-chain disruption, or a strategic shift by NVIDIA — would directly halt
              new robot production and deployment. The 2022-2023 AI GPU shortage demonstrated that NVIDIA can and does
              restrict allocations; no firm contractual supply commitment with Dexterity is publicly documented.
              Kawasaki Robotics is Dexterity's confirmed OEM supplier for the 8-axis robotic arm component of the Mech
              system, as disclosed through the Beckhoff partnership announcement in late 2025. A Kawasaki production
              bottleneck, quality issue, or commercial disagreement would directly constrain Dexterity's ability to
              fulfill customer orders. Single-OEM dependency for a critical physical component is a standard risk in
              hardware robotics; the mitigation path typically requires either a second-source OEM qualification or
              building proprietary manufacturing capability, neither of which has been publicly disclosed by Dexterity.
              AI technology brittleness in environments differing from the training distribution is a fundamental risk
              for any physical-AI system. Dexterity's Foresight model was trained on a large corpus of parcel-handling
              scenarios, but novel package shapes, sensor occlusion from stacked freight, wet floors in loading bays, or
              unusual lighting conditions in specific warehouse configurations can each create edge cases that the model
              has not seen. A single-site failure propagation risk also exists: if one Dexterity deployment suffers a
              high-severity incident — robot-caused injury, freight damage, or production stoppage — the company may be
              required to pause or modify all similar deployments pending investigation, creating a systemic revenue
              disruption disproportionate to the scale of a single-site failure.
