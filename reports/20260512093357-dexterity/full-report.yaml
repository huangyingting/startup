            title: Market size mismatch with valuation
            body: >-
              Dexterity's $1.65B valuation implies that investors see a path to $150-300M+ ARR. At a $1.3-1.8B US+Japan
              SOM (truck loading only), this requires 10-20% market penetration — aggressive for an early-stage company
              with a ~$21M ARR estimate. Expansion into adjacencies (palletizing, depalletizing, sortation) and
              geographies (EU, rest of Asia) is the implicit bull thesis.
            calloutType: insight
            claimRefs:
              - CM035
