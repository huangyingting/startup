  - id: FR002
    type: dag
    title: Risk transmission map
    layout: standard
    summary: >
      Directed acyclic graph showing how primary risk factors at Dexterity transmit through the organization to threaten
      revenue, customer relationships, financing, and valuation outcomes.
    data:
      nodes:
        - id: safety_incident
          label: |-
            Worker Safety Incident
            (OSHA citation or robot injury)
          type: risk
        - id: nvidia_shortage
          label: |-
            NVIDIA L4 GPU Shortage
            (allocation restriction)
          type: risk
        - id: fedex_dependency
          label: |-
            FedEx Customer Concentration
            (estimated 25%+ of ARR)
          type: risk
        - id: key_person
          label: |-
            Samir Menon Departure
            (sole founder-CEO)
          type: risk
        - id: deployment_pause
          label: |-
            Multi-Site Deployment Pause
            (safety or regulatory halt)
          type: process
        - id: production_halt
          label: |-
            Robot Production Halt
            (hardware supply constraint)
          type: process
        - id: revenue
          label: |-
            Revenue and ARR
            (RaaS subscription base)
          type: output
        - id: series_d
          label: |-
            Series D Fundraising
            (2026-2027 timing pressure)
          type: output
        - id: valuation
          label: |-
            Valuation and Returns
            (investor exit multiple)
          type: output
      edges:
        - from: safety_incident
          to: deployment_pause
          label: Triggers precautionary pause
        - from: nvidia_shortage
          to: production_halt
          label: Halts new robot production
        - from: deployment_pause
          to: revenue
          label: Reduces active ARR
        - from: production_halt
          to: revenue
          label: Limits new site ARR
        - from: fedex_dependency
          to: revenue
          label: Non-renewal removes 25%+ ARR
        - from: revenue
          to: series_d
          label: Impairs fundraising narrative
        - from: key_person
          to: series_d
          label: Disrupts investor confidence
        - from: series_d
          to: valuation
          label: Sets exit price
    approximationNotes: >
      Risk transmission paths are analyst interpretations of publicly available information. Actual causal relationships
      depend on specific contract terms, investor dynamics, and operational details that are not publicly available. The
      diagram shows the most plausible high-severity transmission chains.
