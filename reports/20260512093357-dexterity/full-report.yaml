      - number: '1.5'
        title: Technology Platform and Product Architecture
        blocks:
          - type: paragraph
            body: >
              Dexterity's technical differentiation is architectural rather than hardware-form-factor driven. The
              company employs an "AI of AIs" design: instead of a single large end-to-end neural network, it coordinates
              hundreds of specialized small AI models — "skill models" — via a higher-order orchestration layer. Each
              skill model handles a specific sub-task (e.g., perception, grasp selection, packing trajectory, force
              control) and is designed to be interpretable and safety-bounded. The Foresight world model, trained on
              more than 100 million in-production autonomous actions, provides the physics-consistent state
              representation that enables planners to evaluate candidate placements in under 400 milliseconds across
              multiple simultaneous optimization objectives. The 4D Packing Agent (launched March 2026) evaluates up to
              400 candidate box placements per cycle across three spatial dimensions plus time, operating within a 55°C
              and 600W thermal and power envelope. Instinct (April 2026) introduces tactile force control deployable
              across any task without retraining. The DexR robot uses two industrial arms with a 60 kg payload and over
              5-meter reach for truck trailer loading; the Mech "superhumanoid" adds a mobile base for facility-wide
              operation with the same dual-arm configuration. Dexterity has partnered with Sanmina (manufacturing
              scale-up), Beckhoff USA (EtherCAT automation and safety integration), and ASRock Rack (edge AI servers for
              onboard inference). The company also holds a Dematic partnership (2022) for full-task robot deployment
              across manufacturing, parcel, and retail customers. Independently, SmartLoadingHub deployment notes
              indicate operational limitations at very high-speed singulation takt times below 5 seconds, where
              conveyor-based systems may be more efficient — a constraint relevant to competing against Amazon's
              proprietary automation in its highest-throughput facilities.
