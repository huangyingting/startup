      - number: '8.2'
        title: Valuation Context, Entry Discipline, and Capital Structure
        blocks:
          - type: paragraph
            body: >
              Dexterity's $1.65 billion post-money valuation was established in March 2025 via a $95 million Series C
              led by Lightspeed Venture Partners and Sumitomo Corporation, with participation from existing investors
              including Kleiner Perkins, GV (Google Ventures), and Goldman Sachs. Total equity raised reached
              approximately $291–300 million across seed, Series A, $56 million early rounds, $140 million Series B in
              2021 (at $1.4 billion valuation), and the 2025 Series C. This cumulative capital creates a significant
              preference overhang: in a moderate exit scenario below $1.5 billion, standard 1× non-participating
              liquidation preferences would return capital to investors but leave common shareholders — employees and
              founders — with minimal proceeds. Under 2× participating structures, the overhang at $1.65 billion entry
              is financially significant.

              The third-party ARR estimate of $57–66 million (sourced from Growjo and ZoomInfo analytics) is an analyst
              inference, not a confirmed company disclosure. At $60 million estimated ARR, the $1.65 billion valuation
              implies 27.5× ARR — a premium that can only be justified by one of two conditions: (a) the ARR figure is
              materially understated and actual revenue is closer to $100–120 million, or (b) investors are pricing in a
              three-to-five year forward ARR of $300 million or more. Neither condition is verifiable from public
              evidence. Dexterity's burn rate of approximately $5–15 million per month and estimated runway of six to
              nineteen months from early 2025 create a Series D fundraising necessity in 2026–2027, making the market
              environment at that time a critical risk variable. Entry discipline requires that any new capital
              commitment be sized with the expectation of a Series D dilution of 15–20 percent at a valuation that may
              or may not be above the Series C price.
            claimRefs:
              - CV001
              - CV002
              - CV005
              - CV006
              - CV007
              - CV008
              - CV021
              - CV032
          - type: figure
            figureRef: FV004
