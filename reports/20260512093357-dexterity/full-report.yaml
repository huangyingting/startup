    title: Regulatory / legal risk register
    columns:
      - Rule / License / Regulation
      - Jurisdiction
      - Status
      - Likelihood
      - Severity
      - Mitigation
      - Residual Exposure
      - Diligence Path
    rows:
      - - >-
          OSHA 29 CFR 1910 — Machine guarding and lock-out/tag-out (LOTO) for industrial robots in warehouse
          environments
        - US
        - Active — applies to all Dexterity deployments at FedEx, UPS, GXO hubs nationwide
        - >-
          Medium — OSHA inspections are triggered by incidents or referrals; proactive compliance assumed but not
          publicly confirmed
        - High — OSHA citation following a robot-caused injury could force deployment suspension across all US sites
        - >-
          Beckhoff safety-tech partnership addresses collaborative operation safeguards; LOTO procedures embedded in
          deployment protocol (assumed)
        - >-
          Medium — no public confirmation of OSHA compliance audit or certification; incident-triggered inspection risk
          remains
        - >-
          Request OSHA compliance documentation and incident response protocol from Dexterity; confirm LOTO procedures
          are in customer deployment checklist
      - - ISO 10218-1/10218-2 — Industrial Robot Safety Requirements (design and integration)
        - International / US / EU
        - >-
          Active — applicable to all Mech robot deployments globally; CE marking requires ISO 10218 conformity for EU
          market entry
        - Low near-term (US deployments tolerate self-certification) — Medium for European expansion
        - High — ISO 10218 gap would block CE marking and European market entry; US reputational risk if uncertified
        - ISO compliance assumed as part of standard commercial robot OEM process via Kawasaki arm manufacturer
        - Medium — ISO 10218 certification status for Dexterity Mech system not publicly disclosed as of May 2026
        - >-
          Request ISO 10218 certification documentation and CE marking status; confirm Kawasaki arm certification
          extends to full Mech system
      - - ISO/TS 15066 — Collaborative Robot Operation Safety (speed and force limiting)
        - International
        - Active — applies to any robot operating in shared human-robot workspace without physical guarding
        - >-
          Medium — Dexterity Mech operates alongside human dock workers; collaborative operation parameters must meet
          ISO/TS 15066
        - >-
          High — non-compliance with collaborative operation limits is an OSHA enforcement trigger and product liability
          exposure
        - Beckhoff partnership explicitly covers safety technology for Mech superhumanoid collaborative deployments
        - Medium — collaborative operation parameters and ISO/TS 15066 compliance status not publicly confirmed
        - >-
          Confirm ISO/TS 15066 power and force limiting parameters for Mech; request third-party safety assessment
          documentation
      - - Product liability — robot-caused worker injury or freight damage under US tort law
        - US
        - Latent — no active litigation publicly confirmed; risk materializes upon first significant incident
        - >-
          Low-Medium — physical robot deployments create ongoing exposure; novel product category with evolving
          liability doctrine
        - >-
          Critical — a worker injury at a FedEx hub would trigger litigation, media coverage, customer pauses, and
          Series D impairment simultaneously
        - >-
          Product liability insurance assumed; contractual indemnification clauses with enterprise customers standard in
          RaaS agreements
        - High — dollar limits of product liability coverage and customer indemnification caps not publicly disclosed
        - >-
          Request product liability insurance coverage amounts, contractual indemnification structure, and legal counsel
          opinion on product vs. service characterization
      - - Patent litigation — manipulation and motion-planning IP claims from incumbent robot companies
        - US
        - Latent — no active IP litigation publicly confirmed; Dexterity's manipulation patents not publicly inventoried
        - >-
          Low-Medium — successful Series C and FedEx partnership increases profile; incumbent players (FANUC, ABB,
          Boston Dynamics) hold large portfolios
        - >-
          High — injunctive relief in a patent dispute could prevent shipping specific robot configurations; litigation
          costs material at startup scale
        - >-
          Freedom-to-operate (FTO) analysis assumed as standard pre-deployment diligence; novel AI-native approach may
          avoid older manipulation patents
        - Medium — FTO analysis results and patent portfolio strategy not publicly disclosed
        - >-
          Request patent portfolio inventory, FTO analysis scope, and any prior IP correspondence with incumbent robot
          OEMs
