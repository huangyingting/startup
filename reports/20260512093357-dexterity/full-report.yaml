          - type: callout
            title: Kawasaki OEM Arms Create Both Capability and Supply-Chain Concentration
            body: >
              The custom 8-axis Kawasaki arms are a significant source of competitive differentiation— no off-the-shelf
              robotic arm offers the same payload-to-reach profile in the Mech form factor. However, this exclusivity
              also creates a concentrated supply-chain dependency: Dexterity cannot scale hardware production
              independently of Kawasaki's capacity and lead times. Due diligence should verify whether the partnership
              includes volume commitments, capacity reservations, and exclusivity provisions that protect Dexterity's
              manufacturing ramp.
