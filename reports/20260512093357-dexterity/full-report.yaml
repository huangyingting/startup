      - number: '1.2'
        title: Founding Team and Leadership
        blocks:
          - type: paragraph
            body: >
              Samir Menon is the sole publicly disclosed founder and CEO of Dexterity. He holds a PhD and MS in Computer
              Science from Stanford University, where his doctoral research developed a control-theory framework
              modeling how the human brain coordinates the body — a basis that was directly translated into Dexterity's
              proprietary approach to robotic motion and dexterity. Before Stanford, Menon worked as a Software Design
              Engineer at Microsoft India R&D and as a research assistant at Simon Fraser University. He founded
              Dexterity in late 2017 as an extension of his Stanford thesis work, assembling a founding team of Stanford
              roboticists. The founding team identified by the company's About page and blog includes Robert Sun
              (co-founder and founding engineer), Kevin Chavez (founding engineer, co-author of Foresight), Ben Varkey
              Benjamin, Talbot Morris-Downing, and Cuthbert Sun. The founding team's academic depth in robotic control
              theory, neural simulation, and AI constitutes a strong founder-market fit for the enterprise physical AI
              problem. Key-person dependency on Menon is a material risk given that he is the sole named executive in
              public sources and the company's technical and commercial narrative is closely associated with his
              identity. The company has not publicly disclosed board composition, governance structure, or independent
              board members, which limits visibility into oversight mechanisms. A VP of Strategy Execution, Dr. Keshav
              Prasad, has been mentioned in blog content, indicating a growing senior leadership layer, but no other
              C-suite executives have been publicly identified. The absence of publicly disclosed leadership departures
              or layoffs as of May 2026 is consistent with the headcount stability indicated by third-party directories.
