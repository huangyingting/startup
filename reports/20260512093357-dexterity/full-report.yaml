        - Japan
        - >-
          Active since April 2024 — creates structural demand for automation; adds labor-law compliance complexity to
          Japanese deployments
        - Low for compliance failure — Medium for regulatory complexity slowing JV deployment pace
        - >-
          Medium — JV deployment timelines may slip if Japanese labor law compliance burdens add site-qualification
          steps
        - >-
          Sumitomo Corporation brings Japan regulatory relationships and 1,400-plus operator network to manage
          compliance burden
        - >-
          Low — Sumitomo's existing relationships reduce compliance risk; tailwind from labor shortage outweighs
