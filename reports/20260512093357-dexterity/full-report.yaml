  - number: 2
    title: Market Analysis
    sections:
      - number: '2.1'
        title: Market Boundary and Definitions
        blocks:
          - type: paragraph
            body: >
              Dexterity operates at the intersection of two overlapping markets: the broad warehouse robotics market and
              the narrower automated truck loading and unloading market. Analysts define the warehouse robotics market
              primarily as hardware (AMRs, articulated robotic arms, AGVs) and associated orchestration software. The
              broader "warehouse automation" market adds automated storage and retrieval systems (AS/RS), conveyor
              systems, and WMS integration. The narrowest relevant definition for Dexterity is the automated truck
              loading system sub-segment, which most directly corresponds to its DexR and Mech product deployments.


              The status-quo substitute is manual dock labor. Industry sources estimate that two to four workers take
              45-90 minutes to manually unload a 53-foot trailer at $25-$40 per worker per hour. This represents not
              only a cost target but a safety and reliability gap: dock labor has among the highest injury rates in
              logistics, and US Bureau of Labor Statistics data shows transportation and material-moving workers face
              above-average rates of work-related injuries and illnesses.


              Key market adjacencies — palletizing and depalletizing automation, sortation robotics, and piece-picking
              for order fulfillment — are cited in Dexterity's product roadmap (Foresight world model, Instinct
              platform) as expansion vectors. These adjacencies are not independently sized in this chapter due to data
              limitations, but represent the path beyond a $3.27B truck-loading SAM toward a broader warehouse robotics
              TAM.
            claimRefs:
              - CM001
              - CM002
              - CM003
