      - number: '1.3'
        title: Funding History and Investor Roster
        blocks:
          - type: paragraph
            body: >
              Dexterity has raised a total of approximately $291 million across three primary equity rounds from at
              least fifteen institutional investors. The company exited stealth in July 2020 with a $56.2 million Series
              A led by Kleiner Perkins, with co-investors including Lightspeed Venture Partners, Obvious Ventures,
              Pacific West Bank, B37 Ventures, Presidio Ventures (Sumitomo's CVC arm), Blackhorn Ventures, Liquid 2
              Ventures, and the Stanford StartX fund. At the time of exit from stealth, Dexterity disclosed that it had
              been operating for approximately three years without public funding announcements. The Series B of $140
              million in October 2021, co-led by Lightspeed and Kleiner Perkins, elevated the company to unicorn status
              with a post-money valuation of $1.4 billion; Presidio Ventures and other Series A participants also
              participated in this round alongside Obvious Ventures and B37 Ventures. The third and most recent round, a
              $95 million venture round closed March 11, 2025, was led by Lightspeed Venture Partners and Sumitomo
              Corporation directly (beyond its Presidio CVC vehicle), setting the post-money valuation at $1.65 billion.
              Per Latka data, the 2025 round represented approximately 6% of equity sold, consistent with the cited
              post-money valuation. The identity of anchor investor Lightspeed Venture Partners — one of Silicon
              Valley's most active early-stage technology funds — across all three rounds signals continued
              institutional conviction in the company's thesis. Sumitomo's deepening involvement (from Presidio CVC in
              2020 to direct investment in 2025 and the Dexterity-SC Japan JV in 2024) reflects a strategic co-investor
              relationship that combines financial capital with distribution and market access in Japan.
