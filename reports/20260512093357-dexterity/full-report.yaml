      - number: '8.6'
        title: Exhibits
        blocks:
          - type: callout
            title: The 25× ARR Multiple Requires Bull-Case Execution to Break Even
            body: >-
              At $1.65 billion valuation and an estimated $60 million ARR, Dexterity is priced at 27.5 times recurring
              revenue — a multiple that places it six times above Symbotic's public-market 4.5 times revenue multiple
              and far above the 1.5–4 times revenue range typical for hardware robotics businesses. Breaking even on the
              Series C requires executing on the bull case: $475 million ARR by 2028, 35 percent gross margins, and an
              exit at 7–8 times ARR. This is achievable but requires simultaneous execution on manufacturing scale,
              customer expansion, and margin improvement in a competitive market. Investors must be explicit that the
              current entry price is an option on a high-probability outcome, not a value investment.
            calloutType: risk
            claimRefs:
              - CV004
              - CV009
              - CV016
              - CV017
