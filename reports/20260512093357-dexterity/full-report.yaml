          - type: callout
            title: NVIDIA L4 GPU Is a Critical Single-Vendor Inference Dependency
            body: >
              Dexterity's Foresight world model and Instinct Perception agents are optimized for NVIDIA L4 GPUs with
              TensorRT. A supply disruption, product discontinuation, or significant price increase from NVIDIA could
              constrain Mech deployment capacity or force a costly re-optimization of the inference stack. The company's
              public showcase of Foresight specifically on NVIDIA hardware at FedEx Investor Day deepens this dependency
              signal. Investors should assess whether the AI inference layer is portable to alternative GPU hardware
              without material re-engineering.
            calloutType: risk
            claimRefs:
              - CE026
