      current or near-term period based on publicly stated scale-up commitments. FedEx and Sagawa Express receive high
      estimated retention given confirmed multi-year production engagement and publicly stated scale commitments. GXO
      receives moderate scores reflecting pilot-only status and unconfirmed production progression. UPS receives lower
      scores reflecting limited independent confirmation of deployment depth. All values are analyst estimates and must
      be replaced with actual contract renewal data during formal diligence.
