  - number: 7
    title: Risks
    sections:
      - number: '7.1'
        title: Risk Landscape and Severity Framework
        blocks:
          - type: paragraph
            body: >
              Dexterity competes at the frontier of physical AI and warehouse robotics, a sector where the risk surface
              is qualitatively different from pure-software businesses. Every deployed robot is a capital asset on a
              customer's shop floor, operating alongside human workers, interacting with physical goods, and interfacing
              with enterprise warehouse management systems. A failure in any of these dimensions creates safety, legal,
              operational, and reputational consequences simultaneously. The company's risk profile can be organized
              into six severity-ranked categories: (1) regulatory and legal exposure — OSHA and ISO compliance, product
              liability, IP litigation; (2) technology and AI risk — brittleness outside training distribution, sensor
              failure, MTBF verification; (3) operational and supply chain risk — NVIDIA GPU and Kawasaki arm
              single-source dependencies; (4) partner and customer concentration risk — FedEx anchor customer, Sumitomo
              JV, NVIDIA platform lock-in; (5) financial and model risk — RaaS J-curve, burn rate, runway; and (6)
              people and execution risk — Samir Menon key-person concentration, talent competition, rapid scaling. At
              the highest severity level sit three interrelated risks: a major safety incident on a FedEx or UPS
              deployment that triggers OSHA enforcement and regulatory scrutiny; a Series D financing failure in
              2026-2027 that would threaten business continuity; and FedEx contract non-renewal which would eliminate
              the largest known anchor customer. All three events could be thesis-breaking individually and are
              amplified when occurring together. The risk heatmap (Figure FR001) shows the full stack of risks across
              likelihood, impact, and mitigation maturity dimensions.
            claimRefs:
              - CR001
              - CR014
              - CR020
