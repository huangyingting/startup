  - number: 6
    title: Customers
    sections:
      - number: '6.1'
        title: Customer Base Segmentation
        blocks:
          - type: paragraph
            body: >
              Dexterity's current paying customer base is concentrated in the large-enterprise segment of the global
              logistics and parcel industry. All publicly named accounts—FedEx, Sagawa Express, GXO Logistics, and
              UPS—are multi-billion-dollar operators with significant annual automation budgets and multi-hub logistics
              networks. By buyer type, the immediate purchaser in each case is the operations or logistics technology
              division of the enterprise. The payer is the enterprise itself; end-users are dock workers and operations
              managers who supervise the robotic systems. By geography, two distinct clusters exist: the United States
              (FedEx, GXO, UPS) and Japan (Sagawa Express, accessed via the Dexterity-SC JV with Sumitomo Corporation).
              No publicly confirmed European or other Asia-Pacific customers have been disclosed as of May 2026. By
              vertical, all named accounts fall within the parcel and third-party logistics (3PL) sub-sectors. Parcel
              carriers (FedEx, UPS, Sagawa) are the deepest deployment channel; GXO represents 3PL/contract logistics.
              No manufacturing, retail, or cold-chain customers have been publicly named. By channel, Dexterity reaches
