      - number: '1.4'
        title: Milestones, Scale, and Customer Evidence
        blocks:
          - type: paragraph
            body: >
              Dexterity's operational milestones document a consistent progression from research prototype to
              production-scale deployment over eight years. The company completed its first fully autonomous robotic
              pick in 2021, marking the transition of Physical AI from lab to functional demonstration. The first
              enterprise deployment occurred in 2022 at a Fortune 500 customer facility for autonomous truck loading —
              company press materials describe this as "one of the first companies to put Physical AI into continuous
              production." By the end of 2023, Dexterity had surpassed 10 million autonomous in-production actions
              across customer sites. Critically, by 2025 the cumulative autonomous action count had reached 100 million,
              a ten-fold increase within roughly two years that the company attributes to fleet expansion and higher
              per-site throughput. In September 2023, Dexterity publicly announced its collaboration with FedEx to test
              DexR for trailer loading, with FedEx's Corporate VP of Operations Science Rebecca Yeung quoted in the
              announcement. In December 2023, Dexterity, Sumitomo, SG Holdings, and Sagawa Express announced a
              partnership for robotic truck loading in Japan, with operational validation commencing at Sagawa's X
              Frontier relay center in Tokyo in May 2025. The Dexterity-SC Japan joint venture, established June 2024,
              targets delivery of more than 1,000 Mech robots to Japanese customers. In March 2026, FedEx highlighted
              Dexterity at its Investor Day as a key technology partner. That same month, Dexterity publicly introduced
              Foresight. In April 2026, Dexterity introduced Instinct. An adverse analyst note from robotics.press
              (April 2026) characterized Dexterity's commercial thesis as unverified at industrial scale, citing the
              absence of publicly disclosed revenue, audited deployment KPIs, and only one named customer reference.
