  - number: 4
    title: Financials
    sections:
      - number: '4.1'
        title: Revenue Model and Pricing Architecture
        blocks:
          - type: paragraph
            body: >
              Dexterity generates revenue almost entirely through its RaaS (Robots-as-a-Service) subscription model,
              whereby enterprise customers pay ongoing fees that bundle hardware deployment, software licensing,
              maintenance, and support rather than purchasing robots outright. This design intentionally shifts capital
              expenditure from the customer's balance sheet to Dexterity's, eliminating the large upfront barrier that
              historically slowed enterprise robotics adoption. The model creates predictable recurring revenue aligned
              with operational uptime and throughput commitments; if performance drops, economics deteriorate for
              Dexterity, not the customer. While Dexterity does not publicly disclose list pricing, third-party
              estimates and industry benchmarks suggest per-site contract values in the $1–5M ARR range for large-format
              trailer loading and unloading operations. Initial integration and non-recurring engineering (NRE) fees may
              supplement the base subscription for complex deployments. Revenue recognition follows subscription accrual
              over the performance period; any upfront NRE fees are likely recognized over the initial contract term.
