      - number: '8.4'
        title: Comparable Valuation Analysis
        blocks:
          - type: paragraph
            body: >
              Dexterity's comparable set spans three categories: public warehouse automation companies, private RaaS
              robotics rounds, and strategic M&A precedents. No single comparable is a direct match — Dexterity's
              Physical AI positioning and multi-customer RaaS model is genuinely differentiated — but the set
              establishes the valuation corridor investors should use.

              Symbotic (NASDAQ: SYM) is the closest public-market benchmark. The company reported fiscal year 2024
              revenue of $1.79 billion, up 52 percent year-over-year, with a gross margin of approximately 13.7 percent
              and a fiscal year-end market capitalization of approximately $8–10 billion, implying 4.5–5.6 times
              revenue. The Symbotic backlog of $22.4 billion at fiscal year-end September 2024 demonstrates the scale of
              demand for warehouse AI, but its gross margin profile validates the capital-intensity concern for
              hardware-enabled logistics automation. Dexterity's implied 27.5 times ARR multiple versus Symbotic's 4.5
              times revenue multiple is a 6 times premium that must be justified entirely by higher growth rates,
              superior business model quality, or stage-premium for earlier-stage venture backing.

              Private comparable rounds include Nimble Robotics ($200 million-plus raised, estimated $500 million
              valuation, e-commerce fulfillment focus) and Pickle Robot ($50 million Series B, truck unloading RaaS with
              direct product competition to Dexterity's DexR). Berkshire Grey — which went public via SPAC in 2021 at a
              $2.7 billion valuation and was subsequently delisted in 2024 after failing to scale revenue — is the key
              adverse precedent: a well-funded warehouse robotics company whose SPAC valuation was not supported by
              revenue execution. Dexterity's investors should study the Berkshire Grey case as a thesis-stress test for
              their own assumptions about RaaS scaling velocity.
            claimRefs:
              - CV009
              - CV010
              - CV011
              - CV012
              - CV013
              - CV014
              - CV015
              - CV016
              - CV038
