  - number: 5
    title: Product & Technology
    sections:
      - number: '5.1'
        title: Product Definition and Capabilities
        blocks:
          - type: paragraph
            body: >
              Dexterity's commercial product is Mech, a dual-arm superhumanoid robot engineered specifically for
              high-mix, high-throughput logistics tasks that resist conventional fixed-automation approaches. Each Mech
              unit is built around two Kawasaki-manufactured custom 8-axis robotic arms capable of 30 kg payload per arm
              (60 kg combined), with a 5.4-metre armspan and more than 2.4 metres of vertical reach. The hardware design
              deliberately mirrors the human form factor so that Mech can operate inside standard truck trailers and
              dock doors without infrastructure modification. The robot travels autonomously on an omnidirectional AGV
              base equipped with four independently steerable wheels, enabling repositioning along the trailer length
              during a loading or unloading cycle without guidance tape or floor markers. Perception is provided by a
              fusion of 16+ RGB-D and structured-light cameras supplemented by 6-axis force-torque sensing at each wrist
              and tactile sensor arrays on the gripper surfaces, enabling compliant handling of irregular, unlabeled,
              and mixed-SKU cartons. Mech is validated across six core logistics workflows: truck loading (primary
              commercial use case at FedEx and Sagawa Express), trailer unloading, palletizing, depalletizing, parcel
              singulation, and dock-to-pallet relay. The Dexterity-SC joint venture with Sumitomo Corporation extends
              the product to the Japanese market. The product is sold exclusively under a Robots-as-a-Service
              subscription model that bundles hardware, software, maintenance, and support, removing capital-expenditure
              barriers for enterprise customers. Mech's rated operating envelope—0–50°C ambient temperature and up to
              90% relative humidity—covers the thermal and humidity extremes encountered in refrigerated and ambient
              logistics environments.
