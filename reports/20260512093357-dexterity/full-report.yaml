      - number: '2.2'
        title: Market Sizing — TAM, SAM, and SOM
        blocks:
          - type: paragraph
            body: >
              Analyst estimates for the warehouse robotics TAM diverge significantly by scope definition. At the
              narrowest hardware-only scope, Research and Markets estimated USD 9.33B in 2025 (growing to USD 21.08B by
              2030 at 17.7% CAGR). At the broader mid-scope, GM Insights and Straits Research both estimated
              approximately USD 14.7B in 2024 (USD 17.6B in 2025) with CAGR of 15.5-23.1% through 2033-2034. At the
              broadest scope (full warehouse automation including AS/RS), Mordor Intelligence estimated USD 29.98B in
              2025 growing to USD 59.52B in 2030 at 18.7% CAGR.


              For Dexterity's most directly applicable sub-market — automated truck loading systems — The Business
              Research Company estimated USD 3.27B globally in 2025, growing to USD 4.67B by 2030 at 7.5% CAGR. The
              slower CAGR relative to broader warehouse robotics reflects the truck-loading segment's more constrained
              buyer universe. DataIntelo's broader loading and unloading robot estimate ($6.3B in 2023 to $14.7B in
              2032) includes a wider scope such as dock-level depalletizing and conveyor-fed systems.


              A bottom-up SAM for Dexterity based on US and Japan market share of the $3.27B global truck loading market
              yields an estimated $1.3-1.8B combined addressable in 2025 (US approximately 35% of global logistics
              value, Japan approximately 15%). Against this, Dexterity's estimated $21.2M ARR (Latka, 2025) implies
              approximately 1-2% penetration of its most directly addressable sub-market. The US parcel market context
              reinforces demand scale: 23.9 billion packages were shipped in 2025 (65M per day), requiring proportionate
              trailer-loading throughput at carrier hubs.
