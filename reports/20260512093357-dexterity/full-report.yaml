  - id: TV005
    title: Thesis-Break and Kill Triggers Table
    columns:
      - Trigger
      - Observable Threshold
      - Transmission to Thesis
      - Probability
      - Action Implication
    notes: >-
      Triggers are ordered by severity of impact on the investment thesis. Each is independently thesis-breaking; two or
      more occurring simultaneously would likely result in a controlled wind-down or distressed sale scenario.
    claimRefs:
      - CV030
      - CV031
      - CV033
      - CV036
    rows:
      - - FedEx DexR contract non-renewal or public termination
        - FedEx publicly ends DexR deployment or Dexterity announces material customer loss
        - Eliminates est. >25% of ARR; triggers Series D uncertainty; valuation likely resets below $1B
        - 15–20% over 3 years
        - Immediate position review; reduce or exit if confirmed; monitor FedEx quarterly CapEx announcements
      - - Series D fails to close at or above Series C price
        - Dexterity announces bridge round, down-round, or extended timeline to next institutional close
        - Signals investor confidence erosion; triggers preference stack concerns; common equity severely impaired
        - 20–25% given burn rate and runway
        - Shift to pass/hold immediately; engage preferred investors on secondary liquidity options
      - - OSHA safety enforcement following a robot-related worker injury
        - OSHA citation issued to Dexterity or customer following a reportable incident; multi-site deployment halt
        - Pauses all active deployments; creates product liability exposure; customer trust damage
        - 10–15% over 5-year deployment horizon
        - Monitor OSHA 300 log filings by FedEx/UPS; verify RIA 15.06 compliance at all active sites
      - - ARR growth stalls below 30% for two consecutive quarters
        - Two consecutive quarters of sub-30% YoY ARR growth reported or inferred from third-party data
        - Collapses bull and base case; valuation reverts to hardware multiple (4–6× ARR = $300–400M)
        - 25–30% if macro conditions tighten in 2026
        - Downgrade to pass; preserve capital for Series D at lower entry
      - - Competitor reaches 500+ commercial robot deployments at ≥20% lower cost/robot
        - A named competitor (Covariant, Pickle Robot, Mujin, or Chinese entrant) announces 500+ units at <$80K/yr
        - Compresses Dexterity's RaaS pricing power; gross margin cannot improve on declining ARPU
        - 15–20% by 2028 given Chinese manufacturing entrants
        - Engage Dexterity product team on price-to-win analysis; benchmark competitive contract terms
  - id: TV006
    title: Final Diligence Asks Table
    columns:
      - Topic
      - Missing Evidence
      - Why It Matters
      - Owner or Diligence Path
    notes: >-
      These six asks represent the minimum information required to upgrade the recommendation from TRACK to conditional
      BUY. Each item is currently unresolvable from public sources alone.
    claimRefs:
