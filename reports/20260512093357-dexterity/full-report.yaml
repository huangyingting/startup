      - number: '5.2'
        title: Technology Architecture and Software Platform
        blocks:
          - type: paragraph
            body: >
              Dexterity's AI stack is organized into three tightly integrated layers: the Foresight world model for
              predictive planning, the Instinct agentic orchestration platform for real-time execution, and a pair of
              APIs (IRIS and Foresight) that expose the stack to enterprise integrators and third-party developers.
              Foresight, launched in March 2026, is a physics-consistent, 4D world model trained on more than 100
              million autonomous actions accumulated across commercial deployments. It generates spatially dense
              representations of carton placement options, evaluating 400 candidate positions per planning step with
              end-to-end latency below 400 milliseconds. Foresight's real-time simulation incorporates weight, friction,
              and structural physics to predict downstream stability when placing boxes in heterogeneous stacks—a
              capability that eliminates reliance on pre-programmed pick-and-place sequences. FedEx's Investor Day in
              March 2026 was the first public showcase of Foresight running on NVIDIA L4 GPU hardware, where Dexterity
              reported a 32× improvement in data throughput relative to the prior inference configuration. Instinct,
              announced in April 2026, is the agentic orchestration layer above Foresight. It coordinates 68+
              specialized agents across three functional classes: Perception agents (running at <100 ms cycle time on
              NVIDIA L4 GPUs with TensorRT optimization), Decision agents (invoking Foresight for collision-free motion
              plans), and Motion agents (executing low-level joint trajectories via real-time control loops). The IRIS
              API is hardware- agnostic, auto-discovers connected hardware features at runtime, and supports at least 4
              robot types and 5+ gripper/hand designs without code changes. The Foresight API exposes model inference
              endpoints for external developers to build custom manipulation skills on top of Dexterity's world model,
              evidenced by developer community activity on GitHub. The compute substrate for inference is NVIDIA L4 GPUs
              with TensorRT, with Beckhoff TwinCAT providing the real-time fieldbus layer and EtherCAT safety protocol.
