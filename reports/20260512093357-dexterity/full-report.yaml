    title: Valuation Sensitivity
    type: bar
    notes: >-
      Implied enterprise value at exit under different revenue and multiple scenarios. All figures are model estimates
      based on public evidence and comparable set.
    claimRefs:
      - CV017
      - CV018
      - CV019
      - CV020
      - CV022
      - CV023
    data:
      items:
        - label: Bull case (ARR $475M × 7.5×)
          value: 3563
          detail: 30% probability; assumes FedEx/UPS multi-site + Japan 1,500 robots + new customers
        - label: Series C post-money (March 2025)
          value: 1650
          detail: Entry reference price; ~25× estimated ARR of $60M
        - label: Base case (ARR $200M × 10×)
          value: 2000
          detail: 45% probability; anchor customer renewals + one new named customer
        - label: Symbotic-implied multiple (est. ARR × 5×)
          value: 300
          detail: Comp-anchored floor; applying Symbotic 4.5-5× multiple to $60M ARR
        - label: Bear case (acqui-hire / down-round)
          value: 850
          detail: 25% probability; Series D fails or prices at material discount
