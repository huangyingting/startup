              units, which implies a multi-year commercial commitment. GXO's stated intent to expand to additional brand
              clients suggests the existing pilot is meeting or exceeding internal performance thresholds. The RaaS
              subscription model provides structural incentives for retention: customers pay recurring fees for
              hardware, software, and support in a bundle, and the cost of switching includes retraining operational
              staff and re-integrating alternative systems into existing WMS infrastructure. Dexterity's data flywheel
