      - number: '7.2'
        title: Regulatory, Legal, and Safety Risks
        blocks:
          - type: paragraph
            body: >
              Dexterity's robots operate in US warehouse environments subject to OSHA 29 CFR 1910 general industry
              safety requirements and the machine guarding and lock-out/ tag-out (LOTO) provisions of 29 CFR 1910.217.
              OSHA's robotics guidance establishes that any automated system capable of causing injury must be
              safeguarded through cell design, perimeter guarding, or speed-and-force-limiting collaborative operation.
              Dexterity's Mech robot is a large-payload, 8-axis arm system that operates in close proximity to human
              dock workers in parcel-sorting environments, meaning OSHA compliance is mandatory, not optional. A failure
              to meet these requirements, or a documentation gap discovered during an OSHA inspection following a
              workplace incident, would result in citations, fines, and potential deployment suspension across all
              affected customer sites. The international standard framework is equally demanding. ISO 10218-1 and ISO
              10218-2 govern safety requirements for industrial robots and integration, while ISO/TS 15066 addresses
              collaborative robot operation. For European expansion, CE marking under the EU Machinery Directive is a
              prerequisite. Dexterity has not publicly disclosed its ISO 10218 certification status, creating an
              evidence gap that investors should close before a Series D commitment. Japan's 2024 overtime reform for
              truck drivers creates regulatory tailwind for the Dexterity-SC joint venture with Sumitomo, but also adds
              regulatory complexity to cross-border deployments and labor relations. Product liability is a distinct
              legal risk. If a Dexterity Mech robot causes a worker injury or significant property damage, the company
              faces product liability exposure under US tort law regardless of contractual indemnification clauses.
              Robotics-specific liability doctrine is still evolving, with courts analyzing whether robots constitute
              products (strict liability applies) or services (negligence standard applies) — a distinction with
              material consequences for insurance requirements and litigation exposure. IP litigation from incumbent
              robot companies is a secondary legal risk: Boston Dynamics, FANUC, ABB, and others hold large
              manipulation-patent portfolios, and a patent challenge against Dexterity's gripper or motion-planning
              technology could generate multi-year litigation costs and injunctive risk. No active Dexterity litigation
              is publicly confirmed as of May 2026.
            claimRefs:
