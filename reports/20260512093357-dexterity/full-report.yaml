        - >-
          Confirmed down round at below Series C valuation; bridge-only financing disclosed; strategic buyer
          conversations initiated
        - >-
          Full investment thesis re-evaluation; request updated financial projections, runway analysis, and strategic
          alternatives assessment
      - - NVIDIA L4 GPU allocation severely curtailed for robotics OEMs
        - >-
          NVIDIA announces allocation prioritization to datacenter customers; Dexterity delays new robot production
          shipments
        - >-
          Confirmed Dexterity production halt or delivery commitment slip of more than 6 months attributable to NVIDIA
          allocation constraint
        - >-
          Operational risk escalation; request alternative compute roadmap from management; assess production backlog
          impact on revenue guidance
      - - Samir Menon departure without succession plan
        - >-
          CEO departure announcement or extended medical leave; no named successor or interim CEO with investor
          confidence
        - >-
          CEO departure announcement before Series D close without a confirmed successor who has institutional investor
          endorsement
        - >-
          Immediate engagement with investor board; request formal succession process timeline; evaluate hold vs. exit
          based on successor profile
      - - Direct competitor achieves 10x Dexterity deployment scale
        - >-
          Competitor (Symbotic, Figure AI, or humanoid platform) announces autonomous manipulation deployments exceeding
          10x Dexterity's confirmed site count
        - >-
          Competitor publicly confirms 10x deployment scale in Dexterity's core parcel/logistics vertical within a
          24-month window
        - >-
          Strategic differentiation review; request competitive analysis from management; assess whether Dexterity's
          data-flywheel moat remains durable
    notes: >
      Kill criteria are designed as monitorable binary events that clearly signal thesis deterioration. Not all risk
      scenarios listed in this chapter are kill criteria — many are manageable within the investment thesis. The worker
      safety incident and FedEx non-renewal criteria are the highest priority because either event would simultaneously
      impair revenue, regulatory standing, and Series D fundraising credibility.
