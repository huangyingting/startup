    title: Company Overview
    sections:
      - number: '1.1'
        title: Identity, Products, and Mission
        blocks:
          - type: paragraph
            body: >
              Dexterity, Inc. is a private, venture-backed robotics startup incorporated in the United States and
              headquartered at 1205 Veterans Blvd, Redwood City, California. The company was founded in December 2017
              and emerged from stealth in July 2020. Its legal name is Dexterity, Inc. and its operating brand is
              Dexterity or Dexterity AI. The company's core thesis is that the next frontier of artificial intelligence
              is not digital content generation but the ability of machines to operate with human-like dexterity in
              unstructured physical environments — a concept it calls "Physical AI." Dexterity's product portfolio
              centers on two robotic platforms: DexR, a dual-arm robot designed for truck trailer loading and unloading,
              and Mech, a mobile manipulation "superhumanoid" capable of palletizing, depalletizing, sortation, and
              truck loading. The company's AI stack comprises the Foresight world model (publicly introduced March
              2026), an agentic skill framework that coordinates specialized perception, planning, grasp, and motion
              agents, and Instinct (introduced April 2026), a tactile force-control skill layer. Dexterity describes its
              business model as Robotics-as-a-Service (RaaS), deploying robots as managed systems to enterprise
              logistics customers under long-term production contracts, supplemented by integration and deployment
              services. Customers include FedEx, UPS, and GXO Logistics in North America, and Sagawa Express in Japan
              through the Dexterity-SC joint venture with Sumitomo Corporation. Dexterity's website highlights zero
              reported safety incidents across its production deployments and states that decision speed averages under
              400 milliseconds per placement — a core selling point for high-throughput logistics environments.
