            title: Compounding Data Flywheel Is the Primary Technical Moat
            body: >
              Dexterity's 100 M+ autonomous action corpus—aggregated across all commercial deployments—creates a
              compounding competitive moat. Every Mech unit operated by FedEx, UPS, GXO, or Sagawa adds training signal
              that improves Foresight for the entire fleet. Competitors without a comparable corpus of real-world
              manipulation data will face a widening performance gap even if they replicate the hardware. This flywheel
              dynamic is analogous to search or recommendation platform moats and is the single most defensible asset
              Dexterity has built.
            calloutType: strength
            claimRefs:
