      - number: '3.2'
        title: Direct Competitor Profiles
        blocks:
          - type: paragraph
            body: >
              Boston Dynamics Stretch achieved 700 cases/hour throughput and in May 2025 signed a memorandum of
              understanding with DHL for more than 1,000 additional Stretch units across DHL's contract logistics, UK,
              European, and North American operations—one of the largest single robotic deployment commitments in the
