companyProfile:
  summary: >-
    Dexterity is a Redwood City, California-based physical AI company founded in 2017 by Samir Menon. It builds
    AI-native robots for warehouse logistics — primarily truck loading, truck unloading, and depalletizing — powered by
    the proprietary Foresight world model trained on more than 100 million manipulation actions. The Mech robot combines
    an 8-axis Kawasaki dual-arm system with computer vision, tactile sensing, and the Instinct multi-agent planning
    platform to handle mixed-SKU, unsorted freight at commercial rates. Dexterity has established production deployments
    with FedEx, UPS, GXO Logistics, and Sagawa Express Japan, and entered the Japanese logistics market through a joint
    venture with Sumitomo Corporation. The company has raised $291 million at a $1.65 billion post-money valuation, with
    investors including Kleiner Perkins, Google Ventures, Lightspeed Venture Partners, Goldman Sachs, Sumitomo
    Corporation, and NTT.
  foundedDate: '2017-01-01'
  founders:
    - name: Samir Menon
      role: Founder and CEO
      background: >-
        Former Google Brain researcher and Stanford robotics PhD; founded Dexterity to productize physical AI for
        commercial warehouse manipulation tasks.
      claimRefs: []
  foundingLocation: Redwood City, California, USA
  headquarters: Redwood City, California, USA
  productSummary: >-
    Dexterity sells the Mech robot system — a dual-arm, 8-axis Kawasaki-based platform with a 5.4-meter span and 30 kg
    per-arm payload — integrated with the Foresight AI world model and the Instinct multi-agent orchestration platform.
    Customers access the robots on a Robot-as-a-Service (RaaS) subscription basis with multi-year contracts; Dexterity
    owns, deploys, maintains, and continuously improves the robots in the customer's facility. The IRIS open API allows
    integration into existing WMS and ERP systems.
  customerFocus: >-
    Tier-1 parcel carriers, third-party logistics providers, and national postal and courier operators that operate
    high-volume truck loading and depalletizing workflows.
  businessModel: >-
    Robot-as-a-Service (RaaS) with multi-year subscription contracts. Dexterity retains hardware ownership and provides
    deployment, maintenance, software updates, and performance guarantees. Revenue is recognized over the contract term;
    per-site economics improve as robots share learned behaviors across the fleet.
  stage: Series C private
