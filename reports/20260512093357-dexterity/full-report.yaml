      - number: '2.3'
        title: Buyer and Segment Profile
        blocks:
          - type: paragraph
            body: >
              Primary buyer segments for Dexterity's products are: (1) express and parcel carriers (FedEx, UPS, DHL)
              managing high-volume trailer operations at dedicated hubs; (2) contract 3PLs (GXO, XPO, DB Schenker)
              operating multi-customer distribution centers; and (3) large-format retailers (Walmart, Target) with owned
              fulfillment networks. Amazon is largely excluded from Dexterity's captive market, as it internalizes most
              automation development (Proteus AMR, Cardinal arm), limiting third-party addressability.


              Budget authorization follows a split model: RaaS contracts of $0.5-5M per year are authorized at VP of
              Logistics/Operations level; capital purchases above $3M require CFO approval. This creates a sales-cycle
              dynamic where RaaS structuring is critical for accelerating VP-level sign-off without CFO gating.


              The 3PL market, valued at $1.8 trillion in 2026 and projected to reach $4.3 trillion by 2035, is the buyer
              ecosystem for automation investment. 74% of shippers state they would switch 3PL providers for better AI
              and automation capabilities, making robotics deployment a competitive retention requirement for 3PLs
              rather than an optional investment. 3PL automation adoption is forecast to outpace in-house brand-operated
              facility adoption through 2030.


              The Japanese buyer segment, enabled by the Dexterity-SC joint venture with Sumitomo, represents a
              high-receptivity second market: Japan's aging workforce, high dock-labor cost, and e-commerce growth
              create strong structural demand. Asia-Pacific broadly leads global warehouse robotics investment.
