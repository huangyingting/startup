      - number: '2.4'
        title: Growth Drivers and Adoption Constraints
        blocks:
          - type: paragraph
            body: >
              Three structural drivers underpin warehouse robotics demand growth:


              (1) Labor scarcity and wage inflation: US warehouse wages rose 7-9% YoY in 2024; declining immigration
              inflows are structurally exacerbating dock-labor shortages through 2027. 83% of supply chain leaders
              project robotics adoption within five years (up from 41% currently), signaling large latent demand.


              (2) E-commerce volume growth: E-commerce drives approximately 40% of automated storage system demand; US
              parcel volumes grow at approximately 6% CAGR through 2030. B2C parcels now represent approximately 75% of
              US shipments (up from 10% in 1985), amplifying per-facility throughput requirements.


              (3) Documented ROI: AMRs achieve payback in under 24 months with 250%+ ROI at scale in purpose-designed
              facilities; early adopters report 25-30% labor cost reduction and 300% faster order fulfillment. The RaaS
              model converts CapEx to OpEx, reducing the capital authorization burden for VP-level buyers.


              Adoption constraints are equally material:


              (1) Infrastructure cost and integration complexity: Network upgrades cost $30,000-$150,000 per facility;
              WMS and ERP integration requires workflow redesign and change management. 'Pilot purgatory' — where trials
              stall before enterprise deployment — is a well-documented pattern.


              (2) Capital intensity and switching cost: Post-deployment lock-in through hardware and service contracts
              creates high barriers to switching vendors; smaller 3PLs face upfront capital constraints despite RaaS
              models.


              (3) Market consolidation risk: Automation.com forecast a 2026 vendor shakeout driven by fragmentation and
              customer demand for multi-application solutions. McKinsey notes that throughput gains have lagged
              expectations in large-scale deployments, creating ROI uncertainty.
