          - type: callout
            title: Labor shortage as the irreversible driver
            body: >-
              The structural labor shortage in US and Japanese warehouse logistics — driven by demographics and
              immigration trends, not cyclical conditions — is the market force most likely to sustain Dexterity's
              demand pipeline regardless of macroeconomic conditions. This is the thesis's structural moat: the problem
              does not go away.
            calloutType: insight
            claimRefs:
