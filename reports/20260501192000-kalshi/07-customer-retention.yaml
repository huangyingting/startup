company:
  name: Kalshi
chapter:
  number: 6
  title: Customer & Retention
  summary: |
    Kalshi's customer surface is broader than a retail trader base alone: it includes demo users, funded retail traders, businesses and funds, developers, and a large forecast-consumption audience reached through media distribution. The retention story is directionally promising but still weakly evidenced because the retained record does not disclose churn, cohort retention, active-funded-trader counts, NPS, or net revenue retention. [C010][C011][C015][C016][C030][C031][C032][C033][C034][C038][C039][C040]
callouts:
  - type: key-insight
    title: Kalshi serves multiple customer surfaces, not one homogeneous user base
    body: |
      The evidence shows separate surfaces for demo users, retail traders, entity accounts, API / FIX users, and partner-distributed forecast audiences. [C010][C011][C015][C016][C030][C032][C034][C038][C039]
    claimRefs:
      - C010
      - C011
      - C015
      - C016
      - C030
      - C032
      - C034
      - C038
      - C039
  - type: opportunity
    title: Forecast audiences may be a feeder system for future traders
    body: |
      Kalshi claims that roughly 70% of monthly visitors primarily check forecasts while about 30% trade, which suggests a large informational audience that could be converted over time if product and trust frictions are reduced. [C033][C038]
    claimRefs:
      - C033
      - C038
  - type: risk-alert
    title: Retention quality cannot be validated from the retained public set
    body: |
      No retained claim discloses cohort retention, repeat-trading frequency, funded-account churn, or net revenue retention, so retention remains a thesis rather than a proven KPI. [C040]
    claimRefs:
      - C040
  - type: risk-alert
    title: Satisfaction evidence is operationally thin
    body: |
      The current claim-backed record does not disclose NPS, CSAT, app ratings, institutional references, or support SLA performance. [C040]
    claimRefs:
      - C040
