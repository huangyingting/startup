sections:
  - number: '6.1'
    title: Customer base and segmentation
    body: |
      Kalshi's customer surface is meaningfully segmented. The company serves retail traders on the owned exchange, demo users who can explore without real capital, businesses and funds through entity accounts, developers through APIs and qualifying advanced connectivity, and a broader forecast audience that may consume probabilities without trading. This breadth matters because it reduces reliance on a single customer archetype, but the retained record does not quantify segment size or segment revenue. [C003][C004][C010][C011][C015][C016][C032][C033][C034][C038][C039]
    claimRefs:
      - C003
      - C004
      - C010
      - C011
      - C015
      - C016
      - C032
      - C033
      - C034
      - C038
      - C039
  - number: '6.2'
    title: Customer proof and surface expansion
    body: |
      The strongest proof points in the retained ledger are not classic customer logos but platform-surface validations. AP's election-data relationship shows Kalshi can attach trusted underlying data to sensitive markets. FOX and Rotten Tomatoes show that Kalshi's forecast outputs can travel into third-party media experiences, which broadens awareness and may create new acquisition loops. Entity accounts and qualifying FIX access show similar expansion on the professional side. Together, these proofs support the thesis that Kalshi can compound reach through multiple surfaces, even though the revenue and retention yield of each surface remains unknown. [C016][C030][C032][C034][C038]
    claimRefs:
      - C016
      - C030
      - C032
      - C034
      - C038
  - number: '6.3'
    title: Retention and churn analysis
    body: |
      Retention is currently the weakest analytical area in the public record. There is a reasonable behavioral hypothesis for repeat usage: recurring real-world events, broad category coverage, and explicit liquidity incentives can all encourage habitual checking and trading. But those are hypotheses, not KPI disclosures. The retained ledger does not provide cohort retention, repeat-trading frequency, customer churn, funded-account activation, or net revenue retention, so the right investor stance is to keep these metrics null and request raw cohort data. [C005][C019][C033][C040]
    claimRefs:
      - C005
      - C019
      - C033
      - C040
  - number: '6.4'
    title: Satisfaction and exact diligence asks
    body: |
      Satisfaction is also unproven in the claim-backed set. No retained claim reports NPS, CSAT, app-store ratings, institutional references, or response-time performance. The most important diligence asks are funded-trader cohorts by signup month, repeat-trading frequency by category, churn of forecast-only visitors versus active traders, partner-channel conversion into funded accounts, institutional account count and retention, and any trust-and-safety or support metrics that explain whether the product experience is compounding or leaking. [C040]
    claimRefs:
      - C040
