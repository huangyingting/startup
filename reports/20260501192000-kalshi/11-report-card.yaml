topStrengths:
  - CFTC-designated contract market status is a rare, evidence-backed moat.
  - Product surface extends beyond retail into entity accounts, APIs, FIX, and media-data distribution.
  - Binary contract design and explicit rules make the product unusually legible for a complex category.
topRisks:
  - Political-event and gaming-rule disputes still constrain legal confidence in future product scope.
  - Current valuation, revenue, margin, and retention remain underdisclosed in retained evidence.
  - Liquidity quality may still depend on incentives and market-maker support.
unresolvedGaps:
  - Current private valuation and cap-table terms remain unverified; the often-cited ~$2B figure is not used.
  - Monthly revenue, take rate, funded-trader counts, and cohort retention were not disclosed in retained evidence.
  - Public materials do not establish control maturity details such as incident history, surveillance effectiveness, or uptime.
