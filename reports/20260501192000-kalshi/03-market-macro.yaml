  - number: '2.3'
    title: Growth drivers and segment analysis
    body: |
      Four evidence-backed drivers matter most. First, CFTC designation gives Kalshi a trust anchor that can matter for retail users, institutional accounts, and distribution partners. Second, the product is comparatively legible: contracts are binary, pricing maps to probability, and each market exposes rules and resolution sources. Third, Kalshi has extended beyond consumer UI into APIs, FIX, entity accounts, and formal liquidity programs, which broadens the addressable participant base. Fourth, AP, FOX, and Rotten Tomatoes show that forecast data can travel into non-trading contexts, potentially widening awareness faster than pure direct-response acquisition. The main counterforce is that product breadth still depends on what regulators ultimately permit, especially in political and gaming-adjacent categories. [C001][C002][C004][C007][C008][C009][C011][C015][C016][C018][C019][C027][C028][C029][C030][C032][C034][C038][C039]
