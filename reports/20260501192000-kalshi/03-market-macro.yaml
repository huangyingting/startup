  title: Market Sizing & Macro Analysis
  summary: |
    Kalshi addresses an evidence-visible market wedge at the intersection of regulated event-contract trading, forecast consumption, and API/media distribution, but the retained ledger does not contain source-backed dollar market sizes. Underwriting therefore depends more on market structure, product-surface expansion, and regulatory scope than on conventional TAM numerics. [C001][C003][C005][C011][C016][C030][C032][C034][C038][C039]
callouts:
  - type: key-insight
    title: The addressable market is broad in use case but narrow in current regulatory footprint
    body: |
      Kalshi's category breadth spans politics, legal outcomes, technology, culture, economics, weather, crypto, and sports-related topics, but its currently served footprint is constrained by the boundaries of what can be listed on a CFTC-regulated venue. [C001][C003][C005][C027][C028][C029]
