  - number: '2.4'
    title: Market outlook
    body: |
      From an investor perspective, Kalshi's market attractiveness is less about a proven public TAM statistic and more about whether a regulated event-contract exchange can become the default infrastructure for both trading and forecast distribution. The evidence supports a broad topical surface, expanding partner reach, and multi-surface product packaging, but it also shows that regulatory interpretation still governs how much of that theoretical demand can be legally served. [C001][C003][C005][C016][C027][C028][C029][C030][C032][C034][C038][C039]
