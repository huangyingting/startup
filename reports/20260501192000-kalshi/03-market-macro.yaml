      - C001
      - C003
      - C005
      - C027
      - C028
      - C029
  - type: opportunity
    title: Forecast consumption may expand faster than trading adoption
    body: |
      Kalshi's media and data partnerships with AP, FOX, and Rotten Tomatoes, plus the company's claim that many visitors primarily check forecasts, suggest a broader audience for prediction data than for direct trading alone. [C030][C032][C033][C034][C038]
    claimRefs:
      - C030
      - C032
      - C033
      - C034
      - C038
  - type: opportunity
    title: Multi-surface distribution enlarges the served market beyond the retail app
    body: |
      Entity accounts, developer APIs, qualifying FIX connectivity, demo trading, and media distribution indicate that Kalshi is attacking the market through several surfaces rather than a single consumer front end. [C010][C011][C015][C016][C039]
    claimRefs:
      - C010
      - C011
      - C015
      - C016
      - C039
  - type: risk-alert
    title: Regulatory scope still determines how far the market can expand
    body: |
      The CFTC's 2023 disapproval of congressional-control contracts and its 2024 proposed rulemaking on gaming-style event contracts show that category expansion remains litigation- and rulemaking-sensitive. [C027][C028][C029]
    claimRefs:
      - C027
      - C028
      - C029
