sections:
  - number: '2.1'
    title: Market definition
    body: |
      Kalshi's visible market is best defined as regulated event-contract trading plus adjacent forecast consumption. The product evidence shows a venue where users trade binary yes/no contracts on real-world outcomes across politics, economics, weather, crypto, culture, technology, legal outcomes, and sports-related topics, while more recent partnership evidence shows those same probabilities being distributed into media contexts where users may consume forecasts without trading directly. [C003][C004][C005][C030][C032][C033][C034][C038]
    claimRefs:
      - C003
      - C004
      - C005
      - C030
      - C032
      - C033
      - C034
      - C038
  - number: '2.2'
    title: TAM, SAM, and SOM framing
    body: |
      The retained ledger supports a layered market lens but not source-backed market-size numerics. TAM is the broadest demand pool for pricing and forecasting real-world outcomes; SAM is the subset that can be served inside a CFTC-regulated event-contract framework and related eligible geographies or institutional workflows; SOM is the footprint Kalshi demonstrably serves today through retail trading, demo onboarding, entity accounts, APIs/FIX, market-making programs, and forecast-data partnerships. Because no retained claim discloses total category spend, active traders, or Kalshi's market share, the correct diligence posture is to keep dollar fields null rather than invent unsupported figures. [C001][C010][C011][C015][C016][C017][C018][C019][C027][C028][C029][C030][C032][C034][C038][C039]
    claimRefs:
