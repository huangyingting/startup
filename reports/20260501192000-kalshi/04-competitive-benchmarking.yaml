  - number: '3.4'
    title: Moat assessment and positioning
    body: |
      On today's evidence, Kalshi is best described as a specialist rather than an across-the-board leader. The company does have a real moat in regulation and an emerging moat in distribution, while product clarity and institutional surfaces strengthen the platform's defendability. But the evidence does not validate durable share leadership, and part of the moat can be weakened if courts or regulators compress the categories Kalshi can legally list. [C001][C002][C011][C015][C016][C027][C028][C029][C030][C032][C034][C037][C038][C040]
