sections:
  - number: '3.1'
    title: Competitive overview
    body: |
      The retained evidence supports a broad competitive frame rather than a precise named-company league table. Kalshi is clearly a regulated event-contract exchange with retail, entity, developer, and media-distribution surfaces, so its competitive set should include any product that captures the same user intent: trading event outcomes, checking probabilities, or consuming event-odds data. That means direct competition is wider than a single app category. [C001][C003][C011][C015][C016][C030][C032][C034][C038][C039]
    claimRefs:
      - C001
      - C003
      - C011
      - C015
      - C016
      - C030
      - C032
      - C034
      - C038
      - C039
  - number: '3.2'
    title: Primary competitors and incumbent substitutes
    body: |
      Because the retained claim set does not provide evidence-rich benchmarks for specific named rivals, the cleanest diligence framing is to separate primary substitute categories from incumbent substitutes. Primary substitutes are other prediction-market-style venues competing for probabilistic trading and forecast attention. Incumbent substitutes are sportsbooks, brokerages, exchanges, and forecast-data products that can satisfy adjacent speculation or information needs. Kalshi's advantage inside this frame is not proven market share; it is its combination of regulatory status, exchange-style rules, and expanding distribution surfaces. [C001][C003][C004][C008][C009][C011][C015][C016][C030][C032][C034][C037][C038][C040]
    claimRefs:
      - C001
      - C003
      - C004
      - C008
      - C009
      - C011
      - C015
      - C016
      - C030
      - C032
      - C034
      - C037
      - C038
      - C040
  - number: '3.3'
    title: Feature overlap and competitive pressure
    body: |
      Kalshi's competitive pressure should be evaluated across four feature layers. First is regulatory trust: CFTC designation and explicit market rules may matter more than UI polish for institutions, policy-sensitive partners, and risk-conscious users. Second is execution depth: APIs, Advanced access, FIX, and market-maker programs can make Kalshi harder to displace among more sophisticated workflows. Third is distribution breadth: AP, FOX, and Rotten Tomatoes show that Kalshi can distribute forecast signals without requiring every user to trade. Fourth is category breadth: the platform already spans multiple topical domains, but the political and gaming-adjacent portion of that breadth remains the most legally contested. [C001][C004][C008][C011][C015][C016][C018][C019][C027][C028][C029][C030][C032][C034][C038]
    claimRefs:
      - C001
      - C004
      - C008
      - C011
      - C015
      - C016
      - C018
      - C019
      - C027
      - C028
      - C029
