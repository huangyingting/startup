    - type: paragraph
      title: 平台做什么以及如何变现
      body: 'Kalshi 的核心工具是二元事件合约：交易者买卖 yes/no 头寸，其价格随隐含概率变化，合约文档明确规定时间线、规则、验证来源和结算机制。公司表示其主要通过交易费变现，部分市场还收取 maker 费，同时维持做市商、交易量和流动性激励计划，以加深交易活跃度。在此基础市场之上，Kalshi 又叠加了模拟交易、机构 / 实体账户、高级 API 接入和符合条件的 FIX 连接。 [C004][C006][C007][C008][C009][C010][C015][C016][C018][C019]'
