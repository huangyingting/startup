- number: 4
  title: 竞争基准分析
  sections:
  - number: '4.1'
    title: 竞争框架
    blocks:
    - type: callout
      title: Kalshi 最明确的竞争优势是监管地位
      body: |-
        证据最充分的差异化因素，是 Kalshi 的指定合约市场资格，以及其将自身定位为受监管事件合约交易所。 [C001][C002][C003]
