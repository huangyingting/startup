- number: 8
  title: 风险与监管
  sections:
  - number: '8.1'
    title: 风险概览与风险清单
    blocks:
    - type: callout
      title: CFTC 资质是公司最强的风险缓释因素
      body: |-
        Kalshi 最重要的结构性防线在于，它并非只是一个通用预测应用；CFTC 已授予 KalshiEX LLC 指定合约市场资格，而 Kalshi 也持续将自身定位为受 CFTC 监管的交易场所。与不受监管的替代方案相比，这显著提升了信任度、合作可能性和机构可理解性。 [C001][C002][C003]
      calloutType: key-insight
      tableRef:
      figureRef:
      items: []
      equation:
      claimRefs:
      - C001
      - C002
      - C003
    - type: callout
      title: 政治事件与博彩规则的不确定性仍是首要投资风险
      body: |-
        CFTC 在 2023 年否决国会控制权合约、并在 2024 年提出类博彩事件合约限制，表明 Kalshi 的产品边界仍在政治和法律层面存在争议。即便中期诉讼报道偏正面，也无法消除上诉风险或未来规则制定风险。 [C027][C028][C029]
      calloutType: risk-alert
      tableRef:
      figureRef:
      items: []
      equation:
      claimRefs:
      - C027
      - C028
      - C029
    - type: paragraph
      title: 风险概览
      body: |-
        Kalshi 的风险画像呈现出异常明显的两极化。一方面，公司拥有该类别中最清晰的结构性差异化之一：由 CFTC 授予的指定合约市场资格、基于规则的交易所模式，以及可见的负责任交易控制。另一方面，同一监管领域也包含最大的不确定问题，因为政治事件合约已经受到挑战，更广泛的类博彩规则制定也已被提出，而当前公开估值和经营披露仍然薄弱。这使其成为一家具有战略吸引力、但仍难以激进承保的公司。 [C001][C002][C020][C027][C028][C029][C040]
      calloutType:
      tableRef:
      figureRef:
      items: []
      equation:
      claimRefs:
      - C001
      - C002
      - C020
      - C027
      - C028
      - C029
      - C040
    - type: paragraph
      title: 监管与法律风险
      body: >-
        监管与法律风险是本章的决定性议题。基础性正面事实很强：CFTC 在 2020 年授予 KalshiEX LLC DCM 资格，Kalshi 也持续将自己定位为受 CFTC 监管的事件合约场所。但投资评估不能止步于此。CFTC 于 2023 年 9 月否决国会控制权合约的命令表明，该机构愿意将至少部分政治合约视为博彩、违反州法的活动，并认定其有悖公共利益。2024 年拟议规则制定进一步放大了这一担忧，表明其对 CFTC 注册场所上的政治竞赛合约持更广泛的政策反对立场；而 2024 年的诉讼报道虽然显示 Kalshi 取得进展，却并未带来最终的法律定论。对投资者而言，其含义十分直接：法律清晰度决定了 Kalshi 最受关注产品触达面中有多少具备持续性，而这又将反过来驱动长期收入、客户转化和融资支持。 [C001][C002][C027][C028][C029]
