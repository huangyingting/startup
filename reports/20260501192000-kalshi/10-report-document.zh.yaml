      body: |-
        应从四个功能层面评估 Kalshi 的竞争压力。第一是监管信任：对机构、政策敏感型合作伙伴和风险意识较强的用户而言，CFTC 指定资格与明确的市场规则，可能比 UI 精致程度更重要。第二是执行深度：API、高级接入、FIX 和做市商计划，能让 Kalshi 在更复杂的工作流中更难被替代。第三是分发广度：AP、FOX 和 Rotten Tomatoes 表明，Kalshi 可以在不要求每位用户都参与交易的情况下分发预测信号。第四是品类广度：平台已经覆盖多个主题领域，但其中政治和博彩相关部分在法律上仍最具争议。 [C001][C004][C008][C011][C015][C016][C018][C019][C027][C028][C029][C030][C032][C034][C038]
