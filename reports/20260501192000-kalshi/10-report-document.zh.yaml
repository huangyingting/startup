- id: T703
  title: 缓释优先级与止损 / 终止标准
  columns:
  - 触发区域
  - 证据支持的理由
  - 工作需要
  - 杀死标准或停止损失触发器
  rows:
  - - 法律范围和选举合同
    - 政治事件和博彩规则争端是产品风险的核心。 [C027][C028][C029]
    - 获得外部律师备忘录、当前案件情况摘要、监管机构的函证和产品核准工作流程。
    - 如果法律审查表明关键的政治或毗邻市场有可能长期受到禁止或经济制约,就停止。
  - - 当前估值和融资支助
    - 目前私人估值在获取的证据中没有得到解决,经常重复的~$2B叙述未经核实. [C021][C040]
    - 获得目前的上限表、最后一轮文件、估值条件和内部董事会材料。
    - 如果目前的定价大大超过所披露的收入质量和法律清晰度,则停止。
  - - 收入质量和保留
    - 公共牵引锚存在,但它们是公司主张的,不披露收入、留存额或融资交易人的持久性。 [C031][C033][C035][C040]
    - 按流获得月收入、活跃的资金交易商、组群留用、收取费率和奖励负担。
    - 如果保留组群、变现净额或融资交易商质量不能证明监管和流动性风险是合理的,则停止。
  - - 安全和遵守行动
    - 公共材料证实控制水平较高,但没有操作证明深度。 [C020][C040]
    - 获得事件记录、审计摘要、安全路线图、监测工作流程和合规人员配置衡量标准。
    - 如发现重大未解决的控制薄弱环节,重复发生事故,或监测覆盖面不足,即予停止.
  - - 流动性依赖性
    - 市场制造者和奖励方案表明,流动性仍然是一个积极的管理问题。 [C018][C019]
    - 深入市场KPIs,集中流动资金提供者,分散历史,激励ROI分析.
    - 如果有机流动性在结构上仍然薄弱,没有补贴,或者市场质量高度集中,就停止。
  notes: |-
    杀杀标准是投资者从保留的证据中得出的决定规则,已知的数据室询问,而不是预测这些失败已经发生.
  claimRefs:
  - C018
  - C019
  - C020
  - C021
  - C027
  - C028
  - C029
  - C031
  - C033
  - C035
  - C040
- id: T801
  title: 投资论点摘要
  columns:
  - 论文支柱
  - 证据
  - 反重量
  - 投资者阅读
  rows:
  - - 监管护城河
    - Kalshi有一个罕见的CFTCDCM指定和位置本身作为受监管的事件-合同交换. [C001][C002][C003]
    - 同样的监管领域已经限制了政治事件产品,并可能限制今后类别的广度。 [C027][C028][C029]
    - 强大的战略资产,但还没有完全稳定的增长平台.
  - - 多表面产品宽度
    - Demo,实体账户,API/FIX接入,以及媒体-传播伙伴关系显示基础设施雄心超过单一零售表面. [C010][C011][C015][C016][C030][C032][C034][C038][C039]
    - 收入贡献、转换和海面留存不披露。 [C033][C040]
    - 可选性正面信号,尚不能证明规模经济学.
  - - 需求与关注
    - Kalshi报道了大量的选举期间的流量,数百万的月访问者,以及围绕奥斯卡奖报道的有意义的特定事件交易量. [C031][C033][C035]
    - 这些是公司声称的,不等同于核实的收入或持久的供资用户群体。 [C031][C033][C035][C040]
    - 令人鼓舞的,但不足以进行估值承保。
  - - 向上分布
    - AP,FOX,和Rotten Tomatoes集成表示预测数据分布可以延长品牌,降低收购摩擦. [C030][C032][C034][C038]
    - 没有保留索赔证明直接变现或查看器对交易器的转换。 [C033][C038][C040]
    - 真正的倒置选择,但仍是一个选择。
  - - 承销适合
    - Kalshi 具有战略意义和类别界定性,值得继续关注。 [C001][C003][C039]
    - 当前估值、收入、差值和留存额仍未充分披露。 [C021][C040]
    - 在私人勤勉填补空白之前,更多研究是适当的。
  notes: |-
    论文对战略有吸引力,对经济学则没有定论。 本表有意将公司质量与可承销价格区分开来.
