- number: 9
  title: 投资与估值
  sections:
  - number: '9.1'
    title: 投资论点与案例框架
    blocks:
    - type: callout
      title: 建议为“继续研究”，而非“买入”
      body: |-
        Kalshi 具有足够的战略价值，值得继续留在积极尽调名单中，但目前缺乏足够经核实的财务和估值证据，尚不足以支持今天给出“买入”建议。只有在当前融资条款、变现质量和法律可持续性得到验证之后，投资者才应重新开启此案。 [C021][C027][C028][C029][C040]
      calloutType: investment-recommendation
      tableRef:
      figureRef:
      items: []
      equation:
      claimRefs:
      - C021
      - C027
      - C028
      - C029
      - C040
    - type: paragraph
      title: 投资论点摘要
      body: |-
        围绕 Kalshi 的正面投资论点并不难理解。它是少数拥有明确 CFTC 背书合法性的事件合约平台之一，正在从零售交易扩展到机构和 API 触达面，并开始将预测概率作为媒体数据产品进行分发。如果客户转化和产品范围都能扩张，这种组合可能支撑其在受监管预测市场中扮演重要战略角色。问题在于，当前公开证据基础并未向投资者提供足够多关于现时经济性或价格的信息。 [C001][C016][C030][C032][C034][C038][C039][C040]
      calloutType:
      tableRef:
      figureRef:
      items: []
      equation:
      claimRefs:
      - C001
      - C016
      - C030
      - C032
      - C034
      - C038
      - C039
      - C040
    - type: paragraph
      title: 乐观、基准与悲观情景
      body: |-
        乐观情景是，Kalshi 将监管信任、机构接入和预测数据分发转化为一个具备规模的市场平台，其变现能力优于当前公开记录所显示的水平。基准情景是，Kalshi 仍然具有战略重要性，但由于法律范围和 KPI 透明度落后于叙事，因而仍难以估值。悲观情景是，法律不确定性收窄最重要的品类，而激励需求和披露不足又使投资者无法支持传闻中的估值叙事。基于保留证据，基准情景是最契合的。 [C001][C016][C018][C019][C027][C028][C029][C030][C032][C034][C038][C040]
