      title: 主要竞争者与既有替代品
      body: |-
        由于保留的主张集合并未为特定具名对手提供证据充分的基准，最清晰的尽调框架是将主要替代类别与既有替代品区分开来。主要替代品是其他争夺概率交易与预测注意力的预测市场类场所；既有替代品则是体育博彩、券商、交易所和预测数据产品，它们能满足相邻的投机或信息需求。Kalshi 在这一框架中的优势，不是已被证明的市场份额，而是监管地位、交易所式规则以及不断扩展的分发触达面的组合。 [C001][C003][C004][C008][C009][C011][C015][C016][C030][C032][C034][C037][C038][C040]
