- id: T301
  title: 以替代类别构建的竞争格局
  columns:
  - 类别
  - 为什么它与Kalshi重叠?
  - 证据支持Kalshi优势
  - 证据支持的不确定性
  rows:
  - - 主要类别:受管制的事件-合同交换
    - Kalshi直接服务于对现实世界结果的"是/否"交易,提供零售,实体,以及API/FIX访问. [C003][C004][C011][C015][C016]
    - CFTC指定,明确的市场规则,以及负责任的交易控制,形成了信任和遵守的楔形关系. [C001][C002][C008][C020]
    - 政治和与游戏相邻的合同范围仍然存在争议。 [C027][C028][C029]
  - - 替代类别:预测市场场所
    - 这些替代品与寻求概率预测和基于结果的贸易风险的用户竞争。
    - Kalshi保留的证据在监管,APIs,机构接入,以及媒体发布方面最强. [C001][C011][C015][C016][C030][C032][C034][C038]
    - 留存的分类账中没有直接预测市场竞争对手的索赔支持的指定公司基准。
  - - 替代类别:体育手册和成果促销产品
    - 这些替代品围绕现实世界的结果竞争娱乐和投机,特别是在Kalshi类组合中提到的与体育有关的话题中. [C005]
    - Kalshi的产品被设定为基于规则的交易所,具有明确的核查来源和支付力学,而不是纯粹的投注产品. [C003][C004][C008][C009]
    - 在保留的证据中,体育和游戏的界限是最有监管敏感性的领域。 [C028][C029]
  - - 替代类别:经纪、交换和预测数据产品
    - 其他产品可以吸收用户的注意力,用于宏观观点,事件驱动的交易,或简单的预测消费.
    - Kalshi与预测-数据分布通过AP,FOX,Rotten Tomatoes集成的对对可交易性. [C030][C032][C034][C038]
    - 留存的分类账没有披露这些表面的转换、变现或留存。
  notes: |-
    被命名为公司的竞争对手的基准受保留索赔单元的限制。 因此,本表使用了明确标签的替代类别,而不是没有支持的公司具体说法。
