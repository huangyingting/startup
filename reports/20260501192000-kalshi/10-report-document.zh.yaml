      - C001
      - C020
      - C040
    - type: callout
      title: 财务与估值披露缺失放大了承保敏感性
      body: |-
        公开记录仍未验证 Kalshi 当前的私有估值，也未披露足以让人有信心承受监管波动的收入、留存和利润率数据包。这也使法律与运营不确定性进一步转化为融资风险不确定性。 [C021][C031][C033][C035][C040]
      calloutType: risk-alert
      tableRef:
      figureRef:
      items: []
      equation:
      claimRefs:
      - C021
      - C031
      - C033
      - C035
      - C040
    - type: paragraph
      title: 信用、运营、隐私与安全风险
      body: |-
        根据保留证据，传统消费者信贷风险并不是评估 Kalshi 的相关框架；更重要的尽调问题在于，一个同时拥有零售、机构、API 和媒体触达面的受监管交易所，是否具备足够成熟的运营、监控、隐私与安全控制。有主张支持的记录确实确认了负责任交易工具、实体账户工作流、API 和交易所状态遥测，这在方向上是积极的。然而，它并未公开建立起详细的数据治理架构、安全事故历史、可用性表现或监控有效性。因此，投资者应将这一领域视为部分尚未解决，而不是仅凭监管地位就轻率假定其已具备交易所级成熟度。 [C011][C014][C015][C016][C020][C040]
      calloutType:
      tableRef:
      figureRef:
      items: []
      equation:
      claimRefs:
      - C011
      - C014
      - C015
      - C016
      - C020
      - C040
    - type: paragraph
      title: 竞争与战略风险
      body: |-
        竞争风险与其说关乎某一个具名对手，不如说关乎 Kalshi 能否在替代品吸收同类用户注意力之前，将监管合法性与分发广度转化为持久的市场地位。证据显示，Kalshi 已从零售应用扩展到模拟、机构、API/FIX 和媒体分发触达面。这是真实的战略优势。但护城河并非绝对。如果监管收窄高关注度合约类别，多触达面平台的价值就会下降；如果预测受众无法转化为可变现的交易者或机构用户，分发广度就可能只带来注意力，而没有足够的收入持续性。因此，竞争风险并非独立于监管风险之外，而是与其交织在一起。 [C016][C018][C019][C027][C028][C029][C030][C032][C034][C038][C039]
