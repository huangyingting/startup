    - type: paragraph
      title: 竞争概览
      body: |-
        保留证据支持的是宽泛的竞争框架，而非精确到具名公司的排行榜。Kalshi 显然是一家拥有零售、实体、开发者和媒体分发触达面的受监管事件合约交易所，因此其竞争集合应包括任何满足同样用户意图的产品：交易事件结果、查看概率，或消费事件赔率数据。这意味着直接竞争范围大于单一应用类别。 [C001][C003][C011][C015][C016][C030][C032][C034][C038][C039]
