  - number: '5.2'
    title: 单位经济模型的阻碍因素
    blocks:
    - type: callout
      title: 核心财务尽调仍受披露缺口阻碍
      body: |-
        保留记录并未披露收入、活跃入金交易者、贡献利润、CAC、LTV、分群留存或当前估值，因此完整的单位经济模型目前仍无法成立。 [C033][C035][C040]
      calloutType: risk-alert
      tableRef:
      figureRef:
      items: []
      equation:
      claimRefs:
      - C033
      - C035
      - C040
    - type: paragraph
      title: 单位经济模型与利润率走向
      body: |-
        基于公开数据的单位经济模型在实质上并不完整。当前可见的信息在方向上很重要：Kalshi 似乎通过做市商优惠以及明确的交易量和流动性激励计划来为流动性付费，同时还承担在政治合约合法性持续受争议环境下运营受监管交易所的额外成本。这种组合意味着，手续费总额只是瀑布的起点，而不是终点。在未披露直接交易成本、合规成本、激励支出、客户支持或法律支出数据之前，毛利率和贡献利润率应保持为 null，而不是靠猜测填写。 [C001][C018][C019][C027][C028][C029][C040]
      calloutType:
      tableRef:
      figureRef:
      items: []
      equation:
      claimRefs:
      - C001
      - C018
      - C019
      - C027
      - C028
      - C029
      - C040
    - type: paragraph
      title: CAC、LTV、回本期与可辩护的预测情景
      body: |-
        在当前尽调包中，CAC、LTV、LTV / CAC 和回本期全部为 null，因为保留证据缺少获客支出、入金交易者转化、重复交易频率、每位交易者毛利润以及分群留存曲线。相同逻辑也阻碍了情景建模：没有任何有主张支持的基线收入数据可用于构建低、中、高三种情景。最有价值的尽调需求包括：月活入金交易者、月度毛收入与净收入、分细分市场的手续费收入、综合抽成率、按入金月份划分的分群留存、激励支出负担，以及从媒体分发触达面到交易者的转化情况。 [C030][C032][C034][C038][C040]
