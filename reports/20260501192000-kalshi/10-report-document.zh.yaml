    - type: paragraph
      title: 增长驱动因素与细分分析
      body: |-
        四个有证据支持的驱动因素最为重要。第一，CFTC 指定资格为 Kalshi 提供了信任锚点，这对零售用户、机构账户和分发合作伙伴都可能重要。第二，产品相对易于理解：合约是二元的，价格映射到概率，每个市场都公开规则和结算来源。第三，Kalshi 已超越消费者 UI，扩展至 API、FIX、实体账户和正式的流动性计划，从而扩大了可服务参与者基础。第四，AP、FOX 和 Rotten Tomatoes 表明，预测数据可以进入非交易场景，这可能比单纯的直接获客更快提升认知度。主要反作用力在于，产品广度仍取决于监管机构最终允许什么，尤其是在政治和博彩相关类别中。 [C001][C002][C004][C007][C008][C009][C011][C015][C016][C018][C019][C027][C028][C029][C030][C032][C034][C038][C039]
