startupIntroduction:
  summary: >-
    Kalshi 是一家私营预测市场与事件合约平台，允许用户围绕政治、宏观数据、文化、科技、天气、加密货币及体育相关类别中的现实世界结果买卖二元 yes/no 合约。当前最有力的监管锚点，是 CFTC 于 2020 年发布命令，授予 KalshiEX LLC 指定合约市场资格；当前最有力的公司资料锚点，则是 Y Combinator 的公司档案，其中将 Kalshi 描述为一家由 Tarek Mansour 和 Luana Lopes Lara 于 2019 年创立、总部位于纽约的公司。公开证据显示，Kalshi 通过交易费和 maker 费变现，支持零售、模拟、机构、API 与 FIX 工作流，并正通过与 AP、FOX 和 Rotten Tomatoes 的媒体合作分发其预测数据。不过，后期融资以及被频繁提及的“约 $2B”估值，均未能在抓取到的一级记录中获得验证，而且成立年份 / 总部的证据仍存在一定不一致。 [C001][C003][C006][C010][C015][C016][C021][C023][C024][C025][C030][C032][C034][C040]
