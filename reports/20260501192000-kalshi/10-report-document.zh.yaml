      - C028
      - C029
    - type: paragraph
      title: 分发、规模信号与待解的身份问题
      body: 'Kalshi 发展叙事中最新的一部分，不只是交易量，而是预测数据的分发。AP 同意向 Kalshi 提供选举结果数据，FOX 在多个媒体资产中集成了 Kalshi 数据，Rotten Tomatoes 则将 Kalshi 的预测嵌入奖项报道之中。这些合作支持了管理层的观点：许多用户即使不交易，也会因为赔率而来。但在投资者最需要硬数据的地方，公开记录仍然薄弱：最近一次抓取到的一级融资披露是 2021 年的 Series A，声称约 $2B 的估值未获验证，而活跃交易者、收入和留存指标仍未披露。 [C030][C031][C032][C033][C034][C035][C038][C040]'
