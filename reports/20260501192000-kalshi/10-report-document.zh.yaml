- id: T702
  title: 监管、法律、合规与安全深度分析
  columns:
  - 域名
  - 证据
  - 主要未决问题
  - 投资者的影响
  rows:
  - - CFTC 状况
    - Kalshi以强大的监管锚点运作,因为CFTC被授予KalshiEX LLC指定的合约市场地位和Kalshi继续把自己定位为一个受监管的地点. [C001][C002]
    - 这种优势在新合同类别和今后规则解释方面有多持久?
    - 真正的护城河,但商业价值取决于允许的上市范围。
  - - 政治事件合同
    - 国会控制合同在2023年被CFTC不批准. [C027]
    - 未来的诉讼是重新讨论可扩展的选举合同类别还是只保留一条狭窄的道路?
    - 选举曝光可以是增长驱动器或头条风险放大器.
  - - 博彩规则
    - 2024年,CFTC提议将政治争议合同定义为游戏,与CFTC场所的公共利益相违背. [C028]
    - 未来的规则制定能否超越政治范围进入其他事件类别,或引起更广泛的批准摩擦?
    - 产品范围应当保守地写到规则风险解除为止。
  - - 法院-程序不确定性
    - 独立报道称Kalshi在CFTC获得上诉前赢得了一个重要的区法院裁决. [C029]
    - 目前的程序态势和预期的时间如何才能持续明确?
    - 临时胜诉改善可选性,但不能作为解决问题的理由。
  - - 隐私、安全和业务控制
    - 索赔支持的记录显示了负责任的交易控制和规范的操作,但没有关于数据治理,事件历史,或操作安全的详细公开证明KPIs. [C001][C020][C040]
    - 内部监测、数据保护和安全控制成熟度是否与大规模管制的交换处理活动一致?
    - 这是一项重大确认性调查项目,在承保机构规模之前。
  - - 类似信用和对应方的风险
    - 保留的证据支持一种交换模式,而不是消费者信用模式;主要风险是围绕成员、机构和平台活动进行操作和合规执行,而不是贷款担保。 [C003][C016][C040]
    - 更大规模地出现什么对面、欺诈、纠纷或资金流动风险?
    - 投资者应注重业务控制,而不是传统的信用损失假设。
  notes: |-
    在没有索赔支持的证据的情况下,本表直接标注空白,而不是用无佐证的假设回填.
  claimRefs:
  - C001
