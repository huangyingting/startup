- id: T802
  title: 乐观、基准与悲观情景框架
  columns:
  - 大小写
  - 证据支持的设置
  - 所需主要假设
  - 主失败模式
  - 当前概率姿态
  rows:
  - - 公牛
    - Kalshi规范位置,机构/API表层,预测数据分布转换为持久类领导,变现程度高于目前公共记录所证明的水平. [C001][C016][C030][C032][C034][C038][C039]
    - 法律清晰度提高,预测受众转换,流动性质量变得自我增强而不是依赖补贴。
    - 产品范围的限制依然存在,或变现与注意力不符。
    - 虚而未验.
  - - 基础
    - Kalshi 仍然是一个有区别的监管平台,具有真正的战略价值,但法律不确定性和披露差距使筹资和估值支助受到限制。 [C001][C027][C028][C029][C040]
    - 类别宽度仍然足够,但目前的经济学和估值仍然难以公开证明。
    - 增长仍在继续,没有足够的证据来清除估值障碍。
    - 最符合当前证据。
  - - 熊猫
    - 法律上的悬浮缩小了高度注目的市场,而流动性支持和业务负担使净经济比表面叙述所暗示的要弱。 [C018][C019][C027][C028][C029][C040]
    - 内部KPIs未能以当前或传闻的价格水平验证战略故事.
    - 在产品关联性消失前进行估值压缩.
    - 无法排除。
  notes: |-
    这一案例框架按设计是定性的。 保留的记录不支持具有当前估值产出的合理预测模式。
