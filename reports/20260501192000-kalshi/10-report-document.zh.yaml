      body: '与其把 Kalshi 理解为传统体育博彩或券商外壳，不如把它理解为一家受监管的事件合约交易所。最稳固的一级锚点，是 CFTC 在 2020 年将 KalshiEX LLC 指定为指定合约市场；随后公司材料将 Kalshi 描述为用户交易现实世界事件结果 yes/no 合约的场所。不过，当前公开身份记录并非完全一致：Business Wire 说公司成立于 2018 年，Y Combinator 说是 2019 年，而地点证据也从 2020 年监管材料中的旧金山，转向当前公司数据库及 2026 年新闻中的纽约。 [C001][C003][C022][C023][C024][C025]'
