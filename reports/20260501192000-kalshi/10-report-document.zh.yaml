      - C040
    - type: paragraph
      title: 监管态势既是护城河也是风险
      body: Kalshi 的监管地位既是公司最大的结构性差异化来源，也是主要不确定性来源。CFTC 注册带来了有意义的信任护城河，但该机构随后否决了 Kalshi 的国会控制权合约，并在 2024 年提出更广泛的规则，拟将政治竞赛类事件合约归类为博彩。2024 年的独立评论报道，Kalshi 赢得了一项重要的地区法院裁决，之后 CFTC 又在上诉期间获得暂缓执行。对投资者而言，这意味着监管优势与监管脆弱性在同一投资逻辑中并存。 [C001][C002][C027][C028][C029]
      calloutType:
