- number: 5
  title: 财务与单位经济模型
  sections:
  - number: '5.1'
    title: 收入模型与可观察信号
    blocks:
    - type: callout
      title: 收入模式清晰，但收入规模并不清晰
      body: |-
        Kalshi 表示，其通过对预期收益收取交易费变现，部分市场还收取 maker 费；这构成了有主张支持的收入引擎，尽管没有任何保留主张披露总收入或综合抽成率。 [C006][C040]
      calloutType: key-insight
      tableRef:
      figureRef:
      items: []
      equation:
      claimRefs:
      - C006
      - C040
    - type: paragraph
      title: 收入模型概览
      body: |-
        Kalshi 的变现模型在概念上简单且有主张支持：交易所对预期收益收取交易费，并在部分市场收取 maker 费。这使 Kalshi 在经济上更接近交易所或交易场所运营商，而不是自营庄家，尤其是因为公司表示会员彼此交易，而不是与交易所本身对手盘交易。投资者面临的挑战不在于理解机制，而在于衡量机制规模。没有任何保留主张披露收入、净抽成率、分客户细分的手续费收入，或按市场类别划分的贡献。 [C006][C040]
