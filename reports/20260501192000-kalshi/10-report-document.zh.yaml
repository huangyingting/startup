    title: 最终投资建议
    blocks:
    - type: callout
      title: 只有在取得完整私有数据包后才应重新评估
      body: |-
        若要给出更强的建议，需要当前轮融资文件、董事会批准的 KPI 材料、月度收入与抽成率数据、留存分群，以及覆盖选举与博彩规则风险敞口的最新法律风险材料。在此之前，正确立场应是“继续研究”，估值立场维持 unknown。 [C021][C027][C028][C029][C040]
      calloutType: final-recommendation
