  - number: '9.2'
    title: 估值框架与阻碍分析
    blocks:
    - type: callout
      title: 估值不能用虚假的精确度来支撑
      body: |-
        当前私有估值在保留证据中仍未解决，而常被引用的 ~$2B 数字也未在抓取到的一级来源中得到验证。因此，任何数值化的公允价值估计都只会更像装饰，而非可辩护的结论。 [C021][C040]
      calloutType: risk-alert
      tableRef:
      figureRef:
      items: []
      equation:
      claimRefs:
      - C021
      - C040
    - type: paragraph
      title: 可比对象与估值框架
      body: |-
        估值框架被有意保持得较为简略，因为保留证据并未验证最关键的输入项。历史锚点是 2021 年的 $30M Series A，但抓取记录中并不存在有主张支持的当前估值、当前收入、毛利率或留存数据包。因此，被广泛重复的“~$2B”数字被视为未核实，并排除在数值建模之外。由于保留记录对竞争框架的支持强于对可比公司财务基准的支持，本报告中的公开可比对象证据也较弱。正确立场是描述方法与必要假设，将当前价值输出保持为 null，并明确整个公允价值测算在私有尽调完成前处于受阻状态。 [C006][C021][C039][C040]
