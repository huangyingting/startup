  - number: '8.2'
    title: 控制、传导与缓释
    blocks:
    - type: callout
      title: 隐私、安全与合规成熟度只有部分证据支持
      body: |-
        保留的、有主张支持的记录确认了负责任交易控制和受监管运营，但并未提供关于存储架构、事故历史、监控有效性或安全表现的有主张支持细节。投资者应将此视为尽调缺口，而不是视为薄弱的证据，也不是视为强项的证据。 [C001][C020][C040]
      calloutType: risk-alert
