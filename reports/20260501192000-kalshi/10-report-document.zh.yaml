      body: |-
        Kalshi 的可见市场，最适合定义为受监管的事件合约交易，加上相邻的预测内容消费。产品证据显示，这是一个用户围绕政治、经济、天气、加密货币、文化、科技、法律结果和体育相关主题，交易二元 yes/no 现实世界结果合约的场所；而较新的合作证据则显示，这些同样的概率正被分发到媒体场景中，用户可在不直接交易的情况下消费预测内容。 [C003][C004][C005][C030][C032][C033][C034][C038]
