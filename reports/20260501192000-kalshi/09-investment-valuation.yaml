sections:
  - number: '8.1'
    title: Investment thesis summary
    body: |
      The positive thesis on Kalshi is easy to understand. It is one of the few event-contract platforms with clear CFTC-backed legitimacy, it is broadening from retail trading into institutional and API surfaces, and it is beginning to distribute forecast probabilities as a media data product. That combination could support a large strategic role in regulated forecasting markets if customer conversion and product scope both expand. The problem is that the current public evidence base does not tell investors enough about present economics or price. [C001][C016][C030][C032][C034][C038][C039][C040]
    claimRefs:
      - C001
      - C016
      - C030
      - C032
      - C034
      - C038
      - C039
      - C040
  - number: '8.2'
    title: Bull, base, and bear cases
    body: |
      The bull case is that Kalshi turns regulatory trust, institutional access, and forecast-data distribution into a scaled marketplace with better monetization than the current public record reveals. The base case is that Kalshi remains strategically important but still difficult to value because legal scope and KPI transparency lag the narrative. The bear case is that legal overhang narrows the most important categories while incentive needs and thin disclosure prevent investors from supporting the rumored valuation narrative. Given retained evidence, the base case is the cleanest fit. [C001][C016][C018][C019][C027][C028][C029][C030][C032][C034][C038][C040]
    claimRefs:
      - C001
      - C016
      - C018
      - C019
      - C027
      - C028
      - C029
      - C030
      - C032
      - C034
      - C038
      - C040
  - number: '8.3'
    title: Comparables and valuation framework
    body: |
      The valuation framework is intentionally sparse because the retained evidence does not verify the most important inputs. A historical anchor exists in the 2021 $30M Series A, but no claim-backed current valuation, current revenue, gross margin, or retention package exists in the fetched record. The widely repeated "~$2B" figure is therefore treated as unverified and excluded from numeric modeling. Public comparables are also evidence-light in this report because the retained record supports competition framing more than comparable-company financial benchmarking. The correct stance is to describe methods and required assumptions, keep current value outputs null, and flag the entire fair-value exercise as blocked pending private diligence. [C006][C021][C039][C040]
    claimRefs:
      - C006
      - C021
      - C039
      - C040
  - number: '8.4'
    title: Final recommendation and re-underwriting triggers
    body: |
      The final recommendation is research-more. Kalshi is too strategically differentiated to ignore, but too underdisclosed to price with conviction. Investors should re-underwrite only if three conditions are met: first, current financing and ownership materials validate the actual market price; second, monthly revenue, take-rate, funded-trader, and retention materials establish real economic durability; third, legal materials show a credible path to stable product scope despite political-event and gaming-rule challenges. Without those conditions, the investment case remains interesting but incomplete. [C021][C027][C028][C029][C040]
    claimRefs:
      - C021
      - C027
      - C028
      - C029
      - C040
