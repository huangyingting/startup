  - type: key-insight
    title: The bull case depends on converting regulatory legitimacy into scalable multi-surface monetization
    body: |
      Kalshi's strongest upside ingredients are its CFTC-regulated position, institutional and API surfaces, and growing use of prediction data in external media contexts. That could make the company more than a niche retail app if conversion and monetization prove durable. [C001][C016][C030][C032][C034][C038][C039]
