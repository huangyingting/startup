      A stronger recommendation would require current round documents, board-approved KPI materials, monthly revenue and take-rate data, retention cohorts, and a current legal-risk packet covering election and gaming-rule exposure. Until then, the right stance is research-more with unknown valuation stance. [C021][C027][C028][C029][C040]
