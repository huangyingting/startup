  summary: |
    Kalshi is strategically compelling but not yet cleanly underwriteable. The company appears to have a differentiated regulated-exchange position, growing multi-surface distribution, and evidence of forecast demand beyond direct trading, yet the retained record still does not verify current valuation, current revenue, retention, or full legal clarity on politically sensitive contracts. As a result, the appropriate investor stance is research-more with medium confidence and an unknown valuation stance rather than an aggressive buy call. The frequently repeated "~$2B" valuation narrative is explicitly unverified in the fetched primary record, so current valuation fields remain null by design. [C001][C016][C021][C027][C028][C029][C030][C032][C034][C038][C040]
