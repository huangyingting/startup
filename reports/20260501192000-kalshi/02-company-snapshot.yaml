  summary: Kalshi is a private event-contracts exchange that lets users trade yes/no views on real-world outcomes, backed by a rare CFTC designation and expanding into data distribution—but its current valuation, financial profile, and even some identity details remain partially unresolved in public sources. [C001][C003][C021][C024][C025][C040]
startupIntroduction:
  summary: Kalshi is a private prediction-market and event-contracts platform that enables users to buy and sell yes/no contracts on real-world outcomes across politics, macro data, culture, technology, weather, crypto, and sports-adjacent categories. The strongest fetched regulatory anchor is the CFTC's 2020 order granting KalshiEX LLC designated contract market status, while the strongest current company-database anchor is Y Combinator's profile describing Kalshi as a New York-based company founded in 2019 by Tarek Mansour and Luana Lopes Lara. Public evidence shows Kalshi monetizes through transaction and maker fees, supports retail, demo, institutional, API, and FIX workflows, and is pushing its forecast data into media partnerships with AP, FOX, and Rotten Tomatoes. However, later-stage financing and the often-cited "around $2B" valuation were not verified in the fetched primary record, and founding-year / headquarters evidence remains somewhat inconsistent. [C001][C003][C006][C010][C015][C016][C021][C023][C024][C025][C030][C032][C034][C040]
