sections:
- number: '1.1'
  title: Verified company identity and opening framing
  body: 'Kalshi is best understood as a regulated event-contracts exchange rather than a conventional sportsbook or brokerage wrapper. The most durable primary anchor is the CFTC''s 2020 designation of KalshiEX LLC as a designated contract market; company materials then describe Kalshi as the venue where users trade yes/no contracts on the outcomes of real-world events. The current public identity record is not perfectly clean, however: Business Wire says the company was founded in 2018, Y Combinator says 2019, and location evidence shifted from San Francisco in 2020 regulatory materials to New York in current company-database and 2026 news references. [C001][C003][C022][C023][C024][C025]'
  claimRefs:
  - C001
  - C003
  - C022
  - C023
  - C024
  - C025
- number: '1.2'
  title: What the platform does and how it monetizes
  body: 'Kalshi''s core instrument is the binary event contract: traders buy yes/no positions whose prices move with implied probabilities, with contract documentation specifying timelines, rules, verification sources, and resolution mechanics. The company says it monetizes primarily through transaction fees, with maker fees on some markets, while also maintaining market-maker, volume, and liquidity incentive programs to deepen trading activity. That basic marketplace is now wrapped in demo trading, institutional/entity accounts, Advanced API access, and qualifying FIX connectivity. [C004][C006][C007][C008][C009][C010][C015][C016][C018][C019]'
  claimRefs:
  - C004
  - C006
  - C007
  - C008
  - C009
  - C010
  - C015
  - C016
  - C018
  - C019
- number: '1.3'
  title: Regulatory posture is both moat and risk
  body: Kalshi's regulatory status is the company's biggest structural differentiator and also a major source of uncertainty. CFTC registration created a meaningful trust moat, but the agency later disapproved Kalshi's congressional-control contracts and in 2024 proposed broader rules that would classify political-contest event contracts as gaming. Independent commentary in 2024 reported that Kalshi won an important district-court ruling before the CFTC obtained a stay pending appeal. For investors, that means regulatory advantage and regulatory fragility coexist in the same thesis. [C001][C002][C027][C028][C029]
  claimRefs:
  - C001
  - C002
  - C027
  - C028
  - C029
- number: '1.4'
  title: Distribution, scale signals, and open identity questions
  body: 'The newest part of the Kalshi story is not just trading volume but distribution of forecast data. AP agreed to provide election results data to Kalshi, FOX integrated Kalshi data across multiple media properties, and Rotten Tomatoes embedded Kalshi predictions into awards coverage. Those partnerships support management''s argument that many users come for the odds even when they do not trade. Still, the public record remains thin where investors most need hard numbers: the last fetched primary financing disclosure is the 2021 Series A, the claimed ~ $2B valuation was not verified, and active-trader, revenue, and retention metrics remain undisclosed. [C030][C031][C032][C033][C034][C035][C038][C040]'
  claimRefs:
  - C030
  - C031
  - C032
  - C033
  - C034
  - C035
  - C038
  - C040
