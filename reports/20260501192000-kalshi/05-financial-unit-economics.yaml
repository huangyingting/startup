sections:
  - number: '4.1'
    title: Revenue model overview
    body: |
      Kalshi's monetization model is conceptually simple and claim-backed: the exchange earns transaction fees on expected earnings and, in some markets, maker fees. That makes Kalshi economically closer to an exchange or venue operator than to a principal bookmaker, especially because the company states that members trade against one another rather than against the exchange itself. The challenge for investors is not understanding the mechanism; it is sizing the mechanism. No retained claim discloses revenue, net take rate, fee revenue by segment, or contribution by market category. [C006][C040]
    claimRefs:
      - C006
      - C040
  - number: '4.2'
    title: Unit economics and margin trajectory
    body: |
      Public-data unit economics are materially incomplete. What is visible is directionally important: Kalshi appears to spend against liquidity through market-maker concessions and explicit volume and liquidity incentive programs, while also carrying the overhead of operating a regulated exchange in an environment where political-contract legality is actively contested. That combination suggests gross fee capture is only the top of the waterfall, not the endpoint. Without disclosed data on direct trading costs, compliance costs, incentive payouts, customer support, or legal spend, gross margin and contribution margin should remain null rather than guessed. [C001][C018][C019][C027][C028][C029][C040]
    claimRefs:
      - C001
      - C018
      - C019
      - C027
      - C028
      - C029
      - C040
  - number: '4.3'
    title: CAC, LTV, payback, and defensible projection scenarios
    body: |
      CAC, LTV, LTV / CAC, and payback are all null in the current diligence package because the retained evidence lacks acquisition spend, funded-trader conversion, repeat-trading frequency, gross profit per trader, and cohort retention curves. The same logic blocks scenario modeling: there is no claim-backed baseline revenue figure from which to build low, base, or high cases. The highest-value diligence asks are monthly active funded traders, monthly gross and net revenue, segment-level fee revenue, blended take rate, cohort retention by funded month, incentive payout burden, and partner-to-trader conversion from media distribution surfaces. [C030][C032][C034][C038][C040]
    claimRefs:
      - C030
      - C032
      - C034
      - C038
      - C040
