schemaVersion: startup-diligence-report-v2
artifact: financial-unit-economics
slug: kalshi
runDate: '2026-05-01'
company:
  name: Kalshi
chapter:
  number: 4
  title: Financial & Unit Economics
  summary: |
    Kalshi has a clearly evidenced exchange-style revenue model built on transaction fees and some maker fees, but the public record retained for this report does not disclose revenue, take rate, gross margin, CAC, LTV, payback, churn-adjusted lifetime value, or valuation. The clean underwriting takeaway is that Kalshi's monetization logic is visible while its actual unit economics remain weakly disclosed. [C006][C018][C019][C030][C032][C034][C035][C040]
callouts:
  - type: key-insight
    title: Revenue model is clear even though revenue magnitude is not
    body: |
      Kalshi says it monetizes through transaction fees on expected earnings, with maker fees on some markets, which provides a claim-backed revenue engine even though no retained claim discloses total revenue or blended take rate. [C006][C040]
    claimRefs:
      - C006
      - C040
  - type: key-insight
    title: Liquidity acquisition likely depresses near-term net take rate
    body: |
      Market-maker fee reductions plus explicit volume and liquidity incentive programs indicate that Kalshi is paying to deepen order-book quality, which likely compresses realized net monetization versus headline fee schedules. The magnitude is not disclosed. [C018][C019]
    claimRefs:
      - C018
      - C019
  - type: opportunity
    title: Media distribution could become a lower-CAC top-of-funnel
    body: |
      AP, FOX, and Rotten Tomatoes integrations suggest Kalshi may acquire attention through forecast distribution rather than only through direct paid acquisition, but no retained claim proves conversion from viewers into funded traders. [C030][C032][C034][C038]
    claimRefs:
      - C030
      - C032
      - C034
      - C038
  - type: risk-alert
    title: Core financial diligence is still blocked by disclosure gaps
    body: |
      The retained record does not disclose revenue, active funded traders, contribution margin, CAC, LTV, cohort retention, or current valuation, so a full unit-economics model is not yet defensible. [C033][C035][C040]
    claimRefs:
      - C033
      - C035
      - C040
