  - number: 6
    title: Product & Technology
    sections:
      - number: '6.1'
        title: Platform overview
        blocks:
          - type: callout
            title: Product clarity is a real asset
            body: |
              Kalshi reduces the core trading experience to binary yes / no contracts with explicit rules, verification sources, and payout timing, which is unusually legible relative to many derivatives products. [C004][C007][C008][C009][C013]
