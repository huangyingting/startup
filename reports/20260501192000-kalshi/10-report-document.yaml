          - type: paragraph
            title: Trading mechanics, market structure, and trust design
            body: |
              Kalshi's strongest product attribute is explicitness. Contract prices map to implied probabilities, each market exposes rules and verification sources, and payout timing is visible to traders. That matters because event contracts can otherwise feel opaque or gambling-like; Kalshi's product design instead emphasizes legibility and resolution discipline. The trust layer is strengthened by CFTC-regulated status and responsible-trading controls, but it is also bounded by ongoing disputes over which political or gaming-adjacent contracts are permissible. [C001][C004][C007][C008][C009][C020][C027][C028][C029]
            calloutType: null
