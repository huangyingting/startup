              - C040
          - type: paragraph
            title: Revenue model overview
            body: |
              Kalshi's monetization model is conceptually simple and claim-backed: the exchange earns transaction fees on expected earnings and, in some markets, maker fees. That makes Kalshi economically closer to an exchange or venue operator than to a principal bookmaker, especially because the company states that members trade against one another rather than against the exchange itself. The challenge for investors is not understanding the mechanism; it is sizing the mechanism. No retained claim discloses revenue, net take rate, fee revenue by segment, or contribution by market category. [C006][C040]
