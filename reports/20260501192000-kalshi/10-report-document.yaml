  - number: 8
    title: Risk & Regulatory
    sections:
      - number: '8.1'
        title: Risk overview and register
        blocks:
          - type: callout
            title: CFTC status is the company's strongest risk mitigant
            body: |
              Kalshi's most important structural defense is that it is not merely a generic prediction app; the CFTC granted KalshiEX LLC designated contract market status, and Kalshi continues to frame itself as a CFTC-regulated venue. That materially improves trust, partnerability, and institutional legibility versus an unregulated alternative. [C001][C002][C003]
            calloutType: key-insight
            tableRef: null
            figureRef: null
            items: []
            equation: null
            claimRefs:
              - C001
              - C002
              - C003
          - type: callout
            title: Political-event and gaming-rule overhang remains the primary investment risk
            body: |
              The CFTC's 2023 disapproval of congressional-control contracts and its 2024 proposed gaming-style event-contract restrictions show that Kalshi's product frontier is still politically and legally contested. Even favorable interim litigation reporting does not eliminate appeal risk or future rulemaking risk. [C027][C028][C029]
            calloutType: risk-alert
            tableRef: null
            figureRef: null
            items: []
            equation: null
            claimRefs:
              - C027
              - C028
              - C029
          - type: paragraph
            title: Risk overview
            body: |
              Kalshi's risk profile is unusually polarized. On the positive side, the company has one of the clearest structural differentiators in the category: a CFTC-granted designated contract market, a rules-based exchange model, and visible responsible-trading controls. On the negative side, the same regulatory domain also contains the largest unresolved questions because political-event contracts have already been challenged, broader gaming-style rulemaking was proposed, and current public valuation and operating disclosure remain thin. This produces a company that is strategically interesting but still hard to underwrite aggressively. [C001][C002][C020][C027][C028][C029][C040]
            calloutType: null
            tableRef: null
            figureRef: null
            items: []
            equation: null
            claimRefs:
              - C001
              - C002
              - C020
              - C027
              - C028
              - C029
              - C040
          - type: paragraph
            title: Regulatory and legal risk
            body: >
              Regulatory and legal risk is the defining issue for this chapter. The base positive fact is strong: the CFTC granted KalshiEX LLC DCM status in 2020, and Kalshi continues to market itself as a CFTC-regulated event-contract venue. But underwriting cannot stop there. The CFTC's September 2023 order disapproving congressional-control contracts shows the agency is willing to treat at least some political contracts as gaming, unlawful state-law activity, and contrary to the public interest. The 2024 proposed rulemaking widens that concern by signaling a broader policy thesis against political-contest contracts on CFTC-registered venues, while 2024 litigation reporting suggests progress for Kalshi without delivering final legal closure. For investors, the implication is direct: legal clarity determines how much of Kalshi's highest-attention product surface is durable, and that in turn drives long-run revenue, customer conversion, and financing support.
              [C001][C002][C027][C028][C029]
