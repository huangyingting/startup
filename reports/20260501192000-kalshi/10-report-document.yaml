  - id: T802
    title: Bull, base, and bear case framework
    columns:
      - Case
      - Evidence-backed setup
      - Key assumptions required
      - Main failure mode
      - Current probability stance
    rows:
      - - Bull
        - Kalshi's regulated position, institutional/API surfaces, and forecast-data distribution convert into durable category leadership with higher monetization than the public record currently proves. [C001][C016][C030][C032][C034][C038][C039]
        - Legal clarity improves, forecast audiences convert, and liquidity quality becomes self-reinforcing rather than subsidy-dependent.
        - Product-scope restrictions persist or monetization fails to match attention.
        - Plausible but unverified.
      - - Base
        - Kalshi remains a differentiated regulated platform with real strategic value, but legal uncertainty and disclosure gaps keep financing and valuation support constrained. [C001][C027][C028][C029][C040]
        - Category breadth remains adequate, but current economics and valuation stay difficult to prove publicly.
        - Growth continues without enough evidence to clear the valuation hurdle.
        - Most consistent with current evidence.
      - - Bear
        - Legal overhang narrows high-attention markets while liquidity support and operating burden keep net economics weaker than surface narratives imply. [C018][C019][C027][C028][C029][C040]
        - Internal KPIs fail to validate the strategic story at the current or rumored price level.
        - Valuation compresses before product relevance disappears.
        - Cannot be ruled out.
    notes: |
      This case framework is qualitative by design. The retained record does not support a defensible forecast model with current valuation outputs.
