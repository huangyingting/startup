  - id: T801
    title: Investment thesis summary
    columns:
      - Thesis pillar
      - Evidence
      - Counterweight
      - Investor readout
    rows:
      - - Regulatory moat
        - Kalshi has a rare CFTC DCM designation and positions itself as a regulated event-contract exchange. [C001][C002][C003]
        - The same regulatory domain has already constrained political-event products and may constrain future category breadth. [C027][C028][C029]
        - Strong strategic asset, but not a fully stable growth platform yet.
      - - Multi-surface product breadth
        - Demo, entity accounts, API/FIX access, and media-distribution partnerships show infrastructure ambition beyond a single retail surface. [C010][C011][C015][C016][C030][C032][C034][C038][C039]
        - Revenue contribution, conversion, and retention by surface are not disclosed. [C033][C040]
        - Positive signal for optionality, not yet proof of scale economics.
      - - Demand and attention
        - Kalshi reports large election-period traffic, millions of monthly visitors, and meaningful event-specific trading volume around Oscars coverage. [C031][C033][C035]
        - These are company-claimed and do not equate to verified revenue or durable funded-user cohorts. [C031][C033][C035][C040]
        - Encouraging but insufficient for valuation underwriting.
      - - Distribution upside
        - AP, FOX, and Rotten Tomatoes integrations suggest forecast-data distribution could extend the brand and lower acquisition friction. [C030][C032][C034][C038]
        - No retained claim proves direct monetization or viewer-to-trader conversion. [C033][C038][C040]
        - Real upside option, but still an option.
      - - Underwriting fit
        - Kalshi is strategically interesting and category-defining enough to merit continued diligence. [C001][C003][C039]
        - Current valuation, revenue, margin, and retention remain underdisclosed. [C021][C040]
        - Research-more is appropriate until private diligence fills the gaps.
    notes: |
      The thesis is attractive on strategy and unresolved on economics. This table intentionally separates company quality from underwriteable pricing.
