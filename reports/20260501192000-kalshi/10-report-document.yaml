              - C028
              - C029
          - type: paragraph
            title: APIs, FIX, and external integrations
            body: |
              The technical surface is meaningful. Kalshi documents APIs for market data and order execution, exposes exchange-status telemetry, and operates tiered access controls from basic usage toward advanced access, with FIX connectivity available for qualifying members. That is consistent with a platform strategy that wants to serve not only consumers but also businesses, funds, and developers. On the outbound side, AP, FOX, and Rotten Tomatoes demonstrate that Kalshi's probabilities can be embedded in third-party experiences, extending the platform beyond owned traffic. [C011][C014][C015][C016][C030][C032][C034][C038]
