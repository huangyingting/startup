          - type: paragraph
            title: Unit economics and margin trajectory
            body: |
              Public-data unit economics are materially incomplete. What is visible is directionally important: Kalshi appears to spend against liquidity through market-maker concessions and explicit volume and liquidity incentive programs, while also carrying the overhead of operating a regulated exchange in an environment where political-contract legality is actively contested. That combination suggests gross fee capture is only the top of the waterfall, not the endpoint. Without disclosed data on direct trading costs, compliance costs, incentive payouts, customer support, or legal spend, gross margin and contribution margin should remain null rather than guessed. [C001][C018][C019][C027][C028][C029][C040]
            calloutType: null
