    title: Regulatory, legal, compliance, and security deep dive
    columns:
      - Domain
      - What is evidenced
      - Primary open question
      - Investor implication
    rows:
      - - CFTC status
        - Kalshi operates from a strong regulatory anchor because the CFTC granted KalshiEX LLC designated contract market status and Kalshi continues to position itself as a regulated venue. [C001][C002]
        - How durable is this advantage across new contract categories and future rule interpretations?
        - Real moat, but one whose commercial value depends on allowed listing scope.
      - - Political-event contracts
        - Congressional-control contracts were disapproved by the CFTC in 2023. [C027]
        - Does future litigation reopen a scalable election-contract category or only preserve a narrower path?
        - Election exposure can be a growth driver or a headline-risk amplifier.
      - - Gaming-rule overhang
        - In 2024 the CFTC proposed defining political-contest contracts as gaming and contrary to the public interest on CFTC venues. [C028]
        - Could future rulemaking reach beyond politics into other event categories or raise approval friction more broadly?
        - Product scope should be underwritten conservatively until rule risk clears.
      - - Court-process uncertainty
        - Independent reporting said Kalshi won an important district-court ruling before the CFTC obtained a stay pending appeal. [C029]
        - What is the current procedural posture and expected timing to durable clarity?
        - Interim wins improve optionality but do not justify treating the issue as settled.
      - - Privacy, security, and operational controls
        - The claim-backed record shows responsible-trading controls and regulated operation, but not detailed public proof on data governance, incident history, or operational-security KPIs. [C001][C020][C040]
        - Are internal surveillance, data-protection, and security-control maturity consistent with an exchange handling regulated activity at scale?
        - This is a material confirmatory diligence item before underwriting institutional scale.
      - - Credit-like and counterparty exposure
        - The retained evidence supports an exchange model, not a consumer-credit model; the main risk is operational and compliance execution around members, institutions, and platform activity rather than loan underwriting. [C003][C016][C040]
        - What counterparty, fraud, dispute, or funds-flow risks emerge at higher scale?
        - Investors should focus on operational controls, not traditional credit-loss assumptions.
