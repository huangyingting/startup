              The claim-backed ledger does not disclose internal infrastructure topology, clearing workflows, data-retention controls, model usage, or a dated roadmap, so those areas should be treated as diligence gaps rather than inferred strengths. [C001][C020][C040]
            calloutType: risk-alert
