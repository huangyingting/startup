      - number: '4.2'
        title: Feature overlap and moat quality
        blocks:
          - type: callout
            title: Moat strength is partially reversible through regulation
            body: |
              The same regulatory framework that creates Kalshi's moat also creates competitive fragility if political or gaming-adjacent contracts are narrowed by regulators or courts. [C027][C028][C029]
            calloutType: risk-alert
            tableRef: null
            figureRef: null
