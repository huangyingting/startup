            title: Privacy, security, and compliance maturity are only partially evidenced
            body: |
              The retained claim-backed record confirms responsible-trading controls and regulated operation, but it does not provide claim-backed detail on storage architecture, incident history, surveillance effectiveness, or security performance. Investors should treat this as a diligence gap, not as proof of weakness or proof of strength. [C001][C020][C040]
