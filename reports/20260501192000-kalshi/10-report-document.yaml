            title: Underwriting sensitivity is amplified by missing financial and valuation disclosure
            body: |
              The public record still does not verify Kalshi's current private valuation and does not disclose the revenue, retention, and margin package needed to absorb regulatory volatility with confidence. That turns legal and operational uncertainty into financing-risk uncertainty as well. [C021][C031][C033][C035][C040]
