  - number: 5
    title: Financial & Unit Economics
    sections:
      - number: '5.1'
        title: Revenue model and observable signals
        blocks:
          - type: callout
            title: Revenue model is clear even though revenue magnitude is not
            body: |
              Kalshi says it monetizes through transaction fees on expected earnings, with maker fees on some markets, which provides a claim-backed revenue engine even though no retained claim discloses total revenue or blended take rate. [C006][C040]
            calloutType: key-insight
            tableRef: null
            figureRef: null
