  - number: 9
    title: Investment & Valuation
    sections:
      - number: '9.1'
        title: Investment thesis and case frame
        blocks:
          - type: callout
            title: Recommendation is research-more, not buy
            body: |
              Kalshi has enough strategic substance to stay on the active diligence list, but not enough verified financial or valuation evidence to justify a buy recommendation today. Investors should reopen the case only once current financing terms, monetization quality, and legal durability are validated. [C021][C027][C028][C029][C040]
