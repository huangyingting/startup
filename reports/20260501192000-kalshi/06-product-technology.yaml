  - id: T502
    title: Trading mechanics, market structure, and compliance posture
    columns:
      - Layer
      - What is evidenced
      - Strategic implication
      - Diligence gap
    rows:
      - - Contract design
        - "Contracts are binary yes / no instruments priced like implied probabilities and paying $1 on correct resolution. [C004][C007]"
        - Simple payoff structure can aid retail comprehension and media embedding.
        - Need internal data on how simplicity affects conversion and repeat trading.
      - - Market structure
        - "Events contain one or more markets, and markets carry structured data for price, volume, open interest, rules, and settlement. [C012][C013]"
        - Supports both UI presentation and API-standardized downstream use.
        - Need deeper diligence on listing process, surveillance, and market-ops tooling.
      - - Exchange operations
        - "Exchange-wide status is exposed through API states including whether trading is active and when maintenance may resume. [C014]"
        - Signals operational transparency and machine-readable reliability.
        - Need uptime history, incident log, and SLO reporting.
      - - Compliance boundary
        - "Kalshi's CFTC-regulated posture is a product enabler, but political-event contracts remain contested through disapproval and rulemaking. [C001][C027][C028][C029]"
        - Listing scope is partly a regulatory product decision.
        - Need current product-approval workflow and regulator interaction cadence.
      - - Clearing and data-storage implications
        - "The retained claim set confirms regulated operation and responsible-trading controls, but does not provide claim-backed detail on clearing workflow or storage architecture. [C001][C020]"
        - Investors should assume these are material operational dependencies.
        - Request clearing design, fund segregation, encryption, retention, access-control, and disaster-recovery materials.
    notes: |
      Clearinghouse specifics and storage architecture are intentionally not inferred because those details were not codified as claim-backed evidence in the retained ledger.
