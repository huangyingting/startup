sections:
  - number: '5.1'
    title: Product platform overview
    body: |
      Kalshi's product is best understood as an event-contract exchange with multiple access layers rather than a single consumer app. At the center are binary yes / no markets organized under events, each carrying structured pricing, volume, open-interest, rule, and settlement metadata. Around that core, Kalshi has built demo, retail, institutional, and developer surfaces that support both human and programmatic participation. [C003][C004][C010][C011][C012][C013][C015][C016][C039]
    claimRefs:
      - C003
      - C004
      - C010
      - C011
      - C012
      - C013
      - C015
      - C016
      - C039
  - number: '5.2'
    title: Trading mechanics, market structure, and trust design
    body: |
      Kalshi's strongest product attribute is explicitness. Contract prices map to implied probabilities, each market exposes rules and verification sources, and payout timing is visible to traders. That matters because event contracts can otherwise feel opaque or gambling-like; Kalshi's product design instead emphasizes legibility and resolution discipline. The trust layer is strengthened by CFTC-regulated status and responsible-trading controls, but it is also bounded by ongoing disputes over which political or gaming-adjacent contracts are permissible. [C001][C004][C007][C008][C009][C020][C027][C028][C029]
    claimRefs:
      - C001
      - C004
      - C007
      - C008
      - C009
      - C020
      - C027
      - C028
      - C029
  - number: '5.3'
    title: APIs, FIX, and external integrations
    body: |
      The technical surface is meaningful. Kalshi documents APIs for market data and order execution, exposes exchange-status telemetry, and operates tiered access controls from basic usage toward advanced access, with FIX connectivity available for qualifying members. That is consistent with a platform strategy that wants to serve not only consumers but also businesses, funds, and developers. On the outbound side, AP, FOX, and Rotten Tomatoes demonstrate that Kalshi's probabilities can be embedded in third-party experiences, extending the platform beyond owned traffic. [C011][C014][C015][C016][C030][C032][C034][C038]
    claimRefs:
      - C011
      - C014
      - C015
      - C016
      - C030
      - C032
      - C034
      - C038
  - number: '5.4'
    title: Architecture, automation, and roadmap diligence gaps
    body: |
      Several high-value technical questions remain unresolved in the claim-backed record. There is no retained claim disclosing internal service topology, storage design, data-governance controls, surveillance automation, AI usage, or a committed roadmap. There is also no claim-backed detail on clearing workflows beyond the existence of a regulated exchange posture. These gaps do not mean the systems are weak; they mean investors should request architecture diagrams, security controls, incident history, model inventory, and roadmap materials before underwriting technology durability. [C001][C011][C014][C020][C040]
    claimRefs:
      - C001
      - C011
      - C014
      - C020
      - C040
