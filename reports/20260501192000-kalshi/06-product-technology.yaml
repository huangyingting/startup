chapter:
  number: 5
  title: Product & Technology
  summary: |
    Kalshi's product stack is unusually broad for a prediction-market company: a regulated event-contract exchange, binary market objects with explicit rules and settlement sources, retail and demo surfaces, developer APIs, tiered rate limits, qualifying FIX access, and forecast-data distribution into third-party media. What the retained ledger does not disclose is any claim-backed AI layer, internal architecture detail, or roadmap timing. [C001][C003][C004][C008][C009][C010][C011][C012][C013][C014][C015][C016][C030][C032][C034][C039]
callouts:
  - type: key-insight
    title: Product clarity is a real asset
    body: |
      Kalshi reduces the core trading experience to binary yes / no contracts with explicit rules, verification sources, and payout timing, which is unusually legible relative to many derivatives products. [C004][C007][C008][C009][C013]
    claimRefs:
      - C004
      - C007
      - C008
      - C009
      - C013
  - type: key-insight
    title: Kalshi is building infrastructure, not just an app
    body: |
      Demo trading, APIs, tiered access, entity accounts, and qualifying FIX connectivity indicate a multi-surface platform architecture that can serve retail, professional, and developer workflows. [C010][C011][C015][C016][C039]
    claimRefs:
      - C010
      - C011
      - C015
      - C016
      - C039
  - type: opportunity
    title: Distribution integrations expand the product surface beyond owned channels
    body: |
      AP, FOX, and Rotten Tomatoes integrations show Kalshi's market probabilities functioning as embedded data products as well as tradable instruments. [C030][C032][C034][C038]
    claimRefs:
      - C030
      - C032
      - C034
      - C038
  - type: risk-alert
    title: Technology diligence is partially blocked by missing architecture disclosures
    body: |
      The claim-backed ledger does not disclose internal infrastructure topology, clearing workflows, data-retention controls, model usage, or a dated roadmap, so those areas should be treated as diligence gaps rather than inferred strengths. [C001][C020][C040]
