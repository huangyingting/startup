topStrengths:
- CFTC 指定合约市场资格是一项稀缺且有证据支持的护城河。
- 产品触达面已超越零售，扩展至实体账户、API、FIX 和媒体数据分发。
- 二元合约设计与明确规则，使该产品在复杂类别中具备异常高的可理解性。
topRisks:
- 政治事件与博彩规则争议，仍限制着对未来产品范围的法律信心。
- 在保留证据中，当前估值、收入、利润率和留存仍披露不足。
- 流动性质量可能仍依赖激励与做市商支持。
unresolvedGaps:
- 当前私有估值和股权结构条款仍未核实；常被提及的 ~$2B 数字未被采用。
- 月度收入、抽成率、入金交易者数量和分群留存，均未在保留证据中披露。
- 公开材料未能建立诸如事故历史、监控有效性或可用性等控制成熟度细节。
