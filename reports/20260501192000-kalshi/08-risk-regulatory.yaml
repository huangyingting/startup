  - id: T703
    title: Mitigation priorities and stop-loss / kill criteria
    columns:
      - Trigger area
      - Evidence-backed rationale
      - Diligence requirement
      - Kill criterion or stop-loss trigger
    rows:
      - - Legal scope and election contracts
        - Political-event and gaming-rule disputes are central to product-scope risk. [C027][C028][C029]
        - Obtain outside-counsel memo, current case-status summary, regulator correspondence cadence, and product-approval workflow.
        - Stop if legal review indicates material probability that key political or adjacent markets will be durably barred or economically constrained.
      - - Current valuation and financing support
        - Current private valuation is unresolved in fetched evidence, and the often-repeated ~$2B narrative is unverified. [C021][C040]
        - Obtain current cap table, last-round documents, valuation terms, and internal board materials.
        - Stop if current pricing materially exceeds what disclosed revenue quality and legal clarity can support.
      - - Revenue quality and retention
        - Public traction anchors exist, but they are company-claimed and do not disclose revenue, retention, or funded-trader durability. [C031][C033][C035][C040]
        - Obtain monthly revenue by stream, active funded traders, cohort retention, take rate, and incentive burden.
        - Stop if retained cohorts, net monetization, or funded-trader quality fail to justify regulatory and liquidity risk.
      - - Security and compliance operations
        - Public materials confirm controls at a high level but not operational proof depth. [C020][C040]
        - Obtain incident log, audit summaries, security roadmap, surveillance workflow, and compliance staffing metrics.
        - Stop if material unresolved control weaknesses, repeat incidents, or inadequate monitoring coverage are identified.
      - - Liquidity dependence
        - Market-maker and incentive programs suggest liquidity remains an active management problem. [C018][C019]
        - Obtain market-depth KPIs, concentration of liquidity providers, spread history, and incentive ROI analysis.
        - Stop if organic liquidity remains structurally weak without subsidy or if market quality is highly concentrated.
    notes: |
      Kill criteria are investor decision rules derived from retained evidence and known data-room asks, not predictions that these failures have already occurred.
