company:
  name: Kalshi
chapter:
  number: 7
  title: Risk & Regulatory
  summary: |
    Kalshi's core diligence profile is defined by a rare combination of regulatory moat and regulatory fragility. The retained evidence clearly supports CFTC-designated status, a structured rules-based exchange model, and visible responsible-trading controls, but it also shows that political-event contracts were disapproved in 2023, that the CFTC proposed broader gaming-style restrictions in 2024, and that the legal position of election-style contracts remained contested through appeal-stage reporting. Because the public record also lacks claim-backed disclosure on detailed data governance, security incidents, retention, and current valuation, the right overall risk rating is significant rather than moderate. The central underwriting question is not whether Kalshi has a real product; it is whether legal scope, control maturity, and disclosure quality are strong enough to support durable monetization and future financing on acceptable terms. [C001][C002][C020][C027][C028][C029][C040]
