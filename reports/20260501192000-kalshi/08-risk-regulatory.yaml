sections:
  - number: '7.1'
    title: Risk overview
    body: |
      Kalshi's risk profile is unusually polarized. On the positive side, the company has one of the clearest structural differentiators in the category: a CFTC-granted designated contract market, a rules-based exchange model, and visible responsible-trading controls. On the negative side, the same regulatory domain also contains the largest unresolved questions because political-event contracts have already been challenged, broader gaming-style rulemaking was proposed, and current public valuation and operating disclosure remain thin. This produces a company that is strategically interesting but still hard to underwrite aggressively. [C001][C002][C020][C027][C028][C029][C040]
    claimRefs:
      - C001
      - C002
      - C020
      - C027
      - C028
      - C029
      - C040
  - number: '7.2'
    title: Regulatory and legal risk
    body: |
      Regulatory and legal risk is the defining issue for this chapter. The base positive fact is strong: the CFTC granted KalshiEX LLC DCM status in 2020, and Kalshi continues to market itself as a CFTC-regulated event-contract venue. But underwriting cannot stop there. The CFTC's September 2023 order disapproving congressional-control contracts shows the agency is willing to treat at least some political contracts as gaming, unlawful state-law activity, and contrary to the public interest. The 2024 proposed rulemaking widens that concern by signaling a broader policy thesis against political-contest contracts on CFTC-registered venues, while 2024 litigation reporting suggests progress for Kalshi without delivering final legal closure. For investors, the implication is direct: legal clarity determines how much of Kalshi's highest-attention product surface is durable, and that in turn drives long-run revenue, customer conversion, and financing support. [C001][C002][C027][C028][C029]
    claimRefs:
      - C001
      - C002
      - C027
      - C028
      - C029
  - number: '7.3'
    title: Credit, operational, privacy, and security risk
    body: |
      Classical consumer-credit risk is not the relevant frame for Kalshi based on the retained evidence; the more important diligence question is whether a regulated exchange with retail, institutional, API, and media surfaces has sufficiently mature operational, surveillance, privacy, and security controls. The claim-backed record does confirm responsible-trading tools, entity-account workflows, APIs, and exchange-status telemetry, which is directionally positive. However, it does not publicly establish detailed data-governance architecture, security-incident history, uptime performance, or surveillance effectiveness. That means investors should underwrite this domain as partially unresolved rather than casually assume exchange-grade maturity from regulatory status alone. [C011][C014][C015][C016][C020][C040]
    claimRefs:
      - C011
      - C014
      - C015
      - C016
      - C020
      - C040
  - number: '7.4'
    title: Competitive and strategic risk
    body: |
      Competitive risk is less about a single named rival than about whether Kalshi can convert regulatory legitimacy and distribution breadth into durable market position before substitutes absorb the same user attention. The evidence shows that Kalshi has expanded beyond the retail app into demo, institutional, API/FIX, and media-distribution surfaces. That is a real strategic advantage. But the moat is not absolute. If regulation narrows high-interest contract categories, the value of that multi-surface platform falls; if forecast audiences do not convert into monetizing traders or institutional users, distribution breadth may create attention without enough revenue durability. Competitive risk therefore interacts with regulatory risk rather than sitting separately from it. [C016][C018][C019][C027][C028][C029][C030][C032][C034][C038][C039]
    claimRefs:
      - C016
      - C018
      - C019
      - C027
      - C028
      - C029
      - C030
      - C032
      - C034
      - C038
      - C039
  - number: '7.5'
    title: Mitigation summary
    body: |
      The mitigation path is straightforward even if the outcome is not. Investors should demand current legal memos, regulator-interaction materials, current-round pricing data, monthly revenue and funded-trader cohorts, and operating-control evidence covering surveillance, security, and incident handling. If those materials validate durable legal scope, healthy monetization, and credible control maturity, Kalshi's regulatory moat could justify a much stronger investment stance. If they do not, the downside is likely to appear through valuation compression and limited financing flexibility before it appears through total business failure. [C001][C020][C021][C027][C028][C029][C040]
    claimRefs:
      - C001
      - C020
      - C021
      - C027
      - C028
      - C029
      - C040
