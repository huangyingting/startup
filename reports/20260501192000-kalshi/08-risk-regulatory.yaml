callouts:
  - type: key-insight
    title: CFTC status is the company's strongest risk mitigant
    body: |
      Kalshi's most important structural defense is that it is not merely a generic prediction app; the CFTC granted KalshiEX LLC designated contract market status, and Kalshi continues to frame itself as a CFTC-regulated venue. That materially improves trust, partnerability, and institutional legibility versus an unregulated alternative. [C001][C002][C003]
    claimRefs:
      - C001
      - C002
      - C003
  - type: risk-alert
    title: Political-event and gaming-rule overhang remains the primary investment risk
    body: |
      The CFTC's 2023 disapproval of congressional-control contracts and its 2024 proposed gaming-style event-contract restrictions show that Kalshi's product frontier is still politically and legally contested. Even favorable interim litigation reporting does not eliminate appeal risk or future rulemaking risk. [C027][C028][C029]
    claimRefs:
      - C027
      - C028
      - C029
  - type: risk-alert
    title: Privacy, security, and compliance maturity are only partially evidenced
    body: |
      The retained claim-backed record confirms responsible-trading controls and regulated operation, but it does not provide claim-backed detail on storage architecture, incident history, surveillance effectiveness, or security performance. Investors should treat this as a diligence gap, not as proof of weakness or proof of strength. [C001][C020][C040]
    claimRefs:
      - C001
      - C020
      - C040
  - type: risk-alert
    title: Underwriting sensitivity is amplified by missing financial and valuation disclosure
    body: |
      The public record still does not verify Kalshi's current private valuation and does not disclose the revenue, retention, and margin package needed to absorb regulatory volatility with confidence. That turns legal and operational uncertainty into financing-risk uncertainty as well. [C021][C031][C033][C035][C040]
    claimRefs:
      - C021
      - C031
      - C033
      - C035
      - C040
