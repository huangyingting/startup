companyProfile:
  summary: >-
    Saronic is an Austin-based defense technology company founded in September 2022
    that designs, builds, and deploys autonomous surface vessels (ASVs) for military
    and national-security missions. The company operates a portfolio spanning six vessel
    classes—from the 6-foot Spyglass reconnaissance craft to the 150-foot Marauder
    large USV—all powered by a shared AI autonomy stack enabling GPS-denied navigation,
    multi-vessel coordination, and modular payload integration. Saronic has raised over
    $2.5 billion in venture capital across four rounds, reaching a $9.25 billion valuation
    at its January 2026 Series D. Its primary customer is the US Navy, with a $392 million
    Corsair production contract awarded December 2025. The company is vertically integrated,
    operating 500,000+ square feet of manufacturing in Austin and building a dedicated
    shipyard in Franklin, Louisiana.
