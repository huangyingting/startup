company:
  name: Saronic

chapter:
  number: 5
  title: "Product & Technology"
  summary: "Saronic Technologies delivers a family of six autonomous surface vessels — from the 6-foot Spyglass to the 150-foot Marauder — powered by a unified autonomy stack featuring AI-driven navigation, multi-vessel coordination, and swarm operations. The company employs a vertically integrated, software-first design philosophy across Austin production campuses and a Franklin, Louisiana shipyard, with manufacturing capacity targeting thousands of small USVs and dozens of large vessels per year. A $392 million Navy OTA contract for the 24-foot Corsair validated the platform's production readiness in under 12 months, while a strategic NVIDIA partnership accelerates edge AI capabilities across the fleet."

sections:
  - id: product-portfolio
    title: "Product Portfolio and Vessel Family"
    body: |
      Saronic produces six classes of autonomous surface vessels (ASVs) spanning the full operational spectrum from tactical ISR to heavy logistics. The 6-foot Spyglass is a compact swarming platform designed for at-sea launch and recovery, day-night operations, and rapid sensor payload integration. The 14-foot Cutlass provides extended-range ISR and patrol with moderate payload capacity and open systems architecture. The 24-foot Corsair is the company's production flagship, offering 1,000-pound payload capacity, over 1,000 nautical miles of range, and top speeds exceeding 35 knots, suitable for intelligence, surveillance, reconnaissance, electronic warfare, and kinetic effects delivery. The Corsair is listed in the Defense Innovation Unit product catalog as production-ready for maritime expeditionary missions. The 40-foot Mirage extends range to 2,000 nautical miles with a 2,000-pound payload and speeds exceeding 35 knots, bridging the gap between small and medium USVs. The 60-foot Cipher carries up to 10,000 pounds of payload with 3,000 nautical miles of range, suitable for heavier blue-water missions including mine countermeasures and logistics. The 150-foot Marauder is a medium unmanned surface vessel (MUSV) capable of carrying 40 to 150 metric tons of payload, with 3,500+ nautical mile range, 18+ knot top speed, and the ability to accept two 40-foot or four 20-foot ISO containers for modular mission configuration. All six vessel classes share Saronic's unified autonomy stack and open, modular architecture.
    claimRefs: [CE001, CE002, CE003, CE004, CE005, CE006, CE007, CE008]

  - id: autonomy-stack
    title: "Unified Autonomy Stack and Software Architecture"
    body: |
      Saronic employs a software-first design philosophy centered on a unified autonomy stack that runs across all vessel classes. The stack encompasses perception, navigation, decision-making, and fleet coordination layers. On the perception layer, the system performs sensor fusion integrating radar, cameras, AIS, GPS, and environmental sensors for real-time object detection, classification, obstacle avoidance, and sea-state navigation. The navigation layer implements AI-driven path planning with COLREGs compliance for collision avoidance in accordance with international maritime regulations, along with dynamic re-routing based on mission goals and environmental changes. The decision layer handles behavior arbitration, mission mode switching, and failure management with redundant fail-safes. For fleet coordination, the stack supports multi-vessel teaming, distributed task allocation, and swarm behaviors including formation keeping, collaborative area search, and shared sensor data fusion across encrypted mesh networking. The company's browser-based mission control system enables operators to supervise and command single vessels or entire fleets through a standalone or integrated interface. Saronic describes the technical challenge of maritime autonomy as "meaningfully harder than autonomous driving" due to multi-vessel coordination requirements in contested environments with limited communications connectivity. Digital twin simulation and virtual testing environments compress development cycles and reduce sea trial risk.
    claimRefs: [CE009, CE010, CE011, CE012, CE013, CE014]

  - id: nvidia-partnership
    title: "NVIDIA Partnership and Edge Computing"
    body: |
      In October 2025, Saronic and NVIDIA announced a strategic collaboration to integrate NVIDIA's accelerated computing platforms and Physical AI capabilities into Saronic's autonomous vessel fleet. NVIDIA Jetson Orin edge computing modules are embedded across all Saronic vessels, enabling onboard execution of vision, reasoning, and navigation models with real-time performance even under emissions control (EMCON) conditions with limited radio-frequency connectivity. The partnership compresses development timelines significantly — tasks that previously required days can now be completed in hours, according to Saronic. Joint research and development focuses on new applications of NVIDIA AI libraries and development environments for naval platforms, targeting improvements in multi-agent autonomy, resilience, and operational readiness at sea. Beyond vessel autonomy, the collaboration extends to modernizing American shipbuilding through AI-driven design, virtual facility solutions, and simulation capabilities for manufacturing optimization. The partnership aligns with broader U.S. policy initiatives including the Restoring America's Maritime Dominance executive order and the SHIPS Act, reflecting both companies' interest in reindustrializing the domestic maritime sector through AI enablement.
    claimRefs: [CE015, CE016, CE017, CE018]

  - id: manufacturing-infrastructure
    title: "Manufacturing Infrastructure and Vertical Integration"
    body: |
      Saronic operates a vertically integrated manufacturing model spanning multiple facilities. The company's Austin, Texas headquarters encompasses two production campuses totaling over 600,000 square feet, capable of producing thousands of small ASVs annually through full-stack integration of proprietary hardware and software. In mid-2025, Saronic acquired Gulf Craft, a Louisiana shipyard in Franklin with over 60 years of shipbuilding heritage and a skilled workforce, gaining immediate capacity for medium and large unmanned surface vessel prototyping and production. The company committed $300 million to expand the Franklin shipyard by adding over 300,000 square feet of production capacity, including three new construction slips, warehouse expansion, and a dedicated production line for Marauder-class vessels. Construction completion is targeted for end of 2026 with full operational capacity in early 2027. The expansion is expected to create 1,500 direct jobs with an average annual salary of approximately $87,936 and approximately 1,770 indirect jobs. Two Marauder hulls were under construction at Franklin as of late 2025, with the first expected in the water by end of that year and a projected production rate of 20 units in 2027. Port Alpha, Saronic's planned next-generation shipyard, is envisioned as the most advanced facility in the United States dedicated to large autonomous ship production, with an estimated $5 billion investment, though a specific site has not been publicly announced.
    claimRefs: [CE019, CE020, CE021, CE022, CE023, CE024, CE025]

  - id: deployment-and-contracts
    title: "Deployment, Procurement, and Navy Contracts"
    body: |
      Saronic's primary customer is the U.S. Navy, which awarded a $392 million production contract for Corsair ASVs in December 2025 through an Other Transaction Authority (OTA) mechanism. Of the total amount, approximately $200 million was immediately obligated for initial production. The OTA framework bypassed traditional Federal Acquisition Regulation timelines, enabling the Navy to move from prototype to production in under 12 months — a departure from conventional defense acquisition cycles that typically span years. Secretary of the Navy John C. Phelan cited Saronic as exemplifying rapid innovation in naval acquisition, stating "We went from prototype to production in under a year." Prior to the full production contract, Saronic had secured prototype OTAs with the Defense Innovation Unit worth more than $26 million and a separate $8 million agreement for prototype ASVs for U.S. Special Operations Command. The Corsair is listed in the DIU product catalog as a production-ready, inexpensive maritime expeditionary small USV. Saronic has indicated it plans to produce hundreds of Corsairs with the ability to scale into the thousands, supporting the Navy's vision of a hybrid fleet of manned and unmanned systems. The company also filed a bid protest in federal court in April 2026 challenging a separate Navy operations and sustainment contract, alleging that solicitation terms unduly restricted competition from commercial nontraditional defense companies.
    claimRefs: [CE026, CE027, CE028, CE029, CE030, CE031, CE032, CE033]

  - id: differentiation
    title: "Technology Differentiation and Competitive Moats"
    body: |
      Saronic's core differentiators span three interlocking domains: software-first design, vertically integrated manufacturing, and rapid prototype-to-production speed. Unlike traditional defense primes that treat software as an add-on to hull design, Saronic develops autonomy and mission software as the primary design driver, with hardware platforms built around the software stack. This approach enables common autonomy across all six vessel classes, allowing operators to manage heterogeneous fleets through a single mission control interface. Vertical integration of hardware, software, and AI manufacturing allows the company to iterate rapidly and produce at scale while controlling costs — the company claims this results in lower unit costs compared to traditional naval procurement. The prototype-to-production timeline of under 12 months for the Corsair represents an order-of-magnitude improvement over conventional defense acquisition. Additionally, Saronic's open modular architecture enables rapid integration of third-party sensors, payloads, and technologies without core system re-engineering, giving the Navy the payload flexibility it requires for "truck-like" unmanned vessel platforms. The NVIDIA partnership adds a further differentiator through edge AI compute capabilities that enable fully autonomous operations under EMCON conditions without reliance on continuous communications links. Saronic also holds MOUs with ABS for autonomous classification frameworks, Vigor Marine for small-vessel fabrication, and Palantir Technologies for AI-driven analytics integration.
    claimRefs: [CE034, CE035, CE036, CE037, CE038, CE039]

  - id: trust-safety-compliance
    title: "Trust, Safety, Security, and Compliance"
    body: |
      Saronic operates within the heavily regulated defense industrial base, requiring compliance with multiple security, safety, and quality frameworks. As a defense contractor providing classified and sensitive autonomous vessel systems to the U.S. Navy, the company must maintain appropriate facility security clearances and personnel clearances for classified programs. The company's Chief Information Security Officer, Eric Murphy, oversees cybersecurity across vessel systems, communications, and corporate infrastructure. Saronic's autonomous navigation systems must comply with COLREGs (International Regulations for Preventing Collisions at Sea) to ensure safe autonomous operations in both open water and congested maritime environments. The company's vessels are subject to ITAR (International Traffic in Arms Regulations) export controls given their defense applications, restricting technology transfer to foreign entities. During Navy tests off the California coast, incidents were reported involving software glitches that caused a Corsair ASV to stall, followed by a collision involving another vendor's vessel — highlighting the maturation challenges inherent in autonomous maritime operations. These setbacks have prompted increased emphasis on software validation, interoperability testing, and human oversight protocols. Saronic's MOU with ABS (American Bureau of Shipping) explores autonomous classification frameworks that could establish industry standards for certifying unmanned vessel safety and reliability. Quality assurance practices are consistent with defense procurement requirements, though specific certifications such as ISO 9001 or AS9100 have not been publicly disclosed.
    claimRefs: [CE040, CE041, CE042, CE043, CE044, CE045]

  - id: roadmap-and-development
    title: "Roadmap and Development Pipeline"
    body: |
      Saronic's product roadmap centers on scaling production across vessel classes while advancing autonomy capabilities. Near-term priorities include ramping Corsair production to hundreds of units under the $392 million Navy contract, with stated ambitions to reach thousands per year from the Austin campuses. The Mirage and Cipher platforms, unveiled in April 2025, are in development to fill the mid-range gap between the Corsair and Marauder. At the large-vessel end, the Marauder program aims to deliver 20 units in 2027 from the expanded Franklin shipyard. The $300 million Louisiana shipyard expansion targets completion by end of 2026 with full operational capacity in early 2027, adding three new construction slips and dedicated Marauder production lines. Port Alpha, the planned next-generation shipyard with an estimated $5 billion investment, represents Saronic's vision for the largest and most advanced autonomous ship production facility in the United States, though timeline and location remain undisclosed. The NVIDIA collaboration aims to continuously improve autonomy stack capabilities through joint R&D in simulation, multi-agent coordination, and edge AI deployment. Saronic has indicated it is advancing the next wave of autonomous capabilities to meet evolving threats, and international expansion to the United Kingdom and Australia positions the company for allied defense customers beyond the U.S. Navy. Key development risks include scaling manufacturing quality at high production rates, maturing autonomous software reliability for contested environments, and navigating defense procurement complexities.
    claimRefs: [CE046, CE047, CE048, CE049, CE050]

