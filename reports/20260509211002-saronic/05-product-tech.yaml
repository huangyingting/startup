  evidenceGaps:
    - topic: "Port Alpha shipyard details"
      gap: "Port Alpha location, timeline, and capacity projections have not been publicly disclosed beyond high-level vision statements."
      diligenceAsk: "Request from management the Port Alpha site selection status, expected construction start date, and projected annual vessel capacity."
      relatedQuestionRefs: [QE011]
    - topic: "Echelon mission control system"
      gap: "Echelon is referenced on the Saronic website but detailed technical documentation, user interface specifics, and integration architecture are not publicly available."
      diligenceAsk: "Request Echelon product demo or technical documentation showing operator interface, fleet management capabilities, and integration with Navy C2 systems."
      relatedQuestionRefs: [QE015]
    - topic: "ITAR export licensing status"
      gap: "While Saronic's defense vessels are subject to ITAR, the company's specific export license status for allied nations (UK, Australia) has not been disclosed."
      diligenceAsk: "Confirm ITAR licensing status for international sales and any DSP-5 or TAA agreements in place for UK and Australian operations."
      relatedQuestionRefs: [QE018]
    - topic: "Cybersecurity certifications"
      gap: "No specific cybersecurity certifications (CMMC level, FedRAMP, etc.) have been publicly disclosed despite the appointment of a CISO."
      diligenceAsk: "Request CMMC certification level, timeline for CMMC 2.0 compliance, and any interim cybersecurity assessment results."
      relatedQuestionRefs: [QE019]
    - topic: "Quality management certifications"
      gap: "No public evidence of ISO 9001, AS9100, or equivalent quality management certifications for manufacturing facilities."
      diligenceAsk: "Request quality management certification status for Austin and Franklin facilities, or internal QMS documentation."
      relatedQuestionRefs: [QE020]
    - topic: "International expansion timeline"
      gap: "UK and Australia operations have been announced but specific timelines, contract details, and operational scope are not publicly available."
      diligenceAsk: "Request details on international office staffing, customer engagements, and contract pipeline for UK and Australian markets."
      relatedQuestionRefs: []

