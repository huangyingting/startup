callouts:
  - calloutType: strength
    title: "Software-First Vertical Integration"
    body: "Saronic's unified autonomy stack across six vessel classes creates a rare combination: the software-defined flexibility of a tech company with the hardware production capacity of a shipbuilder. This vertical integration enables rapid iteration, lower unit costs, and common operator training across heterogeneous fleets — a model no traditional defense prime replicates."
    claimRefs: [CE009, CE034, CE035]
  - calloutType: strength
    title: "Fastest Prototype-to-Production in Naval History"
    body: "The Corsair moved from prototype to $392 million Navy production contract in under 12 months via OTA procurement — an order-of-magnitude faster than conventional naval acquisition timelines. This speed advantage, endorsed by the Secretary of the Navy, positions Saronic as the benchmark for rapid defense technology fielding."
    claimRefs: [CE026, CE027, CE028]
  - calloutType: risk
    title: "Autonomous Software Maturity Concerns"
    body: "Navy tests off the California coast revealed software glitches that caused a Corsair to stall during exercises, followed by a collision involving another vendor's unmanned vessel. These incidents highlight the technical immaturity of autonomous maritime operations and raise questions about Saronic's software reliability at the scale required for fleet deployment."
    claimRefs: [CE043, CE044]
  - calloutType: risk
    title: "Single-Customer Revenue Dependency"
    body: "Saronic's publicly known contracts and revenue are concentrated with the U.S. Navy. While allied nation expansion and commercial applications are mentioned, no diversified customer contracts have been publicly announced, creating significant customer concentration risk for a company valued at $9.25 billion."
    claimRefs: [CE026, CE031]
  - calloutType: insight
    title: "NVIDIA Partnership as Technology Moat"
    body: "The strategic collaboration with NVIDIA for edge AI compute establishes a potential technology moat: Saronic vessels can operate autonomously under EMCON conditions without reliance on continuous communications — a critical capability gap that competitors relying on remote control architectures cannot easily replicate."
    claimRefs: [CE015, CE016, CE017]

