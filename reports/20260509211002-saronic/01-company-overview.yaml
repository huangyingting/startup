callouts:
  - calloutType: strength
    title: Unprecedented Fundraising Velocity
    body: >-
      Saronic raised over $2.5 billion in less than 3.5 years, achieving a $9.25B valuation — a trajectory nearly
      unmatched in defense technology. The backing of tier-one investors like Kleiner Perkins, a16z, and General
      Catalyst signals strong institutional conviction.
    claimRefs:
      - CO016
      - CO017
      - CO018
      - CO019
  - calloutType: strength
    title: Founder-Market Fit
    body: >-
      CEO Dino Mavrookas's combination of SEAL Team Six operational experience, Wharton MBA, and private equity
      background at Vista Equity creates an unusual founder-market fit for defense technology. His direct military
      experience informs product requirements while financial training supports capital allocation.
    claimRefs:
      - CO003
      - CO004
      - CO005
      - CO006
  - calloutType: risk
    title: Revenue Opacity
    body: >-
      Despite raising $2.5B+ and achieving a $9.25B valuation, Saronic has not publicly disclosed revenue, ARR, or
      detailed financial metrics. The $392M Navy contract provides a revenue floor, but the company's actual revenue run
      rate, profitability timeline, and unit economics remain entirely opaque.
    claimRefs:
      - CO035
      - CO026
  - calloutType: risk
    title: Customer Concentration
    body: >-
      Saronic's publicly known revenue is heavily concentrated with a single customer — the U.S. Navy. While the company
      mentions allied and commercial applications, there is no public evidence of diversified customer revenue, creating
      significant concentration risk.
    claimRefs:
      - CO036
      - CO026
  - calloutType: insight
    title: Valuation Growth Trajectory
    body: >-
      Saronic's valuation grew from $1B to $9.25B in approximately 20 months, a 9.25x increase driven by successful Navy
      contract wins, product demonstrations, and defense spending tailwinds. This pace exceeds most hardware companies
      and reflects defense tech sector enthusiasm.
    claimRefs:
      - CO015
      - CO016
      - CO017
