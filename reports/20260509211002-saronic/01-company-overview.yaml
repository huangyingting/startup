  - id: product-portfolio
    title: Product Portfolio and Capabilities
    body: >
      Saronic produces a family of autonomous surface vessels spanning multiple size classes. The product lineup
      includes the 6-foot Spyglass, the 13-14 foot Cutlass, the 24-foot Corsair, and the 180-foot Marauder, with
      additional vessels including the Mirage and Cipher. The Corsair, the company's production flagship, offers a
      1,000-pound payload capacity, over 1,000 nautical miles of range, and top speeds exceeding 35 knots, suitable for
      intelligence, surveillance, reconnaissance (ISR), electronic warfare, and both kinetic and non-kinetic operations.
      The Marauder, unveiled at AUSA 2025, is a 150-180 foot medium unmanned surface vessel (MUSV) with a 3,500+
      nautical mile range, 18+ knot top speed, 40-150 metric ton payload capacity, and ability to carry standardized ISO
      containers for modular mission configuration. All vessels share Saronic's unified autonomy stack for AI-driven
      navigation, fleet coordination, and mission control, enabling swarm operations across contested maritime
      environments. The company received a $392 million U.S. Navy production contract for Corsair ASVs in December 2025,
      transitioning from prototype to production in under one year.
    claimRefs:
      - CO020
      - CO021
      - CO022
      - CO023
      - CO024
      - CO025
      - CO026
  - id: milestones-and-scale
    title: Milestones and Scale
    body: >
      Saronic has achieved rapid growth milestones since its 2022 founding. The company's headcount surpassed 1,300
      employees by early 2026, with operations spanning multiple campuses in Austin totaling over 500,000 square feet, a
      shipyard in Franklin, Louisiana acquired through the Gulf Craft acquisition, and new offices in San Diego,
      Washington D.C., the United Kingdom, and Australia. The Gulf Craft acquisition provided immediate shipyard
      capacity and a skilled workforce for medium USV prototyping and production, with the first Marauder hull completed
      in less than six months after facility acquisition. Saronic committed $300 million to expand the Louisiana
      shipyard by over 300,000 square feet, expecting to create 1,500 new jobs in the region. The company is also
      developing Port Alpha, described as its next-generation shipyard that will be approximately ten times larger than
      the Franklin facility. In December 2025, Saronic secured the $392 million Navy contract for Corsair production,
      representing one of the fastest prototype-to-production transitions in modern naval procurement. The company was
      named to Fast Company's Most Innovative Companies list for 2026 and has been cited by Secretary of the Navy John
      C. Phelan as exemplifying rapid innovation in naval acquisition.
    claimRefs:
      - CO027
      - CO028
      - CO029
      - CO030
      - CO031
