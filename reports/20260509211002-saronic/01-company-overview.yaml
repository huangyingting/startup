company:
  name: Saronic
chapter:
  number: 1
  title: Company Overview
  summary: >-
    Saronic Technologies is an Austin-based defense technology company building autonomous surface vessels for the U.S.
    Navy and allied forces. Founded in September 2022 by former Navy SEAL Dino Mavrookas, the company has raised over
    $2.5 billion across four funding rounds, reaching a $9.25 billion valuation by March 2026, and is rapidly scaling
    shipbuilding capacity across Texas and Louisiana.
sections:
  - id: identity-and-founding
    title: Identity and Founding
    body: >
      Saronic Technologies is a privately held defense technology company headquartered in Austin, Texas, focused on
      designing, manufacturing, and deploying autonomous surface vessels (ASVs) for naval and maritime applications. The
      company was founded in September 2022 by Dino Mavrookas, Doug Lambert, Rob Lehman, and Vibhav Altekar. Mavrookas,
      the CEO, is a former U.S. Navy SEAL who served for 11 years including five years with SEAL Team Six (DEVGRU),
      completed eight combat tours, and subsequently earned a computer engineering degree from Rutgers and an MBA from
      Wharton. He was a 2015 Pat Tillman Scholar before working in private equity at Vista Equity Partners and H.I.G.
      Capital. The company's mission is to deliver net new shipbuilding capacity for autonomous platforms at speed and
      scale not seen since World War II, addressing what Mavrookas calls the "steady erosion" of U.S. shipbuilding
      capability. Saronic operates with a software-first, autonomy-first design philosophy that integrates
      first-principles engineering with advanced manufacturing and software-defined production processes.
    claimRefs:
      - CO001
      - CO002
      - CO003
      - CO004
      - CO005
      - CO006
    figureRefs:
      - FO002
  - id: leadership-and-governance
    title: Leadership and Governance
    body: >
      Saronic's leadership team combines military, technology, and business experience. CEO and co-founder Dino
      Mavrookas brings operational military experience from SEAL Team Six combined with private equity experience from
      Vista Equity Partners and H.I.G. Capital. Co-founder Doug Lambert serves as Chief Operating Officer, responsible
      for overseeing manufacturing and operations. Co-founder Rob Lehman serves as Chief Commercial Officer, leading
      customer engagement and business development. Co-founder Vibhav Altekar serves as Chief Technology Officer,
      directing the company's autonomous systems and AI software development. Additional C-suite appointments include
      Patrick DePriest as Chief Financial Officer, Emily Shanklin as Chief Marketing Officer, Soo Cho as Chief People
      Officer, Eric Murphy as Chief Information Security Officer, and Tobi Young as General Counsel. The board structure
      has not been publicly disclosed in detail beyond Mavrookas's role, though major investors including Andreessen
      Horowitz, Kleiner Perkins, and Elad Gil likely hold board seats consistent with their investment positions.
      Mavrookas also serves on the Board of Directors for the Navy SEAL Foundation.
    claimRefs:
      - CO007
      - CO008
      - CO009
      - CO010
      - CO011
      - CO012
    tableRefs:
      - TO002
  - id: funding-and-valuation
    title: Funding and Valuation History
    body: >
      Saronic has completed four major funding rounds since its founding, raising a cumulative total exceeding $2.58
      billion. The Series A round closed in October 2023 at $55 million, led by Caffeinated Capital with participation
      from 8VC, Andreessen Horowitz, Lightspeed Venture Partners, and Point72 Ventures. The Series B round in July 2024
      raised $175 million led by Andreessen Horowitz, valuing the company at $1 billion and conferring unicorn status.
      The Series C in February 2025 raised $600 million led by Elad Gil with General Catalyst joining as a new investor,
      quadrupling the valuation to $4 billion. The Series D closed in March 2026, raising $1.75 billion led by Kleiner
      Perkins, with new investors including Advent International, Bessemer Venture Partners, DFJ Growth, BAM Elevate,
      and Franklin Templeton, valuing the company at $9.25 billion. The rapid valuation trajectory from $1 billion to
      $9.25 billion in approximately 20 months reflects both strong investor confidence and the broader defense
      technology funding environment. Saronic has notably relied on private venture capital rather than government seed
      funding to build its operations.
    claimRefs:
      - CO013
      - CO014
      - CO015
      - CO016
      - CO017
      - CO018
      - CO019
