  evidenceGaps:
    - type: private-evidence-only
      severity: material
      topic: Revenue and financial performance
      missingEvidence: Annual revenue, revenue run rate, ARR, gross margins, and profitability data
      whyItMatters: Cannot assess whether $9.25B valuation is supported by revenue fundamentals
      diligencePath: Request financial data in due diligence data room or wait for potential IPO filings
      relatedQuestionRefs:
        - QO012
    - type: missing-source
      severity: material
      topic: Board composition and governance
      missingEvidence: Full board member list, voting rights, and governance structure
      whyItMatters: Investor governance rights and board dynamics affect company direction
      diligencePath: Request board composition from company or investors directly
      relatedQuestionRefs:
        - QO006
    - type: missing-source
      severity: minor
      topic: Leadership stability and TO002 leadership table coverage
      missingEvidence: Information on any leadership departures or organizational changes; full executive bios
      whyItMatters: Rapid scaling companies often experience executive turnover that may not be publicly reported
      diligencePath: Monitor LinkedIn profiles and news for leadership changes; request org chart in diligence
      relatedQuestionRefs:
        - QO016
      relatedTableRefs:
        - TO002
    - type: missing-source
      severity: minor
      topic: Adverse events and legal risks
      missingEvidence: Court records beyond the April 2026 bid protest; FOIA data on contract performance
      whyItMatters: Understanding full legal exposure is critical for investment diligence
      diligencePath: Search PACER, state court records, FOIA requests for contract disputes
      relatedQuestionRefs:
        - QO015
    - type: private-evidence-only
      severity: minor
      topic: Debt and secondary financing
      missingEvidence: Any venture debt, credit facilities, or secondary transactions
      whyItMatters: Debt structure affects financial risk profile and capital efficiency
      diligencePath: Request capital structure details in due diligence
      relatedQuestionRefs:
        - QO022
    - type: missing-source
      severity: minor
      topic: Port Alpha development timeline
      missingEvidence: Detailed construction timeline, site selection, and capacity targets for Port Alpha
      whyItMatters: Port Alpha is central to Saronic's growth thesis but specifics are vague
      diligencePath: Monitor company announcements and local permitting records
      relatedQuestionRefs:
        - QO017
    - type: missing-source
      severity: minor
      topic: Valuation comparison to defense tech peers
      missingEvidence: Comparable company multiples and valuations for Anduril, Shield AI, and other defense startups
      whyItMatters: Context needed to evaluate whether $9.25B is in line with sector norms
      diligencePath: Review Pitchbook/CB Insights data on defense tech valuations
      relatedQuestionRefs:
        - QO018
    - type: missing-source
      severity: minor
      topic: Manufacturing capacity by vessel class
      missingEvidence: Detailed production capacity per vessel class per year across facilities
      whyItMatters: Production throughput is key to contract fulfillment and revenue scaling
      diligencePath: Request manufacturing metrics from company; monitor shipyard expansion announcements
      relatedQuestionRefs:
        - QO019
