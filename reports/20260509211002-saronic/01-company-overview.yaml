      severity: minor
      topic: Autonomy stack technical details
      missingEvidence: Technical architecture details of the unified autonomy stack beyond marketing descriptions
      whyItMatters: Understanding the technical moat is critical for competitive analysis
      diligencePath: Review technical publications, patent filings, and request tech deep-dive in diligence
