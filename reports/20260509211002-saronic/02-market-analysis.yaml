chapter:
  number: 2
  title: Market Analysis
  summary: >-
    The unmanned surface vehicle (USV) market is a defense-led, structurally expanding segment projected to grow from
    approximately $0.8–1.1 billion in 2025 to $1.6–2.2 billion by 2030, driven by the US-China shipbuilding gap, Navy
    fleet modernization under the Future USV / MASC program, and Replicator-initiative scaling, but bounded by
    program-execution risk, budget uncertainty, and a narrow buyer base concentrated in the US Department of Defense.
sections:
  - id: market-definition
    title: Market Definition and Boundary
    body: >-
      Saronic competes in the unmanned surface vehicle (USV) segment of the defense maritime systems market, with its
      primary addressable market being US Department of Defense procurement of autonomous warships and patrol craft. The
      core market includes medium and large USVs (MUSVs and LUSVs) designed for surface warfare, intelligence
      surveillance and reconnaissance (ISR), electronic warfare, mine countermeasures, and logistics missions. These are
      distinct from small unmanned surface vehicles (sUSVs), which are typically man-portable or launched from crewed
      ships and fall outside Saronic's current product line. The broader autonomous ship market — encompassing
      commercial shipping, offshore energy support, port operations, and environmental monitoring — represents an
      adjacent opportunity but is not Saronic's near-term addressable market. Status-quo substitutes include crewed
      warships (destroyers, frigates, patrol craft) that perform the same missions at higher operating cost and crew
      risk, as well as unmanned aerial vehicles (UAVs) and unmanned undersea vehicles (UUVs) that address overlapping
      ISR and strike missions through different domains. The inclusion perimeter for sizing purposes in this chapter is:
      (1) the global USV market as defined by analyst reports (MarketsandMarkets, Mordor Intelligence, Grand View
      Research, Fortune Business Insights), (2) the US Navy medium and large USV procurement pipeline, and (3) the
      broader military unmanned maritime systems market as a ceiling estimate that includes UUVs and related platforms.
    claimRefs:
      - CM001
      - CM002
      - CM003
      - CM004
      - CM005
    tableRefs:
      - TM001
  - id: market-sizing
    title: Market Sizing — TAM, SAM, and SOM Across Lenses
    body: >-
      Multiple sizing lenses produce a coherent directional picture of the USV market opportunity, though estimates vary
      significantly across analyst firms depending on definitional scope. The narrowest lens is the global USV market as
      defined by MarketsandMarkets, estimated at $0.82 billion in 2025 and projected to reach $1.59 billion by 2030 at a
      13.9% CAGR. Mordor Intelligence provides a broader estimate, projecting the USV market at $2.4 billion in 2025
      rising to $3.5 billion by 2030 at roughly 10% CAGR, likely including adjacent commercial USV segments. The
      military unmanned maritime systems market — which includes both surface and undersea vehicles — provides a ceiling
      TAM of $4.87 billion in 2024 growing to $9.57 billion by 2033 at 8.2% CAGR per Verified Market Reports. The
      broader autonomous ships market (Fortune Business Insights) is sized at $7.09 billion in 2026 growing to $13.85
      billion by 2034 at 8.7% CAGR, but this includes commercial shipping automation that is outside Saronic's near-term
      scope. For Saronic's SAM, the US Navy USV procurement budget is the most decision- relevant frame. The Navy has
      spent over $2 billion on USV procurement and allocated $1.2 billion more for development since 2019 according to
      Congressional Budget Office data. The House Armed Services Committee earmarked $3.1 billion for unmanned vessel
      production in 2025, signaling a major procurement ramp. Saronic's SOM is anchored by its $392 million Navy Corsair
      contract, representing a meaningful but early share of the programmatic pipeline. North America leads the USV
      market by revenue (approximately 40% share), followed by Europe and Asia-Pacific, which is the fastest-growing
      region due to China's naval modernization and Indo-Pacific security investments.
    claimRefs:
