callouts:
  - calloutType: strength
    title: US-China shipbuilding gap creates durable structural demand for autonomous naval vessels
    body: >-
      China's shipbuilding capacity exceeds the United States by a factor of over 200, and its navy has grown to
      approximately 400 ships versus the US fleet of roughly 290. This gap cannot be closed by crewed shipbuilding alone
      given US industrial base constraints, creating structural and politically durable demand for cost-effective
      autonomous force multipliers like Saronic's USV platforms.
    claimRefs:
      - CM023
      - CM024
      - CM030
  - calloutType: risk
    title: Analyst market estimates vary by 3x at baseline, reflecting definitional ambiguity
    body: >-
      The 2025 USV market is estimated at $0.82B by MarketsandMarkets and $2.4B by Mordor Intelligence, a nearly
      threefold difference driven by definitional scope. Investors should require Saronic to map its product line
      against each analyst's taxonomy to determine which frame is most relevant to its addressable market, rather than
      citing the most favorable estimate.
    claimRefs:
      - CM006
      - CM007
      - CM032
  - calloutType: insight
    title: Navy MASC program consolidation signals shift from prototyping to production
    body: >-
      The merger of MUSV and LUSV programs into the Future USV / Modular Attack Surface Craft (MASC) initiative
      represents a programmatic pivot from parallel prototyping tracks to a single, modular, production-oriented
      acquisition program. This consolidation, combined with the $3.1 billion HASC earmark, suggests the Navy is
      transitioning USVs from experimental assets to core fleet elements, significantly expanding the addressable
      procurement pipeline for Saronic and competitors.
    claimRefs:
      - CM025
      - CM026
      - CM015
