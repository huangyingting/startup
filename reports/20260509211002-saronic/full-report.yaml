      - number: '4.4'
        title: Public Traction Versus Private-Metric Gaps
        blocks:
          - type: paragraph
            body: >
              Saronic's publicly observable traction data is extremely limited relative to its $9.25 billion valuation.
              The only confirmed revenue-generating contract is the $392 million Navy Corsair production award.
              Third-party analyst Sacra estimates 2025 revenue at approximately $200 million, up from $12.5 million in
              2024 — a 16x year-over-year increase — but this figure is unaudited and unconfirmed by the company.
              Saronic was reportedly projecting $400 million in 2025 revenue as of January 2025; the realized $200
              million estimate, if accurate, represents strong but below-target execution. No audited financial
              statements, revenue run-rate, gross margin data, EBITDA, net income, or burn rate have been publicly
              disclosed. The company's employee count has grown to over 1,300, with the Franklin shipyard workforce
              growing from 35 at acquisition to over 100 by end of 2025. Physical infrastructure metrics are more
              visible: two Marauder hulls under construction in Franklin, 300,000 square feet of new production space
              under construction, and Austin production capacity reportedly at 400-500 Corsair units per year. However,
              actual vessel delivery counts, backlog size, unit economics per vessel delivered, and customer
              concentration data remain entirely opaque. The valuation implies a roughly 46x multiple on estimated 2025
              revenue of $200 million, which is extremely high by traditional defense contractor standards (where public
              primes trade at 1.5-3x revenue) and elevated even by venture-backed defense-tech benchmarks.
            claimRefs:
