      - number: '2.2'
        title: Market Sizing — TAM, SAM, and SOM Across Lenses
        blocks:
          - type: paragraph
            body: >-
              Multiple sizing lenses produce a coherent directional picture of the USV market opportunity, though
              estimates vary significantly across analyst firms depending on definitional scope. The narrowest lens is
              the global USV market as defined by MarketsandMarkets, estimated at $0.82 billion in 2025 and projected to
              reach $1.59 billion by 2030 at a 13.9% CAGR. Mordor Intelligence provides a broader estimate, projecting
              the USV market at $2.4 billion in 2025 rising to $3.5 billion by 2030 at roughly 10% CAGR, likely
              including adjacent commercial USV segments. The military unmanned maritime systems market — which includes
              both surface and undersea vehicles — provides a ceiling TAM of $4.87 billion in 2024 growing to $9.57
              billion by 2033 at 8.2% CAGR per Verified Market Reports. The broader autonomous ships market (Fortune
              Business Insights) is sized at $7.09 billion in 2026 growing to $13.85 billion by 2034 at 8.7% CAGR, but
              this includes commercial shipping automation that is outside Saronic's near-term scope. For Saronic's SAM,
              the US Navy USV procurement budget is the most decision- relevant frame. The Navy has spent over $2
              billion on USV procurement and allocated $1.2 billion more for development since 2019 according to
              Congressional Budget Office data. The House Armed Services Committee earmarked $3.1 billion for unmanned
              vessel production in 2025, signaling a major procurement ramp. Saronic's SOM is anchored by its $392
              million Navy Corsair contract, representing a meaningful but early share of the programmatic pipeline.
              North America leads the USV market by revenue (approximately 40% share), followed by Europe and
              Asia-Pacific, which is the fastest-growing region due to China's naval modernization and Indo-Pacific
              security investments.
