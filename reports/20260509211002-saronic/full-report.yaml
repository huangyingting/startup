      - number: '8.2'
        title: Comparable Company and Multiple Analysis
        blocks:
          - type: paragraph
            body: >
              Saronic's $9.25 billion valuation implies a trailing revenue multiple of approximately 38x based on
              estimated 2025 revenue near $200 million. This places the company at a significant premium to publicly
              traded defense primes: Huntington Ingalls Industries trades at approximately 1.3x EV/revenue, L3Harris at
              approximately 3.0x, and AeroVironment — the closest public-market analog as an unmanned systems specialist
              — at approximately 4.9x. Among venture-backed defense-tech peers, Saronic's multiple is broadly
              comparable: Shield AI achieved a $12.7 billion valuation in March 2026 on projected revenue above $540
              million, implying a ~23x forward multiple. Anduril's January 2026 valuation of $37.95 billion on estimated
              revenue exceeding $1 billion implies a ~30–38x multiple. Helsing, the European defense-AI leader, trades
              at over 50x estimated revenue. Palantir, as a scaled defense-adjacent software platform, trades at
              approximately 42x forward revenue. Joby Aviation, a pre-revenue autonomous vehicle company, trades at
              87–137x trailing revenue, demonstrating the extreme multiples available to autonomous platform companies
              with limited current revenue. The gap between Saronic's multiple and traditional defense primes reflects
              investor expectations that Saronic will achieve software-like margins and rapid revenue scaling rather
              than the 8–10% operating margins typical of legacy shipbuilders. Whether this premium is justified depends
              on contract backlog conversion, production ramp execution, and the size of the addressable autonomous
              maritime market.
            claimRefs:
              - CV006
              - CV007
              - CV008
              - CV009
              - CV010
              - CV011
