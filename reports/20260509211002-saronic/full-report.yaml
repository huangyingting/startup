  - number: 5
    title: Product & Technology
    sections:
      - number: '5.1'
        title: Product Portfolio and Vessel Family
        blocks:
          - type: paragraph
            body: >
              Saronic produces six classes of autonomous surface vessels (ASVs) spanning the full operational spectrum
              from tactical ISR to heavy logistics. The 6-foot Spyglass is a compact swarming platform designed for
              at-sea launch and recovery, day-night operations, and rapid sensor payload integration. The 14-foot
              Cutlass provides extended-range ISR and patrol with moderate payload capacity and open systems
              architecture. The 24-foot Corsair is the company's production flagship, offering 1,000-pound payload
              capacity, over 1,000 nautical miles of range, and top speeds exceeding 35 knots, suitable for
              intelligence, surveillance, reconnaissance, electronic warfare, and kinetic effects delivery. The Corsair
              is listed in the Defense Innovation Unit product catalog as production-ready for maritime expeditionary
              missions. The 40-foot Mirage extends range to 2,000 nautical miles with a 2,000-pound payload and speeds
              exceeding 35 knots, bridging the gap between small and medium USVs. The 60-foot Cipher carries up to
              10,000 pounds of payload with 3,000 nautical miles of range, suitable for heavier blue-water missions
              including mine countermeasures and logistics. The 150-foot Marauder is a medium unmanned surface vessel
              (MUSV) capable of carrying 40 to 150 metric tons of payload, with 3,500+ nautical mile range, 18+ knot top
              speed, and the ability to accept two 40-foot or four 20-foot ISO containers for modular mission
              configuration. All six vessel classes share Saronic's unified autonomy stack and open, modular
              architecture.
