      - number: '3.3'
        title: Traditional Defense Primes
        blocks:
          - type: paragraph
            body: >
              L3Harris Technologies operates the most directly competitive program to Saronic in the medium USV segment.
              L3Harris won the Navy's MUSV contract with an initial value of $35 million and a program ceiling of $281
              million, using its ASView autonomy technology on a 195-foot commercially derived vessel. L3Harris serves
              as systems integrator with Gibbs and Cox providing ship design and Swiftships handling construction. The
              Navy issued a new Request for Information in mid-2024 to procure seven MUSVs within two years, favoring
              existing proven designs that benefit L3Harris's established platform. Textron Systems holds the Navy's
              first USV program of record with the Common Unmanned Surface Vehicle, focused on mine countermeasures.
              Textron was awarded a $100 million NAVSEA contract in April 2025 for continued software development and
              payload integration, plus a separate $106 million award for mine sweeping payload delivery systems in
              January 2025. In September 2025, Textron was selected for the next-generation multi-mission USV (5th
              generation CUSV) with extended range and improved modularity. While Textron's CUSV is smaller and more
              specialized than Saronic's vessels, it establishes Textron as a proven integrator with operational hours
              the Navy trusts. Austal USA built the Navy's first purpose-built Ghost Fleet Overlord USV, the Vanguard
              (OUSV3), launched in January 2024. The Overlord program provides critical test data informing future LUSV
              requirements. General Dynamics and Lockheed Martin have participated in LUSV concept development but have
              not yet secured production contracts for autonomous surface vessels, though their existing shipbuilding
              infrastructure and lobbying power remain competitive advantages. The LUSV program, now merged with the
              MUSV program into the Future Unmanned Surface Vessel initiative, has its first production unit scheduled
              for FY2027 procurement at an estimated cost of $497.6 million.
