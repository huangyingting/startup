      - number: '7.2'
        title: Operational, Quality, and Security Risk — Testing Setbacks and Cyber Exposure
        blocks:
          - type: paragraph
            body: >
              Saronic's operational risk profile was materially elevated by a mid-2025 collision incident during Navy
              testing off California. A Saronic Corsair vessel stalled due to a suspected software bug, after which a
              BlackSea Technologies GARC vessel operating autonomously collided with the stationary Corsair, riding up
              over its deck. The incident was one of several setbacks in the Navy's unmanned systems development
              program, contributing to the removal of Rear Admiral Kevin Smith from command of PEO Unmanned and Small
              Combatants. These setbacks prompted Pentagon leaders to question the readiness of autonomous maritime
              systems and raised concerns about software reliability, inter-platform interoperability, and the adequacy
              of human supervisory protocols. Quality risk extends to Saronic's rapid production scaling: transitioning
              from prototype to series production of autonomous vessels introduces risks of manufacturing defects,
              integration failures between hardware and autonomy software, and challenges maintaining quality standards
              across a workforce expanding from roughly 100 to over 1,500 employees. Cybersecurity represents a critical
              and growing risk vector. Autonomous military vessels are high-value targets for adversary cyber operations
              including GPS spoofing, command-and-control link disruption, AI model manipulation through adversarial
              inputs, and supply chain attacks on embedded software. The Navy's shift toward distributed autonomous
              operations increases the attack surface proportionally. Saronic's vertically integrated autonomy stack
              must meet stringent DoD cybersecurity standards (CMMC 2.0) while maintaining the rapid iteration cadence
              expected of a venture-backed startup.
            claimRefs:
              - CR006
              - CR007
              - CR008
              - CR009
