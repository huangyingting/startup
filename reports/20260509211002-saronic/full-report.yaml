        - id: autonomous_ops
          label: Autonomous Operations
          detail: AI-driven ISR, patrol, logistics, or EW execution with minimal human oversight
        - id: swarm_coord
          label: Swarm Coordination
          detail: Multi-vessel formation, area search, collaborative sensor fusion
        - id: data_return
          label: Data & Intelligence Return
