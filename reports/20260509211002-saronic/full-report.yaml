      - number: '5.8'
        title: Roadmap and Development Pipeline
        blocks:
          - type: paragraph
            body: >
              Saronic's product roadmap centers on scaling production across vessel classes while advancing autonomy
              capabilities. Near-term priorities include ramping Corsair production to hundreds of units under the $392
              million Navy contract, with stated ambitions to reach thousands per year from the Austin campuses. The
              Mirage and Cipher platforms, unveiled in April 2025, are in development to fill the mid-range gap between
              the Corsair and Marauder. At the large-vessel end, the Marauder program aims to deliver 20 units in 2027
              from the expanded Franklin shipyard. The $300 million Louisiana shipyard expansion targets completion by
              end of 2026 with full operational capacity in early 2027, adding three new construction slips and
              dedicated Marauder production lines. Port Alpha, the planned next-generation shipyard with an estimated $5
              billion investment, represents Saronic's vision for the largest and most advanced autonomous ship
              production facility in the United States, though timeline and location remain undisclosed. The NVIDIA
              collaboration aims to continuously improve autonomy stack capabilities through joint R&D in simulation,
              multi-agent coordination, and edge AI deployment. Saronic has indicated it is advancing the next wave of
              autonomous capabilities to meet evolving threats, and international expansion to the United Kingdom and
              Australia positions the company for allied defense customers beyond the U.S. Navy. Key development risks
              include scaling manufacturing quality at high production rates, maturing autonomous software reliability
