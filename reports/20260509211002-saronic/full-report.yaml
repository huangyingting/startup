      - number: '2.4'
        title: Growth Drivers and Adoption Constraints
        blocks:
          - type: paragraph
            body: >-
              The primary structural drivers for USV market growth are: (1) the US-China shipbuilding gap, which creates
              urgent demand for autonomous force multipliers that can be produced faster and cheaper than crewed
              warships; China's navy has surpassed the US in ship count and its commercial shipbuilding capacity dwarfs
              the American industrial base by a factor of over 200; (2) the Navy's programmatic commitment through the
              Future USV / MASC consolidation, which signals a shift from prototyping to production-scale procurement
              beginning in FY2027; (3) the Replicator initiative, which accelerates delivery of thousands of autonomous
              systems across all branches by August 2025, with USVs as a key category; (4) declining crewed ship
              inventories, with the US Navy projected to fall below 290 ships by 2025 against a stated requirement of
              355+, creating structural demand for unmanned augmentation; (5) advancing autonomy and AI technologies
              that reduce the cost and risk of maritime operations in contested environments. Adoption constraints
              include: (1) program-execution risk — the Orca XLUUV program experienced a 64% cost overrun, and CONOPS
              for integrating unmanned platforms with crewed assets remain partially defined; (2) congressional budget
              uncertainty — USV funding has been subject to freezes and oversight holds pending reliability
              demonstrations; (3) industrial base limitations — the US has only four major public shipyards, and scaling
              USV production requires significant private-sector investment; (4) technology maturity concerns around
              cybersecurity, autonomous navigation in contested environments, and interoperability with existing Navy
              systems; (5) regulatory and legal uncertainty around rules of engagement for lethal autonomous systems.
              The US-China gap is the most durable structural driver; program-execution risk and budget volatility are
              the most material near-term constraints.
            claimRefs:
              - CM023
              - CM024
              - CM025
              - CM026
