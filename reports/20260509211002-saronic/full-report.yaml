      - number: '4.5'
        title: Capital Adequacy and Financing Dependency
        blocks:
          - type: paragraph
            body: >
              Saronic has raised $2.58 billion in total venture capital across four primary rounds: a $55 million Series
              A (October 2023), $175 million Series B (July 2024, $1B valuation), $600 million Series C (February 2025,
              $4B valuation), and $1.75 billion Series D (March 2026, $9.25B valuation, led by Kleiner Perkins). The
              fundraising trajectory shows accelerating capital requirements: each round has been substantially larger
              than the prior, reflecting the capital intensity of scaling defense hardware manufacturing. Of the total
              raised, $300 million is committed to the Franklin shipyard expansion alone, with Port Alpha expected to
              require significantly more. The company's burn rate is not disclosed, but with 1,300+ employees,
              significant manufacturing operations, and major capital expenditure programs, annual cash consumption
              likely exceeds $300-500 million based on comparable defense-tech startups at similar scale. If accurate,
              the $1.75 billion Series D provides approximately 3-5 years of runway at current estimated burn rates,
              assuming no additional contract revenue. However, Saronic's capital strategy appears to assume continued
              government contract wins to supplement venture funding — the $392 million Navy contract provides
              substantial near-term cash flow with $200 million advanced immediately. The company has no disclosed debt
              or project-finance obligations, and its use of OTA contracts rather than traditional defense procurement
              may limit access to government progress payments that traditional contractors rely on for working capital.
              Capital adequacy hinges critically on the pace of new contract awards and the conversion of the Navy
              marketplace opportunity into production orders.
