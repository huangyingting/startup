      - number: '8.7'
        title: Recommendation and Key Diligence Asks
        blocks:
          - type: paragraph
            body: >
              Saronic presents a compelling but high-risk investment opportunity at the current $9.25 billion valuation.
              The company has demonstrated genuine product-market fit in a strategically critical market with
              significant government tailwinds. However, the valuation embeds substantial execution risk across
              production scaling, contract diversification, and margin expansion. A conditional positive recommendation
              is warranted, subject to satisfactory resolution of several key diligence items: (1) independent
              verification of Franklin shipyard production capacity and timeline for 20-vessel-per-year throughput; (2)
              detailed unit economics disclosure including cost per vessel, gross margin by vessel class, and software
              revenue contribution; (3) pipeline visibility beyond the Corsair OTA, including status of MASC program
              positioning, allied navy opportunities, and Coast Guard commercialization; (4) resolution or favorable
              trajectory of the April 2026 bid protest; and (5) management commitment to capital discipline, including
              fundraising timeline expectations and IPO readiness assessment. Investors should size positions
              conservatively given the binary risk profile — thesis-confirming contract wins could drive rapid upside to
              $15–20 billion, while execution failures or sector-wide valuation compression could result in a down-round
              to $3–5 billion. The key investment KPI to monitor is revenue conversion rate from contract backlog, which
              will serve as the primary indicator of whether Saronic's valuation premium is justified by operational
              execution rather than market sentiment alone.
