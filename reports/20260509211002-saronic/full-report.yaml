  - number: 4
    title: Financials
    sections:
      - number: '4.1'
        title: Revenue Streams and Pricing Model
        blocks:
          - type: paragraph
            body: >
              Saronic generates revenue through a multi-tiered defense contracting model anchored by three autonomous
              surface vessel product lines with distinct price points: the Spyglass at approximately $400,000 per unit,
              the Cutlass at $800,000, and the Corsair at $1.2 million. Revenue streams include direct vessel production
              contracts, Navy Cooperative Research and Development Agreements (CRADAs), Small Business Innovation
              Research (SBIR) awards, and various R&D contracts. The company's only publicly confirmed production
              contract is the $392 million Navy award for Corsair autonomous surface vessels, announced in December
              2025, with nearly $200 million put on contract immediately. At full manufacturing capacity of 600 boats
              annually across all product lines, Sacra estimates Saronic could generate up to $480 million in potential
              annual revenue with 45% gross margins. However, the company's revenue recognition profile likely follows
              government contract milestones — either cost-plus reimbursement or firm-fixed-price delivery schedules —
              rather than commercial SaaS-style recurring revenue. Beyond direct U.S. Navy contracts, Saronic has
              indicated plans to expand revenue through sales to the Coast Guard, state and local law enforcement in
              coastal regions, and international sales to U.S. allies, though no non-Navy contracts have been publicly
              disclosed. The Corsair production line in Austin reportedly has capacity to build 400-500 units per year,
              with plans to expand to 2,000 units, suggesting significant upside if demand materializes across multiple
              customer segments.
