            title: Navy marketplace model opens competitive aperture beyond incumbents
            body: >-
              The Navy's pivot from the MASC program to an open marketplace model for the MUSV family of systems
              fundamentally changes competitive dynamics. Rather than awarding exclusive programs of record, the Navy is
              soliciting multiple vendors simultaneously, which benefits Saronic's speed-to-production but also invites
