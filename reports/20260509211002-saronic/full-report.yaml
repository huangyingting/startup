      - number: '5.5'
        title: Deployment, Procurement, and Navy Contracts
        blocks:
          - type: paragraph
            body: >
              Saronic's primary customer is the U.S. Navy, which awarded a $392 million production contract for Corsair
              ASVs in December 2025 through an Other Transaction Authority (OTA) mechanism. Of the total amount,
              approximately $200 million was immediately obligated for initial production. The OTA framework bypassed
              traditional Federal Acquisition Regulation timelines, enabling the Navy to move from prototype to
              production in under 12 months — a departure from conventional defense acquisition cycles that typically
              span years. Secretary of the Navy John C. Phelan cited Saronic as exemplifying rapid innovation in naval
              acquisition, stating "We went from prototype to production in under a year." Prior to the full production
              contract, Saronic had secured prototype OTAs with the Defense Innovation Unit worth more than $26 million
              and a separate $8 million agreement for prototype ASVs for U.S. Special Operations Command. The Corsair is
              listed in the DIU product catalog as a production-ready, inexpensive maritime expeditionary small USV.
              Saronic has indicated it plans to produce hundreds of Corsairs with the ability to scale into the
              thousands, supporting the Navy's vision of a hybrid fleet of manned and unmanned systems. The company also
              filed a bid protest in federal court in April 2026 challenging a separate Navy operations and sustainment
              contract, alleging that solicitation terms unduly restricted competition from commercial nontraditional
              defense companies.
            claimRefs:
              - CE026
