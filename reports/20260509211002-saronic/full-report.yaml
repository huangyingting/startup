  - number: 6
    title: Customers
    sections:
      - number: '6.1'
        title: Customer Segmentation — Defense-Dominant Buyer Base
        blocks:
          - type: paragraph
            body: >
              Saronic's revenue is overwhelmingly driven by U.S. Department of Defense customers. The primary buyer is
              the U.S. Navy, which awarded a $392 million Other Transaction Authority (OTA) production contract in
              December 2025 for Corsair autonomous surface vessels, with nearly $200 million obligated immediately. This
              single contract represents the vast majority of Saronic's contracted revenue. The Navy programs engaging
              Saronic span PEO Unmanned and Small Combatants (PEO USC), the Replicator initiative managed by the Defense
              Innovation Unit (DIU), and broader fleet integration efforts for Medium and Large USV programs. A separate
              $8 million prototype contract with U.S. Special Operations Command (SOCOM), concluded in July 2024,
              validated the platform for special operations missions including ISR, precision strike, and logistics in
              contested maritime environments. The U.S. Coast Guard announced a Cooperative Research and Development
              Agreement (CRADA) with Saronic in November 2025 to explore USV integration for maritime safety and
              extended offshore operations. Allied navies represent an emerging but pre-revenue segment: Saronic opened
              offices and hired strategic advisors in both Australia (Rear Admiral Lee Goddard, ret.) and the United
              Kingdom (Rear Admiral Alex Burton, ret.) during 2025, aligning with AUKUS Pillar Two autonomous capability
              priorities. Commercial segments including oil and gas, port security, and offshore wind remain
              aspirational, with no publicly confirmed commercial customers or contracts as of May 2026.
