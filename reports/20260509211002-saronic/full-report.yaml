      - number: '5.2'
        title: Unified Autonomy Stack and Software Architecture
        blocks:
          - type: paragraph
            body: >
              Saronic employs a software-first design philosophy centered on a unified autonomy stack that runs across
              all vessel classes. The stack encompasses perception, navigation, decision-making, and fleet coordination
              layers. On the perception layer, the system performs sensor fusion integrating radar, cameras, AIS, GPS,
              and environmental sensors for real-time object detection, classification, obstacle avoidance, and
              sea-state navigation. The navigation layer implements AI-driven path planning with COLREGs compliance for
              collision avoidance in accordance with international maritime regulations, along with dynamic re-routing
              based on mission goals and environmental changes. The decision layer handles behavior arbitration, mission
              mode switching, and failure management with redundant fail-safes. For fleet coordination, the stack
              supports multi-vessel teaming, distributed task allocation, and swarm behaviors including formation
              keeping, collaborative area search, and shared sensor data fusion across encrypted mesh networking. The
              company's browser-based mission control system enables operators to supervise and command single vessels
              or entire fleets through a standalone or integrated interface. Saronic describes the technical challenge
              of maritime autonomy as "meaningfully harder than autonomous driving" due to multi-vessel coordination
              requirements in contested environments with limited communications connectivity. Digital twin simulation
              and virtual testing environments compress development cycles and reduce sea trial risk.
            claimRefs:
              - CE009
