      - number: '7.5'
        title: Competitive Risk — Established Primes and Funded Challengers
        blocks:
          - type: paragraph
            body: >
              The autonomous USV market is rapidly attracting well-resourced competitors. L3Harris is considered the
              market leader in medium-to-large defense USVs, with strong Navy relationships and decades of maritime
              defense integration experience. Textron secured new Navy contracts for its TSUNAMI USV family, offering
              proven modularity and global deployment capability. Most significantly, Anduril partnered with HD Hyundai
              Heavy Industries to develop a modular Autonomous Surface Vessel for the Navy's Modular Attack Surface
              Craft (MASC) program, combining South Korean shipbuilding scale with Anduril's software-defined autonomy
              platform and Lattice command-and-control ecosystem. Anduril has also teamed with Kraken Technology Group
              for small USV requirements, demonstrating a portfolio approach to the Navy's unmanned surface fleet.
              Anduril's estimated $28 billion valuation and its existing relationships across DoD create formidable
              competitive pressure. The Navy's procurement strategy intentionally encourages multi-vendor competition
              through rapid technology competitions rather than sole-source awards, meaning Saronic cannot rely on
              incumbency from the Corsair OTA to secure future programs. The global competitive landscape includes
              Thales, KONGSBERG, Israel Aerospace Industries, and BAE Systems, all pursuing USV programs for their
              respective national navies with potential spillover into allied procurement under AUKUS and Five Eyes
              frameworks. The USV market is projected to grow from approximately $579 million in 2025 to $943 million by
              2035, creating a large but contested opportunity.
            claimRefs:
              - CR021
              - CR022
              - CR023
              - CR024
              - CR025
      - number: '7.6'
        title: Capital Intensity and Political Risk — Funding Sustainability and Budget Dynamics
        blocks:
          - type: paragraph
            body: >
              Despite raising over $2.5 billion in total funding including a $1.75 billion Series D at a $9.25 billion
              valuation, Saronic faces persistent capital intensity risk. The $300 million Louisiana shipyard expansion,
              development of the next-generation Port Alpha shipyard, ongoing R&D for the Marauder MUSV platform, and
              working capital requirements for defense contract execution create substantial cash burn. Defense hardware
              companies historically face long revenue recognition cycles as government milestone payments lag
              production expenditures. If Corsair deliveries are delayed or the Navy exercises fewer options than
              projected, cash flow pressure could emerge despite the large capital base. Political and budget risk,
              while currently mitigated by historic defense spending increases — the FY2026 DoD budget allocates $13.4
              billion for autonomy with $5.3 billion specifically for Navy unmanned programs — remains a structural
              concern. The House Armed Services Committee earmarked $3.1 billion for unmanned vessel production in
              FY2026, reflecting strong bipartisan support, but defense spending is subject to administration changes,
              continuing resolution dynamics, and potential future fiscal constraints. Saronic's entire revenue base
              depends on sustained political commitment to autonomous naval capabilities. Environmental regulations for
              maritime operations, while not currently binding on military vessels, represent an emerging risk as
              autonomous USVs expand into commercial maritime domains where IMO environmental standards apply.
              Geopolitical risks including escalation dynamics in the Taiwan Strait, South China Sea, or Middle East
              could accelerate demand but also create supply chain disruptions and operational tempo pressures that
              stress a young manufacturing operation.
            claimRefs:
              - CR026
              - CR027
              - CR028
              - CR029
              - CR030
      - number: '7.7'
        title: Technology Risk — Autonomy Reliability and GPS-Denied Operations
        blocks:
          - type: paragraph
            body: >
              Saronic's core value proposition rests on its vertically integrated autonomy stack powered by NVIDIA
              hardware, which must perform reliably in contested and GPS-denied maritime environments. The mid-2025
              collision incident demonstrated that software bugs can cause vessel stalling in operational conditions,
              raising questions about autonomy stack maturity. Operating in GPS-denied environments — a requirement for
              contested naval operations against peer adversaries — demands alternative navigation solutions including
              inertial navigation, celestial navigation algorithms, and terrain-referenced navigation using bathymetric
              data. These technologies are less mature than GPS-dependent systems and introduce additional failure
              modes. The Navy's expectation for autonomous swarming operations, where multiple USVs coordinate without
              continuous human oversight, adds complexity in communications reliability, distributed decision-making,
              and rules of engagement compliance. Saronic must also manage AI model governance risk: the autonomy
              software must be explainable and auditable to meet DoD AI ethics guidelines (DoD AI Principles adopted
              2020) and operational commanders' trust requirements. Adversarial AI attacks — where adversaries feed
              manipulated sensor data to cause misclassification or unsafe navigation decisions — represent an emerging
              technology risk with limited proven countermeasures. The transition from the smaller Corsair (autonomous
              surface vessel) to the larger Marauder (150-foot, 40-ton payload MUSV) introduces scaling risk in the
              autonomy stack, as different vessel dynamics, sensor configurations, and mission profiles require
              substantial software adaptation beyond simple parameter changes.
            claimRefs:
              - CR006
              - CR031
              - CR032
              - CR033
              - CR034
      - number: '7.8'
        title: Mitigation Strategies and Kill Criteria
        blocks:
          - type: paragraph
            body: >
              Saronic's primary risk mitigations include its $2.5 billion capital base providing runway for multi-year
              execution, vertical integration reducing supply chain dependency for software and systems integration, the
              OTA contract structure enabling faster iteration than traditional FAR-based procurement, and early
              international positioning through AUKUS-aligned advisory hires in the UK and Australia. The company's
              modular platform architecture (Spyglass, Cutlass, Corsair, Marauder) enables staged capability delivery
              and reduces all-or-nothing program risk. However, several kill criteria warrant monitoring: if Corsair
              deliveries slip beyond mid-2027 without Navy acceptance, it would signal fundamental production capability
              gaps; if the bid protest results in a ruling that structurally disadvantages commercial-first vendors in
              Navy USV procurement, it could constrain Saronic's addressable market; if a second major collision or
              autonomy failure occurs during Navy testing, it could trigger program suspension or mandatory redesign;
              and if Anduril's MASC program captures the medium USV segment with HD Hyundai's shipbuilding scale,
              Saronic's Marauder could face a foreclosed market. Capital adequacy becomes a kill criterion if burn rate
              exceeds projections without proportional revenue growth — at the current valuation, a down round would
              signal market loss of confidence. The departure of key technical founders or the inability to achieve CMMC
              2.0 certification for cybersecurity compliance would each represent material execution failures requiring
              reassessment of the investment thesis.
            claimRefs:
              - CR035
              - CR036
              - CR037
              - CR038
