      - number: '7.4'
        title: People and Execution Risk — Talent Competition and Manufacturing Scale-Up
        blocks:
          - type: paragraph
            body: >
              Saronic faces significant people and execution risk as it scales from a startup of approximately 100
              employees to a production-scale defense manufacturer requiring over 1,500 workers at its Franklin,
              Louisiana shipyard alone. The company requires a rare combination of naval architecture expertise and
              AI/autonomy engineering talent — two disciplines with limited overlap and intense competition from
              established defense contractors (L3Harris, HII, General Dynamics), big tech companies (Google, NVIDIA),
              and well-funded defense startups (Anduril, Shield AI). Saronic has been actively recruiting, including
              campus outreach at the University of Texas at Austin and hiring retired flag officers as strategic
              advisors, but converting advisory relationships into operational leadership remains unproven. The
              Louisiana shipyard buildout represents a $300 million capital commitment with construction beginning late
              2025 and full operational capacity targeted for early 2027. This timeline creates execution risk around
              construction delays, permitting, workforce training, and production ramp-up. The shipyard expansion
              involves multiple design and construction partners (JacobsWyper, P2S, KPFF, JE Dunn, Alberici), adding
              coordination complexity. Saronic must simultaneously deliver on the Navy's Corsair production timeline
              (deliveries expected before end of 2026), develop the larger Marauder MUSV platform, and maintain software
              development velocity for its autonomy stack — a multi-front execution challenge that strains management
              bandwidth for a company founded in 2022.
            claimRefs:
              - CR016
              - CR017
              - CR018
              - CR019
              - CR020
