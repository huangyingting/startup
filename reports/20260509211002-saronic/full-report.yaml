      - number: '3.8'
        title: Adverse Competitor Evidence and Risk Signals
        blocks:
          - type: paragraph
            body: >
              Several risk signals merit attention. Saronic filed a bid protest in April 2026 challenging a Navy
              contract award, with a government request for a merits decision by October 2026, indicating competitive
              friction and potential program disruption. The manned shipbuilding industrial base retains overwhelming
              political and budgetary advantages, with one defense industry CEO noting that the military-industrial
              complex has the best lobbyists and knows exactly how money flows in the Department of Defense.
              Congressional skepticism about unmanned vessel reliability remains a material risk, with two senators
              explicitly calling for halting the LUSV program and redirecting funds to proven MUSV platforms. On the
              competitor side, Anduril's success with Ghost Shark for Australia — delivering prototypes ahead of
              schedule and under budget — demonstrates execution capability that could threaten Saronic if Anduril
              enters the surface domain. L3Harris's established MUSV contract and Textron's program-of-record status for
              mine countermeasures USVs mean Saronic faces incumbents with operational track records and existing Navy
              trust. The Boeing Orca XLUUV program's multi-year delays and cost overruns serve as a cautionary parallel
              for all autonomous maritime programs, including Saronic's, highlighting the execution risk inherent in
              scaling autonomous naval platforms from prototype to fleet-scale production.
            claimRefs:
              - CP046
              - CP047
