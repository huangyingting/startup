      - number: '2.5'
        title: Sizing and Adoption Diligence Gaps
        blocks:
          - type: paragraph
            body: >-
              Several material gaps constrain confidence in market sizing and Saronic's addressable opportunity. First,
              analyst estimates for the global USV market vary by nearly 3x at the 2025 baseline ($0.82B vs $2.4B),
              reflecting definitional differences in what constitutes a USV versus a broader autonomous maritime system.
              Investors should require Saronic to map its product line against each analyst's definitional scope to
              determine which TAM frame is most relevant. Second, the US Navy's Future USV / MASC program is
              pre-Milestone B, meaning formal requirements, unit costs, and production quantities are not yet finalized;
              the CRS report notes that procurement funding decisions will be made in future budgets, creating
              uncertainty around the size of the addressable pipeline. Third, the transition from prototyping to serial
              production has not been demonstrated at scale for any USV platform; the Orca XLUUV cost overruns are a
              cautionary precedent. Fourth, Saronic's competitive position relative to incumbents (L3Harris, Textron,
              Lockheed Martin) and other emerging players is not independently validated; market share data for the USV
              segment is not publicly available from any retained analyst source. Fifth, export market potential for
              US-built autonomous warships is constrained by ITAR and FMS regulations, and no retained source provides a
              credible estimate of allied navy USV procurement budgets in aggregate. These gaps do not invalidate the
              market thesis but they bound the confidence of any specific TAM/SAM/SOM estimate to low-medium.
            claimRefs:
              - CM032
              - CM033
              - CM034
              - CM035
              - CM036
      - number: '2.6'
        title: Exhibits
        blocks:
          - type: callout
            title: US-China shipbuilding gap creates durable structural demand for autonomous naval vessels
            body: >-
              China's shipbuilding capacity exceeds the United States by a factor of over 200, and its navy has grown to
              approximately 400 ships versus the US fleet of roughly 290. This gap cannot be closed by crewed
              shipbuilding alone given US industrial base constraints, creating structural and politically durable
              demand for cost-effective autonomous force multipliers like Saronic's USV platforms.
            calloutType: strength
            claimRefs:
              - CM023
              - CM024
              - CM030
          - type: callout
            title: Analyst market estimates vary by 3x at baseline, reflecting definitional ambiguity
            body: >-
              The 2025 USV market is estimated at $0.82B by MarketsandMarkets and $2.4B by Mordor Intelligence, a nearly
              threefold difference driven by definitional scope. Investors should require Saronic to map its product
              line against each analyst's taxonomy to determine which frame is most relevant to its addressable market,
              rather than citing the most favorable estimate.
            calloutType: risk
            claimRefs:
              - CM006
              - CM007
              - CM032
          - type: callout
            title: Navy MASC program consolidation signals shift from prototyping to production
            body: >-
              The merger of MUSV and LUSV programs into the Future USV / Modular Attack Surface Craft (MASC) initiative
              represents a programmatic pivot from parallel prototyping tracks to a single, modular, production-oriented
              acquisition program. This consolidation, combined with the $3.1 billion HASC earmark, suggests the Navy is
              transitioning USVs from experimental assets to core fleet elements, significantly expanding the
              addressable procurement pipeline for Saronic and competitors.
            calloutType: insight
            claimRefs:
              - CM025
              - CM026
              - CM015
  - number: 3
    title: Competitors
    sections:
      - number: '3.1'
        title: Competitive Landscape Overview
        blocks:
          - type: paragraph
            body: >
              The autonomous surface vessel competitive landscape spans six distinct competitor categories: (1)
              venture-backed defense-tech startups such as Anduril Industries, Shield AI, and emerging entrants like
              Magnet Defense and Blue Water Autonomy; (2) traditional defense primes including L3Harris Technologies,
              Textron Systems, General Dynamics, Lockheed Martin, and Austal USA, which bring established government
              contracting relationships and shipyard infrastructure; (3) international defense companies such as
              Kongsberg Maritime (Norway), Hanwha Ocean (South Korea), Elbit Systems and Rafael Advanced Defense Systems
              (Israel); (4) state-backed competitors, principally China's CSSC with its JARI-USV-A program; (5) the
              status quo of manned naval vessels, which consume over 99% of current Navy shipbuilding budgets; and (6)
              adjacent-domain autonomous systems including unmanned underwater vehicles and aerial drones that compete
              for the same defense budget allocation. The U.S. Navy's recent decision to consolidate its Medium and
              Large USV programs into a unified Future Unmanned Surface Vessel initiative, and the subsequent pivot away
              from the MASC program toward an open marketplace model, has reset competitive dynamics by favoring vendors
              who can demonstrate rapid production, modularity, and proven at-sea autonomy over those relying on
              traditional multi-year development timelines. This marketplace shift benefits Saronic's
              speed-to-production model but also opens the aperture for additional competitors to bid on MUSV
              family-of-systems contracts.
            claimRefs:
              - CP001
              - CP002
              - CP003
              - CP004
              - CP005
              - CP006
      - number: '3.2'
        title: Direct Startup Competitors
        blocks:
          - type: paragraph
            body: >
              Anduril Industries is Saronic's most formidable venture-backed competitor. Founded in 2017 by Palmer
              Luckey, Anduril has raised approximately $6.3 billion in total funding and reached a $30.5 billion
              valuation after its $2.5 billion Series G in June 2025, with reports of targeting a $60 billion valuation
              in a 2026 Series H round. Anduril's maritime portfolio centers on undersea autonomy: the Ghost Shark /
              Dive-XL extra-large autonomous underwater vehicle won a A$1.7 billion (approximately $1.12 billion)
              contract from the Royal Australian Navy in September 2025, with first vehicles entering service in January
              2026. The U.S. Navy's Defense Innovation Unit selected Anduril for the Combat Autonomous Maritime Platform
              (CAMP) project in March 2026 to demonstrate the Dive-XL for American operational use. While Anduril's
              maritime focus is primarily subsurface rather than surface, its Lattice command-and-control software,
              massive funding base, and multi-domain platform portfolio (including aerial drones and ground sensors)
              make it a platform-level competitor that could expand into the surface vessel domain. Anduril's estimated
              2025 revenue was $2 billion with $4.3 billion projected for 2026. Shield AI, valued at $12.7 billion after
              a $1.5 billion Series G in March 2026, is primarily an aerial autonomy company with its Hivemind AI
              piloting software selected for the Air Force's Collaborative Combat Aircraft program. While Shield AI does
              not currently produce surface vessels, its autonomy software could be adapted for maritime applications,
              and its $3.6 billion in lifetime funding makes it a potential adjacent entrant. Emerging startups
              including Magnet Defense (M48 USV with 17,000 nautical mile range), Blue Water Autonomy (founded 2024,
              focusing on producible unmanned vessels), and Seasats ($100 million in federal contracts, long-endurance
              platforms) are also entering the Navy USV marketplace.
