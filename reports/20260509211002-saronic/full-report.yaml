      - number: '5.3'
        title: NVIDIA Partnership and Edge Computing
        blocks:
          - type: paragraph
            body: >
              In October 2025, Saronic and NVIDIA announced a strategic collaboration to integrate NVIDIA's accelerated
              computing platforms and Physical AI capabilities into Saronic's autonomous vessel fleet. NVIDIA Jetson
              Orin edge computing modules are embedded across all Saronic vessels, enabling onboard execution of vision,
              reasoning, and navigation models with real-time performance even under emissions control (EMCON)
              conditions with limited radio-frequency connectivity. The partnership compresses development timelines
              significantly — tasks that previously required days can now be completed in hours, according to Saronic.
              Joint research and development focuses on new applications of NVIDIA AI libraries and development
              environments for naval platforms, targeting improvements in multi-agent autonomy, resilience, and
              operational readiness at sea. Beyond vessel autonomy, the collaboration extends to modernizing American
              shipbuilding through AI-driven design, virtual facility solutions, and simulation capabilities for
              manufacturing optimization. The partnership aligns with broader U.S. policy initiatives including the
              Restoring America's Maritime Dominance executive order and the SHIPS Act, reflecting both companies'
              interest in reindustrializing the domestic maritime sector through AI enablement.
            claimRefs:
              - CE015
              - CE016
              - CE017
              - CE018
      - number: '5.4'
        title: Manufacturing Infrastructure and Vertical Integration
        blocks:
          - type: paragraph
            body: >
              Saronic operates a vertically integrated manufacturing model spanning multiple facilities. The company's
              Austin, Texas headquarters encompasses two production campuses totaling over 600,000 square feet, capable
              of producing thousands of small ASVs annually through full-stack integration of proprietary hardware and
              software. In mid-2025, Saronic acquired Gulf Craft, a Louisiana shipyard in Franklin with over 60 years of
              shipbuilding heritage and a skilled workforce, gaining immediate capacity for medium and large unmanned
              surface vessel prototyping and production. The company committed $300 million to expand the Franklin
              shipyard by adding over 300,000 square feet of production capacity, including three new construction
              slips, warehouse expansion, and a dedicated production line for Marauder-class vessels. Construction
              completion is targeted for end of 2026 with full operational capacity in early 2027. The expansion is
              expected to create 1,500 direct jobs with an average annual salary of approximately $87,936 and
              approximately 1,770 indirect jobs. Two Marauder hulls were under construction at Franklin as of late 2025,
              with the first expected in the water by end of that year and a projected production rate of 20 units in
              2027. Port Alpha, Saronic's planned next-generation shipyard, is envisioned as the most advanced facility
              in the United States dedicated to large autonomous ship production, with an estimated $5 billion
              investment, though a specific site has not been publicly announced.
