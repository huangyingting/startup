  - number: 8
    title: Valuation
    sections:
      - number: '8.1'
        title: Funding History and Valuation Trajectory
        blocks:
          - type: paragraph
            body: >
              Saronic's funding trajectory reflects one of the fastest valuation escalations in defense technology
              history. The company raised a seed round in 2022 at an undisclosed valuation, followed by a $55 million
              Series A in October 2023. The Series B of $175 million in June 2024 valued the company at approximately $1
              billion. Just eight months later, a $600 million Series C in February 2025 pushed the valuation to $4
              billion — a 4x increase from Series B. The March 2026 Series D of $1.75 billion at a $9.25 billion
              post-money valuation represents a further 2.3x step-up in just thirteen months. Total capital raised now
              exceeds $2.58 billion. The Series D was led by Kleiner Perkins with participation from Advent
              International, Bessemer Venture Partners, DFJ Growth, BAM Elevate, 8VC, Caffeinated Capital, and
              continuing investors Andreessen Horowitz, Elad Gil, and Franklin Templeton. The round's size — $1.75
              billion — is the largest single fundraise in the maritime defense-tech sector and places Saronic among the
              top five most valuable private defense-tech companies globally. The rapid valuation growth has been driven
              by the convergence of accelerating Navy demand for autonomous surface vessels, Saronic's early production
              contract wins, and a historically aggressive venture capital cycle for defense technology. However, each
              successive round has required progressively larger capital infusions to sustain valuation growth, raising
              questions about whether future fundraises or an eventual IPO can maintain this trajectory.
            claimRefs:
              - CV001
              - CV002
              - CV003
              - CV004
              - CV005
