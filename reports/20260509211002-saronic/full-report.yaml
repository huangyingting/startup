      - number: '8.3'
        title: Bull, Base, and Bear Scenario Analysis
        blocks:
          - type: paragraph
            body: >
              The bull case values Saronic at $15–20 billion by 2028, predicated on successful execution of multiple
              growth vectors. The Navy's FY2026 budget allocates $5.3 billion for unmanned maritime systems, with $1.7
              billion specifically for autonomous surface vessels. The long-term Navy fleet plan envisions 150 or more
              medium unmanned surface vessels as part of a hybrid fleet that could be up to 45% unmanned by 2045. If
              Saronic captures a dominant share of this market and expands to allied navies under AUKUS and bilateral
              agreements, forward revenue could exceed $1 billion by 2028, supporting a $15–20 billion valuation at
              15–20x forward revenue. The base case maintains the current $9.25 billion valuation range through 2028,
              assuming steady execution of the $392 million Corsair contract, successful production scaling to 20
              vessels per year at the Franklin shipyard, and modest incremental contract wins. Revenue in the base case
              reaches $400–600 million by 2028, and the multiple compresses from 38x trailing to 15–23x forward as the
              company matures. The bear case envisions a valuation decline to $3–5 billion, driven by contract delays or
              cancellations, adverse outcomes in the April 2026 bid protest, production failures at the Louisiana
              shipyard, or a broader correction in defense-tech venture valuations. In the bear scenario, revenue stalls
              at $200–300 million, the multiple compresses to 10–15x, and Saronic may require additional capital at a
              down-round valuation. A key risk is that defense primes like L3Harris, Textron, or Huntington Ingalls
              successfully enter the autonomous USV market with lower-cost solutions leveraging existing shipbuilding
              infrastructure.
            claimRefs:
