  - number: 7
    title: Risks
    sections:
      - number: '7.1'
        title: Regulatory and Legal Risk — COLREGS, Maritime Law, and Bid Protest
        blocks:
          - type: paragraph
            body: >
              Saronic operates in a regulatory environment that has not yet adapted to fully autonomous surface vessels.
              The International Regulations for Preventing Collisions at Sea (COLREGs), which govern vessel navigation
              behavior globally, were drafted assuming human judgment and seamanship. Rules such as "ordinary practice
              of seamen" (Rule 2) and "proper lookout" (Rule 5) require subjective decisions that are difficult to
              encode algorithmically. The International Maritime Organization (IMO) is progressing toward a mandatory
              code for Maritime Autonomous Surface Ships (MASS) but binding global rules are not expected until
              approximately 2032. In the interim, regulatory sandboxes and controlled trials do not resolve broad
              adoption or liability concerns. Domestically, the U.S. Coast Guard's regulatory framework for autonomous
              vessels remains under development, with a 2024 GAO report noting significant gaps in the Coast Guard's
              authority and readiness to regulate autonomous ships. Saronic's April 2026 bid protest in the U.S. Court
              of Federal Claims (case 1:26-cv-00358, Judge Elaine D. Kaplan) against the Navy's O&S contract for LCS
              mission modules and small USVs represents a direct legal risk. Saronic alleges the solicitation "unduly
              restricts competition" and violates federal laws prioritizing commercial products. The case remains open
              with a government-requested decision deadline of October 1, 2026. An adverse ruling could limit Saronic's
              competitive access to future Navy USV contract opportunities beyond the existing Corsair OTA. Export
              control regulations, particularly ITAR, create additional legal risk for Saronic's international expansion
              ambitions, as military-grade autonomous vessels and their autonomy software fall under USML Category XX,
              requiring State Department export licenses for any allied navy sales.
            claimRefs:
