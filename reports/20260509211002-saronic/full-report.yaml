    title: Company Overview
    sections:
      - number: '1.1'
        title: Identity and Founding
        blocks:
          - type: paragraph
            body: >
              Saronic Technologies is a privately held defense technology company headquartered in Austin, Texas,
              focused on designing, manufacturing, and deploying autonomous surface vessels (ASVs) for naval and
              maritime applications. The company was founded in September 2022 by Dino Mavrookas, Doug Lambert, Rob
              Lehman, and Vibhav Altekar. Mavrookas, the CEO, is a former U.S. Navy SEAL who served for 11 years
              including five years with SEAL Team Six (DEVGRU), completed eight combat tours, and subsequently earned a
              computer engineering degree from Rutgers and an MBA from Wharton. He was a 2015 Pat Tillman Scholar before
              working in private equity at Vista Equity Partners and H.I.G. Capital. The company's mission is to deliver
              net new shipbuilding capacity for autonomous platforms at speed and scale not seen since World War II,
              addressing what Mavrookas calls the "steady erosion" of U.S. shipbuilding capability. Saronic operates
              with a software-first, autonomy-first design philosophy that integrates first-principles engineering with
              advanced manufacturing and software-defined production processes.
