    type: stack
    summary: >-
      Saronic's technology stack from hardware platforms through autonomy software to mission control and fleet
      coordination.
    data:
      layers:
        - label: Mission Control (Echelon)
          detail: Browser-based C2 for single vessel or fleet supervision; standalone or integrated
        - label: Fleet Coordination & Swarm
          detail: Multi-vessel teaming, distributed task allocation, encrypted mesh networking
        - label: Decision & Planning
          detail: Behavior arbitration, mission mode switching, COLREGs compliance, fail-safes
        - label: Navigation & Path Planning
          detail: AI-driven route optimization, dynamic re-routing, GPS/INS integration
        - label: Perception & Sensor Fusion
          detail: Radar, cameras, AIS, GPS, LiDAR; object detection, classification, tracking
        - label: Edge AI Compute (NVIDIA Jetson Orin)
          detail: Onboard inference for vision, reasoning, navigation models; EMCON-capable
        - label: Hardware Platforms
          detail: >-
            Six vessel classes: Spyglass (6ft) → Cutlass (14ft) → Corsair (24ft) → Mirage (40ft) → Cipher (60ft) →
            Marauder (150ft)
    claimRefs:
