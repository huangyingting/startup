      - number: '8.4'
        title: TAM, Revenue Visibility, and Contract Backlog
        blocks:
          - type: paragraph
            body: >
              Saronic's revenue visibility is anchored by the $392 million Navy Corsair Other Transaction Authority
              contract, which provides a contracted revenue floor through the initial delivery period. However, revenue
              beyond this single contract remains largely speculative. The company's total addressable market for
              autonomous surface vessels is estimated to exceed $10 billion when accounting for U.S. Navy demand across
              multiple USV classes, allied navy procurement, Coast Guard applications, and potential commercial maritime
              use cases including port security, offshore energy, and maritime surveillance. The Navy's FY2026 budget of
              $5.3 billion for unmanned maritime systems and the broader Pentagon autonomy budget of $13.4 billion
              signal strong government commitment. However, Saronic currently derives effectively 100% of production
              revenue from a single customer — the U.S. Navy — through a single contract vehicle. The SOCOM $8 million
              prototype engagement has concluded, the Coast Guard CRADA is non-revenue, and allied navy engagements
              remain pre-contractual despite advisory hires in the UK and Australia. Revenue diversification is
              therefore a critical execution challenge. The gap between TAM potential and current contract backlog is
              significant: the $392 million Corsair contract represents less than 4% of the estimated $10 billion+ TAM.
              Converting TAM to revenue requires winning competitive procurements against established primes, navigating
              ITAR export controls for international sales, and demonstrating production reliability at scale.
            claimRefs:
              - CV018
              - CV019
              - CV020
              - CV021
      - number: '8.5'
        title: Defense Tech Valuation Environment and Bubble Risk
        blocks:
          - type: paragraph
            body: >
              Saronic's valuation must be assessed in the context of a broader defense-tech funding environment that has
              drawn comparisons to previous technology bubbles. Venture capital investment in global defense technology
              reached nearly $49.1 billion in 2025, nearly double 2024 levels, driven by the urgency of Ukraine conflict
              lessons, U.S.-China competition, and Pentagon modernization priorities. A record number of defense-tech
              startups achieved unicorn status in 2025, with median valuations soaring from $42.8 million to $146
              million. Retired Pentagon officials and sector analysts have publicly stated there is "clear evidence the
              bubble is real," particularly in AI-driven defense subsectors, citing circular funding patterns and
              valuations disconnected from technology readiness or deployable revenue. PitchBook analysis notes that
              while defense-tech valuations reflect genuine structural demand shifts, the pace of investment has created
              pockets of froth, with some companies commanding tech-like revenue multiples of 10–50x despite operating
              in hardware-intensive businesses with government-paced procurement cycles. Breaking Defense characterized
              2026 as a "make-or-break" year focused on execution — transitioning from prototype to repeatable
              production — warning that companies unable to demonstrate scalable manufacturing and reliable delivery
              will face sharp valuation corrections. Saronic's ~38x trailing revenue multiple, while comparable to peers
              like Shield AI and Anduril, is vulnerable to sentiment shifts if broader defense-tech valuations compress.
              The company's defense is that its value is grounded in strategic necessity: broken legacy shipbuilding
              supply chains, urgent Navy modernization, and a demonstrated production capability that distinguishes it
              from pre-revenue peers.
            claimRefs:
              - CV022
              - CV023
              - CV024
              - CV025
              - CV026
      - number: '8.6'
        title: Investment Thesis and Anti-Thesis
        blocks:
          - type: paragraph
            body: >
              The investment thesis for Saronic rests on four pillars: (1) dominant product-market fit as the leading
              autonomous surface vessel company with a production-ready platform and Navy contract validation; (2)
              massive and growing TAM driven by Navy fleet plans for 150+ USVs and $5.3 billion in FY2026 unmanned
              maritime funding; (3) strong venture syndicate including Kleiner Perkins, a16z, and Advent International
              providing capital runway exceeding $2.5 billion; and (4) strategic positioning as a software-first
              shipbuilder offering margins potentially closer to defense software companies than legacy shipbuilders.
              The anti-thesis challenges each pillar: (1) product validation is limited to a single vessel class under a
              single OTA contract — the Corsair — with a mid-2025 collision incident raising questions about autonomy
              software reliability; (2) TAM estimates are aspirational, with current contracted revenue representing
              less than 4% of the projected market and ITAR constraints limiting international access; (3) the capital
              burn rate required to build and operate two shipyards creates substantial dilution risk if production
              targets are missed; and (4) achieving software-like margins is unproven in hardware-intensive
              shipbuilding, where traditional primes operate at 8–10% margins despite decades of optimization. The April
              2026 bid protest outcome will serve as a near-term signal of whether Saronic can expand beyond its initial
              OTA into competitive Navy procurements. An adverse ruling could constrain the company's addressable
              contract pipeline and pressure valuations.
            claimRefs:
              - CV027
              - CV028
              - CV029
              - CV030
          - type: table
            tableRef: TV002
