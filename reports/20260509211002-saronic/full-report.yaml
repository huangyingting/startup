      - number: '3.4'
        title: International Competitors
        blocks:
          - type: paragraph
            body: >
              Kongsberg Maritime of Norway brings deep autonomous maritime experience with its HUGIN UUV platform and
              has expanded into surface vessels. At DSEI 2025, Kongsberg Discovery introduced the K3 SCOUT USV, a
              compact modular catamaran for ISR in littoral environments with up to 36 hours of endurance and AI-driven
              autonomy. Kongsberg signed contracts in 2025 to deliver additional 24-meter uncrewed vessels to REACH
              Subsea, and Leidos Australia signed an MOU with Kongsberg at Indo Pacific 2025 to explore integration of
              the Naval Strike Missile onto USVs, which could enable armed autonomous surface platforms. Hanwha Ocean of
              South Korea unveiled the Ghost Commander II manned-unmanned teaming vessel concept at MADEX 2025 and
              presented combat USVs with swarm operation capability. Hanwha Ocean also revealed an AI-powered stealth
              warship concept requiring only 70 crew members, with modular mission bays for unmanned systems, and the
              ROK Navy's Sea Ghost program has assigned Hanwha to develop large USVs for reconnaissance and mine
              warfare. Elbit Systems of Israel deploys the Seagull USV, a 12-meter multi-mission platform for
              anti-submarine warfare, mine countermeasures, and maritime security with over 96 hours of autonomous
              operation. The fourth-generation Seagull, showcased at NAVDEX 2025, features enhanced modularity and drone
              integration. Rafael's Protector USV is a 9-11 meter armed platform for harbor defense. Both Israeli
              companies have operational export contracts with NATO-aligned navies. China's CSSC has unveiled the
              JARI-USV-A, a 58-meter trimaran displacing 300-500 tonnes with AESA radar, 4-12 VLS cells, and 40-knot
              speed — the world's largest combat-capable USV as of 2025, currently in sea trials and designed for
              coastal defense and export.
