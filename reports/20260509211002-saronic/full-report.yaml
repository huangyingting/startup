      - number: '2.3'
        title: Buyer and Segment Map
        blocks:
          - type: paragraph
            body: >-
              The USV market has a narrow buyer base dominated by government defense agencies, with the US Department of
              Defense as the single largest customer globally. Within the DoD, the primary buyer is the US Navy, which
              is consolidating its MUSV and LUSV programs into the Future USV / Modular Attack Surface Craft (MASC)
              program. Budget ownership sits with the Office of the Secretary of the Navy and the Program Executive
              Office for Unmanned and Small Combatants (PEO USC), with congressional oversight through the House and
              Senate Armed Services Committees. The Defense Innovation Unit (DIU) acts as an accelerant buyer for rapid
              prototyping and fielding of autonomous maritime capabilities under the Replicator initiative. Allied
              navies — including the Royal Navy (UK), Royal Australian Navy, Japan Maritime Self-Defense Force, and NATO
              partners — represent secondary buyers pursuing interoperable USV platforms for mine countermeasures, ISR,
              and force protection. Commercial buyers for USVs are nascent and concentrated in offshore energy (oil and
              gas survey), hydrographic survey, and port security, representing less than 20% of total market revenue
              today. The payer in defense procurement is the taxpayer via congressional appropriation; budget cycles are
              annual with multi-year procurement authority for shipbuilding. The adoption trigger for military buyers is
              the strategic imperative to offset the US-China shipbuilding gap: China's shipbuilding capacity is
              estimated at over 200 times that of the United States, and its navy has grown to approximately 400 vessels
              versus the US fleet of approximately 290, creating structural demand for cost-effective autonomous force
              multipliers.
            claimRefs:
              - CM016
