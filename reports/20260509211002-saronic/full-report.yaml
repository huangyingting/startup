              Bessemer Venture Partners, DFJ Growth, BAM Elevate, and Franklin Templeton, valuing the company at $9.25
              billion. The rapid valuation trajectory from $1 billion to $9.25 billion in approximately 20 months
              reflects both strong investor confidence and the broader defense technology funding environment. Saronic
              has notably relied on private venture capital rather than government seed funding to build its operations.
