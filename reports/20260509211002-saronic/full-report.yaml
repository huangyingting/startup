      - number: '7.3'
        title: Partner and Dependency Risk — Customer Concentration and Supply Chain
        blocks:
          - type: paragraph
            body: >
              Saronic's most acute structural risk is extreme single-customer concentration. The U.S. Navy represents
              effectively 100% of current production revenue through the $392M Corsair OTA contract. All other customer
              engagements are either concluded (SOCOM $8M prototype), non-revenue (Coast Guard CRADA), or
              pre-contractual (allied navy advisory hires). This concentration creates vulnerability to Navy budget
              cycles, program reprioritization, procurement office leadership changes, or policy shifts. The April 2026
              bid protest illustrates that Saronic cannot assume guaranteed access to adjacent Navy contract
              opportunities. Supply chain dependency adds another risk layer. Saronic's autonomous vessels require
              specialized components including marine-grade semiconductors, LIDAR and radar sensor suites, NVIDIA GPU
              modules for autonomy processing, and marine propulsion systems. Global semiconductor supply constraints,
              while easing from 2021-2023 peaks, remain a risk for specialized defense-grade components subject to DMEA
              obsolescence concerns. Saronic's vertical integration strategy mitigates some supply chain risk by
              internalizing software and systems integration, but hull materials, propulsion components, and sensor
              hardware remain externally sourced. The company's dependency on NVIDIA for GPU computing creates
              single-vendor technology risk. Additionally, Saronic's payload integration partnerships — demonstrated
              with Anduril's ALTIUS munition and Lattice C2 system — create bilateral dependency where partner
              technology roadmap changes could affect Saronic's mission capabilities.
            claimRefs:
              - CR011
              - CR012
