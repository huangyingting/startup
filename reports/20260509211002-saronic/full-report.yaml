        - Confirm whether USVs are funded as augmentation or substitution for crewed ships
      - - Future USV / MASC program consolidation
        - Positive driver
        - Medium-term / FY2027+
        - Merger of MUSV and LUSV into single modular program signals production-scale commitment
        - Track Milestone B decision and production RFP timeline
      - - Replicator initiative
        - Positive driver
        - Near-term / 2024–2026
        - Rapid fielding mandate for thousands of autonomous systems including USVs
        - Assess Replicator Phase 2 scope and whether USVs remain a priority category
      - - Declining crewed ship inventory
        - Positive driver
        - Structural / now
        - US fleet projected below 290 ships vs 355+ requirement; USVs fill capacity gap
        - Verify Navy force structure assessment and USV-to-crewed-ship substitution ratios
      - - HASC $3.1B unmanned vessel earmark
        - Positive driver
        - Near-term / FY2026
        - Largest congressional signal of unmanned vessel production commitment
        - Track bill through conference and final appropriation
      - - Asia-Pacific security competition
        - Positive driver
        - Structural
        - Indo-Pacific tensions drive demand for distributed maritime operations and autonomous ISR
        - Assess allied procurement budgets and interoperability requirements
      - - Program-execution risk (Orca precedent)
        - Constraint
        - Ongoing
        - Orca XLUUV 64% cost overrun; CONOPS for unmanned integration remain partially defined
        - Request Saronic's cost and schedule performance data on Corsair deliveries
      - - Congressional budget uncertainty
        - Constraint
        - Annual
        - USV funding subject to continuing resolutions, holds, and reliability demonstration gates
        - Monitor annual defense appropriations and Navy shipbuilding account specifically
      - - Industrial base limitations
        - Constraint
        - Medium-term
        - Only 4 major US public shipyards; scaling USV production requires private investment
        - Assess Saronic's Louisiana shipyard capacity and supply chain resilience
      - - Autonomous technology maturity
