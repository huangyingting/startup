            body: >
              Traditional SaaS retention metrics (NRR, GRR, cohort churn) do not apply to Saronic's defense contracting
              model. Instead, customer retention is assessed through contract expansion signals, repeat engagement, and
              program continuity. The strongest retention indicator is the Navy's progression from initial prototype
              testing to a $392M production contract — a qualitative signal of deep program satisfaction. The OTA
              structure with delivery batches through 2031 creates a multi-year committed relationship. SOCOM's separate
              $8M prototype contract, while concluded, validated Saronic's USV platform for a distinct mission set and
