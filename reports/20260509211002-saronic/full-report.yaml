            body: >
              Saronic has completed four major funding rounds since its founding, raising a cumulative total exceeding
              $2.58 billion. The Series A round closed in October 2023 at $55 million, led by Caffeinated Capital with
              participation from 8VC, Andreessen Horowitz, Lightspeed Venture Partners, and Point72 Ventures. The Series
              B round in July 2024 raised $175 million led by Andreessen Horowitz, valuing the company at $1 billion and
