      - number: '3.5'
        title: Status Quo and Substitutes
        blocks:
          - type: paragraph
            body: >
              The primary competitive alternative to autonomous surface vessels remains the traditional manned warship.
              The Navy's current manned shipbuilding budget outweighs unmanned procurement by a factor of approximately
              600 to 1, reflecting deep institutional and political preference for crewed vessels. Two U.S. senators
              publicly advocated stopping work on the Large Unmanned Surface Vehicle program, and Congressional scrutiny
              continues over autonomous system reliability, cost, and cybersecurity. The status quo benefits from an
              entrenched industrial base with established congressional support, experienced crews, and proven combat
              records. Adoption of USVs requires not only technological maturation but cultural and doctrinal shifts
              within the Navy, as few sailors currently know how to operate unmanned platforms at the deckplate level.
              Domain substitutes include unmanned underwater vehicles such as Boeing's Orca XLUUV program (which has
              suffered years of delays and budget overruns) and unmanned aerial vehicles, both of which compete for the
              same defense budget and mission sets including ISR, strike, and mine countermeasures. Internal build
              remains a theoretical option for the Navy through NAVSEA and government shipyards, though the Navy's
              FY2025 strategy has moved toward commercially derived designs from private vendors, favoring companies
              like Saronic that can deliver production-ready platforms on accelerated timelines.
            claimRefs:
              - CP035
              - CP036
              - CP037
              - CP038
              - CP039
      - number: '3.6'
        title: Switching Costs, Lock-in, and Distribution Power
        blocks:
          - type: paragraph
            body: >
              Switching costs in defense autonomous maritime are driven by four mechanisms: autonomy software
              integration, supply chain infrastructure, regulatory certification, and operational familiarity. Once the
              Navy invests in training operators, developing tactics, and integrating a vendor's autonomy stack with
              existing combat management systems (such as the Common Control System under Project Overmatch), switching
              to an alternative platform incurs significant retraining and integration costs. Saronic's unified autonomy
              stack across its entire vessel family — from the 6-foot Spyglass to the 180-foot Marauder — creates a
              coherent software ecosystem that deepens lock-in as the fleet scales. However, the Navy's deliberate push
              toward modular, open-architecture designs reduces hardware-level lock-in, and the Common Control System is
              designed to command multiple vendor platforms through unified interfaces. Multi-homing risk is real: the
              Navy's open marketplace model explicitly encourages procuring USVs from multiple vendors simultaneously,
              which limits any single vendor's ability to capture exclusive program-of-record status. Distribution power
              tilts toward incumbents like L3Harris and Textron, which have decades of government contracting
              relationships, established DCAA-compliant cost accounting, and lobbying infrastructure that newer entrants
              must build from scratch. Saronic's $2.58 billion in venture funding partially offsets this through the
              ability to self-fund production capacity without waiting for government milestone payments. Supply and
              partner access is a differentiator: Saronic's acquisition of Gulf Craft shipyard in Louisiana and its
              planned Port Alpha facility give it owned manufacturing capacity, while competitors like L3Harris rely on
              subcontractor networks for vessel construction.
            claimRefs:
              - CP004
              - CP005
              - CP006
              - CP040
              - CP041
              - CP042
      - number: '3.7'
        title: Moat Durability and Commoditization Risk
        blocks:
          - type: paragraph
            body: >
              Saronic's competitive moat rests on three pillars: manufacturing velocity, autonomy software
              differentiation, and capital depth. The company achieved one of the fastest prototype-to-production
              transitions in modern naval procurement, winning its $392 million Corsair production contract in under one
              year from first Navy engagement. Its $2.58 billion in venture capital provides a financial runway that no
              other USV-focused startup can match, though Anduril's $6.3 billion in funding and $30.5 billion valuation
              dwarf Saronic's resources in the broader defense-tech ecosystem. Commoditization risk is moderate: as the
              Navy pushes toward open-architecture, modular payload designs with common control interfaces, the hardware
              platform risks becoming interchangeable. The key differentiator shifts to autonomy software quality,
              manufacturing cost efficiency, and time-to-delivery. Saronic's vertically integrated approach — owning its
              shipyards and developing its autonomy stack in-house — provides cost structure advantages that
              horizontally integrated competitors (who subcontract vessel construction) may struggle to match. However,
              the LUSV/MUSV program merger and the shift to a marketplace model mean that program-of-record exclusivity
              is unlikely; multiple vendors will coexist. The greatest displacement risk comes from Anduril, which has
              the financial resources, software talent, and defense relationships to enter the surface vessel market at
              scale if it chooses to expand beyond undersea platforms. The Chinese JARI-USV-A, while not a direct
              commercial competitor, poses a strategic framing risk: if China fields large autonomous warships at scale,
              it could accelerate U.S. procurement timelines but also attract more competitors to the market.
            claimRefs:
