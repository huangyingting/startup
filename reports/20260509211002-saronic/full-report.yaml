      - number: '5.6'
        title: Technology Differentiation and Competitive Moats
        blocks:
          - type: paragraph
            body: >
              Saronic's core differentiators span three interlocking domains: software-first design, vertically
              integrated manufacturing, and rapid prototype-to-production speed. Unlike traditional defense primes that
              treat software as an add-on to hull design, Saronic develops autonomy and mission software as the primary
              design driver, with hardware platforms built around the software stack. This approach enables common
              autonomy across all six vessel classes, allowing operators to manage heterogeneous fleets through a single
              mission control interface. Vertical integration of hardware, software, and AI manufacturing allows the
              company to iterate rapidly and produce at scale while controlling costs — the company claims this results
              in lower unit costs compared to traditional naval procurement. The prototype-to-production timeline of
              under 12 months for the Corsair represents an order-of-magnitude improvement over conventional defense
              acquisition. Additionally, Saronic's open modular architecture enables rapid integration of third-party
              sensors, payloads, and technologies without core system re-engineering, giving the Navy the payload
              flexibility it requires for "truck-like" unmanned vessel platforms. The NVIDIA partnership adds a further
              differentiator through edge AI compute capabilities that enable fully autonomous operations under EMCON
              conditions without reliance on continuous communications links. Saronic also holds MOUs with ABS for
              autonomous classification frameworks, Vigor Marine for small-vessel fabrication, and Palantir Technologies
              for AI-driven analytics integration.
            claimRefs:
              - CE034
              - CE035
              - CE036
              - CE037
              - CE038
              - CE039
      - number: '5.7'
        title: Trust, Safety, Security, and Compliance
        blocks:
          - type: paragraph
            body: >
              Saronic operates within the heavily regulated defense industrial base, requiring compliance with multiple
              security, safety, and quality frameworks. As a defense contractor providing classified and sensitive
              autonomous vessel systems to the U.S. Navy, the company must maintain appropriate facility security
              clearances and personnel clearances for classified programs. The company's Chief Information Security
              Officer, Eric Murphy, oversees cybersecurity across vessel systems, communications, and corporate
              infrastructure. Saronic's autonomous navigation systems must comply with COLREGs (International
              Regulations for Preventing Collisions at Sea) to ensure safe autonomous operations in both open water and
              congested maritime environments. The company's vessels are subject to ITAR (International Traffic in Arms
              Regulations) export controls given their defense applications, restricting technology transfer to foreign
              entities. During Navy tests off the California coast, incidents were reported involving software glitches
              that caused a Corsair ASV to stall, followed by a collision involving another vendor's vessel —
              highlighting the maturation challenges inherent in autonomous maritime operations. These setbacks have
              prompted increased emphasis on software validation, interoperability testing, and human oversight
              protocols. Saronic's MOU with ABS (American Bureau of Shipping) explores autonomous classification
              frameworks that could establish industry standards for certifying unmanned vessel safety and reliability.
              Quality assurance practices are consistent with defense procurement requirements, though specific
              certifications such as ISO 9001 or AS9100 have not been publicly disclosed.
            claimRefs:
              - CE040
