      - number: '4.2'
        title: Go-to-Market Motion and Sales Efficiency
        blocks:
          - type: paragraph
            body: >
              Saronic's go-to-market strategy is structured around government defense procurement channels rather than
              commercial sales motions. The company's primary sales channel is the Department of Defense acquisition
              system, specifically Other Transaction Authority (OTA) agreements, which bypass traditional Federal
              Acquisition Regulation processes to enable faster contracting. The Corsair contract exemplifies this
              approach: Saronic went from prototype to production in under 12 months, a pace that Navy Secretary John
              Phelan cited as a new standard for acquisition speed. The sales cycle for defense contracts typically
              ranges from 6 to 36 months, but Saronic's OTA pathway compressed this timeline significantly. Customer
              acquisition cost proxies are difficult to estimate for defense contractors, but Saronic's strategy of
              investing in production infrastructure before contract awards — building vessels at its own expense to
              demonstrate capability — functions as an upfront investment that de-risks the procurement decision for the
              government buyer. The company initially developed the Corsair as part of the Pentagon's Replicator
              program, designed to field swarms of low-cost unmanned platforms, which served as an effective
              product-market validation channel. Saronic has also participated in RIMPAC exercises and Navy
              demonstrations, which serve as marketing and capability-validation events. The Navy's recent pivot to a
              marketplace model for medium unmanned surface vessels creates a recurring competitive bidding environment
              that could benefit Saronic's rapid production capabilities, though it also opens the aperture for
              additional competitors. International sales to allied nations represent a potential second growth vector,
              but require separate Foreign Military Sales or Direct Commercial Sales approval processes that add 12-24
              months to the sales cycle.
            claimRefs:
              - CI008
              - CI009
              - CI010
              - CI011
              - CI012
      - number: '4.3'
        title: Cost Structure and Gross Margin Drivers
        blocks:
          - type: paragraph
            body: >
              Saronic's cost structure is dominated by hardware manufacturing costs typical of defense shipbuilding: raw
              materials (primarily aluminum for hull construction), labor, propulsion systems, sensors, and autonomy
              hardware including compute modules, cameras, and communication systems. Defense hardware contractors
              typically operate at 10-20% gross margins under cost-plus contracts, with fixed-price contracts offering
              potential for higher margins but carrying greater execution risk. Sacra estimates Saronic's target gross
              margin at 45% at full manufacturing capacity, which would be exceptionally high by traditional defense
              hardware standards and likely reflects the software-defined nature of the autonomy stack amortized across
              a large production volume. The 45% figure may be achievable for smaller vessels like the Corsair (priced
              at $1.2M with relatively low material costs for a 24-foot boat) but would be challenging to maintain on
              the 180-foot Marauder class. Key margin drivers include production volume (spreading fixed costs across
              more units), vertical integration at the Franklin and future Port Alpha shipyards, and the reuse of a
              common autonomy software stack across all vessel sizes — from the 6-foot Spyglass to the 180-foot
              Marauder. Saronic has reported a 25% efficiency gain between its first and second Marauder hull builds,
              suggesting a meaningful learning curve effect. Labor costs are significant: the Franklin shipyard plans to
              employ 1,500 workers at an average annual salary of approximately $88,000, implying over $130 million in
              annual direct labor costs at that facility alone. Working capital requirements are substantial given the
              need to purchase materials and begin fabrication before contract milestone payments are received.
            claimRefs:
              - CI013
              - CI014
              - CI015
              - CI016
              - CI017
              - CI018
