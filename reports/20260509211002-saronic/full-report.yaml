            body: >
              Saronic's revenue growth trajectory is extraordinary for a hardware defense company. Revenue grew from
              approximately $12.5 million in 2024 to an estimated $200–400 million in 2025, representing roughly 1,500%
              year-over-year growth driven primarily by the $392M Navy Corsair production contract. The company's
              valuation trajectory reflects this momentum: $1 billion post-money at Series B (July 2024, $175M led by
              Andreessen Horowitz), $4 billion at Series C (February 2025, $600M), and $9.25 billion at Series D (March
              2026, $1.75B led by Kleiner Perkins). Total capital raised exceeds $2.5 billion. The path from prototype
              to production contract in under 12 months — the Navy expects Corsair deliveries before end of 2026 —
              represents one of the fastest defense acquisition timelines in modern procurement history, enabled by the
              OTA mechanism which bypasses traditional FAR-based contracting. Saronic's $300 million investment in
              expanding its Franklin, Louisiana shipyard, adding 1,500 jobs and capacity for both Corsair and the larger
              Marauder vessel, signals production-scale confidence. The company claims manufacturing capacity to deliver
