  - number: 2
    title: Market Analysis
    sections:
      - number: '2.1'
        title: Market Definition and Boundary
        blocks:
          - type: paragraph
            body: >-
              Saronic competes in the unmanned surface vehicle (USV) segment of the defense maritime systems market,
              with its primary addressable market being US Department of Defense procurement of autonomous warships and
              patrol craft. The core market includes medium and large USVs (MUSVs and LUSVs) designed for surface
              warfare, intelligence surveillance and reconnaissance (ISR), electronic warfare, mine countermeasures, and
              logistics missions. These are distinct from small unmanned surface vehicles (sUSVs), which are typically
              man-portable or launched from crewed ships and fall outside Saronic's current product line. The broader
              autonomous ship market — encompassing commercial shipping, offshore energy support, port operations, and
              environmental monitoring — represents an adjacent opportunity but is not Saronic's near-term addressable
              market. Status-quo substitutes include crewed warships (destroyers, frigates, patrol craft) that perform
              the same missions at higher operating cost and crew risk, as well as unmanned aerial vehicles (UAVs) and
              unmanned undersea vehicles (UUVs) that address overlapping ISR and strike missions through different
              domains. The inclusion perimeter for sizing purposes in this chapter is: (1) the global USV market as
              defined by analyst reports (MarketsandMarkets, Mordor Intelligence, Grand View Research, Fortune Business
              Insights), (2) the US Navy medium and large USV procurement pipeline, and (3) the broader military
              unmanned maritime systems market as a ceiling estimate that includes UUVs and related platforms.
            claimRefs:
              - CM001
              - CM002
              - CM003
              - CM004
              - CM005
          - type: table
            tableRef: TM001
            claimRefs:
              - CM001
              - CM002
