company:
  name: Saronic
chapter:
  number: 8
  title: Valuation
  letter: V
  summary: >-
    Saronic's March 2026 Series D raised $1.75B at a $9.25B post-money valuation, more than doubling its $4B Series C
    valuation from just thirteen months earlier. At an implied ~38x trailing revenue multiple on estimated 2025 revenue
    of ~$200M, Saronic trades at a significant premium to public defense primes (1–5x EV/revenue) but within the range
    of venture-backed defense-tech peers such as Shield AI (~23x) and Anduril (~30–38x). The valuation is anchored in a
    $392M Navy Corsair contract backlog, $5.3B in FY2026 Navy unmanned maritime systems budget, and a long-term TAM
    exceeding $10B. Key risks include extreme customer concentration, production scaling uncertainty, bid protest
    outcomes, and broader defense-tech bubble concerns. Bull-case upside to $15–20B hinges on allied navy expansion and
    Navy fleet plans for 150+ medium USVs; bear-case downside to $3–5B reflects contract delays, competition from
    primes, and valuation compression.
