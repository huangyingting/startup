sections:
  - id: sec-funding-history
    title: Funding History and Valuation Trajectory
    body: >
      Saronic's funding trajectory reflects one of the fastest valuation escalations in defense technology history. The
      company raised a seed round in 2022 at an undisclosed valuation, followed by a $55 million Series A in October
      2023. The Series B of $175 million in June 2024 valued the company at approximately $1 billion. Just eight months
      later, a $600 million Series C in February 2025 pushed the valuation to $4 billion — a 4x increase from Series B.
      The March 2026 Series D of $1.75 billion at a $9.25 billion post-money valuation represents a further 2.3x step-up
      in just thirteen months. Total capital raised now exceeds $2.58 billion. The Series D was led by Kleiner Perkins
      with participation from Advent International, Bessemer Venture Partners, DFJ Growth, BAM Elevate, 8VC, Caffeinated
      Capital, and continuing investors Andreessen Horowitz, Elad Gil, and Franklin Templeton. The round's size — $1.75
      billion — is the largest single fundraise in the maritime defense-tech sector and places Saronic among the top
      five most valuable private defense-tech companies globally. The rapid valuation growth has been driven by the
      convergence of accelerating Navy demand for autonomous surface vessels, Saronic's early production contract wins,
      and a historically aggressive venture capital cycle for defense technology. However, each successive round has
      required progressively larger capital infusions to sustain valuation growth, raising questions about whether
      future fundraises or an eventual IPO can maintain this trajectory.
    claimRefs:
      - CV001
      - CV002
      - CV003
      - CV004
      - CV005
    tableRefs:
      - TV001
    figureRefs:
      - FV004
  - id: sec-comparable-analysis
    title: Comparable Company and Multiple Analysis
    body: >
      Saronic's $9.25 billion valuation implies a trailing revenue multiple of approximately 38x based on estimated 2025
      revenue near $200 million. This places the company at a significant premium to publicly traded defense primes:
      Huntington Ingalls Industries trades at approximately 1.3x EV/revenue, L3Harris at approximately 3.0x, and
      AeroVironment — the closest public-market analog as an unmanned systems specialist — at approximately 4.9x. Among
      venture-backed defense-tech peers, Saronic's multiple is broadly comparable: Shield AI achieved a $12.7 billion
      valuation in March 2026 on projected revenue above $540 million, implying a ~23x forward multiple. Anduril's
      January 2026 valuation of $37.95 billion on estimated revenue exceeding $1 billion implies a ~30–38x multiple.
      Helsing, the European defense-AI leader, trades at over 50x estimated revenue. Palantir, as a scaled
      defense-adjacent software platform, trades at approximately 42x forward revenue. Joby Aviation, a pre-revenue
      autonomous vehicle company, trades at 87–137x trailing revenue, demonstrating the extreme multiples available to
      autonomous platform companies with limited current revenue. The gap between Saronic's multiple and traditional
      defense primes reflects investor expectations that Saronic will achieve software-like margins and rapid revenue
      scaling rather than the 8–10% operating margins typical of legacy shipbuilders. Whether this premium is justified
      depends on contract backlog conversion, production ramp execution, and the size of the addressable autonomous
      maritime market.
    claimRefs:
      - CV006
      - CV007
      - CV008
      - CV009
      - CV010
      - CV011
      - CV012
