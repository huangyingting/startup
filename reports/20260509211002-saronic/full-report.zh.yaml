      - number: '1.5'
        title: 里程碑与规模
        blocks:
          - type: paragraph
            body: >
              Saronic 自 2022 年成立后增长很快。到 2026 年初，员工数超过 1,300；运营覆盖 Austin 多个园区，总面积超过 500,000 平方英尺；通过收购 Gulf Craft 获得
              Louisiana 州 Franklin 造船厂，并在 San Diego、Washington D.C.、英国和 Australia 设立新办公室。Gulf Craft
              收购立即带来造船厂产能和熟练工人，用于中型 USV 原型和量产；收购设施后不到六个月，首个 Marauder 船体即完成。Saronic 承诺投入 $300M，将 Louisiana 造船厂扩建超过
              300,000 平方英尺，预计在当地创造 1,500 个新岗位。公司还在开发 Port Alpha，称其为下一代造船厂，规模约为 Franklin 设施的 10 倍。2025 年 12 月，Saronic 拿下
              $392M 海军 Corsair 量产合同，代表现代海军采购中最快的原型到量产转换之一。公司入选 Fast Company 2026 年 Most Innovative Companies 榜单，并被海军部长
              John C. Phelan 称为海军采购快速创新的代表。
