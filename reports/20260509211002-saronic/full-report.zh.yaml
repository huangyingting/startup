              Saronic 管理层横跨军队、科技和商业。CEO 兼联合创始人 Dino Mavrookas 有 SEAL Team Six 一线军事经历，也在 Vista Equity Partners 与 H.I.G.
              Capital 做过私募股权。联合创始人 Doug Lambert 担任 COO，负责制造和运营。Rob Lehman 是 CCO，负责客户互动和业务拓展。Vibhav Altekar 是 CTO，主导自主系统和
