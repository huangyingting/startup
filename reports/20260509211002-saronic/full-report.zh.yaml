      - number: '7.2'
        title: 运营、质量与安全风险 — 测试挫折和网络暴露
        blocks:
          - type: paragraph
            body: >
              2025 年中加州海岸外海军测试中的碰撞事故，显著抬高了 Saronic 的运营风险。一艘 Saronic Corsair 疑似因软件 bug 停摆，随后一艘自主运行的 BlackSea Technologies
              GARC 舰艇撞上静止的 Corsair，并骑上其甲板。该事件是海军无人系统开发项目的一系列挫折之一，并促成 Rear Admiral Kevin Smith 被免去 PEO Unmanned and Small
              Combatants 指挥职务。这些挫折促使 Pentagon 领导层质疑海上自主系统的准备度，并引发对软件可靠性、跨平台互操作性和人类监督规程是否充分的担忧。质量风险还延伸到 Saronic
              快速扩大生产：从原型转向自主舰艇批量生产，会带来制造缺陷、硬件与自主软件集成失败，以及在员工规模从约 100 人扩至 1,500
              多人时维持质量标准的挑战。网络安全是关键且不断扩大的风险向量。自主军用舰艇是对手网络行动的高价值目标，攻击方式包括 GPS 欺骗、指挥控制链路干扰、通过对抗输入操纵 AI
              模型，以及嵌入式软件供应链攻击。海军转向分布式自主作业后，攻击面也相应扩大。Saronic 的垂直整合自主栈必须满足严格的 DoD 网络安全标准（CMMC
              2.0），同时保持风险投资支持初创公司所需的快速迭代节奏。
