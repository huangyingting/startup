      - number: '6.3'
        title: 具名客户证据 — 合同与接触
        blocks:
          - type: paragraph
            body: >
              Saronic 已确认的客户接触集中在防务领域，但合同成熟度不同。美国海军是唯一量产合同客户；$392M Corsair OTA 是可信度最高的证据点。该合同通过 PEO USC 处理，预计 2026
              年底前交付。SOCOM 通过一份 2024 年 7 月结束的 $8M 原型合同与 Saronic 合作，验证 USV 在特殊作战任务集中的应用。Defense Innovation Unit（DIU）把
              Corsair 列入 Replicator 计划生产目录，形成机构背书，有助于更广泛的 DoD 采用。美国海岸警卫队 2025 年 11 月 CRADA 是正式研究合作而非采购承诺，但显示机构层面对基于 USV
              的海事域感知感兴趣。国际上，Saronic 在伦敦 DSEI 2025 展示产品，并在澳大利亚和英国任命退役将官担任战略顾问；但尚无盟友海军生产合同公开宣布。2024 年 4 月 Navy Integrated
              Battle Problem 24.1 期间，Saronic 与 Anduril 的 ALTIUS 巡飞弹完成载荷集成，证明第三方生态兼容性；Anduril 的 Lattice C2
              软件提供指挥控制。这一合作验证很重要，但不代表直接客户关系。没有商业客户得到公开确认。
