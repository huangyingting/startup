              - CV011
              - CV012
      - number: '8.3'
        title: 乐观、基准与悲观情景分析
        blocks:
          - type: paragraph
            body: >
              乐观情景认为，Saronic 到 2028 年可值 $15–20B，前提是多条增长线都能跑通。美国海军 FY2026 预算为无人海事系统拨款 $5.3B，其中 $1.7B
              专门用于自主水面舰艇。美国海军长期舰队规划设想部署 150 艘或更多中型无人水面舰艇，作为混合舰队的一部分；到 2045 年，该舰队最多可能 45% 为无人平台。如果 Saronic
              拿下这一市场的主导份额，并借助 AUKUS 和双边协议扩展到盟国海军，2028 年前瞻收入可能超过 $1B，以 15–20x 前瞻收入支撑 $15–20B 估值。基准情景假设 $392M Corsair
              合同稳步执行，Franklin 船厂成功扩产到每年 20 艘，并拿到少量增量合同，因此当前 $9.25B 估值区间维持到 2028 年。基准情景下，2028 年收入达到 $400–600M；公司成熟后，倍数从
              38x 历史收入压缩到 15–23x 前瞻倍数。悲观情景下，估值降至 $3–5B，驱动因素包括合同延迟或取消、2026 年 4 月竞标抗议结果不利、Louisiana
              船厂生产失败，或国防科技风投估值整体回调。悲观情景中，收入停在 $200–300M，倍数压缩到 10–15x，Saronic 可能需要以降估值融资补充资本。一个关键风险是，L3Harris、Textron 或
              Huntington Ingalls 等国防主承包商借助既有造船基础设施，以更低成本方案成功进入自主 USV 市场。
            claimRefs:
              - CV013
              - CV014
              - CV015
              - CV016
              - CV017
