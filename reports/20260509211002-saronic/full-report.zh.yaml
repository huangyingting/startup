      - number: '5.3'
        title: NVIDIA 合作与边缘计算
        blocks:
          - type: paragraph
            body: >
              2025 年 10 月，Saronic 与 NVIDIA 宣布战略合作，将 NVIDIA 加速计算平台和 Physical AI 能力整合进 Saronic 自主舰艇舰队。NVIDIA Jetson Orin
              边缘计算模块嵌入所有 Saronic 舰艇，使视觉、推理和导航模型能在艇上实时运行；即便处于排放控制（EMCON）条件、射频连接受限，性能也能维持。Saronic
              表示，合作显著压缩开发周期，以前需要数天的任务现在几小时即可完成。双方联合研发聚焦 NVIDIA AI 库和开发环境在海军平台上的新应用，目标是提升多智能体自主、韧性和海上战备能力。除舰艇自主外，合作还延伸到用
              AI 驱动设计、虚拟设施方案和制造优化仿真能力，推动美国造船现代化。该合作与更广泛的美国政策议程一致，包括 Restoring America's Maritime Dominance 行政令和 SHIPS
              Act，体现两家公司借助 AI 重工业化美国本土海事产业的共同兴趣。
            claimRefs:
              - CE015
              - CE016
              - CE017
              - CE018
      - number: '5.4'
        title: 制造基础设施与垂直整合
        blocks:
          - type: paragraph
            body: >
              Saronic 运营跨多处设施的垂直整合制造模式。公司位于 Texas Austin 的总部包括两处生产园区，总面积超过 600,000 平方英尺，可通过自研硬件和软件全栈集成，每年生产数千艘小型
              ASV。2025 年中，Saronic 收购了 Gulf Craft，这是一家位于 Louisiana Franklin、拥有 60
              多年造船历史和熟练工人的船厂，公司由此立即获得中大型无人水面舰艇原型制造和生产能力。Saronic 承诺投入 $300 million 扩建 Franklin 船厂，新增 300,000
              多平方英尺产能，包括三条新建造滑道、仓库扩建，以及 Marauder 级舰艇专用生产线。建设目标是在 2026 年底完工，2027 年初达到满负荷运营。扩建预计创造 1,500 个直接岗位，平均年薪约
              $87,936，并带来约 1,770 个间接岗位。截至 2025 年底，Franklin 有两艘 Marauder 船体在建，首艘预计当年底下水，2027 年计划产量为 20 艘。Port Alpha 是
              Saronic 规划的下一代船厂，愿景是美国最先进、专门生产大型自主舰艇的设施，预计投资 $5 billion；但具体选址尚未公开。
            claimRefs:
