      - number: '8.4'
        title: TAM、收入可见性与合同储备
        blocks:
          - type: paragraph
            body: >
              Saronic 的收入可见性由 $392M 美国海军 Corsair 其他交易授权合同锚定，该合同在初始交付期内提供了已签约收入底线。不过，单一合同之外的收入仍很大程度上停留在推测阶段。把美国海军多个 USV
              级别需求、盟国海军采购、海岸警卫队应用，以及港口安保、海上能源、海事监视等潜在商业海事场景都纳入后，公司自主水面舰艇总可用市场估计超过 $10B。美国海军 FY2026 为无人海事系统安排 $5.3B
              预算，五角大楼更广义自主预算达到 $13.4B，都释放出强烈政府投入信号。然而，Saronic 目前实际上只靠单一合同工具、从单一客户美国海军获得 100% 生产收入。SOCOM $8M
              原型合作已经结束，海岸警卫队 CRADA 不产生收入，尽管在英国和澳大利亚聘请了顾问，盟国海军合作仍处于签约前阶段。因此，收入多元化是关键执行难题。TAM 潜力与当前合同储备之间差距很大：$392M
              Corsair 合同不到估计 $10B+ TAM 的 4%。要把 TAM 转成收入，Saronic 必须在与成熟主承包商竞争的采购中胜出，为国际销售处理 ITAR 出口管制，并在规模化生产中证明可靠性。
            claimRefs:
              - CV018
              - CV019
              - CV020
              - CV021
      - number: '8.5'
        title: 国防科技估值环境与泡沫风险
        blocks:
          - type: paragraph
            body: >
              评估 Saronic 估值，必须放在更大的国防科技融资环境里看；这个环境已经被拿来和过往科技泡沫相比。2025 年，全球国防科技风险资本投资接近 $49.1B，几乎是 2024
              年的两倍，背后是乌克兰冲突经验的紧迫性、中美竞争和五角大楼现代化优先事项共同推动。2025 年，创纪录数量的国防科技创业公司跻身独角兽，中位估值从 $42.8M 飙升至
              $146M。五角大楼退休官员和行业分析师公开表示，“泡沫真实存在的证据很清楚”，尤其是在 AI 驱动的国防细分领域；他们引用循环融资模式，以及与技术成熟度或可部署收入脱节的估值作为依据。PitchBook
              分析指出，国防科技估值确实反映真实的结构性需求转向，但投资节奏已经制造局部泡沫：一些硬件密集型公司仍要按政府采购节奏推进，却拿到 10–50x 的科技公司式收入倍数。Breaking Defense 将 2026
              年描述为聚焦执行的 “make-or-break” 一年——从原型转向可重复生产；不能证明可规模化制造和可靠交付的公司，将面临剧烈估值修正。Saronic 约 38x 历史收入倍数虽然与 Shield
              AI、Anduril 等同行可比，但如果国防科技估值整体压缩，公司容易受到情绪转向冲击。Saronic
              的防线在于，价值基于战略必需性：传统造船供应链已经断裂，美国海军现代化迫切推进，而公司展现出的生产能力又使其区别于尚未有收入的同行。
            claimRefs:
              - CV022
              - CV023
              - CV024
              - CV025
              - CV026
      - number: '8.6'
        title: 投资逻辑与反向逻辑
        blocks:
          - type: paragraph
            body: >
              Saronic 的投资逻辑建立在四根支柱上：（1）作为领先自主水面舰艇公司，公司拥有可投产平台，并得到海军合同验证，产品-市场匹配强；（2）TAM 巨大且增长明确，美国海军规划 150+ 艘 USV，FY2026
              无人海事资金达 $5.3B；（3）Kleiner Perkins、a16z、Advent International 等强势风险投资方组成投资方组合，提供超过 $2.5B
              的资本跑道；（4）公司把自己定位为软件优先造船商，利润率潜在更接近国防软件公司，而不是传统造船商。反向逻辑逐条挑战这些支柱：（1）产品验证只限于单一 OTA 合同下的单一舰艇级别 Corsair，2025
              年中碰撞事件又让自主软件可靠性打上问号；（2）TAM 估计偏愿景化，当前签约收入不到预测市场的 4%，ITAR
              约束也限制国际市场进入；（3）建设并运营两座船厂所需烧钱速度很高，若产能目标落空，稀释风险会很大；（4）硬件密集型造船能否获得类似软件的利润率尚未证明，传统主承包商即便优化几十年，利润率也只有
              8–10%。2026 年 4 月竞标抗议结果，将成为近期信号，说明 Saronic 能否从最初 OTA 扩展到竞争性海军采购。不利裁定可能压缩公司可触达合同管线，并压低估值。
            claimRefs:
              - CV027
              - CV028
              - CV029
              - CV030
          - type: table
            tableRef: TV002
            claimRefs:
              - CV027
              - CV028
              - CV029
              - CV030
      - number: '8.7'
        title: 建议与关键尽调追问
        blocks:
          - type: paragraph
            body: >
              在当前 $9.25B 估值下，Saronic
              是一个有吸引力但高风险的投资机会。公司在战略关键市场里已经证明真实产品-市场匹配，并获得显著政府顺风。不过，估值内含生产规模化、合同多元化和利润率扩张三方面的大量执行风险。有条件的正面建议成立，但前提是几项关键尽调问题得到令人满意的解决：（1）独立核验
              Franklin 船厂产能，以及达到每年 20 艘产出的时间表；（2）披露详细单船经济性，包括每艘成本、按舰艇级别划分的毛利率，以及软件收入贡献；（3）Corsair OTA 之外的管线可见性，包括 MASC
              项目站位、盟国海军机会和海岸警卫队商业化状态；（4）2026 年 4 月竞标抗议得到解决，或走向有利；（5）管理层承诺资本纪律，包括融资时间表预期和 IPO
              准备度评估。鉴于风险画像二元性强，投资者应保守控制仓位：验证投资逻辑的合同胜利可能把估值快速推到 $15–20B；执行失败或行业估值整体压缩，则可能导致 $3–5B 的降估值轮。需要跟踪的核心投资 KPI
              是合同储备向收入的转化率；它将成为判断 Saronic 估值溢价究竟由运营执行支撑，还是仅由市场情绪支撑的主要指标。
            claimRefs:
              - CV031
              - CV032
              - CV033
              - CV034
              - CV035
