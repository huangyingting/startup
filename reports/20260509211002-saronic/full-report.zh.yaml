    rows:
      - - '1'
        - Corsair 平台获海军验证，产品-市场匹配占优
        - 验证仅限单一 OTA 下的单一船型；2025 年中碰撞引发可靠性担忧
        - 投资逻辑占优——生产合同是最强信号，但碰撞事件需要持续观察
      - - '2'
        - 庞大 TAM：$10B+ 自主海事市场，2026 财年海军无人系统预算 $5.3B
        - 当前已签约收入不到 TAM 的 4%；ITAR 限制国际市场准入；TAM 估算偏理想化
        - 均衡——TAM 真实存在，但转化为收入需要多年且不确定
      - - '3'
        - 强资本基础：累计融资 $2.58B，一线 VC 联合投资（KP、a16z、Advent）
        - 资本密集型造船带来烧钱风险；连续更大规模融资轮暗示稀释压力
