      - number: '2.5'
        title: 规模测算与采纳尽调缺口
        blocks:
          - type: paragraph
            body: >-
              几个实质缺口压低了市场测算和 Saronic 可触达机会的置信度。第一，全球 USV 市场分析师估算在 2025 年基线相差近 3 倍（$0.82B vs $2.4B），反映对 USV
              与更广义自主海事系统边界的定义差异。投资人应要求 Saronic 将产品线逐项映射到各分析机构定义范围，判断哪一个 TAM 框架最相关。第二，美国海军 Future USV / MASC 项目仍处于
              Milestone B 之前，正式需求、单艇成本和产量尚未定稿；CRS 报告指出采购资金决定会在未来预算中作出，因此可触达管线规模仍有不确定性。第三，任何 USV
              平台都尚未大规模证明从原型到系列化生产的转换；Orca XLUUV 成本超支是警示性先例。第四，Saronic 相对 L3Harris、Textron、Lockheed Martin
              等既有厂商和其他新兴玩家的竞争位置尚未被独立验证；留存的任何分析机构来源都未公开 USV 细分市场份额数据。第五，美国制造自主军舰的出口潜力受 ITAR 和 FMS 规则限制，且没有留存来源可信估计盟国海军
              USV 采购预算总额。这些缺口并不推翻市场逻辑，但会把任何具体 TAM/SAM/SOM 估算的置信度限制在低到中等。
            claimRefs:
              - CM032
              - CM033
              - CM034
              - CM035
              - CM036
      - number: '2.6'
        title: 图表
        blocks:
          - type: callout
            title: 美中造船差距为自主海军舰艇创造持久结构性需求
            body: >-
              中国造船能力超过美国 200 倍以上，海军规模约 400 艘，而美国舰队约 290 艘。在美国工业基础受限的情况下，仅靠有人造船无法弥合差距，因此对 Saronic USV
              平台这类高性价比自主力量倍增器形成结构性且政治上持久的需求。
            calloutType: strength
            claimRefs:
              - CM023
              - CM024
              - CM030
          - type: callout
            title: 分析机构基线估算相差 3 倍，反映定义模糊
            body: >-
              2025 年 USV 市场 MarketsandMarkets 估计为 $0.82B，Mordor Intelligence 估计为 $2.4B，几乎相差三倍，差异来自定义范围。投资人应要求 Saronic
              将产品线对应到各分析机构分类法，判断哪一个框架最贴近其可触达市场，而不是引用最有利的估算。
            calloutType: risk
            claimRefs:
              - CM006
              - CM007
              - CM032
          - type: callout
            title: 海军整合 MASC 项目，显示从原型转向量产
            body: >-
              MUSV 和 LUSV 项目并入 Future USV / Modular Attack Surface Craft（MASC），意味着项目从并行原型路线转向单一、模块化、面向量产的采购项目。这一整合叠加
              HASC $3.1B 拨款标记，表明海军正把 USV 从实验资产转成核心舰队元素，显著扩大 Saronic 和竞争对手可触达的采购管线。
            calloutType: insight
