      - number: '7.4'
        title: 人才与执行风险 — 人才竞争和制造爬坡
        blocks:
          - type: paragraph
            body: >
              Saronic 面临显著人才和执行风险：公司要从约 100 人的初创公司，扩成生产规模防务制造商，仅 Louisiana Franklin 船厂就需要 1,500
              多名工人。公司需要稀缺的人才组合：海军建筑专业能力和 AI/自主工程人才。这两类学科交集有限，却同时受到成熟防务承包商（L3Harris、HII、General
              Dynamics）、大型科技公司（Google、NVIDIA）和资金充足的防务初创公司（Anduril、Shield AI）的激烈争夺。Saronic 一直在积极招聘，包括在 University of
              Texas at Austin 做校园触达、聘请退役将官担任战略顾问；但顾问关系能否转化为运营领导力，仍未证明。Louisiana 船厂建设是一项 $300 million 资本承诺，2025 年底开工，目标
              2027 年初满负荷运营。该时间线带来施工延误、许可、员工培训和产能爬坡风险。船厂扩建涉及多家设计和施工伙伴（JacobsWyper、P2S、KPFF、JE
              Dunn、Alberici），协调复杂度更高。Saronic 必须同时兑现海军 Corsair 生产时间线（预计 2026 年底前交付）、开发更大的 Marauder MUSV
              平台，并维持自主栈软件开发速度；对一家 2022 年成立的公司而言，这是会拉紧管理带宽的多线执行挑战。
