  - number: 6
    title: 客户情况
    sections:
      - number: '6.1'
        title: 客户分层 — 防务主导的买方基础
        blocks:
          - type: paragraph
            body: >
              Saronic 的收入压倒性来自美国国防部客户。主要买方是美国海军；2025 年 12 月，美国海军为 Corsair 自主水面舰艇授予 $392 million 其他交易授权（OTA）生产合同，其中近 $200
              million 立即拨付。该单一合同占 Saronic 已签约收入的绝大多数。与 Saronic 接触的海军项目覆盖 PEO Unmanned and Small Combatants（PEO USC）、由
              Defense Innovation Unit（DIU）管理的 Replicator 计划，以及面向 Medium 和 Large USV 项目的更广泛舰队整合工作。美国特种作战司令部（SOCOM）一份 $8
              million 原型合同已于 2024 年 7 月结束，验证了该平台用于特殊作战任务的能力，包括在受争夺海事环境中执行 ISR、精确打击和后勤。美国海岸警卫队于 2025 年 11 月宣布与 Saronic
              签署合作研究与开发协议（CRADA），探索 USV 在海事安全和远洋延伸作业中的整合。盟友海军是新兴但尚未产生收入的细分：2025 年，Saronic 在澳大利亚和英国均开设办公室并聘请战略顾问（退役 Rear
              Admiral Lee Goddard、退役 Rear Admiral Alex Burton），与 AUKUS Pillar Two 自主能力重点对齐。油气、港口安全、海上风电等商业细分仍停留在愿景层面；截至
              2026 年 5 月，没有公开确认的商业客户或合同。
