      - number: '3.9'
        title: 图表
        blocks:
          - type: callout
            title: 海军市场模型把竞争口径从既有厂商扩大到更多玩家
            body: >-
              海军从 MASC 项目转向 MUSV 系列系统开放市场模型，根本改变竞争动态。海军不再授予排他正式列装项目，而是同时招募多家供应商；这有利于 Saronic 的快速量产，也邀请 Magnet
              Defense、Blue Water Autonomy 等新进入者与既有厂商同场竞争。
            calloutType: insight
            claimRefs:
              - CP004
              - CP005
              - CP006
          - type: callout
            title: Saronic 纵向整合和制造速度在 USV 创业公司中罕见
            body: >-
              Saronic 收购 Gulf Craft 造船厂、承诺 $300M 扩建 Louisiana，并规划 Port Alpha 设施，带来自有制造产能；其他风投支持的 USV
              竞争者无人能匹配。纵向整合让它拥有成本结构优势和交付速度，横向整合竞争者很难复制。
            calloutType: strength
            claimRefs:
