      - number: '3.5'
        title: 现状路线与替代品
        blocks:
          - type: paragraph
            body: >
              自主水面舰艇的主要竞争替代仍是传统有人军舰。海军当前有人造船预算约为无人采购的 600 倍，显示制度和政治上对有人舰艇偏好很深。两名美国参议员公开主张停止 Large Unmanned Surface
              Vehicle 项目，国会也继续审视自主系统可靠性、成本和网络安全。现状路线受益于根深蒂固的工业基础、成熟国会支持、经验丰富船员和已验证战斗记录。采纳 USV
              不仅需要技术成熟，也需要海军内部文化和作战条令转变，因为目前很少有水兵在甲板一线知道如何操作无人平台。域替代包括 Boeing Orca XLUUV
              项目等无人潜航器（该项目多年延期并成本超支）以及无人机；两者都争夺同一防务预算和 ISR、打击、反水雷等任务集。对海军来说，通过 NAVSEA 和政府造船厂内部自建仍是理论选项，不过海军 FY2025
              战略已转向从私营供应商采购商业衍生设计，偏好 Saronic 这类能按加速时间线交付量产就绪平台的公司。
            claimRefs:
              - CP035
              - CP036
              - CP037
              - CP038
              - CP039
      - number: '3.6'
        title: 切换成本、锁定效应与渠道权力
        blocks:
          - type: paragraph
            body: >
              防务自主海事的切换成本由四个机制驱动：自主软件集成、供应链基础设施、监管认证和操作熟悉度。一旦海军投入培训操作员、开发战术，并把某供应商自主栈接入现有作战管理系统（如 Project Overmatch 下的
              Common Control System），换到其他平台就会产生显著再培训和集成成本。Saronic 在整个舰艇家族共用统一自主栈——从 6 英尺 Spyglass 到 180 英尺
              Marauder——形成一致的软件生态，舰队扩大后会加深锁定效应。不过，海军有意推动模块化、开放架构设计，降低硬件层面锁定；Common Control System
              也设计成通过统一接口指挥多个供应商平台。多供应商并行采购风险真实存在：海军开放市场模型明确鼓励同时从多家供应商采购 USV，限制任何单一供应商拿到排他正式列装项目地位的能力。渠道权力偏向 L3Harris 和
              Textron 等既有厂商；它们拥有数十年政府合同关系、成熟 DCAA 合规成本会计和游说基础设施，新进入者必须从零搭建。Saronic 的 $2.58B
              风险融资部分抵消这一劣势，使其无需等待政府里程碑付款即可自筹产能。供应和合作伙伴准入是差异点：Saronic 收购 Louisiana 的 Gulf Craft 造船厂，并规划 Port Alpha
              设施，拥有自有制造产能；L3Harris 等竞争者则依靠分包商网络建造舰艇。
            claimRefs:
              - CP004
              - CP005
              - CP006
              - CP040
              - CP041
              - CP042
      - number: '3.7'
        title: 护城河耐久性与商品化风险
        blocks:
          - type: paragraph
            body: >
              Saronic 的竞争护城河建立在三根支柱上：制造速度、自主软件差异化和资本深度。公司完成了现代海军采购中最快的原型到量产转换之一，从首次接触海军到赢得 $392M Corsair 量产合同不到一年。$2.58B
              风险资本提供了其他专注 USV 的创业公司难以匹敌的现金跑道，但在更广义防务科技生态中，Anduril 的 $6.3B 融资和 $30.5B 估值远大于
              Saronic。商品化风险中等：海军推动开放架构、模块化载荷设计和通用控制接口后，硬件平台可能变得可互换。关键差异点会转向自主软件质量、制造成本效率和交付速度。Saronic
              的纵向整合路线——自有造船厂，并在内部开发自主栈——带来成本结构优势，横向整合竞争者（分包舰艇建造）可能难以复制。不过，LUSV/MUSV
              项目合并及向市场模型转移，意味着排他性正式列装项目地位不太可能出现；多家供应商会共存。最大替代风险来自 Anduril；如果它选择从水下平台扩展到水面舰艇，资金、软件人才和防务关系足以让它规模化进入。中国
              JARI-USV-A 虽不是直接商业竞争者，却带来战略叙事风险：如果中国规模化部署大型自主军舰，可能加速美国采购时间线，也会吸引更多竞争者进入市场。
