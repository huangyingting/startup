        blocks:
          - type: paragraph
            body: >
              Saronic 自成立以来完成四轮主要融资，累计募资超过 $2.58B。2023 年 10 月 Series A 关闭，金额 $55M，由 Caffeinated Capital
              领投，8VC、Andreessen Horowitz、Lightspeed Venture Partners 和 Point72 Ventures 参投。2024 年 7 月 Series B 融资
              $175M，由 Andreessen Horowitz 领投，公司估值 $1B，跻身独角兽。2025 年 2 月 Series C 融资 $600M，由 Elad Gil 领投，General Catalyst
              作为新投资方加入，估值翻至 $4B。2026 年 3 月 Series D 关闭，融资 $1.75B，由 Kleiner Perkins 领投，新投资方包括 Advent
              International、Bessemer Venture Partners、DFJ Growth、BAM Elevate 和 Franklin Templeton，公司估值 $9.25B。约 20
              个月内估值从 $1B 升至 $9.25B，既反映投资人信心强，也反映更广泛的防务科技融资环境。值得注意的是，Saronic 建设运营主要依赖私人风险资本，而非政府种子资金。
