              - CV013
              - CV018
      - number: '8.2'
        title: 可比公司与倍数分析
        blocks:
          - type: paragraph
            body: >
              按接近 $200M 的 2025 年估计收入计算，Saronic $9.25B 估值对应约 38x 历史收入倍数。相较上市国防主承包商，这个倍数溢价明显：Huntington Ingalls Industries
              约 1.3x EV/revenue，L3Harris 约 3.0x；最接近的上市可比公司 AeroVironment 作为无人系统专业公司，约 4.9x。在风投支持的国防科技同行中，Saronic
              的倍数大体可比：Shield AI 2026 年 3 月估值 $12.7B，预计收入超过 $540M，对应约 23x 前瞻倍数。Anduril 2026 年 1 月估值 $37.95B，估计收入超过
              $1B，对应约 30–38x。欧洲国防 AI 领军公司 Helsing 交易倍数超过 50x 估计收入。Palantir 作为规模化的国防相邻软件平台，约为 42x 前瞻收入。Joby Aviation
              作为尚未有收入的自主车辆公司，历史收入倍数达 87–137x，说明当前收入有限的自主平台公司也可能拿到极端倍数。Saronic
              与传统国防主承包商之间的倍数差，反映投资者相信它能获得类似软件的利润率和快速收入规模化，而不是旧式造船商常见的 8–10%
              经营利润率。这个溢价是否站得住，取决于合同储备转化、产能爬坡执行，以及可触达自主海事市场的规模。
            claimRefs:
              - CV006
              - CV007
              - CV008
              - CV009
              - CV010
              - CV011
              - CV012
          - type: table
            tableRef: TV004
            claimRefs:
              - CV006
              - CV007
