  - number: 2
    title: 市场分析
    sections:
      - number: '2.1'
        title: 市场定义与边界
        blocks:
          - type: paragraph
            body: >-
              Saronic 竞争于防务海事系统市场中的无人水面舰艇（USV）细分，主要可触达市场是美国国防部对自主军舰和巡逻艇的采购。核心市场包括中大型 USV（MUSV 与
              LUSV），面向水面作战、情报监视侦察（ISR）、电子战、反水雷和后勤任务设计。这些产品不同于小型无人水面舰艇（sUSV）；后者通常可由人携带，或从有人舰艇发射，不在 Saronic
              当前产品线内。更广义的自主船舶市场——覆盖商业航运、海上能源支持、港口运营和环境监测——是邻近机会，但不是 Saronic
              近期可服务市场。现状替代品包括执行同类任务但运营成本和人员风险更高的有人军舰（驱逐舰、护卫舰、巡逻艇），也包括通过不同域覆盖 ISR 和打击任务的无人机（UAV）与无人潜航器（UUV）。本章测算纳入边界为：(1)
              分析机构报告定义的全球 USV 市场（MarketsandMarkets、Mordor Intelligence、Grand View Research、Fortune Business
              Insights），(2) 美国海军中大型 USV 采购管线，(3) 更广义的军用无人海事系统市场，作为包含 UUV 及相关平台的上限估算。
            claimRefs:
