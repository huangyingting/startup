      - number: '3.8'
        title: 反向竞争证据与风险信号
        blocks:
          - type: paragraph
            body: >
              几个风险信号值得关注。2026 年 4 月，Saronic 提起投标抗议挑战一项海军合同授予，政府要求在 2026 年 10
              月前作出实体裁决，说明竞争摩擦和潜在项目扰动。有人造船工业基础仍拥有压倒性的政治和预算优势；一位防务行业 CEO
              指出，军工复合体拥有最强游说者，也清楚国防部资金如何流动。国会对无人舰艇可靠性的怀疑仍是实质风险，两名参议员明确要求暂停 LUSV 项目，并把资金转向已验证 MUSV 平台。竞争对手方面，Anduril 在
              Australia Ghost Shark 项目上的成功——提前且低于预算交付原型——证明其执行能力；若 Anduril 进入水面领域，会威胁 Saronic。L3Harris 已有 MUSV
              合同，Textron 在反水雷 USV 上拥有正式列装项目地位，意味着 Saronic 面对的是有运营记录和既有海军信任的既有厂商。Boeing Orca XLUUV
              项目多年延期、成本超支，是所有自主海事项目的警示性平行案例，也凸显 Saronic 把自主海军平台从原型扩到舰队规模量产时固有的执行风险。
            claimRefs:
              - CP046
              - CP047
              - CP048
              - CP036
              - CP037
