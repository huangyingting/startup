      - number: '5.8'
        title: 路线图与开发管线
        blocks:
          - type: paragraph
            body: >
              Saronic 的产品路线图聚焦在跨舰艇类别扩大生产，同时推进自主能力。近期重点包括按 $392 million 海军合同将 Corsair 产量爬升到数百艘，公司还表态希望 Austin
              园区年产量达到数千艘。2025 年 4 月发布的 Mirage 和 Cipher 平台仍在开发中，用于填补 Corsair 与 Marauder 之间的中程空白。大型舰艇端，Marauder 项目目标是在
              2027 年从扩建后的 Franklin 船厂交付 20 艘。$300 million Louisiana 船厂扩建计划在 2026 年底完成、2027 年初达到满负荷运营，新增三条建造滑道和 Marauder
              专用生产线。Port Alpha 是计划投资约 $5 billion 的下一代船厂，代表 Saronic 对美国最大、最先进自主舰艇生产设施的愿景，但时间线和地点仍未披露。NVIDIA
              合作计划通过仿真、多智能体协同和边缘 AI 部署的联合研发，持续提升自主栈能力。Saronic
              表示，公司正在推进下一波自主能力以应对演化中的威胁；向英国和澳大利亚扩张，也让公司有机会服务美国海军之外的盟友防务客户。关键开发风险包括：在高生产节奏下扩大制造质量，在受争夺环境中提升自主软件可靠性，以及穿越防务采购复杂性。
