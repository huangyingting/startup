      - number: '5.5'
        title: 部署、采购与海军合同
        blocks:
          - type: paragraph
            body: >
              Saronic 的主要客户是美国海军。2025 年 12 月，海军通过其他交易授权（OTA）机制，授予 Saronic 一份 $392 million Corsair ASV 生产合同。总金额中，约 $200
              million 已立即拨付用于初始生产。OTA 框架绕开传统《联邦采购条例》时间线，使海军能在不到 12 个月内从原型推进到生产；这不同于通常需要数年的常规防务采购周期。美国海军部长 John C. Phelan
              将 Saronic 作为海军采购快速创新的案例，并表示：“我们在不到一年里从原型走到了生产。”在完整生产合同之前，Saronic 已从 Defense Innovation Unit 拿到超过 $26
              million 的原型 OTA，以及一份为美国特种作战司令部提供原型 ASV 的 $8 million 独立协议。Corsair 已列入 DIU 产品目录，作为量产就绪、低成本、用于海上远征的小型
              USV。Saronic 表示，公司计划生产数百艘 Corsair，并具备扩产至数千艘的能力，以支撑海军人机混合舰队愿景。公司还在 2026 年 4
              月向联邦法院提出投标抗议，挑战另一份海军运营和维持合同，称招标条款不当限制了商业非传统防务公司的竞争。
            claimRefs:
              - CE026
              - CE027
              - CE028
              - CE029
              - CE030
              - CE031
              - CE032
              - CE033
      - number: '5.6'
        title: 技术差异化与竞争护城河
        blocks:
          - type: paragraph
            body: >
              Saronic 的核心差异化横跨三个相互咬合的领域：软件优先设计、垂直整合制造，以及从原型到量产的速度。传统防务主承包商往往把软件当作船体设计的附加项；Saronic
              则把自主和任务软件作为主要设计驱动，再围绕软件栈打造硬件平台。这让六类舰艇共享同一自主能力，操作员可通过单一任务控制界面管理异构舰队。硬件、软件和 AI
              制造的垂直整合，使公司能快速迭代、规模化生产并控制成本；公司称，与传统海军采购相比，这带来更低单艇成本。Corsair 不到 12 个月的原型到量产时间线，相比常规防务采购有数量级改善。此外，Saronic
              的开放模块化架构可快速集成第三方传感器、载荷和技术，无需重做核心系统，给海军所需的“卡车式”无人舰艇平台提供载荷灵活性。NVIDIA 合作进一步强化差异化：边缘 AI 计算能力让舰艇在 EMCON
              条件下无需持续通信链路也能完全自主作业。Saronic 还与 ABS 签有自主分类框架 MOU，与 Vigor Marine 签有小型舰艇制造 MOU，并与 Palantir Technologies 签有 AI
              驱动分析集成 MOU。
            claimRefs:
              - CE034
              - CE035
