chapters:
  - number: 1
    title: 公司概况
    sections:
      - number: '1.1'
        title: 身份与创立
        blocks:
          - type: paragraph
            body: >
              Saronic Technologies 是一家私营防务科技公司，总部在 Texas 州 Austin，专注为海军和海事场景设计、制造并部署自主水面舰艇（ASV）。公司由 Dino Mavrookas、Doug
              Lambert、Rob Lehman 和 Vibhav Altekar 于 2022 年 9 月创立。CEO Mavrookas 曾在美国海军 SEAL 服役 11 年，其中 5 年在 SEAL Team
              Six（DEVGRU），完成 8 次作战部署，之后在 Rutgers 取得计算机工程学位，并在 Wharton 获得 MBA。他 2015 年入选 Pat Tillman Scholar，随后在 Vista
              Equity Partners 和 H.I.G. Capital 从事私募股权投资。公司使命是以二战以来少见的速度和规模，为自主平台交付净新增造船产能，以回应 Mavrookas
              所称美国造船能力的“持续侵蚀”。Saronic 采用软件优先、自主优先的设计思路，把第一性原理工程、高级制造和软件定义生产流程整合在一起。
