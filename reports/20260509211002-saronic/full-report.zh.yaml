      - number: '5.7'
        title: 可信、安全、安保与合规
        blocks:
          - type: paragraph
            body: >
              Saronic 位于高度监管的防务工业基础内运营，必须符合多套安全、安保和质量框架。作为向美国海军提供涉密和敏感自主舰艇系统的防务承包商，公司必须为涉密项目维持适当设施安全许可和人员安全许可。公司首席信息安全官
              Eric Murphy 负责舰艇系统、通信和企业基础设施的网络安全。Saronic 的自主导航系统必须遵守 COLREGs（International Regulations for Preventing
              Collisions at Sea），确保在开放水域和拥挤海事环境中安全自主运行。鉴于防务用途，公司舰艇受 ITAR（International Traffic in Arms
              Regulations）出口管制约束，限制向外国实体转让技术。在加州海岸外的海军测试中，曾报告软件故障导致一艘 Corsair ASV
              停摆，随后又发生另一家供应商舰艇参与的碰撞；这些事件凸显海上自主作业固有的成熟度挑战。挫折之后，软件验证、互操作性测试和人类监督规程受到更多重视。Saronic 与 ABS（American Bureau of
              Shipping）的 MOU 探索自主分类框架，可能为认证无人舰艇安全性和可靠性建立行业标准。质量保证实践与防务采购要求一致，但公司未公开披露 ISO 9001 或 AS9100 等具体认证。
            claimRefs:
              - CE040
              - CE041
              - CE042
              - CE043
              - CE044
              - CE045
