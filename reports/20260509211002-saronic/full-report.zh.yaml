      - number: '7.3'
        title: 合作伙伴与依赖风险 — 客户集中和供应链
        blocks:
          - type: paragraph
            body: >
              Saronic 最尖锐的结构性风险，是极端单一客户集中。美国海军通过 $392M Corsair OTA 合同，实际上贡献了当前生产收入的 100%。其他客户接触要么已结束（SOCOM $8M
              原型），要么无收入（海岸警卫队 CRADA），要么处于合同前阶段（盟友海军顾问聘任）。这种集中度让公司容易受到海军预算周期、项目优先级调整、采购办公室领导层变动和政策转向影响。2026 年 4
              月的投标抗议说明，Saronic 不能假设自己必然能拿到邻近海军合同机会。供应链依赖增加了另一层风险。Saronic 自主舰艇需要海事级半导体、LIDAR 和雷达传感器套件、用于自主处理的 NVIDIA GPU
              模块，以及船用推进系统等专用组件。全球半导体供应约束虽已从 2021-2023 年高峰缓解，但受 DMEA 过时风险约束的防务级专用组件仍有供应风险。Saronic
              的垂直整合策略通过内化软件和系统集成，缓释了部分供应链风险；但船体材料、推进组件和传感器硬件仍来自外部。公司依赖 NVIDIA 进行 GPU 计算，形成单一供应商技术风险。此外，Saronic
              的载荷集成合作——已用 Anduril 的 ALTIUS 弹药和 Lattice C2 系统展示——也形成双边依赖：一旦伙伴技术路线图变化，Saronic 的任务能力可能受影响。
