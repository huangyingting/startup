      - number: '5.2'
        title: 统一自主栈与软件架构
        blocks:
          - type: paragraph
            body: >
              Saronic 采用软件优先的设计哲学，核心是一套可运行在所有舰艇类别上的统一自主栈。该栈覆盖感知、导航、决策和舰队协同层。感知层融合雷达、摄像头、AIS、GPS
              和环境传感器，实时完成目标探测、分类、避障和海况导航。导航层用 AI 做路径规划，并按国际海事规则满足 COLREGs
              避碰要求；同时根据任务目标和环境变化动态重路由。决策层处理行为仲裁、任务模式切换和失效管理，并配置冗余故障保护。舰队协同层支持多艇组队、分布式任务分配和蜂群行为，包括队形保持、协同区域搜索，以及通过加密网状网络共享传感器数据融合。公司基于浏览器的任务控制系统，让操作员能通过独立或集成界面监督、指挥单艘舰艇或整支舰队。Saronic
              称，海上自主的技术挑战“显著难于自动驾驶”，因为在受争夺环境中通信连接有限，还要满足多艇协同要求。数字孪生仿真和虚拟测试环境压缩开发周期，也降低海试风险。
            claimRefs:
