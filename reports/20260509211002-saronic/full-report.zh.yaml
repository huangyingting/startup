      - number: '4.4'
        title: 公开进展与私有指标缺口
        blocks:
          - type: paragraph
            body: >
              相比 $9.25 billion 估值，Saronic 公开可见的业务牵引数据极少。唯一确认能产生收入的合同，是美国海军 $392 million Corsair 生产订单。第三方分析机构 Sacra
              估计，2025 年收入约为 $200 million，高于 2024 年的 $12.5 million，同比约 16x；但该数字未经审计，也未获公司确认。据报道，截至 2025 年 1 月，Saronic 曾预计
              2025 年收入为 $400 million；如果 $200 million
              的实际估算准确，公司执行仍然强劲，但低于目标。公司没有公开披露经审计财务报表、收入运行率、毛利率数据、EBITDA、净利润或烧钱速度。员工数已增至 1,300 人以上，Franklin 船厂员工从收购时的 35
              人增至 2025 年底的 100 多人。实体基础设施指标更可见：Franklin 有两艘 Marauder 船体在建，新增 300,000 平方英尺产能正在施工，Austin 产能据称为每年 400-500 艘
              Corsair。不过，实际交付舰艇数量、在手订单规模、已交付单艇经济性和客户集中度数据仍完全不透明。按 2025 年预计收入 $200 million 计，估值隐含约 46x
              收入倍数；按传统防务承包商标准极高（上市主承包商通常为 1.5-3x 收入），即便放在风险投资支持的防务科技公司里也偏高。
