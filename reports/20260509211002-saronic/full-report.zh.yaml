companyProfile:
  summary: >-
    Saronic 是一家总部位于 Austin 的防务科技公司，成立于 2022 年 9 月，设计、建造并部署面向军事和国家安全任务的自主水面舰艇（ASV）。公司产品横跨六个船型，从 6 英尺 Spyglass 侦察艇到 150 英尺
    Marauder 大型 USV；统一的 AI 自主栈支撑 GPS 受限环境导航、多艇协同和模块化载荷集成。Saronic 已在四轮融资中募集超过 $2.5B 风险资本，2026 年 1 月 Series D 后估值达到
    $9.25B。核心客户是美国海军，2025 年 12 月获得 $392M Corsair 量产合同。公司纵向整合，在 Austin 拥有 500,000+ 平方英尺制造空间，并在 Louisiana 州 Franklin
    建设专属造船厂。
