      - number: '7.5'
        title: 竞争风险 — 成熟主承包商和资金充足的挑战者
        blocks:
          - type: paragraph
            body: >
              自主 USV 市场正快速吸引资源充足的竞争对手。L3Harris 被视为中大型防务 USV 市场领导者，拥有强海军关系和数十年海事防务集成经验。Textron 为其 TSUNAMI USV
              家族拿到新的海军合同，提供已验证的模块化和全球部署能力。最重要的是，Anduril 与 HD Hyundai Heavy Industries 合作，为海军 Modular Attack Surface
              Craft（MASC）项目开发模块化 Autonomous Surface Vessel，把韩国造船规模与 Anduril 软件定义自主平台和 Lattice 指挥控制生态结合起来。Anduril 还与
              Kraken Technology Group 合作满足小型 USV 需求，展示出服务海军无人水面舰队的组合打法。Anduril 估值约 $28 billion，且已在 DoD 内建立关系，对 Saronic
              形成强大竞争压力。海军采购策略有意通过快速技术竞赛鼓励多供应商竞争，而不是单一来源授标；这意味着 Saronic 不能依靠 Corsair OTA 的先发地位锁定未来项目。全球竞争格局还包括
              Thales、KONGSBERG、Israel Aerospace Industries 和 BAE Systems，它们都在为本国海军推进 USV 项目，并可能通过 AUKUS 和 Five Eyes
              框架外溢到盟友采购。USV 市场预计从 2025 年约 $579 million 增至 2035 年 $943 million，机会很大但竞争拥挤。
            claimRefs:
              - CR021
              - CR022
              - CR023
              - CR024
              - CR025
      - number: '7.6'
        title: 资本强度与政治风险 — 资金可持续性和预算动态
        blocks:
          - type: paragraph
            body: >
              尽管累计融资超过 $2.5B，包括以 $9.25B 估值完成的 $1.75B Series D，Saronic 仍长期面对资本强度风险。$300M Louisiana 船厂扩建、下一代 Port Alpha
              船厂开发、Marauder MUSV 平台持续研发，以及执行国防合同时占用的营运资金，都会推高烧钱速度。国防硬件公司历来收入确认周期长，政府里程碑付款往往落后于生产支出。如果 Corsair
              交付延迟，或美国海军行使的选项少于预期，即便资本底座很大，现金流压力仍可能浮现。政治和预算风险目前被历史性的国防开支上行部分缓冲——FY2026 DoD 预算为自主能力拨款 $13.4B，其中 $5.3B
              专门投向海军无人项目——但它仍是结构性担忧。众议院军事委员会在 FY2026 为无人舰艇生产预留 $3.1B，体现强劲的两党支持；不过国防开支会受到政府换届、持续决议机制和未来潜在财政约束影响。Saronic
              的全部收入基础，都取决于政治层面对自主海军能力的持续投入。海事运营环保法规目前尚未约束军用舰艇，但自主 USV 一旦扩展到商业海事场景，IMO
              环境标准就会适用，环保要求也会成为新风险。台湾海峡、南海或中东的地缘升级风险可能加速需求，也可能扰乱供应链、抬高作战节奏压力，压迫一家年轻制造企业的运营体系。
            claimRefs:
              - CR026
              - CR027
              - CR028
              - CR029
              - CR030
      - number: '7.7'
        title: 技术风险 —— 自主可靠性与无 GPS 作业
        blocks:
          - type: paragraph
            body: >
              Saronic 的核心价值主张压在垂直整合自主栈上，这套系统由 NVIDIA 硬件驱动，必须在受争夺、无 GPS 的海事环境里稳定工作。2025
              年中碰撞事件已经说明，软件缺陷会在实际作业条件下导致舰艇停滞，也暴露自主栈成熟度疑问。与同级对手对抗时，受争夺海军行动要求在无 GPS
              环境运行，这就需要惯性导航、天文导航算法，以及借助海底地形数据的地形参考导航等替代方案。相比依赖 GPS 的系统，这些技术成熟度更低，也带来额外失效模式。美国海军期待的自主蜂群作业，需要多艘 USV
              在没有持续人工监督的情况下协同，通信可靠性、分布式决策和交战规则合规都会更复杂。Saronic 还必须管理 AI 模型治理风险：自主软件必须可解释、可审计，才能满足美国国防部 AI 伦理指南（2020 年采用的
              DoD AI Principles）和作战指挥官的信任要求。对抗性 AI 攻击也构成新技术风险：对手输入被操纵的传感器数据，诱导系统误分类或作出不安全导航决策，而已验证的反制手段仍有限。从较小的
              Corsair（自主水面舰艇）切换到更大的 Marauder（150-foot、40-ton 载荷 MUSV），会给自主栈带来规模化风险；不同舰艇动力学、传感器配置和任务画像需要大量软件适配，不能只改几个参数。
            claimRefs:
              - CR006
              - CR031
              - CR032
              - CR033
              - CR034
      - number: '7.8'
        title: 缓释策略与否决条件
        blocks:
          - type: paragraph
            body: >
              Saronic 的主要风险缓释来自几方面：$2.5B 资本底座为多年执行提供现金跑道；垂直整合降低软件和系统集成的供应链依赖；OTA 合同结构比传统 FAR
              采购迭代更快；较早铺开的国际布局也形成缓冲，公司在英国和澳大利亚聘请了与 AUKUS
              对齐的顾问。公司模块化平台架构（Spyglass、Cutlass、Corsair、Marauder）支持分阶段交付能力，也降低全有或全无的项目风险。不过，几项否决条件需要持续盯住：如果 Corsair 交付在
              2027 年中之后仍未获美国海军验收，将说明基础产能存在缺口；如果竞标抗议裁定在结构上不利于商业优先厂商参与海军 USV 采购，Saronic
              的可触达市场可能受限；如果在海军测试中出现第二次重大碰撞或自主故障，项目可能暂停或被强制重新设计；如果 Anduril 的 MASC 项目借助 HD Hyundai 的造船规模拿下中型 USV
              市场，Saronic 的 Marauder
              可能遭遇市场封锁。若烧钱速度超过预期、收入增长却没有按比例跟上，资本充足性也会成为否决条件——在当前估值下，降估值融资将释放市场信心流失信号。关键技术创始人离职，或无法拿到网络安全合规所需的 CMMC 2.0
              认证，都会构成重大执行失败，需要重估投资逻辑。
            claimRefs:
              - CR035
              - CR036
              - CR037
              - CR038
          - type: table
            tableRef: TR005
            claimRefs:
              - CR035
              - CR036
              - CR037
              - CR038
      - number: '7.9'
        title: 附录
        blocks:
          - type: callout
            title: 关键单一客户集中风险
            body: |
              美国海军通过 $392M Corsair OTA，实际上贡献 Saronic 100% 的生产收入。只要单一项目被取消、预算重新排序，或竞标抗议裁定不利，公司主要收入流就可能消失，短期内没有替代来源。
            calloutType: risk
            claimRefs:
              - CR011
              - CR012
          - type: callout
            title: 自主栈规模化可靠性尚未验证
            body: |
              2025 年中碰撞事件说明，软件会在实际作业条件下诱发舰艇停滞。从原型测试走向舰队部署，会引入更多失效模式，而这些模式尚未在长时间自主作业中验证。
            calloutType: risk
            claimRefs:
              - CR006
              - CR007
          - type: callout
            title: 资金雄厚对手形成竞争包围
            body: >
              Anduril 与 HD Hyundai 携手推进 MASC 项目，L3Harris 在中型 USV 市场处于领先，Textron 又拿到新的海军合同；这些力量从多条战线威胁 Saronic 在 Corsair
              项目之外的增长。
            calloutType: risk
            claimRefs:
              - CR021
              - CR022
              - CR023
  - number: 8
    title: 估值
    sections:
      - number: '8.1'
        title: 融资历史与估值轨迹
        blocks:
          - type: paragraph
            body: >
              Saronic 的融资轨迹，是国防科技史上估值爬升最快的案例之一。公司 2022 年完成种子轮，估值未披露；随后在 2023 年 10 月完成 $55M Series A。2024 年 6 月，$175M
              Series B 将公司估到约 $1B。仅 8 个月后，2025 年 2 月的 $600M Series C 又把估值推到 $4B，较 Series B 增长 4x。2026 年 3 月，公司以 $9.25B
              投后估值完成 $1.75B Series D，短短 13 个月再次跳升 2.3x。累计融资如今超过 $2.58B。Series D 由 Kleiner Perkins 领投，Advent
              International、Bessemer Venture Partners、DFJ Growth、BAM Elevate、8VC、Caffeinated Capital 参与，老股东 Andreessen
              Horowitz、Elad Gil 和 Franklin Templeton 继续跟投。这一轮 $1.75B 是海事国防科技领域最大单笔融资，也让 Saronic
              跻身全球估值最高的五家私人国防科技公司之列。估值快速上行，靠的是美国海军对自主水面舰艇需求加速、Saronic
              早期生产合同落地，以及国防科技风险资本周期历史性激进三股力量汇合。不过，之后每一轮都需要更大规模的资本注入才能支撑估值增长，也让市场开始追问：未来融资或最终 IPO 能否延续这条曲线。
            claimRefs:
              - CV001
              - CV002
              - CV003
              - CV004
              - CV005
          - type: table
            tableRef: TV001
            claimRefs:
              - CV001
              - CV006
              - CV018
              - CV031
          - type: figure
            figureRef: FV004
            claimRefs:
              - CV001
