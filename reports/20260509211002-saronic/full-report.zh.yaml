      - number: '3.3'
        title: 传统防务主承包商
        blocks:
          - type: paragraph
            body: >
              L3Harris Technologies 在中型 USV 细分运营着与 Saronic 最直接竞争的项目。L3Harris 赢得海军 MUSV 合同，初始金额 $35M，项目上限 $281M，在一艘 195
              英尺商业改装舰艇上使用 ASView 自主技术。L3Harris 担任系统集成商，Gibbs and Cox 提供船舶设计，Swiftships 负责建造。海军在 2024 年中发布新的 Request for
              Information，计划两年内采购七艘 MUSV，偏好现有成熟设计，因此利好 L3Harris 既有平台。Textron Systems 持有海军首个登记在册 USV 项目 Common Unmanned
              Surface Vehicle，重点是反水雷。Textron 于 2025 年 4 月获得 $100M NAVSEA 合同，用于持续软件开发和载荷集成，并在 2025 年 1 月另获 $106M
              扫雷载荷交付系统合同。2025 年 9 月，Textron 入选下一代多任务 USV（第五代 CUSV）项目，具备更长航程和更高模块化。虽然 Textron 的 CUSV 比 Saronic
              舰艇更小、更专用，但它让 Textron 成为海军信任的成熟集成商，拥有作业小时记录。Austal USA 建造了海军首艘专门打造的 Ghost Fleet Overlord
              USV——Vanguard（OUSV3），并于 2024 年 1 月下水。Overlord 项目提供关键测试数据，影响未来 LUSV 需求。General Dynamics 和 Lockheed Martin
              参与过 LUSV 概念开发，但尚未拿下自主水面舰艇量产合同；其既有造船基础设施和游说能力仍是竞争优势。LUSV 项目现在已与 MUSV 项目并入 Future Unmanned Surface Vessel
              initiative，首艘量产艇计划 FY2027 采购，估计成本 $497.6M。
