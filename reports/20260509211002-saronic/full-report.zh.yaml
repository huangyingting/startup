  - number: 5
    title: 产品与技术
    sections:
      - number: '5.1'
        title: 产品组合与舰艇族谱
        blocks:
          - type: paragraph
            body: >
              Saronic 生产六类自主水面舰艇（ASV），覆盖从战术 ISR 到重型后勤的完整作战谱系。6 英尺 Spyglass 是紧凑型蜂群平台，面向海上投放与回收、昼夜作业以及传感器载荷快速集成。14 英尺
              Cutlass 提供更远航程的 ISR 和巡逻能力，具备中等载荷和开放系统架构。24 英尺 Corsair 是公司的量产旗舰，载荷能力 1,000 磅、航程超过 1,000 海里、最高航速超过 35
              节，适合执行情报、监视、侦察、电子战和动能效果投送。Corsair 已列入 Defense Innovation Unit 产品目录，作为可用于海上远征任务的量产就绪产品。40 英尺 Mirage 将航程延伸至
              2,000 海里，载荷 2,000 磅，航速超过 35 节，填补小型与中型 USV 之间的空档。60 英尺 Cipher 最多可携带 10,000 磅载荷，航程 3,000
              海里，适合更重型的蓝水任务，包括反水雷和后勤。150 英尺 Marauder 是中型无人水面舰艇（MUSV），可携带 40 至 150 公吨载荷，航程 3,500+ 海里，最高航速 18+ 节，并可装载两个 40
              英尺或四个 20 英尺 ISO 集装箱，以支持模块化任务配置。六类舰艇共享 Saronic 统一自主栈和开放、模块化架构。
