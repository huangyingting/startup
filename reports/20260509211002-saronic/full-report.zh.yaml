      - number: '6.5'
        title: 集中度风险与渠道依赖
        blocks:
          - type: paragraph
            body: >
              Saronic 面临极端客户集中风险。美国海军通过 $392M Corsair OTA，实际上贡献了当前生产收入的 100%。其他客户接触——SOCOM（$8M
              原型已结束）、海岸警卫队（CRADA，无采购）、盟友海军（顾问聘任，无合同）——要么规模小，要么无收入，要么还在合同前阶段。单一客户依赖让公司对海军预算周期、项目优先级调整和政治变化异常脆弱。2026 年 4
              月，Saronic 就海军小型 USV 和 LCS 任务模块的 O&S 合同向 美国联邦索赔法院提出投标抗议，展示了这种竞争张力：Saronic
              称，招标条款不当限制竞争，偏向传统防务承包商，可能排除商业优先的供应商。抗议说明 Saronic 愿意为市场准入而战，也揭示海军不会保证公司拿到 Corsair OTA
              之外的邻近合同机会。渠道依赖是直接面向政府；公司没有披露经销商、系统集成商或主承包商分销伙伴。通过 AUKUS 和 Five Eyes 对齐的国际扩张提供了中期多元化路径，但盟友海军采购周期通常滞后美国采用
              2–5 年。油气、港口安全和海上风电等商业市场进入仍停留在愿景层面，没有确认收入。
