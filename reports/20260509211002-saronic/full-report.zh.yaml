  - number: 3
    title: 竞争格局
    sections:
      - number: '3.1'
        title: 竞争格局概览
        blocks:
          - type: paragraph
            body: >
              自主水面舰艇竞争格局分为六类：(1) Anduril Industries、Shield AI 等风投支持的防务科技创业公司，以及 Magnet Defense、Blue Water Autonomy
              等新进入者；(2) L3Harris Technologies、Textron Systems、General Dynamics、Lockheed Martin、Austal USA
              等传统防务主承包商，拥有成熟政府合同关系和造船厂基础设施；(3) Kongsberg Maritime（Norway）、Hanwha Ocean（South Korea）、Elbit Systems 和
              Rafael Advanced Defense Systems（Israel）等国际防务公司；(4) 国家支持竞争者，主要是中国 CSSC 及 JARI-USV-A 项目；(5)
              有人海军舰艇的现状路线，当前消耗超过 99% 的海军造船预算；(6) 邻近域自主系统，包括无人潜航器和空中无人机，争夺同一防务预算。美国海军近期将中型和大型 USV 项目整合为统一 Future Unmanned
              Surface Vessel initiative，随后又从 MASC
              项目转向开放市场模型，这重置了竞争动态：能证明快速量产、模块化和成熟海上自主能力的供应商，优先于依赖传统多年开发周期的供应商。市场化转向有利于 Saronic 的快速量产模式，但也把竞标 MUSV
              系列系统合同的大门向更多竞争者打开。
            claimRefs:
              - CP001
              - CP002
              - CP003
              - CP004
              - CP005
              - CP006
      - number: '3.2'
        title: 直接创业公司竞争者
        blocks:
          - type: paragraph
            body: >
              Anduril Industries 是 Saronic 最强的风投支持竞争者。Anduril 由 Palmer Luckey 于 2017 年创立，累计融资约 $6.3B；2025 年 6 月 $2.5B
              Series G 后估值达到 $30.5B，并据报道计划在 2026 年 Series H 轮寻求 $60B 估值。Anduril 的海事组合聚焦水下自主：Ghost Shark / Dive-XL
              超大型自主潜航器在 2025 年 9 月赢得 Royal Australian Navy A$1.7B（约 $1.12B）合同，首批装备于 2026 年 1 月入役。美国海军 Defense Innovation
              Unit 在 2026 年 3 月选择 Anduril 参与 Combat Autonomous Maritime Platform（CAMP）项目，演示 Dive-XL 在美国作战用途中的能力。虽然
              Anduril 海事重点主要在水下而非水面，但其 Lattice 指挥控制软件、庞大融资基础和多域平台组合（包括空中无人机和地面传感器）使其成为平台级竞争者，有能力扩展到水面舰艇领域。Anduril 2025
              年收入估计为 $2B，2026 年预计 $4.3B。Shield AI 在 2026 年 3 月 $1.5B Series G 后估值 $12.7B，主要是空中自主公司，其 Hivemind AI 驾驶软件被
              Air Force Collaborative Combat Aircraft 项目选中。Shield AI 目前不生产水面舰艇，但自主软件可适配海事应用；其累计 $3.6B
              融资使其成为潜在邻近进入者。Magnet Defense（M48 USV，航程 17,000 海里）、Blue Water Autonomy（成立于 2024 年，聚焦可量产无人舰艇）和
              Seasats（$100M 联邦合同、长航时平台）等新兴创业公司也在进入海军 USV 市场。
