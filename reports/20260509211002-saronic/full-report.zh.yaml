  - number: 4
    title: 财务情况
    sections:
      - number: '4.1'
        title: 收入来源与定价模型
        blocks:
          - type: paragraph
            body: >
              Saronic 通过多层级防务合同模式创收，锚点是三条不同价位的自主水面舰艇产品线：Spyglass 单价约 $400,000，Cutlass 为 $800,000，Corsair 为
              $1.2M。收入来源包括直接舰艇量产合同、海军 Cooperative Research and Development Agreements（CRADAs）、Small Business Innovation
              Research（SBIR）奖项和各类 R&D 合同。公司唯一公开确认的量产合同，是 2025 年 12 月宣布的 $392M 海军 Corsair 自主水面舰艇订单，其中近 $200M 立即进入合同。Sacra
              估计，在所有产品线年产 600 艘的满产状态下，Saronic 潜在年收入可达 $480M，毛利率 45%。不过，公司收入确认很可能遵循政府合同里程碑——成本加成报销或固定总价交付排期——而非商业 SaaS
              式经常性收入。除美国海军直接合同外，Saronic 表示计划通过向美国海岸警卫队、沿海州和地方执法机构，以及美国盟友的国际销售扩展收入，但尚未公开披露任何非海军合同。据报道，Austin 的 Corsair
              产线年产能为 400-500 艘，并计划扩至 2,000 艘；如果多个客户细分需求兑现，上行空间很大。
