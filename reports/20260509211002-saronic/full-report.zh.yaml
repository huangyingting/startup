      - number: '6.6'
        title: 扩张管线与未来客户细分
        blocks:
          - type: paragraph
            body: >
              Saronic 的客户扩张策略沿三条轴线推进：加深 DoD 渗透、建立盟友海军伙伴关系，以及最终进入商业市场。在 DoD 内部，Marauder（150 英尺、40 吨载荷 Medium USV）瞄准海军
              Medium 和 Large USV 需求，合同机会显著大于 Corsair 项目。Saronic 的 NVIDIA 加持自主栈和开放架构设计，使其有机会争取更多 DIU Replicator 批次。SOCOM
              关系虽已结束原型合同，但未来仍可能通过面向 SOF 的采购工具扩张。盟友海军扩张以 AUKUS 框架为中心：澳大利亚皇家海军和 英国皇家海军均通过各自战略防务评估表达了对自主水面舰艇能力的兴趣。Saronic
              在两国聘请退役将官，带来机构入口，但尚未转化为采购合同。更广泛的 Five Eyes
              联盟（加上加拿大和新西兰）代表额外潜力，但没有公开接触信号。油气资产巡检、港口安全巡逻、海上风电场监测和水文测量等商业细分，在技术上可由 Saronic
              平台覆盖；但这些市场需要独立销售动作、监管批准和商业定价模型，公司尚未公开开发。公司称希望在美国、英国、欧洲、澳大利亚和印太提供能力；这更像愿景，而非确认管线。
