      - number: '2.2'
        title: 多视角测算 TAM、SAM 与 SOM
        blocks:
          - type: paragraph
            body: >-
              多种测算口径给出的 USV 市场机会方向一致，但不同分析机构因定义范围不同，估算差异很大。最窄口径是 MarketsandMarkets 定义的全球 USV 市场，估计 2025 年为 $0.82B，并预计到
              2030 年以 13.9% CAGR 增至 $1.59B。Mordor Intelligence 口径更宽，预计 USV 市场 2025 年为 $2.4B，2030 年增至 $3.5B，CAGR 约
              10%，可能纳入了邻近商业 USV 细分。军用无人海事系统市场——同时包含水面和水下航行器——按 Verified Market Reports，是 TAM 上限：2024 年 $4.87B，到 2033 年以
              8.2% CAGR 增至 $9.57B。更广义的自主船舶市场（Fortune Business Insights）预计 2026 年 $7.09B，到 2034 年以 8.7% CAGR 增至
              $13.85B，但其中包含不在 Saronic 近期范围内的商业航运自动化。对 Saronic 的 SAM 来说，美国海军 USV 采购预算是最贴近决策的框架。根据 Congressional Budget
              Office 数据，自 2019 年以来，海军已在 USV 采购上花费超过 $2B，并另拨 $1.2B 用于研发。House Armed Services Committee 在 2025 年为无人舰艇生产标记
              $3.1B，释放出采购大幅爬坡信号。Saronic 的 SOM 由其 $392M 海军 Corsair 合同锚定，代表其在项目管线中有意义但仍早期的份额。按收入看，北美领先 USV 市场（约 40%
              份额），欧洲和亚太随后；亚太因中国海军现代化和印太安全投入而增长最快。
