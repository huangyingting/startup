      - number: '3.4'
        title: 国际竞争者
        blocks:
          - type: paragraph
            body: >
              Norway 的 Kongsberg Maritime 凭 HUGIN UUV 平台积累了深厚自主海事经验，并已扩展到水面舰艇。DSEI 2025 上，Kongsberg Discovery 推出 K3
              SCOUT USV，这是一款紧凑模块化双体船，面向近海 ISR，续航最高 36 小时，并具备 AI 驱动自主能力。Kongsberg 在 2025 年签约，将向 REACH Subsea 交付更多 24
              米无人船；Leidos Australia 也在 Indo Pacific 2025 与 Kongsberg 签署 MOU，探索把 Naval Strike Missile 集成到 USV
              上，这可能催生武装自主水面平台。South Korea 的 Hanwha Ocean 在 MADEX 2025 发布 Ghost Commander II 有人-无人协同舰概念，并展示具备集群作战能力的战斗
              USV。Hanwha Ocean 还披露一款 AI 驱动隐身军舰概念，仅需 70 名船员，并为无人系统配置模块化任务舱；ROK Navy 的 Sea Ghost 项目已指定 Hanwha
              开发用于侦察和水雷战的大型 USV。Israel 的 Elbit Systems 部署 Seagull USV，这是一款 12 米多任务平台，可用于反潜、反水雷和海事安保，自主作业超过 96 小时。第四代
              Seagull 在 NAVDEX 2025 展示，增强模块化和无人机集成。Rafael 的 Protector USV 是 9-11 米武装平台，用于港口防御。两家以色列公司都与 NATO
              阵营海军有运营性出口合同。中国 CSSC 发布 JARI-USV-A，这是一款 58 米三体船，排水量 300-500 吨，配备 AESA 雷达、4-12 个 VLS 单元，航速 40 节；截至 2025
              年，它是全球最大具备作战能力的 USV，正在海试，设计用途为近岸防御和出口。
