      - number: '2.3'
        title: 买方与细分版图
        blocks:
          - type: paragraph
            body: >-
              USV 市场买方很窄，政府防务机构主导，美国国防部是全球最大单一客户。在 DoD 内，主要买方是美国海军；海军正把 MUSV 和 LUSV 项目整合进 Future USV / Modular Attack
              Surface Craft（MASC）项目。预算权在海军部长办公室和 Program Executive Office for Unmanned and Small Combatants（PEO
              USC）手中，国会则通过众议院和参议院 Armed Services Committees 监督。Defense Innovation Unit（DIU）在 Replicator
              计划下充当加速型买方，推动自主海事能力快速原型和部署。盟国海军——包括 Royal Navy（UK）、Royal Australian Navy、Japan Maritime Self-Defense Force
              和 NATO 伙伴——是次级买方，正在采购可互操作的 USV 平台，用于反水雷、ISR 和部队防护。商业 USV 买方仍处早期，集中在海上能源（油气勘测）、水文测量和港口安保，如今占总市场收入不到
              20%。防务采购的付款方是通过国会拨款出资的纳税人；预算周期为年度，造船可获得多年采购授权。军事买方的采纳触发点，是抵消美中造船差距的战略必要性：中国造船能力估计超过美国 200 倍，海军规模约 400
              艘，而美国舰队约 290 艘，形成对高性价比自主力量倍增器的结构性需求。
