      - number: '6.2'
        title: 采用与增长轨迹
        blocks:
          - type: paragraph
            body: >
              对一家防务硬件公司而言，Saronic 的收入增长轨迹极不寻常。收入从 2024 年约 $12.5 million 增至 2025 年估计 $200–400 million，约 1,500% 同比增长，主要由
              $392M 海军 Corsair 生产合同拉动。公司估值轨迹反映了这一动能：Series B 后估值 $1 billion（2024 年 7 月，Andreessen Horowitz 领投
              $175M）、Series C 估值 $4 billion（2025 年 2 月，$600M）、Series D 估值 $9.25 billion（2026 年 3 月，Kleiner Perkins 领投
              $1.75B）。累计融资超过 $2.5 billion。Corsair 从原型到生产合同不到 12 个月——海军预计 2026 年底前交付——这是现代采购史上最快的防务采购时间线之一，由绕开传统 FAR 合同的
              OTA 机制推动。Saronic 投入 $300 million 扩建 Louisiana Franklin 船厂，新增 1,500 个岗位，并为 Corsair 和更大型 Marauder
              舰艇提供产能，释放出公司对规模化生产的信心。公司声称，凭借硬件、软件和 AI 系统的垂直整合，制造能力可支持每年交付数千艘 USV。
