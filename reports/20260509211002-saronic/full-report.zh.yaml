      - number: '4.5'
        title: 资本充足性与融资依赖
        blocks:
          - type: paragraph
            body: >
              Saronic 已在四轮主要融资中累计获得 $2.58 billion 风险资本：$55 million Series A（2023 年 10 月）、$175 million Series B（2024 年 7
              月，估值 $1B）、$600 million Series C（2025 年 2 月，估值 $4B），以及 $1.75 billion Series D（2026 年 3 月，估值 $9.25B，由
              Kleiner Perkins 领投）。融资轨迹显示资本需求在加速：每一轮都远大于上一轮，反映防务硬件制造扩产的资本强度。累计融资中，仅 Franklin 船厂扩建就已承诺投入 $300 million；Port
              Alpha 预计还需要显著更多资金。公司未披露烧钱速度，但以 1,300 多名员工、显著制造运营和大型资本开支项目测算，参考同等规模防务科技初创公司，年度现金消耗可能超过 $300-500
              million。如果判断准确，按当前估计烧钱速度且不计额外合同收入，$1.75 billion Series D 可提供约 3-5 年现金跑道。不过，Saronic
              的资本策略似乎假设政府合同将持续落地，以补充风险资本；$392 million 海军合同提供了可观的近期现金流，其中 $200 million 已立即预付。公司没有披露债务或项目融资义务；同时，公司采用 OTA
              合同而非传统防务采购，可能限制其获得传统承包商依赖的政府进度款作为营运资金。资本是否充足，关键取决于新合同授予速度，以及海军市场机会能否转化为生产订单。
