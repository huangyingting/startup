      - number: '6.4'
        title: 留存与重复合作指标
        blocks:
          - type: paragraph
            body: >
              传统 SaaS 留存指标（NRR、GRR、队列流失）不适用于 Saronic 的防务合同模式。客户留存应通过合同扩张信号、重复合作和项目连续性来评估。最强留存指标是海军从初始原型测试推进到 $392M
              生产合同；这是项目深度满意的定性信号。OTA 结构安排交付批次延续至 2031 年，形成多年承诺关系。SOCOM 的独立 $8M 原型合同虽已结束，但验证了 Saronic USV
              平台适用于不同任务集，也代表跨项目办公室的重复 DoD 合作。海岸警卫队 CRADA 将 Saronic 的机构触点扩展到第三个联邦机构。Saronic 参与 Integrated Battle Problem
              24.1 等海军演习，说明其作战接触不止于合同交付物。不过，2025 年 7 月加州海岸外自主舰艇测试中的碰撞事故——一艘 Saronic Corsair 出现软件故障，被 BlackSea GARC
              舰艇撞上——引发了对平台可靠性的质疑。该事件促使 Pentagon 的 DIU 暂缓一份 $20M 自主软件合同，并引发海军无人系统采购办公室领导层变动。这些挫折对客户信心和项目连续性构成实质风险。
