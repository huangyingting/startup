            body: >-
              Anduril 拥有 $6.3B 融资、$30.5B 估值、已验证的海事执行（Ghost Shark）和 Lattice 软件平台，有资源也有信誉进入水面舰艇市场。如果 Anduril
              决定从水下扩展到水面，它会成为 Saronic 最危险的直接竞争者。
