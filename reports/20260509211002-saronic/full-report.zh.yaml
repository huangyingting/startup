  - number: 7
    title: 风险
    sections:
      - number: '7.1'
        title: 监管与法律风险 — COLREGs、海事法与投标抗议
        blocks:
          - type: paragraph
            body: >
              Saronic 所处监管环境尚未适应完全自主水面舰艇。规范全球船舶航行行为的《国际海上避碰规则》（COLREGs）制定时，默认由人类判断和航海技艺执行。“ordinary practice of
              seamen”（Rule 2）和“proper lookout”（Rule
              5）等规则都要求主观判断，很难编码成算法。国际海事组织（IMO）正推进针对海上自主水面船舶（MASS）的强制性规则，但具有约束力的全球规则预计要到约 2032
              年才会出现。在此之前，监管沙盒和受控试验无法解决广泛采用或责任问题。美国国内，美国海岸警卫队的自主舰艇监管框架仍在开发中；2024 年 GAO
              报告指出，海岸警卫队监管自主船舶的权限和准备度存在重大缺口。Saronic 2026 年 4 月在美国联邦索赔法院（case 1:26-cv-00358，Judge Elaine D. Kaplan）针对海军
              LCS 任务模块和小型 USV O&S 合同提出投标抗议，构成直接法律风险。Saronic 指称招标“不当限制竞争”，并违反优先采购商业产品的联邦法律。案件仍未结案，政府要求的裁决截止日期为 2026 年 10
              月 1 日。不利裁决可能限制 Saronic 在现有 Corsair OTA 之外竞争未来海军 USV 合同的准入。出口管制，尤其是 ITAR，也给 Saronic
              国际扩张计划增加法律风险：军用级自主舰艇及其自主软件属于 USML Category XX，任何盟友海军销售都需要美国国务院出口许可。
            claimRefs:
