      - number: '4.2'
        title: 销售路径与销售效率
        blocks:
          - type: paragraph
            body: >
              Saronic 的市场进入策略围绕政府防务采购渠道，而不是商业销售动作。公司主要销售渠道是美国国防部采购体系，尤其是 Other Transaction Authority（OTA）协议；OTA 绕开传统
              Federal Acquisition Regulation 流程，让合同更快落地。Corsair 合同体现了这种路径：Saronic 从原型到量产不到 12 个月，海军部长 John Phelan
              称其为采购速度的新标准。防务合同销售周期通常为 6 到 36 个月，但 Saronic 的 OTA 路径显著压缩了时间。防务承包商的获客成本近似指标很难估算，但 Saronic
              在合同授予前先投产能——自费造船以展示能力——相当于前置投入，为政府买方采购决策降风险。公司最初将 Corsair 作为 Pentagon Replicator
              计划的一部分开发；该计划旨在部署低成本无人平台集群，因此成为有效的产品-市场验证渠道。Saronic 还参加 RIMPAC
              演习和海军演示，这些活动兼具营销和能力验证作用。海军近期转向中型无人水面舰艇市场模型，形成反复竞争竞标环境，可能利好 Saronic
              快速量产能力，但也向更多竞争者打开大门。面向盟国的国际销售是潜在第二增长向量，但需要单独通过 Foreign Military Sales 或 Direct Commercial Sales
              审批流程，销售周期会增加 12-24 个月。
            claimRefs:
              - CI008
              - CI009
              - CI010
              - CI011
              - CI012
      - number: '4.3'
        title: 成本结构与毛利率驱动因素
        blocks:
          - type: paragraph
            body: >
              Saronic 的成本结构由防务造船典型的硬件制造成本主导：原材料（船体主要用铝）、人工、推进系统、传感器，以及包括计算模块、摄像头和通信系统在内的自主硬件。防务硬件承包商在成本加成合同下通常毛利率为
              10-20%；固定总价合同可能带来更高毛利，但执行风险更大。Sacra 估计 Saronic 满产目标毛利率为 45%；按传统防务硬件标准，这一水平异常高，可能反映自主栈的软件定义属性可以在大产量上摊销。45%
              也许能在 Corsair 等小型舰艇上实现（24 英尺艇售价 $1.2M，材料成本相对较低），但在 180 英尺 Marauder
              级别上会更难维持。关键毛利驱动包括产量（将固定成本摊到更多单位）、Franklin 和未来 Port Alpha 造船厂的纵向整合，以及跨全部船型复用共同自主软件栈——从 6 英尺 Spyglass 到 180
              英尺 Marauder。Saronic 报告首艘和第二艘 Marauder 船体建造之间效率提升 25%，说明学习曲线有效。人工成本很高：Franklin 造船厂计划雇用 1,500 名工人，平均年薪约
              $88,000，仅该设施年直接人工成本就超过 $130M。营运资本需求也很大，因为公司必须在收到合同里程碑付款前采购材料并开始建造。
            claimRefs:
