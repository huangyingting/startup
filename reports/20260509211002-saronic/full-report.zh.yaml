      - number: '2.4'
        title: 增长驱动与采纳约束
        blocks:
          - type: paragraph
            body: >-
              USV 市场增长的主要结构性驱动包括：(1) 美中造船差距，催生对自主力量倍增器的紧迫需求；这类平台比有人军舰生产更快、成本更低。中国海军舰艇数量已超过美国，其商业造船能力相对美国工业基础大出 200
              倍以上；(2) 海军通过 Future USV / MASC 整合给出的项目承诺，显示 FY2027 开始从原型转向量产规模采购；(3) Replicator 计划，到 2025 年 8
              月前加速向各军种交付数千套自主系统，USV 是关键类别；(4) 有人舰艇库存下降，美国海军预计到 2025 年低于 290 艘，而公开需求为 355+，形成对无人补充的结构性需求；(5) 自主和 AI
              技术进步，降低对抗环境中海事行动的成本和风险。采纳约束包括：(1) 项目执行风险——Orca XLUUV 项目成本超支 64%，无人平台与有人资产整合的 CONOPS 仍只部分明确；(2)
              国会预算不确定性——USV 经费曾因可靠性演示等待而被冻结和受监督搁置；(3) 工业基础限制——美国仅有四大公共造船厂，扩大 USV 产量需要私营部门大额投资；(4)
              围绕网络安全、对抗环境自主航行，以及与现有海军系统互操作的技术成熟度担忧；(5) 致命自主系统交战规则的监管和法律不确定性。美中差距是最耐久的结构性驱动；项目执行风险和预算波动是近期最实质的约束。
