      - number: '1.4'
        title: 产品组合与能力
        blocks:
          - type: paragraph
            body: >
              Saronic 生产一族覆盖多个尺寸等级的自主水面舰艇。产品线包括 6 英尺 Spyglass、13-14 英尺 Cutlass、24 英尺 Corsair、180 英尺 Marauder，以及 Mirage 和
              Cipher 等其他船型。Corsair 是公司的量产旗舰，载荷能力 1,000 磅，航程超过 1,000 海里，最高速度超过 35
              节，适用于情报、监视、侦察（ISR）、电子战，以及动能和非动能行动。Marauder 在 AUSA 2025 发布，是 150-180 英尺中型无人水面舰艇（MUSV），航程 3,500+ 海里，最高速度 18+
              节，载荷 40-150 吨，可携带标准 ISO 集装箱，用于模块化任务配置。所有舰艇共用 Saronic 统一自主栈，支撑 AI 驱动导航、舰队协同和任务控制，使其能在对抗性海域开展集群行动。2025 年 12
              月，公司获得美国海军 $392M Corsair ASV 量产合同，用不到一年从原型转入量产。
