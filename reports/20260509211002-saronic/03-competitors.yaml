callouts:
- calloutType: insight
  title: Navy marketplace model opens competitive aperture beyond incumbents
  body: The Navy's pivot from the MASC program to an open marketplace model for the MUSV family of systems fundamentally changes
    competitive dynamics. Rather than awarding exclusive programs of record, the Navy is soliciting multiple vendors simultaneously,
    which benefits Saronic's speed-to-production but also invites new entrants like Magnet Defense and Blue Water Autonomy
    to compete alongside incumbents.
  claimRefs:
  - CP004
  - CP005
  - CP006
- calloutType: strength
  title: Saronic's vertical integration and manufacturing velocity are rare among USV startups
  body: Saronic's acquisition of Gulf Craft shipyard, its $300 million Louisiana expansion commitment, and planned Port Alpha
    facility give it owned manufacturing capacity that no other venture-backed USV competitor can match. This vertical integration
    enables cost structure advantages and delivery speed that horizontally integrated competitors struggle to replicate.
  claimRefs:
  - CP040
  - CP041
  - CP043
- calloutType: risk
  title: Anduril's multi-domain platform and capital advantage represent the primary displacement threat
  body: With $6.3 billion in funding, $30.5 billion valuation, proven maritime execution (Ghost Shark), and the Lattice software
    platform, Anduril has the resources and credibility to enter the surface vessel market. If Anduril decides to expand from
    undersea to surface, it would become Saronic's most dangerous direct competitor.
  claimRefs:
  - CP007
  - CP008
  - CP009
  - CP044
