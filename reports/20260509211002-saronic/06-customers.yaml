company:
  name: Saronic

chapter:
  number: 6
  title: "Customers"
  summary: "Saronic's customer base is heavily concentrated in the U.S. Department of Defense, anchored by a $392M Navy production contract for Corsair autonomous surface vessels. Emerging engagement with allied navies (UK, Australia), the U.S. Coast Guard, and SOCOM broadens the pipeline, but commercial revenue remains negligible and single-customer concentration risk is the dominant vulnerability."

acknowledgedWarnings: []

sections:
  - id: sec-customer-segmentation
    title: "Customer Segmentation — Defense-Dominant Buyer Base"
    body: >
      Saronic's revenue is overwhelmingly driven by U.S. Department of Defense customers. The primary buyer
      is the U.S. Navy, which awarded a $392 million Other Transaction Authority (OTA) production contract in
      December 2025 for Corsair autonomous surface vessels, with nearly $200 million obligated immediately. This
      single contract represents the vast majority of Saronic's contracted revenue. The Navy programs engaging
      Saronic span PEO Unmanned and Small Combatants (PEO USC), the Replicator initiative managed by the Defense
      Innovation Unit (DIU), and broader fleet integration efforts for Medium and Large USV programs. A separate
      $8 million prototype contract with U.S. Special Operations Command (SOCOM), concluded in July 2024, validated
      the platform for special operations missions including ISR, precision strike, and logistics in contested
      maritime environments. The U.S. Coast Guard announced a Cooperative Research and Development Agreement (CRADA)
      with Saronic in November 2025 to explore USV integration for maritime safety and extended offshore operations.
      Allied navies represent an emerging but pre-revenue segment: Saronic opened offices and hired strategic
      advisors in both Australia (Rear Admiral Lee Goddard, ret.) and the United Kingdom (Rear Admiral Alex Burton,
      ret.) during 2025, aligning with AUKUS Pillar Two autonomous capability priorities. Commercial segments
      including oil and gas, port security, and offshore wind remain aspirational, with no publicly confirmed
      commercial customers or contracts as of May 2026.
    claimRefs:
      - CU001
      - CU002
      - CU003
      - CU004
      - CU005
      - CU006
  - id: sec-adoption-trajectory
    title: "Adoption and Growth Trajectory"
    body: >
      Saronic's revenue growth trajectory is extraordinary for a hardware defense company. Revenue grew from
      approximately $12.5 million in 2024 to an estimated $200–400 million in 2025, representing roughly 1,500%
      year-over-year growth driven primarily by the $392M Navy Corsair production contract. The company's valuation
      trajectory reflects this momentum: $1 billion post-money at Series B (July 2024, $175M led by Andreessen
      Horowitz), $4 billion at Series C (February 2025, $600M), and $9.25 billion at Series D (March 2026, $1.75B
      led by Kleiner Perkins). Total capital raised exceeds $2.5 billion. The path from prototype to production
      contract in under 12 months — the Navy expects Corsair deliveries before end of 2026 — represents one of the
      fastest defense acquisition timelines in modern procurement history, enabled by the OTA mechanism which
      bypasses traditional FAR-based contracting. Saronic's $300 million investment in expanding its Franklin,
      Louisiana shipyard, adding 1,500 jobs and capacity for both Corsair and the larger Marauder vessel, signals
      production-scale confidence. The company claims manufacturing capacity to deliver potentially thousands of
      USVs annually through vertical integration of hardware, software, and AI systems.
    claimRefs:
      - CU007
      - CU008
      - CU009
      - CU010
  - id: sec-named-customer-proof
    title: "Named Customer Proof — Contracts and Engagements"
    body: >
      Saronic's confirmed customer engagements are concentrated in the defense sector with varying levels of
      contractual maturity. The U.S. Navy is the sole production-contract customer, with the $392M OTA for Corsair
      vessels representing the highest-confidence proof point. The contract was processed through PEO USC and
      includes deliveries expected before end of 2026. SOCOM engaged Saronic through an $8M prototype contract
      concluded in July 2024, validating USV applications for special operations mission sets. The Defense Innovation
      Unit (DIU) listed the Corsair in its production catalog as part of the Replicator initiative, providing an
      institutional endorsement that facilitates broader DoD adoption. The U.S. Coast Guard's November 2025 CRADA
      represents a formal research partnership rather than a procurement commitment, but signals institutional
      interest in USV-based maritime domain awareness. Internationally, Saronic demonstrated at DSEI 2025 in London
      and appointed retired flag officers as strategic advisors in both Australia and the UK, but no allied navy
      production contracts have been publicly announced. Payload integration with Anduril's ALTIUS loitering munition
      during Navy Integrated Battle Problem 24.1 (April 2024) demonstrated third-party ecosystem compatibility,
      with Anduril's Lattice C2 software providing command and control. This partnership validation is significant
      but does not represent a direct customer relationship. No commercial customers have been publicly confirmed.
    claimRefs:
      - CU001
      - CU002
      - CU011
      - CU012
      - CU013
      - CU014
  - id: sec-retention-satisfaction
    title: "Retention and Repeat Engagement Indicators"
    body: >
      Traditional SaaS retention metrics (NRR, GRR, cohort churn) do not apply to Saronic's defense contracting
      model. Instead, customer retention is assessed through contract expansion signals, repeat engagement, and
      program continuity. The strongest retention indicator is the Navy's progression from initial prototype
      testing to a $392M production contract — a qualitative signal of deep program satisfaction. The OTA structure
      with delivery batches through 2031 creates a multi-year committed relationship. SOCOM's separate $8M prototype
      contract, while concluded, validated Saronic's USV platform for a distinct mission set and represents repeat
      DoD engagement across program offices. The Coast Guard CRADA extends Saronic's institutional footprint to a
      third federal agency. Saronic's participation in Navy exercises including Integrated Battle Problem 24.1
      demonstrates sustained operational engagement beyond contractual deliverables. However, the July 2025 collision
      incident during autonomous vessel testing off California — where a Saronic Corsair experienced a software
      fault and was struck by a BlackSea GARC vessel — raised questions about platform reliability. The incident
      contributed to the Pentagon's DIU placing a $20M autonomy software contract on hold and triggered leadership
      changes in the Navy's unmanned systems procurement office. These setbacks represent material risks to customer
      confidence and program continuity.
    claimRefs:
      - CU015
      - CU016
      - CU017
      - CU018
      - CU019
  - id: sec-concentration-risk
    title: "Concentration Risk and Channel Dependency"
    body: >
      Saronic faces extreme customer concentration risk. The U.S. Navy represents effectively 100% of current
      production revenue through the $392M Corsair OTA. All other customer engagements — SOCOM ($8M concluded
      prototype), Coast Guard (CRADA, no procurement), allied navies (advisory hires, no contracts) — are either
      small-scale, non-revenue, or pre-contractual. This single-customer dependency creates acute vulnerability to
      Navy budget cycles, program reprioritization, or political shifts. The April 2026 bid protest filed by
      Saronic in the U.S. Court of Federal Claims against the Navy's O&S contract for small USVs and LCS mission
      modules illustrates the competitive tension: Saronic alleged the solicitation unduly restricts competition to
      favor traditional defense contractors, potentially excluding commercial-first vendors. While the protest
      demonstrates Saronic's willingness to fight for market access, it also reveals that the Navy does not
      guarantee Saronic access to adjacent contract opportunities beyond the Corsair OTA. Channel dependency is
      direct-to-government with no disclosed reseller, systems integrator, or prime contractor partnerships for
      distribution. International expansion through AUKUS and Five Eyes alignment provides a medium-term
      diversification path, but allied navy procurement cycles typically lag U.S. adoption by 2–5 years. Commercial
      market entry (oil and gas, port security, offshore wind) remains aspirational with no confirmed revenue.
    claimRefs:
      - CU020
      - CU021
      - CU022
      - CU023
      - CU024
  - id: sec-expansion-pipeline
    title: "Expansion Pipeline and Future Customer Segments"
    body: >
      Saronic's customer expansion strategy operates on three axes: deeper DoD penetration, allied navy
      partnerships, and eventual commercial market entry. Within the DoD, the Marauder (150-foot, 40-ton payload
      Medium USV) targets the Navy's Medium and Large USV requirements, which represent substantially larger
      contract opportunities than the Corsair program. Saronic's NVIDIA-powered autonomy stack and open-architecture
      design position it for additional DIU Replicator tranches. The SOCOM relationship, though the prototype
      contract is concluded, could expand through future SOF-specific procurement vehicles. Allied navy expansion
      centers on the AUKUS framework: Australia's Royal Australian Navy and the UK Royal Navy have both signaled
      interest in autonomous surface vessel capabilities through their respective strategic defense reviews. Saronic's
      hiring of retired flag officers in both countries provides institutional access but has not yet converted to
      procurement contracts. The broader Five Eyes alliance (adding Canada and New Zealand) represents additional
      potential but with no public engagement signals. Commercial segments including oil and gas asset inspection,
      port security patrol, offshore wind farm monitoring, and hydrographic survey are technically addressable by
      Saronic's platform but require separate sales motions, regulatory approvals, and commercial pricing models
      that have not been publicly developed. The company's stated ambition to deliver capabilities across the
      US, UK, Europe, Australia, and Indo-Pacific reflects aspiration rather than confirmed pipeline.
    claimRefs:
      - CU025
      - CU026
      - CU027

