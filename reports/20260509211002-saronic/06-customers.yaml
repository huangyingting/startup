callouts:
  - calloutType: risk
    title: "Critical Single-Customer Concentration"
    body: >
      The U.S. Navy represents effectively 100% of Saronic's production revenue through the $392M Corsair OTA.
      All other customer engagements are either concluded (SOCOM $8M), non-revenue (Coast Guard CRADA), or
      pre-contractual (allied navies). This concentration creates acute vulnerability to Navy budget cycles,
      program reprioritization, or policy changes.
    claimRefs:
      - CU020
      - CU021
  - calloutType: risk
    title: "Test Incident and Bid Protest Signal Execution Risk"
    body: >
      The July 2025 collision incident during Navy autonomous vessel testing and the April 2026 bid protest
      against a Navy O&S contract both highlight operational and competitive risks that could affect Saronic's
      customer expansion trajectory.
    claimRefs:
      - CU018
      - CU022
  - calloutType: strength
    title: "Fastest Prototype-to-Production in Modern Defense"
    body: >
      Saronic achieved a production contract within 12 months of the Corsair's unveiling, demonstrating
      exceptional execution speed enabled by OTA procurement. This velocity is a significant competitive
      advantage in defense acquisition.
    claimRefs:
      - CU001
      - CU007

