    body: >
      The U.S. Navy represents effectively 100% of Saronic's production revenue through the $392M Corsair
      OTA. A single program cancellation, budget reprioritization, or adverse bid protest ruling could
      eliminate the company's primary revenue stream with no near-term alternative.
    claimRefs:
      - CR011
      - CR012
