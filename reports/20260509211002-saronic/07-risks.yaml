    title: "Autonomy Stack Reliability Unproven at Scale"
    body: >
      The mid-2025 collision incident demonstrated software-induced vessel stalling under operational
      conditions. Scaling from prototype testing to fleet deployment introduces additional failure modes
      that have not been validated in extended autonomous operations.
