artifact: company-snapshot
chapter: 1
minSections: 5
minTables: 3
minFigures: 2
requiredSections:
  - key: identity-purpose
    purpose: Identity, mission/purpose, product surface, and business context
    keywordsAny:
      - [identity]
      - [mission]
      - [purpose]
      - [product]
  - key: capital-governance-scale
    purpose: Funding/capital, leadership/governance, and operating scale signals
    keywordsAny:
      - [funding]
      - [capital]
      - [governance]
      - [scale]
  - key: snapshot-risks
    purpose: Summary of key diligence risks and open gaps
    keywordsAny:
      - [risk]
      - [gap]
requiredTables:
  - key: snapshot-kpis
    purpose: Company KPIs, status, confidence, and diligence gaps
    requiredColumnsAny:
      - [metric, public value, growth signal, benchmark, confidence, diligence gap]
      - [field, value, source, confidence, diligence ask]
      - [dimension, status, evidence, implication, diligence ask]
  - key: funding-milestones
    purpose: Funding/capital, investor, or operating milestone chronology
    requiredColumnsAny:
      - [date, event, amount, valuation, diligence note]
      - [date, event, amount, valuation, principal investors or notes]
      - [date, milestone, amount, source, implication]
      - [event, date, evidence, investor relevance, diligence ask]
  - key: stakeholders-governance
    purpose: Founders, leadership, governance, or strategic stakeholder map
    requiredColumnsAny:
      - [stakeholder group, named parties, role, diligence note]
      - [name, role, background, current status, evidence]
      - [person, role, background, relevance, source]
requiredFigures:
  - key: milestone-timeline
    purpose: Company milestone timeline
    allowedTypes: [timeline]
  - key: snapshot-logic-map
    purpose: Identity, product, customer, business-model, or snapshot logic map
    allowedTypes: [logic-chain, flow, stack, evidence-map, decision-map]
