requiredSections:
  - key: market-definition
    purpose: Market/category boundaries and included/excluded spend
    keywordsAny:
      - [market, definition]
      - [category, boundaries]
      - [included, excluded]
  - key: sizing-growth
    purpose: Market sizing, growth, and addressable opportunity logic
    keywordsAny:
      - [sizing]
      - [market, size]
      - [growth]
      - [tam]
  - key: buyers-adoption-constraints
    purpose: Buyer/user/budget pools, adoption drivers, and constraints
    keywordsAny:
      - [buyer]
      - [budget]
      - [adoption]
      - [constraint]
requiredTables:
  - key: market-definition
    purpose: Market definition and boundary table
    requiredColumnsAny:
      - [lens, included spend, excluded spend, why it matters for openai]
      - [market lens, definition, 2026 sizing signal, anthropic relevance, boundary risk]
      - [segment/category, included spend, excluded spend, buyer/payer, relevance]
      - [category, included spend, excluded spend, buyer, relevance]
  - key: sizing-lens
    purpose: TAM/SAM/SOM, sizing lenses, or end-state opportunity
    requiredColumnsAny:
      - [layer, evidence-backed proxy, 2026 value, anthropic implication, confidence]
      - [lens, 2025 baseline, end-state estimate, horizon, implication]
      - [source, year, geography, value, cagr, methodology, confidence, limitation]
  - key: segment-buyer-map
    purpose: Segment, buyer/user/payer, workflow, budget owner, or monetization route
    requiredColumnsAny:
      - [segment, primary buyer, core workflow, openai surface, monetization route]
      - [buyer, budget source, claude wedge, adoption driver, constraint]
      - [budget pool, typical owner, trigger for spend, penetration signal, open question]
      - [segment, buyer, user, payer, workflow/job-to-be-done, budget owner, adoption trigger]
  - key: drivers-constraints
    purpose: Growth drivers, adoption constraints, timing, and diligence implications
    requiredColumnsAny:
      - [theme, evidence, impact on anthropic, direction]
      - [factor, direction, evidence, diligence implication]
      - [driver/constraint, direction, evidence, timing, implication, diligence ask]
requiredFigures:
  - key: opportunity-sizing-view
    purpose: Market sizing, opportunity range, or adoption proxy view
    allowedTypes: [layered-lens, bars, range]
  - key: adoption-constraint-map
    purpose: Buyer, adoption path, driver/constraint, or market dynamics map
    allowedTypes: [causal-map, matrix, journey-map, flow, funnel, bars]
