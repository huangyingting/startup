requiredSections:
  - key: product-platform
    purpose: Product/platform scope, modules, and customer workflow
    keywordsAny:
      - [product]
      - [platform]
      - [module]
  - key: technical-readiness
    purpose: Technical differentiation, architecture, infrastructure, integrations, or roadmap
    keywordsAny:
      - [technical]
      - [architecture]
      - [integration]
      - [roadmap]
  - key: trust-reliability
    purpose: Security/privacy/compliance, reliability, implementation risk, and product verdict
    keywordsAny:
      - [security]
      - [privacy]
      - [compliance]
      - [reliability]
requiredTables:
  - key: product-modules
    purpose: Product modules, users, customer workflows, availability, capability, and gaps
    requiredColumnsAny:
      - [module, evidence-backed capabilities, buyer / user, packaging signal, diligence note]
      - [module, primary user, availability evidence, core capability, differentiation, diligence gap]
      - [module, user, workflow, evidence, diligence ask]
  - key: capabilities-differentiation
    purpose: Capabilities, differentiation, buyer value, risks, and limitations
    requiredColumnsAny:
      - [capability, evidence, differentiation, risk / limitation]
      - [capability, official evidence, product surface, buyer value, constraint]
  - key: architecture-integrations
    purpose: Architecture, infrastructure, dependency, integration, API, docs, or release surface
    requiredColumnsAny:
      - [layer, public evidence, architecture implication, open technical question]
      - [surface, integration or interface, public proof, why it matters, gap]
      - [date anchor, signal, source page, product implication]
      - [layer/dependency, role, evidence, risk, diligence ask]
  - key: trust-reliability
    purpose: Security, privacy, compliance, reliability, implementation, and trust posture
    requiredColumnsAny:
      - [area, public evidence, strength, gap]
      - [control area, public anchor, covered products, investor read, diligence ask]
      - [area, evidence, what it suggests, concern]
      - [control/certification, status, evidence, limitation, diligence ask]
requiredFigures:
  - key: architecture-stack
    purpose: Product or architecture stack
    allowedTypes: [stack]
  - key: workflow-risk-map
    purpose: Product workflow, dependency, reliability, implementation, or risk flow
    allowedTypes: [flow, dependency-map, journey-map, causal-map]
