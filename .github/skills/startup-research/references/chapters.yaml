schemaVersion: workflow-config-v1
workflow:
  skill: startup-research
  reportSchemaVersion: report-v2
  currentDateSource: runtime-session-date
  yamlRules: .github/skills/startup-research/references/yaml-rules.md
  reportSchema: .github/skills/startup-research/references/report-schema-v2.md
analysisDefaults:
  gate:
    minSections: 2
    maxSections: 6
    minTables: 1
    maxTables: 5
    minFigures: 1
    maxFigures: 4
    minResearchQuestions: 10
    minLocalSources: 10
    minLocalClaims: 15
    depthFloor:
      minSectionBodyWords: 80
      minSectionWordsTotal: 250
      minTableRowsTotal: 4
      minFigureDataPointsTotal: 3
  researchLoop:
    maxGateIterations: 3
    retryScope: failed-gate-dimensions
    freshnessSweepRequired: true
    retainSuccessfulEvidenceUnlessContradicted: true
finalArtifacts:
  evidence:
    file: 90-evidence.yaml
    artifact: evidence
  fullReport:
    file: 91-full-report.yaml
    artifact: full-report
  summaryCard:
    file: 92-summary-card.yaml
    artifact: summary-card
chapters:
  - key: company-overview
    order: 1
    file: 01-company-overview.yaml
    artifact: company-overview
    chapterNumber: 1
    reportChapterNumber: 2
    loaderKey: companyOverview
    title: Company Overview
    mission: Establish identity, product, team, funding, milestones, and the most important unknowns.
    optionalContext: []
    contentRequirements:
      - Identify the company, product, leadership, stage, funding, milestones, and key gaps.
      - Separate verified facts from company claims.
    requiredTables:
      - name: Snapshot table
        requirement: fact, value/status, evidence, confidence, gap.
    requiredFigures:
      - name: Milestone timeline
        types: [timeline]
        requirement: Key dated company events when evidence supports them.
    preferredFigureTypes: [timeline]
    evidenceStrategy:
      - Use official pages, funding/news sources, leadership sources, and adverse identity checks.
    qualityBar:
      - Later chapters can reuse this identity without guessing.
    gate:
      preferredFigureTypes: [timeline]
  - key: market-analysis
    order: 2
    file: 02-market-analysis.yaml
    artifact: market-analysis
    chapterNumber: 2
    reportChapterNumber: 3
    loaderKey: marketAnalysis
    title: Market Analysis
    mission: Define the market, buyer, adoption drivers, constraints, and sizing confidence.
    optionalContext: []
    contentRequirements:
      - Define market boundary, buyer/user/payer, segments, size signals, drivers, and blockers.
      - Preserve uncertainty instead of inventing TAM/SAM/SOM precision.
    requiredTables:
      - name: Market lens table
        requirement: segment or sizing lens, value/status, source, confidence, limitation.
    requiredFigures:
      - name: Market map
        types: [layered-lens, matrix, flow, bars, range]
        requirement: Show opportunity layers, segments, or adoption path.
    preferredFigureTypes: [layered-lens, matrix, flow, bars, range]
    evidenceStrategy:
      - Use market data, buyer evidence, industry sources, and disconfirming adoption evidence.
    qualityBar:
      - Market boundary is explicit before sizing.
    gate:
      preferredFigureTypes: [layered-lens, matrix, flow, bars, range]
  - key: competitors
    order: 3
    file: 03-competitors.yaml
    artifact: competitors
    chapterNumber: 3
    reportChapterNumber: 4
    loaderKey: competitors
    title: Competitors
    mission: Identify alternatives, differentiation, and moat risk.
    optionalContext: [02-market-analysis.yaml]
    contentRequirements:
      - Compare material alternatives on buyer-relevant criteria.
      - Include status quo/internal build when relevant.
    requiredTables:
      - name: Competitor matrix
        requirement: competitor, category, customer, differentiation, evidence, limitation.
    requiredFigures:
      - name: Positioning map
        types: [positioning-map, quadrant, matrix, scorecard]
        requirement: Show relative positioning or capability coverage.
    preferredFigureTypes: [positioning-map, quadrant, matrix, scorecard]
    evidenceStrategy:
      - Use competitor pages, pricing/product proof, customer proof, and independent/adverse sources.
    qualityBar:
      - Unsupported comparison cells are unknown, not guessed.
    gate:
      preferredFigureTypes: [positioning-map, quadrant, matrix, scorecard]
  - key: financials
    order: 4
    file: 04-financials.yaml
    artifact: financials
    chapterNumber: 4
    reportChapterNumber: 5
    loaderKey: financials
    title: Financials
    mission: Explain revenue model, pricing, unit economics, funding, capital needs, and gaps.
    optionalContext: [02-market-analysis.yaml, 03-competitors.yaml]
    contentRequirements:
      - Describe how activity becomes revenue, margin, cash need, and valuation input.
      - Mark unavailable private metrics as gaps.
    requiredTables:
      - name: Economics table
        requirement: metric, value/null, evidence, confidence, why it matters, diligence ask.
    requiredFigures:
      - name: Revenue/economics bridge
        types: [flow, bridge, waterfall, bars, range]
        requirement: Show how the model makes money or where economics are unknown.
    preferredFigureTypes: [flow, bridge, waterfall, bars, range]
    evidenceStrategy:
      - Use pricing, funding, traction, public comps, customer examples, and capital-intensity evidence.
    qualityBar:
      - Do not force SaaS metrics unless the model supports them.
    gate:
      preferredFigureTypes: [flow, bridge, waterfall, bars, range]
  - key: product-tech
    order: 5
    file: 05-product-tech.yaml
    artifact: product-tech
    chapterNumber: 5
    reportChapterNumber: 6
    loaderKey: productTech
    title: Product & Technology
    mission: Explain what is delivered, how it works, maturity, dependencies, and product risks.
    optionalContext: [02-market-analysis.yaml, 03-competitors.yaml, 04-financials.yaml]
    contentRequirements:
      - Cover product, workflow, architecture/operating model, maturity, differentiation, and gaps.
      - Mine official product/docs/trust pages when a company URL exists.
    requiredTables:
      - name: Product capability table
        requirement: capability, user/job, maturity, evidence, differentiation, gap.
    requiredFigures:
      - name: Product/architecture map
        types: [stack, flow, matrix, dependency-map, timeline]
        requirement: Show components, workflow, maturity, or dependencies.
    preferredFigureTypes: [stack, flow, matrix, dependency-map, timeline]
    evidenceStrategy:
      - Use official product/docs/trust pages, technical proof, customer proof, and reliability/security evidence.
    qualityBar:
      - Architecture and maturity claims need evidence or become gaps.
    gate:
      preferredFigureTypes: [stack, flow, matrix, dependency-map, timeline]
  - key: customers
    order: 6
    file: 06-customers.yaml
    artifact: customers
    chapterNumber: 6
    reportChapterNumber: 7
    loaderKey: customers
    title: Customers
    mission: Identify customer segments, adoption proof, retention/expansion signals, concentration risk, and gaps.
    optionalContext: [04-financials.yaml, 05-product-tech.yaml]
    contentRequirements:
      - Distinguish logos, actual usage, outcomes, retention, expansion, and concentration.
      - Treat unsupported retention/customer-count claims as gaps.
    requiredTables:
      - name: Customer proof table
        requirement: segment/customer, use case, proof, evidence quality, implication, gap.
    requiredFigures:
      - name: Customer journey or proof map
        types: [journey-map, funnel, matrix, bars, cohort, flow]
        requirement: Show adoption, expansion, proof quality, or retention path.
    preferredFigureTypes: [journey-map, funnel, matrix, bars, cohort, flow]
    evidenceStrategy:
      - Use customer pages, case studies, reviews, procurement/partner proof, and adverse customer evidence.
    qualityBar:
      - Logos alone do not prove retention or production use.
    gate:
      preferredFigureTypes: [journey-map, funnel, matrix, bars, cohort, flow]
  - key: risks
    order: 7
    file: 07-risks.yaml
    artifact: risks
    chapterNumber: 7
    reportChapterNumber: 8
    loaderKey: risks
    title: Risks
    mission: Rank legal, regulatory, operational, financial, customer, people, and dependency risks.
    optionalContext: [04-financials.yaml, 05-product-tech.yaml, 06-customers.yaml]
    contentRequirements:
      - Identify top thesis-breaking risks, evidence, severity, mitigation, and monitoring triggers.
      - Include adverse/disconfirming research.
    requiredTables:
      - name: Risk register
        requirement: risk, evidence, severity, mitigation, impact, diligence path.
    requiredFigures:
      - name: Risk map
        types: [heatmap, causal-map, dependency-map, matrix, flow]
        requirement: Show severity, transmission path, or dependencies.
    preferredFigureTypes: [heatmap, causal-map, dependency-map, matrix, flow]
    evidenceStrategy:
      - Use regulatory/legal sources, trust/security pages, filings, adverse reporting, and dependency evidence.
    qualityBar:
      - Do not assign severity from intuition alone.
    gate:
      preferredFigureTypes: [heatmap, causal-map, dependency-map, matrix, flow]
  - key: valuation
    order: 8
    file: 08-valuation.yaml
    artifact: valuation
    chapterNumber: 8
    reportChapterNumber: 9
    loaderKey: valuation
    title: Valuation
    mission: Turn evidence into recommendation, confidence, risk rating, valuation stance, scenarios, and diligence asks.
    optionalContext: [02-market-analysis.yaml, 03-competitors.yaml, 04-financials.yaml, 05-product-tech.yaml, 06-customers.yaml, 07-risks.yaml]
    contentRequirements:
      - State thesis, anti-thesis, recommendation, confidence, risk rating, valuation stance, scenarios, and diligence asks.
      - Use a valuation method that fits the business model and evidence quality.
    requiredTables:
      - name: Recommendation table
        requirement: recommendation, confidence, risk rating, valuation stance, evidence, what would change the view.
    requiredFigures:
      - name: Recommendation logic
        types: [logic-chain, scorecard, scenario-tree, sensitivity, range, matrix]
        requirement: Show how evidence leads to recommendation and valuation stance.
    preferredFigureTypes: [logic-chain, scorecard, scenario-tree, sensitivity, range, matrix]
    evidenceStrategy:
      - Use prior chapters, financing/valuation sources, public comps, scenario drivers, and downside/adverse evidence.
    qualityBar:
      - Recommendation is evidence-sensitive and price-sensitive.
    gate:
      preferredFigureTypes: [logic-chain, scorecard, scenario-tree, sensitivity, range, matrix]
