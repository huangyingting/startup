artifact: competitive-benchmarking
chapter: 3
minSections: 4
minTables: 4
minFigures: 2
requiredTables:
  - key: competitor-set
    purpose: Competitor and substitute set
    requiredColumnsAny:
      - [competitor/substitute, category, target customer, positioning, evidence]
  - key: feature-packaging
    purpose: Feature, packaging, and product comparison
    requiredColumnsAny:
      - [vendor, core product, differentiator, packaging/pricing, evidence]
  - key: moat-switching-cost
    purpose: Moat, switching cost, and defensibility assessment
    requiredColumnsAny:
      - [dimension, company, competitor benchmark, implication, diligence ask]
  - key: pricing-positioning
    purpose: Pricing and commercial positioning comparison
    requiredColumnsAny:
      - [vendor, price/packaging, buyer, proof point, limitation]
requiredFigures:
  - key: positioning-map
    purpose: Competitive positioning map
    allowedTypes: [quadrant, positioning-map]
  - key: competitor-scorecard
    purpose: Competitor or moat scorecard
    allowedTypes: [scorecard, matrix, heatmap]
