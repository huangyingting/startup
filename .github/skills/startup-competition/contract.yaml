artifact: competitive-benchmarking
chapter: 3
minSections: 4
minTables: 4
minFigures: 2
requiredSections:
  - key: landscape
    purpose: Competitor/substitute landscape and classes
    keywordsAny:
      - [competitive, landscape]
      - [competitor]
      - [substitute]
  - key: differentiation-positioning
    purpose: Product, feature, packaging, pricing, positioning, or differentiation
    keywordsAny:
      - [differentiation]
      - [positioning]
      - [pricing]
      - [packaging]
  - key: moat-risk
    purpose: Moat, switching cost, defensibility, and competitive risk verdict
    keywordsAny:
      - [moat]
      - [switching]
      - [risk]
requiredTables:
  - key: competitor-set
    purpose: Competitor/substitute classes, target customers, wedge, and evidence
    requiredColumnsAny:
      - [competitor, class, strategic strength, anthropic exposure, evidence quality]
      - [competitor class, company / product, core wedge, relevant proof point, openai implication]
      - [competitor/substitute, category, target customer, positioning, evidence]
  - key: feature-platform-comparison
    purpose: Feature, capability, product, or platform comparison
    requiredColumnsAny:
      - [dimension, anthropic claude, openai, google gemini, microsoft/github copilot, cursor/open devtools]
      - [capability, openai, anthropic, google gemini, microsoft copilot, competitive note]
      - [vendor, core product, differentiator, packaging/pricing, evidence]
  - key: pricing-packaging
    purpose: Pricing, packaging, commercial model, or GTM comparison
    requiredColumnsAny:
      - [product, public price signal, enterprise packaging signal, competitive implication]
      - [provider, entry business price, enterprise packaging, api / usage packaging, pricing implication]
      - [provider, distribution anchor, customer motion, switching friction, competitive takeaway]
      - [vendor, price/packaging, buyer, proof point, limitation]
  - key: moat-risk-register
    purpose: Moat, defensibility, switching cost, and competitive risk register
    requiredColumnsAny:
      - [moat vector, evidence, durability, diligence test]
      - [risk, why it matters, current evidence, mitigant or diligence ask]
      - [risk, mechanism, severity, evidence status]
      - [dimension, company, competitor benchmark, implication, diligence ask]
requiredFigures:
  - key: positioning-map
    purpose: Competitive positioning map
    allowedTypes: [quadrant, positioning-map]
  - key: competitive-pressure-view
    purpose: Competitive pressure, pricing comparison, moat, or risk visualization
    allowedTypes: [causal-map, bars, scorecard, matrix, heatmap]
