# Scheduled/manual startup unicorn research run.
#
# Discovers and researches recent private unicorn startups, optionally filtered
# by industry.
#
# CI installs deps, drives the GitHub Copilot CLI to produce report YAML under
# reports/<run>/, validates the site, and commits
# the new artifacts.
#
# Required secrets:
# - COPILOT_PAT — PAT for a Copilot-licensed account; consumed by the Copilot CLI.
# - STARTUP_PAT — PAT with repo write access for checkout/push.

name: Research unicorns

env:
  CURL_IMPERSONATE_VERSION: "1.5.6"
  CURL_IMPERSONATE_TARBALL: "curl-impersonate-v1.5.6.x86_64-linux-gnu.tar.gz"
  CURL_IMPERSONATE_SHA256: "b60344f63b9ed8806f0e9f7fd357d9f6c9a82aca279ed1e9e257d544885dcbde"

on:
  # schedule:  # Disabled: Cloudflare Worker handles scheduling.
  #   - cron: "30 */4 * * *"
  workflow_dispatch:
    inputs:
      industry:
        description: "Industry."
        required: false
        default: "Any"
        type: choice
        options:
          - Any
          - AI / application software
          - infrastructure / devtools
          - fintech
          - healthcare / biotech
          - climate / energy
          - cybersecurity
          - robotics / hardware
          - consumer / education
          - industrial / logistics
      unicornCount:
        description: "Max reports."
        required: false
        default: "3"
        type: string
      model:
        description: "Model."
        required: false
        default: "claude-sonnet-4.6"
        type: choice
        options:
          - gpt-5.5
          - gpt-5.4
          - claude-sonnet-4.6
          - claude-opus-4.6

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: startup-research-${{ github.event.inputs.industry || 'all-industries' }}
  cancel-in-progress: false

jobs:
  research:
    name: Discover and generate unicorn diligence reports
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - name: Checkout repository history
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.STARTUP_PAT }}

      - name: Set up Node.js with npm cache
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: |
            package-lock.json
            website/package-lock.json

      - name: Install dependencies and Copilot CLI
        run: |
          npm ci || npm install --no-audit --no-fund
          npm --prefix website ci || npm --prefix website install --no-audit --no-fund
          npm install -g @github/copilot

      - name: Restore curl-impersonate cache
        uses: actions/cache@v5
        with:
          path: ~/.local/share/curl-impersonate
          key: curl-impersonate-${{ runner.os }}-${{ env.CURL_IMPERSONATE_VERSION }}-${{ env.CURL_IMPERSONATE_SHA256 }}

      - name: Install browser-impersonating fetch client
        run: |
          set -euo pipefail
          INSTALL_DIR="$HOME/.local/share/curl-impersonate"
          if [ ! -x "$INSTALL_DIR/curl_chrome120" ]; then
            rm -rf "$INSTALL_DIR"
            mkdir -p "$INSTALL_DIR"
            cd "$INSTALL_DIR"
            URL="https://github.com/lexiforest/curl-impersonate/releases/download/v${CURL_IMPERSONATE_VERSION}/${CURL_IMPERSONATE_TARBALL}"
            curl -sSL --retry 3 --retry-delay 5 -o "$CURL_IMPERSONATE_TARBALL" "$URL"
            echo "${CURL_IMPERSONATE_SHA256}  ${CURL_IMPERSONATE_TARBALL}" | sha256sum -c -
            tar -xzf "$CURL_IMPERSONATE_TARBALL"
            rm -f "$CURL_IMPERSONATE_TARBALL"
          fi
          "$INSTALL_DIR/curl_chrome120" -s -o /dev/null -w 'curl-impersonate smoke test: %{http_code}\n' https://example.com
          echo "CURL_IMPERSONATE_DIR=$INSTALL_DIR" >> "$GITHUB_ENV"

      - name: Normalize unicorn discovery inputs
        id: inputs
        env:
          RAW_INDUSTRY: ${{ github.event.inputs.industry }}
          RAW_COUNT: ${{ github.event.inputs.unicornCount }}
          RAW_MODEL: ${{ github.event.inputs.model }}
        run: |
          set -euo pipefail
          trim() { printf '%s' "${1//$'\n'/ }" | sed 's/^[[:space:]]*//; s/[[:space:]]*$//'; }
          INDUSTRY="$(trim "$RAW_INDUSTRY")"
          COUNT="$(trim "$RAW_COUNT")"
          MODEL="$(trim "$RAW_MODEL")"
          RUN_DATE="$(date -u +%F)"
          CUTOFF_DATE="$(date -u -d '2 years ago' +%F)"
          if [ -z "$INDUSTRY" ]; then
            INDUSTRY="Any"
          fi
          case "$INDUSTRY" in
            Any|"AI / application software"|"infrastructure / devtools"|fintech|"healthcare / biotech"|"climate / energy"|cybersecurity|"robotics / hardware"|"consumer / education"|"industrial / logistics") ;;
            *)
              echo "Unsupported industry: $INDUSTRY" >&2
              exit 1
              ;;
          esac
          if ! [[ "$COUNT" =~ ^[0-9]+$ ]] || [ "$COUNT" -lt 1 ]; then
            COUNT=3
          fi
          case "$MODEL" in
            claude-sonnet-4.6|claude-opus-4.6|gpt-5.5|gpt-5.4) ;;
            "") MODEL="claude-sonnet-4.6" ;;
            *)
              echo "Unsupported model: $MODEL (allowed: claude-sonnet-4.6, claude-opus-4.6, gpt-5.5, gpt-5.4)" >&2
              exit 1
              ;;
          esac
          if [ "$INDUSTRY" = "Any" ]; then
            LABEL="recent-unicorns"
            INDUSTRY_RULE="Choose across different sectors, preferring underrepresented sectors/geographies."
          else
            LABEL="recent-unicorns-$INDUSTRY"
            INDUSTRY_RULE="Choose only companies in this industry: $INDUSTRY."
          fi
          SAFE_LABEL="$(printf '%s' "$LABEL" | tr -c '[:alnum:]' '-' | tr '[:upper:]' '[:lower:]' | sed 's/-\+/-/g; s/^-//; s/-$//' | cut -c1-60)"
          if [ -z "$SAFE_LABEL" ]; then
            SAFE_LABEL="startup"
          fi
          {
            echo "count=$COUNT"
            echo "industry=$INDUSTRY"
            echo "industryRule=$INDUSTRY_RULE"
            echo "label=$LABEL"
            echo "safeLabel=$SAFE_LABEL"
            echo "model=$MODEL"
            echo "runDate=$RUN_DATE"
            echo "cutoffDate=$CUTOFF_DATE"
          } >> "$GITHUB_OUTPUT"

      - name: Write unicorn run summary
        run: |
          {
            echo "## Startup research run"
            echo
            echo "| Field | Value |"
            echo "| --- | --- |"
            echo "| Max reports | ${{ steps.inputs.outputs.count }} |"
            echo "| Industry | ${{ steps.inputs.outputs.industry }} |"
            echo "| Model | ${{ steps.inputs.outputs.model }} |"
            echo "| Run date | ${{ steps.inputs.outputs.runDate }} UTC |"
            echo "| Unicorn cutoff | ${{ steps.inputs.outputs.cutoffDate }} |"
            echo "| Label | ${{ steps.inputs.outputs.label }} |"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Summarize portfolio coverage gaps
        id: coverage
        run: |
          set -euo pipefail
          node --input-type=module > "$RUNNER_TEMP/report-coverage.txt" <<'NODE'
          import fs from 'node:fs';
          import path from 'node:path';
          import yaml from 'js-yaml';

          // Walk every reports/<runId>/. Folders WITH summary-card.yaml are
          // finalized and bucketed by sector; folders WITHOUT summary-card
          // but with at least one chapter YAML are "in-flight" and surfaced
          // separately so a parallel run does not pick the same companies.
          const finalized = [];
          const inFlight = [];
          const workflowConfig = yaml.load(fs.readFileSync('.agents/skills/startup-research/references/workflow-config.yaml', 'utf8')) ?? {};
          const chapterFiles = new Set((workflowConfig.chapters ?? []).map((chapter) => `${String(chapter.order).padStart(2, '0')}-${chapter.key}.yaml`));
          for (const name of fs.readdirSync('reports')) {
            if (name.startsWith('.') || name.startsWith('_')) continue;
            const dir = path.join('reports', name);
            const cardPath = path.join(dir, 'summary-card.yaml');
            if (fs.existsSync(cardPath)) {
              try {
                const card = yaml.load(fs.readFileSync(cardPath, 'utf8')) ?? {};
                const company = card.company ?? {};
                finalized.push({
                  companyName: company.name ?? null,
                  sector: company.sector ?? null,
                  stage: company.stage ?? null,
                });
              } catch {}
              continue;
            }
            // No card; treat as in-flight only when at least one chapter is
            // present (otherwise it is empty scratch / cleanup target).
            let hasChapter = false;
            try {
              for (const f of fs.readdirSync(dir)) {
                if (chapterFiles.has(f)) { hasChapter = true; break; }
              }
            } catch {}
            if (hasChapter) inFlight.push(name.replace(/^\d{14}-/, ''));
          }
          const buckets = [
            ['AI / application software', /\b(ai|artificial intelligence|machine learning|ml|llm|video generation|language learning|saas)\b/i],
            ['infrastructure / devtools', /\b(infrastructure|devtools|developer|data platform|cloud|database|observability)\b/i],
            ['fintech', /\b(fintech|payments?|banking|payroll|finance|financial)\b/i],
            ['healthcare / biotech', /\b(health|healthcare|bio|biotech|clinical|medical|drug|therapeutic|diagnostic)\b/i],
            ['climate / energy', /\b(climate|energy|battery|grid|carbon|solar|renewable|power)\b/i],
            ['cybersecurity', /\b(cyber|security|identity|fraud|risk)\b/i],
            ['robotics / hardware', /\b(robot|robotics|hardware|semiconductor|chip|manufacturing)\b/i],
            ['consumer / education', /\b(consumer|education|edtech|learning|creator|media)\b/i],
            ['industrial / logistics', /\b(industrial|logistics|supply chain|warehouse|transport|construction)\b/i],
          ];
          const counts = new Map(buckets.map(([name]) => [name, 0]));
          for (const report of finalized) {
            const text = `${report.sector ?? ''} ${report.stage ?? ''} ${report.companyName ?? ''}`;
            const match = buckets.find(([, pattern]) => pattern.test(text));
            if (match) counts.set(match[0], (counts.get(match[0]) ?? 0) + 1);
          }
          const ranked = [...counts.entries()].sort((a, b) => a[1] - b[1] || a[0].localeCompare(b[0]));
          const under = ranked.slice(0, 5).map(([name, count]) => `${name} (${count})`).join(', ');
          const covered = ranked.filter(([, count]) => count > 0).slice(-5).reverse().map(([name, count]) => `${name} (${count})`).join(', ') || 'none yet';
          const inFlightLine = inFlight.length === 0
            ? 'In-flight runs: 0.'
            : `In-flight runs: ${inFlight.length} (${inFlight.slice(0, 10).join(', ')}${inFlight.length > 10 ? ', ...' : ''}); avoid picking these companies.`;
          console.log(`Existing reports: ${finalized.length}. Underrepresented sectors: ${under}. More covered sectors: ${covered}. ${inFlightLine}`);
          NODE
          {
            echo "coverageHint<<EOF"
            cat "$RUNNER_TEMP/report-coverage.txt"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
          {
            echo
            echo "### Portfolio coverage hint"
            cat "$RUNNER_TEMP/report-coverage.txt"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Snapshot reports before generation
        run: |
          find reports -mindepth 1 -maxdepth 1 -type d -printf '%f\n' | sort > "$RUNNER_TEMP/reports-before.txt"

      - name: Generate recent-unicorn diligence reports
        env:
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_PAT }}
          COUNT: ${{ steps.inputs.outputs.count }}
          INDUSTRY_RULE: ${{ steps.inputs.outputs.industryRule }}
          MODEL: ${{ steps.inputs.outputs.model }}
          RUN_DATE: ${{ steps.inputs.outputs.runDate }}
          CUTOFF_DATE: ${{ steps.inputs.outputs.cutoffDate }}
          COVERAGE_HINT: ${{ steps.coverage.outputs.coverageHint }}
          # fetch-url's main() appends one JSON line per call to this file
          # whenever the env var is set. check-chapter cross-references each
          # cited URL against the trail and surfaces unverifiedSource warnings
          # when a citation never went through fetch-url. Single file per
          # workflow run is fine: check-chapter only needs "did this URL get
          # retrieved at least once during this run".
          STARTUP_FETCH_LOG_PATH: ${{ github.workspace }}/.research-cache/_fetch-log.jsonl
        run: |
          set -euo pipefail
          mkdir -p "$(dirname "$STARTUP_FETCH_LOG_PATH")"
          : > "$STARTUP_FETCH_LOG_PATH"
          PROMPT=$(cat <<EOF
          Produce full diligence reports for up to $COUNT private startup unicorns.

          Run date: $RUN_DATE UTC. Recent means the unicorn evidence is dated on or after $CUTOFF_DATE.
          $INDUSTRY_RULE
          Pick only companies with credible public evidence of a \$1B+ private valuation or unicorn-confirming financing in that window. Use this portfolio hint: $COVERAGE_HINT
          Skip duplicates already in reports/ (each finalized run lives in reports/<runId>/summary-card.yaml; the create-report-run.mjs duplicate guard checks the same set) unless there is materially new evidence. If fewer than $COUNT qualify, research only the actual qualifying companies. If none qualify, do not create report folders; print a short no-candidates note and exit successfully.

          For each selected company, generate a startup diligence research report.
          If you fan out any work, wait for each task, inspect the result, and verify the on-disk report folder has all final artifacts before exiting.

          Source verification: every URL you cite in a chapter's localEvidence.sources[] must be retrieved through .agents/skills/fetch-url/scripts/fetch.mjs at least once during this run (the workflow exports STARTUP_FETCH_LOG_PATH so each fetch appends a line to the trail). check-chapter emits an unverifiedSource warning per citation that is not in the trail; clear those warnings by either (a) re-fetching the URL through fetch-url so accessStatus/sourceType/stance reflect the actual page, or (b) removing the citation if it cannot be retrieved.
          EOF
          )
          # tee the Copilot CLI output so the next step can parse the trailing
          # "Changes / Requests / Tokens" stats line into the step summary.
          mkdir -p "$RUNNER_TEMP/copilot-logs"
          COPILOT_LOG="$RUNNER_TEMP/copilot-logs/run.log"
          set +e
          copilot --yolo --autopilot --model "$MODEL" -p "$PROMPT" 2>&1 | tee "$COPILOT_LOG"
          status=${PIPESTATUS[0]}
          set -e
          # Per-step stats summary (best-effort: copilot CLI prints these on
          # the last few lines of its output). Also report fetch-url trail
          # size so the validate step's unverifiedSource warnings have
          # context.
          {
            echo
            echo "### Copilot run stats"
            if [ -s "$COPILOT_LOG" ]; then
              tail -n 20 "$COPILOT_LOG" | grep -iE '^(changes?|requests?|tokens?)\b' | sed 's/^/- /' || echo "- (no stats line emitted)"
            else
              echo "- (no Copilot output captured)"
            fi
            if [ -s "$STARTUP_FETCH_LOG_PATH" ]; then
              fetch_calls=$(wc -l < "$STARTUP_FETCH_LOG_PATH")
              fetch_ok=$(grep -c '"ok":true' "$STARTUP_FETCH_LOG_PATH" || true)
              echo "- fetch-url calls: $fetch_calls (ok=$fetch_ok)"
            else
              echo "- fetch-url trail empty (the agent did not call fetch-url; expect unverifiedSource warnings)"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
          exit "$status"

      - name: Finalize complete generated report folders
        # Safety net for the multi-company mode: if Copilot wrote every chapter
        # YAML plus report-meta.yaml but skipped the finalize-report.mjs pipeline
        # (which produces summary-card / evidence / full-report), run finalize
        # ourselves. We only attempt finalize when all upstream inputs exist;
        # truly partial folders are left alone for the next step to drop.
        run: |
          set -euo pipefail
          shopt -s nullglob
          mapfile -t required_inputs < <(
            node .agents/skills/startup-research/scripts/load-chapter-runtime-context.mjs --list --format json |
              node --input-type=module -e 'import fs from "node:fs"; const ctx = JSON.parse(fs.readFileSync(0, "utf8")); const allowed = ctx.workflow?.allowedReportFiles ?? {}; const files = [...(allowed.chapterArtifacts ?? []), ...(allowed.handAuthored ?? [])]; for (const file of files) console.log(file);'
          )
          if [ "${#required_inputs[@]}" -eq 0 ]; then
            echo "No required report inputs found in runtime context." >&2
            exit 1
          fi
          for dir in reports/*/; do
            # Skip if already finalized.
            if [ -f "${dir}summary-card.yaml" ]; then
              continue
            fi
            # Only finalize when every required input is present.
            missing=()
            for f in "${required_inputs[@]}"; do
              [ -f "${dir}${f}" ] || missing+=("$f")
            done
            if [ "${#missing[@]}" -gt 0 ]; then
              echo "Skipping ${dir%/}: missing $(IFS=,; echo "${missing[*]}")"
              continue
            fi
            echo "::group::Finalizing $dir"
            if node .agents/skills/startup-research/scripts/finalize-report.mjs "$dir"; then
              echo "Finalize succeeded for $dir"
            else
              echo "::warning::Finalize failed for $dir; will be dropped"
            fi
            echo "::endgroup::"
          done

      - name: Preserve generated reports artifact
        # Capture the full Copilot output (including any partial folders) before
        # we prune. Available even on failure for offline recovery.
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: research-reports-${{ steps.inputs.outputs.safeLabel }}
          path: reports/
          retention-days: 14
          if-no-files-found: ignore

      - name: Remove incomplete report folders
        # A partial folder = chapter YAMLs without a finalized summary-card,
        # full-report, evidence, or report-meta. Remove them so they don't
        # contaminate the commit; the artifact above preserves the originals.
        run: |
          set -euo pipefail
          shopt -s nullglob
          mapfile -t required_files < <(
            node .agents/skills/startup-research/scripts/load-chapter-runtime-context.mjs --list --format json |
              node --input-type=module -e 'import fs from "node:fs"; const ctx = JSON.parse(fs.readFileSync(0, "utf8")); const allowed = ctx.workflow?.allowedReportFiles ?? {}; const files = [...(allowed.handAuthored ?? []), ...(allowed.generated ?? [])]; for (const file of files) console.log(file);'
          )
          if [ "${#required_files[@]}" -eq 0 ]; then
            echo "No required finalized report files found in runtime context." >&2
            exit 1
          fi
          find reports -mindepth 1 -maxdepth 1 -type d -printf '%f\n' | sort > "$RUNNER_TEMP/reports-before-prune.txt"
          comm -13 "$RUNNER_TEMP/reports-before.txt" "$RUNNER_TEMP/reports-before-prune.txt" > "$RUNNER_TEMP/reports-created.txt" || true
          : > "$RUNNER_TEMP/reports-dropped.txt"
          : > "$RUNNER_TEMP/reports-new-dropped.txt"
          dropped=()
          for dir in reports/*/; do
            for required in "${required_files[@]}"; do
              if [ ! -f "${dir}${required}" ]; then
                folder="${dir%/}"
                folder_name="${folder#reports/}"
                rm -rf "$dir"
                dropped+=("$folder")
                printf '%s\n' "$folder_name" >> "$RUNNER_TEMP/reports-dropped.txt"
                if grep -Fxq "$folder_name" "$RUNNER_TEMP/reports-created.txt"; then
                  printf '%s\n' "$folder_name" >> "$RUNNER_TEMP/reports-new-dropped.txt"
                fi
                break
              fi
            done
          done
          if [ "${#dropped[@]}" -gt 0 ]; then
            printf '::warning::Dropped partial report folder(s):\n'
            printf ' - %s\n' "${dropped[@]}"
          else
            echo "No partial report folders to drop."
          fi

      - name: Summarize finalized report folders
        run: |
          set -euo pipefail
          find reports -mindepth 1 -maxdepth 1 -type d -printf '%f\n' | sort > "$RUNNER_TEMP/reports-after.txt"
          comm -13 "$RUNNER_TEMP/reports-before.txt" "$RUNNER_TEMP/reports-after.txt" > "$RUNNER_TEMP/reports-new.txt" || true
          {
            echo
            echo "### Report folder changes"
            if [ -s "$RUNNER_TEMP/reports-created.txt" ]; then
              echo "Report folders created during generation/finalization:"
              sed 's/^/- `reports\//; s/$/`/' "$RUNNER_TEMP/reports-created.txt"
              echo
            fi
            if [ -s "$RUNNER_TEMP/reports-dropped.txt" ]; then
              echo "Partial report folders dropped before commit:"
              sed 's/^/- `reports\//; s/$/`/' "$RUNNER_TEMP/reports-dropped.txt"
              echo
            fi
            if [ -s "$RUNNER_TEMP/reports-new-dropped.txt" ]; then
              echo "Newly-created report folders that failed to finalize:"
              sed 's/^/- `reports\//; s/$/`/' "$RUNNER_TEMP/reports-new-dropped.txt"
              echo
            fi
            if [ -s "$RUNNER_TEMP/reports-new.txt" ]; then
              echo "New report folders:"
              sed 's/^/- `reports\//; s/$/`/' "$RUNNER_TEMP/reports-new.txt"
            else
              echo "No new finalized report folders detected."
            fi
          } >> "$GITHUB_STEP_SUMMARY"
          if [ -s "$RUNNER_TEMP/reports-new-dropped.txt" ]; then
            echo "::error::Newly-created report folder(s) were incomplete and had to be pruned. This means report generation did not finish cleanly; see the preserved research-reports artifact for recovery details."
            exit 1
          fi
          if [ -s "$RUNNER_TEMP/reports-created.txt" ] && [ ! -s "$RUNNER_TEMP/reports-new.txt" ]; then
            echo "::error::Report folders were created, but none survived finalization/pruning. This usually means generation exited before writing complete report artifacts. See the preserved research-reports artifact for recovery details."
            exit 1
          fi

      - name: Validate reports and website build
        env:
          # Same trail file the research step appended to. check-chapter
          # cross-references it to surface unverifiedSource warnings for any
          # citation the agent did not retrieve through fetch-url.
          STARTUP_FETCH_LOG_PATH: ${{ github.workspace }}/.research-cache/_fetch-log.jsonl
        run: npm run validate

      - name: Commit and publish generated reports
        env:
          LABEL: ${{ steps.inputs.outputs.label }}
          SAFE_LABEL: ${{ steps.inputs.outputs.safeLabel }}
          GH_TOKEN: ${{ secrets.STARTUP_PAT }}
        run: |
          set -euo pipefail
          git config user.name "startup-research-bot"
          git config user.email "startup-research-bot@users.noreply.github.com"
          BRANCH="${{ github.ref_name }}"
          SAFE_LABEL="${SAFE_LABEL:-startup}"
          STAMP="$(date -u +%F)"
          MESSAGE="chore(reports): research ${SAFE_LABEL:-startup} $STAMP"

          # Stage and stop early if there is nothing to commit.
          git add reports/
          if git diff --cached --quiet; then
            echo "No new or updated startup reports."
            exit 0
          fi
          git commit -m "$MESSAGE"

          # Each report run only writes its own reports/<runId>/ folder; there
          # is no derived cross-report file. Parallel runs cannot conflict
          # unless two runs picked the exact same runId+slug, so a plain
          # rebase loop is sufficient.
          for attempt in 1 2 3; do
            echo "Push attempt $attempt/3 to $BRANCH"
            git fetch origin "$BRANCH"
            if ! git rebase --autostash "origin/$BRANCH"; then
              echo "Rebase failed; aborting and retrying." >&2
              git rebase --abort || true
              sleep $((attempt * 5))
              continue
            fi
            if git push origin "HEAD:$BRANCH"; then
              echo "Pushed to $BRANCH on attempt $attempt."
              exit 0
            fi
            sleep $((attempt * 5))
          done

          # Fallback: push to a side branch and open a PR so the long run is
          # never lost when direct push is blocked (branch protection, race, etc.).
          PR_BRANCH="auto/research-${SAFE_LABEL:-startup}-${STAMP}-$(date -u +%H%M%S)"
          echo "Direct push to $BRANCH failed; pushing to $PR_BRANCH and opening PR." >&2
          git push origin "HEAD:$PR_BRANCH"
          # The default GITHUB_TOKEN with `permissions: pull-requests: write`
          # is what `gh pr create` needs; STARTUP_PAT lacks that scope.
          GH_TOKEN="${{ secrets.GITHUB_TOKEN }}" gh pr create --base "$BRANCH" --head "$PR_BRANCH" \
            --title "$MESSAGE" \
            --body "Automated research run. Direct push to \`$BRANCH\` failed after 3 attempts; merging via PR instead."
