# Manual startup research run.
#
# The default Copilot agent runs the AGENTS.md Startup Research workflow. CI
# installs deps, invokes the CLI, rebuilds reports/_index.yaml, validates the
# site, and commits completed YAML report artifacts.
#
# Required secrets / setup:
# - COPILOT_PAT — PAT for a Copilot-licensed account; passed to the Copilot CLI.
# - STARTUP_PAT — PAT with repo write access for checkout/push and downstream deploy triggers.

name: Research startup company

on:
  workflow_dispatch:
    inputs:
      companyName:
        description: "Company name to research; leave blank to auto-select recent unicorns"
        required: false
        default: ""
        type: string
      companyUrl:
        description: "Optional official website or profile URL; leave blank for auto-select mode"
        required: false
        default: ""
        type: string
permissions:
  contents: write

concurrency:
  group: startup-research-${{ github.event.inputs.companyName || 'recent-unicorns' }}
  cancel-in-progress: false

jobs:
  research:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.STARTUP_PAT }}

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: |
            package-lock.json
            website/package-lock.json

      - name: Install root deps
        run: npm ci || npm install --no-audit --no-fund

      - name: Install website deps
        working-directory: website
        run: npm ci || npm install --no-audit --no-fund

      - name: Install GitHub Copilot CLI
        run: npm install -g @github/copilot

      - name: Resolve run inputs
        id: inputs
        env:
          RAW_COMPANY: ${{ github.event.inputs.companyName }}
          RAW_URL: ${{ github.event.inputs.companyUrl }}
        run: |
          set -euo pipefail
          COMPANY="$(printf '%s' "${RAW_COMPANY//$'\n'/ }" | sed 's/^[[:space:]]*//; s/[[:space:]]*$//')"
          URL="$(printf '%s' "${RAW_URL//$'\n'/ }" | sed 's/^[[:space:]]*//; s/[[:space:]]*$//')"
          MODE="single-company"
          if [ -z "$COMPANY" ] && [ -z "$URL" ]; then
            MODE="recent-unicorns"
            COMPANY="recent-unicorns"
          elif [ -z "$COMPANY" ]; then
            COMPANY="$URL"
          fi
          {
            echo "mode=$MODE"
            echo "company<<EOF"
            echo "$COMPANY"
            echo "EOF"
            echo "url<<EOF"
            echo "$URL"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Run Startup Research workflow
        env:
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_PAT }}
          MODE: ${{ steps.inputs.outputs.mode }}
          COMPANY: ${{ steps.inputs.outputs.company }}
          COMPANY_URL: ${{ steps.inputs.outputs.url }}
        run: |
          set -euo pipefail
          if [ "$MODE" = "recent-unicorns" ]; then
            PROMPT=$(cat <<EOF
          Follow AGENTS.md and run recent-unicorn discovery.

          Select at least 5 recent private unicorn startups suitable for VC diligence. Prefer companies that recently raised, crossed or were reported above a \$1B valuation, or became newly prominent in the last 12-24 months. Avoid companies already present in reports/_index.yaml unless a materially new report is justified.

          For each selected company, run one complete Startup Research workflow using skills directly. Do not invoke another agent or delegate report stages. Use schemaVersion startup-diligence-report-v2 and the references listed in AGENTS.md. Each company must produce the full required English YAML set under its own reports/<run>/ folder. Use web_search only as described by AGENTS.md and .github/references/analysis-rules.md. Delete duplicate, failed, or partial report folders before final validation. Do not run git add or git commit.
          EOF
          )
          else
            PROMPT=$(cat <<EOF
          Follow AGENTS.md and run one complete Startup Research workflow for this company.

          Company: $COMPANY
          Company URL: ${COMPANY_URL:-null}

          Use schemaVersion startup-diligence-report-v2 and the references listed in AGENTS.md. Run the required skills in order; do not invoke another agent or delegate report stages. Write the full required English YAML set under reports/<run>/. Use web_search only as described by AGENTS.md and .github/references/analysis-rules.md. Delete duplicate, failed, or partial report folders before final validation. Do not run git add or git commit.
          EOF
          )
          fi
          copilot --yolo --no-ask-user -p "$PROMPT"

      - name: Rebuild reports/_index.yaml
        run: node scripts/build-reports-index.mjs --strict

      - name: Validate generated report and website
        run: npm run validate

      - name: Reject partial report folders
        run: |
          set -euo pipefail
          shopt -s nullglob
          partials=()
          for dir in reports/*/; do
            if compgen -G "${dir}*.yaml" > /dev/null; then
              for required in 102-report-card.yaml; do
                if [ ! -f "${dir}${required}" ]; then
                  partials+=("${dir%/} (missing ${required})")
                fi
              done
            fi
          done
          if [ "${#partials[@]}" -gt 0 ]; then
            printf 'Partial report folder(s) found; refusing to commit:\n' >&2
            printf ' - %s\n' "${partials[@]}" >&2
            exit 1
          fi

      - name: Commit and push new report
        env:
          COMPANY: ${{ steps.inputs.outputs.company }}
        run: |
          set -euo pipefail
          git config user.name "startup-research-bot"
          git config user.email "startup-research-bot@users.noreply.github.com"
          git fetch origin "${{ github.ref_name }}"
          git rebase --autostash "origin/${{ github.ref_name }}"
          node scripts/build-reports-index.mjs --strict
          git add reports/
          if git diff --cached --quiet; then
            echo "No new or updated startup reports."
            exit 0
          fi
          SAFE_COMPANY="$(printf '%s' "$COMPANY" | tr -c '[:alnum:]' '-' | tr '[:upper:]' '[:lower:]' | sed 's/-\+/-/g; s/^-//; s/-$//' | cut -c1-60)"
          STAMP="$(date -u +%F)"
          git commit -m "chore(reports): research ${SAFE_COMPANY:-startup} $STAMP"
          git push origin HEAD:${{ github.ref_name }}
