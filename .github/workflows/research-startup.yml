# Scheduled/manual startup research run.
#
# Two modes:
#   1. Research a single named company (provide companyName, optionally companyUrl).
#   2. Discover and research unicorn startups from the last 24 months across
#      diverse sectors (leave companyName blank; optionally set unicornCount).
#
# CI installs deps, drives the GitHub Copilot CLI to produce report YAML under
# reports/<run>/, rebuilds reports/_index.yaml, validates the site, and commits
# the new artifacts.
#
# Required secrets:
# - COPILOT_PAT — PAT for a Copilot-licensed account; consumed by the Copilot CLI.
# - STARTUP_PAT — PAT with repo write access for checkout/push.

name: Research startup company

on:
  schedule:
    # Every six hours. Scheduled runs leave inputs blank, so they use the
    # recent-unicorns discovery mode below.
    - cron: "30 */6 * * *"
  workflow_dispatch:
    inputs:
      companyName:
        description: "Company name to research. Leave blank to auto-discover recent two-year unicorns across sectors."
        required: false
        default: ""
        type: string
      companyUrl:
        description: "Optional official website or profile URL for the named company."
        required: false
        default: ""
        type: string
      unicornCount:
        description: "How many recent two-year unicorn startups to research when companyName is blank."
        required: false
        default: "3"
        type: string
      model:
        description: "Copilot CLI model to use."
        required: false
        default: "claude-sonnet-4.6"
        type: choice
        options:
          - gpt-5.5
          - gpt-5.4
          - claude-sonnet-4.6
          - claude-opus-4.6

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: startup-research-${{ github.event.inputs.companyName || 'recent-unicorns' }}
  cancel-in-progress: false

jobs:
  research:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.STARTUP_PAT }}

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: |
            package-lock.json
            website/package-lock.json

      - name: Install root deps
        run: npm ci || npm install --no-audit --no-fund

      - name: Install website deps
        working-directory: website
        run: npm ci || npm install --no-audit --no-fund

      - name: Install GitHub Copilot CLI
        run: npm install -g @github/copilot

      - name: Install curl-impersonate
        env:
          CURL_IMPERSONATE_VERSION: "1.5.6"
          CURL_IMPERSONATE_TARBALL: "curl-impersonate-v1.5.6.x86_64-linux-gnu.tar.gz"
          CURL_IMPERSONATE_SHA256: "b60344f63b9ed8806f0e9f7fd357d9f6c9a82aca279ed1e9e257d544885dcbde"
        run: |
          set -euo pipefail
          INSTALL_DIR="$HOME/.local/share/curl-impersonate"
          mkdir -p "$INSTALL_DIR"
          cd "$INSTALL_DIR"
          URL="https://github.com/lexiforest/curl-impersonate/releases/download/v${CURL_IMPERSONATE_VERSION}/${CURL_IMPERSONATE_TARBALL}"
          curl -sSL --retry 3 --retry-delay 5 -o "$CURL_IMPERSONATE_TARBALL" "$URL"
          echo "${CURL_IMPERSONATE_SHA256}  ${CURL_IMPERSONATE_TARBALL}" | sha256sum -c -
          tar -xzf "$CURL_IMPERSONATE_TARBALL"
          rm -f "$CURL_IMPERSONATE_TARBALL"
          ./curl_chrome120 -s -o /dev/null -w 'curl-impersonate smoke test: %{http_code}\n' https://example.com
          echo "CURL_IMPERSONATE_DIR=$INSTALL_DIR" >> "$GITHUB_ENV"

      - name: Resolve run inputs
        id: inputs
        env:
          RAW_COMPANY: ${{ github.event.inputs.companyName }}
          RAW_URL: ${{ github.event.inputs.companyUrl }}
          RAW_COUNT: ${{ github.event.inputs.unicornCount }}
          RAW_MODEL: ${{ github.event.inputs.model }}
        run: |
          set -euo pipefail
          trim() { printf '%s' "${1//$'\n'/ }" | sed 's/^[[:space:]]*//; s/[[:space:]]*$//'; }
          COMPANY="$(trim "$RAW_COMPANY")"
          URL="$(trim "$RAW_URL")"
          COUNT="$(trim "$RAW_COUNT")"
          MODEL="$(trim "$RAW_MODEL")"
          RUN_DATE="$(date -u +%F)"
          CUTOFF_DATE="$(date -u -d '2 years ago' +%F)"
          if ! [[ "$COUNT" =~ ^[0-9]+$ ]] || [ "$COUNT" -lt 1 ]; then
            COUNT=3
          fi
          case "$MODEL" in
            claude-sonnet-4.6|claude-opus-4.6|gpt-5.5|gpt-5.4) ;;
            "") MODEL="claude-sonnet-4.6" ;;
            *)
              echo "Unsupported model: $MODEL (allowed: claude-sonnet-4.6, claude-opus-4.6, gpt-5.5, gpt-5.4)" >&2
              exit 1
              ;;
          esac
          if [ -z "$COMPANY" ]; then
            MODE="recent-unicorns"
            LABEL="recent-unicorns"
          else
            MODE="single-company"
            LABEL="$COMPANY"
          fi
          {
            echo "mode=$MODE"
            echo "count=$COUNT"
            echo "label=$LABEL"
            echo "model=$MODEL"
            echo "runDate=$RUN_DATE"
            echo "cutoffDate=$CUTOFF_DATE"
            echo "company<<EOF"
            echo "$COMPANY"
            echo "EOF"
            echo "url<<EOF"
            echo "$URL"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Run startup research
        env:
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_PAT }}
          MODE: ${{ steps.inputs.outputs.mode }}
          COUNT: ${{ steps.inputs.outputs.count }}
          COMPANY: ${{ steps.inputs.outputs.company }}
          COMPANY_URL: ${{ steps.inputs.outputs.url }}
          MODEL: ${{ steps.inputs.outputs.model }}
          RUN_DATE: ${{ steps.inputs.outputs.runDate }}
          CUTOFF_DATE: ${{ steps.inputs.outputs.cutoffDate }}
        run: |
          set -euo pipefail
          if [ "$MODE" = "recent-unicorns" ]; then
            PROMPT=$(cat <<EOF
          Produce full diligence reports for $COUNT private startup unicorns across different sectors.

          Run date: $RUN_DATE UTC. Recent means the unicorn evidence is dated on or after $CUTOFF_DATE.
          Pick companies with credible public evidence of a \$1B+ private valuation or unicorn-confirming financing in that window. Prefer sectors/geographies underrepresented in reports/_index.yaml. Skip companies already in reports/_index.yaml unless there is materially new evidence, and avoid repeating the same narrow category within this run.

          For each selected company, run one complete startup diligence report end-to-end yourself; do not delegate to another agent. Write the full required English YAML set under its own reports/<run>/ folder. Delete duplicate, failed, or partial report folders before finishing. Do not run git add or git commit.
          EOF
          )
          else
            PROMPT=$(cat <<EOF
          Produce one complete startup diligence report for the company below.

          Company: $COMPANY
          Company URL: ${COMPANY_URL:-unknown}

          Run the diligence workflow end-to-end yourself; do not delegate to another agent. Write the full required English YAML set under reports/<run>/. Delete duplicate, failed, or partial report folders before finishing. Do not run git add or git commit.
          EOF
          )
          fi
          copilot --yolo --no-ask-user --model "$MODEL" -p "$PROMPT"

      - name: Finalize any unfinalized report folders
        # Safety net for the multi-company mode: if Copilot wrote every chapter
        # YAML plus report-meta.yaml but skipped the finalize.mjs pipeline
        # (which produces summary-card / evidence / full-report), run finalize
        # ourselves. We only attempt finalize when all upstream inputs exist;
        # truly partial folders are left alone for the next step to drop.
        run: |
          set -euo pipefail
          shopt -s nullglob
          chapter_files=(
            01-company-overview.yaml
            02-market-analysis.yaml
            03-competitors.yaml
            04-financials.yaml
            05-product-tech.yaml
            06-customers.yaml
            07-risks.yaml
            08-valuation.yaml
            report-meta.yaml
          )
          for dir in reports/*/; do
            # Skip if already finalized.
            if [ -f "${dir}summary-card.yaml" ]; then
              continue
            fi
            # Only finalize when every required input is present.
            missing=()
            for f in "${chapter_files[@]}"; do
              [ -f "${dir}${f}" ] || missing+=("$f")
            done
            if [ "${#missing[@]}" -gt 0 ]; then
              echo "Skipping ${dir%/}: missing $(IFS=,; echo "${missing[*]}")"
              continue
            fi
            echo "::group::Finalizing $dir"
            if node .agents/skills/startup-research/scripts/finalize.mjs "$dir" --skip-index; then
              echo "Finalize succeeded for $dir"
            else
              echo "::warning::Finalize failed for $dir; will be dropped"
            fi
            echo "::endgroup::"
          done

      - name: Upload reports as artifact
        # Capture the full Copilot output (including any partial folders) before
        # we prune. Available even on failure for offline recovery.
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: research-reports-${{ steps.inputs.outputs.label }}
          path: reports/
          retention-days: 14
          if-no-files-found: ignore

      - name: Drop partial report folders
        # A partial folder = chapter YAMLs without a finalized summary-card,
        # full-report, evidence, or report-meta. Remove them so they don't
        # contaminate the commit; the artifact above preserves the originals.
        run: |
          set -euo pipefail
          shopt -s nullglob
          required_files=(summary-card.yaml full-report.yaml evidence.yaml report-meta.yaml)
          dropped=()
          for dir in reports/*/; do
            for required in "${required_files[@]}"; do
              if [ ! -f "${dir}${required}" ]; then
                rm -rf "$dir"
                dropped+=("${dir%/}")
                break
              fi
            done
          done
          if [ "${#dropped[@]}" -gt 0 ]; then
            printf '::warning::Dropped partial report folder(s):\n'
            printf ' - %s\n' "${dropped[@]}"
          else
            echo "No partial report folders to drop."
          fi

      - name: Rebuild reports/_index.yaml
        run: npm run build:report-index

      - name: Validate generated reports and website
        run: npm run validate

      - name: Commit and push new reports
        env:
          LABEL: ${{ steps.inputs.outputs.label }}
          GH_TOKEN: ${{ secrets.STARTUP_PAT }}
        run: |
          set -euo pipefail
          git config user.name "startup-research-bot"
          git config user.email "startup-research-bot@users.noreply.github.com"
          BRANCH="${{ github.ref_name }}"
          SAFE_LABEL="$(printf '%s' "$LABEL" | tr -c '[:alnum:]' '-' | tr '[:upper:]' '[:lower:]' | sed 's/-\+/-/g; s/^-//; s/-$//' | cut -c1-60)"
          STAMP="$(date -u +%F)"
          MESSAGE="chore(reports): research ${SAFE_LABEL:-startup} $STAMP"

          # Stage and stop early if there is nothing to commit.
          git add reports/
          if git diff --cached --quiet; then
            echo "No new or updated startup reports."
            exit 0
          fi
          git commit -m "$MESSAGE"

          # Try to fast-forward the local commit onto the remote head with up to
          # 3 rebase+push attempts. This handles a remote that moved while the
          # 3-hour research run was in progress.
          for attempt in 1 2 3; do
            echo "Push attempt $attempt/3 to $BRANCH"
            git fetch origin "$BRANCH"
            if git rebase --autostash "origin/$BRANCH"; then
              if git push origin "HEAD:$BRANCH"; then
                echo "Pushed to $BRANCH on attempt $attempt."
                exit 0
              fi
            else
              echo "Rebase failed; aborting and retrying." >&2
              git rebase --abort || true
            fi
            sleep $((attempt * 5))
          done

          # Fallback: push to a side branch and open a PR so the 3-hour run is
          # never lost when direct push is blocked (branch protection, race, etc.).
          PR_BRANCH="auto/research-${SAFE_LABEL:-startup}-${STAMP}-$(date -u +%H%M%S)"
          echo "Direct push to $BRANCH failed; pushing to $PR_BRANCH and opening PR." >&2
          git push origin "HEAD:$PR_BRANCH"
          gh pr create --base "$BRANCH" --head "$PR_BRANCH" \
            --title "$MESSAGE" \
            --body "Automated research run. Direct push to \`$BRANCH\` failed after 3 attempts; merging via PR instead."
