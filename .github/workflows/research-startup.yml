# Manual startup research run.
#
# The `Startup Research` agent owns one complete single-company skill workflow.
# CI installs deps, invokes the agent, rebuilds reports/_index.yaml, validates the
# site, and commits completed YAML report artifacts.
#
# Required secrets / setup:
# - COPILOT_PAT — PAT for a Copilot-licensed account; passed to the Copilot CLI.
# - STARTUP_PAT — PAT with repo write access for checkout/push and downstream deploy triggers.

name: Research startup company

on:
  workflow_dispatch:
    inputs:
      companyName:
        description: "Company name to research; leave blank to auto-select recent unicorns"
        required: false
        default: ""
        type: string
      companyUrl:
        description: "Optional official website or profile URL; leave blank for auto-select mode"
        required: false
        default: ""
        type: string
permissions:
  contents: write

concurrency:
  group: startup-research-${{ github.event.inputs.companyName || 'recent-unicorns' }}
  cancel-in-progress: false

jobs:
  research:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.STARTUP_PAT }}

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: |
            package-lock.json
            website/package-lock.json

      - name: Install root deps
        run: npm ci || npm install --no-audit --no-fund

      - name: Install website deps
        working-directory: website
        run: npm ci || npm install --no-audit --no-fund

      - name: Install GitHub Copilot CLI
        run: npm install -g @github/copilot

      - name: Resolve run inputs
        id: inputs
        env:
          RAW_COMPANY: ${{ github.event.inputs.companyName }}
          RAW_URL: ${{ github.event.inputs.companyUrl }}
        run: |
          set -euo pipefail
          COMPANY="$(printf '%s' "${RAW_COMPANY//$'\n'/ }" | sed 's/^[[:space:]]*//; s/[[:space:]]*$//')"
          URL="$(printf '%s' "${RAW_URL//$'\n'/ }" | sed 's/^[[:space:]]*//; s/[[:space:]]*$//')"
          MODE="single-company"
          if [ -z "$COMPANY" ] && [ -z "$URL" ]; then
            MODE="recent-unicorns"
            COMPANY="recent-unicorns"
          elif [ -z "$COMPANY" ]; then
            COMPANY="$URL"
          fi
          {
            echo "mode=$MODE"
            echo "company<<EOF"
            echo "$COMPANY"
            echo "EOF"
            echo "url<<EOF"
            echo "$URL"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Run Startup Research
        env:
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_PAT }}
          MODE: ${{ steps.inputs.outputs.mode }}
          COMPANY: ${{ steps.inputs.outputs.company }}
          COMPANY_URL: ${{ steps.inputs.outputs.url }}
        run: |
          set -euo pipefail
          if [ "$MODE" = "recent-unicorns" ]; then
            PROMPT=$(cat <<EOF
          Run automatic recent-unicorn discovery and batch startup research orchestration.

          No specific company name or company URL was provided by the user. You are the default top-level orchestrator. First, identify at least 5 recent private unicorn startups suitable for VC diligence. Prefer companies that recently raised, crossed or were reported above a \$1B valuation, or became newly prominent in the last 12-24 months. Avoid duplicate companies already present in reports/_index.yaml unless a materially new report is justified.

          For each selected company, launch the Startup Research agent concurrently, one agent run per selected company. Do not run internal report stages as separate agents from this top-level default agent; each Startup Research run is a single-agent skill workflow in this order: startup-brief -> startup-snapshot -> startup-market -> startup-competition -> startup-financials -> startup-product -> startup-customers -> startup-risks -> startup-valuation -> startup-ledger -> startup-report -> startup-card -> startup-report-zh -> startup-card-zh. Each run must own its post-01 duplicate-company check, dynamic per-skill evidence gathering into localEvidence during the 01-08 analysis stages, final evidence consolidation into 100-evidence-ledger.yaml during startup-ledger, and final validation after translation.

          Minimum company count: 5
          For every selected company, pass the Startup Research agent this required context: company name, official URL when available, schemaVersion startup-diligence-report-v2, schema reference .github/schemas/startup-diligence-report-v2.md, YAML syntax reference .github/references/yaml-syntax.md, and evidence-ledger reference .github/references/evidence-ledger.md. Each company must produce one complete YAML artifact set directly under its own reports/<run>/ folder, including 00-report-brief.yaml through 08-investment-valuation.yaml plus final 100-evidence-ledger.yaml, 101-report-document.yaml, 102-report-card.yaml, and required Simplified Chinese 101-report-document.zh.yaml and 102-report-card.zh.yaml. Do not generate non-YAML report artifacts. Analysis skills must write cited sources/claims into their own localEvidence blocks using local S###/C### IDs; startup-ledger must run node scripts/consolidate-evidence.mjs <reportFolder> to dedupe sources/claims, create final 100-evidence-ledger.yaml, and rewrite final claimRefs before startup-report and startup-card run. Keep every final factual claim linked through 100-evidence-ledger.yaml claimRefs/sourceRefs. Evidence collection is web_search-only and available to the single Startup Research agent throughout the analysis skill sequence: generate targeted queries from each skill's YAML needs, batch independent queries, run non-dependent web_search calls in parallel wherever possible, parse each response packet fully (answer text is candidate narrative, annotations[].url_citation supplies source candidates, valid spans map facts to citations, and bing_searches[] is query provenance only), generate sources[] only from cited/annotated URLs, dedupe by canonical URL and underlying event during consolidation, prefer recent sources for current claims, and vary queries when results repeat. Evidence coverage follows chapter needs: retain sources that support downstream claims or document evidenceGaps. Use null, with explanation, for unsupported metrics. During the 01-08 analysis skills, run dynamic per-skill web_search when missing data appears supportable; translate only after consolidation and the English report/card skills finish. Delete duplicate or failed partial report folders before final validation. Startup Research runs must not invoke Startup Research recursively. Do not run git add or git commit.
          EOF
          )
            copilot --yolo --no-ask-user -p "$PROMPT"
          else
            PROMPT=$(cat <<EOF
          Run the full Startup Research pipeline for this company.

          Company: $COMPANY
          Company URL: ${COMPANY_URL:-null}
          Use schemaVersion startup-diligence-report-v2 only. Run the single Startup Research skill workflow in this order: startup-brief -> startup-snapshot -> startup-market -> startup-competition -> startup-financials -> startup-product -> startup-customers -> startup-risks -> startup-valuation -> startup-ledger -> startup-report -> startup-card -> startup-report-zh -> startup-card-zh. Use the schema reference .github/schemas/startup-diligence-report-v2.md and YAML syntax reference .github/references/yaml-syntax.md. Read .github/references/evidence-ledger.md before writing localEvidence or consolidating 100-evidence-ledger.yaml. Write the complete YAML artifact set directly under reports/<run>/, including 00-report-brief.yaml through 08-investment-valuation.yaml plus final 100-evidence-ledger.yaml, 101-report-document.yaml, 102-report-card.yaml, and required Simplified Chinese 101-report-document.zh.yaml and 102-report-card.zh.yaml. Do not generate non-YAML report artifacts. Analysis skills must write cited sources/claims into their own localEvidence blocks using local S###/C### IDs; startup-ledger must run node scripts/consolidate-evidence.mjs <reportFolder> to dedupe sources/claims, create final 100-evidence-ledger.yaml, and rewrite final claimRefs before startup-report and startup-card run. Keep every final factual claim linked through 100-evidence-ledger.yaml claimRefs/sourceRefs. Evidence collection is web_search-only and available to the single Startup Research agent throughout analysis skills: generate targeted queries from each skill's YAML needs, batch independent queries, run non-dependent web_search calls in parallel wherever possible, parse each response packet fully (answer text is candidate narrative, annotations[].url_citation supplies source candidates, valid spans map facts to citations, and bing_searches[] is query provenance only), generate sources[] only from cited/annotated URLs, dedupe by canonical URL and underlying event during consolidation, prefer recent sources for current claims, and vary queries when results repeat. Evidence coverage follows chapter needs: retain sources that support downstream claims or document evidenceGaps. Use null, with explanation, for unsupported metrics. During the 01-08 analysis skills, run dynamic per-skill web_search when missing data appears supportable; translate only after consolidation and the English report/card skills finish. Delete duplicate or failed partial report folders before final validation. Do not invoke Startup Research recursively. Do not run git add or git commit.
          EOF
          )
            copilot --yolo --no-ask-user --agent "Startup Research" -p "$PROMPT"
          fi

      - name: Rebuild reports/_index.yaml
        run: node scripts/build-reports-index.mjs --strict

      - name: Validate generated report and website
        run: npm run validate

      - name: Reject partial report folders
        run: |
          set -euo pipefail
          shopt -s nullglob
          partials=()
          for dir in reports/*/; do
            if compgen -G "${dir}*.yaml" > /dev/null; then
              for required in 102-report-card.yaml 101-report-document.zh.yaml 102-report-card.zh.yaml; do
                if [ ! -f "${dir}${required}" ]; then
                  partials+=("${dir%/} (missing ${required})")
                fi
              done
            fi
          done
          if [ "${#partials[@]}" -gt 0 ]; then
            printf 'Partial report folder(s) found; refusing to commit:\n' >&2
            printf ' - %s\n' "${partials[@]}" >&2
            exit 1
          fi

      - name: Commit and push new report
        env:
          COMPANY: ${{ steps.inputs.outputs.company }}
        run: |
          set -euo pipefail
          git config user.name "startup-research-bot"
          git config user.email "startup-research-bot@users.noreply.github.com"
          git fetch origin "${{ github.ref_name }}"
          git rebase --autostash "origin/${{ github.ref_name }}"
          node scripts/build-reports-index.mjs --strict
          git add reports/
          if git diff --cached --quiet; then
            echo "No new or updated startup reports."
            exit 0
          fi
          SAFE_COMPANY="$(printf '%s' "$COMPANY" | tr -c '[:alnum:]' '-' | tr '[:upper:]' '[:lower:]' | sed 's/-\+/-/g; s/^-//; s/-$//' | cut -c1-60)"
          STAMP="$(date -u +%F)"
          git commit -m "chore(reports): research ${SAFE_COMPANY:-startup} $STAMP"
          git push origin HEAD:${{ github.ref_name }}
