# Manual startup research run.
#
# Two modes:
#   1. Research a single named company (provide companyName, optionally companyUrl).
#   2. Discover and research recent unicorn startups (leave companyName blank;
#      optionally set unicornCount).
#
# CI installs deps, drives the GitHub Copilot CLI to produce report YAML under
# reports/<run>/, rebuilds reports/_index.yaml, validates the site, and commits
# the new artifacts.
#
# Required secrets:
# - COPILOT_PAT — PAT for a Copilot-licensed account; consumed by the Copilot CLI.
# - STARTUP_PAT — PAT with repo write access for checkout/push.

name: Research startup company

on:
  workflow_dispatch:
    inputs:
      companyName:
        description: "Company name to research. Leave blank to auto-discover recent unicorns."
        required: false
        default: ""
        type: string
      companyUrl:
        description: "Optional official website or profile URL for the named company."
        required: false
        default: ""
        type: string
      unicornCount:
        description: "How many recent unicorn startups to research when companyName is blank."
        required: false
        default: "5"
        type: string

permissions:
  contents: write

concurrency:
  group: startup-research-${{ github.event.inputs.companyName || 'recent-unicorns' }}
  cancel-in-progress: false

jobs:
  research:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.STARTUP_PAT }}

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: |
            package-lock.json
            website/package-lock.json

      - name: Install root deps
        run: npm ci || npm install --no-audit --no-fund

      - name: Install website deps
        working-directory: website
        run: npm ci || npm install --no-audit --no-fund

      - name: Install GitHub Copilot CLI
        run: npm install -g @github/copilot

      - name: Resolve run inputs
        id: inputs
        env:
          RAW_COMPANY: ${{ github.event.inputs.companyName }}
          RAW_URL: ${{ github.event.inputs.companyUrl }}
          RAW_COUNT: ${{ github.event.inputs.unicornCount }}
        run: |
          set -euo pipefail
          trim() { printf '%s' "${1//$'\n'/ }" | sed 's/^[[:space:]]*//; s/[[:space:]]*$//'; }
          COMPANY="$(trim "$RAW_COMPANY")"
          URL="$(trim "$RAW_URL")"
          COUNT="$(trim "$RAW_COUNT")"
          if ! [[ "$COUNT" =~ ^[0-9]+$ ]] || [ "$COUNT" -lt 1 ]; then
            COUNT=5
          fi
          if [ -z "$COMPANY" ]; then
            MODE="recent-unicorns"
            LABEL="recent-unicorns"
          else
            MODE="single-company"
            LABEL="$COMPANY"
          fi
          {
            echo "mode=$MODE"
            echo "count=$COUNT"
            echo "label=$LABEL"
            echo "company<<EOF"
            echo "$COMPANY"
            echo "EOF"
            echo "url<<EOF"
            echo "$URL"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Run startup research
        env:
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_PAT }}
          MODE: ${{ steps.inputs.outputs.mode }}
          COUNT: ${{ steps.inputs.outputs.count }}
          COMPANY: ${{ steps.inputs.outputs.company }}
          COMPANY_URL: ${{ steps.inputs.outputs.url }}
        run: |
          set -euo pipefail
          if [ "$MODE" = "recent-unicorns" ]; then
            PROMPT=$(cat <<EOF
          Produce full diligence reports for $COUNT recent private unicorn startups suitable for VC review.

          Selection rules:
          - Prefer companies that recently raised at, crossed, or were reported above a \$1B valuation, or became newly prominent in the last 12-24 months.
          - Skip companies already present in reports/_index.yaml unless a materially new report is justified.
          - Pick a diverse set across sectors when possible.

          For each selected company, run one complete startup diligence report end-to-end yourself; do not delegate to another agent. Write the full required English YAML set under its own reports/<run>/ folder. Delete duplicate, failed, or partial report folders before finishing. Do not run git add or git commit.
          EOF
          )
          else
            PROMPT=$(cat <<EOF
          Produce one complete startup diligence report for the company below.

          Company: $COMPANY
          Company URL: ${COMPANY_URL:-unknown}

          Run the diligence workflow end-to-end yourself; do not delegate to another agent. Write the full required English YAML set under reports/<run>/. Delete duplicate, failed, or partial report folders before finishing. Do not run git add or git commit.
          EOF
          )
          fi
          copilot --yolo --no-ask-user -p "$PROMPT"

      - name: Rebuild reports/_index.yaml
        run: npm run build:report-index

      - name: Validate generated reports and website
        run: npm run validate

      - name: Reject partial report folders
        run: |
          set -euo pipefail
          shopt -s nullglob
          partials=()
          for dir in reports/*/; do
            if compgen -G "${dir}*.yaml" > /dev/null; then
              for required in summary-card.yaml; do
                if [ ! -f "${dir}${required}" ]; then
                  partials+=("${dir%/} (missing ${required})")
                fi
              done
            fi
          done
          if [ "${#partials[@]}" -gt 0 ]; then
            printf 'Partial report folder(s) found; refusing to commit:\n' >&2
            printf ' - %s\n' "${partials[@]}" >&2
            exit 1
          fi

      - name: Commit and push new reports
        env:
          LABEL: ${{ steps.inputs.outputs.label }}
        run: |
          set -euo pipefail
          git config user.name "startup-research-bot"
          git config user.email "startup-research-bot@users.noreply.github.com"
          git fetch origin "${{ github.ref_name }}"
          git rebase --autostash "origin/${{ github.ref_name }}"
          npm run build:report-index
          git add reports/
          if git diff --cached --quiet; then
            echo "No new or updated startup reports."
            exit 0
          fi
          SAFE_LABEL="$(printf '%s' "$LABEL" | tr -c '[:alnum:]' '-' | tr '[:upper:]' '[:lower:]' | sed 's/-\+/-/g; s/^-//; s/-$//' | cut -c1-60)"
          STAMP="$(date -u +%F)"
          git commit -m "chore(reports): research ${SAFE_LABEL:-startup} $STAMP"
          git push origin HEAD:${{ github.ref_name }}
