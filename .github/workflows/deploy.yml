name: Deploy site

on:
  push:
    branches: [main]
    paths:
      - 'website/**'
      - 'reports/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build Astro report site
    runs-on: ubuntu-latest
    env:
      BASE_PATH: /
      SITE_URL: https://startup.genisisiq.com
      PUBLIC_GA_ID: ${{ vars.PUBLIC_GA_ID }}
    defaults:
      run:
        working-directory: website
    steps:
      - name: Checkout report and website sources
        uses: actions/checkout@v6
      - name: Set up Node.js for website build
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: website/package-lock.json
      - name: Restore incremental build caches
        uses: actions/cache@v4
        with:
          path: |
            website/.astro
            .cache
          key: startup-incremental-${{ runner.os }}-node22-${{ hashFiles('website/src/**', 'website/package-lock.json', '.agents/skills/startup-research/scripts/**', '.agents/skills/translate-zh/scripts/**') }}-${{ hashFiles('reports/**/*.yaml') }}
          restore-keys: |
            startup-incremental-${{ runner.os }}-node22-${{ hashFiles('website/src/**', 'website/package-lock.json', '.agents/skills/startup-research/scripts/**', '.agents/skills/translate-zh/scripts/**') }}-
            startup-incremental-${{ runner.os }}-node22-
      - name: Install website dependencies
        run: npm ci
      - name: Build static report website
        run: npm run build
      - name: Configure GitHub Pages publishing
        uses: actions/configure-pages@v6
      - name: Upload built site artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: website/dist

  deploy:
    name: Publish site to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy uploaded site artifact
        id: deployment
        uses: actions/deploy-pages@v5
