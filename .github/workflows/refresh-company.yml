# Manual single-company startup research refresh run.
#
# Produces a new diligence report for an existing startup company report,
# keeps the previous report for auditability, and marks it superseded after
# the new report passes validation.
#
# Required secrets:
# - COPILOT_PAT — PAT for a Copilot-licensed account; consumed by the Copilot CLI.
# - STARTUP_PAT — PAT with repo write access for checkout/push.

name: Refresh company report

env:
  CURL_IMPERSONATE_VERSION: "1.5.6"
  CURL_IMPERSONATE_TARBALL: "curl-impersonate-v1.5.6.x86_64-linux-gnu.tar.gz"
  CURL_IMPERSONATE_SHA256: "b60344f63b9ed8806f0e9f7fd357d9f6c9a82aca279ed1e9e257d544885dcbde"

on:
  workflow_dispatch:
    inputs:
      companyName:
        description: "Company."
        required: true
        type: string
      companyUrl:
        description: "URL."
        required: false
        default: ""
        type: string
      refreshReason:
        description: "Why this report should be refreshed."
        required: false
        default: ""
        type: string
      model:
        description: "Model."
        required: false
        default: "claude-sonnet-4.6"
        type: choice
        options:
          - gpt-5.5
          - gpt-5.4
          - claude-sonnet-4.6
          - claude-opus-4.6
permissions:
  contents: write
  pull-requests: write

concurrency:
  group: startup-refresh-company-${{ github.event.inputs.companyName || github.run_id }}
  cancel-in-progress: false

jobs:
  refresh:
    name: Refresh existing company diligence report
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - name: Checkout repository history
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.STARTUP_PAT }}

      - name: Sync to latest branch head
        run: |
          set -euo pipefail
          BRANCH="${{ github.ref_name }}"
          # Queued workflow_dispatch runs are created from the dispatch SHA;
          # refresh before generation so prior committed reports count.
          git fetch origin "$BRANCH:refs/remotes/origin/$BRANCH"
          git checkout --force -B "$BRANCH" "origin/$BRANCH"

      - name: Set up Node.js with npm cache
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: |
            package-lock.json
            website/package-lock.json

      - name: Install dependencies and Copilot CLI
        run: |
          npm ci || npm install --no-audit --no-fund
          npm --prefix website ci || npm --prefix website install --no-audit --no-fund
          npm install -g @github/copilot

      - name: Restore curl-impersonate cache
        uses: actions/cache@v5
        with:
          path: ~/.local/share/curl-impersonate
          key: curl-impersonate-${{ runner.os }}-${{ env.CURL_IMPERSONATE_VERSION }}-${{ env.CURL_IMPERSONATE_SHA256 }}

      - name: Install browser-impersonating fetch client
        run: |
          set -euo pipefail
          INSTALL_DIR="$HOME/.local/share/curl-impersonate"
          if [ ! -x "$INSTALL_DIR/curl_chrome120" ]; then
            rm -rf "$INSTALL_DIR"
            mkdir -p "$INSTALL_DIR"
            cd "$INSTALL_DIR"
            URL="https://github.com/lexiforest/curl-impersonate/releases/download/v${CURL_IMPERSONATE_VERSION}/${CURL_IMPERSONATE_TARBALL}"
            curl -sSL --retry 3 --retry-delay 5 -o "$CURL_IMPERSONATE_TARBALL" "$URL"
            echo "${CURL_IMPERSONATE_SHA256}  ${CURL_IMPERSONATE_TARBALL}" | sha256sum -c -
            tar -xzf "$CURL_IMPERSONATE_TARBALL"
            rm -f "$CURL_IMPERSONATE_TARBALL"
          fi
          "$INSTALL_DIR/curl_chrome120" -s -o /dev/null -w 'curl-impersonate smoke test: %{http_code}\n' https://example.com
          echo "CURL_IMPERSONATE_DIR=$INSTALL_DIR" >> "$GITHUB_ENV"

      - name: Normalize refresh request inputs
        id: inputs
        env:
          RAW_COMPANY: ${{ github.event.inputs.companyName }}
          RAW_URL: ${{ github.event.inputs.companyUrl }}
          RAW_REFRESH_REASON: ${{ github.event.inputs.refreshReason }}
          RAW_MODEL: ${{ github.event.inputs.model }}
        run: |
          set -euo pipefail
          trim() { printf '%s' "${1//$'\n'/ }" | sed 's/^[[:space:]]*//; s/[[:space:]]*$//'; }
          COMPANY="$(trim "$RAW_COMPANY")"
          URL="$(trim "$RAW_URL")"
          REFRESH_REASON="$(trim "$RAW_REFRESH_REASON")"
          MODEL="$(trim "$RAW_MODEL")"
          if [ -z "$COMPANY" ]; then
            echo "companyName is required" >&2
            exit 1
          fi
          case "$MODEL" in
            claude-sonnet-4.6|claude-opus-4.6|gpt-5.5|gpt-5.4) ;;
            "") MODEL="claude-sonnet-4.6" ;;
            *)
              echo "Unsupported model: $MODEL (allowed: claude-sonnet-4.6, claude-opus-4.6, gpt-5.5, gpt-5.4)" >&2
              exit 1
              ;;
          esac
          case "$MODEL" in
            gpt-5.5|gpt-5.4) EFFORT="xhigh" ;;
            claude-sonnet-4.6|claude-opus-4.6) EFFORT="high" ;;
          esac
          if [ -z "$REFRESH_REASON" ]; then
            REFRESH_REASON="Manual refresh requested by workflow dispatch."
          fi
          LABEL="$COMPANY"
          SAFE_LABEL="$(printf '%s' "$LABEL" | tr -c '[:alnum:]' '-' | tr '[:upper:]' '[:lower:]' | sed 's/-\+/-/g; s/^-//; s/-$//' | cut -c1-60)"
          if [ -z "$SAFE_LABEL" ]; then
            SAFE_LABEL="startup"
          fi
          {
            echo "label=$LABEL"
            echo "safeLabel=$SAFE_LABEL"
            echo "model=$MODEL"
            echo "effort=$EFFORT"
            echo "refreshReason<<EOF"
            echo "$REFRESH_REASON"
            echo "EOF"
            echo "company<<EOF"
            echo "$COMPANY"
            echo "EOF"
            echo "url<<EOF"
            echo "$URL"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Write refresh run summary
        env:
          COMPANY: ${{ steps.inputs.outputs.company }}
          COMPANY_URL: ${{ steps.inputs.outputs.url }}
          REFRESH_REASON: ${{ steps.inputs.outputs.refreshReason }}
          MODEL: ${{ steps.inputs.outputs.model }}
          EFFORT: ${{ steps.inputs.outputs.effort }}
        run: |
          {
            echo "## Startup company refresh run"
            echo
            echo "| Field | Value |"
            echo "| --- | --- |"
            echo "| Company | ${COMPANY:-unknown} |"
            echo "| URL | ${COMPANY_URL:-unknown} |"
            echo "| Refresh reason | ${REFRESH_REASON:-unknown} |"
            echo "| Model | ${MODEL:-unknown} |"
            echo "| Effort | ${EFFORT:-unknown} |"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Snapshot reports before refresh
        run: |
          find reports -mindepth 1 -maxdepth 1 -type d -printf '%f\n' | sort > "$RUNNER_TEMP/reports-before.txt"

      - name: Generate refreshed diligence report
        env:
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_PAT }}
          COMPANY: ${{ steps.inputs.outputs.company }}
          COMPANY_URL: ${{ steps.inputs.outputs.url }}
          REFRESH_REASON: ${{ steps.inputs.outputs.refreshReason }}
          MODEL: ${{ steps.inputs.outputs.model }}
          EFFORT: ${{ steps.inputs.outputs.effort }}
          # fetch-url appends one JSON line per call here when set; chapter
          # checks can use the trail to surface unverifiedSource warnings.
          STARTUP_FETCH_LOG_PATH: ${{ github.workspace }}/.research-cache/_fetch-log.jsonl
        run: |
          set -euo pipefail
          mkdir -p "$(dirname "$STARTUP_FETCH_LOG_PATH")"
          : > "$STARTUP_FETCH_LOG_PATH"
          PROMPT=$(cat <<EOF
          Produce one complete refreshed startup diligence report for the company below.

          Do not use a workflow-provided run date. After create-report-run.mjs, use runtimeContext.run.runDate from load-chapter-runtime-context.mjs as the canonical research date, YAML runDate, and source-discovery freshness anchor.
          Company: $COMPANY
          Company URL: ${COMPANY_URL:-unknown}
          Refresh reason: ${REFRESH_REASON:-n/a}

          This is an explicit full refresh. Create a new report folder even when a finalized report folder for the same company/domain already exists by using create-report-run.mjs with --refresh and --refresh-reason. The previous report is resolved from the company name/domain by walking reports/<runId>/summary-card.yaml; if create-report-run reports multiple current matches, rerun it with --refresh-of <priorRunId> from the listed candidates before proceeding. Treat the prior report only as background/diff context; re-fetch current evidence for volatile facts such as funding, valuation, headcount, customers, pricing, legal/regulatory status, outages, partnerships, and product launches.
          Generate and finalize a complete refreshed startup diligence research report for this company.
          Treat completion as an on-disk contract: the new refresh report folder must end with all required chapter, metadata, and generated artifacts. If you fan out chapter work, join every task, inspect failures, and never exit successfully with partial report folders.

          Run the diligence workflow end-to-end yourself; do not delegate to another agent. Write the full required English YAML set under reports/<run>/. Follow the startup-research skill's source-verification rules; this workflow provides STARTUP_FETCH_LOG_PATH so fetch-url calls are auditable. Use the host search/source-discovery capability before fetch-url; if no source-discovery capability is available, stop before creating a report folder, print a clear source-discovery-unavailable note, and do not invent sources. Do not run any git command (git add, git commit, git push, git stash, git checkout, etc.) at any point in the workflow — leave every generated and modified file unstaged in the working tree; the workflow itself owns commit/push decisions.
          EOF
          )
          mkdir -p "$RUNNER_TEMP/copilot-logs"
          COPILOT_LOG="$RUNNER_TEMP/copilot-logs/run.log"
          set +e
          copilot --yolo --excluded-tools "web_fetch" --model "$MODEL" --effort "$EFFORT" -p "$PROMPT" 2>&1 | tee "$COPILOT_LOG"
          status=${PIPESTATUS[0]}
          set -e
          {
            echo
            echo "### Copilot run stats"
            if [ -s "$COPILOT_LOG" ]; then
              tail -n 20 "$COPILOT_LOG" | grep -iE '^(changes?|requests?|tokens?)\b' | sed 's/^/- /' || echo "- (no stats line emitted)"
            else
              echo "- (no Copilot output captured)"
            fi
            if [ -s "$STARTUP_FETCH_LOG_PATH" ]; then
              fetch_calls=$(wc -l < "$STARTUP_FETCH_LOG_PATH")
              fetch_ok=$(grep -c '"ok":true' "$STARTUP_FETCH_LOG_PATH" || true)
              echo "- fetch-url calls: $fetch_calls (ok=$fetch_ok)"
            else
              echo "- fetch-url trail empty (the agent did not call fetch-url; expect unverifiedSource warnings)"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
          exit "$status"

      - name: Finalize complete refreshed report folders
        env:
          REFRESH_REASON: ${{ steps.inputs.outputs.refreshReason }}
        # Safety net: if Copilot wrote every chapter YAML plus report-meta.yaml
        # but skipped the finalize-report.mjs pipeline, run finalize ourselves.
        # Only attempt finalize when all upstream inputs from the runtime
        # context exist; truly partial folders are left for the prune step.
        run: |
          set -euo pipefail
          shopt -s nullglob
          mapfile -t required_inputs < <(
            node .agents/skills/startup-research/scripts/load-chapter-runtime-context.mjs --list |
              node --input-type=module -e 'import fs from "node:fs"; const ctx = JSON.parse(fs.readFileSync(0, "utf8")); const chapters = (ctx.chapters ?? []).map((c) => c.file).filter(Boolean); for (const file of [...chapters, "report-meta.yaml"]) console.log(file);'
          )
          if [ "${#required_inputs[@]}" -eq 0 ]; then
            echo "No required report inputs found in runtime context." >&2
            exit 1
          fi
          for dir in reports/*/; do
            if [ -f "${dir}summary-card.yaml" ]; then
              continue
            fi
            missing=()
            for f in "${required_inputs[@]}"; do
              [ -f "${dir}${f}" ] || missing+=("$f")
            done
            if [ "${#missing[@]}" -gt 0 ]; then
              echo "Skipping ${dir%/}: missing $(IFS=,; echo "${missing[*]}")"
              continue
            fi
            echo "::group::Finalizing $dir"
            run_id="$(basename "${dir%/}")"
            if grep -Fxq "$run_id" "$RUNNER_TEMP/reports-before.txt"; then
              echo "Skipping refresh args for pre-existing in-progress folder: $run_id"
              if node .agents/skills/startup-research/scripts/finalize-report.mjs "$dir"; then
                echo "Finalize succeeded for $dir"
              else
                echo "::warning::Finalize failed for $dir; will be dropped"
              fi
              echo "::endgroup::"
              continue
            fi
            refresh_args=(--refresh)
            if [ -n "${REFRESH_REASON:-}" ]; then
              refresh_args+=(--refresh-reason "$REFRESH_REASON")
            fi
            if node .agents/skills/startup-research/scripts/finalize-report.mjs "$dir" "${refresh_args[@]}"; then
              echo "Finalize succeeded for $dir"
            else
              echo "::warning::Finalize failed for $dir; will be dropped"
            fi
            echo "::endgroup::"
          done

      - name: Stage changed report files artifact
        # Capture newly-created and modified report files, including partial outputs,
        # before pruning. Available even on failure for offline recovery.
        if: always()
        run: |
          set -euo pipefail
          ARTIFACT_DIR="$RUNNER_TEMP/generated-reports-artifact"
          rm -rf "$ARTIFACT_DIR"
          mkdir -p "$ARTIFACT_DIR"

          if ! git rev-parse --is-inside-work-tree >/dev/null 2>&1 || [ ! -d reports ]; then
            echo "No reports directory was available to package."
            exit 0
          fi

          copied=0
          while IFS= read -r -d '' entry; do
            status="${entry:0:2}"
            path="${entry:3}"
            case "$status" in
              '??'|A*|M*|?M) ;;
              *) continue ;;
            esac
            [ -f "$path" ] || continue
            mkdir -p "$ARTIFACT_DIR/$(dirname "$path")"
            cp "$path" "$ARTIFACT_DIR/$path"
            copied=$((copied + 1))
          done < <(git status --porcelain=v1 -z --untracked-files=all -- reports/)

          if [ "$copied" -eq 0 ]; then
            echo "No newly-created or modified report files were found."
          fi
          {
            echo
            echo "### Preserved changed files artifact"
            echo "- Artifact: refresh-company-${{ steps.inputs.outputs.safeLabel }}"
            echo "- New/modified report files copied: $copied"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Preserve refreshed reports artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: refresh-company-${{ steps.inputs.outputs.safeLabel }}
          path: ${{ runner.temp }}/generated-reports-artifact/
          retention-days: 14
          if-no-files-found: ignore

      - name: Remove incomplete report folders
        # Remove partial folders so they do not contaminate the commit; the
        # artifact above preserves the originals for recovery/debugging.
        run: |
          set -euo pipefail
          shopt -s nullglob
          mapfile -t required_files < <(
            node .agents/skills/startup-research/scripts/load-chapter-runtime-context.mjs --list |
              node --input-type=module -e 'import fs from "node:fs"; for (const file of ["report-meta.yaml", "evidence.yaml", "full-report.yaml", "summary-card.yaml"]) console.log(file);'
          )
          if [ "${#required_files[@]}" -eq 0 ]; then
            echo "No required finalized report files found in runtime context." >&2
            exit 1
          fi
          find reports -mindepth 1 -maxdepth 1 -type d -printf '%f\n' | sort > "$RUNNER_TEMP/reports-before-prune.txt"
          comm -13 "$RUNNER_TEMP/reports-before.txt" "$RUNNER_TEMP/reports-before-prune.txt" > "$RUNNER_TEMP/reports-created.txt" || true
          : > "$RUNNER_TEMP/reports-dropped.txt"
          : > "$RUNNER_TEMP/reports-new-dropped.txt"
          dropped=()
          for dir in reports/*/; do
            for required in "${required_files[@]}"; do
              if [ ! -f "${dir}${required}" ]; then
                folder="${dir%/}"
                folder_name="${folder#reports/}"
                rm -rf "$dir"
                dropped+=("$folder")
                printf '%s\n' "$folder_name" >> "$RUNNER_TEMP/reports-dropped.txt"
                if grep -Fxq "$folder_name" "$RUNNER_TEMP/reports-created.txt"; then
                  printf '%s\n' "$folder_name" >> "$RUNNER_TEMP/reports-new-dropped.txt"
                fi
                break
              fi
            done
          done
          if [ "${#dropped[@]}" -gt 0 ]; then
            printf '::warning::Dropped partial report folder(s):\n'
            printf ' - %s\n' "${dropped[@]}"
          else
            echo "No partial report folders to drop."
          fi

      - name: Summarize refreshed report folders
        run: |
          set -euo pipefail
          find reports -mindepth 1 -maxdepth 1 -type d -printf '%f\n' | sort > "$RUNNER_TEMP/reports-after.txt"
          comm -13 "$RUNNER_TEMP/reports-before.txt" "$RUNNER_TEMP/reports-after.txt" > "$RUNNER_TEMP/reports-new.txt" || true
          {
            echo
            echo "### Refreshed report folder changes"
            if [ -s "$RUNNER_TEMP/reports-created.txt" ]; then
              echo "Report folders created during generation/finalization:"
              sed 's/^/- `reports\//; s/$/`/' "$RUNNER_TEMP/reports-created.txt"
              echo
            fi
            if [ -s "$RUNNER_TEMP/reports-dropped.txt" ]; then
              echo "Partial report folders dropped before commit:"
              sed 's/^/- `reports\//; s/$/`/' "$RUNNER_TEMP/reports-dropped.txt"
              echo
            fi
            if [ -s "$RUNNER_TEMP/reports-new-dropped.txt" ]; then
              echo "Newly-created report folders that failed to finalize:"
              sed 's/^/- `reports\//; s/$/`/' "$RUNNER_TEMP/reports-new-dropped.txt"
              echo
            fi
            if [ -s "$RUNNER_TEMP/reports-new.txt" ]; then
              echo "New refreshed report folders:"
              sed 's/^/- `reports\//; s/$/`/' "$RUNNER_TEMP/reports-new.txt"
            else
              echo "No new finalized refreshed report folders detected."
            fi
          } >> "$GITHUB_STEP_SUMMARY"
          if [ -s "$RUNNER_TEMP/reports-new-dropped.txt" ]; then
            echo "::error::Newly-created refreshed report folder(s) were incomplete and had to be pruned. This means refresh generation did not finish cleanly; see the preserved refresh-company artifact for recovery details."
            exit 1
          fi
          if [ -s "$RUNNER_TEMP/reports-created.txt" ] && [ ! -s "$RUNNER_TEMP/reports-new.txt" ]; then
            echo "::error::Report folders were created, but none survived finalization/pruning. This usually means refresh generation exited before writing complete report artifacts. See the preserved refresh-company artifact for recovery details."
            exit 1
          fi

      - name: Validate reports and website build
        env:
          # Same trail file the refresh step appended to. check-chapter can
          # cross-reference it when chapter gates run during generation.
          STARTUP_FETCH_LOG_PATH: ${{ github.workspace }}/.research-cache/_fetch-log.jsonl
        run: npm run validate

      - name: Commit and publish refreshed report
        env:
          SAFE_LABEL: ${{ steps.inputs.outputs.safeLabel }}
          GH_TOKEN: ${{ secrets.STARTUP_PAT }}
        run: |
          set -euo pipefail
          git config user.name "startup-research-bot"
          git config user.email "startup-research-bot@users.noreply.github.com"
          BRANCH="${{ github.ref_name }}"
          SAFE_LABEL="${SAFE_LABEL:-startup}"
          STAMP="$(date -u +%F)"
          MESSAGE="chore(reports): refresh ${SAFE_LABEL:-startup} $STAMP"

          git add reports/
          if git diff --cached --quiet; then
            echo "No new or updated startup reports."
            exit 0
          fi
          git commit -m "$MESSAGE"

          # Each refresh writes the new reports/<runId>/ folder plus the
          # superseded prior reports/<oldRunId>/ folder. There is no derived
          # cross-report file. Parallel runs cannot conflict unless two runs
          # picked the exact same runId+slug, so a plain rebase loop suffices.
          for attempt in 1 2 3; do
            echo "Push attempt $attempt/3 to $BRANCH"
            git fetch origin "$BRANCH"
            if ! git rebase --autostash "origin/$BRANCH"; then
              echo "Rebase failed; aborting and retrying." >&2
              git rebase --abort || true
              sleep $((attempt * 5))
              continue
            fi
            if git push origin "HEAD:$BRANCH"; then
              echo "Pushed to $BRANCH on attempt $attempt."
              exit 0
            fi
            sleep $((attempt * 5))
          done

          PR_BRANCH="auto/refresh-company-${SAFE_LABEL:-startup}-${STAMP}-$(date -u +%H%M%S)"
          echo "Direct push to $BRANCH failed; pushing to $PR_BRANCH and opening PR." >&2
          git push origin "HEAD:$PR_BRANCH"
          # The default GITHUB_TOKEN with `permissions: pull-requests: write`
          # is what `gh pr create` needs; STARTUP_PAT lacks that scope.
          GH_TOKEN="${{ secrets.GITHUB_TOKEN }}" gh pr create --base "$BRANCH" --head "$PR_BRANCH" \
            --title "$MESSAGE" \
            --body "Automated company refresh run. Direct push to \`$BRANCH\` failed after 3 attempts; merging via PR instead."
