# Manual single-company startup research refresh run.
#
# Produces a new diligence report for an existing startup company report,
# keeps the previous report for auditability, and marks it superseded after
# the new report passes validation.
#
# Required secrets:
# - COPILOT_PAT — PAT for a Copilot-licensed account; consumed by the Copilot CLI.
# - STARTUP_PAT — PAT with repo write access for checkout/push.

name: Refresh company report

env:
  CURL_IMPERSONATE_VERSION: "1.5.6"
  CURL_IMPERSONATE_TARBALL: "curl-impersonate-v1.5.6.x86_64-linux-gnu.tar.gz"
  CURL_IMPERSONATE_SHA256: "b60344f63b9ed8806f0e9f7fd357d9f6c9a82aca279ed1e9e257d544885dcbde"

on:
  workflow_dispatch:
    inputs:
      companyName:
        description: "Company."
        required: true
        type: string
      companyUrl:
        description: "URL."
        required: false
        default: ""
        type: string
      refreshReason:
        description: "Why this report should be refreshed."
        required: false
        default: ""
        type: string
      model:
        description: "Model."
        required: false
        default: "claude-sonnet-4.6"
        type: choice
        options:
          - gpt-5.5
          - gpt-5.4
          - claude-sonnet-4.6
          - claude-opus-4.6

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: startup-refresh-company-${{ github.event.inputs.companyName || github.run_id }}
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.STARTUP_PAT }}

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: |
            package-lock.json
            website/package-lock.json

      - name: Install root deps
        run: npm ci || npm install --no-audit --no-fund

      - name: Install website deps
        working-directory: website
        run: npm ci || npm install --no-audit --no-fund

      - name: Install GitHub Copilot CLI
        run: npm install -g @github/copilot

      - name: Cache curl-impersonate
        uses: actions/cache@v4
        with:
          path: ~/.local/share/curl-impersonate
          key: curl-impersonate-${{ runner.os }}-${{ env.CURL_IMPERSONATE_VERSION }}-${{ env.CURL_IMPERSONATE_SHA256 }}

      - name: Install curl-impersonate
        run: |
          set -euo pipefail
          INSTALL_DIR="$HOME/.local/share/curl-impersonate"
          if [ ! -x "$INSTALL_DIR/curl_chrome120" ]; then
            rm -rf "$INSTALL_DIR"
            mkdir -p "$INSTALL_DIR"
            cd "$INSTALL_DIR"
            URL="https://github.com/lexiforest/curl-impersonate/releases/download/v${CURL_IMPERSONATE_VERSION}/${CURL_IMPERSONATE_TARBALL}"
            curl -sSL --retry 3 --retry-delay 5 -o "$CURL_IMPERSONATE_TARBALL" "$URL"
            echo "${CURL_IMPERSONATE_SHA256}  ${CURL_IMPERSONATE_TARBALL}" | sha256sum -c -
            tar -xzf "$CURL_IMPERSONATE_TARBALL"
            rm -f "$CURL_IMPERSONATE_TARBALL"
          fi
          cd "$INSTALL_DIR"
          ./curl_chrome120 -s -o /dev/null -w 'curl-impersonate smoke test: %{http_code}\n' https://example.com
          echo "CURL_IMPERSONATE_DIR=$INSTALL_DIR" >> "$GITHUB_ENV"

      - name: Resolve refresh inputs
        id: inputs
        env:
          RAW_COMPANY: ${{ github.event.inputs.companyName }}
          RAW_URL: ${{ github.event.inputs.companyUrl }}
          RAW_REFRESH_REASON: ${{ github.event.inputs.refreshReason }}
          RAW_MODEL: ${{ github.event.inputs.model }}
        run: |
          set -euo pipefail
          trim() { printf '%s' "${1//$'\n'/ }" | sed 's/^[[:space:]]*//; s/[[:space:]]*$//'; }
          COMPANY="$(trim "$RAW_COMPANY")"
          URL="$(trim "$RAW_URL")"
          REFRESH_REASON="$(trim "$RAW_REFRESH_REASON")"
          MODEL="$(trim "$RAW_MODEL")"
          RUN_DATE="$(date -u +%F)"
          if [ -z "$COMPANY" ]; then
            echo "companyName is required" >&2
            exit 1
          fi
          case "$MODEL" in
            claude-sonnet-4.6|claude-opus-4.6|gpt-5.5|gpt-5.4) ;;
            "") MODEL="claude-sonnet-4.6" ;;
            *)
              echo "Unsupported model: $MODEL (allowed: claude-sonnet-4.6, claude-opus-4.6, gpt-5.5, gpt-5.4)" >&2
              exit 1
              ;;
          esac
          if [ -z "$REFRESH_REASON" ]; then
            REFRESH_REASON="Manual refresh requested on $RUN_DATE UTC."
          fi
          LABEL="$COMPANY"
          SAFE_LABEL="$(printf '%s' "$LABEL" | tr -c '[:alnum:]' '-' | tr '[:upper:]' '[:lower:]' | sed 's/-\+/-/g; s/^-//; s/-$//' | cut -c1-60)"
          if [ -z "$SAFE_LABEL" ]; then
            SAFE_LABEL="startup"
          fi
          {
            echo "label=$LABEL"
            echo "safeLabel=$SAFE_LABEL"
            echo "model=$MODEL"
            echo "runDate=$RUN_DATE"
            echo "refreshReason<<EOF"
            echo "$REFRESH_REASON"
            echo "EOF"
            echo "company<<EOF"
            echo "$COMPANY"
            echo "EOF"
            echo "url<<EOF"
            echo "$URL"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Summarize refresh inputs
        run: |
          {
            echo "## Startup company refresh run"
            echo
            echo "| Field | Value |"
            echo "| --- | --- |"
            echo "| Company | ${{ steps.inputs.outputs.company }} |"
            echo "| URL | ${{ steps.inputs.outputs.url || 'unknown' }} |"
            echo "| Refresh reason | ${{ steps.inputs.outputs.refreshReason }} |"
            echo "| Model | ${{ steps.inputs.outputs.model }} |"
            echo "| Run date | ${{ steps.inputs.outputs.runDate }} UTC |"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Snapshot existing reports
        run: |
          find reports -mindepth 1 -maxdepth 1 -type d -printf '%f\n' | sort > "$RUNNER_TEMP/reports-before.txt"

      - name: Run startup research refresh
        env:
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_PAT }}
          COMPANY: ${{ steps.inputs.outputs.company }}
          COMPANY_URL: ${{ steps.inputs.outputs.url }}
          REFRESH_REASON: ${{ steps.inputs.outputs.refreshReason }}
          MODEL: ${{ steps.inputs.outputs.model }}
          RUN_DATE: ${{ steps.inputs.outputs.runDate }}
        run: |
          set -euo pipefail
          PROMPT=$(cat <<EOF
          Produce one complete refreshed startup diligence report for the company below.

          Run date: $RUN_DATE UTC.
          Company: $COMPANY
          Company URL: ${COMPANY_URL:-unknown}
          Refresh reason: ${REFRESH_REASON:-n/a}

          This is an explicit full refresh. Create a new report folder even when reports/_index.yaml already contains the same company/domain by using new-report.mjs with --refresh and --refresh-reason. The previous report is auto-resolved from the company name/domain. Treat the prior report only as background/diff context; re-fetch current evidence for volatile facts such as funding, valuation, headcount, customers, pricing, legal/regulatory status, outages, partnerships, and product launches.

          Run the diligence workflow end-to-end yourself; do not delegate to another agent. Write the full required English YAML set under reports/<run>/. Delete duplicate, failed, or partial report folders before finishing. Do not run git add or git commit.
          EOF
          )
          copilot --yolo --no-ask-user --model "$MODEL" -p "$PROMPT"

      - name: Finalize refreshed report folders
        env:
          REFRESH_REASON: ${{ steps.inputs.outputs.refreshReason }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          chapter_files=(
            01-company-overview.yaml
            02-market-analysis.yaml
            03-competitors.yaml
            04-financials.yaml
            05-product-tech.yaml
            06-customers.yaml
            07-risks.yaml
            08-valuation.yaml
            report-meta.yaml
          )
          for dir in reports/*/; do
            if [ -f "${dir}summary-card.yaml" ]; then
              continue
            fi
            missing=()
            for f in "${chapter_files[@]}"; do
              [ -f "${dir}${f}" ] || missing+=("$f")
            done
            if [ "${#missing[@]}" -gt 0 ]; then
              echo "Skipping ${dir%/}: missing $(IFS=,; echo "${missing[*]}")"
              continue
            fi
            echo "::group::Finalizing $dir"
            run_id="$(basename "${dir%/}")"
            if grep -Fxq "$run_id" "$RUNNER_TEMP/reports-before.txt"; then
              echo "Skipping refresh args for pre-existing in-progress folder: $run_id"
              if node .agents/skills/startup-research/scripts/finalize.mjs "$dir" --skip-index; then
                echo "Finalize succeeded for $dir"
              else
                echo "::warning::Finalize failed for $dir; will be dropped"
              fi
              echo "::endgroup::"
              continue
            fi
            refresh_args=(--refresh)
            if [ -n "${REFRESH_REASON:-}" ]; then
              refresh_args+=(--refresh-reason "$REFRESH_REASON")
            fi
            if node .agents/skills/startup-research/scripts/finalize.mjs "$dir" --skip-index "${refresh_args[@]}"; then
              echo "Finalize succeeded for $dir"
            else
              echo "::warning::Finalize failed for $dir; will be dropped"
            fi
            echo "::endgroup::"
          done

      - name: Upload reports as artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: refresh-company-${{ steps.inputs.outputs.safeLabel }}
          path: reports/
          retention-days: 14
          if-no-files-found: ignore

      - name: Drop partial report folders
        run: |
          set -euo pipefail
          shopt -s nullglob
          required_files=(summary-card.yaml full-report.yaml evidence.yaml report-meta.yaml)
          dropped=()
          for dir in reports/*/; do
            for required in "${required_files[@]}"; do
              if [ ! -f "${dir}${required}" ]; then
                rm -rf "$dir"
                dropped+=("${dir%/}")
                break
              fi
            done
          done
          if [ "${#dropped[@]}" -gt 0 ]; then
            printf '::warning::Dropped partial report folder(s):\n'
            printf ' - %s\n' "${dropped[@]}"
          else
            echo "No partial report folders to drop."
          fi

      - name: Summarize report changes
        run: |
          set -euo pipefail
          find reports -mindepth 1 -maxdepth 1 -type d -printf '%f\n' | sort > "$RUNNER_TEMP/reports-after.txt"
          comm -13 "$RUNNER_TEMP/reports-before.txt" "$RUNNER_TEMP/reports-after.txt" > "$RUNNER_TEMP/reports-new.txt" || true
          {
            echo
            echo "### Refreshed report folder changes"
            if [ -s "$RUNNER_TEMP/reports-new.txt" ]; then
              echo "New refreshed report folders:"
              sed 's/^/- `reports\//; s/$/`/' "$RUNNER_TEMP/reports-new.txt"
            else
              echo "No new finalized refreshed report folders detected."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Rebuild reports/_index.yaml
        run: npm run build:report-index

      - name: Validate generated reports and website
        run: npm run validate

      - name: Commit and push refreshed report
        env:
          SAFE_LABEL: ${{ steps.inputs.outputs.safeLabel }}
          GH_TOKEN: ${{ secrets.STARTUP_PAT }}
        run: |
          set -euo pipefail
          git config user.name "startup-research-bot"
          git config user.email "startup-research-bot@users.noreply.github.com"
          BRANCH="${{ github.ref_name }}"
          SAFE_LABEL="${SAFE_LABEL:-startup}"
          STAMP="$(date -u +%F)"
          MESSAGE="chore(reports): refresh ${SAFE_LABEL:-startup} $STAMP"

          git add reports/
          if git diff --cached --quiet; then
            echo "No new or updated startup reports."
            exit 0
          fi
          git commit -m "$MESSAGE"

          for attempt in 1 2 3; do
            echo "Push attempt $attempt/3 to $BRANCH"
            git fetch origin "$BRANCH"
            if git rebase --autostash "origin/$BRANCH"; then
              if git push origin "HEAD:$BRANCH"; then
                echo "Pushed to $BRANCH on attempt $attempt."
                exit 0
              fi
            else
              echo "Rebase failed; aborting and retrying." >&2
              git rebase --abort || true
            fi
            sleep $((attempt * 5))
          done

          PR_BRANCH="auto/refresh-company-${SAFE_LABEL:-startup}-${STAMP}-$(date -u +%H%M%S)"
          echo "Direct push to $BRANCH failed; pushing to $PR_BRANCH and opening PR." >&2
          git push origin "HEAD:$PR_BRANCH"
          gh pr create --base "$BRANCH" --head "$PR_BRANCH" \
            --title "$MESSAGE" \
            --body "Automated company refresh run. Direct push to \`$BRANCH\` failed after 3 attempts; merging via PR instead."
