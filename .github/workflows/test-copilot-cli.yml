# Smoke test for the GitHub Copilot CLI inside CI.
#
# Runs a minimal, non-mutating prompt to confirm the CLI installs, the
# COPILOT_PAT secret is wired correctly, and any configured MCP servers are
# discoverable. Useful for diagnosing Copilot CLI / MCP setup issues without
# triggering the full research pipeline.
#
# Required secrets:
# - COPILOT_PAT — PAT for a Copilot-licensed account; passed to the Copilot CLI.

name: Test Copilot CLI

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Install GitHub Copilot CLI
        run: npm install -g @github/copilot

      - name: Show MCP servers
        env:
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_PAT }}
        run: copilot --yolo --no-ask-user -p "show mcp servers"
